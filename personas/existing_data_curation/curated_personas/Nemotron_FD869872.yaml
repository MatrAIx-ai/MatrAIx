personas:
  professional: Eliana Lugo is a data‑driven marketing manager who leverages advanced Excel, SQL basics, Tableau and HubSpot to craft cross‑border digital campaigns, where their preference for structure
    and competitive edge drives meticulous segmentation and predictive modeling to outperform quarterly KPIs.
  sports: Eliana Lugo hikes with the Imperial County Desert Trail Club, attends thrice‑weekly yoga sessions at Sunlit Flow Studio, and cheers for the Los Angeles Lakers and the San Diego State Aztecs men’s
    basketball, treating fitness as a structured routine that fuels their competitive drive.
  arts: Eliana Lugo captures stark desert vistas with a Nikon D850, drawing inspiration from Ansel Adams’ tonal mastery and Alex Webb’s vibrant street photography, while unwinding to indie folk playlists
    featuring Bon Iver and Sufjan Stevens, integrating visual storytelling into their analytical worldview.
  travel: Eliana Lugo prefers meticulously planned trips that blend solitude with cultural immersion, having mapped solo hikes in Joshua Tree, a culinary tour of Oaxaca, and a future itinerary to Patagonia’s
    Torres del Paine, balancing adventure with a budget‑conscious approach.
  culinary: Eliana Lugo experiments with family‑passed recipes such as chilaquiles with tomatillo salsa, mole negro, and carne asada, honing their cooking skills on weekends while insisting on authentic
    ingredients like dried ancho chilies, masa harina, and fresh cilantro, yet they often over‑season in pursuit of perfect flavor.
  core: Eliana Lugo blends analytical precision with solitary adventure, channeling a competitive, structured drive into data‑rich marketing, disciplined finances, and rugged desert hikes, all while nurturing
    a quiet love for photography, yoga, and family recipes.
background:
  cultural: Eliana was raised in a Mexican‑American household on the California‑Mexico border, making her fluently bilingual and deeply rooted in both cultures. Family traditions such as Día de los Muertos,
    festive gatherings, and the communal preparation of tamales have shaped her appreciation for heritage while her daily life in Calexico exposes her to the pragmatic, entrepreneurial spirit of the border
    region. This bicultural lens informs her understanding of consumer behavior, allowing her to blend Mexican values of community and resilience with the structured, results‑oriented mindset valued in
    U.S. business environments.
attributes:
  skills: '[''Data Analysis'', ''Quantitative Market Research'', ''Predictive Modeling'', ''Digital Marketing Strategy'', ''SEO/SEM'', ''Content Strategy'', ''Project Management'', ''Budget Management'',
    ''CRM (HubSpot, Marketo)'', ''Google Analytics'', ''Tableau'', ''Bilingual Communication (Spanish/English)'', ''Competitive Intelligence'']'
  hobbies: '[''Desert hiking'', ''Landscape photography'', ''Cooking family Mexican recipes'', ''Yoga'', ''Reading technology and business non‑fiction'', ''Chess'', ''Volunteer tutoring for digital literacy'',
    ''Language exchange meetups (Spanish/English)'']'
  career_goals: Eliana aims to transition from marketing manager to director of marketing within the next five years, focusing on leading regional campaigns that bridge U.S. and Mexican consumer segments.
    She plans to deepen her expertise in data science applications for marketing, earn advanced certifications (Google Analytics IQ, HubSpot Advanced), and build a reputation as a thought leader on cross‑border
    brand positioning. Long‑term, she aspires to launch her own consultancy that helps midsize companies leverage analytics to capture Hispanic market share, while mentoring emerging marketers from underrepresented
    backgrounds.
