  hobbies: '[''Vegetable gardening'', ''Fishing'', ''Woodworking projects'', ''Classic car interior restoration'', ''Reading historical non-fiction'', ''Volunteer work at community events'']'
  career_goals: He plans to cement his reputation as the most reliable upholsterer in Cherokee County, expand his business to serve local schools and senior centers with ergonomic seating solutions, develop
    a written training manual for apprentices, and gradually shift ownership to his son while reducing his own hours to part‑time consulting and workshop instruction. He also aims to incorporate sustainable
    practices by upcycling vintage furniture, and to earn a regional trade‑show award for craftsmanship before retirement.
