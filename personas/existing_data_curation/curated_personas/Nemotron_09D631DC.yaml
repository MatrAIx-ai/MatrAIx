    (Lean, Six Sigma)'', ''Team leadership and staff development'', ''Digital transformation and automation'']'
  hobbies: '[''Model train building'', ''Automation scripting (Python)'', ''Hiking (New England trails)'', ''Cycling'', ''Cooking Korean cuisine'', ''Board games with close friends'', ''Technology podcasts'',
    ''Reading on logistics and business strategy'']'
  career_goals: Hai aims to progress from his current role as a transportation, storage, and distribution manager to a regional director of supply chain within the next five years. He plans to deepen his
    expertise in sustainable logistics, integrating green initiatives such as carbon-neutral freight and electric vehicle fleets. He intends to pursue an MBA or a certification in Sustainable Supply Chain
    Management to broaden his strategic perspective. Ultimately, Hai envisions leading a multi‑modal distribution network that leverages data-driven decision‑making and emerging technologies, and one day
    establishing his own consulting firm to help small and medium enterprises optimize their logistics.
