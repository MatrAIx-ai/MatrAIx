    "Traveling to Mexico to visit family"]'
  career_goals: Pilar aims to advance to senior project manager or director of engineering within the next five years, leading large‑scale infrastructure projects that prioritize sustainability and resilience.
    She plans to obtain her Professional Engineer (PE) license and eventually launch her own consulting firm focused on eco‑friendly design solutions for underserved communities. Pilar is also committed
    to mentoring junior engineers, especially women and Hispanic professionals, to broaden diversity in the field.
