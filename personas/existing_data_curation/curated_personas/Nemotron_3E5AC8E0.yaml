personas:
  professional: A forward‑thinking civil engineer named Pilar Rojas leverages their structural design expertise, AutoCAD and Revit BIM proficiency, and a competitively driven yet collaborative leadership
    style to deliver sustainable, code‑compliant projects while constantly exploring parametric modeling and green materials.
  sports: Energetic civil engineer Pilar Rojas fuels their fitness routine by weekly hikes in the Wasatch Range, weekend rock‑climbing sessions at the Vertical Expedition Gym as a member of the Salt Lake
    City Alpine Club, and cheering on the Utah Jazz and Real Salt Lake, and they also compete in a local women's climbing league.
  arts: Creative civil engineer Pilar Rojas expresses their artistic side by salsa dancing to classics from Celia Cruz and Marc Anthony, attending productions at the Salt Lake Acting Company, and they curate
    a playlist of Latin jazz that fuels their design brainstorming sessions.
  travel: Adventure‑oriented civil engineer Pilar Rojas plans trips around sustainable architecture tours in Kyoto, rugged treks across Patagonia’s Torres Del Paine, and weekend escapes to nearby national
    parks like Zion, favoring detailed itineraries but leaving room for spontaneous rock‑climbing excursions, and they budget these travels through a dedicated travel savings fund.
  culinary: Passionate civil engineer Pilar Rojas showcases their culinary skill by mastering dishes such as tacos al pastor, tamales de elote, and chiles en nogada, layering flavors with fresh cilantro,
    chipotle, and roasted pumpkin seeds, and they host monthly dinner gatherings where friends sample their authentic creations alongside a curated selection of craft mezcal.
  core: Driven civil engineer Pilar Rojas blends a competitive edge with a love for community, balancing rigorous project deadlines with weekly salsa nights, while they occasionally over‑check structural
    models late into the night, revealing a restless perfectionist streak.
background:
  cultural: Pilar was raised in a bilingual Mexican household, speaking both Spanish and English fluently. Her family emphasizes close-knit relationships, respect for tradition, and a strong work ethic,
    values that inform her collaborative yet goal‑driven approach at work. She celebrates Mexican holidays such as Día de los Muertos and shares cultural customs with friends in West Valley City, often
    participating in local festivals and community events. This heritage fuels her desire to give back to the Hispanic community, particularly by encouraging youth to pursue STEM careers.
attributes:
  skills: '["Structural design", "Project management", "AutoCAD", "Revit BIM", "Geotechnical analysis", "Sustainable construction practices", "Construction cost estimating", "Regulatory compliance", "Team
