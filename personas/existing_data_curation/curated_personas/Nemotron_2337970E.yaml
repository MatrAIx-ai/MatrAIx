personas:
  professional: Brittany Jacobs, a seasoned retail operations supervisor with two decades of floor management, POS mastery, loss‑prevention expertise, and a talent for data‑driven scheduling, leverages
    their practical, structured mindset and occasional worry‑driven attention to detail to cultivate disciplined teams and streamline store profitability.
  sports: Brittany Jacobs follows the Dallas Cowboys, enjoys attending Dallas Rangers games when the season aligns with their garden schedule, participates in a senior walking club at Erwin Park, and practices
    gentle yoga twice a week, balancing low‑impact fitness with a loyal yet relaxed allegiance to local professional teams.
  arts: Brittany Jacobs, an avid quilting enthusiast and regular attendee of Dallas Theater Center productions, finds artistic inspiration in the folk storytelling of Willie Nelson, the mystery novels of
    Agatha Christie, and the vibrant color palettes of Texas folk artist Dorothy Hood, weaving these influences into their own creative projects.
  travel: Brittany Jacobs prefers carefully planned road trips that blend modest adventure with family comfort, having journeyed through the historic streets of San Antonio’s River Walk, the art colonies
    of Marfa, and the blue‑grass festivals of Blue Ridge, while dreaming of a relaxed seaside retreat in Galveston and a cultural pilgrimage to New Orleans' French Quarter.
  culinary: Brittany Jacobs, an enthusiastic home chef, specializes in Tex‑Mex staples such as chicken enchiladas, carne asada tacos, and homemade salsa verde crafted from garden‑grown cilantro and jalapeños,
    balances their cooking skill level between confident grill master and occasional over‑salted casserole, and savors dining experiences that pair their dishes with a side of local craft beer.
  core: Brittany Jacobs blends meticulous retail leadership with a love for gardening, quilting, and Tex‑Mex cooking, yet often wrestles with worry‑driven perfectionism and a habit of over‑committing to
    community obligations.
background:
  cultural: Brittany grew up in a middle-class, white family in North Texas, where values of hard work, self-reliance, and community involvement were emphasized. Her upbringing was shaped by Southern hospitality,
    regular church attendance, and family traditions such as holiday barbecues, Fourth of July picnics, and volunteer service through her Methodist congregation. She carries forward a blend of Texan pragmatism
    and Midwestern courtesy, which informs her practical outlook, structured approach to work, and commitment to supporting her local community.
attributes:
  skills: '[''Retail floor supervision'', ''Staff training and development'', ''Inventory management'', ''Customer service excellence'', ''Point-of-sale systems'', ''Loss prevention'', ''Visual merchandising'',
