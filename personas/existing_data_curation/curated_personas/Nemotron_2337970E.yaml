  hobbies: '[''Gardening'', ''Book club (mystery & historical fiction)'', ''Quilting'', ''Community theater'', ''Volunteering at senior center'', ''Knitting circle'', ''Gentle yoga'', ''Walking in local
    parks'', ''Cooking Tex-Mex cuisine'', ''Participating in town festivals'']'
  career_goals: She aims to deepen her expertise in retail leadership by earning a Certified Retail Supervisor credential and to mentor emerging supervisors within her store chain. Long-term, Brittany hopes
    to transition into a regional training consultant role, allowing her to design standardized operating procedures that reduce staff turnover and improve store profitability. She also wants to establish
    a small boutique in McKinney that showcases locally made crafts, combining her retail experience with a personal entrepreneurial venture before fully retiring.
