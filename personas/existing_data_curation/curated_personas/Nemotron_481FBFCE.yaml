  career_goals: Having built a successful career as a chief executive, Amon aims to cement a lasting legacy by steering his company toward sustainable growth and positioning it as a benchmark for responsible
    leadership in the Southeast. Over the next five years, he plans to execute a strategic diversification into renewable energy and digital services while establishing a formal mentorship program for emerging
    Black leaders. He also aspires to transition to a board‑level role, championing corporate governance reforms that enhance transparency and inclusion. Additionally, he intends to launch a family foundation
    focused on improving STEM education for under‑served youth in Wake County.
