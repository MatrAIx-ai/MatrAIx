  hobbies: '["Urban Gardening","Southern & Caribbean Cooking","Yoga","Evening Walks","Volunteer STEM Outreach","Church Participation","Cultural Festival Attendance","Reading Non‑Fiction (Business & Technology)"]'
  career_goals: Louise aims to transition from first‑line supervisor to store manager within the next two years, leveraging her analytical background to boost store profitability and employee engagement.
    Long‑term, she envisions advancing to a district manager role where she can implement region‑wide operational best practices and champion diversity and inclusion initiatives. She also plans to pursue
    an MBA focused on retail analytics, mentor emerging Black professionals in the industry, and eventually consult for small retailers seeking data‑driven growth strategies.
