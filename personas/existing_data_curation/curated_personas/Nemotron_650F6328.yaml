  hobbies: '["Mystery audiobooks", "Gardening", "Cooking and recipe experimentation", "Solo nature walks", "Country and gospel music listening", "Church potluck participation", "Small‑group game nights",
    "Genealogy research", "Local history exploration", "DIY home‑improvement projects"]'
  career_goals: Mindy aims to move into a front‑of‑house supervisory role within the next two years, eventually becoming a restaurant manager. She plans to obtain a food‑service certification and attend
    evening classes in hospitality management at a community college near Carroll County. Her longer‑term ambition is to open a small café that highlights locally sourced Southern dishes and provides a
    welcoming space for her community. While pursuing these goals, she seeks to secure a steady income that supports her marriage and allows time for the occasional family expansion, all while keeping enough
    flexibility for her church and volunteer commitments.
