personas:
  professional: Yogi Mitchell, a seasoned landscaping and grounds‑keeping professional, merges meticulous project management, deep expertise in Southern horticulture, and an artist’s eye for color and spatial
    composition to create sustainable garden designs that serve both private clients and community spaces.
  sports: Yogi Mitchell follows the Atlanta Falcons in the fall, cheers the Atlanta Braves during spring baseball, roots for the Alabama Crimson Tide on college Saturdays, plays on an adult weekend softball
    team at the Anniston Community Center, and is an active member of the Calhoun County Lake‑Fishing Club that meets each summer.
  arts: Yogi Mitchell relaxes with a harmonica while listening to Muddy Waters, John Coltrane, and Mahalia Jackson, regularly visits the Alabama Jazz Hall of Fame and local galleries showcasing folk art
    such as the pieces of Sarah Harris, and draws inspiration from these musical and visual traditions for the sculptural elements they integrate into garden designs.
  travel: Yogi Mitchell prefers road‑trip photography adventures, having captured sunrise over the Great Smoky Mountains, explored the historic streets of Savannah, Georgia, and kayaked the coastal marshes
    of the Gulf Coast, while dreaming of a leisurely drive along the Blue Ridge Parkway’s blooming valleys in spring.
  culinary: Yogi Mitchell delights in turning garden‑grown tomatoes into fresh pasta sauce, frying green tomatoes seasoned with cayenne for a crunchy snack, simmering collard greens with smoked turkey necks
    for comfort, and occasionally stirring a hearty gumbo with okra, all flavored with basil, thyme, and a pinch of hot sauce.
  core: Yogi Mitchell is a methodical yet creatively curious landscape designer who blends art, community service, and disciplined financial planning while occasionally indulging in midnight harmonica jams
    and a penchant for perfecting soil moisture checks.
background:
  cultural: Yogi grew up in Anniston's close‑knit African‑American community, where church, family, and neighborhood gatherings shaped his values of cooperation, respect, and perseverance. The legacy of
    the Civil Rights movement in Calhoun County instilled a strong sense of civic duty, prompting his regular volunteer work at local community gardens and youth mentorship programs. His cultural heritage
    is reflected in his love of blues and gospel music, storytelling traditions, and Southern cooking that celebrates fresh, home‑grown ingredients. Yogi draws inspiration from Black folk art and the regional
    history of African‑American resilience, integrating those themes into his landscape designs and community projects. This blend of Southern Black culture, artistic appreciation, and a work ethic forged
    through generations informs both his professional approach and personal life.
