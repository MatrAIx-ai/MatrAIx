    leadership'', ''community garden coordination'']'
  hobbies: '[''home gardening'', ''nature photography'', ''listening to blues and jazz music'', ''playing harmonica'', ''reading horticulture and African‑American history books'', ''volunteering at community
    garden'', ''attending local art exhibitions'', ''DIY woodworking for garden structures'', ''fishing'', ''walking in state parks'', ''cooking Southern cuisine with garden produce'']'
  career_goals: Yogi aims to earn a Certified Landscape Technician credential within the next two years and leverage that qualification to launch his own small, eco‑focused landscaping business that serves
    both residential and community clients in Calhoun County. He envisions expanding his services to include public‑space art installations that blend African‑American cultural motifs with native plantings.
    Mentorship is a priority; he plans to offer apprenticeships and teach occasional workshops at the local community college, sharing his knowledge of sustainable practices and design aesthetics. Over
    the next decade, Yogi hopes to transition gradually into a consulting role, guiding larger municipal projects while securing a stable retirement plan for his family.
