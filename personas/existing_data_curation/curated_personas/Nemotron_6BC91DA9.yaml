  hobbies: '["Hiking in Iowa state parks","Local trivia nights","DIY home‑decor projects","Travel photography and blogging","Improvisational theater workshops","Yoga and fitness classes","Wine tasting at
    nearby vineyards","Board game evenings with friends","Volunteer work at community festivals","Cooking international recipes"]'
  career_goals: Donna aims to become a senior travel consultant specializing in eco‑adventure and niche cultural tours, leveraging her love of discovery and practicality. She plans to earn the Certified
    Travel Counselor (CTC) credential, increase her regional sales volume by 30% within three years, and eventually launch her own boutique agency that offers flexible, client‑centric packages. Her competitive
    drive fuels a desire to be recognized as a top performer in the Midwest travel market, while her relaxed, flexible approach keeps her focused on sustainable growth rather than rigid timelines.
