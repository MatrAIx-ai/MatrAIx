  hobbies: '[''Sketching'', ''Street mural painting'', ''Basketball'', ''Woodworking'', ''Reading architecture magazines'', ''Fishing'', ''Community volunteering'', ''Listening to jazz and gospel music'',
    ''Attending art exhibitions'']'
  career_goals: He wants to move beyond entry‑level labor and earn a journeyman carpenter certification within the next three years. Ashton plans to enroll in a community‑college trade program that offers
    OSHA 30‑hour training and coursework in construction management. His long‑term ambition is to become a foreperson and eventually launch his own small contracting business that emphasizes sustainable
    building practices and incorporates artistic elements like murals and custom woodworking. He also hopes to mentor younger workers from his neighborhood, showing that a high school diploma is not the
    only pathway to a stable, respected career.
