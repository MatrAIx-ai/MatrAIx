personas:
  professional: A methodical, art‑infused carpenter, Ashton Lake leverages precise framing, blueprint reading, and OSHA‑compliant safety habits to deliver high‑quality builds while sketching design concepts
    on site, balancing reliability with a creative curiosity that fuels plans for a future sustainable contracting firm.
  sports: A basketball‑enthusiast who spends evenings at the Midway neighborhood court playing pick‑up games, Ashton Lake also follows the Savannah Bananas with hometown pride and roots for the Atlanta
    Hawks, while supplementing cardio with weekend fishing trips that double as low‑impact cross‑training.
  arts: A sketch‑loving visual creator, Ashton Lake draws inspiration from the rhythmic improvisations of Kamasi Washington, the soulful chants of Mahalia Jackson, and the modern beats of H.E.R., while
    touring SCAD pop‑up exhibitions to study the bold street murals of Banksy and the architectural photography of Andreas Gursky, often incorporating these influences into their own community mural projects.
  travel: An organized yet spontaneous explorer, Ashton Lake maps out weekend road trips to nearby Asheville, NC, and the historic streets of Savannah for art research, while saving for a spring backpacking
    adventure to Lisbon, Portugal to study European mural scenes, balancing budget constraints with a desire for cultural immersion.
  culinary: A home‑cooking enthusiast, Ashton Lake loves a well‑seasoned grilled catfish brushed with lemon and Cajun spice, paired with smoky collard greens and buttery cornbread, and often follows YouTube
    tutorials to master simple Southern dishes like shrimp and grits, while occasionally treating themselves to a gourmet jazz‑house brunch at a downtown eatery.
  core: A 22‑year‑old carpenter with a sketchbook tucked under his arm, Ashton Lake balances a relentless drive for sustainable construction with a habit of staying up late binge‑watching mural documentaries,
    sometimes forgetting to lock their toolbox.
background:
  cultural: Ashton is an African‑American raised in Midway, a small town in Liberty County that has deep roots in Southern Black culture. His family’s traditions blend church‑centered community life, gospel
    music, and Southern cuisine, and they have passed down stories of resilience from the Civil Rights era in Georgia. The local Gullah coastal heritage and the region’s historic African‑American neighborhoods
    influence his appreciation for storytelling and collective gatherings. He celebrates Juneteenth with potluck barbecues, participates in church youth mentorship programs, and respects the legacy of Black
    construction workers who helped build the area’s homes and schools. This cultural background informs his work ethic, his pride in contributing to the built environment, and his interest in integrating
    art that reflects the community’s identity.
