  career_goals: He hopes to pursue a career in software engineering, focusing on educational technology tools that empower younger learners. In the longer term, he is intrigued by biomedical engineering
    and the possibility of developing accessible health devices. He aims to attend a top high school, earn a scholarship to a leading university, and eventually combine his technical skills with his desire
    to give back to his community, perhaps through mentoring programs for immigrant youth.
