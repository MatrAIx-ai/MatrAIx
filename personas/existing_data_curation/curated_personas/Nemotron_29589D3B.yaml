personas:
  professional: An aspiring young technologist, Phong Truong, blends a love for science‑fiction narratives with methodical coding to create simple Python games and reliably contributes to the school robotics
    club, always documenting each build in a tidy notebook.
  sports: Phong Truong is a disciplined member of the Riverdale Rangers junior soccer team, practices badminton twice a week, plays table tennis in the school club, and avidly follows FC Barcelona, channeling
    the professional team’s tactical precision into personal fitness routines.
  arts: Phong Truong nurtures creative expression by playing piano pieces by Yiruma and Ludovico Einaudi on quiet evenings, practicing calligraphy with ink‑filled brushes, devouring sci‑fi novels, and citing
    Hayao Miyazaki’s ‘Spirited Away’ as an artistic inspiration that informs their imagination.
  travel: Phong Truong prefers meticulously planned weekend getaways to nearby lake parks, keeps a checklist for hiking gear, dreams of exploring Kyoto’s historic temples and the Grand Canyon’s rim, and
    recently visited the coastal town of Santa Cruz with a family road trip.
  culinary: Phong Truong enjoys helping family prepare aromatic rice‑noodle soups, herb‑wrapped rice paper rolls, and caramelized mango pudding, boasting an intermediate skill level that mixes fresh basil,
    lime zest, and ginger to balance sweet‑sour flavors in each dish.
  core: Phong Truong is a methodical, curiosity‑driven teen who balances solitary LEGO engineering with quiet piano reverie, disciplined budgeting, and a subtle love for team sports and world travel.
background:
  cultural: Phong comes from a Vietnamese-American family that maintains strong ties to Southeast Asian cultural traditions while fully engaging with the diverse fabric of Brooklyn. At home, Vietnamese
    is spoken alongside English, and the family observes holidays such as Tết, with traditional foods, music, and familial gatherings. The neighborhood’s multicultural environment has exposed him to a variety
    of cuisines, languages, and community events, fostering an appreciation for both his heritage and the broader American society. This dual cultural immersion influences his values of respect, harmony,
    and community service.
