  hobbies: '["Art Gallery Visits", "Live Jazz Listening", "Reading Science History", "Sketching", "Digital Photography", "Herb Gardening", "Volunteer STEM Tutoring", "Robotics Workshops", "Cultural Block
    Parties"]'
  career_goals: Although officially retired, Moses aims to leave a lasting impact by mentoring underrepresented youth in STEM through volunteer tutoring and community workshops. He aspires to curate a hybrid
    art‑science exhibit that showcases local artists alongside scientific concepts, reflecting his love of unconventional thinking. Additionally, he hopes to author a memoir that intertwines his personal
    journey with reflections on technological change, and to serve on advisory panels for senior‑focused environmental and cultural initiatives in Miami.
