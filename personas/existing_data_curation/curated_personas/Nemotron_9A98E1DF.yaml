personas:
  professional: Moses Milian, a retired technical consultant turned community STEM mentor, leverages their applied mathematics and engineering expertise to design simple prototypes for after‑school workshops,
    while their curious, laid‑back nature leads them to favor improvisational problem‑solving over rigid project plans.
  sports: Moses Milian, a casual fitness enthusiast, participates in a weekly senior walking group under the South Florida Seniors Cycling Club, follows the Miami Heat and Miami Dolphins avidly, enjoys
    occasional beach volleyball in summer, and they prefer low‑impact activities due to knee osteoarthritis.
  arts: Moses Milian, a devoted patron of Miami’s art scene, regularly attends gallery openings featuring the vibrant canvases of contemporary artist Lorna Simpson, listens to live performances by jazz
    legends like Thelonious Monk and modern saxophonist Kamasi Washington, channels that inspiration into abstract sketches and experimental digital photography that echo the bold brushstrokes of Kandinsky,
    and they consider each exhibit a dialogue between science and art.
  travel: Moses Milian, an adventurous yet budget‑conscious traveler, prefers spontaneous road trips to nearby gems such as the Everglades and Key West, while dreaming of a leisurely cultural tour of Lisbon
    and Barcelona, and they often delay bookings until the last minute due to a relaxed planning habit.
  culinary: Moses Milian, an enthusiastic home cook with moderate culinary skill, delights in preparing herb‑infused grilled grouper ceviche with fresh basil and oregano, savors perfectly seasoned jerk
    chicken, and they often explore Miami’s hidden seafood eateries while occasionally overindulging in sugary pastries due to a sweet tooth.
  core: Moses Milian blends a lifelong curiosity for science with a love for the arts, navigating life with relaxed flexibility, occasional disorganization, and an endearing habit of hoarding vintage camera
    lenses while they often forget where they placed them.
background:
  cultural: Moses is an African American with deep roots in the Black diaspora of the Southern United States, now shaped by the multicultural tapestry of Miami-Dade County. He identifies with the legacy
    of the Civil Rights movement and the ongoing Black cultural renaissance in South Florida, which informs his appreciation for art, community service, and intergenerational mentorship. The city's blend
    of Caribbean rhythms, Latin influences, and Southern traditions enriches his worldview and daily experiences.
attributes:
