persona_description: A member of an electric cooperative who is passionate about environmental protection and advocating for policies that balance consumer interest and environmental protection. They are
  knowledgeable about the use of cost-effective environmental technologies at power plants and support sensible multi-emission legislation that can reduce power plant emissions more quickly and economically
  than continued regulation under current law. They are also supportive of additional clean water requirements and believe in the use of flexibility in the use of different types of mitigation, the use
  of preservation alone, and the use of vegetated buffers for stream or wetlands impacts.
