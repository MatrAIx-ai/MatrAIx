personas:
  professional: Carolie Higdon, a senior environmental data scientist at a regional laboratory, blends mastery of spectrophotometers, chromatographs, and environmental sensors with pragmatic statistical
    modeling in R and Python, leading field sampling protocols for water, soil, and air quality while mentoring junior staff and shaping the lab’s research agenda toward integrated public‑health monitoring.
  sports: Carolie Higdon, an avid hiker of the Blue Ridge foothills, regularly joins the Blue Ridge Hiking Club for weekend treks and participates in the local community running group’s 5K races, supports
    the Carolina Panthers (NFL) and Charlotte Hornets (NBA), enjoys seasonal cross‑country skiing in nearby resorts, and balances a love of outdoor fitness with a competitive streak in weekly chess tournaments.
  arts: Carolie Higdon, a passionate nature photographer, captures bird species using a DSLR with a telephoto lens, draws artistic inspiration from Ansel Adams and Georgia O’Keeffe, attends local gallery
    openings featuring regional artists, listens to Chris Stapleton and Dolly Parton while cooking, solves chess puzzles at the town chess club, and occasionally showcases their prints at community fairs.
  travel: Carolie Higdon, a meticulous planner with a love for bird‑watching adventures, spends weekends exploring Shenandoah National Park and the Great Smoky Mountains, has trekked the cloud forests of
    Costa Rica, dreams of visiting the Galápagos Islands for endemic species, crafts detailed itineraries using GIS mapping, and balances travel aspirations with family commitments and a modest travel budget.
  culinary: Carolie Higdon, an inventive home cook of Southern comfort dishes, perfects fried chicken with smoked paprika, whips up collard greens spiked with chipotle, brews heirloom tomato soup using
    garden‑grown varieties, experiments with exotic spices like sumac and harissa, enjoys making peach cobbler with fresh peaches, and often hosts dinner gatherings to share their culinary creations.
  core: Carolie Higdon, a data‑driven environmental scientist who hikes, photographs birds, spices up Southern cooking, and competes fiercely in chess, balances meticulous lab work with a skeptical yet
    practical outlook, while occasionally neglecting health routines for research and garden experiments.
background:
  cultural: Born and raised in the upstate region of South Carolina, Carolie grew up in a close‑knit, multigenerational family that prized hard work, self‑reliance, and community responsibility. Her upbringing
    was shaped by Southern hospitality, frequent church gatherings, and participation in local festivals such as the Gaffney Peach Festival. While she identifies as a white American, she is deeply aware
    of the region’s cultural history and strives to honor its traditions—like sharing home‑cooked meals and supporting neighborhood initiatives—while also embracing a practical, forward‑looking mindset
    that reflects the evolving identity of the modern South.
