  career_goals: Carolie aims to advance to a senior supervisory role where she can shape the lab’s research agenda, integrate emerging sensor technologies, and lead interdisciplinary projects that bridge
    environmental science with public health. She plans to obtain a master’s degree in environmental data science to deepen her analytical expertise, publish findings in peer‑reviewed journals, and secure
    funding for community‑focused monitoring programs. Long‑term, she envisions becoming a recognized subject‑matter expert who mentors the next generation of scientists while balancing her family commitments.
