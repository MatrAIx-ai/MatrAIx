personas:
  professional: Felicita Baez, a seasoned data science educator and applied mathematician at a community college, leverages their curiosity and practical mindset to design inclusive STEM curricula, turning
    complex algorithms into hands‑on garden‑themed projects while juggling grant proposals with a flexible, occasionally disorganized schedule.
  sports: Felicita Baez, an avid weekend hiker on the Natchez Trace and member of the Natchez Trail Runners club, roots for the Memphis Grizzlies during the NBA season, cheers on the New Orleans Saints
    in the fall, and follows the Mississippi State Bulldogs football team, using these seasonal sports as both social outings and low‑impact cardio.
  arts: Felicita Baez, a devoted quilting enthusiast in the Mississippi Quilters Guild, spends her evenings immersed in 19th‑century Mexican historical novels such as The Pearl of Veracruz by Aurora Castillo,
    draws inspiration from Frida Kahlo’s bold self‑portraits, and regularly attends live performances of mariachi groups like Mariachi Vargas de Tecalitlán, letting these artistic currents color both her
    textile patterns and classroom presentations.
  travel: Felicita Baez, who plans trips with a loose itinerary that balances cultural immersion and relaxation, regularly journeys to Veracruz to partake in Dia de los Muertos festivals with family, dreams
    of exploring the historic streets of Oaxaca, enjoys weekend getaways to the Blue Ridge Parkway in North Carolina, and occasionally joins a senior travel group to the Great Smoky Mountains, all while
    managing a modest travel budget that prioritizes family visits over luxury.
  culinary: Felicita Baez, an accomplished home chef who treats her kitchen like a laboratory, expertly prepares mole poblano, hand‑shaped tamales, and chiles en nogada, layering flavors from dried ancho
    chilies, pasilla, Mexican chocolate, and fresh epazote, while her love for seasonal salsas leads her to experiment with fire‑roasted tomatillos and ripe tomatoes, even though occasional over‑spicing
    and a tendency to let sauces simmer unchecked reveal a playful, sometimes chaotic, culinary temperament.
  core: Felicita Baez, a curiosity‑driven yet delightfully disorganized scholar‑chef, fuses data science rigor with Mexican culinary heritage, tackling challenges with competitive flair while juggling garden,
    quilts, and grant proposals.
background:
  cultural: Born to Mexican immigrant parents in Texas, Felicita grew up bilingual, speaking Spanish at home and English at school. Her upbringing immersed her in traditions such as Día de los Muertos,
    quinceañeras, and weekly family meals anchored by homemade tortillas. She maintains strong ties to the Mexican community, incorporates Latinx perspectives into her teaching, and is dedicated to supporting
    first‑generation college students, reflecting her heritage's emphasis on family, resilience, and cultural pride.
attributes:
  skills: '[''Applied Mathematics'', ''Data Analysis'', ''Curriculum Development'', ''Instructional Design'', ''Grant Writing'', ''Mentoring & Advising'', ''Educational Technology Integration'', ''Interdisciplinary
