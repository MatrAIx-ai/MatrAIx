  hobbies: '[''Mexican cooking'', ''Gardening'', ''Historical fiction reading'', ''Quilting'', ''Hiking'', ''Volunteer tutoring'', ''Travel to Mexico'']'
  career_goals: She aspires to become department chair within the next five years, launch a statewide mentorship program for underrepresented students in STEM, author a widely adopted textbook on applied
    problem‑solving, and secure a major NSF grant to build a community‑based research lab that integrates local industry projects with student learning.
