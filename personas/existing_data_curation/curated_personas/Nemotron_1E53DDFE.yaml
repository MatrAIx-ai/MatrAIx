personas:
  professional: A seasoned janitorial specialist with three decades of expertise, Catherine Lopez leverages mastery of carpet extraction, floor stripping, and OSHA‑compliant chemical safety to orchestrate
    flawless cleaning schedules, while their organized, methodical nature translates into meticulous mentorship of younger staff as they pursue a lead supervisor role.
  sports: On the trail and in the stands, Catherine Lopez enjoys weekend hikes with the Blue Ridge Trailblazers club, follows the Knoxville Smokies minor‑league baseball team and the University of Tennessee
    Volunteers football squad, and practices gentle bird‑watching walks as a low‑impact fitness routine that they complement with light strength training in the community center.
  arts: Embracing artistic pursuits, Catherine Lopez sings in the church choir, knits intricate Appalachian‑inspired quilts, and finds inspiration in the music of The Avett Brothers, Alison Krauss, and
    the legacy of Doc Watson, while they often read folklore collections by John C. Hurst and attend local gallery showings featuring folk painter Bill Miller.
  travel: Traveling for both relaxation and curiosity, Catherine Lopez prefers scenic road trips along the Blue Ridge Parkway, revisits Shenandoah National Park and Asheville’s Biltmore Estate each fall,
    and dreams of a cultural pilgrimage to the Scottish Highlands to explore the origins of mountain folklore that they love to share at the town library.
  culinary: In the kitchen, Catherine Lopez expertly prepares traditional mountain fare such as pepperoni rolls, slow‑cooked apple butter, and herb‑infused cornbread using fresh basil, thyme, and rosemary
    from their garden, while they occasionally experiment with a dash of smoked paprika for a modern twist, though they never skip a tasting session that can stretch meals by a half‑hour.
  core: Catherine Lopez merges a pragmatic janitorial mastery with a love for mountain quilting, yet their compulsive checklist habit means they sometimes spend an extra hour re‑sweeping a spotless floor,
    balancing curiosity and practicality in every facet of life.
background:
  cultural: Catherine was born and raised in a close‑knit Appalachian community in Wyoming County, West Virginia. Her family has deep roots in the region, with generations who worked in coal mining and
    agriculture, instilling values of self‑reliance, hard work, and mutual aid. The cultural fabric of her upbringing includes a strong emphasis on family ties, church involvement, and participation in
    local festivals that celebrate Appalachian music, crafts, and cuisine. While she embraces the simplicity and practicality of rural life, her curiosity has led her to appreciate broader perspectives,
    blending traditional customs with modern approaches. This background shapes her pragmatic yet open‑minded outlook, her commitment to community service, and her respect for the natural environment surrounding
    Kopperston.
