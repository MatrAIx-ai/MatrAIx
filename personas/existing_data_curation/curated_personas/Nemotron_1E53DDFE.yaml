  hobbies: '["Gardening","Quilting","Church choir singing","Reading Appalachian folklore","Volunteer storytime reading","Hiking","Cooking regional dishes","Birdwatching","DIY home improvement"]'
  career_goals: Catherine aims to transition into a lead janitorial supervisor role at her current facility, where she can formalize her mentorship of younger staff and oversee broader maintenance operations.
    She plans to obtain the Certified Professional Cleaner (CPC) credential to enhance her expertise and credibility. Looking ahead, she envisions starting a small, part‑time residential cleaning service
    that caters to seniors in her community, allowing her to leverage her skills while providing reliable assistance to neighbors. She also hopes to contribute to local vocational programs by offering workshops
    on safe cleaning practices and basic building upkeep, thereby giving back to the community before she eventually moves into a phased retirement that balances work with her personal interests.
