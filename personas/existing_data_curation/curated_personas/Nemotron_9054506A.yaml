  hobbies: '[''reading mystery novels'', ''participating in church choir'', ''community gardening'', ''quilting and crocheting'', ''attending African-American cultural events'', ''cooking soul-food'', ''walking
    the Schuylkill River Trail'', ''volunteering at local food pantry'']'
  career_goals: Natasha aims to transition from staff cleaner to a supervisory or managerial role within a reputable cleaning firm, where she can train new staff and implement standardized processes. She
    plans to obtain the Certified Professional Cleaner (CPC) credential and complete an associate degree in business administration at a local community college to prepare for eventual entrepreneurship.
    Her long-term ambition is to launch her own small cleaning business focused on senior-citizen residences in Philadelphia, offering affordable and environmentally friendly services, while securing a
    stable retirement fund.
