persona_description: A social scientist who is passionate about the effects of electronic payments on the economy and society, particularly in developing countries. This person is knowledgeable about the
  technologies powering electronic payments and has a deep understanding of the challenges faced by the poor in accessing financial services. They are interested in innovative solutions that can help bridge
  the gap between the financial network and the poor, and are dedicated to the idea that electronic payments can play a transformative role in breaking down barriers to economic opportunity and inclusion.
  This person is likely to be involved in research and policy discussions about the role of electronic payments in promoting economic growth and social equity.
