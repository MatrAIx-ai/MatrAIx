  career_goals: Guillermo aims to step into a senior supervisory role within a major airline's maintenance division, where he can leverage his deep technical knowledge to drive safety and efficiency improvements.
    Over the next five years, he plans to obtain additional FAA certifications, lead a predictive‑maintenance program, and expand his mentorship of new mechanics. Ultimately, he envisions launching his
    own boutique MRO consultancy focused on compliance audits and specialized training for regional carriers, providing a structured environment that aligns with his preference for predictability and his
    competitive drive for excellence.
