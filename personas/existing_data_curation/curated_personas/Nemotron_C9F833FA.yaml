  hobbies: '[''Line dancing'', ''Country music concerts'', ''Cooking Southern comfort food'', ''Baking pecan pie'', ''Gardening herbs and flowers'', ''Volunteer hair styling at charity events'', ''Weekly
    book club (self-help focus)'', ''Yoga for stress relief'', ''Attending local fairs and rodeos'', ''Participating in church community activities'']'
  career_goals: Jillian aims to transition from a successful independent stylist to a salon owner who offers a welcoming, routine‑driven environment rooted in Southern hospitality. Over the next five years
    she plans to open a boutique salon in Brownwood that combines classic styling services with a curated line of hair‑care products she develops herself. She also seeks master‑stylist certification and
    intends to leverage her education degree by creating a community‑college‑level cosmetology training program, mentoring the next generation of stylists. Ultimately, Jillian hopes to become a recognized
    authority in practical, timeless hair design while maintaining a stable, stress‑manageable work life.
