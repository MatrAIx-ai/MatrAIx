  hobbies: '["Gardening (vegetable)","Reading (historical biographies, finance nonfiction, classic literature)","Crossword and Sudoku puzzles","Knitting","Birdwatching","Bridge (card game)","Volunteering
    – financial literacy workshops","Genealogical research"]'
  career_goals: Shannon’s primary career ambition is to cement her legacy of precision and efficiency within her organization before transitioning to a semi‑retired, advisory role. She aims to lead a small
    finance team, implement an automated reporting system that reduces manual errors by 50 %, and earn a professional certification such as the Certified Financial Services Auditor (CFSA) to deepen her
    expertise. Parallel to these goals, she wishes to mentor junior staff, share best practices, and volunteer her financial knowledge to local non‑profits, thereby maintaining a sense of purpose while
    ensuring a stable, comfortable retirement.
