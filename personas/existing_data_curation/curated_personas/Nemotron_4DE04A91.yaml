personas:
  professional: Shannon Dupont, a veteran financial administrator with three decades of accounts payable/payable expertise, is celebrated for building airtight internal controls, mastering advanced Excel
    macros, and leading a small finance team toward a 50% reduction in manual reporting errors while mentoring junior staff, all while balancing a competitive drive with a meticulous, disciplined work ethic,
    and they consistently seek to refine processes through data‑driven analysis.
  sports: Shannon Dupont enjoys low‑impact fitness through morning walks with a birdwatching binocular set, participates in a local walking club that meets at the public park, holds season tickets for the
    Detroit Tigers baseball team, and they occasionally join a senior‑friendly pickleball league, all while preferring solitary exercise over high‑intensity group sports.
  arts: Shannon Dupont indulges in classic literature by rereading Jane Austen and Leo Tolstoy, follows the works of impressionist painter Claude Monet, attends the occasional performance by the Boston
    Symphony Orchestra, and they find meditative pleasure knitting scarves while listening to the smooth crooning of Frank Sinatra, all of which nourish their reserved yet curious soul.
  travel: Shannon Dupont plans trips with spreadsheet precision, favoring leisurely cultural tours such as a guided walk through the historic streets of Quebec City, a week‑long garden pilgrimage to the
    Keukenhof tulip fields in the Netherlands, and a relaxed road‑trip along California’s Pacific Coast Highway, always budgeting carefully to avoid financial surprise, and they relish the mix of adventure
    and comfort these journeys provide.
  culinary: Shannon Dupont loves cooking garden harvests into simple yet flavorful dishes like roasted beet and goat‑cheese salad, herb‑infused ratatouille, and fresh herb pesto pasta, prefers low‑sodium
    seasoning to manage hypertension, and they occasionally treat themselves to a buttery slice of almond croissant at a local café for a modest indulgence.
  core: Shannon Dupont is a detail‑obsessed, garden‑tending spreadsheet strategist who balances a competitive work drive with a quietly worried heart, and they often find solace in spreadsheets after a
    long day.
background:
  cultural: Shannon was raised in the Midwestern small‑town culture of Indiana, where community ties, modesty, and a strong work ethic are deeply valued. Her family’s French‑Canadian roots, reflected in
    the Dupont surname, add a layer of cultural heritage that she honors through occasional family traditions and genealogical research. She actively participates in her local Methodist congregation, celebrates
    regional holidays such as Thanksgiving and Independence Day with extended family, and embraces the practical, neighbor‑helping spirit characteristic of the Harrison County community.
attributes:
  skills: '["Accounts Payable & Receivable","Financial Reporting","Budgeting & Forecasting","Advanced Excel (pivot tables, macros)","QuickBooks & Sage 50","Internal Controls & Audit Preparation","Regulatory
