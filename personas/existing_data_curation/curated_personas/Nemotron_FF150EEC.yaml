  career_goals: Denise often talks about wanting to become a teacher because she enjoys helping friends learn and keeping the classroom organized with clear schedules. She also expresses a love for animals
    and says she might be a veterinarian one day. Her current ambition is to read longer picture books on her own, which she sees as a stepping stone toward a future where she can guide and care for others.
