    and inclusive event design'']'
  hobbies: '[''Reading historical nonfiction and classic literature'', ''Community theater volunteering'', ''Yoga and meditation'', ''Gardening'', ''Hiking in local nature reserves'', ''Visiting art museums
    and exhibitions'', ''Organizing volunteer donation drives'', ''Photography of events and nature'']'
  career_goals: Patrick aims to transition into a senior leadership role within a large conference organization, eventually becoming Director of Events where he can shape the strategic direction of large‑scale
    professional gatherings. He plans to obtain the Certified Meeting Professional (CMP) credential and to lead initiatives that integrate mental‑well‑being practices into event design, reducing stress
    for staff and attendees. In the longer term, Patrick envisions launching his own boutique event‑planning firm that specializes in community‑focused, socially responsible conferences, offering mentorship
    to emerging planners and promoting inclusive, accessible event experiences.
