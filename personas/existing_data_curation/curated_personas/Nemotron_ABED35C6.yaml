  hobbies: '[''Recreational Basketball'', ''Karaoke'', ''Board Games'', ''Live Music'', ''Hiking'', ''Raspberry Pi Projects'', ''Electronics Tinkering'', ''Cooking'', ''Community Volunteering (STEM tutoring)'']'
  career_goals: He aims to leverage his STEM background and frontline retail experience to move into a supervisory or operations role within the retail sector, such as shift supervisor and eventually store
    manager. In the longer term, he hopes to transition into a data‑analytics or operations‑planning position, possibly pursuing a certification in business analytics. He also entertains the idea of starting
    a small tech‑repair or e‑commerce venture that blends his technical skills with his love for direct customer interaction. His ambition is to achieve a balanced career that offers both structured responsibilities
    and the flexibility to engage with people.
