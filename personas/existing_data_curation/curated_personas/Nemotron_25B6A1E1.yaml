  career_goals: Joel imagines a future where he can blend his love for technology and his desire to help others. He aims to take advanced computer‑science courses in high school and eventually study software
    development or game design, with a particular interest in creating educational games that support bilingual learning. He also hopes to mentor younger students in community programs, especially those
    from Central American backgrounds, fostering a supportive environment where cultural heritage and modern skills intersect. Ultimately, he seeks a career that offers both structure and creative flexibility,
    allowing him to contribute meaningfully while staying connected to his roots.
