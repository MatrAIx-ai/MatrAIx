personas:
  professional: A budding game creator, Joel Gomez channels their love for structured problem‑solving into designing Scratch games with clear step‑by‑step logic, while still leaving room for spontaneous
    storytelling that reflects their playful imagination.
  sports: Joel Gomez kicks the ball for the neighborhood youth soccer team, idolizes the forward on the LA Galaxy, and spends weekends cheering on the Mexico national team during World Cup matches, while
    also dabbling in street basketball with friends.
  arts: Joel Gomez draws comic strips inspired by goofy superheroes, builds elaborate LEGO cities, and tunes into Bad Bunny, J Balvin, and Ariana Grande on repeat, letting the beats fuel their creative
    coding sessions.
  travel: Joel Gomez loves weekend road trips to the nearby state park for hiking and picnics, dreams of exploring the ancient ruins of Machu Picchu, and hopes to visit Disneyland next summer with friends.
  culinary: Joel Gomez proudly helps prepare pupusas with fresh masa, cheese, and spiced pork, rolls tamales with corn husks and hominy, and knows the perfect ratio for making a classic cheese pizza, though
    they often forget to preheat the oven.
  core: A structured yet easy‑going twelve‑year‑old, Joel Gomez balances meticulous game‑design logic with spontaneous LEGO builds, can’t resist a good soccer match, and occasionally misplaces homework
    in the rush of creativity.
background:
  cultural: Joel's family originates from a Central American country, bringing a rich blend of customs and values into his everyday life. At home, Spanish is spoken alongside English, allowing him to maintain
    a strong bilingual identity. Cultural celebrations, such as family gatherings for traditional holidays and sharing foods like pupusas and tamales, reinforce his connection to his heritage. While he
    lives in Winthrop, Massachusetts, and participates in local school and community activities, Joel balances this American environment with the warmth and communal emphasis of his Central American roots.
    His cultural background influences his appreciation for music, food, and a collaborative spirit, all of which shape his interactions and aspirations.
