    User 1: I''m so glad I met you! You''re the first person I''ve met who''s from Greece and loves to cook ethnic food.

    User 2: I''m glad I met you too! I love meeting new people and sharing my love of food.

    User 1: Well, I''m definitely going to have to try some of your Greek cooking sometime!

    User 2: I would love that! I''m always happy to cook for people.

    User 1: Great! I''ll bring the wine.

    User 2: Sounds like a plan!

    User 1: I''m so excited!

