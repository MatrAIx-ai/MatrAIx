personas:
  professional: Ramesh Khan, a mechanical engineer specializing in product design and prototyping, leverages their systematic problem‑solving, CAD expertise, and collaborative spirit to create sustainable
    renewable‑energy equipment while maintaining a flexible, low‑stress workflow that accommodates their preference for structure balanced with spontaneity.
  sports: Ramesh Khan, an avid hiker and weekend runner, trains with the local Cascades Outdoor Club, follows the Seattle Seahawks and Seattle Sounders for team spirit, and maintains fitness through trail
    runs, occasional cycling, and seasonal snowshoeing trips, preferring solo or small‑group workouts over organized gym classes.
  arts: Ramesh Khan cultivates a quiet artistic side by listening to classical Indian sitar virtuoso Ravi Shankar, streaming indie cinema like Wes Anderson’s 'Moonrise Kingdom', and collecting prints of
    surrealist painter Salvador Dalí, finding inspiration for engineering creativity in these nuanced cultural experiences.
  travel: Ramesh Khan prefers low‑key, self‑planned trips that blend nature and technology, having trekked the Annapurna Circuit in Nepal and visited the cherry blossoms of Kyoto, while dreaming of sustainable‑design
    tours in Iceland and New Zealand once their consultancy finances stabilize.
  culinary: Ramesh Khan enjoys cooking at home, mastering traditional Gujarati dhokla and spiced biryani with cumin and mustard seeds, while also experimenting with fusion dishes like quinoa‑topped tandoori
    salmon, and they relish occasional street‑food outings to sample ramen and falafel wraps.
  core: Ramesh Khan is a detail‑driven mechanical engineer who balances solo hiking and tinkering with a habit of over‑stacking unfinished Arduino projects on their desk, preferring calm routines but occasionally
    drifting into spontaneous late‑night coding sprints.
background:
  cultural: Ramesh is a second‑generation South Asian American of Gujarati Muslim descent. His parents immigrated from Gujarat, India, and raised him in the Seattle area, where he grew up bilingual in English
    and Gujarati. Family traditions such as celebrating Eid with communal meals and observing Diwali with lights and sweets reflect his multicultural upbringing. He maintains strong ties to the local Gujarati
    community, attending weekly mosque services, participating in cultural festivals, and volunteering at community outreach programs. His culinary heritage, language, and values of respect for elders and
    community harmony shape his identity, while also integrating the outdoors‑oriented lifestyle of the Pacific Northwest.
attributes:
  skills: '[''SolidWorks CAD'', ''AutoCAD drafting'', ''CNC machining'', ''3D printing prototyping'', ''Finite element analysis (FEA)'', ''MATLAB data analysis'', ''Python scripting'', ''Technical documentation'',
