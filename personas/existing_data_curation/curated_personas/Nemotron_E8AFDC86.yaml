  hobbies: '[''Hiking and nature photography'', ''Arduino and Raspberry Pi tinkering'', ''Science-fiction reading'', ''Chess (online)'', ''Cooking Gujarati cuisine'', ''Attending community gatherings'',
    ''Listening to classical Indian music'', ''Watching indie films'']'
  career_goals: Ramesh aims to progress from his current mechanical engineering role into a senior design engineer position within the next three to five years. He plans to earn his Professional Engineer
    (PE) license and deepen his expertise in sustainable product design, particularly in renewable energy equipment and low‑emission manufacturing. He is interested in leading cross‑functional project teams
    where he can apply his systematic approach while fostering a collaborative, low‑stress work environment. Long‑term, he envisions establishing a small engineering consultancy that offers flexible, client‑focused
    solutions, allowing him to balance professional growth with personal well‑being and maintain a harmonious work‑life balance.
