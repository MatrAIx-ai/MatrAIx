personas:
  professional: Thomas Mcrory is a retired community organizer who leverages meticulous planning, public‑speaking flair, and hands‑on gardening and woodworking expertise to lead volunteer projects, mentor
    younger members, and preserve Spencer’s local history, and they bring a calm, considerate demeanor to every meeting.
  sports: Thomas Mcrory follows the Green Bay Packers in the fall, cheers the Milwaukee Brewers during summer series, and enjoys a weekly round of bridge at the senior center, while staying active by fishing
    with the Spencer Senior Anglers Club, tending their garden, and taking brisk walks along the county park trail.
  arts: Thomas Mcrory stars in the Spencer Community Theater’s productions, often channeling the storytelling spirit of historical pioneers, while they unwind listening to Bob Dylan and Willie Nelson records,
    and they regularly attend the regional symphony’s Saturday matinee featuring works by Aaron Copland.
  travel: Thomas Mcrory plans weekend road trips that weave together visits to Midwest heritage sites such as Mackinac Island, the historic downtown of Cedar Rapids, and the battlefields of Gettysburg,
    while they also dream of exploring Badlands National Park and Yellowstone, balancing their modest retirement income and occasional joint travel with grandchildren.
  culinary: Thomas Mcrory delights neighbors with weekend barbecues featuring smoked brisket seasoned with hickory wood chips and smoked paprika, pork ribs glazed with apple cider vinegar, fresh corn on
    the cob harvested from their garden, and homemade coleslaw, and although they occasionally over‑salt the sauce in their enthusiasm, they pride themselves on mastering the art of low‑and‑slow cooking.
  core: Thomas Mcrory is a gregarious, detail‑obsessed retiree who channels curiosity and practicality into community theater, gardening, and neighborhood barbecues, all while maintaining a disciplined
    budget, vigilant health habits, and a habit of talking to their garden plants late at night.
background:
  cultural: Thomas was raised in a traditional Midwestern white family with deep German-Scandinavian roots. Growing up in Spencer, WI, he internalized the region's values of hard work, self-reliance, and
    community stewardship. Church involvement, family gatherings, and local festivals reinforced a strong sense of belonging and a cooperative spirit. His cultural identity blends practical, down-to-earth
    sensibilities with a genuine curiosity about heritage, which he expresses through volunteerism, storytelling, and preserving local history.
