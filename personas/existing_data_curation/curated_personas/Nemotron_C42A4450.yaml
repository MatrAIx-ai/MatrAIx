personas:
  professional: Jian Do is a front‑line technical support representative for a Seattle‑area SaaS company, leveraging bilingual fluency, CRM mastery in Zendesk and Salesforce, and a curiosity‑driven knack
    for testing AI‑assisted chatbots while crafting streamlined scripts and self‑service guides despite a habit of letting their workspace become slightly cluttered.
  sports: Jian Do enjoys weekend hikes with the Cascades Trail Club, roots for the Seattle Kraken and occasional pick‑up basketball at a local community center, while balancing a sporadic jogging routine
    that often gets sidelined by gaming releases.
  arts: Jian Do immerses in science‑fiction graphic novels by artists like Mike Mignola, frequents karaoke nights belting out songs by Queen and Tame Impala, and practices traditional calligraphy for quiet
    reflection, all while appreciating the atmospheric soundtracks of RPGs such as Final Fantasy XIV.
  travel: Jian Do prefers flexible micro‑adventures, having recently captured sunrise photos in Banff, explored the night markets of Taipei, and planning a future trip to Iceland’s geysers, always using
    tech tools to snag last‑minute deals but keeping a modest budget to accommodate upcoming certification fees.
  culinary: Jian Do cooks simple comfort dishes like soy‑sauce fried rice, spicy dumpling soup, and wok‑stirred noodles, confidently handling pantry staples such as ginger, garlic, and Sichuan pepper, yet
    often forgets to clean the kitchen thoroughly before diving into the next video game session.
  core: Jian Do is a curiosity‑driven tech support specialist who balances intense gaming marathons with spontaneous hikes, worries about stress, and occasionally lets clutter and late‑night snacks dominate
    their otherwise methodical routine.
background:
  cultural: Jian is a second‑generation Chinese‑American. His parents immigrated from mainland China and raised him in a bilingual household, preserving Mandarin language, traditional holidays like Lunar
    New Year, and values such as respect for elders and collective harmony. Growing up in the Bellevue area, he was exposed to a vibrant Asian community and multicultural influences, blending Chinese cultural
    practices with typical American social norms. This background informs his courteous communication style, his comfort in multilingual settings, and his appreciation for both innovative ideas and time‑tested
    methods. While he respects his family's emphasis on diligence, he also embraces the flexibility and openness of his American environment, shaping his balanced yet adaptive approach to work and life.
