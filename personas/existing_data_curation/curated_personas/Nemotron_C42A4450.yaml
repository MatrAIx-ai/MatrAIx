  career_goals: Jian aims to move from a front‑line representative to a supervisory or team‑lead role within the next three years, focusing on coaching new agents and analyzing performance data. He plans
    to enroll in a community‑college program for business administration and earn a certification in user‑experience support. Long‑term, he envisions a transition into product support or a customer‑experience
    strategy position at a technology company in the Seattle‑Bellevue corridor, where he can combine his curiosity about new tech with practical problem‑solving. Recognizing his sensitivity to stress, he
    also intends to develop resilience through mindfulness courses and stress‑management workshops, ensuring he can handle high‑pressure situations while maintaining a balanced work‑life rhythm.
