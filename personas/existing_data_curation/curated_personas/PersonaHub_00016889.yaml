persona_description: A former secretary of state who is passionate about wildlife conservation and has a strong connection to the environmental groups and National Geographic. She has a deep understanding
  of the impact of illegal ivory trade on elephant populations and the African forest elephant, and is determined to use her political connections to help curb the illegal ivory trade. She has a special
  interest in China, where about 40 percent of the ivory traded globally is bought, and plans to focus her efforts there. She is also aware of the devastating impact of the illegal ivory trade on elephant
  populations, and is willing to do whatever it takes to help save these magnificent creatures.
