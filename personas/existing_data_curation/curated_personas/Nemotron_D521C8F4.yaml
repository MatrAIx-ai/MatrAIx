  hobbies: '[''Birdwatching'', ''Gardening'', ''Reading historical fiction'', ''Knitting'', ''Quilting'', ''Crossword puzzles'', ''Small book club'', ''Nature walks in Itasca State Park'', ''Local history
    research'', ''Cooking comfort meals'']'
  career_goals: Hope aims to transition from front‑line representation to a senior training and mentorship role within her department, designing best‑practice guides and coaching newer staff. She plans
    to earn a Certified Customer Experience Professional (CCXP) credential within the next year to formalize her expertise. After securing a more flexible schedule, she hopes to offer part‑time consulting
    for small local businesses seeking to improve client communication, while also volunteering as a community liaison to help senior citizens navigate technology. Ultimately, she wants a low‑stress, part‑time
    position that allows her to retire comfortably yet remain socially useful.
