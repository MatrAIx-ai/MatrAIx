persona_description: A researcher who is passionate about financial literacy and its impact on household well-being, particularly in developing countries. She is interested in the specific link between
  financial literacy and financial literacy training, and how different trainer gender designs affect learning outcomes and perceptions among microfinance clients. She is also interested in the best strategies
  for improving the financial literacy of the poor, and her study contributes to this field by providing evidence from a randomized field experiment conducted in Bhopal, India.
