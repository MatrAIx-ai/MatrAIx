  career_goals: Although retired, Kieran aims to deepen his involvement in preserving Petersburg’s cultural heritage. He plans to volunteer as a docent at the nearby Texas History Museum, help document
    oral histories of longtime residents, and eventually compile a photo‑essay book that captures the town’s changing landscape. He also aspires to learn advanced photo‑editing techniques, start a small
    online gallery to share his work, and mentor younger community members interested in gardening and local history. Maintaining his health and mental agility remains a personal ambition, so he continues
    a weekly walking routine and attends a senior‑focused book club.
