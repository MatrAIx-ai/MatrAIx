  hobbies: '[''Watercolor painting'', ''Sketching local landscapes'', ''Visiting art galleries'', ''Attending community theater'', ''Reading historical fiction'', ''Reading mystery novels'', ''Hiking'',
    ''Birdwatching'', ''Gardening'', ''Yoga'', ''Meditation'', ''Volunteering at the public library'', ''Organizing author talks'', ''Running a monthly book club'', ''Handmade greeting card crafting'']'
  career_goals: Sherry aims to advance from her receptionist role to an Office Manager position, ideally within a community arts center or cultural organization where she can blend her administrative strengths
    with her passion for the arts. She plans to enroll in a part‑time associate program in Business Administration or Office Management and obtain a certification in Project Management. Long‑term, she hopes
    to lead community outreach initiatives, coordinate local art exhibitions, and mentor new front‑desk staff. Ultimately, she envisions creating a consultancy that provides administrative support to small
    nonprofits in the Silverwood area.
