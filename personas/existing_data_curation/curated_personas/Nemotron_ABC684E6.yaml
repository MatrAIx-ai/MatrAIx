  career_goals: Although retired, Kevin remains driven to contribute meaningfully to his community and to keep his mind engaged. His primary ambition is to compile a memoir that weaves together personal
    reflections, Spokane’s mid‑century history, and his experiences with art and craftsmanship. He aims to volunteer regularly at the Spokane Museum of Art, offering tours and lecture support for small
    groups. Kevin also wishes to deepen his digital skills by learning to use a tablet for digital sketching and archiving his woodworking projects. Maintaining good health, he plans to stay active through
    regular walks along the river and participate in senior wellness workshops. Ultimately, he seeks to leave a legacy of curiosity, kindness, and cultural appreciation for future generations.
