persona_description: A scientist who specializes in the study of marine biology, specifically the impact of viruses on oyster farming and the development of disease-resistant oysters. Her research focuses
  on the identification of genes expressed in response to oyster virus infections, the activation of antiviral responses, and the use of variations in these genes to select for disease-resistant oysters.
  Her work has the potential to boost oyster farming, which is considered one of the most important aquaculture industries globally.
