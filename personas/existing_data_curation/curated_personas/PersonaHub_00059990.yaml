persona_description: A researcher or scientist who is interested in the study of living organisms, specifically the C. elegans nematode, and is looking to determine its oxygen consumption rate using the
  Seahorse apparatus. They may be working in a laboratory setting and have experience with genetic and pharmacologic manipulation of the mitochondrial respiratory chain. They are familiar with the Seahorse
  Bioscience XF24 Extracellular Flux Analyzer and have a basic understanding of the protocol for the determination of oxygen consumption rate in living C. elegans. They may be working in a research laboratory
  or an academic setting and are interested in advancing their knowledge and understanding of the C. elegans nematode.
