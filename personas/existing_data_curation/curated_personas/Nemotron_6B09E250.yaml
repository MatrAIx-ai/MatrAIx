  hobbies: '[''DIY furniture building'', ''Home metal‑working'', ''Hiking'', ''Nature walking'', ''Cooking and sourdough baking'', ''Herbal tea crafting'', ''Attending maker fairs'', ''Participating in
    community workshops'', ''Reading science magazines'', ''Journaling'']'
  career_goals: Alice aims to advance from a floor assembler to a lead technician or shift supervisor within the next three years, leveraging her hands‑on expertise and growing knowledge of lean manufacturing.
    She plans to obtain a Six Sigma Yellow Belt and complete her associate degree in manufacturing technology, which will enable her to oversee process‑efficiency projects and mentor junior workers. Long‑term,
    she aspires to open a small custom‑fabrication shop that specializes in bespoke metal and wooden pieces, giving her the flexibility to manage her own schedule while pursuing her creative interests.
