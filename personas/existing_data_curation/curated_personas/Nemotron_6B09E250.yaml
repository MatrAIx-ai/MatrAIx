personas:
  professional: Alice Jones is a seasoned floor assembler at a mid‑sized manufacturing plant, translating her hands‑on mastery of CNC and manual machinery, technical drawing interpretation, and safety protocols
    into practical lean improvements, while her spontaneous curiosity drives her to propose innovative process tweaks even as she wrestles with keeping paperwork organized and meeting tight deadlines.
  sports: Alice Jones is an avid hiker who conquers the Sangamon River trail system weekly, joins the Sangamon River Hiking Club for group treks, cheers on the Chicago Cubs, Chicago Bears, and Chicago Bulls
    during their seasons, and balances solo fitness runs with occasional participation in local 5K charity races.
  arts: Alice Jones nurtures her creative side by frequenting local maker fairs, drawing design inspiration from the functional elegance of Dieter Rams, the folk melodies of The Avett Brothers, and the
    woodworking tutorials of Nick Offerman, while also indulging in sci‑fi classics like Blade Runner during quiet evenings.
  travel: Alice Jones favors spontaneous, nature‑focused getaways, having already hiked the sandstone cliffs of Zion National Park and the limestone bluffs of Starved Rock, and now dreams of strolling the
    medieval streets of Tallinn on a future European adventure.
  culinary: Alice Jones is a self‑taught sourdough enthusiast who bakes crusty rye and whole‑wheat loaves, crafts rosemary‑infused focaccia, brews lavender‑chamomile herbal tea, and occasionally experiments
    with pickling carrots and making kimchi for a tangy probiotic boost.
  core: Alice Jones blends a maker’s restless curiosity and a penchant for spontaneous tool purchases with lingering worries, turning evenings into journal‑filled reflections after a day of DIY triumphs
    punctuated by occasional missed deadlines and stress‑induced over‑thinking.
background:
  cultural: Alice grew up in a middle‑class, white, Midwestern family in rural Illinois. Her upbringing emphasized a strong work ethic, self‑reliance, and community involvement typical of small‑town values.
    She attended local schools, participated in church youth groups, and spent summers at family farms, which fostered an appreciation for practicality and seasonal rhythms. Her partial college education
    exposed her to broader perspectives, yet she remains rooted in the region’s cultural traditions, such as celebrating local fairs, supporting the high school football team, and valuing straightforward,
    honest communication.
attributes:
  skills: '[''Mechanical assembly'', ''Fabrication'', ''Technical drawing interpretation'', ''CNC machine operation'', ''Hand and power tool proficiency'', ''Quality inspection'', ''Troubleshooting'', ''Process
