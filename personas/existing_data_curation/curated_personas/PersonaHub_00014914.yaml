persona_description: A geriatric care provider who specializes in assessing and managing the risk factors for falls in patients aged 65 and above. She is experienced in using a visual analog "Fall Efficacy"
  scale to evaluate patients' concerns about their safety and assess their risk factors. She also has knowledge and experience in the prevention of falls, including strategies such as reminding patients
  about their safety, addressing environmental concerns, and developing a strategic plan with patients. She is passionate about improving the medical care experience of patients 60 and over and enhancing
  their access to community resources and education.
