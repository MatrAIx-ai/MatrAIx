personas:
  professional: Azalia Redwan combines 18 years of hands‑on high‑speed manufacturing expertise with bilingual communication skills, excelling at CNC operation, forklift driving, and real‑time defect correction
    while transitioning toward a shift supervisor role and applying Six Sigma principles to drive continuous improvement.
  sports: Azalia Redwan plays competitively in a co‑ed soccer league, follows LAFC passionately, and joins weekend beach volleyball games at Newport Beach, using sport as an outlet for her competitive streak
    and stress relief.
  arts: Azalia Redwan’s nights are filled with salsa and cumbia dancing at community cultural events, inspired by artists like Celia Cruz, Carlos Vives, and Shakira, while she also enjoys attending local
    mural tours and watching live performances by regional folk bands.
  travel: Azalia Redwan prefers spontaneous weekend getaways to nearby coastal towns such as Laguna Beach and hikes along the San Juan Capistrano trail, but dreams of a culinary pilgrimage to Oaxaca to
    study traditional mole‑making, balancing budget constraints with a love for immersive experiences.
  culinary: Azalia Redwan treats her kitchen as a laboratory, perfecting mole poblano with dark chocolate and pasilla chilies, crafting hand‑made tamales with masa and pork, and experimenting with fusion
    twists like mole‑marinated grilled salmon, displaying a high proficiency in both classic techniques and innovative flavor pairings.
  core: Azalia Redwan blends a structured, detail‑oriented work ethic with a spontaneous, competitive spirit, juggling community leadership, culinary experiments, and relentless self‑improvement, all while
    wrestling with stress‑induced worry and occasional disorganization.
background:
  cultural: Azalia grew up in a Mexican‑American household in Santa Ana, where Spanish was spoken at home and community ties were strong. Her family’s emphasis on hard work, respect for collective celebrations,
    and rich culinary traditions have shaped her values and daily habits. She maintains regular connections with extended family and the vibrant Mexican community in Orange County, participating in events
    such as Día de los Muertos parades and local mariachi performances. This bicultural upbringing gives her a fluid ability to navigate both English‑dominant workplaces and Spanish‑speaking community settings,
    fostering a sense of belonging while preserving her cultural heritage.
