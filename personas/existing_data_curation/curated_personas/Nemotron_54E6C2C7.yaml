  career_goals: Azalia aims to transition from a line operator to a shift supervisor within the next two years, and ultimately to a plant manager role where she can shape continuous‑improvement initiatives.
    She is pursuing a Six Sigma Green Belt certification to solidify her expertise in process optimization. In the longer term she envisions launching a small family‑run specialty food production business
    that merges her manufacturing know‑how with her love for authentic Mexican cooking, allowing her to create high‑quality artisanal products while maintaining financial independence.
