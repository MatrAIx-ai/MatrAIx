personas:
  professional: Miguel Leonlopez, a bilingual community builder with a construction‑handyman’s problem‑solving approach and a Business Administration foundation, uses methodical budgeting and consensus‑seeking
    skills to coordinate volunteer programs while pursuing a Social Work degree to become a nonprofit outreach coordinator.
  sports: Miguel Leonlopez, a weekend jogger and occasional pickup basketball player at the local community center, roots for the Chicago Cubs, Bulls, and Blackhawks, and trains for a yearly 5K, yet admits
    they skip stretching after runs, which sometimes aggravates their knee pain.
  arts: Miguel Leonlopez, an avid street photographer inspired by Vivian Mair and Dorothea Lange, captures Chicago neighborhood moments, frequents the Art Institute’s Mexican mural exhibits, and attends
    weekly open‑mike poetry nights, though they often forget to edit their photos until the next day.
  travel: Miguel Leonlopez, a purposeful traveler, enjoys short road trips to Lake Geneva and Seattle’s Pike Place Market for fresh ingredients, dreams of a culinary pilgrimage to Oaxaca for authentic mole,
    and frequently revisits New Orleans for its vibrant music scene and Creole cuisine.
  culinary: Miguel Leonlopez, a skilled home chef, perfects mole poblano, chiles en nogada, and hand‑made corn tortillas using garden‑fresh cilantro and roasted poblano peppers, delights in swapping recipes
    at community workshops, yet habitually burns the edges of salsas when multitasking.
  core: Miguel Leonlopez blends hands‑on construction pragmatism with culinary heritage, using community service as a bridge between practical problem‑solving and cultural storytelling, all while juggling
    a love for photography and a habit of over‑spicing dishes.
background:
  cultural: Miguel was raised in a Mexican‑American household in Chicago, with parents who migrated from Jalisco. Spanish was spoken at home, and family gatherings highlighted celebrations like Día de los
    Muertos and Navidad, integrating Catholic traditions with Mexican folk customs. He maintains close ties to the local Mexican community, participating in cultural festivals, supporting a neighborhood
    tapatío soccer league, and visiting his extended family in Mexico during holidays. This bicultural upbringing instilled a strong sense of humility, collective responsibility, and a respect for both
    his heritage and the diverse urban environment he now calls home.
attributes:
  skills: '[''Bilingual (Spanish-English)'', ''Conflict mediation'', ''Project coordination'', ''Budgeting and resource allocation'', ''Basic carpentry and maintenance'', ''Problem solving'', ''Culinary
    expertise in Mexican cuisine'', ''Volunteer management'', ''Computer literacy for admin tasks'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Urban balcony gardening'', ''Reading technology trends and historical biographies'', ''Volunteer tutoring in English and digital skills'', ''Street
    photography'', ''Walking in Chicago lakefront parks'']'
  career_goals: Miguel aims to complete his bachelor's degree in Social Work or Community Development within the next two years, leveraging his practical experience to secure a role as a community outreach
    coordinator for a nonprofit serving Chicago's Mexican‑American neighborhoods. He also plans to obtain a certification in bilingual counseling to better support immigrants and youth. Long‑term, he envisions
    launching a small cultural kitchen that offers cooking workshops and mentorship programs, providing a bridge between his culinary passion and his commitment to community empowerment.
