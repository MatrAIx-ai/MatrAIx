  career_goals: Jared aims to transition into a senior leadership role such as Senior Systems Analyst or IT Operations Manager within the next five years, leveraging his strengths in structured analysis
    and process improvement. He plans to obtain ITIL Expert and PMP certifications to formalize his expertise and to lead a small team of analysts, mentoring junior staff while shaping enterprise‑wide technology
    strategies. Balancing his desire for stability with incremental growth, he seeks opportunities that allow him to influence long‑term system architecture without sacrificing the predictable work environment
    he values.
