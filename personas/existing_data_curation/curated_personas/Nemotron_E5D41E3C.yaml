personas:
  professional: Jared Borden is a methodical computer systems analyst with over two decades of experience who excels at translating business requirements into precise system specifications, drawing on their
    strong background in SQL, Python, and ITIL, and they deliver meticulously documented solutions while steering cross‑functional projects toward reliability and compliance.
  sports: Jared Borden channels their love of the outdoors into regular hikes across the foothills of the Rockies, logging routes with a GPS watch, supporting the Denver Broncos and Colorado Rockies as
    a faithful fan, and they participate in the Rocky Mountain Hiking Club's quarterly trail‑maintenance outings while scheduling a monthly home‑circuit workout to counterbalance sedentary desk time.
  arts: Jared Borden captures the serenity of mountain landscapes through black‑and‑white photography inspired by Ansel Adams, indulges in classic sci‑fi novels by Isaac Asimov and Arthur C. Clarke, and
    they curate the soundtrack of their evenings with atmospheric works by Brian Eno, while quarterly board‑game nights with friends provide a social canvas for strategic creativity.
  travel: Jared Borden plans trips with a spreadsheet‑level precision, favoring structured itineraries that combine scenic drives through Yellowstone, a technical conference in Seattle, and a relaxed coffee‑culture
    deep‑dive in Portland, and they list a pilgrimage to Japan’s Akihabara district as a top destination to explore the roots of their hobbyist electronics passion.
  culinary: Jared Borden brews coffee like a lab experiment, meticulously weighing Ethiopian Yirgacheffe beans for a perfect pour‑over, and they translate that precision to a modest kitchen where they prepare
    garden‑fresh roasted beet salad with goat cheese and a dash of balsamic, though they sometimes over‑roast beans when exhausted from work.
  core: Jared Borden is a 49‑year‑old systems analyst whose life is governed by methodical routines, solitary yet purposeful hobbies, and a steady pursuit of incremental growth, even if that means they
    occasionally neglect sleep for a new Python script or a perfect cup of coffee.
background:
  cultural: Jared is a white American whose family roots trace back to German and Irish immigrants who settled in the Midwest. He grew up in a modest, tight‑knit community that emphasized hard work, punctuality,
    and self‑reliance—values that continue to shape his disciplined, organized outlook. After relocating to Erie, Colorado, he has embraced the local outdoor culture while maintaining traditional family
    celebrations such as Thanksgiving and holiday gatherings. His cultural identity blends Midwestern practicality with a growing appreciation for Colorado’s emphasis on nature, community involvement, and
    modest self‑improvement.
