personas:
  professional: Wilson Gonzalez is an aspiring concept artist and junior game designer who blends sketchbook doodles with Minecraft creations, channeling their curiosity and love for unconventional ideas
    into vibrant character designs, and they thrive in a flexible, unstructured workflow that lets them drift between drawing and building.
  sports: Wilson Gonzalez follows the Austin FC soccer team and cheers for the Dallas Cowboys on Sundays, participates in a local youth soccer league where they play as a midfielder, and enjoys weekend
    bike rides in the Hill Country, preferring low‑key practice sessions over crowded gym classes.
  arts: Wilson Gonzalez devotes afternoons to re‑drawing panels from comic books by Stan Lee and Jeff Smith, listens to Latin pop artists like Luis Miguel and enjoys crafting papel picado for family celebrations,
    finding inspiration in the vivid colors of both graphic novels and the rhythmic clatter of kitchen utensils used as makeshift drums, and they often experiment by merging comic art styles with digital
    sculptures.
  travel: Wilson Gonzalez loves spontaneous family road trips to Big Bend National Park and occasional weekend getaways to San Antonio’s River Walk, dreaming of a future visit to Disneyland and hoping to
    explore the historic ruins of Chichén Itzá after finishing a new LEGO set, and they relish the chance to collect postcards from each destination as a quiet reminder of their adventures.
  culinary: Wilson Gonzalez enjoys helping in the kitchen to assemble tacos al pastor with fresh cilantro and onions, perfects guacamole using ripe avocados and lime, and eagerly devours homemade tamales
    on festive nights, though they often leave the sugar‑coated cinnamon sticks scattered on the countertop.
  core: Wilson Gonzalez is a curious, quietly creative nine‑year‑old who flips between sketching, building digital worlds, and crafting colorful papel picado, juggling a love for solo projects with occasional
    bursts of assertive teamwork, and they sometimes misplace their inhaler while forgetting to file school expenses.
background:
  cultural: Wilson is a Mexican‑American raised in a bilingual household in Round Rock, Texas. His family celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and the preparation of
    homemade tacos and tamales. He grew up hearing stories of Mexican folklore, learning traditional crafts like papel picado, and listening to a mix of regional music and contemporary hits. This blend
    of Mexican heritage and Texan community life shapes his identity, giving him a rich cultural perspective that informs his art, language, and everyday experiences.
attributes:
  skills: '["Sketching and drawing", "Basic Scratch programming", "LEGO building and design", "Storytelling and creative writing", "Bilingual communication (Spanish/English)", "Rhythmic percussion skills"]'
  hobbies: '["Sketching", "Minecraft", "LEGO building", "Reading comic books and graphic novels", "Listening to Latin pop and mariachi music", "Family nature walks", "Making papel picado crafts"]'
  career_goals: Inspired by his love of art and technology, Wilson dreams of becoming a graphic novelist or a video‑game designer who can craft immersive visual stories. He also imagines building spaces
    as an architect that blend colorful Mexican motifs with modern design. In the near term, he aims to sharpen his reading and writing skills, learn more advanced coding languages, and attend a summer
    art camp that nurtures his creative confidence.
