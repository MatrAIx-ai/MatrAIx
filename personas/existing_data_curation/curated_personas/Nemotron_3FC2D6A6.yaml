personas:
  professional: Leanora Green, a budding digital illustrator, channels their boundless imagination into fantastical creature sketches and flash‑fiction worlds, leveraging their strong curiosity and love
    for abstract concepts, while their relaxed attitude toward obligations leads them to frequently jump between projects, resulting in a vibrant, ever‑evolving portfolio.
  sports: Leanora Green spends Saturdays at the community soccer field with the Riverside Rockets youth team, cheers for the Seattle Seahawks, and occasionally joins a local park’s skateboarding crew, preferring
    informal, imaginative games over regimented training.
  arts: Leanora Green immerses their imagination in the rhythmic verses of Kendrick Lamar, the vivid street art of Banksy, and the whimsical animation of Hayao Miyazaki, channeling these influences into
    mixed‑media collages that blend recycled paper, glitter, and textured leaves.
  travel: Leanora Green’s ideal trip fuses adventure and imagination—having explored Disneyland’s magical corridors, they dream of wandering Tokyo’s neon Akihabara district, while favoring short family
    road trips to national parks where they can sketch wild flora.
  culinary: Leanora Green favors bold flavors, often begging for sushi rolls with avocado and pickled ginger, homemade mac and cheese topped with crispy bacon, and loves experimenting with rainbow fruit
    salads featuring strawberries, mango, and kiwi, though they still struggle to perfectly butter‑slice bread.
  core: Leanora Green is a whimsical, curiosity‑driven twelve‑year‑old whose imagination fuels daily art projects, yet their habit of hopping between hobbies leaves sketches half‑finished and allowance
    tracking a chaotic scrapbook.
background:
  cultural: Leanora is a Black girl raised in Lexington, Kentucky, where her family blends Southern hospitality with vibrant African‑American traditions. Weekly visits to the local church’s youth group
    expose her to gospel music, storytelling, and community service, nurturing both her spiritual roots and her narrative voice. She celebrates Juneteenth and Black History Month with family gatherings
    that feature soul food, classic blues, and oral histories from elders. Lexington’s modest but growing arts scene—museum exhibits, community mural projects, and local festivals—offers her opportunities
    to showcase her work and connect with other young artists of color. These cultural experiences shape her sense of identity, resilience, and her desire to reflect Black creativity in her future artistic
    career.
attributes:
