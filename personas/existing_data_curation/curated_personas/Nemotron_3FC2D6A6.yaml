    "listening to hip‑hop, R&B, and gospel music", "park explorations and nature sketching"]'
  career_goals: Leanora dreams of turning her imagination into a career as a visual storyteller. In the short term she aims to win her middle school's art competition and publish a short comic series online.
    Long‑term, she hopes to attend a specialized high school for the arts, study illustration or game design, and eventually work as a concept artist or children's book author where she can blend her love
    of whimsical narratives with striking visuals. She also envisions creating a digital platform where kids can collaborate on story‑building projects, reflecting her competitive yet collaborative spirit.
