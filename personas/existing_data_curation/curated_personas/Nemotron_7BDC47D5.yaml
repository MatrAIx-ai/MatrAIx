  hobbies: '[''Model rocketry'', ''Astronomy (telescope stargazing)'', ''Hiking in the Sonoran Desert'', ''Landscape photography'', ''Golfing with friends and family'', ''DIY electronics and Arduino projects'',
    ''Reading science‑fiction literature'']'
  career_goals: Chiman aims to lead a multidisciplinary team developing next‑generation autonomous aircraft that leverage sustainable propulsion and advanced navigation algorithms. Over the next five years,
    he hopes to secure a senior engineering management position that gives him strategic influence over R&D while preserving flexibility to manage stress. He also intends to earn his professional engineer
    (PE) license, contribute to aerospace industry standards through technical committees, and mentor junior engineers who share his blend of curiosity and practicality.
