persona_description: An astronomer interested in studying the structure of CMEs and their impact on Earth. This person is likely to be interested in observing the bright leading shell, dark cavity, and
  bright core of CMEs, as well as the presence of large-scale helical magnetic flux rope in the CME cavity. They are also interested in detecting the electron heat flux dropout as a signature of magnetic
  flux disconnection from the Sun, and observing the longitudinal distribution of the emitted plasma and detection of geoeffective events. This person is also interested in using the CME Watch observing
  mode to measure Doppler velocities, and is flexible in choosing the lines to be included in the study.
