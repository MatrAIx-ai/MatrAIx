  career_goals: As he approaches retirement age, Hai aims to be recognized as a senior technician who mentors the next generation, secure a certification as a Certified Manufacturing Technician, and lead
    a small project to streamline the assembly line’s workflow to reduce waste. He also hopes to transition part‑time into a consultancy role for local workshops, sharing his practical expertise while staying
    engaged in his community. Maintaining good health so he can continue his hands‑on work and remain active in community projects is a personal priority.
