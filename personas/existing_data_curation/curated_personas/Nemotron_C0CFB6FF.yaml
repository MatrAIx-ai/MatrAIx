    Theater Attendance"]'
  career_goals: Although she is no longer part of the formal workforce, Norma aims to stay intellectually active by mentoring younger teachers through the local teachers' association and offering occasional
    workshops on practical teaching strategies. She is eager to lead a community garden project that blends her curiosity about sustainable agriculture with her practical skill set, and she hopes to enter
    regional gardening competitions to satisfy her competitive streak. Over the next few years, Norma also plans to author a concise guidebook on low‑maintenance gardening for seniors and to contribute
    reflective essays on lifelong learning to a regional senior magazine, thereby combining her love of writing with her desire to give back to her community.
