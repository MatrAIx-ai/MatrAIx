personas:
  professional: Vickie Waddell, a self‑taught visual artist and aspiring freelance graphic designer, blends vivid imagination with meticulous project planning, delivering custom acrylic paintings and digital
    illustrations while leveraging their knack for budgeting and event coordination to run a boutique studio that quietly outpaces local competitors.
  sports: Vickie Waddell enjoys early‑morning jogs along the St. Marks River and weekly paddle‑boarding at the nearby lake, supplements the routine with yoga sessions at a local studio, roots for the Jacksonville
    Jaguars and Tampa Bay Rays, and treats fitness as a structured hobby that mirrors the disciplined approach they apply to their art projects.
  arts: Vickie Waddell immerses themselves in abstract expressionism, drawing inspiration from Jackson Pollock’s drips and Mark Rothko’s color fields, while also admiring digital pioneer Bee Bee Bee’s collages,
    devouring speculative fiction by Ursula K. Le Guin, and attending intimate museum tours that fuel both their painting and poetic explorations.
  travel: Vickie Waddell prefers quiet, solo journeys that blend artistic discovery with nature, having trekked the Everglades, explored Santa Fe’s art districts, and dream‑planning a misty hike through
    Oregon’s Columbia River Gorge, always booking modest Airbnbs to stretch their grant‑budget mindset.
  culinary: Vickie Waddell cooks with a modest but adventurous flair, preparing shrimp‑and‑grits seasoned with fresh Gulf shrimp, roasting beet salads with goat cheese, citrus vinaigrette using locally
    sourced Florida oranges, and occasionally experimenting with vegan jackfruit tacos, all while keeping a well‑organized spice rack that resembles their art supply cabinet.
  core: Vickie Waddell is a methodical dreamer who channels solitary imagination into disciplined creative enterprises, hoarding art supplies like treasure and obsessively tracking budgets while maintaining
    a calm, competitive edge.
background:
  cultural: Vickie hails from Starke, a small town in Bradford County, Florida, rooted in a Southern rural culture that values self‑reliance, community involvement, and a close relationship with the natural
    environment of the Florida panhandle. Her family has multi‑generational ties to the area, blending farming and small‑business traditions. The local culture, marked by modesty, hospitality, and an appreciation
    for outdoor recreation, has shaped her respect for solitude in nature and her commitment to community‑centered events. While she identifies as culturally mainstream white American, she embraces regional
    traditions such as Southern hospitality, occasional church gatherings (though she now leans toward a personal spiritual outlook), and a pragmatic, organized approach to daily life.
