  career_goals: Vickie's primary ambition is to transition her informal volunteer work into a sustainable freelance creative practice. She plans to enroll in a community college to earn an associate degree
    in graphic design, gaining formal credentials and expanding her technical toolkit. Leveraging her project‑management experience, she aims to launch a boutique studio offering custom illustrations, commissioned
    paintings, and hands‑on workshops for small groups. In the longer term, Vickie aspires to become a certified art therapist, integrating her love of abstract art with a desire to support mental well‑being
    in her community. She also hopes to establish a community arts collective in Starke, securing grant funding and mentoring emerging artists.
