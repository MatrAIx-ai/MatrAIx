  career_goals: Thanh aims to advance to an Office Manager or Operations Supervisor role within the next three to five years, overseeing multiple departments and shaping strategic workflow initiatives.
    She plans to earn the Certified Administrative Professional (CAP) credential and enroll in part‑time MBA courses to deepen her business acumen. Her long‑term ambition is to lead a high‑performing administrative
    unit that consistently meets efficiency targets while fostering a stable, supportive environment for staff, allowing her to apply her practical, results‑driven approach on a broader scale.
