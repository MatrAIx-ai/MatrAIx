  career_goals: Davian aspires to earn his GED within the next year and then pursue a trade certification, such as an HVAC technician program at the nearby community college. He seeks a career that offers
    both structure—regular hours, clear expectations—and occasional flexibility for creative projects, like freelance music production. Long‑term, he hopes to secure stable employment that supports his
    family and allows him to give back to his community, perhaps by eventually mentoring at‑risk youth or leading community‑service initiatives. Overcoming his tendency toward worry, he aims to develop
    stronger time‑management habits and build confidence in meeting deadlines.
