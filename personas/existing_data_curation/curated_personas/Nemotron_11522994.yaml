personas:
  professional: Davian is an aspiring HVAC technician who balances their hands-on troubleshooting skills from years of carpentry with a passion for freelance beat-making, and they channel their practical
    mindset and occasional worry into meticulous project planning and community-focused mentorship.
  sports: Davian joins the Riverside B-Ball League for weekend pickup basketball, roots for the Atlanta Hawks during the NBA season, and spends calm mornings casting a line at Lake Greenwood, all while
    they keep a low-key fitness routine that balances cardio on the court with relaxed angling.
  arts: Davian escapes into the worlds of Isaac Asimov and Brandon Sanderson, strums acoustic renditions of John Mayer while layering lo-fi beats inspired by Bonobo, and occasionally attends local open-mic
    nights to share their own compositions, allowing their solitary creative bursts to shape their identity.
  travel: Davian favors low-key road trips, having explored the historic streets of Savannah and the jazz-filled alleys of New Orleans, while dreaming of a solo adventure to Kyoto's temples and Iceland's
    midnight suns, always planning trips around a modest budget and their study schedule.
  culinary: Davian crafts Southern comfort meals like collard greens seasoned with smoked ham hocks and crispy buttermilk fried chicken, often pairing them with homemade sweet tea and experimenting with
    a secret hot-sauce blend, revealing their culinary creativity as a bridge to their heritage.
  core: Davian is a quietly ambitious 19-year-old who balances a pragmatic trade mindset with a solitary creative soul, often worrying about deadlines, yet they find solace in guitar strings, spreadsheets,
    and the rhythm of a basketball bounce.
background:
  cultural: Davian is an African‑American young adult raised in Grand Ridge, a small town in Jackson County, Florida. His upbringing reflects the close‑knit nature of the local Black community, where church,
    family gatherings, and neighborhood events play central roles. He grew up attending a historically Black Baptist congregation, participating in choir rehearsals and youth outreach programs. Southern
    culinary traditions and music—from gospel hymns to contemporary hip‑hop—have shaped his tastes and creative interests. Davian also carries a sense of resilience passed down through generations that
    faced both the legacy of segregation and modern socioeconomic challenges, influencing his desire to contribute positively to his community.
