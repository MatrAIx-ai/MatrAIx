  career_goals: Although retired, Leroy aims to stay actively engaged in his community by expanding his mentorship role, especially with teenagers interested in trades. He plans to document his family’s
    history through a memoir and a photo archive, preserving stories for future generations. Leveraging his woodworking skills, he hopes to craft a modest line of handcrafted items to sell at local markets,
    turning a hobby into a modest side venture. He also wants to become more proficient with tablets and digital tools to share his experiences online, and to continue serving in leadership capacities at
    his church, potentially as a deacon. Maintaining his health through regular walks, group activities, and social events remains a personal priority.
