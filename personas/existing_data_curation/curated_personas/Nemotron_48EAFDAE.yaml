personas:
  professional: Jaylen Reece, a retired electrical and mechanical engineer with decades of experience designing environmental monitoring systems, channels his curiosity and hands‑on expertise into mentoring
    underserved youth and running community STEM workshops, while his spontaneous nature sometimes leads to missed deadlines on formal grant proposals.
  sports: Jaylen Reece enjoys early‑morning fishing on the Gulf, weekend sailing with the Sanibel Sailing Club, cheering on the Tampa Bay Rays during baseball season, and participating in senior center
    chess tournaments as a mental sport.
  arts: Jaylen Reece captures island wildlife with a Canon EOS 5D, curates a modest collection of Audubon bird prints, sings soulful gospel in his church choir alongside classics by Nina Simone and Duke
    Ellington, and reads biographies of pioneering scientists such as James Watt and Thomas Edison.
  travel: Jaylen Reece favors spontaneous eco‑trips, often planning last‑minute weekend getaways to nearby Sanibel Island or Key West for bird‑watching, while his bucket list includes a guided wildlife
    excursion to the Galápagos Islands and a cultural road trip through New England’s historic lighthouse towns, balancing limited mobility with senior travel discounts.
  culinary: Jaylen Reece delights in cooking lemon‑garlic grilled grouper and shrimp étouffée, garnished with garden‑grown basil and okra, and savors Sunday brunches featuring fluffy biscuits, collard greens,
    and peach‑scented tea, though they sometimes over‑salt dishes when caught up in conversation.
  core: Jaylen Reece blends a lifelong engineer’s curiosity with a spontaneous, community‑centric spirit, turning bird‑watching, sailing, and church choir into daily joys while occasionally letting organization
    slip in pursuit of new experiences.
background:
  cultural: Jaylen grew up in the deep South during the height of the civil‑rights movement, witnessing first‑hand the challenges and triumphs of African‑American communities. His parents migrated from
    rural Georgia seeking better opportunities, instilling in him a strong sense of resilience and the value of education. As a Black engineer who earned a graduate degree in STEM during a time of limited
    representation, Jaylen became a role model for younger Black students. In retirement, he remains active in local Black cultural organizations, celebrates African‑American holidays and traditions, and
    mentors youth of diverse backgrounds. His worldview is shaped by a blend of Southern hospitality, community solidarity, and a steadfast commitment to advancing equity in science and education.
