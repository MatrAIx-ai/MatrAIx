  hobbies: '[''Bird‑watching'', ''Fishing'', ''Sailing'', ''Native‑plant gardening'', ''Wildlife photography'', ''Reading science and history'', ''Community storytelling'', ''Chess'', ''Volunteer STEM tutoring'',
    ''Church choir singing'']'
  career_goals: Although officially retired, Jaylen remains driven to contribute meaningfully to his community. His primary ambition is to establish a volunteer STEM mentorship program for underserved youth
    in Lee County, leveraging his engineering background to inspire the next generation. He also hopes to document his personal journey—spanning the civil‑rights era to modern scientific pursuits—in a memoir
    that highlights perseverance and lifelong curiosity. Additionally, Jaylen aims to earn a certification in marine ecology to deepen his involvement in local conservation projects and to serve as an advisory
    member of the Sanibel Nature Club.
