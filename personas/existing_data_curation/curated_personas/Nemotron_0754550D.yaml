  career_goals: He aims to attend a specialized high‑school program in visual arts or graphic design, eventually earning a degree in multimedia design or game development. He dreams of creating an indie
    video game that blends storytelling and hand‑drawn art, or launching his own digital studio where he can produce illustrations for books and brands. He also hopes to compete in esports at a semi‑professional
    level and later mentor younger gamers. Ultimately, he wants a career that lets him fuse his creative passions with his organizational strengths, while allowing him to work both independently and collaboratively.
