personas:
  professional: Julio Ocasiomaldonado, a CNC tool operator and programmer, blends meticulous attention to detail with a quiet, collaborative spirit, turning complex engineering drawings into precision‑milled
    parts while constantly tweaking processes to satisfy both their curiosity and the demand for reliable output.
  sports: Julio Ocasiomaldonado, a weekend fisherman at Lake Crystal and regular participant in pickup soccer games with the River City FC group, supports the Chicago Cubs and follows the Chicago Bulls,
    balancing low‑key water‑sport relaxation with energetic team sports.
  arts: Julio Ocasiomaldonado, an acoustic‑guitar enthusiast, spends evenings strumming classic salsa and son rhythms inspired by Celia Cruz, Buena Vista Social Club, and Rubén Blades, while also attending
    local theater productions of Lin‑Manuel Miranda’s *Hamilton* for artistic refreshment.
  travel: Julio Ocasiomaldonado, who prefers meticulously planned short trips, has explored the historic streets of New Orleans and the coastal villages of Portugal’s Algarve, and dreams of hiking the Inca
    Trail to Machu Picchu, balancing a love of cultural immersion with budget‑conscious travel.
  culinary: Julio Ocasiomaldonado, a confident home cook, often prepares ropa vieja with cumin‑spiced flank steak, caramelized plantains, and arroz con pollo seasoned with saffron and achiote, savoring
    the tactile process of chopping and simmering as a calming counterpoint to work stress.
  core: Julio Ocasiomaldonado is a detail‑obsessed CNC specialist who channels a perpetual worry into hands‑on creativity—from 3D‑printing gadgets to strumming salsa guitars—while juggling a disciplined
    budget and a love for low‑key fishing retreats.
background:
  cultural: Julio is a second‑generation Cuban‑American raised in Hempstead, Texas. He grew up in a bilingual household, speaking both Spanish and English, and his family emphasized close ties, respect
    for elders, and the communal spirit typical of Cuban culture. Traditional music, dance, and cuisine—especially son, salsa, and dishes like ropa vieja and tostones—remain central to his family celebrations.
    At the same time, living in rural Waller County has exposed him to Texan values of self‑reliance and a strong work ethic. Julio blends these influences by participating in local festivals, maintaining
    family rituals, and integrating Cuban hospitality into his daily interactions.
attributes:
  skills: '[''CNC milling and turning operation'', ''G‑code programming (Mastercam, Fusion 360)'', ''Interpretation of technical drawings and GD&T'', ''Tool selection, setup, and calibration'', ''Preventive
    maintenance and troubleshooting'', ''Lean manufacturing (5S, waste reduction)'', ''Quality inspection (calipers, micrometers, CMM)'', ''Basic PLC programming'', ''Python scripting for CNC automation'',
    ''Attention to detail'', ''Problem‑solving'', ''Team collaboration and communication'']'
  hobbies: '[''3D printing and CAD design'', ''Acoustic guitar (Cuban son and salsa)'', ''Cooking Cuban cuisine'', ''Fishing'', ''Pickup soccer'', ''Watching machining/robotics YouTube channels'', ''Reading
    science‑fiction novels'', ''Strategic puzzle gaming'']'
  career_goals: Julio aims to formalize his technical knowledge by obtaining a CNC certification such as NIMS and completing his GED, followed by an associate's degree in industrial technology. In the next
    few years he plans to transition from operator to senior CNC programmer, taking responsibility for process optimization and training junior staff. He is also interested in expanding into additive manufacturing
    and robotics integration to broaden his skill set. Ultimately, Julio aspires to lead a small custom‑fabrication shop or work as a manufacturing consultant, leveraging his practical experience to deliver
    high‑quality, precision‑engineered parts while maintaining a balanced, low‑stress work environment.
