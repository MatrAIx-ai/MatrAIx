personas:
  professional: Sterling Herndon is a veteran rural taxi driver who blends meticulous vehicle upkeep with a gregarious storytelling style, using their deep‑knowledge of Appalachian backroads to turn every
    fare into a mini‑tour while leveraging their strong conflict‑resolution skills and curiosity for new ideas to foster a welcoming atmosphere for passengers.
  sports: Sterling Herndon jogs the Appalachian Trail for cardio, is a seasonal fan of the Virginia Tech Hokies football team and the Washington Commanders, and they belong to the local Charlottesville
    Runners Club, often signing up for charity 5K races despite a tendency to skip warm‑ups in their rush.
  arts: Sterling Herndon immerses themselves in Appalachian folk and blues, drawing inspiration from artists such as Doc Watson, Gillian Welch, and the modern street‑photographer Vivian Maier, frequenting
    the Roanoke Art Museum and hosting impromptu acoustic performances during rides to showcase local cultural heritage.
  travel: Sterling Herndon prefers spontaneous road trips that weave through historic mountain towns, having explored Shenandoah National Park, Asheville’s River Arts District, and dreaming of a week‑long
    immersion in Barcelona to practice Spanish and capture Mediterranean street life.
  culinary: Sterling Herndon favors hearty Southern fare like smoked pork ribs, collard greens, and cornbread, while dabbling in Spanish cooking such as paella with saffron and chorizo, and they often experiment
    with locally sourced herbs, though their occasional over‑seasoning reveals a quirky palate.
  core: Sterling Herndon is a curious, sociable 45‑year‑old taxi driver whose love of art, music, and community fuels an entrepreneurial spirit, even as anxiety and a penchant for late‑night postcard hunting
    keep life intriguingly unbalanced.
background:
  cultural: Sterling's cultural background is rooted in the Appalachian region of Southwest Virginia. He was raised in a close‑knit, working‑class family in Lee County where farming, church gatherings,
    and local music played central roles. The community emphasized self‑reliance, hospitality, and storytelling, shaping his outgoing personality and deep appreciation for local art and history. While his
    formal education concluded with high school, the region's strong oral traditions and modest resources nurtured his curiosity and willingness to explore unconventional ideas. As a taxi driver, he encounters
    a diverse cross‑section of residents and travelers, broadening his cultural perspective while maintaining a deep connection to his Southern Appalachian heritage.
