persona_description: A paleontologist who specializes in the study of early mammals, particularly the genus Aceratherium and its relatives. This individual is highly interested in the comparative anatomy
  and evolution of rhinocerotoids and their relationships with extant rhinoceroses. They are particularly fascinated by the size and proportions of Aceratherium, Paraceratherium, and other related species,
  and are actively involved in the research of their fossils and the reconstruction of their environments.
