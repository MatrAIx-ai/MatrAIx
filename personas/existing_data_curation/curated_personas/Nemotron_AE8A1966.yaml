personas:
  professional: Angela Reedy is a first‑line sales supervisor who leverages Salesforce, advanced Excel, and rigorous scheduling to drive non‑retail sales teams in Utah County, delivering data‑driven performance
    improvements while fostering a collaborative, detail‑focused culture, and they consistently meet or exceed quarterly targets.
  sports: Angela Reedy’s athletic pursuits are anchored by weekly hikes on the Wasatch foothills with a small trail‑blazing club, a membership in the Provo Adult Soccer League that supports Real Salt Lake,
    and a loyal following of the Utah Jazz and BYU Cougars football, and they schedule these activities with the same precision as their work calendar.
  arts: Angela Reedy engages with the arts through regular attendance at Hale Centre Theatre productions, a weekly listening habit of indie folk artists like The Staves and Bon Iver, and occasional viewings
    of classic mystery films starring Joan Fontaine, and they integrate these cultural experiences into their structured weekend routine.
  travel: Angela Reedy approaches travel with a meticulously crafted itinerary, favoring weekend road trips to nearby natural wonders such as Yellowstone and Grand Teton, while dreaming of a long‑term trek
    through New Zealand’s South Island, and they use a spreadsheet to budget each adventure, balancing work commitments and family visits.
  culinary: Angela Reedy’s culinary routine revolves around weekly meal‑prep sessions where they assemble balanced bowls featuring grilled salmon, quinoa, roasted sweet potatoes, and a variety of fresh
    herbs like cilantro and rosemary, they enjoy perfecting the ratio of spices in homemade salsa, and their occasional indulgence includes ordering a thin‑crust Margherita pizza after a particularly demanding
    week.
  core: Angela Reedy blends disciplined data‑driven leadership with a love for puzzles, nature hikes, and meticulously planned meals, they thrive on structure yet occasionally over‑schedule themselves,
    and their habit of double‑checking everything from sales forecasts to grocery lists defines their uniquely organized yet quietly adventurous outlook.
background:
  cultural: Angela was raised in a middle‑class family in the Intermountain West, where community involvement and personal responsibility are emphasized. Growing up in a predominantly white, suburban environment
    near Orem, she was exposed to the cultural norms of Utah County, including a strong emphasis on family, volunteer service, and structured community activities. While she does not identify as religious,
    the values of reliability, orderliness, and cooperative service—common in the region's cultural fabric—have shaped her disciplined work ethic and preference for small‑group, purposeful engagements.
