  hobbies: '["Hiking in the Wasatch foothills","Crossword and logic puzzles","Yoga practice","Weekly meal‑prep cooking","Volunteer tutoring for after‑school program","Gardening with scheduled planting cycles","DIY
    home organization projects"]'
  career_goals: Angela aims to transition from a first‑line supervisory role to a regional sales operations manager within the next three to five years, overseeing multiple teams across Utah County. She
    plans to complete her bachelor's degree in Business Administration and earn a Project Management Professional (PMP) certification to strengthen her strategic planning capabilities. Long‑term, she envisions
    moving into a director‑level position where she can shape company‑wide sales strategies, mentor emerging leaders, and implement large‑scale efficiency programs that align with her passion for structured,
    results‑oriented management.
