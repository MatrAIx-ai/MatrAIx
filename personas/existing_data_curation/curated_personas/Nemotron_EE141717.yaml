  hobbies: '[''Reading contemporary fiction'', ''True-crime novels'', ''Nature walks and beach outings'', ''Cooking and recipe experimentation'', ''Journaling'', ''Small-group board game nights'', ''Volunteering
    at community food pantry'']'
  career_goals: Barbara aims to leverage her practical experience as a cashier to move into retail management within the next three to five years. She plans to complete her associate degree in Business
    Administration while gaining supervisory experience, eventually becoming an assistant store manager and later a store manager. Long-term, she is interested in owning a small boutique or a coffee shop
    that blends her curiosity for new ideas with a solid business foundation. She also hopes to develop training programs that prioritize employee well‑being and harmonious workplace culture.
