personas:
  professional: Barbara Bryan is a 21‑year‑old retail cashier who leverages their strong cash‑handling and point‑of‑sale expertise, calm problem‑solving under pressure, and curiosity‑driven eye for operational
    efficiency to quietly champion a harmonious work environment while aiming for a store‑management track.
  sports: Barbara Bryan enjoys strolling the Jacksonville Riverwalk and weekend hikes with a local Trailblazers hiking group, and they follow the Jacksonville Jaguars and Jacksonville Jumbo Shrimp while
    balancing a laid‑back fitness routine of yoga and light jogging, preferring solo activity over organized team sports.
  arts: Barbara Bryan delights in contemporary fiction from authors such as Sally Rooney and Gillian Flynn, relishes listening to indie folk musician Bon Iver and blues duo The Teskey Brothers while journaling,
    and they occasionally attend intimate chamber concerts by the Jacksonville Symphony or local productions of Tennessee Williams plays.
  travel: Barbara Bryan prefers low‑key weekend road trips, having already explored Savannah’s historic squares and Charleston’s waterfront, while they dream of a solo backpack trek along the Appalachian
    Trail in North Carolina and a culinary‑focused adventure through Oaxaca, Mexico.
  culinary: Barbara Bryan, a self‑taught home cook, enjoys perfecting Southern staples like shrimp‑and‑grits and fried chicken while sprinkling in global twists such as Thai coconut curry with sweet potatoes,
    and they often experiment with ingredients like smoked paprika, fresh basil, and mapo tofu sauce.
  core: Barbara Bryan is a quietly curious 21‑year‑old who balances the comfort of routine with spontaneous culinary experiments, often misplaces their journal in the rush of life, and values harmonious
    work environments above strict schedules.
background:
  cultural: Barbara grew up in a middle‑class white family in Jacksonville, Florida, absorbing Southern hospitality and coastal culture. Her upbringing emphasized politeness, community involvement, and
    a respect for tradition, while also exposing her to the multicultural influences of the Gulf Coast, including Caribbean and Latin American cuisine and music. She attended local public schools, participated
    in church youth groups, and enjoys regional customs such as Saturday night football gatherings and family barbecues. These cultural experiences shape her values of kindness, cooperation, and a balanced
    appreciation for both new ideas and established practices.
attributes:
  skills: '[''Cash handling'', ''Point-of-sale (POS) system operation'', ''Customer service communication'', ''Basic inventory management'', ''Fundamental bookkeeping'', ''Microsoft Office proficiency'',
