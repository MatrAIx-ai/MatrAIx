personas:
  professional: At 39, Lakesha Gooch is a seasoned educational guidance professional who blends data‑driven counseling tools with evidence‑based cognitive models, designing culturally responsive career‑readiness
    programs while energizing workshops with a charismatic, talkative presence that draws on their deep empathy and organized yet flexible approach.
  sports: Lakesha Gooch stays active through early‑morning jogs in the city park, weekly community yoga classes, and cheering on the Atlanta Hawks during the NBA season and the Atlanta Braves in baseball,
    while also playing recreational volleyball with a neighborhood league that offers both social connection and low‑impact exercise.
  arts: Lakesha Gooch channels creativity into community theatre, starring in productions that highlight underrepresented voices, leads a book club that dissects contemporary fiction and poetry from authors
    like Toni Morrison and Jesmyn Ward, and regularly attends jazz concerts featuring John Coltrane tributes and festivals celebrating cultural history.
  travel: Lakesha Gooch prefers purposeful travel, planning short cultural getaways to historic cities such as Savannah, Georgia, and New Orleans, Louisiana, where they can explore music scenes and culinary
    heritage, while also dreaming of an international pilgrimage to Dakar, Senegal to study West African music, all while balancing a tight family schedule and a modest travel budget.
  culinary: Lakesha Gooch is an avid home cook who transforms family soul‑food recipes—like collard greens simmered with smoked turkey, sweet‑potato pie, and spicy black‑eyed peas—into elaborate dinner
    parties, employing fresh herbs from their garden and experimenting with seasonal twists, while maintaining a kitchen skill level that comfortably ranges from stovetop comfort food to sous‑vide experimentation.
  core: Lakesha Gooch is a compassionate, socially‑engaged counselor who balances meticulous planning with creative spontaneity, channels worry into yoga and community service, and turns every gathering
    into a soulful celebration of heritage, music, and literature.
background:
  cultural: Lakesha identifies as an African‑American woman with deep roots in the Mid‑Atlantic region. Her family traditions blend Southern soul‑food cooking, church‑centered community life, and a strong
    emphasis on education. Growing up in the diverse corridors of Montgomery County, she was exposed to a mosaic of cultures, which sharpened her appreciation for multicultural perspectives and informed
    her inclusive counseling style. She actively celebrates Juneteenth, Black History Month, and local African diaspora festivals, and she incorporates the values of resilience, collective uplift, and storytelling
    into her professional practice. Her cultural heritage fuels her commitment to empowering Black students and families within the educational system.
