    jazz concerts","Traveling to cultural festivals","Writing personal reflections","Participating in book club"]'
  career_goals: Lakesha aspires to move into a leadership role such as Director of Student Services or Head of Career Development within a university or large school district. She plans to obtain her Licensed
    Professional Counselor (LPC) credential and a specialized certification in Diversity, Equity, and Inclusion. Over the next five years, she aims to design a comprehensive, culturally responsive career‑readiness
    program that blends innovative digital tools with proven counseling practices, and that integrates mental‑health support and stress‑reduction techniques for Black and first‑generation college students.
    She also hopes to author a guidebook on navigating college pathways for underrepresented youth, mentor emerging counselors, and champion policies that increase equitable access to post‑secondary opportunities.
