persona_description: Carl Binder was a bold and highly original Modernist painter and lithographer who was active in the United States and exhibited often in the 1920s and 1930s. He was born in Germany
  in 1887 and studied at the Knackfuss and Dusseldorf Art Academies. He won prizes each year from 1924 to 1928 at the Cleveland Museum of Art and was a member of Cleveland’s historic and flamboyant Kokoon
  Arts Club. Binder exhibited at the Art Institute of Chicago in 1929 and 1931, at the Pennsylvania Academy of the Fine Arts in Philadelphia in 1929 with his Modernist landscape Farm and Forest, and at
  the Corcoran Gallery of Art’s thirteenth biennial exhibition in Washington, D.C. in 1932. His lithographs, metal relief cuts, and paintings are in the collection of the Cleveland Museum of Art. Binder
  passed away in Harbor City, California in 1968.
