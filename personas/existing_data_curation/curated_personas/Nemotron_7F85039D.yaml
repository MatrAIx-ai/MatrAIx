personas:
  professional: Robert Rosenfeld, a 29‑year‑old construction foreman turned design‑technologist, leverages their BIM expertise, on‑site OSHA mastery, and structural know‑how to fuse imaginative, futuristic
    sketches into efficient build plans, while their relaxed stance toward rigid schedules and competitive edge drives them to push for modular, low‑carbon projects even if it means occasionally sidestepping
    traditional hierarchies.
  sports: Robert Rosenfeld, a 29‑year‑old who balances solo hikes through the North Georgia mountains with weekend shoots for the Atlanta Falcons’ fan club photo blog, regularly joins the local rock‑climbing
    gym “Stone Summit” and catches Atlanta United FC matches, preferring low‑key endurance activities over organized team sports, yet they occasionally forego scheduled team practices to explore new trails.
  arts: Robert Rosenfeld, at 29, immerses themselves in the visual arts by sketching futuristic skyscrapers in the margins of the High Museum’s modern exhibits, curating playlists of Miles Davis and Frank Zappa
    on their turntable, and drawing inspiration from street‑art legends like Banksy and architect‑artist Tadao Ando, which fuels their hybrid aesthetic.
  travel: Robert Rosenfeld, a 29‑year‑old adventure‑leaning explorer, favors spontaneous road trips to the Blue Ridge Parkway and weekend pilgrimages to New Orleans’ jazz districts, while they dream of
    a future design‑focused tour of Copenhagen’s sustainable neighborhoods and Japan’s high‑tech architecture hubs, all on a budget that prioritizes experience over extravagance.
  culinary: Robert Rosenfeld, a 29‑year‑old whose palate leans toward smoky Southern barbecue paired with experimental flavor twists—think bourbon‑glazed brisket tacos topped with cilantro and lime—mixes
    occasional home‑grown sourdough baking with frequent visits to the Atlanta BeltLine’s pop‑up food stalls, favoring bold spice blends like smoked paprika and chipotle, and they often treat themselves
    to a night of vinyl‑paired dinner parties.
  core: Robert Rosenfeld, a 29‑year‑old construction visionary, channels their love of futuristic design into both blueprints and vinyl grooves, balances a competitive edge with a laid‑back habit of spontaneous
    spending, and they combat occasional back pain with daily outdoor escapes.
background:
  cultural: Robert was raised in a middle‑class, secular family of European descent in the Atlanta suburbs of DeKalb County. His parents emphasized education, intellectual curiosity, and an appreciation
    for the arts, often taking him to museums, theater performances, and community festivals. Growing up in a diverse Southern metropolis, he absorbed elements of Southern hospitality and the region’s rich
    musical heritage while also maintaining a connection to his family's cultural traditions, which include celebrating holidays such as Thanksgiving and seasonal observances rooted in his ancestral background.
    This blend of Southern community values and a broader, globally‑oriented outlook shapes his eclectic tastes and open‑minded perspective.
