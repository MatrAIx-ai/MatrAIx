  career_goals: In five years, Robert aims to transition from foreman to project manager on large, mixed‑use developments that prioritize green building certifications. He plans to earn his PMP (Project
    Management Professional) and LEED AP (Accredited Professional) credentials, spearhead the adoption of modular construction and low‑carbon materials on his sites, and eventually launch a boutique construction
    firm that blends architectural artistry with cutting‑edge technology. Long‑term, he envisions becoming a thought leader who publishes case studies on integrating creative design within efficient construction
    processes.
