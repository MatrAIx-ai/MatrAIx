  hobbies: '[''Softball league participation'', ''Weekly church gatherings and potlucks'', ''Cajun music dancing'', ''Fishing in marshes'', ''Cooking Louisiana cuisine'', ''Neighborhood clean‑up volunteering'',
    ''Hiking nature trails'', ''Road trips around the Gulf Coast'', ''Listening to country and zydeco music'', ''DIY home improvement projects'']'
  career_goals: Alexis aims to obtain her Louisiana Certified Pest Control Operator license within the next year, then move into a supervisory role where she can mentor newer technicians. She is interested
    in expanding her skill set to include integrated pest management and environmentally‑friendly treatment options. In the longer term, she hopes to launch a small, family‑owned pest‑control business that
    emphasizes reliable service and community involvement, allowing her to maintain a stable income while staying close to the people and places she cares about.
