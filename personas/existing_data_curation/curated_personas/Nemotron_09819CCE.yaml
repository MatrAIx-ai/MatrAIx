personas:
  professional: Alexis Vang is a pest‑control technician on the Louisiana Gulf Coast who leverages a routine‑driven, safety‑first process to identify and treat common pests, communicates clearly with clients
    to build loyalty, leads crew training, and is currently studying for their Louisiana Certified Pest Control Operator license with aspirations to become a supervisor and eventually launch a community‑focused
    family pest‑control business, and they bring an outgoing, personable style to every service call.
  sports: Alexis Vang pitches for a local softball league, fervently supports the New Orleans Saints in the NFL, follows the New Orleans Pelicans in the NBA, and cheers on the Miami Marlins during spring
    training, all while keeping fit through weekend hikes on the Atchafalaya trail, and they relish the camaraderie of team sports and community competition.
  arts: Alexis Vang dances to the zydeco sounds of Clifton Chenier and BeauSoleil at weekly Cajun music nights, frequently attends community theater productions starring local talent, and enjoys the soulful
    storytelling of filmmaker Ava DuVernay, and they let music and performance shape their social gatherings.
  travel: Alexis Vang prefers low‑key, spontaneous road trips that whisk them from the marshes of Atchafalaya to Gulfport, Biloxi, and the historic streets of New Orleans, and they dream of a weekend getaway
    to Charleston’s waterfront and a future adventure to Acadia National Park’s rugged coastline.
  culinary: Alexis Vang cooks classic Louisiana dishes such as gumbo, jambalaya, and crawfish étouffée, often using Andouille sausage, fresh shrimp, okra, and homemade roux, and they delight friends at
    potlucks with their signature shrimp po’boy, showcasing a confident home‑cook skill set that blends tradition with improvisation.
  core: Alexis Vang blends a routine‑driven pest‑control career with an outgoing, community‑centered lifestyle, punctuated by a relaxed attitude toward schedules that fuels occasional spontaneous adventures,
    and they hold a deep love for outdoors, food, and music.
background:
  cultural: Alexis grew up in Erath, a small town in Vermilion Parish, where Southern hospitality and Cajun influences intersect. Though she identifies as white, her family has lived in the region for generations,
    absorbing the community’s emphasis on close‑knit relationships, church involvement, and seasonal festivals like the local food fairs. The area’s agricultural roots and proximity to the Gulf shape her
    appreciation for outdoor work and fresh produce, while the region’s blend of English and French heritage is reflected in the music, food, and phrases she encounters daily. This cultural mix reinforces
    her practical outlook, love of routine, and desire to maintain harmony within her social circles.
attributes:
  skills: '[''Pest identification'', ''Safe chemical handling'', ''Pesticide equipment operation'', ''Knowledge of Louisiana pest control regulations'', ''Customer service and communication'', ''Route planning
