personas:
  professional: Gregory Tullos, an aspiring logistics analyst, they leverage meticulous Excel budgeting and beginner‑level Python automation to streamline supply‑chain simulations while maintaining a disciplined,
    detail‑oriented workflow that reflects their preference for structure.
  sports: Gregory Tullos, an avid cyclist who charts weekly rides through La Mirada’s quiet streets and tracks performance metrics in spreadsheets, also follows the Los Angeles Dodgers and Los Angeles Lakers,
    and occasionally joins the La Mirada Cycling Club’s weekend group rides as well as a small local basketball pickup league.
  arts: Gregory Tullos, a reserved enthusiast of mystery and science‑fiction literature—favoring authors such as Agatha Christie and Isaac Asimov—spends evenings dissecting plot structures, draws photographic
    inspiration from Ansel Adams’s black‑and‑white landscapes, and unwinds to the cinematic scores of Hans Zimmer.
  travel: Gregory Tullos, a detail‑oriented traveler who meticulously plans weekend road trips to Joshua Tree and spring backpacking excursions in the Pacific Northwest while saving for a future study‑abroad
    semester in Tokyo, prefers solo or small‑group experiences that balance adventure with budgetary discipline.
  culinary: Gregory Tullos, an efficient home chef who batch‑cooks chicken teriyaki with soy sauce, rice, and broccoli for weekday meals, occasionally crafts spaghetti carbonara using pancetta and parmesan
    cheese, and treats themselves to fish tacos topped with fresh avocado and cilantro on weekends, all while relying on straightforward recipes and a modest kitchen setup.
  core: Gregory Tullos blends a disciplined, spreadsheet‑driven mindset with solitary hobbies like model building and reading, yet secretly indulges in spontaneous midnight gaming marathons that betray
    their otherwise methodical nature.
background:
  cultural: He was raised in a middle-class, white, suburban family in La Mirada, California. His parents are of mixed European ancestry—his father’s lineage includes Irish and German roots, while his mother’s
    background is Italian-American. The family emphasizes practical values such as responsibility, punctuality, and community involvement, reflecting both traditional middle-American work ethic and Southern
    California’s relaxed lifestyle. Gregory grew up celebrating typical American holidays—Thanksgiving, Fourth of July, and Christmas—often with neighborhood barbecues and community events. He attended
    a local public high school where a diverse student body gave him exposure to various cultures, though his household maintained cultural traditions like Sunday morning church attendance (Methodist) and
    family gatherings centered on home-cooked meals. This blend of suburban LA culture, European heritage, and family emphasis on structure shapes his worldview.
