  career_goals: Gregory aims to enroll in a community college to earn an associate’s degree in Business Administration, with a long-term goal of becoming a logistics manager or supply-chain analyst. He
    values predictable career paths and is drawn to roles that combine organization, data analysis, and teamwork. In the meantime, he plans to obtain entry-level certifications such as CompTIA A+ to qualify
    for IT support positions, providing a stable income while he continues his studies. He also considers joining the Navy Reserve to experience disciplined service and acquire technical training in electronics.
