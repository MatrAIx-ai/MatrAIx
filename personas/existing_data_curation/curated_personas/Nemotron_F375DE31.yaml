  career_goals: Oksana aims to translate her compassionate nature and practical skills into a stable, routine‑oriented career in health support. She plans to enroll in a Certified Nursing Assistant (CNA)
    program within the next year, obtain certification, and work part‑time at a local senior center or home‑health agency in San Antonio. Over the next five years she hopes to advance to a supervisory aide
    role while pursuing an associate degree in health sciences at a community college. She also dreams of eventually launching a modest home‑based baking service that can supplement her income and serve
    her community.
