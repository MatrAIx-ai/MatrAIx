  career_goals: Even at 97, Emily’s ambitions focus on staying active, independent, and connected. She aims to maintain her health to celebrate her upcoming centennial with family, continue volunteering
    at the senior center and church, mentor younger relatives in cooking, budgeting, and crafting, document her life story in a memoir for future generations, and contribute to the local historical society
    by sharing photographs and oral histories of Massillon’s mid‑century era.
