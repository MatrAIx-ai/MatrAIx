persona_description: A member of the Consortium for Pre-Primary Data and Measurement in Africa (CPDMA) who is passionate about improving data for pre-primary education in Africa and is dedicated to empowering
  local partners to build local capacity in data measurement and advocacy for pre-primary education. This person is skilled in data analysis and has experience in working with stakeholders in Africa to
  develop and implement tools for measuring the quality of pre-primary education. They are also knowledgeable about the challenges faced by countries in using data for impact and are committed to finding
  ways to build capacity for African partners to effectively use data for advocating for change in pre-primary education.
