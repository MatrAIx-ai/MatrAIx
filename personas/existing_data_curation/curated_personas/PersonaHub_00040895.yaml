persona_description: A woman who is passionate about advocating for gender equality in the workplace and believes that women should not have to emulate men to be successful. She is a registered Industrial
  Psychologist who has conducted research on the lack of female role models at the top of business and the need for all employees to be encouraged to act and behave as themselves without feeling like they
  are limiting their careers. She is dedicated to leveling the playing field between the two sexes without discriminating against either.
