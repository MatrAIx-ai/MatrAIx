  hobbies: '["Vegetable Gardening", "Reading Practical Non‑Fiction", "Community Book Club", "Yoga", "Volunteering at the Local Library", "DIY Home Organization Projects", "Listening to Productivity Podcasts"]'
  career_goals: Alexandria aims to advance from her current administrative role into a senior executive assistant or office manager position within the next three to five years. She plans to earn a Certified
    Administrative Professional (CAP) credential and complete an associate’s degree in business administration to deepen her strategic understanding of office operations. Her longer‑term ambition includes
    leading process‑improvement projects that reduce workflow inefficiencies, mentoring junior staff, and eventually overseeing a small team of administrative professionals. She also envisions leveraging
    her organizational expertise to help a local nonprofit streamline its volunteer coordination and event logistics.
