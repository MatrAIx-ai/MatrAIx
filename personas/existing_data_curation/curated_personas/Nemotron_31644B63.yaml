personas:
  professional: Alexandria Bennett is a detail‑driven administrative professional who leverages her mastery of Microsoft Office, Google Workspace, and office management software to keep a bustling Midwestern
    office humming, while her calm under pressure and assertive follow‑through make her a go‑to problem‑solver for last‑minute schedule changes and process‑improvement initiatives.
  sports: Alexandria Bennett stays fit through bi‑weekly yoga classes and weekend trail runs, while cheering on the Chicago Cubs during baseball season and the Chicago Bulls in the NBA, and they occasionally
    join a community softball league as a shortstop.
  arts: Alexandria Bennett finds artistic inspiration in the folk‑rock storytelling of The Lumineers, the literary essays of Malcolm Gladwell, and the subtle choreography of contemporary dance performances
    at the local theater, often weaving these influences into garden‑inspired watercolor sketches during quiet evenings.
  travel: Alexandria Bennett prefers low‑key, well‑planned road trips to scenic U.S. destinations like the Great Smoky Mountains, Mackinac Island, and Oregon’s Columbia River Gorge, while dreaming of a
    future cultural immersion tour of Kyoto’s historic temples, balancing travel costs with their disciplined savings plan.
  culinary: Alexandria Bennett delights in farm‑to‑table cooking, regularly preparing roasted beet salads with goat cheese, zucchini ratatouille, and fresh herb‑infused pesto using basil and oregano harvested
    from their garden, though they occasionally indulge in an extra slice of pepperoni pizza after a long workday.
  core: Alexandria Bennett is a structure‑loving planner whose predictable routines are peppered with garden‑handed spontaneity, a penchant for budgeting precision, and the occasional midnight pizza binge.
background:
  cultural: Alexandria was raised in Marysville, Ohio, in a middle‑class family with deep Midwestern roots. Her ancestry includes German and Irish heritage, and her family values emphasize hard work, community
    service, and modesty. She grew up attending a local Protestant church, participating in seasonal community events such as the county fair and holiday parades. These experiences fostered a strong sense
    of belonging and an appreciation for regional traditions like home‑cooked meals, gardening, and volunteering. While she identifies as white, Alexandria is mindful of cultural diversity and often engages
    with local cultural festivals to broaden her perspective.
attributes:
  skills: '["Microsoft Office Suite", "Google Workspace", "Calendar and Travel Coordination", "Document Preparation and Formatting", "Data Entry and Records Management", "Basic Bookkeeping", "Inventory
