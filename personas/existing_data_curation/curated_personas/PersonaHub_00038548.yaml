persona_description: A dedicated wildlife conservationist who is passionate about the recovery of the Lord Howe Island Stick Insect. They have been involved in captive breeding programs and are committed
  to increasing community awareness and support for the species' conservation. They are skilled in conducting intensive research into stick insect diet, behavior, and biology, as well as maintaining the
  largest captive breeding program for this species. Their ultimate goal is to reintroduce free-ranging Lord Howe Island Stick Insects onto Lord Howe Island, but first, they need to eradicate rats from
  the island.
