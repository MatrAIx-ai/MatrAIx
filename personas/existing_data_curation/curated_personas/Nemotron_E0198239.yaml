  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Book club participation'', ''Community theater acting'', ''Volunteering at the historical society'', ''Organizing
    local art fairs'', ''Cooking Southern and Italian dishes'', ''Gardening'', ''Hiking in state parks'', ''Recreational basketball league'']'
  career_goals: Willie aims to move from cashier to shift supervisor and eventually store manager within his retail chain, seeking a formal certification in retail management to solidify his leadership
    credentials. Parallel to his retail career, he plans to launch a part‑time venture that curates and sells regional folk art and handcrafted items, using his humanities background to connect local artists
    with the community and tourists. He also hopes to mentor younger employees, sharing his expertise while continuing to expand his knowledge of art and cultural programming.
