personas:
  professional: Selena Willis, a community‑centered early childhood educator, leverages their calm resilience and knack for both structured lesson plans and spontaneous play to foster inclusive learning
    environments that celebrate seasonal traditions like apple picking and maple‑syrup making.
  sports: Selena Willis enjoys sledding in winter and swimming in the local lake during summer, follows the New England Patriots and Boston Red Sox avidly, and, as a toddler, participates in the Manchester
    Little League Tigers soccer program where they chase the ball with boundless energy.
  arts: Selena Willis delights in folk music, often humming the gentle tunes of Iron & Wine and the lively fiddle of Sarah Jarosz, spends weekends at the Manchester Community Arts Center for children's
    theater workshops, and eagerly watches animated films featuring the voice of Lin‑Manuel Miranda.
  travel: Selena Willis, traveling with family, has already visited Boston for a Fourth of July fireworks display and taken a weekend road trip to the White Mountains for leaf‑peeping, while dreaming of
    future adventures to Quebec’s maple orchards and the historic streets of Boston.
  culinary: Selena Willis shows an early palate for sweet flavors, especially fresh maple syrup drizzled over apple‑cinnamon pancakes, enjoys occasional pureed butternut squash, and, as they grow, will
    learn to assist in the kitchen slicing crisp apples for a classic New England apple crisp.
  core: Selena Willis blends an innate calm resilience with a love for spontaneous play, thrives on community rituals like maple‑syrup making, and occasionally forgets to stay organized, especially when
    juggling toys and bedtime routines.
background:
  cultural: Selena is born into a White New England family in Manchester, New Hampshire. Her household values community involvement, seasonal traditions such as apple picking, maple‑syrup making, and Fourth
    of July celebrations. The family observes Christian holidays while emphasizing kindness, cooperation, and respect for others. Proximity to Dartmouth College and the surrounding natural landscape informs
    an appreciation for education, outdoor recreation, and inclusive community events, shaping a culturally grounded yet open‑minded upbringing.
attributes:
  skills: '["sensory awareness", "fine motor coordination", "early language comprehension", "emotional calmness", "social responsiveness"]'
  hobbies: '["music and movement classes", "building blocks", "interactive storytime", "group playdates", "nature walks", "dance to children''s songs", "puzzle toys", "drawing with crayons", "singing nursery
    rhymes"]'
  career_goals: As she grows, Selena envisions a career that blends her love for structure with her spontaneous, people‑focused energy. She aspires to become an early childhood educator or pediatric health
    professional, creating nurturing, predictable environments while encouraging flexible, creative learning. She hopes to earn a degree in education or public health, lead community programs that promote
    wellbeing for families, and eventually shape policies that support inclusive, collaborative early‑learning spaces.
