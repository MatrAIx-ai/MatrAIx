persona_description: A Torah scholar and Talmudic expert who seeks rigorous and comprehensive definitions of what constitutes Torah and what does not. This individual is particularly interested in the works
  of Maimonides, Saadia Gaon, and the Chovot Levavot. They recognize the importance of heresy and moral relativism in the Talmud and have a strong understanding of the naturalistic fallacy. They are also
  knowledgeable about the law of the excluded middle and the correspondence theory of truth, which they apply to the interpretation of the Talmud.
