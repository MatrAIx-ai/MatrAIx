persona_description: A researcher who specializes in the study of invasive species, particularly those that have invaded human-constructed habitats. They have conducted extensive fieldwork and citizen science
  campaigns to identify and quantify the distribution and abundance of invasive species in North American houses. Their research interests include the biology and ecology of invasive species, as well as
  the impacts they have on local ecosystems. They are particularly interested in the exotic species that have become a common presence in eastern houses, such as the Asian Diestrammena asynamora (Adelung),
  and are working to better understand their interactions with native species and the broader environmental context in which they are found.
