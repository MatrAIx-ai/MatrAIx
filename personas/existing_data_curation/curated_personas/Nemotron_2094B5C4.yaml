personas:
  professional: Viviana Ayala, a bilingual community organizer with a knack for meticulous event coordination, is re‑entering the workforce as a part‑time community health navigator for Spanish‑speaking
    seniors in Tampa, blending their associate’s degree in Business Administration with their disciplined project‑management style and a passion for patient advocacy, and they apply their organized mindset
    to streamline intake processes.
  sports: Viviana Ayala stays active by attending weekly salsa dancing classes, practicing gentle yoga at Sunrise Yoga Studio, and cheering on the Tampa Bay Buccaneers during football season, while they
    also participate in a local gardening club that hosts seasonal harvest festivals, blending social fun with light exercise.
  arts: Viviana Ayala nurtures their creative side through photography of Tampa’s park landscapes inspired by Ansel Adams, while they devote evenings to quilting and knitting to the soothing sounds of Louis
    Armstrong, and they explore literary fiction by Toni Morrison and historical biographies of Maya Angelou, regularly attending cultural performances at the Straz Center featuring ballet and orchestral
    concerts.
  travel: Viviana Ayala favors carefully planned road trips along Florida’s Gulf Coast, having explored the historic streets of St. Augustine, the vibrant markets of Key West, and a weekend getaway to the
    Bahamas, while they dream of a cultural pilgrimage to Seville, Spain, though they balance travel ambitions with the need to support their senior outreach commitments and an emerging catering business.
  culinary: Viviana Ayala enjoys cooking classic island dishes such as a slow‑cooked shredded pork stew, black beans and rice, and yucca with mojo sauce, while they experiment with modern twists like quinoa‑based
    plantain fritters and mango‑glazed chicken; they favor fresh cilantro, garlicky oregano, plantains, and local Gulf shrimp, and their cooking skill sits at an intermediate level, often hosting small
    dinner gatherings for friends and church members.
  core: Viviana Ayala is a detail‑oriented, bilingual community champion who blends disciplined organization, a love for heritage‑rooted cooking, and a steady, nurturing spirit into every facet of their
    life, from health advocacy to garden‑to‑table meals, even as they occasionally forget to water the succulents on busy weeks.
background:
  cultural: Viviana is a first‑generation Cuban‑American whose parents immigrated to Florida in the 1970s. Raised in Tampa’s vibrant Cuban community, she grew up speaking Spanish at home, celebrating traditions
    such as Carnaval, Día de la Cultura, and the Feast of San Juan, and participating in local cultural clubs. Her upbringing blended Cuban family values, Catholic faith, and the warmth of a close‑knit
    neighborhood, fostering a strong sense of harmony and community responsibility. While fully integrated into American life—holding a driver’s license, voting, and engaging in local civic activities—she
    remains deeply connected to her heritage through music, cuisine, and intergenerational storytelling.
