  hobbies: '[''Cuban cooking and recipe development'', ''Tropical gardening'', ''Salsa dancing'', ''Reading historical biographies and literary fiction'', ''Genealogy research'', ''Community volunteering
    with senior outreach'', ''Yoga and tai chi'', ''Nature photography'', ''Quilting and knitting'']'
  career_goals: Viviana aims to leverage her organizational talent and bilingual skills to re‑enter the workforce in a part‑time role as a community health navigator or patient‑advocate for Spanish‑speaking
    seniors in Tampa. She plans to enroll in a bachelor's program in public health to deepen her knowledge of health education. Concurrently, she hopes to launch a small home‑based catering business that
    showcases modern twists on classic Cuban dishes, providing a sustainable source of income while preserving cultural heritage. Long‑term, she envisions establishing a mentorship program that connects
    Cuban‑American youth with professionals in health and business fields.
