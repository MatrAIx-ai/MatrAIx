  career_goals: Maxine aims to pursue a college degree in health-care administration or nursing, where she can combine her detail-oriented mindset with her desire to help others. She plans to take on leadership
    roles in student council and community service projects during high school to build experience in managing teams and resources. Ultimately, she envisions a career as a nurse manager or health-care administrator
    who designs efficient, patient-centered clinic operations and leads outreach programs in her community.
