personas:
  professional: Maxine Burguera is a budding game developer who creates simple Scratch projects; they apply their methodical problem‑solving and love for clear plot structures to turn narrative ideas into
    interactive experiences while maintaining a disciplined schedule that mirrors their bullet‑journal planning.
  sports: Maxine Burguera swims five mornings a week with the Lawrenceville Aquatic Club, follows the New York Knicks basketball season with a statistics‑focused approach, and supports the Philadelphia
    Eagles football team; they balance structured training with occasional weekend pick‑up games at the local community pool.
  arts: Maxine Burguera plays piano pieces ranging from Beethoven’s Moonlight Sonata to contemporary pop arrangements of Taylor Swift; they enjoy reading the "Throne of Glass" series by Sarah J. Maas and
    frequently watch performances by the New Jersey Ballet, citing pianist Lang Lang as their artistic inspiration.
  travel: Maxine Burguera plans vacations in their bullet journal, has visited Washington D.C.’s Smithsonian museums with family, dreams of exploring Kyoto’s cherry‑blossom festivals, and prefers structured
    itineraries that mix educational stops with relaxed evening strolls.
  culinary: Maxine Burguera loves assembling simple meals like spaghetti carbonara with pancetta, making sushi rolls with cucumber and avocado, and baking blueberry muffins; they admit to over‑seasoning
    dishes when experimenting, but enjoy trying new flavors only after checking recipes in their journal.
  core: Maxine Burguera blends a love for structure and creative expression, juggling piano recitals, swim laps, Scratch coding, and meticulous bullet‑journal planning while occasionally indulging in spontaneous
    manga splurges.
background:
  cultural: Maxine comes from a family with Latino roots—her parents emigrated from Cuba—but she identifies as white and was raised in the suburban community of Lawrenceville, Georgia. Her household blends
    Southern American customs, such as celebrating Thanksgiving and Fourth of July barbecues, with Hispanic traditions, including cooking plantain dishes, listening to Latin music, and speaking Spanish
    at home. This bicultural environment has fostered her appreciation for community service and family gatherings, influencing both her personal values and her desire to help others.
