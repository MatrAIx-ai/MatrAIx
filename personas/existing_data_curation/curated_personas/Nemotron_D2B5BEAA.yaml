  career_goals: Ruth aspires to become a civil engineer or architect, driven by her fascination with how things are built and her desire to create practical, sustainable solutions for her community. She
    dreams of attending a specialized STEM high school in Houston, then pursuing a university degree in engineering, where she can combine her love for puzzles, organization, and innovative design to improve
    neighborhoods and public spaces.
