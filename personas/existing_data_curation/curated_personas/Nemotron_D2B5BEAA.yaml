personas:
  professional: Ruth Knight, a budding robotics enthusiast, brings methodical coding expertise and a competitive edge to her school’s robotics club, where they plan elaborate builds, rigorously test each
    prototype, and meticulously document every iteration.
  sports: Ruth Knight, a forward for the Greenfield Youth Soccer Club, revels in competitive matches against the City Tigers, eagerly follows the LA Galaxy and the U.S. Women’s National Team, and they train
    twice weekly to sharpen both footwork and teamwork.
  arts: Ruth Knight, an avid cartoon sketcher and folk-dance participant, channels their creative energy into drawing comic strips inspired by Pixar’s Inside Out and Studio Ghibli’s aesthetic, while they
    frequently listen to Billie Eilish and idolize voice actor Tara Strong.
  travel: Ruth Knight, who plans vacations with a spreadsheet, enjoys family trips to the Kennedy Space Center and LEGOLand California, dreams of exploring Tokyo’s Akihabara circuit board market, and they
    balance their love of adventure with a cautious budget that limits long-haul travel.
  culinary: Ruth Knight, who helps prepare carnitas tacos and sweet corn tamales at home, delights in chopping cilantro, grating cheese, and shaping masa, and they proudly claim the title of Junior Chef
    while still mastering the art of perfect salsa.
  core: Ruth Knight is a competitively curious 10-year-old who blends methodical robotics prowess with a love for folk dance, tacos, and strategic saving, all while they juggle a vivid imagination and occasional
    snack-driven impulsivity.
background:
  cultural: Ruth is a Mexican‑American girl raised in Houston, Texas, within a close‑knit family that celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered
    around homemade foods like tamales and mole. She speaks Spanish at home and English at school, giving her a bilingual perspective that enriches her social interactions. The vibrant Hispanic community
    of Houston, with its festivals, music, and community events, provides Ruth with a strong sense of cultural pride and influences her interests in dance, cooking, and community‑focused projects.
