    community festivals'', ''Playing competitive video games (racing/shooter)'']'
  career_goals: Michael aims to move from a frontline courier role into a supervisory or logistics‑management position within the next few years. He plans to earn a supply‑chain management certification
    and leverage his on‑the‑ground experience to oversee a team of drivers, optimizing routes and integrating new delivery technologies such as electric vehicles and automated tracking systems. In the longer
    term, he dreams of launching his own boutique same‑day delivery service that caters to small businesses in Monroe, emphasizing reliability and a personal touch. Alongside these ambitions, he wants to
    improve his own organizational skills, earn recognition for consistent on‑time performance, and continue mentoring younger couriers.
