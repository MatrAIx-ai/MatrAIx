  career_goals: Looking ahead, Sara aims to shift from a senior analyst role into a strategic leadership position where she can mentor emerging talent and shape data-driven decision making at an organizational
    level. She aspires to become a Director of Analytics or a Chief Data Officer for a nonprofit focused on community development or environmental sustainability in Ocean County, using her expertise to
    drive projects that benefit local residents. In parallel, she hopes to launch a boutique consultancy that blends quantitative insight with cultural programming, helping arts organizations leverage data
    for audience development. Throughout these goals, she remains committed to fostering collaborative, supportive team environments and ensuring her work aligns with broader societal values of harmony
    and stewardship.
