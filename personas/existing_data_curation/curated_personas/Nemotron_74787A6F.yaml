  hobbies: '[''Watercolor painting'', ''Nature walks and birdwatching'', ''Reading classic literature and poetry'', ''Knitting and crocheting'', ''Gardening'', ''Creative writing (journaling, memoir)'',
    ''Listening to folk and classical music'', ''Community storytelling events'', ''Attending local craft fairs'']'
  career_goals: Although retired, Nancy aims to channel her lifelong curiosity into tangible projects. She hopes to complete a series of watercolor paintings that capture the seasonal changes of Madison’s
    lakes and forests, culminating in a community exhibition. She plans to write and self‑publish a memoir intertwining her personal history with the oral histories of her town, preserving local heritage.
    Nancy also aspires to mentor emerging artists through a weekly senior‑center art workshop, and to coordinate an intergenerational storytelling program that pairs seniors with schoolchildren. Finally,
    she wishes to deepen her knowledge of abstract art theory through online courses, keeping her mind engaged and vibrant.
