  career_goals: Yong aims to translate his curiosity and practicality into an entrepreneurial venture that lets him work flexibly while leveraging his technical abilities. In the next few years he hopes
    to launch a mobile electronics repair service or a custom bike‑modification shop that serves the South Holland area, and he plans to return to college to complete a degree in engineering or a related
    field to broaden his expertise. He also envisions doing freelance web or app development on the side, allowing him to balance income with creative freedom.
