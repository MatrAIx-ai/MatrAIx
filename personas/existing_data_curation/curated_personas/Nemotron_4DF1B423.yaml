  hobbies: '[''Watercolor painting'', ''Sketching'', ''Hiking'', ''Poetry readings'', ''Open‑mic participation'', ''Sustainable gardening'', ''Experimental cooking'', ''Yoga'', ''Meditation'', ''Reading
    speculative fiction'', ''Philosophy'', ''Volunteer mentoring in creative writing'']'
  career_goals: Linda aims to re-enter the workforce through a hybrid path that blends her artistic passions with community impact. In the next two years she plans to complete a Bachelor of Fine Arts to
    deepen her theoretical grounding. Parallel to her studies, she intends to launch a freelance studio that offers nature-inspired branding and illustration services for local small businesses, targeting
    at least three regular clients within the first year. She also wants to secure a part-time role as a community arts coordinator with a non-profit or municipal cultural department, where she can design
    and facilitate interdisciplinary workshops that combine visual art, creative writing, and mindfulness for adults navigating life transitions. Long-term, she envisions building an online boutique (e.g.,
    Etsy) to sell original prints and limited-edition artwork, achieving financial independence while nurturing a supportive local arts network.
