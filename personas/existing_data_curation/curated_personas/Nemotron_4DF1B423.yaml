personas:
  professional: A freelance illustrator and budding community arts coordinator, Linda Mazzolini blends Adobe Creative Suite mastery with watercolor landscapes of the Columbia River Gorge, and they channel
    their imagination into nature-inspired branding for local businesses while orchestrating interdisciplinary workshops that fuse visual art, creative writing, and mindfulness.
  sports: An avid hiker and trail-enthusiast, Linda Mazzolini laces up their boots for weekly expeditions along the Columbia River Gorge, participates in a local "Cascade Trails Club" meetup, follows the
    Seattle Seahawks and Portland Timbers, and they also occasionally join a community yoga league that doubles as a low-impact fitness class.
  arts: Linda Mazzolini's artistic pulse beats to the rhythm of watercolor washes and spoken-word nights, they regularly showcase sketches inspired by the river's mist, quote poetry by Mary Oliver, draw
    inspiration from speculative-fiction author N.K. Jemisin, and they curate pop-up murals that feature motifs from Sufjan Stevens' folk melodies.
  travel: Linda Mazzolini fuels their wanderlust with weekend drive-outs to the Oregon coast, day trips to the historic Columbia River Gorge, a memorable hike through Sedona's Red Rock State Park, and a
    long-planned pilgrimage to the Scottish Highlands, they prefer modest camp-fire accommodations over luxury resorts to stay within a modest freelance budget.
  culinary: Linda Mazzolini experiments in the kitchen like a painter with a palette, they craft seasonal dishes such as roasted beet and goat cheese salad, miso-glazed carrots with fresh thyme, and a wild
    mushroom risotto seasoned with rosemary from their herb garden, while their favorite pantry staples remain heirloom tomatoes, smoked paprika, and a splash of locally sourced honey.
  core: Linda Mazzolini is an imaginative 47-year-old who transforms hikes, herb beds, and midnight poetry into vibrant freelance art, they balance meticulous budgeting with occasional splurges on pigments,
    all while juggling yoga, a penchant for late-night coffee, and a stubborn habit of forgetting to water the indoor succulents.
background:
  cultural: Linda is a white American of Italian descent; the surname Mazzolini traces back to northern Italy, and her family retained a few cultural traditions such as celebrating Catholic holidays, preparing
    homemade pasta, and gathering for Sunday family meals. She grew up in the Pacific Northwest, where the region's emphasis on environmental stewardship, outdoor recreation, and a vibrant, progressive
    arts scene shaped her worldview. The blend of her Italian heritage's focus on craftsmanship and community, together with the Pacific Northwest's eclectic, socially conscious culture, informs her appreciation
    for collaborative art projects, sustainable practices, and a strong sense of local identity. Her recent separation has further prompted her to explore personal independence while maintaining ties to
    the supportive arts community in Vancouver, WA.
attributes:
  skills: '[''Graphic design'', ''Digital illustration'', ''Creative writing'', ''Event planning'', ''Project coordination'', ''Grant writing'', ''Volunteer management'', ''Web design (WordPress)'', ''Social
