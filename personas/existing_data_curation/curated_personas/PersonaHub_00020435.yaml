persona_description: A scientist who studies paleoclimate and ancient DNA to understand the effects of climate change on the extinction of megafauna. She is particularly interested in the role of rapid
  climate change and human activities in the decline of Earth's biggest, baddest animals. She is currently conducting research on the Pleistocene extinction of wooly mammoths and the role of rapid warming
  events in their demise. She is also a strong advocate for the protection of the environment and the importance of understanding past climate change events for predicting future environmental changes.
