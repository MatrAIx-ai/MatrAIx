  career_goals: Lori aims to transition from hands‑on janitorial work to a supervisory facility manager role where she can mentor younger employees and implement sustainable cleaning practices across multiple
    sites. Simultaneously, she hopes to formalize her passion for the arts by volunteering as a docent at the local historical museum and eventually leading community workshops that blend art appreciation
    with everyday spaces.
