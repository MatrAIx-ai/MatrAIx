    social skills (sharing, taking turns, expressing needs calmly)", "Resilience in handling minor setbacks during play"]'
  hobbies: '["Building with wooden blocks and LEGO", "Reading picture books about space and animals", "Collecting rocks and observing insects", "Sketching nature discoveries", "Playing memory matching and
    simple board games", "Drawing and coloring", "Dancing to music", "Listening to family storytelling and cultural songs"]'
  career_goals: Although only five, Carrie imagines a future where she can explore, create, and help others. She often says she wants to become an astronaut to see the stars up close, but she also dreams
    of being an engineer who builds bridges and robots. She is drawn to the idea of being a teacher because she enjoys explaining how things work to her stuffed animals, and she likes the thought of a doctor
    who can help people feel better. Her practical side leads her to think about jobs that let her use her hands, like a carpenter or a wildlife ranger, and her competitive streak pushes her to aim for
    the top of her class when she eventually goes to school.
