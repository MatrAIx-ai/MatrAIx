personas:
  professional: Carrie Royal is a budding preschool organizer who loves leading circle‑time story sessions, using their curiosity and calm resilience to keep playgroups structured yet flexible.
  sports: Carrie Royal enjoys preschool soccer on the Grantsville Tiny Tigers League, practices gymnastics with the Grantsville Little Rhythmic Gymnastics Club, eagerly chants for the Utah Jazz and Real
    Salt Lake, and they balance a competitive drive with a love for organized, seasonal play.
  arts: Carrie Royal delights in the children's choir at their local Baptist church, humming gospel classics from legends like Aretha Franklin and contemporary pop tunes from Beyoncé, while they draw vibrant
    collages using bright fabrics from grandparents’ sewing box, which fuels their creative identity.
  travel: Carrie Royal prefers short family road trips, cherishing visits to the annual cultural festival in Salt Lake City, dreaming of the lively music scene in New Orleans, and they enjoy weekend camping
    adventures in the Wasatch Mountains.
  culinary: Carrie Royal loves helping whisk together mac and cheese, proudly seasons fried chicken with a pinch of paprika, savors collard greens drizzled with honey butter, and can flawlessly stir a pot
    of sweet‑potato pie filling using a wooden spoon, though they still get messy with flour.
  core: Carrie Royal blends a Southern‑style love for community storytelling with a frontier spirit of independence, they organize play with calm confidence, save pennies like a tiny banker, and dream of
    big‑city music festivals.
background:
  cultural: Carrie is raised in a Black family that celebrates a blend of Southern heritage and Utah’s frontier spirit. Her grandparents frequently share stories, recipes, and songs from their hometowns,
    teaching her about traditional soul food, gospel music, and the importance of community gatherings. The family attends a local Baptist church where she participates in children’s choir rehearsals, learning
    rhythms and call‑and‑response chants. Although Grantsville’s population is predominantly white, her parents make a conscious effort to introduce her to broader Black cultural experiences, such as reading
    books by African‑American authors, watching documentaries about Black innovators, and celebrating Juneteenth with a small backyard picnic. This mixture of home traditions, church community, and occasional
    trips to nearby larger cities for cultural festivals helps Carrie develop a strong sense of identity, pride, and curiosity about her heritage while also feeling connected to the local environment.
attributes:
  skills: '["Basic reading (recognizing letters and simple words)", "Counting and simple addition up to 20", "Fine motor coordination (drawing, coloring, cutting with safety scissors)", "Following multi‑step
