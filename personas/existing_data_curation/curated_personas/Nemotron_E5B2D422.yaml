  hobbies: '[''hiking'', ''birdwatching'', ''nature photography'', ''reading'', ''creative writing'', ''journaling'', ''acoustic guitar'', ''seasonal cooking'', ''home gardening'', ''knitting'', ''stargazing'']'
  career_goals: Christina aims to build a sustainable remote career that merges her love of nature, research, and visual storytelling. Her primary goal is to become a freelance environmental content creator,
    producing articles, photo essays, and short documentaries for NGOs, educational platforms, and eco‑focused media outlets. She plans to supplement this with part‑time remote research assistance for a
    regional conservation nonprofit, eventually positioning herself as an independent environmental consultant who provides data‑driven recommendations and outreach materials. Alongside her professional
    aspirations, she hopes to develop a modest online store selling prints of her nature photography and handcrafted garden accessories, allowing her to maintain financial independence while preserving
    a flexible, solitary work environment.
