personas:
  professional: Qiu Lee, a 23‑year‑old wholesale sales representative in manufacturing, leverages bilingual fluency and rapid rapport‑building to secure deals while juggling a love for flexible scheduling,
    balancing a preference for predictable processes with a laid‑back approach to daily planning.
  sports: Qiu Lee, a devoted participant in Echo Park’s Saturday night pickup basketball and a regular fan of the Los Angeles Lakers, also follows the LA Galaxy during MLS season, balancing high‑energy
    court sessions with a casual jogging routine and weekly attendance at local community sports festivals.
  arts: Qiu Lee thrills at karaoke sessions belting out hits by Jay Chou and Ariana Grande, frequently streams indie films featuring directors like Wong Kar‑Wai, and appreciates graffiti art along the Arts
    District, often citing Banksy and local muralist Victor Niz as inspirations.
  travel: Qiu Lee prefers spontaneous weekend getaways to coastal towns like Santa Barbara and the desert oasis of Palm Springs, yet dreams of an organized summer backpacking tour across Japan’s Kansai
    region, balancing a flexible budget with a desire for immersive cultural experiences.
  culinary: Qiu Lee, an adventurous eater who frequents LA’s Little Tokyo for ramen and the Grand Central Market for tacos al pastor, also hones moderate cooking skills at home by mastering homemade jiaozi
    dumplings with pork, chives and ginger, and occasionally mixes Sichuan peppercorns into fusion stir‑fry bowls.
  core: Qiu Lee blends a yearning for orderly sales processes with a carefree love of impromptu basketball games and karaoke marathons, a habit of last‑minute budgeting and a tendency to misplace receipts,
    all while staying relentlessly upbeat and people‑focused.
background:
  cultural: Qiu was born to Taiwanese immigrants who settled in Rosemead’s vibrant Chinatown‑like enclave, where Chinese language, food, and traditions remain a daily presence. Growing up, he attended a
    weekend Chinese school, celebrated Lunar New Year and Mid‑Autumn Festival with his family, and helped in the family’s small grocery business, which gave him early exposure to wholesale operations. This
    blend of traditional East Asian values—such as respect for elders, collectivism, and hard work—and the dynamic multicultural environment of Los Angeles has shaped his worldview, communication style,
    and work ethic.
attributes:
