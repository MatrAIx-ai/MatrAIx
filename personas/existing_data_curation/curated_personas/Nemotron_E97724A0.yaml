  hobbies: '["Basketball (Pickup)", "Karaoke", "Cooking Chinese Cuisine", "Community Festival Volunteering", "Food Truck Exploration", "Multiplayer Online Gaming", "Live Music Events"]'
  career_goals: Qiu’s short‑term goal is to become a top‑performing sales rep and earn a promotion to sales supervisor within the next 18‑24 months. In the longer term, he aims to obtain his GED and a sales‑management
    certification, eventually moving into a regional sales manager position or launching his own distribution venture that caters to the growing Asian‑American market in Southern California.
