  career_goals: Tuyen aims to secure a full-time software engineering position at a leading Silicon Valley firm, focusing on backend systems or data engineering where she can apply her analytical strengths.
    She plans to build a portfolio of personal projects and open-source contributions to demonstrate competence, and later pursue a master's degree in computer science to deepen her expertise. Long-term,
    she aspires to lead a small development team, designing reliable, scalable services while maintaining a structured, results-driven work environment.
