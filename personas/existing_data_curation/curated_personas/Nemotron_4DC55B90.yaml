personas:
  professional: Maribel Jeanleger, a front‑line retail supervisor, leverages their bilingual fluency, meticulous scheduling, and data‑driven performance coaching to forge a structured, competitive leadership
    style that keeps store operations efficient and team morale high.
  sports: Maribel Jeanleger, co‑ed soccer team captain in the Orange County Fusion Sunday League, draws tactical inspiration from the LA Galaxy and LA Lakers, and balances competitive practice sessions
    with weekend hikes along the Laguna Coast Wilderness to maintain stamina.
  arts: Maribel Jeanleger, an avid salsa dancer and leadership‑book enthusiast, moves to the classics of Celia Cruz and Marc Anthony at community cultural centers, while finding strategic inspiration in
    Simon Sinek’s writings and admiring the bold colors of Frida Kahlo’s canvases during gallery visits.
  travel: Maribel Jeanleger, a planner who blends structure with spontaneity, meticulously charts weekend getaways to Catalina Island and Joshua Tree, yet dreams of exploring the bustling markets of Oaxaca
    and the historic streets of Seville, balancing budget‑friendly travel apps with occasional splurges on boutique hotels.
  culinary: Maribel Jeanleger, a confident home chef, masterfully prepares hand‑made tamales, smoky chicken mole, and fresh guacamole using heirloom corn masa and ancho chilies, and regularly hosts potluck
    gatherings that fuse traditional family recipes with modern plating techniques.
  core: Maribel Jeanleger blends data‑driven retail leadership, a competitive spirit, and a lively cultural life of salsa, cooking, and community soccer into a uniquely structured yet socially vibrant outlook.
background:
  cultural: Maribel was raised in a Mexican‑American household in Santa Ana, where bilingualism and strong family ties are central. She grew up celebrating Mexican traditions such as Día de los Muertos,
    Las Posadas, and mariachi music festivals, while also embracing the diverse multicultural landscape of Orange County. Her cultural heritage influences her culinary passions, community involvement in
    local Latino events, and the value she places on hard work, resilience, and communal support.
attributes:
  skills: '[''Retail Supervision'', ''Staff Scheduling'', ''Team Training & Coaching'', ''Conflict Resolution'', ''POS System Operation'', ''Inventory Control'', ''Visual Merchandising'', ''Loss Prevention'',
    ''Bilingual Communication (Spanish/English)'', ''Data‑Driven Sales Analysis'', ''Process Improvement'', ''Performance Metrics Tracking'']'
  hobbies: '[''Salsa Dancing'', ''Hiking in Orange County'', ''Recreational Soccer'', ''Cooking Mexican Cuisine'', ''Hosting Cultural Potlucks'', ''Listening to Retail Industry Podcasts'', ''Reading Leadership
    and Business Development Books'']'
  career_goals: Maribel aims to advance from first‑line supervisor to store manager within the next two years, leveraging her structured leadership style to exceed sales KPIs and improve employee retention.
    She aspires to earn a professional certification in retail management and eventually transition to a district manager role, overseeing multiple locations and implementing standardized operational best
    practices across the region. Long‑term, she envisions opening a boutique that blends contemporary fashion with Mexican cultural influences, where she can apply her expertise in merchandising and community
    engagement.
