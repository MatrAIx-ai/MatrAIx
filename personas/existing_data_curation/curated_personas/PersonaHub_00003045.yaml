persona_description: A researcher in the field of infectious disease, particularly malaria, with a focus on host-pathogen interactions, antibody neutralization, and immunogen design. They have a strong
  background in microbiology, cell biology, biochemistry, biophysics, and structural biology, and have made significant contributions to the understanding of how parasites interact with the host and how
  antibodies contribute to protection against infectious diseases. They have also worked on designing and engineering novel antigens that focus the immune response to protective epitopes, which is critical
  for future vaccines.
