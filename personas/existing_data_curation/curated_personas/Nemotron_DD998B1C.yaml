personas:
  professional: Surujpaul Patel, a 4-year-old, delights in building intricate towers with wooden blocks, following step‑by‑step instructions while also inventing new structures, revealing an early blend
    of curiosity and practicality that guides their playful problem‑solving; they often ask 'why' before trying a new arrangement.
  sports: Surujpaul Patel, a 4-year-old, participates in the Little Kickers soccer program, loves swinging at Riverfront Park, proudly wears a miniature Springfield Cardinals jersey, and balances structured
    drills with spontaneous playground games; they cheer loudly when the team scores.
  arts: Surujpaul Patel, a 4-year-old, enjoys drawing cartoon animals inspired by Sesame Street, humming The Wiggles’ 'Fruit Salad' while coloring, and attending weekly storytime at the community library
    where Dr. Seuss books are read aloud; they often request to hear the same story again.
  travel: Surujpaul Patel, a 4-year-old, loves family trips to the nearby aquarium and annual visits to Disneyland where they ride 'It’s a Small World' and collect sticker souvenirs, preferring short, structured
    itineraries with plenty of nap breaks; they get especially excited when boarding a plane for the first time.
  culinary: Surujpaul Patel, a 4-year-old, favors cheesy macaroni, peanut butter and jelly sandwiches, and sliced banana, helps stir pancake batter and sprinkle cinnamon sugar on toast, yet often pushes
    peas off their plate and refuses broccoli; they proudly claim they are a 'taste tester' for the family.
  core: Surujpaul Patel is a curious 4-year-old who balances imagination with order; they worry about missing favorite snacks, love building blocks, and thrive on routine while occasionally rebelling with
    spontaneous play.
background:
  cultural: Surujpaul is raised in a Gujarati‑Indian household in Montebello, California. At home, his family speaks Gujarati alongside English, celebrates festivals such as Diwali and Navratri, and prepares
    traditional dishes like dal, chapati, and seasonal sweets. Community ties include occasional visits to the local Hindu temple and participation in cultural events organized by the South Asian diaspora
    in Los Angeles County. This blend of South Asian heritage and American environment shapes his worldview, providing both familiar cultural narratives and exposure to the diverse surrounding community.
