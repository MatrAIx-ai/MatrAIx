  career_goals: Joseph aims to transition into a senior leadership role such as Principal Systems Analyst or IT Architecture Manager within the next five years, where he can shape the strategic direction
    of technology initiatives. He plans to earn certifications in cloud architecture (AWS Solutions Architect) and cybersecurity (CISSP) to broaden his expertise. A key ambition is to lead a digital transformation
    program that modernizes legacy systems while maintaining operational reliability. He also wants to mentor junior analysts, champion data‑driven decision making, and eventually position himself on a
    pathway toward a Chief Information Officer role, all while preserving a healthy work‑life balance for his family.
