personas:
  professional: Nicole Forrest is a budding junior illustrator who channels their boundless curiosity into vibrant drawings that turn classroom assignments into mini art exhibitions, while they embrace
    a relaxed, disorganized approach that translates into a flexible creative schedule and occasional missed art‑class deadlines.
  sports: Nicole Forrest thrives on the soccer field with the Orange County Youth Soccer Club, cheers for the LA Galaxy and the Anaheim Ducks, and they sharpen rhythm and stamina by dancing with friends
    after practice and joining the after‑school swim program at Newport Beach during summer.
  arts: Nicole Forrest delights in sketching whimsical creatures inspired by Studio Ghibli’s Hayao Miyazaki and the vibrant murals of local street artist Shepard Fairey, while they obsessively listen to
    Disney soundtracks and mimic pop star Ariana Grande’s dance moves during living‑room performances.
  travel: Nicole Forrest loves spontaneous weekend trips with their family, exploring tide pools at Crystal Cove State Park and dreaming of snorkeling the Great Barrier Reef, and they prefer hands‑on adventures
    over rigid itineraries but are often limited by school schedules.
  culinary: Nicole Forrest enjoys crafting homemade pepperoni pizza topped with mozzarella, tomato sauce, and fresh basil, mixing colorful fruit salads with strawberries, mango, and kiwi, while they are
    limited to stirring pancake batter and assembling simple turkey‑and‑cheese sandwiches.
  core: Nicole Forrest balances an unstoppable curiosity and love for group play with a tendency to lose school supplies in the chaos of their backpack, and they often worry about missing the next art class.
background:
  cultural: Nicole comes from a suburban white American family in Aliso Viejo, California. Her upbringing reflects the typical Southern California lifestyle of outdoor activities, diverse community exposure,
    and a strong emphasis on arts and innovation. She benefits from a supportive middle-class environment that values individuality, creativity, and community involvement.
