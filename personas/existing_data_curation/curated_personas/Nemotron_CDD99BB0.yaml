  skills: '[''drawing'', ''painting'', ''digital storytelling (Scratch)'', ''team collaboration'', ''empathy'', ''basic problem solving'', ''creative improvisation'']'
  hobbies: '[''drawing'', ''visiting museums'', ''soccer'', ''dance'', ''LEGO building'', ''tide-pool exploration'', ''storytelling'']'
  career_goals: She dreams of becoming an artist who creates vibrant illustrations that inspire others, or a scientist who explores new ideas, and she also imagines herself as a teacher who helps children
    discover their own creativity. She hopes to blend her love for art, curiosity about the world, and caring nature into a career that brings joy and understanding.
