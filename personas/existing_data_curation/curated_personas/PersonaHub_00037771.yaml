persona_description: A historian or a researcher who is interested in the Tudor period, particularly the reigns of Edward IV and Richard III. They are particularly interested in the military campaigns,
  political intrigue, and the lives of key figures such as Edward IV, Richard III, and their families. They are also interested in the works of William Shakespeare and the plays that were written during
  the reigns of these two monarchs. They are familiar with the architectural details of the buildings and monuments associated with these events and are interested in the history of the English monarchy
  and the Tudor dynasty.
