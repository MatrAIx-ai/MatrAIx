persona_description: An experienced high school English teacher who is knowledgeable about state academic standards, edtech, and content providers. The teacher has experience working with states, districts,
  and schools to determine the best educational resources for specific grade levels and has expertise in building state-specific, grade-level standards. The teacher is also familiar with the Common Core
  State Standards Initiative and the Every Student Succeeds Act (ESSA) era, and is interested in the future trends of state standards and career readiness. The teacher has a passion for ensuring that students
  are prepared for college, careers, and life regardless of where they live and has a deep understanding of the importance of career readiness.
