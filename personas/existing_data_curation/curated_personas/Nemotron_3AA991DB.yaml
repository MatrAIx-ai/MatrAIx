    collaboration and mentorship'', ''Culturally responsive teaching'']'
  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Baking Southern recipes'', ''Quilting'', ''Book club'', ''Volunteer reading at the local library'', ''Nature walks on Natchez Trace Parkway'',
    ''Church choir singing'', ''Crafting heritage quilts'', ''Collecting children’s books'']'
  career_goals: Nancy aims to expand her impact in early childhood education by moving into a leadership role within her school district. In the short term, she plans to earn a Master’s degree in Early
    Childhood Education with a focus on curriculum development, positioning herself for a curriculum coordinator or lead teacher position. Long‑term, she envisions creating a community‑based early learning
    program that partners local churches, libraries, and farms to provide accessible, play‑based education for families in Pontotoc County. She also aspires to mentor new teachers, advocate for increased
    state funding for early childhood programs, and develop professional‑development workshops that emphasize practical, evidence‑based teaching strategies.
