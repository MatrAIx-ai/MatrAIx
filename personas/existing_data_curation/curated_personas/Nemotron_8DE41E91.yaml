  hobbies: '[''Group Fitness Classes (Zumba, Yoga)'', ''Community Volunteering'', ''Gardening'', ''Home Cooking and Baking'', ''Book Club'', ''Traveling with Friends'', ''Puzzle Solving (Crosswords, Sudoku)'',
    ''Local Theater Participation'']'
  career_goals: Lisa aims to re‑enter the workforce in a part‑time administrative or community‑center coordinator role where she can leverage her organizational strengths. She is considering earning a CAPM
    (Certified Associate in Project Management) credential to formalize her project‑management abilities. Long‑term, she hopes to launch a home‑based catering and event‑planning business that allows her
    to maintain flexibility while generating reliable income. Financial independence after her divorce and becoming a respected local leader in community initiatives are central to her ambitions.
