personas:
  professional: Lisa Evans, a seasoned community organizer transitioning back into the workforce, leverages their meticulous scheduling skills, spreadsheet mastery, and competitive drive to excel in part‑time
    administrative and event‑coordination roles, while preparing for a CAPM certification to formalize their project‑management expertise.
  sports: Lisa Evans energizes their mornings with Zumba and yoga classes at the local community center, sings the open‑field chant for the New York Yankees each season, and joins a weekend softball league
    with friends from the neighborhood.
  arts: Lisa Evans, an active participant in community theater productions and a book‑club regular, enjoys the music of Adele, the dynamic scores of Lin‑Manuel Miranda's Hamilton, and savoring classic films
    starring Meryl Streep on cozy Friday nights.
  travel: Lisa Evans prefers short, well‑planned weekend road trips to the Hudson Valley’s Cold Spring, a cultural tour of Philadelphia’s historic district, and occasional spontaneous visits to Atlantic
    City, using a color‑coded itinerary spreadsheet to balance relaxation with budget constraints.
  culinary: Lisa Evans delights in cooking and baking with garden‑fresh basil and rosemary, mastering dishes like homemade lasagna, chicken parmigiana, and apple pie, while occasionally over‑seasoning their
    sauces in the quest for the perfect family‑recipe flavor.
  core: Lisa Evans, a pragmatic yet sociable 49‑year‑old with a competitive edge, harmonizes community leadership, disciplined budgeting, and a love for active group pursuits while juggling meticulous planning
    and occasional impulse buys.
background:
  cultural: Raised in Lodi, New Jersey, Lisa comes from a middle‑class white family with deep roots in the suburban culture of Bergen County, reflecting a blend of Irish and Italian heritage. Her upbringing
    emphasized practicality, self‑reliance, and community involvement, values that are reinforced by the area's strong neighborhood ties and local traditions. While she identifies with mainstream American
    cultural norms, her family’s Catholic background and the diverse, close‑knit community of Lodi have shaped her appreciation for organized group activities, volunteerism, and celebration of cultural
    festivals.
attributes:
  skills: '[''Event Planning'', ''Community Outreach Coordination'', ''Project Scheduling'', ''Budget Management'', ''Conflict Mediation'', ''Digital Calendar Management'', ''Spreadsheet Proficiency'',
