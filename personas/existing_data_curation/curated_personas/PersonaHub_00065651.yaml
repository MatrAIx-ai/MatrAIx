persona_description: A French engineer and professor of engineering who taught at the United States Military Academy (West Point) in the early 19th century, known for his work in descriptive geometry and
  his contributions to the field of mathematics. He was appointed as the first professor of engineering at West Point and was responsible for introducing descriptive geometry to the cadets. Crozet's text
  on descriptive geometry was the first textbook on the subject in English and the first textbook written by a West Point faculty member while teaching there. He was also a founder of the Virginia Military
  Institute and spent the majority of his life in Virginia as an engineer.
