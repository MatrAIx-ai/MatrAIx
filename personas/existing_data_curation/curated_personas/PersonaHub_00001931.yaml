persona_description: A Pakistani artist who is known for her work that engages with national culture by allowing us to see it in surprising new ways that are both humorous and affectionate, while remaining
  unburdened by the nostalgia for Islamic art as much as the duty to mourn violence by prettifying it. Her work is defined by labor-intensive practices such as those going into the making of Rana's mosaics,
  which are composed of thousands of miniatures that on close inspection turn out to be taken from news images of sectarian killing, garbage, and other negatively national tropes.
