personas:
  professional: Carolyn Birdsong, an aspiring youth organizer, blends their love of structure with a relaxed, sociable flair to coordinate school basketball pick‑ups, lead the church youth choir’s event
    planning, and guide community‑garden clean‑ups, using journaling and cartoon sketching to inject creative problem‑solving into every project.
  sports: Carolyn Birdsong, a devoted pickup basketball player, joins the school’s after‑school basketball club, cheers for the Los Angeles Lakers, and participates in community‑run summer soccer clinics,
    preferring energetic group drills over solitary workouts despite occasional forgetfulness about equipment.
  arts: Carolyn Birdsong expresses themselves through the church youth choir, where they love singing Ariana Grande and Billie Eilish, practices hip‑hop dance routines to Kendrick Lamar beats at home, and
    sketches cartoon comics of their friends, often drawing inspiration from Disney animations like Moana.
  travel: Carolyn Birdsong enjoys spontaneous weekend road trips with their family, having visited Disneyland and the Grand Canyon, dreams of exploring Kyoto’s temples, and balances a limited school budget
    with a love for low‑cost adventure planning on travel apps.
  culinary: Carolyn Birdsong delights in baking vanilla cupcakes topped with rainbow sprinkles and cream cheese frosting alongside their mother, frequently experiments with chocolate chip cookies, and can
    skillfully whip up a quick cheese quesadilla using shredded cheddar and tortilla chips after school.
  core: Carolyn Birdsong is an energetic, socially‑driven teen who balances a love for basketball, music, and baking with a habit of over‑thinking, occasional disorganization, and a penchant for sketching
    cartoons in the margins of their journal.
background:
  cultural: Carolyn is an African‑American teen raised in Antioch, a suburban community in Davidson County, Tennessee. Her family’s life revolves around a historically Black Baptist church, where she attends
    Sunday services, participates in the youth choir, and helps organize community events. The neighborhood’s blend of Southern traditions—such as family potlucks featuring soul food, porch gatherings,
    and local festivals—intersects with Black cultural practices like gospel music, storytelling, and a strong emphasis on collective support. These influences shape her values of kindness, cooperation,
    and harmony, and they inspire her interest in caring professions that serve her community.
