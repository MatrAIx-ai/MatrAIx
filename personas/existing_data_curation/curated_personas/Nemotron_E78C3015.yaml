  career_goals: Carolyn’s long‑term ambition is to become a pediatric nurse so she can combine her love for caring for children with her desire to provide a stable, supportive environment. She envisions
    attending a community college after high school, earning a nursing associate’s degree, and eventually working in a local clinic or hospital in the Nashville area. Alongside this, she hopes to mentor
    younger students through school‑based health programs, using her experience in peer mediation to promote wellness and resilience among her peers.
