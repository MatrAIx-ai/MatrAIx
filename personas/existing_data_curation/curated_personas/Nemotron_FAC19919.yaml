  career_goals: She aims to transition into a senior operations director role within a wellness‑oriented organization, where she can shape inclusive service standards and champion employee well‑being. In
    the longer term, Kruti envisions launching her own boutique wellness center that integrates evidence‑based health practices with culturally attuned care, and becoming a consultant who helps other personal‑service
    businesses embed empathy and resilience into their operations.
