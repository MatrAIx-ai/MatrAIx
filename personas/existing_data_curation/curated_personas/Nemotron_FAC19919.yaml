  hobbies: '[''Yoga'', ''Meditation'', ''Hiking'', ''Modern Indian Cooking'', ''Reading (fiction and psychology)'', ''Volunteering at community health clinic'', ''Tech meet‑ups (health‑tech)'', ''Balcony
