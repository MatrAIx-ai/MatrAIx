personas:
  professional: Kruti Menon, a data‑driven operations specialist who blends analytical rigor with a people‑first ethos, designs client‑centric service workflows, leads diverse teams, and leverages CRM analytics
    to drive efficiency while championing employee well‑being as she works toward a senior director role in a wellness‑focused organization.
  sports: Kruti Menon, an avid hiker and yoga practitioner who joins the Bay Area Hiking Club for weekend treks, follows the Golden State Warriors and San Francisco 49ers for seasonal camaraderie, and incorporates
    sunrise yoga sessions on her balcony as her primary fitness regimen, especially during spring and fall.
  arts: Kruti Menon, a devoted reader of contemporary fiction and psychology, immerses herself in the works of Sally Rooney, Haruki Murakami, and Bessel van der Kolk, while her music playlist blends Anoushka
    Shankar’s sitar fusion with classic indie bands like Fleet Foxes, shaping her creative expression and providing a reflective backdrop for journaling.
  travel: Kruti Menon, a mindful traveler who meticulously plans trips blending adventure and self‑care, has trekked Yosemite’s misty valleys, explored Bali’s rice terraces, and savored Kyoto’s tea ceremonies,
    and now dreams of witnessing Iceland’s Northern Lights while balancing her professional commitments and a modest travel budget.
  culinary: Kruti Menon, an experimental home chef who reimagines traditional Indian dishes with modern twists, frequently prepares quinoa biryani with roasted cauliflower and paneer tikka infused with
    smoked paprika, balances it with avocado toast and matcha‑green tea lattes, and delights in sourcing fresh cilantro, turmeric, and locally grown kale from the farmers' market.
  core: Kruti Menon, a compassionate operations strategist whose relentless pursuit of wellness is paired with a tendency to over‑analyze every decision and a habit of reaching for a third cup of chai when
    anxiety rises, navigates life with a journal in hand and a heart tuned to both data and empathy.
background:
  cultural: Kruti was born to Indian parents who immigrated to the United States. Growing up in a bilingual household, she celebrates major South Asian festivals such as Diwali and Holi while also embracing
    California’s multicultural vibe. Her family’s emphasis on community, respect for elders, and the holistic principles of Ayurveda and yoga influence her personal and professional ethos. In San Jose’s
    diverse tech hub, she blends her cultural heritage with a progressive, inclusive outlook, often acting as a cultural bridge between colleagues and clients from varied backgrounds.
