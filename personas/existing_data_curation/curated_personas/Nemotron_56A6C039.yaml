  hobbies: '[''Playing with LEGO Duplo building blocks'', ''Drawing and coloring pictures'', ''Singing Spanish children\''s songs'', ''Dancing to music (including flamenco rhythm)'', ''Participating in
    group games (Simon Says, Duck Duck Goose, Ring Around the Rosie)'', ''Attending storytime at the local library'', ''Playing soccer in the park'', ''Helping parents in the kitchen with simple tasks'',
    ''Exploring city parks and nature walks'', ''Watching educational cartoons (e.g., Sesame Street)'']'
  career_goals: Though only four, Giovanni already talks about growing up to be a teacher because he loves showing friends how to play games and making sure everyone feels safe and happy. He also dreams
    of caring for animals, saying he wants to be a veterinarian so he can help pets who are sad or hurt. In his imagination, he sees himself leading a classroom where the day follows a clear schedule, and
    where kindness and order go hand‑in‑hand. These ambitions reflect his desire to combine his love for structure, his caring nature, and his ability to understand others' emotions into a future role that
    supports and guides others.
