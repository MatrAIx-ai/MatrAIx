personas:
  professional: Giovanni Moodie, an enthusiastic preschool builder, channels a love for structure into meticulously arranging block towers while also eagerly joining cooperative group art projects, demonstrating
    early problem‑solving, teamwork, and responsibility, and they often take the lead in keeping the play area organized.
  sports: Giovanni Moodie, a lively member of the neighborhood Kids Soccer Club who loves dribbling a ball at the community field and cheers enthusiastically for the New York Yankees during weekend broadcasts,
    blends active participation with devoted fandom, and they often invite friends to join in a backyard kick‑ball game.
  arts: Giovanni Moodie, an avid fan of Disney’s Frozen soundtrack—especially Idina Menzel’s 'Let It Go'—plus the whimsical tunes of the Sesame Street theme, spends afternoons drawing Paw Patrol characters
    and singing along to Mickey Mouse Clubhouse, weaving music and illustration into their playtime, and they love showing their pictures to family members.
  travel: Giovanni Moodie, who delights in day trips to the local zoo, has already experienced the magic of Disneyland in California, and dreams of a family beach getaway to Florida’s Gulf Coast and a weekend
    stay at grandparents’ countryside cottage, balancing adventurous curiosity with familiar comforts, and they eagerly pack a tiny suitcase with their favorite stuffed animal.
  culinary: Giovanni Moodie, who passionately craves cheesy macaroni, crunchy chicken nuggets with ketchup, and proudly helps stir blueberry pancake batter with a splash of vanilla, showcases a simple yet
    enthusiastic culinary palate that rewards both taste and participation, and they often request extra cheese on their plates.
  core: Giovanni Moodie thrives on predictable routines, bursts of energetic sociability, and intense emotional swings, often transitioning from meticulous block building to sudden tantrums when plans shift,
    and they quickly seek comfort from a trusted adult.
background:
  cultural: Giovanni’s family is of Spanish descent; his parents immigrated from Spain and maintain a bilingual household where Spanish is spoken alongside English. At home they celebrate Spanish traditions
    such as Día de los Reyes, enjoy meals like paella, churros, and gazpacho, and listen to traditional music. He attends a Spanish-immersion preschool in Chicago, which introduces him to Spanish folklore,
    basic counting, and simple songs. The local Hispanic community in his Chicago neighborhood provides cultural festivals, dance workshops, and soccer leagues that reinforce his connection to his heritage
    while also integrating into the broader American environment.
