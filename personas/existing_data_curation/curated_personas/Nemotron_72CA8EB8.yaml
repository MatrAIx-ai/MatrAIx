  career_goals: Michelle aims to leverage her extensive clinical background to become a senior mentor and quality improvement leader within her facility. She plans to obtain a Certified Wound Care Nurse
    (CWCN) credential and lead workshops on infection prevention for staff and community members. Over the next few years, she intends to transition to a part‑time consultancy role, providing expertise
    to home‑health agencies while maintaining active involvement in local health education programs. Michelle is also determined to document her best practices in a pocket guide for new nurses, ensuring
    her legacy of high standards and organized care continues.
