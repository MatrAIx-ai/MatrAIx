personas:
  professional: Michelle Wagner, a seasoned licensed practical nurse with four decades in long‑term care, leverages her meticulous organization, critical eye for detail, and competitive drive to spearhead
    quality‑improvement projects, mentor new staff, and champion infection‑prevention workshops while maintaining a structured, evidence‑based approach to patient safety.
  sports: Michelle Wagner channels her energetic nature into low‑impact water aerobics at the senior centre, weekly walks along the historic Pilgrim Trail, and avidly follows the Boston Red Sox and New
    England Patriots, while also participating in a local walking club that meets every Saturday morning.
  arts: Michelle Wagner’s creative side shines in her monthly quilting circle where she draws inspiration from the bold patterns of Faith Ringgold, basks in the poetry of Mary Oliver during book club meetings,
    and enjoys the folk melodies of Joan Baez, all of which shape her evenings of artistic expression.
  travel: Michelle Wagner plans meticulous road‑trip itineraries with her husband, favoring New England coastal gems like Newport, Rhode Island, Martha’s Vineyard, and Portland, Maine, where they explore
    historic lighthouses and sample fresh seafood, balancing their love for history with a modest travel budget that prioritizes comfort over luxury.
  culinary: Michelle Wagner, an adept home chef, relishes cooking seasonal New England fare such as clam chowder, lobster rolls, baked apples with cinnamon, and pumpkin‑spice pancakes, often seasoning with
    fresh thyme and rosemary from her garden, though she occasionally over‑salts dishes while experimenting with new recipes.
  core: Michelle Wagner blends disciplined nursing expertise with a sociable, competitive spirit, organizing everything from wound‑care protocols to community quilts, while her habit of over‑planning sometimes
    masks a soft spot for spontaneous road trips and a penchant for over‑salting her chowder.
background:
  cultural: Michelle was raised in a middle‑class white family in Plymouth, Massachusetts. Her upbringing was shaped by New England’s maritime heritage and the region’s strong community ethic. She grew
    up attending a Protestant (United Church of Christ) congregation that emphasized service, self‑reliance, and modesty. The local culture of seasonal rhythms—summer fishing, autumn leaf‑watching, and
    snowy winters—instilled in her a practical, organized outlook. Family gatherings often centered around home‑cooked meals and celebrating Plymouth’s historical milestones. This background fostered Michelle’s
    disciplined work ethic, sociable disposition, and competitive drive to excel in her nursing career.
