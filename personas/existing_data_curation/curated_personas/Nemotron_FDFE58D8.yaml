  career_goals: David aims to rise to a senior finance executive role, such as Director of Finance or CFO, within the next five to seven years. He plans to earn professional credentials like the CPA and
    CFA to bolster his expertise and credibility. His ambition includes leading financial strategy for a mid‑size New England firm, delivering measurable cost savings of at least 15% annually, and establishing
    a reputation as the top‑performing financial manager in Merrimack County. Long‑term, he envisions launching his own boutique financial consulting practice that supports small businesses in the region,
    while also mentoring emerging finance professionals.
