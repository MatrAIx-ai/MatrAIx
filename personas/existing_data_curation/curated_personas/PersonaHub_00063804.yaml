persona_description: A policy analyst who specializes in analyzing the homeless assistance system and its effectiveness in delivering services to clients in rural, suburban, and central city areas. They
  are particularly interested in understanding the differences between faith-based and secular non-profit service providers, and how their characteristics impact the types of programs they run and the clients
  they serve. They are also interested in exploring the impact of government funding on these agencies and how they choose their focus based on funding streams, agency mission, and community needs. They
  are looking for ways to improve the effectiveness of social service programs run by faith-based organizations and to increase public support for government funding of these services.
