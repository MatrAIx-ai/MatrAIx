persona_description: This text suggests a new model of democracy that emphasizes engagement of the electorate in public conversation about public affairs, in contrast to the "vote-centered" model. The author
  explores various phenomena of American democracy and identifies a puzzle that has not been fully resolved under the "vote-centered" model. The model is deployed to integrate a wide range of phenomena,
  including bicameralism, single member districts, the plurality selection norm, and First Amendment jurisprudence. The text also discusses the implications of this model for terms of office, campaign finance,
  legislative districting, and other matters. This text is likely to be of interest to scholars and activists who are interested in exploring and reforming American democracy.
