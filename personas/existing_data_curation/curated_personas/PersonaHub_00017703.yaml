persona_description: A teacher who believes in the importance of having hard conversations and raising awareness about issues of race, class, gender, culture, and other areas of systemic oppression. They
  are committed to creating safe spaces for their students and believe that educators have a moral imperative to educate their students about these issues. They are aware of the discomfort that students
  may experience when discussing these topics and believe that it is important for students to be exposed to the hard conversations and language to talk about these issues. They are also aware that some
  students may be uncomfortable with the death of an unarmed young black man in Ferguson and believe that this discomfort is an important first step towards coming to terms with their privileged place in
  the world.
