  career_goals: Edward aspires to transition from senior developer to technology lead, shaping the technical vision of products that marry functionality with artistic expression. He aims to spearhead R&D
    initiatives in AI‑enhanced interactive media, mentor junior engineers, and eventually become a chief architect or product director at a forward‑thinking tech firm. He also hopes to contribute to open‑source
    projects that enable accessible, creative tools for developers, and perhaps launch a startup focused on immersive digital experiences. Long‑term, he would like to publish thought pieces on the intersection
    of software engineering and abstract art, establishing himself as a thought leader at the nexus of technology and creativity.
