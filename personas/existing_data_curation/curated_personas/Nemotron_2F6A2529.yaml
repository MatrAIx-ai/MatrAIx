  career_goals: Daniel aims to advance to a senior executive role such as Director of Construction Operations or Vice President of Development within the next five to seven years. He plans to obtain PMP
    and LEED AP credentials, lead large‑scale sustainable mixed‑use projects that blend modern design with Mexican cultural motifs, and eventually establish his own consultancy focused on resilient, art‑informed
    construction. He also seeks to mentor junior engineers, contribute to industry standards on safety and sustainability, and become a recognized speaker at regional construction conferences.
