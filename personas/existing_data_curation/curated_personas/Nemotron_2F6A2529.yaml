personas:
  professional: An experienced construction executive, Daniel Murillo leverages BIM expertise, lean project management, and a calm, methodical demeanor to deliver complex sustainable mixed‑use developments
    while they integrate artistic vision and cultural motifs.
  sports: An avid outdoor enthusiast, Daniel Murillo hikes the piney woods of East Texas, follows the Dallas Cowboys and Austin FC for weekend game nights, participates in a small local trail‑running club
    where they log a 5K a week, balancing active recreation with occasional tennis matches at community courts.
  arts: A culturally curious art aficionado, Daniel Murillo frequents the Dallas Museum of Art and Austin’s Modern Art Museum, sketches Frank Lloyd Wright facades, collects limited‑edition prints by Tadao
    Ando, enjoys acoustic sessions of John Mayer with close friends, draws inspiration from contemporary Mexican muralists for their woodworking designs, and they often embed subtle cultural motifs into
    each piece.
  travel: A meticulous planner, Daniel Murillo prefers road‑trip itineraries that blend architecture tours of Barcelona’s Gaudí masterpieces, cultural immersion in Kyoto’s temples, and weekend getaways
    to New Mexico’s desert pueblos, and they balance adventure with budget‑conscious lodging and a penchant for capturing landscapes on their DSLR.
  culinary: A passionate home chef, Daniel Murillo meticulously measures ingredients for traditional Mexican mole poblano, slow‑cooks chiles en nogada using heritage corn masa, experiments with locally
    sourced pine nuts and Oaxaca cheese, and they occasionally splurge on a high‑end sous‑vide unit to perfect their culinary precision.
  core: Daniel Murillo, a 41‑year‑old construction leader with an engineer’s precision, artistic curiosity, and calm resilience, merges sustainable building expertise with a love for woodworking, Mexican
    cuisine, and thoughtful travel, and they approach each project and hobby with disciplined curiosity.
background:
  cultural: Daniel was born and raised in a Mexican‑American family in Texas, with roots tracing back to central Mexico. He grew up bilingual, speaking both English and Spanish at home, and was immersed
    in Mexican cultural traditions—Dia de los Muertos, quinceañeras, and family‑centered celebrations—while also embracing Texan customs such as BBQ and local football. His heritage influences his worldview,
    emphasizing strong family bonds, respect for craftsmanship, and a communal spirit. In his professional life, he often incorporates Mexican architectural motifs and sustainable building practices that
    reflect his cultural pride, bridging his dual identity as a holder of Mexican heritage and a Texan citizen.
