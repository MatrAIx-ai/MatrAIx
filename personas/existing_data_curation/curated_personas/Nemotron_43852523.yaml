  hobbies: '[''gardening'', ''reading historical fiction'', ''mystery novels'', ''knitting'', ''scrabble'', ''sudoku'', ''attending church services'', ''volunteering at library'', ''walking along the Grand
    River'', ''candle making'']'
  career_goals: As she approaches retirement, Jessica aims to keep a stable, part‑time schedule that preserves the familiar routine she values while allowing occasional flexibility to cover extra shifts.
    She hopes to be recognized as a mentor for younger cashiers and to move into a shift‑lead role where she can design consistent procedures that reflect her practical style. In addition, she plans to
    save enough to travel to historic sites she has long wanted to visit and to enroll in a short community‑college class in local history or creative writing. She also dreams of turning her knitting into
    a modest online side business to supplement her income.
