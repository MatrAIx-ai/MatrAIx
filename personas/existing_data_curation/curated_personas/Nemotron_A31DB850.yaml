  career_goals: Short‑term, Jonathan aims to obtain a Certified Operator license for heavy equipment such as excavators and to complete an associate’s program in Construction Management offered part‑time
    at a community college. Long‑term, he aspires to become a crew foreman and eventually run his own small specialty contracting business focused on sustainable residential renovations. He seeks a role
    that balances hands‑on work with leadership, allowing flexibility to manage his anxiety while providing steady income.
