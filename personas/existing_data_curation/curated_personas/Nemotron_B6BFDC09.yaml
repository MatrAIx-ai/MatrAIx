personas:
  professional: Glenn Dominique is a licensed physical therapist who merges meticulous manual therapy and biomechanics analysis with a competitive drive to pioneer rural sports rehabilitation, balancing
    relentless curiosity for new evidence‑based techniques with a practical, organized approach to patient care.
  sports: Glenn Dominique follows the Asheville Trail Club for mountain biking, runs with the Appalachian Trail Runners in spring, and cheers for the Charlotte Hornets and Carolina Panthers, approaching
    personal fitness with disciplined gait analysis, strength conditioning, and a competitive mindset that pushes them to set and surpass performance benchmarks.
  arts: Glenn Dominique captures the Blue Ridge landscape in black‑and‑white photography inspired by Ansel Adams, strums an acoustic guitar in a reflective John Fahey style, and immerses themselves in science‑fiction
    novels like Dune and Neuromancer, finding solace in creative pursuits that balance their reserved nature.
  travel: Glenn Dominique prefers meticulously planned solo weekend trips, often hiking the Shenandoah National Park or exploring the historic streets of Asheville, while dreaming of a long‑term adventure
    to Iceland’s geothermal lagoons, budgeting travel through a detailed spreadsheet that prioritizes nature over luxury.
  culinary: Glenn Dominique delights in cooking Southern comfort dishes such as baked sweet‑potato casserole with a quinoa crust and collard greens flavored with smoked turkey, adding healthier twists like
    swapping fried chicken for grilled catfish, and they savor ingredients like rosemary, ginger, and black‑eyed peas while occasionally over‑indulging in a second serving of banana pudding.
  core: Glenn Dominique is a data‑driven mountain‑bound physical therapist who blends rigorous rehab protocols with soulful guitar strings, meticulously tracks every step yet often postpones dentist appointments,
    and channels a competitive spirit into both clinical innovation and personal fitness.
background:
  cultural: Glenn is an African‑American who grew up in a close‑knit black community within the Appalachian region of North Carolina. His family emphasized education, resilience, and service, values reinforced
    by the local church and community gatherings. He celebrates cultural traditions such as Juneteenth, soul and gospel music, and Southern culinary heritage, while also respecting the broader mountain
    culture of self‑reliance and neighborly support. These dual influences shape his holistic view of health, driving his commitment to culturally competent care and community outreach in rural settings.
attributes:
  skills: '[''Manual therapy'', ''Therapeutic exercise design'', ''Gait analysis'', ''Neuromuscular re‑education'', ''Sports injury assessment'', ''Pain management'', ''Patient education'', ''Evidence‑based
    practice'', ''Biomechanical analysis'', ''Health informatics'', ''Clinical documentation'', ''Team collaboration'']'
  hobbies: '[''Hiking in the Blue Ridge Mountains'', ''Birdwatching'', ''Landscape photography'', ''Reading science fiction'', ''Woodworking'', ''Acoustic guitar'', ''Cooking Southern-inspired meals'',
    ''Developing simple health‑tracking apps'', ''Volunteering at community health fairs'']'
  career_goals: Glenn aims to earn board certification in sports physical therapy and develop a specialized rural clinic in Deep Gap that offers both in‑person and tele‑health services for underserved athletes
    and older adults. He plans to conduct research on rehabilitation outcomes in Appalachian communities, mentor new physical therapists, and eventually expand his practice to include a community wellness
    program that integrates preventive exercise, nutrition counseling, and technology‑driven health tracking.
