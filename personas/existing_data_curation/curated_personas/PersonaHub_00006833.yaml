persona_description: A member of the National Green Tribunal (NGT) who is responsible for hearing and deciding on environmental disputes and issues. They are an expert in environmental science and have
  been appointed to the tribunal by the Chairperson of the NGT. They are likely to have a deep understanding of the polluter pays principle and sustainable development principles, and are familiar with
  the work of the Supreme Court and the Law Commission. They are also likely to be familiar with the work of the National Environmental Protection Authority (NEPA) and the various cases that have been filed
  in various High Courts and District Courts.
