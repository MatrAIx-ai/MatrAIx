  hobbies: '[''Gardening (vegetable and flower beds)'', ''Baking simple breads and cookies'', ''Reading non-fiction how-to books'', ''Knitting and crocheting'', ''Walking her dog'', ''Volunteering at the
    local library (book organization and reading programs)'']'
  career_goals: Anwarali hopes to pursue a stable, service-oriented career that offers a clear routine and the chance to help others. She is interested in becoming a registered nurse or a high school teacher,
    both of which align with her practical nature, reliability, and desire for a predictable work environment. She plans to graduate high school, attend a community college for health science or education,
    and eventually obtain the certifications needed for her chosen field.
