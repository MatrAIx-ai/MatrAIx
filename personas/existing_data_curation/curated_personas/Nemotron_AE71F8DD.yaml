personas:
  professional: Anwarali Kervin, a 14-year-old vegetable gardener and library volunteer, leverages a routine-oriented mindset and meticulous organization to keep a thriving garden and run a tidy reading
    corner for younger kids, hinting at future potential in horticulture or information services.
  sports: Anwarali Kervin enjoys walking their dog for daily cardio, attends the neighborhood youth soccer league with the Cedar Creek Thunder U-12 team in the spring, and follows the Los Angeles Dodgers
    for baseball inspiration, preferring low-pressure, routine-based exercise over competitive sports, though they occasionally skip a practice when a library volunteer shift runs late.
  arts: Anwarali Kervin finds artistic solace in crocheting while listening to folk singer Joan Baez, watches classic films such as Amelie starring Audrey Tautou, and admires the illustrated children's
    books by Beatrix Potter, allowing the arts to weave calm into their otherwise routine-driven day.
  travel: Anwarali Kervin prefers low-key, family-oriented trips, having spent a weekend camping in the nearby Redwood State Park and dreaming of exploring Japan's rural tea farms to learn new gardening
    techniques, all while balancing travel plans around school obligations and a modest allowance.
  culinary: Anwarali Kervin, a budding home baker, comfortably whips up rustic sourdough bread using locally sourced rye flour and fresh rosemary, bakes chocolate chip cookies with dark cacao nibs, and
    prepares a hearty vegetable stew featuring garden carrots, tomatoes, and kale, all while meticulously measuring each ingredient despite occasional cookie-overbaking mishaps.
  core: Anwarali Kervin is a quiet, routine-loving teen who blends meticulous garden care with spontaneous cookie baking, quietly orchestrates order at the library, yet frequently forgets to water the indoor
    succulents when caught up in a new knitting project.
background:
  cultural: Anwarali is a white Southern teen raised in Auburn, Alabama, in a close-knit, multigenerational family that values tradition, hard work, and community. Her upbringing reflects the modest, hospitality-focused
    culture of small-town Alabama, with regular involvement in church activities, local festivals, and family gatherings. The regional emphasis on practical skills, self-reliance, and neighborly support
    has shaped her routine-oriented mindset and her preference for dependable, community-based roles.
