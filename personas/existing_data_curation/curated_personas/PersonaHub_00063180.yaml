persona_description: A linguist or ancient history scholar who is interested in the decipherment and reconstruction of ancient scripts and languages, particularly those of the North African region. They
  are particularly intrigued by the 'Libyan' alphabet and its possible connections to ancient Berber languages and dialects. They are also curious about the linguistic and cultural continuity between ancient
  Berber and Roman age Mauretania and Numidia, and the possibility of a "Libyco-berber script" that may have been used in the region. They are open to alternative hypotheses and are not afraid to question
  the established knowledge.
