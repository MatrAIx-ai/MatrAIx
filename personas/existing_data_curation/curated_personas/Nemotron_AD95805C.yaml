personas:
  professional: Thomas Powers is a diligent records specialist who blends a curiosity for automating workflows with a steadfast respect for compliance standards, navigating the tension between their penchant
    for flexible problem‑solving and occasional disorganization to keep office information flowing smoothly, and they often mentor junior staff while championing digital archiving projects.
  sports: Thomas Powers cycles the Grand River trail year‑round, joins the local Grand Rapids Cycling Club for weekend rides, fishes early Saturday mornings, and they follow the Grand Rapids Griffins and
    Gold, balancing relaxed fitness habits with a competitive streak when racing against friends.
  arts: Thomas Powers enjoys unwinding with indie folk playlists featuring The War on Drugs and local folk duos, attends quarterly open‑mic nights at nearby breweries, collects vintage comic books, and
    they occasionally dabble in woodworking to create handcrafted shelves, reflecting a blend of nostalgic appreciation and hands‑on creativity.
  travel: Thomas Powers prefers short, spontaneous road trips to natural escapes like Sleeping Bear Dunes or Mackinac Island, plans itineraries loosely around fishing spots and local breweries, and they
    dream of a summer bike tour through the Canadian Shield while keeping travel budgets modest.
  culinary: Thomas Powers favors grilled trout tacos with fresh dill, lime, and corn tortillas, enjoys crafting his own craft‑beer‑paired burger with smoked cheddar and caramelized onions, and they are
    a competent but occasional cook who experiments with a sourdough starter when time permits.
  core: Thomas Powers is a curiosity‑driven yet laid‑back records enthusiast who balances DIY tinkering, outdoor pursuits, and craft‑brew indulgences while they occasionally slip into disorganized procrastination.
background:
  cultural: Thomas grew up in a middle‑class, white family in the suburban outskirts of Grand Rapids. The Midwest’s emphasis on community, modesty, and a strong work ethic shaped his practical outlook,
    while local cultural traditions—such as attending community fairs, supporting local sports teams, and participating in volunteer activities—instilled a sense of civic responsibility. His upbringing
    combined a modest, family‑oriented environment with exposure to a diverse range of Midwestern cultural influences, from the region’s seasonal outdoor recreation to its growing craft‑beer scene.
