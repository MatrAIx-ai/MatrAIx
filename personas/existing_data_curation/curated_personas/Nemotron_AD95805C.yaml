  career_goals: Thomas aims to deepen his expertise in information governance and move into supervisory or specialist roles. Over the next few years he plans to complete a bachelor's degree in business
    administration or information management, earn the Certified Records Manager (CRM) credential, and take on responsibilities as a records manager or data analyst within a midsized organization. He is
    interested in leading projects that improve filing efficiency, implement digital archiving solutions, and mentor newer clerical staff. While he values flexibility and a balanced life, he also seeks
    a stable career path that offers growth, professional recognition, and the ability to contribute to his community’s administrative efficiency.
