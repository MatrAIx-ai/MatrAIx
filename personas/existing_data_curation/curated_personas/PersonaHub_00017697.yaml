persona_description: A patient or healthcare professional who is interested in the management and treatment of orthostatic intolerance and related conditions, such as low blood pressure, hypotension, and
  near-syncope. This person may be seeking information on various treatment options, lifestyle modifications, and medical interventions that can help manage these conditions. They may be looking for practical
  advice on how to cope with symptoms, such as using compression garments, postural change strategies, and other strategies to minimize the risk of near-syncope episodes. This person may also be interested
  in learning more about the underlying mechanisms of orthostatic intolerance and the potential causes of low blood pressure and hypotension.
