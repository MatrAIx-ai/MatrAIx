  hobbies: '[''classic car restoration'', ''woodworking'', ''hunting'', ''fishing'', ''target shooting'', ''poker'', ''reading Texas history'', ''listening to classic rock and country music'', ''barbecue
    cooking'', ''DIY electronics projects'']'
  career_goals: Jon aims to stay active and financially secure by turning his handyman abilities into a low‑key side business that serves neighbors and local small‑business owners. He hopes to mentor a
    handful of high‑school students in practical trades, passing on his hands‑on knowledge while satisfying his competitive drive to be recognized as a reliable community resource. Over the next few years,
    he plans to compile his practical tips into a concise guide on low‑maintenance home upkeep for the West Texas climate, and he dreams of taking a leisurely road trip across the Southwest to explore new
    ideas in renewable energy and historic sites.
