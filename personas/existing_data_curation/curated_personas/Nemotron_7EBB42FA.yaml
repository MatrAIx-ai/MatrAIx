personas:
  professional: Jon Diaz, a 64‑year‑old pragmatic handyman and volunteer fire‑safety aide, blends his curiosity for new tools with decades of mechanical, electrical, and carpentry expertise to run a low‑key
    side business that serves neighbors, negotiates every part price, mentors high‑school students, and drafts a practical West Texas home‑upkeep guide, all while embracing his flexible, slightly disorganized
    work style.
  sports: Jon Diaz stays fit through seasonal deer and elk hunting, winter freshwater fishing, weekend target shooting at the Midland Range Club, and cheering on the Dallas Cowboys and Houston Astros, while
    fitting in short walks around his West Texas property to keep his joints mobile.
  arts: Jon Diaz expresses his creative side through woodworking projects influenced by the organic designs of George Nakashima, while relaxing to classic rock legends like Led Zeppelin, country icons such
    as Willie Nelson and Johnny Cash, and unwinding with John Wayne westerns on Saturday evenings.
  travel: Jon Diaz prefers flexible, self‑driven road trips, planning a leisurely Southwest tour that includes the historic oil‑boom towns of Midland and Odessa, the Petrified Forest National Park in Arizona,
    and solar farms near Santa Fe, New Mexico, balancing his love of history with a curiosity about renewable energy.
  culinary: Jon Diaz delights in grilling Texas‑style brisket and smoked pork ribs seasoned with a homemade hickory‑infused rub and jalapeño‑spiked barbecue sauce, while also preparing pan‑seared trout
    with lemon, dill, and smoked paprika after a successful lake‑fishing outing.
  core: Jon Diaz, the 64‑year‑old West Texas handyman, blends a competitive poker streak, a love for classic‑car restoration, and a habit of leaving tools scattered around his garage, all underpinned by
    a relaxed, skeptical outlook that keeps him emotionally steady.
background:
  cultural: Jon grew up in Midland, a city shaped by the oil boom and the wide‑open ethos of West Texas. His family blends Anglo and Hispanic roots, evident in the surname Diaz, and this mixed heritage
    has given him a modest appreciation for both English‑language traditions and occasional Spanish phrases used in the community. The regional culture emphasizes self‑reliance, pragmatic problem‑solving,
    and a strong sense of neighborly support—values reflected in his hands‑on skill set and his volunteer fire‑safety work. He participates in local events such as the Midland County Fair and the annual
    rodeo, enjoys church gatherings that reinforce community bonds, and relishes the expansive desert landscape that informs his love of hunting, fishing, and open‑road travel.
