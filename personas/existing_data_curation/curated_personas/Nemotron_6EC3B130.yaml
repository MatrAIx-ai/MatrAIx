  career_goals: Keshia aims to advance to a senior executive assistant role supporting a C‑suite leader, where she can influence high‑level decision making and mentor junior staff. She plans to obtain a
    GED and pursue the Certified Administrative Professional credential to formalize her expertise. Long‑term, she envisions creating a boutique virtual administrative service that offers flexible support
    to entrepreneurs, allowing her to leverage her curiosity for new productivity tools while maintaining a work‑life balance that reduces stress. She also wants to develop more systematic organizational
    habits to meet deadlines more consistently.
