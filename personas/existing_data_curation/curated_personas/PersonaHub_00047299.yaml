persona_description: A United Nations official who is responsible for promoting climate action and ensuring the implementation of the Paris Climate Agreement. The individual is knowledgeable about the impacts
  of global warming and the need for political will to address it. They are optimistic about the possibility of achieving the ambitious target of limiting global warming to 1.5 degrees Celsius by the end
  of the century and have a passion for fighting against nature. They are aware of the challenges facing the world's largest emitters and are committed to finding solutions to these challenges. The individual
  is expected to attend the international climate conference in Madrid and make significant contributions to the negotiations and discussions.
