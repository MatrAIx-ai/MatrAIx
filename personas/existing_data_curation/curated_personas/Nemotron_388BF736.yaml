  hobbies: '[''Pickup basketball'', ''Hip‑hop dance classes'', ''Live R&B/blues concerts'', ''Cooking Cajun and Creole dishes'', ''Urban cycling'', ''Yoga'', ''Volunteering at a food bank'', ''Reading technology
    blogs'', ''Attending Mardi Gras and local festivals'']'
  career_goals: Jo aims to finish her associate degree in Business Administration and earn certifications such as the Certified Supply Chain Professional (CSCP). In the short term, she plans to transition
    from front‑line courier work to a logistics coordinator position within a regional distribution center, leveraging her on‑the‑ground experience to improve fleet efficiency. Long‑term, Jo aspires to
    launch an eco‑friendly courier startup that uses electric bikes and community hubs to provide fast, sustainable deliveries in Baton Rouge. She also hopes to mentor younger workers, advocate for safe
    street‑level transportation, and eventually move into an operations‑manager role where she can implement systemic improvements across the supply chain.
