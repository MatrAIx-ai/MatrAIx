personas:
  professional: A logistics-focused courier with an eye for precision, Jo Vaughan channels their route-optimization expertise and organized, methodical mindset into a push for a logistics coordinator role,
    while their competitive edge drives them to constantly refine delivery processes and mentor new couriers.
  sports: Jo Vaughan hits the local basketball courts for pickup games, cycles with the Baton Rouge Bike Club, attends weekly hip-hop dance sessions, follows the LSU Tigers men's basketball and the New
    Orleans Pelicans, and unwinds with yoga, balancing competitive sports with a community-oriented fitness routine.
  arts: Jo Vaughan curates eclectic playlists blending Etta James, H.E.R., and local blues bands, attends R&B and blues shows at the Baton Rouge Blues Festival, practices hip-hop dance, and explores street
    art murals by creators like 'Mighty M', letting music and visual culture shape their creative outlook.
  travel: Jo Vaughan maps weekend getaways with spreadsheet precision, favors budget-friendly road trips to New Orleans for Mardi Gras revelry and Austin for live music, while dreaming of a future eco-tourism
    venture that combines electric bike tours with community art walks.
  culinary: Jo Vaughan experiments with Cajun and Creole staples like jambalaya, gumbo, and crawfish étouffée, loves the heat of Andouille sausage and the snap of fresh okra, and regularly hosts friends
    for potluck nights where they swap recipes and critique each dish with a competitive palate.
  core: Jo Vaughan blends a competitive, methodical logistics mind with a love for Southern rhythm, sustainable transport, and lively social scenes, yet their skepticism and occasional night-owl habits
    keep them constantly balancing curiosity with practicality.
background:
  cultural: 'Jo was raised within a close‑knit African‑American community in East Baton Rouge Parish. Her family’s traditions fuse Southern hospitality with rich Black cultural expressions: gospel music
    from the local Baptist church, hearty Creole and Cajun meals shared at family gatherings, and participation in community celebrations like second‑line parades and the annual Baton Rouge Blues Festival.
    She attended public schools where she was active in the Black Student Union and benefited from mentorship programs that emphasized self‑advocacy and collective uplift. Growing up in the South, Jo is
    keenly aware of the region’s history of both challenge and resilience for Black citizens, and this background fuels her drive to create economic opportunities within her community while honoring her
    heritage.'
attributes:
  skills: '[''Route optimization'', ''GPS navigation'', ''Time management'', ''Customer service'', ''Secure package handling'', ''Basic vehicle maintenance'', ''Data entry and record‑keeping'', ''Problem
