personas:
  professional: Henry, a 13‑year‑old aspiring robotics hobbyist, blends his curiosity for technology with practical problem‑solving by designing moving LEGO creations, tinkering with entry‑level robotics
    kits, and editing gaming videos for his school club, all while they stay reliably organized yet flexible enough to adapt to new challenges.
  sports: Henry is a devoted member of the local under‑14 soccer league, idolizes Lionel Messi and follows Manchester United’s games, regularly trains with friends after school, and balances competitive
    play with community service by organizing neighborhood clean‑ups during off‑season weekends, while they also enjoy watching international matches on the weekends.
  arts: Henry channels his love for sci‑fi into creative video edits of gaming sessions, cites Christopher Nolan and the band Daft Punk as major influences, enjoys reading Isaac Asimov and watching documentaries
    about SpaceX, and participates in the school’s media club, where they experiment with soundtracks from Imagine Dragons.
  travel: Henry dreams of visiting the Kennedy Space Center and the Smithsonian Air and Space Museum after completing a class project, cherishes past trips to the local science museum’s planetarium, and
    plans a future family road‑trip to the Grand Canyon where they can combine stargazing with outdoor hikes.
  culinary: Henry favors pepperoni pizza, cheesy quesadillas, and building LEGO‑shaped cookies, often helping his parents in the kitchen to prep simple snacks while they occasionally overindulge in sugary
    cereal after late‑night video editing sessions.
  core: Henry is a curious yet worry‑prone teen who balances building intricate LEGO robots and soccer drills with a penchant for organized routines, occasional impulsive snack binges, and a heartfelt commitment
    to helping his community, while they also seek calm through short mindfulness breaks.
background:
  cultural: Henry was raised in Wheaton, Illinois, a suburban community in DuPage County with a predominantly white, middle‑class demographic. His family emphasizes education, community involvement, and
    traditional Midwestern values. He attends a public middle school where extracurricular activities like sports, robotics, and volunteer clubs are strongly supported. Cultural traditions at home include
    celebrating holidays such as Thanksgiving and Christmas with family gatherings, attending a local Methodist church, and participating in community events like the annual Wheaton Summerfest. His background
    reflects a blend of European ancestry—primarily German and Irish—combined with exposure to the diverse cultural influences of nearby Chicago.
