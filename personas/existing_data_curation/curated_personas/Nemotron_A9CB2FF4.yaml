personas:
  professional: Nancy Brisset, a 26‑year‑old registered nurse in Rockford, blends meticulous clinical expertise—from IV therapy to electronic health record mastery—with a curiosity for evidence‑based practice,
    organizing each shift like a well‑planned project while mentoring peers and dreaming of a future as a charge nurse and community health specialist.
  sports: Nancy Brisset, who hikes the Rock River trail with the Rock River Trail Running Club, attends weekly yoga classes, and cheers for the Chicago Cubs and Chicago Bears, also participates in a local
    adult softball league that balances their love of teamwork with seasonal fitness.
  arts: Nancy Brisset finds artistic balance in reading contemporary fiction by Sally Rooney and listening to folk‑indie musicians like Sufjan Stevens while knitting and attending the Second City improv
    shows, a mix that nurtures their creative side and offers a soothing counterpoint to their clinical routine.
  travel: Nancy Brisset enjoys spontaneous weekend road trips to Chicago’s lakefront and Lake Geneva, reminisces about a recent backpacking adventure in the Canadian Rockies, and dreams of exploring Kyoto’s
    cherry‑blossom season and the rainforests of Costa Rica once their nursing program completes.
  culinary: Nancy Brisset’s culinary experiments revolve around nutrient‑dense dishes such as quinoa‑stuffed bell peppers, kale‑and‑chickpea salads with tahini dressing, and homemade Thai green curry, showcasing
    a solid home‑cooking skill set that blends Mediterranean flavors with a love for fresh, local ingredients like avocado and heirloom tomatoes.
  core: Nancy Brisset is a hyper‑organized, community‑driven nurse who balances a love of evidence‑based medicine with a passion for hiking, cooking, and knitting, all while navigating student‑loan repayments
    and occasional gadget cravings.
background:
  cultural: Nancy was raised in a middle‑class white family in Rockford, Illinois, with roots in the broader Midwestern cultural tapestry that blends German, Polish, and Irish heritage common to the region.
    Her upbringing emphasized practicality, hard work, and community involvement—values reflected in her reliable and cooperative nature. Growing up attending a local Lutheran church and participating in
    neighborhood events, she developed a strong sense of civic responsibility and appreciation for modest hospitality. While her community is predominantly homogenous, her work as a nurse in a diverse hospital
    setting has broadened her cultural awareness, prompting her to actively practice cultural competence and respect for patients of varied backgrounds. These influences shape her balanced worldview, combining
    Midwestern pragmatism with a curiosity for new ideas.
