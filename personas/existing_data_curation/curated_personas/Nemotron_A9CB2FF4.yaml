  career_goals: Nancy aims to build on her associate degree by completing a Bachelor of Science in Nursing within the next two years, leveraging her curiosity for evidence‑based practice. She aspires to
    become a charge nurse, leading her unit with the same reliability and organization she is known for. Long‑term, she envisions transitioning into a clinical nurse specialist or family nurse practitioner
    role, focusing on community health promotion and chronic disease management for underserved populations in Rockford. Nancy also hopes to serve as a preceptor and mentor for new nurses, fostering a collaborative
    and supportive work environment. Participation in hospital quality improvement committees and driving patient safety projects remain central to her professional ambition.
