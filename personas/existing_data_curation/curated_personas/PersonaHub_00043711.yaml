persona_description: A Rochester community member who is passionate about sharing their experiences and memories of their life in Rochester during the turbulent era of racial discrimination. They are a
  dedicated activist and community member who has contributed to the Rochester Black Freedom Struggle Online History Project by sharing their recollections of their lives in Rochester. They are knowledgeable
  about the city's response to one of its darkest hours and are excited to share their stories with others. They are a valuable resource for anyone interested in learning about Rochester's African-American
  history and the struggles of its residents during that time.
