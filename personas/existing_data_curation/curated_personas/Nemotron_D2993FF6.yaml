personas:
  professional: Rendell Curry, an aspiring multimedia creator who blends street art, digital illustration, and robotics, leverages their curiosity and competitive edge to lead debate club arguments and
    produce polished short videos, dreaming of a future as a creative technologist.
  sports: Rendell Curry, a dedicated pickup basketball player at the local community center, follows the Houston Rockets avidly, captains a small high-school slam-ball league, and shares a membership with
    the Houston Athletic Club's youth swim team, balancing competitive drive with a love for street-ball flair.
  arts: Rendell Curry, an enthusiastic street-art explorer and digital illustrator, draws inspiration from Banksy's stencil work, Basquiat's raw energy, and the beats of Kendrick Lamar, while curating playlists
    that fuel their sketch sessions and collaborating with friends on animated short vlogs.
  travel: Rendell Curry, a weekend museum-hopper who has trekked to the Space Center Houston, spent a family vacation in New Orleans for Mardi Gras, dreams of visiting Tokyo's Akihabara for anime and beat-making
    gear, and plans a spring road trip to Austin's music festivals with friends.
  culinary: Rendell Curry, a budding home cook who loves crafting spicy chicken-fried steak, perfecting homemade tacos al pastor with pineapple, and experimenting with hot-sauce-infused ramen, but often
    forgets to finish vegetables due to a focus on flavor intensity.
  core: Rendell Curry, a curious, competitive teen who blends art, tech, and sports into a fast-paced life, juggling late-night video edits, impulsive sneaker buys, and a relentless pursuit of creative
    expression.
background:
  cultural: Rendell is an African American teen raised in Spring, a suburb of Houston, where he blends Southern Texas culture with his family's Black heritage. He grew up attending a local Baptist church,
    celebrating holidays such as Juneteenth and Kwanzaa, and enjoying family gatherings featuring soul food and barbecue. The vibrant music scene of Houston—especially hip‑hop, blues, and jazz—has shaped
    his tastes, while community events and multicultural festivals in Harris County expose him to a diverse array of traditions. He values the legacy of African American educators and activists in the area,
    and often participates in community service projects that aim to empower other youth.
