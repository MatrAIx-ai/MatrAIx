  career_goals: Rendell aspires to attend a specialized high‑school program that focuses on visual arts and technology, with the long‑term goal of becoming a creative director or multimedia producer. He
    envisions creating a YouTube channel that blends art tutorials with cultural commentary, and eventually building a freelance career that lets him work on music videos, short films, and digital advertising.
    He also dreams of studying computer science or graphic design at a university, where he can merge his critical thinking and artistic passions into innovative interactive media experiences.
