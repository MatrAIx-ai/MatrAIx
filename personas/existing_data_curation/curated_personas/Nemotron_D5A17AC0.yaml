    and assertive negotiation"]'
  hobbies: '["Intramural soccer", "Mountain biking", "Skateboarding", "Community garden volunteering", "Playing electric guitar", "DIY video creation", "Hiking", "Live music concerts", "Multiplayer video
    gaming", "Cooking for friends"]'
  career_goals: Robert aims to earn his GED within the next year and enroll in a community‑college program focused on automotive technology or renewable‑energy systems—fields that satisfy his desire to
    learn practical skills while exploring new ideas. He plans to secure an apprenticeship to gain real‑world experience, eventually opening a small business that offers bike‑repair and eco‑friendly vehicle
    services. Alongside his vocational goals, he hopes to take on leadership roles in local community projects, leveraging his organizational strengths and sociable nature.
