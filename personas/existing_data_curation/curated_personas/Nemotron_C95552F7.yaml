    facilitation"]'
  hobbies: '["Exploring Chicago street art and murals", "Visiting museums and galleries", "Skateboarding", "Salsa dancing and Latin music", "Cooking Mexican home‑cooked meals", "Reading speculative fiction",
    "Podcast listening about creativity and mental health", "Volunteering at community art workshops", "Sketching and hand‑drawing", "Attending live music and cultural festivals"]'
  career_goals: Henrri aims to complete his GED within the next year and enroll in a community‑college program focused on visual communications or graphic design. He hopes to build a portfolio that blends
    his love of Mexican folk art with contemporary street‑art aesthetics, eventually securing an internship at a local art gallery or cultural center. Long‑term, he envisions a role as a community arts
    coordinator where he can develop public murals, organize cultural festivals, and provide mentorship to other young creators. He also aspires to freelance as a photographer and social‑media consultant
    for small businesses, allowing him the flexibility he values while turning his creative passions into sustainable income.
