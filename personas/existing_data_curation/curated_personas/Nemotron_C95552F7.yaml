personas:
  professional: Henrri Cardonaortiz, an aspiring community arts coordinator, leverages self‑taught graphic design, bilingual fluency, and a knack for event mediation to blend traditional folk motifs with
    Chicago street‑art in freelance photography and social‑media consulting, even as a laid‑back attitude toward planning sometimes leaves deadlines slipping.
  sports: Henrri Cardonaortiz finds kinetic release on the ramps of the Chicago Skate Plaza, follows the Chicago Bulls and the local Chicago Fire soccer team, and mixes occasional skate sessions with group
    salsa dance classes at a studio, viewing fitness as a social, rather than regimented, activity.
  arts: Henrri Cardonaortiz immerses themselves in Chicago’s mural scene, drawing inspiration from artists like Shepard Fairey and Murales de la Ciudad, while sketching reproductions at the Art Institute,
    joining salsa nights to the beats of Celia Cruz, and curating pop‑up gallery events that showcase emerging street artists.
  travel: Henrri Cardonaortiz loves spontaneous weekend getaways, having trekked to Oaxaca to learn tamale‑making and now eyeing Berlin’s Kreuzberg to scout its graffiti, while favoring affordable Airbnb
    stays that let them chat with locals and sketch urban landscapes.
  culinary: Henrri Cardonaortiz whips up mole poblano and tamales on Sunday afternoons, perfecting the balance of chilies and chocolate, but often over‑spices when distracted by music, and enjoys pairing
    the dishes with freshly squeezed horchata and artisanal corn tortillas from the local market.
  core: Henrri Cardonaortiz is a free‑spirited visual storyteller who blends street art, skate culture, and family recipes into a vibrant, if sometimes disorganized, pursuit of community connection.
background:
  cultural: Henrri was raised in a Mexican‑American household in Chicago’s Pilsen district, a neighborhood known for its vibrant Latino culture. He grew up bilingual, speaking Spanish at home while navigating
    an English‑dominant school system. Family gatherings centered around traditional foods, music, and celebrations like Día de los Muertos, which fostered his appreciation for Mexican folk art, papel picado,
    and bright color palettes. The cultural mix of his community—blending Mexican heritage with Chicago’s urban rhythm—has shaped his worldview, giving him a strong sense of solidarity with fellow immigrants
    and a desire to showcase the richness of his heritage through public art and community projects.
attributes:
  skills: '["Bilingual Spanish-English communication", "Basic graphic design using Canva", "Digital photography and light‑room editing", "Social media content creation", "Volunteer event coordination",
