  career_goals: Tina aims to translate her community‑focused experience into a formal role in nonprofit management or community development. She plans to complete an associate degree in business administration
    or public service, obtain a project‑management certification, and eventually secure a position as a community liaison or program coordinator for a local nonprofit. Long‑term, she envisions launching
    her own small‑scale social‑enterprise that blends event planning with community enrichment, allowing her to balance structured work with the flexibility she values.
