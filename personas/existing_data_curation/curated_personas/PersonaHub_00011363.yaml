persona_description: A forest researcher with expertise in dynamic stratification for estimating stand level forest characteristics, specifically in estimating basal areas, mean diameter, mean height, and
  mean age. The research involves the use of Landsat TM principal components as auxiliary data, and the study of species mixture and prescribed burning. The persona is interested in studying the effect
  of species composition and the use of development stage class as an auxiliary variable to achieve more accurate estimates. They are also interested in the effect of the prescribed burning of forest areas
  on the regeneration of tree species.
