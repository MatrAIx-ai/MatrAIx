  hobbies: '[''Sketching'', ''Painting'', ''Photography'', ''Reading'', ''Woodworking'', ''Journaling'', ''Herb gardening'', ''Hiking'', ''Live folk music'', ''Volunteering at community arts center'']'
  career_goals: Dominique aims to leverage her hands‑on production experience into a leadership role within the manufacturing sector. In the short term, she plans to obtain OSHA safety certification and
    a Lean Six Sigma Yellow Belt to improve efficiency on the shop floor. Over the next three years she hopes to be promoted to shift supervisor, overseeing a small team and spearheading continuous‑improvement
    projects. While she values the stability of the manufacturing field, Dominique also wants to integrate her artistic interests; she intends to enroll in a community‑college program in industrial design
    or visual communications, eventually working in product development where she can blend technical production expertise with creative design. Long‑term, she envisions either managing a sustainable production
    line or launching her own small line of handcrafted home décor that reflects her Appalachian roots.
