personas:
  professional: Ryan Wang is an aspiring junior engineer and budding scientist who channels his love for LEGO mechanics and after‑school experiments into structured, hands‑on projects, collaborating eagerly
    with friends while meticulously following step‑by‑step guides to satisfy his need for predictability.
  sports: Ryan Wang is a fervent fan of the San Jose Earthquakes and the San Francisco Giants, plays soccer with the Santa Cruz Youth Soccer League, and hones swimming skills at the Santa Cruz Aquatics
    Club while eagerly joining beach‑clean‑up crews after practice.
  arts: Ryan Wang draws vivid marine animals inspired by the colorful underwater scenes of Disney’s Finding Nemo, enjoys the whimsical stop‑motion LEGO videos on YouTube, and immerses themselves in J.K.
    Rowling’s Harry Potter series, often humming the energetic beats of Imagine Dragons while building intricate LEGO landscapes.
  travel: Ryan Wang has collected seashells along Monterey Bay, dreams of snorkeling the Great Barrier Reef in Australia, and hopes to explore the historic castles of Scotland, balancing careful planning
    of beach trips with spontaneous family road trips to nearby state parks.
  culinary: Ryan Wang loves devouring warm clam chowder with fresh sea‑salt, munching fish tacos topped with lime and cilantro, and occasionally attempts to bake chocolate‑chip cookies, though they often
    forget the flour and end up with a crunchy doughy mess.
  core: Ryan Wang blends a meticulous, structure‑loving mind with boundless social energy, worries about details yet thrives in group adventures, and habitually hoards spare change for LEGO while forgetting
    to drink water during play.
background:
  cultural: Ryan was born and raised in Saint Augustine, Florida, a city known for its historic Spanish colonial heritage and vibrant coastal culture. His family, of European descent, celebrates typical
    American holidays like Thanksgiving, Christmas, and the Fourth of July, often blending in local traditions such as beach picnics and visits to the historic fort. Growing up near the Atlantic, Ryan frequently
    experiences beach culture—swimming, fishing, and learning about marine life. He attends a public elementary school with a diverse student body, where he enjoys learning about the city's history and
    the mix of cultures that shape his community.
