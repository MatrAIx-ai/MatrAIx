  career_goals: Ryan is fascinated by the ocean and marine life, and he often says he wants to become a marine biologist who studies dolphins and sea turtles. He imagines spending his days observing wildlife,
    conducting simple experiments, and helping protect the coastal environment. He also dreams of working in a wildlife rescue center where he could help injured animals and teach others about caring for
    nature. These goals reflect his desire for a purposeful, structured career that combines his love of nature, practical problem‑solving, and helping others.
