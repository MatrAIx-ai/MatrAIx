personas:
  professional: Sara Boykin is a budding young engineer in the making, who constructs detailed LEGO sets following step-by-step instructions, applying her love for routine and practical problem-solving,
    while her competitive streak pushes them to perfect every build.
  sports: Sara Boykin is a left-back on the Riverbend Youth Soccer Club, where they thrive on the structured drills and weekend matches, while cheering on the Seattle Seahawks and the US Women's National
    Soccer Team during family viewing nights, balancing their competitive edge with a love for team routine.
  arts: Sara Boykin spends free afternoons sketching intricate drawings of forest animals inspired by the works of Beatrix Potter and the vibrant colors of Studio Ghibli's 'My Neighbor Totoro,' often humming
    the soundtrack of 'Frozen' while they create, reflecting their blend of solitary creativity and appreciation for familiar, whimsical narratives.
  travel: Sara Boykin's travel style is a mix of carefully planned family road trips to the lake where they collect rocks and shells, and occasional excitement for a once-in-a-life ride on the Disney World
    monorail, preferring destinations that offer both predictable routines and opportunities for treasure-hunting adventures.
  culinary: Sara Boykin loves the comforting taste of homemade mac and cheese, the crisp bite of apple slices, and the sweet tang of strawberry shortcake, often helping to stir batter for chocolate chip
    pancakes while they insist on perfectly aligned vegetable sticks on their plate.
  core: Sara Boykin is a routine-loving, competitive seven-year-old who channels their skeptical curiosity into building flawless LEGO creations, collecting lake treasures, and meticulously budgeting their
    allowance, all while occasionally forgetting to finish their homework before bedtime.
background:
  cultural: Sara is raised in a middle‑class white family in Kenosha, Wisconsin, where Midwestern values of politeness, community involvement, and a practical work ethic are emphasized. Her family celebrates
    typical American holidays like Thanksgiving and Fourth of July, enjoys seasonal activities such as ice skating in winter and lake trips in summer, and attends local community events. While her household
    reflects mainstream Protestant cultural norms, it also acknowledges the region’s diverse European heritage, including German and Polish influences, which appear in occasional traditions like baking
    pretzels for family gatherings.
