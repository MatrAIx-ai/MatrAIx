personas:
  professional: An aspiring junior builder and problem-solver, Luis Tejeda channels their love for step-by-step LEGO constructions into early tinkering with simple machines, applying disciplined organization
    and a routine-driven mindset to every small project they undertake.
  sports: Luis Tejeda passionately plays midfield for the Madera Youth Soccer Club, follows the San Francisco 49ers and Los Angeles Dodgers on game nights, and they stick to a disciplined after-school training
    routine that mixes skill drills with endurance runs, balancing teamwork with personal practice.
  arts: With a budding talent on acoustic guitar, Luis Tejeda routinely learns classic songs by artists such as Carlos Santana, Juan Gabriel, and Selena, integrating the lively rhythms of family gatherings
    into their practice while they also indulge in building LEGO models inspired by iconic movie sets.
  travel: Luis Tejeda's travel style blends careful planning with a sense of adventure, favoring short family road trips to places like Yosemite National Park and the Monterey Bay Aquarium, while dreaming
    of a future cultural exchange visit to Mexico City's historic center when they can save enough from their allowance.
  culinary: Luis Tejeda enjoys helping their mother prepare traditional tacos al pastor and tamales, mastering the art of seasoning with pineapple and chipotle, and they love experimenting by adding fresh
    cilantro and lime to perfect the balance of flavors while practicing simple cooking techniques on their own.
  core: Luis Tejeda is a routine-loving, organized eleven-year-old who balances disciplined LEGO building, soccer teamwork, and family music sessions with a habit of meticulous budgeting and a quiet determination
    to master new skills despite occasional forgetfulness.
background:
  cultural: Luis comes from a Mexican‑American family in Madera, California. At home, Spanish is spoken alongside English, and he grows up immersed in traditions such as Día de los Muertos, quinceañera
    celebrations, and weekly family gatherings centered around shared meals. His Catholic upbringing emphasizes community service, respect for elders, and the value of hard work. The agricultural landscape
    of the Central Valley influences his appreciation for the land and his interest in sustainable farming solutions. He balances the vibrant cultural rhythms of Mexican music and cuisine with the practical,
    routine‑focused mindset encouraged by his parents and school environment.
