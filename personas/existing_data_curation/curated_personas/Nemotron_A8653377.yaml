personas:
  professional: Vivian Chhabra, a meticulous retired administrative professional with a talent for budgeting, record-keeping, and community event planning, channels their methodical nature into leading
    the town's historical society archival project while mentoring younger volunteers in organized logistics.
  sports: Vivian Chhabra, a devoted fan of the Minnesota Twins and Vikings, spends their weekends cheering at the stadium or streaming games while participating in a low‑impact walking group at the senior
    center, and maintains a competitive edge in bridge tournaments that feels like their personal sport.
  arts: Vivian Chhabra, an avid lover of folk music and classical tunes, frequently listens to Bob Dylan and Anoushka Shankar on their vintage record player, enjoys the watercolor works of Grandma Moses,
    and draws inspiration from the vivid colors of Faith Ringgold’s quilts for their own intricate quilting projects.
  travel: Vivian Chhabra, an adventurous yet budget‑conscious traveler, has journeyed to the historic forts of New France in Quebec, visited their husband's family in Delhi to celebrate Diwali, and plans
    a road‑trip across Minnesota's North Shore to photograph sunrise over Lake Superior before their next birthday.
  culinary: Vivian Chhabra, a home‑cook who balances Midwestern comfort foods like hotdish and butter‑tulip carrots with fragrant Indian dishes such as chana masala and garlic naan, loves experimenting
    with fresh garden herbs like basil and dill while carefully measuring spices to match their precise palate.
  core: Vivian Chhabra, a structured 72‑year‑old who blends meticulous quilting, competitive bridge, and a love for community archives with a habit of hoarding receipts and a quiet skepticism that keeps
    them both reliable and delightfully unpredictable.
background:
  cultural: Vivian was raised in a predominantly white, Midwestern farming community in Minnesota, embodying the region’s values of self‑reliance, modesty, and community service. Through her marriage to
    an Indian‑American husband, she has incorporated aspects of Indian culture—such as celebrating Diwali, enjoying Indian cuisine, and appreciating multicultural perspectives—into her family life, creating
    a blended cultural identity that honors both her White Midwestern roots and South Asian traditions.
