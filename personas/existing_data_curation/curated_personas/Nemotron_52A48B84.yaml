  hobbies: '[''Vegetable gardening'', ''Woodworking (birdhouses, furniture)'', ''Fishing'', ''Church bible study'', ''Historical photography'', ''Crossword puzzles'', ''Bridge (card game)'', ''Attending
    local football games'', ''Volunteering at the senior center'']'
  career_goals: Although retired, Thomas aims to stay active by mentoring younger members of his church and senior center, completing a digital photography course to document the Badlands, organizing local
    history preservation projects, and ensuring his health allows him to remain independent. He also hopes to finish writing his memoir and to assist his grandchildren in learning practical trades while
    maintaining his home and garden.
