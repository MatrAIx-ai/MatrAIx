personas:
  professional: Alejandra Landa is a meticulous dental and ophthalmic laboratory technician who combines hand‑wax craftsmanship with cutting‑edge CAD/CAM software like Exocad and 3Shape, consistently delivering
    high‑quality prostheses while leveraging their methodical planning and collaborative communication to mentor junior staff and drive process improvements toward future certification and boutique ownership.
  sports: Alejandra Landa fuels their love of the outdoors by hiking the Sauratown Mountains each weekend, participates in the Raleigh Hiking Club’s monthly treks, follows the Carolina Hurricanes and Charlotte
    Hornets, and they maintain a disciplined home workout routine that includes yoga and resistance training to counteract prolonged standing in the lab.
  arts: Alejandra Landa captures the subtle beauty of everyday moments through photography inspired by Ansel Adams and Annie Leibovitz, reads immersive historical fiction by Hilary Mantel and Ken Follett,
    attends performances by the North Carolina Symphony, and they routinely curate playlists featuring Luis Fonsi, Celia Cruz, and classical piano to accompany their creative process.
  travel: Alejandra Landa delights in both scenic road trips through the Blue Ridge Parkway and cultural immersion trips to Puerto Rico and Barcelona, prefers meticulously planned itineraries with a balance
    of hiking, culinary tours, and museum visits, and they dream of future adventures in Japan to explore cutting‑edge dentistry technology and traditional tea ceremonies.
  culinary: Alejandra Landa blends farm‑to‑table freshness from her vegetable garden with traditional Puerto Rican flavors, expertly preparing arroz con gandules with sofrito, cilantro, and achiote, slow‑roasting
    lechón seasoned with adobo and sazón, and crafting pastelitos using yucca and plantain, while they experiment with modern plating techniques and source heirloom tomatoes and fresh herbs for each dish.
  core: Alejandra Landa is a methodical lab technician who balances precise prosthetic craftsmanship with a love for gardening, cooking Puerto Rican cuisine, solitary mountain hikes, and photography, all
    while strategically planning a future boutique lab and disciplined financial future.
background:
  cultural: Alejandra is a first‑generation American of Puerto Rican descent. Raised in a bilingual household, she speaks both Spanish and English fluently and grew up celebrating traditional festivals
    such as Fiesta de San Juan and Día de los Reyes. Family gatherings centered on music, dance, and food have instilled in her a deep appreciation for community and hospitality. She maintains strong ties
    to the local Puerto Rican diaspora in North Carolina, frequently participating in cultural events at the nearby Hispanic Heritage Center. Her heritage influences her cooking, the Spanish language she
    uses when assisting Spanish‑speaking patients, and her commitment to giving back through volunteer work that addresses health disparities in Latino communities.
attributes:
  skills: '[''Dental prosthesis fabrication'', ''Crown and bridge construction'', ''Removable denture design'', ''Dental lab CAD/CAM software (Exocad, 3Shape)'', ''Ophthalmic lens grinding and edging'',
    ''Custom spectacle frame assembly'', ''Medical appliance construction (orthotics, prosthetics)'', ''Material selection and testing'', ''Quality control and inspection'', ''Regulatory compliance (HIPAA,
    OSHA)'', ''Technical documentation'', ''Inventory management'', ''Effective communication with clinicians'', ''Problem‑solving under time constraints'']'
  hobbies: '[''Gardening'', ''Cooking Puerto Rican meals'', ''Hiking'', ''Reading historical fiction'', ''Volunteering at community health fairs'', ''Photography'']'
  career_goals: Alejandra aims to become a Certified Dental Technician (CDT) and obtain an ophthalmic technician certification within the next three years. She plans to enroll in a bachelor’s program in
    Health Sciences to deepen her knowledge of biomaterials and digital dentistry. Her long‑term ambition is to step into a supervisory role, lead a small team of technicians, and mentor new hires, fostering
    a culture of precision and reliability. She is also passionate about integrating 3D printing technology into her workflow to improve efficiency and patient outcomes. Ultimately, Alejandra envisions
    opening her own boutique laboratory that serves the growing Spanish‑speaking community in the Triangle area, offering culturally sensitive care and affordable prosthetic solutions.
