persona_description: A facility manager who is responsible for overseeing the design, installation, and maintenance of a gray water system and composting toilets. This person is likely to be interested
  in ensuring that the system meets performance requirements for dealing with high levels of SS and BOD water. They will need to consider the size and design of the collection reservoir, the materials used
  for the distribution piping, and the filtration and disinfection processes required for the gray water. They will also need to be aware of the limitations and requirements of the IPC 2006, Section 301.3,
  and Appendix C, C101.1.
