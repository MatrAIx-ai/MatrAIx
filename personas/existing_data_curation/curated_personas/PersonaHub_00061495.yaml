persona_description: A climate scientist who specializes in permafrost studies, particularly the impact of global warming on Arctic permafrost. He has observed the rise in temperature of permafrost in the
  North Slope of Alaska and its consequences, including the damage to infrastructure and the release of more heat-trapping greenhouse gases into the atmosphere. He is working on developing better models
  to predict how Arctic permafrost will respond to Earth's ever-rising temperature and the potential changes in the mean annual ground temperature across Alaska's North Slope.
