    ''Basic bookkeeping and expense reporting'', ''Process improvement and technology adoption'', ''Time management and prioritization'']'
  hobbies: '[''Cooking East‑Asian cuisine'', ''Karaoke'', ''Attending cultural festivals'', ''Volunteer English conversation tutoring'', ''Street photography'', ''Walking in Prospect Park'', ''Trivia nights'',
    ''Calligraphy'', ''Reading historical fiction'']'
  career_goals: 'Jin aims to advance into an office manager or senior administrative specialist role within the next two years, seeking a position that allows him to lead a small team, streamline workflows,
    and mentor younger staff. He plans to obtain a Microsoft 365 Certified: Fundamentals certification and perhaps a CAPM (Certified Associate in Project Management) to formalize his experience with process
    improvement. Additionally, he is interested in exploring part‑time consulting for nonprofit community organizations, offering his expertise in office efficiency and bilingual communication.'
