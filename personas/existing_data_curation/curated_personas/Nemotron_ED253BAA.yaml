  hobbies: '["gardening", "woodworking", "fishing", "historical reading", "jigsaw puzzles", "chess", "church activities", "volunteering at senior center", "scenic drives", "bird watching"]'
  career_goals: Although retired, William channels his competitive drive into purposeful community endeavors. He aims to lead the development of a heritage garden in Dallas, NC, preserving local flora and
    historical memory. He intends to mentor younger volunteers at the senior center, sharing his mechanical and woodworking knowledge. William also seeks to author a memoir that documents his life and the
    evolving culture of Gaston County, hoping it will serve as a resource for future generations. Personal milestones include completing a cross‑country road trip in his classic car and maintaining optimal
    health through regular walking and stretching routines.
