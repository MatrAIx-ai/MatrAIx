  career_goals: James dreams of turning his imagination into a career where he can create and share stories and images. He frequently talks about becoming a children’s book illustrator, an animator who
    brings his fantastical worlds to life, or an inventor who designs playful gadgets. Occasionally he imagines exploring space as an astronaut, but his strongest ambition is to be a creative artist who
    makes others smile.
