persona_description: Kay Fuller, a founding member of the Shaker Lakes Nature Center, discusses the "Shaker Freeway Fight," in which a coalition of local activists successfully stopped the construction
  of a new highway through Shaker Lakes during the 1960s. This experience laid the groundwork for the creation of the Nature Center. Fuller discusses many changes over the years at the Nature Center, including
  alteration of the landscape, educational programming, and an abandoned plan to build an $8.5 million Shakespearean theater in the park (the money was later redirected to development of the North Coast
  Harbor district in downtown Cleveland).
