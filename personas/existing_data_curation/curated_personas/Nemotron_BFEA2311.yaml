    and budgeting'', ''Lean manufacturing and process optimization'', ''Customer service and client liaison'']'
  hobbies: '[''Ballroom dancing (salsa & Latin)'', ''Pick-up basketball league'', ''Mystery book club'', ''Cooking and hosting potluck dinners'', ''Brooklyn street festivals and cultural events'', ''Community
    garden volunteer work'', ''DIY electronics and mechanical tinkering'', ''Yoga and mindfulness practice'', ''Journaling and reflective writing'']'
  career_goals: Adrienne aims to move from operator to shift supervisor within the next two years, then to floor manager, leveraging her blend of practical know‑how and curiosity about new printing technologies.
    She plans to obtain a certified press operator credential and lead the shop’s transition to hybrid digital workflows. Long‑term, she dreams of opening a boutique print studio that specializes in artisanal
    ink prints for local artists, allowing her to mentor younger workers while achieving greater financial stability and a healthier work‑life balance for herself and her family.
