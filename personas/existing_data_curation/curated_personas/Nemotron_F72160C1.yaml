  career_goals: Teresa aims to re‑enter the workforce in a flexible, technology‑focused role that accommodates her family responsibilities. She is targeting part‑time or remote data analyst positions and
    plans to earn a data‑science certification to sharpen her analytical skill set. Additionally, she is passionate about launching a community STEM outreach program for middle‑school girls in Burlington
    County, leveraging her technical background and love of group activities. In the longer term, Teresa hopes to obtain a Project Management Professional (PMP) credential and transition into a product‑manager
    or technical project‑lead role within a socially responsible tech company.
