persona_description: A retired family historian who has researched and documented the lives of the Weber family, particularly their childhood on Crocus Court in Greendale, Wisconsin. The persona is knowledgeable
  about family history, genealogy, and the dynamics of large families. They are interested in the traditions, customs, and social norms of the past, and have a deep appreciation for the struggles and joys
  of raising a large family in a small town. The persona is also interested in the history of Greendale, and the impact of the Weber family on the community.
