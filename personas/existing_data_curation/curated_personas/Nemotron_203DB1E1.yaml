  career_goals: Priscilla dreams of a future where she can combine her love of helping others with her creative talents. She imagines becoming a teacher or a community youth organizer who uses art and storytelling
    to inspire and support children. She is also drawn to the idea of working in a child-focused health setting, such as a pediatric nurse or therapist, where her empathy and desire to maintain harmony
    can make a difference. In the longer term, she hopes to lead community art programs that bring together diverse groups in Allen and promote understanding and well‑being.
