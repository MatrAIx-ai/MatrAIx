personas:
  professional: Priscilla Myles, an imaginative junior storyteller, blends their love for drawing fantasy scenes with beginner-level coding on Scratch to create animated tales, often leading class projects
    with a natural flair for organizing group activities while staying flexible when ideas evolve.
  sports: Priscilla Myles laces up for the Dallas Texans youth soccer league every Saturday, cheers loudly for the Dallas Cowboys on Sundays, and keeps fit by practicing ballet at the local dance studio,
    balancing competitive play with a love for rhythmic movement.
  arts: Priscilla Myles fills sketchbooks with fantasy cityscapes inspired by the vibrant illustrations of Alex Ross and the whimsical worlds of J.K. Rowling, sings along to Billie Eilish while rehearsing
    choir parts, and spends weekends immersed in Pixar films starring Tom Hanks.
  travel: Priscilla Myles plans family trips around weekend hikes at Cedar Ridge Preserve, day trips to San Antonio’s River Walk for taco tasting, and eagerly anticipates a future vacation to New Orleans
    during Mardi Gras to experience live jazz and colorful parades.
  culinary: Priscilla Myles enjoys whipping up cheesy macaroni, assembling crispy chicken‑fried steak tacos, and baking chocolate‑chip cupcakes for birthday parties, dreaming of recreating the buttery pumpkin‑spice
    latte from the local coffee shop in their own kitchen.
  core: Priscilla Myles harnesses boundless curiosity and a vibrant imagination to turn everyday moments into colorful stories, even while wrestling with worries that sometimes turn their artistic energy
    into a delightful, albeit occasionally scattered, whirlwind.
background:
  cultural: Priscilla is an African American girl raised in a close‑knit family in Allen, Texas, a suburban community within Collin County. Her family values education, community involvement, and the arts,
    often attending church events, local Juneteenth celebrations, and family gatherings that feature music, storytelling, and shared meals. Growing up in the Dallas‑Fort Worth metro area, she has been exposed
    to a blend of Southern Texan culture and the vibrant multicultural scene of the nearby city, which includes visits to museums, cultural festivals, and community service projects. Her parents encourage
    her curiosity and support her artistic pursuits, while also emphasizing the importance of empathy, respect, and helping others, values that reflect both her cultural heritage and the inclusive spirit
    of her neighborhood.
