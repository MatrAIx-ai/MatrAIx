persona_description: A spring manufacturer who specializes in developing and prototyping compression springs for firearms and other applications, with a focus on understanding the complicated mathematical
  relationships required to work with stranded wire. They have a diverse expertise in developing stranded wire and shaped wire springs and have been manufacturing them for many different OEM's since WWII.
  They are experienced in working with wire suppliers to clearly define specifications for stranding, especially the specific pitch the wire should be woven to. The spring designer should specify the precise
  wire output needed before coiling the spring. They have a unique understanding of the importance of working with the wire supplier to clearly define specifications for stranding, especially the specific
  pitch the wire should be woven to.
