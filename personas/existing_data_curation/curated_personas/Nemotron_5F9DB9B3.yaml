  hobbies: '[''Drawing and illustration'', ''Piano practice'', ''Reading adventure and fantasy novels'', ''Art club activities'', ''Soccer with friends'', ''Nature hikes'', ''Community festivals'', ''Girl
    Scouts badge projects'']'
  career_goals: While still exploring her interests, Vicky envisions a future where she can combine her love for art and helping others. She dreams of becoming an elementary school teacher who incorporates
    creativity into the classroom, or an illustrator who creates books that inspire young readers. She also expresses curiosity about scientific fields, mentioning a wish to be a marine biologist one day,
    motivated by her fascination with ocean documentaries and the desire to protect wildlife.
