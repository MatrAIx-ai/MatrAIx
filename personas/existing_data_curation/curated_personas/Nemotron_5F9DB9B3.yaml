personas:
  professional: Vicky Jefferson is an aspiring young illustrator who channels their curiosity and methodical planning into detailed watercolor renditions of beloved book characters, while thriving in the
    collaborative environment of her school's art club.
  sports: Vicky Jefferson laces up for weekly matches with the Willow Creek Youth Soccer team, enjoys the camaraderie of playing at local parks, and proudly wears a T‑shirt featuring the Sporting Kansas
    City logo while also applying Girl Scout leadership badges to organize team clean‑up days.
  arts: Vicky Jefferson finds inspiration in the vibrant storytelling of Hayao Miyazaki and the whimsical illustrations of Beatrix Potter, dedicating after‑school hours to experiment with mixed‑media collages
    that blend watercolor washes with cut‑out magazine clippings, and regularly attends the Webb City Fall Festival art showcase.
  travel: Vicky Jefferson loves weekend family excursions to the Ozark National Forest and historic Eureka Springs, preferring thoughtfully planned nature hikes with sketchbooks in tow over spontaneous
    trips, yet dreams of backpacking through the Scottish Highlands after reading adventure novels.
  culinary: Vicky Jefferson enjoys simple comfort foods like pepperoni pizza and cheesy spaghetti, delights in crafting their own trail mix using granola, dried cranberries, and pretzel bits, and while
    their cooking skills are limited to microwaving leftovers, they eagerly help frost cupcakes during Girl Scout bake sales.
  core: Vicky Jefferson is an 11‑year‑old curious, organized explorer who blends artistic ambition with soccer energy, secretly hoards glitter glue for midnight doodles, and sometimes forgets to finish
    homework when a new badge project sparks excitement.
background:
  cultural: Vicky is raised in a predominantly white, middle‑class family in Webb City, Missouri, where Midwestern values such as community involvement, politeness, and a strong work ethic are emphasized.
    Her family participates in local traditions like church gatherings, high school football games, and seasonal barbecues, which reinforce a sense of belonging and cooperation. The region's appreciation
    for community arts—evident in local fairs and school programs—has nurtured Vicky's artistic interests, while the close‑knit town atmosphere supports her sociable and collaborative personality.
