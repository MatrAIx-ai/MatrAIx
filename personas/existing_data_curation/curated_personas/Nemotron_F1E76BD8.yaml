  career_goals: Even at five, Elisabeth enjoys dreaming about the future. She often says she wants to become an artist who paints bright pictures and tells stories that make people smile. She also imagines
    being a teacher who helps younger children discover books and art, or a park ranger who explores the woods and protects animals. Her ambitions are guided by her love of creativity, her desire to help
    others, and her wonder for the natural world.
