personas:
  professional: Elisabeth Sandifer, a budding explorer at age five who treats sandbox experiments and storytime questions like mini research projects, channels their natural curiosity into a playful early‑career
    passion for discovery.
  sports: Elisabeth Sandifer dabbles in “tiny tots” soccer with the Little Lions Club, cheers for the Seattle Seahawks on game nights, and prefers a gentle after‑school gymnastics class that their kindergarten
    teacher recommends for its low‑pressure group setting.
  arts: Elisabeth Sandifer spends afternoons drawing whimsical creatures inspired by Dr. Seuss and watching Pixar’s “Toy Story” while humming along to the “Sesame Street” theme song, and they proudly display
    a glittery cut‑out of Van Gogh’s “Starry Night” in their bedroom.
  travel: Elisabeth Sandifer delights in family road trips to the Grand Canyon and weekend visits to Disneyland, where they collect souvenir maps and insist on sitting by the window for the best view of
    passing clouds, yet they sometimes worry about missing their favorite bedtime story when away from home.
  culinary: Elisabeth Sandifer loves mac and cheese with shredded cheddar and chicken nuggets dipped in sweet chili sauce, but they also curiously try small bites of sushi rolls with avocado after seeing
    them in a children’s cooking show, and they proudly insist on stirring the batter themselves, even if it makes a mess.
  core: Elisabeth Sandifer is a curious, art‑loving five‑year‑old who thrives on flexible play, worries about small details, and balances their tender heart with a mischievous habit of hoarding stickers
    and crayons.
background:
  cultural: Elisabeth is raised in a white, middle‑class family in Verona, Wisconsin, a small community in Dane County with a strong Midwestern culture. Her family values modesty, kindness, and community
    involvement, often attending church services and participating in local events such as library story times, the Verona Farmers Market, and seasonal festivals. Holiday traditions like Thanksgiving, Christmas,
    and community fireworks are celebrated with extended family. The region’s love of outdoor activities—visiting local parks, lakes, and nature trails—has fostered her appreciation for nature and seasonal
    changes.
