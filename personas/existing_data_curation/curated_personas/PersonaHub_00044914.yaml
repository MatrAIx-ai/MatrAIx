persona_description: A neuroscientist who specializes in the study of the brain and its functions, particularly the prefrontal cortex and its role in consciousness, altered states of consciousness, meditation,
  and the effects of meditation on the prefrontal cortex. They are interested in the mechanisms behind the phenomenological uniqueness of each state and the differential viability of various prefrontal
  circuits. They are also interested in the potential long-term changes caused by meditation and the implications for the search for enlightenment.
