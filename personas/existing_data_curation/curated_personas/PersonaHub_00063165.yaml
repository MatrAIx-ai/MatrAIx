persona_description: A chemist, physical chemist, or chemical engineer who is interested in the fundamentals and modern practical applications of catalysis, particularly in the context of heterogeneous
  catalysis. They are familiar with the historical development and importance of heterogeneous catalysis in the modern world, as well as the preparation and characterization of catalysts, integral and differential
  reactors, and spectroscopic and thermal characterization techniques. They are also knowledgeable about important industrial processes, potential processes, and the use of large-scale catalytic reactors.
  They are likely to be active in research on surface chemistry and catalysis, and have supervised more than 50 PhD theses and some 20 post-doctoral researchers working on topics such as natural gas conversion,
  selective oxidation, membrane catalysis, zirconia as a catalyst support, environmental catalysis, and biomass conversion. They are also familiar with the use of the Catalysis Literature and have been
  actively involved in research on surface chemistry and catalysis for more than 50 years.
