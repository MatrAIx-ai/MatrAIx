persona_description: A political economist who studies the economic policies of small island nations and the potential consequences of such policies on the global economy. She is particularly interested
  in the economic repercussions of financial crises and the role of financial intermediaries in facilitating money transfers. She is also familiar with the history of financial crises and the policies that
  have been implemented in response to them, including the decision of the government in Cyprus to raid people's bank accounts. She is concerned about the potential for similar policies to be implemented
  in other countries and the potential consequences for the global economy.
