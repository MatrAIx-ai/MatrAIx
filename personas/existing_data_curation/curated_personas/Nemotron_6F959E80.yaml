personas:
  professional: A seasoned pharmacy technician, Taylor Rigoli leverages over thirty years of meticulous medication dispensing, inventory mastery, and regulatory expertise to champion structured workflows
    and mentor new staff, while channeling their practical, detail‑oriented mindset into a forthcoming Certified Pharmacy Technician credential and a quality‑improvement project to slash prescription errors.
  sports: Taylor Rigoli gets her weekly cardio by strolling the Mahoning Creek trail with the Burgettstown Senior Strollers and, on game days, they never miss the Pittsburgh Steelers' Sunday broadcasts
    or the occasional hometown high‑school baseball match at the county fair.
  arts: Taylor Rigoli finds solace in the pages of Hilary Mantel and Agatha Christie, while they unwind to the gentle strains of Mozart's Clarinet Concerto, attend quarterly performances by the Burgettstown
    Community Theater, and knit while humming traditional Celtic folk ballads from the Irish harpist Caoimhín Ó Raghallaigh.
  travel: Taylor Rigoli prefers meticulously planned, low‑stress journeys, having recently toured the historic battlefields of Gettysburg and the quiet villages of New England in the fall, while their genealogy
    curiosity drives them to dream of a modest pilgrimage to County Kerry, Ireland, and a cultural weekend in Bavaria’s Franconian wine region.
  culinary: Taylor Rigoli, a competent home cook, regularly transforms backyard herbs like rosemary, thyme, and sage into fragrant herb‑crusted salmon and hearty lentil soup, while they perfect classic
    desserts such as apple crumble and German Black Forest cake, pairing each meal with a soothing cup of Earl Grey brewed with fresh lemon peel.
  core: Taylor Rigoli is a detail‑driven, solitary retiree who blends a lifelong pharmacy precision with a love of knitting, herb gardening, and quietly obsessive budgeting, all while battling a gentle
    undercurrent of worry that fuels their relentless quest for order.
background:
  cultural: Taylor grew up in a middle‑class, white family in western Pennsylvania, with ancestral roots in Northern Europe (primarily German and Irish). The region’s historic work ethic, shaped by the
    steel and coal industries, instilled values of reliability, hard work, and community responsibility. She identifies with the modest, Protestant‑Christian traditions common in the area, participating
    occasionally in church gatherings and local events like the county fair. The close‑knit nature of Burgettstown has reinforced a sense of independence while still valuing neighborly support, especially
    important after her divorce. Her cultural outlook blends a respect for tradition with a practical, self‑reliant mindset.
attributes:
  skills: '["Medication dispensing","Inventory management","Insurance claim processing","Pharmacy software operation (QS/1, PioneerRx)","Regulatory compliance (state and federal)","Compounding sterile and
