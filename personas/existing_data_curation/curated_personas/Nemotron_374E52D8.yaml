  hobbies: '[''LEGO construction'', ''exploring local parks and waterways'', ''reading science‑fiction'', ''playing chess'', ''Minecraft building and challenges'', ''participating in school science fairs'']'
  career_goals: Nora dreams of a future where she can design and build things that solve real‑world problems. She is drawn to careers like robotics engineering, environmental technology, or wildlife biology—fields
    that blend curiosity with practical impact. She aims to enter science fairs and maker competitions, hoping to earn a reputation as an innovative tinkerer who can turn spontaneous ideas into functional
    prototypes.
