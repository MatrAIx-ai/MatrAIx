personas:
  professional: An organized logistics enthusiast, Todd Castaner leverages project‑planning skills, Excel data‑analysis, and community‑center event coordination to excel in coursework and part‑time roles,
    positioning themselves for an entry‑level logistics coordinator position while dreaming of a future event‑planning catering business.
  sports: A point‑guard in the Tuskegee Community Center basketball league, Todd Castaner also roots for the Alabama Crimson Tide football team, tracks the Atlanta Braves’ games, and they spend Sunday mornings
    fishing at Lake Jordan to unwind.
  arts: When not on the court, Todd Castaner strums an acoustic guitar to the blues of B.B. King and the country twang of Chris Stapleton, captures sunrise over the Tuskegee National Forest with a Canon
    EOS‑5D, and they attend live shows at Montgomery’s Blues Festival and the nearby Shelby County Country Fair.
  travel: Todd Castaner prefers short road trips, having driven to Gulf Shores for beach sunsets, explored New Orleans’ jazz scene, and dreaming of a spring drive along the Blue Ridge Parkway, and they
    always map routes on Google Maps while budgeting fuel in a dedicated travel tab.
  culinary: A self‑taught pitmaster, Todd Castaner experiments with hickory‑smoked pork ribs coated in a mustard‑based barbecue sauce, adds a pinch of brown sugar to shrimp and grits, frequently swaps recipes
    at community potlucks, though they sometimes over‑smoke their meats, resulting in a charred crust.
  core: Todd Castaner blends Southern hospitality, meticulous planning, and an outgoing spirit to juggle logistics studies, basketball courts, and backyard barbecues, and they stay grounded in community
    service and a love of the outdoors.
background:
  cultural: Todd grew up in Tuskegee, a town steeped in Southern tradition and civil‑rights history. As a white Southern from a middle‑class family, he was raised with values of hospitality, community involvement,
    and respect for local customs. His upbringing included regular attendance at the local Baptist church, where he learned the importance of service and fellowship. The regional culture of hearty Southern
    cooking, country and blues music, and high school football shaped his social circles and leisure activities. While his family acknowledges the complex history of Tuskegee, they emphasize a forward‑looking
    mindset, encouraging curiosity about the world while staying grounded in the close‑knit community ethos that defines much of rural Alabama.
attributes:
  skills: '[''Project Management'', ''Time Management'', ''Data Analysis (Excel, basic Python)'', ''Technical Troubleshooting'', ''Event Coordination'', ''Public Speaking'', ''Team Leadership'', ''Conflict
    Mediation'', ''Mechanical Repair'', ''Customer Service'', ''Organizational Planning'']'
  hobbies: '[''Recreational Basketball'', ''Hiking'', ''Fishing'', ''Barbecue Cooking'', ''Acoustic Guitar'', ''Live Music Attending'', ''Photography'', ''Community Volunteering'', ''College Football Watching'',
    ''Multiplayer Video Gaming'']'
  career_goals: Despite currently not holding a full‑time position, Todd is focused on completing his associate degree in Business Administration and earning a certification in Project Management within
    the next two years. He aims to leverage his organized, reliable nature and his strong interpersonal skills to secure an entry‑level logistics coordinator role at a regional distribution firm in Alabama.
    In the medium term, he aspires to become a project manager overseeing supply‑chain improvements, and eventually, to launch his own event‑planning and catering business that blends his love of Southern
    hospitality with his knack for meticulous planning. Todd also hopes to stay connected to his community by mentoring younger students and volunteering for local outreach programs.
