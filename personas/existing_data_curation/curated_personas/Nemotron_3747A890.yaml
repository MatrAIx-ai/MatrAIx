personas:
  professional: Hong Kim balances their demanding EMT schedule with meticulous patient assessment, rapid on‑scene decision‑making, and a competitive drive to earn paramedic certification, while infusing
    each shift with artistic precision through medical illustrations that reflect their curiosity and need for structured yet flexible problem‑solving.
  sports: Hong Kim practices Taekwondo three times a week, hikes the Santa Cruz Mountains on weekends, and avidly follows the San Francisco Giants and Golden State Warriors, treating each workout as a tactical
    mission that channels their competitive spirit while also serving as a vital outlet for stress relief.
  arts: Hong Kim spends evenings sketching digital illustrations inspired by the immersive light installations of James Turrell and the provocative street art of Banksy, while their playlists echo experimental
    musicians such as Arca and Oneohtrix Point Never, a mix that fuels their curiosity and informs the bold visual language they bring to medical education materials.
  travel: Hong Kim plans low‑budget trips around their EMT shifts, often escaping to Muir Woods or cruising the Pacific Coast Highway for weekend hikes, while dreaming of an immersive solo adventure in
    Reykjavik, Iceland to photograph volcanic landscapes and recharge their creative mind.
  culinary: Hong Kim is a proficient home cook who regularly prepares spicy fermented cabbage stew with gochujang, sesame oil and garlic, perfects marinated beef rice bowls with sesame seeds and soy glaze,
    and experiments with fusion dishes that blend robust umami flavors with fresh vegetables, often using a Japanese chef’s knife to fine‑tune each slice.
  core: Hong Kim merges the high‑stakes urgency of emergency medicine with a restless artistic curiosity, juggling anxiety‑driven worry, meticulous sketches, budget‑tight finances, and a competitive drive
    that fuels both their medical ambitions and quest for creative expression.
background:
  cultural: Hong is a second‑generation Korean American raised in San Jose’s vibrant South Bay Korean community. His family blended traditional Korean customs—celebrating Chuseok and Seollal, speaking Korean
    at home, and preparing Korean cuisine—with American values of individuality and innovation. He attended a Korean language school after regular school hours and participated in community festivals and
    a local church, reinforcing respect for family, education, and community service. Growing up in the multicultural environment of Silicon Valley, Hong absorbed influences from diverse cultures, fostering
    an open‑minded and curious worldview while retaining a strong connection to his Korean heritage. This cultural synthesis informs both his dedication to public service as an EMT and his appreciation
    for art, technology, and new experiences.
