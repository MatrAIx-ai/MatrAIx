  hobbies: '[''Art gallery visits'', ''Digital illustration'', ''Sketching urban scenes'', ''Indie video gaming'', ''Experimental music listening'', ''Korean cooking'', ''Hiking in the Santa Cruz Mountains'',
    ''Korean calligraphy'', ''Tech meetups'', ''Taekwondo'', ''Science-fiction reading'', ''Journaling for stress management'']'
  career_goals: Hong aims to become a fully certified paramedic within the next year and to complete a bachelor's degree in health sciences while continuing his EMT work. He dreams of advancing to a flight
    medic role or eventually attending medical school to become an emergency physician. Driven by his competitive nature, he seeks leadership positions in emergency services, such as EMS unit supervisor
    or disaster response coordinator. He also aspires to integrate his artistic talents into healthcare education by creating visual aids and community health outreach materials that blend medical information
    with compelling design. Ultimately, Hong wants to contribute to innovations in emergency response technology and improve patient outcomes in underserved communities.
