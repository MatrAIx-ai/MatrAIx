    and country music'', ''Reading graphic novels'']'
  career_goals: Edsel wants to translate his practical skill set into a reliable career. His immediate goal is to earn a GED and enroll in the automotive technology program at a local community college,
    working toward an ASE certification. He plans to secure an apprenticeship at a Mobile repair shop where he can learn under a structured mentorship. In the longer term he envisions owning his own small
    auto‑repair business that serves his neighborhood, giving him both independence and the ability to apply his competitive drive. As a backup, he is considering enlisting in the U.S. Navy, attracted by
    the clear hierarchy, technical training, and the chance to travel while working in a disciplined environment.
