persona_description: A city planner and urban designer who is passionate about public health and safety, and who is actively involved in the design and planning of cities during pandemics. They have a deep
  understanding of urban mobility and the challenges of designing cities that accommodate social distancing and physical distancing measures. They have experience working with researchers and urban planners
  to identify solutions to the pressing issues and needs of cities during pandemics, and they have a unique perspective on the design of public spaces and the need for more usable space that accommodates
  social distancing. They are a strong advocate for the need to prioritize public health and safety in urban design and planning, and they are committed to delivering greater investment in public infrastructure
  that makes cities livable during pandemics.
