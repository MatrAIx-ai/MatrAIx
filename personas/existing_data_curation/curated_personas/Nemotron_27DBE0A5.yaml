  career_goals: Although retired, John remains driven to make a lasting impact on his community and personal growth. He aims to compile an oral history of Columbia City, preserving the stories of longtime
    residents for future generations. He plans to curate a modest traveling art exhibit that showcases works by local senior artists, fostering intergenerational dialogue. He also intends to finish a memoir
    chronicling his family’s heritage and his own experiences, and to learn advanced watercolor techniques through an online art course. As a final personal ambition, John hopes to travel with his wife
    to key historic sites in the Midwest, such as the Indianapolis Motor Speedway and the Indiana Dunes, while maintaining his health through regular walking and gardening.
