personas:
  professional: John Kennedy, a retired hardware store manager turned community historian and event coordinator, they bring together woodworking craftsmanship, meticulous archival research, and a warm,
    collaborative spirit to lead senior‑center workshops, curate traveling art exhibits, and preserve Columbia City's oral histories.
  sports: John Kennedy stays active by joining the Hoosier Trails walking club for weekly hikes in the Hoosier National Forest, they cheer on the Indianapolis Colts during football season and the Pacers
    in basketball, and they occasionally play in the local senior softball league, balancing seasonal sports enthusiasm with low‑impact fitness routines.
  arts: John Kennedy, an enthusiastic watercolorist and theatergoer, they frequent the B. J. Art Gallery to study the prairie scenes of Grant Wood and the vibrant floral studies of contemporary Midwestern
    artist Sarah McKinney, and they regularly discuss the latest Whitley County Community Theater production of *Our Town* starring Ellen Thompson with fellow seniors.
  travel: John Kennedy prefers relaxed, car‑based road trips with his wife, they plan itineraries that include historic Midwest stops such as the Indianapolis Motor Speedway, the Indiana Dunes, and the
    covered bridges of Madison, while budgeting carefully and selecting accessible inns to accommodate their walking routines, yet they still enjoy spontaneous day trips to nearby county fairs and historic
    villages.
  culinary: John Kennedy delights in preparing hearty Midwestern meals like slow‑cooked pot roast with carrots and potatoes, buttery corn chowder made from fresh corn kernels harvested from his garden,
    and apple pie featuring heirloom apples, they season dishes with home‑grown basil, rosemary, and a dash of smoked paprika, and they frequently bake fresh rye bread to accompany family gatherings.
  core: John Kennedy, a curious and community‑focused septuagenarian, they blend a love of history, art, and gardening with a habit of over‑booking their calendar for senior‑center events, a tendency to
    forget to take their antihypertensive pill until reminded, and an unwavering belief that a well‑tended garden can mend both soul and soil.
background:
  cultural: John grew up in a traditional white Midwestern family with roots in German and Irish ancestry, raised in Columbia City, Indiana. His upbringing was shaped by the values of hard work, modesty,
    and close‑knit community life typical of the region. He attended a local public school, served a brief stint in the U.S. Air Force during the early 1960s, and later returned to his hometown, where he
    worked in a family‑run hardware store. A lifelong member of the First Baptist Church, John participates regularly in church gatherings, holiday celebrations, and community potlucks. He cherishes Midwest
    customs such as the county fair, Fourth of July parades, and the tradition of sharing home‑cooked meals. These cultural influences inform his emphasis on cooperation, hospitality, and the preservation
    of local history and folk arts.
