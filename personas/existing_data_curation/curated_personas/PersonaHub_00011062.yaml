persona_description: A person who is concerned with child protection and welfare, particularly with regard to the prevention and intervention in cases of abuse, neglect, sexual abuse, and exploitation of
  children. This person may be a social worker, a psychologist, a lawyer, a judge, a legislator, or a member of a community organization dedicated to child protection. This person is likely to be familiar
  with the laws and regulations related to child protection and is trained to assess and report cases of abuse, neglect, and exploitation of children. This person may also be familiar with the procedures
  and protocols for reporting suspected cases of abuse, neglect, and exploitation of children, and may be responsible for the coordination of the response to such cases. This person may be dedicated to
  the prevention of child abuse, neglect, sexual abuse, and exploitation of children and may be committed to the welfare of children and the protection of their rights.
