  career_goals: Although retired from formal employment, Kathleen aims to stay active and contribute to her community. She plans to expand the local community garden, offering workshops on sustainable practices
    and becoming a go‑to resource for neighbors. She aspires to lead a cooking class series at the senior center, preserving regional recipes while introducing healthy twists. Kathleen also hopes to complete
    a community health volunteer certification, enabling her to support health outreach programs. In her personal life, she wishes to compile a family recipe book and memoir that capture the stories of
    Bear Creek’s older generation, and to travel on occasional weekend trips to nearby historic sites.
