persona_description: A researcher in fluid mechanics and hydraulic machinery, specifically focusing on the numerical simulation of Francis turbines at off-design conditions. The researcher is part of the
  Institute of Fluid Mechanics and Hydraulic Machinery at the University of Stuttgart, where they aim to understand the physical mechanism behind a self-induced instability in a Francis turbine at full
  load. The researcher uses two-phase simulations to accurately predict the flow phenomena and is expected to have expertise in turbulence modeling, computational fluid dynamics, and the study of cavitation
  phenomena. They are likely to be working with supercomputers like the Hazel Hen at HLRS in Stuttgart, which requires a significant amount of computational effort due to the complexity of the governing
  equations and the need to simulate a large number of runner revolutions.
