personas:
  professional: Maxine Dandridge is a full‑stack software engineer who blends Python, JavaScript, and Java expertise with UI/UX design flair, building accessible React/Node applications on AWS, while they
    channel their curiosity and competitive drive into dominating hackathons and aim for a Director of Engineering role that champions inclusive product design.
  sports: Maxine Dandridge stays fit by attending weekly yoga sessions and running with the Dallas Runners Club, cheerfully rooting for the Dallas Mavericks in the NBA season and the Dallas Cowboys in the
    fall, while they approach personal fitness with a competitive edge that mirrors their hackathon mindset.
  arts: Maxine Dandridge blends a love for speculative fiction by devouring novels from N.K. Jemisin and Octavia Butler with a habit of sketching digital paintings inspired by the vibrant works of Yayoi
    Kusama and Bee plus, while they frequently attend Dallas contemporary art shows featuring emerging local artists and occasionally jam to the soulful sounds of Janelle Monaé.
  travel: Maxine Dandridge curates a blend of spontaneous weekend getaways and meticulously planned overseas adventures, having explored the jazz‑filled streets of New Orleans and the vibrant markets of
    Mexico City while eyeing a future immersion in Kyoto’s temples, and they schedule these trips around hackathon weekends using travel apps that balance budget and comfort.
  culinary: Maxine Dandridge, an avid home cook with an intermediate skill set, often prepares Southern‑inspired dishes like shrimp and grits and smoked brisket seasoned with smoked paprika and okra, while
    they also love experimenting with global flavors such as Korean kimchi tacos, reflecting their curiosity‑driven palate.
  core: Maxine Dandridge is a creatively competitive tech whiz who balances relentless hackathon ambition with a love for Southern comfort food, yoga, and occasional overspending on art supplies, while
    they navigate mild anxiety through mindful practice.
background:
  cultural: Maxine is an African American woman raised in Dallas, Texas, deeply rooted in Southern Black culture. Family gatherings, gospel music, and community celebrations such as Juneteenth and Kwanzaa
    shape her worldview. Her cultural heritage fuels a commitment to representation in tech, influencing her drive to create inclusive digital experiences and to empower the next generation of Black technologists.
attributes:
  skills: '[''Python'', ''JavaScript'', ''Java'', ''React'', ''Node.js'', ''AWS'', ''Docker'', ''CI/CD'', ''Data Analysis'', ''SQL'', ''UI/UX Design'', ''Digital Illustration'']'
  hobbies: '[''Digital painting'', ''Visiting contemporary art exhibitions'', ''Speculative fiction reading'', ''Hackathon participation'', ''Mentoring youth in STEM'', ''Cooking Southern-inspired cuisine'',
    ''Yoga'', ''Travel'']'
  career_goals: Maxine aims to transition into a senior engineering leadership role, eventually becoming a Director of Engineering at a tech firm that prioritizes inclusive product design. She plans to
    earn an AWS Solutions Architect certification and pursue a part‑time master's in Human‑Computer Interaction to deepen her expertise at the intersection of technology and art. Long‑term, she aspires
    to launch a consultancy that mentors Black women in tech and drives socially responsible innovation.
