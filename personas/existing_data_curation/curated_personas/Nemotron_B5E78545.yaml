personas:
  professional: William Cardwell, a 20‑year‑old mechanical engineering student with strong CAD and programming skills, blends curiosity‑driven DIY projects like LED lamps and hobby drones with disciplined
    project planning to lead small team efforts and pitch technical ideas in clear, relatable terms.
  sports: William Cardwell, an enthusiastic participant in local pickup basketball at the community gym and weekend soccer matches, follows the Milwaukee Bucks and Green Bay Packers, and spends free weekends
    fishing, kayaking, and hiking around Rice Lake, joining the regional outdoor club for group expeditions.
  arts: William Cardwell, an acoustic‑guitar enthusiast in a folk‑rock jam group at the community center, draws inspiration from artists like Bob Dylan, Fleet Foxes, and John Mayer, and frequently attends
    local open‑mic nights and small‑venue concerts that reinforce his collaborative spirit.
  travel: William Cardwell enjoys planning modest road trips to the Upper Peninsula of Michigan and Door County for weekend camping, dreams of a study‑abroad stint in Iceland to explore geothermal energy,
    and balances travel ambitions with a part‑time job that limits budget and time.
  culinary: William Cardwell loves cooking fresh‑caught trout on the grill, perfects a hearty cheese‑curd‑laden mac and cheese after a long hike, and experiments with DIY spice blends while keeping his
    cooking skills at a comfortable intermediate level.
  core: William Cardwell blends a restless curiosity for building gadgets with a community‑first mindset, juggling basketball, guitar, and volunteer duties while meticulously budgeting for future engineering
    ventures.
background:
  cultural: William grew up in Rice Lake, a small town in Rusk County, Wisconsin, where his family’s roots trace back to German‑American and Scandinavian‑American ancestors common to the Upper Midwest.
    The local culture emphasizes community involvement, modesty, hard work, and a practical outlook—values that shaped William’s balanced curiosity and reliability. He was raised in a Protestant (Lutheran)
    household that celebrated traditional holidays such as Christmas with community gatherings, and he participates in regional customs like the Wisconsin cheese festival and the county fair. The Midwestern
    environment fostered his love for outdoor activities like fishing and hiking, while the town’s close‑knit social fabric nurtured his sociable and cooperative personality.
