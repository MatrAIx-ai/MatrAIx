personas:
  professional: Ryan Mintz, a 33‑year‑old operations manager in Dallas, leverages Lean Six Sigma expertise and a designer’s curiosity to streamline supply‑chain workflows while fostering inclusive, high‑energy
    cross‑functional workshops that feel more like art installations than boardroom meetings.
  sports: Ryan Mintz plays for the Dallas Community Basketball League’s Maverick Hoops squad, passionately follows the Dallas Mavericks during the NBA season, roots for the Cowboys in the fall, and spends
    Saturday mornings hiking the Texas Hill Country with a local trail club, blending competitive court play with low‑key outdoor adventures.
  arts: Ryan Mintz spends Thursday evenings exploring the Nasher Sculpture Center and monthly attending productions at the AT&T Performing Arts Center, where shows like Lin‑Manuel Miranda's 'Hamilton' and
    immersive installations by Kara Walker fuel his design‑thinking workshops, and he carries a sketchbook to capture quick watercolor studies of the Dallas skyline after each performance.
  travel: Ryan Mintz prefers meticulously planned weekend road trips to the Texas Hill Country for photography, while earmarking savings for overseas art pilgrimages to Barcelona’s Picasso Museum and Berlin’s
    contemporary galleries, balancing his cultural cravings with a pragmatic budget that limits impulsive last‑minute getaways.
  culinary: Ryan Mintz, an enthusiastic beginner cook, alternates between devouring downtown Dallas’s famed birria tacos and crafting farm‑to‑table risotto with locally foraged rosemary and smoked pecan‑infused
    salmon, yet he still burns the rice’s bottom layer while chasing the perfect al dente bite.
  core: Ryan Mintz fuses a designer’s curiosity with an operations mind, turning every coffee break into a rapid‑fire brainstorming session, yet secretly hoards vintage concert tickets and can’t resist
    a midnight taco cart.
background:
  cultural: Ryan grew up in a middle‑class family in the Dallas metropolitan area, where Southern hospitality and Midwestern pragmatism intersect. His upbringing emphasized hard work, community involvement,
    and a respect for diverse perspectives, shaped by Dallas's multicultural environment. He celebrates traditional Texas traditions—such as rodeo festivals and regional food—and simultaneously embraces
    the city's modern, cosmopolitan influences, reflecting a blend of local heritage and global curiosity.
