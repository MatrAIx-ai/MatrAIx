  hobbies: '[''Reading nature and science books'', ''Collecting shells and rocks'', ''Sketching wildlife'', ''LEGO building'', ''Caring for family dog'', ''Gardening assistance'', ''Scratch coding and animation'',
    ''Jigsaw puzzles'', ''Logic games'', ''Journaling'']'
  career_goals: Kathleen dreams of a future where she can combine her love for animals, the environment, and practical problem-solving. She imagines becoming a marine biologist who studies coastal ecosystems
    and works to protect marine life, or a veterinarian caring for pets and wildlife. She also is intrigued by the idea of creating educational games that teach children about nature, reflecting her curiosity
    and desire to help others. Her ambition is to follow a clear, step-by-step educational path - starting with strong science studies and hands-on experience - so she can secure a stable, purposeful career
    that makes a tangible difference.
