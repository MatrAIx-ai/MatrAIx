persona_description: A technologist, scientist, or engineer who is interested in acquiring a practical understanding of X-ray Photoelectron Spectroscopy (XPS) and Auger Electron Spectroscopy (AES) for surface
  analysis. They are likely to be involved in the procurement of surface analytical equipment, the operation of the instruments, or the provision of service analytical laboratories. The persona is knowledgeable
  about the application of XPS/AES in various material analysis and product testing and quality control scenarios, and is seeking to understand the accurate and reliable practices of quantitative surface
  analysis. They are interested in learning about the state-of-the-art commercial instrumentation available for XPS/AES and the types of analytical data that can be obtained from these techniques. The persona
  is likely to attend the course for its practical, current understanding of XPS and AES, and to benefit from the course by learning about the many users of XPS/AES and the various applications of these
  techniques in different industries.
