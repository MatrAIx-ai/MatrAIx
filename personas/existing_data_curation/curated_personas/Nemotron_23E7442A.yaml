  hobbies: '[''gardening'', ''cooking'', ''knitting'', ''reading historical fiction'', ''listening to gospel music'', ''bridge'', ''walking'', ''volunteering at church'']'
  career_goals: Brigit’s primary ambition is to remain an active, supportive presence in her church and senior‑center community. She wants to launch a modest community garden that provides fresh produce
    for local families, and she hopes to mentor younger volunteers in event planning and budgeting. To better cope with her anxiety, she plans to complete a short mindfulness‑based stress reduction course
    and obtain CPR/first‑aid certification so she can serve as a health advocate for her neighbors. Though she is not seeking paid employment, she dreams of turning her love of cooking into a small home‑based
    business selling homemade preserves and seasoned greens. Maintaining her physical health through regular walks with her husband and her mental well‑being through therapy are also central to her long‑term
    goals.
