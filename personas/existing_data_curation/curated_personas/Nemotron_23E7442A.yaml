personas:
  professional: Brigit Thomas is a seasoned church volunteer coordinator who leverages her practical mindset, meticulous budgeting skills, and gentle yet firm conflict‑resolution style to orchestrate community
    events and mentor younger volunteers, all while relying on predictable routines to keep anxiety at bay.
  sports: Brigit Thomas enjoys low‑impact exercise, taking daily walks along the Potomac River Trail while cheering on the Washington Capitals in winter and the Washington Nationals during baseball season,
    and she regularly joins a senior‑center walking group that meets on Saturdays.
  arts: Brigit Thomas immerses herself in soulful arts, attending weekly gospel concerts featuring Kirk Franklin and CeCe Winans, knitting intricate scarves inspired by traditional patterns during her church
    circle, and losing herself in historical fiction novels by Isabel Wilkerson that explore the Black experience in America.
  travel: Brigit Thomas prefers well‑planned short getaways, taking her husband on weekend trips to Shenandoah National Park for scenic hikes, exploring historic Williamsburg, and occasionally venturing
    to Washington, D.C.’s Smithsonian museums, while dreaming of a future Caribbean cruise that fits within her modest savings.
  culinary: Brigit Thomas blends culinary tradition with health‑conscious tweaks, expertly preparing collard greens seasoned with smoked turkey and a splash of apple cider vinegar, simmering tomato‑basil
    stew, baking sweet potato pie with reduced sugar, and crafting small batches of peach jalapeño preserves and spiced seasoned greens for her modest home‑based business.
  core: Brigit Thomas balances meticulous organization and soulful community service with a lingering anxiety that fuels nightly worry, a habit of double‑checking every grocery list, and a tendency to over‑bake
    during rainy afternoons.
background:
  cultural: Brigit grew up in Maryland during the civil‑rights movement, deeply rooted in African‑American traditions. Her family's history includes stories of resilience, church fellowship, and community
    self‑reliance. She maintains a strong connection to the Black church, participating in worship, gospel music, and church‑based service. Family gatherings are centered around shared meals featuring soul‑food
    recipes passed down from her grandparents. She celebrates cultural milestones such as Juneteenth and Black History Month, and she values intergenerational storytelling that preserves the legacy of her
    elders. Her cultural identity informs her emphasis on community support, hospitality, and the importance of maintaining traditions while adapting to new circumstances.
