personas:
  professional: An organized special education teacher, Maria Uliano designs and implements individualized education programs with precise data‑driven assessment, integrates bilingual instruction and assistive
    technology, and leads professional development workshops, while they continuously balance innovative pedagogical research with compliance standards to achieve high student outcomes.
  sports: A community‑oriented athlete, Maria Uliano plays in an Austin co‑ed soccer league, dances salsa twice weekly, hikes the Texas Hill Country on weekends, and they proudly cheer for the Dallas Cowboys,
    Austin FC, and the Houston Astros while also belonging to the Austin Hikers club.
  arts: An enthusiastic cultural participant, Maria Uliano takes salsa classes, enjoys the music of Juan Luis Guerra and the choreography of Misty Copeland, attends local theater productions like the Austin
    Playhouse’s rendition of "A Midsummer Night’s Dream", and they often draw inspiration from Frida Kahlo’s paintings for lesson planning.
  travel: A curious explorer, Maria Uliano travels with their husband to cultural festivals such as the Guelaguetza in Oaxaca, the Dia de los Muertos celebrations in San Miguel de Allende, and domestic
    retreats like Santa Fe’s art market, preferring meticulously planned itineraries combined with spontaneous street food stops, and they relish discovering local crafts at each destination.
  culinary: A passionate home chef, Maria Uliano expertly prepares tamales with masa, pork filling, and red chile sauce, cooks mole poblano using dried chiles, chocolate, and spices, and they love experimenting
    with fresh cilantro, epazote, and pineapple in salsas, often hosting dinner gatherings for friends.
  core: A highly organized, sociable special education teacher, Maria Uliano blends disciplined planning with a love for group soccer, salsa dancing, traditional cooking, and community volunteering, while
    they occasionally negotiate late‑night cravings and a strict budget.
background:
  cultural: 'Maria was raised in a close‑knit Mexican‑American family where Spanish was spoken at home and cultural traditions such as Día de los Muertos, posadas, and family Sunday meals were central.
    Her Catholic upbringing instilled values of compassion, community service, and respect for elders. These cultural pillars shape her teaching philosophy: she emphasizes family collaboration, celebrates
    students'' cultural identities, and incorporates bilingual resources to bridge home and school. Living in Cedar Park, she actively participates in local Mexican cultural events, supports the Hispanic
    Parent Teacher Association, and mentors newly arrived Mexican families to navigate the U.S. education system.'
attributes:
  skills: '["IEP development", "Differentiated instruction", "Behavior intervention planning", "Assistive technology integration", "Bilingual (Spanish-English) instruction", "Data‑driven assessment", "Classroom
    management", "Collaboration with families and multidisciplinary teams", "Professional development facilitation", "Curriculum adaptation for inclusion"]'
  hobbies: '["Salsa dancing", "Recreational soccer", "Cooking traditional Mexican dishes", "Hiking in the Texas Hill Country", "Volunteering at the local community center", "Reading educational psychology",
    "Yoga", "Traveling with her husband", "Participating in cultural festivals"]'
  career_goals: Maria aspires to become a lead special‑education coordinator within her district, overseeing program design and staff mentorship. She plans to earn a master's degree in Special Education
    Leadership and obtain advanced licensure (LIS). Her long‑term ambition is to launch a community outreach initiative that provides bilingual resources and workshops for Mexican‑American families navigating
    special‑education services. Additionally, Maria hopes to contribute research on early intervention strategies for English‑language learners with disabilities at national conferences and eventually influence
    district‑wide inclusive policy.
