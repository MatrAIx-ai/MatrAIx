    ''Continuous learning about insurance technology'']'
  hobbies: '[''Softball (community league)'', ''Fishing and outdoor activities'', ''Playing acoustic guitar'', ''Listening to personal finance and tech podcasts'', ''Exploring coding basics with Python'',
    ''Group board game nights'', ''Volunteering at local community center'', ''Mindfulness meditation and stress relief'']'
  career_goals: Travis aims to obtain his Property and Casualty insurance license and eventually earn the Chartered Property Casualty Underwriter (CPCU) designation. Over the next five years, he aspires
    to become a senior account manager, lead a team of agents, and develop specialized expertise in homeowner and flood insurance for his community. Long‑term, he hopes to open his own boutique agency focused
    on serving underserved families in rural Florida and incorporate financial‑literacy workshops, while pursuing a bachelor's degree in Business Administration to broaden his strategic and managerial skills.
