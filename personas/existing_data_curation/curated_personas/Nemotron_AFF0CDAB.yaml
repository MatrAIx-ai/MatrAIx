  career_goals: Jean aims to advance to a supervisory position within her store, such as shift lead or assistant manager, where she can mentor newer employees and implement supportive practices that reduce
    workplace stress. She plans to obtain a retail management certification and, in the longer term, transition to a low‑stress, community‑focused role—perhaps part‑time coordination at a local non‑profit
    or senior center—allowing her to blend her organizational strengths with her compassionate drive to help others.
