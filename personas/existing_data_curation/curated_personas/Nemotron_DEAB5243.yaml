  hobbies: '[''Community gardening'', ''Hiking in the Santa Cruz Mountains'', ''Yoga and mindfulness journaling'', ''Reading environmental nonfiction'', ''Volunteering for local hazardous‑waste clean‑up
    events'', ''Baking sourdough bread'', ''Attending cooking workshops at farmers markets'']'
  career_goals: Millicent is focused on advancing into a supervisory or safety‑manager role within the next two to three years, where she can apply her extensive field knowledge to broader compliance oversight
    and crew coordination. She aims to earn the Certified Safety Professional (CSP) credential and become a licensed HAZWOPER trainer, allowing her to mentor the next generation of removal workers. Long‑term,
    she hopes to transition into a consulting capacity that advises construction and industrial firms on hazardous‑material handling strategies, enabling her to work a more predictable schedule as she approaches
    retirement while still contributing to workplace safety and environmental protection.
