personas:
  professional: Robert Anschuetz, a 16-year-old budding graphic designer and aspiring architect in Chicago, leverages their proficiency with Adobe Photoshop, Canva, and basic programming to create polished
    digital mockups while applying their methodical project-planning skills to meet tight deadlines for school competitions and their volunteer art tutoring sessions.
  sports: Robert Anschuetz, who follows the Chicago Bulls and Chicago Bears faithfully, joins the Hammond Youth Soccer Club in the spring, plays pickup basketball at the community center during winter,
    and maintains their fitness through regular woodworking sessions and weekend bike rides, though they occasionally skip a workout when a new art project steals their focus.
  arts: Robert Anschuetz immerses themselves in the visual world by sketching Chicago's skyline, hunting Banksy-style murals, creating digital illustrations inspired by Beeple's vibrant color palettes,
    and strums acoustic renditions of Bob Dylan and Joni Mitchell songs, using these artistic experiences to shape their personal aesthetic and community tutoring sessions.
  travel: Robert Anschuetz plans their travel adventures with the same meticulousness they apply to their design projects, favoring organized weekend road trips to architectural hotspots like Chicago's
    Millennium Park and the historic districts of Milwaukee, while dreaming of a future study-abroad semester in Barcelona's modernist neighborhoods, and they always pack a sketchbook to capture new scenery.
  culinary: Robert Anschuetz, who favors inventive yet low-maintenance meals, often whips up avocado toast topped with heirloom tomatoes, fresh basil, and feta, experiments with simple pasta primavera using
    zucchini and cherry tomatoes, and occasionally treats themselves to Chicago-style deep-dish pizza, though their cooking skill remains at the enthusiastic-home-chef level, occasionally over-salting while
    aiming for Instagram-ready plating.
  core: Robert Anschuetz, a 16-year-old organized dreamer, balances a relentless curiosity for art and tech with a habit of hoarding sketchbooks and succulents, often losing track of time in their workshop
    while occasionally neglecting school assignments for a new guitar riff.
background:
  cultural: Robert grew up in Hammond, Indiana, a Midwestern industrial town with a strong working‑class heritage. His family is of German‑American descent, reflecting the region’s historical settlement
    patterns. The community emphasizes modesty, reliability, and mutual support, values that align with his organized and cooperative nature. He regularly visits the Hammond Public Library, participates
    in local art events, and is exposed to the cultural diversity of the greater Chicago metropolitan area. This blend of Midwestern pragmatism, modest cultural traditions, and openness to new ideas shapes
    his worldview.
