  career_goals: Robert aims to earn a scholarship to study graphic design or architecture at a university, with a long‑term goal of becoming a UX designer or creative director. He hopes to blend his love
    for art with his organizational strengths by eventually leading community art programs that provide creative outlets for youth in Hammond. In the short term, he plans to build a strong portfolio, secure
    a part‑time internship at a local design studio, and continue developing his technical and artistic skills.
