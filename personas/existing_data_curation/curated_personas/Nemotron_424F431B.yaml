  career_goals: Arsene aims to move into senior operations management within the city government, eventually becoming an Operations Manager for a large municipal department. He plans to complete a bachelor's
    degree in Business Administration and earn a Project Management Professional (PMP) certification to solidify his expertise in large-scale process improvement. Over the next five years he wants to lead
    initiatives that increase office efficiency by at least 15 percent, mentor emerging supervisory talent, and develop a training curriculum that reflects both modern technology and the diverse needs of
    the Bronx workforce. Eventually he hopes to leverage his experience to influence policy on administrative best practices at the city level.
