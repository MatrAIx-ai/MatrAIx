persona_description: A Scrum Master who is responsible for guiding and supporting the Scrum Team in implementing the Scrum framework to minimize time wastage and increase productivity. They ensure that
  the team members understand and implement the concepts of the Scrum framework correctly, and engage with external stakeholders to ensure a productive and enjoyable working environment. They are skilled
  in facilitating the Sprint Planning, Daily Scrum, Sprint Review, and Sprint Retrospective events, and have a keen eye for detecting and addressing deviations from the Scrum process to maintain its effectiveness.
