  hobbies: '[''Pickup basketball'', ''Guitar playing'', ''Hiking and trail exploration'', ''Fishing and hunting'', ''Volunteer work at food bank and church youth group'', ''DIY car and home repairs'', ''Organizing
    community barbecues'', ''Online gaming with friends'', "Cooking/barbecue"]'
  career_goals: Garrett aims to earn his GED within the next year and pursue certification as an Emergency Medical Technician (EMT) to provide direct assistance in his community. He also plans to develop
    a small mobile repair service for rural residents, blending his love of hands‑on work with his desire to support others. Long‑term, he envisions a role as a community liaison or youth mentor, using
    his outgoing nature to organize events and foster cooperation among local residents.
