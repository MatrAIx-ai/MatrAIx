personas:
  professional: Garrett Miller is a 17‑year‑old aspiring EMT‑candidate whose knack for mediating group conflicts and hands‑on troubleshooting fuels a budding mobile repair service for rural neighbors, blending
    their love of community volunteering with practical mechanical skills, and they enjoy planning spontaneous service visits that boost local resilience.
  sports: Garrett Miller is a 17‑year‑old who spends weekends shooting hoops in pickup games at the community center, follows the Kansas City Chiefs and the Kansas Jayhawks with fervor, and maintains a
    rugged fitness routine that mixes DIY weight‑lifting in the garage with early‑morning fishing trips and seasonal hunting outings with the local outdoors club, all while they stay energized through regular
    cardio drills.
  arts: Garrett Miller is a 17‑year‑old budding guitarist who spends evenings learning John Mayer's 'Gravity' and classic rock riffs, swaps song recommendations with friends while streaming indie folk from
    Fleet Foxes and occasional country tunes from Luke Combs, and attends the local community theater's summer productions of 'Our Town' and open‑mic nights, all of which they feel deepens their sense of
    self.
  travel: Garrett Miller is a 17‑year‑old who prefers impromptu road trips, using their phone to map routes on the fly as they explore Kansas's Flint Hills and the Tallgrass Prairie, and they dream of camping
    in the Rocky Mountains and kayaking the Boundary Waters, balancing a modest travel budget with occasional weekend getaways to nearby Oklahoma City for a music festival.
  culinary: Garrett Miller is a 17‑year‑old who enjoys firing up the grill to master Kansas City‑style burnt ends, roasts whole trout with fresh dill and lemon butter, and whips up a hearty homemade chili
    featuring ground beef, kidney beans, and a dash of smoked paprika, all while they favor casual diner outings at the local barbecue joint for the perfect combo of smoky ribs and sweet corn.
  core: Garrett Miller is a 17‑year‑old community‑minded go‑getter who can spontaneously rally friends for a backyard barbecue, forgets to charge their phone overnight, and lives for the buzz of fixing
    a busted truck engine at 2 a.m., all while they maintain a calm demeanor under pressure.
background:
  cultural: Garrett grew up in the small, close‑knit town of Fredonia, Kansas, within a predominantly white, Midwestern farming community. His family’s roots in agriculture and strong ties to the local
    church have instilled values of self‑reliance, neighborliness, and community service. The rural setting fosters a practical, hands‑on approach to life, while local traditions such as high school sports,
    county fairs, and church gatherings reinforce a sense of shared identity and collective responsibility.
attributes:
  skills: '[''Interpersonal communication'', ''Conflict mediation'', ''Basic carpentry'', ''Vehicle maintenance'', ''First aid & CPR'', ''Digital communication (social media coordination)'', ''Improvisational
