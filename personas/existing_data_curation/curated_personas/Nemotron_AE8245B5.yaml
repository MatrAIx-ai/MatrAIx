personas:
  professional: Hector Morante, a hands‑on technician‑in‑training who is enrolling in an HVAC certification program, blends his knack for plumbing, electrical repairs, and DIY projects with a natural ability
    to coordinate volunteer crews, making them a reliable, detail‑oriented team member who thrives on structured tasks yet adapts quickly when on‑site challenges arise.
  sports: Hector Morante, an avid organizer of neighborhood pickup soccer and basketball games, leads a co‑ed weekend team at the local park, roots for the Dallas Mavericks in the NBA and FC Dallas in MLS,
    and they supplement their play with weekly strength‑training sessions to keep their knees resilient.
  arts: Hector Morante, a passionate fan of regional music such as Los Tigres del Norte and the cinematic performances of Gael García Bernal, often streams corridos while cooking tacos al pastor, and they
    enjoy dancing at community Cinco de Mayo festivals where live banda bands set the rhythm.
  travel: Hector Morante, who prefers a balanced travel approach that combines organized itineraries with spontaneous detours, frequently hikes the nearby mountain trails on weekends, has already booked
    a spring trek to New Zealand’s Southern Alps, and they dream of completing the Pacific Crest Trail for a long‑term adventure.
  culinary: Hector Morante, a dedicated weekend cook, perfects tacos al pastor using marinated pork, pineapple, achiote, and fresh cilantro, rolls tamales stuffed with pork and masa, and whips up fresh
    salsa with tomatoes, onions, jalapeños, and lime, while they also experiment with roasted corn and queso fresco for impromptu gatherings.
  core: Hector Morante, a 23‑year‑old hands‑on enthusiast, balances structured career ambitions with spontaneous community sports, cooking, and occasional forgetfulness about routine tasks, making them
    a lively yet grounded presence.
background:
  cultural: Hector is a second‑generation Mexican‑American who grew up in a bilingual household where Spanish was spoken daily. He celebrates Mexican traditions such as Día de los Muertos, Las Posadas,
    and Día de la Independencia with family gatherings, traditional foods, and cultural rituals. Living in Colorado Springs exposes him to a mix of cultures, and he participates in both Mexican community
    events and broader local festivals. His heritage influences his love for Mexican cuisine, music, and a strong sense of family responsibility, while his American environment shapes his adaptation to
    diverse social settings and community involvement.
