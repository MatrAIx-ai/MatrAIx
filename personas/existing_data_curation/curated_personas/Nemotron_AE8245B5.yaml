  hobbies: '[''Pickup soccer'', ''Pickup basketball'', ''Hiking and trail walking'', ''Camping'', ''Cooking Mexican cuisine'', ''Attending cultural festivals'', ''Dancing to regional Mexican music'', ''Volunteering
    with Habitat for Humanity'', ''Community clean‑up events'']'
  career_goals: Hector aims to secure a stable, structured career that leverages his hands‑on skills and teamwork orientation. Over the next year he plans to enroll in a community‑college program for HVAC
    or electrical technology, earn the required certifications, and obtain an entry‑level apprenticeship. He is also exploring the fire department’s EMT training pathway, seeing it as a blend of his desire
    to help others, strong work ethic, and need for clear advancement routes. In the medium term (3‑5 years) he hopes to become a certified technician or a firefighter/paramedic, eventually moving into
    supervisory roles where he can mentor younger workers and contribute to community safety.
