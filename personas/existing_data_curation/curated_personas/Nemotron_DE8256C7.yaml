  career_goals: Ivy aims to remain an active and reliable presence in her school community by mentoring novice teachers, developing a structured intergenerational learning program that connects seniors
    with elementary students, and compiling a resource guide on inclusive classroom organization and predictable routine design. She also seeks to maintain her health and mental well‑being through regular
    activity, ensuring she can continue to support her husband and provide stability for her family and students alike.
