  career_goals: Even at six, Fatema dreams of careers that blend her love for art and discovery. She often imagines herself as an illustrator of fantastical worlds, an astronaut charting new frontiers,
    or a young scientist inventing inventive gadgets. While her imagination fuels excitement, she sometimes worries about meeting high expectations, so she aims to start with small, competitive challenges—such
    as art contests or science fairs—to build confidence and experience.
