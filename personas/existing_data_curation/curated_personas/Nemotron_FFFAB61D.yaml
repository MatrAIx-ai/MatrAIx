  career_goals: Even in retirement, Calyx remains driven by a desire to leave a lasting artistic imprint. She aims to complete a reflective memoir that interlaces her personal history with broader cultural
    shifts, and to edit an anthology of poems and short stories contributed by senior citizens in Hamden. She hopes to curate a traveling exhibition of artworks created by artists over the age of 80, showcasing
    the vitality of later‑life creativity. Calyx also aspires to establish a small scholarship fund for local high‑school students pursuing visual arts, and she is eager to learn digital illustration tools
    to experiment with new media. Her overarching ambition is to nurture cross‑generational artistic dialogue while maintaining the calm, resilient demeanor that has guided her throughout a century of change.
