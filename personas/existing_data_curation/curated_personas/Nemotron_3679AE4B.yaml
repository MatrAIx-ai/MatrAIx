personas:
  professional: Annie Holden, an imaginative five‑year‑old who spends afternoons in the community art center, is already honing a budding storytelling skill set—crafting picture‑book narratives, improvising
    dialogues with friends, and using her natural curiosity and flexible approach to turn everyday play into early‑stage communication practice.
  sports: Annie Holden, a budding mini‑soccer enthusiast who dribbles across the local YMCA field with the “Little Tigers” club, cheers loudly for the Houston Astros during family outings, and incorporates
    hip‑hop dance moves as a warm‑up, reflecting her sociable, energetic nature.
  arts: Annie Holden, a bright‑eyed participant in the community center’s after‑school art program, loves splashing paint while listening to the jazzy trumpet solos of Louis Armstrong and the soulful beats
    of Beyoncé, and spends weekends mastering basic hip‑hop choreography, channeling her curiosity and love for group activities into vivid artistic expression.
  travel: Annie Holden, a small‑scale explorer who delights in weekend trips to the Houston Museum of Natural Science and the breezy shores of Galveston, dreams of visiting New Orleans for its Mardi Gras
    parades, and insists on bringing her favorite stuffed giraffe wherever she goes, balancing a love for adventure with the comfort of familiar routines.
  culinary: Annie Holden, a self‑declared “chef‑in‑training,” loves helping stir mac ’n’ cheese with a wooden spoon, eagerly sneaks bites of collard greens seasoned with smoked turkey, and proudly bakes
    sweet‑potato pie crusts with her grandma, though the occasional sugary cereal craving reveals a sweet‑tooth habit.
  core: Annie Holden, a curious, energetic five‑year‑old who blends gospel‑inspired rhythm, spontaneous imagination, and a love for community play, navigates the world with a delightful mix of sociability
    and occasional endearing disarray.
background:
  cultural: Annie is a Black child growing up in Houston's vibrant African American community. She is surrounded by family traditions rooted in church, gospel music, and celebrations such as Juneteenth
    and Kwanzaa. Her family enjoys soul food dishes like collard greens, mac 'n' cheese, and sweet potato pie. Neighborhood community centers offer after‑school art and music programs where she has been
    introduced to hip‑hop dance and jazz rhythms. Her parents value education and cultural heritage, sharing stories about African roots, the civil rights movement, and local Houston history. These cultural
    threads shape her worldview, fostering pride in her identity and curiosity about diverse expressions of art and community.
