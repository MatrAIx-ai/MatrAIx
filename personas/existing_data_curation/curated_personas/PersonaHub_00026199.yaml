persona_description: A senior traditional owner in Kakadu National Park who has successfully re-applied traditional Indigenous fire management practices to a Ramsar-listed wetland, Boggy Plain, to enhance
  biodiversity, cultural value, intergenerational transfer of knowledge, and conservation of biodiversity. The project has achieved beneficial ecological, social, and economic outcomes, including enhanced
  biodiversity, cultural value, and intergenerational transfer of traditional ecological knowledge. The project serves as an internationally significant model for integrating Indigenous and Western knowledge
  systems to achieve positive outcomes for both traditional resource use and biodiversity conservation.
