personas:
  professional: Monikah Davis, a budding explorer of the playground, already exhibits keen observation, imaginative storytelling, and collaborative play, manifesting early professional skills that hint
    at a future career in creative design, and they often turn everyday objects into tiny adventures.
  sports: Monikah Davis bursts with toddler energy, delighting in free‑form play at the local park while attending a weekly toddlers’ soccer class with the Seattle Youth Soccer Club, and they proudly cheer
    on the Seattle Seahawks during family game nights, reflecting a spontaneous yet cooperative approach to fitness.
  arts: Monikah Davis spends afternoons with crayons, lovingly recreating scenes from Disney’s Moana, humming along to Raffi’s Baby Beluga, and watching the rhythmic dances of the Sesame Street gang, which
    nurtures their budding love for color, melody, and storytelling.
  travel: Monikah Davis loves packed car rides to the nearby San Diego Zoo, giggling at the playful otters, and they daydream about a future family trip to Walt Disney World in Orlando, balancing their
    spontaneous curiosity with their parents’ structured travel itineraries.
  culinary: Monikah Davis delights in scooping bright orange spaghetti‑Os and slurping strawberry‑yogurt parfaits, proudly helping to stir the pot of their favorite cheesy macaroni, yet they often refuse
    broccoli, showing a typical toddler preference for familiar, mild‑flavored dishes.
  core: Monikah Davis is a three‑year‑old whirlwind of curiosity who turns ordinary moments into artistic adventures, yet they can’t resist leaving a glitter‑stained trail wherever they explore.
background:
  cultural: Monikah is raised in a close‑knit African‑American family in Chattanooga, Tennessee. Her upbringing blends Southern hospitality with Black cultural traditions, including Sunday church services,
    gospel music, community picnics, and the vibrant local art scene. Family gatherings celebrate heritage through soul food, storytelling, and visits to the Tennessee Aquarium and local festivals, fostering
    her appreciation for art, music, and community.
