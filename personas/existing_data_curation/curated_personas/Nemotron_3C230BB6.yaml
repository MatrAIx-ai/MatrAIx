  career_goals: Julie aims to transition into product management within the next two years, targeting a role where she can shape product roadmaps and integrate user feedback. She plans to complete her bachelor's
    degree in Business Administration and later pursue an MBA to accelerate her ascent to senior leadership. Her long‑term ambition is to lead a division at a technology firm or launch her own startup focused
    on sustainable consumer technology, with measurable milestones such as improving team efficiency by 20% and driving a new product line to achieve $5 million annual recurring revenue within three years.
