personas:
  professional: Gilberto Khachatryan, a veteran secondary‑school physics and chemistry teacher, blends three decades of classroom experience with cutting‑edge educational technology to design data‑driven,
    interdisciplinary STEM‑art curricula, mentors new teachers with a skeptical eye for rigor, and channels a competitive streak into pursuing state STEM Innovation Awards and securing grant‑funded community
    workshops.
  sports: Gilberto Khachatryan enjoys low‑impact fitness through weekly hikes with the Ozark Trail Club, occasional fishing trips on Lake of the Ozarks, follows the St. Louis Cardinals and the St. Louis
    Blues, and participates in a senior walking group that meets at the local community center each Saturday.
  arts: Gilberto Khachatryan expresses his artistic side by painting Ozark foothills in watercolor after studying Claude Monet and Georgia O'Keeffe, attends monthly jazz sessions featuring the Riverfront
    Jazz Ensemble performing Miles Davis and John Coltrane, and curates vintage camera lenses as functional art pieces while volunteering at the county historical society's exhibitions.
  travel: Gilberto Khachatryan prefers road‑trip adventures that blend photography and nature, having recently driven the Blue Ridge Parkway to capture sunrise over Shenandoah, and now planning a trek to
    Patagonia’s Torres del Paine for its dramatic mountain vistas, all while meticulously budgeting travel expenses around a modest retirement income.
  culinary: Gilberto Khachatryan favors farm‑to‑table cooking with garden‑grown zucchini, heirloom tomatoes, and fresh lake trout, skillfully prepares ratatouille and grilled vegetable medleys, pairs meals
    with a crisp Riesling, yet occasionally over‑seasons dishes with too much salt when experimenting with new recipes.
  core: Gilberto Khachatryan is a meticulous, curiosity‑driven educator who channels competitive energy into award‑seeking STEM projects, worries incessantly about budgets and health, finds calm in watercolor
    landscapes and vintage lenses, and battles occasional knee aches and perfectionist tendencies.
background:
  cultural: Born and raised in a small farming community in southern Missouri, Gilberto grew up in a household that blended Midwestern American values—self‑reliance, community service, and a love of the
    outdoors—with the traditions of his Armenian ancestry. His grandparents immigrated from Armenia after World War II, and family gatherings featured Armenian dishes such as harissa and gata, as well as
    celebrations of holidays like Vardavar and Armenian Christmas. The strong emphasis on education and perseverance passed down through the generations guided his pursuit of a STEM degree and a lifelong
    career in teaching. While he identifies as white in the U.S. census, he maintains a connection to his heritage through language lessons, participation in the local Armenian church, and occasional visits
    to relatives in the diaspora.
