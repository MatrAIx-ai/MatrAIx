  career_goals: Gilberto aims to earn a state‑level STEM Innovation Award, publish a practical guide for integrating art into science curricula, and secure a grant to launch a community STEM fair for middle‑school
    students. He plans to transition gradually into a consulting role that supports rural schools in adopting project‑based learning while continuing to mentor retiring teachers. Additionally, he hopes
    to write regular columns for an educational magazine and serve as a curriculum advisor and workshop facilitator after reducing his full‑time teaching load.
