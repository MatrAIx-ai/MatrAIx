personas:
  professional: Audrey Sane, a seasoned food-service manager in South Carolina, merges an arts-humanities education with a regimented, data-driven style to craft airtight SOPs, tight inventory audits, and
    precise staff schedules; their skeptical eye for motives transforms competitive tension among a 25-person team into measurable profit growth, and they relentlessly focus on routine to drive the push
    toward regional management and a Certified Food Safety Manager credential.
  sports: Audrey Sane, an avid weekend hiker who explores the Jocassee Gorges and the Swamp Fox Trail, follows the Carolina Panthers (NFL) and Greenville Drive (minor league baseball) with quiet loyalty,
    joins a small community walking club for low-impact cardio, tracks step counts on a smartwatch to satisfy their competitive streak, and prefers solo nature walks over team sports.
  arts: Audrey Sane, a quiet aficionado of Southern literary classics such as Pat Conroy’s The Prince of Tides and Margaret Mitchell’s Gone with the Wind, spends evenings crocheting afghan blankets while
    listening to Alison Krauss’s bluegrass melodies, participates in their church’s small book-club, and finds occasional inspiration in local theater productions of Tennessee Williams plays; they cherish
    the tradition and routine these creative rituals provide.
  travel: Audrey Sane, a meticulous planner, favors low-key weekend road trips to historic towns like Savannah, Georgia, Asheville, North Carolina, and Charleston’s waterfront, opts for boutique bed-and-breakfasts
    over crowded hotels, and saves deliberately for a long-term dream of a leisurely drive along the Blue Ridge Parkway before retirement; they prioritize family obligations and budget constraints when
    choosing destinations.
  culinary: Audrey Sane, a home-chef who cultivates heirloom tomatoes, collard greens, and sweet corn in a modest garden, perfects Southern staples such as buttermilk fried chicken, shrimp and grits, and
    peach cobbler, and follows a ritual of crafting fermented pickles for gut health, all while meticulously budgeting pantry staples to preserve cost control; they also indulge in the occasional splurge
    on a cast-iron skillet when a new recipe calls for it.
  core: Audrey Sane, a routine-driven food-service leader whose competitive edge is softened by a quiet love of Southern tradition, careful budgeting, and an undercurrent of worry that fuels meticulous
    self-management.
background:
  cultural: Audrey was raised in a traditional Southern family in upstate South Carolina, where values of hospitality, community, and religious faith are central. Growing up in Cherokee County, she absorbed
    local customs such as church potlucks, preservation of family recipes, and a respect for the region’s history, including its Cherokee heritage. This cultural backdrop reinforces her practical, routine‑focused
    mindset and her preference for familiar, small‑scale social settings.
attributes:
  skills: '[''Staff scheduling'', ''Inventory control'', ''Budget forecasting'', ''Health & safety compliance'', ''Menu development'', ''Customer service training'', ''Process improvement'', ''Quality assurance'',
    ''Conflict resolution'', ''Data analysis with spreadsheets'']'
  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Crochet'', ''Hiking local trails'', ''Small book club'', ''Cooking Southern recipes'', ''Journaling'']'
  career_goals: Audrey aims to advance from managing a single restaurant to becoming a regional manager for a national chain, leveraging her reputation for reliable, high‑performing operations to earn a
    Certified Food Safety Manager credential. She also aspires to open a small, family‑run bistro that showcases classic Southern comfort food while maintaining rigorous operational standards. Recognition
    as the top‑performing manager in Cherokee County and achieving measurable profit‑growth targets are key milestones she pursues.
