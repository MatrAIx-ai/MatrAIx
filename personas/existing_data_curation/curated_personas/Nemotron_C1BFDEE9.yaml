  career_goals: Chelsea aspires to a career that combines helping others with structure and predictability. She dreams of becoming a teacher or a veterinarian, envisioning herself guiding young minds or
    caring for animals in a stable, organized environment. In the short term, she aims to excel academically, maintain high grades, earn the role of class monitor, and develop the skills she believes will
    lead to a future in education or animal care.
