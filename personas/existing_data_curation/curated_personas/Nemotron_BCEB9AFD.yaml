  career_goals: Although he is no longer employed full‑time, Andrei aims to stay intellectually active by mentoring young engineers, offering occasional freelance consulting, and preserving his legacy through
    a small community workshop where he can teach practical electronics and woodworking to neighborhood youths. He also hopes to complete the restoration of his 1965 Chevrolet and to document his life stories
    for future generations.
