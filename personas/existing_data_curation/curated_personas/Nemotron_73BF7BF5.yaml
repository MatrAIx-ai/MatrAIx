  career_goals: Although retired from formal employment, Luz Jimena aims to channel her disciplined, achievement‑oriented mindset into volunteer leadership. She aspires to become a coordinator for a local
    senior center, develop intergenerational workshops that teach Salvadoran culinary and cultural traditions, and compile a family cookbook that preserves recipes and stories for future generations. She
    also seeks a certificate in gerontology to better support aging community members and to advocate for resources that reduce stress and improve well‑being among seniors.
