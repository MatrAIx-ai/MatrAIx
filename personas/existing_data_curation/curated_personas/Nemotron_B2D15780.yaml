  hobbies: '[''Gardening'', ''Woodworking'', ''Model Train Building'', ''Reading Classic Literature'', ''Crossword Puzzles'', ''Genealogy'', ''Birdwatching'', ''Fishing'', ''Church Choir'']'
  career_goals: Maurice aims to remain mentally sharp and physically active by maintaining his garden and completing a written memoir of his life and family history. He hopes to pass on his knowledge of
    practical crafts and local history to his grandchildren, to organize a small oral-history project for senior residents of Forest, and to ensure his estate and property are in order for future generations,
    providing the structured routine that helps him manage periods of anxiety and sadness.
