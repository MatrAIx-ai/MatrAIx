personas:
  professional: Sela Robertson is a disciplined jeweler in Geneva, Ohio, whose precision hand‑setting, CAD design, and rigorous inventory control reflect a love of routine and a drive toward American Gem
    Society master certification, while they mentor apprentices and plan a boutique workshop that celebrates classic heirloom craftsmanship.
  sports: Sela Robertson enjoys weekend hikes on the Hocking Hills trails with their spouse, follows the Cleveland Browns and the Cleveland Guardians, and participates in a local walking club that meets
    every Saturday, preferring low‑impact cardio over competitive sports.
  arts: Sela Robertson draws creative inspiration from historical fiction authors like Ken Follett and classic painters such as Gustav Klimt, while they attend the local quilting circle that recreates Victorian
    patterns and regularly visit the Ashtabula Art Center to view exhibitions featuring contemporary ceramicists.
  travel: Sela Robertson favors carefully planned trips that balance relaxation and discovery, having explored Hocking Hills State Park, the historic towns of the Pennsylvania Dutch country, and a dream
    itinerary that includes a workshop tour of jewelers in Florence, Italy, they always book accommodations early and budget travel expenses to maintain financial stability.
  culinary: Sela Robertson enjoys preparing garden‑fresh ratatouille, baking rosemary‑infused focaccia for the community church bake‑sale, and mastering the art of copper‑pot apple crisp, their cooking
    skill is solid but they occasionally over‑season dishes due to a love of robust flavors.
  core: Sela Robertson blends calm precision with a love of tradition, turning meticulous jewelry making, garden routines, and quiet hikes into a life of ordered creativity and modest indulgence.
background:
  cultural: Sela grew up in a Midwestern white family with deep roots in rural Ohio. Her ancestry traces to German and Irish immigrants who settled in Ashtabula County in the early 1900s. The family’s cultural
    values emphasize hard work, modesty, community service, and an appreciation for traditional crafts. Raised in a Protestant (Methodist) environment, she partakes in church activities and community gatherings
    that reinforce a sense of harmony and cooperation. The regional heritage of farming and small‑town industry informs her practical, routine‑oriented outlook and her respect for time‑tested methods in
    jewelry making.
attributes:
  skills: '["Gemstone setting", "Fine metalworking (soldering, forging, polishing)", "Custom jewelry design (CAD)", "Jewelry repair and restoration", "Inventory management", "Client consultation for bespoke
    pieces", "Quality assurance and durability testing", "Cost budgeting and material sourcing"]'
  hobbies: '["Vegetable gardening", "Reading historical fiction and classic literature", "Quilting", "Volunteer baking for church charity events", "Hiking local trails", "Participating in regional craft
    fairs"]'
  career_goals: Sela aims to become a certified master jeweler within the next five years, obtaining the American Gem Society's accreditation. She plans to open her own boutique workshop in the Ashtabula
    region, specializing in classic, heirloom‑style pieces that reflect traditional craftsmanship. She also aspires to mentor apprentices in her community, develop a signature line of ethically sourced
    gemstone collections, and expand her client base through participation in regional craft fairs and online platforms while maintaining her commitment to high standards and reliable service.
