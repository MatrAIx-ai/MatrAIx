  hobbies: '[''Beach Walks'', ''Journaling'', ''Cooking'', ''Baking'', ''Knitting'', ''Library Volunteering'', ''Reading Practical Nonfiction'', ''Biking'', ''Attending Community Events'']'
  career_goals: Maria aims to enroll in a community college to earn an associate degree in health administration, with the long‑term goal of securing a stable position as a medical records clerk or administrative
    assistant at a local hospital or clinic on Cape Cod. She is also interested in obtaining a dental assisting certification after completing her associate program, valuing the routine and patient‑focused
    nature of the work. Ultimately, Maria wants a career that allows her to stay close to her Sagamore Beach community, contribute reliably to the local workforce, and provide a steady income for future
    independence. An additional personal ambition is to gain managerial experience that could later enable her to open a small neighborhood bakery, blending her love of cooking with entrepreneurial aspirations.
