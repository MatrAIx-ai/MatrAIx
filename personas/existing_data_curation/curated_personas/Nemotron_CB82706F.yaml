personas:
  professional: Maria Smith, an aspiring health‑administration professional, combines her meticulous Microsoft Office proficiency, reliable time‑management, and pragmatic, routine‑loving personality to
    excel in data‑entry, record‑keeping, and community event coordination.
  sports: Maria Smith enjoys early morning bike rides with the Sagamore Beach Cycling Club, plays casual beach volleyball in summer, and follows the Boston Red Sox and the Hyannis Harbor Hawks with dedicated
    seasonal enthusiasm.
  arts: Maria Smith finds creative relief in knitting while listening to folk‑rock artists like The Lumineers and Brandi Carlile, attends local theater productions by the Cape Cod Community Theatre, and
    often revisits the paintings of Claude Monet for inspiration.
  travel: Maria Smith favors low‑cost road trips, having explored Boston, Newport, and the historic streets of Charleston, while dreaming of a summer backpacking adventure through Acadia National Park and
    a cultural immersion in Paris.
  culinary: Maria Smith loves preparing classic New England clam chowder with fresh clams, potatoes, and thyme, bakes apple‑cinnamon scones topped with butter, and experiments with lemon‑herb roasted salmon,
    showcasing her solid home‑cooking skills and devotion to family recipes.
  core: Maria Smith balances her habit of methodical planning and community‑centric reliability with a quiet habit of collecting shells on Sagamore Beach and a tendency to over‑organize her journal, even
    when the day calls for spontaneity.
background:
  cultural: Maria grew up in a predominantly white, middle‑class coastal community in Sagamore Beach, Massachusetts. Her family follows traditional New England values of practicality, self‑reliance, and
    modesty, with regular Sunday dinners and participation in local church activities (Methodist). She was educated in the public school system of Barnstable County, where she was immersed in community
    traditions such as seasonal festivals, town parades, and a deep appreciation for the maritime environment. Local seafood cuisine, seasonal celebrations, and a strong sense of community engagement have
    shaped her cultural outlook, reinforcing a pragmatic and cooperative worldview.
attributes:
  skills: '[''Organization'', ''Time Management'', ''Microsoft Office'', ''Data Entry'', ''Customer Service'', ''Event Planning'', ''Basic Cooking'', ''First Aid'', ''Beach Safety'', ''Practical Problem
