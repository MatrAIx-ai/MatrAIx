  hobbies: '[''Visiting murals and galleries'', ''Watercolor painting with Mexican folk motifs'', ''Cooking traditional Mexican dishes'', ''Listening to regional Mexican music'', ''Participating in cultural
    festivals (Dia de los Muertos)'', ''Reading historical fiction and self-help books'', ''Succulent gardening'', ''Gentle yoga practice'', ''Journaling and poetry'', ''Hiking in the desert'']'
  career_goals: Ramen aims to advance within the customer-service field by moving into a team-lead or quality-assurance role over the next three years. She plans to earn a certification in Customer Experience
    Management and to take community-college courses in business communication, which will complement her curiosity for innovative service strategies. Leveraging her love of art, she hopes to design training
    materials that use visual storytelling to improve agent empathy and performance. Additionally, she seeks a balanced career that allows space for personal wellbeing, incorporating regular mindfulness
    practices to manage her anxiety.
