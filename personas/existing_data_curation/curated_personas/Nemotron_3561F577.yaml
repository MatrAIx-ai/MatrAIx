personas:
  professional: Rodolfo Bustamante is a teen tech tinkerer and budding culinary creator whose knack for fixing headphones, assembling Arduino projects, and cooking family recipes fuels a vision of merging
    digital media production with a modern café concept.
  sports: Rodolfo Bustamante skates the Miami boardwalk, joins pickup basketball games with local friends, follows the Miami Heat in the NBA and the Miami Marlins in MLB, and prefers informal street‑style
    workouts over regimented gym sessions.
  arts: Rodolfo Bustamante immerses themselves in salsa dancing at community centers, sketches colorful street‑art designs in Wynwood, creates memes and video edits for friends, and finds inspiration in
    the works of Jean‑Michel Basquiat, the visual aesthetics of Calle 13, and the classic rhythms of Buena Vista Social Club, blending movement with vivid visual expression.
  travel: Rodolfo Bustamante favors spontaneous day trips to local spots like Key Biscayne beach, enjoys occasional family trips to Orlando’s theme parks, and dreams of exploring Barcelona’s famed murals,
    balancing low‑budget adventures with a desire for artistic inspiration.
  culinary: Rodolfo Bustamante delights in cooking arroz con pollo, tostones, and empanadas alongside their grandmother, experimenting with spice blends and plating techniques, displaying confident sautéing
    skills while occasionally over‑salting, reflecting a hands‑on, trial‑and‑error kitchen style.
  core: Rodolfo Bustamante blends a curious tech mind, a love for street culture, and a family‑rooted passion for cooking, navigating teenage spontaneity with a steady drive to fuse digital art and cuisine
    despite occasional disorganization and impulse spending.
background:
  cultural: Rodolfo grew up in a vibrant Cuban‑American household in Miami's Little Havana, where Spanish is spoken daily and Cuban traditions are celebrated with gusto. Family gatherings revolve around
    music, shared meals, and stories of the island, fostering a strong sense of cultural pride. He participates in community events like Carnaval Miami and attends a local Catholic church, blending religious
    rituals with Cuban festive customs. While he embraces his heritage—through food, dance, and language—he also navigates a broader American teenage culture, balancing the expectations of his close‑knit
    family with the diverse influences of Miami's multicultural environment.
attributes:
  skills: '["Bilingual in Spanish and English", "Tech troubleshooting and DIY electronics", "Creative problem solving", "Basic cooking of Cuban dishes", "Mediation and conflict resolution among peers",
    "Basic graphic design and video editing", "Simple home repair and furniture assembly"]'
  hobbies: '["Skateboarding", "Pickup basketball", "Video gaming and modding", "Salsa dancing", "Cooking Cuban cuisine with family", "Exploring Wynwood street art and sketching", "Listening to Cuban music",
    "Reading sci‑fi graphic novels"]'
  career_goals: Rodolfo aims to earn his GED within the next two years and then pursue a community‑college program that blends his interests in technology and food, such as culinary arts with a modern twist
    or digital media production. He dreams of eventually opening a small multicultural café in Little Havana that serves contemporary Cuban cuisine alongside live music and digital art displays, allowing
    him to stay creative and flexible while giving back to his community. In the short term, he hopes to work part‑time as a computer repair assistant or a kitchen aide to gain hands‑on experience and build
    a network of mentors.
