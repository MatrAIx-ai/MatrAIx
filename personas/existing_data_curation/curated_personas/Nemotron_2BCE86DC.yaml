  hobbies: '[''Watercolor painting'', ''Attending local art workshops'', ''Reading classic literature and poetry'', ''Gardening (perennials & herbs)'', ''Cooking and sharing recipes'', ''Volunteering at
    senior center (craft circles)'', ''Playing bridge'', ''Participating in book clubs'', ''Visiting museums and galleries'']'
  career_goals: Even in retirement, Patricia dreams of leaving a lasting creative legacy. She hopes to publish a memoir that weaves together her personal history with the cultural changes she has witnessed
    in the Midwest. She plans to curate a traveling exhibition of artworks created by senior citizens in her community, showcasing the vibrant imagination of older adults. Patricia also envisions establishing
    a permanent senior art studio at the local community center, where she can teach weekend workshops in watercolor, collage, and fiber arts. She aspires to mentor younger volunteers, fostering intergenerational
    connections through creative projects. On a personal level, she wishes to travel to major art museums such as the Art Institute of Chicago and the Metropolitan Museum of Art, drawing fresh inspiration
    for her own work. Finally, she wants to continue expanding her own artistic repertoire by learning digital illustration, despite her cautious approach to new technology.
