  hobbies: '[''Hiking Appalachian trails'', ''Gardening native herbs and vegetables'', ''Knitting and quilting'', ''Reading historical fiction and medical memoirs'', ''Community theater involvement'', ''Attending
    sustainable living workshops'', ''Volunteering at health fairs'']'
  career_goals: Cynthia aims to advance into a nursing leadership role within her local health system, such as a nurse manager or clinical educator, where she can shape policy and mentor the next generation
    of nurses. She plans to obtain certifications in wound care and diabetes education to deepen her expertise and to lead community health outreach programs that address chronic disease prevention in the
    Appalachian region. She also envisions collaborating with local schools and the county health department to develop health literacy workshops, and ultimately, to contribute to research on rural health
    disparities.
