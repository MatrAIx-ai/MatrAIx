personas:
  professional: A structured-loving yet spontaneous two‑year‑old explorer, Sandra Fanguy delights in building tidy towers with wooden blocks while sometimes scattering them into imaginative scenes, relishes
    energetic group play at daycare, and they can become distressed when daily routines shift unexpectedly.
  sports: A lively mini‑athlete, Sandra Fanguy loves the neighborhood park’s slide and chasing a soft soccer ball, watches the hometown baseball team with family, attends toddler gymnastics classes that
    blend structured routines with spontaneous tumbling, and they cheer loudly during each activity.
  arts: A vibrant little performer, Sandra Fanguy belts out the "Sesame Street" theme, imitates dance moves from a popular children's show, creates bold scribbles with chunky crayons, adores animated adventures
    starring Mickey Mouse and Peppa Pig, and they often dance around the living room with exuberant energy.
  travel: A tiny explorer, Sandra Fanguy has visited the city zoo and a sunny beach where they built sandcastles, prefers short, predictable trips with a familiar stroller, yet they light up when discovering
    a new playground in a nearby town.
  culinary: A selective yet curious eater, Sandra Fanguy prefers smooth mac and cheese and sweet banana slices, delights in bright orange carrot sticks their mother dices for a toddler stir‑fry, helps stir
    batter with a wooden spoon, and they sometimes fling a stray spoon across the kitchen in a burst of excitement.
  core: Sandra Fanguy, a structured‑yet‑spontaneous two‑year‑old, balances vivid imagination with routine, reacts intensely to change, and they turn everyday moments into lively learning experiences.
background:
  cultural: Sandra is raised in a white, Midwestern family in Saint Joseph, Missouri. Her upbringing reflects typical American cultural practices in the heartland, including celebrating holidays such as
    Thanksgiving and Christmas, attending a local church, participating in community events like the Saint Joseph Farmers' Market, and experiencing the close‑knit, neighborly environment of a small-town
    setting.
