personas:
  professional: Erika Carroll, a 33‑year‑old evidence‑based case manager in Licking County, blends her STEM precision with social‑work empathy to design data‑driven service plans, and they are now eyeing
    a supervisory role where they can lead a team while integrating quantitative assessments into community mental‑health programs.
  sports: Erika Carroll enjoys low‑impact fitness, clocking weekly walks along the Ohio River Trail with the local Walking Club, cheering on the Ohio State Buckeyes football team and the Cincinnati Reds,
    and they occasionally join a community bird‑watching group that partners with the Columbus Blue Jackets fan events for charity runs.
  arts: Erika Carroll finds quiet fulfillment in knitting scarves for local charities while discussing Malcolm Gladwell’s latest non‑fiction work in a small book club, they also appreciate folk singer Gillian
    Welch’s storytelling lyrics and enjoy rewatching Frances McDormand’s films for their authentic emotional depth.
  travel: Erika Carroll prefers meticulously planned weekend getaways to nearby nature spots like Hocking Hills State Park and Asheville’s gardens, they balance their love of bird‑watching with a budget‑conscious
    itinerary, and they dream of visiting the lavender fields of Provence to compare European heirloom tomatoes with their own garden varieties.
  culinary: Erika Carroll’s kitchen revolves around garden‑to‑table meals, where they craft a rustic heirloom tomato and basil bruschetta, simmer a slow‑cooked chicken pot pie using family‑passed recipes,
    and experiment with spice blends in a weekend ratatouille, all while skillfully handling a mix of basic knife work and occasional culinary flambé attempts.
  core: Erika Carroll is a methodical, community‑focused case manager who balances data‑driven rigor with humble garden rituals, a love of quiet puzzles, and a steady habit of knitting for good causes.
background:
  cultural: Erika was raised in a middle‑class, Midwestern family in Ohio, where community involvement and practicality are emphasized. Her family's cultural traditions include modest holiday celebrations,
    church attendance in a Protestant congregation, and a strong work ethic. Growing up in the suburbs of New Albany, she values the safety, neighborly ties, and civic participation common to the area.
    While identifying as white American, she embraces the region’s emphasis on volunteerism, support for local schools, and respect for tradition, which inform her collaborative and harmonious approach
    to both personal and professional life.
attributes:
  skills: '[''Evidence-based case management'', ''Quantitative assessment and data analysis'', ''Crisis intervention'', ''Resource coordination'', ''Program evaluation'', ''Client documentation and compliance'',
