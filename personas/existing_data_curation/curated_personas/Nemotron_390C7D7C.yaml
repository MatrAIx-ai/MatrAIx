  hobbies: '[''Gardening (vegetable and herb garden)'', ''Cooking traditional recipes'', ''Reading non-fiction (psychology, community development, crafts)'', ''Small book club'', ''Knitting and crocheting'',
    ''Walking and bird-watching on local trails'', ''Solving puzzles (crosswords, logic games)'']'
  career_goals: Erika aims to transition into a supervisory role within Licking County's social services department, leading a team of caseworkers while implementing data‑driven improvements to service
    delivery. Over the next five years she plans to earn a Master of Social Work and obtain certification in trauma‑informed care, positioning herself for a future directorship of a community mental‑health
    program that emphasizes practical, evidence‑based interventions and collaborative partnerships. She also aspires to develop a local resource‑mapping initiative that uses her STEM skills to create an
    interactive tool for families seeking assistance.
