personas:
  professional: Britany Aucoin, a two-year-old who meticulously assembles wooden block towers with a blend of curiosity and practicality, already displays early engineering instincts that foreshadow a future
    in engineering, and they often invite other toddlers to collaborate, balancing organized design with spontaneous reshaping when a tower falls.
  sports: Britany Aucoin, an energetic two-year-old who loves splashing in the community pool and toddler soccer sessions with the Tiny Tots Soccer Club, cheers loudly for the Seattle Seahawks during family
    game nights, and they treat each play date as a mini‑workout, balancing organized movement drills with spontaneous dance breaks.
  arts: Britany Aucoin, a sociable two-year-old who belts out The Wiggles' 'Fruit Salad', twirls to Disney's 'Let It Go', and colors vivid scenes inspired by Pixar's 'Toy Story', infuses kindness into group
    play, and they often pause to help friends when a crayon breaks, reflecting their cooperative nature.
  travel: Britany Aucoin, an inquisitive two-year-old who enjoys short road trips to the San Diego Aquarium and frequent visits to Grandma's countryside farm, prefers stroller-friendly routes with plenty
    of snack breaks to accommodate nap times, and they light up with curiosity at every new sensory experience while occasionally feeling anxious during long car rides.
  culinary: Britany Aucoin, a picky-but-adventurous two-year-old who devours buttery macaroni-and-cheese, sweet banana slices, and a bite of avocado toast, loves to sprinkle chocolate sprinkles on their
    yogurt, and they often try to stir the batter with a wooden spoon, showing a practical hands-on curiosity despite occasional tantrums when a preferred food is unavailable.
  core: Britany Aucoin, a two-year-old whirlwind of curiosity and compassion, balances methodical block building with sudden bouts of anxiety whenever their tower collapses, often seeking solace in rhythmic
    lullabies and the reassuring presence of close friends.
background:
  cultural: Britany is raised in Little Compton, Rhode Island, a small coastal community with a strong New England maritime heritage. Her family’s Anglo‑American background emphasizes community festivals,
    beach outings, and seasonal traditions such as Fourth of July fireworks and Thanksgiving gatherings. Growing up near the Atlantic, she is exposed to local environmental stewardship values, seafood cuisine,
    and a close‑knit neighborhood where neighbors often share resources and support one another, fostering her cooperative and sociable disposition.
