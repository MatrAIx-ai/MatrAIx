  hobbies: '[''Pickup Basketball'', ''Country‑Music Dance Nights'', ''Hunting and Fishing Trips'', ''Volunteering at Community Health Fairs'', ''Texas‑Style BBQ Cooking'', ''DIY Home‑Improvement Projects'',
    ''Reading Medical Journals'', ''Science‑Debate Clubs'']'
  career_goals: Derek aims to step into a nurse manager role within the next two years, where he can lead a department‑wide patient safety program focused on reducing falls and medication errors. He plans
    to complete a BSN if not already obtained and pursue certification as a Clinical Nurse Specialist in Emergency Medicine. Long‑term, he wants to mentor younger nurses, influence county health‑policy
    discussions, and eventually consult on workflow optimization for Texas hospitals.
