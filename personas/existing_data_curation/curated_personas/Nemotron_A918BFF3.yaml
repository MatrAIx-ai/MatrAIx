personas:
  professional: Derek Unzueta, a 56‑year‑old acute‑care nurse with three decades of experience, leverages their methodical, structure‑loving nature and competitive drive to excel in rapid patient assessment,
    IV insertion, and ACLS response while leading quality‑improvement projects and mentoring staff with calm precision.
  sports: Derek Unzueta stays active through weekly pickup basketball at the local recreation center while cheering on the Dallas Mavericks, follows the Texas Rangers and Dallas Cowboys with fervor, hunts
    white‑tailed deer during the fall season as a member of the Texas Hunting Association, and fishes for bass on the Guadalupe River on weekends, integrating a competitive team‑oriented mindset with rugged
    outdoor pursuits that they find both exhilarating and grounding.
  arts: Derek Unzueta unwinds after shifts by line‑dancing to George Strait and Willie Nelson at local country‑music nights, collects original vinyl records of Patsy Cline, enjoys occasional Saturday matinees
    of the Dallas Symphony Orchestra featuring works by John Williams, and screens classic Westerns starring John Wayne on his home theater, letting the blend of Texas‑rooted melodies and classic Americana
    shape their relaxed evenings.
  travel: Derek Unzueta prefers meticulously planned road trips that combine hunting expeditions in Colorado’s Pike National Forest, fishing weekends on Canada’s Bow River, and cultural stops at Austin’s
    live‑music venues, while dreaming of a future safari in Tanzania’s Serengeti and a winter trek across Iceland’s volcanic landscapes, balancing modest retirement savings with a love for immersive, active
    travel and they carefully monitor travel budgets to ensure each adventure remains affordable.
  culinary: Derek Unzueta is an advanced home‑chef who masters Texas‑style BBQ, routinely slow‑smoking beef brisket with a dry rub of paprika, brown sugar, cumin, and garlic over mesquite wood, perfecting
    pulled pork ribs seasoned with chili powder and apple cider vinegar, and they relish pairing their creations with homemade coleslaw, baked beans, and a chilled craft beer after community health‑fair
    shifts.
  core: Derek Unzueta blends disciplined emergency nursing with a competitive, social spirit, channeling their love for Texas BBQ, structured investing, and community service into a life where meticulous
    planning meets spontaneous group adventures, even if a lingering habit of over‑committing sometimes leaves their schedule packed.
background:
  cultural: Derek was raised in a middle‑class, white, Southern‑Texan community that valued self‑reliance, hard work, and neighborly hospitality. The regional love for outdoor recreation, country music,
    and communal gatherings shapes his social life. Although divorced, he maintains strong ties to local churches and neighborhood networks, reinforcing his sense of personal responsibility and community
    service. His nursing career blends this pragmatic Texan ethos with a deep commitment to helping others.
