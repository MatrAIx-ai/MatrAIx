    in DIY home repair projects'']'
  career_goals: James aims to transition into a mentorship and supervisory role within the next few years. He plans to obtain a Certified Nursing Assistant (CNA) credential and become a shift lead, where
    he can train new support workers and design patient‑centered activity programs. He seeks a predictable part‑time schedule that balances work with his growing involvement at the local senior center.
    Ultimately, he envisions retiring with a modest pension while continuing to volunteer as a health‑education advocate for older adults in Kalamazoo, ensuring his experience benefits the community he
    values.
