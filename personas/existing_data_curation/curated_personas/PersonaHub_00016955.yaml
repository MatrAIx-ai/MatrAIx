persona_description: A structural waterproofing consultant with expertise in waterproofing below-grade structures, particularly in the context of high-density development and challenging geologies. They
  have experience with various waterproofing techniques and admixtures, including Type A and B systems, and have developed innovative solutions to overcome the unique hydrological conditions of the site.
  They are familiar with the British Structural Waterproofing Association code of practice and the American Concrete Institutes standard classification of permeability-reducing admixtures under hydro-static
  conditions. They have a strong background in ground engineering work and have developed a new piling design and technique for basement construction, combining the process of mini-pile installation with
  a pre-blended micro-concrete mixture and plunging a structural steel section. They are highly skilled in waterproofing below-grade structures and have a passion for developing innovative solutions to
  complex waterproofing challenges.
