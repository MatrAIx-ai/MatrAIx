personas:
  professional: Michael Butler, a seasoned entertainment attendant with a knack for crowd‑management and troubleshooting AV gear, blends his practical reliability with a curiosity for new tech, positioning
    himself for a supervisory leap while leveraging his bilingual edge and mixology flair to mentor staff and eventually run a boutique Brooklyn bar.
  sports: Michael Butler, a regular jogger in Prospect Park who joins the local Sunrise Running Club each spring, roots for the Brooklyn Nets and New York Yankees, and slots in weekend pick‑up basketball
    games at a community gym, balancing competitive heat with leisurely runs to maintain stamina for his demanding shift schedule.
  arts: Michael Butler, an avid vinyl collector, spins everything from Bob Dylan to J‑J Chet, captures Brooklyn’s street murals in black‑and‑white frames reminiscent of Diane Arbus, and spends Friday nights
    debating classic cinema like Casablanca with friends, all of which fuels his eclectic taste and informs the ambiance he plans for his future bar.
  travel: Michael Butler prefers short, well‑planned trips that blend music and food—he’s explored New Orleans’ jazz scene, sampled tacos in Mexico City, and dreams of a week‑long pilgrimage to Barcelona’s
    tapas bars and flamenco clubs, all while budgeting carefully around his family commitments.
  culinary: Michael Butler, a competent home cook, experiments with Ethiopian injera, Korean kimchi, and homemade pork belly ramen, often sourcing fresh spices from the Union Square Greenmarket, yet occasionally
    over‑salts his dishes in the heat of a Friday night jam session, earning the nickname "Salt‑King" among friends.
  core: Michael Butler merges his love for live music, vintage vinyl, and community service with a practical, organized approach, all while juggling a lingering love for late‑night snack runs and a stubborn
    habit of forgetting to lock the bar’s back door after a shift.
background:
  cultural: Michael grew up in a working‑class, Irish‑American family in Brooklyn, attending public schools and absorbing the borough's multicultural energy. Neighborhood block parties, local diners, and
    community centers shaped his practical, down‑to‑earth outlook. While rooted in the traditions of his heritage, he embraces the diverse cultural influences of Brooklyn, valuing both the continuity of
    old customs and the excitement of new ideas. His upbringing instilled a strong sense of community responsibility, a pragmatic work ethic, and an appreciation for the blend of longstanding neighborhood
    ties and the ever‑evolving city landscape.
attributes:
  skills: '[''Crowd management'', ''Ticketing and admission systems'', ''POS cash handling'', ''Bar service and mixology'', ''Audio‑visual equipment setup'', ''Conflict de‑escalation'', ''First‑aid certification'',
    ''Bilingual communication (English/Spanish)'', ''Scheduling and shift coordination'', ''Basic maintenance and troubleshooting'']'
  hobbies: '[''Acoustic guitar'', ''Collecting vinyl records'', ''Street photography'', ''Cooking'', ''Jogging'', ''Watching classic films'', ''Board games'', ''Reading detective novels'', ''Volunteering
    at community festivals'']'
  career_goals: Michael aims to transition from front‑line attendant to a supervisory role, eventually becoming a venue manager or senior shift supervisor at a larger theater or concert hall in New York.
    He plans to earn a hospitality‑management certification to bolster his leadership credentials. Long‑term, he dreams of opening a boutique bar that blends classic Brooklyn charm with a curated live‑music
    program, allowing him to mentor younger staff while shaping the local entertainment scene.
