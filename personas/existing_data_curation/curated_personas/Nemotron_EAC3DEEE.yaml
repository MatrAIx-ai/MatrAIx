personas:
  professional: Andrea Coleman is a veteran CPA with three decades of public accounting and internal audit experience who leverages their methodical analytical skills, advanced Excel/VBA/Python automation,
    and compassionate mentorship to streamline financial statements for small businesses while quietly guiding junior staff through ethical audit practices.
  sports: Andrea Coleman stays fit by walking the beaches each morning, occasionally joining a quiet sunrise yoga class at the community center, and cheerfully following the Miami Heat, Tampa Bay Buccaneers,
    and the local Vero Beach Baseball Club, though they prefer solitary exercise over team sports.
  arts: Andrea Coleman nurtures a love of the arts through nightly nature photography of shorebirds, regular attendance at classical recitals featuring Yo‑Yo Ma and the Boston Symphony, and devouring historical
    fiction by Ken Follett and Hilary Mantel, all of which inspire their meticulous knitting patterns for senior‑center blankets.
  travel: Andrea Coleman plans trips with spreadsheet precision, favoring coastal getaways like the Florida Keys, Charleston’s historic waterfront, and an annual pilgrimage to the Azores for whale‑watching,
    while dreaming of a quiet retreat in the Scottish Highlands that would satisfy their curiosity without disrupting their calm routine.
  culinary: Andrea Coleman enjoys cooking Mediterranean‑inspired seafood dishes such as shrimp‑and‑grits with lemon‑herb butter and key‑lime pie, employing fresh Florida sea oats and thyme from their garden,
    and although they are an adept home chef, they still occasionally over‑salt meals in their quest for perfect flavor.
  core: Andrea Coleman blends meticulous financial expertise with a solitary love of nature, compassionate volunteerism, and a habit of solving crossword puzzles at sunrise, while occasionally succumbing
    to procrastination on personal reading projects.
background:
  cultural: Andrea comes from a white, middle-class American background, raised in a small Midwestern town before moving to Florida in her thirties. Her upbringing emphasized self-reliance, punctuality,
    and a strong work ethic, while her family's involvement in church and local civic groups fostered a sense of community responsibility. Living in Vero Beach for the past two decades has immersed her
    in the coastal Floridian culture that values environmental stewardship, a relaxed pace, and intergenerational support. These influences shape her appreciation for quiet, nature-focused activities and
    her commitment to helping neighbors through financial education and volunteer service.
