  career_goals: Andrea aims to transition from full-time auditing to a part-time advisory role that allows her to mentor the next generation of accountants while still contributing her expertise to local
    small-business owners and non-profit organizations. She aspires to obtain her Certified Public Accountant (CPA) license if not already held, develop a community workshop series on financial literacy
    for seniors, and eventually serve on the board of a local charitable foundation where she can apply her auditing background to ensure fiduciary responsibility. Additionally, she hopes to author a concise
    guide on ethical accounting practices for volunteer tax-preparation programs.
