  hobbies: '[''Knitting circle'', ''Community gardening'', ''Bridge (card game)'', ''Volunteer line dancing partner'', ''County fair attendance'', ''Local historical society member'', ''Senior center gatherings'',
    ''Reading book club'']'
  career_goals: Bay's career ambition is grounded in her practical outlook and desire for stability. She aims to secure a lead-assembler or shift-supervisor role where she can apply her extensive knowledge
    to streamline the production line and uphold high safety and quality standards. Over the next few years, she plans to earn a Certified Welder credential and complete a short vocational course in lean
    manufacturing to enhance process efficiency. By mentoring younger coworkers and formalizing training modules, Bay hopes to leave a lasting impact on the plant's workforce before transitioning to a part-time
    consulting role that allows her to share her expertise with other local fabricators while maintaining a predictable schedule that supports her preparation for retirement.
