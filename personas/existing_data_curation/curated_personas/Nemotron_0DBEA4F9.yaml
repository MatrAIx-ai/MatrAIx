  career_goals: Daniel aims to advance to a supervisory or plant-manager role within the next five years, leveraging his technical mastery and organizational skills to lead a production line. He plans to
    obtain a Certified Manufacturing Technologist (CMfgT) credential and deepen his CAD proficiency to transition into product design. Long-term, he dreams of opening a boutique fabrication studio that
    blends his metalworking expertise with artistic commissions, allowing him to create custom metal art pieces for local businesses and galleries while mentoring the next generation of craftsmen.
