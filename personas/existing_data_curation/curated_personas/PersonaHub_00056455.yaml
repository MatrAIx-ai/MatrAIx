persona_description: A business leader with expertise in the field of renewable energy, particularly focused on the development and commercialization of algae-based biofuels. Riggs Eckelberry is CEO of
  OriginOil, a company that specializes in harvesting and processing algae for use in producing oil. He is interested in the potential of algae to serve as a major asset in the effort to curb carbon emissions
  and in the use of algae to soak up nitrates to clean up waste water. Eckelberry's technology faces significant challenges when moving to large-scale production, but he is confident in the potential of
  scale-up and is eager to continue exploring and experimenting to find solutions.
