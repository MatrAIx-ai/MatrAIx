personas:
  professional: A master jeweler named Dolores Beatty blends four decades of technical expertise in precious‑metal casting, computer‑aided design, and ethical gem grading with an obsessive organizational
    streak and a vibrant community spirit, allowing them to run a meticulously documented studio while mentoring younger artisans.
  sports: An enthusiastic fitness participant, Dolores Beatty walks the historic districts of Charleston three times a week, follows the Charleston Battery soccer team, cheers for the Clemson Tigers during
    college football season, and joins a weekend senior tennis league at the local country club.
  arts: Dolores Beatty immerses herself in Southern folk art, regularly attending gallery shows featuring the works of contemporary folk artist Howard Finster, sings spirituals and bluegrass alongside the
    Cades Community Choir inspired by Maya Angelou’s poetry, and draws creative energy from the vibrant glass installations of Dale Chihuly.
  travel: Dolores Beatty prefers meticulously planned road trips, favoring gem‑mining tours in western North Carolina, the crystal caves of Tennessee, and weekend escapes to the historic streets of Savannah,
    though they dream of a future cruise along the Mediterranean’s southern coast.
  culinary: Dolores Beatty showcases her Southern culinary flair by perfecting low‑country boil, crafting house‑made pimento cheese, and infusing herb‑rich shrimp and grits with fresh magnolia leaves and
    heirloom tomatoes from their garden, while they occasionally over‑salt a pot of collard greens in the excitement of a new recipe.
  core: Dolores Beatty’s blend of meticulous craftsmanship, vibrant community involvement, and a habit of cataloguing every jewel and garden bloom makes them a uniquely organized yet delightfully spontaneous
    steward of Lowcountry tradition.
background:
  cultural: As a lifelong resident of Cades, a small unincorporated community in Clarendon County, South Carolina, Dolores grew up immersed in the values of a close‑knit Southern town—hospitality, self‑reliance,
    and reverence for handcrafted tradition. Her family lineage includes generations of small‑scale farmers and artisans who passed down skills such as metalwork, quilting, and woodworking. The region’s
    cultural tapestry, shaped by the legacy of the African‑American Gullah culture on the nearby Lowcountry, the Appalachian folk traditions of the inland, and the Baptist church’s central role, has given
    her a deep appreciation for community rituals, music, and storytelling. Though she identifies as White, Dolores actively participates in multicultural events like the Clarendon County Heritage Festival,
    where she showcases her jewelry alongside local musicians, chefs, and storytellers. This blend of Southern gentility, rural work ethic, and exposure to diverse artistic expressions informs her aesthetic—favoring
    timeless elegance with a touch of regional flair—and her commitment to mentoring the next generation of craftsmen.
