    setting'', ''Channel setting'', ''Tension setting'', ''Electroplating and finishing'', ''Workshop organization and inventory management'', ''Client consultation and sales'', ''Sustainable material sourcing'',
    ''Teaching and workshop facilitation'']'
  hobbies: '[''Vintage jewelry collecting'', ''Visiting art galleries and museum exhibitions'', ''Singing in community choir'', ''Gardening native Southern plants'', ''Cooking traditional Southern cuisine'',
    ''Bird-watching'', ''Volunteering as a craft instructor'', ''Traveling to gemstone mines'', ''Attending local craft fairs and festivals'', ''Reading Southern historical fiction'']'
  career_goals: Dolores aims to transition her home‑based studio into a modest storefront and teaching space in Clarendon County within the next three years, calling it Beatty Boutique & Studio. She wants
    to expand her clientele beyond the local market to include boutique retailers in Charleston and online buyers through a curated e‑commerce platform that highlights the story behind each piece. A core
    ambition is to develop a mentorship program for young women interested in metalwork, partnering with the local community college’s vocational program. She also hopes to obtain a formal gemological certification
    from the Gemological Institute of America, allowing her to provide independent appraisal services in the region. Long‑term, Dolores envisions publishing a handbook on sustainable Southern jewelry design
    and curating an annual Lowcountry Craft Fair that showcases local artisans while promoting environmental stewardship.
