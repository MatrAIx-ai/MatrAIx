  career_goals: Dima plans to earn his GED within the next year and then enroll in a community college program focused on Graphic Design or Library and Information Science. He aims to build a robust portfolio
    of digital illustrations, photo essays, and archival documentation that can attract freelance commissions and remote work opportunities as a content editor or digital illustrator. In the longer term,
    he envisions a full‑time role with a regional museum or cultural institution where he can curate exhibitions, manage digital archives, and develop educational outreach programs. Additionally, Dima hopes
    to establish a small community art hub in Chariton that offers workshops, preserves local history, and provides a quiet, collaborative space for fellow residents.
