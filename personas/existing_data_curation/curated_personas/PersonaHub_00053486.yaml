persona_description: A prominent civil rights activist and scholar, James Forman was a key figure in the civil rights movement in the United States. He was born in Marshall County, Mississippi, and moved
  to Chicago at the age of six. Forman spent his early years on a farm before attending Englewood High School and then transferring to Roosevelt University. He later attended Boston University and graduated
  from Englewood High School. After graduating from college, Forman worked at the Chicago Defender and joined the Congress for Racial Equality, where he became the principal for the 1963 March on Washington
  and the Freedom Rides. He also became one of the first major blacks leaders to demand reparations for slavery and served as president of the Unemployment and Poverty Action Council before returning to
  his academic studies. Forman has written many books on the civil rights movement and is known for his influential work as a civil rights activist and scholar. His death has been felt throughout the civil
  rights community and his guidance and wisdom will be sorely missed.
