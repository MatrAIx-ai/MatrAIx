  career_goals: Jacqueline dreams of becoming a research scientist, ideally focusing on environmental conservation or astronomy, where she can apply her analytical mindset and love for systematic investigation.
    She aims to excel academically, earn a scholarship to a top high school, and eventually attend a university renowned for scientific research. While she occasionally imagines herself as a detective solving
    mysteries, her practical side channels that curiosity toward rigorous scientific study. She is determined to develop expertise that will allow her to contribute to solving real-world problems and to
    be recognized among her peers for her diligence and thoughtful approach.
