personas:
  professional: Thomas Armstrong, a charismatic front‑of‑house hospitality specialist, leverages their talkative, improvisational flair and keen mood‑reading to upsell and personalize guest experiences,
    while their relaxed approach to structure occasionally leads to missed tabs that they compensate for with quick, empathetic conflict resolution and a budding commitment to formal management training.
  sports: Thomas Armstrong, a devoted member of a local recreational softball league and an avid supporter of the Kansas City Royals, squeezes in weekend pick‑up basketball games at the community center,
    attends the Royals’ summer home‑open series, and tries to maintain a regular yoga routine but frequently skips sessions when a theater gig or food‑festival prep consumes their evenings.
  arts: Thomas Armstrong, an enthusiastic community‑theater performer and improv comedy regular, lights up open‑mic nights with acoustic guitar renditions of classic folk songs, draws inspiration from Lin‑Manuel
    Miranda, Sarah Silverman, and the musical “Chicago,” and keeps a scrapbook of playbills and backstage photos that fuels their creative side after each shift.
  travel: Thomas Armstrong, an adventurous weekend traveler who favors spontaneous road trips to Midwestern culinary hotspots like Chicago’s deep‑dish scene and Kansas City’s barbecue festivals, dreams
    of a culinary pilgrimage to Tuscany’s Chianti hills, yet often postpones longer vacations due to work schedules and the financial pull of frequent local food events.
  culinary: Thomas Armstrong, a self‑described “food‑photographer‑chef,” loves experimenting with Midwestern comfort classics such as skillet‑seared pork chops with herb butter, sweet potato casserole,
    and homemade sriracha‑glazed chicken wings, frequently sources heirloom tomatoes and locally milled flour for their bistro‑concept recipes, and enjoys plating dishes for Instagram, though they sometimes
    over‑salt a batch while multitasking with a rehearsal.
  core: Thomas Armstrong, a gregarious 38‑year‑old hospitality pro whose love for spontaneous creativity is matched only by chronic anxiety and a habit of overcommitting to food‑centric social projects.
background:
  cultural: Thomas grew up in a middle‑class, white Midwestern family in Kansas, likely with German and Irish ancestry. His upbringing emphasized politeness, practicality, and a strong sense of community—hallmarks
    of the Kansas heartland. Raised in a modest environment, he absorbed values of hospitality, modesty, and hard work, often reinforced by church involvement and participation in local fairs and farmers
    markets. Living now in the affluent suburb of Leawood, he experiences a blend of small‑town Midwestern friendliness and exposure to more affluent clientele, which fuels his desire for upward mobility
    while maintaining his grounded, cooperative spirit. His cultural roots inform his kindness, teamwork, and commitment to maintaining harmony in both personal and professional settings.
