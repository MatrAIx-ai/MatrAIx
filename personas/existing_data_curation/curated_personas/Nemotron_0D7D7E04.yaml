  career_goals: Thomas aims to move beyond his current waiter role into supervisory and managerial positions within the hospitality industry. He plans to enroll in an online hospitality management certificate
    program to improve his organizational skills and learn modern restaurant operations. His short‑term goal is to become a shift supervisor and later a restaurant manager, where he can mentor new staff
    and implement a more structured workflow that balances his flexibility with the needs of the business. Long‑term, Thomas dreams of opening a modest family‑friendly bistro in Leawood that showcases Midwestern
    comfort food made with locally sourced ingredients, creating a community hub where his sociable personality can shine while providing a stable schedule for his family.
