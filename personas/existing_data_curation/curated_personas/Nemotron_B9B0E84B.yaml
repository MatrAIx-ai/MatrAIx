personas:
  professional: Aida Morales, a three‑year‑old budding architect who loves assembling modular block towers and labeling each piece, demonstrates a balance of curiosity and practical organization while staying
    flexible enough to incorporate imaginative twists, and they eagerly share their creations with peers, showing a cooperative spirit.
  sports: Aida Morales, a three‑year‑old member of the Little Sprouts toddler gymnastics club who loves sprinting after a soft plastic soccer ball at the community playground and cheers for the hometown
    baseball team, the River City Rangers, during family outings, approaches fitness with playful enthusiasm while balancing organized class time and free‑form movement.
  arts: Aida Morales, a three‑year‑old who sings along to the song Let It Go from Frozen, dances to The Wiggles’ Fruit Salad, and creates vibrant finger paintings while humming Baby Einstein melodies, blends
    curiosity with structured art time and cooperative sharing of crayons with friends.
  travel: Aida Morales, a three‑year‑old who delights in visits to the local zoo and a beach day in Santa Cruz, dreams of seeing giant pandas in Chengdu, and prefers trips planned with frequent snack breaks
    and nap intervals, balancing the excitement of new places with a need for quiet moments.
  culinary: Aida Morales, a three‑year‑old who adores creamy macaroni and cheese sprinkled with cheddar, loves dipping crisp apple slices in honey, can stir a pretend pot with a wooden spoon while humming
    a tune, yet persistently rejects peas, a quirky dietary habit they acknowledge with a playful grimace.
  core: Aida Morales, a relentlessly curious three‑year‑old who balances precise block building with spontaneous scribbles, maintains a tidy piggy bank, manages mild eczema with diligent moisturizing, thrives
    in toddler gymnastics, sings Disney tunes, treasures zoo adventures, and holds a charming aversion to peas.
background:
  cultural: Aida is raised in a bilingual Colombian‑American household in Vero Beach, Florida. Spanish fills the home, while English is used at daycare and the community. Family meals feature traditional
    dishes such as arepas, empanadas, and sancocho, and celebrations include Colombian holidays like Día de la Independencia and Carnaval de Barranquilla. She enjoys Colombian lullabies and dances, while
    also participating in local Indian River County events, blending her heritage with the Florida lifestyle.
