  career_goals: Although only three, Aida often expresses a budding desire to help others as she grows. She talks about wanting to become a teacher who can share stories and music, a doctor who can keep
    friends healthy, or a community caretaker who preserves the joy of Colombian traditions. These aspirations echo her compassionate and cooperative personality.
