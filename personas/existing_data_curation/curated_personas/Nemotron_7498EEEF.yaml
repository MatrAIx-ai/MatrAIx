personas:
  professional: Akilah Cummings is an aspiring young coder who fuses boundless curiosity with practical project planning, using their competitive forward instincts from soccer to design polished Scratch
    games, while their organized yet flexible approach lets them juggle after‑school art club collaborations and LEGO building sessions with ease, and they consistently meet deadlines set by teachers.
  sports: Akilah Cummings lights up the field as a forward for the Eastside Youth Soccer Club, chasing the ball with fierce competitiveness at the neighborhood park while cheering on the US Women’s National
    Soccer Team, and they also relish weekend hikes through the nearby Pine Ridge forest, where they keep a keen eye on local wildlife.
  arts: Akilah Cummings channels their creative energy by sketching original cartoons inspired by Dav Pilkey during after‑school art club, breaking into hip‑hop moves to Beyoncé’s R&B hits at family gatherings,
    lending their voice to the church choir’s soulful hymns, and crafting story‑rich LEGO dioramas that echo the magical worlds of Harry Potter, and they frequently showcase these works to friends during
    playdates.
  travel: Akilah Cummings prefers adventure‑packed short trips, meticulously planning weekend hikes in the nearby Pine Ridge woods, dreaming of a future family road trip to Yellowstone National Park’s geysers,
    and eagerly awaiting a summer vacation to Disney World in Orlando, balancing excitement for new experiences with a love for familiar family routines, and they keep a scrapbook of each destination’s
    highlights.
  culinary: Akilah Cummings enjoys cheesy pizza slices, creamy mac and cheese, and classic peanut‑butter‑and‑jelly sandwiches, often assisting Mom in assembling colorful fruit kebabs and experimenting with
    homemade trail mix featuring dried mango, pretzel sticks, and a secret drizzle of melted cheddar, though they sometimes sneak extra chocolate chips into their cereal when no one’s watching.
  core: Akilah Cummings is a competitively spirited nine‑year‑old who blends curiosity‑driven coding, LEGO building, and soccer prowess with a skeptical eye for shortcuts, thriving on group activities,
    meticulous budgeting, and they maintain an unwavering calm when faced with challenges.
background:
  cultural: Akilah is a Black girl growing up in Pembroke, North Carolina, a town steeped in Southern traditions and a vibrant African‑American community. Her family's cultural roots are reflected in weekly
    church attendance, where gospel music and fellowship shape her social life. She celebrates holidays such as Juneteenth and Kwanzaa, learning about African heritage through storytelling and community
    events. The rich oral tradition of her grandparents, who share stories of the civil‑rights era and local history, informs her sense of identity. Community gatherings, barbecues, and local festivals
    provide opportunities for Akilah to connect with neighbors, reinforcing values of resilience, mutual support, and pride in her heritage.
