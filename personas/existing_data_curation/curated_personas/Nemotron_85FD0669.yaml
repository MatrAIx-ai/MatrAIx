  career_goals: Brendan aims to turn his passion for building and coding into a future career in engineering. In the short term, he hopes to lead his middle‑school robotics team to a regional competition
    win and develop a simple mobile app or video game of his own. Long‑term, he envisions studying computer science or mechanical engineering in college, working as a software or robotics engineer, and
    eventually contributing to innovative technology projects that combine hardware design with programming.
