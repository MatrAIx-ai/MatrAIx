  career_goals: At 76, Carmen’s ambitions centre on sustaining her independence, nurturing her marriage, and deepening the cultural legacy she cherishes. She aims to keep her health steady through regular
    walks and gentle yoga, thereby reducing anxiety about declining abilities. Carmen wishes to finish a handwritten family cookbook that documents beloved Spanish recipes and the stories behind them, preserving
    her heritage for grandchildren and distant relatives. She also hopes to expand her volunteer role at the local community center, offering language assistance and reading support to seniors, which aligns
    with her desire to maintain harmony and help others. Although she is not seeking formal employment, she aspires to remain an active, organized presence in her small social circle, ensuring that her
    routine remains both predictable and adaptable enough to accommodate unforeseen family needs.
