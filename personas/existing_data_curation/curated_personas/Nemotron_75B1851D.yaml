personas:
  professional: Richard Deangelis, a retired handyman turned community mentor, leverages decades of carpentry, automotive restoration, and project planning expertise to guide apprentices, volunteer as a
    museum docent, and document Michigan’s historic neighborhoods through meticulous black‑and‑white photography, and they approach each undertaking with the same methodical care that defined their working
    life.
  sports: Richard Deangelis, a devoted supporter of the Detroit Lions and Detroit Tigers, spends Saturday afternoons watching games at the local sports bar, participates in a senior bowling league at the
    community center, and they keep fit with a weekly routine of low‑impact garden walks.
  arts: Richard Deangelis, a passionate patron of the Michigan Art Fair, frequently attends gallery openings featuring artists such as Edward Hopper and Georgia O'Keeffe, enjoys community theater productions
    of classic plays, and they draw inspiration from the black‑and‑white works of Ansel Adams, which shape their own photographic style.
  travel: Richard Deangelis, who prefers road trips in their restored 1967 Chevrolet Impala, plans seasonal visits to the Art Institute of Chicago and the MoMA in New York using senior discounts, while
    also exploring historic towns across Michigan such as Marquette and Saugatuck, and they balance a modest travel budget with a deep desire for cultural immersion.
  culinary: Richard Deangelis, an adept home cook, regularly prepares hearty dishes like chicken pot pie, Michigan cherry‑glazed pork chops, and spaghetti with fresh basil, savoring the occasional slice
    of Detroit‑style pizza, and they enjoy sourcing seasonal vegetables from their garden to complement each meal.
  core: Richard Deangelis blends meticulous craftsmanship with a nostalgic love for analog photography, balances careful budgeting and health vigilance with occasional indulgences in vintage car restoration,
    and they tend to over‑worry about every detail.
background:
  cultural: Richard comes from an Italian‑American family that settled in Michigan’s industrial heartland in the mid‑20th century. Raised in a Catholic household, he grew up with traditions such as Sunday
    family meals, the celebration of Italian holidays like Festa di San Giuseppe, and a strong sense of community responsibility. The Midwestern values of hard work, modesty, and neighborly support have
    blended with his cultural heritage, shaping a worldview that respects both his ancestry and the local customs of Jackson, MI. This dual influence is evident in his love for hearty home‑cooked meals,
    his participation in community service, and his appreciation for both Italian art and the regional crafts of the Great Lakes area.
