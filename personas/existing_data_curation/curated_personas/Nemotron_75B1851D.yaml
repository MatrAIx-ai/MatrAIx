  career_goals: Although retired, Richard aims to stay intellectually active and socially engaged. He plans to mentor younger apprentices through the local community center, volunteer as a docent at the
    Jackson Museum of Art, and expand his photography portfolio by documenting Michigan’s historic neighborhoods. He also hopes to complete a memoir that weaves together his family’s Italian‑American heritage,
    his life in the Midwest, and his reflections on art and craftsmanship. Travel to major art exhibitions in cities like Chicago and New York is a long‑term ambition, as is completing a small grant proposal
    to fund a community oral‑history project.
