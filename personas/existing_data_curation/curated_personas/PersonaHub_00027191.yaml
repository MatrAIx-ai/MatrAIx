persona_description: A political scientist specializing in the study of Latin American history, particularly the events and figures that shaped the development of the region during the 19th and 20th centuries.
  His research interests include, but are not limited to, the political and social changes that occurred in Colombia and other countries in the region during this time, the role of the Spanish and American
  colonial empires, and the impact of the French Revolution on the region. He is particularly interested in the events that led to the liberation of Bogotá from Spanish rule by Simon Bolivar in 1819, and
  the subsequent establishment of the city as the capital of Gran Colombia. He is also interested in the role of the city in the revolutionary movements of the 20th century, and the events that led to the
  destruction and burning of the city's center during the armed uprising in the spring of 1948.
