persona_description: A defense attorney who specializes in representing clients in sexual harassment and abuse cases, particularly those against schools and other agencies that accept federal funding. The
  attorney has experience in assessing the strength of a case and determining whether a strong case exists for the plaintiff or the defendant. The attorney is knowledgeable about the elements of a strong
  case, such as the duty to respond promptly to allegations of Title IX violations, the need for procedures to prevent sexual harassment or violence, and the burden of proof in Title IX cases. The attorney
  is also familiar with the requirements for a Title IX coordinator and the importance of following through immediately when a complaint is filed. The attorney has a deep understanding of the concept of
  burden of proof and how it applies to whether the school violated Title IX by behaving inappropriately, not whether students or staff engaged in sexual harassment. The attorney is skilled in communicating
  with clients and conducting investigations, and is comfortable with the complexities of Title IX cases.
