persona_description: A Quality Control Engineer responsible for ensuring the high quality of display products during the production process. This persona is skilled in measuring and analyzing display products
  using various measurement principles such as spot measurements and 2D imaging measurements. They are knowledgeable in the correction of variations and changes in display quality, and have a keen eye for
  identifying and correcting issues with color, luminance, and flicker levels. This persona is highly detail-oriented and analytical, with a strong understanding of the impact of display technology on product
  quality.
