  career_goals: Approaching retirement, Rafael aims to cement his professional legacy by transitioning his practice into a family‑run advisory boutique that continues serving the Cuban‑American community.
    He plans to mentor younger advisors, sharing his blend of practical expertise and curiosity‑driven adaptability. Rafael also aspires to author a guidebook on financial planning for senior immigrants,
    focusing on the unique tax and estate considerations in Florida. Additionally, he wishes to expand his philanthropic impact by establishing a scholarship fund for aspiring financial professionals from
    underserved Latino backgrounds, ensuring his influence endures beyond his active consulting years.
