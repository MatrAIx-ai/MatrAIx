  activities on fish populations and the need for sustainable management practices. They are passionate about the conservation of Lake Ontario's native fish species and the restoration of degraded habitats.
  They are dedicated to the implementation of effective management strategies and the promotion of recreational and commercial fishing opportunities for the benefit of all stakeholders.
