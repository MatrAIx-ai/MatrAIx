personas:
  professional: Jessie Odom is a retail visual merchandiser who blends artistic curiosity with precise inventory oversight, using empathetic listening and conflict‑resolution skills to craft engaging store
    displays, mentor staff, and build an inclusive shopping environment while pursuing a management certification to eventually open a boutique featuring local artisans.
  sports: Jessie Odom enjoys low‑impact fitness, regularly attending co‑ed yoga classes at the community center, jogging with the Riverside Runners club, and cheering on the local soccer team, the River
    City FC, while steering clear of crowded stadiums that heighten anxiety.
  arts: Jessie Odom frequents local art galleries, admires the works of Frida Kahlo, Yayoi Kusama, and contemporary photographer Brandon Stacey, attends Greenleaf Community Theatre productions, and finds
    solace sketching watercolor scenes while listening to the mellow folk sounds of Bon Iver.
  travel: Jessie Odom plans trips with a careful budget but embraces spontaneous discovery, having explored Asheville’s mountain art markets, the folk‑art villages of Oaxaca, Mexico, and the serene lakeside
    cabins of Lake Placid, while dreaming of a cultural immersion pilgrimage to Kyoto’s traditional tea houses.
  culinary: Jessie Odom cooks at an intermediate skill level, preferring farm‑to‑table dishes like roasted beet salad with goat cheese, fresh basil, and heirloom tomatoes, pan‑seared salmon with quinoa,
    and Thai green curry using locally sourced basil and lemongrass, and delights in hosting potluck dinners where friends share their own recipes.
  core: Jessie Odom is a creatively curious, compassion‑driven retail professional whose meticulous nature battles high‑octane anxiety, leading to daily journaling, yoga, and an unending quest for harmonious
    spaces.
background:
  cultural: Jessie grew up in Wilson, a small town in Carter County, Oklahoma, in a white, working‑class family with deep roots in the region. Her upbringing was shaped by the close‑knit community values
    typical of rural Oklahoma—hospitality, church involvement, and a strong sense of neighborliness. She was exposed to Southern and Midwestern cultural traditions, including country music, local festivals,
    and folk arts such as quilting and woodcarving. These influences fostered her appreciation for community events and regional craftsmanship. While she identifies with mainstream American cultural norms,
    Jessie also embraces the modest, resilient spirit of her hometown, which informs her compassionate outlook and desire to give back to her community.
