  hobbies: '[''Visiting Art Galleries'', ''Attending Community Theater'', ''Pottery Workshops'', ''Watercolor Painting'', ''DIY Home Décor Projects'', ''Reading Contemporary Fiction'', ''Psychology Books'',
    ''Yoga'', ''Mindfulness Meditation'', ''Journaling'', ''Volunteering at Community Center'', ''Organizing Food Drives'', ''Tutoring Elementary Students'', ''Gardening'', ''Cooking with Fresh Ingredients'']'
  career_goals: Jessie aims to advance into a store management position within the next few years, where she can combine her retail expertise with her passion for fostering a supportive, inclusive environment
    for both customers and staff. She plans to obtain a retail management certification and develop stronger leadership skills, eventually overseeing multiple locations or opening her own boutique that
    showcases local artisans and sustainable products. Jessie's long‑term ambition is to use her role to create community‑focused events, such as art fairs and charity fundraisers, that promote local culture
    and provide resources for those in need. She also seeks to improve her emotional resilience through ongoing counseling or workshops, ensuring she can maintain her compassionate approach without being
    overwhelmed.
