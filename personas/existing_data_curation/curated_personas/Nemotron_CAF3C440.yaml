  hobbies: '[''Fishing'', ''Vegetable Gardening'', ''Woodworking'', ''Attending High School Sports Events'', ''Church Volunteer Work'', ''Community Center Gatherings'', ''Reading Historical Novels'', ''Listening
    to Classic Rock'', ''DIY Home Improvement'']'
  career_goals: Timothy aims to modernize the operations of his current community association by introducing digital record‑keeping and streamlined communication tools while preserving its personal touch.
    He hopes to expand his portfolio to manage a larger mixed‑use property, mentor younger property‑management staff, and eventually transition into a consultancy role focused on sustainability and cost‑effective
    upgrades for mid‑size residential complexes. He also envisions serving on the local planning commission to shape development in Jackson and surrounding Scioto County.
