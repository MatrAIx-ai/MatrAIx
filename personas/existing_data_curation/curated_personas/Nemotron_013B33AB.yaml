  hobbies: '[''Gardening'', ''Nature walks and bird‑watching'', ''Reading historical fiction and biographies'', ''Knitting and craft projects'', ''Volunteer tutoring and craft workshops'', ''Attending community
    theater and arts events'']'
  career_goals: Although retired from formal employment, Mary aims to expand her impact in the Huntington community. She hopes to assume a leadership role on the board of the Huntington Historical Society,
    where she can apply her research skills and passion for preservation. Mary also plans to mentor younger volunteers in event planning and conflict mediation, sharing her methodical approach. On a personal
    level, she intends to complete a nonprofit‑management certificate offered by a nearby community college, develop a sustainable vegetable garden that supplies her family and local food‑bank, and write
    a memoir that weaves her family’s genealogical story with the broader history of Suffolk County.
