personas:
  professional: Rita Guidry, a retired community‑college lecturer turned volunteer curator, leverages her deep expertise in 19th‑century American painting, meticulous genealogical research, and newly acquired
    museum‑curation workshop skills to design modest traveling exhibitions of coastal Florida art while mentoring younger volunteers at the local historical society.
  sports: Rita Guidry, a gentle enthusiast of low‑impact fitness, joins a senior walking club for weekly strolls on nearby nature trails, quietly roots for the Tampa Bay Rays during spring training outings,
    and enjoys occasional tai chi classes at the community center to keep her joints supple.
  arts: Rita Guidry, a devoted watercolorist, paints the shifting blues of Florida’s shoreline while studying the works of Winslow Homer and John Singer Sargent in small museums, finds inspiration in Beethoven’s
    late string quartets and Miles Davis’s "Kind of Blue", and weaves these influences into the poetry she drafts in her garden journal.
  travel: Rita Guidry, an aficionado of leisurely road trips, plans methodical excursions to historic locales such as St. Augustine, Savannah, and the small coastal villages of the Florida Keys, favoring
    boutique B&Bs and quiet museums over crowded airports, and dreams of witnessing the autumn foliage in New England before her next birthday.
  culinary: Rita Guidry, a modest home chef, relishes preparing simple yet aromatic dishes like grilled grouper seasoned with fresh thyme and citrus, key‑lime pie made with garden‑grown lime zest, and garden
    salads featuring heirloom tomatoes, basil, and cucumber, all while maintaining a moderate skill level that balances confidence with occasional over‑salting.
  core: Rita Guidry, a solitary yet inquisitive septuagenarian, blends a lifelong love of art, genealogy, and garden solitude into a quietly disciplined routine that includes low‑key travel, careful finances,
    modest health vigilance, and a penchant for watercolor and poetry.
background:
  cultural: Rita grew up in a middle‑class, Protestant household in post‑war Florida, absorbing traditional Southern values of courtesy, self‑reliance, and a respect for community. Her education in the
    arts and humanities broadened her perspective, blending those regional roots with a broader American appreciation for cultural expression. Living in North Fort Myers, she has been shaped by the coastal
    environment, the rhythms of small‑town life, and the multicultural influences of the Atlantic coast, including maritime heritage and local indigenous histories, which she honors and weaves into her
    artistic and scholarly interests.
attributes:
  skills: '["Art History", "Creative Writing", "Genealogy Research", "Financial Management", "Volunteer Coordination", "Digital Literacy", "Horticulture"]'
  hobbies: '["Reading", "Watercolor Painting", "Gardening", "Birdwatching", "Attending Lectures", "Listening to Music", "Poetry Writing", "Genealogy Research", "Nature Trail Walking", "Museum Visits"]'
  career_goals: Rita aims to keep learning by attending workshops on museum curation and local history. She hopes to curate a small traveling exhibition of coastal Florida art and to self‑publish a memoir
    that reflects her life across seven decades. She also aspires to mentor younger volunteers at the historical society, develop an online blog that explores art, history, and genealogy for an audience
    that shares her love of quiet reflection, and continue contributing her expertise to community cultural projects.
