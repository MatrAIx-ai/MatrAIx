  hobbies: '[''Gardening (tomatoes, chilies, herbs)'', ''Traditional Mexican cooking'', ''Knitting and quilting'', ''Listening to ranchera and mariachi music'', ''Watching classic Mexican cinema and telenovelas'',
    ''Attending Sunday Mass'', ''Participating in community center bingo'', ''Joining Dia de los Muertos celebrations'']'
  career_goals: Although retired, Yoslaine remains focused on personal and community-oriented goals. She wishes to compile a family cookbook that records her grandmother's recipes and the stories behind
    them, preserving her Mexican culinary heritage for future generations. She aims to continue volunteering at the local senior center, mentoring new volunteers and assisting with cultural programming.
    Maintaining her physical health is a priority, so she plans to join a low-impact exercise class at the community center and keep up with her garden routine. Yoslaine also aspires to become more comfortable
    using a tablet for video calls, allowing her to stay connected with her children and grandchildren. Ultimately, she hopes to be recognized as a trusted cultural resource within the Santa Rosa Mexican-American
    community.
