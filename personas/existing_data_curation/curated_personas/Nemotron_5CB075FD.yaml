  career_goals: Osmar aims to advance into a senior engineering or tech‑lead role where he can guide multidisciplinary teams to create technology solutions that improve mental‑health outcomes and community
    well‑being. Over the next five years he plans to obtain certifications in AWS Solutions Architecture and PMP, spearhead the development of a tele‑health platform leveraging AI for personalized support,
    and eventually move into a Chief Technology Officer position at a mission‑driven startup. He also hopes to mentor more underrepresented newcomers in tech and contribute to open‑source mental‑health
    tools.
