  hobbies: '["Fitness classes (yoga, spin)", "Volunteer reading programs", "Hiking and nature walks", "Photography", "Cooking and entertaining", "Reading contemporary fiction", "Game nights with friends",
    "Community theater involvement", "Traveling to nearby historic towns"]'
  career_goals: Cynthia aims to progress from her receptionist role to an office manager or administrative supervisor position within the next three to five years. She plans to obtain the Certified Administrative
    Professional (CAP) credential and pursue additional training in project coordination and human resources basics. Her long‑term ambition includes leading a small team, implementing streamlined office
    processes, and eventually offering consulting services to local small businesses on efficient administration. She also seeks to secure a work schedule that provides greater predictability and work‑life
    balance, helping to mitigate stress while allowing her to mentor newer staff members.
