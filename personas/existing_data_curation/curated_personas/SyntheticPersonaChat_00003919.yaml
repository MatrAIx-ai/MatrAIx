    User 1: I like to spend time with my family and friends, read, and go to the movies.

    User 2: Sounds like you have a lot of fun!

    User 1: I do!

    User 2: So, what are you looking forward to this year?

    User 1: I''m looking forward to going on vacation with my family.

    User 2: That sounds like a lot of fun! Where are you going?

    User 1: We''re going to the beach.

    User 2: That sounds amazing!

    User 1: It does!

    User 2: So, what are you hoping to achieve in the next year?

    User 1: I''m hoping to get a promotion at work.

    User 2: That would be great! I''m sure you''ll get it.

