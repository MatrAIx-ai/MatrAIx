persona_description: Amy, a geology and geophysics student who is conducting a multidisciplinary study of sedimentation processes along the Louisiana Coast. She is working closely with experts from the
  Applied Ocean Physics & Engineering and Marine Chemistry & Geochemistry Departments at WHOI, as well as scientists from the US Geological Survey branch in Woods Hole and geologists at Boston College,
  Tulane University, and Louisiana State University. Her project aims to construct a three-dimensional analysis of the processes that shape the shoreline on short and long time scales.
