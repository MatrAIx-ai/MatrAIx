personas:
  professional: Christine Duggins is a senior event strategist who leverages her analytical STEM background to orchestrate complex hybrid conferences, juggling meticulous budgets, cutting‑edge AV tech,
    and sustainability metrics while flexibly adapting to last‑minute challenges, which satisfies her competitive drive and pragmatic curiosity.
  sports: Christine Duggins embraces early‑morning runs and cardio workouts, participates in the local Everglades Run Club, follows the Miami Heat and Tampa Bay Buccaneers, and practices yoga twice weekly
    to balance her competitive edge with flexibility.
  arts: Christine Duggins volunteers behind the curtains of community theater productions, frequently visits the Ringling Museum to view contemporary installations by Kerry James Marshall, and draws inspiration
    from musician Leon Bridges and actress Viola Davis for creative problem‑solving.
  travel: Christine Duggins prefers meticulously planned solo retreats to natural springs like Ichetucknee and Blue Springs, while also scheduling occasional international escapes to Santorini, Greece and
    Kyoto, Japan, balancing desire for solitude with a competitive urge to tick off bucket‑list destinations.
  culinary: Christine Duggins experiments with Southern dishes such as shrimp and grits and Mediterranean plates like Moroccan tagine, relishing ingredients like okra, preserved lemon, saffron, and extra‑virgin
    olive oil, and considers her kitchen a laboratory for curiosity‑driven flavor combos.
  core: Christine Duggins is a data‑driven event maestro who channels competitive curiosity into sustainable hybrid conferences, counterbalances stress with rigorous fitness, mindful meditation, and experimental
    cooking, yet often wrestles with worry and perfectionism.
background:
  cultural: Christine grew up in a middle‑class white family in the American South, absorbing the region's hospitality and strong work ethic while also being encouraged to pursue education in science and
    technology. Relocating to Gainesville for university immersed her in a vibrant, academic environment that broadened her cultural perspective and fostered progressive values. Her Southern roots inform
    her personable, down‑to‑earth communication style, whereas her STEM education fuels a data‑driven, curious approach to problem‑solving. This blend of traditional Southern sensibility and modern, research‑oriented
    thinking shapes her balanced outlook on both personal and professional challenges.
attributes:
  skills: '[''Event logistics coordination'', ''Budgeting and financial management'', ''Vendor negotiation and contract management'', ''Audio‑visual technology integration'', ''Hybrid event design and execution'',
