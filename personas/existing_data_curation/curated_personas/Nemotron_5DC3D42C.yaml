  hobbies: '[''Running and cardio workouts'', ''Yoga and mindfulness meditation'', ''Gardening (native Florida plants)'', ''Cooking experiments with Southern and Mediterranean cuisine'', ''Reading contemporary
    non-fiction (psychology, leadership)'', ''Attending local art exhibits'', ''Participating in community theater productions (behind the scenes)'', ''Exploring new event technology platforms'', ''Crossword
    puzzles and Sudoku'', ''Weekend travel retreats'']'
  career_goals: Christine aims to ascend to a senior director role within a large conference‑hosting organization, where she can shape strategic vision and mentor junior planners. She aspires to become
    a Certified Meeting Professional (CMP) and to earn recognition through industry awards for innovative, sustainable event design. Long‑term, she envisions launching her own consultancy focused on hybrid
    and data‑driven events for academic institutions and tech companies, leveraging her competitive drive to position the firm as a market leader while maintaining a healthier work‑life balance to mitigate
    stress.
