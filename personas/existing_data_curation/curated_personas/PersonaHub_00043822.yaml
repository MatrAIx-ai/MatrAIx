persona_description: A geologist who is passionate about karst environments and groundwater resources, and has expertise in promoting understanding and conservation of these important natural resources.
  They have conducted workshops and led educational tours to raise awareness about the sensitivity and importance of karst features, such as the Dames Caves Complex, and have installed interpretative signs
  to help visitors understand the karst system and its impact on groundwater. They have also conducted cave cleanup and restoration activities to preserve the karst environment and the precious groundwater
  resources it provides.
