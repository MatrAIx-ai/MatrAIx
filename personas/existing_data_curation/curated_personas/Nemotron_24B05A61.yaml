personas:
  professional: Steven Collins, a certified radiologic technologist, leverages their mastery of X‑ray, CT, and MRI alongside an artist’s eye for composition to deliver precise, patient‑focused imaging while
    navigating RIS and PACS with ease, and their curious, easy‑going nature turns spontaneous problem‑solving into mentorship opportunities for junior staff.
  sports: Steven Collins fuels their energy by playing intramural basketball with the Bridgeport Suns league, hiking with the Connecticut Mountain Club in the fall, cheering on the New York Knicks and New
    York Yankees, and supplementing these social workouts with weekly yoga sessions to counterbalance a desk‑bound radiology shift.
  arts: Steven Collins channels their love for unconventional thinking into street photography inspired by Bruce Gilden and Banksy, attends live performances at the Public Theater featuring Lin‑Manuel Miranda’s
    revivals, and hones improvisational comedy skills at the Upright Citizens Brigade, all while drawing creative inspiration from the surreal films of David Lynch and the vibrant murals of Frida Kahlo.
  travel: Steven Collins prefers flexible, spontaneity‑driven trips, often weekend‑hiking in Connecticut’s Shenipsit State Forest, day‑exploring the art districts of New York City and the historic streets
    of Boston, and they dream of photographing the neon‑lit lanes of Tokyo and the rugged coastlines of Iceland while keeping travel budgets modest.
  culinary: Steven Collins, an enthusiastic food‑truck aficionado with a decent home‑cooking skill set, savors Korean BBQ tacos with kimchi slaw, truffle‑oil mac and cheese, and ramen topped with pork belly
    and soft‑boiled eggs, they often experiment with matcha‑infused desserts while still occasionally ordering a slice of pepperoni pizza for comfort.
  core: Steven Collins is a curiously artistic radiology tech who balances a love for spontaneous street photography and yoga with a habit of misplacing bills and a chronic worry‑driven need for mindfulness,
    and they often rely on quick breathing exercises to stay centered during busy shifts.
background:
  cultural: Steven grew up in a middle‑class, primarily Anglo‑American family in the Greater New Haven area before moving to Bridgeport, Connecticut. His upbringing blended traditional New England values
    of independence, modesty, and a strong work ethic with exposure to the city’s multicultural environment. Proximity to New York and Boston gave him easy access to vibrant art scenes, museums, and diverse
    cultural events, fostering his appreciation for varied experiences. While he identifies as White, his daily interactions at work and in the community have cultivated a respectful awareness of cultural
    diversity, shaping his cooperative and inclusive outlook.
