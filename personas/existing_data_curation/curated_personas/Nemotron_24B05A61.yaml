  career_goals: Steven aims to attain advanced certifications in MRI and CT, positioning himself for a senior technologist or lead technologist role within his hospital. He envisions eventually moving into
    radiology education, training new technologists and developing outreach programs that blend his love for art with medical imaging. Over the long term, he aspires to a management position where he can
    shape departmental culture, promote staff wellbeing, and integrate innovative imaging technologies, while also pursuing a part‑time degree in health informatics to bridge clinical practice with data
    analytics.
