personas:
  professional: Magen Graben, a 12‑year‑old aspiring game designer, blends methodical planning with a competitive spark as they sketch pixel‑art storyboards, craft simple Scratch games, and practice chess
    strategies, turning curiosity into early software creativity.
  sports: Magen Graben enjoys weekend hikes in the nearby state park, plays forward on a community youth soccer team, cheers for the local high school basketball squad, and follows the professional baseball
    team the Chicago Cubs, combining a love of nature with regular team practice and televised sports.
  arts: Magen Graben channels artistic curiosity by sketching in a weathered journal, draws inspiration from indie acoustic musicians like Bon Iver and Phoebe Bridgers, admires Van Gogh’s *Starry Night*
    at the city art museum, and collects limited‑edition prints by contemporary illustrator James R. Eads, letting music and visual art shape their creative mood.
  travel: Magen Graben favors low‑cost weekend trips to national parks such as Yellowstone and historic towns like Williamsburg, dreams of exploring Kyoto’s bamboo forest and Iceland’s volcanic landscapes,
    and plans vacations around school breaks with savings set aside from birthday money.
  culinary: Magen Graben favors homemade mac and cheese topped with pepper jack, loves blending strawberry‑banana smoothies with Greek yogurt, experiments with simple sushi rolls for school projects, and
    snacks on trail mix of raisins, almonds, and chocolate chips while hiking.
  core: Magen Graben is a curious, methodical twelve‑year‑old whose competitive streak fuels creative coding and sketching, yet intense anxiety and occasional impulsive spending keep their days a delicate
    balance of ambition and emotional turbulence.
background:
  cultural: Magen grew up in a middle‑class white family in Kennesaw, Georgia, a suburban community in Cobb County near Atlanta. Her upbringing blends Southern cultural traditions—community gatherings,
    family meals with Southern cuisine, and local high school football events—with exposure to the diverse arts and educational opportunities of the nearby metropolitan area. She attends a public middle
    school, participates in extracurricular clubs such as debate and robotics, and benefits from community support for the arts through museum visits and school programs.
