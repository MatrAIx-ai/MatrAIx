  career_goals: Magen aspires to merge her love of art and science by becoming a visual artist or illustrator who creates educational and advocacy content. She hopes to earn a college degree in illustration
    or graphic design, work on projects that communicate scientific ideas to the public, and later study art therapy to help peers cope with anxiety and emotional challenges.
