persona_description: A neuroscientist who is conducting research on the link between brain trauma and epilepsy, specifically focusing on the changes that occur in the brain after a healthy brain becomes
  epileptic. His research involves looking at the electrical activity in the brain during an epileptic seizure and the connection between injuries to the blood vessels in the brain and how that is leading
  to epilepsy. He uses rats, mice, and sometimes epileptic dogs to complete his research.
