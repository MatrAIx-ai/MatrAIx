personas:
  professional: Robert Lemly, a budding physical therapist student, they blend meticulous patient assessments, evidence‑based therapeutic exercise design, and manual therapy with their natural sociability
    to energize group rehab sessions and community health workshops.
  sports: Robert Lemly, an avid outdoorsman, they season their routine with pickup basketball at the Gillette Recreation Center, join the Gillette Softball Hawks for weekend leagues, snowshoe on winter
    trails, follow the Denver Broncos, Colorado Rockies, and the Wyoming Cowboys, and track their strength‑training progress in a fitness journal.
  arts: Robert Lemly, a folk‑rock guitarist, they explore the repertoire of Bob Dylan, The Lumineers, and Mumford & Sons during weekly jam sessions, regularly attend live shows at the Sheridan County Rodeo
    Hall, and find songwriting inspiration in the lyrical storytelling of Bruce Springsteen.
  travel: Robert Lemly, a road‑trip enthusiast, they plan multi‑day hikes along the Powder River Basin and have already trekked Yellowstone and Glacier National Parks, now dreaming of backpacking the Canadian
    Rockies in Banff and later exploring Patagonia’s ancient trails on a budget‑friendly backpacker’s itinerary.
  culinary: Robert Lemly, a competent home cook, they whip up post‑workout protein smoothies with whey, almond milk, and frozen berries, grill freshly caught Bighorn River trout with lemon‑dill sauce, perfect
    a smoky bison burger topped with caramelized onions and smoked gouda, while still indulging in greasy pizza slices on game nights.
  core: Robert Lemly, a highly organized, talkative 20‑year‑old, they merge their love for outdoor adventure, physical‑therapy expertise, and folk‑rock guitar into a vibrant social life, obsessively journal
    workouts, and occasionally forget to pay bills on time.
background:
  cultural: Robert grew up in Gillette, a small western Wyoming town shaped by the oil industry, ranching, and a strong sense of community. His family’s roots trace back to mid‑western settlers who valued
    hard work, self‑reliance, and neighborly support. This upbringing instilled in him an appreciation for the outdoors, a pragmatic approach to life, and a commitment to helping others—values that align
    with the region’s emphasis on community service and collective well‑being.
attributes:
  skills: '[''Patient assessment'', ''Therapeutic exercise prescription'', ''Manual therapy techniques'', ''Gait training'', ''Injury prevention strategies'', ''Documentation and record‑keeping'', ''Interpersonal
    communication'', ''Group class facilitation'', ''Motivational coaching'', ''Basic orthopedic and sports injury rehabilitation'']'
  hobbies: '[''Hiking'', ''Fishing'', ''Snowshoeing'', ''Pickup basketball'', ''Recreational softball'', ''Playing guitar'', ''Participating in a folk‑rock band'', ''Volunteering at community health fairs'',
    ''Hosting game nights'', ''Strength‑training and fitness journaling'']'
  career_goals: Robert aims to earn a Bachelor of Science in Physical Therapy within the next three years and obtain full licensure as a Physical Therapist. He plans to specialize in orthopedic sports medicine
    to serve the active youth and working‑age population in Gillette. Long‑term, he hopes to open a community‑focused outpatient clinic that integrates preventive wellness programs and partners with local
    schools and sports teams.
