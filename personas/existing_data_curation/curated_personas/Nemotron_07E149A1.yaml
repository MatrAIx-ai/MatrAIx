  hobbies: '[''Hiking coastal trails'', ''Yoga and mindfulness meditation'', ''Gardening (vegetable garden)'', ''Reading scientific and literary books'', ''Cooking plant-based meals'', ''Watercolor painting'',
    ''Knitting'', ''Volunteering at community food pantry'']'
  career_goals: Taylor aims to transition from direct counseling to a leadership role where she can shape program design and policy. In the next five years she plans to earn a master's degree in Clinical
    Social Work and obtain licensure as a LCSW, positioning herself to become a clinical supervisor and eventually the director of a community‑based integrated treatment center. She is passionate about
    developing low‑threshold, technology‑enhanced services such as tele‑counseling platforms that reach underserved populations in the Bay Area. Long‑term, she hopes to author research on reducing stigma
    around substance use, secure funding for innovative harm‑reduction pilots, and mentor new counselors, fostering a collaborative, compassionate service culture.
