persona_description: A neuroscientist or a neurologist who specializes in the study of the basal ganglia and its neurotransmitters and receptors. They are likely to have a background in neuroscience, neuroanatomy,
  neurochemistry, and molecular biology. They are interested in the patterns of organization of the basal ganglia, the functions of its neurotransmitters and neuropeptides, and the diseases that affect
  it. They are skilled in analyzing complex information and drawing relevant conclusions. They are also familiar with the working model of basal ganglia circuits and the processes that occur during normal
  movement.
