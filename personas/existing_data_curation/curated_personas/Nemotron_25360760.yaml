  career_goals: Diana aims to formalize her expertise by obtaining a GED and completing a certificate in Office Administration. Her long‑term ambition is to advance to a supervisory role, such as Lead Receptionist
    or Office Manager, where she can design efficient workflows and mentor a team. She also wishes to specialize in a sector like healthcare administration, earning relevant certifications to broaden her
    career options while maintaining the stability and routine she values.
