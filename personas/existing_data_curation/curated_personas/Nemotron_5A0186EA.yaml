personas:
  professional: Madelaine Diaz is a part‑time business consultant who blends their graduate‑level strategic planning and financial analysis skills with a talkative, charismatic style to lead community workshops
    and client meetings, embracing curiosity and practicality while occasionally allowing a relaxed, disorganized approach to slip into project timelines.
  sports: Madelaine Diaz stays fit through weekly salsa socials at the local dance studio, occasional jogs along the Cuyahoga River Trail, and cheering on the Cleveland Guardians and Browns, balancing a
    love for rhythm‑based movement with casual fan loyalty.
  arts: Madelaine Diaz enjoys the vibrant sounds of Celia Cruz and Marc Antonio while reading Malcolm Gladwell and Chimamanda Ngozi Adichie, attends Cleveland Orchestra performances and local theater productions,
    and channels that artistic appreciation into DIY home improvement projects that showcase their creative flair.
  travel: Madelaine Diaz seeks culinary adventure in destinations like Oaxaca, Barcelona, and New Orleans, planning trips that blend food‑focused tours with relaxed beach time, all while budgeting carefully
    through a mix of saved travel funds and occasional side‑gig earnings.
  culinary: Madelaine Diaz loves cooking ropa vieja, lechón asado, and fresh garden salads seasoned with cilantro, cumin, and lime, prides themselves on a home‑grown vegetable garden, and delights in sharing
    these dishes at lively dinner parties that showcase their passion for flavor and community.
  core: Madelaine Diaz is a sociable, talkative 44‑year‑old who balances a flexible consulting career with a love for salsa dancing, vibrant cooking, and community events, even as their easygoing nature
    sometimes leads to a disorganized schedule.
background:
  cultural: Madelaine was raised in a close‑knit Cuban household where music, dance, and food were central to daily life. The Cuban emphasis on hospitality, family solidarity, and resilience has shaped
    her values and her instinct to bring people together. Though she now lives in Westlake, Ohio, she maintains her cultural ties by speaking Spanish at home, celebrating traditions such as Carnaval and
    Día de la Cultura Cubana, and actively participating in the local Cuban‑American community. Her heritage informs her warm, sociable demeanor and her commitment to community service, blending the vibrant
    spirit of Cuba with the Midwestern hospitality of her current environment.
