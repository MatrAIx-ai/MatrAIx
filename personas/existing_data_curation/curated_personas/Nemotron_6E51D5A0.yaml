  hobbies: '[''Visiting art galleries'', ''Painting'', ''Reading contemporary fiction'', ''Gardening'', ''Cooking Southern‑Caribbean dishes'', ''Attending community workshops'', ''Yoga'', ''Listening to
    jazz and R&B music'', ''Walking in local parks'', ''Volunteering at youth art programs'']'
  career_goals: Monica aspires to transition from front‑line cashier work to a role that merges her business expertise with her passion for the arts. She aims to become an assistant manager at a community
    art gallery or launch a small online boutique that showcases works by emerging Black artists in the Hampton Roads area. To prepare, she plans to enroll in a part‑time project‑management certification
    and attend workshops on nonprofit arts administration. Though she values flexibility, she is committed to developing stronger organizational habits to meet deadlines and reduce the stress that often
    accompanies career change.
