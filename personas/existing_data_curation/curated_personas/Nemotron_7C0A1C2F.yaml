    and parks'', ''Reading art history and design books'', ''Attending folk music concerts'', ''Volunteering to teach sewing at a senior center'', ''Gardening'', ''Cooking seasonal meals'']'
  career_goals: Looking ahead, Mary aims to shift from a purely production role toward a mentorship and creative leadership position. She envisions becoming a lead machine operator who guides a small team,
    introduces environmentally friendly upcycling practices, and collaborates with designers on limited-edition fabric collections. Mary also plans to develop a modest side business selling hand-crafted
    quilts and accessories, leveraging digital design tools such as Adobe Illustrator to create her own patterns. By attending local workshops and obtaining a certificate in sustainable textile design,
    she hopes to blend her love of art with her technical expertise while maintaining a flexible schedule that allows more time for personal projects and community involvement.
