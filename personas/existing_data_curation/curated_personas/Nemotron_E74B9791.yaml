  hobbies: '[''Visiting art museums and galleries'', ''Photography'', ''Birdwatching'', ''Gardening'', ''Fishing'', ''Reading historical and art literature'', ''Attending community theater productions'',
    ''Volunteering as museum information guide'', ''Writing blog posts about local culture'', ''Traveling to regional art festivals'']'
  career_goals: Zachary aims to advance into a senior administrative or office‑manager role within the municipal or cultural sector, where he can lead a small team and streamline visitor‑information processes.
    He envisions developing outreach programs that connect residents and tourists with Vero Beach’s art scene, curating exhibit openings, and mentoring younger staff. In the longer term, he hopes to transition
    to a part‑time cultural liaison or gallery coordinator position, allowing him to blend his professional expertise with his passion for the arts. He also contemplates launching a modest blog focused
    on local exhibitions and cultural festivals, establishing himself as a trusted voice in the community’s artistic landscape.
