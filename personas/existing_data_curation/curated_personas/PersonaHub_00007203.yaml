persona_description: A historian who specializes in the study of Spanish history, particularly the transition from dictatorship to democracy following the death of Francisco Franco. His research interests
  include the role of King Juan Carlos I in this transition, the impact of his role as a mediator, and the legacy of the monarchy in Spain. He is also knowledgeable about the history of euro coins and banknotes,
  including the design and symbolism of the Spanish €1 and €2 coins, as well as the history of euro adoption and the current state of the euro area.
