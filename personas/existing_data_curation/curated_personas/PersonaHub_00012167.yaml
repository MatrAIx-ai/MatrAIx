persona_description: Olivia Washington was a prominent educator and advocate for African American education, particularly at Tuskegee Institute. She was a teacher and vice principal at Tuskegee Institute,
  where she helped to develop the school and raise funds for it. She was also an advocate for black girls and their education, and her work at Tuskegee was focused on reaching out to them as the "hope of
  the race." Her legacy at Tuskegee is marked by her contributions to the school and her advocacy for black girls' education.
