personas:
  professional: Deborah Suris, an 82‑year‑old master baker, leverages five decades of hands‑on expertise to run a community‑focused bakery where they blend experimental flavor pairings—such as lavender‑honey
    rye and pumpkin‑spice apple brioche—with meticulous food‑safety practices, mentor a tight‑knit staff, and fiercely pursue the Chautauqua County Baking Competition while preparing a memoir‑style cookbook
    to cement their legacy.
  sports: Deborah Suris, an avid walker who joins the Lake Erie Senior Fitness Club for morning strolls and low‑impact yoga, cheers for the Buffalo Bills on Sundays, and treats the community’s senior bridge
    tournament as a competitive sport, balancing their energetic social streak with a cautious respect for age‑related stamina limits.
  arts: Deborah Suris, a devoted member of the church choir where they harmonize to Handel’s Messiah and contemporary gospel songs, finds solace in quilting patterns inspired by Faith Ringgold’s textile
    art, and discusses Agatha Christie’s Poirot mysteries with the senior book club, allowing these artistic pursuits to stitch together their social and creative identity.
  travel: Deborah Suris, who prefers carefully planned, low‑stress trips with their granddaughter, enjoys weekend drives to Buffalo’s historic streets and seasonal pilgrimages to Niagara Falls, dreams of
    a leisurely cruise to Bermuda, and tentatively considers a once‑in‑a‑lifetime visit to Provence to explore French bakeries, all while balancing a modest travel budget and health considerations.
  culinary: Deborah Suris, whose culinary expertise shines in herb‑infused breads like rosemary focaccia and lavender‑honey loaf and in seasonal pumpkin‑spice apple crumble pies, uses garden‑fresh basil,
    thyme, and sage to flavor savory pastries, and while they skillfully balance flavors, they sometimes forget to turn off the oven, prompting a loyal yet wary staff to keep a watchful eye.
  core: Deborah Suris, an 82‑year‑old baker whose boundless curiosity for flavor is tempered by meticulous, sometimes overly cautious, food‑safety habits, thrives on community engagement, yet battles persistent
    worry and a habit of leaving the bakery door ajar after late evenings.
background:
  cultural: Deborah descends from a line of white, Anglo‑American settlers in western New York, whose ancestors moved from Pennsylvania in the early 1900s. Raised in a rural farming community, she inherited
    a strong work ethic and a deep appreciation for homemade, comfort food. Her cultural identity blends Midwestern practicality with the culinary traditions of European immigrants—particularly German and
    Irish baking customs—which she has preserved and adapted throughout her life in Falconer, NY.
