  career_goals: Even at 82, Deborah aims to cement her bakery’s legacy by authoring a memoir‑style cookbook that preserves family recipes and the stories behind them. She is determined to win the Chautauqua
    County Baking Competition again, using the event to showcase her new techniques and stay competitively relevant. Additionally, she plans to train her granddaughter to take over the shop, ensuring a
    smooth succession, and to expand weekly community baking workshops that foster local talent and keep her socially engaged.
