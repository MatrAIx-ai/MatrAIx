  career_goals: Misun aims to deepen her strategic retail expertise by completing a bachelor’s degree in Business Administration within the next three years. She aspires to advance to a district manager
    role, overseeing multiple locations and implementing cohesive branding experiences that blend artistic concepts with technology, such as augmented‑reality product showcases. Long‑term, she envisions
    launching her own boutique that curates emerging designers and offers immersive, culturally informed shopping events, while mentoring women and minority employees to foster inclusive leadership pipelines.
