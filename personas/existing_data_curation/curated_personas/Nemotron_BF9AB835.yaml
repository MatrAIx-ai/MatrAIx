personas:
  professional: Misun Choi, a retail operations leader with a decade of front‑line management experience, combines data‑driven inventory control and visual merchandising expertise with an imaginative flair
    for immersive store concepts, using their calm resilience and collaborative yet assertive style to nurture high‑performing teams and drive sales growth.
  sports: Misun Choi embraces a versatile fitness routine that blends early‑morning yoga, weekend trail runs in Red Rock Canyon, and occasional pickup basketball games, while cheering for the Las Vegas
    Raiders, the Golden Knights, and the Aces, and belongs to a local cycling club that meets every Thursday.
  arts: Misun Choi actively cultivates artistic inspiration by painting bold acrylic cityscapes reminiscent of Edward Hopper, photographing urban graffiti like the works of Banksy, attending live shows
    featuring Tame Impala and local theater productions of August Wilson, and drawing creative cues from the abstract installations of Yayoi Kusama.
  travel: Misun Choi plans trips with a blend of meticulous itineraries and spontaneous side‑quests, favoring culturally rich destinations such as Tokyo, Barcelona, and Marrakech, while dreaming of a future
    immersive retreat in Iceland’s volcanic landscapes, all balanced against a busy retail schedule and a modest family budget.
  culinary: Misun Choi enjoys a palate that seeks novelty, regularly sampling dishes like ramen with miso‑butter broth, Mexican‑style elote, and Ethiopian injera with lentil stew, while honing a modest
    home‑cooking skill set that gravitates toward quick, vibrant stir‑fries and experimental plating inspired by contemporary food‑truck menus.
  core: Misun Choi is a 42‑year‑old retail strategist who fuses artistic imagination with data‑driven management, balances disciplined finances with spontaneous culinary and travel adventures, and remains
    unusually calm and resilient while juggling creative hobbies, team leadership, and personal growth.
background:
  cultural: Misun is a second‑generation Korean‑American who grew up in a bilingual household that honored both Korean traditions and the broader American culture of Nevada. She celebrates holidays such
    as Chuseok and Seollal with family gatherings and traditional meals, while also participating in local Las Vegas events that reflect the city’s eclectic spirit. Her upbringing emphasized respect for
    community, education, and perseverance, values that inform her collaborative leadership style. Fluent in both Korean and English, she maintains close ties to the Korean diaspora community, engaging
    in cultural workshops and language exchange groups, and brings this bicultural perspective to her professional and creative endeavors.
