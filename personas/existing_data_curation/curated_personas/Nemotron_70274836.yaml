  hobbies: '[''Gardening'', ''Baking'', ''Knitting and crocheting'', ''Reading practical guides'', ''Listening to classic country and folk music'', ''Church attendance'', ''Community volunteering'']'
  career_goals: Kellie’s primary ambition is to secure a stable part‑time position that leverages her organizational strengths, such as a role in a local retail store, postal service, or community center.
    She plans to obtain her GED within the next year and pursue a certification in caregiving or home health assistance, which would enable her to transition into formal employment while continuing to support
    her family. In the longer term, she hopes to become a reliable community resource, perhaps leading a neighborhood volunteer group or managing a small home‑based business like a baked‑goods stall at
    the local farmers’ market.
