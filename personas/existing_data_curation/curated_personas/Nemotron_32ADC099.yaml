    in Caguas'']'
  career_goals: Beatriz envisions a future where she combines her love for communication, her bilingual abilities, and her passion for mental‑wellness advocacy. She aims to study communication and psychology
    at university, with the goal of becoming a youth mental‑health outreach coordinator or a bilingual journalist who highlights social issues affecting Puerto Rican teens. Simultaneously, she plans to
    grow her online presence as a responsible content creator, using platforms like TikTok to share coping strategies, promote cultural pride, and inspire peers to pursue their ambitions. Her competitive
    spirit drives her to seek leadership roles in community organizations, where she hopes to influence positive change while staying grounded in practical, results‑oriented projects.
