  career_goals: William aims to obtain his Commercial Driver’s License within the next year and secure a full‑time position with a reputable logistics firm, using the role as a stepping stone toward becoming
    an independent owner‑operator. He envisions eventually owning a small fleet of trucks that serve local businesses while also offering flexible, on‑demand delivery services. Parallel to his transportation
    ambitions, William hopes to earn his GED and enroll in community‑college courses in logistics management, all the while cultivating his artistic side by documenting Brooklyn’s street art through photography.
    His ultimate ambition is to blend his two passions—transport and visual culture—by launching a mobile gallery or pop‑up exhibit that travels with his delivery routes, showcasing emerging artists from
    his community.
