personas:
  professional: Tammy Gregg is a high‑school senior whose debate‑honed analytical flair, varsity soccer teamwork, and beginner‑level Python coding converge into a practical, curiosity‑driven problem‑solving
    style that already looks toward biomedical engineering projects.
  sports: Tammy Gregg thrives on the competitive rhythm of varsity soccer, training three evenings a week with the Edgewood High Tigers and cheering the Chicago Fire FC and Chicago Bulls as her favorite
    professional franchises, while also participating in the local Youth Soccer Association’s summer league to sharpen tactical play.
  arts: Tammy Gregg channels creativity into photography, emulating the candid style of Annie Leibovitz and the dynamic video cuts of Peter McKinnon, curates Instagram reels set to Billie Eilish tracks,
    and unwinds by devouring Agatha Christie mystery novels that inspire narrative twists in her own short films.
  travel: Tammy Gregg balances a love for weekend road trips to the Grand Canyon and family beach outings in San Diego with a bucket‑list yearning to explore Tokyo’s tech districts and Paris’s art museums,
    preferring spontaneous itineraries that leave room for impromptu photo‑ops despite a tight school schedule.
  culinary: Tammy Gregg mixes a modest cooking repertoire of garlic‑butter shrimp pasta, spicy ramen bowls, and avocado toast topped with crumbled feta, favoring fresh basil, jalapeños, and extra‑virgin
    olive oil, yet often orders pizza with extra pepperoni and a side of garlic knots when study groups run late.
  core: Tammy Gregg is a competitive, worry‑prone teen who channels curiosity into organized projects, sometimes over‑commits to activities, and balances pragmatic goals with bursts of creative impulse.
background:
  cultural: Tammy grew up in Lexington, a historic town in Middlesex County, Massachusetts, within a middle‑class, predominantly white community. Her family celebrates typical New England holidays and traditions,
    such as Thanksgiving gatherings, Fourth of July parades, and winter holiday festivities. The town's emphasis on education and civic engagement has shaped her involvement in school clubs, community service,
    and a strong work ethic. While culturally rooted in American suburban life, Tammy also enjoys exploring diverse perspectives through her school’s multicultural events and a personal interest in global
    science innovations.
