  career_goals: Tammy aims to graduate high school with a strong academic record and earn a scholarship to study biomedical engineering or a health‑related field. She wants a career that blends her curiosity
    about how things work with tangible outcomes—such as designing medical devices or working in a research lab. In the short term, she plans to complete a certification in computer programming, participate
    in science competitions, and secure an internship at a local hospital or tech startup. Long‑term, she aspires to become a leader who can manage interdisciplinary teams, develop innovative solutions,
    and contribute to community health initiatives.
