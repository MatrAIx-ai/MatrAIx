persona_description: A construction professional with experience in managing and overseeing large-scale repair and construction projects, particularly in nature conservation and environmental restoration.
  They have a deep understanding of natural habitat preservation and have a passion for sustainable practices. They are skilled in using excavators and other heavy equipment to rebuild dike structures while
  maintaining natural landscapes, and have experience in constructing wheelchair accessible trails. They are knowledgeable about hydrology and the importance of maintaining a hydrologic connection between
  smaller ponds and lakes to support fish spawning and protect smaller fish and tadpoles.
