personas:
  professional: Gary Kozak is a seasoned commercial driver with a CDL who excels at precise route planning, vehicle maintenance, and client negotiation, using his instinct for order to consistently meet
    delivery deadlines while exploring emerging electric truck technologies.
  sports: Gary Kozak is a dedicated member of the local Atlantic Coast Fishing Club, regularly targeting striped bass off the New Jersey shoreline, follows the New York Giants NFL team, and joins a seasonal
    hiking group that explores the Pine Barrens' trail network each autumn.
  arts: Gary Kozak finds creative fulfillment in constructing and hand‑painting 1:64 scale model trucks, often citing the work of model master Jim Stillwell and listening to classic rock legends like AC DC
    and The Who while polishing details, and occasionally attends the annual Model Expo in Pennsylvania.
  travel: Gary Kozak prefers road‑trip style travel with meticulously planned itineraries, having road‑tripped to Seattle for the Electric Vehicle Expo, fished the Great Lakes in Canada, and now dreams
    of an extended Icelandic adventure to chase remote salmon runs and scenic coastal routes.
  culinary: Gary Kozak enjoys simple, protein‑rich meals such as grilled salmon caught on their own Atlantic outings, paired with roasted sweet potatoes and a side of garlic‑infused quinoa, and cooks at
    a moderate skill level using a portable camp stove during overnight trips.
  core: Gary Kozak is a methodical trucker who balances a love of solitary model‑building and fishing with a compassionate drive to help others, all while meticulously planning every route, budget, and
    health routine.
background:
  cultural: Gary grew up in Egg Harbor Township, a suburban community in Atlantic County, New Jersey. His family is of European American descent, with roots in the Mid-Atlantic region. The township's blend
    of residential neighborhoods and proximity to the coast shaped his appreciation for both community involvement and outdoor recreation. Local values of hard work, reliability, and neighborly cooperation
    influence his practical and compassionate outlook. While he identifies with mainstream American culture, he also respects the regional traditions of the Jersey Shore, such as seasonal festivals and
    support for local businesses.
attributes:
  skills: '[''Commercial Driving (CDL)'', ''Route Planning and Logistics Software'', ''Vehicle Maintenance and Mechanical Troubleshooting'', ''Safety Compliance and DOT Regulations'', ''Cargo Securement'',
    ''Time Management'', ''Customer Service'', ''Sales Negotiation'', ''Inventory Tracking'', ''Record Keeping'']'
  hobbies: '[''Scale Model Truck Building'', ''Logistics and Automotive Podcasts'', ''Fishing'', ''Hiking in Pine Barrens'', ''Chess'', ''Volunteer Food Pantry Coordination'']'
  career_goals: Gary aims to advance from driver to logistics coordinator within the next three years, leveraging his practical curiosity to adopt emerging transportation technologies such as electric trucks
    and telematics. He plans to obtain his Certified Transportation Professional (CTP) credential and eventually become a manager overseeing a fleet of drivers, where he can implement efficiency improvements
    and foster a collaborative team culture. In the long term, he aspires to launch his own small trucking company focused on reliable regional deliveries and environmentally conscious practices, while
    maintaining a stable work-life balance that allows time for his personal interests.
