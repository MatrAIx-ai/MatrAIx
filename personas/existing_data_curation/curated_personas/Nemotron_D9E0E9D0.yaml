  hobbies: '[''Hiking'', ''Landscape Photography'', ''Acoustic Guitar'', ''Jam Sessions'', ''Vietnamese Cooking'', ''Fusion Recipe Experimentation'', ''Reading Speculative Fiction'', ''Philosophy Study'',
    ''Community Volunteering'', ''Cultural Festival Organization'']'
  career_goals: Looking ahead, Viet aims to move into academic leadership, aspiring to become a department chair or program director within the next five years. He wants to champion flexible, technology‑enhanced
    learning pathways that accommodate spontaneous teaching moments while establishing clear structures to support faculty and students. His ambition includes creating an interdisciplinary minor that weaves
    Southeast Asian studies with sustainability, securing external grants for community outreach, and publishing research on the impact of agile instructional practices. He also seeks to mentor junior faculty
    in balancing creativity with effective time‑management.
