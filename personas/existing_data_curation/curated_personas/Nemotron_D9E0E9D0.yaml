personas:
  professional: Viet Peou, a 36-year-old postsecondary instructor, integrates curiosity‑driven curriculum design with rigorous accreditation standards, excelling at blending emerging educational technologies
    and active‑learning strategies while mentoring students and sharpening organizational skills to prepare for future departmental leadership.
  sports: Viet Peou, an avid hiker of the Wasatch Mountains and member of the local Wasatch Trail Club, tracks the Utah Jazz for casual fandom, supplements cardio with snowshoeing in winter and occasional
    mountain biking, favoring spontaneous outdoor workouts over structured gym sessions.
  arts: Viet Peou, an enthusiastic acoustic‑guitar player who joins impromptu jam sessions echoing the fingerpicking of John Mayer and the lyrical intimacy of Joni Mitchell, captures Wasatch vistas through
    landscape photography, and draws creative fuel from speculative fiction authors like Margaret Atwood and Ted Chiang as well as philosophers such as Nietzsche and Foucault.
  travel: Viet Peou, who mixes spontaneous weekend road trips to Yellowstone with meticulously planned cultural trips abroad—having explored the rice terraces of Bali and the historic streets of Kyoto—now
    dreams of trekking Chilean Patagonia and bathing in Iceland’s geothermal pools, balancing budget‑conscious itineraries with occasional splurges on photography workshops.
  culinary: Viet Peou, a dedicated home cook, perfects aromatic bowls of pho and hearty bun bo hue while experimenting with lemongrass‑infused quinoa salads and sriracha‑glazed tacos, delighting in fresh
    ginger, cilantro, lime, and a sprinkle of toasted sesame seeds.
  core: Viet Peou thrives as a creatively restless educator who juggles spontaneous teaching moments, weekend hikes, and culinary experiments, yet habitually battles a procrastination streak that keeps
    their organizational skills on a treadmill.
background:
  cultural: Viet Michael Peou grew up in a Vietnamese‑American household in Utah, the son of parents who immigrated from Vietnam in the early 1990s. Fluent in both Vietnamese and English, he was raised
    with values that emphasize respect for elders, family cohesion, and a strong reverence for education. Living in Salt Lake City, he blends these traditions with the independent, outdoors‑oriented culture
    of the American West. He actively participates in the local Vietnamese diaspora, celebrating Tet, supporting cultural preservation, and serving as a bridge between his community and the university.
    This bicultural perspective informs his inclusive teaching style, encouraging students to explore diverse viewpoints while honoring their own cultural roots.
attributes:
  skills: '[''Curriculum Design'', ''Educational Technology Integration'', ''Active Learning Pedagogy'', ''Intercultural Communication'', ''Student Mentoring'', ''Collaborative Research'', ''Public Speaking'',
