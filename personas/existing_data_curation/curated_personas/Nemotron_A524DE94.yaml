    "BLS/CPR certification", "Attention to detail and critical thinking"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and drawing", "Playing chess", "Recreational basketball", "Reading non‑fiction (medical innovation, philosophy, art)", "Cooking experimental
    recipes", "Craft beer tastings with friends", "Weekend bike rides along the Raritan River", "Mindfulness meditation", "Collecting and organizing vintage vinyl records"]'
  career_goals: Nicholas aims to advance his nursing career by first completing an associate degree in nursing within the next three years, positioning himself to become a registered nurse. He plans to
    specialize in geriatric care, later pursuing a bachelor's degree in nursing to broaden his clinical expertise. In the longer term, he aspires to take on leadership roles such as charge nurse or unit
    manager, possibly overseeing a medical‑surgical or oncology unit. He is also interested in integrating his love for art and health by developing a patient‑centered art‑therapy program within his facility.
    To support these ambitions, he intends to obtain advanced certifications in wound care and case management, eventually moving into a clinical case manager or health educator position.
