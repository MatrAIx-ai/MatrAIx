personas:
  professional: Iliet Soriano, a veteran community liaison and weekend pop‑up caterer, balances curiosity with practicality by merging meticulous budgeting, bilingual communication, and a talkative, adaptable
    organizing style to turn neighborhood events into collaborative showcases of shared heritage.
  sports: Iliet Soriano stays active with sunrise walks on the nearby Elysian Park trail, supports the Los Angeles Dodgers in spring and the LA Galaxy in fall, and occasionally joins the Eastside Women’s
    Walking Club for group fitness while dancing in a folklorico troupe that doubles as a low‑impact cardio session.
  arts: Iliet Soriano immerses herself in regional music by listening to classics from Juan Gabriel and Los Tigres del Norte, enjoys binge‑watching telenovelas like “María la del Barrio,” and knits while
    humming the melodies of contemporary folk singer Lila Downs, weaving these cultural threads into her storytelling gatherings.
  travel: Iliet Soriano prefers purposeful weekend getaways, having explored Oaxaca’s vibrant markets and the coastal charm of Ensenada, while dreaming of a pilgrimage to Seville’s Semana Santa festivities,
    balancing travel plans around budgeting constraints and family commitments.
  culinary: Iliet Soriano, an adept home chef, delights in mastering mole poblano, chiles en nogada, and slow‑cooked carnitas, often adding fresh cilantro, roasted tomatillos, and hand‑ground corn masa
    to elevate family recipes, while hosting intimate pop‑up tastings that showcase the depth of her flavor experiments.
  core: Iliet Soriano blends talkative hospitality with pragmatic budgeting, turning community kitchens into cultural classrooms while occasionally forgetting to water her garden during busy banquet prep.
background:
  cultural: Iliet is a first‑generation Mexican American who was raised in a close‑knit household in East Los Angeles. Her upbringing was steeped in Mexican traditions—Catholic faith, deep respect for family,
    and vibrant celebrations such as Día de los Muertos, Cinco de Mayo, and Quinceañeras. Spanish is her primary language, and she navigates a bilingual world with functional English. Core values of respeto,
    hospitalidad, and comunidad shape her daily interactions, and she often serves as a cultural bridge, preserving recipes, language, and customs while embracing the multicultural tapestry of Los Angeles.
