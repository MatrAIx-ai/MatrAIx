    preservation'', ''Leadership in community volunteer groups'']'
  hobbies: '[''Cooking and recipe experimentation'', ''Folkloric dance'', ''Church social events'', ''Lotería card games'', ''Gardening'', ''Knitting'', ''Listening to Mexican regional music'', ''Watching
    telenovelas'', ''Volunteering at senior center'', ''Family storytelling'']'
  career_goals: Iliet aims to turn her culinary passion into a small weekend pop‑up catering venture that showcases authentic Mexican home cooking, while also offering a weekly cooking class for seniors
    and recent immigrants to share nutritious recipes and cultural knowledge. She aspires to become a trusted community liaison, connecting neighbors with local health and social services, and to mentor
    younger women in navigating resources and building confidence. Improving her English proficiency to participate more fully in local advocacy and volunteer leadership is also a key personal ambition.
