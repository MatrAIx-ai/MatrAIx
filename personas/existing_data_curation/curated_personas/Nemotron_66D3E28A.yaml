  career_goals: Approaching retirement, Janetlee aims to shift from full‑time labor to a part‑time safety supervisor role, leveraging her OSHA training to oversee job‑site safety for a local contractor.
    She plans to earn a state‑approved construction‑management certificate, which will enable her to start a modest handyman service focused on senior homeowners in Salem. She is also interested in integrating
    more sustainable practices—such as reclaimed‑wood framing and low‑VOC finishes—into her work. Ultimately, she hopes to pass her practical knowledge to her children and grandchildren, ensuring a lasting
    family legacy while securing a comfortable retirement.
