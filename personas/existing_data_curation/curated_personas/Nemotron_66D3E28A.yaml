personas:
  professional: Janetlee Smith builds on three decades of hands‑on construction experience to transition into a part‑time safety supervisor role, blending their practical problem‑solving, OSHA expertise,
    and mentorship style while championing sustainable, low‑VOC materials for senior homeowners in Salem.
  sports: Janetlee Smith competes in a weekly bowling league at the Salem Community Center, avidly follows the Chicago Cubs and the Chicago Bears, and joins a local bridge club that meets every Thursday,
    blending low‑impact competition with social camaraderie as they enjoy both friendly rivalry and relaxed teamwork.
  arts: Janetlee Smith immerses themselves in classic rock icons like The Rolling Stones, The Who, and Janis Joplin while quilting intricate patchwork gifts inspired by historical‑fiction novels such as
    Ken Follett’s 'Pillars of the Earth', and they occasionally volunteer to stitch costumes for a community theater production.
  travel: Janetlee Smith prefers road trips that combine heritage and relaxation, having driven the historic Route 66 to Chicago’s Museum of Science and Industry, visited Madison’s farmers’ markets, and
    dreaming of a leisurely week in Charleston, South Carolina to explore its antebellum architecture as they savor the mix of history and comfort.
  culinary: Janetlee Smith delights in cooking Midwestern comfort dishes like chicken pot pie, beef stew with root vegetables, and homemade cornbread, often seasoning with fresh garden thyme, rosemary,
    and sweet corn harvested from their own backyard.
  core: Janetlee Smith is a pragmatic, curiosity‑driven retiree who balances safety supervision, sustainable DIY projects, and classic rock while occasionally letting a disorganized schedule slip into spontaneous
    creativity, as they cherish both routine and surprise.
background:
  cultural: Janetlee grew up in a modest, white, Midwestern family with German‑Scandinavian roots in Marion County, Illinois. Raised in the Methodist tradition, she values community service, church involvement,
    and family ties. The region’s blend of agriculture and manufacturing fostered a strong work ethic and a practical, self‑reliant mindset. While the social changes of the 1960s and 1970s exposed her to
    new ideas, she retained a balanced outlook that blends curiosity with a respect for established methods. Local customs—such as neighborhood fairs, barn‑raising spirit, and a focus on honest, straightforward
    communication—continue to shape her identity and daily interactions.
