  hobbies: '[''Visiting Art Galleries and Museums'', ''Digital Photography'', ''Watercolor Painting'', ''Cooking Bengali Cuisine'', ''Yoga and Meditation'', ''Reading Contemporary Fiction'', ''Reading Business
    and Psychology Non‑Fiction'', ''Traveling to Historic Sites (especially in South Asia)'', ''Attending Live Music and Cultural Performances'', ''Participating in Community Book Clubs and Cultural Festivals'']'
  career_goals: Iffat aims to transition into a senior strategic leadership role, such as Director of Business Analytics or Vice President of Strategy, where she can shape organization‑wide data‑driven
    decision making. She plans to pursue an executive MBA to deepen her leadership toolkit and to acquire certifications in change management. Long‑term, she envisions launching a boutique consulting practice
    that helps cultural institutions and arts nonprofits adopt sustainable business models, blending her analytical expertise with her passion for the arts. She also strives to become a mentor for women
    entering analytics and to champion workplace initiatives that integrate art, creativity, and employee well‑being.
