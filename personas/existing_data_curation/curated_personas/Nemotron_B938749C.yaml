personas:
  professional: Myrna Chacon, a retired community mentor, leverages her hands‑on expertise in gardening, cooking, and knitting to lead volunteer workshops at the local senior center, using her love of routine
    to structure sessions while allowing the flexibility to adapt to participants’ spontaneous needs.
  sports: Myrna Chacon enjoys daily neighborhood walks, participates in the senior walking club that meets at the community park, follows the local minor‑league baseball team, the El Paso Chihuahuas, and
    occasionally joins the seasonal shuffleboard league at the senior center.
  arts: Myrna Chacon finds joy in listening to classic folk songs by singer Elena Rivera, watching telenovela star Sofia Ramos on evening television, and creating knitted tapestries inspired by traditional
    folk‑art patterns, which she displays at church events.
  travel: Myrna Chacon prefers low‑key road trips, having explored the historic missions of San Antonio, the desert landscape of Santa Fe, and the Grand Canyon, while dreaming of a leisurely cruise along
    the Gulf Coast to experience seaside sunsets.
  culinary: Myrna Chacon excels at preparing comfort dishes such as roasted pepper and tomato stew, herb‑infused chicken broth, and fresh salsa with cilantro and lime, using garden‑grown ingredients and
    adjusting spice levels to accommodate her health needs, while delighting friends with her signature hand‑knitted napkin rings.
  core: Myrna Chacon blends routine‑driven hospitality with spontaneous kindness, tending her garden, knitting gifts, and mentoring youth, all while navigating age‑related health quirks and a modest, well‑tracked
    budget.
background:
  cultural: Myrna was born to Mexican parents who immigrated to the United States in the 1940s. Growing up in a close‑knit Mexican‑American community in El Paso, she was raised with Spanish as her first
    language and steeped in Catholic traditions, including celebrations of Día de los Muertos, Las Posadas, and quinceañeras. Her upbringing emphasized family loyalty, respect for elders, and practical
    skills that sustain daily life. These cultural values continue to shape her routines, her love for sharing traditional recipes, and her active participation in local cultural events that preserve her
    heritage.
