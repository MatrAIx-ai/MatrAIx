    ''Doing crossword puzzles'']'
  career_goals: Although retired, Myrna aims to stay purpose‑driven by sharing her practical knowledge with younger generations. She plans to host informal cooking workshops at the community center, mentor
    her grandchildren in family recipes, and help organize cultural events that celebrate Mexican heritage in El Paso. She also hopes to become more comfortable using a smartphone to keep in touch with
    family, and to document her life story in a simple memoir for future relatives.
