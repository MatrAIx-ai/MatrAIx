persona_description: Susan M. Tellem, RN, BSM, is a passionate advocate for the protection and conservation of turtles and tortoises. She has a deep understanding of the importance of respecting wildlife
  and the environment, and she is dedicated to spreading awareness about the issues facing these creatures. Susan is a strong believer in the power of education and has a passion for sharing her knowledge
  with others. She is also an experienced advocate and has worked with organizations such as the American Tortoise Rescue, where she has played a crucial role in the rescue and rehabilitation of turtles
  and tortoises. Her goal is to inspire others to take action and make a positive impact on the environment.
