persona_description: A researcher or scientist who is interested in the study of cancer and its treatment, particularly in the field of photodynamic therapy (PDT). They are curious about the potential of
  PDT to target and eliminate tumor-associated lymphatic vessels and tumor cells in metastatic transit. They are likely to be familiar with the concept of PDT, its principles, and its use in treating cancer.
  They are interested in the application of PDT in the treatment of cancer and are looking for new and exciting findings in the field. They are also interested in the potential of PDT to replace or complement
  current surgical techniques in the treatment of cancer.
