  hobbies: '[''Hiking in the Smoky Mountains'', ''Playing acoustic guitar'', ''Reading historical fiction'', ''Gardening'', ''Cooking Southern cuisine'', ''Volunteering at the local food pantry'', ''Attending
    music festivals'', ''Genealogy research'', ''Woodworking'', ''Community theater involvement'']'
  career_goals: Dante aims to broaden his church’s digital presence, creating a robust online platform for worship and discipleship that reaches younger demographics. He plans to develop a regional mental‑health
    support network in partnership with local health providers, integrating faith‑based counseling into community services. Over the next five years, he hopes to mentor emerging clergy, lead a multi‑church
    collaborative for youth mentorship, and pursue a doctorate in theological ethics to deepen his scholarly contributions. Ultimately, Dante envisions authoring a book on resilience through faith and stepping
    into a regional leadership role, such as a dean or bishop, to influence broader church initiatives on social justice and interfaith cooperation.
