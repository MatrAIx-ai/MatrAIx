  career_goals: Samuel aims to advance into an Operations Manager role within the next three years, focusing on integrating digital tools and sustainable practices into business workflows. He plans to earn
    a Six Sigma Black Belt and pursue a part‑time MBA to deepen his strategic expertise. Long‑term, he envisions a senior leadership position where he can shape organizational culture, champion flexible
    work arrangements, and drive continuous improvement initiatives that balance innovation with proven methods.
