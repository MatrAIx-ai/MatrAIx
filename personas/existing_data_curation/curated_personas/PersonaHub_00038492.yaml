persona_description: A scientist who specializes in planetary science, particularly the study of Jupiter and its moons. This persona is interested in the extreme conditions experienced by the spacecraft
  Juno as it approaches Jupiter, the custom radiation vault designed to protect it from the deadly radiation storms, and the potential consequences of the spacecraft's radiation exposure, including memory
  failure, computer errors, and potential hardware problems that could jeopardize scientific research and cause Juno to spiral out of control. This persona is also interested in the history and development
  of Juno, the spacecraft that was built to withstand the deadly radiation storms of Jupiter.
