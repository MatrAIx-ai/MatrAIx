personas:
  professional: An imaginative toddler architect, Tyrell Joyner assembles block towers with meticulous organization yet playful flexibility, channeling their curious appreciation for colors and shapes into
    every creation they build.
  sports: An energetic toddler athlete, Tyrell Joyner delights in community soccer drills at the Kids Soccer Club, loves swinging on the playground jungle gym, and they cheer enthusiastically for the local
    baseball team, the River City Raptors, during family outings.
  arts: A budding aficionado of colors, Tyrell Joyner spends afternoons finger‑painting inspired by Henri Matisse’s bold hues, hums along to Sesame Street melodies, and they often sway to the soothing cello
    of Yo‑Yo Ma.
  travel: An adventurous little explorer, Tyrell Joyner has visited the nearby zoo, splashed in the splash pads at the city aquarium, spent a sunny weekend at the family beach cottage, and they dream of
    future trips to the vibrant streets of Barcelona and the serene cliffs of Maui.
  culinary: A selective tiny gourmand, Tyrell Joyner loves mashed sweet potatoes, avocado mash, and cheddar cheese sticks, often requesting the buttery crunch of a fresh banana, yet they stubbornly refuse
    broccoli on grumpy mornings.
  core: Tyrell Joyner is a curious two‑year‑old who balances meticulous block building with spontaneous giggles, hoards pennies like treasure, and they occasionally throw temper tantrums over broccoli.
background:
  cultural: Tyrell is an African‑American child raised in Valdosta, Georgia, within a family that embraces Southern Black cultural traditions. His upbringing includes participation in church gatherings
    where gospel music and community storytelling are prominent, family meals featuring Southern soul food, and celebrations that honor African‑American heritage. These cultural influences shape his early
    appreciation for rhythm, art, and communal bonds, providing a rich backdrop for his developing identity.
