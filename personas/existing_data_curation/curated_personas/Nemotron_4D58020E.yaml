  career_goals: Although retired from formal employment, Lang aims to leave a lasting cultural imprint on his community. He plans to publish a memoir that interweaves his personal narratives with Pittsburgh’s
    industrial history, and to curate a traveling exhibit of his woodworking pieces accompanied by photographs of cityscapes. He also aspires to mentor younger artisans through the local maker space, and
    to expand his volunteer work with the regional historical society, ensuring that the stories of his generation are preserved for future scholars.
