  hobbies: '[''Crocheting'', ''Gardening'', ''Reading Christian literature'', ''Church choir participation'', ''Community volunteering'', ''Journaling'', ''Mindfulness walking'', ''Cooking Southern comfort
    food'']'
  career_goals: Alize aims to deepen her credentials by earning a Child Development Associate (CDA) credential and eventually completing a bachelor's degree in Early Childhood Education. She envisions progressing
    to a lead teacher role within her current daycare, and ultimately becoming a center director where she can design structured, nurturing programs that reflect her practical, routine‑oriented philosophy.
    Long‑term, she hopes to open a community‑focused childcare center in Martinsville that offers affordable, high‑quality care while providing mentorship opportunities for other black women entering the
    field.
