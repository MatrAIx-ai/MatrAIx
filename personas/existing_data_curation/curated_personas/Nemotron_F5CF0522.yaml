personas:
  professional: Natanya Sevilla is a 33‑year‑old freelance visual storyteller who runs a budding creative studio, turning abstract concepts into branding, illustration, and community‑focused art workshops
    for Milwaukee nonprofits, using Adobe Creative Suite, Procreate, and magnetic public‑speaking skills while their spontaneous, competitive nature drives bold project launches despite occasional disorganization.
  sports: Natanya Sevilla follows the Milwaukee Bucks and Brewers with zeal, jogs the Lakefront Trail alongside the Lakefront Trail Runners club during the summer, joins a community yoga class for flexibility,
    and prefers cardio activities that blend movement with the city’s lakeside scenery.
  arts: Natanya Sevilla immerses themselves in the arts, drawing inspiration from muralists like Banksy and Kehinde Wiley, listening to jazz legends such as Esperanza Spalding and Kamasi Washington at local
    nights, quoting poet Ocean Vuong in their blog, and attending performances by contemporary dancer Akram Khan.
  travel: Natanya Sevilla prefers spontaneous weekend road trips, having recently explored the mural district of Mexico City, the jazz heritage of New Orleans, and the coastal serenity of Door County, while
    dreaming of a cultural immersion in Kyoto’s art temples and a long‑haul train adventure across the Swiss Alps.
  culinary: Natanya Sevilla experiments in the kitchen, reinventing classic collard greens with a miso‑ginger glaze, crafting sweet‑potato gnocchi infused with rosemary, and pairing smoked paprika‑spiced
    shrimp with creamy corn chowder, showcasing a skill level that mixes home‑cooking confidence with occasional daring plating experiments.
  core: Natanya Sevilla’s imagination transforms any blank wall into a vivid mural, yet they habitually lose track of deadlines, rely on coffee‑fuelled late nights, and break into spontaneous salsa steps
    whenever creative blocks arise.
background:
  cultural: Natanya is a Black woman raised in Milwaukee's vibrant African‑American community. Her upbringing was shaped by family gatherings, church traditions, and the city's rich history of Black activism
    and artistic expression. She draws inspiration from the Midwest's blend of Southern roots and urban culture, incorporating elements of jazz, blues, and African diaspora aesthetics into her work. The
    local Black arts scene, including the Milwaukee Black Arts Council, has provided mentorship and platforms for her creative voice. Her cultural heritage informs her storytelling, color palettes, and
    commitment to uplifting fellow Black creators through community‑focused initiatives.
attributes:
  skills: '[''Digital illustration'', ''Photography'', ''Graphic design (Adobe Photoshop, Illustrator, Procreate)'', ''Creative writing (speculative fiction, poetry)'', ''Public speaking and workshop facilitation'',
    ''Social media strategy'', ''Community event planning'', ''Cultural advocacy and representation'']'
  hobbies: '[''Painting murals'', ''Photography'', ''Reading speculative fiction'', ''Writing poetry and art blog posts'', ''Attending art festivals and jazz events'', ''Cooking experimental soul food'',
    ''Salsa and African dance classes'', ''Lake Michigan walking/hiking'', ''Participating in community art workshops'']'
  career_goals: Natanya aims to launch a freelance creative studio that offers branding, illustration, and workshop services for local nonprofits and emerging artists. She envisions establishing a community‑driven
    art space in Milwaukee that provides mentorship, exhibition opportunities, and art‑therapy programs for Black youth. To support these goals, she plans to complete a BFA in Visual Arts and develop a
    curriculum that integrates her love of abstract concepts with practical artistic skills. Ultimately, she aspires to become a recognized cultural leader who bridges imagination with tangible community
    impact.
