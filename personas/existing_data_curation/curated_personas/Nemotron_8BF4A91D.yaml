personas:
  professional: Priyesh Shrestha, a 77‑year‑old master painter, blends five decades of surface‑prep mastery, precise color‑matching, and OSHA‑compliant safety practices with a patient, mentorship‑focused
    approach, turning his curiosity for new finishes into reliable, high‑quality projects while carefully guiding apprentices.
  sports: Priyesh Shrestha enjoys gentle lakefront walks, occasional ice‑skating at the community rink during Chicago winters, follows the Chicago Cubs faithfully, and participates in a local senior bowling
    league that meets at the historic Logan Square Lanes.
  arts: Priyesh Shrestha expresses his creativity through watercolor sketches of Chicago's skyline, volunteers to paint community murals, and finds solace listening to classic folk singers like Narayan
    Gopal, Bollywood legends such as Lata Mangeshkar, and modern composer A. R. Rahman while mixing paint pigments.
  travel: Priyesh Shrestha prefers organized, low‑stress travel, frequenting nearby destinations like Niagara Falls and the historic temples of the Himalayan region tied to his family's origins, while dreaming
    of a modest pilgrimage to that sacred valley before fully retiring.
  culinary: Priyesh Shrestha, an adept home cook, regularly prepares dal bhat, steamed momo, and spiced ginger‑cardamom tea using cumin, coriander, and turmeric, while also savoring Chicago deep‑dish pizza
    on occasional outings, balancing traditional flavors with local comfort foods.
  core: Priyesh Shrestha is a meticulous craftsman and garden enthusiast who channels his lifelong devotion to painting into community murals, yet habitually over‑worries about every detail, finding calm
    only while stirring simmering dal bhat to classic folk tunes.
background:
  cultural: Priyesh was born to Nepali parents who immigrated to the United States in the early 1960s, and he grew up in the Chicago area, navigating the blend of Nepali traditions and Midwestern American
    life. He retains fluency in Nepali and celebrates major festivals such as Dashain, Tihar, and Holi with his extended family and local diaspora community. The values of humility, respect for elders,
    and collaborative harmony, emphasized in his upbringing, continue to shape his interpersonal style. While he has adapted to American customs—enjoying Chicago’s winter sports and lakefront walks—he maintains
    strong culinary ties, often preparing dal bhat, momo, and traditional teas for family gatherings. His cultural identity is further expressed through participation in Nepali cultural associations, where
    he shares stories of his heritage and contributes his painting expertise to community spaces.
attributes:
  skills: '["Surface preparation (scraping, sanding, patching)", "Paint mixing and color matching", "Interior and exterior paint application", "Safety compliance and scaffolding assembly", "Minor carpentry
    and drywall repair", "Customer communication and service", "Crew coordination and small-team leadership", "Mentoring apprentices", "Knowledge of weather‑resistant coatings"]'
  hobbies: '["Gardening (herbs and vegetables)", "Reading historical biographies and travel memoirs", "Listening to Nepali folk and Bollywood music", "Playing chess at the senior center", "Attending South
    Asian cultural festivals (Dashain, Holi)", "Experimenting with paint colors and watercolor sketching", "Cooking traditional Nepali dishes (momo, dal bhat)", "Volunteering for community painting projects"]'
  career_goals: Even at 77, Priyesh remains focused on securing a stable future for his wife and preserving the legacy of his craftsmanship. He aims to transition from full‑time labor to a consulting and
    mentorship role, offering expert advice to younger painters and taking on selective projects that allow a flexible schedule. He plans to formalize a small family‑run painting service that his son or
    grandson can inherit, ensuring that the business reflects his standards of quality and reliability. Additionally, he hopes to volunteer his skills for community murals and senior‑housing renovations
    in Chicago’s South Asian neighborhoods, and he dreams of making a modest pilgrimage to Nepal to reconnect with his roots before he retires fully.
