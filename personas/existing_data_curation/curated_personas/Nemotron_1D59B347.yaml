personas:
  professional: Milton Romero is a seasoned residential and small‑commercial painter and paper‑hanger in rural Montana, leveraging three decades of methodical craftsmanship, a curiosity for eco‑friendly
    finishes, and a painstaking eye for historic preservation to run a reliable solo operation while preparing to earn a master painter certification and mentor apprentices.
  sports: Milton Romero enjoys low‑impact fitness through weekend hikes in the foothills and regular fishing trips on the Missouri River, follows the Montana Grizzlies football team and the Missoula Osprey
    baseball club, and participates in a senior walking group that meets at the local community center each spring.
  arts: Milton Romero finds creative release in watercolor landscapes inspired by the works of Winslow Homer and John James Audubon, while his woodworking projects echo the functional aesthetic of folk
    artisan Whittaker, and he unwinds listening to John Denver and watching Bob Ross episodes during evening downtime.
  travel: Milton Romero prefers thoughtfully planned road trips that balance solitude with scenic marvels, having already explored Yellowstone and the Grand Tetons, and dreaming of a quiet retreat to the
    Canadian Rockies in Banff National Park while budgeting his travel around modest retirement savings and occasional family commitments.
  culinary: Milton Romero enjoys cooking his freshly caught trout into cedar‑plank grilled fillets seasoned with fresh dill and lemon, pairs it with roasted root vegetables like carrots and parsnips, and
    while his culinary skill is modest, he takes pride in mastering a perfect pan‑seared ribeye and experimenting with locally sourced honey‑glazed pork ribs.
  core: Milton Romero is a methodical, anxiously meticulous 60‑year‑old painter who balances his love for solitary nature pursuits with a deep sense of community, often over‑preparing project estimates
    yet occasionally forgetting to take his prescribed anxiety medication.
background:
  cultural: Milton grew up in a modest, white-American family that settled in the western plains, with distant Hispanic roots hinted by his surname. The rugged, self-reliant culture of rural Montana, combined
    with a respectful, community-oriented ethos from his Catholic upbringing, shaped his values of hard work, modesty, and neighborly cooperation. He celebrates typical American holidays and occasionally
    honors family traditions such as sharing homemade tamales during Christmas, reflecting a blended cultural identity rooted in the big-sky frontier.
attributes:
  skills: '[''Interior painting'', ''Exterior painting'', ''Paper hanging'', ''Surface preparation and priming'', ''Drywall repair and finishing'', ''Color consultation'', ''Estimating and budgeting'',
