personas:
  professional: Jeniffer Pacheco is an imaginative mini‑architect who spends afternoons constructing towering Lego castles and sketching vivid cityscapes, channeling her boundless curiosity and love of
    colorful art into early design play while they occasionally forget to clean up the scattered bricks because of their relaxed approach to order.
  sports: Jeniffer Pacheco dashes around the neighborhood park playing tag, joins the Little League under‑seven soccer team called the Sunny Sprouts, and cheers for the local professional baseball club
    the City Mariners, channeling their high energy and competitive nature into every sprint and goal.
  arts: Jeniffer Pacheco grooves to upbeat salsa and son rhythms while twirling in the living room, fills sketchbooks with bright animal illustrations inspired by picture books by Eric Carle, and crafts
    paper masks of jungle creatures, all of which reveal their love for dynamic performance, vivid hues, and hands‑on creativity.
  travel: Jeniffer Pacheco day‑dreams about hopping aboard a bright blue train to the seaside town of Coral Bay after reading picture books about sea turtles, and they already love the annual local cultural
    festival where they sample festive foods and watch traditional folk dances, fueling their curiosity about far‑off destinations like the Amazon rainforest.
  culinary: Jeniffer Pacheco delights in munching on crisp plantain chips and flavorful rice with tomato sauce they try at the community festival, loves helping their parents stir a pot of savory pork stew
    known as Ropa Vieja during family meals, and experiments with drawing food doodles of tacos and fruit salads in their sketchbook.
  core: Jeniffer Pacheco is a vibrant six‑year‑old whose endless curiosity drives colorful Lego creations and salsa dance moves, whose competitive spark fuels tag games and savings challenges, yet whose
    easygoing, sometimes disorganized nature leads to occasional forgetfulness in chores and health routines.
background:
  cultural: Jeniffer is a first‑generation Cuban‑American raised in Miami’s vibrant Little Havana neighborhood. At home, Spanish is spoken alongside English, and family gatherings are filled with classic
    Cuban dishes like arroz con pollo and flan. The rhythms of salsa, mambo, and rumba are a constant soundtrack, shaping her love of dance and music. Community events such as Carnaval Miami and parades
    celebrate her heritage, and her parents encourage her to learn about Cuban history and traditions while also embracing the multicultural fabric of the city. This blend of Cuban roots and Miami’s diversity
    informs her worldview, artistic expression, and daily life.
