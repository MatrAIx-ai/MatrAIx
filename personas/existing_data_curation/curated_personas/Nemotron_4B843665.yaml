  hobbies: '[''drawing and coloring'', ''listening to Cuban music'', ''dance and movement'', ''building with Lego bricks'', ''reading picture books'', ''crafting simple projects'', ''playing tag and group
    games'']'
  career_goals: Even at six, Jeniffer dreams big. She imagines herself on stage dancing to lively Cuban rhythms, painting vibrant murals, or guiding younger children through story‑time adventures. Her competitive
    streak fuels a desire to win school art contests and dance recitals, while her love of new ideas leads her to want to create original games or inventions that blend art and play. Ultimately she hopes
    to grow into a community artist who shares her culture and inspires curiosity in others.
