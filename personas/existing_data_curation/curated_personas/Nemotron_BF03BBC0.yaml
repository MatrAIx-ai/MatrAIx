  career_goals: Brian wants to re‑enter the workforce in a role that leverages his hands‑on expertise and his knack for organization. He is exploring opportunities as a handyman or property maintenance
    contractor, with a long‑term ambition to establish his own small‑scale home‑improvement business that can serve the Bedford community. He also hopes to take on a leadership position on a local nonprofit
    board to shape community events.
