  career_goals: Holly dreams of becoming an artist or a children’s book author, creating vivid illustrations and stories that spark imagination. She also envisions designing interactive games that combine
    art and coding, and occasionally imagines exploring space as an astronaut or working on robotics. Her immediate ambition is to develop her drawing and writing skills, participate in art workshops, and
    lead a small creative club at school where she can share her projects with friends.
