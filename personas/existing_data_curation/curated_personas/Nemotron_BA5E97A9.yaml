personas:
  professional: Holly Griffin is a budding creative engineer in training, merging her love for LEGO construction, magnetic tiles, and Scratch coding to prototype whimsical machines and story-driven games,
    while their organized yet flexible nature helps them manage school projects and club assignments with a blend of responsibility and imagination.
  sports: Holly Griffin enjoys leisurely nature walks in Austin's Zilker Park and participates in the city’s junior nature hike club, cheers for the Texas Longhorns football team and follows Austin FC’s
    matches, occasionally joins a community soccer clinic for kids, yet prefers imaginative play with LEGO over competitive sports, balancing activity with periods of quiet contemplation.
  arts: Holly Griffin immerses themselves in drawing fantastical dragons inspired by Hayao Miyazaki, reads J.K. Rowling and Ursula K. Le Guin for story ideas, plays simple melodies from Beethoven’s Moonlight
    Sonata on a keyboard, sings along to Taylor Swift’s upbeat tracks, and delights in watching Pixar animations, weaving these influences into their own short stories and artwork.
  travel: Holly Griffin maps out family road trips with crayons, has explored the scenic Hill Country, visited the Grand Canyon on a school field trip, spent a magical weekend at Disney World, and dreams
    of a future visit to Space Center Houston to gaze at rockets, favoring relaxed nature stops over packed amusement parks while occasionally worrying about unfamiliar places.
  culinary: Holly Griffin delights in homemade cheese quesadillas, buttery mac and cheese, fresh strawberry smoothies, and occasionally experiments by adding broccoli to pizza, cooking with a beginner’s
    confidence alongside a parent, and treats each cooking session as a creative experiment, though they sometimes overindulge in candy when nervous.
  core: Holly Griffin is an eight‑year‑old imagination powerhouse who balances creative bursts with worry‑induced pauses, often sketching dragons while clutching a half‑eaten strawberry and humming a piano
    tune.
background:
  cultural: Holly comes from a White, middle‑class family in Austin, Texas. Her family values education, creativity, and community involvement. She often participates in local cultural events such as the
    Austin Children’s Festival, family‑friendly concerts at Zilker Park, and community art workshops. The vibrant arts scene of Austin, combined with the city’s emphasis on technology and innovation, influences
    her interest in both visual arts and early coding. Her upbringing includes exposure to Southern hospitality, regional foods, and Texan traditions like backyard BBQs and holiday celebrations, while also
    reflecting the diverse multicultural environment of the Austin community.
