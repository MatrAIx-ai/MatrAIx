personas:
  professional: Diane Inman, a veteran frontline customer‑service specialist with decades of experience on Zendesk and Salesforce, leverages their razor‑sharp active‑listening, conflict‑resolution, and
    meticulous data‑entry skills to de‑escalate calls while imposing the structured, predictable processes they crave, and now mentors new hires as they prep for a supervisory role.
  sports: Diane Inman enjoys low‑impact fitness like senior yoga and weekend bridge marathons, follows the Milwaukee Brewers in baseball and the Chicago Bears in football from their living‑room couch, and
    they participate in a community walking club that meets at the local park each Saturday.
  arts: Diane Inman fuels their love of the arts by reading contemporary novels in a local book club, acting in community theater productions, and savoring classic performances by Frank Sinatra, the folk
    storytelling of Joan Baez, and the stage dramas of Arthur Miller, which together shape their social, empathetic outlook, and they often share these insights with friends over tea.
  travel: Diane Inman plans trips with a detailed itinerary alongside their sister, favoring scenic Great Lakes getaways like Mackinac Island, Door County, and the Upper Peninsula, they balance structured
    travel plans with occasional spontaneous detours to charming local cafés, all while budgeting modestly as they approach retirement.
  culinary: Diane Inman explores Midwestern comfort cuisine in weekly cooking classes, mastering dishes such as chicken pot pie, cheese‑curd casserole, and apple crumble, while their grocery list frequently
    features butter, cornmeal, and locally sourced whitefish, and they enjoy sharing these hearty meals with neighbors at potluck gatherings.
  core: Diane Inman is an organized, sociable senior who juggles a love for bridge, garden‑center purchases, and gentle yoga, yet they often wrestle with worry that fuels meticulous planning and occasional
    over‑checking of details.
background:
  cultural: Diane is a white Midwestern American who grew up in a small‑town environment in Michigan. Her upbringing emphasized hard work, community involvement, and a practical outlook on life. She has
    roots in the region’s German‑Polish heritage, which is reflected in family traditions such as holiday baking and participation in the local Lutheran church. The close‑knit nature of Cedar Springs and
    Kent County has shaped her sociable, cooperative demeanor, while her experiences as a widowed senior have deepened her appreciation for supportive community networks and intergenerational relationships.
attributes:
