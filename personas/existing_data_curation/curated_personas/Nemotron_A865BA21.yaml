personas:
  professional: Marcelo Lozada, a self‑taught visual artist and graphic designer in his late forties, leverages their boundless imagination and love of speculative storytelling to create mixed‑media installations
    that fuse folk motifs with futuristic concepts, while their relaxed attitude toward deadlines often leads to spontaneous, late‑night studio sessions.
  sports: Marcelo Lozada, a 47‑year‑old outdoor enthusiast, joins the Austin Trail Runners for weekend hikes in the Hill Country, roots for Austin FC during the MLS season, and occasionally plays pick‑up
    basketball at the local community center, but they prefer solo trail runs over structured gym routines.
  arts: Marcelo Lozada immerses themselves in the works of "Frida Kahlo", the vibrant murals of "Diego Rivera", the experimental soundscapes of "Flying Lotus", and the indie rock of "The Strokes", drawing
    creative fuel from these artists to fuel their own speculative graphic novel collaborations.
  travel: Marcelo Lozada favors spontaneous road trips across Texas, dreaming of a future pilgrimage to the historic streets of Guanajuato and the cherry blossoms of Kyoto, yet their flexible planning style
    often means they book last‑minute flights and rely on recommendations from fellow artists rather than rigid itineraries.
  culinary: Marcelo Lozada, an adept home chef, regularly crafts traditional tamales and complex mole using dried chilies, chocolate, and toasted seeds, while also experimenting with fusion dishes like
    mole‑glazed grilled portobello, though they sometimes burn the top layer when multitasking between painting sessions.
  core: Marcelo Lozada blends a vivid, speculative imagination with a relaxed, sometimes chaotic work rhythm, turning cultural rituals into bold mixed‑media art while navigating life with a competitive
    edge and a love for spontaneous adventure.
background:
  cultural: Marcelo was born in Monterrey, Mexico, and moved to Austin with his family at age eight. He grew up in a bilingual household where Spanish was spoken at home and English at school, giving him
    a bicultural perspective that informs his artistic voice. Family traditions such as Día de los Muertos, cocina de abuela, and celebrating Mexican holidays remain central to his identity. Living in Austin’s
    multicultural environment, he blends the vivid colors, symbolic patterns, and storytelling traditions of Mexican culture with the city’s eclectic artistic scene, creating work that reflects both his
    heritage and his adopted home.
attributes:
  skills: '["Graphic Design", "Illustration", "Digital Photography", "Creative Writing", "Art History", "Conceptual Installation", "Research & Critical Analysis"]'
  hobbies: '["Painting", "Sketching", "Mixed‑media Collage", "Reading speculative fiction", "Hiking in Texas Hill Country", "Attending live music", "Cooking Mexican cuisine"]'
  career_goals: Marcelo aims to launch a community‑focused art space in Austin that showcases emerging Mexican‑American artists and hosts interdisciplinary workshops. He hopes to publish a graphic novel
    that blends Mexican folklore with science‑fiction themes, and eventually to curate an immersive exhibition that invites viewers to interact with abstract concepts through mixed media. While he remains
    flexible about the timeline, his ambition is to transition from his current independent projects into a more visible role as a cultural curator and educator.
