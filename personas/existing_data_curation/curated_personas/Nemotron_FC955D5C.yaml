  career_goals: Kenny aims to turn his love for art and technology into a career as a multimedia creator. He aspires to become a concept artist or video‑game designer, creating immersive visual worlds and
    interactive narratives. He plans to study graphic design, animation, or interactive media in college and hopes to one day open a community maker space in Cushing where local youth can explore digital
    art, coding, and collaborative projects.
