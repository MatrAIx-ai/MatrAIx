personas:
  professional: An aspiring concept artist, Kenny Tidwell merges a love for fantasy illustration with early digital design skills, and they channel the discipline learned from community volunteer projects
    into meeting art club deadlines while nurturing a long‑term goal of creating video‑game environments.
  sports: A dedicated basketball player, Kenny Tidwell competes on the Cushing High School varsity team, idolizes the Oklahoma City Thunder, and they supplement team practice with daily sprint drills at
    the local community center, though they sometimes skip Friday practice to attend art club rehearsals.
  arts: A vibrant creator, Kenny Tidwell draws inspiration from Hayao Miyazaki's animated films, Michael Whelan's fantasy artwork, and Neil Gaiman's storytelling, and they translate those influences into
    detailed sketchbooks, digital illustrations on a tablet, and lively improv scenes modeled after Tina Fey's comedic timing.
  travel: An organized explorer, Kenny Tidwell often plans weekend road trips with family, enjoying stops at the Grand Canyon and historic Santa Fe, and they dream of a future solo adventure to Tokyo to
    soak in its anime districts and neon‑lit streets, balancing budget constraints with a desire for cultural immersion.
  culinary: A budding home chef, Kenny Tidwell favors hearty Midwestern dishes like chicken fried steak, homemade chili topped with shredded cheddar, and banana‑pudding parfaits, and they experiment with
    crafting their own pizza dough strewn with fresh basil and mozzarella, though they sometimes over‑salt the sauce when excitement spikes.
  core: Kenny Tidwell is a relentlessly imaginative teen who balances art‑focused daydreams with community‑rooted responsibilities, but habitually loses track of time during Minecraft builds, leading to
    occasional missed curfews.
background:
  cultural: Kenny grew up in Cushing, Oklahoma, a small Midwestern town with deep family roots in the region. His household reflects typical rural‑Midwest values, emphasizing hard work, community involvement,
    and neighborly support. He participates in local traditions such as the Oil Day Parade and the county fair, and attends a local Baptist church where service projects are encouraged. While his immediate
    environment is primarily white and Midwestern, Kenny’s artistic and technological interests are broadened through school programs, online tutorials, and virtual gaming communities, giving him exposure
    to diverse cultural influences beyond his hometown.
