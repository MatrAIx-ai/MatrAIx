persona_description: A veterinarian who specializes in the diagnosis and treatment of diseases in horses and swine, particularly those involving the upper respiratory tract, lymphatic glands, and the throat.
  They have extensive knowledge and experience in recognizing and treating strangles, a disease characterized by the swelling of the throat or groups of lymphatic glands elsewhere. They are likely to be
  involved in the care and management of affected animals, providing treatment and management plans to prevent further complications.
