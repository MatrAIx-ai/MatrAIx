  hobbies: '["Reading contemporary fiction","Urban gardening","Yoga","Cooking soul food and fusion recipes","Volunteer tutoring at the local community center","Hiking on the Manassas Trail","Listening to
    jazz and R&B","Participating in a small book club"]'
  career_goals: Keshana aims to leverage her supervisory experience to move into a regional sales manager role within the next three years, eventually targeting a director‑level position overseeing multiple
    sales divisions. She plans to complete her bachelor's degree in Business Administration and obtain a professional certification in sales management. A key ambition is to mentor and develop emerging
    talent, especially Black women entering the sales field, and to champion inclusive, high‑performing teams that reflect her commitment to both organizational success and community empowerment.
