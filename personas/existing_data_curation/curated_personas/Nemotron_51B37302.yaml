  hobbies: '[''Hosting dinner parties'', ''Book club'', ''Volunteering at arts festival'', ''Gardening'', ''Coastal walks'', ''Historic site tours'', ''Theater attendance'', ''Watercolor painting'', ''Salsa
    dancing'', ''Morning yoga'', ''Kayak trips'']'
  career_goals: Looking ahead, Taera aims to transition into a senior strategic procurement role that emphasizes sustainable sourcing and corporate social responsibility. She envisions establishing a boutique
    consultancy focused on helping small businesses in Martin County adopt eco‑friendly purchasing practices. Additionally, she plans to become a recognized thought leader by speaking at industry conferences,
    publishing articles on ethical procurement, and leading community‑based supply‑chain initiatives. Mentoring the next generation of purchasing professionals remains a core ambition, as she seeks to pass
    on her blend of practical expertise and creative insight.
