personas:
  professional: Taera Elkaim is an experienced purchasing professional who leverages a liberal‑arts background and innate curiosity to craft sustainable sourcing strategies, while their spontaneous nature
    sometimes results in last‑minute spreadsheet updates and a stack of misplaced vendor contracts, and they thrive on mentoring junior staff.
  sports: Taera Elkaim stays fit through community yoga classes, weekend kayaking along the Intracoastal Waterway, and a lively weekly pickleball league at the Martin County Recreation Center, while they
    cheer on the Miami Dolphins and follow the Orlando Magic during basketball season.
  arts: Taera Elkaim channels their love for the arts by coordinating the Hobe Sound Arts Festival, painting sun‑lit watercolor seascapes, attending productions at the Brevard Center for the Arts, and dancing
    salsa to Marc Anthony and Celia Cruz at the local Latin club, and they love sharing these experiences with friends.
  travel: Taera Elkaim revels in weekend road trips to historic St. Augustine, spontaneous explorations of Savannah’s squares, and yearly cruises that let them chase the sunrise over the Gulf, while they
    dream of a cultural immersion tour of Seville’s flamenco scene.
  culinary: Taera Elkaim delights in hosting dinner parties featuring fresh Florida grouper ceviche, key‑lime pie made with garden‑grown basil, and a Spanish paella seasoned with saffron and rosemary from
    their backyard herb pot, though they sometimes forget to defrost the shrimp until the last minute.
  core: Taera Elkaim blends Midwestern pragmatism with coastal spontaneity, turning every procurement challenge, social gathering, and sunrise kayak into a vibrant, community‑focused adventure—even if a
    misplaced receipt or two slips through the cracks, they laugh it off.
background:
  cultural: Taera grew up in a middle‑class family in the Midwest, where community involvement and public education were central values. Encouraged by her parents to explore literature, history, and the
    arts, she pursued a humanities degree at a liberal arts college. In her early thirties, she relocated to coastal Florida, embracing the relaxed, nature‑focused lifestyle while retaining her Midwestern
    sense of practicality and neighborliness. She identifies with mainstream American culture, actively participates in her local church and civic groups, and values civic engagement, lifelong learning,
    and cultural appreciation.
