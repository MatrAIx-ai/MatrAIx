personas:
  professional: Emily Harding is a versatile computer systems analyst who blends data modeling, SQL, and Python automation with a humanistic eye for user experience, delivering elegant system designs in
    Agile settings while passionately pursuing a future senior solutions architect role that fuses technology strategy with artistic insight.
  sports: Emily Harding stays active by playing in a co‑ed volleyball league, hiking with the Charlotte Hiking Club on weekends, cheering for the Carolina Panthers and Charlotte FC, and occasionally catching
    a Charlotte Knights baseball game, all while preferring group workouts that double as social outings.
  arts: Emily Harding frequents the Mint Museum and contemporary galleries, draws inspiration from artists like Yayoi Kusama and Banksy, revels in live performances by St. Vincent and the National, and
    hones improvisational skills in local improv theatre workshops that fuel their creative problem‑solving at work.
  travel: Emily Harding plans trips on a whim, favoring culturally rich cities such as Barcelona for its Gaudí architecture, Kyoto for its tea ceremonies, and Mexico City for its vibrant street art, while
    also escaping to nearby Asheville for weekend hikes, balancing a modest travel budget with a desire for immersive experiences.
  culinary: Emily Harding delights in experimental fusion cooking, crafting Korean‑Mexican tacos with gochujang‑marinated short ribs, miso‑infused ramen topped with roasted corn, and hosting friends for
    tapas featuring pomegranate‑glazed lamb, all while mastering sous‑vide techniques and sourcing fresh herbs from the city farmer’s market.
  core: Emily Harding is a curiosity‑driven, socially energetic tech analyst who seamlessly merges art and code, thrives on spontaneous creativity yet wrestles with a relaxed, occasionally chaotic approach
    to organization and finances.
background:
  cultural: Emily grew up in a middle‑class white family in the Charlotte metropolitan area, where Southern hospitality and community involvement were core values. Her upbringing emphasized appreciation
    for the arts, with family trips to theater productions and regional festivals shaping her cultural palate. She earned a Bachelor of Arts in Humanities, immersing herself in literature, philosophy, and
    visual arts, which cultivated a broad, open‑minded worldview. This blend of Southern cultural roots, liberal arts education, and a modern tech career informs her balanced approach to professional challenges
    and personal pursuits.
