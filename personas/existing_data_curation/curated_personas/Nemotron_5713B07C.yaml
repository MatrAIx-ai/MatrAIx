  career_goals: Emily aspires to progress into a senior solutions architect role where she can shape enterprise‑wide technology strategies while integrating artistic and user‑centred perspectives. She aims
    to lead multidisciplinary teams, champion innovative digital products, and eventually influence the company’s culture towards greater creativity and flexibility. Over the next five years, she plans
    to obtain certifications in cloud architecture and UX design, mentor junior analysts, and spearhead community tech‑art initiatives in Charlotte that bridge technology with local cultural expression.
