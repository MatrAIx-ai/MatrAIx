  hobbies: '[''Coastal Hiking'', ''Photography (Sunrise & Landscape)'', ''Reading Business Non‑fiction'', ''Cooking New Recipes'', ''Jogging'', ''Strategic Board Games'', ''Volunteering at Local Food Bank'']'
  career_goals: Sylvia aims to secure a full‑time role in business development or project management within a mid‑size firm, leveraging her analytical strengths to drive growth initiatives. She plans to
    pursue an MBA within the next two years to deepen her strategic expertise. Long‑term, she aspires to a senior leadership position—such as Director of Operations—where she can shape company strategy
    and mentor emerging talent. Her competitive nature fuels a desire to be recognized as a top performer and eventually launch her own consultancy focused on process optimization for coastal‑region businesses.
