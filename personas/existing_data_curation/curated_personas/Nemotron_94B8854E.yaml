personas:
  professional: Pamela Brown is an aspiring junior illustrator and set designer, merging their curiosity for fantasy worlds with their methodical watercolor skill, while their talkative, sociable nature
    lets them lead mini productions in their school drama club and help younger kids during story‑time at the library.
  sports: Pamela Brown plays midfield for the Norwalk Strikers youth soccer team, cheers on the New England Revolution during family outings, and joins a local ice‑skating club in winter, channeling their
    organized game strategy and sociable energy to lead team huddles and make new friends.
  arts: Pamela Brown immerses themselves in creative expression, sketching characters inspired by J.K. Rowling and Hayao Miyazaki, using watercolor techniques reminiscent of Claude Monet, and assembling
    magazine collages that echo the eclectic style of Hannah Höch, often displaying their work during library story‑time.
  travel: Pamela Brown loves weekend trips to the historic Mystic Seaport and spring hikes in nearby state parks, dreams of visiting the Scottish Highlands to see real castles, and prefers planning outings
    with detailed scrapbooks and maps, balancing their organized nature with a yearning for fresh adventures to illustrate.
  culinary: Pamela Brown enjoys sipping strawberry‑banana smoothies, crafting cheese quesadillas, and whipping up fruit salads with mango, blueberries, and kiwi, and occasionally helps their mom bake chocolate
    chip cookies, though they sometimes over‑sweeten the batch while humming in the kitchen.
  core: Pamela Brown is a curious, organized nine‑year‑old who transforms every story into a watercolor adventure, leads friends in soccer chants, saves pennies for art supplies, and negotiates bedtime
    with the persuasive charm of a tiny stage director, all while they radiate boundless energy.
background:
  cultural: Pamela’s family is rooted in African‑American heritage, with traditions that blend cultural pride and New England community life. Growing up in Norwalk, she celebrates Juneteenth with family
    gatherings, enjoys soul and R&B music at home, and learns about influential Black artists and writers through school projects and community workshops. Her mother shares stories of their ancestors, and
    she participates in church activities that emphasize service and fellowship. The multicultural environment of Fairfield County gives her exposure to diverse perspectives, while her family’s emphasis
    on education, humility, and collective success shapes her worldview.
