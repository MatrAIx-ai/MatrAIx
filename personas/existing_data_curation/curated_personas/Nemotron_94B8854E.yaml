  career_goals: Inspired by her love of art, community, and helping others, Pamela dreams of becoming a teacher or children's program organizer who can blend creativity with mentorship. She imagines leading
    art workshops for kids, curating interactive exhibits at a local museum, or eventually working as a community outreach coordinator for a nonprofit that supports youth development. Her long‑term ambition
    is to use her artistic talents and compassionate nature to create inclusive spaces where children of all backgrounds feel valued and inspired.
