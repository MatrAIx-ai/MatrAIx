  career_goals: As she approaches the later stage of her career, Doris aims to transition into a mentorship and advisory role, guiding younger social workers and shaping local service policies. She plans
    to spearhead a pilot program that integrates intergenerational mentorship for at‑risk youth and seniors, blending her practical insights with her curiosity about innovative community models. Additionally,
    she aspires to author a guidebook on navigating family dynamics in rural North Carolina, thereby leaving a lasting resource for both practitioners and families while continuing to champion client rights
    through strategic advocacy.
