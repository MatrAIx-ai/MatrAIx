  hobbies: '[''Vegetable Gardening'', ''Rose Gardening'', ''Reading Classic Literature'', ''Book Club Participation'', ''Sudoku Solving'', ''Competitive Bridge'', ''Quilting'', ''Genealogical Research'',
    ''Kayaking on the St. Clair River'']'
  career_goals: As she approaches the culmination of her teaching career, Annah aims to transition into a district‑level curriculum coordinator role, where she can shape instructional standards across multiple
    schools. She aspires to lead a high‑impact school improvement initiative that demonstrably raises proficiency scores in English Language Arts. Pursuing recognition as a Teacher of the Year and publishing
    a practitioner‑focused guide on effective writing instruction are also on her agenda. Post‑retirement, she envisions consulting for neighboring districts on data‑informed instruction and volunteering
    as a mentor for aspiring educators.
