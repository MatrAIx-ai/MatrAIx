personas:
  professional: Annah Brown, a disciplined veteran secondary English teacher, excels at designing standards‑aligned curricula, parsing student performance data, and leading professional development, using
    their competitive edge and love of structure to push district‑wide writing initiatives and mentor new teachers.
  sports: Annah Brown enjoys calm weekend kayaking on the St. Clair River, follows the Detroit Tigers and Detroit Red Wings devotionally, participates in a local senior walking club that meets thrice weekly,
    and uses their strategic mindset from bridge to stay disciplined in their fitness routine.
  arts: Annah Brown delights in dissecting Dickens and Austen novels at their book club, crafts intricate quilts inspired by American folk motifs, frequents the community theater for Shakespeare productions,
    and collects prints of Monet’s water lilies to adorn their study, weaving literature, craft, and visual art into their leisure.
  travel: Annah Brown plans their trips with spreadsheets, favoring guided literary pilgrimages to Stratford‑upon‑Avon and the Lake District, scenic autumn drives through New England’s foliage, and annual
    family stays at a cottage on the Great Lakes, balancing their love of structure with occasional spontaneous kayaking excursions.
  culinary: Annah Brown, a proficient home cook, harvests tomatoes, zucchini, and herbs from their garden to create meticulous dishes like rosemary‑roasted chicken, garden‑fresh vegetable soup, and perfectly
    crimped apple pie, while enjoying Earl Grey tea and occasionally experimenting with quinoa‑based salads.
  core: Annah Brown, a fiercely organized educator with a love for puzzles, garden order, and strategic games, approaches life like a well‑planned curriculum—methodical, competitive, and unflappably calm,
    though they occasionally hoard premium quilting fabric as a guilty pleasure.
background:
  cultural: Annah Britt Brown is a fourth‑generation Midwestern white American of German‑Irish ancestry, raised in a modest, family‑oriented community near Port Huron, Michigan. Her upbringing emphasized
    hard work, punctuality, and community service, values reflected in the region’s strong ties to the Great Lakes and its manufacturing heritage. She was active in a Lutheran congregation, which fostered
    a sense of stewardship and modesty. Exposure to the local maritime culture, seasonal festivals, and a close‑knit school community shaped her appreciation for tradition while she embraced incremental
    educational innovations. This blend of cultural influences informs her pragmatic, disciplined approach to both professional and personal life.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Data‑Driven Assessment'', ''Classroom Management'', ''Educational Technology Integration'', ''Professional Development Facilitation'',
