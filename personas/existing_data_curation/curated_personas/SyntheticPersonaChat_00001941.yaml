data:
  user 1 personas: 'I like to be alone.

    I love to sew.

    I have a cat.

    My mother was a nurse.

    I wait tables at a cafe.'
  user 2 personas: 'I want to visit rome , but i can t make myself go alone.

    I still like combat boots with babydoll dresses.

    The death of kurt cobain marred my middle school years.

    I flirted with the dmv officer in order to pass my driving exam.

    I don t have a relationship with my deadbeat dad.'
  Best Generated Conversation: 'User 1: I''m a waiter at a cafe.

    User 2: That sounds like it would be a lot of fun!

    User 1: It is! I get to meet a lot of different people.

    User 2: That''s great! I love meeting new people.

    User 1: Me too! It''s always interesting to hear about people''s lives.

    User 2: I agree! What''s your favorite thing about being a waiter?

    User 1: I love getting to make people''s day.

    User 2: That''s so sweet! I''m sure you''re great at it.

    User 1: Thanks! I try my best.

    User 2: What''s the most interesting thing that''s happened to you at work?

    User 1: I once had a customer who told me about his time in the military.

    User 2: That sounds really interesting! What did he tell you?

    User 1: He told me about some of the things he saw and did. It was really eye-opening.

    User 2: I bet it was! I''ve always been fascinated by the military.

    User 1: Me too! I think it''s really important to appreciate the sacrifices that our soldiers make.

    User 2: I agree! They deserve all the respect we can give them.

    User 1: I know, right?

    User 2: So, what do you do for fun outside of work?

    User 1: I love to sew!

    User 2: That''s so cool! What kind of things do you sew?

    User 1: I sew a lot of clothes, mostly for myself.

    User 2: That''s awesome! I''ve always wanted to learn how to sew.

    User 1: It''s not too hard! You should give it a try.

    User 2: I might just do that!

    User 1: Cool! I''d love to see what you make.'
