personas:
  professional: A facilities-management professional named Carolyn Cernuda leverages a decade of commercial cleaning expertise, OSHA‑compliant safety practices, and a flair for eco‑friendly solutions to
    design systematic cleaning schedules, while they pursue CIMS and LEED Green Associate certifications to eventually supervise multiple Butler County sites and curate art displays in common areas.
  sports: A sports enthusiast named Carolyn Cernuda follows the Cincinnati Bengals and the Cincinnati Reds, participates in the Butler County Trails Club for weekend hikes, joins a local bowling league
    for social competition, and they occasionally practice yoga at a community studio to counteract the physical demands of their cleaning work.
  arts: Carolyn Cernuda immerses themselves in the local arts scene by attending the Hamilton ArtWalk, sketching downtown storefronts, studying Monet’s Water Lilies and Georgia O’Keeffe’s desert flowers
    at the Cleveland Museum of Art, and they support intimate poetry readings featuring regional poet June Caldwell, all of which enrich their aesthetic sensibility for curating workplace displays.
  travel: Carolyn Cernuda prefers low‑key road trips that blend nature and small‑town charm, having explored Asheville’s Blue Ridge Mountains, Savannah’s historic squares, and a weekend stay in Detroit’s
    Midtown arts district, while they dream of a spring visit to Florence to study Renaissance frescoes, and they usually plan itineraries using a spreadsheet to keep costs under budget.
  culinary: Carolyn Cernuda enjoys farm‑to‑table cooking, frequently preparing roasted beet and goat‑cheese salads, wild‑mushroom risotto, and spaghetti alla carbonara with pancetta, while they experiment
    with locally sourced kale and heirloom tomatoes, though they sometimes revert to ordering a pepperoni pizza after a long cleaning shift.
  core: Carolyn Cernuda fuses meticulous cleaning expertise with a quiet passion for watercolor and community art, channeling their competitive drive into flawless facilities management while they occasionally
    neglect sleep for a DIY project or a late‑night pizza.
background:
  cultural: Carolyn was raised in a middle‑class White Midwestern family in Hamilton, Ohio. Her grandparents emigrated from Ireland and Germany, and family traditions emphasize self‑reliance, modesty, and
    community involvement. Growing up, she participated in church and local volunteer clean‑up events, which fostered a respect for hard work and public service. The region’s strong support for local arts,
    such as the Hamilton ArtWalk and community theater, nurtured her appreciation for visual and performing arts. Her cultural identity blends a pragmatic work ethic with an openness to creative expression,
    typical of the small‑town Ohio environment.
attributes:
  skills: '["Commercial cleaning", "Floor care (strip & wax)", "Carpet extraction", "Green cleaning methods", "OSHA safety compliance", "Inventory and budgeting", "Facility maintenance (plumbing, HVAC filters,
    lock repairs)", "Schedule optimization", "Team coordination", "Basic art curation"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting and sketching", "Reading art history and design", "DIY home projects and furniture restoration", "Hiking and birdwatching", "Jigsaw
    puzzles", "Attending small poetry readings"]'
  career_goals: Carolyn aims to advance into a supervisory role within facilities management, eventually becoming a cleaning services manager overseeing multiple sites in the Butler County area. To achieve
    this, she plans to complete an associate degree in Facilities Management and obtain certifications such as CIMS (Certified Infection Control Manager) and LEED Green Associate. Long‑term, she hopes to
    integrate her love for art by curating community art displays in the buildings she manages, creating welcoming environments that inspire tenants. She also envisions starting a side business offering
    eco‑friendly cleaning consulting for small businesses.
