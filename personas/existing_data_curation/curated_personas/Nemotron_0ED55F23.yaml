personas:
  professional: Victor Perezsierra, a pragmatic community handyman and aspiring tradesperson, leverages their bilingual communication, cash‑handling experience, and basic plumbing and electrical know‑how
    to build a reputation for reliability while occasionally juggling spontaneous weekend renovation projects that leave their workshop cluttered.
  sports: Victor Perezsierra stays active by walking the Miami shoreline five times a week, playing in a neighborhood adult soccer league that supports Inter Miami CF, cheering on the Miami Heat during
    the NBA season, and joining casual beach‑volleyball games, all while favoring low‑impact exercises that protect their back.
  arts: Victor Perezsierra immerses themselves in rhythmic expression, dancing to the sounds of Celia Cruz, Marc Anthony, and Arturo Sandoval at local nightclubs, enjoying classic films starring Andy García,
    and drawing inspiration from vibrant Miami street murals by José “Mago” Mago, which sometimes prompt them to sketch quick doodles during community gatherings.
  travel: Victor Perezsierra balances a love for spontaneous day trips to nearby Everglades trails and Key West beaches with occasional weekend getaways to Orlando’s theme parks, while nurturing a long‑term
    dream of strolling the historic streets of Seville, Spain, all planned within a modest travel budget that supports their weekend food‑stall venture.
  culinary: Victor Perezsierra is a confident home cook who perfects ropa vieja and sweet plantain mofongo using garlic, cumin, and fresh cilantro, experiments with adobo‑marinated pork for their weekend
    stall, and, despite a penchant for over‑seasoning with hot sauce when excited, enjoys sharing these meals with friends at community gatherings.
  core: Victor Perezsierra blends hands‑on practicality with a love for rhythmic community life, juggling tool‑boxes and dance floors while chasing a reliable trade career and a modest food‑stall dream,
    even if they sometimes let a cluttered workspace betray their otherwise organized nature.
background:
  cultural: Victor is a first-generation Cuban-American whose parents arrived in Miami during the 1990s. He was raised in a vibrant Cuban neighborhood, absorbing the island’s culinary traditions, the lively
    beats of salsa, and the deep emphasis on family and community support. He celebrates Cuban holidays such as Nochebuena and Carnaval, maintains close ties with extended family, and participates in local
    Catholic rituals while also respecting Afro-Cuban spiritual practices common in his community. Living in Miami has given him a bicultural perspective, blending Cuban heritage with the multicultural
    dynamics of South Florida.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Traditional Cuban cooking'', ''Basic handyman skills (home repairs, minor plumbing)'', ''Automotive basic maintenance'', ''Cash handling and informal
