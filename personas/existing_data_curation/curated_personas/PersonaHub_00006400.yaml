persona_description: A space engineer or astronaut who is interested in space recycling and satellite technology. This individual is likely to be familiar with the Defense Advanced Research Projects Agency
  (DARPA) and its Phoenix program, which aims to recycle still-working pieces of defunct satellites and incorporate them into new space systems inexpensively. This person may have expertise in robotics,
  materials science, and space engineering, and may be interested in the potential economic benefits of space recycling and the potential for small nanosatellites to launch and operate in low Earth orbit.
