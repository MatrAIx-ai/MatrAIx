personas:
  professional: Juan Roman, an aspiring automotive technician, translates the strategic planning he hones in competitive first‑person shooters into precise vehicle diagnostics, while his preference for
    structured, solitary work and meticulous time‑management ensures he follows repair manuals step‑by‑step with reliable consistency.
  sports: Juan Roman joins local basketball pick‑up games at the community center, hikes the nearby desert trails with the Desert Explorers Club, and passionately follows the Phoenix Suns and the Arizona
    State Sun Devils, channeling the same tactical mindset from his gaming into on‑court decision‑making.
  arts: 'Juan Roman immerses himself in the gritty riffs of The Strokes, the lyrical flow of Kendrick Lamar, late‑night re‑watches of Mad Max: Fury Road, and devours Motor Trend and Car and Driver magazines,
    letting these creative outlets fuel his imagination for vehicle customization.'
  travel: Juan Roman prefers short, low‑cost road trips to desert sand dunes and coastal campsites, dreams of attending the Goodwood Festival of Speed in the UK and the Tokyo Auto Salon in Japan, and uses
    travel forums and a spreadsheet to meticulously plan each itinerary around his school schedule and limited budget.
  culinary: Juan Roman experiments with family recipes like slow‑cooked carnitas, fresh salsa verde, and chilaquiles, sharpening his cooking skills by precisely timing the simmer and mastering the balance
    of cumin, cilantro, and lime, while also enjoying the occasional late‑night microwave pizza during gaming marathons.
  core: Juan Roman is a disciplined, competition‑driven teen who channels his tactical gaming instincts into methodical auto‑tech work, balances solitary projects with occasional team sports, and battles
    a habit of impulsive snack binges and procrastinated school assignments.
background:
  cultural: Juan Miguel is a first‑generation Mexican‑American raised in a bilingual household in Apple Valley. He grew up speaking Spanish at home while attending school in English, giving him fluency
    in both languages. Family traditions such as weekend home‑cooked meals, celebrating Día de los Muertos and Mexican Independence Day, and the importance of community solidarity have shaped his values.
    At the same time, his daily life reflects the cultural blend of Southern California—exposure to mainstream US media, local sports, and a diverse peer group. This bicultural experience informs his identity,
    his respect for hard work, and his motivation to build a stable future that honors both his heritage and the opportunities of his surroundings.
attributes:
  skills: '["Basic computer navigation and troubleshooting", "Bilingual communication (Spanish and English)", "Routine automotive maintenance (oil checks, tire pressure, fluid levels)", "DIY home repairs
    (basic carpentry, minor electrical fixes)", "Organizational and time‑management skills", "Strategic thinking and problem‑solving (from competitive gaming)", "Ability to work independently", "Familiarity
    with procedural documentation"]'
  hobbies: '["Competitive online gaming (strategy and FPS)", "Model kit construction (cars, airplanes)", "DIY electronics projects", "Basketball pick‑up games with friends", "Hiking and nature photography",
    "Cooking Mexican cuisine", "Listening to music (Latin trap, rock)", "Reading automotive magazines"]'
  career_goals: Juan Miguel aims to complete his GED within the next year and enroll in a vocational automotive technology program. He aspires to become a certified auto mechanic through an apprenticeship
    at a local shop, eventually advancing to a supervisory role or opening his own repair business. He values a career that offers clear structure, steady income, and the opportunity to apply his hands‑on
    skills.
