personas:
  professional: Jose Rocha, a 56‑year‑old metalworking veteran, leverages three decades of MIG, TIG, and stick welding mastery and a step‑by‑step apprenticeship approach to train apprentices, while their
    love of routine and competitive edge drives them toward Certified Welder status, a foreman promotion, and the eventual opening of a small fabrication shop that balances steady contracts with occasional
    off‑beat custom jobs.
  sports: Jose Rocha competes in a local adult softball league with the Bayou Busters, regularly cheers the New Orleans Saints during high‑school football games, joins friends for bass‑fishing outings on
    Lake Martin, supports the LSU Tigers and the Atlanta Braves for baseball, and they treat every game as a chance to prove their competitive spirit.
  arts: Jose Rocha enjoys dancing to the lively sounds of Los Tigres del Norte and Clifton Chenier at town festivals, queues up classic zydeco tracks by BeauSoleil, watches classic westerns starring John Wayne
    on Friday nights, and they let the rhythm of regional Mexican and Cajun music shape their social gatherings.
  travel: Jose Rocha prefers road trips that blend fishing and food, having explored Lake Martin, the historic streets of New Orleans, and the music scene in Austin, while dreaming of a cultural immersion
    tour of Oaxaca’s culinary festivals and a relaxed family cruise to the Bahamas when finances allow, and they plan each journey with a mix of spontaneous detours and a familiar itinerary.
  culinary: Jose Rocha excels at grilling carne asada with a cumin‑cilantro rub, slow‑cooking gumbo featuring shrimp, okra, and smoked paprika, and whipping up homemade salsa verde with tomatillos and jalapeños,
    and they relish showcasing these dishes at weekend barbecue cookouts.
  core: Jose Rocha is a sociable, routine‑loving metalworker who balances competitive ambition with spontaneous community gatherings, and they juggle a love of fishing, vintage trucks, and fiery backyard
    barbecues.
background:
  cultural: Jose is a first‑generation Mexican‑American whose parents emigrated from Jalisco. He grew up bilingual, preserving family traditions such as Día de los Muertos, quinceañeras, and Sunday Mass.
    Living in Acadia Parish, he has also adopted elements of Cajun culture, enjoying Creole cuisine and the local music scene. His identity blends Mexican heritage with Southern Louisiana influences, shaping
    his values of hard work, family loyalty, and community involvement.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick (SMAW) welding'', ''Copper brazing'', ''Electronic soldering'', ''Blueprint reading'', ''Metal fabrication'', ''Equipment maintenance'', ''Welding safety
    compliance'', ''Troubleshooting and defect detection'', ''Apprentice training'']'
  hobbies: '[''Bass fishing'', ''Barbecue and Mexican cooking'', ''Softball league'', ''High school football games'', ''Community festivals'', ''Vintage truck restoration'', ''DIY home improvement'', ''Listening
    to regional Mexican and Cajun music'', ''Dancing at local events'']'
  career_goals: He aims to achieve Certified Welder status, take on a foreman role within his current plant, and eventually open his own small welding and fabrication shop that can serve local construction
    and oil‑field contractors. He wants to develop business‑management skills, secure steady contracts, and mentor younger workers, combining his love of routine work with the flexibility to take on occasional
    custom projects.
