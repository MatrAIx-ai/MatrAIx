    User 2: I''m not a fan of fur or scales, but I don''t mind reptiles. I think they''re pretty cool.

    User 1: I''ve never met a Viking before. What''s it like to live in a cold climate?

    User 2: It can be pretty tough at times, but I like the challenge. I think it makes me stronger.

    User 1: I can see how that would be. I''m from a warm climate so I can''t imagine living in a cold climate.

    User 2: I''ve always lived in a cold climate so I''m used to it. I actually love the snow.

    User 1: I''ve never been in the snow before. I''m not sure how I would feel about it.

    User 2: You should come visit me sometime and I''ll show you around. You might surprise yourself and enjoy it.

    User 1: I might just do that. Thanks for the offer.

    User 2: No problem. It was nice talking to you, Ragnar.

    User 1: You too, Sara.'
