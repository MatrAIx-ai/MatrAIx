personas:
  professional: Roger Khaleel, a self‑taught computer support specialist with a talent for calmly diagnosing Windows and macOS issues, leverages a structured, step‑by‑step troubleshooting style to document
    repeatable solutions, aims for CompTIA A+ and Network+ then MCSE certifications, and aspires to become a senior technician or local consulting entrepreneur while balancing family life.
  sports: Roger Khaleel enjoys low‑key outdoor pursuits such as fishing on the local lake and hiking the regional Ozark trails, participates in a community anglers’ club, and follows the St. Louis Cardinals,
    St. Louis Blues, and the Missouri State Bears with quiet enthusiasm.
  arts: Roger Khaleel channels creative energy into restoring vintage radios, devouring mystery novels by Agatha Christie and historical epics by Ken Follett, and replaying classic arcade games like Pac‑Man
    and Space Invaders, all while their woodworking playlist features jazz greats and classic rock legends.
  travel: Roger Khaleel prefers relaxed road trips to natural retreats like the Mark Twain National Forest and Lake of the Ozarks, plans loosely to accommodate spontaneous fishing spots, and harbors a bucket‑list
    dream of touring England’s historic castles and visiting a Tokyo arcade convention.
  culinary: Roger Khaleel favors hearty, home‑cooked fare such as smoked catfish, beef chili, and apple pie, enjoys experimenting with a cast‑iron skillet and garden‑fresh herbs, and occasionally treats
    themselves to a soda from a retro arcade vending machine.
  core: Roger Khaleel balances methodical tech support with a laid‑back love for vintage radios, quiet fishing trips, and mystery novels, all while navigating obligations with an endearing mix of organization
    and occasional forgetfulness.
background:
  cultural: Roger’s family traces its roots to Lebanese immigrants, giving him a blend of Middle‑Eastern heritage and Midwestern American upbringing. While he grew up in the small‑town environment of Lebanon,
    MO, he was exposed to Arabic culinary traditions and occasional cultural celebrations, which he integrates with local customs such as church potlucks and community fairs. This mix of cultural influences
    shapes his values of hospitality, family cohesion, and a pragmatic, community‑oriented outlook.
attributes:
  skills: '["Hardware troubleshooting", "Operating system installation & configuration (Windows, macOS)", "Remote support tools (TeamViewer, AnyDesk)", "Ticketing systems (Zendesk, ServiceNow)", "Basic
    network troubleshooting (TCP/IP, DHCP, DNS)", "Customer service & conflict resolution", "Documentation & knowledge base creation", "Microsoft Office Suite", "Data backup & recovery", "IT asset management"]'
  hobbies: '["Fishing", "Hiking", "Reading mystery novels", "Woodworking", "Vintage radio restoration", "Classic video gaming", "Community volunteering", "Gardening"]'
  career_goals: He aims to formalize his expertise by earning industry certifications such as CompTIA A+ and Network+, and eventually pursue a Microsoft Certified Solutions Expert credential. Roger hopes
    to advance to a senior technician or team lead role at his current employer, and later consider starting a small consulting business serving local businesses in Laclede County. He also plans to complete
    his GED to broaden future opportunities while maintaining a stable work‑life balance for his family.
