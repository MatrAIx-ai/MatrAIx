  hobbies: '[''Gardening'', ''Hiking local trails'', ''Community theater'', ''Book club (mystery novels)'', ''Cooking and baking'', ''Volunteering at the local food bank'', ''DIY home improvement projects'',
    ''Playing bridge'', ''Attending Kentucky Derby events'', ''Genealogy research'']'
  career_goals: Molly aims to advance from her current inspector role to a supervisory position overseeing quality assurance across multiple production lines at her plant. She plans to earn the ASQ Certified
    Quality Engineer credential within the next two years and to complete a bachelor's degree in Industrial Technology to broaden her strategic perspective. In the longer term, she hopes to lead continuous‑improvement
    initiatives that reduce waste and increase efficiency, and to mentor younger employees—especially women—who are entering the trades. Additionally, she is interested in serving on the local chamber of
    commerce’s manufacturing committee to influence regional industry standards and to promote community‑focused safety programs.
