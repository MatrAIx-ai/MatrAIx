personas:
  professional: Molly Geiger is a seasoned quality control inspector in a mid‑size manufacturing plant, leveraging two decades of hands‑on experience in sampling plans, precision weighing, and statistical
    process control to deliver flawless audit reports while methodically charting a path toward a supervisory role, ASQ certification, and a bachelor’s degree in Industrial Technology.
  sports: Molly Geiger regularly hikes the Fort Knox base trails, follows the Louisville Cardinals men’s basketball team and the Kentucky Wildcats football team, and keeps fit by joining a community 5 K
    run each spring, while sharpening strategic thinking through weekly bridge matches at the senior center.
  arts: Molly Geiger enjoys bluegrass concerts featuring The Infamous Stringdusters and Bill Monroe tribute bands, immerses in mystery novels from Agatha Christie and Louise Penny at their book club, and
    channels creative energy into restoring vintage furniture while listening to folk artists like Gillian Welch.
  travel: Molly Geiger prefers well‑planned road trips that blend adventure and relaxation, such as a summer drive along the Blue Ridge Parkway to Shenandoah National Park, a fall weekend in Asheville,
    NC to explore the Biltmore Estate, and an annual pilgrimage to the Kentucky Derby’s Churchill Downs, all funded by strategic use of travel reward points and a modest vacation budget.
  culinary: Molly Geiger favors cooking with garden‑grown tomatoes, peppers, and basil, frequently preparing dishes like fresh tomato‑basil pasta, smoky grilled shrimp with herb‑infused butter, and homemade
    salsa verde, while experimenting with bourbon‑glazed pork ribs for community festivals, and relies on a well‑worn cast‑iron skillet as their go‑to cooking tool.
  core: Molly Geiger embodies a meticulous, community‑driven spirit that balances analytical rigor at work with hands‑on creativity in the garden, DIY projects, and bluegrass gatherings, all while navigating
    life with a checklist, a fondness for vintage furniture, and occasional coffee‑induced jittery bursts of energy.
background:
  cultural: Molly grew up in a small town in central Kentucky, steeped in Southern hospitality, strong church ties, and a deep appreciation for local traditions like bluegrass music and horse racing. Her
    family emphasized hard work, community service, and a close‑knit family life. She celebrates regional holidays, enjoys traditional Kentucky cuisine such as bourbon‑glazed ham and fried green tomatoes,
    and participates in community gatherings like county fairs and the Barren River Folk Festival. This cultural upbringing has shaped her values of reliability, friendliness, and a pragmatic yet curious
    outlook on life.
attributes:
  skills: '[''Quality Inspection'', ''Sampling & Weighing'', ''Statistical Process Control'', ''Equipment Calibration'', ''Data Analysis & Reporting'', ''Regulatory Compliance'', ''Process Documentation'',
