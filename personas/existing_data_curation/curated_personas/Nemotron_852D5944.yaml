  career_goals: James aims to become a senior leader in data-driven decision making within a technology‑focused firm or financial institution. Over the next five years, he seeks to lead a high‑impact analytics
    team, develop proprietary predictive models that drive revenue growth, and mentor junior analysts. Ultimately, he aspires to a Chief Data Officer or Head of Quantitative Research role, where he can
    shape data strategy, foster a culture of rigorous experimentation, and integrate cutting‑edge AI solutions into core business operations. He also entertains the possibility of launching a boutique consultancy
    that offers bespoke quantitative solutions to startups.
