persona_description: A scientist or researcher dedicated to the study of invasive weeds and the development of natural enemies to control them. This person is particularly interested in identifying and
  collecting new natural enemies of weeds, such as Eurasian watermilfoil and Yellow starthistle, and establishing colonies of these beneficial agents under quarantine conditions. They are also skilled in
  environmental assessments and field releases of these natural enemies, as well as the use of laboratory experiments to identify methods of establishing native species in areas where invasive weeds have
  been eliminated.
