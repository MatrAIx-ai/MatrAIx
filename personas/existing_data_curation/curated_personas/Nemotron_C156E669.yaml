  career_goals: Richard aims to transition from a teaching assistant to a full‑time classroom teacher within the next two years, leveraging his bachelor's degree and practical experience. He plans to enroll
    in a Master's program in Educational Leadership to qualify for a curriculum coordinator role, where he can design inclusive curricula and lead professional development. Additionally, he aspires to develop
    a mentorship program for at‑risk youth in Canadian County and increase his involvement in community outreach initiatives, balancing his desire for structured career advancement with his appreciation
    for flexibility and personal impact.
