  career_goals: Rafael aims to advance into a supervisory or managerial role within the customer experience department over the next three years. He seeks to lead a team of representatives, implement process
    improvements, and develop training programs that foster both efficiency and a culture of empathy. He is interested in acquiring a certification in Customer Experience Management and enrolling in community
    college courses in business administration to solidify his leadership competencies. Long‑term, he envisions becoming a Customer Experience Director or establishing a consultancy that helps small Puerto
    Rican businesses improve their client engagement while integrating local cultural elements.
