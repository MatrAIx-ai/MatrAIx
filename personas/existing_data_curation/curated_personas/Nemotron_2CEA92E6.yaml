  hobbies: '[''Visiting art museums and galleries'', ''Participating in community art workshops'', ''Reading historical and literary fiction'', ''Gardening and urban plant care'', ''Walking the Baltimore
    waterfront and local parks'', ''Attending live jazz and folk music performances'', ''Cooking diverse cuisines'', ''Volunteer tutoring at a community center'', ''Collecting vintage postcards'']'
  career_goals: Vivian aims to advance into a supervisory role within transportation security, targeting a shift supervisor or training coordinator position within the next three years. To support this
    ambition, she plans to obtain a GED and pursue a Certified Transportation Security Officer (CTSO) certification, along with attending advanced workshops on crisis management and behavioral detection.
    In the longer term, she hopes to channel her love of art and community outreach by developing a safety‑awareness program that pairs public‑safety education with local art exhibitions, fostering a more
    culturally resonant and informed environment for Baltimore residents.
