personas:
  professional: Vivian Cannon is a seasoned transportation security screener at Baltimore's central transit hub, whose meticulous threat detection, calm crisis response, and culturally aware passenger engagement
    position them as a strong candidate for a supervisory role while they also volunteer to weave art into the security environment.
  sports: Vivian Cannon enjoys leisurely walks along the Inner Harbor, participates in a weekly bowling league, roots for the Baltimore Ravens and Orioles, and embraces a low‑impact fitness routine that
    prioritizes flexibility over high‑intensity training, often using garden breaks as informal cardio.
  arts: Vivian Cannon is an active patron of Baltimore's art scene, regularly volunteering at the Walters Art Museum and attending live jazz sessions featuring Wynton Marsalis and folk shows by Joan Baez,
    while they also curate a monthly community exhibition that blends security themes with local artists' perspectives.
  travel: Vivian Cannon prefers carefully planned weekend getaways to historic East Coast cities like Annapolis and Philadelphia, yet they occasionally book spontaneous trips to European art capitals such
    as Florence and Amsterdam, balancing a limited retirement budget with a deep yearning to explore world‑class museums.
  culinary: Vivian Cannon experiments with global cuisines, frequently preparing dishes like Greek moussaka, Indian chana masala, and a spicy jambalaya using fresh basil from their garden, but they sometimes
    over‑salt a stew when distracted by a phone call.
  core: Vivian Cannon blends a keen eye for security with a boundless curiosity for art, using community engagement as a bridge between safety and culture while navigating the quirks of mid‑life budgeting
    and health management.
background:
  cultural: Vivian comes from a White Anglo‑American background, raised in the suburban neighborhoods of Maryland during the 1970s and 1980s. Her family emphasized self‑reliance, community participation,
    and an appreciation for broader cultural experiences. Relocating to Baltimore exposed her to a richly diverse urban environment, shaping her worldview and fostering a deep respect for the city's multicultural
    tapestry. While she identifies with Mid‑Atlantic middle‑class values and traditions, she actively embraces the artistic, musical, and culinary influences of Baltimore's neighborhoods, integrating them
    into her daily life and personal identity.
attributes:
