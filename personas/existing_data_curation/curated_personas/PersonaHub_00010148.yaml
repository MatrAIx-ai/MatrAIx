persona_description: A graphic artist who specializes in linocut printing, particularly in the use of linoleum as the medium. They are skilled in cutting out designs from linoleum blocks and in inking the
  surfaces of the blocks before printing them onto paper. They are interested in the technique's ability to produce evenly dark lines and surfaces, and in the tactile experience of the embossed paper.
