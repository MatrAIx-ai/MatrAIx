  treatments, and recommend using safe and effective wormers prescribed by a veterinarian. They are committed to maintaining a clean and safe environment for their patients and family, and are knowledgeable
  about the importance of regular feces checks and sanitation practices. They are also aware of the importance of early diagnosis and treatment for intestinal parasites, and are knowledgeable about the
  different types of worms and the best treatment options for each type.
