    User 1: Wow, that''s impressive!

    User 2: Thanks. I like to be able to do things for myself.

    User 1: Do you have any kids?

    User 2: No, I don''t have any kids.

    User 1: Oh, that''s too bad. I love being a mom.

    User 2: I''m sure it''s a lot of work, but it''s also very rewarding.

    User 1: It is. I love spending time with my kids and watching them grow up.

    User 2: That''s what I want to do someday. Have a family and raise kids.

    User 1: You should do it! It''s the best thing in the world.

    User 2: I will. I just need to find the right woman first.

    User 1: I''m sure you''ll find her. Just keep looking.

    User 2: Thanks. I will.

    User 1: So, what do you like to do for fun?

    User 2: I like to work on my cars, go fishing, and play video games.

    User 1: I like to do those things too! I love working on cars and playing video games.

    User 2: That''s great! We should get together sometime and do something together.

    User 1: That sounds like a lot of fun. I''d love to do that.

    User 2: Great! We can set something up soon.

    User 1: Okay. I''ll talk to you later.

    User 2: Bye!

    User 1: Bye!'
