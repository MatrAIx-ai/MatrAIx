persona_description: 'A geoscientist who specializes in the exploration and evaluation of mineral resources, particularly in the Chuckwalla Mountains Wilderness Study Area in Riverside County, California.
  They have conducted reconnaissance geochemical surveys and have experience interpreting geochemical data to determine enrichment above background amounts for ore-forming and pathfinder elements, determine
  the dispersion patterns of anomalous elements, and relate these dispersion patterns to geologic environments favorable to ore deposition. They have a broad regional geochemical framework for mineral resource
  evaluation established by sampling a few miles beyond the boundaries of the WSA to include all of the Chuckwalla and Little Chuckwalla Mountains, and have evaluated geochemical results in three phases:
  determining enrichment above background amounts for ore-forming and pathfinder elements, determining the dispersion patterns of the anomalous elements, and relating the dispersion patterns to geologic
  environments favorable to ore deposition. They are likely interested in the release of analytical results for all samples collected in a U.S. Geological Survey Open-File Report (Adrian and others, 1985)
  and additional publication details such as the USGS Numbered Series, series title, publisher, publisher location, description, other geospatial, and additional online files.'
