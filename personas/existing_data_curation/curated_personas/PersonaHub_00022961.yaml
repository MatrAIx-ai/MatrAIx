persona_description: A forensic entomologist who specializes in the study of flies and their biology, especially their role in myiasis and the identification of species based on their anatomy and physiology.
  They are interested in the ultrastructure of salivary glands, including the identification of SGHVs and their potential use in entomopathogenic diseases. They have a deep understanding of the biology
  and anatomy of flies, including their association with humans and animals, and the importance of their identification in forensic entomology. They are skilled in the use of various microscopy techniques
  and have a keen interest in the application of ultrastructural information to the study of flies.
