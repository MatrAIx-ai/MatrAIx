  hobbies: '[''Hiking in the Sonoran Desert'', ''Mountain biking'', ''Landscape photography'', ''Playing tabletop and strategy board games'', ''Coding personal data‑analysis projects'', ''Cooking Southwestern
    dishes'', ''Volunteering at community shelters'', ''Reading science‑fiction novels'']'
  career_goals: Ryan aims to progress to a senior HR Business Partner position within the next five years, leveraging his technical background to lead people‑analytics initiatives and shape a culture of
    employee wellbeing. He aspires to become an HR director who integrates data insights with compassionate leadership, establishing flexible, inclusive programs that adapt to the evolving needs of a growing
    tech workforce while mentoring emerging HR professionals.
