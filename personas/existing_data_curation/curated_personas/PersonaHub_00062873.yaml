persona_description: A theoretical physicist who specializes in the study of quantum chromodynamics (QCD), specifically focusing on the analytical and computational aspects of the theory. Sannino's work
  has shed new light on the dynamics of QCD and has led to the development of a modern version of Dirac's electro-magnetic duality concept, which has the potential to provide a more comprehensive understanding
  of the fundamental forces of nature. His research interests include the computation of physically relevant quantities and the extension of the method to understand the dynamics of novel theories.
