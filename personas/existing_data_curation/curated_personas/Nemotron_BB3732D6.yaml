personas:
  professional: Luis Hernandez, a budding community-focused marketer, leverages bilingual communication and Canva and Adobe Photoshop expertise to craft culturally resonant social media stories, while they
    channel their curious, assertive, and collaborative nature into inclusive event planning and swift conflict resolution.
  sports: Luis Hernandez stays active through weekly pickup soccer matches with the Austin Lone Stars, follows the Dallas Cowboys for football and the Dallas Mavericks for basketball, and hits local gyms
    for strength training, balancing a competitive edge with a laid‑back love for weekend trail runs in the Hill Country, while they view teamwork as a core part of personal growth.
  arts: Luis Hernandez captures vibrant street scenes inspired by photographers Sebastião Salgado and Brandon Stanton, sketches landscapes while listening to Cuban‑inspired jazz maestro Chucho Valdés and
    indie folk singer Phoebe Bridgers, and regularly attends live performances by local salsa band La Sonora del Barrio, allowing them to fuse visual and auditory influences into a distinct artistic voice.
  travel: Luis Hernandez prefers spontaneous weekend road‑trips across Texas—exploring Marfa’s art installations and hiking the Hill Country—while budgeting for occasional flights to bustling cities such
    as Mexico City and Quito, where they aim to soak up street art and culinary scenes before dreaming of a long‑term sabbatical in the Galápagos Islands, and they balance adventure with a modest travel
    budget.
  culinary: Luis Hernandez gravitates toward zesty al pastor tacos, tangy ceviche with lime and cilantro, and hearty pupusas, cooks at an intermediate level using fresh oregano, jalapeños, and achiote,
    yet they frequently treat themselves to local food festivals where they savor grilled elote, churros, and artisanal craft beer.
  core: Luis Hernandez fuses a restless curiosity for street art with a nightly habit of scrolling Instagram for inspiration, all while they procrastinate on updating their portfolio until the last minute,
    juggling a jam‑packed social calendar and occasional caffeine‑driven late‑night sessions.
background:
  cultural: Luis grew up in a bilingual household where Ecuadorian customs were celebrated alongside American life. Family gatherings featured dishes like ceviche, llapingachos, and plantain empanadas,
    and holidays such as Carnaval and Día de los Difuntos were observed with traditional music and dance. Moving to Justin, Texas, he has blended his heritage with the local Texan culture, participating
    in community events, maintaining fluency in both Spanish and English, and often acting as a cultural bridge for his peers. His identity reflects a strong sense of family, respect for diversity, and
    pride in his Andean roots.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Social media content creation", "Photography", "Basic graphic design (Canva, Photoshop)", "Event coordination", "Team leadership", "Customer service",
    "Basic computer troubleshooting", "Time management", "Conflict mediation"]'
  hobbies: '["Street photography", "Sketching and painting", "Playing soccer", "Salsa dancing", "Attending live music shows", "Exploring local food festivals", "Volunteering at community centers", "Reading
    graphic design blogs", "Road trips through Texas", "Learning about Ecuadorian literature"]'
  career_goals: Driven by his curiosity and love for art, Luis aims to build a career in community-focused marketing and cultural programming. Over the next few years he plans to earn certifications in
    digital marketing, develop a portfolio of graphic design and photography work, and secure an entry-level position as a social media coordinator for a local business or non-profit. His long-term ambition
    is to become a community outreach manager or arts program director, where he can blend his creative skills with his passion for fostering inclusive cultural events for the Latino community in Texas.
