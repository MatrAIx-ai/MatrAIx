persona_description: A New Zealand-based tourism industry professional with a deep understanding and expertise in the field of accessible tourism. They have extensive experience in researching and analyzing
  the market trends, barriers and opportunities in the tourism industry, and have a keen interest in promoting inclusive travel and accessibility. They are well-versed in the latest developments and initiatives
  in accessible tourism, and have a passion for making tourism more accessible and inclusive for people with disabilities. They are also knowledgeable about the challenges and limitations faced by people
  with disabilities in accessing the tourism industry, and are committed to advocating for their rights and improving the accessibility of travel and tourism services. They are also well-versed in the use
  of technology and digital media to promote accessible tourism and are actively engaged in promoting the use of accessible tourism products and services.
