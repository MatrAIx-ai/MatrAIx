    ''Cross‑cultural liaison'', ''Budget tracking and financial reporting'', ''Procurement and inventory management'', ''Compliance and SOP development'', ''Customer service and conflict resolution'', ''Time
    management and multitasking'', ''Assertive communication'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Hiking and nature walks'', ''Yoga and meditation'', ''Reading popular science and mystery novels'', ''Bilingual book club'', ''Volunteer STEM mentoring'', ''Attending
    Mexican cultural festivals'', ''Gardening houseplants'', ''Exploring local wineries'', ''Photography of family events'']'
  career_goals: Gloria’s primary career ambition is to move from an administrative assistant role into a senior office manager or technical project coordinator position within a biotech or engineering firm,
    where she can leverage her STEM background to oversee complex project logistics. She plans to obtain the Certified Administrative Professional (CAP) credential and complete a Project Management Professional
    (PMP) certification within the next two years. Long‑term, she hopes to lead a cross‑functional administrative team, implement workflow automation, and mentor other bilingual professionals, especially
    those from underrepresented Mexican‑American backgrounds, to foster greater inclusion in technical workplaces.
