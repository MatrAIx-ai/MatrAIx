personas:
  professional: Cynthia Southerland, a veteran financial planner and small‑business consultant, leverages their graduate business training, strategic planning acumen, and polished public‑speaking skills
    to guide community nonprofits and intergenerational programs while methodically managing grant proposals and board responsibilities.
  sports: Cynthia Southerland, an enthusiastic participant in senior low‑impact dance at the community center and a regular walker through the Birmingham Botanical Gardens, cheerfully supports the Birmingham
    Barons baseball team and follows the Alabama Crimson Tide football season, using gentle stretching routines to stay fit, and they often discuss game highlights with fellow club members.
  arts: Cynthia Southerland, a devoted choir member and avid reader of historical fiction and literature that explores civil‑rights era narratives, enjoys listening to jazz legends like Ella Fitzgerald
    and gospel choirs, while crocheting and quilting works inspired by traditional patterns they showcase at local art fairs.
  travel: Cynthia Southerland, who prefers well‑planned, low‑stress trips, enjoys weekend getaways to historic Savannah, Georgia, annual visits to New Orleans for its music festivals, and a dream of exploring
    the gardens of Kyoto, all while balancing travel costs with a modest savings plan, and they often document each journey in a handwritten journal.
  culinary: Cynthia Southerland, a Southern‑cuisine aficionado who perfects fried chicken, fluffy biscuits, and peach cobbler at home, also experiments with global flavors such as Thai basil chicken and
    Moroccan tagine, often incorporating fresh herbs from their garden like basil, thyme, and collard greens into their recipes.
  core: Cynthia Southerland blends sharp financial expertise with a lively community spirit, tending their garden, quilting, and organizing intergenerational events, all while juggling a habit of over‑checking
    spreadsheets and a love for jazz that fuels their daily rhythm.
background:
  cultural: Born and raised in Birmingham’s historic Black neighborhoods during the 1950s and 60s, Cynthia grew up amid the Civil Rights Movement, witnessing pivotal events that shaped her sense of justice
    and community responsibility. Her family placed great emphasis on Southern hospitality, storytelling, and preserving African American traditions through food, music, and oral history. A lifelong member
    of a local Baptist church, she has been involved in church-based service projects, gospel choirs, and community outreach programs that support neighborhood cohesion. Cynthia maintains strong ties to
    the African American community in Jefferson County, regularly attending cultural festivals, supporting Black-owned businesses, and participating in civic organizations dedicated to celebrating Black
    heritage and fostering economic empowerment. These cultural experiences inform her values of resilience, collective uplift, and the importance of intergenerational knowledge sharing.
