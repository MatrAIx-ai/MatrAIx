  hobbies: '[''Gardening'',''Book Club'',''Crocheting and Quilting'',''Cooking Southern Cuisine'',''Church Choir Participation'',''Community Dance Classes'',''Genealogy Research'',''Walking in Birmingham
    Botanical Gardens'',''Jazz and Gospel Music Listening'']'
  career_goals: Cynthia aims to launch a community-based financial literacy series that equips seniors and young adults with practical budgeting skills, while also serving as a board member for a local
    nonprofit focused on fostering Black entrepreneurship in Birmingham. She plans to mentor undergraduate women in business through a partnership with Alabama State University, and hopes to compile her
    memories of the Civil Rights era into a memoir that celebrates the resilience of her community. Additionally, she aspires to organize an annual intergenerational cultural heritage festival that highlights
    African American history, music, and cuisine in Jefferson County.
