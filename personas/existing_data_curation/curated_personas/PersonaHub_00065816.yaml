persona_description: A linguist who specializes in the study of language variation and change, with a particular interest in the ways in which speakers' usage varies over time and across different social
  groups. This person likely has extensive knowledge of sociolinguistics and historical linguistics, as well as an understanding of the ways in which language is shaped by social factors. They are likely
  to be familiar with the work of Sapir and other linguists on the topic, and may have conducted their own research on language variation. This person is likely to be interested in the ways in which language
  usage varies within and across speakers, and may have conducted research on topics such as the relative frequency of different forms of language use, the ways in which speakers choose words and sentence
  structures, and the ways in which speakers' usage is shaped by social factors.
