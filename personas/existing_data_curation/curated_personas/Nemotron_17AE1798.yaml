    codes'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending live jazz and theater performances'', ''DIY smart‑home automation projects'', ''Woodworking and furniture making'', ''Gardening'', ''Singing
    in church choir'', ''Cooking Southern cuisine with creative twists'', ''Community outreach and youth mentorship'', ''Fishing at Percy Priest Lake'', ''Hiking local trails'']'
  career_goals: He aims to become a Master HVAC Technician and eventually open his own HVAC service and consulting firm that specializes in energy‑efficient retrofits and smart‑home climate solutions. Over
    the next five years, he plans to obtain additional certifications in solar‑powered HVAC systems and LEED‑qualified building practices. Michael also aspires to develop a community apprenticeship program
    in Shelby County to mentor young African‑American students interested in skilled trades, fostering a pipeline of talent and offering workshops on sustainable home technologies. In the longer term, he
    envisions becoming a regional trainer for NATE and EPA certifications, contributing to industry standards and advocating for greater representation of minority technicians in the trade.
