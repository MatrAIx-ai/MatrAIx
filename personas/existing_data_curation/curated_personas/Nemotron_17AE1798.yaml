personas:
  professional: Michael Hawkins, a 45-year-old master HVAC technician, leverages their EPA Section 608 and NATE certifications alongside their creative problem‑solving and talkative charisma to diagnose
    complex climate systems, translate technical jargon for homeowners, and design smart‑home retrofits that blend energy efficiency with artistic flair.
  sports: Michael Hawkins, an avid fisherman and weekend hiker, is a loyal supporter of the Memphis Grizzlies and Memphis Tigers, belongs to the Percy Priest Lake Anglers Club, and incorporates early‑morning
    trail runs into their fitness routine to balance their physically demanding job.
  arts: Michael Hawkins fuels their creative soul by attending Memphis Brooks Museum exhibitions, listening to live jazz sets featuring Wynton Marsalis, and performing in their church choir, while drawing
    inspiration from the paintings of Georgia O'Keeffe and the storytelling of playwright August Wilson.
  travel: Michael Hawkins plans family trips with a mix of spontaneity and spreadsheet precision, often escaping to Nashville's music scene, taking road trips to New Orleans for its cuisine, dreaming of
    hiking the Grand Canyon, and recently explored Asheville's craft breweries.
  culinary: Michael Hawkins, an enthusiastic home cook, delights in reinventing Southern classics such as smoked paprika shrimp and grits, collard greens sautéed with garlic and rosemary from their garden,
    and sweet potato pie with a hint of cardamom, showcasing their moderate-to-advanced culinary skills at family gatherings.
  core: Michael Hawkins blends technical mastery with artistic curiosity, juggling HVAC expertise, jazz enthusiasm, smart‑home tinkering, and a habit of buying the latest gadgets even when their credit
    card balance wobbles.
background:
  cultural: Michael’s cultural background is rooted in the African‑American community of the South. Raised in a close‑knit family in Tennessee, he grew up with the traditions of gospel music, storytelling,
    and Southern cuisine, and he actively participates in church and community events that celebrate Black heritage. The values of resilience, mutual support, and collective progress, passed down through
    generations, shape his outlook on life and work. He honors the legacy of Black tradespeople who paved the way in skilled labor, and he strives to be a role model for younger Black men in his region.
    His appreciation for jazz, blues, and contemporary Black art reflects his deep connection to the cultural fabric of the African‑American experience in the Mississippi Valley. Michael also observes cultural
    milestones such as Juneteenth and Black History Month, using these occasions to mentor youth and promote pride in his heritage.
attributes:
  skills: '[''HVAC system installation'', ''Refrigeration system repair'', ''Diagnostic troubleshooting'', ''EPA Section 608 certification'', ''NATE certification'', ''Energy‑efficiency retrofitting'',
