persona_description: A researcher who studies the relationship between school climate and student achievement, focusing on the positive aspects of school environments that can improve academic outcomes.
  They are interested in the specific definitions and methods used in school climate research and the potential for positive school climates to break the negative influences of low socioeconomic backgrounds.
  They are also interested in the need for consistent, reliable, and longitudinal research to strengthen findings and demonstrate the strength of school climate improvements' effects on classroom achievement.
