  career_goals: Driven by a competitive streak and a desire for novelty, Alexander aims to rise to the role of Head of Security at a major resort casino in the Southeast, where he can design and implement
    next‑generation surveillance systems that incorporate AI‑driven analytics. He plans to obtain Certified Protection Professional (CPP) certification and later launch a boutique consulting firm focused
    on risk management for gambling establishments. Long‑term, he envisions moving into an executive risk‑management position, influencing corporate policy and shaping industry standards for security and
    player protection.
