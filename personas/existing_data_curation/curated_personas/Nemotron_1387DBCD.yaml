  hobbies: '[''Abstract Painting'', ''Street Photography'', ''Salsa Dancing'', ''Trivia Night Participation'', ''Chess'', ''Fantasy Sports Leagues'', ''Science‑Fiction Reading'', ''Philosophy Exploration'',
