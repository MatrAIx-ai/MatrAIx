persona_description: A linguist who is passionate about the documentation and revitalization of First Nations Languages in British Columbia, particularly focusing on the Ktunaxa language. She has a strong
  commitment to the preservation of these languages and has been actively involved in field work and documentation projects. The person has extensive experience working with indigenous communities and is
  skilled in developing grammars and language descriptions. They have a unique perspective on the importance of language in cultural preservation and are committed to making the knowledge of these languages
  accessible to the younger generations. The persona is likely to be interested in the history, culture, and language of the Ktunaxa people and is excited to share their experiences and knowledge through
  interviews and online resources.
