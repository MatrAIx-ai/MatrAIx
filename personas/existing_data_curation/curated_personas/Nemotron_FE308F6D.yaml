  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Photography of nature'', ''Playing acoustic guitar'', ''Robotics club projects'', ''Reading science‑fiction'', ''Hiking and trail exploring'',
    ''Volunteering at community center'', ''Organizing youth art workshops'']'
  career_goals: Kenneth aspires to combine his love for art, technology, and community service in a career that allows him to create meaningful visual experiences. He aims to attend a high school with a
    strong visual arts program and later pursue a bachelor's degree in graphic design or interactive media, with a focus on user experience and digital storytelling. He also hopes to work with local nonprofit
    arts organizations or community centers in Olympia, using his design skills to develop outreach materials and cultural programs that engage diverse audiences. Long‑term, he envisions a role where he
    can mentor younger students and contribute to the cultural vibrancy of the Pacific Northwest.
