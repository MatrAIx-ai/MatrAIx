  career_goals: He dreams of becoming an engineer who designs gadgets that make everyday life easier, or even an astronaut who explores new worlds. He imagines opening a small bike‑repair stand in the summer
    to share his practical tinkering skills, and hopes to win a science‑fair award for an invention that combines robotics and renewable energy. His competitive nature pushes him to master more advanced
    Scratch projects and eventually learn Python so he can create his own video‑game levels.
