  hobbies: '[''Gardening'', ''Traditional Puerto Rican cooking'', ''Singing in senior choir'', ''Bingo'', ''Spanish-language book club'', ''Salsa dancing'', ''Volunteering at food bank'', ''Walking on nature
    trails'', ''Reading historical novels'', ''Watching telenovelas'', ''Crochet and quilting'']'
  career_goals: Although retired, Isabel is eager to stay active and give back to her community. She aims to lead a senior advisory board at the local community center, mentor younger Puerto Rican families
    in navigating local resources, and offer cooking classes that preserve her island’s culinary traditions. Isabel also wants to learn digital storytelling to document her family’s history and share it
    online. She hopes to volunteer for health outreach programs in both North Carolina and Puerto Rico, and she plans a trip back to the island to reconnect with extended family and support community initiatives
    there. Ultimately, she seeks to be recognized as a cultural bridge and a trusted elder who helps link generations and cultures.
