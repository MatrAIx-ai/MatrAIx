persona_description: A neuroscientist and geneticist working at Baylor College of Medicine, specifically at the Jan and Dan L. Duncan Neurological Research Institute at Texas Children's Hospital. Specializes
  in the study of neurodegenerative disorders, particularly MeCP2 duplication syndrome, and has identified two genes involved in mediating anxiety and social behavioral problems. Has experience in molecular
  genetics, human genetics, and neurology, and has published research in leading scientific journals. Has expertise in the field of translational research, where the findings from the lab are applied to
  the clinic to develop treatments for patients.
