  career_goals: Johnny aims to build a career that moves beyond entry-level cleaning toward supervisory and managerial roles in facilities management. Over the next two years he plans to complete his associate’s
    degree in Facilities Management and earn certifications such as the ISSA Clean Technician and OSHA 10. He hopes to become a shift supervisor, then a facilities manager, leveraging his interest in sustainable
    cleaning practices to introduce green initiatives in his workplace. Long-term, Johnny envisions launching his own small eco-cleaning business serving the Lawrence community, giving him both autonomy
    and a stable, less stressful schedule.
