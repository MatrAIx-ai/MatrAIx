personas:
  professional: Johnny Barger, a 21‑year‑old facilities‑service technician, leverages their solid janitorial expertise, OSHA knowledge, and curiosity for eco‑cleaning to solve campus maintenance challenges
    while they keep a friendly rapport with tenants and aim for a supervisory role.
  sports: Johnny Barger, a former high‑school football player turned weekend skateboarder, roots for the Kansas Jayhawks and the Kansas City Chiefs while they hit the trails of Clinton State Park for hikes
    and join the Lawrence Skate Club for casual skate sessions, treating fitness as a flexible, mood‑driven routine.
  arts: Johnny Barger unwinds by strumming acoustic renditions of The White Stripes and Phoebe Bridgers at Lawrence’s Mission Café, browsing vinyl at the local indie record store for hidden gems like The
    Appleseed, while they binge‑watch The Expanse and strategize in Civilization VI, weaving music, gaming, and sci‑fi into their creative escape.
  travel: Johnny Barger prefers spontaneous weekend getaways, often camping at Clinton State Park or road‑tripping to Rocky Mountain National Park, while they dream of a sustainable adventure tour in Portland,
    balancing low‑budget planning with a love for outdoor exploration.
  culinary: Johnny Barger favors hearty Kansas‑style barbecue ribs and homemade chili spiced with smoked paprika, occasionally whipping up a quick grilled cheese or ramen bowl seasoned with fresh basil,
    and they enjoy hunting for locally roasted coffee beans at the farmer’s market.
  core: Johnny Barger is a curious yet laid‑back 21‑year‑old who blends eco‑friendly ambition with a love for guitar strings, skate‑boarding, and late‑night gaming, while they occasionally let worry hijack
    their schedule.
background:
  cultural: Johnny was raised in a working‑class, white family in the heart of Lawrence, Kansas. His upbringing reflects classic Midwestern values of modesty, community involvement, and practicality. He
    grew up attending local public schools, where he participated in football and school clubs, and spent summers at family gatherings that emphasized home‑cooked meals and holiday traditions like Thanksgiving
    barbecues. While his roots are in a German‑American heritage, living in a college town exposed him to a blend of student cultures and progressive ideas, fostering his openness to diverse perspectives
    and his curiosity about sustainable practices. He identifies with the region’s strong sense of neighborly responsibility and enjoys attending local events such as the Lawrence Fun One festival.
