personas:
  professional: Robert Thoman, a 20‑year‑old delivery driver and sales associate, combines a Class B license, route‑planning savvy, and budding contemporary‑art knowledge to chart a path toward a boutique
    logistics service that ships gallery pieces and local crafts.
  sports: Robert Thoman regularly surfs at La Jolla, hikes Torrey Pines, plays beach volleyball with a local club, follows the San Diego Padres and the San Diego State Aztecs men's soccer team, and tracks
    the NBA’s Golden State Warriors for their strategic play.
  arts: Robert Thoman frequents the Museum of Contemporary Art San Diego, tracks emerging street artists like Shepard Fairey and local muralist Retna, sketches in a battered notebook while listening to
    lo‑fi beats, and curates limited‑edition prints from online drops.
  travel: Robert Thoman prefers spontaneous road trips along the Pacific Coast Highway, often weekend‑hopping to Big Sur or Santa Barbara, while dreaming of a cross‑country art‑focused tour that includes
    New York’s Chelsea galleries and Austin’s South Congress art scene.
  culinary: Robert Thoman enjoys fish tacos with cilantro‑lime salsa, avocado toast dusted with chili flakes, and homemade Baja‑style shrimp quesadillas, cooks simple meals with fresh herbs, but sometimes
    skips meals when engrossed in car repairs.
  core: Robert Thoman blends a pragmatic delivery career with an indie‑art aesthetic, obsessively documenting San Diego’s sunrise beaches while juggling CDL ambitions and a side hustle curating limited‑edition
    prints.
background:
  cultural: Robert is a native‑born white American raised in a middle‑class suburb of San Diego. His family traces its roots to German and Irish ancestry, bringing a work‑ethic and community‑oriented mindset.
    Growing up in Southern California exposed him to a multicultural environment—bilingual signage, diverse culinary scenes, and a thriving arts community—that sparked his curiosity about different cultures
    and artistic expressions. He celebrates typical American holidays while also engaging in local traditions such as the San Diego Art Walk, beach clean‑ups, and neighborhood block parties, reflecting
    a blend of mainstream American values and the region’s eclectic cultural influences.
attributes:
  skills: '[''Commercial Driving (Class B)'', ''Route Planning & GPS Navigation'', ''Vehicle Maintenance & Troubleshooting'', ''DOT Regulations Compliance'', ''Customer Service & Sales Communication'',
    ''Inventory Management'', ''Time Management'', ''Problem Solving Under Pressure'', ''Basic Conversational Spanish'', ''Contemporary Art Knowledge'']'
  hobbies: '[''Street Art Photography'', ''Sketching and Drawing'', ''Visiting Art Galleries'', ''Reading Art History and Design Books'', ''Short Hikes in Torrey Pines'', ''Surfing'', ''Strategy Video Gaming'',
    ''Car Modification and Meetups'', ''Listening to Indie Music'', ''Learning Basic Spanish'']'
  career_goals: Robert aims to upgrade to a Class A CDL within the next year to qualify for long‑haul and specialized freight routes, especially those transporting high‑value or artistic goods. He plans
    to enroll in a community‑college logistics program to learn supply‑chain management and eventually transition into a logistics coordinator role. Long‑term, he hopes to manage a small fleet or start
    a boutique delivery service that partners with local galleries and craft retailers, merging his logistical expertise with his passion for the arts. He also envisions a side venture curating and selling
    limited‑edition art prints online, using his knowledge of both transportation and contemporary art markets.
