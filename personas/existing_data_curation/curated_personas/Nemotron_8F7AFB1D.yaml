personas:
  professional: Sarah Sweezy is a budding LEGO architect who treats each building session like a mini‑engineering project, planning color‑coded structures methodically, sharing designs with friends, and
    proudly presenting completed cityscapes at school shows; they love receiving applause from classmates.
  sports: Sarah Sweezy excels in soccer with the Tiny Tigers Soccer Club, delights in Tuesday dance classes at Little Steps Ballet, cheers for the U.S. Women’s National Soccer Team and the Los Angeles Lakers
    whenever she watches games on family TV, and they light up when scoring a goal in practice.
  arts: Sarah Sweezy channels her creative spark by drawing Dr. Seuss‑inspired characters, arranging her crayons by hue, proudly showcasing her bead bracelets at school art fairs, dancing to the upbeat
    tunes of The Wiggles while humming along to Disney’s ‘Let It Go,’ and they often hum the tune while threading beads.
  travel: Sarah Sweezy thrills on weekend trips to the nearby Willow Creek Nature Preserve for leaf collecting, excitedly recalls a family vacation to Disneyland where she rode Space Mountain, dreams of
    someday seeing the Eiffel Tower in Paris while sipping a croissant, and they keep a scrapbook of each adventure.
  culinary: Sarah Sweezy loves helping in the kitchen by stirring mac and cheese, assembling peanut‑butter‑and‑jelly sandwiches, sprinkling shredded cheddar on veggie sticks, although they sometimes forget
    to wipe the splattered sauce before returning to their art projects.
  core: Sarah Sweezy is an organized, sociable six‑year‑old who blends LEGO engineering with vivid coloring, saves every penny for her next creative project, soothes anxiety with art, and they occasionally
    nibble their nails when nervous.
background:
  cultural: Sarah was raised in Reading, Pennsylvania, a small city in Berks County characterized by a mix of suburban neighborhoods and historic industrial roots. Her family follows many mainstream American
    customs, celebrating holidays such as Thanksgiving, Fourth of July, and Christmas, and participates in community events like the Reading Fall Festival and local farmers' market visits. The community
    is predominantly white, and she attends a public elementary school where she interacts with classmates from various backgrounds. Her upbringing includes church gatherings that emphasize kindness and
    service, which reinforce her cooperative and caring nature.
attributes:
  skills: '[''Independent reading of picture books'', ''Basic addition and subtraction'', ''Following multi-step instructions'', ''Organizing school supplies'', ''Cooperative play and teamwork'', ''Using
