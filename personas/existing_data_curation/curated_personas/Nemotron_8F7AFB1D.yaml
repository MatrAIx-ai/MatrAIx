  hobbies: '[''Building LEGO structures'', ''Drawing and coloring'', ''Crafting with beads and glue'', ''Reading picture books'', ''Dance class'', ''Soccer practice'', ''Nature walks and collecting natural
    items'', ''Playing educational tablet games'']'
  career_goals: Sarah dreams of growing up to help others learn and stay healthy. She often says she wants to become a teacher because she enjoys sharing knowledge and organizing activities for her classmates.
    She also loves animals and imagines working as a veterinarian, where she could care for pets. Her practical side leads her to think about jobs that involve clear routines and making a difference in
    her community, such as a librarian or a community health aide. Overall, her ambition is to combine her love for learning, caring for people and animals, and creating organized, supportive environments.
