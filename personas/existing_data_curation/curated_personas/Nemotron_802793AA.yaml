  hobbies: '[''Gardening'', ''Journaling'', ''Reading (African‑American literature)'', ''Yoga'', ''Meditation'', ''Art gallery visits'', ''Floral photography'', ''Cooking (Southern and Caribbean cuisine)'',
    ''Community volunteering'', ''DIY crafts'', ''Listening to R&B, jazz, and gospel music'', ''Attending cultural festivals'']'
  career_goals: Gloria’s primary ambition is to open her own boutique floral studio in Sacramento that specializes in eco‑friendly, culturally resonant designs. She plans to earn certification from the
    American Institute of Floral Designers, expand her services to include mindfulness‑focused workshops that celebrate African‑American heritage, and publish a guidebook on sustainable floral practices.
    Long‑term, she envisions becoming a thought leader who mentors emerging designers while maintaining a balanced, low‑stress lifestyle.
