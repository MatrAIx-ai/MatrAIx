personas:
  professional: Gloria Green, a 25‑year‑old floral designer, marries botanical expertise with narrative storytelling to create meticulously planned, eco‑friendly arrangements for weddings, corporate events,
    and private celebrations, while leveraging Adobe Photoshop and social media to showcase her work and maintaining a disciplined project timeline.
  sports: Gloria Green supports the Sacramento Kings basketball team, participates in weekly yoga classes at a downtown studio, occasionally joins a community garden softball league, and prefers low‑impact
    cardio such as brisk walks along the American River Parkway to maintain fitness without disrupting her structured schedule.
  arts: Gloria Green frequents the Crocker Art Museum and local galleries, draws creative inspiration from the paintings of Georgia O'Keeffe, the contemporary photography of Annie Leibovitz, and the poetry
    of Maya Angelou, while capturing her own floral arrangements through a Nikon D3500, weaving visual storytelling into her design process.
  travel: Gloria Green favors short, well‑planned trips that blend cultural immersion with relaxation, having explored Savannah’s historic district, New Orleans’ music scene, and the Caribbean island of
    Jamaica to study tropical flora, and she dreams of a future retreat to the lavender fields of Provence to deepen her botanical knowledge.
  culinary: Gloria Green delights in cooking Southern comfort dishes such as shrimp and grits and Caribbean favorites like jerk chicken, often seasoning with thyme, scallions, allspice, and Scotch bonnet
    peppers, while experimenting with fresh herbs from her indoor garden to create innovative flavor pairings, though they sometimes over‑salt in the quest for depth.
  core: Gloria Green is a detail‑oriented floral artist who balances eco‑friendly design with mindfulness practices, worries about finances, and habitually over‑organizes both her workspace and her thoughts.
background:
  cultural: Gloria identifies as a Black woman raised in Sacramento’s multicultural environment. Her family blends Southern culinary traditions with West Coast influences, and she grew up surrounded by
    African‑American music, storytelling, and community gatherings. She draws inspiration from the symbolic use of flowers in Black cultural celebrations such as Juneteenth and Kwanzaa, incorporating these
    motifs into her designs. Active in local Black arts collectives, she values mentorship, community empowerment, and preserving cultural narratives through her floral work.
