  career_goals: At 71, Jimy aims to maintain her independence and health while channeling her lifelong curiosity into new creative ventures. She plans to expand her small home-based craft business by selling
    original paintings, quilts, and crocheted items at local markets and through an online storefront. Jimy also wishes to volunteer as a mentor for younger housekeeping workers in Arroyo, teaching best-practice
    cleaning techniques and time-management skills. Additionally, she aspires to document her personal history and family stories in a memoir that blends narrative with illustrations, preserving her cultural
    heritage for future generations. Finally, she hopes to continue learning abstract art concepts and modern craft methods through community workshops and online courses.
