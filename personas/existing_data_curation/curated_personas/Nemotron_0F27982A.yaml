    in improvisational theater workshops'', ''Listening to live music at local venues'']'
  career_goals: Inspired by his love of art and community, Eduardo aims to turn his informal event‑organizing experience into a professional role as a community arts coordinator or cultural‑program manager.
    He plans to first obtain his GED and then enroll in a community‑college certificate program in graphic design or hospitality management. Over the next few years he hopes to launch a small venture—a
    pop‑up taco stand or a mobile coffee‑and‑art cart—that showcases Mexican flavors and local student artwork. Simultaneously, he wants to improve his organizational skills through workshops and mentorship,
    eventually securing a stable position with a local non‑profit where he can design and run multicultural festivals, youth art workshops, and public murals. His long‑term ambition is to become a catalyst
    for cultural exchange in his town and to mentor other young people who share his curiosity and social spirit.
