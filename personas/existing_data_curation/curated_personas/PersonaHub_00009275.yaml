persona_description: A landscape architect who specializes in designing and implementing sustainable and adaptive reuse projects that incorporate cultural and historical elements into the design. She has
  a deep understanding of the transformative history of the site and the scale and culture of its setting, and she is passionate about creating open and pleasing environments with multi-functional indoor
  and outdoor spaces. She is committed to using sustainable technologies and building system design to promote observation and interaction between student and building, and she believes that infusing multi-sized
  social spaces throughout a facility ultimately will provide the most flexibility. She is proud of how each of these projects have come together holistically, from educational imperatives to cultural context
  to environmental stewardship, and she is dedicated to creating buildings that are not only functional but also beautiful and meaningful.
