personas:
  professional: Hilsia Betances, a retired community arts coordinator turned senior mentor, leverages their bilingual fluency and decades of event planning, caregiving, and garden curation to bridge generations,
    organize folk‑art exhibitions, and guide younger volunteers through compassionate, detail‑oriented projects.
  sports: Hilsia Betances enjoys gentle desert walks along the Organ Mountains at sunrise and a weekly senior yoga class, and they stay active by volunteering as a water‑refill helper at New Mexico State
    Aggies football games, while following the Albuquerque Isotopes baseball team, balancing low‑impact exercise with community sports enthusiasm.
  arts: Hilsia Betances frequents the Las Cruces Museum of Art to view rotating folk‑art exhibitions, delights in the vibrant melodies of the local mariachi group Los Cielitos, cherishes classical piano
    recitals by Lang Lang at the regional symphony, and reads poetry collections by Octavio Paz, allowing these artistic encounters to inform their own craft of knitting and storytelling.
  travel: Hilsia Betances prefers leisurely, well‑organized trips with family or a small circle, having enjoyed senior tours of Carlsbad Caverns and White Sands, a relaxed weekend in Santa Fe’s art districts,
    and a scenic drive along historic Route 66, while they hope to someday explore the Grand Canyon’s South Rim in the comforts of a guided wheelchair‑accessible program.
  culinary: Hilsia Betances, an adept home chef, lovingly prepares traditional southwestern dishes such as tamales wrapped in corn husks, mole with toasted chilies and chocolate, and pozole simmered with
    hominy and pork, seasoning them with garden‑fresh cilantro, dried ancho and oregano, while also delighting in baking pan‑dulces for Día de los Muertos gatherings and sharing their culinary creations
    at community potlucks.
  core: Hilsia Betances is a reflective, community‑oriented storyteller who blends meticulous organization with quiet curiosity, nurturing cultural traditions through gardening, craft, and mentorship, even
    as they battle occasional worry and a penchant for forgetting small appointments.
background:
  cultural: Born to Mexican immigrant parents in the Southwest, Hilsia grew up in a bilingual household that celebrated Mexican traditions while adapting to the desert culture of New Mexico. Her upbringing
    was steeped in Catholic rituals, communal gatherings, and the vibrant festivities of Día de los Muertos, Cinco de Mayo, and local New Mexican fiestas. She maintains strong ties to her Mexican heritage
    through language, cuisine, music, and folk art, while also embracing the regional identity of Las Cruces, with its blend of Hispanic and Native American influences. This cultural mosaic shapes her values
    of family loyalty, community service, and reverence for artistic expression.
