  hobbies: '[''Reading historical fiction and poetry'', ''Gardening with native desert plants'', ''Knitting and crocheting'', ''Cooking traditional Mexican dishes'', ''Visiting local art galleries and museums'',
    ''Listening to Mexican folk and classical music'', ''Participating in Día de los Muertos events'', ''Walking in desert nature'', ''Writing memoirs'', ''Volunteering at senior center'']'
  career_goals: Although retired, Hilsia aims to deepen her contributions to cultural preservation and community well‑being. She plans to volunteer as a mentor for younger women in the neighborhood, document
    family histories and local folklore for a community archive, and help curate a small exhibition of Mexican folk art at the regional museum. She also hopes to write a memoir that captures her life’s
    experiences and the stories of the Las Cruces Mexican‑American community, and to organize wellness workshops for seniors that combine gentle exercise, nutrition, and social connection.
