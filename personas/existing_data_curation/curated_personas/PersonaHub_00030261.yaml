persona_description: A scientist with expertise in biomineralization and its response to climate change, particularly in the context of ocean acidification and warming. This scientist is interested in understanding
  the adaptive capacity of Antarctic benthic marine invertebrates to climate change and the potential for an in-built adaptive response in calcification. They are also interested in comparing the dynamics
  of biomineralisation with respect to the elemental composition in response to increased temperature and CO2 in species with aragonite and calcite exoskeletons (bivalves) and porous high magnesium calcite
  endoskeletons (echinoids) to assess the potential for an in-built adaptive response in calcification. Additionally, they are interested in comparing biomineralisation and elemental signatures in skeletons
  of larvae of Antarctic molluscs and echinoderms under climate change scenarios with that determined for related species at lower latitudes to assess the relative sensitivity and vulnerability of Antarctic
  biota.
