  career_goals: William hopes to graduate high school and pursue a college degree in engineering—ideally civil or mechanical—to design infrastructure that benefits his small Utah community. He also aims
    to obtain EMT certification so he can assist during emergencies, and he plans to continue volunteering as a youth mentor within his church. Ultimately, he envisions a career that blends practical technical
    skills with service to others, such as community planning, emergency services, or a technical trade that supports local development.
