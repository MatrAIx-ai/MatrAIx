personas:
  professional: William Fraser, a high‑school sophomore with a budding passion for aerospace engineering, spends afternoons assembling model rockets and coding strategic video‑game AI, blending a curiosity‑driven
    love of new ideas with a practical, hands‑on mindset while they often let loose organization standards slide in favor of spontaneous experimentation.
  sports: William Fraser, a member of the Wasatch Hiking Club and a weekend pick‑up basketball player at the local community center, enjoys hiking the foothills, fishing in nearby streams, and cheering
    on the Utah Jazz and Real Salt Lake, while they prefer low‑key fitness activities over organized school sports.
  arts: William Fraser, an aspiring acoustic guitarist and nature photographer, draws inspiration from the melodic scores of John Williams and the stark landscapes captured by Ansel Adams, while their evenings
    are filled with the pages of Dune and The Name of the Wind, shaping both their creative outlet and their sense of imagination.
  travel: William Fraser favors spontaneous weekend road trips, often loading a backpack and heading to Yellowstone or Grand Teton for rugged hikes, dreams of photographing Iceland’s waterfalls, and they
    balance their limited teen budget by swapping housesitting gigs with friends for free lodging, planning less than a week in advance.
  culinary: William Fraser’s post‑hike meals feature hearty mountain burritos stuffed with black beans, roasted corn, and pepper‑jack cheese, and they enjoy experimenting with homemade ramen broth using
    kombu, miso, and soft‑boiled eggs, though their cooking skill stays at a confident beginner level, occasionally burning toast when distracted.
  core: William Fraser, a curious yet laid‑back 15‑year‑old, mixes a love for rockets, guitar, and photography with a habit of leaving textbooks scattered, sacrificing schedules for spontaneous hikes and
    late‑night gaming, and they often forget to set reminders for upcoming assignments.
background:
  cultural: William was raised in Nephi, a close‑knit, predominantly Latter‑Day Saint community in rural Utah. His family’s cultural roots are mainly Northern European—Scandinavian and British—reflecting
    the heritage common among many Utah residents. The community emphasizes family, self‑reliance, church participation, and service, which have shaped his compassionate and cooperative outlook. Local traditions
    such as Pioneer Day celebrations, community potlucks, and regular volunteer service through the church are integral parts of his upbringing.
