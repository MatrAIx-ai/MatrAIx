persona_description: A scientist who specializes in the study of neuroscience and has made a breakthrough discovery in understanding the biological link between stress, anxiety, and depression. His research
  focuses on developing new drugs to selectively target anxiety and treating anxiety disorders more effectively. He is a professor in the Department of Physiology & Pharmacology at Robarts Research Institute,
  University of Western Ontario, Canada. His work has been recognized by the World Health Organization as a major cause of chronic illnesses in the modernized world. He has conducted molecular experiments
  to expose the connect pathway and test a new inhibitor that could be used to treat anxiety, depression, and other related disorders. He is also interested in mindfulness-based stress reduction (MBSR)
  and has found that it can help people with diabetes relieve stress, anxiety, and depression.
