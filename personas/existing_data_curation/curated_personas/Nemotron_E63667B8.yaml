personas:
  professional: Yuri Meredith, a retired humanities scholar and community archivist, channels decades of archival research and hands‑on woodworking into meticulously curated local history exhibits and intergenerational
    workshops, balancing curiosity with a practical, detail‑oriented approach.
  sports: Yuri Meredith, a devoted fan of the Charlotte Hornets and the Carolina Panthers, spends his mornings walking the city’s Riverwalk and occasionally joins the senior tennis league at the community
    center, preferring low‑impact activities that keep his joints supple.
  arts: Yuri Meredith, an avid listener of Miles Davis, John Coltrane, and Mahalia Jackson, regularly attends the local jazz club’s acoustic nights and participates in the church’s gospel choir, while his
    book‑club conversations often weave literary analysis with historical narratives.
  travel: Yuri Meredith, who enjoys leisurely road trips to historic Southern towns such as Charleston, Savannah, and New Orleans, plans his itineraries around visits to civil‑rights museums and family‑heritage
    sites, balancing a love for discovery with his modest travel budget and occasional mobility constraints.
  culinary: Yuri Meredith, a seasoned soul‑food cook, expertly prepares collard greens with smoked turkey, sweet‑potato pie, and cornbread using heirloom tomatoes from his garden, yet he has a habit of
    over‑salting dishes and indulges in oversized glasses of sweet tea during family gatherings.
  core: Yuri Meredith blends scholarly rigor with Southern craftsmanship, preserving community memory through meticulous archives while tending a humble garden, savoring jazz, and navigating the challenges
    of age with a competitive edge and occasional stubbornness.
background:
  cultural: Yuri’s cultural background is rooted in the African‑American experience of the American South. Born during the era of segregation, he witnessed the civil‑rights movement firsthand in Charlotte’s
    Black neighborhoods. His family placed a high value on education, church participation, and oral storytelling, which shaped his respect for community history and collective memory. He grew up attending
    a historically Black church, celebrating Southern soul‑food traditions, and engaging in community events that emphasized resilience, mutual support, and pride in his heritage. These influences inform
    his dedication to preserving Black history, mentoring younger generations, and maintaining strong family and church ties.
attributes:
  skills: '["archival research", "genealogical research", "historical writing", "public speaking (small groups)", "project coordination", "digital archiving", "woodworking", "garden design", "mentorship"]'
