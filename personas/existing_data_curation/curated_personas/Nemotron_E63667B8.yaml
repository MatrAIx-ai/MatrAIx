    in local parks", "church fellowship"]'
  career_goals: Although retired, Yuri remains driven to contribute to the preservation of African‑American heritage in Charlotte. He aims to complete a comprehensive family memoir, curate a local Black
    history exhibit at the Charlotte Historical Society, and mentor high‑school students interested in history and genealogy. He also hopes to publish a series of short essays on the cultural evolution
    of his neighborhood and to remain an active volunteer lecturer at the public library.
