  career_goals: While still a toddler, his parents notice his love for structure and helping others, and they nurture ambitions that could lead him to a career where reliability and service are central.
    Future aspirations may include becoming a firefighter, a community volunteer, or a school support staff member—roles that combine order, teamwork, and caring for others.
