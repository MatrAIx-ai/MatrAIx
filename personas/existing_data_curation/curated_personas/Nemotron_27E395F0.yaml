personas:
  professional: Catherine Hughes, a 22‑year‑old security officer with a teaching background, they apply their real‑time video analytics expertise, conflict‑de‑escalation training, and meticulous incident‑report
    writing to keep casino floors safe while constantly checking that every protocol follows a strict, predictable checklist.
  sports: Catherine Hughes jogs the Gulf Coast at dawn with the Gulf Coast Runners club, they follow the Miami Heat and New Orleans Saints on television, and join a seasonal beach‑volleyball pick‑up league,
    treating each workout as a structured data set to track progress.
  arts: Catherine Hughes immerses themselves in mystery novels by Agatha Christie and Gillian Flynn, they capture urban skylines and sunset silhouettes through a DSLR, and curate a personal playlist featuring
    Sufjan Stevens and Philip Glass, letting the precise rhythms guide their creative downtime.
  travel: Catherine Hughes plans getaways with detailed spreadsheet itineraries, they prefer low‑key coastal escapes like Savannah’s historic district and New Orleans’ French Quarter, have photographed
    Barcelona’s Sagrada Família, and dream of a solitary road trip along the Pacific Coast to study lighthouse architecture.
  culinary: Catherine Hughes enjoys preparing Mediterranean quinoa bowls with avocado, cherry tomatoes, and lemon‑cilantro dressing, they can execute a flawless shrimp ceviche, relish dark chocolate dessert,
    but tend to order the same coffee‑chain latte each morning for the comforting predictability.
  core: Catherine Hughes is a structure‑driven security professional who finds solace in puzzles and photography while wrestling with chronic worry and a reluctance to embrace spontaneous social scenes.
background:
  cultural: Catherine grew up in Pensacola, Florida, a coastal city with a strong Southern sensibility and a close‑knit community shaped by the nearby Naval Air Station and Gulf‑side lifestyle. Her family
    background reflects middle‑class values that emphasize responsibility, punctuality, and respect for order. Local traditions such as community festivals, seafood cuisine, and a seasonal emphasis on outdoor
    recreation have influenced her appreciation for structure and predictability. While she identifies as white and was raised in a region with a mix of cultural influences, she maintains a pragmatic outlook
    shaped by the region's blend of military discipline and coastal leisure. These experiences have reinforced her preference for clear expectations, reliable routines, and a modest, reserved demeanor.
