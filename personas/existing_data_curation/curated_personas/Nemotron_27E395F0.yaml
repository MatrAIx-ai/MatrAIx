  hobbies: '[''reading mystery novels'', ''jigsaw puzzles'', ''online chess'', ''jogging on the beach'', ''bird‑watching'', ''photography'', ''small book club'', ''tutoring elementary students'', ''yoga'']'
  career_goals: Catherine aims to advance from her current guard or surveillance officer role to a shift supervisor within the next two years, focusing on mastering team leadership and operational logistics.
    Her long‑term ambition is to become a security manager overseeing multiple sites, preferably in a casino or corporate environment where she can integrate her education expertise by developing comprehensive
    training programs for staff. She plans to obtain professional certifications such as the Certified Protection Professional (CPP) and may pursue a master’s degree in security management to broaden her
    strategic capabilities, all while maintaining a structured career path that offers clear milestones and advancement opportunities.
