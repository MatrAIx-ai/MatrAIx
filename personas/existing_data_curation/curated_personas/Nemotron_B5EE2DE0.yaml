personas:
  professional: Eric Desouza, a budding LEGO architect, channels a practical, routine-driven mindset into meticulously constructed vehicle and building models, foreshadowing a future career in engineering
    where they bring an organized yet flexible approach and quiet confidence to collaborative projects.
  sports: Eric Desouza, a devoted Pittsburgh Steelers fan, cheers quietly from the sofa during Sunday games while at the local park they energetically play tag, swing on monkey bars, and participate in
    a neighborhood Little League baseball team called the River Rats, showcasing a love for organized sport and simple, routine physical play.
  arts: Eric Desouza channels creative impulses into drawing cheerful family sketches and constructing LEGO stories, while also delighting in picture books by Eric Carle and listening to the playful tunes
    of The Wiggles, and they let these gentle artistic influences shape their imaginative play.
  travel: Eric Desouza thrives on the routine of school holidays, enjoys family trips to Washington D.C.'s Smithsonian museums and Orlando's Magic Kingdom, and they dream of a future train journey across
    the United Kingdom to explore the Jurassic Coast, reflecting a blend of familiar comfort and adventurous curiosity.
  culinary: Eric Desouza, an enthusiastic kitchen helper, often stirs batter for chocolate chip cookies, savors cheesy macaroni and quick peanut butter-jelly sandwiches, and they show a budding preference
    for sweet carrots and apple slices, all while proudly insisting on adding a pinch of cinnamon to every dish.
  core: Eric Desouza is a routine-loving, quietly determined six-year-old who builds LEGO worlds with precision, hoards pennies for the next set, occasionally forgets to put on sunscreen, and they find
    comfort in small-group Steelers games and simple sketching.
background:
  cultural: Eric comes from a white American family with Irish and German ancestry living in a middle‑class neighborhood of Pittsburgh, Pennsylvania. His family follows many traditional customs, celebrating
    holidays like Thanksgiving, Christmas, and St. Patrick’s Day, and they are active supporters of local sports teams, especially the Steelers. He attends a public elementary school in Allegheny County,
    where routine and structure are emphasized. The community values modesty, reliability, and close‑knit family ties.
