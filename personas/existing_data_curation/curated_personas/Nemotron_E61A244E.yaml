  hobbies: '[''Salsa dancing'', ''Volunteering at Westminster food bank'', ''Rose gardening'', ''Hiking in Laguna Coast Wilderness Park'', ''Reading mystery novels'', ''Cooking Mediterranean dishes'', ''Singing
    in church choir'', ''Family coastal trips'', ''Playing bridge'']'
  career_goals: Sharon aims to advance into a regional sales management role within the next three years, overseeing a team of agents across Orange County. She plans to earn the California Insurance Professional
    (CIP) designation to deepen her technical expertise and to specialize in emerging niches such as cyber liability and senior‑care insurance. Long‑term, she hopes to open her own boutique agency that
    offers personalized, community‑focused insurance solutions while mentoring new agents. Additionally, she wants to build a robust referral network that leverages her strong community ties and to achieve
    a consistent track record of exceeding sales targets, ensuring financial security for her family.
