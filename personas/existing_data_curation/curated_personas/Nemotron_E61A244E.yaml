personas:
  professional: Sharon Ibebunjo, a veteran insurance agent with over two decades of experience, blends meticulous risk analysis and practiced relationship-building with their outgoing, routine‑driven nature
    to consistently exceed sales targets and mentor junior staff.
  sports: Sharon Ibebunjo, an avid hiker and salsa enthusiast, regularly joins the Laguna Coast Hiking Club for weekend treks through Laguna Coast Wilderness Park, follows the LA Dodgers and LA Lakers with
    ritual game‑day gatherings, and they keep fit through twice‑weekly salsa classes and occasional community tennis matches.
  arts: Sharon Ibebunjo, who delights in singing with their church choir and dancing salsa, finds artistic solace in the music of Celia Cruz and Marc Anthony, while their mystery‑novel evenings often feature
    Agatha Christie and Gillian Flynn, shaping a vibrant, culturally‑rich leisure palette.
  travel: Sharon Ibebunjo, who plans trips with meticulous itineraries and a love for sun‑kissed shores, frequently returns to California's coastal gems such as Santa Barbara and Catalina Island, while
    dreaming of Mediterranean getaways to the Greek islands and the Amalfi Coast, balancing family time with occasional solo weekend retreats.
  culinary: Sharon Ibebunjo, an enthusiastic home cook, regularly prepares Mediterranean staples such as Greek moussaka, Spanish paella with saffron and chorizo, and Italian risotto with Arborio rice and
    fresh basil, showcasing a confident yet adventurous palate that favors olives, feta, and sun‑dried tomatoes.
  core: Sharon Ibebunjo blends a disciplined, routine‑oriented work ethic with a vibrant social life, juggling salsa shoes, rose‑pruned gardens, and a penchant for double‑checking insurance quotations at
    the slightest hint of a spreadsheet error.
background:
  cultural: Sharon was raised in a middle‑class, predominantly white suburb of Orange County, where she adopted mainstream American cultural norms and celebrated holidays such as Thanksgiving, Christmas,
    and the Fourth of July. Her active involvement in a local Baptist church reinforced a community‑oriented, service‑focused upbringing. Living in Westminster, a city with a strong Vietnamese presence,
    she has embraced aspects of that culture—frequently enjoying pho, attending the Tet Festival with neighbors, and appreciating multicultural art exhibits. Her marriage introduced additional cultural
    influences, and she often incorporates a blend of traditions in family gatherings. Overall, Sharon values practicality, community, and the diverse cultural tapestry of her region while maintaining a
    traditional, family‑centric worldview.
attributes:
  skills: '[''Client needs assessment'', ''Insurance product portfolio management'', ''Sales pipeline development'', ''Relationship building and networking'', ''Negotiation and closing techniques'', ''Regulatory
