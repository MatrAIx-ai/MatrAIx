  hobbies: '[''Intramural volleyball'', ''Dance workshops'', ''Photography'', ''Journaling'', ''Mental‑health blog writing'', ''Reading fantasy novels'', ''DIY crafts'', ''Cooking'', ''Hiking'']'
  career_goals: Alaina aims to pursue a bachelor's degree in social work or public health, with the long-term goal of becoming a community outreach coordinator or mental‑health advocate. She wants to combine
    her organizational talents and sociable nature to design programs that support youth mental‑wellness in her hometown. In the next five years she hopes to obtain relevant internships, gain certification
    in mental‑health first aid, and eventually lead a nonprofit initiative that bridges practical support services with innovative, curiosity‑driven approaches to community well‑being.
