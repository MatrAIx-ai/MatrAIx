  hobbies: '["Sketching", "Digital artwork", "Reading speculative fiction and philosophy", "Listening to jazz, neo-soul, and hip-hop", "Meditation and journaling", "Mentoring at youth center", "Playing
    chess", "Collecting vintage vinyl records", "Writing poetry for spoken-word events"]'
  career_goals: Ulysses aims to become a senior sales manager within five years, leading a high-performing team that balances revenue targets with employee well-being. He seeks to specialize in sustainable
    manufacturing solutions, positioning himself as an advocate for ethical sales practices. In the long term, he aspires to launch his own consultancy focused on helping small manufacturers implement socially
    responsible sales strategies while mentoring young talent from underrepresented communities. He plans to obtain professional sales certifications and pursue further business education to support these
    ambitions.
