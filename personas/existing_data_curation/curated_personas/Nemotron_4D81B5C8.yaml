personas:
  professional: Ivon Bermudez is a bilingual community outreach enthusiast who leverages their event planning knack, social media savvy, and coordination of cultural festivals to bridge immigrant families
    to local resources, while navigating a laid‑back work style that tolerates occasional disarray.
  sports: Ivon Bermudez laces up for a local women’s soccer league, roots for the LA Galaxy, and volunteers at a community garden where they grow cilantro and oregano to fuel post‑game meals, treating fitness
    as a social ritual rather than a strict regimen.
  arts: Ivon Bermudez grooves to reggaeton and Latin pop stars like Bad Bunny and Karol G, attends live concerts whenever possible, and fills a sketchbook with quick drawings of dance scenes, using these
    creative outlets to channel emotional intensity.
  travel: Ivon Bermudez prefers spontaneous weekend getaways to cultural hotspots such as Oaxaca and Cartagena, balancing a modest travel budget with a love for dance festivals, yet often hesitates to book
    far‑flung trips due to lingering anxiety about finances.
  culinary: Ivon Bermudez delights in crafting pupusas, tamales, and yuca frita, seasoning them with home‑grown herbs, and runs a modest pop‑up stall at the local farmers market, where they share these
    flavors while chatting exuberantly with patrons.
  core: Ivon Bermudez fuses a buzzing social energy, a penchant for spontaneous community‑centered projects, and a chronic undercurrent of anxiety that fuels both their drive and occasional disarray.
background:
  cultural: Ivon was born to Salvadoran immigrant parents and grew up in a bilingual household where Spanish was spoken alongside English. Her family maintains strong ties to El Salvador's traditions, celebrating
    holidays such as El Dia de la Independencia (September 15) and Dia de la Madre with family gatherings, pupusas, and traditional music. The local Salvadoran community in Charlotte and the surrounding
    Mecklenburg County provides a supportive network of churches, cultural festivals, and food markets, where Ivon frequently volunteers and participates. These experiences have instilled in her a deep
    appreciation for Salvadoran cuisine, cumbia, and the value of family solidarity. At the same time, living in Matthews, NC, has exposed her to a diverse Southern culture, shaping a bicultural identity
    that blends Salvadoran customs with American life.
