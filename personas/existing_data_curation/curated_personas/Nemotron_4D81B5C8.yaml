    self-help and mindfulness books", "Sketching/drawing", "Participating in board game and trivia nights"]'
  career_goals: Ivon aspires to obtain her GED within the next year and enroll in a community college program focused on human services or community health. She aims to secure an internship with a local
    nonprofit that supports immigrant families, leveraging her bilingual skills and passion for outreach. Long-term, she hopes to become a certified Community Health Worker or youth mentor, designing flexible,
    community-based programs that promote mental wellness and cultural integration. Parallel to her professional development, Ivon plans to launch a small pop-up business selling homemade pupusas and other
    Salvadoran specialties at local markets, allowing her to combine her culinary talent with her love for social interaction.
