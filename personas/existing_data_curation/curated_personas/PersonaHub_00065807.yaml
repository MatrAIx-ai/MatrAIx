persona_description: A healthcare professional who is responsible for performing the Glucose Tolerance Test (GTT) in a medical center or hospital. They must be well-versed in the testing process, including
  the timing of the test, the requirements for fasting, and the interpretation of the test results. They must also be familiar with the medical conditions and symptoms associated with diabetes and impaired
  glucose tolerance, and be able to diagnose these conditions based on the results of the test. They may also be involved in pre-operative anaesthetic assessments and general health assessments, as well
  as in the interpretation of blood tests and intravenous cannulation.
