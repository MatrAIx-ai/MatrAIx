persona_description: 'A mechanical engineer who specializes in building-control systems, particularly the programming and commissioning of these systems in "smart" buildings. She has extensive experience
  in debugging and maintaining these systems, and her expertise is sought after by architects, engineers, and building owners. Her book, "Direct Digital Control Systems: Application and Commissioning,"
  offers a comprehensive guide to the ins and outs of these systems, and she leads semi-annual seminars on computerized building controls for the American Society of Heating, Refrigerating and Air-Conditioning
  Engineers.'
