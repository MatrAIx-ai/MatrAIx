    techniques'', ''Creative problem solving and innovative design integration'', ''Basic budgeting and cost control'', ''First-aid/CPR certification'']'
  hobbies: '[''Landscape photography'', ''Sketching desert scenes'', ''Attending powwows and art exhibitions'', ''Traditional Navajo drumming and singing'', ''Hiking and mountain biking'', ''Competitive
    online multiplayer gaming'', ''DIY woodworking and furniture making'', ''Cooking traditional Navajo dishes'', ''Learning Navajo (Diné Bizaad) language'', ''Reading science‑fiction and philosophy'']'
  career_goals: Luis aims to move from site‑level supervision to a regional project‑management role and eventually launch his own construction firm that highlights sustainable, culturally resonant building
    practices. Within the next two years he plans to earn a Class A General Contractor license and obtain certifications in LEED green building and advanced safety training. He also wants to mentor younger
    Native American workers, develop culturally tailored safety programs, and balance his ambition with better stress‑management habits.
