personas:
  professional: Luis Sermarini, a 38‑year‑old construction site supervisor, blends expert knowledge of OSHA safety, blueprint interpretation, and heavy‑equipment operation with a flair for integrating tribal
    design motifs into modern builds, while their energetic, persuasive communication and competitive drive keep crews motivated and stakeholders engaged.
  sports: Luis Sermarini cycles the rugged trails of the San Juan Mountains with the Four Corners Mountain Bike Club, hikes the Bisti Badlands in the summer, and avidly follows the New Mexico Lobos football
    team and the Arizona Diamondbacks baseball club, using early‑morning rides and weekend hikes to channel competitive energy into personal fitness.
  arts: Luis Sermarini captures desert light through photography, sketches traditional pottery designs, drums at local powwows, and finds inspiration in flute master R. Carlos Nakai, visual artist James
    Turrell, and sci‑fi writer N. K. Jemisin, weaving these influences into a distinctive creative outlook that balances heritage and futurism.
  travel: Luis Sermarini balances spontaneous road trips—like his recent drives through Monument Valley and the Grand Canyon—with occasional structured planning for distant adventures, dreaming of exploring
    Scotland’s ancient stone circles and Iceland’s aurora‑lit landscapes while navigating a modest travel budget and limited family time.
  culinary: Luis Sermarini enjoys cooking and tasting traditional dishes such as blue‑corn mush, piñón‑nut stew, and fire‑roasted mutton, often adding roasted chilies and sage for bold flavor, and while
    they are competent at grilling and stewing, they sometimes over‑spice meals in their quest for a memorable bite.
  core: Luis Sermarini fuses tribal design with modern construction, channels competitive fire into mountain biking, and alternates between diligent budgeting and impulsive gear splurges, all while wrestling
    with stress‑induced overthinking.
background:
  cultural: Luis is of Navajo (Diné) descent, growing up on the outskirts of the Navajo Nation in Farmington, San Juan County. His family maintains ties to tribal traditions, including participation in
    seasonal ceremonies, storytelling, and the practice of weaving and pottery. He speaks some Diné Bizaad and values the connection between land, community, and art that is central to Navajo culture. These
    cultural roots influence his respect for the environment, his interest in integrating traditional design elements into construction projects, and his commitment to supporting fellow Native American
    workers.
attributes:
  skills: '[''Construction site supervision'', ''Crew coordination and leadership'', ''Safety protocol implementation (OSHA)'', ''Blueprint interpretation and CAD basics'', ''Heavy equipment operation (excavators,
