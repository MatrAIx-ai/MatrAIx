  career_goals: Edwin dreams of turning his love for technology and art into a career that lets him create innovative solutions. In the short term, he aims to win his middle‑school robotics competition
    and to develop a simple video game that he can share with friends. Looking ahead, he envisions studying computer science or engineering in high school and college, with the long‑term ambition of becoming
    a software engineer who designs interactive educational tools or a game developer who incorporates artistic storytelling. He also entertains the idea of working at a museum as a digital exhibit designer,
    merging his appreciation for art with technology.
