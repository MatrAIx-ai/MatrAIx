  hobbies: '[''Reading historical fiction'', ''Journaling'', ''Hiking'', ''Playing acoustic guitar'', ''Volunteering at Richmond Food Bank'', ''Community clean‑up events'', ''Baking'', ''Food photography'',
    ''Debate club'', ''Attending community theater'']'
  career_goals: Stacy aims to pursue a degree in public health or social work at a Virginia community college, with the long‑term ambition of becoming a community health outreach coordinator. She wants
    to design and implement programs that improve access to healthcare and nutrition for underserved families in Richmond. In parallel, she hopes to obtain certification as a certified nursing assistant
    (CNA) to gain hands‑on experience. Her practical mindset drives her to acquire relevant internships and part‑time roles that will build her skill set while maintaining her commitment to helping others.
