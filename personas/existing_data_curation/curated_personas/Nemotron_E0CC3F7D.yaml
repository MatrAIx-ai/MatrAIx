personas:
  professional: Stacy Reyes is a diligent high‑school senior serving as student council secretary, expertly coordinating meetings, managing calendars, and organizing community outreach events; their curiosity
    fuels self‑teaching of digital tools and basic first‑aid, while their compassionate nature makes them a natural bridge between peers and volunteers.
  sports: Stacy Reyes enjoys weekend hikes along the James River Park System, belongs to a local trail‑running club, follows the Richmond Flying Squirrels baseball team and the Virginia Cavaliers men’s
    basketball squad, balances cardio workouts with yoga to stay flexible for guitar playing, though they occasionally skip warm‑ups on lazy days.
  arts: Stacy Reyes finds creative release in acoustic guitar, covering songs by John Mayer and Ed Sheeran, captures culinary experiments through photography inspired by Annie Leibovitz’s portrait style,
    attends community theater productions starring local talent such as Maya Williams, and occasionally binge‑watches period dramas directed by Greta Gerwig.
  travel: Stacy Reyes favors budget‑friendly trips that blend adventure and learning, having backpacked through Shenandoah National Park, visited Washington D.C. for a debate competition, dreaming of exploring
    Mexico City’s street‑food scene for culinary inspiration, and planning weekend road trips to the Outer Banks while balancing school commitments.
  culinary: Stacy Reyes loves experimenting in the kitchen, frequently baking matcha‑green‑tea cookies, cardamom‑spiced baklava, ramen‑inspired bao buns, and photographing each dish with a DSLR, while sourcing
    fresh basil, tahini, and smoked paprika at the Richmond Food Market to blend flavors from diverse cuisines.
  core: Stacy Reyes is a curiosity‑driven, organized teen whose compassion fuels community service, yet they occasionally over‑schedule themselves and indulge in spontaneous guitar‑string splurges.
background:
  cultural: Stacy comes from a White American family with roots in the Mid‑Atlantic region, raised in Richmond, Virginia. Her upbringing reflects elements of Southern hospitality and a strong sense of community,
    shaped by local traditions such as neighborhood block parties, church gatherings, and participation in city festivals. Growing up in a historically rich city, she has developed an appreciation for the
    region’s history and a growing awareness of social justice issues affecting the area. These cultural influences nurture her compassionate outlook and desire to contribute positively to her community.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Effective communication'', ''Active listening'', ''Team collaboration'', ''Microsoft Office proficiency'', ''Google Workspace proficiency'',
