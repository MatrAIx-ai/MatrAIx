personas:
  professional: Eboni Carter, a community recreation specialist at Lycoming County Parks and Recreation, leverages her curiosity‑driven practicality and strong relationship‑building abilities to design
    inclusive programs, skillfully juggling program planning, grant writing, and conflict resolution while flexibly adapting to on‑the‑fly changes despite a habit of occasional disorganization; they consistently
    prioritize participants' needs over rigid schedules.
  sports: Eboni Carter embraces the outdoors through a local hiking club and a community canoeing group, follows the Pittsburgh Steelers and Philadelphia Phillies with avid enthusiasm, and they participate
    in seasonal pickup basketball games at the county recreation center, all while advocating for inclusive fitness opportunities.
  arts: Eboni Carter finds inspiration in jazz legends like Miles Davis and contemporary R&B artists such as H.E.R., they devour contemporary novels by authors like Ta‑Nehisi Coates, and they regularly
    attend the Williamsport Community Arts Center’s theater productions, using these experiences to fuel her own creative volunteer projects.
  travel: Eboni Carter prefers a mix of purposeful road trips and spontaneous weekend getaways, they have explored the historic streets of Charleston, the vibrant music scene of New Orleans, and the serene
    trails of the Great Smoky Mountains, while they dream of a cultural immersion tour of Ghana once their schedule allows.
  culinary: Eboni Carter enjoys experimenting with soul‑food dishes like smoked collard greens, sweet‑potato pie, and black‑eyed pea stew, they skillfully blend traditional spices such as smoked paprika
    and thyme with fresh garden harvests, and they often host neighborhood potlucks to share her culinary creations.
  core: Eboni Carter, a 36‑year‑old recreation professional, blends curiosity with flexibility, channels community‑centric values into inclusive programming, and they balance a love for outdoor adventure
    with a habit of occasionally misplacing their planner.
background:
  cultural: Eboni identifies as African‑American and was raised in a close‑knit family that values community, church, and cultural heritage. Growing up in the Midwest before moving to Pennsylvania, she
    maintains strong ties to African‑American traditions, including music, cuisine, and celebration of history through local events. Her cultural perspective informs her commitment to creating inclusive
    recreation programs that reflect the diverse backgrounds of Williamsport residents, and she actively participates in church and community groups that support cultural preservation and mutual support.
attributes:
  skills: '[''Program planning'', ''Event coordination'', ''Youth mentorship'', ''Group facilitation'', ''Conflict resolution'', ''Basic first aid'', ''Outdoor activity instruction (hiking, canoeing)'',
    ''Recreation management software'', ''Social media outreach'', ''Basic grant writing'', ''Customer service'']'
  hobbies: '[''Hiking'', ''Kayaking'', ''Gardening'', ''Cooking soul‑food'', ''Attending cultural festivals'', ''Reading contemporary fiction'', ''Listening to jazz and R&B'', ''Volunteering for after‑school
    tutoring'', ''Neighborhood clean‑ups'']'
  career_goals: Eboni aims to advance to a supervisory role within the Lycoming County Parks and Recreation Department, eventually becoming a program manager and later a director. She plans to pursue a
    bachelor's degree in public administration or community recreation to broaden her leadership capabilities. Her long‑term ambition is to design inclusive, culturally responsive programs that engage underrepresented
    youth and promote community wellness, potentially leading a county‑wide wellness initiative or establishing a community garden that serves as a hub for education and recreation.
