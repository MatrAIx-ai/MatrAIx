  hobbies: '["Gardening (vegetables & herbs)", "Reading historical fiction & mystery novels", "Listening to big‑band and swing music", "Senior bingo club", "Low‑impact yoga for seniors", "Knitting and crafting
    for charity", "Walking on the beach with her dog"]'
  career_goals: Even though she is retired, Tamara’s ambitions revolve around remaining a vibrant and contributing member of her community. She aims to continue volunteering at the local senior center,
    teaching cooking classes and sharing gardening tips with younger neighbors. She also hopes to preserve her family’s history by recording oral stories for a community archive, and she is eager to learn
    how to use a tablet to keep in touch with her grandchildren via video calls. Maintaining her health and independence so she can attend weekly community events and church services remains a top priority.
