  hobbies: '[''Street photography'', ''Sketching and mural appreciation'', ''Jazz and hip‑hop music'', ''Running (coastal trails)'', ''Pickup basketball'', ''Sports analytics podcasts'', ''Mentoring at‑risk
    youth'', ''Creative team‑building workshops'', ''Cooking (soul food meets New England seafood)'']'
  career_goals: Michael aims to move from high‑school and collegiate scouting to a regional scouting role for a professional baseball or basketball organization in the New England area. Over the next five
    years he plans to earn his Certified Strength and Conditioning Specialist (CSCS) credential and complete a Master’s in Sports Management. He envisions leading a talent‑development department where he
    can introduce innovative scouting methods that incorporate art‑inspired mental‑training techniques, ultimately advancing to a director of player development position that shapes both on‑field performance
    and personal growth of athletes.
