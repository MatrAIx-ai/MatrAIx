persona_description: A marine biologist who specializes in the study of bioluminescence in fish, particularly the species that glow in a dazzling array of colors and patterns. She has conducted extensive
  research around the globe and has developed a unique yellow-green filter for diving masks and custom-built underwater cameras that block out the ambient blue light, leaving only the neon wavelengths the
  fish emit. Her findings suggest that biodiversity on reefs might be greater than previously thought, and that reef fish might provide a treasure trove of novel fluorescent proteins that could be used
  for medical research, such as cancer treatments, brain activity studies, and tests for liver disease. She is also developing new technology, such as extremely bright blue lights, to use on future expeditions,
  and she is taking part in a project closer to home that could one day take biofluorescence research to new depths.
