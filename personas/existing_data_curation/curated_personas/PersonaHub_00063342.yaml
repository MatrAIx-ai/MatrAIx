persona_description: A UI researcher who studies human behavior and emotions, particularly in the context of trauma and anxiety disorders. The researcher has a keen interest in understanding how the human
  brain processes fear and other emotions, and how this understanding can be used to develop new interventions for treating PTSD and related anxiety disorders. The researcher has conducted extensive research
  on the patient with the functioning amygdala, and has observed her responses to various frightening stimuli. The researcher is likely to be interested in the implications of the discovery for the treatment
  of PTSD and other anxiety disorders, and is likely to be conducting further research to explore the potential of non-invasive interventions to dampen amygdala activity in people with PTSD.
