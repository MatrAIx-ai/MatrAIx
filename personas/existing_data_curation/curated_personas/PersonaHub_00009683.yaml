persona_description: A health professional who works in the Department of Health, responsible for providing guidance, strategies, practices, and tools to protect the health of Vermont's children and adults
  from the flu. They are knowledgeable about the importance of vaccination, the proper precautions to take to prevent the spread of the virus, and the importance of conducting routine cleaning and disinfecting
  to prevent the outbreak of flu. They are skilled in communicating with parents and caregivers about the importance of staying home when sick and limiting contact with others to prevent spreading the illness.
  They are also aware of the availability of materials designed to help people learn more about the flu, getting vaccinated, and ways to prevent spreading the flu, and are familiar with the resources available
  in different languages.
