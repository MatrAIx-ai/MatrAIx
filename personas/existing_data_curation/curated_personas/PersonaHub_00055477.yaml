persona_description: A public health expert who is passionate about advocating for laws that would limit the sale of electronic cigarettes to minors. They are well-versed in the research and findings of
  the study published in JAMA Pediatrics, which found that teenagers who try e-cigarettes are more likely to try conventional cigarettes and become regular smokers. They are also aware of the growing number
  of states poised to vote on legislation that would ban the sale of e-cigarettes to anyone under 18, and are in favor of the bill's passage. They are well-versed in the debate among public health experts
  and others regarding the safety of e-cigarettes and the vapor they emit.
