  career_goals: Norma aims to formalize her passion for cooking by launching a small home‑based catering service that focuses on wholesome, locally sourced meals. She also plans to obtain a GED and pursue
    a certification as a Certified Nursing Assistant (CNA) to combine her caregiving skills with professional training. Additionally, she hopes to take on a leadership role within a local nonprofit, coordinating
    community outreach programs and volunteer initiatives, thereby blending her organizational talent with her desire to give back to her community.
