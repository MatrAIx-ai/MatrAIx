  hobbies: '[''Cooking traditional Mexican dishes'', ''Home gardening (vegetables and herbs)'', ''Reading Mexican literature and poetry (Spanish/English)'', ''Volunteering at local school’s bilingual program'',
    ''Participating in community cultural festivals'', ''Yoga and mindfulness practice'', ''Jigsaw puzzles and brain teasers'', ''Knitting embroidered blankets'', ''Friendly cooking competitions'']'
  career_goals: Saturnina aims to translate her practical household management experience into a modest entrepreneurial venture. Over the next few years she plans to launch a home‑based Mexican catering
    service that offers traditional dishes for community events, leveraging her culinary expertise and structured approach to menu planning and budgeting. She also intends to start a bilingual food blog
    to share recipes and cultural stories, using her writing skills to build an online presence. To broaden her impact, she is pursuing a certification in early childhood education so she can volunteer
    as a classroom assistant and eventually work part‑time as a cultural liaison, helping schools and local agencies connect with the Mexican‑American community. Her goals are grounded in creating a stable,
    predictable income stream while maintaining her family responsibilities.
