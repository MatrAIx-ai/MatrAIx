personas:
  professional: Marcus Wade is a veteran office administrator whose mastery of Excel budgeting, meticulous record-keeping, and conflict-resolution prowess translates into a no-nonsense consultancy that
    blends his competitive drive with a practical, process-improving mindset, ensuring every workflow is streamlined and predictable while still accommodating the occasional senior-center project.
  sports: Marcus Wade follows the New York Mets with fervor, participates in the Adirondack Trail Club's seasonal hikes, joins a local senior baseball watch party for spring training, and occasionally engages
    in gentle tennis matches at the community center, balancing competitive card tournaments with low-impact fitness.
  arts: Marcus Wade cultivates a love for mystery novels, regularly reading Agatha Christie and Tana French, while also performing in community theater productions of classic comedies, and enjoys the music
    of Billy Joel and the films of Sidney Poitier, which together satisfy his sociable yet skeptical side.
  travel: Marcus Wade prefers well-planned road trips that blend scenic drives through the Catskills, visits to the historic town of Woodstock, and relaxed stays at cozy B&Bs in Vermont's leaf-covered valleys,
    balancing his adventurous spirit with a need for predictable itineraries and budget constraints.
  culinary: Marcus Wade delights in cooking garden-fresh ratatouille, rosemary-infused roasted chicken, and homemade apple crumble, using heirloom tomatoes, fresh basil, and locally sourced maple syrup,
    though they sometimes over-season dishes due to a habit of constantly tweaking recipes for perfection.
  core: Marcus Wade is a detail-obsessed, competitive veteran administrator who combats perpetual worry with garden therapy, community theater, and a spreadsheet-driven approach to every aspect of life.
background:
  cultural: Marcus grew up in a small, predominantly white, working‑class community in upstate New York. His family’s roots trace back to Anglo‑American settlers who valued hard work, self‑reliance, and
    community participation. The rural setting of Elizabethtown and the surrounding Adirondack culture have shaped his appreciation for outdoor recreation, seasonal tourism, and local traditions. While
    not deeply religious, he respects the town’s modest church gatherings and often engages in community volunteerism, reflecting the region’s emphasis on neighborly support and civic responsibility.
