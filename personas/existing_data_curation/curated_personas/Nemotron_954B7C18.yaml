  hobbies: '[''Bingo and bridge at the senior center'', ''Community theater'', ''Group hiking in the Adirondacks'', ''Gardening'', ''Chess'', ''Card game tournaments'', ''Following regional baseball'',
    ''Reading mystery novels'', ''Gentle yoga'', ''Self‑help reading'']'
  career_goals: Approaching retirement, Marcus aims to transition into a part‑time consultancy role where he can mentor younger clerical staff and advise on office efficiency projects. He hopes to secure
    a stable pension while continuing to contribute his expertise to the community, perhaps by volunteering as an administrative coordinator for the local senior center. Completing his associate degree
    in business administration is also a personal milestone he wishes to achieve before fully stepping back from full‑time work.
