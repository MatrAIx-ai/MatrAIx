  career_goals: Yong aims to secure a software engineering internship at a leading tech company where he can apply his blend of coding and experimental research skills. He plans to pursue a master’s degree
    in computer science or bioinformatics to deepen his expertise in AI‑driven healthcare solutions. Long‑term, he aspires to lead a product team that creates affordable diagnostic tools, and eventually
    launch his own startup that merges machine learning with molecular biology. He is driven by a desire to see tangible impact from his work, balancing his curiosity for cutting‑edge technology with a
    pragmatic focus on market‑ready products.
