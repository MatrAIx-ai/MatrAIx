personas:
  professional: Yong Wong, a 19‑year‑old aspiring software engineer, merges expertise in Python, Java, C++ and full‑stack web development with hands‑on molecular‑biology lab skills, applying a curious yet
    pragmatic mindset and a competitive drive to deliver polished, market‑ready diagnostic prototypes while meticulously documenting and managing small project timelines.
  sports: Yong Wong, a member of the local Dragonfly Taekwondo Club, blends disciplined martial‑arts training with weekend hikes in nearby state parks, supports the Los Angeles Lakers and the Seattle Seahawks,
    and prefers high‑intensity interval workouts that mirror the strategic quick‑thinking required in competitive Valorant matches.
  arts: Yong Wong, an avid piano player, alternates between practicing Beethoven’s ‘Moonlight Sonata’ and improvising on contemporary soundtracks by Hans Zimmer, frequently streams indie game music from
    composers like Koji Kondo, and finds inspiration in visual art from Studio Ghibli films such as ‘Spirited Away’ during their creative electronics builds.
  travel: Yong Wong, who favors budget‑friendly trips, has explored Yosemite National Park and Seattle’s tech scene, dreams of attending a robotics conference in Tokyo and trekking the fjords of New Zealand,
    and meticulously plans itineraries in advance using spreadsheet templates while leaving room for spontaneous photo‑walks in unfamiliar neighborhoods.
  culinary: Yong Wong, a self‑taught home cook, enjoys whipping up ramen bowls with fresh pork belly, miso, and soft‑boiled eggs, experiments with avocado‑lime sushi rolls and spicy kimchi fried rice, but
    often resorts to microwave mac and cheese during late‑night coding marathons.
  core: Yong Wong, a 19‑year‑old tech hobbyist, balances a competitive streak with pragmatic project delivery, juggles solitary coding marathons and collaborative gaming nights, and occasionally sacrifices
    sleep for both piano practice and gadget tinkering.
background:
  cultural: Yong is a second‑generation Chinese‑American whose parents immigrated from Hong Kong to the United States. Growing up in Franklin Square, NY, he was raised bilingual, speaking both English and
    Cantonese at home. Family traditions such as Lunar New Year celebrations, moon‑cake making, and the Mid‑Autumn Festival remain important, while he also embraces typical American holidays like Thanksgiving.
    His upbringing emphasized academic excellence and respect for elders, influencing his disciplined study habits and collaborative spirit. At the same time, his suburban Long Island environment exposed
    him to a diverse cultural mix, fostering an openness to new ideas and a pragmatic approach to balancing heritage with contemporary life.
