  hobbies: '[''Playing basketball'', ''Hip‑hop dance classes'', ''Singing in school choir'', ''Creating TikTok videos'', ''Sketching and drawing'', ''Reading graphic novels'', ''Hiking in the Black Hills'',
    ''Cooking family meals'', ''Volunteering at community center'']'
  career_goals: Sabrina envisions a future where she can blend her love for storytelling, community service, and practical problem‑solving. In the short term, she aims to join her school’s journalism club,
    take on leadership roles in the student council, and seek internships or volunteer opportunities at the local health clinic and community center. Long‑term, she aspires to become a multimedia journalist
    or public‑health communicator who highlights stories of underrepresented youth in South Dakota, especially those at the intersection of Black and Native cultures. She is also open to pursuing a degree
    in education or nursing, seeing those paths as stable ways to help others while continuing to share narratives through digital platforms.
