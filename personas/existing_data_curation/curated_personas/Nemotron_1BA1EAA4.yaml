personas:
  professional: Sabrina Delaine, a budding content creator and youth mentor, blends her practical curiosity with a relaxed, sociable energy to produce lively TikTok skits that showcase hip‑hop dance moves,
    basketball tricks, and sketch tutorials, while informally organizing art workshops at the local community center.
  sports: Sabrina Delaine shoots hoops at the neighborhood park, dances in after‑school hip‑hop classes, hikes the Black Hills on weekends, rallies behind the Denver Broncos and follows the Rapid City Rush,
    and belongs to the Rapid City Youth Basketball League that practices after school.
  arts: Sabrina Delaine channels the graphic‑novel flair of Becky Cloonan, the fantasy storytelling of Leigh Bardugo, and the dynamic performance style of Beyoncé into sketching, choir vocals, and TikTok
    video production that blend music, humor, and visual art.
  travel: Sabrina Delaine enjoys spontaneous weekend hikes in the Black Hills, has taken a family road trip to Yellowstone, and dreams of a future adventure to New Orleans to experience its jazz scene and
    soulful cuisine.
  culinary: Sabrina Delaine experiments in the kitchen by fusing Southern soul food like fried chicken and collard greens with local ingredients such as bison and huckleberries, creating dishes like bison‑glazed
    fried chicken and sweet‑potato pie topped with huckleberries, while maintaining a moderate cooking skill level that lets them try new recipes weekly.
  core: Sabrina Delaine is a curious, sociable 14‑year‑old who balances practical thinking with spontaneous bursts of creativity in basketball, dance, community art projects, and soulful cooking, even as
    their relaxed attitude sometimes leads to missed deadlines and a cluttered backpack.
background:
  cultural: Sabrina is a Black teenager raised in Rapid City, where she balances the traditions of her African‑American heritage with the unique cultural landscape of the Plains. Her family originally moved
    from the Midwest, bringing with them Sunday gospel services, a love for soul food, and celebrations of Juneteenth and Black History Month. She attends a local Baptist church that serves as a hub for
    community gatherings, where she participates in choir and youth outreach programs. Living near the Pine Ridge Reservation has introduced her to Lakota traditions; she has attended powwows, learned about
    Indigenous storytelling, and formed friendships with Native peers, fostering a deep respect for the land and its history. The outdoor culture of the Black Hills also shapes her experiences—weekend hikes,
    camping trips, and visits to the Badlands are common family activities. Through this blend, Sabrina’s identity reflects both the rhythm of contemporary Black youth culture—music, fashion, and social
    media—and the appreciation for the natural environment and cultural diversity of South Dakota.
