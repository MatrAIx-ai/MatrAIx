  hobbies: '[''Knitting'', ''Quilting'', ''Gardening'', ''Birdwatching'', ''Bridge'', ''Scrabble'', ''Local history research'', ''Storytelling'', ''Journaling'', ''Cooking'', ''Community volunteering'',
    ''Attending town events'']'
  career_goals: Although retired, Clara aims to leave a lasting legacy in Machias. She plans to document and publish a collection of oral histories from longtime residents, create an annual heritage festival
    that blends new ideas with traditional celebrations, and mentor younger volunteers in storytelling and digital archiving. She also hopes to establish a small scholarship for local high-school students
    interested in history or the arts, and to continue competing in community bridge tournaments, using her competitive spirit to inspire others.
