personas:
  professional: Jaqueline Vejar is a budding wildlife photographer and junior environmental activist who channels their curiosity and practicality into documenting Everglades ecosystems with a smartphone,
    leads their school’s Eco Club, competitively enters local photo contests, and often balances disorganized schedules with a skeptical eye toward adult guidance.
  sports: Jaqueline Vejar is an avid soccer player on the Clewiston Hurricanes Youth Soccer Club, eager to refine dribbling skills during after‑school games, while cheering for the Miami Heat and Miami
    Dolphins, and they view fitness as a competitive outlet, though occasional disorganization sometimes leads to missed practices.
  arts: Jaqueline Vejar fuels their creative spark by sketching original comic characters inspired by the bold lines of Jim Lee and the storytelling of Brian K. Vaughan, crafting small recycled‑material
    sculptures in the backyard, and they unwind listening to Bad Bunny, Daddy Yankee, and classic salsa from Celia Cruz, which fuels their vibrant artistic style.
  travel: Jaqueline Vejar delights in weekend family road trips that blend low‑key Everglades hikes with stops at nearby Key West beaches, and they dream of exploring the historic streets of San Juan and
    the bustling markets of Mexico City, favoring flexible, adventure‑focused itineraries despite occasional worries about packing and school commitments.
  culinary: Jaqueline Vejar shows an intermediate knack for cooking, mastering family‑favorite arroz con gandules and pastelitos while also experimenting with mango‑lime salsa and plantain chips, and they
    relish the tactile joy of kneading dough, though they often leave the kitchen cluttered with sketchbooks and snack wrappers after culinary experiments.
  core: Jaqueline Vejar is a curious, competitive 12‑year‑old who channels a love of wildlife, soccer, and comic art into vibrant projects, yet they frequently procrastinate, worry about perfection, and
    leave a trail of scattered sketchbooks and snack wrappers.
background:
  cultural: Jaqueline is a proud Puerto Rican-American raised in Clewiston, Florida. Her household blends Caribbean rhythms, Spanish language, and American school life, giving her a bicultural perspective.
    Family gatherings feature traditional foods like arroz con gandules and pasteles, and celebrations of festivals such as Three Kings Day and Puerto Rico's Día de la Constitución. She listens to a mix
    of salsa, reggaetón, and local Florida music, influencing her love for rhythm and dance. These cultural ties shape her identity, motivate her to preserve Puerto Rican heritage, and inspire her interest
    in community-focused projects.
