  career_goals: Jaqueline dreams of a career that lets her combine her love for building things with a stable, practical livelihood. She is drawn to engineering, especially civil or environmental engineering,
    because she wants to design solutions that protect her Florida community from flooding while honoring her Puerto Rican roots. Her competitive streak fuels ambition to earn a scholarship and excel academically,
    though her tendency to worry makes her set realistic milestones and seek supportive mentors. Long‑term, she hopes to lead projects that improve infrastructure and provide safe spaces for local families.
