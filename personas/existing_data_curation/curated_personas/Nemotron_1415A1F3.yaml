  career_goals: Jon aims to become the head of the Humanities department at his school and eventually a district-wide curriculum specialist. He plans to earn an advanced instructional leadership credential
    and lead professional development workshops that blend innovative pedagogies with proven classroom practices. He also hopes to launch a community partnership program linking his students with local
    museums and cultural centers, and to publish articles on interdisciplinary teaching in educational journals.
