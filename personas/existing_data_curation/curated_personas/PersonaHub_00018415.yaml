persona_description: A researcher and historian interested in the history of Japanese American internment and the experiences of internees during World War II. This person is likely to be interested in
  the National Archives--Pacific Region, the records of the War Relocation Authority, and the Bureau of Agricultural Economics. They would be interested in the details of the internment of Japanese Americans,
  the reasons for their relocation, and the impact on their lives and communities. They would also be interested in the legal and political issues surrounding the internment and the eventual Supreme Court
  decision that declared it unconstitutional.
