personas:
  professional: Iliana Martinez is a budding problem-solver, already displaying precocious curiosity for how cause-and-effect works by shaking rattles and assembling simple stacking rings, balancing innovative
    tinkering with a surprisingly practical method of placing toys where they can be retrieved easily, hinting at a future career in engineering or scientific research.
  sports: Iliana Martinez enjoys rhythmic toddler gymnastics classes at the local community center, loves watching the New York Yankees on TV with her dad, and has joined a stroller-walking club where she
    competes with other babies to be the first to wave at passing dogs.
  arts: Iliana Martinez engages with the arts by mouthing soft fabric books featuring illustrations by Eric Carle, responding to Mozart’s Piano Sonata No. 16 with rhythmic kicking, and delighting in puppet
    shows by local theater troupe Tiny Tales, which feed her developing critical eye and competitive desire to mimic the characters.
  travel: Iliana Martinez’s travel persona is that of a miniature explorer, having visited Grandma’s seaside cottage in Maine, and eagerly anticipating a forthcoming family trip to San Diego’s zoo, where
    she plans to balance wide‑angle stroller excursions with quiet nap breaks in the shaded gardens.
  culinary: Iliana Martinez shows a budding palate by favoring mashed sweet potatoes and small bites of avocado, skillfully rejecting broccoli florets as she crumples them with her gums, and her caregivers
    enjoy cooking simple puree meals using cinnamon and a pinch of cumin to stimulate her curiosity for new flavors.
  core: Iliana Martinez blends infant curiosity with a practical streak, skeptically testing textures, competitively crawling toward the first toy, and habitually clinging to her favorite blanket while
    her parents nurture her early financial savviness through tiny piggy‑bank games.
background:
  cultural: Iliana comes from a Spanish family rooted in San Diego's vibrant Latino community. At home, Spanish is spoken alongside English, and she is raised with traditions such as celebrating Día de
    los Reyes, enjoying family gatherings around communal meals, and participating in local cultural festivals. The blend of Mediterranean heritage and Southern Californian influences shapes her early worldview,
    fostering a strong sense of family, bilingual identity, and appreciation for both Spanish and American customs.
