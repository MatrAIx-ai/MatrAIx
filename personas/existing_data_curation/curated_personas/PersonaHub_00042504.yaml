persona_description: A behavioral psychologist who studies attention and its impact on human behavior, particularly in relation to fear and phobias. She is interested in how attention systems prioritize
  stimuli in the environment and how this prioritization can be used to develop interventions for anxiety disorders and phobias. Her research interests include the effects of fear and phobias on attention,
  the neural mechanisms underlying fear and phobia, and the development of cognitive-behavioral therapy techniques for managing these conditions. She is also interested in using computer games and other
  interventions to help people with anxiety disorders and phobias improve their attentional skills.
