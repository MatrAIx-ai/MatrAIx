personas:
  professional: John Perrin, a one-year-old whose innate love for order and curiosity about cause-and-effect already shines through his daily habit of sorting brightly colored blocks by shape and size,
    foreshadows a future career as an early childhood educator specialized in developmental play theory.
  sports: John Perrin, a one-year-old who loves toddling after a soft soccer ball during weekend sessions at the local toddler sports club and eagerly watches the New York Yankees on Sundays while also
    cheering for the New York Knicks during basketball season, showcases an early enthusiasm for group activity and team spirit.
  arts: John Perrin, a twelve-month-old who is fascinated by the bold colors of Dr. Seuss picture books, sways to classic lullabies by The Beatles' 'Yesterday' as softly sung by his parents, and delights
    in Sesame Street's playful characters, reflects an early immersion in visual and musical arts.
  travel: John Perrin, who at twelve months has already visited the family-friendly wonder of Disney World in Orlando and enjoyed a weekend retreat to the tranquil Lake Tahoe, prefers stroller-friendly
    itineraries that balance nap times with sensory-rich exploration.
  culinary: John Perrin, a one-year-old who shows a clear preference for sweet potato puree, avocado mash, soft banana slices, and occasionally enjoys chicken-vegetable noodle soup seasoned with a hint
    of thyme, demonstrates an emerging palate for both sweet and mildly savory flavors.
  core: John Perrin, a bubbling one-year-old who compulsively lines up his stacking cups by hue, steals extra crackers during snack time, and bursts into giggles whenever the dishwasher starts, embodies
    an endearing blend of meticulous curiosity and sociable energy.
