  hobbies: '[''Sketching and drawing'', ''Photography (street art, industrial subjects)'', ''Upcycling metal into sculptures'', ''Set design for community theater'', ''Hiking coastal trails'', ''Surfing'',
    ''Gardening'', ''Reading (philosophy, sci-fi, artist biographies)'', ''Cooking (Mediterranean cuisine)'']'
  career_goals: Looking ahead, Brian aims to leverage his supervisory expertise and his passion for creative problem‑solving to transition into a senior operations or training role where he can design and
    deliver continuous‑improvement programs across multiple facilities. He is particularly interested in integrating sustainability and ergonomic design into production lines, and he hopes to become a mentor
    for emerging supervisors, sharing both technical and interpersonal best practices. Over the next five years, he plans to earn a certification in Lean Six Sigma, develop a small consultancy focused on
    workplace efficiency for boutique manufacturers, and explore opportunities to contribute to community arts initiatives, blending his professional experience with his love of the arts.
