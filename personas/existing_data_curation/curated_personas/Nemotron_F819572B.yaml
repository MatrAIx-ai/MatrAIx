  hobbies: '[''Watercolor painting'', ''Collage art'', ''Sketching landscapes'', ''Improvisational theater'', ''Open-mic performances'', ''Reading speculative fiction'', ''Philosophy discussions'', ''Cycling
    through vineyards'', ''Hiking'', ''Volunteer community events'', ''Wine festival participation'']'
  career_goals: Michael aspires to turn his creative passions into a sustainable livelihood. He aims to become a freelance cultural content creator and community arts facilitator, producing multimedia stories
    that highlight Napa’s local heritage and contemporary art scene. Over the next five years, he envisions launching a pop-up gallery-café that offers workshops in painting, improv, and wine appreciation,
    while also building a modest online following through video essays and podcasts. He hopes to eventually secure grant funding to expand his programming and become a recognized cultural ambassador for
    American Canyon.
