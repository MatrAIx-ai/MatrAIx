  career_goals: Valerie aspires to become a multidisciplinary artist, aiming to study illustration and graphic design in a BFA program and later work as a concept artist for indie video game studios or
    as a freelance illustrator. She values flexibility and creative autonomy, so she envisions establishing a small studio where she can produce and sell original artwork, curate community art projects,
    and possibly teach workshops to share her passion for unconventional art forms. Long‑term, she hopes to blend technology and visual storytelling in a role that allows her to experiment with new media
    while maintaining a balanced, self‑directed career path.
