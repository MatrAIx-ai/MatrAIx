personas:
  professional: Valerie Tan is an aspiring multidisciplinary teen artist who blends digital illustration, analog photography, and narrative writing into concept art for indie video games, channeling a fierce
    curiosity and competitive drive into bold visual experiments while they favor a relaxed, unstructured workflow that reflects a preference for creative autonomy over strict schedules.
  sports: Valerie Tan finds strategic sport in competitive chess tournaments and occasional weekend pickup basketball at the downtown community center, cheering on the Los Angeles Lakers and Manchester
    United, and they serve as the vice‑president of the school’s chess club while generally prefer solo cardio runs over team sports.
  arts: Valerie Tan immerses themselves in the arts by sketching in parks inspired by Claude Monet’s impressionist light, collecting vintage postcards featuring Alphonse Mucha’s designs, curating playlists
    of indie musicians like Sufjan Stevens and Mitski, studying street‑art provocations of Banksy, and regularly visiting galleries that showcase the surreal narratives of contemporary illustrator Junji
    Takashima, and they often synthesize these influences into blended digital‑analog projects.
  travel: Valerie Tan prefers spontaneous weekend trips to culturally rich cities, having already explored Kyoto’s Arashiyama bamboo grove and Barcelona’s Park Güell on school outings, dreaming of a solo
    creative retreat in Reykjavik to capture northern lights, while they budget travel costs by freelancing artwork for online clients and rely on low‑cost hostels and public transport.
  culinary: Valerie Tan enjoys experimenting in the kitchen, frequently making avocado toast topped with smoked salmon and chili flakes, crafting homemade ramen broth seasoned with miso, kombu, and a dash
    of soy, and whipping up matcha‑green tea pancakes sprinkled with fresh berries, displaying a confident yet still learning‑level cooking ability, and they often share these meals after late‑night darkroom
    sessions.
  core: Valerie Tan is a curious, slightly disorganized teen artist whose competitive streak fuels daily sketch marathons, hoards vintage postcards, habitually stays up late developing photos, and balances
    a modest freelance income with impulsive splurges on indie vinyls, while they rarely miss an opportunity to explore new soundscapes.
background:
  cultural: Valerie grew up in Oviedo, Florida, in a middle‑class, white family with Irish and German ancestry. Her upbringing blended typical suburban Southern influences—community festivals, local high
    school sports events, and a strong emphasis on family gatherings—with a deep exposure to the arts, thanks to frequent trips to Orlando’s museums and cultural events. Living in a culturally diverse state,
    she has absorbed elements of Florida’s multicultural environment, such as Latin music rhythms and culinary variety, which complement her appreciation for a broad range of artistic expressions. She identifies
    primarily with a white American cultural background while remaining open to global artistic influences.
