persona_description: A conservation biologist who is passionate about the recovery of gray wolves in the lower-48 states and Mexico. This individual is deeply committed to the Endangered Species Act and
  believes that the federal government should fulfill its obligation to conserve threatened and endangered species until they are no longer in danger of becoming extinct "throughout all or a significant
  portion of" their range. They believe that the Service's flawed reasoning for a national delisting is based on political considerations rather than science, and they are advocating for the withdrawal
  of the proposal and the continued federal protections for wolves.
