  career_goals: Nancy aspires to deepen her expertise by completing a bachelor’s degree in Library Science and eventually earning a Master of Library and Information Science (MLIS). Within the next five
    years she aims to transition into a librarian role, ideally as a youth services coordinator, where she can design innovative literacy programs and expand digital collections for her rural community.
    She is eager to lead grant‑writing initiatives that bring new technology and resources to the King and Queen County library system. Recognizing her own sensitivity to stress, she also prioritizes building
    personal resilience, seeking professional development in stress‑management and workplace wellbeing so she can serve as a supportive mentor for junior staff and volunteers.
