personas:
  professional: Nancy Cox, a library assistant in Tappahannock renowned for meticulous cataloguing and warm patron service, they combine a methodical work ethic with a curiosity‑driven enthusiasm for community
    programming, grant writing, and planning innovative youth literacy initiatives.
  sports: Nancy Cox, an avid hiker and beach‑side jogger, they cheer for the Washington Nationals and Washington Capitals, belong to a local tidewater trail hiking group, and join a seasonal community softball
    league each summer.
  arts: Nancy Cox, a devoted book‑club member and budding photographer, they find inspiration in Ansel Adams’ landscapes, enjoy the folk sounds of The Avett Brothers, and volunteer knitting blankets for
    library donations while listening to The Lumineers on vinyl.
  travel: Nancy Cox, who blends careful budgeting with a spontaneous spirit, they have explored Williamsburg’s historic district, savored Charleston’s coastal charm, and dream of touring Norway’s fjords
    while also planning annual leaf‑peeping trips to the Blue Ridge Mountains.
  culinary: Nancy Cox, a self‑taught home cook who loves comfort food, they regularly prepare shrimp and grits seasoned with fresh herbs, roast sweet potatoes with rosemary, and bake apple‑cinnamon pies
    for game nights, while sharpening their skills through online culinary workshops.
  core: Nancy Cox, a methodical yet socially‑driven library professional, navigates life with organized curiosity, a gentle undercurrent of anxiety, and a quirky habit of over‑packing both tote bags and
    emotional concerns.
background:
  cultural: Nancy Ann Cox grew up in Tappahannock, a small, close‑knit town on Virginia’s Eastern Shore, within King and Queen County. Raised in a middle‑class, white family with deep community roots, she
    attended a local Methodist congregation that emphasized hospitality, neighborliness, and service. The area’s cultural fabric blends Southern gentility, agricultural traditions, and a strong appreciation
    for local history and waterways. Nancy’s upbringing immersed her in community events such as county fairs, church socials, and library programs, fostering a sense of responsibility toward preserving
    and sharing the region’s heritage. While she values these traditional Southern influences, she also embraces a progressive curiosity, seeking inclusive services and modern resources for her library
    patrons.
