    outreach and volunteer coordination", "Critical thinking and problem solving"]'
  hobbies: '["Reading contemporary literature", "Visiting museums and art galleries", "Street photography (documenting Brooklyn neighborhoods)", "Creative journaling and reflective writing", "Practicing
    yoga and mindfulness", "Exploring new cuisines through cooking", "Strategic board games (e.g., Settlers of Catan, Pandemic)", "Urban hiking and park visits", "Volunteering at community literacy programs",
    "Attending public lectures and author talks", "Curating personal digital photo collections"]'
  career_goals: Rosemarie aims to pivot from her current non‑workforce status into a leadership role within the cultural nonprofit sector, such as a program director for a museum or community arts organization.
    She plans to complete a project‑management certification and enroll in a master’s program in library and information science to deepen her archival expertise. In the medium term, she wants to head grant‑writing
    teams, design public‑engagement programs, and eventually launch her own consultancy that helps small arts nonprofits secure funding and develop sustainable outreach strategies.
