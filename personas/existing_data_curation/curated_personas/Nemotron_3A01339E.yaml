  hobbies: '[''Reading art‑history and philosophy'', ''Watercolor sketching'', ''Landscape and architecture photography'', ''Hiking in the Cumberland Plateau'', ''Bird watching'', ''Listening to jazz and
    classical vinyl records'', ''Playing acoustic guitar'', ''Solving chess puzzles'', ''Writing reflective essays for a personal blog'', ''Collecting vintage vinyl records'', ''Experimenting with cooking
    recipes'']'
  career_goals: Jimi aims to progress from a management analyst to a senior strategy consultant specializing in cultural institutions and regional development. He envisions leading cross‑functional teams
    to design data‑driven programs that support arts funding and community revitalization in Appalachia. Long‑term, he hopes to launch his own boutique consultancy that helps museums, galleries, and non‑profits
    integrate rigorous analytics with storytelling. He also plans to pursue a master’s degree in business analytics to deepen his technical expertise while maintaining his focus on artistic and cultural
    impact.
