  hobbies: '[''Gardening'', ''Birdwatching'', ''Historical Fiction Reading'', ''Community Theater'', ''Bridge'', ''Chess'', ''Volunteer Work at Senior Center'', ''Crochet'', ''Digital Photography'', ''Cooking'']'
  career_goals: While retired from paid work, Laura’s ambition is to channel her organizational talent and competitive curiosity into senior‑advocacy leadership. She aims to chair the Pinellas County Senior
    Volunteer Council, launch a local‑history podcast series, and publish a memoir that weaves personal resilience with the changing cultural landscape of Saint Petersburg. She also plans to master digital
    photography to document the region’s natural and historic sites, and to secure funding for a community garden that offers inter‑generational learning opportunities.
