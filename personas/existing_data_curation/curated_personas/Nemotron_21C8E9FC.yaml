personas:
  professional: Beatriz Gonzalez, at age seven, is a budding soccer enthusiast who already shows emerging leadership on the field, organizing drills for friends and applying their love for structure to
    keep the game fair and predictable, while their cooperative nature makes them a natural teammate.
  sports: Beatriz Gonzalez plays for the Sunrise Soccer Club’s under-seven team, idolizes the city’s professional women’s soccer squad the River City Rapids, and spends weekends chasing a soccer ball with
    friends in the neighborhood park, always insisting on a set schedule for practice to satisfy their need for predictability.
  arts: Beatriz Gonzalez loves drawing vibrant papel picado patterns inspired by the lively tunes of Carlos Vives and the animated songs of Disney’s Moana, sings along to the folk melodies on their family’s
    playlist, and attends weekly Mexican folkloric dance classes where they relish the rhythmic footwork taught by Maestro Rodriguez.
  travel: Beatriz Gonzalez has visited the nearby aquarium, the state fair, and a family road trip to the Grand Canyon, and they dream of exploring the historic plazas of Guanajuato and the beaches of Tulum,
    balancing their wish for adventurous trips with their parents’ careful planning and budget.
  culinary: Beatriz Gonzalez enjoys helping to mash ripe avocados for guacamole, sprinkling sea salt and lime juice on fresh mango slices, and can whip up a simple cheese quesadilla with cheddar and salsa
    roja, though they sometimes forget to wash their hands before cooking.
  core: Beatriz Gonzalez is a lively seven‑year‑old who thrives on organized play, bright colors, and team camaraderie, yet they wrestle with sudden waves of anxiety that can turn a fun day into a worry‑filled
    one.
background:
  cultural: Beatriz is a Mexican‑American child raised in Corpus Christi, Texas, in a bilingual household where Spanish and English are spoken daily. Her family honors Mexican traditions such as Día de
    los Muertos, quinceañera celebrations, and cooking classic dishes like tacos, tamales, and pozole. The coastal Texas environment adds a love for beach outings and seafood. She participates in local
    community events, attends a public elementary school with a diverse student body, and is involved in church activities that reinforce family values, hospitality, and respect for elders.
