  hobbies: '[''Co‑ed softball league'', ''Volunteer coordination for local food bank'', ''Cycling along Lake St. Clair trails'', ''DIY home improvement projects'', ''Puzzle solving (crosswords, Sudoku)'',
    ''Car enthusiast gatherings'', ''Cooking and hosting dinner parties'', ''Reading mystery and thriller novels'']'
  career_goals: Angela aims to step into a regional operations manager role within the next three to five years, overseeing multiple transportation hubs and driving strategic initiatives such as green‑fleet
    conversion and advanced routing technology. She plans to earn a Certified Supply Chain Professional (CSCP) credential, mentor emerging female leaders in logistics, and eventually launch a consulting
    practice focused on efficiency and sustainability for Midwestern manufacturers.
