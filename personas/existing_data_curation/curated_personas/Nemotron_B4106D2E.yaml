  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Acoustic guitar playing'', ''Reading science-fiction and popular science'', ''Astronomy and star-gazing'', ''Gardening'', ''Cooking Mexican-American
    fusion dishes'', ''Chess'', ''Small book discussion group'', ''Volunteering for STEM outreach'', ''Mindfulness and meditation sessions'']'
  career_goals: Nixon aims to broaden his influence beyond one-on-one tutoring by founding a community STEAM learning center in Green Bay that offers after-school programs for underrepresented students,
    particularly those from Mexican-American families. He plans to develop a bilingual STEM curriculum, author a practical guide on integrating art into science education, and serve as an adjunct professor
    at the University of Wisconsin-Green Bay. Long-term, he hopes to mentor emerging tutors, contribute to policy discussions on educational equity, and launch an online platform that provides free, culturally
    relevant resources for self-paced learning.
