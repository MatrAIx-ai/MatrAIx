persona_description: Alexander, Hartley Burr, a poet, philosopher, and anthropologist known for his contributions to the symbolism and inscriptions for the Nebraska State Capitol. He was educated at the
  University of Nebraska, received his doctorate in philosophy from Columbia University in 1901, and worked as a popular teacher and lecturer, editor, and author in various fields. He was appointed as the
  president of the American Philosophical Association in 1919, and his work on the capitol's symbolic program resulted in his success in receiving offers for similar projects elsewhere. He moved to California
  in 1927 to develop Scripps College, a new college for women in Claremont, and was buried in Claremont, California.
