personas:
  professional: Susan Webb is a budding junior naturalist who channels her love for nature walks and leaf collecting into school science projects, balancing her meticulous routine with a practical curiosity
    that makes her a reliable member of her Girl Scouts troop and a go‑to helper for class experiments.
  sports: Susan Webb enjoys swimming laps at the community pool each summer, supports the Philadelphia Eagles and cheers for them on game nights, and they also play on a local youth soccer team that practices
    on Saturday mornings, following a routine that satisfies their love for organized activity.
  arts: Susan Webb is an enthusiastic piano player who practices three times a week, loves the music from Disney soundtracks and simple Beethoven pieces, reads J.K. Rowling’s Harry Potter series, draws
    fantastical creatures inspired by the books, and listens to pop hits by Taylor Swift while crafting beaded bracelets.
  travel: Susan Webb dreams of visiting historic sites like Independence Hall in Philadelphia, has taken weekend hikes in the nearby Wissahickon Valley, wishes to explore Disneyland and the castles of Scotland
    someday, and prefers meticulously planned trips that still leave space for spontaneous ice‑cream stops.
  culinary: Susan Webb enjoys baking chocolate chip cookies with their mother on Saturdays, loves the aroma of cinnamon sugar pretzels, can confidently whisk pancake batter without spilling, and delights
    in pizza topped with extra cheese and oregano, all while gradually mastering basic kitchen safety.
  core: Susan Webb blends a love for routine, nature, and creative crafts with a practical, kind‑hearted outlook, balancing school, Girl Scouts, piano practice, and weekend baking while habitually budgeting
    their allowance and managing mild allergies.
background:
  cultural: Susan was raised in Blue Bell, Pennsylvania, a suburban community in Montgomery County known for its family‑oriented neighborhoods and strong public school system. Her family follows a typical
    White American middle‑class tradition, attending a local Protestant church and taking part in community events such as the Fourth of July parade, church picnics, and school fundraisers. The cultural
    atmosphere emphasizes politeness, responsibility, and community involvement, which aligns with Susan’s cooperative and harmony‑seeking personality. Her upbringing includes frequent trips to nearby Philadelphia
    museums and historical sites, reinforcing a practical appreciation for local heritage.
