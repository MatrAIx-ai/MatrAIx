  career_goals: Susan dreams of a future where she can help others in a practical, hands‑on way. In the short term she aims to finish elementary school with strong grades and stay active in her Girl Scouts
    troop. Looking ahead, she hopes to become either an elementary school teacher or a pediatric nurse, combining her love of routine, caring nature, and desire to keep children safe and thriving. She also
    plans to volunteer at the local animal shelter during middle school to gain experience caring for animals.
