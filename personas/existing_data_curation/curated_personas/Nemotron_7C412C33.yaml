    and documents'', ''Organizing family gatherings and events'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Crossword puzzles and Sudoku'', ''Knitting scarves and blankets'', ''Herb gardening on the porch'', ''Birdwatching from the window'', ''Listening
    to big‑band and jazz music'', ''Attending Sunday church services'', ''Cooking traditional Pennsylvania recipes'', ''Storytelling with grandchildren'', ''Walking short neighborhood routes'']'
  career_goals: Lisa’s goals center on maintaining her health and independence while leaving a meaningful legacy for her family and community. She aims to complete a memoir that weaves personal stories
    with genealogical research, preserving her family’s history for future generations. She wishes to stay actively involved at the senior center, perhaps leading a weekly knitting circle, and to mentor
    her grandchildren in practical life skills such as cooking, budgeting, and basic home maintenance. Ensuring her home remains safe and comfortable through minor adaptations is also a priority, as is
    sustaining regular, low‑stress contact with a small circle of trusted friends and relatives to help manage her natural tendency toward worry.
