personas:
  professional: Carmen Raghunath is a veteran arcade and vending machine technician on Vashon Island, blending deep electronic repair expertise with a designer’s eye to retrofit vintage machines with cashless
    technology while mentoring apprentices and negotiating with venue owners to keep downtime minimal.
  sports: Carmen Raghunath rows with the Vashon Kayak Club, hikes the island’s old timber trails, cheers for the Seattle Seahawks, Seattle Sounders FC, and the Seattle Mariners, and maintains a weekly yoga
    routine to counteract the physical demands of machine restoration.
  arts: Carmen Raghunath immerses themselves in the Vashon arts community, attending exhibitions at the Vashon Island Center for the Arts featuring artists like Mary Lentz, performing in community theater
    productions with the Vashon Playhouse, and collaborating on murals with the Pacific Northwest Street Art collective, all of which feed their habit of sketching custom artwork for arcade cabinet exteriors.
  travel: Carmen Raghunath prefers low‑key, experience‑rich trips, often biking to the San Juan Islands, taking weekend ferry rides to Victoria, Canada, exploring Portland’s food and music scene, and dreaming
    of a pilgrimage to the historic Royal Mint in London to deepen their coin‑collecting expertise.
  culinary: Carmen Raghunath delights in farm‑to‑table cooking, frequently preparing dishes like roasted beet and goat‑cheese salad, miso‑glazed salmon, and wild mushroom risotto using heirloom carrots,
    Pacific salmon, and locally foraged mushrooms from the community garden.
  core: Carmen Raghunath is a calm, competitively‑driven techno‑artisan who restores vintage arcade cabinets into cashless art installations, balances a love for community collaboration with a skeptical
    edge, and occasionally overcommits to projects but always delivers with precision.
background:
  cultural: Carmen grew up in the suburban Seattle area of the Pacific Northwest, shaped by the region’s emphasis on environmental stewardship, self‑reliance, and a thriving independent‑arts community.
    Through her marriage to a partner of Indian heritage, she regularly partakes in multicultural celebrations, such as Diwali and Holi, and incorporates Indian culinary traditions into her home life. This
    blend of Northwest values and multicultural exposure informs her open‑minded, community‑oriented perspective while maintaining a distinctively American cultural identity.
attributes:
  skills: '[''Mechanical Repair'', ''Electronic Diagnostics'', ''Preventative Maintenance'', ''Custom Machine Aesthetics'', ''Cashless Payment System Integration'', ''Regulatory Compliance'', ''Inventory
