  hobbies: '[''Visiting art galleries and exhibitions'', ''Community theater participation'', ''Kayaking on Puget Sound'', ''Hiking local trails'', ''Community garden volunteering'', ''Collecting vintage
    coins'', ''Restoring arcade cabinets'', ''Custom machine artwork'', ''Hosting board‑game nights'', ''Attending maker fairs'', ''Farm‑to‑table cooking'']'
  career_goals: Looking ahead, Carmen aims to expand her solo service business into a small regional firm that provides specialized retrofitting of vintage arcade and vending equipment with sustainable,
    cashless technology. She plans to develop a mentorship program for the next generation of technicians, position herself as a consultant for community art projects that repurpose machines into interactive
    installations, and eventually transition to a part‑time advisory role while maintaining a selective portfolio of high‑profile clients. Her goal is to be recognized as the go‑to expert for integrating
    technical excellence with artistic flair in the Pacific Northwest.
