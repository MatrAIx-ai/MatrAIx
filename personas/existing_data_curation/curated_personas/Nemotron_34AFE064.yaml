personas:
  professional: Selena Nelson, a budding junior architect who constructs elaborate LEGO towers and sketches colorful neighborhood scenes, channels their organized, methodical planning and sociable curiosity
    into early design play, treating each brick like a blueprint for future community spaces.
  sports: Selena Nelson, an enthusiastic member of the DeKalb County park’s after‑school soccer club who loves sprinting in tag, cheers on the Atlanta Braves during weekend family outings, and balances
    competitive play with cooperative games, reflecting their energetic and outgoing nature.
  arts: Selena Nelson, an avid participant in the neighborhood library’s storytime and art workshops, fills sketchbooks with bright crayon drawings inspired by Mo Willems books and Disney’s ‘Frozen’ movie,
    letting their curiosity and love for unconventional ideas flourish through daily creative play.
  travel: Selena Nelson, an adventurous little explorer who has visited the Georgia Aquarium, taken a family road trip to historic Savannah, and dreams of a future Disney World vacation, plans their outings
    with colorful itinerary maps they draw themselves, blending their organized mind with a love for discovery.
  culinary: Selena Nelson, a budding junior chef who proudly helps harvest garden tomatoes and carrots, delights in assembling grilled cheese sandwiches with cheddar, and savors family backyard barbecue
    ribs topped with a hint of peach glaze, showcasing their appreciation for regional flavors and hands‑on cooking.
  core: Selena Nelson blends curious creativity with methodical planning, never forgetting their favorite LEGO brick in their pocket, and approaches every backyard game, storytime, or art project with calm
    confidence and a burst of energetic optimism.
background:
  cultural: Selena is a white child raised in the diverse community of DeKalb County, Atlanta. She experiences Southern family traditions such as holiday gatherings and backyard barbecues, while also attending
    multicultural events at school and the community center that celebrate the rich cultural tapestry of the Atlanta area. The neighborhood’s emphasis on public libraries, park programs, and art workshops
    shapes her appreciation for community involvement and creative expression.
