  career_goals: Jessica aims to become a senior safety engineering leader within the aerospace or renewable‑energy sector, guiding the integration of innovative safety technologies like AI‑driven hazard
    detection and VR training platforms. She plans to earn the Certified Safety Professional (CSP) credential and pursue a master’s degree in Occupational Safety and Health. Long‑term, she envisions establishing
    her own consultancy that helps organizations cultivate safety cultures that prioritize both physical protection and mental well‑being, publishing research on safety in high‑risk environments and influencing
    state safety policy.
