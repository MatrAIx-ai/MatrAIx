persona_description: A researcher in the field of freshwater ecology, specifically focused on the effects of nonindigenous fishes on native species in Florida. This person is interested in understanding
  the mechanisms by which nonindigenous fishes such as eastern mosquitofish resist invasion and compete with native species. They are particularly interested in studying the role of habitat complexity and
  the impact of eastern mosquitofish on the survival and behavior of other nonindigenous fishes.
