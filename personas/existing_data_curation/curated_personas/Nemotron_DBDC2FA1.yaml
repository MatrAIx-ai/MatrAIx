  career_goals: Anita aims to transition from supervisory roles to an executive chef position within the next three years, eventually opening her own boutique restaurant that fuses Southern heritage with
    avant‑garde culinary concepts. She plans to earn a Certified Executive Chef credential, develop a signature cookbook that showcases artistic plating and novel flavor pairings, and compete in regional
    culinary contests to gain recognition. Long‑term, she envisions becoming a culinary consultant for hospitality groups, designing menu concepts that emphasize creativity, sustainability, and guest engagement.
