  career_goals: Thiem aspires to evolve from a senior computer systems analyst into a solutions architect specializing in cloud-native and AI-enhanced enterprise architectures. Over the next five years
    he plans to earn AWS Solutions Architect Professional and Certified Scrum Master certifications, lead small, high-performing project teams, and mentor junior analysts in a collaborative yet results-focused
    environment. Ultimately, he envisions launching his own consultancy that helps regional small businesses and nonprofit organizations implement scalable, secure technology solutions while providing him
    the flexibility to balance professional ambition with personal stability after his divorce.
