persona_description: A medical researcher who specializes in the study of sexual health and the immune system, particularly the role of the immune response in the development of recurrent yeast infections
  in women. She is a professor at the University of Michigan Medical School and has published several studies on the topic. Her research interests include the development of new treatments for recurrent
  yeast infections and the study of the immune response in the female reproductive system. She has received funding from the National Institute of Allergy and Infectious Diseases to conduct her research.
