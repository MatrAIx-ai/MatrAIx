  hobbies: '[''gardening'', ''baking bread and pies'', ''knitting'', ''reading practical guides'', ''journaling'', ''jigsaw puzzles'', ''sketching'', ''volunteering at church events'']'
  career_goals: Cynthia aims to complete her high school education, either by finishing the 9th grade or obtaining a GED, and then enroll in a community‑college program focused on office administration
    or agricultural business. She is drawn to careers that provide structure and serve her community, such as an administrative assistant in the local school district, a bookkeeping role for the town’s
    agricultural cooperative, or eventually managing the family farm’s operations. Her long‑term ambition is to build a stable, routine‑oriented profession that lets her apply her organizational strengths
    while staying close to her hometown.
