    Asian community events'']'
  hobbies: '[''Reading contemporary fiction and psychological thrillers'', ''Cooking traditional Chinese dishes'', ''Listening to K‑pop and indie folk music'', ''Yoga and mindfulness meditation'', ''Journaling'',
    ''Hiking the Iowa River Corridor trails'', ''Volunteering at the community center'', ''Participating in the university’s Asian Student Association'']'
  career_goals: Kim aims to complete her associate degree in psychology and then transfer to a four‑year program to earn a bachelor's in social work. She aspires to become a licensed clinical social worker
    specializing in mental health support for college students, with a focus on Asian‑American youth. In the short term, she wants to secure an internship at a community mental‑health clinic to gain hands‑on
    experience. Long‑term, she envisions establishing a culturally responsive outreach program at the University of Iowa that blends structured counseling services with community‑building activities, thereby
    creating a supportive environment that addresses both academic stress and cultural adjustment challenges.
