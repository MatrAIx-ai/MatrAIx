personas:
  professional: Kim Shih is an aspiring social work student who merges meticulous event coordination, bilingual communication, and a solid grounding in mental‑health basics to volunteer at a campus counseling
    helpline, where their reliable, detail‑oriented nature and deep compassion drive them to support peers while navigating the pressures of academic life.
  sports: Kim Shih enjoys hiking the Iowa River Corridor trails and participates in the local Iowa River Trail Runners club, while they cheer for the Iowa Hawkeyes football team and occasionally join intramural
    volleyball during the fall season to stay active and relieve stress.
  arts: Kim Shih curates a nightly playlist that blends indie folk artists like Bon Iver with pop hits from Taylor Swift, watches Greta Gerwig films on weekends, and attends occasional community theater
    productions, finding that both mainstream and independent art help them unwind after a structured day.
  travel: Kim Shih prefers short, budget‑friendly trips that balance nature and culture, having explored the historic streets of Des Moines, taken a weekend road trip to Chicago’s art museums, and dreaming
    of a spring backpack adventure through the cherry‑blossom‑laden parks of Washington, D.C.
  culinary: Kim Shih frequently crafts homemade dumplings filled with pork and ginger and whips up quick stir‑fry noodles with soy sauce and bok choy, skillfully navigating the kitchen with moderate confidence
    while occasionally over‑seasoning dishes when stressed.
  core: Kim Shih is a detail‑driven, compassionate 18‑year‑old who channels their anxiety into structured volunteering, budget mindfulness, and a love of dumplings, hiking, and eclectic music, all while
    battling a habit of over‑committing to every good cause.
background:
  cultural: Kim was born to first‑generation Chinese immigrants who settled in Iowa City before she was born. Her household blends traditional Chinese values—such as filial piety, respect for elders, and
    a strong emphasis on education—with the Midwestern ethos of community involvement and personal responsibility. Growing up bilingual, Kim celebrates Lunar New Year with family gatherings, prepares classic
    dishes, and participates in the university’s Asian Student Association, which helps her maintain cultural ties while navigating American college life. Her dual cultural lens informs her compassionate
    approach to helping others, and she often draws on both collectivist and individualist perspectives when solving problems or supporting peers.
attributes:
  skills: '[''Bilingual communication (English/Mandarin)'', ''Active listening and empathy'', ''Mental health first aid'', ''First aid certification'', ''Event planning and volunteer coordination'', ''Data
