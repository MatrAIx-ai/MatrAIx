  career_goals: He aims to move from a frontline sales representative to a regional sales manager where he can shape a supportive, collaborative team culture. He wants to lead a group that values harmony
    and mutual assistance, leveraging his compassionate nature to mentor younger reps and create low‑stress, high‑performance environments. In the longer term, Ernesto envisions a senior role such as director
    of sales for a sustainable‑manufacturing line, combining his technical background with his passion for environmentally responsible products. To support this transition, he is pursuing certifications
    in sales leadership and stress‑management techniques.
