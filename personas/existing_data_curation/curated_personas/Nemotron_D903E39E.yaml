  career_goals: Eugene aims to advance from his current managerial role to a regional operations director overseeing multiple sites in Central Texas. He plans to obtain a professional certification such
    as PMP or Six Sigma to complement his experience, despite his limited formal schooling. Long‑term, he dreams of launching a boutique consultancy that blends his management expertise with a focus on
    fostering innovation and creative thinking in small businesses.
