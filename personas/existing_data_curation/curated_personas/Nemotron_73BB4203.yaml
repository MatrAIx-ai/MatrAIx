personas:
  professional: Elizabeth Skipper is a telecommunications installer and repair specialist who excels at RF system setup, fiber‑optic splicing, and spectrum analysis, translating their methodical precision
    and vivid imagination into inventive solutions for signal interference while mentoring junior technicians.
  sports: Elizabeth Skipper stays fit by hiking the pine forests around Minden with the North Louisiana Trailblazers club, doing weekend jogs while cheering for the New Orleans Saints and LSU Tigers, and
    occasionally joining a community co‑ed soccer league to satisfy their competitive streak.
  arts: Elizabeth Skipper channels their artistic flair into abstract mixed‑media collages that incorporate reclaimed Arduino boards and LED strips, while regularly attending Cajun music festivals featuring
    Clifton Chenier and Dr. John, and drawing inspiration from Jackson Pollock and Yayoi Kusama.
  travel: Elizabeth Skipper alternates between short‑haul trips to New Orleans for Mardi Gras and Austin's tech conferences, and long‑distance adventures such as hiking Iceland’s geothermal trails or exploring
    the Andean cloud forests of Quito, balancing a modest travel budget with a desire for both cultural immersion and rugged wilderness.
  culinary: Elizabeth Skipper enjoys cooking Cajun classics like shrimp étouffée and jambalaya seasoned with cayenne, smoked paprika, and fresh okra, while experimenting with LED‑lit plating for a sci‑fi
    aesthetic, and they often pair meals with cold‑brew coffee flavored with a hint of cinnamon.
  core: Elizabeth Skipper is a night‑owl telecom technician who merges circuitry with canvas, competes fiercely in puzzles and projects, and occasionally sacrifices sleep for the perfect LED‑enhanced masterpiece.
background:
  cultural: Elizabeth grew up in Minden, a small town in Claiborne Parish, Louisiana. Her family is of Anglo‑American descent with some French‑Acadian roots, reflecting the historic settlement patterns
    of the region. The community’s Southern values—self‑reliance, respect for tradition, and strong church involvement—shaped her upbringing. Local cuisine such as gumbo, jambalaya, and fried catfish influenced
    her palate, while the sounds of country, blues, and Cajun music formed a familiar soundtrack. Although she identifies as white, she has been exposed to the cultural mosaic of North Louisiana, including
    Creole and Cajun influences, which broaden her appreciation for diversity. The modest, pragmatic atmosphere of her hometown reinforces her organized, methodical approach to work, while the local art
    fairs and community galleries nurture her imaginative side.
attributes:
  skills: '[''RF system installation'', ''Antenna alignment'', ''Cable splicing and termination'', ''Fiber-optic testing'', ''Signal troubleshooting'', ''Technical schematics interpretation'', ''Use of
    spectrum analyzer'', ''Use of OTDR'', ''Compliance with FCC and OSHA regulations'', ''Field documentation and reporting'', ''Methodical problem solving'', ''Microcontroller prototyping'', ''Team coordination'',
    ''Time management'']'
  hobbies: '[''Abstract painting'', ''Mixed-media collage with electronic components'', ''Amateur radio (ham) operation'', ''Software-defined radio experimentation'', ''DIY electronics projects'', ''Reading
    speculative fiction and popular science'', ''Philosophy'', ''Hiking in North Louisiana'', ''Puzzle solving (crosswords, logic riddles)'', ''Attending Cajun music festivals'', ''Community church involvement'']'
  career_goals: Elizabeth is driven by a competitive spirit and a desire for creative autonomy. Over the next two years she plans to earn BICSI Installer/Technician certification and advance to BICSI Designer,
    while mastering fiber‑optic installation to become a senior fiber specialist. She intends to enroll in an associate degree program in electronics engineering technology to complement her high‑school
    background. Her goal is to move into a supervisory role, overseeing field crews, optimizing workflows, and mentoring new technicians. Long‑term, she hopes to launch her own boutique telecom consulting
    firm focused on expanding rural broadband in North Louisiana, using innovative, cost‑effective solutions. She also aims to share her inventive troubleshooting techniques through industry workshops and
    local trade publications, encouraging more women to enter the field.
