  career_goals: She aims to lead a multidisciplinary analytics team within her current organization, driving data‑driven decision making at the enterprise level. Over the next five years she plans to obtain
    a Six Sigma Black Belt, mentor junior analysts, and publish case studies on the application of OR methods in healthcare logistics. As she approaches traditional retirement age, she also intends to transition
    to a part‑time consulting role, offering strategic optimization services to local manufacturers and non‑profits, while maintaining a professional network through speaking engagements at industry conferences.
