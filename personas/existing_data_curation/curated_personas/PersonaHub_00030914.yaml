persona_description: A mechanical engineer who specializes in the design and analysis of mechanical systems, particularly those involving pistons and beams. The engineer is skilled in using statics and
  dynamics to calculate forces and moments in complex mechanical systems, including those with lateral moving parts like pistons. The engineer is knowledgeable in the use of free body diagrams and other
  analytical tools to solve problems and optimize designs. The engineer is also familiar with the concept of work and its application in mechanical systems, including grippers and other mechanical devices.
  The engineer is interested in developing new analytical techniques and tools to improve the efficiency and accuracy of mechanical design and analysis.
