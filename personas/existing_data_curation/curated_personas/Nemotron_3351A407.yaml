  hobbies: '[''Sketching/digital art'', ''LEGO building'', ''Arduino starter projects'', ''Reading fantasy novels'', ''Nature hikes'', ''Journaling'', ''Ukulele playing'', ''Creative writing'', ''Story-driven
    video games'']'
  career_goals: Bailey dreams of a future where she can blend technology with compassion. She aspires to become a software developer or product designer who creates digital tools that help teenagers manage
    anxiety and emotional stress. She also feels a strong pull towards environmental stewardship, envisioning a role as a wildlife rehabilitator or a science communicator who uses her art and storytelling
    to raise awareness about nature. While her goals are still fluid, she is driven by the desire to help others, solve real‑world problems, and apply her curiosity in practical, impactful ways.
