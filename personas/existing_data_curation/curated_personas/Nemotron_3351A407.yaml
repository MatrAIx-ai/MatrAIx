personas:
  professional: An aspiring young maker and storyteller, Bailey Geraghty blends sketching on a tablet, Arduino tinkering, and LEGO engineering to prototype whimsical gadgets, channeling their curiosity
    and practical mindset while often improvising around rigid deadlines.
  sports: A budding outdoor enthusiast, Bailey Geraghty joins the local Kids' Mountain Trail Club for weekly hikes in the Cascade foothills, cheers on the Seattle Seahawks on game nights, and plays midfield
    for their elementary school soccer team, though they sometimes skip practice when anxiety spikes.
  arts: A creative polymath, Bailey Geraghty fills sketchbooks with Miyazaki‑inspired characters, paints watercolors of forest scenes, builds kinetic LEGO sculptures, strums simple chords to Billie Eilish
    covers on a ukulele, and contributes whimsical flash fiction to the school literary magazine, channeling their vivid imagination into multiple artistic outlets.
  travel: A spontaneous explorer, Bailey Geraghty loves impromptu weekend trips to places like Yellowstone National Park and the Pacific Coast, often planning routes on the fly while packing sketchpads
    and a portable ukulele, yet they feel uneasy about long flights, preferring familiar nature‑rich stops over crowded cities.
  culinary: A budding foodie, Bailey Geraghty prefers effortless meals like mac and cheese, pepperoni pizza, and strawberry‑banana smoothies, yet occasionally attempts to whip up a simple veggie stir‑fry
    or bake cupcakes topped with edible glitter, blending their artistic flair with a modest kitchen confidence.
  core: Bailey Geraghty is a 12‑year‑old creative whirlwind who alternates between spontaneous art‑making, restless gadget tinkering, and bouts of intense anxiety that sometimes derail their school projects.
background:
  cultural: Bailey comes from a white family with mixed Irish and English ancestry living in Auburn, Washington, a suburban community within King County. The Pacific Northwest environment—characterized
    by lush forests, nearby mountains, and a tech‑forward regional culture—shapes her appreciation for outdoor activities and environmental awareness. Her family emphasizes community involvement, progressive
    values, and encourages curiosity alongside practical skills. Growing up near Seattle, she is exposed to a diverse student body and a culture that balances independent thought with collaborative spirit,
    influencing her balanced outlook on social interaction, individual creativity, and a desire to make a positive impact.
