  career_goals: Even in retirement, Johnny aims to stay active and contributory. He plans to mentor younger people in woodworking and home‑repair techniques, preserve Carpentersville’s heritage by restoring
    historic houses, and share his love of art by volunteering as a docent at the local museum. He also aspires to finish a memoir chronicling his life and the social changes he has witnessed, maintain
    his health through daily walks and gardening, and champion senior‑center programs that promote social interaction and mental stimulation, such as bridge and chess clubs.
