  hobbies: '[''Reading adventure/mystery books'', ''Sketching and journal drawing'', ''Scratch programming and digital storytelling'', ''Solving jigsaw and logic puzzles'', ''Caring for a hamster with a
    daily log'', ''Helping prepare traditional family recipes'', ''Exploring local parks and nature hikes'', ''Participating in a small science club'']'
  career_goals: Ana dreams of a future where she can combine her love for animals, her methodical problem‑solving skills, and her bilingual communication. She aspires to become a veterinarian or a wildlife
    rehabilitator, helping injured or orphaned animals in Colorado's plains and mountains. Because she values both practical solutions and caring for living beings, she also imagines studying environmental
    science to protect natural habitats, and she hopes to mentor younger kids in bilingual science clubs someday.
