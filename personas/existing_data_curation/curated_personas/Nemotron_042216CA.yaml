personas:
  professional: Ana Matos is a budding junior programmer who designs interactive stories on Scratch, applying meticulous planning and logical cause‑and‑effect thinking to bring their imaginative narratives
    to life, while their reserved nature lets them work best in quiet, solo sessions that help calm their anxiety.
  sports: Ana Matos enjoys weekend nature hikes with a small group of friends in the nearby mountains, where they trail the paths of their local youth hiking club, cheer on the regional soccer team the
    Red River Rangers, and occasionally join community swimming lessons at the town pool.
  arts: Ana Matos spends free time sketching detailed nature journals and devouring adventure novels by authors like Rick Riordan, while drawing inspiration from the animation of Pixar’s Inside Out and
    the illustrations of Hayao Miyazaki, and they often hum the melodies of artists such as Taylor Swift during creative sessions.
  travel: Ana Matos prefers carefully planned trips with family, having explored the historic streets of Salamanca on a school excursion and longing to trek the Andes in Peru, while also enjoying weekend
    camping outings near their hometown, where they map routes and pack a sketchbook for field observations.
  culinary: Ana Matos loves assisting with the family’s traditional arroz con leche, meticulously measuring rice, milk, and cinnamon, and also experiments with fresh fruit smoothies made from mango, banana,
    and orange juice, often noting recipes in their journal.
  core: Ana Matos is a methodical ten‑year‑old whose boundless curiosity fuels a love for puzzles and coding, yet their intense anxiety often leads to occasional over‑planning and midnight snack binges.
background:
  cultural: Ana grows up in a bilingual Hispanic household in Pueblo, Colorado, where both English and Spanish are spoken daily. Her family celebrates traditional festivals such as Día de los Muertos and
    Cinco de Mayo, and they maintain cultural customs like sharing family meals of tamales, pupusas, and homemade flan. She attends a local elementary school that offers Spanish language enrichment, which
    reinforces her heritage. Pueblo's vibrant Latino community influences Ana's sense of identity, fostering values of familismo, respect for elders, and a deep appreciation for music and dance from her
    cultural roots. These cultural experiences shape her worldview, her love for bilingual communication, and her desire to give back to her community.
attributes:
  skills: '[''Bilingual (English/Spanish)'', ''Reading comprehension'', ''Basic arithmetic'', ''Scratch visual programming'', ''Organizational project planning'', ''Attention to detail in drawing and crafts'',
