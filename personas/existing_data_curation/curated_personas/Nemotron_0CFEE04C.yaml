  career_goals: As she approaches the traditional retirement age, Dr. Houk aims to shift her focus toward mentorship and systemic impact. She plans to establish a structured mentorship program for early‑career
    physicians, especially women entering medicine, and to serve on the hospital’s quality‑improvement board to drive data‑focused patient safety initiatives. She is passionate about expanding telehealth
    services in rural Cumberland County to improve access for underserved populations. Additionally, she intends to lead community outreach projects addressing hypertension and diabetes, author a guide
    on physician wellness based on her own experiences with stress, and eventually transition to a part‑time teaching role at a nearby medical school while maintaining a limited clinical practice.
