personas:
  professional: Jhoana Patino, a retired business administration and finance specialist, leverages her methodical budgeting, bookkeeping, and cost‑control expertise to orchestrate senior center events with
    meticulous precision, reflecting her practical, routine‑driven mindset and competitive edge in volunteer leadership.
  sports: Jhoana Patino enjoys a daily neighborhood stroll, follows the Albuquerque Isotopes baseball team and New Mexico United soccer club, and participates in the senior center’s walking club, favoring
    low‑impact activity that aligns with their age and routine‑oriented lifestyle.
  arts: Jhoana Patino finds creative fulfillment in knitting blankets for charity, attending performances by the Albuquerque Little Theatre, and listening to the classical guitar works of Andrés Segovia
    and the folk songs of the Southwest, which enrich their evenings after crossword puzzles.
  travel: Jhoana Patino prefers purposeful short‑range trips, having visited the historic missions of Santa Fe and the ancient cliff dwellings at Bandelier National Monument, while dreaming of a pilgrimage
    to the 17th‑century adobe churches of New Mexico to deepen their genealogical research.
  culinary: Jhoana Patino delights in preparing traditional dishes such as tamales, mole, and pozole, seasoning them with freshly harvested cilantro, oregano, and epazote from their herb garden, and balances
    their love of cooking with a habit of brewing strong coffee each morning.
  core: Jhoana Patino is an 83‑year‑old master of routine, whose calm, competitive spirit fuels meticulous budgeting, herb‑laden cooking, and community leadership, even as they sometimes forget to schedule
    dental appointments.
background:
  cultural: Jhoana is a second-generation Mexican-American who grew up in Albuquerque, blending the rich customs of her Mexican heritage with the distinct flavors of New Mexico. She speaks Spanish fluently
    and uses it daily at home, preserving family stories and oral histories. She celebrates Día de los Muertos, Cinco de Mayo, and traditional Catholic holidays, often preparing festive foods and sharing
    them with neighbors. Her cooking reflects both Mexican and New Mexican influences, featuring chile, corn, and herbs she grows herself. Community and family are central to her identity; she routinely
    participates in the local church, supports cultural festivals, and maintains close ties with extended family across the border. This cultural foundation informs her values of reliability, practicality,
    and reverence for tradition.
