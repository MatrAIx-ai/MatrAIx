  career_goals: Even in retirement, Jhoana remains driven by a desire to leave a lasting, positive impact on her family and community. She aims to complete a written memoir that weaves together her business
    experiences, cultural heritage, and life lessons for future generations. She seeks to solidify her family's financial security by teaching budgeting basics to her grandchildren and establishing a modest
    scholarship fund for local students. Jhoana plans to continue serving as chair of the senior center's annual cultural festival, ensuring it runs efficiently and honors Mexican traditions. She also hopes
    to finish a genealogical project tracing her ancestors from Jalisco to Albuquerque, and to travel a short distance to historic missions in New Mexico to connect with her roots.
