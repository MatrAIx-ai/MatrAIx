personas:
  professional: Luis Perez is an 11-year-old aspiring soccer midfielder who blends a love for structured teamwork on the local field with a budding interest in engineering, often building LEGO sets and
    dreaming of designing his own video game levels, and they approach each practice and project with practical focus and a desire for predictable progress.
  sports: Luis Perez plays midfielder for the Camarillo Youth Soccer Club, practicing twice a week under Coach Ramirez, and cheers for the LA Galaxy while also following the Mexico national team during
    World Cup seasons, balancing competitive drive with a habit of staying on the sidelines when feeling overwhelmed.
  arts: Luis Perez sketches comic‑style heroes during quiet afternoons, learns beginner guitar chords through classic folk songs and popular hits like "Despacito," and draws inspiration from artists such
    as Stan Lee, Pixar’s "Toy Story," and the band Los Tigres del Norte, using art as a therapeutic outlet for intense emotions.
  travel: Luis Perez enjoys weekend trips to the Ventura County Fair and Santa Barbara beaches, dreams of visiting Oaxaca to explore family roots and taste authentic mole, and prefers family‑organized travel
    itineraries that balance structured activities with spontaneous beach play.
  culinary: Luis Perez loves helping prepare tamales and guacamole with their grandparents, has a growing skill for assembling tacos with fresh cilantro and lime, enjoys making pizza at home topped with
    pepperoni and jalapeños, and often snacks on churros while gaming.
  core: Luis Perez is an organized, anxiety‑prone 11‑year‑old who channels nervous energy into soccer drills, LEGO constructions, and guitar practice, yet occasionally overindulges in late‑night gaming
    and forgets to hydrate.
background:
  cultural: Luis comes from a Mexican‑American family rooted in cultural traditions that blend Mexican heritage with Southern Californian life. His grandparents immigrated from Jalisco, and Spanish is spoken
    at home alongside English. He celebrates Día de los Muertos, Mexican Independence Day, and holiday festivals with traditional foods like tamales, pozole, and pan de gallo. Family gatherings often feature
    mariachi music and the ritual of singing 'Las Mañanitas' at birthdays. Growing up in Camarillo, he also participates in community events such as local parades and the Ventura County Fair, where he enjoys
    tasting both Californian and Mexican cuisines. This bicultural environment has shaped his values of family closeness, respect for elders, and a zest for sharing cultural stories.
