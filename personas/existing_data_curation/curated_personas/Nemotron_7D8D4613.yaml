  career_goals: Luis imagines a future where he can combine his love for structure, helping others, and his bilingual background. He aspires to become a bilingual elementary school teacher, where he can
    create a predictable classroom environment and support students in both English and Spanish. He also dreams of designing educational video games or interactive apps that teach math and language skills,
    leveraging his early coding experience. His immediate ambition is to join his school's robotics club and junior coding program, aiming to win a regional competition. In the longer term, he sees himself
    contributing to his community as a youth mentor or school counselor, ensuring that other kids have reliable support.
