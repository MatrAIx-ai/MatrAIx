personas:
  professional: Jeanette Ayala, a retired volunteer coordinator at the local senior center, blends bilingual communication, budget‑savvy, and gardening know‑how with a relaxed, curiosity‑driven approach
    that lets them adapt plans on the fly while assertively guiding small teams of volunteers.
  sports: Jeanette Ayala enjoys low‑impact fitness by walking along the Rio Grande to birdwatch; they cheer on the San Antonio Spurs during basketball season and participate in a neighborhood walking club
    that meets twice a week, preferring solitary strolls over organized team sports.
  arts: Jeanette Ayala delights in listening to norteño legends like Los Tigres del Norte and classic mariachi ensembles such as Mariachi Vargas, while devouring historical novels by Carlos Fuentes and
    Deborah Emberly, and they occasionally craft hand‑stitched quilts inspired by Frida Kahlo’s vibrant colors, which they display at local community fairs.
  travel: Jeanette Ayala prefers spontaneous, short‑range road trips across Texas; they often visit historic sites like the Alamo, Mission San José in San Antonio, and the Hill Country’s Fredericksburg,
    while budgeting modestly and traveling with a meticulously packed scrapbook of past journeys.
  culinary: Jeanette Ayala, an adept home cook, relishes preparing traditional dishes such as chicken enchiladas with homemade red chile sauce, hand‑made corn tortillas, and pozole verde using fresh cilantro,
    jalapeños, and hominy from their garden, while they occasionally experiment with sous‑vide techniques learned in a community cooking class.
  core: Jeanette Ayala weaves curiosity with practicality, juggling a love for gardening, bilingual storytelling, and a habit of misplacing their glasses, all while savoring solitary walks by the Rio Grande
    and preserving family histories in a beloved scrapbook.
background:
  cultural: Jeanette was born and raised in Laredo, Texas, a border city that blends Mexican and American cultures. Her parents emigrated from northern Mexico, and she grew up speaking Spanish at home while
    attending English-language schools. Her identity is shaped by Mexican traditions such as Día de los Muertos, quinceañeras, and Catholic observances, as well as Tex-Mex culinary practices. The close-knit
    community of Laredo emphasizes family loyalty, hospitality, and mutual support, values that Jeanette carries into her daily life and volunteer work. She maintains strong ties with relatives on both
    sides of the border and participates in local festivals that celebrate her heritage.
