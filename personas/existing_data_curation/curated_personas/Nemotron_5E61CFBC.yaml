  hobbies: '["Gardening","Cooking traditional recipes","Reading historical fiction","Knitting","Listening to regional folk music","Birdwatching along the Rio Grande","Attending small church groups","Scrapbooking
    family memories"]'
  career_goals: Although she is retired, Jeanette’s personal ambitions focus on staying independent, deepening her cultural legacy, and contributing to her community. She plans to digitize old family photos
    and recipes for future generations, mentor younger volunteers at the senior center, expand the community garden to provide fresh produce for neighbors, learn new cooking techniques through occasional
    classes, and take short trips within Texas to explore historic sites related to her heritage.
