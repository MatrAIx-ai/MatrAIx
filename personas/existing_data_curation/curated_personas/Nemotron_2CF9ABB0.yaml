personas:
  professional: Katrina Rhinehart, a mechanical engineering student with a talent for designing IoT-enabled renewable-energy prototypes, combines rigorous CAD and simulation skills with a collaborative,
    community-focused mindset to lead small solar-panel projects and mentor peers.
  sports: Katrina Rhinehart, an avid mountain-bike enthusiast who conquers Sonoran Desert trails at sunrise, cheerfully follows the Phoenix Suns and Arizona Cardinals, and competes in the Phoenix Hiking
    & Biking Association's quarterly trail-run events while occasionally joining a local indoor climbing league.
  arts: Katrina Rhinehart, who paints Southwestern-inspired pottery in spare moments, finds creative spark in the gospel harmonies of the local choir, the jazz improvisations of Kamasi Washington, and the
    desert-etched canvases of Georgia O'Keeffe, and regularly attends festivals featuring Calexico, Robert Glasper, and indie desert-band Wildcat!.
  travel: Katrina Rhinehart, a weekend wanderer who prefers planning trips around national-park stargazing weekends, has already hiked Sedona's red-rock canyons, explored the historic streets of Oaxaca,
    dreams of biking the Icelandic highlands, and saves diligently for a future cultural immersion in Kyoto's spring tea ceremonies.
  culinary: Katrina Rhinehart, an intermediate home chef, blends Southern comfort staples like collard-green gumbo and cornbread with Southwestern flair—adding chipotle-smoked shrimp, prickly-pear glaze,
    and mesquite-infused corn masa—to craft dishes such as spice-rubbed jambalaya tacos, all while perfecting a signature cactus-flower salsa.
  core: Katrina Rhinehart is a desert-raised engineering mind who fuses solar-energy ambition with gospel-driven community spirit, fuels late-night coding sessions with extra espresso, and habitually doodles
    circuit diagrams on coffee cups.
background:
  cultural: Katrina is an African‑American who grew up in the greater Phoenix metropolitan area, absorbing both the rich traditions of her Black heritage—such as gospel music, family storytelling, and community
    solidarity—and the unique cultural tapestry of the Southwest, including its desert landscape, Native‑American art influences, and Hispanic culinary heritage. She actively participates in local cultural
    events, from Juneteenth celebrations to desert art fairs, and she values the blend of resilience and optimism that characterizes both her family’s history and the pioneering spirit of the Arizona desert.
    This dual cultural perspective informs her collaborative work style, community involvement, and her commitment to fostering inclusive spaces within the engineering field.
attributes:
  skills: '["AutoCAD", "SolidWorks", "MATLAB", "Python", "Arduino C", "Thermodynamics", "Fluid Dynamics", "Materials Science", "Renewable Energy Systems Design", "Project Management", "Data Analysis", "Technical
    Writing", "Team Collaboration", "Mentoring"]'
  hobbies: '["Hiking", "Mountain‑biking", "Yoga", "Singing in a community choir", "Cooking fusion Southern‑Southwest dishes", "Reading science‑fiction", "Volunteering for STEM outreach", "Painting pottery",
    "Attending music festivals"]'
  career_goals: Katrina aims to finish her bachelor’s degree in Mechanical Engineering within the next two years and earn her Professional Engineer (PE) license shortly after. She aspires to become a lead
    engineer on large‑scale solar‑energy projects that serve the desert Southwest, eventually overseeing a multidisciplinary team that integrates smart‑grid technology and sustainable design. Long‑term,
    she hopes to launch a mentorship initiative that encourages Black youth in Arizona to pursue STEM careers, and she envisions one day founding a consultancy focused on affordable, environmentally‑responsible
    building solutions for underserved communities.
