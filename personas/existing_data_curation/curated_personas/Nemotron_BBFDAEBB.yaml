    festivals'']'
  career_goals: Although officially retired, Maria is intent on repurposing her business acumen to enrich her community. She aims to serve on the advisory board of a local art museum, where she can merge
    her love of art with strategic fundraising and program development. Maria also seeks to mentor young Latino business owners through a Boston‑based incubator, offering guidance on financial planning
    and market entry. In parallel, she plans to document her entrepreneurial journey and Mexican heritage in a memoir that could serve as both a cultural chronicle and a guide for future generations. Her
    competitive spirit drives her to pursue recognition for her volunteer contributions, hoping to win a community service award that highlights the impact of cross‑cultural entrepreneurship.
