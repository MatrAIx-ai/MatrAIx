  hobbies: '[''Coastal walks and birdwatching'', ''Gardening and sustainable food preservation'', ''Reading historical fiction and local history'', ''Small‑group book club participation'', ''Knitting and
    quilting'', ''Pottery'', ''Volunteer work at community garden and arts fair organization'']'
  career_goals: Although retired from formal employment, Amanda aims to deepen her contribution to the Newport community. She plans to lead a small volunteer group focused on coastal clean‑up and habitat
    restoration, using her gardening expertise to mentor younger participants. She wishes to compile a local‑history manuscript that weaves her family’s story with the town’s development, eventually publishing
    it through the regional historical society. Additionally, she hopes to maintain her health through regular walks and continue learning through occasional community‑college courses in horticulture and
    digital archiving.
