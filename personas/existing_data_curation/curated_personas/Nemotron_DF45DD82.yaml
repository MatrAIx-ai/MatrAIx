  hobbies: '[''gardening'', ''knitting and quilting'', ''reading historical fiction and memoirs'', ''senior center social games (bingo, card games)'', ''storytelling and oral‑history circles'', ''attending
    church potlucks and folk‑music concerts'', ''volunteering at the public library'', ''organizing inter‑generational community events'']'
  career_goals: Even in retirement, Desiree is driven to leave a lasting imprint on her community. She aims to lead a local historical preservation group, curate oral‑history recordings of longtime residents,
    and publish a memoir that reflects the changes she has witnessed over nine decades. She also hopes to mentor teenage volunteers at the senior center, champion senior‑friendly public‑space improvements
    in Ridgeway, and maintain an active role in organizing inter‑generational cultural events that blend traditional Southern customs with newer perspectives.
