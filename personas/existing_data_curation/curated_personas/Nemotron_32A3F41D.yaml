personas:
  professional: Kyara Hurtado is an aspiring cultural content strategist who leverages bilingual fluency, charismatic public speaking, and a knack for quick‑turn social‑media graphics to amplify under‑represented
    voices in community arts nonprofits, though their relaxed approach to deadlines sometimes leaves projects a bit disorganized.
  sports: Kyara Hurtado channels energy into salsa and bachata dance nights, cheers for the Miami Heat and Miami Marlins, participates in a local co‑ed flag‑football league, and squeezes in cardio‑focused
    dance fitness classes, favoring rhythm‑driven movement over rigid gym workouts.
  arts: Kyara Hurtado roams Wynwood’s mural streets and downtown galleries, drawing inspiration from visual creators like Kehinde Wiley, Banksy, and the soundscapes of Tito Puente and Bad Bunny, fueling
    their own sketching, street‑photography, and TikTok storytelling.
  travel: Kyara Hurtado explores the cultural tapestry of Little Haiti, Little Havana, and Wynwood by day and dreams of spontaneous trips to San Juan, Cartagena, and Oaxaca, planning most journeys via Instagram
    reels and last‑minute Airbnb bookings while keeping an eye on student‑friendly budgets.
  culinary: Kyara Hurtado lovingly prepares aromatic sancocho, silky mangú, and sweet pastelitos seasoned with cumin and achiote, savoring the fragrant sofrito of plantain and yucca, while occasionally
    whipping up quick avocado toast for busy study sessions.
  core: Kyara Hurtado blends vibrant artistic curiosity with a sociable, easy‑going spirit, translating spontaneous creativity into community‑focused storytelling while juggling a relaxed approach to plans
    and budgets.
background:
  cultural: Kyara is a first‑generation Dominican‑American raised in a bilingual household in Miami. Her family’s traditions—weekly family meals, music parties, and celebrations of Dominican holidays like
    Independence Day—instilled a deep appreciation for Caribbean culture. Growing up amidst Miami’s diverse Latino diaspora, she blends Dominican rhythms, storytelling, and culinary flavors with the city’s
    broader multicultural influences. This dual cultural lens informs her artistic sensibility, social interactions, and desire to represent Caribbean narratives within a larger American context. Kyara’s
    identity is rooted in community, resilience, and the vibrant mix of Caribbean heritage and Miami’s urban mosaic.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Public speaking'', ''Social media content creation'', ''Graphic design (Canva)'', ''Community event planning'', ''Basic photography'', ''Conflict
    mediation'', ''Collaborative teamwork'', ''Creative brainstorming'']'
  hobbies: '[''Visiting art galleries'', ''Salsa and bachata dancing'', ''Cooking Dominican cuisine'', ''Street photography'', ''Journaling'', ''Open‑mic poetry'', ''Volunteering at community centers'',
    ''Exploring Miami’s multicultural neighborhoods'', ''Listening to Latin jazz and reggaeton'']'
  career_goals: Kyara intends to turn her love for art, culture, and people into a career that amplifies under‑represented voices. She plans to finish her associate degree in communications and later pursue
    a bachelor’s in digital media or cultural studies. Her ambition is to work as a cultural content strategist or community outreach coordinator for a nonprofit or arts organization, designing campaigns
    that celebrate Caribbean and Latinx heritage. In the long term, she dreams of launching her own multimedia platform—blog, podcast, or YouTube channel—where she interviews artists, shares Dominican recipes,
    and documents Miami’s multicultural arts scene. She values flexibility in her career path, seeking roles that allow her to experiment, travel, and continuously learn new creative techniques.
