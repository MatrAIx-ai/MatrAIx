  career_goals: Nicolas aims to transition into a senior administrative or office‑manager role within a community‑oriented organization, such as a local nonprofit, health clinic, or small business that
    values collaborative culture. He plans to earn the Certified Administrative Professional (CAP) credential and a Microsoft Office Specialist certification to formalize his expertise. Over the next few
    years he hopes to mentor newer administrative staff, lead small‑scale digital‑workflow improvement projects, and secure a part‑time or flexible schedule that preserves his work‑life balance while allowing
    him to stay engaged in local community activities.
