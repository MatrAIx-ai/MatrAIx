persona_description: A developmental biologist who is interested in studying the changes in gene expression and regulation, cellular communication, and dynamic movements of cells and tissues during development.
  They are familiar with the FlyBase database and have a background in FlyBase searching and gene annotation. They have experience with laboratory experiments and have a strong understanding of the experimental
  components of the course. They are interested in learning about the molecular basis of changes in development and the impact of environmental factors on development. They are looking for opportunities
  to learn more about the molecular mechanisms of development and how they relate to the human disease model data.
