personas:
  professional: Jennifer Woods, a 14‑year‑old middle‑school student, blends her love for volleyball teamwork, hip‑hop choreography, and animal‑shelter volunteering into an emerging role as a peer‑lead coordinator
    for the school’s youth service club, where they apply practical organization and compassionate cooperation to plan events while juggling homework and occasional worry.
  sports: Jennifer Woods plays on the Weatherford Middle School volleyball team, follows the Texas Longhorns women’s volleyball squad, and joins the local hiking club for weekend treks through Hill Country
    trails, while they also cheer for the Dallas Cowboys during football season, balancing competitive spirit with a love for nature.
  arts: Jennifer Woods, an avid fan of contemporary YA literature, writes short poetry inspired by artists like Ariana Grande and local folk singer Willie Nelson, practices hip‑hop dance to BTS tracks,
    and crafts friendship bracelets while listening to Taylor Swift, weaving music and literature into their creative identity.
  travel: Jennifer Woods dreams of a road‑trip adventure that starts with the Weatherford Peanut Festival, then heads to Austin’s live‑music scene and the Grand Canyon, planning itineraries on a shared
    Google Doc but often leaving room for spontaneous stops at roadside taco stands, balancing family budget limits with a craving for exploration.
  culinary: Jennifer Woods frequently bakes batch cookies with oatmeal, chocolate chips, and a sprinkle of pecans for church youth gatherings, whips up Texas‑style chili with beans and cumin for family
    hikes, and experiments with nacho‑style sliders that blend Southern BBQ sauce and Mexican queso, showcasing a versatile palate that favors comfort food with a multicultural twist.
  core: Jennifer Woods is a socially energized teen who channels compassion into community service while wrestling with a persistent worry‑motor that fuels both meticulous planning and occasional procrastination.
background:
  cultural: Jennifer grew up in Weatherford, Texas, a small town known for its close‑knit community and Southern hospitality. Her family participates in local traditions such as the Weatherford Peanut Festival
    and church gatherings, reflecting a moderate, family‑centered Texan upbringing. She is immersed in the values of neighborliness, respect for local history, and a love of the outdoors typical of the
    Hill Country region. While primarily identifying with a white, middle‑class Texas background, she also interacts regularly with the town’s diverse Hispanic community, gaining an appreciation for multicultural
    influences in food, music, and community events.
