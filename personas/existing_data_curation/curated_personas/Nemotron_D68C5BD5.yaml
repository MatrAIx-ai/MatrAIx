  career_goals: Jennifer hopes to pursue a career that lets her help others directly, aiming to become a pediatric nurse or a mental‑health counselor after college. She is motivated to study nursing or
    psychology, with a long‑term ambition to start a teen mentorship program at her high school that provides emotional support and academic tutoring. She also dreams of working as a community outreach
    coordinator in Weatherford, where she can blend her practical problem‑solving skills with her compassion to improve local health and wellness resources.
