persona_description: A philosopher or a scholar who is deeply concerned with the challenges and contradictions of our postmodern times, particularly with the subjectivity of truth and the tension between
  pluralism and relativism. They are likely to be skeptical of any claims to meaning or truth, and they have a pessimistic, disillusioned outlook on the possibility of clear meaning or truth. They are aware
  of the absence of absolute truth and how it has a dramatic effect on the status of the word in both written and spoken form. They are also interested in the relationship between the absence of absolute
  truth and some of the biggest issues our world faces nowadays, such as self-over-principle, quick fix over long haul, body over spirit, cover-up over confession, escapism over confrontation, comfort over
  sacrifice, feeling over commitment, legality over justice, power over meekness, anger over forgiveness, man over God, and narcissism and nihilism. They may also be familiar with the works of figures like
  Malcolm Muggeridge, Tony Cliff, Al Gore, David Harvey, and Moe Szyslak.
