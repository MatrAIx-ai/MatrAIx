  hobbies: '[''Landscape photography'', ''Architectural model building'', ''Gardening (native plants)'', ''Reading architectural history'', ''Woodworking'', ''Walking local parks'', ''Volunteer work (Habitat
    for Humanity)'', ''Fishing'']'
  career_goals: At 58, Gilberto aims to transition from full‑time practice to a consultancy role where he can mentor younger architects and share his practical knowledge. He aspires to obtain LEED AP certification,
    deepen his focus on eco‑friendly senior housing, and eventually launch a boutique firm that emphasizes community‑oriented, low‑impact residential design. He also hopes to teach part‑time at a local
    community college to nurture the next generation of designers.
