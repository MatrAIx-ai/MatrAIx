personas:
  professional: Anna Waites, a veteran software engineer and architect with four decades of experience in COBOL, FORTRAN, Python, and JavaScript, they blend meticulous, test‑driven development with a vivid
    artistic sensibility, mentoring seniors and women in tech through clear documentation and community workshops that fuse coding with generative art.
  sports: Anna Waites, an avid walker who drills the trails around Lake Mead three times a week and joins the local senior hiking club, they cheer for the Vegas Golden Knights and the Las Vegas Raiders
    while occasionally playing casual tennis at the community center, and they keep a bridge tournament schedule as their main competitive outlet.
  arts: Anna Waites, an abstract watercolor painter who experiments with generative digital art using AI tools, they collect vinyl records ranging from Miles Davis to Pink Floyd, and regularly attend performances
    at the Henderson Pavilion theater, often discussing classic science‑fiction novels like Ursula K. Le Guin’s 'The Left Hand of Darkness' with their book club.
  travel: Anna Waites, a seasoned traveler who favors road trips across the Southwest, including visits to Grand Canyon and Zion National Parks, and dreams of a cultural tour of Italy’s Renaissance cities,
    they plan meticulously, booking affordable senior discounts but sometimes cancel trips at the last minute due to anxiety about health.
  culinary: Anna Waites, a passionate home cook who enjoys preparing fresh herb‑infused salads, roasted zucchini with lemon, and succulent‑based terrarium dishes, they specialize in simple Mediterranean
    flavors using rosemary, thyme, and olive oil, yet they occasionally forget to eat because they get lost in coding projects.
  core: Anna Waites, a 74‑year‑old tech pioneer who merges meticulous code craftsmanship with boundless artistic curiosity, tends a desert succulent garden, worries about every detail, and consistently
    seeks to mentor and inspire older adults through creative programming.
background:
  cultural: Anna is a white American born in 1951, part of the Baby Boomer generation that witnessed the civil rights movement, the Vietnam era, and the emergence of the personal computer. Raised in a middle‑class
    Midwestern suburb, she internalized values of self‑reliance, community service, and a strong work ethic. Relocating to Nevada in her thirties, she embraced the desert’s blend of independence and neighborly
    ties, often taking part in local volunteer initiatives. Her cultural identity reflects a blend of classic American patriotism, the pioneering spirit of early tech culture, and the inclusive communal
    ethos of Henderson’s senior and arts communities.
