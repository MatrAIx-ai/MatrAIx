  hobbies: '[''Abstract watercolor painting'', ''Digital generative art'', ''Science fiction reading'', ''Birdwatching'', ''Succulent gardening'', ''Hiking at Lake Mead'', ''Teaching seniors computer basics'',
    ''Bridge (card game)'', ''Vinyl record collecting'', ''Community theater attendance'']'
  career_goals: Anna aims to leverage her extensive experience to mentor the next generation of developers, especially older adults and women entering tech. She plans to launch a community workshop series
    that teaches coding fundamentals through artistic projects, bridging her love of art and software. Additionally, she aspires to author a memoir chronicling the evolution of women in computing and to
    develop a small open‑source toolkit that enables non‑technical seniors to create generative art using AI. In the next few years, she also hopes to earn a certification in AI ethics to guide responsible
    design of creative technologies.
