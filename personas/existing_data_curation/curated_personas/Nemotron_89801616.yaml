personas:
  professional: Cristina Armstrong, a budding young naturalist, transforms her curiosity about wildlife into meticulously built LEGO habitats and hands‑on science club experiments, balancing practical garden‑care
    skills with imaginative exploration, and they approach each project with organized diligence, cooperative spirit, and a lingering worry that drives thorough journaling.
  sports: Cristina Armstrong, an enthusiastic member of the Smithville Strikers U12 soccer team and a regular participant in the community's Little League baseball program during spring, also follows the
    St. Louis Cardinals with keen enthusiasm, and they balance structured practice with spontaneous woodland hikes that satisfy their love for exploration and practical fitness.
  arts: Cristina Armstrong, who spends afternoons sketching wildlife inspired by the vivid illustrations of National Geographic Kids and the animated world of Disney's Moana, listens to Taylor Swift while
    drawing, and they eagerly attend the local library’s story‑time sessions where they appreciate performances by community puppeteer Maya Rivera.
  travel: Cristina Armstrong, whose family road trips include weekend hikes in the nearby Ozark foothills and a memorable summer visit to the Great Smoky Mountains National Park, dreams of exploring the
    rainforests of Costa Rica, and they prefer carefully planned itineraries with plenty of time for leaf‑collecting and animal spotting, though a limited allowance sometimes curtails longer adventures.
  culinary: Cristina Armstrong, who enjoys helping in the garden and proudly adds homegrown basil and cherry tomatoes to homemade pesto pasta, frequently snacks on apple slices with peanut butter and delights
    in making simple grilled cheese with cheddar, yet they sometimes over‑indulge in sugary cereal for breakfast when stressed.
  core: Cristina Armstrong, an inquisitive 11‑year‑old who meticulously builds LEGO wildlife habitats, worries about getting things just right, and can’t resist a late‑night comic book despite a stubborn
    habit of forgetting to take her allergy meds.
background:
  cultural: 'Cristina grew up in Smithville, a small, close‑knit community in Clay County, Missouri. Her family reflects typical Midwestern values: emphasis on hard work, community involvement, and family
    gatherings. The local culture includes annual county fairs, church events, and volunteer activities that foster a sense of belonging. While her ethnic heritage is primarily of European descent common
    to the region—such as German and Irish ancestry—her upbringing is shaped more by the shared traditions of the Midwest: enjoying seasonal foods like corn on the cob, participating in school and community
    sports, and valuing modesty and reliability. These influences, combined with a supportive school environment, have nurtured her curiosity, practicality, and cooperative nature.'
