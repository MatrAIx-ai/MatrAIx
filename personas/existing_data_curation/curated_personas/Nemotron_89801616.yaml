  hobbies: '[''Reading adventure and animal books'', ''Sketching wildlife'', ''LEGO building (vehicles, habitats)'', ''Exploring local nature (woods, streams)'', ''Caring for family pet (dog)'', ''Gardening
    (tomatoes, herbs)'', ''Journaling for stress management'', ''School science club experiments'', ''Volunteering at library story‑time'', ''Playing board games with friends'']'
  career_goals: Cristina dreams of a future where she can combine her love for animals and her desire to help others by becoming a veterinarian. She is fascinated by how living things work, which fuels
    her curiosity, but she also values a stable, caring profession that lets her make a tangible difference. At the same time, she occasionally imagines teaching elementary school students, inspired by
    her own teachers' kindness and her cooperative nature. Her ambition is to pursue a science‑focused education, develop strong empathy and communication skills, and eventually work in a role that blends
    practical problem‑solving with compassionate care, ensuring a secure and meaningful career path.
