  hobbies: '[''Yoga'', ''Reading contemporary fiction'', ''Urban photography'', ''Cooking multicultural dishes'', ''Volunteering at shelters'', ''Attending community festivals'', ''Hiking'', ''Journaling'',
    ''Board games'']'
  career_goals: She aspires to become a director of community services within a large nonprofit or municipal agency, where she can shape city-wide programs that address mental health, housing insecurity,
    and immigrant integration. In the next five years, she aims to complete a Master’s in Social Work, secure a multi-year grant to launch a trauma-informed support network, and mentor junior staff to build
    a resilient team. Ultimately, she hopes to influence policy by collaborating with local government to embed equity-focused practices into public services.
