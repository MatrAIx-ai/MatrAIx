  hobbies: '["reading technical manuals", "science‑fiction novels", "model airplane building", "hiking", "fly fishing", "bird watching", "solo video gaming", "Arduino tinkering", "gardening"]'
  career_goals: John plans to earn his GED within the next two years and then enroll in a vocational technical school to obtain certification as either an electrician or a farm‑machinery technician. He
    aims to build a reputation for reliable, high‑quality repair services in Greene County, eventually launching his own independent maintenance business that can travel to farms and rural homes. Over the
    next five to ten years, he hopes to own a modest property where he can practice sustainable living, integrating his skills in construction, gardening, and renewable‑energy installation while maintaining
    the freedom and solitude he values.
