personas:
  professional: John Davis, a 17‑year‑old aspiring farm‑machinery technician, merges their hands‑on carpentry, mechanical repair, and Arduino tinkering with a methodical, solitary work ethic, balancing
    curiosity‑driven experimentation with reliable, practical solutions as they prepare for GED completion and vocational training.
  sports: John Davis, an avid hiker and fly‑fisherman, trails the state forest’s Blue Ridge Loop in spring, practices catch‑and‑release fishing on Clear Creek in summer, volunteers with the local wildlife
    conservation club, and follows the Greene County High School cross‑country team, while occasionally joining the community basketball pick‑up games at the town gym.
  arts: John Davis, a solitary teen who devours science‑fiction novels by Isaac Asimov and Arthur C. Clarke, spends evenings building model airplanes while listening to ambient electronica from Brian Eno
    and the synth‑driven scores of Daft Punk, and unwinds with strategy game soundtracks from Civilization VI and the whimsical tunes of the indie band Explosions in the Sky.
  travel: John Davis, who prefers low‑key, self‑planned trips, spends weekends camping in the nearby Blue Ridge Mountains, dreams of backpacking the Appalachian Trail’s Shenandoah segment, and hopes to
    someday explore Norway’s fjords, balancing their love of solitude with a modest travel budget that prioritizes national park passes over luxury accommodations.
  culinary: John Davis, a teenage gardener, enjoys cooking fresh garden salads with heirloom tomatoes, crisp lettuce, and basil, whips up rustic corn chowder using home‑grown sweet corn, and occasionally
    experiments with preserving tomatoes in a simple canning process, though they often forget to clean the kitchen thoroughly after tasting their creations.
  core: John Davis is a quiet, curiosity‑driven teen who combines hands‑on farm repairs, solitary tech tinkering, and a love of nature into a pragmatic vision of a sustainable, independent future, even
    if occasional procrastination and late‑night gaming mar their disciplined schedule.
background:
  cultural: John is a white young man from a long‑standing Appalachian family in Greene County, Pennsylvania. His upbringing reflects the region’s values of self‑reliance, community cooperation, and respect
    for nature. Family traditions include seasonal farm work, church gatherings, and local festivals that celebrate regional folk music and crafts. While his community holds conservative social views, his
    curiosity pushes him to explore broader ideas through books and online resources. He identifies with the cultural heritage of rural Pennsylvania, valuing hard work, modesty, and a close‑knit neighborhood
    ethos.
attributes:
  skills: '["basic carpentry", "mechanical troubleshooting", "farm equipment maintenance", "handyman repairs", "introductory computer troubleshooting", "DIY electronics (Arduino)", "gardening and animal
