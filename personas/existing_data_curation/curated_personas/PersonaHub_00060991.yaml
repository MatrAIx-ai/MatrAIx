persona_description: A quality engineer who is responsible for ensuring that the manufacturing process is capable of producing parts within the required tolerances. They use Tolcap to check the process
  capability of the manufacturing process and the material used for the part, and to identify potential problems or defects in the manufacturing process. They may also use Tolcap to check the process capability
  of other manufacturing processes, such as casting or forging, to ensure that the manufacturing process is capable of producing parts within the required tolerances. They are likely to be familiar with
  the basic principles of physics and material science, and to have experience with various manufacturing processes and materials. They may also have a background in quality management, and be responsible
  for ensuring that the manufacturing process is capable of producing parts that meet the required quality standards.
