  hobbies: '[''Hiking and Trail Exploration'', ''Nature Photography'', ''Strategy Board Games (Chess, Settlers of Catan)'', ''Puzzle/Strategy Video Games (Civilization, Portal)'', ''Arduino and Model Kit
    Building'', ''Reading Non-Fiction (Science, Self-Improvement)'', ''Cooking (Structured Recipes)'', ''Stargazing and Amateur Astronomy'']'
  career_goals: John aims to solidify his teaching career by earning National Board Certification within the next three years and completing a Master’s degree in Education with a focus on STEM curriculum
    design. He aspires to become the head of the mathematics department at his school, where he can lead a team in developing a rigorous, structured STEM program that balances inquiry-based projects with
    clear learning outcomes. He also hopes to launch and coach a competitive robotics club that fosters teamwork and problem-solving skills, and to contribute to district-wide curriculum committees. Long-term,
    he envisions a role as a curriculum specialist or educational consultant, allowing him to influence STEM education policy while maintaining stability for his family.
