personas:
  professional: Nga Nguyen, a precocious one‑year‑old who spends afternoons sorting blocks by color and shape, already shows the curiosity and practical mindset of a future community‑focused designer, though
    their spontaneous nature makes any structured playtime a challenge.
  sports: Nga Nguyen, an energetic toddler who loves the parent‑child gymnastics class at the community center, cheers loudly for the Los Angeles Dodgers during family watch parties, and can be seen sprinting
    across the park with a plastic bat, though their competitive streak often results in playful squabbles over the best swing.
  arts: Nga Nguyen, a budding appreciator of the arts, enjoys listening to the soothing violin performances during family Tet celebrations, dances to the pop hits of BTS on weekend karaoke nights, and insists
    on coloring the intricate mandala designs in their picture books, showcasing a vivid creative spark.
  travel: Nga Nguyen, having recently accompanied their family on a road trip to San Diego’s Balboa Park and a weekend visit to the Grand Canyon, prefers stroller‑friendly routes, loves the bright colors
    of the aquarium’s fish tanks, and dreams of someday seeing the lanterns of a night market in a faraway city.
  culinary: Nga Nguyen, a picky eater who adores the sweet taste of mango puree and the comforting aroma of a slowly simmered broth like that of pho, often tries to feed themselves with small forks, yet
    occasionally snatches a bite of the crispy spring roll that lands on the high‑chair tray.
  core: Nga Nguyen, a one‑year‑old whirlwind of curiosity, spontaneous play, and occasional intense tantrums, balances a love for colorful toys with a competitive urge to be first, while navigating early
    anxieties with the help of a supportive family.
background:
  cultural: Nga is a second‑generation Vietnamese American raised in Norwalk, California, within a close‑knit family that values both heritage and assimilation. She celebrates Tet with family gatherings
    and enjoys traditional foods, while also embracing the multicultural fabric of Los Angeles County. Her bilingual upbringing enables her to navigate both English‑dominant environments and Vietnamese
    community circles. This cultural duality shapes her perspectives, fueling her desire to create spaces where diverse voices are heard and to share her cultural roots through food and community projects.
