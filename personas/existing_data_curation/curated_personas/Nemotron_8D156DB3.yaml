  career_goals: Nga aims to earn a culinary arts certificate to launch a pop‑up Vietnamese street food venture that combines her family’s recipes with her creative twists. She also wants to develop a youth
    mentorship program in Norwalk, leveraging her outgoing nature to inspire peers to pursue practical skills beyond school. In the longer term, she envisions becoming a community outreach manager or hospitality
    entrepreneur, balancing her curiosity for new ideas with a pragmatic approach to building a sustainable business.
