  hobbies: '[''Strategy video gaming'', ''Logic puzzles and brain teasers'', ''Reading science‑fiction and graphic novels'', ''DIY science kits and Arduino projects'', ''Cooking Mexican recipes with family'',
    ''Sketching and visual art'', ''Private journaling'', ''Solo nature hikes'']'
  career_goals: Manila envisions a future where her love for technology and her cultural roots intersect. She aims to attend a STEM‑focused high school and eventually earn a degree in computer science or
    robotics engineering. Her long‑term ambition is to develop bilingual educational apps and low‑cost tech tools that help small Mexican‑American businesses in her community thrive. She is motivated by
    the competitive spirit of tech contests and hopes to earn scholarships that recognize her problem‑solving abilities. While she values practical outcomes, she also wants her work to reflect the creativity
    and curiosity that have shaped her learning style.
