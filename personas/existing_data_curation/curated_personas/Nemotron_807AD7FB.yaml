personas:
  professional: Manila Freixa is a budding teen technologist who builds Arduino prototypes, solves intricate logic puzzles, and dominates strategy‑gaming leaderboards, channeling their curiosity and competitive
    streak into self‑directed learning while often overlooking deadlines and keeping a disorganized workspace.
  sports: Manila Freixa enjoys weekend hikes on nearby forest trails, plays on the middle‑school soccer club during the fall season, and follows the Los Angeles Lakers and LA Galaxy for inspiration, though
    they prefer low‑key activity over competitive sports.
  arts: Manila Freixa sketches comic‑book heroes in a style echoing Alex Ross, immerses themselves in Neil Gaiman’s graphic novels and tunes into the synth‑pop sounds of Grimes, while occasionally attending
    local indie comic conventions.
  travel: Manila Freixa has hiked the Redwood trails in California and dreams of exploring the desert canyons of Arches National Park and the neon streets of Tokyo, planning trips with careful budgeting
    yet favoring spontaneous day‑trips to nearby state parks over long‑haul vacations.
  culinary: Manila Freixa cooks tacos al pastor with their grandmother, marinating pork in achiote and pineapple before grilling, experiments with a DIY spherification kit for dessert, and loves the sharp
    tang of lime in guacamole, though they often forget to clean the kitchen afterward.
  core: Manila Freixa blends fierce curiosity and a competitive edge with a habit of misplacing notes and a lingering worry that fuels both creative projects and endless self‑questioning.
background:
  cultural: Manila comes from a Mexican family that has lived in Greer, South Carolina for several generations. At home, Spanish is spoken alongside English, and she celebrates cultural traditions such
    as Día de los Muertos, Las Posadas, and family reunions featuring homemade tamales and mole. Her parents emphasize the importance of hard work, respect for elders, and community solidarity, values that
    blend with the close‑knit Southern community where she lives. While she attends a public middle school that reflects the broader cultural mosaic of Greenville County, Manila maintains a strong connection
    to her Mexican heritage through language, food, music, and occasional visits to relatives in Texas. This dual cultural identity informs her worldview, giving her a unique perspective on both Mexican
    and Southern American customs.
attributes:
