    practice'']'
  hobbies: '[''Painting'', ''Sketching'', ''Reading speculative fiction'', ''Creative writing'', ''Photography'', ''Small book club participation'', ''Visiting art galleries'', ''Mindfulness meditation'',
    ''Volunteering at community health fairs'', ''Exploring Westchester parks'']'
  career_goals: Hope aims to pursue a Bachelor of Science in Nursing (BSN) and later a Master’s degree to become a Nurse Educator or Clinical Nurse Specialist focused on holistic and creative care. She
    aspires to develop an interdisciplinary program that incorporates art therapy and innovative patient‑education tools into chronic disease management. Long‑term, she hopes to lead community health initiatives
    in Yonkers that address mental health, cultural sensitivity, and health literacy, while also obtaining certification in Mental Health Nursing.
