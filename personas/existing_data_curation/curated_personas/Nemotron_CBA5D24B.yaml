personas:
  professional: Joyce Heaton, a 96‑year‑old veteran of commercial cleaning who now consults part‑time on historic building preservation, leverages their meticulous floor‑care expertise, strict safety compliance,
    and disciplined inventory management to mentor younger custodians and produce a concise, standards‑driven manual.
  sports: Joyce Heaton, despite limited mobility, participates in a low‑impact aquatic aerobics class at the community center, follows the Washington Capitals hockey team with fervor, and enjoys occasional
    senior shuffleboard matches at the local senior center, all while tracking their activity in a meticulously kept fitness log.
  arts: Joyce Heaton, an avid reader of classic literature and historical biographies, finds inspiration in the architectural documentaries of David Macaulay, delights in the paintings of Winslow Homer,
    and relishes the piano sonatas of Debussy while attending occasional performances at the local historic theatre.
  travel: Joyce Heaton, who treasures quiet, historically rich destinations, prefers guided day trips to colonial sites like Williamsburg and Savannah, has a bucket‑list of visiting the castles of Scotland
    for a weekend pilgrimage, and meticulously plans each journey with a printed itinerary and a pocket‑sized map of heritage landmarks.
  culinary: Joyce Heaton, whose herb garden yields fresh rosemary and thyme, enjoys crafting a rosemary‑infused roasted chicken with heirloom carrots, values precise measurements like a fine‑tuned cleaning
    schedule, and occasionally indulges in vintage canned soups collected from antique kitchenware fairs.
  core: Joyce Heaton, a fiercely organized, curiosity‑driven centenarian, balances relentless discipline with solitary introspection, approaches every task with skeptical precision, and channels a competitive
    spirit into preserving both historic edifices and personal sharpness.
background:
  cultural: Joyce grew up in a mid‑Atlantic white family with English and Irish ancestry, raised in the modest suburbs of Virginia during the Great Depression and World War II. Her upbringing emphasized
    self‑reliance, frugality, and a strong work ethic rooted in the Protestant (Methodist) community traditions of her hometown. While she respects longstanding customs and the historic character of her
    region, her lifelong curiosity drives her to adopt practical innovations, especially those that improve efficiency and safety. Her cultural identity blends a reverence for tradition with a pragmatic
    openness to new ideas, reflecting the values of her generation in Loudoun County.
attributes:
  skills: '[''Commercial cleaning and floor care'', ''Hazard identification and safety compliance'', ''Inventory management and supply budgeting'', ''Training and mentoring junior cleaning staff'', ''Basic
