  career_goals: Jessica aims to advance within the retail sector by first securing a shift‑supervisor role within the next year, followed by a store‑manager position within three to five years. To support
    this progression, she plans to enroll in a part‑time associate’s degree program in business administration or obtain a retail‑management certification, complementing her hands‑on experience. Long‑term,
    she envisions opening a small specialty shop in Brooklyn that blends her community ties with her passion for curated customer experiences.
