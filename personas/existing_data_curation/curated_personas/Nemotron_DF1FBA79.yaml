personas:
  professional: Ana Ortiz, a retired elementary and middle‑school educator with four decades of bilingual literacy expertise, now mentors novice teachers, leads community workshops on culturally responsive
    curricula, and serves on the district’s diversity advisory committee, leveraging her structured classroom management style and assertive advocacy to champion inclusive education.
  sports: Ana Ortiz stays active through leisurely walks along historic downtown Fort Scott and enjoys cheering on the Kansas City Royals and the local high‑school basketball team, balancing modest fitness
    with enthusiastic support for community sports.
  arts: Ana Ortiz immerses herself in historical fiction, cherishes the paintings of Frida Kahlo, and delights in the piano works of Debussy, weaving these artistic passions into her scrapbook and bridge
    club conversations.
  travel: Ana Ortiz favors well‑planned road trips that blend relaxation with cultural discovery, having relished a family visit to Santa Fe’s art markets and dreaming of a guided tour of the ancient ruins
    of Machu Picchu, always mindful of budget and mobility considerations.
  culinary: Ana Ortiz, an expert home chef, cultivates heirloom tomatoes and aromatic herbs to craft authentic tamales, pozole, and mole, seasoning them with dried chilies, chocolate, and epazote while
    sharing generous portions at every family gathering.
  core: Ana Ortiz blends lifelong dedication to bilingual education with a garden‑to‑table culinary spirit, balancing structure with spontaneous generosity, yet secretly hoards extra garden tools in the
    garage.
background:
  cultural: Ana was born in Monterrey, Mexico, and moved to the United States with her family at age ten, eventually settling in Kansas. She grew up speaking Spanish at home while learning English at school,
    navigating a blend of Mexican customs and Midwestern life. Her Catholic upbringing influences her participation in community festivals such as Día de los Muertos and Cinco de Mayo celebrations. She
    maintains strong ties to her extended family in Mexico, often sending remittances and hosting large reunions. Her identity as a Mexican‑American shapes her teaching philosophy, emphasizing respect for
    cultural diversity, bilingual education, and pride in heritage.
