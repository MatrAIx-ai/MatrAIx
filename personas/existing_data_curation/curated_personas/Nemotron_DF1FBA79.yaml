  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Reading historical fiction'', ''Scrapbooking family history'', ''Bridge club'', ''Walking in historic downtown'', ''Church attendance'', ''Volunteering
    at senior center (Spanish conversation group)'']'
  career_goals: Although retired from full‑time teaching, Ana aims to continue contributing to her community by mentoring new teachers, leading bilingual literacy workshops for parents, and advocating for
    inclusive curricula that reflect Mexican culture. She hopes to write a memoir of her teaching experiences and family traditions, volunteer at the local library’s story‑time sessions, and serve on the
    school district’s diversity advisory committee to promote culturally responsive education.
