  career_goals: Although retired, William aims to stay physically and mentally independent for as long as possible, ensure his homestead remains well‑maintained for future generations, document his family’s
    history and wartime experiences in a memoir, expand his mentorship role at the local senior center, and advocate for better senior services in Farmington. He also hopes to pass his gardening knowledge
    to his grandchildren.
