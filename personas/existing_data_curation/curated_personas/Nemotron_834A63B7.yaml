  hobbies: '[''Visiting Art Galleries and Street Art Festivals'', ''Live Music and Concert Attendance'', ''Volunteer Docent at Modern Art Museum of Fort Worth'', ''Weekend Hiking in Texas Hill Country'',
    ''Pickup Softball League'', ''Barbecue Grilling for Friends and Family'', ''Street Photography'', ''Reading Science‑Fiction and Tech Podcasts'', ''DIY Upcycling and Crafting Projects'']'
  career_goals: Alen aims to transition from a packer to a supervisory role within the next two years, targeting a position as a Warehouse Shift Supervisor or Operations Lead. He is pursuing additional
    certifications in Supply Chain Management and Certified Professional in Packaging (CPP) to broaden his technical expertise. In the longer term he hopes to become a Warehouse Manager, where he can integrate
    his love for efficient processes with his creative interest in sustainable packaging solutions. He also envisions mentoring new employees, implementing lean initiatives to reduce waste, and eventually
    advising small businesses on packaging design through a side consultancy.
