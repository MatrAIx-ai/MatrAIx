  career_goals: Gavin aims to transition into a technology leadership role where he can shape the strategic direction of product development. Over the next five years he plans to become a Chief Technology
    Officer or Director of Engineering at a mid‑size enterprise, leveraging his business education to drive digital transformation initiatives. He also hopes to launch a consulting practice focused on helping
    traditional businesses modernize their IT infrastructure, and to mentor the next generation of engineers through formal programs and community workshops.
