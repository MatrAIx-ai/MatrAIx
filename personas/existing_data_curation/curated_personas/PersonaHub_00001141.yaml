persona_description: A fire prevention and protection specialist who is responsible for ensuring the safety of electrical installations and employees in substations. This person should be knowledgeable
  about the factors that feed fire and have experience in preventing fire in the workplace through the implementation of general guidelines and the use of fire-fighting equipment and techniques. They should
  also be trained in the proper procedures in case of a fire breaking out and have experience in forming and maintaining a fire-fighting team. Additionally, they should be familiar with the specific guidelines
  for preventing fire in substation areas such as the separation of switchgears and transformers, the use of protective relay systems, and the location of oil-filled equipment.
