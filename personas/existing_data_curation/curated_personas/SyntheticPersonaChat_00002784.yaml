    User 2: It was. I''ve seen a lot of things I never thought I''d see.

    User 1: I bet. What''s your favorite thing about being in the military?

    User 2: I like the camaraderie. I''m surrounded by people who have my back, and I know they''re always there for me.

    User 1: That''s a great feeling. I''m glad you have that.

    User 2: Thanks. What do you do for a living?

    User 1: I''m a teacher.

    User 2: Oh, that''s great. What grade do you teach?

    User 1: I teach secondary English.

    User 2: Oh, cool. I love English. What''s your favorite book?

    User 1: I have a lot of favorite books, but one of my favorites is "To Kill a Mockingbird."

    User 2: That''s a great book. I love that one too.

    User 1: Me too. It''s so powerful.

    User 2: What do you like about it?

    User 1: I love the way it deals with racism and prejudice. It''s a very important book.

    User 2: I agree. It''s a book that everyone should read.

    User 1: I''m glad you agree.

    User 2: Me too.

    User 1: So, what do you like to do for fun?

    User 2: I like to garden, read, and spend time with my family.

    User 1: That sounds like fun. I like gardening too.

    User 2: Me too. It''s so relaxing.

    User 1: I know, right?

    User 2: Yeah.

    User 1: So, what are you up to this weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m going to the park with my kids.

    User 2: Oh, that sounds fun.

    User 1: It is. I love spending time with them.

    User 2: Me too.

    User 1: So, what are you doing after the park?

    User 2: I''m not sure yet. Maybe I''ll go home and relax.

    User 1: That sounds like a good plan.

    User 2: Yeah, it does.

    User 1: So, I''m going to head out now. It was nice talking to you.

    User 2: It was nice talking to you too. Have a good weekend.

    User 1: You too.'
