  hobbies: '["Visiting Art Galleries", "Collecting Vintage Postcards", "Reading Historical Biographies", "Travel Writing", "Gardening", "Southern Cooking", "Harmonica Playing", "Senior Choir Participation",
    "Board Game Nights", "Walking Club"]'
  career_goals: Although retired, Daniel aims to deepen his involvement in Oneonta by founding a monthly seniors' art salon that showcases local artists and hosts talks on new ideas. He plans to mentor
    younger volunteers at the Etowah County Historical Society, help digitize its archives, and write a memoir chronicling post‑war life in the region. Over the next five years he hopes to visit at least
    three major art museums to broaden his artistic perspective and share those insights with his community. He also aspires to stay active by completing a walking club challenge and learning basic photography
    to document community events.
