  career_goals: Jacob aspires to move into senior operational leadership, such as Plant Director or Vice President of Operations, where he can champion sustainable manufacturing and digital transformation.
    He plans to obtain an industrial engineering certification, lead a company-wide Lean Six Sigma program that cuts waste by at least 20 percent, and create a mentorship initiative that bridges engineering
    and the arts. Over the longer term he envisions founding a boutique consultancy that helps mid-size manufacturers integrate creative design thinking and culturally-informed practices while also supporting
    community art projects in rural Georgia.
