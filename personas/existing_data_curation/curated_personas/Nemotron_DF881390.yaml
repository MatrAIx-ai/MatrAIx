  hobbies: '[''Journaling and Creative Writing'', ''Sketching and Watercolor Painting of Nature Scenes'', ''Birdwatching in Local Woodlands'', ''Acoustic Guitar (Folk Tunes)'', ''Reading Classic Mystery
    and Psychological Novels'', ''Puzzle Solving (Crosswords, Logic Puzzles)'', ''Baking Simple Desserts'']'
  career_goals: Looking ahead, Ann Ann hopes to turn her love of animals and the natural world into a career. She plans to enroll in a high-school biology program and later pursue studies in wildlife rehabilitation
    or veterinary medicine, aiming to work in a quiet rural clinic or a small wildlife sanctuary where she can provide care while enjoying the calm of nature. At the same time, she wishes to develop her
    creative writing into a side vocation, publishing short stories or a personal memoir that address teenage anxiety and the healing power of the outdoors. Her long‑term ambition blends scientific knowledge,
    compassionate service, and solitary creative expression while respecting her need for structure and her instinctive spontaneity.
