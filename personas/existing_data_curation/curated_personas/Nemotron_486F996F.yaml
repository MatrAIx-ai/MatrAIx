personas:
  professional: Courtney Deminck is a budding visual artist and aspiring freelance illustrator who blends digital illustration, photography, and community‑focused event planning, leveraging their curiosity
    and empathetic communication while often wrestling with self‑imposed deadlines due to a restless aversion to rigid schedules.
  sports: Courtney Deminck fuels their love of the outdoors by joining the Lincoln Trail Hikers for weekend treks across Lancaster County’s prairie and grasslands, rooting for the Nebraska Cornhuskers football
    team on game days, and squeezing in weekly yoga sessions to complement the occasional pickup soccer game with friends, maintaining a relaxed yet consistent fitness routine.
  arts: Courtney Deminck fills their free hours sketching murals inspired by Banksy’s street wit, painting prairie landscapes echoing the palette of Georgia O’Keeffe, curating a rotating exhibit of local
    art at the Luna Gallery, and unwinding to the indie sounds of Sufjan Stevens and Phoebe Bridgers while the scent of fresh coffee from the neighborhood café drifts through their studio.
  travel: Courtney Deminck prefers spontaneous, budget‑friendly road trips that blend art‑crawls and nature, having recently road‑tripped to Chicago’s art districts and Portland’s independent galleries,
    while dreaming of a solo adventure to Oaxaca’s vibrant murals and New Zealand’s dramatic fjords, often booking hostels last minute and sketch‑booking each stop.
  culinary: Courtney Deminck enjoys farm‑to‑table fare, often whipping up quick kale‑and‑corn salads with heirloom tomatoes, savoring a perfectly seared salmon with a citrus glaze, and indulging in Nebraska
    cheese curds at local brewpubs, though they admit their signature dish remains a slightly over‑cooked spaghetti carbonara they learned from a YouTube tutorial.
  core: Courtney Deminck is a 20‑year‑old art‑obsessed wanderer who balances vivid creativity and spontaneous living with a chronic worry habit, an ever‑growing sketchbook, and a tendency to procrastinate
    deadlines while dreaming of turning their passion into a community‑focused freelance studio.
background:
  cultural: Courtney grew up in Lincoln, Nebraska, a Midwestern city with a strong sense of community, modesty, and an emerging arts scene. Her family's cultural roots are predominantly European-American,
    with values of hard work, self-reliance, and benevolence common in the region. Exposure to the University of Nebraska campus and local cultural festivals introduced her to diverse artistic expressions
    and liberal ideas, fostering an open‑minded outlook. The expansive prairie landscape and seasonal changes influence her appreciation for natural beauty, while the city's vibrant coffee houses and art
    collectives shape her contemporary creative identity.
