  career_goals: Courtney aims to turn her artistic passion into a professional pathway. She plans to enroll in a community‑college program in visual arts or multimedia design, with the long‑term ambition
    of becoming a freelance illustrator and art‑project coordinator for community‑based initiatives. She is also interested in merging art with mental‑health advocacy, envisioning a role where she can lead
    workshops that use creative expression as a tool for stress relief. While she values independence and flexibility, she hopes to cultivate enough discipline to meet project deadlines and to eventually
    launch her own small studio that collaborates with local nonprofits.
