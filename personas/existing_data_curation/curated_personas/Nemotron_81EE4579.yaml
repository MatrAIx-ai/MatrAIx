  career_goals: Edith aims to transform the modest arts scene of Streator into a vibrant, sustainable hub that nurtures local talent and attracts regional visitors. Over the next five years she plans to
    launch a community‑run performance space that offers affordable rehearsal studios, interdisciplinary workshops, and a seasonal theatre festival. She hopes to earn a formal credential in arts administration
    or an MFA in theatre directing, allowing her to take on larger directing projects and develop original productions that explore contemporary social themes. Additionally, she wants to mentor a new generation
    of performers, secure grant funding for youth arts programs, and eventually tour a flagship production that showcases Midwestern stories to broader audiences.
