personas:
  professional: Edith Johnson, a seasoned community‑theater actress and live‑event host in the Chicago region, leverages two decades of improvisational performance, vocal and dance training, and backstage
    technical know‑how to craft spontaneous, audience‑centric productions while grappling with the occasional chaos of loose organization.
  sports: Edith Johnson, an avid outdoors enthusiast, hikes the Illinois River Trail weekly, plays recreational volleyball with the Streator Community League, runs with the Chicago River Runners group,
    and they cheer on the Chicago Cubs, Bears, and Bulls while maintaining a flexible fitness routine that bends around last‑minute performance commitments.
  arts: Edith Johnson, a devoted participant in Chicago’s improv jam sessions and live‑music scene, draws artistic inspiration from Lin‑Manuel Miranda’s storytelling, Gillian Welch’s folk ballads, the paintings
    of Diego Rivera, and the theatrical daring of The Second City, channeling these influences into original scripts, community workshops, and multilingual street‑photo projects.
  travel: Edith Johnson, a wanderlust‑filled explorer, has trekked the vibrant streets of New Orleans during Mardi Gras, savored the culinary markets of Oaxaca, road‑tripped through Door County’s art colonies,
    and they dream of a summer residency in Kyoto’s historic temples, all while balancing travel costs with arts‑grant stipends and a modest family budget.
  culinary: Edith Johnson, an experimental home cook, masters dishes like Korean bibimbap, Mexican mole poblano, and vegan lentil bolognese, favoring ingredients such as turmeric, smoked paprika, and fresh
    heirloom basil, and they frequently browse the St. Louis farmers market for seasonal produce to infuse their cooking with Midwestern freshness.
  core: Edith Johnson is a spontaneously curious theater veteran who transforms community spaces with improv energy, splurges on props, battles knee arthritis through yoga, and never says no to a late‑night
    jam session.
background:
  cultural: Edith grew up in a working‑class, Midwestern family with German and Irish ancestry, rooted in the close‑knit communities of LaSalle County. Her upbringing emphasized community support, local
    fairs, and a respect for hard work, while also exposing her to a broad range of American popular culture through music, television, and school‑spirit events. Though she identifies with mainstream White
    American heritage, she values the region’s agricultural landscape, the tradition of small‑town gatherings, and the eclectic mix of cultural influences that flow from nearby Chicago. These experiences
    have shaped her inclusive outlook, appreciation for diverse artistic expressions, and commitment to giving back to her hometown’s cultural life.
