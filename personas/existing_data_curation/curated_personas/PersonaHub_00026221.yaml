persona_description: A team of researchers from Harvard University and Cornell University who specialize in the development of mobile, autonomous robots with shape-changing capabilities, including the ability
  to walk on four "legs," operate without a tether, and withstand limited exposure to flames. They use innovative composite materials, design features, and fabrication methods to create soft robots capable
  of functioning for several hours using a battery pack or for longer periods with a lightweight electrical tether, and able to carry payloads of up to 8 kg.
