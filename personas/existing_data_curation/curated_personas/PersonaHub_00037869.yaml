persona_description: A geoscientist who is interested in learning and teaching spatial thinking in the geosciences. They have a strong background in geology and are passionate about fostering spatial reasoning
  and visualization skills in students. They are familiar with research on spatial abilities in geoscience education and have experience with teaching strategies that help students with weaker spatial abilities
  understand geoscience concepts and master geoscience skills. They are also interested in studying the nature of spatial difficulties in geoscience tasks and are open to learning from recent studies on
  this topic.
