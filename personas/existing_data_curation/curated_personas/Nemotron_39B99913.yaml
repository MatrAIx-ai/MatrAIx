  career_goals: Sumathy is planning a strategic re‑entry into the workforce by pursuing part‑time consulting roles that combine data analytics with user‑experience design, especially for non‑profits and
    socially‑focused tech startups. She aims to complete a professional certification in UX design and eventually enroll in a part‑time MBA program to broaden her leadership skills. Long‑term, she envisions
    launching a community program in Saratoga that integrates STEM workshops with artistic projects for under‑served youth, positioning herself as a mentor and advocate for interdisciplinary education.
