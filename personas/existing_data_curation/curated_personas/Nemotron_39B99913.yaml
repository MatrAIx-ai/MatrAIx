personas:
  professional: Sumathy Nalla, a 42‑year‑old data‑analytics and user‑experience consultant, blends rigorous statistical modeling and Python coding with an eye for design, leveraging their methodical planning,
    reliable execution, and outgoing networking to transform nonprofit tech projects into intuitive, impact‑driven solutions.
  sports: Sumathy Nalla, an avid yogi and weekend hiker in the Santa Cruz Mountains, balances a disciplined fitness routine with enthusiastic support for the San Francisco Giants and San Jose Sharks, and
    occasionally joins the Bay Area Hiking Club’s organized 10‑mile treks and a local 5K charity run each spring.
  arts: Sumathy Nalla, a frequent visitor to local galleries and lover of immersive theater, channels their creative flair into digital illustration inspired by artists such as Yayoi Kusama and Bee Bee Pee,
    while drawing inspiration from the performances of Viola Davis and the fusion soundscapes of A.R. Rahman during evening concerts.
  travel: Sumathy Nalla, who prefers meticulously planned itineraries that blend cultural immersion and culinary discovery, has already explored the historic districts of Kyoto and the tapas bars of Barcelona,
    and now dreams of a sustainable retreat in Costa Rica while juggling a part‑time consulting schedule and a modest travel budget.
  culinary: Sumathy Nalla, an adept home chef, regularly prepares aromatic South‑Indian staples such as dosa with coconut chutney and tamarind sambar—infusing mustard seeds, curry leaves, and asafoetida
    into each batch—while also curating multicultural dinner gatherings that feature Mediterranean mezze and experimental vegan desserts.
  core: Sumathy Nalla navigates life as a curiosity‑driven, meticulously organized connector who turns data into design, fuels community impact through art and code, yet can be stubbornly skeptical and
    occasionally over‑schedules their already packed calendar.
background:
  cultural: Born to South Indian parents who immigrated to the United States, Sumathy grew up in a bilingual household where Tamil (or Telugu) and English were spoken interchangeably. Her upbringing emphasized
    education, family cohesion, and community service, with celebrations of festivals such as Diwali, Pongal, and Navaratri anchoring her cultural identity. While she embraces the progressive lifestyle
    of the Bay Area, she remains deeply connected to her roots through regular participation in local Indian cultural societies, cooking traditional meals, and sharing her heritage with friends and neighbors
    in Saratoga.
