personas:
  professional: Jose Prieto is a veteran construction supervisor with over 35 years of frontline experience, known for rigorous safety compliance, precise project scheduling, and meticulous documentation,
    leveraging bilingual communication and a humanities background to translate technical details into clear stakeholder reports while applying a disciplined, methodical approach that reflects both curiosity
    and practicality.
  sports: Jose Prieto follows the Tampa Bay Rays baseball team and the Orlando Magic NBA squad, engages in low‑impact fitness through early‑morning lake fishing and occasional jogging around his garden,
    and belongs to a small local carpentry club that holds a weekly model‑train fitness challenge, preferring solitary exercise over crowded gyms.
  arts: Jose Prieto immerses himself in Caribbean literature, regularly rereading works by Julia de Burgos and architecture monographs by Christopher H. G. Marsh, enjoys the melodies of Rubén Blades and
    rhythmic plena playlists during his workshop, and attends occasional theater performances at the Orlando Shakespeare Theatre, finding inspiration for his woodworking designs.
  travel: Jose Prieto prefers meticulously planned trips that combine historic architecture tours with quiet reflection, having visited St. Augustine’s colonial district, the cobblestone streets of Old
    San Juan during a family reunion, and the gardens of Charleston, while dreaming of a leisurely road‑trip along Florida’s Gulf Coast to explore coastal forts.
  culinary: Jose Prieto cooks traditional island dishes such as arroz con gandules, pernil, and mofongo, meticulously seasoning with sofrito, achiote, and fresh cilantro from his garden, and enjoys the
    methodical process of slow‑roasting, while also experimenting with wood‑smoked vegetables using his handcrafted smoker.
  core: Jose Prieto blends disciplined construction expertise with solitary, methodical hobbies, using his cultural traditions as a quiet compass for both professional rigor and personal fulfillment.
background:
  cultural: Jose was born to Puerto Rican parents who moved to Florida in the early 1970s. He grew up bilingual, celebrating traditions such as Nochebuena, the San Juan parades, and the music of plena and
    salsa, while also embracing the local customs of Central Florida. Family ties remain central; weekly gatherings feature shared meals and storytelling that reinforce "familismo" and respect for elders.
    His Catholic upbringing influences his values of discipline and community service, though he expresses his heritage primarily through food, music, and occasional participation in local Puerto Rican
    festivals. This blend of island roots and Floridian life informs his work ethic, his commitment to safety, and his desire to preserve cultural identity within his professional and personal pursuits.
attributes:
  skills: '[''Construction project scheduling'', ''Site safety management (OSHA & Florida codes)'', ''Blueprint and technical plan interpretation'', ''Cost estimation and budget control'', ''Team leadership
    and crew supervision'', ''Quality assurance and inspection'', ''Regulatory compliance (building permits, environmental standards)'', ''Bilingual communication (Spanish/English)'', ''Lean construction
    and process optimization'', ''Equipment maintenance and troubleshooting'', ''Risk assessment and mitigation'', ''Documentation and reporting'', ''Use of construction management software (Procore, Microsoft
    Project)'']'
  hobbies: '[''Reading architectural history and Caribbean literature'', ''Woodworking and small‑scale carpentry projects'', ''Gardening (vegetables and native herbs)'', ''Fishing on local lakes'', ''Cooking
    traditional Puerto Rican cuisine (arroz con gandules, pernil)'', ''Listening to salsa and bolero music'', ''Solving crossword and logic puzzles'', ''Model‑train building and layout maintenance'', ''Trail
    hiking in Central Florida nature preserves'', ''Genealogy research into family roots'']'
  career_goals: Jose aims to transition from day‑to‑day supervision to a senior consultancy role where he can mentor the next generation of supervisors and help firms achieve top safety and productivity
    benchmarks. He is pursuing OSHA 30‑hour certification and plans to earn a Lean Six Sigma Green Belt to formalize his process‑improvement expertise. Over the next five years, he hopes to lead a regional
    safety excellence program, earn recognition as the highest‑performing crew in Central Florida, and eventually establish a small consulting boutique focused on sustainable retrofits for historic Puerto
    Rican‑style structures in the Southeast.
