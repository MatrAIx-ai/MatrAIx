  career_goals: Phul envisions herself as a teacher or community organizer when she grows up because she enjoys helping classmates understand new ideas and values a harmonious environment. She also dreams
    of designing playgrounds or becoming an architect, inspired by her love for building with LEGO. Ultimately, she wants a career that lets her make her family and neighborhood happier.
