personas:
  professional: Phul Mikhail is a budding LEGO architect, channeling a love of structure and predictability into elaborate block creations that double as playgrounds for imagined adventures, while also
    practicing the patience to follow step‑by‑step instructions from instruction booklets, and they proudly display each finished model on their bedroom shelf.
  sports: Phul Mikhail dabbles in the Concord Soccer Club’s kids’ soccer program, cheering for the Carolina Panthers on Sundays and imitating the Tar Heels’ basketball moves during recess, while also relishing
    the simple delight of swinging high at the local park, and they proudly wear a junior jersey with the club’s colors.
  arts: Phul Mikhail fills sketchbooks with vibrant, animal‑themed doodles while humming A.R. Rahman’s melodic Bollywood tunes during family dance circles, and they treasure picture books by Eric Carle,
    blending classic Western illustration with colorful Eastern rhythms in every art session.
  travel: Phul Mikhail loves weekend family road trips to the North Carolina Museum of Natural Sciences and seasonal excursions to the bright lights of New York City, dreaming of one day strolling through
    the Taj Mahal’s gardens during a family vacation abroad, and they prefer spontaneous pit‑stop ice‑cream breaks over rigid itineraries.
  culinary: Phul Mikhail eagerly helps stir simmering dal with cumin and turmeric in the family kitchen, loves the sweet chew of gulab jamun after dinner, and happily swaps in peanut butter sandwiches or
    cheese pizza for a quick after‑school snack, showcasing a flavorful mix of traditional and kid‑friendly dishes while they carefully arrange each plate with neat sections.
  core: Phul Mikhail is a structure‑loving LEGO‑building dreamer who balances disciplined play with spontaneous dance moves, a gentle soul who occasionally forgets to tidy up her crayons but always returns
    them to the right drawer.
background:
  cultural: Phul grows up in a South Asian household in Concord, North Carolina. Her family speaks Bengali at home and celebrates Indian festivals such as Diwali and Pongal, preparing traditional dishes
    like rice with lentils and sweets. She attends a local public elementary school where she interacts with a diverse student body, but at home she also learns classical Indian songs and participates in
    cultural events at the nearby Indian community center. This blend of South Asian traditions and American childhood experiences shapes her identity.
