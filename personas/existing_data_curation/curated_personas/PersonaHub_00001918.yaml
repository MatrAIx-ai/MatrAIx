persona_description: A researcher who specializes in studying the impact of organophosphorus pesticides on children's development, particularly in the context of fetal exposure and early childhood behavioral
  outcomes. This researcher has conducted three scientifically rigorous, cohort studies on pregnant Latina women in Salinas, California, and has measured biomarkers of prenatal exposure in urine and blood.
  The researcher is particularly interested in the long-term effects of low-level exposure to organophosphorus pesticides on children's cognitive and behavioral development.
