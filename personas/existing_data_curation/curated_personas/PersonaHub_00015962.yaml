persona_description: An anthropologist who specializes in the study of cave paintings and their origins, particularly the use of reverberation and echo chambers in prehistoric times to create a sense of
  auditory illusion. Their research interests include the relationship between sound and perception, the influence of ancient myths and legends on human culture, and the role of sound in the creation of
  artistic representations. They are also interested in the use of psychoacoustic techniques to explain observed auditory phenomena and the potential for such techniques to be used to study the origins
  of sound in prehistoric times.
