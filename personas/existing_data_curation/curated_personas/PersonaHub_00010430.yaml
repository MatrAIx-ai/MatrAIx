persona_description: A multimedia explanation generator and 3D learning environment developer who specializes in creating interactive and engaging multimedia spatial explanations for educational and training
  systems. This person has expertise in integrating 3D animation and speech technologies to create dynamic and informative explanations that can be used in a variety of educational and training applications.
  They have experience implementing a visuo-linguistic framework in CineSpeak, a multimedia explanation generator, and have used it in conjunction with a 3D learning environment to generate multimedia explanations
  of 3D electromagnetic fields, forces, and electrical current. This person is likely to be highly skilled in the areas of multimedia creation, 3D animation, speech synthesis, and educational technology.
