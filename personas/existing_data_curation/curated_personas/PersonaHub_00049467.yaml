persona_description: A Holocaust survivor and author of Yiddish literature, who has published several collections of poetry, novels, short stories, plays, and essays dealing with the Holocaust. She was
  born in Hamburg, Germany, and her mother and sister were sent to Bergen-Belsen, where she was liberated by the British army in 1945. She was married to Henry Morgentaler, a Holocaust survivor, and they
  immigrated to Montreal, Canada, where she did most of her writing. She is known for her epic novel "The Tree of Life" and her prequel "Bociany".
