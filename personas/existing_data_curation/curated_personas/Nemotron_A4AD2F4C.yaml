personas:
  professional: Phuong Huynh, an aspiring junior marine biologist, merges a love for beach ecosystems with a methodical yet imaginative approach, using sketching and LEGO dioramas to model coral reefs while
    displaying a competitive streak in science fairs.
  sports: Phuong Huynh enthusiastically participates in the Huntington Beach Youth Surf Club and the local swim team, frequently cheering for the Los Angeles Dodgers and the LA Galaxy while balancing the
    competitive drive to improve lap times with a relaxed love for building sandcastles on sunny afternoons.
  arts: Phuong Huynh channels their love for sketching beach scenes and collage in after‑school art classes, drawing inspiration from illustrator Oliver Jeffers, listening to acoustic tunes by Jack Johnson,
    and eagerly watching animated films by Studio Ghibli, especially "My Neighbor Totoro," which fuels their creative storytelling.
  travel: Phuong Huynh prefers short family trips that blend beach relaxation with cultural discovery, having visited Disneyland, the Santa Monica Pier, and a family vacation to Kyoto where they marveled
    at cherry blossoms, while dreaming of exploring the Great Barrier Reef and the Grand Canyon on future adventures.
  culinary: Phuong Huynh delights in the fragrant broth of pho, the crisp freshness of spring rolls, and the sweet tang of mango sticky rice, can independently assemble a simple noodle bowl using rice noodles,
    basil, and cilantro under parental guidance, and enjoys occasional family BBQs featuring grilled chicken and corn.
  core: Phuong Huynh is a curious, organized eight‑year‑old who balances a competitive edge with thoughtful creativity, from sketching ocean dioramas to saving diligently for LEGO sets, all while navigating
    mild allergies and a love for beach life.
background:
  cultural: Phuong comes from a Vietnamese‑American family that cherishes both traditional Southeast Asian customs and the vibrant multicultural life of Huntington Beach. At home, she hears Vietnamese spoken
    alongside English, celebrates Tet with family gatherings, red envelopes, and traditional foods like bánh chưng, and enjoys Vietnamese cuisine such as pho and spring rolls. The community’s beach culture
    introduces her to surfing, sandcastle building, and seasonal festivals. Her parents emphasize respect for elders, the importance of education, and the value of perseverance, shaping her balanced approach
    of organization and flexibility.
