  career_goals: Phuong imagines a future where she can blend art and science. She dreams of becoming an illustrator for children's books, designing characters that tell stories about marine life, and hopes
    to study marine biology to understand ocean ecosystems. She also aspires to participate in school science fairs and win awards, aiming to be recognized for her creativity and problem‑solving abilities.
