persona_description: A scholar who specializes in studying port cities, specifically focusing on the resilience of port cities and the relationship between the port, the city, and its citizens. They have
  a keen interest in studying the economic, environmental, cultural, and political changes that have shaped port cities over time and how these changes have influenced the resilience of port cities. They
  have a strong background in cultural port history and have conducted research on the waterfront as a productive liminal space and entrance to the city, and the major economic, spatial, social, and cultural
  transformations of ports, their hinterlands, and their coastal zones. They are also interested in studying how port narratives have been used as rhetorical means for legitimizing government actions or
  in service of local business networks.
