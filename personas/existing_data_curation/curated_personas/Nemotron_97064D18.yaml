  hobbies: '[''DIY electronics projects'', ''vintage radio restoration'', ''model train building'', ''hiking and nature photography'', ''home-brewing craft beer'', ''listening to transportation podcasts'',
    ''community garden volunteering'']'
  career_goals: Gary aims to advance within the postal service by moving into a supervisory or operations‑management role where he can oversee a sorting facility, implement efficiency improvements, and
    mentor staff. He plans to obtain a certification in supply‑chain management and eventually transition to a broader logistics coordinator position, possibly with a private courier company that offers
    more flexible scheduling. He also dreams of leveraging his hands‑on skills to start a small side business refurbishing vintage office equipment, balancing his curiosity for technology with his desire
    for independent, practical work.
