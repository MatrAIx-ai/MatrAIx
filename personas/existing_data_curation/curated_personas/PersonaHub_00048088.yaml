persona_description: A teacher at Oaklands Infant School who is responsible for teaching phonics and supporting the development of decoding skills and essential phonic knowledge in Foundation Stage and
  KS1 children. They are experienced in using the LCP Letters and Sounds and Lesley Clarke Synthetic Phonics Programmes, as well as Jolly Phonics resources. They are trained to a high standard and monitor
  the progress of pupils carefully to inform planning and provide phonics intervention programmes to support those who need extra help. They are also involved in the varied, fast-paced, multi-sensory and
  engaging opportunities to develop decoding skills and essential phonic knowledge.
