personas:
  professional: A diligent facilities maintenance technician, Christine Meason combines hands‑on repair expertise with meticulous CMMS organization, channeling her sociable confidence into leading team
    briefings and client interactions, and they thrive under pressure thanks to their calm temperament.
  sports: A weekend volleyball player, Christine Meason competes with the Austin Springs Volleyball Club, follows the Dallas Cowboys and Texas Rangers, and they supplement team practice with hill‑country
    hikes and twice‑weekly HIIT classes to stay fit.
  arts: A karaoke aficionado, Christine Meason commands the mic with renditions of Beyoncé and Bruno Mars, routinely attends indie folk shows featuring Fleet Foxes and local Texas singer‑songwriters, and
    they channel that creative spark into woodworking projects inspired by Scandinavian design.
  travel: A road‑trip planner, Christine Meason maps detailed weekend escapes to the Texas Hill Country, explores New Mexico’s White Sands National Monument, and they dream of an extended cultural tour
    of Oaxaca, balancing structured itineraries with spontaneous detours.
  culinary: A home‑cook who loves Tex‑Mex, Christine Meason expertly prepares carne asada tacos, smoky chipotle‑marinated chicken, and fresh guacamole with cilantro, jalapeño, and lime, and they often host
    friends for lively dinner parties that double as karaoke sessions.
  core: A curious, disciplined tinkerer, Christine Meason turns every repair into a performance, loves the spotlight at karaoke, yet they sometimes procrastinate filing CMMS reports until the deadline looms.
background:
  cultural: Christine grew up in a middle‑class white family in the San Marcos area, shaped by the close‑knit, community‑oriented atmosphere of Central Texas. Her upbringing emphasized hard work, self‑reliance,
    and Southern hospitality, with frequent participation in county fairs, neighborhood gatherings, and family barbecues. These experiences fostered a strong sense of local pride, respect for tradition,
    and an adaptable outlook that blends practicality with an openness to new ideas.
attributes:
  skills: '[''Preventive maintenance planning'', ''Electrical troubleshooting'', ''Plumbing repairs'', ''HVAC system servicing'', ''Carpentry and fixture installation'', ''CMMS operation'', ''Safety compliance
