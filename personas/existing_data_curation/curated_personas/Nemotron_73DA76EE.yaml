  hobbies: '[''DIY home improvement projects'', ''Community volleyball league'', ''Karaoke nights'', ''Hiking in Texas Hill Country'', ''Carpentry and woodworking'', ''Arduino/Raspberry Pi tinkering'',
    ''Local music festivals'', ''Fitness classes'', ''Cooking Tex‑Mex recipes'', ''Mentoring junior maintenance apprentices'']'
  career_goals: Christine aims to become a certified master technician and eventually a maintenance supervisor at a large facility such as a university campus or manufacturing plant in Central Texas. She
    plans to earn additional certifications in HVAC, electrical work, and green building technologies while completing an associate’s degree in facilities management. Long‑term, she hopes to launch her
    own handyman business that emphasizes reliability, environmentally friendly practices, and mentorship for other young workers, using her sociable nature to build a strong client network and community
    reputation.
