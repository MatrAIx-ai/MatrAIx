persona_description: A British enamel painter, Henry Bone, is known for his exquisite miniature portraits, including his eighty-five portraits of the time of Queen Elizabeth, which have been executed by
  his dynasty of enamelers, including Henry Pierce Bone and William Bone. His work has been exhibited at the Royal Academy and has attracted the attention of the Royal Academy. Bone's enameled pieces have
  a unique style and are highly sought after by collectors.
