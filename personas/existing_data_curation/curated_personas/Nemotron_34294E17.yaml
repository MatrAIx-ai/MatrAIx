  career_goals: Gregory aims to become department chair within the next three years, leveraging his leadership and administrative strengths to shape the business school's strategic direction. He plans to
    launch an interdisciplinary entrepreneurship hub that connects students, faculty, and local investors, fostering a culture of innovation in the Omaha metropolitan area. Securing multi‑year research
    grants to fund applied business studies is a top priority, as is authoring a textbook on strategic decision making for mid‑size enterprises. Additionally, he aspires to mentor a cohort of junior faculty
    members, cultivating a collaborative yet competitively rigorous academic environment, and to increase community outreach through executive education programs for regional business leaders.
