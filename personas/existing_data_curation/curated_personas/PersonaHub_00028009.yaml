persona_description: A database administrator who works with large amounts of text data, specifically CLOB data types. This individual is skilled in managing and manipulating large text fields in databases,
  and may need to work with additional text data types such as tinytext, mediumtext, and longtext. They are likely to be familiar with the use of CLOBs for storing large amounts of text data, and may have
  experience working with database management systems that support CLOBs. They may also be knowledgeable about the limitations and potential issues associated with using CLOBs, such as the inability to
  run certain text operations on CLOB fields and the need to use other character data types for smaller text values.
