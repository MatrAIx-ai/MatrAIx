persona_description: A humanitarian advocate who is deeply concerned about the plight of migrants and the barriers they face in accessing essential services. This person is knowledgeable about the various
  factors that prevent migrants from accessing essential services, including laws and policies that restrict access based on immigration status, the cost of services, and language barriers. This person
  is interested in working with states and humanitarian actors to ensure that all vulnerable migrants have access to the humanitarian assistance they need, and is willing to make recommendations to the
  Migration Compact that further this goal. This person is committed to protecting the safety and dignity of migrants and ensuring that their legal status does not become a barrier to basic protection.
