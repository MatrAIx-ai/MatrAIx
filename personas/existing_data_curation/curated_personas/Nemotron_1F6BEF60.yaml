  career_goals: Lynn aspires to become a veterinarian, motivated by her love for animals and her desire to help living beings in a practical, science‑based way. She also entertains the idea of a future
    role as a science teacher, where she could share her curiosity for nature and encourage younger students in small, supportive classroom settings. In the short term, she aims to strengthen her academic
    foundation in biology and mathematics, join her school's science club, and volunteer at a local animal shelter to gain hands‑on experience.
