persona_description: A researcher and academic who is interested in the fields of economics, finance, and macroeconomics. They are particularly drawn to the study of wealth distribution, income inequality,
  and economic models. They are skilled in using Lotka-Volterra models and Levy & Solomon's general Lotka-Volterra models to explain economic phenomena, and are interested in the Bowley ratio and its relation
  to debt and income inequality. They are also interested in the role of the state and monetary systems in economies and the concept of intrinsic value. They are likely to be interested in the full (book
  length) paper and the models presented in the paper.
