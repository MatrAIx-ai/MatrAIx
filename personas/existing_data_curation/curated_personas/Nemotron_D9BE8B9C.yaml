personas:
  professional: Donna Lockerby, a protective‑services veteran with over a decade of real‑time threat assessment, emergency response, and covert surveillance expertise, relies on their sharp visual literacy
    and solitary work style, and they channel this into designing security protocols that weave mental‑health awareness and cultural sensitivity for art institutions.
  sports: Donna Lockerby finds renewal on the trails of the Cascades with the Cascades Hiking Society, tackles winter climbs at Mt. Baker, tracks the Seattle Seahawks and Portland Timbers with a competitive
    edge, and while they relish solo cardio hikes over team sports, they occasionally join a rock‑climbing meetup at Smith Rock to sharpen their physical grit.
  arts: Donna Lockerby spends weekends wandering the Seattle Art Museum and local galleries, soaking in the stark landscapes of Ansel Adams, the vibrant indigenous narratives of Susan Sultan, and the abstract
    colors of Jackson Pollock, while they tune their soundtrack with the folk harmonies of Fleet Foxes and the experimental textures of Brian Eno, weaving these experiences into a personal aesthetic that
    informs both their security work and solitary photography outings.
  travel: Donna Lockerby crafts meticulously mapped solo itineraries that balance adventure and quiet, having trekked the rugged Oregon Coast and the misty Scottish Highlands, dreaming of Iceland's waterfalls
    and Kyoto's temples, while their modest travel budget steers them toward off‑season flights and affordable cabin rentals rather than luxury resorts, and they often prioritize experiences over opulent
    comforts.
  culinary: Donna Lockerby, a confident home cook, perfects cedar‑plank smoked salmon with fresh dill, whips up silky wild mushroom risotto using locally foraged chanterelles, curates artisanal cheese boards
    paired with Stumptown cold brew, and they never pass up a chance to experiment with seaweed and dulse in creative soups.
  core: Donna Lockerby blends a keen protector's vigilance with an artist's eye, thriving in solitary, detail‑driven environments, yet habitually battles deadline‑induced chaos and a competitive streak
    that fuels both chess victories and meticulous security planning.
background:
  cultural: Donna is a white American raised in Vancouver, Washington, part of the Pacific Northwest. Her family's roots trace back to British and Irish immigrants who settled in the region in the early
    20th century. Growing up among the area's forests and a vibrant local arts scene, she developed a strong sense of independence, self-reliance, and an appreciation for both nature and cultural expression.
    While she identifies with mainstream American values, she also respects the indigenous heritage of the Columbia Plateau and often seeks out art that highlights those traditions. Her upbringing emphasized
    a modest, pragmatic work ethic, which aligns with her practical approach to protective service work.
attributes:
  skills: '[''Threat assessment'', ''Emergency response'', ''De-escalation techniques'', ''First-aid/CPR'', ''Surveillance technology operation'', ''Incident report writing'', ''Situational awareness'',
