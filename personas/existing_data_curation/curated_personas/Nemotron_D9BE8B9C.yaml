  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Birdwatching'', ''Reading experimental literature and philosophy'', ''Solving puzzles and cryptic crosswords'', ''Hiking
    in the Cascades'', ''Participating in chess tournaments'', ''Collecting vintage postcards'']'
  career_goals: Donna aims to transition from front-line security work to a leadership role within a corporate or museum security department. She plans to earn advanced certifications such as the Certified
    Protection Professional (CPP) and to develop a training program that integrates mental-health awareness and cultural sensitivity for security personnel. In the long term, she envisions establishing
    her own consultancy focused on risk analysis for art institutions and small businesses, leveraging both her protective expertise and her deep appreciation for the arts.
