personas:
  professional: Penny Tudela, a 19‑year‑old communications major with a passion for sustainability, leverages her photography, Canva, and Photoshop skills to craft engaging digital narratives for campus
    nonprofits, while wrestling with a spontaneous streak that often pushes deadline walls to the brink.
  sports: Penny Tudela joins the Wellesley Hills Hiking Club for weekend trail runs, follows the Boston Celtics and New England Patriots on TV, and keeps a casual membership with a local cycling group that
    meets for sunrise rides.
  arts: Penny Tudela curates a personal soundtrack of indie artists like Phoebe Bridgers and Tame Impala, devours graphic novels by Alison Bechdel, and spends evenings sketching photorealistic cityscapes
    inspired by contemporary photographer Annie Leibovitz.
  travel: Penny Tudela plans spontaneous weekend getaways to nearby Cape Cod beaches and dreams of a semester abroad in Lisbon, balancing limited student funds with a love for budget hostels, street food
    tours, and the occasional eco‑friendly volunteer program.
  culinary: Penny Tudela experiments with seasonal recipes such as roasted beet and kale quinoa bowls, perfects avocado toast topped with pickled radish, and enjoys sourcing fresh herbs from the local farmer’s
    market while occasionally over‑indulging in sugary pastries during study marathons.
  core: Penny Tudela blends a curiosity‑driven love for storytelling with a laid‑back, sometimes deadline‑dodging, lifestyle, turning spontaneous adventures into creative projects while juggling a modest
    budget and a penchant for community‑focused activism.
background:
  cultural: Penny was raised in a middle‑class, Anglo‑American family in the suburban community of Wellesley Hills, Massachusetts. Her upbringing reflects New England’s strong emphasis on education, self‑reliance,
    and civic engagement. While her family’s values are rooted in traditional American individualism, the progressive and diverse atmosphere of nearby Boston has exposed her to a wide range of cultural
    perspectives. Seasonal town events, outdoor recreation, and community volunteerism are integral parts of her cultural identity.
attributes:
  skills: '["Digital communication", "Social media strategy", "Basic graphic design (Canva, Adobe Photoshop)", "Photography and photo editing", "Research and academic writing", "Event coordination", "Collaborative
    teamwork", "Fundamental data analysis (Excel, Google Sheets)"]'
  hobbies: '["Hiking and nature walks", "Photography", "Reading contemporary fiction and graphic novels", "Attending indie music concerts", "Cooking experimental recipes", "Journaling and sketching", "Volunteering
    for community clean-up events", "Writing for college online magazine"]'
  career_goals: Penny aims to finish her undergraduate degree—likely in communications, environmental studies, or a related field—within the next three years, while securing internships that combine sustainable
    practices with storytelling. She envisions a career where she can translate her curiosity into real‑world impact, such as a content strategist for a nonprofit, a digital marketer for a socially‑focused
    startup, or eventually a product manager that balances innovative ideas with practical execution. Travel and a semester‑exchange program also feature in her plans to broaden her perspective before entering
    the workforce.
