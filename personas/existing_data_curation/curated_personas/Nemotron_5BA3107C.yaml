  hobbies: '[''Visiting art galleries and museums'', ''Landscape and macro photography'', ''Cooking Korean and experimental dishes'', ''Hangul calligraphy'', ''Reading science‑fiction and philosophy'',
    ''Playing chess competitively'', ''Volunteering for community cultural events'', ''Hiking in the Finger Lakes region'']'
  career_goals: After a period of focusing on family and personal projects, Shuang aims to re‑enter the workforce by turning his passions into a sustainable livelihood. He plans to launch a small freelance
    business offering photography services, custom graphic design for local artisans, and curated cooking workshops that blend Korean heritage with contemporary culinary trends. To support this, he intends
    to complete a short certification in horticulture, allowing him to expand his gardening expertise into a niche service for landscape design and organic produce consulting in the Steuben County area.
    Ultimately, Shuang hopes to integrate his artistic curiosity, organized work ethic, and community‑oriented mindset into a role that both supports his family and enriches the local cultural scene.
