  hobbies: '[''Gardening'', ''Cooking'', ''Baking'', ''Knitting'', ''Quilting'', ''Reading historical fiction'', ''Bridge'', ''Community dance'', ''Genealogy research'', ''Computer tutoring'']'
  career_goals: Despite her age, Ina remains ambitious about personal fulfillment. She aims to complete a memoir documenting her family's history and the transformations she has witnessed in San Antonio
    over nine decades. She wants to stay physically active by maintaining her garden and attending weekly senior exercise classes. Learning is a priority; she is determined to master video calls and other
    digital tools to stay connected with grandchildren. Ina hopes to mentor younger volunteers at the community center, sharing her organizational expertise, and to host a series of storytelling evenings
    that highlight local history. She also plans to keep her competitive spirit alive by participating in bridge tournaments and friendly gardening contests.
