personas:
  professional: Charles Balcolm is an organized elementary educator who designs data‑driven lesson plans aligned with Massachusetts state standards, leverages Google Classroom and interactive whiteboards
    to keep students engaged, and coordinates after‑school tutoring while mentoring new teachers; their pragmatic mindset and clear communication style make them a reliable team player who also asserts
    themselves when advocating for social‑emotional learning initiatives.
  sports: Charles Balcolm plays midfield for the Malden United recreational soccer league, follows the Boston Celtics for winter basketball, cheers on the New England Revolution during the MLS season, and
    never misses a Boston Red Sox home game; they also belong to the Middlesex Fells Hiking Club, tackling the trail’s rocky ascents every fall.
  arts: Charles Balcolm frequently attends live music at the House of Blues, where they revel in the energetic sets of the Dropkick Murphys and occasional jazz nights with the Boston Symphony Orchestra;
    their book club currently dissects contemporary non‑fiction titles by Rebecca Solnit and Ta‑Nehisi Coates, and they enjoy Saturday‑night indie film screenings at the Somerville Montage.
  travel: Charles Balcolm enjoys weekend getaways to coastal towns like Rockport and Newburyport, has hiked the rugged cliffs of Acadia National Park, and dreams of a cultural pilgrimage to Dublin, but
    they plan trips meticulously, opting for budget‑friendly Airbnbs and using travel‑reward points to stretch their vacation budget.
  culinary: Charles Balcolm loves cooking seasonal New England dishes, often preparing creamy New England clam chowder with fresh clams, locally sourced potatoes, and thyme, baking lobster rolls with buttered
    brioche, and serving apple crisp topped with vanilla ice cream; they favor ingredients like cod, maple syrup, and cranberries, and their Sunday family dinner typically includes Boston baked beans and
    corned beef.
  core: Charles Balcolm is a community‑focused educator who balances a love for structured, data‑driven teaching with a lively passion for soccer, live music, and seasonal New England cooking, though they
    occasionally procrastinate on flossing and forget to cancel unused gym memberships.
background:
  cultural: Charles is a lifelong resident of the Greater Boston area, raised in a white, Irish‑American family in Malden. He embodies New England values of practicality, community service, and civic responsibility.
    His cultural experiences include participation in local traditions such as the St. Patrick’s Day parade, supporting neighborhood public schools, and engaging with the diverse, working‑class heritage
    of Suffolk County.
