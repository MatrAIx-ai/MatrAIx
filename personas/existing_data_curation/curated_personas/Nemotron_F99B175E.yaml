  hobbies: '[''Recreational Soccer'', ''Hiking'', ''Seasonal Cooking'', ''After‑School Tutoring Volunteering'', ''Book Club'']'
  career_goals: Charles plans to earn a bachelor's degree in elementary education within the next two years, followed by a master's in Educational Leadership. His ambition is to become a lead teacher or
    curriculum specialist at Malden Public Schools, eventually advancing to an assistant principal role. He is driven to champion social‑emotional learning initiatives, mentor new educators, and influence
    district‑wide instructional improvement efforts.
