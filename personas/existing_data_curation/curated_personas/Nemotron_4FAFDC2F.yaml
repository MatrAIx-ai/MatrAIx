personas:
  professional: Lidia Sacerio, a two-year-old budding explorer of shapes and colors, delights in organizing their toy bins by hue while they curiously deconstruct storybooks, showcasing early pattern-recognition
    skills and a critical, competitive spark that makes bedtime reading a playful debate.
  sports: Lidia Sacerio loves toddler gymnastics at the local YMCA, cheers loudly for the Kansas City Chiefs during family game nights, and they occasionally negotiate for extra playground time, balancing
    a competitive drive with the need for quiet solo play.
  arts: Lidia Sacerio is fascinated by bright storybook illustrations and enjoys dancing to cumbia rhythms at community festivals, often mimicking Frida Kahlo's bold colors in their own crayon drawings
    while they occasionally critique the way adults dress the characters in their picture books.
  travel: Lidia Sacerio has toured Grandma's farm outside of Kansas City, enjoyed a weekend trip to the Ozark mountains, and eyes future visits to sunny beach resorts where they can build sand castles,
    balancing a love for familiar family outings with a budding curiosity for new horizons.
  culinary: Lidia Sacerio prefers the soft texture of homemade pupusas with cheese, loves watching their parents prepare delicate corn tamales, and they often insist on stirring the pancake batter despite
    being only two, showing an early palate for traditional flavors and a mischievous willingness to help in the kitchen.
  core: Lidia Sacerio is a curious, color-obsessed toddler who organizes toys by hue, fiercely guards a piggy bank, battles eczema with a diligent routine, and delights in gymnastics, cumbia beats, and
    family road trips, all while they display a playful streak of competition and skepticism.
background:
  cultural: Lidia comes from a Salvadoran family that maintains strong ties to its heritage while living in Kansas City, Kansas. At home, she hears Spanish spoken alongside English, celebrates cultural
    traditions such as Día de los Niños with homemade tamales and pupusas, and participates in community events organized by the local Salvadoran community. She is exposed to vibrant Salvadoran art, music,
    and folklore, which enrich her appreciation for colors and patterns and foster a sense of cultural pride.
attributes:
  skills: '[''Walking'', ''Running'', ''Climbing'', ''Fine Motor Skills (Scribbling, Crayon Use)'', ''Block Stacking'', ''Simple Puzzle Solving'', ''Basic Vocabulary'', ''Color Identification'']'
  hobbies: '[''Scribbling with Crayons'', ''Building Block Towers'', ''Dancing to Music'', ''Listening to Bilingual Songs'', ''Exploring Backyard'', ''Reading Picture Books'', ''Playing with Shape Sorters'']'
  career_goals: Although still very young, Lidia loves to explore and create. She often declares she wants to "make big pictures" and "build the tallest towers." Guided by her parents, she shows early ambitions
    toward becoming an artist or a builder, aiming to master drawing and construction toys, and later hopes to share her creations with friends and family. Her competitive streak emerges when she tries
    to make her block towers higher than others, hinting at a future drive to excel in creative pursuits.
