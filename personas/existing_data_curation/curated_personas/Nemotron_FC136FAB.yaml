  career_goals: Zachary aims to deepen his mastery of test automation and earn the ISTQB Advanced Test Analyst certification within the next two years. He envisions progressing to a senior QA analyst role
    where he can mentor junior testers and standardize testing procedures. Ultimately, he aspires to become a QA lead or test‑automation architect, shaping reliable, repeatable quality processes while preserving
    a predictable work routine and limited managerial overhead.
