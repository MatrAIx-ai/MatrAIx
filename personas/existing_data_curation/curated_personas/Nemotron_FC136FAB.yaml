personas:
  professional: Zachary Powell is a meticulous software quality assurance analyst who designs repeatable test plans, automates API and performance tests, and channels his preference for routine and quiet
    focus into delivering flawless releases while quietly mentoring junior testers.
  sports: Zachary Powell hikes the Sonoran desert at dawn with the Desert Trail Runners club, follows the Phoenix Suns for basketball and the Arizona Cardinals for football, and occasionally joins a weekend
    pickup soccer game with the Phoenix Greens, preferring solitary cardio over team-based sports.
  arts: Zachary Powell is an avid desert photographer inspired by Chris Burkard, quietly practices acoustic guitar renditions of Nick Drake's songs, and meticulously assembles Tamiya model kits of classic
    aircraft, weaving these creative outlets into his contemplative lifestyle.
  travel: Zachary Powell's travel style is low-key and meticulously planned, favoring sunrise trips to Saguaro National Park, Monument Valley, and the Atacama Desert where he can capture stark landscapes
    without crowds.
  culinary: Zachary Powell prefers health-focused meals such as grilled salmon with quinoa, cactus-lime salad, and a nightly cup of Aeropress coffee, cooks at an intermediate level by following precise
    recipes, and reserves dining out for occasional meals at quiet farm-to-table bistros.
  core: Zachary Powell is a routine-driven QA specialist who finds solace in desert solitude, solves puzzles before coffee, and quietly fine-tunes both code and his camera lens.
background:
  cultural: Zachary grew up in a middle‑class, suburban family in the Phoenix metropolitan area, where practical values and self‑reliance were emphasized. He identifies with mainstream American cultural
    norms, celebrating holidays such as Independence Day and Thanksgiving, and he participates in community activities like local farmers' markets and volunteer clean‑up events. His upbringing reflects
    the blend of Southwest outdoor appreciation and a traditional, work‑ethic‑focused household.
