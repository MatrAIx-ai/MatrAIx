  career_goals: Yvonne aims to transition into a supervisory role as a lead facilities manager within the next two years, leveraging her on‑the‑ground experience to oversee a larger team and integrate sustainable
    cleaning practices campus‑wide. She is pursuing certifications in green cleaning, OSHA safety, and basic building systems to strengthen her qualifications. Long‑term, she envisions launching a small,
    independent cleaning service that emphasizes environmentally safe methods and offers mentorship programs for younger workers. Additionally, she hopes to combine her curiosity about art by curating rotating
    artwork displays in communal spaces, bridging her professional expertise with her personal passion.
