personas:
  professional: Yvonne Maciejewski is a veteran facilities maintenance specialist with three decades of expertise in floor care, eco‑friendly chemical handling, and minor repairs, who leverages her detail‑oriented,
    problem‑solving mindset and curiosity about art to champion sustainable cleaning protocols and envision curated art displays in communal spaces as she steps toward a lead facilities manager role.
  sports: Yvonne Maciejewski enjoys low‑impact fitness through weekly walks with the Boston Seniors Hiking Club and bird‑watching hikes in the nearby nature reserves, follows the Boston Red Sox and New
    England Patriots on television, and plays occasional casual tennis at the community center during the summer months.
  arts: Yvonne Maciejewski regularly visits the Museum of Fine Arts, Boston and the Institute of Contemporary Art, reads The Burlington Magazine and listens to podcasts like “The Art History Babes” while
    drawing inspiration from artists such as Georgia O’Keeffe and Anselm Kiefer, and often supports local community theatre productions by the Lyric Stage Company, which fuels their creative side alongside
    their DIY upcycling projects.
  travel: Yvonne Maciejewski prefers thoughtfully planned weekend getaways, having explored Cape Cod’s lighthouses, the White Mountains’ foliage in autumn, and a cultural tour of Kraków, while dreaming
    of a spring visit to Japan’s cherry‑blossom gardens and an Italian coastal road trip along the Amalfi Coast, all balanced against their modest retirement savings.
  culinary: Yvonne Maciejewski delights in preparing traditional pierogi stuffed with potato and cheese, hearty bigos, and New England clam chowder, often seasoning dishes with fresh rosemary, thyme, and
    dill from their herb patio garden, and enjoys pairing meals with locally sourced apple cider while boasting a competent, though occasionally experimental, home‑cooking skill set.
  core: Yvonne Maciejewski is a curious, eco‑conscious facilities veteran who blends meticulous maintenance work with a love for art, gardening, and DIY crafts, all while juggling mild hypertension, a habit
    of collecting paper receipts, and an unwavering commitment to sustainable living.
background:
  cultural: Yvonne comes from a Polish‑American family that settled in the small towns of New England. Her surname, Maciejewski, reflects her grandparents' migration from Poland, and she grew up with a
    blend of Catholic traditions, Polish holiday foods, and the rustic, self‑reliant values of rural Maine. The close‑knit community of Addison, Washington County, has fostered a strong sense of local identity—characterized
    by seasonal festivals, a love of the outdoors, and a deep appreciation for handcrafted arts. This cultural mix informs her respectful yet inquisitive demeanor, her commitment to community service, and
    her inclination toward preserving both environmental and cultural heritage.
