persona_description: A participant in the CLM (Community-Led Microfinance) program in Haiti, who is 14 years old and has been selected to participate in the program through a rigorous selection process.
  She has six siblings and no income-generating assets, but has been trained in the care of goats and chickens and has been given seven chickens and three goats to start her own businesses. She receives
  a stipend of just under $1 a day to support her siblings and attend school. She is excited to be part of the program and has already started saving money to prepare for microcredit.
