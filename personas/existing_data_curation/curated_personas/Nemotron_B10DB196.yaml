  hobbies: '[''Gardening'', ''Cooking'', ''Yoga'', ''Book club'', ''Volunteering at food bank'', ''Walking in desert parks'', ''Birdwatching'', ''Listening to self‑help podcasts'']'
  career_goals: Maya aims to move into a supervisory role within retail, such as shift lead or assistant manager, where she can apply her organizational strengths and compassionate leadership. She plans
    to complete a retail management certification and finish an associate degree in business administration to strengthen her credentials. Long‑term, she hopes to transition into a community‑focused position,
    perhaps coordinating volunteer programs for local charities or becoming a customer‑experience trainer that emphasizes empathy and harmony in service environments.
