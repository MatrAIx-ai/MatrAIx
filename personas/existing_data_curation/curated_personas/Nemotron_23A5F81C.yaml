personas:
  professional: Carina, a 5‑year‑old preschooler who dreams of becoming a junior astronomer, showcases budding observational skills and a knack for organizing storybooks, while channeling her curiosity
    into asking “why” about stars and turning playtime into structured experiments.
  sports: Carina, a 5‑year‑old member of the Little Lions Soccer Club who spends weekends sprinting at the park, loves watching the Chicago Cubs pitch and the Chicago Bulls dunk, and always aims to be the
    fastest in a tag game, reflecting her competitive yet social nature.
  arts: Carina, a 5‑year‑old who fills sketchbooks with vibrant, Dr. Seuss‑inspired doodles and builds imaginary worlds after watching Pixar’s "Coco", delights in dancing to kid‑friendly songs by Kidz Bop
    and Pharrell, and keenly mimics the expressive gestures of Julie Andrews in her preschool’s "Mary Poppins" reenactments, fueling her curiosity for abstract concepts.
  travel: Carina, a 5‑year‑old who loves family road trips to the coast where she builds sandcastles at Clearwater Beach and eagerly recalls the magic of Disney World’s fireworks, now dreams of exploring
    the towering spires of Paris’s Eiffel Tower and snorkeling among the coral reefs of the Great Barrier Reef, preferring guided tours that balance adventure with the comfort of familiar faces.
  culinary: Carina, a 5‑year‑old with a budding appetite for cheesy macaroni, golden chicken nuggets, and bright fruit salads sprinkled with blueberries, proudly decorates her own peanut‑butter‑and‑jelly
    sandwiches with smiley‑face jam designs, and occasionally helps mom whisk together banana pancakes using ripe bananas, flour, and a dash of cinnamon.
  core: Carina, a relentlessly curious 5‑year‑old who transforms every game into a tiny experiment, over‑organizes her crayons into rainbow rows, competes fiercely for the first finish line, yet often frets
    over minor mishaps and clings to her favorite stuffed rabbit for comfort.
background:
  cultural: Carina is raised in a predominantly white, middle‑class family in Traverse City, Michigan, a community known for its Great Lakes shoreline, cherry orchards, and seasonal festivals. Her family
    celebrates typical American holidays such as Thanksgiving, Christmas, and Independence Day, and participates in local events like the Traverse City Cherry Festival and summer lake outings. The Midwestern
    values of politeness, community involvement, and a love of the outdoors shape her cultural upbringing, while the region's emphasis on education and extracurricular activities supports her curiosity
    and sociable nature.
