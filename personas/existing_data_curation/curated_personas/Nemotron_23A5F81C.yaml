  career_goals: Carina dreams of exploring the stars as an astronaut, creating vibrant paintings as an artist, and solving mysteries as a scientist. She loves the idea of becoming a storyteller who invents
    whole new worlds, and she is excited about winning school contests such as spelling bees, art competitions, or science fairs. Her competitive spirit also fuels a desire to be at the top of her class
    and to help others learn, hinting at a future role as a teacher or mentor.
