  career_goals: Michael aims to become a top‑performing senior account executive within the next two years, targeting consistent over‑quota results and earning recognition as a sales leader in the Pacific
    Northwest. He plans to obtain industry certifications such as Certified Professional Salesperson (CPS) and deepen his expertise in SaaS and managed services. Long‑term, he aspires to transition into
    a sales manager role, leading a high‑performing team, and eventually stepping into a director of sales position where he can shape strategy and mentor emerging talent. He also hopes to complete a bachelor's
    degree in business administration, build a robust professional network across Oregon and Washington, and possibly launch his own consultancy focused on helping small businesses adopt scalable service
    solutions.
