  hobbies: '[''Gardening'', ''Cooking and Recipe Development'', ''Senior Salsa Dancing'', ''Historical Fiction Reading'', ''Book Club Participation'', ''Genealogy Research'', ''Volunteer Food-Bank Coordination'']'
  career_goals: Although retired from formal employment, Angel’s ambition is to leave a lasting legacy of cultural knowledge and community connection. She aims to establish a monthly “Mexican Heritage Kitchen”
    class at the senior center, where she can pass on authentic recipes and cooking techniques to younger volunteers and fellow seniors. She wishes to mentor other widowed seniors in navigating health resources
    and managing finances, using her organized yet compassionate approach. Angel also hopes to compile a family oral-history booklet, preserving stories of her parents’ migration from Puebla and the traditions
    of Día de los Muertos, to share with grandchildren and the broader community. Maintaining her health, she plans to stay physically active through low‑impact exercise classes and to keep her stress in
    check by practicing mindfulness and joining a support group for seniors dealing with loss.
