  hobbies: '[''Watercolor painting'', ''Pottery classes'', ''Gardening'', ''Walking in Great Park'', ''Community dance group'', ''Attending art exhibitions'', ''Volunteering at senior center'', ''Cooking'',
    ''Listening to classic rock'', ''Reading mystery novels'']'
  career_goals: Looking ahead, Peggy aims to transition from full‑time freight work to a part‑time role that leverages her organizational talent for community benefit. She hopes to become a certified safety
    trainer for local warehouses, sharing her decades of knowledge with younger workers. At the same time, she envisions leading volunteer programs at the Buena Park senior center, organizing art‑themed
    workshops and social events that nurture connections among seniors. Peggy also dreams of starting a modest home‑based craft studio, where she can create and sell watercolor paintings and handcrafted
    pottery, blending her love of art with a low‑stress, flexible income stream.
