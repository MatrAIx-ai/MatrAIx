  hobbies: '[''Skateboarding'', ''Basketball'', ''Freestyle rap'', ''Cooking and recipe experimentation'', ''Street photography'', ''Live music attendance'', ''Volunteering at youth centers'']'
  career_goals: Travis is determined to earn his GED within the next year and then enroll in a vocational program—either culinary arts or automotive technology—that will give him a concrete trade while
    still allowing creative freedom. He envisions launching a mobile food truck that serves a fusion of soul‑food staples and Pacific‑Northwest produce, using his cooking skills and love for community gatherings.
    At the same time, he hopes to build a modest online presence where he shares cooking tutorials, street‑culture insights, and advice for other young people navigating school‑to‑work transitions. Ultimately,
    he wants to become a mentor for at‑risk youth in Portland, using his own story and practical know‑how to guide them toward stable, flexible careers.
