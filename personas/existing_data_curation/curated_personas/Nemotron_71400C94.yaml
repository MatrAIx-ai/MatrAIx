personas:
  professional: Travis Howard is an aspiring culinary entrepreneur and community organizer who leverages a natural knack for people‑connecting, quick‑fix problem solving, and mobile‑video content creation
    to turn skate‑park hustle into practical plans for a soul‑food food truck while staying flexible enough to accommodate last‑minute changes.
  sports: Travis Howard is a dedicated skateboarder at Burnside Skatepark, a casual basketball player at local courts who roots for the Portland Trail Blazers and Timbers, and prefers spontaneous, community‑driven
    fitness sessions over structured gym routines.
  arts: Travis Howard immerses himself in freestyle rap circles, draws lyrical inspiration from Kendrick Lamar, J. Cole, and Anderson .Paak, frequents indie venues like Mississippi Studios for live hip‑hop,
    jazz (Kamasi Washington) and neo‑soul (Erykah Badu) shows, and captures Portland’s street murals on phone‑shot videos he edits for social media.
  travel: Travis Howard enjoys weekend road trips to the Columbia River Gorge and Oregon Coast, dreams of a culinary pilgrimage to New Orleans for Southern flavor immersion, and keeps travel plans low‑budget
    and spontaneous, often using rideshare apps to explore new neighborhoods.
  culinary: Travis Howard is a self‑taught cook who fuses Southern staples like shrimp‑and‑grits and fried catfish with Pacific Northwest ingredients such as wild mushrooms, kale, and local hazelnuts, constantly
    experimenting with spice blends that pair smoked paprika with fresh rosemary and tarragon.
  core: Travis Howard is an energetic, socially‑driven 18‑year‑old who balances a restless curiosity for community‑centric creativity with a habit of last‑minute planning, often worrying about the future
    while cooking up soul‑food‑inspired street culture.
background:
  cultural: Travis grew up in a Black family that blends African‑American cultural traditions with the values of his Muslim heritage. His parents emphasized community, respect, and a love for music and
    food, often gathering around the kitchen for home‑cooked meals and sharing stories of Black history and social justice. Living in Portland, he navigates a city where the Black community is small but
    vibrant, participating in local cultural events, attending the nearby mosque, and connecting with other Black youth through community programs. This mix of Southern‑inspired soul food, hip‑hop culture,
    and the teachings of his faith shapes his worldview and fuels his commitment to uplift his neighborhood.
attributes:
  skills: '[''Interpersonal communication'', ''Informal mediation'', ''Creative problem solving'', ''Basic mechanical repair'', ''Digital media creation'', ''Culinary experimentation'', ''Spontaneous event
