  hobbies: '[''Tex‑Mex cooking and recipe experimentation'', ''Cumbia and salsa dancing'', ''Gardening – herbs and succulents'', ''Volunteer work at community center'', ''Book club for contemporary fiction'',
    ''Attending local music festivals'', ''Hiking at Santa Ana National Wildlife Refuge'', ''Playing guitar and singing'', ''Social gatherings with friends'', ''Animal shelter volunteering'']'
  career_goals: Rosalva aims to advance to an HR Director role within the next five years, where she can lead a strategic transformation that deepens inclusion and employee well‑being across the organization.
    She plans to earn the SHRM‑Senior Certified Professional (SHRM‑SCP) credential and enroll in a part‑time MBA program focused on organizational leadership. Beyond corporate advancement, Rosalva envisions
    establishing a boutique HR consulting practice that serves small businesses in the Rio Grande Valley, helping them build compliant, culturally‑competent workplaces. She also aspires to formalize a mentorship
    program for emerging HR professionals, especially women and bilingual candidates, to foster the next generation of HR leaders.
