personas:
  professional: Rosalva Manriquez blends three decades of HR expertise with a curious yet practical mindset, leveraging bilingual communication and data-driven analytics to design employee-engagement programs
    that balance structure with the flexibility required by a vibrant, socially-oriented workplace.
  sports: Rosalva Manriquez enjoys weekend hikes along the Santa Ana National Wildlife Refuge, participates in a local over-50s walking club, roots for the Houston Astros and the Dallas Cowboys, and occasionally
    joins a community softball league for charity events, keeping active without the pressure of competitive training.
  arts: Rosalva Manriquez strums a classical guitar at salsa nights, dancing to the rhythms of Celia Cruz and Marc Anthony, curates the book club’s reading list with contemporary authors like Zadie Smith
    and Chimamanda Adichie, and attends live theater performances at the local Playhouse, letting music and literature shape their social gatherings.
  travel: Rosalva Manriquez prefers weekend road trips that combine nature and culture, often driving to Austin for live music festivals, exploring the historic streets of San Antonio, and dreaming of a
    future pilgrimage to Oaxaca’s markets and the vineyards of Napa Valley, all while balancing caregiving responsibilities at home.
  culinary: Rosalva Manriquez, an adept home chef, experiments with Tex-Mex fusion dishes such as chipotle-marinated flank steak tacos with cilantro-lime quinoa and prickly pear sorbet, sources fresh herbs
    from their succulent garden, and hosts lively dinner parties where they showcase their knack for bold flavor pairings and the occasional over-spicing that guests affectionately tease them about.
  core: Rosalva Manriquez is a sociable, organized HR veteran who channels curiosity into community-focused cooking, music, and mentorship, while juggling a modest investment strategy and a health routine
    that balances vigilance with occasional lapses.
background:
  cultural: Rosalva is a second‑generation Mexican‑American who grew up in a bilingual household in the Rio Grande Valley. Raised on both Mexican traditions—such as Día de los Muertos, quinceañeras, and
    mariachi music—and the vibrant Texan culture of South Texas, she blends these influences in her personal and professional life. Her family places high value on ‘familia’ and ‘comunidad,’ shaping her
    collaborative, compassionate, and community‑oriented outlook. She remains connected to her heritage through regular participation in local Hispanic festivals, preservation of traditional recipes, and
    fluently speaking Spanish while also navigating the broader Texan social landscape. This cultural duality informs her commitment to fostering inclusive workplaces that honor diverse backgrounds.
attributes:
  skills: '[''Talent acquisition'', ''Employee relations'', ''Performance management'', ''Benefits administration'', ''Labor law compliance (federal and Texas)'', ''HRIS (ADP, BambooHR)'', ''Workforce analytics'',
