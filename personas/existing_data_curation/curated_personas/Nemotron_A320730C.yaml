  hobbies: '[''Visiting art museums and galleries'', ''Salsa and cumbia dancing'', ''Cooking Colombian cuisine with modern variations'', ''Hosting dinner gatherings'', ''Rooftop gardening'', ''Reading historical
    fiction'', ''Attending live music performances'', ''Participating in senior tech workshops'', ''Exploring cultural sites in Florida'']'
  career_goals: Although retired from formal employment, Martha aims to deepen her impact as a cultural ambassador for the Colombian diaspora in Miami. She aspires to lead the annual Colombian Heritage
    Festival, develop a bilingual workshop series on Latin American arts for senior centers, and author a memoir blending her life story with Colombian folklore. Her longer‑term ambition includes establishing
    a community art space that showcases emerging Latino artists and facilitates intergenerational mentorship.
