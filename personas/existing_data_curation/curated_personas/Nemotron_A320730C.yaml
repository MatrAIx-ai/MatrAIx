personas:
  professional: Martha Pazos, a retired community organizer turned cultural ambassador, leverages their bilingual fluency, meticulous budgeting, and keen visual‑arts eye; they lead Miami’s annual heritage
    festival, mentor emerging artists, and curate vibrant local exhibitions while balancing structured planning with spontaneous creativity.
  sports: Martha Pazos, an active senior who joins a local salsa‑dance fitness group, swims at the community pool three times a week, follows the Miami Heat, Miami Dolphins, and Miami Marlins zealously;
    they also volunteer with the Inter Miami CF fan club on match days and participate in the annual Miami Marathon’s 5K senior walk‑run to stay fit and socially engaged.
  arts: Martha Pazos, a devoted patron of the arts, frequents the Pérez Art Museum Miami to study works by contemporary Latin American painters such as Oswaldo Vigas and Gizelle Pérez; they enjoy live performances
    by the Miami Symphony Orchestra featuring compositions by Heitor Villa‑Lobos and Caetano Veloso, and they curate community art displays that showcase emerging muralists like Jorge Rodríguez, all of
    which deepen their appreciation for vibrant visual storytelling.
  travel: Martha Pazos, a curious explorer who prefers short, well‑planned trips, spends their vacations exploring the historic streets of St. Augustine, sailing through the Everglades on guided airboats,
    taking weekend getaways to the Bahamian islands of Nassau and Grand Bahama, and they dream of a future cultural tour of the Andean highlands and Caribbean coastlines.
  culinary: Martha Pazos, an accomplished home chef, delights in reimagining classic arepas and sancocho with modern twists—adding avocado‑citrus salsa, roasted plantain, fresh cilantro, and coconut‑lime
    rice; they host weekly dinner parties where guests savor dishes like grilled red snapper with guava glaze, quinoa‑infused empanadas, and their signature tropical fruit tiramisu.
  core: Martha Pazos, a vibrant 68‑year‑old cultural bridge‑builder, blends disciplined organization with spontaneous creativity; they turn every gathering into a lively celebration of art, food, and community.
background:
  cultural: Martha was born in Medellín, Colombia, and grew up immersed in the country's rich musical, culinary, and artistic traditions. She migrated to the United States in her late thirties, settling
    in Miami where a vibrant Latino community offered a familiar cultural tapestry. She maintains strong ties to her Colombian roots through language, holiday celebrations like Día de la Independencia,
    traditional music, and cooking. At the same time, she embraces Miami’s multicultural atmosphere, integrating Cuban, Haitian, and broader American influences into her daily life. Her bicultural experience
    informs her identity as a bridge between Colombian heritage and the diverse tapestry of South Florida.
attributes:
  skills: '[''Spanish fluency'', ''English conversational'', ''Community event planning'', ''Budget management'', ''Cultural education'', ''Traditional Colombian cooking'', ''Art curation'', ''Mentorship'',
