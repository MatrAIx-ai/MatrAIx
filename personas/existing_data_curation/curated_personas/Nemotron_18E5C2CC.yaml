  hobbies: '[''Visiting art galleries and street‑art sites'',''Salsa, bomba, and plena dancing'',''Cooking traditional and fusion Puerto Rican dishes'',''Balcony herb gardening'',''Volunteering at community
    festivals'',''Participating in a Caribbean literature book club'',''Practicing yoga and guided meditation'',''Digital photography of cultural events'']'
  career_goals: Betty aspires to transform her curiosity and sociable energy into a community‑focused career that remains flexible and creatively rewarding. She plans to launch a weekend arts and culture
    hub in her neighborhood, offering workshops in painting, dance, and traditional crafts that welcome participants of all ages. She also hopes to work part‑time as a cultural tour guide for visitors to
    San Juan, sharing the island’s history, music, and culinary traditions while continuing to learn from the stories she encounters. In the longer term, Betty envisions developing a small boutique that
    sells her own handmade jewelry and locally sourced food products, allowing her to blend entrepreneurship with her passion for Puerto Rican heritage. These goals reflect her desire for a role that balances
    personal expression, community service, and the freedom to pursue new ideas.
