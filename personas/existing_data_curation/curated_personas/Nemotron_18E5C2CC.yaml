personas:
  professional: Betty Hoyo, a seasoned community arts coordinator, blends bilingual storytelling, event promotion, and hands‑on craft expertise to turn local festivals into vibrant cultural showcases, while
    their relaxed planning style and occasional disorganization keep the projects lively but sometimes chaotic.
  sports: Betty Hoyo channels their energy into salsa and bomba dancing at Old San Juan’s weekly dance nights, joins a local beach volleyball league during the summer, and passionately supports the Cangrejeros
    de Santurce baseball team, balancing social movement with casual spectator sports.
  arts: Betty Hoyo frequently sketches vibrant street‑art murals, creates handcrafted jewelry inspired by local artisans like Carlos Gallart, and collects works by painter Marta Tellez, while evenings often
    include listening to the soulful croons of Celia Cruz and the contemporary beats of Bad Bunny.
  travel: Betty Hoyo enjoys spontaneous weekend getaways to Culebra and the historic streets of Old Havana, dreams of trekking to Machu Picchu, and prefers flexible itineraries over rigid tours, often blending
    cultural immersion with culinary explorations.
  culinary: Betty Hoyo loves cooking mofongo with a twist of miso glaze, infuses their balcony herb garden’s cilantro and oregano into arroz con gandules, and experiments with empanadillas filled with tropical
    fruits, reflecting a blend of traditional island flavors and modern culinary curiosity.
  core: Betty Hoyo is a 52‑year‑old vibrant community crusader whose love for dance, art, and food fuels their lively, slightly chaotic, yet deeply compassionate life, punctuated by occasional worry and
    a habit of last‑minute planning.
background:
  cultural: Betty was born and raised in the Carolina municipality of the San Juan metropolitan area, a region known for its vibrant blend of urban energy and coastal traditions. As a Puerto Rican, she
    grew up immersed in a culture shaped by Spanish colonial roots, African rhythms, and Taíno heritage, which is reflected in the island’s music, dance, cuisine, and folklore. Her family maintains strong
    ties to Catholic customs while also celebrating secular island festivals such as the San Sebastián Street Festival and the Heineken Jazz Fest. Fluent in Spanish and comfortable speaking English, Betty
    navigates both local and tourist contexts with ease. The close‑knit community life of her neighborhood, with its emphasis on family gatherings, communal cooking, and neighborhood block parties, has
    instilled in her a deep sense of communal responsibility and pride in Puerto Rican identity.
