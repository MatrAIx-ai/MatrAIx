persona_description: A geographer who is interested in the history and ecology of the Assiniboine River and its floodplain in the province of Manitoba, Canada. They are knowledgeable about the history of
  flood management and the impact of floods on the environment and human settlements in the region. They are also interested in the use of the phrase "without precedent" in describing the 2011 flood in
  Manitoba, and the challenges of incorporating historical and environmental events into collective memory. They are likely to have a background in geography, environmental science, or a related field,
  and have a strong interest in the use of historical data and evidence to inform environmental management and decision-making.
