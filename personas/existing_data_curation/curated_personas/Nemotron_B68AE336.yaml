personas:
  professional: A budding junior coder and LEGO architect, Justin Williams blends a love for building intricate brick models with early coding experiments on a tablet, applying their practical curiosity
    to solve small puzzles while staying flexible about rules and enjoying collaborative projects with friends.
  sports: Justin Williams sprints across the soccer field for the Liberty Lake Lions youth team, dribbles a ball with enthusiasm while cheering for the Seattle Sounders FC, rides a mountain bike on the
    Cascades Trail during summer weekends, and explores nearby woods for hikes, staying active through play and teamwork.
  arts: Justin Williams spends afternoons sketching wildlife inspired by Audubon’s birds and coloring vibrant landscapes reminiscent of Eric Carle’s illustrations, while also constructing elaborate LEGO
    scenes that double as three‑dimensional art, often sharing their creations at the local library’s "Kids Art Hour" and admiring music from Kidz Bop and the animated soundtrack of "Moana" for inspiration.
  travel: Justin Williams enjoys spontaneous weekend adventure trips, preferring loosely planned hikes around their hometown’s Liberty Lake and day trips to nearby Mount Rainier National Park, while dreaming
    of future family vacations to Yellowstone and the Grand Canyon where they can explore geysers and canyons with the same curiosity they bring to backyard adventures.
  culinary: Justin Williams favours cheesy pizza, buttery macaroni‑and‑cheese, and peanut‑butter‑and‑jelly sandwiches, adept at spreading peanut butter on toast and mixing fruit smoothies with banana, strawberry,
    and a splash of orange juice, and they relish the occasional cherry‑topped ice cream cone as a celebratory treat after LEGO builds.
  core: Justin Williams is a curiosity‑driven 8‑year‑old who balances practical LEGO building, early coding, and outdoor play while navigating allowance, mild allergies, and a love for soccer, all with
    a relaxed, kind‑hearted approach to rules and routines.
background:
  cultural: Justin was raised in Liberty Lake, Washington, a small community in the Pacific Northwest. His family maintains many typical western American traditions, such as celebrating community fairs,
    camping, and outdoor recreation. Growing up in a white Anglo‑American household, he has been exposed to values of politeness, cooperation, and a strong appreciation for the natural environment that
    surrounds his hometown.
