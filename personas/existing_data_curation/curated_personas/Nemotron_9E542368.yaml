    of Staff'', ''Customer Service and Stakeholder Communication'', ''Regulatory Compliance (OSHA, Data Privacy)'', ''Project Coordination'', ''Technology Integration for Office Automation'']'
  hobbies: '[''Reading non-fiction (history, business, technology)'', ''Puzzle solving (crosswords, Sudoku)'', ''Gardening (vegetable and ornamental)'', ''Hiking in Litchfield County'', ''Cooking traditional
    Puerto Rican dishes'', ''Playing acoustic guitar'', ''Volunteering for Spanish tutoring at community center'', ''DIY home improvement projects'']'
  career_goals: Juan aims to advance into a senior administrative leadership role, such as Operations Manager or Director of Office Services, where he can influence organization‑wide efficiency initiatives.
    He plans to earn professional credentials like the Certified Administrative Professional (CAP) and a Lean Six Sigma Green Belt to deepen his expertise in process improvement. Juan is also interested
    in leading cross‑functional projects that incorporate emerging digital tools while maintaining the reliable, disciplined environment he values. Mentoring emerging supervisors and fostering a collaborative
    culture remain central to his long‑term ambition, as does balancing career growth with quality time for his family in Barkhamsted.
