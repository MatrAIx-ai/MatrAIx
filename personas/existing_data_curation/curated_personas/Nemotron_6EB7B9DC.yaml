  career_goals: Even at five, Brendan talks about his future in vivid terms. He loves picture books about astronauts and outer-space illustrations and says he wants to become an astronaut or a space artist
    who designs rockets and draws planets. He also expresses a fascination with cartoon characters and imagines creating his own comic books, so a career as an illustrator or storyteller also appeals to
    him. His parents nurture these ambitions by providing art supplies and science‑focused toys, encouraging him to keep learning and dreaming.
