  hobbies: '[''Hiking and nature sketching'', ''Landscape photography'', ''Digital and mixed-media painting'', ''Reading art theory and cultural studies'', ''Attending small poetry readings'', ''Book club
    participation'', ''Volunteer library event coordination'', ''Ukulele practice'']'
  career_goals: Angela aims to translate her curiosity for art and her methodical nature into a career that bridges cultural heritage and visual storytelling. Over the next three years she plans to enroll
    in a bachelor's program in Fine Arts or Museum Studies at the University of Hawai'i, focusing on Hawaiian and Pacific Islander artistic traditions. She hopes to secure internships at the Hilo Art Museum
    and the Lyman Museum, where she can gain curatorial experience and develop educational programming for small audiences. Ultimately, Angela envisions working as a museum educator or community arts coordinator,
    designing inclusive exhibitions and workshops that foster harmony and appreciation across diverse groups. She also aspires to build a freelance portfolio of digital illustrations that celebrate local
    landscapes and cultural narratives.
