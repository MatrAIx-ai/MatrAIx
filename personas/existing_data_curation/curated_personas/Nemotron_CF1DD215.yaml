personas:
  professional: Angela Smith, an aspiring museum educator and freelance digital illustrator, blends her savvy with Photoshop and Illustrator, methodical project planning, and a quiet curiosity about cultural
    narratives to design inclusive exhibitions and community workshops.
  sports: Angela Smith enjoys hiking the rainforests around Mauna Loa with a local trail group, follows the University of Hawaii Rainbow Warriors basketball team, and participates in a community running
    club that meets every Saturday for a 5‑kilometer trail run.
  arts: Angela Smith spends evenings painting mixed‑media pieces inspired by Ansel Adams’s black‑and‑white landscapes, Georgia O’Keeffe’s floral studies, and contemporary Hawaiian artist Kay Mewburn, while
    attending poetry readings featuring spoken‑word artists like Akala and listening to ukulele sessions by Jake Shimabukuro for creative fuel.
  travel: Angela Smith prefers thoughtfully planned trips that blend artistic inspiration with outdoor adventure, having already explored the volcanic craters of the Big Island, taken a budget backpacking
    tour of Kauai’s Na Pali Coast, and dreams of a future solo photography expedition to Iceland’s lava fields, all while balancing a part‑time job and tuition costs.
  culinary: Angela Smith favors fresh poke bowls with ahi tuna, mango, and sesame seeds, enjoys cooking taro poi and laulau on weekends, and regularly experiments with tropical fruit smoothies featuring
    pineapple, passionfruit, and a splash of coconut milk, though they admit to over‑indulging in sugary cafe pastries during late‑night editing sessions.
  core: Angela Smith is a quiet, organized 19‑year‑old who captures volcano vistas with a camera, sketches in spare moments, and occasionally procrastinates on coursework while hoarding a growing collection
    of volcanic rock samples for future art projects.
background:
  cultural: Angela is a white American whose family originally settled in the continental United States before moving to Hilo when she was a child. Growing up on the Big Island, she was raised with mainstream
    American values but has been deeply influenced by the island's multicultural environment. She regularly partakes in local celebrations such as Lei Day and the Merrie Monarch Festival, and she has taken
    community courses that teach basic Hawaiian language (ʻŌlelo Hawai‘i) and cultural etiquette. While she identifies ethnically as white, Angela's personal narrative reflects a hybrid cultural identity
    that blends her family's Midwestern heritage with the Hawaiian emphasis on respect for nature, communal harmony, and the preservation of indigenous arts. This mixed backdrop informs her appreciation
    for both Western art history and Pacific Islander creative expressions.
attributes:
  skills: '[''Digital illustration'', ''Photography'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Research and academic writing'', ''Project planning'', ''Volunteer coordination'', ''Basic Hawaiian language'',
