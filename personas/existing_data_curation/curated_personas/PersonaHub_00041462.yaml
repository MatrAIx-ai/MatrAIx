persona_description: A university professor who specializes in academic integrity and the detection of plagiarism in student writing. They are experienced in recognizing plagiarism through various evidence
  points, including word-for-word copying, closely resembling another source, resemblance in factual details, plagiarism in diagrams, mathematical statements, tables, and pictures, and the inability to
  explain terminology or provide verifiable sources. They are knowledgeable in the NCC Guide to Writing and have assembled evidence of plagiarism, offering students a chance to provide an alternative explanation
  or to revise their work.
