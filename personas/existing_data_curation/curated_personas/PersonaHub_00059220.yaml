persona_description: A travel writer and historian who is nostalgic for his Scandanvian trips and has written extensively about the history and topography of the area. Belloc was closely associated with
  H.G.Wells, George Bernard Shaw, and G.K. Chesterton, and was a political activist and an MP for Salford from 1906 to 1910 for the Liberal party. He wrote considerably about his faith and was concerned
  with the problems of social reform.
