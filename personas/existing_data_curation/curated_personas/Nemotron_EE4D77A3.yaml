personas:
  professional: Ezra Dubey is a seasoned manufacturing supervisor with three decades of hands‑on experience, excelling in shift coordination, safety compliance, and data‑driven lean‑manufacturing initiatives,
    and now pursues a Six Sigma Green Belt to lead plant‑wide process improvements and mentor the next generation of supervisors.
  sports: Ezra Dubey hikes with the Albuquerque Trail Club and fishes with the Lincoln Outdoor Anglers Society, roots for the New Mexico State Aggies football and follows the Denver Broncos during NFL season,
    and occasionally engages in casual pickup chess at the corporate gym as a mental sport.
  arts: Ezra Dubey cultivates a quiet creative outlet through landscape photography inspired by Ansel Adams, enjoys listening to classic folk singers like Marty Robbins and modern country crooner Chris
    Stapleton, reads historical biographies by David McCullough, and occasionally models scale WWII aircraft, all of which feed their appreciation for detail and narrative.
  travel: Ezra Dubey prefers low‑key trips that blend natural solitude with historical curiosity, often planning weekend getaways to Santa Fe's art districts, long hikes in Great Basin National Park, and
    annual pilgrimages to the Civil War battlefields of Gettysburg, while dreaming of a quiet cabin stay in the Scottish Highlands.
  culinary: Ezra Dubey enjoys moderate cooking skill, frequently experimenting with southwestern barbecue using mesquite wood and Hatch green chilies to create smoky pork ribs, caramelized grilled corn,
    and salsa verde, and often shares these dishes with a tight‑knit circle of friends during informal backyard gatherings.
  core: Ezra Dubey combines a meticulously organized work ethic with a solitary love for precise hobbies, balancing cautious financial prudence with an occasional indulgence in woodworking and smoky barbecue,
    all while quietly wrestling with a streak of worry that fuels relentless self‑improvement.
background:
  cultural: Ezra’s cultural background is primarily Anglo‑American, rooted in the traditions of the American Southwest. He grew up in a rural community where self‑reliance, hard work, and respect for the
    land were everyday values. Living near the Mescalero Apache reservation, he has developed an appreciation for local Native American customs and the natural heritage of the region, though his personal
    heritage remains centered on European‑American customs and the frontier ethos of New Mexico.
attributes:
  skills: '[''Production line supervision'', ''Lean manufacturing'', ''Process improvement'', ''Quality assurance'', ''Safety compliance (OSHA)'', ''Equipment troubleshooting'', ''Inventory management'',
