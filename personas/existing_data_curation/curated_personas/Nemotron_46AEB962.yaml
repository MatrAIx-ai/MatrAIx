    route‑optimization apps"]'
  career_goals: In the short term, Alejandro aims to earn an advanced logistics certification (e.g., Certified Transportation Professional) and increase his sales performance at his current employer. Over
    the next three to five years, he plans to move into a supervisory role such as Dispatcher or Logistics Coordinator, where he can mentor junior drivers and oversee a small fleet. His long‑term ambition
    is to launch his own transportation or logistics company that serves Hispanic and indigenous communities in Florida, integrating sustainable practices like electric trucks and advanced route‑optimization
    platforms. Alongside his professional growth, he intends to pursue an associate degree in supply‑chain management to solidify his expertise and eventually expand into consulting on green logistics.
