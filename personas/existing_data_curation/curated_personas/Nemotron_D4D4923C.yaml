personas:
  professional: A budding community development strategist, Johnnie Vige blends financial analysis, market research, and project management with a compassionate, methodical approach, and they turn group‑oriented
    volunteer experiences into data‑driven plans for a future coworking hub in central Iowa.
  sports: A dedicated amateur athlete, Johnnie Vige competes in intramural basketball, tackles prairie hikes and long‑distance rides with the Grimes Cycling Club, cheers on the Iowa Hawkeyes football team
    and Iowa State Cyclones basketball, and they maintain a disciplined weekly routine that blends cardio, strength training, and mindful recovery.
  arts: A musically inclined creator, Johnnie Vige strums acoustic renditions of John Mayer and Ed Sheeran, frequents live shows at the Des Moines' Blue Note featuring the regional folk duo The Prairie
    Sons, and they channel their graphic‑design experiments through the vibrant aesthetic of David Carson and the digital surrealism of Beeple.
  travel: An adventurous yet budget‑conscious traveler, Johnnie Vige spends weekends exploring the Loess Hills and the vibrant streets of Chicago, plans meticulous day‑trips with hiking and biking routes
    using a spreadsheet, and they dream of backpacking through New Zealand’s South Island and the Scottish Highlands once financial stability from their future coworking venture allows.
  culinary: A hearty home‑cook, Johnnie Vige relishes farm‑fresh dishes like grilled corn on the cob with rosemary butter, pork tenderloin with apple‑cider glaze, and experiments with homemade pesto using
    basil and pine nuts, yet they often skip balanced meals when juggling volunteer projects and basketball practice.
  core: Johnnie Vige is a curiosity‑driven, methodical optimist who balances a relentless drive to uplift their community with a guilty habit of over‑booking their calendar, and they often unwind with late‑night
    acoustic jam sessions.
background:
  cultural: Johnnie grew up in Grimes, Iowa, a small Midwestern town where community ties and modesty are deeply valued. His family’s ancestry includes German and Irish immigrants who settled the region
    in the early 20th century, imparting a heritage of hard work, self‑reliance, and civic responsibility. The local "Iowa nice" ethos—characterized by politeness, cooperation, and a strong sense of public
    service—shapes his compassionate and cooperative outlook. He has been active in his church’s youth group and local high school events, experiences that reinforced a blend of traditional Midwestern values
    with an openness to innovative ideas.
