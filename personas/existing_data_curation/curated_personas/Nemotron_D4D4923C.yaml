  hobbies: '[''Intramural Basketball'', ''Volunteer Projects'', ''Food‑Bank Drives'', ''Youth Mentorship'', ''Hiking'', ''Biking'', ''Acoustic Guitar'', ''Live Music Events'', ''Tech Trend Exploration'',
    ''Graphic Design'']'
  career_goals: Johnnie aims to launch a socially responsible small business that connects local entrepreneurs with mentorship and shared resources, such as a community coworking hub in central Iowa. In
    the near term, he seeks internships in nonprofit management or community development agencies to gain hands‑on experience, applying his business knowledge to create sustainable programs. Long‑term,
    he aspires to become a community development director, using his organized, reliable approach and compassionate drive to foster economic growth and social cohesion in the Midwest.
