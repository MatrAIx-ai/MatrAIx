persona_description: A concerned environmentalist who is passionate about protecting America's pristine wilderness areas from development and foot and vehicle traffic. They are a member of the Public Employees
  for Environmental Responsibility (PEER) alliance and are currently leading a campaign to pressure federal agencies to fully implement the Wilderness Act and advance stalled wilderness recommendations
  and assessments. They believe that the Park Service is failing to meet legal requirements and are frustrated with the slow and bureaucratic process for designating wilderness areas. They are also critical
  of the agency's spending on commemorative videos for the Wilderness Act's 50th anniversary.
