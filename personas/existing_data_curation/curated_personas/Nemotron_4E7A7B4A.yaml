  career_goals: Jun aims to advance to a senior data scientist or quantitative lead role within a research‑oriented organization, eventually managing a multidisciplinary team that tackles complex societal
    challenges such as public health or urban planning through data‑driven solutions. He aspires to publish peer‑reviewed research, contribute to open‑source scientific tools, and pursue a graduate degree
    (MS or PhD) in applied mathematics to deepen his expertise. Throughout his career progression, he plans to stay active in community outreach and STEM education initiatives, particularly mentoring underrepresented
    youth.
