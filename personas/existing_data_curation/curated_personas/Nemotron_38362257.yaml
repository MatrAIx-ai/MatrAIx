personas:
  professional: A retired English teacher turned community storyteller, Gena Jordan leverages decades of literary analysis, curriculum design, and public speaking to lead a town‑wide oral‑history initiative,
    where their sociable, talkative nature and relaxed planning style make them the engaging catalyst for volunteer mentors and senior participants alike.
  sports: A dedicated walker and occasional senior yoga participant, Gena Jordan frequents the Saranac Lakeside Walking Club while cheering on the Buffalo Bills and the New York Knicks, and they often turn
    a simple exercise routine into a lively social gathering with fellow seniors.
  arts: Gena Jordan embodies a lifelong love of literature and stage, regularly performing with the Saranac Community Theatre, discussing the works of Shakespeare, Toni Morrison, and contemporary playwright
    Sarah Ruhl, while they listen to Bob Dylan and attend local folk concerts featuring Kate Jacobs, which together shape her identity as both a performer and a scholar.
  travel: Gena Jordan approaches travel with flexible, curiosity‑driven itineraries, having explored literary pilgrimages such as the Mark Twain House in Hartford, Ernest Hemingway’s Key West home, and
    the historic poetry corners of Chicago while planning a future road trip to the Beat Generation sites of San Francisco, and they balance a modest travel budget with senior‑center travel group discounts.
  culinary: Gena Jordan’s culinary palate gravitates toward hearty Midwestern fare, skillfully preparing herb‑infused roasted chicken with garden rosemary, slow‑cooked beef stew spiced with thyme and carrots,
    and sourdough bread dotted with wild lavender, while they delight in sharing homemade strawberry jam and pickled beets at community potlucks.
  core: Gena Jordan, a chatty 67‑year‑old retired teacher, turns every garden, book club, and senior‑center gathering into a storytelling arena, occasionally misplacing knitting needles but always remembering
    the names of their neighbors and weaving those memories into community narratives.
background:
  cultural: Gena grew up in a mid‑western, white, working‑class family in Michigan during the post‑war era, with German and Irish ancestry. Raised in a Protestant (Methodist) community, she internalized
    values of hard work, neighborly support, modesty, and hospitality. The rhythms of small‑town life—seasonal farming, community festivals, and close‑knit church activities—have shaped her love for storytelling,
    communal gatherings, and respect for tradition, while her liberal‑arts education nurtured an openness to new ideas and a lifelong curiosity about the broader world.
