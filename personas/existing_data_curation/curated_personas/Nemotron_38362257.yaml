  hobbies: '[''Reading'', ''Book club'', ''Gardening'', ''Cooking'', ''Knitting'', ''Community theater'', ''Storytelling'', ''Lake walking'', ''Genealogy research'', ''Volunteering'', ''Online learning'']'
  career_goals: Although formally retired, Gena aims to launch a town‑wide oral‑history project that records the memories of Saranac’s elder residents and creates a publicly accessible digital archive.
    She hopes to compile these narratives into a community memoir and possibly publish a collection of essays reflecting Midwestern life. Gena also plans to deepen her digital literacy by learning podcast
    production and graphic design, mentor youth through the local library’s reading program, and travel to historic literary sites across the United States to satisfy her curiosity while maintaining strong
    ties to her hometown.
