personas:
  professional: Marvin Coggins is a retired senior systems engineer who now channels decades of process‑optimization expertise into mentoring budding engineers, volunteering with a local robotics club,
    and penning practical engineering columns, all while applying their meticulous, structured approach and competitive edge to community projects.
  sports: Marvin Coggins is a lifelong Purdue Boilermakers football fan who never misses a home game, follows the Indianapolis Indians baseball team during the summer, participates in a senior walking club
    that meets at the local park, and maintains a daily garden‑stretch routine to stay limber, though they sometimes skip the stretching when a bridge tournament runs late.
  arts: Marvin Coggins is an avid admirer of classic folk music, regularly listening to Johnny Cash and the Carter Family, enjoys attending the local community theater’s productions of classic American
    plays, collects vintage Midwestern landscape paintings, and spends quiet afternoons reading poetry by Robert Frost, even though they occasionally argue with bridge opponents about the proper etiquette
    of applause.
  travel: Marvin Coggins is a seasoned road‑traveler who favors well‑planned trips to nearby state fairs, takes an annual pilgrimage to Purdue’s homecoming in West Lafayette, dreams of a leisurely river
    cruise through the Mississippi Delta, and prefers staying in modest B&Bs rather than hotels, though they sometimes postpone travel plans due to lingering knee pain.
  culinary: Marvin Coggins is a proficient home cook who delights in preparing garden‑fresh tomato basil soup, corn casserole, and a signature chicken pot pie using locally sourced pork, relishes occasional
    trips to the county fair for fried dough, but tends to over‑salt dishes out of habit, and they keep a well‑worn handwritten recipe notebook.
  core: Marvin Coggins is a methodical yet sociable octogenarian who blends engineering precision with a competitive spirit in bridge, a love of gardening, and a steadfast dedication to mentoring the next
    generation, and they approach each new challenge with a blend of curiosity and cautious optimism.
background:
  cultural: Marvin is a white Midwestern American raised in Indiana, deeply influenced by the region’s practical, community‑oriented values and the academic atmosphere of Purdue University. His upbringing
    emphasized self‑reliance, hard work, and civic responsibility, which he carries into his volunteer work and family life. While respectful of traditional Midwest customs such as county fairs and local
    volunteerism, he also embraces the university’s culture of innovation and collaborative learning.
