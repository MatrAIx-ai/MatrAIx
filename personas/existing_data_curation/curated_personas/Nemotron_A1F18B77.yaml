  career_goals: Even in retirement, Marvin aims to leave a lasting impact by mentoring undergraduate and high‑school students in engineering, volunteering with the local robotics club, and contributing
    articles to industry newsletters. He also plans to establish a modest scholarship fund for STEM students at Purdue University and to document his professional journey in a memoir that highlights practical
    problem‑solving and ethical engineering practices.
