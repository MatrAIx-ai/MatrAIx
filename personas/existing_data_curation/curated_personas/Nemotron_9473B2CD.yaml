  career_goals: Although officially retired from active duty, Marlena aims to stay engaged with law-enforcement and her community. She hopes to serve as a part-time consultant for the Chester County police
    department, focusing on improving community-relations programs and integrating restorative-justice approaches. Marlena also plans to mentor new recruits through the local police academy's volunteer
    instructor program and to author a guide on practical policing for senior officers. Additionally, she aspires to lead a neighborhood safety initiative that partners with schools and senior centers to
    provide education on personal safety, mental-health awareness, and emergency preparedness.
