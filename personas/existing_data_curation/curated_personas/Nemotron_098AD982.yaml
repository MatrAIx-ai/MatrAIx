personas:
  professional: Charles Huddleston, a 31‑year‑old installation and maintenance specialist in central Wisconsin, blends razor‑sharp blueprint reading and circuit‑theory expertise with a curiosity for smart‑home
    tech, delivering efficient HVAC, electrical, and plumbing solutions while they meticulously document work orders and mentor junior crew members toward Journeyman certification.
  sports: Charles Huddleston, a devoted member of a community softball league, spends winters snowmobiling the Northwoods, summers fishing the Wisconsin River, and cheering for the Milwaukee Brewers and
    Green Bay Packers, while they regularly attend a local gym for functional‑training sessions and follow the Wisconsin Timber Rattlers for minor‑league baseball excitement.
  arts: Charles Huddleston, a classic‑rock enthusiast who never misses a Led Zeppelin tribute night and loves board‑game marathons, they also attend community theater productions and collect vintage Gibson
    guitars for occasional jam sessions, letting music and game nights blend into their social calendar.
  travel: Charles Huddleston, an energetic planner who maps out weekend road trips across the Upper Midwest with detailed spreadsheets, they relish getaways to Door County’s lakeside cabins and dream of
    trekking the Canadian Rockies, balancing adventure with budget‑friendly camping while occasionally splurging on a concert weekend in Chicago.
  culinary: Charles Huddleston, a capable home‑cook who masters backyard barbeques featuring smoked brisket and cedar‑plank trout, they relish the tang of homemade coleslaw, the smokiness of hickory chips,
    and often experiment with craft beers to create perfect pairings for their meals.
  core: Charles Huddleston, a pragmatic tinkerer who blends disciplined project management with spontaneous backyard gatherings, they juggle a love for smart‑home gadgets and a habit of over‑organizing
    the tool shed, all while staying socially connected through sports and music.
background:
  cultural: Charles grew up in a midsize Midwestern town, shaped by the values of Wisconsin's German‑Scandinavian heritage. His family celebrates traditions such as Oktoberfest gatherings, cheese curd festivals,
    and seasonal community fairs. The emphasis on hard work, reliability, and neighborly cooperation is a cornerstone of his upbringing. He was raised within a close‑knit Lutheran community that prioritizes
    service, modesty, and stewardship of the natural environment. These cultural influences fostered his practical mindset, love for outdoor recreation, and strong sense of collective responsibility, which
    he blends with his personal drive for achievement and personal growth.
attributes:
  skills: '[''Electrical wiring and troubleshooting'', ''HVAC system installation and maintenance'', ''Plumbing repairs and pipe fitting'', ''Blueprint and schematic interpretation'', ''Preventive maintenance
    planning'', ''Safety compliance (OSHA, NEC)'', ''Smart‑home device integration'', ''Inventory management and ordering'', ''Team coordination and on‑site supervision'', ''Technical documentation and
    reporting'']'
  hobbies: '[''Softball league participation'', ''Fishing on local lakes and rivers'', ''Hiking and nature walks'', ''Snowmobiling'', ''DIY electronics and smart‑home projects'', ''Community volunteer mentoring'',
    ''Board‑game evenings with friends'', ''Attending classic rock concerts'']'
  career_goals: Charles aims to become a certified Journeyman Electrician within the next year and eventually attain Master Electrician status, adding a specialized HVAC certification along the way. He
    envisions moving into a lead‑technician or foreman role, where he can mentor junior staff and oversee larger commercial projects. In the longer term, Charles hopes to launch his own service company
    that offers integrated, energy‑efficient solutions for residential and small‑business clients across central Wisconsin. He is also interested in contributing to community development projects, such
    as retrofitting local schools with modern electrical and climate‑control systems, to combine his technical expertise with his commitment to community harmony.
