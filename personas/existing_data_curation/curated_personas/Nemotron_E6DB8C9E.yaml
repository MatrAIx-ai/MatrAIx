personas:
  professional: Qiu Her, a two‑year‑old budding block architect, channels their curiosity and critical eye into meticulously arranging LEGO towers, insisting on perfect alignment before moving to the next
    construction, which reveals that they possess an early knack for organized yet creative problem‑solving.
  sports: Qiu Her, a two‑year‑old with boundless energy, prefers the soft clatter of the sandbox over crowded playgrounds, yet they enthusiastically join the Tiny Turtles toddler soccer club and mimic moves
    they see from the Seattle Seahawks on TV, illustrating a competitive spark even in early play.
  arts: Qiu Her, a two‑year‑old budding visual explorer, spends hours with a box of crayons drawing spirals while staring at the bold abstract prints of Wassily Kandinsky in picture books and humming the
    upbeat choruses of The Wiggles, showing that they blend curiosity with an early appreciation for both visual and musical art.
  travel: Qiu Her, a two‑year‑old with a penchant for novel sights, gets visibly excited when a family road‑trip includes a stop at the city zoo to watch the giraffes and later a short flight to the sun‑kissed
    shores of Maui, preferring structured itineraries with plenty of nap breaks to keep their curiosity satisfied.
  culinary: Qiu Her, a two‑year‑old with a selective palate, eagerly gnaws on creamy avocado toast and slurps chicken noodle soup, but rebels against broccoli florets, often dragging a tiny spoon to sneak
    the melted mozzarella from a pizza slice, showing a stubborn yet playful approach to dining.
  core: Qiu Her, a two‑year‑old curious explorer, blends a meticulous love for stacking blocks with a stubborn refusal to share snacks, revealing a uniquely analytical yet headstrong toddler temperament.
background:
  cultural: Qiu is raised in a bilingual East Asian household, where Mandarin is spoken alongside English, reflecting his family's Chinese heritage. Living in West Covina, a city with a vibrant Asian American
    community, he regularly participates in cultural celebrations such as Lunar New Year, where he helps with traditional customs like receiving red envelopes and enjoying dumplings. His family values education,
    storytelling, and respect for elders, often sharing classic folklore like the Monkey King and encouraging early artistic expression through calligraphy‑inspired brush strokes. The multicultural neighborhood
    exposes him to a mix of cuisines, festivals, and languages, fostering an open‑minded perspective while maintaining strong ties to his East Asian roots.
