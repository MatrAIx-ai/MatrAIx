personas:
  professional: Yu Kwak, an 11‑year‑old aspiring game designer, channels a love for platformers and strategic puzzles into creating simple level prototypes on a tablet, balancing a meticulous eye for detail
    with a relaxed, spontaneous workflow.
  sports: Yu Kwak practices taekwondo at a local youth studio, proudly wearing a white belt and competing in weekend tournaments, while cheering for the FC Seoul soccer team and following the Los Angeles
    Dodgers for baseball inspiration.
  arts: Yu Kwak fills sketchbooks with original comic strips inspired by the storytelling of Akira Toriyama and the vibrant aesthetics of BTS, devours graphic novels like "One Piece" and "My Hero Academia,"
    and experiments with digital illustration tools after school.
  travel: Yu Kwak dreams of exploring the bustling streets of Seoul during a cultural festival, the neon lights of Tokyo’s Akihabara, and the amusement wonders of Disneyland Paris, but currently favors
    weekend family road trips to nearby national parks where they can collect pinecones for art projects.
  culinary: Yu Kwak, a budding home‑chef, enjoys helping their family prepare celebratory dishes such as bibimbap with gochujang and kimchi pancakes, can confidently whisk an egg for a simple pancake, and
    often experiments with adding chocolate chips to traditional rice cakes for a sweet twist.
  core: Yu Kwak is a curious 11‑year‑old who balances a shy, structured mindset with bursts of creative chaos, channeling anxiety into art and gaming while occasionally forgetting to tidy their room.
background:
  cultural: Yu comes from a Korean immigrant family living in Fullerton, California. At home, Korean and English are spoken, and the family celebrates Korean holidays such as Seollal (Lunar New Year) and
    Chuseok with traditional foods like kimchi and tteokguk. His parents emphasize academic achievement, respect for elders, and humility, while also sharing Korean pop culture—K‑pop, dramas, and esports.
    Outside the home, Yu attends a diverse public elementary school, absorbing American customs and values. This blend of Korean heritage and Californian upbringing shapes his language use, food preferences,
    celebrations, and his balanced view of individualism and collectivism.
attributes:
  skills: '[''Scratch programming'', ''Python basics'', ''Digital illustration'', ''Puzzle solving'', ''Basic chess tactics'', ''Organizational skills'']'
  hobbies: '[''Playing video games (platformers, strategy)'', ''Digital and traditional drawing'', ''Reading graphic novels and manga'', ''Taekwondo'', ''Piano basics'', ''Journaling'', ''Mindfulness breathing
    exercises'']'
  career_goals: Yu dreams of becoming a video game developer or software engineer who designs immersive, interactive experiences. He wants to master programming languages and 3D modeling so he can create
    games that blend storytelling, art, and technology. He also hopes to design educational games that help children manage anxiety. In the near term, he aims to improve his coding skills, build a small
    portfolio of games, and possibly join a youth robotics club to deepen his technical expertise.
