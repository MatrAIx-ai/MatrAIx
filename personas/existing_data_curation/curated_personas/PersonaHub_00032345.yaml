persona_description: A researcher and environmentalist who is interested in the application of indigenous value systems in environmental decision making, particularly in the context of water security for
  two tribal nations. This person is knowledgeable in environmental health and has conducted research on the opportunities and challenges faced by these tribes when seeking to develop water quality standards
  under a federal framework. They have developed a means-ends network, objectives hierarchies, and subsequent performance measures to achieve water security, utilizing values expressed by the tribes to
  inform decision-making. Their research aims to inform environmental policies and aid the incorporation of indigenous value systems into environmental management for tribes.
