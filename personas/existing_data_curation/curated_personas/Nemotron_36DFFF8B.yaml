  career_goals: Approaching retirement, Trey aims to transition into a mentorship role, formally training new truck and tractor operators in safe practices and equipment care. He hopes to channel his curiosity
    into documenting the industrial heritage of Indiana County, perhaps curating a small exhibit at the local community center that showcases the evolution of mining machinery. Additionally, he envisions
    launching a modest side business offering equipment rentals and basic repairs, allowing him a flexible schedule that balances work, health, and family time. Maintaining his physical well‑being and staying
    active in his community are central to his long‑term ambitions.
