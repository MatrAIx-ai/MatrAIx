personas:
  professional: Su Ouyang is a veteran senior sales and service specialist with four decades of experience, adept at building enduring client relationships through empathetic listening, bilingual communication,
    and data‑driven upselling, now channeling curiosity and artistic insight into mentorship and culturally competent training for junior representatives.
  sports: Su Ouyang follows the Miami Heat and Tampa Bay Buccaneers avidly, joins sunrise beach walks, participates in senior swim sessions at the Delray Beach Community Center, and plays doubles tennis
    at the local club on weekends.
  arts: Su Ouyang spends weekends at the Delray Beach Art Walk, drawing inspiration from Monet’s coastal scenes and Georgia O’Keeffe’s floral boldness, practices Chinese calligraphy as meditation, and regularly
    attends performances by the Actors’ Playhouse featuring actors like Edward James Olmos and Alicia Witt.
  travel: Su Ouyang enjoys relaxed, culturally rich travel, preferring itineraries that blend art and wellness, such as annual trips to her family's hometown for spring festivals, leisurely explorations
    of St. Augustine’s historic district, and future plans to wander Florence’s museums and galleries.
  culinary: Su Ouyang is an intermediate home‑cook who blends fragrant ginger‑infused dumplings, Sichuan‑style mapo tofu, and fresh Florida stone‑crab claws marinated in citrus and cilantro, often garnishing
    dishes with home‑grown hibiscus petals and orchid‑derived herbs.
  core: Su Ouyang is a curious, art‑infused senior sales veteran who balances disciplined mentorship with whimsical disorganization, turning each sunrise walk into a canvas for creative reflection.
background:
  cultural: Su is the daughter of Chinese immigrants who settled in Florida in the 1970s. She grew up in a bilingual household where Mandarin was spoken alongside English, fostering a deep respect for both
    her ancestral traditions and her American surroundings. Her cultural upbringing emphasizes respect for elders, communal harmony, and an appreciation for artistic expression—values that continue to shape
    her interpersonal style and her love of art. While she fully participates in Floridian life, she remains active in the local Chinese community, attending Lunar New Year celebrations, joining a cultural
    association, and preserving family recipes handed down through generations.
