  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Chinese calligraphy'', ''Cooking Asian-inspired meals'', ''Beach walking'', ''Gardening'', ''Reading historical fiction'', ''Attending
    community theater'', ''Volunteering for senior art programs'']'
  career_goals: Looking ahead, Su aims to shift from pure front-line sales toward a mentorship role where she can share her decades of experience with younger representatives. She hopes to develop a short-term
    training workshop focused on cultural competence and personalized service for senior clients. Additionally, she dreams of curating a small community space that blends her love for art and service –
    perhaps a monthly “Art & Wellness” gathering that introduces local artists to senior residents. Financially, she seeks to secure a comfortable retirement fund while maintaining a flexible schedule that
    allows her to travel back to her family’s ancestral region for cultural festivals.
