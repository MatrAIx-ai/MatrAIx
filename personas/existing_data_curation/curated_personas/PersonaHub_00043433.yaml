persona_description: A scientist and agronomist who conducts field studies on the use of cover crops in maximizing nitrogen availability to corn. She is particularly interested in the effects of different
  cover crops on nitrogen levels in the soil and the overall nitrogen cycling in the system. Her studies have shown that the use of legume cover crops can minimize nitrogen loss from the soil, while underseeding
  crimson clover after winter wheat can increase nitrogen levels in the system. Her work has led to increased awareness and adoption of cover cropping practices among farmers.
