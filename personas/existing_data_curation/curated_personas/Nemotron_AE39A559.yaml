    ''Inventory and budgeting management'', ''Agricultural regulations compliance'', ''Team training and leadership'']'
  hobbies: '[''Home gardening (heirloom tomatoes, herbs)'', ''Birdwatching'', ''Landscape photography'', ''Hiking (Minnesota River bluffs)'', ''Volunteering at local 4-H club'', ''Quilting and knitting
    (farm-themed crafts)'', ''Participating in Redwood County Fair (produce competitions)'', ''Cooking farm-to-table meals'', ''Cycling on rural trails'', ''Reading agronomy and sustainability research'']'
  career_goals: Joanne is aiming to transition from a general agricultural worker to a farm manager position within the next three years, leveraging her associate’s degree and practical experience. She
    plans to pursue a bachelor’s degree in agribusiness or sustainable agriculture, either through online coursework or a nearby community college, to deepen her knowledge of market analysis and farm economics.
    Her long-term ambition is to launch her own diversified, organic farm that combines specialty vegetable production with a small‑scale livestock component, enabling her to sell directly to local restaurants
    and at the Redwood County farmers market. She wants to become a certified crop consultant, using her data‑driven approach to help neighboring farms improve yields while adopting environmentally friendly
    practices. Competitive instincts drive her to enter county fair categories for best produce and innovative farming techniques, seeking recognition that could open new business opportunities. At the
    same time, her practical curiosity keeps her focused on incremental, measurable improvements rather than risky, untested ventures.
