personas:
  professional: Joanne Dugas, a seasoned mixed‑crop and livestock specialist from Redwood County, blends meticulous record‑keeping, data‑driven decision‑making, and a healthy skepticism toward untested
    technology to drive sustainable productivity while mentoring crew members and preparing for a future farm‑manager role.
  sports: Joanne Dugas stays fit through weekly hikes along the Minnesota River bluffs, rides a mountain bike with the Redwood County Trail Riders club, follows the Minnesota Twins and Vikings on game days,
    and roots for the local women’s softball league during the summer.
  arts: Joanne Dugas weaves inspiration from folk singer Gillian Welch and the American regionalist paintings of Thomas Hart Benton into her farm‑themed quilts, while occasionally attending performances
    at the St. Cloud Playhouse featuring actors like Meryl Streep.
  travel: Joanne Dugas favors road‑trip adventures to nearby prairie destinations such as the Badlands of South Dakota and the Oregon Coast, while dreaming of a culinary tour through Tuscany’s vineyards
    when her farm schedule allows.
  culinary: Joanne Dugas combines her garden’s heirloom tomatoes, fresh basil, and rosemary into dishes like a sun‑kissed tomato‑basil bruschetta, herb‑infused roast chicken, and a vegetable ratatouille,
    showcasing an intermediate‑level cooking skill that balances rustic simplicity with occasional gourmet experimentation.
  core: Joanne Dugas balances a data‑driven, competitive farm mindset with a love for quiet garden moments, impulsive seed‑buying splurges, and a knack for turning prairie sunsets into quilts.
background:
  cultural: Joanne grew up in a multi‑generational farming family in Wabasso, a small town in Redwood County, Minnesota. Her ancestry is primarily German and Swedish, a heritage reflected in the region’s
    Lutheran church traditions, modest work ethic, and community gatherings such as county fairs and church potlucks. The Midwestern cultural emphasis on self‑reliance, practicality, and stewardship of
    the land shaped her upbringing, reinforcing a balance between independence and cooperation within tight‑knit rural networks. While she identifies with the broader white, rural Midwestern culture, she
    also values the region’s appreciation for nature, seasonal rhythms, and modest technological adoption. Her personal experiences, including a recent separation, have deepened her reliance on extended
    family and local support systems, which embody the community‑focused values typical of the area.
attributes:
