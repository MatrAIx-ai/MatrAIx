persona_description: A dedicated educator who is passionate about ensuring equitable access to quality education for all students, especially those who have faced challenges such as juvenile justice involvement.
  This persona is knowledgeable about the Every Student Succeeds Act and its implementation in Indiana, particularly in the areas of adult support, full opportunities in community, quality education in
  facilities, career pathways, and smooth transitions. This individual has experience working with foster care students and is aware of the policies and initiatives aimed at supporting these students. Additionally,
  this person is knowledgeable about the FosterEd initiative and its impact on students in foster care, as well as the Indiana Department of Correction's Division of Youth Services' policy of encouraging
  temporary leave and the Aftercare for Indiana through Mentoring (AIM) program. This persona is likely to be a member of a school board, education advocacy group, or a professional educator who is committed
  to improving educational outcomes for all students.
