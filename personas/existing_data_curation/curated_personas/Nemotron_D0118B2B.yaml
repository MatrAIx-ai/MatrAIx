  hobbies: '[''Bridge'', ''Walking club'', ''Gardening'', ''Woodworking'', ''Local history research'', ''Community theater'', ''Cooking'', ''Volunteer mentoring'']'
  career_goals: Although retired, Alex aims to stay actively engaged in his community. He plans to lead a senior‑volunteer mentorship program, continue his involvement with the Georgetown Historical Society,
    and complete a memoir that captures the town’s mid‑century history. He also hopes to take a few adult‑education classes in local history and woodworking, maintain his health through regular walking
    and fitness activities, and become a recognized local resource for intergenerational connections and community projects.
