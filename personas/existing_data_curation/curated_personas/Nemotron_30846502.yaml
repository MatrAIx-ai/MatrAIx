  career_goals: He aims to progress to a regional director role within the next five years, overseeing multiple locations and driving operational excellence through innovative, art‑inspired brand experiences.
    He plans to earn an executive MBA or a certification in Lean Six Sigma to deepen his analytical toolkit. Long‑term, Jose envisions launching a consultancy that helps businesses integrate cultural and
    artistic elements into their customer journeys, while also mentoring emerging Latino leaders in the industry.
