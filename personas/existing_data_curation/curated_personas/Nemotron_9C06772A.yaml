  career_goals: Miguel aims to become a senior educational technologist or director of learning solutions within a forward‑thinking ed‑tech company, where he can lead the creation of bilingual, culturally
    responsive digital learning platforms. He envisions spearheading initiatives that empower underserved immigrant communities in Queens by providing accessible, technology‑enhanced education. Over the
    next five years, he plans to deepen his expertise in data‑driven instructional design, obtain certifications in cloud‑based learning management systems, and launch a community outreach program that
    mentors youth in coding and digital literacy.
