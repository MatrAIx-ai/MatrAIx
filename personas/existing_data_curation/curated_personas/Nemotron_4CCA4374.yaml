personas:
  professional: Marina Wright, a three-year-old with a vivid imagination, already tinkers with building blocks as a fledgling architect, organizing their creations with meticulous care while daringly experimenting
    with unconventional structures, and they often proudly display the tallest tower on the play mat.
  sports: Marina Wright, a three-year-old, enjoys joining the Tiny Turtles Swim Club and the Little Lions Soccer Club, cheerfully watches the Los Angeles Dodgers on TV, and prefers solo play with a balance‑beam
    at preschool gymnastics, where they often time their jumps against an imaginary clock.
  arts: Marina Wright, a three-year-old, spends afternoons drawing whimsical creatures inspired by Dr. Seuss, dancing to Yo‑Yo Ma’s cello lullabies, and humming along to Sesame Street songs while admiring
    the bold colors of Henri Matisse’s paintings, often sighing with delight when they complete a new drawing.
  travel: Marina Wright, a three-year-old, delights in short car trips to the neighborhood aquarium and Grandma’s countryside farm, and dreams of a magical adventure at Disneyland in California, where they
    imagine meeting their favorite cartoon characters.
  culinary: Marina Wright, a three-year-old, loves creamy mac and cheese with extra cheddar, dips apple slices in peanut butter, and pretends to stir chocolate pudding with a plastic spatula, though the
    kitchen is often a battlefield for scattered crumbs that they try to sweep up with gusto.
  core: Marina Wright, a three-year-old, blends boundless imagination with surprising organization, prefers quiet solo play, shows a competitive streak in building block towers, and hoards glitter stickers
    like secret treasure, often giggling when they hide another sticker behind a book.
background:
  cultural: Marina was born and raised in White House, Tennessee, in a family that values Southern hospitality, close‑knit community ties, and frequent church gatherings. Her household celebrates typical
    regional traditions such as holiday cooking, outdoor family picnics, and storytelling sessions that include folk tales from the Appalachian area. These cultural experiences shape her love for nature,
    her appreciation for simple, wholesome meals, and her tendency to enjoy quiet moments with family. While her ethnicity is listed as white, her upbringing reflects a blend of rural Southern customs and
    contemporary family life.
