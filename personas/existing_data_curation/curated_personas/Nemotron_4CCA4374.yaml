  career_goals: Marina dreams of growing up to be someone who creates things that spark wonder—she often talks about becoming an artist who paints colorful worlds, an author of picture books, or an explorer
    who discovers new places. She also expresses a fascination with space and likes to imagine herself as an astronaut, so she occasionally says she wants to travel among the stars. While still very young,
    her ambition is to keep learning, making new drawings, and sharing her stories with adults who listen.
