personas:
  professional: Frederick Gentry, a full‑stack developer specialized in modern web technologies and creative coding, merges their love for visual art with rapid prototyping, delivering production‑grade
    code under tight hackathon deadlines while thriving in flexible, collaborative environments.
  sports: Frederick Gentry stays active by joining the Bay Trail Cyclists club for weekend rides, hiking with the Redwood Regional Park group in spring, and cheering on the San Francisco Giants and Golden
    State Warriors, though they often skip scheduled gym sessions in favor of spontaneous gaming marathons.
  arts: Frederick Gentry immerses themselves in contemporary art by frequenting the San Francisco Museum of Modern Art and the Berkeley Art Museum, sketching digital illustrations inspired by the works
    of Yayoi Kusama and James Turrell, while collecting vinyl records of indie artists like Mitski, Mac DeMarco, and St. Vincent.
  travel: Frederick Gentry prefers short, spontaneous getaways, often biking to Monterey’s coastal cliffs, taking weekend trips to Portland’s indie music scene, and dreaming of a creative residency in Lisbon’s
    street‑art districts, yet balances travel with limited savings and a freelance contract that demands remote availability.
  culinary: Frederick Gentry enjoys experimenting in the kitchen, mastering fusion dishes like kimchi‑topped avocado toast and matcha‑infused ramen, while their go‑to comfort food remains a perfectly seared
    ribeye with rosemary‑garlic butter, and they often host dinner parties featuring craft beer and artisanal cheese boards.
  core: Frederick Gentry blends a restless creative spark with a habit of sprint‑like work bursts, an anxiety‑driven tendency to over‑think decisions, and a penchant for impulsive vinyl and art splurges
    that keep both their mind and bank account perpetually in motion.
background:
  cultural: Frederick is a white American raised in a middle‑class suburban family in the Midwest before moving to California for college and his tech career. Living in Alameda, he is immersed in the Bay
    Area’s multicultural, progressive tech culture, which has broadened his perspective on art, social dynamics, and collaborative innovation. He values openness, self‑expression, and the blend of cultural
    influences found in the Pacific‑Northwest arts scene while maintaining an independent, skeptical mindset shaped by his upbringing.
