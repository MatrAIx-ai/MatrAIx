  career_goals: Frederick aims to transition from a contributor role to a technical leadership position where he can steer product vision at the intersection of software and art. He dreams of founding a
    startup that leverages AI‑generated visuals and immersive experiences for artists and creators, and he wants to be recognized as an authority in creative technology. In the near term, he seeks to become
    a lead engineer or engineering manager on a product team that values experimentation, cultural inclusivity, and rapid iteration. He also plans to mentor junior developers, especially those who feel
    out‑of‑place in the high‑pressure tech environment, and to develop personal resilience strategies to manage his intense emotional responses.
