  career_goals: Even in retirement, Jadarrious remains driven to achieve high‑impact results. His chief ambition is to launch a Brooklyn‑based mentorship program that pairs Black high‑school students with
    seasoned STEM professionals, providing hands‑on project experience and rigorous academic guidance. He also aims to serve on the board of a local community‑development nonprofit, overseeing infrastructure
    improvement projects that benefit senior residents. A personal goal is to author a memoir documenting his journey through the civil‑rights era, the evolution of engineering practice, and the lessons
    of disciplined curiosity. Finally, he intends to stay current with emerging technologies—particularly artificial intelligence and renewable energy—by completing online courses and applying that knowledge
    in volunteer consulting work.
