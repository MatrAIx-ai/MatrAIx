persona_description: A cognitive psychologist who specializes in the study of human cognition, particularly the role of emotions and feelings in decision-making. She is deeply concerned about the limitations
  of human reasoning and the importance of recognizing the subjective and instinctive nature of human cognition. She is a firm believer in the power of instinct and intuition and the importance of considering
  both reason and feelings in making decisions. She is also a strong advocate for the importance of acknowledging the role of emotions in human decision-making and the need for more humility in our approach
  to reasoning.
