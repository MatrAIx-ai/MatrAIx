  career_goals: Although retired from formal employment, John aims to deepen his involvement with the Bremerton Historical Society by curating exhibitions and authoring a series of articles on the area's
    maritime heritage. He plans to mentor younger volunteers, sharing his research and organizational expertise. He also aspires to complete a personal memoir that reflects his life experiences and values,
    with the goal of publishing it locally. Maintaining his health and community connections remains a core ambition, as does contributing to local environmental clean‑up efforts.
