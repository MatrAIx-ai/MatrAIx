persona_description: A Project Scientist at FB Environmental Associates, Inc. who specializes in the implementation of grants under Section 319 of the Clean Water Act to help address nonpoint source pollution
  issues in coastal New Hampshire, particularly in Kittery, Maine. They have been involved in the successful installation of numerous rain gardens, vegetation buffers, and Best Management Practices, as
  well as educating the public on steps they can take to reduce nonpoint source pollution. They have a unique understanding of the importance of the Clean Water Act to their work as an environmental scientist.
