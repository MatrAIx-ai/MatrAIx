personas:
  professional: Gerry Calhoun, an aspiring robotics engineer and budding programmer, channels their methodical mindset and love for precise instructions into building and programming model kits and leading
    the school robotics team, where their organized, reliable nature ensures every project follows a detailed plan and their reserved demeanor keeps them focused on technical problem‑solving rather than
    the spotlight.
  sports: Gerry Calhoun, a member of the Granger Middle School soccer team in the spring and a volunteer ball boy for the Granger Youth Baseball Club in the summer, follows the Indianapolis Colts for football
    and the Indiana Pacers for basketball, prefers low‑key fitness like walking the family dog on nearby nature trails, and values routine and teamwork in their athletic pursuits.
  arts: Gerry Calhoun, who spends quiet evenings assembling model kits and visits the local community theater, finds inspiration in the sketches of Leonardo da Vinci, enjoys listening to Beethoven’s symphonies
    and the indie band The National, and watches classic Pixar animations, letting these artistic experiences shape their creative problem‑solving and provide a soothing counterbalance to their structured
    routines.
  travel: Gerry Calhoun, a cautious planner who loves family road trips, has explored the sand dunes of Indiana Dunes National Park, visited Chicago’s Museum of Science and Industry, and dreams of attending
    a summer program at the Kennedy Space Center, always mapping routes in advance and budgeting their allowance for each journey.
  culinary: Gerry Calhoun, who cooks at a beginner level alongside their mother, loves hearty Midwestern dishes like chicken fried steak, homemade apple pie, and pretzels, enjoys experimenting with a simple
    mac and cheese recipe that they top with a dash of smoked paprika, and treats dining out as a special occasion at their favorite local diner where the butter‑buried biscuit breakfast reigns supreme.
  core: Gerry Calhoun is a meticulous, introverted teen who balances a love of structured engineering projects with a quiet worry about the future, often over‑organizing their journal pages and forgetting
    to relax.
background:
  cultural: Gerry grew up in Granger, Indiana, a suburban community in the Midwest that values hard work, family ties, and community involvement. His family’s heritage is primarily of German and Irish descent,
    reflecting the broader demographic history of the region. The local culture emphasizes modesty, practicality, and a structured approach to daily life—a tone that aligns with Gerry’s own preference for
    order and predictability. He attends a public middle school where he participates in small‑group clubs such as the robotics team and the library volunteer program. Community events like county fairs,
    youth sports, and church gatherings shape his sense of belonging, and the Midwestern ethos of cooperation and reliability informs his desire to contribute positively to his surroundings.
attributes:
  skills: '["Organizational planning", "Time management", "Note‑taking", "Basic Python programming", "Mathematical problem solving", "Attention to detail", "Group coordination in small projects", "Digital
    literacy (Microsoft Office)", "Model kit assembly"]'
  hobbies: '["Model kit building (airplanes, cars)", "Playing chess", "Personal journaling", "Simple programming (Scratch/Python)", "Reading nonfiction (engineering, wildlife, astronomy)", "Volunteering
    at the local library (organizing books)", "Walking nature trails with family"]'
  career_goals: Gerry aims to pursue a career that combines his love for structure, precision, and helping his community. He plans to graduate high school with a focus on STEM subjects, especially math,
    physics, and computer science, and then attend a technical college or university to study civil or mechanical engineering. His long‑term ambition is to become a civil engineer working on public infrastructure
    projects—such as bridges or water systems—that improve safety and reliability in his hometown of Granger and the broader St. Joseph County area. He envisions a stable, well‑structured work environment
    where he can apply his methodical problem‑solving skills and contribute to projects that have tangible, lasting benefits.
