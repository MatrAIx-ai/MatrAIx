  hobbies: '[''Reading historical fiction'', ''Knitting'', ''Gardening'', ''Birdwatching'', ''Crossword puzzles'', ''Genealogy research'', ''Walking in nature'', ''Listening to classic country music'']'
  career_goals: As she approaches retirement age, Beth is focused on solidifying a legacy of safety and reliability at her plant. She hopes to step into a senior shift‑lead or safety‑trainer role where
    she can mentor younger workers, share her practical knowledge, and champion continuous‑improvement initiatives. Simultaneously, she is planning a gradual transition to part‑time work that allows her
    more time for personal pursuits while ensuring a stable income for her later years.
