  career_goals: Jeanine dreams of a future where she can combine her love for animals with her methodical approach to science, aiming to become a veterinarian. She also enjoys sharing knowledge and envisions
    herself as a teacher who creates structured, engaging lessons for younger students. In the short term, she is determined to excel in her school science fair, earn a spot in the robotics club, and continue
    developing her coding skills with Scratch.
