personas:
  professional: A budding junior technologist, Jeanine King channels her love for step‑by‑step LEGO building and detailed Scratch coding into early problem‑solving projects, demonstrating a methodical,
    structured approach that mirrors her reliable nature.
  sports: A dedicated midfielder for the Fayetteville Youth Soccer Club, Jeanine King thrives on the predictable practice schedule, and she proudly dons a jersey while cheering for Atlanta United and the
    Atlanta Braves during family game nights.
  arts: An avid illustrator and piano hobbyist, Jeanine King creates detailed fantasy sketches inspired by Studio Ghibli’s visual storytelling and practices piano pieces by Ludovico Einaudi, while also
    immersing herself in the "Magic Tree House" series and listening to pop artist Billie Eilish.
  travel: A nature‑enthusiast, Jeanine King plans weekend hikes using a checklist of trail markers and wildlife spotting goals, has explored Georgia’s Stone Mountain and the coastal charm of Tybee Island,
    and dreams of visiting Washington, D.C.’s Smithsonian museums next summer.
  culinary: A budding chef in the family kitchen, Jeanine King loves whipping up peanut butter and jelly sandwiches, perfecting bite‑size mac and cheese, and helping her mom bake peach cobbler during holiday
    gatherings, savoring the familiar Southern flavors with a sprinkle of cinnamon.
  core: Jeanine King is a ten‑year‑old multitasker who balances structured LEGO builds, piano practice, and soccer drills with a love for stickers and a habit of occasionally misplacing her homework, all
    while thriving on predictable routines and community support.
background:
  cultural: Jeanine comes from a white, middle‑class family in Fayetteville, a suburban community within Fulton County, Georgia. Her upbringing reflects many Southern cultural influences, such as an emphasis
    on community, family gatherings, and occasional participation in church and local festivals. The family values education and routine, often scheduling regular study times, weekend activities, and seasonal
    traditions like holiday meals featuring Southern cuisine. Growing up in the Atlanta metropolitan area, she is exposed to a diverse school environment and community programs that encourage both individual
    responsibility and collaborative involvement.
