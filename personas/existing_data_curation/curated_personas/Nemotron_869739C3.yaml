  career_goals: Motivated by measurable outcomes, Sarah aims to earn the Certified Medical Manager (CMM) credential and advance to a regional health services director role overseeing multiple clinics across
    the Rio Grande Valley. She plans to lead a cross‑facility initiative that reduces patient wait times by at least 20% through lean process redesign and to integrate telehealth solutions that expand access
    for underserved rural populations. Additionally, she is committed to mentoring emerging health administrators and fostering a culture of data‑driven decision‑making within her organization.
