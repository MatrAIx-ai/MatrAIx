personas:
  professional: Sarah Sartin, a veteran outpatient clinic manager with over 20 years of experience in rural New Mexico, leverages her exacting operational planning, rigorous budgeting, and HIPAA/OSHA compliance
    expertise to drive data‑driven quality improvement and vendor negotiations, all while cultivating a skeptical yet competitive eye that pushes teams to meet deadlines and achieve measurable reductions
    in patient wait times.
  sports: Sarah Sartin, an avid solo hiker of the Sandia Mountains, combines seasonal birdwatching at Bosque del Apache in winter with a disciplined running routine on spring trail loops, and roots for
    the New Mexico State Aggies football team and the Albuquerque Isotopes baseball club as her only regular spectator sports, preferring low‑impact outdoor activity over team sports.
  arts: Sarah Sartin, a quiet evening digital photographer, draws inspiration from Ansel Adams' tonal mastery and Georgia O'Keeffe's desert palettes while curating a personal collection of black‑and‑white
    prints of towering junipers, and unwinds by knitting intricate patterns to traditional folk melodies by Marty Robbins and local New Mexican guitarra players.
  travel: Sarah Sartin, a methodical solo traveler, plans each road trip with a spreadsheet itinerary that balances scenic drives through Carlsbad Caverns, sunrise photo sessions at Monument Valley, and
    culinary stops in Santa Fe's historic plaza, while dreaming of a future bird‑watching expedition to Patagonia to expand her species list.
  culinary: Sarah Sartin, a pragmatic home chef, favors New Mexican staples such as roasted green chile stew, piñón‑crusted chicken, and prickly pear salsa, often incorporating home‑grown succulents as
    garnish, and although she can expertly execute complex recipes, she occasionally forgets to set kitchen timers, resulting in a few charred edges.
  core: Sarah Sartin, a 46‑year‑old health‑services strategist, merges a structured, data‑driven professional ethos with solitary desert hobbies, thriving on quiet reflection, skeptical analysis, and a
    competitive edge that colors both work and personal life.
background:
  cultural: Sarah’s cultural background is rooted in a white, Anglo‑American heritage common to the American Southwest, with family origins in Midwestern farming communities that later settled in New Mexico.
    Growing up in the semi‑rural environment of Bosque Farms, she adopted values of self‑reliance, practicality, and community service, while also embracing regional traditions such as local fiestas, New
    Mexican cuisine, and a deep respect for the surrounding desert landscape.
