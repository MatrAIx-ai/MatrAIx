  hobbies: '[''Visiting art galleries'', ''Photography of urban architecture'', ''Attending live jazz and hip‑hop shows'', ''Community dance workshops'', ''Yoga and meditation'', ''Journaling'', ''Volunteer
    woodworking mentorship'', ''Cooking soul‑food dishes'', ''DIY home improvement projects'']'
  career_goals: Barbara aspires to earn a master carpenter certification and eventually launch her own boutique furniture studio that melds contemporary art with traditional woodworking. She aims to develop
    a community apprenticeship program in Detroit to mentor young adults interested in skilled trades. In the longer term, she seeks certification in green building practices and hopes to transition into
    a project management role overseeing larger residential and mixed‑use developments, using her craft to celebrate African‑American cultural motifs in interior spaces.
