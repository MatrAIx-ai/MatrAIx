personas:
  professional: Barbara Scott is a seasoned carpenter in Detroit who blends meticulous blueprint reading and sustainable wood sourcing with a flair for artistic design, leading small teams and apprentices
    while channeling their curiosity for contemporary art into every custom piece despite occasional emotional turbulence.
  sports: Barbara Scott stays active by attending Detroit Lions games in the fall, joining a co-ed recreational basketball league that plays at the Pistons' community court during the winter, and maintaining
    a disciplined yoga practice at a downtown studio to balance strength and flexibility.
  arts: Barbara Scott immerses themselves in Detroit's art scene, capturing street murals by local artists like Shepard Fairey through photography, dancing to jazz legends Miles Davis and hip-hop innovators
    Kendrick Lamar at community workshops, and drawing inspiration from exhibitions featuring photographer Vivian Maier and choreographer Martha Graham.
  travel: Barbara Scott prefers week-long road trips that blend meticulous itinerary planning with impromptu stops, having explored Asheville's maker spaces, Oaxaca's culinary markets, New Orleans' jazz
    heritage, and dreaming of a design-focused pilgrimage to Tokyo's minimalist furniture boutiques.
  culinary: Barbara Scott enjoys cooking soul-food staples like collard greens, fried chicken, and shrimp-and-grits while regularly experimenting with new flavors such as Jamaican jerk chicken rubs and
    Japanese miso ramen broth, showcasing a confident intermediate skill set and a love for smoked paprika, ginger, and fresh herbs.
  core: Barbara Scott fuses a carpenter's precision with an artist's imagination, yet often overbooks themselves and rides waves of intense anxiety, relying on yoga and journaling to stay grounded.
background:
  cultural: Barbara grew up in a close‑knit African‑American community in Detroit, shaped by the city’s rich musical legacy, industrial heritage, and a strong emphasis on resilience and mutual support.
    Her family values emphasized hard work, self‑reliance, and community responsibility, guiding her toward a skilled trade. She draws cultural inspiration from Motown, jazz, and the visual art of the Black
    Arts Movement, often incorporating symbolic motifs and color palettes reminiscent of African heritage into her custom pieces. Active involvement in local church events and neighborhood activism reinforces
    her identity as a proud Black woman dedicated to uplifting her community through her craft.
