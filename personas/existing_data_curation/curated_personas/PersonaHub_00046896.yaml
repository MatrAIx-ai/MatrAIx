persona_description: A sociologist or historian interested in the study of race relations and social stratification in the United States, particularly focusing on African Americans. They are likely to be
  interested in the history and sociology of the African American community, the development of the sociological model dividing African Americans into three classes, and the implications of this model for
  understanding the experiences of African Americans in the United States. They may also be interested in the impact of race on social mobility and the challenges faced by African Americans in achieving
  social and economic equality.
