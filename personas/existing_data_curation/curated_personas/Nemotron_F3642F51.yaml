personas:
  professional: An aspiring junior illustrator‑scientist, Debra Burke merges meticulous digital art with hands‑on experiments, channeling their disciplined, high‑standards mindset into school science projects
    and fantasy sketches that reflect both curiosity and a competitive drive, and they always aim to outdo the previous creation.
  sports: A competitive yet solitary athlete, Debra Burke plays on the Princeville Youth Soccer Club during the fall, practices daily jump rope routines for stamina, and cheers for the Chicago Cubs and
    Chicago Bulls on game nights, preferring structured practice over casual pick‑up play, and they relish the sense of order it brings.
  arts: A devoted creator, Debra Burke spends afternoons drawing intricate fantasy landscapes with colored pencils, explores digital illustration inspired by Studio Ghibli and the works of Alex Ross, practices
    piano pieces like Beethoven’s Moonlight Sonata, and occasionally organizes a tiny book club featuring the latest YA sci‑fi hits by Becky Chambers, while they often lose their favorite sketching pens
    under the couch.
  travel: An organized explorer, Debra Burke delights in meticulously planned family road trips to places like the Museum of Science and Industry in Chicago and historic Mackinac Island, while dreaming
    of a future summer camp adventure in the Badlands, balancing a love of structured itineraries with occasional spontaneous field trips to nearby cornfields for rock collecting, and they always keep a
    travel journal to note each find.
  culinary: A modest foodie, Debra Burke enjoys classic macaroni and cheese and apple pie after church bake‑sales, loves to help grandma whisk up chocolate chip cookies using vanilla extract and dark chocolate
    chips, occasionally experiments with making rock candy from sugar and a pinch of food coloring, though they often forget to clean the kitchen afterward, and they keep a secret stash of gummy bears for
    late‑night study sessions.
  core: Debra Burke is a curious, disciplined ten‑year‑old who blends solitary artistry with competitive LEGO building, balancing a skeptical edge that pushes them to master both sketchpad and science lab,
    while they occasionally hoard glitter stickers in a hidden drawer.
background:
  cultural: Debra grew up in Princeville, a small, close‑knit community in central Illinois. Her family roots are in the Midwestern, white, agrarian tradition, emphasizing self‑reliance, modesty, and community
    involvement. Local customs such as attending county fairs, church youth groups, and school events shape her sense of belonging. The rural landscape, with its open fields and seasonal cycles, inspires
    her artistic subjects and nurtures an appreciation for the natural environment. While her household celebrates mainstream American holidays, it also values education, volunteering, and the quiet, reflective
    moments that align with her reserved personality.
