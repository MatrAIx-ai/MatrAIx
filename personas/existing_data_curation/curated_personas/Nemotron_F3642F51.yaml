  career_goals: Debra dreams of a future where she can merge her love for art and structured thinking. She aspires to become an illustrator or concept artist for books and video games, envisioning a career
    that lets her create detailed visual worlds. She also contemplates studying architecture, attracted by the blend of design and precise planning. In the long term, she hopes to attend a specialized high
    school for the arts and eventually enroll in a university where she can develop a professional portfolio. Her competitive nature drives her to aim for recognition in youth art contests and science fairs.
