  hobbies: '[''Street Art Murals'', ''Auto Shows'', ''Custom Car Painting'', ''Photography'', ''Basketball'', ''Jazz and Hip Hop Music'', ''Sketching and Graphic Design'', ''Cooking Soul Food'', ''Mentoring
    Youth in Automotive Programs'']'
  career_goals: Justin aims to become a master auto body specialist and obtain ASE Master Technician status within the next five years. He plans to deepen his knowledge of advanced composite repairs and
    expand his artistic capabilities to offer high-end custom paint and graphics services. Ultimately, he envisions opening his own boutique collision and customization shop in Houston that blends technical
    excellence with artistic expression, while also serving as a mentor for local youth interested in automotive trades. He hopes to partner with community art collectives to showcase collaborative projects
    that celebrate Houston’s vibrant car culture and Black creative heritage.
