persona_description: A European politician who is involved in the negotiations and discussions regarding the European Union, particularly the signing of treaties and the integration of new member states
  into the Eurozone. They are knowledgeable about the three pillars structure of the European Union and the single European Union, and have a deep understanding of the role of government revenue collection
  and expenditure in fiscal policy. They are also familiar with the different options for fiscal policy, including neutral, expansionary, and contractionary, and have experience in implementing and evaluating
  these policies in the context of European Union legislation.
