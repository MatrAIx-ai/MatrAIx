personas:
  professional: Don Bryant, an aspiring junior game developer, channels their love for structure and competition into meticulously coded Scratch strategy games, while their laid‑back attitude toward schoolwork
    means they sometimes postpone assignments for another round of online play.
  sports: Don Bryant shoots hoops at the neighborhood park, roots for the Washington Wizards while dominating in NBA 2K, and competes on Saturdays with the Aylett Youth Basketball Association, where their
    competitive edge drives intense practice, though they sometimes skip warm‑ups to squeeze in extra game time.
  arts: Don Bryant curates personal playlists featuring Kendrick Lamar, SZA, and Kirk Franklin, immerses themselves in adventure novels like Rick Riordan’s Percy Jackson, and fills sketchbooks with caricatures
    of Finn and Jake from Adventure Time, weaving music and art into a lifeline that balances school stress.
  travel: Don Bryant dreams of hiking the misty trails of Shenandoah National Park, taking a family road trip to Washington D.C.’s museums, and eventually jetting to Tokyo’s Akihabara for the ultimate gaming
    pilgrimage, all while juggling a modest allowance and parental approval.
  culinary: Don Bryant favors classic kid staples like pepperoni pizza, chicken nuggets, and cheeseburger sliders, but proudly attempts homemade mac‑and‑cheese using sharp cheddar, milk, and a crunchy breadcrumb
    topping, often swapping snack ideas for cajun gumbo after fishing trips with dad.
  core: Don Bryant is a competitively spirited 12‑year‑old who balances strategic gaming, LEGO building, and playlist curating with occasional worry, impulsive spending, and minor health quirks, all while
    navigating the push‑pull of structure and flexibility.
background:
  cultural: Don is a Black youth growing up in Aylett, a small, historically agricultural community in King William County, Virginia. His family is part of a close‑knit African‑American community that places
    high value on church, family gatherings, and the oral transmission of local Black history. He often hears his grandparents recount stories of the Great Migration and the Civil Rights movement, which
    deepen his sense of heritage. Music and food play central roles in his cultural life; he enjoys listening to hip‑hop, R&B, and gospel music at home and church, and he helps his mother prepare soul‑food
    dishes such as collard greens and sweet potato pie during family occasions. Community events like church picnics, basketball tournaments, and local festivals reinforce a spirit of resilience, self‑reliance,
    and mutual support, shaping Don’s competitive drive and his desire to succeed while staying connected to his roots.
attributes:
