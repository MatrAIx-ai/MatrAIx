  hobbies: '["Video gaming (strategy & sports)", "Basketball", "LEGO building", "Fishing", "Exploring local woods", "Listening to hip‑hop, R&B, and gospel music", "Scratch programming", "Reading adventure
    novels", "Drawing cartoons"]'
  career_goals: Don dreams of turning his passion for competitive gaming into a career as a professional esports player and, eventually, a game‑designer who creates the kinds of strategic titles he enjoys.
    At the same time, he is drawn to the stability of skilled trades, hoping to become a carpenter or automotive technician after completing a technical college program. He sees himself earning certifications
    in computer science or engineering, which would let him combine his coding interests with hands‑on problem solving. Ultimately, Don wants to be recognized as a top performer in his chosen field, secure
    a well‑paid job that supports his family, and have the flexibility to pursue both creative projects and practical work.
