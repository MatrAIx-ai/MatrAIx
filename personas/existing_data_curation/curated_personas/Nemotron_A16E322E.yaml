  career_goals: Ren aspires to transition into a senior shift-supervisor role where she can oversee a small team of operators, implement safety and efficiency initiatives, and mentor younger workers. She
    plans to earn a recognized certification in industrial automation or packaging equipment maintenance to solidify her technical credibility. By consistently exceeding production quotas, she hopes to
    secure a higher pension contribution and ensure a comfortable retirement. Additionally, she wishes to contribute to her workplace’s continuous-improvement program by documenting best practices and leading
    small-scale projects that reduce downtime.
