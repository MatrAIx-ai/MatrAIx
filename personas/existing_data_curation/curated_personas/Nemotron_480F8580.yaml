  hobbies: '[''Hiking'', ''Rock Climbing'', ''Trail Running'', ''Acoustic Guitar'', ''Open‑mic Performances'', ''Contemporary Literature'', ''Creative Writing'', ''Board‑games'', ''Community Volunteering'',
    ''Food Pantry Support'', ''Festival Organization'']'
  career_goals: Philip aims to advance from his current managerial role to a senior operations director within the next five years, overseeing larger multi‑disciplinary teams in a socially‑responsible organization.
    He plans to pursue an MBA to sharpen his business acumen while leveraging his humanities perspective to drive innovative, people‑centric initiatives. Long‑term, he envisions launching his own community‑focused
    venture that blends arts programming with sustainable urban development in Boulder.
