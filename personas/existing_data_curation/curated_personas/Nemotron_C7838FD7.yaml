personas:
  professional: Dorothy Lavarnway, a veteran full‑stack software engineer with 25 years of experience in JavaScript, Python, and cloud platforms, leverages their methodical, structure‑loving mindset and
    outgoing, collaborative nature to spearhead agile cross‑functional projects, mentor junior developers, and champion inclusive workplace initiatives as they prepare for a future director or CTO role.
  sports: Dorothy Lavarnway stays active through weekly yoga at a downtown studio, seasonal hikes in the Appalachian foothills with the local Trailblazers Hiking Club, occasional games in a neighborhood
    softball league, and they fervently support Atlanta’s Falcons, Braves, and Hawks.
  arts: Dorothy Lavarnway nurtures their love of literature in a vibrant book club discussing Toni Morrison and James Baldwin, delights in live jazz performances by Wynton Marsalis at the Little Five Points
    venue, and regularly attends Fox Theatre productions starring Viola Davis, all of which inspire the thematic menus they craft for their dinner gatherings.
  travel: Dorothy Lavarnway favors carefully planned weekend trips with their spouse to cultural festivals in Savannah, New Orleans, and Asheville, while dreaming of immersive journeys to Kyoto’s cherry‑blossom
    season and Florence’s Renaissance architecture, and they balance a modest travel budget with a penchant for both structured itineraries and spontaneous culinary discoveries.
  culinary: Dorothy Lavarnway, an accomplished home chef, perfects Southern staples such as shrimp‑and‑grits with stone‑ground cornmeal, smoked brisket seasoned with hickory, and pecan pie crowned with
    caramelized nuts, often incorporating garden‑fresh okra, collard greens, and heirloom tomatoes into their dishes while hosting weekly dinner parties that celebrate farm‑to‑table storytelling.
  core: Dorothy Lavarnway blends disciplined engineering precision with a sociable, garden‑loving spirit, yet they have a habit of obsessively color‑coding their calendar and occasionally forgetting to
    water their tomatoes.
background:
  cultural: Dorothy grew up in a middle‑class white family in the suburban South, where values such as community, hospitality, and strong family ties were emphasized. Her upbringing in Georgia exposed her
    to Southern traditions, including a love for regional food, church involvement, and support for local arts. She maintains these cultural touchstones through regular participation in community events,
    support for local nonprofits, and a deep appreciation for the blend of modern progress and historic heritage that characterizes Atlanta. Her background informs her collaborative, considerate approach
    in both personal and professional settings.
