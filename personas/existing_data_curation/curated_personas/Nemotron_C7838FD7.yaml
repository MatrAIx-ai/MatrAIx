  career_goals: Dorothy aims to advance into senior leadership, such as Director of Engineering or Chief Technology Officer, within the next five years, leveraging her blend of technical depth and business
    insight to drive digital transformation initiatives. She plans to earn certifications in cloud architecture (AWS Certified Solutions Architect) and agile coaching, and to lead large‑scale, customer‑focused
    projects that improve operational efficiency. Additionally, she is passionate about fostering an inclusive workplace, mentoring the next generation of developers—especially women—and contributing to
    community tech education programs in Atlanta.
