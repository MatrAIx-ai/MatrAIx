  hobbies: '[''Book club'', ''Cooking (Southern cuisine)'', ''Hosting dinner gatherings'', ''Yoga'', ''Gardening'', ''Mentoring for Girls Who Code'', ''Tech meetups and hackathons'', ''Hiking in Appalachian
