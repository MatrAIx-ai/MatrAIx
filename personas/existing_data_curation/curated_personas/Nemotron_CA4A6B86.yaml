  career_goals: Domingo hopes to publish a debut novel that weaves his Honduran heritage with the unique cultural tapestry of Louisiana, showcasing stories of migration, identity, and community resilience.
    He aims to place short stories and poems in literary journals, build an online readership through serialized pieces, and eventually launch a small independent press that amplifies Latin American and
    Southern voices. Parallel to his personal writing ambitions, he wants to develop free writing workshops for local youth, using storytelling as a tool for empowerment and social cohesion, and to work
    as a freelance contributor for nonprofit organizations that focus on cultural preservation and social justice.
