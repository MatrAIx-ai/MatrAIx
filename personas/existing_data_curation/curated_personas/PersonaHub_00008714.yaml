persona_description: A scientist who specializes in the study of mosquito genetics, specifically focusing on the development and application of novel techniques for obtaining high-quality mitotic chromosome
  preparations from imaginal discs of mosquitoes. This scientist has experience with physical mapping, population cytogenetics, and chromosome taxonomy/systematics of mosquitoes and other insect groups.
  They are skilled in using FISH to detect numerical and structural alterations in all 24 human chromosomes simultaneously using a novel octoChrome FISH assay, which is a powerful adjunct to classic cytogenetics.
  Their research interests include immunology, genetics, molecular biology, and infectious disease.
