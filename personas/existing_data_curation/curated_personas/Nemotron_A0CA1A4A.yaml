  career_goals: Jessica aims to advance from a stocker/order filler to a supervisory role on the warehouse floor within the next three to five years. She plans to complete a Certified Logistics Associate
    program and obtain a Certified Supply Chain Professional credential. Her ambition includes leading a team, optimizing inventory flow, and establishing efficient SOPs that reduce errors. She also hopes
    to achieve a stable higher income to secure her financial future post-divorce, and eventually explore opening a small e-commerce fulfillment side business that leverages her logistics expertise.
