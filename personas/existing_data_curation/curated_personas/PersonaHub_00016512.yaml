persona_description: A public health official from the Centers for Disease Control (CDC) who has expertise in managing and responding to outbreaks of infectious diseases, particularly those involving the
  Zika virus. The individual is knowledgeable about the virus's transmission mechanisms, including sexual contact, and has experience dealing with the spread of the virus in the United States and other
  countries. They are also aware of the potential impact of the virus on pregnant women and their infants, and have expertise in preventing the spread of the virus through mosquito bites and avoiding exposure
  to Fluid from someone who has been exposed to Zika.
