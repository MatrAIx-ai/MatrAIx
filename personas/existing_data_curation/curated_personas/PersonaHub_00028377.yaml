persona_description: A scientist or entomologist interested in the biology and ecology of insects, particularly those that cause significant damage to crops like soybean. This person is knowledgeable about
  the life cycle and behavior of the lesser cornstalk borer (LCB), including its preference for hot, dry sandy soils, its attraction to smoke, and its ability to thrive in extreme conditions. This individual
  is also familiar with the diagnostic symptoms of LCB damage to soybean plants, such as wilting, dead or lodged plants, and the potential confusion with other pests like the three-cornered alfalfa hopper.
