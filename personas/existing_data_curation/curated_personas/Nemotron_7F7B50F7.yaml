  career_goals: Diego aims to advance to a senior partnership role within a leading accounting firm, where he can shape firm culture to prioritize teamwork, mental‑wellbeing, and client service excellence.
    He plans to mentor junior accountants, develop a workplace mental‑health support program, and eventually transition into a CFO position for a mid‑size company serving the Puerto Rican community in South
    Florida. Continuing his professional development, he seeks additional certifications such as CPA and CFE, while balancing his career ambitions with strategies to manage anxiety and maintain family harmony.
