personas:
  professional: Diego Riostorres, a 51‑year‑old accountant and auditor, leverages his methodical expertise in US GAAP, IFRS, SAP and Oracle to deliver precise financial reporting while using his talkative,
    engaging style to mentor junior staff, lead client meetings, and champion a culture of mental‑wellbeing as he eyes a senior partnership and future CFO role.
  sports: Diego Riostorres plays in a local community baseball league, enjoys weekend rounds at the Miami Beach Golf Club, follows the Miami Marlins and Inter Miami CF, and keeps fit with sunrise beach
    walks and occasional yoga sessions, combining competitive spirit with low‑impact activity.
  arts: Diego Riostorres immerses himself in salsa dancing nights and Latin music festivals, frequently capturing Miami’s pastel‑colored streets like Wynwood’s murals in his photography, drawing inspiration
    from artists such as Marc Anthony, Celia Cruz, and photographer Steve McCurry.
  travel: Diego Riostorres prefers short, well‑planned getaways that blend cultural immersion and relaxation, having explored the historic streets of Old San Juan, the beaches of the Bahamas, and planning
    a future trip to Spain’s Andalusian region to experience its music and cuisine, all while balancing family commitments.
  culinary: Diego Riostorres is an avid home chef, savoring the process of making mofongo with fried plantains, garlic, and chicharrón, and cooking arroz con gandules with sofrito and annatto, while also
    experimenting with fresh tropical fruits like mango and papaya in smoothies.
  core: Diego Riostorres blends a meticulous accountant’s discipline with a sociable, anxiety‑prone zest for salsa, photography, and community, constantly juggling professional ambition, family harmony,
    and a love for vibrant cultural rituals.
background:
  cultural: Diego is a first‑generation Puerto Rican American who grew up bilingual in Spanish and English. He maintains strong ties to his Caribbean roots through family traditions, celebrations of holidays
    like Nochebuena and San Juan Bautista, and active participation in Miami’s vibrant Puerto Rican community. His cultural identity influences his culinary preferences, love for salsa music and dance,
    and a deep sense of family responsibility. Living in Miami‑Dade County, he embraces the city’s multicultural atmosphere while preserving the values of hospitality, collective harmony, and respect for
    elders that are central to Puerto Rican culture.
