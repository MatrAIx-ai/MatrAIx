personas:
  professional: Johnson Burton, a veteran postal service clerk renowned for flawless mail sorting, precise data entry, and logistics coordination, channels their imaginative curiosity and balanced organization
    to mentor newcomers and champion user‑friendly digital tools, all while upholding courteous, reliable service.
  sports: Johnson Burton, a member of the Riverside Senior Walking Club, they enjoy daily morning walks through native plant gardens, follow the Chicago Cubs in baseball and the Green Bay Packers in football,
    and occasionally attend local high school basketball games to cheer on the community team.
  arts: Johnson Burton, an avid abstract watercolorist who draws inspiration from Georgia O'Keeffe’s bold palettes, they also recite William Carlos Williams at the book club, capture rural Midwestern sunsets
    as a hobbyist photographer, and act in community‑theater productions of classic plays, weaving these artistic pursuits into a vibrant personal identity.
  travel: Johnson Burton, who plans trips with a blend of careful itinerary and spontaneous detours, they enjoy leisurely drives to the historic Flint Hills, revisit Civil War battlefields at Gettysburg
    and Antietam, and dream of a guided Mississippi River cruise to explore the rich heritage of river towns.
  culinary: Johnson Burton, a modest home cook who excels at herb‑roasted chicken, creamy butternut squash soup, and homemade apple crisp, they love adding fresh basil and heirloom tomatoes to recipes,
    and treat themselves to a weekly brunch of smoked salmon bagels with capers at the neighborhood café.
  core: Johnson Burton blends meticulous organization honed from decades of postal work with a boundless imagination for art and storytelling, habitually juggling a notebook of poetry ideas while occasionally
    misplacing their glasses on the garden bench.
background:
  cultural: Johnson’s cultural identity is rooted in her African‑American heritage, with family ties tracing back to the Southern United States and the Great Migration that brought many Black families to
    the Midwest. Growing up in a small Nebraska town, she embraced the close‑knit, rural community values while preserving traditions such as gospel music, oral storytelling, and collective celebrations
    like Juneteenth and church gatherings. This bicultural experience informs her worldview, allowing her to act as a bridge between her community’s diverse histories and contemporary artistic expressions.
