    writing'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Southern cooking'', ''Volunteering at church youth group'', ''Book club leader'', ''Community theater stage management'', ''Yoga'', ''Reading historical fiction'',
    ''DIY home-improvement projects'', ''Traveling to historic sites'', ''Attending regional music festivals'']'
  career_goals: Monica aims to become a board-certified clinical psychologist within the next two years, expand her private practice to include a multidisciplinary mental-health clinic serving Meigs County
    and surrounding rural areas, develop a telehealth program to increase access for underserved populations, and lead research on the efficacy of community-based interventions for depression and anxiety
    in Appalachian settings. She also aspires to mentor graduate students, teach part-time at a regional university, and eventually hold a leadership role as director of mental-health services for the county.
    Her long-term ambition is to influence policy to improve mental-health resources in rural Tennessee.
