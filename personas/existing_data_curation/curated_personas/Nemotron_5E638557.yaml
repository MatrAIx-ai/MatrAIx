personas:
  professional: Madeline Newman is a detail‑oriented volunteer coordinator turned aspiring remote administrator, leveraging their Excel‑driven budgeting expertise, meticulous event planning for the Crystal
    Lake public library, and calm first‑aid‑trained demeanor to manage schedules and community projects with reliable precision, and they aim to channel these strengths into a flexible home‑based bakery
    or part‑time remote role.
  sports: Madeline Newman stays active by walking their dog along the Crystal Lake shoreline, hiking state parks like Starved Rock and Indiana Dunes, participating in the Crystal Lake Walking Club, and
    cheering for the Chicago Cubs while occasionally joining a neighborhood adult softball league.
  arts: Madeline Newman nurtures creative expression through knitting patterns inspired by Kaffe Fassett, photography sessions capturing sunrise over Lake Michigan with a Canon EOS 80D, and a love for Brené
    Brown’s personal‑development books and the soothing piano melodies of Norah Jones.
  travel: Madeline Newman enjoys meticulously planned day‑trips to local treasures such as Shawnee National Forest and Indiana Dunes, while dreaming of a weekend escape to Asheville’s Blue Ridge Mountains,
    using spreadsheets to balance budget, itinerary, and family commitments.
  culinary: Madeline Newman delights in crafting sourdough loaves, flaky cinnamon rolls, and seasonal apple‑peach preserves using garden‑fresh herbs like rosemary and thyme, with a kitchen skill level that
    spans confident baker to experimental pastry chef, and they never miss a chance to pair a hearty vegetable stew with locally sourced heirloom tomatoes.
  core: Madeline Newman blends meticulous organization with a love for homemade comforts, turning garden bounty into artisan breads while juggling community projects, budgeting spreadsheets, and the occasional
    habit of over‑scheduling themselves.
background:
  cultural: Madeline grew up in a white Midwestern family in Illinois, with German and Irish ancestry. Her upbringing emphasized community involvement, self‑reliance, and modest hospitality, values reinforced
    by regular participation in her local Lutheran church. The cultural rhythms of suburban life—county fairs, high school sports, and neighborhood potlucks—shaped her appreciation for stable, predictable
    social structures. She identifies with the broader Midwestern ethos of hard work, practicality, and a balanced blend of independence and community support.
attributes:
  skills: '["Household management", "Budgeting", "Event planning", "First aid", "Child care", "Microsoft Office", "Cooking and baking", "Gardening", "Volunteer coordination", "Time management"]'
  hobbies: '["Gardening", "Baking", "Preserving", "Book club", "Volunteer work at library", "Dog walking", "Knitting", "Hiking", "Photography"]'
  career_goals: Madeline aims to transition back into paid work on a flexible schedule that leverages her organizational strengths. She is exploring part‑time remote administrative roles or starting a small
    home‑based bakery that could serve her community. To broaden her qualifications, she plans to complete a GED program and obtain a certification in early childhood education or project‑management. Ultimately,
    she hopes to combine her love for community service with a sustainable income stream, allowing her to contribute financially while maintaining her family responsibilities.
