  career_goals: Robert aims to advance to a regional director role where he can oversee multiple construction sites across the Southeast, incorporating sustainable building practices and cutting‑edge digital
    tools. He plans to achieve LEED AP and PMP certifications within the next two years, and to lead a pilot program for modular construction in Raleigh. He also wants to mentor the next generation of managers,
    building a reputation as a top‑performing, profit‑driven leader. Long‑term, he envisions founding his own consulting firm that helps developers integrate cost‑effective green technologies while maintaining
    schedule certainty.
