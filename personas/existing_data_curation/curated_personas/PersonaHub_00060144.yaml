persona_description: A historian or researcher who specializes in the history and cultural practices of the Islamic world, particularly in the context of henna as a medium for body art and adornment. They
  have a deep understanding of early Islamic sources, including those related to the use of henna in the Arabian Peninsula and its association with joy and celebrations. They are familiar with the history
  and significance of henna in the Iberian Peninsula and North Africa, as well as the use of henna in Persia. They have a keen interest in the cultural aesthetics and practices of the SCA period and are
  interested in how henna was used in these contexts. They are also knowledgeable about the use of henna in other regions of the world, such as Europe, and how it was perceived and valued in these contexts.
