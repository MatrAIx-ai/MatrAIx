  hobbies: '[''Street photography'', ''Visiting art galleries'', ''Community basketball league'', ''Pickup basketball'', ''Live‑music concerts'', ''Learning vinyl‑wrap techniques'', ''Participating in mural
    projects'', ''Car shows and auto meetups'', ''Exploring Long Island trails'', ''Karaoke with friends'']'
  career_goals: Mark aims to advance from a frontline cleaner to a supervisory role within the next two to three years, overseeing a team of detailers and coordinating workflow at a busy rental‑car location.
    He plans to obtain a professional certification in auto detailing and eventually launch his own mobile detailing business that emphasizes artistic customizations, such as vinyl wraps and interior design
    enhancements. By leveraging his curiosity for art and new ideas, he hopes to differentiate his service with creative visuals, attract boutique clientele, and become a recognized leader in eco‑friendly
    vehicle care on Long Island.
