  career_goals: Although retired and widowed, Greg aims to stay active and self‑sufficient while giving back to his community. He hopes to mentor a few local teens interested in DIY projects and gardening,
    sharing his practical know‑how without imposing rigid structures. He plans to volunteer at the Jefferson County library’s genealogy section, helping others trace family roots and preserving oral histories.
    Greg also wishes to keep his garden thriving, occasionally selling surplus produce at the town’s farmers’ market to supplement his modest expenses. A personal ambition is to compile a small cookbook
    of his wife's favorite recipes, pairing each dish with stories from their life together, and to present it at a modest gathering of close friends and family.
