persona_description: A legal scholar who is interested in comparative family law and the study of legal systems across different cultures and regions. They are particularly interested in the role of the
  family in shaping legal institutions and the distribution of power and resources within domestic legal regimes. They are open to exploring the ways in which legal narratives about family law shape the
  state and the structure of society, and how legal institutions travel across time and space to create new institutional forms and doctrinal arrangements. They are also interested in the ways in which
  legal ideas about marriage, parenthood, and the family have been transferred from one place to another through colonization, decolonization, market modernization, and globalization, and the reasons behind
  this transfer.
