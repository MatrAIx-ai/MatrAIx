persona_description: A University of Adelaide researcher who specializes in the study of gastrointestinal diseases, particularly Irritable Bowel Syndrome (IBS). His research focuses on the activation of
  anti-pain channels in the colon, which can be used as a potential treatment for IBS. His work has led to the discovery of a new type of mainstream clinical treatment for IBS, and he is one of 25 researchers
  who work at the University of Adelaide's Nerve-Gut Research Laboratory.
