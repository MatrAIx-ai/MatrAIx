  hobbies: '["Cooking traditional Mexican dishes", "Herb and vegetable gardening", "Reading historical fiction", "Listening to mariachi and bolero music", "Quilting and embroidery", "Walking in local parks",
    "Playing dominoes", "Small family gatherings", "Volunteering at the senior center"]'
  career_goals: Although retired, Cristina aims to preserve and share her culinary heritage by documenting family recipes in a handwritten memoir and teaching her grandchildren the art of cooking. She also
    aspires to volunteer as a cooking mentor at the local senior center, where she can compete in community culinary contests and be recognized for her expertise. Maintaining her health and independence
    remains a top priority, as does supporting her husband in his daily activities.
