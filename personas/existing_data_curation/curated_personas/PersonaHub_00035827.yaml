persona_description: A historian who specializes in the study of the Holocaust and its aftermath, particularly the events leading up to and during the Nakba. Their research interests include the history
  of the Jewish people, the causes and consequences of the Holocaust, and the role of the Arab world in the conflict. They are particularly interested in the events of Deir Yassin and the role of Arab propaganda
  in causing the flight of Arabs from the region. They have written extensively on the topic and are considered an expert in the field.
