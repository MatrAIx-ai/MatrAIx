  career_goals: Although retired, Thuong aspires to leave a lasting legacy by mentoring local students in STEM, documenting her personal and family history from wartime Vietnam to life in Florida, and championing
    senior‑friendly urban planning in Indian Rocks Beach. She also hopes to publish a memoir that blends her technical insights with cultural reflections, positioning herself as a respected voice in both
    the Vietnamese‑American community and the broader senior volunteer network.
