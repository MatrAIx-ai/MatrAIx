  hobbies: '[''Model kit building (e.g., ships, aircraft)'', ''Woodworking'', ''Fishing'', ''Strategy video games (e.g., Civilization, SimCity)'', ''Volunteering at the local food bank'', ''Reading historical
    non‑fiction'', ''Cooking and recipe experimentation'']'
  career_goals: Thomas aims to advance within the supply chain field by first earning a Certified Logistics Associate credential and completing an associate degree in Supply Chain Management. In the next
    2–3 years, he hopes to be promoted to a Warehouse Supervisor role, overseeing a team and optimizing processes. Long‑term, he envisions becoming an Operations Manager at a regional distribution center,
    or eventually launching his own logistics consulting firm focused on efficient inventory solutions.
