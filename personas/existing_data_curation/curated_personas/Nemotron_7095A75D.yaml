personas:
  professional: Alexa Ayala is an aspiring group‑fitness designer who blends exercise physiology, abstract art, and Spanish‑language fluency to create high‑energy cardio‑strength classes that feel like
    moving canvases, all while dreaming of opening a boutique Chicago studio that fuses dance, traditional music, and functional training.
  sports: Alexa Ayala channels competitive energy into weekend hikes along the Illinois River Trail, volunteers as a youth fitness class leader, and passionately supports the Chicago Bulls while regularly
    dancing salsa at a community club that doubles as a cardio workout.
  arts: Alexa Ayala spends evenings painting abstract canvases inspired by gym playlists, curates eclectic mixtapes that blend modern trap with traditional Andean instruments, and studies choreography by
    Akram Khan and Misty Copeland to infuse movement with visual storytelling.
  travel: Alexa Ayala prefers spontaneous, art‑focused road trips, often planning weekend getaways to the Great Smoky Mountains to photograph sunrise mist, while dreaming of a cultural immersion residency
    in Cusco to host pop‑up fitness workshops that blend dance and local music.
  culinary: Alexa Ayala experiments with fusion dishes such as quinoa‑taco bowls tossed with cilantro‑lime crema and a dash of smoky chipotle, masters pan‑seared salmon paired with avocado‑lime salsa, yet
    admits to neglecting meal prep on chaotic weeks, resorting to energy bars before late‑night class rehearsals.
  core: Alexa Ayala is a 19‑year‑old kinetic artist who blends fitness, abstract painting, and cultural rhythms into vibrant, spontaneous experiences, but sometimes lets disorganization and impulsive spending
    blur their path to long‑term goals.
background:
  cultural: Alexa is a first‑generation Peruvian‑American raised in Hardin, Illinois. Her family maintains strong ties to Peruvian traditions, celebrating festivals like Inti Raymi and Día de la Canción
    with traditional foods such as ceviche, lomo saltado, and pachamanca. She grew up hearing Andean music and speaking Spanish at home, which shapes her sense of rhythm and community. While embracing Midwestern
    values of modesty and hard work, she also incorporates the vibrant colors, storytelling, and communal spirit of Peruvian culture into her fitness classes and personal creative pursuits.
attributes:
  skills: '[''Fitness Program Design'', ''Group Class Facilitation'', ''Creative Choreography'', ''Exercise Physiology Knowledge'', ''First Aid & CPR Certified'', ''Motivational Coaching'', ''Adaptive Workout
    Planning'', ''Basic Nutrition Counseling'', ''Bilingual Communication (Spanish/English)'', ''Community Engagement'']'
  hobbies: '[''Abstract Painting'', ''Afro‑Peruvian & Salsa Dancing'', ''Fusion Cooking (Peruvian & Midwestern)'', ''Hiking & Nature Photography'', ''Speculative Fiction Reading'', ''Volunteer Fitness Instruction'',
    ''Curating Musical Playlists'', ''Improvisational Theater Workshops'']'
  career_goals: Alexa aims to become a certified personal trainer (NASM) and later pursue a specialty in Dance‑Based Fitness. She dreams of opening a boutique studio in the Chicago area that merges high‑energy
    group workouts with Peruvian cultural expression, such as traditional music and dance moves. In the next five years she plans to create an online platform offering innovative, art‑infused fitness programs,
    travel to host pop‑up workshops across Latin America, and eventually author a guidebook on creative fitness instruction. She also aspires to earn a degree in kinesiology to deepen her scientific foundation
    while maintaining her artistic approach to movement.
