personas:
  professional: Donna Stewart is a seasoned accountant who leverages her expertise in GAAP compliance and QuickBooks to translate complex financial data into clear reports for small‑to‑mid‑size business
    owners, balancing her love of predictable procedures with occasional spontaneous problem‑solving when audit surprises arise.
  sports: Donna Stewart enjoys gentle morning yoga sessions, weekend hikes on the Natchez Trace, and cheering on the Memphis Grizzlies and Tennessee Titans while participating in the local Trailblazers
    Hiking Club, which meets monthly for group treks.
  arts: Donna Stewart finds creative fulfillment attending the regional community theater’s productions of classic plays, listening to the soulful storytelling of Dolly Parton and the acoustic folk of Gillian
    Welch, and collecting handmade quilts at local craft fairs.
  travel: Donna Stewart favors relaxed road trips that blend historic charm with natural scenery, having explored Savannah’s oak‑lined squares, the culinary delights of New Orleans’ French Quarter, and
    the scenic waterfalls of Asheville, while planning a future pilgrimage to the Blue Ridge Parkway’s sunrise vistas.
  culinary: Donna Stewart’s culinary repertoire centers on Southern comfort food like shrimp and grits, fried chicken with buttermilk, and peach cobbler, all seasoned with home‑grown heirloom tomatoes,
    fresh basil, and a dash of smoked paprika, and she enjoys experimenting by adding seasonal produce to classic recipes.
  core: Donna Stewart blends meticulous accounting precision with a spontaneous love for gardening, yet frequently forgets to water her tomatoes when absorbed in a new tax code, making her both reliably
    organized and delightfully absent‑minded.
background:
  cultural: Donna grew up in a close‑knit, predominantly white, Southern community in Tennessee, where family, church, and neighborly support were central values. Her upbringing emphasized modesty, hard
    work, and a respect for tradition, while exposing her to the evolving agricultural and small‑business landscape of Wilson County. Although she attended some college courses in business, she chose a
    practical career path that allowed her to remain rooted in her hometown, contributing to the local economy and cultural continuity through both her professional and volunteer activities.
attributes:
  skills: '["Financial statement preparation", "GAAP compliance", "Tax preparation", "Data analysis with Excel", "QuickBooks and Sage ERP", "Internal controls evaluation", "Audit planning and execution",
    "Clear financial communication", "Collaborative teamwork"]'
  hobbies: '["Backyard gardening", "Southern cooking", "Church outreach volunteering", "Food pantry service", "Craft fair attendance", "Yoga", "Historical fiction reading", "Weekend hiking"]'
  career_goals: Donna aims to become a Certified Public Accountant (CPA) within the next two years, leveraging her practical experience to lead audit engagements for regional firms. She envisions transitioning
    into a senior audit manager role where she can mentor junior staff and implement streamlined processes that balance structure with flexibility. Long‑term, she hopes to open a boutique consulting practice
    that offers financial advisory services to local businesses and nonprofits, aligning her career growth with her community‑oriented values.
