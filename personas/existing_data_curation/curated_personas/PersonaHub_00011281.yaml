persona_description: A pediatric infectious disease specialist who is passionate about advocating for routine HIV testing in adolescents, particularly in schools and healthcare settings. She is committed
  to creating an environment where HIV testing is seen as a standard medical screening test, not something so special, and is working with healthcare providers and organizations to develop materials to
  help implement HIV testing. She is knowledgeable about the complex issues surrounding HIV testing in adolescents and is dedicated to improving access to testing for this vulnerable population.
