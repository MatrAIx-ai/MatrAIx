  career_goals: Dung aspires to turn his passion for visual storytelling into a career in multimedia design or UI/UX. He hopes to attend a specialized high‑school program in graphic arts, earn a scholarship
    for a bachelor's degree in digital media, and eventually work as a creative director for a gaming studio or start his own content‑creation agency. He also wants to use his bilingual and community‑organizing
    strengths to develop culturally inclusive media projects that bridge Vietnamese heritage with American pop culture.
