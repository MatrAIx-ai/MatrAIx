  hobbies: '[''Reading historical fiction'', ''Classic mystery novels'', ''Crosswords'', ''Sudoku'', ''Jigsaw puzzles'', ''Vegetable gardening'', ''Knitting'', ''Crocheting'', ''Early morning nature walks'',
