  career_goals: Approaching retirement, Martha aims to transition into a part‑time supervisory or mentorship role where she can pass on her systematic approach to younger staff and help streamline warehouse
    workflows. She hopes to obtain a certified safety officer credential to formalize her expertise in workplace safety, ensuring a predictable and low‑stress environment as she winds down her career. Financial
    stability and a steady, structured schedule remain her top priorities, and she wishes to leave a legacy of dependable, organized operations at her current employer.
