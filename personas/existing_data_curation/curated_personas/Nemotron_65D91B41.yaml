  career_goals: Lula aims to continue building a stable career in warehouse operations, seeking to earn her Certified Forklift Operator and OSHA 30‑hour certification within the next year. She hopes to
    advance to a shift supervisor role, where she can mentor younger workers, improve safety protocols, and help shape a predictable, supportive work environment for her family. Ultimately, she would like
    to secure a reliable income that enables a comfortable retirement in Calais, allowing her to focus more on family and community activities.
