personas:
  professional: Lula Richey, a 44‑year‑old warehouse operations specialist, leverages their meticulous forklift expertise and OSHA‑compliant safety habits to streamline inventory flow while mentoring new
    hires, and they’re driven by a pragmatic desire to earn their Certified Forklift Operator and OSHA 30‑hour certifications as stepping stones toward a shift supervisor role.
  sports: Lula Richey, a community‑oriented sports fan, cheers for the Boston Red Sox and New England Patriots while they play on a local co‑ed softball league and participate in a seasonal fishing club
    that meets at the nearby harbor for catch‑and‑release outings.
  arts: Lula Richey, a dedicated quilter, draws artistic inspiration from Winslow Homer’s coastal scenes, enjoys the folk storytelling of Mary Chapin Carpenter, attends occasional performances by the Boston
    Symphony Orchestra, and they curate a small collection of vintage quilt patterns that reflect New England’s maritime heritage.
  travel: Lula Richey, who favors low‑key weekend getaways, has explored Acadia National Park’s sunrise hikes, enjoyed fresh lobster in Bar Harbor, dreams of a road trip to Prince Edward Island’s lighthouse‑lined
    coastline, and they plan a future cruise to explore the historic ports of New England.
  culinary: Lula Richey, a home cook rooted in New England flavors, perfects classic clam chowder with locally sourced clams, prepares lobster rolls topped with garden‑grown parsley, bakes baked beans spiced
    with molasses and thyme, and they experiment with heirloom carrots and rosemary from their herb beds.
  core: Lula Richey blends steadfast routine with quiet creativity, balancing warehouse stewardship, modest financial conservatism, garden‑fueled cooking, and community quilting while they wrestle with
    occasional worry and a penchant for spontaneous shoreline walks.
background:
  cultural: Lula comes from a white, working‑class New England background, rooted in the coastal towns of Maine. Her upbringing reflects the region’s modest, community‑focused culture that values hard work,
    self‑reliance, and mutual support. Family traditions emphasize loyalty, practicality, and respect for local customs, including a deep appreciation for the outdoors, seasonal cycles, and the town’s maritime
    heritage. These cultural influences shape her straightforward communication style, her commitment to routine, and her cooperative spirit in both work and personal life.
