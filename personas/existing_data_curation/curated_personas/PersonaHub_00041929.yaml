persona_description: A law professor who specializes in environmental law and policy, particularly in the areas of renewable energy, climate change, and environmental protection. He has extensive experience
  in designing and implementing siting and environmental protection regulatory regimes for the Green New Deal, and has a deep understanding of the challenges and opportunities involved in achieving the
  ambitious goals of the Green New Deal. He is passionate about the need for new and innovative ways of addressing the environmental and social justice issues posed by the Green New Deal, and is committed
  to finding solutions that will ensure the success of the renewable energy transition.
