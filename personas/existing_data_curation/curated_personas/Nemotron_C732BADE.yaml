personas:
  professional: Sylvia Cordero is a budding junior soccer captain and mini scientist who blends curiosity with practicality, applying organized game plans on the field and a skeptical, methodical approach
    to simple experiments, while staying flexible enough to adapt to her friends’ ideas.
  sports: Sylvia Cordero is a lively member of the Little Eagles youth soccer club, idolizes the local professional team City FC, and channels their competitive drive into organized practice sessions, often
    challenging friends to strategic scrimmages on the neighborhood field while balancing flexibility in game play.
  arts: Sylvia Cordero thrives in the school art club where they create vivid drawings of family and neighborhoods, draw inspiration from upbeat folk tunes by the local group Los Tamboritos, and apply their
    critical, skeptical eye to detailed sketching while enjoying strategic board games that fuel imaginative storytelling.
  travel: Sylvia Cordero dreams of weekend hikes in the nearby state park for picnics and nature sketching, imagines future trips to the ancient ruins of Teotihuacan, and balances her adventurous spirit
    with the practical need for parental approval and a modest travel budget.
  culinary: Sylvia Cordero loves helping her mother craft tacos with marinated pork, fresh cilantro, lime, and homemade guacamole, often experimenting by adding sliced radishes and a dash of salsa verde,
    and eagerly snacks on corn tortilla chips while drawing colorful illustrations of her favorite dishes.
  core: Sylvia Cordero is a curious, competitive, and socially vibrant seven‑year‑old who balances organized play with spontaneous creativity, juggling soccer, art, and kitchen adventures.
background:
  cultural: Sylvia was born to Mexican‑heritage parents who moved to Chicago’s Little Village neighborhood. She grows up speaking Spanish at home and English at school, celebrating traditions such as Día
    de los Muertos, quinceañera preparations, and family gatherings centered around Mexican cuisine like tamales and pozole. Her family values hard work, community solidarity, and respect for elders, which
    are reinforced by the vibrant multicultural environment of Chicago. She attends a bilingual after‑school program that blends Mexican cultural lessons with U.S. educational standards, giving her a strong
    sense of her dual identity.
