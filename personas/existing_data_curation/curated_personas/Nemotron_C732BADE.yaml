  career_goals: Sylvia dreams of becoming a pediatrician so she can help children stay healthy, and she also imagines herself as a professional soccer player who represents her community. She is fascinated
    by how things work and hopes to be a scientist or engineer who creates practical solutions for everyday problems. In school she aims to be top of her class in reading and math, win the upcoming school
    science fair, and lead her soccer team to victory, blending her competitive spirit with a desire to make a positive impact on others.
