persona_description: A nuclear pharmacist who works in a hospital or clinic, preparing and dispensing radioactive drugs for cancer treatment. They are responsible for ordering, receiving, and controlling
  inventory, performing functional checks, determining radiopharmaceutical quality and purity, labeling containers, compound doses, packaging, and labeling radiopharmaceuticals. They must be careful, precise
  workers, and work behind lead glass shields, wear gloves, and handle materials with special equipment to reduce radiation exposure. They earn a higher salary than traditional pharmacy practice, with wages
  varying depending on location, employer, and years of experience. They are required to order, receive, and control inventory of radioactive drugs, perform functional checks, determine radiopharmaceutical
  quality and purity, label containers, compound doses, package, and label radiopharmaceuticals, and educate physicians, nurses, and other staff about the importance of handling radiopharmaceuticals. They
  may specialize in the growing area of PET (Positron Emission Tomography) practice.
