persona_description: A geologist who is interested in the study of sedimentary rocks and mineral formations. They are particularly knowledgeable about rosette formations of crystal clusters, such as gypsum
  or baryte, which contain abundant included sand grains. They are likely to be familiar with the term "desert rose" and have a strong interest in the formation and characteristics of these formations.
  They may also have experience with the study of arid conditions and the effects of evaporation on sedimentary rocks.
