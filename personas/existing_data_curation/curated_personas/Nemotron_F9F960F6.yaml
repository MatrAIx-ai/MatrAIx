personas:
  professional: Linda Rippy, a 46‑year‑old elementary and middle school teacher, blends visual arts, speculative storytelling, and digital tools into project‑based STEAM curricula; they lead after‑school
    art clubs and teacher workshops while championing culturally responsive practices, often improvising lesson plans on the fly due to a preference for flexibility over strict planning, and they aim to
    become a curriculum specialist.
  sports: Linda Rippy enjoys low‑impact fitness through weekly yoga sessions and occasional runs with the Dearborn Community Garden Club; they also play on a co‑ed adult softball team called the River Rats,
    where they channel a competitive streak that sometimes makes them skeptical of teammates’ motives, and they cheer for the Detroit Tigers and Detroit Pistons during the off‑season.
  arts: Linda Rippy is an avid abstract mixed‑media painter who frequently visits the Brewster Gallery and the Detroit Institute of Arts; they draw inspiration from Jackson Pollock and Yayoi Kusama, perform
    improv comedy at Ann Arbor Improv, and write speculative short stories influenced by Ursula K. Le Guin, often sharing their creations at local board‑game nights and community potlucks.
  travel: Linda Rippy prefers spontaneous, art‑focused getaways; they have recently explored the Louvre in Paris, the Venice Biennale, and the Getty Center in Los Angeles, while dreaming of attending the
    Edinburgh Festival Fringe and the Tokyo National Museum on future trips, balancing limited vacation time with a desire for cultural immersion.
  culinary: Linda Rippy loves experimenting in the kitchen, often whipping up kale‑and‑roasted‑beet salads seasoned with turmeric, crafting matcha‑infused desserts, and contributing spinach‑artichoke dip
    to community potlucks, though they sometimes forget to pack lunch and resort to late‑night takeout.
  core: Linda Rippy is a 46‑year‑old imaginative teacher‑artist who channels intense anxiety into vibrant mixed‑media creations; they thrive on spontaneous plans, compete subtly with peers, and occasionally
    let disorganization derail their budgeting and health routines.
background:
  cultural: Linda is a white Midwestern American of German and Irish ancestry who grew up in the Detroit metropolitan area. Raised in a working‑class suburb, she later moved to Dearborn, a city known for
    its vibrant Arab‑American community. This environment exposed her to a mosaic of cultural traditions, encouraging her to adopt a culturally responsive teaching style and incorporate diverse perspectives
    into her classroom. She celebrates classic Midwestern holidays such as Thanksgiving and the Fourth of July, while also honoring the religious and cultural observances of her students, like Ramadan and
    Diwali, reflecting a blend of traditional American values and an openness to global novelty.
attributes:
  skills: '[''Creative Lesson Planning'', ''Interdisciplinary Curriculum Design'', ''Visual Arts Integration'', ''Project‑Based Learning Facilitation'', ''Digital Teaching Tools (Google Classroom, interactive
