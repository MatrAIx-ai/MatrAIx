persona_description: A historian who specializes in the study of Edgar Allan Poe and his medical case, particularly the possible connection to rabies. His research interests include the medical history
  of Poe, the causes and symptoms of rabies, and the potential links between alcoholism and rabies. He is interested in the medical records and historical accounts of Poe's condition in the hospital, as
  well as the medical theories and practices of the time. He is also interested in the potential causes of delirium and the symptoms of rabies, such as confusion, wide swings in body functions, and fear
  of water.
