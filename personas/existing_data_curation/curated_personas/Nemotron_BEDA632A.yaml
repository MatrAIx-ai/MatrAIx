  career_goals: In the coming years Isaiah aims to channel his organizational talent and compassionate nature into expanded volunteer leadership. He seeks to mentor younger community members, particularly
    through a local after‑school program focused on trades and life skills. He also plans to develop a neighborhood heritage garden that celebrates African‑American history in Allegan County, combining
    his love for gardening and cultural storytelling. Additionally, Isaiah wishes to complete an online certification in nonprofit management to sharpen his ability to secure funding and scale community
    projects. He hopes to author a memoir that captures his life experiences, preserving family history for future generations.
