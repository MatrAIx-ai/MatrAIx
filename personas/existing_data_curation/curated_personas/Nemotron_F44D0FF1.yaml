  hobbies: '["Sketching and watercolor painting", "Visiting art galleries", "Live music attendance", "Creative writing and blogging", "Sci‑fi/fantasy reading", "Experimental cooking", "Street photography",
    "Afrobeat and hip‑hop dance classes", "Volunteer art workshops for youth", "Community event planning"]'
  career_goals: In the short term, Sylvia aims to earn a bachelor’s degree in Hospitality Management while gaining certification in food safety, positioning herself for promotion to shift supervisor and
    then assistant manager. Over the next five years she plans to become a restaurant manager, overseeing operations and staff development, and to launch a pop‑up café that showcases African‑American cuisine
    alongside rotating art exhibitions by local artists. Long‑term, she aspires to own a boutique café‑gallery that serves as a cultural hub in Houston, mentor emerging hospitality and arts professionals,
    and co‑found a community‑focused events organization that celebrates Black heritage through food, music, and visual art.
