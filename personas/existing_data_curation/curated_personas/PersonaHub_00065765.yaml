persona_description: A space weather engineer who specializes in the modeling and prediction of the radiation environment and its effects on spacecraft elements and crew. They are responsible for developing
  and improving radiation environment models and software tools to accurately simulate the radiation experienced by spacecrafts. They have experience working with data from various satellites and simulations
  to study the behavior of trapped electrons and protons in the Van Allen radiation belts, and have a keen interest in the anisotropy and variability of these populations on different time scales. They
  are skilled in data analysis, software development, and space weather modeling, and have a strong background in physics and engineering.
