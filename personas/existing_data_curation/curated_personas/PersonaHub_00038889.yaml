persona_description: A German artist who lived during the late 19th and early 20th centuries, known for his expressionist style and his works that reflect his experiences during the Great War. He was a
  member of the Berliner Secession and was influenced by the German Impressionists, but later turned towards German Expressionism. His self-portraits were a reflection of his struggle to define himself
  through his painting, and he produced an extraordinary number of them, rivaled only by Rembrandt and Picasso. He was a professor of art at the Fine Arts Academy in Frankfurt and later lived in self-imposed
  exile in Amsterdam, unable to obtain an American visa. His works were confiscated by the Nazi regime and he suffered personal losses under their rule.
