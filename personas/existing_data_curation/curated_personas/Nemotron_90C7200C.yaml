personas:
  professional: Marietta Alsina, a 51-year-old cleaning specialist, leverages her bilingual fluency, OSHA‑savvy safety practices, and methodical scheduling to deliver reliable, eco‑friendly housekeeping
    services while mentoring a close‑knit crew of local women, and they consistently exceed client expectations through meticulous checklists.
  sports: Marietta Alsina stays active by joining Zumba classes at the Kissimmee Community Center, cheering on the Orlando Magic during basketball season, supporting Orlando City SC's soccer matches, and
    playing casual tennis on weekends with friends, embodying a structured yet social approach to fitness.
  arts: Marietta Alsina finds joy in salsa and merengue nights at the local cultural hub, where they often request tunes by Celia Cruz and Marc Antonio, attend mystery‑novel book club meetings that discuss
    Agatha Christie, and occasionally catch a performance at the Orlando Repertory Theatre, letting rhythmic beats shape their creative outlet.
  travel: Marietta Alsina prefers thoughtfully planned trips that blend cultural immersion with family relaxation, having organized group visits to the historic Old Town of a Caribbean capital, a weekend
    getaway to Savannah’s riverfront, and a road‑trip along Florida’s Gulf Coast, while dreaming of exploring Barcelona’s architecture and the vineyards of Mendoza.
  culinary: Marietta Alsina excels in home cooking, skillfully preparing arroz con gandules with sofrito and pasteles wrapped in banana leaves, seasoning dishes with cilantro, oregano, and adobo, and they
    relish sharing these flavors at potluck gatherings, though they sometimes over‑salt a batch when multitasking between cleaning jobs.
  core: Marietta Alsina blends disciplined organization with vibrant community spirit, turning cleaning checklists into social rituals while juggling garden herbs, Zumba beats, and a meticulous budget,
    even if they occasionally forget to water their basil.
background:
  cultural: Marietta is a first‑generation Puerto Rican who grew up immersed in the island’s warm, family‑centric culture before moving to Central Florida. She is fluent in Spanish and English, allowing
    her to bridge cultural gaps within her community. Puerto Rican traditions—such as lively music, dance, and shared meals—play a central role in her social life, and she actively participates in local
    diaspora events, church gatherings, and the annual Puerto Rican Day Parade. Her cultural identity emphasizes hospitality, respect for elders, and community support, which inform both her personal interactions
    and her professional dedication to providing caring, dependable service. Living in Kissimmee’s diverse environment has broadened her perspective, blending Caribbean warmth with the practicality of American
    workplace norms.
