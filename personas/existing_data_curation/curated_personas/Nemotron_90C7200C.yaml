  hobbies: '[''Salsa and merengue dancing'', ''Cooking Puerto Rican cuisine'', ''Community volunteering'', ''Herb and vegetable gardening'', ''Zumba fitness classes'', ''Organizing potluck gatherings'',
    ''Reading mystery novels'', ''Bullet journaling'', ''Watching telenovelas'', ''Attending Puerto Rican cultural festivals'']'
  career_goals: Marietta aims to transition from employee to owner‑operator of a small, community‑focused cleaning service that emphasizes green practices and reliable, personalized service. She plans to
    complete her associate degree in hospitality management, obtain a certified cleaning‑management credential, and secure insurance and licensing to expand her client base. In the next five years, she
    hopes to lead a team of trusted cleaners, mentor other women in the local Puerto Rican community, and achieve financial stability that allows her to purchase a home for herself and her children. Additionally,
    she aspires to become a certified green‑cleaning specialist and offer training workshops for eco‑conscious housekeeping.
