  hobbies: '[''Beach Walking'', ''Kayaking'', ''Gardening'', ''Community Theater'', ''Reading Literature'', ''Cooking Southern Cuisine'', ''Organizing Block Parties'', ''Group Fitness Classes'', ''Volunteer
    at Historical Society'', ''Attending Music Festivals'']'
  career_goals: Catherine aims to advance into a supervisory role within the municipal parking enforcement department, eventually becoming a senior enforcement officer or division manager. She plans to
    pursue a certification in public administration and possibly a part‑time master’s degree to broaden her expertise in city planning and public safety. Her long‑term ambition includes developing outreach
    programs that educate drivers about parking best practices and collaborating on traffic‑flow improvement projects that benefit the Fernandina Beach community.
