  is familiar with statistical methods and concepts such as mean, mode, median, standard deviation, outliers, significance, normal distribution, and skewed distribution. They are well-versed in using statistical
  software and tools to analyze data and make predictions. This individual is likely to be found in a business or consulting role, where they are responsible for analyzing data and making recommendations
  to improve business operations and decision-making.
