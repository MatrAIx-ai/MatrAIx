personas:
  professional: Jose Arderi, a retired handyman turned community‑center volunteer, leverages precise carpentry, basic electrical wiring, and bilingual translation skills to teach practical home‑repair and
    budgeting workshops, while their disciplined, solitary nature ensures every session follows a meticulously planned agenda.
  sports: Jose Arderi enjoys low‑impact fitness through regular walks in Hermann and Memorial Parks, supports the Houston Astros, Rockets, and Texans from their living room, and they occasionally join a
    senior walking club that meets at Discovery Green for group strolls.
  arts: Jose Arderi immerses themselves in the timeless rhythms of Vallenato and Cumbia legends like Jorge Celedón and Los Diablitos, while savoring classic cinema such as Casablanca and The Godfather,
    and they often pair these arts with crossword puzzles to sharpen focus.
  travel: Jose Arderi prefers meticulously planned getaways, opting for budget‑friendly weekend road trips to Austin for its barbecue scene, and they dream of a carefully budgeted pilgrimage to Colombia’s
    coffee region to reconnect with their roots and sample freshly harvested arabica.
  culinary: Jose Arderi excels at preparing traditional dishes such as sancocho, arepas stuffed with queso fresco, and arroz con coco, skillfully incorporating fresh garden harvests like cilantro, plantain,
    and aji amarillo, and they treat each cooking step with the same precision they apply to assembling wooden puzzles.
  core: Jose Arderi is a disciplined, solitary retiree who channels a love of order into community workshops, meticulous budgeting, vigilant health monitoring, and expertly timed Colombian meals, and they
    often hum classic Vallenato tunes while solving puzzles.
background:
  cultural: Jose was born in the Andean region of Colombia, where family gatherings, Catholic traditions, and a strong sense of community shaped his upbringing. The values of hospitality, respect for elders,
    and pride in Colombian cuisine—especially dishes like bandeja paisa and ajiaco—remain central to his identity. Since moving to Houston, he balances his Colombian heritage with the multicultural fabric
    of the city, preserving Spanish language use at home and participating in local Colombian festivals, while also adapting to Texan customs.
attributes:
  skills: '[''Carpentry'', ''Basic Plumbing'', ''Simple Electrical Wiring'', ''Financial Budgeting'', ''Record Keeping'', ''Spanish-English Bilingual Communication'', ''Traditional Colombian Cooking'',
