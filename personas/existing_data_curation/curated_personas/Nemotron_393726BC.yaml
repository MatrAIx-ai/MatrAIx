  career_goals: Although retired, Kathy aims to deepen her impact on the local community by taking on a leadership role in the senior advisory board and expanding volunteer outreach programs for the food
    bank and community garden. She also aspires to mentor new volunteers, advocate for senior-friendly policies in Surprise, AZ, and eventually compile her experiences into a memoir that highlights the
    value of compassion and organized service. Maintaining a structured, supportive environment for her spouse and ensuring their health and financial security remain personal priorities.
