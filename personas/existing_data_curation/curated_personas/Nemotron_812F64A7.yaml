  hobbies: '["Hiking","Trail running","Landscape photography","Sketching","Live folk music events","Improvisational theater","Board game nights","Yoga and mindfulness meditation","Reading contemporary fiction
    and psychology","Podcast listening on sociology and art history","Volunteering at youth art programs"]'
  career_goals: Darian aims to transition from front‑line interviewing to a program coordination or case management role within social services. He plans to complete a bachelor's degree in social work or
    public policy to deepen his understanding of program design. His long‑term ambition is to improve the efficiency and user‑friendliness of eligibility processes, possibly integrating technology and client‑centered
    design. He also hopes to launch a community outreach initiative that combines art workshops with mental‑health support, leveraging his artistic interests to create low‑stress spaces for vulnerable populations.
