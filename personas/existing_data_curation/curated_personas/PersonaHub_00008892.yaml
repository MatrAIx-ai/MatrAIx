persona_description: A bioengineer and researcher who specializes in studying the respiratory and circulatory systems of insects, particularly those of ground beetles, grasshoppers, and silk worm moths.
  He has a background in teaching and has worked with primary and secondary school teachers to develop novel lessons that integrate biology and engineering. He has appeared on the National Geographic and
  History channels and has been featured in the press for his work with flying snakes and insects. His research interests include the design of microfluidic systems and the use of insects as inspiration
  for novel engineered systems.
