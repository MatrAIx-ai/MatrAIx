personas:
  professional: Andrew Wilson, an aspiring junior cartoonist and LEGO engineer, channels their curiosity and love for imaginative worlds into sketching comic strips and constructing intricate builds, while
    keeping a tidy idea notebook balanced with spontaneous improvisation, and often volunteers to help classmates with art projects despite occasional anxiety about perfection.
  sports: Andrew Wilson enjoys playing on the community soccer team during the fall, cheerfully watches the regional baseball club the Chicago Cubs on TV, and joins a junior hiking club in the spring, while
    often organizing neighborhood tag games with friends after school.
  arts: Andrew Wilson immerses themselves in the arts by drawing cartoon characters inspired by creators like Stan Lee and Hayao Miyazaki, attending Saturday art workshops where they experiment with watercolor
    and digital illustration, and proudly displays their LEGO sculptures alongside sketches, all while listening to a mix of pop hits and cinematic scores for creative fuel.
  travel: Andrew Wilson prefers family-oriented travel, relishing weekend hikes in the nearby state park, dreaming of exploring the awe-inspiring Grand Canyon, and cherishing a memorable trip to Washington,
    D.C.’s National Museum of Natural History, while planning future adventures that blend nature trails with interactive science exhibits.
  culinary: Andrew Wilson enjoys simple, kid-friendly meals like pepperoni pizza and cheesy macaroni, prepares carrot sticks for their rabbit, occasionally experiments with DIY sushi rolls using avocado
    and cucumber, yet sometimes skips breakfast in the rush to start Minecraft sessions.
  core: Andrew Wilson is a curious, art-obsessed ten-year-old who balances meticulous LEGO builds and comic sketches with a caring heart for their rabbit, a habit of over-thinking allowances, and occasional
    stress-induced snack cravings.
background:
  cultural: Andrew was raised in a suburban middle‑class family in Hicksville, New York. His household reflects a blend of Anglo‑American traditions, with occasional celebrations of Irish and German heritage
    from his grandparents. Growing up in the diverse environment of Nassau County, he has been exposed to a variety of cultural influences, from local community festivals to the broader American media landscape.
    This background has fostered a respect for individual expression, community cooperation, and an appreciation for both the arts and scientific curiosity.
