personas:
  professional: Heather Westmoreland, a Business Operations Specialist, leverages their meticulous process-mapping, Excel and SQL analytics, and design-thinking flair to streamline workflows for creative
    nonprofits, while they balance a quiet, contemplative nature with assertive stakeholder communication and a habit of doodling flowcharts on napkins during meetings.
  sports: Heather Westmoreland, a member of the Trailblazers Hiking Club, balances their love for weekend hikes on nearby ridgelines with weekday yoga sessions, while they cheer on the Chicago Bulls during
    the NBA season and attend local semi-pro soccer matches for the Chicago Fire FC, preferring low-impact cardio over competitive sports.
  arts: Heather Westmoreland channels their love for visual storytelling into watercolor landscapes inspired by the atmospheric works of Agnes Martin, regularly visits the Art Institute's contemporary wing
    to study pieces by Gregory Thielker, and they unwind with indie shows featuring Phoebe Bridgers and The National, while their reading list is peppered with contemporary novels by Sally Rooney and Ocean
    Vuong.
  travel: Heather Westmoreland plans trips with meticulous itineraries that blend scenic hikes in Yosemite and the Columbia River Gorge with evenings at intimate galleries in Kyoto, favoring budget-friendly
    backpacker hostels and solo photo-walks over crowded tourist hubs, yet they occasionally treat themselves to a weekend art-retreat in the Catskills when their schedule permits.
  culinary: Heather Westmoreland enjoys crafting light, plant-based meals such as quinoa bowls with roasted beetroot, goat cheese, and fresh basil, while their culinary comfort foods include homemade avocado
    toast with hemp seeds and a weekly sushi night featuring salmon nigiri, and they often unwind with a meticulously brewed oat-milk latte, though they occasionally succumb to late-night binge-snacking
    on spicy tortilla chips.
  core: Heather Westmoreland navigates the world with a quiet, art-infused analytical mind, balancing meticulous process-mapping with spontaneous watercolor sessions, while they wrestle with a chronic worry
    habit that fuels both their meticulous budgeting and late-night snack binges.
background:
  cultural: Heather grew up in a middle‑class family in the Champaign‑Urbana area of Illinois. Her parents emphasized education, community service, and a modest work ethic, reflecting typical Midwestern
    values of practicality, politeness, and hospitality. While her immediate environment was predominantly white, the presence of the University of Illinois brought exposure to a diverse student body, vibrant
    arts programming, and a range of cultural perspectives. This blend of Midwestern rootedness and campus‑driven openness sparked Heather’s curiosity about different cultures and artistic expressions.
    She identifies with the region’s community‑focused spirit and understated humility, yet she embraces the progressive, creative currents that have been gaining momentum in her hometown.
