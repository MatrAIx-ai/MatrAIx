    specialty coffee shops'']'
  career_goals: Heather aspires to move into senior operations leadership within the next five to seven years, aiming for a role such as Operations Manager or Director where she can oversee strategic initiatives
    and drive efficiency across an organization. She plans to pursue an MBA to deepen her business acumen and gain formal training in leadership and strategic management. Heather is particularly interested
    in integrating sustainability and artistic value into business processes, so she hopes to work for a culturally focused nonprofit or a socially responsible startup that bridges the arts and commerce.
    Long‑term, she envisions launching her own consultancy that helps creative institutions streamline operations while preserving their artistic missions, and she also seeks personal growth in confidence
    and stress resilience to balance her ambitious career trajectory with well‑being.
