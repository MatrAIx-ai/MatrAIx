  hobbies: '[''Model aircraft and ship building'', ''Chess and strategic board games'', ''Weight training'', ''Hiking in Red Rock Canyon'', ''Cooking traditional Micronesian cuisine'', ''Volunteering with
    Micronesian cultural association'']'
  career_goals: Francisco aims to secure a stable, structured position within the next year—preferably in logistics, warehouse management, or a security role where clear procedures and predictable schedules
    are valued. He plans to obtain a commercial driver’s license (CDL) and a basic HVAC certification to broaden his qualifications. Long‑term, he envisions becoming a shift supervisor or crew lead, using
    his organizational strengths to improve team efficiency. A core ambition is to achieve financial independence that enables him to support his family back on the islands and eventually launch a small
    maintenance‑services business of his own.
