persona_description: A professional with extensive knowledge and experience in invasive species management and control. This person is highly skilled in identifying and understanding different invasive
  species, their characteristics, and the methods and tools required to remove them. They are also knowledgeable about the legal and regulatory frameworks governing the removal of invasive species, as well
  as the ethical considerations involved in managing invasive species. This person is likely to be involved in the management and control of invasive species in large and complex environments, such as wilderness
  areas, special-status species habitats, wetlands, riparian zones, archeological and traditional use areas. They are likely to have a deep understanding of the strengths and weaknesses of different treatment
  methods and the importance of following specific measures in protection zones. They are also likely to be familiar with the use of various techniques for physically removing invasive plants, including
  brush mowers, chainsaws, loppers, shovels, Weed Wrench or Puller Bear, and various chemicals and methods for removing and controlling invasive species.
