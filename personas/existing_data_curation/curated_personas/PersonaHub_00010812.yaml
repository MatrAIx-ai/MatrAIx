persona_description: A gastroenterologist who specializes in the diagnosis and treatment of inflammatory bowel diseases (IBD), including diverticular disease. She is interested in preventive measures and
  potential treatment options for these painful and debilitating conditions. She is familiar with the latest research and studies presented at Digestive Disease Week® 2007 (DDW®), and is eager to learn
  more about the findings and implications of these studies for patients with diverticular disease. She is also interested in the potential benefits of nut, corn, and popcorn consumption for individuals
  with diverticular disease, and is looking for evidence-based information to support her recommendations.
