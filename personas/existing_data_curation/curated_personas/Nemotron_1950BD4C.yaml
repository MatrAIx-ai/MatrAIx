  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Birdwatching'', ''Volunteering at community garden'', ''Bridge (card game)'', ''Local history society meetings'', ''Woodworking meet‑ups'',
    ''Cooking traditional meals'', ''Sketching home renovation ideas'']'
  career_goals: At this stage, Kris aims to transform her solitary workshop into a community‑focused studio that offers paid apprenticeships for women and other under‑represented groups in the trade. She
    wants to formalize a small curriculum that blends traditional woodworking techniques with modern sustainable practices, ensuring the knowledge she has amassed is passed on. Parallel to that, she plans
    to create a limited series of signature furniture pieces that reflect her love of Mid‑Atlantic colonial design, and to exhibit them at local craft fairs. A longer‑term ambition is to author a practical
    guidebook on DIY woodworking for hobbyists, cementing her legacy as both a skilled craftsman and an educator.
