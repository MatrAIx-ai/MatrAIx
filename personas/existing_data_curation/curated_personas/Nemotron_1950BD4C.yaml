personas:
  professional: Kris Pardue is a seasoned woodworking craftsman and mentor who blends structural engineering expertise with sustainable handcraft, and they run a community‑focused studio offering apprenticeships
    to under‑represented groups while juggling project budgets, schedules, and occasional improvisation.
  sports: Kris Pardue is an avid local trail walker who follows the Baltimore Ravens with a weekly ritual, enjoys low‑impact group yoga, and they also play on a senior softball league team called the Towson
    Broncos, blending gentle exercise with seasonal outdoor activity.
  arts: Kris Pardue is an enthusiastic reader of historical biographies and classic mystery novels, a devotee of the Chesapeake Philharmonic Orchestra, and they regularly attend Goodman Theatre productions,
    letting literature and music inform their woodworking designs.
  travel: Kris Pardue is a deliberate traveler who prefers curated day trips to historic sites like Colonial Williamsburg, Gettysburg, and Annapolis, and they dream of a slow‑paced cultural immersion in
    the English Cotswolds, always planning ahead and budgeting carefully.
  culinary: Kris Pardue is a garden‑to‑table cook who delights in roasting heirloom carrots, preparing herb‑infused chicken soup, and they bake sourdough bread with a crusty exterior, often seasoning dishes
    with locally sourced rosemary, thyme, and sea salt.
  core: Kris Pardue is a methodical yet spontaneous woodworker who balances careful planning with occasional improvisation, fostering community mentorship while managing a disciplined financial life and
    a gentle, curiosity‑driven approach to health and hobbies.
background:
  cultural: Kris grew up in the Baltimore suburbs of Maryland, a region steeped in colonial history and a strong tradition of craftsmanship. Raised in a middle‑class, Protestant household, she was encouraged
    to value hard work, community service, and education, which led her to pursue a bachelor’s degree in a STEM field at the University of Maryland. The historic row houses and barns of the Mid‑Atlantic
    landscape sparked her early fascination with woodwork and preservation. Throughout her adult life, she has remained rooted in Towson, participating in local volunteer groups, neighborhood associations,
    and regional craft fairs, blending her American white cultural heritage with a deep appreciation for the area’s architectural legacy and community spirit.
