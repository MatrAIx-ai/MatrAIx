  career_goals: Haden aims to transform his passion for art and community into a sustainable enterprise. Over the next three to five years, he plans to secure funding and launch a multidisciplinary community
    arts hub in West Philadelphia that offers rotating pop-up galleries, hands-on workshops, live-performance nights, and mentorship programs for emerging Black artists. He intends to complete a bachelor’s
    degree in Arts Management to deepen his knowledge of cultural policy and nonprofit leadership. Ultimately, he aspires to become a recognized cultural entrepreneur and a catalyst for creative economic
    development in his neighborhood, while also producing a podcast that spotlights innovative artists and unconventional ideas.
