  hobbies: '[''Watercolor painting'', ''Visiting art museums'', ''Gardening'', ''Reading literature and poetry'', ''Journaling'', ''Small book club meetings'', ''Walking along Lake Erie'', ''Listening to
    classical music'', ''Cooking new recipes'', ''Volunteering at local food pantry'']'
  career_goals: She aims to complete her bachelor’s degree in social work and obtain licensure as a clinical social worker within the next three years. Della hopes to develop and lead a community art-therapy
    program for seniors and individuals coping with anxiety in Euclid, leveraging her love of art and curiosity about innovative therapeutic methods. Long-term, she envisions becoming a program manager
    for a regional human-service agency, shaping policies that improve access to mental-health resources while maintaining a balanced, organized work environment.
