personas:
  professional: Troy Capers is an experienced landscaping and groundskeeping professional who blends a hands‑on mechanical aptitude with a steady, safety‑first mindset, leading crews through clear‑cut site‑prep
    routines while still leaving room for on‑the‑fly problem solving; their assertive yet cooperative style lets them step into foreperson duties when needed, even if their tool‑box sometimes looks like
    a tumbleweed of spare parts.
  sports: Troy Capers is a regular at the community park’s pickup basketball league, suiting up for the Northampton Hoops squad on Saturday evenings and cheering for the Philadelphia Eagles and Philadelphia
    76ers on game days; they also enjoy seasonal freshwater fishing at nearby creeks and occasionally join a local adult softball league, balancing structured team play with the freedom of solitary outdoor
    pursuits.
  arts: Troy Capers unwinds by listening to classic soul legends like Marvin Gaye and soul‑infused hip‑hop from Nas and A Tribe Called Quest, while they capture rural sunrise vistas with a DSLR, often channeling
    Ansel Adams’ contrast techniques; they attend the occasional regional art fair and support a local community theater, but rarely commit to a formal art class, preferring self‑directed experimentation
    in woodworking and photography.
  travel: Troy Capers favors flexible weekend road trips that blend nature and heritage, such as a two‑day drive to Shenandoah National Park for hiking, a scenic stop in Hudson Valley for farm‑to‑table
    dining, and a nostalgic visit to Charleston, South Carolina to explore historic districts, all while budgeting carefully for fuel and lodging to keep the garden‑center startup fund intact.
  culinary: Troy Capers delights in cooking Southern comfort dishes like shrimp and grits, smoked pork shoulder, collard greens simmered with ham hocks, and buttery cornbread, often incorporating heirloom
    tomatoes and fresh basil from their own garden; they’re comfortable whipping up a quick skillet‑fried catfish but sometimes forget to set a timer, resulting in a charred crust that they proudly call
    “extra flavor.”
  core: Troy Capers, a pragmatic hands‑on landscaper with a garden‑grown soul, juggles DIY projects, spontaneous fishing trips, and a relaxed approach to budgeting while steadily working toward a community‑focused
    business.
background:
  cultural: Troy is a Black American raised in Garysburg, North Carolina, where Southern African‑American traditions shape daily life. He grew up in a tight‑knit, rural community where family gatherings,
    church involvement, and local festivals were central. The legacy of agricultural work from his grandparents informs his respect for the land and self‑reliance. Music, storytelling, and Southern cuisine
    are integral parts of his cultural identity, and he values the hospitality, resilience, and communal spirit that characterize his hometown.
attributes:
  skills: '[''Landscape design'', ''Plant identification'', ''Irrigation system installation and maintenance'', ''Heavy equipment operation (e.g., mowers, tractors)'', ''Small engine repair'', ''Pest and
    disease management'', ''Site grading and soil preparation'', ''Customer service'', ''Team leadership'', ''Safety compliance'']'
  hobbies: '[''Home gardening'', ''Fishing'', ''Pickup basketball'', ''Woodworking'', ''Listening to soul and hip‑hop music'', ''Cooking Southern cuisine'', ''Watching sports'', ''Nature photography'',
    ''Community volunteer work (e.g., church clean‑up events)'']'
  career_goals: Troy aims to become a lead foreman for a regional landscaping firm, earning certification in horticulture and sustainable grounds management. In the next five years, he hopes to launch his
    own small landscaping business focused on residential and municipal clients in Northampton County, building a reputation for reliable, high‑quality service. He envisions expanding his operation to include
    a garden center that offers native plants and organic maintenance solutions, securing financial stability and the ability to give back to his community through local beautification projects.
