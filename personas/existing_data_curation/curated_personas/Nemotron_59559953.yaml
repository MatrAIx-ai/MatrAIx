personas:
  professional: Agustina Leon, a civil‑engineering assistant with a strong command of AutoCAD, Civil 3D and Revit, channels their meticulous organization and empathetic mindset into designing community‑focused
    infrastructure that blends functional precision with artistic expression.
  sports: Agustina Leon, an avid weekend hiker of the Santa Lucia foothills and member of the Salinas Trailblazers hiking club, stays fit through yoga, occasional trail runs, and supports the San Jose Earthquakes
    in soccer while playing volunteer volleyball at the community center during the spring.
  arts: Agustina Leon, a watercolor sketcher of urban scenes, frequents Salinas’ galleries to study works by Frida Kahlo, Diego Rivera and contemporary muralists, while the folk‑indie sounds of Bon Iver,
    First Aid Kit and local singer‑songwriter Lila Downs soundtrack their sketchbooks.
  travel: Agustina Leon, who meticulously plans budget‑friendly road trips, has explored Big Sur’s rugged coastline, hiked Yosemite’s Mist Trail, and dreams of a solo backpacking adventure through Oaxaca’s
    colonial towns, combining a love of nature with a curiosity for vibrant street art.
  culinary: Agustina Leon, an enthusiastic home cook of intermediate skill, loves preparing mole poblano, chiles en nogada and cacao‑infused salsas, often sourcing fresh corn tortillas, dried ancho chilies
    and epazote from the community garden to share meals with friends.
  core: Agustina Leon blends a meticulous engineering mind with a restless creative spirit, obsessively organizes every sketchbook page yet sometimes over‑worries about project deadlines, finding balance
    in watercolor washes and yoga breaths.
background:
  cultural: Agustina is a first-generation Mexican-American raised in Salinas, a city with deep agricultural roots and a vibrant Latino community. Her parents immigrated from Michoacan, bringing with them
    a strong sense of family, Catholic traditions, and a love for Mexican cuisine and music. Bilingual from childhood, she navigates both Spanish-speaking neighborhoods and broader English-dominant society
    with ease. Community festivals, quinceaneras, and Dia de los Muertos celebrations are integral to her identity, reinforcing values of solidarity, respect for elders, and collective well-being. These
    cultural influences shape her commitment to designing infrastructure that honors and supports the local Mexican-American population.
attributes:
  skills: '[''AutoCAD'', ''Civil 3D'', ''Revit'', ''GIS mapping'', ''Structural analysis fundamentals'', ''Site surveying'', ''Construction documentation'', ''Cost estimation basics'', ''Bilingual Spanish-English
    communication'', ''Community outreach coordination'', ''Project scheduling (MS Project)'', ''Risk assessment and safety protocols'', ''Empathy-driven design'']'
  hobbies: '[''Sketching and watercolor painting'', ''Visiting art exhibitions and murals'', ''Volunteer work with local community garden projects'', ''Hiking in the Santa Lucia Mountains'', ''Practicing
    yoga and mindfulness meditation'', ''Cooking traditional Mexican cuisine'', ''Reading about sustainable architecture and urban planning'', ''Listening to folk and indie music'', ''Learning Spanish poetry'',
    ''Attending local cultural festivals'']'
  career_goals: Agustina aims to transition from her current civil-engineering assistant role into a fully licensed professional engineer within the next five years. She plans to complete an associate's
    degree in Civil Engineering Technology at a local community college, followed by a bachelor's program in civil engineering, while passing the Fundamentals of Engineering (FE) exam. Her long-term ambition
    is to specialize in sustainable community infrastructure—designing affordable housing, storm-water management systems, and public spaces that reflect the cultural heritage of Salinas' Mexican-American
    neighborhoods. She hopes to lead multidisciplinary teams that integrate artistic elements into functional designs, and eventually serve on the Monterey County Planning Commission to advocate for equitable,
    resilient development.
