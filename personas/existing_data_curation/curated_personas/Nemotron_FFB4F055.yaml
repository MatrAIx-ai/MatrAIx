personas:
  professional: Miguel Centeno is a self‑directed teen robotics hobbyist who blends practical engineering with creative flair, designing Arduino‑based gadgets after school while balancing competitive online
    gaming and a laid‑back approach to deadlines.
  sports: Miguel Centeno plays forward for the San Miguel U14 soccer squad, idolizes Manchester United’s Marcus Rashford, hikes coastal trails to capture sunrise photos, and follows the LA Galaxy for inspiration,
    approaching fitness with a competitive edge and occasional disorganized training schedule.
  arts: Miguel Centeno sketches anime‑styled characters infused with local folklore, draws inspiration from Hayao Miyazaki’s Studio Ghibli films, dances to norteño melodies, and plays the cajón at community
    festivals, weaving cultural rhythms into his creative expressions.
  travel: Miguel Centeno loves spontaneous weekend hikes along the Pacific cliffs, dreams of visiting Tokyo’s Akihabara for tech and anime, and plans a family road trip to the historic streets of Guanajuato,
    balancing budget constraints with a craving for new scenery.
  culinary: Miguel Centeno assists with family tamales, spices up salsa with roasted tomatillos and a splash of lime, experiments with quinoa‑filled tacos, and can whip up a simple avocado‑creme dip, showcasing
    modest cooking skills and a taste for both tradition and modern twists.
  core: Miguel Centeno fuses a competitive gamer’s quick wit with a calm, curious mind, building robots in spare moments while juggling soccer, art, and experimental cooking, all under a relaxed, slightly
    disorganized schedule.
background:
  cultural: Miguel grows up in a tight‑knit Mexican‑American household in San Miguel, a small town in San Luis Obispo County known for its agricultural roots and close community ties. His family maintains
    many traditions from their Mexican heritage—bilingual communication at home, celebrating Día de los Muertos and fiestas patronales, and cooking classic dishes that blend regional Mexican flavors with
    California produce. The rural setting gives him daily exposure to farming life, from tending vines at nearby vineyards to caring for backyard chickens. He attends a local middle school where the student
    body includes many Hispanic families, fostering a sense of cultural solidarity. Miguel’s Catholic upbringing, respect for elders, and the value placed on family cooperation shape his worldview, even
    as his personality leans toward independence and competition. The blend of Mexican traditions, Californian outdoor lifestyle, and the community’s emphasis on self‑reliance informs both his ambitions
    and his everyday activities.
