  career_goals: 'Looking ahead, Miguel envisions a career that lets him blend technology with sustainable agriculture. He dreams of studying mechanical or environmental engineering so he can design low‑cost,
    energy‑efficient tools for small farms. In the short term, he plans to earn a high school diploma, take vocational courses in robotics or agricultural technology, and possibly secure an apprenticeship
    with a local equipment repair shop. Miguel also harbors an entrepreneurial ambition: creating a line of custom‑built electric skateboards or bike kits that could be sold to fellow teens in the community.
    He hopes his calm, resilient nature will help him tackle the challenges of higher education and eventually contribute innovations that benefit both his hometown and broader rural communities.'
