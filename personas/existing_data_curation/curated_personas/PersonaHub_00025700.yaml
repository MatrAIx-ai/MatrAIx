persona_description: A large, multinational corporation that specializes in the transportation and logistics industry. The company uses EDI as its primary method of communication with its global partners
  to exchange documents such as purchase orders, invoices, shipping notices, and commission sales reports. The company is focused on efficiency and cost reduction, and therefore prioritizes the use of EDI
  to eliminate the need for paper-based documents and reduce the workload of its staff. The company is also looking for a way to standardize its processes and improve the accuracy of data exchange, which
  is why it is exploring the use of EDI.
