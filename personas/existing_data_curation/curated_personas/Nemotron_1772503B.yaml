  hobbies: '[''Playing soccer'', ''Cooking Guatemalan cuisine'', ''Following business news and podcasts'', ''Weekend hiking'', ''Video gaming'', ''Attending cultural festivals'']'
  career_goals: Luis aims to secure a full‑time role in supply chain or operations management at a regional distribution company, where he can apply his practical business skills and advance to a supervisory
    position within three years. He plans to pursue a part‑time MBA to deepen his strategic expertise, and ultimately launch his own import‑export venture focused on sustainably sourced Guatemalan coffee,
    leveraging his cultural ties and competitive drive.
