  career_goals: Kaitlin aims to transition from employee to owner by opening a boutique salon in Cortland that showcases her signature style and offers premium, science‑backed hair care products. She plans
    to develop a modest line of natural hair oils and shampoos that she can market locally and online, leveraging her critical eye for product formulation. Over the next five years she hopes to earn a Master
    Stylist certification, mentor a small team of apprentices, and host quarterly workshops on advanced coloring techniques. While ambitious, she balances these goals with a pragmatic focus on financial
    stability, seeking to minimize risk and manage stress through careful budgeting and incremental growth.
