personas:
  professional: Tina Munn, a 71-year-old community volunteer and aspiring docent, uses their innate curiosity and meticulous organization to lead intergenerational quilting circles, oversee the senior-center
    garden, and share Silsbee's artistic heritage with visitors at the Hardin County Museum.
  sports: Tina Munn, a 71-year-old supporter of the Dallas Cowboys and the Houston Astros, walks the Sabine River trail with the Sabine Trail Walkers club, practices gentle yoga at the senior center, and
    enjoys weekly bridge tournaments that keep their mind as active as their steps.
  arts: Tina Munn, a 71-year-old watercolorist of East Texas landscapes, draws inspiration from Georgia O'Keeffe's bold colors and Bob Ross's calm brushwork, infuses William Morris motifs into their quilts,
    and recharges creatively listening to Willie Nelson and Dolly Parton while browsing the Silsbee Art Fair for new ideas.
  travel: Tina Munn, a 71-year-old member of a senior travel club who prefers relaxed itineraries, has taken scenic road trips to New Orleans for jazz and jambalaya, revisits the historic districts of Savannah
    each fall, and dreams of an overseas pilgrimage to the Scottish Highlands to trace their family's roots.
  culinary: Tina Munn, a 71-year-old Southern-cuisine enthusiast who blends traditional dishes with global flavors, skillfully cooks shrimp etouffee seasoned with lemongrass, collard greens simmered with
    smoked paprika and apple cider vinegar, and pecan pie sweetened with wildflower honey, while harvesting fresh basil, heirloom tomatoes, and chilies from their garden to finish each recipe.
  core: Tina Munn, a garden-tending, quilt-spinning, lifelong learner, weaves community, art, and Southern flavor into every facet of their vibrant 71-year-old life, even if they occasionally forget a pill
    or chat a bit too loudly at bridge.
background:
  cultural: Tina was born and raised in East Texas during the post‑World War II era, growing up in a close‑knit, predominantly white, Southern community. Her upbringing reflected classic Southern hospitality,
    a strong Christian faith, and an emphasis on family and community service. The cultural fabric of Silsbee—marked by regional traditions such as country music, gospel choirs, home‑cooked meals, and crafts
    like quilting—has shaped her values and daily life. While she identifies with broader Anglo‑American heritage, she also embraces the local nuances of Hardin County, including the Gulf‑Coast influence
    on cuisine and the region’s reverence for its natural landscapes. This background informs her love for storytelling, communal gatherings, and preserving local history.
