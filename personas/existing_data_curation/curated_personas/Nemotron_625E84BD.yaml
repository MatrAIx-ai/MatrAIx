  hobbies: '[''Reading Business & Self‑Development Books'', ''Meditation & Mindfulness'', ''Solo Hiking'', ''Cooking Traditional Mexican Recipes'', ''Productivity Blogging'', ''Puzzle Solving (Sudoku, Crosswords)'',
    ''Listening to Classical Guitar Music'', ''Journaling'']'
  career_goals: Juan aims to deepen his expertise in operations and supply‑chain management, targeting a senior operations manager position within the next five years. He plans to enroll in a reputable
    MBA program specializing in technology‑enabled business strategy, while earning certifications such as APICS Certified Supply Chain Professional. Ultimately, he aspires to launch his own consultancy
    that helps small agribusinesses in the Fresno valley improve logistics and adopt sustainable practices, thereby contributing to the economic vitality of his Mexican‑American community. Alongside his
    professional ascent, he is committed to developing personal resilience tools to better regulate his anxiety and maintain a balanced life.
