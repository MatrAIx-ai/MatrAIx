persona_description: A municipal waste management engineer who specializes in the design and optimization of waste incineration systems, particularly those using vertical shaft incinerators. They have experience
  with mathematical modeling, combustion processes, and air flow distribution in heat recovery boilers. They are aware of the challenges associated with high-speed secondary air jets and the need for efficient
  air flow distribution to minimize corrosion. They are also familiar with the removal of pollutants from incinerator flue gases and the use of hot water for air conditioning during high summer periods.
