personas:
  professional: Louis Burns, a 27-year-old jack-of-all-trades with a knack for small-engine repair, custom woodworking, and off-grid solar installations, channels his pragmatic curiosity and competitive
    drive into building a homestead-handyman business that serves his tight-knit mountain community, though his spontaneous nature often leaves him scrambling to meet deadlines.
  sports: Louis Burns, an avid outdoorsman, belongs to the Gunnison Target Shooting Club where he hones his sharpshooting for regional tournaments, spends summers hunting with the local Hunter's Association,
    climbs the sandstone walls of Fishlake Canyon with a nearby climbing group, and roots for the Utah Jazz and Real Salt Lake while occasionally joining pickup basketball games in the winter.
  arts: 'Louis Burns, a solitary creative, finds inspiration in the rustic ballads of Chris LeDoux and the folk storytelling of Brandi Carlile, collects vintage woodworking plans from master craftsmen like
    Sam Maloof, and unwinds by streaming the documentary series ''Abstract: The Art of Design'' while occasionally attending live bluegrass nights at the Heber Valley community hall.'
  travel: Louis Burns, a rugged wanderer, prefers spur-of-the-moment road trips to high-altitude national parks like Yellowstone and Grand Teton, often camping under the stars with a self-built solar setup,
    while dreaming of an off-grid homestead tour of Iceland's volcanic landscapes to study renewable energy, yet his modest savings sometimes limit extended travel.
  culinary: Louis Burns, a competent but no-frills cook, favors hearty dishes such as slow-cooked goat stew with rosemary and root vegetables, smoked elk jerky seasoned with cayenne, and a breakfast of
    skillet-fried eggs over locally sourced millet, while his go-to pantry staples include wild-crafted honey, fire-roasted chilies, and dried beans he often prepares over a campfire.
  core: Louis Burns, a 27-year-old pragmatic tinkerer with a competitive edge, balances a fierce curiosity for self-reliance with a skeptical, worry-prone mindset that fuels their relentless pursuit of
    becoming the community's go-to problem-solver.
background:
  cultural: Louis grew up in the sparsely populated, predominantly LDS region of Sanpete County, Utah. The local culture emphasizes self‑reliance, a strong connection to the land, and community cooperation
    through church and volunteer events. While he respects these traditions, his skeptical and competitive nature leads him to chart his own path, often questioning communal expectations. The rugged western
    landscape has shaped his love for outdoor pursuits and his hands‑on approach to problem‑solving, blending pragmatic, tried‑and‑true methods with an appetite for new ideas.
attributes:
  skills: '[''Small engine repair'', ''Basic carpentry and woodworking'', ''Wilderness survival and first‑aid'', ''Hunting and wildlife tracking'', ''Simple electrical wiring and off‑grid solar installation'',
    ''Arduino micro‑controller programming'', ''Target shooting'', ''Negotiation and bartering'']'
  hobbies: '[''Hiking and backcountry camping'', ''Hunting and wildlife tracking'', ''Target shooting'', ''DIY woodworking and building projects'', ''Off‑grid solar tinkering'', ''Rock climbing on nearby
    cliffs'', ''Listening to podcasts on survival and technology'', ''Reading speculative non‑fiction'']'
  career_goals: Louis aspires to turn his self‑reliance into a sustainable livelihood. His primary ambition is to establish a small homestead on the outskirts of Gunnison, raising a few goats and a couple
    of beef cattle, while providing handyman services to neighbors—particularly small‑engine maintenance and custom woodworking. He also dreams of developing a modest off‑grid solar installation service,
    leveraging his DIY electrical skills. Though his spontaneous nature makes long‑term planning challenging, he is driven by a competitive desire to be recognized as the go‑to problem‑solver in his community
    and to eventually compete in regional target‑shooting tournaments.
