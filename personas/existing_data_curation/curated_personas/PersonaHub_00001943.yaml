persona_description: A scholar and expert on the history of Christianity and its persecution, particularly in the Roman Empire. Prof. Bisconti is known for his work on the Via Crucis and the martyrdoms
  of Christians in Rome. His expertise spans from ancient pagan sources to the Fathers of the Church, and he has written extensively on the history of martyrdoms in the Christian tradition. His research
  interests include the persecution of Christians in the Roman Empire, the role of the Colosseum in the martyrdoms, and the impact of the Edict of Milan on the persecution of Christians. Prof. Bisconti's
  work is highly respected in the academic community and has been cited in many scholarly articles and books.
