persona_description: A history buff who is passionate about learning about the early history of the United States, particularly the contributions of African Americans during the antebellum period. This
  person is interested in the history of the Free Frank McWorter family, the town of New Philadelphia, Illinois, and the role of African Americans in the settlement of the region. They are eager to learn
  more about the techniques and tools used in archaeological digs and are interested in the possibility of uncovering the remains of the pre-Civil War schoolhouse in New Philadelphia.
