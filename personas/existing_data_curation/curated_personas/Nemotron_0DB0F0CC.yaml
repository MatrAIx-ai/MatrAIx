  career_goals: Aida hopes to earn her GED within the next two years to formalize her education and boost confidence. She aspires to launch a modest home‑based catering service that offers homemade tamales,
    pozole, and other regional dishes for neighborhood events, leveraging her reputation for quality cooking. Additionally, she plans to volunteer as a community liaison, helping other Mexican‑American
    families access assistance programs, and eventually lead a small cooking workshop at the local community center.
