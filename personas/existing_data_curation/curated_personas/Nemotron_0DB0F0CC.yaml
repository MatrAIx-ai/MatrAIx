personas:
  professional: Aida Prieto, a seasoned household manager and aspiring community liaison, leverages their budgeting acumen, practical home‑repair skills, and structured approach to orchestrate weekly meals,
    manage a bustling home, and mentor neighbors, while their relaxed attitude toward rigid schedules lets them adapt to last‑minute requests.
  sports: Aida Prieto enjoys short walks in the local park, follows the city’s minor‑league baseball team the Riverside Rovers, avidly supports the semi‑professional soccer club River City FC during the
    spring season, and their competitive streak drives them to participate in community table‑tennis tournaments despite a generally reserved demeanor.
  arts: Aida Prieto listens to regional folk music ensembles like Los Tigres del Norte, watches telenovelas starring Thalía, reads Spanish‑language magazines featuring artists such as Frida Kahlo, and spends
    evenings crocheting while admiring the works of painter Diego Rivera, illustrating a deep appreciation for creative expression that balances their practical daily life.
  travel: Aida Prieto has taken weekend trips to the historic city of Puebla for its culinary scene, dreams of strolling through Seville’s Alcázar to study its architecture, prefers self‑planned itineraries
    over package tours, and balances travel aspirations with family responsibilities, often opting for short road trips to nearby state parks instead of long flights.
  culinary: Aida Prieto prepares authentic traditional dishes such as tamales, pozole, and homemade salsa using home‑grown cilantro, chilies, and tomatoes, showcases a high level of cooking skill that blends
    meticulous meal planning with spontaneous flavor experiments, and delights in sharing their food at neighborhood gatherings while occasionally over‑seasoning as a quirky habit.
  core: Aida Prieto is a pragmatic home manager who balances meticulous budgeting with a love of crocheting blankets, yet often loses track of time while perfecting recipes, showcasing a blend of structure,
    quiet competitiveness, and endearing absent‑mindedness.
background:
  cultural: Aida grew up in a Mexican immigrant household where Spanish was spoken daily and Catholic traditions guided family life. She celebrates Día de los Muertos, quinceañeras, and holiday feasts with
    extended relatives, emphasizing communal cooking and storytelling. Her identity is shaped by strong family bonds, respect for elders, and a deep appreciation for Mexican culinary heritage. Living in
    Pacoima, she is part of a vibrant Mexican‑American community that shares cultural festivals, mutual support networks, and a collective resilience in navigating life in Los Angeles County.
