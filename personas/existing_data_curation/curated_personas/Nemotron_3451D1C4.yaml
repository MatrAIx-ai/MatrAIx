  hobbies: '[''Reading (non-fiction history & science)'', ''Model Train Building'', ''Woodworking'', ''Gardening'', ''Bird Watching'', ''Fishing'', ''Puzzle Solving (crosswords, Sudoku)'', ''Listening to
    Classic Jazz'']'
  career_goals: Although nearing traditional retirement age, Hans remains driven to finish his career on a high note. He aims to secure a position among the top three sales performers in the Lee County
    region for the next fiscal year, leveraging his deep product knowledge to exceed quota targets. Simultaneously, he is pursuing a transition into a mentorship‑focused role, where he can advise younger
    sales staff and act as a subject‑matter expert for complex service contracts. In the longer term, Hans hopes to establish a part‑time consultancy that offers technical sales strategy to small businesses
    in the Midwest, allowing him to maintain a steady income while enjoying a quieter, more flexible schedule.
