  career_goals: Willie dreams of growing up to be someone who creates tools that make life easier for his family and community. He is fascinated by how things work and imagines becoming an engineer or inventor
    who designs toys, simple machines, or environmentally friendly gadgets. He also admires teachers and doctors who help others, so he sometimes pictures himself as a future teacher or a pediatrician who
    can both educate and heal. Underlying these ambitions is his desire for stability and harmony—he wants a career that lets him give back, make people proud, and keep his loved ones safe.
