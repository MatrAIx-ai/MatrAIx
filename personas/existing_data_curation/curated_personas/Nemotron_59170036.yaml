  career_goals: Approaching retirement, Jessica aims to transition from full‑time management to a consultancy role, helping boutique restaurants integrate art and design into their guest experience. She
    plans to launch a small, community‑focused café in Hickory Hills that doubles as a rotating local‑artist gallery, providing a venue for emerging talent and a platform for culinary experimentation. Additionally,
    she hopes to mentor a cohort of ten aspiring food‑service managers, publish a memoir‑style cookbook that weaves personal reflections with historic recipes, and continue driving innovative menu concepts
    that challenge conventional dining norms.
