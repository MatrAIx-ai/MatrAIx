persona_description: A computer scientist and inventor who specializes in projection technology, particularly the development of systems that can project images and videos onto objects instead of screens
  or walls. He has been working with Intel to create a system that can project images onto objects, and he believes the technology could make its way to industrial settings. He is interested in merging
  virtual reality with the real world and has developed a Holodeck system as a nod to Star Trek's virtual reality chamber. He has visited Australia and is consumed with finding ways to merge virtual reality
  with the real world in manufacturing, automotive, and defense industries.
