persona_description: A biblical scholar with a specialization in the study of New Testament texts, particularly Acts 2. This person is deeply interested in the historical and cultural context of the events
  described in the book, and is knowledgeable about the various arguments and interpretations presented by scholars regarding the role of the apostles in the early church. This person is also likely to
  be familiar with the work of J.W. McGarvey and other scholars who have investigated the question of the number of people immersed on Pentecost, and is likely to have access to relevant historical and
  archaeological data to support their arguments.
