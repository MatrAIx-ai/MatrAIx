personas:
  professional: Carlos Hardnett, a senior UX and industrial design strategist, blends rigorous design‑thinking, advanced SolidWorks and Rhino modeling, rapid prototyping, and agile leadership to craft socially
    impactful, precision‑engineered products while mentoring interdisciplinary teams toward a future consultancy for rural schools and healthcare.
  sports: Carlos Hardnett hikes the Natchez Trace each weekend, plays pick‑up basketball with the Jackson Community Club, follows the Mississippi State Bulldogs football and the New Orleans Pelicans, and
    adheres to a disciplined weekly cardio routine of trail runs and yoga for flexibility.
  arts: Carlos Hardnett frequents local jazz evenings featuring the Mississippi Jazz Collective, collects Miles Davis and John Coltrane records, devours science‑fiction by Liu Cixin and technology non‑fiction
    by Kevin Kelly, and occasionally creates digital art inspired by Beeple’s futuristic visual style.
  travel: Carlos Hardnett prefers meticulously planned trips that combine nature and culture, such as a two‑week road‑trip through the Great Smoky Mountains, a research visit to MIT’s Media Lab in Cambridge,
    and an immersive weekend in New Orleans to explore Creole cuisine and historic jazz venues.
  culinary: Carlos Hardnett enjoys cooking Southern comfort dishes like shrimp étouffée, smoked brisket, and sweet‑potato pie, often using locally sourced catfish, fresh okra, and a splash of bourbon, while
    their woodworking hobby inspires them to craft custom cutting boards and spice racks for the kitchen.
  core: Carlos Hardnett blends disciplined design leadership with a hands‑on passion for woodworking, jazz, and community mentorship, maintaining a meticulous budget and a pragmatic, stress‑resilient approach
    to health and fitness.
background:
  cultural: Carlos is an African American who grew up in the close‑knit communities of Ellisville, Mississippi. His family’s roots trace back to the Great Migration, and he draws strength from the rich
    traditions of Southern Black culture—gospel music, storytelling, and a deep sense of community responsibility. These cultural influences shape his collaborative approach, his appreciation for harmonious
    interactions, and his commitment to creating designs that honor both his heritage and the practical needs of the people he serves.
attributes:
  skills: '["User Experience (UX) Design", "User Interface (UI) Design", "Industrial Design", "3D Modeling (SolidWorks, Rhino)", "Additive Manufacturing (3D Printing)", "Design Thinking Methodology", "Front‑end
    Development (HTML, CSS, JavaScript)", "Data Visualization", "Agile Project Management (Scrum)", "Usability Research & Testing"]'
  hobbies: '["Woodworking and Furniture Craft", "Reading Science‑Fiction & Tech Nonfiction", "Hiking and Nature Exploration", "Attending Local Jazz Sessions", "Mentoring Youth in Tech Workshops", "Puzzles
    and Chess", "Digital Art Creation"]'
  career_goals: Carlos aims to step into a senior leadership role such as Design Director, where he can guide interdisciplinary teams to create socially impactful products. He envisions launching a consultancy
    that partners with rural schools and healthcare providers in the Deep South to develop affordable, technology‑enabled solutions. Long‑term, he hopes to mentor the next generation of Black designers
    and engineers, fostering a pipeline of talent from underrepresented communities.
