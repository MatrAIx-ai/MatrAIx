  hobbies: '[''Visiting art galleries'', ''Live music concerts'', ''Recreational basketball'', ''Volunteer counseling'', ''Photography'', ''Cooking Irish cuisine'', ''Hiking'', ''Toastmasters club participation'']'
  career_goals: Michael aims to advance within the insurance sector by transitioning to a claims adjuster role within the next three years, seeking certification as a Professional Insurance Adjuster (PIA).
    He aspires to lead a team of processing clerks, implementing systematic improvements that reduce turnaround times and enhance claimant satisfaction. Long-term, he envisions overseeing a regional claims
    department, where he can blend his analytical skills with his passion for helping individuals navigate complex insurance processes. He also wishes to integrate his artistic interests by advocating for
    workplace wellness programs that include art therapy sessions, and eventually plans to pursue a bachelor's degree in Business Administration or Risk Management to broaden his strategic capabilities.
