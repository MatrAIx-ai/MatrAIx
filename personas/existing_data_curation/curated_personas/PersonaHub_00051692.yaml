persona_description: Moritz Schlick was a philosopher and physicist born in Berlin in 1882. He returned to Berlin to complete his doctorate in physics and became the chair of Naturphilosophie at the University
  of Vienna in 1922. Schlick was interested in creating a theory of knowledge based on empirical evidence and symbolic logic, and helped advance ideas in the logic of science and ethics. He was a prolific
  essayist and contributed largely to the output of the Vienna Circle, a group that he chaired until his death in 1936. Schlick's untimely death in 1936, when he was shot by a mentally insane student of
  his, signalled the end of the Vienna Circle. He can be credited, though, with creating 'one of the most influential and lasting schools of thought in the 20th century'.
