personas:
  professional: Elvis Lewis is a seasoned HVAC mechanic and installer with over a decade of experience, adept at reading blueprints, managing project schedules, and integrating smart‑home controls, whose
    calm resilience and blend of curiosity and practicality enable them to troubleshoot complex systems while mentoring apprentices.
  sports: Elvis Lewis jogs along the St. Johns River each morning, casts a line for largemouth bass on weekends with their spouse, roots for the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp, and
    belongs to the local canoe club, balancing competitive stamina with a relaxed love for outdoor recreation.
  arts: Elvis Lewis enjoys the tactile creativity of classic car shows, frequents local vinyl shops for tracks by Stevie Ray Vaughan and B.B. King, watches classic films starring Humphrey Bogart, and sharpens
    strategic thinking at community‑center chess tournaments where they admire grandmaster Garry Kasparov’s playbook.
  travel: Elvis Lewis prefers road‑trip adventures, having explored the historic streets of St. Augustine, the sun‑drenched Keys, a weekend getaway to Asheville’s mountain crafts scene, and they dream of
    a future eco‑tour of Iceland to study geothermal heating solutions.
  culinary: Elvis Lewis relishes grilling smoked pork ribs with a hickory‑infused dry rub, perfecting a side of charred corn on the cob and a tangy homemade BBQ sauce, while their DIY spirit extends to
    experimenting with sous‑vide chicken thighs and a secret love for crafting craft beer with local hops.
  core: Elvis Lewis is a calm, curious HVAC expert who balances hands‑on tinkering with strategic ambition, blending practical know‑how with a competitive edge and a love for backyard grilling.
background:
  cultural: Elvis grew up in Jacksonville’s Northside, a neighborhood with a strong African‑American heritage and close‑knit community ties. His family emphasized perseverance, education, and service, values
    that have guided his career in the trades. He regularly participates in local cultural events such as Juneteenth celebrations and church gatherings, where music ranging from gospel to soul forms a backdrop
    to family reunions. These experiences have fostered a deep appreciation for Southern cuisine, storytelling, and the importance of generational mentorship, which he now brings to his work and community
    outreach.
attributes:
  skills: '[''HVAC system installation'', ''Diagnostic and troubleshooting'', ''EPA Certified refrigerant handling'', ''Blueprint and schematics reading'', ''Energy‑efficiency retrofits'', ''Digital controls
    and smart‑home integration'', ''Electrical wiring and motor repair'', ''Customer communication and service'', ''Project scheduling and crew coordination'', ''Apprentice training and mentorship'']'
  hobbies: '[''DIY electronics tinkering'', ''Arduino temperature sensor projects'', ''Early morning jogging'', ''Fishing on the St. Johns River'', ''Barbecue cooking'', ''Attending local car shows'', ''Playing
    chess'', ''Mentoring youth in vocational programs'', ''Exploring smart‑home tech'', ''Listening to classic soul and jazz music'']'
  career_goals: Elvis aims to earn the NATE Master Technician credential within the next two years and obtain his state contractor’s license so he can launch his own HVAC firm focused on high‑efficiency
    and smart‑home solutions. He is driven to become a recognized leader in Jacksonville’s trades community, offering mentorship programs for aspiring black technicians and growing a business that balances
    profitability with reliable, customer‑focused service. Long‑term, he envisions expanding into solar‑assisted HVAC installations to provide greener options for residential customers.
