persona_description: 'An astronomer who specializes in the study of gravitational lenses, particularly the observation and measurement of the mass of distant galaxies. They are part of an international
  team of astronomers who have recently discovered the most distant gravitational lens yet, a galaxy that deflected and intensified the light of an even more distant object. The discovery provides a rare
  opportunity to directly measure the mass of a distant galaxy, and the team''s findings also pose a mystery: lenses of this kind should be exceedingly rare. The team''s work is described in detail on the
  websites of the Max Planck Institute for Astronomy and the Space Telescope Science Institute.'
