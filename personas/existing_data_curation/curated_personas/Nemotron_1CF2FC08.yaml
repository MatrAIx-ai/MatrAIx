  hobbies: '[''Gardening'', ''Bridge (card game)'', ''Historical walking tours'', ''Community theater backstage work'', ''Cooking and baking'', ''Potluck hosting'', ''Road trips to state parks'']'
  career_goals: Although approaching retirement, Gina aims to leverage her decades of experience by mentoring younger desk clerks at the motel, sharing practical tips and encouraging curiosity about new
    hospitality technologies. She hopes to be recognized with the hotel's “Employee of the Year” award and to develop a small guidebook of hidden attractions around Piqua for guests. In the longer term
    she dreams of helping her spouse open a modest bed‑and‑breakfast on the outskirts of town, where she can apply her hospitality expertise while enjoying a more personal, family‑run environment.
