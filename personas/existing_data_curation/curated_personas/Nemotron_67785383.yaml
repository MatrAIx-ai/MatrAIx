  hobbies: '[''Reading adventure/fantasy books'', ''Drawing animals and nature scenes'', ''Birdwatching'', ''Collecting leaves and nature journaling'', ''Helping in the garden'', ''Baking cookies with mom'',
    ''Playing board games'', ''Building LEGO structures'', ''Solving puzzles'', ''Conducting simple science experiments'']'
  career_goals: Mary dreams of a future where she can help and nurture others. She often says she wants to become a teacher or a school counselor so that every child feels safe and understood. She is also
    fascinated by animals and imagines a career as a veterinarian or wildlife caretaker. In the short term, she enjoys being the class helper, leading group projects, and assisting younger students with
    reading. She hopes to strengthen her empathy and organizational skills so she can guide others through challenges, foster harmony, and support emotional well‑being in her community.
