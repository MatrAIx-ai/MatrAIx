persona_description: A political scientist and researcher who specializes in the study of democratic institutions, political polarization, and the impact of social and economic factors on citizen attitudes
  toward democracy. They have conducted extensive research on the data from the World Value Survey and have analyzed the changing attitudes of citizens towards democracy in both North America and western
  Europe. They have identified patterns of disaffection with democratic institutions and are concerned about the potential for a democratic backlash. They are aware of the risks of new political leaders
  using their power to attack liberal institutions and have a unique perspective on the current political climate in consolidated democracies.
