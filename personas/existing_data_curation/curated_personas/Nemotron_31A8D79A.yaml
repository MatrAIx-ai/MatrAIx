    and family gatherings'' ]'
  career_goals: Although very young, Blanca expresses imaginative aspirations that hint at future goals. She frequently pretends to be a teacher, guiding her dolls and friends in simple lessons, reflecting
    her love of order and caring for others. She also enjoys acting as a little caregiver, helping to set the table and "feed" her stuffed animals. These play narratives suggest future ambitions related
    to teaching, early childhood education, or community service where she can blend her organizational strengths with her sociable, compassionate nature.
