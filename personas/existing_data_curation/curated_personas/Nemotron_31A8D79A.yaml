personas:
  professional: Blanca Santana, a three‑year‑old ‘mini‑manager’, runs a tidy ‘office’ in the playroom where they line up stuffed animals by size, hand out pretend assignments, and enforce nap‑time schedules
    with cheerful authority.
  sports: Blanca Santana, a member of the Little Sprouts Soccer Academy, eagerly chases the bright orange ball during Saturday practices, proudly wears the hometown Falcons’ jersey while cheering at games,
    and can often be found sprinting around the backyard with a tiny foam bat for imaginary baseball matches.
  arts: Blanca Santana, an avid fan of Sesame Street and The Wiggles, spends afternoons dancing to “Rubber Duckie” and creating colorful chalk murals of Elmo and Dorothy the Dinosaur on the driveway, while
    occasionally watching Pixar’s “Toy Story” for the animated delights.
  travel: Blanca Santana, who thrives on structured itineraries, enjoys family trips to the nearby city zoo where they follow a printed map of animal habitats, delights in a weekend stay at the theme park
    in Orlando with scheduled snack breaks, and hopes to one day explore the pastel‑colored streets of Barcelona for a future family vacation.
  culinary: Blanca Santana, a self‑declared connoisseur of comfort food, relishes creamy macaroni‑and‑cheese, banana‑flavored pancakes topped with a drizzle of honey, and perfectly cut apple slices arranged
    in rows, often insisting that the silver spoon be placed exactly three inches from the edge of the plate before a bite.
  core: Blanca Santana, a three‑year‑old with a love for order, boundless energy, and bright social charm, turns every playtime into a meticulously scheduled adventure while never passing up a chance to
    chase a new song or a bouncing ball.
background:
  cultural: Blanca is raised in a bilingual Puerto Rican household in Collingswood, New Jersey. At home she hears Spanish and celebrates Puerto Rican traditions such as cooking dishes like mofongo and arroz
    con gandules, listening to bomba and plena music, and observing holidays like Día de la Constitución and local Puerto Rican festivals. Family gatherings often involve extended relatives, storytelling,
    and dancing, fostering a strong sense of cultural pride. In her preschool she interacts with children from diverse backgrounds, reinforcing her sociable nature while maintaining the rich cultural influences
    of her heritage.
attributes:
  skills: '[ ''Basic language and communication'', ''Fine motor coordination (drawing, block building)'', ''Routine adherence and organization'', ''Cooperative play and emerging leadership'', ''Emotional
