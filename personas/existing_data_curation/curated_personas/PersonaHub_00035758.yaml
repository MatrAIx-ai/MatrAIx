persona_description: A linguist who specializes in the reconstruction of extinct languages, particularly those of the Algonquian family, and has worked on the Virginia Algonquian language. He has translated
  scenes from the film "The New World" into the language, and is currently working on other language restoration projects. He has also collaborated with Old Dominion University and Helen Rountree to develop
  a dictionary of the language.
