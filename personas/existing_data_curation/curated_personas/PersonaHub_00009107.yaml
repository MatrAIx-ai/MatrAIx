persona_description: A climatologist with expertise in atmospheric influences on oceanic and atmospheric systems, particularly in the context of sea ice dynamics and climate change. This person is likely
  interested in the study of atmospheric conditions that contribute to the anomalous decay of Antarctic sea ice in 2016. They may be interested in understanding the relationship between atmospheric flow
  patterns and the early onset of the melt season, as well as the feedback effects that lead to the rapid decrease in Antarctic sea ice area and extent. They would be familiar with the use of ECMWF Interim
  reanalysis data and the correlation between atmospheric flow patterns and the observed sea ice conditions in the Antarctic.
