personas:
  professional: Brian Durham, a one‑year‑old who spends hours arranging wooden blocks into identical towers, already displays methodical planning and practical problem‑solving that hint at a future in engineering,
    preferring routine and calm focus over abstract play.
  sports: Brian Durham, a one‑year‑old who delights in crawling races across the living‑room carpet along a fixed route, watches the local youth soccer club the River City Strikers on television, and occasionally
    joins a small toddler playgroup at the community center’s mini‑gym, preferring solitary activity but showing gentle assertiveness when choosing his favorite toy.
  arts: Brian Durham, a one‑year‑old who hums along to the classic lullaby 'Brahms’ Lullaby' and giggles at Sesame Street characters like Elmo, enjoys the bright colors of simple picture books and the soothing
    melodies of Disney’s 'When You Wish Upon a Star', favoring familiar tunes and visuals over new artistic experiences.
  travel: Brian Durham, a one‑year‑old who has visited his grandparents' farm in Willow Creek and the city’s downtown aquarium, prefers short trips with a predictable schedule, insists on using his favorite
    car seat and blanket, and feels most comfortable in small, familiar company.
  culinary: Brian Durham, a one‑year‑old who favors plain mashed sweet potatoes, banana puree, and occasional chicken nuggets, consistently requests the same soft‑spoon for feeding and resists trying new
    foods, demonstrating a practical, routine‑driven palate with a hint of assertive self‑interest.
  core: Brian Durham, a one‑year‑old who thrives on routine, calm resilience, and familiar comforts, turns everyday block‑building, piggy‑bank coins, and bedtime soothing into his personal world of predictable
    joy.
background:
