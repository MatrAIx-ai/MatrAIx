  career_goals: Steven aims to step into a regional leadership role where he can influence large‑scale residential and commercial projects across the Mid‑Atlantic, championing sustainable and technology‑driven
    construction. He plans to earn his LEED AP credential and a PMP certification within the next two years, positioning himself to launch a boutique consultancy that merges construction efficiency with
    artistic design. Mentoring the next generation of tradespeople and preserving historic waterfront structures are also central to his legacy goals, while he envisions a gradual transition toward semi‑retirement
    that still allows him to consult on innovative, high‑impact builds.
