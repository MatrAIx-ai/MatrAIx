  career_goals: Charles dreams of becoming a firefighter because he admires the clear structure, teamwork, and community service the job provides. He also imagines exploring space as an astronaut, inspired
    by science shows that blend order with adventure. On a more everyday level, he hopes to play basketball at a professional level like his favorite NBA players, and he sometimes pictures himself on stage
    as a rapper or singer sharing stories from his neighborhood. These ambitions reflect his love for both organized roles and the excitement of creative freedom.
