personas:
  professional: Charles Williams, a seven‑year‑old budding architect, channels their love for building elaborate LEGO structures into early engineering play, tackling each set with a methodical step‑by‑step
    plan while still sprinkling in spontaneous, imaginative twists that keep the creations fresh.
  sports: Charles Williams, a seven‑year‑old with a passion for soccer and basketball, joins the local park’s youth soccer league and attends after‑school basketball drills with the community Bayou Hoops
    club, idolizing the New Orleans Pelicans’ Ja Morant and cheering for the New Orleans Saints on game days, while also loving spontaneous explorations of the nearby bayou trails for nature‑themed fitness
    challenges.
  arts: Charles Williams, an imaginative creator, spends afternoons drawing comic strips inspired by the humor of Spongebob Squarepants and the storytelling style of Pixar’s Toy Story, while listening to
    hip‑hop legends like Kendrick Lamar and R&B icons such as Beyoncé, and compiles a collection of LEGO masterpieces that double as kinetic art installations.
  travel: Charles Williams loves road trips to the family’s swamp‑side cabin in the bayou, weekend visits to the bustling streets of New Orleans, a dream vacation to Disney World in Florida, and an imagined
    adventure to the Eiffel Tower in Paris after reading about it in a picture book, balancing structured planning with spontaneous day‑trip cravings.
  culinary: Charles Williams enjoys helping in the kitchen on weekends, sprinkling in chopped shrimp, andouille sausage, and okra into family gumbo and jambalaya, while also experimenting with making simple
    peanut butter‑banana sandwiches and dreaming of tasting sushi rolls after a cartoon episode about Japan.
  core: Charles Williams is a structured‑yet‑impulsive seven‑year‑old who builds LEGO castles by day, scores soccer goals by afternoon, and sneaks extra candy at night, all while navigating allergies and
    dreaming of distant adventures.
background:
  cultural: Charles grows up in a close‑knit African‑American family in Westwego, Louisiana, where Southern hospitality, church gatherings, and Creole cuisine shape daily life. He regularly attends a Baptist
    church, participates in Sunday school and choir, and celebrates community events like Mardi Gras that blend African, French, and Caribbean influences. Family meals feature gumbo, jambalaya, and beignets,
    and local dialects occasionally sprinkle his speech with Cajun expressions. The community’s emphasis on resilience, pride in black heritage, and strong family support informs his worldview and personal
    values.
