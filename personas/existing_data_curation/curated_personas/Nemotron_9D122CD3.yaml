personas:
  professional: Hanna Banes, a senior-center fellow and community volunteer, leverages their methodical planning, budgeting expertise, and assertive yet compassionate communication to mentor younger volunteers,
    orchestrate church events, and launch a modest home-based venture selling preserves and hand-crafted quilts.
  sports: Hanna Banes enjoys seasonal walks on regional nature trails, supports the Dallas Cowboys, Houston Astros, and Dallas Mavericks, and participates in a local senior walking club that meets twice
    a week for light cardio.
  arts: Hanna Banes immerses themselves in the arts through quilting inspired by the color palettes of Monet, listening to classic Texas singer Lyle Lovett, attending community theater productions of 'Our
    Town', and reading historical fiction by authors like Philippa Gregory.
  travel: Hanna Banes prefers carefully planned road trips, having explored the Texas Hill Country vineyards, the historic San Antonio Missions, and a nostalgic journey to Edinburgh, Scotland, to trace
    ancestral roots, while balancing budget constraints with a love for heritage sites.
  culinary: Hanna Banes excels at classic Texan cuisine, regularly preparing slow-smoked brisket, chicken-fried steak, and sweet pecan pie, using seasoned rubs of paprika, cumin, and brown sugar, and pairs
    meals with home-preserved tomatoes and pickled jalapeños they grow in their garden.
  core: Hanna Banes blends meticulous organization with quiet curiosity, nurturing a garden, quilting, genealogy, and community service while juggling hypertension, a love for hearty Texan comfort food,
    and a modest entrepreneurial spirit.
background:
  cultural: Hanna was raised in a middle-class, White Texan family in the Dallas–Carrollton area, where Southern hospitality, community involvement, and a strong work ethic were woven into everyday life.
    She grew up attending a Baptist church, which instilled values of service, compassion, and collective responsibility. The regional culture of Texas—its love for barbecue, country music, and outdoor
    recreation—shapes her preferences for cooking, gardening, and social gatherings. Although she completed only a high-school education, Hanna’s upbringing emphasized self-reliance and lifelong learning,
    encouraging her curiosity about family heritage and modern technology. Her marriage and long-standing ties to the local community reflect traditional Texan family values, while her open‑minded yet practical
    outlook mirrors the blend of progressiveness and tradition found in many suburban Dallas County residents.
