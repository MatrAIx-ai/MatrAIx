  hobbies: '["Gardening", "Cooking Texan cuisine", "Quilting", "Knitting", "Genealogical research", "Reading historical fiction", "Birdwatching", "Volunteer work at church", "Walking/Hiking", "Attending
    community theater", "Traveling to historic sites"]'
  career_goals: Looking ahead, Hanna aims to deepen her involvement in community service while channeling her love of family history into a tangible legacy. She plans to complete a local senior-center fellowship
    that will allow her to mentor younger volunteers in event organization and fundraising. Concurrently, she intends to compile and self-publish a family memoir that weaves together genealogical findings
    with personal stories, leveraging her growing proficiency with digital tools. Hanna also aspires to launch a modest home-based venture selling homemade preserves and handcrafted quilts, providing both
    creative fulfillment and supplemental income. Maintaining her health and independence remains a priority, so she sets personal goals to stay active through regular walking, yoga, and attending health
    workshops.
