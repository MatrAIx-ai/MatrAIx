    (art, science, literature)'', ''Outdoor experiential learning'', ''Adaptability to changing classroom dynamics'', ''Writing and storytelling'']'
  hobbies: '[''Painting (watercolor and acrylic)'', ''Sketching landscapes'', ''Creative writing (short stories and poetry)'', ''Reading speculative fiction and philosophy'', ''Playing acoustic guitar'',
    ''Board games (strategic)'', ''Dungeons & Dragons'', ''Stargazing and astronomy'', ''Landscape photography'', ''Hiking in Yellowstone'', ''Camping'', ''Attending local art exhibits and theater'']'
  career_goals: David aspires to become a district instructional coach or curriculum specialist, championing STEAM integration across Yellowstone County schools. He aims to develop a scalable arts-infused
    curriculum model, present his innovative practices at regional and national education conferences, and earn recognition through teaching awards. He plans to pursue a master's degree in curriculum and
    instruction within the next two years, and eventually seek a leadership role such as school principal, where he can influence school culture toward creativity, critical inquiry, and flexible learning
    environments.
