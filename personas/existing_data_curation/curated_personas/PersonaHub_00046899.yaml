persona_description: A transplant hepatologist with Keck Medicine of USC and an assistant professor of clinical medicine at the Keck School of Medicine of USC who is leading a study on early liver transplant
  for patients with severe alcohol-associated liver disease. The study aims to fill the knowledge gap by identifying red flags for relapse and tailoring interventions to prevent relapse. The persona is
  interested in understanding the factors that contribute to relapse and is seeking innovative ways to prevent relapse. The persona is likely to have a background in hepatology, transplant medicine, and
  alcohol use disorder. They are interested in evidence-based medicine and have a passion for patient care.
