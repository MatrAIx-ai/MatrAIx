personas:
  professional: A seasoned community mentor and art guide, Taneka Smith leverages their lifelong storytelling talent and keen eye for visual symbolism to lead inter‑generational gallery tours at the Somerville
    Museum and facilitate church storytelling circles, blending a relaxed, flexible approach with occasional assertive advocacy for preserving oral histories.
  sports: A gentle fitness enthusiast, Taneka Smith starts each day with a leisurely walk along the Somerville Riverwalk, joins the senior center’s Wednesday bowling league, and roots passionately for the
    Boston Red Sox while tending to their garden as a low‑impact strength routine.
  arts: A devoted lover of visual and musical arts, Taneka Smith spends hours at the Harvard Art Museums admiring works by Claude Monet and Georgia O’Keeffe, joins a neighborhood listening group for jazz
    legends like Miles Davis and John Coltrane as well as gospel icons such as Mahalia Jackson, and reads poetry by Langston Hughes and Maya Angelou to deepen their appreciation of cultural narratives.
  travel: An inquisitive traveler with a love for day trips, Taneka Smith enjoys annual visits to the historic streets of Savannah, yearly cruises to Martha’s Vineyard, and occasional train rides to the
    Berkshires for fall foliage, while dreaming of a pilgrimage to the Mississippi Delta to trace the roots of the blues they cherish.
  culinary: A master home cook, Taneka Smith prepares soul‑warming dishes such as collard greens with smoked turkey, sweet potato pie, jambalaya, and New England clam chowder, seasoning each with fresh
    herbs from their garden and using family‑handed‑down recipes to feed gatherings of friends and neighbors.
  core: Taneka Smith blends a lifelong love of storytelling, gardening, and soulful cooking with a relaxed, sometimes forgetful approach to obligations, using their keen artistic eye and community spirit
    to keep traditions alive well into their nineties.
background:
  cultural: Taneka is an African‑American who grew up during the tail end of segregation and the civil‑rights era. Her parents were part of the Great Migration, moving from the rural South to Boston in
    the 1940s. She was raised in a close‑knit Black community where church, music, and family storytelling were central. The cultural traditions of Southern soul food and gospel music were woven into her
    upbringing, while her later life in Somerville exposed her to a diverse, progressive environment that encouraged artistic exploration. Taneka values her heritage, preserving family recipes, oral histories,
    and community bonds while also embracing the multicultural richness of her Massachusetts neighborhood.
