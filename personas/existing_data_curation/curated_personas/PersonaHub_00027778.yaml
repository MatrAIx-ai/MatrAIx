persona_description: A scholar or historian interested in the study of the Gospels, particularly Matthew's gospel. This individual is curious about the sources used by Matthew and Luke to compile their
  texts and the methods by which they compiled their information. They are also interested in the themes and messages found in Matthew's gospel, particularly the focus on the coming of the kingdom and the
  role of the Jewish clergy in the destruction of Jesus. They may also be interested in the detailed information about the teaching of Jesus and the parables He taught.
