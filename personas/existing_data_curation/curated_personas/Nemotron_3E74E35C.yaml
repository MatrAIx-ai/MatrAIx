personas:
  professional: Josue Duarte is a seasoned management analyst in Southern California’s logistics and manufacturing sectors, leveraging advanced Excel, Power BI, SQL, and Lean Six Sigma to drive data‑driven
    process improvements while their methodical, harmony‑focused nature ensures meticulously planned roadmaps and clear stakeholder communications, even as they sometimes double‑check models late into the
    night due to lingering worry about missing a detail.
  sports: Josue Duarte treks the San Bernardino mountain trails each weekend, logging routes with GPS and documenting vistas in a photo journal, while cheering for the Los Angeles Dodgers and Los Angeles
    Lakers and participating in a local hiking club that meets at the Riverside County Parks.
  arts: Josue Duarte channels creative energy into building model trains and handcrafted furniture, regularly attending performances by local theater groups such as the Riverside Playwrights and listening
    to music by Carlos Santana and Lin‑Manuel Miranda, finding that these artistic pursuits balance the analytical demands of their career.
  travel: Josue Duarte prefers meticulously planned trips, often using itineraries and GPS to explore destinations like Yosemite National Park, Santa Fe’s historic plaza, and the culinary streets of Old
    San Juan, while dreaming of a future visit to Japan’s Shinkansen lines and traditional woodworking workshops, all balanced against family time and budgeting constraints.
  culinary: Josue Duarte delights in preparing island classics such as arroz con gandules, pasteles, and tostones with exact measurements and a kitchen scale, experimenting with traditional spices like
    adobo and sofrito, and frequently sharing these dishes at gatherings with friends, though they sometimes over‑season in their enthusiasm for authenticity.
  core: Josue Duarte merges analytical precision with a love for structured hobbies and mindfulness, crafting order out of data, wood, and recipes while occasionally over‑analyzing details to the point
    of second‑guessing even their best‑crafted plans.
background:
  cultural: Josue was raised in a bilingual Puerto Rican household where Spanish was spoken at home and English in school. Family gatherings revolved around music, dance, and food—especially arroz con gandules,
    lechón, and pasteles. He maintains strong ties to the Puerto Rican community in Southern California, celebrating traditions such as Three Kings Day and participating in local festivals that showcase
    bomba and plena rhythms. His heritage informs his collaborative style, his dedication to community service, and his ability to navigate multicultural environments with empathy and respect.
attributes:
  skills: '[''Data analysis'', ''Process improvement'', ''Financial modeling'', ''Advanced Excel (Power Query, VBA)'', ''Power BI'', ''SQL'', ''ERP (SAP Business One)'', ''Lean Six Sigma'', ''Risk assessment'',
