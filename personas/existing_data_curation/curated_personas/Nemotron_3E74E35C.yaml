  hobbies: '[''Model train building'', ''Woodworking'', ''Yoga'', ''Mindfulness meditation'', ''Hiking'', ''Photo journaling'', ''Cooking Puerto Rican dishes'', ''Volunteer work at cultural center'', ''Spanish
    tutoring'']'
  career_goals: Josue aims to move into a senior leadership position, such as Director of Operations or Senior Business Analyst Lead, where he can shape strategic initiatives across the organization. Over
    the next two years, he plans to earn a Project Management Professional (PMP) certification and enroll in a part‑time Bachelor of Business Administration program to complement his practical experience.
    Long‑term, he envisions launching his own boutique consulting firm that helps small‑to‑mid‑size businesses in the Inland Empire streamline processes and improve efficiency. Throughout his career, he
    strives to be recognized as a reliable, data‑driven leader who cultivates collaborative, low‑stress work environments while preserving a healthy work‑life balance for his family.
