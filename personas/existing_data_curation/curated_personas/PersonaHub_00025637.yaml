persona_description: A United Nations official dedicated to promoting and integrating human rights into development and peace and security efforts, particularly through the Office of the United Nations
  High Commissioner for Human Rights (OHCHR). This person has extensive experience in supporting country-level actions and national processes, and has a deep understanding of the Millennium Development
  Goals (MDGs) and their implementation. They are skilled in advocating for and promoting human rights norms and principles, particularly in the context of poverty reduction strategies, policies, and budget
  processes. They are also knowledgeable about the theory and practice of human rights, and have a passion for using these principles to drive positive change.
