  career_goals: Sydney dreams of becoming a veterinarian because she loves animals and wants to help them feel better right away. She also imagines herself as a teacher one day, guiding younger kids through
    structured lessons. Her short‑term ambition is to earn good grades in science, join the school science club, and volunteer at the local animal shelter. She hopes to keep her curiosity about how living
    things work alive, and eventually study at a veterinary college.
