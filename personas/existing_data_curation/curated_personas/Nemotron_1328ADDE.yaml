personas:
  professional: Saroeun Thi, a community arts organizer and emerging illustrator, blends meticulous project management with vivid imagination to produce illustrated folktale books and to mentor older adults
    in a modest studio, while also teaching basic language skills and volunteering on heritage preservation projects.
  sports: Saroeun Thi participates in a weekly senior walking club along Waikiki Beach, enjoys occasional beach volleyball at Ala Moana, follows the University of Hawaii Rainbow Warriors football and the
    Los Angeles Lakers basketball teams, and they schedule structured fitness sessions each morning to balance their imaginative pursuits.
  arts: Saroeun Thi, an abstract watercolorist and traditional Southeast Asian weaver, draws inspiration from Monet and O'Keeffe, listens to gamelan ensembles and Debussy's piano preludes, and they regularly
    attend community craft circles where they share digital photo editing tips.
  travel: Saroeun Thi prefers meticulously planned retreats that blend artistic inspiration with solitude, having visited the rice terraces of Bali, the historic town of Luang Prabang, and the remote beaches
    of Tahiti, while they dream of exploring the coastal villages of Fiji and the art museums of Barcelona.
  culinary: Saroeun Thi, an adept home chef, crafts fusion dishes such as lemongrass‑infused fish amok with pineapple salsa and Hawaiian poke bowls spiced with kaffir lime, favoring ingredients like galangal,
    coconut milk, and fresh taro, and they experiment with traditional Southeast Asian sauces while occasionally ordering sushi for convenience.
  core: Saroeun Thi is a methodical yet wildly imaginative 57‑year‑old who channels solitary creativity into vibrant art, meticulous community projects, and a quiet competitive drive to preserve and share
    her heritage.
background:
  cultural: Born to a Cambodian family that arrived in Hawaii as refugees in the early 1970s, she grew up in a close‑knit immigrant community in Hilo before moving to Kamuela. Though she never completed
    formal schooling beyond the eighth grade, she has retained fluency in Khmer and maintains many customs of her heritage, such as celebrating the Khmer New Year, preparing dishes like amok and samlor
    machou kroeung, and practicing traditional weaving. Living in Hawaii for most of her adult life has woven Hawaiian cultural elements into her daily routine—she participates in local festivals, respects
    the concept of aloha, and incorporates native plants into her garden. Her identity reflects a harmonious blend of Cambodian roots and Hawaiian island life, which informs her artistic expression and
    community involvement.
attributes:
  skills: '[''Organizational planning and budgeting'', ''Traditional Khmer weaving and embroidery'', ''Watercolor painting'', ''Digital photo editing'', ''Cooking authentic Khmer dishes'', ''Fusion cooking
    with Hawaiian ingredients'', ''Basic Khmer language tutoring'', ''Coordinating small community events'']'
  hobbies: '[''Abstract watercolor painting'', ''Sketching and illustration'', ''Reading mythological and philosophical literature'', ''Collecting vintage postcards'', ''Gardening tropical and native plants'',
    ''Fusion cooking (Khmer-Hawaiian)'', ''Listening to traditional Cambodian music and classical piano'', ''Participating in small book clubs and craft circles'']'
  career_goals: Her primary ambition is to document and share the stories of her homeland by creating a series of illustrated folktale books that blend traditional Khmer narratives with her own imaginative
    twists. She aims to establish a modest community art studio where older adults can learn crafts and storytelling, and to become proficient in basic computer skills for digital storytelling. She also
    hopes to publish a blog that chronicles the cultural intersection of Cambodian and Hawaiian traditions, and to participate in local art exhibitions and storytelling competitions as a mentor.
