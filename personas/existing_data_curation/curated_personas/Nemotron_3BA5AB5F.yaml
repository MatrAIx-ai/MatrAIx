personas:
  professional: Corey Scott, a 35‑year‑old STEM education specialist, blends deep expertise in computer science and data analytics with a methodical, curiosity‑driven approach to curriculum design, creating
    inclusive, technology‑rich courses while reliably coordinating labs, mentoring teaching assistants, and securing grant proposals that aim to boost minority participation in tech.
  sports: Corey Scott, an energetic 35‑year‑old basketball enthusiast, competes weekly with the San Diego Hawks in the local community league, hikes the Torrey Pines and Cuyamaca trails on weekends, and
    proudly roots for the San Diego Padres while occasionally joining a weekend pickup soccer game at Balboa Park.
  arts: Corey Scott, a 35‑year‑old aficionado of jazz, hip‑hop, and neo‑soul, curates playlists featuring Kamasi Washington, Anderson .Paak, and H.E.R., attends live shows at The Observatory and Belly Up,
    reads contemporary sci‑fi novels by N.K. Jemisin and Neal Stephenson, and indulges in weekend visits to the La Jolla Museum of Contemporary Art for creative inspiration.
  travel: Corey Scott, a 35‑year‑old methodical traveler, plans detailed weekend getaways to Joshua Tree and Santa Barbara for hikes and surf, cherishes past trips to Tokyo and Lisbon for culinary and cultural
    immersion, and dreams of exploring the hiking trails of Patagonia while balancing family commitments and a modest travel budget.
  culinary: Corey Scott, a 35‑year‑old home chef, loves preparing Southern soul food classics like fried chicken, collard greens, and cornbread for family gatherings, experiments with sous‑vide pork ribs
    and homemade hot sauce using smoked paprika and okra, and frequently pairs meals with fresh, locally sourced produce from San Diego’s farmers markets.
  core: Corey Scott, a 35‑year‑old organized educator and community‑focused basketball player, balances data‑driven teaching, soulful cooking, and late‑night jazz listening, occasionally sacrificing sleep
    for grant deadlines but always making time for mentorship and family.
background:
  cultural: Corey is an African‑American who grew up in a close‑knit extended family with deep roots in the Southern United States. His parents emphasized the importance of education, community service,
    and cultural pride, celebrating traditions such as Juneteenth, soulful cooking, and gospel music. Living in Escondido, he bridges his heritage with the diverse, multicultural atmosphere of Southern
    California, actively participating in the local Black faculty association and partnering with community organizations to support Black youth in STEM. His cultural identity informs his commitment to
    mentorship, social equity, and fostering an inclusive environment both in and out of the classroom.
