  career_goals: Corey aims to transition into a tenure-track position, earn a Ph.D. in Computer Science, and become a leader in interdisciplinary STEM education. He aspires to secure research funding for
    projects that increase underrepresented minority participation in tech fields, develop community outreach programs that bring coding workshops to local high schools, and eventually serve as department
    chair or dean, shaping institutional policies that promote equity and innovation. Additionally, he seeks to publish scholarly articles on effective teaching practices and contribute to open-source educational
    resources.
