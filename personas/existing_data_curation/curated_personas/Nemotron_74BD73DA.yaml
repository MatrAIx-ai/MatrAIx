personas:
  professional: Catherine Robbins thrives in fast‑paced hospitality settings, leveraging their methodical organization, precise order accuracy and cash handling to keep the floor running like clockwork
    while using their sociable nature to de‑escalate guest issues and their competitive edge to consistently exceed upselling targets and mentor new staff.
  sports: Catherine Robbins fuels their energy through spin and Zumba classes at the downtown Raleigh Fit Club, hikes the Blue Ridge Parkway every other weekend, supports the Carolina Hurricanes in the
    NHL and the NC State Wolfpack basketball team, and caps off the week with a calming Vinyasa yoga session at a local studio.
  arts: Catherine Robbins lights up the stage with the Raleigh Little Theatre’s community productions, especially enjoying roles in modern revivals of ‘Hamilton’ and ‘The Glass Menagerie’, while their downtime
    is filled with strategic board‑game nights featuring Catan and Risk and listening to Beyoncé’s latest album and Lin‑Manuel Miranda’s original soundtracks for inspiration.
  travel: Catherine Robbins prefers meticulously planned weekend getaways, often backpacking the Blue Ridge trails to Asheville, savoring Southern comfort in New Orleans’ French Quarter, and dreaming of
    a future solo trip to Kyoto to explore its culinary temples, all while budgeting through a travel‑expense spreadsheet and using points from a travel rewards credit card.
  culinary: Catherine Robbins experiments in the kitchen by reimagining classic Southern fare—such as miso‑infused shrimp and grits, fried chicken served with kimchi slaw, collard greens tossed with kale
    and smoked paprika, and sweet‑potato pie topped with a matcha‑crusted crumble—honing a solid intermediate skill set that blends comfort with global flavors.
  core: Catherine Robbins is a methodically competitive hospitality professional who balances a relentless drive for order with a vibrant social life, channeling stress into organized fitness, community
    theater, and inventive Southern cooking, while occasionally succumbing to a penchant for late‑night board‑game marathons.
background:
  cultural: Catherine grew up in a middle‑class, suburban neighborhood of Raleigh, where Southern hospitality and a strong work ethic were emphasized. Her family valued punctuality, reliability, and community
    involvement, shaping her organized and practical outlook. While identifying with mainstream American culture, she also embraces regional traditions—favoring local cuisine, attending college football
    games, and participating in community events. This blend of Southern roots and exposure to the Research Triangle’s diverse, tech‑forward environment informs her balanced perspective on tradition and
    progressive ambition.
attributes:
  skills: '["Customer service", "Conflict resolution", "Cash handling", "POS system operation (Toast, Square)", "Multitasking under high‑pressure environments", "Inventory management", "Shift scheduling
