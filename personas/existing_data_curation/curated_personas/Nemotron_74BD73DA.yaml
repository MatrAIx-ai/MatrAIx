  hobbies: '["Group fitness classes (spin, Zumba)", "Cooking and experimenting with Southern recipes", "Competitive board games (Catan, Risk)", "Community theater acting", "Yoga for stress relief", "Hiking
    in the Blue Ridge Mountains", "Volunteering at local food banks", "Hosting dinner gatherings for friends"]'
  career_goals: Catherine aims to move from front‑of‑house service to supervisory and managerial roles within the next three years. She plans to enroll in a bachelor's program in hospitality management
    to complement her associate degree, with the goal of becoming an assistant manager and then a restaurant manager at a well‑structured, upscale establishment. Long‑term, she envisions opening her own
    boutique café in Raleigh that blends Southern comfort food with a meticulously organized service model, leveraging her competitive drive to build a reputable brand.
