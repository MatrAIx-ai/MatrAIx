  career_goals: Linda aspires to transition from full-time homemaking to a part‑time role that leverages her organizational and community‑building strengths, such as becoming a coordinator for a local senior‑center
    program or launching a small home‑based catering service featuring healthy, locally‑sourced meals. She also plans to enroll in evening courses on horticulture and nonprofit management to broaden her
    expertise and eventually serve on the town’s planning board.
