personas:
  professional: Lori English is a seasoned installation and maintenance technician who excels at diagnosing electrical, HVAC, and plumbing systems, leveraging their meticulous attention to safety and OSHA
    standards while their curious, artistic mindset fuels innovative solutions like sustainable solar retrofits.
  sports: Lori English stays active by hiking the trails of Green Bay Dells State Park, attending weekly yoga sessions at the Green Bay Yoga Collective, cheering on the Green Bay Packers during football
    season, and catching Milwaukee Brewers games when the baseball season rolls around, all while balancing a social fitness approach that values group motivation over solo workouts.
  arts: Lori English channels their creative energy through watercolor paintings of Wisconsin lakefronts inspired by the brushwork of Claude Monet, captures serene landscapes with a Nikon D3500 echoing
    the compositional elegance of Ansel Adams, strums a ukulele to the mellow tunes of Jack Johnson at community gatherings, and frequently volunteers at the local arts center where they help students discover
    the works of Frida Kahlo and Andy Warhol.
  travel: Lori English prefers immersive nature getaways and carefully planned road trips, having hiked the cliffs of Door County and explored the historic streets of Mackinac Island, while their wanderlust
    also led them to the alpine vistas of Banff National Park and the serene temples of Kyoto, balancing adventurous itineraries with a modest travel budget that prioritizes eco‑friendly accommodations.
  culinary: Lori English is a proficient home chef who delights in farm‑to‑table cooking, frequently preparing dishes such as pan‑seared trout with lemon‑dill sauce, wild mushroom risotto, and a beet and
    goat‑cheese salad featuring heirloom tomatoes and fresh basil, sourcing ingredients from the Green Bay farmers market and savoring occasional dinners at the rustic bistro The Harvest Table.
  core: Lori English fuses a hands‑on technical brilliance with a vivid artistic soul, tackling electrical puzzles by day and painting serene Wisconsin sunsets by night, all while juggling a relentless
    schedule, an unshakable love for community mentorship, and a guilty habit of hoarding extra coffee pods for late‑night project brainstorming.
background:
  cultural: Lori was raised in a tight‑knit, rural community in Oconto County, Wisconsin, where her family’s German and Scandinavian heritage has shaped values of hard work, modesty, and community service.
    Her parents emphasized volunteerism, whether through church gatherings, local fairs, or neighborhood clean‑ups, instilling in her a deep sense of responsibility toward others. Attending the local public
    high school, she participated in school clubs and community events that celebrated Midwestern traditions, such as county fairs and seasonal festivals. While honoring these roots, Lori’s innate curiosity
    has led her to explore a broad spectrum of artistic, cultural, and technological experiences beyond her hometown, blending the reliable, cooperative spirit of her upbringing with an openness to new
    ideas and unconventional thinking.
attributes:
  skills: '[''Electrical troubleshooting'', ''HVAC system maintenance'', ''Plumbing repair'', ''Preventive maintenance scheduling'', ''Blueprint and schematic reading'', ''Safety compliance and OSHA regulations'',
    ''Tool and equipment operation'', ''Customer service and communication'', ''Team collaboration and conflict resolution'', ''Renewable energy system installation (solar panels)'', ''Basic carpentry and
    woodworking'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Hiking in Green Bay Dells State Park'', ''Community theater participation'', ''Playing ukulele'', ''Volunteering at local food bank'',
    ''Reading science fiction and philosophy'', ''Cooking farm-to-table dishes'', ''Yoga and group fitness classes'']'
  career_goals: Lori aims to earn her Master Electrician certification and become a lead technician overseeing larger projects in her region. She envisions launching a small, locally owned contracting business
    that specializes in sustainable installations, such as solar energy systems and energy‑efficiency retrofits for residential homes. Passionate about mentorship, she also hopes to become a trainer for
    apprentices, sharing her hands‑on expertise and encouraging more women to enter the trade. Ultimately, Lori wants her career to blend technical excellence with community impact, fostering greener, safer
    neighborhoods while nurturing the next generation of skilled workers.
