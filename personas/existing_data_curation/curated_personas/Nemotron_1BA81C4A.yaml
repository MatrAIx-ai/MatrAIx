  career_goals: Rafael aims to secure an entry‑level software development or data‑analysis role that offers a blend of structured tasks and flexibility, enabling him to apply his programming and analytical
    skills while continuing to learn on the job. He plans to obtain a cloud‑computing certification (AWS or Azure) within the next year to broaden his employability, and he hopes to eventually launch a
    small tech startup that creates affordable digital tools for local small businesses and community organizations in the Atlanta area. In the short term, he also wants to build a solid professional network,
    achieve financial independence, and maybe pursue a part‑time graduate certificate in data science.
