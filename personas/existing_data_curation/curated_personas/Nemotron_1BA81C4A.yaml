personas:
  professional: Rafael Hernandez, a budding software developer with a knack for data analysis, leverages his bilingual communication and hands‑on problem‑solving style to deliver quick prototypes while
    juggling the occasional missed deadline due to his relaxed approach to planning.
  sports: Rafael Hernandez, a midfielder for the local amateur soccer club that shares a love for FC Barcelona and Atlanta United, hits the trails at Stone Mountain State Park for weekend hikes and cycles
    with a casual bike group that meets at the BeltLine.
  arts: Rafael Hernandez, a music enthusiast who fills his evenings with cumbia beats from Celso Piña, reggaeton tracks by Bad Bunny, and indie rock from Phoebe Bridget, and occasionally attends live performances
    at the Variety Playhouse while streaming gaming soundtracks on Twitch.
  travel: Rafael Hernandez, an adventure‑curious traveler, has explored the historic streets of Guanajuato on a backpacking trip with friends, dreams of road‑tripping down the Pacific Coast Highway, and
    prefers spontaneous weekend getaways to the Blue Ridge Mountains over meticulously planned long‑haul vacations.
  culinary: Rafael Hernandez, a home‑cook who perfects tacos al pastor with pineapple‑marinated pork and slow‑cooked mole negro featuring chocolate and chilhuacle, hosts weekly dinner parties where he pairs
    dishes with craft beers from local Atlanta microbreweries.
  core: Rafael Hernandez balances structured code and spontaneous tacos, thrives on flexibility, and occasionally lets disorganization slip into missed deadlines and forgotten dentist appointments.
background:
  cultural: Rafael grew up in a bilingual Mexican‑American household in the Atlanta metropolitan area. His parents immigrated from Jalisco, and Spanish is spoken at home alongside English, giving him fluency
    in both languages. He participates in cultural celebrations such as Día de los Muertos and Mexican Independence Day, and he maintains close ties with an extended family network that emphasizes mutual
    support and community involvement. While embracing Southern U.S. customs, he also cherishes Mexican traditions—especially food, music, and soccer—which shape his identity and inform his social interactions.
attributes:
  skills: '["Python programming", "JavaScript development", "SQL querying", "Data analysis (Excel, Tableau)", "Electronics prototyping (Arduino, Raspberry Pi)", "Hardware troubleshooting", "Bilingual communication
