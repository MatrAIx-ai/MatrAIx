personas:
  professional: Michael Dawkins is a budding teen tech enthusiast who builds simple electronic circuits, applying his practical, routine‑focused mindset to lead his school's weekly robotics club sessions,
    where they blend organization with inventive problem‑solving.
  sports: Michael Dawkins captains the Ridgefield Youth Soccer team after school, spends weekend evenings shooting hoops with the Eastside Hoops Club, and follows the Chicago Bulls and the local high‑school
    basketball league, channeling their outgoing energy into regular practices while balancing a disciplined routine.
  arts: Michael Dawkins pipes in to hip‑hop playlists featuring Kendrick Lamar and H.E.R., sways to gospel ballads by Mandisa at church youth group, and curates a growing collection of rookie basketball
    cards, which together shape their cultural identity and provide a vivid soundtrack to their after‑school hangouts.
  travel: Michael Dawkins enjoys family road trips to nearby state parks like Shenandoah and occasional weekend visits to Disney World with friends, preferring well‑planned itineraries that balance adventure
    with familiar comforts.
  culinary: Michael Dawkins favors pepperoni pizza, chicken nuggets, and homemade mac and cheese, often whipping up a banana‑strawberry smoothie after soccer practice, while they modestly experiment with
    simple recipes like chocolate chip pancakes, reflecting their practical yet explorative palate.
  core: Michael Dawkins is a routine‑loving, socially vibrant teen who balances practical organization with a love for group sports, tech tinkering, and music, while quietly wrestling with anxiety and a
    penchant for structured self‑reflection.
background:
  cultural: Michael is an African‑American teenager raised in Marietta, Georgia, where his family blends Southern Black traditions with modern urban culture. He attends a local Baptist church, celebrates
    family reunions with soul food and gospel music, and takes pride in the strong community spirit of Cobb County's Black neighborhoods. Influences from local high‑school sports culture, regional street
    festivals, and stories of the civil‑rights movement in the South shape his identity and outlook.
