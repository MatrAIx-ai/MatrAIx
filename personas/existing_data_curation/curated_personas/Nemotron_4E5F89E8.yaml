  career_goals: Michael dreams of a stable, hands‑on career that lets him protect and serve his community. He is interested in becoming a firefighter or an automotive technician, fields that combine routine,
    practical skills, and teamwork. He plans to earn a high school driver's license, take part in the local fire explorer program, and later pursue vocational training, with the long‑term ambition of mentoring
    younger kids through sports coaching or community safety workshops.
