    User 2: Hello! I''m just hanging out and trying to get over a broken relationship.

    User 1: Oh, I''m sorry to hear that. What happened?

    User 2: We just weren''t right for each other. I''m trying to focus on myself now and make the best of it.

    User 1: That''s a good attitude. It''s hard to be in a relationship that isn''t working.

    User 2: It is. But I''m learning a lot from it and I''m growing stronger.

    User 1: That''s good to hear. What are you doing to keep yourself busy?

    User 2: I''m hanging out with friends, working out, and playing video games.

    User 1: That sounds like a good way to stay busy. I''m glad you''re doing things you enjoy.

    User 2: Thank you. I''m trying to keep myself distracted and not dwell on the past.

    User 1: That''s a good idea. It''s important to move on and focus on the future.

    User 2: I agree. I''m excited to see what the future holds for me.

    User 1: I''m sure it will be great. You seem like a strong and capable person.

    User 2: Thank you. I appreciate that.

    User 1: No problem. I''m always here for you if you need anything.

    User 2: I know. Thank you. I''m grateful to have you as a friend.'
