  hobbies: '[''Painting'', ''Sketching'', ''Mixed-media collage'', ''Visiting art galleries'', ''Reading art history'', ''Book club participation'', ''Gardening'', ''Cooking'', ''Hosting dinner parties'',
    ''Volunteering at community events'']'
  career_goals: Teresa aims to transform her love of art and community into a part‑time role as a local arts coordinator or workshop facilitator, designing and leading creative programs for neighborhood
    residents. She plans to earn her GED and enroll in community‑college courses in arts administration to formalize her organizational talents. In the longer term, she envisions launching a modest home‑based
    craft studio where she can teach painting, sketching, and DIY crafts, generating supplemental income while sharing her skills. She also hopes to become a mentor for younger volunteers, passing on her
    experience in community leadership and event management.
