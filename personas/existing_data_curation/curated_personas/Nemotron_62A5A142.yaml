personas:
  professional: Teresa Cope is a budding arts coordinator who leverages her strong interpersonal communication, event‑planning acumen, and curatorial eye to design community workshops, while her talkative,
    center‑stage energy makes each program feel lively and inclusive.
  sports: Teresa Cope follows the Indiana Pacers and Indianapolis Colts, plays in a local pickleball league with the Bloomington Pickleball Club, and attends weekend yoga classes at the Hoosier Wellness
    Center to stay flexible.
  arts: Teresa Cope immerses herself in the works of Georgia O'Keeffe, Claude Monet, and contemporary painter Kehinde Wiley, regularly visits exhibitions at the Indianapolis Museum of Art, and listens to
    the folk stylings of Sufjan Stevens while sketching Hoosier landscapes.
  travel: Teresa Cope plans weekend escapes to the Great Smoky Mountains and Chicago’s vibrant art districts with meticulous itineraries, while dreaming of a springtime trip to Florence to study Renaissance
    frescoes and a spontaneous road trip to New Orleans for its music and cuisine.
  culinary: Teresa Cope enjoys cooking dishes like shrimp étouffée, Vietnamese pho, and Mediterranean mezze featuring fresh basil, thyme, and rosemary from their garden, showing moderate culinary skill
    and a penchant for blending flavors from diverse cuisines.
  core: Teresa Cope is a sociable, art‑driven community catalyst whose boundless curiosity fuels lively events, yet they sometimes overcommit and forget to pause for themselves.
background:
  cultural: Teresa grew up in a middle‑class, Midwestern household in Indiana, where community ties, modesty, and a strong work ethic were emphasized. Her family’s cultural roots trace back to German and
    Anglo‑American ancestry, reflected in traditional holiday celebrations and a love of local fairs and county festivals. The region’s emphasis on neighborly support and church involvement shaped her cooperative
    yet assertive temperament. Exposure to the rural‑suburban environment fostered an appreciation for nature, gardening, and outdoor activities, while the nearby urban centers offered occasional access
    to vibrant arts scenes. This blend of small‑town values and artistic curiosity informs Teresa’s outlook, making her both community‑focused and open to unconventional ideas.
attributes:
  skills: '[''Event planning'', ''Public speaking'', ''Community outreach'', ''Art appreciation'', ''Basic sketching'', ''Budget management'', ''Social media promotion'', ''Organizational coordination'',
