personas:
  professional: Jose Monroig is a senior draftsman with five years of BIM expertise who leverages meticulous AutoCAD, Revit, and SolidWorks skills to deliver organized, code‑compliant drawing sets, while
    channeling a competitive drive and calm resilience into mentoring junior staff and championing AI‑assisted generative design for sustainable Bay Area high‑rise projects.
  sports: Jose Monroig cycles the Coyote Hills Regional Park trails with the local Fremont Cycling Club, follows the San Jose Sharks and Golden State Warriors religiously, and joins a quick pick‑up basketball
    game at the community center on weekends, balancing competitive drive with an otherwise calm, structured fitness routine.
  arts: Jose Monroig immerses themselves in artistic expression by building intricately detailed LEGO Architecture models, attending community Día de los Muertos art installations, listening to the guitar
    work of Carlos Santana and the vocal stylings of Lila Downs, and occasionally playing chess or Go while appreciating the chiaroscuro paintings of Caravaggio.
  travel: Jose Monroig plans trips with meticulous spreadsheets, favors a mix of adventure and cultural immersion, has explored the historic streets of Oaxaca and the vineyards of Napa Valley, dreams of
    hiking the Inca Trail in Peru, and prefers short weekend getaways to the Pacific coast over spontaneous long‑haul flights, balancing family responsibilities with personal curiosity.
  culinary: Jose Monroig cooks traditional mole with ancho, pasilla, and chocolate, rolls tamales using masa and pork relleno, experiments with homemade salsa verde featuring tomatillos and cilantro, and
    enjoys evaluating the perfect corn tortilla texture, while they often host dinner gatherings where they showcase their precise plating skills and occasionally over‑salt a dish in pursuit of flavor perfection.
  core: Jose Monroig is a methodical BIM specialist who blends competitive precision with serene mindfulness, channeling family‑rooted traditions into meticulous drafting, disciplined finances, and a creatively
    expressive lifestyle.
background:
  cultural: Jose grew up in a Mexican immigrant household in the San Francisco Bay Area, speaking Spanish at home while attending English‑medium schools. His parents emphasized hard work, education, and
    close family ties, which instilled a strong sense of responsibility and pride in his cultural roots. He regularly participates in community events such as Día de los Muertos celebrations and enjoys
    traditional Mexican music and cuisine. Living in Fremont, a diverse suburb with a large Asian and Hispanic population, Jose blends his Mexican heritage with the technology‑driven atmosphere of the Bay
    Area, valuing both cultural tradition and modern innovation.
attributes:
  skills: '["AutoCAD", "SolidWorks", "Revit", "Building Information Modeling (BIM)", "2-D drafting", "3-D modeling", "Construction blueprint creation", "California building code compliance", "Survey data
    integration", "Version control and drawing set organization", "Workflow optimization", "Materials specification knowledge", "Technical documentation", "Quality control procedures"]'
  hobbies: '["Scale model building (architectural kits, LEGO Architecture)", "Cycling on Bay Area trails", "Mindfulness walking", "Chess", "Go", "Strategic board games", "Cooking Mexican cuisine (mole,
    tamales)", "Volunteering at local Mexican cultural center", "Listening to tech podcasts", "Experimenting with programming automation scripts", "3D printing hobby"]'
  career_goals: Jose aims to advance from a senior drafter to a lead BIM manager within the next three years, overseeing multidisciplinary design teams on high‑rise and sustainable projects in the Bay Area.
    He plans to obtain professional certifications such as Autodesk Certified Professional and pursue a Project Management Professional (PMP) credential to strengthen his ability to coordinate large‑scale
    construction initiatives. Jose is also interested in integrating emerging technologies like generative design and AI‑assisted drafting to improve efficiency. Ultimately, he envisions a role where he
    can shape design standards, mentor junior drafters, and contribute to environmentally responsible building practices.
