  career_goals: Although retired from full‑time employment, Keiera aims to continue mentoring younger managers in her community, sharing her practical knowledge of operations and people management. She
    hopes to spearhead a senior‑focused volunteer program at the local community center, creating structured activities that promote social connection and wellbeing. Additionally, she wishes to document
    and preserve the history of Black entrepreneurship in Walterboro, contributing to local archives and educational workshops.
