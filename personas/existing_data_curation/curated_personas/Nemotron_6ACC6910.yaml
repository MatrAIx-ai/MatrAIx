personas:
  professional: Keiera Fletcher leverages three decades of retail and community‑service management experience, and they mentor emerging supervisors, spearhead senior‑focused volunteer programs, and meticulously
    document Walterboro’s entrepreneurial heritage, all while applying a practical, structured, and people‑centric leadership style.
  sports: Keiera Fletcher participates in the Walterboro Senior Walking Club and joins the Lowcountry Golden Years pickleball league, they enjoy cheering for the Charleston RiverDogs during summer baseball,
    and they keep active through weekly garden work and community dance nights, balancing gentle cardio with occasional light resistance training.
  arts: Keiera Fletcher immerses themselves in the church choir, delighting in beloved gospel hymns such as "Amazing Grace" and contemporary spirituals, they participate in a quilting circle that revives
    classic American quilt patterns, and they unwind with historical fiction by authors like Barbara Kingsolver and Philippa Gregory, allowing the narratives of the South to enrich their creative outlook.
  travel: Keiera Fletcher prefers short, well‑planned road trips to historically rich destinations within a few hours' drive, such as Charleston’s historic district, Savannah’s riverfront, and Beaufort’s
    preserved plantation homes, they enjoy guided tours that blend history and local cuisine, but they avoid spontaneous travel that could disrupt their routine.
  culinary: Keiera Fletcher delights in preparing classic Southern comfort foods such as fried catfish, collard greens seasoned with smoked turkey, buttery cornbread, and peach cobbler, they expertly blend
    fresh herbs like thyme, sage, and basil into family recipes, and they enjoy sharing these dishes at community potlucks, although they sometimes over‑salt their gumbo while engrossed in conversation.
  core: Keiera Fletcher blends structured practicality with vibrant community spirit, balancing meticulous budgeting, diligent health routines, and a love for gardening, choir, quilting, and Southern cooking
    while occasionally indulging in forgetfulness and over‑seasoned gumbo.
background:
  cultural: Keiera’s cultural identity is rooted in a rich African‑American heritage that spans several generations in the Lowcountry of South Carolina. Her family traces its lineage to the Gullah/Geechee
    communities, preserving traditions of storytelling, music, and communal solidarity. The church has been a central pillar, shaping values of cooperation, hospitality, and service. Growing up during the
    civil rights era, she witnessed both challenges and triumphs that instilled a deep sense of resilience and pride. These cultural influences continue to inform her community involvement, culinary tastes,
    and commitment to preserving local Black history.
