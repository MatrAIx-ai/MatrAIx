    short stories'', ''Playing board games with friends'', ''Listening to science/philosophy/art podcasts'', ''Attending local art gallery openings'']'
  career_goals: Christopher aims to transition from front‑line support to a role that blends his people‑skills with his creative interests, such as Customer Experience Manager or UX Researcher. He plans
    to complete his bachelor's degree in Communications or Human‑Centered Design while building a portfolio of service‑design projects. Long‑term, he envisions leading a cross‑functional team that crafts
    innovative, user‑focused solutions for a tech‑driven company, ultimately shaping how products and services anticipate and delight customers.
