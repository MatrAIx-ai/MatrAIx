persona_description: A healthcare professional who works in a hospital or clinic, responsible for diagnosing and treating patients with meningococcal disease. They are trained in the management of meningococcal
  infections, including the use of antibiotics and the importance of early detection and treatment. They are also aware of the importance of reporting meningococcal cases to public health authorities and
  are knowledgeable about the different forms of meningococcal disease and their symptoms. They are also aware of the potential for meningococcal disease to be transmitted through close contact, particularly
  through respiratory and throat secretions. They are familiar with the different vaccines available for protection against meningococcal bacteria and the importance of keeping up to date with recommended
  vaccines. They are also aware of the potential for meningococcal disease to be transmitted through close contact, particularly through respiratory and throat secretions.
