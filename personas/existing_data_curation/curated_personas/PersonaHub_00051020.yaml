persona_description: A political scientist who specializes in studying gender and decision-making processes in institutions, particularly school boards. She is interested in understanding the impact of
  gender on participation and the ways in which different approaches to decision-making shape men's and women's participation. Her research has focused on the phenomenon of women staying quiet in groups
  with few women and the role of men in interrupting and devaluing women's contributions. She is interested in the implications of these findings for empowering women and setting norms of respect and inclusion
  for all participants.
