personas:
  professional: Sara Dugas, a 21‑year‑old child and family social worker with a bachelor’s in humanities, applies a rigorously organized, evidence‑based case management style—balancing curiosity about systemic
    issues with a pragmatic, skeptical eye—while they ambitiously target an MSW and future leadership roles in child‑welfare policy.
  sports: Sara Dugas, an avid bird‑watcher and occasional jogger, follows the Ohio State Buckeyes football season, roots for the Cleveland Browns, and they participate in a local nature‑trail running club
    that meets bi‑weekly for 5‑k runs, balancing solitary trail time with occasional community sports viewings.
  arts: Sara Dugas, a quiet poet and classic‑literature enthusiast, writes reflective verses they share only with a small circle, regularly revisits the works of Emily Dickinson and James Joyce, sketches
    nature photos akin to Ansel Adams, and they listen to the folk tones of Sufjan Stevens while knitting simple scarves.
  travel: Sara Dugas, a meticulous planner, prefers solo retreats to tranquil spots such as the Hocking Hills State Park and they have a wish‑list entry for the historic villages of the Loire Valley, arranging
    each trip around a detailed itinerary that prioritizes quiet history sites over crowded tourist hubs.
  culinary: Sara Dugas, a methodical home‑cook, cultivates a small herb garden of basil, thyme, and rosemary which they incorporate into simple yet precise recipes like lemon‑thyme roasted chicken, homemade
    ratatouille, and herb‑infused oatmeal, while they enjoy occasional visits to the local farmer’s market for fresh produce.
  core: Sara Dugas blends disciplined curiosity with a love for solitary order, turning meticulous case notes, budget spreadsheets, and garden rows into the quiet scaffolding of a driven, yet introverted,
    future social‑service leader they aspire to become.
background:
  cultural: Sara identifies as white with a mixed Midwestern American and French-Canadian heritage, reflected in her Dugas surname that traces back to Quebec roots. She grew up in Newark, Ohio, a predominantly
    white, small-city environment in Licking County, where community ties and a strong work ethic are valued. Her family emphasized education and public service, encouraging her to pursue a career that
    helps others. While her upbringing included occasional Catholic traditions, she now considers herself culturally secular, appreciating the inclusive community values of the region. Sara’s cultural background
    informs her respect for individual privacy, self-reliance, and a pragmatic approach to problem-solving, all of which shape her professional practice and personal interests.
