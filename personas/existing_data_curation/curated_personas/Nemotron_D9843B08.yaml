  hobbies: '["Reading (Classic & Modern Literature)", "Poetry Writing", "Journaling", "Nature Photography", "Birdwatching", "Herb Gardening", "Puzzle Solving (Crosswords, Jigsaws)", "Knitting", "Local History
    Research"]'
  career_goals: She aims to earn a Master of Social Work (MSW) within the next two years and obtain her Licensed Clinical Social Worker (LCSW) credential. In the medium term, Sara aspires to become a supervisory
    case manager and eventually a director of child welfare services for a regional nonprofit or county agency, where she can design and implement evidence-based programs that improve family reunification
    outcomes. She is also interested in influencing state child protection policy through research and advocacy, and she hopes to author a guidebook on best practices for school-based social work. Her competitive
    drive pushes her to seek leadership opportunities, present at professional conferences, and secure competitive grant funding for innovative pilot projects.
