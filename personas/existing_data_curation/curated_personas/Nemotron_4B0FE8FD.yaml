personas:
  professional: Michael Cooper is a seasoned janitorial specialist who leverages his hands‑on expertise in building maintenance, floor care, and minor repairs while weaving his curiosity about local art
    into practical recommendations for gallery owners, and they naturally step into a leadership role on shift schedules thanks to their outgoing, team‑oriented nature.
  sports: Michael Cooper fuels their fitness through weekly pickup basketball games at the community center, beach volleyball on Saturday mornings, membership in a local adult league, and cheers for the
    Miami Dolphins on Sundays while occasionally catching Florida Panthers games on TV, and they embody a relaxed yet consistent approach to staying active.
  arts: Michael Cooper immerses themselves in Lake Worth’s vibrant art scene, frequenting the Street Art Festival, chatting with muralist Leo Fernandez about color theory, exploring galleries featuring
    works by regional painters like Rosa Gonzales, and they live for classic rock nights playing tracks from Led Zeppelin and The Rolling Stones, which blend their love for community and creative expression.
  travel: Michael Cooper prefers spontaneous, family‑focused getaways, taking weekend fishing trips to the Florida Keys, beach walks in Sarasota, and dreaming of a road trip to New Orleans for its jazz
    and mural districts, balancing budget constraints with a love for coastal adventures.
  culinary: Michael Cooper is a competent backyard griller who loves tossing spiced shrimp skewers, smashing homemade burgers with caramelized onions, and serving grilled corn seasoned with chili‑lime butter,
    often pairing their meals with craft beer while they swap recipes with neighbors at neighborhood cookouts.
  core: Michael Cooper is a curious, easy‑going facilities caretaker who blends a love for art, sports, and barbecues into a community‑centric lifestyle, juggling a GED pursuit with dreams of launching
    a gallery‑focused cleaning business, and they often volunteer at local art events.
background:
  cultural: Michael is a white, working‑class Floridian whose family roots trace back to mid‑Atlantic states, with Irish and German ancestry. He grew up in a modest suburb of South Florida and moved to
    Lake Worth as a young adult, drawn by the coastal lifestyle and affordable housing. The region’s blend of Southern hospitality, Caribbean rhythms, and Latin American flavors has shaped his outlook—he's
    comfortable navigating a multicultural neighborhood, picking up Spanish greetings, and enjoying Cuban coffee. He identifies with the pragmatic, hard‑working ethic of his upbringing, values family, and
    often attends a local Methodist church. His cultural identity is a mix of traditional American values and the eclectic, arts‑friendly vibe of his coastal community.
