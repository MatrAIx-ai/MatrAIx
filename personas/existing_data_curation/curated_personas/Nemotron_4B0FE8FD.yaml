  hobbies: '[''Visiting local art galleries and street art festivals'', ''Pickup basketball and beach volleyball'', ''Fishing and beach outings with family'', ''Attending live music events and classic rock
    listening'', ''Participating in neighborhood clean‑up drives'', ''Watching Miami Dolphins and Florida Panthers games'', ''Cooking barbecues for friends and neighbors'', ''DIY home improvement projects'',
    ''Taking night classes for GED and art history'', ''Socializing at block parties and community events'']'
  career_goals: Michael aims to progress from janitor to building supervisor or facilities manager within the next five years. He plans to earn his GED and pursue a certification in facilities management
    through a local community college. He also dreams of eventually starting a niche cleaning business that specializes in servicing art galleries and studios, leveraging his art appreciation and cleaning
    expertise. He wants to provide a more stable, higher‑earning future for his wife and children, and to be recognized as a reliable, knowledgeable caretaker of community spaces. He values flexibility
    and wants a role that still allows him to interact with people and stay involved in local cultural events.
