personas:
  professional: Mark Schafer is a recent industrial engineering graduate who applies Python automation, SQL analytics, and SAP‑driven lean strategies to streamline workflows, while methodically planning
    to earn a Six Sigma Black Belt and an MBA in Operations Management within five years.
  sports: Mark Schafer rides with the Lake Breeze Cycling Club along the Lake Michigan shoreline, follows the Chicago Bears and the Chicago Cubs, and incorporates weekly strength‑training sessions at a
    local gym to complement endurance training.
  arts: Mark Schafer builds detailed aircraft and ship model kits, crafts precise wooden furniture, draws artistic inspiration from Andy Warhol and Bob Dylan, and devotes weekend evenings to strategy board
    games with a tight‑knit group of friends.
  travel: Mark Schafer prefers low‑key road trips, meticulously mapping routes to historic lighthouses on the Upper Great Lakes, and dreams of a summer immersion in Japan’s model‑kit culture and advanced
    manufacturing hubs.
  culinary: Mark Schafer cooks simple, wholesome meals such as grilled lake trout with quinoa, roasted root vegetables, and fresh garden salads, favoring ingredients like heirloom tomatoes, locally sourced
    honey, and seasonal kale, while maintaining a detailed recipe spreadsheet for repeatable results.
  core: Mark Schafer merges methodical engineering precision with a love for solitary craftsmanship, turning every process—from budgeting to bike maintenance—into a tightly optimized system, even if obsessive
    attention to detail sometimes delays social outings.
background:
  cultural: Mark was raised in Racine, Wisconsin, in a family of German‑Scandinavian heritage that embodies the Midwestern values of hard work, reliability, and community service. His upbringing in a Protestant
    (Lutheran) neighborhood emphasized punctuality, modesty, and civic participation, with regular involvement in church events, local sports leagues, and community volunteerism. The region’s manufacturing
    legacy and lake‑front lifestyle have shaped his practical outlook, love for outdoor activities, and appreciation for structured teamwork.
attributes:
  skills: '[''Process optimization'', ''Lean manufacturing'', ''Data analysis (Excel, SQL, Python)'', ''Project management'', ''Team leadership'', ''Supply chain coordination'', ''Budgeting and cost control'',
