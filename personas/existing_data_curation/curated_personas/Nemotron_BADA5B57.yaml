  hobbies: '[''Model kit building'', ''Woodworking'', ''Cycling'', ''Running'', ''Reading non-fiction (business, technology, history)'', ''Strategy board games (e.g., Settlers of Catan)'', ''Volunteering
    at local food bank'', ''Cooking at home'']'
  career_goals: In the next five years, Mark aims to earn a Six Sigma Black Belt and complete an MBA with a concentration in Operations Management, positioning himself for a senior operations manager role
    at a midsize manufacturing firm. He intends to lead large‑scale efficiency and sustainability projects, eventually progressing to director of operations. Long‑term, he envisions founding a consultancy
    that helps Midwestern manufacturers adopt data‑driven process improvement and lean practices.
