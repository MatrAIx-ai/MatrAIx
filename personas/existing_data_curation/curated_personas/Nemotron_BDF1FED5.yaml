  career_goals: Jacalyn aims to complete her bachelor's degree in chemical engineering or public health, building on her hands‑on experience in quality control. In the short term, she plans to earn the
    ASQ Certified Quality Engineer (CQE) credential and take on supervisory responsibilities within a manufacturing or laboratory environment. Long‑term, she envisions leading a quality‑assurance team at
    a company that integrates safety, sustainability, and user‑centric design, or working for a regulatory agency such as the FDA where she can influence product standards that protect public health. She
    also hopes to combine her passion for art and design with technical expertise to develop innovative, accessible products that benefit underserved communities.
