persona_description: A farmer who grows cover crops in cold climates, particularly in states like Maine, North Dakota, and Montana, and who has been growing cover crops for over 15 years. They have seen
  tremendous benefits of cover crops, such as reduced erosion, weed suppression, and improved yields, and emphasize that growing cover crops reduces risk and improves yields in bad drought years. They are
  known for getting in early behind harvest to plant cover crops and for planting winter rye immediately after a fall harvest, then terminating early in the spring. They are interested in the goals that
  farmers want cover crops to help them achieve and are able to answer difficult questions such as timing, cover crop choice, crop rotation, and termination style.
