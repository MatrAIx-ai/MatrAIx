personas:
  professional: Jorge Lee, an 8‑year‑old budding game creator, merges curiosity and practicality by crafting Minecraft mods and Scratch games while eagerly organizing impromptu team challenges for friends,
    even though they often forget to finish projects due to a relaxed attitude toward deadlines.
  sports: Jorge Lee, an 8‑year‑old soccer enthusiast, plays forward for the Smiths Creek Junior Soccer League and dribbles in the Parkside Mini Basketball Club, idolizes the Toronto Raptors and LA Galaxy,
    and thrives on team challenges even though they occasionally skip practice when the schedule feels too rigid.
  arts: Jorge Lee, an 8‑year‑old comic book aficionado, devours Spider‑Man and My Hero Academia issues, sketches their own superhero on notebook margins, builds LEGO dioramas of favorite movie scenes, and
    enjoys watching Pixar films like Toy Story while listening to the Legend of Zelda soundtrack.
  travel: Jorge Lee, an 8‑year‑old adventure seeker, loves weekend bike rides along Smiths Creek’s lakeshore, dreams of standing on the Niagara Falls observation deck, and looks forward to annual family
    trips to the Canada Summer Fair in Ottawa, balancing a love for exploration with parental permission and school schedules.
  culinary: Jorge Lee, an 8‑year‑old with a developing palate, favors pepperoni pizza with extra cheese, builds grilled cheese sandwiches with cheddar and mozzarella, delights in chewable gummy worms, and
    often assembles snack platters for game nights, though they sometimes overindulge in sugary cereal before bedtime.
  core: Jorge Lee, a competitive yet carefree 8‑year‑old, blends curiosity with a love for group play, juggling endless game ideas while worrying over missed details and snack choices.
background:
  cultural: 'Jorge grows up in a white, middle‑class family in the small‑town community of Smiths Creek, St. Clair County, Michigan. His upbringing reflects typical Midwestern values: a focus on community,
    modesty, and outdoor recreation. Seasonal activities like ice‑skating on frozen ponds in winter, fishing on the St. Clair River, and summer picnics shape his experiences. Family traditions include celebrating
    Thanksgiving with a big turkey dinner, enjoying summer barbecues, and participating in local church events and school fundraisers. While he is immersed in mainstream American pop culture through video
    games and comics, he also embraces the close‑knit, neighborly spirit of his hometown.'
attributes:
  skills: '[''LEGO construction'', ''Basic Scratch programming'', ''Basketball dribbling'', ''Baseball batting'', ''Reading chapter books'', ''Puzzle solving'', ''Simple electronics projects'']'
  hobbies: '[''Basketball'', ''Soccer'', ''Minecraft'', ''LEGO building'', ''Scratch programming'', ''Reading comic books'', ''Biking'', ''Collecting baseball cards'', ''Attending community fairs'']'
  career_goals: Jorge dreams of turning his love of sports and technology into a future career. He envisions becoming a professional basketball or soccer player, while also designing video games or building
    robots that solve everyday problems in his community. He aims to be the top performer in his school’s science fair, win a regional youth sports tournament, and create a Scratch game that earns recognition
    at the district technology showcase. Though he sometimes worries about making mistakes, his competitive spirit pushes him to set ambitious, yet realistic, milestones.
