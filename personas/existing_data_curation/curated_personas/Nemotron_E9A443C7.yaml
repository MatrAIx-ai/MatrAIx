  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening (herb garden)'', ''Reading mystery novels'', ''Hiking local trails'', ''Journaling'', ''Yoga for relaxation'', ''Volunteering at a local
    food bank'']'
  career_goals: Maria aims to move beyond the cashier role to become a shift supervisor within the next two years, leveraging her reliability and assertiveness. She plans to enroll in a community college
    business program to earn an associate degree in retail management, with a longer‑term ambition of managing a full‑service grocery store or opening a modest neighborhood market that highlights Mexican
    foods and supports local producers.
