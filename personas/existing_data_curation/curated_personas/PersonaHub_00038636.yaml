persona_description: Mary Noailles Murfree was an American fiction writer who wrote under the pen name Charles Egbert Craddock. Her work is considered by many to be Appalachia's first significant female
  writer and a necessity for the study of Appalachian literature. She was born in Murfreesboro, Tennessee, and her youth was spent in both Murfreesboro and Nashville. She turned to reading the novels of
  Walter Scott and George Eliot and spent her summers in Beersheba Springs, studying the mountains and mountain people more closely. Her work is known for reinforcing negative stereotypes about the region.
  Murfree's writing is characterized by her ability to create post-Civil War American local-color literature.
