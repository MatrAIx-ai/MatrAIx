  career_goals: Although retired, Marsha’s primary ambition is to sustain her independence and remain in her Cordele home for as long as possible. She hopes to pass her culinary and gardening knowledge
    to her grandchildren by compiling a family recipe book and teaching them seasonal planting cycles. She also dreams of writing a brief memoir of her life experiences for the family archives. Maintaining
    her health through daily walks and garden work is another key goal, as is occasional low‑key volunteering at her church’s outreach program, where she can share her quilting skills. Ultimately, she wishes
    to preserve her home as a warm, familiar legacy for future generations.
