    materials'', ''Integration of simple electronics for smart-home upgrades'']'
  hobbies: '[''Sketching and abstract watercolor painting'', ''Arduino and Raspberry Pi home-automation projects'', ''Scale model building (houses, aircraft)'', ''Reading speculative fiction and philosophy'',
    ''Night-time stargazing and amateur astronomy'', ''Birdwatching along the Indian River'', ''Solo hikes and nature walks on local trails'', ''Macro and landscape photography'', ''DIY home renovation
    experiments'', ''Writing short stories and journaling'']'
  career_goals: Nelson aims to evolve from a broad-scope maintenance employee into a niche specialist who blends technical repair with artistic, eco-friendly design. He plans to earn certifications in HVAC,
    OSHA safety, and smart-home systems while completing his unfinished college coursework in mechanical technology. Over the next five years he envisions launching a small, owner-operated service that
    offers bespoke maintenance solutions for upscale, environmentally conscious homeowners in Port Saint Lucie, emphasizing custom-crafted fixtures, energy-efficient retrofits, and smart-home integrations.
    He is driven by a competitive desire to be recognized locally as the go-to expert for innovative, low-impact repairs while maintaining a flexible schedule that allows plenty of solitary work time.
