personas:
  professional: Nelson Lominac is a seasoned maintenance and repair specialist who blends two decades of hands‑on mechanical, electrical and plumbing expertise with a flair for artistic, eco‑friendly design,
    improvising custom fixes and low‑impact solutions while pursuing HVAC, OSHA and smart‑home certifications to become the go‑to local expert for bespoke, energy‑efficient retrofits.
  sports: Nelson Lominac enjoys early‑morning kayak trips on the Indian River, follows the Miami Heat and Tampa Bay Lightning with casual enthusiasm, and belongs to the Port Saint Lucie Community Fishing
    Club, preferring low‑impact, solitary activities over team sports while maintaining fitness through weekend nature walks and occasional beach volleyball.
  arts: Nelson Lominac channels imagination into abstract watercolors inspired by Jackson Pollock, sketches functional art pieces while listening to Brian Eno, captures macro photographs of dragonflies
    and sunrise landscapes, and frequently visits the Seminole Art Museum to study works by Georgia O'Keeffe and local Caribbean‑influenced installations.
  travel: Nelson Lominac favors spontaneous road trips along Florida's coastline, has explored the Bahamian islands and the historic streets of Cartagena, and dreams of traveling to Iceland to photograph
    the northern lights, always balancing travel plans with the need for solitary reflection and modest budgeting.
  culinary: Nelson Lominac prefers fresh coastal fare, often grilling blackened grouper with a side of mango salsa, enjoys crafting avocado toast with locally sourced sourdough, experiments with homemade
    lemon sorbet, and occasionally indulges in spicy conch fritters after a night of stargazing, reflecting a moderate cooking skill paired with a love for sustainable ingredients.
  core: Nelson Lominac is a creatively curious, introverted fixer‑upper who blends hands‑on technical mastery with artistic eco‑design, juggling competitive ambition with occasional disorganization and
    a watchful eye on health and finances.
background:
  cultural: Nelson identifies as a White American with family roots tracing back to French-Canadian ancestors who settled in the southeastern United States. He grew up in a suburban neighborhood near Port
    Saint Lucie, Florida, where the relaxed coastal lifestyle blends Southern hospitality with the multicultural rhythms of the Gulf and Atlantic coasts. His upbringing emphasized self-reliance, a strong
    work ethic, and a modest appreciation for formal education—he completed some college coursework in mechanical technology before entering the workforce. While he enjoys the region's outdoor pursuits—fishing,
    beach walks, and appreciation of the local wetlands—he also values quiet, solitary moments that reflect his introverted nature. He celebrates family traditions at home and respects the diverse cultural
    influences of his Floridian community, from Caribbean cuisine to local festivals, yet his personal identity remains anchored in a pragmatic, independent American ethos.
attributes:
  skills: '[''General building maintenance and repair'', ''HVAC system troubleshooting and repair'', ''Electrical wiring and circuit diagnostics'', ''Plumbing repairs and pipe fitting'', ''Carpentry and
