  career_goals: Adnan aspires to a career where he can combine his love for helping others with his interest in structured, reliable work. He plans to graduate high school, study psychology or social work
    at a state university, and eventually become a school counselor or community mental‑health advocate. Short‑term, he aims to earn a summer internship with a local non‑profit, complete certifications
    in first aid and mental‑health first aid, and continue volunteering as a peer mentor to build the experience needed for his long‑term goal of supporting youth through counseling and organized wellness
    programs.
