personas:
  professional: Adnan Costello, a high school sophomore with a budding interest in community organizing, leverages the structure of debate club and the collaborative spirit of soccer to develop practical
    leadership and communication skills, while their compassionate nature drives them to champion animal welfare projects in their neighborhood, and they constantly seek ways to apply structured problem‑solving
    to social causes.
  sports: Adnan Costello devotes evenings to community soccer matches and Friday night basketball at the St. Louis Hoops Academy, roots for the St. Louis Cardinals at Busch Stadium, and follows the NBA’s
    Denver Nuggets, and they balance competitive drive with a preference for structured team drills.
  arts: Adnan Costello explores graphic novels such as Saga and Sandman, practices guitar with influences ranging from John Mayer to local jazz improvisations at St. Louis jazz festivals, and they channel
    creative problem‑solving into Minecraft builds, making the arts a central outlet for expression and social connection.
  travel: Adnan Costello prefers short road trips with friends to nearby destinations like Chicago’s Museum Campus and the Ozark National Forest, while dreaming of a summer pilgrimage to Disneyland and
    a cultural immersion in New Orleans for its jazz scene, and they plan trips through meticulous budgeting despite the constraints of high school schedules.
  culinary: Adnan Costello favors St. Louis‑style pizza topped with Provel cheese and toasted ravioli, enjoys whipping up simple pasta dishes with basil and garlic, and treats themselves to mango‑lime boba
    tea after marathon gaming sessions, though they often neglect to clean the kitchen afterward.
  core: Adnan Costello is a socially driven, structure‑loving teen who balances community leadership, meticulous budgeting, and creative outlets while wrestling with anxiety and occasional impulsive splurges,
    and they continually seek harmony between order and spontaneity.
background:
  cultural: Adnan was raised in a middle‑class white family in St. Louis County, Missouri. His upbringing reflects the Midwestern values of community involvement, reliability, and modesty. Family traditions
    include celebrating holidays with extended relatives, supporting the local sports teams, and attending neighborhood festivals such as the St. Louis Jazz Festival. He identifies with the region’s blend
    of German, Irish, and broader European ancestry common among many families in the area, and he grew up speaking English with a gentle Midwestern accent while absorbing the city’s rich musical and culinary
    heritage.
