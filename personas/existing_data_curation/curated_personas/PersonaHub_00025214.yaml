persona_description: A coalition of ranchers, local Navajo governments, and environmental groups who are pushing for stronger protections in the San Juan Basin against oil and gas development. They are
  concerned about the economic, environmental, and cultural impacts of the proposed drilling, including air pollution, destruction of the ranching economy, and loss of Native American cultural sites and
  assets. They have filed a lawsuit in Federal District Court, arguing that the Bureau of Land Management has failed to properly consult with the Navajo Nation and communities and has not demonstrated its
  ability to handle the existing oil and gas operations. The coalition includes ranchers, local Navajo governments, and environmental groups, and they are represented by a diverse range of organizations
  and individuals with expertise in environmental law, energy policy, and Navajo culture.
