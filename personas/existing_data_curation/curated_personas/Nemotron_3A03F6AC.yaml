personas:
  professional: Priscilla Constantine, an elementary‑school science enthusiast who quietly leads her class's coding club, applies their methodical planning to design interactive Scratch stories and meticulously
    builds mini rain gauges for the school’s environmental project, all while preferring solitary workspaces that let them focus.
  sports: Priscilla Constantine, a member of the Yakima Lions Youth Soccer team who favors the solitary rhythm of morning runs along the Yakima River Trail, follows the Seattle Seahawks and the Seattle
    Mariners for inspiration, and treats fitness as an extension of their nature walks, using a simple step‑tracker to log miles rather than competing in team drills.
  arts: Priscilla Constantine, an avid watercolorist who recreates the rolling hills of the Yakima Valley in the style of Claude Monet while sketching native birds inspired by John James Audubon, practices
    piano pieces by Ludwig van Beethoven to sharpen concentration, and loses themselves in the imaginative worlds of J.K. Rowling and Neil Gaiman, often humming the melodies of Ludovico Einaudi while painting.
  travel: Priscilla Constantine dreams of wandering the alpine trails of Mount Rainier, has already explored the interactive exhibits at Seattle's Museum of Pop Culture, keeps a scrapbook of weekend trips
    to Oregon's Columbia River Gorge, and hopes to someday visit Kyoto's bamboo forests, always planning routes with a hand‑drawn map and a detailed checklist to ease their lingering worry about the unknown.
  culinary: Priscilla Constantine enjoys crafting simple recipes like blueberry pancakes topped with fresh lavender, assembles an annual apple crisp using crisp apples from the family orchard and a dash
    of cinnamon, delights in pressing edible flowers for garnish on salads, and experiments with kid‑friendly sushi rolls featuring cucumber and avocado, though they sometimes forget to clean up the kitchen
    in their enthusiasm.
  core: Priscilla Constantine is a quiet, meticulously organized 10‑year‑old whose boundless curiosity fuels a love of watercolor landscapes, code, and careful budgeting, while their innate anxiety often
    turns solitary pursuits into both refuge and source of lingering worry.
background:
  cultural: Priscilla grows up in Wapato, a small town in Yakima County, Washington, within a predominantly white, rural community surrounded by agriculture and wide open spaces. The region’s Pacific Northwest
    culture emphasizes a close connection to nature, seasonal harvest festivals, and community gatherings like county fairs. While her household reflects typical Mid‑American values of self‑reliance and
    politeness, her school curriculum includes an awareness of the Yakama Nation’s heritage and the diverse migrant farmworker history of the area. These influences foster her appreciation for both the
    natural environment and the quiet rhythms of small‑town life.
attributes:
  skills: '[''Organizational planning'', ''Detailed note‑taking'', ''Watercolor painting'', ''Sketching and illustration'', ''Basic coding in Scratch'', ''Scientific observation'', ''Puzzle solving'', ''Reading
