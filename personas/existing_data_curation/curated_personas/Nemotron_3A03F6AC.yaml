  hobbies: '[''Watercolor painting of local landscapes'', ''Sketching birds and insects'', ''Reading fantasy and science‑fiction novels'', ''Solving logic puzzles and Sudoku'', ''Practicing piano'', ''Creating
    Scratch coding projects'', ''Building simple science experiments'', ''Collecting pressed flowers'', ''Keeping a daily nature journal'']'
  career_goals: Priscilla dreams of a future where she can blend her love for art, nature, and quiet research. She aspires to become a wildlife illustrator or a conservation biologist who creates detailed
    visual guides of local ecosystems. She also imagines working as a museum curator or archivist, preserving natural history artifacts while spending time in focused, solitary study. Ultimately, she hopes
    her work will help others understand and protect the environment, allowing her to contribute meaningfully without sacrificing the quiet, methodical space she values.
