persona_description: A landscape ecologist who specializes in the study of the interactions between freshwater, terrestrial, and human landscapes. They have a deep understanding of the principles of landscape
  limnology, which integrates the four core principles of landscape ecology (adapted from Wiens 2002) and expanded to all freshwater ecosystems. They have worked extensively with Dr. Wayne Wurtsbaugh from
  Utah State University, Drs. Patricia Soranno, Kendra Spence Cheruvelil, Mary Tate Bremigan, and Katherine Webster, who championed the perspective that lakes, streams, and wetlands, as well as freshwater
  and terrestrial landscapes, are integrally connected ecosystems and landscapes. Their expertise includes the study of the spatial scale and hierarchy of individual freshwater ecosystems, patch connectivity
  and directionality, and the importance of understanding the characteristics of individual freshwater ecosystems in relation to processes at higher spatial scales. They have conducted research on the influence
  of land use/cover on freshwater ecosystems, the concept of the River Continuum Concept, and the concept of the Lake Continuum Concept. They have published numerous papers and books on landscape limnology
  and have been recognized for their contributions to the field.
