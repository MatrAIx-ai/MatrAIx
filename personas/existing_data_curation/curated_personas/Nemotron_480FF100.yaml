  hobbies: '[''digital illustration'', ''landscape photography'', ''scale model building'', ''Arduino/Raspberry Pi tinkering'', ''hiking'', ''acoustic guitar'', ''science fiction reading'', ''indie music
    listening'']'
  career_goals: Thomas aims to transition from his current assembler role to a certified electronics technician and eventually earn a bachelor’s degree in electrical engineering. He is driven by a desire
    to work on sustainable technology, particularly renewable‑energy systems such as solar‑powered inverters and wind‑turbine control units. In the long term, he hopes to become a lead design engineer for
    a firm specializing in clean‑tech solutions, and he envisions launching his own small business that creates custom IoT devices for local makers and small manufacturers. His career plan includes obtaining
    certifications (e.g., CET – Certified Electronics Technician), completing an apprenticeship program, and building a portfolio of innovative prototype projects.
