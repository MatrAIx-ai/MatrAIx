  career_goals: Kathleen aims to elevate her technical credentials by attaining a senior technician certification from a leading ATM and office equipment manufacturer. She envisions transitioning into a
    regional trainer role where she can mentor younger technicians and develop training curricula. In the longer term, she hopes to launch a modest independent repair service that serves Kellogg and surrounding
    rural towns, leveraging her reputation as a go-to expert for complex machine failures. Kathleen also wishes to use her outgoing personality to lead community workshops on basic computer and machine
    maintenance for seniors, solidifying her status as both a technical authority and a valued community resource.
