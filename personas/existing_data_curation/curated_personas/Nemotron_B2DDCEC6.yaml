  career_goals: He aims to advance to a supervisory role such as sergeant or lieutenant within the Floyd County Police Department, where he can shape community-oriented policing strategies and expand art-focused
    outreach initiatives. He also wants to mentor younger officers, lead crisis-negotiation training, and eventually transition to a civilian liaison role that bridges law enforcement with local cultural
    institutions before retiring.
