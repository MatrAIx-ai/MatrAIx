  career_goals: She often talks about wanting to help others as she grows up, saying she’d like to become a teacher or a nurse. She imagines herself leading a classroom, sharing stories, and caring for
    classmates when they’re hurt. Her love for music and movement also sparks occasional dreams of being a dancer or a performer, reflecting her outgoing nature. Though still young, she shows a practical
    side, expressing interest in roles that provide structure and community service.
