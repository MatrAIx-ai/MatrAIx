personas:
  professional: Nicolia Wade, an imaginative four‑year‑old, runs a make‑believe toy store where they meticulously arrange inventory, blending curious exploration of new toys with a practical, methodical
    approach that impresses playmates.
  sports: Nicolia Wade, an energetic four‑year‑old, darts around the preschool’s mini‑soccer program with the Sunny Sprouts club, idolizes the Los Angeles Dodgers, and they eagerly mimic the moves of the
    Dallas Cowboys during weekend game viewings.
  arts: Nicolia Wade, a creative four‑year‑old, loves singing along to Raffi’s ‘Baby Beluga,’ drawing vibrant dinosaurs after watching Disney’s ‘Frozen’ and enacting scenes from Sesame Street, and they
    hold a particular admiration for actor Lin‑Manuel Miranda’s energetic storytelling.
  travel: Nicolia Wade, an adventurous four‑year‑old, has explored Orlando’s Magic Kingdom and the sunny beaches of Myrtle Beach, dreams of visiting the Great Barrier Reef, and they prefer car trips with
    a playlist of nursery rhymes, though family time constraints often limit longer journeys.
  culinary: Nicolia Wade, a picky‑but‑curious four‑year‑old, adores cheesy macaroni, chicken nuggets with honey mustard, strawberry‑banana smoothies, and they proudly help stir batter for blueberry pancakes,
    while refusing to eat broccoli without cheese sauce.
  core: Nicolia Wade, a four‑year‑old blend of boundless curiosity and meticulous order, can line up toy cars for hours yet they erupt into tears when a routine changes, turning everyday moments into both
    structured play and emotional rollercoasters.
background:
  cultural: Nicolia is raised in a Black family in New Bern, Pamlico County, where Southern African-American traditions shape daily life. Her family places importance on church gatherings, gospel music,
    and community celebrations such as Juneteenth. She enjoys foods like collard greens, cornbread, and fresh seafood from the nearby coast. Storytelling, family history, and church choir participation
    are central to her upbringing, providing a sense of belonging and cultural pride.
