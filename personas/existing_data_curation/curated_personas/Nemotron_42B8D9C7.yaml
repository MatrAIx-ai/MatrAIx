  career_goals: Although retired, Rafael aims to turn his passions into community‑focused "career" projects. He plans to lead a weekly cooking class at the local senior center, documenting and sharing family
    recipes with younger participants. He also wants to co‑organize a neighborhood garden that supplies fresh produce for local food drives. Rafael aspires to compile a memoir of his family's migration
    story, preserving it for future generations. Additionally, he hopes to deepen his tech skills to help peers navigate digital tools, and eventually travel back to Mexico to reconnect with his hometown
    and bring back cultural insights to his community in Surprise, Arizona.
