personas:
  professional: Manoucheka Mohammed is a 26‑year‑old graphic designer who leverages Adobe Creative Suite, Figma, and disciplined project‑management tools to craft inclusive brand identities for socially
    conscious clients, blending meticulous structure with a collaborative, empathy‑driven workflow.
  sports: Manoucheka Mohammed enjoys early morning walks in Burlington County parkland, follows the New Jersey Devils for ice hockey and the Philadelphia Union for soccer, and participates in a local weekend
    pickleball league that offers a low‑key, social way to stay active.
  arts: Manoucheka Mohammed’s artistic life is anchored by hand‑drawn illustrations inspired by graphic novelists such as Raina Ruth Liu and Marjane Satrapi, and they frequently attend shows featuring choreographer
    Kyle Shepard and musician Kamasi Washington, letting those experiences inform their visual storytelling.
  travel: Manoucheka Mohammed prefers meticulously planned trips, using detailed itineraries to explore culturally rich destinations like Marrakesh’s souks and Asheville’s craft beer scene, while balancing
    budget constraints and the desire to schedule visits around their marriage and work commitments.
  culinary: Manoucheka Mohammed loves cooking traditional dishes such as jerk chicken, callaloo, and plantain fufu, often infusing them with modern twists like quinoa‑based ackee toast, and they keep a
    well‑stocked pantry of Scotch bonnet peppers, coconut milk, and fresh herbs for spontaneous culinary experiments.
  core: Manoucheka Mohammed blends disciplined design work with a quiet, caring personality, often worrying about future plans while finding calm in yoga, cooking, and purposeful creativity.
background:
  cultural: Manoucheka was raised in Trenton, New Jersey, within a close‑knit Black family whose roots trace back to the Caribbean—her parents immigrated from Jamaica and carried forward a mix of African‑American
    and Caribbean cultural traditions. Her household observes Islamic practices, celebrating Ramadan and Eid, which instill values of discipline, hospitality, and communal responsibility. Growing up, she
    participated in local cultural events such as Juneteenth celebrations, Caribbean festivals, and neighborhood art fairs, absorbing a rich tapestry of music, food, and storytelling. These diverse influences
    shape her aesthetic sensibility, motivating her to create designs that honor multicultural perspectives and promote representation for under‑served communities.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Figma'', ''Sketch'', ''Typography'', ''Color Theory'', ''Layout Composition'', ''Brand Identity Development'', ''Print Production'',
    ''Digital Illustration'', ''Social Media Content Creation'', ''Project Management (Asana, Trello)'', ''Client Communication'']'
  hobbies: '[''Sketching'', ''Graphic Novel Reading'', ''Cooking Traditional Caribbean and African Cuisine'', ''Yoga'', ''Mindfulness Meditation'', ''Nature Walks'', ''Community Art Volunteering'', ''Mentoring
    Youth in Design'']'
  career_goals: Manoucheka aims to deepen her expertise in user‑centered design and transition into a senior graphic design or art director role within a socially conscious agency that values inclusive
    visual narratives. She plans to earn a professional certification in UX/UI design within the next two years and eventually pursue a master's degree in Design Management to broaden her strategic perspective.
    Long‑term, she envisions launching her own boutique studio that partners with community organizations to produce culturally resonant branding and educational materials, while maintaining a balanced
    schedule that supports her marriage and personal well‑being.
