  career_goals: John aims to become one of Kansas City’s top‑producing residential brokers within the next three years, consistently closing ten or more deals per month and earning a six‑figure income.
    He plans to obtain his broker’s license and pursue the Certified Residential Specialist (CRS) designation, then launch his own boutique brokerage focused on sustainable, green homes and first‑time buyer
    education. Over the next five to seven years, he intends to build a referral network strong enough to mentor new agents, expand into commercial sales, and invest in a diversified portfolio of rental
    properties that generate passive income.
