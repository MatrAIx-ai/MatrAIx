personas:
  professional: Maile Sosebee is a meticulous medical assistant who leverages their expertise in Epic EHR, ICD-10 coding, and phlebotomy to streamline clinic flow, while mentoring new staff with a disciplined,
    data-driven approach and eyeing a supervisory role within five years.
  sports: Maile Sosebee frequents the Napa Valley Hiking Club for weekend treks at Annadel State Park, attends weekly yoga sessions at a local studio, and cheers for the San Francisco 49ers, Golden State
    Warriors, and San Jose Sharks, blending solitary fitness with modest fandom.
  arts: Maile Sosebee curates a personal library of contemporary fiction by Sally Rooney and Colson Whitehead, admires Ansel Adams’s black-and-white landscapes, playlists Brandi Carlile and Fleet Foxes
    while editing nature photos, and winds down with indie films by Hayao Miyazaki.
  travel: Maile Sosebee plans meticulous getaways that highlight terroir experiences, such as a three-day boutique winery tour in Bordeaux and a solo hike through New Zealand’s Abel Tasman, while balancing
    a modest travel budget and a desire for low-stress itineraries.
  culinary: Maile Sosebee enjoys whole-food cooking, often preparing quinoa-based bowls with roasted seasonal vegetables, kale, chickpeas, and a drizzle of walnut vinaigrette, and pairs these dishes with
    boutique Pinot Noir from Sonoma, while occasionally indulging in a homemade truffle risotto for special occasions.
  core: Maile Sosebee combines razor-sharp organization with a love for solitary nature pursuits, competitive ambition, and a habit of double-checking everything—from patient charts to wine labels.
background:
  cultural: Maile is a white American who grew up in Northern California, absorbing the region’s blend of outdoor recreation, health‑conscious living, and community‑oriented values. Her family’s middle‑class
    upbringing emphasized self‑reliance, hard work, and an appreciation for the local wine culture. Living in Rohnert Park, she participates in the area’s sustainability initiatives, enjoys the farm‑to‑table
    food scene, and values the balance between professional ambition and personal well‑being that her West Coast environment fosters.
attributes:
  skills: '[''Patient intake and vital sign assessment'', ''Phlebotomy'', ''Electronic Health Record (EHR) management (Epic)'', ''Medical coding basics (ICD-10)'', ''Appointment scheduling and calendar
    management'', ''Inventory control and supply ordering'', ''Clinical workflow optimization'', ''HIPAA compliance and privacy practices'', ''Basic wound care and dressing changes'', ''Small-group training
    and mentorship'']'
  hobbies: '[''Hiking in Sonoma County'', ''Nature photography'', ''Wine tasting and vineyard tours'', ''Whole-food cooking'', ''Yoga and mindfulness practice'', ''Reading (medical literature & contemporary
    fiction)'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Maile intends to build on her strong organizational foundation and curiosity about emerging healthcare technologies by advancing into a supervisory or practice‑manager role within the next
    five years. She plans to obtain a Certified Medical Assistant (CMA) credential upgrade and pursue a health‑administration certificate to oversee a team of assistants, streamline clinic operations, and
    lead quality‑improvement projects that elevate patient satisfaction scores. Ultimately, she envisions mentoring staff and shaping efficient, patient‑centered care models in a progressive medical practice.
