  hobbies: '[''Hiking in the Prescott National Forest'', ''Landscape sketching'', ''Photography'', ''Visiting art galleries and museums'', ''Reading contemporary fiction and philosophy'', ''Attending live
    music and open‑mic events'', ''Yoga'', ''Coffee shop hopping'', ''Experimental cooking'', ''Volunteering at a community garden'', ''Book club participation'']'
  career_goals: Joanne aims to complete her bachelor's degree in Art History and Communications within the next two years and then pursue a graduate certificate in Museum Studies. Her short‑term goal is
    to secure a curatorial assistant position at the Yavapai County Museum or a similar regional cultural institution, where she can contribute to exhibition development and community outreach. Long‑term,
    she envisions leading a multidisciplinary arts program that integrates local indigenous heritage, sustainable practices, and contemporary visual media, eventually becoming a director of community arts
    initiatives in Prescott Valley. She also hopes to mentor emerging artists and develop collaborative public art projects that foster cultural dialogue.
