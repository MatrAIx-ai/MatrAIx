personas:
  professional: Joanne Chapman, a 20‑year‑old art history and communications major, channels her curiosity and meticulous research skills into curating immersive museum exhibits, using Adobe Photoshop and
    Illustrator for visual proposals, while her flexible organization and calm composure under tight deadlines empower her to lead collaborative projects and meet deadlines with confidence.
  sports: Joanne Chapman fuels her love of the outdoors through weekly hikes in Prescott National Forest, seasonal rock‑climbing at the Granite Dells, regular yoga practice, and cheering on the Arizona
    Diamondbacks while participating in the local running group for the annual Prescott Trail Race.
  arts: Joanne Chapman immerses herself in the arts by sketching desert landscapes inspired by Georgia O'Keeffe, curating photo series echoing Ansel Adams' black‑and‑white mastery, attending live shows
    featuring Sufjan Stevens and the indie folk band The Desert Leaves, and dissecting contemporary fiction by Haruki Murakami and art theory by Rosalind Krauss at her book club.
  travel: Joanne Chapman plans budget‑friendly weekend trips, having already explored the red rocks of Sedona, the galleries of Santa Fe, and dreaming of a spring pilgrimage to Paris’s Musée d’Orsay and
    Kyoto’s historic temples.
  culinary: Joanne Chapman enjoys experimental cooking, often fusing Southwest ingredients like roasted cactus and corn masa with Asian flavors such as miso‑glazed salmon, while honing latte art with locally
    roasted beans and whipping up avocado‑lime toast for brunch.
  core: Joanne Chapman is a curiosity‑driven art student who balances relentless sketching and coffee‑shop journaling with a tendency to procrastinate on paperwork, yet always finds time for sunrise hikes
    and spontaneous museum visits.
background:
  cultural: Raised in a middle‑class family in central Arizona, Joanne grew up with a strong appreciation for the natural beauty and cultural diversity of the American Southwest. Her family valued education,
    outdoor recreation, and community involvement, encouraging trips to national parks and participation in local festivals. While her ethnic background is white, she has cultivated an awareness of Yavapai
    and other indigenous traditions through museum visits, school curricula, and community events, fostering a respect for their artistic and ecological perspectives. Her upbringing blended traditional
    American holidays with a regional emphasis on sustainability and regional heritage, shaping a worldview that balances individual ambition with a commitment to cultural stewardship.
attributes:
  skills: '[''Creative writing'', ''Visual arts (drawing, mixed media)'', ''Digital illustration (Adobe Photoshop, Illustrator)'', ''Photography'', ''Research and academic writing'', ''Event planning and
