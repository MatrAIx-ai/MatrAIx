  career_goals: Sophia aims to progress to a lead software engineer or technical architect position within the next five years, where she can shape development processes and enforce high‑quality standards
    across teams. She plans to earn an AWS Solutions Architect certification and deepen her expertise in cloud‑native architectures. Passionate about representation, she also intends to spearhead mentorship
    programs for Black women in tech and eventually transition into a senior leadership role that blends technical strategy with community impact, such as overseeing products that address local healthcare
    or education needs.
