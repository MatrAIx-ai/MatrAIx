  hobbies: '[''Mystery reading'', ''Tide‑pool exploration'', ''Shell collecting'', ''Marine life drawing'', ''Swimming'', ''Piano practice'', ''Scratch coding'', ''Science Club projects'', ''Animal shelter
    volunteering'', ''Baking with family'']'
  career_goals: Lorraine aspires to become a marine biologist who protects coastal ecosystems and educates others about ocean health. She aims to excel in high school science courses, participate in her
    school's Science Club, and attend summer marine research programs in Florida. Over the next decade, she envisions earning a bachelor's degree in marine science, working on reef restoration projects,
    and eventually leading community outreach initiatives that blend her love of the sea, scientific curiosity, and practical problem‑solving abilities.
