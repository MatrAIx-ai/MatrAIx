personas:
  professional: Lorraine Cox is an aspiring junior coder who blends curiosity with practicality, turning love for marine life into Scratch games that simulate tide-pool ecosystems while reliably contributing
    to the school Science Club's research projects, and they often share their code with classmates.
  sports: Lorraine Cox swims with the Lake Worth Aquatics Club, enjoys weekend laps at the community pool, cheers for the Miami Dolphins, and participates in a local beach-volleyball pick-up, demonstrating
    a balanced love for water sports and team camaraderie.
  arts: Lorraine Cox spends evenings practicing piano pieces by Ludovico Einaudi, sketches marine creatures inspired by Claude Monet, and watches Studio Ghibli films for creative inspiration, weaving music,
    visual art, and storytelling into a vibrant artistic identity.
  travel: Lorraine Cox has visited Everglades National Park and Disney World, dreams of snorkeling the Bahamas and exploring Monterey Bay Aquarium, and prefers family-oriented trips that combine adventure
    with educational marine experiences.
  culinary: Lorraine Cox loves baking chocolate-chip cookies, experimenting with sea-salt caramel cupcakes, and whipping up simple fish tacos using fresh cilantro and lime, showcasing a playful willingness
    to blend sweet treats with seafood flavors.
  core: Lorraine Cox is a curious, organized teen who codes marine-themed games, swims diligently, plays piano thoughtfully, balances saving for the future with occasional candy-induced splurges, and navigates
    occasional allergy sneezes and forgotten flossing.
background:
  cultural: Lorraine is a white American growing up in Lake Worth, Florida, a coastal city known for its blend of beach culture and a vibrant, multicultural community. Her family observes typical American
    holidays and traditions while also embracing the diverse influences of the region, such as local festivals, occasional Spanish language exposure, and the relaxed, outdoor‑oriented lifestyle common in
    South Florida. The proximity to the Atlantic Ocean has fostered her love of marine environments, and the community’s emphasis on environmental stewardship and inclusive neighborly ties shapes her worldview.
