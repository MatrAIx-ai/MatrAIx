  hobbies: '[''Bridge'', ''Bingo'', ''Church choir'', ''Book club (historical fiction)'', ''Gardening'', ''Southern cooking'', ''Walking/hiking'', ''Quilting'', ''Community potluck hosting'', ''Local history
    tours'']'
  career_goals: Teresa aims to channel her lifelong passion for education into community service. She plans to continue volunteering as a reading tutor for adult learners, mentor early‑career teachers through
    the local teachers association, and develop a memoir that captures her most rewarding classroom moments and the evolution of public education in Georgia. She also hopes to expand intergenerational programs
    at the senior center, fostering connections between seniors and schoolchildren. Maintaining her health and social connections is a priority, and she looks forward to taking short trips to historic Southern
    towns and completing a genealogy course to trace her family history.
