  career_goals: Although currently not employed, Steven aims to translate his organizational strengths and artistic passion into a lasting community legacy. He plans to establish a small non‑profit art
    workshop in New Milford that offers free classes, apprenticeship opportunities, and an exhibition space for local artists. He also hopes to publish a photo‑essay book that captures the changing landscapes
    and cultural traditions of Susquehanna County. Over the next five years, Steven intends to deepen his digital design skills, develop a mentorship program linking seniors with youth through shared art
    projects, and become a recognized spokesperson for preserving the region’s folk heritage.
