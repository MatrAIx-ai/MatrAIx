  career_goals: Simone aims to rise to a senior operations management position within a mid‑size corporation, where she can oversee multiple departments and spearhead strategic initiatives to digitize and
    streamline administrative functions. She plans to earn a Project Management Professional (PMP) certification and possibly pursue an MBA to deepen her strategic and financial expertise. In the long term,
    Simone envisions launching her own consulting practice that helps organizations design efficient, low‑stress workflows, especially for teams that value quiet, focused environments. She also strives
    to mentor emerging Black women professionals in office management, fostering a pipeline of competitive, resilient leaders.
