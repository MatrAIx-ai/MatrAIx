  hobbies: '[''Jogging'', ''Cooking Mexican cuisine'', ''Reading true‑crime literature'', ''Listening to criminology podcasts'', ''Playing acoustic guitar'', ''Volunteering for youth mentorship'', ''Participating
    in community soccer league'', ''Building scale model cars'', ''Attending cultural festivals'']'
  career_goals: Jose aims to advance to a senior leadership position within the Cook County police hierarchy, such as Lieutenant or Captain, where he can influence policy toward data‑driven, community‑focused
    policing. He plans to develop a specialized outreach unit that serves the Hispanic community, leveraging his cultural insight and business expertise to improve operational efficiency. Long‑term, he
    envisions transitioning to a consultant role that advises municipal agencies on police reform, security management, and community partnership strategies.
