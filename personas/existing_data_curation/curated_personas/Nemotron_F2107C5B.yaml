  hobbies: '[''food pantry volunteer work'', ''ballroom dancing'', ''hiking with a local club'', ''vegetable gardening'', ''cooking family meals'', ''contemporary fiction book club'']'
  career_goals: Bettie aims to progress to a supervisory role within the distribution center, eventually becoming a shift manager or operations coordinator. She plans to pursue a Lean Six Sigma Green Belt
    certification and a supervisory training program offered by her employer. In the long term, she envisions overseeing a regional fulfillment network or opening a small logistics consulting business that
    helps local retailers optimize their stock processes. She also wants to lead a mentorship program for younger employees.
