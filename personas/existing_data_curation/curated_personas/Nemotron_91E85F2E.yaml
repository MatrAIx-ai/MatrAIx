personas:
  professional: Kimberly Purvis, a veteran construction and building inspector with over forty years of experience, leverages her deep knowledge of the International Building Code, Tennessee zoning, and
    historic preservation guidelines to conduct meticulous structural, fire safety, and ADA compliance inspections, while their methodical, organized nature and caring communication style help translate
    complex findings into clear guidance for contractors, homeowners, and municipal officials, and they now channel their curiosity and practicality into mentoring aspiring inspectors and developing community
    safety workshops.
  sports: Kimberly Purvis enjoys low‑impact fitness through weekly walks with the Brentwood Senior Walking Club, follows the Nashville Predators and Tennessee Titans with a quiet enthusiasm, and participates
    in seasonal bird‑watching hikes that double as gentle cardio, while they avoid high‑intensity sports but appreciate the community spirit of local senior yoga classes.
  arts: Kimberly Purvis expresses her creativity through intricate quilting inspired by traditional patterns she admires from the works of American quilter Faith Ringgold and the folk melodies of Rhiannon
    Giddens, while they devote evenings to reading historical fiction by Margaret Mitchell and attending intimate book club discussions that explore Southern memoirs.
  travel: Kimberly Purvis prefers tranquil travel experiences, having toured the historic districts of Charleston and Savannah on guided bus tours and dreaming of a leisurely road trip through the Great
    Smoky Mountains to photograph native birds, while they plan their outings meticulously to balance comfort, accessibility, and budget constraints.
  culinary: Kimberly Purvis delights in cooking garden‑fresh heirloom tomatoes into a slow‑roasted ratatouille, perfects buttery buttermilk biscuits with locally sourced flour, and frequently experiments
    with fresh herbs like basil, thyme, and oregano, showcasing an intermediate skill level that blends traditional Southern flavors with a love for seasonal, home‑grown ingredients, and they often share
    their dishes at neighborhood potlucks.
  core: Kimberly Purvis is a methodical, curiosity‑driven inspector who balances solitary garden hobbies, meticulous budgeting, and a quiet concern for safety with a gentle, organized kindness that sometimes
    tips into worry, and they often double‑check the details that matter most.
background:
  cultural: Kimberly grew up in mid‑century Tennessee, absorbing the region's emphasis on community, modesty, and self‑reliance. Her upbringing was rooted in Southern hospitality, a strong work ethic, and
    a respect for tradition, yet her curiosity nudged her toward continuous learning. She identifies with the cultural values of family cohesion, church involvement (often attending a local Methodist congregation),
    and a reverence for the natural landscape of Middle Tennessee. These influences shape her pragmatic yet considerate approach to both her professional responsibilities and personal interactions.
attributes:
  skills: '["Building Code Knowledge", "Structural Assessment", "Blueprint Interpretation", "Report Writing", "Digital Inspection Tools (Laser Meters, Drones)", "Fire Safety Compliance", "ADA Accessibility
    Review", "Effective Communication with Stakeholders", "Sustainable Building Practices"]'
  hobbies: '["Gardening (Heirloom Vegetables)", "Quilting and Hand‑Sewing", "Reading Historical Fiction and Southern Memoirs", "Birdwatching along the Harpeth River", "Crossword Puzzles", "Small Book Club
    Participation", "Volunteer Safety Workshops for Seniors"]'
  career_goals: Kimberly aims to transition from full‑time inspections to a mentorship role, guiding newly certified inspectors through the nuances of Tennessee's building regulations. She plans to obtain
    the Certified Professional Inspector (CPI) credential to formalize her expertise. Over the next few years, she hopes to develop a community workshop series on home safety for seniors, author a practical
    guidebook on residential inspection best practices, and contribute her knowledge to local historic preservation committees. While she intends to reduce her field workload gradually, she remains committed
    to ensuring the safety and quality of new construction in Brentwood and surrounding areas.
