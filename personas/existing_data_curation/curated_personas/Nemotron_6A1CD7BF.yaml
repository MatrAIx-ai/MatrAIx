personas:
  professional: Dean Cullen, a budding junior inventor who spends afternoons mixing safe household items to create fizzy volcanoes, channels their curiosity and practicality into meticulous experiment notebooks
    while charming classmates with talkative demos.
  sports: Dean Cullen, a member of the neighborhood Little League baseball team and a budding soccer enthusiast who watches the Seattle Mariners and Seattle Sounders FC on TV, balances weekly practice with
    imaginative backyard obstacle courses, and prefers the structure of scheduled games over spontaneous play.
  arts: Dean Cullen, an avid fan of Disney’s Frozen soundtrack and Sesame Street, loves to reenact songs loudly in the living room, collects bright crayons for doodling, and idolizes performer Lin‑Manuel
    Miranda for his catchy rap‑filled musical numbers.
  travel: Dean Cullen, who has visited the local zoo, spent a magical weekend at Disneyland, and dreams of exploring the Grand Canyon’s rim someday, prefers family‑guided trips with detailed itineraries
    yet gets excited by the prospect of spontaneous ice‑cream stops.
  culinary: Dean Cullen, who favors mac‑and‑cheese, chicken nuggets, and strawberry‑banana smoothies, can proudly butter toast without spilling, loves the crunch of carrot sticks, and often begs for extra
    sprinkles on cupcakes while occasionally refusing to eat green peas.
  core: Dean Cullen is a talkative, curiosity‑driven five‑year‑old who balances meticulous piggy‑bank savings with occasional sticker splurges, monitors allergies, and channels boundless energy into playful
    inventions and bright‑colored crayons.
background:
  cultural: Dean comes from a white Southern family in Headland, Alabama. His upbringing includes regular attendance at a local Baptist church, participation in community events such as county fairs, football
    tailgates, and neighborhood picnics. Family meals often feature Southern dishes like fried chicken, mac and cheese, and homemade biscuits. He is exposed to regional storytelling traditions, country
    and gospel music, and the strong sense of hospitality, neighborliness, and respect for local customs that characterize rural Alabama life.
