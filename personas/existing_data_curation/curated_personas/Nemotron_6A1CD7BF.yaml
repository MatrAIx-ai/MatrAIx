  career_goals: Dean dreams of becoming a firefighter because he loves the excitement of the fire trucks and the idea of helping people, and he also envisions himself as a teacher who can share stories
    and lead a class. He hopes to earn a scouting badge, learn to drive a big truck someday, and work at the local community center where he can organize activities for other kids. His ambitions blend his
    curiosity about how things work, his desire for a practical, service‑oriented role, and his enjoyment of being in the spotlight.
