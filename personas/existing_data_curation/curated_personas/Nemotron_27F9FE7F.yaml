personas:
  professional: Annie Bradford, a second‑year public health major at a Durham university, leverages her research acumen and event‑planning flair to design small community workshops on health equity, blending
    meticulous organization with the flexibility to adapt to participants’ needs.
  sports: Annie Bradford, an avid weekend hiker, frequents the Eno River State Park trails, cheers for the Durham Bulls during baseball season, supports the Carolina Hurricanes in the NHL, and belongs to
    a local hiking club that meets every Saturday.
  arts: Annie Bradford, a watercolor enthusiast, spends evenings painting Durham’s historic neighborhoods while curating playlists that feature Miles Davis, Erykah Badu, and spoken‑word poet Sarah Kay,
    and attends intimate live shows at the American‑Luker Café when her schedule permits.
  travel: Annie Bradford, a budget‑conscious explorer, plans meticulous weekend trips to Asheville’s Blue Ridge hikes and Washington, D.C.’s Smithsonian museums, prefers backpacking over luxury lodging,
    and dreams of a solo cultural immersion in Lisbon’s historic districts.
  culinary: Annie Bradford, an intermediate home cook, delights in preparing collard greens with smoked paprika, sweet‑potato pie, and crispy fried chicken using fresh local produce, often pairing dishes
    with a splash of hot sauce and experimenting with homemade cornbread batter.
  core: Annie Bradford blends solitary curiosity with pragmatic community action, channeling her love of watercolor, jazz, and hiking into health‑focused outreach while managing student‑budget quirks and
    a persistent coffee habit.
background:
  cultural: Annie is a Black woman raised in Durham, North Carolina, with deep ties to the local African‑American community. Her family values education, storytelling, and communal support, traditions reinforced
    by frequent visits to historically Black churches and cultural events in the city. She grew up attending community festivals that celebrate Black heritage, such as the Durham African American Heritage
    Parade, and has been influenced by the legacy of nearby Historically Black Colleges and Universities. These experiences shape her identity, fostering a strong sense of pride in her cultural roots and
    a commitment to giving back through community health and educational initiatives.
