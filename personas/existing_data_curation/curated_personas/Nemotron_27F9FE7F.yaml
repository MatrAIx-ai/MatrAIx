  career_goals: Annie aims to complete a bachelor's degree in Public Health or Community Health Education at a nearby university, leveraging her curiosity and practicality to integrate coursework with real‑world
    experience. She plans to secure an internship with the Durham County Health Department or a local nonprofit to develop and implement youth health outreach programs. Long‑term, she aspires to become
    a community health educator or program manager, designing culturally responsive initiatives that address health disparities in Black communities across the Triangle area.
