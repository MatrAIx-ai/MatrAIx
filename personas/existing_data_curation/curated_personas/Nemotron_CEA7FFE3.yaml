  career_goals: Although still young, Arpit dreams of becoming a software engineer or a scientist who designs technology to solve real‑world problems. He often imagines building robots that help people,
    and he aspires to earn top grades in school to keep his options open. He also hopes to contribute to his community in Milwaukee, perhaps by mentoring younger kids in coding. His career ambition is grounded
    in his practical nature; he plans to pursue strong academic performance as a stepping stone toward a stable, impactful profession.
