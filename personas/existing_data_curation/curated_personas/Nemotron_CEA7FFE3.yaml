personas:
  professional: Arpit Patel, an aspiring junior coder and LEGO architect, channels their curiosity and practicality into designing simple Scratch games and meticulously constructing intricate LEGO models,
    demonstrating early talent for systematic problem‑solving and reliable attention to detail, and they balance cooperative teamwork with assertive idea sharing.
  sports: Arpit Patel enjoys weekend cricket practice with a small under‑8 league team, eagerly follows the national cricket squad on television, also dabbles in junior soccer with the neighborhood Tiger
    Cubs club, and they keep a routine of short daily stretches before homework to stay limber.
  arts: Arpit Patel channels a love for storytelling into sketching cartoons inspired by Bill Watterson’s Calvin and Hobbes and Marvel’s Spider‑Man, while their listening playlist features Pixar film scores
    by Randy Newman and pop‑rock hits from Imagine Dragons, and they often picture themselves as a character from the animated series Adventure Time during play.
  travel: Arpit Patel prefers short nature‑focused trips, having explored the nearby Evergreen State Park trail and visited the historic Old Town fort, dreams of snorkeling at the Great Barrier Reef and
    seeing the Eiffel Tower in Paris, yet they rely on family vacations and school field trips for most travel experiences.
  culinary: Arpit Patel enjoys helping prepare the family’s traditional flatbread called roti and spiced lentil stew known as dal, skillfully rolls the dough and stirs the pot while adding cumin and turmeric,
    also loves assembling pepperoni pizza topped with mozzarella and creating simple peanut‑butter‑banana sandwiches, and they show a budding culinary curiosity balanced with a clear preference for hands‑on,
    flavorful cooking.
  core: Arpit Patel blends quiet curiosity with practical ingenuity, building LEGO worlds and coding Scratch games while obsessively tracking allowances, wrestling with seasonal allergies and occasional
    worries, yet they remain fiercely loyal to a close circle of friends and family.
background:
  cultural: Arpit is a second‑generation South Asian American of Gujarati descent. At home, his family speaks both English and Gujarati, and they celebrate Diwali, Holi, and Navratri with traditional foods,
    music, and rituals. The household places a high value on education and community, which reinforces his organized and diligent approach to school. Growing up in Milwaukee, he blends American customs—such
    as participating in local library programs and school events—with his heritage, attending a local Hindu temple on weekends and enjoying cultural festivals that keep his connection to South Asian traditions
    alive.
