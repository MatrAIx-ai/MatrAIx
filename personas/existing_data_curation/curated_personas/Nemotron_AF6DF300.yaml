  hobbies: '["Vegetable gardening", "Baking traditional Southern recipes", "Quilting and patchwork", "Reading historical fiction", "Walking local nature trails", "Attending small book club meetings", "Volunteer
    work at church and community center", "Genealogy research"]'
  career_goals: Although currently not in the workforce, Laura aims to deepen her involvement in local community service, aspiring to serve on the board of the Crestwood community center and lead initiatives
    that support seniors and families. She envisions turning her gardening passion into a modest venture, selling surplus produce at the county farmers market while sharing gardening tips through workshops.
    Laura also plans to enroll in a community‑college horticulture class to expand her expertise, and to mentor younger women in effective household management and budgeting, ensuring a legacy of stability
    and kindness in her family and neighborhood.
