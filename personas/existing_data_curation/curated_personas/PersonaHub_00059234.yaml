persona_description: A historian who specializes in the study of military history, particularly the Civil War era. She is knowledgeable about the period's military uniforms, insignia, and equipment. Her
  research interests include the identification of military portraits and the use of historical resources to trace military service records. She is a member of the Company of Military Historians and has
  experience working with re-enactment groups. She has a strong interest in connecting historical images with the real people they represent and has a passion for uncovering the stories behind the uniforms
  and equipment depicted.
