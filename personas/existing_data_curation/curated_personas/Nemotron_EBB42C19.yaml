  hobbies: '[''Vegetable Gardening'', ''Reading Historical Fiction'', ''Genealogy Research'', ''Church Choir'', ''Volunteering at Food Pantry'', ''Hiking'', ''Local History Lectures'', ''Knitting'', ''Quilting'',
    ''Woodworking'']'
  career_goals: Veronica aims to advance to a lead instructional aide role within her school district, leveraging her methodical and organized skill set to mentor peers and shape inclusive teaching practices.
    She plans to pursue a graduate certificate in Special Education to deepen her expertise in supporting diverse learners. Additionally, she aspires to design and implement a sustainable after‑school tutoring
    program for underserved students in Irwin, and to contribute to district‑wide curriculum development that balances innovative ideas with proven instructional methods. Long‑term, she hopes to leave a
    legacy of compassionate mentorship and community empowerment.
