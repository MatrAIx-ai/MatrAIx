  career_goals: Alisa dreams of turning her love for art, nature, and her cultural heritage into a future career. She imagines becoming a visual storyteller—perhaps an illustrator of children’s books or
    a graphic novelist—who weaves Dakota legends and prairie wildlife into her work. She also hopes to create interactive digital experiences, such as simple games or animated stories, that teach others
    about her culture and the environment. Ultimately, she wants to be recognized for sharing fresh ideas and inspiring peers, aiming to win art competitions and science fairs as stepping stones toward
    her creative ambitions.
