personas:
  professional: Alisa Rahman is a budding young artist and storyteller who blends watercolor, charcoal, and comic panels with nature‑inspired themes, channeling a curious mind and competitive drive into
    every project.
  sports: Alisa Rahman plays on the local youth soccer team, the Riverdale Rangers, and enjoys weekend swim lessons at the City Aquatics Center, approaching each practice with a competitive edge while using
    quick LEGO‑inspired improvisation games to stay motivated.
  arts: Alisa Rahman devotes after‑school hours to watercolor landscapes, charcoal figure studies, and comic strips about imagined adventures, drawing inspiration from traditional drum rhythms learned from
    grandparents and admiring artists like Hayao Miyazaki, Frida Kahlo, and Banksy, often integrating leaf rubbings and rock painting into mixed‑media pieces.
  travel: Alisa Rahman prefers spontaneous weekend trips to nearby state parks, where leaf collecting and rock hunting become impromptu art projects, and dreams of visiting the Grand Canyon and the coastal
    town of Cannon Beach, balancing family budgets with a love for nature‑focused exploration.
  culinary: Alisa Rahman enjoys simple kitchen experiments like making fruit‑infused water, painting snack plates with edible natural dyes, and assembling DIY trail mix using dried berries, nuts, and granola,
    but often leaves a trail of colorful crumbs across the kitchen counter.
  core: Alisa Rahman is a curious, competition‑driven ten‑year‑old who turns nature finds into vivid art, codes story games on Scratch, and balances spontaneous creativity with occasional disorganization.
background:
  cultural: Alisa is part of a Dakota (Sioux) family that has lived in the North Dakota plains for generations. Her grandparents passed down stories, songs, and basic language lessons that nurture her connection
    to her heritage. She participates in community events such as the annual powwow, where she learns traditional dances and observes the drum circles. Her family also celebrates seasonal gatherings that
    include making buffalo stew, crafting beadwork, and sharing oral histories. While attending the local public school in Bismarck, she balances mainstream education with cultural lessons at the tribal
    center, giving her a blended perspective that honors both her American Indian roots and contemporary life in the Midwest.
