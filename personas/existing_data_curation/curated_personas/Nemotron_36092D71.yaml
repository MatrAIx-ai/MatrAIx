  career_goals: Cameron aims to transition from a general office clerk to an office manager or administrative specialist within the next three to five years. He plans to obtain certifications such as the
    Certified Administrative Professional (CAP) and further develop his data analysis and process automation skills. His pragmatic nature drives him to design efficient, low‑stress office systems, reduce
    manual work, and foster a harmonious workplace. Ultimately, he wishes to leverage his methodical expertise to lead small teams in a supportive, quiet environment, possibly within a community‑focused
    organization.
