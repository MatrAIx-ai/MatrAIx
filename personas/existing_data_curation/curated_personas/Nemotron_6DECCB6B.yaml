personas:
  professional: A disciplined culinary professional named Mary Lee leverages her precise knife work, menu planning expertise, and steadfast adherence to food‑safety protocols to deliver consistently high‑quality
    seafood dishes, while her preference for routine and competitive edge drive her to standardize recipes and mentor staff in a methodical kitchen environment.
  sports: An active enthusiast named Mary Lee participates in morning yoga sessions at the local studio, joins the Tampa Bay Rays fan club for baseball season outings, and spends weekend mornings fishing
    off St. Petersburg piers, blending their love for low‑impact exercise with a competitive spirit in catching the biggest snapper.
  arts: A culturally engaged individual named Mary Lee devotes evenings to reading Agatha Christie mysteries and culinary memoirs, watches cooking competitions hosted by Ina Garten and Jacques Pépin, and
    attends occasional performances at the Straz Center featuring productions starring Viola Davis, integrating storytelling with their culinary creativity.
  travel: A purposeful traveler named Mary Lee prefers meticulously planned road trips along the Gulf Coast, has visited New Orleans for its Creole seafood, dreams of a culinary tour of the Mediterranean
    islands such as Sicily, and balances these trips with family commitments, often using travel apps to schedule fishing charters and local market visits.
  culinary: A seasoned home chef named Mary Lee combines their balcony herbs—basil, thyme, dill—with fresh Gulf catches like grouper and shrimp to craft dishes such as blackened red snapper with herb butter,
    while regularly competing in amateur cook‑offs, showcasing a high skill level and a penchant for classic Southern flavor profiles.
  core: Mary Lee balances meticulous routine with a competitive spark, turning their love for seafood, yoga, and mystery novels into a disciplined yet adventurous life, sometimes obsessively checking inventory
    counts and occasionally indulging in a late‑night snack of fried catfish.
background:
  cultural: Mary was raised in a middle‑class white Southern‑Florida family where home‑cooked meals, hospitality, and a strong work ethic were core values. Her upbringing emphasized practicality, respect
    for tradition, and punctuality. The coastal culture of Pinellas County, with its emphasis on fresh seafood, seasonal produce, and a laid‑back yet industrious lifestyle, deeply influences her culinary
    approach. While she identifies culturally as American with a Southern‑Florida flavor, she also appreciates the subtle Caribbean and Hispanic culinary influences present in the Gulf Coast, integrating
    them into her cooking in an understated, practical way.
attributes:
  skills: '["Food safety (ServSafe certified)", "Menu planning and development", "Seafood preparation", "Knife skills", "Inventory and stock management", "Cost control and budgeting", "Staff training and
