  hobbies: '["Herb gardening on balcony", "Reading mystery novels and culinary memoirs", "Fishing for fresh catch", "Yoga for flexibility and stress relief", "Watching cooking shows and Food Network", "Participating
    in local amateur cooking contests", "Exploring farmer''s markets", "Baking seasonal pies"]'
  career_goals: Mary aims to advance to a senior culinary leadership role, such as sous chef or head chef, at a respected waterfront restaurant that emphasizes seasonal, locally sourced seafood. Over the
    next two years she plans to complete an associate degree in culinary arts and earn an advanced certification in seafood specialization. Long‑term, she envisions opening a modest, family‑run seafood
    bistro that offers a stable, community‑focused dining experience while preserving traditional Gulf Coast flavors. She also hopes to mentor aspiring cooks, host occasional hands‑on workshops, and compete
    in regional chef competitions to showcase her skill and competitive spirit.
