persona_description: A healthcare professional with expertise in neurology and stroke prevention, particularly in women's health. She is a neurologist who has published guidelines for women with a history
  of high blood pressure before pregnancy and women who have pre-eclampsia. She is also a stroke director for the VA Hospital, vice-chair of the Utah Stroke Task Force, and program director for the Adult
  Neurology Residency. Her clinical practice includes evaluating and treating acute strokes in the hospital and emergency department as part of the Brain Attack team, and over the camera through the use
  of telemedicine.
