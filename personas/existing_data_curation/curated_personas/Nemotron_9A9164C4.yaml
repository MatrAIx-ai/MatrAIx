personas:
  professional: Cecil Sleiman, an aspiring visual communicator, blends meticulous organization with spontaneous creativity as they translate landscape sketches of the Wasatch Mountains into polished digital
    illustrations using Adobe Photoshop and Illustrator, while frequently mediating group projects at school to keep collaborative design workflows smooth.
  sports: Cecil Sleiman, an avid hiker and seasonal skier, spends weekends traversing local Wasatch trails and hitting the slopes at Deer Valley Resort during winter, affiliates with the Payson Outdoor
    Club, roots for the Utah Jazz and the Utah Utes, and they incorporate bodyweight workouts at home to stay fit for their artistic pursuits.
  arts: Cecil Sleiman, a dedicated visual artist, frequents Payson community-center exhibitions featuring works by contemporary painter Kerry James Marshall, draws inspiration from indie folk musicians
    like Bon Iver while strumming acoustic guitar, admires the cinematography of Wes Anderson's "Moonrise Kingdom", and they channel speculative fiction authors such as N. K. Jemisin into their short story
    drafts.
  travel: Cecil Sleiman, an adventure-seeking traveler, often plans weekend getaways to Utah's national parks - like Zion and Arches - using meticulously crafted itineraries, dreams of backpacking through
    the Canadian Rockies, and they balance a modest travel budget by couch-surfing with friends while saving for a future spring trip to Kyoto's cherry-blossom festivals.
  culinary: Cecil Sleiman, a modestly skilled home cook, favors quick yet wholesome meals such as quinoa bowls with roasted sweet potatoes and feta, crafts fresh berry parfaits with locally sourced strawberries,
    enjoys experimenting with spiced lentil soup seasoned with cumin and coriander, and often snacks on trail mix while hiking, though they sometimes forget to hydrate adequately after long sessions.
  core: Cecil Sleiman, an 18-year-old art-obsessed explorer, channels a curious mind into sketching mountain vistas, strums gentle guitar melodies, meticulously budgets freelance earnings, and they occasionally
    burn midnight oil on digital commissions at the expense of sleep.
background:
  cultural: Cecil grew up in Payson, a small town in Utah County characterized by a close‑knit, predominantly white community with a strong emphasis on family and civic involvement. His family is of Lebanese
    descent, and he was raised with a blend of traditions—enjoying Lebanese cuisine and occasional cultural celebrations while also participating in the local Latter‑day Saint (Mormon) church activities
    that shape much of the town’s social life. This multicultural upbringing has given him a unique perspective that values community service, respect for diverse viewpoints, and an appreciation for both
    his heritage and the broader American cultural landscape of the Intermountain West.
attributes:
  skills: '[''Visual arts – drawing and illustration'',''Adobe Photoshop and Illustrator'',''Basic video editing (Adobe Premiere)'',''Organizational & project management'',''Communication and teamwork'',''Independent
