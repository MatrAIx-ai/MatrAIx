  hobbies: '[''Drawing and sketching'',''Digital illustration'',''Hiking in Utah mountains'',''Acoustic guitar playing'',''Visiting art exhibitions'',''Watching indie films'',''Reading speculative fiction'',''Short
    story writing'',''Volunteering at library art program'']'
  career_goals: Cecil aims to pursue a bachelor's degree in visual communication or digital media at a university in Utah, such as BYU or Utah State University. He hopes to combine his artistic talent with
    emerging technology to work as a freelance illustrator or a designer at a creative agency. In the longer term, he envisions establishing a community art space in Payson that offers workshops, galleries,
    and collaborations with local schools, fostering creative expression among youth. He also wants to develop a portfolio that could eventually lead to opportunities in concept art for video games or independent
    film projects.
