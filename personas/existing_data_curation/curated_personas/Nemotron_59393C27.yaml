personas:
  professional: Brian Mobley is a seasoned textile machine specialist with over three decades of hands‑on experience, blending a curiosity for new fabric blends with practical fault diagnosis, and they
    are now positioning themselves as a mentor‑focused shift supervisor to champion safety, modest automation pilots, and team‑wide training.
  sports: Brian Mobley roots for the Cleveland Browns on Sundays, follows the Cleveland Guardians baseball team, and spends Saturday mornings playing pickup basketball at his local community center, while
    they also participate in the Ohio River Anglers Club's regional fishing tournaments.
  arts: Brian Mobley enjoys classic rock from the Allman Brothers, soulful blues by B.B. King, appreciates Edward Hopper's realist paintings, and occasionally attends a community theater production of "Our
    Town", finding that the storytelling of historian David McCullough fuels their love for historical nonfiction.
  travel: Brian Mobley favors weekend road trips that combine their love of classic cars and nature, having driven their restored '68 Camaro to the Great Smoky Mountains and the Henry Ford Museum in Dearborn,
    while they dream of a cross‑country cruise down Route 66 to Santa Monica.
  culinary: Brian Mobley whips up shrimp and corn chowder using fresh tomatoes and basil from their garden, savors homemade smoked pork ribs glazed with a bourbon‑infused BBQ sauce, and delights in occasional
    catfish fry dusted in cornmeal and served with coleslaw, though they admit to over‑salting their veggie stir‑fry when distracted.
  core: Brian Mobley blends a hands‑on love for classic muscle cars, modest financial rigor, and a community‑focused spirit, all while juggling mild health quirks and a relaxed, sometimes disorganized,
    approach to life.
background:
  cultural: Brian grew up in a working‑class, Midwestern white family in Canton, Ohio. His grandparents emigrated from Germany and Ireland, bringing a mix of Lutheran and Catholic traditions that shaped
    his community‑focused values. He celebrates holidays such as Thanksgiving, Fourth of July barbecues, and St. Patrick’s Day with family and neighbors, and his upbringing emphasized hard work, modesty,
    and helping others, which still informs his daily interactions.
attributes:
  skills: '[''Loom operation'', ''Machine setup and calibration'', ''Preventative maintenance'', ''Mechanical troubleshooting'', ''Technical schematics reading'', ''Process improvement'', ''Safety compliance'',
