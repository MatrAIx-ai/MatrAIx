  hobbies: '[''Classic car restoration'', ''Fishing'', ''Woodworking'', ''Community volunteering'', ''Church activities'', ''Following Cleveland Browns'', ''Reading historical non-fiction'', ''Gardening'']'
  career_goals: Brian aims to become a shift supervisor within the next two years, leveraging his deep technical knowledge to lead a team and improve overall plant efficiency. He hopes to formalize a mentorship
    program for younger operators, introduce modest automation pilots that increase output without sacrificing quality, and eventually transition into a plant‑wide training coordinator role where he can
    share his practical expertise across multiple departments.
