  hobbies: '[''Classic car restoration'', ''DIY electronics projects'', ''Mexican cooking (mole, tamales)'', ''Soccer fandom (Liga MX)'', ''Fishing'', ''Walking/meditation'', ''Listening to regional Mexican
    music'', ''Reading on renewable energy'']'
  career_goals: Eduardo aims to advance to a supervisory role, first as a shift lead and ultimately as plant manager, where he can influence operational strategy and safety culture. He plans to earn certifications
    such as Certified Plant Operator and OSHA 30‑hour training, and he is considering an associate degree in electrical technology to deepen his technical knowledge. He also wants to lead initiatives that
    integrate renewable energy sources into the grid, positioning the plant for California’s clean‑energy mandates. Providing a secure future for his family and mentoring the next generation of operators
    are personal motivations that shape his long‑term ambition.
