personas:
  professional: Eduardo Noriega, a veteran California power plant operator with over thirty years of turbine, generator, and switchgear expertise, they rely on systematic checklists and a blend of practical
    curiosity and healthy skepticism to troubleshoot emergencies, mentor junior staff, and cautiously evaluate smart‑grid innovations.
  sports: Eduardo Noriega spends weekends cheering for Club América and the LA Galaxy while debating Liga MX matches with friends, they keep fit by walking the San Gabriel River and occasional pickup soccer
    games, and they belong to a local fishing club that meets at Castaic Lake each spring.
  arts: Eduardo Noriega unwinds to the soulful boleros of Chavela Vargas and the corridos of Los Tigres del Norte, they also appreciate the cinematic scores of Ennio Morricone and often play classic rock
    vinyls while tinkering with vintage car interiors, seeing each restoration as a form of kinetic art.
  travel: Eduardo Noriega prefers spontaneous road trips that blend relaxation and exploration, they have driven the Pacific Coast Highway to Big Sur, visited the Grand Canyon on a family vacation, and
    they dream of touring Iceland’s geothermal farms and Tokyo’s tech districts, though limited time and budget sometimes curtail these ambitions.
  culinary: Eduardo Noriega enjoys crafting complex mole poblano with pasilla chilies, Mexican chocolate, and roasted nuts, and they skillfully steam tamales wrapped in corn husks for holiday gatherings,
    while they also relish grilling marinated flank steak with fresh cilantro and lime, showcasing a high‑level home‑cooking repertoire that mixes tradition with a tinkerer’s precision.
  core: Eduardo Noriega blends a veteran power‑plant mind with a tinkerer’s curiosity, juggling meticulous checklists and lingering disorganization, a competitive edge tempered by frequent worry, while
    savoring mole, cheering soccer, and dreaming of renewable‑energy futures.
background:
  cultural: Eduardo grew up in a Mexican‑American household in Southern California, the son of immigrants who instilled strong family values, respect for Catholic traditions, and pride in Mexican heritage.
    He is fluent in both Spanish and English, often switching languages at home and work. Celebrations such as Día de los Muertos, Las Posadas, and Cinco de Mayo remain central to his family life. The close‑knit
    Mexican community in Santa Fe Springs provides social support and cultural continuity, influencing his cooking, music preferences, and communal involvement. This blend of Mexican roots and U.S. upbringing
    shapes his worldview, work ethic, and personal identity.
attributes:
  skills: '[''Power plant operations'', ''Electrical distribution dispatch'', ''Control room monitoring'', ''Preventive maintenance'', ''Emergency shutdown procedures'', ''Regulatory compliance (California
