  hobbies: '[''Sketching and doodling'', ''Playing indie video games'', ''Reading fantasy and sci‑fi novels'', ''Hiking and nature walks'', ''Trying new recipes and cooking'', ''Volunteering at an animal
    shelter'']'
  career_goals: She aims to finish her high‑school equivalency and later enroll in community‑college courses for graphic design and user‑interface development. Combining her curiosity for technology with
    a practical desire for a flexible, stable career, Lauren hopes to become a UI/UX designer or digital content creator, eventually launching an online store for her handmade crafts and artwork. She also
    wants to secure an internship at a local media firm to gain real‑world experience while building a portfolio that balances creative freedom with reliable income.
