personas:
  professional: Manuel Mackey, a veteran janitorial specialist with three decades of expertise in floor care, inventory control, and OSHA‑compliant safety, leverages their meticulous scheduling skills and
    natural empathy to train crews while quietly championing greener cleaning methods as they prepare for a supervisory role and CPC certification.
  sports: Manuel Mackey enjoys low‑impact fitness through a senior walking club and weekend yoga classes, plays occasional league bowling at the local community center, and supports the Wichita Thunder
    hockey team and the Kansas City Chiefs football team, integrating regular physical activity with community sports fandom.
  arts: Manuel Mackey spends weekends at the Wichita Art Museum, paints watercolors in a community class inspired by Monet and O'Keeffe, captures Kansas prairie vistas with an analog camera in the style
    of Ansel Adams, and reads biographies of artists like Frida Kahlo and Leonardo da Vinci, weaving visual art appreciation into their daily life.
  travel: Manuel Mackey prefers carefully planned road trips that blend scenic drives across the Midwest with visits to art‑focused destinations such as Santa Fe, New Mexico, the Marfa art installations
    in Texas, and the Badlands National Park, balancing a modest travel budget with a willingness to splurge on cultural experiences.
  culinary: Manuel Mackey enjoys cooking with fresh produce from their garden, frequently preparing roasted beet and goat‑cheese salad, grilled corn with butter, and a classic Kansas City smoked brisket,
    while also experimenting with homemade pickles and herb‑infused olive oil, reflecting a moderate cooking skill level and a preference for farm‑to‑table flavors.
  core: Manuel Mackey blends a lifetime of meticulous cleaning expertise with a quiet passion for prairie photography and watercolor painting, balancing organized work habits with spontaneous artistic bursts,
    though they sometimes forget to water the garden after a rainy week.
background:
  cultural: Manuel grew up in a small farming town in the heart of Kansas, where Midwestern values of self‑reliance, community service, and modesty shaped his outlook. His family attended a local Protestant
    church, and community gatherings like county fairs and church potlucks were central to his upbringing. The plain‑spoken, practical culture of the region, combined with modest exposure to rural folk
    art and occasional traveling exhibits, fostered his appreciation for both practical work and creative expression.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (strip‑and‑wax, carpet cleaning)'', ''Basic building maintenance (light fixtures, plumbing, HVAC filter replacement)'', ''Inventory management'', ''OSHA
    safety compliance'', ''Staff training and mentorship'', ''Scheduling and logistics'', ''Customer service and conflict resolution'']'
  hobbies: '[''Watercolor painting'', ''Analog photography'', ''Visiting art museums and galleries'', ''Reading biographies of artists and innovators'', ''Gardening'', ''Volunteer work at community festivals'',
    ''Attending local theater productions'']'
  career_goals: Manuel aims to move into a supervisory or lead‑cleaner role within the next two years, obtain a Certified Professional Cleaner (CPC) credential, and develop a small consulting side‑business
    that helps local businesses adopt greener cleaning practices. He also hopes to mentor younger janitorial staff and eventually transition to part‑time work that allows more time for his art interests
    while ensuring a stable retirement income.
