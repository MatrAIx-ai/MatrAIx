  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries'', ''Indie film watching'', ''Hiking in the Cascades'', ''Reading speculative fiction'', ''Yoga and meditation'', ''Journaling'',
    ''Volunteer at local arts festivals'', ''Creating digital mood boards'']'
  career_goals: Sheila aims to leverage her retail experience and artistic interests by pursuing a bachelor's degree in marketing or arts administration. Her long‑term ambition is to transition into visual
    merchandising or brand marketing for a boutique or cultural institution, where she can blend creativity with strategic promotion. She envisions taking on supervisory responsibilities in her current
    workplace as a stepping stone, while also building an online platform to sell her own artwork and curated goods. Ultimately, she hopes to combine her passion for art, community engagement, and business
    acumen to shape compelling consumer experiences and possibly launch her own arts‑focused venture.
