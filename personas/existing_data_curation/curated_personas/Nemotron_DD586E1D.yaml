personas:
  professional: Sheila Thomas is a 21‑year‑old retail associate who couples a talent for visual merchandising with a curiosity for brand storytelling, using her graphic design basics to craft eye‑catching
    displays while assertively stepping into leadership when the store needs direction.
  sports: Sheila Thomas blends a love of the Cascades' trailheads with regular yoga sessions, cheers for the Seattle Seahawks in the fall, follows the Seattle Sounders year‑round, participates in the Northwest
    Hiking Club’s weekend treks, and occasionally joins the Seattle Trail Runners for seasonal 5K races.
  arts: Sheila Thomas channels the misty hues of the Pacific Northwest into watercolor pieces reminiscent of Emily Carr, curates mood boards featuring the cinematic quirks of Wes Anderson and the haunting
    narratives of David Lynch, and regularly cites the folk harmonies of Fleet Foxes and the avant‑garde installations of Yayoi Kusama as artistic anchors during gallery visits.
  travel: Sheila Thomas plans trips with meticulous digital itineraries, often escaping to nearby Olympic National Park or the San Juan Islands for weekend hikes, while dreaming of an immersive solo adventure
    in Iceland’s fjords and a spring visit to Kyoto’s cherry‑blossom gardens, balancing a modest student budget with a yearning for global perspectives.
  culinary: Sheila Thomas, an amateur home cook, often whips up grilled wild salmon drizzled with dill and lemon, hearty quinoa bowls tossed with roasted root vegetables and chickpeas, and indulges in matcha
    lattes topped with oat milk, while favoring farm‑to‑table eateries that serve seasonal dishes like mushroom risotto and locally sourced cheese boards.
  core: Sheila Thomas is a wistful yet pragmatic 21‑year‑old who merges retail precision with a compulsive love for watercolor vistas, constantly curating mood boards while battling late‑night worries that
    fuel both her creativity and occasional over‑thinking.
background:
  cultural: Sheila is a white American raised in Greenacres, Washington, within a middle‑class family with roots in the Midwest and the East Coast, reflecting Irish and German ancestry. Growing up in the
    Pacific Northwest, she internalized the region’s values of self‑reliance, environmental stewardship, and a vibrant, progressive community spirit. The local culture, characterized by a strong appreciation
    for outdoor recreation and an emerging arts scene, has shaped her worldview, fostering an openness to diverse ideas and a commitment to community involvement. While she identifies with mainstream American
    cultural norms, she also embraces inclusive, forward‑thinking attitudes common in Spokane County.
attributes:
