  career_goals: Bryant aims to transition into a mentorship and consulting role within the store, guiding younger associates in sales techniques and customer service excellence. He wishes to curate a rotating
    collection of Guatemalan artisan products in the retail space, fostering cultural awareness while boosting sales. He hopes to be recognized as a senior advisor for visual merchandising, contribute articles
    to the company's internal newsletter on retail innovation, and eventually publish a memoir that blends his love of art, business, and Guatemalan heritage. Maintaining his health to stay active in the
    community remains a core ambition.
