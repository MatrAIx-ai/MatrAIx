  career_goals: He dreams of a career that merges his love for art and technology, such as becoming an architect who designs sustainable community spaces or a video‑game developer who creates immersive,
    educational games. He hopes to attend a high‑school program focused on STEM and the arts, win a regional robotics competition, and eventually lead a project that improves his hometown’s public spaces
    or environmental education.
