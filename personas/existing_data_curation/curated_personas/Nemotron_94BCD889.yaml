  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Church choir'', ''Quilting'', ''Reading historical fiction'', ''Community event volunteering'', ''Attending high school sports'', ''Family travel'']'
  career_goals: Building on her proven track record, Sheretta aims to transition into a regional sales manager role within the next five years, where she can lead a team, design training programs, and integrate
    community‑focused initiatives. She also envisions launching her own boutique that highlights locally sourced crafts and Southern cuisine, thereby contributing to the economic vitality of Hartwell and
    providing mentorship opportunities for emerging local entrepreneurs.
