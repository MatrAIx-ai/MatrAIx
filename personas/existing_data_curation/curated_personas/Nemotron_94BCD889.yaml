personas:
  professional: Sheretta Dary, a seasoned sales professional in Hart County, blends two decades of relationship‑building, Salesforce expertise, and a curiosity‑driven yet practical mindset to tailor product
    solutions, lead community sales events, and assertively mentor junior staff while staying organized and adaptable to market shifts.
  sports: Sheretta Dary energizes her weekends by cheering for the Hart County High School football team, participates in a local walking club around Lake Hartwell for low‑impact fitness, and follows the
    Atlanta Braves and Atlanta Falcons for regional sports camaraderie.
  arts: Sheretta Dary finds creative fulfillment quilting to gospel classics, sings alto in her church choir performing uplifting hymns, and devotes evenings to historical novels set in the American South
    by authors like William Faulkner and Eudora Welty, shaping her cultural appreciation.
  travel: Sheretta Dary prefers family‑oriented road trips across the Southeast, having driven to Savannah, Charleston, and New Orleans to reconnect with relatives, while planning a future leisurely cruise
    along the Gulf Coast once her boutique launch stabilizes financially.
  culinary: Sheretta Dary, an enthusiastic Southern‑comfort cook, perfects her fried chicken with a buttermilk brine, seasons smoked collard greens with cayenne and smoked paprika, and crafts peach cobbler
    topped with honey‑butter, often sharing these dishes at community festivals.
  core: Sheretta Dary balances curiosity‑driven practicality with a disciplined schedule, yet secretly hoards discount coupons and occasionally forgets to water potted herbs while juggling sales leadership
    ambitions and community passions.
background:
  cultural: Sheretta was raised in a close‑knit African‑American community in rural Georgia, where church, family gatherings, and oral storytelling shaped her worldview. These roots instilled a deep appreciation
    for gospel music, Southern cooking, and community service. Her cultural heritage emphasizes resilience, solidarity, and a pragmatic optimism that guides both her personal pursuits and professional endeavors,
    allowing her to navigate the demands of her sales career while staying rooted in the values of her community.
