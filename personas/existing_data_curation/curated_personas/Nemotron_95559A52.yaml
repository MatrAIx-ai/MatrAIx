personas:
  professional: Jane Gibson, a 19‑year‑old aspiring visual communicator, blends her curiosity for Gulf Coast aesthetics with a competitive edge, rapidly producing Instagram‑ready graphics for local cafés
    and tourism outfits using free tools like Krita while openly critiquing design trends and improvising when resources run thin.
  sports: Jane Gibson enjoys weekend beach volleyball at the Punta Gorda shoreline, follows the Tampa Bay Rays with fervor, and occasionally joins the local community yoga class for flexibility, but their
    competitive nature shines most during spirited board‑game nights where they treat each match like a sport.
  arts: Jane Gibson curates a modest Instagram feed that showcases their own digital collages alongside inspirations from street‑muralist Banksy‑style artists, indie singer‑songwriter Mitsuki, and local
    Gulf Coast muralist Ana Reyes, regularly attending open‑mic sessions at The Dockside Café and immersing themselves in experimental graphic novels by Junji Ito.
  travel: Jane Gibson prefers spontaneous road trips along the Gulf Coast—exploring the Everglades, catching sunrise in Key West, and dreaming of a future backpacking stint through the Pacific Northwest—while
    budgeting travel through occasional freelance gigs and using Instagram Stories to map out each layover.
  culinary: Jane Gibson favors the briny tang of shrimp po’boy and the citrus zing of key‑lime pie, dabbling in home‑cooked Cajun jambalaya and mango salsa with a beginner’s hand that often leaves the rice
    a bit under‑cooked, and they love hunting for fresh seafood at the Saturday farmers‑market while occasionally treating themselves to gourmet avocado toast at the beachfront café.
  core: Jane Gibson is a fiercely curious, 19‑year‑old visual creator who balances a relaxed, disorganized schedule with a competitive drive that fuels both their art and their board‑game victories, often
    juggling spontaneous freelance gigs, occasional health neglect, and a knack for impulsive splurges on art and food.
background:
  cultural: Jane’s cultural background is rooted in a White, middle‑class family that has lived in the Gulf Coast region for several generations. Growing up in Punta Gorda, she was exposed to a blend of
    Southern hospitality, beach‑side leisure, and a growing arts community driven by tourism and local heritage festivals. Family traditions include celebrating holidays such as Thanksgiving and Christmas
    with a focus on community gatherings and homemade meals. Her environment reflects a mix of Southern influences—moderate religiosity, a love for outdoor activities like fishing and kayaking—and a cosmopolitan
    curiosity sparked by the diverse visitors who frequent the area. This setting nurtured her appreciation for both the natural beauty of Florida’s coastline and the eclectic artistic expressions brought
    by traveling artists and regional creatives. Jane’s upbringing emphasized flexibility and a laid‑back approach to daily life, mirroring the coastal rhythm, while also instilling a subtle competitive
    spirit through local sports leagues and community art contests.
attributes:
