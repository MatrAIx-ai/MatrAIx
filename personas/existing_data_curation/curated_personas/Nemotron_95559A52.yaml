  hobbies: '[''Visiting galleries and street murals'', ''Digital collage creation'', ''Sketching and watercolor painting'', ''Sunrise and nature photography'', ''Attending indie music and open‑mic events'',
    ''Playing competitive board games'', ''Reading graphic novels and experimental literature'']'
  career_goals: Jane aims to obtain her GED within the next year and then enroll in a community college program focused on visual communications or graphic design. She envisions building a freelance portfolio
    that serves local tourism businesses, beachfront cafés, and art festivals in Punta Gorda, leveraging her knowledge of the area’s aesthetic and her ability to produce flexible, on‑demand creative assets.
    Over the next five years, she hopes to win a regional art competition, secure a modest studio space to host community workshops, and eventually launch a small cooperative gallery that showcases emerging
    artists from the Gulf Coast while providing a supportive, yet challenging environment for artistic growth. Her competitive drive fuels a desire to be recognized as a leading young visual talent in her
    region, while her appreciation for varied experiences pushes her to experiment with interdisciplinary projects that blend art, environmental awareness, and local culture.
