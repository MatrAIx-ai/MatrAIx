  career_goals: Though retired from formal employment, Sharon is determined to leverage her STEM background and love of the arts to foster intergenerational learning in her community. Her main ambitions
    include establishing a quarterly STEM‑arts showcase at the Waynesburg community center, mentoring high‑school students interested in science through one‑on‑one tutoring, and completing a written memoir
    that weaves her family’s genealogical story with reflections on scientific advances over the past half‑century. She also hopes to travel to three major art museums in the Northeast within the next five
    years and to serve on the board of the local historical society, ensuring the region’s cultural heritage is documented and celebrated.
