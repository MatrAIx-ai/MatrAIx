  career_goals: In the near term, Deneil aims to raise his academic performance by consistently earning top grades in math and science, while securing a spot on his school's robotics club and winning a
    local chess tournament. He plans to attend a specialized STEM high school in New York City, where he can deepen his coding skills and participate in advanced engineering projects. Over the next few
    years, he aspires to land a mentorship with a tech company or a community‑based youth program, using his organizational talents to lead collaborative initiatives. Ultimately, Deneil envisions becoming
    a software engineer or a technology entrepreneur who designs tools that address urban challenges in Brooklyn, such as affordable housing solutions or community education platforms. His career ambition
    is driven by a competitive spirit and a desire to translate practical ideas into real‑world impact.
