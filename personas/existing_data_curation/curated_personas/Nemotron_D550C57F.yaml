  career_goals: Terry aims to attend a high school with strong STEM and arts programs, eventually pursuing a career that blends technology and helping people—such as a software engineer focused on mental‑health
    applications or a biomedical engineer designing supportive devices. He also envisions becoming a community mentor, using his technical skills and compassionate nature to guide younger students and promote
    wellness in his hometown.
