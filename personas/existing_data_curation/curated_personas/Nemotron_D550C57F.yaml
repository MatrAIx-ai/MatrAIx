personas:
  professional: A budding game developer, Terry Perlaza channels their curiosity and practical mindset into coding small indie games, often using Unity and Python, while their compassionate nature leads
    them to design inclusive gameplay that encourages cooperation among friends.
  sports: Athletically, Terry Perlaza enjoys weekend hikes in the Angeles National Forest and runs with a middle‑school cross‑country team, supports the Los Angeles Dodgers and LA Galaxy, and occasionally
    joins a community‑center basketball league to stay active, preferring low‑key, nature‑focused exercise over crowded gyms.
  arts: Terry Perlaza nurtures their artistic side by sketching forest landscapes during hikes, strumming acoustic renditions of John Mayer and Mitski for a small circle of friends, and diving into fantasy
    novels by J.R.R. Tolkien and graphic novels by Marjane Satrapi, weaving these influences into a quietly expressive personal aesthetic.
  travel: Terry Perlaza prefers low‑key, nature‑centric travel, having trekked through Yosemite and camped at Joshua Tree, they meticulously plan each outing in a travel journal while dreaming of future
    adventures in Kyoto's bamboo forests and New Zealand's Fiordland, balancing modest family budget constraints with a hunger for immersive experiences.
  culinary: At the kitchen counter, Terry Perlaza, a self‑taught home cook, often crafts avocado toast topped with heirloom tomatoes and a dash of chili flakes, experiments with homemade veggie ramen featuring
    miso broth and shiitake mushrooms, and enjoys occasional taco nights with fresh cilantro and lime, showcasing a palate that favors fresh, vibrant flavors.
  core: Terry Perlaza is a quietly curious teen whose habit of over‑thinking fuels marathon coding sessions and nightly journaling, yet they often sacrifice sleep for late‑night snack binges.
background:
  cultural: Terry grew up in a middle‑class white family in Acton, California, a community that balances suburban life with a rural, outdoorsy vibe. His upbringing reflects typical Southern‑California values
    of independence, community involvement, and environmental awareness. Family traditions include seasonal celebrations at local fairs, weekend outings to nearby parks, and occasional volunteer work at
    the community center. While his ethnic heritage is primarily European (with Anglo‑American roots), the diverse cultural landscape of Los Angeles County has exposed him to a variety of perspectives,
    encouraging an inclusive outlook that aligns with his compassionate personality.
