  career_goals: Although retired, Eddie aims to stay physically and mentally active. He plans to expand the community garden program in The Villages, mentor the next generation of volunteers at the senior
    center, and complete a personal memoir documenting his family’s civil‑rights era stories. He also hopes to learn to play the piano and obtain a basic certification in first‑aid to be more helpful during
    community events. Keeping his curiosity alive, he intends to deepen his genealogy research using online archives.
