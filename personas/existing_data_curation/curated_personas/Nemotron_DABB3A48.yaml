personas:
  professional: Yaritza Radillo, a 12‑year‑old aspiring game developer, channels her love for structured problem‑solving from Sudoku and disciplined coding in Scratch into crafting simple yet polished games,
    thriving in the quiet of her room where they can focus without distraction.
  sports: Yaritza Radillo loves exploring the Toa Alta hills with the local youth Trail Explorers club, joins a community swim team on weekends, cheers for the Island Suns baseball club and the Coastal
    FC soccer team, and keeps a structured weekly calendar for her hiking routes, balancing solitary activity with light team spirit.
  arts: Yaritza Radillo immerses herself in piano practice, often working through Beethoven’s "Für Elise" and Einaudi’s "Nuvole Bianche", reads English classics like "Harry Potter" alongside Spanish works
    such as "Cien años de soledad", and enjoys listening to the cello virtuoso Yo‑Yo Ma and the indie pop of Billie Eilish, letting these influences shape her creative coding narratives.
  travel: Yaritza Radillo prefers well‑planned trips that blend quiet exploration and family time, frequently visiting the island’s historic coastal town and local trails, while dreaming of strolling through
    Paris’s gardens and watching the cherry blossoms in Kyoto, always drafting itineraries in their journal before departure.
  culinary: Yaritza Radillo delights in baking heritage treats like coconut macaroons, sweet plantain muffins, and banana bread, meticulously measuring ingredients and noting variations in a kitchen notebook,
    while also savoring slice‑of‑pizza nights and experimenting with homemade ramen broth for fun.
  core: Yaritza Radillo is a methodical 12‑year‑old who channels disciplined solitude into puzzles, piano, precise coding, and careful budgeting, manages mild health quirks through journaling, and thrives
    on quiet hikes and family‑rooted baking.
background:
  cultural: Yaritza grew up in Toa Alta and Bayamón, municipalities of Puerto Rico, within a close‑knit, bilingual family that values education, community, and cultural traditions. She celebrates local
    festivals such as fiestas patronales, enjoys música jíbaro and plena, and speaks both Spanish and English fluently. Her upbringing emphasizes respect for elders, a strong Catholic influence, and a deep
    appreciation for Puerto Rican cuisine and the island’s natural beauty. These cultural elements shape her worldview and inspire her goals to give back to her community.
