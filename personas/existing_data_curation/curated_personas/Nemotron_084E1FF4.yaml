  career_goals: Though retired from formal employment, Vidya aims to remain a driving force in her hometown. She seeks to chair the volunteer board of the local senior center, where she can shape programs
    that promote social connection and lifelong learning. She plans to mentor younger volunteers, sharing her experience in event coordination and fundraising to build the next generation of community leaders.
    Vidya also wishes to preserve Lima's local history by compiling oral histories and creating a digital archive accessible to schools and libraries. Additionally, she hopes to raise funds for neighborhood
    improvements, such as a community garden and a refurbished public library wing, while continuing to stay physically active and emotionally resilient.
