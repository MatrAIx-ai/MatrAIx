  hobbies: '["Gardening (herbs, tomatoes, roses)","Preparing and sharing Salvadoran dishes (pupusas, tamales)","Social dancing (cumbia, salsa)","Church choir and fellowship gatherings","Reading historical
    and literary fiction","Knitting and crocheting blankets","Crossword puzzles and Sudoku","Bridge and card games at senior center","Storytelling and oral history recording","Listening to traditional Salvadoran
    music"]'
  career_goals: Although retired, Maria aims to remain a vital cultural bridge for her family and the Albany Latino community. She wishes to mentor younger volunteers at the senior center, compile a memoir
    of her family's migration story, and master newer digital tools so she can teach her grandchildren and great‑grandchildren how to preserve their heritage online. She also hopes to expand her volunteer
    role as a liaison between the senior center and local cultural festivals, ensuring older adults are included and celebrated.
