persona_description: A cimbalom player and music director from Cleveland, Ohio, known for his exceptional skills and performances, including a television special about the cimbalom and a weekly radio program.
  He has performed with the Cleveland Symphony, Philadelphia Orchestra, and Detroit Symphony, and has recorded with major orchestras and composers. He is highly sought after for his versatility and ability
  to perform a wide range of music genres, including American standards, show tunes, popular, classical, and music from almost every European country. He has also performed for prominent figures such as
  Zsa Zsa Gabor, Dwight Eisenhower, and Itzhak Perlman.
