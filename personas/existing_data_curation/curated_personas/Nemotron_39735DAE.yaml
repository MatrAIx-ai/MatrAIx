  career_goals: Although no longer in the formal workforce, Luis aims to stay intellectually active by mentoring young engineers and hobbyists in Rio Rancho, helping local schools integrate hands‑on STEM
    projects, and supporting community solar initiatives. He aspires to author a memoir that weaves his Puerto Rican heritage with his engineering journey, and to give occasional talks on the practical
    benefits of renewable technologies for senior citizens. A personal ambition is to travel back to Puerto Rico to document family stories and contribute to a cultural preservation project, while maintaining
    his health through regular walks and mindfulness practices to manage his natural tendency toward worry.
