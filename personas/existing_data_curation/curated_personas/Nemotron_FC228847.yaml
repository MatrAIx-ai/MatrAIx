  career_goals: Nichelle aims to progress to a senior executive HR role—such as Director or VP of Human Resources—where she can shape organization‑wide strategies, champion comprehensive mental‑health and
    wellness initiatives, and embed data‑driven decision‑making across the workforce. She also seeks to obtain the SHRM‑Senior Certified Professional (SHRM‑SCP) credential, mentor emerging HR professionals
    within her company, and lead community partnerships that enhance employee well‑being while reinforcing her commitment to practical, compassionate leadership.
