personas:
  professional: Elizabeth Burgess, an aspiring young engineer, channels their fascination with LEGO constructions and backyard science experiments into leading the fourth‑grade robotics club, where they
    apply meticulous organization, high standards, and a collaborative spirit to design simple automated vehicles.
  sports: Elizabeth Burgess bolts across the field as a forward for the Midtown Youth Soccer Club’s Junior Wildcats, practices three times a week, sharpens agility in a weekly hip‑hop dance class, and passionately
    cheers for the professional Metro FC while they keep detailed statistics of their own performance in a personalized notebook.
  arts: Elizabeth Burgess immerses themselves in the mystery adventures of Nancy Drew by Carolyn Keene, dances to the energetic choreography of Disney’s ‘Frozen’ songs while they listen to Taylor Swift’s
    pop hits, and builds intricate LEGO sculptures inspired by master builder Nathan Sawaya, all of which fuel a vibrant creative imagination.
  travel: Elizabeth Burgess loves crafting colorful itineraries with sticker‑filled maps, enjoys weekend road trips to the Grand Canyon and a summer visit to Disney World in Florida, and dreams of exploring
    the historic streets of Paris on a future family vacation, where they imagine capturing photos of iconic landmarks.
  culinary: Elizabeth Burgess delights in whisking together strawberry‑banana smoothies with Greek yogurt, assembling pepperoni pizza slices with extra cheese, and constructing playful LEGO‑shaped macaroni‑and‑cheese
    bites, following simple step‑by‑step recipes under parental guidance while they carefully align each cheese topping like a LEGO brick.
  core: Elizabeth Burgess is a meticulous, compassionate nine‑year‑old LEGO architect who balances soccer drills, mystery novels, and community service, yet often worries about perfection and occasionally
    forgets to unwind, which sometimes leads them to stay up late perfecting a build.
background:
  cultural: Elizabeth was raised in a military family stationed at Fort Moore, GA, where the values of duty, respect, and camaraderie are woven into daily life. The Southern setting adds a flavor of hospitality,
    community festivals, and a strong sense of local tradition, such as celebrating Fourth of July parades and regional food gatherings. Her household honors both national holidays and military customs,
    fostering a blend of patriotism, discipline, and inclusivity that shapes her worldview.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Scientific inquiry", "Time management", "Team collaboration", "Empathy and conflict mediation", "Basic computer literacy", "Event coordination"]'
  hobbies: '["Soccer", "Dance class", "LEGO building and organization", "Reading mystery novels", "Home science experiments", "Girl Scout service projects", "Board game nights with family", "Community gardening"]'
  career_goals: Elizabeth envisions a future where she can combine her love for helping others with rigorous problem‑solving. She dreams of becoming a pediatric physician or a pediatric nurse, because she
    wants to care for children while applying the disciplined study habits she has cultivated. She also hopes to lead community‑service initiatives, perhaps as a teacher or youth mentor, and aspires to
    earn academic scholarships that will allow her to pursue advanced science education.
