personas:
  professional: Misty Herbert, a 15‑year‑old high‑school student, channels her curiosity and love for mixed media into freelance event photography and school mural projects, balancing organized deadlines
    with spontaneous creative experiments, and they thrive when collaborating with classmates on theatrical set designs.
  sports: Misty Herbert, a lively midfielder on her middle‑school soccer team, also attends contemporary dance classes, passionately roots for the North Carolina FC, and they view sports as a social outlet
    that helps temper their worries.
  arts: Misty Herbert, an avid mixed‑media sketcher and budding photographer, draws inspiration from the surreal worlds of Hayao Miyazaki, the emotive installations of Yayoi Kusama, and the theatrical energy
    of Lin‑Manuel Miranda’s Broadway shows, weaving these influences into her school drama performances and community art exhibitions.
  travel: Misty Herbert, who dreams of swapping her sketchbook for a passport, has explored the nearby Outer Banks and historic streets of Charleston with friends, longs to trek the misty cliffs of the
    Scottish Highlands, and they prefer a blend of organized day‑trip plans and spontaneous photo walks.
  culinary: Misty Herbert, a self‑proclaimed fan of shrimp po'boys and mango sorbet, often experiments with quick recipes like avocado toast topped with smoked salmon, while occasionally over‑seasoning
    midnight ramen bowls when stress spikes, and they love to share homemade treats at drama rehearsals.
  core: Misty Herbert, a 15‑year‑old coastal creative, balances restless curiosity with lingering anxiety, channeling energy into art, sport, and buzzing social circles while occasionally over‑indulging
    in midnight snacking and procrastinating on schoolwork.
background:
  cultural: Misty is a white teenager raised in Castle Hayne, a suburban community in New Hanover County, North Carolina. The region’s Southern coastal culture influences her life through family gatherings
    featuring traditional Southern food, local festivals celebrating the Atlantic shoreline, and a close‑knit community spirit. Her family values education, modesty, and hospitality, while the diverse school
    environment exposes her to a wide range of cultural perspectives, encouraging her open‑mindedness and appreciation for varied experiences. Church activities and community volunteer events also shape
    her sense of responsibility and desire to contribute positively to her neighborhood.
