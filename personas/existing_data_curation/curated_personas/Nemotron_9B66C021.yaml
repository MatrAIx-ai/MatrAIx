  career_goals: Misty aspires to attend a specialized art school after high school, aiming to become a graphic designer or visual artist who uses her work to foster community well‑being. She hopes to combine
    her love of art with her caring nature by eventually studying art therapy or community outreach, creating programs that help young people manage stress and express themselves creatively. In the long
    term, she envisions a career as a creative director for a nonprofit or a socially‑focused design studio, using her skills to promote harmony and positive change.
