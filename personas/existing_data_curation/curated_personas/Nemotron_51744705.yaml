  hobbies: '[''Oil Painting'', ''Sketching Architectural Details'', ''Visiting Art Galleries'', ''Landscape Photography'', ''Hiking in North Georgia'', ''Woodworking'', ''Volunteer Mentoring'', ''Reading
    Historical Nonfiction'', ''Classical Music Listening'', ''Cooking International Cuisine'']'
  career_goals: Alexander aims to transition from first‑line supervision to senior project management within the next five years, eventually earning a PMP certification and becoming a certified LEED Accredited
    Professional. He envisions launching his own construction firm that integrates sustainable building practices with community art installations, creating spaces that reflect both functional excellence
    and cultural vibrancy. He is also committed to championing a safety‑first culture on every job site and establishing a mentorship program for young tradespeople in Gwinnett County.
