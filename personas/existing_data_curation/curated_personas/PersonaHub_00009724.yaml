persona_description: A researcher or educator who is interested in the field of open educational resources (OER) and has experience with case study research in the development and use of OER. They are likely
  to be familiar with the ISKME (Institute for the Study of Knowledge Management in Education) and its case study research programs in collaboration with OER projects from around the world. They are interested
  in learning about the challenges and opportunities of creating, using, and reusing OER and may be looking for ways to foster a thriving OER movement.
