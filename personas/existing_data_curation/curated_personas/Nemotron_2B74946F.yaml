    local art exhibitions'']'
  career_goals: Alexander aims to advance to a senior project management role and eventually lead the PMO for a regional infrastructure initiative. He plans to earn his PMP certification, pursue a master's
    in strategic management, and champion innovative, creativity‑focused project frameworks within his organization. Long‑term, he envisions starting a consulting practice that helps other firms integrate
    artistic thinking into complex project execution while mentoring emerging project managers.
