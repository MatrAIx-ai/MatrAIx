personas:
  professional: Karen Komada, a veteran construction cost estimator with three decades of experience reading blueprints, mastering ProEst and RSMeans, and turning complex data into clear client presentations,
    leverages their skeptical eye and competitive streak to spot hidden expenses while their spontaneous curiosity fuels innovative budgeting for community art installations.
  sports: Karen Komada follows the Cleveland Browns and the Cleveland Cavaliers with passionate debate at the senior center’s weekly viewing party, plays in a low‑impact bowling league, and stays active
    through water aerobics and senior dance classes, though their competitive nature sometimes fuels a stubborn reluctance to skip a game even when a joint ache begs for rest.
  arts: Karen Komada immerses themselves in watercolor sessions inspired by Monet’s Water Lilies and Winslow Homer’s river scenes, captures candid shots of local historic districts in the style of Ansel
    Adams, and attends calligraphy workshops that echo tea‑ceremony aesthetics, all while debating the merits of contemporary installations at the Butler Institute of American Art.
  travel: Karen Komada loves spontaneous road trips, having recently driven the historic Route 66 to explore small towns like Marietta, Ohio, and a weekend pilgrimage to Kyoto’s tea houses, while their
    budget‑conscious nature keeps future plans focused on affordable Midwestern festivals such as the Ohio State Fair and the annual Anderson Arts Festival.
  culinary: Karen Komada enjoys experimenting in the kitchen, often blending Midwestern comfort foods like butternut squash soup with miso‑glazed salmon, and they skillfully bake matcha‑infused brownies
    and homemade apple crisp topped with locally sourced cinnamon, while occasionally over‑salting dishes when excitement from a new recipe overtakes caution.
  core: Karen Komada is a curious, competitive 72‑year‑old who balances meticulous cost‑saving instincts with spontaneous art‑loving adventures, a love of bridge, and a habit of worrying over every detail
    while never missing a senior dance class.
background:
  cultural: Karen grew up in the rust‑belt towns surrounding Youngstown, Ohio, in a working‑class, predominantly white Midwestern family that valued hard work, community, and self‑reliance. The decline
    of the steel industry in the 1970s shaped her pragmatic outlook and sparked her interest in cost efficiency. She married a Japanese‑American husband, adopting the Komada surname, which introduced her
    to elements of Japanese culture—tea ceremony, calligraphy, and an appreciation for minimalist aesthetics—that now complement her Midwestern roots. Karen remains active in her local Methodist church,
    volunteers with the Mahoning County historical society, and celebrates both traditional American holidays and Japanese customs like Obon with her extended family. This blend of Midwestern practicality
    and cross‑cultural curiosity informs her worldview and artistic tastes.
attributes:
  skills: '[''Cost Estimation'', ''Blueprint Reading'', ''Construction Materials Pricing'', ''Bid Proposal Development'', ''Estimating Software (ProEst, RSMeans)'', ''Advanced Excel Data Analysis'', ''Risk
    Assessment'', ''Vendor Negotiation'', ''Client Presentation'', ''Art Market Valuation'']'
  hobbies: '[''Visiting Art Galleries'', ''Painting and Watercolor'', ''Photography'', ''Reading Philosophy and Science'', ''Spontaneous Road Trips'', ''Community Theater'', ''Bridge and Trivia Competitions'',
    ''Gardening'', ''Cooking and Baking'', ''Senior Dance Classes'']'
  career_goals: Approaching retirement, Karen aims to shift from full‑time estimating to a flexible consulting role that lets her share her hard‑won knowledge with younger professionals and local trade
    schools. She hopes to earn the Certified Professional Estimator (CPE) credential, finish the associate degree she began decades ago, and author a guidebook on cost estimation that blends practical techniques
    with her love of art budgeting. She also dreams of leading community‑driven art‑and‑construction projects that revitalize historic neighborhoods in the Mahoning County area, while preserving her financial
    independence and reducing work‑related stress.
