  career_goals: Armando aims to leverage his technical expertise in a part‑time consulting role that offers clear structure and predictable schedules. He is interested in mentoring youth from the Latino
    community in Denver, guiding them through STEM education and career pathways. Additionally, he hopes to develop a small, home‑based business focused on sustainable home improvements, allowing him to
    apply his engineering background while maintaining a stable work‑life balance that reduces stress. Long‑term, he seeks to achieve a sense of purpose through contributing to community projects and securing
    a modest, reliable income that supports his family's needs.
