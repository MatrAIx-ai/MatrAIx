    development'', ''Research data collection and statistical analysis'', ''Training and mentoring junior staff'', ''Client education and communication'', ''Emergency triage and crisis management'', ''Cross‑cultural
    client sensitivity'', ''Environmental health awareness'']'
  hobbies: '[''Hiking coastal and mountainous trails on Oahu'', ''Snorkeling and marine wildlife observation'', ''Gardening tropical orchids and succulents'', ''Reading scientific journals and science‑fiction
    novels'', ''Yoga and meditation'', ''Volunteering at local animal shelters'', ''Cooking healthy fusion dishes'', ''Participating in a community book club'', ''Photography of nature and wildlife'', ''Learning
    basic Hawaiian language phrases'', ''Attending local music and cultural festivals'']'
  career_goals: Kiersten aims to become a Certified Veterinary Technician Specialist (CVTS) in anesthesia within the next two years and leverage that credential to lead a senior technologist team at her
    clinic. She envisions establishing a community outreach program that provides free preventive‑care workshops for pet owners in underserved neighborhoods of Honolulu. Long‑term, she hopes to collaborate
    with local wildlife rescue organizations to develop health‑monitoring protocols for native species, integrating her one‑health interests. Kiersten also plans to pursue a Master’s degree in Public Health
    focused on zoonotic disease surveillance, allowing her to bridge clinical practice with community health initiatives while maintaining a balanced work‑life schedule.
