personas:
  professional: Kelly Hartsell, a retired computer programmer and former project coordinator, leverages decades of technical writing, COBOL and Fortran expertise, and meticulous project management to run
    community STEM outreach, mentor a high‑school coding club, and develop workshops that fuse coding with watercolor art, all while documenting local oral histories.
  sports: Kelly Hartsell enjoys low‑impact fitness through daily walks in the local park, participates in a senior softball league, follows the Philadelphia Eagles and the Philadelphia Phillies, and attends
    community yoga classes at the senior center each spring.
  arts: Kelly Hartsell expresses her creativity through watercolor paintings of garden scenes inspired by Claude Monet, regularly visits the regional art museum to view works by Georgia O'Keeffe, attends
    the local theater where productions of August Wilson plays feature community actors, and captures nature with a digital camera influenced by Ansel Adams.
  travel: Kelly Hartsell prefers well‑planned road trips to historic sites like Gettysburg and Williamsburg, has visited New York City for Broadway shows, dreams of touring the art galleries of Paris and
    the Tuscan countryside, and usually travels with a notebook in hand to sketch and log local flora.
  culinary: Kelly Hartsell’s culinary style centers on fresh garden harvests, crafting ratatouille with heirloom tomatoes, basil, and zucchini, baking apple‑cinnamon crumble for the knitting circle, and
    occasionally over‑seasoning with too much rosemary while proudly serving home‑grown salads with goat cheese.
  core: Kelly Hartsell blends a methodical mind, a garden‑grown palate, and an artistic curiosity into a lifelong habit of teaching, creating, and preserving community stories, all while occasionally misplacing
    their reading glasses.
background:
  cultural: Kelly grew up in a mid‑Midwestern, predominantly white community in Ohio during the 1960s and 1970s. Raised in a Methodist household, she was taught the values of service, modesty, and community
    involvement. Her father worked as an electrical engineer for a power company, which sparked her early interest in STEM. The family’s long‑standing roots in Montgomery County fostered a deep appreciation
    for local traditions, agricultural heritage, and small‑town solidarity. These cultural influences, combined with her exposure to the civil‑rights era’s expanding educational opportunities for women,
    shaped her independent, curious, and collaborative outlook.
