  career_goals: Although retired, Kelly remains eager to apply her expertise to benefit her community. She aims to expand the local high‑school coding club she mentors, develop a series of workshops that
    blend technology with visual arts, and document the oral histories of longtime Lewisburg residents. Additionally, she plans to sharpen her digital photography skills to create a visual archive of community
    events, and she hopes to author a memoir that intertwines her personal journey with the evolution of women in STEM over the past five decades.
