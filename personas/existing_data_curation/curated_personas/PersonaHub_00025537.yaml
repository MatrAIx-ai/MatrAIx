persona_description: A physicist who specializes in the field of micro-mechanics, particularly the design and control of micromechanical devices at microscopic scales. His research interests include the
  conversion of thermal to mechanical energy on a microscopic level, the design of future micromechanical machines, and the exploration of the limitations of classical thermodynamics on scales for which
  thermal fluctuations are important. He is particularly interested in the realization of a microscopic heat engine and the demonstration of its experimental realization in the Stuttgart-based experiment.
