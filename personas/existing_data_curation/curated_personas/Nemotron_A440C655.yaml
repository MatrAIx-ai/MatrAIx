personas:
  professional: A seasoned electrical engineering veteran, Mary Smith applies over 30 years of analog and digital circuit design, power electronics, and embedded-system expertise—combined with Six Sigma
    rigor and a passion for artistic aesthetics—to drive innovative smart-grid and IoT lighting projects while methodically mentoring junior engineers.
  sports: An avid outdoor enthusiast, Mary Smith regularly hikes the Santa Monica Mountains with the local Sierra Club trail group, practices yoga twice weekly at a downtown studio, follows the LA Lakers
    and the LA Dodgers closely, and joins a senior cycling club for weekend rides during spring.
  arts: A devoted advocate of contemporary culture, Mary Smith frequently visits The Broad and LACMA for avant‑garde installations, attends experimental theater productions at REDCAT, collects photographs
    inspired by Ansel Adams and Olafur Eliasson, and draws creative inspiration from musicians like Björk and Philip Glass.
  travel: An intentional wanderer, Mary Smith prefers meticulously planned weekend getaways—such as a sunrise hike in Kyoto’s Arashiyama bamboo forest, a culinary tour of Barcelona’s tapas bars, and a future
    dream to chase the Northern Lights in Iceland—while balancing family commitments and a modest travel budget.
  culinary: A culinary experimenter, Mary Smith delights in crafting fusion dishes like a miso‑marinated lamb tagine with preserved lemon and sumac, whipping up Mediterranean‑Thai quinoa bowls with gochujang,
    and perfecting homemade focaccia topped with kimchi, all while maintaining a well‑stocked spice rack and occasionally over‑seasoning to the point of a peppery bite.
  core: Mary Smith blends methodical engineering mastery with an offbeat artistic flair, worries meticulously about every detail, pushes herself with competitive ambition, yet finds solace in yoga, hiking,
    and late-night kitchen experiments—though she can’t resist a third cup of coffee when deadlines loom.
background:
  cultural: Mary Marie grew up in a middle-class suburban community in Orange County, California, where her parents, both of Irish-German descent, emphasized education, self-reliance, and community service.
    Her formative years were shaped by the multicultural milieu of Southern California, exposing her to a wide range of cultural festivals, cuisines, and artistic expressions. Although she identifies as
    White American, living in Cerritos—a city celebrated for its diverse Asian and Latino populations—has deepened her appreciation for cross-cultural collaboration and has influenced her inclusive approach
    to both work and community involvement. Her upbringing combined traditional American values with the progressive, multicultural atmosphere of the Los Angeles region, fostering an openness to new ideas
    while maintaining a strong sense of personal responsibility.
