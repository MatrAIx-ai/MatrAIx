  career_goals: Looking ahead, Mary Marie aims to transition from hands-on engineering to a strategic leadership role where she can shape the direction of sustainable technology initiatives. She plans to
    lead a multidisciplinary R&D team focused on residential micro-grid solutions and energy-efficient lighting design, leveraging her curiosity for new ideas and her competitive drive to secure industry-first
    innovations. In parallel, she hopes to increase the representation of women in STEM by establishing a mentorship program at her company and serving on the board of a local nonprofit that promotes STEM
    education in underserved schools. Over the next five years, she also intends to author a technical book that bridges engineering practice with artistic design, cementing her legacy as both a technologist
    and a creative thinker. Managing stress and workload will be a priority, so she is committed to adopting structured work-life boundaries and wellness practices as part of her professional growth.
