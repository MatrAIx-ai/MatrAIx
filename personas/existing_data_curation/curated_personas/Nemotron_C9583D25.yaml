  career_goals: At 63, Kari is focused on leaving a lasting imprint on her community and the marketing profession. She aims to evolve from day‑to‑day campaign execution into a senior advisory role, where
    she can shape the overall brand strategy for regional businesses and non‑profits. Kari wants to spearhead a mentorship program within her company, nurturing the next generation of marketers and sharing
    her blend of traditional and digital expertise. Additionally, she hopes to launch a consulting practice that helps local artisans, farms, and small retailers adopt cost‑effective digital marketing techniques,
    preserving the economic vitality of Weaverville and surrounding towns. Kari also envisions speaking at community events and regional conferences, positioning herself as a thought leader on balancing
    innovation with the practical concerns of small‑town markets.
