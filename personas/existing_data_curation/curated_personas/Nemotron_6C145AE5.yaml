    community events"]'
  career_goals: Shara envisions a future where she can combine her love for organization, community, and communication. She aspires to become an elementary school teacher or a community event coordinator,
    roles that let her shape supportive environments for children and families. She also dreams of creating a bilingual youth media platform that highlights stories from the Mexican‑American community in
    Los Angeles, giving her voice a public stage while preserving cultural heritage. Ultimately, she aims to lead projects that bring people together and celebrate her roots, whether in a classroom, a cultural
    festival, or a local newsroom.
