personas:
  professional: Olivia Cline, a 38‑year‑old full‑stack web developer and UX designer, leads agile squads while weaving interactive digital art into museum experiences, channeling her curiosity and sociable
    charisma into public workshops and mentorship for women in tech.
  sports: Olivia Cline cycles the Willamette River with the Eugene Bike Club, hikes Cascades trails in summer, and roots for the Portland Timbers and Oregon Ducks, while occasionally joining the local recreational
    softball league to stay active and satisfy her competitive streak.
  arts: Olivia Cline curates her creative life by painting in her home studio, sketching Cascades landscapes, staging improv nights with the group The Resistance, and drawing inspiration from Yayoi Kusama’s
    immersive installations, Björk’s experimental music, and the avant‑garde theater productions at Portland Center Stage.
  travel: Olivia Cline plans her trips with a blend of meticulous research and spontaneous detours, favoring art‑centric cities like Kyoto, Barcelona, and New York for museum tours, while also carving out
    weekend hikes in the Canadian Rockies and road‑tripping along the Pacific Coast Highway whenever her budget allows.
  culinary: Olivia Cline delights in cooking international dishes—from aromatic Indian biryani seasoned with saffron to Thai green curry brimming with lemongrass and kaffir lime—while growing basil, rosemary,
    and heirloom tomatoes in her garden to freshen each plate, and she prides herself on mastering the art of homemade ramen broth.
  core: Olivia Cline is a tech‑savvy, art‑obsessed community builder whose curiosity fuels a career at the crossroads of code and creativity, and whose talkative, harmonious nature makes every project feel
    like a collaborative jam session.
background:
  cultural: Olivia grew up in a middle‑class white American family with German and Irish ancestry in the Pacific Northwest. Her upbringing combined a traditional Anglo‑American household with the liberal,
    environmentally‑conscious culture of Oregon. She attended public schools that emphasized community involvement, and as an adult she participates in Eugene’s vibrant arts scene, supports farm‑to‑table
    initiatives, and engages in local sustainability and equity projects. While she identifies with the broader American cultural heritage, her values are shaped by the region’s progressive outlook, love
    of outdoor recreation, and strong emphasis on collaborative community building.
