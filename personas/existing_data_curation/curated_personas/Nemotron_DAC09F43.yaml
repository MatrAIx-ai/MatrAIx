  career_goals: Olivia aims to progress into a senior engineering or technology leadership role where she can shape product strategy at the intersection of technology and the arts. She envisions leading
    cross‑functional teams that develop interactive digital experiences for museums, galleries, and community spaces, drawing on her full‑stack expertise and design sensibility. Over the next five years
    she plans to obtain a cloud architecture certification and a product‑management credential while expanding her mentorship program for under‑represented women in tech in the Eugene area. Ultimately,
    she hopes to launch her own social‑impact tech venture that democratizes access to creative tools and to be recognized as a thought leader who champions collaborative, inclusive innovation.
