  career_goals: Melissa aims to advance to an office manager or senior executive assistant position where she can shape a supportive, harmonious workplace culture. She aspires to develop employee wellness
    initiatives, mentor newer staff, and incorporate her passion for community service by coordinating volunteer programs. Over the next few years, she plans to earn a certificate in Human Resources or
    Project Management to broaden her strategic capabilities, while also seeking a more balanced schedule that reduces stress as she approaches retirement. Her goal is to blend her practical skill set with
    her compassionate nature to create an environment where both efficiency and employee well‑being thrive.
