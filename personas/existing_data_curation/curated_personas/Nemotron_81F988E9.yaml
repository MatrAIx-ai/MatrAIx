  hobbies: '[''Traveling to Colombia'', ''Cooking traditional dishes'', ''Dancing salsa and cumbia'', ''Birdwatching'', ''Attending local art exhibitions'', ''Volunteering at senior center'', ''Playing
    dominoes'', ''Gardening'', ''Reading art history books'']'
  career_goals: Even at 80, Carlos remains driven by a desire to leave a cultural imprint. He aims to compile a memoir and family cookbook that weaves together anecdotes, recipes, and stories from his Colombian
    roots. He hopes to mentor younger members of the local senior center, especially in preserving traditional music and dance. A lingering ambition is to make a short trip back to Colombia to reconnect
    with distant relatives and to bring back authentic ingredients for community cooking workshops.
