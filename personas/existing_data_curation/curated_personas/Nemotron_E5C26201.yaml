  career_goals: Joseph aims to become a senior engineer within the next two years, focusing on leading complex, high‑impact projects that demand rigorous quality standards. In the medium term, he aspires
    to a tech‑lead or software architect role where he can shape technical strategy and mentor junior developers, leveraging his natural drive for achievement. Long‑term, he envisions founding a technology
    startup that creates tools for mental‑health support, combining his personal experience with anxiety and his software expertise. He also plans to earn industry certifications (e.g., AWS Solutions Architect)
    to reinforce his credibility.
