  career_goals: Though only three, Carnell imaginatively envisions helping others in the future. He often talks about becoming a firefighter who rescues people, an astronaut exploring space, or a teacher
    sharing stories. In line with his calm and compassionate nature, his biggest ambition is to make people feel safe and happy. He also loves the idea of building things that make the world easier, reflecting
    his practical curiosity.
