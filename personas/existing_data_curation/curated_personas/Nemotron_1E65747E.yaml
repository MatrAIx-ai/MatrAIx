personas:
  professional: Carnell Belfort, a three-year-old budding architect of block castles, mixes curiosity with practicality by experimenting with new shapes while ensuring each tower stands firm, and they naturally
    organize toys by color, showing flexible leadership in sandbox projects with a calm, cooperative demeanor.
  sports: Carnell Belfort, a three-year-old who loves preschool soccer and swimming at the community pool, proudly wears a Tiny Tigers Soccer Club tee, often watches the City Mariners baseball games with
    family, and they balance energetic play with occasional quiet walks in the park.
  arts: Carnell Belfort, a three-year-old who delights in The Wiggles songs, watches Sesame Street every morning, and spends afternoons drawing Dr. Seuss characters, channels that creative energy into vivid
    crayon murals, and they often perform impromptu dance routines for amused family members.
  travel: Carnell Belfort, a three-year-old who has already explored Grandma's farm, marveled at pandas at the San Diego Zoo, and splashed on a beach in Florida, prefers family road trips with a favorite
    stuffed giraffe, balancing a love for new sights with a need for familiar bedtime routines.
  culinary: Carnell Belfort, a three-year-old who adores mac and cheese, chicken nuggets, and banana pancakes, loves stirring batter with a small wooden spoon, often asks for extra ketchup on veggies, and
    they occasionally refuse broccoli, reflecting a picky palate mixed with genuine curiosity about new flavors.
  core: Carnell Belfort is a calm, curious three-year-old who builds sturdy block towers, saves coins in a pink piggy bank, remains unflappable at doctor visits, and they insist on extra ketchup with every
    meal.
background:
  cultural: Carnell is raised in a Black family in Washington, DC, where African‑American cultural traditions are celebrated daily. His parents and grandparents share stories about the city’s civil‑rights
    history, attend community events such as Juneteenth parades and local soul‑food festivals, and play music ranging from gospel to contemporary R&B. The nearby public library and community center host
    bilingual storytimes and cultural workshops, which nurture his appreciation for his heritage while fostering a sense of belonging in the diverse capital.
