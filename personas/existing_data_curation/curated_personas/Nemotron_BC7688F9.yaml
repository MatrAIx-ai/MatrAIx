personas:
  professional: Anelise Vega, a budding junior scientist in her school's STEM club, channels her curiosity and practical mindset into building LEGO models that illustrate physics concepts and coding Scratch
    games that balance imaginative storylines with systematic logic, while her competitive yet reserved nature drives meticulous planning and reliable execution.
  sports: Anelise Vega enjoys swimming laps at the community pool, rides waves with her junior surf club on weekend mornings, and cheers for the regional baseball team the Harbor Hawks, while keeping a
    personal fitness log that records her beach‑combing walks and occasional beach volleyball matches.
  arts: Anelise Vega spends afternoons sketching coastal scenes, listening to folk melodies by the trio The Sea Callers, and immersing herself in adventure and science‑fiction novels by authors such as
    Neal Stephenson, letting these creative experiences fuel the imaginative storylines of her Scratch games.
  travel: Anelise Vega dreams of exploring the tide pools at Monterey Bay, wandering the cliffside trails of Portugal’s Algarve, and snorkeling the coral reefs of Australia’s Great Barrier Reef, always
    planning each trip with a detailed notebook of marine species to spot while balancing her family’s modest vacation budget.
  culinary: Anelise Vega eagerly helps prepare family tamales, carefully layering masa, seasoned pork, and chilies within corn husks before steaming, and mixes fresh salsa with tomatoes, cilantro, and serrano
    peppers, while also mastering simple grilled fish tacos seasoned with lime and cumin for beach picnics.
  core: Anelise Vega is a calm, competitively curious ten‑year‑old who blends solitary scientific tinkering, quiet artistic expression, and thoughtful money management, all while proudly contributing to
    family cooking traditions.
background:
  cultural: Anelise is a Mexican‑American growing up in Solana Beach, California. She speaks both Spanish and English at home and school, and her family maintains cultural traditions such as Día de los
    Muertos altars, celebrating Mexican holidays, and cooking traditional foods. The coastal Californian lifestyle adds a love for the beach, surfing culture, and environmental stewardship to her daily
    life. This blend of Mexican heritage and Southern‑California influences shapes her values of family, respect, curiosity about nature, and a pragmatic approach to challenges.
attributes:
  skills: '["Reading comprehension", "Logical puzzle solving", "Basic programming in Scratch", "Bilingual communication (Spanish & English)", "Organizational planning for school assignments", "Fundamental
    arithmetic and scientific observation"]'
  hobbies: '["Tide‑pool exploration", "LEGO building", "Reading adventure/science‑fiction novels", "Sketching coastal scenes", "Playing chess", "Scratch programming", "Small‑group school science club",
    "Family cooking of Mexican dishes (tamales, salsa)", "Beach walks and seashell collecting", "Listening to Mexican folk music"]'
  career_goals: Although still young, Anelise dreams of a future where she can explore and protect marine life along the California coast, aiming to become a marine biologist or environmental scientist.
    She also envisions creating educational games and interactive tools as a software developer, combining her curiosity for nature with her practical coding skills. She aspires to lead a science fair project,
    win competitions, and eventually contribute to community‑based conservation initiatives.
