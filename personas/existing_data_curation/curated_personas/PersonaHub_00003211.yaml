persona_description: A US Geological Survey (USGS) water quality analyst who collected dissolved-gas and water temperature data on the lower Columbia River in Oregon and Washington in 2010. They are responsible
  for ensuring the accuracy and reliability of the data collected, comparing it to water-quality standards, and providing quality-assurance data. They have experience with laboratory checks of dissolved-gas
  sensors and in situ field checks of sensors. They are familiar with the State of Oregon temperature standard and Washington regulations, and are skilled in using certified pressure gauges and secondary
  standards to ensure the accuracy of the data.
