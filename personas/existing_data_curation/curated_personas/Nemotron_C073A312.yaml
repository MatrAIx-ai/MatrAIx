  career_goals: Although retired, Martha remains driven to stay mentally active and socially engaged. She aims to complete a memoir documenting her family's journey through the Great Plains, expand her
    genealogy research, and mentor younger seniors in basic computer skills at the community center. Learning digital photography to capture her garden and grandchildren is a personal ambition, and she
    hopes to win a regional bridge tournament to satisfy her competitive spirit. Above all, she wants to preserve her marriage’s closeness, maintain her health, and travel locally to visit family.
