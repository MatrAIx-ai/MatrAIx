  career_goals: Miguel’s play often involves role‑playing as a teacher, a doctor, or a firefighter, reflecting his desire to help others and maintain harmony. While he does not have concrete career plans
    yet, his imagination is guided by his compassionate nature and his wish to make people feel safe and cared for, suggesting future ambitions toward community‑service occupations such as caregiving, teaching,
    or emergency response.
