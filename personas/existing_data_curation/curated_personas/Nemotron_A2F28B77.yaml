personas:
  professional: Miguel, the tiny organizer of block towers, demonstrates an early knack for methodical planning and cooperation, often arranging his toys by color and size before inviting a small circle
    of friends to build shared structures.
  sports: Miguel, the little explorer, loves the desert park’s splash pad in summer and runs after the Arizona Cardinals’ mascot at weekend games, but prefers solitary sandcastle building over loud group
    soccer scrimmages.
  arts: Miguel, the tiny story‑lover, attends bilingual storytime at the local library where he marvels at rhythmic puppet performances and enjoys the vibrant sounds of a local mariachi band, often humming
    the catchy chorus of "La Bamba" while coloring.
  travel: Miguel, the curious traveler, has visited the Grand Canyon on a family road trip and dreams of wandering the colorful streets of Barcelona, yet his travel style remains short car rides with frequent
    snack stops, always packing his favorite plush cactus for comfort.
  culinary: Miguel, the budding food enthusiast, delights in crunchy tacos with freshly diced salsa and the soft texture of tamales, skillfully spreads guacamole on a cracker with his fingers, yet often
    forgets to wash his hands afterward, prompting gentle reminders from his parents.
  core: Miguel, a methodically curious toddler who balances a love for organized play with a tender heart, navigates the world with quiet compassion, a worry‑prone mind, and a penchant for tacos, storytimes,
    and desert adventures.
background:
  cultural: Miguel comes from a Mexican‑American family that maintains strong cultural ties. Spanish is spoken at home, and he participates in traditions such as Día de los Muertos altars, Christmas posadas,
    and weekly family meals featuring tacos, tamales, and fresh salsa. Living in Phoenix, he experiences a desert climate and often visits community parks that host bilingual storytimes and cultural festivals,
    reinforcing his bicultural identity.
attributes:
