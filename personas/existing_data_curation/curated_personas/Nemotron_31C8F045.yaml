  career_goals: Grace aims to refine her maintenance craft to a level of master technician, focusing on creative and aesthetic aspects of repair work. She hopes to mentor younger apprentices, develop a
    small portfolio of bespoke home‑renovation projects that blend functionality with artistic flair, and eventually transition to a part‑time consultant role that allows her to balance work with personal
    creative pursuits. She also aspires to be recognized within her community for her contributions to facility upkeep and to receive a local "Excellence in Handyman Services" award.
