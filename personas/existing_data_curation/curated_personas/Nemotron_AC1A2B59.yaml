  hobbies: '[''Reading classic literature and local history'', ''Birdwatching'', ''Herb and rose gardening'', ''Baking seasonal recipes'', ''Knitting'', ''Walking nature trails with terrier'', ''Visiting
    Chicago art galleries'', ''Participating in small community gatherings'']'
  career_goals: Although retired, Lisa aims to complete a comprehensive family genealogy book and share it with her grandchildren. She plans to lead a community garden initiative that pairs senior volunteers
    with school children to teach sustainable planting. Lisa aspires to develop a series of watercolor paintings that capture the changing seasons along Lake Michigan’s shoreline, eventually displaying
    them at the local arts council. She also hopes to teach a weekly cooking class for seniors, focusing on healthy, locally sourced meals. Finally, she wants to travel to the Bavarian region of Germany
    to explore her ancestors' roots.
