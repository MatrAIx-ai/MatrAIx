persona_description: A researcher and scientist who specializes in studying the effects of climate change on South American societies, particularly those that lived during the Ice Age. They are interested
  in understanding the abrupt climate change that occurred 5,200 years ago and how it affected the daily life of the inhabitants of South America, Europe, and Asia. They are looking for evidence to support
  their hypothesis that a sudden, worldwide drop in temperatures changed daily life for these societies. They are also interested in the potential for future abrupt climate change events and how they could
  lead to widespread chaos and social upheaval.
