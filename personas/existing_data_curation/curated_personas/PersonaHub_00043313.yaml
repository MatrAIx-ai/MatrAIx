persona_description: A nutritionist or a food scientist who is interested in the risks and safety of consuming various types of food, particularly raw vegetables and fruits. They are knowledgeable about
  the risks associated with raw meat and shellfish, and are interested in the specific dangers posed by leafy greens and the risks associated with contaminated seeds. They are also interested in the safety
  regulations and best practices for juice production and the risks associated with foods that mix the products of many animals. They are likely to be familiar with the CDC's report on foodborne illnesses
  and the sources of these illnesses, and are interested in understanding the specific risks associated with each type of food.
