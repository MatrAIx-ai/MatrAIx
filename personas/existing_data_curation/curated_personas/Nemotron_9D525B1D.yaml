  hobbies: '[''Visiting galleries and museums'', ''Live indie music concerts'', ''Hiking and nature walks in the Cascades'', ''Sketching and urban drawing'', ''Playing acoustic guitar'', ''Improvisational
    comedy'', ''Coffee‑shop culture and café sketching'', ''Volunteering at community art workshops'']'
  career_goals: William aims to build a career that blends his love for art, people, and flexible work environments. He envisions roles such as a community arts coordinator, museum education specialist,
    or freelance visual storyteller where he can curate experiences, lead workshops, and produce digital content. He seeks a position that values creativity over rigid deadlines, offers supportive mental‑health
    resources, and provides opportunities for continual learning and artistic experimentation. In the longer term, he hopes to augment his skill set with a formal certification in arts administration to
    enhance his impact in nonprofit cultural organizations.
