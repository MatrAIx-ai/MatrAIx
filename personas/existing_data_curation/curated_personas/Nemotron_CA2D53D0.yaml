personas:
  professional: Gloria Moses is a seasoned residential roofer with OSHA 30 certification, expert in shingle, metal, and flat‑roof systems, who leverages her competitive drive to win bids and mentor apprentices
    while meticulously tracking budgets and blueprints.
  sports: Gloria Moses enjoys early‑morning runs along the river trail, strength‑training at the local gym three times a week, and roots for the Green Bay Packers and Chicago Bulls, while also playing on
    a community carpentry club's informal softball league.
  arts: Gloria Moses finds daily inspiration in gospel legends like Kirk Franklin, soul icons such as Aretha Franklin and Marvin Gaye, and classic R&B, often humming these tunes while she gardens or works
    on a roof, and she attends the regional theater’s monthly productions of blue‑grass and musical revivals.
  travel: Gloria Moses prefers road‑trip adventures that combine outdoor activity with practical planning, having already camped in Yellowstone National Park and visited Asheville’s craft breweries, while
    dreaming of a solar‑focused retreat in Bali and a weekend getaway to the historic vineyards of Napa Valley.
  culinary: Gloria Moses loves farm‑to‑table cooking, regularly preparing a hearty vegetable ratatouille with zucchini, bell peppers, and tomatoes from her garden, pairing it with a roasted chicken and
    a side of quinoa, and she enjoys the occasional indulgence of a slow‑cooked brisket sandwich with caramelized onions.
  core: Gloria Moses balances a demanding, detail‑driven roofing career with a disciplined fitness regime, meticulous financial planning, and a heartfelt love for gospel and garden‑fresh meals, all while
    navigating stress with a competitive edge and a streak of skepticism toward easy shortcuts.
background:
  cultural: Gloria is an African‑American who grew up in Baltimore’s inner‑city neighborhoods before moving to the suburban community of Pikesville. Her family’s legacy includes generations of skilled laborers—carpenters,
    electricians, and roofers—who valued hard work, self‑reliance, and community solidarity. The church has been a cultural anchor, providing both spiritual guidance and a network of support that shaped
    her sense of responsibility and service. Experiencing the civil‑rights legacy of Baltimore, Gloria developed a resilient outlook, balancing skepticism toward systemic barriers with a competitive drive
    to succeed. Her cultural identity is reflected in her love for soul music, Southern‑influenced cooking, and a commitment to uplifting other Black workers in the trades through mentorship and advocacy.
attributes:
  skills: '["Roof installation (shingles, metal, flat roofs)", "Roof repair and waterproofing", "Storm damage assessment and insurance inspection", "Interpretation of building codes and blueprints", "Material
    estimation and cost budgeting", "OSHA 30 and NRCA Roof Installer certifications", "Ladder and scaffold safety protocols", "Crew coordination and leadership", "On‑site problem solving and troubleshooting",
    "Apprentice training and tool safety"]'
  hobbies: '["Vegetable gardening", "Running and weight training", "Reading personal‑finance and trade magazines", "Listening to gospel, R&B, and classic soul music", "Church youth mentorship for trades",
    "Community carpentry and woodworking projects"]'
  career_goals: Gloria aims to become a certified roof inspector and eventually earn her contractor's license so she can run her own roofing business, focusing on residential and small‑commercial projects.
    She plans to complete her associate degree in construction management to strengthen her project‑planning skills and to qualify for larger contracts. Gloria also wants to mentor more women and underrepresented
    workers in the trades, creating a supportive network that reduces the skepticism she sometimes feels toward industry gatekeepers. A long‑term ambition is to specialize in eco‑friendly roofing solutions,
    such as solar‑integrated and cool‑roof systems, to meet growing market demand while offering predictable, structured work that reduces stress.
