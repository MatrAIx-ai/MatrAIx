persona_description: A political scientist who is interested in studying voting paradoxes and their connection to group theory and linear algebra. They are particularly interested in the decomposition of
  preference lists into cyclic and acyclic parts and how this can be used to cancel out opposite preference lists. They are also interested in the connection between the majority cycle and the linear combination
  of preference lists and how this can lead to voting paradoxes. They are likely to be familiar with the concepts of group theory and linear algebra and have a strong background in political science.
