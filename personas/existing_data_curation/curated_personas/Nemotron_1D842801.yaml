personas:
  professional: An aspiring security supervisor, Shelia Lillie leverages her sharp surveillance instincts, methodical reporting style, and artistic pattern‑recognition skills to spot subtle threats in a
    bustling Virginia casino, while proactively integrating cyber‑security concepts and mentoring junior officers with a calm, assertive presence.
  sports: On the athletic side, Shelia Lillie joins a weekend hiking group at Shenandoah, plays in a community co‑ed softball league, and avidly follows the Washington Capitals in hockey and the Virginia
    Cavaliers football team, preferring low‑impact cardio to high‑intensity gym sessions.
  arts: Artistically, Shelia Lillie spends her evenings sketching historic Powhatan architecture, curates visits to the Virginia Museum of Fine Arts, admires the photography of Ansel Adams, the songwriting
    of Emmylou Harris, and the paintings of Andrew Wyeth, and volunteers at a community theatre where she helps design set backdrops.
  travel: Travel‑wise, Shelia Lillie favors road‑trip itineraries that blend scenic hiking, such as a sunrise shoot at Shenandoah, with cultural stops like Asheville’s folk art scene, while dreaming of
    a future backpacking tour of Tuscany’s Renaissance towns and a pilgrimage to the Scottish Highlands to trace Celtic folklore.
  culinary: Culinary‑wise, Shelia Lillie is an experimental home chef who regularly reimagines classic Southern dishes—like shrimp‑and‑grits with miso glaze and collard greens sautéed with quinoa and toasted
    pecans—while perfecting her pecan‑pie crust and sourcing heirloom tomatoes, fresh basil, and locally smoked pork for weekend feasts.
  core: At 27, Shelia Lillie blends a methodical security mindset with a restless artistic curiosity, often found juggling surveillance monitors and sketchbooks, yet she habitually forgets to water her
    indoor plants during busy workweeks.
background:
  cultural: Shelia grew up in a middle‑class, white Southern family in Powhean County, Virginia, where community ties, church participation, and modest hospitality shaped her values. Her upbringing emphasized
    responsibility, respect for tradition, and a strong work ethic, while exposure to regional folklore and festivals nurtured an appreciation for local arts and history. Though rooted in Southern customs,
    she embraces broader cultural experiences, seeking out diverse artistic expressions and new ideas, reflecting both her hometown roots and her curiosity about the wider world.
attributes:
  skills: '[''Surveillance Monitoring'', ''Incident Reporting'', ''Conflict De‑escalation'', ''First Aid'', ''Legal Compliance'', ''Patrol Planning'', ''Attention to Detail'', ''Data Management'', ''Basic
    IT Troubleshooting'', ''Customer Service'']'
  hobbies: '[''Visiting art galleries'', ''Landscape photography'', ''Hiking in Shenandoah National Park'', ''Reading historical fiction'', ''Attending community theater'', ''Experimenting with Southern
    cuisine'', ''Yoga'', ''Gardening'']'
  career_goals: Shelia aims to advance from floor‑level surveillance to a supervisory role within a regional casino or gaming operation, eventually becoming a Security Manager who designs safety protocols
    and oversees a team of officers. She plans to earn the Certified Protection Professional (CPP) credential and gain expertise in cyber‑security aspects of surveillance. Long‑term, she envisions transitioning
    into consulting, helping smaller venues implement comprehensive security frameworks, while also mentoring new officers through a formal training program.
