persona_description: An economics professor who specializes in the study of trade policy, particularly the economic impacts of tariffs and import restrictions. His research interests include, but are not
  limited to, the effects of protectionism on domestic consumers, the relationship between trade policy and economic growth, and the theory of government-induced scarcity. He is particularly interested
  in the use of the terms "protectionism" and "scarcityism" to describe government policies and their effects on the economy. He is a proponent of the use of alternative terminology to better expose the
  true nature of government-erected obstacles to people's access to goods and services.
