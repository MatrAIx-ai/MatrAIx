persona_description: A security professional who is interested in understanding the differences between security terms such as threat, vulnerability, and risk. They are likely to be a security analyst or
  a security consultant who conducts risk assessments and is familiar with the formula used to determine risk, which is Asset + Threat + Vulnerability = Risk. They are interested in learning about the intersection
  of assets, threats, and vulnerabilities and how threats exploit vulnerabilities to obtain, damage or destroy assets. They are also interested in understanding the importance of accurately assessing threats
  and identifying vulnerabilities to understand the risk to assets.
