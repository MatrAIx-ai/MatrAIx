  hobbies: '[''Imaginative drawing and painting'', ''Methodical LEGO construction'', ''Reading picture books on space and abstract ideas'', ''Nature collecting and classification'', ''Listening to music
    while playing'', ''Solo pretend play and storytelling'', ''Cooperative games with friends'']'
  career_goals: W dreams of becoming an astronaut‑artist who can explore space and capture its beauty on canvas. He imagines designing new games and toys that blend imagination with logical rules, hoping
    to be a "creative engineer" one day. He also expresses a desire to be a scientist who discovers how things work, and sometimes says he wants to teach other kids how to build and imagine. His ambitions
    are driven by a love for novelty, an organized mind that likes to plan projects, and a competitive spirit that wants to be the best at the creative puzzles he tackles.
