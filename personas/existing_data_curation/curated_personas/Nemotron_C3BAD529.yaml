personas:
  professional: A budding junior architect, W Hayes constructs elaborate Lego cities with meticulous blueprints, channeling their vivid imagination and curiosity into detailed designs while applying their
    organized, methodical nature to plan each block placement, and their competitive streak drives them to out-build classmates, even as they sometimes over-react to setbacks.
  sports: An energetic Little League soccer player, W Hayes dazzles on the field for the 'Tiny Tigers' team, idolizes the local professional soccer club FC Metro, practices drills with methodical precision,
    revels in competition, yet feels anxious before big matches and sometimes skips practice to avoid disappointment.
  arts: A miniature maestro of color, W Hayes spends afternoons drawing whimsical creatures inspired by Disney's 'Frozen' and the bold strokes of Vincent van Gogh, sings along to 'Let It Go' while painting,
    and their organized nature leads them to label each crayon by hue, though they can become upset if a drawing is critiqued harshly.
  travel: A curious young explorer, W Hayes has already trekked to Disney World in Orlando, collected seashells on a family trip to the Gulf Coast, loves planning routes with sticker maps, prefers adventure
    over relaxation, yet the bustle of airports sometimes triggers intense anxiety, making car trips a preferred mode of travel.
  culinary: A selective yet experimental eater, W Hayes adores buttery macaroni and cheese, delights in pancakes topped with fresh blueberries and a drizzle of maple syrup, occasionally helps stir batter
    with a tiny wooden spoon, favors crunchy carrots, and sometimes throws a tantrum if the broccoli appears on the plate.
  core: W Hayes is a fiercely imaginative five-year-old whose organized mind fuels elaborate play, but their intense emotional reactivity often transforms small setbacks into dramatic episodes.
background:
  cultural: W is a white child raised in Pleasant Hill, a suburban community in Contra Costa County, California. He lives in a typical American middle‑class neighborhood, attending a local public preschool
    where he interacts with peers from diverse backgrounds, exposing him to a variety of cultural practices and foods. The family participates in community events such as library storytimes, holiday parades,
    and outdoor festivals that celebrate both local traditions and broader American customs. Growing up in the Bay Area, W experiences a climate that encourages outdoor play, hiking, and an awareness of
    environmental stewardship. His household speaks English and celebrates common American holidays while also appreciating the multicultural influences present in his community.
attributes:
  skills: '[''Letter recognition and early reading'', ''Basic counting and addition'', ''Detailed drawing and painting'', ''Methodical block and LEGO construction'', ''Pattern recognition in puzzles'',
