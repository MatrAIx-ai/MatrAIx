  career_goals: She aims to publish a limited-edition book that combines her watercolor paintings with short reflective essays about her family's history and the changing Appalachian landscape. She also
    plans to launch a small home-based online shop selling her handcrafted quilts and knitted accessories, and to lead a monthly community art circle at the local library where she can mentor younger artists.
    Additionally, Kelie seeks to deepen her digital skills by mastering Adobe Photoshop and exploring digital illustration, and she hopes to complete a certification in caregiver support to better assist
    her aging relatives.
