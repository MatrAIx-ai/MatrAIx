personas:
  professional: Kelie Andrade, a seasoned community arts coordinator in her early fifties, merges her meticulous project planning and budgeting expertise with a flourishing watercolor practice to lead a
    monthly art circle at the local library, mentor emerging artists, and prepare a limited-edition book that intertwines Appalachian landscapes with family histories while pursuing Adobe Photoshop certification.
  sports: Kelie Andrade, an enthusiastic supporter of the Charleston Battery soccer team and the Carolina Panthers, combines gentle weekend hikes on the Blue Ridge Trail with weekly low‑impact yoga classes
    and a local walking club, preferring steady, low‑intensity exercise over competitive sports.
  arts: Kelie Andrade immerses herself in creative expression by painting Appalachian vistas in the style of Winslow Homer, sketching historic edifices inspired by the camera work of photographer Walker
    Evans, attending folk‑music gatherings featuring Doc Watson and the Carolina Chocolate Drops, and citing poet Mary Oliver and author James Agee as literary muses.
  travel: Kelie Andrade favors thoughtfully planned, culture‑rich getaways, such as revisiting the historic streets of Charleston, SC, exploring the misty highlands of Scotland, and a planned pilgrimage
    to the Great Smoky Mountains to photograph wildflower blooms, balancing her love for gentle hiking with a modest travel budget constrained by her caregiving responsibilities.
  culinary: Kelie Andrade delights in cooking with home‑grown herbs like rosemary and sage, frequently preparing Southern‑inspired dishes such as shrimp and grits with a pinch of smoked paprika, wildflower‑infused
    shortbread, and herb‑laden vegetable stews that she pairs with locally sourced honey‑glazed biscuits.
  core: Kelie Andrade, a worry‑prone yet imaginative artisan, meticulously stitches quilts while day‑dreaming about Appalachian histories, often forgetting to take breaks and occasionally hoarding vintage
    watercolor paper.
background:
  cultural: Kelie’s cultural background is rooted in a white, Appalachian heritage typical of central West Virginia. She was raised in a close‑knit, multigenerational family with strong ties to the local
    community, church, and regional traditions. Her family’s lineage includes Irish and German ancestors who settled in the Appalachian valleys in the late 19th century. Growing up, she was exposed to Appalachian
    folk music, storytelling, and craft traditions such as quilting and woodworking. The values of self‑reliance, hospitality, and reverence for the natural landscape have shaped her worldview. Although
    she resonates with broader American culture, she maintains an affinity for the customs, dialects, and communal spirit of the West Virginia mountain region.
