    ''Team collaboration'', ''Cross‑cultural competence'', ''Pragmatic problem solving'']'
  hobbies: '[''Indian cooking and recipe experimentation'', ''Cricket (playing and watching)'', ''Hiking in Bucks County'', ''Landscape photography'', ''Reading business and technology non‑fiction'', ''Data‑science
    tutorials'', ''Strategy video games'', ''Volunteer work at community cultural events'', ''Yoga for stress relief'']'
  career_goals: Umesh aims to achieve CPA certification within the next two years and to progress into senior audit management, eventually leading a multidisciplinary audit team. He aspires to transition
    into a finance director role where he can blend traditional accounting with data‑driven decision making, focusing on integrating analytics and automation into financial reporting. Over the longer term,
    he envisions founding a boutique advisory firm that specializes in sustainability and technology‑focused accounting services, while maintaining a flexible work schedule that balances professional growth
    with personal well‑being.
