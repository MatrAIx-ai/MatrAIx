    medicine'']'
  hobbies: '[''Watercolor painting'', ''Reading contemporary South Asian literature'', ''Attending art exhibitions'', ''Yoga and meditation'', ''Community health volunteering'', ''Cooking traditional South
    Asian dishes'', ''Gardening'', ''Reflective journaling'', ''Listening to classical Indian ragas'']'
  career_goals: Mayesha aims to secure a tenure‑track position at a research university where she can lead an interdisciplinary lab focused on immunology and health disparities in underserved South Asian
    immigrant communities. She seeks to develop novel therapeutic strategies for autoimmune disorders while establishing a program that embeds art‑based interventions into patient care to improve mental
    wellbeing. Obtaining a major NIH R01 grant within the next three years is a top priority, and she aspires to become a recognized speaker on medical humanities and health equity. Long‑term, she hopes
    to mentor a diverse cohort of women scientists and create sustainable community‑outreach pipelines that translate research findings into culturally informed health education.
