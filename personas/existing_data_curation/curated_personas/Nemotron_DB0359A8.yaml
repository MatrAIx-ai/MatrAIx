  career_goals: Although retired from formal employment, Ngoc aspires to leave a lasting imprint on Kauai’s cultural and ecological landscape. She aims to establish an intergenerational program that merges
    art and science, allowing local youth to document marine life through watercolor and photography while learning basic ecological monitoring techniques. She hopes to curate an annual exhibition showcasing
    Indigenous Hawaiian motifs blended with Vietnamese textile art, fostering cross‑cultural dialogue. Additionally, she plans to write a memoir and a collection of oral histories from the Vietnamese diaspora
    on Kauai, preserving these narratives for future generations. Her competitive spirit drives her to mentor participants to compete in regional garden and photography contests, and to secure modest grants
    to sustain her community initiatives.
