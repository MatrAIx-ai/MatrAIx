personas:
  professional: Ngoc Sreng, a retired marine ecologist turned senior docent, fuses rigorous ecological survey techniques with a flair for watercolor illustration to create immersive environmental workshops,
    while their competitive streak drives them to secure micro‑grants and push participants toward contest‑level photography and garden projects.
  sports: Ngoc Sreng stays active through weekly hula and folk dance classes, participates in a senior walking club that meets for sunrise beach jogs, and passionately cheers for the University of Hawaii
    Rainbow Warriors football team and the local Kauai volleyball league.
  arts: Ngoc Sreng immerses themselves in contemporary galleries, drawing inspiration from artists like James Turrell and Yayoi Kusama, while enjoying the poetry of Langston Hughes and the soothing ukulele
    melodies of Israel Kamakawiwo'ole, and they often incorporate folklore‑inspired embroidery into their workshop presentations.
  travel: Ngoc Sreng prefers slow‑paced, culturally rich trips, such as weekend ferry rides to Maui for sunrise hikes, a gentle cruise through Ha Long Bay's limestone cliffs, and a dream itinerary that
    includes the art museums of Florence and the historic streets of Kyoto.
  culinary: Ngoc Sreng delights in crafting fusion dishes that blend tropical Hawaiian ingredients with Asian spice profiles, routinely preparing lemongrass‑infused poke bowls, coconut‑curry noodle soup
    with pineapple, and taro‑based savory crepes, all while meticulously seasoning each plate with fresh basil and chili.
  core: Ngoc Sreng is a curious, socially vibrant 87‑year‑old who mixes marine science with watercolor art, competitively pursues community grants, sometimes forgets medication while painting, and hoards
    an ever‑growing stash of crossword puzzles.
background:
  cultural: Ngoc Sreng was born in Vietnam and moved to Hawaii as a teenager with her family during the post‑war diaspora. Growing up on Kauai, she absorbed the aloha spirit while maintaining strong ties
    to Vietnamese traditions—celebrating Tet, preparing bánh chưng, and practicing traditional crafts with her mother. Over the decades, she has woven these dual identities into a blended cultural tapestry,
    speaking Vietnamese at home, enjoying Hawaiian music, and participating in local community festivals. She identifies as a bridge between the Vietnamese diaspora and the native Hawaiian community, often
    collaborating on multicultural events that honor both her ancestral heritage and her island home. Her upbringing in a close‑knit immigrant family instilled the values of respect for elders, reverence
    for nature, and a deep appreciation for storytelling, which she now passes on to younger generations through mentorship and cultural workshops.
