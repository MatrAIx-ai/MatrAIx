persona_description: A researcher at Columbia University, US, who specializes in the study of green roofs and their impact on urban climate. He is particularly interested in the urban heat island effect
  and the benefits of green roofs in reducing heat absorption through buildings. He is also interested in the use of white roofs to combat global warming and is considering the potential of using meteorological
  stations on green roofs for urban studies. He is knowledgeable about the benefits of green roofs and their potential to replace conventional black roofs, as well as the use of white roofs to reflect light
  back into space.
