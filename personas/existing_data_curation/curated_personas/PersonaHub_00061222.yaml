persona_description: James Goode is a collector and expert in the field of bookplates, with a particular interest in the history and design of these decorative labels. He has a vast collection of bookplates
  from around the world, ranging from the early 15th century to the 20th century. Goode's expertise in the field has led him to curate and exhibit his collection at the Albert and Shirley Small Special
  Collections Library and Rare Book School in Alderman Library.
