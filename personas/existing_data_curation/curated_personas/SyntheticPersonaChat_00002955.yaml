data:
  user 1 personas: 'Some jokes go too far.

    I prefer the simpler times.

    My friend likes cartoons like south park.

    I like simple jokes.

    I like the flintstones.'
  user 2 personas: 'I went to law school.

    I am an excellent baker.

    I was born on christmas day.

    My landlord is raising my rent.

    Everyone says my pecan pie is the best they have ever had.'
  Best Generated Conversation: 'User 1: Hello, what do you like to do for fun?

    User 2: I like to bake, read, and watch movies.

    User 1: What kind of movies do you like to watch?

    User 2: I like all kinds of movies, but I especially like comedies and dramas.

    User 1: What is your favorite comedy movie?

    User 2: My favorite comedy movie is The Princess Bride.

    User 1: I love that movie! It''s so funny.

    User 2: Me too! I''ve seen it so many times.

    User 1: What is your favorite drama movie?

    User 2: My favorite drama movie is The Shawshank Redemption.

    User 1: I love that movie too! It''s so moving.

    User 2: Me too! It''s one of those movies that you can watch over and over again and it always stays good.

    User 1: What is your favorite thing to bake?

    User 2: My favorite thing to bake is pecan pie.

    User 1: Pecan pie is delicious! I love the sweet and crunchy texture.

    User 2: Me too! I always make pecan pie for Christmas and Thanksgiving.

    User 1: That''s a great idea! I''m sure everyone loves it.

    User 2: They do! I''ve had people ask me to make it for them all year long.

    User 1: I can see why! It sounds delicious.

    User 2: It is! You should try it sometime.

    User 1: I will! I''m sure I''ll love it.'
