  career_goals: Karin aspires to move into a supervisory role within the plant, such as shift lead or team trainer, where she can leverage her practical knowledge to mentor newer workers and champion continuous
    improvement. She is interested in obtaining a Lean Six Sigma Yellow Belt certification to formalize her process‑improvement ideas. In the longer term, she hopes to transition into a plant‑floor management
    position or to start a small home‑based woodworking business that would allow her to blend her mechanical skills with her creative interests, while maintaining flexibility for family commitments.
