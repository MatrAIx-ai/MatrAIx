persona_description: A historian or archaeologist with a particular interest in the history of Jewish communities and cemeteries in Romania. They are knowledgeable about the history and development of the
  Jewish community in Satu Mare County, Transylvania, and are interested in the preservation and documentation of Jewish cemeteries. They have conducted research on the International Jewish Cemetery Project
  - Romania C and visited the site to complete a survey in 2000. They have interviewed the grandson of Supler Iosif, Ardud, and have a keen interest in the history of the cemetery.
