  career_goals: Although retired, Felipe aims to stay intellectually active by mentoring youth in STEM through local community centers and schools, fostering a bridge between science and Cuban cultural
    heritage. He aspires to launch a small community workshop that blends art, technology, and heritage—such as creating digital installations inspired by Cuban music and abstract art. Additionally, he
    hopes to author a series of reflective essays or a memoir that chronicles the immigrant experience, scientific curiosity, and the value of intergenerational connections, while ensuring his health and
    well‑being remain a priority.
