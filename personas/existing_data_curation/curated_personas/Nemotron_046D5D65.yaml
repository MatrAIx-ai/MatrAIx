personas:
  professional: Felipe Lopez, a retired engineer with a flair for DIY projects, devotes his time to mentoring youth in STEM at community centers while they conceptualize a workshop that fuses digital art
    installations with their passion for music and abstract design.
  sports: Felipe Lopez stays active by dancing salsa three times a week, joining a senior pick‑up basketball league that fans of the Miami Heat enjoy, and cheering for the Miami Marlins during weekend games
    with their grandchildren.
  arts: Felipe Lopez explores abstract cubist painting in his home studio, frequently visits Wynwood Walls and the Pérez Art Museum, draws inspiration from Picasso and contemporary jazz pianist Chucho Valdés,
    and they play the tres when gathering with friends.
  travel: Felipe Lopez prefers relaxed cultural trips, having toured the historic streets of New Orleans for its jazz scene, explored the Florida Keys for marine scenery, and they plan a future visit to
    the Caribbean islands to reconnect with family culinary traditions.
  culinary: Felipe Lopez delights in cooking arroz con pollo, plantain fritas, and black‑bean soup for family gatherings, skillfully seasons dishes with cumin, garlic, and fresh cilantro, and they enjoy
    experimenting with new spice blends while occasionally over‑salting due to an enthusiastic palate.
  core: Felipe Lopez, a 67‑year‑old retired engineer, merges boundless imagination, social vigor, and a vigilant worry‑monitoring habit into a life where they center on art, mentorship, and community‑driven
    creativity.
background:
  cultural: Felipe was born to Cuban parents and grew up immersed in the vibrant traditions of Havana before his family settled in Miami. He is fluent in Spanish and English, and his daily life blends the
    rhythms of Cuban music, the flavors of Caribbean cooking, and the cultural mosaic of South Florida. He participates in community celebrations such as Calle Ocho and maintains strong ties to the Cuban
    diaspora through church, family gatherings, and cultural clubs. His identity is shaped by a deep respect for his heritage, a love for sharing Cuban stories and customs with younger generations, and
    an appreciation for the multicultural environment of Miami that has broadened his worldview.
