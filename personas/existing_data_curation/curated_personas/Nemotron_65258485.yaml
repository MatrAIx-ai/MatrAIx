  career_goals: Even at four, Geneva loves the idea of a job where she can help others and keep things organized. She often declares she wants to be a preschool teacher because she enjoys story time, arranging
    classroom materials, and guiding younger children through routines. She also mentions wanting to be a veterinarian, inspired by her affection for her plush rabbit and the family’s real dog, which reflects
    her compassionate side and desire to care for living things. Her ambitions are framed by her preference for structure, responsibility, and a safe, predictable environment.
