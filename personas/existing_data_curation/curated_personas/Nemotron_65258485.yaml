personas:
  professional: Geneva Mcnab, a four-year-old who turns her playroom into a mini office, meticulously lines up her building blocks by color and size, and they proudly assign each stack a tiny ‘project’
    label, demonstrating an early knack for organization and practical problem‑solving.
  sports: Geneva Mcnab, a four-year-old energetic member of the Tiny Turtles Soccer Club, practices dribbling and kicking on Saturday mornings, cheers for the New York Yankees during family watch parties,
    and they eagerly anticipate the upcoming Little League tee‑ball season, blending early team participation with fandom of professional sports.
  arts: Geneva Mcnab, a four-year-old with a vivid imagination, spends afternoons sketching whimsical creatures inspired by Dr. Seuss, belts out The Wiggles’ "Fruit Salad" on her toy microphone, and they
    are captivated by Pixar’s "Toy Story" while proudly displaying a glitter‑glued poster of their favorite character.
  travel: Geneva Mcnab, a four-year-old who explored the red rocks of Sedona on a family road trip and built sandcastles at the beach in Myrtle Beach, now dreams of a bedtime‑routined visit to Disneyland,
    and they proudly collect postcards from each destination as tangible memories.
  culinary: Geneva Mcnab, a four-year-old picky eater with a soft spot for cheesy mac and cheese, crunchy chicken nuggets, and fresh strawberry slices, can stir pancake batter with a wooden spoon, and they
    insist on adding a dash of ketchup to almost every plate, revealing both budding culinary curiosity and simple comfort‑food cravings.
  core: Geneva Mcnab, a four-year‑old who meticulously lines up her toys, saves each allowance coin in a pink piggy bank, and sings The Wiggles while navigating seasonal allergies, embodies a tidy, structured
    mind peppered with endearing childhood whims.
background:
  cultural: Geneva is raised in a white, middle‑class family in Eden Prairie, Minnesota, a suburban community with strong Midwestern values of punctuality, order, and community involvement. Her family celebrates
    typical American holidays—Thanksgiving, Christmas, and the Fourth of July—with structured traditions that reinforce predictability. They attend a local preschool that emphasizes routine, gentle social
    interaction, and exposure to the natural environment of the region. The cultural backdrop includes a subtle influence from the area’s historic Scandinavian and German roots, seen in foods like meatloaf
    and cinnamon rolls and in the community’s emphasis on outdoor recreation and neighborhood safety.
