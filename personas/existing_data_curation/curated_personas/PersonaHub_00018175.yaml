persona_description: A historian who specializes in the study of African American history, particularly the role of literature and poetry in shaping the African American experience. This person is passionate
  about uncovering and preserving the voices of African Americans from the antebellum, Civil War, Reconstruction, and early Jim Crow eras. They are dedicated to researching and writing about the unique
  literary movements and contributions of African American poets and writers from this time period. They are interested in the impact of literature on African American identity and culture, and the ways
  in which poetry and prose have played a vital role in shaping the African American narrative.
