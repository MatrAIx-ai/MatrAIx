  career_goals: Over the next five years Johnson aims to step into a regional Director of Operations role, overseeing multiple facilities and driving organization‑wide sustainability initiatives. He plans
    to earn a Lean Six Sigma Black Belt and complete an MBA to deepen his strategic perspective. Long‑term, he envisions launching a boutique consulting firm that helps mid‑size manufacturers embed continuous‑improvement
    cultures, while also mentoring emerging managers within his current organization.
