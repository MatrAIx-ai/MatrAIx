personas:
  professional: Johnson Miguel, a disciplined operations leader who applies data‑driven process improvement and the meticulous planning of their woodworking hobby, they coordinate supply‑chain activities,
    mentor cross‑functional teams, and embed lean, sustainable practices across multiple facilities.
  sports: Johnson Miguel, an avid outdoor enthusiast who spends weekends fishing on Lake Allatoona and hiking the surrounding trails, they support the Atlanta Falcons and the Atlanta Braves, play in a local
    adult softball league each summer, and fit weekly strength‑training sessions at the community gym to balance endurance with strength.
  arts: Johnson Miguel, a quiet appreciator of Southern storytelling who enjoys listening to Johnny Cash and The Avett Brothers while woodworking, they attend the local theater’s quarterly productions featuring
    classic plays, and indulge in documentary series by Ken Burns to satisfy a curiosity for history and culture.
  travel: Johnson Miguel, a methodical road‑trip planner who has explored Savannah’s historic squares and the Blue Ridge Parkway, they dream of trekking Patagonia’s Torres del Paine and visiting Japan’s
    cherry‑blossom festivals, and always book accommodations that blend comfort with a touch of local tradition.
  culinary: Johnson Miguel, a competent home cook who favors Southern comfort foods like smoked catfish with hush‑puppy, they regularly grill carne asada tacos using fresh cilantro, lime, and chipotle,
    experiment with rosemary‑infused sweet potato mash from their garden harvest, and treat themselves to a craft‑brew stout after a long day of renovations.
  core: Johnson Miguel blends disciplined operational expertise with a hands‑on love for woodworking, balancing meticulous planning with occasional spontaneous spurts of tool‑shopping indulgence.
background:
  cultural: Johnson grew up in a middle‑class white family in the suburbs of Canton, Georgia, where Southern hospitality, church fellowship, and a strong work ethic were core values. The community's emphasis
    on mutual support and respect for tradition shaped his cooperative nature. While his surname reflects a multicultural family history—his mother’s side includes Hispanic roots—he was primarily raised
    within the local Southern culture, celebrating holidays such as Christmas and participating in community events like high school football games. This blend of cultural influences nurtured his appreciation
    for both established customs and new perspectives.
