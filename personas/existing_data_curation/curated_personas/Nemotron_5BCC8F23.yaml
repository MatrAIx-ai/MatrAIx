  hobbies: '[''Vegetable gardening'', ''Reading historical biographies'', ''Crocheting and quilting'', ''Birdwatching'', ''Crossword puzzles and Sudoku'', ''Digital photography'', ''Listening to gospel
    and classic jazz music'', ''Cooking traditional Southern recipes'']'
  career_goals: Although retired, Kendra remains driven to grow personally and give back to her community. She aims to complete her bachelor's degree in History, a program she began at a local community
    college, to deepen her understanding of the civil‑rights era she lived through. She plans to compile a memoir intertwining her life story with a family cookbook that preserves cherished recipes and
    narratives. Kendra also seeks to volunteer as a mentor at the Burke County library, teaching youths how to conduct genealogical research and navigate digital archives. She aspires to enter regional
    quilting contests, showcasing her designs, and to sustain a productive garden that supplies fresh produce for her family while fostering self‑reliance.
