  hobbies: '[''Community basketball'', ''Fishing'', ''Gospel choir'', ''Barbecuing'', ''Classic car restoration'', ''Youth mentorship volunteering'', ''Church events'', ''Listening to hip‑hop and R&B'']'
  career_goals: Lamar aims to progress into a senior maintenance supervisor role within the next five years, where he can oversee a larger team and implement systematic reliability programs. He plans to
    earn a GED and pursue certifications such as Certified Maintenance & Reliability Technician (CMRT) and HVAC/R certification. Long‑term, he hopes to launch his own small mechanical service business serving
    local manufacturers, providing stable income for his family and giving back to the Roanoke Rapids community.
