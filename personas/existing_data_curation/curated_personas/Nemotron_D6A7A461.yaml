  career_goals: Miguel dreams of turning his love for art and imagination into a career. He envisions becoming an illustrator or comic‑book creator who can share stories from his Guatemalan heritage and
    the world. He also imagines designing video games that let players explore new ideas without strict rules. In the longer term, he hopes to work in a museum or cultural center where he can curate interactive
    exhibits that celebrate diverse cultures, and maybe one day lead community art workshops for kids.
