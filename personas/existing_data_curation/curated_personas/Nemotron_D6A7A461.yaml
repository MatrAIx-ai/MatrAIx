personas:
  professional: Miguel Guevara, an aspiring junior architect who transforms LEGO city blocks into detailed models and sketches vibrant watercolored skylines, channels boundless curiosity and spontaneous
    energy into early design experiments while often sidestepping homework deadlines in favor of impromptu creations, and they eagerly share their drafts with friends.
  sports: Miguel Guevara, a spirited soccer player in the Four Rivers Youth Soccer Club who idolizes the New England Revolution and drills after school, also embraces traditional family dances that keep
    their footwork nimble and their fitness routine lively, and they relish the friendly competition on the field.
  arts: Miguel Guevara, a prolific young artist who doodles comic‑book heroes inspired by Marvel and sketches watercolored jungle scenes echoing the bold colors of Frida Kahlo, creates mixed‑media collages
    woven with textile patterns from home, and taps a small marimba to add rhythmic layers to their visual stories, and they love sharing these creations with classmates.
  travel: Miguel Guevara, an eager explorer who spends weekends wandering the dunes of Cape Cod and visiting the historic harbor of New Bedford, keeps a scrapbook of school field trips to Boston’s Museum
    of Science, and dreams of trekking to Machu Picchu and wandering Barcelona’s colorful streets, and they plan each adventure with a mix of curiosity and spontaneous packing.
  culinary: Miguel Guevara, a budding kitchen helper who mixes masa for pupusas, rolls corn husks for tamales, stirs sweet atole flavored with cinnamon and vanilla, and bakes chocolate‑chip cookies, yet
    they often leave flour footprints on the counter and forget to wash hands after a messy art‑and‑cook session.
  core: Miguel Guevara is a curious nine‑year‑old who blends spontaneous LEGO engineering, vivid art, and lively family food traditions into a bright, ever‑evolving world of play, while they juggle disciplined
    saving with occasional impulse splurges.
background:
  cultural: Miguel’s family emigrated from Guatemala and keeps the culture alive at home. He speaks Spanish with his parents and grandparents and celebrates Guatemalan holidays such as Día de la Independencia
    (September 15) and Semana Santa, where the family prepares traditional foods like tamales, chiles rellenos, and atole. He sometimes wears the bright colors of Guatemalan textiles during festivals and
    has learned to play simple rhythms on a marimba. Living in New Bedford’s vibrant, multicultural neighborhood, he also interacts with Portuguese and other Latino communities, attending bilingual after‑school
    programs that blend his heritage with his American school environment.
