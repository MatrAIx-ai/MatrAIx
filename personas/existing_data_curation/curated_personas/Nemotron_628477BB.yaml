  hobbies: '[''Reading adventure/fantasy books'', ''Sketching and drawing'', ''Creative writing'', ''DIY science experiments'', ''Scratch coding'', ''Youth choir'', ''Community center volunteering'', ''Biking'',
    ''Playing video games with friends'', ''Listening to R&B and hip‑hop music'']'
  career_goals: Vivian dreams of a career where she can combine her love of helping people with her curiosity about how things work. She hopes to become a pediatric nurse or a community health advocate,
    supporting children and families in her neighborhood. She also wonders about becoming a teacher, especially in science, to inspire other kids. She plans to stay focused on her education, earn a scholarship,
    and eventually attend a nursing or education program at a university.
