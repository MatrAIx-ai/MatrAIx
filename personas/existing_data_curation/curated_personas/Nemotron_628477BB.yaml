personas:
  professional: Vivian Hagans, an aspiring junior storyteller and budding game developer, blends their love of adventure fantasy novels, character sketching, and Scratch coding to craft interactive tales
    for friends, while they channel their innate compassion into designs that nurture teamwork and empathy.
  sports: Vivian Hagans spends Saturdays cruising the neighborhood park on their bike, occasionally joining the local junior roller‑blading club, and prefers cheering on the town’s middle‑school soccer
    team from the sidelines rather than committing to a full‑time sport, reflecting their relaxed approach to structured obligations.
  arts: Vivian Hagans mingles youthful artistry and music, sketching dragons inspired by Eragon while listening to Beyoncé’s R&B hits and Kendrick Lamar’s hip‑hop verses, and they proudly sing in the youth
    choir where they often perform a rendition of Rise Up by Andra Day.
  travel: Vivian Hagans enjoys short family road trips to the historic lighthouse on the coast and dreams of a summer visit to Disney World, but their travel style leans toward spontaneous day‑camps and
    park bike rides because of limited vacation time and a modest family budget.
  culinary: Vivian Hagans favors comfort foods like creamy mac & cheese with a dash of hot sauce, loves whipping up banana‑almond smoothies for after‑school energy, and occasionally helps bake chocolate
    chip cookies for community‑center tutoring sessions, though they sometimes skip breakfast to cram in extra reading time.
  core: Vivian Hagans is a curious, compassionate twelve‑year‑old who mixes storytelling, coding, and music while juggling mild anxiety, a love of bike rides, and a habit of occasional disorganization.
background:
  cultural: Vivian is a Black girl growing up in Warren, Michigan, a city shaped by the legacy of Detroit’s vibrant African‑American culture. Her family maintains traditions rooted in the Great Migration,
    including Sunday worship at a local church where gospel music and community service play central roles. She celebrates holidays like Juneteenth and Kwanzaa, learning about Black history through school
    and family stories. The multicultural environment of Macomb County, combined with the strong presence of hip‑hop, R&B, and local sports fandom, influences her tastes in music, food, and community gatherings.
