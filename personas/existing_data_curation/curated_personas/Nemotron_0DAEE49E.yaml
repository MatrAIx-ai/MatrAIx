  hobbies: '[''gardening (native perennials, herbs)'', ''reading historical fiction and local history'', ''knitting blankets for charity'', ''bird‑watching'', ''health‑focused cooking with garden produce'',
    ''church fellowship and small‑group events'', ''genealogy and family‑tree research'', ''walking and nature hikes'', ''volunteering at senior center (crafts workshop)'', ''participating in a monthly
    book club'']'
  career_goals: Though retired from full‑time work, Julia’s ambitions revolve around staying active, contributing to her community, and preserving her family’s legacy. She aims to expand the senior gardening
    club she founded, mentor younger volunteers at the local community center, complete a certificate in genealogy to document her family’s roots, and take short trips to historic sites in Pennsylvania
    and New England. Maintaining her health through regular walks and a balanced diet remains a top priority, as does ensuring her and her husband’s finances remain secure.
