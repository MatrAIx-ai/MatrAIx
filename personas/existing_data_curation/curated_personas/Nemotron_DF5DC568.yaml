personas:
  professional: Juan Uyterhoeven, a budding game creator who codes simple Scratch games, blends LEGO's methodical discipline with sci‑fi imagination, and they enjoy leading friendly coding challenges despite
    a healthy suspicion of teammates' shortcuts.
  sports: Juan Uyterhoeven plays forward for the local youth soccer club, cheers for the national team during World Cup matches, and they spend weekend mornings hiking the nearby volcanic trail as part
    of a school outdoor program.
  arts: Juan Uyterhoeven devours adventure novels by Jules Verne and sci‑fi series by Isaac Asimov, constructs imaginative LEGO dioramas inspired by Star Wars, and they enjoy listening to Imagine Dragons
    while sketching game characters.
  travel: Juan Uyterhoeven loves weekend camping trips to the cloud forest reserve, dreams of exploring the Galápagos Islands, and they prefer itineraries that blend hiking, wildlife spotting, and a chance
    to sample local street food.
  culinary: Juan Uyterhoeven assists with weekend cooking of gallo pinto and nacatamales, relishes the aroma of toasted corn tortillas, and they can expertly whisk a batch of traditional plantain fritters,
    though they often sneak a bite of cheese before dinner.
  core: Juan Uyterhoeven is a curious, competitive 10‑year‑old who balances LEGO building and soccer, rigorously saves allowance for hobbies, manages mild allergies with foresight, and they never skip a
    chance to help in the kitchen, even if it means a sprinkle of mischief.
background:
