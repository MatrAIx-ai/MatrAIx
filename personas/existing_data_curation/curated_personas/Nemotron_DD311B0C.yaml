personas:
  professional: Sonia Davis is a veteran aircraft mechanic and service technician whose meticulous expertise in hydraulic, pneumatic, and avionics systems is complemented by an imaginative flair that transforms
    routine maintenance into creative problem‑solving, and they channel this blend of precision and artistry into mentoring junior staff and documenting procedures with clear, detailed manuals.
  sports: Sonia Davis stays fit through low‑impact activities like weekly nature‑trail walks and membership in the Providence Senior Walking Club, follows the New England Patriots and Boston Celtics with
    spirited enthusiasm, participates in a seasonal community rowing team on the Narragansett Bay during summer, and occasionally joins casual badminton games at the local recreation center, balancing their
    love for movement with careful management of joint health.
  arts: Sonia Davis blends abstract sky‑inspired painting, metal sculpture crafted from reclaimed aircraft parts, and aerial urban photography, drawing creative influence from Jackson Pollock’s rhythmic
    drip techniques, Louise Nevelson’s assemblage sculptures, and the improvisational sounds of Miles Davis and Nina Simone, while regularly attending live jazz performances at the historic Blue Note club
    and reciting their own poetry at community art gatherings.
  travel: Sonia Davis prefers meticulously planned travel that merges aviation history with scenic landscapes, such as weekend trips to the Smithsonian National Air and Space Museum in Washington, D.C.,
    solo workshops photographing the alpine vistas of the French Alps, annual pilgrimages to a historic lighthouse on Maine’s coast, and a cherished childhood‑era road trip along the Pacific Coast Highway,
    though budget constraints sometimes limit their ability to undertake longer overseas voyages.
  culinary: Sonia Davis enjoys preparing Mediterranean‑flavored meals like lemon‑herb roasted chicken, grilled brussels sprouts drizzled with tahini, and occasional saffron paella, often cooking with fresh
    basil and rosemary harvested from their succulent garden, pairing dishes with a crisp Riesling, and indulging in the occasional late‑night espresso after a night of painting, while consciously limiting
    sodium to manage their hypertension.
  core: Sonia Davis is a detail‑oriented aircraft mechanic who channels their vivid imagination into abstract art, model planes, and mentorship, while navigating anxiety through mindfulness and a disciplined
    routine that balances technical precision with creative expression.
background:
  cultural: Sonia is a Black woman whose roots run deep in the African‑American community of Providence. Growing up during the civil‑rights era, she was shaped by a close‑knit family, a historic Black church,
    and vibrant neighborhood gatherings that celebrated music, storytelling, and collective resilience. These cultural foundations instilled in her a strong sense of solidarity and a commitment to uplift
    others, especially through education and mentorship. She embraces the legacy of Black New England artisans and musicians, integrating jazz rhythms into her daily life and supporting local Black‑owned
    businesses. Her heritage fuels her desire to break barriers in a traditionally male‑dominated field and to serve as a role model for future generations.
attributes:
  skills: '[''aircraft maintenance & repair'', ''hydraulic & pneumatic systems diagnostics'', ''avionics troubleshooting'', ''composite material repair'', ''FAA regulatory compliance'', ''technical documentation
    & reporting'', ''inventory & parts management'', ''team training & mentorship'', ''project planning & scheduling'', ''creative problem solving in engineering contexts'']'
  hobbies: '[''abstract painting'', ''model aircraft building'', ''photography (aircraft and cityscapes)'', ''DIY metal sculpture from aircraft parts'', ''reading science fiction & philosophy'', ''writing
    poetry'', ''volunteering at aviation museum'', ''attending jazz concerts'', ''gardening (succulents)'', ''walking nature trails'']'
  career_goals: Looking ahead, Sonia aims to earn her full FAA Airframe & Powerplant (A&P) certification and step into a senior supervisory role where she can shape maintenance protocols and safety standards.
    She is passionate about mentoring the next generation of Black women in aviation technology, planning to launch a community outreach program that partners with local schools and the Providence airport
    to expose youth to STEM careers. Additionally, she hopes to restore a vintage aircraft for a regional museum, documenting the process in a blend of technical manual and artful narrative. Balancing ambition
    with wellbeing, Sonia also intends to integrate mindfulness practices into her daily routine to manage her anxiety and sustain her emotional health.
