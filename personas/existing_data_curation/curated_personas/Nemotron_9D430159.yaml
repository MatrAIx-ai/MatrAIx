  career_goals: Doris aspires to turn her artistic passions into a professional role that leverages her ability to engage audiences. She aims to become a creative director or content strategist for a progressive
    media agency, where she can shape innovative campaigns and storytelling. She is also interested in launching an indie publishing imprint for speculative fiction and establishing a community art space
    in Emporia that hosts workshops and open‑mic nights. In the longer term, she envisions earning an MFA in Creative Writing or Visual Arts and gaining recognition as a multidisciplinary artist who merges
    visual, literary, and performance elements.
