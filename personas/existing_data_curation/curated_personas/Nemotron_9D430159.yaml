personas:
  professional: Doris Reasons is an emerging creative strategist who leverages a flair for avant‑garde visuals and improvisational theater to energize client workshops, thrives on chaotic brainstorming
    rather than rigid timelines, and channels a competitive streak into out‑shining peers during pitch presentations, all while dreaming of a future as a creative director at a progressive media agency.
  sports: Doris Reasons enjoys the communal buzz of intramural basketball at Emporia State University, attends Emporia State Hornets football games for social atmosphere, and fits spontaneous late‑night
    skate sessions in abandoned parking lots and seasonal local yoga classes into a fitness routine that favors group energy over solitary workouts.
  arts: Doris Reasons curates an eclectic avant‑garde palette—from weekends at the International Avant‑Garde Art Fair in Chicago and reading surreal novels by Angela Carter and Haruki Murakami, to attending
    indie gigs by The Scarecrow and drawing inspiration from artists like Yayoi Kusama and Damien Hirst—all of which fuels their multidisciplinary projects.
  travel: Doris Reasons favors off‑beat urban exploration, having trekked through Detroit’s abandoned Packard Plant, taken a solo art pilgrimage to Berlin’s DDR Museum, and dreaming of a week‑long immersion
    in Tokyo’s Shibuya avant‑garde scene, all planned spontaneously with a flexible budget and a camera‑backpacked notebook for sketches.
  culinary: Doris Reasons delights in experimental kitchen play, often whipping up matcha‑infused ramen bowls, crafting vegan sushi burritos with pickled radish, and seasoning avocado toast with za’atar,
    while their cooking skill hovers at a confident hobbyist level—enough to impress friends at board‑game nights but still prone to over‑spicing during late‑night creative cravings.
  core: Doris Reasons is a 21‑year‑old visionary who mixes avant‑garde art, spontaneous social energy, and a competitive edge into a creative hustle that borders on chaotic brilliance, all while wrestling
    with anxiety‑fuelled overthinking.
background:
  cultural: Doris grew up in Emporia, a small Midwestern community in Kansas where community events, county fairs, and the local university shape social life. Her family has roots in German and Irish ancestry,
    typical of many white Kansas families. The region's emphasis on practicality, modesty, and close‑knit community ties coexists with a strong appreciation for local arts and folk traditions, which nurtured
    her love for storytelling and visual expression. She attended the local high school, participated in theatre and art clubs, and spent summers at family cabins near the Flint Hills, experiences that
    blend the rural landscape's openness with the town's social vibrancy. This background informs her sociability, her preference for flexible, informal settings, and her emotional sensitivity.
