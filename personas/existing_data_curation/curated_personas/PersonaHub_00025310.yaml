persona_description: A person who values self-discovery, personal growth, and self-acceptance, and is motivated to overcome challenges and set boundaries to avoid being burdened by others' expectations.
  They are committed to their own happiness, well-being, and fulfillment, and are not afraid to take a hard look at themselves, acknowledge their flaws, and take responsibility for their actions and their
  consequences. They are open to others' perspectives, but prioritize their own needs and values, and are not afraid to set and meet their own expectations. They recognize the importance of accepting people
  for who they are and what they bring to the table, and are not afraid to stand up to others who impose unrealistic expectations on them. They are courageous enough to be themselves and not let others'
  expectations define them.
