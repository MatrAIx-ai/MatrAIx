personas:
  professional: Janet is a retail cashier turning aspiring data analyst who blends precise cash‑handling and bilingual customer service with Python scripting and Excel expertise to extract actionable insights
    from point‑of‑sale data, while they relish the predictability of routine yet often relax strict planning in favor of spontaneous problem‑solving.
  sports: Janet is an avid hiker who trails Griffith Park every weekend, a dedicated fan of the Los Angeles Lakers and Dodgers, and a member of a local running club that meets at Echo Park for early‑morning
    jogs, balancing competitive spirit with a relaxed approach to fitness that prioritizes enjoyment over strict training regimes.
  arts: Janet immerses themselves in LA’s street‑art scene, especially murals by Shepard Fairey and Roxane Rockette, attends weekly salsa dance classes where the music of Hector Lavoe and Celia Cruz fills
    the studio, and they find inspiration from popular‑science authors like Carl Sagan and Neil deGrasse Tyson, blending scientific curiosity with rhythmic artistic expression.
  travel: Janet prefers short, well‑planned weekend getaways, often road‑tripping to Santa Barbara’s coast or Joshua Tree’s desert for hiking, while dreaming of a culinary‑focused tour of Oaxaca and a tech
    conference in Berlin, balancing a desire for cultural immersion with a need for predictable schedules and budget constraints.
  culinary: Janet enjoys cooking family recipes such as chiles en nogada and mole, experimenting with fusion twists like taco‑style quinoa bowls, and they often source fresh avocados, poblano peppers, and
    Oaxaca cheese at farmers’ markets, showcasing a skilled yet adventurous home‑chef attitude.
  core: Janet is a data‑driven retail veteran whose love for salsa rhythms, mindful meditation, and meticulous budgeting fuels a pragmatic yet occasionally spontaneous outlook on life, marked by a habit
    of juggling spreadsheets while perfecting mole sauce.
background:
  cultural: Janet is a first-generation Mexican-American whose family originates from Jalisco. Raised in a bilingual household, she is fluent in both Spanish and English and maintains strong ties to Mexican
    cultural traditions, such as celebrating Día de los Muertos, cooking family recipes, and participating in local Mexican festivals in Los Angeles. Her cultural identity blends Mexican familismo and community
    orientation with the individualistic aspects of American life, shaping her values of hard work, respect for elders, and a deep appreciation for cultural diversity.
attributes:
