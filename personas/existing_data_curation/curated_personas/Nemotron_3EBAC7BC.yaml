  hobbies: '[''Cooking traditional Mexican dishes'', ''Salsa dancing'', ''Hiking in Griffith Park'', ''Reading popular science books'', ''DIY electronics projects'', ''Mindfulness meditation'', ''Journaling'',
    ''Exploring street art'', ''Volunteering at community center'']'
  career_goals: She aims to transition from front-line retail to a data-driven role that leverages her STEM background while maintaining a predictable schedule. Over the next two years she plans to complete
    a professional data analytics certification and build a portfolio of retail-focused analyses. Her long-term ambition is to become a Customer Insights Analyst or Inventory Analyst for a major retailer,
    where she can apply structured problem-solving to improve inventory turnover and customer experience. She also envisions developing leadership skills to eventually move into a supervisory role that
    balances process optimization with team support.
