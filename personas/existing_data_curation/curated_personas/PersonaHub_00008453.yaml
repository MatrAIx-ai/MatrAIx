persona_description: A former military officer who served in both the British and American military, and is known for his role as a Virginia delegate to the Second Continental Congress during the American
  Revolution. He was a delegate to the First Continental Congress as well, and was the only U.S. president to be elected unanimously. He was born to a wealthy family in Virginia, and had two children with
  his wife Martha Dandridge Custis. He lived in the home called Mount Vernon, and was awarded a purple heart for bravery and courage. He was also a general during the American Revolution, and helped to
  frame the Virginia Constitution and the Bill of Rights. He served as president from 1789-1797, and died on December 14, 1799.
