  career_goals: Driven by a desire to merge her passion for the arts with her accounting expertise, Sonia aims to become a senior auditor and eventually a partner at a reputable CPA firm, focusing on clients
    in the cultural sector. She plans to obtain her CPA license and pursue a master's in accounting or an MBA with a concentration in nonprofit management. In the long term, she envisions taking on a CFO
    role for a regional arts organization or establishing her own boutique consultancy that helps museums, galleries, and community arts programs achieve financial sustainability. She also hopes to mentor
    junior accountants, especially those from underrepresented backgrounds, and to contribute thought leadership on innovative finance practices for the arts through workshops and a personal blog.
