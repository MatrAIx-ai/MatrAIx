  career_goals: Mariadelrocio aspires to become a veterinarian because she loves caring for animals and values a structured, science‑based career. She also envisions working in a community health outreach
    program for children in agricultural areas, combining her desire to help others with her organized nature. Her long‑term goal is to earn a scholarship for college, study animal science, and eventually
    work at a research facility that focuses on sustainable farming practices, reflecting her connection to Fresno’s agricultural community. As an alternative path, she is interested in becoming a science
    teacher, where she could share methodical learning strategies with small groups of students.
