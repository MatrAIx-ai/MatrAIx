personas:
  professional: Mariadelrocio Matos, a 12‑year‑old robotics enthusiast, leads her after‑school coding club’s weekly challenges, applying methodical planning and a love for problem‑solving to build Scratch
    projects that often earn top honors at the school science fair.
  sports: Mariadelrocio Matos, a member of the Fresno Youth Soccer League, spends weekends honing midfield skills while cheering for the Fresno State Bulldogs football team and the Sacramento Kings, preferring
    structured drills and small‑group practices over large, chaotic games.
  arts: Mariadelrocio Matos devours the worlds of J.K. Rowling’s "Harry Potter" and Rick Riordan’s "Percy Jackson" series, while filling sketchbooks with meticulously organized fantasy illustrations inspired
    by Hayao Miyazaki’s anime aesthetic, often sharing their creations in a private online gallery.
  travel: Mariadelrocio Matos dreams of exploring Yosemite’s towering sequoias and the historic streets of San Antonio on family road trips, meticulously planning each itinerary in a travel journal yet
    occasionally daydreaming about a backpacking trek through the Andes when school breaks allow.
  culinary: Mariadelrocio Matos spends Saturday afternoons beside their grandmother preparing tamales with corn masa, smoky chipotle, and fresh cilantro, proudly perfecting each batch while absorbing the
    stories that flavor the dishes with family tradition.
  core: Mariadelrocio Matos balances a spreadsheet‑driven, methodical mind with a quiet anxiety that fuels endless curiosity, often losing sleep over imagined robotics failures while secretly hoarding extra
    comic books under the bed.
background:
  cultural: Mariadelrocio grows up in a Mexican‑American household in Fresno’s Central Valley, where her family maintains strong ties to Mexican cultural traditions. Spanish is spoken daily at home, and
    she celebrates holidays such as Día de los Muertos and Cinco de Mayo with food, music, and community gatherings. The agricultural setting influences her appreciation for farm life, and she often visits
    relatives’ fields, learning about seasonal cycles and sustainable practices. Her family places a high value on education, respect for elders, and community service, encouraging her involvement in school
    projects that benefit the local community. While she balances the Mexican values of collectivism and family cohesion with the American emphasis on individual achievement, she feels a sense of pride
    in her bicultural identity.
