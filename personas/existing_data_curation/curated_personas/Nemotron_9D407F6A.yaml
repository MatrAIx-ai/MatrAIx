  hobbies: '["Soccer", "Dance class", "Piano lessons", "LEGO building", "Jigsaw puzzles", "Scratch Jr. storytelling", "Reading chapter books", "Girl Scouts", "Attending county fair", "Helping with yard
    work"]'
  career_goals: Brenda dreams of becoming a teacher or librarian when she grows up, inspired by her love for helping friends learn, her admiration for books, and her enjoyment of structured environments.
    She also imagines herself as a community event organizer, planning fun and organized activities for neighborhood kids. She wants to continue using her natural leadership and organization to make school
    and community spaces welcoming and efficient.
