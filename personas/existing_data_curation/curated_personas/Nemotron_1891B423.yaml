personas:
  professional: Anjelica Munson, a meticulous four‑year‑old who channels her curiosity and practicality into constructing elaborate block towers, thoughtfully planning each layer before snapping the next
    piece into place, and proudly showcasing her orderly creations to a small circle of playmates during tidy‑up time.
  sports: Anjelica Munson, a budding fan of the local junior soccer club Little Sprinters FC, enjoys sprinting short distances in the park and cheering quietly from the sidelines with her parents at the
    professional baseball team’s home games—the River City Mariners—while preferring small group tag games over crowded team drills, yet the noisy cheers of large crowds can make them feel uneasy.
  arts: Anjelica Munson, an imaginative little artist who fills her sketchbook with vibrant crayon portraits of dinosaurs and beloved TV characters like Blue from Blue's Clues, delights in listening to
    The Wiggles and Sesame Street melodies during playtime, and attends the community’s weekly puppet show, though they sometimes worry that their drawings aren’t perfect enough to share.
  travel: Anjelica Munson, a cautious explorer who loves visiting the nearby botanical garden and the family’s annual trip to Disneyland, prefers itineraries that include familiar bedtime routines and a
    favorite plush bear packed in the carry‑on, and collects a single souvenir—often a small magnet or a sticker—from each destination, yet they can become nervous on long car rides, insisting on frequent
    snack breaks.
  culinary: Anjelica Munson, a selective eater who adores creamy mac and cheese, crunchy carrot sticks, and strawberry‑yogurt swirls, helps stir batter for blueberry muffins under close supervision, enjoys
    arranging her plate into smiley‑face designs, but often protests when vegetables are blended into a dish without being separated.
  core: Anjelica Munson, a four‑year‑old with an organized mind, a worry‑prone heart, and a love for tidy play, tiny savings, and bright crayons—ever‑curious yet comfort‑seeking.
background:
  cultural: Anjelica grows up in Plattsmouth, a small town on the Missouri River in Cass County, Nebraska. Her family’s ancestry includes German and Scandinavian immigrants who settled the plains in the
    late 1800s, and the household reflects Midwestern values of politeness, community involvement, and respect for the land. She attends a local preschool that collaborates with the town’s public library
    and a Methodist church, participating in seasonal celebrations such as the county fair, holiday craft fairs, and community service projects. The rural setting provides ample opportunities for outdoor
    play—building snowmen in winter and picnicking by the river in summer—while family traditions emphasize togetherness, gratitude during Thanksgiving, and a modest, practical approach to daily life.
attributes:
  skills: '[''Letter recognition (A‑Z)'', ''Number counting (1‑20)'', ''Color and shape sorting'', ''Simple puzzle completion (8‑12 pieces)'', ''DUPLO block building and spatial planning'', ''Following
    multi‑step routines'', ''Early digital navigation (educational tablet apps)'', ''Organizing toys and play spaces'', ''Basic storytelling'', ''Cooperative turn‑taking'']'
  hobbies: '[''Crayon drawing'', ''Watercolor painting'', ''DUPLO block building'', ''Simple jigsaw puzzles'', ''Picture book reading'', ''Sticker collecting'', ''Backyard nature exploration'', ''Pretend
    doctor play'', ''Gardening with parents'', ''Listening to bedtime stories'']'
  career_goals: She frequently talks about future roles that blend caring with order, such as becoming a teacher who helps other children learn, a veterinarian who looks after animals, or a librarian who
    keeps books and spaces organized. In play, she also imagines organizing community events or running a neat lemonade stand, reflecting her practical ambition to be helpful, reliable, and organized.
