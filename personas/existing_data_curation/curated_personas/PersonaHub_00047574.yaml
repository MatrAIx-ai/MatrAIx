persona_description: A political scientist who specializes in the study of nationalism and its impact on international relations, particularly in the context of ethnic and religious conflicts. This individual
  is interested in the idea that nations can emerge without the help or blessings of each other, and how it relates to the formation of identities and the identification of enemies. They are also familiar
  with the concept of civic nationalism and its potential for violence and division. They are interested in the tension between those who are unwilling or unable to conform to the ideals of civic nationalism
  and those who demand it, and how it affects the American identity. They are also knowledgeable about the role of nationalism in the Middle East and the United States, particularly in the context of the
  wars in Iraq and Afghanistan.
