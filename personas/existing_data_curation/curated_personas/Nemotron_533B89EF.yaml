personas:
  professional: Jhoanna Jose, a 22‑year‑old licensed journeyman electrician, leverages meticulous project scheduling, clear client communication, and a strong safety mindset to excel in residential and
    commercial wiring while actively mentoring teammates and championing renewable‑energy installations.
  sports: Jhoanna Jose participates in morning Zumba and evening kick‑boxing classes at a downtown Austin studio, hikes Enchanted Rock and the Pedernales Falls Trail on weekends, and avidly supports the
    Dallas Cowboys and Austin FC, often wearing team apparel during workouts.
  arts: Jhoanna Jose expresses her love of rhythm through salsa nights at local Latin clubs, hones traditional Southeast Asian dance steps at community workshops, and draws inspiration from the music of
    Celia Cruz, Pitbull, and contemporary percussionist Jojo Mayer.
  travel: Jhoanna Jose plans weekend escapes to Hill Country vineyards, road trips to Santa Fe for arts and cuisine, and dreams of a month‑long backpacking adventure through northern Thailand’s highlands
    and the Vietnamese Mekong Delta, balancing travel ambitions with her apprenticeship schedule and savings plan.
  culinary: Jhoanna Jose crafts aromatic Vietnamese pho broth with star‑anise, ginger, and fresh herbs, simmers Thai green curry using coconut milk, kaffir lime, and Thai basil, and frequently experiments
    with extra chilies, though she sometimes skips the final garnish when transitioning quickly between jobs.
  core: Jhoanna Jose is a structure‑loving, community‑focused electrician who balances rigorous safety standards with high‑energy dance classes, meticulous savings habits, and a penchant for spicy soup.
background:
  cultural: Jhoanna was raised in a Vietnamese‑American household in Arlington, Texas. Her parents immigrated from Vietnam in the 1990s, and she grew up bilingual, speaking both English and Vietnamese at
    home. Family gatherings centered around traditional dishes, Lunar New Year celebrations, and values of hard work, respect for elders, and community support. While she embraces American customs—attending
    football games and local festivals—she also actively participates in the local Vietnamese cultural association, helping organize language classes and cultural events. This blend of Southeast Asian heritage
    and Texan upbringing shapes her worldview, giving her a strong sense of identity, adaptability, and a deep appreciation for multicultural collaboration.
attributes:
  skills: '["Residential wiring", "Commercial electrical installation", "Conduit bending", "Blueprint reading", "Load calculation", "Electrical code compliance (NEC)", "Troubleshooting electrical faults",
    "Solar PV system installation", "Safety inspections (OSHA 10)", "Team coordination", "Customer communication", "Project scheduling and time management"]'
  hobbies: '["Group fitness classes (Zumba, kick‑boxing)", "Salsa and traditional Southeast Asian dance", "Hiking in the Hill Country", "Cooking Vietnamese and Thai dishes", "Volunteering at community centers",
    "Mentoring high‑school students in STEM and trades", "DIY home improvement projects", "Playing badminton with friends"]'
  career_goals: Jhoanna aims to become a master electrician within the next five years, obtaining the Texas Master Electrician license and expanding her expertise in renewable energy. She plans to pursue
    advanced certifications such as Certified Electrical Safety Compliance Professional and to take on supervisory roles, eventually leading a crew on large commercial projects. In the long term, she envisions
    opening her own electrical contracting firm that emphasizes safety, mentorship, and community outreach, especially supporting other young women entering the trades.
