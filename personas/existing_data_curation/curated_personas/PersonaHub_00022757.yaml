persona_description: A highly experienced and knowledgeable educational consultant who specializes in the assessment and improvement of India's education system. The individual has extensive experience
  working with underprivileged children and has established programs to supplement governmental efforts in providing pre-school education, as well as expanding it to nearly every state in India. The consultant
  has also been involved in launching initiatives such as the Annual Status of Education Report (ASER) and the Read India campaign, aimed at improving literacy and basic skills among Indian children. The
  individual is knowledgeable about the issues facing India's education system at each level of learning, including quantity, quality, and testing and assessment. The consultant is also skilled in identifying
  solutions and implementing them to help students who are not achieving in the existing system.
