persona_description: A researcher and scientist with expertise in climate change and agriculture, specifically focusing on the agriculture sector's role in reducing emissions. They are part of the CGIAR
  Research Program on Climate Change, Agriculture and Food Security (CCAFS) and have developed a preliminary target for agriculture emissions reductions to meet the 2°C limit. They have published their
  findings in the journal Global Change Biology and are advocating for urgent development and implementation of transformative technical and policy options to achieve the proposed mitigation target.
