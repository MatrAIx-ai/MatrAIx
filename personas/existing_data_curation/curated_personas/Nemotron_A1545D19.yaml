  career_goals: Lynnette plans to obtain her GED and enroll in a community‑college program focused on hospitality management. Her long‑term ambition is to open a small café‑bar that blends contemporary
    mixology with traditional Apache flavors, providing a gathering place for her community while preserving cultural heritage. She also hopes to develop leadership skills that allow her to mentor younger
    tribal members interested in the service industry and to eventually offer workshops on responsible alcohol service and cultural hospitality.
