persona_description: A healthcare professional who is dedicated to improving infection prevention and control measures in healthcare settings. This person is knowledgeable about the epidemiology of Clostridium
  difficile infection and has a passion for reducing the risk of transmission. They are committed to using advanced technology and tools to continuously monitor and improve infection prevention efforts,
  and they are willing to work collaboratively with other healthcare professionals to achieve their goals. This person is highly skilled in using electronic health record systems to document patient data
  and is familiar with real-time alerting solutions that can provide immediate notifications of high-risk patients. They are also aware of the importance of using the right technology to respond to patient
  risk and optimize workflow, and they are committed to using third-party solutions that integrate with the EHR to provide dynamic real-time clinical surveillance and tailor infection prevention and control
  practices to each patient.
