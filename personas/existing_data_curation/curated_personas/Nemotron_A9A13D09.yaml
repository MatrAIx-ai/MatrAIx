  career_goals: Tamika aims to expand her practice by establishing a boutique design studio that specializes in creating serene, culturally resonant interiors for private homes and community spaces in Austin
    and beyond. She aspires to mentor emerging designers, particularly women of color, fostering a supportive network that values solitude and reflective creative processes. Over the next five years, she
    hopes to publish a coffee‑table book that chronicles her design philosophy, incorporating African American art history and sustainable practices. Additionally, she seeks to obtain LEED AP certification
    and collaborate with local art institutions on site‑specific installations that celebrate Black cultural heritage, positioning herself as a thought leader in quiet‑focused, socially conscious design.
