  career_goals: In the next few years Ashley aims to earn her Certified Security Manager (CSM) credential and transition into a supervisory role within the casino surveillance department, where she can
    shape security policies and mentor junior officers. Leveraging her bachelor's in education, she plans to develop a comprehensive safety‑training curriculum for casino staff and eventually lead a regional
    safety‑education outreach program that educates the wider community on responsible gambling and personal security. Long‑term, she envisions moving into an executive security director position overseeing
    multiple venues across Florida.
