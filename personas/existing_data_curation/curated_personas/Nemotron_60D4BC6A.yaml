personas:
  professional: Mark Thornton, a seasoned residential housekeeping supervisor, channels their ten‑year expertise in systematic deep‑cleaning, inventory management, and light carpentry into building repeatable
    cleaning protocols for boutique resorts, and their methodical, routine‑driven approach fuels their pursuit of eco‑cleaning certifications and a future family‑owned service.
  sports: Mark Thornton, an active member of the Walton County Anglers Association and a weekend participant in the St. George Parks Softball League, avidly follows the Florida Gators college football team
    and the Tampa Bay Buccaneers, and integrates regular fishing trips and light weight‑training into their routine to stay fit and socially connected.
  arts: Mark Thornton, a devoted fan of classic country icons like George Strait, Dolly Parton, and Johnny Cash, regularly watches vintage concert specials on their den TV and occasionally carves wooden
    signboards inspired by folk art, intertwining their woodworking hobby with a nostalgic appreciation for Americana music.
  travel: Mark Thornton prefers low‑key road trips along Florida’s Gulf Coast, planning detailed itineraries to Destin, Sanibel Island, and the historic St. Augustine district, while they balance modest
    family budgets with a desire for relaxed, nature‑focused escapes, and they dream of a future weekend getaway to the Bahamas.
  culinary: Mark Thornton, a confident home cook who harvests heirloom tomatoes, basil, and sweet peppers from their garden, frequently prepares grilled vegetable medleys, Gulf‑shrimp and grits seasoned
    with smoked paprika, and Southern‑style BBQ ribs brushed with honey‑brown sugar glaze, and occasionally treats themselves to a local fish‑fry dinner.
  core: Mark Thornton’s life revolves around orderly routines—from meticulously scheduled cleanings and garden maintenance to methodical budgeting—yet they secretly over‑water their tomatoes and binge‑watch
    classic country shows late into the night, revealing a quirky tension between precision and indulgence.
background:
  cultural: Mark grew up in a modest, middle‑class family in the Deep South, where values of hard work, reliability, and community were emphasized. His white Southern heritage, combined with living in Defuniak
    Springs, gives him a strong sense of local identity—he participates in town festivals, supports the county’s annual blue‑grass gatherings, and attends a nearby Baptist church regularly. The regional
    culture of friendliness, practicality, and a close‑knit neighborly network influences his straightforward communication style and his preference for routine‑driven life. His upbringing instilled an
    appreciation for modest comforts, family cohesion, and a pragmatic approach to challenges.
attributes:
  skills: '[''Residential deep cleaning'', ''Floor care (steam cleaning, carpet extraction, hardwood maintenance)'', ''Organizational scheduling'', ''Supply inventory and budgeting'', ''Eco‑friendly product
    knowledge'', ''Chemical safety and allergen awareness'', ''Laundry and stain removal'', ''Customer service and communication'', ''Staff training and supervision'', ''Basic handyman repairs'']'
  hobbies: '[''Backyard gardening'', ''Woodworking and DIY furniture building'', ''Weekend fishing'', ''Watching classic country music shows'', ''College football fandom'', ''Neighborhood clean‑up volunteering'']'
  career_goals: Mark aims to transition from independent housekeeping work to a supervisory role within a local property‑management company or boutique resort, leveraging his methodical approach to establish
    standardized cleaning protocols. He plans to obtain a certified professional cleaner credential and explore eco‑certifications that align with his value for practicality and health safety. In the longer
    term, Mark hopes to launch a small family‑owned cleaning service with his wife, offering reliable, routine‑based cleaning packages for homeowners and small businesses in Walton County. Financially,
    his goal is to achieve a stable income that supports his mortgage, saves for his children’s education, and allows for occasional leisure travel along Florida’s Gulf Coast.
