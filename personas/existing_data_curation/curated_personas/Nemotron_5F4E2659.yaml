  hobbies: '[''Visiting art galleries and museums'', ''Digital photography (urban and nature)'', ''Yoga and mindfulness meditation'', ''Reading (contemporary fiction, art history, psychology)'', ''Cooking
    experimental dishes'', ''Gardening'', ''DIY home décor projects'', ''Participating in a book club'', ''Volunteering at after‑school art workshops'', ''Hiking in Santa Monica Mountains'']'
  career_goals: Katherine aims to transition back into the professional world by securing a part‑time role in arts administration, such as a museum educator or gallery assistant, where she can combine her
    passion for art with her organizational strengths. In the next five years she hopes to complete a certificate in arts management and eventually take on a coordinator position for community cultural
    programs. She also envisions launching a small online boutique that showcases work by local artists and her own photography, allowing her to maintain flexible hours while supporting her family. A long‑term
    ambition is to become a program director for a non‑profit arts organization, shaping inclusive arts initiatives for the Los Angeles community.
