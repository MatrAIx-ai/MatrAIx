personas:
  professional: Katherine Carvajal is a budding arts administrator who leverages her liberal‑arts education, visual‑curation expertise, and meticulous event‑planning experience to design inclusive community
    workshops, and they bring a curious, open‑minded approach while balancing detailed logistics with creative flexibility.
  sports: Katherine Carvajal enjoys weekend hikes in the Santa Monica Mountains, attends sunrise yoga classes at a local studio, follows the Los Angeles Lakers, Dodgers, and Galaxy with avid enthusiasm,
    and they occasionally join the Run LA City running club for Saturday 5K runs to stay fit.
  arts: Katherine Carvajal curates an Instagram feed inspired by Annie Leibovitz and Edward Hopper, attends exhibitions featuring contemporary artists such as Jess Chick, reads works by Zadie Smith, and
    they frequently discuss Greta Gerwig’s films in their book club, allowing these influences to shape their creative outlook.
  travel: Katherine Carvajal favors meticulously planned weekend getaways to nearby destinations like Santa Barbara, Joshua Tree, and Big Sur, and they also dream of longer explorations in Kyoto, Japan,
    and Oaxaca, Mexico, balancing a modest travel budget with a love for cultural immersion.
  culinary: Katherine Carvajal enjoys experimenting in the kitchen, often preparing dishes like kimchi‑topped bibimbap, roasted cauliflower steaks with tahini, and homemade lavender‑infused shortbread using
    fresh herbs she grows on her balcony garden, such as heirloom tomatoes, basil, and oregano, and they relish dining at pop‑up supper clubs that showcase local chefs.
  core: Katherine Carvajal is a restless creative who balances meticulous planning with spontaneous art‑making, yet they tend to over‑schedule their days and compulsively check their phone for new gallery
    openings, illustrating their curious nature and underlying worry.
background:
  cultural: Katherine’s cultural background is rooted in a European lineage, with family origins tracing back to Spain and the United Kingdom. Raised in the multicultural suburb of Valencia, California,
    she grew up surrounded by a tapestry of cultures that fostered an appreciation for diverse artistic expressions. While English is her primary language, she has a conversational familiarity with Spanish,
    reflecting her family heritage. Her upbringing in Southern California’s vibrant, pluralistic environment has shaped her values of community involvement, lifelong learning, and openness to new ideas.
attributes:
  skills: '[''Visual Curation'', ''Digital Photography'', ''Basic Graphic Design (Adobe Photoshop, Lightroom)'', ''Creative Writing'', ''Event Planning'', ''Community Outreach Coordination'', ''Project
