  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Listening to indie and world music'', ''Reading contemporary fiction and graphic novels'', ''Creating short
    video essays on art and culture'', ''Exploring local street art'', ''Journaling for mindfulness'', ''Cooking Vietnamese dishes'', ''Small book club participation'']'
  career_goals: Corazon plans to pursue a bachelor’s degree in visual communication, digital media, or fine arts to deepen her artistic and technical expertise. She aims to build a professional portfolio
    that blends contemporary Southeast Asian motifs with modern design, secure an internship at a design studio or museum, and eventually work as a multimedia designer or curator specializing in Vietnamese
    and broader Asian-American art. In the long term she hopes to launch an online platform that highlights emerging Asian-American artists, compete in design contests for recognition, and take on a leadership
    role in a cultural institution where she can shape programming and community outreach.
