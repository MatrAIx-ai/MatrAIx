persona_description: A scientist or researcher who is interested in the field of antimicrobial resistance and food safety. They are looking for ways to track the spread of resistance genes and understand
  the relationships between antimicrobial resistance and virulence. They are familiar with the NCBI Pathogen Detection project and are interested in the project's ability to identify potential food contamination
  sources and investigate foodborne disease outbreaks. They are also interested in the project's integration of bacterial pathogen genomic sequences originating in food, environmental sources, and patients,
  and its ability to quickly cluster and identify related sequences.
