personas:
  professional: William Riddle, a 16-year-old tech hobbyist, leverages their knack for building PCs, Python scripting, and meticulous documentation to lead their library coding club's tutorials, demonstrating
    how their organized curiosity translates into budding IT support leadership.
  sports: William Riddle, an avid jogger who logs their miles on a Strava club named Park Pacers, follows the nearby minor-league baseball team the Springfield Cardinals, and once tried out for their high
    school's cross-country squad, proves their disciplined routine extends to fitness despite preferring solitary runs over team sports.
  arts: William Riddle, who assembles model aircraft kits in spare time, captures sunrise landscapes with a DSLR inspired by Ansel Adams, and relaxes listening to ambient tracks by Brian Eno while tinkering
    with hardware, lets their creative side shape a methodical approach to problem-solving.
  travel: William Riddle, whose travel journal lists weekend trips to the state's pine-filled mountain resort for photography, a summer camp at the nearby coastal lighthouse, and a long-awaited dream to
    attend the Tokyo Game Show in Japan, favors meticulously planned itineraries that balance tech-focused excursions with solitary nature retreats.
  culinary: William Riddle, who prefers quick, protein-rich meals such as teriyaki chicken rice bowls, homemade ramen with fresh noodles, and occasionally burns the cheese on a pepperoni pizza while testing
    a new cooling fan, enjoys experimenting with ingredients like sriracha and miso to keep their diet aligned with active coding sessions.
  core: William Riddle, a 16-year-old tech whiz, syncs their life to spreadsheets, queues up hardware fixes, jogs at dawn, and sometimes forgets to sleep while perfecting their next PC build.
background:
  cultural: William grew up in a suburban neighborhood of Lawrenceville, Georgia, within a predominantly white, middle‑class community that values family ties, personal responsibility, and modest ambition.
    The Southern cultural atmosphere emphasizes hospitality, respect for tradition, and community involvement, which has shaped his cooperative and considerate demeanor. He has been exposed to local church
    activities and community service programs that reinforce a sense of shared responsibility and the importance of contributing positively to his surroundings. This upbringing, combined with the tech‑oriented
    environment of Gwinnett County's schools and libraries, has nurtured both his practical curiosity and his disciplined approach to personal growth.
