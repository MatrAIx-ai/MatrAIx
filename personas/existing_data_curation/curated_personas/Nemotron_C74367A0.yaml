personas:
  professional: Dana Spalter is an operations coordinator who uses data-driven decision‑making in Excel, SQL, and Python to optimize office workflows, leading a quiet team with methodical precision while
    balancing curiosity for innovative solutions with a practical, results‑oriented mindset.
  sports: Dana Spalter enjoys early‑morning hikes in the Santa Ana Mountains with the Orange County Trail Riders club, follows the LA Dodgers for baseball, the LA Lakers for basketball, and runs a weekly
    5K with a coastal running group, valuing solitary outdoor exercise over team sports.
  arts: Dana Spalter captures sunrise landscapes inspired by Ansel Adams, reads classics like Tolstoy while listening to Sufjan Stevens and the piano works of Debussy, and attends occasional indie film
    screenings featuring directors such as Greta Gerwig to blend visual and narrative artistry.
  travel: Dana Spalter plans trips with meticulous checklists, preferring solo road trips to scenic spots such as Big Sur and Yosemite, has backpacked through the fjords of Norway, hopes to hike Iceland's
    Laugavegur trail, and keeps a travel journal that illustrates her balanced desire for adventure and reflective downtime.
  culinary: Dana Spalter favors Mediterranean‑inspired meals, skillfully prepares grilled salmon with lemon‑dill sauce, quinoa salads with feta and cherry tomatoes, enjoys avocado toast with poached eggs,
    indulges in dark chocolate, and regularly explores local farmers markets for fresh herbs and heirloom tomatoes.
  core: Dana Spalter embodies quiet efficiency, turning orderly routines and solitary passions into a steady pursuit of improvement while occasionally letting curiosity spark spontaneous side projects.
background:
  cultural: Dana grew up in a middle-class, white family in suburban Orange County, California. Her parents, both of European ancestry (German and Irish), emphasized education, self-reliance, and community
    involvement. The region's blend of coastal lifestyle and inland natural spaces fostered her love for outdoor solitary activities. Growing up in a culturally diverse yet predominantly Anglo environment,
    she values practicality, independence, and a balanced perspective on new ideas versus tradition. She identifies with the West Coast's progressive attitudes toward work-life balance while maintaining
    a personal ethic rooted in her family's Midwestern-influenced values of hard work and modesty.
attributes:
  skills: '[''Office Administration'', ''Team Supervision'', ''Process Optimization'', ''Data Analysis (Excel, SQL, Python)'', ''Project Management (Asana, Trello)'', ''Technical Writing'', ''Training &
