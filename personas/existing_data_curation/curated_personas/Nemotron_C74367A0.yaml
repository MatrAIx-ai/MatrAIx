  hobbies: '[''Hiking'', ''Nature Photography'', ''Birdwatching'', ''Reading (Science nonfiction, classic literature)'', ''Journaling'', ''Yoga'', ''Mindfulness meditation'', ''Personal coding projects'',
    ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Dana aims to transition from first-line supervision to a senior operations management role within the next five years. She plans to earn a Project Management Professional (PMP) certification
    and pursue an MBA to blend her technical expertise with strategic business acumen. Her ambition includes leading digital transformation initiatives that streamline administrative workflows, implementing
    automation tools, and fostering a culture of continuous improvement. She also envisions mentoring future supervisors and eventually consulting for small businesses seeking efficient office operations.
