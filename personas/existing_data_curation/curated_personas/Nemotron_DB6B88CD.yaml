  hobbies: '[''Gardening'', ''Calligraphy'', ''Cooking Traditional East Asian Cuisine'', ''Hiking'', ''Volunteering at Community Health Fairs'', ''Reading Historical Fiction'', ''Yoga and Meditation'',
