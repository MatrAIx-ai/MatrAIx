  career_goals: Keiko aims to complete her Bachelor of Science in Nursing and pursue a Master’s degree in Nursing Administration within the next three years. She aspires to transition into a nurse manager
    or clinical educator role, where she can lead interdisciplinary teams, champion patient‑safety projects, and design culturally competent care pathways for the growing Asian‑American senior population
    in Fairfax County. Additionally, she hopes to obtain a certification in gerontological nursing and launch a community outreach program that offers health screenings and education to elderly residents,
    reinforcing her commitment to high standards and compassionate service.
