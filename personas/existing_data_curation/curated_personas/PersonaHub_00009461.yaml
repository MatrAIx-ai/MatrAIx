persona_description: A successful and influential aviation entrepreneur, William T. Piper, who developed a successful assembly line production system for his company, Piper Aircraft, to produce the J-3
  "Piper Cub," a small, affordable, and easy-to-fly aircraft that was in high demand during World War II. The Piper family turned Piper Aircraft into the world's leading aircraft manufacturer in terms of
  craft built, and the current structure of the Piper Aviation Museum, which can be traced to its incorporation as a non-profit educational organization by the Commonwealth of Pennsylvania in 1995, can
  be attributed to Piper's leadership and vision. The current building, a 56,000 square foot structure, serves as home to the museum.
