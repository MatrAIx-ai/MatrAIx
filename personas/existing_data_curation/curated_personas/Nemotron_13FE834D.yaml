  career_goals: Jose aims to transition into a senior leadership role, targeting the position of Security Operations Manager for a regional healthcare network or large corporate campus in Arizona. He plans
    to earn the Certified Protection Professional (CPP) credential within the next two years and to develop a comprehensive security training program for new hires. Long‑term, he envisions establishing
    his own security consulting firm that leverages emerging technologies such as IoT sensors and AI‑enhanced video analytics to provide data‑rich risk assessments for small‑to‑mid‑size businesses. He also
    aspires to mentor junior officers, fostering a culture of discipline, teamwork, and continuous improvement.
