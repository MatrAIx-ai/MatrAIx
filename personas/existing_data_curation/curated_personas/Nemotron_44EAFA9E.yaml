  hobbies: '[''Cooking traditional Mexican dishes and experimenting with new flavors'', ''Herb gardening (tomatoes, chilies, basil, cilantro)'', ''Knitting and crocheting'', ''Reading historical fiction
    and Mexican literature'', ''Solving jigsaw puzzles and crossword puzzles'', ''Participating in small card or knitting groups'']'
  career_goals: Although retired, Gloria’s primary ambition is to remain self‑sufficient in her Garden Grove home for as long as possible, preserving her health and independence. She hopes to document and
    pass down her family’s culinary and oral traditions to her grandchildren, perhaps compiling a handwritten recipe book. She also aspires to improve her organization skills to reduce daily worries, and
    she plans to attend a local senior‑center workshop on simple technology to keep in touch with family abroad.
