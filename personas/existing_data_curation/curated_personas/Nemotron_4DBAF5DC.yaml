  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Hunting'', ''Church Activities'', ''Playing Cards'', ''Attending Sabine Parish Fair'', ''Listening to Country Music'', ''Family Gatherings'',
