personas:
  professional: A budding young artist, Angelina Eckermann explores mixed-media projects, drawing on bright colors and inventive compositions while their relaxed approach to deadlines lets creativity flow,
    and their competitive spark drives them to win school art contests.
  sports: An enthusiastic soccer player, Angelina Eckermann competes on the Omaha Youth Soccer Club’s U10 team, cheers for the Nebraska Cornhuskers on game day, practices dribbling skills at local parks,
    and occasionally skips practice for a spontaneous art workshop.
  arts: A passionate creator, Angelina Eckermann spends afternoons drawing fantastical beasts inspired by the works of Dr Seuss, Frida Kahlo, and Studio Ghibli, attends community art workshops, and fuels
    their imagination with upbeat tracks by Taylor Swift and BTS while they paint.
  travel: An adventurous day-tripper, Angelina Eckermann enjoys spontaneous weekend rides to the Henry Doorly Zoo and the nearby Sandhills, dreams of exploring Disney World and the Black Forest, and prefers
    flexible itineraries that allow last-minute detours to discover hidden murals in downtown Omaha.
  culinary: A budding home chef, Angelina Eckermann helps their family bake soft pretzel bites with cheese dip during an autumn festival, loves zesty pepperoni pizza, mixes bright fruit smoothies with strawberries
    and mango, yet they frequently forget to rinse their brushes before dinner.
  core: A curious, art‑obsessed nine-year-old, Angelina Eckermann blends bright creativity with a competitive edge, often trades school chores for new paints, and can be found sketching while humming pop
    tunes.
background:
  cultural: Angelina is raised in a white, Midwestern American family in Omaha, Nebraska. Her household celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, while
    also honoring her German heritage through occasional traditions like baking pretzels around Oktoberfest. The community places value on friendliness, independence, and outdoor activities, shaping her
    love for nature walks, local festivals, and collaborative yet competitive play.
attributes:
  skills: '["Drawing and illustration", "Creative storytelling", "Basic Scratch programming", "LEGO building and spatial reasoning", "Puzzle solving and critical thinking"]'
  hobbies: '["Drawing and painting", "Visiting museums and art galleries", "Reading fantasy and adventure books", "Exploring local parks and nature", "Building with LEGO", "Playing educational video games
    (Scratch, Minecraft)", "Attending community art workshops", "Playing soccer"]'
  career_goals: Angelina dreams of becoming a visual artist or an animator who brings her imaginative worlds to life. She is also excited about the idea of designing educational video games that blend art
    and technology. In the future, she hopes to study at an art institute, work as a concept artist for movies or games, and perhaps curate exhibitions that highlight creative minds. Occasionally, she imagines
    exploring space as an astronaut who sketches the cosmos.
