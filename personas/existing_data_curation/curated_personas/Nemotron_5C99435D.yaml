personas:
  professional: Gregory Salas, a 32‑year‑old secondary‑school teacher, couples an organized, data‑driven approach with bilingual, culturally responsive curriculum design, and their natural curiosity drives
    the integration of technology like Google Classroom and interactive polling into every lesson.
  sports: Gregory Salas coaches a community youth soccer team for the Lincoln Youth Soccer Association, joins weekly pickup 5‑a‑side games, follows the Nebraska Cornhuskers women’s soccer and the Lincoln
    Mustangs high‑school football for inspiration, and maintains a jogging routine on the Salt Creek Trail to stay fit.
  arts: Gregory Salas attends weekly Latin music gatherings featuring gaita and salsa, revels in the sounds of Celia Cruz, Victor Manuelle, and Chino & Nacho, while their photography captures sunrise over
    the Sandhills and candid moments at school events, showcasing a keen eye for composition.
  travel: Gregory Salas prefers well‑planned road trips that blend cultural immersion with nature, having explored the Andean city of Mérida, the historic streets of Cartagena, and Utah’s national parks,
    while budgeting wisely to keep occasional weekend escapes to nearby Pawnee Prairie as the go‑to low‑cost retreat.
  culinary: Gregory Salas, an adept home‑cook, regularly prepares arepas stuffed with shredded cheese and black beans, hallacas layered with plantain, raisins, and pork, and golden‑fried empanadas using
    masa and cilantro, delighting guests with fresh corn tortillas and a side of guasacaca dip.
  core: Gregory Salas is a methodical educator‑coach who balances a love for structured learning with spontaneous bursts of culinary creativity, all while quietly juggling spreadsheet‑driven finances, health
    check‑ups, and a camera‑filled quest for perfect light.
background:
  cultural: 'Gregory was born to Venezuelan immigrants who arrived in the United States when he was a child. Raised in a bilingual household, he grew up speaking Spanish at home and English at school, preserving
    family traditions such as Carnaval celebrations, cooking family recipes, and listening to Venezuelan folk music. His heritage informs his teaching philosophy: he integrates multicultural perspectives
    into lesson plans, supports Spanish‑language learners, and emphasizes inclusive dialogue. Gregory is active in Lincoln''s Latino community, volunteering at cultural events hosted by the local Venezuelan
    consulate and participating in community outreach programs. He maintains strong ties to his roots through regular family gatherings, occasional visits to Venezuela, and by sharing his cultural heritage
    with students and colleagues.'
attributes:
  skills: '["Classroom management", "Curriculum development", "Differentiated instruction", "Formative and summative assessment design", "Technology integration (Google Classroom, SMART Boards)", "Bilingual
    education (Spanish‑English)", "Cross‑cultural communication", "Data‑driven instruction", "Parent and community engagement", "Student mentorship and counseling", "Extracurricular coaching (soccer)",
    "Professional development facilitation"]'
  hobbies: '["Cooking Venezuelan cuisine", "Reading historical non‑fiction", "Coaching youth soccer", "Gardening (vegetable garden)", "Hiking local nature trails", "Photography", "Listening to Venezuelan
    music (gaita, salsa)", "Participating in community cultural events", "Following educational research"]'
  career_goals: Gregory aims to complete a Master's in Educational Leadership within the next three years, positioning himself for a role as a department head or curriculum coordinator within his district.
    He plans to develop a bilingual humanities curriculum that highlights Latin American history and literature, and to lead district‑wide professional‑development sessions on inclusive pedagogy. Over the
    longer term, he aspires to become a school principal, where he can champion policies that support immigrant and low‑income students. He also hopes to launch a summer enrichment program that combines
    Venezuelan cultural activities with STEM projects for middle‑schoolers in Lincoln.
