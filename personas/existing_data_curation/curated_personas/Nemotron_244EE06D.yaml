personas:
  professional: Raul Castelo is a bilingual retail specialist who leverages persuasive sales techniques, meticulous inventory control, and a street‑art‑inspired visual merchandising flair to consistently
    exceed targets while mentoring new staff.
  sports: Raul Castelo is an avid pickup basketball player at Eastside courts, a weekend hiker in the Santa Monica Mountains, and a devoted fan of the Los Angeles Lakers, LA Clippers, and LA Galaxy, blending
    a competitive drive with a love for outdoor recreation.
  arts: Raul Castelo captures Los Angeles’ vibrant murals through photography, curates a vinyl collection featuring artists like Bad Bunny and Celia Cruz, and channels that rhythm into weekly salsa dancing,
    letting art and music shape both their leisure and visual merchandising style.
  travel: Raul Castelo favors spur‑of‑the‑moment road trips to coastal towns like Santa Barbara, plans annual pilgrimages to San Juan to reconnect with family roots, and dreams of exploring Oaxaca’s food
    markets and Tokyo’s neon art districts when finances allow.
  culinary: Raul Castelo delights in weekend cooking sessions where they transform plantains, pork cracklings, and sofrito into authentic mofongo and arroz con gandules for friends, while occasionally experimenting
    with a fusion taco‑styled version that incorporates local avocado and cilantro.
  core: Raul Castelo blends a competitive retail mindset with a relentless curiosity for street art, salsa rhythms, and vintage vinyl, yet occasionally overbooks their schedule with spontaneous social events.
background:
  cultural: Raul was raised in a bilingual Puerto Rican household in East Los Angeles, where Spanish was spoken at home and English at school. His parents immigrated from San Juan in the early 1990s and
    instilled a strong sense of community, celebrating traditions such as Noche de San Juan, bomba and plena music, and family‑centered holiday meals. Growing up amidst a vibrant Latino diaspora, he developed
    an appreciation for the island’s culinary flavors, rhythmic dance, and resilient spirit. The multicultural environment of Los Angeles further broadened his outlook, encouraging him to blend his Puerto
    Rican heritage with the city’s diverse artistic scene. This cultural tapestry informs his personal identity, his creative pursuits in art and music, and his desire to showcase Puerto Rican culture through
    his future retail ventures.
