  hobbies: '[''Street‑Art Exploration and Photography'', ''Salsa Dancing'', ''Cooking Puerto Rican Cuisine'', ''Pickup Basketball'', ''Hiking in the Santa Monica Mountains'', ''Attending Live Music Shows'',
    ''Trivia Nights'', ''Volunteering with Community Art Programs'', ''Vinyl Record Collecting'']'
  career_goals: Raul aims to advance to a store manager position within the next two years, leveraging his sales record and leadership abilities to oversee staff scheduling, budgeting, and visual strategy.
    He plans to enroll part‑time in a Business Administration bachelor's program to complement his associate degree and broaden his strategic skill set. In the longer term, he aspires to become a district
    manager for a national retail chain, where he can implement innovative, art‑inspired store concepts across multiple locations. Ultimately, Raul envisions opening his own boutique that fuses contemporary
    fashion with Puerto Rican cultural motifs, providing a platform for local artists and designers while creating a community‑focused retail experience.
