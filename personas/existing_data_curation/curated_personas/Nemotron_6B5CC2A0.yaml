    Instruction for Elementary Grades'']'
  hobbies: '[''Sketching and Digital Illustration'', ''Reading Speculative Fiction and Philosophy'', ''Piano Practice (Classical and Jazz)'', ''Arduino and DIY Electronics Projects'', ''Urban Photography'',
    ''Puzzle Solving (Crosswords, Sudoku)'', ''Board Games (Strategic Games)'', ''Cooking International Cuisine'', ''Volunteering at Local Library Storytime'']'
  career_goals: Ricky aims to become a curriculum specialist who leads STEAM integration across his school district, designing programs that unite science, technology, engineering, arts, and mathematics
    in meaningful ways. He plans to earn a bachelor's degree in education followed by a master's in curriculum and instruction, positioning himself for roles such as instructional coach or school administrator.
    Additionally, he hopes to launch an after‑school initiative that offers art‑infused literacy and coding workshops for underserved youth, while continuing to mentor new teachers and advocate for culturally
    responsive pedagogy at the district level.
