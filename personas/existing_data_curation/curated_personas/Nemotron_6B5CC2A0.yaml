personas:
  professional: Ricky Dixon is a classroom teacher who seamlessly intertwines visual arts, piano improvisation, and Arduino tinkering into project‑based STEAM lessons, leveraging their organized, methodical
    planning and quiet confidence to mentor fellow educators and champion culturally responsive, inclusive curricula.
  sports: Ricky Dixon enjoys solitary runs along the Schuylkill River Trail and a weekly indoor cycling class, while they loyally follow the Philadelphia Eagles in football and the 76ers in basketball,
    and participate in a local Steampunk Cycling club that blends their DIY electronics hobby with weekend rides.
  arts: Ricky Dixon immerses themselves in speculative fiction by devouring novels from Octavia Butler and Ted Chiang, creates abstract digital illustrations inspired by H.R. Giger and James Jean, and unwinds
    at the piano playing Debussy's Clair de Lune alongside Miles Davis‑style jazz improvisations, while they occasionally attend off‑Broadway productions by contemporary playwright Sarah Kendal.
  travel: Ricky Dixon meticulously plans weekend trips that combine architectural photography with quiet reflection, favoring destinations such as Boston's historic Freedom Trail, Prague's medieval alleys,
    and Kyoto's serene temples, while they keep long‑haul journeys occasional due to budget constraints and opt for boutique hostels to maximize cultural immersion.
  culinary: Ricky Dixon approaches cooking as a quiet laboratory, skillfully preparing international dishes like Japanese ramen with homemade miso broth, Spanish paella with saffron‑infused rice and chorizo,
    and Ethiopian misir wat seasoned with berbere spice, while they diligently document each recipe in a digital notebook and occasionally splurge on exotic ingredients such as fresh saffron or truffle
    oil.
  core: Ricky Dixon blends solitary artistic curiosity with methodical precision, turning everyday routines into inventive STEAM experiments while they occasionally trade sleep for late‑night sketching
    sessions and impulse hobby purchases.
background:
  cultural: Ricky was raised in a Black family in North Philadelphia, where his parents emphasized the importance of education, community service, and cultural pride. His household participated in church
    gatherings, Juneteenth celebrations, and local heritage festivals that highlighted the African American experience in the city. Drawing on the legacy of the Great Migration and the rich traditions of
    the Philadelphia Black community, Ricky incorporates African American literature, music, and oral histories into his teaching to foster inclusive learning. He values intergenerational storytelling and
    community resilience, and he strives to reflect that cultural depth in his classroom practices.
attributes:
  skills: '[''Classroom Management'', ''Lesson Planning and Curriculum Design'', ''Arts Integration (visual arts and music)'', ''Educational Technology (Google Workspace, interactive whiteboards, coding
