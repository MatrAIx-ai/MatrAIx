  career_goals: Although retired, Yogesh aims to keep his mind active and his contributions meaningful. He plans to deepen his understanding of global art movements by completing an online certificate in
    art history and curating a modest exhibition of South‑Asian folk art at his local community center. He aspires to record his family's oral histories, creating a digital archive for future generations.
    Yogesh also wishes to mentor younger members of the Tamil diaspora in cooking and storytelling, offering guidance while respecting his own need for solitude. Travel remains a cherished ambition; he
    hopes to visit his ancestral hometown in Tamil Nadu and attend cultural festivals there, balancing these experiences with his health considerations and preference for low‑stress activities.
