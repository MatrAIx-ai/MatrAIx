  career_goals: Darlene aims to advance to a senior loan officer position within the next two years, followed by obtaining professional certifications such as Certified Financial Counselor (CFC) and eventually
    pursuing an MBA to broaden her strategic management skills. She aspires to become a branch manager, leading a team while fostering a client‑focused culture. Long‑term, Darlene envisions transitioning
    into a regional managerial role or launching a community‑based financial education program that blends practical budgeting advice with innovative digital tools, reflecting her curiosity for new ideas
    and commitment to pragmatic outcomes.
