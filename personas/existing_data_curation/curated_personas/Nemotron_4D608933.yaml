  career_goals: Guided by her kind and cooperative nature, Blanca envisions future roles where she can help and support others. She often says she wants to be a teacher because she enjoys sharing stories
    and explaining things to friends. She also dreams of becoming a veterinarian to care for animals she loves. Occasionally she imagines herself as a community storyteller or a dancer who brings people
    together through music and movement, reflecting her desire for harmony and her curiosity about different worlds.
