persona_description: A Kannada language teacher who aims to make learning the language more accessible and enjoyable for students of all ages and backgrounds, particularly those who are new to the language
  or who are interested in learning about Kannada culture and literature. The teacher has expertise in the Kannada script and its usage, and has developed a unique listening and learn methodology to help
  students become familiar with the sound and meaning of common words before delving into the intricacies of grammar. The teacher is committed to making communication easier and more natural for students,
  and has a particular interest in helping students from Karnataka and other Indian states who may be struggling with the language.
