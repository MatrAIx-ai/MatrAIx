personas:
  professional: Cherise Paelmo, a 22‑year‑old stylist who blends meticulous cutting technique with a fluid, Instagram‑driven brand strategy, leverages a structured booking system yet often lets spontaneous
    client requests reshuffle their day, and asserts their creative vision while maintaining a collaborative salon atmosphere.
  sports: Cherise Paelmo, a 22‑year‑old outdoor enthusiast who hikes the Catskills with the local Catskill Hiking Club on weekends, follows the New York Knicks and New York Yankees for a dose of city‑level
    sports drama, and incorporates yoga as their primary fitness routine rather than formal gym workouts.
  arts: Cherise Paelmo, a 22‑year‑old creative who curates street‑style photography inspired by Henri Cartier‑Bresson, frequents contemporary art galleries featuring works by Kehinde Wiley, draws stylistic
    inspiration from vintage fashion icons, and fills studio time with playlists ranging from Tame Impala to Björk.
  travel: Cherise Paelmo, a 22‑year‑old wanderer who plans weekend getaways to the Hudson Valley and Catskills on a flexible schedule, dreams of a summer immersion in the Amalfi Coast’s pastel villages,
    and balances spontaneous Instagram‑inspired trips with a modest travel budget and occasional family obligations.
  culinary: Cherise Paelmo, a 22‑year‑old culinary hobbyist who experiments with simple Mediterranean dishes such as shakshuka, Greek salad with feta and olives, and rosemary‑infused roasted potatoes, enjoys
    sourcing fresh basil and sun‑dried tomatoes at the local farmer’s market, and balances modest home‑cooking skills with occasional splurges on artisanal cheeses.
  core: Cherise Paelmo, a 22‑year‑old stylist whose precise haircraft coexists with a love of vintage fashion, yoga, and spontaneous creativity, juggling structured ambition with playful disorganization,
    and often turning a missed appointment into an impromptu photo session.
background:
  cultural: Cherise descends from an Irish‑Italian family that settled in Queens before moving to Manhattan. Growing up in a multicultural New York neighborhood, she was exposed to a blend of European traditions
    and the city’s diverse cultural fabric. Family gatherings often feature Italian home‑cooked meals and Irish holiday customs, fostering a practical yet creatively curious outlook. Her white middle‑class
    upbringing emphasized hard work and reliability, while the vibrant NYC environment nurtured her love for fashion, art, and self‑expression.
attributes:
  skills: '["Hair cutting", "Hair coloring", "Balayage and ombre techniques", "Event styling", "Client consultation", "Sanitation & health compliance", "Product recommendation", "Appointment scheduling",
    "Basic makeup application", "Social media promotion", "Upselling services"]'
  hobbies: '["Yoga", "Vintage fashion hunting", "Street photography", "Art gallery visits", "Knitting", "Hiking", "Cooking Mediterranean dishes", "Playlist curation", "Nail art"]'
  career_goals: Cherise aims to become a senior stylist at a high‑end boutique salon in Manhattan, building a reputation for precision cuts and creative color work. She plans to develop a personal brand
    on Instagram and other platforms, eventually launching her own boutique salon that emphasizes cruelty‑free, natural products. To support this vision, she seeks advanced certifications in trichology
    and business management, and hopes to mentor apprentices once her own business is established. While she values a stable income, she also wants the flexibility to set her own schedule and continue learning
    new techniques.
