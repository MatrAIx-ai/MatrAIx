persona_description: A researcher in the field of cocoa, specifically focusing on the physiological changes and their influence on aphid preference in cocoa plants, as well as the impact of true bugs on
  cocoa fruit mortality and productivity. The researcher also studies the interactions between ants and cocoa cultivation in the Oumé region of central Côte d'Ivoire. Additionally, they investigate the
  changes in ant communities along an age gradient of cocoa cultivation and the effects of conservation through chocolate on biodiversity and farmers in Ecuador's lowland tropics.
