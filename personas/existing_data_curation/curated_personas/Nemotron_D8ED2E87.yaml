  career_goals: Jennifer aims to deepen her impact within the transit agency by moving into a senior driver trainer position, where she can shape safety protocols and mentor newer drivers. She plans to
    enroll in a transportation systems certification program at a local community college to qualify for a dispatcher or operations analyst role, combining her practical knowledge with structured planning
    skills. In the longer term she hopes to serve on the union’s safety committee, advocating for better working conditions and fostering a collaborative environment. She also entertains the idea of launching
    a weekend charter service for community groups, allowing her to blend her love of driving with entrepreneurial flexibility.
