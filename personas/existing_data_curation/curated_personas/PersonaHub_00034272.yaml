persona_description: A sociologist who studies the effects of job loss on health outcomes, particularly among employees who lose their jobs due to health reasons. She is interested in understanding the
  specific challenges faced by this population in terms of health insurance, unemployment benefits, and re-employment programs. She is also interested in the social and economic implications of non-standard
  employment contracts and the need for structured health insurance, unemployment benefits, and re-employment programs to meet the needs of this evolving workforce.
