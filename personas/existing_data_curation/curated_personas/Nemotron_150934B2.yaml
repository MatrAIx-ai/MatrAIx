  career_goals: At 72, Felipe aims to stay physically and mentally active while preserving and sharing his Cuban heritage. He plans to maintain his garden, lead cooking workshops at the senior center, and
    serve as a liaison for Cuban cultural events in Sarasota. He also hopes to compile his family's recipes in a small cookbook and, health permitting, travel to visit relatives in Cuba.
