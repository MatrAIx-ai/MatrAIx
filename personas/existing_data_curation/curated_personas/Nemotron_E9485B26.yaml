personas:
  professional: Jorge Thomson, a seasoned full-stack software engineer with over twenty years mastering Java, C#, Python, and cloud-native architecture, channels their love of structure and natural charisma
    into leading agile squads, enforcing rigorous coding standards, and transforming technical deep-dives into engaging, audience-friendly talks at local meetups, while occasionally slipping into the spotlight
    as the improv host to keep the team energized.
  sports: Jorge Thomson, a devoted youth soccer coach with the Brandywine United club and avid weekend hiker, stays fit by leading practice drills, tackling local trails in the Brandywine Valley, and cheering
    on the Philadelphia Eagles in the fall, the Phillies during summer, and occasionally catching a 76ers basketball game at the Wells Fargo Center.
  arts: Jorge Thomson, a regular on a weekly improv comedy troupe, draws creative energy from the quick-wit of Tina Fey and the physical humor of Jim Carrey, unwinds by listening to Fleetwood Mac and Bon
    Iver, and frequently attends productions by the Philadelphia Theatre Company, where they cherish the collaborative storytelling that mirrors their team-oriented work ethic.
  travel: Jorge Thomson plans family trips with the meticulous detail of a sprint backlog, favoring itineraries that blend the relaxed charm of a Brandywine Valley weekend getaway, the cultural immersion
    of a past visit to Barcelona’s Gothic Quarter, and the adventurous spirit of a future trek through Patagonia’s Torres del Paine, all while staying within a modest budget that leaves room for their consultancy
    ambitions.
  culinary: Jorge Thomson, a passionate home chef who cultivates heirloom tomatoes, basil, and rosemary in their garden, showcases culinary skill by preparing elaborate family feasts—such as saffron-infused
    paella, rosemary-crusted lamb, and a layered tiramisu—while occasionally over-seasoning dishes in pursuit of bold flavor, and they relish dining experiences that pair fresh, locally sourced ingredients
    with a glass of Pinot Noir.
  core: Jorge Thomson blends a meticulous, structure-driven mindset with a sociable, spotlight-loving flair, balancing precise code reviews and organized project plans with the spontaneous energy of improv,
    all while hoarding garden tools and habitually sacrificing sleep for late-night coding sessions.
background:
  cultural: Jorge comes from a middle‑class Anglo‑American background rooted in the Philadelphia suburbs. He was raised with values of hard work, community service, and family cohesion. Celebrations such
    as Thanksgiving, Fourth of July barbecues, and local church gatherings have shaped his emphasis on harmony and cooperation. Growing up in Chester County exposed him to a blend of suburban traditions
    and a strong sense of local civic pride, which influences his commitment to volunteerism, local sports leagues, and fostering inclusive environments both at work and in his community.
