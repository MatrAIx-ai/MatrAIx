  career_goals: Jorge aims to transition into a senior technical leadership role, such as Lead Architect or Chief Technology Officer, where he can shape product strategy and drive architectural excellence.
    He aspires to establish a small consultancy that helps local businesses modernise their legacy systems while fostering a collaborative, inclusive engineering culture. Over the next five years, he plans
    to obtain AWS Certified Solutions Architect and Certified ScrumMaster credentials, publish a technical guide on building resilient microservices, and expand his mentorship program through regional coding
    bootcamps.
