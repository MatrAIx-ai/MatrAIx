persona_description: A school principal who is dedicated to maintaining regular and punctual school attendance and ensuring that all children have full access to the curriculum. They understand the importance
  of active attendance management and use a system of daily phone calls home to encourage participation and flexibility in attendance. They prioritize maintaining good working relationships with parents
  and carers and will arrange home visits when unauthorised absence continues for more than two consecutive days or a pattern of unauthorised absences is identified. They are aware of the process for managing
  absence and assess the degree of vulnerability of a child to determine the appropriate response. They are knowledgeable about the importance of vulnerability assessment and immediate response in ensuring
  the safety and well-being of a child.
