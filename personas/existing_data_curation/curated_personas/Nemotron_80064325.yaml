personas:
  professional: Jun Kim, a 43‑year‑old full‑stack software engineer with 15 years of experience in Java, Python, and TypeScript, leverages their curiosity and steady composure to design scalable AWS‑based
    micro‑services, mentor junior developers at hackathons, and embed generative visualizations into user interfaces, consistently turning complex technical challenges into elegant, art‑inspired solutions.
  sports: Jun Kim hits the trails on weekend hikes across Hocking Hills, participates in the Columbus Running Club’s early‑morning 5K runs during spring, follows the Cleveland Browns and Cincinnati Reds
    with loyal enthusiasm, and they sprinkle in occasional pickup basketball games at the local community center to keep the heart rate up.
  arts: Jun Kim frequents contemporary galleries showcasing immersive works by artists like Refik Anadol and teamLab, creates generative paintings in Processing inspired by the color palettes of Yayoi Kusama,
    curates a personal playlist of Radiohead, Ólafur Arnalds, and Flying Lotus while coding, and they regularly attend midnight screenings of classic sci‑fi films featuring actors such as Sigourney Weaver
    and Harrison Ford.
  travel: Jun Kim plans tech‑conference trips to Seattle and Berlin with meticulous itineraries, while also carving out spontaneous weekend road trips along the Ohio River Valley; they dream of photographing
    the aurora borealis in Iceland and exploring the historic backstreets of Kyoto, balancing budget‑conscious flights with occasional splurges on boutique hostels that double as creative co‑working spaces.
  culinary: Jun Kim, an enthusiastic home chef, perfects Korean‑Chinese fusion dishes like jjajang‑spiced ramen, kimchi‑infused mandu, and sriracha‑glazed pork belly using locally sourced kimchi, gochujang,
    and organic bok choy from the farmer’s market, and they regularly host tasting nights where friends sample inventive pairings of craft beer and their signature bulgogi‑styled bao buns.
  core: Jun Kim navigates life with a disciplined habit of automating everyday tasks, a lingering weakness for late‑night caffeine‑fueled debugging marathons, and a calendar that’s meticulously color‑coded
    yet occasionally ignored during spontaneous art‑gallery openings.
background:
  cultural: Jun is a second‑generation East Asian American whose family roots trace back to both South Korea and Taiwan. He grew up in a bilingual household, speaking Mandarin and Korean at home while learning
    English in school. The family celebrates Lunar New Year, Chuseok, and the Mid‑Autumn Festival, preserving traditional customs such as making kimchi, moon‑cake baking, and ancestor remembrance. Jun’s
    cultural heritage instilled a strong respect for education, community responsibility, and harmony, which he blends with the Midwestern values of openness and practicality found in Columbus. He actively
    participates in local Korean and Chinese cultural associations, volunteers at language‑exchange events, and enjoys sharing his heritage through food and art with friends from diverse backgrounds.
