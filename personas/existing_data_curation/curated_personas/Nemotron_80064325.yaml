  career_goals: Jun aims to transition into a technology leadership role where he can shape product strategy while continuing to bridge art and engineering. Over the next five years he plans to become a
    Lead Architect or Director of Engineering at a forward‑thinking company that values innovative user experiences and sustainable software practices. He aspires to champion diversity and inclusion initiatives,
    mentor underrepresented talent, and launch an open‑source project that democratizes creative coding tools for educators. Additionally, Jun is interested in obtaining AWS Certified Solutions Architect
    – Professional and pursuing a part‑time master’s in Human‑Computer Interaction to deepen his expertise at the intersection of design and technology.
