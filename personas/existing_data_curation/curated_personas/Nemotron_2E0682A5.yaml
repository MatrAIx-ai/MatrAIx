  hobbies: '[''Watercolour Painting'', ''Visiting Art Galleries'', ''Sketching Landscapes'', ''Book Club (Contemporary Nonfiction)'', ''Cooking International Recipes'', ''Gardening'', ''Volunteer Coordination
    at Community Center'', ''Mindfulness Journaling'']'
  career_goals: Teresa aims to advance into a senior leadership role that bridges project management with community arts and cultural development. She plans to earn a PMP or Agile certification to formalize
    her expertise while spearheading a regional initiative that supports local artists, small businesses, and volunteer groups. Over the next five years she envisions establishing a nonprofit or municipal
    program that creates collaborative art‑based projects, and she hopes to mentor emerging project managers, especially women in mid‑career transitions, fostering a supportive network that reflects her
    compassionate values.
