  hobbies: '[''Reading picture books'', ''LEGO building'', ''Organized playground games (tag, hopscotch)'', ''Guided drawing and coloring'', ''Shell collecting at the shoreline'', ''Using educational tablet
    apps'']'
  career_goals: Eva dreams of growing up to become someone who helps and guides others. She often says she wants to be a teacher because she likes the idea of a classroom with clear rules and schedules,
    which satisfies her love for structure. She also mentions wanting to be a veterinarian after seeing animals at the local zoo, reflecting her competitive spirit to be the best at caring for pets. Occasionally
    she imagines being an astronaut, inspired by space books in the library, but her most concrete ambition is to become a teacher who can organize fun learning activities.
