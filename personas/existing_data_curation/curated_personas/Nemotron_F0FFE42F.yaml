personas:
  professional: Eva Parisi is a budding LEGO architect who meticulously follows instruction booklets, loves snapping bricks into orderly cityscapes, and habitually challenges friends to build the tallest
    tower in a race against the clock.
  sports: Eva Parisi is a spirited participant in playground tag and hopscotch, recently enrolled in the community's tiny‑tots soccer program where they sprint after the ball with the same gusto that they
    cheer for the Seattle Seahawks on game day.
  arts: Eva Parisi is an avid reader of Dr. Seuss’s whimsical rhyme‑filled picture books and Mo Willems’s Elephant & Piggie series, often curling up at the local library to finish the predictable plot before
    diving into a step‑by‑step Crayola coloring adventure featuring dinosaurs and mermaids.
  travel: Eva Parisi loves weekend trips to the nearby Pacific shore where they collect smooth shells, has explored the towering Redwoods on a school field trip, and dreams of a family road‑trip to Vancouver’s
    Stanley Park, balancing their wanderlust with the modest budget of a typical five‑person household.
  culinary: Eva Parisi’s palate favors classic kid‑friendly meals like cheesy macaroni, grilled cheese sandwiches, and peanut‑butter‑jelly toast, and they proudly claim the title of snack chef after mastering
    the art of assembling a perfect apple‑slice and cheddar cube combo.
  core: Eva Parisi blends a love for orderly LEGO construction with a competitive streak in playground games, a habit of misplacing crayons yet obsessively arranging shells, and a delightfully quirky mix
    of structured curiosity and spontaneous fun.
background:
  cultural: Eva comes from a white, predominantly American family with an Italian surname, Parisi, and occasional Italian cultural traditions such as making pasta with her grandparents and celebrating Easter
    with family meals. Growing up in Pacific, Washington, she is immersed in the Pacific Northwest’s natural environment—rainy weather, evergreen forests, and a nearby marine coastline—which influences
    her love for outdoor exploration and shell collecting. She also participates in community events at the local library and enjoys the multicultural atmosphere of nearby Seattle, where she is exposed
    to a variety of cultural festivals and foods.
attributes:
  skills: '[''Reading fluency (phonics)'', ''Basic arithmetic (addition/subtraction)'', ''Following routines'', ''Shoe tying'', ''LEGO construction'', ''Puzzle solving'', ''Pattern recognition'', ''Basic
