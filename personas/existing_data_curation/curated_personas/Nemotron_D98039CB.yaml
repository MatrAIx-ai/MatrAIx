personas:
  professional: Elvira Duque is a residential carpenter who combines precise blueprint reading, modern joinery techniques, and a curiosity‑driven commitment to sustainable, reclaimed‑wood furniture, while
    their organized yet flexible approach lets them coordinate bilingual client communications, keep projects on schedule, and assertively mentor apprentices toward a Master Carpenter certification.
  sports: Elvira Duque is an avid hiker who tackles Cape Cod’s coastal trails on weekends, joins local pickup softball games for variety, and proudly supports the Boston Red Sox, Celtics, Bruins, and Patriots,
    often wearing team colors during trail runs.
  arts: Elvira Duque channels creative energy into salsa and merengue dancing with their husband, drawing inspiration from icons like Celia Cruz and Marc Anthony, while regularly attending Boston Symphony
    Orchestra concerts and theater productions featuring Lin‑Manuel Miranda’s work.
  travel: Elvira Duque plans trips with meticulous checklists, favors short adventure‑filled road trips to New England lighthouses and coastal hikes, dreams of a cultural immersion vacation to the Dominican
    Republic’s historic Zona Colonial, and hopes to sail the Greek Islands on a future sabbatical.
  culinary: Elvira Duque revels in preparing traditional island dishes such as mofongo stuffed with pork and arroz con gandules seasoned with sofrito, cilantro, and annatto, while also mastering New England
    clam chowder, sourcing fresh plantains, adobo, and locally caught cod at the market, and treating cooking as a meditative extension of their woodworking precision.
  core: Elvira Duque balances a meticulous carpenter’s eye for detail with an energetic love for salsa, a penchant for over‑committing to community projects, and a habit of leaving half‑finished DIY tasks
    lingering after a weekend of dancing.
background:
  cultural: Elvira grew up in a vibrant Puerto Rican household, celebrating traditions such as Noche de San Juan and the music of plena and bomba. Bilingual in Spanish and English, she blends Caribbean
    warmth with the pragmatic mindset of New England. Her cultural roots influence her love for family gatherings, communal cooking, and a strong sense of community service, while her professional life
    reflects the hardworking, resilient spirit of the Puerto Rican diaspora in the United States.
attributes:
  skills: '[''Residential framing'', ''Custom cabinetry'', ''Furniture making'', ''Blueprint reading'', ''Tool maintenance'', ''Sustainable woodworking'', ''Project budgeting'', ''Team coordination'', ''Bilingual
    communication (Spanish/English)'', ''Safety compliance'']'
  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Hiking'', ''DIY home improvement'', ''Gardening'', ''Volunteering teaching woodworking'', ''Attending community festivals'']'
  career_goals: Elvira aims to earn a Master Carpenter certification within the next two years and eventually launch her own boutique woodworking studio in the Greater Boston area, focusing on reclaimed‑wood
    furniture and culturally inspired designs. She also plans to mentor apprentices, develop a small crew of skilled carpenters, and obtain LEED‑Green Building credentials to integrate eco‑friendly practices
    into her projects.
