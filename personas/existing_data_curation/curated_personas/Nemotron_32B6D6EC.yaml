  hobbies: '[''Gardening (vegetables and herbs)'', ''Southern cooking and baking'', ''Knitting and crocheting'', ''Reading historical fiction and genealogy'', ''Birdwatching'', ''Walking/hiking local nature
    trails'', ''Volunteer work at senior center'', ''Community storytelling events'', ''Digital photography'']'
  career_goals: Although retired from formal employment, Elizabeth aims to deepen her involvement in the community by leading a local gardening club, documenting and sharing family recipes, and writing
    a memoir that captures the history of her family and the Arden area. She also hopes to become a mentor for younger volunteers at the senior center, learning new digital tools to stay connected while
    preserving the practical, hands‑on knowledge she values.
