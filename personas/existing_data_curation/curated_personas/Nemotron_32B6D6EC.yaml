personas:
  professional: Elizabeth Cave, a retired senior‑center volunteer, leverages her organizational skill, gardening expertise, and calm mediation style to lead a local gardening club, coordinate community
    events, and mentor younger volunteers, all while maintaining a flexible, low‑stress approach.
  sports: Elizabeth Cave enjoys leisurely walks on the Blue Ridge trails, participates in the senior walkers club, and follows the Atlanta Braves, the Carolina Panthers, and her hometown Ridgeview Rams
    high‑school football team, attending occasional games when friends join.
  arts: Elizabeth Cave attends church socials featuring gospel choirs, loves listening to the warm crooning of Billie Holiday and the storytelling songs of Johnny Cash, reads historical novels by Hilary
    Mantel, and delights in community storytelling evenings where local performers recite works of August Wilson.
  travel: Elizabeth Cave prefers low‑key road trips to scenic spots, having already explored Asheville’s Biltmore Estate and the historic streets of Charleston, while dreaming of a pilgrimage to England’s
    Cotswolds to trace ancestral roots and a leisurely cruise down the Amalfi Coast when health permits.
  culinary: Elizabeth Cave delights in perfecting classic Southern dishes—such as fried chicken with a crisp cornbread coating, shrimp and grits seasoned with fresh thyme and smoked paprika, and peach cobbler
    baked with real butter and local honey—while experimenting by swapping heirloom tomatoes and sweet potatoes into traditional recipes.
  core: Elizabeth Cave mixes a gardener’s curiosity with a pragmatic love for comfort, staying flexible in plans, delighting in spontaneous yarn projects, and quietly insisting on keeping the backyard bird
    feeder stocked even when the rest of the house feels chaotic.
background:
  cultural: Elizabeth grew up in a multi‑generational, white Appalachian family in western North Carolina, where Southern hospitality, church life, and self‑reliance shaped daily routines. Her heritage
    includes Scots‑Irish and German settler roots, reflected in traditional foods, folk crafts, and a strong sense of community. The cultural milieu emphasizes kindness, cooperation, and maintaining harmony
    in relationships, values that continue to guide her interactions in Arden.
attributes:
  skills: '[''Canning and food preservation'', ''Vegetable and herb gardening'', ''Knitting and crocheting'', ''Southern home cooking'', ''Basic computer and smartphone use'', ''Community event planning'',
