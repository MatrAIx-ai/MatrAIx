personas:
  professional: Terry Pruett, a 29‑year‑old construction laborer with a knack for framing, concrete pouring, and heavy equipment operation, leverages their curiosity and outgoing nature to propose on‑site
    sustainable solutions while informally coordinating crew tasks despite a habit of leaving tools scattered.
  sports: Terry Pruett, a frequent participant in the Manchester Amateur Ice Hockey League and an avid fan of the Boston Bruins and New England Patriots, stays fit through weekly pickup games on the rink,
    weekend fishing trips in the White Mountains, and occasional trail runs, viewing sport as both camaraderie and a release from construction site stress.
  arts: Terry Pruett, who unwinds with spontaneous guitar jam sessions at local pubs covering The Dropkick Murphys and Bruce Springsteen classics, also frequently attends live performances by folk artists
    like Lake Street Dive, collects vintage concert posters, and cites the gritty storytelling of Stephen King novels as inspiration for their woodworking designs.
  travel: Terry Pruett, whose travel style blends impromptu weekend getaways to the White Mountains and craft‑brewery tours in Portland with aspirations to trek Norway’s fjords, prefers flexible itineraries
    over rigid planning, often booking last‑minute cabin rentals on Airbnb while balancing a modest travel fund against their post‑divorce responsibilities.
  culinary: Terry Pruett, an enthusiastic home‑chef who can craft a perfectly seasoned New England clam chowder and a smoky pork shoulder with apple‑cider glaze on a self‑built cutting board, enjoys pairing
    their meals with local IPAs like Sam Adams Boston Lager, and while their cooking skills are solid, they often improvise with whatever fresh fish they catch on weekend fishing trips.
  core: Terry Pruett is a hands‑on, socially driven construction enthusiast who balances a love for sustainable building and backyard brews with a chaotic knack for misplacing tools and missing bill reminders.
background:
  cultural: Terry grew up in a modest working‑class family in the New England region, where self‑reliance, community involvement, and a strong work ethic are prized. His white, predominantly Anglo‑American
    heritage reflects the cultural traditions of small‑town New Hampshire, including a love for the outdoors, seasonal festivals, and local sports. The region’s emphasis on practicality and resourcefulness
    shaped his pragmatic outlook, while the close‑knit community fostered his sociable and cooperative nature.
