  career_goals: Terry aims to move up from laborer to crew foreman within the next three years, leveraging his on‑site experience and leadership abilities. He plans to earn OSHA 30 certification and pursue
    NCCER credentials to broaden his technical qualifications. In the longer term, he dreams of starting his own small‑scale construction firm that focuses on energy‑efficient homes and community build
    projects, providing a stable income that supports his post‑divorce responsibilities and offers flexibility for his personal interests.
