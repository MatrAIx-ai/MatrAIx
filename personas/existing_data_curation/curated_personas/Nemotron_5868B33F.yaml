personas:
  professional: Frances Baden, a veteran audiovisual systems specialist with three decades of hands‑on experience installing, maintaining, and troubleshooting AV equipment, leverages their practical mindset
    and cooperative nature to mentor junior technicians while planning a part‑time consultancy aimed at teaching small‑business owners and local institutions.
  sports: Frances Baden stays active through daily walks along the Erie Canal towpath with the local senior walking club, enjoys occasional cross‑country skiing in the Adirondacks during winter, and roots
    for the Buffalo Bills and Buffalo Sabres, occasionally volunteering as the AV operator for the town high‑school’s Friday night football games.
  arts: Frances Baden weaves both yarn and narrative, spending evenings crocheting blankets while discussing Margaret Atwood novels in a small library book club, and finds solace in the folk sounds of Bob
    Dylan and Joni Mitchell that echo the rhythms of their garden, occasionally attending local community‑theater productions of classic plays.
  travel: Frances Baden prefers low‑key, nature‑focused trips, having explored the serene trails of Adirondack Park and the misty vistas of Niagara Falls, while dreaming of a quiet weekend in Bar Harbor,
    Maine, yet they often plan vacations around their garden schedule and limited budget, opting for day‑long train rides over long‑haul flights.
  culinary: Frances Baden delights in farm‑to‑table cooking, regularly transforming garden harvests of carrots, potatoes, and rosemary into roasted root vegetable medleys, hearty chicken pot pie, and a
    spiced apple crisp that they perfect each autumn, while their modest cooking skill is bolstered by weekly visits to the local farmers’ market for fresh ingredients.
  core: Frances Baden is a pragmatic AV guru who can instantly diagnose a faulty projector but often misplaces their own keys, finds calm knitting intricate scarves, yet wrestles with daily waves of anxiety
    that make even routine tasks feel urgent.
background:
  cultural: Frances grew up in a predominantly white, middle‑class suburb of upstate New York, where community ties and self‑reliance were emphasized. Her upbringing reflects the values of modesty, hard
    work, and neighborly cooperation typical of the region's post‑World‑II generation. Although not strongly religious, she respects the local Protestant traditions and often engages in community gatherings
    that celebrate seasonal holidays and local heritage. Her cultural identity includes a blend of Mid‑Atlantic values and the practical sensibilities of someone who has spent a lifetime in the technical
    trades.
attributes:
  skills: '["Audiovisual system installation", "Cable management and termination", "Sound system setup and calibration", "Projector and video wall configuration", "Networked AV troubleshooting", "Electrical
    safety compliance", "Technical documentation", "Client communication and service", "Mentoring junior technicians"]'
  hobbies: '["Gardening", "Knitting and crocheting", "Nature walks", "Book club participation", "Volunteer work at senior center", "Seasonal community festivals"]'
  career_goals: Approaching retirement, Frances aims to transition from full‑time field work to a part‑time consultancy where she can share her wealth of knowledge with emerging AV professionals. She hopes
    to develop a short‑course series on basic AV troubleshooting for small‑business owners in her community, while also establishing a modest schedule that allows more time for personal wellness and family.
    Maintaining a sense of purpose, she envisions serving as a trusted advisor for local schools and churches that need affordable AV solutions, balancing professional contribution with a smoother, less
    demanding workload.
