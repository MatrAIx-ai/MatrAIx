personas:
  professional: Iris Kiniry, a 28‑year‑old licensed industrial engineer, leads occupational health and safety initiatives in manufacturing by blending rigorous Lean Six Sigma data‑analysis with a compassionate,
    team‑focused style that reflects her structured yet flexible personality.
  sports: Iris Kiniry enjoys weekend hikes in Caprock Canyons with a local hiking club, follows the Dallas Cowboys (NFL) and Texas Rangers (MLB) with seasonal enthusiasm, and occasionally joins a community
    soccer league, balancing team spirit with solo outdoor pursuits.
  arts: Iris Kiniry channels her love for rhythm through weekly salsa lessons, where she dances to classics by Celia Cruz, Gloria Estefan, and modern hits by Bad Bunny, while also indulging in chess puzzles
    and leadership books by Simon Sinek, merging analytical thinking with artistic flair.
  travel: Iris Kiniry prefers a mix of planned itineraries and spontaneous detours, having explored Santa Fe’s adobe art scene, New Orleans’ music districts, and Texas hill‑country vineyards, while dreaming
    of a rainforest eco‑tour in Costa Rica and a cultural immersion trip to San Juan, balancing adventure with budget‑conscious travel.
  culinary: Iris Kiniry’s intermediate cooking skills shine when she prepares ropa vieja with slow‑cooked flank steak, plantain mofongo seasoned with achiote and garlic, and savory croquetas, pairing them
    with fresh lime, cilantro, and a splash of rum‑infused glaze, often hosting communal meals that blend traditional flavors with modern twists.
  core: Iris Kiniry blends analytical rigor and rhythmic passion, cooling spreadsheets with salsa steps while juggling a badge of safety compliance, an ever‑growing list of financial goals, and a habit
    of leaving shoes untied during hikes.
background:
  cultural: Iris is a first‑generation Cuban‑American whose family immigrated to Texas in the early 1990s. She grew up bilingual, speaking Spanish at home while attending English‑language schools. Cuban
    culture shapes her daily life through food, music, and community traditions; she celebrates events such as Cuban Heritage Month and maintains close ties with the local Cuban diaspora. The values of
    hard work, familial loyalty, and collective responsibility passed down from her parents inform her pragmatic yet compassionate outlook, and she often incorporates Spanish phrases and Cuban rhythms into
    her social interactions and cooking.
attributes:
  skills: '[''Process Optimization'', ''OSHA & EPA Compliance'', ''Risk Assessment'', ''Ergonomics'', ''Root-Cause Analysis'', ''Lean Six Sigma'', ''Data-Driven Metrics'', ''Project Management'', ''Regulatory
    Reporting'', ''Continuous Improvement'', ''Statistical Analysis (Minitab, Excel)'', ''Simulation Modeling (Arena)'', ''EHS Management Systems (ISO 45001)'']'
  hobbies: '[''Cooking Cuban Cuisine'', ''Salsa Dancing'', ''Yoga'', ''Hiking (Caprock Canyons)'', ''Volunteer Workplace Safety Education'', ''Reading Business & Leadership Books'', ''Chess Puzzles'']'
  career_goals: Iris aims to advance to senior leadership within the occupational health and safety field. In the next five years she plans to obtain the Certified Safety Professional (CSP) designation
    and complete a Lean Six Sigma Black Belt certification. She wants to lead a comprehensive EHS program at a mid‑size manufacturing plant in Texas, driving measurable reductions in recordable injury rates
    and improving overall safety culture through data‑analytics and employee engagement. Long‑term, she envisions becoming an EHS Director or consulting partner, influencing industry safety standards and
    mentoring the next generation of safety engineers while maintaining a balanced work‑life schedule.
