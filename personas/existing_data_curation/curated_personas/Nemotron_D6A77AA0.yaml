  hobbies: '[''Soccer'', ''LEGO building'', ''Minecraft'', ''Baseball card collecting'', ''Adventure book reading'', ''School theater'', ''Helping with chores'']'
  career_goals: Dylan dreams of a future where he can help his community in a structured, service‑oriented role. He is fascinated by firefighters and police officers, admiring their clear responsibilities
    and teamwork. He also imagines himself as a professional soccer player, inspired by local teams and the excitement of sports. In school, he hopes to become class captain or a student council member,
    and he is curious about engineering, hoping one day to design and build things like the LEGO creations he loves today.
