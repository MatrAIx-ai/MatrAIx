personas:
  professional: Dylan Burrows is a budding junior architect who transforms LEGO instruction manuals into miniature skyscrapers, applying their love for structure and teamwork to every build and dreaming
    of designing real buildings one day, and they often organize neighborhood soccer drills after school to practice leadership.
  sports: Dylan Burrows plays forward for the River Valley Soccer Club in the neighborhood league, cheering passionately for Manchester United in the Premier League and collecting Los Angeles Dodgers baseball
    cards, and they keep a strict practice schedule to stay fit for both soccer and backyard baseball games.
  arts: Dylan Burrows dazzles on stage in school productions of Annie and Peter Pan, idolizes Lin‑Manuel Miranda’s musical flair, devours adventure novels by Rick Riordan, and they bond with friends over
    animated movies like Moana and pop hits by Ariana Grande.
  travel: Dylan Burrows loves family road‑trips to the Grand Canyon and weekend adventures at Walt Disney World in Orlando, prefers itineraries packed with hands‑on activities and scheduled rest breaks,
    and they dream of exploring the historic castles of Europe once school holidays allow longer travel.
  culinary: Dylan Burrows enjoys crafting peanut‑butter‑and‑jelly sandwiches and assembling mini cheese‑pizza bites using mozzarella, pepperoni, and pre‑made crusts, and they occasionally help stir macaroni and cheese
    on the stovetop, though they tend to over‑season with extra cheese.
  core: Energetic, organized and ever‑curious, Dylan Burrows balances a love for building LEGO skyscrapers with spontaneous video‑game quests, yet they often forget to clean up their room until bedtime.
background:
  cultural: Raised in Pittsburgh, Pennsylvania, Dylan comes from a middle‑class white American family with roots in the region's European immigrant heritage, including Irish and German ancestry. He attends
    a local public elementary school where community traditions like watching the Steelers and Penguins games, participating in city festivals, and celebrating typical American holidays are woven into daily
    life. Family meals often feature regional dishes such as pierogies and pizza, reflecting the multicultural flavor of Allegheny County. The city’s emphasis on teamwork, hard work, and community service
    shapes his values and aspirations.
