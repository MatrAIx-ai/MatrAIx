  career_goals: Andrew aims to progress from his current supervisory role to a district manager position within the next three to five years, overseeing multiple stores across central Texas. In that capacity
    he plans to design and implement a mentorship program for retail supervisors that blends clear structure with the flexibility his personality values, while prioritizing employee well‑being and reducing
    burnout. Looking further ahead, he envisions transitioning to a consulting role that helps small‑town retailers adopt efficient operational practices without sacrificing the community‑centric culture
    he cherishes. Throughout his career trajectory, he is committed to maintaining a healthy work‑life balance and serving as a steady, thoughtful leader for his colleagues.
