personas:
  professional: Andrew Dye is a retail supervisor with more than two decades of hands‑on experience, climbing from sales associate to first‑line manager; they excel at crafting daily schedules, writing
    SOPs that balance clear structure with the flexibility they cherish, and coaching their team with empathy while using Lightspeed and Square POS systems and Excel cost analyses to keep operations smooth,
    even though they sometimes forget to file paperwork until the last minute because they value personal interaction over strict paperwork deadlines.
  sports: Andrew Dye is a dedicated little‑league baseball coach who spends evenings running drills at the neighborhood field, follows the Texas Rangers in MLB and the Dallas Cowboys in the NFL, belongs
    to a local deer‑hunting club that meets each season, and fits in weekend fishing trips on the Llano River, using these activities to stay physically active while maintaining strong community ties.
  arts: Andrew Dye is an avid fan of Texas country music, regularly attending live shows featuring George Strait, Miranda Lambert, and Luke Combs, and they keep a well‑worn collection of western novels
    by Louis L’Amour on their nightstand; they also enjoy watching classic western films like *The Good, the Bad and the Ugly* and occasionally dabble in album‑cover art reproduction during downtime.
  travel: Andrew Dye prefers road‑trip adventures that combine scenic drives with a purpose, having explored the Texas Hill Country, staked a campsite at Big Bend National Park, visited Austin’s music festivals,
    and taken a weekend getaway to Oklahoma’s Lake Texoma for fishing; they plan trips around family schedules and budget constraints, often choosing destinations where they can grill fresh‑caught fish
    and roam local fairs.
  culinary: Andrew Dye is a backyard‑garden‑to‑grill enthusiast who masters Texas‑style barbecue, regularly smoking brisket and pork ribs with a rub made of paprika, brown sugar, cumin, and mesquite wood
    chips, and they love pairing the meat with fresh garden produce like tomatoes, jalapeños, and corn on the cob, often hosting potluck nights where friends sample their experimental sauces and side dishes
    such as queso‑stuffed jalapeños.
  core: Andrew Dye is a sociable, structure‑loving retail leader who balances community‑centric hobbies like hunting, gardening, and barbecue with a cautious but sometimes impulsive approach to money, health,
    and a willingness to tackle stress with both meticulous planning and occasional procrastination.
background:
  cultural: Andrew is a white Texan whose family has deep roots in central Texas, especially Mason County. Growing up in a close‑knit rural community, he internalized Southern hospitality, self‑reliance,
    and a strong neighborly ethic. He participates in regional traditions such as annual county fairs, high‑school football weekends, and regular church gatherings, reflecting his Baptist upbringing that
    emphasizes kindness, cooperation, and service. While he embraces the Anglo‑American heritage of the area, he also respects and collaborates with the growing Hispanic influence in the region, often partnering
    with local Latin‑owned businesses and attending cultural events that celebrate this diversity.
