  career_goals: Diego aims to transition from a frontline surveillance officer to a supervisory role within the next two years, targeting a Night Shift Supervisor position. He plans to obtain professional
    certifications such as the Certified Protection Professional (CPP) and the Physical Security Professional (PSP) to broaden his expertise. In the longer term, he envisions moving into security operations
    management, overseeing multiple sites across the casino complex, and eventually leveraging his education background to become a corporate trainer for security personnel. He is also interested in pursuing
    a master’s degree in security management to complement his practical experience.
