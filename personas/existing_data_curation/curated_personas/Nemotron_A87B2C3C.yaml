  hobbies: '[''Weightlifting'', ''Playing basketball'', ''Cooking traditional Latin cuisine'', ''Solving puzzles (crosswords, Sudoku)'', ''Reading historical non‑fiction'', ''Strategic video gaming'', ''Volunteering
