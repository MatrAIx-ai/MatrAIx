personas:
  professional: Jerome Robinson, a retail operations supervisor with a talent for visual merchandising and people management, blends data‑driven scheduling, empathetic conflict resolution, and community‑focused
    art events to drive sales while mentoring staff toward leadership roles.
  sports: Jerome Robinson, an avid basketball player at the local community center, competes in a rec league, follows the Chicago Bulls and Chicago White Sox, dons the Bulls' retro jersey during games,
    and incorporates weekend runs into their fitness routine to stay agile on the court.
  arts: Jerome Robinson, a devoted explorer of the local art scene, spends weekends photographing murals by Banksy‑style street artists, attends exhibitions of contemporary creators like Kara Walker and
    Kehinde Wiley, enjoys listening to Miles Davis, Aretha Franklin, and Kendrick Lamar while curating in‑store displays, and credits the emotional resonance of jazz for fueling their creative merchandising
    ideas.
  travel: Jerome Robinson, a curious traveler who blends meticulous planning with spontaneous photo walks, has visited Savannah’s historic squares, New Orleans’ French Quarter for its music and cuisine,
    Lisbon’s tiled streets for mural inspiration, and dreams of exploring Ghana’s coastal towns to trace culinary roots, all while balancing family responsibilities and budgeting constraints.
  culinary: Jerome Robinson, a home chef who modernizes Southern cuisine, frequently prepares shrimp and grits with lemon‑basil foam, collard greens glazed with miso, and tomato‑basil bruschetta using garden‑grown
    herbs, while experimenting with spice rubs and occasionally over‑seasoning, turning the kitchen into a creative laboratory.
  core: Jerome Robinson, a 42‑year‑old retail leader with an art‑infused mindset, balances meticulous scheduling with spontaneous mural photography, mentors teens, and occasionally splurges on limited‑edition
    prints while juggling a habit of late‑night coffee and a love for basketball.
background:
  cultural: Jerome grew up in Clayton County, a region steeped in Southern hospitality and a rich African‑American heritage. Family gatherings, church life, and community events shaped his values of fellowship,
    resilience, and cultural pride. He draws inspiration from the legacy of the civil‑rights movement and the vibrant artistic traditions of Atlanta’s Black neighborhoods. This background informs his appreciation
    for storytelling, music, and visual art, and it motivates his commitment to creating inclusive retail experiences that reflect the diversity of his community.
