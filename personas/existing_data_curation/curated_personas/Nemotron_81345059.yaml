  hobbies: '["Visiting art museums and galleries","Photographing street murals","Playing basketball at the community center","Cooking Southern-inspired meals","Listening to jazz and hip‑hop","Reading non‑fiction
    on business, psychology, and cultural history","Volunteering as a youth mentor","Gardening","Attending live music and cultural festivals"]'
  career_goals: Jerome aims to advance from his current supervisory role to store manager within the next two to three years, then progress to district manager to influence retail strategy across multiple
    locations. He plans to complete a bachelor's degree in Business Administration and earn a certified retail management credential. Long‑term, he envisions opening a boutique that celebrates African‑American
    art and fashion, leveraging his retail expertise and passion for creative expression. He also seeks to mentor emerging leaders, develop inclusive training programs, and champion community‑based initiatives
    that link commerce with cultural enrichment.
