  hobbies: '[''Watercolor painting'', ''Visiting art museums and galleries'', ''Jazz music appreciation'', ''Creole cooking classes'', ''Gardening (native plants)'', ''Crossword puzzles'', ''Reading mystery
    novels'', ''Volunteering at arts festivals'', ''Bird watching'', ''Cycling along the river trail'']'
  career_goals: Lori aims to advance within the East Baton Rouge Parish public-safety department, seeking a supervisory role as a Senior Traffic Safety Coordinator. She plans to complete a community-college
    certificate in Public Safety Management and obtain advanced certification in traffic engineering. Her ambition is to design and implement a parish-wide pedestrian-safety program, integrating technology
    such as flashing beacon signs and mobile safety alerts. She also hopes to lead a youth education initiative that teaches children about road safety through interactive art projects, combining her love
    of creativity with her professional expertise. Ultimately, she wants to be recognized as a driving force behind safer school crossings throughout the region.
