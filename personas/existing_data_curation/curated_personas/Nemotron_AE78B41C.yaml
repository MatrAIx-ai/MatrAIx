personas:
  professional: Lori Lathan, a 48-year-old traffic safety specialist in East Baton Rouge Parish, blends meticulous on‑site coordination of school‑zone crossings with a flair for creative community outreach,
    using her curiosity for art to design engaging safety workshops while maintaining a competitive edge that drives her toward a senior supervisory role.
  sports: Lori Lathan cycles with the Baton Rouge Cycling Club on the Mississippi River trail during spring and fall, occasionally joins local pick‑up softball games, and follows the LSU Tigers football
    and New Orleans Pelicans basketball teams, while preferring low‑impact activities such as bird‑watching walks that double as informal cardio sessions.
  arts: Lori Lathan channels her artistic side into watercolor paintings of the Louisiana bayou, drawing inspiration from artists like Winslow Homer and the contemporary works displayed at the LSU Museum
    of Art, while regularly attending jazz nights featuring John Boutté and the Preservation Hall Jazz Band, and volunteering at the Baton Rouge Arts Festival where she merges safety messaging with interactive
    installations.
  travel: Lori Lathan’s travel style blends careful planning with a love for waterways, having explored the historic streets of New Orleans, the riverfront charm of Savannah, and the canal networks of Amsterdam,
    while dreaming of a future trip to the Bay of Fundy for tide‑watching; budget constraints keep most trips domestic and short‑term, though she occasionally splurges on a weekend retreat to the Texas
    Hill Country.
  culinary: Lori Lathan’s culinary passions revolve around Creole classics—she perfects gumbo with Andouille sausage, okra, and a dark roux, crafts jambalaya with shrimp and smoked chicken, and delights
    in making beignets with powdered sugar—her intermediate cooking skills shine during community classes where she experiments with fresh crawfish and file powder, often hosting friends for spice‑laden
    dinner parties.
  core: Lori Lathan is a curiosity‑driven traffic safety professional who balances meticulous work with watercolor art, jazz nights, and a cautious yet occasionally indulgent financial habit, all while
    wrestling with stress and a competitive streak that fuels her ambition.
background:
  cultural: Lori grew up in a middle-class white family in the greater Baton Rouge area, steeped in Southern traditions and the multicultural vibrancy of East Baton Rouge Parish. Her childhood home celebrated
    holidays with classic Southern hospitality, while the city's diverse cultural mix exposed her to Cajun and Creole music, cuisine, and festivals such as Mardi Gras and the Baton Rouge Blues Festival.
    She attended the local high school, where community ties and church involvement reinforced values of responsibility and service. Although her background reflects the mainstream Southern white culture,
    she embraces the region's rich artistic scene and the blending of cultures, which fuels her appreciation for art and new ideas.
attributes:
  skills: '[''Traffic safety management'', ''Pedestrian crossing supervision'', ''First aid/CPR certification'', ''Conflict de-escalation'', ''Local traffic law knowledge'', ''Flagging equipment maintenance'',
