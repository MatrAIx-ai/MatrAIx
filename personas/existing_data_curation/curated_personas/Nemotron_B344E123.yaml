personas:
  professional: Kathy Hong, a self‑taught digital illustrator at 14, blends manga‑style drawing with video editing to produce weekly DIY craft tutorials for her growing YouTube channel, where her structured
    approach to scriptwriting meets her spontaneous flair for improvisation, showcasing an emerging talent in multimedia storytelling.
  sports: Kathy Hong enjoys the rhythmic workout of Beat Saber as a home fitness routine, follows the St. Louis Cardinals baseball team, and participates in the school's intramural volleyball club on Saturdays,
    balancing competitive play with a laid‑back attitude toward organized sports.
  arts: Kathy Hong draws inspiration from manga masters like Osamu Tezuka and contemporary K‑pop culture, while listening to BTS and classical piano pieces, regularly attends local comic‑con events, binge‑watches
    Studio Ghibli films, and collects limited‑edition art prints, allowing their artistic identity to fuse East‑Asian visual storytelling with Western pop aesthetics.
  travel: Kathy Hong spends weekends exploring Missouri's natural gems, such as a sunrise hike at Elephant Rocks State Park and bird‑watching at Como Park, while dreaming of a future trip to Tokyo for a
    manga convention and a cultural exchange program in Seoul, planning trips around school breaks and family budget constraints.
  culinary: Kathy Hong's palate mixes comfort foods like pepperoni pizza with Korean favorites like bibimbap and kimchi fried rice, they can whisk together a quick ramen stir‑fry after school and love experimenting
    with colorful bento boxes, yet they often skip meal prep when a new video idea captivates them, leading to spontaneous snack raids.
  core: Kathy Hong is a disciplined yet spontaneous teen artist who juggles YouTube tutorials, piano practice, and debate, often trading late‑night gaming for a burst of creative energy, while habitually
    forgetting to sleep on time.
background:
  cultural: Kathy is a second‑generation Korean‑American whose parents immigrated from South Korea. She was raised in a bilingual household where Korean is spoken alongside English, and she celebrates traditional
    holidays such as Lunar New Year and Chuseok with family gatherings, food, and storytelling. Living in Saint Paul, Minnesota, she participates in a local Korean community church and attends cultural
    festivals hosted by the Hmong‑Mongolia Cultural Center, which broaden her appreciation of multicultural traditions. Her family emphasizes education, respect, and communal responsibility, values that
    provide a structured foundation, while her environment encourages her to explore American extracurricular activities, fostering flexibility and individuality.
attributes:
  skills: '[''Digital media creation (Canva, video editing)'', ''Basic programming with Scratch'', ''Bilingual communication (English and Korean)'', ''Personal budgeting and allowance management'', ''Organizational
