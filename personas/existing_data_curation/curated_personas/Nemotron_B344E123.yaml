  hobbies: '[''Manga‑style illustration'', ''DIY craft video creation for YouTube'', ''Piano (classical and K‑pop repertoire)'', ''Rhythm gaming (Beat Saber)'', ''Korean language class at community center'',
    ''Nature photography at Como Park'', ''Debate club participation'', ''Reading graphic novels'']'
  career_goals: Kathy aims to blend her love for creativity and technology in a future career such as user‑experience (UX) design, interactive media production, or digital content creation. She plans to
    join her high‑school’s STEM academy, earn a certification in Adobe Photoshop, and eventually study graphic design or interactive media at a university. Long‑term, she hopes to produce culturally infused
    digital stories that celebrate her East Asian heritage while making technology approachable for younger learners. In the near term she wants to lead a student‑run tech club at school and secure a summer
    internship at a local media studio.
