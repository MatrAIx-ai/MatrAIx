  career_goals: Lilibeth dreams of becoming a professional artist who creates bright paintings and illustrations that tell stories from her imagination and Mexican heritage. She also imagines teaching younger
    children as a bilingual art teacher, sharing both language and creativity. Her disciplined side fuels a desire to win art contests and showcase her work in local galleries. Occasionally, she talks about
    exploring space or being a scientist, reflecting her curiosity about new ideas, but her most concrete ambition is to keep learning, improve her drawing skills, and make her family proud.
