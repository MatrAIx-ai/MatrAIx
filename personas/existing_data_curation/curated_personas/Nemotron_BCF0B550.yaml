  hobbies: '["Playing guitar (Latin folk & contemporary)","Cooking Mexican cuisine","Attending soccer matches (Liga MX and local teams)","Hiking in Oklahoma nature trails","Volunteering at food banks and
    community gardens","Reading historical biographies & theology","Gardening (vegetable and ornamental)","Photography (cultural events)"]'
  career_goals: Eduardo aims to expand his bilingual youth ministry by establishing a dedicated after‑school program that blends faith formation with academic support for Mexican‑American families. He envisions
    creating a community resource center adjacent to his church that offers language classes, job‑search assistance, and health workshops, leveraging partnerships with local nonprofits. Embracing technology,
    he plans to develop a robust digital platform for sermons, podcasts, and virtual small groups to engage congregants who cannot attend in person. Long‑term, he aspires to become a regional pastor‑leader,
    mentoring other clergy on culturally responsive ministry and advocating for interfaith collaboration across Oklahoma's diverse religious landscape.
