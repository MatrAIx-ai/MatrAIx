personas:
  professional: Eduardo Saldana, a bilingual pastor in his early fifties, blends pastoral counseling, community outreach, and digital ministry with a pragmatic curiosity, leveraging his event‑planning flair
    to coordinate multicultural worship services while occasionally letting the sheer number of initiatives leave his schedule a bit chaotic.
  sports: Eduardo Saldana is a die‑hard soccer fan who never misses a match of Club América in Liga MX and rallies with friends to watch FC Tulsa and the Oklahoma City Energy FC whenever they play, while
    he stays fit by hiking the Wichita Mountains on weekends and casual pick‑up games at the local park.
  arts: Eduardo Saldana channels his love of the arts through guitar performances of traditional Latin folk songs, drawing inspiration from musicians like Lila Downs and Victor Jara, while his evenings
    often include listening to classic Mexican cinema star Pedro Infante’s film soundtracks and photographing community festivals for a personal visual diary.
  travel: Eduardo Saldana’s travel style mixes purposeful cultural immersion with spontaneous road trips, favoring visits to historic sites such as Santa Fe’s art markets, the Grand Canyon’s sunrise hikes,
    and the bustling streets of Mexico City, though constraints of his ministry duties mean he typically plans short, family‑friendly getaways at the end of the school year.
  culinary: Eduardo Saldana enjoys cooking hearty dishes like cochinita pibil, hacienda‑style tamales, and handmade salsa verde using heirloom chilies, corn masa, and fresh cilantro, proudly mastering the
    art of slow‑cooked pork while often swapping recipes with neighbors over communal potlucks at the church kitchen.
  core: Eduardo Saldana thrives on weaving faith, music, and community service into a vibrant tapestry, yet his tendency to let schedules slip and his love for late‑night taco runs keep his life delightfully
    messy.
background:
  cultural: Eduardo is a first‑generation Mexican‑American who grew up in a bilingual household, preserving Mexican traditions while adapting to life in the United States. Fluent in both Spanish and English,
    he incorporates Mexican devotional practices such as the Feast of Our Lady of Guadalupe and Día de los Muertos into worship services, fostering a sense of cultural identity within his congregation.
    He values family cohesion, regularly hosting large family reunions that blend Mexican cuisine, music, and storytelling. Living in Oklahoma City, he respects the region's multicultural tapestry, actively
    participating in inter‑cultural events that honor Native American, African‑American, and other Latino communities. His heritage informs his empathetic approach to ministry, especially in supporting
    immigrant families navigating cross‑cultural challenges.
