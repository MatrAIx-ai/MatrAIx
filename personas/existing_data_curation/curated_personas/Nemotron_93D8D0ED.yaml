  hobbies: '[''Pickup Basketball'', ''Grilling and Southern Cooking'', ''Church Youth Mentorship'', ''Fishing'', ''Vegetable Gardening'', ''Oklahoma Sooners Football'', ''Personal Finance Reading'', ''Blues
    and Jazz Events'', ''Community Block Parties'', ''Neighborhood Clean‑up'']'
  career_goals: Winston aims to transition from senior sales associate to store manager within the next three years, leveraging part‑time coursework in business administration at a nearby community college
    to gain formal managerial credentials. He plans to earn a certified retail management credential, lead his store to become a top performer in the district, and eventually open a small boutique that
    reflects the needs and tastes of the Sapulpa community. Long‑term, Winston wants to mentor younger employees, reduce workplace stress through improved scheduling practices, and ensure a stable, financially
    secure future for his family.
