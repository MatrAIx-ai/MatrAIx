    with friends", "Attending live music concerts", "Exploring local coffee shops", "Reading self‑help and personal growth books", "DIY home décor projects", "Learning basic Spanish", "Yoga for stress relief"]'
  career_goals: In the short term, Gwen aims to become a shift lead or assistant manager at her current retail location, gaining supervisory experience and completing a Certificate in Retail Management.
    Over the next three to five years she plans to transfer to a four‑year university to earn a bachelor’s degree in Business Administration, focusing on marketing and operations. Long‑term, she aspires
    to manage a store or a small boutique of her own, blending her love for customer interaction with entrepreneurial opportunities. She also hopes to develop stress‑management and leadership training for
    herself and her team, ensuring a supportive work environment that balances flexibility with clear goals.
