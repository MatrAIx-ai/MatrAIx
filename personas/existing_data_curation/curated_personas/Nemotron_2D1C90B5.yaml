personas:
  professional: Gwen Boutte is a 22‑year‑old retail associate with fast cash‑handling skills and a practical curiosity that drives her to streamline POS workflows, while her relaxed attitude toward strict
    schedules sometimes leaves the shift board a bit cluttered, yet she leverages her outgoing nature to resolve customer conflicts and rally her team toward a shift‑lead promotion.
  sports: Gwen Boutte loves hiking the Wasatch foothills, attends a local Zumba class three times a week, cheers for the Utah Jazz during the NBA season, and is a casual member of the Vineyard Trail Runners
    club, preferring group workouts that blend cardio with socializing over solitary gym sessions.
  arts: Gwen Boutte frequently attends live shows at the Provo City Center Theatre where she enjoys performances by indie folk artist Phoebe Bridgers and local band The Aces, curates a small Instagram feed
    of her mountain photography, and unwinds by dancing to Zumba routines set to pop hits from Beyoncé and Dua Lipa.
  travel: Gwen Boutte plans weekend getaways to Zion National Park and often dreams of a spring trip to Barcelona to practice her beginner Spanish, but prefers budget‑friendly road trips with friends over
    long‑haul flights, using a shared spreadsheet to coordinate itineraries and packing lists.
  culinary: Gwen Boutte enjoys whipping up quick quinoa‑black bean bowls, avocado toast with feta, and smoothies featuring kale, banana, and chia seeds, often experiments with seasonal produce like roasted
    butternut squash, and she’s known among friends for over‑seasoning her coffee with cinnamon and cardamom at the local Blue Moon Café.
  core: Gwen Boutte is a sociable, curiosity‑driven retail associate who balances spontaneous coffee splurges and mild anxiety with a love for mountain hikes, group Zumba, and a habit of leaving her planner
    open‑ended.
background:
  cultural: Gwen grew up in Vineyard, a suburban community in Utah County known for its close‑knit, family‑oriented atmosphere and strong appreciation for the outdoors. Her cultural upbringing blends the
    broader American suburban lifestyle with regional influences of the Intermountain West—such as a love of hiking, community service, and seasonal festivals. While the area has a significant Latter‑Day
    Saint presence, Gwen’s family practices a more secular, inclusive approach, fostering values of cooperation, personal responsibility, and respect for diverse viewpoints. These cultural threads shape
    her friendly, collaborative nature and her practical outlook on work and life.
