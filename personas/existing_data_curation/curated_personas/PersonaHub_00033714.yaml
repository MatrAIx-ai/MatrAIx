persona_description: A CERN SCADA integrator who specializes in developing and deploying applications for the LHC ventilation supervision system. They have a strong background in object-oriented technology
  and have successfully developed 1200 mimic displays and 600 objects in PcVue SCADA. They are familiar with HDS (Historical Data Server) archiving and the support of the terminal server, and have experience
  with the VMware virtual environment. They are skilled in using PcVue's configuration technology to quickly and easily develop and deploy applications for CERN. They are responsible for modifying the process
  and adjusting the resources allocated to the virtual machine when necessary. They are passionate about facilitating deployment and reducing operating costs by implementing a virtual infrastructure.
