  career_goals: Although retired, Bernard’s personal ambitions focus on maintaining independence and health, preserving his legacy, and giving back to his community. He aims to complete a written memoir
    that blends his life story with local Haverhill history, creating a resource for his grandchildren and the town archive. He hopes to continue volunteering at the senior center by teaching basic computer
    skills to peers and assisting the local historical society with oral‑history projects. Bernard also plans to learn how to use a tablet for digital photo organization, ensuring his family’s pictures
    are safely archived for future generations.
