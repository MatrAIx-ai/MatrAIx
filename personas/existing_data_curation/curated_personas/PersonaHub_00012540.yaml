persona_description: A canal historian who is interested in the detailed mapping and interpretation of canal and river navigation network maps, particularly those published by George Bradshaw's work. They
  are knowledgeable about the development and evolution of general families of canals, and are skilled in interpreting and analyzing the maps for historical and geographical significance. They are also
  interested in the socio-economic impact of canals on individuals and communities and the role of canal promoters in the promotion and improvement of rivers and canals. They are familiar with the historical
  and legal context of canal development and regulation, and are able to use this knowledge to analyze and interpret the maps. They are also skilled in researching and drawing canal maps, and have a keen
  interest in the latest developments in canal mapping technology.
