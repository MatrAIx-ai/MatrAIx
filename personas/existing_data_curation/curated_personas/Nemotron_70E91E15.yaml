personas:
  professional: Harry Clark, a 28‑year‑old flooring specialist, blends meticulous measuring and blueprint reading with a growing expertise in sustainable materials to deliver flawless carpet, tile, and
    hardwood installations, and channels their organized, reliability‑driven work ethic into a clear path toward LEED certification, master installer status, and eventually leading their own contracting
    crew.
  sports: Harry Clark spends early mornings casting a line at Lake Martin, and they practice patient fishing as a form of meditation, join a local amateur softball league in the spring, follow the Alabama
    Crimson Tide football season with a modest tailgate, and keep an eye on the Atlanta Braves for weekend baseball outings, all while maintaining a modest personal fitness routine of body‑weight exercises
    in the workshop between jobs.
  arts: Harry Clark finds creative release in the grain of wood while installing floors, often listening to the blues of B.B. King and folk storytelling of Sturgill Simpson, browsing the works of painter
    Andrew Wyeth for color inspiration, and attending occasional live performances at the local community theater, where they appreciate the nuanced acting of resident troupe members and the historical
    narratives of Southern playwrights.
  travel: Harry Clark plans travel like a job site, mapping routes and budgeting each mile, favoring low‑key road trips to historic sites such as the National Civil Rights Museum in Memphis and the ante‑bellum
    streets of Savannah, while their modest budget leads them to camp at Lake Tuscaloosa instead of pricey hotels, and they dream of a future pilgrimage to Washington, D.C.’s Smithsonian museums funded
    by saved earnings.
  culinary: Harry Clark’s kitchen is a workshop of flavors, where they grill catfish with lemon‑butter, slow‑smoke ribs using paprika, brown sugar, and locally sourced hickory chips, whip up sweet‑potato
    mash with a dash of garlic, and meticulously craft a basil‑pesto pasta whenever a new sustainable ingredient catches their eye on online forums.
  core: Harry Clark is a methodical 28‑year‑old flooring pro whose quiet curiosity drives them to perfect sustainable installations, meticulously budget every dollar, and wrestle with restless worries that
    often keep them up late.
background:
  cultural: Harry grew up in a middle‑class white Southern family in Selma, Alabama. His upbringing was shaped by the region’s strong sense of community, regular church attendance (Methodist), and a work
    ethic rooted in the local manufacturing and trade sectors. He is familiar with Southern hospitality, yet his reserved personality leads him to express it through acts of service rather than overt socializing.
    The historical legacy of Selma informs his appreciation for civil‑rights history, which he explores through reading and occasional museum visits. He values modesty, reliability, and family ties, blending
    traditional Southern values with a pragmatic, forward‑looking outlook.
attributes:
  skills: '[''Measuring and layout planning'', ''Precise cutting and fitting of carpet, hardwood, tile'', ''Surface preparation and subfloor assessment'', ''Adhesive selection and application'', ''Finishing
    techniques'', ''Blueprint and work order interpretation'', ''OSHA safety compliance'', ''Time and resource management'', ''Customer communication'', ''Conflict resolution'', ''Basic project coordination'',
    ''Knowledge of sustainable flooring materials'', ''Use of power tools and hand tools'']'
  hobbies: '[''Woodworking'', ''Reading home improvement and historical nonfiction'', ''Fishing'', ''Strategy board games'', ''Volunteering at a community garden'', ''Following sustainable building material
    trends online'']'
  career_goals: Harry aims to become a certified master installer and eventually launch his own flooring contracting business in the Greater Selma area. He plans to obtain professional certifications in
    green building (LEED) and advanced tile installation techniques. Over the next five years, he hopes to transition from a frontline installer to a foreman or project manager role, overseeing larger commercial
    projects while training apprentices. He also seeks financial stability to support a future family and is motivated to build a reputation for reliability and high‑quality craftsmanship.
