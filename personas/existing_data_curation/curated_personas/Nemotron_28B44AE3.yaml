personas:
  professional: Rita Llerandi, a 27‑year‑old elementary teacher in Holbrook, blends bilingual fluency with arts‑integrated pedagogy, designing flexible lesson plans that weave storytelling, folk art, and
    music to engage diverse learners while their relaxed attitude toward obligations sometimes leads to last‑minute grading.
  sports: Rita Llerandi, a 27‑year‑old nature enthusiast, hikes the Long Island Pine Barrens on weekends, plays co‑ed recreational soccer with a local community league, and roots for the New York Islanders
    while occasionally joining a Saturday morning yoga class for flexibility.
  arts: Rita Llerandi, a 27‑year‑old budding artist, spends evenings painting vivid scenes inspired by folk motifs, attends exhibitions at the Long Island Museum of Art and the MoMA, and finds inspiration
    in the works of Frida Kahlo, Vincent van Gogh, and contemporary muralist Maya Hayuk.
  travel: Rita Llerandi, a 27‑year‑old adventurous traveler, prefers short, budget‑friendly trips to coastal towns like Montauk and cultural festivals in Puerto Rico, dreams of exploring Oaxaca’s art markets,
    and plans trips around school holidays using student discounts.
  culinary: Rita Llerandi, a 27‑year‑old home cook, masters traditional pupusas and empanadas using masa harina, chicharrón, and fresh cheese, experiments with adding cilantro lime rice to the fillings,
    and enjoys pairing their meals with a tangy salsa verde.
  core: Rita Llerandi, a 27‑year‑old bilingual teacher, blends art, music, and community spirit into her classroom while battling a habit of last‑minute planning and a tendency to worry, finding balance
    through yoga, cooking, and spontaneous creativity.
background:
  cultural: Rita is a second‑generation Salvadoran American whose family maintains strong ties to El Salvador’s customs and language. She grew up in a bilingual household, celebrating festivals such as
    Día de los Farolitos, Semana Santa, and the Feria de la Pupusa with extended family and neighbors. These traditions have shaped her values of community solidarity, respect for elders, and a love for
    food, music, and storytelling. Living in Holbrook, Suffolk County, she navigates a multicultural environment, integrating Salvadoran cultural elements—like folk art, Latin literature, and Spanish‑language
    resources—into her teaching practice. Her cultural identity informs her commitment to inclusivity, empathy, and the empowerment of immigrant and bilingual students.
attributes:
  skills: '[''Classroom management'', ''Differentiated instruction'', ''Bilingual teaching (English‑Spanish)'', ''Arts integration'', ''Educational technology (Google Classroom, interactive whiteboards)'',
    ''Curriculum development'', ''Student counseling and mentorship'', ''Conflict resolution'', ''Community outreach'']'
  hobbies: '[''Painting and sketching'', ''Creative writing (poetry, short stories)'', ''Visiting art galleries and museums'', ''Cooking Salvadoran cuisine'', ''Listening to and dancing to Latin music'',
    ''Yoga and mindfulness meditation'', ''Hiking and nature walks'', ''Participating in community cultural festivals'', ''Reading educational theory and psychology'', ''Gardening on her balcony'']'
  career_goals: Rita aims to deepen her expertise in arts‑integrated pedagogy while completing a bachelor’s degree in Elementary Education and a subsequent master’s in Curriculum and Instruction. She envisions
    becoming a grade‑level lead teacher and eventually moving into a curriculum specialist or school leadership role where she can champion culturally responsive teaching and student mental‑health initiatives.
    Long‑term, Rita hopes to develop an after‑school program that celebrates Salvadoran cultural arts and provides mentorship for at‑risk youth in her Suffolk County community.
