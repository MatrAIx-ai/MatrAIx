    craft fairs", "Collecting vintage tool kits"]'
  career_goals: Jack aims to secure a position as a field service technician or maintenance specialist where he can apply his technical aptitude and systematic work ethic. Within the next five years, he
    plans to earn a bachelor's degree in engineering technology while gaining certifications in HVAC and CNC machining. Ultimately, he aspires to launch his own small‑scale repair and fabrication business
    that serves the Warren County community, allowing him to combine his competitive drive with entrepreneurial independence.
