persona_description: A college counselor who is interested in reforming the college admissions process and exploring alternative methods of measuring intelligence and academic success. This person has a
  background in psychology and psychometrics and is familiar with the use of standardized tests in college admissions. They are also interested in exploring the potential benefits of using tests of creativity,
  practical skills, and wisdom-based skills to predict academic success and extracurricular activity participation. This person is also interested in reading about the latest developments in college admissions
  and reforming practices, such as going test-optional.
