  career_goals: Although retired, Thao aims to remain an active contributor to her community by establishing a neighborhood community garden, mentoring younger volunteers in event planning and technology,
    documenting and publishing her family’s genealogy, and writing a memoir that weaves her personal story with the broader African American experience in the South. She also wishes to lead workshops on
    healthy cooking and wellness for seniors, reinforcing her lifelong commitment to practical, curiosity‑driven service.
