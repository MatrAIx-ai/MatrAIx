personas:
  professional: Bettie Herrera, a budding LEGO architect, channels a natural love for structure and predictability into meticulously planned brick constructions, often drafting blueprints on notebook paper
    before building, and they take pride in completing each set exactly as instructed while offering to help classmates organize their play stations.
  sports: Bettie Herrera energetically rides a pink balance bike around the local park, joins the community’s junior soccer practice on Saturdays, cheers for the hometown baseball team, the Tigers, during
    family outings, and they enjoy climbing the playground’s rope ladder as a mini-adventure.
  arts: Bettie Herrera spends afternoons drawing detailed wildlife scenes inspired by nature documentaries, colors pages featuring Disney’s Mickey Mouse and the characters from "Adventure Time", collects
    stickers of cartoon heroes, and they twirl in weekly ballet class, idolizing the graceful ballet dancer from "The Nutcracker" performed by the local children's theater.
  travel: Bettie Herrera loves family trips to the beach in Myrtle Beach, the bright lights of Disneyland in California, and weekend visits to a nearby state park where they explore nature trails on a mini-hike,
    preferring carefully planned itineraries with ample time for sandcastle building and a scheduled snack break.
  culinary: Bettie Herrera enjoys mixing cookie batter with their mom, favoring classic chocolate chip cookies made with butter, brown sugar, and vanilla extract, also loves homemade macaroni with cheddar,
    and delights in painting fruit salad with strawberries, blueberries, and kiwi slices, though they sometimes sneak extra sprinkles onto the cookies.
  core: Bettie Herrera blends a love for order and creative play, building flawless LEGO models, saving pennies for stickers, and they balance a busy schedule of biking, ballet, and cookie-mixing while
    occasionally leaving a sticky trail of cookie crumbs.
background:
  cultural: Bettie Anne lives in Kernersville, North Carolina, a small community in the Piedmont region. Her family embraces Southern traditions, attending a local Baptist church where she participates
    in Sunday school. She celebrates holidays like Halloween, Thanksgiving, and Christmas with community events and family gatherings that feature traditional Southern foods such as biscuits, fried chicken,
    and pumpkin pie. Frequent visits to the public library’s story hour, participation in school activities, and the close‑knit atmosphere of the town shape her cultural upbringing.
