  career_goals: Bettie Anne dreams of becoming someone who helps others. She often says she wants to be a teacher so she can share stories and help kids learn, or a veterinarian to care for animals. She
    also enjoys the idea of being a baker, imagining herself making cupcakes for her family. Her ambition is to stay curious, do well in school, and grow into a caring adult who contributes to her community.
