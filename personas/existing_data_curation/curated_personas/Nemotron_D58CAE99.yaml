  hobbies: '[''Dance Classes'', ''Zumba Fitness'', ''Karaoke Nights'', ''Food Bank Volunteering'', ''Animal Shelter Volunteering'', ''Bullet Journaling'', ''Hiking Trails'', ''Beach Walks'', ''DIY Crafting'',
    ''Cooking for Friends'']'
  career_goals: Brenda aims to pursue a certificate in health-services administration at a community college within the next year, followed by a part-time role in a local community health clinic or non-profit
    organization. In the medium term, she plans to earn an associate degree and gain experience as a program assistant, focusing on youth and senior outreach programs. Her long-term ambition is to obtain
    a bachelor's degree in public health or social work and become a community outreach coordinator, designing and leading initiatives that promote wellness and support vulnerable populations in Jacksonville.
