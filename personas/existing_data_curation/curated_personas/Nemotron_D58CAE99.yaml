personas:
  professional: Brenda Fulford, a volunteer coordinator at the Jacksonville Food Bank, blends her meticulous organizational skills, reliable time-management, and compassionate mediation abilities to orchestrate
    donation drives and adoption events with a pragmatic, stress-resilient approach.
  sports: Brenda Fulford fuels her love of movement through weekly Zumba classes, sunrise hikes at the Timucuan Preserve, weekend beach walks, and cheers for the Jacksonville Jaguars at stadium gatherings
    while occasionally rooting for the Orlando Magic.
  arts: Brenda Fulford immerses herself in the arts by leading karaoke nights featuring Ariana Grande and Beyoncé, crafting DIY décor inspired by Andy Warhol’s pop art, and attending Jacksonville’s annual
    Riverside Arts Market to support local musicians like Johnny Mays.
  travel: Brenda Fulford favors short, well-planned road trips—she’s already explored historic St. Augustine and Savannah, and she dreams of an eco-adventure in Costa Rica’s rainforests, always mapping
    itineraries in her bullet journal before the voyage.
  culinary: Brenda Fulford enjoys cooking for friends, often preparing shrimp scampi with garlic, lemon, and parsley, experimenting with tropical mango salsa, and perfecting her avocado toast crowned with
    crushed red pepper and feta, although she sometimes over-spices in her enthusiasm.
  core: Brenda Fulford turns community initiatives into meticulously run, high-energy experiences, driven by an unwavering practical streak, a love of group fun, and a slight tendency to over-plan and hoard
    craft supplies.
background:
  cultural: Brenda was raised in a suburban neighborhood of Jacksonville, Florida, in a family of European (primarily English and Irish) ancestry. Her upbringing reflects Southern hospitality and a strong
    emphasis on community involvement, with frequent participation in church gatherings, local festivals such as the Jacksonville Jazz Fest, and neighborhood block parties. The coastal Floridian lifestyle
    has instilled in her an appreciation for outdoor activities and a multicultural awareness, while family traditions celebrate holidays like Thanksgiving and Christmas with a blend of Southern and coastal
    customs.
attributes:
  skills: '[''Organizational Planning'', ''Event Coordination'', ''Customer Service'', ''Microsoft Office Suite'', ''Google Workspace'', ''First Aid/CPR'', ''Volunteer Management'', ''Team Collaboration'',
