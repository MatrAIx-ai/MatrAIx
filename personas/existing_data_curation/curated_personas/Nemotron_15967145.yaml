personas:
  professional: Juan Armogan is a retired educator turned community archivist; they leverage bilingual storytelling, meticulous event coordination, and a love for oral histories to preserve local immigrant
    narratives and mentor youth volunteers.
  sports: Juan Armogan follows the New York Mets in baseball and the New York Knicks in basketball, participates in the Hudson Valley Senior Hiking Club’s seasonal trail walks, and prefers low‑impact cardio
    over competitive sports, occasionally joining a local pickleball league.
  arts: Juan Armogan volunteers at a community theater, enjoys the music of Celia Cruz, Tito Puente, and Louis Armstrong, and spends evenings watching classic films like Casablanca while discussing literary
    works from Latin American authors with their book club.
  travel: Juan Armogan favours organized group tours that blend cultural immersion with relaxation, having explored the historic streets of Cartagena, the vineyards of the Hudson Valley, and dreaming of
    a return trip to the Caribbean island of their ancestors to reconnect with family roots.
  culinary: Juan Armogan excels at preparing sancocho, mangú, and pastelitos, skillfully blending plantains, yucca, and a medley of spices, and enjoys sharing these home‑cooked meals at neighborhood potlucks
    and family gatherings.
  core: Juan Armogan is a charismatic, methodical senior who channels curiosity into preserving community heritage, balancing diligent planning with a love for lively gatherings, garden toil, and soulful
    music.
background:
  cultural: Juan was born in the Dominican Republic and immigrated to the United States as a young adult, bringing with him a deep appreciation for Dominican customs, music, and cuisine. He maintains strong
    familial ties, regularly communicating with relatives across the Atlantic and celebrating traditional holidays such as Día de los Santos and Carnaval with a blend of Dominican and American practices.
    His Catholic faith, enriched by vibrant community rituals, informs his sense of service and fellowship. While fully integrated into the Cold Spring, NY community—participating in local events, volunteering,
    and embracing the Hudson Valley’s outdoor culture—Juan remains a proud steward of his heritage, sharing stories, recipes, and music with neighbors and preserving the cultural bridge between his Caribbean
    roots and his American home.
