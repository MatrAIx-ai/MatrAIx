  hobbies: '[''Reading Latin American literature'', ''Writing memoirs and poetry'', ''Playing dominoes and card games'', ''Cooking traditional Dominican dishes'', ''Hiking in Hudson Highlands'', ''Community
    theater involvement'', ''Photography of nature and cultural events'', ''Organic gardening'', ''Listening to merengue, salsa, and jazz'', ''Volunteering at local senior center'']'
  career_goals: Although retired, Juan is driven to leave a lasting cultural legacy. He plans to document and archive the stories of Dominican immigrants in the Hudson Valley, eventually publishing a community
    memoir that blends oral histories with his own reflections. He hopes to establish a small scholarship fund for local students of Dominican heritage to pursue higher education in the humanities. Juan
    also aims to lead workshops on oral‑history techniques at the community center, mentor youth volunteers, and expand the neighborhood garden he helps maintain. On a personal level, he looks forward to
    traveling with his wife to the Dominican Republic to reconnect with extended family, while continuing to prioritize his health through regular walks and gardening.
