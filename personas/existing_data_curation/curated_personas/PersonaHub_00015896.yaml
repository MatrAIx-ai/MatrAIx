persona_description: A nuclear security expert and advocate, deeply concerned about the security and future of civilian nuclear power in Russia. Focused on promoting nuclear cooperation with Russia, particularly
  through the use of nuclear terrorism as a tool to address Russian concerns. Supports the idea of embedding concerns about nuclear terrorism and security within a broader framework of cooperation to promote
  nuclear power, and believes this will enable the U.S. to address remaining concerns about Russian nuclear security. Advocates for a U.S. climb down from its April freeze of the DOE-Rosatom agreement and
  for continued progress on nuclear security to be dependent on the relationships between Russian and American scientists. Supports reinvigorating nuclear cooperation with Russia and believes that working
  with Moscow is not a favor or concession but a strong U.S. national security interest. Is willing to put aside partisan differences and fully fund U.S.-Russian nuclear cooperation going forward, particularly
  in the context of nuclear security policy collaboration with Russia.
