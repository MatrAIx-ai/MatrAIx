personas:
  professional: Joel Ohara is an 18‑year‑old retail shift manager who blends disciplined staff scheduling and inventory analytics with a keen eye for visual branding, using Excel dashboards and point‑of‑sale
    data to streamline operations while sketching promotional graphics that reflect their love for urban landscapes and Japanese design motifs, and their calm, cooperative demeanor keeps team conflicts
    low even as they worry about meeting high standards.
  sports: Joel Ohara supports the Cleveland Browns and the Cincinnati Bengals, belts out chants at occasional games, participates in a local weekend running club that meets at the Hancock County park trail
    and joins informal pickup basketball games at the community center, preferring moderate cardio to high‑intensity weightlifting, and they keep a casual membership at the Findlay YMCA where they stretch
    after shifts to combat stress.
  arts: Joel Ohara immerses themselves in creative expression by sketching Midwestern cityscapes on notebook margins, drawing inspiration from Japanese ukiyo‑e artist Hiroshige and indie folk singer Sufjan
    Stevens, curating playlists featuring Bill Evans and Bon Iver while editing digital illustrations in Procreate for the local retail’s seasonal flyers, and they attend the Findlay Art Museum’s exhibit
    on contemporary ceramics each month.
  travel: Joel Ohara dreams of weekend road trips that blend small‑town charm with cultural depth, having already visited Chicago’s Art Institute, taken a day tour of Amish country in Ohio, and planning
    a future summer backpacking segment through Kyoto’s historic tea houses and design studios, all while balancing a modest travel budget that favors affordable Airbnb stays and student discounts.
  culinary: Joel Ohara enjoys farm‑to‑table comfort foods like homemade chicken‑fried steak and corn‑bread, experiments with sushi rolls featuring tuna, avocado, and pickled ginger at home, perfects a simple
    miso‑soup broth for cold evenings, and while their cooking skill is intermediate, they often order a specialty latte with oat milk at the local café to fuel late‑night sketching sessions.
  core: Joel Ohara is an organized, art‑obsessed teen manager who worries about perfection, balances retail duties with sketchbooks and guitar strings, and turns anxiety into daily journals and community
    volunteerism.
background:
  cultural: Joel grew up in Findlay, Ohio, a predominantly white, Midwestern small‑town environment where community, self‑reliance, and modesty are valued. His family emphasizes hard work, education, and
    civic involvement, often participating in local volunteer projects and town festivals. While his ethnic background is white, the Japanese surname ‘Ohara’ reflects a familial appreciation for multicultural
    heritage, which has sparked his interest in Asian art and design. The regional culture, combined with exposure to local art programs at his high school, has shaped his polite, cooperative demeanor and
    his respect for both tradition and innovative thinking.
attributes:
  skills: '["Retail management", "Team leadership", "Inventory control", "Customer service", "Time management", "Project planning", "Art appreciation", "Digital illustration", "Research and analysis", "Conflict
