  hobbies: '["Sketching", "Visiting art museums", "Reading non-fiction", "Playing acoustic guitar", "Photography", "Journaling", "Puzzle solving", "Volunteering at community events"]'
  career_goals: Joel intends to leverage his hands‑on managerial experience to pursue a degree in business administration with a focus on arts management. In the short term, he aims to become an assistant
    manager and then a full store manager at a larger regional retailer. Long‑term, he dreams of opening a community art gallery combined with a café where he can merge his business acumen with his passion
    for art, fostering a creative hub in Findlay. He also plans to develop leadership certifications and attend workshops on stress‑management to counter his tendency toward worry.
