persona_description: A forensic scientist who specializes in the analysis of blood spatter patterns and blood spatter evidence. They have extensive experience in using blood spatter analysis to determine
  the cause of death, the sequence of events leading up to the incident, and the perpetrator's motive. They are skilled in collecting, analyzing, and interpreting blood spatter patterns and are adept at
  using their knowledge of the anatomy of the human body to determine the angle and direction of the blood droplets. They have a keen eye for detail and are able to accurately identify the type of object
  used in the attack and the position of the victim, suspect, and objects during the events leading up to the incident. They are also skilled in determining the minimum number of blows required to create
  the blood spatter patterns and are able to accurately determine the sequence of events leading up to the incident.
