  career_goals: Yong aims to leverage his administrative strengths and creative interests to transition into a role that bridges office management and arts programming. Over the next three years, he plans
    to pursue an associate degree in Business Administration while taking courses in Arts Administration. He aspires to become a senior executive assistant or office manager at a cultural nonprofit or museum
    that highlights Asian American art, eventually moving into a project‑lead position overseeing exhibitions, community outreach, and fundraising events. He also intends to obtain a Certified Administrative
    Professional (CAP) credential and, long‑term, a Project Management Professional (PMP) certification to broaden his leadership capabilities.
