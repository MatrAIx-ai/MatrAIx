personas:
  professional: Yong Woo is an office administrator with a flair for visual communication, seamlessly blending meticulous calendar management and confidential document handling with modest Adobe Photoshop
    and Illustrator designs that brighten internal newsletters, while their methodical mindset and imaginative curiosity make them the go‑to problem‑solver in a fast‑paced cultural nonprofit environment.
  sports: Yong Woo enjoys low‑impact fitness, clocking weekly jogs along the Lakefront Trail and joining a casual amateur ultimate frisbee league in the summer, while cheering for the Chicago Bulls and
    the Chicago Cubs as their hometown professional teams, reflecting a relaxed but consistent approach to staying active.
  arts: Yong Woo spends evenings crafting abstract digital illustrations inspired by the surrealism of Remedios Varo and the glitch aesthetics of Beeple, curates a private blog of reflective essays referencing
    philosophers like Kant and sci‑fi authors such as Octavia Butler, and regularly attends gallery openings featuring emerging Asian‑American artists and indie film screenings spotlighting directors like
    Ryusuke Hamaguchi.
  travel: Yong Woo prefers purposeful travel, planning solo weekend getaways to culturally rich cities like Kyoto and Berlin to sketch street scenes and sample local art cafés, while budgeting carefully
    after each trip to fund upcoming visits to the Museum of Modern Art in New York and the contemporary art district of Seoul.
  culinary: Yong Woo is an enthusiastic home chef who perfects kimchi fermentation using napa cabbage, Korean chili flakes, and fish sauce while also experimenting with quinoa bowls, miso ramen, and hand‑rolled
    sushi, and they indulge in occasional upscale dining at pop‑up bistro events that showcase experimental fusion cuisine.
  core: Yong Woo blends meticulous organization with boundless imagination, turning every spreadsheet into a canvas and every coffee break into a moment of quiet sketching, all while juggling a habit of
    late‑night blog posts and a tendency to over‑schedule their own free time.
background:
  cultural: Born to Korean immigrant parents in Chicago’s Albany Park neighborhood, Yong grew up navigating a bicultural environment that blended Korean traditions with the multicultural fabric of the city.
    He celebrates Korean holidays such as Chuseok and Seollal with his family, speaks fluent Korean at home, and participates in the local Korean community center’s language and cultural programs. At the
    same time, exposure to Chicago’s vibrant art scene, diverse neighborhoods, and public libraries fostered his curiosity about global cultures and contemporary art. This dual heritage informs his work
    ethic—valuing diligence, respect, and collective harmony—while also fueling his appreciation for abstract creativity and cross‑cultural dialogue.
