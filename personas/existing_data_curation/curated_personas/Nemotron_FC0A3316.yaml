  career_goals: Ranna aims to advance to a regional director role where he can shape multi‑store operations across South Florida, while also establishing a consulting practice that helps small businesses
    integrate cultural programming into their customer experience. He is passionate about creating a community arts hub in Lake Worth that offers workshops, exhibitions, and mentorship for emerging Black
    artists. Over the next decade, he hopes to be recognized as a leader in inclusive business practices and to mentor the next generation of managers from underrepresented backgrounds.
