personas:
  professional: Ranna Joyner, a disciplined operations manager with 25 years of experience, they leverage strategic planning, meticulous workflow optimization, and creative problem‑solving to elevate multi‑store
    performance across South Florida while channeling a curious appreciation for the arts into collaborative vendor negotiations and community‑focused initiatives.
  sports: Ranna Joyner, an energetic community volunteer, they coach the Lake Worth Strikers youth soccer team, join the Lake Worth Beach Runners for sunrise beach runs, and avidly follow the Miami Heat,
    Miami Dolphins, and Miami Marlins, integrating disciplined weekly training with sociable team events and occasional participation in local triathlons.
  arts: Ranna Joyner, a devoted patron of the local arts scene, they curate informal pop‑up exhibitions featuring emerging artists from diverse backgrounds, frequent galleries such as the Norton Museum
    and the Palm Beach Contemporary Arts Center, capture street art and coastal murals through photography inspired by the works of Banksy and Kehinde Wiley, and immerse themselves in community drum circles
    and performance art events that satisfy a curious, organized, and sociable spirit.
  travel: Ranna Joyner, a curious traveler who favors meticulously planned itineraries, they regularly attend cultural festivals like the Rio Carnival, New Orleans Mardi Gras, and the Key West Literary
    Seminar, have explored destinations such as Barcelona, Marrakech, and Havana, and dream of photographing sunrise over Bali’s rice terraces while balancing a modest travel budget with occasional splurges
    on art‑centric experiences.
  culinary: Ranna Joyner, an adventurous home chef, they expertly blend Caribbean and Southern flavors—preparing dishes like jerk‑spiced chicken with mango salsa, shrimp and grits with Andouille sausage,
    and collard greens simmered with smoked turkey—while experimenting with scotch bonnet peppers, sweet potatoes, and coconut milk, and enjoy occasional dining outings at Joe’s Stone Crab and local farm‑to‑table
    bistros.
  core: Ranna Joyner, a disciplined yet curious operations leader, they fuse a passion for community arts, vibrant cooking, and active outdoor pursuits into a calm, resilient, and socially driven lifestyle.
background:
  cultural: Ranna identifies as African American with deep roots in the Black diaspora of the southeastern United States and Caribbean influences from his parents, who immigrated from Jamaica in the 1970s.
    Growing up in the vibrant multicultural neighborhoods of Palm Beach County, he was immersed in a blend of Southern soul, Caribbean rhythms, and the thriving art community of Lake Worth. This upbringing
    fostered a strong sense of pride in Black cultural heritage, especially the contributions of African American artists, musicians, and entrepreneurs. Ranna actively participates in local heritage events,
    supports Black-owned businesses, and mentors young professionals, applying his cultural perspective to foster inclusive and creative environments both at work and in his community.
