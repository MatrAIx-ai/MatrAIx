personas:
  professional: Charday Lewis is a preschool storyteller who transforms everyday play into imaginative narratives, showing early flair for visual storytelling and collaborative problem‑solving that hints
    at a future career in illustration or design.
  sports: Charday Lewis dabbles in toddler soccer with the Little Explorers FC, loves splash‑time at the community pool, and proudly sports a Los Angeles Lakers jersey while cheering for the team’s Saturday
    night games.
  arts: Charday Lewis devotes afternoons to drawing whimsical creatures inspired by Sesame Street’s Elmo, humming the Wiggles’ ‘Fruit Salad’, and reenacting scenes from Disney’s Moana, with a favorite crayon
    set that includes glitter gold.
  travel: Charday Lewis has visited the local zoo, squealed with delight at Disneyland’s Fantasyland, and dreams of seeing the Grand Canyon’s vast vistas and the bright lanterns of Tokyo’s Shinjuku district
    on the next family adventure.
  culinary: Charday Lewis prefers mac and cheese with extra cheddar, delights in peanut butter‑banana sandwiches, and enjoys pretending to stir a pot of carrot soup while carefully sprinkling a dash of
    cinnamon on their oatmeal.
  core: Charday Lewis is a four‑year‑old imagination engine who flits between glitter‑stuck art projects, impromptu soccer scrimmages, and heartfelt hugs, all while meticulously guarding a piggy bank of
    shiny coins.
background:
  cultural: Charday grows up in a close‑knit Black family in West Philadelphia, where community and cultural heritage are central to daily life. Her family celebrates traditions such as Kwanzaa and Juneteenth,
    shares soulful music—from gospel choirs to classic jazz—and enjoys home‑cooked meals like collard greens, cornbread, and seasonal vegetables. Frequent visits to the neighborhood library, local churches,
    and community art programs expose her to storytelling, music, and visual arts. The rich cultural history of Philadelphia and the vibrant artistic scene inspire her love for creative expression and her
    compassionate, cooperative spirit.
