  career_goals: Charday dreams of growing up to be someone who brings joy and color to the world. She imagines becoming an artist who paints bright pictures for friends, a teacher who reads stories and
    encourages curiosity in other children, or a community helper who spreads kindness and makes people feel safe. She is fascinated by the idea of creating imaginative, vibrant worlds and helping others
    experience the same wonder she feels.
