  hobbies: '[''Attending art exhibitions'', ''Salsa dancing'', ''Community dance circles'', ''Gardening'', ''Cooking traditional and experimental dishes'', ''Reading interdisciplinary literature'', ''Hiking
    in the mountains'', ''Participating in science discussion groups'', ''Volunteering at community centers'', ''Traveling to historic sites in Puerto Rico'']'
  career_goals: Laura aims to stay actively engaged in sharing her knowledge and passion for both science and the arts. Her primary goals include mentoring a new generation of girls in STEM through informal
    workshops, authoring a memoir that chronicles her journey as a Puerto Rican woman in a male‑dominated field, and creating multidisciplinary community programs that blend scientific inquiry with artistic
    creation. She also aspires to serve as a docent at the local cultural museum, advocate for increased representation of Latina women in STEM policy circles, and continue traveling across Puerto Rico
    to document and celebrate local oral histories and traditional practices.
