  hobbies: '[''Salsa and Bachata Dancing'', ''Cooking Mexican and Fusion Cuisine'', ''Hiking in Sierra Foothills'', ''Gardening'', ''Volunteering at Community Center'', ''Reading Personal Development Books'',
    ''Attending Cultural Festivals'']'
  career_goals: Rosalia aims to formalize her business knowledge by completing a bachelor's degree in Business Administration and obtaining a Project Management Professional (PMP) certification. She envisions
    moving into a regional director role for a nonprofit that supports agricultural workers and their families, where she can apply her managerial skills to design sustainable programs. Additionally, she
    hopes to launch a mentorship network for Mexican-American women in the Central Valley, fostering career development and community leadership. Her long-term ambition blends professional advancement with
    giving back to her cultural community, all while maintaining a flexible work environment that mirrors her own values.
