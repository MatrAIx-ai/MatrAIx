  career_goals: He hopes to enroll in a specialized high‑school arts program or a magnet school focused on digital media, eventually studying interactive design or game development at a university. He dreams
    of becoming a concept artist and narrative designer for video games or animated films, creating original worlds and characters that blend his love for novelty and abstract ideas. He also envisions launching
    an indie game studio with friends, producing games that encourage creativity and collaborative play, and mentoring younger students through art workshops and cultural events in his community.
