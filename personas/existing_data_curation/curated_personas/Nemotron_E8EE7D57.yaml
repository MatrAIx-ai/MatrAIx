personas:
  professional: Byung Sun is an aspiring digital comic creator who blends sketching, animation, and storytelling into interactive Minecraft narratives, wielding a tablet and vivid imagination while navigating
    school projects with a relaxed, somewhat disorganized work style.
  sports: Byung Sun spends weekends at the local skate park mastering street tricks, cheers on the city’s high school basketball team, the Tigers, and occasionally joins the after‑school soccer club, balancing
    high‑energy skate sessions with a laid‑back approach to fitness that favors fun over structured training.
  arts: Byung Sun immerses themselves in creative expression by sketching characters inspired by indie game artists like Toby Fox, listening to electronic producer Porter Robinson and K‑pop group BTS while
    designing sets for the drama club, and volunteering at cultural festivals to showcase traditional paper‑cutting crafts.
  travel: Byung Sun dreams of backpacking through Kyoto’s historic temples and Seoul’s neon districts, prefers spontaneous day trips to nearby national parks over meticulously planned tours, and has already
    taken a school field trip to the Grand Canyon, savoring the mix of adventure and visual storytelling.
  culinary: Byung Sun enjoys noodling with spicy ramen and kimchi‑fried rice, can whip up a decent homemade sushi roll with avocado and cucumber despite limited kitchen skills, and often grabs bubble tea
    with tapioca pearls after late‑night art sessions.
  core: Byung Sun is a kaleidoscopic teen who juggles comic sketches, skate tricks, and sudden bursts of anxiety, thriving on improvisation but often misplacing sketchbooks and forgetting to charge their
    tablet.
background:
  cultural: Byung Ok Sun is a second‑generation Korean American raised in Brentwood, California. His family maintains cultural traditions such as celebrating Lunar New Year and Chuseok, preparing Korean
    dishes like kimchi and bulgogi, and speaking Korean at home. Growing up in a multicultural suburb of the Bay Area, he is also exposed to a wide array of American and Pacific‑Northwest cultural influences.
    This blend of Korean heritage and Californian lifestyle shapes his worldview, giving him a respect for family ties and community while encouraging openness to new ideas and artistic experimentation.
