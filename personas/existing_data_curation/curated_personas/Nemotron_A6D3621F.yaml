personas:
  professional: Adela Jeffrey, a 13‑year‑old budding visual storyteller, merges traditional sketching of historic architecture with digital illustration tools, channeling their curiosity into freelance
    commissions for school newsletters while wrestling with a penchant for last‑minute deadlines.
  sports: Adela Jeffrey dashes around the local park on Saturday afternoons, playing forward for the neighborhood’s under‑13 soccer squad while cheering for Club América and the national women's team during
    televised matches.
  arts: Adela Jeffrey devotes evenings to sketching the city’s baroque churches, draws inspiration from watercolorist Winslow Homer, digital illustrator Loish, and graphic novel series Monstress, and curates
    an Instagram blog that showcases murals by local street artists like Maya Torres.
  travel: Adela Jeffrey loves wandering through Rome’s ancient piazzas, snapping photos of frescoed walls on school trips to Florence, and dreams of a summer backpacking adventure across the historic lanes
    of Barcelona’s Gothic Quarter.
  culinary: Adela Jeffrey helps their grandmother bake pan de muerto, a sweet bun dusted with orange‑zest sugar, and experiments with mixing chocolate and cinnamon into a unique mole‑inspired frosting for
    cupcakes.
  core: Adela Jeffrey is a curious 13‑year‑old art enthusiast who juggles sketchbooks, soccer kicks, and a sweet tooth, often forgetting to organize tasks but always chasing the next vibrant hue.
background:
  cultural: Adela grows up in Roma, a historic border town in Starr County, Texas, where Mexican and Texan cultures intersect daily. Her family speaks Spanish at home and celebrates Mexican holidays such
    as Día de los Muertos, Cinco de Mayo, and the local Charro Days festival, while also embracing the broader American school environment. The town's famed mural district and the legacy of artist Ricardo
    R. Leyva inspire her appreciation for community art. Her Catholic upbringing, family closeness, and the bilingual, bicultural atmosphere give her a strong sense of identity that blends Mexican traditions
    with American experiences.
