  career_goals: Adela dreams of turning her love for art and her Mexican heritage into a career as a visual storyteller. She hopes to study graphic design or mural art in high school and eventually create
    public artworks that celebrate her community's stories. She also imagines becoming a teacher or workshop leader, sharing her techniques with younger kids and using art to bridge cultural gaps. Her short‑term
    goal is to build a sturdy portfolio by contributing to school art shows and local community festivals.
