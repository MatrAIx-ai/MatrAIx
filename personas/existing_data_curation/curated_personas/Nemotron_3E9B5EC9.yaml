personas:
  professional: An aspiring multimedia technician, Gerome Payne leverages self-taught JavaScript, video-editing, and beat-making skills to freelance on gaming highlights and local content creator projects,
    while they channel their laid-back yet competitive nature to prove themselves despite occasional disorganization and a preference for working solo.
  sports: An avid skateboarder and pickup basketball player, Gerome Payne drops into the downtown skate park with the 'Street Flow Crew' and joins Friday night 5-on-5 games at the community center, cheering
    on the Los Angeles Lakers, while they also stream competitive matches for Team Liquid's CS:GO squad when time permits.
  arts: Gerome Payne fuses hip-hop beats inspired by J Dilla with graffiti tags reminiscent of classic street art legends, spends evenings remixing tracks in FL Studio while sketching stencil designs on
    notebook covers, and they draw creative fuel from sci-fi authors like William Gibson and documentaries such as 'The Social Dilemma'.
  travel: Gerome Payne prefers short-term road trips to graffiti-rich cities like Berlin and Tokyo, often pooling money with friends for budget hostels near Akihabara, while they balance a love for urban
    culture with an eye on affordable travel, dreaming of a solo backpack adventure through the American Southwest's desert art installations.
  culinary: Gerome Payne gravitates toward spicy ramen and street-style tacos, often improvising a kitchen jam session by sautéing garlic shrimp with hot sauce while mixing a beat, and they routinely order
    late-night pizza topped with extra pepperoni to fuel late-night coding marathons.
  core: A restless 17-year-old named Gerome Payne merges urban street culture, DIY tech tinkering, and a competitive edge into a life fueled by skate sessions, beat-making, and budget-tight hustle, while
    they wrestle with disorganization and stress-driven habits.
background:
  cultural: Gerome grew up as a Black teenager in South Los Angeles, a neighborhood steeped in West Coast hip‑hop, street art, and basketball culture. His family traces its roots to the Great Migration,
    and he was raised with a strong sense of community and resilience. Local icons—pioneering graffiti crews and LA rap legends—shaped his aesthetic sensibilities and love for rhythm. The multicultural
    fabric of Los Angeles, where African‑American, Latino, and Asian communities intersect, exposed him to a variety of languages, cuisines, and artistic expressions. Despite systemic challenges, Gerome
    takes pride in his heritage, celebrating African‑American history during Juneteenth and supporting youth initiatives that empower Black youth through technology and the arts.
attributes:
  skills: '["basic computer troubleshooting", "introductory programming (JavaScript, game modding)", "video editing (DaVinci Resolve)", "beat making (FL Studio)", "graffiti art (spray paint techniques)",
    "skateboarding", "street basketball", "automotive maintenance (oil changes, brake inspections)", "DIY electronics (Arduino projects)"]'
  hobbies: '["online multiplayer gaming", "streaming gameplay", "skateboarding", "beat making (FL Studio)", "graffiti art", "reading science-fiction", "watching tech documentaries", "small-group basketball",
    "DIY electronics projects"]'
  career_goals: Gerome aims to turn his self‑taught technical and creative skills into a sustainable career. In the short term, he plans to earn his GED and enroll in a community‑college program offering
    certificates in IT support and digital media production. He envisions working as a junior game‑development technician or a freelance video editor for local content creators, leveraging his gaming and
    editing experience. Long‑term, Gerome aspires to launch an independent multimedia studio where he can produce music, short films, and interactive digital experiences that reflect his urban roots. He
    also hopes to secure an apprenticeship in automotive repair to provide a steady income while building his creative venture.
