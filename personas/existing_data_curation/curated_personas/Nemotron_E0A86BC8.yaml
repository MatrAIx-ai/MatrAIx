  career_goals: Lindsay aims to earn advanced certification in industrial coating systems within the next two years, positioning herself for a foreman role on larger commercial contracts. She aspires to
    eventually launch her own painting business that combines high‑quality surface finishing with custom mural and artistic services, reflecting her love for art and community beautification. In parallel,
    she plans to mentor apprentices, offering on‑the‑job training and guidance, and to volunteer her expertise for local non‑profit projects such as school building renovations. Long‑term, she hopes to
    achieve financial stability that will allow her to fund community art initiatives and perhaps take part‑time classes in visual arts to deepen her creative practice.
