  career_goals: Donny aims to transition from freelance graphic design to a senior art director role where he can guide brand strategy while preserving his flexible schedule. He aspires to launch a boutique
    design studio focused on sustainable, purpose‑driven brands, blending his business acumen with his creative skill set. In the next five years he wants to secure stable, high‑value contracts that reduce
    financial stress, mentor emerging designers in a collaborative yet low‑pressure environment, and develop deeper UI/UX expertise to offer end‑to‑end digital solutions. Personal well‑being is a priority,
    so he also seeks to embed regular self‑care routines into his professional life to manage worry and stress.
