personas:
  professional: Donny Leigh is a 34‑year‑old freelance graphic designer proficient in the Adobe Creative Suite, Figma and Sketch, who blends strong typography and visual identity skills with a business‑savvy
    approach, aiming to transition into a senior art director role while eventually launching a boutique studio focused on sustainable, purpose‑driven brands, all while preferring flexible schedules that
    accommodate their solitary creative flow.
  sports: Donny Leigh finds fitness in solitary pursuits, regularly hiking quiet trails around Spencer and joining the local Trailblazers hiking club, supports the Boston Red Sox, Boston Celtics, and New
    England Patriots from afar, and occasionally sneaks in a weekend bike ride on the Blackstone River path to clear their mind.
  arts: Donny Leigh immerses themselves in visual arts through digital illustration, analog sketching, and woodworking, draws inspiration from designers like David Carson and Paula Scher, illustrators such
    as Shaun Tan, and listens to ambient composers like Brian Eno while delighting in classic science‑fiction novels by William Gibson and design theory texts by Robert Bringhurst.
  travel: Donny Leigh prefers low‑key, nature‑focused travel, having trekked the Appalachian Trail sections near Georgia, photographed sunrise birds at Acadia National Park, and dreaming of a quiet retreat
    in Iceland’s volcanic landscapes, always planning trips with a detailed itinerary yet leaving plenty of unstructured time for spontaneous sketching.
  culinary: Donny Leigh enjoys simple, garden‑to‑table meals, frequently preparing roasted beet and kale salads tossed with toasted walnuts and feta, perfecting a sourdough starter for artisanal bread,
    and occasionally cooking a miso‑glazed tofu stir‑fry that showcases their love for fresh, seasonal ingredients.
  core: Donny Leigh is a solitary‑driven, anxiety‑prone designer who balances meticulous creativity with a habit of disorganized flexibility, channeling worries into mindfulness and nature.
background:
  cultural: Donny grew up in a small Midwestern town in Iowa, rooted in a white Anglo‑American, largely Lutheran community. His upbringing emphasized self‑reliance, modesty, and a strong work ethic tied
    to the agricultural rhythms of Clay County. Traditional county fairs, local church gatherings, and a love for practical, straightforward communication shaped his worldview. While he values these modest,
    community‑focused traditions, his exposure to online design culture and his business education have broadened his perspective, allowing him to blend rural Midwestern values with contemporary creative
    and entrepreneurial influences.
