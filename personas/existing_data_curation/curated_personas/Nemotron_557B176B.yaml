  career_goals: She aims to create an intergenerational art mentorship program that connects senior artists with local school students, curate a traveling exhibition of East Asian folk art for the Madison
    area, publish a memoir reflecting her cultural journey and artistic insights, and secure ongoing funding to support a community arts space for seniors. Additionally, she hopes to continue volunteering
    as a docent at the Wisconsin Historical Museum and to mentor emerging curators through informal workshops.
