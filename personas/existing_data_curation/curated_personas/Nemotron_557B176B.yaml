personas:
  professional: Vy Chang, a seasoned museum curator and art historian with decades of bilingual communication, grant writing, and digital archiving expertise, leverages their curiosity and balanced blend
    of organization and flexibility to design inclusive community workshops, mentor emerging curators, and spearhead an intergenerational art mentorship program that bridges senior artists with local schools
    while they assertively secure sustainable funding for senior arts spaces.
  sports: Vy Chang stays active through daily walks on the Glacial Drumlin State Trail, seasonal tai chi sessions at the community center, participation in the Madison Seniors Cycling Club, and they cheer
    on the Milwaukee Bucks and Green Bay Packers, embodying a modest sports enthusiasm that blends low‑impact exercise with community pride.
  arts: Vy Chang immerses themselves in the arts by painting delicate watercolor landscapes inspired by Claude Monet, practicing Chinese calligraphy echoing the brushwork of Wu Guanzhong, attending gallery
    openings featuring works by local Madison artist Peter Raja, and reading classics like Jane Austen while listening to Yo‑Yo Ma’s cello suites, and they find this blend of visual and literary influences
    shapes a deeply reflective creative identity.
  travel: Vy Chang favors leisurely, culturally immersive trips, often meticulously planning guided tours of heritage sites such as Kyoto’s temples, Hangzhou’s West Lake, and the historic streets of Siena,
    while balancing a modest travel budget that occasionally limits longer overseas excursions, leading them to prioritize short weekend getaways to nearby Door County and annual visits to the Wisconsin
    Dells with their book club peers, and they often share travel photos with friends to inspire community wanderlust.
  culinary: Vy Chang enjoys preparing traditional East Asian dishes such as mapo tofu, jasmine‑scented steamed fish, and hand‑folded dumplings using fresh vegetables from their garden—like bok choy, shiitake
    mushrooms, and ginger—while also delighting in occasional culinary experiments with Italian risotto, though they sometimes over‑salt their sauces in pursuit of bold flavor.
  core: Vy Chang, a curious watercolorist and mentor, balances meticulous organization with spontaneous creativity, often over‑committing to projects and occasionally forgetting to water houseplants, while
    they inspire others through tai chi and community workshops.
background:
  cultural: Vy was born in Taiwan in 1957 and moved to the United States in her early twenties, settling first in Illinois before marrying and eventually making her home in Middleton, Wisconsin. Her upbringing
    emphasized respect for elders, Confucian values of education and community, and a deep appreciation for traditional arts such as calligraphy, tea ceremony, and folk music. As an immigrant, she blends
    these East Asian traditions with Midwestern American culture, celebrating both Lunar New Year and Thanksgiving, and serving as a cultural liaison between the local Asian community and broader residents.
    Her bilingual fluency in Mandarin and English informs her work in arts education and community outreach.
