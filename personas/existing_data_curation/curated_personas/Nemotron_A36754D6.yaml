  career_goals: Joshua aspires to combine his love of technology with his desire to help people. He aims to enroll in a high‑school STEM program and eventually pursue a degree in engineering or computer
    science, focusing on product design that makes everyday tasks easier. He dreams of working on community‑oriented tech projects, such as developing low‑cost educational tools or assistive devices for
    seniors. He also keeps a secondary interest in environmental technology, hoping to apply his practical skills to sustainable solutions. While he values flexibility, he is determined to build a career
    that balances innovative ideas with real‑world impact.
