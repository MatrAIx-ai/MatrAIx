  career_goals: Yi envisions a future where he can blend his love for discovery with his knack for engaging audiences. He dreams of becoming a robotics engineer or a science communicator who designs exciting
    experiments and shares them on a kid‑friendly YouTube channel. He also aspires to be a top competitor in school science fairs and coding contests, aiming to win awards that validate his competitive
    spirit. Ultimately, he hopes his work will inspire other children to explore the world with curiosity while learning practical skills.
