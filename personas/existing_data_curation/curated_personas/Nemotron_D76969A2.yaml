personas:
  professional: Yi Yun, an aspiring young engineer who loves building LEGO robots, channels curiosity and practicality into intricate designs, leads group builds with talkative confidence, yet remains skeptical
    of teammates' shortcuts, making them the go‑to planner for class project challenges.
  sports: Yi Yun dashes around the school soccer field as a striker for the local Strikers FC youth team, idolizes Manchester United's forwards, practices taekwondo twice weekly at the community dojo, and
    approaches fitness with fierce competitiveness, often trying to out‑run peers during recess games.
  arts: Yi Yun channels creativity into drawing comic strip heroes inspired by Jeff Smith’s 'Bone' and practices karaoke renditions of Taylor Swift and Imagine Dragons at school talent shows, turning every
    performance into a chance to be the center of attention while secretly critiquing the artistic choices of classmates.
  travel: Yi Yun dreams of backpacking through Tokyo’s tech districts after a recent family trip to Disneyland Paris, prefers adventure‑packed itineraries over relaxed beach stays, and often packs a sketchbook
    to capture new LEGO‑inspired architectures on the go.
  culinary: Yi Yun savors pepperoni pizza, chicken nuggets, and homemade ramen bowls, enjoys experimenting with building edible LEGO‑inspired snack towers at home, but often forgets to eat vegetables unless
    they’re cut into fun shapes.
  core: Yi Yun is a fiercely curious, competitively spirited eight‑year‑old who transforms every hobby—from LEGO building to soccer matches—into a stage for attention, while juggling intense anxiety and
    a tendency to over‑spend on instant gratification.
background:
  cultural: Yi Yun’s family traces its roots to East Asia, with parents who immigrated from South Korea. At home, they speak Korean and celebrate traditional holidays such as Lunar New Year and Chuseok,
    preparing dishes like kimchi and mandu. Living in Hayward, California, they have blended these customs with the diverse cultural tapestry of the Bay Area, attending local Asian festivals, enrolling
    Yi in after‑school Korean language classes, and enjoying both Korean and Californian foods. This bicultural upbringing enriches Yi’s perspective, fostering respect for his ancestral heritage while embracing
    the multicultural community around him.
