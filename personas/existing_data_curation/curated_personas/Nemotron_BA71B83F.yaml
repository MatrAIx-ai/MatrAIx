personas:
  professional: Angela Hill, a 31‑year‑old bank teller in Fort Collins, leverages strong customer‑service and cash‑handling expertise along with natural curiosity to design engaging community‑focused financial‑literacy
    workshops, while their talkative, compassionate nature makes them a trusted liaison between the bank and local nonprofits.
  sports: Angela Hill spends weekends tackling the foothills on mountain‑bike trails with the Fort Collins Trail Club, attends regular restorative yoga sessions, and roots for the Denver Broncos, Colorado
    Rockies, and Colorado Avalanche; they blend high‑energy workouts with mindful recovery.
  arts: Angela Hill, a watercolor enthusiast, immerses themselves in Fort Collins’ art scene by frequenting the Fort Collins Museum of Art, attending open‑mic nights featuring indie folk bands like The
    Lumineers and Bon Iver, and channeling curiosity into vibrant canvases inspired by the bold colors of Frida Kahlo.
  travel: Angela Hill plans trips with a mix of spontaneity and a detailed itinerary, savoring weekend escapes to Rocky Mountain National Park and Colorado Springs while dreaming of immersive art pilgrimages
    to Barcelona and Kyoto; they balance a modest travel budget and work commitments.
  culinary: Angela Hill enjoys mastering dishes such as quinoa‑stuffed bell peppers with fresh rosemary and feta, baking lavender‑infused shortbread cookies, and experimenting with seasonal ingredients
    like heirloom tomatoes and locally sourced honey; they often host potluck dinners for friends and family.
  core: Angela Hill blends a thriving social energy with a steadfast commitment to community, channeling curiosity into art, finance, and compassionate activism; they occasionally splurge on watercolor
    supplies and daring mountain‑bike trails.
background:
  cultural: Angela grew up in a middle‑class white family with German and Irish ancestry in the Midwest before moving to Colorado for college, where she decided to stay in Fort Collins. Her upbringing emphasized
    self‑reliance, hard work, and a strong sense of community, values reinforced by her family's tradition of volunteering and supporting local initiatives. Living in Fort Collins—a progressive, eco‑conscious
    city known for its robust arts community and proximity to the Rocky Mountains—has broadened her worldview and nurtured her appreciation for sustainability, inclusivity, and lifelong learning. She blends
    her familial heritage of reliability and community service with the region's emphasis on outdoor recreation, artistic expression, and social harmony.
attributes:
