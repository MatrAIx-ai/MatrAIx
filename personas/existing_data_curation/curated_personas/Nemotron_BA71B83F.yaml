  hobbies: '[''Hiking and Mountain Biking'', ''Watercolor Painting'', ''Visiting Art Galleries'', ''Live Music and Open Mic Nights'', ''Yoga'', ''Cooking and Baking'', ''Volunteer Work at Food Bank'', ''Community
    Event Planning'', ''Book Club Participation'', ''Trivia Nights'']'
  career_goals: Angela aims to complete a bachelor's degree in business administration or finance within the next three years, positioning herself for advancement to a supervisory or branch manager role
    that emphasizes community banking. She is passionate about designing and leading financial‑literacy workshops for local schools and low‑income families, and she hopes to integrate her love of the arts
    by partnering with cultural institutions for community outreach programs. Long‑term, she envisions a career that blends banking expertise with nonprofit or community‑relations work, allowing her to
    make a broader social impact while continuing to grow professionally.
