personas:
  professional: Meena Patel, a 47‑year‑old educator transitioning from one‑on‑one tutoring to curriculum leadership at a community learning center, blends expertise in differentiated lesson design, educational
    technology, and mindfulness‑based classroom management, while her relaxed approach to scheduling sometimes leads to last‑minute lesson tweaks and her natural curiosity drives continual integration of
    experimental art‑based projects.
  sports: Meena Patel, an avid weekend kayaker with the St. Johns Paddle Club and a faithful fan of the Jacksonville Jaguars and Tampa Bay Rays, blends casual yoga sessions with spontaneous beach runs,
    preferring low‑impact, community‑oriented activities over competitive sports.
  arts: Meena Patel spends Saturday mornings painting watercolors inspired by Claude Monet’s light and local flora, frequents the St. Augustine Art Walk to see works by emerging Florida artists like Sarah
    Harlow, and dances with a multicultural folk‑dance troupe that revives traditional rhythms at community festivals.
  travel: Meena Patel favors flexible, art‑centric getaways, often exploring historic districts like Savannah and Charleston on weekend road trips, dreaming of a summer in the museums of Florence while
    balancing a modest travel budget and family responsibilities.
  culinary: Meena Patel, an intermediate home cook, delights in crafting seasonal seafood curries that blend citrusy lime, fragrant coconut milk, and locally caught grouper, while also savoring avocado‑lime
    salsa and mango‑chili salsas at waterfront restaurants.
  core: Meena Patel is a curiosity‑driven educator who balances a love for watercolor, spontaneous kayaking, and community art projects with a habit of last‑minute planning and occasional financial forgetfulness,
    all while navigating a steady undercurrent of anxiety.
background:
  cultural: Meena is a second-generation Gujarati Indian American. She grew up in a bilingual household where Gujarati and English were spoken, and she celebrates traditional festivals such as Diwali, Navratri,
    and Holi with family gatherings, music, and homemade sweets. Her upbringing emphasized the value of education and community service, which she carries into her professional life. While she embraces
    her South Asian heritage—through cuisine, classical music, and storytelling—she has also integrated the coastal Floridian lifestyle, enjoying local seafood, beach culture, and the region's diverse multicultural
    milieu. This blended cultural identity informs her inclusive teaching style and community involvement.
attributes:
  skills: '[''Lesson planning and curriculum design'', ''Differentiated instruction'', ''Art integration in education'', ''Educational technology (Google Classroom, Zoom, interactive whiteboards)'', ''Culturally
