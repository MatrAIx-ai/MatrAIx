    program coordination'', ''Mindfulness and stress-management techniques for learners'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Fusion cooking (Indian-Florida recipes)'', ''Yoga and mindfulness practice'', ''Kayaking on the St. Johns River'', ''Beach
    walks'', ''Book club participation'', ''Volunteer tutoring at the county library'', ''Folk dance performances'', ''Traveling to visit family in India'']'
  career_goals: She aims to transition from one-on-one tutoring to a leadership role in curriculum development for a community learning center in St. Johns County. Over the next five years, Meena plans
    to earn a certification in school counseling to better support students' emotional well-being, and she hopes to launch a multicultural art-education program that blends South Asian artistic traditions
    with local Florida culture. She also envisions publishing a children's picture book that celebrates cultural diversity and to mentor new teachers through a regional educators' network. Ultimately, she
    aspires to obtain a doctorate in educational leadership and to influence policy around inclusive, flexible learning models.
