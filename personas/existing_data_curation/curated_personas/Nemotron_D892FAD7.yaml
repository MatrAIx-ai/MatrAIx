personas:
  professional: Carol Ramdath, a 24‑year‑old registered nurse with a STEM‑grounded analytical mindset, they blend meticulous patient assessment, IV therapy expertise, and data‑driven quality improvement
    with a charismatic, dance‑infused bedside presence, assertively advocating for patients while thriving in the structured rhythms of clinical protocols.
  sports: Carol Ramdath, a 24‑year‑old dance enthusiast, they stay active by blending nightly salsa sessions at the Sabor Latin Dance club with weekday yoga classes, cheer for the Atlanta Falcons and the
    Atlanta Hawks, and join a community recreational soccer league in the spring, all while preferring flexible, social workout routines over rigid training schedules.
  arts: Carol Ramdath, a 24‑year‑old avid reader, they dive into contemporary fiction by authors like Sally Rooney and Celeste Ng, groove to salsa legends Celia Cruz and Marc Anthony as well as hip‑hop
    artist Kendrick Lamar, and regularly attend local productions of Hamilton and improv comedy nights, letting their outgoing nature seep into lively discussions during game nights.
  travel: Carol Ramdath, a 24‑year‑old traveler, they prefer spontaneous, budget‑friendly trips that balance cultural immersion and relaxation, having explored New Orleans for its live music, Savannah for
    its historic squares, and dreaming of a future Buenos Aires tango workshop and a quiet mindfulness retreat in Kyoto, all booked on short notice rather than rigid itineraries.
  culinary: Carol Ramdath, a 24‑year‑old home cook, they specialize in Southern comfort dishes such as crispy fried chicken, buttery collard greens, and cheesy grits, seasoning with buttermilk, hot sauce,
    and smoked paprika, and while their cooking skill is solidly intermediate, they often experiment with new twists during family gatherings, occasionally overindulging in sweet‑potato casserole late at
    night.
  core: Carol Ramdath, a 24‑year‑old nurse and social dancer, they navigate life with a structured yet flexible mindset, channeling high‑energy sociability into care and community while battling intense
    anxiety that fuels both meticulous advocacy and occasional impulsive splurges.
background:
  cultural: Carol identifies as a Black woman raised in the Greater Atlanta area of Georgia. Her upbringing is steeped in Southern Black culture—gospel music, church community, and a strong emphasis on
    family and mutual support. She draws on the resilience and collective spirit of her community, which informs her compassionate approach to nursing and her commitment to addressing health disparities
    that affect African American populations. Her marriage to a supportive partner further enriches her perspective, blending traditional Southern values with contemporary, inclusive outlooks.
attributes:
  skills: '["Clinical assessment", "IV therapy and medication administration", "Wound care and dressing changes", "Patient education and health promotion", "Electronic health record (EHR) management", "Crisis
    intervention and emotional support", "Team collaboration and interdisciplinary communication", "Basic data analysis and quality improvement", "Cultural competency in patient care", "Emergency response
    (BLS/ACLS)"]'
  hobbies: '["Social dancing (salsa, hip hop)", "Volunteering at community health fairs", "Cooking Southern cuisine", "Yoga & mindfulness meditation", "Reading contemporary fiction", "Hosting game nights",
    "Gardening"]'
  career_goals: Carol aims to advance her nursing career by earning a master’s degree to become a Family Nurse Practitioner, with a focus on providing culturally competent care to underserved Black communities
    in Georgia. She plans to obtain certification as an Emergency Nurse and ultimately assume a charge nurse or unit manager role, where she can influence policies that improve staff well‑being and patient
    outcomes. Carol also hopes to develop community outreach programs addressing maternal health disparities and to mentor new nurses, leveraging her collaborative nature and desire for structured, impactful
    work while maintaining a flexible schedule.
