personas:
  professional: Paula Bayman is a structural and geotechnical engineer who leverages AutoCAD Civil 3D, Revit, and ArcGIS to craft sustainable municipal designs, automates repetitive calculations with Python,
    and combines a meticulous, organized work style with the flexibility to adapt solutions to budget and site constraints, all while preparing for her PE license and eyeing leadership on climate‑resilient
    infrastructure projects.
  sports: Paula Bayman spends weekends rock climbing at Reimers Ranch and hiking the Hill Country State Natural Area, is a member of the Central Texas Climbers Club, follows the Dallas Cowboys for football,
    supports the Austin FC soccer team, and occasionally joins a local 5 K charity run with Habitat for Humanity volunteers.
  arts: Paula Bayman captures the stark beauty of Texas geology through a DSLR, drawing inspiration from Ansel Adams and Edward Burtynsky, showcases her work at the Austin Photo Alliance monthly meet‑up,
    enjoys listening to the indie rock sounds of The Strokes and the folk storytelling of Brandi Carlile, and rounds off board‑game nights with friends with a round of Settlers of Catan.
  travel: Paula Bayman prefers self‑planned road trips that blend hiking and photography, having trekked the White Sands of New Mexico, driven the Colorado Rockies for sunrise shoots, and looking ahead
    to Iceland’s volcanic landscapes, all while using budget‑friendly accommodations like AirBnB and reserving a portion of her travel fund for spontaneous camping gear upgrades.
  culinary: Paula Bayman cooks southwestern comfort food such as chipotle‑spiced black bean chili, brisket tacos with pickled onions, and quinoa‑stuffed poblano peppers, favors fresh cilantro, lime, and
    corn masa, enjoys experimenting with a sous‑vide for precise meat textures, yet admits to over‑salting dishes before correcting them with a splash of lemon juice.
  core: Paula Bayman blends an analytical engineering mindset with a love for solitary climbs, photography, and yoga, balancing meticulous budgeting and career ambition with spontaneous outdoor adventures
    and community service.
background:
  cultural: Paula grew up in a middle-class, white Texan family with deep roots in the Midwest, blending traditional Texan values of self-reliance and community service with the progressive, tech-forward
    culture of Austin. Her upbringing emphasized education, pragmatic problem-solving, and respect for diverse viewpoints, which is reflected in her comfort with both established engineering practices and
    emerging sustainable technologies. She participates in local cultural events like the Austin City Limits music festival and enjoys regional foods such as barbecue, while also maintaining a health-conscious
    lifestyle common among Austin’s active professionals.
attributes:
  skills: '[''Structural analysis'', ''Geotechnical investigation'', ''AutoCAD Civil 3D'', ''Revit BIM'', ''ArcGIS mapping'', ''Sustainable design'', ''Python scripting for data automation'', ''Project
    management'', ''Construction site inspection'']'
  hobbies: '[''Hiking'', ''Rock climbing'', ''Landscape photography'', ''Reading non-fiction (environmental policy, urban planning)'', ''Board games with friends'', ''Yoga'', ''Volunteer construction with
    Habitat for Humanity'']'
  career_goals: Paula aims to earn her Professional Engineer (PE) license within the next two years and transition from design-heavy assignments to project-lead roles on large-scale, climate-resilient infrastructure
    projects in Central Texas. She aspires to become a senior civil engineer specializing in green stormwater management and transit-oriented development, eventually overseeing a multidisciplinary team
    that integrates smart-city technologies. In the longer term, she envisions launching a boutique consultancy that helps municipalities retrofit existing roadways and bridges to meet emerging sustainability
    standards while maintaining cost-effectiveness.
