  hobbies: '[''Garden cultivation'', ''Reading historical non‑fiction'', ''Cooking traditional South Asian dishes'', ''Woodworking'', ''Volunteering at the senior center'', ''Listening to classic music'']'
  career_goals: Although retired, Mishal aims to remain a productive and supportive presence in his family and community. He hopes to mentor his grandchildren by teaching them practical skills such as gardening,
    budgeting, and cooking, while also sharing stories of his cultural heritage. He aspires to continue volunteering at the local senior center, where he can organize small‑group workshops that blend his
    practical knowledge with his curiosity for new ideas. Maintaining his health through regular walks and a balanced diet is also a personal priority, enabling him to stay active in his pursuits.
