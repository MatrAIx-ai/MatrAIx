persona_description: A historian who specializes in the study of Hawaiian history, particularly the period before and after the arrival of Western missionaries in the late 19th century. He is particularly
  interested in the role of Christianity in Hawaiian society and the impact of Western culture on Hawaiian culture and society. He is knowledgeable about the history of the Kawaiaha’o Church and its role
  in Hawaiian history, as well as the history of the churchyard and the graves within it. He is interested in the history of the Hawaiian monarchy and the role of Christianity in Hawaiian society. He is
  also interested in the history of the Hawaiian people and their culture and the impact of Western culture on Hawaiian culture and society.
