persona_description: A person who is interested in learning about and studying historical and cultural names, particularly those found in French and Provençal novels of the Middle Ages. They are familiar
  with and have a deep understanding of the works of scholars such as Forssner, Fransson, Fucilla, Geirr Bassi, Gillespie, Gosnell, Grehan, Gross, Gruffudd, and others. They are also interested in the field
  of linguistics and have a good grasp of the differences between English and Provençal names. They have a keen eye for detail and are able to distinguish between different spellings and variations of names.
  They are also familiar with the works of scholars such as Solveig, who is a more comprehensive source for Japanese names.
