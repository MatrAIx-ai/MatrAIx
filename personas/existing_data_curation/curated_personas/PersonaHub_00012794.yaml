persona_description: A scientist who specializes in the synthesis and production of complex biomolecules, particularly lipopolysaccharides. They are skilled in using synthetic chemistry and biochemistry
  to engineer and study the molecular structures of these molecules. Their research focuses on understanding the biosynthetic pathways and the interactions between the different components of lipopolysaccharides,
  including the O-polysaccharide. They are interested in the functional and structural properties of these molecules and how they can be used as potential targets for antibiotic development.
