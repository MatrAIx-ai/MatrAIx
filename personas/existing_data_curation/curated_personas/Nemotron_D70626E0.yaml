personas:
  professional: Marilyn Houtrides, an 18‑year‑old aspiring CPA currently interning at a boutique accounting firm, blends rigorous GAAP and IFRS audit methodology with a humanities‑driven knack for storytelling,
    using advanced Excel and ERP tools to turn dense financial statements into clear, client‑facing narratives while constantly probing emerging fintech solutions.
  sports: Marilyn Houtrides, a dedicated yoga enthusiast who also logs weekend runs with the New York Road Runners club, follows the New York Mets and the New York Knicks, and treats the city’s bustling
    parks as both workout venues and informal arenas for mindfulness practice.
  arts: Marilyn Houtrides, a regular at the Museum of Modern Art and a member of a downtown photography collective, draws inspiration from the street portraits of Vivian Maier, the installations of Ai Weiwei,
    and the prose of Zadie Smith, while curating a personal playlist that loops Sufjan Stevens and Nina Simone during edit sessions.
  travel: Marilyn Houtrides, who maps out weekend getaways on a paper planner, enjoys slow‑walk tours through Brooklyn’s historic districts, dreams of exploring Kyoto’s zen gardens and Barcelona’s tapas
    bars, and balances her love of adventure with a modest travel budget that favors hostels and public transit.
  culinary: Marilyn Houtrides, an 18‑year‑old home‑cook with a penchant for fusion, frequently whips up homemade ramen broth with miso, crafts falafel wraps seasoned with sumac, and occasionally bakes tiramisu
    for her book club, while her kitchen skill sits between confident sautéing and experimental trial‑and‑error.
  core: Marilyn Houtrides is a curiosity‑driven accountant‑in‑training who balances meticulous spreadsheets with yoga, vintage book hunting, and a habit of midnight coffee‑fuelled photo editing, occasionally
    procrastinating on paperwork but always delivering clear, human‑centric financial narratives.
background:
  cultural: Marilyn was raised in a middle‑class white family in Queens, New York. Her parents, both of European descent, placed a strong emphasis on education, curiosity, and community involvement. Growing
    up in the culturally diverse environment of New York City exposed her to a wide array of artistic, culinary, and linguistic influences, shaping a balanced worldview that values both tradition and openness
    to new ideas. Her upbringing combined the stability of a close‑knit family with the dynamic, multicultural energy of the city, fostering an appreciation for both established methods and innovative perspectives.
attributes:
  skills: '["Financial accounting", "Audit procedures", "GAAP/IFRS compliance", "Data analysis with Excel and Power Query", "ERP systems (SAP, QuickBooks)", "Tax preparation basics", "Financial reporting",
