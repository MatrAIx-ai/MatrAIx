  hobbies: '["Reading contemporary and classic literature", "Visiting museums and art galleries", "Practicing yoga and mindfulness meditation", "Exploring New York neighborhoods on foot", "Cooking diverse
    cuisines", "Urban photography", "Participating in a local book club", "Volunteering at community literacy programs"]'
  career_goals: In the short term, Marilyn aims to obtain her Certified Public Accountant (CPA) license and deepen her expertise in audit methodology, positioning herself for a senior auditor role within
    a reputable firm. Over the next five years, she intends to progress to audit manager, leading complex engagements and integrating emerging technologies such as data analytics and blockchain into audit
    processes. Long‑term, she envisions a transition into financial leadership—perhaps as a controller or CFO—where she can blend her analytical rigor with a human‑centered approach to financial strategy,
    sustainability reporting, and corporate governance. She also harbors an ambition to mentor young professionals, especially those from non‑traditional academic backgrounds, fostering the same balance
    of curiosity and practicality that defines her own career path.
