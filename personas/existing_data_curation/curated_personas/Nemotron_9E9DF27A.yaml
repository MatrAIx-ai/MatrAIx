  career_goals: Pamela aims to pursue a career in visual communication, envisioning herself as a multimedia artist or graphic designer who blends traditional art with digital media. She plans to obtain
    a GED, then enroll in a community‑college art program, eventually working at a creative agency or launching her own boutique studio that offers workshops for local youth. She also aspires to curate
    community art exhibitions and become an arts director for a nonprofit cultural center in Jackson, using her projects to promote diverse perspectives and community engagement.
