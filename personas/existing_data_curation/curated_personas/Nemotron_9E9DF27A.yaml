personas:
  professional: Pamela Pajon combines a relentless curiosity with competitive flair as a budding visual communicator, turning sketchbooks, Procreate illustrations, and self‑taught video edits into polished
    multimedia pieces that aim to surprise audiences and secure a future at a creative agency or a youth‑focused boutique studio.
  sports: Pamela Pajon enjoys spontaneous pickup basketball at the local park, cheers for the Memphis Grizzlies and Mississippi State Bulldogs, and is a member of the high‑school gym’s after‑class hoop
    league, balancing competitive drive on the court with a laid‑back attitude toward fitness.
  arts: Pamela Pajon draws inspiration from street‑artist Banksy, digital illustrator Lois van Baarle (Loish), and jazz legends like Miles Davis and Norah Jones, regularly attending live blues gigs at downtown
    venues and devouring speculative fiction from Octavia Butler while experimenting with mixed‑media collages that echo the improvisational spirit of the music.
  travel: Pamela Pajon dreams of a creative pilgrimage that blends art and music, planning a summer trip to New Orleans for its vibrant jazz festivals, a weekend in Paris to sketch the Louvre’s masterpieces,
    and a spontaneous road‑trip to the Appalachian Mountains to photograph sunrise over misty ridgelines, all while budgeting each adventure with a spreadsheet they meticulously update.
  culinary: Pamela Pajon favors comfort foods like shrimp and grits seasoned with smoked paprika and jalapeño, enjoys making quick avocado toast with feta and lemon zest, but often resorts to reheated pizza
    slices when rushes for deadlines interrupt their experimentation in the kitchen.
  core: Pamela Pajon is a curiosity‑driven visual artist who balances high ambition with a calm, competitive edge, occasionally over‑commits to projects at the expense of sleep and indulges in late‑night
    vinyl listening marathons.
background:
  cultural: Pamela grew up in a middle‑class white family in Jackson, Mississippi, steeped in Southern cultural traditions such as church gatherings, Southern hospitality, and a love for local cuisine like
    fried catfish and biscuits. The city’s vibrant blues and gospel scene, as well as its historic civil‑rights heritage, have shaped her appreciation for art and community activism. Her family’s values
    emphasize respect, self‑reliance, and community involvement, blending with the broader Southern emphasis on resilience and calm under pressure.
