personas:
  professional: Hon Li is a middle school humanities teacher who seamlessly integrates literature, history, and visual arts into project‑based curricula, leveraging their meticulous planning, bilingual
    fluency, and competitive drive to secure grant funding and elevate student creativity while eyeing a transition to a district curriculum specialist role.
  sports: Hon Li enjoys weekend hikes in the redwood forests with the Bay Area Hiking Club, follows the San Francisco Giants and Golden State Warriors closely, and participates in a local recreational softball
    league, balancing solitary trail runs with occasional group yoga sessions at a downtown studio.
  arts: Hon Li spends evenings painting watercolor landscapes inspired by both Monet’s impressionist light and the bold ink washes of traditional calligraphy, curates photo essays of museum exhibitions
    echoing the narrative style of William Eggleston, and finds solace in the poetry of Ocean Vuong and the music of Sufjan Stevens.
  travel: Hon Li prefers meticulously planned solo trips that blend cultural immersion and natural beauty, having explored the bamboo forests of Kyoto, the cliffs of Big Sur, and the art districts of Barcelona,
    while dreaming of future visits to the lavender fields of Provence and the tea plantations of Taiwan.
  culinary: Hon Li experiments in the kitchen by fusing traditional Chinese dishes like dumplings and mapo tofu with Californian staples such as avocado, kale, and artisanal cheeses, perfecting a signature
    quinoa‑bok choy stir‑fry and a matcha‑infused cheesecake that reflects their love for both heritage flavors and local produce.
  core: Hon Li is a methodical, curiosity‑driven educator who channels their solitary, competitive spirit into art‑rich curricula, disciplined finances, mindful health practices, and eclectic cultural pursuits.
background:
  cultural: Hon Li is a second‑generation Chinese‑American whose family settled in the Bay Area before she was born. Her upbringing blended traditional East Asian values—respect for elders, emphasis on
    education, and observance of holidays like Lunar New Year and the Mid‑Autumn Festival—with the progressive, multicultural environment of Oakland. Bilingual in English and Mandarin, she regularly incorporates
    Chinese literature and art history into her teaching to highlight cross‑cultural connections. In her community, she participates in local cultural events, volunteers for the Oakland Chinatown Heritage
    Association, and mentors recent immigrant families, bridging her heritage with her American identity.
attributes:
  skills: '[''Curriculum design (arts integration)'', ''Differentiated instruction'', ''Classroom management'', ''Student assessment and data analysis'', ''Project-based learning facilitation'', ''Educational
