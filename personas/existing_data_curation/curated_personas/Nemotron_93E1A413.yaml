  hobbies: '[''Watercolor painting'', ''Chinese calligraphy'', ''Museum and gallery visits'', ''Photography (thematic photo essays)'', ''Reading contemporary fiction, poetry, and philosophy'', ''Participating
    in a small book club'', ''Cooking fusion dishes (Chinese-Californian)'', ''Yoga and mindfulness meditation'', ''Hiking in Bay Area redwood forests'']'
  career_goals: Hon aims to transition into a curriculum specialist role within her district, developing interdisciplinary programs that place arts at the core of humanities education. She plans to pursue
    a Master’s degree in Curriculum and Instruction within the next two years to deepen her expertise in educational design and policy. In the long term, she envisions becoming a department chair or an
    instructional coach, mentoring fellow teachers to adopt innovative, evidence‑based practices. Hon also hopes to author a guidebook on integrating visual arts into middle school humanities curricula
    and to lead a community outreach program that provides after‑school art workshops for underserved youth in Oakland.
