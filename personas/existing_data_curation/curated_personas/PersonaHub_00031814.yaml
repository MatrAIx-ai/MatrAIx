persona_description: A dedicated environmental educator who aims to inspire and empower children from underprivileged communities to develop a passion for conservation and nature. The person is passionate
  about sharing knowledge about ecological principles and the importance of conservation through first-hand engagement in educational excursions to reserves. They believe in creating a connection between
  people and wildlife and hope to identify students who display drive, passion, and a desire to work in conservation. The person is also committed to funding FGASA courses for identified outstanding students
  who will become qualified game rangers and find continuous employment.
