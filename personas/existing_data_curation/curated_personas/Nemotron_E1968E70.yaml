personas:
  professional: Travis Scott is a retired small-business manager turned volunteer coordinator and local historian, leveraging their budgeting expertise, hands-on carpentry skills, and strategic board-game
    mindset to mentor younger volunteers and drive community projects with a practical yet curious approach.
  sports: Travis Scott plays 9-hole rounds at the Coral Shores Golf Club a few times a month, follows the Tampa Bay Buccaneers and the Miami Marlins, and joins a senior fishing league that organizes sunrise
    trout trips on Lake Okeechobee, reflecting their love of competition and the outdoors.
  arts: Travis Scott enjoys listening to Jimmy Buffett's island-rock, collecting vintage model ship kits, reading Bernard Cornwell historical novels, and attending community theater productions by the Suncoast
    Players, all of which enrich their creative outlook.
  travel: Travis Scott prefers relaxed road trips with their wife, favoring Florida destinations such as the Florida Keys for dolphin-watching tours, St. Augustine's historic lighthouse, and occasional
    cruises to the Bahamas when health permits, planning each itinerary with a blend of budget-consciousness and a desire for gentle adventure.
  culinary: Travis Scott loves preparing their family's citrus-glazed ham, simmering prune-and-molasses barbecue sauce, baking key-lime pie, experimenting with fresh-caught grouper ceviche, and preserving
    homemade marmalade, often sharing these dishes with grandchildren during weekend gatherings.
  core: Travis Scott melds a hands-on, skeptical mind with a love for fishing, gardening, and community service, balancing frugality and occasional indulgence while juggling health quirks and a competitive
    streak in chess and bridge, reflecting their pragmatic yet curious outlook.
background:
  cultural: Travis grew up in the post‑World War II American South, absorbing values of self‑reliance, modesty, and community service common to his generation of white, middle‑class families. His high‑school
    education and early work in trades reflect the practical, hands‑on culture of the era. Relocating to Fort Myers, FL, he embraced the retiree‑friendly coastal lifestyle while maintaining ties to Southern
    traditions, such as a Protestant church affiliation and a deep appreciation for local fishing and agriculture. His cultural identity blends Midwestern work ethic, Southern hospitality, and the relaxed,
    outdoors‑oriented vibe of contemporary Florida.
