  hobbies: '["LEGO building", "Wooden block construction", "Coloring and drawing", "Reading picture books", "Vietnamese language class and folk songs", "Memory and board games", "Soccer practice", "Gymnastics",
    "Nature walks in local parks", "Helping with cooking Vietnamese dishes"]'
  career_goals: Loan aspires to become a teacher who can create a well-structured classroom and help younger children learn to read and count, reflecting her love of order and responsibility. She also imagines
    herself as an engineer who designs safe playgrounds or cool building sets, aligning with her practical mindset and competitive spirit. In the short term, she aims to win her school's spelling bee, lead
    a group project, and be recognized for her organizational skills.
