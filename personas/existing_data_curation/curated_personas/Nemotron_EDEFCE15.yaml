personas:
  professional: Loan is a budding structural builder who follows step-by-step LEGO manuals with precision, turning each set into a miniature engineering project, and they apply that same methodical mindset
    to school worksheets and puzzle challenges.
  sports: Loan is a competitive youngster on the Maple Valley Mini-Kicks soccer team and a gymnastics enthusiast at the community center, where they chase improvement certificates, cheer for the Seattle
    Sounders when watching TV, and they relish friendly match-day rivalries that push them to practice extra drills.
  arts: Loan is an enthusiastic colorist who fills detailed picture-book scenes with crayons, sings folk songs from their language class, and they idolize illustrators such as Eric Carle, Dr. Seuss, and
    Pixar animators for their vivid storytelling.
  travel: Loan is a curious explorer who spends weekends at Maple Valley Regional Park gathering leaves and rocks, dreams of visiting the Seattle Aquarium and the Grand Canyon, and they prefer having a
    printed map and checklist over spontaneous detours.
  culinary: Loan is a budding kitchen helper who loves rolling spring rolls with family, delights in the crunch of fresh cucumber and mint, and they can make a flawless peanut-butter-and-jelly sandwich
    while demanding extra cheese on their macaroni.
  core: Loan is a methodical mini-architect who obsesses over perfect LEGO builds, challenges classmates in soccer scrimmages, hoards glitter pens for coloring, and secretly tucks spare LEGO bricks under
    their pillow for midnight tinkering.
background:
  cultural: Loan comes from a Vietnamese-American family that maintains strong cultural ties. At home, Vietnamese is spoken alongside English, and the family celebrates Tet (Lunar New Year) with traditional
    foods like bánh chưng, spring rolls, and lion dance performances. She attends a weekend Vietnamese language school where she learns to read and write using the Latin-based Vietnamese alphabet and practices
    cultural songs and crafts. Her parents emphasize the importance of education, respect for elders, and community involvement. Living in Maple Valley, Washington, the family also embraces local outdoor
    activities such as hiking and park outings, blending their heritage with the Pacific Northwest lifestyle and giving Loan a bicultural identity.
