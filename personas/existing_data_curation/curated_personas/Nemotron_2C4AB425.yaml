  career_goals: She aims to advance from receptionist to office manager within three to five years, overseeing a small administrative team and streamlining operations. To reach this goal, Hanna plans to
    earn a bachelor's degree in Business Administration and obtain the Certified Administrative Professional (CAP) credential. She also seeks leadership development through mentorship, leading process-improvement
    projects, and eventually moving into a facilities or operations coordinator role that blends her organizational expertise with broader project management.
