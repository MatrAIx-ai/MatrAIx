personas:
  professional: Hanna Markley, a 31‑year‑old receptionist, leverages their meticulous organizational skills, curiosity for new productivity tools, and a warm customer‑focused demeanor; they consistently
    seek process‑improvement opportunities while managing high‑volume phone traffic, precise scheduling, and seamless office logistics.
  sports: Hanna Markley, a 31‑year‑old, enjoys weekend hikes on the Ozark Trail system, participates in a local yoga studio that partners with the Springfield Soccer Club for cross‑training, and passionately
    roots for the St. Louis Cardinals in baseball and the Kansas City Chiefs in football.
  arts: Hanna Markley, a 31‑year‑old, devotes evenings to her book club where she discusses historical novels by Hilary Mantel and self‑help titles by Brené Brown, attends performances at the Springfield
    Little Theatre, and relaxes listening to folk‑rock artist Sufjan Stevens while sketching occasional home‑organization layouts.
  travel: Hanna Markley, a 31‑year‑old, prefers meticulously planned weekend getaways to nature‑rich spots like the Great Smoky Mountains and Asheville’s Blue Ridge Parkway, balances her hiking enthusiasm
    with occasional city escapes to Chicago for literary festivals, and finances these trips through a dedicated travel fund that they cap at $150 per outing.
  culinary: Hanna Markley, a 31‑year‑old, loves experimenting with seasonal Midwestern produce, regularly preparing corn chowder with fresh sweet corn, apple‑cinnamon crisp, and pork tenderloin glazed with
    sage, while also mastering homemade pickles and nurturing a sourdough starter for weekend baking.
  core: Hanna Markley, a 31‑year‑old, blends curiosity with practicality to turn every office workflow, DIY project, and recipe experiment into a tidy, efficient system, even if that sometimes means they
    over‑schedule their weekends and miss out on spontaneous adventures.
background:
  cultural: Hanna was raised in a modest middle-class family in a small town near Springfield, reflecting Midwestern values of friendliness, humility, and community involvement. Her ancestry includes German
    and Irish roots, which she honors through occasional cultural celebrations and traditional dishes. Growing up in a Protestant environment, she regularly attended church and community events, and the
    regional culture's emphasis on practicality, modesty, and a strong work ethic continues to shape her approach to work and personal life.
