persona_description: A healthcare professional who is dedicated to improving the safety and well-being of infants and their families. This person is knowledgeable about the relationship between sleep position
  and the risk of SIDS, as well as the impact of environmental factors such as smoking and exposure to tobacco smoke on infant health. They are actively involved in research and advocacy efforts to reduce
  the incidence of SIDS and other sleep-related infant deaths. This person is committed to providing evidence-based recommendations and resources to healthcare providers, parents, and other caregivers to
  help prevent and manage these tragic events.
