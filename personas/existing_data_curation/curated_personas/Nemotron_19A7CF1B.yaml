personas:
  professional: A marketing enthusiast with a flair for community development, Ashleigh Kirby blends solid business fundamentals, market research, and graphic design expertise to craft culturally resonant
    campaigns for arts nonprofits, while balancing meticulous project coordination with flexible, curiosity‑driven experimentation.
  sports: A nature‑oriented fitness enthusiast, Ashleigh Kirby regularly hikes the Ozark trails, joins a local running club for weekend 5Ks, roots for the Arkansas Razorbacks basketball team, and enjoys
    spontaneous volleyball matches at community events, balancing structured workouts with social play.
  arts: A devoted artistic explorer, Ashleigh Kirby frequents local galleries and craft fairs, captures Arkansas landscapes in watercolor and photography, and immerses themselves in live jazz by Kamasi
    Washington and soulful R&B from H.E.R., allowing the arts to inform both their personal expression and professional branding work.
  travel: An adventure‑seeking yet budget‑conscious traveler, Ashleigh Kirby has trekked the Hot Springs National Park trails, soaked in Nashville’s music vibe, plans future trips to San Miguel de Allende
    to practice Spanish, and curates road‑trip itineraries that blend local coffee stops, community volunteer projects, and spontaneous detours.
  culinary: A culinary enthusiast specializing in Southern comfort fare, Ashleigh Kirby perfects dishes like crispy fried chicken, collard greens seasoned with smoked ham hocks, shrimp and grits with fresh
    Gulf shrimp, buttery cornbread, and experimental cold‑brew coffee, often pairing these meals with homemade sweet tea infused with fresh mint.
  core: Ashleigh Kirby is a curious, sociable 22‑year‑old marketing enthusiast who merges artistic creativity with community service, occasionally procrastinates on certification courses, and fuels their
    ideas with late‑night coffee and spontaneous dance breaks.
background:
  cultural: Ashleigh identifies as African American and grew up in a close‑knit Black family rooted in Southern traditions. Her upbringing emphasized church community, gospel music, and storytelling, with
    regular participation in choir and community events. Celebrations such as Juneteenth and family reunions reinforced a sense of cultural pride and resilience. Living in McNeil, Arkansas, she bridges
    her Black heritage with a predominantly rural environment, fostering an appreciation for both Southern cuisine and broader artistic expressions. This dual cultural lens informs her values of harmony,
    cooperation, and a commitment to uplifting underrepresented voices within her community.
