  hobbies: '[''Visiting art galleries and craft fairs'',''Sketching and watercolor painting'',''Landscape photography'',''Cooking Southern comfort food'',''Attending live music events (jazz, R&B)'',''Dancing
    at community gatherings'',''Volunteering at the youth center'',''Hiking Ozark trails'',''Reading contemporary fiction'',''Exploring new coffee shops'']'
  career_goals: Ashleigh aims to launch her career in a dynamic marketing or community development role where she can blend her business acumen with her passion for the arts. She aspires to become a brand
    manager for a cultural organization or a nonprofit arts collective, eventually leading campaigns that promote underrepresented artists. In the longer term, she envisions founding a boutique consulting
    firm that supports small businesses in rural Arkansas, offering marketing, event planning, and branding services. To achieve this, she plans to earn digital marketing certifications and possibly pursue
    an MBA focused on social entrepreneurship.
