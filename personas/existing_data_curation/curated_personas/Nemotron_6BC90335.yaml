  career_goals: Approaching retirement, Kijuan aims to cement a legacy of mentorship by creating a formal training program for emerging supervisors and instilling a culture of data‑informed decision‑making.
    He plans to pilot a pilot digital inventory system across multiple stores in Anderson County, demonstrating that innovative tools can coexist with established retail practices. Additionally, he hopes
    to transition into a part‑time consulting role, helping small‑town retailers boost profitability while remaining actively involved in his community’s economic development.
