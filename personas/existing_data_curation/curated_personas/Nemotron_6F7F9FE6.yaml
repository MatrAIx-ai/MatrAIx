  hobbies: '[''R&B, hip‑hop, and soul music'', ''Dancing'', ''Cooking Southern comfort food'', ''Thrift‑store vintage fashion hunting'', ''Photography'', ''Church youth group volunteering'', ''Reading young‑adult
