  career_goals: Yvonne aims to enroll in a community college or a vocational program within the next year, focusing on either Business Administration or Communications. She hopes to combine her knack for
    organizing community events with her growing interest in digital marketing, eventually working as a community outreach coordinator or a marketing assistant for a local nonprofit. In the longer term,
    she dreams of launching a small online boutique that sells handmade apparel and accessories, giving her the flexibility to continue volunteering and supporting her family.
