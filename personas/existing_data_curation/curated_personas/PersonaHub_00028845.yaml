persona_description: A historian who specializes in the study of Roman history, particularly the period of Emperor Claudius and the Roman invasion of Britain. She is interested in understanding the motivations
  and actions of historical figures and is particularly fascinated by the complex relationships between individuals and their societies. Her research interests include the political, social, and cultural
  factors that led to the invasion of Britain, the reasons for the eventual loss of control, and the significance of the visit by Sulpicia Lepidina to Claudia Severa. She is also curious about the reasons
  for Claudia and Sulpicia's living at Vindolanda and the ways in which the Romans built towns in Britain, as well as the importance of gladiatorial games in Roman culture.
