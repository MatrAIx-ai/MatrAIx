    assurance evaluation'', ''Basic visual design critique'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Photography (urban and nature)'', ''Reading (philosophy, sci‑fi, technology non‑fiction)'', ''Hiking in the Santa Monica
    Mountains'', ''Coffee tasting and brewing experimentation'', ''Journaling and reflective writing'', ''Strategy board games with small groups'', ''Indie film screenings'', ''Live jazz concerts'']'
  career_goals: Robert aims to leverage his solid customer service foundation to move into a leadership role within the next three years, aspiring to become a Team Lead and then a Customer Experience Manager.
    He plans to complete a bachelor’s degree in Communications or Business Administration, supplemented by certifications such as the Certified Customer Success Manager (CCSM) and a UX Foundations course.
    Ultimately, he envisions shaping company‑wide customer experience strategies, mentoring new agents, and bridging the gap between support and product design, possibly transitioning to a role in user
    experience research or product management that merges his analytical mindset with his passion for art and innovative ideas.
