  hobbies: '[''Drama club'', ''School choir'', ''Ukulele playing'', ''Organizing movie nights'', ''Volunteer at church youth group'', ''Baking Southern recipes'', ''Hiking local trails'', ''Reading YA fiction'',
    ''Creating digital memes and short videos'']'
  career_goals: Ingrid intends to build on her communication and organizational strengths by pursuing a bachelor’s degree in communications or public health after graduating high school. Her long-term ambition
    is to work as a community outreach coordinator or school counselor in Dalton, helping local youth access resources and develop leadership skills. In the short term she plans to take dual-enrollment
    health-science courses, secure a summer internship with a local nonprofit, and continue expanding her leadership experience through the student council and church youth programs.
