personas:
  professional: Ingrid Damour is a high‑school stage enthusiast who leverages drama club experience, choir leadership, and Canva‑savvy social media skills to organize school‑wide outreach events, while
    eyeing a communications degree and a future role as a community outreach coordinator in Dalton, and they bring natural confidence to every presentation.
  sports: Ingrid Damour enjoys weekend hikes along the Appalachian foothills, runs cross‑country for Dalton High School, and roots for the Georgia Bulldogs football team and the Atlanta Braves while they
    volunteer as a water‑carrier for the local community fun run.
  arts: Ingrid Damour thrives on stage as lead chorister in the school choir and a drama club performer, strums the ukulele to the tunes of Taylor Swift and Lin‑Manuel Miranda, curates themed movie marathons
    of classic teen comedies, and they craft viral TikTok memes featuring witty edits of Billie Eilish clips.
  travel: Ingrid Damour prefers budget‑friendly road trips, often planning weekend getaways to Savannah’s historic squares or a family pilgrimage to New York City’s Broadway district, while they dream of
    a solo backpacking adventure through the Appalachian Trail.
  culinary: Ingrid Damour shows their culinary flair by baking buttery buttermilk biscuits, whipping up peach cobbler with a crumbly oat topping, and perfecting crispy fried chicken using seasoned cornmeal,
    and they often experiment with extra cayenne for a spicy kick.
  core: Ingrid Damour is a stage‑loving, detail‑oriented teen who balances meticulous event planning with late‑night TikTok marathons, a sweet tooth for peach cobbler, and they have a habit of over‑committing
    to school and church projects.
background:
  cultural: Ingrid grew up in Dalton, a small city in northwest Georgia known for its carpet industry and close‑knit community. Raised in a white, Southern family, she was immersed in the region’s values
    of hospitality, church involvement, and strong family ties. Local traditions—such as Sunday worship, communal potlucks, and pride in the area’s Appalachian foothills—have shaped her understanding of
    community and responsibility while fostering a down‑to‑earth, practical outlook.
attributes:
  skills: '[''Public speaking'', ''Event coordination'', ''Social media content creation'', ''Student council leadership'', ''Time management and organization'', ''Basic graphic design (Canva)'', ''Computer
