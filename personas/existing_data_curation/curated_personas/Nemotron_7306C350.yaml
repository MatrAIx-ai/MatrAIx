personas:
  professional: Thomas Riggins, a senior electrical engineer specializing in analog and digital circuit design, renewable‑energy integration, and home‑automation prototyping, channels their imaginative
    curiosity and agile project‑management skills into leading interdisciplinary R&D teams, mentoring junior engineers, and driving the development of a novel power‑management patent while maintaining a
    disciplined yet flexible work style.
  sports: Thomas Riggins enjoys low‑impact fitness, they spend weekends hiking the trails of Kettle Moraine State Forest, cheer for the Milwaukee Bucks and Green Bay Packers, and participate in a local
    amateur cross‑country ski club during winter while generally preferring solitary outdoor activities over intense gym workouts.
  arts: Thomas Riggins immerses themselves in the arts by painting abstract oil canvases inspired by science‑fiction, playing acoustic guitar while listening to Pink Floyd and Brian Eno, and curating a
    personal collection that includes Ansel Adams photographs and Hilma af Klint paintings, all of which fuel their creative problem‑solving.
  travel: Thomas Riggins favors immersive road trips that blend natural scenery with cultural exploration, they have driven the Pacific Coast Highway, trekked the fjords of Norway to study renewable‑energy
    installations, and they are planning a future visit to the Maker Faire in Shenzhen to connect with global maker communities.
  culinary: Thomas Riggins experiments with molecular gastronomy, they regularly create spherified balsamic reductions for grilled salmon, foam‑infused espresso tinctures, and enjoy preparing classic Wisconsin
    cheese curds seasoned with smoked paprika, showcasing their blend of scientific precision and culinary curiosity.
  core: Thomas Riggins fuses engineering precision with artistic spontaneity, they channel relentless curiosity into sustainable tech, abstract art, and hands‑on mentoring, while they habitually leave half‑finished
    synthesizer projects on their workbench as a quirky testament to their love of novelty.
background:
  cultural: Thomas was raised in a middle‑class, German‑heritage family in the Midwest, where values such as hard work, reliability, and community involvement were emphasized. Growing up in Burlington,
    Wisconsin, he participated in local fairs, church gatherings, and volunteer fire‑department events, fostering a sense of civic responsibility. His German roots influence his appreciation for precision
    and engineering excellence, while the broader Midwestern culture nurtured his modesty, practicality, and love for the outdoors. This blend of heritage and regional identity shapes his collaborative
    work style, his commitment to mentorship, and his enjoyment of seasonal community traditions like harvest festivals and county fairs.
attributes:
  skills: '["Analog circuit design", "Digital signal processing", "Embedded C programming", "PCB layout (Altium Designer)", "Power electronics", "Renewable energy system integration", "PLC programming",
