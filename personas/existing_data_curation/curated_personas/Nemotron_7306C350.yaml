    printing and CAD modeling", "Python scripting for data analysis", "Mentoring and training"]'
  hobbies: '["Oil painting (abstract art)", "Analog synthesizer experimentation", "DIY electronics projects", "Photography (nature & architecture)", "Hiking in Kettle Moraine State Forest", "Reading science‑fiction
    novels", "Playing acoustic guitar", "Model railroad building", "Volunteering in local STEM outreach programs", "Experimental cooking (molecular gastronomy)"]'
  career_goals: Looking ahead, Thomas aims to transition into a senior technical leadership role where he can mentor the next generation of engineers and spearhead innovative R&D projects, particularly
    in sustainable energy and smart‑home technologies. He hopes to secure a patent for a novel power‑management circuit and to develop a small line of artistic electronic installations that blend sound,
    light, and interactive design. Over the next five to seven years, Thomas also plans to establish a boutique consulting practice that provides design services to local startups and community makerspaces,
    allowing him to balance professional influence with his desire for creative freedom and community involvement.
