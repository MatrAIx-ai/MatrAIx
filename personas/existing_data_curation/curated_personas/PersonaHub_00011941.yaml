persona_description: A nutritionist who is interested in developing and evaluating dietary assessment tools, particularly those that measure intake of fruits, vegetables, dairy, added sugars, whole grains,
  and calcium. They are familiar with the development and application of dietary assessment tools and have experience in the use of food records, 24-hour dietary recalls, and short dietary assessment instruments.
  They are interested in the application of these tools in the NHIS CCS 2010, and are familiar with the scoring algorithms used to convert screener responses to estimates of dietary intake.
