persona_description: A school district leader who is passionate about creating a safe and supportive school environment for students, addressing social-emotional development, and implementing effective
  mental health and school safety policies. This person is committed to collaborating with state and local communities, school leaders, teachers, and mental health professionals to address the physical
  and psychological safety of the school community. They prioritize establishing school safety leadership and threat assessment teams, assessing and identifying needs, strengths, and gaps in existing services
  and supports, and integrating behavioral and mental health services and academic instruction. They also prioritize providing ongoing professional development for school staff and community partners and
  engaging students, families, public and private social service agencies, and other agencies as partners in developing and implementing policies and practices that create and maintain a safe school environment.
