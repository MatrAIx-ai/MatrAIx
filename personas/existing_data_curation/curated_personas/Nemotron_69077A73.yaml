  hobbies: '[''Cooking Vietnamese cuisine'', ''Gardening'', ''Volunteering at senior center (tech workshops)'', ''Book club'', ''Yoga'', ''Meditation'', ''Community theater'', ''Traveling to Vietnam'',
    ''Photography'']'
  career_goals: She aims to advance to a Director of Information Technology role where she can lead digital transformation initiatives for a mid-size organization, champion diversity and inclusion in tech,
    and establish community outreach programs that teach digital literacy to seniors and underserved populations. Zenaida also hopes to mentor the next generation of women and Asian-American professionals
    in the industry.
