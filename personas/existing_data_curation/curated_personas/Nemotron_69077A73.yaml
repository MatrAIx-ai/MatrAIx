personas:
  professional: Zenaida Khuong, a seasoned enterprise IT architect with over twenty years of experience, leverages meticulous project‑management expertise, Python and Java development skills, and a calm,
    structured approach to guide cross‑functional teams through complex digital transformation initiatives while championing inclusive, community‑focused technology programs.
  sports: Zenaida Khuong stays active by tending her vegetable garden and attending weekly yoga classes, while cheering on the Louisville Cardinals basketball team in winter, joining a local senior walking
    club for scenic riverside runs in spring, and playing casual pickleball at the community center on weekends.
  arts: Zenaida Khuong nurtures her creative side by volunteering at the Louisville Community Theatre, where she has performed in productions such as 'A Streetcar Named Desire', capturing backstage moments
    with a DSLR inspired by Annie Leibovitz, and unwinding with evenings listening to the violin virtuoso Yo‑Yo Ma and classic folk singer Bob Dylan.
  travel: Zenaida Khuong prefers meticulously planned journeys that blend cultural immersion with relaxation, such as revisiting the bustling river markets and historic temples of her family’s Southeast
    Asian homeland each summer, while also exploring domestic gems like the lively French Quarter of New Orleans, the artsy streets of Asheville, and the serene gardens of Portland, Oregon during her annual
    autumn getaway.
  culinary: Zenaida Khuong is an adept home chef who delights in preparing an aromatic rice‑noodle broth seasoned with star anise, lemongrass, and a splash of fish sauce, rolling fresh spring rolls filled
    with shrimp, herbs, and crisp vegetables, and perfecting caramelized pork belly, often sourcing heirloom basil and bright chilies from her own garden to elevate family gatherings.
  core: Zenaida Khuong, a detail‑oriented IT leader with a gregarious, compassionate heart, balances structured digital projects with lively community cooking, garden stewardship, and senior‑tech mentorship—though
    she often forgets to water her newly sprouted herbs.
background:
  cultural: Born to Vietnamese immigrants who settled in Louisville, Zenaida grew up navigating a bicultural environment that blended Vietnamese customs—celebrating Tet, speaking Vietnamese at home, and
    preparing family recipes—with Midwestern American values of community service and practicality. She remains actively involved in the local Vietnamese community, attending cultural festivals, supporting
    Vietnamese-owned businesses, and serving as a bridge between her heritage and the broader Louisville community.
