personas:
  professional: Santiago Cortez is a corrections officer who excels at inmate supervision and conflict‑de‑escalation, leveraging his methodical, organized approach and bilingual communication skills to
    produce meticulous reports and mentor new staff, while his competitive streak drives him to consistently exceed safety metrics.
  sports: Santiago Cortez plays center‑midfield for a local amateur soccer league, follows Real Salt Lake in MLS and the Utah Jazz in the NBA, complements his team play with weekly weightlifting sessions
    at a downtown gym and seasonal hikes in the Wasatch Mountains, embodying a disciplined, competitive fitness routine.
  arts: Santiago Cortez channels his attention to detail into building model aircraft and unwinds by listening to classic rock legends like The Rolling Stones and modern indie acts such as Arctic Monkeys,
    while attending the Utah Museum of Fine Arts for contemporary exhibitions and streaming Spanish‑language cinema from directors like Pedro Almodóvar.
  travel: Santiago Cortez plans his vacations with the same precision he applies at work, favoring weekend trips to nearby national parks such as Zion and Bryce Canyon, long‑haul adventures to Barcelona
    for its architecture, and occasional eco‑tourism hikes in Costa Rica, balancing a modest travel budget with a desire for both relaxation and cultural immersion.
  culinary: Santiago Cortez is an intermediate home chef who regularly prepares arepas stuffed with shredded chicken, plantains, and ají, perfects a hearty sancocho using yucca, corn, and beef shank, and
    enjoys experimenting with spice blends like cumin and oregano, while still indulging in fast‑food tacos on busy nights.
  core: Santiago Cortez blends disciplined correctional work with a love for soccer, model aircraft, and midnight taco runs, all while obsessively tracking his savings in a color‑coded spreadsheet and occasionally
    missing a night’s sleep after a tense shift.
background:
  cultural: Santiago was born to Colombian parents and grew up bilingual, immersing himself in Colombian customs, music, and food while also adapting to life in Provo, Utah. He celebrates Colombian holidays
    such as Día de la Independencia and Carnaval with family, and maintains close ties to his extended family through regular video calls. Living in a predominantly LDS community, he respects local traditions
    and participates in community events, blending his Latin American heritage with the mountain‑west culture of Utah County.
attributes:
  skills: '[''Inmate supervision'', ''Conflict de‑escalation'', ''Emergency response procedures'', ''Detailed report writing'', ''Bilingual communication (Spanish/English)'', ''Physical fitness training'',
    ''Crisis management'', ''Procedural compliance'', ''Community liaison'', ''Mentorship of new officers'']'
  hobbies: '[''Soccer'', ''Hiking in the Wasatch Mountains'', ''Cooking Colombian cuisine'', ''Weightlifting'', ''Reading historical biographies'', ''Volunteering at a Spanish‑speaking community center'',
    ''Building model aircraft'']'
  career_goals: Santiago aims to advance to a shift supervisor position within the next two years, leveraging his organizational strengths and reliability. He plans to pursue a master's degree in criminal
    justice to qualify for a training instructor role, where he can develop culturally competent rehabilitation programs for Spanish‑speaking inmates. Long‑term, he aspires to a leadership role in policy
    development at the Utah Department of Corrections, focusing on evidence‑based strategies that improve inmate outcomes while maintaining safety and order.
