  career_goals: Desirae aims to re‑enter the professional world in a role that bridges her technical background with her passion for community engagement and the arts. She is actively exploring positions
    such as STEM outreach coordinator for local schools, science communicator for a regional museum, or consultant for small businesses seeking data‑driven sustainability solutions. In the longer term,
    she envisions establishing a makerspace and community gallery that serves as a hub for interdisciplinary projects, encouraging residents of Fordyce and surrounding towns to experiment with technology,
    visual arts, and environmental stewardship. She also plans to complete a certificate in public engagement and, if the opportunity arises, pursue a graduate credential in science communication. Her ambition
    is to create a career that provides both intellectual fulfillment and tangible benefits for her community while maintaining a flexible schedule that accommodates her personal life.
