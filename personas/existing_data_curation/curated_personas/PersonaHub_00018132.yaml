persona_description: A Canadian historian and author who specializes in the study of immigration and internment during the First World War, particularly the experiences of Ukrainians and other immigrants.
  Her research focuses on the history of Canada's immigration policies and the impact of these policies on the country's population and society. She is also known for her work on the history of internment
  camps in Canada, including the Kapuskasing and Spirit Lake internment camps during the First World War.
