persona_description: A public health researcher who specializes in the study of vitamin K deficiency and its impact on newborn infants in less developed countries. She is particularly interested in the
  incidence of late HDN, the risk factors for this disease, and the feasibility of giving vitamin K prophylaxis along with BCG vaccine. She is also interested in the cost-effectiveness of this intervention
  and its potential impact on the loss of DALYs due to HDN.
