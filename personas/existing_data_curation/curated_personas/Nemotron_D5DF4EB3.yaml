  hobbies: '[''Gardening'',''Southern cooking'',''Knitting circle'',''Historical fiction reading'',''Church choir singing'',''Bridge playing'',''Bird‑watching'',''Attending local festivals'',''Volunteer
    coordination at senior center'']'
  career_goals: Although retired from formal employment, Alice aims to remain an active and valued contributor to her community. She plans to expand her volunteer leadership role at the senior center, develop
    a small‑scale mentorship program for high‑school students interested in culinary arts, and enroll in a lifelong‑learning class on local history at the community college. Alice also aspires to document
    her family’s stories and recipes in a memoir‑style cookbook, preserving Southern culinary traditions for future generations. Maintaining her health and independence is a core ambition, so she seeks
    to stay disciplined with her gardening schedule, attend regular health workshops, and travel occasionally to visit her adult children and grandchildren in neighboring towns.
