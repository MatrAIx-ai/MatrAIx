persona_description: A public health expert with expertise in managing and responding to outbreaks of infectious diseases, particularly in developing countries. This person is knowledgeable in the implementation
  of public health measures, such as active case finding, chemoprophylaxis, and vector control, to control and prevent the spread of plague and other infectious diseases. This individual has experience
  working with national task forces and partners, such as the World Health Organization and the Pasteur Institute of Madagascar, to manage and respond to outbreaks. They are equipped with specialized knowledge
  in epidemiology, public health, and infection prevention and control, and have the ability to analyze and interpret data related to the current outbreak in Madagascar.
