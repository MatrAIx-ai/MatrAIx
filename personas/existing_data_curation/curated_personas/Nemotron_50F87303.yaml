  career_goals: Fernando aims to become a senior partner and practice leader at his firm, expanding the firm's boutique services for family-owned businesses, especially within the Latino community. He intends
    to earn certification as a mediator and launch a pro bono clinic that provides free legal assistance to Spanish‑speaking residents in Oakland County. Over the next five years, he also plans to teach
    part‑time at a local law school, sharing his practical experience with aspiring attorneys and fostering diversity in the legal profession.
