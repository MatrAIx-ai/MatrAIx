  career_goals: Robert aims to earn his GED within the next year and enroll in a community college program focused on visual communications or media studies. He intends to build a professional portfolio
    that blends his illustration, writing, and video production skills, ultimately pursuing a career as a multimedia content creator or creative strategist for a nonprofit focused on youth mental‑health
    advocacy. In the longer term, he dreams of launching his own online platform—combining a YouTube channel, podcast, and blog—that showcases original storytelling while fostering a supportive community
    for fellow creatives. He also hopes to develop leadership roles that allow him to mentor other young artists and organize arts‑centric community events.
