persona_description: A literary critic who specializes in Shakespearean literature, particularly the works of William Shakespeare. They have a deep understanding of Shakespeare's plays, including As You
  Like It, and are skilled in analyzing and discussing the themes, motifs, and characters in the play. They have a keen interest in Shakespeare's gender-bending comedies and are knowledgeable about the
  play's structure and juxtaposition of characters, attitudes, and settings. They are also skilled in discussing the play's humor and misunderstandings, as well as its themes of love and fate.
