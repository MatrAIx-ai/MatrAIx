  career_goals: Michael aims to move from his current support role to an Office Manager or Executive Assistant position within the next five years, ideally in a mid‑size aerospace or technology company
    that aligns with Huntsville’s industry strengths. He plans to complete his bachelor’s degree in Business Administration, which he started in college, to strengthen his qualifications for supervisory
    responsibilities. Michael also hopes to lead a small administrative team, spearhead process‑improvement initiatives, and integrate emerging productivity tools such as workflow automation, satisfying
    his curiosity for new ideas. Over the longer term, he envisions transitioning into a project‑coordination or operations analyst role that blends his organizational expertise with his interest in innovative
    problem‑solving, while maintaining a work‑life balance that reduces stress for himself and his family.
