  hobbies: '[''photography'', ''reading historical nonfiction'', ''cooking'', ''pick-up basketball'', ''listening to jazz and hip-hop vinyl'', ''volunteering with youth mentorship programs'', ''hiking coastal
    trails'', ''playing chess'', ''attending local art exhibitions'', ''writing reflective journal entries'']'
  career_goals: Jordan aims to transition into a detective role that focuses on community-centered investigations, applying his analytical skills and cultural insight to solve cases that affect neighborhoods.
    He plans to pursue a master's degree in criminal justice or public administration to deepen his understanding of policy and reform. In the long term, he aspires to lead a precinct as a captain, champion
    progressive policing strategies, expand youth mentorship programs, and shape departmental training on bias awareness. He also hopes to author a guide on integrating humanities perspectives into law
    enforcement practice.
