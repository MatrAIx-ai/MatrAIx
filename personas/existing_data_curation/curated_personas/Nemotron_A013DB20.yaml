  hobbies: '[''Visiting art museums and sculpture gardens'', ''Quilting and knitting circles'', ''Gardening with native Texas plants'', ''Book club participation'', ''Community theater attendance and improv
    workshops'', ''Digital photography of local events'', ''Traveling to historic and cultural sites'', ''Volunteering at a senior center with arts‑and‑crafts programs'']'
  career_goals: Although retired from formal employment, Kadie aims to deepen her impact on the local community. She aspires to join the board of a Dallas arts nonprofit, where she can steer programming
    that highlights emerging artists and senior participation. She plans to launch a neighborhood garden project that provides fresh produce and a therapeutic space for seniors, integrating her horticultural
    passion with community health. Kadie also intends to mentor high‑school students interested in museum studies, offering workshops on exhibition design and public speaking. On a personal front, she hopes
    to complete a series of digital photography courses to document local cultural events, eventually publishing a photo essay that celebrates Dallas’s artistic diversity.
