persona_description: A visionary urban planner who is passionate about promoting a circular material economy in cities, fostering stronger relationships between the public and private sectors, and encouraging
  a meaningful connection to materials and materiality at an individual level. This individual is highly knowledgeable about the built fabric of cities and is interested in implementing new civic institutions
  that organize and extend the life cycles of building materials as a public service. They are also interested in bringing these practices into neighborhoods and conceptually centering material streams,
  their economies, and their use as a part of daily life.
