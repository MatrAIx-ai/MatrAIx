persona_description: A neuroscientist who is conducting research on the role of exercise in enhancing creativity. She believes that the brain is divided into two major hemispheres, and that the most creative
  people use both sides of the brain together. She is currently experimenting with a new hypothesis that exercise can stimulate creativity by upping the cross-talk between all parts of the brain. She has
  found evidence that the hippocampus, an area important for long-term memory, is also critical for the function of imagination.
