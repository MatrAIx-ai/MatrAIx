  career_goals: Billy aims to advance from teller to assistant branch manager within the next two years, leveraging his strong customer relationships and operational knowledge. He plans to complete a bachelor's
    degree in finance through evening classes to strengthen his qualifications for a branch manager role. In the longer term, he aspires to become a regional trainer, sharing his expertise in customer service
    and fraud prevention with new hires across the district. Alongside his career progression, Billy seeks to mentor younger staff, improve his organizational habits, and eventually transition to a part‑time
    financial literacy instructor at a local community center as he approaches retirement.
