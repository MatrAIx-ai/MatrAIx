personas:
  professional: Larry Hadden, a retired handyman turned senior‑center volunteer coordinator, blends their step‑by‑step carpentry, plumbing, and auto‑maintenance expertise with a laid‑back, flexible attitude
    to orchestrate community events, yet can assertively step in when schedules veer off course.
  sports: Larry Hadden, an avid recreational angler and occasional deep‑sea fisherman, spends their mornings on a canal‑side boat with the local fishing club, backs the Tampa Bay Buccaneers, and keeps fit
    through light gardening, walks, and occasional card‑playing marathons.
  arts: Larry Hadden, a devoted fan of classic‑rock icons like The Rolling Stones and Led Zeppelin, enjoys attending nostalgic concerts, re‑watching timeless films starring John Wayne and Cary Grant, and
    channeling their creativity into building birdhouses and listening to vintage vinyl.
  travel: Larry Hadden favors relaxed road trips, planning their modest Gulf Coast itinerary to visit family in Pensacola, sample fresh shrimp, and explore roadside bait shops and small‑town fairs, while
    leaving plenty of wiggle room for spontaneous detours.
  culinary: Larry Hadden, a modest home cook, frequently grills their own catch of grouper or catfish with lemon‑garlic butter, loves hearty Southern staples like shrimp and grits and a sweet‑and‑spicy
    BBQ spare‑rib glaze, and enjoys the occasional mango‑lime salad for a touch of tropical freshness.
  core: Larry Hadden, a laid‑back yet methodical retired handyman, alternates between meticulous boat maintenance and spontaneous fishing trips, while juggling a soft spot for classic rock and a tendency
    to misplace their glasses during card games.
background:
  cultural: Larry grew up in a working‑class, predominantly white community in the American South during the post‑war era, with family roots tracing back to English and Irish immigrants. He internalized
    traditional values of self‑reliance, modesty, and community participation. After moving to Hollywood in Broward County, he absorbed the laid‑back coastal lifestyle of South Florida, developing an appreciation
    for seafood cuisine and the region’s informal social rhythm. He remains active in his local Protestant church, which serves as a cultural anchor. His background reflects a blend of mid‑century Southern
    blue‑collar culture and the multicultural, sun‑soaked atmosphere of contemporary South Florida.
