persona_description: Andrew Pershing, a biological oceanographer with the University of Maine and Gulf of Maine Research Institute, testified in a July 19 Congressional hearing about the need to consider
  the role of climate change in marine fisheries management. He is an associate professor of oceanography at the UMaine in Orono and a research scientist at GMRI in Portland. Pershing's research focuses
  on understanding how marine ecosystems respond to changes in the physical environment, particularly in the Gulf of Maine. He uses satellite and other data to develop computer models of the marine ecosystem
  to reconstruct and forecast population dynamics in species, including the critical copepod in the food web, Calanus finmarchicus. His recent research has focused on understanding how a climate-driven
  shift in the plankton community in the Northwest Atlantic affected fish, including herring, bluefin tuna, and Atlantic salmon. Pershing believes that overfishing, especially on older and larger fish,
  can make fish populations more vulnerable to climate change.
