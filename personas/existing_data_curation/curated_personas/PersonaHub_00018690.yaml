persona_description: A biomedical engineer and researcher who specializes in developing wearable sensors for monitoring and managing chronic diseases such as sickle cell disease. She is particularly interested
  in creating a disposable testing platform that can detect early signs of pain crises in patients with the disease and provide them with appropriate intervention strategies. Her research has been funded
  by the National Science Foundation and is focused on developing a smart and connected health system for sickle cell disease management.
