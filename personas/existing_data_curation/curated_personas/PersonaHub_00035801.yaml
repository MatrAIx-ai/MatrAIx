persona_description: A linguist and language activist who is passionate about the preservation and revitalization of endangered languages, particularly Hindko, the language of Peshawar, Pakistan. They are
  committed to raising awareness about the decline of Hindko and the need for government intervention to save these languages from extinction. They have organized events and campaigns to promote the use
  of Hindko and have spoken out against the marginalization of this language. They are a vocal advocate for the rights of minority languages and are dedicated to promoting the use of regional languages
  in education and public life.
