personas:
  professional: Donato Melendez, a two‑year‑old aspiring architect who uses wooden blocks to construct orderly towers, demonstrates early planning skills, methodical curiosity, and a calm, reliable approach
    to play.
  sports: Donato Melendez, a two‑year‑old who attends the Sunshine Tots gymnastics class and loves to chase a soft soccer ball at the neighborhood park, proudly sports a San Francisco Giants cap while occasionally
    watching the Giants' games with family, and prefers small‑group playdates to large playground crowds.
  arts: Donato Melendez, a two‑year‑old who hums Raffi's 'Baby Beluga' and squeals with delight at Sesame Street's Elmo, enjoys coloring pages inspired by Pablo Picasso's bold shapes, and giggles whenever
    a Disney classic such as Moana plays, making early artistic appreciation a cornerstone of their daily routine.
  travel: Donato Melendez, a two‑year‑old who relishes family road trips to the nearby Santa Monica beach for sandcastle building, eagerly anticipates weekend visits to Grandma's countryside cottage for
    berry picking, and thrives on short, stroller‑friendly journeys rather than long flights, reflecting a preference for familiar, low‑stress travel experiences.
  culinary: Donato Melendez, a two‑year‑old who prefers soft bites like cheesy macaroni, banana slices, and avocado mash, shows budding enthusiasm for stirring oatmeal with a plastic spoon, yet often refuses
    broccoli and has a quirky habit of smearing yogurt on everything, making meals a playful negotiation of flavor and texture.
  core: Donato Melendez, a methodical two‑year‑old who balances relentless curiosity with a love for orderly routines, is notorious for meticulously arranging toy cars in perfect rows, smearing yogurt on
    walls when distracted, and insisting on a nightly story before sleep despite occasional stubbornness.
background:
  cultural: Donato is raised in a Mexican‑American household in Des Moines, Iowa. He hears Spanish at home and English in the community, fostering bilingual development. Family traditions such as making
    tamales, celebrating Día de los Muertos with simple crafts, and sharing weekend tacos are integrated into his routine, while his everyday life reflects Midwestern customs like attending local community
    events and engaging with nearby parks. This blend of Mexican cultural values—family closeness, respect for elders, and celebration of heritage—and the broader American environment shapes his worldview
    and daily experiences.
