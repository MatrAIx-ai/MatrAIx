  career_goals: At two years old, Donato’s ambitions are expressed through play. He frequently points to fire trucks and says he wants to be a fireman, showing an early desire to help and protect. He also
    cares for stuffed animals, hinting at a future interest in nurturing or caregiving roles, and enjoys imitating adult tasks such as helping set a toy table.
