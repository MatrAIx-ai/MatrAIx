    Office, email, social media)'', ''basic graphic design (Canva)'', ''event coordination for store promotions'']'
  hobbies: '[''community theater acting and backstage work'', ''karaoke hosting'', ''swing dancing'', ''hiking and nature photography'', ''cooking and recipe experimentation'', ''hosting potluck gatherings'',
    ''home-brewing craft sodas'', ''reading contemporary fiction and self-help books'', ''podcast listening (entrepreneurship, personal growth)'', ''volunteering at the animal shelter (event organization)'',
    ''board-game nights'', ''learning guitar chords'']'
  career_goals: Meredith aims to translate her frontline experience into a leadership role within the retail sector. In the next 12-18 months she plans to complete a Retail Management certification and
    seek a shift-supervisor position at her current store. Concurrently, she intends to finish her bachelor's degree in Business Administration part-time, focusing on courses in marketing and entrepreneurship.
    Over the next five years, she envisions moving into an assistant-manager or store-manager role, where she can mentor staff and shape customer-experience strategies. Ultimately, she aspires to launch
    a community-focused café or boutique in Woodbourne that serves as a gathering spot for local events, leveraging her knack for organization, social engagement, and digital promotion. She also hopes to
    become involved with the Sullivan County tourism board, helping promote outdoor activities and local arts.
