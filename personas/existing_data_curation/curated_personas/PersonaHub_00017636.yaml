persona_description: A biologist who specializes in the study of embryology and development of the nervous system, particularly in the context of the mouse pituitary gland. He/she is interested in the development
  of the neuro-ectodermal union and the formation of the nervous lobe, and is familiar with the role of mechanical influences and differential growth in the process. The persona is likely to have a deep
  understanding of the general embryology of the mammalian gland and is skilled in recording and interpreting the development of various points.
