persona_description: A historian specializing in the study of American Indian history and education, particularly focusing on the development and impact of Indian boarding schools and orphanages. She is
  knowledgeable about the complex cultural conflicts and resourcefulness of Indian adaptations, and has a deep interest in the social and educational history of the Great Plains region. She is also likely
  to be familiar with the Indian Child Welfare Act and the challenges faced by Indian children in the twentieth century.
