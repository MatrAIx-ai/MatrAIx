  career_goals: He aims to move into a senior director role where he can shape the strategic direction of operations for a larger regional network. In the next five years he wants to lead a cross‑functional
    team focused on sustainability initiatives, reducing waste and carbon footprint in the supply chain. He also hopes to start a part‑time consulting practice to mentor emerging managers, leveraging his
    calm, pragmatic approach. Balancing work with personal stability after his divorce, he seeks a role that offers flexibility and work‑life balance.
