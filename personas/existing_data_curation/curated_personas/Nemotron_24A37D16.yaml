personas:
  professional: Nordia Frias is an aspiring registered nurse and current nursing assistant who blends meticulous vital‑sign monitoring and EMR expertise with a curious, art‑infused approach to patient advocacy,
    often improvising culturally resonant comfort measures while navigating the spontaneous challenges of a busy community health clinic.
  sports: Nordia Frias enjoys early‑morning runs through the Sutherland Trail as a member of the Iowa City Women’s Running Club, attends Hawkeye football games for camaraderie, and occasionally joins a
    recreational co‑ed volleyball league at the university gym, balancing spontaneous outdoor hikes with weekend soccer matches for the local community club.
  arts: Nordia Frias curates a vibrant personal playlist featuring Nina Simone, Miles Davis, and Kendrick Lamar while sketching watercolor vistas of Iowa’s cornfields, frequently attending poetry nights
    that showcase spoken‑word artists like Rudy Francis and drawing inspiration from visual masters such as Georgia O’Keeffe and Jacob Lawrence.
  travel: Nordia Frias favors spontaneous day trips to the nearby Maquoketa Caves State Park and weekend getaways to Effigy Mounds, while dreaming of a culturally rich immersion in New Orleans and a reflective
    retreat at the historic Amana Colonies, planning her journeys on a shoestring budget with a mix of student discounts and last‑minute bus deals.
  culinary: Nordia Frias delights in blending Southern soul‑food flavors with Midwestern produce, often cooking shrimp‑and‑grits topped with locally sourced sweet corn and collard greens tossed with fresh
    kale, while experimenting with an apple‑butter glaze on fried chicken and mastering the art of corn‑bread with jalapeño cheddar.
  core: Nordia Frias is a 20‑year‑old future community health nurse whose curiosity for art fuels a spontaneous, introspective life that balances compassionate patient care with occasional financial worry
    and a penchant for quiet creativity.
background:
  cultural: Nordia was raised in a close‑knit African‑American family that moved to Iowa City from the South when her parents sought teaching jobs. Family gatherings were centered around music, storytelling,
    and Southern-inspired cooking, while her mother emphasized the importance of education and community service. Growing up as one of the few Black teenagers in a predominantly White Midwestern town, Nordia
    developed a strong sense of cultural pride and an acute awareness of racial dynamics in healthcare. She remains active in the local Black Student Union at the University of Iowa, volunteers at the community
    health clinic that serves predominantly Black neighborhoods, and celebrates cultural traditions such as Juneteenth and Kwanzaa with friends and family. These experiences inform her commitment to culturally
    competent care and to uplifting Black voices in the medical field.
attributes:
  skills: '[''Patient care and hygiene assistance'', ''Vital signs measurement'', ''Electronic medical record documentation'', ''Infection control and safety protocols'', ''Basic wound care assistance'',
    ''Empathetic communication and active listening'', ''Cultural competency'', ''Spontaneous problem‑solving in clinical settings'', ''Adaptability in fast‑paced environments'', ''Team collaboration and
    assertive advocacy'']'
  hobbies: '[''Watercolor sketching of landscapes'', ''Visiting local art museums and galleries'', ''Listening to jazz, neo‑soul, and hip‑hop'', ''Experimenting with cooking fusion recipes'', ''Spontaneous
    hikes in Iowa state parks'', ''Guided meditation and journaling'', ''Participating in community drumming circles'', ''Reading social‑justice oriented fiction'']'
  career_goals: Her immediate goal is to complete her Registered Nurse licensure within the next two years while earning a Bachelor of Science in Nursing at the University of Iowa. Long‑term, Nordia aspires
    to specialize in community health nursing, focusing on Black and low‑income populations in the Midwest. She hopes to integrate her love of art into patient care by developing a pilot art‑therapy program
    for stress‑reduction in the Iowa City hospital setting. Additionally, she plans to mentor younger Black students entering health‑care fields, serving on advisory boards that promote cultural competence
    in clinical education. Ultimately, Nordia envisions a career where clinical excellence, creative healing, and social advocacy intersect.
