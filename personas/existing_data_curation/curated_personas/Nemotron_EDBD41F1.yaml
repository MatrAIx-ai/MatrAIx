personas:
  professional: Maria Loboguerrero is a budding architect in the sandbox, meticulously stacking blocks while quietly exploring cause-and-effect, balancing their curiosity with a practical focus on stability.
  sports: Maria Loboguerrero enjoys the gentle rhythm of toddler yoga classes on Saturday mornings, loves kicking a soft foam soccer ball while copying moves of their favorite local team City FC, and prefers
    solitary play in the backyard over crowded playgrounds.
  arts: Maria Loboguerrero delights in the animated songs of Disney's "Frozen", often humming Elsa's "Let It Go", and collects picture books illustrated by Eric Carle, which fuel their quiet sketch sessions
    with crayons.
  travel: Maria Loboguerrero has visited the family cottage by a lake in the mountains, spent a weekend at a seaside resort in Florida, and dreams of the colorful streets of Barcelona's Park Güell, though
    their travel plans are often limited by nap schedules.
  culinary: Maria Loboguerrero prefers soft mac and cheese with extra cheddar, dips carrot sticks in hummus when persuaded, and enjoys helping stir the batter for banana muffins, yet they famously refuse
    broccoli, claiming it "looks like tiny trees".
  core: Maria Loboguerrero's world is a quiet, organized playground of curiosities and gentle worries, where solitary exploration and caring gestures coexist with a stubborn refusal to eat green veggies.
background:
  cultural: Maria’s household is rooted in Mexican cultural traditions. Spanish is spoken alongside English, and her family celebrates holidays such as Día de los Muertos and Las Posadas with homemade foods
    like tamales and pan de muerto. She enjoys listening to traditional Mexican lullabies and dances while also participating in local events in Searcy, Arkansas, like community storytimes at the public
    library. Her upbringing blends Mexican family values—respect for elders, close‑knit family ties—with the small‑town rhythms of her Arkansas community.
