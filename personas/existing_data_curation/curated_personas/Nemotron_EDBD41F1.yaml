  career_goals: Although only three, Maria often talks about wanting to help others when she grows up. She imagines becoming a teacher who can share stories and guide little children, or a veterinarian
    who cares for animals. Her practical curiosity and love for quiet, organized tasks shape a future goal of working in a calm, caring environment where she can use her empathy and problem‑solving skills.
    She sometimes worries about being away from her mother, which fuels her desire to create safe, nurturing spaces for others.
