personas:
  professional: Ann Moylan, a retired small‑business owner and former Chamber of Commerce board member, leverages her bookkeeping expertise and meticulous event‑planning skills to mentor budding entrepreneurs,
    organize fundraising galas for the senior center, and keep a color‑coded calendar that steadies her nerves about deadlines.
  sports: Ann Moylan enjoys walking the historic river trail, participates in senior‑center line‑dance classes, bowls with the local league on Wednesdays, and cheers passionately for the Chicago Cubs, attending
    games with her bridge group whenever possible.
  arts: Ann Moylan expresses creativity through weekly church choir rehearsals, knitting intricate blankets for charity, and devouring historical novels by Ken Follett while listening to folk legends like
    Joan Baez and admiring the impressionist works of Claude Monet in local museum tours.
  travel: Ann Moylan prefers structured group tours that blend genealogy research with gentle sightseeing, such as a recent week‑long trip to the Irish countryside tracing family roots, and weekend drives
    to nearby Starved Rock State Park, while avoiding spontaneous trips that could trigger her anxiety about health and logistics.
  culinary: Ann Moylan delights in cooking herb‑infused chicken soup, roasting root vegetables seasoned with garden thyme and rosemary, and baking classic apple pie, often harvesting fresh herbs from her
    prairie‑flower garden to enhance each dish.
  core: Ann Moylan is a community‑oriented octogenarian who balances meticulous planning with a love of knitting, gardening, and occasional over‑checking of spreadsheets driven by a gentle undercurrent
    of worry.
background:
  cultural: Ann was born in a modest farming family in western North Dakota, with roots tracing back to German and Scandinavian (primarily Norwegian) immigrants who settled the region in the early 1900s.
    The area’s Lutheran heritage, emphasis on self‑reliance, and tight‑knit community values deeply influenced her upbringing. She grew up participating in church socials, county fairs, and neighborhood
    barn‑raising events, fostering a strong sense of duty, neighborliness, and respect for tradition that continues to shape her identity.
