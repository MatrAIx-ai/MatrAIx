persona_description: A woman who is deeply concerned about the health and well-being of her community and is passionate about advocating for marginalized groups. She is a mother of two and has struggled
  with high infant and maternal mortality rates in her community. She is motivated to improve the health outcomes of black women and their infants by providing continuous, proper care and dispelling the
  endemic racial biases. She is a doulas and works with organizations that cater specifically to the needs of black mothers to provide continuous, proper care and support to them. She is dedicated to the
  cause and is willing to do whatever it takes to make a difference in her community.
