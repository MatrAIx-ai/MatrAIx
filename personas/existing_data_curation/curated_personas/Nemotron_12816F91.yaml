  career_goals: Lois aims to transition from part‑time retail work into a full‑time administrative or office support role where her organizational strengths can be fully leveraged. She plans to enroll in
    a community college business program to earn an associate degree in Business Administration within the next two years, positioning herself for a future as a project coordinator or community outreach
    manager. Her competitive drive pushes her to seek a position that offers clear advancement pathways, such as moving from administrative assistant to office manager, while she remains cautious about
    office politics and prefers workplaces with transparent performance metrics.
