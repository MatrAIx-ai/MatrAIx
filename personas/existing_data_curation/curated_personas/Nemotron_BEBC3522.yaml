  career_goals: Justin aims to advance to a senior HR leadership role, such as HR Director or Senior HR Business Partner, within the next five years. He plans to earn the SHRM‑SCP credential to deepen his
    strategic expertise and to lead a company‑wide workforce‑planning initiative that aligns talent development with business growth. A key ambition is to champion an inclusive workplace culture that balances
    employee well‑being with productivity, including launching a mentorship program for early‑career professionals. Long‑term, he envisions consulting for mid‑size organizations to help them build harmonious,
    resilient HR systems.
