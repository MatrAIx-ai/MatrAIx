  hobbies: '["Structured gardening with seasonal planning","Traditional Puerto Rican cooking and recipe experimentation","Weaving manta blankets","Church choir participation","Listening to plena and bomba
    music","Reading Caribbean historical fiction","Crossword puzzles","Organizing family storytelling evenings"]'
  career_goals: Although retired from formal employment, Annelise is intent on channeling her organized skill set into mentoring and cultural preservation. She aims to lead a senior‑focused program at the
    local community center, teaching budgeting and practical home‑management to younger residents. She plans to compile a family‑recipe cookbook that documents traditional dishes and the stories behind
    them, ensuring her culinary heritage endures. Annelise also aspires to document her family’s genealogy, creating a written record for future generations. By organizing a modest cultural exchange between
    Cayey and a town in the Dominican Republic, she hopes to showcase Puerto Rican traditions while fostering healthy competition in community events. Ultimately, her ambition is to remain a reliable pillar
    of support for her extended family while maintaining her independence.
