personas:
  professional: Annelise Montalvo, a retired municipal cooperative clerk turned community mentor, leverages their bookkeeping and event coordination expertise to run senior budgeting workshops, applying
    their meticulous monthly budget sheets and vendor negotiation skills to empower younger residents.
  sports: Annelise Montalvo follows the local senior softball club, the Cayey Golden Gloves, playing weekly matches in the spring, while cheering for the Boston Red Sox in baseball and the Miami Heat in
    basketball, and they make a point to walk their garden paths briskly each morning as their primary cardio routine.
  arts: Annelise Montalvo enjoys listening to the rhythmic beats of plena and bomba, with favorites like Ismael Rivera and Rafael Cortijo, participates in the church choir where they sing hymns by Frances
    Allitsen, and they keep a small collection of paintings by local artist José Varela that inspire their weaving patterns.
  travel: Annelise Montalvo prefers short, well-planned trips that blend cultural immersion with family visits, having recently toured the historic sites of Cartagena, Colombia, and planning a future pilgrimage
    to the Santo Domingo Cathedral, while they often choose to stay in nearby seaside cabins during off-season to avoid crowds.
  culinary: Annelise Montalvo masters traditional dishes such as arroz con gandules, pasteles, lechón, and sofrito, seasoning each with fresh cilantro, garlic, and adobo from their garden, and they experiment
    with low-fat variations by swapping pork shoulder for turkey, always serving generous portions to neighbors during community potlucks.
  core: Annelise Montalvo is a disciplined gardener-chef-mentor who blends meticulous budgeting with Afro-Caribbean rhythms, a competitive spirit, and a penchant for perfecting manta blankets, all while
    navigating senior health challenges and occasional forgetfulness.
background:
  cultural: Annelise is a third‑generation Puerto Rican from Cayey, a town known for its mountainous terrain and close‑knit community. Raised in a devout Catholic household, she celebrates the Fiestas Patronales,
    attends Mass regularly, and participates in local processions. Her family’s roots trace back to early 20th‑century sugarcane plantations, and she grew up speaking Spanish at home while learning English
    in school, giving her a bilingual edge. She embraces the island’s Afro‑Caribbean musical heritage, particularly plena and bomba, and maintains traditional culinary practices that emphasize family togetherness
    (familismo). While she values the structured rhythms of rural life, she remains flexible enough to incorporate modern influences from relatives living abroad, especially in New York, blending classic
    customs with contemporary perspectives.
attributes:
  skills: '["Household budgeting and expense tracking","Basic bookkeeping and ledger maintenance","Traditional Puerto Rican cooking","Year‑round tropical gardening","Community event coordination and volunteer
