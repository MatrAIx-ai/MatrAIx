  career_goals: Although still a toddler, Jean frequently expresses a desire to "make pictures for Mommy" and "be nice to friends," hinting at an early aspiration to help others and create beauty. As she
    grows, she is likely to be drawn toward roles that blend caregiving with artistic expression, such as becoming a preschool teacher, a community arts coordinator, or a pediatric caregiver who uses music
    and art to comfort children. She also dreams of contributing to local community events, especially those celebrating art and togetherness.
