personas:
  professional: Jean Morris, a precocious two-year-old who delights in lining up crayons by color before spontaneous doodling, already shows a nascent fascination with patterns that hints at a future career
    in design or data organization, balancing meticulous sorting with creative free-form expression, and they often soothe upset peers with gentle hugs despite occasional intense tears over misplaced toys.
  sports: Jean Morris, a budding fan of the Atlanta Falcons and Georgia Bulldogs, pretends to throw a football in the backyard, attends weekly toddler soccer sessions at the Ellijay Recreation Center, and
    they cheer loudly when their team scores on a tiny TV, though they shy away from crowded stadiums and prefer small, familiar play groups.
  arts: Jean Morris, who loves the lilting strains of local Appalachian fiddlers like The Soggy Bottom Boys and the vivid quilts displayed at the Ellijay Folk Art Festival, spends afternoons finger-painting
    apple orchard scenes and they idolize the whimsical storytelling of Pixar's Coco while clutching a well-worn picture book of folk tales.
  travel: Jean Morris, who has already enjoyed a family hike through the Blue Ridge Mountains for leaf-peeping, a weekend sand-filled adventure at Tybee Island, and dreams of visiting Disney World's Magic
    Kingdom, prefers short car rides with a favorite stuffed rabbit, and they often become overwhelmed by new environments unless accompanied by a trusted adult.
  culinary: Jean Morris, with a growing palate for sweet apple slices from the local Apple Festival, creamy mac and cheese, and bite-sized chicken nuggets, can reliably spread peanut butter on toast with
    a miniature plastic knife, yet they stubbornly reject broccoli and often throw a tantrum if vegetables appear on the plate.
  core: Jean Morris, a curious and tender-hearted two-year-old who balances meticulous crayon sorting with spontaneous play, soothes peers with hugs, but can spiral into intense tears over small setbacks,
    making them both a delight and a delicate bundle of youthful wonder.
background:
  cultural: Jean is raised in Ellijay, Georgia, a small town nestled in the Appalachian foothills of Dawson County. Her family’s white Southern Appalachian heritage emphasizes close‑knit community ties,
    frequent church gatherings, and seasonal festivals like the local Apple Festival. Traditional values of hospitality, modesty, and mutual support are woven into daily life. Exposure to regional folk
    art, quilting, and local music nurtures her appreciation for creative expression, while the rural setting encourages a love of nature and simple, community‑focused activities.
