personas:
  professional: Frank Obrien, a newborn explorer, approaches each visual stimulus with an analyst’s eye, meticulously tracking high‑contrast mobiles and kinetic toys while balancing a strict nap‑and‑feed
    schedule with the flexibility to experiment with unconventional sensory rings, and they already show a competitive streak to be the first to grasp a rattle.
  sports: Frank Obrien’s early fitness regimen centers on daily tummy‑time, weekly infant swim lessons at the local Aquatic Center, and stroller walks to cheer on the nearby minor‑league baseball team,
    the Springfield Sluggers, and they often try to be the first to surface during swim class, reflecting a budding competitive spirit despite their reserved demeanor.
  arts: Frank Obrien is soothed by the gentle strains of Debussy’s ‘Clair de Lune’ and classic piano lullabies, while a pastel mobile crafted by artist Maya Lin stimulates their visual curiosity, and they
    find a quiet, deep connection to music and visual art even at this early age.
  travel: Frank Obrien’s travel record includes a scenic road trip along California’s Pacific Coast Highway to the Monterey Bay Aquarium, a weekend family cabin stay near the Grand Canyon, and a brief airline
    flight to visit grandparents in Denver, all organized with meticulous packing lists yet flexible feeding schedules, and they enjoy the rhythmic motion of car journeys as a calming backdrop.
  culinary: Frank Obrien prefers organic, lactose‑free formula, enjoys spoon‑fed pureed carrots, sweet potatoes, and applesauce, delights in occasional homemade avocado mash, and they are fed in a calm,
    dimly lit environment to reduce overstimulation and stress.
  core: Frank Obrien is a newborn whose keen curiosity, early competitive drive for the warmest bottle, and tendency toward worry shape a quiet, meticulously organized yet flexible worldview.
background:
  cultural: Frank grows up in the predominantly Hispanic neighborhood of Pacoima, Los Angeles, within a white American family that values self-reliance, modesty, and personal responsibility. His cultural
    upbringing blends middle‑class suburban values with exposure to the vibrant local arts scene, community centers, and multicultural influences of Southern California. He is raised with a secular outlook
    but retains an appreciation for the community’s diverse traditions, which shapes his artistic sensibility and his cautious yet open‑minded worldview.
