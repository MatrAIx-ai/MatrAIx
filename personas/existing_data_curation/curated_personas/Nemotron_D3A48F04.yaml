  career_goals: Nelson aims to transition from primarily field work to a supervisory and entrepreneurial role within the next five years. He plans to obtain a Texas electrical contractor’s license, launch
    his own small contracting firm that specializes in renewable‑energy retrofits and smart‑home upgrades, and build a steady stream of maintenance contracts to ensure a stable retirement income. Additionally,
    he wishes to mentor apprentices through a partnership with a local trade school, sharing both his technical knowledge and his outgoing, collaborative approach to teamwork.
