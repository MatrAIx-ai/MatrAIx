personas:
  professional: Nelson Lujan, a seasoned journeyman electrician with over three decades of residential and light‑commercial wiring experience, merges deep NEC expertise with recent solar photovoltaic and
    home‑automation design skills, and their talkative, hands‑on style keeps crews motivated even when project schedules shift unexpectedly, though they sometimes wrestle with keeping paperwork organized
    and meeting strict deadlines.
  sports: Nelson Lujan, a devoted fan of Texas high‑school football, tailgates at Friday night games cheering on the local Longhorns, spends early mornings fishing on Lake Sam Rayburn as a member of the
    Texas Bass Anglers Club, and in hunting season they track deer with the Lone Star Bowhunters, occasionally missing practice sessions due to work overload.
  arts: Nelson Lujan, an avid acoustic guitarist, regularly performs at his church’s social gatherings where they strum classic songs by Willie Nelson and play salsa rhythms inspired by Celia Cruz, and
    they dance enthusiastically at local Latin dance nights to the beats of Marc Anthony and Tito Puente, often improvising lyrics to entertain the crowd.
  travel: Nelson Lujan, who prefers road‑trip planning over last‑minute bookings, often drives his pickup to the Texas Hill Country for weekend hunting, has road‑tripped to the Gulf Coast for fresh seafood,
    and dreams of a fishing charter in the Florida Keys, though budgeting constraints sometimes delay longer vacations.
  culinary: Nelson Lujan, a culinary enthusiast, prepares ropa vieja with slow‑cooked flank steak and lechón seasoned with garlic, orange, and cumin, pairs the meals with homemade arroz con gandules, loves
    grilling catfish on the lake, and frequently experiments with homemade hot sauce using habanero and cilantro.
  core: Nelson Lujan blends seasoned electrical expertise with a love for music, food, and the outdoors, navigating the tension between meticulous planning and spontaneous fun, all while keeping a talkative,
    community‑focused spirit at the heart of everything.
background:
  cultural: Nelson was born to Cuban immigrants who settled in Texas during the 1970s. Growing up in a bilingual household, he absorbed the values of resilience, hospitality, and strong family ties that
    are central to Cuban culture. He celebrates traditional holidays such as Carnaval and holds a deep respect for Catholic rituals, which he observes through weekly Mass and community service at his parish.
    Living in Harker Heights, he blends his Caribbean roots with the Texan ethos of independence and neighborliness, often acting as a cultural bridge by organizing multicultural events that showcase Cuban
    music, food, and dance alongside local Texas traditions.
