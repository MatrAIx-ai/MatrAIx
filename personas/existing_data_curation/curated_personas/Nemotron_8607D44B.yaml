personas:
  professional: Gary Johnson, a 10‑year‑old Little League catcher, channels his love of detailed LEGO builds into meticulous game‑day preparation, applying strategic thinking from chess and Minecraft to
    lead his teammates in batting drills while balancing his innate need for routine with occasional improvisation when the coach changes the lineup, and they thrive on the structure of practice.
  sports: Gary Johnson is a Little League baseball enthusiast who idolizes the Dallas Cowboys and the Texas Rangers, spends Saturday mornings fishing at Lake Lavon with his dad, and proudly sports a McKinney
    High School Bulldogs cap during community fairs, embodying the town’s modest competition and love for outdoor team sports, and they always look forward to the next game.
  arts: Gary Johnson immerses himself in adventure novels like the Hardy Boys, builds intricate LEGO sets themed after Star Wars, streams country hits from Garth Brooks and pop tracks by Taylor Swift while
    playing Minecraft, and watches family‑friendly movies featuring Tom Hanks, all of which feed his competitive but routine‑loving imagination, and they often create fan‑art sketches of their favorite
    characters.
  travel: Gary Johnson prefers short family road trips to nearby attractions such as the Texas State Fair in Dallas and the historic Fort Worth Stockyards, but dreams of a summer camping adventure in Yellowstone,
    planning each outing with a detailed checklist that mirrors his LEGO instruction‑following habit while balancing his occasional worry about getting lost, and they keep a travel journal to record each
    stop.
  culinary: Gary Johnson favors classic kid‑friendly meals like pepperoni pizza with extra cheese, chicken nuggets with honey‑mustard, and homemade tacos seasoned with cumin and cilantro, often helping
    his dad grill burgers on the backyard grill while carefully arranging each ingredient like a LEGO brick for perfect flavor symmetry, and they savor the satisfaction of a well‑organized plate.
  core: Gary Johnson is a routine‑driven 10‑year‑old who blends a competitive love of baseball, LEGO precision, and strategic gaming with occasional over‑worry, making them a meticulous yet spontaneous
    kid navigating school, sports, and family life, and they often surprise themselves with bursts of spontaneous creativity.
background:
  cultural: Gary was raised in a middle‑class white family in McKinney, Texas, a suburban community in Grayson County. His family participates in local traditions such as community fairs, Fourth of July
    fireworks, and occasional church gatherings, reflecting the region's blend of Southern hospitality and Texan pride. The area’s emphasis on outdoor activities, high school football culture, and country
    music influences his love for baseball, fishing, and communal events. These surroundings foster a practical, routine‑oriented upbringing that values self‑reliance, modest competition, and strong family
    ties.
