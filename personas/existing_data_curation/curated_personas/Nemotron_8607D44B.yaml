  hobbies: '["Little League baseball", "LEGO building", "Strategy video gaming", "Adventure book reading", "Chess", "Fishing with family", "Baseball card collecting", "Simple home repair projects"]'
  career_goals: Gary dreams of pursuing a career that blends his love for hands‑on problem solving with his competitive spirit. He frequently imagines becoming a mechanical engineer or automotive technician
    who designs and repairs machines, attracted by the clear steps and tangible outcomes of such work. He also nurtures a goal of playing baseball at a higher level, hoping to join a varsity team as he
    gets older. In the short term, he sets concrete milestones such as winning the school science fair, improving his baseball batting average, and mastering basic coding through kid‑friendly platforms,
    seeing these achievements as stepping stones toward a future in engineering or professional sports.
