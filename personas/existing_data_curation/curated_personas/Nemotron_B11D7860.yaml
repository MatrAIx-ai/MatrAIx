  hobbies: '[''coloring and drawing'', ''reading picture books about animals and space'', ''jigsaw puzzles'', ''building with LEGO Duplo'', ''pretend play as doctor or chef'', ''collecting shells and rocks'',
    ''sing-alongs and dance'', ''watching educational TV shows'']'
  career_goals: Edith dreams of one day becoming a teacher so she can share her love of learning and help younger children explore new ideas, while also imagining herself as a veterinarian caring for the
    many animals she sees at local parks and farms. She is eager to develop her organized, methodical nature to create supportive classroom environments and to use her compassionate side to nurture pets
    and wildlife. Though still five, she often talks about caring for animals, reading books about space, and helping her mother bake, showing early signs of the ambition to combine curiosity with practical,
    caring professions.
