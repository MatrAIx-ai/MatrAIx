personas:
  professional: Edith Bowen, a five-year-old preschool class organizer, demonstrates early leadership by methodically arranging play stations and guiding peers through simple science experiments, balancing
    curiosity about how things work with a practical step‑by‑step approach, while they assert themselves when enforcing tiny rules and feel anxiety when routines are altered.
  sports: Edith Bowen, a five‑year‑old who energetically joins the neighborhood kids’ soccer team in spring, attends a beginner gymnastics class in summer, proudly wears a miniature Chicago Cubs cap while
    cheering on the team, and prefers short bursts of running and hopping over long, structured workouts, though they sometimes feel uneasy when the game’s schedule changes.
  arts: Edith Bowen, a five‑year‑old fan of Sesame Street and the musical soundtrack of Disney’s Frozen, delights in drawing vibrant scenes inspired by Dr. Seuss and listening to Raffi’s ‘Baby Beluga’,
    shaping her playful identity through early exposure to storytelling and music, and they love to perform mini‑concerts for family with toy instruments.
  travel: Edith Bowen, a five‑year‑old adventure seeker, loves weekend trips to Grandma’s farm in the rolling hills, day‑long excursions to the local aquarium, and harbors an eager wish to see the neon
    lights of Tokyo Disneyland, preferring spontaneous playground discoveries while they feel uneasy on long car rides.
  culinary: Edith Bowen, a five‑year‑old budding chef, enjoys assembling peanut‑butter‑and‑jelly sandwiches, slurping spaghetti with marinara sauce, and sipping strawberry‑banana smoothies, proudly ‘helps’
    stir batter with a plastic spoon yet they often sneak extra cheese onto their macaroni, and they adore the taste of honey‑glazed carrots.
  core: Edith Bowen is a meticulously curious five‑year‑old who balances methodical play with vivid imagination, yet they frequently wrestle with intense anxiety that turns ordinary setbacks into dramatic
    meltdowns.
background:
  cultural: Edith is raised in Lake Charles, Louisiana, within a white Southern family that embraces the region's Cajun and Creole cultural traditions. Her home life includes family gatherings around classic
    Louisiana dishes such as gumbo, jambalaya, and beignets, and she often hears French-derived phrases and Cajun music during community celebrations like Mardi Gras and local fish fries. She attends a
    nearby preschool that incorporates local history and nature walks along the Calcasieu River, and her family participates in church events and holiday festivals that emphasize close community ties and
    hospitality.
attributes:
  skills: '[''letter recognition'', ''reading simple sight words'', ''counting to 20'', ''basic addition'', ''drawing and coloring'', ''cutting with safety scissors'', ''building with LEGO Duplo'', ''sorting
