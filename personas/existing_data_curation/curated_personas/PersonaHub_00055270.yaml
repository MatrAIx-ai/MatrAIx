persona_description: A policy maker and advocate for free trade, particularly in the areas of technology and medicine, who is concerned about the potential loss of American jobs to foreign competition.
  They are skeptical of the argument that free trade is based on assumptions that were made when British economist David Ricardo first argued the concept of free trade and "comparative advantage." They
  believe that the new reality in the global economy requires new thinking and solutions, and that job retraining and tax incentives for companies are not the answer. They advocate for an honest debate
  about the state of the economy and where we are headed as a nation, and propose that America's trade agreements reflect the new reality.
