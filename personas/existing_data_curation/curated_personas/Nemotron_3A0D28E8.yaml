  hobbies: '["drawing and coloring", "building block constructions", "listening to mariachi and pop music", "dancing", "exploring backyard garden", "playing catch and soccer", "participating in family celebrations"]'
  career_goals: He imagines becoming an artist who paints bright murals that tell stories, perhaps one day designing a community art space. He also dreams of being an astronaut exploring space, driven by
    his love of new ideas. As he grows, he hopes to help other kids learn to read and speak both Spanish and English, reflecting his own experience.
