personas:
  professional: A budding mini‑entrepreneur, Rafael delights in setting up pretend lemonade stands on the backyard patio, crafting colorful price tags and bartering with neighborhood friends, and they channel
    their curious mind, organized approach, and outgoing energy into balancing the play‑book of order and spontaneous fun.
  sports: Rafael, a lively five‑year‑old, darts around the park playing soccer with the Tiny Tykes Soccer Club, swings a bat for the Eastside Little League baseball team, and cheers loudly for the New York
    Yankees on TV, turning each day into a burst of running, climbing, and friendly competition, and they relish the camaraderie of team sports.
  arts: Rafael, a curious five‑year‑old, creates vivid finger‑paint masterpieces while humming melodies from Disney's Frozen, recites Dr. Seuss verses with gusto, and watches Sesame Street's Elmo dance,
    weaving these artistic experiences into a bright, imaginative world, and they often share their creations with friends.
  travel: Rafael, an adventurous five‑year‑old, has already built sandcastles on Clearwater Beach, stared in awe at the towering cliffs of the Grand Canyon on a family road trip, enjoyed the flashing lights
    of Disneyland, and now dreams of spotting the Eiffel Tower glitter in Paris, and they eagerly talk about these trips with anyone who will listen.
  culinary: Rafael, a food‑loving five‑year‑old, devours cheesy macaroni, meticulously spreads peanut butter and jelly on soft bread, proudly whips up banana‑berry smoothies using a small whisk, masters
    stirring pancake batter with a wooden spoon, though they sometimes sneak extra chocolate chips when Mom isn’t looking, and they love sharing bites with siblings.
  core: Rafael, a curious five‑year‑old explorer, blends boundless energy with meticulous block‑building, occasional sticker‑hoarding, and a lovable habit of turning bedtime stories into impromptu debates,
    and they never miss a chance to ask why.
background:
  cultural: Rafael is raised in a Mexican‑American household where both Spanish and English are spoken daily. His family honors traditions such as Día de los Muertos, Cinco de Mayo, and communal meals featuring
    tacos, tamales, and fresh fruit from the Yakima orchards. He participates in local cultural festivals and learns about his heritage through stories, music, and the vibrant colors of Mexican art, while
    also experiencing the Pacific Northwest agricultural community that surrounds his hometown.
attributes:
  skills: '["drawing simple shapes", "coloring with vivid palettes", "bilingual (Spanish‑English) verbal communication", "basic counting (1‑10)", "asking explanatory questions", "cooperative group play",
