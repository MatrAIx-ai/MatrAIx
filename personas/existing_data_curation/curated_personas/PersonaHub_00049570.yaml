persona_description: A geneticist who specializes in the study of ocular genetics, particularly the inheritance patterns of primary glaucoma. Her research interests include the role of genetics in the pathophysiology
  of glaucoma and the development of new diagnostic and therapeutic approaches to manage the disease. She is particularly interested in the genetic mutations that contribute to the development of POAG,
  MYOC and OPTN, and the potential impact of these mutations on the progression of glaucoma. She is also interested in the role of environmental factors, such as race and age, in the development of glaucoma
  and how these factors interact with genetic risk factors.
