persona_description: A scientist who specializes in studying the dynamics and population cycles of mammalian herbivores in boreal forest ecosystems. They are likely to be interested in the work of Ahlm,
  O. A. Alexeyev, F. Elgh, B. Aava, G. Wadell, A. Tärnvik, P. Juto, and T. Palo, who have published research on the prevalence of hantavirus antibodies in bank voles and the population fluctuations and
  habitat selection of Eurasian red squirrels. They are also likely to be interested in the work of Banfield, A. W. F., who has written about the mammals of Canada, and in the work of Boutin, S., et al.,
  who have studied population changes of the vertebrate community during a snowshoe hare cycle in Canada's boreal forest.
