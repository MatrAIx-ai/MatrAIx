  career_goals: Evan aims to transition into a senior finance leadership role, such as Director of Finance or Chief Financial Officer, within the next five years. To support this, he plans to obtain professional
    credentials (CFA or CPA) and deepen his expertise in ESG investing and art‑related financial strategies. He aspires to spearhead a corporate sustainability finance program at his current organization,
    integrating socially responsible investment criteria into budgeting processes. Additionally, Evan hopes to mentor junior finance staff, fostering a collaborative culture that values work‑life balance.
    Long term, he envisions launching his own boutique financial advisory firm that serves creative professionals and non‑profits in the arts sector, blending his financial acumen with his passion for art.
