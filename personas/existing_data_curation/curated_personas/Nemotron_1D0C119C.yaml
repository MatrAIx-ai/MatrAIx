personas:
  professional: Evan Breeden, a senior corporate finance manager with over two decades of budgeting, cash‑flow forecasting and risk assessment experience, blends rigorous financial modeling, SAP and Oracle
    expertise, and a niche talent for art‑investment appraisal to drive ESG‑focused strategies while mentoring junior staff and charting a path toward a CFO role.
  sports: Evan Breeden, an avid hiker who conquers Ocala National Forest trails in spring and paddles Lake Louisa in summer, belongs to the Orlando Hiking Club, cheers for the Orlando Magic during NBA season,
    and follows the Tampa Bay Rays in baseball, while squeezing in weekend rides with a local cycling group.
  arts: Evan Breeden, a dedicated patron of the Orlando Museum of Art, curates a personal collection that includes works by Mark Bradford, Yayoi Kusama, and emerging Florida painter Maya Ramirez, volunteers
    to run art workshops at underserved schools, and relaxes by playing acoustic renditions of Bon Iver and Leon Bridges for family gatherings.
  travel: Evan Breeden, who prefers meticulously planned weekend getaways to Southeast art fairs in Savannah, Charleston and Asheville yet dreams of an immersive month‑long study tour of Barcelona’s galleries,
    balances travel with family obligations by booking short trips during school breaks, and values a blend of cultural immersion and outdoor exploration.
  culinary: Evan Breeden, an experimental home cook who blends Central Florida’s Caribbean influences with global flavors, frequently prepares shrimp and grits seasoned with smoked paprika, Thai green curry
    with fresh basil and lemongrass, and a Cuban medianoche sandwich topped with pickles and mustard, while perfecting the art of homemade mango salsa for summer barbecues.
  core: Evan Breeden, a 43‑year‑old finance strategist whose curiosity fuels art‑centric investments and whose habit of over‑analyzing spreadsheets sometimes spills into sleepless nights, balances a collaborative
    leadership style with a secret penchant for late‑night guitar sessions that echo lingering worries.
background:
  cultural: Evan grew up in a middle‑class, suburban environment in Central Florida, where the blend of traditional Southern hospitality and the state’s multicultural vibe shaped his worldview. As a white
    American from a predominantly Protestant background, he values personal responsibility, community involvement, and the pursuit of the “American Dream.” The proximity to diverse cultures in Lake County
    exposed him early to varied artistic expressions and culinary traditions, fostering his appreciation for new ideas and unconventional perspectives. His upbringing emphasized steady work ethic and modesty,
    tempered by a regional appreciation for outdoor recreation and a lively local arts scene. This cultural mix informs his balanced approach to life—combining structured professional conduct with an open,
    curious engagement with the world.
