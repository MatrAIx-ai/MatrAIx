personas:
  professional: An ambitious automotive service technician, Manuel Milian, leverages ASE Level I certification, bilingual fluency, and a meticulous, schedule‑driven workflow to diagnose gasoline, hybrid,
    and electric powertrains while coordinating a lively shop floor, yet often worries that any slip could jeopardize the seamless service they promise their customers.
  sports: An energetic forward on the local Barrio Logan Strikers soccer squad, Manuel Milian spends weekends in pickup matches, follows the San Diego Wave FC and the San Diego Padres avidly, hits the beach
    for early‑morning surf sessions when the swell is high, and balances a disciplined training regimen with a lighthearted, talk‑filled locker‑room atmosphere that fuels their competitive drive.
  arts: A passionate acoustic guitarist, Manuel Milian strums traditional corridos alongside modern Latin rock anthems from Maná and Los Tigres del Norte, sings at family gatherings with a flair for improvisation,
    frequents the vibrant murals of Chicano Park for inspiration, and enjoys the cinematic storytelling of films like "Coco" and the visual boldness of Frida Kahlo’s paintings, which together shape their
    artistic identity.
  travel: An adventure‑seeking yet budget‑mindful traveler, Manuel Milian prefers road trips along the Pacific Coast Highway to Big Sur and weekend jaunts to Tijuana, dreams of exploring the historic streets
    of Oaxaca and the bustling markets of Mexico City, plans itineraries on a spreadsheet to maximize fuel efficiency, and balances the thrill of discovering new locales with the comfort of returning home
    to their supportive community.
  culinary: A self‑taught cook with a knack for authentic flavors, Manuel Milian expertly prepares tacos al pastor, pozole rojo, and chilaquiles using masa harina, chipotle, and freshly chopped cilantro,
    often experiments with homemade salsa verde, enjoys the occasional foodie outing at local taquerías, and relishes sharing these dishes at family gatherings, all while occasionally over‑salting in a
    rush as a quirky reminder of their time‑pressed schedule.
  core: Manuel Milian, a 21‑year‑old bilingual auto tech, blends meticulous workshop structure with talk‑filled social energy, worries about every detail, splurges on performance car parts, and can’t resist
    a late‑night taco after a long shift, which they treat as a comforting ritual.
background:
  cultural: Manuel was raised in a bilingual Mexican‑American household in San Diego, with roots tracing back to his grandparents who immigrated from Jalisco. Family gatherings centered around shared meals
    of tacos al pastor, tamales, and pozole, and celebrations of Día de los Muertos and Mexican Independence Day reinforced his pride in his heritage. Growing up in the vibrant Barrio Logan area exposed
    him to a blend of Mexican traditions and Chicano art, shaping his community‑oriented outlook and giving him fluency in both Spanish and English. These cultural ties inform his work ethic, his preference
    for collaborative environments, and his desire to serve and support the local Latino community through his future shop.
attributes:
  skills: '["ASE Certified Technician (Level I)", "Automotive Diagnostics", "Engine Overhaul and Repair", "Transmission Service and Repair", "Hybrid and Electric Vehicle Maintenance", "Brake and Suspension
    Repair", "Electrical Systems Troubleshooting", "OBD-II Scan Tool Operation", "Preventive Maintenance Scheduling", "Inventory Management", "Bilingual Customer Service (Spanish/English)", "Team Coordination
    and Shift Scheduling", "Safety Compliance and OSHA Regulations", "Basic Welding and Body Repair"]'
  hobbies: '["Community soccer (forward position)", "Car customization and performance tuning", "Playing acoustic guitar and singing", "Racing video games (simulation)", "Cooking traditional Mexican cuisine",
    "Attending car shows and meet‑ups", "Volunteering at free community auto‑repair workshops", "Surfing and beach outings", "Weight training and fitness"]'
  career_goals: Manuel aims to become an ASE Master Technician within the next three years, focusing on advanced hybrid and electric vehicle technology. He plans to pursue the ASE Master Specialist certification
    in automotive electronics and eventually transition into a service manager role where he can lead a team, implement efficient workflow systems, and mentor younger technicians. In the longer term, he
    hopes to open a community-focused repair shop in San Diego that offers reliable service, apprenticeships for local youth, and a welcoming environment for Spanish‑speaking customers, providing both career
    stability and a way to give back to his family and neighborhood.
