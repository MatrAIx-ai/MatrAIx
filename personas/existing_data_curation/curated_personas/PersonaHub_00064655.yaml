persona_description: A historian who specializes in the study of colonial history and the impact of colonialism on developing countries. This person is interested in understanding the complexities of colonialism
  and its effects on the development of post-colonial societies. They are also interested in the economic growth of developed and developing countries before and after the end of colonialism. This person
  is likely to be interested in the book "The End of Empire" by John Strachey, which provides evidence to disprove the old thesis that Britain's economy was founded on colonial exploitation and shows how
  the country was doing much better in the era of decolonisation.
