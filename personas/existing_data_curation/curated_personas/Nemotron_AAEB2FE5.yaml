personas:
  professional: Chelsea Hernandez is an experienced IT support specialist who leverages their knack for translating complex tech jargon into plain language, leads small upgrade teams with a hands‑on, curiosity‑driven
    approach, and balances practical troubleshooting skills with a relaxed attitude toward strict project timelines.
  sports: Chelsea Hernandez stays active by hiking the Ozark trails with the Ozark Trailblazers club, joining the West Fork women’s softball league each spring, and following the Arkansas Razorbacks basketball
    team and the St. Louis Cardinals baseball club as their favorite regional sports franchises.
  arts: Chelsea Hernandez weaves their love of acoustic guitar and church choir singing with a playlist that ranges from Bob Dylan to Gloria Estefan, spends evenings devouring Agatha Christie mysteries
    and Octavia Butler’s science‑fiction, and attends local community theater productions of classics like "Our Town" whenever the schedule permits.
  travel: Chelsea Hernandez prefers loosely planned road trips with friends, has already explored the Great Smoky Mountains and the Texas Hill Country, and dreams of a future adventure to Patagonia’s Torres
    del Paine and the historic streets of Kyoto, balancing their love of nature with a modest budget that fits their community‑centric lifestyle.
  culinary: Chelsea Hernandez, a competent home chef, blends Southern comfort staples like fried chicken, collard greens, and cornbread with Latin‑inspired accents such as mojo‑marinated pork, black beans,
    and fresh cilantro, often experimenting with spices like smoked paprika and chipotle while maintaining a relaxed, improvisational kitchen style that favors family‑style meals over rigid recipes, reflecting
    their penchant for spontaneous creativity.
  core: Chelsea Hernandez is a curious, community‑driven tech enthusiast who swaps meticulous troubleshooting for spontaneous DIY electronics projects, occasionally lets paperwork pile up, and powers through
    life with a guitar in hand and a garden in the backyard, all while they keep a laid‑back attitude toward strict schedules.
background:
  cultural: Chelsea grew up in a small‑town environment in western Arkansas, shaped by Southern hospitality, close‑knit community values, and a family history of farming and small‑business entrepreneurship.
    While she identifies as White American, her Hispanic surname reflects a multicultural family lineage, and she enjoys blending Southern cooking traditions with occasional Latin flavors during holidays.
    She is active in her local church, participates in community festivals such as the Arkansas River Festival, and values neighborly support and volunteerism. This cultural backdrop fosters her pragmatic
    outlook, flexibility, and strong desire to give back to the community.
attributes:
