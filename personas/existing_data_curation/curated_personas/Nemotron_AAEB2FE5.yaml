    (PowerShell, Bash, Python)'', ''IT security fundamentals (antivirus, firewall management)'', ''Team leadership and training'', ''Project coordination for system upgrades'']'
  hobbies: '[''Hiking the Ozark trails'', ''Participating in local tech meetups and hackathons'', ''Volunteer tutoring at the community center'', ''Gardening in her backyard vegetable plot'', ''Cooking
    Southern comfort dishes and experimenting with new recipes'', ''Playing acoustic guitar and singing in a local choir'', ''Reading mystery and science‑fiction novels'', ''DIY electronics projects with
    Raspberry Pi and Arduino'']'
  career_goals: Chelsea aims to transition from a frontline support role to a lead or supervisory position within the IT department, where she can mentor junior technicians and shape service‑delivery processes.
    She plans to earn industry certifications such as CompTIA Network+, Security+, and AWS Cloud Practitioner to deepen her expertise in networking, cybersecurity, and cloud computing. Over the next five
    years, she hopes to lead larger-scale projects, develop a knowledge‑base platform tailored to her organization, and eventually launch a part‑time consulting practice that helps small businesses in West
    Fork and the surrounding region modernize their IT infrastructure while maintaining a flexible work schedule that supports her community involvement.
