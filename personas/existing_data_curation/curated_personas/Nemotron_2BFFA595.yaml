  career_goals: Ruth aims to earn her GED within the next year and then enroll in a vocational program, either in automotive technology or culinary arts, fields that offer clear structure and tangible outcomes.
    She hopes to secure a stable apprenticeship that provides hands‑on learning and a reliable income. In the longer term, she envisions becoming a certified automotive technician or a professional pastry
    chef, potentially opening a modest workshop or bakery in Watertown to serve her community while achieving financial independence for herself and her family.
