  career_goals: Adam aims to complete his associate degree in Business Administration within the next 18 months, then transition into a part-time operations or project-management role while scaling a home-renovation
    and custom-furniture side business. He plans to obtain a Project Management Professional (PMP) certification to solidify his credibility. Ultimately, he wants to build a reputable small-business that
    serves the O'Fallon community, achieving financial stability for his family while maintaining the flexibility to work on projects that interest him.
