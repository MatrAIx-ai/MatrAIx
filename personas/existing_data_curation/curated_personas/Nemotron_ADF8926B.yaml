personas:
  professional: John Garrido is a seasoned elementary and middle-school STEM teacher who designs differentiated curricula, leads the robotics club, and leverages his woodworking and photography hobbies
    to create STEAM lessons while eyeing a district-wide STEM coordinator role.
  sports: John Garrido regularly hikes the Natchez Trace and joins a local hiking club for weekend treks, follows the Memphis Grizzlies and Tennessee Titans avidly, and once competed in a community 5K but
    now prefers low-impact cardio over competitive sports.
  arts: John Garrido immerses themselves in visual and performing arts by frequenting the Bridgestone Gallery to view Ansel Adams prints, attending community theater productions of “Our Town,” and strumming
    acoustic covers of John Prine songs while listening to sci-fi soundtracks by Vangelis.
  travel: John Garrido prefers road-trip adventures that combine photography and hiking, such as visits to the Great Smoky Mountains and a recent weekend in Asheville, while dreaming of an Icelandic aurora-chasing
    tour and budgeting travel around conference grants.
  culinary: John Garrido enjoys cooking seasonal garden harvests—roasted rosemary potatoes, grilled corn with chili butter, and quinoa-pesto bowls—while mastering intermediate sous-vide techniques and occasionally
    indulging in shrimp-and-grits comfort food on lazy Sundays.
  core: John Garrido blends a restless curiosity for tech and art with a meticulous, sometimes stress-laden, drive to innovate education and craft, all while juggling a budget, health quirks, and a love
    for the outdoors.
background:
  cultural: John grew up in Middle Tennessee, steeped in the traditions of Southern hospitality, family gatherings, church involvement, and community festivals such as the county fair. His upbringing emphasized
    respect for local customs, love for country music, barbecue, and outdoor recreation. While his academic path in STEM and his career in education broadened his worldview, he retains a strong connection
    to his regional roots, practicing the values of hard work, loyalty, and community service. This blend of Southern cultural heritage and a progressive, curiosity‑driven mindset informs his approach to
    teaching, his engagement with local arts, and his desire to innovate within his community.
