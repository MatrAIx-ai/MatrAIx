  hobbies: '[''Landscape Photography'', ''Hiking'', ''Woodworking'', ''Acoustic Guitar'', ''Science‑Fiction Reading'', ''Arduino/Raspberry Pi Tinkering'', ''Visiting Art Galleries'', ''Community Theater
    Attendance'', ''Volunteering at Science Fairs'', ''Gardening'', ''Chess'']'
  career_goals: John aims to transition into a district‑wide STEM leadership role, such as STEM Coordinator or Assistant Principal, where he can shape curriculum policy and secure grant funding for innovative
    programs like a state‑level robotics competition team. He aspires to publish a STEM‑focused textbook that weaves art and creativity into scientific concepts, and to earn national recognition for advancing
    STEAM education in middle schools. Additionally, he plans to pursue an EdD concentrating on curriculum innovation to deepen his research expertise and influence educational practice beyond his school.
