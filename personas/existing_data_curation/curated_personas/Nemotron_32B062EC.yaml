  hobbies: '["Street photography", "Art gallery visits", "Scale model truck building", "Vintage car restoration", "Solo road trips", "Volunteer driver mentorship", "Podcast listening (design, tech, philosophy)",
    "Gardening", "Live music shows", "Community mural tours"]'
  career_goals: He aims to transition into a logistics management or operations supervisory role within the next three to five years, where he can blend his hands‑on driving expertise with strategic planning.
    He plans to earn a Certified Transportation Professional (CTP) credential and complete an advanced course in fleet sustainability, positioning himself to lead a team that prioritizes safety, efficiency,
    and driver well‑being. Parallel to his career growth, Deryk hopes to launch a community‑focused mobile art project that uses his truck to bring curated artwork to schools, senior centers, and public
    spaces across the Tampa Bay area, combining his love for art with his commitment to service.
