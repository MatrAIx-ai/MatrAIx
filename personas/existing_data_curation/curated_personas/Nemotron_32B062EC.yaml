personas:
  professional: Deryk Adam blends 15 years of Class A trucking expertise, meticulous route‑optimization and vehicle‑maintenance skills, and a calm, detail‑oriented temperament to mentor new drivers while
    shaping logistics strategies that prioritize safety and driver well‑being.
  sports: Deryk Adam maintains a steady fitness regimen of early‑morning jogs along the Tampa Riverwalk, weekend pickup soccer with the Tampa Bay Rowdies amateur league, and weight‑training sessions at
    the local YMCA, while cheering the Tampa Bay Buccaneers in fall football and the Lightning in winter hockey.
  arts: Deryk Adam immerses in Tampa’s vibrant street‑art scene, documenting murals by local creator Jeff Bolden and global icon Banksy, sketching in the museum café to the soundtrack of Tame Impala, and
    regularly attending performances by the Florida Orchestra and the B Street Players theatre troupe.
  travel: Deryk Adam plans solo weekend road trips that trace Florida’s Gulf Coast from Sarasota to Pensacola, occasionally trading the shoreline for passport‑ready escapes to Charleston’s historic district
    and Mexico City’s neon‑lit streets, balancing a modest budget that favors boutique B&Bs over luxury resorts.
  culinary: Deryk Adam enjoys cooking simple farm‑to‑table meals, often grilling fresh grouper with a cilantro‑lime rub, tossing it into a quinoa‑avocado salad seasoned with smoked paprika, while their
    backyard garden supplies heirloom tomatoes and sweet basil for nightly homemade Margherita pizzas.
  core: Deryk Adam is a road‑hardened trucker with a curatorial eye for murals, an obsessive penchant for meticulous logs, and a zen‑like calm that turns every pit stop into a moment of artistic discovery.
background:
  cultural: Deryk grew up in a middle‑class white American family in the American South, with roots tracing back to English and Irish ancestry. He moved to Tampa, Florida as a young adult, where he has
    been immersed in the region’s blend of Southern hospitality, Caribbean and Latin influences, and a strong automotive culture. The multicultural atmosphere of Hillsborough County shaped his appreciation
    for diverse artistic expressions—ranging from Cuban mural art to local indie music scenes—while his upbringing emphasized self‑reliance, community service, and a practical work ethic. He celebrates
    mainstream American holidays but also partakes in local events such as the Gasparilla Festival, reflecting his integration into the vibrant Tampa community.
attributes:
  skills: '["Truck operation (Class A CDL)", "Vehicle inspection and maintenance", "Route optimization using logistics software", "Customer service and sales negotiation", "Inventory and cargo documentation",
