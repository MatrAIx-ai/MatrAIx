  career_goals: Harrison aims to complete his high school education with a strong foundation in STEM and then enroll in a community college program for automotive technology or mechanical engineering. He
    is fascinated by the idea of designing sustainable transportation solutions, so he hopes to eventually work as a mechanical engineer or automotive technician who blends practical repairs with innovative
    design. In the longer term, he dreams of launching a small venture that creates affordable DIY robotics kits for other teens, combining his love for hands‑on creation with entrepreneurial ambition.
    Throughout his path, he wants to maintain a steady income to support his family and stay rooted in his community.
