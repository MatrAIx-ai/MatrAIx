personas:
  professional: Harrison Wilkes, a budding teenage maker, fuses the spatial planning of his elaborate Minecraft builds with hands‑on Arduino and Raspberry Pi tinkering, and they apply a balance of curiosity
    and practical problem‑solving to prototype simple robots and LED displays while staying reliably organized enough to meet school deadlines.
  sports: Harrison Wilkes, an avid skateboarder, spends afternoons mastering tricks at the local skate park and maintains their board meticulously, while also cheering for the hometown minor‑league baseball
    team, the River City Runners, and joining a community basketball club where they balance competitive spirit with cooperative play.
  arts: Harrison Wilkes expresses creativity through acoustic guitar, penning short folk‑rock lyrics inspired by The Lumineers, sketching comic strips in the style of Shaun Tan, and capturing urban street
    scenes à la Vivian Maier, weaving a love of sci‑fi novels by Isaac Asimov into their artistic narrative, and they often blend these influences into visual storytelling.
  travel: Harrison Wilkes enjoys weekend road trips to nearby state parks, dreams of an immersive visit to Tokyo’s Akihabara district for tech and anime culture, and plans a future family vacation to the
    Grand Canyon, balancing budget‑conscious planning with a craving for adventure, and they use a travel journal to map out itineraries and budget milestones.
  culinary: Harrison Wilkes, a novice home chef, loves whipping up homemade pepperoni pizza topped with garden‑fresh basil, experimenting with simple sushi rolls using fresh vegetables they harvested, and
    regularly indulging in spicy ramen noodles while learning to perfect a classic grilled cheese, and they often pair meals with a side of freshly squeezed lemonade.
  core: Harrison Wilkes is a curiosity‑driven teen who balances digital creation, skateboarding, and guitar‑songwriting with a pragmatic approach to money, health, and school, while occasionally over‑committing
    to projects and forgetting to stretch.
background:
  cultural: Harrison grew up in Fontana, a working‑class suburb of Southern California with a diverse population. His family, of white American heritage, emphasizes hard work, modest independence, and community
    involvement. While household traditions include weekend barbecues and local high‑school sports events, the city’s multicultural atmosphere has exposed him to Hispanic influences, such as bilingual signage
    and neighborhood festivals, giving him a basic appreciation for Spanish language and culture. He attends a public middle school where a mix of cultural backgrounds fosters inclusivity and collaboration.
    The regional values of practicality, self‑reliance, and openness to new ideas shape Harrison’s outlook, encouraging a balanced blend of curiosity, organization, and social awareness.
