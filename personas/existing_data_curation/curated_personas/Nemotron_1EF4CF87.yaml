  hobbies: '[''visiting art galleries and museums'', ''gardening with native plants and herbs'', ''listening to live music (mariachi, jazz, local bands)'', ''reading poetry and short stories'', ''bird‑watching
    in Balboa Park'', ''participating in community festivals and street fairs'', ''learning new skills via online short courses'', ''cooking experimental recipes based on traditional dishes'']'
  career_goals: Although retired, Maria’s ambitions focus on legacy and mentorship. She aims to compile a memoir of her life and family’s migration story to preserve for future generations. She hopes to
    expand the senior‑center cultural program, introducing more intergenerational art projects that blend Mexican folk traditions with contemporary expressions. Maria also aspires to learn a new craft—Mexican
    papier‑mâché (cartonería)—and to mentor younger volunteers in maintaining the warm, harmonious atmosphere she values.
