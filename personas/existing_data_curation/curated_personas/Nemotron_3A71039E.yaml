personas:
  professional: Rodolfo Delapena, a budding LEGO architect and Minecraft world‑builder, channels curiosity and practicality into meticulous step‑by‑step creations while staying flexible enough to improvise
    new designs when inspiration strikes, making them a standout project leader in the elementary STEM club.
  sports: Rodolfo Delapena, a midfielder on the Montgomery United youth soccer team, practices three times a week, idolizes Chicago Fire forward Kekuta, and balances competitive drive with a love for casual
    weekend bike rides along the Fox River Trail, using soccer as both a social outlet and a disciplined routine.
  arts: Rodolfo Delapena, an avid sketcher who devours adventure novels like The Secret of the Firefly, admires vibrant mural art that celebrates community stories and the whimsical LEGO sculptures of Nathan
    Sawaya, and spends evenings listening to Imagine Dragons’ Believer while drawing characters that blend folklore with modern fantasy.
  travel: Rodolfo Delapena, whose travel journal alternates between doodles of the Morton Arboretum’s oak groves and colorful postcards from family trips to a bustling town where markets overflow with spices,
    prefers carefully planned road trips that include snack stops for tacos al pastor, yet dreams of a solo backpacking adventure through the Canadian Rockies once they’re older.
  culinary: Rodolfo Delapena, who has progressed from chopping onions for tacos al pastor to mastering guacamole with ripe Hass avocados, mixes a pinch of jalapeño for heat, and eagerly experiments with
    homemade pizza dough after watching cooking videos, while still craving classic peanut butter‑jelly sandwiches after school.
  core: Rodolfo Delapena, a ten‑year‑old LEGO enthusiast with a vivid imagination, navigates the world by balancing meticulous planning with spontaneous creativity, all while managing a buzz of anxiety
    that fuels both their drive and occasional over‑snacking.
background:
  cultural: Rodolfo is a first‑generation Mexican‑American growing up in Montgomery, Illinois, within Kendall County’s close‑knit community. At home, Spanish is spoken alongside English, and his family
    upholds traditions such as Día de los Muertos altars, quinceañera celebrations, and weekly gatherings centered on shared meals. He attends a public elementary school that offers a bilingual program,
    giving him a solid grasp of both cultures. The blend of Midwestern values—politeness, community involvement, and an appreciation for nature—and Mexican customs—family loyalty, vibrant celebrations,
    and rich culinary traditions—shapes his worldview, fostering a deep sense of cultural pride and adaptability.
