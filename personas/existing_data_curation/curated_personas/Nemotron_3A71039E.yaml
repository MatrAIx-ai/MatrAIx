  hobbies: '[''LEGO building'', ''Minecraft world creation'', ''Soccer'', ''Reading adventure and folklore books'', ''Drawing and sketching'', ''Cooking Mexican family recipes'', ''Bilingual storytelling'']'
  career_goals: Rodolfo dreams of a future that lets him explore nature while providing stability for himself and his family. He aspires to become a wildlife biologist or veterinarian who protects endangered
    animals, combining his curiosity about the natural world with a practical desire to help living beings. He also imagines teaching younger children, sharing his love of bilingual stories and hands‑on
    learning. Guided by his balanced personality, he seeks a career that blends independent research with collaborative projects, offers a clear routine, and allows him to use both his scientific interests
    and his cultural background to make a positive impact on his community.
