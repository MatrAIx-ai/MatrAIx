personas:
  professional: Dalia Lopez is a line assembler and aspiring CNC operator at a mid-sized manufacturing plant, blending expertise in MIG/TIG welding, CNC routing, and CAD prototyping with a vivid imagination
    that turns routine parts into sleek, art-inspired components, while their competitive drive pushes them to lead lean‑process improvements and mentor a diverse crew.
  sports: Dalia Lopez enjoys staying active through weekend salsa dancing sessions, a weekly kick‑boxing class at the community gym, and follows the Miami Heat, Miami Dolphins, and Inter Miami CF passionately,
    while also playing pickup basketball at a local park and maintains a casual jog along the beach each sunrise.
  arts: Dalia Lopez channels their imagination into abstract canvas painting, digital illustration inspired by artists like Yayoi Kusama and James Turrell, and metal sculpture echoing the works of Richard
    Serra, while regularly attending community theater productions and dancing to the rhythms of Celia Cruz and Bad Bunny for creative inspiration.
  travel: Dalia Lopez prefers spontaneous, culturally immersive trips that blend art festivals and street food, often booking last‑minute flights to destinations like Puerto Rico for a local fiesta, Barcelona
    for its avant‑garde galleries, and the Florida Keys for sunset sailing, but their occasional disorganization sometimes results in missed reservations.
  culinary: Dalia Lopez loves cooking traditional dishes such as mofongo with plantain, garlic, and pork cracklings, arroz con gandules seasoned with sofrito, and experiments with fusion tacos featuring
    chorizo and pineapple, showcasing a solid cooking skill level that blends aromatic spices like cumin, cilantro, and smoked paprika.
  core: Dalia Lopez is a 27‑year‑old welding enthusiast who fuses metalwork with abstract art, balances ambitious career goals with occasional budgeting chaos, and energizes every room with salsa steps
    and a restless curiosity.
background:
  cultural: Dalia is a second‑generation Puerto Rican raised in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains strong ties to Puerto Rican customs, celebrating
    holidays such as Fiesta de San Juan and incorporating island music like salsa and reggaetón into daily life. Growing up in the diverse community of Waukegan, she blends her Caribbean roots with Midwestern
    values, often sharing traditional foods and stories with neighbors. Dalia's cultural identity informs her artistic sensibility, inspiring motifs of tropical colors and Caribbean folklore in her metal
    artwork, and she remains active in local Puerto Rican community groups, preserving her heritage while embracing the multicultural fabric of her city.
