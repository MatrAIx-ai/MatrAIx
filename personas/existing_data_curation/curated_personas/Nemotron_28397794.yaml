    Puerto Rican festivals'', ''Cooking traditional Puerto Rican dishes'']'
  career_goals: Dalia aims to advance from a line assembler to a shift supervisor within the next two years, earning a CNC certification and an associate degree in manufacturing technology from a local
    community college. She is motivated to lead process‑improvement projects that blend efficiency with design innovation, positioning herself as a bridge between production and product aesthetics. Long‑term,
    Dalia envisions launching a side business creating custom metal art and functional décor for homes and local businesses, leveraging her fabrication expertise and artistic flair. She also hopes to mentor
    younger workers, especially those from underrepresented backgrounds, fostering a supportive yet competitive work culture.
