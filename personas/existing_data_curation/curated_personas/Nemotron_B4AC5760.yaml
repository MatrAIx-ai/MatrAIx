personas:
  professional: Jessica Landry, a two‑year‑old who obsessively arranges her building blocks into neat, color‑coded towers and insists on following step‑by‑step instructions during pretend play, demonstrates
    an emerging architectural mindset and a practical, structured approach to problem‑solving, while also showing a competitive edge when they compare their creations to peers.
  sports: Jessica Landry, a two‑year‑old who eagerly participates in a local toddler swim class, cheers for the Seattle Seahawks mascot during family game days, and competes in the neighborhood "Mini Mariners"
    soccer circle where they strive to be the first to kick the ball, blending their love for structured activity with a competitive drive while still requiring nap breaks.
  arts: Jessica Landry, a two‑year‑old who lights up while watching "Paw Patrol" and "Sesame Street", spends afternoons coloring Dr. Seuss illustrations with Crayola crayons, and sings along to Disney princess
    songs like Ariel’s "Part of Your World", showing how early media exposure and creative play shape their budding artistic identity, and they often perform a tiny encore for the family.
  travel: Jessica Landry, a two‑year‑old who enjoys family trips to the city aquarium, weekend beach stays in Florida, and a short flight to Washington, D.C. to explore the National Air and Space Museum,
    always insisting on a predictable itinerary with scheduled nap times and familiar snacks, reflecting their need for structured travel experiences, and they wave enthusiastically at the plane windows.
  culinary: Jessica Landry, a two‑year‑old who favors smooth peanut butter‑banana sandwiches, bright orange carrot sticks, and occasional macaroni and cheese, skillfully uses a plastic fork but stubbornly
    refuses broccoli, and they delight in strawberry yogurt served at the exact same spot on the plate each dinner, demonstrating their practical palate preferences and routine‑loving habits.
  core: Jessica Landry, a two‑year‑old whose structured curiosity, competitive spark, and routine‑driven habits coexist with a lingering worry over minor changes, making them both disciplined and easily
    stressed, and they often cling to familiar objects for comfort.
background:
  cultural: Jessica is raised in a White, middle‑class family in Big Spring, Texas, within Howard County. Her upbringing blends West Texas values of friendliness, community, and respect for routine with
    broader American traditions. She celebrates holidays such as Thanksgiving and the Fourth of July with family gatherings and barbecue picnics, participates in a local Christian preschool that emphasizes
    daily schedules and moral lessons, and joins community events like the Howard County fair and library story‑time sessions. The regional culture of open landscapes, country music, and close‑knit neighborhood
    ties influences her love for outdoor play, structured group activities, and a predictable daily rhythm.
attributes:
  skills: '[''Walking independently'', ''Climbing low steps'', ''Tossing soft balls'', ''Building block towers'', ''Matching shapes and colors'', ''Naming familiar objects'', ''Singing nursery rhymes'',
