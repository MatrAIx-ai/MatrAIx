  career_goals: Even at two, Jessica often tells her parents she wants to be a teacher who creates a tidy, predictable classroom where every child knows what to expect, and she also dreams of becoming a
    veterinarian who helps animals when they are hurt. These ambitions reflect her love for structure, her practical desire to help others, and her competitive drive to be the first to care for a friend
    or creature in need.
