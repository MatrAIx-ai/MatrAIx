personas:
  professional: Youn Kim is a disciplined 21‑year‑old taxi driver who leverages strong navigation, bilingual customer service, and meticulous vehicle maintenance while building a freelance illustration
    portfolio and planning a niche tourism‑guide service that blends Kansas landscapes with visual storytelling; they balance methodical route‑optimization with imaginative design concepts.
  sports: Youn Kim enjoys solitary early‑morning jogs along the Kansas prairie, participates in the Midwest Cyclists Club’s weekend rides, and follows the Kansas City Royals and the Golden State Warriors,
    occasionally joining pick‑up basketball games at the local community center to stay active and socially connected, and they relish the balance of quiet exercise with occasional team sport camaraderie.
  arts: Youn Kim expresses a vivid inner world through sketching rural Kansas vistas, creating digital illustrations inspired by Korean cinema such as "Parasite" and indie films like "Moonlight," reading
    speculative novels like "The Name of the Wind," listening to Brian Eno’s ambient tracks and Bon Iver, and penning short stories and poetry that blend fantasy with personal reflection, and they find
    the creative process both soothing and a conduit for processing anxiety.
  travel: Youn Kim prefers low‑key road trips that combine meticulous route planning with spontaneous photo stops, having already visited the Badlands, Yellowstone, and a weekend getaway to Santa Fe, while
    dreaming of a creative pilgrimage to Kyoto to immerse in traditional art and modern design, and they cherish the quiet solitude these journeys provide.
  culinary: Youn Kim enjoys crafting simple yet flavorful meals, favoring ramen, bibimbap, Kansas‑style brisket barbecue, and fresh herb salads, while often sipping pour‑over coffee and snacking on spicy
    instant noodle cups during late‑night illustration sessions, and they consider cooking a calming ritual that punctuates their creative work.
  core: Youn Kim is a methodical, imaginative 21‑year‑old taxi driver turned budding visual storyteller, whose anxiety fuels a disciplined creative routine, quiet travel cravings, and a penchant for late‑night
    coffee‑driven art marathons, and they constantly balance reliability with bursts of artistic whimsy.
background:
  cultural: Youn Kim is a second‑generation Korean‑American whose parents immigrated to the United States in the late 1990s. Raised in a bilingual household in the Midwest, he grew up celebrating traditional
    Korean holidays such as Seollal and Chuseok while also embracing Midwestern customs. His family placed a strong emphasis on education and hard work, values that have shaped his organized and reliable
    nature. Living in the small town of Isabel, Kansas, Youn has navigated the blend of Korean cultural expectations—such that respect for elders and collective family identity—with the individualistic,
    open‑spaced lifestyle of rural America. This cross‑cultural experience informs his artistic sensibilities and his desire to tell stories that bridge different worlds.
attributes:
  skills: '[''Safe urban and rural driving'', ''Route optimization and GPS navigation'', ''Vehicle maintenance and troubleshooting'', ''Bilingual Korean–English communication'', ''Customer service and conflict
    resolution'', ''Basic graphic design using Photoshop and Illustrator'', ''Creative writing and storytelling'', ''Abstract conceptual thinking'']'
  hobbies: '[''Sketching and digital illustration'', ''Photography of rural and urban scenes'', ''Reading science‑fiction and fantasy literature'', ''Watching Korean and independent films'', ''Creative
    writing (short stories, poetry)'', ''Puzzle solving (Sudoku, crosswords)'', ''Mindfulness meditation'', ''Listening to ambient and indie music'']'
  career_goals: Youn aspires to transition from his current taxi‑driving role into a career that merges his creative passions with stable income. He plans to complete his college studies—aiming for a degree
    in visual arts or digital media—while building a freelance portfolio of illustration and graphic‑design work. In the medium term, he hopes to launch a niche tourism‑guide service that combines his knowledge
    of local routes with storytelling, eventually establishing himself as a full‑time visual storyteller and independent creator. A secondary goal is to obtain a commercial driver’s license, giving him
    the flexibility to drive larger vehicles or start his own transportation business if needed.
