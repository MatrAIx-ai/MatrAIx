personas:
  professional: Nathan Chin, a newborn whose early fascination with the vibrant illustrations in picture books and the soft lullabies humming through the house hints at a future career in visual storytelling
    or sound design, they balance disciplined routine with spontaneous curiosity.
  sports: Nathan Chin, who participates in a weekend infant swim class at the local community center and enjoys gentle rocking during baby yoga at the park, they proudly don a tiny Baltimore Ravens onesie
    and are known to cheer—by cooing—during family game nights.
  arts: Nathan Chin, who lights up when his parents play Beethoven’s "Für Elise" and the lively beats of Beyoncé at home, they delight in the colorful murals of the nearby community art space and respond
    to a live violin performance at the museum's family day with joyful coos.
  travel: Nathan Chin, who has already ridden in the family car to explore the historic streets of Annapolis and taken a weekend trip to Washington, D.C.'s Smithsonian museums, they show fascination with
    new surroundings and look forward to future adventures at Ocean City's boardwalk and a potential visit to the Grand Canyon.
  culinary: Nathan Chin, whose current palate favors pureed sweet potatoes, apple sauce with a dash of cinnamon, and homemade quinoa-carrot purée, they also enjoy occasional spoonfuls of French toast puree
    and the aroma of fresh basil as his parents experiment with organic baby meals.
  core: Nathan Chin, a serenely curious newborn who constantly reaches for bright toys, they can fall asleep mid-coo while his parents rehearse karaoke, and occasionally resist the bedtime swaddle in favor
    of a cool, breathable blanket.
