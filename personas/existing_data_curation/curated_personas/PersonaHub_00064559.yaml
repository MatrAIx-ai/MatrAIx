persona_description: A Canadian economist who studies the effects of minimum wage increases on the demand for labour and the economic well-being of low- to moderate-income workers and families. They are
  likely to be interested in the impact of higher minimum wages on the job market, the potential for businesses to respond to increased costs by shedding jobs or reducing hours, and the potential for a
  higher minimum wage to address poverty and the incidence of low-paid employment. They may also be interested in the potential benefits of an earned income tax credit and the need to consider expanding
  the Working Income Tax Benefit to increase the economic returns from employment for relatively low-paid workers.
