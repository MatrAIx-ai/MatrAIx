personas:
  professional: Raul Estalella, a 96‑year‑old retired mechanic turned community cultural historian, leverages his meticulous, organized mind and bilingual fluency to conduct genealogical research, curate
    museum exhibits, and mentor his grandchildren in budgeting, woodworking, and heritage cooking, embodying a blend of curiosity and disciplined practicality.
  sports: Raul Estalella, an avid follower of the Los Angeles Dodgers and the Anaheim Ducks, watches games on television, participates in a senior bocce league at the local community center, and maintains
    modest fitness with daily strolls and light stretching, reflecting a competitive spirit tempered by age.
  arts: Raul Estalella, a devoted listener of boleros by Lucha Reyes and mariachi classics from Jorge Negrete, fills evenings with these recordings while preserving family photo albums and drawing inspiration
    from the vibrant murals of local heritage festivals, blending artistic appreciation with his storytelling habit.
  travel: Raul Estalella, who has journeyed to the historic streets of Mexico City and the Mission San Juan Capistrano, now dreams of exploring the colonial town of Guanajuato while favoring short, well‑planned
    trips that accommodate their mobility and modest budget.
  culinary: Raul Estalella, an enthusiastic home chef, prepares tamales de pollo with salsa verde and mole poblano using cilantro, oregano, and sage cultivated on his balcony garden, relishes the aroma
    of simmering chilies, and occasionally treats himself to churros with cinnamon sugar, all while sharing recipes with family.
  core: Raul Estalella, a 96‑year‑old disciplined historian‑mechanic who balances meticulous budgeting, vigilant health routines, and a deep love for traditional cooking, boleros, and family storytelling,
    all while maintaining a competitive edge in puzzles and a skeptical eye toward newcomers.
background:
  cultural: Raul was born in a modest farming village in Michoacán, Mexico, where Catholic traditions, communal fiestas, and respect for elders shaped his early worldview. In his early twenties he migrated
    to Southern California during the 1960s agricultural boom, settling in Westminster, Orange County, a hub for the Mexican diaspora. Over the decades he blended his Mexican roots with the multicultural
    fabric of California, becoming fluent in both Spanish and English and adopting local customs while preserving core practices such as Día de los Muertos, quinceañeras, and traditional cuisine. His identity
    is anchored in family loyalty, the value of hard work, and a reverence for cultural heritage, which he now passes on through storytelling, cooking, and community involvement.
