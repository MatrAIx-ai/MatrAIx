  hobbies: '["Watercolor painting", "Sketching", "Knitting", "Quilting", "Gardening", "Birdwatching", "Reading historical fiction", "Reading mystery novels", "Journaling", "Cooking Midwestern comfort food",
    "Experimenting with new recipes", "Coffee with close friends", "Attending small local art exhibitions"]'
  career_goals: Donyale aspires to advance to a senior administrative or office manager role, seeking certification such as the Certified Administrative Professional (CAP) to formalize her expertise. She
    aims to improve her organizational skills and adopt systematic workflow tools that reduce stress. At the same time, she hopes to blend her love of art with her work by coordinating community art workshops
    and small exhibitions at the local community center, creating a more vibrant cultural space in Windsor. Balancing professional growth with flexibility, she also envisions a part‑time remote opportunity
    that would allow more time for her personal interests and family.
