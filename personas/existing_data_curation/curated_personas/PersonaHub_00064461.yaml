persona_description: A scientist who specializes in the study of the physical laws governing life on Earth, particularly those related to consciousness and intelligence. They are interested in the potential
  for intelligent life on other planets and the conditions necessary for its existence. They believe that the physical conditions necessary for intelligent life are similar to those on Earth and that the
  basis of reality is consciousness. They are curious about the potential for intelligent life on other planets and the possibility of sharing similar characteristics with them. They are not anthropomorphizing
  aliens and recognize that they do not have the knowledge necessary to accurately predict what an alien species would look like or what they would be capable of. They are open-minded and willing to consider
  the possibility of sharing similar characteristics with other intelligent species.
