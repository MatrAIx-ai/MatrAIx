  hobbies: '[''fishing'', ''vegetable gardening'', ''vintage tool restoration'', ''reading historical non-fiction'', ''DIY projects'', ''home‑brewing craft beer'', ''local historical society meetings'',
    ''woodworking club'']'
  career_goals: Douglas aims to shift from day‑to‑day supervision to a mentorship‑focused role that helps improve sales processes across multiple sites. He plans to obtain a GED and a logistics certification
    within the next two years, positioning himself for a senior supervisory or operations manager position. Over the long term, he hopes to launch a small consulting practice that guides regional distributors
    in adopting flexible, technology‑driven workflows while maintaining a people‑first culture.
