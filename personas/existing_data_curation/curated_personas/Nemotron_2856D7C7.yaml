  career_goals: Thomas aims to complete a high school equivalency credential and secure an apprenticeship as an automotive technician, leveraging his hands‑on skills and love for structured work. He is
    also contemplating enlisting in the U.S. Navy for technical training, attracted by the clear hierarchy and disciplined environment. Long‑term, he aspires to a career that offers predictability and clear
    progression, such as a skilled trades position or a role in law enforcement, where his reliability and competitive drive can be fully utilized.
