  hobbies: '[''Pickup basketball'', ''Live music shows'', ''Weekend barbecues'', ''College football fan'', ''DIY home improvement'', ''Hiking in the Sandias'']'
  career_goals: In the next few years Shane aims to complete a formal apprenticeship, obtain a state‑registered painting contractor license, and earn the Certified Master Painter credential. He plans to
    leverage his outgoing personality to market his services and build a reputation as the go‑to painter for residential clients in Albuquerque. Long‑term, he hopes to open his own painting and decorative
    finish company, expand into eco‑friendly paint solutions, and possibly offer basic interior design consulting. He also envisions mentoring new workers, turning his practical expertise into a stable,
    locally recognized business.
