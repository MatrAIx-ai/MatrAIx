personas:
  professional: Shane Dozier, a 19‑year‑old painting apprentice in Albuquerque, applies his solid surface‑prep and color‑matching skills to routine residential jobs while using his talkative, sociable demeanor
    to secure repeat clients, delegating a small crew with a competitive edge and a healthy dose of skepticism toward client promises, all while balancing a relaxed approach to strict scheduling.
  sports: Shane Dozier dominates Saturday pickup basketball at the local park, rallies with fervor for the New Mexico State Aggies football team, follows the Albuquerque Isotopes baseball club, and hikes
    the Sandia Mountains each summer to stay in shape, blending competitive spirit with a love for outdoor recreation.
  arts: Shane Dozier frequents live music nights at Miss Joy’s Piano Bar, especially enjoying the blend of desert‑influenced indie rock from Calexico and the soulful blues of local guitarist Jackie Fair,
    and his appreciation for color and texture spills over into occasional wall‑mural projects inspired by Albuquerque’s street art scene.
  travel: Shane Dozier prefers short, budget‑friendly road trips to nearby desert destinations like Santa Fe, Taos, and the Grand Canyon, dreams of a spontaneous journey to the Balloon Fiesta in Albuquerque
    and a future camping trek in Patagonia, yet always packs his trusty cooler and a spare tire, balancing a love for routine planning with an adventurous streak.
  culinary: Shane Dozier’s palate leans heavily toward smoky barbecue ribs, spiced green chile burgers, and traditional New Mexican carne adovada, and he enjoys experimenting with local ingredients like
    Hatch chile and piñón nuts while often pairing his meals with cold craft beers after a long day of painting.
  core: Shane Dozier, a 19‑year‑old painting apprentice, thrives on routine jobs, social buzz, and competitive banter, yet his laid‑back planning and occasional forgetfulness make his toolbox a mix of high‑grade
    tools and snack wrappers.
background:
  cultural: Shane grew up in a suburban neighborhood of Albuquerque, raised in a white, middle‑class Anglo‑American family that emphasizes hard work, practicality, and community involvement. While his family’s
    cultural roots are largely Midwestern, the Southwest setting introduced him to Hispanic and Native American influences, evident in the local cuisine, festivals like the Albuquerque International Balloon
    Fiesta, and an appreciation for outdoor recreation. These diverse exposures have shaped his pragmatic outlook while keeping him open to the vibrant cultural fabric of New Mexico.
attributes:
  skills: '[''Surface preparation'', ''Drywall repair'', ''Interior painting'', ''Wallpaper installation'', ''Color matching'', ''Equipment operation'', ''Safety compliance'', ''Client communication'',
