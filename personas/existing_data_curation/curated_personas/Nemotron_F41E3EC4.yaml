  career_goals: Linda aims to complete her bachelor's degree in education and earn a teaching certification within the next two years. She envisions becoming a middle‑school art teacher who blends traditional
    curricula with interdisciplinary projects that encourage curiosity and collaboration. In the longer term, she hopes to develop curriculum packages that integrate the arts across STEM subjects, eventually
    moving into a curriculum specialist or educational consultant role where she can influence district‑wide instructional strategies.
