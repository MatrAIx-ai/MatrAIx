personas:
  professional: Hazel Brown thrives as an industrial control systems technician, combining a hands‑on mechanical aptitude for valves and PLCs with a community‑oriented, sociable approach; they balance curiosity
    about new valve technologies with practical, OSHA‑compliant methods, drive junior technicians with competitive energy, and aim for the ISA Certified Control Systems Technician credential and a future
    foreman role.
  sports: Hazel Brown channels her competitive spark into weekly kick‑boxing sessions at the Peach State Kickboxing Club, pick‑up basketball games with the Eastside Community Center league, avidly roots
    for the Atlanta Hawks and Georgia Bulldogs, and keeps her feet moving at church line‑dancing socials, which together shape a fitness routine that balances high‑intensity cardio with low‑impact social
    dance.
  arts: Hazel Brown finds creative expression in her gospel choir rehearsals, where they harmonize to the sounds of Aretha Franklin, Sam Cooke, and contemporary gospel group Kirk Franklin, while also enjoying
    the soulful riffs of Marvin Gaye at community gatherings and attending occasional regional folk‑theater performances that echo Southern storytelling traditions.
  travel: Hazel Brown loves road‑tripping through the South, having explored Savannah’s historic squares, Asheville’s mountain hikes, and the vibrant music scene of New Orleans, and they plan future trips
    to the Blues Trail in Mississippi and the folk festivals of Williamsburg, Virginia, favoring budget‑friendly drives that allow spontaneous detours for local eateries and community events.
  culinary: Hazel Brown’s culinary persona centers on Southern soul‑food, where they perfect fried chicken with a crisp buttermilk crust, simmer collard greens with smoked ham hocks, bake sweet‑potato pie
    spiced with nutmeg, and experiment with jambalaya using garden‑grown tomatoes and fresh thyme, all while sharing meals at church potlucks and neighborhood cook‑outs.
  core: Hazel Brown blends a mechanical mind with a community‑driven soul, juggling valve repair by day, gospel harmony by night, and a garden of Southern flavors, all while a competitive streak sometimes
    clashes with their laid‑back planning.
background:
  cultural: Hazel grew up in a close‑knit Black family in rural Georgia, where church, family, and community were central pillars. The rich traditions of Southern Black culture—such as gospel music, storytelling,
    and communal meals—shaped her values of resilience, hospitality, and collective support. She maintains strong ties to her extended family and often participates in local church events and cultural festivals
    that celebrate African‑American heritage. This background influences her practical work ethic, her love for communal activities, and her desire to uplift others through mentorship and service.
attributes:
  skills: '["Industrial Valve Installation", "Control System Repair", "PLC Troubleshooting", "Blueprint and Schematic Interpretation", "Flow Measurement Calibration", "Safety Compliance (OSHA)", "Team Leadership",
    "Technical Documentation"]'
  hobbies: '["Community Gospel Choir", "Line Dancing", "Vegetable Gardening", "Southern Soul‑Food Cooking", "DIY Mechanical Projects", "Kick‑Boxing", "Pick‑up Basketball", "Neighborhood Clean‑up Volunteering"]'
  career_goals: Hazel aims to earn the ISA Certified Control Systems Technician (CCST) credential and advance to a senior technician or foreman role within the next three years. She dreams of eventually
    launching her own small contracting firm that specializes in custom valve solutions for local agricultural and manufacturing businesses in rural Georgia. She also hopes to mentor other women and Black
    youth interested in trades, fostering a more inclusive workforce.
