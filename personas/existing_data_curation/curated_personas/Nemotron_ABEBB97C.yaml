  hobbies: '[''Gardening'', ''Traditional Puerto Rican Cooking'', ''Salsa and Bomba Dancing'', ''Church Choir'', ''Crocheting'', ''Genealogy Research'', ''Reading Historical Fiction'', ''Birdwatching'',
