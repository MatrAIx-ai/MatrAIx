  career_goals: Although retired from formal employment, Gloria aims to channel her expertise into volunteer leadership roles within Lake Alfred’s senior center and the local library. She aspires to mentor
    new teachers by sharing her bilingual classroom strategies, to launch a monthly storytelling series that highlights Puerto Rican heritage, and to contribute to a community garden that provides fresh
    produce for low‑income families. Her long‑term ambition is to create a sustainable intergenerational mentorship program that bridges seniors and youth through shared learning and cultural exchange.
