persona_description: A historian who is interested in the study of Native American cultures and their rock art. They have a particular interest in the association of rock art with stone piles and are eager
  to learn more about the history and context of these sites. They have visited Gardener's Lake Chamber site and the Pike/Marshall preserve in Ledyard, CT, and are interested in exploring other areas with
  similar rock art and stone pile sites. They are also interested in the potential for deception and hiding of Native American beliefs, and are cautious about moving, adding, or removing anything from sacred
  sites.
