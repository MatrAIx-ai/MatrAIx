    and Journaling'']'
  career_goals: Jorge aims to establish a boutique production company that balances artistic innovation with fiscal responsibility, allowing him to pursue independent feature films and documentary series
    that highlight under‑represented community stories in New Jersey. He seeks to secure stable funding sources and build a reliable core team to reduce the stress of disorganized workflows. Mentoring emerging
    filmmakers is a priority, as he wants to foster a supportive, inclusive environment that reflects his cooperative nature. Ultimately, Jorge hopes to gain recognition at regional film festivals while
    preserving a healthy work‑life balance for his family.
