  career_goals: Victor aims to earn professional certifications in HVAC (EPA 608) and electrical work (Journeyman) within the next two years, positioning himself for a lead‑technician role on his current
    employer’s team. He is drawn to green‑energy solutions, so he plans to specialize in solar‑panel installations and energy‑efficiency retrofits, eventually launching a boutique contracting firm that
    offers eco‑friendly, aesthetically‑mindful services. Mentoring apprentices is a personal ambition, allowing him to share his curiosity‑driven knowledge while reinforcing his own mastery. Financial stability
    and the flexibility to support a future family are also central to his long‑term objectives.
