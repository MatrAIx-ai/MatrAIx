  career_goals: Eager to build on her reputation for reliability, Lilibeth aims to advance to a senior administrative role, such as office manager or records manager, within the next five years. She plans
    to complete a bachelor's degree in business administration through a community college program and obtain the Certified Administrative Professional (CAP) credential. Her ambition includes leading a
    small team to implement efficiency initiatives that reduce errors and streamline filing procedures, while maintaining a calm, low‑stress work environment. Lilibeth also hopes to leverage her compassionate
    nature by mentoring younger staff and volunteering her organizational expertise for a local nonprofit serving migrant families.
