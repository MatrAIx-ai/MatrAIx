persona_description: A scientist, specifically a biologist, who is part of the Tara Pacific expedition and is studying coralline algae, an organism essential to the life of the coral reef. She is aboard
  the schooner Tara, conducting research on the close links between coral and coralline algae, which play a key role in the formation of colonies, especially for the fixation of coral larvae. She is known
  for her expertise in coral reef ecology and her work on the formation and growth of corals.
