  hobbies: '["Playing strategy video games (Minecraft, League of Legends)", "Building LEGO sets and model kits", "Skateboarding", "Basketball", "Bike maintenance and tinkering", "Listening to hip‑hop, pop,
    and classic rock music", "Creating short TikTok videos featuring gaming highlights or bike tricks"]'
  career_goals: He aims to finish his secondary education through a GED program within the next two years, after which he plans to enroll in a vocational training course to become a certified automotive
    technician. A stable, hands‑on trade appeals to his desire for predictability and the ability to support his family financially. He also considers future service‑oriented roles such as a firefighter
    or a member of the armed forces, where his reliability, teamwork, and community‑focused values would be valuable. His overarching ambition is to secure a steady career that offers both structure and
    the chance to give back to his neighborhood.
