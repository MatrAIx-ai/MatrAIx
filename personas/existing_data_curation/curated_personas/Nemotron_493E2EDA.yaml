personas:
  professional: Raymond, a 15-year-old aspiring game designer, channels his love for strategic video games and meticulous LEGO builds into learning coding basics and teamwork, all while staying grounded
    by his family’s emphasis on hard work and responsibility.
  sports: Raymond spends afternoons at the neighborhood skate park and evenings at the community basketball court, cheering for the Los Angeles Lakers and the LA Rams while keeping a self-made weekly schedule
    of bike maintenance and light cardio to stay fit.
  arts: Raymond, an avid TikTok creator, syncs his gaming highlight reels and bike tricks to beats from Kendrick Lamar, Doja Cat, and occasional classic rock anthems by The Beatles, using these musical
    cues to craft engaging, rhythm-driven content.
  travel: Raymond loves quick weekend escapes to Venice Beach and the thrills of Disneyland, dreams of a future backpacking adventure in Tokyo to explore its gaming arcades and street food, but currently
    plans trips around school breaks and his parents’ budget constraints.
  culinary: Raymond, a modest home-chef, frequently whips up quick meals like pepperoni pizza slices with extra mozzarella, carne asada tacos loaded with cilantro and lime, and a go-to mac and cheese topped
    with crispy bacon bits, while occasionally treating himself to ramen from the local noodle stall.
  core: Raymond balances a disciplined, hard-working mindset with a love for gaming, skateboarding, and TikTok, but often forgets appointments and hoards LEGO instruction manuals like prized trophies.
background:
  cultural: Raymond is a White American teen raised in a working‑class family that moved from the Midwest to Compton, California, seeking better job prospects. Growing up in this culturally diverse urban
    hub, he is exposed daily to a blend of African‑American, Latino, and broader American pop cultures, especially the region’s vibrant hip‑hop scene. While his family maintains traditions typical of a
    suburban Midwestern background, such as attending a local Protestant church and valuing hard work, Raymond’s daily life reflects the multicultural rhythm of his neighborhood, from the language heard
    on the streets to the community events he participates in. This hybrid cultural setting shapes his worldview, fostering both a respect for his family’s roots and an appreciation for the diverse community
    around him.
attributes:
  skills: '["Basic computer operation and digital communication", "Strategy video game tactics and teamwork", "Mechanical troubleshooting (bicycles and small engines)", "Household chores and basic cooking",
