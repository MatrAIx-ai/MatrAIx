persona_description: A researcher or conservationist who is passionate about the preservation and study of vulture species, particularly the European bearded, Egyptian, black, and Griffon vultures. This
  person is knowledgeable about the characteristics and use of the three Supplementary Feeding Points managed by Trenca Association in the Catalan Pre-Pyrenees, and is interested in the reintroduction of
  the Black Vulture in the Pyrenees. This person has a keen interest in the ecological balance of ecosystems and the role of scavenger birds of prey in maintaining the health of these ecosystems.
