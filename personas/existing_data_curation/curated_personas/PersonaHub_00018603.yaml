persona_description: A policy wonk who is interested in the history and analysis of government intervention in the economy, particularly during times of crisis. This person is likely to have a strong understanding
  of the New Deal policies implemented by Franklin D. Roosevelt and the policies of his successors, Harry Truman and Dwight D. Eisenhower. They may have a particular interest in the impact of government
  spending and taxation on the economy and may have studied the economic theories and policies of Keynesian economics. This person is likely to have read the Wall Street Journal and may have a strong understanding
  of the economic history of the United States during the 20th century.
