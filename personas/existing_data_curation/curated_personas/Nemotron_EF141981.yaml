  hobbies: '[''Salsa dancing'', ''Community volunteering'', ''Book club (personal development)'', ''Group fitness classes (Zumba, bootcamp)'', ''Hiking'', ''Traditional Mexican cooking'']'
  career_goals: Maria aims to advance from a front‑line representative to a team lead within the next two years, then pursue a supervisory or operations manager position at a regional call center. She plans
    to complete a bachelor’s degree in Business Administration or Management while gaining certifications in Six Sigma and customer experience design. Long‑term, she hopes to shape customer‑service strategy
    for a multinational firm, leveraging her bilingual background and process‑driven mindset.
