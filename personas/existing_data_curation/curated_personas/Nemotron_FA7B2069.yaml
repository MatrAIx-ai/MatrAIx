personas:
  professional: Felicia Oringer, a five‑year‑old budding inventor, spends afternoons at the preschool makerspace where they methodically build LEGO structures and experiment with simple circuits, balancing
    their curiosity about how things work with a surprisingly organized approach to documenting each trial.
  sports: Felicia Oringer plays on the Little Strikers Soccer Club, cheering loudly for the Chicago Fire and the Chicago Cubs while enthusiastically joining their kindergarten's weekend t‑ball practice,
    a routine they organize with a color‑coded schedule they draw themselves.
  arts: Felicia Oringer delights in drawing whimsical characters from Pixar movies like Toy Story and enjoys singing along to Taylor Swift’s upbeat tracks during playtime, often staging mini‑concerts for
    family using a toy microphone and glitter stickers to decorate their stage.
  travel: Felicia Oringer prefers short family road trips to nearby nature reserves such as the Great Smoky Mountains, where they can collect pine cones and press wildflowers into their scrapbook, yet they
    dream of visiting Disney World’s Magic Kingdom for a day of wonder.
  culinary: Felicia Oringer loves crunchy carrot sticks, mac & cheese with extra cheese, and baking simple chocolate chip cookies with their mom, proudly insisting on stirring the batter themselves despite
    occasionally spilling flour all over the kitchen counter.
  core: Felicia Oringer is a methodical yet adventurous five‑year‑old whose love for building, saving, and organizing coexists with a sweet tooth, a habit of sticker‑trading, and a fierce determination
    to lead their playgroup’s games.
background:
  cultural: Felicia lives in a predominantly Anglo‑American household in Brownsville, Texas, where she experiences a mix of Southern Texas culture and the vibrant Hispanic influences of the border region.
    Her family celebrates holidays such as Thanksgiving and Christmas while also participating in community events like Charro Days and local festivals, where she hears Spanish greetings and songs. At preschool
    she is exposed to basic Spanish phrases, and she enjoys Tex‑Mex cuisine and the communal spirit of neighborhood gatherings.
