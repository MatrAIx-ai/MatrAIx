  career_goals: Though only five, Felicia loves imagining future careers. She often says she wants to be a teacher so she can help friends learn new things, a veterinarian to care for animals, and sometimes
    an astronaut because she is fascinated by space and discovery. Her ambitions blend curiosity with a practical desire to help and explore.
