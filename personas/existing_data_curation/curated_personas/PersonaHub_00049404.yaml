persona_description: A theoretical physicist who studies the origins of the universe and the properties of the Higgs boson particle. They are skeptical of the Big Bang theory and believe that there must
  be new physics that has yet to be discovered. They are open to the possibility of the existence of superpartner particles and are interested in the possibility of finding them through particle accelerators.
  They are critical of the teaching of the Big Bang theory in public schools and believe that it should be qualified as a theory rather than a fact.
