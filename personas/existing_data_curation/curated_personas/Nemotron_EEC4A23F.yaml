personas:
  professional: Jeannette Diaz, a seasoned flooring specialist with eight years of hands‑on experience in residential and commercial carpet, hardwood, and tile installations, leverages precise measurement,
    layout planning, and Mexican‑inspired decorative patterns to deliver seamless transitions, while pursuing a Certified Flooring Installer credential and a construction‑management associate degree to
    step into supervision and eventually launch a boutique focusing on custom, art‑infused tile work.
  sports: Jeannette Diaz, an avid hiker, joins the Dallas Trails Club for Saturday treks in Cedar Ridge and enjoys cheering on the Dallas Cowboys while also playing occasional recreational volleyball at
    a local community center.
  arts: Jeannette Diaz, a devoted gallery‑goer, spends weekends exploring the Dallas Arts District’s contemporary exhibits, documenting vivid murals by local street artists, and curating a personal Instagram
    feed of close‑up photographs featuring texture‑rich tile patterns, often drawing inspiration from the works of Frida Kahlo and Diego Rivera.
  travel: Jeannette Diaz, a culturally curious traveler, blends weekend road trips to Santa Fe and Austin with occasional international getaways to Oaxaca to study traditional mole recipes, preferring boutique
    hotels that showcase local art over generic chains.
  culinary: Jeannette Diaz, an enthusiastic home cook, masters homemade mole poblano, hand‑rolled tamales, and cenita de verde, while sourcing fresh chilies, corn masa, and epazote at the Dallas Farmers
    Market and pairing dishes with craft mezcal or sparkling agua fresca.
  core: Jeannette Diaz, a meticulous floor‑finisher with a love for mosaics, balances a chronic worry about deadlines with nightly yoga, a penchant for photographing textures, and an impulsive habit of
    buying extra tiles she never uses.
background:
  cultural: Jeannette grew up in a Mexican‑American household in Dallas, where Spanish was spoken alongside English and family gatherings centered around food, music, and celebrations such as Día de los
    Muertos and Cinco de Mayo. Her parents instilled a strong work ethic and respect for community, which she carries into her professional life. She maintains close ties with her extended family and often
    volunteers at a local cultural center, helping to organize art workshops for youth. The vivid colors and geometric motifs of Mexican folk art inspire her aesthetic choices, and she enjoys sharing her
    heritage through cooking traditional dishes and teaching Spanish to her children.
attributes:
  skills: '["Floor installation", "Tile finishing", "Carpet stretching", "Material measurement and layout planning", "Client communication", "Safety compliance", "Problem solving", "Artistic pattern design",
    "Basic bilingual communication (Spanish/English)", "Project scheduling", "Physical stamina"]'
  hobbies: '["Visiting art museums and galleries", "Exploring local mural and street art", "Mexican cooking and recipe experimentation", "DIY home‑decor and mosaic projects", "Yoga practice", "Mindfulness
    journaling", "Hiking and nature walks", "Photography of textures and patterns", "Reading contemporary fiction", "Gardening"]'
  career_goals: Jeannette aims to transition from on‑site installation to a supervisory role, eventually managing a small crew or opening her own floor‑finishing boutique that specializes in custom, art‑inspired
    tile work. She plans to earn a Certified Flooring Installer credential and complete an associate degree in construction management, which will enable her to handle larger projects, improve budgeting,
    and reduce the stress of tight deadlines. Long‑term, she wants to mentor apprentices—particularly women and Latinx workers—and build a reputation for high‑quality, culturally resonant installations.
