persona_description: A geovisualization researcher and educator with expertise in Flash and Flex, who is passionate about developing creative geovisualization tools and exploring the perceptual and cognitive
  issues in dynamic tool design. They have experience in creating map-oriented, cross-platform rich Internet applications using Adobe Flash and Flex, and have a track record of using these tools to support
  experiments that explore the spatial information acquisition and analysis from maps, mobile devices, and the environment. They are currently working on developing new tools and applications using FlexLayers
  and have a goal of helping students develop knowledge and skills to successfully build and apply geographically-aware analytical and presentation tools.
