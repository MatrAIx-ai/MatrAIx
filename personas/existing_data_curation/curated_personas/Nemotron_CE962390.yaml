  career_goals: David aims to leverage his technical background and customer service experience to transition into a customer experience management or operations leadership role within the next five years.
    He plans to obtain certifications such as Six Sigma Green Belt and Certified Customer Experience Professional (CCXP) to strengthen his expertise in process optimization and service design. Ultimately,
    he envisions leading a small team focused on improving service efficiency, developing data-driven strategies, and integrating technology solutions that enhance customer satisfaction while maintaining
    the disciplined, reliable approach he values.
