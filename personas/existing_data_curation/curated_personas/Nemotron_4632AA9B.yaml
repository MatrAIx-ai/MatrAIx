  career_goals: Hye aims to turn her eclectic creative talents into a sustainable freelance career, eventually launching a boutique studio that focuses on immersive, culturally resonant visual experiences
    such as AR installations and graphic storytelling. She aspires to become a lead concept artist for a game or animation studio, while also curating community art projects that bring together diverse
    groups in San Francisco’s neighborhoods. Long‑term, she hopes to publish a graphic novel that fuses East Asian motifs with contemporary sci‑fi aesthetics.
