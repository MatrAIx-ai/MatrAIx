personas:
  professional: A 24‑year‑old freelance visual creator, Hye Chen blends digital illustration, graphic design, and concept sketching to craft immersive AR installations and graphic stories, leveraging their
    strong social skills, improvisational flair, and a relaxed, flexible work style that embraces spontaneous inspiration over rigid planning.
  sports: A sociable sports enthusiast, Hye Chen enjoys weekend beach volleyball in Ocean Beach, plays intramural pick‑up basketball with a local SF youth league, follows the Golden State Warriors and San
    Francisco Giants avidly, and participates in a downtown pickleball club that meets after yoga sessions at Yoga Tree every Thursday.
  arts: An avid cultural explorer, Hye Chen regularly attends gallery openings featuring works by Shepard Fairey and Yayoi Kusama, seeks out street art murals by Banksy and local SF graffiti crews, streams
    indie music from Mitski and Tame Impala, and hones improvisational performance skills at weekly improv workshops at the San Francisco Improvisation Theatre.
  travel: A curious wanderer, Hye Chen loves spontaneous weekend getaways to Napa Valley vineyards and Yosemite’s sunrise hikes, has explored the night markets of Taipei and the historic temples of Seoul
    for a calligraphy workshop, and dreams of a month‑long artistic residency in Kyoto to study contemporary sci‑fi inspired design while balancing a modest travel budget.
  culinary: A culinary experimenter, Hye Chen enjoys crafting Asian‑fusion dishes like kimchi‑topped avocado toast, miso‑glazed pork belly bao, and yuzu‑infused matcha tiramisu, typically cooking at an
    intermediate skill level in their small Berkeley kitchen, and often incorporates gochujang, fermented black beans, and fresh shiso leaves to add bold flavors.
  core: A free‑spirited visual creator, Hye Chen thrives on spontaneous collaboration, collects vintage sketchbooks, but habitually leaves coffee cups scattered across workspaces and occasionally misses
    freelance deadlines when inspiration strikes late at night.
background:
  cultural: Hye is of East Asian descent, raised in a bilingual household where Mandarin/Korean and English intertwine. Growing up in San Francisco’s multicultural environment, she blends traditional Asian
    cultural practices—such as celebrating Lunar New Year and practicing calligraphy—with the Bay Area’s progressive arts scene. This hybrid upbringing nurtures a unique aesthetic that fuses classic motifs
    with contemporary urban influences.
