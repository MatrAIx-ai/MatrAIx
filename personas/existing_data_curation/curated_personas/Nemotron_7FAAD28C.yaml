  career_goals: Julia aims to advance from a crew member to a shift supervisor within the next year, using her hands‑on experience to develop leadership skills. She plans to earn a food‑service certification
    and enroll in a community‑college program in hospitality management. Long‑term, she dreams of opening a small café or food‑truck that blends Tex‑Mex flavors with seasonal, locally sourced ingredients,
    allowing her to combine her curiosity for new cuisines with her practical work ethic. She also hopes to mentor other young workers and foster a supportive workplace culture.
