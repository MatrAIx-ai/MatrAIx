personas:
  professional: Julia Mattock is a fast‑food counter attendant; they excel at multitasking, conflict resolution, and mentoring new coworkers, turning their practical reliability and outgoing curiosity into
    a fast‑track path toward a shift supervisor role.
  sports: Julia Mattock enjoys playing volleyball in a community league, hikes the Franklin Mountains year‑round, and cheers for the El Paso Chihuahuas during baseball season; they also follow the Dallas
    Cowboys for football, embodying a sporty, team‑spirit mindset.
  arts: Julia Mattock spends weekends at indie‑rock shows featuring bands like Tame Impala and Arcade Fire, practices salsa and line dancing to music from Selena and Shakira, and curates a small collection
    of local street‑art prints; they weave vibrant artistic expression into their social life.
  travel: Julia Mattock prefers spontaneous weekend road trips to nearby Santa Fe for art festivals and to Rio Grande vineyards, dreams of a future backpacking adventure through Mexico City’s markets, and
    balances wanderlust with a tight college budget; they often plan trips on a shoestring to stretch every dollar.
  culinary: Julia Mattock is an intermediate home chef who loves whipping up shrimp tacos with mango salsa, queso fundido topped with chorizo, and breakfast burritos drizzled with chipotle‑infused crema;
    they constantly experiment with fusion recipes after watching YouTube tutorials.
  core: Julia Mattock blends a curious, outgoing energy with practical reliability; they turn their love for community, dance, and fusion cooking into a vibrant, slightly impulsive life rhythm.
background:
  cultural: Julia is a white Texan who grew up in El Paso, a city where American and Mexican cultures intersect. While her family traditions are rooted in classic Southern and Midwestern celebrations—like
    Thanksgiving and Fourth of July fireworks—she also embraces the vibrant binational community around her. She speaks conversational Spanish, enjoys local Tex‑Mex cuisine, participates in neighborhood
    festivals such as the Sun Bowl Parade, and values the strong sense of hospitality that characterizes El Paso. This blend of cultures informs her outlook, making her comfortable in diverse settings and
    appreciative of both her own heritage and the rich multicultural environment of the border region.
