personas:
  professional: Oi Mahaffey is a budding young coder who applies their knack for structure to mastering Scratch projects, building intricate LEGO mechanisms, and challenging themselves in chess tournaments,
    showcasing a methodical approach to problem‑solving even at a primary‑school level.
  sports: Oi Mahaffey practices taekwondo every Saturday at the local dojo, follows the junior soccer league's Little Lions team, and roots for the nearby professional basketball franchise, the Chicago
    Bulls, channeling their competitive spirit into both individual and team sports.
  arts: Oi Mahaffey immerses themselves in creative builds, crafting detailed LEGO cityscapes inspired by the works of architect Frank Lloyd Wright, listening to the upbeat tunes of the Kidz Bop Kids while
    flipping through Studio Ghibli art books, and collecting stamps that depict iconic East Asian landmarks as a form of visual art appreciation.
  travel: Oi Mahaffey dreams of visiting the interactive exhibits at the Exploratorium in San Francisco and the historic temples of Kyoto, but currently enjoys day trips to local science museums and the
    community park's LEGO sculpture garden, balancing a love for discovery with family‑budget constraints.
  culinary: Oi Mahaffey prefers simple, hands‑on meals like homemade macaroni and cheese, sushi roll kits they assemble with parental help, and custom LEGO‑themed cupcakes topped with rainbow sprinkles,
    often experimenting with ingredients like cheddar cheese and soy sauce while still developing basic cooking skills.
  core: Oi Mahaffey is a methodical nine‑year‑old who thrives on structured play, cautious budgeting, and disciplined routines, yet wrestles with anxiety and occasional neglect of self‑care, turning their
    competitive edge into both meticulous creations and focused learning.
background:
  cultural: Oi Ko comes from an East Asian family that emigrated from Taiwan. At home, Mandarin is spoken alongside English, and his parents emphasize academic achievement and respect for elders. The family
    celebrates Lunar New Year, Mid‑Autumn Festival, and traditional holidays with gatherings and food such as dumplings and mooncakes. Living in Saint Paul, he participates in a local cultural center that
    offers Mandarin lessons and celebrates Asian heritage events, blending his Taiwanese roots with Midwestern American life.
