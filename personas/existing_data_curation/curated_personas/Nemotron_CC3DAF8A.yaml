  career_goals: Sally aims to steer her company toward sustainable growth by entering emerging markets that align with her curiosity for innovative technologies while preserving the solid operational foundations
    she values. She is committed to establishing a robust succession plan that empowers the next generation of diverse leaders, especially women, to continue the legacy of responsible stewardship. Beyond
    corporate objectives, she aspires to launch a community‑focused nonprofit that leverages her company's resources for local education and workforce development, strengthening the social fabric of Glendora
    and the broader Camden County region. She also seeks to enhance the organization’s environmental and social governance (ESG) profile, integrating flexibility and pragmatic solutions into long‑term corporate
    responsibility initiatives.
