  hobbies: '["abstract painting", "drum jam sessions", "poetry and short story writing", "reading African-American literature", "listening to blues and jazz", "gardening herbs and vegetables", "cooking
    Southern dishes", "participating in church choir", "organizing neighborhood block parties", "volunteering at the library reading program", "community theater improvisation"]'
  career_goals: Michael hopes to channel his lifelong love of art, storytelling, and community engagement into a flexible, purpose‑driven vocation. His primary ambition is to establish a low‑cost community
    art studio in Vancleave where residents of all ages can take workshops, showcase their work, and collaborate on public murals. He also aims to become a part‑time facilitator for creative writing and
    improvisational theater at the local community center, turning his natural ability to generate ideas into structured programs. In parallel, Michael plans to compile a memoir of his experiences growing
    up as a Black man in rural Mississippi, hoping to publish it as a means of preserving family history and amplifying regional voices. These goals reflect his desire for novelty, personal expression,
    and meaningful social impact while allowing enough flexibility to manage his stress and maintain a relaxed lifestyle.
