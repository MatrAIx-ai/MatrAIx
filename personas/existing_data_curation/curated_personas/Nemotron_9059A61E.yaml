  career_goals: In retirement, Yesenia aims to remain an active cultural ambassador in Tuolumne County. She plans to launch a monthly Mexican‑cooking workshop at the local senior center, mentor younger
    residents in Spanish language and heritage, and compile a handwritten family recipe book paired with recorded oral histories for future generations. She hopes to volunteer as a liaison for the Hispanic
    Heritage Council, help organize the town’s Día de los Muertos observances, and eventually travel back to her hometown in Jalisco to reconnect with relatives and bring back authentic stories and recipes.
    Maintaining her health through regular walking on the Sierra foothills and staying mentally engaged are also core ambitions.
