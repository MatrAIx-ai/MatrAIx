personas:
  professional: Christine Demello, a 59-year-old cleaning specialist, leverages their meticulous deep-cleaning expertise, precise inventory control, and methodical, competitive drive to launch a boutique
    residential cleaning service that aspires to be the most reliable provider in their New Orleans neighborhood.
  sports: Christine Demello, an avid supporter of the New Orleans Saints and Pelicans, joins the Algiers Walking Club for early-morning strolls around the French Quarter and occasionally participates in
    a senior bowling league at the Uptown Bowl, preferring low-impact activities that fit their reserved lifestyle.
  arts: Christine Demello finds solace in live jazz at Preservation Hall, spins classic recordings by Wynton Marsalis and Ella Fitzgerald on their vintage turntable, immerses themselves in Agatha Christie
    mystery novels, and dedicates weekends to quilting inspired by Faith Ringgold’s narrative patches.
  travel: Christine Demello, after years of exploring the French Market, dreams of a culinary pilgrimage to New Orleans’s sister city Paris while also planning a relaxed road trip along the Gulf Coast to
    Charleston, balancing careful budgeting with their desire for cultural immersion.
  culinary: Christine Demello experiments with Creole classics such as gumbo, jambalaya, and shrimp étouffée, often seasoning with home-grown thyme, oregano, and okra, applying a disciplined approach to
    cooking that mirrors their inventory-controlled cleaning routine, yet sometimes over-spices in a bid to discover a new family favorite.
  core: Christine Demello is a methodical, curiosity-driven solitary doer who blends a love of tradition with competitive ambition, turning everyday chores into precise, purposeful art.
background:
  cultural: Christine grew up in a working‑class, white family rooted in the French‑Creole and Irish traditions of New Orleans. Raised in a modest neighborhood of Orleans Parish, she was immersed in the
    city’s blend of Southern hospitality, Catholic rituals, and the vibrant cultural tapestry of music, cuisine, and community festivals. Her upbringing emphasized self‑reliance, a strong work ethic, and
    respect for the city’s unique heritage, shaping her practical outlook and appreciation for both new ideas and time‑tested customs.
attributes:
  skills: '[''deep‑cleaning techniques'', ''floor stripping, waxing, and polishing'', ''laundry management'', ''inventory control'', ''budgeting and supply ordering'', ''home organization'', ''basic home
