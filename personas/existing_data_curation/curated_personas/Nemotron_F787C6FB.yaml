  hobbies: '[''Creole cooking experiments'', ''balcony gardening'', ''listening to jazz'', ''reading mystery novels'', ''quilting'', ''visiting the French Market'']'
  career_goals: Christine aims to transition from employee to owner‑operator of a modest, reputable cleaning service that caters to small residential clients in New Orleans. She plans to obtain a state‑approved
    janitorial certification and to mentor a few trusted apprentices, leveraging her competitive drive to be recognized as the most reliable and efficient provider in her neighborhood. Over the next five
    years she hopes to purchase a modest home of her own, achieve financial stability for retirement, and eventually give back to her community by offering free cleaning workshops for low‑income seniors.
