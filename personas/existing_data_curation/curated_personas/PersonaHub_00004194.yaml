  in using cutting-edge technology and machine learning techniques to understand and predict changes in Arctic glaciers, with the ultimate goal of informing and engaging communities about the impacts of
  climate change. The candidate is a strong researcher with a focus on developing innovative tools and user-friendly mapping solutions for the Arctic region.
