personas:
  professional: Brenda Orsell, a budding junior naturalist, channels her love for picture books, LEGO world-building, and animal drawing into creative science projects at school and home, blending her curiosity
    with a practical, organized approach and balancing social collaboration with moments of focused independence.
  sports: Brenda Orsell loves playing soccer at recess, rides her pink bike around the neighborhood, passionately cheers for the Cleveland Browns, Cleveland Guardians, and Cleveland Cavaliers, and trains
    with the Cuyahoga County Youth Soccer club, blending her cooperative spirit with a dash of assertive drive on the field.
  arts: Brenda Orsell delights in sketching vivid animals and colorful landscapes, building imaginative LEGO worlds, and immersing herself in Pixar films like 'Toy Story', Disney soundtracks by Lin-Manuel
    Miranda from 'Moana', and Dr. Seuss picture books, all of which shape her vibrant creative identity.
  travel: Brenda Orsell enjoys family trips to nearby attractions such as the Cleveland Museum of Natural History, Cuyahoga Valley National Park, and a weekend excursion to Niagara Falls, while dreaming
    of future adventures to Disney World and a school-organized field trip to Washington, D.C., balancing local exploration with a budding curiosity for iconic U.S. landmarks.
  culinary: Brenda Orsell, an aspiring junior chef, loves helping her mom bake chocolate-chip cookies and sugar-spice shortbread, savors pepperoni pizza and creamy mac and cheese, and whips up strawberry-banana
    smoothies with fresh berries and honey, proudly presenting her creations at family dinner.
  core: Brenda Orsell blends relentless curiosity with down-to-earth practicality, building LEGO kingdoms by day, leaving a trail of cookie crumbs by night, and navigating friendships with a mix of cooperative
    kindness and confident assertiveness.
background:
  cultural: Brenda is a white child growing up in a middle‑class family in Cleveland, Ohio. Her family’s heritage traces to Irish and German ancestry, and they celebrate typical Midwestern customs—Thanksgiving,
    Christmas, and seasonal community events. The city’s diverse neighborhoods and institutions like the Cleveland Museum of Natural History and the zoo provide her with exposure to a variety of cultural
    experiences. Her upbringing reflects Midwestern values of friendliness, community involvement, and a balance between independence and cooperation. She attends a public elementary school where she interacts
    with peers from many backgrounds, fostering an appreciation for diversity while maintaining her family’s cultural traditions.
