  hobbies: '[''Reading picture books and adventure stories'', ''Drawing and coloring'', ''Building LEGO structures'', ''Playing soccer'', ''Bike riding'', ''Collecting rocks and insects'', ''Watching educational
    science shows'', ''Baking simple cookies with family'']'
  career_goals: Brenda dreams of becoming a teacher because she loves sharing what she learns and helping friends understand new ideas. She also imagines caring for animals as a veterinarian and is fascinated
    by space, hoping one day to be an astronaut. In the short term, she sets goals like reading a new book each month, improving her math skills, and helping her parents with simple cooking tasks, reflecting
    her blend of curiosity and practicality.
