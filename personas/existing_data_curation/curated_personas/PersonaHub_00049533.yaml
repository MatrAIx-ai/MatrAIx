persona_description: A paleoclimatologist who specializes in the study of the paleo-environment of East Africa, particularly the Lake Turkana region. They are interested in understanding the chronology
  and variability of the lake's water levels and the hydroclimate during the African Humid Period (AHP). They have a deep understanding of the paleo-environmental proxies and have conducted extensive research
  on the lake's water levels and hydroclimate. They are also interested in the source of moisture to sustain these many high stands and have used isotopic data on leaf wax, various metrics of runoff, and
  associated sea surface temperature records from the Indian and Atlantic oceans to infer the source of moisture.
