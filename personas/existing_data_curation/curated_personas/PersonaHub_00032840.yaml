persona_description: A scientist working on the study of ocean currents and debris, particularly in relation to the effects of tsunamis and the debris they produce. They have experience in computer modeling
  and have collaborated with other researchers on projects related to oceanic debris. They are interested in the potential impact of debris from the March 11, 2011, earthquake and tsunami on Hawaii and
  the West Coast, and are actively seeking information from boaters and other interested parties to gather details about the debris field.
