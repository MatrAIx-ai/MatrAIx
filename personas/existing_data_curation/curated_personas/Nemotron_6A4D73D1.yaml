  career_goals: Marco aims to complete his high‑school education and enroll in a tribal community college, where he hopes to study environmental science or civil engineering. He wants to apply his practical
    mindset to develop sustainable water‑management and renewable‑energy projects for the Second Mesa community. In the long term, he envisions a role as a community liaison or youth mentor, using his cultural
    knowledge and technical skills to preserve Hopi traditions while promoting modern infrastructure. He also dreams of creating a digital archive of Hopi stories and songs, ensuring they remain accessible
    to future generations.
