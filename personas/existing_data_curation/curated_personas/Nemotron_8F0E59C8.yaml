    apps)", "Conflict resolution", "Time management"]'
  hobbies: '["Watercolor painting", "Visiting art galleries and museums", "Korean cooking and recipe sharing", "Gardening (vegetable and herb garden)", "Hiking in Solano County and Mount Diablo", "Yoga
    and mindfulness meditation", "Karaoke evenings", "Reading educational research and pedagogy books", "Volunteering at community art workshops", "Participating in Korean cultural festivals"]'
  career_goals: Ha aims to formalize her expertise by completing an associate degree in Early Childhood Education and obtaining a California Child Development Credential. She aspires to become a lead teacher
    or curriculum specialist, designing a district‑wide, culturally inclusive arts program that highlights Korean storytelling traditions. In the long term, she dreams of opening her own preschool that
    blends Montessori principles with East‑Asian cultural enrichment. She also seeks opportunities to present at national early‑learning conferences, mentor novice teachers, and advocate for increased public
    funding for preschool services in Solano County.
