personas:
  professional: Douglas Houston is an aspiring junior architect and storyteller who loves building elaborate LEGO structures and sketching vivid watercolor scenes, and they use their organized, talkative
    nature to lead classroom projects and design posters for school events.
  sports: Douglas Houston dashes around the local park playing soccer for the Ennis Youth Soccer Club in the fall, eagerly mimics the Dallas Cowboys’ moves on TV, cheers for the Texas Rangers during family
    gatherings, and they embrace a playful, high‑energy approach to fitness by joining tag games and weekend hikes.
  arts: Douglas Houston spends afternoons doodling bright watercolor landscapes inspired by desert sunsets, singing along to Luke Bryan in school choir, and reenacting scenes from Disney’s Mickey Mouse
    cartoons while crafting stories with their toy figures, and they let the arts shape their imaginative play.
  travel: Douglas Houston enjoys weekend road trips to the Ellis County Fair and annual family outings to the San Antonio River Walk, dreams of a future adventure to Disney World in Florida, and they prefer
    parent‑planned itineraries over spontaneous wanderings, balancing curiosity with a love for familiar comforts.
  culinary: Douglas Houston favors cheesy macaroni, crispy chicken nuggets, and sweet strawberry slices, proudly helps stir batter for pancakes on Sunday mornings, and they delight in the warm aroma of
    freshly baked apple pie from Grandma’s kitchen.
  core: Douglas Houston is a bright‑eyed, talkative six‑year‑old who blends a love for colorful art, organized LEGO engineering, and community‑spirit into every playground adventure, occasionally forgetting
    to take their allergy medication when caught up in excitement.
background:
  cultural: Douglas is raised in Ennis, Texas, a small close‑knit community in Ellis County. His family follows typical Southern values of hospitality, community service, and respect for tradition. He often
    attends church gatherings and community events such as the Ellis County Fair, local parades, and school celebrations. The region’s love for outdoor activities, country music, and Texas‑proud customs
    shape his everyday life, and his family encourages curiosity, kindness, and participation in group activities.
