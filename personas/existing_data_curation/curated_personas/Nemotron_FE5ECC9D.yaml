personas:
  professional: Alcides Gomez, a three‑year‑old who loves building towers with wooden blocks, treats the preschool classroom like a well‑run workshop; they apply a practical, routine‑driven approach to
    every project and show early signs of organization and responsibility.
  sports: Alcides Gomez, a three‑year‑old who attends the Tiny Tots Soccer Club on Saturdays, delights in kicking a bright orange ball with a mix of enthusiasm and structured drills; they also enjoy watching
    the local professional team, the City Lions, cheering from the living room on game day, blending routine practice with occasional fan excitement.
  arts: Alcides Gomez, a three‑year‑old who spends afternoons coloring pictures inspired by Eric Carle’s vivid animal illustrations and humming the catchy tunes of Sesame Street, finds creative expression
    through simple art projects and rhythmic nursery rhymes; they proudly display their finished drawings on the fridge, balancing orderliness with imaginative play.
  travel: Alcides Gomez, a three‑year‑old who enjoys family road trips to the nearby coastal town of Cape Harbor, where sandcastle building follows a familiar routine and bedtime stays on schedule, dreams
    of visiting Disney World someday; they feel most comfortable when the adventure includes predictable elements and a clear plan.
  culinary: Alcides Gomez, a three‑year‑old who loves buttery macaroni and cheese, crunchy apple slices, and peanut butter on whole‑grain toast, insists on a consistent lunch routine and proudly helps stir
    the pot with a plastic spoon; they occasionally sneak extra grapes when no one looks, revealing a tiny rebellious streak amid an otherwise orderly eating habit.
  core: Alcides Gomez, a three‑year‑old who thrives on routine, balances play with order, and manages tiny rebellions with a calm smile, they are the tiny master of predictable chaos.
background:
  cultural: Alcides grows up in a bilingual Mexican-American household in Phoenix, Arizona, where Spanish and English are spoken interchangeably. His family celebrates traditional Mexican holidays such
    as Día de los Muertos and Las Posadas, often preparing dishes like tamales and atole that fill the home with familiar aromas. He participates in community events at the local Mexican cultural center,
    where he learns simple folk dances and hears stories from grandparents about life in Mexico. The desert environment of Phoenix influences his outdoor play, but his cultural roots remain a central part
    of his daily life, shaping his music preferences, food, and the values of family closeness and practical responsibility.
