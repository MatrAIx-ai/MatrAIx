persona_description: A conservationist who is passionate about preventing the spread of invasive species and has expertise in aquatic invasive species management. They are knowledgeable about the biology,
  ecology, and distribution of European Water Chestnut and are actively involved in the surveying, monitoring, and education efforts to prevent its spread. They have experience in managing aquatic invasive
  species in lakes and rivers, and are equipped with the necessary knowledge and skills to clean, drain, and dry their boats, gear, and footwear before moving to new bodies of water. They are also familiar
  with reporting the presence of European Water Chestnut and have access to the online database for tracking and managing invasive species, such as NYIAPinvasives.org.
