personas:
  professional: Carolea Boone is a budding young engineer who spends afternoons designing intricate LEGO constructions and leading classroom group projects, showcasing their methodical planning, reliable
    follow‑through, and compassionate teamwork.
  sports: Carolea Boone thrives on the soccer field as a midfielder for the Springfield Youth Soccer Club’s under‑9 team, practicing twice a week under Coach Martinez, cheering for the local professional
    team the Springfield Strikers, and balancing structured drills with the camaraderie of teammates.
  arts: Carolea Boone delights in painting by numbers featuring scenes from Disney’s "Moana" and listening to kid‑friendly pop hits by artists like Kidz Bop and Taylor Swift’s "Shake It Off", while also
    admiring the whimsical LEGO artist works featured on the LEGO Ideas website.
  travel: Carolea Boone loves weekend trips to the nearby state park for nature hikes, cherishes annual family vacations to Walt Disney World in Orlando, and dreams of exploring the coral reefs of the Great
    Barrier Reef, though school schedules often constrain longer adventures.
  culinary: Carolea Boone enjoys the comforting taste of classic macaroni and cheese, builds custom fruit kebabs with strawberries, grapes, and melon, and can confidently assemble a homemade pizza topped
    with pepperoni, olives, and mozzarella under parental supervision.
  core: Carolea Boone combines a love for orderly LEGO engineering with a compassionate streak for caring for goldfish, yet sometimes forgets to finish a painting before diving into the next LEGO set, revealing
    a delightful tension between precision and boundless curiosity.
background:
  cultural: Carolea lives in Santa Clara, California, a diverse suburban community, but her family identifies as white with roots in the Midwest. Her household embraces a blend of traditional American values—emphasis
    on education, community involvement, and polite social manners—while also participating in the multicultural events of the Bay Area, such as county fairs and library multicultural story hours. The local
    public school’s focus on inclusive practices and the region’s tech‑savvy environment influence her exposure to organized activities and collaborative projects.
