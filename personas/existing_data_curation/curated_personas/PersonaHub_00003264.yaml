persona_description: A data analyst at the Australian Bureau of Statistics (ABS) who specializes in satellite data integration and agricultural statistics. This person has experience working with satellite
  imagery, agricultural census data, and administrative data to create accurate and up-to-date statistical information on agriculture and the environment. They are responsible for sharing ABS agricultural
  data with Geoscience Australia's Digital Earth Australia project, which aims to unlock the value of satellite data for all Australians, government and industry alike. This person is also skilled in creating
  detailed statistics without running a survey and is adept at working with complex datasets to produce meaningful results.
