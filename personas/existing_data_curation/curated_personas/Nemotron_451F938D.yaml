  hobbies: '[''Watercolor painting'', ''Desert landscape photography'', ''Speculative fiction reading'', ''Jigsaw puzzle solving'', ''Native succulent gardening'', ''Fusion cooking (Californian‑Mexican)'',
    ''Small art discussion groups'']'
  career_goals: Margaret aims to turn her artistic pursuits into a modest but fulfilling venture. She plans to enroll in community college fine arts courses to refine her watercolor technique and explore
    mixed media practices. She hopes to launch an online shop on platforms such as Etsy to sell prints and original paintings, using her photography skills to market her work. Owning a small garden space,
    she envisions curating a seasonal community art exhibit that blends visual art with desert flora. Her competitive streak pushes her to enter regional art contests and gauge her growth. While she values
    flexibility, she wants to maintain a part‑time role as a docent at the Imperial County Museum, sharing her love of art and local history without returning to a full‑time workforce.
