personas:
  professional: Keonte Pryor, a 28‑year‑old carpenter in Baltimore, blends hands‑on framing expertise with a curious embrace of digital design tools like SketchUp and CNC routing to create eco‑friendly
    custom furniture, while his relaxed, flexible planning and cooperative communication style keep client projects fluid yet technically sound as he works toward journeyman certification and a future boutique
    workshop.
  sports: Keonte Pryor, an avid pickup basketball player at his neighborhood park, follows the Baltimore Ravens and Orioles, hikes the rugged trails of Patapsco Valley State Park on weekends, and maintains
    a flexible fitness routine that includes late‑night jogs and occasional weight‑training sessions, reflecting his relaxed approach to obligations.
  arts: Keonte Pryor fills evenings with the sounds of jazz greats like John Coltrane, hip‑hop pioneers such as Kendrick Lamar, and soul legends like Aretha Franklin, while strumming acoustic guitar to
    these influences and diving into novels by Toni Morrison, James Baldwin, and local Baltimore histories, a blend that fuels his creative curiosity and community‑oriented outlook.
  travel: Keonte Pryor’s travel style mixes purposeful weekend getaways to nearby historic towns like Annapolis and Savannah with dream trips to Kyoto’s traditional woodworking districts and the Tuscan
    hills of Italy, planning each adventure loosely around work schedules and budgeting constraints while seeking both cultural immersion and inspiration for his sustainable furniture designs.
  culinary: Keonte Pryor, an intermediate home chef, loves cooking soul‑food staples such as smoked collard greens, fried chicken, and sweet‑potato pie, using ingredients like smoked pork, okra, and cinnamon,
    and often experiments with locally sourced herbs in his cast‑iron skillet while listening to his favorite jazz playlists.
  core: Keonte Pryor is a curiosity‑driven carpenter who fuses hands‑on craftsmanship with digital tools, lives flexibly with occasional disorganization, and channels his community‑centric values into woodworking,
    music, and volunteer work, all while juggling a love of vintage vinyl and a modest penchant for spontaneous splurges.
background:
  cultural: Keonte grew up in the vibrant African American community of Baltimore, where church gatherings, family barbecues, and soulful music were central to daily life. His upbringing was steeped in
    the city’s rich history of craftsmanship, storytelling, and resilience, influencing his respect for hands‑on work and community service. Moving to the suburban area of Catonsville exposed him to a mix
    of urban and suburban cultures, broadening his perspective while reinforcing his connection to Black heritage. He embraces the traditions of soul food, jazz, and hip‑hop, and carries forward the values
    of solidarity and mutual support by actively participating in local volunteer initiatives and cultural events.
attributes:
  skills: '[''Custom furniture design and construction'', ''Residential framing and structural carpentry'', ''Blueprint interpretation'', ''Precision measuring and layout'', ''Tool maintenance and sharpening'',
    ''Basic plumbing and electrical assistance'', ''Project estimation and budgeting'', ''Safety compliance (OSHA, Maryland regulations)'', ''Team collaboration and client communication'', ''Digital design
    tools (SketchUp, CAD)'', ''CNC routing basics'', ''Sustainable material sourcing'']'
  hobbies: '[''Custom furniture side projects'', ''Pickup basketball'', ''Listening to jazz, hip‑hop, and soul music'', ''Cooking soul‑food recipes'', ''Hiking in Patapsco Valley State Park'', ''Playing
    guitar'', ''Reading African American literature and Baltimore history'', ''Volunteering with Habitat for Humanity'', ''DIY electronics tinkering'', ''Urban gardening'']'
  career_goals: Keonte aims to earn his Journeyman Carpenter certification and eventually become a Master Carpenter. He dreams of opening a boutique workshop in Baltimore that specializes in eco‑friendly,
    custom furniture using locally sourced wood. He wants to integrate digital fabrication techniques into his services and obtain a contractor’s license to offer full design‑build solutions. Mentoring
    apprentices and leading community projects with Habitat for Humanity are also high on his agenda, as he hopes to give back to the African American community that shaped his values.
