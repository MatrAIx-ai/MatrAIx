  career_goals: As she grows, Karenia’s natural blend of curiosity and practicality fuels an ambition to work with the natural world in a hands‑on role. She imagines herself exploring forests, studying
    animals, and later applying that knowledge as a wildlife biologist or outdoor educator. She also expresses a wish to help her community by learning practical skills—such as carpentry or plumbing—so
    she can build and maintain things that improve daily life. In school, she looks forward to science projects, field trips, and eventually a career that lets her solve real‑world problems while staying
    connected to nature.
