personas:
  professional: Karenia Trimble, a budding builder who loves stacking wooden blocks, demonstrates a blend of curiosity and practicality by experimenting with new structures while preferring the reliability
    of familiar shapes, and they approach each play session with relaxed flexibility and occasional disorganization.
  sports: Karenia Trimble enjoys preschool tumble‑down soccer sessions and eagerly watches the local professional soccer club City FC on weekend mornings, occasionally mimicking goal celebrations with a
    plastic soccer ball in the backyard.
  arts: Karenia Trimble delights in singing along to Raffi's 'Bananaphone' and dancing to The Wiggles, while also fascinated by the bright colors of Dr. Seuss picture books and the playful antics of the
    animated character Mickey Mouse.
  travel: Karenia Trimble loves family trips that blend adventure and comfort, such as a sunny beach day at Santa Monica, a visit to the Children's Museum in Boston, and a weekend getaway to a nearby nature
    reserve where they can explore mud puddles at their own pace.
  culinary: Karenia Trimble prefers soft, familiar foods like cheesy macaroni, banana slices, and sweet potato fries, enjoys helping stir mashed potatoes with a tiny wooden spoon, but often refuses peas
    and broccoli, turning meals into a playful negotiation.
  core: Karenia Trimble is a curious yet easy‑going toddler who balances imaginative play with a love for routine, occasionally getting tangled in a cascade of toys but always bouncing back with a giggle.
background:
  cultural: Karenia is raised in a white, middle‑class family in Longview, Washington, an area known for its close ties to the Pacific Northwest’s timber and river culture. Her family’s traditions reflect
    typical American suburban life, with seasonal celebrations like Thanksgiving and Christmas, community school events, and weekend trips to local parks and the nearby Columbia River for fishing, hiking,
    and camping. The region’s emphasis on self‑reliance, appreciation of the outdoors, and a modest, practical work ethic shapes her values and offers a supportive environment for her curiosity and hands‑on
    learning.
