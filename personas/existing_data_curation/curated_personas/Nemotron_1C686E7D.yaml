  hobbies: '["Visiting art museums and galleries","Sketching and drawing","Reading contemporary fiction and philosophy","Hiking in state parks","Yoga and mindfulness practice","Volunteering at local food
    shelf","Attending acoustic concerts","Cooking for friends","Small-group board game nights"]'
  career_goals: Maritza aims to attend a four‑year university in Missouri, majoring in psychology or community health, with the long‑term ambition of becoming a program coordinator for a nonprofit focused
    on youth empowerment and arts education. She hopes to integrate her love for art by curating community art workshops, promoting cultural accessibility, and eventually leading initiatives that blend
    mental‑health support with creative expression.
