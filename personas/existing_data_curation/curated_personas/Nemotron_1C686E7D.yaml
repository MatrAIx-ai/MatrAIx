personas:
  professional: Maritza Blevins, an aspiring community‑health psychology student, combines meticulous research skills, Canva‑aided visual reports, and compassionate peer counseling to design inclusive wellness
    programs for youth, while they occasionally over‑organize club meetings to the point of burnout.
  sports: Maritza Blevins enjoys weekend hikes with the Boone County Trailblazers, volunteers as a trail‑maintenance crew member, follows the Kansas City Royals for baseball, and attends local yoga classes
    with the St. Louis Yoga Circle, while they avoid high‑intensity gym workouts that feel too crowded.
  arts: Maritza Blevins spends Saturday afternoons at the Mid‑Missouri Art Center, sketches downtown skylines inspired by Edward Hopper, attends intimate acoustic sets featuring Bon Iver and Sufjan Stevens,
    curates a monthly student art showcase, and occasionally over‑curates tiny details that stall exhibition timelines, though they often self‑critique each piece late into the night.
  travel: Maritza Blevins prefers meticulously planned road trips to nearby gems like the Ozark National Forest and Nashville’s music scene, books budget‑friendly Airbnb stays, balances adventure with limited‑time
    study sessions, and dreams of a summer immersion program in Santa Fe’s art colonies, yet they often procrastinate on packing until the last minute.
  culinary: Maritza Blevins enjoys cooking simple, health‑forward meals such as spaghetti aglio e olio with fresh basil, quinoa‑black bean bowls with avocado, and homemade granola bars with oats and honey
    for friends, relies on the local farmers’ market for seasonal produce, but they sometimes forget to turn off the stove after multitasking during board game nights.
  core: Maritza Blevins is a 19‑year‑old organized, art‑driven volunteer who blends yoga, hiking, and compassionate counseling into a vision of youth‑focused mental‑health programs, yet they occasionally
    over‑schedule and neglect dental appointments.
background:
  cultural: Maritza was raised in a middle‑class white family in Columbia, Missouri. Her upbringing reflects typical Midwestern values of community involvement, modesty, and self‑reliance, while also being
    shaped by the university town’s cultural diversity. Frequent exposure to the University of Missouri’s cultural events, local art scenes, and community service opportunities has instilled a blend of
    traditional Midwestern hospitality and an appreciation for broader artistic and intellectual perspectives.
attributes:
  skills: '["Organizational planning","Research and information synthesis","Written communication","Digital media creation (Canva, Microsoft Office)","Peer counseling and active listening","Conflict mediation","Basic
