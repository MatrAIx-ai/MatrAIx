  hobbies: '[''reading speculative fiction'', ''painting landscapes'', ''creative writing (poetry, short stories)'', ''playing acoustic guitar'', ''listening to ambient music'', ''solo hikes in West Texas'',
    ''generative art coding'', ''volunteering at community art classes'', ''attending small gallery exhibitions'', ''solving abstract puzzles'']'
  career_goals: Mason aims to build a flexible, artist‑centred career that blends freelance writing with visual art commissions. He hopes to publish a collection of speculative short stories paired with
    his illustrations, and eventually pursue an MFA to deepen his practice. Over the long term, he envisions opening a small community art space in Midland that offers workshops, showcases local creators,
    and fosters a collaborative, inclusive atmosphere.
