  career_goals: Danielle aims to move into a supervisory or training role within the customer service department, where she can shape team standards and coach others. She plans to earn a Certified Customer
    Experience Professional (CCEP) credential and complete an online bachelor's in business administration to strengthen her leadership toolkit. Long‑term, she dreams of leading a regional customer‑experience
    program that integrates data‑driven improvements with hands‑on employee coaching, and eventually launching a small consulting practice helping local businesses design effective service processes.
