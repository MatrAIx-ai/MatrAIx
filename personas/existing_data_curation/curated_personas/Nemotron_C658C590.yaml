personas:
  professional: Vicky Nelson, a budding kindergarten idea‑engineer who loves devising new ways to stack blocks and solve puzzles, yet often abandons the teacher‑led schedule to tinker alone, they are skeptical
    of classmates’ suggestions and prefer solo challenges over group projects.
  sports: Vicky Nelson, a solo‑loving five‑year‑old who spends afternoons swimming laps at the community pool, racing against their own stopwatch, while cheering for the hometown River Raptors baseball
    team and attending a weekly kids’ soccer drill where they prefer watching the drills rather than joining the scrimmage.
  arts: Vicky Nelson, an enthusiastic fan of the whimsical melodies of Alan Menken from Disney’s Little Mermaid and the soaring vocals of Idina Menzel in ‘Let It Go,’ who spends quiet afternoons drawing
    scenes from Adventure Time while humming these tunes, they prefer solitary creative sessions over group art projects.
  travel: Vicky Nelson, a curious five‑year‑old who cherishes a family road‑trip to the Grand Canyon and a magical weekend at Disneyland, now dreaming of seeing Japan’s cherry blossom festival after flipping
    through a picture book, they plan all travels with a parent‑packed snack bag and a familiar bedtime routine.
  culinary: Vicky Nelson, a picky‑but‑adventurous eater who loves buttery macaroni and cheese topped with sharp cheddar, enjoys helping stir blueberry pancake batter, and treats themselves to chocolate
    chip cookies and strawberry slices, while often refusing broccoli.
  core: Vicky Nelson is a fiercely curious five‑year‑old who blends inventive solo play with competitive streaks, guards their piggy bank, wrestles with occasional anxiety, and finds comfort in quiet creative
    corners.
background:
  cultural: Vicky lives in Tahlequah, the capital of the Cherokee Nation in Oklahoma. While her family is of white heritage, they are part of a close‑knit rural community that values independence, self‑reliance,
    and respect for the natural landscape. The town’s proximity to Cherokee cultural sites and community events exposes Vicky to local traditions, such as story hours featuring Cherokee folklore at the
    library and seasonal festivals celebrating the land. This blend of Midwestern upbringing and awareness of Indigenous heritage fosters her deep appreciation for nature, storytelling, and the importance
    of caring for the environment.
attributes:
  skills: '[''Reading picture books'', ''Counting to 20'', ''Basic shape and color identification'', ''Puzzle solving'', ''Drawing and coloring animals'', ''Fine motor coordination'', ''Nature observation'',
    ''Asking explanatory questions'', ''Following simple step‑by‑step instructions'']'
  hobbies: '[''Collecting rocks, leaves, and insects'', ''Sketching animals'', ''Building block towers'', ''Solving puzzles'', ''Reading picture books about wildlife and folklore'', ''Simple science experiments'',
    ''Crafting bird feeders'', ''Listening to nature sounds'', ''Imaginary exploration storytelling'']'
  career_goals: Vicky dreams of becoming a wildlife explorer who discovers and cares for animals, envisioning herself as a future veterinarian or wildlife researcher. She wants to win the school science
    fair with a project that helps local birds, such as a handmade feeder, and imagines being the best kid at solving nature‑based puzzles. Her competitive streak fuels a desire to be recognized as the
    "top junior explorer" among her peers, while her practical side focuses on creating useful, hands‑on projects that benefit her backyard environment. She also imagines growing up to design calm, quiet
    spaces for children who feel anxious, blending her empathy with her love of solitude.
