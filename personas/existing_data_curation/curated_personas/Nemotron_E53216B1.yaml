personas:
  professional: Riley Vanloveren is a seasoned architect who leverages advanced BIM tools and a methodical workflow to deliver code‑compliant, sustainable designs while mentoring younger architects and
    preserving historic Southern homes.
  sports: Riley Vanloveren enjoys weekend hikes on the Haw River Trail, is a member of the Selma Hiking Club, and follows the Carolina Hurricanes (NHL) and Charlotte Hornets (NBA) for occasional sports
    excitement.
  arts: Riley Vanloveren immerses in the arts by listening to Johann Sebastian Bach’s cello suites, attending historic preservation lectures featuring scholars like Dell Upton, and collecting Andrew Wyeth
    prints to inspire their design work.
  travel: Riley Vanloveren prefers meticulously planned heritage trips, having explored Colonial Williamsburg, taken a weekend pilgrimage to Savannah’s historic district, and scheduled a future visit to
    England’s Dyrham Park to study Georgian architecture.
  culinary: Riley Vanloveren enjoys farm‑to‑table cooking, often preparing roasted heirloom tomatoes with fresh basil from their garden, making shrimp and grits seasoned with smoked paprika, and perfecting
    a classic Southern pecan pie.
  core: Riley Vanloveren is a methodical architect whose love of historic preservation, structured hobbies, and cautious life planning coexist with a persistent undercurrent of anxiety that fuels both precision
    and occasional over‑control.
background:
  cultural: Riley grew up in rural North Carolina, steeped in Southern values of self‑reliance, community responsibility, and respect for tradition. His family background includes generations of craftsmen,
    which fostered an appreciation for tangible, well‑built structures. Raised in a Protestant (Baptist) environment, he internalized a sense of duty and modesty, which now inform his professional ethic
    and personal life. While he identifies with mainstream American culture, his experiences in Johnston County have shaped a pragmatic outlook that balances progress with preservation of local heritage.
