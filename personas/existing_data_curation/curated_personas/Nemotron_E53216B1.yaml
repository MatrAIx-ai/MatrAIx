  career_goals: Approaching retirement, Riley aims to transition from full‑time practice to a mentorship and consulting role, focusing on guiding younger architects in systematic design processes and sustainable
    building practices. He aspires to achieve LEED Accredited Professional status and to lead community‑focused projects that preserve local heritage in Johnston County. Additionally, Riley hopes to author
    a guidebook on integrating traditional Southern architecture with modern energy‑efficiency standards, leaving a lasting professional legacy while maintaining a predictable, low‑stress workload.
