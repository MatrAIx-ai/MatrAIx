personas:
  professional: Clayton Shumaker is a seasoned computer network architect who leverages deep expertise in LAN/WAN design, BGP and OSPF routing, and cloud networking while channeling their outgoing, competitive
    nature into leading cross‑functional teams, mentoring junior engineers, and rigorously vetting every solution before endorsement as they pursue a regional Network Solutions Director role.
  sports: Clayton Shumaker competes in a local community basketball league, volunteers as a youth soccer coach, follows the Detroit Pistons and Detroit Lions avidly, spends weekend mornings fishing on Lake
    Michigan and evenings running 5‑k races, all while maintaining a competitive edge that drives them to coach with a strong emphasis on discipline and teamwork.
  arts: 'Clayton Shumaker enjoys unplugged guitar jam sessions playing classic rock staples from The Rolling Stones and Foo Fighters, participates in monthly board game nights featuring titles like Gloomhaven
    and Wingspan, and dives into competitive LAN gaming with titles such as Counter‑Strike: Global Offensive, using these creative outlets to balance their technical career.'
  travel: Clayton Shumaker prefers short, purpose‑driven road trips to Michigan’s Upper Peninsula for fishing and camping, occasionally travels to Nashville for a music workshop, and dreams of an adventurous
    Icelandic road trip to chase waterfalls, all while budgeting trips around certification course fees and family commitments.
  culinary: Clayton Shumaker favors hearty, protein‑rich dishes such as grilled trout with lemon‑dill, slow‑cooked beef chili using smoked paprika, and homemade pesto pasta, relishes experimenting with
    fresh herbs and locally sourced vegetables, and rates themselves a competent home cook who often brings dishes to community potlucks.
  core: Clayton Shumaker is a relentless network architect whose competitive spirit fuels both high‑stakes tech projects and community sports, yet their anxiety and occasional disorganization lead to impulsive
    spending and uneven self‑care routines.
background:
  cultural: Clayton grew up in a modest, working‑class family in the rural outskirts of Kalamazoo County, Michigan. His upbringing was shaped by Midwestern values of practicality, self‑reliance, and strong
    community ties—neighbors often rallied together for local fairs, church events, and high school sports. His father worked as an auto‑shop mechanic and his mother as a school secretary, instilling a
    hands‑on work ethic and appreciation for technical problem‑solving. Though he left high school without a diploma, he pursued self‑directed learning and industry certifications, reflecting the region’s
    tradition of learning by doing. This cultural backdrop blends a respect for structured, reliable systems with an openness to flexible, collaborative endeavors, influencing both his professional approach
    and personal life.
attributes:
  skills: '[''Network Design'', ''Routing Protocols (BGP, OSPF, EIGRP)'', ''Firewall Management'', ''Network Automation (Python)'', ''Cloud Networking (AWS, Azure)'', ''LAN/WAN Implementation'', ''Performance
