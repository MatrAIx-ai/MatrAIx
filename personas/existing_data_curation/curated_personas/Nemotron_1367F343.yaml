  career_goals: Jarome aims to move beyond his receptionist role into a supervisory or community‑focused position that blends his social strengths with his passion for the arts. He envisions becoming an
    Office Manager or Administrative Supervisor at a cultural institution such as a local museum, gallery, or community center, where he can oversee front‑desk operations while leading event planning and
    outreach programs. In the longer term, he hopes to launch a boutique café that doubles as a gallery space, providing a platform for emerging artists and fostering neighborhood interaction. To support
    these ambitions, he plans to pursue a bachelor’s degree in Business Administration or Arts Management and obtain certifications in event planning and customer experience design.
