  career_goals: Joe aims to progress from a senior retail associate to a store manager within the next two years, leveraging his leadership skills and data‑driven approach to improve sales performance and
    employee engagement. He plans to enroll in a part‑time bachelor's program in Business Administration to deepen his strategic management knowledge. Long‑term, he envisions opening a boutique that showcases
    local Philadelphia artists and sustainable, ethically sourced products, creating a community hub where art, commerce, and social responsibility intersect. He also hopes to expand his impact by establishing
    partnerships with nonprofit organizations that focus on food security and youth mentorship, allowing his work to contribute directly to his neighborhood's well‑being.
