personas:
  professional: Ella Ragan is a detail‑driven business administration student concentrating on accounting, whose methodical planning, Excel mastery, and knack for organizing volunteer shifts translate into
    reliable, structured performance in any junior accounting or administrative role.
  sports: Ella Ragan enjoys low‑impact fitness, regularly practicing gentle yoga at a nearby studio, strolling the local nature trails, and quietly cheering for the Chicago White Sox while occasionally
    joining a community badminton league for light cardio.
  arts: Ella Ragan finds comfort in classic literature like Jane Austen's Pride and Prejudice, unwinds with the soothing piano works of Ludovico Einaudi, and nurtures a love for crossword puzzles from The
    New York Times, while occasionally attending indie film screenings featuring Greta Gerwig’s films at the local arthouse cinema.
  travel: Ella Ragan prefers meticulously planned escapes to tranquil destinations, having spent a weekend hiking the red rock trails of Sedona, Arizona, and now dreaming of a low‑stress cultural pilgrimage
    to Kyoto’s Zen gardens, always mapping itineraries in their bullet journal before departure.
  culinary: Ella Ragan approaches cooking with the precision of a scientist, perfecting sourdough starter ratios, tweaking the balance of almond flour in a lemon drizzle cake, and cataloguing each successful
    recipe in their journal, though they often binge‑bake cookies late at night as a stress‑relief habit.
  core: Ella Ragan is a 19‑year‑old perfectionist whose structured routines, anxiety‑driven attention to detail, and love of quiet puzzles and precise baking define a life balanced between reliability and
    the occasional indulgent slip.
background:
  cultural: Ella was raised in a middle‑class, white family in Lisle, a suburban community in DuPage County, Illinois. Her upbringing reflected typical Midwestern values—emphasis on hard work, reliability,
    and community involvement. Family gatherings and holiday celebrations centered around shared meals, and she grew up attending a local Protestant church, where she learned the importance of service and
    modesty. The community’s strong public school system and library resources shaped her appreciation for education and organized public institutions. Growing up in the Chicago suburbs also exposed her
    to a blend of cultural events—from county fairs to museum trips—while maintaining a generally quiet, safety‑first environment that reinforced her preference for predictable, structured settings.
attributes:
  skills: '["Organizational planning", "Time management", "Microsoft Excel", "Microsoft Word", "PowerPoint", "Basic data analysis (Excel, SPSS)", "Academic research and writing", "Event coordination for
    small groups", "Assertive communication", "Budgeting and financial tracking"]'
  hobbies: '["Reading classic literature and non‑fiction", "Bullet‑journaling and habit tracking", "Crossword and Sudoku puzzles", "Cooking and baking", "Nature walks and hiking", "Yoga and guided meditation",
    "Volunteering at local library (shelving, patron assistance)"]'
  career_goals: Ella aims to build a career that offers clear structure, predictable tasks and opportunities for reliable performance. She plans to complete her bachelor's degree in Business Administration
    with a concentration in accounting, and pursue certification as a Certified Public Accountant (CPA) or Project Management Professional (PMP). In the short term, she hopes to secure an internship or
    entry‑level role as an administrative assistant or junior accountant where she can apply her organizational strengths and attention to detail. Long‑term, she envisions becoming an office manager or
    senior financial analyst for a mid‑size firm, overseeing budgeting processes and ensuring operational efficiency, while maintaining a work‑life balance that reduces stress.
