  career_goals: In the short term, Kathleen aims to enroll in a community college or university where she can major in a field that blends creativity with practicality, such as marketing, user-experience
    design, or environmental studies. She hopes to secure internships or part-time roles that let her apply her communication and design skills while learning industry standards. Long-term, she envisions
    working as a UX designer or sustainability consultant for a socially-responsible organization, eventually launching her own boutique that sells eco-friendly apparel and accessories she designs and photographs
    herself. She also wants to travel to broaden her perspective, which she believes will fuel her creative work.
