persona_description: A marine biologist who is deeply concerned about the impact of oil spills on marine ecosystems, particularly those in the Gulf of Mexico. They are particularly interested in the effects
  of chemical dispersants on fish populations and the food web, and are motivated by the potential for cleaner beaches but are skeptical of the effectiveness of siphoning and skimming the oil. They are
  aware of the potential dangers of dispersants and are committed to advocating for safer practices in oil spill response.
