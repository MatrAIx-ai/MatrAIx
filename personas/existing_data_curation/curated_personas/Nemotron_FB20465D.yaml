  hobbies: '[''Attending local art exhibitions and theater'', ''Painting and sketching Gulf Coast landscapes'', ''Gardening (native plants, raised‑bed herbs)'', ''Birdwatching along the shoreline'', ''Baking
    and preserving historic family recipes'', ''Reading biographies and art history books'', ''Learning new tablet and smartphone apps'', ''Volunteering at the senior center (story‑telling circles)'', ''Leading
    a community book club'', ''Participating in intergenerational art workshops'']'
  career_goals: Even at 99, Shannon’s ambitions center on leaving a lasting community legacy. She aims to launch a permanent oral‑history archive that captures the stories of Navarre’s longtime residents,
    partnering with the local historical society. She also hopes to mentor a new generation of senior volunteers to ensure the annual Gulf Coast Arts & Heritage Festival continues to thrive. Writing a memoir
    that weaves her personal journey with the region’s mid‑century history is another priority, as is collaborating with the senior center to develop a weekly art‑appreciation program that brings together
    seniors and younger artists.
