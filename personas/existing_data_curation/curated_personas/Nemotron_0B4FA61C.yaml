  hobbies: '[''Community gardening'', ''Soul food & Afro‑Caribbean cooking'', ''Reading historical fiction'', ''Yoga'', ''Volunteer language tutoring'', ''Juneteenth festival participation'', ''Walking
    along the San Marcos River'']'
  career_goals: Natasha aims to earn her ATA certification within the next year and complete a bachelor's degree in Spanish Linguistics, building on the college courses she began. She aspires to specialize
    further in medical interpreting, eventually becoming a certified Healthcare Interpreting Specialist. In the longer term, she envisions leading a language‑services department at a regional health system,
    where she can design policies that improve language access for underserved Black and Latino communities. Parallel to that goal, she hopes to establish a boutique translation agency that offers culturally
    attuned services for nonprofit health outreach and education, while mentoring emerging interpreters from underrepresented backgrounds.
