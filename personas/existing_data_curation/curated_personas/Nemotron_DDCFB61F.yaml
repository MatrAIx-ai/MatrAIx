personas:
  professional: Rene Powell is an organized, curiosity‑driven 11‑year‑old who volunteers at the local library’s science fair and helps program small robots in the school robotics club, where they blend
    practical methodical planning with imaginative problem‑solving.
  sports: Rene Powell plays as a midfielder on the Eugene Youth Soccer League’s under‑12 team, cheering on the Portland Timbers when not on the field, and they blend their methodical planning on the pitch
    with a love for weekend runs through local wetlands for extra stamina.
  arts: Rene Powell fills their nature journal with detailed sketches of leaves and rocks, delights in reading dinosaur and space adventure books by authors like Michael Crichton’s younger audience series,
    enjoys assembling LEGO sets inspired by the works of Carl Sagan and Pixar’s Wall‑E, and they regularly create simple Scratch animations featuring dinosaurs, showcasing a vibrant blend of scientific
    curiosity and creative expression.
  travel: Rene Powell loves weekend camping trips to the Cascade foothills and day excursions to Cannon Beach, where they map out hiking routes, collect seashells for their journal, and dream of future
    family visits to the Grand Canyon and the Smithsonian’s National Air and Space Museum, balancing an adventurous spirit with the practical constraints of a family budget.
  culinary: Rene Powell enjoys crafting peanut‑butter‑jelly sandwiches and assembling dinosaur‑shaped pizza slices topped with mozzarella and pepperoni, often adding sliced apples for a sweet crunch, while
    they shy away from broccoli and rely on their mom’s weekly trail‑mix recipe for a nutritious snack after science experiments.
  core: Rene Powell is a methodical yet curious 11‑year‑old whose love for nature, robotics, and LEGO fuels a balanced life of organized exploration, practical budgeting, and gentle kindness, though they
    sometimes indulge in impulsive snack purchases.
background:
  cultural: Rene grew up in a white, middle‑class family in Eugene, Oregon, a city known for its strong environmental ethic and vibrant community culture. His household celebrates typical American holidays
    such as Thanksgiving and Christmas, emphasizing togetherness and sharing. The Pacific Northwest setting has fostered a love for outdoor activities—camping, hiking, and bicycling are common family outings.
    Access to Lane County public schools and the local library has provided him with diverse books and extracurricular clubs, reinforcing values of cooperation, respect for nature, and community involvement.
