    science experiments'']'
  career_goals: Rene is fascinated by how things work and dreams of becoming an engineer—particularly a civil or environmental engineer who can design sustainable infrastructure for his community. He also
    imagines helping others as a science teacher, explaining concepts in a clear, methodical way. He aims to keep improving his problem‑solving abilities, hopes to join a high‑school science program that
    offers robotics and renewable‑energy projects, and eventually contributes to projects that protect the natural surroundings of the Pacific Northwest.
