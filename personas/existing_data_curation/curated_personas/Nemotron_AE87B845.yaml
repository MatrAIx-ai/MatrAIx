  career_goals: Although she is no longer in the formal workforce, Yvette aims to deepen her impact in her community. She plans to take on a leadership role in organizing intergenerational programs at the
    local senior center, mentor younger volunteers, obtain a certification in senior caregiving, and eventually compile a small cookbook featuring Mediterranean recipes and personal stories. She also hopes
    to travel occasionally to explore historic Greek sites and to participate in regional cultural festivals.
