personas:
  professional: Yvette Poulos, a seasoned community volunteer coordinator, channels her methodical planning and friendly charisma into leading intergenerational activities at the local senior center, where
    they mentor younger volunteers while balancing compassion with a practical, sometimes assertive, approach to problem‑solving and using email and social media to keep the neighborhood connected.
  sports: Yvette Poulos, an enthusiastic participant in senior walking clubs and low‑impact water aerobics at the Treasure Coast community center, avidly follows the Tampa Bay Rays and Miami Heat on television,
    occasionally joins a local pickleball group at the St. Lucie park, and uses river walks as both exercise and a calming ritual.
  arts: Yvette Poulos, a dedicated patron of the St. Lucie museum and regional theater, enjoys evenings listening to folk singer Joan Baez and Mediterranean instrumental music, often crocheting while watching
    classic films like "Casablanca", and finds inspiration in the paintings of Vincent van Gogh and Monet, which they display on their coffee table.
  travel: Yvette Poulos, a curious traveler who prefers well‑planned itineraries, dreams of touring sun‑kissed Mediterranean islands where their ancestors once cultivated olives, has already explored historic
    coastal towns in Spain and the historic ruins of southern Italy, and looks forward to a leisurely cruise that includes a stop in a charming seaside village for a cooking workshop.
  culinary: Yvette Poulos, an adept home chef, delights in preparing Mediterranean lemon‑oregano roasted chicken, vibrant chickpea salad with feta, olives, cucumber, and fresh dill, and delicate baklava
    layered with honey and pistachios, sourcing ingredients from her own herb and citrus garden and often pairing meals with crisp Riesling or a glass of aged red wine.
  core: Yvette Poulos, a socially vibrant yet worry‑prone retiree, balances a love for community events and meticulous planning with a habit of double‑checking bank statements and occasionally forgetting
    to take medication amid bustling senior center activities.
background:
  cultural: Yvette is a second‑generation Greek‑American, with her family’s roots tracing back to the island of Crete. Raised in a suburban community in the Midwest before relocating to Fort Pierce, Florida
    in her early fifties, she blends Greek heritage—such as celebrating Easter with traditional foods and using a few Greek phrases—with the laid‑back, multicultural lifestyle of South Florida. She identifies
    as white and values family gatherings, church community, Mediterranean cuisine, and the coastal outdoor culture of the Treasure Coast.
