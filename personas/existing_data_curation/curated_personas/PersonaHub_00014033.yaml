persona_description: A representative from the Caribbean region who is responsible for managing emergency communication strategies and plans. This person is knowledgeable about the challenges and best practices
  in risk communication during emergencies and is committed to ensuring that governments in the region can effectively communicate messages during preparedness and acute outbreaks of national emergencies.
  This person is also familiar with the importance of trust and transparency in communication and is actively working to improve the skills of practitioners in risk communication in the Caribbean region.
  This person is likely to have experience in emergency management, risk communication, and health policy.
