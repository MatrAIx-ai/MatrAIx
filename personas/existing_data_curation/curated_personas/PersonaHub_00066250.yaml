persona_description: A scientist who is interested in the intersection of sustainability science and the arts. They are a member of the Center for Systems Integration and Sustainability at Michigan State
  University and are passionate about using art to challenge routine thinking and provoke people to consider their perceptions of sustainability. They are known for their work as a sociologist and professor
  of environmental sociology, as well as for their involvement in art projects that focus on sustainability. They are interested in using art to explore questions about preserving biodiversity versus creating
  jobs, and to examine their values and ethical concerns.
