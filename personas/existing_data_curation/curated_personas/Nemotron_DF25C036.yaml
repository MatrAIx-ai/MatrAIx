  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Reading scientific and philosophical literature'', ''Yoga and meditation'', ''Volunteer work at community health fairs'', ''Traveling
    to culturally rich cities'', ''Experimenting with cooking'', ''Attending live music concerts'', ''Exploring innovative design exhibitions'', ''Participating in informal hackathon-style health innovation
    meetups'']'
  career_goals: Sophia aims to rise to senior leadership in a major health system, targeting a chief operating officer or chief innovation officer role within the next decade. She is driven to champion
    data-driven, patient-centered care models, integrate technology and creative design into service delivery, and influence health policy at the district or federal level. She seeks to launch interdisciplinary
    initiatives that blend art and health, such as therapeutic art programs. Her competitive nature fuels her desire to be recognized as a top performer and thought leader in healthcare management, while
    her curiosity pushes her to pursue continuous professional development, including an executive MBA or healthcare innovation fellowships.
