personas:
  professional: Sophia Cook leverages her STEM graduate training to excel in medical and health services management, using strategic planning, data-driven decision‑making, and persuasive communication to
    drive patient‑centered innovation while tolerating the occasional chaos of a flexible schedule.
  sports: Sophia Cook practices yoga three times a week at the downtown Flow Studio, occasionally joins a pick‑up volleyball game at Georgetown, roots for the Washington Capitals and DC United, and is a
    member of the DC Road Runners club, preferring low‑key, adaptable workouts over rigid training schedules.
  arts: Sophia Cook immerses themselves in Washington, D.C.’s modern art scene, frequenting the Hirshhorn Museum, Kreeger Museum openings, and gallery shows featuring artists like Kehinde Wiley and Yayoi
    Kusama, while capturing street moments with their Leica M10 and attending live performances at the 9:30 Club and U Street Jazz Club.
  travel: Sophia Cook delights in spontaneous design pilgrimages, having explored the curvilinear architecture of Barcelona, the clean lines of Copenhagen, and the futuristic skyline of Tokyo, and they
    dream of visiting the Guggenheim Bilbao and Melbourne’s laneway murals on future weekend getaways.
  culinary: Sophia Cook enjoys experimental cooking at an intermediate skill level, often crafting miso‑glazed eggplant tacos, kimchi‑infused quinoa bowls, and sumac‑sprinkled roasted carrots, while sourcing
    ingredients like harissa, matcha, and kombu from local specialty markets.
  core: Sophia Cook is a curiosity‑driven health‑services strategist who blends art, data, and experimental cooking into a vibrant, yet occasionally disorganized, lifestyle.
background:
  cultural: Sophia is a White American who grew up in the greater Washington, D.C. area, where exposure to a diverse, international community shaped her worldview. While her family heritage traces back
    to Northern European roots, she identifies strongly with the cosmopolitan culture of the capital region—frequent visits to the Smithsonian museums, multicultural festivals, and political discourse were
    part of her upbringing. Her marriage adds a personal partnership that supports her career ambitions. She balances the values of professional ambition common in the U.S. with an appreciation for the
    arts and civic engagement fostered by DC’s rich cultural landscape.
attributes:
  skills: '[''Strategic planning'', ''Data analysis'', ''Health care operations management'', ''Budgeting and financial oversight'', ''Regulatory compliance'', ''Team leadership'', ''Process improvement'',
