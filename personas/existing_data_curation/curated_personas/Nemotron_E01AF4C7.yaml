  career_goals: Silvie aims to move from receptionist to office manager within the next two to three years, pursuing a Certified Administrative Professional (CAP) credential and eventually completing a
    bachelor's degree in Business Administration. In the longer term she envisions leading a customer‑experience department at a hospitality or service‑focused company, or launching her own boutique hospitality
    venture that reflects Miami’s multicultural vibe. She also wants to develop stronger leadership skills, mentor junior staff, and secure a stable income that supports her family’s financial security.
