personas:
  professional: Ahmad Johnson, a retired handyman turned community historian, blends his practical expertise in mechanical repair, woodworking, and gardening with a curious drive to document West Texas
    stories, channeling his competitive streak into winning regional woodworking contests while mentoring youth through a junior woodworking club.
  sports: Ahmad Johnson enjoys early morning walks by the lake, weekly swimming at the community center, and follows the Dallas Cowboys and the Texas Longhorns with loyal enthusiasm, while playing bridge
    and occasional senior bowling league matches at the Lamesa Recreation Club.
  arts: Ahmad Johnson spends evenings listening to B.B. King, Ella Fitzgerald, and classic soul tunes from Aretha Franklin, often pairing the music with dusty westerns starring John Wayne, while attending
    local church choir rehearsals and preserving family photographs through analog darkroom techniques.
  travel: Ahmad Johnson prefers short road trips over long flights, planning meticulously to visit nearby gems like Big Bend National Park, the historic downtown of San Antonio, and the border town of Eagle
    Pass for its vibrant market, all while budgeting carefully and using senior travel discounts.
  culinary: Ahmad Johnson loves cooking soul‑food staples such as collard greens and cornbread alongside Mexican‑inspired dishes like chicken enchiladas, using fresh herbs from his garden and a well‑worn
    cast‑iron skillet, though they sometimes over‑salt the stew when reminiscing about family gatherings.
  core: Ahmad Johnson is a pragmatic yet curious elder who fuses hands‑on craftsmanship, a love for history, and a competitive spirit into a life of community mentorship, careful budgeting, and soulful
    music‑filled evenings.
background:
  cultural: Ahmad is a Black Texan with roots in the Great Migration era; his mother’s family, the Garcías, are of Mexican‑American descent, giving him a bicultural heritage. He grew up in a close‑knit
    African‑American community in Lamesa where church, soul food, and storytelling were central. The Spanish influence from his maternal side introduced him to bilingual family gatherings, traditional Mexican
    dishes, and local Hispanic festivals. He actively participates in Juneteenth celebrations, honors his ancestors’ legacy, and embraces the blend of Southern Black and Mexican‑American cultures that shape
    his identity.
