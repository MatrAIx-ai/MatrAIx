  hobbies: '[''Woodworking'', ''Fishing'', ''Gardening'', ''Church and choir'', ''Reading historical biographies'', ''Chess'', ''Bridge'', ''Blues and jazz listening'', ''Classic western movies'', ''Genealogy
    research'']'
  career_goals: Although officially retired, Ahmad seeks to stay mentally and physically active. He plans to finish and self‑publish a memoir of his life and the changes he has witnessed in West Texas,
    digitize his extensive family photo collection, improve his photo‑editing skills, and launch a small podcast series on Lamesa's local history. He also aims to win a regional woodworking competition,
    maintain his health through daily walks and a weekly swimming routine, and continue mentoring youth in the community garden and junior woodworking club.
