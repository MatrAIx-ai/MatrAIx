  career_goals: Abigail aims to complete a bachelor’s degree in Art History or Museum Studies and secure an internship at a regional museum in upstate New York. She envisions a career that blends her curiosity
    for art with her organizational strengths, ultimately becoming a curator or education coordinator who designs inclusive exhibitions and community outreach programs. She is also interested in exploring
    arts‑based therapeutic initiatives for mental‑health support, reflecting her compassionate side. While she worries about the competitive nature of the field, she is determined to build a stable, purpose‑driven
    role that allows her to make contemporary art accessible to diverse audiences and support personal well‑being through creative expression.
