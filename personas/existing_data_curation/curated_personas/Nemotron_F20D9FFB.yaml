personas:
  professional: A diligent museum studies student, Abigail Lowerison leverages her strong research and analytical abilities, meticulous project planning, and basic graphic design skills to curate small
    community exhibitions, while their innate curiosity and compassionate assertiveness drive them to design inclusive art programs that engage diverse audiences.
  sports: Abigail Lowerison stays active by hiking the Catskill foothills with the Catskill Trekking Club, joining a casual ultimate frisbee league in Poughkeepsie, and cheering for the New York Knicks
    and the Albany Great Danes, balancing weekly cardio sessions with occasional yoga to manage stress.
  arts: Abigail Lowerison draws creative inspiration from the paintings of Georgia O'Keeffe, the digital illustrations of Loish, the music of Sufjan Stevens, and eclectic theater productions reminiscent
    of Lin-Manuel Miranda's style, regularly visiting the Hudson Valley Art Center to study works by emerging local artists like Susan Manton while they sketch scenes for their own portfolio.
  travel: Abigail Lowerison prefers meticulously planned weekend getaways, often choosing nearby escapes to the Catskills for hiking, the Finger Lakes for wine tasting, or cultural visits to Philadelphia’s
    Museum of Art, while dreaming of a spring backpacking tour through Italy’s art hubs in Florence and Siena once they can fund an extended study abroad.
  culinary: Abigail Lowerison delights in baking artisanal sourdough loaves with a crisp crust and caramelized rosemary, experimenting with walnut-infused focaccia, mastering French onion soup, and enjoying
    weekly brunches of avocado toast topped with poached eggs and hot pepper jam at The Garden Café, reflecting their love for both precise technique and comforting flavors.
  core: Abigail Lowerison is a curiosity-driven, hyper-organized 21-year-old who channels perpetual worry into meticulous art curation, mindful meditation, and weekend sourdough baking, even if they sometimes
    over-schedule their days and forget to feed their sourdough starter.
background:
  cultural: Abigail grew up in a middle‑class, white family in Avon, a small town in Livingston County, New York. Her upbringing reflects classic upstate‑NY values of community involvement, self‑reliance,
    and an appreciation for the natural landscape. Family traditions include holiday gatherings, church‑linked volunteer service, and seasonal activities such as apple picking and maple syrup production.
    The region’s modest cultural scene—local libraries, historical societies, and a community arts council—has shaped her appreciation for accessible art and education. While she identifies with broader
    American cultural norms, her small‑town experience has fostered a close‑knit social network and a deep connection to the rural heritage of the Hudson Valley.
