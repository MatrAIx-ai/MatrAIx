persona_description: A political scientist who specializes in constitutional law and has a deep understanding of the US Constitution, particularly its flaws and limitations. They are interested in exploring
  alternative forms of governance and the risks associated with them, particularly in the context of secession. They have a keen interest in the idea of creating a new form of government that is a legal
  contract between all parties, and they are well-versed in the principles of contract law and the risks associated with a government that is not strictly limited in authority. They are also interested
  in the potential benefits of a government that is limited in scope and can be successfully managed with the goals of establishing justice, promoting the general welfare, and securing the blessings of
  liberty to themselves and their posterity.
