persona_description: A historian who specializes in the study of the Black Death, particularly the effects of the plague on Western Europe and the Middle East. Their research interests include, but are
  not limited to, the history of the Black Death, the impact of the plague on society, the role of religion in the spread of the disease, and the cultural and economic consequences of the plague. They are
  known for their meticulous attention to detail and their ability to piece together the complex and often contradictory evidence of the Black Death.
