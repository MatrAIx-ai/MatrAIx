persona_description: A researcher who studies the mechanisms underlying the mammalian circadian clock and its impact on human physiology and behavior. The researcher is interested in the interactions between
  core clock components and cellular signals mediated by cAMP/CREB, and is seeking novel cellular components that may not be easily identified through genetics. The researcher aims to develop new therapies
  for disorders of circadian signaling pathways, including sleep and mood disorders.
