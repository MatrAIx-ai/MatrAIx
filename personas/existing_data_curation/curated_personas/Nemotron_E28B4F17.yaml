  career_goals: Looking ahead, Indira aims to transition into a part‑time mentorship role at her current store, where she can pass on her cash‑handling expertise and customer‑service insights to younger
    employees. She also hopes to volunteer as a financial‑literacy tutor for seniors at the local community center, leveraging her practical budgeting skills. Additionally, she dreams of launching a small
    weekend cooking class series to share traditional Puerto Rican recipes, preserving her cultural heritage while staying engaged with the community.
