personas:
  professional: An aspiring marine‑themed visual artist, Laarni Nguyen channels curiosity about tide pools into vibrant watercolors and Scratch animations, and their spontaneous, unstructured approach fuels
    a habit of experimenting with new techniques rather than following a set curriculum.
  sports: Laarni Nguyen dives into beach volleyball at the local boardwalk and rides their BMX bike along the same stretch, cheering for the Los Angeles Lakers and the San Jose Earthquakes while also following
    the professional women's beach volleyball circuit, demonstrating a spontaneous spirit in both casual play and fandom.
  arts: Laarni Nguyen, an eclectic art lover, immerses themselves in K‑pop hits by BTS, indie pop tracks from Clairo, and traditional Vietnamese folk songs like "Đàn Tranh" while sketching shoreline scenes,
    collecting shells, and drawing inspiration from artists such as Hayao Miyazaki, Yayoi Kusama, and Taiwanese illustrator Jimmy Liao, shaping their identity through a blend of global and local artistic
    influences.
  travel: Laarni Nguyen prefers spontaneous weekend trips to coastal gems like Santa Monica, the historic town of Hoi An, and the island of Maui, favoring beachcombing and tide‑pool exploration over structured
    tours, though they dream of backpacking through the Philippines’ Palawan archipelago when older.
  culinary: Laarni Nguyen delights in flavor‑rich dishes such as pho with fresh basil, grilled corn elote, mango sticky rice, and daringly attempts to recreate rainbow sushi rolls at home, showing a beginner
    cooking level that mixes family recipes with experimental plating.
  core: Laarni Nguyen is a curious twelve‑year‑old artist who blends seaside wanderlust with spontaneous creativity, often juggling impulsive spending and occasional health hiccups while finding joy in
    both K‑pop beats and tide‑pool discoveries.
background:
  cultural: Laarni comes from a mixed Southeast Asian heritage; her mother is Filipino and her father is Vietnamese, and the family lives in Oceanside, California. At home, she hears both Tagalog and Vietnamese
    phrases, celebrates holidays like Tet and Flores de Mayo, and enjoys dishes such as pho and lumpia. The multicultural environment of San Diego County, with its vibrant coastal culture and diverse communities,
    shapes her outlook, giving her a blend of Asian traditions and West Coast creativity. Her parents value education and community, which, combined with the laid‑back beach lifestyle, fosters her curiosity,
    openness to new ideas, and appreciation for artistic expression.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''basic Scratch programming'', ''research and information synthesis'', ''video blogging'', ''beginner ukulele'']'
  hobbies: '[''drawing and painting'', ''shell collecting'', ''photography of tide pools'', ''Scratch animation'', ''listening to music'', ''reading graphic novels'', ''playing beach volleyball'', ''BMX
    biking'']'
  career_goals: Laarni dreams of blending her love for art and the ocean by eventually becoming a marine illustrator or an environmental storyteller who uses visual media to raise awareness about coastal
    ecosystems. She also imagines creating a YouTube channel where she shares art tutorials and beach explorations. In the longer term, she hopes to study marine biology and graphic design, allowing her
    to create educational materials that inspire other kids.
