  hobbies: '[''Gardening'', ''Nature walks'', ''Reading historical fiction'', ''Knitting and crocheting'', ''Cooking for community events'', ''Volunteering at the local food pantry'', ''Community theater'',
    ''Spontaneous day trips'']'
  career_goals: Diane hopes to translate her extensive volunteer experience into a part‑time role as a community health outreach worker or peer support specialist, allowing her to assist neighbors on a
    flexible schedule that respects her spontaneous nature. She aims to complete her associate degree in social services, obtain a certification in counseling or caregiving, and perhaps launch a locally‑focused
    support group for seniors and caregivers. Long‑term, she aspires to be a trusted resource in Albion, fostering harmony, resilience, and practical assistance for her community.
