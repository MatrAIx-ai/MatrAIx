persona_description: A healthcare professional with expertise in visual impairments and hallucinations, specifically the Charles Bonnet Syndrome. They have experience managing patients with this condition
  and have knowledge of the underlying causes, treatment options, and management strategies. They are aware of the limitations of pharmacologic therapy and prefer non-pharmacologic approaches. They have
  a keen interest in the research and clinical implications of Charles Bonnet Syndrome, including its association with mortality and the potential for early diagnosis as a marker of lewy body dementia.
  They are committed to providing empathetic and supportive care to patients with this condition and are aware of the importance of recognizing and avoiding misdiagnosis.
