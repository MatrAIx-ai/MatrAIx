personas:
  professional: Yang Eng, a 59‑year‑old pastor at an Albuquerque congregation, blends bilingual sermon composition with meticulous program development and conflict‑resolution expertise, using a structured
    yet flexible approach to bridge cultural gaps, coordinate volunteers, and maintain reliable church administration while thriving on group interaction, and they consistently prioritize harmony among
    congregants.
  sports: Yang Eng, an avid Sandia Mountain hiker, belongs to the local Alpine Club for weekend treks, joins a morning walking group at the city park, and cheerfully supports the Albuquerque Isotopes baseball
    team, balancing structured exercise with community camaraderie, and they often cap their hikes with a quick game of mahjong at the clubhouse.
  arts: Yang Eng, a dedicated practitioner of calligraphy who spends evenings perfecting brush strokes to classic proverbs, enjoys folk melodies from Bob Dylan and Teresa Teng, and regularly attends performances
    at the National Hispanic Cultural Center, letting artistic expression inform both sermons and personal reflection, and they find the quiet discipline of brushwork a counterpoint to their lively community
    engagements.
  travel: Yang Eng, who favors well‑planned trips that blend family reunions with cultural immersion, has journeyed to Taiwan for Lunar New Year celebrations, explored the historic Chinatown of San Francisco,
    and taken road trips to Santa Fe’s art scene and the Grand Canyon, all while balancing a modest retirement budget that curtails frequent long‑haul flights, and they meticulously map each itinerary to
    maximize meaningful experiences.
  culinary: Yang Eng, an enthusiastic home cook, skillfully prepares dumplings, mapo tofu, and stir‑fried bok choy using ginger, soy sauce, Sichuan peppercorn and fresh garden tomatoes, while also savoring
    New Mexican green chile in fusion dishes, reflecting a moderate cooking proficiency that marries tradition with regional flavors, and they often share these meals at community potlucks where they love
    to hear feedback.
  core: Yang Eng, a 59‑year‑old pastor, balances structured ministry with lively community potlucks, budgets prudently yet treats themselves to premium tea, monitors hypertension diligently, hikes the Sandias,
    practices calligraphy, and occasionally forgets to reconcile volunteer hours, and they remain driven by a deep sense of service.
background:
  cultural: Yang Fan Eng is a second‑generation Chinese‑American whose family immigrated to the United States before his birth. He grew up observing Chinese traditions such as celebrating Lunar New Year,
    honoring filial duties, and speaking Mandarin at home while adapting to life in New Mexico. His heritage shapes his ministry, as he weaves Chinese proverbs and values of harmony and respect into sermons
    and serves as a cultural bridge for immigrant congregants, helping them integrate while preserving their identity. He participates in local Chinese cultural festivals and maintains connections with
    the broader East Asian diaspora in the Southwest.
attributes:
  skills: '[''Pastoral counseling'', ''Public speaking'', ''Sermon writing'', ''Community outreach'', ''Bilingual communication (Mandarin/English)'', ''Cultural bridging'', ''Event planning'', ''Volunteer
    coordination'', ''Conflict resolution'', ''Church administration'', ''Budget management'', ''Interfaith dialogue'']'
  hobbies: '[''Mahjong'', ''Gardening'', ''Hiking'', ''Chinese calligraphy'', ''Cooking traditional Chinese cuisine'', ''Community potluck gatherings'', ''Listening to folk music'', ''Volunteering at youth
    centers'']'
  career_goals: He aims to expand bilingual worship services to better serve the growing Chinese‑American community, establish a mentorship program for younger clergy, launch a community health and food‑pantry
    initiative for immigrant families, and eventually assume a regional leadership role within his denomination to promote inclusive practices. He also hopes to publish a collection of reflections on cross‑cultural
    ministry and deepen interfaith collaborations in Albuquerque.
