  career_goals: Carrie aims to re‑enter the workforce in a role that leverages her organizational and budgeting strengths, such as an administrative assistant at a local nonprofit or a home‑organization
    consultant serving Omaha residents. She plans to complete her GED and pursue a certification in office administration to solidify her credentials. Simultaneously, she is exploring the launch of a side
    business offering decluttering and home‑organizing services, driven by a competitive desire to build a reputable brand in her community. Her long‑term ambition is to achieve financial independence,
    secure a stable, structured career path, and contribute meaningfully to local initiatives.
