  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Quilting'', ''Genealogy research'', ''Listening to gospel and jazz music'', ''Volunteering at library reading program'', ''Attending church
    services'']'
  career_goals: Although retired, Casey aims to deepen her community impact. She wishes to volunteer as a coordinator for a senior‑assistance program, develop a mentorship initiative for at‑risk teens,
    compile a community cookbook that preserves family recipes, and write a memoir documenting her experiences as a Black woman in Georgia. She also plans to learn advanced digital tools to document and
    share oral histories online, ensuring the stories of her community reach future generations.
