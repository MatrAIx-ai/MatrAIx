persona_description: A Filipino folk dancer and academic, Francisca Reyes-Aquino, known for her research on Philippine folk dance and her contributions to the advancement of Filipino culture. She is a recipient
  of the Republic Award of Merit and the Ramon Magsaysay Award, and is a designated National Artist of the Philippines for Dance. Her notable works include her research on folk dances and songs, her teaching
  of folk dancing, and her contributions to the preservation and promotion of Filipino cultural heritage.
