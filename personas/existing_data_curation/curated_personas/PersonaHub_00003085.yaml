persona_description: A risk manager who is responsible for evaluating and assessing the potential risks associated with Superfund sites and their environmental contaminants, including polychlorinated biphenyls
  (PCBs). The risk manager is likely to have expertise in environmental risk assessment, exposure assessment, and dose-response modeling, and is required to conduct a baseline risk assessment at all Superfund
  sites under the Comprehensive Environmental Response, Compensation, and Liability Act (CERCLA). The risk manager uses this assessment to determine the need for future action at the site and to evaluate
  the potential risks to human health and the environment. The risk manager may also use data from the Mayes (General Electric) Rat Study to evaluate the potential risks associated with PCB exposure.
