  career_goals: Fidel aims to progress from managing a single recreation center to a leadership role overseeing multiple sites across Weld County. He plans to earn a professional certification in recreation
    administration to strengthen his organizational toolkit and reduce the stress he feels around deadlines. Long‑term, he envisions launching a community cultural hub that highlights Mexican heritage alongside
    local Colorado traditions, allowing him to merge his managerial expertise with his passion for cultural celebration while delegating front‑line social responsibilities to trusted team members.
