persona_description: A historian and archaeologist who specializes in the study of prehistoric and ancient African cultures, particularly those related to the spread of African peoples and the development
  of their societies. They are knowledgeable about the rise of shamanism in Africa, the rise of chess, the use of gold and bronze jewelry in Africa and Eurasia, the role of the Jomon and Ainu in Japan,
  and the prehistoric Viking/Nordic/Scandinavian populations. They have a deep understanding of the evolution of early human societies and the development of daily essentials such as fire, settled communities,
  and the use of farm animals. They are also skilled in the use of evidence and analysis to draw conclusions about the origins and development of these societies.
