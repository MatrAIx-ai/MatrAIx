  career_goals: Nadiya aims to advance from first‑line supervisor to district manager within the next five years, overseeing multiple store locations and driving regional sales performance. She plans to
    pursue an MBA focused on retail management to deepen her strategic and financial expertise. Her long‑term ambition includes establishing a flagship store that blends community heritage with contemporary
    retail trends, and creating a mentorship program to develop the next generation of retail leaders while preserving work‑life balance for herself and her family.
