  hobbies: '[''Hiking'', ''Community Theater'', ''Book Clubs'', ''Historical Fiction Reading'', ''Gardening'', ''Cooking'', ''Attending Farmers Markets'', ''Yoga'', ''Zumba'', ''Volunteering at Arts Festivals'',
