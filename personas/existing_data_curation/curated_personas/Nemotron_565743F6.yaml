  career_goals: Michael aims to advance from construction manager to regional director, eventually founding his own boutique construction firm that specializes in environmentally sustainable and artistically
    inspired projects. He plans to earn LEED AP and PMP certifications, lead high‑visibility public‑space builds in Reno, mentor emerging professionals, and champion collaborative, community‑oriented development
    that blends functionality with creativity.
