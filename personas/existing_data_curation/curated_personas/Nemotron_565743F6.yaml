personas:
  professional: Michael Talbott, a 40‑year‑old construction manager in Reno, blends BIM expertise, sustainable building practices, and a flair for artistic design to orchestrate complex projects on time
    and on budget, while energizing crews with spontaneous acoustic jam sessions and championing collaborative decision‑making.
  sports: Michael Talbott fuels his fitness by weekend mountain‑bike rides on the Sierra Nevada trails, early‑morning hikes, and occasional 10K runs with the Reno Trail Runners Club, while cheering on the
    Reno Aces baseball team in summer and the Vegas Golden Knights hockey squad in winter, yet he often skips cross‑training on rainy days.
  arts: Michael Talbott cultivates his creative side by painting abstract landscapes inspired by Ansel Adams, curating photo series of Nevada’s desert horizons, strumming acoustic guitar alongside local
    folk musician Jamie Michaels at the M Gallery jam nights, and devouring contemporary fiction by Haruki Murakami and design theory like The Design of Everyday Things.
  travel: Michael Talbott prefers spontaneous road trips that mix rugged hiking in Colorado’s Rocky Mountains with cultural detours to Portland’s indie art districts, while also dreaming of a spring pilgrimage
    to Kyoto’s sakura gardens and a summer sailing adventure along the Greek Cyclades, balancing his travel budget with occasional work‑related conferences.
  culinary: Michael Talbott enjoys a moderate home‑cooking repertoire—whipping up cedar‑plank salmon with rosemary, mastering a perfect quinoa‑stuffed bell pepper, and pairing his meals with locally sourced
    Nevada trout—while indulging in Reno’s farm‑to‑table restaurants for dishes like bison carpaccio and Rocky Mountain oysters and never passes up a good espresso.
  core: Michael Talbott is a 40‑year‑old construction visionary who fuses sustainable building with abstract art, often found juggling a sketchbook on a job site, rewarding his team with impromptu guitar
    riffs, yet habitually forgets to water his indoor succulents.
background:
  cultural: Michael is a white American whose family roots trace back to European (primarily German and Irish) ancestry. Raised in the Intermountain West, he embodies the frontier spirit of self‑reliance
    and appreciation for the natural environment, while also being shaped by Reno’s eclectic culture—a mix of casino tourism, outdoor recreation, and a growing arts community. His upbringing emphasized
    community cooperation, modesty, and a respect for diverse perspectives, which align with his considerate and collaborative nature.
