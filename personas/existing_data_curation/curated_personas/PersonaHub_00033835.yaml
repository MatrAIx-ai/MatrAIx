persona_description: A librarian who is passionate about organizing books and teaching students about the Dewey Decimal system. She has experience with mock book covers and is familiar with the process
  of arranging books by subject and call number. She is skilled in leading students through the process of matching flash cards to mock books and putting them in numerical order, which helps them understand
  the call numbers on the spines and how the books are arranged numerically from least to greatest on the library shelves.
