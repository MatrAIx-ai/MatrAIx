personas:
  professional: Noelle Corsaut, a 20‑year‑old visual arts major, leverages their cashier‑honed inventory and POS expertise to excel in freelance graphic design projects while plotting a transition to a
    brand strategist role at a purpose‑driven agency.
  sports: Noelle Corsaut plays volleyball with the Warminster Community League, they also hike the Neshaminy Creek Trail on weekends, they follow the Philadelphia Eagles and Flyers, and they join a friends’
    ski trip to the Poconos each winter.
  arts: Noelle Corsaut sketches urban Philadelphia scenes in watercolor, curates an Instagram feed of digital collages inspired by Banksy and Georgia O’Keeffe, attends Vampire Weekend shows, and discusses
    speculative fiction by N.K. Jemisin at their book club.
  travel: Noelle Corsaut prefers budget‑friendly road trips, having explored historic sites in Philadelphia and Washington, D.C., they dream of a summer art pilgrimage to Paris, and they use student discounts
    and group planning for every getaway.
  culinary: Noelle Corsaut enjoys crafting avocado toast with local heirloom tomatoes, whipping up quinoa bowls seasoned with basil and lemon, they indulge in a classic Philly cheesesteak occasionally,
    and they experiment with watercolor‑themed dessert plating.
  core: Noelle Corsaut blends artistic imagination with organized hustle, they juggle volunteer art programs, weekend volleyball, and a careful eye on finances while dreaming of leading socially conscious
    brand campaigns.
background:
  cultural: Noelle comes from a White, middle‑class American family rooted in the suburbs of Bucks County, Pennsylvania. Her upbringing reflects a blend of Mid‑Atlantic cultural norms—emphasis on community
    involvement, education, and work ethic—combined with exposure to the diverse artistic currents of nearby Philadelphia. Family traditions include weekend trips to historic sites, seasonal celebrations
    centered around community fairs, and a modest appreciation for classic American literature and folk music. This environment nurtured her curiosity, sociability, and respect for both tradition and innovative
    expression.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Conflict resolution'', ''Inventory organization'', ''Time management'', ''Effective communication'', ''Research and analysis'',
