  hobbies: '[''Sketching and watercolor painting'', ''Visiting art galleries'', ''Attending indie concerts'', ''Improvisational theater'', ''Speculative fiction book club'', ''Hiking local trails'', ''Community
    volleyball'', ''Volunteering at teen art programs'', ''Photography'', ''Digital collage creation'']'
  career_goals: Noelle aims to transition from retail to a role that blends her organizational strengths with her creative passions. She plans to complete her bachelor's degree in Visual Arts or Communications,
    secure an internship at a marketing or design agency, and eventually become a brand strategist or creative director for a socially conscious company. In the medium term, she hopes to curate community
    art events in Bucks County, leveraging her sociable nature and network to promote emerging artists.
