  hobbies: '[''Hiking'', ''Birdwatching'', ''Organic gardening'', ''Woodworking'', ''Reading historical nonfiction'', ''Crossword puzzles'', ''Local history research'', ''Cooking seasonal meals'']'
  career_goals: Despite being retired, Jesse aims to leave a lasting educational legacy. He plans to develop a mentorship program that pairs retired teachers with new educators, author a guidebook on evidence‑based
    teaching practices, and volunteer as a literacy tutor for adults in Roseburg. He also seeks to collaborate with local schools to launch after‑school STEM workshops, complete the renovation of a historic
    home using his woodworking skills, and document three Oregon coastal towns' histories through a small travelling series.
