personas:
  professional: An innovative elementary and middle‑school educator, Tiffany Jones blends her natural curiosity and methodical organization to craft interdisciplinary STEM‑STEAM lessons, harnesses data‑driven
    assessments to fine‑tune instruction, spearheads grant proposals for makerspace initiatives, mentors new teachers, and channels her competitive edge into raising district‑wide standards for under‑represented
    students.
  sports: An enthusiastic participant in community fitness, Tiffany Jones plays recreational tennis at the local club, follows the regional basketball team—the Hawks—faithfully, joins weekend trail runs
    in the spring, and balances her competitive drive with a disciplined yoga practice to stay flexible and focused.
  arts: Passionate about visual and musical arts, Tiffany Jones frequents contemporary galleries showcasing artists like Yayoi Kusama and Kehinde Wiley, sketches watercolor landscapes inspired by Monet,
    and regularly attends live jazz sessions featuring the smooth saxophone stylings of Kamasi Washington, all of which fuel her creative pedagogy.
  travel: An avid cultural explorer, Tiffany Jones has visited the historic streets of New Orleans, the vibrant art scene of Barcelona, and the tranquil gardens of Kyoto, prefers meticulously planned itineraries
    that blend museum tours with local cooking classes, and dreams of a road trip along the Pacific Coast to experience coastal art festivals.
  culinary: At home, Tiffany Jones skillfully prepares Southern‑style soul food such as fried chicken with a crispy corn‑meal crust, collard greens simmered with smoked turkey, and sweet‑potato pie, while
    experimenting with global flavors like kimchi‑infused fried rice at potlucks, and values fresh ingredients like okra, sweet corn, and fresh herbs to elevate each dish.
  core: Creative, organized, and fiercely competitive, Tiffany Jones blends her love for art, tech, and teaching into a relentless pursuit of equitable STEAM education while juggling a habit of over‑scheduling
    and a tendency to question others’ motives.
background:
  cultural: Tiffany is an African‑American woman whose family has deep roots in the Southern United States, with a lineage that values education, community service, and cultural heritage. Growing up in
    Dallas, she was active in the Black church, participated in Juneteenth celebrations, and was exposed to gospel music, soul food, and storytelling traditions. Her graduate studies in a STEM field, where
    she was often one of few Black women, shaped her commitment to representation and equity in education. She regularly mentors students of color, supports local Black‑owned businesses, and incorporates
    African‑American scientific contributions—such as those of George Washington Carver and Dr. Mae Jemison—into her lessons, celebrating both her cultural identity and her professional expertise.
attributes:
  skills: '[''STEM curriculum design'', ''Project‑based learning'', ''Coding and robotics integration'', ''Data‑driven assessment'', ''Differentiated instruction'', ''Classroom management'', ''Parent‑teacher
    communication'', ''Mentoring novice teachers'', ''After‑school program coordination'', ''Cross‑cultural competence'', ''Public speaking'', ''Educational technology implementation'']'
  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Live jazz music'', ''Arduino and maker projects'', ''Yoga and mindfulness'', ''Cooking soul food'', ''Hosting multicultural potlucks'',
    ''Volunteering at science museum outreach'', ''Reading speculative fiction'', ''Gardening'']'
  career_goals: Tiffany aims to become a leading STEM instructional coach or curriculum specialist, expanding STEAM opportunities across the district. She plans to secure grant funding for a school‑wide
    robotics and makerspace program that also incorporates visual arts, providing equitable access for under‑represented students. Over the next five years she hopes to earn an Educational Leadership doctorate,
    position herself for a principalship, and champion policies that increase diversity in STEM pathways. Additionally, she aspires to publish a guide on integrating art into early science education and
    to speak at regional education conferences.
