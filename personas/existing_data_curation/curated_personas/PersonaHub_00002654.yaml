persona_description: A scientist and advocate for integrated pest management (IPM) who has contributed to the development and refinement of its principles and concepts. They are knowledgeable about the
  founding principles of IPM, including the idea of manipulating natural processes to increase their effectiveness and the need for chemical controls to be used only when and where natural processes fail.
  They have experience with the original sense of IPM and have seen that it has not been widely implemented on a large scale. They have also noted the importance of developing strategies that rely on biological
  control organisms, resistant plants, cultural controls, and other ecologically based tools.
