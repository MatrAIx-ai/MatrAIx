  career_goals: Curtis dreams of exploring space as an astronaut because of his boundless curiosity, but he also imagines himself as a builder or firefighter—jobs that let him create and protect things
    in a practical way. He wants to learn how things work, help his friends and family, and one day contribute to making his community a safer, brighter place.
