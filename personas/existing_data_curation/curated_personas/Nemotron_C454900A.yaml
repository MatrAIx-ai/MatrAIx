personas:
  professional: Curtis Tyson, a budding junior engineer, channels their curiosity and practicality into constructing elaborate forts and detailed LEGO models, preferring flexible, open‑ended play over rigid
    schedules, and they proudly share their creations with friends.
  sports: Curtis Tyson loves playing soccer with friends at the neighborhood park, cheers for the local youth team the Oakwood Rovers while idolizing Lionel Messi’s dribbling style, and they balance bike
    rides around the block with an enthusiastic but occasionally chaotic approach to fitness.
  arts: Curtis Tyson enjoys drawing superheroes like Spider‑Man and dinosaurs such as Tyrannosaurus rex, drawing inspiration from Eric Carle’s vibrant illustrations and the catchy tunes of The Wiggles,
    and they spend afternoons building LEGO creations that echo the LEGO Architecture series.
  travel: Curtis Tyson’s travel cravings combine day‑trips to the city zoo, a longing to explore the dinosaur exhibits at the Natural History Museum in Washington DC, and a family‑oriented vacation to the
    Grand Canyon, and they prefer itineraries that balance adventure with parental supervision.
  culinary: Curtis Tyson favors pizza topped with pepperoni and olives, homemade mac and cheese, and peanut butter‑banana sandwiches, enjoys helping stir batter for chocolate chip cookies, and they are
    particular about crunchy carrot sticks as a side snack.
  core: Curtis Tyson is a curious, fort‑building, LEGO‑loving six‑year‑old who blends practical hands‑on experiments with boundless imagination, and they often leave a trail of scattered bricks and forgotten
    chores.
background:
  cultural: Curtis grew up in Flint, Michigan, a Midwestern city known for its strong community ties and a history rooted in the auto industry and the Great Lakes region. His family observes typical Midwestern
    traditions such as Thanksgiving dinners, Fourth of July barbecues, and local library story times. The city’s collective resilience after economic challenges shapes his practical outlook and appreciation
    for teamwork. He is exposed to a mix of urban and suburban cultural elements, including neighborhood sports leagues, community festivals, and church gatherings, which together foster a balanced sense
    of curiosity, flexibility, and cooperation.
