persona_description: A mosquito control specialist who is interested in the distribution and dynamics of malaria vectors in tropical regions. They are familiar with the species identification and vector
  control methods for mosquitoes in Laos and are looking for new information on the distribution and vectorial capacity of Anopheles dirus from the southern province of Attapeu, Lao PDR. They are also interested
  in the role of malaria vectors in the transmission of Plasmodium falciparum and the potential impact of malaria on the population of the region.
