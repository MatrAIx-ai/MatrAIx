    mentoring in language and culture'', ''Teaching folk dance and craft workshops'', ''Problem solving with practical curiosity'']'
  hobbies: '[''Cooking and recipe experimentation'', ''Hosting potluck and community dinners'', ''Folkloric dance and teaching dance workshops'', ''Craft making (papel picado, embroidery)'', ''Gardening
    (raised‑bed vegetables, herbs, chilies)'', ''Bilingual book club participation'', ''Hiking in the Adirondacks'', ''Yoga for flexibility and stress relief'', ''Watching classic Mexican cinema'', ''Traveling
    to visit family in Mexico'']'
  career_goals: Adriana wants to translate her community experience into a paid role that both leverages her cultural strengths and offers flexible hours to maintain family balance. She is pursuing a part‑time
    certification in culinary arts and community program management, with the ambition to open a home‑based catering business that specializes in authentic Mexican fare for local events and corporate gatherings.
    In parallel, she hopes to become a cultural outreach coordinator at the Schenectady Hispanic Services Center, where she can design language‑support workshops, organize multicultural festivals, and mentor
    newly arrived families. Ultimately, her goal is to be recognized as a bridge between the Mexican diaspora and the broader Schenectady community, ensuring that tradition and modern opportunity coexist.
