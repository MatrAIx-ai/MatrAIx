personas:
  professional: Katia Garcia, a seasoned civil and structural engineer with a decade of experience, applies advanced finite element modeling and sustainable design through AutoCAD, Revit, and SAP2000, and
    they meticulously manage project schedules in Primavera P6 while mentoring emerging engineers, reflecting their methodical and compassionate leadership style.
  sports: Katia Garcia, an avid birdwatcher who also enjoys low‑impact fitness, follows the Dallas Cowboys and the Texas Rangers, participates in a weekend trail‑running group at Cedar Hill State Park,
    and they prefer solitary early‑morning walks with binoculars over crowded gyms.
  arts: Katia Garcia, a lover of visual and musical arts, often studies the landscapes of Ansel Adams while listening to Carlos Santana’s guitar work, and they attend occasional performances of the Dallas
    Ballet, reflecting how art fuels both their creative eye for photography and moments of quiet inspiration.
  travel: Katia Garcia, a deliberate traveler who favors detailed itineraries, has explored the historic missions of San Antonio, the desert flora of New Mexico, and the colonial town of Oaxaca, and they
    dream of photographing the sunrise over Patagonia’s glaciers, balancing solitary adventure with modest budgeting.
  culinary: Katia Garcia, an accomplished home cook, specializes in hand‑crafted tamales and rich mole verde, they savor the aroma of roasted chiles, cumin, and chocolate, and they often host intimate dinner
    gatherings where they share the stories behind each ancestral recipe.
  core: Katia Garcia blends analytical rigor with quiet creativity, meticulously planning every project and puzzle while occasionally surrendering to worries that linger like unfinished jigsaw pieces.
background:
  cultural: Born to Mexican immigrant parents, Katia grew up in a bilingual household in the Dallas‑Fort Worth metroplex, where she absorbed Mexican traditions such as Día de los Muertos, traditional cooking,
    and community festivals, while also embracing Texan customs. Her Catholic upbringing instilled a sense of discipline and communal responsibility, which she carries into her engineering work, especially
    when addressing infrastructure needs in underserved Mexican‑American neighborhoods. Her fluency in Spanish and deep cultural knowledge enable her to act as a bridge between technical teams and local
    community stakeholders.
