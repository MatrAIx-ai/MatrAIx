  hobbies: '[''Reading scientific journals'', ''Historical fiction'', ''Birdwatching'', ''Gardening'', ''Cooking traditional Mexican cuisine'', ''Landscape photography'', ''Yoga'', ''Jigsaw puzzles'']'
  career_goals: Katia aims to obtain her Professional Engineer (PE) license within the next two years and to lead multi‑disciplinary sustainability projects that integrate water‑efficient design and low‑impact
    construction practices. She intends to develop a boutique consulting practice focused on serving low‑income communities in Texas with resilient infrastructure solutions. Mentorship is also a priority;
    she plans to provide one‑on‑one guidance to junior engineers, especially women and underrepresented minorities, while gradually transitioning to a part‑time advisory role as she approaches retirement.
