  skills: '[''Structural analysis'', ''Finite element modeling'', ''AutoCAD'', ''Revit'', ''SAP2000'', ''Project scheduling (Primavera P6)'', ''Risk assessment'', ''Regulatory compliance'', ''Sustainable
