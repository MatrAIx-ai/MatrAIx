  career_goals: John aims to advance within the district’s transportation department by obtaining a senior transportation coordinator position, where he can shape safety policies and mentor new drivers.
    He plans to complete his associate degree in logistics or transportation management and acquire additional certifications such as a Commercial Driver’s License with passenger endorsement and advanced
    safety training. Long‑term, he envisions leading a driver‑training program or consulting on fleet safety for school districts across Michigan, leveraging his practical experience and commitment to continuous
    improvement.
