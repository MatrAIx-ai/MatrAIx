personas:
  professional: Jack Stebbins is a seasoned mechanical‑electrical technician turned part‑time community consultant, leveraging their engineering degree and hands‑on farm‑equipment expertise to advise local
    small businesses on equipment upkeep and basic IT while also mentoring a high‑school robotics club and leading woodworking workshops for seniors, delivering practical solutions with a relaxed, flexible
    style that respects their town’s traditions of hard work and service.
  sports: Jack Stebbins is an avid supporter of the Green Bay Packers and the Wisconsin Badgers football teams, follows the Milwaukee Brewers during baseball season, cheers on the local high‑school hockey
    squad, participates in a senior bowling league at the community hall, and regularly joins fishing tournaments on Lake Michigan, blending their love of team spirit with outdoor recreation.
  arts: 'Jack Stebbins devotes their evenings to reading historical non‑fiction such as ''The Great Lakes Region: A History'' by James Scott, enjoys the regionalist paintings of Grant Wood at the county
    museum, listens to folk polka tunes by the band ''The Polka Parade'' during county fairs, and sharpens their mind at weekly bridge games, weaving cultural appreciation into their modest social life.'
  travel: Jack Stebbins dreams of a leisurely road trip across Michigan’s Upper Peninsula with their wife, has already explored Door County’s cheese caves and the historic lighthouse at Point Au Barbe,
    prefers flexible itineraries over rigid schedules, and often uses a paper map and stops at family‑run diners to savor local fare.
  culinary: Jack Stebbins grows heirloom tomatoes, sweet corn, and hardy kale in their vegetable garden, uses fresh catches to prepare a classic Wisconsin fish fry with fry sauce and lemon wedges, crafts
    homemade pierogi stuffed with sauerkraut and smoked sausage for church potlucks, and occasionally experiments with apple‑cinnamon crumble, showcasing moderate cooking skill and a love for farm‑to‑table
    flavors.
  core: Jack Stebbins blends sturdy practicality with a laid‑back charm, offering community repair help, mentoring youths, fishing at dawn, and hunting for the perfect garden harvest—all while juggling
    a slightly chaotic paperwork system and a penchant for spontaneous bridge games, and they never miss a chance to lend a hand.
background:
  cultural: Jack was raised in the small‑town environment of Oconto County, Wisconsin, in a family of German‑Polish descent. His upbringing in a Lutheran community emphasized modesty, hard work, and service
    to neighbors. The region’s strong sense of self‑reliance, love of the outdoors, and close‑knit social fabric have shaped his practical, cooperative personality and his appreciation for community traditions.
attributes:
  skills: '[''Mechanical maintenance'', ''Electrical troubleshooting'', ''Computer hardware repair'', ''Woodworking'', ''Household budgeting'', ''STEM mentoring'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Reading historical non-fiction'', ''Playing bridge'', ''Church volunteer work'', ''Attending county fairs'']'
  career_goals: Jack hopes to leverage his technical background to give back to his community by offering part‑time consulting for local small businesses on equipment maintenance and basic IT support, and
    by volunteering as a mentor for a high‑school robotics club. He also aims to complete a series of woodworking workshops for seniors, develop a sustainable garden on his property, and eventually take
    a short road trip across the Upper Peninsula with his wife to explore historic sites tied to their family heritage.
