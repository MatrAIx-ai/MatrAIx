personas:
  professional: A retired community organizer, Khaliyah Joseph channels their love of art, storytelling, and garden-grown herbs into a seniors‑focused workshop series that blends watercolor painting, oral
    histories, and cultural preservation, while mentoring younger volunteers and eyeing a board seat on the local heritage nonprofit.
  sports: Khaliyah Joseph enjoys low‑impact activity such as walking the trails of Hardin County’s nature preserve with the local senior walking club, cheering on the Louisville Cardinals basketball team
    during March, and occasionally joining a weekend pickleball league at the community center, preferring gentle competition over high‑intensity sports.
  arts: Khaliyah Joseph spends weekends painting watercolors of rolling Kentucky hills, curating a small collection of gospel vinyl records, attending live jazz sets by the Wynton Marsalis Quintet at the
    downtown Bluegrass Jazz Club, and reading works by Toni Morrison and James Baldwin, all of which inform their informal art‑curation talks at the county library.
  travel: Khaliyah Joseph favors relaxed, spur‑of‑the‑moment road trips that let them explore historic river towns like Natchez, Mississippi and the Creole kitchens of New Orleans, while keeping a wishlist
    that includes a pilgrimage to the birthplace of blues in Memphis and a cultural tour of Savannah’s historic squares, often booking modest B‑and‑B stays after consulting travel blogs.
  culinary: Khaliyah Joseph delights in cooking Southern comfort food and Creole classics—such as shrimp étouffée, collard greens simmered with smoked turkey, and jambalaya seasoned with fresh thyme and
    bay leaves from their herb garden—while skillfully balancing a moderate spice tolerance and a tendency to over‑salt a pot of gumbo when distracted by a new painting project.
  core: Khaliyah Joseph blends a quiet curiosity with a love for garden‑grown herbs, watercolor landscapes, and community stories, often forgetting appointments but never missing a birthday cake, and they
    nurture heritage through art, food, and gentle activism.
background:
  cultural: Khaliyah’s cultural background is rooted in the African‑American experience of the American South. Her grandparents migrated from the Deep South during the Great Migration, settling in Hardin
    County, Kentucky, where they became active members of the local Black church community. Growing up, she was immersed in gospel music, Southern cooking, and oral storytelling traditions. Her college
    years broadened her exposure to wider Black diaspora arts and history, deepening her appreciation for cultural preservation. Today, she draws on these influences to celebrate Black heritage through
    community events, culinary traditions, and the documentation of local African‑American histories.
