  career_goals: Although retired from formal employment, Khaliyah aims to deepen her impact on her local community by establishing a seniors‑focused art workshop series that blends painting, storytelling,
    and cultural history. She also hopes to compile and publish a memoir of her family’s journey from the Deep South to Kentucky, preserving the narratives of the African‑American community in Hardin County.
    Additionally, she aspires to serve on the board of a local cultural heritage nonprofit to advocate for the inclusion of Black history in regional exhibitions.
