  career_goals: Looking ahead, Carlos aims to transition into a regional management role overseeing multiple food‑service sites, where he can apply his data‑driven approach on a larger scale. He is pursuing
    a certification in food‑service management and an MBA‑level course in supply‑chain management to broaden his strategic skill set. A long‑term ambition is to open a community‑focused café that partners
    with local farms, emphasizing sustainable sourcing and job training for young adults. He also hopes to serve on the board of the local Chamber of Commerce to advocate for small‑business development
    and food‑industry education.
