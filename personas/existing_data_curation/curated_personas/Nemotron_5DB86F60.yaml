  career_goals: Now retired and living in Upland, Matthew aims to stay intellectually engaged by volunteering as a mentor for local middle‑school and high‑school STEM clubs, sharing his engineering insights
    in a hands‑on way. He hopes to author a memoir that captures lessons from his decades in industry, and to collaborate on community sustainability projects such as solar‑panel installations for neighborhood
    homes. Additionally, he plans to enroll in occasional online courses on renewable energy and artificial intelligence to keep his curiosity alive while maintaining a flexible, low‑stress lifestyle.
