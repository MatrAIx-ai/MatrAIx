personas:
  professional: A retired mechanical and electrical engineer, Matthew Higginbotham leverages decades of CAD, legacy programming, and technical documentation expertise to mentor youth and design community
    solar projects, channeling their curiosity‑driven yet easy‑going nature into hands‑on problem solving and occasional improvisational planning.
  sports: Matthew Higginbotham keeps active by strolling the Upland senior walking club and tending to their vegetable garden, follows the Los Angeles Dodgers in baseball and the Lakers in basketball on
    TV, and opts for low‑impact activities like springtime hikes and summer swimming laps, preferring a relaxed, self‑paced fitness routine over regimented training.
  arts: Matthew Higginbotham immerses themselves in classic and contemporary science‑fiction by reading Asimov, Clarke, and Ann Leckie, while their evenings often feature vinyl records of Bob Dylan and
    modern indie artist St. Vincent, and they occasionally attend local model‑railroad shows that showcase miniature craftsmanship reminiscent of the detail in their own projects.
  travel: Matthew Higginbotham favors loosely planned road trips that blend quiet curiosity with relaxation, having explored California’s Yosemite and Sequoia National Parks on winding drives and dreaming
    of a future leisurely cruise along New Zealand’s South Island fjords, all while they balance a modest travel budget and occasional last‑minute itinerary tweaks.
  culinary: Matthew Higginbotham, a competent home chef, relishes preparing garden‑fresh ratatouille with heirloom tomatoes, zucchini, and basil, alongside grilled salmon seasoned with rosemary and lemon,
    while they occasionally treat themselves to a hearty meatloaf, reflecting their practical palate tempered by occasional culinary curiosity.
  core: Matthew Higginbotham, a retired engineer with a penchant for meticulous model‑railroad layouts, relaxed budgeting, and occasional dental floss neglect, blends quiet curiosity with a laid‑back approach
    to life, often misplacing their telescope eyepieces but never their love for tinkering.
background:
  cultural: Matthew comes from a mid‑20th‑century white Anglo‑American background, raised in a post‑war suburban environment that emphasized self‑reliance, practical ingenuity, and community involvement.
    His upbringing in the American West reinforced a value for personal freedom, flexibility, and a balanced respect for both tradition and innovation. These cultural influences shape his modest, cooperative
    demeanor, his appreciation for solitary yet purposeful pursuits, and his desire to give back to his local community through mentorship and volunteerism.
