  career_goals: Hannah hopes to attend a STEM‑focused high school where she can deepen her knowledge in environmental science and engineering. She envisions herself designing sustainable solutions for her
    rural community—such as improved water filtration systems or renewable‑energy projects—while also earning a scholarship that affirms her competitive drive. In the long term, she aspires to become an
    environmental engineer or marine biologist, blending her curiosity about natural ecosystems with a practical desire to protect the coastal habitats of Maine.
