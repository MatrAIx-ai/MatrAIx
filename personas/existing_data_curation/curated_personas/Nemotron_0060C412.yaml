personas:
  professional: Celeste Heeman, a seasoned community organizer in Amite, leverages their methodical planning, compassionate outreach, and love for art and gardening to coordinate church fundraisers, neighborhood
    clean-up events, and free craft workshops, while they quietly mentor seniors and youth alike.
  sports: Celeste Heeman, an avid supporter of regional teams, passionately follows the New Orleans Saints, tracks the LSU Tigers football games each fall, enjoys walking the local greenways for fitness,
    and they participate in a seasonal community softball league that meets at the town park.
  arts: Celeste Heeman, a devoted lover of visual arts, frequents the Baton Rouge Museum of Art to admire works by contemporary Southern artists like George Rodrigue and Cynthia J. DeSantis, incorporates
    classic quilting motifs into modern pieces, and they often sketch the bayou wildlife they observe during bird‑watching outings.
  travel: Celeste Heeman, a careful planner, prefers short road trips that combine family visits and cultural immersion, such as weekend getaways to New Orleans for Mardi Gras, a heritage tour of Savannah,
    Georgia, and an annual winter stay at a lakeside cabin in the Ozarks, and they always book senior discounts while packing garden produce as a travel snack.
  culinary: Celeste Heeman, an accomplished home cook, delights in preparing classic Cajun and Creole dishes like shrimp étouffée, jambalaya, and crawfish boil, seasoning with filé powder, okra, and andouille
    sausage, and they often share leftovers at church socials while experimenting with new spice blends.
  core: Celeste Heeman, a curious, organized, and compassionate 63‑year‑old, blends community service, art, gardening, and Southern cooking into a life driven by meticulous planning, creative expression,
    and a steadfast commitment to preserving local heritage, and they approach each day with quiet determination.
background:
  cultural: Celeste was born and raised in rural west-central Louisiana, a region where Southern hospitality, church-centered community life, and a blend of Anglo-American and French-influenced traditions
    define everyday culture. Though her ancestry is primarily European, her family’s generations in Louisiana have embraced local customs such as seasonal festivals, Cajun and Creole culinary practices,
    and a love for regional folk art and music. Growing up in Amite, she was immersed in a close-knit town where neighbors rely on each other, and where church gatherings serve as social hubs. These cultural
    influences shape her values of cooperation, compassion, and a deep respect for the arts and local heritage.
attributes:
  skills: '[''Event planning'', ''Community outreach coordination'', ''Budget management for volunteer projects'', ''Basic caregiving and first aid'', ''Gardening and horticulture'', ''Quilting and sewing'',
