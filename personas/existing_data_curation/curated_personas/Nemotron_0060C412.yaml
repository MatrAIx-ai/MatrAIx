  hobbies: '[''Gardening'', ''Quilting and sewing'', ''Visiting art galleries'', ''Reading historical fiction'', ''Cooking Cajun/Creole cuisine'', ''Birdwatching'', ''Volunteering at the senior center'',
    ''Leading craft workshops'', ''Attending church socials'', ''Exploring local history and genealogy'']'
  career_goals: Celeste’s primary ambition is to deepen her impact on the Amite community by establishing a sustainable arts and heritage program that offers free workshops in quilting, painting, and local
    history. She hopes to document the oral histories of longtime residents to preserve the town’s unique cultural memory. Over the next several years, she aims to organize an annual community art fair
    that celebrates regional craftsmanship and brings together younger generations with seasoned artisans. Celeste also wishes to expand her volunteer work at the nearby senior center, eventually leading
    a peer-support group for elderly residents. While she does not seek formal employment, she is passionate about mentoring her grandchildren and other local youth, encouraging them to explore creative
    pursuits and community service.
