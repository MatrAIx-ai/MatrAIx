  career_goals: Brenda aims to finish high school with a solid diploma or a GED, then enroll in a local community college program that leads to a practical, stable career such as certified nursing assistant,
    dental hygienist, or culinary arts. She values jobs that offer predictable schedules, clear tasks, and the chance to help others, aligning with her practical mindset. In the short term, she hopes to
    get a part‑time position at the nearby grocery store to gain work experience and build a reliable routine. Long‑term, she dreams of establishing a small home‑based catering or bakery business where
    she can apply her cooking skills while maintaining a flexible, family‑friendly schedule.
