  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading historical fiction'', ''Gardening'', ''Hiking in the Vaca Mountains'', ''Volunteer tutoring at the community center'', ''Knitting'',
    ''Exploring local farmers markets'', ''Cooking Mediterranean cuisine'', ''Attending small book clubs'']'
  career_goals: Brandi aims to transition from a floor operator to a production supervisor, where she can lead a small team and embed sustainable, low‑waste practices in the manufacturing process. Long‑term,
    she hopes to leverage her business degree to launch a boutique custom‑tailoring studio that blends artistic design with ethical sourcing, allowing her to merge her love of art, craftsmanship, and entrepreneurship.
