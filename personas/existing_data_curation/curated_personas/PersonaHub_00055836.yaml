persona_description: A scientist who specializes in the study of antibiotics and their resistance mechanisms, particularly in the context of bacterial evolution and horizontal gene transfer. This persona
  is deeply interested in the history of antibiotic resistance and the factors that contribute to its expansion, including over-prescription, non-completion of prescribed treatments, and the use of antibiotics
  in animals. This scientist is knowledgeable about the mechanisms by which antibiotics kill bacteria and how bacteria can gain resistance through mutations or horizontal gene transfer. They are also familiar
  with the examples of antibiotic resistance that have occurred in the past, including the anthrax scare after the September 11, 2001, attacks in the U.S.
