personas:
  professional: Amanda Merrill, a 49‑year‑old retail veteran with over two decades of experience in sales, inventory control, and POS systems, leverages her curiosity and pragmatic approach to read customers'
    emotional cues and devise low‑stress sales strategies, while her competitive edge drives her ambition to transition into store management where she can cultivate a supportive, predictable‑hour team
    environment.
  sports: Amanda Merrill supports the St. Louis Cardinals (MLB) and the St. Louis Blues (NHL), and participates in a local walking club that meets on weekends to hike the Mississippi River trail, preferring
    low‑impact cardio and solitary activity over team sports.
  arts: Amanda Merrill immerses herself in the works of historical novelist Philippa Gregory, relishes the folk‑blues of Joan Baez, enjoys attending intimate performances by a local theater troupe’s staging
    of classic dramas, and her knitting circles double as craft‑art meet‑ups where she admires textile artists like Faith Ringgold.
  travel: Amanda Merrill favors tranquil, historically rich getaways such as a weekend in Savannah’s cobblestone district, a solo pilgrimage to Colonial Williamsburg, and a carefully planned two‑week tour
    of the English countryside’s Jacobean estates, always budgeting meticulously and steering clear of crowded tourist hubs.
  culinary: Amanda Merrill, an adept home cook, often transforms garden harvests into rustic vegetable stew seasoned with rosemary, thyme, and heirloom tomatoes, whips up buttery apple crumble using locally
    sourced apples, and enjoys knitting while slow‑cooking a chicken pot pie infused with sage and carrots.
  core: Amanda Merrill blends meticulous retail expertise with a love for solitary crafts, navigating life’s anxieties through structured puzzles, garden stewardship, and a quiet competitive drive toward
    managerial leadership.
background:
  cultural: Amanda grew up in a middle‑class, Midwestern family in the Quad Cities area, with German‑American and Irish‑American ancestry common to the region. The local culture emphasized self‑reliance,
    modesty, and practicality, shaping her pragmatic outlook. Community events such as county fairs, church gatherings, and seasonal festivals formed a backdrop to her upbringing, reinforcing a respect
    for small, familiar social circles. Her exposure to the diverse retail environment of Davenport nurtured an appreciation for varied customer perspectives while reinforcing the Midwestern values of hard
    work and modest ambition.
attributes:
