  hobbies: '[''Reading historical fiction'', ''Gardening (vegetable and flower beds)'', ''Knitting and crocheting'', ''Puzzle solving (crosswords, Sudoku)'', ''Walking/hiking on local trails'', ''Listening
    to true‑crime podcasts'', ''Small book‑club meetings'', ''Volunteering at the community animal shelter'']'
  career_goals: Amanda aims to move from floor sales to a supervisory role, eventually becoming a store manager where she can shape a supportive, low‑stress team environment. She is interested in deepening
    her understanding of consumer behavior and retail analytics, with a long‑term goal of training new associates or consulting for small independent retailers. Balancing her competitive drive with a desire
    for flexibility, she seeks a position that offers predictable hours, opportunities for professional growth, and resources (such as employee assistance programs) to help manage her anxiety and emotional
    well‑being at work.
