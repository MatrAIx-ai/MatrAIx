personas:
  professional: Evangeline Galle, a budding kindergarten class monitor, displays an early knack for organization by arranging classroom supplies and loves the predictable routine of daily circle time, while
    her exuberant talkativeness makes her a natural leader in group activities.
  sports: Evangeline Galle, a spirited member of the neighborhood Little Leapers gymnastics club, loves swinging on the monkey bars and pretends she’s cheering for the local Tigers soccer team during weekend
    games, while balancing her love of structured play with imaginative running races with friends.
  arts: Evangeline Galle, an enthusiastic participant in her preschool's storytime circle, adores mimicking the whimsical songs of children's performer Raffi and loves drawing bright rainbows in crayon,
    often performing spontaneous dance moves to the catchy tune 'Baby Shark' that turns heads in the playroom.
  travel: Evangeline Galle dreams of revisiting the nearby zoo's panda exhibit and, after a family trip to Grandma's cottage in the mountains, now plans a colorful road trip to the seaside aquarium, preferring
    day-long adventures with a packed snack box and a trusty map drawn in crayons.
  culinary: Evangeline Galle, a picky but curious eater, enthusiastically munches on apple slices with peanut butter, savors the cheesy crunch of macaroni and cheese, and loves helping stir the batter for
    blueberry pancakes, while insisting on a tiny dollop of ketchup on her fries.
  core: Evangeline Galle is a vibrant five‑year‑old who thrives on predictable routines, sparkles when she’s the center of attention, and balances her structured nature with a generous heart for friends,
    even if she occasionally hoards extra stickers.
background:
  cultural: Evangeline grows up in a typical Pacific Northwest white middle‑class family in Bremerton, Washington. Her cultural upbringing blends mainstream American traditions—celebrating Thanksgiving,
    Christmas, and attending Sunday school—with the maritime heritage of her community, where the nearby naval base and Puget Sound shape a love for boats, marine life, and coastal activities. Outdoor recreation,
    such as park visits and tide‑pool exploration, is a regular part of family life, reinforcing values of cooperation, responsibility, and respect for nature. These influences are evident in her polite
    demeanor, community‑oriented attitude, and enthusiasm for both structured learning and social play.
attributes:
  skills: '[''Basic reading and letter recognition'', ''Counting and simple addition'', ''Fine motor coordination (cutting, drawing)'', ''Gross motor abilities (running, climbing)'', ''Social interaction
