  hobbies: '[''Drawing and coloring'', ''Singing songs'', ''Pretend play (teacher, doctor)'', ''Building with Lego bricks'', ''Playing with dolls and stuffed animals'', ''Storytime at the local library'',
    ''Exploring tide pools at the waterfront'', ''Puzzle solving'', ''Dancing to music'']'
  career_goals: Evangeline often talks about growing up to be someone who helps others and creates happy, organized spaces. She dreams of becoming a preschool teacher who can plan fun, structured lessons
    and make every child feel included. She also imagines herself as a marine biologist exploring the tide pools and marine life of Puget Sound, sharing her discoveries with classmates. Occasionally she
    mentions wanting to be a nurse or community helper, because she loves caring for friends and family when they feel unwell. Her ambitions reflect her practical nature, love for structure, and strong
    desire to bring harmony to those around her.
