  career_goals: Jessica aims to build a strong portfolio of visual work throughout high school, targeting admission to a competitive art program at a university where she can study graphic design or illustration.
    She dreams of working as a concept artist for video games or an advertising agency, using her imaginative thinking to craft compelling visuals. In the near term, she plans to win regional art competitions,
    secure internships at local design studios, and grow her online following to showcase her art. Long‑term, she hopes to blend her creative talents with community outreach, perhaps by leading workshops
    for other teens to express themselves through art, while also pursuing a career that allows her to travel and explore diverse cultures.
