  hobbies: '[''reading mystery and adventure novels'', ''building LEGO sets'', ''crafting friendship bracelets'', ''playing piano'', ''participating in junior church choir'', ''gardening and maintaining
    a planting journal'', ''volunteering at the local animal shelter'']'
  career_goals: Alicia aspires to pursue a career that combines her love for animals, her methodical nature, and her desire to help others. She dreams of becoming a veterinary technician or veterinarian,
    envisioning a future where she can provide structured, compassionate care to pets and wildlife in her community. She also hopes to complete high school with honors, earn a scholarship, and later attend
    a college program in animal science or biology. In the long term, Alicia imagines opening a small animal‑care clinic in a rural Alabama town, where she can apply her organizational skills to run an
    efficient, caring practice.
