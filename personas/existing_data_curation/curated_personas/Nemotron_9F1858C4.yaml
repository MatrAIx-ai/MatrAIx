personas:
  professional: An aspiring junior architect, Alicia Sanks channels her love of intricate LEGO sets and precise friendship‑bracelet patterns into designing detailed model houses, using their organized,
    methodical nature and habit of planning ahead to ensure every piece fits perfectly.
  sports: Alicia Sanks enjoys after‑school soccer with the Little Lions U‑12 team and weekend swimming lessons at the community pool, diligently logging their practice times in a notebook while cheering
    for the Chicago Cubs and the New York Knicks as their favorite professional teams, which they proudly follow.
  arts: Alicia Sanks immerses herself in the arts by practicing piano pieces by Ludwig van Beethoven and Ludovico Einaudi, singing in the junior choir with repertoire from the Disney classics, and devouring
    mystery novels by Nancy Drew, while also crafting friendship bracelets inspired by the vibrant colors of Frida Kahlo’s paintings that they proudly share with friends.
  travel: Alicia Sanks prefers meticulously planned family road trips, savoring the structured itinerary of a weekend visit to the Grand Canyon National Park and a beach resort in Florida, while dreaming
    of a future cultural adventure to Paris where they imagine exploring historic museums and trying croissants.
  culinary: Alicia Sanks enjoys cooking simple yet fresh meals like garden‑harvested tomato basil pasta and homemade vegetable soup, proudly sprinkling chopped cilantro from her herb patch, though they
    sometimes burn the edges of their experimental granola bars when rushing to finish schoolwork.
  core: Eager planner with a detective’s curiosity, Alicia Sanks balances her love for LEGO architecture and piano practice with a tendency to over‑worry about school projects, often juggling friendship‑bracelet
    patterns while double‑checking every schedule they create.
background:
  cultural: Alicia is raised in a white, Southern family in Clanton, Alabama, where community, church involvement, and family traditions play a central role. She attends a local Baptist church, which influences
    her values of responsibility, cooperation, and service. The close‑knit small‑town environment fosters a strong sense of Southern hospitality, respect for tradition, and an appreciation for outdoor activities
    typical of the region, such as gardening and caring for local wildlife. These cultural influences shape her practical outlook, her desire for structured routines, and her commitment to community service.
attributes:
  skills: '[''organizational and time‑management skills'', ''basic arithmetic and math problem solving'', ''reading comprehension'', ''science experimentation (school club)'', ''basic computer literacy
