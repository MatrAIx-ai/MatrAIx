persona_description: A geneticist and plant biologist who specializes in the study of maize, its genome architecture, and the evolution of domesticated crops. They are interested in the physical and genetic
  framework of the maize genome, the distribution and abundance of microRNA genes, and the role of centromeres in maize domestication and evolution. They are also interested in the role of transposons and
  their impact on maize genome content and structure. They are likely to have a deep understanding of maize genetics, molecular evolution, and genome architecture, and are interested in using the first
  description of the B73 maize genome to probe some of the most intriguing questions in genetics and plant biology.
