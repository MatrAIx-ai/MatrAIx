  career_goals: He aims to complete a GED within the next year and then enroll in a vocational training program for marine mechanics or automotive technology, fields that combine his love for the ocean
    and hands‑on problem solving. In the longer term, Evangelos hopes to work as a marine technician at the local naval base or a private marina, contributing to the upkeep of vessels while preserving the
    coastal environment. He also aspires to become a community mentor for at‑risk youth, using his experience to guide them toward education and stable employment. If circumstances allow, he is open to
    joining the U.S. Navy, seeing it as a pathway to disciplined training, travel, and a steady career.
