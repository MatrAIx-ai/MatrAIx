  hobbies: '[''Surfing'', ''Paddle‑boarding'', ''Skate‑boarding'', ''Computer building'', ''Arduino tinkering'', ''Strategy video games'', ''Beach cleanup volunteering'', ''Reading sci‑fi'', ''Marine‑conservation
