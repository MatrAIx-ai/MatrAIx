personas:
  professional: Evangelos Goss is a 17‑year‑old aspiring marine technician who blends his hands‑on love for the ocean with a knack for troubleshooting electronics, currently building a custom PC and experimenting
    with Arduino while volunteering on beach‑cleanup crews, and he applies his organized yet flexible planning style to balance GED studies with training aspirations.
  sports: Evangelos Goss spends weekends surfing and paddle‑boarding at Virginia Beach, is a regular member of the Coastline Skaters club, follows the Virginia Cavaliers football team and the New York Knicks
    for basketball thrills, and they train at a local gym for strength to improve board performance while occasionally playing pickup basketball with friends.
  arts: Evangelos Goss finds creative release in sketching futuristic cityscapes while listening to indie rock bands like Arctic Monkeys, The Strokes, and Vampire Weekend, devours sci‑fi novels by Isaac
    Asimov and Octavia Butler during downtime, and they attend occasional local outdoor concerts and art walks, appreciating the blend of music and visual art as a mental balm.
  travel: Evangelos Goss has road‑tripped to Washington, DC and the Outer Banks, dreams of surfing in the Bahamas and exploring marine research stations in the Caribbean, prefers budget‑friendly hostels
    and couch‑surfing over luxury, and they plan trips around school breaks, balancing a love for adventure with parental financial constraints.
  culinary: Evangelos Goss enjoys cooking grilled shrimp tacos with fresh lime, whipping up a quick seaweed salad, and mastering a basic sourdough starter, their cooking skill sits at an enthusiastic beginner
    level, and they favor dining at beachside seafood shacks and local pizza joints featuring pepperoni and anchovies.
  core: Evangelos Goss is a beach‑loving, tech‑savvy teen who balances anxiety‑driven worry with hands‑on projects, surf sessions, and indie rock, while juggling school, modest finances, and a dream of
    becoming a marine technician.
background:
  cultural: Evangelos grew up in a middle‑class, predominantly white neighborhood of Virginia Beach, absorbing a blend of coastal East‑Coast American culture and the subtle influence of the nearby military
    community. Family gatherings often featured classic American foods, backyard barbecues, and trips to the beach. The local culture emphasized outdoor recreation, community involvement, and a respect
    for the ocean’s importance to the region’s economy and identity. He also experiences the multicultural undercurrents of a tourist city, which have broadened his awareness of diverse perspectives while
    reinforcing a strong sense of local belonging.
