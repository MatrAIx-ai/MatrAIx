  career_goals: Although officially retired, Tanya aims to leave a lasting imprint on her local community. She plans to compile a guidebook on effective teaching strategies for senior learners, volunteer
    as a mentor for first‑year teachers at the local school district, and establish a modest scholarship for under‑privileged high‑school students pursuing education degrees. She also hopes to write a memoir
    that captures her experiences as a teacher and a survivor of personal loss, hoping it will serve as a resource for others navigating grief in later life.
