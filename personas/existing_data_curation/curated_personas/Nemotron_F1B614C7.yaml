  career_goals: Daniel dreams of combining his love for art and the ocean by becoming a marine illustrator or marine biologist who can create vivid visual stories about sea life. He also imagines designing
    underwater habitats or interactive exhibits for a science museum. While he is still young, he expresses a strong desire to explore new ideas, develop his artistic skills, and someday turn his curiosity
    into a career that lets him work independently and protect the environment.
