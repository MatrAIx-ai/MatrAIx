  hobbies: '[''Visiting local art galleries and museums'', ''Community theater participation'', ''Quilting and mixed‑media textile projects'', ''Southern cooking and recipe experimentation'', ''Gardening
    native plants and herbs'', ''Genealogical research'', ''Volunteering at senior center and leading workshops'', ''Book clubs and trivia nights'']'
  career_goals: Though not currently in the formal workforce, Ashley aims to transform her community impact into lasting initiatives. She plans to establish a small community arts studio in Florence that
    offers free classes for seniors and youth, positioning herself as a certified volunteer coordinator. Over the next two years she hopes to earn her GED and enroll in community‑college courses in art
    history and horticulture, enriching her own practices. Ashley also dreams of publishing a memoir that chronicles her experiences as a divorced woman navigating Southern culture, and she wants to develop
    a peer‑support group focused on stress reduction and mental‑wellness for older adults.
