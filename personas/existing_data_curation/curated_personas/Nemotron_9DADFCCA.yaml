  hobbies: '[''sketching'', ''traditional Indian motif exploration'', ''reading art history'', ''chess'', ''hiking'', ''cooking Indian cuisine'']'
  career_goals: Pravinkumar aims to become a certified master painter within the next five years, focusing on upscale residential projects in the Bay Area. He plans to launch his own boutique painting firm
    that specializes in sustainable finishes and custom mural work, drawing on contemporary design trends and his South Asian artistic heritage. In the long term, he hopes to mentor apprentices, establish
    a signature portfolio of mural commissions, and expand into consulting on eco‑friendly interior solutions.
