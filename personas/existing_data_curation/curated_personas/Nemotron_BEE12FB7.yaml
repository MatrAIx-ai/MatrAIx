personas:
  professional: A teenage digital artist named Donnie Champion blends hand‑drawn sketches with Photoshop and Procreate, shares each new illustration on Instagram, and channels his curiosity about tech into
    prototype concepts for future game‑design or concept‑art roles while maintaining a disciplined schedule that balances school, art practice, and Arduino tinkering.
  sports: An enthusiastic skateboarder named Donnie Champion rides the skate parks of Antelope Valley, follows the Los Angeles Lakers and LA Galaxy loyally, and spends weekend hikes in the Angeles National
    Forest to stay fit, preferring trail runs over organized team sports.
  arts: A devoted indie‑music fan named Donnie Champion curates playlists featuring 'Tame Impala', 'Mitski', and 'The Strokes' while devouring graphic novels like Neil Gaiman’s 'Sandman' and Kelly Sue DeConnick’s
    'Bitch Planet', often sketching fan‑art that blends mythic archetypes with modern street‑culture aesthetics.
  travel: Donnie Champion, a 15‑year‑old explorer, has camped in Joshua Tree, trekked the Angeles National Forest, and taken day trips to downtown LA’s art districts, and they dream of visiting Kyoto’s
    historic temples and the aerospace museums of Toulouse, balancing school obligations with budget‑friendly weekend getaways.
  culinary: Donnie Champion loves crafting homemade apple pie for Thanksgiving, whipping up spicy avocado toast for quick lunches, and experimenting with ramen bowls flavored with miso and Sriracha, yet
    they often forget to clean the kitchen after cooking, leaving a trail of cutlery on the counter.
  core: Donnie Champion is a calm, curiosity‑driven teen who merges sketching with circuitry, skates at sunrise, and obsessively re‑draws mythic panels while occasionally neglecting chores in pursuit of
    creative flow.
background:
  cultural: Donnie grew up in a middle‑class white family in Lancaster, California. His parents, originally from the Midwest, settled in the Antelope Valley for work in aerospace and manufacturing, instilling
    in him classic American traditions such as celebrating Thanksgiving, Fourth of July fireworks, and holiday baking. Living near Los Angeles County, Donnie has been exposed to a diverse cultural setting,
    influencing his openness to unconventional ideas and artistic styles. The desert landscape and nearby aerospace heritage have sparked his curiosity about technology and exploration, while the community’s
    local art events and youth programs have nurtured his appreciation for creativity and cooperation.
attributes:
  skills: '["Digital literacy (computer, smartphone, internet)", "Introductory graphic design (Canva, basic Photoshop)", "Pencil and charcoal sketching", "Beginner acoustic guitar", "Personal project organization",
    "Cooperative teamwork and communication", "DIY electronics with Arduino"]'
  hobbies: '["Pencil sketching and digital illustration", "Listening to indie/alternative music", "Skateboarding", "Hiking in Angeles National Forest", "Reading graphic novels", "DIY Arduino electronics
    projects", "Volunteering as an art mentor at the community youth center"]'
  career_goals: Donnie aspires to become a multimedia visual artist, blending traditional drawing with digital illustration to create concept art for video games or animated storytelling. He hopes to attend
    a specialized art program after high school, eventually earning a degree in visual communication or game design. He envisions using his art to foster community well‑being, perhaps by leading workshops
    for younger kids at local community centers, integrating his calm demeanor and collaborative nature. Long‑term, he dreams of contributing to socially conscious projects that combine creativity with
    messages of harmony and mental resilience.
