  career_goals: Although approaching retirement, Cherrie aims to leverage her extensive security background into a mentorship and advisory role within the Champaign community. She hopes to develop a training
    program for junior guards that integrates practical field tactics with critical analysis, and to serve on the city’s Public Safety Advisory Board to champion senior-focused safety measures. Recognizing
    the rapid evolution of surveillance technology, she plans to earn a certification in digital video analytics to stay current. Additionally, she aspires to author a short memoir reflecting on her journey
    from the civil‑rights era to modern casino surveillance, using her narrative to inspire both younger and older adults to remain curious and active.
