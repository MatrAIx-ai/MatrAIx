  career_goals: Dianna aims to transition into a senior advisory role where she can mentor the next generation of analysts while continuing to deliver high‑impact market insights. She plans to develop a
    niche expertise in senior‑consumer market trends, leveraging her experience to help health‑care and lifestyle brands better serve older adults. Over the next few years, she hopes to obtain the Certified
    Professional Researcher (CPR) designation, lead a knowledge‑sharing initiative within her organization, and gradually shift to part‑time consulting for local nonprofits in Colorado, applying her research
    skills to support community development projects. Her goals reflect a desire for structured, meaningful contributions that balance professional responsibilities with personal fulfillment.
