personas:
  professional: Dianna Wonson, a seasoned market research analyst with over three decades of experience, leverages advanced statistical tools like SPSS, R, and Python to craft precise market segmentation
    studies, applies GIS‑based mapping for regional consumer trends, and uses their disciplined, detail‑oriented approach to enforce structured project timelines while maintaining enough flexibility to
    mentor junior analysts as they transition toward a senior advisory role.
  sports: Dianna Wonson enjoys weekend hikes along the Rocky Mountain trails, participates in a local senior pickleball league, and consistently attends Colorado Avalanche hockey games at Ball Arena, balancing
    a moderate fitness routine with a loyal fandom for Colorado’s professional sports teams while adhering to a structured schedule that fits their practical lifestyle.
  arts: Dianna Wonson cultivates a love for the performing arts through regular attendance at Colorado Shakespeare Festival productions and Colorado Symphony concerts, while drawing creative inspiration
    from Ansel Adams’ landscape photography and Joni Mitchell’s folk melodies, integrating these cultural experiences into their personal landscape photography projects.
  travel: Dianna Wonson favors meticulously planned trips that blend natural photography opportunities with cultural immersion, having explored Yellowstone’s geothermal wonders, the historic vineyards of
    Napa Valley, and the vivid autumn foliage of New England’s White Mountains, all scheduled around their book club calendar and budget considerations.
  culinary: Dianna Wonson enjoys preparing hearty seasonal meals such as rosemary‑roasted Colorado lamb, quinoa and roasted beet salad, and pumpkin soup, drawing fresh ingredients from their garden and
    applying a solid grasp of flavor pairing, though they occasionally indulge in artisanal cheese boards after a long day of data analysis.
  core: Dianna Wonson is a detail‑oriented market analyst who balances a structured professional trajectory with a love for nature, pragmatic finances, disciplined health habits, modest athletic pursuits,
    and a curated taste for arts and travel.
background:
  cultural: Dianna grew up in a modest middle‑class family in the American Midwest, where a pragmatic work ethic and self‑reliance were emphasized. After completing her STEM bachelor’s degree, she relocated
    to Colorado Springs, where she embraced the region’s outdoor‑oriented lifestyle while maintaining the practical, organized values from her upbringing. Her cultural background blends traditional American
    values of independence and community involvement with a deep appreciation for Colorado’s natural environment. This mix informs her disciplined professional approach, her commitment to mentoring, and
    her leisure pursuits that often center around nature, thoughtful reading, and modest community engagement.
