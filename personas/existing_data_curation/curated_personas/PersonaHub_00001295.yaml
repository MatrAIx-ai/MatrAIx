persona_description: A manufacturing facility operator who is interested in implementing cogeneration systems to improve energy utilization and overall operating efficiency and reliability. The individual
  is looking for solutions that can match the heating load profile and have sufficient redundancy to ensure power reliability. They are willing to invest in systems that operate at least 8,000 hours per
  year and have substantially constant heating loads. The individual is also interested in recovering useful heat and applying cogeneration to other processes that can be boundless, as long as a significant
  heat sink is available.
