personas:
  professional: Joseph Coz, an aspiring robotics hobbyist who blends curiosity with practicality to engineer LEGO robots that function reliably while experimenting with Scratch game prototypes, uses their
    organized yet flexible approach to lead the school’s tech club projects, and leverages their sociable nature to mentor peers.
  sports: Joseph Coz, a lively member of the Chelsea Youth Soccer Club and the local middle school basketball team, idolizes the Boston Celtics and the New England Revolution, trains three times weekly
    on the community courts, blends structured drills with spontaneous street‑ball games, and values teamwork, often volunteering to coordinate neighborhood clean‑up runs after practice.
  arts: Joseph Coz, the school band’s energetic drummer who draws rhythm inspiration from Ringo Starr and the electronic beats of Daft Punk's 'Robot Rock', spends evenings crafting Scratch game narratives
    influenced by 'The Expanse', and attends local art‑tech workshops where they explore pixel art alongside fellow creators.
  travel: Joseph Coz, who loves weekend hikes along the scenic trails of the Charles River and kayaking on Chelsea’s own freshwater pond, has taken family road trips to Boston’s Museum of Science and the
    historic sites of Washington DC, and dreams of attending the International Robot Olympiad in Tokyo to merge their love for robotics with global culture.
  culinary: Joseph Coz, who favors pizza topped with pepperoni and extra cheese, enjoys homemade nachos seasoned with jalapeños and salsa, occasionally attempts simple sushi rolls with avocado and cucumber
    under mom’s guidance, and often forgets to tidy the kitchen after cooking, resulting in a cluttered but aromatic workspace.
  core: Joseph Coz is a driven, socially‑savvy teen who fuses curiosity with practicality in robotics, balances a disciplined saving habit with spontaneous treats, stays healthy through proactive self‑care,
    thrives in team sports, drums to futuristic beats, dreams of global travel, and occasionally leaves a trail of dishes behind.
background:
  cultural: Joseph grew up in Chelsea, a small town in Washtenaw County, Michigan. The community’s Midwestern roots shape his values of hard work, modesty, and cooperation. His family’s heritage includes
    German and Polish ancestry, reflected in occasional celebrations of cultural holidays and traditional foods. He attends a public middle school that emphasizes community involvement, and his upbringing
    includes participation in local events such as the county fair, church youth groups, and neighborhood clean‑up projects. This blend of small‑town American life, European family traditions, and a strong
    sense of civic responsibility informs his outlook and aspirations.
