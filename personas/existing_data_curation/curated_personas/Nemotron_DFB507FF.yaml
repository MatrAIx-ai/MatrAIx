  career_goals: Joseph hopes to turn his curiosity for how things work into a career in engineering or technology. In the short term, he aims to join his high school robotics team, win a science‑fair award,
    and secure a summer coding camp. Long‑term, he envisions studying mechanical or computer engineering, designing sustainable tools for his community, or becoming a STEM teacher who can inspire other
    students. He also imagines staying involved in local sports coaching or youth mentorship, merging his love for teamwork with community service.
