personas:
  professional: Brittany Nunez, a seasoned educator with four decades of elementary and middle school teaching, excels at designing differentiated curricula, integrating technology, mentoring new teachers,
    and they now channel their disciplined, competitive spirit into launching a culturally vibrant after‑school arts program, authoring a guide on bilingual literacy, and pursuing a master’s degree in Educational
    Leadership.
  sports: Brittany Nunez, who enjoys low‑impact fitness, practices yoga three times a week, walks the Inner Harbor promenade during spring, follows the Baltimore Ravens and the Orioles, and they also participate
    in a senior bowling league at the Hives while occasionally joining a community cycling club in the summer.
  arts: Brittany Nunez frequently visits the Baltimore Museum of Art to study works by Henri Matisse and Yayoi Kusama, and they translate that inspiration into watercolor paintings, sway to merengue by
    Juan Luis Guerra and bachata from Aventura, and enjoy seasonal performances by the Baltimore Symphony Orchestra featuring violinist Sarah Chang, deepening their artistic identity.
  travel: Brittany Nunez prefers carefully planned trips; they select comfortable guided tours to historic port towns like Old San Juan, the cobblestone streets of Cartagena, and the gardens of Lisbon,
    while also cherishing day trips to the Chesapeake Bay islands, balancing adventure with the financial prudence required at 73.
  culinary: Brittany Nunez delights in preparing sancocho with plantains, yucca, and lean chicken, crafts creamy mangú topped with sautéed onions using fresh cilantro from their garden, and they savor the
    complexity of sofrito made with garlic, oregano, and bell peppers, while occasionally treating themselves to a crowd‑pleasing shrimp ceviche at a local seafood market.
  core: Brittany Nunez blends a lifelong dedication to education with an organized, curiosity‑driven love for watercolors, herb gardening, and community activism; they often juggle meticulous budgeting
    with a competitive edge and a skeptical eye toward new trends.
background:
  cultural: Brittany’s cultural background is rooted in her Dominican heritage. She was born to parents who emigrated from the Dominican Republic and grew up in a bilingual household where Spanish was spoken
    daily. Family gatherings centered around music, dance, and culinary traditions, fostering a strong sense of Caribbean identity. After moving to Maryland, she integrated into the diverse Baltimore County
    community while preserving Dominican customs, celebrating holidays such as Independence Day and sharing traditional foods. Her Catholic upbringing, respect for elders, and emphasis on communal solidarity
    have shaped her values. She actively participates in local Dominican cultural festivals, supports Spanish‑language programs in schools, and serves as a bridge between her Caribbean roots and the broader
    American context.
