  hobbies: '[''Watercolor Painting'', ''Museum Visits'', ''Reading Historical Nonfiction'', ''Education Research'', ''Gardening'', ''Dominican Cooking'', ''Dancing (Merengue/Bachata)'', ''Yoga'', ''Crossword
    Puzzles'', ''Memoir Writing'', ''Volunteering (Spanish Conversation Classes)'']'
  career_goals: Despite nearing retirement, Brittany aims to transition her expertise into a mentorship and advocacy role. She plans to develop an after‑school arts and cultural program that highlights
    Dominican heritage and supports at‑risk youth in Baltimore County. She also aspires to publish a guide on culturally responsive literacy strategies for bilingual classrooms and to serve on the local
    school board to influence equitable policies. Additionally, she hopes to complete a master’s degree in Educational Leadership to strengthen her ability to drive systemic improvements.
