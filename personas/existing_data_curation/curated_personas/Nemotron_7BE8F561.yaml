personas:
  professional: A curious five‑year‑old named Pedro Rosadorivera envisions a future as an engineer, methodically arranging building blocks and sketching simple machines during preschool, balancing their
    inquisitive streak with a practical need to keep the play area tidy, even as they sometimes fret over a missing piece.
  sports: Pedro Rosadorivera loves attending El Paso Locomotive FC’s weekend matches and participates in a preschool soccer program with the local neighborhood club, balancing a spirited enthusiasm for
    scoring goals with occasional frustration when they miss the ball, and they often practice dribbling in the backyard after school.
  arts: Pedro Rosadorivera delights in the animated film Coco and the lively tunes of The Wiggles, spends afternoons drawing colorful sugar‑skull motifs during Día de los Muertos preparations, and they
    often hum the melodies while finger‑painting, showing a budding love for music and visual art.
  travel: Pedro Rosadorivera’s favorite trips include a family road‑run to the Grand Canyon and a summer visit to their grandparents in Oaxaca, and they prefer vivid, short excursions over long flights,
    often worrying about getting lost but loving the chance to collect smooth stones and story‑telling souvenirs.
  culinary: Pedro Rosadorivera relishes tacos al pastor, cheesy quesadillas, and strawberry‑topped pancakes, eagerly helping to stir salsa and sprinkle cheese at the kitchen counter, though they sometimes
    sneak extra candy when no one watches, revealing a sweet‑tooth habit.
  core: Pedro Rosadorivera is a bilingual five‑year‑old who blends bright curiosity with a careful worry, obsessively sorting toys, saving pennies, and humming festive songs while worrying about the smallest
    details.
background:
  cultural: Pedro is a Mexican‑American child growing up in El Paso, Texas, a city that straddles the U.S.–Mexico border. At home, his family speaks Spanish and celebrates Mexican traditions such as Día
    de los Muertos, Las Posadas, and Mexican Independence Day, preserving a strong cultural heritage. He enjoys Mexican foods like tacos and tamales during family meals and hears stories about his grandparents'
    lives in Oaxaca, which deepen his connection to his roots. Simultaneously, he participates in typical American experiences—attending a local preschool, celebrating birthdays with cupcakes, and playing
    in after‑school programs. This blend of Mexican and American influences shapes his bilingual fluency, love for music, communal values, and the way he navigates both cultures in daily life.
