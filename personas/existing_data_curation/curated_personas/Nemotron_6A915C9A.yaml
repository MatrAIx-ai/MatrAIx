  hobbies: '["Biking on local trails","Fishing on Lake Michigan","Woodworking and DIY home projects","Reading non‑fiction (health tech, regional history)","Attending community festivals (Mequon Summer Fest)","Cooking
    with spouse","Board games with friends","Puzzle solving"]'
  career_goals: Michael aims to advance to a supervisory or manager role within health information management, obtaining the Certified Health Information Manager (CHIM) credential and completing a bachelor's
    degree in Health Information Management. He is driven to lead initiatives that integrate emerging health informatics technologies, such as interoperable data platforms and predictive analytics, to improve
    patient care and operational efficiency. Additionally, he aspires to contribute to statewide health data governance committees and mentor junior colleagues, blending his curiosity about industry innovations
    with his practical, organized work style.
