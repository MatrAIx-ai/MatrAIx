personas:
  professional: Dennis Kelly, a budding visual storyteller, blends digital illustration, sketching, and stagecraft with a natural flair for organizing school events, turning their curiosity and sociability
    into collaborative art projects, and they often wrestle with occasional over‑thinking that slows their workflow.
  sports: Dennis Kelly spends Saturday afternoons shooting hoops with friends in the Cuyahoga Community Basketball League, idolizing the Cleveland Cavaliers and cheering for the Ohio State Buckeyes during
    football season, though they habitually chat up teammates mid‑dribble, sometimes leaving their defense a step behind.
  arts: Dennis Kelly, an avid fan of Van Gogh’s bold brushstrokes, Banksy’s street satire, and the animated tutorials of Jazza, channels that admiration into sketching downtown Cleveland scenes, creating
    glitch‑style digital illustrations set to the riffs of Tame Impala and the soulful strums of John Mayer, while they occasionally perform monologues inspired by Tom Holland’s charisma in drama club.
  travel: Dennis Kelly dreams of swapping their sketchbook for a passport, planning a weekend road trip to the Art Institute of Chicago to study its modern collections, a future summer pilgrimage to Tokyo’s
    Akihabara district for manga inspiration, and a budget‑friendly family visit to Cleveland’s own Lake Erie Islands, and they balance their love for adventure with the constraints of their parents' schedule.
  culinary: Dennis Kelly, a self‑taught kitchen experimenter, whips up spicy chicken ramen with sriracha and soft‑boiled eggs, perfects loaded nachos topped with avocado and black beans for game nights,
    and they occasionally bake sourdough bread using a starter inherited from their grandmother, favoring bold flavors that match their vibrant art style.
  core: Dennis Kelly is a talkative, art‑obsessed teen whose relentless curiosity fuels creative projects, yet they tend to over‑analyze and stay up binge‑watching TikTok videos, which often leaves them
    battling late‑night anxiety.
background:
  cultural: Dennis grew up in the suburbs of Cleveland, Ohio, a Midwestern city known for its strong community ties and industrial roots. His family background blends Irish and German ancestry, and they
    uphold traditional Midwestern values such as friendliness, modesty, and a love for local sports teams like the Browns and the Cavaliers. He regularly attends city cultural events, including exhibits
    at the Rock & Roll Hall of Fame and local art fairs, which nurture his appreciation for diverse artistic expression while staying grounded in the region’s working-class ethos.
