  career_goals: Dennis wants to turn his love of art and people into a career that blends creativity with communication. He plans to study graphic design or multimedia production in college and hopes to
    become a creative director, visual storyteller, or museum curator who designs interactive exhibitions. He also considers a role in community outreach or youth mentorship where he can inspire peers.
    Over time he aims to develop a platform that showcases emerging artists and provides mental-health resources, reflecting his awareness of stress and emotions.
