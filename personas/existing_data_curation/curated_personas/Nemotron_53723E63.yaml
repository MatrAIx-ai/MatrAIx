  career_goals: Atoya dreams of a future where she can explore the natural world and turn her curiosity into meaningful work. She aspires to become a wildlife biologist or environmental data analyst who
    studies Florida's marine ecosystems, and she also hopes to write stories that share what she learns. Her ambition is to find a career that lets her work independently, blend scientific inquiry with
    creative expression, and contribute to protecting the environment she loves.
