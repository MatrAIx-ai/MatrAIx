personas:
  professional: Atoya Lee is an aspiring junior coder and digital storyteller who blends their fascination with Jacksonville's wetlands and birds into interactive Python narratives that teach peers about
    local ecosystems, balancing curiosity with practical coding habits even as their desk is often scattered with LEGO pieces and they prefer quiet solo sessions but will assert themselves when sharing
    ideas.
  sports: Atoya Lee enjoys low-key fitness through early morning bird-watching walks along the Jacksonville waterfront and occasional swim sessions at the local pool, while cheering for the Jacksonville
    Jaguars and the Florida State Seminoles, preferring solitary activity over team sports but still joining a community youth soccer clinic when invited.
  arts: Atoya Lee nurtures their creative side by sketching wildlife on a tablet, playing simple melodies on a keyboard, and listening to jazz legends like Nina Simone and John Coltrane as well as contemporary
    R&B artists such as Janelle Monáe, weaving these influences into journal entries and occasional school art projects.
  travel: Atoya Lee dreams of exploring the historic streets of St. Augustine, the Everglades’ mangroves, and eventually the Caribbean islands where their family’s coastal stories originated, planning trips
    loosely with parents while preferring flexible itineraries that allow spontaneous nature stops.
  culinary: Atoya Lee enjoys cooking collard greens, sweet potato pie, and homemade fish tacos with family, experimenting with fresh herbs like thyme and cilantro while their intermediate kitchen skills
    let them whip up banana-honey smoothies for after-school snacks.
  core: Atoya Lee is a quiet, curious 11-year-old who blends nature-focused coding, soulful music, and thoughtful sketching into a solitary yet inventive world, though worry and a relaxed approach to obligations
    sometimes cloud their plans.
background:
  cultural: Atoya is a Black girl raised in Jacksonville, Florida, whose family blends Southern African‑American traditions with modern urban influences. Her upbringing includes stories of the Gullah heritage
    along the nearby coast, church gatherings filled with gospel and soulful music, and family reunions that emphasize storytelling, resilience, and a love of Southern cuisine such as collard greens and
    sweet potato pie. Jacksonville's rich cultural tapestry—its historic neighborhoods, Afro‑Caribbean festivals, and vibrant arts scene—has nurtured her appreciation for rhythm, oral history, and social
    consciousness, even as she often seeks quiet, introspective spaces to reflect and create.
