personas:
  professional: A budding robotics enthusiast, Marco Jarrin channels his methodical mindset into coding and building competition‑ready robots for his middle school club, meticulously planning each project
    step, double‑checking circuits, and dreaming of one day designing autonomous drones for space exploration.
  sports: An avid soccer player, Marco Jarrin captains the Elsa Eagles junior team, trains five days a week, studies game footage to refine tactics, watches FC Barcelona and Club América matches for inspiration,
    and also follows the Houston Astros during baseball season, channeling his competitive drive into precise footwork and strategic positioning.
  arts: A passionate fan of regional música norteña, Marco Jarrin regularly listens to Los Tigres del Norte, Intocable, and Banda MS while practicing guitar riffs, and channels his love for design into
    building intricate LEGO models, often sketching ideas inspired by the vibrant colors of Día de los Muertos altars.
  travel: A budding traveler, Marco Jarrin has explored the historic River Walk in San Antonio, attended the annual border‑town festival in Laredo, and dreams of visiting the copper‑colored cliffs of Cuernavaca
    and the bustling markets of Oaxaca, balancing his travel aspirations with a limited family budget and school responsibilities by planning trips months in advance.
  culinary: A kitchen‑assistant in training, Marco Jarrin helps prepare homemade tamales, salsas, and chilaquiles, experimenting with corn masa, chipotle peppers, and queso fresco, mastering the perfect
    guacamole with ripe avocados, lime, and cilantro, and occasionally rewards his LEGO builds with nachos topped with jalapeños and melted cheddar.
  core: Marco Jarrin is a methodical teen who blends a competitive soccer drive with a love for precise LEGO builds, careful budgeting, and a habit of over‑thinking every detail, often wrestling with anxiety
    while passionately preserving family traditions.
background:
  cultural: Marco grows up in a bilingual Mexican‑American household in Elsa, Texas, where Spanish is spoken at home and English at school. Family traditions such as celebrating Día de los Muertos, Cinco
    de Mayo, and sharing homemade tamales are central to his weekly life. His community emphasizes close family ties, respect for elders, and a strong work ethic, values that reinforce his sense of responsibility
    and reliability. He is influenced by the vibrant border-town culture, which blends Mexican heritage with American influences, evident in his love for soccer, regional música norteña, and participation
    in local festivals. This cultural backdrop shapes his identity, providing a rich source of language, cuisine, and communal support that he carries into his school and extracurricular activities.
attributes:
  skills: '[''Organizational planning'', ''Methodical problem solving (math & science)'', ''Basic coding (Scratch)'', ''Bilingual communication (Spanish & English)'', ''Competitive soccer tactics'', ''Project
    execution (LEGO/model building)'', ''Reliability in commitments'']'
  hobbies: '[''Soccer (playing and tactical analysis)'', ''LEGO and model building'', ''Strategy video games (Minecraft, FIFA)'', ''Reading non‑fiction (science & engineering)'', ''Listening to Mexican
    regional music'', ''School robotics club'', ''Helping with family cooking'']'
  career_goals: Marco aspires to earn a scholarship that will allow him to study civil engineering or architecture, motivated by his fascination with how structures are designed and built. He envisions
    designing safe, functional spaces for his community in Hidalgo County and hopes to one day work on infrastructure projects that benefit families like his own. Alongside his academic ambition, he dreams
    of playing soccer at a high level, aiming for a college team where he can combine his love for the sport with his competitive drive. Ultimately, he wants to balance a career in engineering with involvement
    in youth sports coaching, giving back to the community that shaped him.
