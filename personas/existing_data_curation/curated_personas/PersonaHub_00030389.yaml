persona_description: A researcher at Strathclyde University who is working on developing a new approach to treating orphan nuclear wastes, with a focus on trapping radioactive gases using a three-stage
  treatment process that involves smouldering, carbon capture, and mineral formation. The research aims to reduce the amount of radioactive material requiring disposal and to demonstrate the feasibility
  of capturing the radioactive gases as stable carbonate and phosphate minerals.
