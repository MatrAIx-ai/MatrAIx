  career_goals: Judith imagines a future where she helps others in a structured, caring environment. She often talks about becoming a preschool teacher because she enjoys organized routines, guiding younger
    children, and fostering a safe classroom community. She also day‑dreams about being a veterinarian, drawn to the idea of caring for animals with responsibility and order. Both aspirations reflect her
    desire for reliable roles that combine empathy, structure, and a sense of purpose.
