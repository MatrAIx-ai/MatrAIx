personas:
  professional: Judith Miller, a preschool classroom helper who excels at organizing snack rotations, labeling supply bins, and leading group circle time, channels their love of predictable routines, reliable
    attention to detail, outgoing energy, and competitive spirit into every activity they undertake.
  sports: Judith Miller, a lively member of the Morgan Cubs Little League baseball team and an enthusiastic fan of the Utah Jazz, channels boundless energy into weekday soccer drills, weekend sledding on
    the local hill, and weekly ski lessons at a nearby resort, always striving to be the first to score while thriving in group play.
  arts: Judith Miller, an enthusiastic little artist who loves drawing mountain vistas after family hikes and performing ‘Let It Go’ from Frozen, frequently watches Mickey Mouse cartoons and enjoys crafting
    friendship bracelets at school, infusing their expressive play with community‑focused creativity.
  travel: Judith Miller, an adventurous five‑year‑old who enjoys meticulously planned family road trips to the Great Salt Lake, Park City ski slopes, and Zion National Park, and dreams of visiting Disneyland
    and the Grand Canyon, balances excitement with a need for familiar routines and short, engaging stops.
  culinary: Judith Miller, a budding little chef who adores cheesy macaroni, pepperoni pizza, apple slices with caramel dip, and proudly mixes batter for chocolate chip cookies, often helps stir honey‑glazed
    carrots at dinner, showing a cheerful palate that favors comfort foods with a sweet twist.
  core: Judith Miller, a high‑energy, structure‑loving five‑year‑old who thrives on group activities, competitive games, worries over tiny mishaps, and finds joy in nature‑filled community events.
background:
  cultural: Judith is raised in Morgan, a small, close‑knit community in Salt Lake County, Utah. Her family identifies with mainstream White American culture and participates in the region's predominantly
    LDS (Mormon) environment, attending community gatherings and local church activities. The town's western mountain heritage emphasizes outdoor recreation, modesty, and a strong work ethic, which influence
    her upbringing through events like county fairs, school performances, and family hikes. These cultural touches shape her values of responsibility, community involvement, and appreciation for nature.
attributes:
  skills: '[''following daily routines'', ''organizing personal belongings'', ''completing simple chores'', ''basic counting and math'', ''assembling puzzles'', ''cooperative group play'', ''rule‑based
