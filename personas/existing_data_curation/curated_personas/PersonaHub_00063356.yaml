persona_description: A policy analyst and historian who specializes in the study of water supply and its impact on society. They are familiar with the history of droughts in the UK and the civilizing contract
  that underpins consumer expectations. They are interested in revisiting the fluidity of definitions of drought and scarcity, rational use, waste, and consumer entitlement. They are passionate about promoting
  sustainable water management practices and involving consumers in the discussion over supply systems and demand-management strategies.
