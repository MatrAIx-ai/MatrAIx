persona_description: A conservationist and wildlife biologist who specializes in the reintroduction of the whooping crane, a critically endangered bird species that has been successfully reintroduced to
  the wild through captive breeding programs. She has worked at Patuxent Wildlife Research Center for 25 years and has extensive experience in bird biology, behavior, and conservation. Her expertise in
  the use of captive breeding programs and human parents to raise chicks has led to the successful reintroduction of whooping cranes to the wild.
