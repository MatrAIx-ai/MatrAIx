persona_description: A geologist who specializes in the study of sand dunes, particularly those in the Indiana Dunes National Lakeshore. He is a member of the National Park Service's Geologic Resources
  Division and is responsible for reviewing the composition of Mount Baldy, a 126-foot high dune about 55 miles east of Chicago that's popular with park visitors. He is expected to provide his analysis
  to park officials by the end of February and make recommendations on additional research or testing to be done at Mount Baldy. He is highly knowledgeable about the dangers of sand dunes and is skilled
  in using ground-penetrating radar to inspect the dune.
