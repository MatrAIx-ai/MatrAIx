persona_description: A health assessor who is responsible for conducting in-depth analyses of toxicology, epidemiology, medicine, and health physics data to evaluate the strength and relevance of available
  information in public health assessments. This person must be able to integrate and communicate findings in the public health assessment document, and must be proficient in toxicology, epidemiology, medicine,
  and health physics. This person will need to conduct a critical review of toxicologic or epidemiologic data to ensure that the analysis is accurate and relevant, and will need to consult with experts
  on the team to gather the most relevant and up-to-date sources of data.
