  hobbies: '[''Cooking Traditional Puerto Rican Dishes'', ''Salsa Dancing'', ''Playing Guitar'', ''Beach Volleyball'', ''Paddleboarding'', ''Volunteering at Food Bank'', ''Attending Community Festivals'',
    ''Reading Travel Memoirs'', ''Exploring New Restaurants'', ''Gardening'']'
  career_goals: Alejandro aims to transition from a lead waiter to a restaurant manager within the next two years, leveraging his organizational strengths and people‑focused approach. He plans to earn a
    Certified Hospitality Supervisor credential and pursue a bachelor’s degree in hospitality management to complement his associate’s background. Long‑term, he dreams of opening a family‑run eatery that
    celebrates Puerto Rican cuisine, blending traditional recipes with contemporary flavors he discovers through his curiosity for culinary trends. He also hopes to mentor younger staff, fostering a collaborative
    and supportive workplace culture.
