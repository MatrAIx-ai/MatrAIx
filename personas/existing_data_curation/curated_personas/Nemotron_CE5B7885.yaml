personas:
  professional: Alejandro Hernandez, a veteran front‑of‑house professional with over ten years of restaurant experience, blends meticulous table management, calm conflict resolution, bilingual communication,
    and an outgoing, people‑focused energy to deliver attentive service and mentor new staff, and they view each shift as an opportunity to model reliability and collaborative spirit while preparing for
    a future managerial role.
  sports: Alejandro Hernandez energizes weekends with sunrise paddle‑boarding sessions and competitive beach volleyball matches through the Daytona Beach Surf Club, joins casual soccer games with friends,
    and stays a devoted fan of the Tampa Bay Rays and Miami Dolphins, all while they relish the camaraderie and physical challenge these activities provide.
  arts: Alejandro Hernandez finds rhythm in weekly salsa classes where they channel the vibrant percussion of Celia Cruz and the soulful guitar of Carlos Santana, adds improvisational flair during community
    festivals, unwinds by listening to Frank Sinatra's crooning standards and watching Penélope Cruz's performances, allowing music and dance to shape their social zest and personal discipline.
  travel: Alejandro Hernandez prefers meticulously planned, culinary‑focused short getaways, mapping road trips to coastal gems like Charleston and New Orleans to savor local seafood, while maintaining
    a travel journal inspired by Bill Bryson and dreaming of an immersive Mediterranean tour of Sicily and Crete once their restaurant ambition stabilizes, and they balance wanderlust with family responsibilities.
  culinary: Alejandro Hernandez delights in preparing traditional mofongo with plantain and chicharrón, reimagining arroz con gandules by adding smoked paprika and roasted corn, and blending fresh garden
    basil, heirloom tomatoes, and citrus zest into inventive sauces, while they frequently host dinner parties to showcase these fusion dishes for friends and family.
  core: Alejandro Hernandez blends a calm, methodical work ethic with an energetic social spark, turning each shift into a chance to mentor staff, yet they can’t resist a nightly espresso and often lose
    track of time while perfecting new recipes in the kitchen.
background:
  cultural: Alejandro was raised in a close‑knit Puerto Rican household that emphasized family, hospitality, and cultural pride. Bilingual in Spanish and English, he grew up celebrating traditions such
    as Noche de San Juan, sharing homemade meals, and participating in local Puerto Rican community events in Florida. The values of respect, generosity, and community service are central to his identity,
    influencing both his personal life and his approach to service. While he embraces the vibrant, sun‑filled lifestyle of Daytona Beach, he remains deeply connected to his island roots, often incorporating
    Puerto Rican music, cuisine, and customs into his daily routine.
attributes:
  skills: '[''Customer Service'', ''Bilingual Communication (English/Spanish)'', ''POS System Operation'', ''Table and Section Management'', ''Food and Beverage Pairing Knowledge'', ''Upselling Techniques'',
