personas:
  professional: Jason Branom is an 18-year-old aspiring software engineer who blends Python, Arduino prototyping, and data modeling with a spontaneous, hands-on approach, often leading hackathon teams through
    rapid, practical problem-solving while occasionally struggling to meet tight deadlines.
  sports: Jason Branom is a regular at the local community center where they play pickup basketball and soccer, cheering for the Boston Celtics and New England Revolution, while also joining the Berkshire
    Trail Club for weekend hikes to stay fit.
  arts: Jason Branom spends evenings strumming acoustic covers of Tame Impala and Bill Withers while experimenting with Ableton Live to produce lo-fi beats, and they sharpen their quick-wit at improv comedy
    workshops inspired by Bo Burnham’s style.
  travel: Jason Branom prefers spontaneous road-trips that combine festival hopping—like weekend visits to Boston’s Harborfest, New York’s SummerStage, and Portland’s Rose Festival—with occasional backpacking
    plans to Edinburgh’s Fringe, balancing a limited student budget with a thirst for new experiences.
  culinary: Jason Branom enjoys cooking experimental dishes such as shrimp tacos with mango salsa, homemade ramen with miso broth, and quinoa salads tossed with roasted chickpeas, cilantro, and lime, reflecting
    an intermediate skill level that mixes quick weeknight meals with occasional culinary experiments.
  core: Jason Branom is a curiosity-driven tech tinkerer who thrives on spontaneous collaboration, yet often battles a habit of procrastinating on paperwork.
background:
  cultural: Jason grew up in Springfield, Massachusetts, in a middle‑class family of primarily New England ancestry, with roots tracing back to Irish and Italian immigrants. His upbringing reflects the
    blend of traditional New England values—self‑reliance, community involvement, and a strong emphasis on education—alongside the vibrant cultural tapestry of the Pioneer Valley. He attended public schools
    where he participated in regional sports leagues, local arts festivals, and community service projects. Family gatherings often featured classic New England fare such as clam chowder and apple pie,
    and he follows the seasonal rhythms of the area, from leaf‑peeping trips to winter snowshoeing. The region’s strong ties to higher education and its burgeoning tech scene have shaped his outlook, fostering
    both a respect for established institutions and a curiosity for innovative, practical solutions.
