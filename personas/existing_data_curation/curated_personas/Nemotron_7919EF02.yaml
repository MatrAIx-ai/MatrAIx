  career_goals: Short‑term, Jason aims to secure an entry‑level engineering or software development role that offers flexibility and exposure to cross‑functional teams—ideally a position that lets him prototype
    products or contribute to a startup’s R&D pipeline. He also plans to complete a summer internship at a tech‑focused biotech or clean‑energy firm to deepen his hands‑on experience. Long‑term, he envisions
    launching his own venture that creates affordable, DIY‑style tech kits for STEM education, merging his love for practical tinkering with community impact. He hopes to become a product manager or tech
    entrepreneur who can bridge technical teams and end‑users, while mentoring younger students through local maker clubs and hackathons.
