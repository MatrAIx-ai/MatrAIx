  career_goals: Pamela dreams of a future where she can blend her love for discovery with tangible impact. She aspires to become an environmental scientist or public health educator who uses clear communication
    to raise awareness about local issues, especially those affecting her community in Mississippi. She also envisions herself as a middle‑school STEM teacher, guiding younger students through hands‑on
    projects while encouraging critical thinking. Her competitive drive pushes her to aim for leadership roles that let her influence and organize, such as heading a youth advocacy group or a community
    outreach program.
