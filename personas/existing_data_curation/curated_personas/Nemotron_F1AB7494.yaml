personas:
  professional: Pamela Baker, a 13‑year‑old aspiring robotics engineer, blends their scientific curiosity and practical mindset to design simple robots for school competitions, while their talkative confidence
    shines when presenting projects and negotiating roles in the Science Club’s collaborative builds.
  sports: Pamela Baker plays forward on the community U‑14 Girls Soccer Club, follows the local high‑school football team the Valley Spartans, roots for the Dallas Cowboys during the NFL season, and they
    approach fitness with a competitive drive, often challenging friends to sprint drills after school practice.
  arts: Pamela Baker delights in performing scenes from 'Hamilton' in Drama Club, idolizes Lin‑Manuel Miranda and Tim Burton, creates short animations inspired by TheOdd1sOut, and they spend free time binge‑watching
    Pixar shorts and reading Agatha Christie mysteries for narrative inspiration.
  travel: Pamela Baker enjoys weekend family road trips to nearby state fairs, cherishes a school‑organized field trip to the Smithsonian National Air and Space Museum, and they dream of exploring the Space
    Center Houston to see real rockets, all while balancing a modest travel budget that relies on school‑funded activities and parental support.
  culinary: Pamela Baker experiments in the kitchen by mastering crispy fried catfish seasoned with Cajun spice, perfecting sweet tea with a hint of fresh lemon, and occasionally attempts shrimp étouffée,
    and they showcase a budding culinary flair that mixes Southern comfort foods with a curiosity for bold flavors.
  core: Pamela Baker is a talkative, curiosity‑driven teen who juggles robotics, drama, and soccer with a competitive spark, a skeptical eye for others' motives, and a habit of procrastinating on homework
    while secretly hoarding mystery novels under the bed.
background:
  cultural: Pamela was raised in Brandon, Mississippi, a suburban community steeped in Southern traditions. Her family values close‑knit ties, regular church attendance, and participation in community events
    such as the Rankin County Fair and Friday night high‑school football games. She grew up with typical Southern cuisine—fried catfish, BBQ ribs, and sweet tea—and enjoys country and blues music that often
    play at family gatherings. The local culture emphasizes hospitality, respect for heritage, and a strong sense of belonging, all of which shape Pamela's outlook and daily life.
