persona_description: A global trade expert who is deeply interested in the workings and policies of the World Trade Organization (WTO). They have a strong background in economics, particularly in the field
  of international trade, and have a keen interest in the organization's role in regulating and liberalizing world trade. They are knowledgeable about the history of the WTO, including its founding, the
  GATT, and the transition to the WTO. They are also knowledgeable about the WTO's dispute settlement body and the Doha Development Round, which is a significant topic in the organization's work. Additionally,
  they are knowledgeable about the WTO's role in regulating agricultural subsidies and the impact of these subsidies on global trade.
