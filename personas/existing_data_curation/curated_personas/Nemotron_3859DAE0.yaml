personas:
  professional: Cecile Custer, a seasoned psychiatric technician with sharp observation, crisis de‑escalation, and meticulous documentation skills, leverages their practical curiosity and organized flexibility
    to build therapeutic rapport, lead group sessions, and streamline interdisciplinary workflows while aspiring to supervise a team and champion community mental‑health outreach in rural Georgia.
  sports: Cecile Custer’s love for the outdoors fuels weekly hikes in the Appalachian foothills with the Floyd County Trail Runners, membership in a local yoga studio, occasional volunteer coaching of youth
    soccer, and spirited support for the Atlanta Falcons and Atlanta Braves, embodying a social, active approach to fitness.
  arts: Cecile Custer immerses themselves in bluegrass culture by attending festivals featuring Bill Monroe tributes and The Del McCoury Band, dances at community socials to the sounds of The Avett Brothers,
    participates in a psychology‑focused book club discussing works like "The Body Keeps the Score," and finds inspiration in the poetry of Maya Angelou, weaving arts into their community‑centered identity.
  travel: Cecile Custer plans leisurely road trips that blend hiking in Shenandoah National Park, weekend escapes to Asheville’s art scene, and a dream pilgrimage to New Zealand’s Southern Alps, preferring
    modest budgeting and family‑friendly itineraries that balance adventure with their commitments to local volunteer work.
  culinary: Cecile Custer cultivates heirloom tomatoes, sweet corn, and rainbow carrots for farm‑to‑table meals like roasted beet‑goat cheese salad and Southern collard greens with smoked turkey, enjoys
    crafting kimchi from garden radishes, and occasionally indulges in fried green tomatoes at local diners, reflecting a blend of seasonal cooking skill and culinary curiosity.
  core: Cecile Custer is a community‑driven psychiatric technician whose practical curiosity, outgoing spirit, and occasional impulsive splurges create a vibrant blend of compassionate care, organized ambition,
    and a love for bluegrass‑filled gatherings.
background:
  cultural: Cecile was raised in a close‑knit, white Southern family in rural Floyd County, where church, family reunions, and community gatherings were central to daily life. The Southern hospitality and
    strong sense of duty instilled in her a deep compassion for others, while the region’s lingering stigma around mental health sparked her determination to provide empathetic, practical care. Her cultural
    roots emphasize resilience, modesty, and a respect for tradition, which she balances with a curious openness to new ideas—shaping both her professional approach as a psychiatric technician and her personal
    pursuits.
attributes:
  skills: '[''Patient observation'', ''Crisis de‑escalation'', ''Medication administration'', ''Clinical documentation'', ''Therapeutic rapport building'', ''Basic mental‑health assessments'', ''Group therapy
    facilitation'', ''Evidence‑based intervention implementation'', ''Safety and emergency protocols'', ''Administrative coordination'', ''Staff training and mentorship'']'
  hobbies: '[''Community volunteering'', ''Gardening'', ''Hiking'', ''Book club (psychology focus)'', ''Bluegrass festivals and dancing'', ''Yoga'', ''Neighborhood walking group'']'
  career_goals: Cecile aims to earn a bachelor's degree in psychology within the next three years and subsequently obtain licensure as a mental‑health counselor. She aspires to take on a supervisory role
    within her facility, leading a team of technicians and spearheading community outreach programs that reduce stigma around mental health in rural Georgia. Additionally, she plans to pursue certification
    in trauma‑informed care and develop a peer‑support group for adults with chronic mental‑health conditions in Floyd County.
