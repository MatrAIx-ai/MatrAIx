persona_description: A South Korean designer who is passionate about creating innovative and sustainable solutions for the physically challenged. They are dedicated to improving the quality of life for
  disabled individuals by designing wheelchair solutions that not only provide mobility but also produce green energy. Their work involves working with magnets, coils, and LEDs to develop a wheelchair that
  converts wheel rotation into electricity and produces light during night. They are interested in exploring the concept of green energy and the potential of using renewable resources to power the world.
