personas:
  professional: Wanda Aziz, a three-year-old, channels their curiosity into imaginative role‑play, proudly calling themselves a “mini‑museum curator” as they arrange crayons, stickers, and toy figurines
    into impromptu exhibitions that captivate visiting family members, and they love being the center of attention during these artful showings.
  sports: Wanda Aziz, a three‑year‑old, darts across the community park in a tiny red T‑ball uniform, cheering loudly for the Los Angeles Dodgers on game day and eagerly joining the Chatsworth Junior Cubs
    soccer practice, where they love the rhythmic thud of the ball against their tiny shoes.
  arts: Wanda Aziz, a three‑year‑old, spends hours at the local kids’ art studio drawing bold, sun‑filled scenes inspired by Van Gogh’s Sunflowers, then bursts into spontaneous renditions of “Twinkle‑Twinkle
    Little Star” on a bright yellow xylophone, delighting any adult audience who gathers around.
  travel: Wanda Aziz, a three‑year‑old, eagerly recounts family trips to Disneyland’s Fantasyland, the tide‑pools of Santa Monica, and a weekend nature hike in the Santa Susana Mountains, preferring short,
    spontaneous outings over long‑planned vacations, and they often cling to their parents’ hands while pointing out colorful seashells.
  culinary: Wanda Aziz, a three‑year‑old, adores creamy macaroni and cheese sprinkled with a dash of mild paprika, mixes banana slices into a strawberry‑yogurt smoothie with gusto, and proudly “helps” stir
    the pot with a plastic spoon, even though they frequently spill a splash of sauce onto the kitchen tiles.
  core: Wanda Aziz, a three‑year‑old whirlwind of curiosity, blends a love for art and social chatter with a tender heart that oscillates between exuberant play and sudden bouts of anxiety, leaving a trail
    of glitter, spilled crayons, and heartfelt giggles.
background:
  cultural: Wanda was born and raised in Chatsworth, a suburban neighborhood of Los Angeles in Ventura County, California. Her family is of white Anglo‑American heritage and places a strong emphasis on
    creative expression, often visiting local museums, galleries, and community art events. The multicultural atmosphere of Southern California offers her exposure to diverse languages, foods, and celebrations,
    though her household traditions focus on family outings, weekend nature walks, and regular artistic activities such as drawing and music. This blend of a suburban American upbringing and a vibrant regional
    arts scene shapes her curious, sociable, and emotionally expressive personality.
