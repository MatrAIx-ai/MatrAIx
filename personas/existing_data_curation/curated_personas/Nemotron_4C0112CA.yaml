  hobbies: '[''Water‑color painting'', ''Dancing'', ''Dress‑up role‑play'', ''Playing at the park'', ''Listening to storytime'', ''Watching animated movies'', ''Building forts with cushions'', ''Collecting
    leaves and rocks'', ''Asking questions about animals and art'']'
  career_goals: Wanda often talks about becoming a dancer who twirls on stage, a painter who uses bright colors, or a storyteller who shares magical tales with friends. She also imagines caring for others,
    like a friendly teacher or a performer who makes people feel happy and safe. These aspirations combine her love of art, desire to be at the center of attention, and wish to bring comfort to those around
    her.
