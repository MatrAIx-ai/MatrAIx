persona_description: A clinical researcher from the University of Pennsylvania Health System who specializes in the development and application of new imaging techniques for the diagnosis and treatment
  of brain disorders. They are particularly interested in combining fMRI and PET scanning to create a more comprehensive view of the brain's function and to explore the relationship between metabolism and
  blood flow in different conditions. They have experience conducting clinical research through the PET Center at the Hospital of the University of Pennsylvania and through the Center for Functional Neuroimaging,
  known for its excellence in multi-disciplinary brain imaging.
