  career_goals: Looking ahead, Ana aims to transition into a senior audit manager role where she can mentor junior accountants and champion best practices in risk management. She aspires to develop a community-focused
    financial literacy program for small Cuban-American businesses in Hialeah, leveraging her expertise to improve their financial health. Achieving CPA certification and obtaining a leadership position
    in a professional accounting association are also key milestones. Ultimately, she seeks to balance a fulfilling career with a stable, comfortable retirement, while leaving a lasting impact on her local
    community.
