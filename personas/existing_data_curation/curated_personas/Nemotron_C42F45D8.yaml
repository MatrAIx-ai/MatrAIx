  hobbies: '[''Gardening'', ''Knitting/Crocheting'', ''Baking and preserving foods'', ''Reading classic literature'', ''Crossword puzzles'', ''Church activities'', ''Bridge (card game)'', ''Listening to
    big band music'']'
  career_goals: Although retired from formal work, Angie aims to stay active and independent in her home and community. She wishes to continue mentoring younger volunteers at the senior center, passing
    on her cooking, sewing, and gardening knowledge. She hopes to organize a quarterly community quilt fundraiser for the local food pantry and to keep her garden productive to share fresh produce with
    neighbors. Maintaining her health, safety, and a comfortable living environment remains a top priority, as does preserving and documenting her family's culinary traditions for future generations.
