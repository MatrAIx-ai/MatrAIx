personas:
  professional: Angie Lasell, an 83‑year‑old retired homemaker turned senior‑center mentor, leverages her decades of caregiving, budgeting, and event‑planning expertise to coordinate volunteer schedules,
    lead knitting workshops, and organize quarterly quilt fundraisers for the local food pantry, embodying a methodical, community‑driven work ethic.
  sports: Angie Lasell follows the Detroit Tigers baseball team, enjoys watching Michigan State Spartans football games on Sundays, participates in a low‑impact walking club at the senior center, joins
    a weekly senior bowling league, and treats the regular bridge tournament as a friendly competitive sport, reflecting gentle enthusiasm for community‑based athletic activities.
  arts: Angie Lasell delights in the swing sounds of Glenn Miller and Duke Ellington on their vintage record player, reads Agatha Christie mystery novels, knits inspired by traditional folk patterns, and
    volunteers to set up chairs for the community theater’s seasonal productions, weaving classic American cultural threads into their artistic life.
  travel: Angie Lasell prefers short, well‑planned road trips within Michigan, such as the annual visit to Mackinac Island, weekend stays at a family‑run B&B in Traverse City, and summer trips to see grandchildren
    in Ohio, while dreaming of a guided tour of the Great Smoky Mountains, embodying a cautious yet curious travel style shaped by budget and health considerations.
  culinary: Angie Lasell, an accomplished home cook, loves baking apple‑cinnamon crumble pie and sourdough bread, uses freshly harvested tomatoes, beans, and rosemary from their garden in hearty stews,
    and meticulously preserves family recipes in a handwritten notebook, balancing modest ingredients with rich, nostalgic flavors.
  core: Angie Lasell blends sturdy Midwestern frugality, a love for rhythm and routine, and a quiet determination to mentor others, all while never missing a Sunday choir rehearsal or a nightly crossword.
background:
  cultural: Angie grew up in a mid‑midwestern, working‑class environment typical of Saginaw, Michigan. Her family roots trace back to German and Irish immigrants who settled in the region during the early
    20th century. This heritage fostered a strong sense of self‑reliance, frugality, and community responsibility. She was raised in a Protestant (Methodist) household, where church attendance and service
    to others were central values. The local culture emphasized modesty, mutual aid, and pride in maintaining family traditions, all of which continue to shape Angie's outlook, habits, and social interactions.
attributes:
  skills: '[''Home cooking and recipe preservation'', ''Knitting and crocheting'', ''Gardening and horticulture'', ''Basic first aid and elderly care'', ''Budgeting and household financial management'',
