    for library services'', ''Technology integration (RFID, self‑checkout, virtual reference)'', ''Local history and genealogy research'', ''Vendor negotiation'']'
  hobbies: '[''Book club facilitation'', ''Historical museum docent work'', ''Appalachian folk music festival participation'', ''Hiking and nature photography'', ''Southern cooking and recipe experimentation'',
    ''Hosting community potlucks'', ''Yoga and mindfulness meditation'', ''Journaling for stress management'', ''Listening to business and library tech podcasts'']'
  career_goals: Alexis aims to transition into a library director role within the next five years, using her business acumen to modernize library operations and expand digital services for rural patrons.
    She plans to secure multi‑year grant funding to create a regional digital heritage hub that preserves White County’s Appalachian history. Additionally, she hopes to present her community‑engagement
    model at state and national library conferences, publish a guide on integrating business principles into library management, and mentor emerging librarians from underrepresented backgrounds. She also
    aspires to develop a stress‑reduction workflow for staff, addressing the anxiety she often feels around tight deadlines.
