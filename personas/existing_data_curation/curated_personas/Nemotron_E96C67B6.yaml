personas:
  professional: Alexis Duffie, a veteran librarian with a business graduate background, leverages her expertise in collection development, budgeting, and digital archiving while letting her sociable, slightly
    disorganized nature shine through as she champions community programming and innovative RFID checkout systems, often juggling grant proposals with impromptu book‑club discussions.
  sports: Alexis Duffie enjoys weekend hikes on the Blue Ridge trails, participates in a local senior hiking club, cheers for the Arkansas Razorbacks during football season, and maintains a low‑key fitness
    routine centered around yoga classes at the community center and occasional pick‑up games of pickleball with neighbors.
  arts: Alexis Duffie actively engages with Appalachian folk culture, performing at the annual festival alongside musicians like Sarah White, curates a rotating book‑club selection featuring authors such
    as Toni Morrison and James Baldwin, and finds inspiration from visual artists like Andrew Wyeth to fuel her photography of seasonal landscapes.
  travel: Alexis Duffie favors relaxed, culturally immersive trips, having explored historic Williamsburg, the coastal towns of Maine, and the Blue Ridge Parkway’s scenic overlooks, while her future bucket
    list includes a literary tour of Dublin and a restorative wellness retreat in Sedona, all planned with a flexible, last‑minute itinerary that mirrors her adaptable personality.
  culinary: Alexis Duffie is an enthusiastic home cook who masters Southern comfort dishes, regularly preparing peach‑glazed chicken thighs, collard greens seasoned with smoked turkey, and pecan pie, often
    experimenting with fresh peach slices, cinnamon, and nutmeg, and she delights in sharing these meals at neighborly potlucks where her signature peach‑infused barbecue sauce earns rave reviews.
  core: Alexis Duffie blends seasoned library leadership with a warm, slightly chaotic charm, juggling grant deadlines, community events, and a love for peach‑spiked recipes while constantly battling the
    worry that she may never quite perfect her work‑life balance.
background:
  cultural: Alexis grew up in a close‑knit Southern town near Cleveland, GA, where hospitality, community ties, and respect for tradition were daily norms. Her family’s modest middle‑class background emphasized
    hard work and self‑reliance, values that later guided her pursuit of a business degree. While she never married, she maintains strong bonds with extended family and local church groups, reflecting the
    region’s emphasis on relational networks. The cultural fabric of White County—steeped in Appalachian heritage, folk music, and a love of storytelling—shapes her appreciation for local history and genealogy.
    At the same time, her education and professional exposure have cultivated a progressive outlook, encouraging her to blend Southern hospitality with innovative library services.
