personas:
  professional: Michael Sharmin is a seasoned project management specialist who channels their meticulous Lean Six Sigma expertise, rigorous risk assessments, and routine-driven discipline into consistently
    delivering multi-million-dollar initiatives on time, while mentoring junior staff with the cooperative, high-standard mindset they value at home.
  sports: Michael Sharmin fuels their fitness regimen with five-mile jogs along the Staten Island shoreline, avidly roots for the New York Mets at Citi Field, participates weekly with the Staten Island
    Runners Club, and squeezes in occasional pickup basketball games at the local YMCA to maintain a balanced, routine-oriented athletic routine.
  arts: Michael Sharmin's artistic palate includes listening to Johann Sebastian Bach's intricate fugues while kneading sourdough, attending occasional off-Broadway productions of classic American dramas,
    collecting vintage Mets memorabilia, and appreciating the storytelling craftsmanship of historian David McCullough's narratives, all of which satisfy their appreciation for structured, timeless creativity.
  travel: Michael Sharmin prefers meticulously planned weekend getaways that blend relaxation with historical immersion, regularly escaping to the Hudson Valley's orchards and the Catskills' snow-capped
    peaks, while dreaming of a future cultural pilgrimage to the historic streets of Boston and the literary museums of London, all within the tight budget and limited time their demanding career affords.
  culinary: Michael Sharmin is a methodical home cook who delights in the precise chemistry of sourdough starter, perfects classic American comfort dishes like buttery chicken pot pie and New England clam
    chowder, and meticulously balances flavors using heirloom tomatoes, sharp cheddar, and a dash of smoked paprika, reflecting their love of measured recipes and predictable culinary success.
  core: Michael Sharmin blends disciplined routine with quiet ambition, channeling their meticulous project-management mindset into every facet of life—from budgeting and jogging to sourdough baking—while
    wrestling with an undercurrent of worry that fuels both relentless preparation and occasional over-control.
background:
  cultural: Michael comes from a white, middle‑class family of Irish and German descent that settled in the New York suburbs. Raised in a modest, Protestant (later culturally secular) household, he grew
    up celebrating traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July, and was taught the values of hard work, self‑reliance, and community service. Living on Staten Island
    has reinforced a blend of suburban pragmatism and the multicultural exposure of nearby New York City, shaping a cultural identity that respects heritage while being comfortable in a diverse urban environment.
