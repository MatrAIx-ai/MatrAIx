  hobbies: '[''Morning jogging along the Staten Island shoreline'',''DIY home improvement projects'',''Community garden volunteering'',''Chess club participation'',''Reading non-fiction (business strategy,
    American history)'',''Crossword and Sudoku puzzles'',''Cooking and baking (structured recipes)'',''Watching New York Mets baseball games'',''Fishing trips with friends'']'
  career_goals: Looking ahead, Michael aims to advance to a senior program manager role and eventually become Director of the Project Management Office within a large corporation. Over the next five years
    he plans to obtain PMP and Lean Six Sigma Black Belt certifications, lead multi‑million‑dollar, cross‑departmental initiatives, and embed systematic process‑excellence frameworks organization‑wide.
    He also wishes to mentor junior project managers, develop a reputation as a go‑to expert for complex risk‑heavy projects, and explore consulting opportunities that allow him to apply his disciplined,
    results‑oriented methodology while maintaining a healthier work‑life balance.
