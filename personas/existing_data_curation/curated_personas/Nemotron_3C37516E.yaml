personas:
  professional: Katherine Parent, a retired elementary school teacher with three decades of curriculum design, lesson planning, and intergenerational mentorship, now channels their structured mindset, public‑speaking
    confidence, and organizational leadership into leading senior‑center reading programs, coordinating volunteer committees, and curating historical walking tours in Saratoga, where they enjoy being the
    center of attention.
  sports: Katherine Parent, an avid fan of the New York Giants and New York Knicks, routinely walks the trails of the Finger Lakes with the Saratoga Senior Walking Club, and they attend summer horse races
    at the Saratoga Race Course, balancing low‑impact cardio with occasional light yoga sessions.
  arts: Katherine Parent, a dedicated community theater volunteer, regularly stages productions of Arthur Miller's "The Crucible" and Meryl Streep's "The Iron Lady", enjoys knitting while listening to folk
    singer Joan Baez, participates in a book club that discusses historical fiction by Ken Follett and Philippa Gregory, and they often lead post‑show discussions.
  travel: Katherine Parent prefers carefully planned road trips that blend historic sightseeing with leisurely stays, having explored colonial Williamsburg, the Hudson Valley vineyards, and recently the
    historic towns of the English Cotswolds, while they still dream of walking the Roman ruins of Bath.
  culinary: Katherine Parent delights in cooking classic New England dishes—such as New England clam chowder, baked haddock with herb butter from their garden’s rosemary and thyme, and apple crumble—while
    they often host family gatherings where they showcase their signature herbed roasted chicken and seasonal vegetable medleys.
  core: Katherine Parent is a structured yet sociable 69‑year‑old who blends meticulous organization, a love for community storytelling, and a gentle, resilient demeanor into a life of teaching, gardening,
    and intergenerational connection, and they thrive on bringing people together.
background:
  cultural: Katherine comes from a white, middle‑class Northeastern American background with German and Irish ancestry. She was raised in a small town near Albany, New York, in a family that valued education,
    community service, and participation in local traditions. After moving to Saratoga Springs for her teaching career, she embraced the city’s cultural life, including the annual horse racing season, the
    Saratoga Performing Arts Center concerts, and historic preservation efforts. Raised in a mainline Protestant congregation, she internalized values of compassion, responsibility, and civic engagement,
    which continue to shape her pragmatic, organized approach to life and her dedication to community involvement.
