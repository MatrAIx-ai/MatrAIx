  hobbies: '[''Gardening'', ''Bridge'', ''Book club'', ''Community theater'', ''Attending horse racing'', ''Knitting'', ''Cooking'', ''Nature photography'', ''Volunteering at senior center'', ''Historical
    walking tours'']'
  career_goals: Katherine aims to translate her lifelong teaching experience into lasting community impact. She plans to develop and lead an intergenerational reading program at the local senior center,
    serve as a volunteer docent at the Saratoga Springs History Museum, and chair the town’s volunteer‑coordination committee. She also hopes to author a memoir that weaves together her classroom stories
    with Saratoga’s local history, and to serve on the advisory panel of the Saratoga school district to help shape curriculum decisions. Ultimately, she wants to create structured, inclusive events that
    bring residents of all ages together while preserving the cultural heritage of her hometown.
