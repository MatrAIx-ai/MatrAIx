  career_goals: Guided by his curiosity and practical nature, Gabriel aims to preserve and share Kansas City’s heritage while remaining actively involved in his community. Over the next few years he plans
    to write and self‑publish a memoir chronicling post‑war Midwestern life, and to curate a rotating exhibit for the local historical society that highlights the city’s architectural evolution. He intends
    to launch a mentorship program pairing high‑school students with senior volunteers for research projects in humanities, and to deliver a weekly lecture series titled “History & Lessons for Today” at
    community centers. Gabriel also seeks a seat on the city’s planning advisory board to advocate for historic preservation, while maintaining his health through regular walking and participating in senior‑center
    competitive bridge tournaments.
