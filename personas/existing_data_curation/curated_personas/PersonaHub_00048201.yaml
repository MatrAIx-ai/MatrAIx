persona_description: A scientist who studies the impact of feeding and fasting on circadian gene expression in the liver, specifically focusing on how rhythmic food intake exerts a significant influence
  over the hepatic circadian oscillator. The scientist is interested in how the liver oscillator helps the organism adapt to a daily pattern of food availability by temporally tuning the activity of thousands
  of genes regulating metabolism and physiology, and how the absence of a robust circadian clock predisposes the organism to various metabolic dysfunctions and diseases.
