  hobbies: '["Early-morning running", "Urban gardening", "Cooking traditional Mexican cuisine", "Reading leadership and personal-development non-fiction", "Hiking in Lake County parks", "Volunteering as
    youth mentor at community center"]'
  career_goals: Aldemar aims to advance to a regional sales director position within the next five years, overseeing multiple market territories across the Midwest. He plans to deepen his expertise in data
    analytics and digital sales tools to drive higher efficiency and measurable growth. Long-term, he envisions establishing his own consultancy that assists mid-size companies in building structured, high-performing
    sales operations. He is also committed to completing his Bachelor's degree in Business Administration to formalize his practical knowledge.
