  hobbies: '[''Reading (non-fiction)'', ''Yoga'', ''Gardening'', ''Hiking'', ''Woodworking'', ''Logic Puzzles'', ''Crossword Puzzles'', ''Tutoring'']'
  career_goals: She aims to advance to a leadership role within the college, such as program director or department chair, where she can shape curriculum policy and mentor faculty. She plans to pursue a
    master's degree in Educational Leadership within the next two years, and eventually a doctorate focusing on evidence‑based teaching practices. She aspires to secure research funding to study the impact
    of structured competency‑based learning on student retention, and to develop a suite of online courses that can be scaled across the state. Her competitive drive pushes her to achieve measurable improvements
    in student outcomes and to be recognized as a thought leader in higher education pedagogy.
