personas:
  professional: Tiffani Zeitoun, an educational curriculum specialist who designs evidence‑based undergraduate and graduate modules, integrates instructional technology, and leads data‑driven academic advising,
    channels their structured, competitive nature and meticulous project‑management skills to drive measurable student success and position themselves for future department‑chair leadership.
  sports: Tiffani Zeitoun, an avid hiker who explores the rolling Iowa prairies on weekends with a close friend and holds membership in the Iowa Prairie Hiking Club, channels the same disciplined mindset
    into supporting the Iowa Hawkeyes football team and the Iowa Wolves basketball franchise, while occasionally joining a local co‑ed recreational tennis league for structured cardio.
  arts: Tiffani Zeitoun, a lover of structured creative pursuits, spends evenings solving crosswords and crafting wooden furniture while listening to minimalist composer Philip Glass and folk singer‑songwriter
    Sufjan Stevens, and regularly attends intimate performances at the Des Moines Playhouse featuring works by playwrights such as David Mamet, blending analytical mind with artistic appreciation.
  travel: Tiffani Zeitoun, a meticulous planner who maps out trips in detailed spreadsheets, prefers small‑group, low‑key getaways and has explored nearby cities such as Chicago and Madison, while dreaming
    of structured cultural tours of Edinburgh and Kyoto and a solo hike through Yellowstone’s geyser basins, balancing wanderlust with budget constraints.
  culinary: Tiffani Zeitoun, a competent home cook who favors farm‑to‑table vegetarian meals like roasted beet and quinoa bowls seasoned with rosemary and thyme, enjoys baking sourdough bread on weekends,
    and treats themselves to Wisconsin artisanal cheese and a splash of espresso at a local café, while occasionally over‑seasoning dishes in pursuit of the perfect flavor balance.
  core: Tiffani Zeitoun, a fundamentally structured and competitively driven curriculum designer who balances solitary intellectual pursuits with small‑group collaboration, leverages yoga and gardening
    for stress relief, and relentlessly optimizes both her professional impact and personal routines.
background:
  cultural: Tiffani was raised in a small Midwestern town in Iowa, where community cooperation and self‑reliance are valued. Her family’s cultural heritage is rooted in the broader Anglo‑American traditions
    of the region, emphasizing practicality, modesty, and a respect for routine. Growing up in a predominantly white, rural environment, she developed an appreciation for seasonal cycles, agricultural events,
    and local fairs. Her educational pursuits introduced her to diverse perspectives, but her core cultural identity remains shaped by Midwestern values of hard work, punctuality, and a balanced approach
    between tradition and innovation.
