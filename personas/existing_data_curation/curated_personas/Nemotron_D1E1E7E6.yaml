  hobbies: '[''Hiking in the Appalachians'', ''Nature photography'', ''Sketching and watercolor painting'', ''Visiting local art galleries and folk‑art fairs'', ''Volunteering at community center (DIY workshops)'',
    ''Neighborhood clean‑up events'', ''Knitting Appalachian patterns'', ''Playing banjo in a bluegrass jam group'']'
  career_goals: Nicole aims to advance from laborer to foreperson within the next three years, leveraging her associate’s degree to take on supervisory responsibilities. She plans to obtain a bachelor’s
    degree in construction management or a related field, with a focus on sustainable building practices and community‑focused projects. Long‑term, she envisions founding her own small contracting firm
    that emphasizes environmentally friendly construction, integrates local Appalachian craftsmanship, and provides apprenticeship opportunities for youth in her community.
