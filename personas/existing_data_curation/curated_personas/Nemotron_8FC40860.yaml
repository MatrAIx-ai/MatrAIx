personas:
  professional: Maximiliano Cruz, a seasoned radiologic technologist with over three decades mastering X‑ray, CT, and mammography, blends meticulous radiation safety with a calm, mentorship‑focused style,
    translating complex imaging procedures into clear guidance for junior staff while quietly pursuing advanced MRI certification.
  sports: Maximiliano Cruz, an avid follower of international soccer, never misses a match of the Central American national team and roots for the local MLS club Houston Dynamo, while also participating
    in a weekly senior walking club and enjoying occasional rounds of golf at the city’s municipal course.
  arts: Maximiliano Cruz, a quiet devotee of the arts, spends weekends painting watercolor landscapes that fuse highland vistas with Texas prairies, draws inspiration from the works of Diego Rivera and
    Charles Umlauf at the Houston Museum of Fine Arts, and records classical guitar by Andrés Segovia and traditional marimba rhythms while capturing street‑level festival photographs for his personal archive.
  travel: Maximiliano Cruz, a reflective traveler who prefers thoughtfully planned trips, has journeyed to the mountain lakes of Central America, explored the wine‑rich Hill Country of Texas, visited the
    historic streets of Santa Fe, and dreams of strolling the ancient plazas of Barcelona, balancing family visits with solitary weekend getaways.
  culinary: Maximiliano Cruz, a home‑cooking enthusiast, regularly prepares pepian stew and chiles rellenos using fresh herbs like cilantro and oregano from his garden, pairs meals with homemade salsa verde,
    and delights in experimenting with corn masa for handmade tortillas while occasionally treating himself to a cup of locally roasted coffee.
  core: Maximiliano Cruz, a diligent radiology veteran who harmonizes meticulous precision with quiet artistic curiosity, balances disciplined health routines with occasional indulgences, and nurtures community
    ties through cultural traditions and mentorship.
background:
  cultural: Born to Guatemalan immigrants, Maximiliano grew up bilingual, speaking Spanish at home while learning English at school. His family maintains strong ties to Catholic traditions, celebrating
    Holy Week processions and Día de los Muertos with the local Guatemalan community in Houston. Family gatherings revolve around shared meals, music, and storytelling that keep his heritage alive. He values
    the emphasis on close‑knit extended families, mutual respect, and hospitality, which shape his compassionate approach to patient care and community involvement.
attributes:
  skills: '[''X‑ray operation'', ''CT scanning'', ''Mammography'', ''Radiation safety compliance'', ''Patient positioning and communication'', ''Equipment maintenance and troubleshooting'', ''Digital image
    processing (PACS)'', ''Quality assurance and regulatory compliance'', ''Basic anatomy and pathology interpretation'', ''Mentoring and training of junior staff'']'
  hobbies: '[''Watercolor painting'', ''Visiting art museums'', ''Cooking Guatemalan cuisine'', ''Gardening (herbs and succulents)'', ''Street photography'', ''Listening to classical guitar and marimba
    music'', ''Following Guatemalan soccer'', ''Participating in community cultural festivals'']'
  career_goals: Looking ahead, Maximiliano aims to earn formal ARRT certification in advanced modalities such as MRI to broaden his technical repertoire. He envisions transitioning into a part‑time supervisory
    role that lets him share his extensive knowledge with younger colleagues while preserving a flexible schedule for family and personal pursuits. Additionally, he hopes to volunteer his imaging expertise
    at community health fairs serving Houston’s Hispanic neighborhoods, ensuring culturally sensitive care for underserved patients.
