personas:
  professional: Jessica Leggett is a budding elementary teacher who blends a solid grounding in education theory with a curiosity-driven mindset, designing tech-enhanced lesson plans that balance innovative
    projects and proven strategies, managing classroom logistics with organized precision yet remaining flexible when surprises arise, and they often double-check curricula for alignment with standards
    despite a lingering worry about achieving perfection.
  sports: Jessica Leggett follows the Denver Broncos, Colorado Avalanche, and Colorado Rockies with fervent weekend watch parties, participates in the Denver Mountain Club for seasonal hikes, and runs with
    a local trail-running group at Clear Creek Canyon, merging competitive fandom with an active love for the outdoors, and they often log their miles in Strava.
  arts: Jessica Leggett expresses their creative side through photography inspired by Ansel Adams, curates a reading list featuring Sally Rooney and Maya Angelou, enjoys the soothing melodies of Sufjan
    Stevens while baking bread, and they regularly host board-game evenings with Settlers of Catan and Ticket to Ride, blending visual art, literature, and music into daily life.
  travel: Jessica Leggett favors adventure-laden trips to Rocky Mountain National Park, Yellowstone, and Banff on long weekends, dreams of hiking the Milford Track on New Zealand’s South Island, and they
    often arrange road-trip getaways to Portland and Asheville with friends, balancing a love for spectacular scenery with careful budgeting to accommodate their teaching stipend.
  culinary: Jessica Leggett, an intermediate self-taught baker, delights in crafting sourdough loaves and rosemary-infused focaccia, pairs them with quinoa-and-avocado salads garnished with wild garlic,
    and they regularly share these artisanal creations at board-game nights alongside craft beers and locally sourced cheese plates.
  core: Jessica Leggett is a nature-inspired, anxiety-prone future teacher who balances meticulous lesson planning with spontaneous hikes, artisanal baking, and a relentless quest for personal growth, and
    they often week-end with yoga, photography, and budget-tweaking.
background:
  cultural: Jessica identifies as a White American with deep roots in the Denver metropolitan area. Her family cultivated a middle‑class, education‑focused upbringing, emphasizing individual responsibility,
    community involvement, and a love for the outdoors—values reflected in Colorado's culture. She grew up attending public schools that celebrated diversity, which broadened her awareness of different
    perspectives while still grounding her in mainstream Anglo‑American traditions. The vibrant, progressive atmosphere of Denver has exposed her to a variety of cultural events, artistic scenes, and social
    initiatives, influencing her openness to new ideas and her desire to contribute positively to the community.
attributes:
  skills: '[''Lesson Planning'', ''Curriculum Development'', ''Classroom Management'', ''Differentiated Instruction'', ''Instructional Technology Integration'', ''Assessment Design'', ''Effective Communication'',
    ''Collaborative Teamwork'', ''Time Management'', ''Adaptability'']'
  hobbies: '[''Hiking'', ''Reading (fiction & educational non‑fiction)'', ''Photography'', ''Yoga'', ''Mindfulness Meditation'', ''Volunteering at a literacy program'', ''Baking'', ''Board‑game evenings'']'
  career_goals: Jessica aims to secure a full‑time elementary teaching position within the next year, preferably in a school that values innovative pedagogy and supports teacher wellbeing. She plans to
    pursue a state teaching credential and obtain additional training in educational technology to blend curiosity-driven projects with practical classroom outcomes. Long‑term, she envisions evolving into
    a curriculum specialist or instructional coach, where she can influence broader school practices and mentor younger teachers. Her ambition includes developing a community‑based after‑school program
    that offers tutoring and creative workshops for at‑risk youth, reflecting her desire to balance compassion with self‑interest while managing financial stability.
