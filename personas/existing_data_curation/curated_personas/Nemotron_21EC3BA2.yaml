  hobbies: '[''Abstract watercolor painting'', ''Visiting contemporary art galleries'', ''Collecting surrealist prints'', ''Reading speculative fiction and philosophy'', ''Yoga and mindfulness meditation'',
    ''Daily journaling'', ''Playing ukulele'', ''Cooking experimental dishes'', ''Volunteering at community art programs'']'
  career_goals: She aims to earn her Certified Financial Planner (CFP) designation within the next two years and eventually attain the Chartered Financial Analyst (CFA) charter. Nadia’s long‑term ambition
    is to launch a boutique advisory firm that specializes in serving creative professionals and art collectors, offering a blend of traditional wealth management and bespoke artistic‑asset advisory. She
    also hopes to develop a series of workshops that combine financial literacy with mindfulness techniques, helping clients manage both financial stress and emotional well‑being.
