persona_description: A constitutional theorist and historian who is interested in the history of the Palace of Westminster, particularly the development of the Central Lobby and its role in the political
  centre of the British Empire. They are knowledgeable about the various panels and frescoes in the Central Lobby, as well as the architectural design and history of the Palace of Westminster. They are
  also interested in the role of the Central Lobby in the process of lobbying and the importance of the Speaker's Procession.
