  hobbies: '[''Reading (Historical Fiction, Genealogy)'', ''Gardening'', ''Knitting/Crocheting'', ''Senior Fitness Walks'', ''Community Dance Nights'', ''Computer Classes'', ''Volunteering at Food Pantry'',
