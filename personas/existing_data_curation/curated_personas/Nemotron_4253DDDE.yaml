personas:
  professional: Safraz Sitjar, a budding three-year-old engineer-in-training, meticulously arranges building blocks into precise structures, plans each tower ahead of time, and faithfully follows through
    on completing each design, showing how they balance curiosity and practicality with methodical organization.
  sports: Safraz Sitjar, a tiny fan of the Manchester United soccer club, they attend weekly toddler soccer sessions with the Little Kickers club, delighted by short, high-energy games on the grass and
    eagerly watching Premier League matches on family TV nights.
  arts: Safraz Sitjar, who adores the whimsical tunes of Disney's 'Let It Go' and the bright illustrations of Dr Seuss, they spend afternoons drawing colorful characters while humming along to the songs
    and occasionally mimicking the playful voices of Sesame Street's Elmo.
  travel: Safraz Sitjar, after a memorable family trip to the San Diego Zoo, they dream of feeling the gentle waves on Maui's beaches and marveling at the Eiffel Tower's sparkle, preferring short, well-planned
    outings that include familiar toys, a structured schedule, and plenty of nap time.
  culinary: Safraz Sitjar, who barely reaches the kitchen counter, is already a connoisseur of cheddar-rich macaroni and cheese, loves the crisp crunch of carrot sticks, and insists on sprinkling extra
    ketchup on their chicken nuggets, though they occasionally forget to chew properly.
  core: Safraz Sitjar, a methodical three-year-old with a curious mind and a penchant for solitary play, they balance quiet observation with occasional decisive bursts of assertiveness, often lining up
    blocks and counting each piece before building.
background:
  cultural: Safraz is a White American child raised in Chester Springs, a suburban community in Chester County, Pennsylvania. His family participates in typical American cultural traditions such as Thanksgiving,
