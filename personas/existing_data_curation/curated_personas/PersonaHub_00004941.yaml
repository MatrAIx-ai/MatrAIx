persona_description: A senior government official or policy advisor who is responsible for overseeing the implementation of the United Nations 2030 Agenda for Sustainable Development and has a particular
  interest in using Earth observation data to support national efforts towards achieving the SDGs. This individual is familiar with the context and challenges faced by countries in implementing the SDGs
  and has a strong background in statistics, data management, and policy development. They are actively engaged in the development of national statistical frameworks and the use of geospatial data to support
  sustainable development. This person is also interested in the potential of satellite-based Earth observation data to address sustainable development challenges at global, regional, national, and sub-national
  levels.
