  career_goals: Although retired from formal employment, Roxanne remains driven to enrich her community and personal life. She aims to expand the local senior center’s activity program, mentor younger volunteers,
    and launch a neighborhood garden that provides fresh produce and a gathering space. She also hopes to document and share the oral histories of long‑time Columbus residents, possibly compiling them into
    a community memoir. Continuing her own learning, Roxanne plans to take a short course on digital photography and explore genealogy to trace her family’s roots in the Midwest.
