personas:
  professional: Roxanne Christiano, a retired community organizer turned senior-center program director, leverages meticulous budgeting, charismatic event planning, and a love of intergenerational mentorship
    to expand local volunteer initiatives, all while keeping a lively, talkative presence that turns every meeting into a community celebration.
  sports: Roxanne Christiano stays active by attending senior-center dance classes, walking the county park for birdwatching, and joining a weekly bowling league at the local recreation center, while cheering
    on the Columbus Crew and the Ohio State Buckeyes during soccer and football seasons.
  arts: Roxanne Christiano revives her creative spark through quilting circles featuring designs inspired by Georgia O'Keeffe's floral paintings, enjoys listening to Ella Fitzgerald and the folk tunes of
    Joan Baez while crocheting, and attends the Columbus Symphony Orchestra's classic concerts whenever possible.
  travel: Roxanne Christiano prefers low-key road trips to historic small towns like Lancaster, PA and Bloomington, IN, dreams of tracing family roots in Dublin, Ireland, and cherishes past weekend getaways
    to the Ohio Lake Erie shoreline for sunsets and fresh fish.
  culinary: Roxanne Christiano delights in seasonal cooking, perfecting dishes such as rosemary-infused roasted carrots, kale-and-quinoa salad with pomegranate seeds, and her signature apple-cranberry crumble,
    while often sourcing heirloom tomatoes and fresh basil from her own garden.
  core: Roxanne Christiano is a garden-loving, talkative retiree who turns every community event into a storytelling fest, occasionally hoards quilting yarn like a treasure, and never says no to a fresh
    potluck invitation.
background:
  cultural: Roxanne was raised in a Midwestern white American family with deep roots in Indiana, tracing ancestry back to German and Irish immigrants who settled the region in the late 19th century. Her
    upbringing in a close‑knit, Protestant (Methodist) community emphasized modesty, hard work, and service to neighbors. The cultural fabric of Columbus, IN—characterized by small‑town values, strong church
    involvement, and a tradition of community festivals—has shaped her outlook, fostering an appreciation for both heritage and the shared experiences of her neighbors.
