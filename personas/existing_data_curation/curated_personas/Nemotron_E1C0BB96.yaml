  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Reading financial history nonfiction'', ''Quilting'', ''Hiking'', ''Yoga'', ''Mindfulness meditation'', ''Volunteering at local food bank'',
    ''Participating in book club'', ''Cooking Southern recipes'', ''Experimenting with new culinary techniques'']'
  career_goals: Sonia aims to ascend to a chief financial officer role within the next five years, leveraging her curiosity about fintech to integrate digital financial tools while preserving rigorous risk
    controls. She seeks to earn professional credentials such as the CPA or CFA to complement her extensive practical experience, despite not holding a college degree. Mentoring junior staff—particularly
    women entering finance—is a core ambition, as is building a reputation as a top performer, evidenced by target awards like "Finance Leader of the Year." Long-term, she envisions transitioning to independent
    consulting for small businesses in Chester County, providing personalized financial advisory services that blend traditional accounting practices with innovative technology, thereby securing personal
    financial stability to support her late husband’s family and manage her own anxiety.
