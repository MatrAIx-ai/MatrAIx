  hobbies: '["abstract sketching", "acrylic painting", "classical guitar playing", "maker space tinkering", "hiking and nature photography", "cooking Colombian cuisine", "collecting vintage woodworking
    tools", "reading design theory", "attending craft fairs", "playing strategy board games"]'
  career_goals: Carlos aims to transform his passion for imaginative woodwork into a boutique workshop in Charlotte that fuses contemporary design with Colombian cultural motifs. Over the next five years
    he plans to earn a journeyman certification, acquire a CNC router, and launch a limited‑edition line of hand‑crafted furniture that showcases abstract forms and vibrant inlays. He seeks to build a reputation
    among design‑savvy clients, participate in regional craft fairs, and eventually mentor apprentices who share his competitive drive for artistic excellence. Long‑term, he envisions a small collaborative
    studio that produces socially responsible pieces, possibly expanding into sustainable housing components that reflect his curiosity about novel building materials.
