personas:
  professional: Carlos Robles, a 34-year-old master carpenter and wood artist, combines precise joinery with bold abstract designs, translating hand‑sketched concepts into functional furniture while juggling
    a spontaneous workflow that often clashes with strict deadlines, which they try to manage through improvisation.
  sports: Carlos Robles enjoys weekend hikes in the Blue Ridge foothills and occasional trail runs, follows the Charlotte FC soccer team and the Carolina Hurricanes, but they prefer solitary outdoor pursuits
    over structured gym routines, often missing scheduled fitness classes.
  arts: Carlos Robles channels a vivid visual palate into acrylic paintings reminiscent of street‑art pigment bursts, sketches fluid abstracts for furniture motifs, and plays classical guitar repertoire
    from Segovia to Paco de Lucía, drawing inspiration from artists like Banksy and Kehinde Wiley, which they meld into each piece.
  travel: Carlos Robles seeks inspiration through short trips to Asheville’s art districts, plans a future pilgrimage to Patagonia’s glacial trails, and dreams of soaking up the historic architecture of
    Spain’s Valencia, balancing limited vacation days with a desire for bold cultural immersion, which they pursue whenever possible.
  culinary: Carlos Robles cooks traditional dishes such as ajiaco and empanadas, relishes the aroma of guasca and cumin, experiments by adding reclaimed‑wood smoked paprika to sauces, and views the kitchen
    as another studio for color and texture play, which they approach with the same experimental zeal as their woodwork.
  core: Carlos Robles merges a restless creative spark with a toolbox‑filled soul, allowing spontaneous art projects to dominate their life while wrestling with a chronic backlog of unfinished sketches
    and the occasional impulsive splurge.
background:
  cultural: Carlos grew up in a Colombian immigrant household where Spanish was spoken daily and family gatherings featured music, dance, and hearty meals. The rhythms of cumbia and vallenato shaped his
    musical tastes, while the vibrant colors of Colombian street festivals sparked his visual imagination. Although he was raised in Charlotte, he maintains strong ties to his heritage by celebrating holidays
    such as Día de las Velitas and by preparing traditional foods with his mother. This bicultural experience blends the warmth and communal spirit of Colombian culture with the Southern hospitality and
    work ethic of North Carolina, giving him a unique perspective that he channels into his woodworking art.
attributes:
  skills: '["custom furniture fabrication", "artistic wood sculpture", "hand tool mastery", "power tool operation", "CNC routing", "bilingual communication (Spanish/English)", "material sourcing and sustainability",
