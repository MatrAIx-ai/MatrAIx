  hobbies: '["Woodworking", "Furniture restoration", "Gardening", "Fishing", "Listening to R&B/gospel/blues music", "Participating in church fellowship", "Community clean-up volunteering", "Reading about
    construction technology", "Local history reading"]'
  career_goals: James aims to transition from laborer to crew foreman within the next three years by completing a certified construction supervisor program and obtaining a state‑issued trade license. He
    envisions one day launching his own modest residential remodeling business focused on reliable, quality‑first service for neighbors in Wilson County. Alongside professional advancement, he wants to
    mentor younger workers and contribute to community housing improvement projects.
