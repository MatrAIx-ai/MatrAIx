personas:
  professional: James Brown is a seasoned construction veteran with over two decades of hands‑on expertise in residential and small‑scale commercial projects, and they leverage OSHA‑10 certification, blueprint
    reading, and crew coordination to deliver code‑compliant remodels while mentoring apprentices and eyeing a foreman role within three years.
  sports: James Brown is an avid early‑morning fisherman who belongs to the Wilson County Anglers Club, follows the Tennessee Titans football team, enjoys weekend pick‑up basketball at their church gym,
    and they also support the Nashville Predators hockey club, balancing their love for the outdoors with occasional light cardio on the lake dock.
  arts: James Brown unwinds by spinning classic R&B, gospel, and blues vinyl records from artists like Otis Redding, Aretha Franklin, and B.B. King, and they regularly attend the local church choir rehearsals
    and the annual downtown blues festival, while curating a modest collection of mid‑century modern furniture that reflects their appreciation for craftsmanship and design.
  travel: James Brown prefers road‑trip getaways to historic towns such as Asheville and Savannah, plans fishing excursions to Florida’s Keys during tarpon season, and they dream of a cabin retreat in the
    Great Smoky Mountains, balancing careful budgeting with a desire for both adventure and relaxation.
  culinary: James Brown loves cooking farm‑to‑table meals, often preparing grilled snapper caught on their morning fishing trips seasoned with lemon and herbs, paired with garden‑fresh roasted vegetables
    like sweet potatoes and collard greens, and they savor their signature cornbread topped with honey butter, though they occasionally over‑season dishes with their favorite hot sauce.
  core: James Brown approaches life like a meticulously measured construction project—valuing order, preferring quiet mornings on the lake, mentoring apprentices, budgeting every dollar, and they secretly
    hoard vintage wooden knobs while never missing a Sunday gospel service.
background:
  cultural: James grew up in a close‑knit African‑American community in the rural‑suburban outskirts of Wilson, NC. Family gatherings, church life, and neighborhood solidarity shaped his values of hard
    work, mutual support, and resilience. He was raised on Southern soul food, gospel music, and the storytelling traditions of the Black South, which fostered his appreciation for community harmony and
    cooperative effort. These cultural roots influence his work ethic, his preference for small‑group interactions, and his commitment to giving back through mentorship and local service.
attributes:
  skills: '["Concrete forming", "Framing and carpentry", "Power tool operation", "OSHA safety compliance", "Blueprint reading", "Material inventory management", "Heavy equipment operation (forklift)", "Team
