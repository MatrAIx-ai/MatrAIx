persona_description: A policy expert and advocate for education reform who is critical of the Common Core standards and believes they are being imposed on states without adequate consideration or input.
  This person is particularly concerned about the potential for gaming the system, the lack of commitment from states to fully adopt the standards, and the potential for negative impacts on school improvement
  and teacher evaluations. They are also skeptical of the federal government's role in education and believe that the Common Core is an example of how the federal government can exert undue influence over
  education policy.
