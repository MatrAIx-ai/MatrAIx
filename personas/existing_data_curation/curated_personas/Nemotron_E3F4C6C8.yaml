personas:
  professional: Gina Childers is a budding preschool organizer who meticulously lines up blocks by color and shape before anyone else, demonstrating a practical, structured mindset and a quiet, competitive
    streak even at three, and they take pride in keeping the play area tidy.
  sports: Gina Childers, a quiet participant in the Tiny Tykes Soccer Club, prefers the defensive role and keeps a meticulous tally of LA Galaxy scores on a handheld tablet, thriving on structured drills
    and a competitive edge while avoiding chaotic free play.
  arts: Gina Childers, an avid fan of The Wiggles, spends quiet afternoons humming familiar tunes while filling sketchbooks with neat circles and stick figures, preferring repetitive, predictable patterns
    that satisfy their need for order and quietly competing with themselves to perfect each drawing.
  travel: Gina Childers, a cautious little explorer, prefers family road trips to quiet beach towns like Cape Cod, packs a small travel journal to draw stick‑figure maps, and they cherish the predictability
    of familiar routines while traveling, quietly noting each new sight without overwhelming social interaction.
  culinary: Gina Childers, a picky eater, loves the predictable comfort of macaroni‑and‑cheese with a dash of cheddar, enjoys arranging carrot sticks and sweet potato cubes into tidy sections on their plate,
    and they rarely stray from these familiar flavors, demonstrating a disciplined palate.
  core: Gina Childers, a three‑year‑old who thrives on order, solitude, and tiny successes, lines up crayons before drawing, saves each coin in a disciplined piggy bank, and rarely shows stress.
background:
  cultural: Gina is raised in a white, Southern-American family in Summerville, South Carolina. Her household reflects regional customs such as polite greetings, occasional church attendance, and celebrating
    local holidays like the Fourth of July with family barbecues. The family places a strong emphasis on routine, quiet family time, and preserving Southern hospitality, which aligns with Gina's preference
    for predictable, low-stimulus environments.
