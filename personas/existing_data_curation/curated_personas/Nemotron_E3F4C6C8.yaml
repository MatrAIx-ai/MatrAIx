  career_goals: Gina imagines herself in structured, helping-oriented roles. She pretends to be a teacher who organizes classroom shelves, a librarian who arranges books by color, and a veterinarian who
    cares for calm animals. She also dreams of being the fastest runner in preschool, reflecting her competitive nature. Her aspirations are shaped by a love of order and predictability.
