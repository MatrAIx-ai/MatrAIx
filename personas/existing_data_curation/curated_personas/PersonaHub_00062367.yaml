persona_description: A linguist who specializes in the study of Austronesian languages and particularly the Ngatikese Men's Language, which is a dialect of the Ponapean language spoken on the island of
  Ngatik in Micronesia. He is interested in the history and evolution of the language, its use among men engaged in male domain activities, and its unique features compared to other pidgins of the region.
  He is also interested in the impact of the island's history and culture on the language and its speakers.
