persona_description: A medical researcher and scientist who specialized in high-altitude/low-pressure experiments and the development of methods for warming German pilots who had been forced down in the
  North Sea and suffered hypothermia. He conducted experiments on human subjects at Dachau concentration camp, including the "freezing experiments" on behalf of the Luftwaffe, and was eager to obtain the
  academic credentials necessary for a high-level university position. His research interests included the effects of high-altitude/low-pressure conditions on human physiology, and the development of methods
  for warming human subjects who had suffered hypothermia.
