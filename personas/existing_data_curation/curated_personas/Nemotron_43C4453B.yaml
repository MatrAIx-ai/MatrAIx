personas:
  professional: Felica Brown, an aspiring teenage mystery writer who blends methodical research with vivid imagination, channels their curiosity and organized nature into detailed plot outlines, volunteers
    at the community library to refine storytelling skills, and they often draft intricate clues while helping younger readers discover new books.
  sports: Felica Brown, a modest fan of the Macon Tigers high school football team and an enthusiastic supporter of the Georgia Bulldogs during the fall season, spends Saturdays cheering at games, joins
    the school’s cross‑country club for early‑morning runs, and they enjoy weekend hikes at Amicalola Falls State Park, where they occasionally volunteer as a trail clean‑up crew.
  arts: Felica Brown, a quiet creative who spends afternoons painting delicate watercolors inspired by Monet’s lily pads, strums gentle acoustic renditions of John Mayer and Bob Dylan songs, immerses themselves
    in mystery novels by Agatha Christie and sci‑fi classics by Isaac Asimov, and they often discuss favorite passages with the community library’s book club.
  travel: Felica Brown, an adventure‑curious teen who prefers thoughtfully planned road trips over spontaneous outings, has explored historic Savannah’s cobblestone squares, camped in the Great Smoky Mountains
    during a school field trip, and they dream of visiting the Appalachian Trail’s high peaks, all while balancing travel costs with a part‑time babysitting gig.
  culinary: Felica Brown, a budding home cook with a penchant for Southern comfort flavors, enjoys baking peach cobbler with fresh garden peaches, perfecting crispy fried green tomatoes, experimenting with
    honey‑glazed carrots, and they keep meals simple yet heartfelt despite modest kitchen skills.
  core: Felica Brown combines methodical curiosity with Southern‑rooted modesty, turning solitary puzzles and creative pursuits into disciplined growth, while they occasionally slip into late‑night snack
    binges and a stubborn reluctance to join large crowds.
background:
  cultural: Felicia was raised in a middle‑class White family in Macon, Georgia, where Southern traditions blend with modern suburban life. Her family attends a local Methodist church, and community events
    such as county fairs, high‑school football games, and church picnics have shaped her sense of fellowship and modesty. Southern hospitality and a respect for tradition are part of her upbringing, while
    an emphasis on education and practical achievement reflects her parents' values. She enjoys regional comforts like peach cobbler and learns from the region's strong emphasis on self‑reliance, which
    complements her organized, methodical personality.
attributes:
  skills: '[''Organizational planning'', ''Detailed note‑taking'', ''Research and information synthesis'', ''Basic computer literacy (Google Workspace, Microsoft Office)'', ''Introductory Python coding'',
