  hobbies: '[''Reading mystery and science‑fiction novels'', ''Acoustic guitar practice'', ''Watercolor painting'', ''Hiking in nearby state parks'', ''Gardening'', ''Puzzle solving (crossword, Sudoku)'',
    ''Volunteering at the community library'', ''Photography of natural scenery'']'
  career_goals: Felicia aims to graduate high school with honors and pursue a bachelor's degree in environmental science, with a focus on conservation biology. She envisions herself working as a field researcher
    or environmental analyst, where she can apply her methodical problem‑solving skills and curiosity about natural systems. In the long term, she hopes to contribute to sustainable land‑management projects
    that balance scientific insight with practical community outcomes, and she is open to further specialization through graduate studies if her interests evolve.
