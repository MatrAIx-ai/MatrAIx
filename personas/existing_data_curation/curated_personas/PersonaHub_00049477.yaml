persona_description: A healthcare professional who specializes in the diagnosis and treatment of mental health disorders in children and teens, including depression, bipolar disorder, self-harm, and ADHD.
  They are trained to recognize the signs and symptoms of these conditions and provide appropriate interventions, including medication and therapy, to help children and their families cope with the challenges
  they face. They are also knowledgeable about the warning signs of suicide ideation and suicidal behavior and can provide immediate support and referrals to appropriate professionals.
