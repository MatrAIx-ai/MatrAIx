personas:
  professional: Jason Harris, a high‑school sophomore with a natural aptitude for practical engineering, devotes after‑school hours to assembling detailed model airplanes and cars while tinkering with Scratch
    to craft interactive stories, using strategic video games as a mental gym to sharpen planning skills and envisioning a future career in mechanical design.
  sports: Jason Harris, an avid weekend cyclist, explores local trail networks on their mountain bike, belongs to a casual community bike club that meets monthly, and supports the nearby NBA franchise,
    the Denver Nuggets, by watching games when not on the trails.
  arts: Jason Harris draws creative inspiration from the cinematic scores of Hans Zimmer, the intricate storytelling of Alan Moore’s graphic novels, and the pixel‑art aesthetics of classic strategy video
    games, often weaving these influences into their Scratch projects and model‑building designs.
  travel: Jason Harris prefers spontaneous, low‑key weekend trips to nearby state parks for trail riding and visualizes a future pilgrimage to Seattle’s Museum of Flight, planning itineraries around school
    breaks with a flexible schedule that allows last‑minute detours.
  culinary: Jason Harris gravitates toward quick, high‑energy meals such as homemade granola bars, pepperoni pizza, ramen bowls, and occasionally bakes themed cookies shaped like aircraft, but often overlooks
    balanced nutrition when engrossed in marathon gaming sessions.
  core: Jason Harris is a practical, structure‑oriented teenager who channels a love for solitary, tactical hobbies into disciplined model building and strategic gaming, balanced by a relaxed attitude toward
    obligations and occasional disorganized habits.
background:
  cultural: Jason grew up in Fortville, a small Midwestern town in Hamilton County, Indiana. His family’s roots trace back to German and Irish immigrants, and the community reflects typical Midwestern values
    of self‑reliance, modesty, and neighborly support. Local culture emphasizes school sports, county fairs, and church gatherings, shaping his appreciation for small‑group social activities and practical
    work ethic. The region’s agricultural and manufacturing heritage also influences his interest in hands‑on trades and technical skills.
attributes:
  skills: '[''basic bike maintenance'', ''handyman repairs'', ''computer troubleshooting'', ''strategic video game analysis'', ''small-group project coordination'']'
  hobbies: '[''model airplane building'', ''strategy and simulation video gaming'', ''bike riding'', ''basic Scratch programming'', ''reading DIY manuals'', ''tactical board gaming with close friends'']'
  career_goals: Jason aims to complete his high school education and then enroll in a trade program to become a certified automotive technician. He is attracted to careers that offer clear progression steps
    and hands‑on work, such as automotive repair, HVAC servicing, or entry‑level IT support. His long‑term ambition is to open his own small garage where he can combine his mechanical skills with his interest
    in helping friends and neighbors maintain their vehicles. He also considers a possible apprenticeship in the local manufacturing sector as a backup path.
