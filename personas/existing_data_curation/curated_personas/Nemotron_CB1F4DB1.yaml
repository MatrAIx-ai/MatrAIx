  career_goals: Although retired, Briana remains committed to applying her expertise for community benefit. She plans to mentor high-school students in STEM through an after-school program, establish a
    modest scholarship to support women pursuing engineering, and collaborate with the local historical society to document and preserve the region’s engineering heritage. She also aims to author a memoir
    that blends her personal journey with practical advice for disciplined career planning, ensuring her legacy of structure, resilience, and critical thinking endures.
