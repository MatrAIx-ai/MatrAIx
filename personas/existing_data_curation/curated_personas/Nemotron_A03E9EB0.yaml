  hobbies: '[''Reading Louisiana history and genealogy'', ''Crocheting and knitting'', ''Gardening (herbs, vegetables, native plants)'', ''Cooking Cajun cuisine'', ''Participating in small community gatherings
    (church potlucks, quilting circles, zydeco music sessions)'', ''Walking bayou trails'', ''Solving crosswords'', ''Listening to folk and classic radio programs'']'
  career_goals: Star aims to transform her extensive retail experience into a mentoring role by obtaining a Certified Retail Operations Manager credential and offering part‑time training for new cashiers
    in her store. She hopes to secure a stable, modest retirement that allows her to devote more time to volunteer work at the local senior center and to explore opening a small community‑garden supply
    kiosk, where she can combine her love of gardening with her practical business sense. While she values financial security, her primary ambition is to leave a supportive legacy for younger coworkers
    and neighborhood members.
