personas:
  professional: Star Tompkins, a veteran retail cashier with an associate degree and decades of POS mastery, blends precise cash handling with empathetic conflict resolution to mentor new cashiers as they
    work toward a Certified Retail Operations Manager credential, all while flexibly adapting store procedures to meet unexpected customer needs.
  sports: Star Tompkins, a loyal fan of the New Orleans Saints who watches games at a nearby sports bar and occasionally cheers for the New Orleans Pelicans during the basketball season, stays active by
    walking the bayou trails with a senior walking club each weekend and attends gentle yoga sessions at the community center, favoring low-impact fitness over competitive sports.
  arts: Star Tompkins, an enthusiastic crocheter and quilting-circle regular, draws artistic inspiration from the accordion riffs of BeauSoleil and the soulful blues of Clifton Chenier, often translating
    those rhythmic patterns into intricate stitch designs for blankets they donate to charity, while they still enjoy occasional evenings listening to folk radio shows featuring classic storytellers.
  travel: Star Tompkins, a meticulous planner who maps trips on a paper calendar, prefers relaxed road trips to nearby historic towns like Saint Martinville and occasional pilgrimages to the French Quarter
    of New Orleans, dreams of a gentle Mississippi river cruise, and maintains a modest travel fund to afford occasional stays at quaint B&Bs such as The Magnolia House, even though they sometimes postpone
    plans due to worry about health.
  culinary: Star Tompkins, an accomplished home cook who harvests basil, thyme, and tomatoes from her garden to season her signature jambalaya and gumbo, delights in perfecting the balance of cayenne pepper
    and okra, often swapping recipes with her quilting circle, yet occasionally over-spices a pot of étouffée when caught up in crossword puzzles.
  core: Star Tompkins, a quietly resilient 62-year-old who blends meticulous retail expertise with a love for crocheting, garden herbs, and low-key community gatherings, navigates life with a mix of practical
    prudence and gentle curiosity, all while managing worry-driven health routines and a modest, well-planned retirement path.
background:
  cultural: Star grew up in a small, tight‑knit community in Iberia Parish, embodying the Southern hospitality and modesty common to the region. While her family’s heritage is primarily Anglo‑American,
    she has embraced the multicultural spirit of New Iberia, where Cajun and Creole traditions intermingle. She was raised in a Methodist household, attending church regularly, which reinforced values of
    service, cooperation, and respect for others. The local culture—characterized by lively yet intimate festivals, a rich culinary scene, and a strong sense of place along the bayous—has shaped her appreciation
    for community, seasonal food, and storytelling. Her divorce and lifelong independence have further fostered a resilient, self‑reliant outlook, allowing her to balance curiosity about the world with
    the practical, grounded mindset prized in her community.
