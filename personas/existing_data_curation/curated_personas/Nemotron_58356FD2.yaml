personas:
  professional: Don Lash combines his graduate-level expertise in statistical modeling, Python, and SQL with a competitive drive to lead data‑driven projects, positioning himself for a senior analytics
    or consulting role while juggling a boutique consultancy vision and ongoing PMP and AWS certifications.
  sports: Don Lash channels his competitive spirit onto the court and field, playing in a co‑ed basketball league at the West Loop Community Center and a Sunday soccer match with the Lakeview Rovers while
    cheering on the Chicago Bulls and Chicago Fire, and they maintain a disciplined fitness regime that blends high‑intensity interval training with weekend hikes in Starved Rock State Park.
  arts: Don Lash immerses himself in Chicago's vibrant arts scene, attending weekly jazz sets at the Green Mill, catching blues legends at Buddy Guy's Legends, and regularly visiting the Art Institute to
    study modern abstracts, while they also showcase a playful side by hosting trivia nights that often feature obscure music and film references.
  travel: Don Lash prefers meticulously planned road trips that blend outdoor adventure with cultural stops, having recently toured the Great Smoky Mountains and the culinary districts of New Orleans, while
    eyeing a future getaway to the Pacific Northwest's wine country and the tech hubs of Seattle for a blend of relaxation and inspiration.
  culinary: Don Lash, an enthusiastic home chef, delights in recreating Chicago’s deep‑dish pizza and experimenting with global flavors like Korean bibimbap and Mexican street tacos, often using a DIY Arduino‑controlled
    sous‑vide setup, while they also indulge in occasional upscale dining at Alinea to benchmark their own culinary creations.
  core: Don Lash is a data‑driven competitive spirit who balances late‑night trivia marathons with meticulous budgeting, a penchant for DIY electronics, and a stubborn reluctance to delegate, all while
    maintaining a breezy Chicago vibe.
background:
  cultural: Don was raised in a middle‑class family in the Chicago suburbs, descending from German and Irish ancestry. Growing up in a multicultural urban environment, he absorbed Midwestern values of pragmatism,
    hard work, and community involvement, while also embracing Chicago's rich cultural tapestry, from its deep‑dish pizza tradition to its vibrant music scene. He celebrates both St. Patrick's Day and Oktoberfest
    with his family and maintains strong ties to local community organizations, reflecting a blend of heritage and city‑wide cultural influences.
