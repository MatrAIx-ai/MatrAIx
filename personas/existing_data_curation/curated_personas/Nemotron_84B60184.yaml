personas:
  professional: Nicole Guilbaud is an aspiring soccer midfielder who spends after‑school hours honing ball control and tactical drills with her Northville Youth Soccer Club teammates; she approaches the
    sport with a practical, routine‑focused mindset, often organizing informal scrimmages on a set schedule while competitively critiquing opponents' play, and she dreams of one day becoming a youth coach
    who can blend structured training with the spontaneous fun she loves.
  sports: Nicole Guilbaud is a dedicated member of the Northville Youth Soccer Club’s U13 team, playing midfield and idolizing the MLS side Chicago Fire while also following international tournaments like
    the FIFA World Cup; she thrives on competitive drills and weekend matches, yet she often forgets to bring her water bottle and can be disorganized about her soccer gear, reflecting her love for group
    activities paired with a relaxed stance on obligations.
  arts: Nicole Guilbaud delights in diving into adventure series such as J.K. Rowling’s Harry Potter and Rick Riordan’s Percy Jackson, while channeling that imagination into improv skits with the school
    drama club and crafting Minecraft‑inspired dioramas during art periods; she admires actress Zendaya’s versatility and director Peter Jackson’s fantasy world‑building, and she often critiques story plots
    with a skeptical, competitive eye.
  travel: Nicole Guilbaud enjoys day‑trip adventures to the nearby Lake Redwood for kayaking and has visited the historic Freedom Trail in Boston on a school field trip; she longs to camp in Yellowstone
    National Park and hopes to attend the Tokyo Game Show someday, balancing her love for local community events like the Northville Summer Festival with big‑picture travel aspirations constrained by parental
    schedules and school commitments.
  culinary: Nicole Guilbaud cherishes the weekly ritual of baking chocolate chip cookies with her mother, experimenting by adding pretzel bits and a drizzle of caramel, while also favoring pizza with extra
    pepperoni and a side of cheesy garlic breadsticks; her hands‑on approach to cooking reflects her practical nature, though she sometimes over‑indulges in sweet treats after a long gaming session.
  core: Nicole Guilbaud is a routine‑loving, soccer‑obsessed 12‑year‑old who balances a competitive spirit with a sweet tooth, spontaneous Minecraft builds, and a relaxed attitude toward planning and finances.
background:
  cultural: Nicole comes from a white, Midwestern American family in the suburban community of Northville, Michigan. Her upbringing reflects typical Midwestern values of politeness, community involvement,
    and a strong work ethic. Family traditions include celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July with communal meals, local parades, and backyard barbecues. She participates
    in neighborhood activities like the Northville Summer Festival and Little League programs, and she is raised in a household that values both practical skills—like cooking, DIY projects, and basic computer
    use—and social connection. Her cultural environment blends traditional American customs with a modern, tech‑savvy upbringing, giving her a balanced perspective on leisure, responsibility, and personal
    ambition.
