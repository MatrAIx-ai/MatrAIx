  career_goals: Nicole dreams of turning her love for soccer into a professional career. She envisions earning a scholarship to play on a high‑school varsity team, then advancing to collegiate athletics
    and eventually a professional league. She also sees herself staying connected to the sport by coaching youth teams and studying sports science or physical education in college. While her primary ambition
    is athletic, she keeps an eye on other hands‑on, stable careers—such as veterinary medicine or teaching—reflecting her practical side and desire for a reliable, community‑focused profession.
