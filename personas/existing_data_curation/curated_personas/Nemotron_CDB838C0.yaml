personas:
  professional: Angel Diaz, a 37‑year‑old budding community‑program coordinator, leverages meticulous scheduling, bilingual communication, and a curiosity for unconventional art to design nonprofit events,
    and they consistently apply their disciplined, high‑standard mindset to keep projects on track while fostering inclusive cultural experiences.
  sports: Angel Diaz enjoys leisurely morning runs through the Somerset County Park, follows the New York Giants and New York Knicks with moderate enthusiasm, and plays touch football in a mixed‑gender
    community league to stay active without overwhelming their schedule.
  arts: Angel Diaz spends evenings painting acrylics inspired by Frida Kahlo’s vivid folk motifs and the coastal New Jersey landscape, visits local galleries to study emerging talents like Maya Lin, and
    regularly attends performances of Lin‑Manuel Miranda’s productions to keep their artistic palate fresh.
  travel: Angel Diaz plans trips with spreadsheet precision, favoring weekend getaways to creative hubs such as Santa Fe and Asheville, while dreaming of a summer road‑trip up the Pacific Northwest coast
    to capture cliffside photography and explore artisan markets.
  culinary: Angel Diaz’s kitchen serves as a testing ground where they perfect a smoky mole negro using dried chilies, cacao, and cumin, then fuse it with Mediterranean herbs like rosemary and thyme to
    craft innovative dishes for their community catering ambitions.
  core: Angel Diaz is a perfection‑driven cultural curator who battles chronic worry with yoga, channels their curiosity into art and fusion cooking, and secretly hoards half‑used artisanal spices for future
    culinary experiments.
background:
  cultural: Angel is a first-generation Mexican-American whose parents emigrated from the state of Jalisco. She grew up in a bilingual household where Spanish was spoken daily and Mexican traditions—such
    as Día de los Muertos, Mexican Independence Day, and family gatherings centered around homemade tortillas and tamales—were celebrated with reverence. Living in Somerset, New Jersey, she actively participates
    in the local Hispanic community, volunteering at cultural festivals and helping preserve Mexican heritage for younger generations. Her dual cultural identity shapes her values, culinary preferences,
    and her commitment to fostering cross-cultural understanding in her community.
