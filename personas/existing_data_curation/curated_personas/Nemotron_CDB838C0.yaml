  career_goals: Angel aims to re-enter the workforce in a flexible, part-time role that leverages her organizational talent, such as an administrative assistant for a local nonprofit or a community-program
    coordinator. She plans to earn a culinary certificate so she can launch a home-based catering service that highlights authentic Mexican flavors for weddings and cultural events in Somerset. In parallel,
    she seeks professional development in event planning and stress-management techniques, hoping to eventually lead a cultural-programming committee at the Somerset community center while maintaining a
    balanced family life.
