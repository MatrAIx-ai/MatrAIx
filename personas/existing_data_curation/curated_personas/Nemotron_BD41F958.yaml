personas:
  professional: Jose Rodriguez is a seasoned restaurant server whose bilingual fluency, precise order‑taking, and calm routine‑orientated demeanor keep the dining floor running like clockwork, while they
    foster a harmonious atmosphere among guests and coworkers through their kindness and cooperative nature.
  sports: Jose Rodriguez follows professional soccer passionately, especially when the national team of his family’s origin plays, avidly supports the local Dallas FC, participates in a community soccer
    league, and complements his love for the sport with regular walks in nearby parks while cheering for the Dallas Cowboys football team.
  arts: Jose Rodriguez enjoys listening to cumbia and boleros on weekends, with a particular fondness for the classic sounds of Celia Cruz and Luis Miguel, and often shares stories of traditional dances
    at neighborhood festivals while occasionally dabbling in woodworking that lets them create modest wooden bowls as functional art.
  travel: Jose Rodriguez prefers organized road trips that blend visits to the countryside of his parents’ homeland with leisurely stops at Texas Hill Country vineyards, and dreams of a future pilgrimage
    to the historic city where his grandparents once lived, balancing travel costs with a modest savings plan.
  culinary: Jose Rodriguez cooks with a practiced hand, routinely preparing pupusas stuffed with cheese and loroco, yuca frita seasoned with garlic and lime, and homemade tamales for holiday feasts, relishing
    the aroma of fresh masa and the crisp crunch of fried plantains as signature flavors in their kitchen.
  core: Jose Rodriguez blends routine‑driven reliability with a warm, community‑centered heart, often found juggling a ledger, a wooden bowl, and a pot of simmering tamales while quietly strategizing the
    next step toward owning a family‑rooted restaurant.
background:
  cultural: Jose Antonio comes from a close‑knit Salvadoran family that immigrated to Texas decades ago. He grew up speaking Spanish at home and preserving customs such as celebrating Día de la Madre, Christmas
    with traditional tamales, and community festivals that feature Salvadoran food, music, and dance. His Catholic faith and strong family ties influence his values of harmony, respect, and cooperation.
    Living in Garland, he maintains connections with the broader Salvadoran diaspora, participating in local cultural events, supporting fellow immigrants, and sharing his heritage through cooking and storytelling.
attributes:
  skills: '[''customer service'', ''cash register operation'', ''order taking'', ''food safety compliance'', ''bilingual Spanish-English communication'', ''multitasking under pressure'', ''team collaboration'',
