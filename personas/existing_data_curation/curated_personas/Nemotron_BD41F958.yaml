  hobbies: '[''preparing traditional Salvadoran dishes'', ''watching soccer matches'', ''listening to cumbia and bolero music'', ''attending church services'', ''family gatherings'', ''gardening'', ''walking
    in local parks'', ''simple woodworking projects'']'
  career_goals: Jose Antonio aims to progress from his current waiter role to a supervisory or shift‑lead position within the next few years, focusing on improving his English proficiency and completing
    a GED to broaden his career options. He aspires to eventually manage a small family‑owned restaurant where he can incorporate Salvadoran culinary traditions, providing stable income for his family while
    preserving cultural heritage. Maintaining a balance between work responsibilities and quality family time remains a core ambition.
