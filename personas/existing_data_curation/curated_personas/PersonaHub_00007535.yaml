  dealing with other companies as intermediaries and prefer to market their innovative products directly to the public. They have a unique and special knowledge, talents, and skills in the field of optics,
  particularly in the area of polarized headlight technology, which they have successfully developed and patented. They are known for their ability to see the potential in problems and to bring their vision
  to life through their products.
