  hobbies: '[''Reading (children’s books and historical fiction)'', ''Gardening'', ''Knitting/Crocheting'', ''Nature walks and birdwatching'', ''Baking and cooking'', ''Journaling'', ''DIY crafts for classroom'',
    ''Listening to educational podcasts'', ''Volunteering at local animal shelter'', ''Gentle yoga'']'
  career_goals: Anne aims to earn an associate’s degree in early childhood education to qualify for a lead‑teacher or program‑coordinator role within her preschool network. She dreams of eventually opening
    a small, nature‑focused daycare that emphasizes outdoor exploration and inclusive, play‑based learning. In the medium term, she hopes to mentor new teachers, develop a specialized curriculum for children
    with mild learning differences, and become a certified early‑intervention specialist through additional coursework.
