personas:
  professional: Graciella Robles, an aspiring robotics engineer, applies her meticulous, competitive spirit to designing block‑coded machines in her middle‑school club, where they plan each project step‑by‑step
    and lead the team with the confidence of a forward on the soccer field.
  sports: Graciella Robles shines as a forward and occasional captain for her middle‑school soccer team, idolizing professional forwards like Alex Morgan and training with the local youth club Thunder FC,
    while they balance their competitive drive with a love for the fast‑paced energy of the team's matches.
  arts: Graciella Robles spends evenings sketching comic heroes such as Spider‑Man and Sailor Moon, devouring mystery novels like 'The Secret of the Old Clock', and practicing bilingual storytelling by
    retelling plot twists in both English and Spanish to their siblings.
  travel: Graciella Robles prefers structured weekend getaways, frequently visiting the nearby science museum and the city’s animal sanctuary, while they dream of a school‑organized trip to Barcelona to
    practice Spanish and attend a youth robotics competition in Germany.
  culinary: Graciella Robles enjoys homemade pepperoni pizza, grilled cheese sandwiches, and chicken nuggets, and they proudly prepare their favorite spaghetti Bolognese with a secret garnish of basil after
    following a step‑by‑step tutorial on a cooking YouTube channel.
  core: Graciella Robles blends competitive soccer energy, meticulous robotics projects, and a vivid imagination, all while they juggle anxiety‑driven worries and a disciplined weekly allowance plan.
background:
  cultural: Graciella is raised in a Mexican‑American household in Denver’s Adams County. Spanish is spoken at home, and she enjoys traditional foods such as tamales and pozole during family gatherings.
    Her family celebrates cultural holidays like Día de los Muertos and Cinco de Mayo, often involving school community events. She participates in a local Latino youth group that promotes cultural pride
    and community service. These experiences shape her identity, giving her a strong sense of family responsibility and a desire to give back to the broader Hispanic community.
attributes:
  skills: '["Organizational planning", "Time management", "Reliability in teamwork", "Mathematical problem solving", "Scientific inquiry", "Introductory coding (Scratch)", "Soccer strategy and team leadership",
