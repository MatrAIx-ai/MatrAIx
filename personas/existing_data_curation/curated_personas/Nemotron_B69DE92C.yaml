  hobbies: '["Soccer (forward, team captain)", "Robotics club (building and programming)", "Sketching and comic illustration", "Journaling for stress relief", "Reading mystery novels (English and Spanish)",
    "Bilingual storytelling", "Volunteering at animal rescue", "Competitive board games (Chess)"]'
  career_goals: Graciella aims to build a future that blends her love for structure, teamwork, and helping others. She dreams of becoming a civil engineer or architect, where she can design safe, efficient
    spaces while applying her methodical problem‑solving skills. At the same time, her compassion for animals fuels a long‑term ambition to study veterinary medicine. To achieve these goals, she plans to
    maintain top grades, win STEM competition awards, earn scholarships, and eventually attend a university that supports both engineering and veterinary pathways. She also hopes to mentor younger students
    in her community, showing them how organized study habits lead to success.
