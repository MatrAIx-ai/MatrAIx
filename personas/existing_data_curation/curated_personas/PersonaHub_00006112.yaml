persona_description: A conservation scientist who specializes in the study of cave paintings and cave environments, particularly in the Lascaux cave. He is an expert in the field of conservation biology
  and has extensive experience in the treatment of micro-organisms in cave environments. He is interested in the environmental factors that contribute to the growth of micro-organisms in the cave, and he
  is also interested in the public's access to the cave and the conservation of the paintings and engravings. He is likely to be interested in the symposium on Lascaux Cave Paintings and is likely to have
  a deep understanding of the conservation challenges facing the Lascaux cave and its paintings.
