personas:
  professional: Debjani Panjwani, a retired community anchor and technology mentor, weaves her storytelling, bilingual fluency, and home-cooking expertise into informal senior workshops where she improvises
    tea gatherings, guides peers through video calls, and curates cultural narratives, all while favoring a relaxed, flexible approach over rigid schedules.
  sports: Debjani Panjwani enjoys light yoga sessions in the local park, strolls along the Potomac Trail twice a week, participates in a senior bowling league at the Prince William County community center,
    and cheerfully supports the Washington Capitals, Washington Wizards, and D.C. United while favoring low-impact activity over competitive sports.
  arts: Debjani Panjwani expresses her creative spirit through delicate watercolor landscapes inspired by Monet and O'Keeffe, graceful calligraphy of Urdu verses, and a fondness for listening to Ravi Shankar's
    sitar as well as the classical violin performances of Yo-Yo Ma, regularly attending art workshops at the senior center.
  travel: Debjani Panjwani prefers thoughtfully planned, leisurely trips such as a spring visit to the gardens of Shenandoah Valley, a cultural weekend in Williamsburg's historic district, and a nostalgic
    pilgrimage to her ancestral hometown in Punjab, balancing her love for family visits with a modest travel budget and occasional concern about mobility.
  culinary: Debjani Panjwani delights in preparing aromatic lentil dal flavored with turmeric, cumin, and cardamom, fragrant saffron rice pilaf, and spiced chickpea choli, using fresh cilantro and ginger,
    and she often pairs these dishes with homemade flatbreads while experimenting with new fusion twists for her grandchildren's gatherings.
  core: Debjani Panjwani, 78, blends quiet curiosity, gentle creativity, and a heartfelt dedication to community, even as she wrestles with worry, occasional disorganization, and a fondness for daily tea
    rituals.
background:
  cultural: Debjani was born into a South Asian family that retained strong ties to its cultural roots while adapting to life in the United States. Her upbringing was marked by celebrations of festivals
    such as Diwali and Eid, the scent of spices in the kitchen, and storytelling that preserved family lineage. The South Asian diaspora community in the Washington, D.C. metropolitan area, especially in
    Prince William County, provided a supportive network of cultural events, language classes, and religious gatherings. These experiences instilled in her a deep appreciation for heritage, a respect for
    communal harmony, and a desire to pass on traditions to younger generations. Her cultural identity influences her cooking, artistic expression, and her commitment to fostering a sense of belonging within
    her local senior and multicultural circles.
attributes:
  skills: '[''Traditional South Asian cooking'', ''Watercolor painting'', ''Calligraphy'', ''Storytelling and oral history preservation'', ''Facilitating small‑group gatherings'', ''Basic computer and smartphone
