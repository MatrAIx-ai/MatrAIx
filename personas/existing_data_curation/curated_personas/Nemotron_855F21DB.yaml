  hobbies: '[''Watercolor painting'', ''Calligraphy'', ''Gardening (herbs and flowers)'', ''Reading historical novels'', ''Listening to classical Indian music'', ''Cooking traditional South Asian dishes'',
    ''Knitting and crocheting'', ''Attending local art workshops'', ''Meditation and light yoga'', ''Walking in nearby parks'']'
  career_goals: Although retired, Debjani is motivated to preserve and share her cultural legacy. She hopes to compile a small family recipe book that blends traditional dishes with the stories behind them,
    and to organize a modest exhibition of her watercolor work at the local senior center. She also aims to learn digital photography to document community events and her garden, and to mentor fellow seniors
    in using technology for staying connected with family. Managing stress is a personal goal, so she plans to incorporate gentle yoga and mindfulness practices into her daily routine to reduce worry and
    maintain emotional well‑being.
