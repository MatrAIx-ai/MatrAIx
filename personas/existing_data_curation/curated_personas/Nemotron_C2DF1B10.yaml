personas:
  professional: Janis Bailey is a veteran office administrator turned operations strategist who leverages 25+ years of team supervision, advanced Microsoft/Google suite mastery, and a creative problem‑solving
    mindset inspired by her watercolor workshops to streamline processes, coach staff, and champion workplace wellness initiatives.
  sports: Janis Bailey enjoys low‑impact fitness, regularly hiking the Potomac River trails with the Prince William County Hiking Club, follows the Washington Capitals hockey team, the Washington Wizards
    basketball team, and the Washington Nationals baseball team, and she attends community yoga classes to keep flexible, though she admits to skipping workouts when a choir rehearsal runs late.
  arts: Janis Bailey immerses herself in the arts by attending exhibitions featuring artists like Yayoi Kusama and local muralist Sarah Cunningham, participates in watercolor workshops led by instructor
    Linda Hart, volunteers with the Prince William County Arts Council to curate community art fairs, and sings folk classics such as Pete Seeger’s “Turn! Turn! Turn!” with her senior choir.
  travel: Janis Bailey favors culturally rich trips, planning immersive itineraries to Mediterranean cities like Florence and Athens—where she samples authentic recipes she later recreates at home—while
    also enjoying weekend getaways to historic sites in Virginia such as Mount Vernon, and she balances travel budgets by using airline points and staying at boutique B&Bs, though she sometimes delays bookings
    due to work stress.
  culinary: Janis Bailey’s culinary palate leans toward Mediterranean flavors, expertly preparing dishes like grilled branzino with lemon‑oregano drizzle, mezze plates featuring hummus, roasted eggplant,
    and fresh basil pesto, while her intermediate cooking skill is evident in her confident use of olive oil, garlic, and capers, and she delights in pairing meals with a glass of crisp Sauvignon Blanc.
  core: Janis Bailey blends a meticulous administrative mind with an artist’s curiosity, navigating work, community, and personal life with organized enthusiasm, a habit of over‑thinking finances, occasional
    health‑check neglect, and a lovable penchant for humming folk songs during meetings.
background:
  cultural: Janis was raised in a middle‑class suburban setting in Virginia, rooted in traditional Anglo‑American values such as hard work, reliability, and hospitality. She celebrates classic American
    holidays like Thanksgiving, Independence Day, and Christmas, while also embracing the diverse cultural offerings of the greater Washington, D.C. region. Exposure to nearby museums, multicultural festivals,
    and historic sites has cultivated her appreciation for the arts and varied perspectives. Her background blends conventional American customs with an open, inquisitive attitude toward new ideas and experiences.
