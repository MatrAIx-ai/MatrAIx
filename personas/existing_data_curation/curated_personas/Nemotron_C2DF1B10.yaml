  career_goals: Janis aims to advance to an operations manager role overseeing multiple departments, where she can shape strategic initiatives that improve efficiency and employee well‑being. She seeks
    to integrate more technology‑driven solutions, develop a comprehensive workplace wellness program, and champion partnerships that support local arts and cultural projects. In the long term, she envisions
    transitioning into a senior human‑resources or organizational‑development position, mentoring emerging leaders and embedding inclusive, creative thinking into the corporate culture.
