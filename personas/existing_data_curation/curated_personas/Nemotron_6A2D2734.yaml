personas:
  professional: Ivan Joubert is a budding preschool explorer whose budding curiosity about textures and shapes fuels a surprisingly organized play routine, while their energetic, sociable nature turns group
    building blocks sessions into friendly competitions, and a hint of skeptical scrutiny keeps them from sharing toys too readily.
  sports: Ivan Joubert loves the rhythm of toddler gymnastics, eagerly dashes in the local park's miniature soccer sessions where they chase a bright orange ball, and proudly waves a cap bearing the logo
    of the Boston Red Sox, blending spontaneous energy with emerging team loyalty.
  arts: Ivan Joubert delights in the whimsical world of Eric Carle’s picture books, giggles at the catchy tunes of the Kids' Alternative band The Wiggles, and mimics paint‑splatter experiments with finger
    paints, letting the vibrant arts scene shape their budding imagination.
  travel: Ivan Joubert enjoys short family road trips to the nearby beach town of Oceanview, where sandcastle building and seagull watching dominate, and dreams of a future visit to the towering silhouettes
    of the Grand Canyon, balancing curiosity for new horizons with the comfort of familiar stroller routes.
  culinary: Ivan Joubert favors soft banana pancakes drizzled with a dab of honey, relishes the occasional bite of mildly spiced sweet‑potato fries, and proudly scoops peas into a tiny mixing bowl, turning
    mealtime into a playful culinary adventure.
  core: Ivan Joubert is a fiercely curious toddler who blends meticulous toy sorting with spontaneous dance‑offs, refuses to share a favored blanket unless a fair trade is offered, and turns every day into
    a mini‑exploration of cause and effect.
background:
  cultural: Ivan grows up in a Dominican household in Philadelphia, surrounded by Spanish and English at home. Family gatherings feature traditional foods like mangú and empanadas, and the rhythm of merengue
    and bachata is a constant backdrop. He participates in community events that celebrate Caribbean heritage, learning cultural values of family unity, respect for elders, and a lively love of music and
    dance while also navigating the multicultural environment of his city.
