  hobbies: '[''Soccer'', ''Ballet dancing'', ''Drawing and coloring'', ''Reading bilingual storybooks'', ''Helping in the family kitchen'', ''Educational tablet games'', ''School art club'', ''Library reading
    circle'']'
  career_goals: Claudia dreams of becoming someone who helps others learn and stay organized. She imagines herself as a teacher someday, guiding younger children through reading and math, or as a community
    health aide who supports families in her neighborhood. Her current ambition is to keep improving her language skills, excel in school, and continue being a dependable friend and classmate.
