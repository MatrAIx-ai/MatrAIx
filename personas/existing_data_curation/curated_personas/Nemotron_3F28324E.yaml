  hobbies: '[''Reading science-fiction novels'', ''Strategic video games (e.g., Civilization)'', ''Model building (e.g., plastic kits)'', ''DIY electronics projects'', ''Jogging or hiking local trails'',
    ''Basketball with friends'', ''Podcast listening (technology, self-improvement)'', ''Journaling and planner use'']'
  career_goals: Marvin aims to move into a supervisory role within customer service, targeting a team lead or shift manager position within the next two years while enrolling in a business administration
    or supply chain management program at a community college. He intends to combine his organizational strengths and analytical mindset to eventually oversee operations at a regional distribution center,
    and long‑term he envisions launching his own logistics consulting boutique to apply his disciplined work ethic and practical knowledge.
