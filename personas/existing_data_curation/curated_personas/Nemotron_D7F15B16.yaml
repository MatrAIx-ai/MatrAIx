personas:
  professional: Kyle Lara, a 29‑year‑old bilingual creative, blends digital illustration and photo editing expertise to volunteer‑curate community art events while battling a chronic resistance to rigid
    schedules that often threatens to derail part‑time gallery assistant responsibilities they seek.
  sports: Kyle Lara enjoys casual beach volleyball with the Lake Worth Sand Squad in summer, follows the Miami Heat and Tampa Bay Rays, and occasionally joins a weekday running group at John Prince Park
    to stay fit, despite a tendency to skip scheduled gym sessions.
  arts: Kyle Lara’s artistic pulse beats to the rhythm of street‑art icons like Banksy and muralists such as Os Gêmeos, while their photographic eye nods to Henri Cartier‑Bresson's decisive moment, and
    evenings are spent dissecting the experimental cinema of Apichatpong Weerasethakul and listening to the ambient soundscapes of Brian Eno.
  travel: Kyle Lara prefers spontaneous photo‑centric getaways, having captured sunrise over Antigua’s colonial streets and now eyeing a future itinerary to Valparaíso’s colorful alleyways, all while balancing
    a modest travel budget against the pull of weekend drives along Florida’s Gulf Coast.
  culinary: Kyle Lara delights in cooking and reimagining pepian and tamales with succulent Florida shrimp, seasoning them with roasted pepitas and smoky chipotle, while their pantry habitually stocks fresh
    cilantro, masa harina, and locally sourced citrus, marrying heritage flavors with coastal influences.
  core: Kyle Lara’s restless curiosity fuels a mosaic of art, photography, and community projects, yet chronic disorganization and anxiety often leave deadlines teetering on the brink of missed opportunities.
background:
  cultural: Kyle is the son of Guatemalan immigrants who settled in South Florida before he was born. He grew up speaking Spanish at home and English at school, giving him a bicultural perspective that
    informs both his personal and creative life. Guatemalan cultural traditions—such as the celebration of Día de los Muertos, the use of vibrant textiles, and the storytelling heritage of Mayan mythology—are
    woven into his worldview. While he embraces the diverse, artistic energy of Lake Worth and the broader Palm Beach County Latinx community, he also maintains close ties with his extended family in Guatemala,
    often traveling to visit relatives and participating in community events at the local Guatemalan cultural center. This blend of heritage and local influence fuels his appreciation for varied artistic
    expressions and his desire to share cultural narratives through his own creative work.
