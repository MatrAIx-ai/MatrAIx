  hobbies: '[''Visiting galleries and museum exhibitions'', ''Sketching and drawing'', ''Street and documentary photography'', ''Cooking Guatemalan cuisine'', ''Watching independent foreign films'', ''Reading
    contemporary philosophy and art theory'', ''Playing board games with small groups'', ''Mindfulness meditation'', ''Evening walks on Lake Worth Beach'']'
  career_goals: Kyle aims to translate his passion for art and his growing skill set into a stable role within the creative sector. His short‑term goal is to secure a part‑time position as a gallery assistant
    or community art outreach coordinator in the Lake Worth area, where he can apply his bilingual abilities and curatorial experience. He plans to enroll in a community‑college certificate program in graphic
    design to formalize his digital illustration skills and to improve his time‑management and organizational capabilities. Long‑term, Kyle dreams of establishing a modest freelance studio that offers custom
    illustration, photography, and cultural‑heritage projects for local businesses and non‑profits, while also mentoring other young Latinx artists who share his love of unconventional ideas.
