  career_goals: Adnan dreams of designing things that help people and the environment. He is fascinated by how machines work and hopes to become a mechanical engineer or a renewable‑energy technologist
    who builds sustainable gadgets. He also enjoys teaching friends how to solve puzzles, so he imagines a future where he could mentor younger students or lead a community makerspace. In the short term,
    he aims to win his school’s science fair and earn a badge in the local Boy Scouts program for engineering.
