personas:
  professional: Adnan Holman is a budding young engineer who combines a love for space and robotics with hands‑on LEGO construction and Scratch coding, channeling their curiosity into practical projects
    while modestly sharing their creations with a small circle of classmates.
  sports: Adnan Holman rides their bike along the Panola Mountain trails, plays forward for the McDonough Youth Soccer Club, cheers for Atlanta United FC and the Atlanta Braves, and enjoys occasional pick‑up
    basketball games at the community center.
  arts: Adnan Holman delights in adventure novels by Jules Verne and sci‑fi stories by Andy Weir, listens to Taylor Swift’s pop hits while practicing piano, watches Pixar animated films, and sketches imaginative
    inventions inspired by their LEGO builds.
  travel: Adnan Holman has explored the Georgia Aquarium and taken a school field trip to Washington, D.C., dreams of visiting the Kennedy Space Center in Florida, and prefers short car trips to nearby
    state parks over long vacations, often planning routes with a handwritten map.
  culinary: Adnan Holman prefers classic comfort foods like mac and cheese, peanut‑butter‑and‑jelly sandwiches, and Georgia peach cobbler, can whip up a decent grilled cheese with their mother’s help, and
    enjoys experimenting with fruit‑based snacks shaped by LEGO‑themed cookie cutters.
  core: Adnan Holman, a quietly curious 10‑year‑old who blends Southern courtesy with a fascination for robotics, keeps a secret stash of LEGO bricks under their bed, forgets to finish homework when a new
    game idea sparks, and always offers to help neighbors at the Harvest Festival.
background:
  cultural: Adnan grows up in Stockbridge, a suburban community in Rockdale County, Georgia, where Southern hospitality and close‑knit family ties shape daily life. His family attends a local community
    church and participates in neighborhood events such as the annual Harvest Festival, where he enjoys helping set up booths and greeting visitors. The region’s emphasis on respect, courtesy, and cooperation
    reinforces his considerate nature. He benefits from the county’s school programs that encourage outdoor learning and technology clubs, reflecting the blend of traditional Southern values with modern
    educational opportunities. Though he prefers small gatherings, the cultural norm of taking care of neighbors and relatives strongly influences his cooperative and harmonious outlook.
