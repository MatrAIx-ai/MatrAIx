  career_goals: Kelly dreams of exploring the stars as an astronaut one day, inspired by Houston’s connection to NASA. She also loves animals and often says she wants to become a veterinarian to help injured
    pets. Her love of drawing fuels an occasional wish to become a painter or illustrator, turning her ideas into pictures. While she knows these goals may change, she is excited about any path that lets
    her learn, organize projects, and share her discoveries with others, such as becoming a scientist or a teacher who inspires kids to be curious.
