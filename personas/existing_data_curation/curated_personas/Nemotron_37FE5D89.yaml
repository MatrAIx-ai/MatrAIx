personas:
  professional: Kelly Hill, a budding young explorer and aspiring natural scientist, uses detailed sketching, LEGO building, and Scratch Jr. coding to investigate how the world works, channeling their methodical
    organization and curiosity, and they proudly share each discovery with family and friends.
  sports: Kelly Hill, a member of the local junior soccer league and a regular participant in after‑school swim lessons, cheers for the Houston Astros and the Houston Rockets, spends weekends at the community
    park practicing kicks and splashing in the pool, and they schedule practice times with the same organized precision they apply to building LEGO forts.
  arts: Kelly Hill, a watercolor enthusiast who fills sketchbooks with fantastical castles and dragons, draws inspiration from the animated worlds of Hayao Miyazaki and the vivid illustrations of Mary Grandpré,
    enjoys listening to the playful tunes of The Wiggles while baking cookies, and they often imagine their drawings coming to life in a magical story.
  travel: Kelly Hill, who loves family trips to Space Center Houston and the San Antonio River Walk and dreams of visiting the Grand Canyon and a beach resort in Cancun, favors short, activity‑filled outings
    that blend nature hikes, museum stops, and a small allowance for souvenir shells, and they always plan each adventure with a detailed checklist.
  culinary: Kelly Hill, who adores homemade chocolate chip cookies, tangy shrimp tacos, and classic mac‑and‑cheese, enjoys mixing flour and cocoa at the kitchen counter, has a particular fondness for fresh
    strawberry slices and crunchy carrot sticks as snack companions, and they proudly serve their creations to siblings with a grin.
  core: Kelly Hill, a curious, methodical seven‑year‑old who balances sketching dragons with building LEGO forts, hoards rocks like treasure, and they sometimes forget bedtime in pursuit of the next adventure.
background:
  cultural: Kelly is raised in a middle‑class family in Houston, Texas, where a blend of Southern hospitality and a vibrant multicultural community shapes her upbringing. She celebrates typical American
    holidays like Thanksgiving, Christmas, and Halloween, while also enjoying local Texas traditions such as visiting community picnics, BBQ gatherings, and trying Tex‑Mex cuisine with friends. Her school
    environment is diverse, exposing her to classmates from many ethnic backgrounds, which encourages openness and appreciation of different cultures. English is her primary language, and she occasionally
    picks up Spanish words from neighbors and community events. Family outings to the Houston Public Library, city parks, and cultural festivals reinforce a sense of belonging to a dynamic, inclusive city
    while keeping her grounded in the values of kindness, independence, and curiosity.
