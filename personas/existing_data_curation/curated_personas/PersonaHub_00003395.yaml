persona_description: A sustainability advocate and education professional who is passionate about promoting sustainable practices and education in schools. Jason Kimberley is a CEO of Cool Australia, an
  organisation that engages teachers and students across Australia to promote sustainability and environmental education. He is a strong believer in the importance of education in creating a sustainable
  future and has built a movement with over 15,000 teachers and 500,000 students. He understands the challenges faced by teachers and students in adopting sustainable practices and is committed to providing
  resources and support to help them. He is a visionary who sees the potential of sustainability-themed programs to engage children across their curriculum and prepare the next generation to work towards
  environmentally sustainable outcomes in their daily lives. His work with Cool Australia and EnviroWeek is an example of how sustainability can engage children across their curriculum.
