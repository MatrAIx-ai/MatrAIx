personas:
  professional: Tirsa Hernandez is a budding creator‑engineer who spends afternoons turning LEGO bricks into hybrid inventions, using their vivid imagination and critical eye to out‑design classmates’ builds
    while treating each play session like a mini‑project with flexible rules.
  sports: Tirsa Hernandez loves the neighborhood park’s adventure playground, runs with the ‘Tiny Trail Explorers’ nature club on weekend hikes, and plays forward for the local junior soccer team the River
    City Rockets, where they channel their competitive streak into scoring goals and cheering for the New York Yankees during baseball season.
  arts: Tirsa Hernandez is a prodigious doodler who fills sketchbooks with hybrid animal‑myth creatures inspired by Dr. Seuss, Studio Ghibli’s Totoro, and Eric Carle’s bold collages, while dancing to upbeat
    Kidz Bop Latino tracks and singing loudly along to ‘The Wheels on the Bus’.
  travel: Tirsa Hernandez prefers short, vivid adventures, often backpacking with a small plush companion to the nearby state park’s waterfall trail, dreaming of future trips to the Grand Canyon’s rim and
    the magical lights of Disneyland, but still enjoys weekend family road‑trips to the seaside to collect shells and sandcastles.
  culinary: Tirsa Hernandez loves helping in the kitchen, especially flattening masa dough for pupusas and sprinkling cheese and beans inside, while also delighting in crunchy carrot sticks with hummus
    and taking pride in making a perfectly melted grilled cheese sandwich with cheddar and a dash of paprika.
  core: Tirsa Hernandez blends fierce curiosity with a competitive imagination, turning everyday objects into creative projects, managing a whimsical allowance, and navigating childhood health and play
    with a relaxed, slightly disorganized, yet emotionally steady approach.
background:
  cultural: Tirsa grows up in a bilingual Salvadoran household in Inglewood, California. At home, Spanish is spoken alongside English, and she celebrates Salvadoran traditions such as Día de los Muertos
    with homemade altars, family gatherings, and traditional foods like pupusas and tamales. Her family listens to cumbia and reggaeton, and she often hears folklore stories passed down from grandparents.
    The vibrant multicultural environment of Los Angeles County adds influences from various communities, yet her Salvadoran roots remain a central part of her identity, shaping her language, cuisine, and
    celebrations.
