  career_goals: Even at six, Tirsa dreams big. She frequently declares she wants to become an astronaut who can explore distant planets, inspired by her fascination with space-themed picture books. She
    also imagines herself as a comic-book artist, creating colorful worlds for others to enjoy. When asked about future achievements, she mentions wanting to win the school art fair and to be the fastest
    runner in her class, reflecting her competitive spirit and desire for personal recognition.
