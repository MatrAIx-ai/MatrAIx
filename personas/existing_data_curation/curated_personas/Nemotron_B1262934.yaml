personas:
  professional: Tommy Heng, a detail‑oriented records clerk with a liberal‑arts background, leverages deep expertise in SharePoint, Laserfiche, and Python to engineer flexible data‑organization workflows,
    routinely leads staff training sessions, and they continuously push for AI‑assisted indexing solutions within the municipal records department.
  sports: Tommy Heng plays forward for the Fullerton Rovers recreational soccer league, cheers for the LA Galaxy at home games, and they are a member of the Fullerton Hiking Club, tackling the Laguna‑Saddle
    trail every other weekend while tracking mileage with Strava.
  arts: Tommy Heng is a frequent attendee of live music at the House of Blues in Anaheim, a karaoke enthusiast at local venues singing classics by The Beatles and hits by Faye Wong, and they regularly visit
    Orange County’s Lunar New Year Festival where they admire performances by traditional dance troupes and modern artists like Mitski.
  travel: Tommy Heng enjoys meticulously planning short road trips to places like Joshua Tree National Park and Catalina Island, often documenting the journeys on their blog, while dreaming of a longer
    cultural immersion in Hoi An, Vietnam, but they balance travel aspirations with the need to save for a Master’s program and occasional family commitments.
  culinary: Tommy Heng’s kitchen is a laboratory where they perfect pho broth with star anise and fish sauce, whip up Pad Thai with tamarind and fresh shrimp, and experiment with mango sticky rice, often
    hosting potluck nights where friends rave about their homemade cilantro‑lime chicken and chili oil.
  core: Tommy Heng blends a meticulous records‑management mindset with a love for community‑centered food, soccer, and tech, juggling a disciplined budget, occasional back‑pain setbacks, and a relentless
    curiosity that fuels both professional growth and weekend adventures.
background:
  cultural: Tommy is the son of Vietnamese immigrants who settled in Southern California in the 1990s. He grew up in a bilingual household, speaking both English and Vietnamese, and was raised with a strong
    emphasis on family, respect for elders, and community service. His cultural upbringing is reflected in his love for traditional dishes, participation in Lunar New Year celebrations, and involvement
    with the Vietnamese‑American association in Orange County. While he embraces American values of independence and practicality, he also honors Southeast Asian traditions such as honoring ancestors, practicing
    modesty, and valuing collective well‑being. This blend of cultures shapes his worldview, fostering both a collaborative spirit and a pragmatic approach to problem‑solving.
attributes:
  skills: '[''Records management'', ''Document archiving'', ''Data entry'', ''Information retrieval'', ''SharePoint administration'', ''Laserfiche workflow design'', ''SQL basics'', ''Python data cleaning'',
    ''Tableau reporting'', ''Process optimization'', ''Team training'', ''Compliance awareness'', ''Customer service'']'
  hobbies: '[''Recreational soccer'', ''Hiking'', ''Cooking Southeast Asian cuisine'', ''Hosting potluck gatherings'', ''Attending live music and karaoke'', ''Participating in cultural festivals'', ''Maintaining
    a tech blog'', ''Volunteering at library oral-history project'']'
  career_goals: Tommy aims to move from a clerk position to a senior records‑management specialist within the next three years, pursuing a Master’s in Information Science to deepen his technical expertise.
    He aspires to lead digitization and AI‑assisted indexing projects for a municipal agency or nonprofit, establishing efficient, compliant workflows that improve public access to historical records. He
    plans to obtain a professional certification in Records and Information Management (RIM) and eventually take on a supervisory role where he can mentor junior staff, promote best practices, and champion
    the integration of emerging technologies. Long‑term, Tommy hopes to contribute to the preservation of Southeast Asian community histories in Orange County by collaborating with local cultural institutions.
