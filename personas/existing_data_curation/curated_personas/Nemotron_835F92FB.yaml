  career_goals: Alicia dreams of becoming a robotics engineer or a video game designer, wanting to build machines that can solve real‑world problems. She also imagines herself as a competitive athlete,
    hoping to play soccer at the high‑school varsity level and maybe later in college. Her curiosity about how things work drives her ambition to study computer science and engineering, while her competitive
    spirit pushes her to win science competitions and coding challenges. She envisions a future where she can combine her love of technology and sports by creating interactive games that teach STEM concepts.
