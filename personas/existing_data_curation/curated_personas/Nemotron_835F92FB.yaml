personas:
  professional: Alicia Castellanos, an aspiring game developer who creates simple Scratch adventures, fuses their curiosity with a practical habit of reusing proven code snippets, enters friendly coding
    competitions with a competitive spark, and they prefer a loosely structured schedule that lets creativity flow unimpeded.
  sports: Alicia Castellanos dashes onto the neighborhood field with their after‑school soccer club, idolizes the New England Revolution and the Boston Celtics, and they balance a fierce competitive drive
    with a relaxed training routine that often swaps structured drills for spontaneous games of tag.
  arts: Alicia Castellanos channels their imagination onto a tablet, sketching vibrant graphic‑novel heroes inspired by Raina Telgemeier and Jim Lee, while vibing to reggaeton tracks by Bad Bunny and pop
    anthems from Ariana Grande, and they unwind by playing piano pieces ranging from Beethoven’s Für Elise to contemporary movie themes.
  travel: Alicia Castellanos prefers spur‑of‑the‑moment family road trips along the New England coast to places like Cape Cod for beach science experiments, they treasure annual visits to the city where
    their family gathers for a grand holiday parade, and they dream of wandering the historic streets of Barcelona to taste its bustling mercados.
  culinary: Alicia Castellanos delights in blending flavors, expertly stirring arroz con gandules, crisping sweet plantain chips, shaping cheese‑filled empanadillas, and also daringly crafting homemade
    pizza topped with mozzarella, basil, and pepperoni, and they never shy away from a baking‑soda volcano experiment that adds a fizzy surprise to dessert.
  core: Alicia Castellanos is a competitive, curiosity‑driven eleven‑year‑old who balances coding, soccer, and spontaneous kitchen chemistry, but they often misplace their notebook and let their desk become
    a creative clutter zone.
background:
  cultural: Alicia comes from a bilingual Puerto Rican household in Lowell, Massachusetts. At home she speaks Spanish with her parents and grandparents, celebrating traditions such as Noche Buena, Three‑Kings
    Day, and the Puerto Rican Parade in nearby Boston. Her family enjoys cooking arroz con gandules, plantain dishes, and empanadillas, and she often helps in the kitchen, learning the flavors of her heritage.
    She participates in the local Latino youth program, where she learns about Puerto Rican history, dances salsa and bachata, and connects with other kids who share her cultural roots. This bicultural
    experience enriches her perspective, giving her confidence to navigate both American school life and her Puerto Rican community.
