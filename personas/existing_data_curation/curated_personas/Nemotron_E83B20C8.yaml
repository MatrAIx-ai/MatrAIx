  hobbies: '[''Gardening'', ''Cooking (farm-to-table recipes)'', ''Yoga'', ''Hiking/Walking in nature'', ''Listening to podcasts (personal finance, psychology, tech)'', ''DIY home improvement'', ''Volunteering
    at community food pantry'']'
  career_goals: Grace aims to advance to a senior collections supervisor role within the next two years and plans to earn the Certified Credit and Collection Professional (CCP) credential. She intends to
    complete an associate’s degree in Business Administration, develop and lead a training program for new collectors, and eventually transition into a credit risk analysis or financial compliance position.
    Long‑term, she envisions launching a small consulting firm that helps local businesses improve receivables management.
