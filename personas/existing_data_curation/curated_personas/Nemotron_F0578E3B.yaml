  hobbies: '[''gardening'', ''walking waterfront'', ''reading historical fiction'', ''knitting'', ''crossword puzzle club'', ''cooking Portuguese cuisine'', ''volunteering at senior center'']'
  career_goals: Looking ahead, Judy aims to formalize her expertise by obtaining a Certified Nursing Assistant (CNA) credential and completing a leadership development program that would qualify her for
    a lead‑assistant or staff‑educator position at her facility. She also hopes to mentor younger aides, sharing both practical shortcuts and the latest best‑practice guidelines she has studied. Outside
    the workplace, she plans to volunteer regularly at the Fall River senior center, organizing wellness workshops that combine her caregiving knowledge with her interest in stress‑reduction techniques.
    A personal ambition is to attend mindfulness and stress‑management seminars so she can better cope with her own tendency toward worry while modeling healthy coping strategies for patients and colleagues.
