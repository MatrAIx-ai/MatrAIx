persona_description: A person who is interested in education and care for children and young people with complex neuro-disabilities, particularly those with cerebral palsy, visual impairment, and dual sensory
  impairments, who are wheelchair users. They are familiar with the use of a mobility and track system with overhead hoists, as well as the development of a curriculum based on individual learner's needs,
  and the importance of physical contact in child development. They are also interested in the use of patient lifts and patient assessment and monitoring technologies, and the safety and quality of care
  provided by Hillrom (Liko).
