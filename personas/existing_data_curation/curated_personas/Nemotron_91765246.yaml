personas:
  professional: Joshua Fagan, a budding junior architect in the making, channels his curiosity and practical mindset into building elaborate sandcastles and intricate LEGO structures, treating each creation
    as a miniature project where organization meets imagination.
  sports: Joshua Fagan spends afternoons racing a blue bike down the boardwalk, splashing in the shallow waves at the community pool, and playing forward for the Sun‑Coast Kids Soccer Club, all while idolizing
    the LA Galaxy and cheering on the Los Angeles Dodgers during family game nights.
  arts: Joshua Fagan avidly crafts LEGO kingdoms, colors vibrant beach scenes with Crayola crayons, and hums along to the catchy tunes of 'Baby Shark' and Disney's 'Let It Go,' often reciting lines from
    Dr. Seuss picture books as he imagines new adventures.
  travel: Joshua Fagan loves sun‑soaked getaways, having built sandcastles on the shores of Cape Cod, explored the aquarium in Monterey Bay, and dreaming of a future family trip to the Great Barrier Reef,
    preferring spontaneous beach days over long car rides.
  culinary: Joshua Fagan enjoys classic kid favorites like golden fish sticks with tartar sauce, extra‑cheese pizza, and the timeless peanut‑butter‑and‑jelly sandwich, often experimenting with adding sliced
    strawberries and a drizzle of honey for a sweet twist, yet they are notorious for trying to 'cook' sandwiches out of sand that inevitably end in a quick wash‑off.
  core: Joshua Fagan is an energetic beach‑loving builder who balances curiosity with practicality, saves spare change for LEGO while occasionally splurging on ice‑cream, manages mild allergies with parental
    help, and can be bossy in games yet eager to share.
background:
  cultural: Joshua was raised in a middle-class white family in Huntington Beach, California. His upbringing reflects the relaxed coastal lifestyle of Orange County, with frequent trips to the beach, surf
    culture, and community events like Fourth of July parades and beach clean-ups. He attends a local public elementary school where he experiences the multicultural atmosphere of Southern California while
    his family maintains traditional American holidays and values. The region's emphasis on outdoor activities, environmental stewardship, and community involvement has shaped his worldview and daily life.
