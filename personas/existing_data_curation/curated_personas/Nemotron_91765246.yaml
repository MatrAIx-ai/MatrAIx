  career_goals: Joshua dreams of exploring the ocean and protecting sea creatures. He imagines himself growing up to be a marine biologist who studies marine life, or a lifeguard who helps keep beachgoers
    safe. He also wants to be a team captain on his soccer team, showing his leadership and cooperation. His long-term ambition blends his curiosity about nature with a practical desire to help his community.
