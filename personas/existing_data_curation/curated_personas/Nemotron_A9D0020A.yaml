  career_goals: Mark aims to turn his artistic and tech interests into a sustainable career. In the short term, he plans to earn his GED, build a strong portfolio, and enroll in a community college program
    in graphic design or interactive media. He hopes to later transfer to a four‑year university to obtain a bachelor's degree in visual communications. His long‑term ambition is to work as a freelance
    illustrator and UI/UX designer, creating artwork for video games, mobile apps, or indie publishers. Inspired by the coastal environment of Ocean County, he also envisions contributing to environmental
    awareness campaigns that combine design with marine conservation. He seeks internships or mentorships at local studios to gain real‑world experience and refine his professional skills.
