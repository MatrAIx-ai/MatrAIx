  hobbies: '["sketching urban landscapes", "visiting art galleries and murals", "reading sci-fi/fantasy novels", "playing acoustic guitar", "Raspberry Pi electronics projects", "hiking nature trails", "volunteering
    at community art workshops", "strategy video gaming", "photography of sunrise scenes"]'
  career_goals: Jeremiah aspires to merge his artistic vision with technology by pursuing a career in multimedia design, specializing in video game art direction or interactive storytelling. He plans to
    enroll in a Texas university program in graphic design or computer science, seeking internships at local game studios or digital media agencies. Long‑term, he hopes to launch his own indie game development
    studio or work with community organizations to create art‑based outreach programs that foster creativity among youth.
