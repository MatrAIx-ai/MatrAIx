personas:
  professional: An aspiring multimedia designer, Jeremiah Pitre combines his skill in Procreate and Python to prototype interactive game art concepts, and they apply their methodical time‑management and
    collaborative nature to school projects while dreaming of a future indie studio.
  sports: A weekend hiker and occasional pick‑up basketball player, Jeremiah Pitre follows the Dallas Cowboys on Friday nights and cheers for the Texas Rangers in the spring, and they are a member of the
    Rockwall Trail Running Club where they log modest mileage to stay fit.
  arts: A dedicated sketcher and indie‑gallery explorer, Jeremiah Pitre spends Saturdays roaming the Bishop Arts District to study murals by Kelsey Montague and the pop‑surreal work of Shepard Fairey, while
    they unwind with acoustic renditions of George Strait and The Strokes and experiment with digital illustration using Procreate.
  travel: An eager explorer of both nearby and far‑flung locales, Jeremiah Pitre has road‑tripped to Austin for the SXSW festival and hiked the Hill Country, and they dream of a spring pilgrimage to Kyoto’s
    art temples and a summer backpacking stint through the European museums of Paris and Florence.
  culinary: A budding home‑cook with a penchant for Tex‑Mex flavors, Jeremiah Pitre frequently whips up chicken‑fried steak with jalapeño‑cheddar cornbread and enjoys crafting sunrise‑inspired avocado toast,
    while they also experiment with ramen broth recipes after watching Japanese cooking shows.
  core: Jeremiah Pitre is a quietly curious teen who balances Texas modesty with a restless creative drive, sketching sunrise‑lit streets while coding interactive narratives, yet they often forget to finish
    chores in favor of late‑night gaming.
background:
  cultural: Jeremiah grew up in a predominantly white, middle‑class suburb of Rockwall County, Texas, in the town of Nevada. His family’s values emphasize community, modesty, and a strong work ethic typical
    of the region. He was raised with familiar Texan traditions such as Friday night football, county fairs, and country music, while also being encouraged to explore diverse artistic expressions through
    school art programs and online platforms. The blend of traditional Southern culture and the vibrant creative scene of the Dallas‑Fort Worth metroplex has shaped his worldview, making him comfortable
    within his local community yet open to global ideas and unconventional perspectives.
attributes:
  skills: '["digital illustration (Procreate, Photoshop)", "traditional sketching", "basic Python programming", "HTML/CSS web design", "acoustic guitar playing", "creative writing (short stories, poetry)",
