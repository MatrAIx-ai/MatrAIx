  hobbies: '[''Traditional Dominican cooking'', ''Backyard gardening'', ''Reading historical and self‑development books'', ''Crocheting'', ''Church involvement and volunteering'', ''Attending Dominican
    cultural festivals'', ''Dancing merengue and bachata'', ''Walking on the beach'', ''Mentoring grandchildren'']'
  career_goals: Although she is not presently employed, Gladys aims to channel her structured strengths into leadership roles within her community. She aspires to become a volunteer coordinator for her
    church’s food pantry, using her budgeting and event‑planning abilities to streamline service delivery. She also hopes to launch a modest home‑based catering business that highlights family‑style Dominican
    meals, providing a steady supplemental income while preserving cultural heritage. To deepen her impact, she plans to enroll in a bachelor's program in Community Health or Social Work, ultimately seeking
    a role that advocates for senior members of the Dominican diaspora in Broward County.
