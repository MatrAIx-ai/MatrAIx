personas:
  professional: Maria Fernandez, a 27‑year‑old secondary‑school mathematics and science teacher, fuses data‑driven assessment with bilingual, hands‑on inquiry labs—using Python analytics, Google Classroom,
    and interactive whiteboards—while championing culturally responsive STEM curricula that celebrate community festivals and group collaboration, reflecting their curious yet practical mindset and their
    tendency to adapt lesson plans on the fly.
  sports: Maria Fernandez stays active by leading Zumba classes, hiking with the Hill Country Trails Club, and avidly following the Dallas Cowboys, Dallas Mavericks, and FC Dallas, preferring group‑oriented
    workouts that blend familiar cardio with occasional experiments in new fitness apps.
  arts: Maria Fernandez immerses themselves in salsa and bachata nights to the beats of Celia Cruz and contemporary pop icons, devours sci‑fi and mystery novels by Isaac Asimov and Agatha Christie, binge‑watches
    series like Stranger Things, and regularly attends live concerts at the Bass Performance Hall, letting music and literature spark creative classroom connections.
  travel: Maria Fernandez prefers spontaneous weekend getaways, often trekking the Texas Hill Country with their hiking club before swapping the trail for a cultural immersion in a colorful coastal town
    famed for its elaborate Day of the Dead festivities, balancing adventure with a limited budget and occasional family commitments.
  culinary: Maria Fernandez delights in preparing carnitas, mole poblano, and chiles rellenos for friends, expertly melding corn‑masa techniques with fresh cilantro, avocado, and ancho chilies, while also
    treating themselves to occasional taco outings and experimental fusion meals that reflect their curious palate.
  core: Maria Fernandez, a 27‑year‑old bilingual STEM teacher, blends curiosity with a laid‑back streak, constantly juggling spontaneous dance parties, improvised lesson plans, and a habit of forgetting
    to file receipts until tax season.
background:
  cultural: Maria proudly embraces her Mexican heritage, speaking Spanish fluently at home and celebrating traditions like Día de los Muertos, Cinco de Mayo, and family reunions with rich food and music.
    Living in Fort Worth's vibrant Mexican community, she participates in cultural festivals and supports local businesses. Her bicultural perspective informs her teaching, as she incorporates bilingual
    resources, Mexican scientific contributions, and culturally relevant examples to make STEM subjects more accessible and meaningful for her diverse student body.
attributes:
  skills: '[''Mathematics instruction'', ''Science laboratory management'', ''Curriculum development'', ''Educational technology integration'', ''Data analysis with Python'', ''Bilingual communication (Spanish/English)'',
    ''Student mentorship'', ''STEM outreach program coordination'', ''Flexible classroom organization'', ''Collaborative teamwork'']'
  hobbies: '[''Salsa dancing'', ''Cooking Mexican cuisine'', ''Hiking'', ''Volunteering at STEM events'', ''Group fitness classes (Zumba)'', ''Reading sci‑fi and mystery novels'', ''Watching streaming series'',
    ''Attending live music concerts'', ''DIY tech projects'', ''Participating in community potlucks'']'
  career_goals: Maria aims to become the head of the STEM department at her school and pursue a Master's in Educational Leadership within the next three years. She plans to develop an after‑school robotics
    and coding club, design culturally responsive STEM curricula that incorporate Mexican heritage, and earn a bilingual teaching certification. Long‑term, she envisions a district‑level curriculum specialist
    role where she can influence policy and launch a nonprofit focused on expanding STEAM opportunities for underrepresented students in the Fort Worth area.
