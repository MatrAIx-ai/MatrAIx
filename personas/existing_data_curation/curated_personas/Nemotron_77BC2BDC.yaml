  skills: '[''Traditional drawing'', ''Watercolor'', ''Digital illustration'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Basic Python'', ''Data visualization'', ''Bilingual Spanish/English'',
