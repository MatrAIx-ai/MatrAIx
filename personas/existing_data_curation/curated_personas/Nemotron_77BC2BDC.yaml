personas:
  professional: Juan Pineda, a budding concept artist with a solid grounding in traditional drawing, watercolor, and digital illustration, leverages their meticulous project planning and imaginative curiosity—tempered
    by anxiety-driven perfectionism—to produce polished book cover mock-ups and ambient album art while studying for an associate degree in graphic design, balancing solitary studio sessions with occasional
    community curatorial gigs.
  sports: Juan Pineda, an occasional jogger who finds solace in early‑morning walks along the Rio Grande, participates in a local pickup basketball league called the El Paso Amigos, follows the Dallas Mavericks
    and the El Paso Locomotive FC with avid fan enthusiasm, and prefers low‑impact yoga sessions over high‑intensity training.
  arts: Juan Pineda, an introspective visual creator, draws inspiration from Frida Kahlo’s emotive self‑portraits, the dreamy narratives of Hayao Miyazaki, the ethereal soundscapes of Sigur Rós, the speculative
    worlds of Ursula Le Guin, and the subversive street art of Banksy, channeling these influences into ambient digital illustrations that explore anxiety and cultural identity.
  travel: Juan Pineda, a budget‑conscious wanderer, meticulously plans trips using a spreadsheet, favors off‑peak visits to culturally rich cities like Oaxaca, Kyoto, and Barcelona for artistic inspiration,
    enjoys spontaneous day‑trips to Santa Fe’s art galleries, and often postpones longer vacations due to tuition expenses and freelance workload.
  culinary: Juan Pineda, an intermediate home chef, delights in crafting tamales with masa, chilhuacle peppers, and roasted pork, perfects mole negro with dried chiles, cacao, and sesame seeds, and experiments
    with pairing mole with locally sourced corn tortillas while occasionally treating themselves to a gourmet burger at a downtown bistro.
  core: Juan Pineda, a solitary yet organized dreamer, channels their anxiety‑fuelled imagination into art while meticulously budgeting life’s details and quietly curating cultural moments.
background:
  cultural: Juan is a first‑generation Mexican‑American raised in Laredo, Texas, a city straddling the U.S.–Mexico border. He grew up in a bilingual household where Spanish was spoken daily, and Mexican
    traditions such as Día de los Muertos, Las Posadas, and family gatherings were central to his upbringing. His parents instilled an appreciation for Mexican folk art, including alebrijes and Talavera
    pottery, which influences his own artistic style. The rich cultural tapestry of Webb County, with its blend of Texan and Mexican customs, informs his worldview and fuels his desire to represent his
    heritage in his creative work while navigating the challenges of a bicultural identity.
