  hobbies: '[''Sketching'', ''Painting'', ''Digital art'', ''Speculative fiction reading'', ''Philosophy'', ''Poetry'', ''Journaling'', ''Acoustic guitar'', ''Ambient soundscape creation'', ''Mindfulness
    meditation'', ''Cooking Mexican dishes'', ''Volunteering at cultural events'', ''Riverfront walks'']'
  career_goals: Juan aspires to enroll in a community college art program to obtain an associate degree in graphic design, ultimately transferring to a four‑year university for a BFA in illustration. He
    aims to build a freelance client base creating book covers, album art, and concept sketches for indie game developers. In the longer term, he hopes to secure a remote position as a junior concept artist
    with a studio that values diverse perspectives. Juan also wants to organize a solo exhibition that explores themes of anxiety and cultural identity, using his art to raise awareness about mental‑health
    issues within the Mexican‑American community. He plans to seek mentorship and apply for local arts scholarships to support his education and professional development.
