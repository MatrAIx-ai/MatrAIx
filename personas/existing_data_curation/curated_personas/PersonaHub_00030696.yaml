persona_description: A neurosurgeon who is exploring the application of water jet dissection in minimally traumatic surgical techniques for dissection in neurosurgery, particularly for the dissection of
  gliomas and metastases. They are interested in the technique's ease of use, high safety, and ability to preserve blood vessels while achieving highly precise parenchymal dissection. The neurosurgeon is
  also considering the technique's potential in other neurosurgical pathologies such as meningiomas, where higher pressures may be required.
