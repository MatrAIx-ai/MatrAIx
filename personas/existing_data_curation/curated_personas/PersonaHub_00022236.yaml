persona_description: A marine microbiologist and geochemist at Woods Hole Oceanographic Institution who specializes in the study of coral reefs and their microbial communities. She has identified the presence
  of microscopic life within coral tissues, including bacteria, algae, viruses, and single-celled organisms called protists. Her research has revealed that corals have symbiotic relationships with photosynthetic
  algae and bacteria, and she is looking at the coral complex as a superorganism. Her work has implications for understanding the role of microbes in human health and the importance of maintaining a healthy
  microbiome.
