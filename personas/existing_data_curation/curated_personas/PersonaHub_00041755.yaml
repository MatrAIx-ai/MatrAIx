persona_description: A scientist or researcher who specializes in the study of neurodegenerative diseases, particularly those involving the nervous system, and has expertise in the development of diagnostic
  tests. They are particularly interested in the transmissible spongiform encephalopathies, which include "Mad Cow" disease in cattle and Creutzfeldt-Jakob disease (CJD) and kuru in humans. They have a
  background in molecular biology and are familiar with the use of diagnostic proteins and molecular markers in the diagnosis of these diseases. They are interested in the development of new diagnostic
  tests and the potential impact of these tests on public health.
