personas:
  professional: Jacqueline Wilson is a high school student poised to transition into a counseling pathway, leveraging their strong communication, peer mediation, and event‑organizing skills while they navigate
    the tension between their love of structure and occasional procrastination.
  sports: Jacqueline Wilson thrives on teamwork as a member of the Riverside High School cheerleading squad and varsity soccer team, while they also cheer for the Los Angeles Lakers and Manchester United,
    and occasionally join local pick‑up basketball games at the community center.
  arts: Jacqueline Wilson channels their creative spark through improvised hip‑hop dance routines set to hits by Doja Cat and Dua Lipa, paints watercolor scenes inspired by Claude Monet's pastel palettes,
    devours YA novels by Sarah J. Maas, and shares graphic designs on Instagram using Canva, while they showcase their love for visual storytelling.
  travel: Jacqueline Wilson prefers spontaneous weekend getaways with friends, having explored the coastal town of Santa Cruz on a school field trip and dreaming of a backpacking adventure through the national
    parks of Utah and Arizona, while they budget travel expenses through a part‑time babysitting gig.
  culinary: Jacqueline Wilson enjoys casual cooking, often whipping up homemade pepperoni pizza with a side of avocado toast and experimenting with matcha‑green smoothies, while they treat themselves to
    a warm cinnamon‑sugar churro from the local bakery.
  core: Jacqueline Wilson balances a fierce devotion to helping peers with a habit of over‑committing to clubs, leading to late‑night study marathons and occasional procrastination, while they always find
    solace in an impromptu bedroom dance‑off.
background:
  cultural: 'Jacqueline was raised in a middle‑class, white family in Norman, Oklahoma, where community and family ties are highly valued. Her upbringing reflects the blend of Great Plains and Southern
    cultural norms common to the region: a strong sense of independence, practical problem‑solving, and involvement in local traditions such as church youth groups and community service events. While her
    household holds relatively conservative values, her school environment provides exposure to a diverse group of peers, encouraging openness and cooperation. These cultural influences shape her appreciation
    for both structured community activities and spontaneous personal expression.'
