  career_goals: Jacqueline aims to finish her high school education by obtaining a GED and then enroll in a community college program focused on counseling or social work. Her long‑term ambition is to become
    a school counselor or youth mental‑health outreach coordinator, where she can use her empathy and experience with intense emotions to help other teenagers manage anxiety and build resilience. In the
    short term, she plans to volunteer at her local animal shelter and youth center to gain hands‑on experience, while also seeking mentorship opportunities that will develop her leadership and organizational
    skills.
