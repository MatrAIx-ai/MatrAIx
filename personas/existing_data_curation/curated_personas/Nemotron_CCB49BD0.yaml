  hobbies: '[''LEGO building and model kits'',''Chess'',''Nature hikes and rock collecting'',''Scratch coding projects'',''Reading science and engineering books'',''Minecraft creative building'']'
  career_goals: Edwin dreams of becoming an engineer—specifically a civil or mechanical engineer—so he can design bridges, buildings, or machines that are reliable and well‑structured. He is motivated by
    the idea of creating things that last and serve the community. He also imagines future possibilities in computer programming or robotics, where his love for systematic problem solving and calm focus
    could thrive. His short‑term goal is to excel in school science and math classes to prepare for a high‑school engineering program.
