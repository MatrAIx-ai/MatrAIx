personas:
  professional: Theresa Wilson, a retired homemaker turned senior wellness advocate, coordinates community health talks, mentors volunteer event planners, and channels their knack for budgeting and home
    repairs into leading a neighborhood gardening club, while they balance a preference for structured schedules with occasional spur‑of‑the‑moment get‑togethers.
  sports: Theresa Wilson enjoys walking along the riverbank with a local senior walking club, follows the New Orleans Saints football team, attends the St. Charles Parish high‑school football Friday night
    games, and they participate in a weekly senior bowling league at the community center.
  arts: Theresa Wilson delights in singing in their church choir, collects recordings of local zydeco legends like Clifton Chenier, enjoys classic films directed by John Ford, and they spend quiet evenings
    quilting to the sounds of Ella Fitzgerald and traditional fiddle tunes.
  travel: Theresa Wilson prefers short, well‑planned trips to historic river towns such as Natchez and to Gulf Coast beaches like Grand Isle, relishes guided tours of plantation museums, and they dream
    of a leisurely river cruise along the Mississippi to revisit family genealogy sites, all while budgeting travel within their retirement savings.
  culinary: Theresa Wilson excels at preparing gumbo, jambalaya, and crawfish étouffée, preserves garden tomatoes in mason jars, seasons dishes with a pinch of cayenne and a dash of Worcestershire sauce,
    and they delight in sharing homemade boudin with neighbors during weekend gatherings.
  core: Theresa Wilson blends meticulous budgeting with a spontaneous love for community festivals, hoards canned preserves for winter, and they never miss a chance to hum choir hymns while threading a
    new quilt.
background:
  cultural: Theresa was raised in Luling, Louisiana, a community steeped in Southern hospitality, Catholic traditions, and the vibrant Cajun‑Creole heritage of the Gulf Coast. Growing up in a white, working‑class
    family in the mid‑20th century, she absorbed the region's emphasis on family gatherings, church involvement, and preserving local cuisine. The blend of French, Spanish, African, and Native American
    influences that shape the area's food, music, and festivals is reflected in her cooking and participation in community celebrations. Her worldview balances respect for long‑standing customs with a willingness
    to adapt, mirroring the resilient yet flexible spirit of her parish.
attributes:
  skills: '[''Home cooking and Cajun cuisine'', ''Canning and food preservation'', ''Garden planning and horticulture'', ''Basic home repair and maintenance'', ''Household budgeting and financial management'',
    ''Event planning for family and community gatherings'', ''Volunteer coordination for church and community center'', ''Knitting and quilting'', ''Basic computer literacy (email, video calls, digital
    photo organization)'', ''First aid and caregiving'']'
  hobbies: '[''Cajun and Creole cooking'', ''Gardening (vegetables and native flowers)'', ''Quilting and needlework'', ''Genealogy and family history research'', ''Attending church services and choir participation'',
    ''Local history and festival attendance'', ''Reading historical fiction'', ''Walking and birdwatching'', ''Digital photography'', ''Volunteering at community senior center'']'
  career_goals: Although retired from formal employment, Theresa aims to deepen her community involvement by leading a local senior‑focused wellness group, documenting and publishing a family cookbook that
    preserves traditional recipes, and mentoring younger volunteers in event coordination. She also aspires to complete a memoir that intertwines personal history with the cultural heritage of St. Charles
    Parish, ensuring her stories and lessons are passed down to future generations. Maintaining her health and independence so she can continue supporting her husband and care for grandchildren remains
    a central ambition.
