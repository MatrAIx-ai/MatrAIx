personas:
  professional: Miguel Perez, a 73‑year‑old retired educator, leverages their methodical lesson‑planning, curriculum‑design, and conflict‑resolution expertise to mentor new teachers, craft structured bilingual
    resources, and coordinate community‑outreach events, all while their sociable, energetic nature fuels their role as a cultural liaison for the district.
  sports: Miguel Perez, an avid hiker in their seventies, regularly joins the Colorado Trail Club for weekend treks in the foothills, follows the Denver Broncos, Colorado Rockies, and Colorado Avalanche
    with loyal enthusiasm, and balances these outings with gentle stretching routines recommended by their physiotherapist to manage osteoarthritis.
  arts: Miguel Perez, a lifelong aficionado of cultural arts, spends evenings dancing salsa and cumbia to the classic sounds of Juan Gabriel, Los Tigres del Norte, and Vicente Fernández, while also savoring
    historical novels by authors such as Carlos Fuentes and drawing creative inspiration from the murals of Diego Rivera.
  travel: Miguel Perez, who loves thoughtfully planning trips with their wife, has hiked the Grand Canyon and explored the artistic streets of Santa Fe, while dreaming of a leisurely cruise to the historic
    towns of Andalusia, Spain and a cultural pilgrimage to the colonial plazas of San Miguel de Allende.
  culinary: Miguel Perez, a passionate home cook, grows their own chilies, tomatoes, and oregano in a modest garden and transforms them into beloved family recipes like mole, tamales, and fresh salsa verde,
    while their moderate cooking skill shines at community festivals where the aroma of roasted corn masa and tangy pickled jalapeños fill the air.
  core: Miguel Perez, a structured yet socially vibrant septuagenarian, balances meticulous garden planning and curriculum mentoring with occasional bursts of anxiety and a habit of over‑watering their
    beloved chili plants.
background:
  cultural: Miguel is a first‑generation Mexican‑American whose parents emigrated from Michoacán. He grew up bilingual, steeped in Catholic traditions, and continues to celebrate Día de los Muertos, las
    Posadas, and other Mexican holidays with his family and local community. He remains connected to the vibrant Mexican‑American enclave in El Paso County, often serving as a bridge between his cultural
    roots and the broader Colorado Springs community by sharing traditions, food, and stories.
attributes:
  skills: '[''Classroom Teaching'', ''Curriculum Development'', ''Bilingual Education (Spanish-English)'', ''Lesson Planning'', ''Community Outreach'', ''Event Planning and Coordination'', ''Conflict Resolution'',
    ''Mentoring and Coaching'', ''Adult Literacy Instruction'']'
  hobbies: '[''Gardening (chilies, tomatoes, herbs)'', ''Hiking in the Colorado foothills'', ''Cooking Mexican cuisine'', ''Attending Hispanic heritage festivals'', ''Dancing (salsa, cumbia)'', ''Playing
    bridge and card games'', ''Listening to regional Mexican music'', ''Volunteer work at senior community center'', ''Reading historical novels about Mexico'']'
  career_goals: Although retired, Miguel aims to stay actively involved in education by mentoring new teachers and creating bilingual curriculum resources for El Paso County schools. He hopes to serve as
    a cultural liaison between the local school district and the Mexican‑American community, volunteer as a senior‑center coordinator, support his grandchildren’s academic pursuits, and eventually compile
    his life stories and family recipes into a memoir‑cookbook that celebrates his heritage.
