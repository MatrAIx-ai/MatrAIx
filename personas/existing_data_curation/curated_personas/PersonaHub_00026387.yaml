persona_description: A technology enthusiast who is interested in the convergence of telecommunications and Internet technologies. This person is likely to be aware of the advancements in Internet connectivity
  and the potential for widespread deployment of new download-on-demand applications. They are also interested in the development of "Internet on a chip" technologies and the use of these technologies in
  appliances and utility meters. This person is likely to be familiar with the concept of "always-on" Internet connectivity and the potential benefits it offers, such as the ability to retrieve information
  from a microwave oven or a microwave oven that can retrieve recipes over the Internet. They may also be interested in the potential impact of the Internet on the world and the future of the Internet as
  a common communications sinew.
