    streamlining'']'
  hobbies: '[''Reading mystery novels'', ''Gardening (vegetables and herbs)'', ''Knitting and crocheting'', ''Journaling'', ''Cooking comfort meals'', ''Birdwatching'', ''Walking in local nature trails'']'
  career_goals: Ashlee aims to move from her current support role into an office manager or operations supervisor position within the next two to three years, leveraging her knack for process efficiency
    and her growing expertise in budgeting. She plans to earn a Certified Administrative Professional (CAP) credential and eventually complete a bachelor's degree in business administration to broaden her
    strategic outlook. Long‑term, she envisions running her own freelance administrative consultancy, helping other small businesses in rural Illinois implement reliable office systems while maintaining
    the flexibility she values. Stability and a clear path for advancement are central to her career ambitions, as they help offset the stress she often feels in an unpredictable work environment.
