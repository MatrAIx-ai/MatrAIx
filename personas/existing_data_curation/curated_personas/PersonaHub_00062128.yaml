persona_description: A historian or archivist who specializes in the study of colonial land tenure systems in Ceylon during the 17th and 18th centuries. Their expertise lies in the compilation and analysis
  of historical records, particularly those related to the Portuguese and Dutch land registers known as the Tombo. They are knowledgeable in the traditional system of land tenure in Ceylon, its complexities,
  and the changes in land administration during this period. They have a keen interest in the effects of these land registers on the economy, society, and politics of the region. They are also skilled in
  the use of historical records and the interpretation of their significance.
