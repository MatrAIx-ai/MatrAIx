personas:
  professional: Johnny Whitten, a 13‑year‑old budding robotics hobbyist, merges a love for LEGO Mindstorms programming with strategic gaming insights, applying practical problem‑solving while staying organized
    enough to keep school projects on schedule, and often volunteers to mentor younger classmates in the science club.
  sports: Johnny Whitten dominates after‑school pick‑up basketball games at the neighborhood park, proudly cheering for the Chicago Bulls while playing for the city’s Under‑14 recreational league, and squeezes
    in weekend skateboarding sessions to stay agile, balancing competitive drive with a love for teamwork.
  arts: Johnny Whitten strums acoustic renditions of Green Day and Imagine Dragons on a second‑hand guitar, devours sci‑fi epics from Isaac Asimov and Liu Cixin, and attends monthly comic‑book art workshops,
    weaving music, literature, and visual storytelling into a creative outlet that fuels their imaginative engineering projects.
  travel: Johnny Whitten dreams of visiting the Kennedy Space Center and Japan’s Akihabara district, meticulously mapping museum tours and tech exhibitions for school field trips while also demanding extra
    time to roam the aisles of local comic shops on weekend getaways, blending structured itineraries with spontaneous exploration.
  culinary: Johnny Whitten favors pepperoni pizza, cheesy quesadillas, and occasional sushi rolls, often whipping up quick microwave mac & cheese or experimenting with a DIY taco night that includes fresh
    cilantro and lime, revealing a budding culinary curiosity tempered by a preference for familiar, flavorful comfort foods.
  core: Johnny Whitten balances a relentless curiosity for robots and sci‑fi with a disciplined allowance‑budget and occasional gaming binge, yet habitually forgets to complete homework until the last minute,
    shouting excitement whenever a LEGO gear clicks into place.
background:
  cultural: Johnny grew up in Irving, Texas, a diverse suburb of the Dallas‑Fort Worth metroplex. His family’s European ancestry places him within a predominantly white cultural context, yet the multicultural
    environment of the city—marked by a strong Hispanic presence and a blend of Southern and Southwestern traditions—has given him exposure to varied cuisines, music, and community values. He celebrates
    typical American holidays such as Thanksgiving and the Fourth of July, often with Texas‑style BBQ and regional customs like football gatherings. The local public middle school fosters an inclusive atmosphere,
    where Johnny learns to appreciate diversity, cooperation, and community service, shaping his compassionate and cooperative outlook.
