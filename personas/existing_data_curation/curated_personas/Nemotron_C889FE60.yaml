  career_goals: Johnny aspires to combine his love for technology and helping others by pursuing a career in software engineering focused on educational technology. He imagines developing interactive learning
    apps that make STEM subjects accessible and engaging for his peers. In the longer term, he hopes to attend a university with a strong computer science program, earn a degree, and eventually work on
    projects that support under‑served communities. Alongside his technical ambitions, he remains open to roles that involve mentorship, community outreach, or interdisciplinary work that bridges engineering
    and social impact.
