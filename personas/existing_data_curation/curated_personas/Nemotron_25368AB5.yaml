  hobbies: '["Cooking Mexican cuisine", "Watching soccer (Liga MX, MLS)", "Listening to regional Mexican music", "Playing pool/billiards", "Jogging in local parks", "Car restoration", "Video gaming (FIFA,
    NBA 2K)", "Community volunteering (youth mentorship)", "Attending cultural festivals (Día de los Muertos)", "Reading true‑crime books", "Meditation and journaling"]'
  career_goals: Ramon aims to advance from his current supervisory role to a regional sales manager position, overseeing multiple locations within Southern California. To achieve this, he plans to earn
    a bachelor’s degree in business administration and obtain a Certified Professional Sales Leader (CPSL) certification. He also wants to implement more systematic processes that reduce daily stress for
    his team and improve overall efficiency. Long‑term, he hopes to secure financial stability for retirement and perhaps launch his own small distribution business that leverages his knowledge of the local
    market and his Mexican‑American network.
