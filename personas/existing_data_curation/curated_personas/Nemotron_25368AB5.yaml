personas:
  professional: Ramon Medina is a first‑line supervisor of a non‑retail sales team in Southern California, leveraging bilingual communication, CRM analytics, and a hands‑on, structure‑oriented yet flexibly
    disorganized leadership style to keep the crew on track while they quietly wrestle with the stress of meeting daily quotas.
  sports: Ramon Medina is an avid soccer enthusiast who watches Liga MX clubs like Club América and MLS teams such as LAFC at a local sports bar, jogs nightly in a neighborhood park, and they also participate
    in a community‑center 5‑k run club that meets every Saturday.
  arts: Ramon Medina enjoys regional Mexican music, with a particular fondness for Vicente Fernández and Los Tigres del Norte, and frequently attends Día de los Muertos festivals where they admire traditional
    mask makers and folk dance performances, while relaxing with classic Mexican cinema starring Pedro Infante.
  travel: Ramon Medina prefers moderately planned road trips, having recently driven to Oaxaca to explore authentic mole recipes and planning a future visit to San Diego’s coastal trails, but they also
    indulge in spontaneous weekend getaways to nearby mountain towns when work stress peaks.
  culinary: Ramon Medina cooks with confidence, mastering tacos al pastor with pineapple‑marinated pork and complex mole poblano simmered with chilies, chocolate, and cumin, and they delight in sourcing
    fresh cilantro, chipotle peppers, and masa harina at local farmers’ markets before sharing meals with friends at home.
  core: Ramon Medina balances a structured sales career and a love for Mexican culinary traditions with a habit of over‑committing to car restorations, occasional financial worry, and a persistent undercurrent
    of stress that fuels both their drive and their late‑night tacos, which they claim keeps them motivated.
background:
  cultural: Ramon is a first‑generation Mexican‑American who grew up in a bilingual household in South Los Angeles. His parents immigrated from Jalisco, and family gatherings were filled with traditional
    food, music, and celebrations such as Día de los Muertos and Cinco de Mayo. Living in Compton, he has woven together the vibrant Mexican cultural roots of his upbringing with the urban, multicultural
    environment of Los Angeles County. This dual heritage informs his social connections, culinary preferences, and community involvement, and he takes pride in acting as a bridge between his Mexican community
    and the broader American society.
attributes:
  skills: '["Team leadership", "B2B sales operations", "CRM management (e.g., Salesforce)", "Performance analytics", "Shift scheduling", "Conflict resolution", "Bilingual communication (Spanish/English)",
