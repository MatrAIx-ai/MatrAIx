  career_goals: Martha aims to earn her EPA Section 608 certification within the next year and obtain a Massachusetts Mechanical Permit, positioning herself as a fully qualified HVAC technician. She hopes
    to specialize in energy‑efficient and renewable‑energy HVAC solutions, eventually becoming a lead installer for green retrofits. Long‑term, she envisions starting her own small, women‑friendly HVAC
    service firm that emphasizes sustainable practices and offers mentorship to other young women entering the trades. Balancing her career ambitions with her emotional well‑being, she plans to incorporate
    flexible scheduling and mindfulness strategies to manage anxiety while advancing her technical expertise.
