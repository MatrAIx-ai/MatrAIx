persona_description: A historian and archaeologist who specializes in the study of prehistoric and neolithic sites, particularly those in Scotland. He is particularly interested in the Clyde Cairns group
  and the Achnacreebeag chambered tomb, and has written extensively on these topics. He is knowledgeable about the history and archaeology of the site, including its construction and purpose, and is familiar
  with the various names given to the site. He is also an expert on neolithic pottery and has worked on excavations of similar sites. He has a keen interest in the supernatural and has heard stories about
  the site, including the lights that were said to be seen in dark nights.
