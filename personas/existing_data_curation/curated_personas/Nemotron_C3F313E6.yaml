personas:
  professional: A 13‑year‑old budding digital artist and game developer, Ricky Phillips blends hand‑drawn sketches with Scratch and Python mini‑games, channeling their curiosity and methodical nature into
    quiet, after‑school creative sessions.
  sports: Ricky Phillips enjoys solo kayaking with the Coastal Marsh Youth Kayak Club in the spring, follows the Baltimore Orioles in baseball and the Washington Capitals in hockey on TV, and occasionally
    participates in school intramural soccer, though they prefer quiet, individual activity.
  arts: Ricky Phillips immerses themselves in drawing, digital painting, and storytelling, drawing inspiration from the fantastical worlds of Hayao Miyazaki, the street‑art mystique of Banksy, the soulful
    jazz of John Coltrane, and the lyrical flow of classic hip‑hop icons like A Tribe Called Quest, while regularly attending the community’s weekend art fair.
  travel: Ricky Phillips prefers meticulously planned getaways to quiet natural spots, having explored Assateague Island’s wild dunes and the historic streets of Washington D.C., and they dream of bird‑watching
    in Kyoto’s gardens and chasing the Northern Lights in Iceland, all within the constraints of school holidays and parental budgets.
  culinary: Ricky Phillips, an intermediate home cook, loves crafting shrimp tacos with fresh avocado, simmering creamy New England clam chowder, and rolling simple sushi with nori, soy sauce, and pickled
    ginger, often seasoning dishes with a pinch of smoked paprika inspired by their love of bold flavors.
  core: Ricky Phillips, a quiet 13‑year‑old dreamer, channels endless curiosity into sketches and code, hoards seashells in a secret drawer, stays up late perfecting pixel art, and can’t resist the hum
    of jazz while they work.
background:
  cultural: Ricky is an African‑American adolescent growing up in Saint Marys, a small town on Georgia’s coastal plain. His family maintains strong ties to the local Black church, where gospel music and
    community service are central. He has been raised with a deep respect for Southern hospitality and the rich oral histories of the Gullah‑Geechee descendants who lived along the nearby low‑country waterways.
    Through family stories and school curriculum, he is aware of the civil‑rights legacy of the Southeast and feels connected to the broader narrative of Black artistic expression, from blues and jazz to
    contemporary hip‑hop. This cultural milieu informs his appreciation for rhythm in music, storytelling traditions, and a desire to use his art to celebrate and reflect his community’s heritage.
