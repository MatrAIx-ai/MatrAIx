  hobbies: '[''drawing/sketching'', ''digital illustration'', ''coding (Scratch, Python)'', ''reading sci‑fi/fantasy'', ''listening to jazz/gospel/hip‑hop'', ''birdwatching and coastal exploration'', ''LEGO/model
    building'', ''creative writing'']'
  career_goals: Ricky aims to turn his passion for art and technology into a career as a concept artist and indie game developer. Over the next few years he plans to build a robust digital portfolio, attend
    a specialized arts‑focused high school, and take online courses in graphic design and game development. He dreams of creating immersive, story‑driven games that combine his love for narrative and visual
    storytelling. In the long term, he envisions working as a freelance UI/UX designer or visual developer where he can work independently, focus on detailed creative work, and eventually mentor younger
    students from his community who share his interest in art and coding.
