persona_description: A New Mexico kindergarten teacher who is committed to providing the best possible education for children in the state. The teacher is experienced in using the PreK Observational Assessment
  tool to monitor the development of students and use the results to inform their curriculum and instructional planning. The teacher is dedicated to ensuring that the tool is appropriate for use with New
  Mexico's diverse student population and that it contains culturally sensitive content. The teacher is excited to be a part of the implementation of the KOT and is looking forward to seeing the positive
  impact it will have on the education of New Mexico's kindergarten students.
