  career_goals: Jessica aims to advance to a senior audit manager or partner role with a focus on sustainability accounting and ESG reporting, positioning herself as a thought leader in integrating technology
    and responsible finance. She intends to earn the Certified Public Accountant (CPA) designation (if not already held) and add a Certified Fraud Examiner (CFE) credential. Mentorship is a priority; she
    plans to develop structured programs for junior accountants and spearhead community financial‑literacy workshops. Long‑term, Jessica envisions launching a boutique advisory firm that serves nonprofit
    arts organizations, leveraging her love for art and finance to help cultural institutions thrive while championing diversity and inclusion within the accounting profession.
