personas:
  professional: Jessica Satterlee, a 53‑year‑old senior audit professional, blends 25 years of public‑accounting expertise in GAAP/IFRS compliance, forensic investigations, and ESG reporting with a curiosity
    for AI and blockchain, leveraging meticulous project management and a collaborative, compassionate style to mentor junior staff and drive sustainable finance solutions.
  sports: Jessica Satterlee hits the trails of the Angeles National Forest with the Sierra Club hiking group each weekend, practices Vinyasa yoga at a downtown studio, and roots for the Los Angeles Dodgers,
    the Lakers, and the Rams, occasionally joining a community softball league for casual competition.
  arts: Jessica Satterlee immerses herself in the Los Angeles art scene, regularly attending openings featuring works by Yayoi Kusama and Jeff Koons at LACMA, painting delicate watercolors inspired by Georgia
    O'Keeffe’s desert blossoms, and quoting philosophers like Heidegger while they discuss recent exhibitions with fellow enthusiasts.
  travel: Jessica Satterlee plans her travel itineraries months ahead, favoring immersive cultural tours to Barcelona’s Gothic Quarter, Florence’s Uffizi Gallery, and Kyoto’s Nishiki Market, blending guided
    museum visits with spontaneous tapas evenings, and they keep a scrapbook of pressed petals and ticket stubs as a personal reminder of each journey.
  culinary: Jessica Satterlee, an avid Mediterranean home chef, perfects dishes like grilled branzino with preserved lemons, ratatouille layered with zucchini and eggplant, and a saffron‑infused paella,
    while they delight in sourcing fresh basil, Kalamata olives, and heirloom tomatoes from the local farmer’s market and occasionally overindulge in dessert wine after a long cooking session.
  core: Jessica Satterlee is a meticulous, art‑loving accountant who balances numbers and creativity, mentors generously, and fuels her curiosity through hiking, yoga, and Mediterranean cooking, though
    she sometimes overcommits to community workshops.
background:
  cultural: Jessica grew up in suburban Southern California within a middle‑class Anglo‑American family that prized education, hard work, and community service. The multicultural tapestry of Los Angeles
    County, especially the strong Hispanic presence in the Valencia area, shaped her inclusive worldview and sparked an interest in learning Spanish. Frequent family trips to museums, theater performances,
    and cultural festivals fostered an early appreciation for the arts. Her upbringing combined a traditional work ethic with progressive values, encouraging civic engagement, respect for diverse perspectives,
    and a lifelong curiosity about new ideas and experiences.
