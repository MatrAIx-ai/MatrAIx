persona_description: A software engineer who specializes in C++ programming and has expertise in handling optional objects. They are familiar with the use of pointers to refer to optional objects and have
  experience in using smart pointers to handle the details of shallow copying. They are also skilled in using the OptionalPointee concept to convey the notion of optionality in expressions that use dereference
  and access operators. They have a deep understanding of the limitations of pointers for handling optional objects and are aware of the benefits of using automatic storage and deep-copy semantics to manipulate
  optional values. They are proficient in using the OptionalPointee concept to handle the access to the possibly undefined value because of the idiomatic aid present in the concept.
