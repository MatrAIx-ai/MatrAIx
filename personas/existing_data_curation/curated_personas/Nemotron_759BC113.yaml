  hobbies: '[''Cooking (Soul Food)'', ''Reading Contemporary Fiction'', ''Walking/Exploring Neighborhood'', ''Yoga and Mindfulness'', ''Hip-Hop/R&B Dance Classes'', ''Volunteering at Food Bank'', ''Community
    Clean-up Events'', ''Gardening'', ''DIY Home-Decor Projects'']'
  career_goals: Baria aims to transition from floor sales associate to a supervisory role within the next two years, targeting a position as assistant store manager. She plans to enroll in an online bachelor's
    program in business administration to complement her practical experience. Her longer-term ambition is to become a district manager overseeing multiple stores in Maryland, where she can apply her knack
    for people-centric leadership and community-focused merchandising. Additionally, she harbors a desire to someday open her own boutique that showcases locally sourced products and celebrates African-American
    craftsmanship, blending her retail expertise with her cultural heritage.
