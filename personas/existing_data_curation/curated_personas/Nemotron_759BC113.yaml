personas:
  professional: Baria Ferguson is a retail sales associate in Baltimore who leverages her curiosity and practical knack for visual merchandising and conflict resolution to craft community-focused store
    displays, while they are quietly pursuing an online business administration degree and eyeing a promotion to assistant manager within two years.
  sports: Baria Ferguson enjoys weekend pick‑up basketball at a local community center, follows the Baltimore Ravens with fervor, supports the Baltimore Orioles during the baseball season, and participates
    in a city‑run 5K charity run each spring, all while they balance a casual membership at the neighborhood gym.
  arts: Baria Ferguson finds creative release in hip‑hop and R&B dance classes, draws inspiration from gospel choirs and artists like Kirk Franklin and Beyoncé, regularly attends live music nights at Baltimore’s
    legendary club The Ottobar, and they curate a modest collection of heritage‑inspired prints for their home décor projects.
  travel: Baria Ferguson prefers low‑key road trips along the Chesapeake Bay, frequently revisits their family’s summer spot in the Virgin Islands for its island cuisine and reggae rhythms, dreams of exploring
    New Orleans’ music scene and soul‑food eateries, and they plan trips around community volunteer events.
  culinary: Baria Ferguson loves cooking classic soul‑food dishes such as fried chicken, collard greens with smoked turkey, and jambalaya, often spicing them up with fresh herbs from their garden like basil
    and thyme, and they’re known among friends for perfecting the sweet‑and‑spicy glaze on sweet potatoes.
  core: Baria Ferguson blends a relaxed, people‑first attitude with a practical curiosity, turning everyday retail challenges into community‑building opportunities while they juggle ambitions, garden experiments,
    and spontaneous dance moves.
background:
  cultural: Baria grew up in the Baltimore metropolitan area as part of a close-knit African-American family with roots extending to the Southern United States and the Caribbean. Her upbringing was shaped
    by the rich tradition of gospel music, church community gatherings, and family-cooked soul food, which instilled a strong sense of community, resilience, and appreciation for cultural expression. She
    often participates in local cultural festivals such as the Baltimore Afro-American Museum events and the Maryland Juneteenth celebration. These experiences have fostered her commitment to harmony, cooperative
    relationships, and giving back to her community, which are reflected in both her professional demeanor and personal interests.
