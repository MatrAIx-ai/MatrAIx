  career_goals: Lisa aims to modernize the McKinleyville post office by introducing greener delivery methods, such as electric vehicles and optimized routing, while preserving a personal touch in customer
    service. She envisions creating a regional literacy initiative that partners the post office with local schools and libraries, leveraging her educational background. Over the next five years she hopes
    to advance to a regional supervisory role, mentor emerging postal leaders, and spearhead a community art program that showcases local artists' work on postal walls and limited‑edition stamps. Her long‑term
    ambition is to blend operational excellence with cultural enrichment, positioning the postal service as a hub of community connection.
