personas:
  professional: Carlos Cabrera, a methodical two‑year‑old, approaches block play like a fledgling engineer, carefully sorting shapes by color and size, planning miniature skyscrapers before construction,
    and they feel a surge of pride when the tower stays upright, balancing a natural curiosity for new configurations with a practical insistence on stability.
  sports: Carlos Cabrera, an energetic two‑year‑old, revels in weekly sessions with the local Mini Kickers soccer club and enjoys cheering for the Los Angeles Dodgers on family TV nights, frequently challenging
    peers to see who can run the fastest, while they sometimes feel nervous about new games and prefer the familiar playground slide.
  arts: Carlos Cabrera, a sociable two‑year‑old, spends afternoons drawing crayon portraits of Peppa Pig and Mickey Mouse, eagerly singing along to Baby Shark and Sesame Street songs, and while they adore
    the bright colors of Dr. Seuss books, they occasionally question why a new coloring book feels different, preferring familiar characters.
  travel: Carlos Cabrera, a curious two‑year‑old, loves family road trips to the nearby beach in Santa Monica and weekend visits to Grandma’s house in Austin, eagerly packing a small backpack with a favorite
    stuffed rabbit, and while they dream of a future trip to Disney World, they can become distressed if travel plans change at the last minute.
  culinary: Carlos Cabrera, a picky yet adventurous two‑year‑old, favors macaroni and cheese with a sprinkle of cheddar, crunchy apple slices, and chicken nuggets dipped in honey mustard, often insisting
    on the exact same brand of yogurt, and while they occasionally try new foods like avocado toast, they can become fussy and refuse when textures feel unfamiliar.
  core: Carlos Cabrera, a methodical yet restless two‑year‑old, balances a fierce curiosity with a love for order, thriving on group play while they quietly worry about losing control of their tiny world.
background:
  cultural: Carlos was raised in a bilingual Hispanic household in Panama City, Florida, where Spanish is spoken at home and English is used in school and the community. His family celebrates traditional
    Panamanian holidays such as Carnaval and religious events like Semana Santa, sharing foods like empanadas and pescado frito. He participates in local community festivals that feature salsa and reggae
    music, and he enjoys dancing to these rhythms. The close-knit Latino neighborhood fosters strong family ties and a sense of belonging, influencing his sociable personality and his appreciation for both
    cultural traditions and modern American customs.
