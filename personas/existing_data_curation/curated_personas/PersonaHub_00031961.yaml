persona_description: A medical practitioner who specializes in kidney disease and kidney transplant, particularly in Zambia. They are experienced in managing kidney patients and have a track record of reducing
  the number of patients requiring dialysis. They are aware of the rising trend of kidney disease in Zambia and are working towards expanding dialysis services and intensifying efforts for kidney transplants.
  They are also aware of the challenges faced by patients outside Lusaka in accessing dialysis services and are working towards addressing these challenges. They are committed to improving renal care and
  reducing the cost of kidney transplant procedures in Zambia.
