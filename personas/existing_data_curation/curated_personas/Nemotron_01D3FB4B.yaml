personas:
  professional: Maria Ross, a seasoned diagnostic medical sonographer with expertise in obstetric, abdominal, and vascular ultrasound, leverages her curiosity and practicality to deliver high‑quality images
    while competitively pursuing the department’s lead sonographer role, even as her relaxed approach to scheduling sometimes leads to a cluttered workbench.
  sports: Maria Ross enjoys staying active through salsa dancing at Miami’s Latin clubs, leading a neighborhood walking group, attending Miami Heat games, and cheering for the Miami Dolphins, while also
    participating in a local senior volleyball league that meets on Saturday mornings.
  arts: Maria Ross immerses herself in the arts by dancing to the rhythms of Marc Anthony and Celia Cruz, discussing Agatha Christie mysteries in her book club, and attending performances at the Miami Theatre
    Center that showcase Afro‑Caribbean music and dance.
  travel: Maria Ross prefers spontaneous weekend escapes to the Everglades or South Florida beaches, while also dreaming of a cultural tour of Havana and a culinary pilgrimage to Barcelona, balancing her
    love of adventure with a modest travel budget that she funds through a dedicated savings account.
  culinary: Maria Ross, an enthusiastic home cook, experiments with Afro‑Caribbean dishes such as jerk chicken, plantain mofongo, and callaloo soup, often sourcing fresh Scotch bonnet peppers and coconut
    milk, and delights friends with potluck spreads featuring mango salsa and rum‑glazed pork.
  core: Maria Ross blends medical precision with salsa flair, juggling a competitive edge at work with a relaxed, sometimes disorganized lifestyle that fuels her love for community, dance, and flavorful
    cooking.
background:
  cultural: Maria identifies as a Black American with deep roots in Miami's vibrant Afro‑Caribbean community. Her family heritage includes Jamaican and Haitian influences, reflected in the food, music,
    and holiday traditions she celebrates. Growing up in a bilingual environment, she speaks English fluently and picks up conversational Spanish and Haitian Creole during community interactions. Maria's
    cultural identity is shaped by gospel and R&B music, church fellowship, and a strong sense of community responsibility, which motivates her involvement in local health outreach programs aimed at culturally
    diverse populations.
attributes:
  skills: '[''Obstetric and fetal ultrasound'', ''Abdominal imaging'', ''Vascular Doppler studies'', ''Echocardiography'', ''3D/4D ultrasound'', ''Elastography'', ''DICOM workflow management'', ''Equipment
    troubleshooting'', ''Patient counseling and education'', ''Mentoring junior sonographers'']'
  hobbies: '[''Salsa dancing'', ''Leading community walking groups'', ''Church health fair volunteering'', ''Afro‑Caribbean cooking'', ''Hosting potluck gatherings'', ''Mystery book club'', ''Yoga practice'',
    ''Weekend trips to the Everglades and beaches'']'
  career_goals: Maria aims to become the lead sonographer for her department, overseeing quality assurance and spearheading training programs for new hires. She hopes to earn the RDMS (Registered Diagnostic
    Medical Sonographer) certification in advanced fetal echocardiography and to develop a community outreach initiative that offers prenatal ultrasound screenings and education to under‑served Black and
    Caribbean families in Miami. Long‑term, she envisions teaching part‑time at a local community college and possibly consulting on the implementation of new ultrasound technologies in small clinic settings.
