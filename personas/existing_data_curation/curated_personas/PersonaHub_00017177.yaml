persona_description: A Mexican university researcher and scientist specializing in the development of nanotechnology-based catalysts for reducing vehicular pollution. He is part of a team at the National
  University of Mexico (UNAM) located in the northwest state of Baja California, and has been working on this project for three years. He has developed two types of nanocatalysts for sulfur removal in the
  refinement process of gasoline and diesel, which have reduced the sulfur content to 10 parts per million, as per international regulations. The nanocatalysts are part of the fifth generation of catalytic
  converters and are the first to be designed from nanotechnology. He is currently testing the compound to scale up the process to an industrial level and has presented a preview of the progress to Pemex,
  which is interested in carrying out the test at a refinery. The project was funded by the Energy Secretariat (Sener) and the National Council of Science and Technology (CONACyT) with more than 66 million
  Mexican pesos. The project was created by the Physics and Material Research Institute, the Center of Applied Sciences and Technological Development at UNAM, the University of Veracruz, the Autonomous
  Metropolitan University, the Autonomous University of Baja California, the University of Papaloapan, the University of Texas, and the Institute of Catalysts and Environment Research from Lyon, France.
