personas:
  professional: Brenda Swain leverages her 35‑year civil engineering career and meticulous routine to mentor high‑school students, drafting clear project plans with AutoCAD and Excel while insisting on
    regulatory compliance and consistent documentation.
  sports: Brenda Swain enjoys leisurely walks on the Patapsco River trail, follows the Baltimore Orioles baseball team, participates in a senior walking club that meets twice a week, and plays bridge competitively
    at the local senior center, maintaining light activity while avoiding high‑impact sports.
  arts: Brenda Swain spends afternoons in the senior book club dissecting Ken Follett's historical novels, stitches quilts inspired by traditional tartan patterns, sings hymns like 'Amazing Grace' in her
    church choir, and relaxes to Ella Fitzgerald’s jazz standards while visiting the Baltimore Museum of Art to admire Monet's water lilies.
  travel: Brenda Swain prefers relaxed, family‑centered travel, planning trips to visit her grandchildren in Ohio, taking weekend getaways to historic sites such as Colonial Williamsburg and Shenandoah
    National Park, and using senior discount packages to keep expenses modest.
  culinary: Brenda Swain cultivates basil, thyme, and rosemary in her garden to flavor her signature herb‑infused pot roast and baked chicken, lovingly prepares the family's classic apple crumble and fresh
    sourdough bread, and enjoys experimenting with seasonal heirloom vegetables, reflecting an intermediate cooking skill set.
  core: Brenda Swain blends engineering precision with a devotion to tradition, maintaining a routine of gardening, quilting, and community mentorship while navigating senior life’s quirks and occasional
    forgetfulness.
background:
  cultural: Brenda was raised in a middle‑class, Anglo‑American family in the Mid‑Atlantic region, where longstanding community ties and Protestant (United Methodist) values emphasized hard work, modesty,
    and service. Her parents encouraged academic achievement and practical skills, leading her to pursue a STEM education at a time when few women entered the field. The cultural milieu of Maryland, with
    its blend of suburban stability and close‑knit neighborhoods, fostered her appreciation for routine, tradition, and civic involvement. These influences continue to shape her worldview, guiding her daily
    habits, volunteer commitments, and the importance she places on family and community continuity.
