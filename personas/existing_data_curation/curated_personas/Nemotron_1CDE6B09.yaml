personas:
  professional: Gisselle Vila, an aspiring robotics tinkerer, blends methodical planning with a curiosity for new ideas, leading her school robotics club to design simple autonomous machines, mentor younger
    teammates through basic coding lessons, and document every prototype with detailed sketches in her notebook, ensuring they stay on schedule and meet competition deadlines.
  sports: Gisselle Vila runs with the school's cross‑country team in the fall, plays recreational soccer on Saturdays for the local youth club Cerro Verde FC, follows the national football team in World
    Cup qualifiers, and roots for the Chicago Bulls during winter, balancing structured training with occasional binge‑watching of sports highlights.
  arts: Gisselle Vila expresses creativity through acoustic guitar, mastering modern pop chords from Ed Sheeran and traditional folk melodies from her heritage, while her watercolor sketches echo the vibrant
    palettes of Frida Kahlo and the whimsical line work of Hayao Miyazaki, and she regularly watches Lin‑Manuel Miranda’s musical productions for artistic inspiration.
  travel: Gisselle Vila prefers meticulously planned weekend getaways, having explored the historic colonial town near home and the volcanic lake region with family, while dreaming of an exchange semester
    in Kyoto, Japan and a backpacking trek through the Peruvian Andes to Machu Picchu.
  culinary: Gisselle Vila, a competent home cook at fifteen, enjoys mastering traditional dishes like pepian and kak'ik, alongside perfecting avocado toast with lime zest and poached eggs, and can recreate
    a flavorful chicken tortilla soup using roasted corn, tomatillo, cilantro, and chipotle for a smoky kick.
  core: Gisselle Vila fuses methodical curiosity with artistic flair, balancing robotics projects, guitar practice, watercolor brushes, and community tutoring, all while juggling teenage chores and a habit
    of procrastinating on homework until the last minute.
background:
  cultural: Gisselle's cultural background is rooted in her Guatemalan heritage. Her parents immigrated to the United States before she was born, and Spanish is spoken at home alongside English. Family
    gatherings often feature traditional foods such as pepian, tamales, and atole, and celebrations include Guatemalan holidays like Día de los Santos. Living in Powder Springs, GA, she is part of a growing
    Latinx community that maintains cultural ties through local events, Spanish-language church services, and community festivals. Gisselle takes pride in her Mayan ancestry, which influences her interest
    in history and art, and she balances preserving these traditions with integrating into her American school environment.
