  career_goals: Looking ahead, Gisselle aims to pursue a career that blends her curiosity about science with her desire to make a tangible difference in people's lives. She plans to attend a STEM-focused
    high school and eventually study biomedical engineering or nursing, with a particular interest in developing affordable health solutions for underserved communities, especially among Latino families.
    Gisselle also hopes to leverage her bilingual abilities by serving as a cultural liaison or health educator, bridging language gaps in medical settings. Ultimately, she envisions herself thriving in
    a collaborative environment where she can apply her methodical problem-solving skills and compassionate nature.
