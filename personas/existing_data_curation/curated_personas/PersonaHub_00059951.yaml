persona_description: A scientist who specializes in the field of molecular genetics, particularly in the study of programmed cell death and autophagy. She is known for her pioneering work in identifying
  key cell death genes, developing a gene hunting method, and discovering the epigenetic silencing mechanism in cancer. She has made significant contributions to the field of programmed cell death research
  and has been recognized with the Israel Prize for Life Sciences. Her research is supported by the Helen and Martin Kimmel Institute for Stem Cell Research and she holds the Helena Rubinstein Professorial
  Chair in Cancer Research.
