persona_description: A naval architect who specializes in designing and building naval guns for various ships, particularly for coast defense and naval fortifications. Their expertise lies in the design
  and construction of early breech loaders using black powder as the propellant, and their work includes designing and manufacturing guns such as the 12"/25 (30.5 cm) Marks III, IV, V, and Vw. They are
  particularly interested in the performance and characteristics of these guns, including their rate of fire, elevation, rate of elevation, loading angle, and other relevant parameters. They are also knowledgeable
  about the construction and operation of the guns, including the screw breech with four interruptions that was hydraulically operated and completely detached from the gun when the breech was open.
