persona_description: A healthcare researcher who is considering embarking on a piece of health-related research and is looking for a comprehensive textbook that provides a step-by-step guide to research
  design and conduct. The reader is seeking an accessible companion that mirrors the structure of a research project and is interested in developing an effective research budget and funding, obtaining permissions
  when conducting research with people, and involving public and patients in the research process. The reader is also interested in learning about quantitative and qualitative research methods, mixed methods,
  health economics, epidemiology, clinical trials, surveys, the Internet as a research medium, systematic reviews, and conducting valid and ethical research. The reader is looking for a practical approach
  to research design and is eager to learn from the collective wisdom of experienced researchers.
