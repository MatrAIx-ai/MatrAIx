  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Vintage motorcycle restoration'', ''Reading technical/manuals'', ''Single‑player video games'', ''Craft beer brewing'', ''Small community market
    visits'']'
  career_goals: Roger aims to advance within the delivery industry by securing a supervisory role as a logistics coordinator or shift manager, overseeing a team of couriers and refining route efficiency
    across the region. He plans to obtain his GED and acquire a commercial driver’s license (CDL) to broaden his qualifications. In the longer term, he envisions launching his own small‑scale courier service
    that emphasizes reliability and transparent scheduling for local businesses in Jefferson County.
