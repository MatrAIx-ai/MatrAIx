  hobbies: '[''Zumba classes'', ''Weekly walking group leadership'', ''Gardening'', ''Southern cooking'', ''Reading mystery novels'', ''Knitting for charity'', ''Church choir participation'']'
  career_goals: Evelyn aims to advance to a district manager role within the next three years, overseeing multiple stores and implementing region‑wide performance initiatives. She also aspires to earn a
    Certified Retail Management Professional credential to formalize her expertise. Long‑term, she envisions launching a boutique consulting service that helps small retailers optimize operations and staff
    development, while also mentoring younger women in the retail industry to navigate leadership pathways.
