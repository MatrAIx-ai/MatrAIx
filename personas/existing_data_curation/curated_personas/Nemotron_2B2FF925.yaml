personas:
  professional: Evelyn Hay, a seasoned retail operations manager, leverages their meticulous scheduling, data‑driven inventory control, and visual merchandising expertise while channeling their competitive
    drive and structured mindset into coaching staff, resolving conflicts, and steering stores toward profitability, even as their natural skepticism and occasional stress‑induced worry keep them constantly
    refining processes.
  sports: Evelyn Hay energizes their weekly routine with Zumba sessions at the community center, leads the "Silver Steps" senior walking club through crisp autumn trails, and follows the Charlotte Hornets,
    Carolina Panthers, and Charlotte FC with avid enthusiasm, often wearing their colors during their 5 k walks.
  arts: Evelyn Hay devotes evenings to unraveling Agatha Christie mysteries, knitting scarves while humming Aretha Franklin classics, and attending the local community theater’s productions of classic dramas,
    all of which enrich their soulful involvement in the church choir and their love for storytelling.
  travel: Evelyn Hay favors carefully planned road trips to charming Southern towns like Savannah, Charleston, and New Orleans, dreams of a scenic getaway to Asheville’s Blue Ridge Parkway and a relaxing
    Caribbean cruise, yet they balance these aspirations with a modest travel budget and occasional family commitments.
  culinary: Evelyn Hay, a confident home cook, experiments with Southern staples such as fried catfish seasoned with smoked paprika, slow‑cooked collard greens flavored with ham hocks, and sweet‑potato
    pie crowned with caramelized pecans, delighting neighbors at potlucks and constantly refining flavors with fresh garden herbs.
  core: Evelyn Hay blends a pragmatic, data‑driven work ethic with a vibrant community spirit, channeling their competitive edge and occasional worry into nurturing senior walkers, chorusing in the church,
    and perfecting Southern comfort food.
background:
  cultural: Evelyn grew up in a middle‑class white Southern family in Georgia, where values of hard work, hospitality, and community involvement were emphasized. Her upbringing included regular church attendance,
    Southern culinary traditions, and a strong sense of regional pride. Living in Lithonia, she experiences both suburban tranquility and proximity to the cultural diversity of the Atlanta metro area, which
    has broadened her perspective while still anchoring her in traditional Southern customs such as seasonal festivals, local farmers’ markets, and a love for Southern comfort food.
attributes:
  skills: '[''Retail Operations Management'', ''Team Leadership and Coaching'', ''Staff Scheduling'', ''Inventory Management'', ''Sales Analytics'', ''Visual Merchandising'', ''Customer Conflict Resolution'',
