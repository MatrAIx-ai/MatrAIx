personas:
  professional: Gabriela Tabares, a 9‑year‑old budding illustrator, channels their love of the sea into detailed, colorful drawings, applying a structured workflow that keeps their art supplies organized
    and meeting school art club deadlines, while their cooperative nature makes them a dependable partner in group projects.
  sports: Gabriela Tabares enjoys playing organized playground games like Red Light, Green Light during recess, participates in a local kids’ swimming class to practice freestyle strokes, and roots for
    the neighborhood minor league baseball team, the River City Runners, often wearing their cap during weekend outings.
  arts: Gabriela Tabares immerses themselves in drawing vibrant tropical seascapes, drawing inspiration from the bold palette of Takashi Murakami, and regularly attends community dance nights where they
    practice simple salsa steps, blending visual and kinetic creativity.
  travel: Gabriela Tabares loves weekend hikes along the nearby Blue Cove nature trail with grandparents, and they dream of snorkeling in the crystal‑clear waters of Grand Cayman, often mapping out imagined
    itineraries with stickers on a travel journal.
  culinary: Gabriela Tabares delights in helping prepare their family's traditional chicken and rice dish, savoring the aroma of garlic, cilantro, and lime, and they take pride in skillfully peeling shrimp
    for a mango salsa, though they occasionally sneak a bite of the sauce before the rest of the table is served.
  core: Gabriela Tabares is a remarkably organized 9‑year‑old who balances precise sea‑themed art, disciplined savings, and caring family meals with a quiet curiosity for new adventures.
background:
  cultural: Gabriela was born and raised in Toa Baja, a coastal municipality in northern Puerto Rico, where the rhythm of the sea and the warmth of close‑knit families shape daily life. She grew up speaking
    Spanish at home, with exposure to English through school and media. Family gatherings often feature traditional foods like arroz con gandules and pasteles, and celebrations such as the town’s patron
    saint festival and the island’s vibrant carnivals. Catholic traditions and community events, like neighborhood block parties and local “parrandas,” are part of her cultural fabric. The blend of urban
    life, beach culture, and strong familial bonds instills in her a sense of pride and responsibility toward her community.
