  career_goals: Gabriela dreams of becoming a teacher or school librarian, envisioning a future where she can create a supportive, well‑structured learning environment for younger children. She is also
    interested in health‑related roles, such as a pediatric nurse, because she likes caring for others and values stability and harmony. Her long‑term ambition is to contribute to her community by helping
    children succeed academically and emotionally.
