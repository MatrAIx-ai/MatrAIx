    for Design Review"]'
  hobbies: '["Volunteering in STEM mentorship programs", "Salsa dancing", "Hip‑hop dance classes", "Community choir", "Southern cooking and recipe experimentation", "Exploring local food festivals", "Yoga
    and meditation", "Gardening", "Reading contemporary fiction", "Hiking in Buffalo Bayou Park", "Photography", "Attending live music events (R&B, gospel)"]'
  career_goals: Sherry aims to advance from senior drafter to BIM manager, leading multidisciplinary teams on large‑scale, environmentally responsible projects in the Houston area. She plans to earn LEED
    AP certification and pursue a Project Management Professional (PMP) credential to strengthen her leadership capabilities. While she is driven to shape sustainable built environments, she also values
    work‑life balance and seeks roles that provide flexible scheduling to support her family and reduce stress. Long‑term, she envisions mentoring the next generation of Black women in architecture and
    eventually launching a consultancy focused on community‑centered, resilient design.
