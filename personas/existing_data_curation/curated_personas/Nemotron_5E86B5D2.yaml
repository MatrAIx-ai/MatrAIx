personas:
  professional: Sherry Williams, a senior architectural drafter in Houston, blends solid expertise in AutoCAD, Revit, and Civil 3D with a curiosity for emerging tools like VR and GIS, delivering LEED‑focused
    construction documents while juggling client communication, team coordination, and mentorship with a pragmatic yet flexible work style that keeps them organized under tight deadlines.
  sports: Sherry Williams stays active by dancing salsa and hip‑hop at community workshops, hiking the trails of Buffalo Bayou Park on weekends, cheering for the Houston Astros and the Houston Rockets,
    and belongs to the local “Bayou City Cyclists” club where they ride leisurely rides on Saturday mornings.
  arts: Sherry Williams sings soulful gospel in their church choir, frequently attends live R&B shows at the House of Blues featuring artists like Maxwell and Beyoncé, captures urban street scenes with
    a DSLR inspired by Vivian Maier, and nurtures a love for contemporary fiction that fuels their creative storytelling.
  travel: Sherry Williams enjoys short, well‑planned road trips to Austin’s music festivals and New Orleans’ jazz cafés, while dreaming of an eco‑tourism adventure in Costa Rica’s rainforests, balancing
    a modest travel budget with a desire for both cultural immersion and occasional spontaneous community volunteer work.
  culinary: Sherry Williams cooks Southern comfort staples such as fried chicken, collard greens, and cornbread with a flair for smoked paprika, while also experimenting with Thai green curry and Mediterranean
    mezze, skillfully juggling a moderate kitchen confidence with the occasional over‑simmered sauce when juggling project deadlines.
  core: Sherry Williams is a 34‑year‑old Houston‑based drafter whose blend of technical precision, community‑focused mentorship, and a love for dance, music, and Southern cooking fuels a vibrant, yet sometimes
    stress‑prone, outlook on life.
background:
  cultural: Sherry is an African‑American woman raised in Houston’s vibrant Black community. She grew up attending a historically Black church where fellowship, music, and community service were central,
    instilling a strong sense of cooperation and harmony. Celebrations like Juneteenth, Kwanzaa, and family barbecues keep her connected to cultural heritage and Southern culinary traditions. She actively
    supports Black‑owned businesses and participates in local cultural organizations such as the Houston NAACP chapter and the African American Museum of Fine Arts. Her HBCU alumni network provides professional
    mentorship, reinforcing her commitment to lift up other Black professionals in STEM fields.
attributes:
