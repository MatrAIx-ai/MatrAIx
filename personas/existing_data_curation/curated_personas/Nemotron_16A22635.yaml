personas:
  professional: Maria Wormley is an aspiring youth organizer and future community health worker, combining meticulous event‑planning, peer‑mediation, and savvy TikTok content creation to design culturally
    resonant wellness workshops for her peers.
  sports: Maria Wormley is a basketball‑enthusiast who dominates pick‑up games at the Worcester community center, follows the Boston Celtics closely, participates in the Worcester Youth Basketball Club,
    and they complement the court action with thrice‑weekly street‑dance workouts to stay fit.
  arts: Maria Wormley is a vibrant creator who blends hip‑hop dance, TikTok video editing, and a soulful vinyl collection featuring Aretha Franklin, Marvin Gaye, and H.E.R., they also craft friendship bracelets
    while reading YA titles like 'The Hate U Give' and 'Six of Crows,' allowing music and literature to shape their expressive identity.
  travel: Maria Wormley is an adventurous teen who prefers organized group trips, having explored Boston’s historic Freedom Trail, the vibrant music scene of New Orleans, and a weekend road‑trip to the
    Blue Ridge Mountains, they plan each journey meticulously using a shared Google Sheet, but limited funds keep most vacations within the Northeast.
  culinary: Maria Wormley is a budding Southern‑comfort cook who, beside her grandmother, perfects fried chicken with buttermilk brine, lusciously seasoned collard greens with smoked paprika, and buttery
    cornbread, they love experimenting by adding a spicy honey glaze to classic dishes while documenting the process for TikTok followers.
  core: Maria Wormley is a detail‑driven, socially‑charged teen who mixes relentless worry with an unstoppable hustle—organizing neighborhood events, perfecting soul‑food recipes, and staying up late crafting
    TikTok clips, even as they sometimes forget to eat and binge‑watch endless dance videos.
background:
  cultural: Maria grew up in Worcester’s historic Black neighborhoods, where community ties and church life play central roles. Her family traces its roots to the Great Migration, bringing Southern culinary
    traditions, storytelling, and gospel music to New England. Weekly services at a local Baptist church, participation in Juneteenth parades, and involvement in Black History Month events have reinforced
    her cultural pride. Family gatherings often feature collard greens, fried chicken, and sweet potato pie, dishes she helps prepare while learning the stories behind them. The neighborhood’s legacy of
    activism—particularly around education equity and housing justice—has shaped Maria’s awareness of systemic challenges faced by Black youth. These cultural experiences inform her desire to uplift her
    community, preserve heritage, and create spaces where young Black people can thrive.
