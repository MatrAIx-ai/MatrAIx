  career_goals: Maria aims to obtain her GED within the next year and enroll in a community‑college program focused on public health or nonprofit management. Her short‑term ambition is to secure an internship
    or volunteer coordinator role at a local youth‑focused nonprofit in Worcester, where she can apply her event‑planning and mediation skills to empower other Black teenagers. Long‑term, she envisions
    becoming a Community Health Worker or Youth Program Coordinator, designing culturally relevant wellness workshops and community events that celebrate Black heritage. She also hopes to build a modest
    personal brand on social media that highlights mental‑health coping strategies, healthy cooking, and cultural pride, eventually earning a bachelor’s degree in Social Work or Public Health and possibly
    a master’s in Community Development.
