  hobbies: '["Gardening","Reading historical fiction","Book club participation","Knitting","Crocheting","Hiking local trails","Volunteering at community health fairs","Attending church gatherings"]'
  career_goals: Chandra aims to deepen her clinical expertise and transition into a leadership role that balances structure with flexibility. She plans to complete her Bachelor of Science in Nursing (BSN)
    through an online program and pursue certification as a Family Nurse Practitioner, allowing her to provide comprehensive primary care in her community. Long‑term, she hopes to become a community health
    nurse coordinator for Orange County, designing wellness workshops for seniors and expanding health outreach. She also aspires to mentor emerging nurses at her hospital, fostering a supportive and harmonious
    work environment.
