  hobbies: '[''Abstract painting'', ''Experimental photography'', ''Reading speculative fiction'', ''Writing short stories'', ''Improv theater'', ''Book club (science fiction focus)'', ''Beach volleyball'',
    ''Trivia nights'', ''Volunteer financial literacy mentoring'', ''Yoga'', ''Exploring new recipes (world cuisines)'']'
  career_goals: Kathryn aims to move from her clerk position into a supervisory role within the next three years, targeting a senior claims analyst or claims manager title. She plans to earn the Chartered
    Property Casualty Underwriter (CPCU) designation and complete an associate’s degree in business administration to strengthen her credentials. Leveraging her creativity, she aspires to design and implement
    a data‑driven workflow automation project that reduces claim processing time by at least 20 percent. She also hopes to lead a cross‑departmental team focused on developing innovative insurance products
    that address emerging risks such as climate‑related disasters, reflecting her curiosity about novel concepts. Long‑term, she envisions establishing a boutique insurance‑consulting firm that advises
    small businesses on risk management, combining her analytical expertise with her passion for abstract problem‑solving.
