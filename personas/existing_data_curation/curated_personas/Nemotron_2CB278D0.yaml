  career_goals: Terry aims to complete his Bachelor’s degree in Business Administration with a focus on Project Management within the next two years. He plans to leverage his organized, reliable work style
    to secure an entry‑level project coordinator role at a regional technology firm, where he can blend his analytical skills with team leadership. Long‑term, he aspires to launch his own consulting startup
    that helps small Midwestern businesses adopt data‑driven decision‑making processes. His competitive drive pushes him to earn professional certifications (such as PMP) and to continuously benchmark his
    performance against industry standards.
