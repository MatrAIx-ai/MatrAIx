    de-escalation and calm crisis management'']'
  hobbies: '[''Quilting'', ''Gardening'', ''Cooking Southern cuisine'', ''Reading historical non-fiction'', ''Walking along the Mississippi River trail'', ''Playing bridge'', ''Volunteering as a church
    choir accompanist'']'
  career_goals: Latana aims to formalize her caregiving experience by obtaining her GED and completing a certified nursing assistant (CNA) program within the next two years. She envisions advancing to a
    lead aide or supervisory role in a local home‑health agency, where she can mentor newer staff and shape care protocols. Long‑term, she aspires to launch a small, community‑focused personal‑care business
    that emphasizes structured, high‑quality services for seniors in Natchez. Her ambition is driven by a desire for professional recognition, increased responsibility, and the ability to create a reliable
    support network for vulnerable residents.
