personas:
  professional: Latana Baker is a seasoned personal care aide whose decade‑long hands‑on experience in bathing, dressing and mobility support is complemented by meticulous vital‑sign monitoring, precise
    documentation, and a calm, competitive drive to lead a supervisory team at a local home‑health agency.
  sports: Latana Baker enjoys brisk walks on the Natchez river trail with the Natchez Walking Club, follows the New Orleans Saints for football season, plays casual doubles tennis at the community center,
    and supports the Atlanta Braves, reflecting a balanced, seasonal approach to fitness and fandom.
  arts: Latana Baker weaves intricate quilts inspired by the rhythmic patterns of Mahalia Jackson’s gospel hymns, serves as accompanist for the church choir performing Aretha Franklin classics, and devours
    historical non‑fiction by Taylor Branch and Gordon Parks, weaving artistic appreciation into daily life.
  travel: Latana Baker plans trips with a meticulous itinerary, favoring cultural pilgrimages to civil‑rights landmarks such as Selma and Montgomery, weekend getaways to New Orleans and Charleston for jazz
    and cuisine, and dreams of a curated tour of Paris’s historic districts, balancing a modest travel budget with a deep desire for experiential learning.
  culinary: Latana Baker cooks Southern soul‑food classics like fried catfish, slow‑cooked collard greens seasoned with smoked ham hocks, buttery cornbread, and peach cobbler, often harvesting tomatoes
    and okra from their backyard garden to infuse fresh flavor, and takes pride in mastering the perfect hushpuppy batter.
  core: Latana Baker is a methodical, calm caregiver who balances a competitive drive for professional growth with a love for quilting, gospel music, and Southern comfort food, they keep a meticulous budget
    and maintain a steadfast commitment to community.
background:
  cultural: Latana’s cultural identity is rooted in the African‑American heritage of the Deep South. Raised in Natchez, she grew up in a close‑knit, church‑centered community where gospel music, communal
    meals, and oral storytelling were daily staples. Family traditions emphasize self‑reliance, perseverance, and respect for elders—values that shape her caregiving ethos. She maintains connections to
    the region’s historical legacy, honoring the struggles and achievements of the civil‑rights movement through participation in local commemorations such as Juneteenth celebrations. Her culinary preferences
    reflect Southern soul‑food influences, and she often shares recipes passed down from older relatives, reinforcing a sense of belonging and cultural continuity.
attributes:
