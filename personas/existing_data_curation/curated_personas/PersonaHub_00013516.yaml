persona_description: A biomedical engineer who specializes in the use of lasers and spectroscopy to study the biochemical status of tissues and cells. Her research focuses on developing novel technologies
  for brain cancer surgery and improving the accuracy of surgical resection. She is interested in the development of portable and portable optical biopsy techniques that can provide real-time assessments
  of tumor margins and the presence of residual cancer cells. Her approach, known as time-resolved fluorescence spectroscopy and imaging, is one of several techniques under investigation at UC Davis Cancer
  Center for near-instantaneous optical "biopsy."
