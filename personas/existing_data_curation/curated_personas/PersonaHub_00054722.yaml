persona_description: A philanthropist and supporter of scientific research, particularly in the fields of neurodegenerative diseases and cancer. Manny and Sheila Landsman are known for their generous donations
  to the University of Brandeis, which included funding for the construction of the Landsman Research Facility, the campus home to a 15,000-pound superconducting magnet used by scientists to search for
  clues to solving the riddles of neurodegenerative diseases and cancer. They are also known for their support of the Office of Technology Licensing, which manages the patenting, licensing, trademarking,
  and copyrighting of intellectual property developed at the University.
