persona_description: A researcher in the field of molecular biology, particularly interested in the study of transcription factors and their target genes. The person is likely to be interested in the connection
  between transcription factors and their target genes, and is interested in understanding the various modes of action of these proteins, as well as the importance of co-factors and promoter context within
  chromatin in determining the transcriptional outcome of DNA binding by these proteins. The person is also likely to be interested in the potential target genes for several transcription factors, and the
  application of microarray methods to determine if the regulation is direct and which cis-acting elements mediate the effect.
