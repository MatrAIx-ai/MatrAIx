    and art'']'
  career_goals: At 64, Cheyenne is focused on leaving a lasting legacy and enriching her community. She aims to publish a cookbook that celebrates Colorado’s seasonal ingredients and weaves in personal
    stories and artistic inspiration. She plans to establish a mentorship scholarship for emerging chefs at a regional culinary school and to create a community kitchen that offers affordable, nutritious
    meals and cooking classes for seniors and low‑income families. Additionally, she hopes to earn regional recognition for her restaurant’s sustainability practices and farm‑to‑table excellence, positioning
    it as a model for environmentally conscious dining in the Front Range.
