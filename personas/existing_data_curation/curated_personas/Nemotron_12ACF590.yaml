personas:
  professional: Hai Li, a veteran postsecondary educator with a flair for integrating erhu-inspired soundscapes into digital storytelling curricula, leverages adult learning theory and bilingual expertise
    to craft interdisciplinary programs that bridge art, technology, and pedagogy, and they consistently meet project deadlines through meticulous planning.
  sports: Hai Li, an avid fan of the Minnesota Twins and the Timberwolves, regularly participates in the local cross‑country skiing club, joins weekend hikes with the Rice County Trails Association, and
    they schedule morning runs along the scenic shores of Lake Minnetonka to stay fit.
  arts: Hai Li, an abstract watercolor painter influenced by the ambient tones of Joni Mitchell and the minimalist compositions of Agnes Martin, frequents the Weisman Art Museum, enjoys reading speculative
    fiction like The Expanse series, and they practice the erhu on evenings to keep cultural resonance alive.
  travel: Hai Li, a purposeful traveler who prefers a blend of structured itineraries and spontaneous detours, has explored the Boundary Waters Canoe Area, trekked the Old Man of Storr in Scotland, plans
    a future culinary pilgrimage to Osaka’s street markets, and they often journal the experience with a pocket‑size analog camera.
  culinary: Hai Li, a home chef who experiments with miso‑glazed walleye paired with locally harvested wild rice and lingonberry compote, masters fermentation techniques like kimchi and sauerkraut, and
    they can flawlessly prepare a silky tofu mapo tofu using Minnesota molasses for depth.
  core: Hai Li, a methodical dreamer, fuses academic rigor with artistic wanderlust, balancing meticulous planning and spontaneous creativity while occasionally neglecting dental care and splurging on photography
    gear.
background:
  cultural: Hai Li was raised in a bilingual household by immigrant parents from Taiwan, who emphasized the value of education, family harmony, and respect for tradition. Celebrating Lunar New Year and
    the Mid‑Autumn Festival at home, he maintains a connection to his East Asian roots while fully embracing the Midwestern community of Webster, MN. This bicultural perspective informs his teaching philosophy,
    fostering inclusive classrooms that honor diverse cultural narratives. Hai’s experiences navigating both collectivist familial values and individualistic American norms enable him to bridge cultural
    gaps and encourage cross‑cultural dialogue among his students.
