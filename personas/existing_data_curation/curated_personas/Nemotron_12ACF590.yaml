  hobbies: '[''Landscape Photography'', ''Abstract Watercolor Painting'', ''Experimental Cooking (Asian‑Midwestern Fusion)'', ''Erhu Playing'', ''Speculative Fiction Reading'', ''Hiking'', ''Community Volunteering
    at Multicultural Festivals'', ''Strategic Board Games'', ''Philosophy Exploration'']'
  career_goals: Hai aims to transition into a tenure‑track position where he can lead a department and shape interdisciplinary programs that marry education, art, and technology. He aspires to secure external
    funding to develop a digital storytelling curriculum for teacher preparation, publish research on innovative pedagogical strategies, and mentor the next generation of educators. Additionally, he hopes
    to expand community outreach initiatives that promote cultural inclusivity and lifelong learning within the Webster and broader Rice County area.
