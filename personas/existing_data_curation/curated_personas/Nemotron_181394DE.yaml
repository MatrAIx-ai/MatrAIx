  hobbies: '[''Reading technical manuals'', ''Woodworking'', ''Model train building'', ''Urban fishing'', ''Gardening'', ''Jazz and blues music listening'', ''Historic car restoration'', ''Walking in local
    parks'', ''Cooking simple meals'', ''Attending Black History Month events'']'
  career_goals: Timothy aims to deepen his technical expertise by earning certifications such as Certified Maintenance & Reliability Technician (CMRT) and advanced HVAC specialist credentials. He aspires
    to advance into a senior supervisory role where he can design and implement predictive maintenance programs that leverage IoT sensors. He also hopes to mentor younger apprentices, sharing his practical
    knowledge while maintaining a solitary, focused work style. Ultimately, he envisions offering consulting services to small property owners seeking cost‑effective maintenance solutions.
