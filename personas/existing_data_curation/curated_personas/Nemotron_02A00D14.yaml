  career_goals: Guillermo aims to progress from his front‑line representative role to a supervisory or team‑lead position within the next three to five years, leveraging his bilingual abilities to support
    a wider regional customer base. He plans to obtain a Customer Experience Management certification and deepen his data‑analysis skills to contribute to process improvements. In the longer term, he envisions
    moving into a training or quality‑assurance role where he can mentor new agents and shape service standards, while also exploring part‑time coursework in business administration to broaden his career
    prospects.
