persona_description: A radiologist who specializes in the interpretation and analysis of CT scans, particularly in the evaluation of the brain, neck, spine, chest, abdomen, pelvis, and sinuses. They have
  expertise in advanced 64-slice high-speed CT scans and are skilled in interpreting the detailed, three-dimensional images produced by this technology. They work at White Plains Radiology Associates, PC,
  the professional radiology group at NWH, and have a background in board-certified radiologists with expertise in multiple areas of diagnostic imaging. They are likely to have a strong interest in the
  field of radiology and a passion for providing accurate and comprehensive diagnostic services to their patients.
