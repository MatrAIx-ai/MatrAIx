  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Visual Journaling'', ''Volunteer Art Teaching'', ''Literary Fiction Reading'', ''Philosophy Exploration'', ''Nature Hiking'', ''Landscape Photography'',
    ''Cooking Mexican Cuisine'', ''Intimate Dinner Gatherings'']'
  career_goals: John aspires to re‑enter the professional sphere through the museum and cultural sector. He plans to pursue a master’s degree in Museum Studies or Arts Administration within the next two
    years, leveraging scholarships aimed at adult learners. His short‑term goal is to secure a part‑time curator or collections assistant position at the Nashville Museum of Art, where he can apply his
    research and exhibition skills. Long‑term, he dreams of establishing a community art center in the Smyrna area that offers free workshops, art therapy sessions, and a platform for local underrepresented
    artists, merging his passion for art with his drive to foster harmony and support vulnerable populations.
