  hobbies: '[''Art Gallery Visits'', ''Street Photography'', ''Community Basketball League'', ''Hiking Trips'', ''Indie Music Concerts'', ''Home Brewing'', ''Volunteer Event Organization'', ''DIY Home Improvement
    Projects'']'
  career_goals: Daniel aims to move from a machine feeder role to a supervisory position overseeing an entire production line, leveraging his reliability and organizational strengths. He plans to earn certifications
    such as OSHA 30-hour, CNC Machinist certification, and Lean Six Sigma Yellow Belt to solidify his technical credibility. Long-term, Daniel dreams of blending his technical background with his artistic
    interests by transitioning into industrial design or product development, where he can contribute both functional expertise and creative insight. He also hopes to become a mentor for new hires, fostering
    a competitive yet supportive team culture.
