  career_goals: Aaron aims to advance within the St. Charles Police Department by first completing his bachelor's degree in criminal justice. He hopes to become a detective specializing in cybercrime or
    homicide, leveraging his interest in technology and investigative storytelling. Long-term, he aspires to a supervisory role such as sergeant or lieutenant, where he can mentor new officers and shape
    community-oriented policing policies. He is particularly passionate about creating an art-based outreach program for at-risk youth, using workshops and public murals to build trust and provide positive
    outlets. Aaron also plans to attend advanced training in crisis negotiation and mental-health response, positioning himself as a leader in compassionate policing.
