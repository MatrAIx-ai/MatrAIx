personas:
  professional: Aaron Robinson is a St. Charles police officer who leverages their solid law-enforcement foundation, strong communication skills, and a flair for creative problem solving to de-escalate
    tense encounters, pioneer cyber-crime investigations, and champion art-based outreach for at-risk youth.
  sports: Aaron Robinson is a devoted fan of the St. Louis Cardinals and St. Louis Blues, joins a local pickup basketball league on weekends, hikes the Katy Trail with friends, and occasionally participates
    in a community running club to keep fit, drawing energy from the camaraderie they find on the court.
  arts: Aaron Robinson feeds their imagination by sketching urban panoramas, creating acrylic murals inspired by Banksy, strumming acoustic guitar in an improv comedy troupe, and devouring speculative fiction
    by Neil Gaiman while regularly attending shows at the Contemporary Art Museum St. Louis.
  travel: Aaron Robinson prefers spontaneous road trips that weave through quirky roadside attractions like the World's Largest Ham Museum in Indiana and the Mystery Spot in Oregon, while also planning
    occasional cultural escapes to New Orleans for jazz and Kyoto for its historic temples, satisfying the curiosity they nurture through storytelling.
  culinary: Aaron Robinson enjoys experimenting in the kitchen, often whipping up spicy shrimp étouffée, homemade ramen with miso broth, and sourdough bread, relying on fresh cilantro, ginger, and smoked
    paprika to add flair to each dish, a creative outlet they cherish after long shifts.
  core: Aaron Robinson is a 26-year-old police officer who fuses detective instincts with an artist’s curiosity, thriving on spontaneous creativity, community connection, and occasionally letting their
    disorganized planning lead to chaotic moments.
background:
  cultural: Aaron grew up in a middle-class family in the St. Charles region of Missouri, a community rooted in Midwestern values of hard work, neighborly cooperation, and civic responsibility. His ancestry
    is primarily of German and Irish descent, and his upbringing combined traditional American holidays with an appreciation for the arts - his mother encouraged painting while his father valued public
    service. Living and working in a diverse suburban county has broadened his cultural perspective, exposing him to a mix of ethnic traditions, languages, and community events. This blend of Midwestern
    heritage and multicultural exposure shapes Aaron's respectful yet open-minded worldview.
