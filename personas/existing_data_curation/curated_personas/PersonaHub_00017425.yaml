persona_description: Dr. Bradley A. Striebig, head of the environmental technology group at Penn State's Applied Research Laboratory and leader of the Odor Index development team, is likely interested in
  the above text. He is a highly skilled and knowledgeable individual who specializes in environmental technology, particularly in the development and application of odor monitoring and control technologies.
  He has expertise in the use of off-the-shelf instrumentation, databases, and analytical methods to measure and quantify odor emissions from various sources, including wastewater treatment plants, pig
  farms, oil refineries, paper making factories, and landfills. His work is supported by grants and contracts from the Environmental Protection Agency Regions 2 and 3, the Pennsylvania Department of Environmental
  Protection, and the New Jersey Department of Environmental Protection. His research interests include the development of odor monitoring and control technologies, the optimization of odor control strategies,
  and the evaluation of the effectiveness of odor control measures in real-world applications.
