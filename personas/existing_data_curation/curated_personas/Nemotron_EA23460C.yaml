  career_goals: Jeremiah dreams of turning his competitive edge and love of structured challenges into a career that lets him create and design. He is fascinated by the idea of becoming a video game developer,
    where he can build worlds with clear rules and objectives. At the same time, his practical side pulls him toward fields that involve hands‑on problem solving, such as mechanical engineering or automotive
    technology, both of which are prominent in the Bowling Green area. He hopes to someday combine his technical skills with his love for basketball by coaching youth teams or developing sports‑related
    apps. While his ambition is high, he often worries about keeping up academically and seeks a stable path that can support his family and give him personal fulfillment.
