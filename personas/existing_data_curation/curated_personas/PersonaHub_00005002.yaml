persona_description: A researcher or scientist who specializes in the study of animal behavior, particularly in the field of color perception and its impact on visual communication. They are interested
  in the differences in color perception between male and female animals and how these differences are influenced by factors such as habitat and age. They are likely to be interested in the mean just-noticeable-differences
  (JNDs) of chromatic and achromatic ventral and dorsal conspicuousness of males and females for the 12 species, as well as the mean spectral reflectance of male and female ventral patches, male dorsal
  surfaces and habitat for each of the 12 species. They may also be interested in the potential applications of these findings in the field of wildlife conservation and management.
