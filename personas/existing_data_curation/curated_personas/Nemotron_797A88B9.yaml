  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Kitchen gardening'', ''Canning and food preservation'', ''Homebrewing'', ''Listening to agricultural podcasts'', ''Attending county fairs'', ''Volunteering
