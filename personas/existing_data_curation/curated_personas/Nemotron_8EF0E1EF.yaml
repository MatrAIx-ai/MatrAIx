  career_goals: Although retired from formal employment, Senait aims to deepen her impact as a community leader. She plans to join the board of a local nonprofit focused on youth education, launch a neighborhood
    garden to promote sustainable food practices, and mentor a group of high‑school students interested in civic engagement. Senait also aspires to complete a memoir that weaves together her personal history
    with the broader African‑American experience in Atlanta, and to curate a quarterly cultural storytelling series at the community center. Continuing her love of learning, she intends to enroll in adult
    education courses on digital archiving and African diaspora history.
