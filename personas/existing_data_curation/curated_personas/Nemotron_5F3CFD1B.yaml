personas:
  professional: Mayra Torres, a diligent preschool helper who delights in arranging crayons by color and leading tidy playtime routines, channels their organized, reliable nature into early leadership roles,
    showcasing budding project‑management and storytelling skills.
  sports: Mayra Torres, a lively four‑year‑old who attends the Danville Community Center’s preschool gymnastics class in the spring, plays tee‑ball in the summer, and proudly waves a Dallas Cowboys flag
    while watching Sunday games, they balance their love of active play with a calm, organized routine.
  arts: Mayra Torres, an imaginative four‑year‑old who delights in drawing bright, bold pictures reminiscent of Frida Kahlo’s palette, belts out Selena’s cumbias and Disney’s "Let It Go" while twirling
    in their living room, and they regularly attend the Boerne County Library’s story‑time sessions featuring beloved storytellers like Mo Willems.
  travel: Mayra Torres, a curious four‑year‑old who loves family road trips to the San Antonio River Walk, pine‑scented Hill Country picnics, and annual visits to Disney World, they dream of one day seeing
    the colorful streets of Barcelona and the turquoise waters of Cancun, and they prefer guided, child‑friendly itineraries over spontaneous wanderings.
  culinary: Mayra Torres, a budding little chef who proudly mixes saffron into their family’s paella, dips churros in chocolate, builds cheesy quesadillas with shredded Monterey Jack, prefers simple, hands‑on
    meals and happily munches on apple slices with peanut butter, and they occasionally demand a second serving of sweet corn.
  core: Mayra Torres, a bright‑eyed four‑year‑old bilingual explorer, balances meticulous organization with boundless curiosity, sings in both languages, hoards crayons like treasure, and they never miss
    a chance to celebrate a family fiesta.
background:
  cultural: Mayra is of Spanish descent and grows up in a bilingual household where Spanish and English are spoken daily. Her family celebrates traditional Spanish holidays such as Día de los Muertos and
    Cinco de Mayo, and they often prepare dishes like paella and churros. Living in Boerne, Texas, she also experiences the local Texan culture, attending community events, church gatherings, and regional
    festivals that blend Hispanic rhythms with southwestern influences. These cultural experiences nurture her appreciation for art, music, and communal harmony.
