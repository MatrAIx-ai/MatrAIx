  career_goals: Mayra dreams of becoming a teacher or an artist when she grows up. She wants to share the joy of drawing and storytelling with other children, hopes to travel to Spain someday to connect
    with her heritage, and envisions volunteering at the local library’s children’s reading program to help her community.
