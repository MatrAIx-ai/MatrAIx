persona_description: A leader in educational reform and change, with a focus on training and development, participatory decision-making, and restructuring. They are skilled at moving from a unionism built
  around diffidence and antagonism to one built around cooperation, and have experience in the use of techniques and practices to allow for problem solving and mutual gains in collective bargaining. They
  are also familiar with the use of agreements outside the contract and have experience with contract waivers and the use of peer review programs. They have a deep understanding of the fragility of the
  institution of public education and the need for mutual respect and cooperation in order to improve organizations.
