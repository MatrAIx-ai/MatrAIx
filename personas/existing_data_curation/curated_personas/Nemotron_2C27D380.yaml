  career_goals: Although retired, Lindsey aims to deepen her community involvement by preserving local history through storytelling sessions at the Georgetown County Historical Society and compiling a family
    cookbook that records cherished Lowcountry recipes. She aspires to mentor her grandchildren in cooking, budgeting, and responsible use of technology, while maintaining her health through daily walks
    on Pawleys Island and mindfulness practices to reduce stress and worry.
