  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening'', ''Knitting and textile crafts'', ''Listening to regional Mexican music'', ''Watching telenovelas'', ''Volunteering at the Catholic parish'']'
  career_goals: Melva aims to obtain her GED within the next year to improve her job prospects. She is interested in completing a Certified Nursing Assistant (CNA) program so she can work part‑time in home
    health care, providing a stable income while still caring for her family. She also dreams of launching a small home‑based catering service specializing in authentic Mexican dishes for neighborhood events,
    using her cooking reputation to generate extra revenue. Additionally, she wants to enhance her English fluency and develop basic computer skills to better manage finances and access online resources.
