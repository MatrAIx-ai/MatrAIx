  career_goals: Although retired, Hala is determined to keep her community vibrant. She plans to expand the senior art club she helped found, mentor younger volunteers in organizing cultural events, and
    document Goliad’s oral histories for a future museum exhibit. She also aims to compile a cookbook that blends family recipes with personal stories, and to lead a seasonal community garden that supplies
    fresh produce to local food banks. Her long‑term ambition is to leave a lasting record of Goliad’s heritage for future generations while remaining an active, respected figure in local cultural life.
