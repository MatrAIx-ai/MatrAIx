personas:
  professional: Tyler Holt, a 14‑year‑old budding technologist and model enthusiast, channels their methodical mindset into designing Scratch games and assembling intricate LEGO and scale model kits, demonstrating
    early engineering curiosity and a disciplined approach to learning.
  sports: Tyler Holt, a 14‑year‑old who enjoys weekend fishing trips on the Rock River and plays on the local youth soccer team, avidly follows the Milwaukee Bucks and the Chicago Cubs, and participates
    in the school’s after‑school fitness club where they practice basketball drills.
  arts: Tyler Holt, a 14‑year‑old LEGO builder and model hobbyist, draws creative inspiration from the cinematic scores of Hans Zimmer, the quirky melodies of They Might Be Giants, and the visual storytelling
    of the documentary series Cosmos, often listening to these while crafting projects.
  travel: Tyler Holt, a 14‑year‑old from a Midwestern town, prefers meticulously planned road trips to nearby attractions like Door County’s lighthouses and Chicago’s Museum Campus, while dreaming of a
    future visit to the Kennedy Space Center and the Norwegian fjords for their blend of nature and engineering marvels.
  culinary: Tyler Holt, a 14‑year‑old who favors structured meals, loves making precise grilled cheese sandwiches, perfecting homemade mac and cheese with a dash of paprika, and cooking fish tacos with
    freshly caught river trout, often measuring ingredients to the gram.
  core: Tyler Holt is a methodical teen who merges a love for order with hands‑on creation, balancing LEGO builds, Scratch coding, and quiet fishing trips while staying financially savvy, health‑conscious,
    and quietly ambitious.
background:
  cultural: Tyler grew up in a typical Midwestern small-town setting in Beloit, Wisconsin, within a family of German-Scandinavian heritage that has lived in the region for generations. The community emphasizes
    practicality, hard work, and modesty, with strong ties to local churches, school events, and county fairs. These cultural values reinforce his preference for reliability, cooperation, and orderly routines.
