  career_goals: Although retired, Rosalinda is keen to continue contributing to her community. She aims to compile and publish a memoir that captures the experiences of Chilean immigrants in Brooklyn, and
    to develop an online oral‑history archive of elder community members. She hopes to establish a modest cultural hub in her neighborhood where older adults can meet for Spanish conversation circles, traditional
    music sessions, and intergenerational storytelling workshops. Additionally, she plans to deepen her digital literacy to safely share Chilean folk songs and recipes with younger relatives.
