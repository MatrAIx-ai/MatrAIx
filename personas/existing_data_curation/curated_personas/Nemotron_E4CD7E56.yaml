personas:
  professional: Ines Hernandez is a retired community volunteer turned cultural ambassador who leverages their methodical event‑planning skills, bilingual fluency, and reliable, organized nature to coordinate
    intergenerational art fairs and senior tech workshops, always insisting on meticulous budgets and clear communication.
  sports: Ines Hernandez stays active by joining the Aguadilla Senior Walking Club for daily sunrise beach walks, attending salsa dance classes that double as cardio, and cheering on the Cangrejeros de
    Santurce basketball team during winter leagues, while they occasionally participate in community softball games in the summer.
  arts: Ines Hernandez paints watercolor seascapes inspired by the works of Antonio Martorell and Carmen Laffón, attends community exhibitions featuring local folk artist Rafael Rivera, sings in a senior
    choir performing pieces by José Feliciano and Celia Cruz, and treasures the photography of festivals captured by renowned photographer Luis González, while they often linger over each canvas to add
    one more brushstroke.
  travel: Ines Hernandez prefers short, culturally immersive trips, often traveling by bus to historic Old San Juan and the art‑rich town of Ponce, has visited the colonial streets of Seville, Spain, and
    hopes to explore the vibrant markets of Cartagena, Colombia, while balancing a modest pension and occasional family caregiving duties, and they always pack a small notebook to sketch new scenes.
  culinary: Ines Hernandez is a seasoned home cook who lovingly prepares mofongo with plantain, chicharrón, and garlic‑infused sofrito, crafts arroz con gandules seasoned with adobo and annatto, experiments
    with local herbs like cilantro and culantro, yet they often over‑season dishes out of enthusiasm, and they never miss a chance to share a plate with friends and family.
  core: Ines Hernandez blends relentless curiosity with meticulous organization, turning every community event into a living museum, while they habitually misplace their glasses on top of a stack of watercolor
    paper.
background:
  cultural: Inés was born and raised in the coastal region of Aguadilla and the nearby municipality of Isabela, where she absorbed the rich tapestry of Puerto Rican life. She grew up immersed in the island’s
    traditions—Catholic celebrations, vibrant music like bomba and plena, and a strong sense of familia. Her family’s kitchen was a hub for cooking communal dishes, fostering her love for culinary heritage.
    Bilingual by nature, Inés navigated both Spanish-speaking neighborhoods and English-language educational settings during her years of some college study, which broadened her perspective while keeping
    her rooted in local customs. The close-knit community values of mutual support, respect for elders, and pride in cultural expression continue to shape her worldview and daily interactions.
attributes:
  skills: '[''event planning'', ''community outreach'', ''bilingual communication (Spanish/English)'', ''basic digital literacy (email, social media)'', ''art appreciation and curation'', ''budget management
    for nonprofit events'', ''elder care and companionship'', ''gardening'', ''cooking traditional Puerto Rican dishes'', ''teaching and mentoring'']'
  hobbies: '[''painting (coastal landscapes)'', ''photography of festivals and dances'', ''gardening (native plants and herbs)'', ''dancing (salsa, plena, bomba)'', ''senior choir participation'', ''cooking
    traditional Puerto Rican cuisine'', ''reading historical biographies'', ''visiting museums and cultural sites in Puerto Rico'']'
  career_goals: Although retired, Inés aims to deepen her impact as a cultural ambassador in Aguadilla and Isabela. She aspires to organize an annual intergenerational art fair that showcases local artists
    and preserves oral histories of senior residents. In addition, she hopes to author a memoir that intertwines her family's stories with the island’s evolving traditions, and to lead a series of workshops
    that teach seniors basic smartphone use so they can stay connected. Her overarching ambition is to ensure the vibrant Puerto Rican heritage of her hometown remains alive for future generations.
