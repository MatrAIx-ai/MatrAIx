persona_description: A researcher and physician who specializes in the study of hypertension, particularly in the field of neurology. The individual is involved in a multi-year study funded by the National
  Institute on Aging to compare treatment approaches and their effect on changes in the brain related to mobility, memory and urinary function in older people with hypertension. The researcher has published
  studies on the use of 24-hour blood pressure monitoring to predict progression of small vessel brain disease cognitive function decline in older people, and is working on developing an individualized
  treatment program for participants based on the results of the first 24-hour blood pressure recording. The researcher is also president of the American Society of Hypertension and has experience with
  hypertension treatment.
