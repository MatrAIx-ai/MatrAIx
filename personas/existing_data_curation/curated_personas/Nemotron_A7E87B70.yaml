personas:
  professional: Maria Yesh, age 7, is an aspiring young naturalist who spends quiet afternoons drawing detailed sketches of insects and planets, channeling their boundless curiosity and love of solitude
    into early scientific inquiry while reliably keeping a neat notebook of observations.
  sports: Maria Yesh, 7, prefers gentle movement over competitive games, and they join the local 'Little Explorers' nature-walk club affiliated with the Green Valley Community Center, they quietly cheer
    for the nearby junior soccer team, the Riverbrook Runners, and they occasionally race their own shadow during field trips.
  arts: Maria Yesh, 7, immerses themselves in classical music by listening to Mozart's Symphony No. 40 and Debussy's Clair de Lune while molding clay figures inspired by the whimsical illustrations of Dr.
    Seuss and the vibrant colors of Mary Blair, and they often stage tiny exhibitions for stuffed animal audiences.
  travel: Maria Yesh, 7, enjoys planning quiet field trips to the nearby state park's butterfly garden and dreaming of visiting the planetarium in Houston and the towering red rocks of Sedona, preferring
    low-key itineraries that let them collect leaves and sketch constellations under dark skies.
  culinary: Maria Yesh, 7, favors simple comfort foods like buttery macaroni and cheese, apple slices with peanut butter, and homemade pizza topped with mozzarella and basil, delighting in stirring the
    batter for banana muffins while insisting on using their favorite rainbow-sprinkled spoon, and they proudly lick the spoon after mixing.
  core: Maria Yesh, 7, is a quietly curious explorer who transforms solitary walks and sketchbooks into a personal universe of art, science, and gentle habit-making, occasionally battling a pigeon-like
    curiosity that leads to messy crayons on the floor, and they often remind themselves to tidy up before bedtime.
background:
  cultural: Maria comes from a White, Midwestern family living in the small rural community of Taylor Ridge, Illinois. Her upbringing places value on self‑reliance, appreciation for the open countryside,
    and participation in local school and church events. The community’s modest art programs, a nearby regional museum, and a well‑used public library nurture her curiosity for art and new ideas, while
    the quiet, close‑knit environment supports her preference for solitude and reflective exploration.
attributes:
  skills: '[''reading at grade level'', ''basic addition and subtraction'', ''drawing and painting'', ''using kid‑friendly drawing apps'', ''storytelling'', ''organizing personal belongings'']'
  hobbies: '[''drawing and painting'', ''reading picture books'', ''nature walks'', ''listening to classical music'', ''crafting with clay and crayons'', ''watching educational videos about animals and
    space'']'
  career_goals: Maria imagines herself as a future artist who creates vivid illustrations for storybooks, dreams of designing her own comic strips, and is also fascinated by scientific discovery, hoping
    one day to explore how things work as a museum curator or a young scientist.
