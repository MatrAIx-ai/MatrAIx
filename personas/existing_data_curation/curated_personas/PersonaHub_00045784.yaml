persona_description: A Cuban politician who served as the president of Cuba twice, in 1933 and 1944, and was a prominent figure in the anti-Machado revolution. He is remembered for his support of student
  protests and his political involvement, particularly his role in the Provisional Government of Cuba in 1933. His administration was marked by progressive policies, including the nationalization of sugar
  production and the establishment of social security benefits, but he faced opposition from conservative elements in his own party and from Congress. After his presidency, he retired from public life and
  later opposed Batista's coup d'etat in 1952. He died in 1969.
