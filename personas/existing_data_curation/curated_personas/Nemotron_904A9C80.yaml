personas:
  professional: Jason Jones is a commercial cleaner with expertise in floor care, waste management, and minor building repairs, whose methodical curiosity drives him to experiment with green cleaning products
    and smart‑building sensors while his relaxed approach to scheduling sometimes leads to last‑minute inventory grabs, and he is positioning himself for a facilities supervisor role within three years.
  sports: Jason Jones follows the Philadelphia 76ers and the Eagles with the same competitive spirit he brings to his pick‑up basketball games at the local Y, plays in a small community hoops league each
    summer, and enjoys jogging along the Schuylkill River Trail during cooler fall evenings.
  arts: Jason Jones immerses himself in the city’s jazz clubs, drawing lyrical inspiration from artists like Miles Davis, Erykah Badu, and Kendrick Lamar while writing poetry that references the murals
    of West Philadelphia, and he spends his evenings reading works by Ta‑Nehisi Coates and Colson Whitehead to deepen his understanding of identity.
  travel: Jason Jones prefers spontaneous weekend getaways made on a shoestring budget, often hopping on a bus to New Orleans for its live jazz scene, taking day trips to the historic neighborhoods of Washington,
    DC, and dreaming of a future cultural tour of the Deep South's civil‑rights landmarks once his business takes off.
  culinary: Jason Jones whips up soulful collard greens, smoked turkey, and buttery cornbread using his grandmother's secret spice blend of smoked paprika and garlic, while experimenting with plant‑based
    cleaning solutions on the side, and he savors the occasional slice of cheesesteak topped with provolone from his favorite South Street stand.
  core: Jason Jones blends a pragmatic cleaning expertise with a competitive curiosity, a laid‑back yet disorganized lifestyle, and a deep reverence for community heritage that fuels his drive to turn everyday
    spaces into cultural sanctuaries.
background:
  cultural: Jason identifies as African American and grew up in West Philadelphia, a neighborhood steeped in rich Black cultural history and community activism. His family maintained strong ties to the
    local church, soul‑food cooking traditions, and storytelling sessions that emphasized the legacy of the civil‑rights movement in the city. He is deeply influenced by Philadelphia's vibrant African‑American
    arts scene—jazz clubs, spoken‑word venues, and murals that celebrate Black pioneers. These experiences shape his worldview, fostering a respect for preserving cultural spaces and an awareness of the
    social responsibilities that come with his role as a custodian of public environments.
attributes:
  skills: '[''Floor care (strip, wax, buff)'', ''Restroom sanitation'', ''Carpet cleaning'', ''Hazardous waste handling (OSHA compliant)'', ''Basic plumbing repairs'', ''Basic electrical maintenance'',
    ''Inventory and supply management'', ''Operation of automated cleaning equipment'', ''Digital scheduling and work‑order software'', ''Photo editing (Photoshop/Lightroom)'', ''Research and academic writing'']'
  hobbies: '[''Reading contemporary African American literature'', ''Creative writing (poetry and short stories)'', ''Street photography'', ''Playing chess'', ''Listening to jazz and neo‑soul'', ''Single‑player
    RPG video gaming'', ''Pick‑up basketball (small‑group)'', ''Cooking soul‑food dishes'', ''Attending small open‑mic spoken‑word sessions'']'
  career_goals: Jason aims to transition from a building cleaner to a facilities supervisor within the next three years, pursuing certifications such as the Certified Professional Cleaner (CPC) and Facility
    Management Professional (FMP). He is particularly interested in sustainable cleaning practices and wants to lead a team that implements green chemicals and smart‑building technologies. Long‑term, he
    envisions starting his own cleaning and facilities‑consulting business that serves cultural institutions—museums, galleries, and community centers—where he can blend his practical expertise with his
    humanities background to create respectful, well‑maintained spaces that celebrate African‑American heritage. He also hopes to mentor young Black workers in Philadelphia, helping them access training
    and career pathways in the trades.
