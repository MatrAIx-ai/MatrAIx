persona_description: A researcher who specializes in the study of archaeological game drive complexes and the evolution of cooperation in human societies, with a particular focus on the documentation of
  large-scale cooperative animal drives. This individual has conducted extensive research on the topic and has developed a deep understanding of the challenges and complexities involved in documenting such
  events. They have a keen interest in advancing our understanding of the evolution of hyper-cooperation in human societies and have a strong background in the use of drones and aerial photography to gather
  data. They are excited about the opportunity to use drone-derived data to produce robust models of large-scale cooperative game drives, which will lead to better interpretations of archaeological game
  drive complexes and contribute insights into the evolution of large-scale cooperation in human societies.
