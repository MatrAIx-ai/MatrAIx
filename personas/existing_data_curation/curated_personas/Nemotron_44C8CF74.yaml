  career_goals: Katherine aims to secure a role that offers predictable hours and the option for remote work, allowing her to balance her need for structure with reduced daily stress. She hopes to advance
    to a senior data‑entry specialist or quality‑assurance lead position, obtain an Office Administration certification, and eventually transition into a data‑quality analyst role where her meticulous eye
    can be fully leveraged. Throughout her career progression, she values a supportive environment, clear routines, and the opportunity to mentor new hires in small‑group settings.
