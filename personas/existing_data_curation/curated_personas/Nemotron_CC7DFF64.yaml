  career_goals: Arthur aims to translate his methodical expertise into leadership positions within the logistics field. Over the next two to three years he plans to become a senior inventory analyst, taking
    on greater responsibility for data‑driven inventory optimization. He intends to earn a professional certification such as the APICS Certified in Production and Inventory Management (CPIM) to strengthen
    his credentials. In five to seven years, his goal is to step into a warehouse operations supervisor role, overseeing a small team and implementing efficiency initiatives while preserving the routine
    and structure he values. Throughout his career progression, he seeks stable, well‑compensated employment that offers clear advancement paths and reliable benefits.
