  hobbies: '[''Reading magical realism novels'', ''Watercolor painting'', ''Urban photography'', ''Cooking Puerto Rican cuisine'', ''Attending art exhibitions'', ''Listening to Latin jazz and salsa'', ''Writing
    bilingual poetry'', ''Yoga and meditation'', ''Volunteering at cultural festivals'']'
  career_goals: Gertrudis aims to advance to a regional director role within a property‑management firm, overseeing a portfolio of community‑focused developments across the Midwest. She intends to earn
    her Certified Property Manager (CPM) designation and complete her real‑estate licensing exams to expand her professional credentials. Long‑term, she envisions launching her own boutique property‑management
    company that integrates sustainable design, public art installations, and culturally responsive programming for residents. A core ambition is to mentor emerging Latina professionals in the real‑estate
    sector, helping them navigate the industry while preserving their cultural heritage. Throughout this trajectory, she seeks to balance her career growth with family life, ensuring her professional pursuits
    remain aligned with her personal values of solitude, creativity, and community stewardship.
