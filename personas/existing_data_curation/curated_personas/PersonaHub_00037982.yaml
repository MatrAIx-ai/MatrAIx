persona_description: A healthcare professional who is interested in the management and treatment of ocular disorders, particularly recurrent corneal erosion. They are interested in evidence-based practices
  and have a background in medicine, optometry, or ophthalmology. They are familiar with various treatment options for recurrent corneal erosion and are looking for high-quality evidence to guide their
  decision-making. They are also interested in preventing the development of recurrent corneal erosion following corneal trauma and have a desire to contribute to the development of management guidelines.
