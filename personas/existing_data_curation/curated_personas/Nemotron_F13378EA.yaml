  hobbies: '[''Visiting contemporary art galleries'', ''Attending health policy seminars and webinars'', ''Practicing yoga and Pilates'', ''Cooking African-American and Mediterranean cuisine'', ''Volunteering
    at community health fairs'', ''Reading historical biographies and non‑fiction'', ''Maintaining a rooftop garden'']'
  career_goals: Mia aims to transition from her current managerial role to a senior executive position—such as Director of Operations or Chief Operating Officer—within a regional health system. She plans
    to earn a Master of Health Administration to deepen her strategic and financial acumen, and to lead system‑wide digital transformation projects that expand access to underserved black communities in
    Los Angeles County. Driven by competition and high standards, she targets measurable improvements in operational efficiency, patient safety, and equity metrics, positioning herself as a thought leader
    in health‑service innovation and cultural competence.
