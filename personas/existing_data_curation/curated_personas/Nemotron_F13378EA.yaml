personas:
  professional: Mia Green is a seasoned outpatient medical facility manager who orchestrates interdisciplinary teams, oversees $20 million budgets, and translates her curiosity for emerging health‑IT platforms
    into data‑driven efficiency gains, all while applying a disciplined, detail‑oriented mindset and competitive drive to exceed performance targets.
  sports: Mia Green channels her competitive edge into a disciplined fitness routine that includes thrice‑weekly yoga and Pilates at her local studio, weekly Saturday soccer matches with a women’s community
    league, and avidly supports the Los Angeles Lakers, Dodgers, and Rams, all tracked via a smartwatch that logs workouts and progress.
  arts: Mia Green cultivates her creative spark by frequently visiting contemporary art galleries to study works by artists such as Yayoi Kusama, Banksy, and Olafur Eliasson, while drawing artistic resonance
    from playlists featuring David Bowie, Nina Simone, and Lin‑Manuel Miranda, often weaving these inspirations into her community health‑fair presentations.
  travel: Mia Green prefers meticulously planned journeys that blend cultural immersion and relaxation, having organized a week‑long art pilgrimage to Barcelona’s museums, a wellness retreat in Kyoto’s
    temples, and regular weekend escapes to Santa Barbara’s vineyards, all funded through a dedicated travel savings account to balance family commitments.
  culinary: Mia Green, a confident home chef, blends Southern soul flavors—like spiced collard greens and sweet‑potato pie—with Mediterranean staples such as grilled lamb kebabs, homemade hummus, and rosemary‑infused
    couscous, seasoning her dishes with basil and cilantro harvested from her rooftop garden and showcasing the creations at local health‑fair potlucks.
  core: Mia Green is a relentlessly organized health‑operations leader who balances a competitive drive with a love for art, yoga, and soulful cooking, yet often lets her meticulous spreadsheets dictate
    even her coffee breaks.
background:
  cultural: Mia identifies as African‑American with roots in the Southern United States and a family history that migrated to California during the 1970s. Her upbringing in a close‑knit, middle‑class black
    community emphasized education, perseverance, and collective uplift. Celebrations of Juneteenth, Kwanzaa, and family reunions have reinforced a strong sense of cultural pride and responsibility. Experiencing
    both the opportunities and systemic challenges of Los Angeles' diverse neighborhoods, she has cultivated a personal commitment to reducing health disparities for black residents, drawing on her cultural
    heritage as a source of motivation and insight in both her professional and civic endeavors.
attributes:
  skills: '[''Healthcare Operations Management'', ''Budgeting and Financial Planning'', ''Regulatory Compliance'', ''Quality Improvement'', ''Process Optimization'', ''Health Informatics'', ''Strategic
