  career_goals: In the next five years Hoang aims to transition from a high‑volume broker to a boutique agency owner focused on luxury and sustainable properties in the Bay Area. He plans to build a small
    team of agents he can mentor, embedding technology‑driven tools for predictive market analytics and virtual tours. By leveraging his artistic sensibility, he wants to differentiate his listings through
    curated staging and collaborations with local artists, positioning his brand as the go‑to source for culturally rich, design‑forward homes. Hoang also aspires to become a recognized voice in community
    housing initiatives, advocating for affordable, inclusive development and contributing to city planning committees. Ultimately, he seeks financial independence through a diversified personal real‑estate
    portfolio while maintaining a reputation for integrity and client‑centric service.
