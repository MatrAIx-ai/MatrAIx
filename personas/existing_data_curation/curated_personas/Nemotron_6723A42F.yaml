  hobbies: '["Soccer", "Robotics club", "Model shipbuilding", "Strategy video games", "School marching band (drums)", "Chess", "Journaling for stress management", "Community service (local clean‑up) "]'
  career_goals: Matthew aims to attend a STEM‑focused high school and later earn a bachelor's degree in mechanical or aerospace engineering. He is drawn to careers that require precision, reliability, and
    teamwork, such as designing submarine components or spacecraft propulsion systems—fields that align with the maritime culture of Groton. In the long term, he hopes to work in a structured engineering
    environment where he can lead project teams, contribute to innovative technology, and mentor younger students through robotics or science clubs.
