personas:
  professional: Johnny Thomas, a veteran arborist with three decades of expertise in tree health assessment, precision pruning, hydraulic chain‑saw operation, and high‑angle rope climbing, channels their
    vivid imagination and collaborative spirit into designing 'living sculptures' that marry ecological stewardship with abstract watercolor concepts, while their reliable yet flexible leadership style
    helps them adapt plans on the fly, and they often rely on mindfulness breaks when anxiety spikes.
  sports: Johnny Thomas, an avid hiker and rope‑work enthusiast, spends weekends trekking the Umatilla River trail and evenings training with the Pendleton Climbing Society, while cheering on the Oregon
    Ducks football team in the fall and the Portland Trail Blazers during the NBA season, and they embody a balanced mix of solitary outdoor activity and community sport fandom.
  arts: Johnny Thomas, whose artistic practice intertwines watercolor landscapes inspired by Monet’s pastel palettes with black‑and‑white photography echoing Ansel Adams, regularly exhibits sketches and
    prints at the Pendleton Round‑Up arts and crafts fair, and they draw conceptual fuel from speculative authors such as Ursula K. Le Guin and philosophers like Nietzsche.
  travel: Johnny Thomas, a nature‑driven traveler, favors meticulously planned road trips to rugged locales like the Columbia River Gorge, the Oregon Coast, and a recent expedition to Iceland’s waterfalls,
    while dreaming of a future pilgrimage to the Scottish Highlands to photograph ancient forests, balancing their modest retirement savings with occasional splurges on photography gear, and they often
    plan trips around optimal lighting for landscape photography.
  culinary: Johnny Thomas, an enthusiastic backyard gardener, crafts seasonal meals such as heirloom tomato and basil salad, rosemary‑roasted carrots, and pan‑seared salmon topped with foraged chanterelle
    mushrooms, though they sometimes over‑season their dishes in a quest to capture the bold flavors they admire in their favorite speculative‑fiction worlds.
  core: Johnny Thomas, a 55‑year‑old arborist‑artist, blends scientific precision with boundless imagination, navigates anxiety through meditation, and they secretly hoard exotic watercolor pigments for
    spontaneous midnight painting sessions.
background:
  cultural: Johnny grew up in a working‑class white family on the outskirts of Pendleton, Oregon, where the agrarian and timber economies shaped his early life. The rural Pacific Northwest’s rugged scenery,
    combined with the region’s rich Native American heritage—particularly the Umatilla, Cayuse, and Walla Walla peoples—instilled in him a deep respect for the land and its living resources. Community events
    like the Pendleton Round‑Up and local county fairs reinforced a culture of self‑reliance, neighborly cooperation, and modest celebration of craftsmanship. While his formal education concluded with a
    high‑school diploma, Johnny’s lifelong learning has been driven by hands‑on experience, mentorship from seasoned tree workers, and an intrinsic curiosity about art, ecology, and the abstract ideas that
    link them.
