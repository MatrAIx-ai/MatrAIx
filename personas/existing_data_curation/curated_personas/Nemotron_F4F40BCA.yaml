    arts participation'', ''Mindfulness meditation'', ''Support group attendance'']'
  career_goals: Johnny aims to obtain the International Society of Arboriculture (ISA) Certified Arborist credential within the next year, strengthening his professional credibility. He dreams of launching
    a boutique consulting service that blends traditional tree care with artistic landscape concepts, offering clients “living sculptures” – creatively pruned trees that serve both ecological and aesthetic
    purposes. He also hopes to mentor a small group of apprentices, passing on both technical knowledge and his passion for nature‑inspired art. Long‑term, Johnny wishes to reduce the physical strain of
    field work by developing a part‑time role that focuses on design, education workshops, and writing articles for regional gardening magazines. Achieving these goals would give him a more predictable
    schedule to manage his anxiety and emotional wellbeing.
