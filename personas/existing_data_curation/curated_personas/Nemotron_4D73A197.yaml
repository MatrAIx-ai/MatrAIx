  hobbies: '[''cooking Peruvian cuisine'', ''listening to Andean folk and modern music'', ''dance nights'', ''jigsaw puzzles'', ''strategy board games'', ''park walking'', ''beginner yoga'', ''volunteering
    at cultural events'']'
  career_goals: Maria aims to earn a Certified Forklift Operator credential and leverage her hands‑on experience to move into a lead‑worker or floor‑supervisor role within the next two years. She plans
    to enroll in part‑time logistics and supply‑chain courses at the local community college to qualify for a logistics coordinator position, and ultimately hopes to manage a warehouse operation or start
    her own small moving business that can serve the Queens community.
