persona_description: A public policy analyst who specializes in education policy, particularly in the areas of school reform, accountability, and implementation of new educational standards. She has experience
  crafting cost estimates and analyzing the potential impact of educational initiatives on student achievement and state budgets. Her expertise lies in the use of data-driven analysis and the development
  of evidence-based policy recommendations. She is knowledgeable about the costs associated with implementing the Common Core State Standards Initiative and is interested in understanding how these costs
  can be managed and minimized. She is also interested in the potential for states to make the transition to the Common Core without incurring significant costs.
