persona_description: A qualified naturopath, nutritionist, and certified fertility awareness educator who specializes in supporting the balance of hormones and improving skin health. She is on a mission
  to help her clients find harmony with their hormones and live a more empowered life, while also reducing exposure to endocrine disrupting chemicals and maintaining a healthy lifestyle. Her top five favorite
  foods to support hormone balance include sardines, oysters and pepitas, green leafy vegetables, brassica vegetables, and seaweed. Her advice is to opt for organic personal care products and reduce exposure
  to toxins, while also eating a predominantly anti-inflammatory diet, supporting the liver and digestive system, getting 8 hours of sleep, managing stress levels, and moving the body in a way that serves
  it. Her personal care items that she highly recommends going clean with first are ones that are used on the largest part of the body or most regularly, such as sunscreen, makeup, and skincare products.
