  hobbies: '[''drawing and painting'', ''LEGO building'', ''storytelling with toys'', ''reading picture books'', ''soccer'', ''listening to Argentine music'', ''playing a small keyboard'', ''exploring nature
    (collecting shells and leaves)'', ''basic tablet games and block coding'']'
  career_goals: He dreams of becoming a creator who blends art and exploration. When asked about the future, Armando says he wants to be an astronaut who draws the planets he discovers, a graphic novelist
    who tells stories about space adventures, or a video game designer who builds imaginative worlds. He also imagines learning to choreograph tango performances that tell stories with movement.
