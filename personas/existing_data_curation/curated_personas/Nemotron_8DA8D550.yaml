personas:
  professional: Mie Chen, a 27‑year‑old commercial cleaning technician in Los Angeles, combines meticulous scheduling, bilingual communication (Mandarin and English), and a flair for sustainable practices,
    and they quietly mentor coworkers while championing eco‑friendly supply choices.
  sports: Mie Chen stays active by attending weekly Zumba and salsa classes and hiking the San Gabriel Mountains on weekends, and they root for the LA Lakers in basketball season while also following the
    LA Dodgers and joining the LA Parks Hiking Club for group treks.
  arts: Mie Chen spends their free time photographing Los Angeles street murals by artists such as Shepard Fairey and Banksy, attending museum exhibitions featuring Yayoi Kusama and Kara Walker, and unwinding
    to the sounds of J Balvin, H.E.R., and Kendrick Lamar, which together inspire their own visual storytelling.
  travel: Mie Chen prefers budget‑conscious, meticulously planned trips, having used points to visit Sedona’s red rock trails, a weekend surf retreat in Santa Barbara, and a cultural immersion in Marrakech,
    while they dream of a future sabbatical in Kyoto to study traditional garden design.
  culinary: Mie Chen delights in the LA food scene, savoring tacos al pastor, miso ramen, and roasted cauliflower tacos, while at home they experiment with kimchi fried rice using gochujang, fresh ginger,
    and sesame oil, displaying a confident yet adventurous home‑cooking style.
  core: Mie Chen blends an unwavering knack for organization with a restless artistic curiosity, juggling spotless galleries by day and spontaneous salsa nights by night, all while they battle a touch of
    chronic worry that fuels late‑night caffeine binges.
background:
  cultural: Mie is a second‑generation Chinese‑American. Her parents immigrated from Taiwan and raised her in a bilingual household where Mandarin was spoken alongside English. She grew up celebrating Lunar
    New Year, the Mid‑Autumn Festival, and other Chinese traditions, while also participating in the broader multicultural fabric of Southern California. The vibrant Chinese community in the San Gabriel
    Valley, including cultural festivals, language schools, and community associations, has shaped her identity. These roots instilled values of respect for elders, a strong work ethic, and an appreciation
    for education, which blend with her American experiences of independence and openness to diverse ideas.
attributes:
  skills: '[''Commercial cleaning and maintenance'', ''Floor care (strip, wax, polish)'', ''Heavy equipment operation (floor scrubbers, carpet extractors)'', ''OSHA safety and compliance'', ''Inventory
