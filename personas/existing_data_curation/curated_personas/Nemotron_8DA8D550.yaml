    cleaning practices (eco-friendly chemicals)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Street and nature photography'', ''Salsa and hip‑hop dance classes'', ''Group fitness classes (Zumba, HIIT)'', ''Exploring culinary diversity and home
    cooking'', ''Meditation and mindfulness practices'', ''Reading about psychology and self‑improvement'', ''Volunteering at community centers'', ''Karaoke with friends'', ''Hiking in the San Gabriel Mountains'']'
  career_goals: Mie aims to advance from a cleaning technician to a supervisory role within the next three years, seeking certifications in industrial cleaning and facilities management. In the medium term,
    she hopes to become a Facilities Coordinator for a cultural institution such as a museum or gallery, where she can merge her love of art with her operational expertise. Ultimately, she envisions launching
    her own boutique eco-friendly cleaning business that serves art spaces and community centers, emphasizing green practices and employee well‑being. She also plans to complete an associate degree in facilities
    management to support these goals.
