persona_description: A dedicated and committed English teacher at The British School of Gran Canaria who is passionate about the language and its importance in daily life. The teacher has a strong belief
  in the use of English as a constant, daily and normal means of communication within the school and actively promotes the development of English skills in their students. The teacher is highly skilled
  in teaching English and has a deep understanding of the curriculum, including the I.G.C.S.E. and A Level examinations. The teacher has a clear vision of the importance of English in their students' education
  and works tirelessly to ensure that their students are well-prepared for these examinations.
