personas:
  professional: Steven Hollis, a 29‑year‑old building cleaner with an associate’s degree, leverages meticulous floor‑care expertise and OSHA‑compliant safety practices to streamline maintenance operations
    while charting a path toward facilities‑management leadership and green‑cleaning initiatives, and they thrive on the structure of systematic protocols.
  sports: Steven Hollis follows the Green Bay Packers and Milwaukee Brewers, participates in the Kettle Moraine Hiking Club and a local fishing league, and they keep fit through weekend hikes, early‑morning
    runs, and occasional pickup basketball at the community center.
  arts: Steven Hollis’s artistic side shines through their love for classic rock vinyl—spinning Led Zeppelin, The Rolling Stones, and regional folk band The Lark—while their wildlife photography, inspired
    by Ansel Adams, earns modest recognition at local festivals, and they often curate a photo exhibit at the community center.
  travel: Steven Hollis enjoys carefully planned weekend road trips to Door County, the Upper Peninsula and occasional city breaks in Chicago, and they dream of a summer backpacking adventure through Iceland’s
    waterfalls, balancing a modest travel budget with a desire for outdoor immersion.
  culinary: Steven Hollis favors Midwestern comfort foods—grilled trout, cheese‑curd platters, and a hearty bowl of bean chili—cooking at a solid intermediate level, often experimenting with smoked paprika
    and fresh herbs, though they sometimes over‑season their dishes in pursuit of bold flavor.
  core: Steven Hollis, a detail‑driven 29‑year‑old who balances a love for structured cleaning routines with weekend wilderness escapes, can be found tinkering with DIY projects while quietly obsessing
    over perfect floor shine and the next vintage record drop, and they often schedule their evenings around a strict maintenance log.
background:
  cultural: Steven grew up in a modest, middle‑class family in Fond du Lac, Wisconsin, where German‑Scandinavian heritage and Lutheran community values are common. The region’s emphasis on hard work, self‑reliance,
    and neighborly cooperation shaped his practical outlook and teamwork ethic. He was raised with a strong sense of community involvement, participating in local church events and county fairs. The seasonal
    rhythms of the Midwest—cold winters and warm summers—instilled an appreciation for outdoor recreation and a respect for the region’s agricultural roots. These cultural influences reinforce his preference
    for structure, reliability, and modest ambition.
attributes:
  skills: '["Systematic cleaning protocols", "Floor care (strip, wax, buff)", "Restroom sanitation", "Inventory management", "Equipment operation (ride‑on scrubbers, pressure washers)", "OSHA safety compliance",
    "Basic building systems troubleshooting", "Time management", "Record‑keeping", "Customer service"]'
  hobbies: '["Fishing on Lake Winnebago", "Hiking Kettle Moraine State Forest", "Wildlife photography", "DIY furniture building", "Home repair projects", "Listening to classic rock vinyl", "Attending local
    community festivals", "Playing strategy video games", "Volunteering with Habitat for Humanity"]'
  career_goals: Steven aims to move into a supervisory or facilities management role within the next 3‑5 years. He plans to obtain the Certified Facility Manager (CFM) credential and complete a bachelor's
    degree in Business Administration to broaden his managerial skill set. He hopes to lead a team of cleaning staff, implement green cleaning initiatives, and oversee larger commercial properties. Long‑term,
    he envisions starting his own locally‑owned eco‑friendly cleaning company, providing employment for other community members and offering sustainable services to businesses in Fond du Lac. He also wants
    financial stability to purchase a home and eventually settle down.
