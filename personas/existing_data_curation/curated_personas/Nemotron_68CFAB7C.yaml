  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical biographies'', ''Chess'', ''Woodworking'', ''Volunteering to teach seniors computer basics'', ''Attending local concerts/classical music'']'
  career_goals: Entering the next phase of his career, Dennis aims to transition into a part‑time advisory role where he can mentor emerging IT leaders and provide strategic counsel to local nonprofits
    seeking technology adoption. He wishes to author a practical handbook on integrating instructional technology in adult education, drawing on his dual expertise in education and systems management. Additionally,
    he aspires to serve on the board of a regional technology‑education consortium, helping shape policies that promote reliable, secure, and cost‑effective solutions for schools and community organizations.
    His overarching ambition is to leave a lasting legacy of structured, high‑performance practices that future generations can build upon.
