  career_goals: Willie aims to secure a stable, skilled‑trade position that combines his hands‑on aptitude with his people‑focused nature. He plans to enroll in a local vocational program to become a certified
    HVAC technician or electrician, leveraging his curiosity for technical systems and his practical problem‑solving skills. Alternatively, he envisions launching a small community‑based handyman service,
    using his network and cooperative personality to build a trusted brand. Long‑term, he hopes to transition into a community outreach coordinator role at a nonprofit or local government agency, where
    he can apply his event‑planning experience and sociable demeanor to improve neighborhood resources and youth programs.
