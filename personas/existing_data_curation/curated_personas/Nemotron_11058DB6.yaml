  hobbies: '["Abstract painting", "Mixed‑media collage", "Night‑sky photography", "Speculative fiction reading", "Philosophy and science podcasts", "Poetry writing", "Hiking", "Yoga", "Improv workshops",
    "Experimental cooking", "Electronic music synthesis", "STEM outreach volunteering"]'
  career_goals: Robin aims to evolve from a mid‑level statistician to a senior analytics leader who can blend rigorous methodology with innovative visual communication. In the next three years she plans
    to earn a master’s degree in data science, develop a novel statistical framework for analyzing unstructured artistic data, and publish her findings in peer‑reviewed journals. She seeks a role that offers
    flexibility—such as a remote consultancy or a hybrid position with a research institute—where she can mentor junior analysts, lead interdisciplinary projects that address regional challenges (e.g.,
    agricultural yield forecasting or public‑health surveillance), and present her work at national conferences. Ultimately she aspires to be recognized as a thought leader at the intersection of statistics,
    creativity, and social impact.
