persona_description: A public servant at the Environmental Protection Agency (EPA) who is responsible for overseeing and monitoring the RCRA Corrective Action Program. The persona is involved in evaluating
  the progress of the program against its GPRA Goals, focusing on measuring the current human exposures and migration of contaminated groundwater. The persona is dedicated to ensuring that the RCRA Corrective
  Action program meets its mission to protect human health and the environment, and is committed to using the Environmental Indicators developed to track changes in the quality of the environment. The persona
  is likely to be highly analytical, detail-oriented, and knowledgeable about the regulatory requirements and processes related to RCRA Corrective Action.
