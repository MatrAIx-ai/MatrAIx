  career_goals: Arthur dreams of a future where he can explore the unknown and create beautiful things. He imagines becoming an astronaut who travels beyond the clouds, an artist whose paintings capture
    the worlds he envisions, and a scientist who discovers new creatures or solves mysteries in nature. He wants to keep learning new ideas, building incredible models, and sharing his unique visions with
    others, even if he prefers doing so in quiet, personal ways.
