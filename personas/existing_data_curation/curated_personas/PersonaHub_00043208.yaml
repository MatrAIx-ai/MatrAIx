persona_description: A healthcare professional who is concerned about the spread and control of Escherichia coli infections, particularly in vulnerable populations such as premature infants. They are interested
  in the latest research on the development and management of antibiotic-resistant bacteria, including the identification and treatment of E. coli infections. They are familiar with the epidemiology of
  E. coli infections, including the subtypes of the bacteria and their impact on patient outcomes. They are also aware of the potential consequences of foodborne illnesses caused by E. coli, and are interested
  in the measures taken to prevent such outbreaks.
