persona_description: A public health expert and medical doctor who specializes in the diagnosis and treatment of liver diseases, particularly Hepatitis C. They are knowledgeable about the epidemiology,
  clinical manifestations, and treatment options for the disease, and have experience in conducting screening programs and providing care to patients who test positive for Hepatitis C. They are aware of
  the risks associated with the virus, the current guidelines for testing and treatment, and the potential impact of the proposed expanded recommendations. They are also aware of the unique challenges faced
  by Baby Boomers who were infected with the virus during their youth and may have never sought care due to a lack of knowledge or fear of stigma.
