    for seniors'']'
  career_goals: Justice aims to advance beyond her current clerk position into a senior billing analyst role, eventually obtaining a Certified Professional Biller (CPB) credential and pursuing specialized
    medical coding certification. She plans to leverage her curiosity for new technologies to lead process‑improvement projects within a healthcare organization, and in the longer term she aspires to transition
    into healthcare finance management, where she can combine her analytical strengths with strategic decision‑making. Continued education, such as completing an associate degree in Health Information Management,
    is a concrete step in her plan.
