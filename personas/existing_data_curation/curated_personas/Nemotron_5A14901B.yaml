personas:
  professional: Justice Kelly is a detail‑oriented billing and posting clerk in a busy hospital setting, leveraging expert knowledge of Epic, Meditech, and advanced Excel to resolve disputed claims while
    their competitive drive and healthy skepticism push them to continuously refine processes and mentor junior staff.
  sports: Justice Kelly follows the Minnesota Wild in the NHL and the Minnesota Twins in MLB, joins a local North Shore hikers' club for weekend treks, and squeezes in early‑morning jogs along Lake Superior’s
    shoreline to stay fit, preferring low‑key, solitary exercise over team sports.
  arts: Justice Kelly’s evenings are filled with classic soul and jazz—spinning records by Aretha Franklin, Marvin Gaye, Miles Davis, and Nina Simone—while they devour contemporary novels by Sally Rooney
    and investigative pieces by Ronan Farrow, finding inspiration for their own crossword‑puzzle creations.
  travel: Justice Kelly prefers meticulously planned short getaways, often exploring the rugged cliffs of Acadia National Park or the historic streets of New Orleans, balancing a love for adventure with
    a modest travel budget that reserves room for occasional weekend trips to nearby Upper‑Midwest lakes.
  culinary: Justice Kelly enjoys cooking Southern comfort meals like shrimp & grits, fried chicken with collard greens, and cornbread topped with honey butter, wielding a solid intermediate skill set in
    the kitchen and pairing dishes with sweet tea and hot sauce to honor family food traditions.
  core: Justice Kelly blends a sharp, data‑driven mind with quiet competitiveness, thriving on solitary puzzles, meticulous billing work, and soulful music, all while guarding a skeptical edge that fuels
    relentless self‑improvement.
background:
  cultural: Justice is a Black woman raised in the Midwest, whose family emphasizes African‑American cultural traditions such as gospel music, church community, and storytelling, alongside a Midwestern
    ethic of modesty and self‑reliance. Living in Duluth, she engages with the local Black community through events hosted by the Duluth African American Heritage Society and supports cultural initiatives
    that celebrate Black history and arts. Her upbringing blends the resilience and communal support typical of Black cultural heritage with the practical, independent values of her regional environment,
    shaping both her professional demeanor and personal pursuits.
