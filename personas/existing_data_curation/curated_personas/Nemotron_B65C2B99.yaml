    to new cooking techniques'']'
  hobbies: '[''Home cooking & recipe experimentation'', ''Herb gardening'', ''Listening to traditional Mexican music'', ''Reading culinary literature'', ''Small group gatherings with close friends'', ''Exploring
    local farmers markets'', ''Watching food documentaries'', ''Walking along the Bay area'', ''Participating in cooking competitions'', ''Occasional DIY home projects'']'
  career_goals: Natalia aims to advance from first‑line supervisor to head chef, eventually overseeing multiple restaurant locations or opening her own boutique Mexican‑street‑food eatery that showcases
    her signature dishes. She plans to complete a culinary certification program to formalize her expertise and improve her organizational skills. Competitive by nature, she seeks to earn recognition in
    local cooking contests and become a trusted mentor within her community. Balancing family responsibilities, she aspires to build a reputable brand that blends traditional Mexican flavors with innovative
    twists, while maintaining the flexibility she values.
