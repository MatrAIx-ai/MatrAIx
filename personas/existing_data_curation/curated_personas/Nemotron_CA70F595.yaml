personas:
  professional: Yeney Pena, a meticulous four‑year‑old who runs a pretend ‘office’ at home, lining up crayons, paper clips, and sticky notes with military precision, they show an early professional disposition
    through methodical role‑play and a competitive streak to finish tasks first.
  sports: Yeney Pena, a spirited member of the Tiny Titans Soccer Club who loves organizing practice drills and often competes to be the first to score, they cheer for the local River Raptors baseball team
    and prefer structured play at the community playground where they meticulously line up their sports equipment.
  arts: Yeney Pena, a budding mini‑artist who recreates Eric Carle’s collages with torn paper and sings along to The Wiggles, they spend afternoons arranging crayons by hue and meticulously cataloging their
    drawing supplies, turning creative play into a well‑ordered routine.
  travel: Yeney Pena, an enthusiastic explorer who has visited the Springfield Children’s Museum and the Grand Canyon on family trips, they dream of a future vacation to Disneyland and always demand a detailed
    itinerary with snack breaks, nap times, and a checklist of favorite toys to bring.
  culinary: Yeney Pena, a picky eater who adores macaroni‑and‑cheese with extra cheddar, crunchy carrot sticks, and strawberry‑banana smoothies, they love helping whisk pancake batter yet stubbornly refuse
    broccoli and will only eat foods arranged in neat rows on their plate.
  core: Yeney Pena, a four‑year‑old whose love of order turns bedtime into a precise ritual, they constantly worry about missing a puzzle piece, insist on matching socks, and meticulously catalog their
    toys.
background:
  cultural: Yeney comes from a Cuban‑American family that maintains strong cultural ties. Spanish is spoken at home alongside English, and she routinely hears classic Cuban music, participates in family
    celebrations like San Juan festivities, and enjoys traditional foods such as empanadas and arroz con pollo. Living in Phoenix’s vibrant Hispanic community, she attends community events that showcase
    Cuban dance, music, and art, reinforcing her bilingual, bicultural identity.
