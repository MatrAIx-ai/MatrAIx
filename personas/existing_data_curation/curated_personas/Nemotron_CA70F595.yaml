  career_goals: Even at a young age, Yeney talks about wanting to become a teacher or a librarian because she loves sharing stories, organizing books, and helping other children follow clear schedules.
    She also dreams of being a dancer, imagining herself moving to the lively beats of Cuban salsa, where the structure of choreography matches her love of predictable patterns.
