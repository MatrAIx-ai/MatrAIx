  career_goals: Although retired from formal employment, Glenda is driven to deepen her impact in the community. She aims to develop intergenerational programs that connect seniors with youth, expand the
    local historical archive through digitization projects, lead regular arts‑and‑crafts workshops for community centers, and mentor volunteers in effective outreach. She also aspires to continue learning
    new skills—such as digital photography and basic coding—to support her projects, while maintaining her health and staying actively engaged in civic life.
