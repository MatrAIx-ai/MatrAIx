  career_goals: As she grows, Maribel aims to nurture her love of art, music, and storytelling, develop fluent language skills in both English and Spanish, and eventually share her creativity with others—perhaps
    as a teacher, artist, or community volunteer who fosters harmony and cultural exchange.
