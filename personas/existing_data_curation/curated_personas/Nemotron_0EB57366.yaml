  career_goals: While still young, Danny imagines a future where he can combine his love of structure, service, and the outdoors. He often talks about becoming a firefighter because he admires clear chains
    of command and the chance to help his community. He also dreams of working as an environmental scientist or park ranger, protecting the Great Lakes and local wildlife, which aligns with his appreciation
    for nature and desire for a predictable, purpose‑driven career. In the near term, he aims to earn good grades, become more proficient on the piano—an instrument that requires disciplined practice—and
    achieve a leadership badge in his scouting group, laying a foundation for responsible adulthood.
