  hobbies: '[''Watercolor Painting'', ''Pottery'', ''Reading Historical Fiction'', ''Gardening (Roses & Vegetables)'', ''Hiking Long Island Sound Trails'', ''Cooking (Mediterranean & Asian)'', ''Volunteer
    Literacy Tutoring'', ''Community Choir Singing'', ''Yoga'', ''Visiting Art Exhibitions'']'
  career_goals: Within the next two years, Jane aims to earn a master’s degree in educational leadership and transition into an instructional coordinator or assistant principal role. She aspires to spearhead
    a district‑wide arts‑integration program that nurtures creativity across core subjects. Jane also plans to develop a mentorship network for early‑career teachers, author a resource guide on interdisciplinary
    lessons, and eventually, after retirement, offer consulting services to schools seeking to embed arts and experiential learning. She envisions establishing a community learning center in Oyster Bay
    that provides after‑school enrichment and adult education workshops, leaving a lasting legacy of lifelong learning in her community.
