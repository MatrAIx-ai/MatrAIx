persona_description: A landscape ecologist who specializes in monitoring and assessing the health of riparian buffers and their associated aquatic ecosystems. The individual is interested in understanding
  the factors that contribute to the degradation and restoration of these ecosystems, and how they can be used to predict and manage future environmental impacts. The persona is particularly interested
  in the effects of riparian buffer conditions on the health of aquatic insects and the potential for riparian buffers to provide functions such as water quality and air quality. The individual is also
  interested in the economic benefits of riparian buffers, including the potential for timber, hunting, and other land use activities.
