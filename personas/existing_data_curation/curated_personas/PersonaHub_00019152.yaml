persona_description: Wilbur C. Phillips was an advocate for child health and hygiene, and a founder of the National Social Unit Organization. He was an unsalaried "social inventor" who spent the remainder
  of his life developing the social unit plan and promoting its application. His work focused on improving community health through local participation in decision-making and the use of technical expertise.
  He was known for his emphasis on the economic potential of social units as a way of organizing consumers and conveying scientific and technical expertise to them. His contributions to the field of child
  health and hygiene, as well as his work in community organization, earned him recognition and respect from scholars and practitioners in the field.
