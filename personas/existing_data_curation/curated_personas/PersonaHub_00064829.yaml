persona_description: Alex Frazer-Harrison, CIM, is a recognized expert in workplace safety education and training. He is the head of the Job Safety Skills Society, a non-profit organization dedicated to
  teaching youth about workplace safety. His expertise lies in developing classroom-based programs that educate youth about the different kinds of hazards in the workplace and how to advocate for themselves
  and ask questions when necessary. He believes that workplace safety should always be a top priority and that first-time employees lack the experience and "sixth sense" to spot and avoid hazards. He also
  emphasizes the importance of recognizing different kinds of hazards and doing a mental assessment of the risks associated with those hazards. He stresses the need for employers to accept the sign of a
  conscientious and concerned employee who takes their job seriously. He is a proponent of workplace safety and believes that it is not always easy for students to broach health and safety issues with an
  employer. He encourages teachers to role-play various scenarios and tell their students that in doubt, they should ask. He also believes that asking workplace safety-related questions can be a good way
  for newbie employees to show they take their job seriously. He is also a proponent of the Alberta Workplace Safety and Health Act and the bloodylucky.ca website.
