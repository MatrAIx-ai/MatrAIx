  hobbies: '[''Abstract painting'', ''Sketching'', ''Urban‑exploration photography'', ''Reading speculative fiction'', ''Philosophy'', ''Acoustic guitar'', ''Micro‑fiction writing'', ''Nature hikes along
    Saginaw Bay'', ''Tabletop gaming with small groups'', ''Volunteering at library art workshops'']'
  career_goals: Raymond aims to finish his associate degree in environmental health and facilities management, then move into a sustainable facilities coordinator role where he can blend his cleaning expertise
    with eco‑friendly practices and artistic enhancements. He aspires to lead a team that designs workplace environments that are both functional and aesthetically uplifting, incorporating community‑sourced
    artwork and wellness‑focused spaces. In the longer term, he hopes to launch a community art outreach program in Bay County that offers free workshops and public murals, using his compassion and creative
    drive to strengthen local connections.
