  hobbies: '["Herb gardening", "Quilting", "Church choir singing", "Reading mystery and historical fiction", "Volunteering teaching baking to seniors", "Walking historic downtown Cedartown"]'
  career_goals: Martha’s primary ambition is to solidify her bakery’s reputation as a community cornerstone while creating a lasting legacy for her family. Over the next five years she plans to broaden
    her product line to include a seasonal “Southern Heritage” line that showcases recipes passed down from her grandparents, and to launch a series of hands‑on baking workshops for local youth and aspiring
    bakers. She also hopes to publish a cookbook that documents her family’s recipes and the stories behind them, and to establish a modest catering branch that can service weddings and church events throughout
    Polk County. All of these goals are pursued with an eye toward financial stability for her household and the ability to mentor the next generation of bakers.
