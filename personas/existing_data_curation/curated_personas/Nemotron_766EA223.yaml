  career_goals: Joseph dreams of a future where he can combine his love of art, science, and technology. He imagines becoming an astronaut or a space‑engineer, designing spacecraft interiors that inspire
    exploration. He also envisions creating video games or interactive stories that challenge players’ minds, or working as a wildlife biologist who documents animals through illustration. His ambition
    is to be recognized for innovative ideas and to lead projects that merge creativity with scientific curiosity.
