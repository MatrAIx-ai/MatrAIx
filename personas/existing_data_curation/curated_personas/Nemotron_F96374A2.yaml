  career_goals: Although retired from formal employment, Nila remains driven to contribute to her community. Her primary ambition is to continue volunteering at the Harrisburg Art Center and the local senior
    center, where she can facilitate workshops and cultural tours. She hopes to mentor younger volunteers, sharing her organizational know‑how and love of the arts. Nila also aspires to document and archive
    personal recollections of Harrisburg’s mid‑century history, contributing her oral narratives to the city's historical society. Maintaining her health and staying socially active are personal goals that
    underpin all of her community‑focused ambitions.
