personas:
  professional: Maritza Sone is an aspiring visual storyteller who blends their talent for drawing comic strips, LEGO world‑building, and Scratch game coding into intricate narrative projects, using the
    strategic mindset honed from competitive chess to organize elaborate plotlines while their calm, organized nature makes them a reliable collaborator even in solitary creative bursts.
  sports: Maritza Sone is an enthusiastic junior soccer player for the Corozal Cubs, a fan of the regional baseball team the Hurricanes, practices weekend bike rides on the hills, and complements their
    active routine with weekly chess matches that double as mental training, showing a competitive streak that drives them to track personal bests in sprint drills.
  arts: Maritza Sone is a budding illustrator who admires graphic novelists like Art Spiegelman and Japanese anime director Hayao Miyazaki, draws inspiration from the lively rhythms of plena and bomba while
    practicing the cuatro at family gatherings, and curates a personal collection of comic books featuring superheroes and fantastical creatures, often spending evenings sketching scenes that blend tropical
    flora with magical realms.
  travel: Maritza Sone dreams of exploring the vibrant streets of Old San Juan, the crystal‑clear waters of Aruba, and the misty ruins of Machu Picchu, preferring carefully planned day trips that mix adventure
    hikes in the hills near home with relaxed beach picnics, and they keep a scrapbook of postcards from each visited destination alongside sketches of imagined exotic locales.
  culinary: Maritza Sone enjoys a playful palate, favoring mango‑lime smoothies, homemade rice and beans with plantain chips, and simple cheese quesadillas they can assemble with minimal supervision, while
    their budding cooking skills shine when they experiment with bright ingredients like cilantro, pineapple, and shredded coconut to create colorful fruit salads for family gatherings.
  core: Maritza Sone is an eight‑year‑old imaginative prodigy who balances a competitive streak with calm resilience, turning LEGO bricks, comic sketches, and Scratch games into vivid personal universes
    while meticulously managing pocket money and navigating mild allergies with quiet confidence.
background:
  cultural: Maritza is a proud Puerto Rican child from Corozal, Toa Alta. She grows up in a bilingual household where Spanish is spoken daily, with English introduced at school. Her family celebrates traditional
    holidays such as Navidad and San Juan, and participates in local festivals featuring bomba, plena, and coquí songs. The island’s natural beauty—lush hills, tropical flora, and nearby coast—shapes her
    love for nature. She tastes and helps prepare classic dishes like mofongo and arroz con gandules, and feels a strong connection to her community’s values of family unity, resilience, and pride in Puerto
    Rican heritage.
