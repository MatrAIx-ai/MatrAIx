persona_description: A Plains Indian woman who has lived her entire life in the Northern Plains of North America and has extensive knowledge of the natural resources and cultural practices of her people.
  She is skilled in gathering and preparing berries, particularly the Sarvis berries, and is knowledgeable about the medicinal and ceremonial uses of the berries. She is also an expert in the traditional
  methods of gathering berries, such as drying them in the sun and using them in soups and stews. She is a respected member of her community and is known for her knowledge and expertise in the use of berries
  in her culture.
