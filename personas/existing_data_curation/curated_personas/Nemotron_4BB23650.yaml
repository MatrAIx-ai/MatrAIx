  career_goals: Qin aims to advance from his current food preparation role to a kitchen supervisor position within the next two years, leveraging his organizational strengths to lead larger teams and implement
    systematic process improvements. Long‑term, he dreams of opening a boutique fusion restaurant that marries East Asian flavors with Michigan’s local produce, showcasing his artistic sensibility through
    innovative plating and menu concepts. He also plans to pursue a culinary arts associate degree to deepen his technical knowledge and eventually mentor aspiring chefs in his community.
