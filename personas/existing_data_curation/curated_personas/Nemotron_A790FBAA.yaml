personas:
  professional: Maryjoyce Franklin is a senior data analyst turned cultural strategist in the Dayton region, leveraging their knack for turning complex datasets into vivid narratives and their love of art
    to shape policy recommendations for nonprofit arts organizations, even if their relaxed approach to deadlines sometimes leads to last‑minute report crunches.
  sports: Maryjoyce Franklin enjoys low‑impact fitness through weekly yoga classes and weekend walk‑abouts in historic neighborhoods, while cheering on the Dayton Dragons baseball team and the Ohio State
    Buckeyes football, and they occasionally play friendly doubles tennis at the Dayton Racquet Club, though a tendency to forget to stretch can lead to a sore knee after a long hike.
  arts: Maryjoyce Franklin immerses themselves in the arts by painting watercolors of Dayton's riverfront, attending performances at the Dayton Ballet, savoring Monet's waterlilies, listening to Yo‑Yo Ma's
    cello suites, and discussing contemporary fiction by Zadie Smith at their book club, while they occasionally collect vintage theater posters to adorn their study.
  travel: Maryjoyce Franklin prefers relaxed, culturally‑rich itineraries, often planning week‑long road trips to historic towns like Gettysburg and Asheville, while dreaming of wandering Kyoto's temples,
    and they relish weekend getaways to the nearby Cincinnati Art Museum, though they sometimes overpack and delay booking accommodations until the last minute.
  culinary: Maryjoyce Franklin delights in turning heirloom vegetables into imaginative dishes such as a roasted beet and goat‑cheese salad with fresh basil and sumac, a slow‑cooked ratatouille inspired
    by a Provence trip, and occasional homemade miso ramen, while their kitchen frequently becomes a canvas of spilled flour and half‑finished recipes left on the counter.
  core: Maryjoyce Franklin is a curiosity‑driven data strategist who weaves art into analytics, balances meticulous insight with a habit of misplacing their keys, and finds calm in garden soil and watercolor
    strokes amid occasional bouts of worry.
background:
  cultural: Maryjoyce is a white Midwesterner of European (primarily German and Irish) ancestry, raised in a small-town community near Dayton, Ohio. Her family emphasized education, civic involvement, and
    appreciation of local heritage. Growing up she was exposed to both rural traditions and the industrial‑artistic culture of the region, which fostered a blend of practicality and creative curiosity.
    She remains active in community initiatives, such as the local historical society and a regional arts council, reflecting the Midwestern values of cooperation, modesty, and a strong sense of place.
attributes:
  skills: '[''Data Analysis'', ''Strategic Planning'', ''Report Writing'', ''Stakeholder Engagement'', ''Project Management'', ''Facilitation'', ''Advanced Excel'', ''Tableau'', ''Art History Knowledge'',
    ''Creative Problem Solving'']'
  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Theater attendance'', ''Book club participation'', ''Gardening'', ''Creative cooking'', ''Yoga and mindfulness'', ''Exploring historic
    sites and museums'']'
  career_goals: Maryjoyce aims to transition her management‑analyst experience into a senior advisory role that bridges analytics and cultural programming, ideally within a nonprofit arts organization or
    a municipal cultural affairs office in the Dayton region. She seeks to influence policy on arts funding, mentor junior analysts, and develop data‑driven strategies that highlight the economic and social
    value of the arts. Over the next five years she hopes to author a guide on integrating creative thinking into business analytics and eventually step back to a part‑time consulting capacity that allows
    more flexibility for personal pursuits while still contributing her expertise to community‑focused projects.
