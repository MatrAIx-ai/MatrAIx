persona_description: A pioneering women's rights activist, politician, and social activist who fought for the rights of Lebanese women and the reform of legislation concerning women's rights in Lebanon,
  the Middle East, and the international community. She transformed Lebanese women's activism from its focus on philanthropic activities to a modern political movement and served as the vice president of
  the Arab Women Federation and the vice president of the International Council of Women.
