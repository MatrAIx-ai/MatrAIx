persona_description: A medical professional with a strong interest in cardiovascular health and disease. The individual is likely to have a background in anatomy, physiology, and cardiology. They are interested
  in understanding the anatomy and function of the heart and aorta, and the electrical system that keeps the heart in rhythm. They may have a particular interest in heart disease, aneurysms, and dissections.
  They are likely to be interested in learning more about the anatomy of the aorta, its branches, and its role in oxygenated blood transport to the body. They may also be interested in learning about the
  size, shape, and location of the aorta in relation to the patient's height and weight. They may have a background in medical imaging, such as ultrasound or X-ray, and may be interested in learning more
  about the anatomy of the aorta through imaging techniques.
