personas:
  professional: Mary Harrison, a two‑year‑old with a budding curiosity for how things work, spends hours dismantling plastic toys to understand their mechanisms while they prefer the practical simplicity
    of stacking blocks in tidy towers.
  sports: Mary Harrison enjoys the rhythmic splash of toddler swim classes at the Ambler Aquatics Center and bolts enthusiastically across the grassy field at Robertson Park for early‑stage preschool soccer,
    always keeping a keen eye on the colorful team jerseys of the local Ambler Mini Stars while they cheer for the team with a giggly roar.
  arts: Mary Harrison immerses themselves in storytime sessions at the Ambler Public Library and sings along to Raffi’s 'Baby Beluga,' delighting in the bright illustrations of Dr. Seuss books while they
    quietly draw simple shapes on the back of grocery receipts.
  travel: Mary Harrison prefers short, car‑filled road trips to nearby destinations like the Amish farms of Lancaster or the shoreline at Cape May, where they can explore tactile exhibits while the family
    playlist of classic Disney lullabies fills the journey.
  culinary: Mary Harrison relishes creamy mac and cheese topped with a dash of grated cheddar, reaches eagerly for crisp apple slices, and proudly "helps" stir a bowl of oatmeal with a plastic spoon, though
    they remain picky about green vegetables.
  core: Mary Harrison blends a curious, problem‑solving mind with a quiet, competitive spirit, preferring solo play and practical experiments while they navigate the world through a toddler’s lens of endless
    wonder and occasional stubbornness.
background:
  cultural: Mary is raised in a suburban, middle‑class white family in Ambler, Pennsylvania. Her upbringing reflects typical Northeastern U.S. cultural norms, with exposure to local public schools, community
    parks, and family traditions that emphasize self‑reliance, practical problem‑solving, and respect for personal space. The household celebrates American holidays and incorporates occasional European
    heritage customs passed down through grandparents.
