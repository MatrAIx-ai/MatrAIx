  career_goals: Orlando dreams of turning his love for technology and structure into a career in software engineering, ideally focusing on video‑game development where he can blend coding with creative
    design. He also sees himself pursuing a degree in mechanical engineering to satisfy his fascination with how things work and to keep the option of working on automotive projects. In the longer term,
    he hopes to give back to Milwaukee’s Latino youth by mentoring them in coding clubs or after‑school robotics programs, using his calm demeanor and resilience to be a reliable role model. He plans to
    earn a scholarship to attend the University of Wisconsin‑Milwaukee and to stay involved in community initiatives that celebrate his Mexican heritage.
