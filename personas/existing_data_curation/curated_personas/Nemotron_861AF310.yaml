personas:
  professional: Orlando Ferrer, a 14-year-old aspiring robotics engineer and avid strategic gamer, blends a methodical approach to building LEGO and RC projects with spontaneous teamwork in school robotics
    club competitions, showing a calm resilience that balances structure-oriented coding with impromptu problem‑solving, and they thrive on both meticulous planning and on‑the‑fly adjustments.
  sports: Orlando Ferrer plays pickup soccer at the local park and joins weekend basketball games, cheering for the Milwaukee Bucks and the Chicago Fire while also following the Brewers during baseball
    season, and they often practice free‑kick techniques with friends after the game.
  arts: Orlando Ferrer practices acoustic guitar improvisations inspired by John Mayer, reads graphic novels like Frank Miller's 'Sin City', and they attend local indie gigs featuring bands such as The
    Blue Letters, weaving creativity into their daily routine.
  travel: Orlando Ferrer has visited the Milwaukee lakefront, taken a family trip to Mexico City to explore cuisine roots, they dream of a solo adventure to Tokyo’s Akihabara for gaming culture, and hopes
    to attend a soccer match at Barcelona’s Camp Nou next summer.
  culinary: Orlando Ferrer cooks Mexican meals like carne asada tacos, guacamole, and chiles rellenos with family each Sunday, and they also experiment with homemade pizza topped with pepperoni and mushrooms,
    displaying a developing but confident kitchen skill set.
  core: Orlando Ferrer is a calm, spontaneously strategic teen who oscillates between meticulous LEGO builds and impulsive video game marathons, and they often forget to clean their room in the process.
background:
  cultural: Orlando comes from a Mexican‑American family that maintains strong ties to its cultural heritage while adapting to life in Milwaukee’s diverse neighborhoods. He grew up speaking Spanish at home
    and celebrates traditions such as Día de los Muertos, Mexican Independence Day, and family gatherings centered around tacos, tamales, and mole. His parents encourage bilingualism and instill pride in
    their roots, which is reflected in his fluency and his participation in local Latino community events, like the annual Mexican Cultural Festival in the city. At the same time, he enjoys Midwest staples—like
    cheese curds and lake‑side outings—creating a hybrid identity that blends Mexican customs with Midwestern American life.
