personas:
  professional: Juan Wilson, a one-year-old budding sensory researcher, applies a critical eye to each new toy, meticulously cataloguing textures and sounds while they maintain a flexible routine that balances
    nap schedules with spontaneous play.
  sports: Juan Wilson, a one-year-old who delights in crawling races at the neighborhood playgroup and participates in toddler “mini‑soccer” sessions organized by the community center, cheers on the local
    Cubs mascot while they fiercely compete for the brightest stuffed ball.
  arts: Juan Wilson, a one-year-old who immerses in finger‑painting with non‑toxic paints, enjoys the soothing cello solos of Yo‑Yo Ma and the playful tunes of Sesame Street, and shows a keen appreciation
    for bright, unconventional color palettes while they experiment with mixing colors on every surface.
  travel: Juan Wilson, a one-year-old who has already explored the family’s mountain cabin and a sunny beach resort in Florida, prefers familiar stroller‑friendly routes and soothing lullabies in new rooms
    while they eagerly look forward to a planned future trip to Disney World’s Fantasyland.
  culinary: Juan Wilson, a one-year-old who favors creamy avocado puree, soft scrambled eggs, and mashed sweet potatoes, delights in the aroma of cinnamon sprinkled on bedtime oatmeal, and occasionally
    negotiates extra broccoli florets with a gummy smile while they develop a growing palate for varied textures.
  core: Juan Wilson, a curious, socially spirited one-year-old who balances methodical exploration with spontaneous play, competes for the brightest toy, and thrives on sensory experiences while they navigate
    typical infant challenges.
background:
