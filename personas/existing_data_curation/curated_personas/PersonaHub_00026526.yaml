persona_description: A state governor who is a proponent of a national curriculum framework, particularly for English and math education. The governor believes that a common standards approach, like the
  Common Core State Standards Initiative, can lead to a more unified and consistent education system across the United States, avoiding the political and controversial content of Texas's history and social
  studies textbook controversy. The governor is also interested in the transparency and accountability aspects of the Common Core framework, as well as the potential financial implications of adopting the
  standards for states seeking federal funding.
