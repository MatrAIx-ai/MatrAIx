  career_goals: Cecily aims to transition into a leadership role within the county’s public health system, aspiring to become Director of Community Health Services where she can design integrated care models
    that serve both residents and the growing senior population of Naples. She plans to earn a certification in health informatics to enhance data‑driven decision‑making and to spearhead a county‑wide initiative
    that bridges social services with medical care. Long‑term, she hopes to launch a nonprofit focused on preventive mental‑health programs for families, while also serving on advisory boards that shape
    health policy at the state level. Her career trajectory is guided by clear milestones, measurable outcomes, and a commitment to fostering collaborative, compassionate community networks.
