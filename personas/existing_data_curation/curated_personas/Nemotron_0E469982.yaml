personas:
  professional: Cecily Edwards, a seasoned healthcare social worker with a STEM graduate background, blends a practical, structured approach to data‑driven case management and grant writing with a warm,
    collaborative style that energizes interdisciplinary teams and community outreach initiatives.
  sports: Cecily Edwards, an avid weekend kayaker on the Gulf, regularly attends yoga and Pilates sessions at her local studio, supports the Miami Heat and Tampa Bay Buccaneers, and participates in a community
    running club that trains for the Naples Half Marathon each spring.
  arts: Cecily Edwards, a dedicated member of a community theater troupe who designs costumes, draws inspiration from the storytelling of Lin‑Manuel Miranda and the classic performances of Meryl Streep,
    and attends live music nights featuring local folk guitarist James Hall, weaving artistic expression into her social calendar.
  travel: Cecily Edwards, a methodical planner who prefers organized itineraries, enjoys seasonal trips to explore Florida’s natural reserves such as the Everglades and Sanibel Island, and dreams of a cultural
    immersion tour of New Orleans and a weekend escape to Asheville, balancing her love for nature with a penchant for curated experiences.
  culinary: Cecily Edwards, a garden‑to‑table enthusiast, delights in preparing grilled mahi‑mahi with citrus‑marinade, heirloom tomato ratatouille, and quinoa‑kale salads using fresh produce from her vegetable
    garden, and pairs these dishes with a crisp Albariño or a light Pinot Noir at local wine‑tasting events.
  core: Cecily Edwards blends analytical rigor with community‑centric compassion, navigating structured professional goals while savoring spontaneous creative pursuits and occasional indulgences.
background:
  cultural: Cecily was raised in a suburban Midwestern environment where a strong work ethic and community service were emphasized. As a white American with European ancestry, she grew up celebrating traditional
    holidays such as Thanksgiving, Fourth of July, and Christmas, while also embracing the multicultural vibrancy of coastal Florida. Relocating to Naples introduced her to a blend of Southern hospitality,
    Latin influences, and a retiree‑centric culture that values health, leisure, and social connection. This mixed backdrop fuels her appreciation for diverse perspectives, drives her commitment to inclusive
    social work, and informs her love of beach activities, citrus festivals, and the region’s emphasis on wellness and community – all of which shape her personal and professional identity.
