  hobbies: '[''Hiking local trails'', ''Gardening and seasonal cooking'', ''Reading mystery fiction'', ''Knitting'', ''Landscape photography'', ''Listening to logistics and self‑improvement podcasts'',
    ''Small‑group board‑game evenings'', ''Volunteer work at the community food bank'']'
  career_goals: Claudia aims to move from a stocker role to a shift supervisor within the next two years, leveraging her performance metrics and process‑improvement track record. She plans to obtain a professional
    forklift certification and enroll part‑time in an associate’s program in supply chain management at a local community college. Long‑term, she aspires to become a warehouse manager or logistics coordinator
    for an e‑commerce fulfillment center, where she can blend her practical skills with strategic oversight and mentor a small crew of employees.
