personas:
  professional: Jannette Perez, an 8‑year‑old budding naturalist, channels curiosity and methodical nature into meticulous observation journals of forest and marine life, dreaming of one day becoming a
    marine biologist.
  sports: Jannette Perez enjoys quiet weekend hikes through El Yunque, gauges fitness by climbing the trail’s gentle slopes, follows the Puerto Rican baseball team Indios de Mayagüez, and occasionally kicks
    a soccer ball alone in the backyard, preferring solo activity over organized team sports.
  arts: Jannette Perez delights in sketching detailed flora and sea turtles, drawing inspiration from nature painters such as Georgia O'Keeffe and Claude Monet, while the playlist includes traditional plena
    rhythms by Plena Libre and they practice simple tunes on a small keyboard echoing the melodies of young pianist Lang Lang.
  travel: Jannette Perez prefers low‑key family trips, cherishing the guided nature walk taken in El Yunque and the day spent snorkeling at Culebra’s Flamenco Beach, and dreams of a future adventure to
    the Galápagos Islands to see giant tortoises up close.
  culinary: Jannette Perez enjoys mixing freshly harvested basil and mint from a balcony garden into a bright pasta primavera, often pairing it with a side of mango salsa, and proudly prepares simple banana
    pancakes on weekend mornings.
  core: Jannette Perez is a quietly curious 8‑year‑old who balances meticulous nature study with a habit of losing pencil caps in the garden, turning every day into a small, organized adventure.
background:
  cultural: Jannette is a proud Puerto Rican from San Germán, a town known for its historic architecture and vibrant local festivals. She grows up in a bilingual household, speaking Spanish at home and
    learning English at school. Family gatherings are central to her life, featuring traditional dishes like arroz con gandules, pasteles, and lechón, and music such as plena, bomba, and salsa. She celebrates
    San Germán’s patron saint festivals and the island’s Carnaval, which bring community dancing, decorative masks, and street parades. Puerto Rican values of respeto (respect) for elders, comunidad (community),
    and familia (family) shape her compassionate outlook. She also participates in school programs that teach about the island’s natural heritage, reinforcing her love for the local environment and cultural
    pride.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Organizational skills", "Empathy and peer support", "Craft making", "Plant care"]'
  hobbies: '["Reading adventure and nature books", "Drawing and sketching", "Jigsaw puzzles", "Herb gardening", "Listening to plena and bomba music", "Playing keyboard", "Family nature walks"]'
  career_goals: Jannette dreams of a future where she can combine her love for helping others and her interest in nature. She frequently talks about becoming a veterinarian so she can care for animals,
    especially the neighborhood dogs and the turtles she sees on the beach. She also imagines being a science teacher, sharing her curiosity about the natural world with younger children. In the long term,
    she aspires to study environmental science to protect Puerto Rico's coastal ecosystems, hoping her early habits of planning and responsibility will help her achieve these goals.
