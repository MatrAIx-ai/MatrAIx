persona_description: A conservation practitioner who is responsible for conducting Conservation Needs Assessments for amphibian species in their country or region. They have experience in facilitating workshops
  to assess the conservation needs of amphibian species at national or regional levels, and have developed an online assessment tool to continue the process. They are interested in continuously updating
  the criteria and rankings of species based on new knowledge and changes in threats to amphibians. They are looking for ways to ensure that the conservation needs of amphibian species are effectively addressed
  and that the efforts are focused on the most critical situations.
