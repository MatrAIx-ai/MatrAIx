persona_description: A scientist or researcher in the field of nanotechnology, specifically focused on the study of perovskite nanocrystals and their interactions with other materials. The persona is interested
  in understanding the relationship between the size, shape, and bandgap energy of individual cesium lead bromide nanocrystals (CsPbBr3 NCs) and their interaction with other materials. They are likely to
  be familiar with low-loss electron energy loss spectroscopy (EELS) and scanning electron transmission (STEM) microscopy techniques, and have a keen interest in the practical applications of perovskite
  nanocrystals in optoelectronic devices.
