    in school science fairs"]'
  career_goals: Looking ahead, Joseph dreams of a career that lets him blend his love of science with his desire to help others and stay connected to his community. He aspires to become an environmental
    scientist or wildlife rehabilitator, working on projects that protect local habitats while providing hands‑on care for animals. He also envisions a role in education or community outreach, where he
    can share his curiosity and practical skills with younger students, fostering a supportive and collaborative environment. Flexibility and the opportunity to make a tangible difference are central to
    his long‑term ambitions.
