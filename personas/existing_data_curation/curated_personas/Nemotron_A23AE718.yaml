personas:
  professional: A budding junior coder and wildlife enthusiast, Joseph Henry fuses curiosity with practical problem‑solving by building Scratch games that simulate ecosystems, and their spontaneous, compassionate
    nature drives them to involve classmates in collaborative projects despite occasional disorganization.
  sports: An avid outdoor adventurer, Joseph Henry spends weekends hiking the nearby state park trails, fishes at the local river with the youth Anglers Club, and cheers for the hometown baseball team,
    the River City Raptors, while also dabbling in the school's cross‑country team.
  arts: A nature‑inspired sketcher, Joseph Henry fills notebooks with detailed wildlife drawings, admires the works of wildlife artist John James Audubon, devours science‑fiction novels by Becky Chambers,
    and enjoys listening to the orchestral scores of Hans Zimmer while drawing.
  travel: A spontaneous explorer, Joseph Henry loves weekend camping trips to the Appalachian mountains, dreams of visiting Yellowstone National Park, and prefers packing a backpack the night before rather
    than planning detailed itineraries, often rallying friends for impromptu day hikes.
  culinary: A budding kitchen experimenter, Joseph Henry enjoys making simple grilled cheese sandwiches, whipping up trail‑mix snacks of pretzels, dried cranberries, and almonds, while their favorite dish
    to cook on a campfire is buttery s’mores, though they remain picky about leafy greens.
  core: Joseph Henry is a curious, compassionate 12‑year‑old who blends science and nature through coding and sketching, worries about money yet saves diligently, battles occasional anxiety, and thrives
    on spontaneous outdoor adventures punctuated by a love for simple, tasty treats.
background:
  cultural: Joseph comes from a white, rural Southern background in Simpsonville, Kentucky, a small community with strong values around family, neighborliness, and self‑reliance. His upbringing includes
    frequent involvement in local church and community events, where cooperative spirit and helping others are emphasized. The regional culture of modesty, appreciation for the outdoors, and traditions
    like church socials, farmer's markets, and country music shapes his worldview. Yet, exposure to school activities and the internet provides him with a broader perspective, blending local heritage with
    curiosity about wider scientific and social topics.
attributes:
  skills: '["Scratch programming","Basic woodworking and tool use","Empathetic listening","Team collaboration","Organizing small group activities","Creative writing","Illustration"]'
