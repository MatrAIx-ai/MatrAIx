personas:
  professional: Helen Cruz, a 20‑year‑old automotive detailer, blends meticulous inventory tracking and schedule‑keeping with a curiosity for green‑cleaning technologies, delivering spotless fleet vehicles
    while assertively pursuing certifications and a future supervisory role in a rental‑car company.
  sports: Helen Cruz energizes her weekends with volleyball matches at the Boise City Volleyball Club, participates in high‑intensity Zumba classes, hikes the Sawtooth Mountains during summer, and avidly
    follows the Idaho Steelheads and Boise State Broncos, balancing cardio, strength, and team camaraderie.
  arts: Helen Cruz draws creative inspiration from listening to Bon Iver while detailing cars, pumps up her Zumba sessions with Beyoncé and Shakira, watches DIY restoration videos on ChrisFix, and enjoys
    occasional performances at the Boise Contemporary Theater featuring works by Lin‑Manuel Miranda and poetry readings of Maya Angelou.
  travel: Helen Cruz prefers low‑cost, eco‑conscious road trips that combine hiking and sustainable lodging, having explored Yellowstone and Banff National Parks and dreaming of a backpacking adventure
    through Patagonia, while meticulously planning itineraries on Google Maps and packing a reusable travel kit.
  culinary: Helen Cruz, an enthusiastic home cook, frequently prepares a vegan quinoa bowl with roasted sweet potatoes, kale, chickpeas, and tahini, experiments with Thai green curry using kaffir lime leaves
    and coconut milk, and occasionally indulges in a classic Idaho potato casserole topped with sharp cheddar, sourcing most ingredients from local farmers’ markets.
  core: Helen Cruz, a 20‑year‑old detailer‑to‑entrepreneur in the making, merges eco‑friendly car care, mountain hikes, and spontaneous Zumba sessions with a habit of over‑organizing their calendar and
    a disciplined, yet occasionally impulsive, budgeting approach.
background:
  cultural: Helen comes from a white American family with Hispanic roots; her parents’ lineage traces back to Spanish‑descended settlers who have integrated into the predominantly Anglo‑American culture
    of rural Idaho. Growing up in Weston, she was immersed in the region’s strong community ethos, outdoor recreation, and a work‑oriented mindset. Her household blends mainstream American traditions—Thanksgiving,
    Fourth of July—with occasional celebrations of Latino customs such as Día de los Muertos and family gatherings featuring Spanish cuisine. She is fluent in English and conversational in Spanish, reflecting
    her mixed heritage.
attributes:
