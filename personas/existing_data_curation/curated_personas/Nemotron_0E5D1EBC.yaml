  hobbies: '[''Hiking'', ''Volleyball'', ''Community clean-up volunteering'', ''DIY car restoration'', ''Cooking experimental meals'', ''Zumba dance classes'', ''Reading about sustainable technology'',
    ''Attending workshops on eco-friendly living'']'
  career_goals: Helen aims to advance from a detailer to a supervisory role within a car‑rental or fleet‑service company, earning certifications in automotive detailing and green cleaning technologies.
    She envisions launching her own mobile detailing business that emphasizes sustainable practices, while completing her associate degree in environmental health or business administration to broaden her
    managerial capabilities.
