  career_goals: Kala aims to secure a stable, routine‑oriented position that allows her to work independently, such as a remote administrative assistant, bookkeeper, or data‑entry specialist. She plans
    to obtain a Certified Bookkeeper credential within the next year and hopes to leverage her bilingual abilities to support small Mexican‑American businesses in the Modesto area. In the longer term, she
    aspires to launch a modest home‑based catering service featuring authentic Mexican dishes, providing a reliable income stream while maintaining the predictable schedule she values.
