data:
  user 1 personas: 'I am a musician.

    I like to write my own songs.

    My best friend is in a band with me.

    I wish i could spend more time at home.

    I have taken formal music lessons since i was 5.'
  user 2 personas: 'I haven t done anything since high school.

    I listen to linkin park , i don t know why.

    I was diagnosed with autism.

    I play games at the arcade , still.'
  Best Generated Conversation: 'User 1: Hey! I''m a musician. Do you like music?

    User 2: I love music! I listen to Linkin Park a lot.

    User 1: I love Linkin Park too! What''s your favorite song?

    User 2: I don''t know, I have a lot of favorites. But I really like Numb.

    User 1: Me too! That''s a great song.

    User 2: What kind of music do you play?

    User 1: I play piano, guitar, and sing.

    User 2: That''s cool! I wish I could play an instrument.

    User 1: You should try it! It''s a lot of fun.

    User 2: I might, but I''m not very good at it.

    User 1: Everyone starts out not being good at it. But you get better with practice.

    User 2: I guess you''re right.

    User 1: So, what do you do for fun?

    User 2: I play games at the arcade. I''ve been doing it since high school.

    User 1: That''s cool! I''ve never been to an arcade.

    User 2: You should go! It''s a lot of fun.

    User 1: I might, but I''m not very good at games.

    User 2: You don''t have to be good at them to have fun.

    User 1: I guess you''re right.

    User 2: So, what kind of games do you like?

    User 1: I like action games, role-playing games, and adventure games.

    User 2: I like action games too! I also like racing games.

    User 1: I''ve never been a big fan of racing games.

    User 2: Why not?

    User 1: I don''t know, I guess I just don''t get them.

    User 2: Well, you should give them a try sometime. You might like them.

    User 1: I might.

    User 2: So, what do you think? Should we go to the arcade sometime?

    User 1: I don''t know, I''m not sure if I''m good enough.

    User 2: You don''t have to be good at them to have fun.

    User 1: Okay, I''ll go with you.'
