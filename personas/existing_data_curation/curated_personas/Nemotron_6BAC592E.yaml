personas:
  professional: Angela Arrington, an aspiring teen digital artist and budding game coder, channels her curiosity and methodical planning into daily sketch sessions and Scratch projects, and they push themselves
    with a competitive streak that drives refinement until peer creations are surpassed.
  sports: Angela Arrington enjoys weekend hikes along the Lake Wylie trail, plays midfield on the middle school soccer team in the spring, swims with the Charlotte Aquatics club in the summer, and they
    avidly follow the Carolina Panthers and Charlotte Hornets, tracking fitness progress with a Fitbit.
  arts: Angela Arrington draws inspiration from the animated worlds of Hayao Miyazaki, the impressionist brushwork of Claude Monet, and the piano compositions of Ludovico Einaudi, regularly curates a digital
    gallery of their own sketches, and they spend evenings attending the local community theater’s productions of classic plays.
  travel: Angela Arrington plans trips with the precision of a chess master, favoring day-long hikes in the Blue Ridge Mountains and cultural excursions to Washington, D.C., while dreaming of a backpacking
    adventure through Kyoto’s historic temples and the Alpine valleys of Switzerland, all within the limits of their family’s modest budget.
  culinary: Angela Arrington, a budding home cook, loves crafting homemade ramen bowls with miso broth, sautéed shiitake mushrooms, and a soft-boiled egg, perfecting strawberry-banana smoothies and occasionally
    baking chocolate chip cookies, though they often over-salt their sauces in pursuit of bold flavors.
  core: Angela Arrington, a curious and methodical 13-year-old, sketches every scene they photograph, rewrites debate arguments late at night, and habitually forgets to water their houseplants.
background:
  cultural: Angela was raised in Mount Holly, a small town in Gaston County, North Carolina, within a middle‑class white family that values community, family gatherings, and Southern hospitality. Her upbringing
    includes regular participation in local events such as the county fair, church youth groups, and school extracurriculars. Family traditions feature Southern cooking, occasional trips to the nearby Blue
    Ridge Mountains, and a respect for the region’s historical roots. While primarily identifying with mainstream American culture, she also draws inspiration from the diverse artistic scene of nearby Charlotte,
    exposing her to a blend of traditional Southern values and contemporary creative influences.
