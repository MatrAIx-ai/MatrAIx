  career_goals: Angela aspires to attend a specialized high school with a strong arts program and eventually study graphic design or illustration at a university such as the Savannah College of Art and
    Design. She dreams of becoming a freelance concept artist who can merge her love for storytelling and visual design, while also hoping to influence her community by leading youth art initiatives and
    advocating for creative curricula in schools. Her competitive streak drives her to aim for recognition in state art contests and to secure scholarships that will support her long‑term ambition of working
    in the creative industry.
