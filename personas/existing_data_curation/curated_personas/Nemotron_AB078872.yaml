personas:
  professional: Jason Standsfield is an aspiring teen game developer and YouTube content creator whose methodical coding habits and love for stage performance combine to produce polished, story‑driven games
    while they confidently command the camera and rally peers during livestreams.
  sports: Jason Standsfield plays midfield for the Riverdale Youth Soccer Club, emulating Manchester City’s passing style and following the off‑season exploits of FC Barcelona, while committing to three
    weekly practices, weekend matches, and regular beach‑clean‑up runs that double as cardio workouts.
  arts: Jason Standsfield thrives in drama and debate club, channeling the energy of Lin‑Manuel Miranda's lyrical storytelling and the poise of Meryl Streep into captivating school performances, while editing
    YouTube tutorials inspired by Mark Rober's inventive style and constantly quoting Tom Holland’s witty one‑liners.
  travel: Jason Standsfield plans weekend hikes through the nearby Redwood trails and beach clean‑ups at the local shoreline, dreams of backpacking the fjords of Norway, and queues at the chippy by the
    pier in Brighton after binge‑watching travel vlogs of Tokyo’s Shibuya crossing.
  culinary: Jason Standsfield mixes a budding kitchen confidence with a love for bold flavors, often whipping up quick shrimp tacos with fresh cilantro, lime, and jalapeño, mastering the perfect mac & cheese
    while sneaking avocado slices into every sandwich, but they tend to over‑indulge in sugary cereal before soccer practice.
  core: Jason Standsfield is a charismatic, organized teen who balances relentless curiosity with a flair for the dramatic, yet can’t resist late‑night gaming marathons that jeopardize their sleep schedule.
background:
  cultural: Jason grew up in a middle‑class, White New England family in Portland, Maine. His household values education, community service, and a strong connection to the outdoors, reflecting the broader
    regional appreciation for nature and self‑reliance. He celebrates local traditions such as lobster festivals and enjoys the tight‑knit community atmosphere of Cumberland County, which encourages participation
    in civic activities and seasonal outdoor pursuits.
