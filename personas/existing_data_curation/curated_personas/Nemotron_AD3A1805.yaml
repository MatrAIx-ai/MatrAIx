  hobbies: '[''Community theater (backstage volunteering)'', ''Trivia nights'', ''Fishing on Puget Sound'', ''Hiking Olympic Peninsula trails'', ''Coastal photography'', ''Reading detective novels'', ''Crossword
    and Sudoku puzzles'', ''Chess'', ''Board‑game evenings (investigative themes)'']'
  career_goals: Jay aims to be promoted to lead detective of the Major Crimes Unit within the next five years, where he plans to spearhead a task force focused on cyber‑enabled offenses. He seeks to develop
    a formal mentorship program for junior investigators and to complete a bachelor's degree in criminal justice to broaden his strategic perspective. Long‑term, he envisions a regional liaison role that
    bridges law enforcement, the Naval Base Bremerton, and community organizations to promote collaborative public‑safety initiatives.
