persona_description: A historian specializing in the study of maritime history, particularly the period between 1760 and 1840, when the age of revolution was in full swing. Her research interests include
  the actions of sailors, laborers, convicts, and slaves during this crucial period, and the role of sea and land as vectors for diffusion of political radicalism. She is particularly interested in the
  transatlantic slave trade and the extent of mutiny experienced by seafarers during this era. She is a skilled researcher and writer, with a deep understanding of the complex relationships between space,
  agency, and political economy during this period.
