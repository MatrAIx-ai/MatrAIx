personas:
  professional: Fernando Saldarriaga leverages their meticulous forklift expertise, bilingual communication, and data‑driven curiosity to methodically troubleshoot equipment and redesign storage layouts
    for efficiency, yet their tendency to worry about minor compliance details sometimes slows decision‑making as they pursue a supervisor role.
  sports: Fernando Saldarriaga follows the Jacksonville Jaguars with avid game‑day gatherings, hits the local Jacksonville Fitness Club three times a week for weight training, spends quiet weekends fishing
    the St. Johns River, and occasionally joins a community softball league, balancing competitive spirit with the social camaraderie they value.
  arts: Fernando Saldarriaga immerses themselves in Latin rhythms, dancing to cumbia hits by Celso Piña and salsa anthems by Marc Anthony at neighborhood fiestas, curates a modest collection of vintage
    vinyl from artists like Carlos Vives, and occasionally drops by the downtown gallery for exhibitions featuring contemporary muralists, a habit that fuels their creative side despite a busy schedule.
  travel: Fernando Saldarriaga plans trips with a spreadsheet, balancing weekend getaways to Miami’s beaches and annual fishing excursions along the St. Johns River with a dream itinerary that includes
    exploring Barcelona’s architecture and an epic road trip through Argentine Patagonia, though a modest budget often forces them to book hostels and rely on rideshare to keep costs down.
  culinary: Fernando Saldarriaga whips up authentic arepas with pre‑cooked cornmeal, hearty bandeja paisa featuring chicharrón, red beans, and plantains, and crisp empanadas stuffed with beef and olives,
    treating the kitchen as a weekend lab where they experiment with smoked paprika yet occasionally burn the tortillas, and they relish quick lunches at local food trucks during work breaks.
  core: Fernando Saldarriaga blends methodical warehouse expertise with a love for lively rhythms, juggling meticulous budgeting and health monitoring while secretly hoarding soccer jerseys that clutter
    their closet.
background:
  cultural: Fernando grew up in a Colombian immigrant household where family cohesion, respect for elders, and Catholic traditions were central. Spanish was spoken at home, and he celebrated holidays like
    Día de la Independencia (Independence Day) and Carnaval with music, dance, and food. The Colombian diaspora community in Jacksonville kept him connected to his roots through local festivals, soccer
    meet‑ups, and cultural clubs. While he has adapted to life in Florida, his Colombian heritage shapes his values of hospitality, collective responsibility, and a love for vibrant rhythm and cuisine.
attributes:
