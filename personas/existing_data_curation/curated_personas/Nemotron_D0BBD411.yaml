  hobbies: '[''watching Colombian soccer'', ''cooking traditional Colombian meals'', ''dancing to cumbia and salsa'', ''attending community Latin music events'', ''weight training at the gym'', ''fishing
    on the St. Johns River'', ''reading technology blogs'', ''woodworking projects'', ''Spanish-English conversation practice'']'
  career_goals: Fernando aims to advance from a laborer to a supervisory role within the next three years. He plans to earn a forklift trainer certification and complete an associate’s degree in logistics
    or supply chain management, leveraging his curiosity for new processes to improve warehouse efficiency. His long‑term ambition is to become a logistics manager, overseeing multiple distribution centers
    and implementing data‑driven workflow improvements. He also hopes to eventually start his own small freight brokerage, allowing him to combine his practical expertise with entrepreneurial goals while
    providing stable, well‑paid work to support his family.
