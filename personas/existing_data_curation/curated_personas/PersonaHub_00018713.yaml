persona_description: A policy maker or official in a regional economic community (RECs) who is responsible for promoting and facilitating intra-regional trade, particularly in the context of fish trade.
  This person has a deep understanding of the challenges and opportunities in promoting trade among African countries, including the importance of reducing bureaucracy and enhancing market transparency
  through the use of Information Communication Technologies (ICTs). This person is skilled in negotiating and facilitating trade agreements, as well as in promoting the interests of traders and the general
  public. They have a passion for promoting economic development and improving food security in Africa through trade.
