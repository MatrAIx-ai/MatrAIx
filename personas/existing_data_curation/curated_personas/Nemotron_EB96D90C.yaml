personas:
  professional: Bethany Lamoureux, a budding visual storyteller, merges their love for sketching and comic‑strip creation with early coding experiments in Scratch, using their curiosity and openness to
    unconventional ideas to craft interactive narratives, and they often let their relaxed approach to obligations result in missed project deadlines.
  sports: Bethany Lamoureux enjoys leisurely hikes along the trails around Lake Tapps, participates in a small school walking club during spring, supports the Seattle Seahawks in football and the Seattle
    Storm in basketball, but they rarely engage in organized sports beyond occasional weekend swimming at Lake Washington.
  arts: Bethany Lamoureux spends afternoons sketching whimsical characters inspired by Hayao Miyazaki and Rebecca Sugar, collects graphic novels by Neil Gaiman and classic comic issues from Stan Lee, and
    curates indie playlists featuring Phoebe Bridgers and Mitski while they channel this eclectic inspiration into weekly comic strips for the school art club.
  travel: Bethany Lamoureux prefers spontaneous weekend trips to nearby nature gems like Olympic National Park and Lake Tapps, occasionally joins family road‑trips to Seattle’s museum district, and dreams
    of saving up for a summer visit to Paris to see the Louvre, though their modest allowance and school commitments keep travel modest and often last‑minute planned, and they usually rely on family car
    rides.
  culinary: Bethany Lamoureux enjoys assembling simple snacks such as avocado toast sprinkled with chili flakes and fruit salads featuring strawberries, kiwi, and a drizzle of honey, occasionally helps
    her mom roll sushi using fresh tuna and cucumber, and they delight in baking origami‑shaped sugar cookies topped with almond slivers, showcasing a budding but quirky cooking skill set.
  core: Bethany Lamoureux is a quietly curious 12‑year‑old who transforms nature finds into whimsical comics, battles intense anxiety with art journaling, and occasionally forgets to finish homework because
    a new sketch idea steals their focus, while they often stay up late to finish a drawing.
background:
  cultural: Bethany grew up in a suburban white American family in Bonney Lake, Washington, a community that values an outdoor lifestyle and a strong connection to the Pacific Northwest’s lakes, forests,
    and parks. Her household follows mainstream U.S. customs such as celebrating Thanksgiving, Fourth of July, and Christmas, while also encouraging curiosity, creativity, and open‑mindedness through museum
    visits, community art programs, and exposure to diverse books and media. This blend of typical American traditions with a local emphasis on nature and artistic expression shaped her appreciation for
    both individual reflection and collaborative harmony.
