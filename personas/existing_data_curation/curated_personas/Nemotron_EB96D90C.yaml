  career_goals: Bethany dreams of merging her love for art with her desire to support others' emotional well‑being. In the long term she aspires to become a children's book author and illustrator who creates
    stories that teach emotional resilience, or to study psychology and work as a child therapist who incorporates art therapy. In the short term she plans to build a strong portfolio, attend summer art
    camps, and explore introductory psychology courses in high school to prepare for college studies in visual arts and mental health.
