  career_goals: John aims to advance from his clerk role to a senior accountant position within the next three years, targeting a CPA certification to deepen his technical expertise. He envisions taking
    on supervisory responsibilities, leading a small accounting team at the base finance office, and eventually moving into a finance manager role where he can design and improve internal controls. To broaden
    his strategic perspective, he plans to complete a bachelor's degree in accounting or business administration. His competitive drive pushes him to exceed performance metrics, and he seeks opportunities
    to mentor newer clerks, positioning himself as one of the top performers in his department.
