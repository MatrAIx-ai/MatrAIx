  career_goals: Rose hopes to transition from crew member to floor supervisor within the next two years, earning a facilities‑management certification to solidify her credentials. She dreams of launching
    a modest, locally‑owned cleaning service that specializes in schools and community centers, integrating her commitment to reliability with her desire for entrepreneurial independence. Concurrently,
    she plans to complete the remaining coursework for an associate degree in visual arts, ultimately aiming to curate mural projects in Covington that reflect the town’s cultural narrative. Financial security
    for retirement and the ability to support her adult children’s education remain central motivations.
