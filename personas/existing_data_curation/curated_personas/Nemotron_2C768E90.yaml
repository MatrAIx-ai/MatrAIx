  career_goals: Susan envisions a future where she can combine her love for learning, helping others, and practical problem‑solving. In the long term she aspires to become a STEM teacher or a community‑focused
    engineer, roles that let her share knowledge, inspire curiosity, and contribute to real‑world solutions. She is also intrigued by environmental science, hoping to work on projects that improve her local
    neighborhood’s sustainability. In the near term, Susan aims to take on leadership positions in her school’s science club and drama troupe, earn recognition in regional science fairs, and secure a summer
    mentorship at the local library or community center to deepen her experience in teaching and community service.
