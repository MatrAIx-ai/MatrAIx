personas:
  professional: An aspiring community organizer, Susan Higgins channels her organized, reliable nature and love for group activities into leading her school's sustainability club, where she coordinates
    recycling projects, schedules volunteer tutoring sessions, and drafts clear action plans for her peers.
  sports: A dedicated young soccer player, Susan Higgins captains her local YMCA U‑13 team, idolizes the Chicago Fire and follows their matches on TV, participates in weekly practices, and supplements her
    training with on‑field drills at local park fields, while also cheering for the Chicago Cubs during summer weekends.
  arts: A creative stage enthusiast, Susan Higgins shines in her middle school drama club and choir, frequently quoting lines from the musical 'Hamilton' she saw on a school field trip, admires the performances
    of Lin‑Manuel Miranda and the vocal harmonies of BTS, and enjoys designing intricate LEGO dioramas that double as set pieces for school plays.
  travel: An exploratory weekend traveler, Susan Higgins loves the family road trips to Chicago's Navy Pier and the Museum of Science and Industry, dreams of visiting Washington, D.C.'s National Air and
    Space Museum, and balances her travel excitement with school commitments by keeping a travel checklist in her planner.
  culinary: A budding baker, Susan Higgins frequently whips up classic chocolate chip cookies, brownies with walnuts, and layered cupcakes topped with buttercream frosting, preferring ingredients like dark
    chocolate, real vanilla extract, and fresh berries, and shares her treats at after‑school gatherings and community center events.
  core: Susan Higgins, a 13‑year‑old with a knack for organized chaos, blends her love for soccer, theater, and LEGO building into a community‑focused life, habitually scribbles ideas on receipt backs,
    and occasionally procrastinates on homework to perfect a cupcake recipe.
background:
  cultural: Susan grew up in Riverside, a suburban community in Cook County, Illinois, immersed in the Midwestern values of friendliness, community involvement, and a strong work ethic. Her family celebrates
    traditional American holidays such as Thanksgiving and Independence Day, often gathering for potluck meals and neighborhood barbecues. The proximity to Chicago exposes her to the city’s rich cultural
    scene, from visiting museums and sports events to hearing diverse perspectives in school. While identifying as white, Susan’s upbringing includes respectful awareness of the multicultural fabric of
    the region, fostering an inclusive mindset and an appreciation for the varied traditions that enrich her community.
