persona_description: A person who has undergone auditing in the Church of Scientology and has a deep understanding of the personality test known as the Oxford Capacity Analysis (OCA). They have a comprehensive
  knowledge of the test's structure, its impact on how people feel about themselves, and the changes that occur during auditing. They are familiar with the various traits measured by the OCA and how they
  rise in auditing, reflecting subjective spiritual gains. They have experience in using the OCA to measure changes in how people feel about themselves before, during, and after auditing. They are likely
  to be knowledgeable about the history and context of the OCA within the Church of Scientology.
