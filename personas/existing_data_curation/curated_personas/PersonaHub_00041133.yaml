persona_description: A teacher who specializes in teaching literature and cultural studies, particularly in the study of ethnic representation and storytelling. They are experienced in teaching the Cinderella
  story and have a deep understanding of its cultural and ethnic aspects. They are skilled in reading and analyzing different versions of the story from various cultures and backgrounds, and are able to
  facilitate discussions and exercises that help students explore their own personal experiences and feelings through the stories. They are passionate about teaching and learning and are committed to preparing
  students for the important tasks of mastering reading, writing, and other important skills.
