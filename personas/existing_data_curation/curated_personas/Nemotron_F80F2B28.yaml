  career_goals: Brian dreams of a future where he can blend his love for art and his desire to help others. He often says he wants to become a community artist who creates murals that inspire kindness,
    or a pediatric nurse who uses creative play to comfort sick children. He also imagines working as an environmental steward, protecting the parks he loves to explore, and hopes to continue learning both
    English and Spanish to serve diverse communities.
