    ''celebrating Mexican holidays'', ''walking in local parks'', ''senior center activities'']'
  career_goals: Although retired, Hortensia aims to maintain her health and independence while deepening her role as a cultural steward for her family. She hopes to compile a family recipe book that captures
    her culinary heritage and to learn basic smartphone skills so she can stay connected with grandchildren via video calls. Continuing to volunteer at the senior center and her church remains a priority,
    as does supporting her grandchildren’s education through tutoring and sharing life lessons. Preserving and passing on Mexican traditions within her community in Altus, Oklahoma, is a central ambition.
