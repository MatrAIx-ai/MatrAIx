personas:
  professional: Hortensia Perez, a retired household manager turned community volunteer, leverages meticulous budgeting, bilingual coordination, and sewing expertise to organize church potlucks, senior‑center
    events, and family gatherings, embodying her love of structure and social harmony.
  sports: Hortensia Perez enjoys gentle morning walks in Altus’s Oak Park, participates in the senior center’s low‑impact exercise class, and avidly follows the Oklahoma Sooners football and the Oklahoma
    City Thunder, cheering from her living room during games.
  arts: Hortensia Perez finds joy in listening to the soulful brass of a local mariachi ensemble and the folk ballads of Los Tigres del Norte, always humming along to classics by Vicente Fernández while
    watching telenovelas such as 'La Usurpadora' and attending community art exhibits featuring folk textile designs.
  travel: Hortensia Perez prefers leisurely road trips that blend cultural discovery with family visits, having explored the historic missions of San Antonio, the vibrant markets of Santa Fe, and the botanical
    gardens of Portland, while dreaming of a peaceful pilgrimage to the ancient ruins of Oaxaca.
  culinary: Hortensia Perez is an adept home chef who layers flavors in mole using dried chilies, chocolate, and spices, rolls tamales with masa and pork, and simmers pozole with hominy and herbs from her
    garden, often seasoning dishes with fresh cilantro, epazote, and roasted garlic.
  core: Hortensia Perez blends disciplined organization with a warm community spirit, tending a garden of herbs, stitching quilts, and preserving family recipes, all while navigating retirement with a habit
    of checking the stove twice and a penchant for late‑night telenovela marathons.
background:
  cultural: Hortensia is a first‑generation Mexican‑American who grew up in a close‑knit community in Mexico before moving to Oklahoma. She brings a rich blend of Mexican traditions—such as Catholic celebrations,
    vibrant culinary customs, and folk arts—into her daily life in Altus. Bilingual in Spanish and English, she serves as a cultural bridge for her family, preserving language and customs while adapting
    to the local environment. Her values emphasize family loyalty, hospitality, and respect for elders, which influence her community involvement and the way she fosters harmony at home and in her church
    circles.
