personas:
  professional: An organized office support professional, Charles Pearson, leverages meticulous scheduling, precise data entry, and solid bookkeeping to keep office operations humming, while actively pursuing
    a Certified Administrative Professional credential and an associate degree to transition into office management within five years.
  sports: An avid recreational fisherman, Charles Pearson spends early mornings casting lines on nearby lakes and the coast, participates in a local adult softball league, supports the St. Louis Cardinals
    and Atlanta Falcons, and keeps fit through weekend walks and occasional hikes, preferring low‑impact exercise over intense gym sessions.
  arts: A mystery‑novel aficionado, Charles Pearson devours Agatha Christie and Tana French titles while sipping bourbon, enjoys classic Southern rock from The Allman Brothers and country ballads by Dolly Parton,
    and attends community theater productions such as The Mousetrap, finding these creative outlets balance their structured work life.
  travel: A methodical traveler, Charles Pearson plans weekend getaways to Gulf Coast fishing spots, has explored New Orleans and Savannah for their culinary scenes, enjoys annual trips to Bermuda for deep‑sea
    fishing, and dreams of a future expedition to Patagonia’s rivers to pursue fly‑fishing adventures.
  culinary: A grill‑master with Southern roots, Charles Pearson perfects smoked pork ribs, grilled catfish, and hush puppies, seasons dishes with fresh basil, thyme, and cayenne harvested from their garden,
    and while their cooking skill is solid for backyard barbecues, they occasionally over‑smoke meat when distracted by a new fishing story.
  core: Charles Pearson combines a methodical office mind with a laid‑back fisherman’s heart, balancing precise spreadsheets and BBQ rubs while occasionally over‑budgeting on fishing gear.
background:
  cultural: Charles grew up in a middle‑class Southern family in the coastal region of South Carolina, where community ties and family traditions are central. He was raised with an appreciation for Southern
    hospitality, local seafood cuisine, and a strong sense of civic responsibility, often participating in church activities and community service. The proximity to the Naval Base Charleston has exposed
    him to a blend of civilian and military cultures, reinforcing values of discipline and reliability. While his ethnic background is white, he respects the diverse cultural heritage of the area, including
    Gullah influences that shape regional food and music.
