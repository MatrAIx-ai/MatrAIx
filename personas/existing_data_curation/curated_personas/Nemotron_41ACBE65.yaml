  career_goals: Charles aims to advance from his current support role to an office manager position within the next three to five years. He plans to earn a Certified Administrative Professional (CAP) credential
    and complete an associate degree in Business Administration through a local community college. His long‑term ambition is to lead a small administrative team, streamline operational workflows, and eventually
    transition into a project coordination role that leverages his structured, results‑oriented mindset while providing greater stability for his family.
