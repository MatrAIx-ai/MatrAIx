personas:
  professional: Michael Kilgo, a bright 5‑year‑old, engineers imaginative cardboard rockets during recess and meticulously sorts their art supplies, foreshadowing a future as a creative problem‑solver.
  sports: Michael Kilgo, an energetic member of a local T‑ball league, cheers for the Washington Nationals on family game nights, practices soccer drills at the neighborhood park with the D.C. United youth
    club, and always insists on a post‑practice splash in the community pool.
  arts: Michael Kilgo, who spends afternoons drawing whimsical creatures inspired by Dr. Seuss and the vibrant animation style of Pixar, sings along to the whimsical tunes of The Lion King soundtrack, and
    proudly displays their finger‑painted masterpiece on the kitchen fridge, showcasing a vivid artistic spirit.
  travel: Michael Kilgo, whose family road trips include visiting the Smithsonian National Air and Space Museum in Washington, D.C., a weekend camping adventure in Shenandoah National Park, and a magical
    week at Walt Disney World, relishes traveling with a favorite stuffed rabbit and always requests the window seat for a view of clouds.
  culinary: Michael Kilgo, who adores creamy mac and cheese, builds colorful fruit parfaits with strawberries, blueberries, and banana slices, proudly helps stir pancake batter, yet occasionally refuses
    to eat broccoli, reflecting a budding culinary curiosity mixed with classic picky‑eater habits.
  core: Michael Kilgo is an exuberant, imagination‑driven five‑year‑old who transforms playgrounds into story realms, meticulously organizes crayon collections, and occasionally stalls bedtime for extra
    art time, embodying a lively blend of curiosity, order, and endearing stubbornness.
background:
  cultural: Michael comes from a White American family living in the suburban community of Ashburn, Virginia. His upbringing includes typical U.S. cultural traditions such as celebrating holidays like Christmas
    and Thanksgiving, participating in local Fourth of July events, and attending community activities at his preschool and neighborhood center. The family values education, outdoor play, and community
    involvement, providing Michael with a supportive environment for his imaginative and social development.
