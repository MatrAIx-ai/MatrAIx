persona_description: A graphic designer who is interested in the history of typefaces and the evolution of digital typography. Keedy Sans, a typeface created by Keedy in response to the limited selection
  of digital typefaces available, is a significant figure in the field. Keedy's work is known for its experimental nature, with letter forms that are intentionally unfinished and incongruous. The text also
  mentions Keedy Sans being one of 23 digital typefaces included in the permanent architecture and design collection of the Museum of Modern Art in New York. The persona is likely to be interested in digital
  typography, typography history, and the work of Keedy and other designers who have contributed to the evolution of typefaces.
