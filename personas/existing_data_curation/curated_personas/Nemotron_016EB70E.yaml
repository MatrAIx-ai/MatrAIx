  hobbies: '[''Oil painting'', ''Visiting art galleries'', ''Hiking in the Sandhills'', ''Astrophotography'', ''Model rocketry'', ''Drone piloting'', ''Playing jazz saxophone'', ''Reading science-fiction'',
    ''Attending technology lectures'', ''Woodworking'']'
  career_goals: Jordan seeks to spearhead innovative, environmentally sustainable aerospace projects, aiming to transition traditional propulsion systems toward hybrid‑electric and hydrogen technologies.
    He aspires to take on a senior leadership role such as chief engineer or program director, where he can influence strategic decisions and mentor younger engineers. He plans to publish research on advanced
    materials, serve on advisory panels for aerospace regulatory bodies, and ultimately shape industry policy on eco‑friendly aerospace. As he approaches retirement, he envisions a phased transition to
    consulting work that lets him apply his methodical expertise while staying engaged with cutting‑edge research.
