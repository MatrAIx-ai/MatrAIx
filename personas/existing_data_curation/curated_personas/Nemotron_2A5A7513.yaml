personas:
  professional: Berta Saqui is a high‑school visual arts enthusiast who leverages bilingual communication and digital illustration tools like Procreate to design culturally resonant posters for school events,
    balancing meticulous organization with spontaneous creative bursts.
  sports: Berta Saqui channels energy into hip‑hop and cumbia dance routines at school assemblies, participates in the after‑school track club for sprint drills, and cheers for the Los Angeles Lakers and
    LA Galaxy while occasionally joining a community basketball pickup league.
  arts: Berta Saqui immerses herself in contemporary Latin pop icons like Bad Bunny and J Balvin, draws inspiration from street muralists such as Diego Rivera and Banksy, and spends weekends sketching in
    the local art district while acting in the school drama club’s modern productions.
  travel: Berta Saqui loves weekend road trips to the coast of Santa Monica for sunset photography, dreams of exploring the vibrant murals of Oaxaca and the bustling markets of Mexico City, and hopes to
    someday visit Tokyo’s Akihabara district to study anime‑inspired design.
  culinary: Berta Saqui enjoys mastering homemade tacos al pastor, chilaquiles with salsa verde, and crafting fresh guacamole with ripe avocados, often cooking alongside her family while occasionally swapping
    recipes for sushi rolls after school.
  core: Berta Saqui is a bright, culturally tuned teen who blends digital art with family traditions, obsessively collects sketchbooks, can’t resist late‑night gaming, and turns every community event into
    a visual celebration.
background:
  cultural: Berta is a second‑generation Mexican American raised in Pacoima, a vibrant neighborhood in Los Angeles County with a strong Latino presence. At home, Spanish is spoken alongside English, and
    family traditions such as Día de los Muertos, quinceañera celebrations, and Sunday gatherings around homemade Mexican food are central to her life. Her parents, both immigrants, instilled values of
    hard work, respect for elders, and community solidarity. Berta’s cultural identity blends Mexican heritage with Chicano influences, reflected in her love for mural art, Latin pop music, and participation
    in local cultural festivals that celebrate both her roots and the diverse tapestry of Los Angeles.
