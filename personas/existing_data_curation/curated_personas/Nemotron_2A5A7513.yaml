  hobbies: '[''Sketching'', ''Digital illustration'', ''Photography'', ''Listening to Latino music'', ''Hip‑hop and cumbia dancing'', ''School drama club'', ''Organizing community cultural events'', ''Cooking
    Mexican cuisine'', ''Playing video games'', ''Reading graphic novels'']'
  career_goals: Berta aspires to attend a specialized art college or a community college with a strong graphic design program, eventually earning a degree in visual communications or graphic design. Her
    long‑term ambition is to work as a graphic designer for a creative agency or as a community arts coordinator, using her artistic skills to create culturally resonant campaigns and to mentor other Latino
    youth. She also hopes to develop a freelance portfolio that blends modern digital art with Mexican cultural motifs.
