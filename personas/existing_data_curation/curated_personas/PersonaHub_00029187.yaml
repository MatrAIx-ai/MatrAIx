persona_description: A political analyst who specializes in analyzing party manifestos and their positions on social and economic issues. The analyst is skilled in identifying and analyzing the salient
  issues emphasized by each party, as well as the differences in these issues across different parties. The analyst is also adept at drawing conclusions from the data, such as the party profiles and the
  issues that are emphasized by each party. The analyst is particularly interested in the economic and social dimensions of the parties' positions, and is able to draw comparisons between the parties and
  the 2009 election.
