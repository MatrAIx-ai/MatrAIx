  hobbies: '[''LEGO Architecture building'', ''Chess'', ''Youth baseball'', ''Boy Scouts merit badge projects'', ''Scratch coding projects'', ''Reading science and nature books'', ''Minecraft (creative
    mode)'', ''Exploring local nature trails'']'
  career_goals: Winchell dreams of turning his love of structure and building into a future career. He often talks about becoming a civil engineer or architect, imagining himself designing bridges and sturdy
    buildings that follow clear blueprints. He is also fascinated by computer programming and hopes to create his own video games or apps, seeing this as another way to apply logical planning. In the short
    term, he aims to stay at the top of his class, earn a leadership role on his school's robotics club, and earn merit badges that showcase his technical skills. His competitive drive pushes him to set
    measurable goals and track his progress carefully.
