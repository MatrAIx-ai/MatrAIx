  hobbies: '[''Cooking traditional Mexican dishes'', ''Reading historical and educational literature'', ''Gardening'', ''Walking/biking along the Rio Grande Trail'', ''Community volunteer work (adult literacy
    programs)'', ''Playing guitar and singing folk songs'', ''Attending local cultural festivals'', ''Practicing yoga for stress management'', ''Traveling to explore Mexican heritage sites'']'
  career_goals: Maria aims to deepen her scholarly impact while maintaining her practical teaching focus. Over the next five years she plans to complete a Master’s in Educational Leadership, eventually
    pursuing a doctorate in bilingual education. She hopes to lead the development of a department‑wide bilingual program, secure external funding to research effective instructional strategies for Hispanic
    students, and publish her findings in peer‑reviewed journals. Additionally, she aspires to become a department chair or program director, using her collaborative yet assertive style to mentor junior
    faculty and shape policies that promote equity. Throughout these ambitions she seeks to preserve her work‑life balance, dedicating time to family and personal growth.
