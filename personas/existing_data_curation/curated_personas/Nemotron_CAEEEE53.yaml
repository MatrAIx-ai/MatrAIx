personas:
  professional: Maria Gomez blends curiosity with practicality as a bilingual community college educator, designing culturally responsive curricula, integrating technology, applying adult learning theory,
    and using data-driven decision making while they assertively mentor first-generation students and collaborate on grant proposals.
  sports: Maria Gomez stays active by biking the Rio Grande Trail with the local El Paso Bikers club, jogging weekly, practicing yoga, and cheering for the San Antonio Spurs during basketball season, blending
    solitary exercise with community sports enthusiasm.
  arts: Maria Gomez expresses creativity through guitar and folk singing at community events, drawing inspiration from Joni Mitchell and Los Lobos, while they regularly attend performances by a local theater
    troupe and read works by Octavio Paz and historical novels, weaving artistic appreciation into daily life.
  travel: Maria Gomez favors thoughtfully planned trips that combine family outings to national parks like the Grand Canyon with solo pilgrimages to heritage sites such as Teotihuacan and Oaxaca, balancing
    cultural exploration with relaxed vacationing while mindful of budget constraints.
  culinary: Maria Gomez boasts advanced culinary skills, regularly preparing enchiladas and tamales using fresh corn masa, smoky chipotle, and tangy tomatillo salsa, and delights in sharing these dishes
    with friends while occasionally savoring street-style tacos at local eateries.
  core: Maria Gomez is a pragmatic yet curious educator who balances meticulous planning with spontaneous kitchen experiments, often humming folk tunes as they garden, yet occasionally forgets to water
    the plants when caught up in grant writing.
background:
  cultural: Maria’s identity is rooted in a rich Mexican heritage that intertwines with the borderland culture of Pharr, Texas. Raised in a bilingual household, she grew up speaking both Spanish and English,
    celebrating Día de los Muertos, Semana Santa, and family gatherings centered around food and music. Her Catholic upbringing emphasizes community service and intergenerational respect. Living in Hidalgo
    County, she navigates the fluid space between Mexican traditions and American influences, which informs her teaching philosophy of cultural responsiveness and inclusivity. Maria actively incorporates
    Mexican folkloric elements into her curriculum, mentors students navigating bicultural identities, and maintains strong ties to both her local Texan community and the broader Mexican diaspora.
