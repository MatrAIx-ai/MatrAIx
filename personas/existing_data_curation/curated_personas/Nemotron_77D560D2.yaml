  hobbies: '[''Hip‑hop and Afro‑centric dance'', ''Reading contemporary and African American literature'', ''Cooking Southern soul food'', ''Backyard gardening'', ''Volunteer tutoring'', ''Yoga'', ''Hiking
    in local nature preserves'']'
  career_goals: Dlaine aims to earn a Master’s degree in Early Childhood Education within the next three years and obtain Texas early childhood teaching certification. She aspires to become a lead teacher
    or program director of a community‑based preschool, where she can design inclusive, play‑based curricula that reflect the cultural richness of her students. Long‑term, she envisions launching an after‑school
    enrichment center in Fort Worth that offers tutoring, arts workshops, and STEAM programs for underserved families, while also serving as a mentor and trainer for new educators.
