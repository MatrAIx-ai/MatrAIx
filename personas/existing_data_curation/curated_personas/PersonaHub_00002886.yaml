persona_description: A Canadian psychiatrist who specializes in the diagnosis and treatment of Attention-Deficit/Hyperactivity Disorder (ADHD) in adults, particularly those who developed the condition later
  in life. He is a leader in the Canadian ADHD Resource Alliance (CADDRA) and has conducted research on the prevalence and trajectory of ADHD in adults. He believes that ADHD is not always recognized and
  that more awareness is needed to help adults with ADHD access appropriate treatment and support.
