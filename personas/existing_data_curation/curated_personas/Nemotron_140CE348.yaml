  career_goals: Vester aims to progress from a sales agent to a senior leadership role, such as regional sales manager or branch director, within the next five years. He plans to earn professional designations
    like the Certified Insurance Counselor (CIC) and Chartered Life Underwriter (CLU) to deepen his expertise. Long‑term, he envisions launching his own boutique insurance agency that serves underserved
    neighborhoods in Greater Boston, while also establishing a mentorship program to guide aspiring Black insurance professionals. Balancing career advancement with family time remains a core ambition.
