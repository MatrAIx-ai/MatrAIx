personas:
  professional: Vester Walker is an insurance sales professional who combines meticulous CRM‑driven client management with a spontaneous flair for on‑the‑spot problem solving, using their strong interpersonal
    communication and negotiation skills to build trust in diverse communities while navigating the tension between structure and flexibility.
  sports: Vester Walker fuels his love for basketball by playing for the community league’s Lowell Legends while cheering on the Boston Celtics and New England Patriots, and he stays fit with weekly pick‑up
    games and occasional Sunday runs along the Charles River.
  arts: Vester Walker immerses himself in jazz legends like John Coltrane and hip‑hop icons such as Kendrick Lamar, regularly attending the annual Juneteenth cultural festival and gospel services featuring
    the soulful harmonies of Kirk Franklin, which shape his creative outlook.
  travel: Vester Walker prefers spontaneous weekend escapes to New England’s coastal gems—like Cape Cod, Martha’s Vineyard, and Portland, Maine—while dreaming of a future family road trip along the historic
    Route 66, balancing a modest travel budget with a love for coastal relaxation.
  culinary: Vester Walker, an adept home chef, relishes preparing soul‑food staples such as collard greens simmered with smoked turkey, crispy fried chicken, and sweet potato pie, while savoring fresh lobster
    rolls and clam chowder during seaside outings, and he frequently experiments with spices like paprika, cayenne, and thyme.
  core: Vester Walker is a charismatic, community‑focused insurance pro who juggles disciplined career ambitions with a love for spontaneous basketball, soul‑food cooking, and occasional last‑minute splurges,
    all while battling a tendency to procrastinate on paperwork.
background:
  cultural: Vester grew up in a close‑knit Black working‑class family in Lowell, where the legacy of African‑American resilience and community activism shaped his worldview. He draws cultural pride from
    traditions such as soul food, gospel music, and the historic presence of Black neighborhoods in New England. His upbringing emphasized the importance of family, church, and mutual support, fostering
    a strong sense of responsibility toward his community. As an insurance professional, he navigates the challenges of representation while leveraging his heritage to build trust with diverse clients and
    mentor the next generation of Black professionals.
