persona_description: A legal scholar who is interested in the philosophy of law and the role of voluntary institutions in enforcing legal judgments. This person is particularly concerned with the differences
  between polycentric and statist legal systems and the implications for practical and theoretical jurisprudence. They are also interested in the justification of legal systems and the challenges of justifying
  polycentric law over statist law, particularly in the context of third party statists who demand more than a mere justification of polycentric law.
