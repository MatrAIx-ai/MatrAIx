  career_goals: Looking ahead, Alice aims to leverage her seasoned expertise to shape the next generation of inclusive tech. She intends to transition into a technical leadership role that emphasizes diversity,
    equity, and mentorship, such as an Engineering Manager or Chief Technology Officer for a mission‑driven nonprofit. Alice also dreams of authoring a book that blends software engineering with creative
    coding, and she plans to launch a community‑based art‑tech incubator in South Jersey, where local artists and developers co‑create interactive digital installations. Ultimately, she sees herself as
    a steward of both technology and culture, using her calm resilience to guide strategic initiatives while fostering opportunities for underrepresented youth in STEM.
