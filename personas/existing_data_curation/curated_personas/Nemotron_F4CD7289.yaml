  career_goals: Looking ahead, Luis aims to blend his artistic talent with his technical curiosity by pursuing a career as a multimedia artist or video game designer. He hopes to study graphic design and
    computer science in high school and eventually at college, with the goal of creating interactive experiences that combine storytelling, visual art, and game mechanics. He also entertains the idea of
    exploring architecture or industrial design, but his primary ambition is to develop original games or digital art projects that earn recognition in youth art and coding competitions.
