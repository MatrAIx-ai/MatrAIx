personas:
  professional: Cheryl Galloup, a 12‑year‑old budding interactive storyteller, writes simple Scratch games that blend mystery plotlines with animated animal characters, showcasing early coding logic while
    balancing their love for structure with spontaneous creative bursts.
  sports: Cheryl Galloup plays midfield for the Brazos Valley Youth Soccer League's Tigers U‑12 team, practices twice weekly, roots for the Houston Dynamo, and they enjoy weekend pick‑up games with friends
    at the local park.
  arts: Cheryl Galloup devotes their free time to sketching wildlife scenes reminiscent of John James Audubon, dives into Nancy Drew mysteries, builds intricate LEGO sets from designers like Eric Albers,
    and streams Studio Ghibli films for artistic inspiration.
  travel: Cheryl Galloup plans family trips that blend local hikes along the Brazos River Trail with annual visits to Texas Hill Country state parks such as Enchanted Rock, daydreams about a future adventure
    to Yellowstone National Park, prefers well‑mapped routes yet they leave room for spontaneous detours.
  culinary: Cheryl Galloup enjoys a mix of kid‑friendly foods like pepperoni pizza and chicken nuggets, frequently experiments with animal‑shaped sugar cookies using cinnamon and nutmeg, and they savor
    fresh fruit smoothies made with strawberries, banana, and a splash of orange juice.
  core: Cheryl Galloup is a curious, organized‑yet‑spontaneous 12‑year‑old who blends a love for mystery stories, animal sketching, and soccer with a habit of juggling structure and impulsive creativity,
    and they often swap LEGO bricks for a soccer ball in the same afternoon.
background:
  cultural: Cheryl is a White girl raised in a middle‑class family in Waco, Texas. Her upbringing reflects the Southern‑centric values of Central Texas, including strong community ties, regular attendance
    at a Protestant church, and participation in local traditions such as the annual Texas State Fair, high‑school football games, and family barbecues on holidays. The multicultural atmosphere of Waco
    has exposed her to Tex‑Mex cuisine and occasional Spanish phrases, while her family emphasizes education, kindness, and cooperative behavior. These cultural influences shape her respect for community,
    appreciation for regional customs, and a balanced blend of individual independence and collective responsibility.
