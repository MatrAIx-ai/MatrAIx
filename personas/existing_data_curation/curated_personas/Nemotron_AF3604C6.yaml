  career_goals: Cheryl hopes to pursue a career that blends hands‑on care with an organized environment. She dreams of becoming a veterinarian, where she can apply her steady temperament and love for animals,
    or a kindergarten teacher who can design structured yet playful lessons for young children. In the meantime, she plans to volunteer at the local animal shelter, participate in science clubs, and focus
    on biology and health subjects throughout middle and high school.
