  career_goals: Dallas aspires to turn his love of structure and the marine environment into a career that blends science, engineering, and community service. He hopes to study marine biology or environmental
    engineering, focusing on sustainable solutions for the coastal ecosystems around Whidbey Island. Long‑term, he envisions taking on a project‑manager role in a coastal restoration initiative or serving
    as a naval officer, honoring the local naval base while applying his methodical, reliable nature to real‑world challenges. He also wants to remain a mentor for younger students, using his organizational
    skills to lead community outreach programs.
