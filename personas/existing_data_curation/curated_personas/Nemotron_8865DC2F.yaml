  hobbies: '[''Sketching'', ''Digital photography'', ''Visiting art galleries'', ''Reading contemporary fiction and philosophy'', ''Hiking local nature trails'', ''Listening to indie music'', ''Playing
    narrative video games'', ''Cooking experimental dishes'', ''Writing poetry'']'
  career_goals: Liam aims to transition from retail to a role that blends his love for art and people‑focused service. Over the next three to five years he plans to earn his GED and complete an associate
    degree in arts administration or museum studies at a community college. His ultimate ambition is to become a gallery assistant or community‑arts coordinator in the Toledo area, where he can curate pop‑up
    exhibitions, run workshops, and support local artists. He also envisions launching a small café‑gallery space that offers a relaxed platform for artistic expression while maintaining a flexible schedule
    that reduces stress.
