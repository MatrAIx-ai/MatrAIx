personas:
  professional: Liam Marshall is a retail cashier turned aspiring arts administrator, leveraging strong customer service, conflict‑resolution skills, and a self‑taught eye for visual storytelling to transition
    into a gallery assistant role where they hope to curate pop‑up shows and eventually run a café‑gallery that blends community spirit with creative expression.
  sports: Liam Marshall is a casual runner who hikes the Maumee River trails, occasionally joining the Toledo Running Club, is a devoted fan of the Cleveland Browns and the Detroit Pistons, and plays in
    a co‑ed softball league on summer weekends.
  arts: Liam Marshall frequents the Toledo Museum of Art, draws inspiration from contemporary artists like Kerry James Marshall and Yayoi Kusama, enjoys listening to indie musicians such as Phoebe Bridgers
    and The National, and participates in open‑mic nights where they occasionally recite their own micro‑stories.
  travel: Liam Marshall dreams of wandering the Scottish Highlands to trace ancestral roots, has already taken weekend trips to Chicago for its architecture, and prefers low‑key road trips along the Great
    Lakes, balancing a modest travel budget with a love for discovering off‑beat art galleries.
  culinary: Liam Marshall enjoys experimenting in the kitchen, often blending classic comfort foods like pork tenderloin with unconventional ingredients such as miso glaze, crafting homemade pierogi with
    a twist of smoked paprika, and tends to over‑season dishes while still mastering the perfect espresso shot.
  core: Liam Marshall is a 27‑year‑old art‑obsessed retail veteran who balances spontaneous sketching sessions, budget‑conscious coffee‑shop dreams, and a lingering worry about deadlines, all while over‑seasoning
    every dish they cook.
background:
  cultural: Liam grew up in a typical Midwestern white working‑class family in Curtice, Ohio. His upbringing reflects the values of modesty, community spirit, and a strong work ethic common to Lucas County.
    Family gatherings centered around holidays like Thanksgiving and Fourth of July barbecues, with occasional church involvement that emphasized fellowship. His ancestry includes German and Irish roots,
    which surface in family recipes and a fondness for folk music during cultural celebrations. Local traditions, such as the annual county fair and high‑school sports events, shaped his social habits,
    while the region’s modest art scene—small galleries, community murals, and regional festivals—nurtured his appreciation for creativity and unconventional expression.
attributes:
  skills: '[''Cash handling'', ''Customer service'', ''POS system operation'', ''Basic bookkeeping'', ''Conflict resolution'', ''Active listening'', ''Art appreciation'', ''Digital photography'', ''Simple
