    festivals'']'
  career_goals: Kaoru aims to advance from her current waiting position to a shift supervisor role within the next two years, leveraging her organizational strengths and proven reliability. She plans to
    obtain a ServSafe Manager certification and enroll in evening hospitality‑management courses at a nearby community college. Long‑term, she envisions opening a small café that blends East Asian flavors
    with locally sourced Ohio produce, featuring rotating art displays from regional artists—a nod to her curiosity about art and unconventional thinking. In addition, she hopes to mentor new staff members,
    fostering a supportive workplace while securing a stable income for her family.
