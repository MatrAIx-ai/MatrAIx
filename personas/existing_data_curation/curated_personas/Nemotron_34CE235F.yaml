personas:
  professional: Kaoru Tseng is a meticulous restaurant server who leverages an exceptional memory, bilingual fluency, and deft POS handling to anticipate guests’ needs, while also mastering latte art and
    conflict resolution as they aim for a shift supervisor role.
  sports: Kaoru Tseng hikes the Appalachian foothills on weekends, participates in the Columbus Road Runners club for half‑marathon training, and cheers for the Cleveland Browns and Columbus Blue Jackets,
    preferring low‑impact endurance over high‑intensity gym sessions.
  arts: Kaoru Tseng frequents the Kenyon College art gallery, sketches inspired by Yayoi Kusama’s patterns, practices calligraphy after viewing studio exhibitions, and immerses themselves in graphic novels
    like Saga while listening to Sufjan Stevens.
  travel: Kaoru Tseng enjoys carefully planned weekend getaways to Shenandoah National Park and spontaneous cultural trips to New Orleans, while dreaming of a spring visit to Kyoto to study traditional
    tea ceremonies within a modest travel budget.
  culinary: Kaoru Tseng blends East‑Asian techniques with Midwestern produce, creating dishes such as kimchi‑corn chowder and miso‑glazed pork belly with apple slaw, while tending a balcony herb garden
    of basil, cilantro, and mint to season their experimental meals.
  core: Kaoru Tseng balances methodical hospitality work with artistic curiosity, turning hikes, calligraphy, and fusion cooking into a lifestyle that occasionally over‑organizes but always finds time for
    karaoke night.
background:
  cultural: Kaoru is a first‑generation American with a mixed East Asian heritage—her father’s family originates from Taiwan (surname Tseng) and her mother’s roots are Japanese. Raised in a bilingual household,
    she grew up speaking Mandarin at home and learning Japanese cultural practices from her mother. Family celebrations include Lunar New Year, the Mid‑Autumn Festival, and Japanese holidays such as Hinamatsuri,
    blending traditions from both sides. These cultural values emphasize respect for elders, hard work, and communal sharing of food, which influence her cooking and hospitality style. Living in Gambier,
    Ohio, Kaoru assimilates Midwestern customs while preserving her heritage through language, cuisine, and participation in local cultural festivals, creating a unique cross‑cultural identity that informs
    her curiosity about art, new ideas, and varied experiences.
