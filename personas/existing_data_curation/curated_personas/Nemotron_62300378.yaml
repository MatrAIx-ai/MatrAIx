personas:
  professional: An emerging administrative professional, Justice Moore harnesses a methodical approach, meticulous record‑keeping, and adeptness with Microsoft Office and Google Workspace to turn chaos
    into order, while their natural reliability and occasional worry keep deadlines met but sometimes leads to over‑checking tasks.
  sports: An avid outdoor enthusiast, Justice Moore tackles weekend hikes in the Colorado Plateau’s foothills, joins the Mesa County Trail Riders club for group treks, supports the Denver Broncos and Colorado
    Avalanche, and balances the rugged terrain with calming beginner yoga sessions in winter.
  arts: A creative mind, Justice Moore weaves intricate sweaters to the indie folk tunes of The Lumineers, solves daily crossword challenges from The New York Times, quotes Maya Angelou’s poetry in her
    journal, and relishes attending author talks at the library featuring books like James Clear’s 'Atomic Habits'.
  travel: A methodical explorer, Justice Moore maps out weekend getaways to Colorado’s Rocky Mountain National Park and long‑distance road trips to Utah’s Zion, while dreaming of a solo trek through Patagonia’s
    Torres del Paine, balancing careful budgeting with an appetite for rugged scenery.
  culinary: A practical cook, Justice Moore favors hearty quinoa bowls with roasted sweet potatoes, kale, and local trout, pairs meals with locally roasted coffee, and often experiments with lavender‑infused
    honey drizzle on homemade banana bread while listening to indie folk playlists.
  core: Justice Moore is a precision‑driven planner who transforms daily worries into well‑structured journals, meticulously organized spaces, and perfectly patterned scarves, while battling a tendency
    to over‑analyze every decision and a secret habit of binge‑watching true‑crime documentaries after a long day.
background:
  cultural: Justice grew up in a small, predominantly white, middle‑class community in Mesa County, Colorado. Her family emphasized reliability, hard work, and community involvement, values that align with
    the broader western U.S. culture of self‑reliance and respect for the outdoors. She participated in local school and church activities, which reinforced a sense of cooperation and modest assertiveness.
    The region’s outdoor lifestyle—hiking, camping, and seasonal sports—has shaped her appreciation for nature and a balanced, grounded approach to life.
attributes:
  skills: '[''Organizational Planning'', ''Time Management'', ''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Google Workspace'', ''Event Coordination'', ''Basic Bookkeeping'', ''Customer Service'',
