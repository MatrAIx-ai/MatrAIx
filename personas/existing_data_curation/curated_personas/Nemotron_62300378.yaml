  hobbies: '[''Journaling'', ''Hiking'', ''Knitting/Crocheting'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Community Volunteering (Local Library)'', ''Reading (Productivity, Self‑Help)'', ''Yoga'']'
  career_goals: Justice aims to secure a full‑time administrative or office‑support position where she can apply her organizational strengths in a predictable environment. She plans to enroll in a community‑college
    associate program in Business Administration and earn the Certified Administrative Professional (CAP) credential within the next two years. Long‑term, she hopes to become an office manager or project
    coordinator for a local non‑profit focused on community development, and eventually launch a side business as a professional organizer, helping others create structured, stress‑free spaces.
