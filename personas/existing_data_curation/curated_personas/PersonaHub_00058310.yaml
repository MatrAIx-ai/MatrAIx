persona_description: A geneticist who specializes in the study of R1b haplogroup, particularly the subclades R1b1c and R1b1c9. He has a keen interest in the history and genetics of southern Italy and the
  Mediterranean region, and is particularly interested in the role of R1b in the population structure of the region. He is also interested in the classification of R1b1c into different groups, and has created
  frequency maps based on data collected by other researchers. He is familiar with the ISOGG tree and the SNPs used to classify R1b1c, and is cautious about encouraging participants to undertake SNP tests
  until the two most common SNPs are included. He has conducted research on the frequency of DYS393=12 among R1b1c individuals in Italy, and has found that it is prevalent in southern Italy and is not as
  common in the rest of Europe.
