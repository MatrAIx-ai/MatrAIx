  career_goals: Douglas dreams of becoming a robotics engineer or a video‑game designer. He hopes to attend a specialized STEM high school, win his middle‑school science fair, and eventually study mechanical
    engineering or computer science at a university. He wants to create gadgets that make everyday chores easier, blending his curiosity with practical solutions. In the short term, he aims to master more
    advanced Scratch projects, build a functional robot for his school's club, and develop a simple indie game with friends.
