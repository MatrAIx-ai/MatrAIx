personas:
  professional: William West is a budding junior architect and free-spirited game developer who channels a meticulous, curiosity-driven mind into detailed LEGO cityscapes and Scratch prototypes while striving
    for perfection in every sketch, and they balance their love for strategic chess with a disciplined schedule that leaves little room for procrastination.
  sports: William West participates in after-school swimming lessons at the community pool and plays forward for the Riverfront Junior Soccer Club, while cheering for the Portland Trail Blazers and Portland
    Timbers on game days, and they approach each practice with the same strategic precision they apply to chess, sometimes over-exerting themselves in a sprint that leaves them winded but proud.
  arts: William West channels their curiosity into sketching futuristic skylines inspired by Escher's impossible geometry, Monet's pastel light, and Miyazaki's whimsical worlds, while practicing piano pieces
    by Beethoven and Yann Tiersen, and they regularly attend the local children's art workshop where they discuss the vivid illustrations of Simon Stålenhag.
  travel: William West dreams of exploring the Grand Canyon's towering cliffs and Japan's Ghibli Museum after school vacations, plans each trip meticulously by mapping museum hours and trail difficulties,
    and they adapt their itinerary to a modest family budget that favors weekend stays at nearby state parks like Redwood National Forest and annual visits to the Smithsonian National Air and Space Museum
    in Washington DC.
  culinary: William West enjoys crafting cheesy pepperoni pizza slices and blending strawberry-banana smoothies with fresh berries, can follow simple recipes for spaghetti carbonara and homemade sushi rolls
    using nori, rice, and cucumber, and they often negotiate extra cheese at dinner as a small reward for completing a challenging LEGO build.
  core: William West is a detail-obsessed, worry-prone nine-year-old whose boundless curiosity fuels intricate LEGO cities and Scratch games, and they often stay up late solving puzzles, a habit that keeps
    them out of bed past bedtime.
background:
  cultural: William is raised in a middle‑class, Anglo‑American family in Clifton, Virginia, a suburban community within Fairfax County. His family values education, community involvement, and appreciation
    for the arts. Living near Washington, D.C., he is regularly exposed to Smithsonian museums, historic sites, and a diverse cultural environment. Family traditions include celebrating national holidays
    such as Thanksgiving and the Fourth of July, attending local community festivals, and occasional church gatherings. His school setting is multicultural, introducing him to a range of cultural perspectives.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Sketching and drawing'', ''Piano (basic)'', ''Scratch programming'', ''Project organization'', ''Puzzle solving'']'
  hobbies: '[''Drawing/sketching'', ''LEGO building'', ''Scratch coding'', ''Reading sci‑fi/adventure books'', ''Playing piano'', ''Jigsaw puzzles'', ''Chess'', ''Visiting museums'', ''Nature walks'']'
  career_goals: William dreams of a future where he can blend his love of art, science, and orderly thinking. He envisions becoming an architect who designs sustainable, aesthetically pleasing spaces, or
    a museum curator who creates interactive exhibits that spark curiosity. He is also fascinated by space and occasionally imagines working as a NASA engineer or astronaut. His ambition is to excel in
    school—especially in STEM and art—to lay the groundwork for these possibilities, and he hopes his work will help people feel calm and inspired.
