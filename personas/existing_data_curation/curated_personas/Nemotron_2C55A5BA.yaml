personas:
  professional: Miguel Rivera is a methodical, 55‑year‑old handyman who leverages decades of home‑repair, automotive, and carpentry experience to secure reliable part‑time work, meticulously planning each
    job with spreadsheets and ensuring they meet client expectations.
  sports: Miguel Rivera spends early mornings fishing off the Gulf coast, follows the Houston Astros and Dallas Cowboys for seasonal excitement, walks their garden plot five times a week for fitness, and
    occasionally joins a community senior softball league, reflecting a low‑key yet consistent approach to staying active.
  arts: Miguel Rivera enjoys strumming acoustic guitar to the folk melodies of Lila Downs and Juan Gabriel, attends local cultural festivals featuring traditional dancers, reads historical border novels
    by Luis Alberto Urrea, and collects vintage traditional folk art, all of which shape their quiet appreciation for storytelling and music.
  travel: Miguel Rivera prefers carefully planned road trips to nearby historic towns such as San Antonio’s Alamo, the tiny fishing village of Port Isabel, and annual pilgrimages to the coastal sanctuary
    of Padre Island, balancing a modest budget with a love for low‑key exploration and family visits to their hometown in the Yucatán.
  culinary: Miguel Rivera prepares traditional dishes like pork pozole rojo, chicken tamales wrapped in corn husks, and a tangy salsa verde made from tomatillos, cilantro, and dried chilies, showcasing
    an intermediate cooking skill that blends precise recipe measurements with spontaneous flavor adjustments, and they take pride in serving these meals at church gatherings and neighborhood potlucks.
  core: Miguel Rivera is a disciplined, hands‑on problem‑solver who blends a love for gardening, fishing, and traditional cooking with a steadfast routine and occasional stubbornness about trying new technology.
background:
  cultural: 'Miguel was born and raised in Brownsville, Texas, a city that sits directly on the US‑Mexico border. He grew up in a Mexican immigrant family, speaking Spanish at home while learning English
    in school, giving him a bilingual foundation. His cultural identity is deeply rooted in Mexican traditions: Catholic faith, family‑centered celebrations such as Día de los Muertos and Mexican Independence
    Day, and a strong emphasis on communal support. Living in Cameron County, he experiences a blend of Texan and Mexican influences, participating in local events like Charro Days and supporting neighborhood
    gatherings. Miguel values humility, perseverance, respect for elders, and a close connection to the land and sea—values that shape his daily habits, interpersonal relationships, and his desire to preserve
    and share his heritage with younger generations.'
