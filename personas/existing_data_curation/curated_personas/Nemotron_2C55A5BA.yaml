  career_goals: Although Miguel is currently out of the formal workforce, he aims to secure reliable part‑time handyman work that leverages his repair skills for a steady income. He plans to earn his GED
    to formalize his basic education and improve his confidence in written communication. Miguel hopes to launch a modest home‑based catering service specializing in Mexican comfort foods, allowing him
    to share his culinary heritage while generating extra earnings. He also aspires to mentor local youth in practical trades, enhance his digital literacy for better financial management, and maintain
    his physical health through regular walks and gardening. Ultimately, Miguel wants to be a valued, self‑sufficient contributor to his close‑knit community while preserving his cultural traditions.
