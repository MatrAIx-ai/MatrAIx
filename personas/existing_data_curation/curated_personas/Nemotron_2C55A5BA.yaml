  hobbies: '[''Gardening (vegetable garden, native plants)'', ''Fishing (Gulf of Mexico)'', ''Cooking traditional Mexican dishes'', ''Woodworking (handcrafted furniture, repairs)'', ''Birdwatching'', ''Reading
