    repair'', ''Basic welding and metal fabrication'', ''Data analysis of machine performance'', ''Customer service and communication'']'
  hobbies: '[''Hiking and trail walking'', ''Restoring vintage arcade cabinets'', ''Playing classic arcade games'', ''Gardening (heirloom vegetables, native perennials)'', ''Quilting'', ''Woodworking'',
    ''Reading historical nonfiction and mystery novels'', ''Volunteering at the county food bank'', ''Participating in community fairs'', ''Cooking dishes inspired by South Asian cuisine'']'
  career_goals: Macey aims to advance to a senior field service manager role within the next three years, overseeing a regional team of technicians and standardizing cashless‑payment retrofitting across
    the fleet. She plans to earn the Certified Vending Technician credential and complete a business management certificate to prepare for launching her own independent service consultancy focused on sustainable
    repairs. Long‑term, she envisions mentoring apprentices and contributing to industry standards through workshops and trade publications.
