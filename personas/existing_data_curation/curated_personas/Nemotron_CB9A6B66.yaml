personas:
  professional: Linda Devore is a budding preschool inventor who constantly mixes building blocks with kitchen utensils, balancing a love for novel creations with a knack for sticking to familiar ways of
    play, even if their workspace ends up a delightful mess.
  sports: Linda Devore thrives in preschool soccer, proudly wearing the red jersey of the local Kids Kicks Club and cheering for the city's professional baseball team, the Harbor Hawks, while turning every
    practice into a lively, competitive game.
  arts: Linda Devore delights in drawing cartoon animals from Sesame Street and Peppa Pig, often humming the theme songs of Mickey Mouse Clubhouse and dancing to the upbeat tunes of Kidz Bop, making art
    time a colorful, energetic showcase.
  travel: Linda Devore loves weekend trips to the nearby county zoo and the beach at Sunny Shore, dreams of a family vacation to Disneyland, and always insists on packing their favorite stuffed rabbit for
    the adventure.
  culinary: Linda Devore prefers creamy mac and cheese, crunchy carrot sticks, and strawberry-topped pancakes, proudly helping stir batter for cookies even if their spoon drips sauce across the kitchen
    counter.
  core: Linda Devore is a curious, energetic four-year-old who balances inventive play with a love for group fun, occasional skepticism, and a delightful knack for turning everyday chaos into creative discovery.
background:
  cultural: Linda is raised in a white, middle-class family in Mesa, Arizona. Her household blends traditional American customs—holiday celebrations, backyard barbecues, and Sunday family meals—with subtle
    influences from the Southwest, such as occasional Mexican-American dishes and community events like the annual Mesa Art Festival. The desert landscape encourages outdoor play, and local schools emphasize
    inclusive, multicultural curricula that expose her to diverse traditions.
