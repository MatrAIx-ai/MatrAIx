  hobbies: '["Duplo block building", "drawing and coloring", "dancing", "playing tag", "preschool circle time", "simple board games", "children''s soccer", "nature walks and rock collecting"]'
  career_goals: Linda dreams of becoming someone who helps and leads others, often saying she wants to be a teacher, a veterinarian, or an astronaut. Her competitive spirit makes her picture herself as
    a star athlete on a soccer team, and she frequently imagines running a pretend classroom where she organizes games for her friends. These aspirations combine her love of caring for animals, curiosity
    about the world, and desire to be recognized for her abilities.
