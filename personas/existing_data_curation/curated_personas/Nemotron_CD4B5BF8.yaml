  career_goals: Even though he is retired, Francisco remains driven to leave a lasting cultural legacy. He aims to create a small community exhibition space that showcases local Mexican‑Texan artists, compile
    and publish a memoir of his family's migration story, establish a scholarship for high‑school students interested in arts and history, and learn digital photography to document neighborhood histories.
