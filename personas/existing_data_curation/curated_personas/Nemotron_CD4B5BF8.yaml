personas:
  professional: Francisco Ocampo, an 82‑year‑old retired community organizer and dedicated archivist, leverages their meticulous record‑keeping, bilingual communication, and love of folk art to curate a
    modest neighborhood exhibition space that showcases local heritage artists while mentoring youth and maintaining disciplined budgets.
  sports: Francisco Ocampo, an 82‑year‑old enthusiast of low‑impact activity, participates in a senior walking club at the local park, enjoys weekly lawn‑bowling at the community recreation center, faithfully
    follows the Texas Rangers baseball team and the Dallas Cowboys football team, and occasionally attends senior‑friendly yoga sessions to preserve flexibility.
  arts: Francisco Ocampo, an 82‑year‑old watercolorist and woodcarver, spends afternoons capturing intimate Rio Grande scenes while listening to the lively strings of Mariachi Vargas de Tecalitlán and the
    rhythmic beats of Los Lobos, draws inspiration from biographies of Frida Kahlo and Diego Rivera, and regularly displays their figurines at regional art fairs alongside fellow folk‑art creators.
  travel: Francisco Ocampo, an 82‑year‑old planner who prefers road trips, explores culturally rich destinations such as Santa Fe, New Mexico and San Antonio’s historic missions, revels in small‑town artisan
    markets and seasonal festivals, balances travel with modest budgeting by staying in family‑run inns, and dreams of revisiting the high‑desert vistas of Big Bend National Park.
  culinary: Francisco Ocampo, an 82‑year‑old culinary hobbyist, prepares hearty red‑pork pozole and steaming tamales de verde using fresh cilantro, epazote, and hominy harvested from their backyard herb
    garden, enjoys grinding dried chilies on a stone mortar, and relishes sharing these meals at neighborhood gatherings, though they sometimes forget to refrigerate leftovers promptly.
  core: Francisco Ocampo, an 82‑year‑old retired archivist with a disciplined routine, pairs a relentless love of watercolor and woodcarving with endless curiosity, habitually hums Mariachi tunes while
    tending an herb garden, and occasionally misplaces their glasses on the kitchen counter.
background:
  cultural: Francisco was born to Mexican immigrant parents who settled in El Paso during the 1940s. He grew up immersed in Mexican traditions—celebrating Día de los Muertos, quinceañeras, and Catholic
    holidays—while also navigating the bicultural life of a border city. His identity reflects a blend of Mexican heritage, Texan community values, and a lifelong commitment to preserving the cultural stories
    of his family and neighborhood.
