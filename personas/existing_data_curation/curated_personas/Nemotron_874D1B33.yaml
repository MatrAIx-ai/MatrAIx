  hobbies: '[''Cooking traditional Vietnamese dishes'', ''Community garden cultivation and produce contests'', ''Crocheting and knitting'', ''Reading mystery novels'', ''Walking in nature'', ''Attending
    church and community gatherings'', ''Storytelling and sharing cultural heritage'']'
  career_goals: Although retired, Thuy aims to compile a handwritten family recipe book that blends Vietnamese traditions with Southern flavors, ensuring her culinary heritage endures. She wishes to mentor
    grandchildren and local youth in cooking and gardening, fostering a sense of pride and self‑sufficiency. Thuy plans to volunteer as a cultural liaison at the Jasper public library, organizing occasional
    workshops on Southeast Asian crafts and folklore. She also aspires to learn more advanced tablet features to capture and archive family memories, all while maintaining her health and independence.
