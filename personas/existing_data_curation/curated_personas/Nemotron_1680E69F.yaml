  career_goals: He aspires to earn Master Electrician certification and eventually launch his own contracting firm focused on renewable energy and smart‑home solutions. In the next five years, he aims to
    become a certified PV installer, expand his portfolio to include large‑scale commercial solar projects, and develop a mentorship program for younger electricians. He also envisions teaching part‑time
    at the local community college to share his practical knowledge while staying engaged with evolving electrical technologies.
