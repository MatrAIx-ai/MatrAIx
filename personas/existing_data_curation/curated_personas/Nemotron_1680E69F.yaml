personas:
  professional: Jonathan Mcnally is an experienced electrician who blends a solid mastery of residential and commercial wiring with a passion for solar photovoltaic and smart‑home automation, they mentor
    apprentices while balancing innovative IoT curiosities with strict code compliance and a pragmatic, community‑service mindset.
  sports: Jonathan Mcnally is a dedicated angler who frequents Lake Palestine for sunrise bass fishing, supports the Dallas Cowboys and Texas Rangers, they join the East Texas Hiking Association for weekend
    trail outings, and they view fitness as a blend of functional outdoor activity and modest team spirit.
  arts: Jonathan Mcnally enjoys restoring vintage radios as tactile art, curates custom LED lighting installations that echo mid‑century modern aesthetics, they listen to classic rock icons like The Beatles
    and Bob Dylan, and they attend occasional screenings of engineering documentaries by Lesley Chilcott.
  travel: Jonathan Mcnally prefers self‑planned road trips that combine early‑morning fishing at Lake Palestine, exploring Hill Country towns such as Fredericksburg and Austin, and dreaming of a future
    expedition to Patagonia for wild‑river fly fishing, they balance these adventures with a modest travel budget and family obligations.
  culinary: Jonathan Mcnally favors Texas‑style smoked brisket, freshly caught trout seasoned with rosemary and lemon, and Tex‑Mex fajitas spiced with cumin and smoked paprika, they cook at a moderate skill
    level, often experimenting with homemade spice rubs while pairing meals with locally brewed craft beer.
  core: Jonathan Mcnally merges the precision of a seasoned electrician with a tinkerer’s curiosity, they balance community‑service ambitions in renewable energy with a quiet love for sunrise fishing, and
    they occasionally over‑order LED components while forgetting to stretch after long workdays.
background:
  cultural: Jonathan grew up in a small town near Tyler, Texas, within a family of Scottish‑Irish descent that values self‑reliance, community service, and modesty. The regional culture of East Texas—characterized
    by a blend of Southern hospitality, a strong work ethic, and a respect for tradition—shapes his outlook. His upbringing emphasized practical skills, faith‑based community involvement, and a love of
    the outdoors. While he identifies with the broader Anglo‑American heritage common in the area, he also embraces the multicultural influences of the Texas region, including Hispanic neighbors and the
    growing emphasis on renewable energy initiatives.
