  hobbies: '[''Gardening'', ''Knitting'', ''Cooking Soul Food'', ''Reading Classic Literature'', ''Listening to Gospel and Jazz'', ''Church Choir Participation'', ''Walking in Forest Preserve'', ''Volunteer
    Story-time at Library'']'
  career_goals: Julia aims to remain an active contributor to her school community for the next several years by focusing on mentorship and knowledge sharing. She hopes to develop a concise resource handbook
    for fellow teaching assistants, lead workshops on effective classroom organization, volunteer her time to the local adult literacy program, and help preserve oral histories of longtime educators in
    Hazel Crest. While she plans a phased retirement, she envisions continuing a modest role that ensures continuity and supports the next generation of teachers.
