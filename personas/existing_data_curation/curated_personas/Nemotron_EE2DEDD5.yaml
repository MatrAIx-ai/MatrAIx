  hobbies: '[''Hiking'', ''Kayaking'', ''DIY woodworking projects'', ''3D printing'', ''Reading sci‑fi and tech non‑fiction'', ''Volunteer STEM mentor'', ''Gardening'', ''Cooking'', ''Board games'', ''Photography'']'
  career_goals: Joyce aims to earn her Professional Engineer (PE) license within the next two years and progress to a senior mechanical engineering role where she can lead multidisciplinary projects focused
    on sustainable and efficient agricultural equipment for the Midwest. Over the longer term, she aspires to become an engineering manager or director of product development, mentor women entering STEM
    fields, and possibly launch her own consultancy that helps regional manufacturers improve process efficiency and adopt eco‑friendly design practices.
