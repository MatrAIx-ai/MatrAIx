personas:
  professional: Michelle Watson, a seasoned education‑law attorney, blends rigorous legal research with a pragmatic, curiosity‑driven approach to case strategy and client counseling; they excel at drafting
    policy briefs and negotiating complex school‑governance disputes while mentoring junior lawyers, all while juggling a slightly chaotic schedule that values flexibility over strict planning.
  sports: Michelle Watson enjoys hiking the trails of Kettle Moraine State Forest and participates in a local trail‑running club, cheers on the Milwaukee Bucks and Green Bay Packers on game days, while
    their fitness routine remains flexible, favoring occasional weekend hikes over a rigid gym schedule.
  arts: Michelle Watson finds creative release in woodworking small projects and cooking, while they also appreciate the music of Brandi Carlile, the paintings of Vincent van Gogh, and the films of Greta
    Gerwig, often attending Milwaukee’s local art fairs and the Milwaukee Ballet for a cultural boost.
  travel: Michelle Watson prefers spontaneous weekend getaways to places like Door County’s lakeside cottages or the historic streets of Boston, balancing a love for nature retreats with occasional policy‑focused
    trips to Washington, D.C., yet their planning remains loosely organized, leading to overpacked suitcases and last‑minute itinerary changes.
  culinary: Michelle Watson delights in cooking seasonal Midwestern dishes such as corn chowder, herbed roast chicken, and apple crisp, often incorporating fresh tomatoes, green beans, and locally sourced
    honey from their garden, and they enjoy experimenting with new recipes while maintaining a moderately advanced cooking skill set.
  core: Michelle Watson is a detail‑oriented yet flexible education‑law specialist who channels anxiety into mindfulness, balances courtroom battles with gardening, and occasionally forgets to file a bill
    but never forgets a deadline for a client brief.
background:
  cultural: Michelle grew up in a middle‑class family in the Green Bay area of Wisconsin, where community involvement and modesty are highly valued. Her family’s roots trace back to Dutch and German immigrants
    who settled in the Upper Midwest generations ago, fostering a strong sense of regional identity tied to seasonal cycles and local traditions. She attended the University of Wisconsin‑Madison for her
    bachelor's in education before earning her Juris Doctor at Marquette University. The Midwestern emphasis on practicality, self‑reliance, and collaborative problem‑solving has shaped both her professional
    ethos and her personal outlook.
