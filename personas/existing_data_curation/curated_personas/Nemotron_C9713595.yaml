  career_goals: Michelle aims to ascend to partnership at her firm, positioning herself as the go‑to expert on education law within the region. She envisions establishing a pro bono clinic that provides
    legal assistance to under‑served students and families, and hopes to influence state education policy through testimony before legislative committees. Long‑term, she is considering a transition to an
    in‑house counsel role for a large public‑university system or a judicial appointment on a specialized education court, where she can shape systemic change. Alongside these professional ambitions, she
    seeks to publish a guide on navigating legal challenges in K‑12 administration.
