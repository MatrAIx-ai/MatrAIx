personas:
  professional: Eduardo Prieto, a meticulous four‑year‑old architect of Lego cities, blends curiosity for new designs with a disciplined routine of sorting bricks, delights in presenting their creations
    to peers, and competitively judges the structural integrity of others' builds, while they eagerly narrate the story behind each towering masterpiece.
  sports: Eduardo Prieto, an energetic four‑year‑old, spends afternoons in a preschool gymnastics class where they perfect cartwheels with disciplined precision, eagerly cheers for the hometown soccer team
    City United during weekend broadcasts, and competes fiercely in the neighborhood’s tiny‑tackle football league, always insisting on tracking their progress on a hand‑drawn performance chart.
  arts: Eduardo Prieto, a talkative four‑year‑old, fills their sketchbook with crayon drawings of Dr. Seuss characters while humming the catchy tunes of Disney’s 'Let It Go' from Frozen, proudly recites
    lines from the Peppa Pig series, and idolizes dancer Maddie Ziegler, often attempting her signature moves during living‑room dance parties, which they claim makes them feel like a star.
  travel: Eduardo Prieto, an inquisitive four‑year‑old, loves family road trips to the nearby zoo where they can count every animal, dreams of visiting Disneyland Paris next summer, delights in building
    sandcastles on the coastal beach during summer vacations, and prefers a tightly scheduled itinerary with frequent snack breaks over spontaneous wandering.
  culinary: Eduardo Prieto, a disciplined four‑year‑old, insists on helping stir the batter for banana pancakes, prefers the creamy texture of mac and cheese with sharp cheddar, delights in crunchy carrot
    sticks dipped in hummus, and they occasionally sneak extra chocolate chips into their cookies despite Mom’s warnings.
  core: Eduardo Prieto, a meticulously organized yet chatty four‑year‑old, channels their competitive streak into building the tallest Lego towers, hoards coins in a piggy bank, calmly endures routine check‑ups,
    and they habitually ask “why” of every adult, even when the answer is obvious.
background:
  cultural: Eduardo's family immigrated from Venezuela, bringing with them a rich tapestry of traditions, language, and cuisine. Raised in a bilingual home, he speaks Spanish with his grandparents and English
    at school, blending both cultures seamlessly. The family celebrates Venezuelan holidays such as Día de la Independencia with music, dance, and traditional dishes like arepas and hallacas, while also
    participating in the vibrant Latin community of Hialeah. This multicultural environment nurtures his sociable nature, love for music, and resilient outlook, reflecting the perseverance of many Venezuelan
    families navigating life in the United States.
