  career_goals: Even at four, Eduardo dreams of becoming an engineer or architect, fascinated by building structures with his blocks and imagining how they function. He also hopes to be a soccer star, driven
    by his competitive spirit and desire to be praised in front of an audience. Ultimately, he aspires to a role where he can lead, organize, and showcase his talents, such as a future TV host or community
    leader.
