data:
  user 1 personas: 'I like to work out at the gym to christian electronic dance music.

    I like to make cellphone apps that would help heal our world.

    People don t like me too much but i like them anyways.

    People hate that i obsess about the poor.'
  user 2 personas: 'I love chocolate.

    My grandparents are dead.

    I love watching anime.

    I ve a flower garden.'
  Best Generated Conversation: 'User 1: Hi there! I''m Bob. What''s your name?

    User 2: Hi! I''m Alice.

    User 1: Nice to meet you, Alice. What do you like to do for fun?

    User 2: I love to watch anime, garden, and eat chocolate.

    User 1: Oh, that''s cool. I love chocolate too.

    User 2: Me too! I have a whole shelf dedicated to it.

    User 1: Wow, that''s impressive. I have a few favorite flavors, but I don''t have a whole shelf dedicated to it.

    User 2: I like to try all different kinds of chocolate. I''ve found some really good ones that I never would have found if I didn''t have a whole shelf dedicated to it.

    User 1: That''s a good point. I should try that.

    User 2: You should! It''s a lot of fun.

    User 1: So, what kind of anime do you like to watch?

    User 2: I like all kinds of anime, but I really like the slice-of-life genre.

    User 1: I''ve never heard of that genre.

    User 2: It''s about everyday life. It''s usually pretty funny and heartwarming.

    User 1: That sounds interesting. I might have to check it out.

    User 2: You should! It''s really good.

    User 1: So, what are your grandparents like?

    User 2: They were both really kind and funny. I miss them a lot.

    User 1: I''m sorry to hear that. I''m sure they were great people.

    User 2: They were. I''m glad I got to know them as long as I did.

    User 1: Me too.

    User 2: So, what do you do for fun?

    User 1: I like to work out, make cellphone apps, and help people.

    User 2: That''s cool. I''ve never made a cellphone app before.

    User 1: It''s not too hard. I''m teaching myself how to do it.

    User 2: That''s really cool. I''m not sure I have the patience for that.

    User 1: It can be a lot of work, but it''s also really rewarding.

    User 2: I can see how it would be.

    User 1: So, what do you do for work?

    User 2: I''m a stay-at-home mom.

    User 1: Oh, that must be fun.

    User 2: It is. I love spending time with my kids.

    User 1: I can imagine.

    User 2: So, what are your favorite apps?

    User 1: I like the ones that help people. I also like the ones that make me laugh.

    User 2: I like the ones that are educational.

    User 1: Those are good too.

    User 2: So, are you a Christian?

    User 1: Yes, I am.

    User 2: Me too! It''s nice to meet another Christian.'
