persona_description: A conservation and restoration specialist who has expertise in the preservation and restoration of cultural and historical monuments, especially those from the early period of construction
  of the imperial city in Vietnam. They are skilled in utilizing traditional building materials and technologies alongside modern conservation methods and techniques, and have a particular interest in developing
  and implementing an authentic restoration method for frescos and buildings featuring colored plastering. They are passionate about promoting the conservation and restoration of these unique buildings
  in line with UNESCO standards and have a deep understanding of the cultural and historical significance of these works of art and edifices.
