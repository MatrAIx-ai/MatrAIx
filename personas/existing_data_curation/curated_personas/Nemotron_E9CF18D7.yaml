  hobbies: '[''Hiking'', ''Landscape Sketching'', ''Nature Photography'', ''Reading Architectural Theory'', ''Gardening'', ''Woodworking'', ''Yoga'', ''Mindfulness Meditation'', ''Cooking Farm-to-Table
    Meals'']'
  career_goals: Helen aspires to become a senior project architect and eventually lead a boutique studio that specializes in energy‑efficient residential architecture for the Appalachian region. Over the
    next five years she aims to earn LEED Accredited Professional certification and deepen her expertise in passive house design. Helen hopes to mentor junior architects, particularly women, and to influence
    local zoning policies to promote sustainable building practices. While pursuing these professional milestones, she plans to maintain a balanced workload that preserves her need for quiet, solitary work
    time and supports her family life.
