personas:
  professional: Dominique Dawkins, a meticulous purchasing agent for a Maryland state agency, leverages deep vendor negotiation, SAP MM expertise, and advanced Excel analytics to streamline supply chain
    compliance while applying her methodical, curiosity-driven approach to continuously refine processes.
  sports: Dominique Dawkins prefers low-impact fitness, joining the local Rocks Trail Hiking Club for weekend treks, occasionally doing sunrise yoga at the Patapsco River, and is a devoted fan of the Baltimore
    Ravens and Washington Capitals, cheering quietly in their home office.
  arts: Dominique Dawkins curates instrumental playlists featuring Max Richter, Brian Eno, and Ólafur Arnalds, reads contemporary novels by Sally Rooney and Celeste Ng, and attends occasional off-beat documentary
    screenings on economic innovation, finding solace in the intersection of narrative and sound.
  travel: Dominique Dawkins plans travel with meticulous itineraries, favoring solitary retreats to places like Iceland’s Westfjords and Japan’s Kyoto countryside, while budget constraints keep weekend
    getaways limited to the nearby Shenandoah National Park and historic Annapolis.
  culinary: Dominique Dawkins enjoys farm-to-table cooking, frequently prepping roasted beet and quinoa salads with zucchini, kale, and heirloom tomatoes from her own garden, and occasionally experiments
    with homemade savoy cabbage kimchi, but admits a weakness for ordering late-night pizza from the local pizzeria.
  core: Dominique Dawkins is a quiet, analytically driven procurement professional whose love for order fuels a habit of bullet-journaling every facet of life, even as they occasionally binge-watch documentary
    series and procrastinate on social obligations.
background:
  cultural: Dominique grew up in a close-knit African-American family in Harford County, where community gatherings, church events, and extended family ties emphasized resilience, self-reliance, and collective
    support. Her parents, both community college graduates, instilled a strong work ethic and encouraged her curiosity about business and technology. While she values her cultural heritage—celebrating traditions
    such as Juneteenth, soul food gatherings, and stories of Black entrepreneurship—she tends to engage in these activities in more intimate settings, preferring one-on-one conversations and small group
    discussions. The legacy of Black women leaders in business and civil rights informs her competitive drive and her ambition to succeed as a professional in a field where Black representation remains
    limited.
attributes:
  skills: '[''Procurement management'', ''Vendor negotiation'', ''Contract analysis and compliance'', ''Cost analysis and budgeting'', ''Inventory control'', ''Supply chain logistics'', ''ERP systems (SAP
