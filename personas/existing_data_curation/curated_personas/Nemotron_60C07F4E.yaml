    assurance'']'
  hobbies: '[''Reading (fiction, business, tech)'', ''Bullet journaling'', ''Gardening (vegetable garden)'', ''Hiking (local nature trails)'', ''Puzzle solving (Sudoku, crosswords)'', ''Knitting'', ''Python
    scripting / automation'', ''Listening to instrumental music'', ''Watching documentary series (economics, innovation)'']'
  career_goals: Dominique aims to advance from her current purchasing agent position to a senior procurement specialist role within the next three years, ultimately becoming a procurement manager for a
    regional manufacturing or distribution company in Maryland. She plans to obtain professional certifications such as the Certified Professional Purchasing Manager (CPPM) and the APICS Certified Supply
    Chain Professional (CSCP) to deepen her expertise. Her long-term ambition is to lead a strategic sourcing team that integrates sustainable and technology-driven solutions, such as AI-based spend analysis
    and blockchain-enabled supplier transparency. She also envisions launching a boutique consulting practice that helps small businesses optimize their purchasing processes while maintaining rigorous cost
    control.
