  hobbies: '["digital photography", "vegetable and herb gardening", "cooking Salvadoran cuisine", "senior dance classes", "volunteering at community center", "walking/hiking local trails", "reading science
    magazines", "digital illustration", "DIY woodworking projects", "basic coding exercises"]'
  career_goals: Although retired from formal employment, Rolando aims to stay intellectually active and contribute to his community. He aspires to organize a yearly multicultural art and food festival that
    showcases Salvadoran heritage alongside other local cultures, and to mentor younger members of the Salvadoran diaspora in both technical skills and cultural traditions. He also hopes to compile a memoir
    of his immigration experience and family stories, preserving them for future generations. On a personal level, he wants to master a new creative technology—such as 3D printing—to blend his engineering
    background with artistic expression, while establishing a gentle daily routine that eases his worry and supports his emotional well‑being.
