personas:
  professional: A seasoned maintenance and repair specialist named Robert Miller, who blends deep mechanical, electrical, and HVAC expertise with an imaginative, DIY‑driven approach, consistently delivering
    creative fixes while eyeing senior supervisory roles and renewable‑energy tech integration.
  sports: Robert Miller enjoys midnight ice‑fishing on frozen lakes in winter, summer deer hunting in the nearby Badlands, and participates in a local 8‑man softball league that cheers on the North Dakota
    State Bison football team and the Minnesota Vikings, while their personal fitness routine consists of weekend weight‑lifting in the garage and early‑morning jogs along the prairie trail.
  arts: Robert Miller spends evenings crafting abstract canvases inspired by Jackson Pollock, carving custom furniture while listening to Neil Young and the acoustic stylings of John Mayer, and fine‑tuning
    their acoustic guitar with occasional covers of Bob Dylan, all of which they showcase at the annual county fair’s art tent.
  travel: Robert Miller prefers road‑tripping in a rugged pickup to iconic prairie vistas like Badlands National Park and Glacier, dreams of touring Norway’s wind‑farm sites to study renewable tech, and
    often revisits family‑rooted gatherings at the Minnesota State Fair for a taste of familiar community spirit.
  culinary: Robert Miller, a competent home‑cook, favors hearty prairie fare such as bison stew with root vegetables, smoked trout seasoned with fresh dill and lemon, and fresh‑baked rye bread made with
    locally milled flour, while they often experiment with charcoal grilling and occasionally over‑salt their sauce during late‑night woodworking sessions.
  core: Robert Miller is a pragmatic yet wildly creative maintenance guru whose love of hands‑on problem solving, abstract art, and wind‑farm tech is balanced by a stubborn streak, occasional tool‑obsession,
    and a habit of losing track of time on solo projects.
background:
  cultural: Robert is a white American raised in Kulm, North Dakota, a tight‑knit rural community with strong German‑Scandinavian heritage. Growing up on the plains, he internalized values of self‑reliance,
    hard work, and community involvement, often attending church services (predominantly Lutheran) and local school events. The agricultural backdrop and seasonal rhythms shape his appreciation for nature,
    outdoor recreation, and the simple, grounded lifestyle of the Midwest, while his high‑school education and hands‑on trade experience have fostered a pragmatic yet imaginative outlook.
attributes:
  skills: '[''Mechanical repair'', ''Electrical systems troubleshooting'', ''HVAC maintenance'', ''Plumbing repairs'', ''Carpentry and woodworking'', ''Welding'', ''Preventive maintenance scheduling'',
