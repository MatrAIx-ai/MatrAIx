  hobbies: '[''Abstract painting'', ''Woodworking and furniture making'', ''Model airplane building'', ''Science fiction reading'', ''Philosophy podcasts'', ''Playing guitar'', ''Fishing'', ''Hunting'',
    ''Prairie photography'', ''Attending county fairs'']'
  career_goals: Robert aims to advance to a senior maintenance supervisor role, acquiring certifications such as HVAC-R, CPC (Certified Plant Maintenance Manager), and renewable‑energy maintenance qualifications.
    He is driven to integrate emerging technologies like wind‑turbine upkeep and drone‑based inspections into his work, positioning himself as a go‑to expert for innovative repair solutions in the region.
    Long‑term, he envisions launching a boutique handyman‑artisan business that blends his technical expertise with his passion for custom woodworking and abstract art, providing high‑quality, creatively
    designed services to both rural and nearby urban communities.
