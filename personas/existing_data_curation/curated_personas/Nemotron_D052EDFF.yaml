  career_goals: Although she is currently not in the formal workforce, Heather aims to stay intellectually active by mastering new digital tools such as advanced spreadsheet modeling and introductory data
    science concepts. She hopes to channel her expertise into mentoring younger women in the community who are interested in STEM, possibly through workshops at the local library. Another ambition is to
    lead a small community garden project that promotes sustainable practices and provides fresh produce for neighboring families. On a personal level, Heather seeks to reduce her chronic worry by establishing
    a regular mindfulness routine and by publishing a memoir that weaves together her professional experiences with her Southern heritage.
