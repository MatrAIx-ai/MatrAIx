  hobbies: '[''visiting art galleries and museums'', ''sketching urban and natural scenes'', ''digital and film photography'', ''mixed-media collages'', ''creative writing and blogging'', ''reading contemporary
    literature and poetry'', ''attending live music performances'', ''participating in online art communities'']'
  career_goals: Patricia aims to complete her GED within the next year, then enroll in a community‑college program focused on graphic design or fine arts. She wants to build a professional portfolio that
    showcases her painting, illustration, and photography work, with the goal of securing freelance illustration contracts or an apprenticeship at the local arts center. In the longer term, she envisions
    combining her creative talents with community outreach, perhaps leading art‑based workshops for youth in Wilkes‑Barre and eventually establishing a small studio that offers custom artwork and design
    services.
