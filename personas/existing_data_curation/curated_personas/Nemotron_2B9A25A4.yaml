  hobbies: '["Surfing", "Hiking", "Hula dancing", "Ukulele playing", "Digital painting", "Generative art programming", "Indie video‑game development", "Reading science‑fiction", "Cooking Hawaiian cuisine",
    "Mentoring youth in coding"]'
  career_goals: Leonardo aims to advance to a senior engineering or lead architect role where he can shape product strategy and mentor junior developers. He is eager to spearhead projects that fuse technology
    with Polynesian culture—such as interactive storytelling platforms or AR experiences that celebrate Hawaiian heritage. Over the next five years, he plans to launch his own startup that creates culturally‑informed
    digital tools, publish open‑source libraries for generative art, and become a recognized speaker at tech‑and‑art conferences.
