  hobbies: '[''Gardening'', ''Woodworking'', ''Birdwatching'', ''Historical nonfiction reading'', ''Hiking'', ''Cooking'', ''Volunteer STEM tutoring'', ''Photography'', ''Attending local art exhibits'',
    ''Spontaneous weekend trips'']'
  career_goals: Jo aims to transition into a senior advisory or consulting role where she can champion sustainable, resilient infrastructure for the Greater Kansas City region. Over the next five years
    she plans to lead a small, agile team that embraces flexible project workflows, develop a mentorship program for emerging engineers, and influence local policy on flood mitigation and green design.
    She also intends to obtain her Professional Engineer (PE) license, author a guide on adaptive design for mid‑size municipalities, and eventually shift to part‑time consulting to maintain a balanced
    lifestyle while continuing to contribute her expertise to community projects.
