  hobbies: '[''reading science-fiction and fantasy novels'', ''playing strategy and puzzle video games'', ''building model kits (cars, airplanes)'', ''hiking and fishing in local nature areas'', ''practicing
    acoustic guitar'', ''volunteering for community clean-up events'']'
  career_goals: Freddie aspires to channel his curiosity about how things work into a practical career in automotive technology. In the short term, he plans to enroll in a technical high-school program
    that offers automotive repair courses and to earn an apprenticeship with a local garage. His long-term ambition is to become a certified mechanic, eventually opening a small service shop in Sparta that
    can serve his community while preserving his hands-on, problem-solving approach. He also keeps an interest in environmental stewardship, hoping to integrate eco-friendly practices into his future business.
