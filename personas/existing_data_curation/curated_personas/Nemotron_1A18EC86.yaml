  hobbies: '[''Sailing'', ''Basketball'', ''Neighborhood barbecues'', ''Home improvement projects'', ''Woodworking'', ''Patio gardening'', ''Local history volunteering'', ''Watching Boston Red Sox games'',
    ''Social gatherings with friends'']'
  career_goals: Kevin aims to transition from an independent broker to the founder of a boutique real‑estate firm within the next three years, concentrating on high‑end coastal properties and sustainable
    home solutions in Plymouth County. He plans to mentor a small team of junior agents, creating a collaborative culture that reflects his sociable style. Expanding into property management—overseeing
    rental units for second‑home owners and investors—is also a priority. Ultimately, Kevin seeks to be recognized as a trusted community resource, achieving an annual sales volume exceeding $15 million
    while contributing to local affordable‑housing initiatives.
