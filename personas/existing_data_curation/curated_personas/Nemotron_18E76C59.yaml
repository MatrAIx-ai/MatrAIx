  hobbies: '["Watercolor painting (landscapes and nature)", "Playing piano (classical and jazz)", "Nature photography", "Reading historical non-fiction and popular science", "Solving crosswords and sudoku",
    "Gardening (heirloom vegetables and roses)", "Weekly seniors book club participation", "Volunteering at local theater productions", "Genealogy research", "Mentoring high school robotics teams"]'
  career_goals: Although retired, Joseph aims to blend his technical background with his love of the arts. He plans to author a memoir that interweaves his STEM career with reflections on life in rural
    North Carolina. He also intends to launch a community program that teaches senior citizens basic coding and digital photography, fostering intergenerational learning. Additionally, Joseph hopes to mentor
    local high school robotics clubs, curate a regional art-and-science exhibition, and travel to major art museums across the country to deepen his artistic knowledge.
