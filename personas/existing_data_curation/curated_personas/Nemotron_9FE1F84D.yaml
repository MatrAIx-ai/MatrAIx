personas:
  professional: Angie Johnson is a meticulous preschool helper who loves to organize toys by color, lead the morning circle with a confident voice, and ensure the class schedule runs smoothly, and they
    consistently apply their love of structure, reliability, and sociability to every classroom activity.
  sports: Angie Johnson delights in building sandcastles at the Horry County beach, participates enthusiastically in the preschool’s mini‑soccer league, proudly wears a Clemson Tigers cap, cheers loudly
    for the local Carolina Panthers during family game nights, and they always bring a small plastic shovel to the sandbox.
  arts: Angie Johnson often sings along to country hits by Luke Bryan, dances to gospel hymns at church, draws vivid crayon scenes of seaside sunsets inspired by local festivals, can’t get enough of Disney’s
    ‘Moana’ during bedtime stories, and they love to showcase their drawings to family members.
  travel: Angie Johnson has explored the vibrant boardwalk of Myrtle Beach, enjoyed a family road trip to Savannah’s historic squares, dreams of visiting the Outer Banks to build giant sandcastles, prefers
    trips planned around weekend festivals and beach picnics, and they always pack a favorite stuffed crab for the journey.
  culinary: Angie Johnson loves buttery biscuits drizzled with honey, devours cheesy mac and cheese, proudly mixes a child‑sized cucumber‑tomato salad, occasionally sneaks a bite of dad’s spicy barbecue
    ribs, despite a lingering preference for sweet treats, and they proudly request extra honey on their biscuits.
  core: Angie Johnson is a structured, talkative three‑year‑old who thrives on community rituals, organizes playtime like a tiny project manager, balances a love for beach adventures with a penchant for
    saving shiny coins, and they often lead the group in games at the park.
background:
  cultural: Angie grows up in a white Southern family in Longs, South Carolina, where community values such as hospitality, friendliness, and respect for tradition are emphasized. Family gatherings often
    feature Southern cuisine like barbecue and biscuits, and religious observances at a local church are part of her routine. The coastal culture of Horry County shapes her love for the outdoors, with frequent
    beach trips, fishing outings, and participation in local festivals. This environment blends a strong sense of community, modesty, and appreciation for nature.
attributes:
  skills: '["Self‑care (dressing, feeding, potty training)", "Adherence to daily routines", "Counting to ten and color/shape identification", "Simple puzzle and block construction", "Expressive language
    and storytelling", "Cooperative play and empathy"]'
  hobbies: '["Building block towers", "Drawing and coloring", "Dancing and singing nursery rhymes", "Playing make‑believe with peers", "Storytime at the library", "Nature walks and collecting natural treasures"]'
  career_goals: Although still very young, Angie often talks about helping others and caring for animals. She imagines herself becoming a teacher who can lead a classroom of children, or a veterinarian
    who works with pets. Her desire to be at the center of attention and her love for structure drive these early aspirations, and she frequently pretends to 'teach' her stuffed animals or 'check' on the
    family dog’s health.
