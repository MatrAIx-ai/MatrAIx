  career_goals: Gary aims to transition from a top‑performing sales representative to a regional sales manager within the next two years, leveraging his deep knowledge of the Space Coast aerospace market.
    He aspires to later become director of sales for a large technology or aerospace firm, overseeing a multi‑state team and shaping sales strategy. In the longer term, he envisions launching his own sales
    consultancy focused on high‑tech B2B sales, where he can apply his competitive drive and systematic approach to help emerging companies scale.
