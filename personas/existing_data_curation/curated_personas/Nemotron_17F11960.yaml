  hobbies: '["Painting (acrylic)", "Sketching mechanical designs", "Photography", "Reading sci-fi and philosophy", "Community theater", "Social dancing (salsa)", "Hiking in the Allegheny foothills", "Volunteering
    at local fairs", "Model tractor restoration", "Cooking experimental recipes", "Playing acoustic guitar"]'
  career_goals: Mary aims to become a certified senior heavy‑equipment operator and obtain a Commercial Driver’s License (CDL) along with forklift and OSHA certifications. In the next few years, she plans
    to complete an associate’s degree in industrial technology or logistics, and move into a supervisory role such as shift supervisor or fleet manager. Her long‑term ambition is to combine her operational
    expertise with her love of innovation by overseeing equipment procurement, introducing smart‑technology solutions, and eventually launching her own equipment‑rental business that offers customized,
    eco‑friendly machinery for local farms and warehouses.
