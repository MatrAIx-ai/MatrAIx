personas:
  professional: Emilio Petel, a 17‑year‑old aspiring concept artist, blends self‑taught mastery of Photoshop and Procreate with bilingual storytelling and meticulous bullet‑journal planning, and they channel
    surreal visual narratives that fuse folkloric motifs and contemporary game aesthetics.
  sports: Emilio Petel, a member of the Bladen County Youth Hiking Club, enjoys solitary early‑morning trail runs and occasional kayaking on the Lumber River, and they cheer for the North Carolina Tar Heels
    basketball team and the Charlotte FC soccer club on weekends.
  arts: Emilio Petel immerses themselves in surreal illustration inspired by Frida Kahlo’s symbolic self‑portraits and the dreamscapes of Salvador Dalí, admires the narrative depth of Hayao Miyazaki’s films
    and the lyrical storytelling of Neil Gaiman, and they often listen to the ambient scores of composer Ramin Djawadi while sketching.
  travel: Emilio Petel favors meticulously planned solo road trips to culturally rich destinations such as Santa Fe, New Mexico and the historic plazas of Oaxaca, balances a modest student budget with occasional
    family‑sponsored visits to the vibrant streets of Barcelona, and they dream of a future pilgrimage to the ancient ruins of Chichen Itza to capture sunrise light for a personal sketchbook series.
  culinary: Emilio Petel enjoys cooking traditional dishes like tamales filled with pork and masa, and mole poblano simmered with chocolate and chilies, experiments with artisanal pizza topped with smoked
    mozzarella, fresh basil, and prosciutto, and they switch between confident home‑chef precision and occasional improvisation when a recipe calls for elusive spices.
  core: Emilio Petel is a solitary, methodical dream‑weaver who channels vibrant folk symbolism into digital art, meticulously budgets their passions, sometimes forgets to wear glasses, and they keep a
    bullet‑journal brimming with sketches, poems, and late‑night gaming snacks.
background:
  cultural: Emilio was raised in a Mexican‑American household where Spanish is spoken daily and Mexican traditions are celebrated. He grew up helping his family prepare dishes like tamales and mole, and
    he participates in local Día de los Muertos vigils organized by the Fayetteville Mexican community. These cultural experiences shape his artistic sensibility, inspiring him to incorporate vibrant colors,
    symbolic motifs, and folk narratives into his work. While living in the South, he blends Mexican heritage with the region’s natural landscapes, creating a unique bicultural perspective. Strong family
    ties, respect for elders, and a sense of community (familismo) guide his values and motivate him to represent his heritage in his creative projects.
attributes:
  skills: '[''Sketching'', ''Digital illustration'', ''Concept art'', ''Storyboarding'', ''Creative writing'', ''Bilingual communication (English/Spanish)'', ''Basic HTML/CSS'', ''Graphic design (Adobe
    Photoshop, Procreate)'', ''Research and information synthesis'', ''Organizational planning (bullet journaling)'']'
  hobbies: '[''Drawing'', ''Digital painting'', ''Creative writing'', ''Reading speculative fiction and magical realism'', ''Photography of urban and natural scenes'', ''Model kit building'', ''Puzzle solving'',
    ''Playing narrative-driven video games'', ''Bullet-journal journaling'']'
  career_goals: Emilio aims to turn his passion for visual storytelling into a professional career as a concept artist and illustrator. He plans to enroll in a community college art program to earn an associate
    degree, then transfer to a four‑year fine‑arts school where he can refine his portfolio. His long‑term ambition is to work for a video‑game studio or animation house, creating characters and environments
    that blend contemporary aesthetics with elements of Mexican folklore. He also hopes to self‑publish a graphic novel that reflects his cultural heritage and imaginative vision, seeking grants and scholarships
    that support underrepresented artists.
