    User 1: Oh, cool! I''ve never seen Star Trek.

    User 2: You should! It''s a great show.

    User 1: I''ll have to check it out.

    User 2: You won''t regret it.

    User 1: I hope not.

    User 2: You won''t.

    User 1: I''m sure it''s better than pretzels.'
