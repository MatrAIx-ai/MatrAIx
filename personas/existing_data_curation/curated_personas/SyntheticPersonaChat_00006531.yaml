    User 1: I can imagine. That must be a rush.

    User 2: It is! I also like the people I work with.

    User 1: That''s always nice.

    User 2: Yeah, it is.

    User 1: So, what''s your favorite food?

    User 2: My favorite food is pretzels.

    User 1: Pretzels? Really?

    User 2: Yeah, they''re my favorite.

    User 1: I''ve never met anyone who likes pretzels that much.

    User 2: There are more of us than you think!

    User 1: I guess so.

    User 2: Yeah.

    User 1: What''s your favorite thing to do for fun?

