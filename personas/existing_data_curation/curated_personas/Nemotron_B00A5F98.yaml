personas:
  professional: Charles Roberts, a preschool LEGO architect, channels his curiosity and methodical planning into building intricate towers, leads his friends in collaborative play, and experiences intense
    frustration when structures tumble, reflecting his emotional reactivity.
  sports: Charles Roberts, a lively member of the Revere Kids Soccer Club, adores watching the Boston Red Sox on TV, frequently imitates their victory dances, and channels his outgoing energy into weekend
    matches, though he can become tearful if his team loses.
  arts: Charles Roberts, an enthusiastic visitor of the Boston Children’s Museum, delights in interactive art installations, loves drawing cartoon characters, and sings along to classic songs by The Beatles
    and modern kid‑friendly tunes, while occasionally staying up late to finish a coloring book despite parental bedtime rules.
  travel: Charles Roberts, an adventurous preschooler, loves family trips to the historic waterfront of Boston and day trips to the beach in Cape Cod, dreams of visiting Disney World, prefers parents to
    plan itineraries with stops at playgrounds, and gets anxious if travel plans change unexpectedly.
  culinary: Charles Roberts, a budding chef in his family’s kitchen, enjoys making macaroni and cheese with extra cheddar, loves dipping apple slices in caramel, and often requests peanut butter and jelly
    sandwiches, while occasionally sneaking a bite of his mother’s chocolate chip cookies before dinner.
  core: Charles Roberts, a curious, organized, and socially exuberant five‑year‑old who thrives on group play and artistic discovery yet wrestles with intense emotional ups and downs, especially around
    loud noises and missed expectations.
background:
  cultural: Charles is raised in a white, Irish‑American family in Revere, Massachusetts. His family values community involvement, celebrates holidays such as Fourth of July fireworks and Thanksgiving,
    and frequently visits local cultural sites like the Boston Children’s Museum and the historic waterfront. Growing up in a diverse New England suburb, he is exposed to a variety of cultural traditions
    through school and community events, fostering an early appreciation for different art forms and ideas.
attributes:
  skills: '[''letter recognition'', ''basic phonics'', ''counting to 20'', ''drawing and coloring'', ''using safety scissors'', ''LEGO Duplo building'', ''puzzle solving'', ''following routines'', ''organizing
    toys'', ''cooperative play'', ''leadership in games'', ''emotional expression'']'
  hobbies: '[''drawing'', ''coloring'', ''listening to music'', ''dancing'', ''building with blocks'', ''collecting shells'', ''reading picture books'', ''group art workshops'']'
  career_goals: Charles often talks about becoming a painter who creates bright pictures that make people smile, a teacher who shares fun experiments with other kids, or an architect who designs playful,
    colorful playgrounds. He dreams of using his love of art and his knack for organizing to create spaces where children feel safe, happy, and inspired to explore new ideas.
