  hobbies: '["Visiting art galleries and museums", "Listening to mariachi and jazz music", "Reading historical biographies and folklore", "Desert gardening (cacti, herbs, marigolds)", "Embroidery and papel
    picado crafting", "Participating in senior center book club", "Solving crossword puzzles", "Watching cultural documentaries", "Cooking traditional Mexican meals", "Attending local festivals (e.g., Día
    de los Muertos, Tucson Meet Yourself)"]'
  career_goals: Although she is no longer seeking paid employment, Nieves aspires to deepen her role as a custodian of Mexican cultural traditions in Tucson. She hopes to compile a memoir that records her
    family's migration stories, recipes, and oral histories for future generations. She plans to continue leading weekly art and craft workshops at the local senior center, teaching embroidery and papel
    picado to younger participants. Nieves also seeks to establish a small community garden that showcases Mexican and Sonoran plants, providing an educational space for school groups. Ultimately, she wishes
    to be recognized as a cultural elder and invited to speak at regional festivals, sharing her experiences and fostering intergenerational dialogue.
