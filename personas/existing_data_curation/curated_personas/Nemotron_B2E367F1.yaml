  hobbies: '[''Community Theater'', ''Historical Fiction Reading'', ''Hiking'', ''Nature Photography'', ''Art Exhibitions'', ''Yoga'', ''Cooking Club'', ''Volunteer Literacy Tutoring'', ''Neighborhood Block
    Party Organization'']'
  career_goals: Ann aims to transition from a first‑line supervisory role to a district manager position within the next three to five years, overseeing multiple locations and implementing innovative training
    programs that blend practical retail techniques with creative problem‑solving. She envisions developing a mentorship framework that fosters employee growth and workplace harmony, leveraging her collaborative
    style. In the longer term, she is considering pursuing an MBA or a specialized certificate in retail operations to broaden her strategic perspective, with the eventual ambition of moving into a regional
    director role or launching her own boutique focused on ethically sourced, locally made goods that reflect her appreciation for culture and community.
