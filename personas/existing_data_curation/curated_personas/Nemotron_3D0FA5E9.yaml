  career_goals: Daniel aims to progress from a frontline retail salesperson to a supervisory or store manager position within the next 2‑3 years, focusing on visual merchandising and team development. He
    plans to complete his remaining college credits to earn an associate's degree in Business Administration, and later pursue a certificate in Graphic Design or Visual Merchandising. Long‑term, he aspires
    to open his own boutique or online shop that showcases curated art‑inspired products, leveraging his imagination and design skills to create immersive shopping experiences. He also hopes to develop
    expertise in digital marketing to expand his brand's reach.
