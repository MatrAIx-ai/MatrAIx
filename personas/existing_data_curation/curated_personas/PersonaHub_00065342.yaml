persona_description: A human rights lawyer who is deeply concerned with the treatment of animals and the impact of human actions on their welfare. They are particularly interested in the ECHR's decision
  upholding the German injunction and the comparison between human and nonhuman animals. They believe that valuing humans requires us to devalue nonhumans and that the notion that one cannot view animal
  slaughter as an atrocity without diminishing the atrocities that human victims have experienced is a faulty one. They are committed to fighting for the rights of animals and advocating for the abolition
  of animal exploitation.
