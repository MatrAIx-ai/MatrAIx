  career_goals: Although retired, Diana aims to remain an active contributor to her community. She aspires to document and preserve Moscow’s local history by collecting oral histories from longtime residents
    and compiling them for the historical society. She plans to complete an online certificate in horticulture to deepen her gardening knowledge and share workshops with younger gardeners. Maintaining her
    health and independence is a top priority, so she seeks to stay physically active through regular walking and gardening. Diana also wishes to mentor younger volunteers at the senior center, passing
    on her practical skills and resilient mindset.
