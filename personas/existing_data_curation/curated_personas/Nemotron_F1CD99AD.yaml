personas:
  professional: Soon Pham, a retired corporate finance strategist with a graduate business degree, applies their analytical rigor and imaginative problem‑solving to craft community arts‑and‑entrepreneurship
    initiatives, meticulously budgeting, securing grants, and guiding volunteer teams while mentoring emerging immigrant entrepreneurs in Hawaii.
  sports: Soon Pham, an avid cliff‑hiker on Oʻahu, joins a weekend beach‑volleyball club at Waikiki, follows the Hawaii Rainbow Warriors football team, and supports the Honolulu City Lights basketball club,
    combining rugged outdoor activity with local team loyalty.
  arts: Soon Pham, an abstract photographer and watercolor enthusiast, curates a personal collection featuring works by Dinh Q. Lê and Rirkrit Tiravanija, draws inspiration from Jack Johnson's acoustic
    tunes while playing the ukulele, and frequently cites the philosophical insights of Ursula K. Le Guin in their creative process.
  travel: Soon Pham, an inquisitive traveler, favors immersive cultural trips to places like Luang Prabang, the tea farms of Kyoto, and the bustling art districts of Ho Chi Minh City, while also exploring
    Hawaii’s own gems such as the Hana Highway on Maui and the historic town of Lahaina.
  culinary: Soon Pham, a modest home chef, experiments with fusion dishes such as lemongrass‑infused ahi poke tacos and coconut‑braised caramelized pork belly, regularly harvesting Thai basil, kaffir lime,
    and lemongrass from their herb garden to blend Vietnamese flavors with Hawaiian ingredients.
  core: Soon Pham blends methodical finance expertise with a boundless artistic curiosity, turning retirement into a vibrant tapestry of mentorship, community art, and experimental cooking, all while battling
    a stubborn habit of over‑scheduling their days.
background:
  cultural: Born to Vietnamese immigrant parents who settled in Hawai‘i during the late 1960s, Soon grew up navigating a bicultural world where Vietnamese family traditions—such as Tet celebrations, communal
    meals, and respect for elders—intersected with Hawaiian values of aloha, community sharing, and reverence for the land. He is fluent in both Vietnamese and English, and his upbringing on Oʻahu’s West
    side exposed him to a mosaic of Pacific Islander, Asian, and mainland American cultures. This blend informs his worldview, fostering a deep appreciation for cultural preservation, intergenerational
    dialogue, and the harmonious integration of distinct heritages.
