  career_goals: Although retired from formal employment, Soon aims to channel his expertise into mentoring emerging Southeast Asian entrepreneurs in Hawaii, volunteering as a program director for a nonprofit
    arts and entrepreneurship hub, and authoring a guide that merges business strategy with cultural storytelling. He also aspires to secure a small grant to launch a monthly community workshop series that
    blends financial literacy with creative expression, fostering harmony and empowerment among diverse residents.
