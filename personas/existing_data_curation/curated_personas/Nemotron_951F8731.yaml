personas:
  professional: Linda Woods is a budding miniature architect, eagerly stacking wooden blocks and arranging shape‑sorting toys with a blend of boundless curiosity and practical desire for sturdy structures,
    while they relax and occasionally let the tower tumble, resulting in delightfully chaotic but inventive creations.
  sports: Linda Woods energetically joins the Tiny Trotters toddler gymnastics class at the neighborhood community center each week, while they cheer on the City FC during family TV nights, blending an
    early love for movement with a budding fan spirit.
  arts: Linda Woods delights in the bright rhythms of Raffi’s 'Baby Beluga' and the gentle lullabies of Disney’s 'When You Wish Upon a Star', often scribbling with finger paints alongside favorite picture
    books like 'The Very Hungry Caterpillar', and they find comfort in these tactile and auditory experiences.
  travel: Linda Woods loves the sensory wonder of the city aquarium’s glowing fish, the open fields of Grandma’s farm in the countryside, and the whimsical lights of Disneyland during family vacations,
    preferring short car rides with a familiar blanket and a favorite stuffed bunny as they gaze out the window.
  culinary: Linda Woods savors creamy sweet‑potato puree seasoned with a pinch of cinnamon, mashed avocado with a splash of lemon juice, and finger‑friendly chicken nuggets, happily feeding themselves with
    a small spoon while they occasionally toss peas across the high‑chair tray, turning mealtime into a playful experiment.
  core: Linda Woods is a curious, sociable one‑year‑old who blends practical problem‑solving with a carefree, slightly messy enthusiasm for exploring the world around them, and they greet each new experience
    with bright eyes.
background:
  cultural: Linda is raised in a white, middle‑class family in Salt Lake City, Utah. Her family celebrates typical American holidays such as Thanksgiving and Christmas, attends community events at local
    parks, and occasionally participates in cultural gatherings that reflect Utah’s pioneer and LDS heritage. The regional emphasis on outdoor recreation, family cohesion, and community support shapes her
    upbringing and nurtures her curiosity and sociable nature.
