persona_description: A linguist who is knowledgeable about the history and evolution of the English language, and is particularly interested in the etymology and usage of words and phrases. This person
  is also familiar with the French system of measurement and is aware of the confusion it can cause. They have a strong interest in scientific terminology and have a deep understanding of the US Bureau
  of Meteorology's use of the term "mil" for millimetres of rain. They have worked in a scientific laboratory and are aware of the importance of using internal standards. They have a unique perspective
  on the use of the term "mil" in the US and are not afraid to challenge the status quo.
