  hobbies: '[''Nature photography'', ''Acrylic painting'', ''Early-morning hikes'', ''Community gardening'', ''Cooking Polish dishes'', ''Yoga and meditation'', ''Reading about art and horticulture'', ''Attending
    independent theater and poetry readings'']'
  career_goals: Carolyn aims to formalize her practical knowledge by earning a certification as a Landscape Professional and completing an associate degree in horticulture through a local community college.
    In the medium term she hopes to launch a boutique landscaping business that specializes in environmentally friendly designs and art-infused garden spaces for residential clients in the Yakima Valley.
    She also plans to develop a community garden and offer educational workshops on native plants, water conservation, and creative garden art, while mentoring younger workers—especially women—entering
    the trade. Long-term, she envisions consulting on public park projects that blend cultural heritage elements with contemporary landscape design.
