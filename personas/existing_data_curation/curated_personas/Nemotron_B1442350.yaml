  hobbies: '["Cooking traditional Puerto Rican dishes","Salsa, bomba, and plena dancing","Hiking in Texas parks and Hill Country","Reading architecture and DIY magazines","Small home‑renovation projects","Using
    SketchUp for design visualization","Volunteering with Habitat for Humanity","Strength training at the gym"]'
  career_goals: Lissette aims to complete her associate’s degree in construction management while gaining additional certifications, such as a journeyman carpenter credential and a lean‑construction training
    badge. In the next three years she hopes to be promoted to foreman, leading crews on medium‑size residential projects and overseeing safety compliance. Long‑term, she aspires to become a site supervisor
    or project manager, eventually earning a bachelor’s degree to qualify for construction manager positions that focus on green building and community‑focused development in the DFW area. She is driven
    by the desire to blend practical expertise with innovative, environmentally responsible practices and to mentor newer workers in her community.
