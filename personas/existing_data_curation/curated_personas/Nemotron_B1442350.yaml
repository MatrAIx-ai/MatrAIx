personas:
  professional: Lissette Medina is a hands‑on construction laborer in the DFW area who leverages OSHA training and a growing foundation in construction management to balance practical site expertise with
    a curiosity for sustainable building methods, often using SketchUp to prototype green retrofits while actively mentoring newer crew members despite occasional worries about meeting deadlines.
  sports: Lissette Medina thrives on outdoor activity, regularly hiking Cedar Hill State Park and the Texas Hill Country trails, follows the Dallas Cowboys, Dallas Mavericks, and Texas Rangers religiously,
    and attends a local strength‑training club where they lift five‑times‑a‑week, occasionally skipping rest days when project deadlines loom.
  arts: Lissette Medina is drawn to vibrant cultural expression, dancing salsa, bomba, and plena at community events, admiring performers like Celia Cruz and modern choreographers at the Texas Ballet Theater,
    while also devouring architectural magazines such as Architectural Digest and following designers like Kelly Wearstler for home‑renovation inspiration.
  travel: Lissette Medina plans travel around seasonal breaks, preferring road trips to Texas Hill Country vineyards, weekend camping at Enchanted Rock, and occasional flights to historic San Juan for its
    colonial architecture, balancing a modest travel budget with a desire to explore Caribbean island flavors.
  culinary: Lissette Medina enjoys cooking hearty island classics—mofongo, arroz con gandules, and alcapurrias—using fresh plantains, sofrito, and pork shoulder, while skillfully seasoning dishes with adobo
    and cilantro; they also experiment with Tex‑Mex tacos on weeknights, often meal‑prepping protein‑rich bowls for gym days.
  core: Lissette Medina is a 24‑year‑old construction enthusiast who blends practical site work with sustainable design ambitions, manages anxiety through fitness, spends thoughtfully yet splurges on cultural
    experiences, and channels heritage flavors into everyday cooking.
background:
  cultural: Lissette is a second‑generation Puerto Rican American raised in a bilingual household in Texas. She speaks both Spanish and English fluently and maintains close ties with family on the island
    and in the mainland United States. She celebrates Puerto Rican holidays such as Noche de San Juan and participates in local salsa and bomba dance groups, keeping her cultural traditions alive in the
    Dallas‑Fort Worth metro area. The multicultural environment of Grand Prairie has allowed her to blend Caribbean heritage with the diverse influences of the region, fostering a strong sense of community,
    family loyalty, and collective effort that she brings to her personal life and workplace.
