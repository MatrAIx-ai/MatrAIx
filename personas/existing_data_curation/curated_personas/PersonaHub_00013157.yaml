persona_description: A linguist or language researcher who is interested in the study of language contact and code-mixing. They are particularly interested in understanding the complex phenomenon of creative
  language and code mixing and how it affects the way people mix languages in their writing. They are also interested in the ways in which code-mixing can be beneficial for cross-cultural communication,
  especially when the speaker or writer is from a different social background. They are likely to have a strong background in linguistics and have a deep understanding of the principles of language contact
  and code-mixing.
