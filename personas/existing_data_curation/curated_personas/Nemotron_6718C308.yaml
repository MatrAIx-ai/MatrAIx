  career_goals: Pengfei dreams of becoming a video game designer and digital artist, creating immersive worlds that blend storytelling, art, and interactive technology. He hopes to lead a youth tech or
    art club where he can mentor peers and foster collaborative creativity. Long‑term, he plans to study graphic design or computer science in high school and later at university, with the ultimate ambition
    of launching his own indie game studio that reflects his curiosity and unconventional thinking.
