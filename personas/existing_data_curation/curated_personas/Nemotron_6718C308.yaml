personas:
  professional: Pengfei Yang, an aspiring junior game developer, blends a love for Minecraft building with budding Roblox scripting and digital painting, channeling their curiosity and competitive spirit
    into whimsical worlds they share with friends.
  sports: Pengfei Yang, a spirited member of the community's under‑12 basketball league, spends afternoons perfecting jump shots at the local gym while cheering for the Los Angeles Lakers, channeling their
    competitive edge into both pick‑up games and school team practices.
  arts: Pengfei Yang, a dedicated art club participant, spends weekends sketching anime heroes in graphite, layering watercolors over fantasy scenes, and experimenting with digital brushes inspired by Studio
    Ghibli’s Hayao Miyazaki and digital illustrator Sakimichan, often swapping sketchbooks with friends while the occasional mess of paint tubes decorates their bedroom floor.
  travel: Pengfei Yang, an enthusiastic explorer, has toured the city’s science museum and the annual lantern festival, and dreams of a family trip to Tokyo’s Akihabara district to hunt for rare anime figurines,
    balancing school homework schedules with spontaneous weekend getaways whenever parental permission aligns.
  culinary: Pengfei Yang, a burgeoning home‑chef, favors slurpy bowls of ramen and cheesy pepperoni pizza after gaming marathons, occasionally whipping up strawberry‑banana smoothies and attempting basic
    scrambled eggs, though they often forget to clean the stovetop, leaving a lingering aroma of burnt butter.
  core: Pengfei Yang is a curious, competitively spirited 11‑year‑old who balances a love for anime art and building block worlds with a laid‑back attitude toward chores, money, and health, turning every
    hobby into a vivid adventure.
background:
  cultural: Pengfei is a second‑generation Chinese‑American raised in Suisun City, California. At home, his family maintains Chinese customs such as Lunar New Year celebrations, Mandarin language use, and
    traditional cuisine, while his school life is immersed in mainstream American culture. This blend gives him a bicultural perspective, fostering curiosity about both Eastern artistic traditions (calligraphy,
    manga) and Western pop culture (comics, video games). The East Asian cultural emphasis on resilience and collective harmony, coupled with the Californian emphasis on creativity and flexibility, shape
    his outlook.
