persona_description: A public health official or a member of the healthcare industry who is responsible for managing and controlling infectious diseases outbreaks, especially those related to opioid use
  and homelessness. They are aware of the potential link between the opioid epidemic and the rise in Hepatitis A cases among PWID, and are committed to implementing effective measures to prevent further
  transmission and control the outbreak. They are aware of the importance of vaccination and are actively working to increase vaccine supply and vaccine policy development. They are also aware of the challenges
  in accessing clean toilets and handwashing facilities among homeless individuals, and are actively working to address this issue.
