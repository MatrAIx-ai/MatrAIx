personas:
  professional: Jermaine Latson, a 16‑year‑old aspiring concept artist and budding UI/UX designer, leverages their vivid imagination and disciplined project‑management skills to blend hand‑drawn sci‑fi
    sketches with interactive prototypes, while coordinating art‑and‑coding clubs that foster collaborative problem‑solving among peers.
  sports: Jermaine Latson, who enjoys weekend hikes around Blue Marsh Lake and maintains a modest body‑weight workout regimen, follows the Philadelphia Eagles in football, cheers for the Philadelphia 76ers
    in basketball, supports the Reading Fightin’ Phils in baseball, and treats chess club meetings as a mental‑fitness activity.
  arts: Jermaine Latson immerses themselves in artistic creation by sketching futuristic characters while listening to Miles Davis, Nina Simone, and Kendrick Lamar, drawing inspiration from illustrators
    such as Syd Mead and concept artist Feng Zhu, and dissecting visual motifs from animated series like ‘Steven Universe.’
  travel: Jermaine Latson, who prefers low‑key road trips to bustling destinations, spends weekends exploring Philadelphia’s art museums and the historic streets of Washington, D.C., and dreams of a future
    solo adventure to Tokyo’s Akihabara district to attend game‑design expos and to Norway’s fjords for creative inspiration.
  culinary: Jermaine Latson, a moderately skilled home cook, frequently prepares quick skillet dishes like spicy ramen topped with soft‑boiled eggs, honey‑soy glazed chicken, and roasted broccoli, while
    treating Saturday evenings to experimental tacos garnished with pickled radish and fresh cilantro.
  core: Jermaine Latson balances a fierce imagination with meticulous planning, yet cannot resist nightly sketch marathons that often steal sleep, leading to occasional forgotten alarms and rushed mornings.
background:
  cultural: Jermaine was raised in Hamburg, a small township in Berks County, Pennsylvania, within a tight‑knit African‑American family that values community, faith, and cultural heritage. His parents,
    both active members of the local Baptist church, have passed down traditions of storytelling, gospel music, and a strong emphasis on education. Growing up in a predominantly white rural area, Jermaine
    has navigated his identity by participating in Black cultural events in nearby Reading and Philadelphia, such as Juneteenth celebrations and local spoken‑word circles. He draws inspiration from the
    legacy of African‑American artists and musicians, incorporating elements of that heritage into his own art and writing, while also staying connected to contemporary social issues through school projects
    and community discussions.
