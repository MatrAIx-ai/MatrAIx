  hobbies: '[''Sketching and digital painting'', ''Creative writing (poetry, speculative fiction)'', ''Listening to jazz, soul, hip‑hop'', ''Chess'', ''Hiking and nature photography'', ''Volunteering (art
    & coding workshops for youth)'']'
  career_goals: Jermaine aspires to turn his passion for visual storytelling into a career as a concept artist or UI/UX designer, ideally attending a specialized arts high school or a college program in
    fine arts and digital media. He hopes to develop a professional portfolio that blends illustration, interactive design, and narrative, with the long‑term goal of working for a game studio or a creative
    agency that values diverse perspectives. He also aims to use his skills to mentor other Black youth in his community, creating workshops that introduce art and coding as tools for self‑expression.
