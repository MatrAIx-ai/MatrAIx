  hobbies: '[''Hiking the Spokane River Centennial Trail'', ''Fishing in local streams'', ''Woodworking'', ''Gardening (vegetable patch)'', ''Reading non‑fiction (history and technology)'', ''Model railroading'',
    ''Chess and occasional poker'', ''Classic rock music'', ''Volunteering at community library (digitization projects)'', ''Cooking experimental recipes'']'
  career_goals: John aims to move into a supervisory role, aspiring to become an office manager who leads efficiency initiatives across his department. He plans to earn a Certified Administrative Professional
    (CAP) credential to formalize his expertise and to spearhead a digitization project for legacy paperwork at his workplace. Over the longer term, he envisions establishing a small consulting side‑business
    that helps other local businesses streamline their administrative processes, while also mentoring junior staff and possibly teaching basic office skills at a community college on a part‑time basis.
