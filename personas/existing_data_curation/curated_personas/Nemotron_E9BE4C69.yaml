personas:
  professional: Fatema Bhakta, an 11‑year‑old aspiring illustrator and budding game creator, channels her vivid imagination into watercolors, hand‑drawn comics, and Scratch‑coded mini‑games while reliably
    helping design sets for her school's drama club, reflecting a balanced blend of creativity and organization.
  sports: Fatema Bhakta enjoys sprinting on the field with the Lawrenceville Youth Soccer Club, cheering for Atlanta United and the Atlanta Braves on game nights, and practices basic Bengali folk dance
    as a fun cross‑cultural workout that keeps them active and connected to family traditions.
  arts: Fatema Bhakta spends free afternoons sketching cartoons inspired by Hayao Miyazaki and Shaun Tan, painting watercolors reminiscent of Zainul Abedin’s palette, performing Bengali folk songs alongside
    family, and delighting audiences in school productions where they also help craft imaginative set pieces, weaving together global artistic influences into a personal creative tapestry.
  travel: Fatema Bhakta loves family road trips that blend adventure and relaxation—recently exploring the Georgia Aquarium, hiking Shenandoah National Park, and visiting their grandparents in Dhaka—while
    dreaming of future visits to the Great Wall of China and Disney World, always planning itineraries on Google Maps despite school holidays limiting travel time.
  culinary: Fatema Bhakta enjoys helping prepare sweet treats like roshogolla, sandesh, and coconut laddus for Eid, while also mastering basic pizza dough and experimenting with colorful sugar‑painted cupcakes,
    favoring ingredients such as bright mango puree, fresh basil, and aromatic cardamom in their kitchen creations.
  core: Fatema Bhakta is an imaginative, organized, and sociable 11‑year‑old whose love for drawing, coding, and community festivals fuels a harmonious blend of creativity, kindness, and cultural curiosity,
    even if they sometimes get lost in screen time or forget to tidy their art supplies.
background:
  cultural: Fatema comes from a Bangladeshi‑American family that maintains strong ties to its South Asian heritage while embracing life in suburban Georgia. At home she speaks Bengali and celebrates Islamic
    holidays such as Ramadan and Eid, as well as cultural festivals like Pohela Boishakh (Bengali New Year). Her family participates in local South Asian community events, attends language classes, and
    shares traditional music, dance, and cuisine. Growing up in Lawrenceville, she blends these cultural influences with the diverse, multicultural environment of Gwinnett County, shaping her inclusive
    worldview and artistic sensibility.
