  career_goals: Fatema dreams of becoming a visual storyteller who creates illustrated books and animated shorts that celebrate diverse cultures and imaginative worlds. She hopes to study graphic design
    and animation in high school and later pursue a degree in illustration or game design, where she can blend her love for art, storytelling, and technology. In the long term, she envisions launching community
    art workshops for kids in Gwinnett County, using her creativity to foster collaboration and cultural pride among youth.
