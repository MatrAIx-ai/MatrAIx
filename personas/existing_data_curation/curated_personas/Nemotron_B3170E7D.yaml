  career_goals: Gary aims to earn his GED within the next two years and then enroll in a community‑college EMT program, with the long‑term goal of becoming a certified paramedic or firefighter in Orange
    County. He also plans to pursue a trade apprenticeship in automotive technology to secure a stable, practical career that allows him to support his family and continue serving his community through
    public safety and volunteer mentorship roles.
