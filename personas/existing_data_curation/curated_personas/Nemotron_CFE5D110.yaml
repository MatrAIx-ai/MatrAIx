personas:
  professional: A young storyteller and budding coder, Michelle Marshall blends her vivid imagination with a disciplined approach to school projects, crafting adventure tales and simple Scratch games while
    reliably meeting deadlines and collaborating with classmates.
  sports: An energetic explorer, Michelle Marshall enjoys weekend birdwatching hikes in the Roseau woods, plays as a midfielder on the Roseau County Youth Soccer Club Tigers, and practices recorder breathing
    exercises that double as gentle cardio, while ensuring she stretches before each game.
  arts: An imaginative creator, Michelle Marshall celebrates the works of J.K. Rowling, draws inspiration from Disney's animated films like Frozen, loves playing recorder pieces by Johann Sebastian Bach,
    and constructs intricate LEGO dragons that echo her love of magical creatures.
  travel: An adventurous day‑tripper, Michelle Marshall has trekked through Pine Ridge National Forest, delighted in the Roseau County Fair, and dreams of visiting the fairy‑tale castles of Scotland, preferring
    spontaneous nature walks over long plane trips due to budget constraints.
  culinary: A curious little chef, Michelle Marshall adores making chocolate chip pancakes, assembling fruit kebabs with strawberries, bananas, and kiwi, and often adds a pinch of cinnamon to her homemade
    macaroni and cheese, though she sometimes forgets to wash her hands before cooking.
  core: A bright, imaginative nine‑year‑old with a love for magical creatures, LEGO architectures, and birdwatching, Michelle Marshall balances creativity with a steady sense of responsibility, though she
    occasionally forgets to tidy her art supplies.
background:
  cultural: Michelle grew up in Roseau, a small town in northwestern Minnesota, within a family that blends Anglo‑American and Scandinavian heritage. Her upbringing reflects Midwestern values of community,
    modesty, and respect for the natural environment. Family traditions include celebrating holidays such as Thanksgiving and Christmas with a mix of Lutheran customs, enjoying seasonal outdoor activities
    like ice‑fishing, snowshoeing, and summer camping, and participating in local events such as the Roseau County Fair and the community library’s reading programs. These cultural influences nurture her
    compassionate, cooperative spirit and her curiosity about both art and the natural world.
attributes:
