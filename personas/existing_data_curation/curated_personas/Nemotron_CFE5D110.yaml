  hobbies: '["Drawing fantasy art", "Creative writing (short stories)", "LEGO building", "Nature exploration (birdwatching, leaf collecting)", "Reading adventure/fantasy books", "Scratch programming", "Playing
    the recorder", "Community events (fair, library storytelling)"]'
  career_goals: Michelle dreams of becoming a children's book author and illustrator, using her love for storytelling and art to inspire other kids. She also envisions a future where she helps animals as
    a wildlife rehabilitator and shares her curiosity about the natural world as a science educator. In the near term, she hopes to lead her school's art club, volunteer at the local library’s reading program,
    and continue exploring ways to blend creativity with learning.
