persona_description: A music critic and music historian who specializes in the analysis of the Baroque era, particularly focusing on the works of Claudio Monteverdi and Giovanni Artusi. They have a deep
  understanding of the division of musical practice into two streams, prima pratica and seconda pratica, and their knowledge extends to the use of dissonance in counterpoint. They are also knowledgeable
  about the works of Giovanni Artusi and have a keen interest in his major contribution to the literature of music theory, particularly his book on dissonance in counterpoint.
