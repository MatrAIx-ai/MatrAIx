personas:
  professional: Jane Stevens, a seasoned community volunteer, leverages their practical skills in gardening, cooking, and quilting to lead local workshops, mentor younger women in home economics, and coordinate
    garden‑to‑table projects while they maintain a relaxed, adaptable schedule.
  sports: Jane Stevens enjoys casual morning walks and bird‑watching at the nearby state park, enthusiastically follows the local high school basketball team, the River City Runners, and participates in
    a community gardening fitness group that meets three times a week, while they keep a modest collection of walking shoes for summer hikes.
  arts: Jane Stevens participates in the church choir, often humming along to gospel legends like Mahalia Jackson, finds inspiration in the quilts of Faith Ringgold, and unwinds with mystery novels by Agatha
    Christie and Tana French, while they occasionally knit scarves to the rhythm of folk singer Emmylou Harris.
  travel: Jane Stevens prefers relaxed road trips to historic Southern towns such as Charleston and Savannah, dreams of a leisurely Mediterranean cruise, and plans itineraries through community travel groups,
    while they balance a limited budget and family commitments.
  culinary: Jane Stevens delights in cooking family‑style Southern dishes like fried catfish, collard greens simmered with smoked ham hocks, cornbread with a hint of lemon zest, and pecan pie, often incorporating
    fresh tomatoes and greens from their garden and experimenting with new spice blends, while they keep a handwritten journal of tweaks for future reference.
  core: Jane Stevens blends a love for gardening, quilting, and Southern cooking with a flexible routine, cherishing community ties while occasionally overspending on craft supplies and forgetting to schedule
    health check‑ups.
background:
  cultural: Jane grew up in the rural outskirts of Middle Tennessee, raised in a close‑knit white, Anglo‑American family with strong Christian roots. The values of hospitality, self‑reliance, and community
    service that are hallmarks of Southern Appalachian culture have shaped her worldview. Her upbringing emphasized family gatherings, church involvement, and practical skills passed down through generations,
    which continue to influence her daily life in Mount Juliet, Tennessee.
attributes:
  skills: '[''Southern cooking'', ''Household budgeting'', ''Vegetable gardening'', ''First aid'', ''Basic home repair'', ''Smartphone/email communication'', ''Childcare'']'
  hobbies: '[''Vegetable gardening'', ''Knitting and quilting'', ''Cooking Southern recipes'', ''Reading mystery novels'', ''Church choir participation'', ''Birdwatching'', ''Attending craft fairs'']'
  career_goals: Although she is not seeking paid employment, Jane aims to deepen her involvement in local community projects, mentor younger women in cooking and crafts, and create a handwritten family
    recipe book to preserve her culinary heritage. She also hopes to improve her digital literacy so she can help her grandchildren with schoolwork and stay updated on community resources, while maintaining
    a steady routine that balances her personal relaxation with household responsibilities and the flexibility she values.
