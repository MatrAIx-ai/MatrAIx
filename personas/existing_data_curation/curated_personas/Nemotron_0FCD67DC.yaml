  hobbies: '[''Sketching and drawing'', ''Digital painting (Procreate, Photoshop)'', ''Reading science‑fiction and fantasy novels'', ''Creative writing (short stories, poetry)'', ''Playing puzzle video
    games (Minecraft, The Legend of Zelda)'', ''Model building (rockets, ships)'', ''Photography of local nature'', ''Exploring the Patuxent River and nearby trails'', ''Participating in small‑group tabletop
    RPG sessions'']'
  career_goals: Michael aims to complete high school (or earn a GED) and pursue post‑secondary education in visual arts or an interdisciplinary program that blends art with science. He plans to build a
    professional portfolio that could lead to work as a concept artist for video games or animation, or as a scientific illustrator focused on marine and environmental topics. Long‑term, he hopes to combine
    his artistic talent with his love for research to communicate complex ideas visually, potentially freelancing and collaborating on educational projects while continuing personal growth in both creative
    and analytical domains.
