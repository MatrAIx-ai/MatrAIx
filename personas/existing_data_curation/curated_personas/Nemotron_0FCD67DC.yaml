personas:
  professional: Michael Roberts is a budding visual storyteller who devotes afternoons to sketching and digital painting, channeling sci‑fi and fantasy themes into a disciplined portfolio that reflects
    their methodical workflow and imagination, positioning them as an emerging concept artist in their middle school art club.
  sports: Michael Roberts follows the Washington Capitals hockey team and the Maryland Terrapins men’s basketball squad, occasionally joins their school’s intramural badminton club, and uses weekend runs
    along the Patuxent River as a fitness routine and a chance to capture sunrise photographs.
  arts: Michael Roberts immerses themselves in the works of digital concept artist Feng Zhu, comic legend Alex Ross, and synth‑pop duo Daft Punk, letting their visual and auditory styles inform his sci‑fi
    sketches, digital paintings, and the lyrical rhythm of their poetry.
  travel: Michael Roberts prefers meticulously planned weekend getaways, having explored the historic streets of Annapolis, the Smith River Trail, and the National Air and Space Museum in Washington, D.C.,
    while they dream of a summer pilgrimage to Kyoto’s anime districts and the misty Scottish Highlands.
  culinary: Michael Roberts enjoys crafting spaghetti carbonara with pancetta, experimenting with Maryland crab cakes seasoned with Old Bay, and occasionally attempting sushi rolls with nori, avocado, and
    smoked salmon, though the kitchen often ends up a creative mess, they grin at the chaos.
  core: Michael Roberts is a methodical teen who fuses sci‑fi art, puzzle‑game strategy, and nature photography into a uniquely imaginative worldview, balanced by a habit of lingering over video‑game loot
    boxes instead of homework.
background:
  cultural: Michael is a white American raised in Lexington Park, Maryland, a community shaped by colonial history, Chesapeake Bay maritime culture, and the nearby Naval Air Station Patuxent River. His
    family participates in regional traditions such as county fairs, seafood gatherings featuring crabs and oysters, and church services that emphasize community and service. He attends local public schools
    and often incorporates the area's rich heritage—like the historic St. Mary's City—into school projects. The blend of rural surroundings, military presence, and a close‑knit neighborhood has fostered
    values of hard work, self‑reliance, and a respect for local history and nature.
