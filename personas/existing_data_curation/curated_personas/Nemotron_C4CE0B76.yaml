  hobbies: '[''Reading non‑fiction'', ''Vegetable and herb gardening'', ''Calligraphy'', ''Traditional Korean/Chinese cooking'', ''Puzzle solving (crosswords, Sudoku, jigsaw puzzles)'', ''Walking in nature'',
    ''Mindfulness meditation'', ''One‑on‑one tutoring/mentoring'']'
  career_goals: Jackielou aims to leverage her organizational strengths and compassionate nature by re‑entering the nonprofit sector in a part‑time advisory role, helping local community centers streamline
    their programs and improve volunteer engagement. She also aspires to complete her undergraduate degree in social work or gerontology, which will enable her to advocate more effectively for seniors in
    her neighborhood. In the longer term, she hopes to author a practical guide on efficient community project management and possibly launch a small home‑based catering venture that offers healthy, culturally
    authentic meals. Achieving these goals will also serve as a personal benchmark to overcome her tendency toward worry and prove her ability to sustain high standards while maintaining personal well‑being.
