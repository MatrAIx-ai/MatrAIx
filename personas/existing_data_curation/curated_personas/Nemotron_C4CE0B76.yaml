personas:
  professional: Jackielou Cheng, a meticulous nonprofit advisory coordinator, leverages their expertise in project planning, multilingual outreach, and tight budget management to streamline community programs,
    quietly infusing compassion while using their disciplined, solitary nature to meticulously document processes and anticipate every contingency.
  sports: Jackielou Cheng enjoys early sunrise walks along the Charles River Reservation, plays on a local adult softball team called the Boston Gliders during summer, and passionately follows the Boston
    Red Sox and Boston Celtics, choosing these low‑stress activities to stay fit without the overwhelm of crowded gyms.
  arts: Jackielou Cheng, an enthusiastic calligrapher, sharpens their brush strokes while listening to Yo‑Yo Ma’s cello suites, draws inspiration from the contemporary installations of Ai Weiwei, and finds
    solace in the poetry of Langston Hughes, blending East‑West artistic influences in their quiet evenings.
  travel: Jackielou Cheng prefers meticulously planned journeys, having explored the historic temples of Kyoto, the bustling night markets of Seoul, the vineyards of Napa Valley, and the coastal charm of
    Cape Cod, yet they always schedule a return to Boston's neighborhoods to reconnect with their community roots.
  culinary: Jackielou Cheng, a seasoned home chef, masterfully prepares kimchi jjigae, hand‑rolled mandu dumplings, and Sichuan mapo tofu using gochujang, fermented soybean paste, Sichuan peppercorns, and
    fresh basil from their garden, preferring intimate dinner gatherings over dining out.
  core: Jackielou Cheng blends meticulous organization, quiet curiosity, and deep compassion, channeling their worry‑driven attention to detail into streamlined community projects and tranquil garden retreats.
background:
  cultural: Jackielou is a second‑generation East Asian American with Korean and Chinese heritage. Her family emphasized education, respect for elders, and communal harmony, values that continue to shape
    her compassionate and cooperative outlook. Growing up in the Boston area, she balanced traditional celebrations—such as Lunar New Year, Chuseok, and Mid‑Autumn Festival—with American customs, fostering
    a bicultural identity. Her fluency in Korean and Mandarin allows her to bridge cultural gaps in her community work, and her culinary and gardening practices often incorporate techniques and ingredients
    passed down through generations.
