    for seniors", "Mentoring fellow accountants", "Photography of urban architecture", "Exploring tea ceremonies"]'
  career_goals: Approaching retirement, Mei Ya Chou aims to transition her expertise toward community impact and creative integration. She plans to complete her CPA designation if not already obtained and
    pursue specialized training in sustainability accounting. She hopes to volunteer as a tax advisor for low‑income seniors and recent immigrants, and to serve on the board of a local arts nonprofit, where
    she can combine her financial acumen with her passion for art. Additionally, she intends to develop and teach workshops that provide financial literacy for emerging artists and cultural organizations.
    Over the next few years, she also envisions authoring a memoir that reflects on her journey bridging the worlds of finance and the humanities, while continuing to mentor younger accountants within her
    firm.
