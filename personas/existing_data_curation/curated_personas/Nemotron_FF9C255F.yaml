personas:
  professional: Christoper Estrada is a hands-on community handyman who leverages his practical carpentry, automotive, and budgeting skills to coordinate neighborhood home-repair workshops, balancing his
    pragmatic problem-solving with a friendly, collaborative approach that still lets him experiment with new DIY methods.
  sports: Christoper Estrada plays pickup basketball at the neighborhood park three evenings a week, competes in the Riverside Community Basketball League, follows the Los Angeles Lakers fervently, and
    supports the local semi-pro soccer team, the River City FC, as a fan.
  arts: Christoper Estrada immerses himself in soulful R&B and hip-hop, frequently streaming artists like H.E.R., Leon Bridges, and Kendrick Lamar, while also enjoying gospel choir performances at his church
    and occasionally attending community theater productions of classics such as A Raisin in the Sun.
  travel: Christoper Estrada favors short, budget-friendly road trips to nearby state parks like Red Rock Canyon for camping, plans occasional family vacations to coastal towns such as Santa Cruz for beach
    outings, and dreams of a music-filled pilgrimage to New Orleans while balancing his work and GED studies.
  culinary: Christoper Estrada loves cooking hearty meals like chili con carne, grilled chicken with cajun spices, and roasted sweet potatoes harvested from his garden, considers himself an intermediate-level
    cook who enjoys experimenting with fresh herbs like cilantro and oregano, and often dishes out leftovers during church potlucks.
  core: Christoper Estrada is a pragmatic community builder who balances hands-on DIY enthusiasm with disciplined budgeting, a love for R&B rhythms, and a steady commitment to personal growth despite occasional
    health and time-management quirks.
background:
  cultural: Christopher is an African‑American who grew up in the culturally diverse suburbs of Rockland County. His family’s history reflects the legacy of the Great Migration, blending Southern traditions
    with the urban rhythms of the New York metropolitan area. He maintains strong ties to the local Black church, community festivals, and family reunions that celebrate resilience, mutual support, and
    the rich cultural heritage of his community.
