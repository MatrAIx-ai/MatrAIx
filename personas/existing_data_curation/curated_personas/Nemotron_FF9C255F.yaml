  career_goals: Christopher aims to obtain his GED within the next year and enroll in a vocational training program for construction or HVAC, with the long‑term ambition of launching a small contracting
    business that can provide reliable income for his family. He also hopes to become a mentor for local youth, sharing his practical knowledge and encouraging them to pursue steady career paths.
