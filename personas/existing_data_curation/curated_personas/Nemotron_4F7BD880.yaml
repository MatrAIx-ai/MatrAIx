  hobbies: '[''Hiking'', ''Fishing'', ''Hunting'', ''Woodworking'', ''Motorcycle restoration'', ''Reading non-fiction'', ''Volunteering at community food bank'', ''Playing acoustic guitar'', ''Attending
    local country music events'', ''Exploring local craft breweries'']'
  career_goals: Mark aims to progress to a senior sales leadership role within the next five years, targeting positions such as Regional Sales Manager or Sales Director in the manufacturing sector. He is
    focused on expanding his portfolio of key accounts, consistently exceeding quota, and developing a reputation for reliability and strategic account growth. To support these ambitions, he plans to pursue
    a professional sales certification (e.g., Certified Professional Sales Leader) and eventually enroll in an MBA program to deepen his business acumen. Additionally, he hopes to mentor junior sales staff,
    fostering a collaborative and harmonious team environment.
