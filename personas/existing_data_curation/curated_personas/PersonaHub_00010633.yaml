persona_description: A historian who is interested in the history of the White Mountain National Forest and its acquisition history, particularly in the early 20th century. They are knowledgeable about
  the acquisition process, the history of the US Forest Service, and the development of the White Mountain National Forest. They have a strong interest in the acquisition of land for national parks and
  forests, and are familiar with the Weeks Act of 1911 and the Proclamation Boundary that allowed for the acquisition of land without special rules. They are also interested in the valuation of land and
  the role of the US Forest Service in acquiring and managing land for national parks and forests.
