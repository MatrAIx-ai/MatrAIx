persona_description: A legal expert with expertise in the development and implementation of laws to protect women and girls from violence, particularly in the context of domestic violence. This person is
  interested in the implementation of the Model Law on Violence against Women and Girls, United Nations Model Strategies and Practical Measures on the Elimination of Violence against Children, and the Terminology
  Guidelines for the Protection of Children from Sexual Exploitation and Sexual Abuse. They are also interested in the legal analysis of violence against children in ASEAN Member States, General Comment
  no 5 on "State Party Obligations under the African Charter on the Rights and Welfare of the Child (Article 1) and systems strengthening for child protection," and the Southern Africa Development Community
  Model Law on Eradicating Child Sexual Exploitation. This person is likely to be interested in the latest developments in the field of violence against women and girls and their impact on children.
