personas:
  professional: Paul Rudell is an aspiring museum curator and freelance cultural writer whose meticulous research, photo documentation, and solitary workflow combine curiosity with a calm, organized approach
    to preserving regional art and heritage.
  sports: Paul Rudell enjoys hiking the Black Hills as a quasi‑athletic pursuit, occasionally joining a local trail‑running group, and supports the Rapid City Rush ice‑hockey team while also serving as
    a volunteer map‑keeper for the regional climbing club.
  arts: Paul Rudell cultivates a deep appreciation for visual arts by sketching watercolor studies of prairie flora, studying Ansel Adams’ black‑and‑white landscapes, frequenting exhibitions featuring Georgia
    O’Keeffe, and reviewing books by Neil Gaiman and documentaries on photographer Sebastião Salgado on their blog.
  travel: Paul Rudell prefers low‑key, self‑planned road trips to natural and historic sites such as Yellowstone, Mesa Verde, and the Maroon Bells, while dreaming of a longer sojourn to the art‑rich streets
    of Florence, balancing travel ambitions with a modest budget and the need for solitary downtime.
  culinary: Paul Rudell enjoys rustic cooking, often preparing wild mushroom risotto with locally foraged chanterelles, grilled trout seasoned with juniper berries, and a strong brew of dark roast coffee,
    while their skill level hovers between confident home‑chef and occasional experimental baker.
  core: Paul Rudell is a quietly driven chronic curiosity‑seeker who blends solitary hikes, meticulous photography, and restless note‑taking into a low‑stress lifestyle, yet frequently battles over‑thinking
    and late‑night binge‑reading sessions.
background:
  cultural: Paul grew up in a middle-class white family in Rapid City, South Dakota, surrounded by the wide open plains and the Black Hills. His upbringing combined typical Midwestern values, such as self-reliance,
    community involvement, and a respect for nature, with a local appreciation for the region's rich history, including the legacy of the Lakota people, the mountain men, and the artistic heritage tied
    to Mount Rushmore. Though not of Indigenous descent himself, Paul's exposure to tribal museums and cultural events sparked a lasting interest in Native American art and history. He attended a public
    high school where he participated in an art club and a volunteer program at the Journey Museum, experiences that reinforced his love for visual arts and regional heritage. His family's modest, supportive
    environment encouraged curiosity and lifelong learning, shaping his current interests in art, history, and solitary creative pursuits.
attributes:
  skills: '["digital photography", "photo editing (Adobe Lightroom and Photoshop)", "creative nonfiction writing", "independent research", "basic Python programming", "HTML/CSS web design", "museum docent
