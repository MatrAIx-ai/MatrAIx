personas:
  professional: Jason Pitre, a seasoned computer systems analyst with over three decades of experience, leverages his graduate STEM training and calm, solution‑focused demeanor to craft clear documentation,
    shepherd legacy migrations, and blend waterfall and agile practices, all while mentoring junior staff with a pragmatic, structured approach.
  sports: Jason Pitre, an avid early‑morning fisherman and member of the Fernandina Beach senior walking club, supports the Jacksonville Jaguars and the Tampa Bay Lightning, enjoys low‑impact cardio on
    the beach, and plays weekly chess as a strategic mental exercise rather than a physical sport.
  arts: Jason Pitre, a dedicated sunrise photographer and model shipbuilder, draws inspiration from Ansel Adams and historic maritime art, reads Ken Follett’s historical novels, and attends the local community
    theater’s productions of classic plays whenever his schedule allows.
  travel: Jason Pitre, a methodical planner who prefers short, structured road trips along Florida’s coastline, has explored Amelia Island, the Keys, and Charleston, and dreams of sailing to the Bahamas
    and touring Portsmouth’s naval museums, balancing budget‑friendly stays with occasional splurges on boutique hotels.
  culinary: Jason Pitre, a modest home cook who harvests fresh tomatoes and basil from his garden, savors grilled mahi‑mahi with citrus glaze, enjoys a well‑made shrimp po’boy at the local seafood shack,
    and occasionally indulges in key‑lime pie, preferring simple, fresh flavors.
  core: Jason Pitre blends analytical rigor with a love for solitary nature pursuits, balancing structured mentorship and cautious finances with a relaxed, occasionally disorganized lifestyle.
background:
  cultural: Jason is a White American who grew up in a Midwestern small town before relocating to Fernandina Beach, Florida, in his early forties. He embraces the town's blend of Southern hospitality and
    maritime tradition, regularly participating in local heritage festivals and supporting community initiatives focused on coastal conservation. His upbringing instilled values of hard work, self‑reliance,
    and respect for nature, which complement his academic STEM background. While he identifies with mainstream American cultural norms, his daily life reflects the relaxed, nature‑oriented rhythm of a coastal
    community, balanced by a lifelong commitment to continuous learning and civic involvement.
