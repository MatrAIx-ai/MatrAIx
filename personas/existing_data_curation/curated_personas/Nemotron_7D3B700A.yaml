  career_goals: Approaching retirement, Jason aims to shift his focus toward mentorship and knowledge transfer. He plans to lead a mentorship program for junior analysts at his firm, document best practices
    for legacy system upkeep, and contribute occasional consulting to local non‑profits seeking IT assistance. He also hopes to author a concise guide on practical systems analysis for small‑business environments
    and to serve as a guest lecturer at a nearby community college, sharing his experience while maintaining a flexible schedule that supports his health and family life.
