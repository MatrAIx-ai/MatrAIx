  career_goals: Rolando aims to build a professional career that unites his artistic vision with technical expertise. In the short term, he plans to assemble a strong digital portfolio showcasing concept
    art, UI/UX mockups, and interactive media projects, and to apply for a specialized art‑tech academy or scholarship program. Long‑term, he aspires to become a concept artist for video games or a UX designer
    for culturally focused digital platforms, and eventually to launch a multimedia initiative that documents and preserves Mexican‑American stories through interactive storytelling.
