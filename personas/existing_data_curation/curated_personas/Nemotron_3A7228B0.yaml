  career_goals: Looking ahead, Nada imagines a career that blends her love for animals, science and helping people. She talks about becoming a veterinarian or a wildlife conservationist, attracted by the
    practical aspect of caring for living creatures and the curiosity‑driven study of biology. At the same time, her sociable nature makes her consider roles that involve community outreach, such as a youth
    mentor or school counselor, where she could use her empathy to support peers who feel stressed or anxious. She hopes to attend a high school with strong STEM and environmental programs, volunteer at
    the local animal shelter, and eventually pursue a college degree that prepares her for a science‑focused, people‑oriented profession.
