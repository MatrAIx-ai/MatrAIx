  hobbies: '[''Fishing'', ''Woodworking'', ''Reading non-fiction'', ''Gardening'', ''Community volunteering'', ''Attending high school football games'', ''Listening to classic rock'']'
  career_goals: Tyler aims to transition from a senior sales representative to a regional sales manager within the next three years, leveraging his deep product knowledge and leadership experience to mentor
    junior reps. He aspires to develop a structured training program that blends his practical curiosity with proven sales methodologies, improving team performance while addressing stress‑related challenges
    common in high‑pressure environments. In the longer term, Tyler envisions launching his own consultancy focused on service‑based sales optimization for small‑to‑mid‑size businesses in East Texas, combining
    his community ties and entrepreneurial drive. He also seeks to complete his unfinished college coursework in Business Administration to formalize his expertise and qualify for higher executive roles.
