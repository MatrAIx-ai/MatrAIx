personas:
  professional: Max King, a seasoned manufacturing supervisor with over three decades of hands‑on experience, blends a love for structured lean tools (5S, Kaizen, value‑stream mapping) with a laid‑back
    flexibility that lets them adapt schedules on the fly, while their calm, competitive nature drives on‑time delivery, zero lost‑time injuries, and mentorship of future supervisors as they pursue a plant‑manager
    role and a CPIM credential.
  sports: Max King plays third base for the Moraga Senior Softball Club in the East Bay senior league, hits occasional home runs during Tuesday night games, treks the Lafayette Reservoir and Mount Diablo
    trails each weekend, and cheers for the San Francisco Giants while wearing a vintage Giants cap at the stadium when they can snag a ticket.
  arts: Max King curates a monthly vinyl‑listening club featuring classic rock legends like Led Zeppelin, The Rolling Stones, Pink Floyd, and Fleetwood Mac, volunteers as a stagehand for Moraga Community
    Theatre where they helped set the scenes for productions such as ‘A Streetcar Named Desire’, and devours historical biographies by David McCullough and contemporary non‑fiction by Malcolm Gladwell,
    letting music, theater, and literature color their evenings.
  travel: Max King plans low‑key travel around a lean itinerary, spending Saturdays sampling Cabernet Sauvignon in Napa’s Stags’ Leap Winery and Sundays enjoying a tasting tour at Sonoma’s Chateau St. Jean,
    while dreaming of a scenic road trip along the Pacific Coast Highway to Big Sur and a future cruise to the Mediterranean, all balanced by family considerations and a moderate travel budget.
  culinary: Max King loves pairing a glass of Pinot Noir with a cheese board of aged Gouda, sharp cheddar, and fig jam, often grilling steak seasoned with rosemary and garlic or smoking wood‑plank salmon,
    and they wield a sturdy woodworking shop table as a prep station for building custom cutting boards, showcasing a hands‑on approach to both cuisine and craft.
  core: Max King, a disciplined yet easy‑going 62‑year‑old, blends a competitive lean‑manufacturing mindset with a love for community, classic rock, and weekend adventures, all while keeping a calm, skeptical
    eye on life’s details.
background:
  cultural: Max grew up in the San Francisco Bay Area in a middle-class family of Irish-German descent. His parents emphasized hard work, education, and community involvement, values that shaped his pragmatic
    yet socially oriented outlook. Coming of age during the cultural shifts of the late 1960s, he absorbed the region’s progressive spirit while maintaining a practical, results-driven approach. He earned
    his BA in humanities from San Francisco State University, where he studied literature and philosophy, experiences that enhanced his communication skills and broadened his perspective. Today, he identifies
    strongly with the collaborative, volunteer-focused culture of Contra Costa County, participating in local civic groups and embracing the region’s blend of suburban stability and outdoor recreation.
