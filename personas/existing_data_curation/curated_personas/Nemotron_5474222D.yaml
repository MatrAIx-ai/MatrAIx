  career_goals: Max aims to leverage his supervisory experience to move into a plant-manager role within the next two years, securing a record of zero lost-time injuries and achieving a 10% increase in
    line efficiency through Kaizen projects. He also plans to mentor the next generation of supervisors, develop a formal onboarding program, and earn a Certified Production and Inventory Management (CPIM)
    credential before retirement. Post-retirement, he hopes to consult for small manufacturers on safety and lean-process implementation, while volunteering as a safety trainer for the local community college’s
    vocational program.
