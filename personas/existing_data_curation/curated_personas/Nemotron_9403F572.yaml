personas:
  professional: Betty Easter, a retired homemaker turned senior‑center volunteer coordinator, leverages decades of budgeting, event planning, and first‑aid expertise to organize reliable community programs
    while balancing her structured approach with gentle flexibility.
  sports: Betty Easter follows the Los Angeles Dodgers and Lakers with a loyal, season‑ticket spirit, participates in the Mojave Senior Walking Club’s gentle weekend hikes, and occasionally joins the church’s
    senior softball league for light competition.
  arts: Betty Easter immerses in the swing of Glenn Miller, the soulful croon of Ella Fitzgerald, and the early rock riffs of Elvis while crocheting to the rhythm of jazz, and finds literary comfort in
    Agatha Christie mysteries and Jane Austen novels, often attending the local community theater’s classic play revivals.
  travel: Betty Easter prefers low‑key road trips to desert marvels like the Grand Canyon, Sedona’s red rocks, and Yosemite’s valley, often planning scenic stops at historic towns, while dreaming of a future
    pilgrimage to the tranquil gardens of Kyoto and the coastal cliffs of Big Sur.
  culinary: Betty Easter delights in baking her family’s signature peach cobbler and buttery cinnamon rolls, simmering chicken pot pie with sage and rosemary, and preparing hearty meatloaf topped with a
    ketchup glaze, often sourcing fresh herbs for herb‑infused teas.
  core: Betty Easter is a structured, community‑oriented octogenarian who blends meticulous budgeting with creative quilting, gentle desert walks, and a steadfast love for big‑band tunes, all while occasionally
    indulging in nostalgic snacks and misplacing reading glasses.
background:
  cultural: Betty Ann was raised in a mid-20th-century small-town American setting within a Protestant Christian family. Her cultural background emphasizes community, self-reliance, modesty, and preserving
    family traditions. Now living in Yucca Valley, California, she blends these values with an appreciation for the desert environment, expressing them through local church involvement, volunteer work,
    and the cultivation of native-plant gardens.
