  career_goals: He aspires to turn his artistic passions into a sustainable career, aiming to become a freelance UI/UX designer or concept artist for indie game studios. In the longer term, he envisions
    launching his own creative studio that blends art, technology, and storytelling, allowing him to maintain flexibility and independence while competing in the digital media market.
