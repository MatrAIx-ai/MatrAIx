personas:
  professional: Earl Goodson is a 22-year-old aspiring UI/UX designer and concept artist whose solid grounding in sketching, graphic design and photo editing fuels a restless curiosity for new digital tools,
    while their relaxed attitude toward deadlines often leaves their project folders a little disorganized, and their competitive, critical eye pushes every prototype toward higher visual polish even when
    working solo.
  sports: Earl Goodson follows the Portland Trail Blazers and Timbers, occasionally joins a weekend pick-up basketball game at the community center, hikes the nearby Forest Park trails with a small group
    of friends, and practices a casual yoga routine at home to counterbalance the sedentary nature of digital work.
  arts: Earl Goodson regularly visits local galleries showcasing emerging digital artists like Refik Anadol, sketches urban scenes inspired by Edward Hopper’s cityscapes, loses themselves in experimental
    music by Aphex Twin and Autechre at intimate venues, and draws concept art for indie games while quoting philosophy essays from Nietzsche and Plato to infuse deeper narrative layers.
  travel: Earl Goodson favors off-beat road trips and cultural immersion, having explored Tokyo’s Shibuya art districts and Reykjavik’s northern lights, dreaming of a future visit to Barcelona’s Gaudí architecture
    and the Icelandic highlands, while always planning on a shoestring budget that leaves room for spontaneous local gigs.
  culinary: Earl Goodson’s palate swings between spicy Thai green curry, perfectly brined ramen broth, and experimental matcha-infused desserts, they can whip up a quinoa-avocado toast with roasted radish
    in under twenty minutes but often opt for late-night food-truck tacos after a sketching marathon, and they keep a small herb garden of basil and cilantro on their balcony.
  core: Earl Goodson is a creatively restless, competition-driven visual artist who thrives in solitude, balances a flexible freelance hustle with a disciplined savings habit, and occasionally lets late-night
    inspiration disrupt sleep, workouts, and organization.
background:
  cultural: Earl Joe grew up in Dearborn Heights, a suburban community in the Detroit metropolitan area of Michigan. His family’s roots trace back to European immigrants who settled in the Midwest in the
    early 20th century, giving him a cultural heritage of German and Polish traditions. The region’s industrial history, coupled with a vibrant local arts scene and exposure to diverse neighboring cultures,
    shaped his appreciation for both pragmatic work ethic and creative expression. He identifies with Midwestern values of modesty and independence while embracing the multicultural influences of the greater
    Detroit area.
