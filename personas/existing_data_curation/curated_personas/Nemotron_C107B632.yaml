personas:
  professional: Sally Compton, a 53‑year‑old telecommunications line installer with three decades of copper and fiber expertise, blends meticulous splicing skills with seasoned project coordination, mentoring
    newcomers as they chart a path toward a supervisory role and upcoming BICSI certification.
  sports: Sally Compton enjoys hiking the Georgia foothills, follows the Atlanta Falcons and Braves, and they play for the local co‑ed Atlanta Peach Softball League as a light social outlet.
  arts: Sally Compton finds creative release in quilting patterns inspired by Piet Mondrian, listens to Patsy Cline while stitching, and they regularly discuss historical fiction by Margaret Mitchell and
    Kathryn Stockett at their women's book club.
  travel: Sally Compton prefers meticulously planned road trips, balancing their love for nature with historic charm, so they have driven the Blue Ridge Parkway each spring and dream of a relaxed weekend
    in Asheville's Biltmore Estate; internationally, they hope to explore Kyoto's gardens and Bordeaux's vineyards, budgeting these trips within retirement savings.
  culinary: Sally Compton, a competent home chef, delights in turning garden harvests into dishes like rosemary‑infused roasted carrots, Southern gumbo with okra and Andouille sausage, and perfecting a
    classic peach cobbler, while they also experiment with heirloom tomato gazpacho.
  core: Sally Compton, the methodical 53‑year‑old telecom veteran who gardens with checklist precision, quilts geometric marvels, and can’t resist ordering extra garden supplies even when the budget’s tight,
    they often double‑check every spreadsheet three times before signing off.
background:
  cultural: Sally grew up in a small town in central Georgia, raised in a Baptist family that emphasized community service, hospitality, and modesty—core values of the Southern tradition she carries into
    adulthood. The proximity of Warner Robins to Robins Air Force Base exposed her to a strong military presence, fostering a respect for discipline, structured teamwork, and civic pride. Her family’s generations
    in the region contributed to a deep appreciation for local customs such as county fairs, southern cuisine, and church gatherings. These cultural influences have shaped Sally’s reliable work ethic, organized
    approach to both professional and personal tasks, and her commitment to giving back to the community.
attributes:
  skills: '[''Fiber optic splicing and termination'', ''Copper cable installation and repair'', ''OTDR and TDR testing'', ''Blueprint and schematic interpretation'', ''NEC and OSHA compliance'', ''Project
    scheduling and crew coordination'', ''Problem solving and network troubleshooting'', ''Customer liaison and service communication'', ''Technical documentation and record‑keeping'', ''Mentoring and on‑the‑job
    training'', ''BICSI Installer Level 1 certification'']'
  hobbies: '[''Gardening (vegetable beds, roses)'', ''Quilting with geometric patterns'', ''Hiking and bird‑watching'', ''Church outreach volunteering'', ''Women’s historical fiction book club'', ''Habitat
    for Humanity construction volunteering'', ''Co‑ed softball league'']'
  career_goals: Sally aims to transition into a supervisory role within the next two years, becoming a field lead who oversees a regional crew of installers. She plans to earn the BICSI Installer Specialist
    and Project Management certifications to broaden her qualifications. Long‑term, she envisions moving into a field operations manager position, where she can shape safety standards, improve workflow
    efficiency, and develop a mentorship program for apprentices. Additionally, Sally is interested in consulting part‑time after retirement, offering her expertise to small telecom firms in the Atlanta‑Warner
    Robins corridor.
