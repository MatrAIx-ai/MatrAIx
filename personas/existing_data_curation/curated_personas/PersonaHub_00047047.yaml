persona_description: A historian who is deeply interested in the American Revolution and the role of Jefferson's vision in shaping our democracy. They are curious about the nature of revolution, stewardship
  of power, liberty, and the dangers of factions and tyranny. They are also interested in contemporary relevance and the ongoing struggle for democracy and the preservation of key rights. They appreciate
  contributions from contemporary historians and are open to new insights and reflections on how Jefferson's vision can help us in our era of polarization, corruption, government overreach, and gridlock.
