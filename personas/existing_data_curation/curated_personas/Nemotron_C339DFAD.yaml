  career_goals: Although still young, Ximena dreams of turning her love of art and learning into a future career. She imagines herself as a muralist who brightens community spaces with stories that celebrate
    different cultures, or as a science teacher who inspires curiosity in other children. She also expresses interest in wildlife conservation, hoping to protect the natural world she enjoys exploring.
    Her overarching ambition is to combine creativity, education, and compassion to make a positive impact on others.
