  hobbies: '[''Gardening'', ''Birdwatching'', ''Puzzle solving (crosswords, sudoku)'', ''Community tech workshops'', ''Cooking Southern cuisine'', ''Hiking local trails'', ''Knitting'', ''Reading historical
    non‑fiction'']'
  career_goals: Renee aims to elevate the digital capabilities of Grant Parish by leading a transition to cloud‑based services and expanding broadband access for local schools and small businesses. She
    plans to obtain advanced certifications such as CISSP and PMP to strengthen her strategic credentials. In the next five years, she hopes to move into a regional director role where she can influence
    technology policy, mentor a larger team, and implement sustainable IT practices that reduce stress for herself and her staff. Long‑term, she envisions launching a consulting boutique that helps rural
    communities modernize their IT systems while maintaining a healthy work‑life balance.
