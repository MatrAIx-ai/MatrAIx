  hobbies: '[''Fishing trips with friends'', ''Adult basketball league'', ''Community volunteer events'', ''Live music concerts'', ''DIY home improvement projects'', ''Hosting barbecues'', ''Classic car
    shows'', ''Open‑mic nights at local bar'']'
  career_goals: Richard aims to move into a foreman or site‑supervisor role within the next five years, leveraging his practical expertise and people‑skills to oversee larger steel‑erection projects. He
    plans to earn certifications such as Certified Welding Inspector and OSHA Construction Safety Trainer to bolster his qualifications. Ultimately, he envisions starting his own small contracting firm
    that emphasizes safety, employee wellbeing, and community involvement, providing a stable future for his family while giving back to the local trade community.
