personas:
  professional: Richard Stephens is a seasoned structural iron and steel worker proficient in MIG/TIG welding, blueprint interpretation, and rigging operations, who consistently applies OSHA standards while
    leading small crews with calm, talkative mentorship, serving as a bridge between foremen, union reps, and labor teams, and they aim to leverage these strengths into a foreman role and eventually a safety‑focused
    contracting firm.
  sports: Richard Stephens plays in a local adult basketball league, avidly follows the Miami Dolphins and Orlando Magic, and spends weekends fishing along the Saint Augustine coast and volunteering for
    beach clean‑up crews, and they treat fitness as a social activity rather than a regimented routine.
  arts: Richard Stephens enjoys live music venues featuring classic rock legends like Bruce Springsteen and local blues acts, thrills at classic‑car rallies showcasing vintage automotive design, and frequently
    takes the mic at open‑mic nights where their talkative persona shines, and they thrive on the eclectic crowd’s energy.
  travel: Richard Stephens favors spontaneous, low‑key trips such as impromptu fishing charters to the Florida Keys and weekend drives to classic‑car shows in nearby cities, and they prefer flexible itineraries
    over strict planning while balancing a modest budget that accommodates family visits and occasional out‑of‑state rally attendance.
  culinary: Richard Stephens loves firing up the grill for weekend barbecues featuring smoked brisket, stone‑crab claws, and corn on the cob, enjoys cooking simple Cajun‑spiced shrimp boils at home, and
    pairs these meals with coleslaw and baked beans, though they occasionally overindulge in sauces and neglect portion control.
  core: Richard Stephens is a charismatic, safety‑obsessed steelworker who balances a love for spontaneous fishing trips, impromptu barbecues, and classic‑car rallies with a relaxed approach to budgeting
    and a calm, resilient demeanor that rarely shows anxiety, and they consistently stay upbeat even under pressure.
background:
  cultural: Richard is a white American raised in a middle‑class family on Florida's East Coast. His family heritage includes roots in the Southern United States and generations of European (primarily English
    and Irish) immigrants, which have instilled a blend of Southern hospitality and coastal lifestyle. He grew up participating in local festivals, church gatherings, and community sports, fostering a strong
    sense of neighborly harmony and collective responsibility. These cultural influences shape his emphasis on kindness, cooperation, and maintaining harmonious relationships both at work and in his personal
    life.
attributes:
  skills: '[''MIG/TIG welding'', ''Arc welding'', ''Blueprint and technical drawing interpretation'', ''Rigging and hoisting'', ''Crane operation'', ''Construction site safety management'', ''Team leadership'',
