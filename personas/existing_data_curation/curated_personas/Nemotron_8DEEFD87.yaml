  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Watercolor painting'', ''Quilting and knitting'', ''Gardening (flowers and herbs)'', ''Cooking and baking experimental dishes'', ''Attending
    local theater productions'', ''Participating in community choir'', ''Reading art history and cultural books'', ''Joining a book club'', ''Volunteering at community festivals'']'
  career_goals: Elizabeth hopes to channel her sociable energy and love of the arts into a part‑time role as a community arts liaison for the Gray public library or local cultural center, where she could
    organize workshops, curate small exhibitions, and mentor emerging artists. She also aspires to launch a seasonal pop‑up shop selling her handcrafted quilts and other textiles at regional fairs. To deepen
    her knowledge, she plans to enroll in a certificate program in art history or community arts administration at a nearby community college. Additionally, she dreams of creating a podcast series that
    highlights local artists, history, and community stories, using her natural storytelling ability to reach a wider audience.
