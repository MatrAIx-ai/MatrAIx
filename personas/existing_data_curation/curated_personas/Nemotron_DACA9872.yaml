personas:
  professional: Carlton Parker, a seasoned carpenter who merges precise structural framing with avant‑garde reclaimed‑lumber designs, leverages their meticulous joinery skills and relaxed, often‑spontaneous
    work style to deliver custom furniture that balances sustainability with artistic flair.
  sports: Carlton Parker balances a relaxed approach to fitness with early‑morning jogs along the Tampa Riverwalk, weekend Gulf‑coast fishing excursions, loyal support for the Tampa Bay Buccaneers and Tampa
    Bay Rays, and regular participation in a community adult soft‑ball league (the ‘Tampa Harbor Softball Club’) that doubles as their social athletic outlet.
  arts: Carlton Parker, an avid vinyl collector and street‑photographer, draws inspiration from the improvisational mastery of Miles Davis and the lyrical depth of A Tribe Called Quest while curating playlists
    that soundtrack their evenings at Tampa’s intimate jazz cafés and their weekend model‑ship builds, and they regularly admire the contemporary works of muralist Carlos Mendoza and the photographic eye
    of Henri Cartier‑Bresson.
  travel: Carlton Parker prefers compact, self‑driven road trips that blend historic architecture with waterfront relaxation, having mapped weekend escapes to St. Augustine’s cobblestone districts, Charleston’s
    antebellum homes, and the coastal charm of Portland, Maine, while dreaming of a summer sail‑through of the Greek islands for their future design inspiration.
  culinary: Carlton Parker, a competent home cook with a penchant for Mediterranean flavors, often prepares cedar‑plank grilled salmon seasoned with rosemary and lemon, whips up hearty shrimp and grits
    with locally sourced Gulf shrimp, and treats themselves to a perfectly brewed pour‑over using Ethiopian Yirgacheffe beans, all while occasionally splurging on a weekend feast at Tampa’s acclaimed farm‑to‑table
    restaurant Oystercatchers.
  core: Carlton Parker is a meticulous yet laid‑back artisan carpenter who fuses vintage vinyl vibes with reclaimed‑lumber craftsmanship, obsessively curates their workshop playlists, and habitually misplaces
    their screwdrivers while planning their next road trip.
background:
  cultural: Carlton grew up in a close‑knit African‑American community in the Tampa area, where family gatherings around soulful gospel music and Southern cuisine forged a strong sense of identity. His
    grandparents were skilled woodworkers who taught him the value of craftsmanship, self‑reliance, and perseverance in the face of systemic challenges. The cultural richness of Hillsborough County—its
    blend of Caribbean flavors, historic African‑American neighborhoods, and a vibrant arts scene—shapes his worldview. He carries the legacy of Black tradespeople who built neighborhoods, while also embracing
    the diverse cultural influences of coastal Florida, from Cuban street art to Haitian festivals, which inform his eclectic aesthetic and community‑focused mindset.
attributes:
  skills: '["Framing","Finish Carpentry","Custom Cabinetry","Blueprint Reading","Project Estimation","Safety Compliance","Advanced Joinery","Tool Maintenance","Reclaimed Material Sourcing","Design Visualization"]'
  hobbies: '["Visiting Art Galleries","Collecting Vintage Vinyl","Playing Chess","Fishing","Model Shipbuilding","Photography","Attending Small Live‑Music Shows","Weekend Road Trips"]'
  career_goals: Carlton aims to transition from a solo contractor to the owner of a boutique workshop that specializes in high‑end, sustainable furniture and architectural details. He envisions offering
    apprenticeships to preserve carpentry traditions while integrating modern, eco‑friendly methods. Over the next five years, he hopes to earn NCMA certification, showcase his pieces at regional art fairs,
    and become a respected speaker at local trade schools, positioning himself as both a craftsman and a thought leader in innovative wood design.
