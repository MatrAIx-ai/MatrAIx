personas:
  professional: Jerome Smith, a 61‑year‑old veteran industrial maintenance technician, they merge their methodical, reliability‑focused mindset with deep expertise in hydraulic, pneumatic and high‑temperature
    equipment repair, while eagerly integrating IoT predictive‑maintenance tools and mentoring apprentices to safeguard plant uptime.
  sports: Jerome Smith, a 61‑year‑old who balances solitary fishing with social activity, they stay active by playing in a local senior softball league, follow the Houston Astros in baseball and the Houston
    Texans in football, and compete in an annual regional trout‑fishing tournament each spring.
  arts: Jerome Smith, an avid lover of music and handcrafted art, they find inspiration in classic soul legends like Aretha Franklin and Marvin Gaye, jazz greats such as Miles Davis, and the uplifting harmonies
    of their church gospel choir, while channeling that creative spark into woodworking projects that echo mid‑century modern design and the meticulous restoration of a vintage motorcycle.
  travel: Jerome Smith, an adventurous yet budget‑conscious 61‑year‑old, they plan getaways around fishing lodges in the Ozarks, weekend road trips to the Texas Hill Country for smoked‑brisket festivals
    and live music, and annual family cruises to the Caribbean, preferring detailed itineraries that balance scenic drives with downtime for barbecuing on deck.
  culinary: Jerome Smith, a seasoned home chef at 61, they delight in slow‑cooking smoked brisket, frying crispy catfish, and simmering collard greens seasoned with smoked paprika, cayenne pepper, and a
    dash of liquid smoke, mastering charcoal grilling while occasionally experimenting with their own bourbon‑infused BBQ sauce.
  core: Jerome Smith, a meticulous 61‑year‑old with a worry‑prone mind, they seamlessly blend a love for precision‑driven maintenance work, soulful music, and weekend barbecues, yet occasionally let impulse
    hobby purchases and lingering stress sidetrack their otherwise disciplined routine.
background:
  cultural: Jerome is an African American who grew up in the greater Houston area, where the strong traditions of the Black church, family gatherings, and community solidarity shaped his worldview. His
    upbringing emphasized respect for elders, the importance of self-reliance, and a deep appreciation for the cultural legacy of the Southern Black experience, including celebrations such as Juneteenth
    and the sharing of soul-food cuisine. These influences inform his commitment to mentorship, his participation in church activities, and his pride in preserving and passing on both technical knowledge
    and cultural heritage to younger generations.
attributes:
  skills: '["hydraulic and pneumatic system repair", "MIG/TIG welding", "preventive maintenance scheduling", "PLC programming and troubleshooting", "machine alignment and vibration analysis", "equipment
    calibration and metrology", "industrial safety compliance (OSHA)", "blueprint and schematic interpretation", "team training and mentorship", "diagnostic software usage (e.g., SAP PM)", "implementation
    of predictive maintenance technologies"]'
  hobbies: '["fishing at Clear Lake", "grilling and soul-food cooking", "listening to classic soul, jazz, and gospel music", "participating in church gospel choir", "woodworking", "vintage motorcycle restoration",
    "vegetable gardening", "volunteering at community food-bank", "reading African American history and engineering biographies"]'
  career_goals: Looking ahead, Jerome aims to earn a Master Certified Maintenance Technician credential and formalize his role as a mentor for the next generation of mechanics at his plant. He plans to
    lead a pilot project that blends traditional maintenance practices with IoT-enabled predictive analytics, reducing unplanned outages and easing his own stress about equipment reliability. In the longer
    term, he envisions transitioning to a part-time consulting role where he can advise smaller manufacturers on safety compliance and efficient maintenance scheduling, while still maintaining a modest
    workload that allows more time for family and personal health.
