personas:
  professional: Tammi Monteiro, a four‑year‑old preschooler with a penchant for orderly play, delights in building intricate LEGO structures and sorting alphabet blocks, turning curiosity about how things
    work into disciplined, achievement‑driven mini‑projects.
  sports: Tammi Monteiro enjoys solo activities like swimming laps at the community pool and participates in the Tiny Tots Gymnastics Club, while cheering quietly for the Los Angeles Dodgers on game days,
    preferring the structured routine of practice over noisy team scrimmages.
  arts: Tammi Monteiro spends afternoons drawing detailed pictures of dinosaurs with colored pencils, sings along to Raffi’s 'Baby Beluga' and watches Pixar’s 'Coco,' using their organized love of patterns
    to curate a personal art wall in their bedroom.
  travel: Tammi Monteiro prefers family road trips that include scheduled stops at kid‑friendly museums, such as the Natural History Museum in Washington, D.C., and loves the sensory adventure of a brief
    visit to Disney World, planning each outing with a hand‑drawn itinerary and a favorite stuffed companion for comfort.
  culinary: Tammi Monteiro delights in a simple menu of creamy mac and cheese, avocado toast with a sprinkle of cheddar, and blueberry muffins, showing surprisingly refined palate by insisting on perfectly
    melted cheese and occasionally sneaking extra goldfish crackers when no one is watching.
  core: Tammi Monteiro, a meticulously organized four‑year‑old, channels quiet curiosity into disciplined play, cataloguing crayons, managing a piggy bank, and mastering puzzles while savoring solo adventures.
background:
  cultural: Tammi was born and raised in the Bronx, New York, in a white, middle‑class family that values education, order, and community involvement. While her household follows typical American customs—celebrating
    holidays like Thanksgiving and the Fourth of July—she is also exposed to the borough’s diverse cultural fabric, hearing neighbors speak Spanish and hearing music from various traditions. This multicultural
    backdrop, combined with her family’s emphasis on discipline and high standards, shapes her methodical, curiosity‑driven personality.
