persona_description: A teacher who is interested in applying design thinking and design processes to improve education in public, private, and charter schools. They are passionate about integrating design
  thinking into their classroom practice and are open to experimenting with new methods and tools. They are also interested in exploring the challenges and opportunities that arise from working with diverse
  stakeholders and environments. They are driven by a desire to create a comfortable, confident relationship with uncertainty, ambiguity, and nonlinear processes in their educational environments. They
  are committed to promoting a more adaptive and flexible approach to education that honors the needs and wishes of students and teachers.
