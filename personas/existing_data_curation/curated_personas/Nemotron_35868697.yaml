  hobbies: '[''Running club'', ''Volunteering as a coding mentor'', ''Playing acoustic guitar'', ''Tabletop game nights'', ''Gardening'', ''Cooking Southern cuisine'', ''Participating in charity runs'',
    ''Hosting potluck dinners'']'
  career_goals: Jeffrey aims to move into a senior engineering leadership role where he can shape development standards and foster a culture of collaborative excellence. Over the next five years, he plans
    to obtain AWS Solutions Architect and Certified ScrumMaster certifications, lead multi‑disciplinary projects for local non‑profits, and establish a regional mentorship program that pairs experienced
    developers with high‑school students interested in coding. Ultimately, he envisions founding a consulting firm that specializes in building technology solutions that improve community health and mental‑wellbeing,
    integrating his technical expertise with his passion for helping others.
