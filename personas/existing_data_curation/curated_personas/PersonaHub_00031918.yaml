persona_description: A historian who specializes in the study of Alabama's history and the Reconstruction Era, particularly the role of Horace King in the development of the Alabama Legislature and the
  building of the capitol. He is deeply interested in the architectural features of the capitol and the role they played in the development of the state and its people. He is also knowledgeable about the
  history of the state's Civil War and the events that led to the withdrawal of Alabama from the Union and the formation of the Confederate States of America.
