personas:
  professional: Brian Powell, a seasoned electrician with 25 years of hands‑on experience, leverages their practical mindset and outgoing nature to run routine‑focused wiring jobs, they train apprentices
    with clear, talk‑heavy explanations, and they are building a fledgling contracting firm that emphasizes reliable service and community‑centric solar installations.
  sports: Brian Powell is a die‑hard Virginia Tech Hokies fan who watches every football game at the local tavern with his buddies, they also join the Harrisonburg community fishing club for seasonal Shenandoah
    River casts, and they participate in weekly backyard bowling leagues while cheering on the regional high‑school baseball team during summer evenings.
  arts: Brian Powell’s artistic side shines during karaoke nights at his favorite tavern where he belts out classics by the Eagles and Johnny Cash, they enjoy the soulful sounds of local country bands at
    the county fair, and they find inspiration for car restoration projects in vintage automobile shows at the Museum of American Speed.
  travel: Brian Powell prefers road‑tripping across Virginia’s scenic byways, they have explored Shenandoah National Park’s overlooks, visited Virginia Beach for weekend surf, taken occasional drives to
    Nashville’s music scene, yet they still dream of a relaxed fishing‑lodge vacation in the Florida Keys.
  culinary: Brian Powell is a grill‑master who loves smoking pork ribs with a sweet‑spicy rub and whipping up homemade mac & cheese, they pair his river catches with fresh garden tomatoes, and they sometimes
    create over‑sauced dishes that friends jokingly call ‘Brian’s sauce disaster.’
  core: Brian Powell, a sociable 50‑year‑old electrician with a penchant for classic cars, community barbecues, and a laid‑back approach that mixes routine‑driven work with occasional overspending on restoration
    projects, they balance practicality with an easy‑going, talkative charm.
background:
  cultural: Brian grew up in a middle‑class, white, working‑class family in the Shenandoah Valley, steeped in the rural Appalachian culture of central Virginia. His upbringing emphasized hard work, reliability,
    and community involvement, often centered around church, local sports, and county fairs. He identifies with traditional American values, such as self‑reliance, family loyalty, and respect for practical
    trades. Although he attended some college courses, he has remained rooted in the practical, hands‑on ethos of his region, which is reflected in his preference for routine, his sociable participation
    in community events, and his pride in maintaining the electrical safety and comfort of his neighbors.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical installations'', ''National Electrical Code (NEC) compliance'', ''Electrical safety inspections'', ''Circuit troubleshooting'', ''Low‑voltage
    system installation'', ''Solar panel system installation'', ''Blueprint reading'', ''Client communication'', ''Apprentice mentorship'', ''Supplier negotiation'']'
  hobbies: '[''Karaoke and local bar performances'', ''Attending community fairs and barbecues'', ''College football fandom (Virginia Tech)'', ''Classic car restoration'', ''Fishing on the Shenandoah River'',
    ''Hunting trips'', ''Home gardening'', ''Hosting game nights'', ''Volunteer youth mentorship at church'']'
  career_goals: Over the next few years Brian hopes to achieve master electrician certification and transition his freelance work into a small, locally‑owned electrical contracting business that can serve
    the Harrisonburg area. He envisions hiring a few trusted apprentices, offering reliable, routine‑focused services, and expanding into residential solar installations to meet growing community demand.
    While he values stability, he also wants to be recognized as a go‑to resource for neighbors, occasionally speaking at local trade workshops and community events. As retirement approaches, Brian plans
    to scale back field work while maintaining a mentorship role and ensuring his business remains a dependable part of the community.
