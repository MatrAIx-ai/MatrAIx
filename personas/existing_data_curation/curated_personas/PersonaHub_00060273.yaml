persona_description: A historian who specializes in the study of women's history in East Central Europe, particularly the First Czechoslovak Republic. Feinberg's book provides a solid foundation and model
  upon which future historians of women, gender, and sexuality in East Central Europe will hopefully build. Her work on the activism of the organized Czechoslovak feminist movement, the revolutionary ideals
  of 1918, and the competing constitutional guarantees that set the stage for ongoing and frequently bitter contests over women's legal equality in several realms is highly informative and relevant to the
  field.
