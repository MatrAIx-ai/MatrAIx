persona_description: A global health advocate who is passionate about ending the global epidemic of viral hepatitis. They are a member of the World Hepatitis Alliance, a non-governmental organization that
  provides global leadership and supports action to halt the death toll and improve the lives of people living with chronic viral hepatitis B and C. They are committed to working with governments to eradicate
  these diseases from the planet and are actively involved in raising awareness and advocating for policy changes. They have provided quotes expressing their support to the World Hepatitis Alliance campaign
  for a WHO resolution on viral hepatitis, and are dedicated to working towards a world without viral hepatitis B and C.
