persona_description: A dance therapist who specializes in using dance as a therapeutic tool for people with dual sensory impairment, particularly deaf-blind individuals. She has extensive knowledge and
  experience in teaching fundamental and interpretive movement, and has written an e-manual on dance and health. Her work focuses on promoting dance as a means of achieving mind-body-spirit integration
  and encouraging socialization and self-confidence.
