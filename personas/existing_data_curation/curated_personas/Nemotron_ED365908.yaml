personas:
  professional: Michael Johnson, a 26‑year‑old janitor and building cleaner, leverages his hands‑on curiosity and meticulous organization to master commercial cleaning, floor care, and minor repairs while
    training new staff, and he is actively pursuing certifications toward a facilities‑management career.
  sports: Michael Johnson, a fishing enthusiast at Lake Barkley, is a member of the local Lake Barkley Fishing Club, roots for the Louisville Cardinals basketball team and the Nashville Predators hockey
    club, and spends weekend mornings jogging along the river while occasionally joining a community softball league.
  arts: Michael Johnson enjoys unwinding with retro video games like The Legend of Zelda and Pac‑Man, listens to Jack Johnson and The Beatles while gardening, and attends occasional community‑theater productions
    featuring actors such as Lin Manuel Miranda, illustrating how classic pop culture and local arts shape his leisure.
  travel: Michael Johnson prefers low‑cost, spreadsheet‑planned trips, has road‑tripped to Shenandoah National Park and Asheville, NC, dreams of eco‑tourism in Costa Rica’s Monteverde cloud forest, and
    balances travel aspirations with a modest budget that limits frequent international flights.
  culinary: Michael Johnson, an avid gardener, cooks simple meals like grilled trout with lemon‑dill, roasted sweet potatoes seasoned with rosemary, and fresh pesto made from basil harvested at home, showing
    moderate culinary skill and a preference for sustainable, farm‑to‑table flavors.
  core: Michael Johnson blends practical hands‑on expertise with a restless curiosity, a habit of over‑thinking, and a quiet love for retro games, making them a meticulous yet slightly anxious lifelong
    learner.
background:
  cultural: Michael grew up in a working‑class family in rural eastern Kentucky, shaped by Southern Appalachian values of humility, community support, and a strong work ethic. The region’s emphasis on family,
    church involvement (he attends a Baptist congregation), and self‑reliance influences his cooperative nature and desire to help others. Local traditions of storytelling, folk music, and seasonal festivals
    are part of his cultural experience.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (strip‑and‑wax, carpet extraction)'', ''Basic plumbing repairs'', ''Light carpentry'', ''Equipment troubleshooting'', ''Safety compliance'', ''Inventory
    management'', ''Schedule coordination'', ''Customer service'', ''Team training'', ''Eco‑friendly cleaning methods'']'
  hobbies: '[''DIY home repairs'', ''Woodworking'', ''Sustainable gardening'', ''Fishing at Lake Barkley'', ''Technology podcasts'', ''Popular‑science reading'', ''Community volunteering'', ''Church activities'',
    ''Retro video gaming'', ''Journaling'']'
  career_goals: He aims to move into a facilities management role within the next five years, seeking certification such as Certified Facility Manager (CFM) or a community‑college associate degree in facilities
    management. He hopes to oversee building systems, manage budgets, and eventually run his own small commercial cleaning business, allowing him to apply his practical knowledge while offering reliable
    service to local businesses.
