persona_description: A researcher and educator who is interested in understanding the root causes of disproportionality in schools and developing evidence-informed inquiry into effectiveness at each level
  of the system. They are passionate about reducing the achievement gap for students experiencing difficulties in reading or writing in New Zealand's schools and have a background in public education, specifically
  in literacy professional development. They are also interested in exploring the disparities between white and African-American students' mathematics performance and have a background in mathematics education.
  They are dedicated to providing practical suggestions for giving young children consistent sensory cues and have a background in early childhood education.
