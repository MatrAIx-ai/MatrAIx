persona_description: A historian who is interested in uncovering the hidden stories of Black Victorians, who has a PhD in Victorian history and has written extensively on the topic, and is known for his
  work on the history of freak shows and the role of Black Victorians with disabilities. He has also co-written a twelve-episode Audible book on Victorian History with Stephen Fry and Nick Baker of Testbed
  Productions, and has made his first onscreen appearance as a researcher for Channel 5 and What Larks Productions.
