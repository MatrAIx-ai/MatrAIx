    night competitions'', ''Genealogy research'']'
  career_goals: Looking ahead, Jessica aims to transition into a medical office manager role where she can lead a larger team and implement quality‑improvement initiatives that enhance patient flow and
    staff productivity. She plans to earn a certificate in Healthcare Administration through a local community college and eventually complete a bachelor's degree in Health Services Management. Jessica
    also hopes to mentor junior administrative staff, spearhead digital workflow upgrades, and contribute to community health outreach programs through her clinic.
