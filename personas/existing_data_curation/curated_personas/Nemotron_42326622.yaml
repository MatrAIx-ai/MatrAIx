    craft beer'', ''Small‑batch bitters crafting'', ''Landscape photography'', ''Spontaneous road trips'', ''Puzzle solving (chess, logic games)'', ''Attending art fairs and local festivals'']'
  career_goals: Daniel aims to transition from a supportive role to a leadership position within the hospitality sector. Over the next five years he plans to earn a Certified Mixologist credential and a
    ServSafe manager certification, positioning himself for a bar‑manager or head‑bartender role at a boutique establishment. He is eager to showcase his inventive streak by creating a signature cocktail
    line that could be featured in local competitions and seasonal menus. Ultimately, Daniel dreams of opening a modest, artist‑themed lounge where he can blend his love of visual art, music, and experimental
    drinks, while mentoring younger staff and curating community events.
