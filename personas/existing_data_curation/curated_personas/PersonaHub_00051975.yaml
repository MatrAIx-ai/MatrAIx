persona_description: A welding engineer who specializes in developing welding procedures for different types of base metals, taking into account their physical and mechanical properties, welding processes,
  and filler metals. The engineer is responsible for selecting the appropriate welding variables, including amperage, voltage, travel speed, and other welding parameters, based on the base metal's properties
  and the customer's requirements. The engineer must also consider the joint details, heat treatment requirements, and preheat/post weld heat treatment. The engineer's expertise lies in understanding the
  base metal's limitations and strengths, selecting the right filler metal, and determining the appropriate welding variables to ensure the best possible welding results.
