    ''Listening to ambient electronic music'']'
  career_goals: Sherryann aims to become a senior operations research analyst within the next three years and eventually lead a multidisciplinary analytics team focused on social impact projects such as
    public‑health logistics and sustainable transportation in the Chicago region. She plans to pursue a master’s degree in data science or operations management to deepen her methodological expertise and
    to publish applied research that bridges quantitative rigor with community benefit. Long‑term, she envisions a role where she can mentor junior analysts, shape data‑driven policy recommendations, and
    integrate artistic storytelling into executive presentations to make insights more accessible and compelling, while maintaining a flexible work style that supports her personal well‑being.
