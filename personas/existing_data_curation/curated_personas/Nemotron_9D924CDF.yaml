  career_goals: Janet aims to transition from specialist to strategic leader, seeking a senior role where she can shape large‑scale community arts and education initiatives across the Gulf Coast. She hopes
    to launch her own consultancy that blends creative project management with educational design, helping nonprofits and cultural institutions embed innovative, people‑centered processes. Mentoring emerging
    project managers and championing inclusive, interdisciplinary programs are also core ambitions, as is obtaining a PMP certification to formalize her expertise.
