personas:
  professional: Janet Kennedy, a veteran educational program designer turned project‑management strategist, blends three decades of curriculum expertise with Agile and Lean tools to translate abstract community‑arts
    visions into concrete initiatives, channeling their spontaneous, talkative facilitation style to rally diverse partners while they eye a senior leadership role and a future consultancy that mentors
    emerging managers.
  sports: Janet Kennedy fuels their love of the Gulf through paddleboarding with the local Gulf Coast Paddleboard Club and occasional weekend hikes in the Natchez Trace, while cheering the New Orleans Saints
    and intermittently joining a mixed‑age softball league, a fitness routine driven more by spontaneous adventure than structured training.
  arts: Janet Kennedy immerses themselves in the arts by painting abstract canvases inspired by coastal light, performing weekly improv sketches, capturing sunrise silhouettes with a vintage Nikon, devouring
    Zadie Smith novels and Simone de Beauvoir essays, and soaking up live blues from B.B. King tributes and jazz sets featuring Wynton Marsalis, a vibrant cultural diet that fuels their creative heartbeat.
  travel: Janet Kennedy embarks on spontaneous road trips—often mapping a last‑minute route from Ocean Springs to Nashville, Asheville, and the historic streets of New Orleans—favoring experiential pit‑stops
    over luxurious hotels, a travel habit shaped by a modest family budget and a desire to collect vivid stories for their improv material.
  culinary: Janet Kennedy experiments in the kitchen with Southern staples like shrimp‑and‑grits, gumbo, and collard greens seasoned with home‑grown okra, fresh basil, and rosemary, skillfully blending
    comfort flavors while occasionally leaving a simmering pot unattended to rush to an improv show, and they relish farmer’s‑market finds and spontaneous picnics on their garden patio.
  core: Janet Kennedy, a 57‑year‑old project‑design veteran who channels spontaneous creativity into community arts while juggling mild hypertension, impulsive spending on blues gigs, and a habit of misplacing
    paintbrushes in their garden, embodies a lively blend of imagination, sociability, and occasional deadline‑dodging.
background:
  cultural: Janet grew up in a middle‑class white family in the coastal region of Mississippi, where Southern hospitality, church community, and a deep appreciation for the arts shaped her worldview. Ocean
    Springs’ vibrant historic district, known for its murals, galleries, and annual art festivals, nurtured her early fascination with visual expression. The region’s blend of Gulf‑side traditions—seafood
    cuisine, blues music, and outdoor recreation—instilled a strong sense of place and community service. While she identifies with the broader Southern cultural values of warmth, storytelling, and resilience,
    her education background and career in project management have given her a progressive outlook that embraces diversity and innovative thinking.
