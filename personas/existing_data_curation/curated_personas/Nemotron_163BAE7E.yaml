  career_goals: Now that he’s retired from the formal workforce, Michael’s main ambition is to stay engaged and useful within his community. He aims to expand his volunteer involvement at the Coral Springs
    senior center, eventually leading a mentorship program for young adults interested in trades. He also hopes to turn his woodworking hobby into a modest side venture, selling handcrafted items at local
    markets and online. Additionally, Michael plans to deepen his photography skills to document the natural spaces of Broward County, with the long‑term goal of contributing a photo series to a regional
    environmental nonprofit.
