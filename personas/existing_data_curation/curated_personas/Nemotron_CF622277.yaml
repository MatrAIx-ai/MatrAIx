  career_goals: Sheng aims to secure a role that leverages his strategic thinking and people skills, such as a business analyst or product manager at a fast-growing tech startup. He is also considering
    launching his own e-commerce venture focused on niche Asian fashion accessories within the next two years. Long-term, he hopes to earn an MBA to deepen his leadership capabilities and eventually become
    a senior executive or founder who can blend innovative ideas with solid business models. He wants to demonstrate his competitive edge while improving his ability to meet deadlines and manage stress.
