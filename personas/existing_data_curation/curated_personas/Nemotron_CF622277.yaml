personas:
  professional: Sheng Yangco, a budding business analyst who thrives on rapid market research, data‑driven strategic planning, and persuasive presentations, leverages an outgoing, networking‑savvy style
    to win clients while constantly battling the temptation to sideline deadlines in fast‑moving tech startups.
  sports: Sheng Yangco, a regular on the pick‑up basketball courts at the 7th Street Recreation Center and a midfielder for the indoor soccer league at the Washington Sports Club, cheers for the Washington
    Wizards and DC United while fitting in weekly board‑game nights that keep the competitive spark alive.
  arts: Sheng Yangco, an avid karaoke enthusiast who belts out hits by BTS, Ariana Grande and Ed Sheeran, regularly catches live indie performances at the 9:30 Club and quotes lines from favorite shows
    like Stranger Things during board‑game nights, weaving pop culture into every social gathering.
  travel: Sheng Yangco, who prefers quick weekend getaways to nearby cities such as Philadelphia for its cheesesteak scene, Baltimore’s Inner Harbor and the Shenandoah Valley for hiking, and eagerly attends
    the Smithsonian Folklife Festival and DC Jazz Festival whenever budget and class schedules align, plans trips on a spur‑of‑the‑moment basis while balancing a limited student‑loan budget.
  culinary: Sheng Yangco, who channels a love for Asian street food by mastering dishes like tteokbokki, bao buns and takoyaki using gochujang, pork belly and tempura batter at home, balances kitchen experiments
    with frequent food‑truck crawls across the Washington‑DC metro, yet often forgets to clean the pantry after a binge of flavor‑heavy cooking sessions.
  core: Sheng Yangco is a socially magnetic, trend‑spotting strategist who thrives on spontaneous group fun, wrestles with deadline anxiety, and fuels life with gadgets, karaoke, street‑food experiments
    and impulsive weekend escapes.
background:
  cultural: Sheng is a second-generation Chinese-American raised in Montgomery County, Maryland. He grew up bilingual, speaking Mandarin and English at home, and celebrated traditional holidays such as
    Chinese New Year and the Mid-Autumn Festival with his family. The strong emphasis on education and respect for elders in his household shapes his disciplined side, while his American upbringing encourages
    independence, curiosity, and a willingness to explore new ideas. Living in the diverse suburbs of Maryland exposes him to a blend of cultures, fueling his interest in fusion cuisine, multicultural events,
    and the vibrant Asian community in the Washington-DC area.
