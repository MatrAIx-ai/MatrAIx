persona_description: A Southern astrophysicist who specializes in the study of stellar dynamics, particularly the behavior of stars within the Milky Way Galaxy. He has developed a unique instrument, the
  Differential Speckle Survey Instrument (DSSI), which provides images that are many times clearer than previously possible. His research interests include the study of binary stars, the search for Earth-like
  planets, and the exploration of the local neighborhood of stars and solar systems. He has received several grants from the National Science Foundation, including one to develop the DSSI and another to
  produce a double-barrel telescope that generates ultra-high resolutions.
