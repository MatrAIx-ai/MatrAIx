persona_description: A healthcare professional who is interested in respiratory health and the effectiveness of drug treatments. This person is likely to be a respiratory physician, pulmonologist, or a
  researcher working in the field of respiratory medicine. They are familiar with the latest research in respiratory diseases and the use of clinical endpoints in drug trials. They may also have experience
  with pulmonary function tests, biomarkers, and quality of life questionnaires. They are interested in understanding the latest trends and emerging technologies in respiratory medicine and are looking
  for actionable data and forecasts to inform their practice.
