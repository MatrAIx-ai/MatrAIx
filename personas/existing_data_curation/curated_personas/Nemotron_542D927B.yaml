  career_goals: Scot plans to enroll in a community college within a year to pursue an associate degree in accounting or information systems. He aims to earn a QuickBooks certification or a CompTIA A+ certification
    to enhance his employability. His short-term goal is to secure an entry-level position that offers clear structure, such as a data entry clerk, junior accountant, or IT support technician, preferably
    with remote or limited social interaction. In the longer term, he wants to become a senior analyst or operations manager, leading process-improvement initiatives for small to mid-size firms. He also
    envisions starting a freelance consulting side-business that helps local businesses automate workflows using Excel and Python. His ambition is driven by a desire for financial stability, measurable
    performance metrics, and the ability to work independently.
