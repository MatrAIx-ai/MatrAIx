    slime and simple chemistry experiments'', ''learning ukulele'']'
  career_goals: Michael dreams of becoming a concept artist or game designer who creates fantastical worlds for children and gamers. He hopes to attend a specialized arts high school, then study visual
    storytelling and interactive media in college. His long‑term ambition is to blend his love for drawing, storytelling, and technology to produce immersive animated films or video games that spark curiosity
    in other kids.
