personas:
  professional: Michael Roberson is an aspiring junior comic artist and budding game designer who channels his vivid imagination and love for fantasy creatures into creating detailed comic panels and Minecraft
    worlds, while his relaxed attitude toward deadlines lets him experiment freely, though occasional disorganization means he often forgets to label his sketches.
  sports: Michael Roberson is a member of the local Cedar Creek Youth Soccer League, cheers for the Chicago Cubs on baseball season, and spends weekends biking the nearby nature trails and attempting parkour
    moves in the playground, valuing the freedom of spontaneous play over structured training.
  arts: Michael Roberson devours the whimsical worlds of Hayao Miyazaki’s "Spirited Away," the bold line work of comic artist Jeff Smith, and the mythic storytelling of Neil Gaiman, often sketching fan
    art of dragons and robots while listening to the soundtrack of "The Legend of Zelda" for creative inspiration.
  travel: Michael Roberson dreams of exploring the towering red rocks of Sedona on a spontaneous family road trip, enjoys occasional weekend visits to the local science museum, and hopes to someday trek
    through the enchanted forests of Finland, preferring flexible itineraries that leave room for unexpected LEGO building sessions at rest stops.
  culinary: Michael Roberson favors cheesy pepperoni pizza, masterfully mixes homemade slime‑inspired sugar cookies with sprinkles of rainbow candy, and enjoys helping in the kitchen to craft simple ramen
    bowls flavored with soy sauce and sliced carrots, yet often forgets to finish their vegetables.
  core: Michael Roberson is a wildly imaginative ten‑year‑old who balances epic comic creations, spontaneous LEGO builds, and a love for nature, while letting a relaxed, sometimes disorganized, approach
    to responsibilities guide their playful yet earnest pursuit of creativity.
background:
  cultural: Michael is a white Anglo‑American child raised in Mendota, a small agricultural community in Fresno County, California. He celebrates typical American holidays like Thanksgiving, Fourth of July,
    and Christmas while also participating in local county fairs that showcase the region's farming heritage. Growing up near a diverse Latino neighbor base, he is familiar with Spanish greetings and enjoys
    multicultural foods at community events. His family values the close‑knit, outdoors‑oriented lifestyle of the Central Valley, encouraging both practical chores on the farm and free‑form creative expression.
