personas:
  professional: An aspiring junior engineer, Ronnie Ramsey, they translate the methodical logic of LEGO Technic into early design thinking, balancing curiosity with pragmatic organization in school science
    fairs and classroom projects.
  sports: A weekend explorer, Ronnie Ramsey, they play on the Clearfield Tigers youth soccer team in the fall, cheer for the Utah Jazz during winter broadcasts, and enjoy family hikes through the Wasatch
    foothills, treating each trek as a low-key cardio adventure.
  arts: An imaginative young creator, Ronnie Ramsey, they are captivated by the adventurous spirit of The LEGO Movie, the catchy pop of Taylor Swift's Love Story, and the vivid dinosaur illustrations in
    Dr. Mary Schweitzer's field guide, often reenacting scenes with homemade props during quiet playtime.
  travel: A small-world adventurer, Ronnie Ramsey, they love weekend family road trips to the geysers of Yellowstone and the vibrant streets of Salt Lake City, while daydreaming about a future visit to
    the dinosaur fossil beds of Dinosaur National Monument, though school schedules and parental guidance shape the rhythm of their travels.
  culinary: A budding kitchen assistant, Ronnie Ramsey, they favor crunchy carrot sticks, cheesy pizza bites, and the sweet zing of orange slices, can assemble a simple peanut-butter-banana sandwich with
    surprising dexterity, yet occasionally hoard extra LEGO pieces in the pantry as if they were snacks.
  core: Ronnie Ramsey, a quiet LEGO aficionado with a secret stash of extra bricks, balances relentless curiosity with a surprisingly pragmatic calm.
background:
  cultural: Ronnie grows up in Clearfield, Utah, a small city in Davis County characterized by a close‑knit community and a predominantly LDS (Church of Jesus Christ of Latter‑day Saints) cultural backdrop.
    His family observes many local traditions such as weekly church activities, community service projects, and outdoor family outings to the Wasatch foothills, which instill values of modesty, self‑reliance,
    and appreciation for nature. While his household is culturally rooted in the broader American white middle‑class milieu, it also emphasizes education, practical problem‑solving, and volunteerism, all
    of which shape his calm, resilient personality and his preference for small, familiar social circles.
