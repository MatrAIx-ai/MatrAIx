persona_description: A team of researchers and scientists from the Biotechnology and Biological Sciences Research Council (BBSRC) who specialize in the study of genetic diversity in crops, particularly
  focusing on the adaptation of tropical grasses to acidic soil conditions, the genomic and phenomic diversity of rice cultivars in Vietnam, and the global genetic diversity of biomass crops Miscanthus
  and sugarcane. They collaborate with plant breeders, researchers, and genebanks from other BBSRC institutes, CGIAR centres, and developing countries, and are open to new challenges and interesting projects
  and collaborations. They deliver capacity building and develop genomic approaches for breeding, working with breeders to ensure that their needs are met. They are contributing to feeding a changing world
  and aim to make farming more efficient through intensification and resilient management practices, maintaining or increasing production without compromising ecosystem services. Their research focuses
  on understanding the genetic differences in individuals from the same or closely-related species, identifying the genetic information that is most pertinent to crop breeding and management, and exploring
  the genomic and phenomic diversity of crops.
