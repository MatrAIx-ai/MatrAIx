personas:
  professional: An aspiring concept artist, Luc Rao channels their imaginative flair and spontaneous energy into digital illustrations for video games, leveraging Photoshop, GIMP, and a keyboard to craft
    lo‑fi‑infused mood boards that often evolve in the moment, and they often push aside deadlines in favor of creative flow.
  sports: A coastal teen with a love for kinetic play, Luc Rao spends weekends at the local skate park with the Corkscrew Skate Crew, drops into beach volleyball matches during summer, and cheers on the
    Tampa Bay Buccaneers, Miami Heat, and Florida Gulf Coast Eagles while they keep fitness light and spontaneous.
  arts: An eclectic art‑enthusiast, Luc Rao draws inspiration from Studio Ghibli’s dreamy animation, J Dilla’s lo‑fi beats, and Banksy’s street‑level commentary, and they channel these influences into digital
    concept sketches, improvised theatre scenes at the local youth theatre, and DIY installations crafted from reclaimed driftwood and seashells.
  travel: A wanderlust‑driven teen, Luc Rao prefers spontaneous road trips along the Gulf Coast to mangrove hideaways in the Everglades and sunsets in Key West, while they dream of a future backpack adventure
    through Japan’s art islands like Naoshima and the neon streets of Tokyo, all while balancing school commitments and a modest travel budget.
  culinary: A food‑focused teen, Luc Rao enjoys whipping up shrimp tacos with lime, cilantro, and sliced avocado, crafting simple mango sticky rice for late‑night study sessions, and experimenting with
    fresh basil pesto on homemade pizza, though they often rely on local food trucks for quick, flavorful meals.
  core: A sun‑kissed, sketch‑armed dreamer, Luc Rao flits between spontaneous art bursts and last‑minute deadline scrambles, fueled by lo‑fi beats, skate‑park thrills, and an unstoppable curiosity that
    they sometimes channel into unfinished projects.
background:
  cultural: Luc grew up in Cape Coral, a sun‑washed, water‑centric community on the Gulf of Mexico. The town’s laid‑back coastal lifestyle, access to canals, and vibrant tourism scene have nurtured his
    love for the outdoors, marine scenery, and a casual, open‑minded vibe. His family reflects typical Floridian middle‑class values, with roots in the Northeastern United States and occasional exposure
    to the multicultural flavors of nearby Hispanic and Caribbean communities. The blend of suburban suburbia, beach culture, and a growing arts scene in Southwest Florida shapes Luc’s worldview, giving
    him a relaxed yet inquisitive outlook.
