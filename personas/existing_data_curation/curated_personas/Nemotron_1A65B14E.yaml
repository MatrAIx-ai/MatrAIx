  career_goals: Luc dreams of turning his imagination into a professional career. He aims to study visual arts or game design at an art school or community college, eventually becoming a concept artist
    for video games or animation studios. He also wants to produce his own graphic novel and create multimedia content for platforms like YouTube or Twitch, blending storytelling, art, and music. His long‑term
    ambition is to build a freelance portfolio that lets him work on projects that challenge conventional aesthetics and inspire others.
