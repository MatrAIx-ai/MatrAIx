  career_goals: Javier aims to turn his informal handyman experience into a part‑time community service business focused on affordable home maintenance for seniors and low‑income families in Pompano Beach.
    He also wants to launch a neighborhood garden initiative that provides fresh produce, educational workshops, and a social hub for residents. Long‑term, he envisions serving on a local advisory board
    to influence city projects that enhance public spaces, promote cultural events, and improve access to affordable housing, all guided by his desire to give back and nurture community harmony.
