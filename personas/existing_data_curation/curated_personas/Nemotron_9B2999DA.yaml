  hobbies: '[''Visiting Art Galleries'', ''Painting and Watercolor'', ''Pottery'', ''Reading Historical Fiction'', ''Community Theater Participation'', ''Gardening'', ''Hiking in East Texas'', ''Cooking
    and Baking'', ''Volunteer Work at Senior Center'', ''Organizing Neighborhood Potlucks'']'
  career_goals: Mary aims to progress from her current secretary role to an Office Manager position within the next few years, seeking certification as a Certified Administrative Professional to solidify
    her credentials. She hopes to broaden her responsibilities to include community outreach and cultural programming, eventually managing a local art center or coordinating events for a nonprofit arts
    organization. Mentoring junior staff and fostering a collaborative workplace are important to her, as is blending her administrative expertise with her passion for the arts in a hybrid role that allows
    creative input while maintaining operational excellence.
