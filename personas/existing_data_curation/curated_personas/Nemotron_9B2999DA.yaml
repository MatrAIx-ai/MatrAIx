personas:
  professional: Mary Whitley leverages a decade of administrative mastery to streamline office operations while championing community arts programming, drafting eye‑catching flyers in Canva and mediating
    staff conflicts, even though their spontaneous streak sometimes makes strict deadlines feel like a loose suggestion.
  sports: Mary Whitley stays active by hiking the piney woods with the local Trailblazers Club, cheering on the Dallas Cowboys and the Texas Rangers on game nights, and occasionally joining a community
    softball league, though they prefer leisurely walks over competitive workouts.
  arts: Mary Whitley immerses themselves in creative pursuits, painting watercolors inspired by Georgia O’Keeffe’s desert palettes, sculpting pottery after watching Frida Kahlo documentaries, performing
    in community theater productions of Arthur Miller, and discussing historical fiction by Philippa Gregory at the book club while sipping coffee.
  travel: Mary Whitley favors spontaneous weekend getaways, frequently exploring Austin’s live‑music scene, a nostalgic road trip to New Orleans for jazz and gumbo, and a planned cultural tour of Florence’s
    Renaissance art galleries for the next year, balancing travel enthusiasm with a modest budget and family responsibilities.
  culinary: Mary Whitley excels at cooking Southern comfort food, perfecting peach cobbler with a buttery crust, slow‑cooking smoked brisket seasoned with paprika and garlic, and experimenting with homemade
    cornbread using stone‑ground cornmeal, while they occasionally over‑salt their collard greens in a burst of culinary zeal.
  core: Mary Whitley is a curiosity‑driven, sociable administrator who blends meticulous office stewardship with spontaneous artistic adventures, rarely sweats the small stuff, and can be found juggling
    a planner, paintbrush, and a potluck invitation in one busy afternoon.
background:
  cultural: Mary grew up in a small East Texas town, steeped in Southern hospitality and close‑knit community values. Her family’s roots trace back to generations of farmers and small‑business owners in
    Panola County, where church gatherings, county fairs, and communal potlucks were regular fixtures. She carries a love for regional comforts like fried catfish and collard greens, and an appreciation
    for country and blues music that often fills local venues. While honoring these traditions, Mary’s open‑minded curiosity pushes her to explore new ideas, art forms, and diverse experiences, blending
    the steady rhythm of her heritage with a forward‑looking, creative spirit.
attributes:
  skills: '[''Microsoft Office Suite'', ''Google Workspace'', ''Calendar Management'', ''Event Planning'', ''Customer Service'', ''Basic Bookkeeping'', ''Graphic Design (Canva)'', ''Interpersonal Communication'',
