persona_description: A theoretical physicist who specializes in the study of spintronics and has contributed to the development of efficient methods for manipulating the spin of electrons. He has worked
  on the spin Hall effect and has demonstrated the conversion of charge into spin current using an electric field. He is interested in exploring material systems in which the spin Hall effect is stronger
  and has plans to examine other III-V semiconductors for this application.
