persona_description: A microbiologist who is conducting research on the impacts of different surface finishes on the indoor microbiome, focusing on the relationship between antimicrobial chemicals and antibiotic
  resistance genes in dust. This project aims to answer the question of whether the presence of synthetic or natural antimicrobials in surface finishes selects for viable antibiotic-resistant microbes in
  the built environment. The results of this work will help understand how antibiotic resistance develops and spreads in the built environment, enabling consumers and manufacturers to make informed decisions
  about which materials to use in the built environment to promote desired microbial outcomes.
