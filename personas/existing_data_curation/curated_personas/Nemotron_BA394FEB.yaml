personas:
  professional: Ebonee Buchanan, a seasoned HR strategist with three decades of experience, leverages her practical mindset and data‑driven approach to design structured onboarding, diversity training,
    and compliance frameworks that reflect Miami’s multicultural workforce, while mentoring emerging women professionals and eyeing a senior HR leadership role.
  sports: Ebonee Buchanan stays active through gentle yoga sessions, weekly salsa dancing at a community center, and occasional pick‑up beach volleyball games in the summer, while cheering for the Miami
    Heat and the Miami Marlins as her favorite professional teams.
  arts: Ebonee Buchanan finds solace in the smooth sounds of Miles Davis, the soulful vocals of Nina Simone, and classic R&B icons like Marvin Gaye, while attending jazz nights at the historic Ball & Chain
    venue and exploring the vibrant street murals of Wynwood on weekend strolls.
  travel: Ebonee Buchanan enjoys carefully planned trips that blend cultural immersion and relaxation, such as a culinary tour of Jamaica’s spice markets, a historic walk through Lisbon’s Alfama district,
    and weekend getaways to the Bahamas for sunrise yoga on the beach, while dreaming of a future solo retreat in Bali’s rice terraces.
  culinary: Ebonee Buchanan, a confident home cook, blends Afro‑Caribbean flavors into dishes like jerk‑spiced chicken with callaloo, coconut‑lime rice, and plantain‑infused succulents, often seasoning
    with fresh lemongrass, thyme, and Scotch bonnet peppers while hosting intimate dinner parties for close friends.
  core: Ebonee Buchanan balances a structured HR career and meticulous budgeting with a love for spontaneous salsa nights, rooftop gardening, and a lingering worry that fuels both her meticulous planning
    and occasional forgetfulness.
background:
  cultural: Ebonee was raised in a middle‑class African‑American family in Miami, where the city’s vibrant multicultural tapestry left a lasting imprint. Her parents, originally from the Southern United
    States, emphasized education, community service, and the importance of cultural pride. Growing up near Little Haiti and Overtown, she absorbed Caribbean rhythms, cuisine, and traditions, which she celebrates
    through her cooking and music preferences. She participated in her college’s Black women’s sorority, Alpha Kappa Alpha, fostering a lifelong network of professional and civic engagement. Her faith,
    rooted in the Baptist tradition, provides a source of resilience, while her active involvement in local Black business associations reflects a commitment to economic empowerment and mentorship within
    the African‑American community.
