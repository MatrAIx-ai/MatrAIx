  career_goals: Ebonee aims to transition into a senior HR leadership role within the next three years, such as HR Director or Vice President of Human Resources, where she can shape strategic workforce
    planning and embed a culture of employee well‑being. She seeks to earn the SHRM Senior Certified Professional (SHRM‑SCP) credential to validate her expertise. Additionally, she wants to mentor emerging
    HR professionals, especially women of color, and to design a comprehensive mental‑health support program for employees, reflecting her own experiences with stress. In the longer term, she hopes to consult
    part‑time after retirement, focusing on helping small businesses in Miami establish robust HR frameworks.
