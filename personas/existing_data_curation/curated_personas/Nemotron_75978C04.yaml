personas:
  professional: Todd Sonnier, a budding preschool storyteller and block‑building architect, weaves imaginative narratives while arranging colorful towers, showcasing early leadership, curiosity, and a love
    for unconventional ideas.
  sports: Todd Sonnier, a lively kindergarten soccer enthusiast, proudly dons the jersey of the River City Runners, plays in the Tiny Tykes neighborhood soccer league, and splashes with joy in the after‑school
    swimming club at the community pool.
  arts: Todd Sonnier, an avid collector of bright picture books, delights in the whimsical illustrations of Eric Carle, sings along to Sesame Street’s Elmo, and frequently reenacts scenes with crayons and
    stuffed animals, letting their imagination paint their world.
  travel: Todd Sonnier loves family road trips to the seaside town of Ocean View, where they watch gulls from the car window, and dreams of visiting Disney World in Orlando to meet Mickey Mouse and explore
    the Magic Kingdom.
  culinary: Todd Sonnier, a self‑proclaimed mac‑and‑cheese connoisseur, relishes buttery macaroni with cheddar, sips strawberry‑banana smoothies made with fresh berries, and can spread peanut butter on
    toast all by themselves, though they shyly avoid broccoli unless it’s doused in cheese sauce.
  core: Todd Sonnier is a curious, sticker‑hoarding dynamo who asks endless why’s, leaves crayon trails across every surface, and can’t resist the sparkle of new toys, even when they’re hidden under the
    couch.
background:
  cultural: Todd is a white American raised in Knoxville, Tennessee, where Southern hospitality and Appalachian traditions blend with modern city life. His family celebrates holidays like Thanksgiving and
    Christmas and often participates in community events such as the Dogwood Arts Festival, exposing him to folk music, regional crafts, and outdoor activities. Local parks, nature walks, and school‑based
    art programs nurture his appreciation for nature, group interactions, and creative expression.
