personas:
  professional: Ashley Lothan is an early childhood education administrator who blends data‑driven curriculum design with a hands‑on love for the outdoors, using curiosity and a practical, flexible mindset
    to embed STEM and sustainability into learning spaces while navigating grant proposals with a relaxed, often improvisational approach.
  sports: Ashley Lothan is an avid trail runner and kayaker who trains with the Bend Trail Runners Club, follows the Oregon State Beavers and the Portland Timbers, and squeezes in weekend hikes in the Cascades
    while still finding room for a monthly yoga class to balance flexibility.
  arts: Ashley Lothan enjoys board‑game nights and curates a modest collection of indie vinyl, favoring The Decemberists, Sufjan Stevens, and local folk singer‑songwriter gatherings, while drawing creative
    inspiration from popular science reads by Neil deGrasse Tyson and occasional watercolor sketching of river valleys.
  travel: Ashley Lothan plans trips with a blend of spontaneity and a rough itinerary, having explored Crater Lake, Iceland’s volcanic landscapes, and a weekend backpacking in the Canadian Rockies, and
    they dream of a sustainable eco‑tour of New Zealand’s South Island once their graduate program funding solidifies.
  culinary: Ashley Lothan cooks farm‑to‑table meals with garden‑fresh veggies, often whipping up pan‑seared salmon with dill and wild mushroom risotto, and they delight in brewing their own sourdough starter
    while occasionally splurging on a farm‑directed cheese board at local food festivals.
  core: Ashley Lothan is a curiosity‑driven early‑education strategist who can lose track of paperwork but never forget the perfect trail‑run sunrise photo, balancing nature, data, and community with a
    habit of occasionally over‑packing their backpack.
background:
  cultural: Ashley comes from a white American family with deep roots in the Pacific Northwest, tracing ancestry to German and Irish immigrants. Raised in a suburban environment near Bend, she grew up immersed
    in the region's outdoor culture and community‑oriented values. Her upbringing emphasized education, environmental stewardship, and service, fostering an appreciation for nature and a respect for the
    Indigenous peoples of the area, particularly the Confederated Tribes of Warm Springs.
attributes:
  skills: '[''Educational administration'', ''Curriculum development'', ''Child development'', ''Data analysis'', ''Program evaluation'', ''Grant writing'', ''Technology integration'', ''Budget management'',
    ''Regulatory compliance'', ''Team coordination'', ''Conflict resolution'', ''First aid and CPR'', ''Community outreach'']'
  hobbies: '[''Hiking'', ''Kayaking'', ''Trail running'', ''Gardening'', ''Reading popular science'', ''DIY crafts'', ''Community volunteering'', ''Cooking farm-to-table meals'', ''Journaling'', ''Attending
    local live music events'', ''Playing board games'']'
  career_goals: Ashley aims to become a director of a forward-thinking early childhood education center that emphasizes STEM exploration and sustainability. She plans to pursue a master's degree in Education
    Leadership to strengthen her strategic and policy expertise. Long‑term, she envisions leading district‑wide initiatives to embed hands‑on science curricula, securing grant funding for green‑focused
    learning spaces, and mentoring emerging educators while advocating for equitable early childhood policies in Oregon.
