  career_goals: Mariacecilia aims to pioneer a hybrid program that weaves narrative medicine and visual arts into everyday clinical practice, fostering deeper empathy and patient engagement. She aspires
    to secure a faculty position at a medical school where she can develop curricula that emphasize creativity, holistic care, and interdisciplinary research. Long‑term, she envisions leading community
    health initiatives in Pittsburgh that use artistic expression to improve mental well‑being and chronic disease management, while also publishing research on the therapeutic impact of art in medicine.
