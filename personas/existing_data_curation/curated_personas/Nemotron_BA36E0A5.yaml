  career_goals: Donald aims to become a curriculum coordinator or instructional coach within his district, leveraging his passion for innovative yet practical teaching methods. He plans to pursue a Doctor
    of Education (Ed.D.) to deepen his expertise in educational psychology and to influence school-wide policies that prioritize student well‑being and mental health. In the next five years, he hopes to
    mentor new teachers, lead professional development workshops, and spearhead a district‑wide project‑based learning initiative that balances creativity with measurable outcomes.
