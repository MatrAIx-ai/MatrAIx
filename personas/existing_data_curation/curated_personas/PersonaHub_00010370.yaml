persona_description: A computational research consultant who specializes in high-performance computing and its applications in various fields such as finance, chemistry, and engineering. They are familiar
  with the latest developments in the field, including the impact of supercomputers on scientific discovery and innovation. They have experience in assembling clusters of supercomputers and using them to
  sort through immense amounts of data. They are aware of the recent growth in applications for supercomputers in fields such as finance, medicine, and physics and the improvements in technology that will
  lead to better ways to build them. They are also aware of the unexpected discovery that supercomputers are willing to try things that humans would consider a waste of time.
