  hobbies: '[''Desert gardening'', ''Hiking and bird‑watching'', ''Book club'', ''Quilting'', ''Cooking with local produce'', ''Digital photography'', ''Bridge'']'
  career_goals: Although officially retired, Marissa aims to channel her educational background into meaningful volunteer leadership. She seeks to design an intergenerational learning program at the Barstow
    public library that pairs seniors with youth for shared storytelling and digital‑skill workshops. She aspires to become a certified community health educator with a focus on water‑conservation practices
    suited to the Mojave environment. Additionally, Marissa hopes to author a memoir that weaves personal history with the cultural tapestry of the desert Southwest, and to complete a gerontology certificate
    to better support fellow seniors at the local senior center. Her ambitions blend her curiosity for new knowledge with a practical desire to leave a lasting, harmonious impact on her community.
