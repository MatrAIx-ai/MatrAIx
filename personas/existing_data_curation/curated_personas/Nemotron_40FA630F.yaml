  hobbies: '[''Golf'', ''Bridge'', ''Volunteering with the historical society'', ''Gardening'', ''Woodworking'', ''Reading historical nonfiction'', ''Cooking and recipe experimentation'', ''Landscape photography'',
    ''Crossword puzzles'']'
  career_goals: Tyler aims to transition from day‑to‑day advising to a mentorship role, guiding younger advisors within his firm while preserving a legacy of client‑centric service. He plans to launch a
    boutique advisory practice focused on intergenerational wealth transfer for families in Bucks County and to author a practical guide on navigating retirement and estate planning for high‑net‑worth seniors.
    Additionally, he seeks to strengthen community financial literacy by partnering with local schools and senior centers.
