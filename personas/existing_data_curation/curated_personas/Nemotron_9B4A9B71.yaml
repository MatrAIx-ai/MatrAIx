personas:
  professional: Jose Cruz is a bilingual mechanically inclined teen who thrives on the predictable routine of tool‑laden workshops while also improvising on the fly when car diagnostics throw curveballs,
    balancing a love for structure with a competitive edge that drives them toward an automotive apprenticeship.
  sports: Jose Cruz is a forward for the Rio Grande Youth Soccer Club, training three times weekly under a disciplined schedule while also skateboarding at the local park, cheering for the El Paso Locomotive,
    and they channel their competitive spirit into every match despite occasional lapses in organization that cause missed practice.
  arts: Jose Cruz cruises the neighborhood on a skateboard blasting norteño hits from Los Tigres del Norte and Banda El Recodo, they produce quick‑cut video edits of gaming highlights for YouTube, and occasionally
    join family jam sessions on a second‑hand accordion during community festivals.
  travel: Jose Cruz plans weekend fishing trips along the Rio Grande, dreams of attending the historic music festivals in San Antonio, and harbors a wish to experience Tokyo’s neon streets during an eSports
    competition, balancing family responsibilities with a yearning for adventure.
  culinary: Jose Cruz helps prep traditional corn‑based tamales and grilled fish for local festivals, they enjoy cooking carne asada tacos with fresh cilantro and lime, and experiment with a homemade nacho
    bar topped with jalapeños and queso while perfecting late‑night ramen after gaming marathons.
  core: Jose Cruz is a structure‑loving, competition‑driven teen who juggles soccer, gaming, and a budding auto‑tech career, often trading disciplined routines for spontaneous problem‑solving, and occasionally
    neglects organization when the thrill of the next level calls.
background:
  cultural: Jose grows up in Mission, Texas, a border town steeped in Mexican‑American culture. His household blends traditional Mexican customs—such as celebrating Día de los Muertos, enjoying homemade
    tamales, and attending church services—with the everyday realities of life in a bilingual, bicultural community. Family ties are strong; weekend gatherings often revolve around shared meals, music,
    and stories passed down from grandparents who immigrated from Mexico. The proximity to the border fosters a sense of fluid identity, where he navigates both Mexican heritage and American influences,
    shaping his worldview, language use, and social interactions.
