  career_goals: Jose aims to earn his GED within the next two years and then pursue an apprenticeship as an automotive technician, leveraging his hands‑on mechanical skills. Simultaneously, he dreams of
    playing soccer at a varsity level and, if his talent continues to develop, exploring the possibility of a scholarship or a semi‑professional career. He also nurtures a competitive streak in eSports,
    hoping to qualify for regional tournaments in games like FIFA and first‑person shooters. In the longer term, he envisions starting a small side business offering car detailing services for his community,
    providing a steady income while supporting his family.
