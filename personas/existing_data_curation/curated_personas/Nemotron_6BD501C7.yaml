personas:
  professional: Sabas Ramirez, a 27‑year‑old community‑service program manager with a graduate degree in education, merges bilingual fluency and eight years of grant‑writing, budget oversight, and crisis‑intervention
    experience to build routine‑driven yet flexible curricula, while their skeptical, competitive mindset constantly pushes for measurable outcomes that outpace regional benchmarks.
  sports: Sabas Ramirez enjoys weekly hikes on Story County trails, practices yoga and guided meditation for stress relief, and follows the Iowa Hawkeyes football team and Des Moines Menace soccer club
    while occasionally joining a local adult softball league, balancing a love for solitary outdoor exercise with occasional team‑oriented play.
  arts: Sabas Ramirez engages creatively through a monthly knitting circle, newly started pottery classes, and a steady rotation of mystery novels by Agatha Christie and historical fiction by Hilary Mantel,
    while their artistic palate includes listening to Sufjan Stevens, watching films by Hayao Miyazaki, and admiring paintings by Georgia O'Keeffe, weaving together literary, visual, and musical inspiration
    into their leisure time.
  travel: Sabas Ramirez prefers carefully planned road trips that mix cultural festivals—like the Iowa State Fair and a summer jazz event in New Orleans—with nature getaways to the Badlands, balancing the
    thrill of new experiences with the comfort of a familiar itinerary, and they dream of a future pilgrimage to the Camino de Santiago when finances allow.
  culinary: Sabas Ramirez delights in preparing homemade tamales and mole using heirloom corn and locally sourced chilies from Iowa farmers markets, experiments with farm‑to‑table ingredients like heirloom
    tomatoes and artisanal cheese, yet their perfectionist streak sometimes leads to over‑salting or overly ambitious batch sizes that spill onto the kitchen floor.
  core: Sabas Ramirez is a routine‑loving, detail‑driven community program leader who battles intense anxiety with yoga, occasionally overindulges in elaborate cooking projects, and fiercely competes to
    turn data‑rich programs into award‑winning models.
background:
  cultural: Sabas is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains strong ties to Mexican traditions,
    celebrating Día de los Muertos, Día de la Candelaria, and other holidays with communal meals and music. These cultural practices instilled a deep sense of family solidarity and communal responsibility,
    which she channels into her professional work. While adapting to life in Ames, Iowa, she blends Mexican values of hospitality and respect for elders with Midwestern pragmatism, creating a unique perspective
    that informs her community‑service approach. Her Catholic upbringing also contributed to a ethic of service and compassion, and she remains active in her local parish's outreach programs.
attributes:
  skills: '["Program development", "Curriculum design", "Grant writing", "Budget management", "Data analysis and performance evaluation", "Bilingual communication (Spanish/English)", "Community outreach",
    "Crisis intervention", "Case management", "Team leadership and mentorship", "Conflict resolution", "Stakeholder engagement", "Risk assessment", "Process improvement", "Strategic planning"]'
  hobbies: '["Traditional Mexican cooking", "Reading mystery and historical fiction", "Gardening", "Hiking local trails", "Yoga and guided meditation", "Attending cultural festivals", "Volunteering at the
    local food bank", "Knitting", "Listening to regional music", "Pottery classes"]'
  career_goals: Sabas aims to advance to a regional director role overseeing multiple community‑service agencies, where she can shape policy and secure sustainable funding for culturally responsive programs.
    She aspires to design a statewide initiative that integrates educational support with mental‑health services for Mexican‑American families in the Midwest, leveraging her expertise in curriculum development
    and grant acquisition. In the longer term, she envisions earning a doctorate in community education to become a recognized thought leader and advocate for evidence‑based, culturally competent practices.
    Personally, she seeks to deepen her trauma‑informed care certification and develop stronger self‑care strategies to manage her heightened emotional reactivity while maintaining high professional standards.
