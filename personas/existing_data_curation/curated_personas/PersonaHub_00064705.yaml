persona_description: A scientist who is interested in the field of veterinary medicine and has expertise in molecular virology. They are particularly interested in the use of pig oral fluid (OF) as a diagnostic
  tool for different pathogens, such as Porcine Reproductive and Respiratory Syndrome Virus (PRRSV), Porcine Circovirus Type 2 (PCV2), and Hepatitis E virus (HEV). They are interested in studying the detection
  of these viruses in OF, feces, and serum from different pig categories, and how the use of pooled samples can potentially be used to investigate viral presence on farms. They are likely to be involved
  in research projects related to the use of OF for molecular diagnosis and have a background in molecular virology.
