persona_description: A professional engineer who specializes in water treatment systems, specifically in the use of disinfectants to inactivate pathogens. They are responsible for conducting tracer studies
  to accurately determine the effective contact time pathogens have with disinfectant to calculate log inactivation. They are also responsible for using theoretical baffling factors that are representative
  of current operation to determine log Giardia inactivation for compliance with Pennsylvania Safe Drinking Water Regulations. They may also be responsible for submitting a new tracer study using the instructions
  and form for Public Water System Tracer Study Demonstration (3940-FM-BSDW0023) found in DEP's eLibrary.
