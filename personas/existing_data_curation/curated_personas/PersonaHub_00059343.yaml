persona_description: A historian who specializes in the study of ancient Indian religions and their impact on social structures, particularly those related to the role of women in temple rituals and services.
  She is interested in the evolution of the image of the devadasi, the social and economic dynamics of temple women, and the changing role of women in the context of the decline of the Chola state. Her
  research is informed by a deep understanding of ancient Indian texts and archaeological evidence, and she is skilled in the use of historical analysis and comparative methods to understand the complexities
  of ancient Indian societies.
