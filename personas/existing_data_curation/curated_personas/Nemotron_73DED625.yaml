  hobbies: '[''Visiting contemporary art galleries'', ''Digital illustration'', ''Reading sci‑fi & cyber‑punk novels'', ''Participating in local hackathons'', ''Running 5K races'', ''Playing piano (jazz
    improvisation)'', ''Mentoring high‑school coders'', ''Listening to jazz & hip‑hop'', ''Exploring coffee shops in Brockton'', ''Collecting vintage vinyl records'']'
  career_goals: Latashia aims to transition into a technical leadership role within the next three years, targeting positions such as software architect or engineering manager where she can guide cross‑functional
    teams in delivering high‑impact products. She is especially interested in building tools that blend technology with creative expression, like AI‑driven art platforms. To support this trajectory, she
    plans to earn an AWS Solutions Architect certification, contribute to open‑source projects, and secure a patent for an innovative data‑visualization algorithm. Long‑term, she envisions launching her
    own startup that empowers underrepresented creators in the digital economy and becoming a frequent speaker at conferences focused on diversity and innovation in tech.
