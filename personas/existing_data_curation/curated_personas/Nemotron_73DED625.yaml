personas:
  professional: Latashia Glenn, a 31‑year‑old full‑stack developer, leverages Python, JavaScript (React, Node.js), and Java to build cloud‑native applications on AWS, Docker, and Kubernetes, while her love
    for contemporary art drives a meticulous focus on UI/UX accessibility and her competitive, skeptical nature pushes her to champion test‑driven development and architecture leadership within cross‑functional
    teams.
  sports: Latashia Glenn channels her stress relief through weekly 5K runs with the City Runners Club, follows the New York Knicks for basketball excitement, cheers for the Seattle Seahawks during football
    season, and dabbles in indoor rock climbing during winter months to keep her competitive edge sharp.
  arts: Latashia Glenn immerses herself in contemporary art by frequenting galleries featuring artists like Yayoi Kusama and James Turrell, sketches digital illustrations inspired by those shows, curates
    a vinyl collection that includes Miles Davis and J Dilla, and draws creative inspiration from cyber‑punk literature to inform her UI designs.
  travel: Latashia Glenn prefers meticulously planned trips that blend tech conferences with cultural immersion, having recently explored the neon streets of Tokyo for a hackathon and the street‑art districts
    of Berlin for gallery tours, while weekend getaways to Asheville’s Blue Ridge Mountains satisfy her love of nature and low‑budget adventure.
  culinary: Latashia Glenn enjoys experimenting with fusion cuisine, often cooking ramen‑styled bowls with miso‑marinated jackfruit tacos, seasoning dishes with truffle oil and Szechuan pepper, and she
    favors pairing meals with vintage vinyl records of Thelonious Monk to create a multisensory dining experience.
  core: Latashia Glenn is a 31‑year‑old tech‑savvy artist who balances competitive coding with eclectic vinyl collecting, disciplined finance habits, and solo runs, all while quietly plotting a future startup
    that amplifies underrepresented creators.
background:
  cultural: Latashia was raised in Brockton, Massachusetts, in a close‑knit African‑American family that emphasized education, resilience, and community involvement. Her grandparents were active participants
    in the local church and civil‑rights initiatives, instilling a deep sense of pride in her heritage. Growing up, she absorbed a rich tapestry of Black cultural expression—from gospel choirs and soul
    music to spoken‑word poetry and street art—which continues to shape her worldview. Throughout college and her early career, she sought mentorship from Black women engineers and became involved with
    organizations like /dev/color and Black Girls Code, reinforcing her commitment to increasing representation in technology. Her cultural identity informs her artistic interests and her drive to create
    inclusive digital experiences.
