  hobbies: '[''Bird watching'', ''Nature photography'', ''Reading (historical fiction, art history)'', ''Visiting art galleries'', ''Gardening (native plants)'', ''Vintage film camera tinkering'', ''Photo
    editing (Photoshop)'', ''Journaling'', ''Mindfulness meditation'']'
  career_goals: As he nears retirement, Mahir aims to transition into a low‑stress, part‑time or remote administrative role that leverages his office expertise while freeing up time for personal passions.
    He plans to obtain a short‑term certification in bookkeeping or records management to increase his eligibility for freelance data‑entry or remote clerical projects. In addition, he hopes to volunteer
    as an administrative aide or docent at a local art gallery or historical society, combining his love of art with his organizational strengths. Ultimately, his ambition is to secure financial stability,
    reduce daily stress, and create a balanced lifestyle that blends modest work responsibilities with his creative and solitary interests.
