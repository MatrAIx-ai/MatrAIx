personas:
  professional: Javier Ansoategui leverages their detail‑oriented, structure‑loving mindset to excel as a dining attendant, using precise inventory tracking, calm conflict resolution, and strategic upselling
    while pursuing a shift‑supervisor role and a Certified Food Protection Manager credential.
  sports: Javier Ansoategui dedicates evenings to weightlifting at the local Iron Forge Gym, follows the New England Patriots and Boston Red Sox loyally, and joins a weekend fishing club that meets at the
    Connecticut shoreline, combining competitive training with calm outdoor pursuits.
  arts: Javier Ansoategui immerses themselves in strategic nonfiction by authors like Malcolm Gladwell and Sun Tzu, enjoys board‑game evenings featuring titles such as Terraforming Mars, and relaxes to
    the music of Sufjan Stevens and Neil Young while occasionally attending productions at the Old Saybrook Playhouse.
  travel: Javier Ansoategui prefers meticulously planned getaways, having explored Block Island, Cape Cod, and a weekend retreat in the White Mountains, while dreaming of a structured trek through the Scottish
    Highlands and always traveling with their spouse to maintain both adventure and financial prudence.
  culinary: Javier Ansoategui perfects classic New England seafood dishes—clam chowder, lobster roll, and baked cod with lemon butter—using fresh clams, lobster, and local herbs, and applies their mixology
    skills to craft an Old Fashioned with rye and Angostura bitters as a personal signature.
  core: Javier Ansoategui is a methodical, anxiety‑prone hospitality professional who finds order through weightlifting, journaling, and the precise preparation of New England cuisine.
background:
  cultural: A white New Englander whose family roots trace back to Irish and Italian immigrants who settled in Connecticut in the early 20th century. He grew up in Groton, surrounded by the maritime and
    military culture of the Naval Submarine Base, which imparted a respect for order, routine, and community service. His upbringing included traditional holiday celebrations such as Thanksgiving, Christmas,
    and St. Patrick’s Day, and he maintains a connection to local Catholic parish life, though he is more pragmatic than devout. The regional blue‑collar work ethic and the close‑knit small‑town atmosphere
    influence his values of reliability, structure, and practical achievement.
attributes:
  skills: '[''Customer Service'', ''Food Safety & Sanitation'', ''POS System Operation'', ''Cash Handling'', ''Inventory Management'', ''Basic Mixology'', ''Shift Scheduling'', ''Time Management'', ''Conflict
