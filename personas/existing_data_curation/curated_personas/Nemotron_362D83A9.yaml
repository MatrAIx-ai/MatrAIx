  hobbies: '[''Reading Nonfiction'', ''Strategy Games'', ''Weightlifting'', ''Fishing'', ''Hiking'', ''Home Cooking'', ''Board-Game Nights'', ''Journaling'', ''Guided Meditation'']'
  career_goals: He aims to advance from his current attendant role to a shift supervisor within the next two years, and eventually become a restaurant or bar manager of a mid‑size establishment in the Greater
    New London area. He plans to obtain a Certified Food Protection Manager (CFPM) credential and may enroll in a community‑college hospitality program to strengthen his management knowledge. Long‑term,
    he dreams of opening a small, family‑run café that emphasizes a structured, predictable service model and offers a stable work environment for his own staff. He is motivated by the desire for financial
    security for his wife and future children, while maintaining a clear career path that minimizes uncertainty.
