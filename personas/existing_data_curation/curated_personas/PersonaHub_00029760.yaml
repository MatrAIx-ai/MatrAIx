persona_description: A scientist or researcher who is interested in environmental chemistry, particularly in the study of lead poisoning and its effects on human health. They are also interested in new
  and innovative analytical methods for measuring lead in water and other aqueous samples. They appreciate the use of advanced mass spectrometry techniques and are familiar with the advantages of ambient
  mass spectrometry methods like EESI. They are also interested in the potential for EESI to be applied to a wide range of complex matrices and the potential for it to provide a non-invasive method for
  measuring lead in water and other samples.
