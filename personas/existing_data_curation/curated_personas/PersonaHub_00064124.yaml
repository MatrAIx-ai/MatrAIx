persona_description: Cay Holbrook is an Associate Professor of Special Education at the University of British Columbia in Vancouver, British Columbia, in Canada. He is an expert in literacy education and
  has extensive experience in teaching and researching how parents and family members can support their child's literacy skills at home. Holbrook's expertise is based on his research and teaching in the
  field of special education, particularly in the areas of early literacy development and the role of parents in supporting their child's learning. He is known for his approachable and informative style,
  and his insights into the importance of parents in the acquisition of literacy skills.
