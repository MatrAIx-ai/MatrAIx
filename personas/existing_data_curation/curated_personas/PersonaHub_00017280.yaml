persona_description: A historian and architect, who specializes in the study of Islamic and medieval architecture, particularly the design and decoration of hospitals and medical schools. His research interests
  include the comparative analysis of Islamic and European hospital architecture, the influence of Islamic architectural motifs on European Renaissance hospitals, and the role of Seljuk military ambulant
  hospitals in the dissemination of Islamic architectural styles to Europe. He is also interested in the history of medical education and the development of medical schools in the Islamic world.
