  career_goals: Jennifer aims to advance from a skilled assembler to a leadership role within the manufacturing floor. Over the next five years she plans to obtain a Certified Production Technician (CPT)
    credential and complete an associate degree in manufacturing technology to deepen her technical knowledge. She aspires to become a shift supervisor or continuous‑improvement coordinator, where she can
    apply her organized, detail‑oriented style to streamline workflows, reduce waste, and enhance product quality. Long‑term, she envisions launching a small custom metal‑fabrication workshop with her husband,
    leveraging her expertise to serve niche markets while maintaining a balanced, low‑stress work environment.
