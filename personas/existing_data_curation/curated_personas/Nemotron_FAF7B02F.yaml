  career_goals: Although she is only 11, Liliam already aims to excel academically and earn a place in a competitive high‑school program that emphasizes science and engineering. She dreams of becoming a
    biomedical engineer or a veterinarian, motivated by her love for practical, hands‑on problem solving and her curiosity about how living organisms work. In the short term, she wants to win her school’s
    math competition, achieve top grades in her classes, and earn a leadership role in the science club, all while maintaining the steady routine that helps her feel secure and successful.
