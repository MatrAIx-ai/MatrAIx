personas:
  professional: An organized young strategist, Liliam Schneider translates her love for structured games into early STEM pursuits, excelling in chess tournaments, constructing intricate LEGO models, and
    conducting precise experiments in her school’s science club, all while maintaining a disciplined routine and a competitive edge that drives them to master each challenge methodically, and they take
    pride in the steady improvements.
  sports: A diligent swimmer, Liliam Schneider attends the community pool two evenings a week, practicing freestyle laps and joining the local youth swim club that competes in regional meets, while also
    cheering for the Washington Capitals and the Baltimore Orioles, balancing structured training with a competitive spirit that pushes them to improve lap times.
  arts: A budding pianist, Liliam Schneider practices scales daily under the watchful eye of their piano teacher, often pairing sessions with listening to Mozart’s Piano Sonatas and the modern pop tunes
    of Shawn Mendes, while also immersing themselves in the mystery series of Nancy Drew, which fuels their love for narrative rhythm and creative expression.
  travel: An enthusiastic explorer, Liliam Schneider has journeyed to a historic European capital to visit extended family during a summer holiday, explored the Smithsonian museums in Washington, D.C.,
    and dreams of trekking the streets of Barcelona’s Gothic Quarter, favoring meticulously planned itineraries that balance family-friendly activities with the thrill of discovering new cultures.
  culinary: A meticulous junior chef, Liliam Schneider loves preparing tortilla española with potatoes, eggs, and olive oil, and blending chilled gazpacho with ripe tomatoes, cucumbers, and garlic, often
    mastering the precise timing of each ingredient while occasionally sneaking extra chocolate chips into batch cookies, reflecting their practical cooking approach peppered with playful indulgence.
  core: Liliam Schneider, an 11‑year‑old, thrives on routine, channels competitive energy into chess and LEGO mastery, delights in family‑cooked tapas‑style meals, and navigates childhood with a healthy
    dose of skeptical curiosity, occasionally indulging in snack splurges that they justify as rewards.
background:
  cultural: Liliam’s family is of Spanish heritage, and she grows up speaking both Spanish and English at home. The household maintains cultural traditions such as celebrating Día de los Reyes, enjoying
    tapas gatherings, and observing Spanish holidays with family meals and music. She participates in a local Hispanic community event each summer, where she learns traditional dances and songs. While attending
    school in Odenton, MD, she blends these cultural roots with American customs, embracing the diverse community around her while preserving her bilingual abilities and a strong sense of family connection.
