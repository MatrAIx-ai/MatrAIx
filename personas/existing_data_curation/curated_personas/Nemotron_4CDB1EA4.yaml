personas:
  professional: Ronald West is a budding junior inventor who spends afternoons redesigning LEGO Boost robots and sketching comic‑style science concepts, they channel a blend of curiosity and practical problem‑solving
    while happily tolerating the occasional disarray of unfinished projects.
  sports: Ronald West plays on the Riverside Rovers youth soccer team, cheers for the Los Angeles Dodgers and the LA Galaxy, and enjoys exploring the local skate park on weekends, they prefer low‑pressure
    fun over strict training schedules.
  arts: Ronald West devotes free time to drawing comic strips inspired by Stan Lee’s dynamic heroes and Hayao Miyazaki’s whimsical worlds, they listen to the soundtrack of 'Star Wars' and collect limited‑edition
    LEGO Art pieces from the 'Star Wars' series.
  travel: Ronald West loves weekend trips to Joshua Tree National Park to hunt for unique rocks, enjoys family outings to the San Diego Zoo, and dreams of an adventure to Tokyo's Ghibli Museum, they prefer
    a spontaneous itinerary that balances nature hikes with a splash of pop‑culture excitement.
  culinary: Ronald West favors cheesy pepperoni pizza, nachos topped with jalapeños and guacamole, and builds DIY trail mix with almonds, raisins, and chocolate chips, they occasionally try to assemble
    simple microwave mug‑cakes under Mom's watchful eye.
  core: Ronald West is a curious, flexible nine‑year‑old who blends hands‑on science play with modest savings habits, solo adventures, and a love for comics and pizza, they stay relaxed about rules and
    thrive in small‑group projects.
background:
  cultural: Ronald grows up in a white, middle‑class family in Riverside, California. His household follows typical American cultural practices, celebrating holidays such as Thanksgiving, Fourth of July,
    and Christmas, and participating in community events at his elementary school and local parks. The diverse environment of Riverside exposes him to a variety of foods, languages, and traditions, fostering
    an appreciation for multiculturalism while his family maintains a pragmatic, independence‑valuing ethos rooted in broader American heritage. His parents encourage curiosity, hands‑on learning, and practical
    problem solving, shaping his outlook and daily routine.
attributes:
  skills: '[''LEGO building and design'', ''Scratch visual programming'', ''Reading comprehension'', ''Multi‑step arithmetic problem solving'', ''Observational science skills'', ''Small‑group collaboration'']'
