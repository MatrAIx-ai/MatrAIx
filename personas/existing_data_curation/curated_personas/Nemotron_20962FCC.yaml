  hobbies: '[''reading historical fiction'', ''personal‑finance literature'', ''cooking'', ''gardening'', ''yoga'', ''meditation'', ''hiking'', ''road trips'', ''puzzle solving'', ''book club'']'
  career_goals: Aspiring to become a chief financial officer within the next eight years, Jennifer plans to earn her CPA certification and pursue an executive MBA while maintaining her work‑life balance.
    She aims to lead strategic financial transformation initiatives that blend traditional finance with innovative fintech solutions, particularly in sustainability‑focused investments. Long‑term, she dreams
    of building a resilient finance function that can adapt to market shifts and mentoring other women in finance to foster a supportive, collaborative culture.
