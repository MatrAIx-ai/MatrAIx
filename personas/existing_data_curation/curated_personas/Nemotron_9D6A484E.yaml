  hobbies: '[ ''Cooking traditional Mexican cuisine'', ''Playing and watching soccer'', ''Listening to regional Mexican music'', ''Dancing salsa and cumbia'', ''Hiking in the Cascades'', ''Community gardening'',
    ''Volunteering at the local food bank'', ''Participating in storytelling circles'', ''Listening to personal‑development podcasts'' ]'
  career_goals: Renato aspires to formalize his community‑focused role by earning a GED and pursuing a certification as a Community Health Worker or Peer Counselor. He envisions creating a bilingual outreach
    hub in Salem that offers mentorship for at‑risk youth, language‑exchange workshops, and cultural events celebrating Mexican heritage. Long‑term, he hopes to lead a nonprofit program that bridges the
    gap between Spanish‑speaking immigrant families and local services, ultimately securing stable, purpose‑driven employment that aligns with his passion for helping others.
