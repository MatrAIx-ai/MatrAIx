personas:
  professional: Renato Antuna is a community liaison who leverages bilingual fluency, empathetic listening, and spontaneous event coordination to rally neighbors around health outreach, often improvising
    solutions on the fly while struggling to keep to formal deadlines.
  sports: Renato Antuna is a devoted follower of the Portland Timbers, plays in a local co‑ed soccer league every spring, joins community hiking groups for mountain trail runs in summer, and balances fitness
    with a love for weekend games at the Oregon State Beavers football matches.
  arts: Renato Antuna enjoys live performances by regional folk ensembles, dances to salsa and cumbia at community festivals, and finds inspiration in the storytelling songs of Lila Downs, the murals of
    Diego Rivera, and the films of Alfonso Cuarón, often sharing playlists during potluck gatherings.
  travel: Renato Antuna prefers weekend getaways that combine nature and culture, having trekked the Redwood forests of Northern California, explored the historic streets of Oaxaca, and planning a future
    trip to the Canadian Rockies, all while budgeting travel through discount airline points and shared rides.
  culinary: Renato Antuna cooks traditional family dishes such as tamales with masa, pozole with hominy, and enchiladas draped in roasted chilies, mastering the balance of spice and aroma, and enjoys swapping
    recipes at the neighborhood garden while occasionally over‑salting a batch in enthusiastic bursts.
  core: Renato Antuna is a charismatic community builder whose love for food, soccer, and spontaneous activism fuels a purpose‑driven life, even if organization and dental visits sometimes slip through
    the cracks.
background:
  cultural: Renato’s Mexican heritage is a central part of his identity. He grew up speaking Spanish at home, celebrating Día de los Muertos, quinceañeras, and Navidad with vibrant family gatherings and
    traditional foods. The collectivist values of his community—respect for elders, mutual support, and a strong sense of belonging—shape his compassionate outlook. While living in Salem, Oregon, he blends
    these cultural roots with local Pacific‑Northwest influences, navigating a bicultural life that honors Mexican customs while engaging with the diverse tapestry of his Oregon neighborhood.
attributes:
  skills: '[ ''Bilingual communication (Spanish/English)'', ''Empathetic listening'', ''Conflict mediation'', ''Informal event planning'', ''Improvisational problem solving'', ''Community outreach'', ''Mentorship
