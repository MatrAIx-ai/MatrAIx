  career_goals: Bernadette aims to transition into a senior strategic role where she can shape regional marketing initiatives for mid‑size companies or lead a research department within a larger corporation.
    She envisions developing an integrated analytics framework that blends traditional market research with emerging data‑science techniques to drive more precise targeting. Over the next five years she
    hopes to become a Marketing Director or Head of Insights, mentoring a team of analysts and championing data‑driven decision‑making across the organization. Additionally, she is interested in launching
    a boutique consulting practice that supports local businesses in Ozark County with affordable, evidence‑based market strategies, thereby contributing to the economic vitality of her community.
