personas:
  professional: Liah Martin is a research specialist who fuses curiosity-driven inquiry with practical, organized project management, designing interview protocols that balance structured rigor with flexible,
    empathetic adjustments to emotionally intense conversations, and they consistently apply their emotional awareness to build trust with participants.
  sports: Liah Martin supports the Carolina Hurricanes, follows the NC State Wolfpack women's basketball team, joins the Raleigh Road Runners club for weekend jogs, and they incorporate yoga‑focused Pilates
    sessions to balance cardio with stress relief.
  arts: Liah Martin immerses themselves in the local jazz scene, attending performances by the Raleigh Jazz Orchestra and listening to artists like Kamasi Washington and Nina Simone while creating paintings
    inspired by Kandinsky and crocheting intricate patterns to soothing instrumental playlists, and they find these artistic pursuits essential for emotional regulation.
  travel: Liah Martin enjoys curated weekend trips to historic civil‑rights landmarks and the vibrant cultural districts of New Orleans, plans future travel to Ghana’s coastal heritage sites, and they balance
    spontaneous detours with meticulous budgeting using travel‑reward credit cards.
  culinary: Liah Martin skillfully blends Southern comfort dishes, such as fried chicken and collard greens, with Caribbean spices, crafting meals like jerk‑seasoned sweet potato mac and cheese, shrimp
    and coconut rice, and they regularly harvest fresh basil, thyme, and cilantro from their garden to elevate flavors.
  core: Liah Martin is an empathetic researcher who channels intense emotional sensitivity into disciplined organization, mindfulness practice, community cooking, and they maintain a steadfast drive for
    education equity.
background:
  cultural: Liah grew up in a close‑knit Black community in the South, where church, family gatherings, and neighborhood celebrations were central to her identity. Her parents emphasized the importance
    of education and resilience, instilling a deep respect for Black history and cultural traditions. She regularly participates in local Juneteenth events, supports Black-owned businesses, and engages
    with community organizations that promote educational equity. While rooted in Southern Black culture, Liah also embraces the broader African diaspora through music, cuisine, and literature, which informs
    both her personal worldview and her professional commitment to culturally sensitive research.
attributes:
  skills: '[''Qualitative interviewing'', ''Active listening'', ''Interview protocol design'', ''Survey development'', ''NVivo data analysis'', ''Report writing'', ''Public speaking'', ''Curriculum development'',
    ''Educational assessment'', ''Workshop facilitation'', ''Crisis de‑escalation'', ''Cultural competency'', ''Project coordination'', ''Time management'']'
  hobbies: '[''Reading contemporary fiction'', ''Afro‑centric literature'', ''Journaling'', ''Yoga and meditation'', ''Cooking Southern and Caribbean dishes'', ''Volunteer tutoring'', ''Attending live jazz
    performances'', ''Gardening herbs and vegetables'', ''Visiting African‑American historic sites'', ''Painting'', ''Crocheting'']'
  career_goals: Liah aspires to move into a senior research leadership role where she can shape large‑scale community‑focused studies, particularly on education equity and mental‑health outcomes. She plans
    to earn a master's degree in counseling or social work to deepen her expertise in trauma‑informed interviewing and to integrate therapeutic best practices into research. Over the next five years, she
    aims to develop a training program for interviewers that emphasizes emotional resilience and cultural humility, eventually positioning herself as a director of diversity, equity, and inclusion research
    at a university or nonprofit. She also hopes to publish a guide on empathetic interviewing techniques and to mentor emerging black professionals in the field.
