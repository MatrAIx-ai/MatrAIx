  career_goals: At 73, Madison’s ambitions are centered on personal enrichment and community contribution rather than formal employment. She aims to deepen her knowledge of sustainable gardening practices,
    incorporating native Florida plants to create a low‑maintenance pollinator garden. Madison plans to volunteer part‑time at the local senior center, sharing her knitting expertise and offering a listening
    ear to fellow retirees. She also hopes to document family stories and recipes in a memoir that blends her curiosity about heritage with a practical desire to preserve memories for future generations.
    Finally, she is motivated to become more confident with smartphone photography, capturing the subtle beauty of her coastal surroundings.
