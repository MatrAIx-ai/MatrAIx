personas:
  professional: A former school secretary who now volunteers part‑time at the local senior center, Madison Coker channels their meticulous record‑keeping and empathetic listening into leading knitting workshops
    while allowing the agenda to flow naturally based on participants’ interests.
  sports: A leisurely beach‑walk enthusiast, Madison Coker follows the Miami Marlins during baseball season, joins a small local walking club for sunrise strolls, and watches the occasional senior‑friendly
    tennis match at the community courts.
  arts: An avid fan of classic jazz and big‑band swing, Madison Coker regularly plays Ella Fitzgerald and Duke Ellington on their record player while dabbling in watercolor landscapes inspired by Claude
    Monet, and they find creative solace in knitting patterns that echo Art Deco motifs.
  travel: Madison Coker prefers slow, reflective trips, having taken relaxed road trips to Savannah, Georgia, and the historic streets of Charleston, South Carolina, while dreaming of a future sunrise photography
    excursion to the dry‑tropics of the Everglades.
  culinary: A devoted cook of Southern comfort cuisine, Madison Coker expertly prepares shrimp and grits, fried green tomatoes, and peach cobbler, while experimenting with fresh herbs like rosemary and
    thyme to add subtle twists to family recipes.
  core: Madison Coker blends quiet curiosity with practical patience, spending days knitting, birdwatching, and journaling memoirs, all while gently navigating the occasional disarray of retirement life.
background:
  cultural: Madison is a White American who grew up in a small Midwestern town before moving to Florida in her retirement years. Her upbringing was shaped by mainstream middle‑class values, a Protestant
    church community, and the post‑World War II emphasis on self‑reliance and neighborly support. In Pompano Beach, she has adopted a relaxed coastal lifestyle while retaining the modest, practical sensibilities
    of her youth. Her cultural identity blends a respect for tradition with an openness to gentle curiosity, reflected in her love of historical literature, seasonal gardening, and community goodwill.
