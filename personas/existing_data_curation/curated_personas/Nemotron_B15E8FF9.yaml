  career_goals: Although retired from formal employment, Donald aims to leave a lasting legacy in his community. He intends to author a memoir that weaves personal stories with Montara's local history,
    organize an annual community art festival, and become a mentor for younger volunteers at the senior center. He also seeks recognition through a local senior leadership award and hopes to contribute
    to citizen‑science marine ecology projects, deepening his knowledge of the coastal environment.
