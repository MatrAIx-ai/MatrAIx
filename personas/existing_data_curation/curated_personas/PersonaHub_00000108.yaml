persona_description: A microbiologist who is interested in exploring emerging questions in biology and health, and who has a passion for developing new drugs and vaccines, finding new ways to keep food
  and water safe, and restoring and preserving the environment. They enjoy science and the challenge of discovery, and they are interested in a career that will let them explore these questions and contribute
  to the development of new technologies and treatments. They have a strong background in microbiology and a desire to continue their education and training in this field, and they are looking for opportunities
  to gain hands-on experience and develop specialized training in areas such as microbial genetics, microbial physiology, immunology, virology, biotechnology, food microbiology, and host-parasite interactions.
  They are looking for a program that provides a solid foundation in microbiology and excellent training for a professional career, and they are interested in the opportunities for employment and career
  advancement that the program offers.
