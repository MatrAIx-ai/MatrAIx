  hobbies: '["Reading mystery & science-fiction novels", "Exploring tide pools and beachcombing", "Sketching and watercolor painting", "Journaling & short story writing", "Tinkering with Arduino electronics
    kits", "Basic video editing and creating YouTube-style clips", "Playing strategy board games (Catan, chess) with close friends", "Participating in local beach clean-up events"]'
  career_goals: Cindy aspires to turn her love of nature and science into a career in marine biology or environmental science, aiming to study coastal ecosystems and develop practical conservation solutions.
    She hopes to attend a university with strong STEM programs, earn scholarships through science competitions, and eventually work in field research or as a science communicator, perhaps creating educational
    videos for platforms like YouTube. In the short term she wants to win her middle‑school science fair, improve her organizational skills to meet project deadlines, and take on leadership roles in her
    school’s science club.
