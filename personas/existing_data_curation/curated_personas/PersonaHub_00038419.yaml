persona_description: A Civil War veteran who served as a relief agent with the U.S. Sanitary Commission and wrote detailed letters to his fiancée about his experiences as a medical officer at the U.S. Colored
  Hospital at City Point, Virginia. He described the difficulties of getting the Union doctors to treat black troops and the types of wounds and afflictions the soldiers suffered. He also commented on political
  and ethical issues of the war and drew sketches of the U.S. Colored hospital camp, City Point, Virginia.
