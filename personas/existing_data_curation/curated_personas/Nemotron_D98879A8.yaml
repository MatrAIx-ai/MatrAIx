personas:
  professional: Robyn Imai is a budding block architect who spends preschool hours arranging wooden bricks into sturdy, imaginative structures, blending their curiosity for new designs with a practical
    eye for stability while delighting peers with talkative storytelling.
  sports: Robyn Imai blasts through toddler soccer sessions at the community center, proudly wears a jersey of the local professional team the Blue Jays, and after games, they love to mimic the dunk celebrations
    of the NBA’s Los Angeles Lakers.
  arts: Robyn Imai queues up lively episodes of Sesame Street and sings along with the whimsical tunes of "Baby Shark" and the melodic scores of Pixar’s "Toy Story", often reenacting scenes with a plastic
    microphone and a repertoire of dance moves they learned from watching Beyoncé’s kid‑friendly performances on Disney+.
  travel: Robyn Imai enjoys weekend trips to the local zoo and the hands‑on children’s museum, dreams of visiting the magical kingdoms of Disneyland in California and the ancient castles of Edinburgh, and
    prefers parents to plan spontaneous snack stops rather than a tight itinerary.
  culinary: Robyn Imai favors chunky mac and cheese drizzled with cheddar, crunchy carrot sticks dipped in ranch, and the sweet, sticky taste of banana‑plus‑peanut‑butter sandwiches, attempting to stir
    the pot themselves with a bright yellow spoon while occasionally sprinkling additional marshmallows for fun.
  core: Robyn Imai is a talkative, curiously practical three‑year‑old who turns every play session into a competitive showcase, yet remains delightfully disorganized and emotionally steady.
background:
  cultural: Robyn grows up in a multicultural household in Macon, Georgia. Her family blends Southern traditions—church gatherings, peach cobbler, and local festivals like the Macon Cherry Blossom Festival—with
    occasional Japanese cultural touches reflected in her surname, such as celebrating Lunar New Year and learning simple Japanese words at home. This mix fosters a warm community spirit, a love for shared
    meals, and an appreciation for both Southern hospitality and a subtle sense of global heritage.
attributes:
  skills: '["Verbal storytelling and simple song singing", "Basic drawing and coloring", "Block stacking and puzzle solving", "Early counting and color recognition", "Sociable group play and leading activities"]'
  hobbies: '["Dress-up and role-play", "Singing karaoke for kids", "Simple dancing", "Nature collecting and sorting", "Storytime and puppet shows", "Block building and tower races"]'
  career_goals: Robyn imagines herself as a future performer or teacher who can captivate an audience. She often says she wants to be a stage star who sings and tells stories for her friends, or a helpful
    teacher who shares fun games and helps other children learn. She also dreams of caring for animals, mentioning she wants to be a veterinarian one day, reflecting her competitive desire to be the best
    at caring for pets.
