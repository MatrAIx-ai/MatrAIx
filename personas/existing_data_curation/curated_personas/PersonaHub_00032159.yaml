persona_description: A researcher or policy maker interested in the development and implementation of national frameworks and strategies for improving Aboriginal child health outcomes in Australia. This
  person is likely to be interested in the release of the third volume of the Western Australian Aboriginal Child Health Survey (WAACHS) results, which provide information on the prevalence, scope, and
  determinants of developmental health problems and educational outcomes in Aboriginal children living in Western Australia. They would be interested in the survey's methodology, findings, and relevance
  to Australia's national frameworks and strategies. This person would also be interested in the upcoming longitudinal surveys of Australian youth, which provide insights into the experiences and educational
  outcomes of Aboriginal children and young people.
