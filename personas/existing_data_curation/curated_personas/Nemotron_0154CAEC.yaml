  career_goals: Gilberto aims to become a certified master welder through AWS Senior Welder and Welding Engineer credentials while completing his associate degree in welding technology. He seeks a supervisory
    role such as shop foreman where he can apply his structured approach to workflow management and mentor a new generation of tradespeople. Long‑term, he envisions opening a small, family‑run welding and
    fabrication shop that provides stable income and flexible scheduling to support his post‑divorce responsibilities. He plans to leverage online technical courses and industry workshops to stay current
    with emerging welding technologies and safety practices.
