    soldering'', ''Blueprint reading'', ''Metal fabrication'', ''Equipment maintenance'', ''OSHA safety compliance'', ''Quality inspection'', ''Apprentice mentorship'', ''CNC machine basics'']'
  hobbies: '[''Woodworking'', ''Furniture making'', ''Vintage car restoration'', ''Fishing at Lake Solomon'', ''Shooting range'', ''Volunteer fire department equipment maintenance'', ''Community theater
