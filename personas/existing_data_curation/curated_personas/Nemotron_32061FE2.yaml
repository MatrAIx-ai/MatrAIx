  career_goals: Mustafa aims to complete his GED within the next two years, then enroll in a local vocational program to become a certified electrical technician. He envisions a career that blends his love
    for hands‑on work with emerging technology, eventually contributing to sustainable energy projects or robotics design. He also hopes to use his technical skills to assist peers in his community, offering
    informal tech support and mentorship.
