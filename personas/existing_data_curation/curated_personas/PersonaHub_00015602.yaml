persona_description: A team of scientists from the University of Southampton who are conducting research on the use of copper as a bactericidal agent. Their work is focused on the benefits of copper in
  the fight against food poisoning viruses such as E.coli. The team's experiments have proven that copper can effectively kill the E.coli O157 virus at room temperature in just four hours, and it can also
  survive on stainless steel for 34 days. The persona is likely to be interested in scientific research, particularly in the field of microbiology, and may have a background in chemistry or materials science.
  They are likely to be curious about the potential applications of copper in the food industry and may be looking for ways to incorporate it into existing products.
