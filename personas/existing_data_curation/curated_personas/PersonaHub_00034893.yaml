persona_description: A researcher or scientist who specializes in avian toxicology and risk assessment, focusing on the use of standardized acute oral toxicity tests for first generation anticoagulant rodenticides.
  They are particularly interested in understanding the mode of action, time course of adverse effects, and environmental hazards associated with FGARs, and how these factors impact the use of standardized
  tests for forensic confirmation of avian mortality incidents and characterizing risks to free-ranging birds. They are looking for critical analyses and critiques of the current methodology and the need
  for alternative approaches to assess the risks of FGARs to avian populations.
