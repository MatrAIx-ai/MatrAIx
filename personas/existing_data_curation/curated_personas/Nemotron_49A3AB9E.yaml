  hobbies: '["Hiking and nature walks", "Visiting galleries and museums", "Watercolor sketching", "Reading art history and contemporary art books", "Listening to folk and indie music", "Volunteer historic
    preservation", "Photography of local architecture", "Gardening", "Attending small craft workshops", "Home‑brewing"]'
  career_goals: Mary Ann aims to transition from employee to independent contractor, establishing her own decorative painting and historic restoration business that services Berkshire County's historic
    homes and cultural institutions. She seeks certification from the Painting Contractors Association, expands her repertoire into art restoration, and aspires to gain recognition for innovative mural
    work that blends traditional craftsmanship with contemporary artistic concepts. Long‑term, she hopes to mentor apprentices and lead community art‑preservation projects.
