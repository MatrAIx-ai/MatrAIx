  career_goals: Although currently not in the workforce, Steven aims to translate his practical skill set into a self‑employed handyman business serving the Batesville community, with a long‑term goal of
    expanding into custom woodworking commissions. He plans to obtain a GED and pursue a vocational certification in HVAC or electrical work to broaden his service offerings. Financial stability and the
    ability to provide for his family are top priorities, driving his ambition to create a reliable income stream while preserving time for personal interests. Additionally, he hopes to take on a part‑time
    volunteer coordinator role at his local church or fire department, allowing him to contribute to community safety and cohesion without overwhelming his schedule.
