  hobbies: '[''Visiting art galleries and theaters'', ''Reading African‑American literature and history'', ''Weekly book club participation'', ''Knitting and quilting'', ''Community gardening'', ''Cooking
    traditional Southern cuisine'', ''Video chatting with family'', ''Attending online art workshops'']'
  career_goals: Although retired, Evette is determined to deepen her impact on the community. She aims to launch a mentorship program that pairs seniors with high‑school students to share oral histories
    and life lessons. She also hopes to document her family's genealogy and publish a memoir preserving the experiences of Black women in the mid‑Atlantic region. Additionally, she aspires to expand the
    senior center's community garden, fostering sustainable food practices and providing a therapeutic space for fellow elders.
