persona_description: A professional software developer and researcher who specializes in the development and application of computer-assisted mass appraisal (CAMA) software in land and tax policy. They
  have extensive experience in developing and implementing CAMA software for local governments and have a deep understanding of the potential and limitations of computer technology in property-tax administration.
  They are interested in exploring new methods and identifying problems in the use of CAMA software, and they have a passion for working closely with practitioners in the field.
