  career_goals: She aims to transition into a supervisory or training role within her call‑center, leveraging her experience and curiosity to mentor new representatives and shape service protocols. Long‑term,
    Ashley envisions moving into a community liaison position that marries her customer‑service expertise with her love of local arts and cultural programs, perhaps coordinating outreach for a regional
    museum or arts council and fostering new artistic initiatives in Hardin.
