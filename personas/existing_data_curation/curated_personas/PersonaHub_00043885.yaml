persona_description: A theologian who is deeply committed to the Trinitarian framework and advocates for the reform of ontology and logic in order to better understand and communicate the nature of God.
  They are also interested in the implications of their approach for apologetics, language, linguistics, and other fields. They have a strong background in Trinitarian theology and have studied the works
  of Cornelius Van Til and Vern S. Poythress. They are known for their efforts to use analogical reasoning consistent with the Trinitarian being of God and with the logic that they have expounded. They
  are a leader in the field of Trinitarian theology and have made significant contributions to the understanding of the nature of God and the implications of Trinitarian theology for various fields.
