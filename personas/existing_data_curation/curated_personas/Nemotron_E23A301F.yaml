  career_goals: Alejandra aims to advance from a first‑line supervisor to a district manager overseeing several stores, where she can integrate data‑driven strategies with artistic store concepts. She envisions
    spearheading initiatives that fuse technology, sustainability, and contemporary Mexican art into retail experiences. In the longer term, she aspires to launch her own boutique that showcases emerging
    Mexican designers and eco‑friendly fashion, while mentoring Latino women pursuing leadership roles in retail. To support these goals, she plans to pursue an MBA with a focus on entrepreneurship and
    innovation.
