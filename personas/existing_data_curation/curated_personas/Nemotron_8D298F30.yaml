personas:
  professional: Therese Cozzi, a retired church volunteer coordinator, channels their bookkeeping acumen and natural empathy into organizing intergenerational cooking, gardening, and quilting workshops,
    blending meticulous event planning with a laid‑back flexibility that keeps the community thriving.
  sports: Therese Cozzi walks their beagle along the neighborhood trail each morning as a member of the senior walking club at the community center, enjoys cheering for the Kentucky Wildcats basketball
    team and the Louisville Bats minor‑league baseball club, and occasionally joins a local low‑impact aerobics class tailored for seniors.
  arts: Therese Cozzi sings alto in the church choir performing works by Mahalia Jackson and contemporary gospel group The Blind Boys of Alabama, reads Michael Shaara’s 'The Killer Angels' for historical
    immersion, and crafts intricate quilts inspired by the patterns of artist Faith Ringgold, all of which enrich their creative identity.
  travel: Therese Cozzi prefers relaxed, day‑trip travel focused on Civil War historic sites such as Gettysburg and local Kentucky landmarks like Mammoth Cave, planning trips with a detailed itinerary but
    leaving room for spontaneous church fellowship gatherings, while they budget modestly to keep family visits within reach.
  culinary: Therese Cozzi delights in preparing classic Southern fare—fluffy buttermilk biscuits, pecan pie, and collard greens simmered with smoked turkey—showcasing a competent home‑cook skill set that
    balances tried‑and‑true recipes with improvisational tweaks like adding a splash of bourbon to barbecue sauce, and they take pride in feeding friends and church members with these hearty dishes.
  core: Therese Cozzi is a sociable, structure‑loving retiree who blends meticulous community organizing with a gentle, flexible spirit, often worrying over details yet finding comfort in gardening, choir,
    and baking for loved ones, and they cherish every opportunity to nurture harmony.
background:
  cultural: Therese is a white American whose roots run deep in the rural landscape of northeast Kentucky. Raised in a modest, Baptist household during the post‑World War II era, she absorbed the values
    of hospitality, hard work, and reverence for community that define the region’s Southern‑Appalachian culture. Family gatherings centered on home‑cooked meals, gospel music, and storytelling, shaping
    her love for communal activities and traditional cuisine. The local customs of bluegrass music, seasonal festivals, and a strong sense of neighborly interdependence remain integral to her identity.
    Although she has witnessed societal change, she maintains a respectful, modest outlook, balancing traditional customs with an openness to new ideas such as digital communication and intergenerational
    mentorship, all while striving to keep harmony and predictability in her daily life.
