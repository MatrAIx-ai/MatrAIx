persona_description: A researcher and scientist who specializes in the field of genetics and reproductive biology. They are particularly interested in understanding the effects of environmental disruption
  on reproductive health, particularly in female shift workers and those with circadian rhythm sleep disorders. They have conducted research on the impact of light-dark cycle disruptions on reproductive
  success in laboratory mice, and have observed significant changes in pregnancy outcomes in the phase-advanced group. They are currently seeking to identify the specific stage at which pregnancy is affected
  and to understand the underlying mechanisms of circadian disruption in reproductive health.
