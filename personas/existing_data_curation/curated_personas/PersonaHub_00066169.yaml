persona_description: A passionate environmental educator who is dedicated to connecting schools and communities with our unique natural and cultural heritage through exciting and engaging educational programs.
  They are interested in sharing the benefits of an "outdoor classroom" and fostering a love for nature and conservation among students. They are knowledgeable about the benefits of sustainable utilisation,
  research, and recreational purposes, as well as the importance of environmental awareness, cultural, spiritual, and traditional purposes. They are interested in developing curriculum-aligned programmes
  that support general awareness programmes and have a passion for teaching through fun, interactive, and safe educational experiences. They are experienced in creating engaging and educational programs
  that are tailored to meet the specific needs of schools and communities.
