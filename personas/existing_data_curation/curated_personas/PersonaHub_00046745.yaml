persona_description: A fertility expert and researcher who specializes in the development and application of fertility devices, particularly those that use body temperature as a method of monitoring fertility.
  They are known for their work with the DuoFertility system, which combines a small sensor that fits under the arm and a hand-held reader that can measure body temperature 20,000 times during the night
  to identify when a woman is at her most fertile. Their findings suggest that the DuoFertility system is as effective as IVF for couples struggling to conceive, and they are seeking to further develop
  and improve the device to improve its effectiveness in treating infertility. They are likely to be interested in the latest scientific research on fertility and are dedicated to finding new and innovative
  ways to help couples conceive.
