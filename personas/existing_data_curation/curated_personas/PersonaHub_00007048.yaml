persona_description: A Senior Lecturer in the School of Computer Science and Engineering at the University of New SouthWales, Professor of computer science at Louisiana Tech University, and Associate Director
  of the Indian Institute of Science, who specializes in the study of sensor networks, wireless sensor networks, and programming in embedded systems. He has expertise in sensor programming challenges, sensor
  network implementation, and algorithm development for wireless sensor networks. His research interests include network stack development, protocol programming, and real-world scenarios in sensor networks.
  He is also a recognized expert in the field of security in sensor networks and has designed several software components for distributed systems.
