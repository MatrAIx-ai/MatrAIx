  hobbies: '[''Visiting Art Galleries'', ''Live Music Concerts'', ''Community Theater'', ''Hiking'', ''Yoga'', ''Reading Psychology and Philosophy'', ''Cooking International Dishes'']'
  career_goals: Safwat aims to translate his passion for art and community service into a professional role as a program coordinator at a local cultural center or nonprofit arts organization. He plans to
    earn a certificate in arts administration from a nearby community college within the next two years while also completing a peer support specialist training to formally support individuals coping with
    emotional distress. Ultimately, he envisions establishing a community art workshop that blends creative expression with mental‑health awareness, providing a supportive space for residents of Hartsdale
    and surrounding areas.
