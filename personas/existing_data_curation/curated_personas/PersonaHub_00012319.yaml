persona_description: A scientist who specializes in the study of bacteria metabolism and their optimal production of proteins. This scientist is particularly interested in how bacteria produce exactly the
  right amount of protein needed to be optimally adapted to the prevailing environmental conditions, and how this process can be optimized using bioinformatics tools. They are also interested in how bacteria
  adapt to the situation in the host organism during a process of infection, and how this can be used to develop new active substances to stop the growth and proliferation of pathogens.
