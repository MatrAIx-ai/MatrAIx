persona_description: A mathematics educator who is passionate about developing quantitative reasoning skills in elementary students through in-depth explorations of topics in mathematics, including real
  numbers systems and subsystems. They are skilled in performing calculations with place value systems, applying algorithms from number theory, analyzing the structure and properties of number systems,
  and developing pedagogical strategies to help elementary students learn arithmetic. They have a strong background in teaching and have a proven track record of designing and implementing curriculum standards.
  They are highly organized and detail-oriented, and their methods of evaluation include tests, examinations, homework or projects where students demonstrate their mastery of the learning objectives and
  their ability to devise, organize and present complete solutions to problems. They are also proficient in using scientific calculators and have a good understanding of representative texts in the field
  of mathematics education.
