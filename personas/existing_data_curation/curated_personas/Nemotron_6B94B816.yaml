personas:
  professional: Roderick Cacho is a veteran facilities caretaker with over three decades of hands‑on experience who leverages meticulous scheduling, strict safety protocols, and a competitive drive to lead
    his team toward eco‑friendly cleaning standards, while occasionally micromanaging vendors due to a lingering skepticism of their intentions.
  sports: Roderick Cacho is a devoted Philadelphia Eagles fan who never misses a Sunday game, plays pick‑up basketball at the community center during winter, walks the Schuylkill River Trail for cardio,
    yet admits to skipping gym sessions when work deadlines mount, reflecting their competitive yet stress‑prone nature.
  arts: Roderick Cacho immerses themselves in gospel choirs at church and attends live blues tributes to B.B. King and soul performances by Sharon Jones & The Dap‑Kings, using these cultural touchstones
    to unwind after demanding shifts, though they sometimes stay up late listening to records, compromising sleep.
  travel: Roderick Cacho prefers short, budget‑friendly road trips to historic towns like Lancaster and Baltimore, occasionally plans longer pilgrimages to New Orleans for its jazz and soul food scene,
    but they often postpone an anticipated visit to Ghana due to retirement planning constraints and health worries.
  culinary: Roderick Cacho prepares soul‑food staples such as collard greens with smoked turkey, candied yams, and creamy macaroni and cheese, enjoys crafting homemade hot sauce with cayenne and habanero
    peppers, yet occasionally over‑salts dishes in an effort to mask the blandness that hypertension brings.
  core: Roderick Cacho blends rigorous discipline with vibrant community spirit, channeling a competitive edge into meticulous custodial work while juggling occasional stress‑induced over‑cooking and a
    stubborn reluctance to delegate tasks.
background:
  cultural: Roderick was raised in a close‑knit African‑American neighborhood on Philadelphia’s South Side, where family, church, and community solidarity were central to daily life. He grew up during the
    post‑civil‑rights era, witnessing both the challenges and the resilience of his community. These experiences shaped his strong sense of pride in his heritage, an appreciation for gospel music, soul
    cuisine, and storytelling traditions. The local Black cultural festivals, church gatherings, and historic sites like the African American Museum in Philadelphia have reinforced his commitment to preserving
    and sharing his cultural legacy. His identity informs his disciplined work ethic, his emphasis on community service, and his competitive drive to uplift himself and those around him.
