  hobbies: '[''Card games'', ''Community gardening'', ''River Trail walking'', ''Philadelphia Eagles fandom'', ''Soul and blues concerts'', ''Church choir participation'', ''Cooking soul food'', ''Reading
    African‑American history'', ''Neighborhood clean‑up volunteering'']'
  career_goals: Roderick aims to transition into a supervisory or facilities‑manager role within his current organization, securing a stable pension and formal recognition for his impeccable safety record.
    He wants to lead a small team, implement more efficient, eco‑friendly cleaning practices, and mentor younger custodial staff. Looking ahead to retirement, he hopes to start a modest side business offering
    residential deep‑cleaning services, leveraging his expertise while maintaining a predictable schedule that supports his family’s financial security. Managing stress and preserving his health are also
    key personal goals as he approaches the next phase of his career.
