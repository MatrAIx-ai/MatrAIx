persona_description: A teacher who is innovative, resourceful, and uses technology to enhance learning experiences. They are not a "paper pusher" but rather a "paper mover", using paper as a tool for movement
  and creativity. They are determined to incorporate technology into their teaching, particularly through Pinterest and Teachers Pay Teachers, to provide students with a variety of hands-on ways to learn
  from each other. They are passionate about creating a classroom where students can grow from learning with one another and through conversation about problems.
