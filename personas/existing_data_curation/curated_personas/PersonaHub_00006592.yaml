persona_description: A leading UK emergency medicine specialist who has worked extensively on the treatment of cyanide poisoning from smoke inhalation and has authored guidelines on the subject. They are
  known for their expertise in emergency medicine and their contributions to improving the recognition and treatment of this condition. They are also known for their advocacy for the use of empiric treatment
  for cyanide poisoning from smoke inhalation in the UK, and for their belief in the importance of stockpiling hydroxocobalamin, the only licensed cyanide antidote, by all emergency departments.
