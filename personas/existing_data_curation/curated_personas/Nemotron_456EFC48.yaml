  hobbies: '["Volunteering at local festivals", "Kayaking on Chesapeake Bay", "Hiking in wildlife refuges", "Home mixology experimentation", "Yoga and mindfulness meditation", "Reading contemporary fiction
    and memoirs", "Book club participation", "Community theater backstage work"]'
  career_goals: Pamela aims to move from bartender to bar manager within the next two years, taking on more responsibility for scheduling, budgeting, and staff development. She plans to complete a certification
    in advanced mixology and a short hospitality management program at a nearby community college. Long-term, she dreams of opening her own neighborhood lounge that highlights the Eastern Shore’s local
    brews and seafood‑infused cocktails, creating a gathering place that reflects the region’s relaxed, community‑oriented spirit. She also hopes to mentor other aspiring bartenders, particularly women
    returning to the workforce after life transitions like divorce.
