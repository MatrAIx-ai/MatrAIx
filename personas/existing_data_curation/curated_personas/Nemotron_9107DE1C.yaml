personas:
  professional: Joaquín Portillo is a budding community arts coordinator who leverages bilingual communication, visual arts literacy, and strong emotional intelligence to design inclusive, well‑organized
    workshops while allowing space for creative spontaneity, reflecting their curious yet responsibly reliable nature.
  sports: Joaquín Portillo enjoys a low‑impact fitness routine that includes weekend runs with the Providence Joggers Club and occasional pick‑up basketball at the RISD gym, fervently roots for the Providence
    Bruins and follows the New England Revolution, while preferring the calm of yoga over high‑intensity team sports.
  arts: Joaquín Portillo frequently visits the RISD Museum and the Providence Art Club, sketches watercolor studies of historic streets, draws inspiration from artists like Frida Kahlo and contemporary
    photographer Sebastião Salgado, and immerses themselves in the merengue rhythms of Juan Luis Guerra and the bachata stylings of Romeo Santos, which together shape their creative expression and community
    storytelling.
  travel: Joaquín Portillo prefers thoughtfully planned cultural trips, having explored the historic colonial districts of Santo Domingo and Cartagena, dream‑visiting the art‑rich neighborhoods of Barcelona
    while balancing a modest travel budget and family responsibilities, and often returns to New England coastal towns like Newport for weekend getaways.
  culinary: Joaquín Portillo is an enthusiastic home cook who skillfully prepares dishes such as mangu with sautéed onions, sofrito‑based sancocho, and grilled fish tacos seasoned with cilantro and lime,
    experimenting with plantain, yucca, and ají peppers, yet sometimes burns the caramelized sugar in desserts when rushing between work and meditation.
  core: Joaquín Portillo is a reflective 35‑year‑old arts enthusiast who balances meticulous planning with spontaneous creativity, battles persistent anxiety, and channels their cultural passion into community
    projects, even if they occasionally over‑budget for art supplies.
background:
  cultural: Born into a Dominican family, Joaquin grew up speaking Spanish at home and celebrating Dominican holidays such as Carnaval and Día de la Independencia. He maintains strong ties to his heritage
    through music, food, and participation in Providence’s Dominican community events. The cultural emphasis on family, respect, and collective well‑being shapes his cooperative nature, while his curiosity
    about art reflects the vibrant artistic traditions of the Dominican Republic.
attributes:
  skills: '[''Bilingual communication (Spanish-English)'', ''Art history knowledge'', ''Creative writing'', ''Community facilitation'', ''Research and information synthesis'', ''Basic digital design (Canva,
    Photoshop)'', ''Emotional intelligence and active listening'', ''Organizational planning for small events'']'
  hobbies: '[''Art gallery visits'', ''Watercolor sketching'', ''Reading Caribbean and Latin American literature'', ''Listening to merengue and bachata'', ''Cooking Dominican cuisine'', ''Street photography'',
    ''Journaling'', ''Mindfulness meditation'', ''Volunteering at cultural centers'']'
  career_goals: He aims to transition into a role that blends his passion for art and community, such as a community arts coordinator, museum education specialist, or cultural program manager, while completing
    a certificate in arts administration. Joaquin also aspires to launch a bilingual blog/podcast that highlights Dominican cultural narratives, secure stable employment that supports his family, and maintain
    space for self‑care and mental‑health practices.
