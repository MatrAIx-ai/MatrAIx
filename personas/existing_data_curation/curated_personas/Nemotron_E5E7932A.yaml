  career_goals: Steven aims to deepen his scientific expertise while leveraging his business insight to become a leader of interdisciplinary research initiatives. In the short term, he plans to pursue a
    master’s program in applied physics or materials science to gain a stronger technical foundation. He envisions securing a role as a lead researcher or project manager in a cutting‑edge lab or a technology
    startup, where he can drive the development and commercialization of novel physical technologies—such as advanced energy storage materials or quantum sensors. Long‑term, he aspires to launch his own
    venture that bridges scientific discovery with market‑ready products, fostering sustainable innovation that balances scientific rigor with economic viability.
