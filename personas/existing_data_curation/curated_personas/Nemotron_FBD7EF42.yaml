personas:
  professional: Brittany Parrish is a hands‑on automotive technician who excels at diagnosing gasoline, diesel and hybrid powertrains, organises service logs with meticulous precision, and channels her
    competitive drive into achieving ASE Master Technician status while mentoring peers one‑on‑one.
  sports: Brittany Parrish embraces outdoor fitness through regular hikes on Umstead State Park’s trails, follows the Carolina Panthers and Charlotte Hornets on game days, participates in a local weekend
    motorcycle club track day, and occasionally competes in realistic racing simulators, balancing solitary endurance with low‑key team spirit.
  arts: Brittany Parrish finds creative release listening to classic rock legends like Led Zeppelin and AC DC while tinkering, attending intimate live shows at The Ritz in Cary, and collecting vintage automotive
    artwork that fuels their appreciation for both mechanical engineering and visual design.
  travel: Brittany Parrish prefers road‑trip adventures that combine auto culture with scenic drives, having explored the Henry Ford Museum in Detroit, spent a weekend in Asheville’s Blue Ridge Mountains,
    and dreaming of cruising the Pacific Coast Highway in a classic convertible, all while carefully budgeting each trip.
  culinary: Brittany Parrish’s palate gravitates toward Southern‑style smoked brisket, Carolina pulled‑pork sandwiches and homemade banana‑pepper relish, a skill set honed by frequent family barbecues and
    a willingness to experiment with spice rubs after a long day in the garage.
  core: Brittany Parrish is a methodical, competition‑driven mechanic who balances solitary tinkering with a pragmatic work ethic, yet sometimes lets a passion for performance upgrades eclipse social commitments.
background:
  cultural: Brittany grew up in the suburban community of Cary, North Carolina, within a middle‑class, predominantly white Anglo‑American family. Though she left high school without completing a diploma,
    she earned a GED and pursued hands‑on training through apprenticeships at local auto shops. The Southern culture of modesty, self‑reliance, and a practical work ethic shaped her pragmatic outlook. Family
    gatherings often featured barbecues and community events, reinforcing a sense of belonging while her reserved personality found comfort in quieter moments. Exposure to the region’s strong automotive
    repair culture—through a father who was a hobbyist mechanic—nurtured her early interest in cars and reinforced the value of skilled trades.
attributes:
  skills: '[''Automotive diagnostics (OBD‑II)'', ''Engine repair and rebuilding'', ''Transmission servicing'', ''Brake system maintenance'', ''Electrical system troubleshooting'', ''Hybrid and electric
