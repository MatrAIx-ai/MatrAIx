  hobbies: '[''Engine rebuilding projects'', ''Model car kit assembly'', ''Automotive YouTube channel viewing'', ''Reading repair manuals'', ''Hiking in local parks'', ''Racing simulation gaming'', ''Listening
    to classic rock'', ''Small‑group car enthusiast meetups'']'
  career_goals: She aims to obtain full ASE Master Technician certification within the next two years, specialize in hybrid/electric vehicle systems, and eventually transition to a lead technician or service
    manager role at her current shop. Long‑term, she envisions opening her own boutique service garage focused on performance tuning and eco‑friendly retrofits, leveraging her competitive drive to build
    a reputation for quality and efficiency. She also plans to complete a GED and enroll in an associate‑degree program in automotive technology to broaden her theoretical knowledge.
