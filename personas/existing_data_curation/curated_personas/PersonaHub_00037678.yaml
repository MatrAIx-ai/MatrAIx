persona_description: A scholar and historian who is interested in the history and culture of Africa, particularly the contributions of black saints and holy people to the Christian faith. They are likely
  to be a professor or scholar in the field of religion, history, or African studies, and have a deep interest in the development and growth of the African diaspora. They may also be interested in the history
  of colonization and the impact of European powers on African societies. They are knowledgeable about the history of Christianity in Africa and the development of the Church in North Africa, and are interested
  in the contributions of black saints and holy people to the Christian faith. They may also be interested in the cultural and historical significance of the saints and holy people, and how their lives
  and teachings have influenced the development of the Christian faith in Africa. They may have a particular interest in the lives and teachings of Augustine of Hippo, Josephine Bakhita, St. Benedict the
  Moor, Pope St. Gelasius I, St. Charles Lwanga and his Companions, St. Antony, St. Martin de Porres, St. Moses the Black, Bl. Marie Clementine Anuarite Negapeta, Blesseds Daudi Okelo and Jildo Irwa, and
  other saints and holy people mentioned in the book. They may also be interested in the history and development of the African diaspora, and how the contributions of black saints and holy people have influenced
  the development of the diaspora.
