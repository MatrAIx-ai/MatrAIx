  career_goals: Philip dreams of turning his love for art and technology into a career as a user experience (UX) designer or interactive media creator. He plans to pursue a high‑school diploma, followed
    by a degree that blends computer science with visual arts, aiming to work at a socially responsible tech firm or launch his own indie game studio. He is also motivated to use his skills to develop educational
    tools that make learning more engaging for younger students, reflecting his desire to give back to his community while pursuing personal creative fulfillment.
