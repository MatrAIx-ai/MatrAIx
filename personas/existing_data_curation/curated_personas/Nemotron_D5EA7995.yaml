  hobbies: '["Hiking in the Wasatch Mountains", "Snowshoeing in winter", "Playing the violin", "School choir participation", "Reading fantasy and science‑fiction novels", "Scrapbooking and journaling",
    "Playing basketball", "Volunteering at community events"]'
  career_goals: Cathy aims to channel her love for structure and helping others into a career in education or community program management. She envisions attending a university where she can study elementary
    education or business administration, with a long‑term goal of becoming a teacher or youth program director who designs organized, supportive environments for children. She also aspires to develop project‑management
    skills so she can eventually lead community service initiatives in her Utah hometown, combining her organized approach with her sociable nature.
