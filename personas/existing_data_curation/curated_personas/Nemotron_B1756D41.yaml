personas:
  professional: Teri Ruiz is a project management specialist who leverages eight years of Agile and Waterfall experience, an MBA, and a methodical, curiosity‑driven approach to design and deliver complex
    Gulf‑Coast infrastructure initiatives, while they keep cross‑functional teams aligned and morale high with their organized, reliable nature and talent for stakeholder communication.
  sports: Teri Ruiz is an active runner who joins the New Orleans Road Runners club for weekly long runs, cheers on the New Orleans Saints and Pelicans, participates in charity 5Ks, and they balance cardio
    with yoga and Pilates to stay flexible and injury‑free.
  arts: Teri Ruiz frequently attends live jazz at Preservation Hall, enjoys brass‑band performances by the Rebirth Brass Band, collects vinyl records of Wynton Marsalis and Diana Krall, and they support
    the New Orleans Shakespeare Festival, finding creative inspiration that fuels their project‑management storytelling.
  travel: Teri Ruiz prefers family‑oriented road trips to culturally rich destinations like Savannah, Asheville, and Montreal, while also dreaming of a sustainable eco‑tour of Costa Rica, planning itineraries
    months ahead and they balance travel costs with their savings goals.
  culinary: Teri Ruiz is an avid home cook who masters dishes such as shrimp gumbo, jambalaya, and crawfish étouffée using ingredients like andouille sausage, okra, and filé powder, and hosts dinner parties
    where they experiment with farm‑to‑table produce and pair meals with locally brewed craft beers.
  core: Teri Ruiz blends a disciplined project‑manager’s precision with a sociable night‑owl’s love for spontaneous jazz marathons, often color‑coding their calendar while they sneak extra dessert after
    meetings.
background:
  cultural: Teri grew up in Metairie, a suburban enclave of New Orleans, and her cultural background reflects the blend of Southern American traditions and the distinctive French‑Creole heritage of the
    region. Raised in a family with Irish‑German ancestry, she was immersed in local customs such as celebrating Mardi Gras, savoring Creole cuisine, and taking part in community gatherings at her parish
    church. The area's emphasis on hospitality, music, and communal support has shaped her values of cooperation, kindness, and a strong sense of community involvement, which she carries into both her professional
    and personal life.
