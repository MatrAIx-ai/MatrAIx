    in leadership'']'
  career_goals: Teri aims to progress into senior leadership within project management, ultimately becoming a PMO Director or Vice President of Operations for a regional organization that serves the Gulf
    Coast community. She seeks to lead large‑scale, multidisciplinary projects that enhance infrastructure resilience and improve quality of life, such as hurricane‑mitigation initiatives and healthcare
    facility expansions. To support these ambitions, she plans to earn PMP, PMI‑ACP, and Lean Six Sigma certifications, develop a mentorship program for emerging project managers, and share her expertise
    as a speaker at PMI conferences and local industry forums. While pursuing these professional milestones, she remains committed to maintaining a collaborative, inclusive workplace culture and a healthy
    work‑life balance with her family.
