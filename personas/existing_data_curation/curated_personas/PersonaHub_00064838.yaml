persona_description: A scientist in the field of plant science, specifically focusing on research in alfalfa and its interactions with the soil. The scientist is interested in reducing yield losses and
  stand decline in alfalfa from biotic and abiotic stresses, increasing the value of alfalfa and rotational crops by developing new products, and establishing innovative, science-based methods and standards
  for assessing and evaluating alfalfa quality for multiple end uses. The scientist is also interested in characterizing and manipulating the alfalfa/soil interactome to promote the agronomic utility of
  alfalfa in rotational cropping systems.
