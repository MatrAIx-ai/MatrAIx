  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican dishes'', ''Gardening'', ''Reading contemporary fiction and nonfiction'', ''Attending local historical tours'', ''Volunteering at community centers'',
    ''Participating in trivia nights'', ''Yoga and meditation for stress relief'', ''Traveling with family'', ''DIY home decor projects'']'
  career_goals: Looking ahead, Maria aims to transition from a senior executive secretary to a chief of staff or senior executive assistant role where she can influence strategic decision‑making and organizational
    efficiency. She plans to earn the Certified Administrative Professional (CAP) credential and pursue Project Management Professional (PMP) certification to solidify her expertise in workflow optimization.
    Maria also envisions mentoring junior administrative staff and leading company‑wide initiatives that integrate automation and data‑driven process improvements. Within the next five years, she hopes
    to launch a boutique consulting practice that helps small businesses in the York County region modernize their administrative operations, drawing on her bilingual background to serve diverse clients.
    Recognition for excellence—such as internal awards for administrative innovation—remains a personal benchmark of success.
