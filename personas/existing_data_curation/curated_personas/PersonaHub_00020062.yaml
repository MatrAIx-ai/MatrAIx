persona_description: A political scientist who specializes in the study of civil rights and affirmative action, particularly in the context of the 1964 Civil Rights Act and the 1965 Executive Order 11246.
  He is an advocate for equal results and equal opportunity, and believes that laws should be interpreted in a way that seeks to achieve these goals. He is also an advocate for the elimination of gender
  and racial disparities, and is interested in the intersection of race, gender, and class. He is likely to read about the successes and failures of these policies and their impact on society.
