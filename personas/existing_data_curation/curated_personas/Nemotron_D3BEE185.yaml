  career_goals: Randi’s immediate goal is to complete her GED and enroll in a community‑college business administration program, aiming to earn certifications such as the Certified Administrative Professional
    (CAP). She aspires to move from a receptionist role to an office manager or operations coordinator position within the next five years, where she can lead a small team, design efficient workflow processes,
    and implement technology solutions that improve productivity. Long‑term, she dreams of launching her own boutique consulting service focused on office organization and productivity coaching, leveraging
    her disciplined work style and passion for helping others streamline their work environments. Balancing her career ambitions with her marriage, she seeks roles that provide both professional growth
    and stable work‑life integration.
