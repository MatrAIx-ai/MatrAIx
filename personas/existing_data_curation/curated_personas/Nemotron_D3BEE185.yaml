personas:
  professional: Randi Henson, a 20‑year‑old receptionist with razor‑sharp organization skills and a talent for managing multi‑line phone systems, leverages their love of group activities and curiosity about
    emerging office technology to streamline front‑desk operations while eyeing a future as an office manager and productivity consultant.
  sports: Randi Henson fuels their love of movement by attending weekly Zumba and yoga sessions at the Rockland Fitness Club, cheering on the New York Knicks and Yankees on game nights, and occasionally
    joining a community running group that tackles the Palisades Trail each spring.
  arts: Randi Henson channels creativity through scrapbooking and DIY home décor while soaking up the indie tunes of Mumford & Sons and Adele at local coffee houses, and they regularly visit the Rockland
    Art Fair to admire works by emerging painters such as Sofia Martinez.
  travel: Randi Henson prefers meticulously planned weekend getaways, having charted day trips to the Hudson Valley wineries and the Catskills hiking trails, while dreaming of a coffee‑centric tour of Portland,
    Oregon and a tech‑savvy cultural immersion in Tokyo.
  culinary: Randi Henson’s palate gravitates toward avocado toast paired with an oat‑milk latte, peppery chicken shawarma wraps, and indulgent New York‑style pizza slices, and they enjoy crafting quinoa‑basil
    salads at home, though they occasionally attempt complex recipes like homemade ramen only to surrender to the simplicity of a coffee‑shop espresso.
  core: Randi Henson is a hyper‑organized social butterfly who battles chronic worry with yoga, caffeine, and a meticulously kept journal, turning every to‑do list into a personal productivity adventure.
background:
  cultural: Randi grew up in a middle‑class white American family in the suburban community of Spring Valley, Rockland County. Her upbringing reflected mainstream U.S. cultural traditions, including celebrations
    of holidays such as Thanksgiving, Fourth of July, and Christmas, and participation in community and church events. The diverse demographic makeup of Rockland County exposed her to a variety of cultural
    perspectives, fostering an appreciation for inclusivity while maintaining a strong sense of her own suburban roots. This blend of traditional American values and local community diversity shapes her
    social outlook, work ethic, and personal relationships.
