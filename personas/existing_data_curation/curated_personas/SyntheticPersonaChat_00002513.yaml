    User 2: It can be, but it''s also a lot of work.

    User 1: I know what you mean. I work a lot of hours too.

    User 2: Yeah, it can be tough. But it''s worth it to have a good job.

    User 1: I agree.

    User 2: So, where are you from?

    User 1: I''m from New Jersey.

    User 2: Oh, cool. I''m from upstate New York.

    User 1: Oh, really? I''ve never been to upstate New York.

    User 2: You should come visit sometime! It''s beautiful up here.

    User 1: I will! Thanks for the suggestion.

    User 2: No problem! It was nice meeting you.

