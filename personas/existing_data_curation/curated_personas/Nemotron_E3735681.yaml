  hobbies: '[''Toastmasters'', ''Improvisational theater'', ''Volunteer at community festivals'', ''Lake photography'', ''Bullet journaling'', ''Cooking and recipe experimentation'', ''Trivia competitions'',
    ''Yoga'', ''Road trips to Finger Lakes'', ''Hiking'']'
  career_goals: Driven by her achievement‑oriented mindset, Vida plans to complete her bachelor's degree in Business Administration while earning a Certified Administrative Professional credential. She
    aims to move from receptionist to office manager within the next three years, then pursue a regional operations director role in the hospitality or tourism sector. Long‑term, she envisions launching
    her own boutique hotel or coworking space that blends efficient service with community engagement, leveraging her competitive edge to stand out in the market.
