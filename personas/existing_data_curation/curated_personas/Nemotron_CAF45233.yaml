personas:
  professional: Rosalia Roque is a bilingual community outreach enthusiast on the path to becoming a certified Community Health Worker, blending a natural flair for spontaneous event coordination and empathetic
    crisis listening with a practical knack for graphic flyer design, even if they often let their calendar resemble a colorful post‑it collage.
  sports: Rosalia Roque stays active by sweating through Zumba classes and salsa nights at the local community center, while they cheer on the New York Yankees in baseball season and the Philadelphia Eagles
    during football, occasionally joining a casual women's softball league in the summer.
  arts: Rosalia Roque immerses herself in the rhythmic beats of artists like Bad Bunny, Daddy Yankee, and Willie Colón while dancing salsa and bachata, and they channel that energy into DIY home‑decor projects
    inspired by the vibrant murals of local street artist KJ Bach, plus a habit of snapping everyday moments for Instagram.
  travel: Rosalia Roque prefers spontaneous weekend getaways, often hopping on the train to explore Philadelphia’s historic sites or the streets of New York City for its vibrant Latin music scene, while
    they dream of a future culinary pilgrimage to San Juan and Cartagena, balancing limited freelance income with a love for group tours and community‑oriented travel.
  culinary: Rosalia Roque is a proficient home cook who masters the aromatic sofrito base to whip up classic mofongo, arroz con gandules, and crispy tostones, while they also playfully experiment with fusion
    tacos stuffed with plantain‑infused carnitas, often pairing meals with a strong coffee from local roasters.
  core: Rosalia Roque navigates life with a lively blend of spontaneous community spirit, heartfelt empathy, and a habit of misplacing their planner, all while they balance anxiety‑driven comfort cravings
    and an unstoppable love for rhythm.
background:
  cultural: Rosalia is a first‑generation Puerto Rican American. She grew up in a bilingual household where Spanish was spoken at home and English at school, infusing her daily life with island traditions—celebrating
    Noche Buena, Three Kings Day, and the vibrant Puerto Rican Festival in Newark. Music, especially bomba, plena, and contemporary reggaeton, fills her home, and cooking family recipes is a way to keep
    her heritage alive. While she embraces the multicultural fabric of Browns Mills and the wider New Jersey community, she remains deeply connected to her extended family, Catholic faith, and the communal
    values of solidarity and hospitality that are central to Puerto Rican culture.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Community outreach and volunteer coordination'', ''Event planning for informal gatherings'', ''Customer service and front-desk assistance'', ''Social
    media content creation and basic graphic design'', ''Basic mental-health first aid and crisis listening'', ''Adaptability and improvisational problem-solving'', ''Conflict mediation and negotiation'',
    ''Culinary skills in traditional Puerto Rican cuisine'', ''Organizational flexibility'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking and experimenting with Puerto Rican recipes'', ''Gardening (vegetable and herb garden)'', ''Volunteering at a neighborhood food pantry'', ''Participating
    in community block parties and festivals'', ''Group fitness classes like Zumba'', ''Reading personal-development and self-help books'', ''Listening to bomba, plena, and reggaeton music'', ''DIY home-decor
    crafting'', ''Exploring new coffee shops and casual photography'']'
  career_goals: Rosalia aims to formalize her community‑service passion by earning a Community Health Worker certification and completing her associate degree in Public Health or Social Services. She hopes
    to secure a part‑time role at the Burlington County health department where she can leverage her bilingual communication and outreach skills. Parallel to that, she plans to launch a modest freelance
    event‑planning and catering service that showcases Puerto Rican food at local festivals and private gatherings, giving her the flexibility to balance family, self‑care, and work while building a stable
    income stream.
