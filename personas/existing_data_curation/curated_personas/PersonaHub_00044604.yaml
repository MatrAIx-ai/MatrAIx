persona_description: A Rwandan survivor of the 1994 Rwandan Genocide, who is deeply concerned about the lack of justice and closure for the victims and the perpetrators of the genocide. They are passionate
  about the gacaca system and its potential to bring some semblance of justice to the survivors, but are also wary of the potential for resentment and reconciliation to be fostered rather than achieved.
  They are also interested in the broader implications of the lack of justice for the country and the region, and are committed to advocating for the rights of the survivors and the perpetrators.
