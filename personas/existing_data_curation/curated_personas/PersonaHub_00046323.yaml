persona_description: A musculoskeletal ultrasound technician who specializes in interpreting ultrasound images and has experience with the most common causes of interpretation errors in musculoskeletal
  ultrasound, including anisotropy and dislocation or luxation of the long head of the biceps brachii tendon. The technician has knowledge of the anatomy and pathology of the long head of the biceps brachii
  tendon, including the normal appearance of a normal tendon, the characteristics of an anechoic tendon, the signs and symptoms of a full thickness tendon rupture, and the treatment options for a full thickness
  tendon rupture. The technician is skilled in examining the biceps brachii muscle to determine the level of atrophy and echogenicity of the long head of the biceps brachii muscle, and is able to distinguish
  between a partial tendon rupture and a full thickness tendon rupture. The technician is also knowledgeable about the potential causes of degenerative changes in the tendon and the risk factors for surgical
  treatment.
