  hobbies: '[''Gardening'',''Traditional cooking'',''Knitting and crocheting'',''Listening to Mexican folk music'',''Church choir singing'',''Bingo and senior social clubs'',''Reading historical novels'',''Storytelling
    to grandchildren'']'
  career_goals: Although no longer employed, Tania’s ambitions center on leaving a lasting cultural legacy. She aims to compile a family cookbook that documents her favorite recipes and the stories behind
    them, and to mentor younger relatives in cooking and crafts. She also seeks to stay active in her community by leading the senior center’s monthly cultural events, advocating for accessible health services
    for elders, and ensuring that the voices of Mexican‑American seniors are heard in local decision‑making.
