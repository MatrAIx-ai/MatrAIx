  hobbies: '["Soccer", "Robotics and LEGO building", "Guitar playing", "Cooking Mexican cuisine", "Reading science fiction", "Hiking and nature exploration", "Volunteering at community events"]'
  career_goals: Looking ahead, Perfecto aims to channel his curiosity for how things work into a technical career. He aspires to earn a scholarship to a STEM‑focused high school and later attend a technical
    college where he can study automotive technology or mechanical engineering. His long‑term ambition is to open a community workshop in Climax that provides affordable car repairs and hands‑on STEM workshops
    for younger students, blending his practical skills with his desire to give back to his community. He also envisions serving as a mentor through the local youth center, using his organized, reliable
    nature to guide peers toward academic and vocational success.
