  hobbies: '["Vegetable gardening", "Model shipbuilding", "Hiking (Connetquot River Preserve and other local trails)", "Puzzle solving (crosswords, Sudoku)", "Reading technical non-fiction", "Cycling",
    "Home brewing"]'
  career_goals: Andrew aims to transition from field courier work to a supervisory role within the logistics department, eventually becoming a route operations manager. He plans to obtain a commercial driver's
    license and certifications in fleet management and safety compliance. Leveraging his STEM background, he hopes to specialize in data-driven route optimization, moving into a logistics analyst position
    where he can shape delivery strategies for the company. Long-term, he envisions launching his own niche delivery service focusing on reliable, low-stress, same-day deliveries for high-value items, allowing
    him to maintain a structured work environment while exercising greater control over schedules and minimizing excessive social interaction.
