personas:
  professional: Susan Iglio is an aspiring LEGO architect and budding storyteller who merges a love for fantasy books with practical building skills, crafting elaborate structures while navigating school
    projects with a relaxed, sometimes disorganized, yet flexible approach, and they always strive to keep friendships harmonious.
  sports: Susan Iglio plays casual soccer with the Riverdale Rovers, a small group of close friends, prefers a laid‑back schedule over intensive drills, and proudly cheers for the US Women’s National Team
    during televised matches, balancing active play with solitary sketching sessions afterward.
  arts: Susan Iglio is an avid reader of J.K. Rowling’s fantasy series and a fan of Studio Ghibli’s animated worlds, spending hours sketching original characters inspired by these influences, assembling
    intricate LEGO dioramas, and coding whimsical scenes in Minecraft and Scratch, blending curiosity with practical execution despite occasional disorganization.
  travel: Susan Iglio loves exploring nearby Maplewood Park, dreams of standing at the rim of the Grand Canyon, and hopes to experience the magical rides at Disney World, planning trips with a mix of spontaneous
    weekend road trips and careful saving of allowance for tickets.
  culinary: Susan Iglio enjoys cheesy mac and cheese, pepperoni pizza, and bright fruit smoothies made with banana, strawberries, and honey, occasionally helps their family bake cinnamon rolls, but their
    tendency to forget to finish homework sometimes means they miss dinner on time.
  core: Susan Iglio is a curious, imaginative 10‑year‑old LEGO builder and avid reader who balances lively soccer games with quiet sketching, often worries about small setbacks, and navigates life with
    a flexible yet slightly disorganized approach.
background:
  cultural: Susan grew up in a middle‑class suburban family in Overland Park, Kansas. Her household reflects typical Midwestern American customs—celebrating holidays like Thanksgiving and Christmas, attending
    community events, and participating in local school activities. The region’s emphasis on friendly neighborhood ties and a strong public school system influences her cooperative nature and practical
    outlook. While her family’s heritage is primarily European‑American, Susan’s daily life is shaped by the diverse, family‑oriented culture of the Kansas suburbs.
