  hobbies: '[''drawing'', ''painting'', ''watercolor art'', ''collage making'', ''reading picture books'', ''LEGO building'', ''clay sculpting'', ''soccer'', ''singing'', ''performing skits'', ''board games'',
    ''journaling'']'
  career_goals: Venika dreams of becoming an artist-educator who creates interactive exhibit spaces where children can explore art and science together. She imagines future roles as a museum curator or
    a community art therapist, blending her love for creativity with her desire to help peers manage stress. At the same time, she is fascinated by inventing fun learning toys, so she hopes to study engineering
    or design when she grows up. Her long-term ambition is to lead a youth program that encourages kids to think creatively, compete healthily, and express their feelings through art and performance.
