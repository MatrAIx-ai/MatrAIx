  hobbies: '[''Painting and sketching'', ''Photography'', ''Playing acoustic guitar'', ''Attending local concerts and art festivals'', ''Hiking in the Appalachian trails'', ''Improvisational comedy'', ''Writing
    poetry'', ''Creating short videos for TikTok'', ''Reading science fiction and philosophy'', ''Volunteering at community theater'']'
  career_goals: Daniel aims to turn his passion for art, people, and communication into a career in community arts outreach or public relations for a cultural nonprofit. He plans to enroll in a community
    college to earn an associate's degree in communications while building a portfolio of event planning and social media projects. His long‑term ambition is to become a program director at a regional arts
    center, creating inclusive events that foster community cohesion and promote mental‑health awareness for young adults. He also envisions launching a blog or digital platform that highlights local artists
    and provides resources for emotional wellbeing.
