personas:
  professional: Angelito Cayabyab, an operations leader with over three decades of manufacturing experience, leverages Six Sigma, SAP, and a collaborative, methodical style to streamline plant workflows,
    mentor emerging managers, and champion sustainability initiatives across Midwest facilities; they are known for building high‑performing teams while maintaining a pragmatic eye on technology investments.
  sports: Angelito Cayabyab spends Saturdays fishing at Cheney Reservoir, supports the Wichita Thunder hockey team and the Kansas City Chiefs football squad, and joins a community walking club on Sundays
    to stay active; they view sports as a way to blend camaraderie with personal health.
  arts: Angelito Cayabyab is a regular at local karaoke nights, often belting out classics by Neil Diamond and traditional folk songs from his heritage, volunteers as a board member for the Wichita Community
    Theater, and enjoys attending improv workshops and classic film screenings; they cherish the way music and performance foster community bonds.
  travel: Angelito Cayabyab meticulously plans his annual trips to the Philippines to reconnect with family, intersperses those visits with road trips to Colorado’s Rocky Mountains and Kansas state parks,
    and balances adventure with a modest travel budget; they prefer structured itineraries that leave room for spontaneous family gatherings.
  culinary: Angelito Cayabyab, an avid home‑cook, perfects adobo with soy sauce, vinegar, and bay leaves, simmers sinigang using tamarind broth and fresh vegetables, and rolls lumpia stuffed with pork and
    carrots for guests, while occasionally treating themselves to a rib‑smoke night at a local BBQ joint; they love sharing meals that blend familiar flavors with new twists.
  core: Angelito Cayabyab blends disciplined operational expertise with a warm, community‑focused spirit, juggling meticulous budgeting, health vigilance, weekend fishing, karaoke, and frequent family trips,
    all while indulging in home‑cooked classics and an occasional splurge; they carry a gentle yet relentless drive to improve every facet of life.
background:
  cultural: Angelito's cultural identity is rooted in his Filipino heritage, reflected in his surname Cayabyab and family traditions. Raised in a bilingual household, he speaks both English and Tagalog
    and celebrates Filipino customs such as the Santo Niño feast, Christmas noche buena, and karaoke gatherings. Living in Wichita, Kansas, he blends these Southeast Asian values—strong family ties, respect
    for elders, and communal harmony—with Midwestern sensibilities of friendliness, modesty, and community service. This dual cultural lens informs his collaborative leadership style, his love for group
    activities, and his commitment to fostering inclusive environments both at work and in the broader community.
attributes:
