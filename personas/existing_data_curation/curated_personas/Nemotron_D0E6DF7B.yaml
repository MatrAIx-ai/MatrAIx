  career_goals: Angelito aims to progress to a senior director or plant‑wide executive role where he can drive large‑scale sustainability initiatives and embed continuous‑improvement cultures across multiple
    sites. He is passionate about establishing a formal mentorship pipeline for emerging leaders in his organization and eventually transitioning into a strategic consulting capacity for mid‑size manufacturers
    in the Midwest, leveraging his blend of curiosity for new ideas with practical, results‑oriented execution.
