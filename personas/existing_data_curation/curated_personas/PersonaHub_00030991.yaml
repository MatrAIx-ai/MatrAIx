persona_description: A historian who specializes in the study of the Sainte-Anne-de-Bellevue Canal and its cultural resources, particularly those related to the role it played on the Ottawa waterway and
  within Canada’s waterway system. The historian is interested in preserving and presenting the significant old and modern cultural resources, which testify to the canal’s role and significance. They are
  passionate about communicating the historical value of these resources to the public and establishing a conservation and maintenance program for the buildings and engineering works related to the canal
  systems. The historian is also interested in undertaking a study of the site's archaeological potential, ensuring the physical integrity of the remains is protected.
