    User 2: It''s okay, but it''s not my passion.

    User 1: What is your passion?

    User 2: I''m not sure yet. I''m still trying to figure it out.

    User 1: Well, I''m sure you''ll figure it out.

    User 2: Thanks! I hope so.

    User 1: So, what do you like to do to feel pretty?

    User 2: I like to wear makeup and do my hair.

    User 1: That''s great! I like to do that too.

    User 2: Do you have any other hobbies?

    User 1: I like to read and write.

    User 2: I love to read! What do you like to read?

    User 1: I like to read a lot of different things, but I mostly read romance novels.

    User 2: I love romance novels too! What''s your favorite one?

    User 1: I don''t know if I have a favorite, but I really like the "Bridget Jones" series.

    User 2: I love those books too! They''re so funny.

    User 1: They are!

    User 2: So, what do you like to write?

    User 1: I like to write short stories and poems.

    User 2: That''s great! I love to write too.

    User 1: We should swap some stories and poems sometime.

    User 2: That would be great!

    User 1: So, what do you think?

    User 2: I think it would be a lot of fun.

    User 1: Great!

    User 2: I''m excited to do it.

    User 1: Me too!'
