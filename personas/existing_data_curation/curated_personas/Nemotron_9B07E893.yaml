  hobbies: '[''Woodworking'', ''Hiking'', ''Habitat for Humanity volunteering'', ''Playing acoustic guitar'', ''Cooking'', ''Gardening'', ''Softball'', ''Attending craft fairs'', ''Reading design magazines'',
    ''DIY home improvement'']'
  career_goals: Pamela aims to become a master carpenter and eventually open a small custom woodworking shop that serves the Salem community. She plans to earn certifications in green building (LEED) and
    construction management, lead larger residential renovation projects, and mentor apprentices—especially women entering the trade. Additionally, she hopes to expand her involvement with community building
    initiatives like Habitat for Humanity and to be recognized locally for high‑quality, eco‑friendly craftsmanship.
