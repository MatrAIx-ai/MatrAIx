  hobbies: '[''Gardening'', ''Reading historical nonfiction'', ''Quilting and fabric crafts'', ''Birdwatching'', ''Hiking in the Black Hills'', ''Canning and preserving seasonal produce'', ''Volunteering
    at the local library'', ''Attending church socials'', ''Playing bridge with friends'', ''Learning new recipes'']'
  career_goals: Although retired, Wendy aims to deepen her impact on the Deadwood community by mentoring younger volunteers, leading initiatives to document and preserve local history, and expanding her
    role in organizing charitable events for seniors and families. She also aspires to maintain her personal health and resilience, ensuring she can continue to support her husband and grandchildren, and
    to learn new, practical skills such as sustainable landscaping and digital storytelling to share the town’s heritage with a wider audience.
