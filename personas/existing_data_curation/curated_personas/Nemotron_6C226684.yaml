personas:
  professional: Wendy Greenway, a retired home-manager turned community historian, blends meticulous organizational skills with a love for local heritage to coordinate senior volunteer programs, lead historical
    documentation projects, and orchestrate charitable events that support families across Deadwood; they bring calm, methodical planning to every initiative.
  sports: Wendy Greenway, a member of the Deadwood Seniors Hiking Club, enjoys leisurely walks on the modest trails of the nearby Black Hills, follows the Rapid City Rush hockey team for a touch of excitement,
    and participates in weekly bridge tournaments that keep their mind sharp, while they shy away from high-impact exercise after a past knee sprain.
  arts: Wendy Greenway, an avid quilter and fabric-craft enthusiast, finds inspiration in the watercolor landscapes of Andrew Wyeth, the folk ballads of Joan Baez, and the poetry of Mary Oliver, often playing
    Baez's recordings while stitching intricate blankets that double as storytelling canvases.
  travel: Wendy Greenway, a fan of both day-trips and extended getaways, frequently explores Custer State Park's wildlife loop, has visited the historic streets of Gettysburg on a senior tour, dreams of
    seeing the archives at the National Museum of American History in Washington DC, and plans future trips with grandchildren to the Great Smoky Mountains, all while budgeting wisely within a fixed retirement
    income.
  culinary: Wendy Greenway, a skilled Midwestern home cook, regularly prepares butter-rich buttermilk biscuits, heirloom tomato galettes, and homemade apple-cinnamon preserves, delighting in ingredients
    such as sweet corn, fresh sage, and locally sourced honey, while experimenting with new recipes from a weekly cooking magazine.
  core: Wendy Greenway blends quiet curiosity with methodical practicality, turning gardening, quilting, and community history into a seamless tapestry of service, seasoned with a calm resilience and occasional
    tendency to over-plan.
background:
  cultural: Wendy is a White American whose family traces its roots to early 20th‑century settlers of the Great Plains, with ancestral ties to German and Scandinavian immigrants who helped shape South Dakota’s
    frontier communities. Raised in a small‑town environment, she embodies the region’s values of self‑reliance, community cooperation, and respect for the natural landscape. Her worldview is further influenced
    by a lifelong involvement in a Protestant church, which emphasizes service, humility, and harmony. These cultural influences combine with her personal experiences to create a strong sense of place and
    dedication to preserving the heritage and traditions of Deadwood and its surrounding area.
