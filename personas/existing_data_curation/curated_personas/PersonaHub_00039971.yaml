persona_description: A journalist who specializes in reporting on environmental disasters and their impact on communities. Holly Morris is known for her documentaries and television shows that focus on
  the stories of women affected by nuclear disasters. Her reporting has led her to Chernobyl, where she documented the lives of the self-settlers who have chosen to live in the contaminated zone. Morris
  is known for her ability to capture the resilience and defiance of these women, and for her belief that their legacy is one of personal agency and self-determination.
