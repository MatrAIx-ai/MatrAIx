  hobbies: '[''Visiting art museums'', ''Sketching and drawing'', ''Attending theater and jazz performances'', ''Photography club participation'', ''Reading literature and crime novels'', ''Hiking in the
    Delaware River area'', ''Mindfulness meditation'', ''Volunteering for art‑therapy workshops'']'
  career_goals: Francis aims to transition from frontline patrol to a senior supervisory role within the Riverside Police Department, focusing on community liaison and arts‑based outreach. He aspires to
    develop a formal Police‑Arts Partnership program that leverages local galleries and theater groups to foster positive police‑community relationships. In the next five years, he plans to complete a bachelor’s
    degree in public administration to strengthen his leadership credentials, and to obtain certification as a crisis intervention specialist. Ultimately, Francis envisions a post‑retirement career as a
    consultant who advises municipalities on integrating cultural initiatives into public safety strategies, while also mentoring younger officers on emotional resilience and stress reduction.
