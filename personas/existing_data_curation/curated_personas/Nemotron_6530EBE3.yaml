personas:
  professional: Claudia Rock is an interdisciplinary postsecondary instructor who blends rigorous curriculum design with a love for visual arts, leveraging Canvas and Blackboard to craft discussion-driven
    courses, and they channel their competitive drive into publishing research and securing grants for community art projects.
  sports: Claudia Rock is an avid hiker and yoga practitioner who regularly explores the James River Park System with a local women’s hiking group, follows the Richmond Flying Squirrels baseball team, and
    they balance moderate cardio sessions with weekly yoga classes to maintain mental and physical equilibrium.
  arts: Claudia Rock is a watercolor enthusiast who spends quiet evenings sketching river scenes, frequents the Virginia Museum of Fine Arts and Richmond gallery openings, draws inspiration from artists
    like Henri Matisse and contemporary maker Ai Weiwei, and they volunteer with a local arts nonprofit to mentor emerging creators.
  travel: Claudia Rock is a thoughtful traveler who plans trips around cultural festivals such as the Venice Biennale and the Richmond Folk Festival, enjoys curated tours of European art capitals like Florence
    and Kyoto, and they balance travel budgets with a modest allowance for occasional weekend getaways to nearby Shenandoah Valley.
  culinary: Claudia Rock is a garden‑to‑table cook who loves experimenting with seasonal produce like heirloom tomatoes and fresh basil, often prepares dishes such as saffron risotto and roasted beet salad,
    and they relish pairing meals with a glass of Virginia‑grown rosé while occasionally over‑seasoning in the pursuit of bold flavor.
  core: Claudia Rock blends a restless curiosity and competitive zeal with deep‑seated anxiety, channeling both into vibrant watercolors, rigorous interdisciplinary teaching, and a habit of meticulously
    planning every facet of their creative and professional life.
background:
  cultural: Claudia is a white woman raised in the American South, specifically Virginia, where she grew up in a middle‑class, suburban family with strong emphasis on education and community involvement.
    Her upbringing blended traditional Southern hospitality with a progressive, liberal outlook shaped by the rich civil‑rights history of Richmond. She identifies with a culturally eclectic background—cherishing
    Southern culinary traditions while embracing global art and literature. Her marriage and long‑term residence in Chesterfield County provide a stable personal foundation that informs her professional
    dedication to nurturing curiosity and resilience in her students.
