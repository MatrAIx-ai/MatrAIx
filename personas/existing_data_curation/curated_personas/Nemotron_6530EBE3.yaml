  career_goals: Claudia aims to complete her bachelor's degree and pursue a master's in education or a related field, eventually working toward a Ph.D. She seeks a tenure‑track position that will allow
    her to expand her interdisciplinary art curriculum, publish research on innovative pedagogical approaches, and secure grant funding for community‑engaged art projects. Long‑term, she aspires to become
    a department chair, lead a faculty development program focused on creativity in higher education, and present her work at national conferences.
