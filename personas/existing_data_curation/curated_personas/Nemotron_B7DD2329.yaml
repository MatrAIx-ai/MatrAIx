  hobbies: '[''Traditional Guatemalan cooking'', ''Gardening'', ''Crocheting'', ''Boardwalk walking'', ''Listening to marimba and salsa music'', ''Volunteering at church/community programs'', ''Reading
    home-improvement magazines'', ''Attending Guatemalan cultural festivals'', ''Learning new repair techniques via videos'']'
  career_goals: Lisabet aims to move into a supervisory role, such as lead maintenance technician or facilities manager, within the next three to five years. To qualify, she plans to earn a high‑school
    equivalency (GED) and obtain certifications like the Certified Maintenance & Reliability Technician (CMRT) and an EPA‑approved HVAC certification. She also hopes to complete a short course in building
    code compliance offered by a community college. Long‑term, she dreams of starting a modest handyman business that can provide flexible work for her while allowing her to mentor younger workers, particularly
    those from immigrant backgrounds. Financially, she wants to secure enough savings to support her family and eventually purchase a small home where she can cultivate a garden.
