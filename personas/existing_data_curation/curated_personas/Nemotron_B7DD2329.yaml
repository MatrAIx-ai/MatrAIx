personas:
  professional: Lisbet Arevalo is a seasoned maintenance technician with over 30 years of hands‑on experience in plumbing, electrical, HVAC, and carpentry, who blends a practical, safety‑first mindset with
    a curiosity for new repair techniques, and now leverages her CMMS expertise to pursue a supervisory role while mentoring younger tradespeople.
  sports: Lisbet Arevalo walks the Long Branch boardwalk three times a week, follows the New York Giants and New Jersey Devils as a fan, and belongs to a local senior volleyball league that plays at the
    community recreation center each summer.
  arts: Lisbet Arevalo enjoys listening to marimba ensembles, salsa classics by Celia Cruz and Eddie Palmieri, attends the annual local cultural festival featuring traditional dance performances, and collects
    vintage home‑improvement magazines as a form of tactile art.
  travel: Lisbet Arevalo favors short weekend trips to the Jersey Shore, has explored historic Philadelphia neighborhoods, and dreams of visiting the colonial cities of Savannah and Charleston to experience
    Southern architecture and cuisine within her modest travel budget.
  culinary: Lisbet Arevalo excels at cooking pepper‑rich dishes like pepian, tamales, and chiles rellenos, tends her backyard tomatoes, peppers, and herbs, and often hosts neighborhood potlucks where she
    shares these home‑cooked meals while swapping gardening tips.
  core: Lisbet Arevalo balances a practical, safety‑driven work ethic with a curiosity for new techniques, worries frequently about finances and health, yet finds calm in gardening, crochet, and cooking
    hearty traditional meals for her community.
background:
  cultural: 'Lisabet is a first‑generation immigrant from the highlands of Guatemala who moved to New Jersey in her early twenties. She grew up in a close‑knit, Spanish‑speaking family that emphasized hard
    work, respect for elders, and Catholic traditions. In Long Branch, she maintains many Guatemalan customs: celebrating Semana Santa with family gatherings, preparing regional dishes, and participating
    in community events organized by the local Guatemalan cultural association. Her bilingual ability allows her to bridge her heritage with her American environment, often translating for older neighbors
    or new arrivals. The values of humility, family solidarity, and a strong work ethic from her Guatemalan upbringing shape her approach to both her career and personal life.'
attributes:
  skills: '[''Plumbing'', ''Electrical repairs'', ''HVAC maintenance'', ''Carpentry'', ''Preventive maintenance planning'', ''Safety compliance (OSHA)'', ''Equipment operation'', ''Blueprint reading'',
