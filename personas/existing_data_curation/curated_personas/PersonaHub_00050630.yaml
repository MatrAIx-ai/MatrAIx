persona_description: A black American Christian who is deeply committed to the struggle against racism and social injustice, particularly through the lens of African-American Christianity. This person is
  a critical thinker who has engaged with the complex issues surrounding American exceptionalism, slavery, segregation, discrimination, and racism. This individual has a strong moral compass and has been
  influenced by figures from various religious traditions, including Thoreau, Gandhi, Rauschenbusch, and the Hebrew prophets. This person is likely to be active in the civil rights movement and to have
  a deep understanding of the resources available to people of different faiths in their struggle against injustice.
