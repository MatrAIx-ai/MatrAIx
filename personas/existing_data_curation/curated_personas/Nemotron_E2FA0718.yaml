    at a neighborhood food pantry"]'
  career_goals: Frances aims to advance from her current sales associate role to a store manager position within the next two to three years, leveraging her organizational strengths and leadership abilities.
    She plans to complete a business‑focused associate degree through a local community college and attend retail management workshops to broaden her strategic skill set. Long‑term, she envisions opening
    a small boutique that emphasizes sustainable, locally sourced fashion, where she can apply her knack for visual merchandising and her curiosity for emerging retail trends while mentoring new staff.
