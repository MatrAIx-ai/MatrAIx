personas:
  professional: Catherine Mercado is a budding junior architect in the making, channeling their love for LEGO into meticulously planned structures and demonstrating a practical, organized approach that
    mirrors their preference for predictability while still allowing room for creative flexibility, a mindset they proudly share with friends.
  sports: Catherine Mercado thrives in weekly soccer practice with the Greenfield Tigers junior league, follows the coach's drills with disciplined focus, and enjoys cheering for the professional team River
    City FC, while also spending afternoons at the local park on the swing set and climbing frame, where they often practice new moves.
  arts: Catherine Mercado expresses creativity through vibrant drawings inspired by Eric Carle and Dr. Seuss, enjoys reading picture books like "The Very Hungry Caterpillar" aloud, and regularly crafts
    LEGO mosaics that blend structure with imagination, a process they approach with meticulous enthusiasm.
  travel: Catherine Mercado loves family hikes through the nearby Whispering Hills, often collecting leaves for nature projects, dreams of exploring the Grand Canyon, and eagerly plans a weekend trip to
    Sunlit Beach where they can build sandcastles and hunt for shells.
  culinary: Catherine Mercado delights in assisting with weekend cupcakes, meticulously measuring flour and sugar, eagerly sprinkling rainbow sprinkles, yet often forgets to wipe frosting from their hands,
    leaving a sweet trail that matches their enthusiastic but slightly messy cooking style, a habit they proudly display.
  core: Catherine Mercado combines a love for orderly LEGO building, disciplined soccer drills, and vibrant artwork with a quirky habit of leaving frosting footprints, embodying a practical yet creatively
    curious six‑year‑old who balances structure with spontaneous fun and often impresses others with the way they turn everyday moments into mini‑adventures.
background:
