personas:
  professional: Cyrus Livatt, a retired educator with decades of experience in adult learning, curriculum design, and community programming, channels their imaginative curiosity and sociable nature into
    mentoring youth and seniors through intergenerational art workshops, even though their relaxed attitude toward scheduling sometimes leaves paperwork unfinished.
  sports: Cyrus Livatt stays active by walking with the Columbus Senior Strollers club, cheering on the Atlanta Braves each baseball season, and joining low‑impact yoga classes at the community center,
    preferring gentle exercise over high‑intensity workouts.
  arts: Cyrus Livatt paints watercolors of the Muscogee River while listening to the soulful sounds of B.B. King, John Coltrane, and Miles Davis, attends backstage rehearsals at the local theater, and enjoys
    poetry readings of Langston Hughes and Maya Angelou, allowing their imaginative side to flourish.
  travel: Cyrus Livatt dreams of a pilgrimage to Ghana’s Cape Coast Castle and a visit to a national museum in Washington, D.C. that celebrates the African diaspora, while regularly taking relaxed weekend
    drives to Savannah’s historic squares and the Blue Ridge Mountains, favoring spontaneous itineraries over rigid travel plans.
  culinary: Cyrus Livatt, an adept home cook with a green thumb, regularly prepares collard greens with smoked turkey, shrimp and grits, and sweet‑potato pie using heirloom vegetables from their garden,
    and delights in pairing these dishes with homemade cornbread and a splash of hot sauce from the local farmers’ market.
  core: Cyrus Livatt, a 73‑year‑old retired educator, blends storytelling, watercolor painting, and gardening into a vibrant community life, though their laid‑back approach sometimes leads to missed appointments
    and forgotten bill payments.
background:
  cultural: Cyrus grew up in the rural South during the era of segregation and the Civil Rights Movement, experiences that shaped his deep appreciation for community solidarity and cultural expression.
    He was raised in a close‑knit Black family that valued the teachings of the church, oral storytelling, and music, especially gospel, jazz, and blues. His upbringing in Muscogee County exposed him to
    the rich heritage of African American farming communities, local festivals like Juneteenth, and a tradition of mutual aid. These cultural influences are reflected in his commitment to preserving and
    sharing Black history, his love for soulful cooking, and his involvement in community‑centered activities.
