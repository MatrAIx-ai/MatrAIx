  career_goals: Even in retirement, Cyrus aims to continue sharing his knowledge by volunteering as a mentor at local schools and community centers, developing a series of intergenerational art workshops
    that blend storytelling, visual arts, and local history. He hopes to compile his experiences and reflections into a memoir or collection of short essays that celebrate the cultural heritage of the Black
    community in the South. He also aspires to lead a community garden project that provides fresh produce and a gathering space for residents, and to travel to significant cultural sites such as Ghana
    and the National Museum of African American History and Culture.
