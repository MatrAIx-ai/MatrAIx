personas:
  professional: An aspiring community organizer in middle school, Susan Leggett combines their love for group activities and practical thinking to lead Girl Scouts projects, using step‑by‑step planning
    templates while often forgetting to file the final paperwork.
  sports: A dedicated school soccer player, Susan Leggett cheers for the Tampa Bay Rowdies, practices twice weekly, and joins a local youth swim club during the summer, balancing competitive drive with
    their preference for familiar routines.
  arts: A budding illustrator, Susan Leggett spends evenings sketching characters from their favorite fantasy novels, admires the works of Studio Ghibli and Disney animator Glen Keane, and posts their drawings
    on a private Instagram account for friends and family.
  travel: An enthusiastic beach‑comber, Susan Leggett loves weekend trips to the Gulf Coast collecting seashells, dreams of visiting the Disney World resort in Orlando, and prefers structured travel itineraries
    with clear daily activities that suit their need for routine.
  culinary: A self‑taught junior baker, Susan Leggett enjoys whipping up chocolate‑chip cookies and lemon‑zest cupcakes, experiments with fresh Florida oranges in frosting, and often trades their treats
    for neighborhood favors.
  core: A social, routine‑loving teen who balances group leadership with occasional worry, Susan Leggett is a creative baker, sketcher, and soccer enthusiast who sometimes forgets to tidy their schedule.
background:
  cultural: Susan is a White American raised in a middle‑class family in Tampa, Florida. Her parents, who both work in local service industries, emphasize practicality, community involvement, and a steady
    work ethic—a reflection of traditional Southern values blended with the multicultural flavor of the Gulf Coast. The family attends a Baptist church, participates in neighborhood block parties, and celebrates
    both typical American holidays and regional events like the Tampa Bay Food & Wine Festival, where she enjoys the local seafood cuisine. Her ancestry includes Irish and German roots, and she has grown
    up hearing stories of grandparents who migrated from the Midwest, adding a layer of heritage pride to her personal identity.
