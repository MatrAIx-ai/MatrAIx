  career_goals: Looking ahead, Susan sees herself in a career that combines structure, helping others, and regular interaction with children. She hopes to become an elementary school teacher, valuing the
    predictable school schedule and the chance to create a supportive, routine‑rich classroom environment. She plans to graduate high school with strong grades, attend a local university’s education program,
    and eventually earn a teaching credential. Along the way she also imagines gaining experience as a volunteer tutor or youth camp counselor.
