persona_description: A historian who specializes in the study of Roman law and its application to colonialism, particularly in England's early colonial ventures in the Americas. The historian is well-versed
  in the nuances of Roman law and its evolution over time, and how it has been applied to the colonization of new territories. The historian is also knowledgeable about the controversy surrounding the use
  of the term "terra nullius" in English colonization of Australia, and how it has been used to justify the claims of colonizers. The historian has a keen interest in the historical context of colonization
  and the role of law in shaping it, and is likely to have a deep understanding of the complex legal and political dynamics of colonialism.
