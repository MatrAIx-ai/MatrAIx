personas:
  professional: Victor Perazo, a 16‑year‑old sophomore with a talent for diagnosing gaming PC hardware glitches and a budding skill in automotive maintenance, channels their methodical, step‑by‑step problem‑solving
    style and competitive drive into building a small‑scale service venture while juggling school responsibilities.
  sports: Victor Perazo spends winter mornings shooting hoops with the high school basketball team, follows the Dallas Mavericks for NBA inspiration, joins the community fishing club during summer, and
    keeps fitness practical with short calisthenics after each PC build, though they often skip workouts when a new game release looms.
  arts: Victor Perazo finds artistic refuge in the lively strains of regional bandas like Banda El Recodo and Los Tigres del Norte, binge‑watches documentary series by Ken Burns and National Geographic,
    and occasionally sketches motherboard layouts as graphic art while admiring the cinematic work of Christopher Nolan and the performances of Michael B. Jordan.
  travel: Victor Perazo plans trips with the same precision as a PC build, favoring budget‑friendly road trips to fishing spots like Lake Austin and tech‑centric city tours of Seattle, dreaming of a solo
    visit to Tokyo’s Akihabara district and the rugged coastlines of Iceland, though limited allowance often reins in the scope of travel.
  culinary: Victor Perazo relishes mixing family‑passed recipes such as carnitas tacos and homemade salsa verde with experimental spice tweaks, cooks at an intermediate skill level using corn masa, chipotle
    peppers, and fresh cilantro, and pairs gaming nights with loaded nachos and jalapeño poppers.
  core: Victor Perazo is a tech‑obsessed, methodical teen who balances relentless curiosity with pragmatic DIY projects, all while wrestling with stress‑driven worries and a competitive streak that fuels
    both their builds and ambitions.
background:
  cultural: Victor is the son of Mexican immigrants who settled in Winter Haven, Florida, when he was young. He grew up in a bilingual household, speaking Spanish at home and English at school, and his
    family maintains Mexican traditions such as celebrating Día de los Muertos, preparing tamales during holidays, and attending Catholic services. He participates in local cultural festivals and maintains
    strong ties to the Mexican community, blending his heritage with the diverse influences of central Florida.
attributes:
  skills: '["Electronic troubleshooting", "Computer hardware assembly", "Basic automotive repair", "Bilingual communication (Spanish/English)", "Analytical problem solving"]'
  hobbies: '["Building custom PCs", "Strategy video gaming", "Basic car maintenance", "Reading tech blogs", "Watching documentaries", "Fishing", "Listening to Mexican music", "Cooking family recipes"]'
  career_goals: Victor aims to earn a technical certification in IT support or automotive technology, seeking a scholarship or apprenticeship that will allow him to bypass traditional schooling constraints.
    He envisions becoming a certified technician who can launch his own small business fixing electronics and performing basic car maintenance for his community, valuing independence, personal achievement,
    and a stable income that reduces his stress about the future.
