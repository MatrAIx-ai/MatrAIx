personas:
  professional: Larissa Gonzales, a 26‑year‑old administrative specialist with bilingual fluency, basic Python scripting, and a flair for graphic design, leverages her curiosity and flexible, people‑focused
    mindset to streamline project workflows and excel in dynamic, collaborative environments while eyeing a transition to project coordination.
  sports: Larissa Gonzales stays active by joining weekly Zumba and salsa sessions at the Cypress Community Center, cheering on the Houston Astros and Rockets, and occasionally lacing up for a 5K run with
    the local Cypress Runners Club.
  arts: Larissa Gonzales fuels her creative spirit by frequenting the Museum of Fine Arts Houston, admiring the vibrant murals of Revok, hosting DIY craft nights inspired by Frida Kahlo’s palette, and dancing
    to the sounds of Lila Downs and Selena at community festivals.
  travel: Larissa Gonzales prefers spontaneous weekend getaways, having explored Mexico City’s historic plazas and New Orleans’ jazz districts, and now dreams of a culinary road trip through Oaxaca and
    an immersive street‑art tour in Barcelona.
  culinary: Larissa Gonzales, an enthusiastic home‑cook, perfects tacos al pastor and chiles en nogada while blending chipotle‑infused marinades with Tex‑Mex queso fresco for lively dinner parties, and
    she regularly hunts for authentic pozole at hidden Houston taquerías.
  core: Larissa Gonzales navigates life with a curious, art‑driven spirit, thriving on spontaneous group activities and cultural celebrations, yet often lets her calendar slip in favor of last‑minute creative
    bursts and impromptu dance parties.
background:
  cultural: Larissa was raised in a bilingual Mexican‑American household in Texas, where family gatherings, traditional celebrations, and Catholic customs played a central role. She maintains strong ties
    to Mexican culture through language, cuisine, and participation in community events such as quinceañeras and Día de los Muertos. Living in Cypress, she blends this heritage with the multicultural vibe
    of the greater Houston area, embracing both Tex‑Mex flavors and the region’s diverse artistic expressions. Her upbringing instilled a respect for family, community solidarity, and a pride in her heritage,
    all of which shape her worldview and daily life.
