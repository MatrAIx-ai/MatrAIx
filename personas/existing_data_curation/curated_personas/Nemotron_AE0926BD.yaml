  career_goals: Larissa aims to leverage her STEM education and administrative experience to transition into a project coordination or operations management role within a dynamic, culturally diverse organization.
    Over the next three years, she plans to earn a Project Management Professional (PMP) certification and pursue an MBA focused on technology management. She aspires to lead cross‑functional teams, implement
    efficient workflows, and later mentor other women in the workplace. Long‑term, she envisions becoming a senior office manager or director of operations, while maintaining a flexible schedule that allows
    her to stay engaged in community arts initiatives and cultural events.
