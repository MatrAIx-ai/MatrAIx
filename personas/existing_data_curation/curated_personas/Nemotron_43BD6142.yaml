  career_goals: Although retired from formal employment, Johnny aims to stay active in his community by leading a weekly woodworking class at the senior center, preserving and documenting local Appalachian
    stories for the county historical society, and completing a personal project to build a sustainable garden shed using reclaimed materials. He also hopes to compile his memoirs and family genealogy,
    sharing the region's cultural heritage with future generations. His competitive streak motivates him to participate in the county's senior handyman competition and to continually improve his crafts.
