personas:
  professional: Johnny Jackson, a retired handyman turned community crafts instructor, leverages decades of woodworking, plumbing, and electrical troubleshooting with a flexible, improvisational style to
    lead weekly senior-center classes while still tackling unscripted restoration projects, and they enjoy sharing practical tips with fellow enthusiasts.
  sports: Johnny Jackson spends mornings fishing the Kanawha River, hikes local Blue Ridge trails in summer, follows the Charleston RiverDogs minor-league baseball team, and participates in the senior center’s
    bridge league, a mental workout they treat as a competitive sport.
  arts: Johnny Jackson, a lifelong fan of bluegrass, tunes their banjo to the sounds of Bill Monroe, the Stanley Brothers, and modern Appalachian folk group The Infamous Stringdusters, while also devouring
    historical novels by Bernard Cornwell and attending the annual Mountain Heritage Festival to soak in storytelling and regional art, and they often share these influences during community gatherings.
  travel: Johnny Jackson favors spontaneous road trips along the Blue Ridge Parkway, frequently revisits Shenandoah National Park for its vistas, has explored Asheville’s Biltmore Estate, and dreams of
    a relaxed river cruise on the Mississippi, planning each adventure with a loose itinerary that they adjust on the fly.
  culinary: Johnny Jackson enjoys cooking with garden-fresh tomatoes, hot peppers, and basil, often preparing grilled trout with herb butter, heirloom tomato salsa, and smoked pork shoulder stew, relying
    on a well-seasoned cast-iron skillet and a love for flame-kissed Appalachian recipes, and they proudly serve the dishes to friends at their weekly garden potluck.
  core: Johnny Jackson, 75, is a practical, competitive craftsman who blends bluegrass banjo strums with river fishing, community storytelling, and a habit of misplacing screws right after a successful
    project, and they relish the challenge of turning each mishap into a new learning opportunity.
background:
  cultural: Johnny grew up in the Appalachian region of West Virginia, immersed in the traditions of a white, multi‑generation family with English, Irish, and German roots. His upbringing emphasized self‑reliance,
    community cooperation, and a deep respect for the natural landscape of Kanawha County. He is an active member of his local Methodist congregation and participates in regional events such as the West
    Virginia State Fair and the annual coal‑heritage festival. His cultural identity is reflected in his appreciation for Appalachian cuisine—like pepperoni rolls and biscuits—and his commitment to preserving
    local history and storytelling.
