  hobbies: '[''Fishing'', ''Woodworking'', ''Barbecue cooking'', ''Community festivals and potlucks'', ''Playing cards with friends'', ''Watching Alabama Crimson Tide football'', ''DIY home repairs'', ''Gardening'',
