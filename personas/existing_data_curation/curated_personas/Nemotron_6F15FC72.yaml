personas:
  professional: Jennifer Park, a 16‑year‑old varsity soccer player and student‑council leader in a small South Carolina town, leverages her methodical planning skills, introductory Python knowledge, and
    first‑aid certification to spearhead school events and community projects, demonstrating a competitive yet community‑focused approach that foreshadows her future ambitions in civil engineering and sustainable
    infrastructure.
  sports: Jennifer Park channels her competitive energy into varsity soccer for the Lyman Lions, cheerleading, and daily conditioning runs, proudly cheering for the Carolina Panthers and Clemson Tigers
    while supplementing her training with yoga sessions at the local community center, embodying a disciplined yet spirited approach to fitness.
  arts: Jennifer Park expresses her creative side through DIY décor projects inspired by the bright aesthetics of Etsy creator Lauren Conrad, devours science‑fiction novels by authors like Veronica Roth,
    and finds inspiration at local music festivals featuring artists such as Luke Bryan, Olivia Rodrigo, and Taylor Swift, which together color her identity with a blend of Southern storytelling and contemporary
    pop culture.
  travel: Jennifer Park prefers road‑trip adventures with friends, having explored the Blue Ridge Parkway and spent a weekend at Myrtle Beach, while saving for a future family trip to Kyoto and a senior‑year
    spring break visit to the Grand Canyon, balancing meticulous budgeting with a love for spontaneous scenic stops.
  culinary: Jennifer Park enjoys cooking Southern staples such as shrimp and grits, fried chicken, and peach cobbler, often incorporating fresh tomatoes and sweet corn from her garden, and while her cooking
    skill is solid enough to follow family recipes confidently, she occasionally experiments with a splash of hot sauce or a hint of Cajun seasoning to personalize each dish.
  core: Jennifer Park is a competitive yet community‑oriented teen who balances meticulous event planning, a love for soccer and DIY projects, and a habit of binge‑watching strategy games late into the
    night, all while never missing a Sunday service.
background:
  cultural: Jennifer was raised in a close-knit white family in Lyman, a small town in Spartanburg County, South Carolina. Her upbringing reflects typical Southern values of hospitality, strong community
    ties, and church involvement; she attends a local Baptist congregation with her family. Community events such as county fairs, church picnics, and high-school football games have shaped her social life.
    Her family emphasizes hard work, education, and modest conservatism while encouraging curiosity and practical problem solving. These cultural influences blend with her outgoing personality to make her
    both a reliable community participant and a competitive individual.
