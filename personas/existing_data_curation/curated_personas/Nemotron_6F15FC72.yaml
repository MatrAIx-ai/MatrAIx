  career_goals: Jennifer aims to earn a scholarship to attend a South Carolina university where she can study civil engineering or environmental science. She wants to combine her organized, methodical nature
    with her love for community improvement by designing sustainable infrastructure projects in rural areas like Lyman. Her long-term ambition is to become a project manager for a regional engineering firm,
    eventually leading her own consultancy that focuses on safe, practical, and environmentally responsible development. She also hopes to mentor younger students through STEM outreach programs.
