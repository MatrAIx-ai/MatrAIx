persona_description: A historian who specializes in the study of Korean history, particularly the development of papermaking and printing skills in Korea from the 2nd century to the 19th century. Their
  research interests include, but are not limited to, the cultural, economic, and social aspects of papermaking and printing in Korea, the impact of foreign influence and modernization on Korean traditional
  culture, and the role of paper as a material of daily life in Korea. They are also interested in the history of papermaking and printing in other Asian countries, and the influence of Korean paper on
  the development of papermaking and printing in other parts of the world.
