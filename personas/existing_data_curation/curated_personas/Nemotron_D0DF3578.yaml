  career_goals: Looking ahead, Hemal aims to step into a senior operations leadership role where she can shape organization‑wide policies that promote employee well‑being and flexible work arrangements.
    She is passionate about establishing mentorship programs for early‑career professionals, especially those from immigrant backgrounds, and hopes to champion diversity and inclusion initiatives within
    her company. While she enjoys the day‑to‑day supervisory work, she also envisions a phased transition into a consulting capacity, helping small businesses design humane, efficient administrative systems
    that reduce staff stress. Ultimately, she seeks to leave a lasting legacy of compassionate leadership and practical, people‑centered process design.
