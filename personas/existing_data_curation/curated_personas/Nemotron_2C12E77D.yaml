personas:
  professional: Anna Givens, a secondary school English teacher in Manchester, NH, designs inquiry-based, interdisciplinary curricula that blend literature, visual arts, and social studies, leveraging digital
    tools like Google Classroom and digital storytelling to foster creative exploration, and they navigate a relaxed, sometimes chaotic planning style.
  sports: Anna Givens, an avid weekend hiker, frequently tackles the White Mountains with their local hiking club, cheers for the New Hampshire Wildcats hockey team, and they occasionally join a casual
    co-ed volleyball league at the community center during the summer.
  arts: Anna Givens immerses herself in the Manchester arts scene, attending exhibitions at the Currier Museum of Art, drawing inspiration from Frida Kahlo’s vibrant self-portraits and the poetry of Mary
    Oliver, and they regularly contribute watercolor sketches to community gallery shows.
  travel: Anna Givens favors low-key, culturally rich trips, such as weekend retreats to the historic town of Portsmouth for its maritime museums, and they plan a two-week journey to Kyoto in spring to
    study traditional tea ceremony and Japanese garden design.
  culinary: Anna Givens enjoys experimenting with seasonal New England cuisine, often preparing pumpkin gnocchi with sage butter and foraged mushroom risotto, while they master the art of lemon-raspberry
    tart filling using fresh raspberries from the local farm stand.
  core: Anna Givens balances a chaotic, creative teaching career with a soulful devotion to arts, nature, and mindfulness, yet they often worry about unfinished tasks and occasional financial disarray.
background:
  cultural: Anna comes from a multigenerational Anglo‑American family rooted in New England. Raised in a middle‑class suburb of Manchester, she was exposed early to the region’s literary heritage, historic
    town festivals, and a strong emphasis on public education. Her cultural identity blends a respect for traditional New England values—self‑reliance, community involvement, and a love of the outdoors—with
    progressive, liberal‑arts ideals that champion diversity, inclusivity, and artistic expression. She identifies with the broader American cultural landscape while maintaining a deep appreciation for
    New Hampshire’s local history and seasonal rhythms.
