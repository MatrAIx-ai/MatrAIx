    experimental seasonal dishes'']'
  career_goals: Anna aims to become a department head or curriculum coordinator where she can expand interdisciplinary arts programs across the district. She plans to pursue a master's degree in Arts Education
    or Inclusive Pedagogy to deepen her research on arts‑based learning and mental‑health supports for students. Long‑term, she hopes to author articles on creative curriculum design, lead professional
    development workshops for teachers, and establish a sustainable after‑school arts mentorship program that provides safe creative outlets for at‑risk youth.
