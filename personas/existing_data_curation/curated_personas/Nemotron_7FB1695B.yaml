  hobbies: '["Cooking Traditional Mexican Dishes", "Herb Gardening", "Journaling", "Mindfulness Meditation", "Reading Mystery Novels", "Embroidery and Cross‑Stitch", "Walking in Local Parks", "Small‑Group
    Craft Circle"]'
  career_goals: Maria aims to re-enter the workforce in a structured, supportive role that leverages her organizational strengths and bilingual abilities, such as an administrative assistant, community
    health worker, or manager of a small catering operation. She plans to complete a certification in bookkeeping or office administration within the next year to strengthen her qualifications. Her long‑term
    ambition is to secure a stable full‑time position that offers professional growth while allowing her to maintain personal well‑being, and eventually to launch a home‑based catering service that celebrates
    her Mexican culinary heritage.
