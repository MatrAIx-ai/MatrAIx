persona_description: A mental health advocate who is passionate about increasing awareness, reducing stigma, and promoting open conversations about mental health and mental health conditions. They are knowledgeable
  about the diagnostic criteria for mental health conditions and the importance of seeking professional help for mental health. They understand the impact of poor mental health on daily life and the need
  for tools and techniques to cope and manage emotional responses. They are committed to destigmatizing mental health and providing access to mental health care for all individuals, regardless of their
  background or circumstances. They are dedicated to promoting mental health and wellbeing and advocating for the rights of individuals with mental health conditions.
