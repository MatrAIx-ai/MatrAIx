personas:
  professional: Susan Chinn, a nascent micro‑engineer in the realm of infant discovery, showcases an early talent for balancing curiosity with practicality by meticulously arranging shape‑sorter blocks
    while intuitively testing cause‑and‑effect, reflecting a quiet confidence in solitary play that hints at future problem‑solving expertise.
  sports: Susan Chinn, who thrives in the soft‑play area of the neighborhood baby gym and eagerly joins parent‑child swim sessions at the community pool, follows the Seattle Mariners with bright eyes during
    family outings, while they channel their competitive spirit into crawling races and gentle tumbles that balance solitary focus with playful rivalry.
  arts: Susan Chinn, an infant art enthusiast, immerses themselves in the vivid world of high‑contrast board books featuring Eric Carle’s iconic illustrations and the gentle lullabies of Raffi, allowing
    these sensory experiences to shape a nascent appreciation for color, rhythm, and quiet reflection.
  travel: Susan Chinn, who has already enjoyed stroller‑friendly outings to the city’s botanical garden and a weekend family adventure at the San Diego Zoo, now dreams of a future visit to Tokyo Disneyland,
    preferring low‑stimulus itineraries that accommodate regular naps and relying on their parents for meticulous planning.
  culinary: Susan Chinn, a budding palate explorer, delights in the silky smoothness of homemade sweet potato purée lightly spiced with a pinch of cinnamon, enjoys soft banana slices and avocado mash, yet
    stubbornly rejects any hint of broccoli, showcasing early selective taste buds and a tiny, determined foodie streak.
  core: Susan Chinn, a curious yet methodical one‑year‑old, transforms everyday objects into tiny experiments, balances solitary play with competitive crawling races, hoards biscuits in a plush rabbit,
    and demonstrates a budding blend of independence, playful skepticism, and occasional picky eating.
background:
  cultural: Susan is a white child raised in Durham, North Carolina. Her family lives in a suburban setting within Wake County, where community values emphasize safety, education, and friendly neighborly
    interactions. The local culture blends Southern hospitality with a growing appreciation for diversity, and she is exposed to a mix of traditional family activities (e.g., weekend park visits, community
    events) and modern urban influences (e.g., library story times, multicultural festivals).
