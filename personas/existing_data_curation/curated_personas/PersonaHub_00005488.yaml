persona_description: A historian who specializes in the study of epidemics and their impact on history, particularly in India. They have conducted research on the role of epidemics in shaping socio-political
  and cultural developments in India and the world. They are interested in understanding the exacerbation of prejudices and power dynamics during times of crises and the potential for pandemics to open
  new worlds. They are also interested in the impact of pandemics on the lives of ordinary people, particularly those who are marginalized or have limited resources.
