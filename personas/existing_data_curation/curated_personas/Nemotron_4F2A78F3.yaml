  hobbies: '[''Street photography'', ''Attending art exhibitions and theater'', ''Cooking traditional and fusion dishes'', ''Salsa and folk dance classes'', ''Community gardening'', ''Board games and trivia
    nights'', ''Exploring new music and cultural festivals'']'
  career_goals: Jovian aims to deepen his role as a cultural bridge within the Valley Stream and broader Queens Latino community. He plans to launch a monthly Andean Arts & Stories gathering that showcases
    traditional music, dance, and visual art, aspiring to become the region’s recognized elder ambassador for Ecuadorian heritage. He also wishes to mentor at‑risk youth by teaching them cooking and basic
    home‑repair skills, hoping to be awarded a community leadership grant. On a personal level, he is determined to document his life story and family recipes in a memoir‑cookbook, believing his unique
    perspective can inspire others. Finally, he is exploring digital photography to capture neighborhood life, aiming to exhibit his work in a local gallery within the next two years.
