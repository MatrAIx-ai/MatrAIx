personas:
  professional: Jovian Barrios is a community cultural facilitator who blends meticulous event planning with hands‑on home‑repair expertise, using their bilingual fluency and competitive drive to organize
    vibrant festivals, mentor youth in cooking and carpentry, and curate photography exhibitions that capture the neighborhood’s diverse stories.
  sports: Jovian Barrios stays active by attending weekly salsa‑folk dance classes, strolling the Queens Botanical Garden, and cheering on the New York Knicks, New York Yankees, and New York City FC, while
    they belong to a local senior walking club that meets every Saturday for low‑impact cardio.
  arts: Jovian Barrios immerses themselves in the arts through street photography of Queens festivals, curating mini‑exhibits featuring works inspired by Frida Kahlo and local muralist JR, attending Off‑Broadway
    productions like 'Hadestown', and listening to folk singer Susana Baca while humming traditional Andean melodies during creative sessions.
  travel: Jovian Barrios prefers culturally immersive trips, alternating between weekend visits to the Andean highlands of their birthplace to reconnect with family roots and longer journeys to the Galápagos
    Islands for wildlife, while they rely on travel rewards credit cards to offset costs and plan itineraries that blend adventure with relaxation.
  culinary: Jovian Barrios excels at preparing traditional dishes like ceviche, encebollado, and llapingachos, often experimenting with fusion twists such as quinoa‑crusted fish tacos, and they favor fresh
    ingredients like heirloom tomatoes, ají peppers, and cilantro, while occasionally over‑seasoning and offering generous leftovers to neighbors.
  core: Jovian Barrios, a 65‑year‑old community elder, balances meticulous event coordination with a competitive love for trivia, captures neighborhood life through street photography, and they habitually
    hum folk tunes while fixing leaky faucets.
background:
  cultural: Jovian was born in the Andean highlands of Ecuador, where his family farmed and celebrated rich Indigenous and mestizo traditions. He migrated to the United States in his early twenties, settling
    in the New York metropolitan area and eventually making Valley Stream his home. Over the decades, he has maintained strong ties to Ecuadorian customs—preparing ceviche for family gatherings, participating
    in the annual Día de los Difuntos celebrations, and preserving folk songs. Living in Queens County’s vibrant Latinx diaspora, he blends his heritage with the multicultural tapestry of New York, actively
    contributing to community festivals and sharing his cultural knowledge with both Latino and non‑Latino neighbors.
attributes:
  skills: '[''Home maintenance (carpentry, plumbing, electrical)'', ''Bilingual Spanish–English translation'', ''Ecuadorian culinary arts'', ''Community event planning'', ''Art curation and commentary'',
