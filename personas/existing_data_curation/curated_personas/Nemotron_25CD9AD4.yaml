  career_goals: Natalie aims to grow within the retail environment by taking on supervisory responsibilities, such as becoming a shift lead or assistant manager, while retaining the flexible schedule that
    suits her adaptable lifestyle. She hopes to blend her business background with her passion for the arts by curating rotating art displays in the store and organizing community art events. Additionally,
    she is interested in launching a small side venture that sells locally‑made crafts, allowing her to support fellow artists and maintain a creative outlet alongside her primary job.
