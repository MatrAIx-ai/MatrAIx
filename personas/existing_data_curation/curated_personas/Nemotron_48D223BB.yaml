personas:
  professional: Tonya Hutchinson leverages strategic planning, cross‑functional coordination, and a people‑centric leadership style to boost operational efficiency in a fast‑growing retail chain, balancing
    her curiosity for market trends with pragmatic, flexible frameworks, while her competitive streak pushes revenue targets forward despite occasional disorganization in meeting deadlines.
  sports: Tonya Hutchinson's athletic pursuits center on weekly Zumba, ballroom‑dance sessions, and hiking the Texas Hill Country, and she proudly dons a Dallas Cowboys cap while cheering at Sunday games,
    follows the Texas Rangers for baseball, and meets with a local hiking club that convenes every first Saturday of the month.
  arts: Tonya Hutchinson engages with the arts through a lively wine‑tasting club that pairs vintages with live jazz, a book club that devours contemporary fiction by authors such as Sally Rooney and Chimamanda
    Ngozi Adichie, and a love for Broadway choreography, especially the dynamic numbers in Hamilton, which she often references in her ballroom routines.
  travel: Tonya Hutchinson prefers adventure‑filled group travel, planning trips to cultural festivals like Austin’s SXSW, New Orleans Mardi Gras, and the Day of the Dead celebrations in Oaxaca, while also
    squeezing in weekend getaways to Hill Country vineyards; she often books last‑minute itineraries to keep costs low, yet her competitive side drives her to secure the best lodging and exclusive experiences
    before they sell out.
  culinary: Tonya Hutchinson enjoys cooking at a moderate skill level, frequently experimenting with Tex‑Mex fusion dishes such as chipotle‑marinated carne asada tacos, Mediterranean paella, and rosemary‑infused
    sourdough sourced from herbs she grows in her garden, though her somewhat disorganized pantry leads to forgotten ingredients and spontaneous recipe improvisations.
  core: Tonya Hutchinson is a 48‑year‑old sociable, competitive leader who blends curiosity with practicality, pursues energetic group activities to offset work stress, and balances ambitious career goals
    with a flexible, occasionally scattered approach to life.
background:
  cultural: Tonya is a white American who grew up in the Dallas‑Fort Worth metropolitan area and now lives in the affluent suburb of Frisco, Texas. Her upbringing blends Southern hospitality with Midwestern
    practicality, reflecting the region’s emphasis on community, family gatherings, and outdoor recreation. She celebrates traditional holidays such as Thanksgiving and the Fourth of July, often attending
    neighborhood festivals like the Frisco Freedom Festival, and maintains strong ties to local churches and civic organizations.
