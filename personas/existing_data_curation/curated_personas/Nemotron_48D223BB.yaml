  career_goals: Tonya aims to move into a senior director role within the next three years, overseeing multiple business units and shaping company‑wide strategy. She is motivated to build a high‑performing
    culture that balances ambitious targets with employee well‑being, using her competitive drive to exceed revenue goals while implementing flexible work practices that reduce her own stress. In the longer
    term, she plans to launch a boutique consulting firm that helps mid‑size companies streamline operations through pragmatic, data‑driven approaches.
