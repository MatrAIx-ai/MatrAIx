  hobbies: '[''Gardening'', ''Traditional Punjabi Cooking'', ''Walking'', ''Reading Historical Fiction'', ''Knitting'', ''Volunteering at Science Center'', ''Senior‑Center Folk Dance'', ''Family Genealogy
    Research'']'
  career_goals: Now retired, Thary seeks to stay intellectually and socially engaged. She aims to mentor high‑school and college students—especially young women of South Asian descent—through local STEM
    outreach programs. She also wishes to volunteer as an event coordinator for the regional Sikh and cultural festivals, preserving her heritage while fostering community ties. Healthwise, she plans to
    maintain her daily walking routine and expand her garden to grow more medicinal herbs. A long‑standing dream is to travel back to Punjab to document family stories and compile them into a memoir and
    a family cookbook.
