personas:
  professional: Thary Saied, an experienced civil engineer who spent 35 years designing bridges and municipal infrastructure, now channels her structural analysis expertise and AutoCAD mastery into mentoring
    high‑school girls in STEM through hands‑on workshops at the local science center while habitually relying on familiar routines yet staying flexible enough to improvise when a project deadline shifts.
  sports: Thary Saied, a dedicated walker who covers the Patapsco River Trail five times a week, participates in a senior‑center gentle folk dance class and cheers for the Baltimore Ravens, Baltimore Orioles,
    and Washington Wizards, while occasionally joining community bocce tournaments for a light competitive outlet.
  arts: Thary Saied, a lover of traditional folk music who fills her garden evenings with recordings of Gurdas Maan and classic Bollywood scores, enjoys historical fiction novels about the Indian subcontinent,
    knits scarves inspired by patterns seen in local cultural festivals, and attends seasonal performances by a community theater troupe showcasing regional dance dramas.
  travel: Thary Saied, an aspiring memoirist who dreams of returning to Punjab to record family stories and gather recipes for a cookbook, has already visited the historic streets of Lahore, taken weekend
    trips to the Chesapeake Bay for kayaking, and plans a future pilgrimage to the Golden Temple after her garden harvest season concludes.
  culinary: Thary Saied, a home‑cooking enthusiast who cultivates mustard greens, fenugreek, and rosemary in her back‑yard garden to craft authentic sarson da saag with makki di roti, frequently experiments
    with homemade butter chicken using garam masala and fresh cilantro, and occasionally forgets to freeze leftovers, leading to occasional weekly take‑out indulgences.
  core: Thary Saied, a routine‑driven retiree who balances a practical engineering mindset with a love for community gardening, storytelling, and gentle cultural celebrations, all while occasionally letting
    disorganization slip into her finances and health routines.
background:
  cultural: Thary is a first‑generation American of Punjabi Sikh heritage. Born to parents who immigrated from the Amritsar region, she grew up speaking Punjabi at home and observing Sikh customs, including
    regular attendance at the local gurdwara and participation in festivals such as Vaisakhi and Diwali. Her family places a high value on education, community service, and respect for elders, which shaped
    her practical and cooperative nature. While she embraces the multicultural fabric of Howard County, she remains deeply connected to South Asian traditions, integrating them into her daily routines,
    cuisine, and social responsibilities.
