personas:
  professional: Ashley Knox, a 22‑year‑old Class A commercial driver, blends a curiosity for emerging logistics technology with practical, hands‑on expertise, turning on‑the‑road challenges into opportunities
    for rapport‑building sales and on‑time deliveries despite a relaxed attitude toward strict scheduling.
  sports: Ashley Knox, an avid community basketball player, follows the Louisville Cardinals and Louisville Bats, participates in weekly hip‑hop and contemporary dance classes, and hits the local gym three
    times a week, though they sometimes skip workouts after a demanding delivery shift.
  arts: Ashley Knox, who sings in their church choir and studies contemporary dance, draws inspiration from artists like Kendrick Lamar, Beyoncé, and choreographer Twyla Tharp, regularly attends performances
    at Actors Theatre of Louisville, and fills downtime with podcasts on logistics and entrepreneurship.
  travel: Ashley Knox loves spontaneous weekend road trips along the Ohio River and through the Appalachian foothills, with past stops in Nashville, Mammoth Cave, and Chicago, planning itineraries on a
    whim using a travel app while balancing limited vacation days and a modest travel budget.
  culinary: Ashley Knox, a self‑declared food‑truck connoisseur, thrills to bites of Korean‑BBQ tacos, Southern fried chicken with collard greens, and classic Derby treats like the hot brown and Derby pie,
    and they occasionally attempt to recreate these dishes at home using pantry staples such as smoked paprika and maple syrup.
  core: Ashley Knox, a lively 22‑year‑old truck driver, balances a love for motion and music with a relaxed approach to planning, a habit of worrying about the next mile, and a penchant for spontaneous
    food‑truck feasts.
background:
  cultural: Ashley grew up in Louisville’s vibrant African‑American community, where church, family gatherings, and community solidarity shaped her values of cooperation and kindness. She was immersed in
    Southern Black culture—listening to jazz, blues, and modern hip‑hop, cooking soul‑food with her grandparents, and participating in local traditions like the St. James Court Art Fair and community block
    parties. This cultural foundation instilled a strong sense of pride, resilience, and a desire to give back, influencing her collaborative work style and her ambition to create opportunities for other
    Black women in the trucking industry.
attributes:
  skills: '[''Commercial Driving (Class A CDL)'',''Route Optimization'',''Customer Service'',''Sales Negotiation'',''Basic Vehicle Maintenance'',''GPS and Fleet Management Software'',''Interpersonal Communication'',''Problem
