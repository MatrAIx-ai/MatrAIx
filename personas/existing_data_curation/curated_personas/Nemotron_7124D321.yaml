  hobbies: '[''Dancing (hip‑hop & contemporary)'',''Community basketball league'',''Exploring Louisville food trucks and restaurants'',''Attending Kentucky Derby events and local music festivals'',''Volunteering
    at youth mentorship programs'',''Road trips and scenic drives'',''Listening to logistics and self‑development podcasts'',''Journaling for stress management'',''Yoga and stretching'',''Church choir participation'']'
  career_goals: Ashley aims to advance from driver‑sales roles to a regional fleet operations manager within the next five years, earning additional certifications such as a HazMat endorsement and a supply‑chain
    management certificate. She envisions eventually launching her own small, Black‑owned trucking business that focuses on serving Louisville’s local entrepreneurs and community events. She also hopes
    to mentor other young Black women entering the transportation industry, using her experience to promote greater representation and create a supportive network. Balancing ambition with her desire for
    flexibility, she plans to develop more structured planning habits to reduce stress while maintaining the freedom she values.
