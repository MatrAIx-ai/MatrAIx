persona_description: A historian who is interested in the cultural and social evolution of Scotland and the impact of tradition and myth on political and economic policies. They are particularly interested
  in the role of nationalism and the creation of national myths by political elites. They are knowledgeable about the cultural and historical context of the Scottish highland tradition, the Ossian forgery,
  and the creation of the Highland tartan. They have a keen interest in the impact of tradition on the course of history and the ways in which tradition is used to support the acts of political and economic
  elites. They are likely to be familiar with the works of Eric Hobsbawm and Terence Ranger, and have a strong interest in the history and cultural evolution of Scotland.
