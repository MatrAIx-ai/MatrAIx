  hobbies: '[''Visiting art galleries and museums'', ''Pottery and watercolor painting'', ''Gardening (herbs and flowers)'', ''Reading (fiction, philosophy, psychology)'', ''Hosting potluck dinners and
    board game nights'', ''Volunteering as a museum guide'', ''Hiking in Cuyahoga Valley'', ''Seasonal apple picking'', ''Attending community theater and music festivals'']'
  career_goals: Vanessa aspires to formalize her passion for community arts by completing a GED and enrolling in a local community college’s arts administration program. She hopes to transition from informal
    volunteer work to a part‑time role as a community arts facilitator, organizing workshops and exhibitions that bring together diverse residents of Portage County. In the longer term, she dreams of launching
    a small home‑based business selling her handmade crafts and curated art kits, leveraging her event‑planning experience to market them at regional fairs. Parallel to these professional aims, Vanessa
    is committed to developing healthier coping strategies for stress, such as mindfulness practice and counseling, to sustain her activism and personal wellbeing.
