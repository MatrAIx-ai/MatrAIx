persona_description: A teacher who is interested in exploring the possibilities of open education and the potential of open organization principles in transforming the way students are prepared for life
  in an increasingly open world. This person may be a K-12 teacher, university faculty member, or a campus CIO interested in implementing open education principles in their institution. They are also likely
  to be interested in the changing mode of online learning, particularly how students are increasingly shifting to mobile devices. This person is curious about the potential benefits of a more student-centered,
  participatory, and inclusive approach to teaching and learning and is open to experimenting with open organization principles to achieve these goals.
