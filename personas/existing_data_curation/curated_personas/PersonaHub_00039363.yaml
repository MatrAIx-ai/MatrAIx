persona_description: A historian specializing in the history of Jewish settlements in North Carolina, particularly the early Jewish settlers and their impact on the state's culture and identity. They are
  knowledgeable about the history of the Sephardic Jewish community in the region, including the assimilation and eventual replacement of the Orthodox Sephardic liturgy with English prayers and sermons.
  They are also familiar with the attitudes and beliefs of colonial authorities towards Spanish-speaking settlers in the North Carolina Mountains and the role of Jewish colonists in the region during the
  Queen Anne's War with Spain (1702–1713) and the early phase of the Yamasee War (1715.) They have a strong interest in the history of the Georgia Colony and its impact on the region, particularly the role
  of Sephardic Jews as strong supporters of Great Britain and arch-enemies of Spain.
