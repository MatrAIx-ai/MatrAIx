    and play‑dough'']'
  career_goals: Brandon often says he wants to be an astronaut, a firefighter, or an artist when he grows up. He imagines traveling to space, rescuing people, and creating colorful paintings. His love for
    novelty and abstract ideas hints that he may later pursue careers that blend creativity and exploration, such as an inventor, a designer, or a scientist.
