  hobbies: '["Building with wooden blocks", "Drawing animals and vehicles", "Exploring backyard nature and collecting bugs", "Reading picture books", "Playing with toy fire trucks", "Doing simple organized
    crafts", "Participating in structured playground games"]'
  career_goals: Dean is fascinated by the idea of becoming a firefighter because he likes clear schedules, teamwork, and helping others. He often talks about wearing a big red helmet and riding on a fire
    truck. He also dreams that one day he might be a teacher, sharing stories and picture books with younger children. Both ambitions reflect his love for structured roles that make a positive impact on
    the community.
