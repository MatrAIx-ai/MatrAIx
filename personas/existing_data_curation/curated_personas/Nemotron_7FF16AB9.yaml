personas:
  professional: Ruben Pena is a budding business analyst who leverages bilingual communication and hands‑on market research experience to craft data‑driven social media strategies for small Floridian enterprises,
    while their relaxed approach to deadlines sometimes leads to last‑minute crunches and a habit of juggling multiple spreadsheet tabs.
  sports: Ruben Pena plays forward for the Naples Strikers community soccer league, follows the Florida Gulf Coast Eagles basketball team, enjoys weekend kayaking trips at the Corkscrew Swamp Sanctuary,
    and subscribes to ESPN for real‑time soccer scores, yet sometimes forgets to stretch after games, leading to occasional muscle tightness.
  arts: Ruben Pena captures sunset silhouettes along the Naples shoreline with a DSLR, curates an Instagram feed featuring Andean folk singer Susana Baca alongside contemporary Latin pop star Bad Bunny,
    and volunteers at the Naples Fine Arts Center to help organize cultural photography exhibitions, though they often postpone personal art projects in favor of academic deadlines.
  travel: Ruben Pena prefers spontaneous road trips along Florida’s Gulf Coast, has explored the historic streets of Cartagena, dreams of trekking to Machu Picchu, bills travel through budget airlines and
    rideshares, and balances wanderlust with the practical need to fund a future coffee‑shop venture, occasionally over‑packing essentials like a portable espresso maker.
  culinary: Ruben Pena experiments with traditional salteñas, adds citrus‑infused quinoa salad to coastal flavors, fries chicharrón using coconut oil, and frequently incorporates panela cheese and fresh
    avocado into dishes, displaying intermediate culinary skills that blend home‑cooked comfort with occasional indulgence in exotic coffee bean tasting sessions.
  core: Ruben Pena is a curious yet worry‑prone 18‑year‑old who blends entrepreneurial ambition with a love for cooking, soccer, and sunset photography, finding balance through mindfulness while often juggling
    disorganized schedules.
background:
  cultural: Ruben is a first‑generation American of Bolivian descent. Raised in a bilingual household, he grew up speaking both Spanish and English, learning to navigate the values of his family's Andean
    roots while embracing the laid‑back coastal lifestyle of Naples, Florida. Family gatherings often feature traditional Bolivian celebrations such as Carnaval de Oruro and the Feast of the Virgin of Candelaria,
    along with dishes like api and llajua. He maintains close ties to the local Bolivian diaspora through community festivals, cultural associations, and periodic trips to Bolivia to visit relatives and
    immerse himself in his heritage. These experiences have instilled a strong sense of community, respect for elders, and an appreciation for cultural diversity, which he incorporates into his social interactions,
    business ideas, and volunteer efforts.
attributes:
  skills: '[''Market Research'', ''Financial Planning'', ''Bilingual Communication (Spanish/English)'', ''Social Media Marketing'', ''Event Planning'', ''Data Visualization (Excel/Tableau)'', ''Customer
