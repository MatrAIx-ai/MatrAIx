  hobbies: '[''Cooking (Bolivian and fusion dishes)'', ''Photography (nature and cultural events)'', ''Soccer (community league)'', ''Reading Non-fiction (business, self‑improvement)'', ''Listening to Andean
    Folk and Latin Pop Music'', ''Volunteering (English tutoring for immigrants)'', ''Hiking'', ''Kayaking'', ''Strategy Gaming (Civilization)'', ''Journaling and Mindfulness Meditation'']'
  career_goals: Ruben aims to translate his curiosity for new ideas into a sustainable entrepreneurial venture that bridges his Bolivian heritage with the vibrant market of Naples, Florida. His immediate
    ambition is to secure a summer internship with a regional marketing firm or a multinational corporation to gain real‑world experience, mentorship, and a deeper understanding of corporate operations.
    Long‑term, he envisions launching a boutique coffee shop and small‑scale import‑export business that highlights premium Bolivian coffee beans and artisanal textiles, emphasizing ethical sourcing and
    eco‑friendly packaging. Throughout his career path, he seeks a work environment that balances flexibility with clear goals, provides supportive teamwork, and allows him to continue learning while managing
    his tendency toward worry through structured yet adaptable roles.
