  career_goals: Domingo aims to move from laborer to a supervisory role within the next three years, targeting positions such as foreman or site supervisor. To achieve this, he plans to earn an OSHA 30-hour
    certification and enroll in night courses for construction management at a community college. He also hopes to obtain a NCCER credential in carpentry and eventually launch a small contracting business
    that specializes in high-quality residential remodels with an eye for aesthetic details. Securing a stable income and professional growth will also help him manage stress and provide financial security.
