personas:
  professional: Domingo Olivera is a seasoned construction laborer in Queens who blends precise blueprint reading, meticulous framing, and concrete work with a methodical, safety‑first mindset, and they
    leverage their curiosity about sustainable building methods and competitive drive to pursue a foreman role within three years.
  sports: Domingo Olivera joins pickup basketball games organized by the Queens Basketball Association at Riverside Park, follows the New York Knicks and New York Mets seasonally, and they maintain a personal
    fitness regimen of shooting drills, weekend runs, and occasional kickball matches, reflecting a competitive edge and love for community sport.
  arts: Domingo Olivera channels artistic curiosity by photographing street murals by Banksy and JR during Queens Museum visits, dancing salsa to Celia Cruz and Marc Anthony at cultural festivals, and they
    study modern architecture through books on Frank Lloyd Wright and Zaha Hadid, weaving these influences into an aesthetic sense for home remodels.
  travel: Domingo Olivera prefers low‑key weekend trips to nearby cultural sites like Socrates Sculpture Park in Astoria and occasional ferry rides to Coney Island, while earmarking savings for a longer
    vacation to San Juan, Puerto Rico, where they can explore historic districts and street food, balancing a structured itinerary with the spontaneity of last‑minute travel when work permits.
  culinary: Domingo Olivera excels at preparing traditional mangú—mashed boiled plantains mixed with sautéed onions, fried cheese, and salami—and they simmer a hearty sancocho packed with yucca, plantains,
    beef, and cilantro, showcasing a home‑chef skill set that blends family‑recipe fidelity with occasional experimentation using new spices like ají dulce.
  core: Domingo Olivera is a diligent, art‑curious construction professional who balances a competitive drive and community spirit with a habit of over‑worrying about finances and health, yet they never
    skip a salsa night or a chance to capture a mural.
background:
  cultural: Domingo was born to Dominican parents who immigrated to New York in the early 1990s. He grew up in a vibrant Dominican enclave in Queens, where Spanish is spoken at home and English at school.
    Family gatherings revolve around music, food, and Catholic traditions, and he celebrates holidays like Navidad and Día de los Santos. The rhythmic sounds of merengue and bachata, the flavors of plantains
    and beans, and the communal spirit of his neighborhood have shaped his identity. While he embraces his Caribbean roots, he also navigates the multicultural landscape of Elmhurst, blending Dominican
    customs with the diverse influences of the city.
