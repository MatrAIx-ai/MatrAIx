personas:
  professional: Lasonja Solomon, a 23‑year‑old budding arts administrator, leverages strong analytical research, adept writing, and Adobe Creative Suite expertise to curate community events, blending meticulous
    organization with a curiosity‑driven flexibility that thrives on collaborative problem‑solving.
  sports: Lasonja Solomon, a 23‑year‑old community‑oriented enthusiast, follows the Carolina Hurricanes and Durham Bulls, participates in the Raleigh Road Runners’ weekly long‑distance runs, and joins a
    bi‑weekly indoor volleyball league, maintaining a balanced fitness routine that mixes cardio with social team sports to stay energized.
  arts: Lasonja Solomon, a 23‑year‑old cultural‑studies graduate, spends free time sketching street murals, photographing urban landscapes, and curating pop‑up exhibitions that showcase emerging talent
    like visual artist Yayoi Kusama, while regularly attending live performances ranging from Herbie Hancock’s jazz sets to Iron & Wine’s indie folk shows at local venues.
  travel: Lasonja Solomon, a 23‑year‑old arts explorer, plans trips around cultural festivals—such as Asheville’s Mountain Arts Festival, New Orleans’ Jazz & Heritage Celebration, and an autumn photography
    pilgrimage to Oaxaca—balancing a modest travel budget with a dedicated savings plan, and allowing for spontaneous food‑market detours that fuel their creative projects.
  culinary: Lasonja Solomon, a 23‑year‑old home‑cook with intermediate skills, delights in preparing Southern comfort dishes like smoked collard greens, shrimp and grits, and homemade cornbread, while also
    experimenting with global flavors such as Korean kimchi fried rice and Moroccan tagine, favoring ingredients like smoked paprika, fresh okra, and hand‑crafted hot sauce, often sharing meals at community
    art workshops.
  core: Lasonja Solomon, a 23‑year‑old curiosity‑driven arts advocate, balances meticulous organization with spontaneous creativity, juggling multiple community projects—often fueled by late‑night coffee
    and an occasional missed deadline.
background:
  cultural: Lasonja is an African‑American woman raised in Raleigh, deeply rooted in Southern Black culture. Her family traditions emphasize storytelling, music, and communal gatherings, while church and
    community centers have fostered a strong sense of collective responsibility. She draws inspiration from the legacy of Black literary and artistic movements, and her upbringing in a vibrant, multicultural
    neighborhood informs her appreciation for diverse perspectives. This cultural foundation shapes her outlook on art, community service, and the desire to celebrate and elevate underrepresented voices.
