  career_goals: Lasonja aims to build a career that blends her passion for the arts with community engagement. She plans to pursue a graduate certificate in Arts Administration or Museum Studies while gaining
    experience as an assistant coordinator for local cultural festivals in Raleigh. Her long‑term ambition is to lead an inclusive arts program that celebrates Black artistic heritage and provides mentorship
    opportunities for young creatives. She also envisions freelance work creating digital content and curating pop‑up exhibitions that highlight emerging artists from diverse backgrounds.
