personas:
  professional: Victoria Barras, a 20‑year‑old aspiring community‑arts coordinator, leverages their strong project‑management skills, Canva‑savvy graphic design, and talkative charisma to orchestrate vibrant
    local events while insisting on meticulous budgets, inclusive programming, and ensuring they plan every detail with precision.
  sports: Victoria Barras stays active through salsa and swing dance classes at the community center, jogs with the City Park Running Club on weekend mornings, and they cheer enthusiastically for the local
    women's soccer team, the River City Fireflies.
  arts: Victoria Barras immerses themselves in the local art scene by attending weekly open‑mic nights, sketching downtown skylines, and curating playlists that blend Kendrick Lamar's lyrical flow with
    Björk's avant‑garde soundscapes, while drawing artistic inspiration from the works of Banksy and Yayoi Kusama.
  travel: Victoria Barras prefers short, budget‑friendly getaways, having explored the vibrant streets of New Orleans for its music and culinary scene, the historic canals of Amsterdam for photography,
    and they dream of a future solo trip to Kyoto's garden temples.
  culinary: Victoria Barras enjoys crafting eclectic dinner parties, skillfully preparing dishes like Thai pad thai, Mexican tacos al pastor, and Ethiopian injera, while showcasing their flair with fresh
    cilantro, smoked paprika, and a dash of lemon zest to elevate each recipe.
  core: Victoria Barras fuses relentless organization with a curiosity for art, turning community events into lively spectacles, all while battling their habit of last‑minute procrastination and an unapologetic
    love for midnight sketch sessions.
background:
  cultural: Victoria was raised in a Midwestern white family with deep roots in Illinois, tracing ancestry to Irish and German immigrants. Growing up in Montgomery, she experienced a blend of small‑town
    community values, church involvement, and the strong work ethic typical of the region. Her family emphasized education, punctuality, and civic engagement, instilling a sense of responsibility toward
    neighbors. While her cultural upbringing is largely traditional Midwestern Americana, she has been encouraged to explore diverse artistic expressions through school programs and local cultural festivals,
    broadening her appreciation for global art and ideas.
attributes:
  skills: '[''Event planning'', ''Public speaking'', ''Community outreach'', ''Social media content creation'', ''Graphic design (Canva)'', ''Basic bookkeeping'', ''Digital organization (Google Workspace)'',
