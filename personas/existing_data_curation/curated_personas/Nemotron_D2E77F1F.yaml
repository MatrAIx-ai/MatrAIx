  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Photography'', ''Book club (contemporary fiction & philosophy)'', ''Cooking and hosting dinner parties'', ''Gardening'', ''Dance classes
    (salsa, swing)'', ''Community theater (acting & backstage)'', ''Creating playlists / music appreciation'']'
  career_goals: Victoria aims to enroll in a community‑college program in communications or arts administration, with a long‑term ambition to become a community‑arts coordinator or event manager for a regional
    cultural center. She also dreams of launching a small boutique or gallery that showcases local artists, blending her love for art and entrepreneurship. In the near term, she plans to gain experience
    through volunteer leadership roles and an internship at a nonprofit arts organization, while balancing family life with a career that creates vibrant community experiences.
