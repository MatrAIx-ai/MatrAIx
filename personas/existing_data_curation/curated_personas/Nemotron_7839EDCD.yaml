personas:
  professional: Caleb Goulet, an aspiring young coder who builds modest Python scripts and Scratch games, channels their love of strategic video games into methodical problem‑solving and thrives in solitary,
    structured projects despite a relaxed attitude toward deadlines.
  sports: Caleb Goulet, a casual fan of the Carolina Panthers and a participant in the school’s after‑school walking club, prefers low‑key fitness like weekend park strolls over organized team sports, yet
    competes fiercely in online chess tournaments as a mental sport.
  arts: Caleb Goulet, an avid reader of Brandon Sanderson and J.R.R. Tolkien, devotes evenings to listening to video‑game composer Hans Zimmer and watching indie sci‑fi films like 'Ex Machina', letting
    these artistic influences shape their imaginative LEGO constructions and narrative coding projects.
  travel: Caleb Goulet, who has explored the historic streets of Boston with family and dreams of visiting Tokyo’s Akihabara district, plans trips with detailed itineraries that balance curated museum visits
    with spontaneous gaming arcade stops, all within the constraints of parental supervision and school schedules.
  culinary: Caleb Goulet, a budding home chef, enjoys crafting simple dishes like pepperoni pizza with extra cheese, mastering the perfect ramen broth using miso and pork, and experimenting with chocolate
    chip cookies, while often forgetting to clean up the kitchen afterward.
  core: Caleb Goulet is a solitary, strategy‑obsessed pre‑teen who blends disciplined coding with a laid‑back attitude, hoards allowance for LEGO, dodges social fatigue, and occasionally forgets to hydrate
    during marathon gaming.
background:
  cultural: Caleb is raised in a middle‑class, white American family in Wilmington, Delaware. His upbringing reflects typical suburban East Coast culture, with exposure to both local community traditions
    (such as Fourth of July parades and library summer reading programs) and broader American media influences. He attends a public middle school where the curriculum emphasizes core subjects and offers
    extracurricular clubs like robotics and chess, aligning with his interests. His family’s values emphasize self‑reliance, modest competitiveness, and a respect for structured routines, which shape his
    worldview.
