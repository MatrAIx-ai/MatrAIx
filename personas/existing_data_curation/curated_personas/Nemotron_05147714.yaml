  hobbies: '["Playing Acoustic Guitar", "Cooking Southern & Creole Dishes", "Fishing on the Ouachita River", "Reading Classic Literature", "Community Storytelling Sessions", "Genealogy Research", "Volunteer
    Mentorship at Local Youth Center", "Attending Blues & Jazz Festivals", "Gardening", "Digital Photography"]'
  career_goals: Now retired, Jalen aims to channel his sociable energy into preserving the cultural memory of Catahoula Parish. He hopes to launch a volunteer-run oral-history podcast series, publish a
    memoir that intertwines personal stories with regional folklore, and secure funding to establish a community arts hub where youth can learn storytelling, music, and digital media. He also aspires to
    become a regular speaker at state-wide heritage conferences and to mentor a new generation of community leaders.
