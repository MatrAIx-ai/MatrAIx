personas:
  professional: Eartha Brown, a 40‑year‑old farm manager with a business degree, blends methodical process‑optimization with a curiosity for precision‑ag technology, leading her crew with clear expectations,
    negotiating with USDA, and driving sustainable, data‑driven yields while quietly championing under‑represented voices in the industry.
  sports: Eartha Brown, a dedicated follower of the Dallas Cowboys and the Texas Rangers, spends her weekends solo hiking the Denton County prairie trails with the North Texas Trail Runners, combines her
    love of birdwatching with occasional 5‑k runs, and approaches fitness with a disciplined, data‑driven schedule that tracks mileage and heart‑rate, though she rarely joins team sports.
  arts: Eartha Brown captures sunrise over prairie fields through a vintage Nikon, draws inspiration from the soulful vocals of Aretha Franklin and the lyrical storytelling of Nina Simone, crafts small
    wooden bowls while listening to Ansel Adams’ photography books, and occasionally attends the local community choir’s gospel rehearsals, allowing artistic pursuits to balance her analytical work style.
  travel: Eartha Brown plans meticulously for her solo trips, favoring early‑morning sunrise photography in Texas Hill Country vineyards, exploring the historic streets of Savannah, Georgia, and attending
    the organic agriculture fair in Oaxaca, Mexico, while balancing a modest travel budget set aside for her future boutique farm.
  culinary: Eartha Brown enjoys cooking farm‑fresh collard greens seasoned with smoked turkey, braised pork shoulder with sweet potatoes, and heirloom tomato gazpacho, skillfully blending soul‑food traditions
    with contemporary techniques, and often incorporates fresh rosemary, basil, and okra harvested from her native‑plant garden into her experimental weekend meals.
  core: Eartha Brown is a methodical farm manager who thrives in solitary reflection, merges cutting‑edge agritech with deep‑rooted stewardship, and balances a competitive edge with an unshakable calm,
    all while obsessively tracking yields, finances, and sunrise photos.
background:
  cultural: Eartha is an African‑American woman rooted in the Dallas‑area Black community, where family gatherings, church fellowship, and soul‑food cooking have shaped her identity. Her grandparents were
    part of the Great Migration, and their stories of resilience on the land inspire her respect for agriculture. She actively participates in local Black Farmers' associations, celebrating Juneteenth and
    advocating for equitable access to resources. Her cultural heritage informs her commitment to community empowerment, stewardship of the earth, and the pursuit of excellence in a field where Black voices
    have historically been under‑represented.
