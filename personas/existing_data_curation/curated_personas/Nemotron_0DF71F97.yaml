  hobbies: '[''Native Plant Gardening'', ''Birdwatching'', ''Reading Agricultural & Historical Nonfiction'', ''Long‑distance Hiking'', ''Nature Photography'', ''Home Cooking with Farm Produce'', ''DIY Woodworking
    Projects'', ''Journaling & Reflective Writing'']'
  career_goals: Eartha aims to move from first‑line supervision to a senior farm manager role overseeing a multi‑site agribusiness in Texas. She plans to champion sustainable practices, expand the use of
    IoT‑enabled precision tools, and eventually launch her own boutique farm that combines organic production with agri‑tech innovation. Additionally, she is committed to mentoring women of color in agriculture,
    speaking at industry conferences, and influencing policy that supports Black farmers and land stewardship.
