  career_goals: Although retired from formal employment, The Pa Li aims to become a leading volunteer coordinator for cultural heritage programs at the Newton Public Library and local community centers.
    She aspires to mentor younger Asian‑American residents about their cultural roots, document oral histories of East Asian immigrants in the Boston area, and organize an annual multicultural festival
    that showcases traditional and contemporary arts. She also plans to continue learning new digital tools to stay connected with family abroad and eventually publish a memoir recounting her immigrant
    family’s journey and the evolution of her cultural identity.
