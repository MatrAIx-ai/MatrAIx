persona_description: A constitutional law scholar who is deeply concerned about the erosion of the separation of powers and the growing concentration of legislative and enforcement powers in the hands of
  unelected bureaucrats. The individual is a strong advocate for the Constitution as written and believes that the array of leaders among the states lacks the constitutional acuity of the Framers. The individual
  is a fierce critic of the current administrative state and the unelected bureaucrats who seek to regulate backyard grills and take our bullets. The individual is also skeptical of the idea of a convention
  of states to amend the Constitution and believes that the idealism of those who believe the Constitution may be enforced at this stage is noble but decades of case law upending the Constitution as written
  proves them wrong. The individual is a sharp critic of the unelected bureaucrats who seek to regulate backyard grills and take our bullets and is convinced that the array of leaders among the states lacks
  the constitutional acuity of the Framers.
