  career_goals: Although officially retired, Eugenio aims to remain actively engaged in his community by offering pro‑bono technical consulting to local non‑profits, mentoring high‑school and college students
    in STEM fields, and documenting the history of Mexican‑American engineering contributions in San Antonio. He also aspires to compile a family recipe book that preserves traditional Mexican culinary
    techniques, and to organize intergenerational workshops that blend practical skills with cultural storytelling.
