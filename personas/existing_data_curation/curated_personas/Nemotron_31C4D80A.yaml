personas:
  professional: Eugenio Lopez, a 71‑year‑old retired STEM engineer, channels analytical expertise and bilingual fluency into pro‑bono consulting for local nonprofits, and they mentor aspiring engineers
    while meticulously documenting the often‑overlooked contributions of engineers from their community.
  sports: Eugenio Lopez enjoys low‑impact cardio by walking the San Antonio River Walk, casts a line on the Trinity River during spring weekends, follows the San Antonio Spurs avidly, and they stay active
    by playing in a senior community softball league hosted at the local senior center.
  arts: Eugenio Lopez, an avid acoustic‑guitar player, regularly performs at Fiesta celebrations and senior‑center gatherings while they savor the sounds of mariachi legends like Vicente Fernández and norteño
    icons Los Tigres del Norte, and they often volunteer as a storytelling conduit linking songs to their family’s heritage.
  travel: Eugenio Lopez plans trips with meticulous spreadsheets, favoring cultural pilgrimages such as family visits to the Alamo, culinary road trips to Oaxaca to explore traditional mole, and relaxed
    Gulf Coast cruises, and they keep a watchful eye on budget constraints to ensure funding for community projects.
  culinary: Eugenio Lopez, a seasoned home cook, masters authentic dishes like tamales, pozole, and chile‑en‑nogada using heirloom chilies, fresh epazote, and masa harina, and though they occasionally over‑salt
    their sauces, their generosity shines as they prepare feast‑sized portions for neighborhood potlucks.
  core: Eugenio Lopez blends a curious engineer’s precision with a community‑oriented heart, cultivating gardens, music, and mentors while staying calm, organized, and ever‑ready to share their cultural
    recipes and stories, and they delight in passing knowledge across generations.
background:
  cultural: Eugenio was born to Mexican parents who immigrated to Texas in the 1950s. Raised in a bilingual household, he grew up celebrating traditional Mexican holidays—Día de los Muertos, Semana Santa,
    and quinceañeras—while also embracing the vibrant Texan culture of San Antonio. His Catholic faith informs his community involvement, and he maintains close ties with local Mexican-American organizations
    that promote cultural preservation, culinary heritage, and intergenerational exchange. This rich blend of Mexican roots and Texan experiences shapes his worldview, values, and everyday practices.
