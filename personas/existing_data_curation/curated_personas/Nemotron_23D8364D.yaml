personas:
  professional: William Lee, a seasoned fire chief‑turned‑consultant, blends three decades of incident command, hazardous‑materials expertise, and a talent for visual storytelling into an innovative fire‑safety
    consulting practice that they lead by teaching junior crews through watercolor sketches, drone footage, and interactive workshops.
  sports: William Lee, an avid sailor who spends weekends navigating the Indian River aboard their sloop and casts lines for tarpon, also follows the Tampa Bay Buccaneers in football and the Orlando Solar
    Bears in hockey, and they join a local senior rowing club during summer to keep fit.
  arts: William Lee, a watercolor enthusiast who paints Atlantic seascapes reminiscent of Winslow Homer and sketches historic lighthouses, also curates a personal collection of vintage Leica cameras, devotes
    evenings to photographing sunrise hues, and they draw inspiration from speculative fiction authors like Octavia Butler and philosophers such as Kierkegaard.
  travel: William Lee, a spontaneous traveler who prefers short road trips to coastal towns like St. Augustine and Key West for artistic inspiration, has also taken a sailing cruise to the Bahamas and dreams
    of exploring the historic port of Lisbon, and they plan trips on a whim, often letting the tide dictate departure.
  culinary: William Lee, a modest home chef whose diet revolves around fresh Gulf shrimp, key‑lime‑marinated grouper, and a secret blend of Old Bay and citrus zest, enjoys preparing a classic fish stew
    with tomatoes and okra, yet they admit to overindulging in fried calamari after art fairs.
  core: William Lee, a fire‑seasoned visual storyteller who sails, paints, and tinkers with vintage tech, balances a competitive edge with a laid‑back, slightly disorganized lifestyle that often leads to
    missed appointments but fuels endless creative projects.
background:
  cultural: 'William is a white American who grew up in a modest, middle‑class suburb of the southeastern United States before moving to the Atlantic coast of Florida. His upbringing emphasized community
    service, hard work, and respect for tradition, values that align with the region’s tight‑knit neighborhoods and the maritime culture of Port Orange. The blend of Mid‑Atlantic roots and the relaxed,
    sun‑driven lifestyle of Florida’s coastal towns shapes his worldview: practical yet open to novelty, appreciative of both structured service and creative expression. Living in a diverse, multicultural
    county, he embraces the local blend of Southern hospitality, beach‑side leisure, and a growing appreciation for the arts, which informs his personal and professional pursuits.'
