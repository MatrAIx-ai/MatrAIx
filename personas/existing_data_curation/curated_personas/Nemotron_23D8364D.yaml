  career_goals: Looking ahead, William intends to transition from full‑time frontline duties to a hybrid role that blends consulting, education, and artistic outreach. He aims to become a fire‑safety consultant
    for municipal and private entities, designing prevention programs that incorporate visual storytelling, interactive workshops, and the latest fire‑technology tools. He plans to lead the department’s
    training unit on emerging equipment, mentor the next generation of firefighters, and establish a community art initiative that uses fire‑themed murals and exhibitions to raise public awareness about
    safety. On the personal side, he hopes to complete a series of watercolor paintings capturing historic fire stations along Florida’s coast and to author a memoir that weaves his firefighting experiences
    with reflections on imagination, resilience, and the abstract ideas that have shaped his life.
