personas:
  professional: Issiah Oneal, a community‑oriented photographer and woodworker in Sumter, leverages their meticulous budgeting, organizational flair, and boundless curiosity to document historic architecture,
    coordinate volunteer projects, and teach hands‑on workshops that blend storytelling with practical craft.
  sports: Issiah Oneal, a casual runner and avid supporter of the Columbia Fireflies baseball team, maintains fitness by walking garden paths daily, joins a community walking club each spring, and occasionally
    plays pick‑up basketball at the church gym, preferring low‑key, socially connected activity.
  arts: Issiah Oneal, a devoted jazz and blues enthusiast who reveres Miles Davis and B.B. King, frequents live performances at the historic Sumter Arts Center, participates in community theater productions,
    sings in the church choir, and crafts wooden frames for their photographs, letting music and craftsmanship shape daily life.
  travel: Issiah Oneal, a meticulous planner who favors weekend road trips, has explored the historic charm of Savannah and the blues‑rich streets of New Orleans, dreams of visiting Washington, D.C.’s National
    Museum of American History, and prefers budget‑friendly stays in family‑run bed‑and‑breakfasts.
  culinary: Issiah Oneal, an adept home cook, grows collard greens, heirloom tomatoes, and fresh thyme in their garden, turning these into soulful Southern staples such as braised pork with garlic, buttery
    cornbread, and sweet‑potato pie spiced with nutmeg and cinnamon.
  core: Issiah Oneal, a curious community archivist and handyman, balances meticulous budgeting with a penchant for collecting vintage camera lenses, sometimes sacrificing sleep after late‑night editing
    sessions, and enjoys occasional bouts of stubbornness when steering volunteer projects.
background:
  cultural: Issiah is rooted in the African‑American Southern tradition of Sumter, South Carolina. He was raised in a close‑knit, Baptist‑oriented family where gospel music, church community service, and
    family gatherings shaped his early life. His grandparents migrated from rural Georgia during the mid‑20th century, bringing with them stories of sharecropping, the civil‑rights movement, and a strong
    work ethic. This heritage influences his appreciation for oral storytelling, reverence for communal history, and involvement in local Juneteenth celebrations. He values the legacy of the Black church
    as a center for social support and activism, and his cultural identity is expressed through cooking family recipes, preserving local histories, and participating in community events that honor African‑American
    contributions to the region.
attributes:
  skills: '[''Automotive maintenance'', ''Woodworking and furniture building'', ''Gardening and small‑scale farming'', ''Home budgeting and financial planning'', ''Community volunteer coordination'', ''Contemporary
    photography'', ''Digital archival work'', ''Oral storytelling'', ''Basic computer troubleshooting'']'
  hobbies: '[''Photography (documentary and historic)'', ''Gardening (vegetables and herbs)'', ''Cooking Southern soul food'', ''Listening to jazz and blues'', ''Reading African‑American literature and
    history'', ''Participating in community theater and church choir'', ''Woodworking (furniture and decorative items)'']'
  career_goals: Issiah aims to channel his curiosity and artistic appreciation into preserving and sharing Sumter's African‑American heritage. He plans to establish a modest community art workshop where
    he can teach woodworking and photography to youth and seniors alike. He wishes to compile a photo memoir of local historic sites and personal stories, eventually publishing it both as a book and an
    online archive. While not seeking traditional employment, he hopes to obtain a GED and take a few adult‑education courses in graphic design and archival studies to enhance his projects. Additionally,
    he aspires to become a mentor for at‑risk teenagers, using his life experiences to provide guidance and stability.
