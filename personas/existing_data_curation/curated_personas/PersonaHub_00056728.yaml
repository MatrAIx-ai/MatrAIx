persona_description: A sociologist who specializes in industrial relations, particularly Dunlop's theory of industrial relations. They are interested in the complex interplay of management organizations,
  workers, and government agencies in the industrial system, and how these entities are shaped by environmental forces such as technology, the economy, and political power. They are also interested in understanding
  the role of external forces in shaping the roles of each of the three principal parts and the broader context of society.
