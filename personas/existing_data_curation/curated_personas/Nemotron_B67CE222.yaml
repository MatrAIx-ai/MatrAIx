  hobbies: '[''Cooking Mexican Dishes'', ''Hosting Family and Friend Gatherings'', ''Participating in Community Festivals'', ''Dancing Folklorico'', ''Listening to Regional Mexican Music'', ''Volunteering
    at Local Food Bank'', ''Hiking Desert Trails'', ''Photography'', ''Reading Romance Novels'']'
  career_goals: Looking ahead, Lissette aims to transition from front‑line driving to a supervisory role within the logistics team. She plans to obtain a HazMat endorsement and pursue certification as a
    Transportation Management Professional, positioning herself for a fleet supervisor or logistics coordinator position. In the longer term, she dreams of launching a small, family‑owned transportation
    company that combines her driving expertise with her sales acumen, offering reliable cross‑border delivery services to local growers and businesses. To support her career growth, she intends to complete
    her associate’s degree in Business Administration and enroll in leadership workshops that will help her manage teams while maintaining the structured, predictable work environment she values.
