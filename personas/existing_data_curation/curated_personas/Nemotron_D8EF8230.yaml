personas:
  professional: Sergio Rodriguez, a bilingual operations specialist, leverages data-driven AI analytics and Lean Six Sigma methodology to design and implement streamlined business processes, where their
    curiosity for emerging technologies meets a methodical, reliable work style that bridges Spanish-speaking stakeholders with cross-functional English-language teams.
  sports: Sergio Rodriguez fuels their fitness routine by playing pickup soccer in Queens, cheering for the national team during World Cup nights, following New York City FC in the MLS, and hiking the Flushing
    Meadows trails each weekend, all while staying connected to a local recreational league that meets on Saturday mornings.
  arts: Sergio Rodriguez captures the vibrant multicultural pulse of his neighborhood through street photography inspired by Henri Cartier-Bresson, and they unwind at salsa nights spinning to the rhythms
    of Celia Cruz and Carlos Vives, while drawing creative inspiration from Diego Rivera's murals that inform their appreciation for storytelling through visual art.
  travel: Sergio Rodriguez blends structured planning with a love for spontaneous cultural immersion, regularly flying to visit relatives in a South American city during family holidays, and they also dream
    of trekking Patagonia's Torres del Paine and exploring Barcelona's Gothic Quarter on a future solo adventure.
  culinary: Sergio Rodriguez brings meticulous precision to the kitchen when crafting arepas, empanadas, and bandeja paisa for family gatherings, favoring fresh cornmeal, chorizo, and ripe plantains, yet
    they occasionally over-salt dishes in the excitement of preparing large meals for guests.
  core: Sergio Rodriguez merges methodical operational rigor with a spontaneous salsa flair, juggling a disciplined career trajectory while they habitually forget to water their office succulents and binge-watch
    strategy podcasts late into the night.
background:
  cultural: Sergio was raised in a Colombian immigrant family that settled in Queens, New York. At home, Spanish is spoken daily, and traditions such as celebrating Carnaval de Barranquilla, Día de los
    Muertos, and Christmas with a "novena" of prayers remain central to his identity. The family places high value on close‑knit relationships, hospitality, and collective support, which influences Sergio’s
    collaborative yet assertive work style. He maintains strong ties with relatives in Colombia, regularly traveling to visit and staying connected through video calls. The multicultural environment of
    Fresh Meadows has broadened his perspective, allowing him to blend Colombian warmth and community focus with the fast‑paced, results‑oriented ethos of the U.S. business world.
attributes:
  skills: '[''Process Optimization'', ''Project Management'', ''Data Analysis (Excel, Tableau)'', ''ERP Systems (SAP, Oracle NetSuite)'', ''Lean Six Sigma Green Belt'', ''Supply Chain Management'', ''Financial
