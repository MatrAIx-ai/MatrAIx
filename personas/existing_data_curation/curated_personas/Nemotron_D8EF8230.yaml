  hobbies: '[''Cooking traditional Colombian cuisine'', ''Watching and playing soccer'', ''Hiking in local parks'', ''Street photography'', ''Reading business and strategy books'', ''Playing chess'', ''Listening
    to salsa and Latin music'', ''Volunteering with community organizations'']'
  career_goals: Sergio aims to transition into a senior operations leadership role within the next three to five years, eventually becoming Director of Operations. He is focused on guiding his company through
    digital transformation initiatives that integrate automation and predictive analytics while maintaining operational rigor. To reinforce his strategic vision, he plans to pursue an Executive MBA part‑time
    and to obtain a Six Sigma Black Belt certification. Additionally, Sergio wants to mentor junior staff and eventually launch a consultancy that helps mid‑size firms, especially those with ties to Latin
    America, improve their operational efficiency.
