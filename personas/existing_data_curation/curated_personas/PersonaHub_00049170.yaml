persona_description: A teacher who is interested in integrating reading and writing activities into the initial lessons of a beginning English class, using Silent Way charts. They are familiar with the
  importance of working with reading and writing skills in the first stages of learning English as a foreign language and have a keen interest in curriculum and instruction, phonetics and phonology, and
  teacher education and professional development. They are likely to have a background in English language teaching and have experience with teaching English as a foreign language.
