  career_goals: As she approaches retirement, Marcia aims to leave a lasting legacy by formalizing a mentorship program for junior supervisors, documenting best‑practice SOPs, and championing initiatives
    that improve employee well‑being. She hopes to transition into a part‑time advisory role where she can guide store managers on data‑driven decision‑making while also reducing her own stress. Additionally,
    she wishes to allocate more time to volunteer work with local youth STEM outreach, blending her technical background with community service.
