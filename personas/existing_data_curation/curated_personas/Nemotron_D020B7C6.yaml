  career_goals: At this developmental stage, Janny does not have concrete career aspirations. However, her strong interest in helping others and mimicking caregiver behaviors—such as offering a toy to a
    crying peer—suggests a future inclination toward nurturing roles, possibly as a teacher, child‑care provider, or healthcare professional. Her parents nurture these tendencies by encouraging pretend
