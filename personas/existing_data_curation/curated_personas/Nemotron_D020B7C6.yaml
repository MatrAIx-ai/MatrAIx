personas:
  professional: Janny Nguyen, a one‑year‑old explorer of cause-and-effect, delights in building stable towers with colorful blocks, balancing bright curiosity with a surprisingly practical focus on keeping
    structures from toppling, while their sociable nature turns playtime into a collaborative learning session with parents and peers.
  sports: Janny Nguyen, a lively one‑year‑old, frequents a toddler gymnastics class at Little Sprouts Playhouse where they tumble and balance on soft foam, joyfully waves a miniature Seattle Sounders jersey
    during stroller walks, and eagerly anticipates the upcoming springtime splash‑pad sessions at the community pool.
  arts: Janny Nguyen, a curious infant, fills their days with bright picture books by Eric Carle, bounces to the upbeat tunes of The Wiggles and Baby Einstein, and enjoys being draped in soft, hand‑stitched
    plush blankets featuring classic Disney characters, shaping their early artistic appreciation through vivid colors and rhythmic melodies.
  travel: Janny Nguyen, a one‑year‑old adventurer, has already explored the sandy dunes of a Florida beach resort with family, experienced the bustling markets of New York during a weekend trip, and dreams
    of a gentle cruise to the calm waters of the Caribbean islands once they’re old enough to sit up unaided.
  culinary: Janny Nguyen, an emerging foodie, prefers the smooth sweetness of mashed ripe banana and avocado, loves the soft texture of oatmeal with a hint of cinnamon, and, though they cannot cook, delights
    in helping stir pureed carrots with a plastic spoon while parents serve their favorite pureed sweet potato and chicken stew.
  core: Janny Nguyen, a bright one‑year‑old whose boundless curiosity blends with surprisingly practical play, thrives on social interaction, feels emotions intensely, and navigates the world with a mix
    of organized exploration and spontaneous joy, all while they occasionally succumb to the anxieties of a sensitive toddler.
background:
  cultural: Janny comes from a Southeast Asian (Vietnamese) family that celebrates both traditional customs and American holidays. At home, she hears both English and Vietnamese, and her parents incorporate
    cultural foods like pho and bánh mì into family meals. Celebrations such as Tet (Lunar New Year) involve bright decorations, lanterns, and family gatherings, fostering a sense of communal harmony that
    aligns with her cooperative nature. Living in San Mateo, she is also exposed to a multicultural community, which broadens her social experiences and reinforces values of inclusivity and respect.
