personas:
  professional: Patrick Santos, a budding preschool engineer, they spend afternoons building intricate forts from couch cushions and solving simple puzzles, channeling a curious mind into organized play
    while flexibly adapting to new ideas.
  sports: Patrick Santos dribbles a mini basketball in the neighborhood park, they proudly wear a New York Knicks jersey, and they attend a Saturday kids' soccer clinic where they learn to kick the ball
    with the same focused determination they apply to their LEGO constructions.
  arts: Patrick Santos revels in finger‑painting sessions, they hum along to The Wiggles and Disney's 'Let It Go', while they collect stickers of favorite characters like Mickey Mouse and Baby Yoda that
    line their bedroom walls and spark endless storytelling.
  travel: Patrick Santos has explored the wonders of a nearby zoo, they marveled at the giant sandcastles on a family beach trip to Clearwater, and they dream of visiting the magical kingdom of Disneyland
    in California, preferring short, well‑planned outings over long, chaotic journeys.
  culinary: Patrick Santos loves crunchy chicken nuggets with honey mustard, they adore mac and cheese with a sprinkle of cheddar, and they enjoy helping their mom stir strawberry jam into toast, while
    their palate is still developing a tolerance for broccoli.
  core: Patrick Santos is a curious, organized four‑year‑old who balances a love for creative play with a steady routine, often turning everyday chores into mini‑adventures while quietly preferring solo
    time, and they cherish moments of focused discovery.
background:
  cultural: Patrick is raised in a middle‑class white family in Philadelphia, PA. His parents value education, community involvement, and exposure to the city’s rich historical and artistic resources. Family
