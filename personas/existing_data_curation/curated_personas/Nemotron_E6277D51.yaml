  career_goals: Benoy’s primary ambition is to stay active and healthy while giving back to his community. He aims to mentor younger Vietnamese‑American members interested in engineering or trades, volunteer
    as a technical advisor for the local community center, and preserve his family’s cultural heritage by teaching traditional cooking to his grandchildren. He also hopes to maintain his vegetable garden,
    complete a small woodworking project each year, and remain financially independent through careful budgeting.
