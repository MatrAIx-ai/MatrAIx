  career_goals: William aims to channel his practical abilities into a stable, well‑paid trade that also lets him stay connected to the outdoors. He plans to enroll in Colorado Mountain College’s certificate
    program in sustainable landscaping or construction technology, then pursue journeyman electrician or solar‑installation technician licensing. In the longer term, he hopes to launch his own outdoor‑recreation
    guide service or equipment‑rental business in Buena Vista, leveraging his network, competitive drive, and community reputation to become a recognized local entrepreneur.
