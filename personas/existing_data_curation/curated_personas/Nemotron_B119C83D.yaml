personas:
  professional: Veteran wholesale sales strategist Kyle Pujol leverages three decades of B2B relationship building, data‑driven pipeline design, and a competitive, methodical mindset to turn market curiosity
    into profitable client partnerships.
  sports: Detroit‑loyal sports fan Kyle Pujol follows the Tigers and Lions, joins a senior bowling league at the local community center, and participates in the Woodward Dream Cruise, where his love for
    classic cars blends with a casual competitive spirit.
  arts: Passionate painter and mentor Kyle Pujol spends weekends creating oil and acrylic works inspired by Andrew Wyeth and contemporary Midwestern artist Julie Mehretu, curates visits to the Detroit Institute
    of Arts, and leads art‑talk sessions for a three‑person book club.
  travel: Meticulous planner Kyle Pujol prefers short‑duration road trips to art‑rich destinations like Santa Fe, the Art Institute of Chicago, and annual visits to Florence’s Uffizi, balancing a modest
    travel budget with a desire to experience both historic architecture and local gallery scenes.
  culinary: Garden‑to‑table enthusiast Kyle Pujol enjoys harvesting heirloom tomatoes, fresh rosemary, and sweet corn to prepare roasted beet and goat‑cheese salads, hearty pork tenderloin with sage, and
    classic spaghetti aglio e olio, showcasing a modest but confident cooking skill set.
  core: Veteran sales mentor Kyle Pujol fuses a disciplined, competitive work ethic with a quietly curious devotion to painting, classic‑car restoration, and garden‑fresh cooking, shaping a life of measured
    ambition and solitary creativity.
background:
  cultural: Kyle grew up in the Detroit metropolitan area, a region shaped by the automotive and manufacturing boom of the mid‑20th century. His family traces its roots to Irish and Spanish immigrants who
    settled in Michigan’s Upper Peninsula before moving to Macomb County in the 1940s. This blend of European heritage and Midwestern industrial culture instilled in him values of hard work, self‑reliance,
    and community involvement. While he identifies with traditional Midwestern customs—such as celebrating holidays with extended family, supporting local high school sports, and enjoying seasonal outdoor
    activities—Kyle also holds a deep appreciation for the diverse artistic scene of greater Detroit, regularly attending exhibitions and supporting emerging regional artists.
attributes:
  skills: '[''B2B sales negotiation'', ''Account and territory management'', ''Supply chain coordination'', ''CRM software (Salesforce, Microsoft Dynamics) proficiency'', ''Advanced Excel data analysis'',
