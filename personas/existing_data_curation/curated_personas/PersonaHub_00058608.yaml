persona_description: Gina Chaput and Brian McConnell are two bright and ambitious students at the University of New Hampshire (UNH) who are researching green algae as a source of biodiesel. They have been
  working in the lab of Ihab Farag, professor of chemical engineering, on research projects examining how manipulating the presence of two key metabolic components—nitrates and carbon dioxide— affects the
  proliferation of algae in wastewater. They are both incredibly disciplined and accomplished students who are both very deserving recipients of the United States Environmental Protection Agency's (EPA)
  Greater Research Opportunities (GRO) fellowships.
