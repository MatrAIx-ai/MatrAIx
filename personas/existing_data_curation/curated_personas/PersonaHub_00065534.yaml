persona_description: A survival expert who is experienced in navigating and surviving in various survival situations, including ice-related emergencies. They are knowledgeable about ice conditions, have
  a good understanding of the insulating effect of snow, and are aware of the potential hazards associated with changing air and water levels, logs, rocks, bridges, and docks. They are also skilled in using
  ice picks, a flotation device, and a waterproof cell phone or personal locator beacon for emergency use. They are familiar with the 1-10-1 guideline for survival in cold water and have a plan for self-rescue
  and rescue of others in a group. They are aware of the importance of wearing a flotation device when not inside a vehicle and are prepared to distribute their body weight evenly across their entire figure
  by low-crawling with their hands and legs.
