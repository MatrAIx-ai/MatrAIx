  hobbies: '["Soccer (community leagues)","Dancing (cumbia, salsa)","Listening to classic rock and regional Mexican music","Cooking Mexican cuisine","Volunteering at local food banks","Participating in
    church events","Weekend road trips and photography","Attending neighborhood barbecues/festivals"]'
  career_goals: Antonio aims to secure higher‑paying, long‑haul routes that offer consistent mileage and benefit packages, and to obtain additional CDL endorsements for hazardous‑material and tanker transport.
    He plans to complete a GED program to broaden his credentials and enroll in a community‑college logistics course. In the next five years, Antonio hopes to transition into a lead‑driver or dispatcher
    role where he can mentor younger drivers, and eventually launch a modest independent logistics business focused on serving local Mexican‑American merchants in the Los Angeles area. Financially, he is
    working toward a stable retirement fund and the purchase of a reliable used tractor‑trailer to lease to other drivers.
