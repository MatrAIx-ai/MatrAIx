personas:
  professional: A budding LEGO architect Thomas Duplantis channels his love for step‑by‑step construction and logical puzzles into school science projects, often leading group tasks where they meticulously
    follow instructions, reflecting a practical, structured mindset nurtured by community expectations.
  sports: A dedicated youth soccer player Thomas Duplantis anchors midfield for the Fargo Fusion team, they follow a coach‑prescribed practice schedule, cheer on the Minnesota Vikings for inspiration, and
    balance weekend matches with brisk walks in the local parks to stay energized, demonstrating both teamwork and personal accountability.
  arts: An imaginative comic‑strip creator Thomas Duplantis spends afternoons sketching scenes in a personal journal, drawing inspiration from Marvel legend Stan Lee, Disney animator Glen Keane, and the
    whimsical world of The LEGO Movie, while they devour mystery novels by Trenton Lee Stewart for plot twists, blending visual storytelling with a love for logical puzzles.
  travel: An adventurous day‑tripper Thomas Duplantis enjoys weekend excursions to Prairie Village State Park and the Red River Trail, they meticulously plan routes using a family road atlas, and dream
    of a family journey to Yellowstone’s geysers or the LEGO exhibition in Tokyo, balancing structured travel prep with a curiosity for new landscapes.
  culinary: A comfort‑food enthusiast Thomas Duplantis favors classic school‑lunch staples like mac and cheese, chicken nuggets, and buttery corn on the cob, they savor hot chocolate with marshmallows after
    winter ice‑skating sessions, and occasionally experiment with building edible LEGO‑inspired snack towers using pretzel sticks and cheese cubes, blending culinary curiosity with their love for building.
  core: Thomas Duplantis is a methodical, LEGO‑obsessed ten‑year‑old who balances structured projects, community soccer, and imaginative comic art while navigating worries, disciplined savings, and occasional
    impulsive treats; they approach each day with cautious optimism and a habit of double‑checking plans.
background:
  cultural: Thomas was raised in Fargo, North Dakota, within a largely white, Midwestern community that values hard work, modesty, and neighborly support. His family emphasizes punctuality, responsibility,
    and community involvement, reflecting the region's agricultural roots and seasonal rhythms. Local traditions such as community potlucks, school events, and winter activities like ice skating shape his
    sense of belonging. The cultural emphasis on self‑reliance and cooperative spirit influences his balanced approach to teamwork and personal independence.
attributes:
  skills: '["LEGO building and model assembly", "Advanced reading comprehension (nonfiction)", "Basic Scratch programming", "Organizing personal schedules", "Reliable completion of household chores"]'
  hobbies: '["LEGO building", "Reading mystery and science books", "Youth soccer", "Comic drawing and journaling", "Exploring local parks and nature"]'
  career_goals: Thomas dreams of a future where he can help people in a structured, dependable way. He is fascinated by firefighters and hopes to become one, attracted by the clear protocols, teamwork,
    and the opportunity to protect his community. He also imagines working as a civil engineer, designing safe bridges and roads, because he enjoys building things that have lasting, practical impact. These
    ambitions reflect his desire for stable, organized careers that combine practicality with service to others.
