  career_goals: His primary ambition is to qualify for the U.S. Olympic team in the triathlon within the next two years, after which he aims to transition into a mentorship role that integrates physical
    training with artistic expression. He plans to launch a nonprofit that offers workshops combining sports drills with visual‑arts projects for at‑risk youth, and eventually pursue a master’s degree in
    sports psychology to deepen his impact on athlete mental health.
