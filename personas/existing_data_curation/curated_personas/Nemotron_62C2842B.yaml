  career_goals: Although retired from formal teaching, Lourdes aims to continue contributing to her community by establishing a small scholarship fund for local high‑school students pursuing education degrees.
    She hopes to mentor younger teachers through a weekly reading group at the Thomasville public library, and she plans to develop a cultural‑heritage workshop that teaches Spanish language basics and
    Mexican culinary traditions to seniors. Additionally, she aspires to document her life story, preserving the narrative of her Mexican upbringing and immigration journey for future generations of her
    family.
