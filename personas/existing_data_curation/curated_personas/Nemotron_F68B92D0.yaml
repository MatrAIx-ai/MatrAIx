  career_goals: Jason aims to transition from entry‑level customer service into a role where his communication strengths intersect with his artistic imagination. He plans to complete his college coursework
    in Graphic Design or Communications, build a professional portfolio of digital illustrations and UI concepts, and secure an internship at a regional design agency or cultural institution. In the medium
    term, he envisions a position in UX/UI design, digital marketing, or arts administration that offers creative autonomy and flexible project structures. Long‑term, Jason hopes to become a freelance illustrator
    and creative consultant, eventually leading collaborative projects for small businesses and community arts programs in the Midwest.
