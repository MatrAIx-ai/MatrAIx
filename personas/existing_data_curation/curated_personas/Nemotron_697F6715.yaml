    gaming with friends'']'
  career_goals: Yong aims to enroll in a university program that blends environmental engineering with computer science, focusing on developing sustainable technologies for coastal and forested regions.
    He aspires to work as a systems engineer or product manager at a clean‑tech company, leading interdisciplinary teams to design renewable‑energy solutions, smart water‑management tools, or low‑impact
    infrastructure. In the longer term, he hopes to launch his own venture that integrates his technical expertise with community‑focused environmental initiatives, leveraging his organizational strengths
    and collaborative style to bring innovative projects from concept to implementation.
