personas:
  professional: An aspiring environmental systems engineer, Yong Zhao blends a love of robotics and Python programming with a methodical project-management style, leading their high school's robotics club
    while spearheading beach clean-up tech solutions that merge low-impact engineering with community outreach.
  sports: An enthusiastic member of the Eureka Community Soccer Club, Yong Zhao also hikes the Redwood forests on weekends, follows the San Jose Earthquakes for inspiration, and incorporates interval training
    on their bike along the coastal trail to stay fit for both team matches and environmental field work.
  arts: A budding acoustic guitarist, Yong Zhao writes folk-rock songs influenced by Bob Dylan and Tame Impala, spends evenings practicing traditional calligraphy, and draws creative inspiration from sci-fi
    authors like Liu Cixin and Octavia Butler.
  travel: Yong Zhao plans their trips with spreadsheets, favoring eco-friendly road trips to places like the Oregon Coast and New Zealand’s South Island, while dreaming of a cultural immersion stay in Kyoto
    to experience lantern festivals, all balanced against their university tuition budget.
  culinary: An intermediate home chef, Yong Zhao loves crafting fusion dishes such as miso-glazed salmon dumplings with avocado salsa, stir-fried quinoa with locally sourced kale, and matcha-infused cheesecake
    that blend their family's traditional flavors with California’s fresh produce.
  core: Yong Zhao is a methodical, socially-charged tech tinkerer who merges environmental activism with creative pursuits, all while balancing disciplined finances and a disciplined health routine.
background:
  cultural: Yong is a second‑generation East Asian American; his parents immigrated from China and maintain many traditions at home, including speaking Mandarin, celebrating Lunar New Year, and practicing
    calligraphy. Growing up in Eureka, a coastal town with a strong environmental ethic, he has been immersed in both his family's cultural heritage and the local community's emphasis on sustainability
    and outdoor recreation. This bicultural upbringing blends the East Asian values of family cohesion, education, and respect for elders with the American emphasis on individual initiative and community
    service. Yong participates in cultural events at the local Chinese cultural association while also engaging in regional festivals, volunteer clean‑ups, and school activities, giving him a flexible identity
    that navigates diverse social contexts with ease.
