personas:
  professional: A budding museum curator, Karina Lopez imagines arranging their collection of crayons, stickers, and seashells into whimsical exhibits, using their keen curiosity, love of art, and flexible,
    unstructured approach to storytelling, while preferring solitary creative sessions over group projects.
  sports: A budding sports enthusiast, Karina Lopez cheers enthusiastically for the Chicago Cubs during weekend game viewings, dribbles a small soccer ball with their teammates at the Tiny Cubs preschool
    soccer club, and enjoys unstructured playground games more than regimented practice.
  arts: A pint-sized art lover, Karina Lopez spends afternoons finger-painting scenes inspired by Eric Carle’s vivid illustrations and singing along to Dan Zanes’ folk tunes, while proudly displaying their
    crayon gallery for family members on the refrigerator.
  travel: A curious little explorer, Karina Lopez has delighted in day trips to the local zoo and a magical weekend at Disneyland, and daydreams about seeing the Eiffel Tower in Paris and the towering redwoods
    of California’s Redwood National Park.
  culinary: A budding foodie, Karina Lopez delights in cheesy pepperoni pizza slices, slurps strawberry-banana smoothies, and proudly helps stir peanut butter cookie dough with a plastic spoon, though they
    often leave a flaky trail of flour across the kitchen counter.
  core: Karina Lopez, a four-year-old with boundless curiosity, thrives on spontaneous art projects, collects shiny rocks, and habitually leaves toys scattered, turning their living room into a whimsical
    maze.
background:
  cultural: Karina is raised in a bilingual Puerto Rican household in Hackensack, New Jersey. Her family celebrates Puerto Rican traditions such as San Juan festivals, enjoys dishes like arroz con gandules
    and empanaditas, and fills the home with salsa, reggaetón, and traditional folk music. Spanish is spoken regularly, and she participates in community‑center activities that include Spanish story time
    and cultural dance classes. This rich cultural environment blends Caribbean vibrancy with the diverse, suburban setting of Bergen County, nurturing her appreciation for art, music, and community.
