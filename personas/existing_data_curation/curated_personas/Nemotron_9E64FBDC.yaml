  hobbies: '[''drawing'', ''coloring'', ''collage making'', ''listening to music'', ''dancing'', ''exploring parks'', ''reading picture books'', ''building with blocks'', ''playing with kinetic sand'',
    ''watching educational videos'']'
  career_goals: Although only four, Karina often talks about becoming a colorful artist who paints bright pictures of nature and family life. She also imagines herself as a storyteller who shares bilingual
    tales with younger children, or a dancer who moves to lively Latin rhythms. Her aspirations reflect a desire to blend creativity, cultural expression, and the flexibility to explore new ideas without
    strict schedules.
