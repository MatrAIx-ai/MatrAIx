  career_goals: Laney aspires to move into a leadership role where she can shape a more flexible, supportive work environment for nursing staff. She aims to become a charge nurse or nurse manager, championing
    initiatives that reduce burnout and improve mental health, such as on‑site mindfulness sessions and peer‑support groups. Passionate about art and healing, she hopes to develop a formal art‑therapy program
    within her hospital and partner with local artists to bring creative workshops to patients and the community. Laney also plans to pursue advanced certifications in gerontology and hospice care, and
    eventually mentor younger nurses through a structured preceptorship program that emphasizes compassionate, patient‑centered care.
