personas:
  professional: Laney Byrd, a seasoned registered nurse with expertise in patient assessment, IV therapy, wound care, and medication management, channels their curiosity and artistic flair into integrating
    art‑based therapeutic activities, mediating unit conflicts, and advocating for staff mindfulness programs as they pursue a charge nurse role.
  sports: Laney Byrd enjoys Saturday morning spin classes at the community gym, follows the local football team with fervor during the fall season, and joins a casual recreational softball league with fellow
    nurses each summer.
  arts: Laney Byrd frequently explores pop‑up galleries featuring emerging painters like Lila Brooks, draws inspiration from the bold strokes of Jackson Pollock and the intimate portraits of Frida Kahlo,
    and spends karaoke nights belting out classics by Aretha Franklin and Adele while the smooth sounds of Miles Davis fill the room.
  travel: Laney Byrd favors spontaneous weekend road trips, often cruising the scenic Blue Ridge Parkway to visit the historic town of Asheville and the art‑filled Biltmore Estate, while also dreaming of
    a summer pilgrimage to the museums of Florence and the jazz clubs of Paris, balancing wanderlust with a tight budget that leans toward drive‑away adventures over pricey flights.
  culinary: Laney Byrd loves to whip up Southern comfort staples such as shrimp and grits, fried green tomatoes, and collard greens simmered with smoked paprika, while perfecting a soulful brunch playlist
    of jazz standards and a splash of bourbon glaze for sweet potatoes.
  core: Laney Byrd is a compassionate, art‑loving nurse who balances spontaneous creativity with lingering worry about burnout, often turning to yoga, karaoke, and impromptu road trips to keep life vibrant.
background:
  cultural: Laney identifies as African‑American and was raised in the rich cultural tapestry of the Arkansas Delta. Her family traditions are steeped in Southern hospitality, gospel music, and communal
    gatherings that emphasize mutual support and storytelling. Growing up, she attended a historically Black church that instilled values of compassion, resilience, and service to others—principles that
    now guide her nursing practice. She celebrates African‑American heritage through participation in local Juneteenth events, supporting Black artists, and preserving the oral histories of elders in her
    community. This cultural grounding informs her empathetic approach to patient care, her commitment to health equity, and her dedication to fostering inclusive, supportive environments both at work and
    in her broader community.
