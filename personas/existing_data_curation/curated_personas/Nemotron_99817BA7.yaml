  hobbies: '[''Gardening'', ''Quilting'', ''Church choir participation'', ''Reading historical fiction'', ''Crossword puzzles'', ''Walking and birdwatching'', ''Cooking Southern comfort foods'', ''Listening
    to gospel and classic R&B music'']'
  career_goals: Tamia aims to keep a stable, predictable work schedule that lets her balance employment with managing her health and personal life. Over the next few years she hopes to transition into a
    supervisory or mentorship role within her store, using her experience to train new cashiers and improve workflow while reducing high‑pressure moments that trigger anxiety. She also intends to build
    a modest retirement fund, eventually allowing her to reduce hours and focus more on community involvement, such as leading a small senior‑center craft group. Ultimately, she wants to leave a legacy
    of reliability and care for both her coworkers and the local community.
