personas:
  professional: Tamia Rice is a seasoned grocery cashier who leverages meticulous cash handling, point-of-sale expertise, and inventory tracking to keep the checkout lane humming while quietly mentoring
    new staff, valuing predictable routines yet stepping in assertively when a customer's frustration threatens the calm of the floor.
  sports: Tamia Rice is a loyal fan of the Dallas Cowboys and the Arkansas Razorbacks, cheering from the comfort of her living room while maintaining personal fitness through gentle walks along the Arkansas
    River, bird-watching, and occasional garden-yard stretching, avoiding crowded stadiums because of heightened anxiety.
  arts: Tamia Rice's artistic soul is nourished by weekly gospel choir rehearsals, classic R&B vinyl from Aretha Franklin and Marvin Gaye that plays while she sews, and the tactile rhythm of quilting, where
    her hands stitch stories into blankets for church fundraisers.
  travel: Tamia Rice favors modest, well-planned trips such as weekend getaways to Hot Springs, Arkansas, and annual visits to Nashville's music scene, preferring relaxed itineraries that accommodate her
    health routine and budgeting constraints over spontaneous long-haul adventures.
  culinary: Tamia Rice's kitchen is a sanctuary where the scent of frying catfish and the sweet aroma of baked sweet potato pie mingle with the hum of gospel music, and she skillfully balances bright collard
    greens, tomatoes, and okra in hearty meals while occasionally over-salting in an emotional moment.
  core: Tamia Rice is a steady-hand cashier, careful saver, diligent health-monitor, choir-singing quilter, river-walk fan, and home-cooked soul, whose love for routine is both her anchor and occasional
    source of anxiety-driven quirks.
background:
  cultural: As a 66‑year‑old Black woman raised in rural Arkansas, Tamia's cultural identity is shaped by the traditions of Southern Black communities. She grew up during the tail end of the civil‑rights
    era, witnessing how church, family, and community solidarity helped navigate social challenges. The local Baptist church has long been her spiritual center, offering a space for fellowship, music, and
    mutual aid, and reinforcing values of respect, humility, and service. Southern cuisine—particularly dishes like collard greens, cornbread, and fried fish—carries both cultural and nostalgic significance
    for her, as does the tradition of quilting, a craft passed down through generations. Community events, such as church picnics, Juneteenth celebrations, and volunteer days at the county senior center,
    reflect her commitment to collective well‑being. Though she lives in a small town, Tamia maintains strong ties to extended family across the South, preserving oral histories and family recipes that
    celebrate her heritage.
