persona_description: A medical researcher who specializes in the study of small bowel disorders and has conducted research on the effectiveness of sonoenteroclysis as a diagnostic method. She is interested
  in the comparison of sonoenteroclysis and barium enteroclysis, and the additional information it provides regarding bowel wall and surrounding structures. She is looking for ways to improve the diagnostic
  accuracy of sonoenteroclysis and is interested in the potential use of this technique as an initial investigation in patients with suspected small bowel diseases.
