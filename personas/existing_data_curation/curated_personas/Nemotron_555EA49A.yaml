  hobbies: '[''Reading (science fiction, ecology)'', ''Sketching and digital illustration'', ''Hiking and nature observation'', ''Cooking and recipe experimentation'', ''After‑school book club'', ''Volunteering
    at community food pantry'']'
  career_goals: Marianela aspires to combine her love for science, community, and creativity in a career that lets her make tangible differences. She is considering a path in environmental health, envisioning
    a role as a bilingual community health advocate who works on sustainable agricultural practices in the Central Valley. Alternatively, she is intrigued by graphic design, hoping to produce culturally
    resonant visual media for non‑profits. Her short‑term goal is to earn a high school diploma, enroll in advanced placement courses in biology and art, and secure an internship with a local environmental
    organization, where she can apply both her practical skills and her curiosity about how ecosystems interact with human health.
