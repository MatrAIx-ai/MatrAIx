persona_description: A university educator who is passionate about integrating sustainable development into their teaching practices and is committed to empowering more educators to understand, interpret,
  and use new ESD approaches. They are interested in the global engagement with ESD, the role of education in sustainable development, and the potential of ESD to challenge dominant paradigms and establish
  new ways of thinking. They seek to fill the gap in universities' capacity to integrate ESD into mainstream teaching practices and to develop professional competence in this area.
