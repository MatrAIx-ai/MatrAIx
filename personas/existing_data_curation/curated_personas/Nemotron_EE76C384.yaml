    and emotional resilience'']'
  hobbies: '[''Sketching and digital illustration'', ''Visiting contemporary art museums'', ''Reading science fiction and speculative nonfiction'', ''Hiking and outdoor walks'', ''Yoga and mindfulness meditation'',
    ''STEM mentorship and outreach'', ''Photography'', ''Listening to jazz and soul music'', ''Experimental cooking'']'
  career_goals: Driven by a passion for sustainable flight and innovative design, Dawn aspires to lead the development of next‑generation electric propulsion systems for commercial aircraft. She aims to
    become a senior systems engineer or chief technical officer within a leading aerospace organization, guiding multidisciplinary teams to deliver environmentally responsible technologies. Dawn also seeks
    to secure patents for novel propulsion concepts, publish interdisciplinary research that fuses engineering rigor with artistic aesthetics, and expand mentorship programs that empower Black women and
    other underrepresented groups in aerospace. Over the long term, she hopes to influence industry standards and policy through advisory roles with government agencies and professional societies.
