personas:
  professional: Dawn Braxton, an aerospace engineer with deep expertise in propulsion system design, computational fluid dynamics, and systems integration, blends analytical rigor with artistic design-thinking
    to lead Agile-driven multidisciplinary teams pioneering electric aircraft propulsion for commercial use.
  sports: Dawn Braxton enjoys hiking the Detroit Riverfront trail, practices yoga three times weekly at a downtown studio, follows the Detroit Pistons, Detroit Tigers, and the U.S. women's soccer team,
    and participates in a local recreational climbing club during the winter months.
  arts: Dawn Braxton sketches Detroit cityscapes and creates digital illustrations inspired by Detroit Institute of Arts exhibitions, while listening to Miles Davis, John Coltrane, and contemporary soul
    vocalist Lianne La Havas, and drawing artistic influence from Ai Weiwei and James Turrell.
  travel: Dawn Braxton prefers curated urban art tours, having explored Tokyo’s tech museums, Reykjavik’s sustainable architecture, and Barcelona’s Gaudí landmarks, yet balances a demanding career by limiting
    trips to two-week blocks each year.
  culinary: Dawn Braxton experiments with global cuisine at home, frequently preparing Japanese ramen, Ethiopian injera with berbere-spiced lentils, and Turkish mezze platters, favoring ingredients like
    miso, turmeric, and smoked paprika, though they sometimes over-season in a quest for bold flavors.
  core: Dawn Braxton, a 36-year-old aerospace engineer, fuses art and engineering, channels anxiety into mindfulness, and occasionally splurges on sketchbooks while chasing sustainable flight.
background:
  cultural: Dawn was raised in a close‑knit African‑American family in the Detroit metropolitan area, where her parents emphasized academic achievement, cultural pride, and community service. The rich heritage
    of Black ingenuity in the Motor City—spanning the civil‑rights movement, automotive engineering milestones, and a vibrant music and art scene—informed her sense of possibility and responsibility. As
    a Black woman navigating a predominantly white aerospace industry, she draws strength from her cultural roots, actively participating in organizations such as the Michigan Society of Black Engineers
    and local historically Black sororities. Dawn is committed to mentoring the next generation of underrepresented engineers and championing inclusive practices within her field.
