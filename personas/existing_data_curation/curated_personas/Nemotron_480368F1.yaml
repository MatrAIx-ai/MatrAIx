personas:
  professional: Mable Maly, a data‑driven sales strategist who designs and executes comprehensive sales operations with meticulous forecasting in Salesforce and HubSpot, leverages advanced negotiation and
    public‑speaking to coach mid‑size teams, and weaves mindfulness practices into leadership to temper her heightened emotional reactivity and sustain team morale.
  sports: Mable Maly, an enthusiastic hiker of the Lake Thunderbird State Park and Arcadia Lake trails, is a member of the Oklahoma Hiking Club, supports the Oklahoma City Thunder and the Oklahoma Sooners,
    and follows a structured 5K training plan for local races while balancing her love of low‑impact exercise with occasional weekend bike rides.
  arts: Mable Maly, a devoted quilter and knitter who favors classic patterns, immerses herself in mystery novels by Nora Roberts and historical fiction by Hilary Mantel, enjoys live blues performances
    at the Blue Note, and regularly visits the Oklahoma City Museum of Art to draw inspiration for her textile creations.
  travel: Mable Maly, a methodical planner who outlines trips in spreadsheets, enjoys weekend getaways to Austin for its music scene and Santa Fe for its art galleries, dreams of a wellness retreat in Sedona,
    and has previously visited New Orleans to explore Cajun cuisine, all while balancing family commitments and budget constraints.
  culinary: Mable Maly, an avid home gardener who cultivates tomatoes, bell peppers, and collard greens, excels at preparing Southern comfort dishes such as fried chicken, shrimp and grits, and sweet potato
    pie, bakes award‑winning pecan pie, and occasionally over‑spices her meals when anxiety spikes, using her kitchen as both a creative outlet and a source of predictable routine.
  core: Mable Maly blends a love of structured data, community service, and Southern cooking with mindfulness‑driven coping strategies to turn anxiety into disciplined, purposeful action.
background:
  cultural: Mable is a White American of European ancestry who was raised in the Midwest and has spent most of her adult life in Edmond, Oklahoma. Her upbringing reflects Midwestern values of hard work,
    modesty, and community responsibility, blended with the evangelical Protestant culture prevalent in Oklahoma. This background ingrains a strong family orientation, regular church involvement, and a
    sense of civic duty. She embraces local traditions such as state fairs, regional cuisine, and outdoor recreation, while also navigating modern professional aspirations that sometimes challenge traditional
    gender expectations. Her cultural lens informs both her collaborative spirit and her pragmatic, structured approach to career and personal life.
attributes:
