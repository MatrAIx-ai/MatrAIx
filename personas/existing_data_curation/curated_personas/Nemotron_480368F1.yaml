  hobbies: '[''Gardening (vegetable and native plants)'', ''Yoga and mindfulness meditation'', ''Cooking and baking Southern comfort food'', ''Hiking at Lake Thunderbird State Park'', ''Reading mystery
    and historical fiction novels'', ''Volunteering at Edmond Food Bank'', ''Church community service'', ''Quilting and knitting'']'
  career_goals: Mable’s primary ambition is to advance to a regional sales director or vice‑president of sales role within the next three to five years, overseeing multiple markets and a larger revenue
    portfolio. She aims to drive at least 20% year‑over‑year growth by implementing data‑driven sales operations and expanding the high‑margin product line. Mable is also committed to building a robust
    leadership pipeline, mentoring junior managers, and championing a culture of structured yet adaptable processes. Ultimately, she envisions establishing her own sales consultancy that leverages her expertise
    in systematic sales transformation, while maintaining a balanced lifestyle that mitigates her anxiety and supports her family.
