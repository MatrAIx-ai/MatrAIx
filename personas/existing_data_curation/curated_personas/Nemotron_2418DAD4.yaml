  career_goals: Sierra plans to earn her high‑school equivalency (GED) within the next two years and then enroll in a short‑term vocational program at the local community college, focusing on either animal
    care or culinary arts. Her immediate goal is to secure a part‑time job that offers a predictable schedule—such as a kitchen assistant at a family‑owned diner, a veterinary clinic aide, or a store associate
    at the local grocery. In the longer term, she hopes to achieve a stable, routine‑oriented career that allows her to remain in Gaylord, provide financial independence, and give her a clear daily structure
    to help manage her stress and worry.
