    tracking"]'
  hobbies: '["Playing in a recreational baseball league", "Weekly barbecue gatherings with friends and family", "Attending live music concerts (rock and classic country)", "Hiking in the Sierra Nevada foothills",
    "DIY home renovation projects", "Cooking and experimenting with grilled recipes", "Volunteering as a youth soccer coach"]'
  career_goals: Johnny aims to ascend to a regional sales manager role within the next three years, overseeing multiple territory teams and driving increased market share for his employer. He plans to achieve
    this by consistently exceeding his sales quotas, mentoring junior reps, and expanding his expertise in sustainable manufacturing trends. Long‑term, he envisions moving into a director‑level position
    where he can shape sales strategy, implement process improvements, and contribute to company growth on a national scale. His goal-oriented mindset is guided by clear milestones, performance metrics,
    and a desire to balance professional advancement with family stability.
