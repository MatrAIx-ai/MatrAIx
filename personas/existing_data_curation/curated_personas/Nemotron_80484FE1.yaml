personas:
  professional: Hector Santi, a 16‑year‑old visual‑arts enthusiast, blends hand‑drawn sketches and digital illustration to craft multicultural graphics while they calmly coordinate community mural workshops,
    leveraging bilingual communication and a curiosity for web design to stay adaptable and resilient in creative challenges.
  sports: Hector Santi enjoys jogging along the riverbank and playing casual pickup soccer with friends, they cheer for the local Rio Grande Valley FC Toros in the USL, and they occasionally volunteer as
    a water‑boy for their high school cross‑country team, balancing a love for outdoor endurance with a relaxed approach to organized competition.
  arts: Hector Santi draws artistic inspiration from the bold motifs of celebrated muralists, the improvisational spirit of Miles Davis, and the heartfelt lyricism of Joni Mitchell, they translate these
    influences into vivid sketches, digital collages, and folk‑style mural designs that celebrate both tradition and modernity.
  travel: Hector Santi prefers carefully mapped road trips that blend photography‑focused hikes in Big Bend National Park with spontaneous detours to historic border towns, they have already captured sunrise
    over the Chihuahuan Desert, hope to explore the vibrant street‑art scene of a famed cultural city just across the border, and balance adventure with a modest travel budget by staying with family acquaintances
    and leveraging student discounts.
  culinary: Hector Santi enjoys the tactile process of shaping masa into hand‑rolled corn dumplings, simmering them in a smoky broth with lentils and roasted chilies, they also experiment with blending
    these traditional flavors into a pasta carbonara that features fresh cilantro and a dash of lime, showcasing a creative yet grounded approach to both family recipes and culinary fusion.
  core: Hector Santi is a calm, curiosity‑driven teen who seamlessly fuses sketching, digital art, and community activism, yet they habitually leave their sketchbook unfinished while day‑dreaming about
    future mural projects.
background:
  cultural: Hector was raised in a bilingual Mexican‑American household in Rio Grande City, Texas. Spanish is spoken at home, and English is used at school and in the broader community, giving him a fluid
    cultural identity that straddles both sides of the border. Family traditions, such as celebrating Día de los Muertos, cooking regional dishes like tamales and mole, and attending local fiestas, have
    instilled in him a strong sense of heritage. He draws artistic inspiration from Mexican folk art, vibrant colors, and storytelling, while also engaging with contemporary American culture. This blend
    of influences shapes his worldview, creativity, and his desire to contribute to his community's cultural vitality.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Sketching and watercolor painting'', ''Digital illustration using tablets'', ''Basic graphic design (Photoshop/Canva)'', ''Creative writing (poetry,
