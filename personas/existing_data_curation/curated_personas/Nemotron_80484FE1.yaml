    ''Self-taught guitar playing'']'
  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Playing guitar'', ''Listening to eclectic music (Latin, indie, jazz)'', ''Photography of local landscapes'', ''Reading sci‑fi and philosophy'',
    ''Exploring Mexican folk art'', ''Cooking traditional Mexican dishes with family'', ''Participating in community festivals and parades'', ''Playing strategy video games (e.g., Civilization)'']'
  career_goals: Hector aims to pursue a career that merges his passion for art with technology. He dreams of enrolling in a visual arts program at a university or community college, eventually becoming
    a professional graphic designer or multimedia artist who incorporates Mexican cultural motifs into modern digital media. He also hopes to create a community art space in Rio Grande City where local
    youth can collaborate on murals and cultural projects, using his organizational skills to lead workshops and exhibitions. Long‑term, he envisions contributing to cultural preservation through design
    while maintaining a calm, resilient approach to the challenges of a creative profession.
