    ''Team leadership and training'', ''Creative prototyping with Arduino/Raspberry Pi'', ''Design thinking for innovative solutions'', ''Customer-facing technical support'']'
  hobbies: '[''Digital photography'', ''DIY electronics and Arduino projects'', ''3D printing and rapid prototyping'', ''Playing acoustic guitar'', ''Community theater participation'', ''Hiking and biking
    local trails'', ''Recreational softball league'', ''Cooking and hosting dinner parties'', ''Reading science‑fiction and fantasy novels'', ''Volunteering at the local maker‑space'']'
  career_goals: Robert aims to advance from a senior technologist to a lead engineering specialist, overseeing product development for smart‑home and renewable‑energy solutions. He plans to earn a bachelor's
    degree in electrical engineering within the next three years, followed by certification as a Certified Engineering Technician (CET) and eventually pursuing a Professional Engineer (PE) license. His
    long‑term ambition is to head a multidisciplinary R&D team that creates environmentally sustainable, aesthetically compelling products, while also mentoring junior technicians and establishing a community
    maker‑space in Hastings to foster local innovation.
