personas:
  professional: Tia Miles is a seasoned industrial maintenance veteran with 30+ years diagnosing heavy machinery, now leveraging their pragmatic curiosity to craft low‑downtime strategies while mentoring
    apprentices one‑on‑one, despite occasionally struggling to keep paperwork organized.
  sports: Tia Miles enjoys early‑morning river fishing with the Hillsborough River Anglers Association, follows the Tampa Bay Buccaneers and Tampa Bay Lightning avidly, and maintains basic fitness through
    DIY weightlifting in the shop, yet they avoid team sports, preferring solitary physical pursuits.
  arts: Tia Miles spends evenings spinning classic rock vinyl from Led Zeppelin and The Rolling Stones on a vintage turntable while building scale models of diesel locomotives and restoring pocket‑knife
    mechanisms, drawing inspiration from Henry Petroski’s engineering biographies and finding solace in the tactile precision of these crafts.
  travel: Tia Miles plans low‑key road trips to historic industrial museums like the Henry Ford Museum in Michigan and the Bethlehem Steel site, while craving occasional weekend getaways to the Gulf Islands
    for quiet fishing, preferring self‑driven itineraries that balance modest budget constraints with the desire to explore engineering heritage.
  culinary: Tia Miles favors hearty Gulf Coast fare, often grilling fresh grouper with lemon‑herb butter and preparing a well‑seasoned gumbo using home‑grown dill and bay leaves, cooking at a competent
    level that lets them experiment with smoked brisket on a backyard smoker, yet they tend to skip desserts in favor of a strong cup of black coffee.
  core: Tia Miles merges relentless mechanical curiosity with a solitary, hands‑on lifestyle, channeling a competitive streak into precise maintenance work while occasionally wrestling with disorganization
    and a pragmatic, frugal outlook.
background:
  cultural: Tia grew up in a working‑class white family in the Gulf Coast region, where self‑reliance and hands‑on problem solving were core values. Influenced by a community of skilled tradespeople and
    a modest Protestant upbringing, she learned early on the importance of hard work, practicality, and modesty. Her cultural heritage emphasizes independence, a straightforward communication style, and
    a respect for tradition, which shape her preference for solitary work environments and her competitive drive to master her craft.
attributes:
  skills: '[''Industrial machinery troubleshooting'', ''Refractory furnace maintenance'', ''MIG/TIG welding'', ''Hydraulic system repair'', ''Pneumatic system diagnostics'', ''Preventive maintenance planning'',
    ''Technical drawing interpretation'', ''Safety compliance (OSHA)'', ''Equipment installation and alignment'', ''Electrical control troubleshooting'', ''Custom fabrication and metalworking'', ''Diagnostic
    tool usage (vibration analysis, thermal imaging)'']'
  hobbies: '[''Fishing'', ''Gardening (native Floridian plants)'', ''Scale model building (diesel locomotives)'', ''Restoring vintage pocket‑knife mechanisms'', ''Crossword puzzles'', ''Listening to classic
    rock'', ''Reading technical histories and engineering biographies'']'
  career_goals: Tia aims to leverage her deep technical knowledge into a senior specialist role where she can design and implement low‑downtime maintenance strategies for large‑scale plants. She hopes to
    earn certification as a Certified Maintenance & Reliability Professional (CMRP) and eventually start her own consultancy focused on refurbishing and optimizing refractory furnaces for the Florida petrochemical
    and metal‑casting industries. While she values autonomy, she also wants to mentor a select few apprentices in a one‑on‑one setting, proving her expertise through results rather than formal leadership.
