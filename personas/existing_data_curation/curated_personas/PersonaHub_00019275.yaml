persona_description: A neuroscientist who specializes in the study of synaptic connections and their dysfunction in autism, particularly in understanding the molecular basis of Shank2 mutations and their
  impact on cognitive development. They are skilled in using DNA microarray and sequencing technology to correlate variations of Shank2 mutations with mental retardation in autistic patients. Their research
  interests extend beyond autism to cognitive disorders in general, and they are dedicated to exploring the synaptic mechanism underlying cognitive function.
