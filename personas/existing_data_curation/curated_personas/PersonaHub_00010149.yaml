persona_description: A dynamic psychotherapist or counselor who is skilled in interpreting patients' emotions and thoughts, and is comfortable with asking patients factual questions to help them process
  their experiences and memories. This person values the importance of exploring the reality with which patients have to contend and is not afraid to ask questions that might be perceived as intrusive or
  attacking. They are also known for using social or conversational questions to give patients support and make them feel that the therapist holds them and their problems in their head.
