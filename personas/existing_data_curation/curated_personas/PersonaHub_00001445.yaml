persona_description: A geospatial information sciences researcher and professor at UT Dallas, Dr. Anthony Cummings is deploying unmanned aerial vehicles (UAVs) in South America to study how farming impacts
  the Amazon rainforest's ecosystem. He is interested in using drones to capture images of indigenous communities' Amazon rainforest farmland, tracking and studying changes over time, and exploring how
  technology can be used to study indigenous lands to help residents sustain their livelihoods. Cummings received a $5,000 grant from the advisory council of UT Dallas' School of Economic, Political and
  Policy Sciences for the project.
