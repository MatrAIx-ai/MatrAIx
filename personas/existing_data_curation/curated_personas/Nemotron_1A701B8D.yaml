  career_goals: Inspired by her love for people and interest in how things work, Angela hopes to become a teacher or community outreach coordinator who can blend hands‑on learning with teamwork. She wants
    to design interactive science workshops for younger students, lead school clubs, and eventually study education or environmental science to help her community understand and protect the natural world.
    In the short term, she aims to serve as a student‑council leader, mentor new classmates, and volunteer at the local nature center.
