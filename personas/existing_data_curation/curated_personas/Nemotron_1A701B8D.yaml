personas:
  professional: Angela Teal is an avid junior coder who blends practical problem‑solving with boundless curiosity, turning Scratch projects into interactive stories while leading a small team of Girl Scout
    peers to design LEGO‑based engineering challenges for school fairs.
  sports: Angela Teal shines as a midfield dynamo on the co‑ed Riverside Rockets youth soccer team, cheers on Washington D.C.’s D.C. United during televised matches, and spends weekends hiking the Shenandoah
    National Park trails with their Girl Scout troop, balancing team spirit with a love for the outdoors.
  arts: Angela Teal channels creativity through hip‑hop dance classes, starring in the school’s production of ‘Grease’, sketching comic‑style panels of dragons inspired by J.K. Rowling and Brandon Sanderson,
    and curating playlists that bounce between BTS and Kendrick Lamar, all of which fuel their imaginative storytelling in Scratch games.
  travel: Angela Teal prefers family‑oriented trips that blend learning and adventure, having explored the Smithsonian Air and Space Museum in Washington D.C., trekked the Appalachian Trail’s scenic overlooks
    on a weekend camping badge, and dreaming of an eventual road trip to the Grand Canyon’s rim where they can combine photography with a scavenger‑hunt inspired by Girl Scout badge challenges.
  culinary: Angela Teal loves baking chocolate‑chip cookies and peppermint‑swirl brownies with their older sibling, experiments with adding oat‑flour for a healthier twist, enjoys munching on pepperoni
    pizza and sushi rolls after soccer practice, and proudly claims a growing skill set that lets them follow YouTube’s ‘Tasty Kids’ recipes without burning the kitchen.
  core: Angela Teal is a curiosity‑driven, sociable whirlwind who juggles soccer, coding, and cookie‑baking while thriving on spontaneity and occasionally forgetting to tidy their Lego masterpieces.
background:
  cultural: Angela comes from a white, middle‑class family in Olney, a suburban community in Montgomery County, Maryland. Her upbringing reflects typical American suburban culture—celebrating holidays such
    as Thanksgiving and Christmas, attending a public elementary school, and participating in community programs like Girl Scouts and local sports leagues. Proximity to Washington, D.C., provides exposure
    to a diverse cultural landscape, museum trips, and civic events, which complement her family's values of education, teamwork, and community service.
