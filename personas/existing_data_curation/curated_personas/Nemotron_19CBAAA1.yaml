personas:
  professional: Shannon Strickland, a budding kindergarten teacher in the making, channels their love of structure and sociable energy by meticulously arranging pretend classroom corners, leading group
    story times, and ensuring every playmate feels included and valued.
  sports: Shannon Strickland, an enthusiastic member of the Little Leaguers T‑ball team and a devoted fan of the hometown City Hawks baseball squad, thrives on weekly practice schedules, enjoys structured
    drills, and delights in cheering loudly alongside peers.
  arts: Shannon Strickland, a budding artist who loves drawing vibrant scenes from Disney’s Moana and Pixar’s Toy Story, sings along to The Wiggles’ upbeat tunes, and regularly participates in preschool
    drama rehearsals, finds joy in creative expression that nurtures social bonds.
  travel: Shannon Strickland, an eager young traveler who has explored Disneyland in California and the Grand Canyon on family trips, enjoys the comfort of a pre‑packed suitcase checklist featuring their
    favorite stuffed bear and a snack of apple slices, blending adventure with predictable routines.
  culinary: Shannon Strickland, a picky but enthusiastic eater who delights in cheesy mac and cheese, golden chicken nuggets, and strawberry‑topped pancakes, can proudly assemble a simple fruit salad with
    sliced bananas and grapes, though they often sneak an extra cookie when parents aren’t looking.
  core: Shannon Strickland blends a love for orderly play, a disciplined piggy‑bank habit, and a vivid imagination, yet can’t resist a hidden cookie, making them a charmingly meticulous yet delightfully
    mischievous five‑year‑old.
background:
  cultural: Shannon grows up in Louisa, Virginia, a small rural community with strong emphasis on family, community involvement, and Southern hospitality. Her family observes traditional American holidays
    like Thanksgiving and Christmas, and attends a local church where she participates in children's programs. The regional culture values politeness, respect for neighbors, and a close connection to the
    natural environment, which influences her appreciation for outdoor play and community gatherings.
attributes:
  skills: '["Letter recognition", "Basic counting", "Sorting and categorizing objects", "Following routines", "Cooperative group play", "Helpfulness and empathy", "Organizing toys and materials"]'
  hobbies: '["Building LEGO structures", "Solving jigsaw puzzles", "Reading picture books", "Singing in preschool choir", "Participating in group dance", "Drawing and coloring", "Collecting and sorting
    stickers", "Pretend doctor play"]'
  career_goals: Shannon often talks about wanting to help others and keep things tidy. She envisions herself as a future teacher who creates organized classrooms, a librarian who maintains orderly shelves,
    or a veterinarian caring for animals. Her early ambition reflects a desire to combine her love for structure, kindness, and community service.
