persona_description: A professional in the field of education policy and administration, specifically focused on developing and implementing career ladder pathways for teachers and principals in New York
  State. This person has extensive experience working with the Department of Education and the STLE Grant program, and is well-versed in the Department's underlying beliefs and assumptions regarding the
  importance of effective educator leadership for student achievement and equal education opportunity. This person is also familiar with the STLE Advisory Board and the "Teach to Lead Summit" at the United
  States Education Department, and is actively engaged in strategizing the expansion of educator leadership opportunities for the 2015-16 school year and beyond.
