personas:
  professional: Ruth Ulibarri, a 40‑year‑old correctional officer renowned for her adept crisis de‑escalation and meticulous incident reporting, blends hands‑on security expertise with a compassionate,
    arts‑based rehabilitative approach, spearheading inmate art‑therapy programs while eyeing a promotion to sergeant and eventually deputy warden.
  sports: Ruth Ulibarri enjoys early‑morning jogs along the river trail, participates in a local adult‑kickball league, cheers for the New Orleans Saints in football and follows the Pelicans for basketball,
    and attends community yoga classes at the municipal recreation center, balancing structured workouts with spontaneous waterfront kayaking in the bayou each summer.
  arts: Ruth Ulibarri channels her vivid imagination into oil paintings of misty bayou scenes, sketches lyrical poetry inspired by Octavia Butler’s speculative worlds, and finds solace listening to Miles
    Davis and B.B. King while admiring the works of Frida Kahlo and the contemporary muralist JR, frequently attending the regional museum’s rotating modern‑art exhibits.
  travel: Ruth Ulibarri favors thoughtfully planned road trips that blend artistic immersion and natural wonder, having explored the historic French Quarter, the vibrant galleries of Asheville, and the
    misty redwood forests of Northern California, while dreaming of a future pilgrimage to the blue‑hued streets of Chefchaouen and the avant‑garde museums of Berlin.
  culinary: Ruth Ulibarri, an enthusiastic home cook, masterfully prepares gumbo with shrimp, andouille sausage, okra, and fresh basil from her herb garden, while also delighting in crafting herb‑infused
    vinaigrettes for roasted beets and experimenting with sweet‑spicy mango salsa to accompany grilled catfish, showcasing a medium‑level culinary skill tempered by occasional over‑seasoning.
  core: Ruth Ulibarri is a compassionate correctional officer whose boundless imagination fuels a love of art, jazz, and garden herbs, while her habit of procrastinating yoga for late‑night poetry drafts
    reveals a delightful tension between disciplined duty and creative spontaneity.
background:
  cultural: Ruth grew up in a close‑knit, predominantly white working‑class community in the Greater Baton Rouge area, where Southern hospitality and church gatherings were central to family life. Her family’s
    cultural heritage includes Basque roots reflected in the surname Ulibarri, blended with a broader American Southern identity. Raised in a Protestant (Methodist) environment, she internalized values
    of service, modesty, and community solidarity. Living in Denham Springs, she embraces the region’s love of food, music, and festivals, while her widowed status has deepened her empathy and commitment
    to helping others navigate hardship.
attributes:
  skills: '[''Inmate supervision'', ''Crisis de‑escalation'', ''Report writing and documentation'', ''Legal and regulatory compliance'', ''Self‑defense and use‑of‑force techniques'', ''First aid and CPR'',
