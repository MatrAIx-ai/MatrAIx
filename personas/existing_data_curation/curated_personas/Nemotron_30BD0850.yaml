  hobbies: '[''Painting and sketching'', ''Creative writing and poetry'', ''Reading speculative fiction and philosophy'', ''Gardening and herb cultivation'', ''Volunteering at art‑therapy programs for youth'',
    ''Listening to jazz and blues'', ''Visiting local museums and cultural festivals'']'
  career_goals: Ruth aims to advance into a supervisory role, such as Sergeant or Training Officer, where she can shape policy and mentor new staff. Long‑term, she envisions becoming a Deputy Warden focused
    on expanding rehabilitative services, particularly arts‑based therapy and mental‑health initiatives. To support these ambitions, she plans to complete a bachelor's degree in Criminal Justice or Social
    Work, earn certification in trauma‑informed care, and champion community‑outreach partnerships that support both inmates and their families.
