persona_description: A UN Secretary-General who is committed to the protection and sustainable use of biological diversity, particularly in the context of the International Day for Biodiversity. The Secretary-General
  is aware of the importance of forests in preserving biodiversity and contributing to poverty alleviation and sustainable national development. He is also aware of the need to address deforestation and
  forest degradation to reduce the threat of climate change, biodiversity loss, and land degradation. The Secretary-General has a special interest in the Nagoya Protocol on Access to Genetic Resources and
  the Fair and Equitable Sharing of Benefits Arising from Their Utilization, which aims to link conservation and sustainable use of biological diversity with development. He is also aware of the benefits
  of forests in terms of water storage, soil stabilization, biodiversity conservation, and regulation of climate.
