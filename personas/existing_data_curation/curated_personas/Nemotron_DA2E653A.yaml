  hobbies: '[''Journaling'', ''Puzzles and crosswords'', ''Yoga and meditation'', ''Cooking Mexican cuisine'', ''Balcony gardening'', ''Hiking'', ''Reading personal‑development books'', ''Attending cultural
    festivals'']'
  career_goals: Marisol aims to advance from her current receptionist position to a senior administrative role, such as Office Manager or Executive Assistant, within the next three to five years. She plans
    to complete her associate degree in Business Administration and obtain a professional certification in Office Management. Long‑term, she envisions a career in operations coordination or human resources
    where she can leverage her organizational strengths, bilingual abilities, and competitive drive to lead office teams and improve efficiency.
