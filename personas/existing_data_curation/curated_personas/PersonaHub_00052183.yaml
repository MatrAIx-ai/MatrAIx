persona_description: A state environmental regulator who is responsible for overseeing the safe use of hydraulic fracturing (fracking) in North Carolina. They have coordinated a study that recommends full
  disclosure of chemicals to regulators, banning the use of diesel fuel, and collecting data on groundwater, surface water, and air quality before drilling wells with fracking. They are aware of the potential
  risks and benefits of fracking and are advocating for more safety measures before allowing it to be used in the state.
