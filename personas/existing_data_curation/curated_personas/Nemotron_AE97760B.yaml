personas:
  professional: Donovan Aku, an experienced personal care aide with 25+ years of hands‑on service, blends meticulous documentation, CPR‑certified emergency readiness, and a methodical, curiosity‑driven
    approach to caring for seniors, while dreaming of CNA and LPN credentials and a future supervisory consultancy role.
  sports: Donovan Aku enjoys early‑morning fishing on the Delaware bays, follows the Baltimore Orioles during baseball season, cheers for the Washington Commanders in football, and participates in a local
    senior golf league every fall, while maintaining a modest fitness routine of garden chores and occasional walk‑runs along the coastal trail.
  arts: Donovan Aku finds solace in assembling historic ship models, crafting wooden birdhouses, and listening to the timeless soul of Otis Redding and Nina Simone, while devouring works by historian Eric
    Foner and attending community theater performances at the Sussex County Playhouse.
  travel: Donovan Aku prefers purposeful road trips that combine heritage sightseeing with quiet retreats, having explored the cobblestone streets of Savannah, the jazz‑filled alleys of New Orleans, and
    the historic sites of the Chesapeake Bay, while planning their next getaway to the Blue Ridge Mountains for a weekend of fishing and gardening workshops.
  culinary: Donovan Aku delights in cooking soulful Southern meals such as collard greens simmered with smoked turkey, sweet potato casserole, and gumbo seasoned with okra and filé, often sourcing heirloom
    tomatoes from their own garden and pairing dishes with homemade cornbread and hot sauce crafted from locally grown peppers.
  core: Donovan Aku is a methodical, curiosity‑driven caregiver who balances disciplined routine with a love for woodworking, model ships, and soulful cooking, all while navigating a skeptical, competitive
    edge and an unwavering calm.
background:
  cultural: Donovan identifies as African‑American and grew up in a close‑knit Black community in the Mid‑Atlantic region. His family’s cultural roots are tied to the Great Migration, and stories of resilience
    and mutual support have shaped his values. The church has been a central pillar, reinforcing a sense of collective responsibility and respect for elders—principles he carries into his caregiving role.
    He draws on Black culinary traditions, incorporating soulful flavors into his cooking, and he honors the heritage of oral storytelling by sharing anecdotes with the clients he serves. Living in Selbyville,
    a small town in Sussex County, he balances rural sensibilities with a strong sense of cultural pride, which informs his empathetic, yet pragmatic approach to personal care.
attributes:
  skills: '["Patient hygiene assistance", "Mobility support and safe transfers", "Medication reminder coordination", "Basic wound care", "Vital signs monitoring", "Documentation and electronic record‑keeping",
    "Care plan scheduling and inventory management", "First Aid/CPR certification", "Dementia‑care techniques", "Nutrition and diet assistance"]'
  hobbies: '["Fishing", "Gardening", "Woodworking", "Reading historical non‑fiction", "Scale model ship building", "Cooking traditional Southern cuisine", "Volunteering at senior centers", "Participating
    in church fellowship events"]'
  career_goals: Donovan aims to advance his professional credentials by obtaining a Certified Nursing Assistant (CNA) license within the next two years, followed by a Licensed Practical Nurse (LPN) qualification.
    He also envisions taking on a supervisory role within his home‑health agency, where he can mentor newer aides and implement systematic quality‑improvement initiatives. Long‑term, he dreams of launching
    a small, community‑focused elder‑care consultancy that blends his practical expertise with the latest evidence‑based practices, offering personalized care plans for families across Sussex County.
