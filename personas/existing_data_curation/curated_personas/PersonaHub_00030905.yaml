persona_description: A Vietnamese career guidance counselor who specializes in assisting individuals, of any age and at any point throughout their lives, to make their educational, training, and occupational
  choices in order to manage their careers. Their role extends beyond education and affects national social and economic development. They offer systematic programs that facilitate individual career development
  and career management, inform students about current and future opportunities of the job market, assess, teach, enable, advocate, network, give feedback, manage, and innovate or system change. Their aim
  is to help students make decisions based on their interests, passion, and abilities, while taking into account current and future career opportunities. They also equip students with the right kind of
  skills so that they may stay relevant and fit in the world economy while leading a purposeful life.
