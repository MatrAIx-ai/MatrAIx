  career_goals: Lisa intends to attend a Texas university to earn a Bachelor’s degree in Business Administration or Human Resource Management. Her medium-term goal is to secure an internship in a corporate
    HR or project-management office where she can apply her organizational strengths. Ultimately she aspires to become a project manager or HR specialist who designs efficient workplace processes and fosters
    a collaborative, supportive culture. She also hopes to obtain a professional certification such as PMP (Project Management Professional) to solidify her credentials.
