personas:
  professional: Coleen Franklin, a 24‑year‑old heavy‑equipment operator on a residential renovation crew, leverages her proficiency with skid‑steer loaders, blue‑print interpretation, and OSHA protocols
    to orchestrate daily tasks with meticulous time‑management, positioning herself for a crew‑supervisor role within three years.
  sports: Coleen Franklin hits the Blackstone River Trail for cardio hikes each weekend, follows the Boston Red Sox and New England Patriots closely, and plays recreational pickup basketball at the local
    community center, balancing structured fitness with a competitive edge.
  arts: Coleen Franklin practices architectural photography, drawing inspiration from photographers like Andreas Gursky and the clean lines of Bauhaus designers, enjoys listening to minimalist composers
    such as Max Richter while working on DIY projects, and occasionally attends local indie theatre productions starring actors like John Gallagher Jr.
  travel: Coleen Franklin prefers meticulously planned road trips that blend scenic hikes with historic house tours, has explored Boston’s Beacon Hill and Portland’s Old Port, and hopes to itinerary‑map
    a summer pilgrimage to the medieval villages of the English Cotswolds and the cherry‑blossom festivals of Kyoto.
  culinary: Coleen Franklin cooks with a methodical precision, favoring New England clam chowder, roasted root vegetables, and a perfectly seared ribeye seasoned with rosemary and garlic, while experimenting
    with sous‑vide techniques and cataloguing each recipe in her notebook.
  core: Coleen Franklin is a disciplined, puzzle‑loving construction technician whose love of structure fuels both her career ambitions and her habit of obsessively cataloguing every receipt, even if it
    sometimes paradoxically stalls her social spontaneity.
background:
  cultural: Coleen was raised in Pawtucket, Rhode Island, in a working-class white American family with Irish and English ancestry. The region’s pragmatic New England ethos shaped her practical, self-reliant
    outlook, and she grew up valuing hard work, punctuality, and community responsibility. She celebrates traditional American holidays such as Thanksgiving and Fourth of July, and participates in local
    events like the St. Patrick’s Day parade, reflecting her cultural heritage. Her upbringing emphasized modesty, a strong work ethic, and the importance of maintaining reliable relationships within her
    neighborhood.
attributes:
  skills: '[''Heavy equipment operation (skid-steer, compactors)'', ''Blueprint and technical drawing interpretation'', ''Construction site safety compliance (OSHA)'', ''Basic carpentry'', ''Concrete finishing'',
    ''Material handling and inventory control'', ''Project documentation and reporting'', ''Time management and scheduling'', ''Team coordination'', ''Construction-management software (Procore) basics'',
    ''Introductory AutoCAD drafting'']'
  hobbies: '[''Reading technical manuals and mystery novels'', ''DIY home-improvement projects'', ''Hiking local trails (Blackstone River Trail)'', ''Puzzle video games (e.g., Portal)'', ''Personal finance
    journaling and budgeting'', ''Photography of construction sites and architecture'', ''Strategic board-game nights (small group)'']'
  career_goals: Coleen aims to transition from laborer to crew supervisor within the next three years, obtaining OSHA 30-hour certification and completing an associate degree in construction management.
    She aspires to manage a small crew, oversee safety protocols, and ensure projects stay on schedule and budget. Long-term, she envisions opening her own niche contracting firm that specializes in residential
    renovations, allowing her to apply her organized, detail-oriented mindset to business operations.
