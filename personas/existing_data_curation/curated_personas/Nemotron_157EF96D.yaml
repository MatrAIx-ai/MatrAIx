personas:
  professional: Bao Huang, a ten‑year‑old budding robotics hobbyist, spends afternoons programming simple LEGO‑based robots and dreaming of becoming an engineer, channeling their outgoing curiosity and
    practical mindset into hands‑on problem‑solving while happily collaborating with classmates.
  sports: Bao Huang bolts onto the soccer field for the Angel City Youth Soccer League, idolizes the LA Galaxy and LAFC, and after games loves to mimic the quick footwork of Lionel Messi while occasionally
    skipping the mandatory warm‑up stretches in their excitement.
  arts: Bao Huang delights in sketching cartoon mash‑ups inspired by Adventure Time and the sci‑fi visuals of Studio Ghibli, often humming the tunes of their grandparents’ Mandarin folk songs while watching
    Lin‑Manuel Miranda’s musical numbers and admiring the playful storytelling of Pixar’s Inside Out.
  travel: Bao Huang loves weekend excursions to the tide pools of Laguna Beach, the hands‑on science exhibits at the Discovery Cube in Santa Ana, and dreams of a family trip to Hawaii’s volcanoes after
    seeing photos of Kauai’s waterfalls online.
  culinary: Bao Huang is a kitchen apprentice at home, mastering pork and vegetable dumplings with sweet chili sauce and a dash of ginger alongside their parents, and they also enjoy assembling homemade
    pizza topped with mozzarella, pepperoni, and pineapple chunks.
  core: Bao Huang is a high‑energy, LEGO‑building, soccer‑loving kid who balances a chaotic love of puzzles with a surprisingly disciplined piggy‑bank habit and a penchant for humming folk tunes while forgetting
    to stretch before a game.
background:
  cultural: Bao’s family traces its roots to mainland China, and they preserve a blend of traditional Chinese customs and modern American life in Orange, California. At home, Mandarin is spoken regularly,
    and celebrations such as Lunar New Year, the Mid‑Autumn Festival, and the Dragon Boat Festival are marked with family gatherings, traditional foods, and cultural activities. He attends a public elementary
    school with a diverse student body, where he participates in multicultural clubs that expose him to other Asian and Latino traditions. His parents emphasize the values of education, respect for elders,
    and community harmony, which shape his cooperative and considerate demeanor. Growing up in a vibrant, multicultural Southern California community has also introduced him to a variety of cuisines, festivals,
    and peer groups, enriching his cultural identity.
