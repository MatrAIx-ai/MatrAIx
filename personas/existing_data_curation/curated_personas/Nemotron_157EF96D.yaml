  career_goals: Bao dreams of turning his love for building and problem‑solving into a future career as an engineer or inventor who creates practical solutions for everyday challenges, such as eco‑friendly
    gadgets or community tools. He also hopes to work in a field where he can help others, like environmental science or a medical profession, reflecting his caring nature. In the short term, he aims to
    lead his school's science club, enter robotics competitions, and volunteer at local community events to develop leadership and teamwork skills.
