  career_goals: She aims to complete a memoir that weaves her personal recollections with the cultural history of Pike County, to lead intergenerational art workshops at the Milford community center, to
    curate a small traveling exhibition of local artists' work, and to volunteer as a storyteller for the historical society, while maintaining a flexible schedule that allows for self-care and home-based
    study.
