  career_goals: At 69, Lucio aims to transition into a supervisory role where he can formalize his mentorship of younger janitorial staff and influence the development of more sustainable cleaning practices
    in his building. He is considering establishing a small community-focused cleaning service that would provide affordable upkeep for local senior centers and churches. Additionally, Lucio hopes to contribute
    to local occupational safety committees, sharing his hands‑on expertise to improve standards across West Haven’s commercial properties.
