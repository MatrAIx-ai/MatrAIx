  hobbies: '[''Gardening'', ''Traditional Mexican Cooking'', ''Walking Nature Trails'', ''Volunteer Financial Literacy Workshops'', ''Reading Historical Fiction'', ''Quilting'']'
  career_goals: Nancy aims to transition into a senior consulting role where she can leverage her analytical expertise to guide small‑ and mid‑size businesses in Michigan. She is committed to mentoring
    the next generation of analysts, especially women and members of the Latino community, and hopes to spearhead diversity‑focused initiatives within her organization. As she approaches retirement, she
    plans to establish a part‑time consultancy that offers structured, stress‑reduction oriented process‑improvement workshops, while also serving on local nonprofit boards that promote economic empowerment
    for Hispanic families.
