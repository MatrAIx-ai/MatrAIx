  hobbies: '["Senior center activities (bingo, card games, storytelling)", "Listening to classic blues and soul music", "Attending live music concerts", "Gardening and vegetable harvesting", "Recreational
    fishing with friends", "Church choir participation", "Community potlucks and neighborhood gatherings"]'
  career_goals: While approaching the end of his formal working years, Isaiah aims to transition into a part‑time mentor role, offering his extensive knowledge to younger operators and helping his employer
    improve efficiency and safety culture. He also hopes to secure a modest supplemental pension that will cover his medical expenses and allow him to remain financially independent. Additionally, Isaiah
    wishes to volunteer his technical skills at local vocational schools and community centers, fostering the next generation of skilled tradespeople in the Chicago region.
