personas:
  professional: Lien Cheng, a retired home‑management expert turned community storyteller, blends her bilingual fluency, garden‑grown ingredients, and meticulous organization to lead intergenerational workshops
    on traditional cooking and digital memoir creation while balancing curiosity with practicality.
  sports: Lien Cheng enjoys daily walks along Champaign County’s Oak Ridge Trail, practices tai chi at the senior center, cheerfully roots for the Illinois Fighting Illini basketball team, and occasionally
    joins a senior pickleball league, balancing low‑impact exercise with community spirit.
  arts: Lien Cheng devotes evenings to reading Ken Follett’s historical sagas and Amy Tan’s memoirs, listens to Yo‑Yo Ma’s cello recordings, and attends community theater productions of classic dramas,
    merging literary curiosity with a love for live performance.
  travel: Lien Cheng favors purposeful travel, having revisited her family’s hometown in Taiwan and explored Kyoto, while planning future visits to the historic streets of Savannah and a river cruise along
    the Mississippi, balancing a modest retirement budget with a deep desire for cultural immersion.
  culinary: Lien Cheng delights in crafting stir‑fried bok choy with ginger, braised pork belly with star‑anise, and herb‑infused dumplings using home‑grown cilantro, basil, and scallions, blending family
    recipes with locally sourced carrots and kale for fresh, authentic flavors.
  core: Lien Cheng blends a gardener’s patience, a storyteller’s curiosity, and a meticulous budgeter’s pragmatism, often humming while kneading dough and secretly hoarding extra tea bags for late‑night
    reading sessions.
background:
  cultural: Lien is a second‑generation Chinese‑American whose parents immigrated from Taiwan in the early 1960s. Raised in a bilingual household, she grew up speaking Mandarin at home while attending English‑language
    schools, giving her fluency in both languages. She maintains cultural traditions such as Lunar New Year gatherings, ancestor worship during Qingming, and preparing festive dishes like dumplings and
    mooncakes. Living in Champaign, Illinois, she has blended her East Asian heritage with Midwestern community values, actively engaging in local cultural exchange events, teaching Mandarin basics to interested
    neighbors, and serving as a cultural liaison at the university's Asian studies program. Her identity reflects a respectful balance of preserving her family's customs while embracing the diverse social
    fabric of her hometown.
