  career_goals: Although retired, Lien is committed to lifelong learning and community contribution. She plans to enroll in a local university's continuing‑education program to study digital storytelling,
    with the goal of creating a multimedia memoir that captures her family's migration journey and preserves cultural recipes for future generations. She aspires to mentor younger members of the Chinese‑American
    community in Champaign, leading intergenerational workshops on traditional cooking, language basics, and cultural customs. Maintaining her health is a priority; she intends to keep a regular walking
    routine, join a tai chi class, and participate in senior fitness programs. Lien also hopes to travel back to her ancestral hometown in Taiwan for a family reunion, and to publish a small family cookbook
    featuring stories behind each dish.
