  career_goals: Inspired by her love for visual storytelling and community engagement, Mariah aims to pursue a degree in visual communication or graphic design at a forward‑thinking art school. She envisions
    a career as a graphic designer or creative director for a socially conscious brand, where she can blend bold aesthetics with messages that promote inclusivity and environmental stewardship. Long‑term,
    she hopes to launch a community‑focused arts non‑profit that offers workshops, public murals, and youth mentorship programs, using her sociable nature to rally volunteers and bring diverse voices together.
