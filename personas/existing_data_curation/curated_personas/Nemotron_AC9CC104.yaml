personas:
  professional: Mariah Lee, a 16‑year‑old visual storyteller in training, blends their digital illustration skills in Canva, budding Photoshop abilities, and keen photographic eye with a talkative charisma
    that shines when leading school art club presentations, crafting a collaborative graphic design approach that leans toward socially conscious branding.
  sports: Mariah Lee, a 16‑year‑old with a vibrant social life, participates in weekend pick‑up basketball games at the community center, follows the Boston Celtics and New England Patriots with enthusiastic
    loyalty, attends a teen yoga class for flexibility, and rides a skateboard with friends on Saturdays, even if they occasionally forget to stretch beforehand.
  arts: Mariah Lee, a 16‑year‑old creator, spends afternoons painting murals for the local community center, curates Instagram reels inspired by Banksy, Yayoi Kusama, and the lo‑fi acoustic tracks of Phoebe
    Bridgers, performs improv sketches at school theater nights, and harbors a quirky habit of doodling elaborate marginalia on every receipt they collect.
  travel: Mariah Lee, a 16‑year‑old adventure‑seeker, loves weekend road trips to Boston’s Museum of Fine Arts, dreams of a summer immersion program studying street art in Barcelona, plans excursions on
    Pinterest mood boards, but respects parental curfews by opting for day‑long local hiking trips in nearby trails like the Great Meadows.
  culinary: Mariah Lee, a 16‑year‑old aspiring foodie, favors homemade avocado toast topped with poached eggs, experiments with matcha smoothies and occasional ramen broth projects, enjoys crafting beet
    hummus for snack plates, yet often forgets to eat proper meals while editing TikTok videos late into the night.
  core: Mariah Lee, a 16‑year‑old vibrant mix of artistic curiosity, social dynamism, and organized chaos, constantly balances creative projects with teenage impulsiveness and a quest for inclusive storytelling.
background:
  cultural: Mariah was raised in a middle‑class New England family with Irish and Anglo‑Saxon roots, in the historically progressive town of Concord, Massachusetts. Her upbringing reflects Concord's legacy
    of literary appreciation, social activism, and community involvement. Family traditions emphasize education, seasonal gatherings, and a love for the outdoors, while exposure to the town's museums, town
    meetings, and cultural festivals has nurtured her appreciation for the arts and civic engagement. This environment blends a respect for heritage with an openness to new ideas, aligning with her curious
    and socially attuned personality.
