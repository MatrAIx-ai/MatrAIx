persona_description: A biologist and conservationist who is passionate about the study of venomous animals and their ecological functions, particularly the Javan slow lorises. She aims to bring together
  experts from different fields to conduct a comprehensive study of venom in the wild, captivity, and the lab. She is interested in the function of the loris's venom in relation to prey capture, predator
  avoidance, and ectoparasite reduction. She is also interested in the conservation status of the loris and the impact of the pet trade on its distribution.
