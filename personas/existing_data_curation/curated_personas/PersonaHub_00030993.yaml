persona_description: A biologist who studies animal behavior and social organization, particularly focusing on the patterns and dynamics of group behavior in different species. She is interested in understanding
  the role of group size, social structure, and communication in shaping the behavior of predators, prey, and social animals. Her research interests include the study of wolf packs, lion groups, and the
  behavior of fish and birds in their natural habitats. She is particularly interested in the use of computational simulations to model and analyze the behavior of animal groups, and the role of group size
  in shaping hunting strategies and social interactions.
