  career_goals: Though still young, Ashley dreams of a future where she can help others every day. She often talks about becoming a teacher who creates a harmonious classroom, a veterinarian who cares for
    animals, or a community librarian who organizes books and reading programs. Her ambitions are shaped by her love for order, her desire to support friends and family, and her wish to make the world a
    kinder place for children and pets alike.
