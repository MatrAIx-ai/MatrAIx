persona_description: A scientist and conservationist who is passionate about the plight of endangered vultures in India and is dedicated to finding a solution to their dwindling populations. They are aware
  of the dangers posed by diclofenac, a common anti-inflammatory drug that has been responsible for the decline of Asian vultures. They are aware of the urgent need for captive breeding programs and the
  importance of advocating for the use of meloxicam as an alternative to diclofenac. They are aware of the impact of livestock carcasses on vulture populations and are committed to taking action to reduce
  contamination and protect vulture populations.
