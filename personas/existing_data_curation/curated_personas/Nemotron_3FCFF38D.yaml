  career_goals: Beatrice dreams of becoming a scientist‑engineer who designs practical solutions for everyday problems, such as eco‑friendly inventions that help her community. She is also fascinated by
    animals and imagines a future as a veterinarian, combining her love of science with caring for pets. Her competitive streak drives her to aim for academic honors and to be a leader on her soccer team,
    while her organized nature pushes her to set clear milestones for her studies and extracurricular projects.
