personas:
  professional: Beatrice Jennings, a budding seventh‑grader with a knack for building intricate LEGO contraptions, often says they will sketch detailed blueprints before assembling mini‑machines and leads
    the classroom science club with methodical precision, balancing curiosity with practicality.
  sports: Beatrice Jennings, a spirited member of the Clovis Soccer Club U‑8 team, dribbles the ball with competitive fervor, idolizes the LA Galaxy’s midfielders, they train after school on the school
    field and supplement workouts with weekend hikes in the Sierra foothills to boost stamina.
  arts: Beatrice Jennings, an imaginative sketch artist, fills their notebook with watercolor cartoon heroes while swaying to the rhythms of Beyoncé and Miles Davis, they eagerly attend the local library’s
    storytime sessions and later recreate favorite tales in vivid illustrations.
  travel: Beatrice Jennings, an eager explorer, dreams of mapping out the Grand Canyon after a thrilling weekend trek through the Sierra foothills, they treasure family vacations to Disneyland’s Fantasyland
    and meticulously plan future trips with colorful stickers on a travel journal, though parental budgeting keeps most adventures within California.
  culinary: Beatrice Jennings, a junior sous‑chef, happily helps stir simmering collard greens and mash sweet potatoes for Sunday dinner, they perfect a sprinkle of cinnamon on homemade banana bread and
    proudly serve pepperoni pizza with extra cheese after mastering the art of spreading sauce with a paintbrush‑like spatula.
  core: Beatrice Jennings, a methodical yet adventurous seven‑year‑old, often says they blend a love of LEGO engineering, competitive soccer, soulful rhythms, and disciplined savings into a curious, resilient
    outlook that fuels both creative play and thoughtful decision‑making.
background:
  cultural: Beatrice is raised in an African American family that values community, resilience, and cultural pride. Her parents share stories of their heritage, celebrate Juneteenth, and participate in
    local church events that blend gospel music with contemporary worship. She grows up in Clovis, California, a city with a mix of cultures, and she benefits from school programs that highlight Black history
    and contributions to science and the arts. Family traditions include cooking soul‑food recipes on weekends, listening to a blend of classic R&B, hip‑hop, and jazz, and attending community fairs that
    showcase multicultural performances. These influences nurture her curiosity, sense of identity, and appreciation for both her cultural roots and the diverse environment around her.
