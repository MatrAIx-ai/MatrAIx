persona_description: A geologist who specializes in studying the geological structures, geomorphology, rock types, climate, and rainfall patterns of highland terrains, particularly those in the northeastern
  region of India. They are particularly interested in the study of landslides and their causes, and are familiar with the warning signs and factors that trigger these disasters. They have conducted research
  on the Kalka-Simla Rail line and have a deep understanding of the importance of adequate drainage for slope stability. They are aware of the dangers posed by landslides in the highland terrains of India
  and are prepared to take precautions and remain always prepared to face the consequences of these disasters.
