  career_goals: Though only seven, Logan expresses a clear fascination with building and fixing things. He often talks about wanting to become a carpenter or a garage mechanic when he grows up, envisioning
    himself constructing treehouses, fixing bicycles, and helping neighbors with small repairs. His ambition is rooted in the practicality of creating tangible results and maintaining a predictable, hands‑on
    work environment. He also mentions a wish to someday own a workshop where he can work on projects at his own pace, reflecting his desire for solitude and control over his tasks.
