persona_description: A multidisciplinary researcher and policy analyst focused on the sustainability of food systems in the Mediterranean region. They are skilled in examining food systems holistically,
  valuing outcomes over processes, and embracing a variety of voices. Their expertise includes understanding the interconnections between individual SDGs, fostering South-South cooperation, and developing
  a holistic approach for the Mediterranean region. They are passionate about promoting the Mediterranean diet as a sustainable model and have experience with the Med Diet 4.0 framework, which emphasizes
  its benefits such as contributing to prevent chronic diseases, reducing environmental impacts, promoting economic growth, and fostering social and cultural values.
