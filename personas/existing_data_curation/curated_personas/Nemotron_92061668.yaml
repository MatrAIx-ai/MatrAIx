personas:
  professional: Tracie Newton is a seasoned medical records specialist with over twenty‑five years of expertise in regulatory compliance, medical coding, and EHR data analytics, whose calm resilience and
    naturally curious mindset drive innovative workflow redesigns, cross‑departmental informatics projects, and mentorship of emerging health information professionals.
  sports: Tracie Newton enjoys hiking the rolling hills of Kansas state parks with the Johnson County Outdoor Club, cheers on the Kansas City Chiefs and the Kansas City Royals, participates in a weekly
    senior cycling group, and incorporates gentle yoga sessions to maintain flexibility, balancing active cardio with low‑impact exercise.
  arts: Tracie Newton immerses herself in the arts as a docent at the Johnson County Museum of Art, paints abstract watercolor landscapes inspired by Monet and O'Keeffe, captures prairie light with a Nikon
    D5600, attends chamber music concerts featuring Bach and contemporary ensembles, and occasionally relaxes at the piano playing Debussy's Arabesque.
  travel: Tracie Newton prefers thoughtfully planned road trips that blend cultural immersion and natural beauty, such as weekend drives to Santa Fe’s vibrant art districts, the stark vistas of the Badlands,
    and overseas visits to Florence’s Renaissance galleries, balancing a modest travel budget with a desire for peaceful retreats and meaningful experiences.
  culinary: Tracie Newton cultivates heirloom tomatoes, carrots, and kale in her garden and transforms them into Mediterranean‑inspired dishes like roasted beet and goat cheese salad, grilled zucchini with
    fresh basil pesto, and occasional Kansas City barbecue ribs, showcasing intermediate cooking skills and a love for seasonal, farm‑to‑table flavors.
  core: Tracie Newton blends analytical precision with artistic curiosity, navigating health informatics by day and watercolor skies by night, all while staying calm, organized, and gently indulgent.
background:
  cultural: Tracie grew up in the American Midwest, raised in a close‑knit, middle‑class family in suburban Kansas. Her cultural upbringing reflects the region’s emphasis on community, modesty, and practical
    stewardship, while also encouraging a lifelong curiosity about broader ideas and experiences. She was immersed in Midwestern traditions such as county fairs, Thanksgiving gatherings, and regular volunteer
    service, alongside a family focus on education and civic responsibility. Although her ethnic background is white American, she identifies with the inclusive, cooperative spirit of her Olathe community,
    participating in church‑related service projects and local multicultural events. This blend of Midwestern rootedness and openness to diverse perspectives shapes her balanced, harmonious approach to
    both professional responsibilities and personal life.
