  career_goals: Tracie aims to transition into a senior health informatics leadership role within the next five years, where she can shape data governance, interoperability, and patient‑centered analytics
    strategies. She plans to earn the Certified Health Data Analyst (CHDA) credential and eventually the Certified Professional in Healthcare Quality (CPHQ) certification. Her ambition includes leading
    cross‑departmental projects that streamline medical record workflows, reduce administrative burden, and enhance clinical decision support tools. Additionally, she hopes to mentor emerging health information
    professionals and spearhead community health data initiatives that improve public health outcomes across Johnson County.
