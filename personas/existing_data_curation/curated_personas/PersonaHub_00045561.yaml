persona_description: A researcher or scientist who is interested in the use of supercritical fluids for extraction, cleaning, and impregnation of natural substances. They are particularly interested in
  the extraction of spices and herbs and the use of supercritical CO2 for generating or modifying fine particles with defined particle size distributions in micro- and even nano-scale of certain shape and/or
  determined morphology. They are also interested in the treatment of shaped solid materials with supercritical CO2, which has moved in the area of interest during the last few years.
