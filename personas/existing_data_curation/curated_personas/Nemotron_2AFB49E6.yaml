  hobbies: '["Acrylic Painting","Philosophical and Economic Reading","Journaling","Classical Guitar","Mexican Cooking","Hiking","Chess Puzzles","Cryptograms","Mindfulness Meditation","Yoga"]'
  career_goals: Jose aims to attain a senior lecturer position and eventually achieve a distinguished professorship within the next five years. He plans to develop an interdisciplinary program that bridges
    business education with the arts and cultural studies, creating courses that explore creative entrepreneurship and Latinx market dynamics. He aspires to publish scholarly articles on stress resilience
    among educators and on the impact of cultural identity in business decision‑making, and to author a book that blends business theory with artistic innovation. Additionally, he seeks mentorship opportunities
    to guide students from underrepresented backgrounds into business leadership roles.
