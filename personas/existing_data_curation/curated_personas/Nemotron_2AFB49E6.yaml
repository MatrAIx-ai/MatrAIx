personas:
  professional: Jose Ramos is a senior business lecturer who blends strategic management expertise with artistic insight, leveraging their curious, solitary nature to design interdisciplinary curricula
    while struggling with deadline management due to their spontaneous streak.
  sports: Jose Ramos hikes the foothills of the Sierra Nevada with the Trailblazers Outdoor Club, favoring meditative solo treks over team sports, and occasionally watches the Los Angeles Lakers for background
    soundtrack while analyzing market trends.
  arts: Jose Ramos creates abstract acrylic canvases inspired by Mark Rothko’s color fields, practices classical guitar pieces by Fernando Sor to sharpen focus, and attends contemporary art exhibitions
    featuring Carlos Amorales, using these experiences to inject creative flair into their business lectures.
  travel: Jose Ramos prefers low‑key, self‑planned journeys, having trekked the Patagonian Andes and sampled street food in Oaxaca, while dreaming of a quiet retreat in a Japanese ryokan to study Zen garden
    design.
  culinary: Jose Ramos cooks with laboratory precision, mastering mole poblano, pozole verde, and tlayudas by balancing ancho chilies, cacao nibs, and fresh corn tortillas, yet they occasionally over‑salt
    a sauce when distracted by a new business article.
  core: Jose Ramos is a solitary, analytically sharp senior lecturer who blends business strategy with abstract art, navigating life with restless curiosity, a penchant for meditation, and a chronic struggle
    to meet deadlines.
background:
  cultural: Jose was raised in a Mexican‑American household, where Spanish and English coexisted, and traditional celebrations such as Día de los Muertos and Mexican Independence Day were integral to family
    life. His upbringing in the Midwest blended Mexican cultural values—family solidarity, respect for elders, and a strong work ethic—with the practical, community‑oriented ethos of Ohio. He maintains
    close ties to the local Mexican community, participating in cultural festivals and supporting bilingual education initiatives. His bicultural identity informs his teaching, enabling him to bring Latinx
    business case studies and multicultural perspectives into the classroom, and to mentor students navigating dual cultural identities.
