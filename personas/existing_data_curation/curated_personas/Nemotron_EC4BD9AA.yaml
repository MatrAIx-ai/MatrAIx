  hobbies: '["Gardening", "Knitting and crochet", "Church potluck organization", "Line dancing", "Bingo nights", "Volunteer at the local food pantry", "High school football games attendance"]'
  career_goals: Bree's primary professional ambition is to move into a supervisory or lead-hand role on the production floor, where she can apply her organizational strengths and commitment to safety. She
    aims to earn a certified safety-coordinator credential and spearhead a workplace-efficiency project that could earn her the plant's "Employee of the Year" award. Beyond the factory, she hopes to secure
    a stable retirement schedule that allows her to spend more time with her grandchildren and expand her involvement in community service projects.
