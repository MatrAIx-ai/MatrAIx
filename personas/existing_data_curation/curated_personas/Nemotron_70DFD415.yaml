  hobbies: '[''Urban Photography'', ''Visiting Art Galleries and Street Art Tours'', ''Hiking and Outdoor Activities'', ''Playing Guitar'', ''Cooking Diverse Cuisines'', ''Reading Architecture and Design
    Books'', ''Community Volunteering (Neighborhood Clean‑ups, Community Gardens)'', ''Cycling'', ''Listening to Vinyl Records'', ''Attending Indie Film Screenings'']'
  career_goals: Brett aims to step into a senior regional property‑management role where he can oversee a portfolio of communities and champion innovative, art‑focused property enhancements. He plans to
    earn the Certified Property Manager (CPM) designation and complete a GED to formalize his education. Long‑term, he envisions launching his own boutique development firm that blends sustainable design
    with curated public art, creating vibrant, community‑centric living spaces. He also aspires to serve on local HOA boards, mentor emerging property managers, and lead city‑wide initiatives that integrate
    creative placemaking into residential projects.
