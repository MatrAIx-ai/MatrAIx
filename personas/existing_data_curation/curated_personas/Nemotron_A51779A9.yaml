  career_goals: Dana aims to transition into a part-time role as a community arts coordinator at the Willoughby Community Center, where she can develop workshops that blend art appreciation with stress‑reduction
    techniques. She plans to pursue adult‑education courses in digital photography and creative writing to enhance her creative skill set. Over the next few years, she hopes to launch a modest home‑based
    online boutique selling handcrafted pottery and garden‑inspired home décor. Additionally, she aspires to become a certified community health worker to advocate for mental‑wellness resources and peer‑support
    groups for adults in Geauga County.
