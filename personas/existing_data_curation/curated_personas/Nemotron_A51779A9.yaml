personas:
  professional: Dana Wagner, a seasoned community volunteer with a knack for organizing art events, blends her art‑history expertise, logistical mastery, and compassionate facilitation to craft inclusive
    workshops that weave stress‑reduction techniques into creative expression at the Willoughby Community Center.
  sports: Dana Wagner, an avid dog‑walker along the Lake Erie shoreline, enjoys leisurely rounds of bowling at the local league, roots for the Cleveland Browns in the fall and the Guardians in the summer,
    and fits in weekend hikes on the Cuyahoga Valley trails to keep active without intense training.
  arts: Dana Wagner, a devoted patron of nearby galleries showcasing Monet’s impressionism, Frida Kahlo’s bold self‑portraits, and Yayoi Kusama’s immersive installations, regularly attends community theater
    productions starring local talent, and finds solace in the cello melodies of Yo‑Yo Ma and the folk harmonies of The Avett Brothers, which together color her own quilting designs.
  travel: Dana Wagner, who prefers short, purpose‑driven road trips, delights in weekend drives to Lake Erie’s sandy beaches and the quaint cultural festivals of nearby towns like Oberlin and Chardon, has
    already toured the misty grandeur of Niagara Falls, and is now saving to wander the artsy enclaves of Asheville’s River Arts District and Santa Fe’s Pueblo‑style galleries.
  culinary: Dana Wagner, a confident home cook who harvests basil, heirloom tomatoes, and rosemary from her backyard, often whips up Mediterranean shakshuka, Thai green curry with lemongrass, and a silky
    miso ramen topped with pickled daikon, while occasionally indulging in a flaky galette featuring seasonal figs and goat cheese.
  core: Dana Wagner, a meticulous community‑arts enthusiast who worries about every detail, channels that anxiety into perfectly organized art workshops, yet can’t resist a midnight slice of pizza after
    a long day of budgeting.
background:
  cultural: Dana was raised in a middle‑class, Midwestern family in northeastern Ohio, deeply rooted in the region’s traditions of community participation, modesty, and seasonal outdoor activities. Her
    heritage includes a common German‑American lineage in Geauga County, reflected in an appreciation for local festivals, hearty home‑cooked meals, and a strong sense of self‑reliance. The cultural values
    of the Midwest—politeness, reliability, and neighborhood involvement—have shaped her outlook and daily practices.
