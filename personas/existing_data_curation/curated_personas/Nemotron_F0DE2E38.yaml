  hobbies: '[''Cooking (Indo‑American fusion)'', ''Yoga and mindfulness meditation'', ''Gardening'', ''Hiking'', ''Knitting'', ''Reading historical fiction'', ''Volunteering at cultural festivals'', ''Mentoring
    women in STEM'', ''Collecting vintage vinyl records'']'
  career_goals: Shadia aims to launch a community health initiative in Erie that targets diabetes and heart‑disease prevention among South Asian immigrants, integrating culturally tailored education and
    screening programs. She aspires to become a clinical faculty member at a regional medical school, where she can shape curricula that emphasize cultural competence and pragmatic problem‑solving. Publishing
    practice guidelines that blend traditional Ayurvedic insight with modern evidence is also a long‑term ambition. To mitigate her chronic stress, she prioritizes achieving a sustainable work‑life balance,
    delegating administrative tasks, and incorporating regular self‑care practices into her routine.
