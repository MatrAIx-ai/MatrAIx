  career_goals: Although retired, Amanda aims to remain actively engaged in her community. She aspires to join the advisory board of the local senior center, lead heritage preservation projects for the
    town’s historical society, and mentor younger volunteers in event organization. She also hopes to compile a family memoir that chronicles her ancestry and local history, and to maintain optimal health
    so she can support her husband and granddaughter.
