personas:
  professional: Jimmie Brennan, a sixteen‑year‑old future tradesperson, blends a practical knack for carpentry, electronics, and PC building with a natural leadership role on his basketball and soccer teams,
    channeling his community‑service spirit into a vision of launching a reliable handyman and lawn‑care business that mentors local youth.
  sports: Jimmie Brennan thrives on the basketball courts and soccer fields of Omaha, regularly playing in the Omaha Youth Soccer League, shooting hoops at the neighborhood park with the local pickup crew,
    and cheering on the Nebraska Cornhuskers, while organizing informal practices and emphasizing teamwork and resilience in every game.
  arts: Jimmie Brennan channels their love of rock and country by strumming a battered guitar in a garage band that riffs on classics from Bruce Springsteen and Luke Bryan, sketches comic‑style doodles
    during study breaks, and streams The Strokes while curating a personal playlist that fuels both gaming marathons and community jam sessions.
  travel: Jimmie Brennan favors low‑cost road trips that blend outdoor adventure with family ties, having camped at Lewis & Clark State Park, explored the Badlands on a school field trip, and dreaming of
    a weekend drive to Chicago’s music scene while balancing a limited teen budget and school commitments.
  culinary: Jimmie Brennan enjoys cooking simple comfort dishes like homemade pepperoni pizza, chicken‑fried steak, and loaded nachos topped with sharp cheddar and ranch dip, often tossing fresh sweet corn
    into a summer salad while occasionally treating friends to backyard‑grilled burgers after a weekend of yard work.
  core: Jimmie Brennan is a pragmatic yet curious teen who balances leadership on the sports field, hands‑on tech tinkering, community‑service drive, and a habit of late‑night gaming, all while wrestling
    with frequent anxiety‑induced overthinking.
background:
  cultural: Jimmie grew up in the Midwestern heartland of Omaha, Nebraska, within a white, working‑class family of mixed German and Irish ancestry. The local culture emphasizes hard work, modesty, community
    involvement, and a strong sports tradition, especially support for the Nebraska Cornhuskers. He participates in church‑based youth activities and community events that reinforce values of cooperation
    and service. Omaha’s blend of urban amenities and outdoor spaces influences his love for both team sports and activities like fishing or cycling. While rooted in traditional Midwestern values, Jimmie
    is also open to contemporary influences, balancing a respect for established methods with a curiosity for new technology and ideas.
attributes:
  skills: '[''basic carpentry'', ''troubleshooting electronics'', ''yard care and landscaping'', ''team sports coordination'', ''peer mentorship'', ''event planning for school clubs'', ''effective communication'',
