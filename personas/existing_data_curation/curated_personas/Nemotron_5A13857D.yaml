  hobbies: '[''basketball'', ''soccer'', ''multiplayer video gaming'', ''building custom PC rigs'', ''guitar playing'', ''volunteering at local food bank'', ''sketching'', ''listening to rock and country
    music'']'
  career_goals: Jimmie aims to complete his high‑school education or obtain a GED within the next two years, then enroll in a vocational training program in either electrical work or automotive technology.
    He hopes to combine his hands‑on abilities with his interest in community service by eventually launching a small handyman and lawn‑care business that provides reliable services to neighbors in Omaha.
    Long‑term, he envisions becoming a trusted local tradesperson who can mentor other youth, offering both practical skills and a supportive role model. His ambition is grounded in a desire for stability,
    personal growth, and giving back to his community.
