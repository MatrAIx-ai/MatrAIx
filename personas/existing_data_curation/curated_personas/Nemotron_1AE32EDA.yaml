personas:
  professional: Aida Carrera, an aspiring young illustrator, channels her fascination with folklore and magical adventures into vibrant drawings and mixed-media sketches, using her boundless curiosity and
    flexible mindset to experiment freely, though her occasional disorganization leaves some projects unfinished.
  sports: Aida Carrera enjoys informal soccer kickabouts with neighborhood friends, cheers for the local baseball team, the River Rapids, and participates in the Midtown Kickers youth soccer club, preferring
    playful, unstructured movement over rigid training routines.
  arts: Aida Carrera explores creative expression through drawing and coloring, drawing inspiration from the whimsical illustrations of Dr. Seuss and the bold brushstrokes of Henri Matisse, while listening
    to upbeat pop tunes and occasional mariachi melodies as she paints.
  travel: Aida Carrera loves weekend trips to the nearby state park and the children's museum, has visited Disneyland on a family vacation, and dreams of exploring the historic pyramids of Giza and the
    sparkling lights of Paris during future holidays.
  culinary: Aida Carrera enjoys helping prepare simple dishes like cheese quesadillas and fresh guacamole with avocado, tomato, and lime, relishes the taste of colorful fruit tacos topped with pineapple
    and mango, and delights in assembling vibrant fruit salads with berries, kiwi, and orange segments.
  core: Aida Carrera is a curious, art‑obsessed eight‑year‑old who blends folklore imagination with a laid‑back, slightly chaotic routine, constantly juggling crayons, puzzles, and spontaneous bursts of
    creativity.
background:
  cultural: Aida’s cultural background is rooted in her Mexican heritage and the vibrant Mexican‑American community of Houston. Spanish is spoken at home, and her family maintains traditions such as building
    Día de los Muertos altars, celebrating Cinco de Mayo with music, dancing, and traditional foods like tamales and pozole. Her parents share Mexican folklore, music, and art, which influence her own creative
    expression. Living in Houston, Aida attends local cultural festivals, visits the Houston Museum of Mexican & Latin American Art with her family, and enjoys the blend of Mexican customs and Texan multicultural
    life that shapes her identity, language skills, and appreciation for diverse artistic traditions.
