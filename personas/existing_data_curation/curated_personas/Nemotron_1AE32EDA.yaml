  career_goals: Aida dreams of a future that blends her love of art and storytelling. She imagines herself as an illustrator of children’s books or a muralist who brings colorful Mexican folklore to community
    walls. She also hopes to share her knowledge by teaching art to younger kids in small, supportive groups. While she is fascinated by science and the natural world, she prefers creative paths that allow
    flexibility, so she keeps an open mind about exploring other fields such as environmental education or cultural storytelling.
