personas:
  professional: Myara Alvarado, a 42‑year‑old freelance illustrator, blends digital Photoshop mastery with hand‑crafted collage to produce narrative pieces rich in papel picado patterns and symbolic iconography,
    and their meticulous project planning ensures each client deadline is met despite a deep preference for solitary studio time.
  sports: Myara Alvarado enjoys low‑impact fitness, frequently hiking the Sandia Mountains, participating in a weekend adult soccer league that plays friendly matches against New Mexico United fans, and
    cheering on the Albuquerque Isotopes when time permits, yet they often skip workouts after marathon creative sessions.
  arts: Myara Alvarado curates a personal trove of vintage postcards, draws creative fuel from Frida Kahlo’s self‑portraits and the surreal worlds of Remedios Varo, regularly attends local gallery openings
    featuring contemporary folk‑art collectives, and volunteers to design sets for community festivals, while they compulsively sketch marginalia in every notebook they own.
  travel: Myara Alvarado prefers meticulously planned solo journeys that balance cultural immersion with quiet reflection, having explored the mural‑laden streets of Guanajuato during Día de los Muertos,
    trekked the vineyards of Mendoza, and taken weekend trips to the adobe town of Taos, yet they often delay booking flights when work deadlines loom.
  culinary: Myara Alvarado delights in cooking aromatic pozole with hominy and dried chilies, perfecting mole sauces using roasted peanuts and chocolate, and seasoning grilled fish tacos with fresh cilantro
    and epazote from their rooftop garden, while they occasionally indulge in take‑out sushi as a guilty pleasure and admit to over‑roasting their garlic on restless nights.
  core: Myara Alvarado is a disciplined solitary dream‑weaver who fuses folk motifs with surreal narratives, rigorously schedules freelance commissions, tends a fragrant rooftop herb garden, and habitually
    hoards coffee‑stained sketch pads as both inspiration and evidence of their creative excess.
background:
  cultural: Myara is a first‑generation Mexican‑American whose family roots trace back to the state of Jalisco. Growing up in a bilingual household in Albuquerque, she was immersed in Mexican traditions
    such as Día de los Muertos, folk music, and the vibrant visual language of papel picado and Talavera tiles. These cultural motifs continue to influence her artistic style, infusing her work with bold
    colors, symbolic iconography, and narrative storytelling that honor her heritage while exploring contemporary themes. She proudly maintains fluency in Spanish, celebrates Mexican holidays with her extended
    family, and actively supports local initiatives that preserve and share Mexican cultural arts within the broader New Mexico community.
attributes:
  skills: '["Digital illustration", "Traditional mixed-media art", "Creative writing", "Research and concept synthesis", "Project planning", "Time management", "Event coordination", "Bilingual Spanish-English",
    "Basic office software", "Social media content creation"]'
  hobbies: '["Sketching and painting", "Collage and mixed-media art", "Reading speculative fiction and philosophy", "Journaling ideas", "Gardening (herb garden)", "Nature walks", "Online art challenges",
    "Collecting vintage postcards", "Volunteering at cultural festivals (set design)"]'
  career_goals: Myara aims to turn her artistic passion into a sustainable freelance career. Over the next few years she plans to complete a part‑time certificate in graphic design, build an online portfolio
    of illustrations and narrative art, and launch a boutique shop on platforms like Etsy to sell hand‑crafted prints and custom commissions. She also dreams of establishing a community art space in Albuquerque
    where she can host low‑cost workshops for youth and seniors, especially focusing on Mexican folk art techniques. Long‑term, she hopes to author an illustrated book that blends personal memoir with mythic
    storytelling drawn from her cultural heritage.
