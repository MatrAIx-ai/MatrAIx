personas:
  professional: Christine Stavely is a meticulous volunteer leader who leverages their event‑planning acumen and budgeting prowess to orchestrate senior‑center programs, using their methodical nature and
    balanced curiosity to blend tried‑and‑true community traditions with fresh digital outreach tools.
  sports: Christine Stavely enjoys low‑impact fitness, joining a Saturday walking club at the nearby Ridge Trail, cheering on the Pittsburgh Steelers during football season and the Pittsburgh Pirates during
    baseball season, while keeping a modest collection of yoga DVDs for home practice.
  arts: Christine Stavely weaves their love for the arts into daily life, knitting while listening to folk legend Joan Baez, attending the community theater’s production of ‘Our Town’ starring local actor
    Michael J. Moran, and revisiting the canvases of impressionist painter Claude Monet through occasional gallery trips.
  travel: Christine Stavely prefers thoughtfully planned road trips, often revisiting the historic sites of Gettysburg and the covered bridges of Lancaster County, while dreaming of a future pilgrimage
    to the Scottish Highlands to trace the lineage of their ancestors, balancing their itinerary with budget‑friendly stays at family‑run B&Bs.
  culinary: Christine Stavely delights in farm‑to‑table cooking, turning garden‑grown heirloom tomatoes, fresh basil, and home‑grown zucchini into rustic ratatouille and a signature summer vegetable lasagna,
    while occasionally indulging in a decadent slice of chocolate pistachio cake from their favorite local bakery.
  core: Christine Stavely blends methodical organization with heartfelt community service, channeling their love of gardening, crafting, and genealogy into a purpose‑driven life, even if they sometimes
    forget to water their indoor ferns.
background:
  cultural: Christine was raised in Scottdale, a small town in Westmoreland County, Pennsylvania, where community interdependence and modest, hard‑working values are deeply ingrained. The region’s blend
    of Appalachian heritage and industrial history fostered a strong sense of self‑reliance and a respect for local traditions. Her upbringing emphasized participation in church activities, neighborhood
    events, and family gatherings, shaping a cultural identity that values service, hospitality, and a pragmatic outlook on life. This background, combined with her white, mid‑western American heritage,
    informs her appreciation for both longstanding customs and the curiosity to explore new ideas within her community.
