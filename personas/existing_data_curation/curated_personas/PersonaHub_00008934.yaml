persona_description: A researcher at the University of British Columbia who specializes in the field of social epigenetics, aiming to understand the biological mechanisms by which early-life social factors
  influence child health and development. Her goal is to develop policies and interventions based on this knowledge to improve conditions for children and their families. She is interested in the impact
  of diverse early-life social factors, including socioeconomic status, family income, parental education, psychosocial adversity, amount of caregiver contact, and child abuse, on DNA methylation and gene
  expression. Her research is rooted in the idea that these factors can have long-lasting effects on a child's health and wellbeing, and she is seeking to uncover the biological mechanisms by which they
  do so.
