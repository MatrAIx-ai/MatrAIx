personas:
  professional: A junior LEGO architect and collaborative problem‑solver, Norman Rayle applies their love of building realistic structures and team drills from soccer to design imaginative projects, consistently
    planning every step while staying adaptable enough to incorporate friends’ ideas.
  sports: An enthusiastic youth soccer player with the Eagle United club, Norman Rayle trains twice a week, cheers for the LA Galaxy and supports the Los Angeles Dodgers in baseball season, and balances
    team drills with weekend bike rides on local trails to stay fit.
  arts: A voracious reader of the Percy Jackson and Harry Potter series, Norman Rayle also immerses themselves in the creative worlds of Minecraft and the Lego Movie, and enjoys listening to Imagine Dragons
    while sketching new LEGO builds.
  travel: A curious family vacationer, Norman Rayle has explored Disneyland, the Santa Monica beach, and the San Diego Zoo, and dreams of a road trip to the Grand Canyon and a future visit to New York City’s
    iconic museums, preferring organized itineraries with room for spontaneous camping detours.
  culinary: A budding kitchen helper, Norman Rayle loves assembling tacos with seasoned beef, fresh cilantro, and lime, crafting grilled cheese sandwiches with sharp cheddar, and mastering the perfect s'more
    over a campfire, though they often neglect to clean up the mess afterward.
  core: Norman Rayle is a structure‑loving, socially energetic 9‑year‑old who balances meticulous LEGO building and disciplined soccer practice with spontaneous bike rides, yet habitually stays up late
    sneaking extra Minecraft sessions.
background:
  cultural: Norman is a white American boy raised in the suburban community of La Verne, California, within Los Angeles County. His family embodies middle-class values that emphasize education, community
    involvement, and respect for the region's cultural diversity. He celebrates traditional American holidays such as Thanksgiving and the Fourth of July, while also experiencing the multicultural flavor
    of Southern California—enjoying Mexican cuisine, local festivals, and a diverse school environment. His household retains some European heritage customs from his grandparents, like holiday decorations
    and recipes, but his daily life is shaped by the local school, community sports leagues, and the broader Los Angeles cultural landscape.
