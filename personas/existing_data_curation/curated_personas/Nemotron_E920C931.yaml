  career_goals: Norman dreams of a career that combines clear structure, teamwork, and a chance to help others. He is fascinated by firefighters and hopes to join the fire service because of the predictable
    routines and community service. He also loves space and imagines becoming an astronaut or aerospace engineer, admiring the organized problem-solving involved. Occasionally he envisions himself as a
    teacher, guiding younger students through lessons—reflecting his enjoyment of leadership and responsibility.
