  career_goals: Despite his retirement, Jian remains driven to leave a lasting imprint. He aims to finish his undergraduate degree in History, focusing his senior thesis on the experiences of Chinese immigrants
    in the rural South. He plans to compile his observations and family narratives into a memoir titled "Bridges Across the Peach State," hoping to contribute to the broader understanding of multicultural
    heritage in Georgia. Jian also wishes to organize a bi‑annual cultural showcase at the Cordele community center, featuring traditional Chinese art demonstrations, calligraphy workshops, and culinary
    tastings, which would foster cross‑cultural dialogue in his small town. Mentoring younger members of the local senior center in research and digital literacy is another priority, as is maintaining his
    health through regular gardening and walking routines.
