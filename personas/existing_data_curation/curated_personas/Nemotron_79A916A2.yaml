  career_goals: Although retired from formal employment, David aims to deepen his impact on the Roseburg community. He aspires to serve on the city’s planning commission, where his organized approach and
    practical perspective can help shape sustainable development. He also wants to expand the senior center’s workshop program, teaching woodworking and basic home‑maintenance skills to younger volunteers.
    Additionally, he hopes to complete a personal project documenting the town’s logging heritage, culminating in a small exhibition at the local museum. Maintaining good health to stay active with his
    wife and continue these community contributions is a core personal ambition.
