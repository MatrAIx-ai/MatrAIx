personas:
  professional: Jason Duke, a retired carpenter and seasoned community volunteer, blends his curiosity for evidence‑based techniques with a methodical planning style to lead heritage preservation projects
    while mentoring newcomers.
  sports: Jason Duke, a devoted fan of the Atlanta Falcons, Atlanta Braves, and Georgia Bulldogs, participates in the Woodstock Senior Walking Club and enjoys gentle rounds of golf at the local municipal
    course each spring.
  arts: Jason Duke, an avid watercolorist who paints Georgia hillscapes in the style of Thomas Kinkade, spends evenings listening to Johnny Cash, Emmylou Harris, and folk legend Woody Guthrie while attending
    performances by the Piedmont Players.
  travel: Jason Duke, who prefers weekend road trips over long flights, has driven the Blue Ridge Parkway in the fall, explored historic Savannah’s squares, visited Gettysburg National Military Park, and
    hopes to tour the colonial streets of Williamsburg next spring.
  culinary: Jason Duke, who grows heirloom tomatoes, sweet corn, and basil in his garden, enjoys simmering a fresh tomato bisque with cornbread, baking peach cobbler with locally sourced peaches, and occasionally
    treating himself to a plate of fried catfish with hushpuppies.
  core: Jason Duke, a methodical, curiosity‑driven retiree, balances solitary woodworking and gardening with community leadership, all while humbly juggling occasional forgetfulness about meds and a soft
    spot for classic country tunes.
background:
  cultural: Jason’s cultural background is rooted in the Southern United States, specifically the small‑town environment of north‑central Georgia. Raised in a close‑knit community where church gatherings,
    family potlucks, and county fairs were routine, he internalized values of hospitality, respect for tradition, and community service. The region’s slower pace and emphasis on self‑reliance shaped his
    practical outlook, while the rich storytelling tradition of the South nurtured his curiosity about local history and genealogy. Although never married, he maintains strong ties to extended family and
    neighborhood networks, reflecting the interconnected social fabric typical of his cultural setting.
