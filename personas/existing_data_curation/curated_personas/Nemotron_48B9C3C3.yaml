personas:
  professional: An urban planner with a passion for data-driven, community-focused design, Luis Perez leverages advanced GIS analysis, bilingual communication, and meticulous project management to lead
    inclusive, climate-adaptive development projects while balancing innovative smart‑city ideas with realistic budget and policy constraints, and they ensure every stakeholder feels heard.
  sports: Luis Perez is a dedicated member of the local adult soccer league, a regular attendee at Sporting Kansas City matches, a supporter of the Kansas City Chiefs, and they supplement their training
    with weekend hikes on Kansas prairie trails and occasional runs with the Prairie Trails Running Club, approaching fitness with a disciplined yet sociable mindset.
  arts: An avid lover of live music and visual storytelling, Luis Perez frequents salsa nights at local venues, attends jazz performances at the Green Lady Lounge, curates a personal collection of urban
    architecture photographs inspired by Edward Burtynsky, and they often discuss city‑planning literature at a book club that fuels their creative approach to design.
  travel: With a penchant for structured itineraries and spontaneous photo‑ops, Luis Perez has taken weekend road trips to the historic French Quarter in New Orleans, explored the modern skyline of Chicago,
    hiked the Rocky Mountain National Park, and they plan future visits to UNESCO‑listed towns known for vibrant street art, balancing travel budget constraints with a desire for cultural immersion.
  culinary: Passionate about culinary heritage, Luis Perez regularly prepares pepper‑spiced pepian, slow‑cooked tamales, and corn‑based pupusas for family potlucks, experiments with local Kansas produce
    like heirloom tomatoes and sweet corn, and they occasionally over‑season dishes in enthusiasm, revealing a fearless yet disciplined cooking style.
  core: Luis Perez blends disciplined, data‑driven urban planning with a sociable, community‑centred lifestyle—balancing meticulous project oversight, regular soccer matches, vibrant cooking sessions, and
    a habit of over‑planning both work and weekend adventures.
background:
  cultural: Luis grew up in a close‑knit Guatemalan immigrant family in the Midwest, speaking Spanish at home while navigating English‑dominant schools. His parents instilled values of family solidarity,
    respect for elders, and a strong sense of communal responsibility. He celebrates traditional festivals such as Día de los Muertos and Guatemalan Independence Day, often sharing these customs with friends
    in Olathe. His bilingual fluency and deep cultural awareness inform his professional practice, enabling him to design public spaces that reflect the diverse needs of Latino residents. Luis remains actively
    involved in local Latino community organizations, advocating for equitable access to affordable housing, public transportation, and culturally relevant public services.
