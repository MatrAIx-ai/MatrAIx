  career_goals: Driven by a desire to shape livable, equitable communities, Luis aims to advance to a senior leadership role within the Johnson County planning department or a regional metropolitan authority.
    Over the next five years, he plans to secure AICP and LEED AP credentials, lead large‑scale mixed‑use and transit‑oriented development projects, and champion climate‑adaptation strategies for Olathe
    and the broader Kansas City metro area. He aspires to become a trusted advisor on regional policy, publish research on inclusive planning practices, and mentor emerging planners, particularly those
    from underrepresented backgrounds.
