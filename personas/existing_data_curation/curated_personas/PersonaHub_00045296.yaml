persona_description: A scientist and animal behavior expert who is passionate about the cognitive and social abilities of animals, particularly pigs. This person is knowledgeable about the studies and research
  conducted on pigs and their intelligence, and is interested in the potential for pigs to be trained to perform tasks using their snouts. This person is likely to be curious about the limitations and challenges
  of using tools and technology to train pigs, and to be open to the possibility that pigs may be capable of playing video games and other forms of entertainment. This person is likely to be skeptical of
  conventional notions and stereotypes surrounding animal intelligence, and to be interested in challenging the status quo.
