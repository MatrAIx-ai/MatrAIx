personas:
  professional: Azad Putta is a seasoned film and television producer who leverages a decade of hands‑on production experience, advanced cinematography and sound engineering expertise, and data‑driven audience
    analytics in Python and SQL to plan meticulous shoots, manage budgets, and guide creative teams with a collaborative yet assertive leadership style.
  sports: Azad Putta follows the San Jose Earthquakes and the San Francisco Giants avidly, plays pick‑up cricket matches with expatriate friends on weekends, and stays fit by hiking with the Tracy Outdoor
    Explorers club through the rolling hills of the San Joaquin Valley each Saturday.
  arts: Azad Putta balances a love for visual storytelling with a reverence for classic cinema, citing the work of cinematographer Roger Deakins, director Ava DuVernay, and photographer Annie Leibovitz
    as daily inspirations, while also practicing tabla to the rhythms of master percussionists and attending local theater productions of Lin‑Manuel Miranda’s works.
  travel: Azad Putta plans trips with detailed itineraries that leave room for spontaneous photo shoots, has already explored the vineyards of Napa Valley and the basalt columns of Iceland, and dreams of
    photographing the sunrise over Jaipur’s historic forts while balancing a busy production schedule.
  culinary: Azad Putta cooks at home with a keen eye for flavor, mastering regional specialties from their family's home state such as biryani, fish curry, and masala dosa, favoring ingredients like cumin,
    mustard seeds, and fresh cilantro, and they often pair their meals with a curated selection of single‑origin coffees.
  core: Azad Putta blends meticulous data‑driven production methods with a spontaneous love for natural light, often juggling a camera tripod and a cricket scorebook while secretly hoarding vintage lenses
    in the garage.
background:
  cultural: Born to South Asian parents who immigrated to the United States, Azad grew up navigating a blend of Indian cultural traditions and Californian sensibilities. He speaks English fluently and retains
    conversational ability in Hindi (and occasionally Gujarati), celebrating festivals such as Diwali and Holi with family and community gatherings in the Bay Area. This bicultural perspective influences
    his storytelling, prompting him to highlight diaspora experiences and universal themes that resonate across cultures. He actively participates in local cultural organizations, supports Indian arts events,
    and mentors young creators from similar backgrounds, ensuring his heritage remains a vibrant thread in his personal and professional life.
attributes:
  skills: '[''Film production management'', ''Budgeting and finance'', ''Cinematography'', ''Lighting design'', ''Sound engineering'', ''Post‑production editing (Adobe Premiere, After Effects, DaVinci Resolve)'',
