  hobbies: '[''Landscape photography'', ''Cricket fandom'', ''Playing tabla'', ''Cooking regional Indian cuisine'', ''Hiking in the San Joaquin Valley'', ''STEM outreach volunteering'', ''Tech gadget tinkering'',
    ''Reading industry and tech blogs'']'
  career_goals: Azad aims to transition from project‑level producing to a senior executive producer role, eventually launching his own boutique production company that focuses on culturally resonant stories
    bridging South Asian and American audiences. He is eager to integrate emerging technologies such as virtual production, AI‑enhanced editing, and interactive media into mainstream storytelling. Over
    the next five years, he plans to secure larger multi‑platform deals, mentor emerging talent from underrepresented backgrounds, and establish a reputation for delivering high‑quality, data‑informed content
    that balances artistic vision with commercial viability.
