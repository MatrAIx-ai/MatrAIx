persona_description: A historian who specializes in the study of medieval and early modern epidemics, with a particular interest in the Black Death and its causes. She has a deep understanding of medical
  science and epidemiology, and is knowledgeable about the medical literature and historical sources of the period. She is also familiar with the medical science of plague and its history, including the
  work of Jerome Goddard, Didier Raoult, Richard Titball, and Michael Prentice. She has a strong interest in the role of religious and literary traditions in shaping our understanding of the plague and
  its impact on society. She is also interested in the political and economic aspects of the plague, and how it affected different groups in society.
