personas:
  professional: Lisa Nichols, a 40‑year‑old retail supervisor with a decade of frontline experience, blends data‑driven team leadership and visual‑merchandising flair to motivate diverse staff while chasing
    a district‑manager role that will let them imprint artistic design standards across multiple stores.
  sports: Lisa Nichols, an avid hiker on the River Road Nature Trail and member of the Greenville Hiking Club, dabbles in weekend softball with the Greenville Greenwave league, follows the Carolina Panthers,
    and practices yoga three times weekly to stay flexible and centered.
  arts: Lisa Nichols immerses themselves in the local arts scene by visiting the Greenville Art Museum, attending the University of South Carolina’s annual Fine Arts exhibition, painting acrylics inspired
    by the bold color palettes of Yayoi Kusama, and leading community art workshops that showcase emerging talent.
  travel: Lisa Nichols prefers carefully planned weekend getaways to art‑rich destinations such as Asheville’s River Arts District and Barcelona’s Picasso Museum, while dreaming of an extended cultural
    tour of Paris’s Musée d’Orsay once their boutique gallery finances are secured.
  culinary: Lisa Nichols delights in cooking Southern comfort dishes with a modern twist, famously preparing miso‑glazed shrimp and grits, collard greens sautéed with smoked paprika, and peach cobbler infused
    with cardamom, using fresh vegetables from their garden and ingredients sourced at the local farmers’ market.
  core: Lisa Nichols channels their competitive retail instincts into artistic pursuits, balancing meticulous budgeting with spontaneous acrylic splashes, while secretly binge‑watching true‑crime documentaries
    during late‑night coffee runs.
background:
  cultural: Lisa grew up in a small, middle‑class town near Greenville, North Carolina, within a white Southern family that emphasized community, modesty, and Methodist values. Her upbringing was steeped
    in Southern hospitality, local festivals, and folk traditions such as quilting and pottery. While respecting these roots, her humanities education sparked a broader curiosity for global art movements
    and contemporary ideas. This blend of regional heritage and an open‑minded appreciation for diverse cultural expressions shapes her worldview, informing both her professional style and personal pursuits.
attributes:
  skills: '[''Team leadership'', ''Visual merchandising'', ''Customer service excellence'', ''Sales performance analysis'', ''Inventory control'', ''Staff training and coaching'', ''Conflict resolution'',
