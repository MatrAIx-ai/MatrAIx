  hobbies: '[''Acrylic painting'', ''Visiting art galleries'', ''Hiking'', ''Reading contemporary fiction'', ''Gardening'', ''Cooking Southern cuisine'', ''Yoga'', ''Volunteering at community art programs'',
    ''Collecting vintage postcards'', ''DIY home décor projects'']'
  career_goals: Lisa aims to advance from store‑level supervision to a regional district manager role, where she can oversee multiple locations and implement unified visual‑merchandising standards that
    reflect her artistic sensibility. She is also interested in developing a corporate training program that blends retail performance metrics with creative store design, ultimately positioning herself
    as a thought leader in experiential retail. Long‑term, Lisa envisions opening a boutique gallery that showcases local artisans and curated art pieces, merging her passion for retail leadership with
    her love of the visual arts.
