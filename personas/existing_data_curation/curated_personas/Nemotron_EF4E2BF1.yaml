personas:
  professional: Pedro Garcia, a bright five‑year‑old who thrives in his preschool’s hands‑on learning environment, blends practical curiosity with a love for organized routines, and they eagerly tackle
    building‑block challenges while reliably following classroom responsibilities.
  sports: Pedro Garcia, an enthusiastic five‑year‑old who plays for the local Kiddie Kickers soccer club, idolizes the dynamic play of Manchester United’s youngsters, and they sprint across the field with
    boundless energy while also enjoying occasional swim lessons at the community pool.
  arts: Pedro Garcia, a vivid five‑year‑old who loves drawing colorful dinosaurs with crayons and passionately sings along to Let It Go from Frozen and the catchy Shake It Off by Taylor Swift, and they
    proudly perform these tunes during preschool’s little performers showcase.
  travel: Pedro Garcia, an adventurous five‑year‑old who has already explored the sandy beaches of Florida with family and dreams of visiting Disneyland in California, and they eagerly map out imaginary
    road trips with crayons, balancing a love for new sights with the comfort of familiar bedtime routines.
  culinary: Pedro Garcia, a food‑enthusiastic five‑year‑old who delights in cheesy pizza slices, crunchy chicken nuggets dipped in ketchup, and occasional strawberry‑banana smoothies, and they often attempt
    to help by sprinkling extra cheese onto dishes, sometimes creating a delightful mess.
  core: Pedro Garcia, an energetic five‑year‑old who balances curious exploration with practical routines, thrives on group play, savors sweets while diligently saving coins, and can be stubborn about bedtime
    yet loves sharing stories with friends.
background:
  cultural: Pedro comes from a Guatemalan family living in Los Angeles. At home, he hears a mix of Spanish and English, celebrates traditional holidays like Día de los Santos and enjoys foods such as tamales
    and pupusas prepared by his parents. He participates in community events at the local church and cultural center, where he learns folk dances and stories from his heritage. This bicultural environment
    shapes his identity, giving him a strong sense of family, community, and pride in his roots while also embracing the broader American culture around him.
