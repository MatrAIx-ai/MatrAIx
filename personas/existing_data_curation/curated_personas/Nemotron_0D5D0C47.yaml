  career_goals: Anita aims to move from a cashier role to a supervisory or assistant manager position within the next two years, leveraging her business degree to lead a team while preserving flexibility
    in her schedule. In the longer term, she envisions opening a community‑focused boutique café that showcases local Black artists, merges commerce with creative expression, and provides a relaxed gathering
    space. To support this vision, she plans to pursue a certification in retail management or an MBA, and she seeks opportunities that blend her interests in art, entrepreneurship, and community development.
