  career_goals: Robert aims to advance to a supervisory role within a regional housekeeping or facilities‑management team, earning certification in green cleaning and occupational safety. He plans to complete
    a bachelor’s degree in hospitality management to broaden his leadership opportunities. Ultimately, he envisions launching his own small‑scale, eco‑conscious cleaning business that can provide reliable
    employment for his community while allowing a flexible schedule to support his family.
