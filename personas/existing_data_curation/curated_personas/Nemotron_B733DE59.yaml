personas:
  professional: Robert Croteau, a seasoned housekeeping professional with over a decade of experience, leverages their expertise in eco‑friendly cleaning chemistry, systematic workflows, and an associate
    degree in business administration to train teams efficiently while balancing meticulous detail with a friendly, collaborative approach.
  sports: Robert Croteau, a shortstop for the Amherst Community Softball League, avidly follows the Cleveland Browns and Cleveland Guardians, spends Saturday mornings hiking the trails of Oak Grove State
    Park, and joins a local adult soccer pick‑up league each fall to stay active, all while they cherish the camaraderie of team sports.
  arts: Robert Croteau enjoys attending Amherst's community theater productions, especially works by local playwrights, listens to classic rock legends like Bruce Springsteen and The Rolling Stones while
    working, and admires the paintings of American realist Edward Hopper, which inspire their home décor choices, reflecting their love for both performance and visual arts.
  travel: Robert Croteau favors weekend road trips to nearby Lake Erie Islands and occasional longer drives to national treasures like Yellowstone and the Great Smoky Mountains, planning itineraries around
    family‑friendly hikes and modest budgets, while they dream of a spring visit to Japan's cherry‑blossom festivals.
  culinary: Robert Croteau loves cooking family‑tradition dishes such as slow‑cooked beef pot roast, homemade apple pie with locally harvested apples, and experimenting with fresh herbs like rosemary and
    thyme from their garden, while they also master Italian favorites like spaghetti carbonara for date nights.
  core: Robert Croteau blends meticulous housekeeping expertise with a community‑first spirit, balancing pragmatic budgeting, health vigilance, and a love for backyard gardening, all while they occasionally
    overcommit to volunteer events and forget to schedule personal downtime.
background:
  cultural: Robert grew up in a middle‑class, Midwestern family in Lorain County, where practical work ethic and community involvement are core values. His surname reflects French‑Canadian ancestry, and
    family traditions include celebrating holidays like Thanksgiving with a focus on shared meals and gratitude. He was raised with an appreciation for modesty, reliability, and helping neighbors, which
    continues to shape his respectful and cooperative demeanor both at work and in his community.
