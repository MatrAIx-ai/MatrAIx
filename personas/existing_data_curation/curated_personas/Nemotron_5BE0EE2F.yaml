personas:
  professional: A budding explorer of block construction named Phillip Miller delights in arranging colorful building sets, and they follow step‑by‑step instructions with surprising focus, turning playtime
    into both imaginative and methodical exploration.
  sports: A regular participant in the Tiny Tots Soccer program at the community park, Phillip Miller celebrates the Chicago Cubs with family game‑day rituals, and they combine structured drills with unstructured
    playground sprints, showcasing a spirited balance of organization and flexibility.
  arts: Phillip Miller eagerly watches Sesame Street and sings along with The Wiggles, loves dancing to Disney soundtracks, and they spend afternoons finger‑painting while impersonating Mickey Mouse, weaving
    social energy with creative curiosity.
  travel: Phillip Miller enjoys family road trips to the nearby zoo and annual beach vacations in Myrtle Beach, preferring animal encounters over long car rides, but they can become fretful during airport
    security lines, prompting parents to bring extra comfort toys.
  culinary: Phillip Miller favors creamy mac and cheese, crunchy carrot sticks with ranch dip, and banana slices; they proudly stir their own oatmeal with a plastic spoon yet regularly refuse broccoli and
    demand a specific brand of crackers, making mealtime a playful negotiation.
  core: Phillip Miller is a curious, sociable two‑year‑old whose energetic play and love for structured activities are tempered by an early propensity to worry over lost toys and a finicky palate.
background:
  cultural: 'Phillip comes from a white, Texas‑rural family in Spicewood, Burnet County. His upbringing reflects the values of a close‑knit community: hospitality, church participation, weekend barbecues,
    and appreciation for outdoor recreation like trips to Enchanted Rock. These cultural elements shape his social confidence, his love for group gatherings, and his exposure to traditional country music
    and American folk stories.'
