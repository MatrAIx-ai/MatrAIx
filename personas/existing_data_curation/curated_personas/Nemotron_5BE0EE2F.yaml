  career_goals: Although still very young, Phillip’s caregivers notice his fascination with helpers in the community and his desire for structured activities. He often talks about fire trucks and teachers,
    expressing a budding ambition to become a firefighter or a teacher who can organize and guide groups of children. He also shows curiosity about building things, hinting at a future interest in engineering
