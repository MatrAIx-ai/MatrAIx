persona_description: A professor of urban planning who specializes in the analysis of urban expansion, population density, and open space. His work focuses on developing methods to analyse detailed satellite
  images and using this data to predict urban growth and population trends. He aims to demonstrate that urbanisation cannot be stopped and argues that rapid growth in developing countries should be controlled
  through the establishment of protected greenbelts and other measures. His book, "Planet of Cities", presents his research and findings on urban expansion and population density.
