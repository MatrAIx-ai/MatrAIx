  hobbies: '[''Rotary Club community service'', ''Church event planning'', ''Vegetable gardening'', ''Fishing at Lake Shelbyville'', ''Vintage tractor restoration'', ''Watching Chicago Bears games'', ''Attending
    country music concerts'', ''Family game nights'', ''Community potlucks'', ''Safety workshop volunteering'']'
  career_goals: Approaching retirement, Norman aims to transition into a supervisory safety role where he can formalize his decades of experience into a department‑wide safety program. He plans to obtain
    a Certified Safety Professional (CSP) credential, lead the plant’s safety committee, and develop a mentorship pipeline for younger operators. Additionally, he hopes to teach part‑time at the local community
    college’s industrial technology program, sharing his practical knowledge while securing a structured, low‑stress post‑retirement schedule. Financially, he seeks to ensure a stable future for his family
    by finalizing his retirement savings and exploring a side venture consulting on equipment maintenance for small farms in the area.
