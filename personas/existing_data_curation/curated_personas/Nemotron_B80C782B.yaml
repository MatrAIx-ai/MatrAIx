  hobbies: '[''digital sketching'', ''street art photography'', ''science‑fiction reading'', ''indie film watching'', ''chess'', ''e‑sports gaming'', ''skateboarding'', ''traditional Mexican music listening'',
    ''cooking family recipes'', ''attending local cultural festivals'']'
  career_goals: Josias aspires to turn his passion for art and technology into a career as a concept artist or UI/UX designer, ideally working on video game projects that value innovative visual storytelling.
    He aims to enroll in a community college or vocational program that offers courses in digital media and design, and eventually build a freelance portfolio that showcases his unique blend of cultural
    influences and technical skills. Long‑term, he hopes to work with studios that create culturally rich, immersive experiences and to mentor other young artists from his community.
