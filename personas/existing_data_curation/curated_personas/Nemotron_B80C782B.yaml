personas:
  professional: Josias Blanco is a 16‑year‑old self‑taught digital illustrator who blends street‑art aesthetics with emerging UI/UX concepts, leveraging strong strategic planning and bilingual communication
    to prototype game interfaces for school projects and local indie dev meet‑ups.
  sports: Josias Blanco spends weekends at the local skate park perfecting ollies, follows the Dallas Mavericks and Laredo Heat soccer team on social media, and competes in a high‑school chess club where
    they rank in the top 10, treating fitness as a strategic game of balance and reflex.
  arts: Josias Blanco draws inspiration from street‑art icon Banksy, sci‑fi illustrator Syd Mead, and indie film director Alex Garland, while listening to classic rock legend David Bowie and practicing
    digital painting with free tools like Krita, frequently curating a personal gallery of murals that reflect their bicultural family stories.
  travel: Josias Blanco dreams of a road trip across the Southwest, already explored Santa Fe’s art scene, visited the bustling markets of Mexico City during a family vacation, and hopes to attend the Austin
    City Limits music festival, preferring budget‑friendly hostels and planning routes on a custom Google‑Maps spreadsheet.
  culinary: Josias Blanco loves cooking family recipes such as tlayudas, chilaquiles with green salsa, and homemade guacamole, but also experiments with ramen broth and avocado toast, often using fresh
    cilantro and lime to bridge traditional flavors with modern brunch trends.
  core: Josias Blanco is a meticulous teenage visual storyteller who balances street‑art swagger with disciplined design work, saves every spare cent for future art endeavors, treats health like a tactical
    mission, and quietly dominates skate parks and chess boards while secretly humming classic rock.
background:
  cultural: Josias is a Mexican‑American teenager raised in Laredo, Texas, a vibrant border city where Mexican traditions intertwine with Texan influences. Growing up bilingual, he navigates both Spanish‑speaking
    family life and English‑dominant school and community settings. His cultural identity is shaped by celebrations such as Día de los Muertos, Cinco de Mayo, and the annual River Parade, as well as by
    the rich mural art and musical heritage of the region. He respects Catholic customs while also embracing contemporary border culture, which fuels his artistic sensibilities and informs his worldview.
attributes:
  skills: '[''digital illustration'', ''graphic design'', ''basic HTML/CSS coding'', ''strategic planning'', ''time management'', ''chess strategy'', ''competitive video gaming'', ''bilingual Spanish‑English
