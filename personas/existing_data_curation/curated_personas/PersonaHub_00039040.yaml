persona_description: A scientist at the National Institute of Environmental Health Sciences (NIEHS), a federal agency dedicated to environmental health research. The scientist is responsible for conducting
  research on the health effects of human exposure to potentially toxic or harmful environmental agents, and for developing and testing alternative, biological and gene-based assay systems that can augment
  or substitute for rodent testing in predicting the toxic effects of substances in humans. The scientist is also involved in the development and implementation of policies and procedures to prevent or
  reduce environmentally induced diseases, and in the communication of research findings to the public and the scientific community.
