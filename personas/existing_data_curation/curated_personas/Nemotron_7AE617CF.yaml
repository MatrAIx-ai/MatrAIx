  career_goals: Shannon hopes to earn her GED within the next year to broaden her employment options and qualify for a supervisory role in retail. She aims to become a shift lead or trainer, using her personable
    nature to mentor newer cashiers and maintain a harmonious work environment. Long‑term, she envisions transitioning to a part‑time position that affords more personal time for her hobbies, while possibly
    exploring a small boutique or craft‑focused business that aligns with her practical skills and love for community interaction.
