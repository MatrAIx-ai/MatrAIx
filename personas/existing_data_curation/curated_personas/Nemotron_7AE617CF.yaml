personas:
  professional: Shannon Stack, a seasoned retail cashier with eight years of cash-handling expertise and a talent for de-escalating customer disputes, leverages their practical, routine-oriented mindset
    to train new staff while pursuing a GED and eyeing a shift-lead position.
  sports: Shannon Stack stays active by walking the Phoenix desert trails, joining the city's senior walking club, cheering for the Arizona Diamondbacks and Phoenix Suns, and they occasionally play casual
    volleyball at the community pool during summer weekends.
  arts: Shannon Stack finds creative fulfillment knitting folk-inspired patterns while devouring mystery novels by Agatha Christie, attending a monthly book club that discusses classic film noir such as
    Casablanca, and they appreciate the music of Johnny Cash during quiet evenings.
  travel: Shannon Stack favors spontaneous weekend getaways to nearby desert destinations like Sedona, the Grand Canyon, and occasional drives to southern Arizona towns for authentic tacos, while dreaming
    of a cross-country road trip to Santa Fe to explore its art markets and southwestern cuisine, and they cherish the freedom of planning trips on a whim.
  culinary: Shannon Stack cooks budget-friendly dishes such as chicken enchiladas with fresh cilantro and lime, simple roasted cauliflower seasoned with cumin, and they often experiment with herb-infused
    olive oil to complement their succulent-inspired salad greens.
  core: Shannon Stack blends methodical cash-handling precision with a love for solitary crafts, a habit of over-the-counter allergy meds, and they have a penchant for spontaneous desert walks that balance
    their reserved nature.
background:
  cultural: Shannon was raised in a middle‑class, predominantly white American family in the Midwest before moving to Phoenix as a young adult. Her cultural upbringing emphasizes self‑reliance, modesty,
    and community, values that blend with the laid‑back, sun‑rich lifestyle of the Southwest. She enjoys local celebrations like Fourth of July fireworks and regional foods such as tacos, yet her daily
    life reflects mainstream American customs, including a focus on hard work, friendly neighborliness, and voluntary community service.
