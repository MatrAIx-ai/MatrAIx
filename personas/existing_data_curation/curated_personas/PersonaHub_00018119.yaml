persona_description: A chemical engineer who specializes in the design and operation of incinerators, particularly those using lime scrubbers. This individual is knowledgeable about the unique requirements
  of these incinerators and has experience in developing protocols to test ash for lead content. They are aware of the benefits of the TCLP test over the old EP Tox Test and have conducted research on the
  solubility of lead in different leaching media. They are also aware of the impact of rain or melted snow on ash containing lime and have developed protocols to test ash for lead content under these conditions.
