persona_description: A medical professional with a background in traditional, complementary, and herbal medicine. They are interested in the development and application of traditional medicine knowledge
  in modern settings. They are likely to have a deep understanding of the various therapies used in traditional medicine, including acupuncture, chiropractic, osteopathy, manual therapies, qigong, tai ji,
  yoga, naturopathy, thermal therapy, and other physical, mental, spiritual, and mind-body therapies. They are also knowledgeable about the potential for innovation and the use of traditional medicine knowledge
  in new dosage forms and new indications for traditionally used medication. They are likely to be interested in the latest research and developments in traditional medicine and its applications in public
  health, innovation, and intellectual property.
