  hobbies: '[''Beach volleyball'', ''CrossFit'', ''Running club'', ''Salsa dancing'', ''Puzzle building'', ''Model kit assembly'', ''Meal prepping'', ''Volunteering at animal shelter'', ''Reading self-help
    books'', ''Listening to productivity podcasts'']'
  career_goals: Ronna aims to advance within the manufacturing sector by securing a shift lead position within the next two years and eventually moving into a supervisory role overseeing a small production
    team. She plans to earn certifications such as the Certified Manufacturing Technologist (CMfgT) and an OSHA Forklift Operator credential to bolster her technical credibility. Recognizing the value of
    formal education, she intends to complete her associate degree in manufacturing technology and may later pursue a bachelor's in industrial engineering. Ronna is motivated by the prospect of improving
    plant efficiency, implementing lean practices, and being recognized as a top performer. Long‑term, she envisions opening a boutique fabrication shop that offers custom metalwork for local businesses
    and art installations, blending her technical expertise with entrepreneurial ambition.
