personas:
  professional: Ronna Jones is a meticulous mechanical assembler in a fast‑paced Florida manufacturing plant, leveraging her expertise in CNC machine setup, lean workflow optimization, and rigorous OSHA
    safety compliance to consistently surpass production targets, while they channel their competitive drive and methodical planning into motivating their crew to hit efficiency milestones.
  sports: Ronna Jones devotes her mornings to beach volleyball at Delray Beach and CrossFit sessions at CrossFit Curbed, joins the Coastal Striders running club for weekly trail runs, roots for the Miami
    Dolphins, Miami Heat, and Tampa Bay Rays, and they channel their competitive streak into disciplined training and regular participation in local leagues.
  arts: Ronna Jones immerses herself in the local arts scene by attending the annual Delray Beach Arts Festival, dancing salsa to the rhythms of Marc Antonio and Celia Cruz, curating an eclectic playlist
    that mixes Beyoncé’s pop anthems with indie folk artist Iron & Wine, and they collect limited‑edition prints from emerging Florida muralists.
  travel: Ronna Jones prefers weekend getaways that blend sun‑soaked relaxation with low‑key adventure, meticulously planning road trips to Key West and Savannah, weekday escapes to New Orleans for its
    jazz scene, and they dream of a future backpacking trek through Costa Rica’s rainforests once their savings goal is met.
  culinary: Ronna Jones is a competent meal‑prep enthusiast who assembles weekly quinoa bowls topped with grilled shrimp, avocado, black beans, and a squeeze of lime, while also enjoying quick comforts
    like shrimp and grits on the coast, and they indulge in occasional upscale dining for a seared lemon‑herb salmon with asparagus.
  core: Ronna Jones is a driven, structure‑loving 21‑year‑old who balances a competitive edge in manufacturing and beach sports with a chronic habit of over‑analyzing every schedule, and they often stay
    up late scrolling productivity blogs.
background:
  cultural: Ronna grew up in a middle‑class white family in the southeastern United States, relocating to Delray Beach during her teenage years. Her upbringing emphasized practicality, a strong work ethic,
    and reliability—values that align with the region's laid‑back, beach‑centric lifestyle. She was raised on traditional American holidays such as Thanksgiving and Fourth of July celebrations, often spending
    time outdoors with family and friends. Living in the diverse coastal community of Palm Beach County exposed her to a multicultural environment, fostering an appreciation for different cultural events
    while maintaining her own mainstream American identity. Her family's support of education and vocational training guided her toward a career in manufacturing, and her social circles reflect the blend
    of beach culture, fitness communities, and local arts festivals typical of the area.
attributes:
  skills: '[''Mechanical assembly'', ''Fabrication'', ''Reading engineering drawings'', ''Hand and power tool operation'', ''Basic welding'', ''CNC machine setup'', ''Quality inspection'', ''Lean workflow
