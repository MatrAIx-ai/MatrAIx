  career_goals: Anastacia seeks a stable, leadership-oriented role that leverages her routine-driven strengths while offering a predictable schedule to support her emotional well-being. She aims to become
    a Charge Nurse or Clinical Nurse Manager on a medical-surgical floor, overseeing staff performance, implementing safety protocols, and mentoring junior nurses. In the longer term, she hopes to obtain
    a Certified Medical-Surgical Nurse (CMSN) credential and transition into a part-time Nurse Educator position at a community college, where she can teach foundational nursing skills and promote culturally
    sensitive care for Mexican-American communities. She also aspires to champion staff wellness programs that address anxiety and burnout.
