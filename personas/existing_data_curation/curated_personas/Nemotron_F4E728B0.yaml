  career_goals: Basiliso aims to complete his high‑school equivalency (GED) within the next year and then enroll in a community‑college automotive technology program. He wants to secure an apprenticeship
    at a reputable auto repair shop in the Houston‑Galveston area, where he can deepen his mechanical skills while earning a stable income. Long‑term, he envisions either opening his own modest auto‑service
    garage serving his neighborhood or expanding his family's taco business into a small restaurant that blends authentic Mexican flavors with Tex‑Mex influences. Throughout his career path, he hopes to
    become a reliable provider for his parents and younger siblings, maintaining the family’s financial stability and cultural traditions.
