personas:
  professional: Joseph Younts, an aspiring robotics enthusiast, leads his middle‑school robotics club’s build sessions, channeling a blend of curiosity and practicality into functional LEGO‑based prototypes
    while coordinating group tasks with a friendly, organized style.
  sports: Joseph Younts captains the Arlington Soccer United youth team, trains three evenings a week on the community field, cheers for FC Dallas during MLS broadcasts, and proudly dons a Dallas Cowboys
    cap when watching weekend football games.
  arts: Joseph Younts practices piano daily, tackling Beethoven's 'Für Elise' and pop renditions of Taylor Swift's 'Shake It Off,' fuels his imagination by building elaborate Minecraft realms, and devours
    adventure novels like 'Percy Jackson & the Olympians,' often quoting his favorite characters aloud.
  travel: Joseph Younts has road‑tripped to the Space Center in Houston, spent a weekend at Six Flags Over Texas, dreams of exploring the Grand Canyon’s rim, and hopes to one day visit Disneyland’s Magic
    Kingdom after graduation.
  culinary: Joseph Younts enjoys crafting simple meals such as cheese quesadillas with fresh salsa, whipping up backyard BBQ chicken thighs seasoned with paprika and garlic, and baking chocolate‑chip cookies,
    while occasionally helping prepare dog‑treat biscuits at the animal shelter.
  core: Joseph Younts blends boundless curiosity with organized teamwork, balancing soccer drills, robot builds, piano practice, and a penchant for accidental midnight Minecraft marathons.
