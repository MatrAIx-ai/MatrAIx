personas:
  professional: Angelica Ingram, a 1‑year‑old who thrives on predictable daily routines and practical cause‑and‑effect play, already shows the methodical curiosity and flexible spontaneity that could one
    day blossom into a meticulous yet adaptable project manager, as they delight in arranging blocks before gleefully toppling them.
  sports: Angelica Ingram enjoys routine toddler gym sessions at the local community center, participates in baby swimming classes, and cheerfully waves at every New York Yankees game played on television,
    while proudly wearing a tiny Manchester United jersey during family outings, as they splash exuberantly in the shallow pool.
  arts: Angelica Ingram sings along to the catchy 'Baby Shark' by Pinkfong and hums 'Let It Go' from Frozen, idolizing Idina Menzel, while delighting in the vivid colors of a Mickey Mouse plush that adorns
    their nursery, embodying a bright artistic spirit even at one, as they babble excitedly when the melody plays.
  travel: Angelica Ingram has already explored the wonders of a nearby zoo, experienced the magic of Disneyland during a family vacation, and dreams of future stroller‑friendly adventures in the Grand Canyon,
    favoring relaxed itineraries over tightly packed schedules, as they giggle at the sight of colorful ticket stubs.
  culinary: Angelica Ingram prefers sweet potato and carrot mash, occasionally munches on mashed peas, and while not yet cooking, enjoys the textured variety of finger foods like banana slices, showing
    a budding palate that leans toward gentle, mildly spiced purees, as they proudly smear a dab of puree on their cheeks.
  core: Angelica Ingram, a one‑year‑old balancing a love for routine with spontaneous play, prefers predictable snack schedules but will toss toys aside in a delightful, disorganized burst, a paradox of
    order and chaos, as they giggle at their own mess.
background:
  cultural: 'Angelica is a first‑generation Mexican‑American raised in San Antonio’s vibrant Medina County community. Her household blends Mexican traditions with Texan culture: Spanish is spoken alongside
    English, and family meals feature dishes like tamales, enchiladas, and homemade salsa. She participates in cultural celebrations such as Día de los Muertos, where she watches her family set up ofrendas,
    and enjoys festive events like Cinco de Mayo parades. The Catholic faith of her family also shapes her early experiences, from attending Sunday Mass to celebrating religious holidays. Growing up in
    a close‑knit extended family, Angelica benefits from the warmth of multi‑generational support, which reinforces her love for routine, communal activities, and cultural storytelling.'
