  career_goals: While Angelica is only an infant, her family envisions a future where she grows into a caring, community‑oriented individual. She shows early curiosity about people and objects, hinting
    at a desire to learn, explore, and eventually help others—perhaps as a teacher, caregiver, or community volunteer. In the short term, her immediate ambition is to master walking, speak more words, and
    enjoy interactive play with family and friends.
