    to teach art at a community center'']'
  career_goals: Cathie aims to advance to a senior HR leadership role—ideally HR Director or strategic HR Business Partner—within the next five years. She plans to earn the SHRM Senior Certified Professional
    (SHRM‑SCP) credential and complete a part‑time bachelor's degree in Business Administration to deepen her strategic acumen. Passionate about employee well‑being, she wants to develop expertise in mental‑health
    initiatives and integrate artistic and creative wellness programs into workplace culture. Long‑term, Cathie envisions launching an independent HR consulting boutique that serves small Texas businesses,
    helping them build harmonious, innovative, and mentally healthy workplaces.
