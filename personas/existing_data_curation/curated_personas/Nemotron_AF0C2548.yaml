personas:
  professional: Cathie Somma is a seasoned HR professional with fifteen years of experience in employee relations, conflict mediation, and policy design, who leverages their curiosity and love of the arts,
    and they craft unconventional wellness programs—like art-based stress-relief workshops—while occasionally struggling with tight deadlines due to their spontaneous nature.
  sports: Cathie Somma fuels their fitness routine with weekend hikes through Big Thicket National Preserve, sunrise kayaking on the Neches River with the Neches Paddle Club, and occasional pick-up basketball
    games while cheering for the Houston Astros, the Dallas Mavericks, and the Houston Texans, though they often prefer low-impact activities that balance their desire for calm with occasional competitive
    streaks.
  arts: Cathie Somma immerses themselves in the arts by painting watercolors inspired by Georgia O'Keeffe, attending exhibitions at the Art Museum of Southeast Texas, taking pottery classes at the Kinetic
    Clay Studio, and strumming acoustic covers of Bob Dylan and Brandi Carlile at informal gatherings, all while they curate playlists that feature contemporary folk artist Iron & Wine.
  travel: Cathie Somma's travel style blends spontaneous weekend road trips to Austin, New Orleans, and the Hill Country with carefully planned cultural escapes to Florence, Italy, and Kyoto, Japan, where
    they seek local art workshops and serene gardens, all while balancing their wanderlust with the budget constraints of their growing family.
  culinary: Cathie Somma, an adventurous home cook, delights in crafting gumbo with Andouille sausage, pho broth infused with star anise and cilantro, and homemade tamales topped with fresh salsa verde,
    often pairing their meals with locally sourced heirloom tomatoes and experimenting with spice blends ranging from Moroccan ras el hanout to Mexican chipotle, and they love sharing these dishes at potluck
    gatherings.
  core: Cathie Somma blends a curious, art-driven spirit with a compassionate HR career, yet they sometimes let their spontaneous streak lead to missed deadlines, and their penchant for worrying drives
    nightly meditation sessions that both soothe and amplify their reflective nature.
background:
  cultural: Cathie grew up in a close‑knit East Texas community where Southern hospitality, church involvement, and a strong sense of local tradition were central to daily life. Her family has deep roots
    in the area dating back to the post‑Civil War settlement era, and she was raised attending Methodist services, participating in potluck gatherings, and celebrating regional customs such as Texas Independence
    Day and local rodeos. While these traditions instilled values of community support and self‑reliance, her professional experiences and love of the arts have broadened her perspective, allowing her to
    blend traditional Texan warmth with progressive, creative approaches in both her personal and work life.
attributes:
