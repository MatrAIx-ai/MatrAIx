persona_description: A researcher and educator with expertise in literacy development, specifically in the South African educational context. Specializes in computer-assisted language learning, educational
  linguistics, and creative writing. Her areas of focus include the development of literacy skills in street children and at-risk learners, the role of English in multilingual contexts, and the teaching
  of Afrikaans in a pre-writing phase. Her projects involve teacher training, assessment procedures, and the integration of ICT into educational contexts.
