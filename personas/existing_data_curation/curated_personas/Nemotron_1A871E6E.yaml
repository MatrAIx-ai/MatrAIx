  hobbies: '[''Gardening'', ''Quilting'', ''Reading'', ''Gospel Music'', ''Cooking'', ''Dog Walking'', ''Church Fellowship'', ''Crossword Puzzles'', ''Birdwatching'']'
  career_goals: Although retired, Alzina seeks to channel her expertise into volunteer work. She aims to become a docent at the Selma National Historical Park, mentor high‑school students in local history
    projects, and compile a collection of oral histories from Selma’s elder residents. She also hopes to publish a memoir that weaves personal experience with the civil‑rights era, and to establish a small
    scholarship fund for her grandchildren’s education, ensuring financial stability for future generations.
