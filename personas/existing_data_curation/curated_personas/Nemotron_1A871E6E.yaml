personas:
  professional: Alzina Salomon, a retired community organizer turned volunteer docent at Selma National Historical Park, leverages her meticulous budgeting, oral‑history documentation skills and skeptical
    eye for detail to guide high‑school students through civil‑rights projects while thoughtfully mediating any disagreements that arise, and they balance new ideas with proven methods.
  sports: Alzina Salomon enjoys low‑impact morning walks with her dog as part of Selma’s senior stroll club, supports the Alabama Crimson Tide during football season, occasionally joins a local pickleball
    league, and they cheer on the Birmingham Barons when the minor‑league season rolls around.
  arts: Alzina Salomon crafts intricate quilts inspired by Faith Ringgold’s storytelling panels, finds solace in gospel classics by Mahalia Jackson and The Blind Boys of Alabama, devotes evenings to reading
    biographies of civil‑rights leaders, and they occasionally attend the Selma Community Theater’s modest productions.
  travel: Alzina Salomon prefers short, purposeful trips to historic sites such as the National Museum of African American History and Culture in Washington, D.C., the Dexter Avenue King Memorial in Montgomery,
    and the Tuskegee Airmen National Historic Site, planning each itinerary with a detailed checklist while they avoid long flights and opt for familiar road travel with family.
  culinary: Alzina Salomon excels at Southern cooking, frequently preparing collard greens seasoned with smoked turkey, crisp fried chicken, buttery cornbread, and peach cobbler spiced with cinnamon and
    nutmeg, and they relish experimenting with heirloom tomatoes from their garden in fresh salsa.
  core: Alzina Salomon blends a disciplined, curiosity‑driven mind with a love for garden‑grown food, quilting, and civil‑rights storytelling, habitually turning everyday chores into organized projects
    while maintaining a quietly competitive edge.
background:
  cultural: Alzina was born and raised in Selma, Alabama, during the height of the civil‑rights movement. Her family’s deep roots in the African‑American church fostered a strong sense of faith, community
    service, and oral storytelling. Southern culinary traditions, gospel music, and the legacy of local activism shape her worldview. She values family ties, preserves African‑American Southern heritage
    through food and craft, and honors the historical struggles and triumphs of her community.
