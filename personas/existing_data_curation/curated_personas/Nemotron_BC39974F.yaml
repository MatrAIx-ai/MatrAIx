  career_goals: Enedina aims to transition from hands‑on field work to a supervisory and entrepreneurial role within the next five years. She plans to obtain an ICC roofing contractor certification and
    an OSHA safety certification to formalize her expertise. With her growing interest in sustainable and aesthetically distinctive roofing, she hopes to launch a small business that offers custom, environmentally
    friendly roof designs for residential clients throughout the Central Valley. Enedina also wants to mentor younger workers, especially women, by providing on‑the‑job training and encouraging them to
    pursue trades. Additionally, she intends to complete her GED to broaden her future educational options and to reinforce her family’s long‑term financial security.
