personas:
  professional: Enedina Hurtarte is a methodical roofing specialist with twenty years of experience installing asphalt shingles, metal panels, solar mounts, and decorative metalwork, and they leverage their
    bilingual communication, meticulous project management, and curiosity for sustainable design to pursue ICC and OSHA certifications and launch a boutique eco‑friendly roofing business that mentors women
    in the trades.
  sports: Enedina Hurtarte stays active by hiking the Sierra Nevada foothills on weekends, cheering on the Fresno State Bulldogs football team, joining a local women’s walking club for regular cardio, and
    they also catch Sacramento Kings games on television for a quick dose of competition.
  arts: Enedina Hurtarte regularly paints vibrant murals inspired by Frida Kahlo’s bold colors and Diego Rivera’s narrative style, crafts papel picado for community festivals, attends local exhibitions
    featuring muralist Carlos Rios, and they deepen their aesthetic perspective by reading architecture books on Frank Lloyd Wright and contemporary folk art.
  travel: Enedina Hurtarte prefers thoughtfully planned weekend getaways that blend adventure and relaxation, such as hiking Yosemite’s waterfalls, tasting wines in Napa Valley, exploring the artistic streets
    of Santa Fe, and they occasionally escape to the historic alleys of Seville for a taste of old‑world charm while carefully budgeting to keep family expenses in balance.
  culinary: Enedina Hurtarte loves cooking traditional mole with chilhuacle chilies, slow‑cooked tamales wrapped in fresh corn husks, and hearty pozole brimming with hominy and pork, often experimenting
    with cilantro, toasted pumpkin seeds, and a pinch of cacao, and they sometimes over‑spice the dishes, prompting a generous squeeze of lime to rebalance flavors.
  core: Enedina Hurtarte is a diligent roofer‑turned‑entrepreneur whose love for vibrant art, community traditions, and sustainable design fuels a disciplined yet creatively curious life, and they balance
    it with backyard gardening, weekend hikes, and occasional over‑spicing of family meals.
background:
  cultural: Enedina’s roots are deeply Mexican, having grown up in a bilingual household where Spanish was spoken at home while English dominated school and work. Her family maintains traditions such as
    Día de los Muertos altars, lively family gatherings around the kitchen, and active participation in the local Catholic parish. Living in Reedley, she is part of a vibrant Mexican‑American community
    that celebrates cultural festivals, shares music like mariachi and ranchera, and values strong family ties and mutual support. These cultural influences shape her culinary preferences, artistic sensibilities,
    and her emphasis on community cooperation and harmony in the workplace.
