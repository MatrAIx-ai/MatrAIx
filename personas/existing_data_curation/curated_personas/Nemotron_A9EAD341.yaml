personas:
  professional: Raquel Cardona is a Denver nonprofit program manager who translates routine‑driven service designs into scalable operations, leveraging data analysis, grant acquisition, and confident public
    speaking to steer volunteer teams through crises while maintaining a pragmatic, flexible mindset.
  sports: Raquel Cardona is a dedicated member of the Denver Mountain Club, regularly tackling trails like Mount Falcon and Red Rocks, cheers for the Denver Broncos in the NFL season and the Colorado Rapids
    in MLS, and follows Real Madrid’s matches on weekends, balancing competitive board‑game nights with high‑energy trail runs.
  arts: Raquel Cardona channels their love of rhythm into weekly salsa classes inspired by dancers like Paco Cárdenas, enjoys the guitar ballads of Alejandro Sanz, admires the surreal paintings of Salvador Dalí,
    and binge‑watches mystery series such as ‘True Detective’ to fuel their intrigue for intricate storytelling.
  travel: Raquel Cardona favors short, well‑planned escapes that leave room for spontaneity, such as weekend treks through Rocky Mountain National Park, a culinary tour of Barcelona’s tapas bars, and a
    relaxed road trip along the Pacific Coast Highway, often booking flights at the last minute to fit a busy schedule.
  culinary: Raquel Cardona delights in preparing authentic Spanish dishes like paella valenciana with saffron and chorizo, tortilla española with potatoes and onions, and gazpacho with ripe tomatoes and
    cucumber, while their competitive streak leads them to host recipe challenges that sometimes result in over‑seasoned stews when excitement takes over.
  core: Raquel Cardona is a routine‑loving nonprofit leader who blends calm resilience with a passion for salsa, hiking, and competitive board games, yet their occasional disorganization leads to missed
    subscription cancellations and over‑seasoned dishes.
background:
  cultural: Raquel’s heritage is rooted in Spanish culture; her parents emigrated from Andalusia to the United States in the early 1990s. She grew up bilingual, speaking Spanish at home and English in school,
    which has given her a deep appreciation for both cultures. She celebrates traditional festivals such as Semana Santa and La Feria de Abril, and she incorporates Spanish culinary and musical traditions
    into her social life. Living in Denver, she blends this heritage with the city’s outdoor, progressive lifestyle, participating in local Spanish-language meet‑ups and volunteering in culturally diverse
    neighborhoods. Her cultural identity informs her inclusive approach to community service, emphasizing respect for family ties, communal solidarity, and practical problem‑solving.
