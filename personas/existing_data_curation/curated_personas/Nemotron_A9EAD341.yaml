  career_goals: Raquel aims to ascend to a senior executive role such as Director of Community Services or Chief Operations Officer within a large nonprofit or municipal agency in Denver. She wants to launch
    a flagship community health initiative that becomes a model for other cities, secure multi‑year funding, and be recognized for operational excellence. She also aspires to obtain professional certification
    (CCEDP) and eventually mentor emerging community managers. Her competitive drive pushes her to benchmark her programs against leading national standards and achieve measurable impact targets.
