persona_description: A passionate educator and STEM enthusiast who believes in the transformative power of arts integration in education. They have a strong background in teaching STEM subjects and have
  a proven track record of successfully integrating arts into STEM curricula. They are dedicated to promoting STEM education and have a deep understanding of the importance of fostering creativity and critical
  thinking skills in students. They are also a strong believer in the potential of music and engineering to enhance academic intelligence and reduce the achievement gap. They are excited about the opportunity
  to work with students at Eisenhower Elementary and XinXing Academy to develop their STEM skills through the construction of a single-stringed dulcimer and their musical abilities through the band.
