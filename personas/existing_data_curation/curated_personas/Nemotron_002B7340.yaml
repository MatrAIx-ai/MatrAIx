personas:
  professional: David Williams, a 48‑year‑old aspiring home‑based handyman, leverages their carpentry, auto‑maintenance, and modest business administration skills to deliver reliable repair work to seniors
    while balancing structured project planning with a relaxed, flexible schedule.
  sports: David Williams spends weekends fishing on Lake Conroe, cheering for the Houston Astros and the Houston Rockets while occasionally playing in a neighborhood softball league, reflecting a low‑key
    but loyal sports enthusiasm.
  arts: David Williams finds solace in classic R&B and jazz, regularly listening to Marvin Gaye, Aretha Franklin, and John Coltrane while cooking, participates in the church choir, and enjoys reading biographies
    of historic leaders, intertwining music and literature into their cultural identity.
  travel: David Williams prefers short road trips to Texas Hill Country wine tours and Gulf Coast beaches, meticulously planning routes but leaving room for spontaneous stops at local diners, constrained
    by a modest budget and family commitments.
  culinary: David Williams specializes in Texas‑style barbecue, expertly smoking brisket with mesquite wood, seasoning with paprika and garlic, and serving alongside baked beans and homemade cornbread,
    often prepared while classic soul playlists play in the background.
  core: David Williams blends a hands‑on love for woodworking and gardening with a relaxed, slightly disorganized rhythm, grounding their life in community service, soulful music, and a penchant for perfecting
    the smoky brisket while occasionally misplacing their favorite hammer.
background:
  cultural: David’s cultural identity is rooted in the African‑American community of Missouri City, a suburb of Houston known for its strong church networks, Southern culinary traditions, and a vibrant
    legacy of Black resilience. Growing up in Fort Bend County, he absorbed the values of family solidarity, mutual aid, and a deep appreciation for music and food that have been passed down through generations.
    His experiences as a Black man in Texas have shaped a worldview that balances optimism with an awareness of systemic challenges, fostering a commitment to give back to his community through mentorship,
    volunteerism, and preserving cultural traditions such as gospel music, soul food, and community gatherings.
