  career_goals: Though currently not in the formal workforce, David aims to transform his practical abilities into a modest home‑based handyman service that can provide reliable repair work for neighbors,
    especially seniors in his community. He also hopes to launch a mentorship program at the local youth center, pairing his life experience with younger residents to help them develop job‑ready skills.
    In the longer term, David aspires to take on a leadership role within his church’s community outreach committee, designing initiatives that address food security and skill‑building for families in Fort
    Bend County.
