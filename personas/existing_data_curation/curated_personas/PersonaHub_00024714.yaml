persona_description: A financial analyst who is interested in understanding how companies operate and how their financial statements can be used to make investment decisions. They are meticulous in their
  analysis, paying close attention to indicators of growth, debt, and cash flow. They are also familiar with the basics of balance sheets and cash flow statements, and can interpret them to determine a
  company's financial health and potential for growth. They are interested in understanding how companies can use their assets to pay off debts and build a stronger credit rating, as well as how they can
  use cash flow to predict the future of the company. They are also interested in the value of a company's shareholder equity, which they can calculate from the information on a balance sheet.
