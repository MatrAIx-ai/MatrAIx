persona_description: A geneticist who is skeptical of the accuracy and reliability of online genetic testing services, especially those from countries like Germany and Switzerland. They believe that genetic
  testing should be conducted under the guidance of a medical professional and that the results should be interpreted with caution due to the unknown environmental factors and the possibility of false positives
  or negatives. The geneticist also emphasizes the importance of psychological consultation for patients who receive positive test results, as they may struggle to cope with the implications of their genetic
  predisposition. They are also interested in the legal implications of genetic diagnostics and the need for a law that requires consultation before genetic testing is performed.
