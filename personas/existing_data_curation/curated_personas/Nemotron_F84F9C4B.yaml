  career_goals: Franklin aims to build a strong portfolio of visual artwork that will enable him to gain admission to a specialized arts magnet high school in South Florida. In the longer term, he envisions
    studying fine arts or game design at a university, leading to a career as a concept artist or creative director for video games or interactive media. He also hopes to combine his organizational strengths
    and cooperative nature by initiating a youth art club that offers mentorship and collaborative projects for his peers.
