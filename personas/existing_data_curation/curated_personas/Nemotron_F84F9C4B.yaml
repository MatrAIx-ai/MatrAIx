personas:
  professional: Franklin Agno, a teenage budding game designer and digital illustrator, channels their curiosity for sci‑fi worlds and disciplined planning into creating intricate Minecraft‑inspired mods
    and Python‑driven animations while favoring solitary coding sessions that reflect their reserved nature.
  sports: Franklin Agno, a dedicated swimmer who logs early‑morning laps at Hallandale Beach and joins a local youth swim club focused on technique, also enjoys occasional beach volleyball with friends,
    proudly roots for the Miami Dolphins and the Miami Heat, and balances their disciplined training with a love for the rhythm of ocean waves.
  arts: Franklin Agno, an avid visual artist and sci‑fi enthusiast, spends weekends sketching coastal sunsets and character concepts while drawing inspiration from ambient electronic musicians such as Tycho,
    Bonobo, and Aphex Twin and admiring vibrant murals by local street artist J. Greene at the Hallandale Arts Center.
  travel: Franklin Agno, who delights in short getaways, meticulously plans day trips to the nearby Everglades National Park and annual family vacations to the Bahamas, balancing a love for coastal exploration
    with a penchant for researching each destination’s local art scenes and hidden snorkeling spots.
  culinary: Franklin Agno, a teenage foodie with a soft spot for grilled fish tacos topped with mango salsa and pineapple‑infused smoothies, often experiments in the kitchen using fresh Hallandale catch,
    yet occasionally trades healthy meals for late‑night chips and cola while meticulously noting favorite flavor combos in a sketch‑styled recipe journal.
  core: Franklin Agno blends quiet curiosity with disciplined artistry, swapping late‑night gaming marathons for early‑morning beach swims while hoarding mystery‑novel comics in a cluttered sketch‑filled
    backpack.
background:
  cultural: Franklin is a White American teen raised in Hallandale, a coastal community in Broward County, Florida. His family's background reflects a typical middle-class suburban upbringing with roots
    in European ancestry, while the multicultural tapestry of South Florida has exposed him to diverse cultural influences, especially the vibrant Latinx and Caribbean rhythms that shape the local music,
    cuisine, and community events. He celebrates mainstream American holidays such as Thanksgiving and the Fourth of July, and his school environment is a mix of students from various ethnic backgrounds,
    fostering his appreciation for varied perspectives. The proximity to the beach, the ever-present sunshine, and the region's arts-focused community centers have nurtured his love for visual arts and
    outdoor recreation.
