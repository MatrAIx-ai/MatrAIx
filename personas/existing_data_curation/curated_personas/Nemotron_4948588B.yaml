personas:
  professional: Shannon Campbell, an aspiring visual illustrator, blends strong drawing and digital illustration skills with a disciplined yet flexible work ethic, and they lead collaborative art workshops
    while envisioning graphic novels that weave environmental themes into every frame.
  sports: Shannon Campbell, an avid outdoor enthusiast, follows the Denver Broncos (NFL) and Colorado Avalanche (NHL) while hiking the Rocky Mountains with the Boulder Outdoor Club, practices yoga three
    times a week at the community YMCA, and plays pick‑up soccer with the Parker Youth Soccer League during the spring.
  arts: Shannon Campbell, a creative polymath, draws inspiration from Studio Ghibli’s whimsical animation, the speculative prose of Octavia Butler, the vibrant murals of Banksy, and the ethereal music of
    Billie Eilish, regularly attends community theater productions of 'Les Misérables' and 'Hamilton', and they channel this eclectic taste into digital illustrations that echo the bold colors of Frida
    Kahlo’s paintings.
  travel: Shannon Campbell, an adventurous teen explorer, plans trips around photo‑ops, having hiked the trails of Banff National Park and captured sunrise over Yosemite, while dreaming of backpacking through
    Iceland’s geothermal landscapes and strolling through Kyoto’s cherry‑blossom gardens, always balancing school deadlines with weekend itineraries.
  culinary: Shannon Campbell, a budding home chef, favors avocado toast topped with chili flakes, pesto pasta with freshly grated Parmesan, mango‑lime smoothies, and occasionally experiments with DIY tie‑dye
    cupcakes flavored with matcha and raspberry, often sourcing organic basil and heirloom tomatoes from the local farmer’s market.
  core: Shannon Campbell, a relentlessly curious 16‑year‑old, turns every idle moment into a sketch, hoards neon‑colored pens, forgets to eat when deep in a story, and channels that restless energy into
    vibrant art that mirrors their love for nature and community.
background:
  cultural: Shannon is a White American teen raised in Parker, a suburban community in Douglas County, Colorado. Her upbringing blends typical middle‑class suburban values with a strong appreciation for
    the outdoors that is characteristic of Colorado culture. She grew up attending local community events, library art programs, and school clubs that emphasize creativity and environmental stewardship.
    Family traditions include holiday gatherings, community service, and frequent outdoor recreation such as hiking, skiing, and camping. The region's progressive attitudes toward arts education and a supportive
    community of young creators have shaped her worldview, encouraging individuality, self‑expression, and active participation in local cultural life.
