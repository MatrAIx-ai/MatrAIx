  hobbies: '[''Sketching'', ''Digital Art'', ''Creative Writing'', ''Playing Guitar'', ''Photography'', ''Hiking'', ''Board Games'', ''DIY Crafts'', ''Community Theater Workshops'', ''Social Media Content
    Creation (TikTok/Instagram)'']'
  career_goals: Shannon aspires to become a professional illustrator and graphic novelist, aiming to study visual arts or animation at a reputable art school. She hopes to build a freelance career creating
    branding and concept art for local businesses and video game studios, while also curating a community art space in Parker. She wants to mentor younger students through creative workshops, integrate
    her love of nature into her artwork as an environmental illustrator, and eventually showcase her work in galleries and online platforms.
