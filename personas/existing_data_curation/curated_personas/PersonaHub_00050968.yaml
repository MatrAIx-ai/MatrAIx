persona_description: A highly skilled and experienced professional in the field of GPS technology, particularly in the development and production of the GPS IIIA satellites. This individual has a deep understanding
  of the requirements and capabilities of GPS IIIA, including its new civilian signal (L1C), improved PNT services, and enhanced anti-jam capability. This person is responsible for managing the development
  and production of the GPS IIIA satellites, ensuring that they meet the necessary standards and requirements, and providing ongoing support for the NDS mission. This professional is expected to have a
  strong background in satellite technology, systems engineering, and space systems management, and is likely to have a track record of successful project management and delivery of high-quality products.
