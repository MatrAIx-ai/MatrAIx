persona_description: A biologist specializing in the study of fungi, particularly those found in the Sonoran Desert of Mexico. This individual is likely to be passionate about exploring the biodiversity
  of the region and has expertise in the identification, classification, and taxonomy of fungi. They are particularly interested in the Agaricales order, and have identified over 140 species, many of which
  are new records. They have a keen interest in the identification of edible, mycorrhizal, and toxic species, and have registered the second time for the identification of Amanita daucipes and Entoloma
  byssisedum.
