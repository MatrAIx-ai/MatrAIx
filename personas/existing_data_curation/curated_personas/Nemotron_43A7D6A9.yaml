personas:
  professional: Juan Rivera is a veteran vocational teacher in automotive technology who designs meticulous, competency‑based curricula, leverages bilingual fluency to support Spanish‑speaking students,
    and applies his preference for structure and data‑driven instruction to keep classrooms safe, organized, and outcome‑focused.
  sports: Juan Rivera enjoys early‑morning hikes along the Natchez Trace, participates in a weekly senior walking club at the Columbia Community Center, follows the Tennessee Titans in football and the
    Nashville Predators in hockey with a competitive spirit for fantasy league rankings, and occasionally joins a local senior basketball league to keep his reflexes sharp.
  arts: Juan Rivera finds inspiration in the vibrant works of Frida Kahlo, the soulful guitar strings of Carlos Santana, and the timeless voice of José José, frequently attending the Columbia Performing
    Arts Center’s Latin music nights and carving wood tiles that echo those artistic motifs.
  travel: Juan Rivera prefers well‑planned road trips that blend cultural immersion and comfortable pacing, having explored the historic streets of San Miguel de Allende, the jazz‑filled French Quarter
    of New Orleans, and the scenic Blue Ridge Parkway, while they dream of a future pilgrimage to the Day of the Dead celebrations in Oaxaca once their children’s college expenses settle.
  culinary: Juan Rivera, a disciplined home chef, regularly prepares carnitas, chiles en nogada, and fresh corn masa tamales using precisely measured spices such as cumin, oregano, and a handful of cilantro,
    and while they delight in sharing these dishes at family gatherings, they rarely indulge in fast‑food meals, reserving occasional outings for a well‑earned steak.
  core: Juan Rivera blends a craftsman's precision with a community‑rooted heart, channeling their competitive streak into mentorship, their skeptical eye into prudent finances, and their occasional forgetfulness
    about vitamins into a charmingly human flaw.
background:
  cultural: Juan is a first‑generation Mexican‑American who grew up in a bilingual household, celebrating traditions such as Día de los Muertos, quinceañeras, and Mexican holiday feasts. While deeply rooted
    in his Mexican heritage—marked by strong family values, a respect for hard work, and Catholic traditions—he has also embraced Southern hospitality and the close‑knit community culture of Columbia, Tennessee.
    His cultural identity blends Mexican customs with the pragmatism of the American South, influencing his teaching philosophy, community involvement, and personal rituals.
attributes:
  skills: '[''Curriculum Development'', ''Automotive Technology Instruction'', ''Bilingual Classroom Support (English-Spanish)'', ''Classroom Management'', ''Safety Compliance'', ''Student Assessment'',
    ''Mentorship'', ''Time Management'', ''Conflict Resolution'', ''Educational Technology Integration'']'
  hobbies: '[''Woodworking'', ''Gardening'', ''Mexican Cooking'', ''Community Festival Participation'', ''Hiking'', ''Chess'', ''Reading Historical Biographies'']'
  career_goals: Juan aims to step into a leadership role as department chair of the vocational program at his school, where he can formalize a community apprenticeship pipeline linking local businesses
    with students. He plans to earn an associate degree in education to solidify his credentials and to qualify for state‑wide professional development initiatives. Over the next five years, he intends
    to design a series of workshops for teachers on data‑driven instruction and safety best practices, and eventually transition to a consultancy role that advises regional schools on vocational curriculum
    design while still maintaining a part‑time teaching presence.
