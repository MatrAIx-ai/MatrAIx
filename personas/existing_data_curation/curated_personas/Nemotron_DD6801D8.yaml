personas:
  professional: Shawn Mcqueen, a veteran welder and emerging metal artist, applies decades of MIG, TIG, and stick welding expertise, meticulous blueprint reading, and a talent for mentoring apprentices,
    while they channel their calm resilience and imaginative curiosity into workshop instruction and ambitious public‑art commissions.
  sports: Shawn Mcqueen stays active via Sunday fishing on the Chickasawhay River, a weekly senior softball league at the local community center, and cheering for the New Orleans Saints and the Atlanta
    Braves, while they occasionally join a low‑impact yoga class to ease joint stiffness.
  arts: Shawn Mcqueen immerses themselves in the blues legacy of B.B. King and the gospel harmonies of their church choir, showcases abstract metal sculptures at the Ellisville Arts Festival, and enjoys
    community theater productions starring local talent, all of which they view as extensions of their creative curiosity and storytelling tradition.
  travel: Shawn Mcqueen prefers road‑trip adventures that combine scenic fishing spots, like the Ozark lakes, with visits to historic music cities such as Memphis and New Orleans, planning trips around
    church holidays and budgeting for occasional overnight stays at rustic cabins, while they dream of a future pilgrimage to Florence to study Renaissance metalwork.
  culinary: Shawn Mcqueen delights in cooking fried catfish with hushpuppies, collard greens seasoned with smoked paprika, and a tangy jambalaya that they perfect using a cast‑iron Dutch oven, yet they
    sometimes over‑season dishes in their zeal to impress the church potluck crowd.
  core: Shawn Mcqueen balances a disciplined welding career with an unbridled love for abstract metal art, a habit of collecting stray bolts, and a surprisingly mellow temperament that rarely shows stress,
    even as they juggle workshop deadlines and church commitments.
background:
  cultural: Shawn grew up in Ellisville, a small town in rural Mississippi, where Southern hospitality, close‑knit community ties, and a strong work ethic shaped his worldview. His family roots trace back
    to generations of tradespeople and farmers, and he was raised with an appreciation for craftsmanship and self‑reliance. He is a lifelong member of a Baptist congregation, participates in local fish‑fries,
    church potlucks, and county fairs, and holds a deep respect for the region’s musical traditions, especially blues and gospel. This Southern cultural heritage, combined with his personal curiosity, informs
    his blend of practical skill and artistic imagination.
