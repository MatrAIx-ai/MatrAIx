  hobbies: '[''Metal sculpture creation'', ''Miniature model building'', ''Industrial and nature photography'', ''Fishing'', ''Community theater acting'', ''Church choir singing'', ''Volunteer restoration
    projects'', ''Reading science-fiction'', ''Hobbyist electronics tinkering'', ''Gardening'']'
  career_goals: Shawn aims to transition from full-time welding to a mentorship-focused role, offering workshops on artistic metalworking to local students and hobbyists. He plans to obtain a Certified
    Welding Inspector (CWI) credential and launch a part-time studio where he can produce and sell his abstract metal sculptures. He also hopes to collaborate on community public-art projects in Ellisville,
    preserving local heritage while exploring new design concepts. Ultimately, he envisions a phased retirement that balances steady income from consulting with the creative fulfillment of his artistic
    pursuits.
