personas:
  professional: An aspiring junior engineer who loves building LEGO rockets, Ahmad Mayo channels curiosity and practicality into designing mini contraptions, sharing projects in after‑school STEM clubs,
    while their outgoing nature drives them to demonstrate their creations, even as occasional worries about perfection lead to late‑night tinkering.
  sports: A devoted fan of the Carolina Panthers and the Clemson Tigers, Ahmad Mayo dribbles for the Aiken Youth Basketball League, scores goals with the community soccer club, and cycles around the neighborhood
    on weekends, showing assertiveness on the field yet often worrying about missing a goal.
  arts: An enthusiastic creator, Ahmad Mayo builds elaborate LEGO cities, draws vivid dinosaur‑space mashups, and dances to upbeat hip‑hop tracks by J. Cole and soulful gospel hymns from the local choir,
    while occasionally staying up late to re‑watch favorite animated movies like "Moana" for inspiration.
  travel: A curious explorer, Ahmad Mayo dreams of visiting the Space Center Houston and has already taken family road trips to Charleston’s historic district, preferring hands‑on museum tours over lounging,
    yet their allowance limits mean they often opt for local park adventures.
  culinary: A budding kitchen helper, Ahmad Mayo mixes flour, butter, and sugar to bake Southern‑style biscuits and decorates cupcakes with bright frosting, savoring collard greens and fried chicken at
    community picnics, while occasionally sneaking extra chocolate chips into batter despite parental reminders.
  core: Ahmad Mayo balances a boundless curiosity for rockets and LEGO with the worry of missing a goal on the soccer field, turning stress into late‑night sketches, while juggling allowance, biscuits,
    and a love for upbeat beats.
background:
  cultural: Ahmad grows up in a close‑knit African‑American family in Aiken, South Carolina. His family celebrates traditions such as Sunday church services, gospel music, and community picnics that often
    feature soul food dishes like collard greens and fried chicken. He hears stories about his grandparents’ experiences in the South, which reinforce values of perseverance, community support, and respect
    for elders. The local African‑American community organizes events like Juneteenth celebrations and youth mentorship programs, where Ahmad participates in group activities and learns about his cultural
    heritage. These influences shape his sense of identity, foster his sociable nature, and encourage him to give back to his neighborhood while maintaining pride in his cultural roots.
