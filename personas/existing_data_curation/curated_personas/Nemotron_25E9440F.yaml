  hobbies: '["Soccer", "Basketball", "Biking", "LEGO building", "Model rocket construction", "Reading about dinosaurs and space", "Educational tablet games", "Drawing and illustration", "Listening to and
    dancing to music (hip‑hop, R&B, gospel)", "Baking with family"]'
  career_goals: Although still young, Ahmad often talks about his future dreams. He is fascinated by space and technology and imagines becoming an astronaut or aerospace engineer who designs rockets and
    explores new worlds. At the same time, his practical side wants to see his community benefit, so he also expresses interest in becoming a civil engineer to help build safe playgrounds and community
    centers in Aiken. He values helping other children learn, so he sees himself as a future mentor or teacher who can explain complex ideas in fun, hands‑on ways. These goals reflect his blend of curiosity,
    practicality, and desire to make a positive impact while also seeking personal achievement.
