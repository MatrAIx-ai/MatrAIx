persona_description: A researcher and advocate for adults with autism, particularly those who face unemployment and lack of supported employment options. This person is interested in exploring the effectiveness
  of supported employment for adults with autism and the potential cost-effectiveness of this approach. They are also interested in exploring the latest research in cognitive enhancement therapy for adults
  with autism, particularly in relation to their cognitive impairments. Additionally, this person may be interested in exploring the potential link between mind-blindness and atypical patterns of brain
  activity in people with autism, and how this can inform the development of new interventions for adults with autism.
