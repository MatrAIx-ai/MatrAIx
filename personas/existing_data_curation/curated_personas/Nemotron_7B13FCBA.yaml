personas:
  professional: Geetha Trusty, a seasoned hairdresser who has spent over forty years mastering classic cutting, coloring, and updo techniques for mature clients, runs a meticulously organized small‑town
    salon where they combine precise consultations, disciplined inventory control, and mentorship of younger stylists while planning to transfer the business to a trusted apprentice and launch a niche line
    of grey‑hair care products.
  sports: Geetha Trusty, a devoted fan of the Chicago Cubs and Chicago Bears, participates in the local senior walking club that meets three times weekly at the community park, enjoys occasional gentle
    yoga classes at the senior center, and they prefer watching games at home with their husband rather than attending large crowds.
  arts: Geetha Trusty, an avid participant in their church choir and a lover of classic cinema, regularly revisits Agatha Christie mysteries, admires the works of painter Agnes Martin, cherishes the timeless
    songs of Ella Fitzgerald, and they often read the scripts of Alfred Hitchcock films while knitting a scarf.
  travel: Geetha Trusty, who favors well‑planned, low‑stress trips, has taken scenic drives to the historic town of Bath, explored the gardens of the English countryside, and they dream of a leisurely cruise
    along the Mediterranean, always ensuring a comfortable itinerary that accommodates their routine and health needs.
  culinary: Geetha Trusty, an enthusiastic home cook, delights in preparing their family's signature herb‑roasted chicken, buttery potato gratin, and apple pie using fresh vegetables from their garden and
    staples like rosemary, thyme, and locally sourced butter, while they often combine knitting afternoons with kitchen experiments.
  core: Geetha Trusty blends routine‑driven hair artistry, thrifty financial habits, and gentle health vigilance into a life marked by quiet competence, occasional skepticism, and a steadfast love for classic
    stories, choir hymns, and home‑grown meals, and they approach each day with a calm, methodical rhythm.
background:
  cultural: Geetha grew up in a midwestern white family with German‑English roots in rural Michigan. Her upbringing emphasized self‑reliance, hard work, and community involvement, values that are reflected
    in her practical approach to life and work. The local culture of Huron County, with its close‑knit neighborhoods, church activities, and appreciation for tradition, has shaped her preferences for routine,
    small gatherings, and a pragmatic, competitive spirit in her profession.
attributes:
  skills: '[''Hair Cutting'', ''Hair Coloring'', ''Updo Styling'', ''Perming'', ''Hair Care Consulting'', ''Product Recommendation'', ''Inventory Management'', ''Client Scheduling'', ''Basic Bookkeeping'',
    ''Mentoring Junior Stylists'']'
  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Reading classic mystery novels'', ''Church choir participation'', ''Small‑group Bible study'', ''Volunteering at senior center'', ''Watching classic
    films'', ''Cooking traditional family recipes'']'
  career_goals: Although approaching retirement age, Geetha is determined to preserve the reputation of her salon as a trusted community fixture. She aims to mentor a younger family member or apprentice
    to eventually hand over the business while maintaining high standards. She also wishes to develop a small line of hair care products tailored for older, grey‑hair clientele, leveraging her deep product
    knowledge. Ultimately, her ambition is to ensure the salon remains financially stable and continues serving the local community for years to come.
