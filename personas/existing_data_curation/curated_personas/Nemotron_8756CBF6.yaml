  career_goals: Randell dreams of becoming an astronaut because he is fascinated by space and science, but he also admires the practical heroism of firefighters and considers that as a future path. He aims
    to excel in school, especially in science and math, and hopes to build things that help others. His competitive streak drives him to set personal milestones, such as mastering new building kits and
    achieving high scores in educational games, while his practical side wants his future work to have a clear, useful purpose.
