personas:
  professional: Geoffrey Blankenship, a 32‑year‑old CNC woodworking specialist, leverages precise VCarve and Mastercam programming, rigorous equipment maintenance, and coordinated team scheduling to keep
    production on schedule, while their structured mindset and sociable nature help them mentor colleagues and pursue a supervisory role.
  sports: Geoffrey Blankenship stays active by playing in a local Los Angeles rec basketball league, cheering on the Lakers and Dodgers, and hiking the trails of Angeles National Forest each weekend, blending
    competitive drills with a practical routine of bodyweight strength work and occasional yoga to counteract the stiffness from long hours in the shop.
  arts: Geoffrey Blankenship nurtures his creative side by strumming acoustic guitar renditions of John Mayer and The Luminaries at family gatherings, attending live folk‑rock shows at the Hollywood Bowl,
    and drawing inspiration from the sculptural work of Auguste Rodin, which informs his decorative woodcarvings.
  travel: Geoffrey Blankenship plans trips with a pragmatic checklist, opting for weekend road‑escapes to places like Yosemite and the Oregon Coast while saving for a longer adventure to Japan’s countryside,
    balancing a love of nature hikes with the occasional spontaneous concert‑filled city break.
  culinary: Geoffrey Blankenship, an adept backyard grillmaster, relishes perfecting smoky chipotle ribs, cedar‑plank salmon with rosemary, and hand‑rolled corn‑tortilla tacos, often sourcing heirloom tomatoes
    and locally milled cornmeal to elevate weekend BBQs into small culinary experiments.
  core: Geoffrey Blankenship, a 32‑year‑old CNC woodworking enthusiast, balances structured precision at the shop with a sociable, grill‑centric weekend life, yet habitually neglects sleep after late‑night
    projects and can’t resist a good basketball rivalry.
background:
  cultural: Geoffrey comes from a multi‑generational Anglo‑American family rooted in the western United States. Raised in the suburban environment of Southern California, he was taught the value of hard
    work, reliability, and community involvement. His family’s modest, working‑class background emphasized practical skills and a hands‑on approach to problem solving, which aligns with his career in woodworking.
    While identifying as white, Geoffrey is attuned to the diverse cultural tapestry of Los Angeles County, regularly interacting with neighbors from varied ethnic backgrounds and participating in multicultural
    community events. He maintains a connection to his upbringing through regular attendance at a local Protestant church, where service and fellowship reinforce his cooperative and considerate nature.
attributes:
  skills: '["CNC machine setup and operation", "Blueprint and technical drawing interpretation", "Precision wood joinery", "Equipment maintenance and troubleshooting", "Safety compliance and OSHA standards",
    "Quality control and inspection", "CNC programming (VCarve, Mastercam)", "Basic CAD drafting", "Project scheduling and time management", "Team coordination and training", "Problem solving", "Customer
    communication and service"]'
  hobbies: '["Custom woodworking (furniture, carving)", "Home improvement projects", "Gardening", "Hiking in Angeles National Forest", "Community basketball league", "Local community events and fairs",
    "Grilling and culinary experimentation", "Playing acoustic guitar", "Attending live music concerts"]'
  career_goals: Geoffrey aims to advance from his current machine‑setter role to a supervisory position, eventually becoming a production manager overseeing a larger woodworking operation. He plans to earn
    a certified CNC machinist credential and deepen his expertise in advanced CNC programming to take on more complex custom‑furniture projects. Long‑term, he envisions launching his own boutique workshop
    that blends precision manufacturing with handcrafted design, allowing him to mentor apprentices and contribute to the local maker community.
