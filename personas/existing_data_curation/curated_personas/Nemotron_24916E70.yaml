  hobbies: '[''Community gardening'', ''Knitting and crocheting'', ''Walking and light exercise'', ''Gospel choir participation'', ''Book club reading (historical fiction, memoirs)'', ''Genealogy research'',
    ''Volunteer mentorship for youth'', ''Adult‑education classes on technology and sustainability'']'
  career_goals: Patricia aims to step into a senior supervisory or safety officer role before her planned retirement within the next three years, where she can lead safety initiatives, mentor younger workers,
    and drive continuous‑improvement projects. She also hopes to allocate more time to community service, becoming a coordinator for a local senior‑center outreach program that leverages her organizational
    skills to expand support for seniors and low‑income families in West Babylon.
