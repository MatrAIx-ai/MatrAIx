personas:
  professional: Abbie Gardner, an aspiring junior scientist who blends curiosity with practicality, channels their fascination for chemistry and engineering into building intricate LEGO sets, drafting detailed
    technical diagrams, and mastering hands‑on science kits while confidently leading family chess matches with a methodical approach.
  sports: Abbie Gardner, an energetic junior swimmer and member of the Tallahassee Titans youth soccer club, champions the Florida State Seminoles football team, spends Saturday mornings practicing freestyle
    laps at the city pool, and competes in local swim meets with a disciplined, competitive spirit.
  arts: Abbie Gardner, a creative tinkerer who draws detailed LEGO schematics and animates short Scratch movies inspired by Pixar’s Finding Nemo and Lin‑Manuel Miranda’s In the Heights, spends free afternoons
    listening to Taylor Swift’s pop hits and attending local screenings at the Tallahassee Film Festival.
  travel: Abbie Gardner, a nature‑focused explorer who plans family road trips with a detailed checklist, has already visited St. George Island and the Kennedy Space Center, dreams of kayaking the Everglades
    and visiting the marine exhibits in Montreal, and prefers itineraries that include beachcombing for shells and educational museum stops.
  culinary: Abbie Gardner, a budding cook who confidently assembles grilled shrimp po’boys with fresh Florida citrus slaw, whips up colorful fruit salads featuring ripe oranges and strawberries, and occasionally
    indulges in candy‑filled snack packs after long LEGO sessions, while proudly serving their family a glass of homemade sweet tea on summer evenings.
  core: Abbie Gardner, a methodical eight‑year‑old explorer, fuses relentless curiosity with a competitive streak, turning every science kit, LEGO set, and nature hike into a meticulously organized quest.
background:
  cultural: Abby lives in Tallahassee, Florida, where Southern tradition meets a vibrant university community. Her family celebrates typical American holidays such as Thanksgiving and the Fourth of July,
    often incorporating local customs like attending the Tallahassee Film Festival and participating in community park clean‑ups. The warm climate, nearby wetlands, and proximity to the Gulf Coast foster
    her love for nature, marine life, and outdoor exploration. Her school environment emphasizes environmental stewardship and offers extracurricular programs that reflect a blend of Southern hospitality
    and a growing appreciation for scientific inquiry.
attributes:
  skills: '["Organizational planning", "Reading comprehension", "Puzzle solving", "Basic coding (Scratch)", "Following detailed instructions", "Basic scientific observation", "Map reading"]'
  hobbies: '["Reading science books", "LEGO building", "Chess", "Nature walks", "Collecting rocks and shells", "Science experiment kits", "Drawing technical diagrams", "Sudoku puzzles"]'
  career_goals: Abby aspires to become an engineer or a marine biologist, combining her love of building things with a desire to protect the environment. She dreams of designing bridges or ocean‑friendly
    habitats that help sea life thrive. She is also intrigued by space exploration and hopes one day to work on projects that support astronaut missions. Her long‑term ambition includes sharing her knowledge
    by teaching small groups, fostering curiosity in other kids.
