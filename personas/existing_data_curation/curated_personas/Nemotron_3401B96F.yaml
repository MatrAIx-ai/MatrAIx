personas:
  professional: Juanita Jenkins is a data‑driven social worker who blends GIS mapping and statistical analysis with visual storytelling, leveraging their meticulous organization and imaginative flair to
    design evidence‑based community programs and compelling infographics for at‑risk families.
  sports: Juanita Jenkins enjoys jogging in the early mornings, occasional pick‑up basketball at the local community center, follows the Kent County Cougars minor league baseball team, and is a member of
    a weekend cycling club that rides the coastal trail during summer.
  arts: Juanita Jenkins spends evenings crafting digital paintings and generative art inspired by speculative sci‑fi writers like Octavia Butler and visual artists such as James Turrell, while attending
    local poetry slams featuring spoken‑word artists like Sarah Kay, and they regularly curate micro‑exhibitions on Instagram using tools like Processing and Blender.
  travel: Juanita Jenkins prefers meticulously planned solo trips that blend cultural immersion with night‑sky photography, having recently explored the desert landscape of Joshua Tree for astrotourism,
    the historic streets of Lisbon for tile‑mosaic art, and dreaming of a future expedition to the Atacama Desert for its unparalleled stargazing.
  culinary: Juanita Jenkins enjoys cooking experimental veg‑centric meals, often whipping up roasted heirloom carrots with harissa, quinoa bowls drizzled with tahini, and occasionally indulging in homemade
    ramen broth spiced with miso and kombu, while their garden supplies fresh basil and cherry tomatoes for these dishes.
  core: Juanita Jenkins is a visionary social innovator who weaves data, art, and community advocacy into a tapestry of resilient, future‑focused solutions, all while battling mild hypertension and a habit
    of obsessively perfecting midnight sketches.
background:
  cultural: Juanita is a second‑generation African‑American who was raised in the tight‑knit Black community of Dover, where family, church, and local activism have long shaped her worldview. Her grandparents
    were part of the civil‑rights movement in Delaware, instilling a deep appreciation for social justice and community resilience. Growing up, she participated in cultural traditions such as Juneteenth
    celebrations and church choirs, which fostered a strong sense of collective identity. These experiences, combined with the rich history of Black entrepreneurship and grassroots organizing in Kent County,
    influence her commitment to serve marginalized populations. Juanita incorporates elements of African‑American storytelling and Afrofuturist art into her work, using these cultural lenses to connect
    with clients and craft interventions that honor heritage while pushing toward innovative futures.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Statistical Analysis'', ''Program Evaluation'', ''Grant Writing'', ''Community Outreach'', ''Data Visualization'', ''Advocacy'', ''Cultural Competency'',
