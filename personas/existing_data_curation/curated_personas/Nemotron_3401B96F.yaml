  hobbies: '[''Digital Painting'', ''Generative Art'', ''Science Fiction Reading'', ''Creative Writing'', ''Puzzle Solving'', ''Strategy Board Games'', ''Urban Gardening'', ''Night Photography'']'
  career_goals: Juanita aims to advance to a senior program director role within a nonprofit or municipal agency, where she can design and implement data‑driven, arts‑infused interventions for at‑risk youth
    and families. She plans to pursue a master’s degree in social work or public administration within the next three years to deepen her clinical and policy expertise. Her long‑term ambition is to launch
    a community‑based organization that integrates technology, creative arts, and evidence‑based practice to address mental health disparities in underserved Black neighborhoods of Kent County. She also
    aspires to secure grant funding for innovative projects—such as a virtual‑reality safe‑space and an Afrofuturist youth art program—and to publish research on the impact of creative interventions on
    resilience.
