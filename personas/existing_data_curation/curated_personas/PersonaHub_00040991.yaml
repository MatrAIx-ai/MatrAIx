persona_description: A pioneering and influential psychiatrist and human rights activist who fought for children's rights and opened schools for autistic children, as well as a pioneer in the use of suggestion
  and a proponent of the legalization of cannabis for medicinal use. She also worked as a councillor and leader of the Psychiatric Hospital of Kashchenko in Moscow and was a pioneer in using the method
  of suggestion and fought for children's rights. She was born in South Africa and became the first woman to receive a Doctor of Medicine degree from the University of Cape Town in 1964. She headed the
  neurology department at Groote Schuur Hospital before retiring in 1985, but continued to lecture at Valkenberg and Alexandra Hospital. After apartheid was dismantled in 1994, she testified at the Truth
  and Reconciliation Commission about her work on the "Biko doctors" medical ethics inquiry. She was awarded the Star of South Africa, the country's highest civilian award, in recognition of her work on
  behalf of human rights.
