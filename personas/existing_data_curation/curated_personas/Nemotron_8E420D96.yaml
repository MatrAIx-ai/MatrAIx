  career_goals: Gandolfo dreams of turning his passion for visual storytelling into a career. In the short term, he hopes to earn a spot in a regional summer art program and build a portfolio that could
    win a scholarship to a specialized high‑school arts academy. Long‑term, he aims to study illustration or concept art at a university, eventually working as a freelance illustrator for graphic novels
    or video games. He also hopes to use his art to raise awareness about teen mental‑health, perhaps creating a web series or community workshops that combine drawing with coping‑skill education.
