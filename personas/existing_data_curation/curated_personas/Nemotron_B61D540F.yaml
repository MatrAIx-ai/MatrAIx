personas:
  professional: Alka Gupta is a budding architect of imagination, spending afternoons meticulously arranging colorful blocks in ordered towers before delightfully collapsing them into whimsical, unconventional
    structures, showcasing a balance of organization and spontaneous creativity while quietly preferring solo play and skeptically scrutinizing any new toy before incorporating it.
  sports: Alka Gupta enjoys the bright excitement of watching the Chicago Cubs on family movie nights and fiercely competes in a weekly preschool soccer session with the Little Bears Club at the local community
    center, preferring the quiet solitude of the swing set after the game.
  arts: Alka Gupta delights in the vivid illustrations of Eric Carle's books, especially 'The Very Hungry Caterpillar,' and revels in the gentle lullabies of Baby Mozart and the playful tunes of The Wiggles,
    often humming along while drawing with crayons, reflecting a deep appreciation for varied artistic experiences and an openness to unconventional creative ideas.
  travel: Alka Gupta loves short family outings to the nearby Great Lakes State Park's shore where the sand feels like a sensory playground, eagerly explores the interactive aquarium exhibits in Chicago,
    and dreams of a future adventure to Disneyland, all while traveling with a familiar stroller and a well‑worn plush bear that provides quiet comfort.
  culinary: Alka Gupta favors the smooth sweetness of mashed sweet potatoes, the bright tang of apple sauce, proudly helps stir banana pancake batter, but fiercely rejects broccoli, demonstrating a selective
    palate, a competitive streak when choosing meals, and a budding enthusiasm for kitchen participation.
  core: Alka Gupta is a meticulously curious two‑year‑old who builds solitary block fortresses, hoards marbles like a tiny treasure collector, competes fiercely with peers during play, and occasionally
    erupts into snack‑time meltdowns when denied favorite foods.
background:
  cultural: Alka comes from a South Asian family that traces its roots to India, likely speaking Hindi or Gujarati at home. Raised in the Bronx, she lives in a multilingual, multicultural environment where
    she participates in Indian festivals such as Diwali and Holi, enjoys traditional foods like naan and dal, and absorbs the rhythm of New York City life. This blend of South Asian heritage and urban American
    experience shapes her worldview, fostering an appreciation for both her cultural traditions and the diverse artistic expressions surrounding her.
attributes:
  skills: '[''basic bilingual language comprehension (English and Hindi)'', ''fine‑motor coordination (stacking blocks, crayon drawing)'', ''color and shape recognition'', ''early problem‑solving (simple
    puzzles)'', ''attention to solitary, quiet tasks'', ''organizing toys by category'']'
  hobbies: '[''scribble drawing with crayons'', ''building block towers'', ''reading picture books'', ''listening to classical and Indian music'', ''observing nature in Bronx parks'', ''collecting leaves
    and small objects'']'
  career_goals: While still a toddler, Alka imagines a future where she can blend her love of art, curiosity, and cultural heritage. She dreams of becoming a visual artist or museum educator who showcases
    South Asian art, or a researcher who explores how children learn through play. Her long‑term ambition is to create spaces—whether on a canvas or in an exhibition—where unconventional ideas are celebrated.
