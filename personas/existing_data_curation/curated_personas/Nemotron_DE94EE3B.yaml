personas:
  professional: Akshay Chhor, a retired senior engineer with deep expertise in mechanical systems, CAD‑driven product development, and renewable‑energy research, they channel their analytical mind into
    mentoring local high‑school STEM clubs, judging science fairs, and engineering a solar‑powered greenhouse prototype that blends rigorous design with heirloom gardening.
  sports: Akshay Chhor follows the St. Louis Cardinals baseball team and the St. Louis Blues hockey club with quiet loyalty, they participate in a senior walking group at Tower Grove Park each weekend,
    and they enjoy occasional low‑impact tai chi sessions at the community center to maintain flexibility.
  arts: Akshay Chhor immerses themselves in classical ragas like Bhairav and Yaman during evening stargazing, they attend local cultural festivals showcasing folk dances and traditional music, and they
    delight in crafting wooden sculptures that echo the aesthetic of revered artisans while listening to recordings by maestros such as Ravi Shankar and Shivkumar Sharma.
  travel: Akshay Chhor prefers low‑key, nature‑centric travel, they often plan weekend getaways to Big Bend’s Dark Sky Park for extended stargazing, scenic drives through Sedona’s red‑rock vistas, and cultural
    tours of historic garden estates in Savannah, all while balancing a modest travel budget and enjoying the companionship of their wife.
  culinary: Akshay Chhor, a competent home cook, they delight in preparing spiced lentil dal with fresh cilantro from their garden, aromatic turmeric‑infused biryani layered with heirloom carrots and saffron,
    and hand‑rolled dosas seasoned with mustard seeds and curry leaves, often experimenting with spice blends and occasionally hosting modest dinner gatherings for friends at the backyard.
  core: Akshay Chhor embodies a lifelong inquisitor who blends rigorous engineering precision with a laid‑back love for stargazing, heirloom gardening, and spontaneous woodworking projects, they occasionally
    misplace tools and forget appointments in favor of curiosity.
background:
  cultural: Akshay was raised in a South Asian (Indian) household where respect for elders, family cohesion, and celebration of festivals such as Diwali and Holi were central. Bilingual in English and Hindi,
    he carries forward the values of humility, hospitality, and community service. Living in St. Louis County for decades, he has blended his heritage with Midwestern sensibilities, participating in local
    volunteer groups, Indian diaspora events, and neighborhood activities. His cultural perspective emphasizes harmony, cooperative problem‑solving, and a balanced appreciation of tradition and innovation.
attributes:
  skills: '["Mechanical and systems engineering", "Product design and development", "CAD (SolidWorks, AutoCAD)", "Data analysis (MATLAB, Python)", "Renewable‑energy research", "Technical mentorship", "Woodworking",
    "Gardening design", "Community STEM outreach"]'
  hobbies: '["Stargazing", "Reading popular science", "Gardening heirloom plants", "Woodworking", "Cooking Indian cuisine", "Listening to Indian classical music", "Visiting the St. Louis Science Center",
    "Playing chess", "Solving puzzles", "Attending cultural festivals"]'
  career_goals: Although no longer in the formal workforce, Akshay aims to stay intellectually engaged and to give back to his community. He hopes to mentor high‑school and undergraduate students in STEM
    clubs, serve as a judge for local science fairs, and contribute articles to regional hobbyist magazines on sustainable design. He also dreams of completing a personal project that combines his engineering
    background with his love of gardening—a small, solar‑powered greenhouse prototype for neighborhood seniors. Learning emerging technologies such as AI‑assisted design remains a personal ambition, as
    does documenting his professional journey in a memoir for future generations.
