  hobbies: '[''Gardening (structured planting schedules)'', ''Book Club Facilitation'', ''Community Theater Volunteering'', ''Bird‑watching'', ''Hosting Dinner Parties'', ''Cooking Seasonal Meals'', ''Crossword
    Puzzles'', ''Knitting for Charitable Causes'', ''Historical Trail Walking'']'
  career_goals: Although officially retired, Regenia aims to leverage her expertise to expand STEM accessibility in the Grants Pass area. She plans to mentor high‑school students through a neighborhood
    science club, serve on the board of a local environmental nonprofit, and develop a series of participatory workshops that empower senior citizens to engage with technology and sustainability practices.
    She also hopes to author a memoir that highlights the evolution of women in STEM over the past six decades, using her story to inspire future generations.
