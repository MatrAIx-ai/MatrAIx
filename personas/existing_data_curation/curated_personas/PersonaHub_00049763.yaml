persona_description: A scientist with a background in paleontology, particularly focused on the study of soft tissue preservation and the dating of fossilized remains. They are interested in testing the
  hypothesis that the soft tissues found in fossils are not from bacteria but from original tissue, and are eager to falsify the millions-of-years interpretation of the age of these remains. They are also
  interested in the carbon dating of fossilized remains and the implications of finding recognizable mosasaur DNA, as well as the potential for discovering the source of the carbon. They are aware of the
  evidence that the fossil record does not represent millions of years of earth history, but rather thousands of years, and they are seeking to reconcile this with the Bible's straightforward history of
  just thousands of years.
