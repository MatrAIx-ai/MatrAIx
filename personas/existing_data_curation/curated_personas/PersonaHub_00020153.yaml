persona_description: A researcher who specializes in the study of mental health in lunar environments, particularly the mental health implications of working in a lunar settlement. His research interests
  include depression, social contagion, and the link between isolation and worker mental health. His work has been presented at the Rutgers Symposium on Lunar Settlements and he has been chosen as a principal
  investigator for NASA's Lunar Reconnaissance Orbiter Participating Scientist Program.
