persona_description: A researcher who studies the link between food stamps and obesity, particularly in the context of women's BMI. They are interested in the unintended consequences of the Food Stamp Program
  and the possible impact on America's obesity rate. They use data from the National Longitudinal Survey of Youth to conduct a study that compares the BMI of food stamp users to non-users. They are looking
  for evidence to support the idea that food stamps may be associated with weight gain, particularly among women. They are also interested in understanding why food stamps seem to lead to unhealthy eating
  practices.
