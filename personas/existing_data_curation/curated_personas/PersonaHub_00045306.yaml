persona_description: An Iraqi aquaculture expert who has recently returned from studying in the United States and is currently working at the General Board for Fish Resource Development. He is passionate
  about restoring the Mesopotamian marshes and increasing fish production through the use of marine aquaculture. He has a strong background in fisheries and aquaculture research, having previously worked
  on the acclimation and artificial reproduction of the native Barbus sp. at the Sewera central hatchery. He is currently collaborating with various scientific authorities to carry out research and studies
  on the desirable species in order to establish a functional hatchery for local fish species production. He is also interested in the use of marine fish farming in Iraq to increase the country's fish production.
