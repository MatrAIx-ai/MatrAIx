persona_description: A researcher in the field of paediatric oncology who is leading pioneering research aimed at tackling childhood brain tumours. He/she is part of the Newcastle University team, based
  at the Northern Institute for Cancer Research, and is using screening techniques to identify genetic and biochemical features of aggressive forms of the illness. The research is co-funded by a £2m grant
  from The Brain Tumour Charity and Children with Cancer UK, and a further £2m from other sources, including Great Ormond Street Hospital Children’s Charity. The research aims to develop tailored treatments
  for different groups of youngsters so that therapies which target specific tumour characteristics can be offered to those whose are identified as the most dangerous. The research is part of the INSTINCT
  network, which brings together the work of scientists and clinicians in the field of high-risk paediatric brain tumour.
