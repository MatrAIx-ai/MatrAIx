  career_goals: Ubaldo aims to transition from day-to-day troubleshooting to a senior advisory role where he can mentor junior analysts and lead strategic digital-transformation initiatives for community-focused
    organizations. He plans to earn an AWS Certified Solutions Architect credential and a PMP certification to formalize his expertise. Over the next five years, he hopes to spearhead a technology-literacy
    program for local seniors and immigrants, leveraging his compassionate nature to bridge the digital divide. While he values professional growth, he also seeks a balanced workload that reduces stress
    and allows ample time for family and personal pursuits.
