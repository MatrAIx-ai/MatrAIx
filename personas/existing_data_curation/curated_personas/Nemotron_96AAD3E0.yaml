  career_goals: Rufus dreams of becoming an engineer who designs fun, safe playgrounds and simple machines that help kids learn. He is also fascinated by wildlife and hopes to study biology so he can protect
    the natural areas near Longview. Combining his love for community and practical problem‑solving, he envisions a future where he can contribute to local projects, perhaps as a volunteer firefighter or
    a community‑service organizer, using his technical skills to make his town a better place.
