personas:
  professional: Rufus Thomas is a budding junior programmer who blends their love of LEGO construction with Scratch coding, using their curiosity and practicality to design simple interactive games while
    keeping their workspace organized and collaborating happily with school project teammates.
  sports: Rufus Thomas is an energetic member of the Longview Youth Soccer Association in the fall and the Longview Little League in the spring, idolizing the Dallas Cowboys on football Fridays and the
    Texas Rangers during baseball season, and they stay fit by daily after‑school drills, weekend fishing trips, and occasional pickup games with friends.
  arts: Rufus Thomas delights in strumming simple melodies on the piano—favoring tunes like "Twinkle, Twinkle Little Star" and a child‑friendly rendition of "Country Roads"—while devouring Rick Riordan’s
    Percy Jackson series and Mary Pope Osborne’s Magic Tree House, and they often sing along to country hits by Luke Bryan and classic pop from The Beatles during family gatherings.
  travel: Rufus Thomas prefers family‑oriented road trips that blend camping adventures at Caddo Lake with short stays in Dallas for a day at the Perot Museum, and they dream of a future trip to the Grand
    Canyon’s rim and a weeklong adventure at Disney World, always packing a well‑organized checklist thanks to their organized yet flexible nature.
  culinary: Rufus Thomas loves the smoky flavor of Texas‑style brisket and slathered BBQ ribs at weekend cook‑outs, enjoys tossing together homemade macaroni‑cheese with sharp cheddar and a dash of smoked
    paprika, and they often assist in grilling corn on the cob and assembling fish tacos with fresh cilantro and lime while mastering the art of the perfect chocolate chip cookie.
  core: Rufus Thomas's world is a vibrant mix of curiosity‑driven LEGO creations, organized allowance‑saving, and a boundless love for team sports and country tunes, balanced by a habit of constantly misplacing
    their soccer cleats yet they never miss a church barbeque.
background:
  cultural: Rufus grew up in Longview, Texas, a close‑knit East Texas community where Southern hospitality and Texas pride are prominent. His family celebrates traditional holidays with church gatherings,
    backyard barbecues, and the annual Gregg County Fair. He has been exposed to local customs like high school football Fridays, country music at family reunions, and weekend trips to nearby lakes for
    fishing. While his heritage is primarily of European descent, his upbringing includes respect for the diverse cultures present in Gregg County, fostering a cooperative and inclusive outlook.
