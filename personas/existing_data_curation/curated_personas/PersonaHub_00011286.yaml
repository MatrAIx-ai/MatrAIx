persona_description: A historian who specializes in the study of Aztec mythology and religion, particularly the roles and powers of the gods Itzamna and God D. His research interests include, but are not
  limited to, the history and evolution of Aztec religion, the interactions between Aztec gods and the Spanish conquest, and the cultural and social significance of Aztec mythology in pre-Columbian Mexico.
  He is particularly interested in the iconography and symbolism associated with the gods Itzamna and God D, and their roles as creators, rulers, and protectors of the Aztec people.
