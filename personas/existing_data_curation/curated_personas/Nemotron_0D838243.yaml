  career_goals: Although officially retired, David aims to stay mentally and physically sharp and to leave a tangible legacy. He wants to complete a series of small woodworking projects for his grandchildren,
    publish a family genealogy booklet, and volunteer his mechanical expertise at the local community center's repair workshop. He also hopes to organize an annual fishing competition that encourages sustainable
    practices, and eventually write a memoir recounting his life on Kentucky farms, highlighting the region's cultural heritage. Learning new digital tools, such as a tablet for photographing his projects,
    is also a personal ambition.
