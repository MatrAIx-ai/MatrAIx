personas:
  professional: An experienced fabricator and mentor, Son Wang leverages a strong mechanical aptitude, talkative charisma, and calm resilience to excel at CNC routing, laser cutting, and quality control,
    while driving lean‑manufacturing improvements and preparing for a supervisory role in a custom‑fabrication studio that blends art and precision.
  sports: Sporting pursuits keep Son Wang active; they hike the Pacifica coastal trail, cycle with the Peninsula Cycle Club, cheer for the San Francisco 49ers and Golden State Warriors, and join weekend
    pickup ultimate frisbee games that satisfy their sociable, talkative side.
  arts: Artistically, Son Wang frequents contemporary exhibitions at SFMOMA, revels in improv shows with BATS Improv where their talkative charm shines, strums a ukulele to covers of Jack Johnson and Jason
    Mraz, and draws inspiration from the visual abstractions of James Turrell and Kehinde Wiley for their hybrid design projects.
  travel: Travel style for Son Wang blends semi‑planned road trips with cultural immersion, having explored the dramatic cliffs of Big Sur, the sushi‑laden streets of Kyoto, the vibrant markets of Oaxaca,
    and the tech‑forward neighborhoods of Vancouver, while budgeting trips around workshop responsibilities and saving for an artist‑tech retreat.
  culinary: In the kitchen, Son Wang experiments with East Asian‑Western fusion, mastering dishes such as miso‑butter ramen, Korean‑style taco bowls with gochujang, and sushi‑burritos layered with avocado,
    fresh basil, and smoked salmon, cooking at an intermediate skill level and hosting intimate tasting gatherings that showcase inventive sauces and locally sourced produce.
  core: Son Wang is a calm, curious tinkerer whose talkative charisma fuels both workshop precision and spontaneous artistic gatherings, yet they sometimes overcommit socially and hoard spare parts.
background:
  cultural: Son Romeo Wang is of East Asian descent, born to immigrant parents who preserve traditional values of precision, respect for craftsmanship, and communal harmony. Growing up in California, he
    blends these cultural roots with the innovative spirit of Silicon Valley, resulting in a hybrid identity that values both discipline and creativity. Bilingual in Mandarin and English, Romeo participates
    in community events such as Lunar New Year festivals and shares his cultural heritage through cooking and storytelling. His East Asian background contributes to his calm resilience and focus, while
    his exposure to diverse Californian cultures nurtures his openness to unconventional ideas and artistic expression.
attributes:
  skills: '["CNC machine operation", "Technical blueprint reading", "Precision welding (MIG/TIG)", "Quality control inspection", "Lean manufacturing process optimization", "Troubleshooting production equipment",
    "OSHA safety compliance", "Technical documentation", "Team training and mentorship", "Effective communication and public speaking"]'
  hobbies: '["Visiting contemporary art galleries", "Attending improv theater", "Playing ukulele", "Fusion cooking for friends", "Arduino and robotics tinkering", "Hiking coastal trails", "Cycling the Peninsula",
    "Volunteering at maker spaces", "Reading speculative fiction and philosophy", "Board‑game nights"]'
  career_goals: Romeo aims to transition from a skilled assembler to a supervisory and strategic role within the fabrication industry. His short‑term goal is to obtain a certification in CNC programming
    and an associate degree in Mechanical Engineering Technology. Long‑term, he envisions becoming a shift supervisor and eventually a production manager, where he can implement sustainable manufacturing
    practices and lead cross‑functional teams that support Silicon Valley startups. He also dreams of launching a boutique custom‑fabrication studio that blends artistic design with precision engineering,
    offering prototyping services for local artists and tech innovators.
