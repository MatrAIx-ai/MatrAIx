persona_description: A researcher and advocate for biofuels, particularly in the Australian context. They are interested in the current research and development being undertaken to investigate potential
  new sources of biofuels and are familiar with the ethanol production industry in Australia, including the largest ethanol producer, Manildra distillery in New South Wales. They are aware of the current
  mandates for ethanol use in Australia and the potential for increased production capacity. They are also aware of the impact of the high Australian dollar on the manufacturing sector and the services
  sector, and the benefits of a strong and stable financial system in Australia. They are interested in the Australian economy and its growth, particularly in the resource and energy sectors. They are familiar
  with Australia's position in the world, its trade agreements, and its role in international trade forums.
