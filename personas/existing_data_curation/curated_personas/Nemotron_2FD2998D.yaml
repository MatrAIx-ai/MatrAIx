personas:
  professional: Alice Brown, a retired elementary school teacher turned community education champion, designs intergenerational reading circles, leads adult‑literacy workshops, and curates exhibitions at
    the Youngstown Arts Center, applying her decades of lesson‑planning expertise and a meticulous yet adaptable approach to volunteer leadership.
  sports: Alice Brown follows the Cleveland Browns and the Cleveland Guardians faithfully, joins a senior walking club that meets at Mill Creek Park every Thursday, participates in a local senior bowling
    league at the Youngstown Recreation Center, and enjoys occasional attendance at Youngstown State Penguins basketball games during the winter.
  arts: Alice Brown frequents the Butler Institute of American Art, draws inspiration from the photography of Ansel Adams and the paintings of Georgia O’Keeffe, volunteers to lead art‑appreciation talks
    that reference Andy Warhol’s pop‑culture critiques, and delights in community‑theater productions of classic American plays like ‘Our Town’.
  travel: Alice Brown prefers short‑haul journeys, having visited Mackinac Island’s horse‑drawn carriage tours, explored the historic streets of Savannah, Georgia, taken a guided trip to the Loire Valley’s
    châteaux, and regularly takes day trips to Cuyahoga Valley National Park, while planning a future pilgrimage to County Kerry to trace family roots, all within the constraints of her mobility and a fixed
    travel allowance.
  culinary: Alice Brown’s kitchen staples include fresh rosemary‑infused roasted potatoes, classic Irish soda bread, German chocolate cake, and her signature rhubarb crisp, and she enjoys brewing Earl Grey
    tea while plating dishes with garden‑picked basil and thyme, though she often forgets to turn off the oven after baking.
  core: Alice Brown blends a teacher’s organizational precision with a boundless curiosity, indulges in weekly quilting marathons, misplaces her reading glasses on the knitting basket, and nurtures a lifelong
    habit of learning through art, community, and modest adventures.
background:
  cultural: Alice was born and raised in Youngstown, Ohio, a former steel‑town in Mahoning County. Her family descends from German and Irish immigrants who settled in the region in the early 20th century.
    Growing up during the post‑World War II boom and witnessing the later industrial decline, she internalized values of resilience, community solidarity, and a strong work ethic. Her childhood household
    emphasized education, church involvement, and service to neighbors, shaping her lifelong commitment to teaching and volunteering. While she cherishes Midwestern traditions—seasonal festivals, potluck
    gatherings, and local sports—her curiosity drives her to explore broader cultural experiences, from avant‑garde art to global culinary traditions.
