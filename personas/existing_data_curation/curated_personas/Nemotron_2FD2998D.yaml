  career_goals: Although retired from formal employment, Alice aims to remain intellectually active and contribute to her community. She plans to enroll in evening courses on art history at the local community
    college, publish a memoir that intertwines her teaching experiences with personal reflections, and develop a digital archive of her family's genealogy. Additionally, she hopes to mentor youth in the
    Youngstown Arts Center by curating small exhibitions and to expand her volunteer work at the senior center by offering weekly art‑talk sessions. Her overarching ambition is to model lifelong learning
    for her grandchildren and leave a lasting cultural imprint in her hometown.
