persona_description: A university professor who has developed a new technology for monitoring bridges using electrical currents to detect structural damage, particularly strain and corrosion. His research
  has been instrumental in preventing catastrophic failures like the August 2007 collapse of the I-35 bridge in Minneapolis, Minn., that killed 13 people. He is currently working on integrating this technology
  with wireless sensors to create a comprehensive monitoring system for U.S. bridges.
