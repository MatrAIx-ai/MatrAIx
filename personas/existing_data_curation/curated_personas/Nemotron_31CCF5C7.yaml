  career_goals: Kimberly aims to move into a supervisory role within the next three years, pursuing a foreman certification and a journeyman carpenter credential to broaden her technical authority. She
    wants to leverage her natural sociability to become a site safety officer, championing proactive hazard identification and fostering a safety‑first culture. Long‑term, she envisions launching a small,
    employee‑owned contracting crew that focuses on community‑focused renovation projects, providing stable employment for local laborers while securing a reliable retirement income.
