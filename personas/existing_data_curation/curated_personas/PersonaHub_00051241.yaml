persona_description: An applied geophysicist and researcher with expertise in the study of elastic waves in stratified materials, particularly in the characterization of fractures and fractured reservoirs,
  materials science, and ultrasonic non-destructive testing. He has made significant contributions to the field of seismic anisotropy, including the investigation of transversely isotropic media, and has
  received the Conrad Schlumberger Award of the EAGE for his outstanding contributions to the scientific and technical advancement of the geosciences. He has worked at Schlumberger Doll Research and Schlumberger
  Cambridge Research, and has presented lectures on wave propagation in stratified geomaterials with fractures and anisotropy.
