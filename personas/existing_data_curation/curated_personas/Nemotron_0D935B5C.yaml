personas:
  professional: Jalen Groves, an 83‑year‑old retired hospitality manager turned senior advisor for the Marathon Historical Society, leverages their meticulous event‑planning and budget oversight expertise
    while they channel a sociable, harmony‑seeking demeanor to orchestrate community heritage exhibitions that run as smoothly as a well‑rehearsed jazz set.
  sports: Jalen Groves stays active through daily sunrise walks along the Atlantic trail, weekend fishing outings and seasonal birdwatching, while they cheer for the Miami Marlins and the Tampa Bay Rays
    on television and occasionally join the Marathon Senior Softball League and the Florida Keys Senior Sailing Club, embodying a relaxed yet disciplined approach to fitness that balances low‑impact cardio
    with community‑oriented team play.
  arts: Jalen Groves channels a lifelong love for music and visual art by painting vibrant seascapes inspired by the turquoise Keys waters, performing saxophone solos in a senior jazz ensemble that interprets
    Duke Ellington and Louis Armstrong, and attending gallery openings that showcase works by Georgia O’Keeffe and local Caribbean artists, all while they regularly discuss the lyrical storytelling of Maya
    Angelou’s memoirs with fellow art‑walk participants.
  travel: Jalen Groves meticulously plans each journey, from annual pilgrimages to civil‑rights landmarks such as Selma and the national museum of civil‑rights history in Washington, D.C., to leisurely
    cruises through the Bahamas and Cayman Islands for marine photography, balancing a love of historical immersion with a relaxed island vibe while they carefully budget travel expenses to accommodate
    their health considerations.
  culinary: Jalen Groves enjoys a seasoned kitchen routine, skillfully preparing shrimp étouffée, conch fritters, and key‑lime pie using fresh cilantro, culantro, and locally sourced lime zest, while they
    relish occasional evenings at waterfront bistros for stone‑crab claws and a glass of chilled Riesling, yet they sometimes forget to clean the grill after a weekend barbecue, reflecting a passionate
    palate tempered by occasional domestic oversight.
  core: Jalen Groves, an 83‑year‑old community historian with a jazz‑filled heart and razor‑sharp organizational skills, consistently pursues harmony and high standards while a lingering streak of worry
    often colors their otherwise upbeat outlook.
background:
  cultural: Jalen was born in the Deep South during the height of the civil‑rights movement, growing up in a close‑knit African‑American community steeped in church music, oral storytelling, and a strong
    sense of mutual support. Relocating to Marathon in the Florida Keys in his forties, he absorbed the region's multicultural tapestry, merging Southern heritage with Caribbean rhythms, maritime traditions,
    and a vibrant tourist culture. His Black identity, shaped by both segregation-era challenges and later integration, informs his commitment to preserving cultural memory, fostering intergenerational
    bonds, and championing community harmony.
attributes:
  skills: '[''Event Planning'', ''Budget Management'', ''Volunteer Coordination'', ''Community Outreach'', ''Public Speaking'', ''Mentorship'', ''Art Appreciation & Curation'', ''Storytelling & Oral History
