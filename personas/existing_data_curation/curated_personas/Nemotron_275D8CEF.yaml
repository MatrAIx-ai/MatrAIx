  hobbies: '[''Attending art exhibitions and theater productions'', ''Weekly improv comedy classes'', ''Group fitness (Zumba, spin)'', ''Abstract acrylic painting'', ''Exploring experimental restaurants
    and pop‑up food events'', ''Hiking in Red Rock Canyon with friends and family'', ''Volunteering at youth arts programs'', ''Socializing at live music venues'']'
  career_goals: Elizabeth aims to transition from floor supervision to store management within the next two years, targeting a managerial role that allows her to shape the overall customer experience and
    drive strategic sales growth. Long‑term, she envisions becoming a district manager overseeing multiple Las Vegas locations, where she can implement innovative, experience‑focused retail concepts that
    blend technology, art, and entertainment. She is also interested in pursuing certifications in retail management and visual merchandising, and eventually launching a boutique consulting firm that helps
    independent retailers create immersive in‑store environments. Additionally, she hopes to mentor aspiring retail leaders, especially women, through corporate training programs and community workshops.
