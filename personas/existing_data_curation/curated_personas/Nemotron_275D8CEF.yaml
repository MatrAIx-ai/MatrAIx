personas:
  professional: Elizabeth Marouf, a 33‑year‑old first‑line supervisor in a bustling Las Vegas retail flagship, blends a razor‑sharp eye for visual merchandising with a competitive, data‑driven approach
    to sales, using AI‑powered inventory forecasts and POS analytics to out‑perform targets while mentoring a team of up to 25 associates toward future store‑manager roles.
  sports: Elizabeth Marouf fuels her high‑energy lifestyle with group Zumba and spin classes at a downtown studio, hikes Red Rock Canyon every weekend with her husband and friends, and roots for the Las
    Vegas Golden Knights and the Raiders while occasionally joining a co‑ed ultimate frisbee league that satisfies her competitive streak.
  arts: Elizabeth Marouf immerses herself in the Las Vegas arts scene, attending monthly exhibitions featuring Yayoi Kusama installations, catching live shows at The Smith Center starring Lin-Manuel Miranda,
    performing improv at a local comedy club, painting abstract acrylics inspired by Jackson Pollock, and mentoring teen artists through a community youth‑arts program.
  travel: Elizabeth Marouf prefers curated weekend getaways that blend adventure and culture, having explored New York’s Broadway district, the red‑rock landscapes of Sedona and Zion, and a culinary tour
    of Portland, while her bucket list includes a sunrise hike in Patagonia, a tea‑ceremony retreat in Kyoto, and a road trip along the Pacific Coast Highway.
  culinary: Elizabeth Marouf delights in experimental cuisine, often ordering beet‑infused carbonara, matcha‑glazed salmon, and black‑garlic ramen at pop‑up restaurants, while at home she recreates a spicy
    mole‑chocolate sauce using dried chilies, cacao nibs, and roasted pumpkin seeds, boasting a moderate cooking skill level that shines in her signature avocado‑miso toast.
  core: Elizabeth Marouf, a 33‑year‑old retail leader, merges a competitive drive with a voracious appetite for abstract art, high‑octane group workouts, and experimental dining, yet occasionally sacrifices
    sleep for late‑night improv gigs and lets a nightly skincare routine slip.
background:
  cultural: Elizabeth identifies as a white American, raised in a suburban Midwestern town before moving to Las Vegas for work. Her upbringing emphasized community involvement, self‑reliance, and a strong
    work ethic, values that align with the practical, service‑oriented culture of retail. Living in Las Vegas has exposed her to a melting pot of cultures, high‑energy entertainment, and a tourism‑driven
    economy, shaping her appreciation for flamboyant aesthetics and the importance of creating memorable customer experiences. She embraces the city's blend of glamour and everyday pragmatism, while also
    maintaining traditions from her family background, such as celebrating holidays with close relatives and participating in local volunteer initiatives.
