personas:
  professional: Kristine Brennan, a budding early‑childhood educator in training, keeps her building blocks sorted by shape and color and insists on a strict bedtime schedule, showcasing her natural love
    for structure and predictability.
  sports: Kristine Brennan, a lively three‑year‑old who idolizes her city’s major league baseball team and proudly wears a miniature cap while sprinting in weekend toddler soccer sessions with the Little
    Trotters club, displays a competitive streak even in playtime.
  arts: Kristine Brennan, who delights in the melodic chants of Raffi and the bright illustrations of Dr. Seuss, spends afternoons drawing with Crayola markers while humming 'Baby Beluga', making the arts
    a central, soothing part of her day.
  travel: Kristine Brennan, whose family adventures include a sunlit weekend at a nearby seaside resort and a magical day trip to Disneyland in California, prefers short, predictable itineraries with familiar
    routines and always brings her beloved stuffed bunny for comfort.
  culinary: Kristine Brennan, a tiny gourmand who adores chicken nuggets, mac and cheese, and apple slices, proudly stuffs a small fork into the kitchen cabinet after helping her mom stir honey‑glazed carrots,
    yet has a habit of sneaking a cookie before dinner.
  core: Kristine Brennan, a three‑year‑old who balances a love for tidy routines, competitive sandbox games, and quiet solo moments, cultivates an organized yet surprisingly spontaneous little mind, complete
    with a secret stash of pennies and a habit of hiding snacks.
background:
  cultural: Kristine is raised in a white Southern family in Cookeville, Tennessee. Her family participates in local community events, church gatherings, and traditional Southern holidays. Sunday brunches,
    country music, and occasional trips to the county fair are part of her cultural upbringing, providing a blend of modest, community‑oriented values with a focus on family rituals.
attributes:
  skills: '[''Pattern‑based block building'', ''Simple puzzle solving'', ''Shape and color sorting'', ''Basic self‑care (dressing, feeding)'', ''Early language articulation'', ''Following daily routines'']'
  hobbies: '[''Block building'', ''Drawing and coloring'', ''Listening to storybooks'', ''Nature walks'', ''Simple matching games'']'
  career_goals: Kristine often talks about wanting to become a teacher who organizes a classroom the way she likes her play area, or a veterinarian who takes care of animals in a practical, hands‑on way.
    Her aspirations reflect a desire for structured, purposeful roles where she can apply her competitive spirit and love for clear routines.
