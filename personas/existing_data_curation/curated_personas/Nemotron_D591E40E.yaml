  career_goals: In his early seventies, Michael aims to shift from full‑time auditing to part‑time consulting, offering his expertise to local small‑business owners and nonprofit organizations. He is passionate
    about mentoring the next generation of accountants through informal coaching sessions and guest lectures at community colleges. Michael also seeks to volunteer as a financial trustee for a local arts
    charity, helping to oversee budgets while integrating his love for the arts into fundraising events. Additionally, he hopes to author a guidebook on financial wellness for seniors, combining his professional
    knowledge with his desire to give back to his age cohort. Ultimately, Michael wants his legacy to reflect both fiscal responsibility and cultural enrichment within his community.
