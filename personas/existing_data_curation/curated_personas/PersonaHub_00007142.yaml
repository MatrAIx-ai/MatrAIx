persona_description: A systems engineer who specializes in the design and analysis of electronic systems, particularly in the field of audio and audio processing. They have experience breaking down complex
  systems into smaller, more manageable components and designing and testing individual components. They are familiar with the use of schematics and circuits to represent and analyze systems, and have experience
  using microphones, amplifiers, and speakers to create and test audio systems. They are skilled at using signal flow diagrams to represent the flow of signals in a system and are comfortable with the use
  of +V and GND symbols to represent the voltage levels in a circuit.
