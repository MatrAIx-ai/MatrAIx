  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Reading Science Fiction'', ''Exploring Multicultural Cuisine'', ''Yoga'', ''Meditation'', ''Hiking in Everglades'', ''Attending Tech Meetups'',
    ''Board Games'', ''DIY Home Décor Projects'']'
  career_goals: Lisa aims to transition from a general administrative assistant to a senior project coordinator or office manager within a STEM‑focused organization, such as a biotech research lab or a
    tech startup. She plans to leverage her technical background by earning a Project Management Professional (PMP) certification and taking advanced courses in data analytics. Over the next five years,
    she hopes to lead a small team, oversee cross‑functional projects, and introduce innovative workflow solutions that increase efficiency. Ultimately, she envisions a role where she can act as a bridge
    between scientific staff and executive leadership, shaping strategic initiatives while maintaining the flexibility she values. Her competitive nature motivates her to exceed performance metrics, earn
    recognition, and mentor other women of color entering STEM fields.
