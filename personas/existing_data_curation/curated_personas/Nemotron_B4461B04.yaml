personas:
  professional: Lisa Akal transforms administrative tasks into strategic assets for a biotech lab, employing Python for data automation, coordinating cross‑functional meetings, and they mentor emerging
    talent despite a habit of letting paperwork pile up until deadlines force laser‑focused execution.
  sports: Lisa Akal avidly follows the Miami Heat and the Florida Panthers, joins weekend hike groups in the Everglades, and participates in community yoga sessions, though their competitive streak occasionally
    pushes them to skip a gentle swim in favor of a more vigorous trail run.
  arts: Lisa Akal spends Saturday afternoons in the Overtown arts district, sketching bustling street scenes while drawing inspiration from artists like Kerry James Marshall and reading Octavia Butler’s
    science‑fiction, and they eagerly discuss contemporary Black art at local gallery openings.
  travel: Lisa Akal prefers spontaneous, budget‑friendly road trips to nearby gems like Key West and the Bahamas, often planning itineraries on a whim via travel apps, while dreaming of an extended cultural
    immersion in Jamaica’s reggae festivals and culinary tours.
  culinary: Lisa Akal blends Southern comfort food with Caribbean flair, regularly cooking collard greens seasoned with scotch bonnet peppers and jerk‑spiced chicken, yet their moderate cooking skill leads
    them to rely on quick‑fire online videos and occasionally over‑salt dishes.
  core: Lisa Akal is a curious, competitively driven project coordinator who balances disciplined ambition with a relaxed, occasionally disorganized approach to life, finding harmony through yoga, art,
    and spontaneous adventures.
background:
  cultural: Lisa is an African‑American woman raised in South Florida, where she grew up surrounded by a rich tapestry of Black cultural traditions, Caribbean influences, and the vibrant diversity of Broward
    County. Her family emphasized the importance of education and perseverance, encouraging her to pursue a STEM degree despite being under‑represented in the field. This background gave her a strong sense
    of community and a commitment to uplift other Black professionals. She celebrates cultural milestones such as Juneteenth and Black History Month, and she participates in local church and community events
    that combine music, storytelling, and activism. Lisa’s culinary tastes reflect a blend of Southern soul food and Caribbean dishes, a nod to the multicultural neighborhoods she frequents. Her cultural
    identity informs her curiosity about diverse perspectives, her competitive drive to succeed in traditionally white‑dominant spaces, and her desire to mentor the next generation of Black students in
    STEM.
attributes:
  skills: '[''Calendar Management'', ''Email Correspondence'', ''Microsoft Office Suite'', ''Google Workspace'', ''Data Entry'', ''Basic Python Programming'', ''Statistical Analysis'', ''Technical Documentation
