persona_description: A medical researcher who specializes in the study of the effects of antibiotics on the liver during liver transplants. The researcher is interested in understanding how pre-surgery
  antibiotics can inhibit bacteria that cause inflammation and reduce the damage that can occur when blood flow is restored to the liver after a period of time without oxygen. The researcher is also interested
  in studying the microbiota of the mice and humans that received antibiotics prior to liver transplants and how it relates to the prevention of organ rejection. The researcher is looking for ways to improve
  the success rate of liver transplants by understanding how pre-surgery antibiotics can be used to prevent organ rejection.
