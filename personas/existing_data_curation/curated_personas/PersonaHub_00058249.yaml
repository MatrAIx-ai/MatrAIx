persona_description: A public health official or epidemiologist who specializes in the investigation and control of infectious diseases, particularly those caused by the bacterium Yersinia pestis, also
  known as the cause of plague. This individual has extensive experience working in the United States, particularly in the western region, and has a strong background in epidemiology and laboratory diagnostics.
  They are knowledgeable about the epidemiology and clinical features of human plague, including the potential for differentials and the importance of early detection and treatment. They have experience
  with the outbreak investigation process and have worked with various infectious disease surveillance systems.
