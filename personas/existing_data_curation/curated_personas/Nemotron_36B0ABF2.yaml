    acoustic guitar'']'
  career_goals: Michael wants to turn his hands‑on curiosity into a stable trade. He plans to enroll in a community‑college apprenticeship program in HVAC or automotive technology, aiming to earn certification
    within two years. At the same time, he is exploring freelance web‑design gigs to combine his practical skills with his interest in digital media. His competitive streak drives him to become the top
    technician in his cohort, and he hopes to eventually open his own small service shop that offers both mechanical repairs and basic tech support, giving him the flexibility to set his own schedule.
