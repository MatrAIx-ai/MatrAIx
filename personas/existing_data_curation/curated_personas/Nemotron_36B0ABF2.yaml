personas:
  professional: Michael Yancey, a 21‑year‑old aspiring HVAC technician with a knack for dismantling small engines, troubleshooting Windows PCs, and whipping up quick HTML landing pages, channels his competitive
    drive into mastering trade certifications while often juggling multiple DIY projects in a delightfully disorganized but results‑focused manner.
  sports: Michael Yancey spikes up the Hill Country on Saturday mornings with the San Antonio Trail Runners, fervently cheers for the Texas Longhorns football and San Antonio FC soccer club, and balances
    his competitive gaming reflexes with weekend hikes as his primary fitness routine.
  arts: Michael Yancey, a 21‑year‑old graphic‑novel enthusiast, devours the works of Alan Moore and Brian K. Vaughan, tunes in to sci‑fi podcasts like Hard Core History and The Expanse while strumming John
    Mayer chords on his acoustic guitar, and drops occasional video edits of his favorite scenes to share with his online community.
  travel: Michael Yancey prefers spontaneous road trips over elaborate itineraries, often packing a cooler and hitting the Texas Hill Country’s Pedernales Falls or the ghost town of Marfa on a whim, while
    dreaming of a future pilgrimage to Tokyo’s Akihabara district for a gaming convention and a culinary tour of ramen stalls.
  culinary: Michael Yancey balances his novice but ambitious kitchen skills by perfecting a coffee‑infused brisket rub, mastering smoked ribs with a secret blend of smoked paprika and brown sugar, and occasionally
    indulging in a nacho platter topped with queso fresco and jalapeños after a long gaming session.
  core: Michael Yancey, a competitive‑spirited 21‑year‑old who swaps control‑pad victories for welded wrenches, thrives on the rush of a hard‑earned certification while habitually misplacing his tools in
    the back of a BBQ grill.
background:
  cultural: Michael grew up in a suburban neighborhood of San Antonio where Texan traditions blend with a multicultural city vibe. His family celebrates classic Texas holidays—fourth‑of‑July cookouts, Thanksgiving
    feasts, and local county fairs—while also appreciating the diverse food and music scene of the region. Though his ancestry is primarily European (German and Irish roots), he has been exposed to Spanish
    language and Hispanic cultural festivals common in Bexar County, giving him a broad, inclusive outlook. He identifies with a laid‑back, independent Texan ethos, valuing self‑reliance, community camaraderie,
    and a love of the outdoors.
attributes:
  skills: '[''mechanical repair'', ''DIY home projects'', ''basic HTML/CSS'', ''computer troubleshooting'', ''social media content creation'', ''customer service'']'
