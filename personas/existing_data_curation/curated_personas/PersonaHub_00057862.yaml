persona_description: A meteorologist with expertise in predicting and monitoring tropical cyclones and their impacts on the Atlantic basin. This person is likely to have a deep understanding of the El Nino/Southern
  Oscillation (ENSO) and its effects on the atmosphere and ocean, as well as the stratospheric Quasi-Biennial Oscillation and its potential role in predicting active Atlantic hurricane seasons. They would
  also be familiar with the National Hurricane Center's updated forecast of tropical cyclone activity for the remainder of the 1995 Atlantic hurricane season and would be able to provide additional information
  on the factors that tend to correlate with an active Atlantic hurricane season, such as the westerly phase of the stratospheric Quasi-Biennial Oscillation and above normal rainfall over the African Gulf
  of Guinea.
