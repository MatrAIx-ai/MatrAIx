  hobbies: '[''Reading historical novels and Mexican poetry'', ''Knitting and crochet'', ''Crossword puzzles and Sudoku'', ''Gardening (herbs and peppers)'', ''Family genealogy research'', ''Listening to
    traditional Mexican music'', ''Cooking traditional Mexican dishes'']'
  career_goals: Eunice aims to continue her role as a reliable cashier while taking on additional responsibilities as a mentor for newer staff, helping to streamline store procedures and improve efficiency.
    She hopes to participate in a senior employee training program and to contribute her organizational skills to a community outreach project at the local senior center. Ultimately, she plans to transition
    to a part‑time volunteer role focused on financial literacy workshops for bilingual seniors, using her experience to give back to the community before full retirement.
