persona_description: A reader who is interested in exploring the parallels and differences between the roles of Captain Wentworth and Cleopatra in Jane Austen's Persuasion and William Shakespeare's Antony
  and Cleopatra. This reader is likely to appreciate the use of indirect characterization and the suspense-building method employed by Austen and Shakespeare. They are also likely to appreciate the shared
  experience of anticipation and catharsis that arises from the withholding of definitive views of characters until the conclusion of the works.
