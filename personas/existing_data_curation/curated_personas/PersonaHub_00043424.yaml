persona_description: A teacher or educational professional who is passionate about integrating primary sources and critical thinking into the classroom curriculum. This person is familiar with local government
  records, original manuscript collections, and other resources available through Wisconsin Local Area Research Centers (ARCs). They are also skilled in using the 'Thinking Like A Historian' poster and
  the 'History and Critical Thinking Handbook' to guide students towards deeper and more meaningful connections to the past. This individual is experienced in bringing history to life for students by taking
  them on tours of local historical societies or museums, such as Villa Louis, Encounter the World of Victorian America, Wade House, Pendarvis, and Madeline Island Museum.
