persona_description: A healthcare professional who is knowledgeable about the diagnosis, treatment, and prevention of hepatitis C, a chronic liver disease caused by the hepatitis C virus. They have experience
  in performing liver function tests, drawing blood samples for hepatitis C antibodies, diagnosing chronic hepatitis with a liver biopsy, and managing patients with hepatitis C through postexposure treatment
  and avoiding high-risk behaviors. They are aware of the long-term effects of chronic hepatitis C and the risks to others, including the spread of the virus through blood products and personal hygiene
  items.
