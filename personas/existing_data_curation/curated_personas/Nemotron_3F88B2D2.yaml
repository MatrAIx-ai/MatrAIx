  career_goals: August aims to become a senior engineering leader within the next five years, targeting a role as a principal engineer or engineering manager overseeing multidisciplinary teams. He plans
    to obtain his Professional Engineer (PE) license and pursue an MBA to blend technical expertise with strategic business acumen. He is driven to lead large-scale manufacturing projects that emphasize
    efficiency, sustainability, and reliability, and eventually hopes to start his own consultancy focused on lean engineering solutions for mid-sized firms.
