persona_description: A Supply Chain Technology Education professional who is passionate about developing cutting-edge two-year certificate programs that prepare students to operate and maintain advanced
  supply chain technologies. They are dedicated to addressing the industry's need for skilled supply chain technicians, particularly in the logistics sector, and are committed to meeting the industry's
  demand for family-supporting jobs, supporting the U.S. Department of Defense as it seeks to replace retiring employees, and increasing workforce diversity by recruiting underserved populations such as
  women, minorities, and veterans. They are skilled in developing career pathways for supply chain technicians and are experienced in collaborating with private and public sector supply chains, implementing
  model supply chain technology programs nationwide through existing high school/community college partnerships, increasing faculty participation in supply chain technology professional development, disseminating
  supply chain technology education "best practices," including standardized training materials, and designing academic programs across the entire supply chain technology spectrum. They are also skilled
  in moving students seamlessly from high school through community college to a four-year institution—and then into the workplace.
