  career_goals: Ralph frequently talks about becoming a space explorer or astronaut who can visit distant planets, an artist who creates whole worlds on canvas, or an inventor who designs new toys and friendly
    robots. He also imagines helping people as a firefighter or doctor, but his strongest ambition is to combine his love of science and art by building inventions that explore the stars and make everyday
    life more fun for his friends.
