  career_goals: Elvira aims to move from a front‑line mover role into a supervisory position, such as a shift lead or logistics coordinator, within the next three to five years. She plans to earn certifications
    in forklift operation, OSHA safety, and supply‑chain fundamentals through community‑college courses. Long‑term, she dreams of launching her own small‑scale moving and freight service that leverages
    her people‑skills and practical knowledge, while also providing mentorship opportunities for other young workers in the Dallas area.
