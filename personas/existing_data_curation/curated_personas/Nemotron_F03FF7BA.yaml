personas:
  professional: Claudelle Hankerson, a meticulous humanities graduate with a knack for curating inclusive exhibitions, leverages their analytical research skills and project‑management mindset to design
    museum programs that weave together historical depth and community relevance.
  sports: Claudelle Hankerson, a disciplined yet solitary fitness enthusiast, sticks to a morning yoga routine at Brooklyn Yoga Collective, jogs along the Brooklyn Heights Promenade during spring, and watches
    the Brooklyn Nets and New York Yankees for a brief escape from their analytical routine, occasionally cheering for the Knicks during the NBA playoffs.
  arts: Claudelle Hankerson, an avid patron of Brooklyn’s intimate galleries, finds inspiration in the intricate installations of Yayoi Kusama, the narrative photography of Gordon Parks, and the soulful
    jazz of Nina Simone, often ending evenings with a quiet documentary by Ava DuVernay to deepen their understanding of visual storytelling.
  travel: Claudelle Hankerson, a methodical traveler who plans each itinerary in a spreadsheet, prefers cultural immersion over spontaneous adventures, has explored the historic museums of Washington, D.C.,
    savored Southern cuisine in New Orleans, and now dreams of a meticulously organized literary pilgrimage to Dublin and a curated art tour of Kyoto’s traditional tea houses.
  culinary: Claudelle Hankerson, a cautious yet curious home cook, regularly prepares Southern comfort staples such as shrimp‑and‑grits, collard greens seasoned with smoked paprika, and peach cobbler, while
    experimenting with heirloom ingredients like sweet potato and bourbon‑infused glaze, and seeks out farm‑to‑table eateries that serve ethically sourced brisket and fresh cornbread.
  core: Claudelle Hankerson blends a relentlessly organized mind with a quiet, introspective soul, channeling their anxiety into meticulous curation while secretly hoarding vintage literary magazines and
    obsessively color‑coding their daily to‑do lists.
background:
  cultural: Claudelle is African American, with deep roots in both the Southern Black tradition and the vibrant cultural mosaic of Brooklyn. Her mother grew up in rural Georgia, bringing oral storytelling,
    gospel music, and Southern culinary heritage into the household, while her father was born and raised in Brooklyn’s historically Black neighborhoods. Raised in a community that celebrates Juneteenth,
    Kwanzaa, and local arts festivals, she developed an early appreciation for Black history, jazz, and spoken word poetry. This blend of Southern lineage and urban Brooklyn experience informs her worldview,
    fostering a strong sense of cultural pride and a commitment to amplifying underrepresented narratives within the arts.
attributes:
