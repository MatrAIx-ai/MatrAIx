  hobbies: '[''Reading Literature'', ''Journaling'', ''Visiting Art Galleries'', ''Museum Tours'', ''Yoga and Meditation'', ''Crossword Puzzles'', ''Cooking Southern Comfort Food'', ''Volunteer Library
    Work'']'
  career_goals: Claudelle aims to secure a role within a cultural institution—such as a museum curator, heritage program coordinator, or community arts organizer—where she can apply her structured approach
    to develop inclusive exhibitions and educational programs that highlight Black history and contemporary narratives. She intends to pursue a Master’s in Museum Studies or Public History to deepen her
    expertise, and is considering certification in project management to reinforce her organizational credentials. Her long‑term ambition is to become a recognized leader who designs impactful, well‑structured
    cultural initiatives that foster community engagement while providing her with a stable, purpose‑driven career path.
