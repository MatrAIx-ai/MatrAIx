  hobbies: '[''DIY woodworking'', ''Home automation projects'', ''Fishing'', ''Hunting'', ''Playing acoustic guitar'', ''Cooking (Spanish and Southern dishes)'', ''Attending local live‑music events'', ''Building
    custom PCs'']'
  career_goals: Brandon aims to achieve Master Electrician licensure within the next two years and eventually launch his own small contracting firm that specializes in renewable‑energy retrofits and smart‑home
    upgrades for homeowners in eastern North Carolina. He envisions building a flexible business model that allows him to balance field work with occasional off‑site training sessions for apprentices. Additionally,
    he hopes to deepen his technical knowledge through community‑college courses in solar design and to become a go‑to resource for energy‑efficiency grants in his community.
