personas:
  professional: Brandon Rivera, a 37‑year‑old seasoned electrician, leverages his deep knowledge of residential wiring, smart‑home integration, and renewable‑energy installations while balancing a pragmatic
    curiosity with a relaxed, sometimes disorganized approach that makes him a sought‑after mentor for apprentices eager to blend hands‑on problem solving with flexible, on‑the‑fly thinking.
  sports: Brandon Rivera, a 37‑year‑old outdoor enthusiast, spends his weekends fishing the Neuse River and hunting in the Pungo Lake Game Lands while cheering on the Durham Bulls in baseball, occasionally
    joining a local firearms‑safety club for target practice, and uses light hikes to stay fit rather than committing to formal gym routines.
  arts: Brandon Rivera, a 37‑year‑old acoustic‑guitar hobbyist, finds solace in strumming folk‑rock tunes by José González and Johnny Cash around campfires, regularly attends live‑music sessions at the
    Raleigh Village Theatre featuring blues bands like The Carolina Shout, and occasionally sketches simple furniture designs inspired by mid‑century modern icons such as Charles and Ray Eames.
  travel: Brandon Rivera, a 37‑year‑old who prefers spontaneous road trips over rigid itineraries, often explores the Outer Banks and Asheville’s craft‑brew scene, while dreaming of a renewable‑energy tour
    of Iceland and a culinary pilgrimage to Seville to study authentic paella, balancing family responsibilities with a modest travel budget.
  culinary: Brandon Rivera, a 37‑year‑old self‑taught cook, delights in grilling cedar‑plank salmon and whipping up Spanish‑style paella with saffron, chorizo, and bomba rice, while his toolbox‑level woodworking
    skills translate into meticulously handcrafted cutting boards that double as serving platters for his occasional dinner parties.
  core: Brandon Rivera, a 37‑year‑old hands‑on electrician with a DIY spirit, balances restless curiosity and a laid‑back, sometimes disorganized lifestyle, turning every repair job into a chance to tinker,
    craft, and strum a guitar by the fire.
background:
  cultural: Brandon grew up in a working‑class family on the outskirts of Greenville, North Carolina, where Southern hospitality, self‑reliance, and community support are core values. Though identified
    as white, his surname reflects a Spanish heritage that surfaces occasionally in family recipes and a modest familiarity with the Spanish language. His upbringing blends traditional Southern culture—church
    gatherings, high‑school football socials, and a love for comfort foods like fried chicken and collard greens—with an appreciation for the broader multicultural influences of his ancestry, giving him
    a grounded yet curious outlook on life.
