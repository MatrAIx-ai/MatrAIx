  career_goals: Michael aims to earn his Professional Engineer (PE) license within the next two years and progress to a senior or principal engineering role where he can lead multidisciplinary teams on
    large‑scale sustainable projects. He is interested in spearheading innovative building‑systems designs that improve energy efficiency while maintaining cost practicality. Long‑term, he envisions starting
    a boutique consulting firm that offers flexible, client‑focused engineering services, allowing him to balance his competitive drive with the freedom to explore novel ideas.
