  career_goals: Antonio aims to become a certified lead painter and eventually step into a supervisory role as a lead foreman. He plans to obtain a painting contractor’s license within the next three years,
    which will allow him to start his own small painting business focused on eco‑friendly, low‑VOC paints. He is interested in continuing his education through night courses in construction management to
    improve his operational skills. Long‑term, he hopes to mentor younger workers from his community, offering apprenticeships that combine practical trade skills with safety and professionalism. Financial
    stability and reduced work‑related stress are key motivators for his career progression.
