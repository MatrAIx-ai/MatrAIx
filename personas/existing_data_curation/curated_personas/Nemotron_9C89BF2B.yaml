personas:
  professional: Rocio Delgadonunez, though only three, acts as a diligent classroom helper, arranging blocks with methodical precision, reminding peers to clean up, and delighting in leading group circles,
    showcasing early organizational prowess and sociable energy that foreshadows a future in project coordination.
  sports: Rocio Delgadonunez bursts with enthusiasm for toddler swim lessons at the community pool, participates in the Tiny Tots Soccer Club, and cheers loudly for the local baseball team, the Chicago
    Cubs, displaying a balanced love for both organized sports and casual fan support.
  arts: Rocio Delgadonunez enjoys coloring vibrant pictures with Crayola crayons, dancing to the lively tunes of The Wiggles, and singing along with the Sesame Street characters, weaving music and visual
    art into daily playtime.
  travel: Rocio Delgadonunez loves weekend outings to the nearby aquarium, dreams of a family adventure to Disney World in Florida, and eagerly anticipates the annual road trip to grandparents’ countryside
    farm, preferring familiar destinations with a hint of new excitement.
  culinary: Rocio Delgadonunez favors creamy mac and cheese, strawberry slices, and peanut butter and jelly sandwiches, often helping stir batter for chocolate chip cookies and delighting in the warm aroma
    of cinnamon‑infused oatmeal.
  core: Rocio Delgadonunez is a routine‑loving, outgoing three‑year‑old who meticulously organizes toys, saves coins in a piggy bank, bursts with energy during group play, yet can be stubborn when bedtime
    stories are delayed.
background:
  cultural: Rocio comes from a Colombian family living in Spring, Texas. Spanish is spoken at home, and she celebrates Colombian traditions such as Carnaval de Barranquilla and Día de la Independencia with
    music, dancing, and foods like arepas and empanadas. Her family participates in a local Hispanic community center, where she interacts with other children in bilingual activities, reinforcing a dual
    cultural identity that blends Colombian heritage with her Texan surroundings.
