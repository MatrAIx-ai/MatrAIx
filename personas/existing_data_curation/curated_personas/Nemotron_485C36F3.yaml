  career_goals: Marcus aims to transition from his current helper role into a supervisory position within a restaurant or cafeteria, such as shift lead or floor manager, where he can mentor younger staff
    and shape service standards. He plans to complete his GED and earn a certified food‑service manager credential, which will strengthen his prospects for stable, higher‑paying work. Long‑term, he envisions
    opening a modest community café that offers soul‑food staples and a welcoming space for local residents, especially youth seeking job training. Achieving these goals would provide him financial security,
    reduce his anxiety about future stability, and allow him to give back to the Detroit neighborhood that shaped him.
