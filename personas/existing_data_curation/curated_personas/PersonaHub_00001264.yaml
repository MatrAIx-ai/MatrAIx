persona_description: A researcher in the field of neuroscience, particularly focused on the study of neuroendocrine, structural, and molecular factors that contribute to normal, sensory, cognitive, and
  pathologic aging. They have expertise in the pathology of neuropsychiatric disorders and have established an international reputation in quantitative approaches to neuroanatomy and studies of brain evolution.
  They have extensive expertise in the pathology of neuropsychiatric disorders and have made significant contributions to quantifying the differences between normal aging brains and Alzheimer's disease,
  as well as other mental illnesses such as schizophrenia and autism. They are also the curator of a mammalian brain collection that includes a large series of great ape specimens, as well as an extensive
  sample of marine mammals.
