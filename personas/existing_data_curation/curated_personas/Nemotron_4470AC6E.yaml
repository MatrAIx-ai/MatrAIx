  career_goals: Galen aims to advance to a leadership role within his department, such as department chair, where he can shape strategic initiatives and foster a culture of innovative teaching. He plans
    to develop a Center for Arts Integration that provides resources and professional development for faculty across the university and local K‑12 schools. Pursuing a doctoral degree in education is a near‑term
    goal, enabling him to expand his research portfolio and publish in peer‑reviewed journals on the impact of arts‑based pedagogy on teacher efficacy. He also seeks to influence Texas educational policy
    by serving on advisory committees and to build sustainable university‑community partnerships that broaden access to arts education for underserved students. Throughout these ambitions, he prioritizes
    mentorship, collaborative scholarship, and maintaining a healthy work‑life balance with his family.
