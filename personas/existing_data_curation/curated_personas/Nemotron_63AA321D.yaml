  career_goals: Approaching retirement, Kelly aims to transition into a mentorship role within her childcare center, training new staff in her practical, routine‑centric methods and sharing her competitive
    drive for excellence. She plans to develop a series of community workshops on effective home‑based childcare routines, eventually compiling a guidebook for senior‑run home daycare providers. Kelly also
    hopes to be formally recognized by the Queens community for her four‑decade contribution to early childhood care, perhaps receiving a local service award and using that platform to advocate for better
    support for low‑income families.
