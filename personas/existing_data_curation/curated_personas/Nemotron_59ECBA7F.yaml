personas:
  professional: Edgar Icaza is a veteran cement mason with three decades of concrete finishing and terrazzo expertise, whose methodical, detail-oriented approach and love for structured teamwork position
    them for a foreman role and eventual launch of a community-focused contracting firm.
  sports: Edgar Icaza follows the local baseball league fervently, cheering for the island's top team on televised games, joins a weekend softball group at the community park, enjoys casual walks along
    his town's historic streets for low-impact cardio, and they keep a modest collection of vintage baseball caps.
  arts: Edgar Icaza finds rhythm in traditional bomba and plena beats, especially tracks by Los Pleneros de la 21 and Richie Ray, attends the town's cultural festivals to witness folk dances, and they delight
    in listening to classic boleros by artists like Jose Feliciano while working on furniture projects.
  travel: Edgar Icaza favors road trips that blend sightseeing with family time, having explored historic Old San Juan, taken a weekend ferry to a nearby island for fishing, and they dream of a pilgrimage
    to the historic plazas of Madrid, all while budgeting travel expenses through a dedicated travel savings account.
  culinary: Edgar Icaza is an avid home cook who perfects classic island dishes such as arroz con gandules, pasteles, and lechon, seasoning with fresh cilantro, oregano, and homemade sofrito harvested from
    their garden's herbs, and they take joy in sharing these meals at community celebrations.
  core: Edgar Icaza is a structured, hands-on mason who balances a love for fishing, woodworking, and traditional music with a disciplined work ethic, occasional indulgence in salty feasts, and a gentle
    stubbornness about embracing new financial tech.
background:
  cultural: Edgar is a lifelong resident of Cayey, a mountainous municipality in central Puerto Rico, whose cultural identity blends Spanish, African, and Taíno influences. He grew up in a close‑knit working‑class
    neighborhood where craftsmanship and community solidarity were prized. Family traditions include celebrating the patron saint San José with music, parades, and shared meals centered around arroz, beans,
    pork, and tropical fruits. He speaks Spanish as his first language and is conversational in English, reflecting the bilingual reality of many islanders. His cultural background instills a strong pride
    in local workmanship, a deep respect for elders, and a commitment to contribute to his community through reliable work and occasional volunteerism.
