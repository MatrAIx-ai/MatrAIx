  career_goals: Approaching retirement, Edgar aims to move into a supervisory role such as foreman or crew lead on larger municipal and residential projects in the Cayey area. He plans to earn a Journeyman
    Masonry license and become an OSHA trainer, which will allow him to mentor younger workers and uphold high safety standards. Ultimately, he hopes to launch a modest contracting firm that specializes
    in high‑quality concrete and terrazzo work for community renovations, providing a stable income for his modest retirement while giving back to his hometown through reliable craftsmanship and community‑focused
    projects.
