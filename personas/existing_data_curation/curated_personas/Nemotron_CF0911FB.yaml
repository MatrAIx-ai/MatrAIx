  hobbies: '[''Reading (fiction & nonfiction)'', ''Journaling'', ''Digital photography'', ''Acoustic guitar'', ''Salsa dancing'', ''Traditional cooking'', ''Hiking'', ''Yoga'', ''Volunteer work at community
    garden'', ''Participating in cultural festivals'']'
  career_goals: Gabriela is determined to complete her Associate of Arts in Business Administration within the next two years, followed by a bachelor’s degree in Public Administration with a focus on community
    health and indigenous affairs. She aims to obtain a Project Management Professional (PMP) certification to formalize her strong organizational capabilities. Her immediate career goal is to secure an
    internship with a nonprofit that serves Latin American Indian populations, eventually transitioning into a full‑time program coordinator role where she can design and implement health outreach initiatives.
    Long‑term, Gabriela aspires to lead a community development organization that blends culturally‑relevant services with evidence‑based health programs, positioning herself as a bridge between her heritage
    and modern public service.
