personas:
  professional: Louis Lalla is a miniature engineer in the world of LEGO, showing an early knack for constructing stable, predictable structures while spontaneously rearranging them when the moment feels
    right because they value flexibility over strict planning.
  sports: Louis Lalla is a budding midfielder for the Little Rangers Soccer Team, delighting in the predictable rhythm of passing drills while also splashing around at the community pool, and they balance
    structured practice with spontaneous backyard races.
  arts: Louis Lalla is an enthusiastic junior artist who spends free time drawing colorful scenes of favorite Disney characters like Moana and Elsa, often humming the soundtrack of "Frozen" while coloring,
    reinforcing a love for structured, bright palettes and occasional improvisational doodles.
  travel: Louis Lalla has visited the local aquarium with family and dreams of exploring the iconic Eiffel Tower and the magical Disneyland Paris, favoring trips with a clear schedule while also embracing
    the surprise of discovering a new playground.
  culinary: Louis Lalla is a budding chef in the kitchen, often stirring pancake batter with a wooden spoon and delighting in bite‑sized macaroni and cheese topped with cheddar, while they also love crunchy
    apple slices dipped in peanut butter, reflecting a preference for simple, predictable flavors and occasional indulgent snacks.
  core: Louis Lalla is a structured yet flexible five‑year‑old who loves building, saving, and caring for their little health rituals, all while navigating the world with a calm, cooperative spirit and
    occasional playful messiness.
background:
  cultural: 'Louis is raised in a white, middle‑class family in Broken Arrow, Oklahoma, a suburb of Tulsa. His upbringing reflects typical Midwestern values: friendliness, respect for community, and an
    appreciation for outdoor activities. Family traditions include weekend barbecues, watching Oklahoma Sooners football, and attending church services at a local Methodist congregation. Local cultural
    influences such as country music, community festivals, and the close‑knit neighborhood network shape his sense of belonging and his respectful, cooperative demeanor.'
