  career_goals: Louis envisions a future where he can help and protect his community. He often talks about becoming a firefighter or a paramedic, roles he sees as both practical and structured, allowing
    him to solve problems and keep people safe. He also enjoys building with blocks and imagines being an engineer or a construction worker who designs sturdy structures. His ambition is to grow into a
    reliable adult who contributes positively to his neighborhood and enjoys teamwork.
