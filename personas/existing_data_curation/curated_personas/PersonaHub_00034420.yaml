persona_description: Dorothy Hall, a NASA hydrospheric scientist who specializes in the study of sea ice, particularly using the MODIS instrument aboard Terra to map the Earth's sea ice every week and determine
  the surface area of ice floating in the ocean. Her team uses the snow cover data product to scan the oceans for snow-covered ice and glaciers, and the intensity of the infrared light emanating from the
  ocean's surface to determine the temperature of the surface. Hall's measurements will tell scientists how ice is changing in our oceans from year-to-year, with variations in sea ice being direct measures
  of the heat on the surface of our planet.
