personas:
  professional: Willy Facundo, an 80‑year‑old retired handyman and community storyteller, blends decades of practical repair skills with a curious love for new tools and digital photography, using their
    organized yet flexible approach to mentor seniors in DIY projects while assertively coordinating bilingual cultural events.
  sports: Willy Facundo enjoys low‑impact morning walks along the historic El Paso River Walk, follows the El Paso Chihuahuas minor league baseball team and the Dallas Cowboys for football season, and participates
    in the senior center’s weekly bocce club, combining gentle exercise with local sports fandom.
  arts: Willy Facundo regularly listens to classic ranchera legends like Vicente Fernández and José Alfredo Jiménez, attends occasional mariachi performances at the local plaza, and collects folk art prints
    of Frida Kahlo and Diego Rivera, letting these cultural melodies and visuals enrich their evenings.
  travel: Willy Facundo prefers relaxed road trips with their sister, having visited Santa Fe’s art market and the Grand Canyon, while dreaming of a future pilgrimage to the historic streets of Oaxaca and
    a leisurely cruise along the Gulf Coast, all planned around senior discounts and limited mobility.
  culinary: Willy Facundo, a seasoned home chef, excels at preparing tamales, pozole, and grilled carne asada, often experimenting with spice blends featuring ancho chilies, cumin, and epazote, and enjoys
    sharing their dishes at family gatherings, though they sometimes forget to label jars of homemade salsa.
  core: Willy Facundo is an eighty‑year‑old garden‑loving handyman who blends curiosity with practicality, hoards a secret stash of extra chilies, and can’t resist a good card game, even if it means staying
    up past their bedtime.
background:
  cultural: Willy is a first‑generation Mexican‑American who grew up in a bilingual household near the US‑Mexico border. His upbringing was steeped in Mexican traditions—celebrating Día de los Muertos,
    Semana Santa, and quinceañeras—while also absorbing the cultural mix of El Paso’s border community. He is fluent in both Spanish and English, maintains Catholic faith practices, and values familial
    loyalty and communal responsibility. His life reflects the melding of Mexican heritage with the Texan frontier spirit, shaping his worldview, humor, and daily customs.
attributes:
  skills: '["Home repair and maintenance","Traditional Mexican cooking (tamales, pozole, Tex‑Mex grilling)","Spanish–English translation and interpretation","Desert gardening and plant care","Storytelling
    and oral history preservation","Community volunteer coordination","Basic computer usage for communication","Woodworking and small carpentry projects"]'
  hobbies: '["Gardening (vegetables and desert plants)","Cooking and experimenting with spice blends","Playing cards with friends","Listening to Mexican rancheras and mariachi","Walking historic El Paso
    neighborhoods","Participating in Día de los Muertos festivities","Video chatting with distant family","Assisting neighbor’s children with homework"]'
  career_goals: Even in retirement, Willy aims to keep contributing to his community and family. His primary ambition is to document his family’s culinary and cultural traditions in a handwritten memoir
    and share it at local senior centers. He also hopes to mentor his grandchildren in cooking, gardening, and basic handyman skills, fostering intergenerational learning. On a broader level, he wishes
    to volunteer as a cultural liaison for the El Paso community council, helping to organize bilingual events and advocate for senior services. He is curious about learning digital photography to capture
    his garden and family gatherings, but prefers to keep his pursuits practical and shareable.
