persona_description: A senior executive of a forestry and land management company who is passionate about nature-based solutions to tackle climate change and protect biodiversity. They are committed to
  using their expertise to create resilient forests and open land habitats that are future-proofed against wildfire, more frequent storms, and flooding, and new or damaging pests and disease. They are also
  dedicated to cutting emissions and capturing carbon by creating new woodlands, balancing timber production and replanting programmes, improving the condition of peatlands and other degraded soils, and
  working with the wind and hydro sectors to realise the renewable energy potential of the national forests and land.
