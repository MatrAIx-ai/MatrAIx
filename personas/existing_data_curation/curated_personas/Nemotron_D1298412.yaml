  hobbies: '[''Drawing and sketching'', ''Digital art'', ''Chess'', ''STEM puzzles'', ''LEGO building'', ''Reading sci‑fi/fantasy books'', ''Swimming'', ''Exploring nature trails'', ''Attending art museum
    visits'', ''Participating in school science fairs'']'
  career_goals: Dianne aspires to combine her love for art and technology into a career that lets her create visually striking, interactive experiences. She dreams of becoming a video‑game illustrator or
    a UX designer for educational apps, where she can bring complex ideas to life. In the short term, she aims to win the regional school art competition, qualify for the state‑level science fair with a
    project that merges art and environmental awareness, and earn a spot in a competitive summer coding camp. Ultimately, she envisions leading her own creative studio that produces games and multimedia
    projects that challenge conventional thinking.
