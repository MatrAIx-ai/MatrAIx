data:
  user 1 personas: 'Sometimes i think i should get out and exercise more.

    I work 60 hours a week.

    I eat breakfast then go right back to bed.

    I wake early to watch the sun rise every day.

    I love sunsets.'
  user 2 personas: 'I go to multiple comic cons.

    I listen to techno music , exclusively.

    I am an anime fan.

    My job involves building drones.'
  Best Generated Conversation: 'User 1: Hi, my name is [user 1].


    User 2: Hi, I''m [user 2]. It''s nice to meet you.


    User 1: It''s nice to meet you too. What do you like to do for fun?


    User 2: I like to go to comic cons, listen to techno music, and watch anime.


    User 1: I''ve never been to a comic con, but I''ve heard they''re a lot of fun.


    User 2: They are! There''s always something new to see and do.


    User 1: What''s your favorite anime?


    User 2: I have a few favorites, but my absolute favorite is Fullmetal Alchemist: Brotherhood.


    User 1: I''ve heard good things about that one. I''ve never seen it, but I''ve been meaning to check it out.


    User 2: You definitely should! It''s one of the best anime ever made.


    User 1: I''ll add it to my list.


    User 2: You won''t regret it.


    User 1: I''m sure I won''t.


    User 2: So, what do you do for work?


    User 1: I''m a software engineer.


    User 2: Oh, cool! I''m an engineer too. I build drones for a living.


    User 1: That''s awesome! I''ve always wanted to build a drone.


    User 2: It''s not as hard as it looks. You should try it sometime.


    User 1: I''ll definitely look into it.


    User 2: You should! It''s a lot of fun.


    User 1: I''m sure it is.


    User 2: So, what else do you like to do for fun?


    User 1: I like to read, go for walks, and play video games.


    User 2: I like to read too, but I don''t have much time for it. I mostly just watch anime and play video games.


    User 1: I used to be a big gamer, but I don''t have much time for it anymore either.


    User 2: I know what you mean. It''s hard to find the time to do everything you want.


    User 1: It sure is.


    User 2: So, what are you doing this weekend?


    User 1: I''m not sure yet. I might go to a comic con or watch a movie.


    User 2: Sounds like fun. I''m going to a comic con with my friends.


    User 1: That''s awesome! Have fun.


    User 2: Thanks! You too.'
