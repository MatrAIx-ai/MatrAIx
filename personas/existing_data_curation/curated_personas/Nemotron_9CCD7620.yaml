personas:
  professional: Jose Bomfim, an experienced Midwest truck driver, blends meticulous route planning and vehicle maintenance with a curiosity for emerging logistics technology, using their cooperative nature
    to mentor teammates and ensure safe, on‑time deliveries.
  sports: Jose Bomfim follows Liga MX fervently, roots for Club América and the Chicago Fire, joins a local Chicago fishing club for weekend outings on Lake Michigan, and participates in a recreational
    indoor soccer league each summer, balancing screen‑time with practical, low‑impact exercise.
  arts: Jose Bomfim unwinds to the sounds of Vicente Fernández and Los Tigres del Norte, attends occasional mariachi nights at his church, and keeps a modest collection of classic western films that inform
    his love for storytelling.
  travel: Jose Bomfim favors budget‑friendly road excursions that let them fish at Lake Geneva, explore Detroit’s automotive heritage sites, and attend a yearly family gathering in the Yucatán, balancing
    detailed itinerary planning with on‑the‑fly adjustments when traffic or weather demands.
  culinary: Jose Bomfim, an adept home cook, perfects tacos al pastor with pork shoulder marinated in achiote, pineapple, and ancho chilies, and simmers pozole using hominy, pork ribs, and crisp radish
    garnishes, while also mastering a charcoal grill for weekend barbecues featuring brisket and corn on the cob.
  core: Jose Bomfim, a pragmatic yet curious 47‑year‑old truck driver, balances a love for hearty home‑cooked meals, soccer, and fishing with a methodical approach to savings and a steady, family‑first
    outlook, though they sometimes binge‑watch match replays late into the night.
background:
  cultural: Jose grew up in a Mexican household in the Chicago area, where family, faith, and community were central. Raised bilingual, he celebrates Mexican holidays such as Día de los Muertos and Mexican
    Independence Day, often sharing traditional foods and stories with his family. His cultural upbringing instilled a strong work ethic, respect for elders, and a cooperative spirit that guides his interactions
    at work and in the neighborhood. While he embraces the multicultural environment of Homewood and the greater Chicago region, he maintains close ties to the local Mexican community, attending cultural
    festivals, supporting Latino‑owned businesses, and staying connected to Spanish‑language media.
attributes:
  skills: '["Safe commercial driving (CDL Class A)", "Vehicle maintenance and inspections", "Route optimization and GPS navigation", "Customer service and sales interaction", "Bilingual communication (Spanish/English)",
