  hobbies: '["Cooking Mexican cuisine", "Watching and discussing soccer (Liga MX, MLS)", "Fishing at local lakes", "Exploring automotive technology and electric trucks", "Family barbecues and community
    events", "Listening to regional Mexican music", "Reading about logistics innovations"]'
  career_goals: Jose aims to move into a supervisory role such as fleet coordinator or route manager, where he can apply his practical experience and curiosity about logistics software to improve efficiency
    and safety. He plans to earn additional certifications, including a hazardous materials endorsement and advanced driver training, to broaden his qualifications. In the next five years, he hopes to transition
    into a sales‑management position focused on freight services, blending his driving expertise with his sales talent. Ultimately, he aspires to launch his own small transportation business that emphasizes
    reliable service, community employment, and a balanced schedule that supports his family life.
