personas:
  professional: Alyssa Fortner is an aspiring junior game developer who uses Scratch to design whimsical adventure games, combining her curiosity for new ideas with a disciplined yet flexible approach to
    project deadlines, and often collaborates with friends in her school’s coding club.
  sports: Alyssa Fortner spends weekends hiking the Adirondack foothills and collecting rocks, is a member of the local youth soccer league that cheers for the New York Red Bulls, and follows the New York
    Rangers with fervor, blending her love of outdoor exploration with team sports for a balanced fitness routine.
  arts: Alyssa Fortner channels her love for storytelling into vivid watercolor landscapes inspired by Monet, sketches characters reminiscent of Hayao Miyazaki’s films, practices piano pieces by Beethoven
    and modern pop songs by Taylor Swift, and shines on stage in school productions, often quoting lines from classic Disney movies.
  travel: Alyssa Fortner enjoys spontaneous family road trips to the Mohawk River’s cascading waterfalls, plans detailed weekend hikes in Letchworth State Park, daydreams about exploring the historic castles
    of Scotland and the immersive worlds of the Wizarding World at Universal Studios Orlando, balancing her love of nature with a craving for magical adventures.
  culinary: Alyssa Fortner loves to craft homemade pizza topped with fresh mozzarella, pepperoni, and basil, often experiments with rainbow veggie wraps featuring carrots, bell peppers, and hummus, and
    proudly masters the art of baking chocolate chip cookies with dark chocolate chunks and a pinch of sea salt.
  core: Alyssa Fortner is an endlessly curious 11‑year‑old whose sketchbook is as full of doodles as her mind is with adventure plots, a habit of collecting rocks from every trail she hikes, and a tendency
    to rehearse piano scales in the grocery store aisles.
background:
  cultural: Alyssa grows up in a predominantly white, middle‑class community in Little Falls, New York. The region’s seasonal climate, the nearby Mohawk River, and easy access to the Adirondack foothills
    shape her appreciation for outdoor activities and nature. Her family participates in local traditions such as the Little Falls Winter Carnival, the town’s Fourth‑of‑July parade, and community clean‑up
    events. The public school emphasizes a mix of traditional American values—respect for individual effort, responsibility, and community involvement—while encouraging creative expression through robust
    art, music, and technology programs. Her cultural identity blends the small‑town Upstate New York sensibility of independence, a love for the outdoors, and a supportive, collaborative school environment.
