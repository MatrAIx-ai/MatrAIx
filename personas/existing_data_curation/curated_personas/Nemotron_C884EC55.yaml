  career_goals: Alyssa dreams of using her love of art and curiosity to become a wildlife illustrator or a museum exhibit designer who can bring science and creativity together. She also imagines teaching
    younger kids, sharing her enthusiasm for drawing and coding in a classroom setting. In the long term, she hopes to study fine arts or environmental science in college, develop projects that blend visual
    storytelling with ecological awareness, and contribute to community art programs in Little Falls.
