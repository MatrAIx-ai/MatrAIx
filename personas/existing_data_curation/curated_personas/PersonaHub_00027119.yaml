persona_description: A Canadian military historian and aviation enthusiast who is deeply interested in the history and operations of the Royal Canadian Air Force during the Second World War. They are particularly
  fascinated by the key roles the RCAF played in the Battle of Britain, the Battle of the Atlantic, the bombing campaigns against German industries, and the subsequent land campaigns in northwest Europe.
  They are also curious about the experiences of women in the RCAF during the war, the volunteer organization established to assist in the early detection of enemy aircraft, and the rank structure of the
  RCAF compared to the Royal Air Force. They are also interested in the history of the RCAF's merger with the Royal Canadian Navy and the Canadian Army to form the unified Canadian Forces in 1968, and the
  reintroduction of army-style ranks within the Canadian Air Force in 1993.
