  hobbies: '[''Hiking the Balcones Canyonlands trail'', ''Barbecue cooking and recipe development'', ''Attending country music line‑dance events'', ''Landscape photography'', ''Volunteer at church food
    bank'', ''Mentoring at‑risk youth'', ''Reading historical fiction'', ''Gardening (tomatoes, native herbs)'', ''Participating in Pflugerville 5K fundraisers'', ''DIY home improvement projects'']'
  career_goals: Tabitha aims to advance to a shift supervisor position within the next two years, leveraging her experience to lead a team of officers. Her long‑term ambition is to become a correctional
    facility manager, overseeing operations and implementing progressive safety and rehabilitation policies. She plans to earn a bachelor’s degree in criminal justice to complement her associate’s credential
    and to qualify for higher‑level administrative roles. Additionally, Tabitha is passionate about developing an inmate job‑readiness program that combines vocational training with mental‑health support,
    and she hopes to serve as a trainer for new officers at the Texas Department of Criminal Justice academy, sharing her practical knowledge and emphasizing compassionate yet firm law enforcement.
