personas:
  professional: Tabitha Kennedy, a seasoned correctional officer with over two decades of expertise in inmate supervision and facility security, leverages her meticulous record‑keeping, crisis de‑escalation
    skills, and sociable yet assertive demeanor to mentor peers and drive toward her goal of becoming a shift supervisor and eventually a facility manager.
  sports: Tabitha Kennedy, an avid outdoor enthusiast, hikes the Balcones Canyonlands trail weekly with her family, competes in the annual Pflugerville 5K fundraiser, and proudly supports the Dallas Cowboys,
    Texas Rangers, and Dallas Mavericks, blending fitness, community competition, and loyal fandom.
  arts: Tabitha Kennedy, a devoted lover of classic country music, line‑dances to George Strait and Dolly Parton at local venues, captures family moments and Hill Country vistas with her DSLR, and immerses
    herself in historical fiction by Larry McMurtry, weaving music, photography, and literature into her creative identity.
  travel: Tabitha Kennedy, a methodical planner, enjoys weekend road trips through the Texas Hill Country, has explored Austin’s live‑music scene, dreams of visiting Santa Fe for its Southwestern heritage,
    and balances adventure hiking with relaxed BBQ picnics while keeping her teenage children’s schedules in mind.
  culinary: Tabitha Kennedy, a self‑taught pitmaster, experiments with mesquite‑smoked brisket rubs featuring cumin, brown sugar, and smoked paprika, pairs her creations with garden‑grown heirloom tomatoes
    and native herbs, and prides herself on mastering low‑and‑slow cooking for family gatherings.
  core: Tabitha Kennedy, a disciplined yet adventurous 45‑year‑old, blends her correctional expertise, love for Texas BBQ, and passion for family hikes into a life defined by meticulous planning, community
    service, and occasional over‑indulgence in smoky rubs.
background:
  cultural: Tabitha was born and raised in central Texas to a family of long‑time residents of European descent, primarily Anglo‑American with some German roots. Her upbringing was centered in a close‑knit
    Protestant community, attending a Baptist church where she learned the values of service, modesty, and fellowship. The cultural fabric of the region—Texas pride, respect for self‑reliance, and a love
    of outdoor life—shaped her worldview. She celebrates local traditions such as the State Fair of Texas, county rodeos, and holiday barbecues, while also embracing broader American customs. Growing up
    in a suburban environment near Austin, she has been exposed to a blend of traditional Southern hospitality and the eclectic, arts‑focused culture of the Hill Country. These influences foster her community‑oriented
    mindset and her belief in hard work, family unity, and civic responsibility.
