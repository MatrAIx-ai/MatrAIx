  career_goals: Looking toward the next phase of his career, Percy aims to transition into a mentorship and consulting role where he can share his wealth of knowledge with emerging project managers. He
    hopes to lead one or two flagship sustainable development projects in Miami-Dade that showcase green building techniques while also improving community infrastructure. Additionally, he plans to establish
    a scholarship fund for local students of color interested in construction or the built environment, ensuring a lasting legacy that blends his competitive drive with a commitment to giving back.
