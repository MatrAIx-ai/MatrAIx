personas:
  professional: Percy Duncan, a veteran construction manager with three decades of overseeing large residential and commercial projects, blends a results‑driven, pragmatic mindset with a curiosity for sustainable
    building tech, prefers adaptable scheduling over rigid Gantt charts, and now they channel their competitive edge into mentoring emerging project managers while spearheading flagship green developments
    in Miami‑Dade.
  sports: Percy Duncan enjoys early‑morning fishing in the Everglades, plays casual basketball games with longtime friends, follows the Miami Heat with fervor, and participates in a community garden club’s
    weekend softball league, where they balance low‑impact outdoor pursuits with competitive camaraderie.
  arts: Percy Duncan immerses themselves in Miami’s vibrant jazz and soul scene, regularly attending concerts by artists like Herbie Hancock, Wynton Marsalis, and Erykah Badu, while also crafting small
    wooden furniture pieces and reading biographies of pioneering Black leaders, a blend that fuels both their creative expression and a skeptical eye toward overly commercialized performances, and they
    often discuss these insights at community gatherings.
  travel: Percy Duncan favors road trips that combine fishing, gardening, and cultural immersion, having explored the Florida Keys, the historic streets of New Orleans for its jazz heritage, and the serene
    islands of the Bahamas, yet they still dream of a guided eco‑tour of Costa Rica’s rainforests, often sketching out itineraries on the spot rather than following a strict schedule.
  culinary: Percy Duncan delights in cooking Southern comfort dishes such as fried catfish, collard greens with smoked turkey, and homemade cornbread, often incorporating garden‑fresh okra, sweet potatoes,
    and fresh herbs, while their woodworking hobby inspires a penchant for handcrafted serving boards, even if they occasionally leave the kitchen a bit messy after a big family dinner.
  core: Percy Duncan is a seasoned builder turned mentor who balances a relaxed, sometimes disorganized lifestyle with a competitive drive, a love for jazz, fishing, and Southern cooking, and they maintain
    a steadfast commitment to sustainable community impact.
background:
  cultural: Percy is an African-American who grew up in the Miami metropolitan area during the transformative years of the 1970s and 1980s. His upbringing was shaped by the strong sense of community found
    in local Black churches, neighborhood block parties, and the cultural blending of Caribbean and Southern traditions that characterize South Florida. His family emphasized the importance of education,
    storytelling, and mutual support, values that guided his pursuit of a humanities degree. These cultural roots inform his respect for tradition while remaining open to new ideas, and they are reflected
    in his love for music, food, and community service.
