persona_description: A pediatric cardiologist and research scientist who specializes in the use of 3D-printed models in preoperative planning for complex heart surgeries. Dr. Wilson King is an expert in
  rotational angiography and has developed a unique method for producing 3D-printed hearts based on the patient-specific quality of the scans. He has successfully tested the feasibility and accuracy of
  3D-printed hearts in a clinical setting and has plans to expand this work to include postsurgical outcome studies in pediatric cardiovascular disease.
