  career_goals: Jennifer imagines a future where she can combine her love for caring for living things and her desire to bring structure to learning. She dreams of becoming a veterinarian to help animals
    stay healthy, a teacher to share knowledge in a friendly classroom, and occasionally imagines traveling as an astronaut to explore space. She also hopes to use her creativity in designing things, inspired
    by her LEGO building, and enjoys the idea of helping her community through volunteer work.
