persona_description: A scientist who specializes in the study of marine biology, particularly the behavior and navigation of sea turtles. Lohmann's research focuses on the magnetic map that loggerhead hatchlings
  use to navigate their migratory routes. He is interested in understanding how this map is inherited and how it differs across populations of loggerheads. Lohmann's work has implications for conservation
  efforts and may provide insights into how different populations of loggerheads may have different magnetic maps.
