  career_goals: Although retired from formal employment, Marquita aims to expand her impact by leading a senior mentorship program at her local community center, publishing a memoir that captures her family's
    African‑American heritage in the Upstate, and completing a certification in digital literacy to help other seniors navigate technology. She also hopes to organize an annual multicultural food festival
    that celebrates the culinary traditions of her community while fostering intergenerational connections.
