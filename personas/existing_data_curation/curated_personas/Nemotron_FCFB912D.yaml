personas:
  professional: Marquita Strickland, a retired community organizer and grant‑writing veteran, leverages her methodical planning, sociable energy, and knack for public speaking to lead senior mentorship
    programs, mentor digital‑literacy workshops, and orchestrate an annual multicultural food festival that bridges generations.
  sports: Marquita Strickland stays active by twirling in her senior center’s weekly line‑dancing class, joining a neighborhood walking club that meets for sunrise strolls through her garden, and cheering
    on the Atlanta Braves and Atlanta Falcons while she stretches before each session.
  arts: Marquita Strickland, a passionate choir member, harmonizes hymns inspired by Mahalia Jackson, knits communal blankets echoing Faith Ringgold’s storytelling quilts, and engages lively discussions
    about Toni Morrison and James Baldwin during her weekly book club.
  travel: Marquita Strickland prefers carefully planned, leisurely road trips to heritage towns like Savannah and Charleston, dreams of a senior‑friendly cruise to the Bahamas, and balances her wanderlust
    with budget‑conscious choices to ensure her volunteer commitments at the regional food bank remain uninterrupted.
  culinary: Marquita Strickland, an accomplished Southern cook, perfects collard greens simmered with smoked turkey, sweet‑potato pie spiced with nutmeg, and buttery buttermilk biscuits, often garnishing
    them with heirloom tomatoes, fresh okra, and garden‑grown herbs.
  core: Marquita Strickland blends unwavering community dedication with a meticulous, sometimes anxious, habit of double‑checking schedules, hoarding heirloom seed packets, and keeping a stack of unfinished
    memoir chapters beside her favorite quilting needles.
background:
  cultural: Marquita was raised in the African‑American community of Greenville County, steeped in the traditions of Southern hospitality, church life, and a strong sense of familial duty. Her family roots
    trace back to the Gullah heritage of the South Carolina Lowcountry, influencing her love for storytelling, communal meals, and rhythmic folk music. Growing up during the civil‑rights era, she witnessed
    and participated in local activism, shaping her commitment to social justice and community service. These cultural experiences inform her values of perseverance, mutual support, and the preservation
    of Black Southern history.
