personas:
  professional: Helen Smith, a budding teenage robotics and coding enthusiast, merges her scientific curiosity with pragmatic problem‑solving as she designs simple robots for her school club, documents
    projects in concise video edits, and balances meticulous planning with the flexibility to experiment on the fly.
  sports: Helen Smith, an avid hiker who frequents Red Rock Canyon’s trails, also follows the Las Vegas Raiders and the Vegas Golden Knights, participates in school cross‑country runs, and balances her
    love for the outdoors with weekly yoga sessions to stay flexible.
  arts: Helen Smith, a piano‑savvy teen who experiments with ukulele chords, draws inspiration from Tori Amos and the indie folk duo The Paper Kites, captures desert flora with Ansel Adams‑style photography,
    and spends evenings sketching while listening to the ambient soundtracks of documentary series like Planet Earth.
  travel: Helen Smith, who has already camped at Grand Canyon’s South Rim and aspires to trek Norway’s fjord region, prefers planning trips with detailed itineraries and maps, balances her wanderlust with
    a tight teenage budget, and always packs a sketchbook to capture new scenery.
  culinary: Helen Smith, an enthusiastic home‑cook who can whip up avocado toast with lime‑zest hummus and enjoys experimenting with prickly‑pear salsa on tacos, frequently practices cooking with her mom,
    but often forgets to clean up the kitchen after late‑night snack experiments.
  core: Helen Smith blends scientific curiosity with heartfelt compassion, juggling robotics builds, desert hikes, and piano practice while occasionally procrastinating on chores and sleep, making her a
    bright yet delightfully imperfect teen explorer.
background:
  cultural: Helen was raised in a middle-class, white American family in North Las Vegas, a suburb of the vibrant Las Vegas metropolitan area. While her household follows many traditional US customs- Thanksgiving,
    Fourth of July fireworks, and Christmas gatherings- her community's diverse cultural tapestry has exposed her to Hispanic celebrations like Cinco de Mayo and to the region's Native American heritage
    tied to the Mojave desert. The nearby desert landscape, with its hiking trails and stargazing spots, informs her appreciation for the natural environment. This blend of suburban American values and
    the multicultural, desert-adjacent setting shapes her respectful, community-oriented outlook.
