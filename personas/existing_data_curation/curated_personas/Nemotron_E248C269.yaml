  career_goals: Helen aspires to pursue a career in health-care or community service, envisioning herself as a pediatric nurse or social worker who can combine her compassion with practical problem-solving.
    She plans to graduate high school with strong academic credentials, attend a university program in nursing or social work, and obtain a license that will enable her to serve underserved families in
    Nevada. Parallel to this, she hopes to develop a tech-driven outreach platform- perhaps an app that connects youth with local volunteer opportunities- leveraging her interest in coding and her desire
    to foster harmony in her community.
