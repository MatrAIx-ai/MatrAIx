  are also interested in understanding the threats facing these species and the measures being taken to protect them. They may be involved in research projects that involve collecting and analyzing data
  on marine fish populations, as well as in the development of conservation strategies and policies to protect these species. This person may also be involved in advocacy work to raise awareness about the
  importance of marine conservation and to promote policies that protect marine ecosystems and their inhabitants.
