  hobbies: '[''Kayaking on Lake Charlevoix'', ''Community theater participation (audience and stagehand)'', ''Woodworking (birdhouses, boat restoration)'', ''Gardening (native perennials and vegetables)'',
    ''Bird‑watching walks'', ''Reading historical biographies'', ''Playing bridge'', ''Seasonal cooking with garden produce'']'
  career_goals: Nathaniel’s post-retirement ambitions focus on legacy, mentorship, and community well‑being. He aims to mentor younger volunteers in event planning and historic preservation, and he seeks
    a board position with the Charlevoix Historical Society to guide its archival projects. He plans to author a series of memoir articles that capture the town’s mid‑20th‑century waterfront culture, hoping
    to preserve local stories for future generations. A personal goal is to establish a community garden showcasing low‑maintenance, climate‑adapted planting, which will serve both educational and social
    purposes. Aware of his tendency toward worry, he also commits to a regular health‑maintenance routine, including light exercise and mindfulness practices, to sustain his energy for continued involvement.
