persona_description: A researcher and naturalist who specializes in the study of trichomycetes, specifically the gut fungi found in the Pacific Northwest. They have conducted a preliminary survey of Ephemerellomyces
  aquilonius, a rare and unusual species that was previously only documented in Western Europe. Their work is significant as it provides the first account of this species and highlights the potential for
  further discoveries at the site in Idaho and the Pacific Northwest. They are eager to sequence the specimens from Dry Creek and place the species in their expanding molecular-based phylogenies.
