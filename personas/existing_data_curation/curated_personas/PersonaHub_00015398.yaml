persona_description: A Japanese research team who specializes in developing new technologies for insect-inspired robots and cyber insects. They are working on creating a wireless sensor network with cyborg
  insects to monitor and control chemicals and pollutants in cities. Their work involves creating a radical new battery that creates energy from sugar in the insect's body and hopes to build giant 'swarms'
  of their cyber insects to create large sensor networks.
