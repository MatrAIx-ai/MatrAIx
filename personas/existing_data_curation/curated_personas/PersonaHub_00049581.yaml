persona_description: Dr. Rob Kavet, Lead PI of the Electromagnetic Fields from Undersea Cable project at the Electric Power Research Institute, Inc. He is a leading expert in the field of electric power
  and marine power, with a particular focus on the impact of electromagnetic fields on marine life. His research has been instrumental in developing and implementing measures to mitigate the effects of
  electromagnetic fields on marine ecosystems. Dr. Kavet is highly respected within the academic and industry communities for his contributions to the field of electric power and marine power, and his expertise
  in the assessment of potential impacts of electromagnetic fields on migratory fish behavior is highly sought after.
