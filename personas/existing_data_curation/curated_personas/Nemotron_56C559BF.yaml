  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Digital Illustration'', ''Reading Magical Realism'', ''Acoustic Guitar Playing'', ''Nature Hiking'', ''Photography'', ''Community Art Circle'', ''Journaling'']'
  career_goals: Curtis dreams of shifting his career toward a more creative and self‑directed path while retaining the stability that his current job provides. He plans to enroll in evening courses at a
    community college or online platform to earn a certificate in visual communication or multimedia design. In the longer term, he hopes to build a freelance portfolio that merges his practical logistics
    experience with his artistic interests, such as designing product packaging, creating marketing visuals for small businesses in Upshur County, or publishing illustrated short stories. Recognizing his
    emotional sensitivity, Curtis also aims to find a work environment that values flexibility, supportive colleagues, and opportunities for personal growth, which he believes will help him manage anxiety
    more effectively.
