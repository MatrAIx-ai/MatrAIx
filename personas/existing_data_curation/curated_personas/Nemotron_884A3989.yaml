personas:
  professional: Elizabeth Jeanty, a seasoned computer systems analyst with expertise in requirements elicitation, process mapping, SQL database design, Python automation, and COBIT governance, they channel
    their methodical, solitary nature into meticulously documented, waterfall‑style modernization projects that emphasize clear timelines, stakeholder communication, and regulatory compliance.
  sports: Elizabeth Jeanty, a dedicated participant in the local senior walking club and occasional member of a community bowling league, they follow a low‑impact fitness regimen of morning walks along
    the Lake Orion trails, support the Detroit Tigers and the Detroit Lions, and schedule seasonal birdwatching hikes as their primary form of athletic recreation.
  arts: Elizabeth Jeanty, an avid reader of classic literature such as Jane Austen and Charles Dickens, a meticulous knitter of intricate Fair Isle patterns, and a jazz enthusiast who spins Miles Davis
    and Billie Holiday on evenings of quiet reflection, they find solace in the structured rhythm of creative pursuits that complement their analytical mind.
  travel: Elizabeth Jeanty, a meticulous planner who prefers well‑researched cultural trips over spontaneous adventures, they spend their summers exploring historic garden towns like Kyoto’s Arashiyama
    and Savannah’s historic district, and reserve brief weekend getaways to nearby Michigan state parks for birdwatching, always booking accommodations with quiet rooms and predictable itineraries.
  culinary: Elizabeth Jeanty, a competent home cook with a penchant for herb‑infused dishes, they regularly prepare ratatouille with fresh basil, rosemary, and thyme, craft herb‑roasted chicken seasoned
    with lemon zest and sage, and enjoy a meticulously brewed cup of Earl Grey tea, while occasionally treating themselves to a slice of pecan pie as a rare indulgence.
  core: Elizabeth Jeanty, a methodical systems analyst who channels their love for order into precise knitting, crossword puzzles, and a meticulously curated garden, they often trade evening jazz for an
    extra cup of coffee and habitually check inboxes at midnight, embodying a quiet yet relentless pursuit of structure.
background:
  cultural: Elizabeth was raised in a close‑knit Black family in the Detroit metropolitan area, where church gatherings, soul music, and a strong emphasis on education shaped her early worldview. Growing
    up in Michigan's diverse communities, she experienced both the support of a vibrant African‑American cultural network and the challenges of being a minority in a predominantly white technical field.
    These experiences fostered a deep appreciation for perseverance, collaborative harmony, and the importance of representation. She remains active in local Black community organizations, participating
    in cultural festivals and mentorship programs that celebrate heritage while promoting STEM opportunities for youth. Her cultural identity informs her calm, considerate demeanor, her dedication to community
    service, and her commitment to fostering inclusive environments within the tech industry.
attributes:
  skills: '[''Systems analysis'', ''Process mapping'', ''Requirements elicitation'', ''SQL'', ''Python scripting'', ''PowerShell automation'', ''IT governance (COBIT)'', ''Risk assessment'', ''Documentation'',
    ''Project planning (Waterfall)'', ''Enterprise resource planning (ERP) platforms'', ''Business intelligence (Power BI)'']'
  hobbies: '[''Gardening'', ''Reading classic literature'', ''Knitting'', ''Crossword puzzles'', ''Birdwatching'', ''Woodworking'', ''Jazz and blues listening'', ''Meditation'', ''Volunteer tech tutoring
    for seniors'', ''Historical documentary watching'']'
  career_goals: Elizabeth aims to lead a major systems modernization initiative for her organization, guiding the migration of legacy applications to a secure cloud‑based ERP while maintaining strict governance
    and minimal disruption. She plans to codify a comprehensive knowledge‑transfer repository that captures best practices for future analysts. Over the next few years, she intends to earn CISA and PMP
    certifications to formalize her expertise. A core ambition is to mentor emerging talent—particularly women of color—through structured training programs and one‑on‑one coaching. As she approaches retirement,
    she envisions transitioning to a part‑time advisory role, focusing on ethical technology adoption, diversity initiatives, and community outreach programs that provide tech literacy to senior citizens
    in the Lake Orion area.
