personas:
  professional: David Mela is an automotive body repairer who combines meticulous structural welding and paint color matching with a flair for custom car graphics, leveraging his proficiency in CCC ONE
    and Audatex while channeling his curiosity for street art into innovative design solutions for clients.
  sports: David Mela plays pickup basketball for the Kings County League, cycles with the Manhattan Waterfront Cycle Club, and cheers for the Brooklyn Nets while occasionally catching Yankees games, blending
    team spirit with personal fitness routines.
  arts: David Mela spends weekends exploring Bushwick’s graffiti, curating a digital portfolio inspired by artists like Jean‑Michel Basquiat while listening to Vampire Weekend and Kamasi Washington, and
    attending openings at the Brooklyn Museum to fuel his sketching and custom car illustration projects.
  travel: David Mela prefers meticulously planned road trips, often charting weekend escapes to the Hudson Valley or a pilgrimage to Detroit for the NAIAS, dreaming of a future coastal drive through the
    Pacific Northwest, but balances these ambitions with a modest travel budget that favors off‑season train tickets and staying with friends.
  culinary: David Mela enjoys experimenting in the kitchen, whipping up miso‑glazed salmon tacos and a signature Brooklyn‑style pizza crowned with Korean BBQ brisket, often seasoning with gochujang, smoked
    gouda, and fresh basil, reflecting a confident yet playful home‑cook approach.
  core: David Mela blends the disciplined precision of an auto body tech with an insatiable curiosity for street art, often juggling a paintbrush in one hand and a camera in the other while humming indie
    tunes and occasionally forgetting to water his houseplants.
background:
  cultural: David grew up in a working‑class family in Brooklyn, with roots tracing back to the Northeastern United States. His upbringing emphasized hard work, community support, and a respect for diverse
    cultural expressions found throughout the borough. Living amid a vibrant, multicultural environment has shaped his open‑minded outlook, fostering an appreciation for varied artistic styles and unconventional
    ideas while maintaining a strong sense of loyalty to his local community and its traditions.
attributes:
  skills: '[''Auto body repair'', ''Structural welding'', ''Dent pulling and repair'', ''Paint color matching'', ''Collision damage estimation (CCC ONE, Audatex)'', ''Safety and environmental compliance'',
    ''Custom vehicle graphics design'', ''Customer communication'', ''Team collaboration'', ''Shop management and workflow optimization'']'
  hobbies: '[''Urban photography'', ''Sketching car designs'', ''Street art appreciation'', ''Visiting art galleries'', ''Playing basketball'', ''Cycling around Brooklyn'', ''Experimental cooking'', ''Listening
    to indie and jazz music'', ''DIY metalworking projects'', ''Attending car shows'']'
  career_goals: David aims to become a certified master technician within the next three years, obtaining advanced I‑CAR and ASE credentials. He envisions transitioning to a supervisory role, eventually
    managing a body shop that emphasizes high-quality craftsmanship and eco‑friendly practices. Long‑term, he aspires to open his own boutique repair studio that blends automotive restoration with artistic
    customizations, offering unique paint art and design services while fostering a supportive apprenticeship program for emerging technicians.
