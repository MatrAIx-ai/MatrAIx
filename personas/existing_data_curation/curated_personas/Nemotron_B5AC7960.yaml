  hobbies: '[''Gardening'', ''Woodworking'', ''Motorcycle Restoration'', ''Community Volunteering'', ''Book Club'', ''Local History Research'', ''Fishing'', ''Bridge Playing'', ''Model Railroading'', ''Church
