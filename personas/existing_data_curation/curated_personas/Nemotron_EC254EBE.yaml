  career_goals: Although still very young, Cameron frequently talks about growing up to be someone who creates and helps. He dreams of becoming an artist who paints bright pictures, a caretaker who looks
    after animals, or a friendly teacher who shares stories. His aspirations are guided by his love for novelty, his compassion, and a desire to make the world a softer place.
