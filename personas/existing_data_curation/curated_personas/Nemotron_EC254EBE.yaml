personas:
  professional: Cameron Casey, a two-year-old with a boundless imagination, spends hours arranging stuffed animals into elaborate storylines, showcasing an early knack for abstract thinking and a relaxed,
    spontaneous approach to self-directed 'projects' that defy structured schedules, and they revel in the freedom of unplanned play.
  sports: Cameron Casey delights in tumbling on the living-room carpet, attends a weekly toddler gymnastics class at the local community center, and cheerfully waves a small Manchester United flag during
    family soccer game nights, preferring spontaneous play over regimented sports schedules, and they often choose to explore the backyard instead of the scheduled swimming lesson.
  arts: Cameron Casey immerses in finger-painting sessions featuring bright splashes of ultramarine and cadmium red, giggles while listening to Raffi's 'Baby Beluga', and frequently hums Mozart's 'Eine
    kleine Nachtmusik', demonstrating a profound early affinity for both visual and auditory art forms, and they love to create spontaneous 'masterpieces' on any available surface.
  travel: Cameron Casey thrills on family road trips to the city zoo and the seaside boardwalk, loves the tactile experience of sand castles at Beach Town, and dreams of someday stepping inside a giant
    aquarium in Tokyo, balancing short bursts of adventure with the comfort of familiar routine, and they often request another round of 'car ride' songs to keep the journey lively.
  culinary: Cameron Casey prefers soft bites like ripe banana slices, avocado mash, and tiny mozzarella cubes, enjoys helping stir oatmeal with a plastic spoon, yet they often smears yogurt on the high-chair
    tray, reflecting both developing culinary interests and a messy curiosity about textures.
  core: Cameron Casey is an imaginative two-year-old who transforms everyday moments into whimsical narratives, navigates finances with a playful piggy bank, and balances tender compassion with a delightfully
    disorganized curiosity.
background:
  cultural: Cameron is growing up in a typical Midwestern white family in Lansing, Michigan. His cultural environment includes community gatherings at local parks, seasonal county fairs, church‑based family
    events, and the values of modesty, friendliness and self‑reliance common to the region. The city’s blend of urban and suburban life provides access to public libraries, playgrounds and early‑learning
    programs that reinforce his imaginative curiosity and cooperative spirit.
