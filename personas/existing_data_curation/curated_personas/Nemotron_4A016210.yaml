  hobbies: '["Soccer", "Guitar (folk music)", "Drawing/Painting Mexican folk art", "Robotics club and basic coding", "Cooking Mexican dishes", "Volunteering at bilingual story hour", "Participating in cultural
    festivals (e.g., Cinco de Mayo)"]'
  career_goals: Aida aspires to blend her curiosity for science with a desire to serve her community. She hopes to become a bilingual environmental health specialist or public‑health advocate, studying
    how air and water quality affect families in the Greeley area while educating residents in both Spanish and English. In the short term, she plans to deepen her STEM skills through the middle‑school
    science club, robotics workshops, and summer internships, aiming for a scholarship that will lead her to a degree in environmental engineering or public health. She also envisions eventually teaching
    younger students, using hands‑on science projects to celebrate cultural diversity and inspire future leaders.
