personas:
  professional: Aida Frometa, a 13-year-old robotics enthusiast, blends methodical planning and collaborative spirit by designing simple machines for their school club while they channel the discipline
    from their after-school soccer drills and family kitchen routines.
  sports: Aida Frometa dashes across the midfield for their Greeley Youth Soccer League team, idolizes the Colorado Rapids and draws tactical inspiration from their star midfielder while they also compete
    in the school's spring track club to boost stamina, often rewarding themselves with fresh fruit and a side of homemade salsa after workouts.
  arts: Aida Frometa strums the guitar to the rhythms of folk ballads by Lila Downs and Ed Sheeran, paints vibrant papel picado-style murals during art class, and they immerse themselves in the works of
    Frida Kahlo and Pixar's "Coco", letting these creative influences shape their weekend jam sessions and sketchbook doodles.
  travel: Aida Frometa loves planning road trips with their family, having already explored the Grand Canyon, visited San Diego's harbor festivals, and dreaming of navigating the historic streets of Puebla
    to capture its colorful lanterns, all while they balance school assignments that sometimes curtail longer vacations.
  culinary: Aida Frometa enjoys cooking sessions that blend traditional family recipes like pork tamales, roasted corn salsa with jalapeños, and avocado guacamole with their own experiments such as spicy
    chicken quesadillas and blueberry pancakes, showcasing an intermediate skill level that shines when they invite friends over for a potluck of colorful plates.
  core: Aida Frometa is a high-energy teen who juggles soccer, robotics, and guitar with a colorful notebook of doodles, a secret stash of gummy bears hidden in their backpack, and they habitually double-check
    their schedule to avoid missing any fiesta or practice.
background:
  cultural: Aida is raised in a Mexican‑American household where Spanish is spoken alongside English, and family gatherings revolve around traditional dishes, music, and Catholic celebrations. Her parents
    emigrated from central Mexico and passed down customs such as Día de los Muertos altars, mariachi music, and the importance of community solidarity. Living in Greeley, Colorado, she experiences a blend
    of Hispanic cultural events—like the annual Cinco de Mayo parade—and the broader Midwestern lifestyle, which has taught her to navigate both worlds comfortably. This bicultural upbringing influences
    her values of family, hard work, and respect for diversity, shaping her identity as a proud Mexican‑American teen.
attributes:
