  career_goals: Alicia aims to enroll in a high‑school art‑focused program, then pursue a Bachelor of Fine Arts in Illustration or a degree in Graphic Design. She dreams of becoming a concept artist for
    video games or animated films, building a robust portfolio that attracts freelance commissions. Long‑term, she envisions establishing a studio space where she can blend visual storytelling with therapeutic
    workshops, possibly teaching art therapy to youth in her community.
