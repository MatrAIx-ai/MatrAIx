personas:
  professional: An aspiring visual artist and junior game concept designer named Alicia Medina channels their fascination with mythology, magical realism, and science‑fiction into detailed sketches, digital
    paintings, and beginner‑level 3D models, approaching each creative project with meticulous planning, solitary focus, and a methodical workflow.
  sports: An avid nature walker, Alicia Medina enjoys early‑morning jogs through the local park, participates in a weekend bird‑watching hike club, and follows the nearby soccer team for communal excitement,
    all while preferring low‑impact, solitary fitness activities.
  arts: Creatively prolific, Alicia Medina spends evenings sketching mythic scenes, crafting digital art inspired by Beéeple and Frida Kahlo, writing flash fiction influenced by Borges and Allende, and
    curating a personal journal that blends poetry and visual storytelling.
  travel: Travel‑curious Alicia Medina dreams of exploring the historic alleys of Guanajuato, trekking Iceland’s volcanic landscapes, and revisiting their hometown’s cultural festivals, planning each trip
    with a detailed budget spreadsheet and a preference for off‑peak, solitary experiences.
  culinary: Culinary‑adventurous Alicia Medina often prepares chilaquiles with salsa verde, experiments with avocado‑lime salads, bakes guava‑filled empanadas, and pairs these dishes with hibiscus tea while
    sketching, reflecting a blend of traditional flavors and creative flair.
  core: Alicia Medina, a methodical and highly imaginative 15‑year‑old, fuses mythic storytelling with visual art, saves diligently for creative tools, monitors health through journaling, and finds comfort
    in solitary walks, all while wrestling with occasional perfectionist quirks.
background:
  cultural: Alicia grew up in a Mexican‑American household where both Spanish and English are spoken daily. Family gatherings often feature traditional dishes such as tamales and pozole, and celebrations
    of Día de los Muertos foster a deep appreciation for visual symbolism and storytelling. Her parents, who immigrated from Puebla, encourage a blend of cultural pride and integration into the broader
    Reading community. This bicultural environment nurtures her love for vibrant colors, mythic narratives, and the rich artistic heritage of Mexican muralists, while also exposing her to local Pennsylvania
    arts programs and community libraries.
