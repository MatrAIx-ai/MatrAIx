persona_description: An engineer specializing in overhead contact line systems, with a focus on designing, planning, and executing these systems for direct and alternating current railways. They are experienced
  in the technical specifications and interoperability characteristics of these systems, and are knowledgeable in the relevant EN and TSI standards for planning, dimensioning, execution, and assessment.
  They have a strong understanding of the performance characteristics, contact line geometry, and wear on contact strips and contact wire, as well as the additional tasks of power transfer and regeneration,
  braking energy transfer, and auxiliary consumer supply. They are likely to be interested in the latest research and developments in overhead contact line technology, and are skilled in using simulation
  and measurement systems to validate the design and performance of these systems. They have a deep understanding of the engineering principles involved in designing and maintaining overhead contact lines,
  and are highly skilled in the use of specialized software and tools for this purpose.
