personas:
  professional: Robert Jackson leverages decades of hands‑on experience in automotive, small‑engine repair, carpentry, and home maintenance to launch a part‑time handyman service for senior residents in
    Clearwater, and they blend their methodical budgeting skills, digital troubleshooting know‑how, and organized project coordination into a reliable, community‑focused business while pursuing a certified
    contractor license.
  sports: Robert Jackson enjoys weekend fishing trips on the Gulf and occasional sailing with the Clearwater Sailing Club, follows the Tampa Bay Buccaneers and Tampa Bay Rays, plays weekly chess matches
    at the senior center, and they participate in a local senior softball league, balancing low‑impact recreation with a competitive spirit.
  arts: Robert Jackson immerses themselves in the soulful rhythms of Gulf‑coast jazz and blues, regularly attending concerts featuring artists like B.B. King, Wynton Marsalis, and local blues bands, and
    they spend evenings reading biographies of pioneering American figures whose stories resonate with their cultural roots while also appreciating woodworking exhibits at the Clearwater Fine Arts Museum.
  travel: Robert Jackson plans their trips with spreadsheets, favoring short road‑trips to historic Southern towns such as Charleston and Savannah to reconnect with family heritage, occasional weekend getaways
    to New Orleans for its vibrant jazz scene, and occasional cruises along the Gulf for fishing, all while they balance their budget and limited free time.
  culinary: Robert Jackson cultivates heirloom tomatoes, basil, and thyme in their garden and uses them to craft fresh salads, grilled Gulf snapper topped with herb‑infused butter, and occasional Southern‑style
    BBQ ribs, and they take pride in a solid kitchen skill set grounded in seasonal, locally sourced ingredients.
  core: Robert Jackson blends a methodical, community‑oriented mindset with a love for hands‑on craftsmanship, disciplined budgeting, and the soulful traditions of Gulf‑coast music, and they temper this
    with a healthy dose of skepticism and a competitive edge.
background:
  cultural: Robert identifies as African‑American, with family roots in the Great Migration; his grandparents moved from South Carolina to Florida in the 1950s seeking better opportunities. He was raised
    in a close‑knit church community in Clearwater, where Sunday gospel services, soul‑food cooking, storytelling, and celebrations of Juneteenth were central to family life. These traditions fostered a
    strong sense of resilience, practicality, and competitive drive, shaping his approach to work and community involvement. Despite never marrying, he remains deeply connected to an extended family network,
    offering mentorship and support to younger relatives and neighbors.
attributes:
