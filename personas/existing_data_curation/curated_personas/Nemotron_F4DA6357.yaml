  hobbies: '[''painting'', ''street photography'', ''visiting art galleries'', ''cooking traditional Latin dishes'', ''listening to music'', ''walking along the shoreline'', ''volunteering at youth art
    programs'']'
  career_goals: Concepción aims to move into a supervisory role within the warehouse where she can mentor a larger crew and implement efficiency projects. She plans to earn an OSHA certification and a supply‑chain
    logistics certificate from a community college, which will open doors to a logistics coordinator position. Long‑term, she dreams of starting a small side business that curates and sells locally‑made
    art and crafts, merging her love of art with her logistical know‑how. She also hopes to support her husband in purchasing a modest home in New Haven, providing stability for her growing family.
