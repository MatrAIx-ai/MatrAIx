  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Quilting'', ''Gardening'', ''Attending jazz concerts'', ''Reading historical fiction'', ''Participating in a small book club'', ''Walking
    nature trails'', ''Cooking traditional Southern dishes'']'
  career_goals: Nellie aims to transition into a part‑time role that blends her retail expertise with her love of the arts, such as working in the gift shop of a local museum or assisting a community art
    center with visitor services. She hopes to volunteer as an art docent, sharing her appreciation for visual art with small groups of visitors. Additionally, she wants to develop a modest side venture
    selling handcrafted quilts and watercolor prints online, providing supplemental income for her retirement while staying creatively engaged. Mentoring junior cashiers and contributing to senior‑citizen
    outreach programs remain important personal ambitions.
