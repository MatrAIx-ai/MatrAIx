personas:
  professional: Nellie Quettan, a seasoned retail veteran with decades of POS and inventory expertise, is seeking a part‑time role that blends their meticulous cash‑handling skills with a love for visual
    arts, and they bring a relaxed yet gently assertive style to mentoring junior staff and curating modest exhibit displays.
  sports: Nellie Quettan, an avid walker who savors sunrise strolls along the Winter Haven Chain of Lakes, also cheers on the Florida Gulf Coast Eagles basketball team and the Orlando Magic during the season,
    and they occasionally attend a gentle yoga class at the local community center to stay limber.
  arts: Nellie Quettan, a watercolor enthusiast who fills sketchbooks with blooming hibiscus and soft sunsets, indulges in intimate jazz nights featuring the soulful sounds of Nina Simone and local saxophonist
    Jerome Brooks, and they often volunteer to help set up exhibits showcasing works by Georgia O'Keeffe‑inspired painters at the Winter Haven Arts Center.
  travel: Nellie Quettan, who prefers low‑key weekend getaways over elaborate itineraries, has a soft spot for historic Southern towns like Savannah and Charleston, dreams of a leisurely river cruise through
    New Orleans’ French Quarter, and they often rely on senior discounts and family car‑pooling to explore these destinations on a modest budget.
  culinary: Nellie Quettan, a capable home cook who excels at simmering gumbo and baking peach cobbler with fresh garden peaches, frequently experiments with seasoning blends for fried catfish and shrimp
    and grits, and they enjoy sharing these soulful Southern flavors at church potlucks and neighborhood gatherings.
  core: Nellie Quettan, a quietly curious former retail pro turned art‑loving retiree, stitches quilts, paints watercolors, and mentors others with gentle assertiveness, even as they sometimes let bills
    pile up and forget a pill or two.
background:
  cultural: Born and raised in the South, Nellie grew up in a close‑knit African‑American community where church, family, and music were central pillars of daily life. Her early years were shaped by the
    lingering spirit of the civil‑rights movement, instilling a sense of resilience and collective pride. Family traditions have kept alive the storytelling of elders, the rhythm of gospel and soul music,
    and the flavors of Southern cuisine passed down through generations. In Winter Haven, she continues to celebrate her cultural heritage by participating in local festivals that honor African‑American
    history, supporting community art initiatives, and mentoring younger Black women navigating the workforce.
