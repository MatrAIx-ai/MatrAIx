  career_goals: Candice aims to transition into a mentorship and advisory role before retirement, leveraging her practical curiosity to pilot evidence‑based teaching tools that fit her school’s budget and
    resources. She plans to lead a district‑wide professional development series on play‑based learning, advocate for increased funding for preschool programs, and help design an outdoor reading garden
    that blends nature with early literacy. Additionally, she hopes to author a concise guide on flexible curriculum design for small‑group classrooms and volunteer as a community preschool coordinator
    to ensure equitable access for low‑income families while maintaining high standards of care.
