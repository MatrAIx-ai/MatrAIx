personas:
  professional: Dina Payne, a 27‑year‑old computer support specialist, blends her sharp troubleshooting skills across Windows, macOS and Linux with a natural flair for communication, turning each service
    ticket into a coaching moment while championing inclusive tech culture through mentorship and workplace advocacy.
  sports: Dina Payne stays active by dancing hip‑hop and salsa at downtown Riverwalk Studio, follows the NBA’s Miami Heat and the Tampa Bay Rowdies in the off‑season, and participates in the Tampa Tech
    Running Club’s 5K charity runs, balancing competitive spirit with community‑oriented fitness events.
  arts: Dina Payne immerses herself in the creative world through improv nights with the local Improv Academy, playlists featuring Kendrick Lamar and Celia Cruz, and late‑night sci‑fi marathons of Nnedi Okorafor
    and Becky Chambers, while drawing inspiration from Basquiat’s street‑art ethos for her own storytelling in video games.
  travel: Dina Payne prefers purposeful trips that blend cultural immersion and tech networking, having explored New Orleans for its music and food, attended a cloud‑computing summit in Seattle, and planning
    a heritage journey to Ghana’s coastal towns to connect with family roots, all while balancing a modest travel budget and occasional work‑related constraints.
  culinary: Dina Payne loves experimenting with Southern staples like shrimp and grits, collard greens with smoked paprika, and jambalaya, honing her home‑cooking skills at weekend potlucks where she layers
    soulful flavors with fresh market‑found okra and hot sauce, yet she sometimes over‑season dishes in a quest for boldness when stressed.
  core: Dina Payne is a tech‑savvy, socially driven 27‑year‑old who transforms support tickets into mentorship moments, balances diligent budgeting with occasional indulgences, and channels her community‑rooted
    values into inclusive leadership, all while wrestling with anxiety and a love for dance, games, and soul‑food.
background:
  cultural: Dina is African-American and was raised in Tampa’s vibrant West Tampa neighborhood, where her family has deep roots in the local church and community activism. Her grandparents participated
    in the civil‑rights movement, instilling a strong sense of pride and responsibility to give back. This heritage informs her commitment to representation in tech; she mentors young Black students through
    programs like Black Girls CODE and volunteers at the local library’s STEM outreach. Dina’s cultural identity is also expressed through music, food, and traditions she celebrates with family, such as
    Juneteenth gatherings and holiday soul-food feasts. She carries this cultural richness into her professional life, advocating for inclusive workplace policies and serving as a liaison between diverse
    staff and management.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Operating systems: Windows, macOS, Linux'', ''Remote support tools (TeamViewer, AnyDesk)'', ''Ticketing systems (Zendesk,
    ServiceNow)'', ''PowerShell scripting'', ''Python automation'', ''Knowledge-base article creation'', ''User communication and training'', ''Basic networking (TCP/IP, VPN, Wi-Fi)'', ''Cloud fundamentals
    (AWS EC2, S3)'', ''ITIL service-management concepts'', ''Workshop facilitation'', ''Conflict resolution'', ''Assertive service-level enforcement'']'
  hobbies: '[''Tech meetups and hosting workshops'', ''Community improv comedy'', ''Hip-hop and salsa dancing'', ''Playing narrative video games'', ''Reading science-fiction'', ''Southern cooking and potluck
    gatherings'', ''Mindfulness journaling'', ''Yoga for stress relief'']'
  career_goals: Dina aims to transition from a support specialist to a senior IT Service Manager within the next three years, obtaining certifications such as CompTIA Network+, Cisco CCNA, and ITIL v4 to
    solidify her expertise. She envisions leading a diverse technical team that drives proactive service improvements and implements automation to reduce repetitive workload. Long-term, she wants to champion
    diversity in technology by establishing a mentorship program for Black youth in Tampa, partnering with organizations like Black Girls CODE. Ultimately, Dina hopes to leverage her blend of technical
    acumen and people skills to become a strategic technology leader who shapes inclusive, resilient IT operations for her organization and the wider community.
