personas:
  professional: Wallace Daragjati, an 8‑year‑old budding LEGO architect and junior coder, meticulously organizes every brick by color and type before constructing detailed vehicle models, and they apply
    the same systematic thinking when solving coding puzzles on their tablet, showcasing a natural flair for engineering and problem‑solving.
  sports: Wallace Daragjati plays forward for the Fort Knox Youth Soccer Club, cheers for Louisville City FC in the USL, rides at the nearby Green Pastures Stables where they train on a pony named Daisy,
    and they love watching the Kentucky Wildcats basketball team for inspiration.
  arts: Wallace Daragjati immerses themselves in country music, especially songs by Luke Bryan and Carrie Underwood, while drawing adventure maps inspired by their favorite Hardy Boys books and building
    intricate LEGO cityscapes, showing how narrative and rhythm fuel their creative play.
  travel: Wallace Daragjati enjoys family road trips to the Kentucky State Fair in Louisville, weekend camping at Mammoth Cave for treasure‑hunt style hikes, and dreams of visiting Disney World in Orlando
    to ride the Space Mountain, balancing a love for local traditions with a budding wanderlust.
  culinary: Wallace Daragjati loves the comforting taste of mac and cheese with extra cheddar, can whip up a quick peanut butter‑jelly sandwich, delights in BBQ pulled pork sliders with coleslaw, and enjoys
    snacking on crisp carrot sticks and apple slices after horseback riding.
  core: Wallace Daragjati is an organized LEGO enthusiast who follows strict routines, devours country hits, sometimes forgets sunscreen on trail hikes, and can be caught hoarding extra bricks under the
    bed.
background:
  cultural: Wallace's cultural background is rooted in the white, Midwestern American milieu of the Fort Knox military community in Kentucky. The base environment promotes disciplined routines, respect
    for hierarchy, and a strong sense of patriotism, which are reinforced by local Southern customs such as attending community fairs, enjoying country music, and participating in outdoor activities like
    hiking and fishing. His upbringing reflects a blend of mainstream American family traditions and the structured, cooperative culture of a military installation.
attributes:
  skills: '[''Following daily routines'', ''Keeping personal space organized'', ''Memorizing times tables up to 12'', ''Constructing LEGO models'', ''Basic Scratch programming'', ''Reading age-appropriate
    adventure books'', ''Attention to detail in puzzles'', ''Caring for a family pet (dog)'', ''Cooperative teamwork in classroom projects'']'
  hobbies: '[''Building LEGO sets'', ''Reading adventure and mystery books'', ''Playing soccer'', ''Exploring nature trails'', ''Basic coding challenges (Scratch)'', ''Horseback riding lessons'', ''Listening
    to country music'', ''Helping with simple chores at home'']'
  career_goals: Wallace imagines future roles where he can keep things orderly and help others, such as becoming a firefighter, a military engineer, or a community emergency responder. He is fascinated
    by protecting people and likes the idea of working on structured projects like building bridges or maintaining equipment. He also enjoys hearing stories from the base about Army technical jobs and hopes
    to follow a path that combines his love of organization with service.
