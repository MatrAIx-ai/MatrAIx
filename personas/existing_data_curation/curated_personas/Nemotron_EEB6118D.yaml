  career_goals: At 68, Arvind’s goals focus on personal enrichment and community contribution rather than traditional career advancement. He aims to curate a small, rotating exhibit of local artists’ work
    in the community center, fostering a space where seniors and younger residents can share creative ideas. He also hopes to write a memoir of his life’s experiences, emphasizing the value of curiosity
    and kindness, and to volunteer regularly at the senior center, leading art‑based therapy sessions that help others manage anxiety and sadness. Travel with his wife to nearby cultural destinations, such
    as museum trips and coastal art fairs, is another aspiration that fuels his desire for new experiences.
