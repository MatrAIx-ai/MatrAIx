personas:
  professional: Ralph Stanley is a budding indie game developer and digital illustrator who spends their afternoons sketching fantasy characters, writing Python scripts to prototype gameplay mechanics,
    and tinkering with microcontroller kits, channeling their curiosity and preference for solitary, unstructured creative work into self‑directed projects.
  sports: Ralph Stanley is a member of the local junior archery club and an occasional cross‑country runner who prefers the quiet rhythm of jogging through nearby woods over crowded gym classes, while they
    root for the Seattle Seahawks in football and the Seattle Mariners in baseball.
  arts: Ralph Stanley immerses themselves in the visual storytelling of Studio Ghibli, the atmospheric scores of composer Jeremy Soule, and the lyrical indie folk of Phoebe Bridgers, and they translate
    that inspiration into hand‑drawn concept art and digital paintings that populate their sci‑fi journal.
  travel: Ralph Stanley enjoys weekend hikes in the nearby Blue Ridge Mountains and day trips to the state botanical garden, and they dream of photographing the aurora borealis in Iceland and exploring
    the ancient forests of Japan’s Yakushima Island.
  culinary: Ralph Stanley prefers quick, comfort foods like ramen with soft‑boiled eggs and miso broth, homemade grilled cheese sandwiches on sourdough, and avocado toast topped with chili flakes, though
    they admit their cooking skill is limited to microwave meals and occasional stovetop sauté.
  core: Ralph Stanley, a solitary teen with a boundless imagination, channels curiosity into art, code, and nature, yet they often splurge impulsively and occasionally neglect health routines.
background:
  cultural: Ralph was born and raised in Marianna, a small town in the Florida Panhandle known for its close‑knit community and proximity to the Apalachicola National Forest. Growing up in a predominantly
    white, Southern‑American family, he was exposed to a blend of traditional values – such as self‑reliance, modesty, and a strong sense of community – and the rhythms of rural life, including church gatherings,
    local high‑school sports events, and county fairs. The region’s natural environment, with its rivers, wetlands, and pine forests, fostered his appreciation for outdoor exploration and his careful observational
    habits. While his family encourages participation in community activities, Ralph’s introverted nature led him to seek quieter, solitary pursuits. This cultural backdrop of Southern hospitality, respect
    for nature, and a modest work ethic subtly shapes his worldview and influences his artistic and intellectual interests.
attributes:
  skills: '[''Sketching and charcoal drawing'', ''Digital illustration with Procreate and Photoshop'', ''Introductory Python programming'', ''Local flora and fauna identification'', ''Strategic video game
    play'']'
  hobbies: '[''Reading science‑fiction and fantasy novels'', ''Sketching and digital illustration'', ''Exploring local nature trails and wildlife photography'', ''Playing single‑player adventure and competitive
    strategy video games'', ''Building small electronics kits and coding Python projects'', ''Listening to podcasts on art, game design, and natural history'']'
  career_goals: He aims to combine his love of art and technology by eventually becoming an indie video‑game developer or concept artist, creating immersive narrative experiences that reflect his unconventional
    ideas. In the short term, he plans to join a high‑school magnet program focused on digital media and computer science, and to build a portfolio of artwork and small games to showcase his talents. He
    also dreams of using his knowledge of the natural world to produce wildlife‑themed game environments or independent short films. Ultimately, Ralph hopes to work independently or with a small creative
    studio where he can maintain flexibility, continue learning, and produce work that balances artistic expression with technical craft.
