persona_description: A microbiologist and cell biologist who has successfully reproduced the elusive Perigord black truffle in a laboratory using their backgrounds in microbiology and cell biology. The
  truffle can now be made available to people other than the very rich, and it is considered the most flavorful truffle. The laboratory is located in Woodland and is currently undergoing a patent process
  for the procedure. The truffles are cultivated in a sterile dark room on flat trays that are 12 feet wide and 60 feet long, and they grow in silence, undisturbed by yelping dogs. The partners' first idea
  was to dry and grind the truffles and package them in vials weighing 1.4 grams (one-twentieth of an ounce), which is enough to make a truffle sauce to feed about 10 people.
