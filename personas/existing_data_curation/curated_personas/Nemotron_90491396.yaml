  hobbies: '[''Line dancing'', ''Karaoke'', ''Community volunteering (senior‑care outreach)'', ''Book club participation'', ''Hiking and bird‑watching'', ''Weekend road trips'', ''Cooking Southern cuisine
    with modern twists'', ''Community gardening and farmers‑market selling'']'
  career_goals: Lacinda aims to transition from a hands‑on medical assistant role to a supervisory or program‑manager position that blends clinical insight with community health promotion. She plans to
    earn the Certified Medical Assistant (CMA) credential and later pursue a bachelor’s degree in health administration or public health, focusing on rural health initiatives. Her long‑term ambition is
    to lead a mobile health‑clinic program that brings preventive services to underserved neighborhoods in Carroll County, leveraging her curiosity for new care delivery models while maintaining a practical,
    results‑oriented approach. She also hopes to mentor younger staff, fostering a collaborative and flexible work culture.
