  hobbies: '["Cooking Mexican cuisine","Reading historical fiction","Hiking and trail planning","Yoga","Volunteering at local cultural events","Maintaining a Mexican film review blog","Photography","Playing
    tennis"]'
  career_goals: Maria aims to secure an entry‑level position in cultural program management or community outreach within a non‑profit arts organization or museum in Orange County. Over the next five years
    she plans to pursue a master’s degree in Museum Studies or Public Administration, building on her organizational strengths to advance to a program director role. She is driven to create structured,
    impactful cultural initiatives that highlight Mexican heritage while fostering personal growth and leadership opportunities.
