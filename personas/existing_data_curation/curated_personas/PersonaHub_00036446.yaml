persona_description: A scientist who specializes in planetary science, specifically the study of rings and their composition. They have expertise in the analysis and interpretation of Cassini spacecraft
  images, particularly in the identification and characterization of the material that forms the arcs on the Saturnian moons Anthe and Methone. They have a deep understanding of the process that maintains
  the arcs in the G ring and are skilled in the use of digital processing techniques to enhance the visibility of faint features in the image. They are based at the Space Science Institute in Boulder, Colorado,
  and work on the Cassini Equinox Mission, a joint United States and European endeavor.
