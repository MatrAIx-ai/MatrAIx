personas:
  professional: Dominga Rivera, a seasoned IT support specialist with two decades of systems administration expertise, channels their methodical curiosity and compassionate nature into building secure,
    bilingual tech infrastructures for community-focused nonprofits, while mentoring emerging professionals through clear documentation and hands‑on guidance.
  sports: Dominga Rivera, a dedicated member of the Hill Country Hikers club, spends weekends trekking the Edwards Plateau while keeping fit with low‑impact yoga sessions, cheerfully roots for the San Antonio
    Spurs and Texas Rangers, and occasionally joins a weekend recreational softball league at the Boerne community park.
  arts: Dominga Rivera, a quiet lover of the written word, devotes her evenings to historical novels by Hilary Mantel and Ken Follett while displaying nature photographs inspired by Ansel Adams, curates
    a modest collection of Frida Kahlo prints, and finds solace in the soulful melodies of Lila Downs and the classic films of Pedro Almodóvar.
  travel: Dominga Rivera, who plans trips with meticulous itineraries, favors low‑key getaways such as a weekend retreat to Fredericksburg’s wineries, annual hikes in Big Bend National Park, and culturally
    immersive stays in Oaxaca to explore culinary roots, while balancing travel schedules around her community‑center volunteer commitments.
  culinary: Dominga Rivera, an adept home chef, routinely blends classic Mexican staples like carnitas and chile relleno with Tex‑Mex flair by incorporating smoked paprika and cheddar, perfects her salsa
    verde using fresh tomatillos and cilantro, and treats friends to a signature chipotle‑marinated grilled corn salad that showcases their love for bold, earthy flavors.
  core: Dominga Rivera marries a methodical tech mind with a quiet, compassionate soul, balancing a love for solitary gardening and quilting with a steadfast drive to empower seniors through digital literacy,
    all while occasionally hoarding unused quilting fabric as a quirky comfort.
background:
  cultural: Dominga’s Mexican heritage is a cornerstone of her identity. Raised in a bilingual household, she grew up speaking Spanish at home while navigating English‑dominant schools, which has cultivated
    her fluency and ability to bridge cultural gaps in her professional life. Mexican cultural values of family, community, and hospitality inform her compassionate demeanor and her commitment to service.
    She celebrates traditions such as Día de los Muertos and Mexican Independence Day, often preparing dishes like tamales, mole, and pozole to share with neighbors and at local festivals. Living in Boerne,
    Texas, she blends these customs with Hill Country culture, participating in community events, supporting local farmers’ markets, and maintaining strong ties to both her Mexican roots and her Texan community.
