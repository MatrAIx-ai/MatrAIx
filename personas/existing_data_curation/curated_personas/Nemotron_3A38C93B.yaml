  career_goals: Dominga aims to transition into a senior leadership role where she can shape IT strategy for a community‑focused organization, such as a nonprofit health clinic or senior center. She plans
    to earn industry certifications like CompTIA Security+ and Cisco CCNA, and eventually complete a bachelor’s degree in Information Technology to deepen her strategic expertise. A core ambition is to
    design and launch a local digital‑literacy program that equips seniors and low‑income families with essential computer skills, merging her curiosity for emerging tech with her practical, compassionate
    approach. Additionally, she seeks to mentor emerging IT professionals, fostering a collaborative culture that balances innovative solutions with proven reliability.
