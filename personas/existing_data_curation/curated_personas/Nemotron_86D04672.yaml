personas:
  professional: Sterling Hearne, a retired middle‑school science teacher turned volunteer curriculum mentor, leverages three decades of lesson‑planning expertise and hands‑on woodworking to design intergenerational
    workshops that blend sustainable gardening with historical rail‑line models for Bath County schools and senior centers.
  sports: Sterling Hearne regularly hikes the Blue Ridge and Shenandoah trails with the Bath County Hiking Club, casts a fly line on the James River during spring, follows the Washington Nationals for baseball,
    and enjoys watching Virginia Tech basketball in the winter, though they rarely join organized team sports.
  arts: Sterling Hearne curates a personal collection of Appalachian folk art while listening to bluegrass legends like Doc Watson and The Seldom Scene, attends occasional performances at the Clifton Forge
    Community Theatre, and finds inspiration for model‑railroad scenery in the paintings of Andrew Wyeth.
  travel: Sterling Hearne prefers low‑key road trips that combine genealogy research with scenic drives, having explored Gettysburg and Colonial Williamsburg on weekend outings and dreaming of a heritage
    tour of the Scottish Highlands and the Irish countryside for the next decade.
  culinary: Sterling Hearne delights in farm‑to‑table cooking, often preparing heirloom tomato bruschetta, smoked catfish with a lemon‑thyme glaze, and apple‑cinnamon cobbler using garden‑grown herbs like
    rosemary and sage, while modestly convincing friends at potlucks that their sourdough starter is the secret to perfect crust.
  core: Sterling Hearne balances a lifelong curiosity for history with practical gardening, often humming folk tunes while carving wooden chairs, but can be forgetful about watering new seedlings and occasionally
    splurges on rare model‑railroad editions.
background:
  cultural: Sterling is a third‑generation Virginian whose family has deep ties to the Appalachian region of western Virginia. His ancestors worked as small‑scale farmers and railroad laborers, embedding
    a strong sense of self‑reliance, hospitality, and stewardship of the land. Growing up in Clifton Forge, he was immersed in bluegrass music, church life (he is a lifelong United Methodist), and community
    festivals that celebrate regional heritage. This upbringing cultivated an appreciation for tradition while his teaching career exposed him to broader perspectives, fostering a curiosity that he balances
    with practicality. His cultural identity is reflected in his commitment to community service, preservation of local history, and reverence for the natural environment that surrounds Bath County.
attributes:
