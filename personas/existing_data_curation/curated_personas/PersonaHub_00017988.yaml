persona_description: A Beninese woman who has dedicated her life to preserving and promoting Benin's cultural heritage, particularly the country's most important pieces of art. She has worked in Benin's
  museums for decades and is known for her expertise in African art and her commitment to expanding art and cultural heritage programs and infrastructures within Benin. She is interested in the return of
  Benin's most important pieces to the country, which have been housed in France for over a century.
