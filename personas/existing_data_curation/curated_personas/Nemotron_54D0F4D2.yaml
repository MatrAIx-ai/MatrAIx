  hobbies: '[''Watercolor Painting'', ''Community Theater (Backstage Support)'', ''Art Exhibitions'', ''Book Club'', ''Hiking and Photography'', ''Cooking Regional Recipes'', ''Gardening'', ''Yoga and Mindfulness
    Meditation'', ''Volunteer Event Planning'', ''Craft Workshops'']'
  career_goals: Karen aims to advance from her current secretary/administrative assistant role to an office manager or executive assistant position within the next three to five years. She plans to complete
    a certification in Office Management and attend workshops in project management to broaden her skill set. She is also interested in leading community initiatives, such as organizing art festivals or
    workshops, leveraging her love for art and her organizational expertise. Long‑term, she envisions starting a small consulting firm that helps local non‑profits and small businesses improve their administrative
    processes and event planning capabilities, combining her administrative strengths with her passion for community development.
