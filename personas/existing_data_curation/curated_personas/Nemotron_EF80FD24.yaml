personas:
  professional: Sarah Thompson, a seasoned Tacoma real‑estate professional, harnesses two decades of valuation expertise, HubSpot and Follow Up Boss CRM mastery, and a no‑nonsense, structured approach to
    negotiate waterfront and historic home deals while competitively building a boutique brokerage team.
  sports: Sarah Thompson spends Saturday mornings hiking Point Defiance Park trails, joins a weekly kayak crew on Commencement Bay, practices yoga at sunrise, roots for the Seattle Seahawks, Seattle Mariners,
    and Seattle Sounders FC, and plays summer beach volleyball with members of their book club.
  arts: Sarah Thompson devotes evenings to her mystery‑thriller book club, where they debate Gillian Flynn and Stephen King, attends the Tacoma Dome’s live performances of contemporary playwrights, and
    relishes wine‑tasting events featuring local vintners as a cultural garnish to their artistic palate.
  travel: Sarah Thompson prefers meticulously planned weekend getaways, blending active pursuits with wine‑country relaxation, having explored the San Juan Islands, Vancouver’s waterfront, the vineyards
    of Napa Valley, and dreaming of a future culinary tour of Tuscany’s coastal towns.
  culinary: Sarah Thompson’s culinary skill shines on the grill, where they master cedar‑plank salmon, char‑seared halibut with fresh dill, and Dungeness crab cakes paired with a crisp Pinot Noir, while
    also experimenting with Pacific‑Northwest foraged mushrooms.
  core: Sarah Thompson balances a competitive, structure‑obsessed real‑estate career with a love for outdoor adventure, community service, and seafood grilling, yet they can’t resist a nightly episode of
    true‑crime podcasts and an occasional missed deadline when a new recipe takes longer than expected.
background:
  cultural: Sarah grew up in a middle‑class White American family in the Pacific Northwest, first in the suburbs of Seattle and later in Tacoma. Her upbringing emphasized self‑reliance, practical problem‑solving,
    and a strong work ethic, reflecting broader American values while also incorporating the region’s appreciation for nature and community involvement. These cultural influences have shaped her straightforward
    communication style, her competitive drive in business, and her love of outdoor activities and local volunteerism.
attributes:
  skills: '[''Property Valuation'', ''Comparative Market Analysis'', ''Negotiation'', ''Client Relationship Management'', ''Real Estate Law Compliance'', ''Mortgage Financing Knowledge'', ''Marketing &
