  hobbies: '[''Hiking'', ''Kayaking'', ''Book Club'', ''Wine Tasting'', ''Yoga'', ''Volunteering with Habitat for Humanity'', ''Cooking (grilled seafood)'']'
  career_goals: Sarah aims to secure her Washington State Broker License within the next twelve months, allowing her to open a boutique brokerage that specializes in waterfront and historic homes in the
    Tacoma area. She plans to build a high‑performing team of agents, increase her annual sales volume by at least 30 %, and achieve a top‑three ranking among brokers in Pierce County. Over the longer term,
    she hopes to diversify into residential property investment, acquire a portfolio of rental units, and mentor new agents through a structured apprenticeship program.
