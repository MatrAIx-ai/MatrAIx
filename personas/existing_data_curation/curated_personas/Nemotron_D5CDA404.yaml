  career_goals: Kenneth aims to become a certified senior maintenance technician, obtaining certifications in HVAC, electrical safety, and sustainable building practices. He hopes to move into a supervisory
    role within a property management company, where he can mentor junior staff and implement efficiency improvements. Long‑term, he envisions starting his own small maintenance business focused on eco‑friendly
    repairs and preventative services, allowing him flexible hours and reduced stress. He also wants to improve his organizational skills and reduce the anxiety that comes from unpredictable work demands.
