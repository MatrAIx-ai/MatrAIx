  hobbies: '[''Surfing'', ''Paddleboarding'', ''Hiking'', ''Fishing'', ''Electronic tinkering'', ''RC car building'', ''Vintage bicycle restoration'', ''Cooperative video gaming'', ''Science‑fiction reading'',
