persona_description: A historian who specializes in the medieval history of the Diocese of Cambrai, particularly focusing on the role of St. Boniface and his impact on the region. His research interests
  include the history of the Diocese of Cambrai, the role of St. Boniface, the history of the Benedictine order, and the development of the Diocese of Cambrai under German rule. He is also interested in
  the history of the Diocese of Cambrai during the Middle Ages, the role of the Archdiocese of Cambrai, and the history of the Diocese of Cambrai under French rule.
