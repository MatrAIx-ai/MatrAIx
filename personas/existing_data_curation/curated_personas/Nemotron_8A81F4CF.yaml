personas:
  professional: Manuel Feliciano, a laboratory manager-in-training with a solid grounding in molecular biology techniques like PCR and gel electrophoresis, they combine bilingual fluency and methodical
    organization to coordinate interdisciplinary research teams while their outgoing nature fuels community outreach and science communication initiatives.
  sports: Manuel Feliciano, a midfielder for the Bronx Blast Soccer Club, also competes in the Hudson Valley Hikers' fall treks and follows the New York Knicks, the New York Yankees, and FC Barcelona, they
    balance structured training sessions with spontaneous weekend pick‑up games to stay energized and socially connected.
  arts: Manuel Feliciano, an avid patron of the Museum of Modern Art and a regular at the Brooklyn Academy of Music, they find inspiration in Claude Monet's brushstrokes, Brad Mehldau's jazz improvisations,
    and spoken‑word artist Sarah Kay's poetry readings, weaving these experiences into their community science talks.
  travel: Manuel Feliciano crafts meticulous itineraries that blend cultural immersion with outdoor adventure, they have hiked the Appalachian Trail in Virginia, savored tapas in Barcelona, and enjoyed
    weekend escapes to the Finger Lakes, all while strategically allocating vacation days to balance work commitments and spontaneous road trips.
  culinary: Manuel Feliciano, a confident home chef, they specialize in paella with saffron, chorizo, and bomba rice, perfect a tortilla española with thinly sliced potatoes, experiment with gazpacho, and
    enjoy pairing meals with Rioja wine while frequenting the local farmer’s market for fresh olives and Manchego cheese.
  core: Manuel Feliciano blends scientific rigor with lively community engagement, they thrive on organized curiosity, salsa beats, and the occasional late‑night binge‑watch of documentary series, though
    they sometimes procrastinate paperwork while perfecting paella.
background:
  cultural: Manuel was born and raised in Madrid, where he grew up immersed in a family environment that valued education, art, and communal gatherings. His Spanish heritage is evident in his love for Mediterranean
    cuisine, music, and festivals, as well as his fluency in both Spanish and English. After moving to New York for his career, he blends his traditional values—such as strong family ties and hospitality—with
    the city’s multicultural dynamism, actively engaging with the Hispanic community and celebrating cultural events like Semana Santa and Día de Los Muertos while also embracing the diverse artistic scene
    of NYC.
