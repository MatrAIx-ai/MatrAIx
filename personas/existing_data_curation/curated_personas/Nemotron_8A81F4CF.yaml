  career_goals: Manuel aims to advance to a senior laboratory manager role where he can integrate his scientific expertise with his humanities perspective to lead interdisciplinary research projects. He
    plans to earn a master's degree in science communication or public health to enhance his ability to translate complex scientific concepts for broader audiences. Ultimately, he aspires to develop community-based
    science outreach programs that serve Spanish‑speaking populations in New York, and to obtain professional certification as a clinical laboratory scientist.
