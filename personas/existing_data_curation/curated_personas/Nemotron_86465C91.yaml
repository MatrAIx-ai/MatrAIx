personas:
  professional: Richard Puerto, an aspiring digital illustrator who pivots between sketching sci‑fi heroes and folkloric figures, they channel their vivid imagination and talkative energy into collaborative
    online art projects and short gameplay videos while maintaining enough organization to meet school deadlines.
  sports: Richard Puerto, a member of the local youth soccer league and an avid pickup basketball player for the middle school team, they root for the Los Angeles Galaxy and the Los Angeles Lakers, and
    spend weekends at the community skatepark honing tricks between games.
  arts: Richard Puerto, a budding guitarist and comic‑style illustrator, they draw lyrical inspiration from the ethereal soundscapes of Studio Ghibli, the lyrical depth of Billie Eilish, and the visual
    narratives of Alan Moore and Junji Ito, often blending these influences into original graphic stories and original song lyrics.
  travel: Richard Puerto prefers weekend road trips that blend adventure and cultural immersion, they have explored the towering cliffs of Zion National Park, the bustling streets of New York City, and
    the historic ruins of an ancient civilization, while dreaming of a backpacking journey across the Pacific Northwest’s coastal trails.
  culinary: Richard Puerto, a self‑taught kitchen enthusiast, they love crafting spicy ramen with miso and chili oil, whipping up quick guacamole using ripe avocados, cilantro, lime, and jalapeño, and experimenting
    with homemade tacos topped with fresh salsa, though they often over‑season dishes in pursuit of bold flavor.
  core: Richard Puerto fuses a boundless imagination with a talkative, sociable flair, they hoard sketchbooks, impulsively buy limited‑edition merch, and occasionally skip chores, yet consistently use those
    quirks to fuel creative projects and community storytelling.
background:
  cultural: Richard grew up in a Mexican‑American household in Bakersfield, where family gatherings often revolve around traditional foods, music, and celebrations like Día de los Muertos and Las Posadas.
    Bilingualism is a daily reality; he speaks Spanish with his grandparents and English at school, giving him a fluid cultural identity that bridges both worlds. The agricultural heritage of Kern County
    and the strong sense of community in his neighborhood have instilled values of hard work, respect for elders, and communal solidarity. These influences surface in his artistic interests, as he frequently
    incorporates vibrant colors, folk motifs, and storytelling traditions from Mexican culture into his modern digital creations.
attributes:
  skills: '[''Creative writing'', ''Digital illustration'', ''Public speaking'', ''Bilingual communication (English/Spanish)'', ''Basic video editing (iMovie/Clipchamp)'', ''Graphic design basics (Canva)'',
    ''Leadership in school clubs'', ''Organizational planning for group projects'', ''Basic Python programming'', ''Photography fundamentals'']'
  hobbies: '[''Drawing and digital illustration'', ''Playing indie video games'', ''Creating short gameplay videos'', ''Playing guitar and songwriting'', ''Participating in community festivals (e.g., Día
    de los Muertos, Cinco de Mayo)'', ''Making papel picado and other Mexican folk crafts'', ''Reading graphic novels'', ''Writing short stories'', ''Volunteering at the library story‑time'']'
  career_goals: Richard aspires to become a multimedia storyteller who blends digital art, animation, and cultural narratives. His long‑term ambition is to study graphic design or visual communication at
    a university with a strong arts program, eventually working as a creative director or video game designer. He dreams of creating projects that showcase Mexican‑American stories and traditions, using
    his bilingual skills to reach diverse audiences. In the nearer future, he hopes to build a robust portfolio of digital illustrations and short videos that he can share on social media platforms and
    possibly turn into freelance commissions.
