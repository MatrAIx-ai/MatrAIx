  career_goals: Christopher aims to secure an entry‑level position in IT support or technical services within a local company, where he can apply his troubleshooting skills while continuing to learn. Over
    the next three to five years he plans to earn CompTIA A+ and Network+ certifications and pursue a bachelor’s degree in Computer Science or Information Systems, with the long‑term ambition of becoming
    a network administrator or cybersecurity analyst. He also hopes to develop leadership abilities to eventually manage a small technical team, and values a career that offers stability, clear advancement
    pathways, and opportunities to contribute positively to his community.
