    for kitchen tools'', ''Journaling and sketching food concepts'']'
  career_goals: Maria aspires to channel her curiosity and competitive drive into owning a boutique pop‑up restaurant in Miami that showcases innovative Colombian‑inspired dishes presented as visual art.
    She plans to enroll in a culinary arts program to gain formal credentials, earn the title of Chef de Cuisine at a high‑end Latin‑American restaurant, and eventually publish a cookbook that documents
    her experimental fusion approach. Short‑term, she aims to win a regional cooking competition, build a loyal following through food‑styled social media content, and expand her catering services for intimate,
    art‑themed events.
