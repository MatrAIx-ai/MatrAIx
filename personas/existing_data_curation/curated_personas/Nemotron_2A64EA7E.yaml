  career_goals: At four, Daniela loves to imagine future roles and often declares she wants to "help people" as a doctor, to "teach kids" like her teachers, and to "paint big pictures" as an artist. Her
    open-mindedness fuels a willingness to explore any imaginative career, and she frequently talks about becoming a veterinarian, a dancer, or a storyteller when she grows up.
