personas:
  professional: Daniela Rentas, a budding architect in the sandbox, builds elaborate castles with sand, crayons, and LEGO, applying methodical planning, curiosity for new designs, and a love for explaining
    their structures to friends.
  sports: Daniela Rentas, a lively member of the local kindergarten soccer club, cheers for the city’s baseball team the River City Rebels, loves to practice dribbling in the park, and enjoys organized
    tag games that let them showcase coordination and sociable energy.
  arts: Daniela Rentas, a tiny art enthusiast, spends afternoons finger‑painting bright suns while humming tunes from the animated series 'Coco', admires the whimsical works of Eric Carle, and delights
    in sharing homemade stories and drawings with classmates.
  travel: Daniela Rentas, an adventurous “mini‑explorer,” loves family trips to the nearby municipal aquarium, brightens school field trips to the historic farm museum, and dreams of a future vacation to
    the seaside town of San Diego to build sandcastles beside the waves.
  culinary: Daniela Rentas, a budding food aficionado, prefers spaghetti with marinara sauce, crunchy apple slices, and cheese‑stuffed mini‑pizzas that they help assemble, proudly displays their collection
    of animal‑shaped cookie cutters, and occasionally sneaks a bite of almond butter while giggling.
  core: Daniela Rentas blends boundless curiosity with a meticulous streak, thriving on playful social interactions, rainbow‑colored piggy banks, and the occasional sticker‑laden art masterpiece.
background:
  cultural: Daniela is raised in a Mexican‑American household in Danville, California. She hears both English and Spanish at home, celebrates Día de los Muertos with a small altar of photos and marigolds,
    and enjoys traditional foods such as tacos and quesadillas prepared by her family. Her grandparents share folkloric tales and lullabies in Spanish, fostering a strong sense of cultural pride. While
    attending a local preschool, she participates in a bilingual program that blends Mexican cultural activities with the broader community, helping her blend her heritage with her Californian surroundings.
