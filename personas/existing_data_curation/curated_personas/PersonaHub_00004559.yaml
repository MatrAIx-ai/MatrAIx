persona_description: A PhD candidate in Plant Biology at the University of Dschang, Cameroon who is conducting research on the food security issues in Dschang, Cameroon, focusing on the role of indigenous
  plants in the city's food system. His research interests include climate change, biodiversity, food security, and sustainable development. He has conducted research on the impact of climate change on
  wildlife conservation in Peru, compilation of an inventory of flora species and wildlife in Peru, inventory and characterization of vegetation of Mount Cameroon, and plant community ecology in West Highlands
  of Cameroon. His scholarship period at the Balsillie School of International Affairs as a Queen Elizabeth Advanced Scholar with the Hungry Cities Partnership focuses on food security in Dschang, Cameroon
  as part of a broader research project on changing food systems in Africa's secondary cities.
