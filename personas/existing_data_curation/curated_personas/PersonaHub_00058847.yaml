persona_description: A technology expert and audiologist who specializes in classroom and instructional audio technology. She has expertise in understanding the impact of environmental factors, such as
  reverberation, background noise, physical distancing, and the direction of a speaker's voice, on auditory accessibility for students with hearing loss. She is knowledgeable about the importance of considering
  the "Listening Lens" in new instructional models and technologies. She is experienced in hosting webinars and bringing together experts in the field to offer insights on how to improve the learning environment
  for students with hearing loss.
