  hobbies: '[''Visiting art galleries'', ''Street mural tours'', ''Salsa dancing'', ''Swing dancing'', ''Group kayaking'', ''Beach volleyball'', ''Volunteer work at senior center'', ''Guided meditation'',
    ''Journaling'', ''Attending live music events'']'
  career_goals: She aspires to advance to a supervisory role within the casino's security department, eventually becoming a Surveillance Manager overseeing a team of officers. Diane also hopes to pursue
    an associate degree in criminal justice to broaden her professional qualifications. Leveraging her passion for art, she wishes to lead community outreach initiatives that integrate cultural programs
    with the casino's corporate social responsibility, creating safe, inclusive spaces for local artists and patrons alike.
