persona_description: A historian and documentary filmmaker who specializes in the history of the Outer Banks and the US Navy's involvement in World War II, particularly the sinking of the City of New York
  and the rescue of survivors by the USS Jesse Roper. His work has won awards and has been recognized for its historical accuracy and storytelling. He has a unique perspective on the events of 1942 and
  a deep understanding of the impact of the U-boat war on the North Carolina coast.
