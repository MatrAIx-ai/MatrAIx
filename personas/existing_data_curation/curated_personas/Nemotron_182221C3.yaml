  hobbies: '[''Reading classic literature and poetry'', ''Watercolor painting'', ''Creating traditional Mexican papel picado'', ''Cooking traditional Mexican dishes'', ''Gardening herbs and flowers'', ''Attending
    cultural festivals and community events'', ''Playing piano'', ''Volunteering storytelling sessions at senior centers'', ''Genealogy research'', ''Tutoring Spanish'', ''Listening to bolero and vintage
    jazz music'', ''Solving crossword puzzles and Sudoku'']'
  career_goals: Even in retirement, Lilliana is motivated to leave a lasting cultural legacy. She aims to complete a memoir that chronicles her family's Mexican‑American journey, launch an oral‑history
    project that records the stories of senior members of Houston’s Hispanic community, and expand free Spanish‑language tutoring for children and recent immigrants. She also hopes to mentor younger volunteers,
    organize annual cultural celebrations that blend tradition with contemporary expression, and continue learning new digital tools to preserve, archive, and share these narratives with future generations.
