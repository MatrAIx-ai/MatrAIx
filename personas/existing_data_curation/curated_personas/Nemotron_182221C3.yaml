personas:
  professional: Lilliana Sanchezalicea, a retired arts and humanities scholar turned community oral‑history archivist, blends bilingual literary analysis, compassionate mentorship, and meticulous event
    planning to guide volunteers in preserving senior narratives, balancing their curiosity for new digital tools with a practical, organized approach, and they often mediate conflicts with calm diplomacy.
  sports: Lilliana Sanchezalicea follows the Houston Astros in baseball season and cheers for the Houston Rockets during basketball, participates in a senior walking club that meets at Memorial Park for
    low‑impact strolls, and attends occasional senior tai‑chi sessions, balancing spectator enthusiasm with gentle exercise.
  arts: Lilliana Sanchezalicea spends afternoons painting watercolors of Texas horizons and culturally resonant scenes, crafts intricate papel picado for local festivals, reads poetry by Octavio Paz and
    Pablo Neruda, and listens to boleros, mariachi ensembles, and vintage jazz icons such as Ella Fitzgerald and Louis Armstrong, letting these artistic passions shape their identity and leisure, and they
    often share their creations with community gatherings.
  travel: Lilliana Sanchezalicea enjoys carefully planned road trips to historic sites like Santa Fe’s adobe plazas and the colonial missions of San Antonio, prefers leisurely itineraries that allow ample
    rest stops for garden foraging, dreams of a gentle cruise along the Gulf Coast, and they often travel with a family member or trusted driver to navigate mobility constraints.
  culinary: Lilliana Sanchezalicea skillfully prepares traditional tamales, rich pozole, and complex mole using herbs from their small garden—like cilantro, oregano, and epazote—while they occasionally
    over‑salt a dish or burn a tortilla, yet they delight in sharing these meals at community potlucks and relish tasting new artisanal cheeses at local markets.
  core: Lilliana Sanchezalicea is a diligent, compassionate cultural archivist who balances a love for poetry, watercolor painting, and community storytelling with pragmatic organization, all while navigating
    senior‑age quirks like occasional forgetfulness and a penchant for splurging on art supplies, and they inspire younger volunteers with quiet determination.
background:
  cultural: Lilliana grew up in a Mexican‑immigrant household in Houston, absorbing the traditions of central Mexico while adapting to the multicultural fabric of Texas. Her upbringing was steeped in Spanish
    language, Roman Catholic rituals, and vibrant community celebrations such as Día de los Muertos, quinceañeras, and the Feast of Our Lady of Guadalupe. She preserved Mexican folk music, cuisine, and
    crafts, yet also embraced Texan customs and the diverse artistic scene of Houston. This bicultural identity fuels her dedication to sharing Mexican heritage, fostering intergenerational connections,
    and honoring the hybrid cultural landscape of her city.
