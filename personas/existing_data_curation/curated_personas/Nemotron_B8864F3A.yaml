  career_goals: Matthew aims to expand his company's market presence nationally while embedding sustainable practices and measurable social impact. He envisions positioning the organization as a benchmark
    for corporate responsibility, integrating advanced technology, and diversifying product lines. Over the next five years he seeks a transition to a board‑level role, where he can influence industry standards
    and mentor emerging leaders through a formal leadership development program. Throughout this progression, he prioritizes maintaining a healthy work‑life balance for his family.
