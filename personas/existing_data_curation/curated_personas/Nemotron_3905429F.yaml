  hobbies: '[''Exploring nature trails'', ''Reading fantasy novels'', ''Playing soccer'', ''Girl Scouts activities'', ''Cooking Mexican dishes with family'', ''Crafting and drawing'', ''Collecting rocks'',
    ''Listening to music'']'
  career_goals: She aspires to work with animals and nature, dreaming of becoming a veterinarian or wildlife biologist so she can help protect local wildlife and care for pets in her community. She also
    imagines herself as a teacher who makes learning enjoyable for children, reflecting her love for group activities and supportive environments. Andreina recognizes the importance of a stable career and
    plans to study hard, earn a college degree, and eventually contribute to a career that combines her curiosity about science with her desire to help others.
