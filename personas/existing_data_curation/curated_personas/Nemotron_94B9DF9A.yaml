personas:
  professional: Hamed Merchant, an aspiring digital storyteller, merges speculative fiction narratives with Minecraft world‑building and hip‑hop beat production, channeling the collaborative spirit of neighborhood
    festivals into interactive art projects, though they often let the creative flow get ahead of deadlines.
  sports: Hamed Merchant enjoys pick‑up basketball at the local community center, cheering on the Philadelphia 76ers and the Eagles while playing for the Philadelphia Union Academy youth soccer team during
    the spring, and they dabble in skateboarding at the nearby skate park, though they rarely follow a structured training regimen.
  arts: Hamed Merchant, a self‑taught digital artist and beat maker, draws inspiration from muralists like Keith Haring, mixes jazz legends such as Miles Davis with modern hip‑hop icons Kendrick Lamar and
    J. Cole, and spends evenings sketching speculative characters while listening to immersive soundscapes, channeling the neighborhood's storytelling tradition into each piece.
  travel: Hamed Merchant prefers low‑budget, curiosity‑driven trips, having explored historic sites in Philadelphia and New York City, dreaming of attending the New Orleans Jazz & Heritage Festival and
    visiting Tokyo’s Akihabara district to experience anime culture firsthand, and they usually plan itineraries on a sketchpad rather than a rigid schedule.
  culinary: Hamed Merchant loves soulful comfort foods like collard greens, fried chicken, and sweet potato pie, enjoys experimenting with spice blends such as smoked paprika and turmeric while attempting
    simple dishes like shrimp and grits for friends, yet they rely heavily on take‑out pizza during gaming marathons and admit to a habit of forgetting to eat breakfast.
  core: Hamed Merchant blends a calm, resilient imagination with a love for community storytelling, weaving art, music, and gaming into a uniquely fluid, slightly disorganized teenage life.
background:
  cultural: Hamed is a Black teenager growing up in Philadelphia’s culturally rich neighborhoods. His family traces its roots to the African‑American experience in the city, with grandparents who participated
    in the civil‑rights movement and a strong community emphasis on storytelling, music, and mutual support. He regularly attends local cultural festivals such as the Odunde Festival, and is influenced
    by the city’s historic jazz and hip‑hop scenes. The values of resilience, cooperation, and respect for elders that are central to his upbringing shape his outlook and interactions.
attributes:
  skills: '[''digital illustration (Procreate)'', ''sketching and pen drawing'', ''creative writing (short stories, poetry)'', ''basic coding (Scratch, Python)'', ''music beat‑making (FL Studio)'', ''storyboarding'',
    ''conceptual brainstorming'']'
  hobbies: '[''drawing and sketching'', ''digital illustration'', ''creative writing (speculative fiction, poetry)'', ''beat‑making'', ''playing sandbox video games (Minecraft, Roblox)'', ''exploring Philadelphia
    street art'', ''reading sci‑fi, fantasy, and philosophy'', ''visiting museums and community art events'']'
  career_goals: Hamed envisions a future where he can blend his love for art, storytelling, and technology. He aspires to study interdisciplinary arts or game design at a university, eventually working
    as a multimedia artist, game narrative designer, or creative technologist. He hopes to create immersive experiences that spark curiosity and celebrate diverse cultures, and to give back by mentoring
    younger community members through art workshops and digital media clubs.
