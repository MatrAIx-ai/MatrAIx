  hobbies: '["Fishing", "Hiking", "Woodworking", "Model train building", "Gardening", "Reading historical non-fiction", "Home-brewing craft beer", "Chess", "Volunteer mentoring at community garden"]'
  career_goals: Although no longer part of the formal workforce, Jerry channels his practical curiosity into personal projects. He aims to complete a master‑class in furniture making and produce a small
    line of heirloom chairs for his family, obtain the Certified Master Gardener designation, and gradually transform his home into a model of sustainable living with solar panels and rainwater harvesting.
    He also hopes to mentor younger adults in trade skills through informal workshops at community centers, leveraging his experience to give back while staying intellectually engaged.
