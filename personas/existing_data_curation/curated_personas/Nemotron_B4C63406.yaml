  hobbies: '[''Visiting contemporary art galleries'', ''Photography'', ''Cooking experimental Mexican‑heritage dishes'', ''Hiking in local parks and hills'', ''Volunteering with youth entrepreneurship and
    arts programs'', ''Reading business innovation literature'', ''Attending community cultural festivals'', ''Playing acoustic guitar'']'
  career_goals: Jose aims to progress from General/Operations Manager to Director of Operations within the next five years, focusing on integrating sustainable practices and technology‑enabled workflow
    automation. He envisions leading a regional operations team that prioritizes employee development, diversity, and community partnership. Long‑term, he aspires to launch a consultancy that helps midsize
    firms embed creative problem‑solving and culturally inclusive leadership into their operational strategies.
