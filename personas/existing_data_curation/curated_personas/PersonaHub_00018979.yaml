persona_description: A biologist or environmental scientist who is interested in the study of lead exposure in birds and its potential impact on feather development and growth. This person is likely to
  be involved in developing and validating non-invasive methods to monitor lead exposure in free-ranging birds and is interested in understanding the biological significance of lead accumulation in feathers
  of nestling black-crowned night-herons. They are also likely to be familiar with the effects of lead exposure on the liver, kidney, and bone, as well as the relationship between lead accumulation in feathers
  and blood delta-aminolevulinic acid dehydratase activity.
