  hobbies: '[''Pickup basketball'', ''Jogging'', ''Listening to hip‑hop, R&B, and gospel music'', ''Participating in church worship and choir'', ''Cooking Southern soul‑food'', ''Volunteering at food drives'',
    ''Mentoring youth in logistics'', ''Street photography'', ''Reading self‑improvement books'', ''Listening to supply‑chain podcasts'']'
  career_goals: Guided by his love for structured environments and community service, Biniyam aims to advance within the United States Postal Service to a supervisory position such as Route Supervisor or
    Assistant Postmaster. In those roles he plans to mentor new carriers, implement efficiency improvements, and serve as a liaison between the postal service and the neighborhoods he knows intimately.
    To prepare, he intends to pursue an associate degree in logistics or business administration and attend leadership workshops offered by the USPS. Long‑term, he envisions managing a regional delivery
    network or launching a community‑focused courier initiative that leverages his network and sociable strengths.
