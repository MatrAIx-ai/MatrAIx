  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Reading (art history, technology, non-fiction)'', ''Hiking and exploring Nebraska trails'', ''Cooking and experimenting
    with regional recipes'', ''Community theater workshops'', ''Craft beer tasting'', ''Volunteering (teaching basic computer skills)'']'
  career_goals: Adam aims to move into a supervisory or training role within the customer service department, focusing on elevating service quality and mentoring new representatives. Over the next five
    years, he plans to obtain a Certified Customer Experience Professional (CCXP) credential and complete a bachelor's degree in Business Administration or Communications. He also aspires to transition
    into a user experience research or community outreach position at a cultural institution, where he can blend his service expertise with his passion for art and new ideas.
