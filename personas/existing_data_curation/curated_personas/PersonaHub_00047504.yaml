persona_description: A public health official at the Food and Drug Administration (FDA) who is responsible for coordinating and overseeing the 100K Genome Project, which aims to create a public food pathogen
  database to rapidly identify the source of foodborne outbreaks and enable researchers to develop new methods of preventing and controlling them. This project is a collaboration between FDA, the University
  of California/Davis, and Agilent Technologies Inc. and is funded by the National Institutes of Health's National Center for Biotechnology Information and Agilent. The project is an important advancement
  in regulatory science, which involves the development of tools, standards, and approaches to assess the safety of foods consumed by people and animals in the United States.
