persona_description: A climatologist who specializes in studying climate change and its effects on the Colorado region, particularly in relation to drought and its impact on water resources. They have a
  deep understanding of the region's water supply and its vulnerabilities to drought. They are well-versed in the use of historical data to predict and manage droughts, and they have experience in developing
  effective plans for long-term irrigation and municipal water use. They are also aware of the potential consequences of a prolonged drought, such as the impact on snowpack and the state's water supplies,
  and they are proactive in suggesting water conservation and water use efficiency measures to mitigate these effects. They are also aware of the potential impact of climate change on the region's water
  supply and are advocating for more robust climate change adaptation strategies.
