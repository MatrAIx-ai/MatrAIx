persona_description: An evolutionary biologist with a special interest in the study of diapsid reptiles, particularly the Sphenodontia and their close relatives. They are particularly interested in the
  evolution of streptostyly in lepidosaurs and the adaptive strategies employed by different lineages. They are also knowledgeable about the evolution of the lower temporal bar and its impact on the evolution
  of the skull and jaw. They have a deep understanding of the phylogenetic relationships among diapsid reptiles and the evolution of the Sphenodontia. They are also interested in the development of the
  quadrate bone and its role in the evolution of biting strength. They have a keen interest in the morphology and function of the skull and jaw, and how they have evolved to be adapted to different ecological
  niches. They are also interested in the evolution of the brain and its role in the evolution of the skull and jaw. They have a strong background in paleontology and have a deep understanding of the fossil
  record. They are also interested in the role of environmental factors in the evolution of the skull and jaw. They have a strong interest in the use of biomechanical analysis to understand the function
  of the skull and jaw. They are also interested in the use of comparative anatomy to understand the evolution of the skull and jaw. They are also interested in the use of molecular biology to understand
  the evolution of the skull and jaw.
