personas:
  professional: Herbert Timpson, a budding junior builder with a natural knack for structured play, channels his disciplined organization and practical curiosity into constructing intricate LEGO cityscapes
    and coding simple games on Scratch, hinting at a future in engineering or design.
  sports: Herbert Timpson, a spirited member of the Alexandria Lions U‑8 soccer club who practices twice a week, avidly follows the Washington Capitals and Washington Wizards, and adds weekend bike rides
    through Prince William Forest Park to stay active.
  arts: Herbert Timpson, a budding cartoonist who sketches Harry Potter scenes, sings along to Disney classics like 'Let It Go' from Frozen, and enjoys animated movies from Pixar such as 'Toy Story' and
    'Inside Out,' letting these stories fuel their imaginative play.
  travel: Herbert Timpson, who delights in family weekend trips to the historic streets of Old Town Alexandria and the interactive exhibits at the Smithsonian National Air and Space Museum, dreams of a
    future adventure to Orlando’s Walt Disney World and a pilgrimage to the castles of Scotland after reading about them in adventure books.
  culinary: Herbert Timpson, a self‑declared pizza connoisseur who can perfectly assemble a pepperoni slice, loves crafting homemade macaroni‑and‑cheese with extra cheddar, and enjoys snacking on carrot
    sticks and hummus, occasionally attempting to bake chocolate chip cookies under parental supervision.
  core: Herbert Timpson, a meticulous seven‑year‑old with a penchant for sorting LEGO bricks by color, an insatiable appetite for fantasy sagas, and a habit of negotiating extra screen time with carefully
    drawn contracts, epitomizes disciplined curiosity in play.
background:
  cultural: Herbert grew up in Gainesville, Virginia, a suburban community in Prince William County with a predominantly white, middle‑class population. His family celebrates traditional American holidays—Thanksgiving,
    Christmas, and the Fourth of July—with backyard barbecues and community fireworks displays. They attend a local Methodist church, where he participates in Sunday school and the church's youth outreach
    events. Herbert’s school places a strong emphasis on community service and cultural awareness, exposing him to the diverse heritage of Prince William County through multicultural assemblies and field
    trips to historic sites like the Manassas battlefield. These experiences blend his core American cultural upbringing with an appreciation for the broader cultural mosaic of his county.
