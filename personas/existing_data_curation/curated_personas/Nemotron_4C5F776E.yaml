  hobbies: '[''Reading adventure books'', ''LEGO building'', ''Soccer'', ''Nature walks'', ''Drawing cartoons'', ''Scratch coding'', ''Rock and fossil collecting'', ''Board games'']'
  career_goals: Herbert dreams of becoming a mechanical engineer or astronaut, motivated by his love of how things work and his desire to explore both earthly inventions and outer space. He plans to excel
    in math and science, enter his school's science fairs, and join the local STEM club. His disciplined nature leads him to set small monthly goals, such as mastering a new Scratch project or building
    a more intricate LEGO structure, as stepping stones toward his larger ambition. He also hopes to give back to his community by mentoring younger kids in robotics and volunteering at the Gainesville
    public library's reading program.
