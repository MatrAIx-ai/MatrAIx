personas:
  professional: Janette Jackson is a front-desk associate at a bustling boutique resort in Riverview, and they expertly juggle OPERA and Maestro reservation systems, handle billing with precision, and leverage
    their natural curiosity and calm under pressure to curate guest experiences that spotlight local street art while mentoring new clerks with a blend of compassion and assertiveness.
  sports: Janette Jackson paddles the Alafia River with the Riverview Kayak Club each Saturday, practices yoga at Sunrise Studio, and they root for the Tampa Bay Lightning during hockey season while joining
    a casual recreational volleyball league in the summer, preferring low-impact, community-oriented activities over high-intensity competition.
  arts: Janette Jackson immerses themselves in Riverview's vibrant art scene, sketching murals inspired by Banksy and Kehinde Wiley, attending pop-up exhibitions featuring local painter Maya Torres, collecting
    limited-edition prints by Shepard Fairey, and they find inspiration in contemporary novels by Zadie Smith and the folk melodies of Sufjan Stevens.
  travel: Janette Jackson prefers thoughtfully planned, culturally immersive trips, having explored Charleston's historic streets, Lisbon's art-laden neighborhoods, and Costa Rica's tranquil waterfalls,
    and they dream of a solo pilgrimage to Kyoto's temples, balancing budget constraints with a love for boutique hotels and local guide tours.
  culinary: Janette Jackson enjoys cooking airy avocado toast topped with smoked salmon and feta, mastering the perfect poached egg, savoring the zest of homemade lemon-garlic shrimp paella, and they delight
    in street-food tacos al pastor at local night markets, while frequently ordering a rosemary-infused flatbread from the town's artisan bakery.
  core: Janette Jackson blends meticulous hospitality expertise with a restless curiosity for art and nature, channeling calm composure into curated guest experiences, while they occasionally over-indulge
    in impulsive art purchases and neglect flossing after late-night games.
background:
  cultural: Janette is a White American raised in the suburban outskirts of Tampa, Florida, near Riverview. Growing up in a middle-class family that valued hard work, modesty, and community involvement,
    she absorbed the Southern hospitality ethos that emphasizes friendliness and service. The region's tourism-driven economy exposed her early to diverse visitors and the importance of cultural exchange,
    which shaped her appreciation for art, local history, and the blend of traditional and contemporary influences. Although her heritage is primarily Anglo-American, she has been influenced by the multicultural
    tapestry of Central Florida, prompting her to learn basic Spanish and embrace a broader cultural perspective while maintaining the grounded, pragmatic outlook typical of her upbringing.
attributes:
  skills: '[''Guest Check-In/Check-Out'', ''Reservation Management'', ''Property-Management Software (OPERA, Maestro)'', ''Billing & Cash Handling'', ''Effective Communication'', ''Basic Spanish'', ''Organizational
    Skills'', ''Problem Solving'', ''Local Tourism Knowledge'', ''Team Collaboration'', ''Stress Management'']'
  hobbies: '[''Visiting Art Galleries'', ''Sketching/Watercolor Painting'', ''Reading Contemporary Fiction'', ''Kayaking on the Alafia River'', ''Historical Museum Volunteering'', ''Yoga'', ''Small-Group
    Board Game Nights'']'
  career_goals: In the next 2-3 years Janette aims to earn a hospitality-management certification and secure a front-office supervisor position, where she can mentor new desk clerks and refine operational
    procedures. She is eager to deepen her expertise in curating guest experiences that highlight local art and culture, ultimately seeking a role as Guest Experience Coordinator or Events Manager at a
    boutique resort. Long-term, Janette envisions managing her own small inn or bed-and-breakfast that integrates community art installations and offers curated cultural tours, leveraging her curiosity
    for new ideas and her organizational strengths. To support these ambitions, she plans to complete an associate degree in hospitality or tourism and pursue continuing-education workshops on sustainable
    tourism and cultural programming.
