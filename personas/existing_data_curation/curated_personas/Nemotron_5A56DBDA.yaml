  career_goals: Rogelio aims to advance into a senior supervisory role within the county probation department, where he can mentor new officers and shape policy. He is passionate about integrating the arts
    into rehabilitative services and plans to develop a county‑wide arts‑therapy initiative that partners with local galleries, community centers, and Guatemalan cultural groups. To broaden his expertise,
    he intends to pursue a Master’s in Social Work focused on restorative justice, and ultimately, to become a recognized advocate for culturally informed correctional practices that reduce recidivism among
    underserved communities.
