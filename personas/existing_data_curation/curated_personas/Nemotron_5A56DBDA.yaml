personas:
  professional: Rogelio Friguls, a seasoned probation officer with more than three decades of experience, leverages their expertise in risk assessment, culturally responsive counseling, and arts‑based therapeutic
    program design—especially watercolor workshops—to build trust with clients, mentor new officers, and champion policy reforms that integrate creative rehabilitation.
  sports: Rogelio Friguls, an avid hiker, joins the Willamette Valley Hiking Association for weekend treks, cycles the Oregon coast in summer, supports the Portland Timbers and Trail Blazers, and participates
    in a local adult soccer league for recreation.
  arts: Rogelio Friguls, a watercolor enthusiast, draws inspiration from folk motifs and the Pacific Northwest’s scenery, frequents the Portland Art Museum and local poetry readings, and enjoys listening
    to immersive folk performances by artists such as Andy Irvine and Lila Downs while sketching in cafés.
  travel: Rogelio Friguls, a methodical yet adventurous traveler, blends detailed itineraries with spontaneous detours, has hiked the Columbia River Gorge, explored Vancouver and San Francisco, and aspires
    to visit the ruins of Machu Picchu and the Galápagos Islands for cultural immersion.
  culinary: Rogelio Friguls, an intermediate home cook, prepares traditional corn‑based dishes like pork‑filled tamales seasoned with achiote and a side of forest‑foraged mushroom stew, celebrates seasonal
    produce, and experiments with new spices while occasionally over‑salting recipes when tasting wine with friends.
  core: Rogelio Friguls balances a meticulous probation career with a restless artistic drive, habitually sketching calm watercolor landscapes during case reviews and splurging on artisanal coffee, yet
    often forgets to log mileage for tax deductions.
background:
  cultural: Rogelio was born in a small town near Antigua, Guatemala, where he grew up immersed in Maya‑influenced traditions, Spanish colonial architecture, and a strong communal ethic. His family emigrated
    to the United States when he was in his early twenties, bringing with them a love for marimba music, textiles, and the importance of family cohesion. In Oregon, he maintains close ties to the local
    Guatemalan diaspora, participating in community gatherings and cultural celebrations. His bicultural identity informs his professional perspective, allowing him to bridge gaps between the corrections
    system and immigrant clients, while his appreciation for both Guatemalan heritage and Pacific Northwest culture enriches his artistic pursuits.
