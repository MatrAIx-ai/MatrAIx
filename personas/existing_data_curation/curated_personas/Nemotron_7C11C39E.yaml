  career_goals: Yan aims to become a curriculum specialist who champions STEAM‑focused humanities programs within her district. In the next three years she plans to earn a master’s degree in Curriculum
    and Instruction, develop a school‑wide arts‑integration initiative, and publish a series of articles on using abstract art to deepen critical thinking. Long‑term, she hopes to lead a department or become
    an instructional designer for an educational nonprofit, creating community workshops that bring contemporary art and East‑Asian cultural perspectives to under‑served youth. Ultimately, Yan envisions
    authoring a reflective guidebook that merges Chinese philosophical concepts with modern teaching practice.
