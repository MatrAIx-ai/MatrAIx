personas:
  professional: Yan Sun is an innovative middle-school humanities teacher and interdisciplinary curriculum designer who blends Mandarin-language literature, abstract acrylic art, and digital storytelling
    into STEAM projects, navigating their relaxed planning style with spontaneous lesson improvisations while mentoring new teachers.
  sports: Yan Sun enjoys weekend hikes along the Santa Monica foothills, joins the Los Angeles Running Club for early-morning jogs, and roots for the Lakers and Galaxy while they occasionally play recreational
    volleyball at the community center.
  arts: Yan Sun immerses in the Los Angeles art scene, painting abstract acrylics inspired by Mark Rothko’s color fields, practicing meditative calligraphy, and discussing speculative fiction by N.K. Jemisin
    and poetry by Ocean Vuong at a monthly literary circle, while they regularly visit The Broad and Hauser & Wirth for fresh inspiration.
  travel: Yan Sun favors loosely planned cultural getaways, having explored Kyoto’s moonlit temple festivals, Bali’s rice terraces, and Barcelona’s modernist architecture, and they now dream of chasing
    the Northern Lights in Iceland while balancing a modest travel budget and a full-time teaching schedule.
  culinary: Yan Sun experiments in the kitchen, crafting fusion dishes like Sichuan-spiced tofu tacos topped with avocado-corn salsa and cilantro, while they also perfect a silky miso ramen broth that balances
    umami with fresh California herbs, reflecting their moderate cooking skill and love for bold flavors.
  core: Yan Sun is a day-dreaming educator who stitches abstract art and speculative storytelling into the classroom, thriving on creative spontaneity while they habitually misplace lesson plans and keys
    alike.
background:
  cultural: Yan Sun is a second‑generation Chinese American raised in the Los Angeles region. Her parents emigrated from Guangdong and maintained Mandarin as the household language while also encouraging
    full participation in American culture. Growing up, Yan celebrated Lunar New Year, the Mid‑Autumn Festival, and other traditional customs, and she often incorporated Chinese folklore and calligraphic
    aesthetics into school projects. The multicultural atmosphere of South Pasadena, combined with her East‑Asian heritage, fuels her appreciation for both contemporary Western art and classical Chinese
    artistic principles. She draws on Taoist ideas of balance and harmony when designing classroom environments, and she values community engagement, often volunteering at local cultural events that bridge
    Asian and Californian traditions.
