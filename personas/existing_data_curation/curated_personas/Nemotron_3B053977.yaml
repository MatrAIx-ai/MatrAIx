personas:
  professional: Steven Moaveni is a reliable landscaping and groundskeeping worker who, thanks to their meticulous eye for detail, practical horticulture knowledge, and crew‑scheduling expertise, plans
    and executes lawn care and irrigation projects while rigorously adhering to safety protocols.
  sports: Steven Moaveni stays active by joining the local hiking club for weekend treks on the Blue Ridge foothills, casting a line at Lake Norman during early mornings, and watching the Carolina Panthers
    and Charlotte Hornets, while they also coach a youth little‑league baseball team during the summer.
  arts: Steven Moaveni relaxes after work by listening to classic Southern folk singers like Johnny Cash and Gillian Welch, photographing sunrise scenes in the countryside, and streaming indie film director
    the Coen brothers’ movies, and they occasionally dabble in woodworking projects inspired by rustic cabin aesthetics.
  travel: Steven Moaveni prefers road‑trip adventures that blend nature and heritage, such as a weekend drive along the Blue Ridge Parkway, a fishing expedition to the Outer Banks, and a future bucket‑list
    plan to explore the vineyards of Tuscany, all while budgeting carefully to accommodate their upcoming family plans.
  culinary: Steven Moaveni enjoys cooking farm‑to‑table meals, often preparing heirloom tomato salads with fresh basil, crispy fried catfish with collard greens, and sweet potato biscuits, while they also
    appreciate a good BBQ pulled pork sandwich at the county fair and keep a small spice rack stocked with smoked paprika and cayenne.
  core: Steven Moaveni blends a methodical work ethic with a love for the outdoors, balancing meticulous landscaping duties with weekend hikes, spontaneous fishing trips, and a habit of over‑watering houseplants
    when stressed.
background:
  cultural: Steven grew up in Denton, a close‑knit town in Montgomery County, North Carolina, steeped in Southern agrarian traditions and a strong sense of community. His family values hard work, hospitality,
    and respect for the land, reflected in weekly church gatherings, county fairs, and family barbecues. While identifying as White with deep roots in the region, he also embraces the modesty and practicality
    of rural Southern culture, which shapes his cooperative demeanor and preference for reliable, organized approaches in both his professional and personal life.
attributes:
  skills: '["Landscape design","Irrigation system installation","Plant identification and care","Equipment operation and maintenance","Health and safety compliance","Team coordination","Customer service","Time
    management","Basic horticultural knowledge"]'
  hobbies: '["Hiking","Fishing","Gardening (personal)","DIY woodworking","Strategy video gaming","Nature photography","Volunteering at community garden","Attending local sports leagues"]'
  career_goals: Steven aims to progress from crew member to lead crew supervisor within the next two years, gaining the Certified Landscape Technician (CLT) credential to formalize his expertise. He plans
    to complete his associate degree in horticulture at the local community college, positioning himself for a future role as a landscape designer specializing in sustainable, native‑plant projects. Ultimately,
    he hopes to launch his own eco‑focused landscaping business that emphasizes water‑wise practices and community beautification, providing stable income and the flexibility to support a family of his
    own.
