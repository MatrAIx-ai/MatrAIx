personas:
  professional: Brandy Singletary is a seasoned social worker in Lumberton who combines trauma‑informed case management with meticulous documentation and a structured, compassionate approach to designing
    community mental‑health programs.
  sports: Brandy Singletary joins the Lumber River Trail walking club each Saturday, cheers on the Carolina Mudcats minor‑league baseball team, follows the UNC Tar Heels football season, and they balance
    their love of low‑impact cardio with occasional community pick‑up basketball games at the local church gym.
  arts: Brandy Singletary sings lead alto in the church choir, delights in gospel, blues, and jazz standards by Mahalia Jackson and B.B. King, volunteers at regional theater productions, and they spend
    quiet evenings quilting intricate patterns while reading contemporary authors such as Ta‑Nehisi Coates and Jesmyn Ward.
  travel: Brandy Singletary prefers meticulously planned trips, often organizing weekend getaways to Asheville’s Blue Ridge Mountains, historic Charleston, and Nashville’s music scene, while they balance
    a modest travel budget with family obligations and occasionally join church mission tours abroad.
  culinary: Brandy Singletary’s kitchen revolves around soul‑food classics—slow‑cooked collard greens seasoned with smoked turkey, buttery corn‑meal cornbread, and sweet‑potato pie topped with toasted pecans—while
    they experiment with seasonal garden harvests like heirloom tomatoes and fresh basil.
  core: Brandy Singletary blends structured compassion with community‑centric passions, juggling meticulous budgeting, health vigilance, soulful arts, and a perpetual worry that fuels their relentless drive.
background:
  cultural: Brandy identifies as a Black woman from the rural Piney Woods region of eastern North Carolina. Growing up in Lumberton within a close-knit extended family, she was shaped by the traditions
    of Southern hospitality, church-centered community life, and the resilience passed down through generations that endured segregation and economic hardship. The cultural mosaic of Robeson County—home
    to the Lumbee Tribe, a growing Hispanic population, and a historic Black community—has deepened her appreciation for cross-cultural dialogue and informed her inclusive practice as a social worker. She
    maintains strong ties to the African-American church, celebrating holidays with gospel music, soul food, and storytelling that honor both her family’s legacy and the broader Southern Black heritage.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Trauma-Informed Care'', ''Community Resource Coordination'', ''Group Facilitation'', ''Cultural Competency'', ''Client Advocacy'', ''Documentation
    & Data Management'', ''Electronic Case Management Software'']'
  hobbies: '[''Gardening'', ''Cooking Soul Food'', ''Church Choir Singing'', ''Volunteer Work at Food Bank'', ''Walking/Hiking'', ''Community Theater Attendance'', ''Reading African-American Literature'',
    ''Quilting'']'
  career_goals: Brandy aims to formalize her expertise by completing a Bachelor’s degree in Social Work and pursuing licensure as a LCSW within the next three years. She aspires to move into a supervisory
    role as a Program Manager for the county’s Family Services division, where she can design and implement a county-wide mental-health outreach program targeting underserved Black families. Securing grant
    funding for community-based trauma support groups, mentoring newly hired social workers, and integrating evidence-based practices into daily operations are top priorities. Additionally, she hopes to
    balance her professional drive with self-care strategies to mitigate her tendency toward worry and stress.
