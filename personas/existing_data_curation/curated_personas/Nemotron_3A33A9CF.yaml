  career_goals: Although officially retired, Ashok aims to convert his curiosity and sociable nature into meaningful community contributions. He plans to volunteer as a cultural liaison at local senior
    centers, lead art‑and‑craft workshops that blend South Asian motifs with contemporary ideas, and mentor youth interested in culinary arts or storytelling. He also aspires to travel back to his ancestral
    homeland for a personal pilgrimage, and to compile a memoir that captures the immigrant experience of his generation, hoping it could serve as a resource for future community members.
