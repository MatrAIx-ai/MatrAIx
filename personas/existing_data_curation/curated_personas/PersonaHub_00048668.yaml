persona_description: A teacher who runs a first-year course on the use of Vision of Britain and Wikipedia as teaching resources, and has students work on creating detailed and accurate Wikipedia articles
  about local villages, drawing on data from Vision of Britain. The teacher is interested in improving the quality of the Wikipedia articles by encouraging students to research and extend them, and is aware
  of the challenges in doing so due to the lack of recent work on the articles. The teacher is also interested in redesigning the URLs in Vision of Britain to make them more user-friendly and easier to
  navigate.
