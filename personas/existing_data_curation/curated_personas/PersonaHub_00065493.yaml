persona_description: A geographer who is interested in the application of quantitative data analysis to the exploration of geographic phenomena, particularly in hydrology, geology, petroleum exploration,
  weather analysis, urban planning, logistics, and epidemiology. They are familiar with the mathematical basis of geostatistics, remote sensing, and geographic information systems, and use them to analyze
  spatial relationships and predict changes over time. They are skilled in the use of GIS software and techniques, and are able to make effective use of maps and symbols to represent and analyze spatial
  information. They have a deep understanding of cognitive psychology, behavioral psychology, geodesy, and advanced mathematics, and are able to use these skills to understand and represent geographical
  knowledge in a systematic and analytical manner. They are interested in the field of cartography and the role it played in the development of geography.
