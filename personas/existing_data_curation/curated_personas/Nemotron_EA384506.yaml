personas:
  professional: Aleida Matos, an organized and curious caregiver, excels as a personal care worker while pursuing an associate degree in nursing, blending CPR certification, bilingual communication, and
    meticulous scheduling with a competitive drive to become a senior care coordinator who integrates technology‑based health monitoring into community wellness programs, and they approach every client
    interaction with methodical compassion.
  sports: Aleida Matos channels competitive energy into weekend volleyball matches at the community park, supports the local baseball club Los Cangrejeros with fervor, follows the island’s professional
    basketball team, the Hurricanes, and they also treat salsa and bomba dancing as high‑intensity cardio workouts.
  arts: Aleida Matos fuels their artistic spirit through salsa and bomba dancing, regularly practicing to the rhythms of Celia Cruz, Marc Anthony, and modern bomba group Bomba Fusion, while attending live
    performances by local timba ensemble Sonora del Barrio, and they enjoy visual art installations at island cultural festivals.
  travel: Aleida Matos prefers spontaneous, community‑focused travel, hopping from one island festival to another in the north and south regions, yet they also plan annual weekend getaways to neighboring
    islands such as St. Thomas for beach clean‑ups and dream of a spring trip to New York City to experience Broadway and museum exhibitions.
  culinary: Aleida Matos, an intermediate home cook, lovingly prepares traditional dishes like mofongo and arroz con gandules using ripe plantains, sofrito, and achiote, while experimenting with modern
    twists such as coconut‑infused sofrito or quinoa‑based rice, and they never miss a chance to savor fresh avocados and tropical fruit in their meals.
  core: Aleida Matos blends relentless curiosity, organized practicality, and a love for lively community rhythms into a life driven by caring for elders, dancing through challenges, and balancing disciplined
    finances with spontaneous joy.
background:
  cultural: Growing up in Toa Baja, Aleida’s Puerto Rican heritage is central to her identity. She was raised in a close‑knit family where intergenerational bonds and communal celebrations—such as Noche
    de San Juan and the patron saint festivals—were routine. Fluent in both Spanish and English, she navigates a bilingual environment that informs her communication style and cultural adaptability. The
    island’s rich musical traditions, love for dance, and flavorful cuisine have shaped her social habits and hobbies. Aleida values the resilience and optimism characteristic of Puerto Rican communities,
    often drawing on local folklore and the island’s historical perseverance when facing personal challenges.
attributes:
  skills: '["Personal hygiene assistance", "Mobility support and safe transfer techniques", "CPR and First Aid certification", "Bilingual communication (Spanish/English)", "Care schedule coordination",
    "Inventory management of caregiving supplies", "Accurate health documentation", "Customer service for care facilities", "Conflict resolution and empathetic listening"]'
  hobbies: '["Salsa and bomba dancing", "Community volleyball", "Beach clean‑up volunteering", "Cooking traditional Puerto Rican cuisine", "Hiking in El Yunque National Forest", "Reading personal‑development
    books", "Traveling to cultural festivals across Puerto Rico", "Assisting at the local senior center"]'
  career_goals: Aleida aims to advance her career by completing an associate degree in nursing and obtaining licensure as a Practical Nurse within the next three years. She aspires to specialize in geriatric
    care, eventually becoming a senior care coordinator who designs community‑focused wellness programs for older adults in Toa Baja. Leveraging her curiosity for innovative care methods, she plans to incorporate
    technology‑based health monitoring tools into her practice. Long‑term, Aleida hopes to lead a multidisciplinary team in a senior living facility and perhaps launch her own boutique personal‑care service
    that blends traditional Puerto Rican wellness practices with modern caregiving standards.
