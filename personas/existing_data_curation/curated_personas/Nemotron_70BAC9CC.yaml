  career_goals: Dorothy often talks about becoming a painter who decorates the world with bright pictures, a singer on a stage, a caring veterinarian for animals, or an explorer who discovers new places.
    She is also fascinated by space and sometimes imagines herself as an astronaut. While still young, her biggest ambition is to make friends, share joy, and be someone who can create and show beautiful
    things for others.
