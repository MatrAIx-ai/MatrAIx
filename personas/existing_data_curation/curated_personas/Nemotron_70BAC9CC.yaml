personas:
  professional: Dorothy Frisby, acting as the preschool’s enthusiastic class helper, channels their curiosity and love for art into organizing daily show‑and‑tell sessions while balancing their talkative
    nature with a surprisingly reliable sense of responsibility.
  sports: Dorothy Frisby dashes around the playground in their Little Leaguers soccer tee, attends a weekly toddler gymnastics class, and lights up when cheering for the New York Yankees on TV, proudly
    wearing a tiny Yankees cap during family outings.
  arts: Dorothy Frisby spends afternoons finger‑painting to the whimsical tunes of Raffi, sings along with Sesame Street’s Elmo, and fills their sketchbook with drawings inspired by Dr. Seuss’s wacky characters,
    often performing impromptu puppet shows for their stuffed audience.
  travel: Dorothy Frisby loves spontaneous family road trips to the local aquarium and the bright lights of Disney World, but they daydream about sailing to the Great Barrier Reef, preferring itineraries
    that include playground stops and bubble‑gum ice cream breaks.
  culinary: Dorothy Frisby delights in buttery peanut‑butter‑and‑jelly sandwiches, slurps creamy mac & cheese sprinkled with cheddar, and, under a parent’s watchful eye, mixes strawberry smoothies with
    fresh banana and a dash of honey, proudly proclaiming themselves a ‘snack‑chef.’
  core: Dorothy Frisby is a bright‑eyed, chatter‑filled five‑year‑old who flits from art projects to soccer drills, yet they quietly battle sudden waves of anxiety that can turn a simple snack into a melty‑handed
    disaster.
background:
  cultural: Dorothy is growing up in a suburban American family in Monument, Colorado. Her environment blends mainstream U.S. cultural traditions—such as celebrating Thanksgiving, Christmas, and the Fourth
    of July—with the outdoor‑oriented lifestyle of the Rocky Mountain region, where family trips to nearby trails, wildlife spotting, and community events at the local park are common. She attends a nearby
    preschool that emphasizes creativity, music, and early literacy, reflecting the community’s value of arts and education. The cultural setting encourages friendliness, social interaction, and a respect
    for nature, shaping her worldview.
