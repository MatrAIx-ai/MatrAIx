persona_description: A climate change and energy policy analyst who is concerned about the potential environmental and economic risks associated with the expansion of shale oil production. They are particularly
  concerned about the impact on renewable energy investments and global emissions targets, and are skeptical of the claims made by supporters of shale gas that the fuel source can deliver net carbon savings.
  They are also concerned about the environmental and social impacts of shale oil production, particularly in areas such as the Arctic and Canadian tar sands, and are opposed to the use of any potential
  shale oil reserves. They are a vocal advocate for the use of green technologies and a focus on renewable energy sources, and are skeptical of the claims made by supporters of leaving fossil fuel reserves
  in the ground.
