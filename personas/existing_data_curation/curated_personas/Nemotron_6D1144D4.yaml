    shelter"]'
  career_goals: Alison aims to build a stable, upward‑mobile career in logistics. In the short term, she plans to obtain formal forklift certification and complete an associate degree in supply chain management
    while continuing to work. Within the next two to three years, she hopes to be promoted to a shift‑lead or warehouse supervisor role, where she can apply her organizational skills to improve efficiency.
    Long‑term, she aspires to become a logistics manager at a regional distribution center and eventually start a small, community‑focused moving and material‑handling business that values routine, reliability,
    and safe practices.
