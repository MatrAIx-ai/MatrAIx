personas:
  professional: Alison Thomison is a detail‑oriented material handler who combines forklift certification, precise inventory management, and an unwavering safety focus to keep the warehouse operating smoothly
    while quietly guiding a small, dependable crew toward consistent efficiency.
  sports: Alison Thomison finds fitness in the quiet trails of Paynes Prairie and San Felasco Hammock, participates in a modest local hiking club, and follows the Florida Gators football and Orlando Magic
    basketball teams, preferring low‑impact outdoor activity over crowded gym sessions.
  arts: Alison Thomison enjoys classic family movies like ‘The Wizard of Oz’ and ‘Mary Poppins,’ knits to the soothing rhythm of John Denver’s folk songs, draws inspiration from Monet’s water‑lily paintings,
    and follows crochet designers on Ravelry for structured, calming projects.
  travel: Alison Thomison prefers low‑key weekend road trips to natural gems such as the Everglades, Savannah’s historic district, and Asheville’s Blue Ridge vistas, planning itineraries meticulously while
    balancing a modest travel budget and limited vacation days.
  culinary: Alison Thomison cooks simple, wholesome meals — from roasted vegetable quinoa bowls seasoned with rosemary and garlic to hearty lentil soup with kale and smoked paprika — using fresh produce
    from their garden and enjoys experimenting with seasonal ingredients like heirloom tomatoes and fresh basil.
  core: Alison Thomison thrives on routine, methodical progress, and quiet achievement, channeling their love for organized tasks into both work and leisure, even if it means hoarding coupons and occasionally
    over‑planning their day.
background:
  cultural: Alison was raised in a predominately white, middle‑class neighborhood in central Florida. Her family blends traditional Southern values—emphasis on responsibility, work ethic, and community—with
    the laid‑back, outdoor‑oriented lifestyle of the Gulf Coast. She grew up attending a local Baptist church, celebrating holidays with family gatherings centered around home‑cooked meals, and participating
    in community events like farmers markets. The practical, self‑reliant ethos of her upbringing, combined with exposure to the university town atmosphere of Gainesville, has shaped her appreciation for
    routine, reliable work, modest leisure activities, and a modest, community‑focused worldview.
