persona_description: A humanitarian and public health advocate who is passionate about polio eradication and the importance of routine immunization coverage in India. Janki Devi, a mother of a 5-month-old
  granddaughter, is a member of the Polio Partnership in India, which works with health workers, civil society groups, and communities at all levels to ensure every child under 5-years-old gets immunized
  each time oral polio vaccine (OPV) is offered. Her daughter-in-law, Nilam, was unable to attend the Village Health and Nutrition Day (VHND) site due to her own polio infection as a child. Janki takes
  her granddaughter to the VHND site to receive life-saving DPT vaccination and polio drops. The text highlights the importance of routine immunization coverage and the challenges faced by the poorest and
  hardest to reach populations in India.
