persona_description: A neonatologist who specializes in the assessment, diagnosis, and treatment of neonatal infections and disorders, including neutrophil counts in the newborn population. Their expertise
  includes understanding the factors that influence the ANC in different neonatal populations, including gestational age, postnatal age, birth weight, geographical factors, and clinical factors such as
  intrapartum oxytocin administration and maternal hypertension. The neonatologist also has knowledge of the reference range for ANC in term and near-term neonates, as well as the published study by Mouzinho
  et al. in 1994 that established the lower boundary of ANC for VLBW neonates.
