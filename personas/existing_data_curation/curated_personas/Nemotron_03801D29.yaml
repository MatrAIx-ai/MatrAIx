  hobbies: '[''Reading historical fiction'', ''Vegetable gardening'', ''Birdwatching at Turtle Island Preserve'', ''Knitting blankets for charity'', ''Cooking Southern cuisine'', ''Volunteering at a community
    literacy club'', ''Evening walks along the RiverWalk'']'
  career_goals: Nina aims to advance to a lead teacher or curriculum coordinator role within Onslow County Schools, where she can influence district‑wide instructional practices. She plans to earn a master's
    in Educational Leadership to qualify for school administration, with a long‑term ambition of becoming an assistant principal. Her professional vision includes creating interdisciplinary modules that
    marry curiosity‑driven projects with practical life skills, and establishing a mentorship program for new teachers and a support network for students from military families.
