personas:
  professional: Nina Willis, a certified elementary and middle‑school teacher with a graduate degree in education, leverages their methodical, data‑driven classroom management and inquiry‑based curriculum
    design to fuse technology tools like Google Classroom with hands‑on projects, offering calm, pragmatic mediation for diverse learners and quietly championing collaborative grade‑team initiatives.
  sports: Nina Willis, a Jacksonville resident, supports the Jaguars on game day, jogs along the RiverWalk as part of the RiverWalk Strollers club for low‑impact cardio, joins a seasonal community pick‑up
    softball league in spring, and balances a love for birdwatching with occasional yoga sessions at the local community center.
  arts: Nina Willis, an avid reader of Southern historical fiction, finds inspiration in authors like Barbara Kingsolver and musicians such as Gillian Welch, often knitting to the background of the Allman
    Brothers' acoustic sets, and volunteers at the Jacksonville Theatre to help with backstage logistics while attending local folk concerts featuring artists like Rhiannon Giddens.
  travel: Nina Willis prefers carefully planned weekend road trips, having explored Savannah's historic squares, the culinary scene of New Orleans, and the Blue Ridge Mountains of Asheville, while dreaming
    of a spring pilgrimage to Charleston's garden districts, all balanced against the responsibilities of their full‑time teaching schedule and modest travel budget.
  culinary: Nina Willis delights in cooking Southern comfort dishes, expertly slow‑cooking pork shoulder with a sweet‑savory rub, whipping up shrimp and grits with garden‑fresh collards, and perfecting
    pecan pie using locally sourced pecans and heirloom tomatoes for a surprising savory garnish, while their knitting evenings often double as informal tasting sessions for friends.
  core: Nina Willis blends quiet curiosity with a practical, organized mindset, turning a love for garden‑grown vegetables, birdwatching, and knitting into community service, while occasionally over‑booking
    lesson prep at the expense of personal rest.
background:
  cultural: Nina grew up in coastal North Carolina in a white, Protestant (Baptist) family that emphasized community service, hospitality, and respect for tradition. The region’s Southern heritage—marked
    by modesty, strong family ties, and a love of local cuisine—shapes her values and daily practices. Living near Camp Lejeune has given her a deep appreciation for the military community, influencing
    her sensitivity to the needs of service‑member families. Her cultural outlook blends traditional Southern modesty with a pragmatic curiosity about new ideas, guiding both her teaching philosophy and
    her personal pursuits.
attributes:
  skills: '[''Curriculum Development'', ''Inquiry‑Based Instruction'', ''Educational Technology Integration'', ''Classroom Management'', ''Differentiated Instruction'', ''Data‑Driven Assessment'', ''Parent‑Teacher
