persona_description: A healthcare professional who is interested in geriatric care and its implementation in rural and remote communities. This person has expertise in geriatric models of care and is familiar
  with the challenges faced by older adults in these areas. They are interested in the design, implementation, and evaluation of geriatric models of care, and are looking for evidence-based guidelines and
  best practices to improve the delivery of care in rural and remote communities. This person may be a geriatrician, a nurse, a social worker, or a healthcare administrator who is committed to improving
  the health and well-being of older adults in rural and remote areas.
