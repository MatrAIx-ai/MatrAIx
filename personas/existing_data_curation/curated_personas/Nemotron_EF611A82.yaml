    solving'', ''Creative workflow optimization'']'
  hobbies: '[''Abstract painting'', ''Landscape photography'', ''Short story writing (speculative fiction)'', ''Playing electric guitar in a local band'', ''Community theater improv'', ''Board games and
    Dungeons & Dragons'', ''Volunteering at health fairs'', ''Hiking in the Sierra foothills'', ''Exploring virtual-reality gadgets'', ''Attending local art shows and festivals'']'
  career_goals: Donald aims to formalize his credentials by obtaining an Associate’s degree in Clinical Laboratory Science within the next two years, followed by certification from the American Society
    for Clinical Pathology (ASCP). Long‑term, he aspires to become a senior laboratory manager, overseeing a multi‑disciplinary diagnostic team in a community hospital. He is also interested in integrating
    emerging technologies such as AI‑assisted diagnostics into routine lab work, and hopes to lead a pilot project that uses machine‑learning algorithms for rapid pathogen detection. On a personal level,
    he wants to reduce workplace stress by mastering stress‑reduction techniques and by structuring his schedule to allow more time for his artistic pursuits.
