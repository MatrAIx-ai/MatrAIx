personas:
  professional: A community-oriented creative entrepreneur, Alejandro Maceda blends self-taught photography, sketching, and cooking talents into a modest home-based business that sells street-photo prints,
    handmade crafts, and offers Mexican-Texan cooking workshops, all while applying their relaxed, flexible approach and natural knack for mediating neighborhood cultural events.
  sports: A weekend hiker and casual soccer enthusiast, Alejandro Maceda trails the Buffalo Bayou Park and the Edwards Loop, joins the Houston Soccer Club's Sunday pick-up games, roots for the Houston Astros,
    the Houston Rockets, and follows the Dallas Cowboys during fall football, while occasionally signing up for the local 5K charity runs.
  arts: A devoted gallery-goer and guitar-player, Alejandro Maceda draws inspiration from Frida Kahlo, Diego Rivera, and Houston street photographer Stephen Dotto, admires the abstract works of Julie Mehretu
    and the modernist designs of Gaudi, and frequently performs acoustic renditions of Victor Jara's songs while sketching in museum cafes.
  travel: An adventure-seeking yet budget-conscious traveler, Alejandro Maceda enjoys day trips to Austin's live-music scene, weekend hikes in the Texas Hill Country, and long-planned visits to Oaxaca's
    bustling markets, the historic streets of Guanajuato, and a future road-trip along California's Pacific Coast Highway, always leaving room for spontaneous detours.
  culinary: A passionate home-cook, Alejandro Maceda experiments with carnitas tacos, chiles en nogada, and a Tex-Mex twist on mole using locally sourced Hatch chilies, fresh cilantro, corn masa, and queso
    fresco, often pairing meals with a cold cerveza and a squeeze of lime while honing their skills between enthusiastic amateur and budding professional.
  core: Alejandro Maceda is a curious, easy-going cultural bridge who blends photography, cooking, and community-building, yet habitually misplaces keys, forgets bill due dates, and overcommits to social
    gatherings.
background:
  cultural: Alejandro is a second‑generation Mexican‑American, with his parents originally from Jalisco. He grew up in a bilingual household in Texas, celebrating Mexican holidays such as Dia de los Muertos
    and quinceañeras while also embracing local Texan customs. His cultural identity blends the vibrant colors and flavors of Mexican folk art and cuisine with the laid‑back spirit of Houston’s diverse
    neighborhoods, and he remains active in the local Mexican community through church gatherings and neighborhood festivals.
