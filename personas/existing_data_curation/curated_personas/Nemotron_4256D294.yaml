  hobbies: '[''visiting art galleries and museums'', ''street photography'', ''cooking Mexican and Tex-Mex dishes'', ''gardening'', ''attending cultural festivals'', ''hiking and nature walks'', ''reading
    art and history books'', ''playing acoustic guitar'']'
  career_goals: 'Alejandro hopes to turn his hobbies into a modest home‑based venture: selling prints of his street photos and handmade crafts at local markets, and offering cooking workshops that showcase
    Mexican‑Texan recipes. He plans to enroll in a community‑college art or culinary class to sharpen his techniques, and he dreams of becoming a cultural liaison who helps organize neighborhood festivals
    and mentors younger members of the Mexican‑American community.'
