  hobbies: '[''Visiting museums and galleries'', ''Sketching'', ''Reading historical fiction and poetry'', ''Book club participation'', ''Gardening native Texas wildflowers'', ''Home décor design'', ''Cooking
    eclectic cuisines'', ''Hosting potluck dinners'', ''Watercolor painting'', ''Knitting'', ''Attending live jazz performances'', ''Road trips to cultural sites'']'
  career_goals: Leeann aims to deepen her involvement in the local arts scene by curating a quarterly pop‑up gallery showcasing works of senior artists in Spring. She aspires to author a memoir that weaves
    together personal anecdotes with reflections on the evolution of art in Texas, and to develop a small online boutique selling handcrafted pottery and hand‑painted ceramics inspired by her garden. Additionally,
    she plans to enroll in lifelong‑learning courses on modern art theory and to travel to at least three major art museums in the United States over the next five years, sharing her experiences through
    community talks.
