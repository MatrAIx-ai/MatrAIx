personas:
  professional: Leeann Mort, a veteran arts advocate and community curator in Spring, blends a deep art‑history knowledge with a knack for storytelling to organize pop‑up galleries for senior artists, mentor
    volunteers, and promote local exhibitions through savvy social‑media campaigns, and they juggle a relaxed approach to deadlines that sometimes leaves their schedule delightfully chaotic.
  sports: Leeann Mort enjoys low‑impact fitness such as weekly tai chi at the community center, cheerful Saturday walks through Hermann Park, follows the Houston Astros baseball team and the Houston Dynamo
    soccer club, and they occasionally join a senior‑friendly tennis league in the spring.
  arts: Leeann Mort finds inspiration in the vibrant murals of Austin’s Sixth Street, the lyrical improvisations of jazz pianist Ahmad Jamal, the bold colors of Georgia O'Keeffe, and the poignant verse
    of contemporary poet Ocean Vuong, often sketching on the spot in the Museum of Fine Arts, Houston, and they host evening gatherings to discuss the works of filmmaker Greta Gerwig.
  travel: Leeann Mort favors spontaneous weekend road trips that blend cultural immersion with scenic drives, recently explored the historic French Quarter of New Orleans, mapped a day‑long mural tour in
    Austin, dreams of visiting the Metropolitan Museum of Art in New York, and they always pack a sketchbook and a reusable water bottle for on‑the‑go inspiration.
  culinary: Leeann Mort, an adventurous home chef, excels at fusing seasonal Texas produce with global flavors, crafting dishes like wildflower‑infused quinoa salad, Cajun gumbo with garden‑grown okra,
    and pomegranate‑glazed salmon, and they keep their pantry stocked with saffron, smoked paprika, and fresh cilantro.
  core: Leeann Mort merges a lifelong love of art, gardening, and eclectic cooking into a relaxed, curiosity‑driven lifestyle, punctuated by occasional disorganization and a habit of sketching every museum
    visit on a weathered notebook, and they often lose track of time while daydreaming.
background:
  cultural: Leeann was raised in a middle‑class white family in the Houston metropolitan area, where she absorbed the Southern hospitality and community‑oriented values of Texas. Her upbringing emphasized
    appreciation for the arts, supported by frequent family trips to museums and cultural festivals. She identifies with the regional blend of traditional Texas customs—such as church gatherings, neighborhood
    barbecues, and a love for the outdoors—while also embracing the diverse, multicultural influences present in Greater Houston. This cultural foundation informs her open‑minded curiosity and her dedication
    to fostering inclusive artistic experiences in her community.
attributes:
