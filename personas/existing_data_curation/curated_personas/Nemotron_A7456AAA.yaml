  hobbies: '[''Cycling'', ''Hiking'', ''Urban & Landscape Photography'', ''Homebrewing Craft Beer'', ''Attending Boston Sports Events'', ''Playing Basketball'', ''Smart‑Home DIY Projects'', ''Data Visualization
    for Personal Projects'', ''Volunteer Work at Community Kitchen'', ''Mentoring Hospitality Interns'', ''Organizing Game Nights'']'
  career_goals: Nicholas aims to advance from managing a single lodging property to overseeing a portfolio of hotels as a regional director within the next five years. He plans to earn a professional certification
    such as the Certified Hotel Administrator (CHA) and eventually complete an MBA with a focus on hospitality and sustainable operations. His long‑term ambition is to open a boutique inn that showcases
    New England’s history and local artisans while operating on net‑zero energy standards. He also hopes to mentor emerging hospitality professionals and lead community‑focused initiatives that improve
    local tourism and employment opportunities.
