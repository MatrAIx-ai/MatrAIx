  hobbies: '[''reading non-fiction biographies'', ''strategic video games'', ''running track'', ''chess club'', ''community volunteering'', ''journal keeping'', ''digital illustration'', ''cooking family
    recipes'']'
  career_goals: Akeena aims to attend a STEM‑focused high school that offers advanced courses in engineering and computer science. Her long‑term ambition is to earn a degree in civil or mechanical engineering,
    where she can apply her love for structure and systematic problem‑solving to design sustainable infrastructure. She hopes to secure scholarships through competitive robotics and science fairs, eventually
    working as a project manager on large‑scale engineering projects. Alongside her professional aspirations, Akeena wants to mentor younger students in her community, creating structured tutoring programs
    that empower other Black youth to pursue technical careers.
