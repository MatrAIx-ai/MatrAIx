persona_description: A scientist who has dedicated their life to studying and exploring the vast expanse of the universe, particularly focusing on the search for alien worlds and the discovery of planets
  that are not only gas or ice giants but also of a variety of other sizes and compositions. They are experts in the field of exoplanet detection and have made significant contributions to the scientific
  community, including the development of new indirect methods of planet detection and the refinement of existing ones. They are also known for their work in determining what some exoplanets are made of,
  which involves the use of light that streams through their atmosphere in order to obtain a planetary transmission spectrum.
