personas:
  professional: Andrew Covington, a ten‑year‑old LEGO architect‑in‑training, channels his love for routine and hands‑on problem solving into building intricate brick models, demonstrating early spatial
    reasoning, methodical patience, and a cooperative spirit that earns praise from teachers and peers.
  sports: Andrew Covington, a member of the Highland Mills United youth soccer club, devotes weekend practice to building stamina and teamwork, cheers for the New York Knicks and New York Rangers, and balances
    his love for outdoor bike rides with a relaxed attitude toward structured training, preferring spontaneous scrimmages over formal drills.
  arts: Andrew Covington, an avid fan of the LEGO Movie franchise and adventure novels like the Percy Jackson series, spends free time recreating scenes with bricks, enjoys the music of Imagine Dragons
    and the whimsical animation of Studio Ghibli, and occasionally sketches his own block‑based designs, reflecting his practical creativity and cooperative nature.
  travel: Andrew Covington, who values familiar routines yet dreams of new discoveries, enjoys family day trips hiking the Hudson Valley’s waterfalls, has visited the historic streets of Williamsburg, New
    York, and hopes to explore the theme parks of Orlando and the museums of Washington, D.C., planning trips with a simple checklist and parental guidance.
  culinary: Andrew Covington, who loves helping in his garden's herb patch, often adds fresh basil and thyme to his favorite spaghetti with marinara, enjoys homemade pizza with pepperoni and mushrooms,
    and, though his cooking skills are limited to simple stovetop dishes, he proudly prepares chocolate chip pancakes on weekend mornings.
  core: Andrew Covington, a ten‑year‑old LEGO enthusiast with a calm, routine‑driven mindset, balances a tidy savings habit, mild allergies, weekend soccer, and a love for garden‑fresh meals, all while
    occasionally forgetting to floss and preferring spontaneous bike rides over rigid schedules.
background:
  cultural: He grows up in a middle‑class white family in Highland Mills, a suburban community in Orange County, New York. The town blends small‑town traditions with easy access to Hudson Valley outdoor
    activities. His family celebrates typical American holidays such as Thanksgiving and Christmas, participates in local community events like the fall fair and town parades, and places a modest emphasis
    on school achievement and civic involvement.
