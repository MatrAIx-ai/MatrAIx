  hobbies: '["Visiting art galleries and murals", "Salsa dancing", "Cooking Cuban dishes", "Sketching and doodling", "Listening to indie and Latin music", "Attending live concerts", "Watching indie films",
    "Creating playlists", "Participating in community festivals", "Exploring Miami neighborhoods on foot"]'
  career_goals: Luz plans to pursue a degree in Communications or Digital Media, aiming to work in cultural marketing or community outreach. She aspires to become a social media manager for a Latin arts
    organization or an event producer for multicultural festivals, eventually launching her own platform that showcases emerging Cuban diaspora artists. Her long‑term ambition is to combine creative passion
    with a stable career that eases her stress and provides financial security.
