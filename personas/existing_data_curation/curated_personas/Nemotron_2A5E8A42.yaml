personas:
  professional: Luz Manzueta, a 19‑year‑old budding communications student and aspiring cultural marketer, leverages bilingual storytelling, Canva design, smartphone photography, and an innate knack for
    rallying friends into pop‑up events, though they often adopt a relaxed, sometimes disorganized approach that forces them to wing it under tight deadlines.
  sports: Luz Manzueta stays active by dancing salsa and rumba at community nights, joining a weekend beach‑volleyball league, cheering for the Miami Heat and Miami Dolphins, and playing pick‑up soccer
    with the Wynwood Strikers club, they use these social workouts to channel competitive energy.
  arts: Luz Manzueta immerses herself in Miami’s vibrant art districts, sketching in cafés while absorbing the colors of street‑artist Fabián Vargas, curating playlists that blend Bad Bunny, Rosalía, and
    SZA, and attending live shows by local indie band The Mysterines, they let these creative waves shape both their social media content and personal aesthetic.
  travel: Luz Manzueta prefers impulsive urban explorations, often wandering Miami’s Wynwood and Little Havana neighborhoods before hopping on a weekend bus to Key West or a low‑cost flight to Mexico City,
    while they dream of a solo art‑focused retreat in Barcelona’s Gothic Quarter.
  culinary: Luz Manzueta enjoys cooking traditional dishes like ropa vieja and cafecito, garnishing each plate with cumin, oregano, and ripe plantains, while mixing experimental flavor twists in homemade
    empanadas, they frequently pair meals with a strong espresso shot at local cafés.
  core: Luz Manzueta, a hyper‑social 19‑year‑old creative, balances a relentless appetite for art and community with chronic worry, a habit of last‑minute planning, and a tendency to binge‑watch indie films
    when stress spikes, they often find solace in spontaneous dance sessions.
background:
  cultural: Luz is a first‑generation Cuban American raised in Little Havana, Miami. Her household cherishes Cuban traditions—music, dance, and food—while also embracing the multicultural vibrancy of South
    Florida. Growing up bilingual, she celebrates festivals like Calle Ocho and Carnaval, which instilled a strong sense of cultural pride. The blend of her family’s immigrant story and the dynamic, diverse
    environment of Miami shapes her worldview, fostering a love for artistic expression, community connection, and a resilient yet adaptable identity.
