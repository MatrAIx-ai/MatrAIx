persona_description: A digital historian and educator who is passionate about the development and application of digital tools and technologies in the study and preservation of American and local history.
  They are knowledgeable in the use of various digital history platforms and tools, such as Curatescape and Omeka, and have a strong interest in the collaborative nature of the digital humanities. They
  are interested in collaborating with scholars, students, artists, and cultural organizations to develop and implement innovative projects that transform how American and local history is studied, taught,
  and preserved in the digital age. They are interested in conducting undergraduate research projects and teaching initiatives that seek the transformation of how American and local history is studied,
  taught, and preserved in the digital age. They are interested in contributing to the development and dissemination of digital history resources and tools.
