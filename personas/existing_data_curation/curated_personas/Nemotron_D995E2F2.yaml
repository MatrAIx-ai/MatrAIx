  hobbies: '[''watercolor painting'', ''abstract art'', ''quilting'', ''genealogy research'', ''reading historical fiction and poetry'', ''gardening'', ''attending community theater'', ''listening to folk
    and bluegrass music'', ''nature walks and birdwatching'', ''Southern cooking and baking'', ''board games and puzzles'']'
  career_goals: Although retired, Nicole aims to leave a lasting creative legacy. She plans to complete a memoir that weaves together her family’s history and personal reflections, and she hopes to exhibit
    a series of her abstract paintings at the Laurens County Museum. She wants to deepen her digital photography skills and create an online gallery to connect with distant relatives. Nicole also aspires
    to curate a local history exhibit, mentor senior‑center participants in art, and learn pottery as a new craft. Finally, she wishes to travel to nearby cultural sites, such as Charleston’s art museums,
    to broaden her artistic perspective.
