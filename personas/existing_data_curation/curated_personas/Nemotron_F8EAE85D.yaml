personas:
  professional: Peggy Russell, a 14‑year‑old aspiring comic creator, weaves narratives of empowerment into a weekly webcomic, using digital art tools learned in school tech class and storytelling techniques
    honed at church youth group gatherings and Juneteenth celebrations, while managing homework and art deadlines with a blend of organized planning and spontaneous creativity.
  sports: Peggy Russell cheers for the Seattle Seahawks and the Seattle Sounders, plays on the school’s co‑ed volleyball team in the fall, and spends weekends skateboarding at the local park with friends,
    supplementing these activities with hikes in the nearby Cascade foothills and tracking steps on a smartwatch to stay active.
  arts: Peggy Russell draws inspiration from comic pioneers like Jamal Campbell and visual storytellers such as Kara Walker, while the soulful sounds of Alicia Keys, Kamasi Washington, and the modern jazz
    of Robert Glasper shape the mood of their panels, and they channel this blend into a self‑published webcomic series and a recent school drama performance of 'A Raisin in the Sun'.
  travel: Peggy Russell has already captured the misty forest of the Hoh Rainforest and the bustling Pike Place Market in sketch‑filled journals, dreams of exploring the vibrant murals of New Orleans and
    the historic monuments of Washington, D.C., and plans each trip with a detailed itinerary, balancing school obligations and a modest travel fund provided by summer job earnings.
  culinary: Peggy Russell enjoys cooking comfort dishes like collard greens with smoked turkey, sweet‑potato fried rice, and salmon glazed with maple syrup, experimenting with spice blends from family Juneteenth
    feasts, though they often forget to preheat the oven, resulting in occasional over‑cooked edges that become a running joke among friends.
  core: Peggy Russell is a talkative teen comic artist who channels cultural storytelling into vibrant digital art, balances school with creative bursts, saves part of their allowance while splurging on
    art gear, and sometimes forgets to floss.
background:
  cultural: Peggy is an African‑American teen raised in Maple Valley, Washington. Her family maintains strong ties to Black cultural traditions, celebrating events such as Juneteenth and Black History Month
    with storytelling, music, and community gatherings. Influenced by the works of Black artists and authors, she often incorporates themes of identity, resilience, and empowerment into her artwork. The
    supportive environment of her local church youth group and the broader Pacific Northwest’s emphasis on diversity have nurtured her sense of cultural pride and her desire to amplify under‑represented
    voices through creative expression.
