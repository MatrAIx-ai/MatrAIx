  career_goals: Peggy aspires to become a multidisciplinary visual storyteller. She envisions a career as a graphic designer, digital illustrator, or animator, creating artwork that reflects personal and
    cultural narratives. In the short term, she plans to attend a specialized arts high school program, build a robust portfolio, and secure mentorships at local art labs. Long-term, she hopes to lead community
    art projects that empower other Black youth, using her communication and leadership skills to foster creative collaborations and advocate for representation in media.
