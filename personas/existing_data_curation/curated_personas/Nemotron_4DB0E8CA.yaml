personas:
  professional: David Bailes is a budding computer engineering aspirant; they leverage disciplined self‑learning, meticulous documentation, and a competitive drive to build custom PCs, prototype hardware,
    and develop indie games, positioning themselves for top‑tier university admission and future tech entrepreneurship.
  sports: David Bailes is an avid fitness enthusiast; they follow a structured weight‑lifting program, hike the White Mountains weekly, snow‑shoe during winter, root for the New England Patriots and Boston
    Bruins, and belong to the local Mountain Hiking Club.
  arts: David Bailes is a tech‑savvy creative; they enjoy programming indie games inspired by the storytelling of Hideo Kojima, listen to progressive rock band Porcupine Tree while debugging, read Carl
    Sagan’s Cosmos, and attend occasional performances at the Manchester Community Theatre featuring local musicians like Emma G.
  travel: David Bailes is a methodical traveler; they plan weekend trips to the White Mountains and Boston using detailed itineraries, dream of exploring Iceland’s geothermal landscapes and Japan’s tech
    districts, balance adventure with budget constraints, and prefer solo or small‑group travel.
  culinary: David Bailes is a pragmatic cook; they favor hearty New England dishes such as clam chowder and maple‑glazed salmon, experiment with sous‑vide techniques for precision, enjoy assembling a quinoa‑kale
    salad with aged cheddar, and often snack on trail‑mix while building PCs.
  core: David Bailes is a disciplined, competitive tech tinkerer who thrives on solitary problem‑solving, meticulous planning, and occasional caffeine‑fuelled late‑night builds, while sometimes overlooking
    social niceties and dental flossing.
background:
  cultural: David was raised in Manchester, New Hampshire, within a middle‑class, predominantly white New England community. His family’s roots trace back several generations to early English settlers of
    the region, and they embody the local values of self‑reliance, hard work, and modest civic engagement. Growing up, David was exposed to the region’s seasonal outdoor culture—skiing, hiking, and leaf‑peeping—all
    of which fostered an appreciation for the natural environment. The town’s emphasis on public education and community support for local schools reinforced his disciplined academic pursuits. While he
    respects the traditional New England emphasis on individual privacy, his competitive nature drives him to excel within this cultural framework, seeking personal achievement while maintaining a pragmatic,
    grounded outlook.
