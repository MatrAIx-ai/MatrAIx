  career_goals: David aims to secure admission to a top‑tier university—ideally the University of New Hampshire or a comparable institution—where he will pursue a degree in Computer Engineering or Data
    Science. He plans to earn merit‑based scholarships by maintaining a high academic GPA and building a competitive portfolio of personal coding projects and hardware prototypes. Through summer internships
    with regional tech firms or defense contractors, he seeks hands‑on experience that will position him for a future role as a lead engineer or technical project manager. In the longer term, David dreams
    of launching his own startup focused on sustainable hardware solutions, leveraging his disciplined approach and competitive drive to become an industry innovator.
