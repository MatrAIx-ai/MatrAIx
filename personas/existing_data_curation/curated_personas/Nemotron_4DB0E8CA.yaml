  hobbies: '[''Building custom PCs'', ''Programming indie games'', ''Reading science non-fiction'', ''Solving puzzles (Rubik’s Cube, crosswords)'', ''Strategy board gaming (Settlers of Catan, Twilight Struggle)'',
