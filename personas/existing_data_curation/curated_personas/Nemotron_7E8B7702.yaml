  career_goals: Adam dreams of becoming a wildlife illustrator who travels to national parks to draw animals, or a game developer who creates interactive games that teach ecological concepts. He also envisions
    exploring astronomy and sharing his discoveries through videos. While still young, he wants to keep his options open, focusing on learning, creativity, and eventually helping others manage anxiety through
    art or mentorship. Attending an arts‑focused high school and later studying biology or game design are part of his flexible long‑term plan.
