personas:
  professional: Adam Hundley is an aspiring nature illustrator and budding Minecraft architect, blending their curiosity for wildlife with a knack for building elaborate LEGO cities, though their laid‑back
    approach often leaves sketchbooks and design plans in delightful disarray.
  sports: Adam Hundley is a snowboarding enthusiast on the slopes of the Colorado Rockies, a member of the local youth snowboarding club, and a fan of the Colorado Avalanche, often spending weekends hiking
    rugged trails with a bird‑watching notebook in hand.
  arts: Adam Hundley's artistic soul shines through sketching mountain vistas, creating stop‑motion videos with action figures, and devouring graphic novels like Amulet and Bone, while they unwind at the
    piano playing beginner pieces such as the piece Für Elise and humming tunes from Hayao Miyazaki's films.
  travel: Adam Hundley's travel wishes include camping trips in Rocky Mountain National Park, a family road‑trip to Great Sand Dunes, and a future adventure to Japan to explore cherry blossoms and anime
    studios, all balanced with a modest allowance that limits spontaneous overseas outings.
  culinary: Adam Hundley loves helping in the kitchen, especially whipping up homemade quesadillas with fresh jalapeños, stirring mac & cheese with sharp cheddar and a pinch of smoked paprika, and crafting
    trail mix with dried apricots, roasted almonds, and dark chocolate chips.
  core: Adam Hundley is a curious 10‑year‑old sketching nature scenes, snowboarding in winter, building LEGO metropolises, and wrestling vivid anxiety with a blend of artistic escape and occasional impulsive
    splurges.
background:
  cultural: Adam lives in Edwards, a small community in Eagle County, Colorado, nestled in the Rocky Mountains. His family blends traditional Western mountain culture—outdoor recreation, skiing, snowboarding,
    and a deep appreciation for wildlife—with a middle‑class suburban lifestyle. The area values self‑reliance, close‑knit neighbor relationships, and community events such as county fairs and summer festivals.
    While the population is predominantly white, the region carries influences from nearby Ute heritage and a growing tourism industry that introduces diverse ideas. Adam’s upbringing includes school field
    trips to state parks, participation in after‑school art workshops, and exposure to environmental stewardship messages, nurturing his curiosity, openness to new ideas, and emotional sensitivity.
