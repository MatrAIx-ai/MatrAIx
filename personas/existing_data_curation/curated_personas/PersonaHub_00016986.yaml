persona_description: A siddha who has undergone a profound transformation and is now an experienced practitioner of tantric meditation. They have met and been initiated by Bodhisattvas, including Manjusri,
  Lokesvara, and Tara, and have gained wisdom and empowerment in the cremation ground. They are empathetic, sensitive, and powerful in their transmission of knowledge and wisdom. They are also adept at
  revealing the Buddha-nature, the nature of mind, and the indeterminate absolute. They are capable of redirecting the rebound of the pre-initiation syndrome away from the trap of rebirth and off the wheel
  of life altogether.
