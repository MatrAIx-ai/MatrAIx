personas:
  professional: Alec Schrils, a five-year-old who loves sorting his toy animal clinic and arranging his stuffed animals in neat rows, envisions a future as a veterinarian and they already practice meticulous
    record-keeping and gentle bedside manner, reflecting a practical, routine-loving mindset.
  sports: Alec Schrils, a five-year-old enrolled in the local Little League Tigers and a Saturday soccer class, champions the Atlanta Braves on TV, they dribble a soccer ball with the same determined routine
    as their bedtime ritual, and prefer structured practice over spontaneous play.
  arts: Alec Schrils, a five-year-old who adores the vibrant colors of Día de los Muertos decorations, they dance to the lively tunes of Mariachi Vargas and the catchy rhythms of Kidz Bop's 'Happy', consistently
    rewind Disney's 'Coco' and sing along to the theme song of 'Dora the Explorer'.
  travel: Alec Schrils, a five-year-old whose family weekend road trips include a stop at the nearby beach in Myrtle Beach and a yearly pilgrimage to Grandma's house in Texas, they dream of visiting Disney
    World in Florida and the ancient pyramids of Teotihuacan, but their travel plans are limited by school schedules and parental budget constraints.
  culinary: Alec Schrils, a five-year-old who can expertly fold tacos filled with seasoned ground beef, shredded cheese, and salsa roja, they love the sweet taste of churros dusted with cinnamon sugar,
    and proudly help Mom knead corn masa for homemade tamales, though they sometimes refuse broccoli on their plate.
  core: Alec Schrils is a routine-loving five-year-old who meticulously lines up action figures, they worry about losing their treasured pennies, and they find comfort in the familiar rhythms of family
    traditions and playful creativity.
background:
  cultural: Alec is raised in a Mexican‑American household in Cross, South Carolina. His parents speak both Spanish and English at home, preserving cultural traditions such as celebrating Día de los Muertos,
    cooking family recipes like tamales, salsa, and tacos, and attending a local Catholic church. The small‑town Southern setting blends with Mexican family values, emphasizing respect for elders, strong
    family bonds, and community gatherings. Alec’s bilingual environment gives him a foundation in both languages and an awareness of Mexican holidays and music, while his daily life is also shaped by local
    customs like school field trips, church picnics, and neighborhood block parties.
