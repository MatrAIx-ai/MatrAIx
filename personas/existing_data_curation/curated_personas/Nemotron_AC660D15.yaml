  career_goals: Alec dreams of a future where he can protect and help his community, so he often says he wants to become a firefighter or a police officer because those jobs have clear daily routines and
    allow him to be practical and useful. He also imagines helping his family in the kitchen, preparing his favorite tacos, which satisfies his desire to contribute to family life. As he grows, he hopes
    to keep the reliable schedule of school, playtime, and chores while becoming a trustworthy adult who people can count on.
