  career_goals: Even at his age, Peter dreams big. He wants to become an astronaut or a mechanical engineer because he is fascinated by space and how machines work. He also imagines himself as a wildlife
    biologist studying animals in the nearby Tennessee hills, reflecting his competitive drive to explore and discover. Peter hopes to design robots that can help people, and he is motivated to do well
    in school and in his extracurricular projects so he can turn these ambitions into reality.
