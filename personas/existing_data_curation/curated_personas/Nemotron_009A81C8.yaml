personas:
  professional: Peter Rainey, an aspiring junior engineer, channels curiosity and practical tinkering into building intricate LEGO constructions while balancing a laid‑back attitude toward school assignments,
    turning group play into competitive problem‑solving challenges, and they often share their creations with peers.
  sports: Peter Rainey laces up their cleats for the Maple Grove Youth Soccer Club every Saturday, idolizes the precise passing of FC Barcelona's midfielders and the high‑energy style of the Chicago Bulls,
    and channels their competitive edge into sprint drills that often turn practice into a personal race against time.
  arts: Peter Rainey fills sketchbooks with whimsical cartoon characters inspired by the playful brushwork of Mo Willems and the vibrant worlds of Studio Ghibli's 'My Neighbor Totoro,' while their evenings
    are soundtrack‑filled with the energetic beats of the band 'Imagine Dragons' and the chiptune melodies of Minecraft, and they often experiment with digital drawing tools after school.
  travel: Peter Rainey prefers spontaneous family road trips to nearby state parks, has already trekked the Asheville Trail System and camped under the stars at Yosemite National Park, and dreams of traveling
    to the Kennedy Space Center in Florida to see a real rocket launch, and they love collecting postcards from each stop.
  culinary: Peter Rainey gravitates toward cheesy pepperoni pizza slices, homemade chicken nuggets with a secret dip of ketchup and honey, and delights in assembling their own trail mix using almonds, raisins,
    and M&Ms, though their cooking skills are limited to microwaving macaroni and cheese, and they sometimes try baking cupcakes but usually end up with a slightly burnt crust.
  core: Peter Rainey is a curiosity‑driven, competition‑fueled sandbox builder who tames stress by doodling cartoons, yet they often leave their LEGO bricks scattered and forget their inhaler during play.
background:
  cultural: Peter grows up in Chattanooga, Tennessee, a city known for its Southern hospitality, outdoor recreation, and community spirit. His family participates in local traditions such as weekend trips
    to the Tennessee River for kayaking, attending Saturday church services, and enjoying regional foods like barbecue and fried chicken. At school, students learn about Appalachian folklore and regional
    history, feeding Peter's curiosity about nature and storytelling. He is also exposed to the area’s musical heritage, hearing country and bluegrass tunes at community events, which adds a rhythmic backdrop
    to his social activities.
