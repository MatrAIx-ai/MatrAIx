persona_description: A historian of American politics who specializes in the study of the development and evolution of the Senate system in Rhode Island. Their research interests include the impact of the
  franchise qualification, the role of the elite in preserving their power, and the influence of economic interests on legislative representation. They are particularly interested in the changes made to
  the Senate apportionment in the late 19th and early 20th centuries and the ways in which these changes reflect broader trends in American political history.
