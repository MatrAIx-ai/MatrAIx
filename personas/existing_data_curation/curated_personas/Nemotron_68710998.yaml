  hobbies: '[''Cooking Salvadoran cuisine'', ''Salsa dancing'', ''Gardening'', ''Church senior outreach volunteering'', ''Community potluck gatherings'', ''Watching telenovelas'', ''Knitting'', ''Organizing
    card games'', ''Walking in neighborhood parks'']'
  career_goals: Maritza aims to transition into a mentorship role where she can share her decades-long experience with younger credit counselors, while also establishing a community-focused financial literacy
    workshop series for Spanish-speaking seniors in East LA. She hopes to secure a part-time consultancy position that offers a predictable routine yet flexible hours, allowing her to balance work with
    family gatherings and cultural activities. Ultimately, she aspires to leave a lasting legacy of financial empowerment within the Salvadoran community and to ensure a comfortable, stress-free retirement
    for herself and her relatives.
