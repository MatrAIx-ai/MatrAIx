personas:
  professional: Maritza Behar, a seasoned financial services veteran with three decades of credit counseling, loan underwriting, and bilingual advising, leverages their empathetic listening and routine‑driven
    approach to guide senior clients through complex debt‑management decisions while tolerating occasional disorganization with a calm, community‑focused demeanor.
  sports: Maritza Behar enjoys leisurely walks through their neighborhood garden, participates in a local senior walking club affiliated with Los Angeles County Parks, passionately roots for the Los Angeles
    Dodgers, and occasionally joins a low‑impact Zumba class at the community center during the spring.
  arts: Maritza Behar delights in classic telenovelas like 'María la del Barrio' and 'Cuna de Lobos,' sways to salsa rhythms inspired by Celia Cruz during weekly dance classes, and cherishes the music of
    Juan Luis Guerra, all of which shape their vibrant storytelling at neighborhood gatherings.
  travel: Maritza Behar prefers organized group tours to culturally rich destinations such as Oaxaca and Cartagena, balances travel with family obligations by planning short weekend trips to Catalina Island
    and the Santa Barbara wine country, and relies on senior discount packages to keep expenses manageable.
  culinary: Maritza Behar, a confident home chef, crafts pupusas filled with quesillo and loroco and simmered chicken sopa de gallina seasoned with cilantro and lime, while their garden‑sourced roses inspire
    a fragrant rose‑water dessert they often share at community potlucks.
  core: Maritza Behar, a warm‑hearted community mentor who balances a meticulous financial routine with a love for salsa dancing, gardening, and knitting, often battles worry‑driven over‑planning and occasional
    disorganization.
background:
  cultural: Maritza is a first-generation Salvadoran American who grew up in the vibrant Salvadoran enclave of East Los Angeles. She was raised in a Catholic household where family gatherings, traditional
    foods, and community celebrations were central to daily life. Fluent in both Spanish and English, she bridges the two cultures, preserving Salvadoran customs such as Dia de los Muertos commemorations,
    while also embracing the multicultural fabric of Los Angeles. Her identity is shaped by strong family ties, respect for elders, and a deep sense of responsibility toward the immigrant community she
    serves.
attributes:
  skills: '[''Credit counseling'', ''Loan underwriting'', ''Bilingual financial advising (Spanish-English)'', ''Debt management planning'', ''Regulatory compliance'', ''Customer relationship management'',
