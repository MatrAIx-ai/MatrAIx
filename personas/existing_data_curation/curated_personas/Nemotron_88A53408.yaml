  career_goals: Mariela dreams of one day becoming an artist who can bring her imaginative stories to life on canvas, a veterinarian who cares for animals with gentle hands, or a teacher who helps other
    children discover the joy of learning. She is enthusiastic about exploring different cultures and hopes to use her kindness and curiosity to make her community a more harmonious place.
