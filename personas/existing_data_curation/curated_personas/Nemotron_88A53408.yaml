personas:
  professional: Mariela Arce, an aspiring junior veterinarian who blends her keen observational skills from drawing animals with a gentle, organized bedside manner, channels her curiosity and cooperative
    nature into caring for her plush patients and school science projects.
  sports: Mariela Arce, a lively seven‑year‑old who dabbles in after‑school soccer with the Little Lions U‑8 team and enjoys seasonal ice‑skating lessons, also cheers enthusiastically for the local baseball
    club, the River Rapids, while incorporating daily park walks and LEGO‑inspired obstacle courses into her playtime to stay active.
  arts: Mariela Arce, a budding artist who spends afternoons sketching whimsical animal mash‑ups inspired by Frida Kahlo’s bold colors, delights in listening to folk tunes by Lila Downs and pop hits by
    BTS, and finds excitement in reenacting scenes from Pixar’s 'Coco' during pretend‑play, all of which shape her vibrant artistic identity.
  travel: Mariela Arce, an adventurous traveler at heart, loves family weekend trips to the nearby botanical garden and the seaside boardwalk, cherishes museum outings in the city’s art district, and dreams
    of one day exploring the Grand Canyon’s vast vistas and the vibrant streets of Barcelona, balancing her imaginative wanderlust with her parents’ budget‑conscious planning.
  culinary: Mariela Arce, a kitchen enthusiast who proudly helps knead masa for tamales and melt cheese on quesadillas, delights in mixing fresh avocado, lime, and cilantro to whip up guacamole, and often
    sniffs the sweet aroma of mango slices and cinnamon‑spiced churros, showcasing a budding culinary confidence paired with a love for bold, familiar flavors.
  core: Mariela Arce, a curious and caring seven‑year‑old who habitually doodles on every scrap of paper, worries about tiny details before bedtime, and can’t resist a sudden craving for glitter stickers,
    embodies a blend of artistic wonder and gentle anxiety.
background:
  cultural: Mariela comes from a Mexican family that celebrates traditions such as Día de los Muertos, Cinco de Mayo, and weekly family gatherings centered around homemade Mexican cuisine. Spanish is spoken
    at home, allowing her to maintain fluency alongside English. Living in Indianapolis, she participates in local Mexican community events, such as cultural festivals at the Indy Mexican Cultural Center,
    where she learns traditional dances and music. This bicultural upbringing instills in her a deep appreciation for art, music, and community harmony, and it shapes her worldview by blending Mexican heritage
    with Midwestern American experiences.
