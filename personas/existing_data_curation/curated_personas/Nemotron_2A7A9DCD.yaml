  career_goals: Theresa aims to translate her practical experience into supervisory roles. In the next year she plans to earn OSHA 30‑hour certification and a forklift‑operator endorsement, positioning
    herself for a crew‑lead position. Within three to five years she hopes to become a foreperson or site supervisor on residential projects, overseeing teams, schedules, and safety compliance. Long‑term,
    she envisions establishing her own small‑scale construction firm focused on affordable housing and community‑oriented projects in Miami Gardens, leveraging her network and leadership skills to create
    stable, well‑paid jobs for local residents. Throughout this progression, she seeks a more predictable work schedule and greater financial stability to reduce the stress that currently affects her wellbeing.
