personas:
  professional: Theresa Jefferson, a 27‑year‑old construction laborer with a knack for heavy equipment operation and crew coordination, blends her practical mindset and OSHA safety expertise with a charismatic,
    talk‑show‑style presence on site, making her the go‑to person for both technical problem‑solving and morale‑boosting among teammates while she pursues an OSHA 30‑hour certification and a foreperson
    role.
  sports: Theresa Jefferson, a beach jogger, Zumba aficionado, and co‑ed soccer league participant, is a die‑hard fan of the Miami Heat and Miami Dolphins, joins the Sunrise Community Center Zumba Club
    every Tuesday, and balances high‑energy group fitness classes with weekend jogs along the Atlantic shoreline to stay fit and relieve work‑related stress.
  arts: Theresa Jefferson, a vibrant gospel choir member, spends evenings singing arrangements by Kirk Franklin, dancing to salsa hits from Marc Anthony, and attending open‑mic nights where they cheer on
    local R&B acts like H.E.R., using music as both social glue and personal escape.
  travel: Theresa Jefferson prefers short, budget‑friendly getaways that blend sun and culture, such as weekend trips to Key West, snorkeling excursions in the Bahamas, and a yearly pilgrimage to the Carnival
    in Trinidad, planning each itinerary on a spreadsheet to keep costs predictable while still chasing new rhythms.
  culinary: Theresa Jefferson, a confident home cook, whips up soul‑food staples like fried chicken, collard greens, and sweet‑potato pie alongside Caribbean‑inspired jerk chicken and rice‑and‑peas, seasoning
    dishes with scotch‑bonnet peppers, allspice, and a dash of hot sauce, while regularly hosting potluck nights to showcase their culinary experiments.
  core: Theresa Jefferson is a socially magnetic construction pro who turns stress into salsa, budgets obsessively, and battles anxiety with jogs, all while dreaming of leading a community‑focused building
    firm.
background:
  cultural: Theresa identifies as African‑American and was raised in the vibrant black community of Miami Gardens, a city known for its strong cultural ties, music, and family networks. Her upbringing was
    steeped in the traditions of church, gospel music, and community gatherings, which fostered a deep sense of solidarity and pride. She draws on the rich history of African‑American resilience and the
    contemporary influences of Caribbean rhythms and cuisine that permeate South Florida. These cultural threads shape her worldview, emphasizing communal responsibility, the importance of mentorship, and
    the celebration of black excellence. Navigating both the opportunities and challenges of being a young black woman in the construction trades, Theresa’s cultural background fuels her determination to
    succeed and to serve as a role model for other black youths in her neighborhood.
