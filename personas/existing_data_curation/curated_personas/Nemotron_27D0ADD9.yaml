  hobbies: '["Hiking", "Birdwatching", "DIY Woodworking", "Acoustic Guitar", "Songwriting", "Home Cooking", "Gardening", "Local History", "Community Volunteering", "Reading Programs"]'
  career_goals: Looking ahead, Daniel aims to broaden his role from a pure administrative assistant to an office operations manager who can design flexible workflow systems that respect both structure and
    spontaneity. He plans to earn a Certified Administrative Professional (CAP) credential and deepen his knowledge of records management and workplace efficiency. Over the next three years, he hopes to
    mentor junior staff, lead process‑improvement initiatives, and eventually offer part‑time consulting to small businesses in Sussex County seeking streamlined administrative practices. His long‑term
    ambition is to influence strategic planning at his organization while maintaining the calm, resilient presence he is known for.
