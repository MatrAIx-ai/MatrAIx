  career_goals: Martha hopes to study environmental technology or sustainable agriculture at a community college, eventually earning a degree that lets her blend cutting‑edge farm‑tech with the traditional
    family farm in Antrim County. She envisions a career as a farm‑systems specialist, advising local growers on efficient, eco‑friendly practices while integrating data‑driven tools. Long‑term, she dreams
    of launching her own agri‑innovation startup that supplies the northern Michigan region with affordable, precision‑farming solutions, allowing her to stay competitive, solve real‑world problems, and
    remain close to her community.
