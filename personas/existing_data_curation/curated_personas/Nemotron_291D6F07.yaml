personas:
  professional: Martha Leblanc is a high‑school senior who leads her school’s environmental club, blending her hands‑on farm experience with budding digital media skills to organize community workshops
    on sustainable gardening while managing a modest website and social‑media platform.
  sports: Martha Leblanc plays midfield for the Antrim County Hawks soccer team and competes in intramural volleyball with the North Woods club, cheers for the Detroit Lions and Detroit Red Wings, and adds
    weekly hikes in Huron National Forest to her fitness routine to boost stamina.
  arts: Martha Leblanc curates short nature videos inspired by Peter McKinnon, devours mystery novels by Gillian Flynn, streams indie folk from Mumford & Sons and pop hits by Billie Eilish, and binge‑watches
    David Fincher thrillers, letting these influences shape her own storytelling style.
  travel: Martha Leblanc prefers road‑trip adventures, having explored Sleeping Bear Dunes, Mackinac Island, and a weekend getaway to Toronto, while day‑dreaming about an eco‑tour of Iceland’s geothermal
    farms and planning future trips around school breaks with a detailed spreadsheet.
  culinary: Martha Leblanc experiments with seasonal dishes like roasted beet and goat‑cheese salad, apple crisp made from locally harvested apples, and herb‑infused summer squash stew, using garden‑fresh
    produce and modest kitchen tools to impress friends at potluck nights.
  core: Martha Leblanc is a competitive, curiosity‑driven teen who juggles farm life, digital media, and sports while battling anxiety and a meticulous habit of over‑planning every spare minute.
background:
  cultural: Martha comes from a family of French‑Canadian descent that settled in northern Michigan generations ago, preserving some bilingual traditions and celebrating holidays such as Saint‑Jean‑Baptiste.
    Raised in a predominantly Catholic household, she participated in parish youth groups and community fairs that showcase local crafts and farm produce. Living in Mancelona, a small, close‑knit town,
    she experiences a blend of Midwestern American values—self‑reliance, community involvement, and a strong connection to the natural environment—while also being aware of the nearby Ojibwe cultural presence,
    which she respects through school‑based outreach programs.
