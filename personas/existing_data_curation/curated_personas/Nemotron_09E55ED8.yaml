personas:
  professional: Ambiorix Pedrosa, a meticulous software quality assurance analyst, harnesses an organized, routine‑oriented mindset to design comprehensive test cases and automate suites using Selenium,
    Cypress, and Python, while they demonstrate exceptional written communication and bilingual fluency that enable clear stakeholder reporting and seamless bridging of English‑Spanish development teams,
    all aimed at upholding high‑quality standards.
  sports: Ambiorix Pedrosa enjoys weekend hikes on the Santa Cruz Mountains trails, practices yoga at Solace Yoga Studio, follows the San Jose Sharks in the NHL and the San Francisco 49ers in the NFL, and
    they occasionally join the Palo Alto Running Club for early‑morning runs.
  arts: Ambiorix Pedrosa immerses themselves in classic literature and the poetry of Octavio Paz, appreciates the vibrant works of Frida Kahlo at local gallery exhibitions, practices origami while listening
    to Vivaldi’s Four Seasons, and they attend intimate performances at the San Jose Repertory theatre.
  travel: Ambiorix Pedrosa prefers meticulously planned journeys that blend cultural immersion with gentle adventure, having trekked Yosemite’s waterfalls and explored the bustling markets of Oaxaca, and
    they now dream of a serene week wandering Kyoto’s temples after saving through disciplined budgeting.
  culinary: Ambiorix Pedrosa, an intermediate home chef, lovingly prepares traditional dishes such as mole poblano with roasted chiles, chicken tamales wrapped in corn masa, and chilaquiles topped with
    fresh cilantro and avocado, while also experimenting with Mediterranean salads featuring feta, olives, and lemon‑olive oil dressing, reflecting a balance of heritage and culinary curiosity, and they
    often share these meals with friends during small cultural gatherings.
  core: Ambiorix Pedrosa blends a love for routine, compassion, and precision into every facet of life, from methodical QA testing and disciplined budgeting to quiet hikes, soulful poetry, and a habit of
    over‑organizing their journal entries, and they sometimes fall into analysis‑paralysis when faced with unexpected changes.
background:
  cultural: Ambiorix is a second‑generation Mexican‑American who grew up in a bilingual household in the Bay Area. Her family celebrates Mexican traditions such as Día de los Muertos, quinceañeras, and
    holiday feasts, while also embracing Californian cultural norms. She values collectivism, family cohesion, and community service, which are reflected in her compassionate nature. Her arts and humanities
    education deepened her appreciation for Mexican literature, visual arts, and folklore, influencing her personal interests and community involvement. Fluent in both English and Spanish, she navigates
    both cultural spheres comfortably, often serving as a cultural bridge in her professional and volunteer activities.
attributes:
  skills: '["Manual testing", "Automated testing (Selenium)", "Automated testing (Cypress)", "Python scripting", "Test case design", "Test plan development", "Bug tracking (JIRA)", "QA documentation (Confluence)",
    "Requirement analysis", "Agile/Scrum methodology", "Process improvement", "Risk assessment", "Bilingual English-Spanish communication"]'
  hobbies: '["Reading classic literature", "Cooking Mexican cuisine", "Yoga", "Hiking in Santa Clara County trails", "Volunteer tutoring (Spanish)", "Origami crafting", "Journaling", "Crossword puzzles",
    "Attending small cultural events"]'
  career_goals: Ambiorix aims to advance to a QA Lead role within the next three years, where she can mentor junior testers and shape quality strategies for larger product teams. She plans to obtain ISTQB
    Advanced and CSTE certifications to deepen her expertise in test automation and quality management. Long‑term, she envisions moving into a Quality Engineering Manager position, overseeing cross‑functional
    quality initiatives and driving continuous improvement across the software development lifecycle. She also aspires to contribute to open‑source QA tools, reflecting her commitment to community collaboration
    and staying at the forefront of industry best practices.
