persona_description: A product designer who is interested in comparing the advantages and disadvantages of two types of plastic materials, PMMA (acrylic acid) and PVC, in order to choose the best one for
  a project. They are looking for information on the differences in terms of clarity, transparency, hardness, toughness, chemical resistance, UV resistance, biocompatibility, and cost. They want to compare
  the properties of PMMA and PVC in terms of density, sound, and smell, as well as the price and availability of each material. They may also be interested in the specific applications and industries in
  which each material is commonly used.
