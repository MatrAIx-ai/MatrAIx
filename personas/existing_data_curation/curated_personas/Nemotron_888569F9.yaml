personas:
  professional: Rosario Thanos, a senior full‑stack software developer with three decades of experience, fuses her deep expertise in Java, C#, Python, and React with a competitive, pragmatic mindset to
    architect enterprise‑grade micro‑services on AWS, while her sociable nature fuels Agile mentorship and her skeptical eye ensures inclusive, secure solutions for community‑focused enterprises.
  sports: Rosario Thanos embraces the outdoors through weekly hikes with the Northwoods Trailblazers, joins a community volleyball league each summer, and roots for the Detroit Lions, Pistons, and Red Wings,
    balancing her competitive spirit with a flexible, enjoyment‑first approach to fitness.
  arts: Rosario Thanos weaves her love of rhythm into community drum circles, finds solace in the cinematic scores of Hans Zimmer, draws inspiration from the speculative worlds of Ursula K. Le Guin, and
    regularly attends live performances by Lin‑Manuel Miranda, reflecting a blend of traditional beats and contemporary arts that shape her creative outlook.
  travel: Rosario Thanos favors purposeful road trips to cultural sites such as Mesa Vert­e National Park and the Wailagi Lava Flow in Hawaii, while also enjoying weekend getaways to Michigan’s Upper Peninsula
    shoreline, balancing her love for immersive history with a pragmatic budget that prioritizes family time.
  culinary: Rosario Thanos, an adept home chef, loves cooking dishes that fuse garden‑fresh vegetables with traditional ingredients such as wild rice, cedar‑smoked salmon, and acorn flour—most notably her
    signature wild‑rice and mushroom risotto with maple‑glazed carrots—while also experimenting with contemporary fusion tacos, reflecting a palate that balances tradition and modern flair.
  core: Rosario Thanos epitomizes a tech‑savvy, community‑oriented pioneer who balances a fiercely competitive work ethic with a love for communal drumming, an occasional impulse purchase of rare sci‑fi
    collectibles, and a habit of checking her smartwatch for blood pressure during code reviews.
background:
  cultural: Rosario is a proud member of the Saginaw Chippewa Tribe of Michigan. Raised in a family that emphasized storytelling, respect for the natural world, and community responsibility, she grew up
    speaking English and learning Anishinaabemowin. She regularly attends tribal ceremonies, supports language revitalization initiatives, and integrates Indigenous values—such as reciprocity and stewardship—into
    her professional ethos. Her cultural heritage informs her commitment to technology that serves her community, and she actively participates in tribal councils focusing on economic development and digital
    empowerment.
