  career_goals: Rosario aims to transition into a chief technology officer role where she can shape technology strategy for organizations serving Indigenous communities, particularly in healthcare and economic
    development. She is intent on launching a consultancy that helps tribal enterprises adopt cloud‑based solutions, data analytics, and secure software practices, while expanding mentorship programs that
    connect under‑represented youth—especially Native American students—to hands‑on STEM experiences. Continuing to champion diversity and inclusion within the tech industry remains a core ambition.
