  hobbies: '[''Visiting art galleries and museums'', ''Photography (desert landscapes and architecture)'', ''Hiking in the Sonoran Desert'', ''Playing acoustic guitar'', ''Reading science fiction and design
    books'', ''DIY home improvement projects'', ''Community volunteer clean-up events'', ''Cooking Southwestern cuisine'']'
  career_goals: Ambitious to move beyond entry-level janitorial work, Dickie aims to become a certified Facilities Operations Supervisor within the next three years, leveraging his associate’s degree in
    Facility Management. He plans to obtain the Certified Facility Manager (CFM) credential and pursue a bachelor’s degree in Facilities Management or Business Administration. Long-term, he envisions managing
    a portfolio of commercial properties or launching his own eco-friendly cleaning company that specializes in art-sensitive environments such as museums and galleries. He also hopes to integrate sustainable
    practices across the facilities he oversees, reducing chemical waste and energy consumption.
