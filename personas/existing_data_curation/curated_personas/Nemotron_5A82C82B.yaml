personas:
  professional: Regina Williams is an emerging data scientist who blends a solid foundation in Python‑based analytics, Agile project management, and laboratory techniques with a pragmatic drive to apply
    their skills toward community health and education, translating complex models into clear, actionable reports while they remain flexible enough to iterate as new data emerges.
  sports: Regina Williams is a streetball enthusiast who plays in the Brooklyn Streetball League, cheering on the Brooklyn Nets and the New York Knicks, and balances competitive pick‑up games with a relaxed
    fitness routine tracked by a Fitbit, preferring short, high‑energy sessions over long‑term gym commitments.
  arts: Regina Williams captures Brooklyn’s gritty rhythm through candid street photography inspired by Bruce Davidson and Nan Goldin, attends open‑mic nights featuring spoken‑word artists like Rudy Francisco,
    and draws creative energy from listening to Janelle Monáe and exploring exhibitions at the Brooklyn Museum.
  travel: Regina Williams prefers purposeful weekend getaways that mix cultural immersion with affordable travel, having explored historic Philadelphia, the art scene of Chicago, and dreaming of a spring
    trip to Lisbon to photograph its colorful azulejos and taste pastel de nata, all while budgeting through a dedicated travel‑fund spreadsheet.
  culinary: Regina Williams enjoys experimenting with African‑inspired desserts, regularly baking spiced sweet‑potato cake and coconut‑milk rice pudding with ginger and pomegranate for friends, while honing
    a moderate kitchen skill level that balances precise measurements with improvisation using seasonal ingredients.
  core: Regina Williams is a curiosity‑driven data analyst who balances disciplined budgeting, proactive health habits, and a love for street photography, baking, and community basketball, all underscored
    by a pragmatic yet flexible approach to life.
background:
  cultural: Regina was born and raised in Crown Heights, Brooklyn, a vibrant neighborhood shaped by Caribbean, African, and other diaspora communities. Her parents, first‑generation immigrants—her mother
    from Jamaica and her father from Nigeria—instilled a deep appreciation for cultural heritage, music, storytelling, and the importance of education. Growing up, Regina participated in community block
    parties, celebrated Juneteenth and Caribbean Independence Day, and attended a local church that emphasized service and social justice. This multicultural environment fostered a strong sense of identity
    and a commitment to equity, motivating her involvement in STEM outreach programs that aim to empower underrepresented youth. While navigating the challenges of being a Black woman in a predominantly
    white STEM field, Regina draws resilience from her family’s support and her community’s collective spirit.
