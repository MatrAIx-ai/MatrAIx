  career_goals: Regina aims to secure an entry‑level data scientist or research analyst position at an organization that values data‑driven decision‑making and social impact. She wants to apply her analytical
    and technical skills to improve community health outcomes or educational equity in underserved neighborhoods. Over the next three to five years, she plans to earn professional certifications (e.g.,
    AWS, Tableau) and consider a master’s degree in public health or data science to deepen her expertise. Regina also envisions leading interdisciplinary projects that blend technology with community outreach,
    and eventually mentoring underrepresented youth who aspire to STEM careers, balancing her curiosity for new ideas with a pragmatic approach to achieving measurable results.
