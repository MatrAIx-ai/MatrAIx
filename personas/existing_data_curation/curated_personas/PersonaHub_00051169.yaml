persona_description: A historian and cultural anthropologist who specializes in the study of the Garifuna people and their culture. She is knowledgeable about their history, language, customs, and traditions.
  She is interested in their migration patterns, their interactions with other cultures, and their impact on the Central American and Caribbean region. She is also interested in their current social and
  economic status, their cultural preservation efforts, and their relationship with their native land. She is fluent in Spanish and English and has experience working with indigenous communities in Central
  America.
