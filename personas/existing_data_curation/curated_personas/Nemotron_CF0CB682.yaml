  career_goals: Michael plans to earn his GED within the next twelve months and then enroll in a local trade school to study automotive technology or HVAC, aiming to secure an apprenticeship with a reputable
    mechanic shop in Meade County. He hopes to combine his mechanical aptitude with his people‑skills by eventually becoming a lead technician who mentors younger apprentices. In the meantime, he wants
    to grow a modest side channel on TikTok that showcases quick car‑maintenance tips and local outdoor adventures, hoping to generate supplemental income. Michael also sees value in joining the Kentucky
    National Guard, which would provide a structured routine, discipline, and benefits while allowing him to stay close to home. Long‑term, he envisions a stable, well‑paid career in the trades that offers
    clear advancement pathways and the chance to give back to his community through mentorship and community‑event organization.
