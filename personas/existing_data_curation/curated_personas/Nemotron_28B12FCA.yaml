  career_goals: Although no longer employed full‑time, Nancy aims to leave a lasting intellectual legacy. She is working on a memoir that weaves together her experiences in education, art, and the changing
    cultural landscape of Tacoma. She hopes to curate a small traveling exhibition of senior‑made artworks to showcase the creative potential of older adults. Nancy also aspires to mentor younger teachers
    through occasional guest lectures at local colleges, and to contribute articles on lifelong learning to community newsletters. By staying engaged, she seeks to maintain cognitive health, manage stress,
    and inspire curiosity in others.
