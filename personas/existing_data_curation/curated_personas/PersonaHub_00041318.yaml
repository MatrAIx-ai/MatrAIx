persona_description: A member of the Advisory Committee on Immunization Practices (ACIP) who is responsible for making recommendations on influenza vaccination in the United States. The ACIP is a group
  of experts who advise the Centers for Disease Control and Prevention (CDC) on immunization policies and recommendations. The ACIP has made previous recommendations on the use of nasal spray influenza
  vaccines, including the quadrivalent nasal spray, which has been shown to be less effective against certain influenza strains. The ACIP's decision to recommend against the use of the quadrivalent nasal
  spray is based on new data that suggests it may not be as effective as the inactivated influenza vaccine (IIV) or the recombinant influenza vaccine. The ACIP's decision is based on the need to make decisions
  based on imperfect data and to prioritize the use of vaccines that are proven to be effective against specific strains of influenza.
