personas:
  professional: Soum Bhakta, a community‑oriented organizer and aspiring part‑time IT support specialist, leverages their hands‑on home‑repair expertise, bilingual communication, and meticulous budgeting
    to coordinate temple festivals while laying groundwork for a future home‑based culinary venture.
  sports: Soum Bhakta follows cricket fervently, never missing a test match broadcast with friends, supports the Los Angeles Dodgers, and hikes the trails of Griffith Park twice a month, preferring moderate
    elevation gains over marathon training.
  arts: Soum Bhakta enjoys classic Bollywood cinema and contemporary Indian‑language independent films, collects limited‑edition vinyl of legendary playback singers, and captures community events with a
    DSLR, often editing photos on Photoshop to share on social media.
  travel: Soum Bhakta prefers road trips to nearby desert vistas like Joshua Tree for weekend retreats, dreams of a culinary pilgrimage to the Mediterranean coast to study spice blends, and plans trips
    meticulously using spreadsheets while balancing family obligations.
  culinary: Soum Bhakta experiments with fusion dishes such as tandoori‑marinated salmon tacos with mango‑coconut salsa, tends a modest herb garden of cilantro, mint, and basil for fresh flavor, and occasionally
    over‑season dishes, prompting family members to request milder versions.
  core: Soum Bhakta blends practical DIY skills with culinary curiosity, balancing organized budgeting and flexible creativity while juggling family duties, community service, and a penchant for occasional
    spice‑overload mishaps.
background:
  cultural: Soum is of Indian descent, with his family originating from the southern state of Kerala. He grew up in a household where Malayalam and Hindi were spoken alongside English, fostering a strong
    connection to his cultural roots while adapting to American life. Living in Sun Valley, a vibrant South Asian enclave in Los Angeles County, he regularly participates in temple activities, celebrates
    Diwali, Holi, and Onam, and volunteers to organize cultural programs for the diaspora community. His upbringing emphasized respect for elders, communal responsibility, and the blending of traditional
    values with the pragmatic mindset that characterizes his daily life in California.
attributes:
  skills: '[''Basic computer literacy (email, internet research, MS Office)'', ''Bilingual communication (English & Hindi)'', ''Home repair (plumbing, basic electrical, DIY carpentry)'', ''Household budgeting
    and financial management'', ''Traditional Indian cooking (regional recipes and large‑scale catering)'', ''Event planning and logistics for cultural festivals'', ''Tutoring in mathematics and science'',
    ''Small‑scale gardening (herbs and vegetables)'', ''Customer service and interpersonal skills'', ''Problem solving and troubleshooting'']'
  hobbies: '[''Cooking and recipe experimentation'', ''Herb gardening'', ''Cricket fandom'', ''Watching Indian cinema'', ''Hiking in local parks'', ''Photography of family and community events'', ''Listening
    to podcasts on DIY, finance, and entrepreneurship'']'
  career_goals: With an eye toward both stability and personal fulfillment, Soum aims to re‑enter the workforce in a flexible, part‑time capacity while laying the groundwork for a home‑based culinary venture.
    He plans to complete a food‑safety certification and a short course in digital marketing to promote a small catering service focused on South Asian cuisine for local events. Simultaneously, he is exploring
    an associate‑level IT support certification at a community college to broaden his technical options. Over the next three to five years, his ambition is to achieve a steady supplemental income stream
    that balances family responsibilities, leverages his practical skill set, and allows for continued community involvement.
