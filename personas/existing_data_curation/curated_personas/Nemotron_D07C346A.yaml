    and Indie Music'', ''Volunteer Work at Community Soup Kitchen'', ''Crossword Puzzles'', ''Gardening'']'
  career_goals: Grace aims to finish high school and enroll at the University of Nebraska to major in Art History with a minor in Business Administration or Supply Chain Management. She plans to secure
    internships at regional museums to learn collection care and registration, eventually pursuing a role as a museum registrar or curator where she can apply her organizational strengths to the preservation
    of artworks. At the same time, she wishes to deepen her understanding of sustainable retail practices so she can advocate for ethically sourced products in the industry. Long-term, Grace envisions creating
    a quiet community art space in Seward that offers workshops, exhibitions, and a contemplative environment, allowing her to support local artists and provide a peaceful cultural hub for residents.
