  hobbies: '[''knitting and crocheting'', ''quilt making'', ''container gardening'', ''listening to gospel and jazz music'', ''reading newspapers and historical fiction'', ''crossword puzzles'', ''photograph
    reviewing and family storytelling'']'
  career_goals: At 91, Giya’s ambitions centre on preserving her legacy and continuing to serve her community in quiet, meaningful ways. She hopes to compile a family cookbook that records the recipes and
    stories of her ancestors, to pass down to her grandchildren. She aspires to finish a handmade quilt that tells the history of her family’s migration from the South to Milwaukee. Giya also wishes to
    remain an active, behind‑the‑scenes mentor at her church’s outreach program, helping younger volunteers learn how to organize meals and craft donations. Maintaining her health and independence, she
    aims to stay mentally sharp by doing puzzles and reading, while ensuring her loved ones feel her steady support.
