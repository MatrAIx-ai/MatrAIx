personas:
  professional: Giya Collins, a veteran community volunteer coordinator at her local church, leverages her meticulous organizational skills, caregiving experience, and compassionate conflict‑mediation style
    to orchestrate food‑bank drives, quilt‑making workshops, and inter‑generational mentorship programs, all while maintaining a calm, predictable routine that eases her anxiety.
  sports: Giya Collins enjoys watching the Milwaukee Brewers and Milwaukee Bucks on television, participates in a weekly shuffleboard league at the senior center, and joins a low‑impact walking group that
    meets twice a week at the lakefront trail, allowing her to stay active without the strain of competitive sports.
  arts: Giya Collins finds solace in the soaring vocals of Mahalia Jackson and the smooth lilting of Miles Davis, regularly tunes in to classic jazz and gospel radio programs, and revisits historical fiction
    novels by authors such as Ken Follett and Philippa Gregory, all of which inform the narratives she weaves into her family scrapbook.
  travel: Giya Collins favors carefully planned, short excursions—she treasures a weekend road trip to the historic district of Madison, recalls a family vacation to the Smithsonian museums in Washington,
    D.C., and dreams of a gentle river cruise along the Mississippi to hear live jazz while avoiding the stress of long flights.
  culinary: Giya Collins, a seasoned home cook, perfects soul‑food staples like collard greens simmered with smoked turkey, crispy fried chicken, sweet potato pie, and biscuits, seasoning them with fresh
    basil and thyme harvested from her balcony garden, while adjusting recipes to lower sodium and sugar for her hypertension and diabetes.
  core: Giya Collins, a detail‑oriented centenarian, balances a life of structured routine and quiet generosity, hoarding crossword puzzles for nightly brain workouts, yet often lets worry over‑inflate
    simple chores like double‑checking the stove.
background:
  cultural: Giya is a lifelong African‑American resident of Milwaukee whose family arrived in the city during the Great Migration of the 1930s. Raised in a close‑knit Black community, she was immersed in
    church life, gospel music, and the oral tradition of sharing family histories. The cultural values of resilience, mutual aid, and hospitality shaped her worldview. Soul‑food cooking, especially dishes
    like collard greens, cornbread, and fried chicken, are central to her family gatherings. She participated in community quilting circles, where craft and conversation blended to strengthen social bonds.
    Though the civil‑rights era brought both challenges and activism, Giya’s generation emphasizes quiet strength, cooperation, and the passing down of cultural practices to younger generations.
