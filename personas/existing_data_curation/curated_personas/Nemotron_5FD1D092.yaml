personas:
  professional: Robert Moseley is an aspiring young coder and storyteller who blends a love for structure with a sociable energy to create interactive animated tales on Scratch, while also taking lead roles
    and handling set‑up responsibilities in the school drama club, showcasing early leadership and teamwork.
  sports: Robert Moseley is a devoted youth soccer player for the Blue Ridge Soccer Club, cheers on the local high school Eagles during football season and idolizes the Atlanta United franchise, while also
    enjoying weekend trips to watch the Charlotte Hornets practice, and they spend free time perfecting dribbling drills in the backyard.
  arts: Robert Moseley channels their love of performance into piano practice featuring pieces by Ludovico Einaudi and pop hits from Taylor Swift, crafts stop‑motion animations inspired by Pixar's Soul
    using Scratch, and participates in school drama productions that echo the humor of Jim Carrey, all of which fuel their creative confidence.
  travel: Robert Moseley prefers family‑oriented trips that mix adventure and relaxation, such as weekend camping at Shenandoah National Park, day hikes on the Blue Ridge segment of the Appalachian Trail,
    and a summer visit to Washington, D.C.’s Smithsonian museums, planning each outing with a detailed checklist while still leaving room for spontaneous treasure‑hunt challenges on the trail.
  culinary: Robert Moseley enjoys classic kid‑friendly meals like pepperoni pizza and mac & cheese, experiments with homemade trail mix using almonds, dried cranberries, and pretzel sticks, and reluctantly
    eats broccoli unless it’s hidden in a cheesy casserole, showcasing a developing yet selective palate.
  core: Robert Moseley is a structured yet sociable 11‑year‑old who balances leadership on the soccer field and stage with a habit of over‑packing their backpack for every hike, a tendency to forget their
    inhaler until needed, and a relentless curiosity that fuels both coding adventures and community clean‑ups.
background:
  cultural: Robert is raised in Travelers Rest, a close‑knit town in the foothills of the Blue Ridge Mountains of South Carolina. His family's roots in the Greenville County area stretch back several generations,
    and they maintain traditions typical of the Southern Appalachian region, such as attending Sunday services at the local Methodist church, gathering for family barbecues, and participating in community
    festivals like the Travelers Rest Summer Festival. The culture emphasizes hospitality, respect for nature, and a strong sense of neighborhood, which is reflected in Robert’s involvement in school and
    local volunteer activities. While his upbringing is primarily shaped by the Southern United States, his household also values educational achievement and encourages curiosity through extracurricular
    pursuits.
