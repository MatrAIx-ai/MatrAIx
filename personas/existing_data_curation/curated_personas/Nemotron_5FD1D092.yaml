  career_goals: Robert dreams of a future where he can combine his love of structure with his sociable nature. He aspires to become a teacher or a community youth organizer, roles that would let him plan
    activities while interacting with and motivating peers. He also imagines himself as a future coach for a local sports team or a youth theater director, positions that blend leadership, organization,
    and performance. In the longer term, he hopes to contribute to his town’s annual festivals, perhaps as a volunteer coordinator or event planner.
