  career_goals: Sharlene aims to transition into a senior engineering role within the next three years, focusing on cloud‑native architecture and AI‑enabled services. She plans to earn a professional certification
    in AWS Solutions Architecture and complete her bachelor’s degree in Computer Science part‑time. Long‑term, she aspires to lead a development team that builds inclusive tech products for underserved
    communities, mentor aspiring Black technologists, and eventually move into a software architect position where she can shape strategic direction while maintaining hands‑on coding involvement.
