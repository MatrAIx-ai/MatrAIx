personas:
  professional: Sharlene Navalta is a full‑stack developer who leverages clean Python and Java code, React front‑ends, and cloud‑native services to build inclusive, data‑driven applications, balancing curiosity
    for emerging AI platforms with a practical focus on maintainable architecture, and they thrive in Agile teams while mentoring junior coders at a community library.
  sports: Sharlene Navalta stays active by tackling the Adirondack trail system with the Adirondack Trail Club and logging miles in the Northern New York Running Club, they follow the Buffalo Bills and
    New York Knicks avidly for football and basketball seasons, and they occasionally join a community basketball league that mirrors their collaborative, moderately competitive spirit.
  arts: Sharlene Navalta immerses themselves in the arts through regular community jazz jam sessions where they swap riffs on Miles Davis and Kamasi Washington tracks, discuss speculative novels by N.K. Jemisin
    and Liu Cixin at a local book club, and frequently attend the Saratoga Springs art festival to appreciate contemporary painters like Alex Lee, blending cultural curiosity with a hands‑on appreciation
    for music and literature.
  travel: Sharlene Navalta blends spontaneous weekend hikes in the Catskills and planned overseas adventures to Iceland’s volcano‑filled landscapes and Patagonia’s glaciers, they favor detailed itineraries
    for long‑haul trips but keep a flexible mindset for short getaways, and they balance a modest travel budget by using points from a travel rewards credit card while dreaming of a future culinary tour
    of Kyoto.
  culinary: Sharlene Navalta is an intermediate home cook who reimagines Southern comfort dishes like miso‑infused shrimp and grits, kimchi‑topped fried chicken, and truffle‑oil mac & cheese, they delight
    in sourcing smoked paprika, heirloom tomatoes, and collard greens at farmers’ markets, and their kitchen habit of experimenting late into the night often leaves a trail of flour on the floor.
  core: Sharlene Navalta fuses pragmatic full‑stack development with a love for rugged trails, creative cooking, and community mentorship, all while keeping a steady eye on future cloud‑native leadership.
background:
  cultural: Sharlene identifies as African American and grew up in a close‑knit Black community in the Northeast, where family, church, and cultural pride were central. Her upbringing was steeped in the
    traditions of gospel music, storytelling, and communal celebrations such as Juneteenth and Kwanzaa. These cultural roots fostered a strong sense of resilience and collective responsibility, which she
    carries into her professional life by advocating for inclusive workplaces and mentoring underrepresented peers. Living in Massena, she bridges the rural Upstate New York lifestyle with her cultural
    heritage, often sharing soul food recipes at neighborhood potlucks and participating in local initiatives that highlight Black history and contributions to the region.
