personas:
  professional: Kerry Pannunzio, a 41‑year‑old full‑stack product strategist, blends business acumen, agile leadership and a vivid artistic sensibility to design user‑centric digital experiences, leveraging
    Python, Tableau, and Scrum mastery while championing inclusive team cultures.
  sports: Kerry Pannunzio enjoys seasonal outdoor activity, joining the local Trailblazers Hiking Club for weekend treks in the Ozarks, cheering on the St. Louis Cardinals in baseball, and participating
    in a co‑ed adult softball league on summer evenings, while maintaining a habit of stretching after long coding marathons.
  arts: Kerry Pannunzio’s artistic life revolves around watercolor landscapes of the Ozark hills, abstract sculptures fashioned from reclaimed wood, and a devotion to bluegrass legends like Alison Krauss
    as well as speculative fiction authors such as N. K. Jemisin, which together fuel their weekly contributions to the town’s maker space gallery and a curated Instagram feed of candid street photography.
  travel: Kerry Pannunzio prefers road‑trip adventures that combine scenic drives and cultural immersion, having mapped out a favorite loop through Asheville, NC, Austin, TX, and Santa Fe, NM, and dreaming
    of a future retreat in Kyoto’s bamboo forests and the Scottish Highlands, which they plan meticulously using budget‑tracking spreadsheets.
  culinary: Kerry Pannunzio’s palate blends Southern comfort with experimental twists, cooking shrimp and grits with smoked pecan topping, perfecting a caramelized okra relish, and mastering a rosemary‑infused
    peach cobbler, while their modest garden supplies heirloom tomatoes and chilies for impromptu farm‑to‑table meals.
  core: Kerry Pannunzio is a creatively driven product strategist who balances meticulous planning with spontaneous art, worries about deadlines but channels that energy into vivid watercolor dashboards.
background:
  cultural: Kerry grew up in a white, Southern‑midwestern family in Arkansas, where hospitality, close‑knit community ties, and a respect for tradition were everyday values. Her upbringing exposed her to
    regional folk art, bluegrass music, and seasonal community events, fostering an appreciation for local culture. While she embraces these roots, her graduate business education and tech career have broadened
    her worldview, encouraging progressive attitudes toward diversity and inclusion. This blend of Southern warmth and modern professional ambition shapes her identity, informing both her collaborative
    work style and her commitment to fostering supportive, innovative environments.
