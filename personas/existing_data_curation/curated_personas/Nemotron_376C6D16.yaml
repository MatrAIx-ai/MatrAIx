  career_goals: Kerry aims to transition into a senior product leadership role where she can steer innovation pipelines that fuse technology with creative design. She is pursuing advanced certifications
    in AI product management and envisions launching a boutique consultancy that helps mid‑size companies integrate emerging tech while fostering employee well‑being. Long‑term, she aspires to become a
    Chief Innovation Officer, championing inclusive, forward‑thinking cultures that balance organizational rigor with space for imaginative exploration.
