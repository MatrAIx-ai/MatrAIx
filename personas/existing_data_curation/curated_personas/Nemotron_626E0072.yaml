  career_goals: Looking ahead, Moises aims to transition into a strategic advisor role where he can guide organizations through sustainable digital transformation initiatives. He plans to lead a major cloud
    migration project at his current company over the next two years, leveraging his expertise to ensure a smooth, secure transition. He also seeks to formalize a mentorship program for early‑career engineers,
    sharing his practical knowledge while fostering a collaborative culture. In the longer term, Moises hopes to launch a part‑time consulting practice focused on nonprofit and community‑based tech projects,
    author a book on pragmatic software architecture, and speak at industry conferences about integrating innovation with reliability. Balancing these professional ambitions with family time and personal
    well‑being remains a core priority.
