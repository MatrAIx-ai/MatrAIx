personas:
  professional: Rene Mayorga, a seasoned electrical and electronics engineer with four decades of experience in power-distribution, low-voltage building design, and industrial automation, blends rigorous
    standards compliance with a skeptical, iterative design mindset while mentoring junior engineers and channeling creative curiosity into part-time sustainable-energy consulting for Montgomery County
    municipalities, and they often approach each project as both a technician and an artist.
  sports: Rene Mayorga, an avid walker who trails the Rock Creek Park paths and plays occasional senior tennis at the Montgomery County Community Center, follows the Washington Capitals and DC United, belongs
    to a local hiking club, and they prefer solitary exercise over large-group sports.
  arts: Rene Mayorga, a dedicated analog photographer and guitarist who curates community art exhibitions, collects traditional folk recordings, admires modernist painters such as Diego Rivera and Frida
    Kahlo, and restores vintage audio equipment for high-fidelity listening, infuses their creative life with a deep appreciation for visual and musical heritage, and they often blend technical precision
    with artistic spontaneity.
  travel: Rene Mayorga, a flexible traveler who revisits El Salvador to reconnect with family and tradition, then explores historic art capitals like Barcelona and the Loire Valley, prefers planning trips
    on short notice using senior discounts and a well-worn camera bag, dreams of a scenic road trip along the Pacific Coast, and they relish documenting each journey with analog photographs.
  culinary: Rene Mayorga, a modest home chef who cultivates herbs such as cilantro, oregano, and native epazote, enjoys preparing herb-infused pupusas and citrus-marinated grilled fish, relishes sipping
    freshly brewed coffee while pairing meals with a selection of local craft beers, and they often experiment with new spice blends inspired by family recipes.
  core: Rene Mayorga, a curious yet delightfully disorganized engineer-artist who lives at the intersection of circuitry and camera lenses, constantly balancing meticulous documentation with spontaneous
    creative projects, and they thrive on the tension between order and improvisation.
background:
  cultural: Rene was born in San Salvador and moved to the United States with his parents as a child, growing up in a close‑knit Salvadoran community in the Washington, DC metropolitan area. The values
    of family solidarity, respect for tradition, and a strong work ethic were instilled early, as were the rhythms of Salvadoran folk music, the aroma of pupusas, and the colorful tapestry of traditional
    celebrations such as Las Festas de San Salvador and Semana Santa. Bilingual in Spanish and English, he maintains daily use of Spanish at home and actively participates in local Salvadoran cultural societies,
    helping organize festivals and youth outreach programs. While his professional life has been shaped by the American engineering landscape, his cultural identity remains a source of inspiration, influencing
    his appreciation for vibrant visual arts, community‑focused projects, and his desire to give back to the Latino community through mentorship and cultural preservation.
attributes:
  skills: '[''Power distribution system design'', ''Low‑voltage building electrical design'', ''Industrial automation and PLC programming'', ''Embedded systems development (C, Python, Assembly)'', ''Circuit
    simulation (MATLAB/Simulink, SPICE)'', ''PCB layout and design (Altium Designer, KiCad)'', ''Renewable energy integration (solar PV, wind)'', ''Smart‑grid and IoT device integration'', ''Technical standards
    compliance (NEC, IEC)'', ''Project lifecycle management'', ''Technical documentation and report writing'', ''Mentoring and coaching junior engineers'', ''Critical problem solving and analysis'', ''Audio
    engineering and high‑fidelity sound system design'']'
  hobbies: '[''Analog photography and digital photo editing'', ''Playing guitar and collecting Salvadoran folk music'', ''Reading art history, especially Latin American modernism'', ''Building and restoring
    vintage audio equipment'', ''Participating in small community art exhibitions'', ''Volunteering as a STEM mentor for Latino youth'', ''Gardening (herbs and native plants)'', ''Playing chess'', ''Traveling
    to El Salvador to reconnect with family and culture'', ''Woodworking and custom furniture making'', ''Listening to classical and jazz music'', ''Attending intimate live music performances'']'
  career_goals: Rene aims to channel his extensive engineering background into a part‑time consultancy focused on sustainable energy solutions for local municipalities and small businesses in the Montgomery
    County area. He hopes to mentor the next generation of Latino engineers through scholarships, workshops, and hands‑on project guidance at community centers. A longstanding ambition is to author a textbook
    that blends power‑system engineering with interdisciplinary perspectives on art and design, reflecting his belief that technical and creative thinking reinforce each other. Additionally, he dreams of
    designing an interactive light‑and‑sound installation for a Salvadoran cultural hub in Washington, DC, merging his technical expertise with his appreciation for visual and musical arts.
