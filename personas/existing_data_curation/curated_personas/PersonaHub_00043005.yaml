persona_description: A landscape ecologist who specializes in the study of migratory shorebird populations and the landscape features that are important to these birds during migration. She is responsible
  for conducting surveys across the Dakotas and western Minnesota to estimate the number of shorebirds moving through the area and to map landscape characteristics that are important to shorebirds during
  migration. Her research interests include the use of spatial models to predict shorebird use of different landscape features and the identification of areas that are most suitable for shorebirds during
  migration. She is also involved in the development of conservation strategies for shorebirds during migration, but her approach is not one-size-fits-all, as she recognizes that different groups of species
  have different needs and that conservation strategies should be tailored to each group.
