personas:
  professional: Jasmin Vargascruz is a network and systems administrator who leverages meticulous documentation, scripting prowess, and a curiosity for innovative cloud solutions to design resilient LAN/WAN
    architectures while navigating the occasional stress of tight deadlines with a measured, organized approach that they apply to both work and personal projects.
  sports: Jasmin Vargascruz enjoys early‑morning jogs through Central Park, attends weekly yoga sessions at a boutique studio, plays recreational tennis at the Manhattan Tennis Club, and follows the New
    York Knicks, New York Yankees, and New York Rangers, cheering for them on game nights while they maintain a casual, stress‑relieving approach to fitness.
  arts: Jasmin Vargascruz immerses herself in the Manhattan art scene, regularly attending openings featuring works by artists such as Ai Weiwei and Yayoi Kusama, while honing her watercolor technique inspired
    by contemporary painter Kehinde Wiley and capturing urban street life through a lens that echoes the gritty aesthetic of photographer Nan Goldin, a practice they find both therapeutic and creatively
    stimulating.
  travel: Jasmin Vargascruz prefers thoughtfully planned getaways that balance cultural immersion with quiet reflection, having spent recent trips exploring the historic streets of Boston, the island vineyards
    of the Hudson Valley, and the serene temples of Kyoto, Japan, while a future wish list includes a solo photography expedition to the misty cliffs of the Scottish Highlands, a journey they hope to embark
    on within the next two years.
  culinary: Jasmin Vargascruz approaches cooking as a creative laboratory, skillfully preparing heritage island dishes like mofongo with chicharrón and sofrito alongside modern fusion plates such as miso‑glazed
    salmon with plantain purée, relishing the aroma of garlic, cumin, and fresh cilantro as they host intimate dinner gatherings for friends, though they sometimes over‑season dishes in the pursuit of bold
    flavors.
  core: Jasmin Vargascruz is a curious, art‑loving network specialist who balances meticulous work habits with an occasional tendency to over‑worry, finds solace in solitary photography walks, but can’t
    resist late‑night binge‑watching tech talks, a quirk they label as a necessary unwind.
background:
  cultural: Jasmin’s cultural roots are firmly grounded in her Puerto Rican heritage. Raised in a bilingual household, she grew up speaking both Spanish and English, absorbing family stories of island traditions
    and values such as resilience, community, and celebration of music. Living in Forest Hills, Queens, she is part of a vibrant Puerto Rican diaspora that maintains strong ties to the island through festivals
    like the Noche de San Juan, salsa dancing, and communal gatherings at local bodegas and cultural centers. Her culinary preferences reflect this blend, often preparing arroz con gandules, mofongo, and
    lechón while also exploring contemporary twists. The multicultural environment of New York City has broadened her outlook, allowing her to integrate Caribbean rhythms with the city’s diverse artistic
    scene, fostering a hybrid identity that honors her ancestry while embracing the dynamic, cross‑cultural fabric of Queens.
attributes:
  skills: '["Network architecture design", "Cisco and Juniper router/switch configuration", "Windows Server administration", "Linux (Ubuntu, CentOS) server management", "Virtualization with VMware and Hyper‑V",
    "Hybrid cloud integration (Azure, AWS)", "PowerShell and Bash scripting for automation", "Network security (firewall rule sets, VPNs)", "IT asset management and procurement", "Budget planning and cost
    optimization", "Vendor relationship management", "ITIL service management processes", "Technical documentation and SOP creation", "User support and troubleshooting", "Project coordination for small
    IT initiatives"]'
  hobbies: '["Watercolor painting", "Street photography", "Visiting contemporary art galleries", "Cooking Puerto Rican and fusion cuisine", "Mindfulness meditation", "Yoga", "Reading (technology nonfiction,
    literary fiction, art history)", "Journaling", "Small‑group tech meetups", "Volunteering at local Puerto Rican cultural center", "Walking in parks and nature trails"]'
  career_goals: 'Jasmin aims to progress from her current administrator role to a senior network engineer or IT manager position within the next five years, overseeing larger infrastructure projects and
    guiding strategic cloud migration initiatives for mid‑size enterprises. She plans to earn advanced certifications such as Cisco CCNP, Microsoft Certified: Azure Solutions Architect, and eventually a
    CISSP to deepen her security expertise. Her ambition includes shaping IT policies that balance operational efficiency with innovative solutions, mentoring junior staff, and eventually leading a technology
    consultancy that merges her business acumen with a passion for creative problem‑solving. She also seeks to integrate her appreciation for art and design into user experience initiatives, championing
    aesthetically thoughtful digital environments.'
