  hobbies: '["Woodworking", "Gardening", "Reading local history and genealogy", "Walking/hiking on nature trails", "Birdwatching", "Fishing", "Community theater outings", "Chess club participation", "Cooking
    traditional family recipes"]'
  career_goals: Although retired from formal employment, Oleg aims to channel his expertise into legacy projects. He plans to write a memoir that captures his family’s post‑war immigrant experience and
    the evolution of his Midwestern community. He also aspires to complete a custom wooden shed for the local community garden, mentor a small group of apprentices in woodworking, and undertake a short
    trip to his ancestral region in Eastern Europe to connect with his roots. Maintaining his health and independence so he can continue contributing to neighborhood initiatives remains a core personal
    ambition.
