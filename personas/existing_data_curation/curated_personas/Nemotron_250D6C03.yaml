    ''Calm, empathetic communication under pressure'', ''Adaptability and rapid problem‑solving'']'
  hobbies: '[''Urban sketching and drawing'', ''Street photography and photo editing'', ''Reading speculative fiction and philosophy'', ''Creative writing (poetry and flash fiction)'', ''Listening to ambient,
    jazz, and experimental electronic music'', ''Meditative nature walks in Forest Park'', ''Tinkering with vintage analog radios'', ''Visiting quiet art exhibitions featuring Black artists'', ''Collecting
    vinyl records'', ''DIY bike maintenance'']'
  career_goals: Dennis aims to leverage his hands‑on driving experience into a logistics leadership role where he can design more efficient, environmentally‑friendly delivery networks. He plans to obtain
    a Commercial Driver’s License (CDL) with advanced endorsements and pursue a certification in supply‑chain management within the next two years. Parallel to his career, he hopes to grow a side venture
    as a visual storyteller, publishing photo essays and short videos that capture the rhythm of the road and the hidden corners of the Pacific Northwest. Ultimately, he envisions a position that blends
    operational oversight with creative content production, allowing him to work autonomously while contributing innovative ideas to his company.
