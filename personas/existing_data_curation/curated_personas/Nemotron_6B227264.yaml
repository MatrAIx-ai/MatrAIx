personas:
  professional: Maria Jaime, an aspiring junior engineer, merges a love for constructing intricate LEGO models with a disciplined, notebook‑driven approach, turning curiosity into systematic experimentation
    while holding herself to high standards even in play.
  sports: Maria Jaime cheers for the local youth soccer team, the Oakwood Tigers, participates in a weekend gymnastics class at Tiny Gymnastics Club, and enjoys nature walks in the neighborhood park where
    she often spots squirrels and practices balancing on logs.
  arts: Maria Jaime fills her sketchbook with vibrant drawings inspired by the whimsical world of Dr. Seuss, the bright colors of Pixar’s animated films, and the rhythmic energy of Lin‑Manuel Miranda’s
    musical sketches, while also dancing to the upbeat beats of contemporary pop stars like Selena Gomez.
  travel: Maria Jaime loves meticulously planning family trips, favoring adventures like a weekend hike at Pine Creek State Park and a sunny beach day at Clearwater Shores, while dreaming of an overseas
    excursion to the Eiffel Tower in Paris and a safari in Kenya, balancing curiosity with the practical need for parental approval and a budget‑friendly itinerary.
  culinary: Maria Jaime delights in helping prepare simple dishes such as tacos with seasoned ground beef, fresh guacamole made from ripe avocados and cilantro, and baked empanadas stuffed with cheese and
    spinach, while also experimenting with fruit salads featuring mango and kiwi, showing a budding kitchen confidence despite occasional spills.
  core: Maria Jaime is a remarkably organized eight‑year‑old whose curiosity fuels endless LEGO creations, disciplined savings habits, and a calm resilience that makes her the go‑to problem‑solver in her
    family, even if she sometimes forgets to brush her teeth after a marathon building session.
background:
  cultural: Maria comes from a Mexican‑American family that speaks both Spanish and English at home. She grows up celebrating Latino traditions such as Día de los Muertos, Cinco de Mayo, and Nochebuena,
    enjoys music like mariachi and salsa, and participates in community events hosted by the local Hispanic cultural center in Deland, Florida. These cultural experiences shape her values of family, respect,
    cooperation, and a love for sharing her heritage with friends.
