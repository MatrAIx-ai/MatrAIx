persona_description: A veterinary scientist who specializes in the study of inherited diseases in dogs, particularly miniature poodles, and has conducted research to identify the breeds with the highest
  risk of welfare problems due to inherited diseases. His expertise lies in the analysis of published literature and the identification of breeds with the greatest cumulative impact on the welfare of dogs.
  He has presented his findings at conferences and is actively involved in the development of strategies to improve the health and welfare of miniature poodles and other breeds with high-risk inherited
  diseases.
