  hobbies: '[''Basketball'', ''Spin and boot‑camp classes'', ''Hiking'', ''Live music events'', ''Food exploration with friends'', ''Business and retail innovation books'', ''Retail industry podcasts'',
    ''Mindfulness meditation'']'
  career_goals: Craig aims to leverage his organized, methodical approach to climb the retail hierarchy while satisfying his curiosity about emerging business technologies. In the next two years he plans
    to be promoted to store manager, then advance to district manager within a regional chain. He intends to earn a professional retail management certification and enroll in an MBA program focused on operations
    and strategy. Long‑term, he envisions a senior operations role at a national retailer or launching his own boutique retail concept that integrates omnichannel technology and community‑focused experiences.
    Throughout these steps, he seeks structured milestones and mentorship opportunities to keep stress manageable and progress measurable.
