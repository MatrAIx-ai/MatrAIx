personas:
  professional: Craig Clevenger, a 28-year-old retail manager, blends their methodical scheduling expertise, loss-prevention acumen, and data-driven sales analytics with an energetic, sociable leadership
    style to streamline store operations, train frontline teams, and pioneer emerging POS technologies like Lightspeed, all while meticulously tracking performance metrics to satisfy their curiosity and
    keep stress in check.
  sports: Craig Clevenger, an energetic 28-year-old who thrives on group competition, dominates pickup basketball games at the local gym, powers through spin classes at NJ Cycle Lab, pushes limits in boot-camp
    sessions with Watchung Fitness Club, hikes the trails of Watchung Reservation every weekend, and fervently roots for the New York Knicks and Brooklyn Nets during NBA season, channeling their anxiety
    into disciplined training.
  arts: Craig Clevenger, a devoted live-music enthusiast, frequently grabs tickets to indie rock shows by The Strokes at Newark's Prudential Center and soulful performances by H.E.R. at New York's Bowery
    Ballroom, while also collecting limited-edition prints by street artist Shepard Fairey and attending quarterly exhibitions at the Montclair Art Museum, feeding their passion for visual storytelling.
  travel: Craig Clevenger, a weekend-road-trip aficionado, recently trekked the Blue Ridge Parkway and explored Asheville's farm-to-table scene, regularly plans day trips to nearby Philadelphia and Washington,
    D.C., and harbors a bucket-list ambition to experience Barcelona's tapas bars and Dublin's traditional music pubs—all while calibrating travel expenses to preserve their savings for an MBA program.
  culinary: Craig Clevenger, who rides the wave of culinary curiosity, delights in tasting Korean-style tacos smothered in kimchi and sriracha from a Queens food-truck, hones an intermediate skill set by
    crafting spicy ramen with miso paste at home, and loves to host brunches featuring avocado toast crowned with smoked salmon and capers for friends, indulging their curiosity for new taste experiences.
  core: Craig Clevenger, the data-driven retail professional who wrestles with perpetual worry, transforms anxiety into high-energy workouts, spontaneous food-truck outings, and disciplined budgeting, yet
    occasionally overcommits socially and lets sleep slip when an emerging business trend beckons, leaving them to replay the day's data-driven decisions long after lights out.
background:
  cultural: Craig was raised in a middle‑class, suburban New Jersey family of European descent, where core American values of self‑reliance, hard work, and community participation were emphasized. His upbringing
    featured traditional celebrations of holidays such as Thanksgiving, the Fourth of July, and Christmas, as well as involvement in local youth sports leagues. Living in the diverse Essex County area exposed
    him to a mosaic of cultures—Hispanic, Asian, and African‑American communities—shaping an openness to different perspectives and consumer habits. This blend of conventional Mid‑Atlantic culture and metropolitan
    multicultural exposure informs his personal and professional worldview.
attributes:
  skills: '[''Retail team leadership'', ''Staff scheduling'', ''Customer service excellence'', ''Inventory management'', ''Loss prevention'', ''Point‑of‑sale system operation'', ''Sales data analysis'',
