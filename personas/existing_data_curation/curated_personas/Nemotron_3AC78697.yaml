personas:
  professional: Carla Marlowe is a seasoned solar photovoltaic installer who blends technical precision in wiring, conduit work, and system commissioning with a curiosity for artistic design, leading small
    crews on residential projects while coordinating permits and patient customer communication, and they are on track to earn NABCEP certification within two years.
  sports: Carla Marlowe is an avid mountain‑bike enthusiast who rides with the Wasatch Trail Riders club, hikes the Uintah Basin peaks each summer, supports the Utah Jazz and Real Salt Lake, and they incorporate
    weekly strength‑training sessions to counterbalance the physical toll of her outdoor adventures.
  arts: Carla Marlowe channels her love for the rugged landscape into watercolor paintings inspired by Albert Bierstadt, plays acoustic guitar at gatherings where she covers John Denver and Bob Dylan, and
    co‑hosts the community "Art & Sun" workshop that fuses solar technology with the sculptural sensibilities of Ruth Asawa and Indigenous‑inspired beadwork motifs.
  travel: Carla Marlowe plans her travel around weekend road trips to iconic sites like Moab’s Arches National Park, dreams of trekking Patagonia’s Torres del Paine after saving for a long‑haul flight,
    and they select destinations that offer both breathtaking peaks for photography and opportunities to study indigenous architecture.
  culinary: Carla Marlowe enjoys cooking hearty mountain fare such as bison chili with smoked chipotle, a roasted beet and goat cheese salad drizzled with local honey, and a creamy huckleberry jam she spreads
    on fresh sourdough, while they also seek out farm‑to‑table eateries that feature heirloom quinoa bowls.
  core: Carla Marlowe blends pioneer self‑reliance with artistic curiosity, balancing a rigorous solar‑install career with spontaneous hikes, brushstrokes at sunrise, and a habit of over‑committing to community
    projects, and they often forget to charge their phone before a shoot.
background:
  cultural: Carla grew up in a multigenerational white family rooted in rural Utah, where pioneer values of self‑reliance, community cooperation, and stewardship of the land are deeply ingrained. Her upbringing
    in Altamont exposed her to the traditions of the American West, including respect for the surrounding mountain environment and the heritage of the Ute and Navajo peoples, which she honors through her
    appreciation of indigenous art forms. This blend of frontier resilience, a strong work ethic, and an emerging commitment to sustainability shapes her worldview and everyday practices.
attributes:
  skills: '[''Solar PV system installation'', ''Electrical wiring and conduit work'', ''Schematic interpretation and troubleshooting'', ''Roof safety and fall protection compliance'', ''Battery storage
    integration'', ''Inverter and micro‑inverter diagnostics'', ''Permit acquisition and code compliance'', ''Customer site assessment and communication'', ''Project scheduling and documentation'', ''Team
    coordination and conflict resolution'', ''Custom mounting solutions for unconventional sites'', ''Basic carpentry and structural reinforcement'']'
  hobbies: '[''Hiking and mountain biking in Uintah mountains'', ''Nature and architectural photography'', ''Watercolor landscape painting'', ''Acoustic guitar playing at community events'', ''Participating
    in solar‑powered art workshops'', ''Volunteering at community garden'', ''Mentoring youth in renewable‑energy basics'', ''Attending regional craft and art fairs'']'
  career_goals: Carla aims to become a certified NABCEP PV Installation Professional within the next two years and transition into a project management role overseeing larger residential and community solar
    developments in the Uintah Basin. She envisions leading outreach programs that educate rural homeowners on renewable options, and eventually launching her own consultancy to design and implement sustainable
    energy solutions tailored to Utah’s mountainous terrain. Her long‑term ambition includes influencing local policy to support broader adoption of clean energy in Duchesne County.
