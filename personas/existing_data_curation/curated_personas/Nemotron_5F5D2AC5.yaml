personas:
  professional: Carolyn White, a seasoned marketing strategist with a STEM graduate background, blends data‑driven analytics (SQL, Python, advanced Excel) and a warm, community‑focused storytelling style
    to lead integrated campaigns, while their relaxed approach to deadlines and occasional disorganization keep the team agile and creative, and they value flexibility over strict planning.
  sports: Carolyn White cheers for the New Orleans Saints and follows LSU Tigers football while participating in a local kayaking club on Lake Pontchartrain and playing in a neighborhood co‑ed softball
    league, balancing a love of community sports with a yoga routine that satisfies their desire for low‑impact fitness despite occasional missed sessions, and they enjoy the camaraderie of weekend team
    socials.
  arts: Carolyn White frequents live jazz at Preservation Hall and zydeco nights at the Birch Coulee Club, often discovering emerging local artists such as saxophonist Kipp Whitaker and zydeco group The
    Savoy Maids, and they express creativity through weekly pottery classes, letting their curiosity and practicality meld in both listening and making art.
  travel: Carolyn White prefers relaxed weekend getaways to destinations like the historic French Quarter of New Orleans, the serene beaches of Gulf Shores, and the pine‑covered hills of Asheville, planning
    trips loosely to accommodate spontaneous detours and family visits while their budgeting app tracks expenses for a future cruise along the Mississippi River, and they look forward to a leisurely river
    voyage next summer.
  culinary: Carolyn White delights in cooking crawfish étouffée, jambalaya, and homemade beignets, seasoning dishes with garden‑fresh thyme and bay leaves, while their culinary skill ranges from confident
    stovetop simmering to occasional over‑salting, and they take pride in sharing these dishes with friends, reflecting both a love for Cajun comfort food and a willingness to experiment.
  core: Carolyn White is a data‑driven marketer who infuses Southern hospitality into purpose‑centric campaigns, balances meticulous analysis with a laid‑back lifestyle that includes spontaneous culinary
    splurges, yoga, and an occasional forgetful moment, and they keep life lively with their quirky blend of precision and flexibility.
background:
  cultural: Carolyn is a White American who grew up in the Deep South and now lives in Mandeville, Louisiana. Her upbringing was shaped by Southern hospitality, a strong sense of community, and a love for
    regional food and music. She earned her STEM graduate degree at Louisiana State University, which gave her a solid analytical foundation that she applies to her marketing career. She participates in
    local festivals such as Mardi Gras parades, enjoys the culinary traditions of Cajun and Creole cuisine, and is active in her church and neighborhood volunteer initiatives, reflecting a blend of modern
    professional ambition with traditional Southern cultural values.
attributes:
