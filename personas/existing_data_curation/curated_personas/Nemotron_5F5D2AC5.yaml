  career_goals: Carolyn aspires to become a regional Director of Marketing, overseeing multi-market brand initiatives that fuse data-driven insights with community-focused storytelling. She aims to champion
    purpose-centric campaigns that support local charitable causes in Mandeville and the Gulf Coast, while driving measurable growth for her organization. Over the next five years she plans to lead digital
    transformation projects, mentor emerging marketers, and secure a seat on the executive leadership team to shape strategic direction and sustainability.
