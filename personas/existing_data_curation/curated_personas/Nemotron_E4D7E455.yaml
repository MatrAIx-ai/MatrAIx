personas:
  professional: Scott Helwig, a budding architect‑in‑training, channels their love for building forts and Minecraft into sketching detailed structures, blending curiosity with practicality while often leaving
    their blueprints strewn across the living room, reflecting their relaxed, disorganized approach.
  sports: Scott Helwig cheers for the Butte Copper Kings baseball team and the Montana Grizzlies football squad, spends weekends climbing trees and sprinting along creek trails, and belongs to a local youth
    nature club that organizes solo weekend hikes, preferring challenges over team games.
  arts: Scott Helwig spends afternoons drawing panoramic sketches of the Rocky Mountains and listening to folk‑bluegrass tunes by Bill Monroe, while devouring adventure novels like Hatchet, letting vivid
    stories fuel their imaginative fort designs.
  travel: Scott Helwig dreams of backpacking to Glacier National Park and has already camped at Yellowstone with their family, favoring rugged self‑guided hikes over organized tours, and their wish list
    includes a summer trek to Banff, where they plan to map the terrain in a notebook.
  culinary: Scott Helwig favors hearty meals such as beef stew with potatoes and homemade baked beans, enjoys snacking on trail mix with dried berries and peanuts, and loves making s'mores over a campfire,
    though they often attempt to bake rocky road cookies with limited success.
  core: Scott Helwig is a solitary, curiosity‑driven seven‑year‑old who builds forts, sketches mountains, saves coins in a mine‑cart piggy bank, battles allergies, and dreams of rugged adventures, all while
    juggling a relaxed, occasionally disorganized lifestyle.
background:
  cultural: Scott grew up in a small mining‑town community in Butte, Montana, where generations of families have worked in the copper mines. His family's roots trace back to German‑American settlers who
    arrived in the early 1900s. He was raised with a mix of Protestant Sunday school teachings and community traditions such as the annual Butte Heritage Days. The region’s emphasis on self‑reliance, respect
    for the outdoors, and the legacy of the labor movement shapes his sense of identity.
attributes:
  skills: '[''Digital tablet navigation'', ''LEGO construction'', ''Basic reading comprehension'', ''Simple arithmetic'', ''Nature observation'', ''Trail mapping'']'
  hobbies: '[''Exploring woods'', ''Rock collecting'', ''Fort building'', ''Minecraft'', ''Reading adventure books'', ''Sketching landscapes'']'
  career_goals: Scott dreams of one day becoming a wildlife biologist or a mining geologist, inspired by the mineral‑rich landscape around Butte. He imagines working in a quiet field lab, analyzing rock
    samples and observing animal behavior. In the near term, he aims to win school science fairs, earn a badge in the Boy Scouts for wilderness survival, and become the top scorer in his class’s math challenges.
