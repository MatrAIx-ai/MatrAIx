    initiatives'', ''Evidence‑based literature review'', ''Cultural competence in patient care'']'
  hobbies: '[''Reading science‑fiction'', ''Medical case study review'', ''Playing saxophone'', ''Small‑group jazz jam sessions'', ''Arduino electronics projects'', ''Home gadget repair'', ''Basketball
    (watching and occasional play)'', ''Hiking Milwaukee County parks'', ''Fishing trips'', ''Cooking soul‑food recipes'', ''Community health volunteer work'']'
  career_goals: Erik aims to specialize in emergency medicine as a physician assistant, with a focus on underserved neighborhoods in Milwaukee where health disparities persist. He plans to obtain advanced
    certifications (e.g., Certified Emergency Nurse, ACLS instructor) and pursue a master's degree in public health to deepen his understanding of community health dynamics. Long‑term, Erik hopes to become
    a clinical educator and preceptor for PA students, establishing a mentorship pipeline for future clinicians from underrepresented backgrounds. He also envisions leading a community outreach program
    that integrates preventive care education, mobile health clinics, and culturally tailored health interventions to improve outcomes for the local Black community.
