personas:
  professional: Erik Hesley, a 25‑year‑old physician assistant in emergency care, blends meticulous diagnostic skill with hands‑on curiosity, leveraging their comfort with electronic health records and
    their assertive yet compassionate bedside manner to adapt protocols on the fly while mentoring younger staff.
  sports: Erik Hesley, an avid fan of the Milwaukee Bucks and a regular participant in the local park’s recreational basketball league, maintains their fitness through early‑morning jogs at Grant Park and
    weekend fishing trips, while balancing their love of team spirit with a disciplined routine of weekly strength training.
  arts: Erik Hesley, a reserved saxophonist who finds solace in late‑night practice sessions, draws inspiration from Miles Davis, John Coltrane, and local jazz legend Buddy Williams, and channels their
    sci‑fi imagination into original improvisations that blend classic bebop with futuristic soundscapes.
  travel: Erik Hesley, a budget‑conscious explorer who plans trips around long‑weekend breaks, has already trekked the Badlands, soaked in the blues of New Orleans, and dreams of a cultural immersion tour
    of Ghana, all while juggling their rotating ER schedule and family commitments.
  culinary: Erik Hesley, a home‑cooking enthusiast, perfects soul‑food staples such as collard greens simmered with smoked turkey, catfish po’boys, and sweet potato pie, while experimenting with adding
    jalapeño‑infused cornbread and occasionally swapping out traditional ingredients for quinoa to boost nutrition.
  core: Erik Hesley, a pragmatic 25‑year‑old who balances a relentless work ethic with a love for solo sax sessions, occasional gadget‑repair side gigs, and a habit of forgetting to eat lunch during night
    shifts, embodies disciplined ambition tinged with a quiet, reflective soul.
background:
  cultural: Erik grew up on Milwaukee's South Side, a historically Black neighborhood rich in cultural heritage and community solidarity. His family instilled strong values of self‑reliance, education,
    and service to others, reinforced by regular church involvement and participation in local festivals celebrating African‑American music, art, and cuisine. The Midwestern work ethic combined with the
    resilience shaped by navigating systemic challenges contributes to his pragmatic outlook and dedication to community health. Erik maintains close ties with extended family and maintains traditions such
    as family Sunday meals and mentorship of younger relatives, fostering a sense of continuity and pride in his cultural roots.
attributes:
  skills: '[''Clinical assessment'', ''Physical examination'', ''Diagnostic interpretation'', ''Phlebotomy'', ''Wound care and suturing'', ''Minor surgical procedures'', ''Airway management and ACLS'',
