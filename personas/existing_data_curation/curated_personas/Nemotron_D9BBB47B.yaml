  hobbies: '[''Hiking'', ''Kayaking'', ''Cross-country skiing'', ''Photography'', ''Reading (science non-fiction, biographies)'', ''Yoga'', ''Mindfulness meditation'', ''Volunteer construction (Habitat
    for Humanity)'']'
  career_goals: Paula aims to earn her Professional Engineer (PE) license within the next two years and take on senior leadership roles overseeing large‑scale, climate‑resilient infrastructure projects
    in the Twin Cities. She aspires to become a recognized advocate for sustainable urban development, blending innovative materials and green design standards while maintaining cost‑effectiveness. Long‑term,
    she envisions establishing a consultancy that mentors emerging engineers and partners with community organizations to deliver equitable public works.
