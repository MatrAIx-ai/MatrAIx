personas:
  professional: Paula Robicheaux, a 28‑year‑old civil engineer in Minneapolis, blends analytical precision with a passion for sustainable design, leading cross‑functional teams on climate‑resilient infrastructure
    projects while they automate workflows with Python and champion LEED standards.
  sports: Paula Robicheaux enjoys cross‑country skiing in the winter, summer kayaking on Lake Minnetonka, and weekend hikes with the Twin Cities Hiking Club, while they cheer for the Minnesota Vikings,
    Minnesota Twins, and Minnesota Wild.
  arts: Paula Robicheaux captures the interplay of urban and wilderness light through photography inspired by Ansel Adams and the vivid colors of local painter Gretchen Zeh, while they unwind to Bon Iver’s
    indie folk melodies and attend performances at the Guthrie Theater featuring touring actors such as Lin‑Manuel Miranda.
  travel: Paula Robicheaux prefers meticulously planned eco‑friendly trips, having trekked the Canadian Rockies, explored Iceland’s volcanic landscapes, and visited Norway’s fjords, while they dream of
    a future pilgrimage to Patagonia’s Torres del Paine, always booking sustainable lodges and using public transit where possible.
  culinary: Paula Robicheaux enjoys cooking farm‑to‑table meals, often preparing wild‑rice soup with locally sourced mushrooms, roasted salmon with dill, and seasonal beet salad, while they treat a hearty
    Minnesota hotdish as comfort food and experiment with foraging for morel mushrooms each spring.
  core: Paula Robicheaux is a hyper‑organized, eco‑obsessed engineer who balances rigorous work schedules with weekend nature escapes, but secretly they hoard coffee coupons and cannot resist a good checklist.
background:
  cultural: Paula grew up in a Midwestern family with deep roots in French‑Canadian heritage, a lineage that values community, hard work, and modesty. Raised in the Minneapolis‑St. Paul area, she was immersed
    in the region's blend of progressive urban culture and close‑knit neighborhood solidarity. This background nurtured her cooperative yet assertive demeanor, encouraging her to balance compassion for
    others with personal ambition. The local emphasis on civic engagement and environmental stewardship has shaped her commitment to sustainable infrastructure and her participation in community volunteerism.
attributes:
  skills: '[''Structural analysis'', ''Site development'', ''Transportation planning'', ''AutoCAD Civil 3D'', ''Revit'', ''ArcGIS'', ''Python scripting'', ''Sustainable design (LEED)'', ''Project management'',
