personas:
  professional: Celina Villalobos, a retired bilingual elementary educator, leverages decades of classroom experience and a knack for designing culturally resonant curricula; they mentor new teachers and
    lead a community reading program for seniors, balancing methodical lesson planning with a relaxed, improvisational style that reflects a practical yet flexible approach to education.
  sports: Celina Villalobos enjoys low‑impact fitness by strolling the winding trails of the ABQ BioPark and cheering on the Albuquerque Isotopes baseball team, while also participating in a senior walking
    club that meets every Saturday; they value gentle exercise and community spirit despite a preference for structured, predictable activity.
  arts: Celina Villalobos finds solace in listening to classic boleros by Pedro Infante and lively mariachi recordings of Los Camperos, knitting while humming the tunes, and regularly attending local theatre
    productions of plays by Luis Valdez; they weave a lifelong appreciation for music, storytelling, and visual arts into their daily rhythm.
  travel: Celina Villalobos favours road trips to historic Southwest towns like Santa Fe and Taos, where they explore artisan markets and visit centuries‑old chapels, while also dreaming of a pilgrimage
    to the famed vineyards of the Central Valley in South America, balancing a love of structured itineraries with spontaneous detours for family reunions.
  culinary: Celina Villalobos delights in cultivating cilantro, oregano, and assorted chilies in their garden, then transforms them into aromatic pozole broth, smoky tamales wrapped in corn husks, and fresh
    salsa verde; they admit to over‑saltting dishes when experimenting with new spice blends, turning the kitchen into a fragrant laboratory of tradition and taste.
  core: Celina Villalobos blends disciplined routine with laid‑back charm, mentoring educators, tending herb gardens, and preserving beloved traditions while occasionally forgetting appointments and indulging
    in extra helpings of homemade tamales; they embody a resilient, cooperative spirit with a touch of healthy forgetfulness.
background:
  cultural: Celina grew up in a Mexican‑American household, speaking Spanish at home and English at school. She immigrated from a small town in Jalisco with her parents as a child, preserving strong ties
    to Mexican customs while embracing the multicultural fabric of New Mexico. Her Catholic faith, family gatherings centered around food, and celebrations of Día de los Muertos and Las Posadas shape her
    identity. In Albuquerque, she remains connected to the vibrant Hispanic community, contributing to cultural events and sharing her heritage with younger generations.
