  career_goals: While retired, Celina aims to stay active by volunteering as a mentor for younger teachers and leading a local bilingual reading program for seniors. She hopes to compile her family’s recipes
    into a small cookbook that celebrates Mexican heritage, and to document her life story for future generations. Another ambition is to coordinate an annual Día de los Muertos celebration at the senior
    center, ensuring the tradition remains vibrant in Albuquerque.
