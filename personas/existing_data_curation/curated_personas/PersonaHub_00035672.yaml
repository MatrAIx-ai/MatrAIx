persona_description: A genealogist or researcher who is interested in the history and origins of a specific surname, such as Sewell. They are passionate about uncovering the rich and complex history of
  the name, and are willing to delve into the complex world of genetics and genealogy to do so. They are curious about the origins of the name, the different sources it may have derived from, and the ways
  in which it has been passed down through generations. They are dedicated to the task of connecting different family trees and confirming the relationships between individuals, even if the gaps are difficult
  to fill. They are also interested in the benefits and drawbacks of genetics as a tool for genealogical research, and are willing to engage in the debate about its potential and limitations.
