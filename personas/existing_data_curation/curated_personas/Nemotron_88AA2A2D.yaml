personas:
  professional: Robert Broussard is a Boston‑based courier who combines an uncanny knack for navigating the city’s labyrinthine streets with calm, resilient problem‑solving, translating his hands‑on delivery
    experience and curiosity about sustainable logistics into a clear goal of becoming a logistics coordinator and eventually a fleet manager of bike‑centric, eco‑friendly services, and they approach each
    route with practical curiosity.
  sports: Robert Broussard rides a road bike with the Boston Bike Club three times a week, follows the Celtics and Bruins for the winter season, and joins a casual weekend pickup soccer league, reflecting
    a flexible yet consistent approach to staying fit, and they relish the camaraderie of group rides.
  arts: Robert Broussard captures Boston’s street life through a Leica M10, strums folk‑indie tunes by Sufjan Stevens and Iron & Wine at open‑mic nights, and immerses themselves in the works of authors
    like Liu Cixin and Octavia Butler, and they let the city’s visual and auditory textures shape their creative outlook.
  travel: Robert Broussard prefers spur‑of‑the‑moment weekend getaways, having cycled the historic Freedom Trail in Philadelphia, explored the coastal charm of Portland, Maine, and dreaming of biking the
    canals of Copenhagen, all while using budget‑friendly sites like Hostelworld and they keep trips flexible to accommodate their work schedule.
  culinary: Robert Broussard enjoys a moderate level of cooking, whipping up shrimp scampi with fresh garlic and lemon, savoring a classic New England clam chowder topped with crisp bacon, and regularly
    indulges in avocado toast with a sprinkle of chili flakes, while also loving a hearty bowl of pho with basil and lime, and they often experiment with fresh herbs like basil and cilantro.
  core: Robert Broussard is a laid‑back urban explorer who blends bike‑powered deliveries, folk guitar, and spontaneous street photography into a resilient, curiosity‑driven pursuit of sustainable logistics
    while occasionally neglecting organization and health stretches, and they keep a calm demeanor no matter the traffic.
background:
  cultural: Robert was raised in Newton, Massachusetts, within a middle‑class white family that traces its roots to French‑Canadian ancestors, a heritage reflected in his surname Broussard. His upbringing
    blends typical New England suburban values—community participation, appreciation for seasonal traditions like Thanksgiving and Fourth of July celebrations, and an emphasis on practical education—with
    an awareness of his francophone lineage, highlighted by occasional family trips to Quebec and involvement in local French‑Canadian cultural events. This combination fosters a pragmatic, curious outlook
    while maintaining a relaxed, resilient demeanor characteristic of his New England environment.
