  career_goals: Robert aims to move from his current courier role into a logistics coordinator position within a regional delivery firm, leveraging his on‑the‑ground experience to manage route planning
    and fleet scheduling. He plans to obtain a certification in supply chain management and ultimately become a fleet manager overseeing eco‑friendly, last‑mile delivery operations. In the longer term,
    he is interested in launching his own micro‑distribution service that prioritizes bike deliveries and sustainable practices, possibly partnering with tech‑driven logistics startups to integrate smart
    routing platforms.
