personas:
  professional: Francisco Betancourt, a 26‑year‑old fabricator‑artist, channels their boundless imagination into MIG/TIG welding, CNC programming, and kinetic sculptures, thriving on the competitive thrill
    of regional fabrication contests even as their relaxed, slightly disorganized workflow means they often juggle multiple projects and deadlines simultaneously.
  sports: Francisco Betancourt, a 26‑year‑old creative tinkerer, rolls with a local skateboarding crew at the municipal park, joins pickup basketball games at the community center, and fervently roots for
    the New England Patriots, the New York Knicks, and the Hartford Yard Goats, treating each session as a spontaneous break that they rarely schedule in advance.
  arts: Francisco Betancourt, a 26‑year‑old interdisciplinary creator, paints vibrant murals inspired by Día de los Muertos altars, designs kinetic metal‑plastic sculptures, and curates experimental electronic
    soundscapes featuring Aphex Twin, Oneohtrix Point Never, and Lila Downs, while regularly showcasing their work at the Yale University Art Gallery and local street‑art festivals.
  travel: Francisco Betancourt, a 26‑year‑old wanderer, prefers impulsive, budget‑friendly trips that blend art‑scene immersion with cultural rituals, having recently explored the vibrant murals of Oaxaca’s
    historic district, the street festivals of Barcelona, and Berlin’s techno clubs, while daydreaming about a DIY workshop retreat in Kyoto’s Fushimi district.
  culinary: Francisco Betancourt, a 26‑year‑old culinary experimenter, regularly prepares tamales al vapor, mole poblano, and chilaquiles topped with avocado and smoked paprika, while fusing them with unexpected
    ingredients like miso‑marinated pork and beet‑infused salsa, and often leaves the kitchen a messy battlefield of copper pots and scrap metal bits.
  core: Francisco Betancourt, a 26‑year‑old kinetic‑fabricator, darts between welding torches and sketchpads, thrives on competitive challenges yet habitually misplaces tools and postpones bill payments,
    channeling chaotic energy into vivid metal‑plastic art.
background:
  cultural: Francisco was raised in a bilingual Mexican‑American household in West Haven. His parents immigrated from Jalisco, and family gatherings are filled with música ranchera, Día de los Muertos altars,
    and homemade tamales. He grew up speaking both Spanish and English, which gave him a fluid cultural identity that he expresses through his art—mixing Mexican folk motifs with contemporary industrial
    aesthetics. He actively participates in the local Mexican community, volunteering at cultural festivals and teaching younger kids basic hand‑craft skills. The blend of his Mexican heritage and his life
    in Connecticut shapes his worldview, fostering a respect for tradition while fueling his appetite for novel, cross‑cultural expressions.
attributes:
  skills: '[''welding (MIG/TIG)'', ''CNC milling'', ''CNC turning'', ''plastic injection molding'', ''blueprint reading'', ''CAD sketching'', ''basic 3D modeling'', ''metal fabrication'', ''tool maintenance'',
    ''troubleshooting'', ''creative design conceptualization'']'
  hobbies: '[''sketching'', ''painting murals'', ''building kinetic sculptures'', ''experimental music listening'', ''generative visual art'', ''science‑fiction reading'', ''philosophy'', ''skateboarding'',
    ''basketball'', ''cooking Mexican cuisine'', ''Arduino tinkering'']'
  career_goals: He wants to become a recognized fabricator‑artist who can produce custom metal‑plastic installations for interior design and public art. He aims to earn a certified welder (AWS Level II)
    and a CNC programmer certification within the next two years. He hopes to save enough to open a modest studio in the New Haven area where he can take on both industrial contracts and commission avant‑garde
    art pieces. He is also interested in learning additive manufacturing (3D printing) to combine metal and polymer printing, and sees himself eventually leading a small team while maintaining the flexibility
    to pursue personal projects. His competitive streak fuels a desire to win regional fabrication contests and to have his work featured in local art galleries.
