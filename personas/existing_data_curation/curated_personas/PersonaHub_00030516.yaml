persona_description: A political scientist who specializes in studying the trends and dynamics of American society, particularly during the Gilded Age and the present era. They are interested in understanding
  the causes and effects of deep and accelerating inequality, political polarization, vitriolic public discourse, and the fraying social fabric. They are also keenly aware of the importance of public and
  private narcissism in shaping the current political and social landscape. They have a unique perspective on the role of history in shaping contemporary American society and how it can guide us towards
  a more communal and cooperative future.
