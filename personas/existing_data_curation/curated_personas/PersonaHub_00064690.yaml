persona_description: A Cornell astrophysicist and scientist who specializes in the detection and analysis of gravitational waves, particularly those predicted by Albert Einstein's general theory of relativity.
  His research has focused on validating the historic news of the first direct detection of gravitational waves, which he helped confirm through his work with the LIGO and Virgo group collaborations. He
  has been using supercomputers to solve Einstein's equations for black hole mergers for much of his career and has contributed to the Cornell work through his research on the simulation of extreme spacetimes
  (SXS) collaboration group.
