personas:
  professional: Thomas Phillip, a retired facilities manager for a Colorado Springs military installation, leverages his decades of mechanical and electrical expertise to design and build a self-sufficient
    guest cabin while mentoring teens in home repair, and they approach every project with the disciplined, organized mindset honed in the service community.
  sports: Thomas Phillip follows the Colorado Springs Switchbacks FC and the Denver Broncos, hikes the Trail Ridge Road each summer with a small group, participates in a local veterans’ softball league,
    and they favor steady cardio over high-intensity workouts, though their knees sometimes protest after long treks.
  arts: Thomas Phillip captures Colorado’s rugged beauty in black-and-white photographs inspired by Ansel Adams, listens to Brandi Carlile and the folk-rock duo The Lumineers while tending his garden, and
    they attend occasional community theater shows, despite a habit of preferring solitary pursuits.
  travel: Thomas Phillip enjoys planned road trips to high-altitude destinations like Rocky Mountain National Park and has a bucket-list visit to Iceland’s geothermal sites, balancing the adventure of backcountry
    hiking with the comfort of staying at family-run B&Bs, and they often bring his binoculars for birdwatching on the journey.
  culinary: Thomas Phillip favors farm-to-table meals featuring roasted heirloom carrots, quinoa-wild rice salads with local trout, and a signature Colorado lamb stew seasoned with rosemary and sage, and
    they are comfortable experimenting with fermentation but occasionally over-salt their soups.
  core: Thomas Phillip blends Midwestern practicality with Colorado frontier independence, turning disciplined, detail-oriented habits into a lifelong quest for self-sufficiency, community mentorship, and
    quiet mastery of both tools and terrain.
background:
  cultural: Thomas grew up in a middle-class, Anglo-American family in the Midwest, with deep ties to farming and community values. In his early adulthood he relocated to Colorado, where he spent his career
    maintaining facilities for a nearby military installation near Colorado Springs. The region's outdoor lifestyle, the disciplined ethos of the military community, and his heritage of self-reliance and
    practicality have shaped his worldview. He identifies as a white American whose cultural identity blends Midwestern roots, Colorado's frontier appreciation for independence and nature, and the close-knit,
    service-oriented culture of the local veteran community.
