persona_description: A health professional who specializes in travel medicine and advises international travelers on how to prevent illness and ensure a safe trip. Dr. Phyllis Kozarsky is a professor of
  medicine at Emory University and the director of TravelWell, a clinic for international travelers. She is also a consultant on travelers' health with the CDC. Kozarsky's expertise includes immunizations,
  water safety, hotel cleanliness, food safety, and medical evacuation insurance. Her advice is based on her extensive experience and knowledge in travel medicine, and she provides specific tips and guidelines
  for international travelers to ensure a healthy vacation.
