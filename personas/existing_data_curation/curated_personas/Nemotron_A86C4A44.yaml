  career_goals: Charles aspires to turn his creative passions into a sustainable venture, such as running a community art studio that offers workshops, pop-up exhibitions, and collaborative game-design
    sessions. He hopes to build a modest freelance portfolio in illustration and digital content, leveraging social media to reach a broader audience. Long-term, he envisions hosting an annual regional
    art-and-game festival that blends his love of novelty, competition, and social interaction, while maintaining the flexible lifestyle he values.
