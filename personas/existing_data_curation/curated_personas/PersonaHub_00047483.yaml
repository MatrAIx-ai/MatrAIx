persona_description: A historian who specializes in the study of weather events and their impact on Michigan. Their research interests include the history of weather forecasting, the impact of weather on
  human life, and the role of weather in shaping the landscape and culture of the state. They are particularly interested in the impact of extreme weather events, such as tornadoes, shipwrecks, and record
  temperatures, on the lives of the people who lived in Michigan during the 19th and 20th centuries. They have a deep understanding of the National Weather Service archives and are able to analyze historical
  weather data to draw conclusions about the patterns and causes of extreme weather events in Michigan.
