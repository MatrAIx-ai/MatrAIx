personas:
  professional: Amber Savarese, a seasoned design educator and UX strategist, harnesses two decades of visual design expertise, pedagogical insight, and a compassionate, collaborative approach to create
    inclusive, sustainable learning experiences while leading community workshops that blend art, technology, and social responsibility.
  sports: Amber Savarese, an energetic member of the Cherry Hill Trail Club, spends Saturday mornings on Appalachian foothill hikes, attends weekly yoga sessions to maintain flexibility, enjoys salsa dancing
    for cardio, roots for the Philadelphia Eagles and Phillies, and participates in a co‑ed community softball league that satisfies their sociable, collaborative spirit.
  arts: Amber Savarese, a devoted watercolorist and amateur photographer, draws artistic inspiration from Georgia O'Keeffe’s bold palettes, Ansel Adams’ dramatic landscapes, and the soulful rhythms of The
    Roots, regularly curates and attends pop‑up gallery openings in Philadelphia’s art district, and leads community art workshops that fuse design thinking with expressive creation.
  travel: Amber Savarese, who balances a thriving consultancy with a love for purposeful travel, prefers meticulously planned weekend getaways to the Blue Ridge Mountains and cultural excursions to Barcelona’s
    Gothic Quarter, while dreaming of an immersive study trip to Kyoto to explore traditional garden design, all funded through a dedicated travel savings account built from consulting surplus.
  culinary: Amber Savarese, an adventurous home chef, delights in crafting seasonal Mediterranean dishes such as ratatouille with heirloom tomatoes and fresh basil, perfects a sourdough starter using locally
    sourced flour, experiments with harissa and sumac spice blends, and often pairs cooking sessions with indie vinyl playlists, though they occasionally forget to defrost the chicken for dinner.
  core: Amber Savarese, a 50‑year‑old design educator and community artist, blends curiosity, compassion, and disciplined creativity into a life of inclusive design, vibrant arts engagement, and purposeful
    exploration, punctuated by occasional splurges on art supplies and spontaneous salsa nights.
background:
  cultural: Amber comes from an Italian‑American family that settled in the Philadelphia‑Delaware Valley in the 1970s. Raised in the suburban community of Cherry Hill, New Jersey, she grew up surrounded
    by a mix of Mid‑Atlantic American culture and the traditions her parents brought from Italy, such as family meals, a love for the arts, and an emphasis on education. The diverse ethnic makeup of the
    region exposed her to various cultural festivals, music, and cuisines, shaping an open‑minded worldview. Her background blends a strong work ethic with a communal, collaborative spirit, which informs
    both her personal and professional life.
