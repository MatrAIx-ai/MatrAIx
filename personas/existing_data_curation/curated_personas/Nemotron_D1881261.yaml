  career_goals: Her career ambition is to become a leading voice in socially responsible design, focusing on educational and community initiatives. Amber aims to spearhead interdisciplinary projects that
    blend technology, art, and pedagogy to improve learning experiences for diverse audiences. Over the next five years she plans to launch a consultancy that partners with schools, non‑profits, and local
    arts organizations, offering design solutions that promote accessibility, sustainability, and cultural enrichment. She also hopes to mentor emerging designers, teach part‑time courses in design thinking,
    and contribute to public policy discussions around inclusive design standards.
