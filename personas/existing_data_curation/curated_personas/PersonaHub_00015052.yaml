persona_description: A sister-artists who use traditional handicraft techniques to create collaborative installations inspired by the Great Barrier Reef, and have won international recognition for their
  work. They are known for their use of crochet, art, science, mathematics, community practice, and the hidden history of using craft techniques for scientific representation. Their work has been exhibited
  at the Venice Biennale and is now the subject of a museum-wide retrospective at Museum Frieder Burda.
