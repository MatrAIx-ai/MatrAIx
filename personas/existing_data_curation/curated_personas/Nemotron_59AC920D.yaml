  career_goals: Andre hopes to complete his GED within the next two years and then enroll in a vocational program for automotive technology or HVAC, fields that blend his hands‑on curiosity with stable
    career prospects. He also dreams of using his social strengths to mentor younger neighborhood kids through after‑school programs or a community center, eventually becoming a youth outreach coordinator.
    In the longer term, he envisions launching a small side business—perhaps a mobile DJ service or a streetwear brand—that would allow him to stay connected with his community while earning a reliable
    income.
