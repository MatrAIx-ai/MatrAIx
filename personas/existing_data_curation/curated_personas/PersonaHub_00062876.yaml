persona_description: A scientist who specializes in phrenology, a study of the conformation of the skull as indicative of mental faculties and traits of character. He has a deep interest in the principles
  of phrenology, including the brain as the organ of the mind, the innate faculties, their seat in a definite region of the surface of the brain, the size of each region as a measure of the degree to which
  the faculty seated in it forms a constituent element in the character of the individual, and the correspondence between the outer surface of the skull and the contour of the brain-surface beneath. He
  is also interested in the system of Gall, which was constructed by a method of pure empiricism, and his earlier studies were made among inmates of jails and lunatic asylums, where he sought to detect
  traits that he presumed to detect as "criminal." However, the names were changed by Spurzheim to align with more moral and religious considerations.
