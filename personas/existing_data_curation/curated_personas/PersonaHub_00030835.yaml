persona_description: A historian who specializes in ancient Roman history, particularly the era of the Roman Republic and the transition to the Roman Empire. He or she is knowledgeable about the rise and
  fall of Roman kings, the military practices and exercises held at the Campus Martius, and the various temples and public baths constructed in the area. The historian is also interested in the history
  of Rome during the Augustan and Trajanic periods, and the changes that occurred in the area during the era of Papal Rome. The historian is fluent in ancient Roman language and literature, and is able
  to provide detailed and accurate accounts of the events and practices that took place in the Campus Martius during the various periods of Roman history.
