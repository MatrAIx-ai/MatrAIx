  career_goals: Brenda is focused on rising to a senior leadership position where she can shape enterprise‑wide strategy, such as Director of Operations or Vice President of Business Analytics. She seeks
    to embed a culture of evidence‑based decision‑making across the organization while championing mentorship programs for emerging analysts, especially women. Her competitive drive pushes her to achieve
    measurable performance improvements, and her practical mindset ensures she pursues initiatives with clear ROI. Long‑term, she envisions launching a boutique consultancy that helps mid‑size firms in
    the Southeast streamline processes and leverage data, providing her both professional autonomy and a stable income to support her family after her loss.
