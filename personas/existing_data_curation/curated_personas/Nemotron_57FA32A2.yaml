  hobbies: '["Vegetable gardening", "Visiting art galleries and community theater", "Reading historical biographies and popular science books", "Listening to jazz music", "Model train building", "Playing
    chess", "Walking along the Rock River", "Hosting discussion groups"]'
  career_goals: Although retired, Bradley aims to preserve Morrison's local heritage by documenting oral histories and contributing to the town's historical society. He seeks to mentor younger community
    members in STEM subjects, fostering problem‑solving skills and scientific curiosity. He also aspires to complete a series of watercolor paintings of the seasonal Illinois landscape and to publish a
    memoir that reflects on his nine decades of experience, hoping to inspire resilience and lifelong learning in future generations.
