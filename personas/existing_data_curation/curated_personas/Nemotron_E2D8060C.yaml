  hobbies: '[''Pickup basketball'', ''West Coast hip‑hop and R&B'', ''Car audio customization'', ''Street photography'', ''Tactical video games'', ''Hiking'', ''Youth basketball coaching'']'
  career_goals: Short‑term, Roland aims to earn his GED, complete the department’s Advanced Academy, and qualify for the Detective Pre‑Assignment Course. He wants to strengthen his investigative techniques
    and take on a specialist role in community‑focused crime prevention. Long‑term, he aspires to be promoted to Sergeant, lead a neighborhood liaison unit that bridges police work with local youth programs,
    and eventually serve as a detective who mentors new officers from under‑represented backgrounds. He also hopes to pursue an associate’s degree in criminal justice to broaden his career options.
