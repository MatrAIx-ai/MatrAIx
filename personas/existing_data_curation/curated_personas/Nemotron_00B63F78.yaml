personas:
  professional: Miguel Barrios is a diligent office clerk who leverages bilingual fluency, meticulous data entry, and a curiosity for new software to streamline records while building a reputation for friendly,
    assertive customer service and a willingness to step up to supervisory duties.
  sports: Miguel Barrios burns energy in a Saturday evening local soccer league, cheers for Club América in Liga MX and tracks the Texas Rangers during baseball season, while also holding a seasonal membership
    at the Lake Seminole fishing club where they practice early‑morning bass fishing.
  arts: Miguel Barrios enjoys dancing to regional Mexican bandas like Los Tigres del Norte and listening to Vicente Fernández while attending community festivals, and they also appreciate films by Alejandro
    González Iñárritu and classic telenovelas that remind them of family gatherings.
  travel: Miguel Barrios favors budget‑friendly road trips, having explored Austin’s live‑music scene, trekked the trails of Big Bend National Park, and taken a weekend getaway to San Antonio’s River Walk,
    while they dream of a future cross‑border cultural tour to Puebla to experience its famed culinary festivals.
  culinary: Miguel Barrios cooks with hands‑on enthusiasm, mastering tacos al pastor with pineapple, simmering hearty pozole with hominy and chiles guajillo, and hand‑wrapping tamales using masa, cilantro,
    and roasted pork, and they relish the earthy flavor of epazote in their sauces.
  core: Miguel Barrios is a high‑energy, community‑centric planner who channels worry into meticulous schedules, yet sometimes overcommits to social events and forgets to eat lunch.
background:
  cultural: Miguel grew up in a Mexican‑American household in Seminole, Texas, where Spanish was spoken at home and English at school and work. He embraces Mexican traditions such as Día de los Muertos,
    Cinco de Mayo celebrations, and family gatherings centered around food and music. His Catholic upbringing influences his participation in church activities and community service. Living in rural West
    Texas, Miguel blends his Mexican heritage with the local Texan culture, creating a bicultural identity that shapes his values, language, and social connections.
attributes:
  skills: '[''bilingual communication (Spanish/English)'', ''customer service'', ''data entry'', ''Microsoft Office (Word, Excel, Outlook)'', ''filing and records management'', ''basic bookkeeping'', ''scheduling
    and calendar management'', ''problem solving'', ''team collaboration'', ''time management'', ''office equipment operation (printer, scanner)'', ''basic inventory tracking'']'
  hobbies: '[''playing soccer'', ''cooking Mexican cuisine'', ''listening to regional Mexican music'', ''dancing at community festivals'', ''fishing'', ''video gaming'', ''volunteering at church'', ''attending
    local community events'']'
  career_goals: Miguel aims to advance from a general clerk to a supervisory or office‑manager position within the next few years. He plans to earn his GED and take community‑college courses in business
    administration and bookkeeping to strengthen his qualifications. With increased responsibility, he hopes to secure a stable, higher income that will allow him to buy a larger home for his growing family
    and eventually explore opening a small family‑run convenience store that reflects his Mexican heritage.
