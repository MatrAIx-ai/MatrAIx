  career_goals: Sonia aims to finish high school with strong academic fundamentals and then pursue a degree in education or social work. She envisions becoming a middle‑school teacher who can blend innovative
    teaching ideas with proven classroom practices, fostering inclusive and collaborative learning environments. In the short term, she plans to join the student council, volunteer at the local community
    center, and secure a part‑time position that gives her practical experience in organizing events and supporting peers. Her long‑term ambition includes advocating for youth programs that promote both
    academic achievement and social well‑being in small‑town America.
