personas:
  professional: Sonia Calongne, a 14‑year‑old budding community organizer, channels her energetic teamwork from soccer, disciplined clarinet practice, and talent for arranging school events into early leadership
    experiences, balancing curiosity with practicality as they tackle each project with reliable organization and flexible adaptability.
  sports: Sonia Calongne, a dedicated member of the Maple Oak Youth Soccer Club and an avid fan of the FC Barcelona women’s team, embraces the fall soccer season with relentless energy, supplements training
    with weekend bike rides, and they stay connected to local sports culture by cheering for the hometown high‑school Eagles during basketball games.
  arts: Sonia Calongne, a clarinetist in the school band who also adores dancing to BTS and crafting friendship bracelets, finds inspiration in the cinematic scores of John Williams and the fantasy novels
    of J.K. Rowling, and they spend free moments sketching album covers for their favorite indie singer, Mitski.
  travel: Sonia Calongne, a curious traveler who has photographed the rolling hills of the nearby countryside and visited the historic seaside town of Cape Harbor during a family vacation, dreams of exploring
    the castles of Scotland and the neon streets of Tokyo, and they plan trips with a mix of photo‑journal goals and family‑friendly itineraries while respecting the budget constraints of a teen’s allowance.
  culinary: Sonia Calongne, a budding baker who loves whipping up chocolate chip cookies, lemon drizzle cupcakes, and cinnamon‑spiced banana bread using vanilla extract and butter, often shares her sweet
    creations with classmates, and they enjoy experimenting with simple decorations like sprinkles and edible glitter, showcasing a modest but enthusiastic cooking skill level.
  core: Sonia Calongne, a 14‑year‑old whirlwind of soccer energy, clarinet melodies, and bracelet‑making creativity, balances school responsibilities with spontaneous baking marathons, occasionally over‑commits
    to clubs, yet they always return with a photo‑filled memory book and a smile.
background:
  cultural: Sonia was raised in Milan, a small town in Ripley County, Indiana, within a predominantly white, Midwestern community. Her family embodies typical Midwestern values of hard work, friendliness,
    and active community involvement. Seasonal traditions such as the county fair, high‑school football games, Thanksgiving gatherings, and church services have shaped her sense of belonging. Although her
    ancestry includes European roots—likely German and Irish—her daily life reflects the broader American cultural landscape of small‑town life, emphasizing neighborly support, modest celebrations, and
    a strong connection to local nature.
