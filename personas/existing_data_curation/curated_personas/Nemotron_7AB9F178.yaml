personas:
  professional: Joanette Park, a seasoned phlebotomist with three decades of venipuncture expertise and meticulous laboratory documentation, channels her practical, structure‑loving nature into calm patient
    interactions and assertive mentorship of new technicians while eyeing a part‑time supervisory role.
  sports: Joanette Park enjoys leisurely morning walks on the shaded trails of Fort DeSoto Park, is a member of the St. Petersburg Walking Club, follows the Tampa Bay Buccaneers in the fall, cheers for
    the Tampa Bay Lightning during winter hockey, and occasionally joins a senior softball league at the local community center.
  arts: Joanette Park finds comfort in the smooth sounds of classic jazz icons like Miles Davis, Ella Fitzgerald, and Duke Ellington while crocheting amigurumi toys, loses herself in the mystery novels
    of Agatha Christie and historical sagas by Ken Follett, and attends occasional community theater performances of classic plays by Tennessee Williams.
  travel: Joanette Park prefers low‑stress, self‑guided trips that let her savor quiet moments, has visited the historic streets of Savannah, the serene beaches of Sanibel Island, and the garden city of
    Charleston, and dreams of strolling through the lavender fields of Provence while budgeting carefully to keep travel expenses within her modest retirement savings.
  culinary: Joanette Park enjoys cooking fresh Gulf shrimp scampi with garlic, lemon, and locally grown basil from her garden, savors a perfectly layered Cuban sandwich with ham, roasted pork, and pickles,
    and often rounds out meals with a slice of key lime pie, while her cooking skill sits comfortably at a confident home‑cook level.
  core: Joanette Park blends a disciplined work ethic with a love of solitary nature walks, quietly mentors younger lab staff, tends a modest garden, and occasionally forgets to water her plants after a
    long reading session.
background:
  cultural: Joanette was raised as part of the post‑World‑War II white middle‑class community in the Suncoast region of Florida. Her upbringing reflects a blend of mid‑century American values—self‑reliance,
    modesty, and a strong work ethic—combined with the laid‑back coastal lifestyle of Pinellas County. While she identifies with mainstream white American culture, the multicultural flavor of the Gulf Coast
    has influenced her culinary tastes, leading her to enjoy fresh seafood, Cuban sandwiches, and locally grown produce. A lifelong member of the local Baptist congregation, she observes traditional holidays
    such as Thanksgiving and Christmas with family‑centric rituals. Her generation’s experience of economic growth, the rise of community health programs, and the gradual shift toward diversified workplaces
    informs her pragmatic approach to work and community involvement.
attributes:
  skills: '[''Venipuncture'', ''Capillary and arterial blood collection'', ''Specimen labeling and tracking'', ''Infection control and biosafety'', ''Electronic medical record documentation'', ''Inventory
    management of medical supplies'', ''Basic laboratory equipment calibration'', ''Patient communication and reassurance'', ''Mentoring junior phlebotomy staff'']'
  hobbies: '[''Walking coastal park trails'', ''Birdwatching'', ''Gardening (vegetables and herbs)'', ''Reading historical fiction and mysteries'', ''Knitting and crocheting'', ''Listening to classic jazz'',
    ''Light yoga and stretching'', ''Crossword puzzles'', ''Online book‑exchange club'']'
  career_goals: Looking ahead, Joanette plans to transition to a part‑time supervisory role within her current clinic so she can oversee quality assurance while still maintaining a hands‑on schedule that
    respects her desire for a predictable routine. She hopes to formalize her mentorship by developing a short‑course handbook on phlebotomy best practices for new hires, and she is considering obtaining
    a certification as a Medical Laboratory Technician to broaden her expertise. As retirement approaches, she aims to volunteer at a local senior‑center health program, providing free blood‑draw services
    and health education to underserved older adults. Financial stability and a smooth, low‑stress shift into retirement remain central to her ambitions.
