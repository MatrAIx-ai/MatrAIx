  hobbies: '["fishing", "listening to blues and soul music", "cooking barbecue", "church community service", "playing cards", "woodworking", "watching Memphis Grizzlies games"]'
  career_goals: Although Henry is approaching retirement, he aims to transition into a supervisory foreman role within the next two years, where he can leverage his extensive hands‑on experience to mentor
    younger workers and improve workflow efficiency. He also plans to obtain a commercial driver’s license (CDL) to expand his job options and eventually start a small side business offering moving and
    handyman services, providing additional income and flexibility for his family.
