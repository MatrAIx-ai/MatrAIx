  career_goals: Amer aims to transition from a senior analyst role to a strategic technology consultant, leading digital‑transformation projects for mid‑size healthcare and financial firms in South Florida.
    He plans to obtain AWS Solutions Architect and PMP certifications within the next two years, leverage his curiosity for AI/ML to integrate predictive analytics into legacy systems, and mentor younger
    Latinx professionals entering the tech field. In the longer term, he envisions founding a boutique consultancy that helps Venezuelan‑origin small businesses securely migrate to cloud environments while
    offering workshops on tech literacy and mental‑wellness for high‑stress occupations.
