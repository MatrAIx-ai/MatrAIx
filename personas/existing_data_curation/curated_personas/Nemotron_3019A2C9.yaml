personas:
  professional: Amer Hernandez channels their three‑plus decades of systems analysis expertise into strategic consulting proposals that blend methodical rigor, emerging AI/ML insights, and practical risk
    assessment, while leveraging their sociable nature to forge cross‑functional partnerships and mentor younger Latinx professionals entering tech.
  sports: Amer Hernandez competes weekly in a local amateur soccer league, proudly supports Miami United FC, and joins a weekend hiking club that explores the Everglades, using the physical exertion to
    channel excess energy and mitigate anxiety.
  arts: Amer Hernandez embraces cultural nights by dancing salsa to the rhythms of Celia Cruz and Carlos Vives, enjoys classic films by Pedro Almodóvar, and frequently attends live performances by local
    Latin jazz ensembles, finding artistic expression a crucial outlet for emotional release.
  travel: Amer Hernandez prefers purposeful short trips that blend leisure with learning, such as weekend snorkeling excursions to the Florida Keys, a cultural immersion visit to Cartagena, Colombia, and
    a planned tech‑hub tour of Austin, Texas, while carefully balancing travel expenses against their consultancy savings goals.
  culinary: Amer Hernandez delights in preparing arepas stuffed with shredded beef and black beans, as well as pabellón featuring plantains, frequently experimenting with avocado‑lime sauces, yet sometimes
    over‑spices dishes in a nostalgic quest for the flavors of their youth.
  core: Amer Hernandez is a methodical tech veteran who channels boundless social energy into soccer, salsa, and mentorship while battling anxiety through yoga, mindful journaling, and occasional impulsive
    tech splurges.
background:
  cultural: Amer was born in Caracas, Venezuela, and grew up immersed in the country’s vibrant music, food, and family traditions. He emigrated to Miami in his early thirties, bringing with him a deep respect
    for Venezuelan hospitality, bilingual fluency, and a strong sense of resilience shaped by his homeland’s economic challenges. In Miami, he maintains close ties to the Venezuelan diaspora, celebrating
    festivals such as Carnaval, Día de la Independencia, and participating in local Latin‑American cultural organizations. His cultural identity influences his culinary passions, community involvement,
    and commitment to supporting fellow immigrants navigating the U.S. tech landscape.
