personas:
  professional: An aspiring junior engineer, Yi Yang loves constructing intricate LEGO creations and designing simple Scratch games, channeling their soccer teamwork into collaborative problem‑solving while
    balancing curiosity with practical, organized approaches.
  sports: An enthusiastic soccer player, Yi Yang dazzles in the neighborhood Thunderkids FC, practices quick passes with friends after school, idolizes Manchester United’s midfield maestros, and balances
    structured training sessions with spontaneous pickup games to satisfy their sociable energy.
  arts: A vivid storyteller, Yi Yang sketches manga heroes inspired by Naruto and My Hero Academia, watches Studio Ghibli films for creative sparks, and designs LEGO scenes that double as comic panels,
    turning their talkative nature into collaborative art projects with classmates.
  travel: A curious explorer, Yi Yang has visited the city science museum and the nearby amusement park, dreams of touring the International Space Station exhibit in Houston, and prefers short family trips
    that blend organized itineraries with playful detours, all while worrying about missing a favorite snack.
  culinary: A budding chef, Yi Yang learns to stir‑fry noodles and craft fermented vegetable pancakes during cultural school sessions, loves the bright tang of sweet‑spicy red pepper paste, and enjoys sharing
    their homemade snacks with friends after soccer games, though they sometimes over‑season and burn the edges.
  core: Yi Yang merges curiosity with practicality, turning LEGO bricks, soccer drills, manga sketches, and cooking experiments into daily adventures while worrying about details that push them toward perfect
    harmony.
background:
  cultural: Yi Ok grows up in a Korean‑American household in Carrollton, Texas. At home his family celebrates Korean holidays such as Chuseok and Lunar New Year, prepares dishes like kimchi and bulgogi,
    and keeps the Korean language alive through daily conversation and weekend cultural classes. In the public school system he follows the U.S. curriculum, interacts with a diverse student body, and participates
    in community events at a nearby Korean church and cultural center. This blend of East Asian traditions and Texan everyday life shapes his respect for education, community involvement, and a balanced
    view of both his heritage and the broader American culture.
