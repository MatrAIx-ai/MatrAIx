  hobbies: '[''Museum visits'', ''Street‑art tours'', ''Sketching'', ''Nature photography'', ''Balcony gardening'', ''Hiking in Hudson Valley'', ''Mindfulness meditation'', ''Reading anxiety‑management
    literature'', ''Community garden volunteering'']'
  career_goals: Thomas aims to move beyond routine groundskeeping into a supervisory and design‑focused role. Over the next five years he plans to earn a professional certification in landscape design and
    develop a portfolio that showcases his artistic approach to urban green spaces. He hopes to lead a small team at his current employer, eventually transitioning to a freelance or boutique landscaping
    business that specializes in sustainable, art‑inspired installations for residential and community projects in New York City. His long‑term ambition is to contribute to city‑wide greening initiatives
    that improve mental well‑being, a cause that resonates with his own experience of anxiety and desire to create calming outdoor environments.
