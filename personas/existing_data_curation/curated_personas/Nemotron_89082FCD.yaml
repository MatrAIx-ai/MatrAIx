  hobbies: '["Socializing with friends (community center gatherings)", "Organizing school events and game nights", "Listening to and dancing to cumbia and reggaeton", "Cooking traditional Salvadoran dishes
    (pupusas, tamales, sopa de gallina)", "Maintaining a weekly planner and scheduling", "Playing puzzle and simulation video games", "Participating in drama club and school performances"]'
  career_goals: Dorka aims to complete high school and pursue an associate’s degree in health sciences, with the goal of becoming a certified medical assistant or community health worker. She is attracted
    to a career that offers routine patient care, regular interaction with people, and the chance to use her bilingual skills to serve the Latino community in Houston. In the longer term, she hopes to advance
    into a nursing or health‑education role where she can mentor younger students from similar backgrounds and help promote preventive health practices within her community.
