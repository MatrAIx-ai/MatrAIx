personas:
  professional: Dorka Zamora, an aspiring community health advocate, channels her bilingual fluency, confident public speaking, and meticulous planning into leading school health‑fair initiatives and coordinating
    local wellness events, all while favoring predictable routines and hands‑on teamwork.
  sports: Dorka Zamora stays active through weekly dance‑fit sessions at the community center, follows the Houston Astros and Houston Rockets avidly, and occasionally joins a co‑ed youth soccer league that
    meets after school during the fall season.
  arts: Dorka Zamora expresses her creativity by performing in the school drama club, dancing to beats from artists like Bad Bunny and J Balvin, and finding inspiration in the theatrical works of Lin‑Manuel
    Miranda and the vibrant murals of local street artists.
  travel: Dorka Zamora balances a love for weekend road trips to Galveston’s beaches with dreams of exploring Mexico City’s historic center and the colorful markets of Oaxaca, planning each journey with
    a detailed itinerary in her weekly planner while budgeting within her allowance.
  culinary: Dorka Zamora delights in cooking pupusas filled with cheese and loroco, steaming pork‑filled tamales, and simmering sopa de gallina seasoned with cilantro, lime, and corn broth, often sharing
    these dishes with friends during community gatherings.
  core: Dorka Zamora is a sociable, routine‑oriented teen who thrives on organizing community events, juggling schoolwork with a bustling social calendar, and occasionally overcommits, leading to late‑night
    study sessions and missed sleep.
background:
  cultural: Dorka comes from a Salvadoran immigrant family that settled in Houston’s Fort Bend County. At home, Spanish is the primary language, and family meals often feature dishes like pupusas, yuca
    frita, and tamales, prepared using recipes passed down through generations. Her parents uphold traditional values of respect for elders, strong family cohesion, and Catholic religious observances, celebrating
    holidays such as Día de la Virgen de Guadalupe and community festivals that highlight Salvadoran music and dance. The vibrant local Salvadoran community provides a supportive network through churches,
    cultural events, and Spanish‑language programs, allowing Dorka to stay connected to her heritage while navigating life in a diverse American city. This bicultural upbringing shapes her bilingual fluency,
    love for communal gatherings, and desire to give back to her community.
attributes:
  skills: '["Bilingual communication (Spanish–English)", "Public speaking and group facilitation", "Event planning and coordination", "Basic computer skills (Word, PowerPoint, Google Suite)", "Organizational
