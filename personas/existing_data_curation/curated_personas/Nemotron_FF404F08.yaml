personas:
  professional: Carolyn Ashworth is a passionate early childhood educator in Mobile who blends STEM expertise with hands‑on caregiving, designing flexible yet structured science activities that honor children’s
    curiosity while navigating their own love for spontaneity and occasional resistance to rigid schedules.
  sports: Carolyn Ashworth enjoys Saturday hikes on the Mobile Bay trail with the local Trailblazers Hiking Club, attends community yoga sessions at the downtown studio, and cheerfully supports the Mobile
    BayPaw baseball team and the Alabama Crimson Tide football squad during the fall season, while they often schedule these activities around their work calendar.
  arts: Carolyn Ashworth sings alto in their church choir, drawing inspiration from artists like Aretha Franklin and Stevie Wonder, while also unwinding with the soulful sounds of Leon Bridges, and finds
    creative satisfaction crocheting colorful blankets modeled after patterns seen in local craft fairs.
  travel: Carolyn Ashworth prefers short road trips that blend nature and culture, having explored Gulf Shores, the historic streets of New Orleans during Mardi Gras, and the gardens of Charleston, while
    they dream of a culinary pilgrimage to Tuscany for authentic food markets and cooking classes.
  culinary: Carolyn Ashworth crafts Southern comfort dishes with a modern twist, such as quinoa‑infused collard‑green stew, citrus‑marinated fried chicken with a honey‑hot sauce glaze, and okra‑pepper gumbo,
    seasoning them with garden‑fresh thyme, basil, and smoked paprika, and they enjoy hosting neighborhood potlucks where these plates shine.
  core: Carolyn Ashworth is a detail‑oriented yet spontaneous early‑childhood STEM advocate who gardens, crochets, and cooks with a flair for Southern flavors, balances their love for structure with occasional
    procrastination, and roams between community events with a perpetual notebook of ideas.
background:
  cultural: Carolyn is a Black woman raised in Mobile, Alabama, where the rich tapestry of African‑American history and Southern culture shapes her identity. She grew up immersed in the traditions of gospel
    music, storytelling, and community solidarity that are central to Mobile's Black neighborhoods. Family gatherings often feature soulful music, soulful dishes, and vibrant conversations about civil rights
    heritage. She values the close‑knit support network of her church and local community organizations, which have fostered her commitment to service and education. Her cultural perspective informs her
    approach to childcare, emphasizing respect, empowerment, and the celebration of each child’s heritage.
attributes:
  skills: '[''Child Development Assessment'', ''STEM Curriculum Design for Early Learners'', ''First Aid and CPR Certified'', ''Classroom Safety Management'', ''Data Collection and Analysis'', ''Problem
    Solving'', ''Effective Communication'', ''Conflict Resolution'', ''Collaborative Teamwork'', ''Flexible Routine Planning'', ''Basic Laboratory Techniques'', ''Cultural Sensitivity in Education'']'
  hobbies: '[''Southern Cooking'', ''Gardening'', ''Reading Science and Children’s Books'', ''Church Choir Singing'', ''Community Festival Participation'', ''STEM Outreach Volunteering'', ''Hiking'', ''Yoga'',
    ''Crocheting'']'
  career_goals: Carolyn aims to become a licensed early childhood educator with a specialty in STEM integration. She plans to pursue a master's degree in Early Childhood Education and obtain certification
    in curriculum development. Her long‑term ambition is to lead a community childcare center that offers innovative science and technology enrichment programs for underserved families in Mobile. She also
    hopes to mentor other educators and advocate for policies that increase access to high‑quality, culturally responsive early learning opportunities.
