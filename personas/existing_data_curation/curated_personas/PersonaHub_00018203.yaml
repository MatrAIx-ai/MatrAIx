persona_description: A researcher and inventor who specializes in the development of miniature compound eyes for microflying robots. They have collaborated with various institutions in Europe and the United
  States to create fully functional, self-contained, miniature CURVed Artificial Compound Eyes. Their expertise lies in the design and development of miniature sensors, particularly those that can assist
  in highly autonomous navigation tasks. They have published their work in a paper in Proceedings of the National Academy of Science, showcasing the capabilities of their CURVACE artificial compound eyes.
