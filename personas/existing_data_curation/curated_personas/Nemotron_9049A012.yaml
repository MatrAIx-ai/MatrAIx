personas:
  professional: Gary Starnes, a 22‑year‑old custodial specialist, leverages systematic cleaning techniques, inventory management, and emerging sustainable operations knowledge to keep facilities spotless
    while quietly infusing artistic sensibility into every maintenance plan, and they demonstrate methodical reliability and imaginative problem‑solving on the job.
  sports: Gary Starnes enjoys weekend hikes through the Ouachita foothills, belongs to the local Ozark Trail Club, plays casual pick‑up basketball at the community center, and follows the Arkansas Razorbacks
    football and the Dallas Cowboys with fervor, channeling their organized mindset into disciplined training routines.
  arts: Gary Starnes spends free evenings watercolor‑painting industrial skylines, creates digital illustrations inspired by Georgia O’Keeffe’s bold forms and Beeple’s neon palettes, strums acoustic renditions
    of Sufjan Stevens and David Gray, and regularly performs with a community‑theater improv troupe that explores abstract concepts, all of which fuel their imaginative outlook.
  travel: Gary Starnes plans low‑budget getaways that balance adventure and relaxation, having trekked the Hot Springs National Park trails, day‑tripped to the Crystal Bridges Museum in Bentonville, and
    dreaming of a future art‑focused pilgrimage to Kyoto’s temples and Florence’s Renaissance galleries, all while using a spreadsheet to stretch their limited travel funds.
  culinary: Gary Starnes cooks simple yet flavorful meals, favoring shrimp and grits with a dash of smoked paprika, quick vegetable stir‑fry with tofu, ginger, and soy sauce, and they relish brewing oat‑milk
    lattes with cinnamon, while occasionally burning toast due to getting lost in a sketch.
  core: Gary Starnes is a methodical custodian‑artist who balances a love for clean spaces with vivid imagination, often trading a night of meticulous inventory checks for an impromptu watercolor session,
    all while juggling a modest budget, occasional back aches, and a habit of forgetting to floss.
background:
  cultural: Gary was raised in a modest, middle‑class family in Duncan, Oklahoma, a small‑town community where self‑reliance, hard work, and neighborly support are core values. His cultural upbringing reflects
    typical Midwestern white traditions, such as attending local church services, taking part in county fairs, and valuing education despite limited resources. While rooted in these local customs, his imaginative
    nature and exposure to college courses, online art forums, and occasional travel have broadened his worldview, allowing him to blend traditional community values with a curiosity for new ideas and artistic
    expression.
attributes:
  skills: '[''custodial cleaning'', ''floor care'', ''restroom sanitation'', ''schedule coordination'', ''inventory management'', ''quality control inspection'', ''basic HVAC troubleshooting'', ''light‑fixture
    replacement'', ''Microsoft Office proficiency'', ''sketching'', ''digital illustration'']'
  hobbies: '[''watercolor painting'', ''digital illustration'', ''reading speculative fiction'', ''philosophy'', ''hiking'', ''acoustic guitar playing'', ''community‑theater improv'']'
  career_goals: Gary aims to build on his custodial experience by obtaining an associate degree in Facilities Management or Sustainable Operations and earning industry certifications such as OSHA and IFMA’s
    Facility Management Credential. In the next three years he hopes to transition into a facilities supervisor role, overseeing a team and implementing environmentally friendly cleaning practices. Long‑term,
    he envisions combining his love of art with his profession by working in museum or gallery maintenance, where he can protect artwork while managing the space, or launching his own eco‑conscious cleaning
    business that partners with local art venues.
