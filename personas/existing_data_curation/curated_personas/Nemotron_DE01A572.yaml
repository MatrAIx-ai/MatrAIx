  hobbies: '[''Visiting art museums'', ''Digital photography'', ''Reading historical non-fiction'', ''Listening to jazz and blues music'', ''Gardening'', ''Participating in a small book club'', ''Volunteering
    at community STEM workshops'', ''Exploring 3‑D printing'']'
  career_goals: Although Lenward is no longer part of the formal workforce, he remains driven to make a lasting impact. He aims to expand his mentorship of young African‑American students in STEM, develop
    a community‑based curriculum that blends engineering concepts with artistic expression, and author a memoir that chronicles his professional journey and the evolution of Atlanta's black professional
    community. He also hopes to secure funding for a modest scholarship at a local historically black college and to curate a small traveling exhibition that showcases the intersection of technology and
    African‑American art.
