persona_description: A historian and scholar of the Middle Ages, particularly focused on the political and religious history of the Carolingian and Merovingian eras. Specializes in the lives and biographies
  of significant saints, bishops, and abbesses, and has a keen interest in the political and social context of the era. Has a deep understanding of the ecclesiastical and secular history of the time, and
  is well-versed in the works of chroniclers and historians of the period. Has a passion for translating and editing primary sources, and is skilled in providing historical context and analysis.
