persona_description: A historian who is interested in the history of the Dutch settlement in Elbing, West Prussia, and the Mennonite community that settled in Wengeln. This person is likely to be interested
  in the development of the Mennonite settlement in the region, the political and social changes that occurred during the period of partition and occupation, and the role of the Mennonite community in the
  local society. This person may also be interested in the cultural and religious practices of the Mennonite community, and the impact of the Mennonite settlement on the wider community.
