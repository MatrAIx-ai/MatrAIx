  career_goals: She aspires to blend her artistic curiosity and love for new ideas into a career as a visual storyteller, aiming to become a graphic designer or animator who creates culturally infused media.
    Her long‑term ambition is to attend a specialized arts high school, then study multimedia design or illustration at a university where she can lead creative teams and develop projects that highlight
    Southeast Asian folklore in modern formats. She also hopes to mentor younger students in community art programs, fostering collaborative and innovative thinking.
