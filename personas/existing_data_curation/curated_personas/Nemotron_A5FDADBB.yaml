personas:
  professional: Tuyet Ibay is a budding visual storyteller and junior illustrator who merges manga‑style character design with family‑inspired traditional motifs, harnessing their organized, methodical
    approach to orchestrate art club murals and confident collaboration on group projects.
  sports: Tuyet Ibay dives into morning swim practices at the community pool, emulating the disciplined strokes of Olympian swimmer Katie Ledecky, and enjoys cheering for the local youth soccer club, the
    River City Rovers, while maintaining a personal log of lap times and seasonal goals.
  arts: Tuyet Ibay channels their love for manga and traditional motifs into vibrant digital illustrations, draws inspiration from Hayao Miyazaki’s films and the graphic storytelling of 'One Piece,' while
    also immersing themselves in community theater productions of 'Peter Pan' and a soundtrack that swings between BTS’s K‑pop hits and Bon Iver’s indie folk ballads.
  travel: Tuyet Ibay dreams of a cultural road‑trip that blends artistic adventure with culinary curiosity—hand‑sketching the neon alleys of Tokyo’s Akihabara, slurping authentic pho on the banks of the
    Red River in Hanoi, and strolling the Louvre’s wings in Paris—all arranged with meticulously drawn itineraries and a modest family travel budget.
  culinary: Tuyet Ibay spends weekend afternoons whisking a fragrant bone broth for pho bò, layering crisp baguettes with lemongrass‑marinated pork and pickled daikon for bánh mì, and daringly incorporates
    unconventional ingredients like matcha‑powdered pastry dust, all while sketching whimsical menu art for their family’s kitchen experiments.
  core: Tuyet Ibay balances meticulous planners with midnight sketch marathons, turning sticky‑note to‑do lists into vibrant manga panels while never missing a debate rehearsal.
background:
  cultural: Tuyết comes from a Vietnamese‑American family rooted in Orange County's vibrant Southeast Asian community. At home she speaks Vietnamese with her grandparents and celebrates cultural festivals
    such as Tet and the Mid‑Autumn Festival, where traditional foods, lanterns, and folk stories are shared. Her family emphasizes respect for elders, education, and community involvement, and she attends
    a weekend Vietnamese language school. These cultural practices influence her artistic style and values, inspiring her to incorporate Vietnamese motifs and storytelling traditions into her creative work.
