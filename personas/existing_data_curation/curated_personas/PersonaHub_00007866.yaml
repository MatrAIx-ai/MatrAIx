persona_description: A marine biologist who specializes in the study of tidal marshes and their interactions with sea level rise and sediment dynamics. Her research focuses on the resilience of tidal marshes
  to changes in sea level, the importance of sediment supply for their growth, and the need for improved management of tidal marshes to protect them from loss. She is also interested in the potential for
  tidal marshes to migrate upland and the need to act now to restore existing marshes and create new ones where feasible. Her work is part of a collaborative study using 5.4 feet of sea level rise as the
  high end scenarios based on current scientific literature.
