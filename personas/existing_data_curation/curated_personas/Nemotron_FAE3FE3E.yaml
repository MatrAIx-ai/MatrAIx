  hobbies: '[''Art gallery visits'', ''Independent theater attendance'', ''Birdwatching'', ''Dog walking'', ''Reading Puerto Rican diaspora history'', ''Crocheting'', ''Monthly book club'', ''Bridge playing'',
    ''Gardening'', ''Listening to salsa and bomba music'']'
  career_goals: Although retired, Yudeisy is driven to leave a lasting cultural legacy. She aims to compile a family cookbook that intertwines recipes with personal anecdotes, and she plans to self‑publish
    a memoir chronicling her migration journey from Puerto Rico to the mainland United States. She hopes to volunteer as a docent at the local museum, sharing Puerto Rican art and history with visitors.
    Yudeisy also wishes to travel back to Puerto Rico for a reunion with extended family, and she aspires to mentor teenage volunteers in her community center, encouraging them to preserve cultural traditions.
    Finally, she wants to achieve proficiency in using video‑editing software to create short documentaries of local senior stories.
