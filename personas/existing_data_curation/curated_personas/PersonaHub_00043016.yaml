persona_description: A researcher in the field of genomics and wound healing, particularly interested in investigating the underlying genomic and epigenetic mechanisms that contribute to chronic wound repair
  and predisposition. They are looking for innovative approaches to identifying high-risk individuals for developing chronic wounds and developing effective treatments tailored to specific genetic features
  of different patient groups. They are also interested in exploring new technologies to assess wounds and deliver genome-based treatments for chronic wound management.
