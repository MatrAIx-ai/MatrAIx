personas:
  professional: Ashley Chung is a budding game developer who blends her curiosity for Scratch programming with a methodical, organized workflow; they lead their school’s tech club projects and confidently
    guide teammates through collaborative coding sessions.
  sports: Ashley Chung is a dedicated member of the Bronx Youth Basketball League, cheering on the New York Knicks and the New York Yankees, and balances competitive court drills with daily hip‑hop dance
    workouts to stay fit and energized; they relish the camaraderie of team play.
  arts: Ashley Chung finds inspiration in the lyrical flow of Kendrick Lamar, the street murals of the Bronx, and the vibrant panels of the graphic novel series 'Ms. Marvel,' often sketching original characters
    on her tablet while listening to Beyoncé’s visual album for creative cues; they also attend local dance showcases.
  travel: Ashley Chung loves day trips to Coney Island and weekend visits to the American Museum of Natural History, while dreaming of exploring the historic neighborhoods of New Orleans and the bustling
    streets of Tokyo; they always plan trips with their family’s budget in mind and a packed sketchbook for inspiration.
  culinary: Ashley Chung enjoys helping her family prepare collard greens simmered with smoked turkey, loves the zing of jalapeño in homemade tacos, and proudly cooks simple rice‑and‑beans bowls, though
    they sometimes shortcut by microwaving instant noodles when homework piles up.
  core: Ashley Chung is a relentless planner who mixes a love for coding, dance, and community activism, yet frequently forgets homework after an impromptu block‑party jam session; they often scramble to
    catch up.
background:
  cultural: Ashley is a Black American growing up in the Bronx, a borough known for its rich tapestry of cultures, music, and community activism. Her family roots trace back to the Southern United States,
    with stories of the Great Migration and a strong tradition of church gatherings, soul food cooking, and storytelling. The vibrant street art, hip-hop heritage, and neighborhood block parties of the
    Bronx have shaped her appreciation for rhythm, language, and self-expression. She celebrates Juneteenth and Black History Month with her family, and she speaks both Standard English and elements of
    African American Vernacular English, reflecting her cultural fluency. The resilience and solidarity she observes in her community inspire her commitment to uplift peers through education and technology.
attributes:
  skills: '[''Digital Presentation Design'', ''Scratch Coding'', ''Basic Python Scripting'', ''Project Organization'', ''Public Speaking'', ''Basketball Strategy'', ''Digital Illustration'', ''Peer Mediation'',
