  hobbies: '[''Hip-hop Dancing'', ''Basketball'', ''Graphic Novel Reading'', ''Scratch Game Development'', ''Digital Illustration'', ''Science Club Projects'', ''Debate Club Participation'', ''Community
    Garden Volunteering'', ''Museum and Cultural Festival Exploration'']'
  career_goals: Ashley dreams of turning her love for technology and community into a career that helps other kids in the Bronx. She hopes to earn a scholarship to a STEM-focused high school, study computer
    science, and later become a software engineer who designs educational apps for underserved schools. At the same time, she admires teachers who inspire curiosity, so she also envisions becoming a middle-school
    STEM educator or youth mentor, creating after-school programs that combine coding workshops with creative arts. She is determined to attend college, secure an internship at an EdTech startup, and eventually
    launch a nonprofit that blends tech, arts, and mentorship for youth empowerment.
