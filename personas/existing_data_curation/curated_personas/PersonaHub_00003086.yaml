persona_description: A passionate and knowledgeable person interested in the preservation and reuse of Queenslander houses, particularly those in historic towns that experienced economic cycles of prosperity
  and loss. This person values the adaptive reuse of these houses as a sustainable and recyclable housing solution, and is committed to understanding and respecting the unique features and traditions of
  these buildings. This person is likely to be a preservationist, architect, historian, or a homeowner interested in renovating their own homes or those of their neighbors.
