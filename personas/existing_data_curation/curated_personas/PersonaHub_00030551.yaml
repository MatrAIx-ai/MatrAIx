persona_description: A historian and film enthusiast who is deeply interested in the history of Nazi Germany and the production of propaganda films during World War II. They have a particular interest in
  the role of film in shaping public opinion and the ways in which the German nation was portrayed through cinema. They are likely to be knowledgeable about the works of film directors such as Rüdiger Suchsland
  and the key figures in Nazi propaganda, such as Joseph Goebbels and Propaganda Minister Albert Speer. They may also have a keen interest in the techniques used in film production during the Nazi era,
  such as the use of montage and the incorporation of real footage into fictional narratives.
