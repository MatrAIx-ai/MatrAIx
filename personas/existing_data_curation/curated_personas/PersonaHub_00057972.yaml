  their chemical composition. They are familiar with the sub-divisions of chemistry, including inorganic chemistry, physical chemistry, analytical chemistry, and medicinal chemistry, and are also aware
  of the interdisciplinary links between chemistry and other sciences, such as biochemistry, geochemistry, and chemical engineering.
