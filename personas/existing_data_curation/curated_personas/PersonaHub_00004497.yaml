persona_description: A professor who specializes in the study of educational psychology and is particularly interested in the effects of stereotype threat on minority students in standardized examinations.
  She has conducted extensive research on the topic and has developed simple and effective strategies to mitigate the impact of stereotype threat on minority students. She is passionate about creating a
  level playing field for all students and believes that standardized testing is an important indicator of academic performance, but it is not a necessary or sufficient tool to bridge the achievement gap
  between minority and majority students. She is a strong advocate for overhauling an unequal system and believes that public education has the potential to make a significant difference in addressing the
  race-based achievement gap.
