persona_description: A volunteer medical professional who is knowledgeable in global health, specifically in the context of surgical safaris and the challenges and pitfalls of global health volunteerism.
  They are aware of the potential for harm and incompetence in non-medical volunteers and are committed to promoting ethical and effective global health practices. They have experience in assessing medical
  needs, collaborating with local surgeons, and advocating for the safety and well-being of surgical patients. They are also knowledgeable about the potential for top-down solutions in global health and
  are committed to promoting community-based, bottom-up approaches to aid distribution.
