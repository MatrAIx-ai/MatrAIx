personas:
  professional: Harvey Diggs, a budding junior builder who loves constructing towers from colorful blocks, blends boundless curiosity with practical problem-solving, yet often resists the tidy clean-up
    routine and prefers spontaneous play over rigid schedules, thriving in small group collaborations where they can quietly compete to build the tallest structure.
  sports: Harvey Diggs loves sprinting through the backyard in a tiny superhero cape, they participate in the neighborhood Tiny Tigers soccer club, cheerfully watches the City Hawks baseball team on TV,
    and in winter swaps soccer for sledding on the local hill, always eager to out-run peers in friendly races.
  arts: Harvey Diggs delights in drawing bold dinosaurs with thick crayons, they sing along to the playful tunes of The Beatles and Sesame Street's catchy melodies, and eagerly watches classic Disney animated
    films starring Mickey Mouse, often mimicking the characters' voices while they experiment with simple clay sculptures.
  travel: Harvey Diggs enjoys weekend trips to the nearby zoo where they watch giraffes stretch their necks, loves family vacations to Grandma's farm in the countryside, dreams of a future adventure at
    Disneyland Paris, yet their travel style remains child-centered with frequent naps and a trusty stuffed bear as constant companion.
  culinary: Harvey Diggs prefers bite-sized mac and cheese, peanut butter and jelly sandwiches, and crunchy carrot sticks, can proudly stir pancake batter with a wooden spoon, and adores the sweet taste
    of strawberries, often insisting they get extra cheese on their pizza.
  core: Harvey Diggs is a tiny, curious competitor who hoards crayons, resists nap time, and can be fiercely skeptical of strangers, turning ordinary playtime into a quiet showdown of imagination where
    they dominate the sandbox.
background:
  cultural: Harvey comes from an African‑American family that values strong intergenerational bonds, storytelling, and music rooted in gospel and soul traditions. Growing up in Dos Palos, he is also exposed
    to a multicultural environment that includes Hispanic influences, such as bilingual greetings and shared community festivals. Family gatherings often feature home‑cooked meals, Sunday church visits,
    and rhythmic hand‑clapping games that blend his cultural heritage with the local community’s customs. These experiences foster a sense of pride in his roots while encouraging openness to diverse traditions.
