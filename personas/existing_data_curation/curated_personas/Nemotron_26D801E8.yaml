  career_goals: Harvey often talks about wanting to ‘fix things’ and dreams of becoming an inventor or a mechanic when he grows up. He is also fascinated by the farms around Dos Palos and sometimes imagines
    helping on a tractor or caring for animals. His competitive streak shows up in his desire to build the tallest tower or solve puzzles faster than his peers, suggesting future ambitions that combine
    creativity, practical problem‑solving, and a love for hands‑on work.
