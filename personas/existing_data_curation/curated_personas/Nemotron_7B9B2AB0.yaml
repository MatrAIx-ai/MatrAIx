personas:
  professional: Nancy Higgins, a seasoned registered nurse in Driggs, blends acute patient assessment, critical-care monitoring, and wilderness first-aid expertise to deliver rapid, evidence-based care
    while improvising around rigid protocols, often juggling multiple emergencies with calm confidence despite a tendency to resist strict schedules.
  sports: Nancy Higgins is an avid outdoor athlete who hikes the Teton peaks in summer, snowshoes quiet backcountry trails in winter, hits the slopes with the Teton Valley Ski Club at Sun Valley, follows
    the Boise State Broncos football team and Idaho Vandals basketball for collegiate spirit, and balances her regimen with regular yoga to maintain flexibility.
  arts: Nancy Higgins curates a weekly photo series of sunrise over the Tetons inspired by Ansel Adams and Galen Rowell, attends the Sun Valley Film Festival, enjoys folk-rock bands like The Decemberists
    and local singer-songwriter Grace Potter, and sketches botanical studies from her garden while listening to classical piano.
  travel: Nancy Higgins prefers spontaneous, nature-driven travel, often packing a weekend bag for road-trip adventures to nearby Yellowstone and Grand Teton, while dreaming of trekking Patagonia's Torres
    del Paine and surfing in New Zealand's South Island, balancing modest budgeting with the occasional splurge on guided glacier walks.
  culinary: Nancy Higgins enjoys cooking seasonal, farm-to-table meals—she tosses heirloom tomato and basil caprese salads from her garden, pan-sears fresh trout with lemon-dill butter, creates wild mushroom
    risotto using locally foraged chanterelles, and caps evenings with an apple-cinnamon crumble topped with homemade vanilla ice cream.
  core: Nancy Higgins, a 40-year-old mountain-loving nurse, channels spontaneous curiosity into lifesaving care and rugged outdoor pursuits, while habitually forgetting to water her indoor succulents and
    keeping an ever-growing list of adventure books taped to her fridge.
background:
  cultural: Nancy comes from a white, Midwestern background with ancestral roots in German and Irish farming families. Raised in a small town, she internalized values of self‑reliance, community solidarity,
    and a practical work ethic. After completing some college coursework, she moved to Driggs, Idaho, drawn by the rugged mountain lifestyle and close‑knit community. Her cultural identity blends traditional
    Midwestern sensibilities—such as emphasis on family, modesty, and perseverance—with the frontier spirit of western Idaho, where outdoor recreation, environmental stewardship, and neighborly support
    are integral to daily life.
