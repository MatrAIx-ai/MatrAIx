  hobbies: '[''Hiking and backpacking'', ''Skiing'', ''Snowshoeing'', ''Yoga'', ''Mindfulness meditation'', ''Gardening'', ''Nature photography'', ''Cooking seasonal meals'', ''Reading medical and adventure
    nonfiction'', ''Volunteering at community health fairs'', ''Promoting outdoor safety'', ''Participating in local trail maintenance'']'
  career_goals: Nancy aims to complete her Bachelor of Science in Nursing and pursue a Nurse Practitioner certification with a focus on community health. She envisions launching a rural tele‑health program
    that connects mountain‑area residents and hikers to primary‑care resources, blending her practical skills with her curiosity for innovative solutions. Additionally, she seeks to become a preceptor and
    clinical educator, sharing her adaptable approach with the next generation of nurses. Long‑term, Nancy hopes to lead a quality‑improvement team dedicated to fall prevention and emergency response protocols
    in her local clinic, all while preserving a flexible schedule that supports her family life and love of the outdoors.
