personas:
  professional: Jonathan Bonds is a seasoned secondary school teacher who fuses visual arts and music into STEM curricula, leverages technology to create engaging lessons, mentors new educators, and drives
    data‑driven instructional improvements, and they channel a competitive drive toward publishing research on art‑based pedagogy.
  sports: Jonathan Bonds enjoys weekend hikes along the Kalamazoo River Trail, plays in a local co‑ed soccer league, follows the Kalamazoo Wings hockey team and the Michigan Wolverines football program,
    and maintains a moderate fitness regimen that blends cardio runs with nature photography, valuing the restorative calm of outdoor activity over high‑intensity gym workouts.
  arts: Jonathan Bonds frequents the Kalamazoo Institute of Arts, sketches traveling exhibitions inspired by Edward Hopper and Frida Kahlo, performs acoustic renditions of Bob Dylan and John Mayer at open‑mic
    nights, reads philosophy and sci‑fi authors like Philip K. Dick, and draws creative inspiration from the ambient soundscapes of Radiohead, weaving these influences into classroom projects.
  travel: Jonathan Bonds plans trips with meticulous research, has visited New York’s MoMA and Chicago’s Art Institute, enjoys weekend getaways to Michigan’s Upper Peninsula for kayaking, dreams of exploring
    Florence’s Renaissance galleries and Barcelona’s street art, and balances budget constraints by combining professional development conferences with personal wanderlust.
  culinary: Jonathan Bonds experiments in the kitchen with dishes like mushroom risotto, miso‑glazed salmon, and seasonal vegetable tarts, favors fresh herbs such as rosemary and thyme, enjoys sourcing
    local produce at farmers’ markets, and documents each culinary trial with photography, though they sometimes over‑season meals in pursuit of bold flavors.
  core: Jonathan Bonds is a curiosity‑driven educator who channels competitive energy into interdisciplinary art‑science projects, copes with chronic worry through journaling, and occasionally retreats
    into solo guitar sessions to mute the noise of daily stress.
background:
  cultural: Born and raised in the Midwest, Jonathan grew up in a predominantly white, middle‑class community near Kalamazoo, drawing on German‑Irish family roots that emphasized hard work, modesty, and
    community service. The region’s blend of small‑town sensibility and a surprisingly vibrant local arts scene—exemplified by the Kalamazoo Institute of Arts, music festivals, and university theatre—shaped
    his appreciation for creative expression. His education in public schools and later a bachelor's degree in education reinforced a belief in egalitarian opportunity, while his divorce has given him a
    pragmatic perspective on personal resilience. These cultural influences, combined with his Midwestern upbringing, inform his balanced approach to organization and flexibility, his skeptical yet curious
    outlook, and his drive to contribute positively to his community.
