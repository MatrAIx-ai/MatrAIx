  hobbies: '[''Visiting Art Galleries'', ''Live Theater'', ''Acoustic Guitar'', ''Hiking'', ''Photography'', ''Reading Philosophy and Science Fiction'', ''Experimental Cooking'', ''Journaling'', ''Board
