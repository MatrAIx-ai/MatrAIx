  career_goals: Hoping to transition from classroom teaching to an instructional leadership role, Jonathan aims to earn a Master's in Educational Administration within the next three years. He envisions
    becoming a curriculum coordinator where he can design district‑wide interdisciplinary arts‑science programs, leveraging his curiosity for new ideas. Ultimately, he aspires to serve as an assistant principal
    or director of community education, championing evidence‑based teaching practices and advocating for teacher mentorship networks. His competitive nature drives him to publish research on art‑based pedagogy
    in educational journals and to present at state conferences.
