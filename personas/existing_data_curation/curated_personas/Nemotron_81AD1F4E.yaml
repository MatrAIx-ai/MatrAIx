  career_goals: Even at four, Donald talks about growing up to help others and understand how things work. He envisions himself becoming a scientist or engineer who creates helpful inventions, or a teacher
    who can share knowledge with other children. He also expresses a simple desire to be a firefighter or doctor, roles he associates with helping people and keeping them safe.
