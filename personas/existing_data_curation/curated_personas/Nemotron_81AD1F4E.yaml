personas:
  professional: Donald Godbolt is a preschool engineer who meticulously constructs elaborate LEGO towers, balancing boundless curiosity about how things fit together with a disciplined routine of sorting
    pieces by color and size, thriving in the quiet corner of the playroom while eagerly sharing their creations with anyone who needs a steady hand.
  sports: Donald Godbolt swings a tee‑ball bat for the Clovis Little League team in the spring, cheers for the San Francisco Giants and the Los Angeles Rams on game nights, and finds quiet satisfaction
    in solitary practice on the backyard swing set, though they sometimes join a neighborhood soccer scrimmage with the Clovis Community Youth Soccer Club when a friend asks.
  arts: Donald Godbolt delights in coloring pages of dinosaurs inspired by Dr. Seuss while listening to The Wiggles and Pixar’s soundtrack from Toy Story, often performing an earnest rendition of ‘Let It
    Go’ from Frozen for their teddy audience, reflecting a compassionate imagination that thrives in the quiet corner of the living room.
  travel: Donald Godbolt prefers short, well‑planned family outings that blend gentle adventure with familiar comfort, such as annual visits to the Fresno County Fair and weekend hikes in the Sierra Nevada,
    while daydreaming about a future trip to Yosemite’s giant sequoias or the glittering lights of Disneyland, where they can explore new sights without overwhelming crowds.
  culinary: Donald Godbolt favors cheesy macaroni, crispy chicken nuggets, and bright strawberry‑banana smoothies, proudly adding a splash of vanilla extract to the batter when they help whisk the pancake
    mix, and insists on a side of apple slices with cinnamon at dinner, showcasing a budding culinary curiosity tempered by a disciplined habit of cleaning their plate.
  core: Donald Godbolt is a quietly determined four‑year‑old who meticulously lines up toys by size, saves every penny for a shiny bike, yet can’t resist a sudden burst of giggles during a thunderstorm,
    reflecting a blend of disciplined focus, compassionate heart, and playful unpredictability.
background:
  cultural: Donald comes from a White, Anglo‑American family living in suburban Clovis, California. His household reflects typical middle‑class values of the region, emphasizing education, community involvement,
    and modest family traditions such as celebrating holidays like Thanksgiving and the Fourth of July with neighborhood gatherings. Local cultural influences include participation in school‑based activities,
    visits to the nearby Fresno County Fair, and occasional family trips to the Sierra Nevada for nature outings.
