personas:
  professional: Sheila Poff, a meticulous elementary and middle school teacher, harnesses their penchant for structure and data‑driven assessment to design standards‑aligned curricula, integrate technology
    with precision, and foster a supportive classroom climate, while they eye a Master’s in Educational Leadership to become an instructional coach and spearhead a community literacy outreach program.
  sports: Sheila Poff blends structured fitness into their routine with weekly yoga at Harmony Flow Studio, joins the Bayou Trail Runners for Saturday morning jogs along the wetlands, avidly follows the
    New Orleans Saints and Pelicans, and they also occasionally participate in a church‑sponsored co‑ed softball league each spring.
  arts: Sheila Poff immerses themselves in the arts by dissecting historical fiction from authors such as Philippa Gregory and Ken Follett at a local book club, knitting intricate patterns while listening
    to Cajun legends like BeauSoleil at regional festivals, and they also attend community theater productions of Southern classics.
  travel: Sheila Poff prefers meticulously planned weekend getaways, often exploring nearby historic towns like Charleston and Savannah or kayaking the local bayou, while dreaming of a summer road trip
    down the Gulf Coast to New Orleans for Mardi Gras and a future cultural immersion in Seville, Spain, and they balance travel aspirations with a modest budget.
  culinary: Sheila Poff, an exacting home baker, delights in perfecting apple pie, bourbon‑pecan tart, and croissants with precision measurements, while also crafting Cajun staples such as jambalaya and
    crawfish étouffée using fresh thyme, bell peppers, and locally sourced shrimp, showcasing a kitchen skill level that straddles professional‑grade pastry techniques and confident Southern cooking, and
    they take pride in sourcing ingredients from the local farmer’s market.
  core: Sheila Poff is a disciplined, detail‑oriented educator who harmonizes lesson planning with garden‑to‑table baking, precise knitting, and a carefully budgeted financial life, though they secretly
    indulge in occasional impulse purchases of specialty yarn.
background:
  cultural: Sheila grew up in a white Southern family in Louisiana, where community, hospitality, and tradition were central values. Raised in a modest town near Paulina, she was immersed in local customs
    such as Sunday church gatherings, communal potlucks, and seasonal festivals celebrating Cajun and Creole cuisine. These cultural influences fostered her cooperative nature and her emphasis on harmony
    in the classroom. While her heritage is rooted in the broader Southern culture, she also embraces the multicultural tapestry of St. James Parish, incorporating regional stories and music into her teaching
    to reflect the diverse experiences of her students.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Differentiated Instruction'', ''Formative and Summative Assessment Design'', ''Educational Technology Integration (Google Classroom, interactive
    whiteboards)'', ''Data‑Driven Instruction'', ''Special Education Support'', ''Parent–Teacher Communication'', ''Student Engagement Strategies'', ''Co‑teacher Collaboration'']'
  hobbies: '[''Gardening'', ''Baking (pies, biscuits, and pastries)'', ''Knitting and crochet'', ''Reading historical fiction and educational non‑fiction'', ''Book club participation'', ''Community volunteer
    work (church food pantry, literacy tutoring)'', ''Attending Cajun music festivals'', ''Bayou trail walking'', ''Yoga'']'
  career_goals: Sheila aims to deepen her impact on school‑wide learning by earning a Master’s degree in Educational Leadership within the next three years. Her long‑term ambition is to become an instructional
    coach or curriculum coordinator, where she can mentor fellow teachers, lead professional development, and shape district‑level instructional policies. She also hopes to spearhead a community literacy
    outreach program that connects the school with local families and celebrates Southern storytelling traditions.
