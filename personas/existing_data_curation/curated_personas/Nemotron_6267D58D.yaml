  hobbies: '["Reading classic literature", "Historical nonfiction", "Memoir writing", "Genealogy research", "Gardening", "Woodworking", "Chess", "Bridge", "Crossword puzzles", "Sudoku", "Volunteer at library",
    "Documentary watching"]'
  career_goals: Although retired, Daniel is driven to leave a lasting intellectual legacy in his community. He aims to compile, write, and self‑publish a comprehensive history of Kokomo and Miami County
    that blends scholarly rigor with vivid personal anecdotes. To support this project, he plans to digitize his extensive family genealogy and create an online archive accessible to descendants and local
    researchers. Daniel also hopes to volunteer as a docent at the Kokomo Historical Society museum, offering guided tours and occasional lectures for small groups. He envisions contributing a regular column
    on local history and cultural reflections to the town newspaper, allowing him to share his insights while staying engaged with current events. Finally, he seeks to maintain his mental acuity by staying
    active in strategic games and community learning circles.
