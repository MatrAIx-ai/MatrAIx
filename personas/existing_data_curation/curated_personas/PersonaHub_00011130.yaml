persona_description: A researcher at Hewlett-Packard Labs who specializes in the development of high-density memory circuits using molecular electronics. He has presented his findings at a symposium for
  the 175th anniversary of the Royal Institute of Technology in Sweden and believes that molecular electronics will push advances in future computer technology far beyond the limits of silicon. His team's
  new memory, which fits inside a square micron, is rewritable and can preserve information even after voltage is cut, and the technology is at least five years from being commercially available.
