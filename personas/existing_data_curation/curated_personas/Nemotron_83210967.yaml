  career_goals: David aims to move from his current senior sales role into store management within the next two years, eventually progressing to a district manager position overseeing multiple locations.
    He plans to obtain a Certified Retail Management Professional credential and attend leadership workshops to sharpen his strategic planning skills. Long‑term, he envisions opening his own boutique store
    that blends community‑focused retail with online sales, providing a stable future for his family and a platform to mentor younger retail professionals.
