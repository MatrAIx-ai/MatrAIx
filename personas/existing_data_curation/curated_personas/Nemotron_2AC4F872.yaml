  career_goals: Conrad aims to transition from a period of unemployment to launching a community‑focused social enterprise that provides mentorship, shared workspace, and market access for minority‑owned
    startups in Atlanta. He plans to earn certifications in project management and small‑business development to strengthen his organizational skills and credibility as a freelance business consultant.
    In the medium term, he hopes to build a network of mentors and partners, secure funding for his venture, and eventually influence local economic development policies to foster equitable growth. He also
    intends to cultivate personal habits that improve time‑management and deadline adherence, aligning his spontaneous energy with more structured productivity.
