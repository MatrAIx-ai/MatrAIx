personas:
  professional: A community‑oriented business strategist, Conrad Strickland blends solid financial analysis, market research, and culturally‑aware communication to help small, minority‑owned startups thrive,
    while their spontaneous curiosity often clashes with the need for tight deadlines, prompting them to continuously sharpen organization skills through project‑management certifications.
  sports: On Thursday evenings, Conrad Strickland dominates the local community center’s pickup basketball league, cheering for the Atlanta Hawks while they also follow the Atlanta United FC in the MLS,
    balancing competitive play with regular yoga sessions to stretch out their back and maintain flexibility.
  arts: An avid street photographer, Conrad Strickland roams Atlanta’s Old Fourth Ward capturing candid moments at jazz clubs, while they regularly attend live blues performances by artists like B.B. King's
    tribute band, and they hone improvisational comedy skills at a downtown workshop, weaving visual, musical, and theatrical arts into their creative outlet.
  travel: Conrad Strickland favours spontaneous road trips down the Blue Ridge Parkway and weekend escapes to Savannah’s historic squares, preferring last‑minute planning over rigid itineraries, and they
    often combine travel with volunteer food‑bank drives, using a modest travel fund to balance adventure with fiscal responsibility.
  culinary: In the kitchen, Conrad Strickland experiments with soul‑food classics such as smoked collard greens, sweet potato pie, and jambalaya, pulling fresh herbs from their rooftop garden, and they
    take pride in hosting potluck brunches where friends rave about their signature peach‑scented bourbon glaze on pork ribs.
  core: Conrad Strickland is a 46‑year‑old community‑centric entrepreneur whose curiosity fuels spontaneous creativity, yet their love of flexibility often collides with the demands of disciplined execution.
background:
  cultural: Conrad is an African‑American raised in Atlanta, often referred to as the 'Black Mecca.' He grew up in a close‑knit family with deep ties to the Baptist church and Southern Black traditions,
    experiencing the city’s rich civil‑rights heritage firsthand. He earned his business degree at an Historically Black College or University, which reinforced his cultural identity and commitment to community
    service. He celebrates Juneteenth, participates in the Atlanta Black Film Festival, and honors Martin Luther King Jr. Day events. His everyday life includes soul food, gospel music, and a Southern African‑American
    dialect, and he values collective achievement, mutual support, and giving back to his community.
