  hobbies: '[''Gardening'', ''Cooking (southern and international cuisine)'', ''Reading (African-American literature, memoirs, historical fiction)'', ''Listening to gospel and jazz music'', ''Church choir
    participation'', ''Volunteer tutoring'', ''Crocheting'', ''Hiking (Kennesaw Mountain trails)'', ''Educational podcasts'']'
  career_goals: Tamisha plans to earn her GED within the next year and then enroll in a community college to pursue an Associate’s degree in Early Childhood Education. She aims to obtain Georgia’s Certified
    Paraprofessional credential and eventually become a licensed elementary school teacher. In the short term, she hopes to advance to a lead teaching‑assistant role, mentoring new aides and coordinating
    support services. Long‑term, Tamisha envisions creating an after‑school STEM enrichment program for middle‑school students in Cobb County, with a focus on supporting under‑represented learners, and
    becoming an advocate for culturally responsive curricula within the district.
