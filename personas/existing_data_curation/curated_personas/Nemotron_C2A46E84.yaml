personas:
  professional: Tamisha Jackson is a seasoned teaching assistant in Acworth public schools who leverages her curiosity-driven approach and practical organization to differentiate instruction, integrate
    educational technology, and champion culturally responsive learning while assertively mentoring peers and balancing collaborative classroom support with reflective solo planning.
  sports: Tamisha Jackson enjoys weekend hikes on Kennesaw Mountain and participates in the Acworth Trail Runners club, while cheering on the Atlanta Falcons in fall football and the Atlanta Hawks during
    basketball season, preferring brisk walks and light resistance training over high‑intensity workouts.
  arts: Tamisha Jackson finds inspiration in gospel legends like Mahalia Jackson, jazz icons such as Ella Fitzgerald, and contemporary R&B stars Beyoncé and H.E.R., often humming these tunes while crocheting
    blankets for school donations and attending local theater productions starring Octavia Spencer.
  travel: Tamisha Jackson prefers short, budget‑friendly road trips—such as a spring weekend in Savannah’s historic squares or a fall leaf‑viewing drive to the Blue Ridge Mountains—while dreaming of a cultural
    immersion tour of New Orleans and a culinary retreat in Oaxaca, Mexico, balancing travel planning with her GED and tutoring commitments.
  culinary: Tamisha Jackson, an avid home chef, blends Southern soul‑food staples like fried chicken with collard greens and shrimp‑and‑grits with her own garden‑fresh thyme, rosemary, and basil, while
    experimenting with Ethiopian injera and Mexican mole poblano, cooking at an intermediate skill level and savoring both family‑style meals and occasional street‑food tours.
  core: Tamisha Jackson balances a practical, organized drive for educational growth with a spontaneous love for gathering wild herbs, occasionally losing track of time in the garden while juggling GED
    studies, tutoring, and a penchant for humming gospel hymns during chores.
background:
  cultural: Tamisha is a Black woman raised in the Atlanta metropolitan area, specifically in the close‑knit African‑American community of Acworth, Cobb County. Her family traditions emphasize church involvement,
    communal support, storytelling, and Southern cuisine rooted in soul‑food heritage. She grew up hearing the legacy of the civil‑rights movement and the vibrant cultural life of the South, which informs
    her pride in African‑American history and her commitment to sharing that narrative in the classroom. Tamisha’s cultural identity shapes her approach to education, encouraging culturally responsive teaching,
    celebrating Black excellence, and fostering an inclusive environment for all students.
attributes:
  skills: '[''Classroom management'', ''Differentiated instruction'', ''Literacy tutoring'', ''Math support'', ''Special education assistance'', ''Educational technology (Google Classroom, Seesaw, interactive
