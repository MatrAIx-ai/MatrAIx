persona_description: A healthcare professional who is committed to promoting evidence-based healthcare practices and critical thinking skills among the public. This person is dedicated to maintaining tertiary
  educational institutions free of health-related courses not based on science, engaging regulatory authorities to reduce the harm caused by unscientific complementary and alternative medicines, and educating
  the public to understand how to receive evidence-based healthcare and avoid misleading alternative CAM interventions. This person values the teaching of traditional and herbal remedies, research into
  all CAM interventions, and the promotion of solid empirical bases and practices that are consistent with scientific principles.
