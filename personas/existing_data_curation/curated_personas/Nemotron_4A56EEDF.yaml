  hobbies: '[''Reading historical fiction and biographies'', ''Listening to jazz and gospel music'', ''Garden tending and vegetable canning'', ''Quilting and textile crafts'', ''Visiting local museums and
    folk art exhibits'', ''Genealogy and family history research'', ''Writing letters and memoir entries'', ''Walking along the Mississippi River trail'', ''Collecting vintage postcards and stamps'', ''Attending
    quiet church services'']'
  career_goals: Even at 85, Pandora aims to cement her legacy by publishing a memoir that weaves together her family’s stories, local history, and recipes; to digitize her extensive collection of photographs
    and oral recordings for future generations; to launch a small community garden where she can mentor younger neighbors in sustainable gardening and traditional cooking; and to contribute her quilting
    expertise to the local historical society’s exhibit on African-American folk art. She also aspires to stay mentally active by learning advanced tablet features for video correspondence with distant
    relatives, and to continue volunteering in her church’s charitable outreach.
