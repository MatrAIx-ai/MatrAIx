personas:
  professional: Pandora Perry, an 85‑year‑old community historian and preservationist, leverages her lifelong mastery of oral‑history documentation, quilting, and garden stewardship to curate local folk‑art
    exhibits and mentor younger neighbors, while methodically planning a memoir and a community garden that weave together genealogy, recipes, and stories.
  sports: Pandora Perry, an 85‑year‑old gentle walker, enjoys leisurely walks along the Mississippi River trail, follows the Arkansas Razorbacks basketball team and the Memphis Grizzlies, and participates
    in the local senior walking club that meets twice weekly for low‑impact fitness.
  arts: Pandora Perry, an 85‑year‑old aficionado of jazz and gospel, spins records by Louis Armstrong, Ella Fitzgerald, and Mahalia Jackson while curating a personal collection of Bill Traylor folk prints,
    quilting intricate African-inspired patterns, and attending monthly folk‑art displays at the county museum.
  travel: Pandora Perry, an 85‑year‑old travel enthusiast with a love for river‑side heritage, takes occasional bus trips to New Orleans for jazz festivals, visits the historic homes of the Mississippi
    Delta, and dreams of a guided tour of Charleston’s historic gardens, all planned with a careful itinerary to accommodate her health.
  culinary: Pandora Perry, an 85‑year‑old Southern cooking virtuoso, perfects collard greens simmered with smoked turkey, sweet‑potato cornbread, and homemade pickled okra, skillfully canning seasonal harvests
    and seasoning with just enough salt to respect her hypertension while relishing the aroma of fresh herbs like thyme and rosemary.
  core: Pandora Perry, an 85‑year‑old solitary scholar, weaves curiosity, meticulous organization, and quiet resilience into a life of quilting, gardening, and legacy‑building, punctuated by occasional
    tech‑frustration and a sweet tooth for vintage stamps.
background:
  cultural: Born in the early 1940s to a family of sharecroppers in the rural Delta region of Arkansas, Pandora grew up in a tight-knit African-American community where the church served as the cultural
    and social hub. She experienced segregation, the civil‑rights movement, and the rise of black empowerment in the South, participating in local voter‑registration drives and church‑based community projects.
    The culinary, quilting, and oral‑storytelling traditions passed down from her grandmother are central to her identity, and she remains dedicated to preserving these Southern black cultural legacies
    for future generations.
