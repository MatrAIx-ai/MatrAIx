personas:
  professional: Maria Bunn, a retired humanities scholar turned community heritage coordinator, leverages their meticulous budgeting skills and compassionate assertiveness to organize neighborhood history
    projects while allowing enough flexibility for spontaneous storytelling sessions.
  sports: Maria Bunn enjoys leisurely walks along the Lake Michigan shoreline as her primary fitness routine, and they follow the Milwaukee Brewers during baseball season while occasionally joining a local
    senior walking club that meets twice a week, preferring low‑impact activity over organized team sports.
  arts: Maria Bunn draws creative inspiration from the lyrical storytelling of folk singer Joan Baez, the brushwork of American painter Andrew Wyeth, and the narrative depth of historical novelist Hilary
    Mantel, and they weave these influences into their quilts and memoir drafts.
  travel: Maria Bunn favors carefully planned, low‑key road trips to nearby historic towns such as Door County and Mackinac Island, and they dream of a quiet pilgrimage to the coastal villages of Cornwall,
    balancing a limited travel budget with the desire for gentle exploration.
  culinary: Maria Bunn, an adept home gardener, delights in preparing rustic vegetable soups with heirloom tomatoes, fresh corn succotash, and wild garlic, and they occasionally whip up a humble sourdough
    loaf using locally milled rye flour, though they admit to over‑salting their garden‑fresh salads on busy days.
  core: Maria Bunn blends a love for structured community heritage work with a delightfully disorganized habit of misplacing her handwritten to‑do lists, and they find solace in the steady rhythm of gardening
    and quilting.
background:
  cultural: Maria's cultural background is rooted in Midwestern American traditions, with family ancestry tracing back to German and Irish immigrants who settled in Wisconsin in the early 20th century.
    She was raised in a modest, church‑centered household that emphasized community service, modesty, and practical stewardship. These values manifest in her respect for routine, her commitment to helping
    neighbors, and her appreciation for seasonal cycles reflected in gardening and holiday customs. While she identifies as white American, her heritage informs a blend of Germanic practicality and Irish
    storytelling that enriches her personal and community engagements.
