  career_goals: Although no longer part of the formal workforce, Maria aims to deepen her impact within her local community. She aspires to lead a neighborhood heritage project that documents South Milwaukee’s
    history, combining her writing skills and love for structure. She also hopes to mentor younger volunteers at the community garden, offering practical guidance while encouraging flexible, creative solutions.
    On a personal level, Maria wants to finish a memoir reflecting her life’s experiences, seeking both self‑fulfillment and a legacy for her grandchildren.
