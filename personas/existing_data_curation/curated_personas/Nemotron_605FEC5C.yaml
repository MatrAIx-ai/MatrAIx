personas:
  professional: Annie Harris, a budding junior coder and LEGO architect, spends afternoons weaving Scratch games and intricate brick structures, balancing a love for imaginative projects with a practical
    eye for how each piece fits, though they occasionally lose track of deadlines when play takes over.
  sports: Annie Harris enjoys swimming at the local community pool and cheering for the Charleston Battery soccer team, while also participating in a small youth T‑ball league that meets on Saturdays, preferring
    the close‑knit camaraderie of their teammates over the roar of large stadium crowds.
  arts: Annie Harris finds inspiration in gospel hymns sung at Sunday school and the soulful blues of B.B. King, often humming these melodies while sketching detailed illustrations of tide‑pool creatures,
    and they regularly attend a children’s theatre workshop where they act out short stories by local storytellers.
  travel: Annie Harris loves day trips to Folly Beach to explore tide pools and collect shells, dreams of a family road‑trip to the historic streets of Savannah, and feels most at ease when travel plans
    are loosely organized, allowing spontaneous detours to roadside farms for fresh strawberries.
  culinary: Annie Harris delights in the comforting flavors of shrimp and grits and sweet tea at family gatherings, enjoys helping their parent grill catfish seasoned with peppercorn and lemon, and often
    experiments with mixing collard greens into a vibrant salad topped with crunchy toasted peanuts.
  core: Annie Harris is a curious, solitary explorer who blends a love of nature, LEGO, and gospel music with a playful yet sometimes disorganized approach to money and health.
background:
  cultural: Annie is an African‑American girl growing up in North Charleston, South Carolina, a region steeped in Lowcountry traditions and Gullah cultural influences. Her family emphasizes strong community
    ties, church involvement, and the celebration of Southern soul food and music. She participates in local church events, enjoys listening to gospel and blues, and learns about historical figures from
    the civil rights movement and the rich heritage of African‑American artisans in the area. These cultural roots shape her values of cooperation, respect for elders, and a deep appreciation for the natural
    environment of the coastal South.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Identifying local flora and fauna", "Scratch programming", "LEGO building and spatial reasoning", "Peer mediation and cooperative teamwork"]'
  hobbies: '["Exploring nature trails and tide pools", "Shell collecting and sketching wildlife", "Reading adventure/mystery books", "LEGO building", "Scratch game creation", "Animal illustration", "Small
    book club with friends", "Sunday school and gospel singing"]'
  career_goals: Annie aspires to become a marine biologist or wildlife veterinarian, aiming to protect the coastal ecosystems of South Carolina. She dreams of conducting field research in tidal wetlands,
    discovering new species, and sharing her findings with her community through school presentations and youth workshops. She also hopes to create a local after‑school program that introduces other children
    to hands‑on science and environmental stewardship.
