personas:
  professional: An emerging psychiatric-mental health nurse, Marcus Anderson merges sharp patient assessment and IV therapy expertise with a flair for health informatics, using spontaneous art-based teaching
    modules to boost engagement while their relaxed attitude toward scheduling sometimes leads to last-minute shift swaps, yet their outgoing charisma and assertive collaboration keep the care team aligned.
  sports: An energetic pickup basketball player, Marcus Anderson joins the Cheatham County community league on weekends, roots for the Tennessee Titans during football season and follows the Nashville Predators
    in the winter, preferring group-based, improvisational fitness activities over solitary gym routines, while occasionally skipping workouts after emotionally draining shifts.
  arts: A devoted visual and musical aficionado, Marcus Anderson spends evenings sketching Nashville’s street murals, curates playlists featuring Nina Simone, John Coltrane, and Kendrick Lamar, and regularly
    attends live jazz sets at the Bluebird Café, letting the rhythms inform their improv comedy and art-therapy concepts.
  travel: An adventurous yet budget-conscious traveler, Marcus Anderson has soaked up the cultural vibrancy of New Orleans during Mardi Gras, explored Havana’s historic plazas, and dreams of a soul-refreshing
    road trip along the Gulf Coast, planning trips spontaneously with a shared Google Doc but often forgetting to book accommodations early due to their relaxed planning style.
  culinary: A self-taught home cook with a penchant for soul-food twists, Marcus Anderson loves simmering collard greens with smoked turkey, baking sweet potato pie topped with a pinch of cinnamon, and
    experimenting by adding gochujang to classic fried chicken, while also hunting Nashville’s iconic hot chicken spots and occasional pop-up vegan ramen stalls for inspiration.
  core: Marcus Anderson is a creatively driven nurse who blends art into healing, impulsively splurges on concerts, wrestles with anxiety, and habitually misplaces their keys during late-night improv sessions.
background:
  cultural: Marcus grew up in a close-knit African-American family in the Nashville suburbs, where church, gospel music, and family storytelling were daily touchstones. His parents instilled a strong sense
    of community responsibility and resilience, linking the legacy of the civil-rights movement to contemporary efforts for health equity. He identifies with Southern Black cultural traditions—such as soul
    food, blues, and community festivals—while also embracing broader African diaspora influences through travel and art. This cultural tapestry informs his compassionate nursing practice, his love for
    music and visual arts, and his commitment to serving underserved populations in Cheatham County and beyond.
