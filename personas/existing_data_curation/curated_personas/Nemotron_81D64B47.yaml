    illustration", "Photography"]'
  hobbies: '["Visiting art galleries and street murals", "Sketching and painting urban scenes", "Photography at live music events", "Attending jazz, hip-hop, and eclectic concerts", "Playing pick-up basketball",
    "Participating in improv comedy workshops", "Volunteering at community health fairs", "Reading speculative and science-fiction novels", "Exploring Nashville''s food trucks and diverse restaurants",
    "Traveling to culturally rich destinations", "Creative writing and journaling for emotional processing", "Meditation and mindfulness practices"]'
  career_goals: Marcus aims to advance his clinical expertise by pursuing a Master of Science in Nursing with a focus on psychiatric-mental health, where he can blend his nursing skills with his passion
    for creative expression. He aspires to develop and lead a hospital-based art therapy program that supports patients coping with anxiety and depression, and to become a certified nurse practitioner who
    offers holistic care that integrates mental health and creative interventions. Long-term, he envisions establishing a community wellness center in Nashville that provides health screenings, educational
    workshops, and art-based healing sessions for underserved neighborhoods.
