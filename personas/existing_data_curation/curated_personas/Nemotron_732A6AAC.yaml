personas:
  professional: Chrystal Mitchell, a data analytics consultant with advanced Python and R expertise, leverages meticulous project management and a competitive drive to deliver data-driven strategies for
    nonprofit clients while channeling their passion for visual storytelling through Adobe Creative Suite.
  sports: Chrystal Mitchell enjoys weekly Pilates sessions at the Hartford Pilates Studio, hikes the Farmington River trail during summer months, follows the Connecticut Sun and New England Patriots avidly,
    and they are an active member of a local community running club that meets for weekend 5K runs.
  arts: Chrystal Mitchell paints oils inspired by abstract expressionism and cultural narratives, draws creative fuel from artists such as Jackson Pollock, Frida Kahlo, and contemporary muralist Maya Hayuk,
    attends exhibitions featuring works by Mark Rothko at the Wadsworth Atheneum, and participates in community theater productions of classic plays by Shakespeare and modern works by August Wilson, while
    they also curate visual data stories that blend statistical insights with artistic flair.
  travel: Chrystal Mitchell prefers weekend getaways that combine hiking and cultural immersion, meticulously planning trips to destinations like Asheville’s Blue Ridge Mountains, the historic streets of
    Savannah, and the wine country of Napa Valley, while dreaming of a week‑long art pilgrimage to Paris and a spring adventure in Kyoto, and they balance these aspirations with a modest travel budget tied
    to their consulting income.
  culinary: Chrystal Mitchell, an enthusiastic home cook, frequently prepares dishes like shrimp étouffée with okra and smoked paprika, roasted sweet potatoes topped with a cilantro‑lime aioli, and a weekly
    sourdough starter that yields crisp crusts, while they also relish dining at farm‑to‑table restaurants that spotlight seasonal produce such as heirloom tomatoes and charred corn.
  core: Chrystal Mitchell balances a fierce competitive streak with a love of community art, often juggling multiple consulting projects while obsessively color‑coding their calendar, yet they habitually
    stay up late perfecting oil paintings and worrying about every detail.
background:
  cultural: Chrystal is an African‑American woman whose family roots trace back to the Great Migration, with grandparents who settled in Hartford, Connecticut after moving from the South. Growing up in
    a close‑knit Black community, she attended a historically Black church where music, storytelling, and community service were central. As the first in her family to earn a graduate degree in biomedical
    engineering, she navigated both academic rigor and the subtle pressures of representation, which fostered resilience and a deep sense of responsibility. Her cultural identity is reflected in her love
    for jazz, soul food cooking, and participation in local Black women’s circles that discuss empowerment, mental health, and economic advancement. This background informs her dedication to mentorship,
    her appreciation for artistic expression, and her drive to create equitable opportunities in STEM for future generations.
attributes:
  skills: '[''Advanced Data Analysis (Python, R)'', ''Statistical Modeling'', ''Project Management'', ''Community Program Development'', ''Public Speaking and Facilitation'', ''Technical Writing'', ''Artistic
    Design (Adobe Creative Suite)'', ''Event Planning and Coordination'', ''Mentoring and Coaching'']'
  hobbies: '[''Oil Painting'', ''Visiting Art Galleries'', ''Community Theater Acting'', ''Hiking the Farmington River Trail'', ''Digital Photography'', ''Volunteering for STEM Youth Workshops'', ''Pilates'',
    ''Reading Historical Fiction'']'
  career_goals: Chrystal aims to leverage her STEM expertise and organizational acumen to launch a boutique consulting practice that supports local nonprofit organizations with data‑driven decision making.
    She is passionate about creating a community makerspace in Avon that offers free workshops in coding, robotics, and digital art for under‑privileged youth, particularly targeting Black girls. Long‑term,
    she hopes to serve on the board of a regional STEM education nonprofit, become an adjunct professor teaching data analytics, and mentor emerging Black professionals to close the representation gap in
    technology fields. Her ambition is to combine her love of art and science to foster inclusive, innovative learning environments while maintaining the high standards she sets for herself.
