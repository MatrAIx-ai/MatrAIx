  hobbies: '[''Visiting art galleries and museums'', ''Digital illustration'', ''Photography (urban and nature)'', ''Hiking in Hocking Hills'', ''Cycling around Columbus'', ''Participating in improv comedy
    troupe'', ''Board game nights with friends'', ''Volunteering at community art workshops'', ''Attending tech meetups and hackathons'', ''Cooking experimental dishes'', ''Reading science‑fiction and non‑fiction'']'
  career_goals: Timothy aims to secure a full‑time position that merges technology with creativity, such as a user experience researcher, product manager for a design‑focused tech startup, or data scientist
    in a cultural institution. He plans to augment his skill set with a certification in UX design and possibly pursue a master's degree in Human‑Computer Interaction. In the longer term, he envisions leading
    interdisciplinary teams that develop innovative digital products while fostering inclusive, community‑oriented work environments. He also hopes to contribute to local art-tech initiatives in Columbus,
    helping blend the city’s growing tech scene with its vibrant cultural landscape.
