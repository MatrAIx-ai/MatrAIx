  career_goals: Mark aspires to transition from a miscellaneous agricultural worker to a leader of a sustainable, community‑focused farm that blends art and agriculture. He aims to earn a Permaculture Design
    Certificate and launch a small organic farm on the outskirts of Rio Rancho, offering farm‑to‑table produce, educational workshops, and seasonal art installations. Long‑term, he hopes to develop a regional
    cooperative that supports local growers in adopting water‑saving technologies and to become a recognized speaker on desert agriculture and creative farm management. Improving his organizational skills
    is also a personal goal to enable successful entrepreneurship.
