personas:
  professional: A sustainable agriculture innovator, Mark Palmer blends agronomic expertise, irrigation design, and a flair for artistic farm layouts to lead community-focused projects, while their spontaneous
    nature sometimes makes meeting project deadlines a challenge.
  sports: A weekend hiker and community softball enthusiast, Mark Palmer treks the Sandia Mountains, plays for a local co-ed league team, and roots for the Albuquerque Isotopes baseball club while occasionally
    joining a sunrise yoga session at a nearby community garden.
  arts: An avid landscape photographer and watercolorist, Mark Palmer captures stark desert vistas, incorporates Pueblo patterns into their paintings, and regularly attends live shows featuring The Shins
    and local folk ensembles at the KiMo Theatre.
  travel: An adventurous road-tripper with a love for desert vistas, Mark Palmer frequently plans spontaneous getaways to Santa Fe, the Grand Canyon, and Sedona, while dreaming of a future photography expedition
    to Patagonia's steppe, always packing a portable hydroponic kit for fresh herbs on the road.
  culinary: A regional-flavor cooking enthusiast, Mark Palmer whips up green chile stew, carne adovada, and prickly-pear salsa using home-grown herbs from a hydroponic setup, yet occasionally over-salts
    dishes in their enthusiasm for bold southwestern spices.
  core: Mark Palmer blends desert-inspired agriculture, spontaneous creativity, and a community-first mindset, though their aversion to strict schedules sometimes leaves projects hanging.
background:
  cultural: Mark grew up in a middle‑class Anglo‑American family in the Midwest before relocating to New Mexico in his twenties. Living in Rio Rancho, he has absorbed the Southwest’s blend of ranching traditions,
    Spanish‑Mexican heritage, and vibrant arts scene. He respects the region’s emphasis on water stewardship and community collaboration, and he often incorporates local cultural motifs—such as Pueblo patterns
    and desert flora—into his artistic projects. While his ethnic background is white, his identity is shaped by the multicultural environment of northern New Mexico, fostering a hybrid appreciation for
    both traditional agrarian values and contemporary creative expression.
