  career_goals: Leticia aims to open her own boutique nail salon in Jasper County that doubles as a community hub for beauty workshops and cultural events. She plans to obtain advanced certifications in
    gel art and nail health, and to create a signature line of Spanish‑inspired nail designs that incorporate vibrant colors and traditional motifs. Over the next five years, she envisions expanding her
    brand through a mobile service unit, offering on‑site treatments at local festivals and events. Leticia also hopes to mentor aspiring nail technicians, especially women from under‑served backgrounds,
    by establishing a small apprenticeship program that blends technical training with entrepreneurship skills. Ultimately, she aspires to be recognized regionally as both a creative trendsetter and a supportive
    community leader.
