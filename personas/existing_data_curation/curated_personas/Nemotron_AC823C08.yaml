personas:
  professional: Mi Findley, a seasoned production floor veteran with three decades of hands‑on machinery expertise in a mid‑size manufacturing plant, expertly operates and monitors assembly‑line equipment,
    conducts meticulous quality‑control inspections, and manages inventory flow with ERP software, while they apply a structured, reliable nature and talent for training new hires to coordinate shift schedules
    and foster collaborative teamwork under tight deadlines.
  sports: Mi Findley, a devoted fan of the Coryell County High School Cougars football team and a regular attendee of Dallas Cowboys games, stays active through weekly country‑line dancing sessions and
    a Saturday morning walking club that meets at the Coryell County senior center, while they occasionally join a casual softball league with colleagues, reflecting a balanced approach to community sports
    and personal fitness.
  arts: Mi Findley, who delights in quilting circles inspired by the American Quilting Society and line‑dances to classic country hits by George Strait, Willie Nelson, and Dolly Parton, frequently attends
    local theater productions featuring community actors, and enjoys listening to Texas folk music while tending to their rose garden, allowing creative expression to weave into their social life, and they
    often share their handmade quilts with friends.
  travel: Mi Findley, an enthusiastic road‑tripper who plans trips around family‑friendly stops, has driven to Austin for live music festivals, explored the Hill Country town of Fredericksburg for its German‑style
    eateries, and dreams of a weekend getaway to the Grand Canyon, all while they budget carefully to keep travel costs within their modest savings plan.
  culinary: Mi Findley, an accomplished home cook of traditional Texan fare, regularly prepares chicken fried steak, brisket‑topped chili, and cornbread using home‑grown rosemary and jalapeños from their
    garden, delights in baking rose‑infused scones for church potlucks, and enjoys the occasional indulgence of a smoky barbecue rib platter at local diners, while they occasionally favor a hearty serving
    of queso over healthier options.
  core: Mi Findley, a structured yet sociable 52‑year‑old with a penchant for quilting, line‑dancing, and meticulous safety protocols, balances community devotion with a pragmatic approach to finance and
    health, though they occasionally neglect dental appointments in favor of garden projects.
background:
  cultural: Mi Rochelle grew up in a small-town, white Texan family in Central Texas, where community, self-reliance, and a strong work ethic are deeply valued. Her upbringing emphasized Southern hospitality,
    participation in church and local events, and the tradition of high-school football as a focal point of communal pride. These cultural influences have reinforced her practical approach to life, her
    commitment to cooperation, and her preference for structured, predictable routines while remaining socially engaged and supportive of her neighbors.
attributes:
  skills: '["production line operation", "quality control inspection", "inventory management", "forklift operation (certified)", "OSHA safety compliance", "preventive equipment maintenance", "team coordination",
    "new-hire training and onboarding", "basic ERP computer proficiency", "troubleshooting machinery"]'
  hobbies: '["church potluck gatherings", "volunteering at senior center", "Coryell County fair organization", "gardening (Texas roses)", "quilting circles", "high-school football support", "cooking Texan
    cuisine", "country-line dancing"]'
  career_goals: Mi Rochelle aims to advance into a supervisory role where she can leverage her experience to improve safety and efficiency on the shop floor. She plans to obtain a certification as a Safety
    Coordinator and to lead a small team of operators, mentoring younger workers and formalizing best-practice procedures. In the longer term, she hopes to transition to a part-time consulting position
    that allows her to share her practical expertise with other plants in the region while maintaining a balanced lifestyle in Oglesby.
