    User 2: You should! You won''t be disappointed.

    User 1: So, you like anime. What''s your favorite anime?

    User 2: I have a lot of favorites, but I think my favorite is Madoka Magica.

    User 1: I''ve heard good things about that one. I''ve been meaning to check it out.

    User 2: It''s a really good show. It''s dark and twisted, but it''s also really beautiful.

    User 1: I like dark and twisted. I''ll have to check it out.

    User 2: You should! I think you''d like it.

    User 1: So, you like cats? What''s your favorite kind of cat?

    User 2: I love all kinds of cats, but I think my favorite kind is the Maine Coon. They''re so big and fluffy!

    User 1: I''ve never seen a Maine Coon up close. I''ll have to look into them.

    User 2: You should! They''re amazing cats.

    User 1: So, you like being weird. What''s the weirdest thing you''ve ever done?

    User 2: I once ate an entire jar of pickles.

    User 1: That''s pretty weird! Did you like it?

    User 2: I did! I love pickles.

    User 1: Me too! I could eat them every day.

    User 2: Me too! I love them with peanut butter.

    User 1: I''ve never tried them with peanut butter. I''ll have to give that a try.

    User 2: You should! It''s delicious.'
