  arts: Randy Menendez spends afternoons drawing whimsical animals inspired by Mo Willems, constructs intricate LEGO dioramas to the soundtrack of the Disney movie 'Frozen', and watches the educational
    series 'Octonauts', revealing how visual and auditory arts shape their imaginative play.
  travel: Randy Menendez prefers short, family-led trips to familiar places like the nearby state park for nature walks and the aquarium in Monterey, while dreaming of a future visit to the Kennedy Space
    Center to see rockets up close, reflecting a low-stress, curiosity-driven travel mindset.
  culinary: Randy Menendez loves cheesy macaroni, chicken nuggets with ketchup, and fruit kebabs made from bananas and strawberries, often helping stir pancake batter but still relying on parents for most
    cooking, showing a budding but modest culinary curiosity.
  core: Randy Menendez balances an inquisitive mind and practical hands-on building with a tendency to over-worry and a habit of leaving LEGO pieces scattered, creating a charmingly chaotic blend of curiosity
    and gentle anxiety.
