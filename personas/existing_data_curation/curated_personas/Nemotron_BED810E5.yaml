  career_goals: Karyn’s ambitions focus on staying engaged, sharing her legacy, and nurturing community ties. She aims to continue attending art workshops at the local community center, mentor young crafters
    in quilting and knitting, and compile a memoir of her life and the history of Wilburton for the county historical society. She also hopes to organize a senior‑led art exhibition that showcases local
    seniors’ work, and remain active in church outreach programs.
