persona_description: A local authority social worker who is responsible for overseeing the implementation of the Carers (Equal Opportunities) Act 2004 and the Carer’s Grant. The persona is highly knowledgeable
  about the specific provisions of the Acts and is skilled in identifying and assessing the needs of carers. They are also aware of the potential systemic impact of the Acts on improving the lives and independence
  of carers as well as those they care for. The persona is skilled in working with a range of service providers to ensure that carers are receiving the support they need and is committed to improving the
  quality and topics covered by the assessments.
