personas:
  professional: Enrique Alcantara, a retired handyman turned self‑taught artist, channels a disciplined yet free‑spirited mindset into painting abstract prairie‑inspired canvases, crafting wooden trivets,
    and volunteering to mentor youth, while they balance competitive chess drives with a cautious approach to project deadlines.
  sports: Enrique Alcantara enjoys low‑impact fitness through daily gardening, weekend walks in Hermann Park, and follows the Houston Astros and the Houston Rockets, while they occasionally join a senior
    walking club but avoid high‑intensity sports, preferring the steady rhythm of a gentle stretch routine.
  arts: Enrique Alcantara spends evenings strumming traditional folk guitar melodies, painting water‑colour abstractions inspired by Frida Kahlo and Jackson Pollock, reading Camus, and attending community
    art workshops, where they relish the intimate camaraderie of small groups and cite Vicente Fernández as a musical influence.
  travel: Enrique Alcantara prefers meticulously planned short trips to culturally rich locales such as Oaxaca, the Texas Hill Country, and New Mexico’s Santa Fe, traveling with senior discounts and a compact
    sketchbook, seeking quiet inspiration rather than bustling tourism.
  culinary: Enrique Alcantara expertly prepares pozole, tamales, and chilaquiles using garden‑grown chilies, tomatoes, and cilantro, favoring homemade masa over pre‑made mixes, though they sometimes over‑salt
    the broth when distracted by a favorite podcast.
  core: Enrique Alcantara is a contemplative, competitive retiree who fuses solitary art, modest entrepreneurship, and a careful yet occasionally splurging financial style into a life colored by quiet curiosity
    and occasional worry.
background:
  cultural: 'Enrique was raised in a working‑class Mexican‑American family in the Greater Houston area. His parents emigrated from Jalisco, and he grew up bilingual, celebrating traditions such as Día de
    los Muertos, Posadas, and quinceañeras. The blend of Mexican heritage and the suburban Texan environment shaped his worldview: he values family ties, community solidarity, and the bold flavors of Mexican
    cuisine, while also adopting the pragmatism and individualism typical of the region. He identifies strongly with the Mexican diaspora in Fort Bend County, often volunteering at the local Catholic church’s
    cultural events and incorporating Spanish idioms into his daily speech.'
