  hobbies: '[''Watercolour painting'', ''Reading philosophy'', ''Poetry writing'', ''Acoustic guitar playing'', ''Gardening (chilies, tomatoes, herbs)'', ''Chess'', ''Attending small art workshops'', ''Participating
    in local cultural festivals'']'
  career_goals: Although Enrique is currently retired from formal employment, he is driven to channel his creative energy into tangible achievements. He aims to complete his GED to formalise his education,
    and to organize a small solo exhibition of his paintings at the local community center within the next two years. He also hopes to publish a collection of short poems and visual sketches reflecting
    his reflections on aging, cultural identity, and the Texas landscape. On a modest scale, he plans to start a side venture selling handcrafted wooden trivets and hand‑painted tiles at regional craft
    fairs, using the proceeds to support a local youth arts program he wishes to mentor.
