  hobbies: '["Journaling and sketching", "Cooking and recipe experimentation", "Listening to R&B, neo‑soul, and hip‑hop", "Youth mentorship and tutoring at church", "Community clean‑up volunteering", "Biking
    in local parks", "Guided meditation and mindfulness", "Watching documentaries on social issues and science"]'
  career_goals: Margaret aspires to earn her GED within the next year and then pursue a certification as a Certified Nursing Assistant or a community health worker, drawn by her desire to help others and
    create supportive environments. She also considers an apprenticeship in residential maintenance or HVAC to leverage her hands‑on skills. In the longer term, she hopes to work in a health‑focused role
    that allows her to advocate for mental‑well‑being among teens, possibly through a community outreach program or a local health clinic. She is motivated to achieve financial independence while maintaining
    a balanced, stress‑aware lifestyle.
