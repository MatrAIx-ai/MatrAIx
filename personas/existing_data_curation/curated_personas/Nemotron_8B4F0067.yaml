personas:
  professional: Manuel Fernandez, a 7‑year‑old budding engineer, channels their curiosity and methodical nature into constructing intricate LEGO animal habitats and vehicle models, planning each build with
    a notebook of detailed sketches before turning the bricks into precise structures.
  sports: Manuel Fernandez plays midfield on the Sun Valley Junior Soccer Club, eagerly cheering for Manchester United while practicing dribbling drills after school, and enjoys tracking progress with a
    bright-colored shin‑guard checklist.
  arts: Manuel Fernandez explores creativity through sketching seashells and rocks, listening to melodic folk tunes by The Riverettes, and turning LEGO creations into miniature art installations displayed
    on a dedicated shelf in their bedroom.
  travel: Manuel Fernandez dreams of exploring the tide pools at Pacific Beach and the natural history museum in Denver, while previous family trips include a weekend road‑trip to the Grand Canyon and a
    summer visit to the city aquarium in San Diego.
  culinary: Manuel Fernandez prefers bite‑sized snack plates like apple slices with peanut butter, pizza topped with mozzarella and pepperoni, and loves helping to assemble a simple avocado dip with a splash
    of lime for after‑school gatherings.
  core: Manuel Fernandez merges a meticulous LEGO‑building mindset with a vivid curiosity for nature, balancing organized planning, occasional anxiety, and a love for solo sketching and soccer drills.
background:
  cultural: Manuel grows up in a Mexican‑American household in Corpus Christi, where Spanish is spoken at home and English at school. Family gatherings often feature dishes like tacos, tamales, and arroz
    con frijoles, and celebrations include Día de los Muertos and local festivals. His parents encourage pride in his heritage while also embracing the coastal Texas lifestyle, including beach outings,
    community picnics, and participation in school events that blend both cultures.
