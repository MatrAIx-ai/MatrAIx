persona_description: An environmental scientist with a specialization in coastal ecosystems and their services, particularly oyster reefs. This person is interested in understanding how changes to the health
  and number of predatory or prey species on an oyster reef can affect the foundation species, the oyster. They are also curious about the factors that led to the collapse of the Apalachicola oyster fishery
  in Florida, and are eager to learn more about the major players in North Florida oyster ecology, including the species that are currently on the reef.
