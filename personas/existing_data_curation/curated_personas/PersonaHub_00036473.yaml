persona_description: A MIT graduate student in Aeronautics and Astronautics, specializing in the effects of space weather on geostationary satellites and their components. Lohmeyer's research focuses on
  understanding how sensitive components are to space weather conditions, and how space weather may contribute to failures, in order to improve the design of satellites to be more tolerant. She is dedicated
  to bridging the gap between the space-weather community and satellite engineers to establish a better understanding of space weather's effects on satellite equipment.
