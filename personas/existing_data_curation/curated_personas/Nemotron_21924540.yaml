  hobbies: '[''Hiking in the San Gabriel Mountains'', ''Playing acoustic guitar'', ''Cooking traditional Mexican dishes'', ''Yoga and mindfulness meditation'', ''Volunteer tutoring for at‑risk youth'',
    ''Basketball'', ''Urban photography'']'
  career_goals: Jose aims to become a licensed Professional Engineer (PE) within the next three years and to lead projects that improve public infrastructure for underserved neighborhoods in Los Angeles.
    He aspires to specialize in sustainable, earthquake‑resistant design, and eventually to head a community‑focused engineering consultancy that partners with local NGOs to deliver affordable housing and
    resilient public spaces. Mentoring junior engineers and volunteering his expertise for disaster‑relief efforts are also central to his long‑term vision.
