  career_goals: Andrew aims to move up from bartender to bar manager within the next two to three years, earning a hospitality‑management certification and finishing his associate degree in business or
    hospitality. He dreams of eventually opening his own neighborhood bar or a small microbrewery in the Poconos, featuring a curated selection of locally sourced beers and a signature line of craft cocktails.
    He is motivated to build a reputation for reliable service and creative drinks, mentor younger staff, and create a welcoming gathering place that reflects his practical, community‑focused values.
