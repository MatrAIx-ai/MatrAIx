personas:
  professional: A budding storyteller and mini-architect named Joselyn Carbajal delights in arranging blocks into intricate cityscapes, channeling their vivid imagination and knack for balancing organization
    with flexibility into early design thinking.
  sports: A pint‑sized soccer enthusiast named Joselyn Carbajal dribbles a mini‑ball with the Tiny Tigers FC youth team, watches the Los Angeles Lakers games with a parent, and attends a toddler gymnastics
    class at the community center where they love mastering the balance beam.
  arts: An imaginative mini‑artist named Joselyn Carbajal spends afternoons drawing whimsical scenes inspired by Dr. Seuss and the vivid colors of Van Gogh’s Starry Night, and sings aloud to Sesame Street
    songs, especially the lively tunes of Elmo, shaping their creative identity.
  travel: A curious little explorer named Joselyn Carbajal enjoys family road trips to Disneyland and the San Diego Zoo, has taken a short flight to Vancouver to visit grandparents, and dreams of seeing
    the Great Barrier Reef and the Eiffel Tower, preferring short car rides with a plush companion and plenty of snack breaks.
  culinary: A budding foodie named Joselyn Carbajal loves creamy mac and cheese, crispy chicken nuggets, and sweet strawberry slices, can spread peanut butter on toast with a wooden spoon, and enjoys assembling
    colorful ‘rainbow fruit kebabs’ using mango, blueberries, and banana.
  core: An endlessly curious three‑year‑old named Joselyn Carbajal turns everyday moments into magical narratives, meticulously lines up toys before play, yet often gets lost in daydreams and forgets to
    put the crayons back.
background:
  cultural: Joselyn is raised in a Spanish‑heritage household in Palm Coast, Florida. Her family speaks both Spanish and English and celebrates traditions such as Día de los Muertos, Spanish holidays, and
    enjoys dishes like paella and churros. She hears Spanish lullabies and folklore, which enrich her imagination and give her a bilingual, multicultural upbringing.
