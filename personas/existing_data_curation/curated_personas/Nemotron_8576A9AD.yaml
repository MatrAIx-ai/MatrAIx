  career_goals: Although only three, Joselyn already expresses a budding ambition to become an artist or storyteller, often saying she wants to be a "painter" or "writer" when she grows up. She also shows
    a gentle desire to help others, hinting at future roles such as a teacher or caregiver, where she can share the imaginative worlds she creates.
