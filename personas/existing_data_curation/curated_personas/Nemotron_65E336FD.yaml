  hobbies: '[''Cooking and recipe development'', ''Reading mystery novels'', ''Gardening'', ''Volunteering at church food pantry'', ''DIY home improvement projects'', ''Listening to R&B and gospel music'',
    ''Journaling'']'
  career_goals: Brittany aims to transition from dishwasher to line cook within the next two years by leveraging her hospitality background and obtaining a culinary certification. She plans to enroll in
    part‑time cooking classes at a nearby community college and seek mentorship from the restaurant’s head chef. Her long‑term ambition is to become a kitchen manager, overseeing staff scheduling, menu
    planning, and quality control, and eventually launch a small catering service that offers soul‑food inspired dishes for local events and church gatherings.
