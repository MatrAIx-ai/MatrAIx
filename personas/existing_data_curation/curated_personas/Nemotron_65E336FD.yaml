personas:
  professional: Brittany Cole, a 33-year-old dishwasher in a high-volume restaurant, leverages their hospitality associate's degree and flawless ServSafe compliance to keep the back-of-house running like
    clockwork while methodically shadowing line cooks and mapping out the steps needed for their upcoming culinary certification.
  sports: Brittany Cole enjoys Sunday afternoons cheering on the Atlanta Braves and the Atlanta Falcons while playing in a co-ed adult softball league and attending a weekend yoga class at the community
    center, and they use this mix of spectating and active participation to unwind from the restaurant's high-tempo environment.
  arts: Brittany Cole draws creative energy from the timeless vocals of Aretha Franklin, the soulful grooves of Marvin Gaye, the uplifting resonance of Kirk Franklin, and the intrigue of mystery novels
    by Agatha Christie and Tana French, and they often quote lyrical verses while refinishing furniture in their backyard workshop.
  travel: Brittany Cole prefers short road trips to Southern gems such as Savannah, Asheville, and New Orleans for culinary inspiration, but dreams of a longer pilgrimage to the Tuscan countryside in Italy
    to study regional food traditions, and they plan each journey with a detailed itinerary and a modest budget that leaves room for spontaneous market stops.
  culinary: Brittany Cole blends Southern comfort dishes with modern twists, confidently crafting shrimp and grits topped with smoked paprika-infused quinoa, collard greens sautéed with garlic and bacon,
    and sweet potato soufflé seasoned with sage, while they continuously experiment with spice balances and meticulously record each iteration in a well-worn notebook.
  core: Brittany Cole is a methodical, community-oriented kitchen professional whose love of Southern flavors, garden solitude, and diligent budgeting fuels a steady climb toward culinary leadership, even
    if they sometimes skip a break between shifts.
background:
  cultural: Brittany grew up in a close‑knit Black community in Cottonwood, Alabama, where church life, family gatherings, and Southern culinary traditions shaped her worldview. Her upbringing is infused
    with the rhythms of gospel choirs, the flavors of soul‑food cooking, and the resilience of a community that values mutual support. She values the storytelling heritage of Southern African‑American culture,
    often sharing recipes passed down through generations and participating in Juneteenth celebrations that honor her ancestry. This cultural foundation informs her work ethic, her love for communal meals,
    and her desire to give back through local service.
attributes:
  skills: '[''Dishwashing'', ''Food Safety'', ''Sanitation Protocols'', ''Inventory Management'', ''Basic Culinary Techniques'', ''Team Coordination'', ''Time Management'', ''Problem Solving'', ''Customer
