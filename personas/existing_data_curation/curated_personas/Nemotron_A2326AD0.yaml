  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical biographies'', ''Crossword puzzles and Sudoku'', ''Small‑group church prayer meetings'', ''Senior chess club'', ''Walking and birdwatching
    along the Genesee River trail'']'
  career_goals: Although retired, Badr’s goals focus on preserving health, independence, and the stability of his household. He aims to keep his home safe and well‑organized, ensuring a comfortable environment
    for his wife. He wants to document his family’s history and his own life experiences in a memoir that can be passed down to future generations. Badr plans to continue volunteering in a small capacity
    at the local senior center, using his organizational skills to help plan modest events and activities. Maintaining financial prudence and supporting his grandchildren’s education through occasional
    tutoring or advice are also important ambitions.
