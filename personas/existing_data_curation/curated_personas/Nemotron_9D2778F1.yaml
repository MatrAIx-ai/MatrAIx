  career_goals: Mike aspires to become a pediatric doctor or community health worker, combining his love for structured problem‑solving with his deep desire to help others stay healthy and safe. He envisions
    working in a school clinic or volunteering with youth mentorship programs, and he is also interested in supporting his community through service such as junior firefighting or local emergency response
    initiatives.
