personas:
  professional: Mike Magner is a budding LEGO architect and junior coder whose methodical mind and love for structure drive them to design intricate LEGO models and create simple Scratch games, while their
    compassionate nature pushes them to share tutorials with peers.
  sports: Mike Magner dashes across the field for the Oak Grove Youth Soccer Club, idolizing FC Barcelona’s midfield maestros, and spends Saturday mornings hiking local trails to keep stamina, while they
    stick to a strict pre‑game snack routine of banana and peanut butter.
  arts: Mike Magner channels their love for adventure tales—re‑reading Rick Riordan’s Percy Jackson series and watching Pixar’s 'Into the Spider‑verse'—into building LEGO dioramas and composing quirky Scratch
    games, while they hum Imagine Dragons’ 'Believer' during creative sessions.
  travel: Mike Magner plans family outings with a checklist, favoring weekend hikes to Red Rock Canyon and day trips to the local science museum, while they dream of a summer road‑trip to Yellowstone and
    a future visit to the International Space Station exhibition at the Kennedy Space Center.
  culinary: Mike Magner loves devouring homemade pepperoni pizza with extra mozzarella, enjoys flipping chocolate chip pancakes with maple syrup on lazy Sunday mornings, and experiments with spicy salsa
    for taco nights, all while they proudly claim they can perfectly melt cheese without burning it.
  core: Mike Magner is a meticulous LEGO strategist who balances a structured play style with a compassionate heart, often forgetting to finish chores while obsessively sorting bricks by color, and they
    thrive on creating order out of chaos.
background:
  cultural: Mike was raised in Eagle Mountain, Utah, a predominantly Latter‑day Saint community that emphasizes family, service, and self‑reliance. His upbringing includes regular participation in Primary
    (the LDS children’s program), youth service projects organized by his church, and family traditions such as weekend hikes, volunteering, and modest social gatherings. These cultural influences reinforce
    his compassionate nature, respect for structure, and calm resilience.
