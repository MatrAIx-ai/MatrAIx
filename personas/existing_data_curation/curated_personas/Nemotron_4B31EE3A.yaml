personas:
  professional: An analytical systems analyst who merges literary nuance with technical rigor, Jaime Odom crafts user‑centric data models and process automations that balance strict structure with the flexibility
    she values, while quietly positioning herself for a future lead architect role.
  sports: An occasional hiker on the Amish country trails and a member of the Lancaster Hiking Club, Jaime Odom follows the Philadelphia Eagles in the fall, the Phillies in spring, and occasionally practices
    gentle yoga at home, preferring low‑impact, solitary exercise that aligns with her love of quiet routine.
  arts: A devoted knitter, digital illustrator, and poet, Jaime Odom draws inspiration from the pastoral scenes of Andrew Wyeth, the lyrical prose of Virginia Woolf, and the folk ballads of Gillian Welch,
    contributing sketches to local heritage newsletters and verses to a small literary zine.
  travel: Preferring tranquil, self‑guided trips over crowded tours, Jaime Odom has trekked the historic streets of Colonial Williamsburg, the quiet villages of the English Cotswolds, and plans a solitary
    weekend in the Swiss Alps to photograph alpine architecture, always planning itineraries with spreadsheets and a focus on low‑stimulus experiences.
  culinary: An adept home cook who cultivates a modest herb garden, Jaime Odom whips up herb‑infused roasted chicken, small‑batch apricot‑ginger jam, and classic Amish shoo‑fly pie, balancing modest kitchen
    skill with a passion for preserving seasonal flavors.
  core: Jaime Odom is a solitary, structure‑loving systems analyst who nurtures a quiet blend of analytical precision and creative hobbies—knitting, vintage film photography, and herb preserves—while occasionally
    letting disorganized spontaneity drive small indulgences.
background:
  cultural: Jaime was raised in Lancaster County, Pennsylvania, an area where the blend of rural traditions, Pennsylvania Dutch heritage, and a modestly urban town culture creates a unique community fabric.
    Though she does not subscribe to the Amish or Mennonite lifestyle, the region's emphasis on craftsmanship, self‑reliance, and quiet perseverance informed her appreciation for solitude and structured
    work. Her family, of white Anglo‑American descent, encouraged a liberal arts education, leading her to a bachelor’s degree in English literature and a master’s in cultural studies at a nearby liberal
    arts college. This academic path fostered a respect for narrative, historical context, and critical inquiry, which she later integrated into her technical career. The nearby vibrant farmer’s markets
    and historic preservation societies have kept her connected to local traditions, sparking her interest in using technology to document and share regional history.
attributes:
  skills: '[''Requirements gathering'', ''Data modeling'', ''SQL query design'', ''Python scripting'', ''Workflow automation (Power Automate, Alteryx)'', ''Technical documentation'', ''Usability testing'',
    ''Process mapping'', ''Stakeholder communication'', ''Research and technology evaluation'']'
  hobbies: '[''Reading historical nonfiction'', ''Herb gardening'', ''Knitting'', ''Digital illustration'', ''Hiking in rural Lancaster'', ''Nature photography'', ''Writing poetry'', ''Personal Python scripting'',
    ''Preserving jams'']'
  career_goals: Jaime aspires to transition from a senior analyst role to a lead systems architect position where she can shape the strategic direction of enterprise information systems. She plans to deepen
    her expertise in user‑centered design for public‑sector and cultural‑heritage data platforms, leveraging her humanities training to preserve and present historical records digitally. To support this
    trajectory, she intends to earn certifications such as Certified Business Analysis Professional (CBAP) and TOGAF, and eventually take on mentorship responsibilities for junior analysts. In the longer
    term, she hopes to champion cross‑functional teams that prioritize sustainable, low‑maintenance solutions while maintaining the structured, predictable environments she values. Her ultimate ambition
    is to influence policy‑level decisions on how technology supports community archives and local government services.
