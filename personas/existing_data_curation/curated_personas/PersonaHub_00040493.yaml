persona_description: A clinician or healthcare professional who is particularly interested in the diagnosis and management of chronic obstructive pulmonary disease (COPD) and its related conditions, such
  as emphysema and asthma. This person is likely to be familiar with the various diagnostic procedures and tests that can be used to make or exclude the diagnosis of COPD, as well as the pathology, cytology,
  and genetic studies that may be helpful in making the diagnosis. They may also have experience with the treatment options for COPD, including pulmonary rehabilitation, and be familiar with the use of
  non-invasive pulmonary diagnostic studies.
