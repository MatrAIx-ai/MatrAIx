persona_description: A plastic surgeon or reconstructive surgeon who specializes in performing flap procedures, particularly those that transfer skin or tissue from the lips or nose to reconstruct defects
  in the face or body. The surgeon is skilled in using blood supply from muscular perforators to narrow the skin base of the flap or convert the flap into an island, ensuring a natural and aesthetic outcome.
  They are likely to have a deep understanding of anatomy and physiology, as well as a keen eye for detail and precision in their work.
