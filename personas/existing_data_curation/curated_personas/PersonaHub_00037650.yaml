persona_description: A scientist who specializes in X-ray spectroscopy, particularly in mapping the surface composition of celestial bodies like the Moon. They have worked on developing and building the
  Imaging X-ray Spectrometer (C1XS) for the Chandrayaan-1 mission, which successfully detected the first X-ray signature from the Moon. They have experience in international collaboration and have collaborated
  with the Indian Space Research Organisation (ISRO) and the Rutherford Appleton Laboratory (RAL) in the development and operationalisation of C1XS in Chandrayaan-1.
