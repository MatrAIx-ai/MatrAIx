  career_goals: Mai aims to open a small, community‑focused café that showcases her signature East‑Asian‑fusion menu and offers cooking workshops for local seniors and aspiring chefs. She also hopes to
    author a cookbook that documents family recipes and her own innovative twists, and to mentor younger kitchen staff through formal culinary education programs at the local community college. Balancing
    her desire for creative expression with her need for stability, she plans to transition to a role that allows more predictable hours while still staying connected to the culinary world. She also wishes
    to integrate mindfulness practices into her kitchen leadership to reduce stress for herself and her team.
