persona_description: A researcher and scientist who specializes in the development and application of graphene technology in wastewater treatment and renewable energy. He has a track record of successfully
  developing innovative solutions that can be used by industry. He is currently working with Sydney Water to develop a graphene-based membrane that can purify methane from biogas produced in wastewater
  treatment plants. His team has already demonstrated the effectiveness of graphene in removing natural organic matter from drinking water, and he is now focusing on developing a commercial-scale version
  of the graphene membrane for use in wastewater treatment plants.
