personas:
  professional: Felicitas Gonzalezrivera is an aspiring digital marketer who blends bilingual fluency, quick-fire video editing, and charismatic leadership on their high school soccer and debate teams into
    bold, culturally-rich social-media campaigns, even as their spontaneous nature sometimes leaves them scrambling to meet tight project deadlines, and they often juggle multiple ideas at once.
  sports: Felicitas Gonzalezrivera leads the Northside High School Sharks as forward-captain, also plays summer beach volleyball with the Corpus Christi Coastal Club, and cheers for the Houston Astros and
    Dallas Cowboys, channeling a competitive drive into daily drills while they occasionally buck rigid practice schedules in favor of spontaneous improvisation.
  arts: Felicitas Gonzalezrivera immerses themselves in improvisational theater with the Corpus Christi Improv Collective, curates TikTok sketches set to the beats of Bad Bunny and Lila Downs, and draws
    inspiration from actors like Zendaya and Lin-Manuel Miranda, weaving a vibrant mix of modern pop and traditional regional Mexican rhythms into their creative identity, and they often showcase their
    work at community open-mic nights.
  travel: Felicitas Gonzalezrivera prefers spontaneous, last-minute road trips that whisk them from weekend beach camping at Padre Island to vibrant city escapes in New York City and Barcelona, mixing budget
    hostels with occasional family-guided tours of San Antonio's River Walk, though their dislike for rigid itineraries sometimes leads to missed museum hours, and they thrive on discovering hidden street
    art wherever they go.
  culinary: Felicitas Gonzalezrivera's culinary playground centers on crafting tacos al pastor with sweet-pineapple glaze and smoky chipotle, whipping up fresh salsa roja using ripe tomatillos, jalapeños,
    and cilantro, while occasionally daring to reinvent classic chilaquiles with fried plantains, reflecting a confident yet experimental home-cook who balances traditional family recipes with TikTok-worthy
    plating, and they frequently post videos of their dishes to engage a growing audience.
  core: Felicitas Gonzalezrivera is a charismatic, bilingual teen who channels their love of soccer, TikTok stardom, and spontaneous creativity into bold digital storytelling, even if they procrastinate
    on assignments and impulsively splurge on the latest tech gadgets.
background:
  cultural: Felicitas comes from a first‑generation Mexican‑American family rooted in South Texas. At home, Spanish and English flow interchangeably, and her family maintains traditions such as Día de los
    Muertos, Mexican Independence Day celebrations, and the preparation of authentic Mexican dishes at their small taquería. Growing up in Gregory, TX, she has absorbed the close‑knit bicultural community,
    valuing family loyalty, resilience, and pride in her heritage while also embracing the broader Texan lifestyle and opportunities.
