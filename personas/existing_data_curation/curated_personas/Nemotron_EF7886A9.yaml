  career_goals: Felicitas aims to channel her charisma, bilingual background, and love for digital storytelling into a career in marketing and communications, ideally focusing on campaigns that celebrate
    Mexican‑American culture. She envisions building a personal brand on platforms like TikTok and YouTube, eventually launching a lifestyle and culinary media channel that showcases modern twists on traditional
    recipes. Long‑term, she hopes to study Business Administration or Communications in college and start a community outreach firm that helps local small businesses grow through strategic digital marketing
    and event promotion.
