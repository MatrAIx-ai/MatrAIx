personas:
  professional: Maria Alicea is a construction helper in Kansas City who combines hands‑on trade skills with a vibrant artistic eye, excelling at material handling, concrete mixing, and bridging communication
    between Spanish‑ and English‑speaking crew members while dreaming of a future as a forewoman who can embed sustainable, culturally‑inspired design into every project.
  sports: Maria Alicea is a weekend hiker and community‑league soccer enthusiast who trails the nearby Swope Park’s hills, plays forward for a local co‑ed recreational team, and cheers loudly for the Kansas
    City Chiefs, Royals, and Sporting Kansas City, while also joining a salsa‑dance fitness class that doubles as cardio, reflecting their love for movement and team spirit.
  arts: Maria Alicea is a vibrant participant in Kansas City’s arts scene, spending afternoons photographing the bold murals of the Crossroads district, sketching colorful compositions inspired by Frida
    Kahlo and local muralist Jacob Williams, and attending live performances by Mexican folk singer Lila Downs and Kansas City jazz ensembles at the American Jazz Museum, all of which fuel their creative
    projects and community festival planning.
  travel: Maria Alicea is an adventurous traveler who balances a tight budget with a passion for cultural immersion, having backpacked through Oaxaca to study traditional cooking techniques, spent a weekend
    road‑tripping to the Ozarks for hiking, and dreaming of a future pilgrimage to Barcelona to study Gaudí’s sustainable architecture, while always returning home to Kansas City’s neighborhood festivals
    for a dose of familiar celebration.
  culinary: Maria Alicea is an experimental home chef who passionately prepares mole poblano with roasted chilies, cacao, and sesame seeds, rolls fresh tamales with masa and pork filling, and finishes dishes
    with a squeeze of lime and a sprinkle of queso fresco, while also indulging in Kansas City’s famous burnt‑end ribs, showcasing a blend of Mexican flavors and Midwestern comfort in their kitchen.
  core: Maria Alicea is a sociable, art‑loving construction helper who juggles concrete work, mural photography, salsa dancing, and a budding entrepreneurial dream, often trading toolboxes for paintbrushes
    and balancing disciplined budgeting with occasional impulsive art‑supply splurges.
background:
  cultural: Maria is a first-generation Mexican-American whose family traces its roots to the state of Jalisco. Raised in a bilingual household in Wyandotte County, she grew up speaking Spanish at home
    while attending an English-language high school. Her family celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and traditional quinceañeras, fostering a strong sense of cultural
    pride. This heritage informs her appreciation for vivid color, rhythmic music, and communal craftsmanship—values she brings to her construction work and artistic pursuits. Maria stays connected to the
    local Mexican community through neighborhood festivals, cultural cooking gatherings, and volunteer projects that blend her cultural traditions with her professional life.
