  hobbies: '["photography", "sketching", "street mural exploration", "folklorico dance", "salsa dancing", "cooking traditional Mexican dishes", "hiking", "DIY home-decor projects", "volunteering at community
    festivals", "reading about sustainable architecture"]'
  career_goals: Maria aims to move beyond a helper role by earning certifications in carpentry and OSHA construction safety within the next two years. She plans to enroll in a vocational program at a local
    community college to gain formal training in framing, drywall, and project coordination. Her long-term ambition is to become a site forewoman and eventually a construction manager, where she can integrate
    her artistic curiosity into sustainable, design-focused building projects. Maria also dreams of launching her own small-scale remodeling business that emphasizes culturally inspired aesthetics and green
    building practices, allowing her to blend her heritage with her professional expertise.
