personas:
  professional: Jeremy Wright is a detail-oriented facilities assistant who leverages systematic cleaning protocols, floor-care expertise, and proactive inventory management to keep commercial spaces spotless
    while training new staff, and they are actively pursuing CPC and BSCAI certifications to step into a supervisory role within two years.
  sports: Jeremy Wright is a weekend angler on the San Antonio River, a member of the Hill Country Hiking Club, regularly watches the Dallas Cowboys and the Texas Rangers, and they fit in occasional pick-up
    basketball at a local community center to stay active.
  arts: Jeremy Wright enjoys immersing themselves in Texas-rooted music, regularly listening to Willie Nelson and Sturgill Simpson while also dissecting strategy video games like Civilization VI for narrative
    depth, and they attend occasional live performances at San Antonio’s Majestic Theatre when time permits.
  travel: Jeremy Wright prefers short, well-planned road trips, having camped at Garner State Park and explored the historic towns of Fredericksburg, while dreaming of a future overseas excursion to Kyoto
    to experience Japanese gaming culture, and they budget travel expenses using the same spreadsheet that tracks their DIY projects.
  culinary: Jeremy Wright experiments with Texas-style BBQ, perfecting a dry rub of paprika, cumin, brown sugar, and hickory smoke for brisket, while also mastering Tex-Mex staples like chicken enchiladas
    with homemade salsa, and they often host tasting sessions for friends, though they sometimes over-salt dishes in the pursuit of bold flavor.
  core: Jeremy Wright balances a methodical work ethic with hands-on hobbies, a pragmatic financial plan, a routine-driven health regimen, and a love for outdoor pursuits, though they sometimes over-cook
    and sacrifice sleep for project deadlines.
background:
  cultural: Jeremy was raised in a small, predominantly Anglo‑American community near Atascosa in Bexar County, Texas. His family’s roots trace back to generations of ranchers and blue‑collar workers who
    valued hard work, self‑reliance, and straightforward communication—traits that shape his practical outlook. Growing up in the San Antonio metropolitan area exposed him to a multicultural environment;
    he frequently interacts with Hispanic neighbors, celebrates local events such as Fiesta San Antonio, and has a conversational understanding of Spanish. He embraces classic Texan customs, including weekend
    barbecues, high school football gatherings, and an appreciation for the natural landscape of the Hill Country. Although his religious upbringing was Protestant, he respects the diverse faith traditions
    in his community. These cultural experiences blend a traditional Southern work ethic with the inclusive, bilingual atmosphere of South‑Central Texas.
attributes:
  skills: '[''Commercial cleaning operations'', ''Floor care (stripping, waxing, polishing)'', ''Safe chemical handling'', ''Inventory management'', ''Work order scheduling software'', ''Minor building
    maintenance'', ''Safety inspections and compliance'', ''Team training and supervision'', ''Time management'', ''Customer service'']'
  hobbies: '[''DIY home improvement'', ''Woodworking'', ''Model kit building'', ''Fishing'', ''Hiking in Texas Hill Country'', ''Strategy video games'', ''Puzzle apps'', ''Cooking Texas BBQ'', ''Preparing
    Tex‑Mex dishes'', ''Community clean‑up volunteering'']'
  career_goals: Jeremy aims to transition from entry‑level janitorial work to a supervisory role within facilities management. Over the next two years he plans to obtain the Certified Professional Cleaner
    (CPC) credential and the Building Service Contractors Association International (BSCAI) Maintenance Technician certification. He intends to leverage his associate degree to pursue a bachelor’s program
    in Facilities Management while gaining experience overseeing multiple sites. In five to seven years he envisions becoming a facilities coordinator responsible for budgeting, vendor management, and team
    leadership at a large office campus or healthcare facility. Long‑term, Jeremy aspires to launch his own eco‑friendly cleaning business that emphasizes green chemicals and structured service contracts.
