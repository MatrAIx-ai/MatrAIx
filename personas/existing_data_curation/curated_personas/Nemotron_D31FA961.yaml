  hobbies: '[''Reading classic Southern literature'', ''Gardening native plants'', ''Birdwatching'', ''Hiking local trails'', ''Puzzle solving (crosswords, sudoku)'', ''Landscape photography'', ''Cooking
    Southern recipes'', ''Online math tutoring'']'
  career_goals: She aims to lead a regional data‑science initiative that supports public‑health and agricultural planning in Mississippi, positioning herself as a chief data scientist for a state agency
    or a research institute. Over the next five years she plans to publish a series of peer‑reviewed papers on predictive modeling for climate‑related crop yields, secure grant funding for interdisciplinary
    projects, and establish a mentorship program for women pursuing STEM careers in the South. While ambitious, she balances these goals with a desire to maintain a sustainable work‑life rhythm that allows
    for focused, independent research.
