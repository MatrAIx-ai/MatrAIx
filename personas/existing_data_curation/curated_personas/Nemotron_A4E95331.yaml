  career_goals: Although retired, Muna’s ambition is to leave a lasting legacy of community connection and shared knowledge. She aims to document her family’s history and the local oral histories of Wake
    Forest, mentor younger volunteers, and advocate for senior-friendly policies at the town level. She hopes to launch a small intergenerational mentorship program that pairs high‑school students with
    seniors for storytelling and skill‑sharing, and she envisions compiling her experiences into a memoir or community newsletter that celebrates the region’s cultural heritage.
