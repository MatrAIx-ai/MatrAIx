personas:
  professional: A pragmatic full‑stack developer, Anita Perry leverages her self‑taught expertise in Python, JavaScript, Flask and React to build maintainable web applications while championing small, harmonious
    teams and translating tech jargon into plain language for colleagues.
  sports: An avid outdoors enthusiast, Anita Perry spends weekends hiking the Wasatch trails, snowshoeing in winter, and follows the Utah Jazz and Real Salt Lake, occasionally joining a local trail‑maintenance
    club that meets for group runs and volunteer clean‑ups.
  arts: A quiet creative soul, Anita Perry enjoys knitting intricate patterns from Ravelry while listening to the ambient scores of indie games like Celeste, reads sci‑fi by Neal Stephenson, and attends
    occasional performances by the local folk music trio The Mountain Goats.
  travel: A spontaneous road‑trip planner, Anita Perry favours low‑key weekend escapes to Utah’s national parks such as Arches and Zion, dreams of stargazing in Iceland’s remote fjords, and balances her
    love of nature with budget‑friendly camping and occasional boutique B&B stays.
  culinary: A modest home‑cook, Anita Perry loves preparing hearty quinoa‑kale salads, slow‑cooked lamb stew with rosemary, and perfecting a classic Utah‑style fry sauce, while also indulging in sushi rolls
    with fresh avocado and wasabi, and often knits at the kitchen counter.
  core: Anita Perry blends pragmatic code craftsmanship with a love of solitary hikes, gentle knitting, and community‑focused tech, navigating life with a relaxed yet purpose‑driven rhythm.
background:
  cultural: Anita grew up in Brigham City, a close-knit community in northern Utah where traditional values of self-reliance, modesty, and community service are woven into daily life. Her family's roots
    trace back to European settlers from England and Scandinavia, which informs a cultural emphasis on hard work and practicality. While the region has a strong heritage of Mormon cultural influence, Anita's
    upbringing blended those community-oriented customs with the growing presence of technology and digital culture. This mix shaped her respect for established methods, balanced with an openness to new
    ideas, and fostered her preference for small, harmonious groups over large gatherings.
