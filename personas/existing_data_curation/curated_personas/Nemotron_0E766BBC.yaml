  skills: '[''Python'', ''JavaScript'', ''React'', ''Flask'', ''Node.js'', ''PostgreSQL'', ''Git'', ''Kanban'', ''Debugging'', ''Technical documentation'', ''UI/UX fundamentals'']'
  hobbies: '[''Hiking'', ''Snowshoeing'', ''Stargazing'', ''Reading science fiction'', ''Indie puzzle video games'', ''Knitting'', ''Volunteering at animal shelter'', ''Small tech meet-ups'']'
  career_goals: Anita aims to become a senior developer within the next three years, with a particular interest in leading small, agile teams that value flexibility and collaborative problem-solving. She
    plans to earn certifications in cloud services (AWS) and enhance her DevOps skill set to support end-to-end delivery pipelines. Long-term, she hopes to transition into a technical mentor or lead architect
    role where she can nurture junior talent and champion inclusive, harmonious team culture. She also envisions creating a community-focused web platform that connects local volunteers with service opportunities,
    combining her technical expertise with her desire to contribute positively to her hometown.
