  career_goals: Daniela dreams of a future where she can help others while exploring her curiosity about the world. She envisions herself as a teacher who inspires younger kids, a pediatric nurse caring
    for children, or an environmental scientist studying nature. She also hopes to take on a leadership role in community projects that bring people together, reflecting her compassionate and cooperative
    nature.
