personas:
  professional: An aspiring junior storyteller, Daniela Castillo blends her love for fantasy novels with sketch artistry, leading the school’s after‑school book club where she coordinates reading schedules,
    designs hand‑drawn character posters, and mentors peers, reflecting her balance of curiosity and practicality.
  sports: As a forward on the Allentown Youth Soccer Club, Daniela Castillo drills after school three times a week, idolizes Philadelphia Union midfielders, joins the spring track club for sprint drills,
    and cheers for the Philadelphia Eagles during football season, balancing competitive play with casual pick‑up games on the neighborhood park field.
  arts: A budding visual storyteller, Daniela Castillo sketches elaborate fantasy scenes inspired by J.K. Rowling and Leigh Bardugo, dances to Bad Bunny and Marc Anthony at family gatherings, collects leaf
    rubbings during park explorations, and attends the local community theater’s Kids’ Art Day, letting art shape her identity.
  travel: Eager for exploration, Daniela Castillo spends weekends cycling through the Delaware Water Gap, has journeyed on a school field trip to Washington, D.C.’s National Museum of Natural History, and
    dreams of strolling the historic streets of Old San Juan and trekking to Machu Picchu, balancing budget‑friendly road trips with imaginative travel journals.
  culinary: Behind the kitchen counter, Daniela Castillo assists her grandmother in preparing arroz con gandules and pasteles, expertly measuring sofrito, gandules, and plantain leaves, while also experimenting
    with homemade pizza topped with mozzarella, basil, and cherry tomatoes, and delights in tasting tropical mangoes and adding fresh cilantro to salsa.
  core: Daniela Castillo is a compassionate, organized ten‑year‑old who juggles fantasy storytelling, soccer drills, and family cooking, never missing a chance to doodle a dragon between homework and snack
    breaks, though she sometimes forgets to finish chores before bedtime.
background:
  cultural: Daniela is a proud Puerto Rican American raised in Allentown, Pennsylvania. She grew up in a bilingual household where Spanish and English flow naturally, and she celebrates cultural traditions
    such as Noche Buena, Three Kings' Day, and local Puerto Rican festivals. Family gatherings are filled with music—bomba, plena, and modern reggaeton—and dishes like mofongo and pasteles. These cultural
    roots shape her values of family, community harmony, and a love for sharing her heritage with friends at school.
