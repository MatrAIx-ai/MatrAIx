persona_description: A cognitive scientist who specializes in the study of language processing, specifically the interface between different cognitive systems such as concepts, inference, context, and sound.
  Her work focuses on developing formal techniques and rigorous analysis to incorporate language-specific knowledge in interactive programming environments and to address fundamental software engineering
  issues. Her research interests include the design and implementation of natural language processing systems, the integration of language-specific knowledge into interactive programming environments, and
  the development of new grammar formalisms.
