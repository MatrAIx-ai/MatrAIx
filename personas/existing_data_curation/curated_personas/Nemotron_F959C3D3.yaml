personas:
  professional: Jared Kerr is a seasoned kitchen supervisor with deep expertise in food‑service operations—ranging from menu planning and inventory control to staff scheduling and ServSafe compliance—who
    leverages his routine‑focused mindset to maintain spotless health inspections, mentor younger employees, and gradually shape a low‑stress, predictable environment that could one day support a modest
    neighborhood diner.
  sports: Jared Kerr follows the Green Bay Packers religiously, wears their jersey to early morning fishing trips on the Mississippi River with the local Anglers Association, and maintains a modest fitness
    routine that includes weekend carpentry‑related stretching and occasional participation in a community 5K that they treat as a brief, low‑stress cardio session.
  arts: Jared Kerr appreciates classic Midwestern folk music, frequently listening to Johnny Cash and Bob Dylan while carving wooden furniture, enjoys reading practical non‑fiction by authors like Mike
    Rowe, and spends quiet evenings watching western films starring John Wayne, believing that these cultural touches reinforce their sense of rooted tradition.
  travel: Jared Kerr prefers short, well‑planned road trips to nearby river towns such as Natchez or to cabin retreats in the Ozarks, values the predictability of staying at family‑run B&Bs, and dreams
    of visiting the historic Chicago Riverwalk and the culinary scene of New Orleans before retirement, though they keep travel budgets tight to protect their savings.
  culinary: Jared Kerr excels at preparing hearty Midwestern fare—perfectly fried catfish, slow‑cooked pot roast, and a buttery corn casserole—using fresh garden vegetables, follows recipes meticulously
    yet adds a personal twist with secret spice blends of smoked paprika and mustard seeds, and enjoys sharing these meals with family in a routine dinner setting.
  core: Jared Kerr is a methodical, routine‑driven kitchen supervisor who balances meticulous work ethic with a quiet love for fishing, woodworking, and Midwestern comfort food, all while quietly wrestling
    with occasional worry and a penchant for over‑checking every detail.
background:
  cultural: Jared was born and raised in Independence, Wisconsin, in a family of German‑American heritage. The community’s Lutheran traditions, annual Oktoberfest celebrations, and emphasis on hard work,
    frugality, and neighborly support have shaped his practical values and preference for routine. He participates in church gatherings, local potlucks, and community fairs, reflecting the Midwestern culture
    of modesty, self‑reliance, and close‑knit social bonds.
attributes:
  skills: '["Food safety and sanitation","Staff scheduling and supervision","Menu planning and recipe development","Inventory control and cost management","Culinary techniques (grilling, frying, baking)","Team
