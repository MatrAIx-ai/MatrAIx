  hobbies: '["Fishing","Woodworking","Gardening","Reading practical non-fiction","Watching Green Bay Packers games","Cooking family meals","Model train building","Attending church services","Volunteering
    at the local food bank"]'
  career_goals: Jared aims to solidify his reputation as a dependable kitchen supervisor by earning a ServSafe Manager certification, consistently achieving top scores on health inspections, and reducing
    waste through refined inventory processes. He also wants to mentor younger employees, create a more predictable and low‑stress work environment, and eventually transition to a part‑time consulting role
    or ownership of a modest neighborhood diner that allows him to maintain routine while ensuring a stable retirement income.
