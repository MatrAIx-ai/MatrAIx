personas:
  professional: An experienced network architect, Sumit Patel leverages three decades of expertise in Cisco routing, Windows Server, and VMware virtualization to deliver methodical, well‑documented solutions,
    while mentoring junior staff with a calm, reliable demeanor that reflects their strong preference for routine and practical outcomes.
  sports: A dedicated cricket enthusiast and occasional spectator of New York sports, Sumit Patel follows international Test matches, tracks the New York Mets’ season, and participates in a weekly senior
    bowling league at the community center, using these activities as structured outlets for their competitive nature and modest fitness routine.
  arts: A lover of classic cinema and musical theater, Sumit Patel enjoys films starring Amitabh Bachchan, listens to the compositions of R. D. Burman, and attends Broadway productions such as *Hamilton*
    and *The Lion King* with their grandchildren, finding the blend of traditional storytelling and modern performance both comforting and stimulating.
  travel: A methodical planner, Sumit Patel prefers short, well‑structured trips that balance cultural connection and low stress, having recently visited their ancestral hometown in their family's region
    of origin and enjoying weekend getaways to the Hudson Valley’s vineyards and historic sites, always returning with meticulously documented itineraries.
  culinary: A devoted home chef, Sumit Patel perfects family recipes such as thepla, undhiyu, and dal‑tadka, meticulously measuring spices like cumin, mustard seeds, and turmeric, while also crafting farm‑to‑table
    salads from garden‑grown tomatoes, cucumbers, and fresh herbs for their family gatherings.
  core: Sumit Patel is a calm, routine‑driven network veteran who blends meticulous work habits with a love for gardening, chess, and traditional home‑cooking, while quietly competing with their own standards
    to stay organized, healthy, and financially secure.
background:
  cultural: Sumit is a first‑generation Indian American of Gujarati heritage. Born to parents who emigrated from Gujarat in the early 1960s, he grew up speaking Gujarati at home while receiving his formal
    education in English. His marriage follows traditional customs, and he actively participates in the local Gujarati community through the temple, Navratri events, and cultural associations. The values
    of family cohesion, respect for elders, and practicality that are central to Gujarati culture shape his outlook, while his long residence in Queens has blended those traditions with the multicultural
    rhythm of New York City.
attributes:
  skills: '["Cisco routing and switching", "Windows Server administration", "Virtualization (VMware, Hyper‑V)", "PowerShell scripting", "Bash scripting", "Network security and firewall management", "Disaster
