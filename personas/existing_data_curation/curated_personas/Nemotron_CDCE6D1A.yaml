  hobbies: '["Vegetable gardening", "Playing chess", "Cooking Gujarati cuisine", "Reading historical non‑fiction", "Following cricket matches", "Volunteering as an IT mentor for seniors", "Walking in Bellerose
    Park", "Participating in temple festivals"]'
  career_goals: He aims to transition from full‑time administration to a consulting role that preserves the stability of the networks he built, while mentoring the next generation of IT professionals in
    his organization and community. Sumit also plans to earn the CCNP and ITIL certifications to formalize his expertise, and to develop a comprehensive knowledge‑transfer plan before his eventual retirement,
    ensuring his legacy of reliability remains intact.
