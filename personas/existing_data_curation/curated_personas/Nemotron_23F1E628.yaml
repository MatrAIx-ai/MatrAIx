personas:
  professional: Aida Suarez, a 32‑year‑old logistics specialist at a regional distribution center, leverages meticulous inventory management, bilingual communication, and an eye for visual merchandising
    to streamline order fulfillment while infusing vibrant folk‑inspired displays that delight both coworkers and shoppers.
  sports: Aida Suarez, enthusiastic about staying active, runs community 5K races in the spring, follows the Atlanta Braves and the Georgia Bulldogs, and participates in a local women's volleyball league,
    while using weekend hikes in the Okefenokee Wildlife Refuge as her primary cardio workout.
  arts: Aida Suarez, a devoted art‑gallery explorer, draws inspiration from Frida Kahlo’s bold colors, the murals of Diego Rivera, and the modernist works of Georgia O’Keeffe, frequently attends opening
    nights at the Savannah College of Art and Design museum, and even weaves her own textiles inspired by folk patterns during quiet evenings.
  travel: Aida Suarez prefers a blend of cultural immersion and nature, meticulously planning trips to historic sites like Antigua’s colonial streets, the vibrancy of Oaxaca’s markets, weekend getaways
    to Savannah’s riverfront, and annual hikes through the Blue Ridge Mountains, balancing limited vacation days with a modest travel budget.
  culinary: Aida Suarez, a passionate home cook, masters dishes such as tamales, pepian, and chiles rellenos, savoring the aromas of roasted pepitas, cilantro, and corn masa, while experimenting with herb‑infused
    sauces from her garden’s oregano and sage, and occasionally treats herself to boutique cheese boards after long shifts.
  core: Aida Suarez, 32, blends logistical precision with artistic flair, molding inventory spreadsheets into vibrant displays while nurturing community ties through folk crafts and home‑cooked feasts.
background:
  cultural: Aida is the daughter of Guatemalan immigrants and grew up in a bilingual household where Spanish and English were spoken interchangeably. Family traditions—celebrating Día de los Muertos, Semana
    Santa, and Guatemalan Independence Day—instilled a deep appreciation for vibrant colors, music, and storytelling. Her cultural heritage emphasizes hospitality, community, and respect for elders, which
    shape her cooperative and considerate nature. Living in Moultrie, GA, Aida remains active in the local Latino community, attending cultural festivals at the community center, sharing traditional recipes,
    and volunteering to teach Spanish to neighbors. This blend of Guatemalan roots and Southern life informs her worldview, fostering openness to new experiences while maintaining strong ties to her cultural
    identity.
attributes:
