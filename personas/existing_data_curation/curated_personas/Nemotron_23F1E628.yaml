  hobbies: '[''Visiting art galleries'', ''Studying art history'', ''Crafting (weaving, bracelet making)'', ''Cooking Guatemalan cuisine'', ''Traditional folk dancing'', ''Community volunteering'', ''Reading'',
    ''Hiking'', ''Gardening'', ''Listening to world music'']'
  career_goals: Aida aims to move into a supervisory role within the distribution center, such as shift lead or inventory control manager, where she can apply her organizational strengths on a broader scale.
    She plans to earn certifications in forklift operation and basic supply‑chain management (e.g., CPIM or a community‑college logistics certificate) to strengthen her qualifications. Long‑term, she hopes
    to combine her logistical expertise with her cultural passion by launching a boutique or online shop that showcases Guatemalan crafts and artwork, creating a bridge between her heritage and the local
    market.
