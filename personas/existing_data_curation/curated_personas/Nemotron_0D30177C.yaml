  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Street photography'', ''Cooking family recipes'', ''Listening to indie and Latin alternative music'', ''Reading contemporary fiction'', ''Hiking
    coastal trails'', ''Yoga'', ''Salsa dancing'', ''Art and cultural podcasts'']'
  career_goals: Blanca aims to complete a bachelor’s degree in Art History or Visual Arts, with a focus on contemporary Mexican‑American culture. She aspires to work as a museum educator or community arts
    program coordinator, where she can design interactive exhibitions that highlight underrepresented artists. In the longer term, she hopes to launch a freelance multimedia studio that produces digital
    storytelling projects and cultural content for nonprofits, giving her the flexibility to merge her artistic passion with her competitive drive for recognition.
