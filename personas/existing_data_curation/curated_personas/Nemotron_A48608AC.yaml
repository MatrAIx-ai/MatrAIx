  career_goals: Nancy's career ambition is to attain master electrician status within the next three years, followed by establishing her own small‑scale contracting firm focused on energy‑efficient upgrades
    and renewable‑energy installations in Hardin County. She aims to acquire certifications in solar photovoltaic and energy storage systems, positioning herself as a specialist in sustainable home electrification.
    Concurrently, she wishes to formalize her role as a trainer by becoming a certified electrical safety instructor, enabling her to help new entrants to the trade and contribute to community safety programs.
