persona_description: A technical systems architect who is passionate about optimizing system performance and ensuring that the hardware and software components are working together seamlessly. They are
  skilled in monitoring system utilization and identifying bottlenecks, and they have a deep understanding of how to optimize CPU, disk, and memory utilization. They are also knowledgeable about how to
  collect and analyze data to get useful insights, and they have experience with profiling tools and instrumenting the kernel to provide visibility for processes that run for too short a time to be picked
  up by polling. They are interested in the potential for reducing seek time on the disk and improving the utilization of the CPU and memory, and they have a desire to create a tool that can produce a single
  poster of the system performance that can be recreated on any system at any point.
