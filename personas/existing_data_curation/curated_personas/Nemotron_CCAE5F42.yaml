personas:
  professional: A meticulous office clerk with two decades of high‑volume data entry, advanced Excel pivot‑table expertise, and bilingual liaison experience, Taeho Li keeps office operations running smoothly
    while quietly plotting a senior administrative promotion through CAP certification and a cost‑saving process‑improvement project.
  sports: A low‑key fitness enthusiast, Taeho Li jogs along the Brooklyn waterfront each morning, follows the New York Knicks and Brooklyn Nets avidly, and plays in a weekend recreational basketball league
    with fellow office colleagues.
  arts: An avid aficionado of classic film noir, Taeho Li re‑watches Billy Wilder and Fritz Lang masterpieces, studies black‑and‑white street photography by Henri Cartier‑Bresson, and curates a private
    digital archive of Brooklyn’s architectural details captured during evening walks.
  travel: A thoughtful solo traveler, Taeho Li meticulously plans cultural trips, having explored Kyoto’s historic districts and Napa Valley’s vineyards, and now dreams of a low‑key photography pilgrimage
    to Lisbon’s winding streets.
  culinary: A diligent home chef, Taeho Li regularly prepares kimchi and bibimbap using fermented cabbage, gochujang, and sesame oil, and enhances each dish with fresh herbs harvested from their balcony
    garden.
  core: Taeho Li blends quiet curiosity with precise organization, turning solitary hobbies into disciplined routines while nurturing a competitive drive for personal mastery.
background:
  cultural: Taeho was raised in a Korean‑American household in Brooklyn’s Sunset Park, an area with a vibrant Korean community. His parents emigrated from South Korea in the late 1970s and instilled a strong
    work ethic, respect for hierarchy, and emphasis on family responsibility. Bilingual from childhood, Taeho balanced Korean cultural practices—such as celebrating Chuseok, making kimchi at home, and attending
    the local Korean church—with the multicultural environment of New York City. While he completed high school locally, the family’s focus on diligence and reliability shaped his methodical, reliable nature.
    He maintains ties with the diaspora through occasional visits to Korean grocery stores, listening to Korean news, and participating in community festivals. His upbringing blends Confucian values of
    order and perseverance with the independent, pragmatic mindset of a lifelong Brooklyn resident, influencing both his professional conduct and personal pursuits.
attributes:
  skills: '[''Data entry'', ''Microsoft Excel (advanced formulas and pivot tables)'', ''Microsoft Word (document formatting and mail merge)'', ''Outlook calendar and email management'', ''Record and file
