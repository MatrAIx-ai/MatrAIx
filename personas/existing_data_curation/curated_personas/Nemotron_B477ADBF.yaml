personas:
  professional: Ashley Gonzalez, an indie singer‑songwriter and vocal coach in Milwaukee, blends indie pop melodies with traditional bomba and plena rhythms, and they apply their formal vocal training,
    acoustic guitar and piano skills, and meticulous project‑management habits to produce, mix, and mentor emerging artists in a home studio.
  sports: Ashley Gonzalez, a regular of the Milwaukee Running Club and a weekend paddle‑boarder on Lake Michigan, avidly follows the Milwaukee Bucks and Brewers, practices yoga three times a week, and caps
    colder months with indoor spin classes at a downtown studio.
  arts: Ashley Gonzalez spends evenings painting watercolors of the Milwaukee skyline while listening to the nostalgic vinyl spins of Celia Cruz, Janelle Monáe, and Billie Eilish, and they frequently attend
    intimate house concerts that feed both their songwriting and visual‑art inspiration.
  travel: Ashley Gonzalez prefers slow‑travel itineraries that blend train rides through the Midwest with weekend road trips along the Great Lakes, cherishes past visits to Old San Juan for its street festivals,
    and dreams of trekking Patagonia’s Torres del Paine while balancing a modest budget.
  culinary: Ashley Gonzalez cooks fragrant mofongo with plantains, pork, and sofrito, perfects arroz con gandules with pigeon peas and coconut milk, and treats themselves to pasteles stuffed with seasoned
    meat during family gatherings, while also experimenting with a weekly tofu‑based tapa for a modern twist.
  core: Ashley Gonzalez, a methodical yet inquisitive indie musician, balances tight home‑studio budgets with a quirky habit of humming fresh verses while pacing Milwaukee’s lakefront at sunrise, and never
    skips Saturday vinyl‑digging trips, even when they overlook routine dental check‑ups.
background:
  cultural: Ashley is a first‑generation American of Puerto Rican descent. Raised in a bilingual home, she grew up celebrating traditions such as Noche de San Juan, the Puerto Rican Día de la Constitución,
    and community festivals that showcase bomba, plena, and salsa. These cultural roots shape her musical palette and inform her lyrical themes of identity and belonging. While living in Milwaukee, she
    actively participates in the local Puerto Rican community, organizing cultural events, collaborating with other diaspora artists, and bridging island heritage with Midwestern influences. Her cultural
    perspective balances pride in her ancestry with a pragmatic adaptation to the opportunities of her urban environment.
