  hobbies: '[''reading contemporary fiction'', ''yoga'', ''cooking Puerto Rican cuisine'', ''hiking'', ''watercolor painting'', ''attending house concerts'', ''collecting vintage vinyl records'']'
  career_goals: Ashley aims to release a bilingual EP that weaves contemporary indie pop with traditional Puerto Rican rhythms, securing streaming placements and radio airplay in both the Midwest and the
    Caribbean diaspora. She plans to expand her regional touring circuit, performing intimate house concerts and cultural festivals across the Upper Midwest. Building a dedicated home studio is a priority,
    allowing her to produce and engineer her own recordings while mentoring emerging Latinx musicians through workshops and a mentorship program. In the longer term, she envisions a hybrid career that balances
    independent artistry with a part‑time adjunct teaching position in music studies, ensuring financial stability while fostering creative exploration.
