personas:
  professional: Ronald Sprouse is a budding teenage programmer who channels his love for methodical problem‑solving into designing small indie video games with Python and Unity, documenting each code iteration
    in a meticulous notebook that reflects his community’s emphasis on practical education.
  sports: Ronald Sprouse plays point guard for his Rocky Hill Thunder youth basketball team, cheers for the Connecticut Huskies and New England Patriots, and spends Saturdays hiking the Metacomet Trail
    to balance his competitive sports drive with the tranquility of New England’s wooded landscapes.
  arts: Ronald Sprouse spends free time constructing intricate LEGO Architecture models of New York City, devouring sci‑fi novels like Dune and The Long Way to a Small Angry Planet, while listening to the
    synth‑driven scores of Daft Pank and the orchestral themes of Hans Zimmer.
  travel: Ronald Sprouse’s travel highlights include family road trips to Mystic’s historic seaport, a day excursion to Beacon Hill’s colonial charm, and a future school‑organized visit to Kyoto to explore
    the origins of his favorite video‑game aesthetics, all meticulously planned with spreadsheets to stay within budget.
  culinary: Ronald Sprouse prefers classic New England fare such as creamy clam chowder and lobster rolls when dining out, but at home they often assemble pepperoni pizza with extra cheese, whip up quick
    mac‑and‑cheese in the microwave, and experiment with LEGO‑shaped snack platters using pretzel sticks and cheese cubes.
  core: Ronald Sprouse fuses razor‑sharp curiosity with methodical discipline, turning late‑night gaming marathons into solo engineering challenges, though they often skip meals and forget to brush their
    teeth after a win.
background:
  cultural: Ronald comes from a white, middle‑class family that has lived in the suburban town of Rocky Hill, Connecticut for several generations. The New England community emphasizes self‑reliance, education,
    and practical problem‑solving, values that are reflected in his organized, methodical demeanor. Local traditions such as town fairs, high school sports, and a strong public school system have shaped
    his upbringing.
