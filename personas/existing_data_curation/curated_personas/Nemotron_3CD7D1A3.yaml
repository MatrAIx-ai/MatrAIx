personas:
  professional: Ramon Carmona, a facilities maintenance specialist with a talent for preventive‑maintenance planning, leverages their mechanical, electrical, and plumbing expertise to keep building systems
    humming, while they apply disciplined record‑keeping and an outgoing communication style to coordinate crews, vendors, and occupants under pressure.
  sports: Ramon Carmona plays in a local community soccer league each spring, cheers for the San Jose Earthquakes and the Golden State Warriors during the season, follows the San Francisco 49ers in the
    fall, combines weekly weekend hikes in regional parks with strength‑training at a neighborhood gym, and they treat every match as a chance to practice teamwork and release energy.
  arts: Ramon Carmona frequently dances cumbia and salsa at cultural festivals, curates playlists that swing from classic rock legends like Led Zeppelin and The Rolling Stones to Latin icons such as Celia
    Cruz and Marc Anthony, enjoys occasional indie‑film screenings at local theaters, and they view artistic expression as a vibrant thread that weaves together their community ties and personal creativity.
  travel: Ramon Carmona prefers mixed‑itinerary trips that blend adventure hikes in Yosemite with relaxed evenings dining on the waterfront in Monterey, has already explored the coastlines of Baja California
    and the historic streets of Cartagena, dreams of hiking the Patagonian trails next year, and they meticulously plan each journey on a spreadsheet to balance budget constraints with the desire to share
    experiences with friends.
  culinary: Ramon Carmona boasts an intermediate cooking skill level, regularly prepares pepián with roasted tomatoes, chiles, and annatto, crafts tamales stuffed with seasoned pork and masa, experiments
    with salsa fresca using tomatillos, cilantro, and jalapeño, often hosts communal meals where they pair dishes with fresh corn tortillas and homemade horchata, and they enjoy the ritual of chopping ingredients
    while listening to classic rock.
  core: Ramon Carmona blends disciplined pragmatism with a love for community, juggling meticulous maintenance schedules, spirited soccer matches, and aromatic kitchen experiments, even though they sometimes
    procrastinate on paperwork until the deadline looms and have a quirky habit of collecting spare screws from every job site.
background:
  cultural: Ramon was born to Guatemalan immigrant parents and grew up in a bilingual household, speaking Spanish at home and English in school. His family maintains strong ties to Guatemalan traditions,
    celebrating holidays such as Semana Santa, Día de los Muertos, and Guatemalan Independence Day with gatherings, traditional foods, and music. He identifies with the close‑knit Central American community
    in the Bay Area, often attending events at the local Guatemalan cultural center. His Catholic upbringing instilled values of hard work, family responsibility, and respect for elders, while his American
    environment nurtured his outgoing, collaborative nature. He balances these influences by integrating Guatemalan culinary practices into his daily life and volunteering to help newer immigrants adapt
    to life in California.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical repair'', ''Plumbing maintenance'', ''HVAC servicing'', ''Preventive maintenance scheduling'', ''Safety compliance'', ''Technical documentation'',
    ''Inventory management'', ''Team coordination'', ''Customer service'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Soccer'', ''Cooking Guatemalan cuisine'', ''Dancing (cumbia, salsa)'', ''Volunteer work at cultural festivals'', ''DIY home projects'', ''Hiking'', ''Listening to music (classic rock, Latin)'']'
  career_goals: Ramon aims to become a senior facilities supervisor within the next five years, pursuing certifications such as EPA HVAC and an Electrical Journeyman license while working toward an associate
    degree in facilities management. He aspires to lead a maintenance team, implement systematic preventive‑maintenance programs, and eventually launch his own small maintenance business serving residential
    and small‑commercial properties in the Bay Area. He also hopes to mentor other young immigrants, offering job‑training and guidance, and to achieve a stable income that enables him to support his family
    and sponsor relatives from Guatemala.
