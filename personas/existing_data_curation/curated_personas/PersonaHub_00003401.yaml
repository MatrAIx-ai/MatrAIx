persona_description: A Peace Corps volunteer who has been working in Burkina Faso for several years. They have experience in managing and maintaining water systems, as well as in teaching and training the
  local community in water management and maintenance. They are knowledgeable about the challenges of introducing new technologies and systems in a rural environment, and are skilled at working with the
  local community to increase their understanding and create their own systems of management and maintenance. They are dedicated to improving access to clean and reliable water for the villagers in Burkina
  Faso.
