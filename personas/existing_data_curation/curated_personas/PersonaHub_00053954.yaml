persona_description: A concerned and experienced professional in the field of speech, language, and communication in children and young people, specifically focusing on the importance of phonics screening
  and its impact on children with speech, language, and communication needs. The individual is likely to be a member of The Communication Trust, a consortium of leading voluntary sector organisations that
  has expressed concern over the implementation of the Year 1 Phonics Screening Check. This individual is knowledgeable about the evaluation carried out by Sheffield Hallam University, which showed that
  the experience of the Phonics Screening Check was negative for children with speech, language, and communication needs, and is seeking urgent action to address the issue.
