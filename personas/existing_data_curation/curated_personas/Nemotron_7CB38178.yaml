    documentaries (history, innovation)'']'
  career_goals: Anne aims to translate her analytical and organizational strengths into a stable remote role such as data analyst, quality‑assurance specialist, or virtual assistant. She plans to enroll
    in a community‑college associate program in information technology within the next year and to earn certifications like CompTIA A+ and Microsoft Office Specialist. In parallel, she intends to launch
    a modest e‑commerce side business on Etsy, selling curated digital templates and printable planners that blend her design interests with her competitive drive. Long‑term, Anne envisions a fully remote
    position that allows independent work, minimizes stressful social interactions, and provides the financial independence needed to reduce her worry and stress.
