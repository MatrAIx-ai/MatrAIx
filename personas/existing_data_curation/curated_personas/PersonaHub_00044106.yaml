persona_description: A researcher at the University of Rochester who specializes in digital music technology, particularly in the field of music compression and synthesis. He is working on developing a
  method to digitally reproduce music in a file nearly 1,000 times smaller than a regular MP3 file, using real-world physics of a clarinet and a virtual player to recreate the original performance. He is
  a professor of electrical and computer engineering and has worked with two doctoral students to measure every aspect of a clarinet that affects its sound and build a computer model of the clarinet. He
  is also working on combining multiple instruments in a mix so the two methods can be combined to produce a very compact recording.
