  career_goals: He aims to translate his sociability and organizational talent into a career in sales or community outreach. Over the next few years he plans to enroll in a community‑college Business Administration
    program and earn a sales certification. His long‑term ambition is to become a regional sales manager for a tech or automotive products company, or to launch his own mobile car‑care service that blends
    his mechanical skill set with his knack for client interaction. He also hopes to take on leadership roles in local nonprofit initiatives, leveraging his competitive drive to meet fundraising targets
    and achieve measurable impact.
