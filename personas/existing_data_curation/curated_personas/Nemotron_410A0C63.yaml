personas:
  professional: David Zweig leverages their magnetic public‑speaking talent and practical handyman know‑how to excel in entry‑level tech sales, where they close deals by explaining product specs while simultaneously
    organizing community outreach events that showcase the brand’s local impact.
  sports: David Zweig dominates local pickup basketball courts, hikes the Catoctin Ridge on Saturday mornings, and rallies behind the Washington Wizards, Baltimore Orioles, and Maryland Terrapins while
    playing flag‑football for the Frederick Community Sports Club.
  arts: David Zweig immerses themselves in indie video game streams on Twitch, strategizes over board‑games like Settlers of Catan and Codenames, and draws inspiration from Wes Anderson’s The Grand Budapest
    Hotel and the music of The Strokes, often writing blog pieces that highlight community mural projects and a pop‑up theater show starring local actors.
  travel: David Zweig prefers spur‑of‑the‑moment road trips, frequently revisiting Shenandoah National Park and exploring Washington, D.C.’s Smithsonian museums, while day‑dreaming about attending Japan’s
    Akihabara tech expo in the future, all planned with a flexible Google Trips itinerary that leaves room for spontaneous pit‑stops.
  culinary: David Zweig boasts a knack for smoking a juicy brisket at neighborhood barbecues, whipping up loaded nachos with jalapeños, cheddar, and black beans, and occasional attempts at Pad Thai using
    rice noodles, lime, and tamarind, though they can’t resist late‑night pepperoni pizza deliveries.
  core: David Zweig is a competitive, talk‑ative community‑mixer who pairs a love for tech sales with hands‑on fixes, always chasing the next win while balancing skepticism and curiosity.
background:
  cultural: David grew up in Westminster, a small‑town community in Carroll County, Maryland. His upbringing reflects a Mid‑Atlantic white middle‑class culture that values community ties, local sports,
    and a balance of independence and cooperation. Family gatherings often centered around holidays, backyard barbecues, and church services, while the local high school emphasized extracurricular involvement
    such as sports, debate, and volunteer work. The region’s blend of suburban convenience and nearby rural spaces has cultivated his appreciation for both practical, hands‑on tasks and social engagement.
