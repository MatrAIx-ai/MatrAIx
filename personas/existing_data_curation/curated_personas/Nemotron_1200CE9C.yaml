  career_goals: Inspired by her love for structure and problem‑solving, Julie aspires to pursue a career in scientific fields. She dreams of becoming a wildlife biologist or a forensic scientist, roles
    that combine methodical investigation with tangible impact. Julie also hopes to lead a school robotics team and eventually work as an engineer designing sustainable solutions for her community. Her
    competitive spirit drives her to aim for excellence while remaining grounded in practical, real‑world outcomes.
