personas:
  professional: Julie Driggers is a budding game‑design enthusiast who leverages the strategic depth of chess and the visual storytelling tools of Scratch to prototype interactive puzzle‑games, showcasing
    a practical, competitive edge and a love for structured, step‑by‑step development.
  sports: Julie Driggers plays forward for the Ashville Strikers U12 soccer team, follows the Los Angeles Galaxy for inspiration, trains competitively three times a week, balances practice with weekend
    garden chores, and channels a strategic mind from chess into reading the game’s tactics.
  arts: Julie Driggers creates animated short stories on Scratch inspired by Pixar’s Brad Bird and Hayao Miyazaki, devours Nancy Drew mysteries, builds intricate LEGO dioramas of classic movie scenes, and
    attends community art fairs to showcase their own pixel‑art creations.
  travel: Julie Driggers delights in weekend hikes along the Blue Ridge Trail, dreams of visiting Yellowstone National Park and the Grand Canyon, prefers trips that blend structured itinerary with spontaneous
    nature exploration, and always packs a sketchbook for documenting trail discoveries.
  culinary: Julie Driggers loves making custom thin‑crust pizzas topped with fresh basil from the family garden, mozzarella, pepperoni, and a drizzle of olive oil, enjoys baking LEGO‑themed cupcakes with
    bright frosting, and often experiments with snack mixes of pretzels, dried apricots, and almonds.
  core: Julie Driggers is a detail‑oriented, competitively spirited 11‑year‑old who balances structured soccer practice, chess strategy, and Scratch animation while occasionally leaving LEGO bricks scattered
    and forgetting to floss.
background:
  cultural: Julie comes from a white, Midwestern background in Lexington, Indiana, a small farming community in Scott County. Her family values practicality, self‑reliance, and community involvement, reflecting
    the region's traditional ethos. She celebrates typical American holidays—Thanksgiving, Independence Day, and Easter—often attending the local church and participating in community activities such as
    county fairs, school fundraisers, and volunteer projects. These experiences shape her grounded, organized, and collaborative outlook.
