personas:
  professional: Heather Fenn is a community‑focused hospitality entrepreneur in the making, leveraging her strong public‑speaking, conflict‑mediation, and DIY project skills to design a boutique bed‑and‑breakfast
    near Table Rock Lake that blends curated outdoor experiences with handmade home‑decor, all while navigating her spontaneous nature and occasional struggle with strict deadlines.
  sports: Heather Fenn embraces the outdoors through weekend hikes on the Ozark Trail, kayaking sessions on Table Rock Lake with the local Ozark Paddle Club, and avidly supports the St. Louis Cardinals
    and Kansas City Chiefs, while also participating in a community running group that meets for a 5K every Saturday.
  arts: Heather Fenn weaves together her love for quilting, line‑dancing, and storytelling by attending monthly quilting circles inspired by the works of Faith Ringgold, dancing to classic country hits
    by Dolly Parton at local venues, and discussing novels ranging from Toni Morrison to Stephen King in her book club, which fuels her creative spirit.
  travel: Heather Fenn prefers spontaneous road trips that blend adventure and relaxation, often charting routes through nearby Branson, the hot springs of Arkansas, and occasional weekend getaways to Asheville,
    North Carolina, while keeping travel budgets tight by staying in family‑run motels and using discount travel apps.
  culinary: Heather Fenn’s kitchen is a hub of Midwestern comfort and farm‑to‑table creativity, where she bakes buttermilk biscuits, whips up pork tenderloin with apple chutney, and experiments with heirloom
    tomato salads seasoned with fresh basil and local honey, often sharing her dishes at potluck gatherings that feature homemade corn chowder and bourbon‑glazed carrots.
  core: Heather Fenn is a calm, community‑minded planner who balances spontaneous road‑trip cravings with meticulous DIY projects, often forgetting deadlines but never a friend’s invitation.
background:
  cultural: Heather was raised in a small Midwestern town in Missouri, immersed in the region's values of hospitality, community service, and a deep appreciation for the outdoors. Her white, rural upbringing
    included frequent involvement with her local church, county fairs, and family gatherings that emphasized self‑reliance and neighborly support. These cultural influences shape her calm resilience and
    her desire to foster connections within her community while embracing new ideas.
