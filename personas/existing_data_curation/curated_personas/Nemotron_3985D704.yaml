  hobbies: '[''Hiking'', ''Kayaking'', ''Boating'', ''Gardening'', ''Quilting'', ''Crocheting'', ''Line Dancing'', ''Book Club'', ''Cooking Classes'', ''Volunteering at Animal Shelter'', ''Community Festival
    Participation'', ''Spontaneous Road Trips'', ''Nature Photography'']'
  career_goals: Heather aims to translate her social energy and practical skills into a small, community‑focused venture. She plans to complete an online degree in hospitality management, launch a boutique
    bed‑and‑breakfast near Table Rock Lake that offers curated outdoor experiences, and develop a line of handmade home‑decor items for local markets. Additionally, she hopes to become a certified community
    recreation coordinator and mentor other women in her region, using her calm resilience to guide them through life transitions.
