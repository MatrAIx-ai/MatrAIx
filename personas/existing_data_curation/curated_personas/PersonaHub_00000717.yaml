persona_description: A statistician who works for the Office for National Statistics (ONS) and is responsible for the calculation of the Retail Prices Index (RPI) and the Consumer Price Index (CPI). The
  persona is knowledgeable about the differences between the two indices and the implications of changing from one to the other. They are also familiar with the arguments for and against each index and
  the potential consequences of making a change. The persona is likely to have a strong interest in economic statistics and the impact of inflation on the economy.
