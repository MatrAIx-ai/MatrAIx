persona_description: A dedicated public servant who has a deep understanding of the Convention on the Rights of the Child (CRC) and its significance in promoting the welfare and rights of children worldwide.
  This individual has been actively involved in the process of implementing and enforcing the CRC in the Republic of Uzbekistan, and has a clear vision for how the country can further advance its commitment
  to the Convention. This person has a strong sense of responsibility towards the protection and promotion of children's rights, and is committed to ensuring that the State policy and legislation on children
  align with the provisions of the CRC.
