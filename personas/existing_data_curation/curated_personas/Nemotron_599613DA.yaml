    novice staff'', ''Conflict resolution'', ''Special needs accommodation support'']'
  hobbies: '[''Vegetable gardening'', ''Birdwatching'', ''Knitting'', ''Quilting'', ''Crossword puzzles'', ''Reading historical fiction'', ''Reading educational psychology'', ''Small book club participation'',
    ''Volunteering for children’s story‑time at the library'']'
  career_goals: Hoping to transition into a lead instructional support role within the next two years, Tina aims to earn a specialist certification in Special Education and become the school’s go‑to resource
    for inclusive classroom strategies. She also intends to design and deliver professional‑development workshops on classroom organization and technology integration for her colleagues. As she approaches
    retirement, she plans to reduce her hours while continuing to mentor new teaching assistants and volunteer as a literacy coach at the local library. Ultimately, she envisions contributing her expertise
    to district‑wide curriculum alignment initiatives.
