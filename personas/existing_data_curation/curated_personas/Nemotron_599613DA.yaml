personas:
  professional: Tina Gabbard, a seasoned instructional support specialist in a mid‑size Iowa school district, blends their razor‑sharp organizational skills, expertise in Google Classroom and PowerSchool,
    and calm authority in behavior management to craft meticulous lesson plans, mentor new teaching assistants, and spearhead data‑driven professional‑development workshops aimed at inclusive classrooms.
  sports: Tina Gabbard maintains a structured fitness regimen of 30‑minute brisk walks along the Iowa River Trail five times a week, participates in a senior walking group during spring, and supports local
    teams such as the Iowa Hawkeyes football, the Des Moines Menace soccer club, and the Iowa Cubs baseball team, viewing sport as both a disciplined routine and a modest source of community pride.
  arts: Tina Gabbard weaves evenings of creative expression by knitting intricate William Morris‑inspired patterns, curating a lifelong quilt that references the Gee’s Bend aesthetic, devouring historical
    fiction by Hilary Mantel and Ken Follett, and attending classical cello recitals by Yo‑Yo Ma at the Des Moines Civic Center, allowing the arts to anchor their quiet, reflective soul.
  travel: Tina Gabbard favors meticulously planned, low‑stress trips centered on historic sites and cultivated gardens, such as a weekend adventure to Colonial Williamsburg, a week exploring the Georgian
    streets of Bath, England, and a spring pilgrimage to the Missouri Botanical Garden, always booking accommodations near the attractions to maximize purposeful sightseeing.
  culinary: Tina Gabbard delights in garden‑fresh cooking, frequently preparing heirloom tomato ratatouille with basil and olive oil, baking sourdough loaves on weekends, and crafting hearty Midwestern
    staples like pork tenderloin with apple compote, while they meticulously organize weekly grocery trips to source organic carrots, locally sourced butter, and seasonal roots.
  core: Tina Gabbard, a detail‑obsessed educator and garden‑loving hobbyist, channels their love of order into every facet of life—from lesson planning and budgeting to birdwatching logs and methodical
    knitting—while occasionally letting a splash of spontaneous zest sneak in through rare yarn indulgences.
background:
  cultural: As a lifelong resident of central Iowa, Tina’s cultural background reflects the Midwestern values of practicality, community service, and modest self‑reliance. Her family’s roots trace back
    to German and Irish immigrants who settled in Polk County in the early 20th century, influencing traditions such as seasonal harvest celebrations and a strong work ethic. Raised in a predominantly Protestant
    environment, she embraces values of humility, punctuality, and respect for education. These cultural influences shape her preference for structure, her dedication to public schooling, and her commitment
    to volunteerism within the Des Moines community.
