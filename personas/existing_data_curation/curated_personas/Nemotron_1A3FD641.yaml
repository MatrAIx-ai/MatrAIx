personas:
  professional: Shobha Sengdara, a two-year-old budding visual explorer, channels boundless curiosity and love of unconventional ideas into daily crayon scribbles, turning messy, disorganized art projects
    into early experiments in pattern recognition while they prefer solitary play in a quiet corner, often ignoring the usual toddler schedule of nap and snack times.
  sports: Shobha Sengdara delights in swinging at the local playground, chasing a small foam soccer ball while they cheer for the San Jose Earthquakes on a miniature TV, prefers solitary play in the sandbox
    over organized team games, and their occasional bursts of assertiveness show when they defend their chosen slide against other kids.
  arts: Shobha Sengdara, an avid little art lover, spends quiet afternoons watching animated performances of Disney classics and listening to the soothing piano pieces of Ludovico Einaudi, often humming
    along to the Beatles song Let It Be and experimenting with finger paints by splashing bright blues and yellows on large sheets, and they enjoy the solitude of creative expression.
  travel: Shobha Sengdara has already visited the beach in Santa Monica and a family-friendly zoo in San Diego, dreams of a future trip to Disneyland, prefers stroller-ridden, low-stimulus travel plans
    over crowded airports, and they are curious enough to linger over seashells while their occasional worry about unfamiliar noises keeps them close to a caregiver.
  culinary: Shobha Sengdara favors soft, comforting foods like macaroni and cheese, sweet potato puree, and banana slices, enjoys dipping tiny carrot sticks in hummus, delights in occasional strawberry
    yogurt treats, but their disorganized snack routine often leads to spilled milk and a habit of gnawing on the edge of a plastic spoon, and they often need reminders to wash their hands afterwards.
  core: Shobha Sengdara is a two-year-old quiet explorer who blends artistic curiosity with solitary play, worries about small changes, and quietly resists the hustle of toddler obligations while they hoard
    crayons and candy alike.
background:
  cultural: Shobha comes from a South Asian family that blends Indian cultural traditions with everyday life in Buffalo, Minnesota. Her parents speak a South Asian language at home, celebrate festivals
    like Diwali and Holi, share traditional stories and music, and incorporate cultural foods into meals, providing her with a rich, multicultural upbringing while she also experiences the local Midwestern
    community.
