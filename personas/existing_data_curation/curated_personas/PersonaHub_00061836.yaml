persona_description: A geneticist or a medical geneticist specializing in the study of transthyretin amyloidosis, a rare and potentially life-threatening condition caused by mutations in the TTR gene. They
  are highly skilled in performing genetic sequencing tests, particularly on the coding regions and splice sites of the TTR gene, to diagnose and monitor the progression of transthyretin amyloidosis in
  patients. They also have expertise in the interpretation of genetic data and the development of personalized treatment plans for individuals with transthyretin amyloidosis.
