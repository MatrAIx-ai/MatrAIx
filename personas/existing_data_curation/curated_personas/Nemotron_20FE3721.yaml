personas:
  professional: Stanley Iriza, a 21‑year‑old sales representative, leverages their meticulous organization and compassionate listening to craft tailored service solutions, consistently exceeding pipeline
    targets while fostering a supportive, low‑stress team environment.
  sports: Stanley Iriza, a 21‑year‑old member of the Piedmont FC recreational soccer league, throws themselves into midfield play each fall, supplements their fitness with weekly hikes in the Black Hills,
    and they root for the Green Bay Packers and the Denver Broncos while also coaching youth soccer volunteers at the local food bank.
  arts: Stanley Iriza, a 21‑year‑old community‑theater enthusiast, portrays leading roles in summer productions of classic comedies, spends evenings editing landscape photos inspired by Ansel Adams, and
    they unwind listening to Chris Stapleton and the folk‑rock duo Mumford & Sons.
  travel: Stanley Iriza, a 21‑year‑old adventure‑oriented traveler, plans low‑cost road trips to the geysers of Yellowstone and the sandstone cliffs of Mesa Verde, dreams of backpacking Denmark's coastal
    towns, and they return home with a meticulous travel journal that blends budget tips with reflections on community service.
  culinary: Stanley Iriza, a 21‑year‑old home‑cook who excels at grilling bison burgers with juniper‑berry glaze and perfecting buttery German potato salad, balances hearty Midwest comfort dishes like chili‑con‑carne
    with experimental weekend attempts at Swedish gravlax, and they frequently swap recipes at the food bank pantry.
  core: Stanley Iriza, a 21‑year‑old endlessly organized yet chronically worried soul, keeps a color‑coded planner, never leaves home without a notebook, volunteers weekly, and they obsessively track personal
    productivity metrics while indulging in occasional late‑night coffee binges.
background:
  cultural: Stanley grew up in Piedmont, South Dakota, a close‑knit Midwestern community with strong ties to family, church, and local tradition. His white, predominantly European‑American heritage includes
    influences from German and Scandinavian ancestors who settled the region, fostering values of hard work, self‑reliance, and community service. The town’s modest pace, annual county fairs, and emphasis
    on volunteerism have shaped his practical outlook and commitment to helping others. While he appreciates the region’s conservative roots, his outgoing nature and compassionate outlook lead him to engage
    actively with diverse community initiatives and to seek balance between tradition and personal growth.
