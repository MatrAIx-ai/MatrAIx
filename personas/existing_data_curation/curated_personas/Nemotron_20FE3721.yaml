  career_goals: Stanley aims to progress from a sales representative to a senior sales manager within the next three years, leading a high‑performing team of service‑focused professionals. He plans to earn
    a bachelor's degree in Business Administration to deepen his strategic understanding and to obtain industry certifications such as Certified Professional Sales Person (CPSP). Over the longer term, he
    envisions stepping into a director‑level role where he can shape company‑wide service offerings, mentor junior staff, and champion initiatives that improve customer satisfaction and employee well‑being.
    Ultimately, he hopes to launch his own consultancy that helps small businesses streamline their service sales processes.
