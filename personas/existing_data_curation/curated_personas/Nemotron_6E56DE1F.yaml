  career_goals: Brenda dreams of becoming an artist or illustrator who creates stories that inspire other children, and she also envisions herself as a teacher who brings creativity into the classroom.
    She is intrigued by the idea of working at a local museum in the Shenandoah Valley, sharing art and history with visitors. Her organized mindset leads her to plan for higher education in fine arts or
    education, where she can manage projects that benefit her community. Ultimately she hopes to combine her love of art, learning, and caring for others into a career that makes a positive impact.
