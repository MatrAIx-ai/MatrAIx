  career_goals: Rhonda aims to advance from a frontline security guard to a supervisory role within the regional casino industry, such as Security Shift Supervisor or Casino Operations Manager. She plans
    to obtain the West Virginia State Security Officer certification and enroll in an associate’s program in Criminal Justice to broaden her credentials. Long‑term, she aspires to transition into corporate
    security risk assessment, leveraging her on‑the‑ground experience to develop preventive strategies for larger entertainment venues. Financial stability and the ability to provide a secure future for
    her family are central motivations, driving her ambition to become a trusted leader in safety and operations.
