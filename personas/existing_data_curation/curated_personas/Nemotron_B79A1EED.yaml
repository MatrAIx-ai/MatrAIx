personas:
  professional: A security professional with a knack for real‑time surveillance, Rhonda Ferlo blends their practical, detail‑oriented mindset with a cooperative, calm demeanor to defuse tense situations,
    while wrestling with the occasional rush to meet tight incident‑report deadlines.
  sports: Avid hiker and seasonal runner, Rhonda Ferlo regularly tackles the Appalachian Trail, cheers for the West Virginia Mountaineers football team and the Pittsburgh Steelers, and belongs to the Charleston
    Mountain Hikers club, balancing structured workouts with spontaneous weekend treks.
  arts: A creative photographer and bluegrass enthusiast, Rhonda Ferlo captures West Virginia’s misty ridgelines in a style reminiscent of Ansel Adams while enjoying live shows by the Del McCoury Band and
    Alison Krauss, channeling their cooperative spirit into community art showcases.
  travel: Rhonda Ferlo plans most trips with a detailed itinerary but leaves room for spur‑of‑the‑moment hikes, having explored Shenandoah National Park, the Blue Ridge Parkway, and weekend festivals in
    Asheville, while dreaming of a future backpack adventure through the Canadian Rockies.
  culinary: A culinary hobbyist, Rhonda Ferlo whips up comfort classics like bourbon‑glazed chicken with sweet‑potato mash and truffle‑infused mac and cheese, experimenting with rosemary, smoked paprika,
    and a dash of sriracha, yet they occasionally over‑salt a dish when rushing after a night shift.
  core: Rhonda Ferlo balances a love for structured security protocols with spontaneous outdoor escapes, often juggling meticulous watchlists while forgetting to water their houseplants.
background:
  cultural: Rhonda grew up in a close‑knit, predominantly white, Appalachian community in Berkeley County, where family ties, church involvement, and a strong work ethic shaped her values. The region’s
    emphasis on self‑reliance and neighborly support influenced her practical, dependable nature and her desire to contribute to communal safety. She was raised with an appreciation for local traditions,
    such as weekend barn dances, homemade cooking, and storytelling, which fostered her love for communal gatherings and a respect for local heritage. While her formal education concluded with a high school
    diploma, the cultural emphasis on hands‑on learning and community involvement motivated her to develop functional skills through real‑world experience rather than traditional academic pathways.
