    * * User 1: * * I can understand that. I like to take walks to clear my head too.

    * * User 2: * * Do you have any siblings?

    * * User 1: * * Yes, I have a twin sister.

    * * User 2: * * That must be cool! I''ve always wanted a twin.

    * * User 1: * * It is! We''re very close.

    * * User 2: * * Do you do anything together?

    * * User 1: * * We used to do everything together, but now that we''re adults, we don''t get to see each other as often. But when we do, we always have a lot of fun.

    * * User 2: * * That sounds great.

    * * User 1: * * So, what do you do for a living?

    * * User 2: * * I''m a nurse.

    * * User 1: * * That''s awesome! I have a lot of respect for nurses.

    * * User 2: * * Thanks! It''s a tough job, but it''s also very rewarding.

    * * User 1: * * I can imagine. What do you like most about being a nurse?

    * * User 2: * * I like helping people. It''s really satisfying to be able to make a difference in someone''s life.

    * * User 1: * * That''s a great answer.

    * * User 2: * * Thanks.

    * * User 1: * * Well, it was nice talking to you.

    * * User 2: * * You too'
