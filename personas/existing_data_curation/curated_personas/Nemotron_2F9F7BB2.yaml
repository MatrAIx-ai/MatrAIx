  career_goals: Paula's current ambitions focus on lifelong learning and community impact. She intends to complete an online certificate in museum studies to deepen her ability to design inclusive art programs
    for seniors. She aspires to launch a quarterly intergenerational art workshop that pairs local retirees with middle-school students, fostering mutual learning and creativity. Paula plans to author a
    memoir that weaves her teaching experiences with the evolving cultural history of Oldsmar, and to donate the manuscript to the local library. She also seeks a seat on the city's arts council to advocate
    for expanded public art installations and accessible cultural events. Finally, she hopes to travel to at least two major art museums each year, continuing her personal exploration of new ideas and artistic
    movements.
