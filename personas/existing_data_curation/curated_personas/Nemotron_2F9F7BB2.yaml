personas:
  professional: A retired public-school teacher and community arts advocate, Paula Balls leverages three decades of curriculum design expertise, meticulous project planning, and a curious, organized mindset
    to develop inclusive art programs, mentor intergenerational workshops, and champion senior participation on the city’s arts council.
  sports: An enthusiastic fan of Tampa Bay sports and a dedicated walker, Paula Balls follows the Rays and Buccaneers on television, participates in the senior walking club at the local park, and plays
    occasional pickleball at the community center, using these activities to stay active and socially connected.
  arts: A devoted watercolorist and theatre patron, Paula Balls draws inspiration from the Florida Gulf Coast for her paintings, attends productions at the Oldsmar Playhouse, curates seasonal exhibitions
    for the town’s cultural council, and admires works by Monet and O’Keeffe, channeling her curiosity and organization into vibrant community arts initiatives.
  travel: An organized art‑focused traveler, Paula Balls plans annual trips to world‑renowned museums such as the Getty Center in Los Angeles and the Metropolitan Museum of Art in New York, seeks senior
    discounts for flights, and balances her love of exploration with a comfortable pace that allows for reflective sketching sessions abroad.
  culinary: A faithful baker of Southern‑style pies, Paula Balls delights in making key‑lime pie with freshly squeezed local limes, peach cobbler using garden‑grown fruit, and walnut pecan tart, while skillfully
    balancing moderate cooking skills with a penchant for experimenting with new spice blends and occasional over‑baking.
  core: Paula Balls is a curious, organized 70‑year‑old educator turned community arts champion who blends meticulous planning with a love for watercolor, quilting, and senior mentorship, all while indulging
    in pies, museum visits, and a steady stream of lifelong learning.
background:
  cultural: Paula is a White American whose family roots trace back to German and Irish immigrants who settled in the Midwest. She grew up in a suburban Midwestern town in the 1950s and 60s, attending a
    Protestant church and internalizing values of community service, modesty, and a strong work ethic. In the early 1990s she relocated to Oldsmar, Florida, drawn by its warm climate and vibrant senior
    community. While she embraces the coastal lifestyle and enjoys the diverse culinary and cultural influences of Pinellas County—such as Cuban coffee and Florida seafood—her upbringing remains evident
    in her preference for organized community structures, respect for tradition, and a balanced social life that values both group activities and quiet, reflective time.
