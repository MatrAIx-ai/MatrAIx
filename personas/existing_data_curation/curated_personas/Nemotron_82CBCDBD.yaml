personas:
  professional: Ronnie Booms is a hands‑on laboratory chemist who excels at organic and polymer synthesis, quickly troubleshoots equipment using FTIR, NMR, XRD and SEM, and writes clear reports, but their
    relaxed approach to planning sometimes leads to improvisation when protocols are vague, driving them to rely on practical problem‑solving skills.
  sports: Ronnie Booms is an avid outdoor enthusiast who spends weekends fly‑fishing the Oconee River and hiking the Piedmont foothills with the Georgia Trails Association, supports the Atlanta Braves and
    Atlanta United FC, and they occasionally join a local pick‑up basketball game for cardio.
  arts: Ronnie Booms unwinds by strumming an acoustic guitar to the riffs of Lynyrd Skynyrd and The Allman Brothers, curates a collection of classic science‑fiction by Asimov and William Gibson, and they
    occasionally attend local open‑mic nights to share their own compositions.
  travel: Ronnie Booms prefers low‑key road trips that blend hiking and fishing, having explored the Great Smoky Mountains and the Blue Ridge Parkway with a well‑planned itinerary, while they dream of an
    Icelandic adventure to chase the northern lights after completing the next degree.
  culinary: Ronnie Booms enjoys cooking hearty Southern dishes such as shrimp and grits with a hint of smoked paprika and fresh rosemary, brines their own trout for weekend grill sessions, and they occasionally
    attempt sourdough bread, though their busy schedule sometimes leads to ordering take‑out after late lab nights.
  core: Ronnie Booms is a practical, hands‑on chemist who balances a love for outdoor craftsmanship with a stress‑prone, improvisational work style, and they often trade meticulous lab work for the freedom
    of fishing, woodworking, and guitar strings.
background:
  cultural: Ronnie grew up in a close‑knit, working‑class family in Laurens County, Georgia. His upbringing reflects typical Southern values—hospitality, self‑reliance, and a strong sense of community.
    He was raised attending a local Baptist church, where parish activities taught him the importance of cooperation and helping neighbors. Southern cuisine, country music, and seasonal community fairs
    are integral parts of his life. While his education at a nearby community college exposed him to broader academic perspectives, he remains rooted in the regional culture, balancing modesty and practicality
    with a curiosity for scientific advancement.
attributes:
  skills: '[''Organic synthesis'', ''Polymer formulation'', ''Fourier‑transform infrared spectroscopy (FTIR)'', ''Nuclear magnetic resonance (NMR)'', ''X‑ray diffraction (XRD)'', ''Scanning electron microscopy
    (SEM)'', ''Data analysis with Excel and Python'', ''Laboratory safety compliance'', ''Technical report writing'', ''Instrument troubleshooting'']'
  hobbies: '[''Fly fishing'', ''Hiking in the Piedmont foothills'', ''DIY woodworking'', ''Repairing small engines'', ''Playing acoustic guitar'', ''Reading science‑fiction'', ''Volunteer park clean‑up'']'
  career_goals: Ronnie aims to move from a technical support role into a lead materials scientist position within the next five years. He plans to complete a bachelor’s degree in chemistry, followed by
    a master’s in materials science, to deepen his theoretical knowledge. His long-term ambition is to spearhead R&D projects that develop low-cost, sustainable composite materials for the automotive and
    aerospace industries, secure patents, and eventually mentor junior technicians. He also hopes to achieve a better work‑life balance that reduces his stress and allows more time for personal projects.
