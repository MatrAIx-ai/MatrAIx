  hobbies: '[''Cooking Honduran dishes'',''Gardening'',''Church services and choir'',''Dancing to Latin music'',''Crocheting and knitting'',''Reading historical novels'',''Senior center board games'',''Volunteering
    at food bank'',''Organizing cultural celebrations'']'
  career_goals: Although retired, Courtney’s ambition is to remain a vibrant pillar of her family and the local Hispanic community. She aims to pass down her culinary heritage and language skills to her
    grandchildren, preserve family stories in a memoir, and continue volunteering at the senior center and community food bank. She hopes to maintain her health through regular walks and gardening, travel
    occasionally to visit relatives in Honduras, and perhaps take a short community-college class on digital photography to capture local events. Her long-term goal is to ensure that the cultural traditions
    she cherishes remain alive for future generations.
