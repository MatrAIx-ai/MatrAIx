  career_goals: As she approaches retirement, Teresa’s primary career goal is to transition into a part‑time mentorship role where she can share her customer‑service expertise with younger employees at
    the store and in the community. She hopes to obtain a certification in senior‑citizen support, enabling her to volunteer more formally at the local senior center. Long‑term, she intends to secure a
    comfortable financial footing while maintaining an active presence in her neighborhood, perhaps by leading a small bookkeeping workshop for fellow retirees interested in managing their finances more
    effectively.
