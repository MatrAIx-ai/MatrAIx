  career_goals: Rosa aims to advance to a supervisory role on the production floor within the next three years, leveraging her reliability and methodical approach to lead a team. She plans to enroll in
    evening courses at a community college to earn a certificate in industrial technology or operations management, which will strengthen her leadership and analytical abilities. Long‑term, she envisions
    contributing to continuous improvement initiatives that increase efficiency while maintaining product quality, and she hopes to become a trusted mentor for other workers seeking career growth.
