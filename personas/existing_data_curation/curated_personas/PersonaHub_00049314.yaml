persona_description: A political activist who is concerned about the impact of public disclosure on civic participation and the role of transparency in democratic societies. They are interested in the empirical
  study of the effects of transparency on small donors and the potential chilling effect it may have on participation. They are likely to be familiar with the controversy surrounding the California ballot
  measure against same-sex marriage and the use of donor lists and Google maps to target supporters. They are also likely to be interested in the potential impact of transparency on political participation
  and the role of civic courage in maintaining a functioning democracy.
