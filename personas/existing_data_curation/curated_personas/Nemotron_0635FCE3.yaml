  career_goals: Jamshid aims to advance to a senior strategic analyst role where he can lead cross‑functional initiatives that leverage data‑driven decision‑making to improve organizational performance.
    He plans to earn certifications such as PMP or CBAP to strengthen his project‑management capabilities and eventually pursue a director‑level position overseeing operational excellence or innovation.
    In parallel, he is focused on developing stronger organizational habits to meet deadlines consistently, and he hopes to mentor junior analysts, fostering a collaborative culture. Over the long term,
    he is interested in contributing his analytical expertise to public‑policy analysis for Middlesex County, helping shape community development projects.
