persona_description: A member of the U.S. Army Corps of Engineers who is responsible for managing the Lower Columbia River Estuary and is concerned about the predation of Caspian terns. They are knowledgeable
  about the ecological impact of predation and the potential consequences of removing predator birds from an ecosystem. They are interested in the effectiveness of adaptive management strategies and the
  implementation of the Caspian Tern Plan. They are also interested in the latest research findings and the potential impact of predation on juvenile salmon and steelhead.
