  career_goals: Although retired, Arthur aims to mentor emerging entrepreneurs in his community, offering pro‑bono financial advice to local small businesses. He is dedicated to ensuring his wife's comfort
    and health, supporting her involvement in church and community activities. Arthur also seeks to create a lasting legacy by establishing a modest scholarship fund for business students at his alma mater
    and by documenting his family's history for future generations.
