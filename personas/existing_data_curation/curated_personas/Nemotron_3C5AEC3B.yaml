personas:
  professional: Benjamin Hagelin is a methodical building-cleaning specialist in Tampa who applies systematic inventory tracking, data-driven sanitation protocols, and a commitment to low-impact chemicals,
    and they are actively pursuing IICRC Certified Professional Cleaner certification and an associate degree in facilities management to ascend into supervisory roles and eventually launch their own eco-friendly
    cleaning firm.
  sports: Benjamin Hagelin finds calm on the water, regularly fishing at Lake Tarpon and the Gulf shoreline with the Tampa Bay Anglers Association, while rallying behind the Buccaneers, Lightning, and Rays,
    and they sustain fitness through early-morning jogs, weekend bike rides, and occasional body-weight circuits, preferring solitary, structured workouts that align with their methodical nature.
  arts: Benjamin Hagelin channels their love for precision into building intricate scale models after hours, often accompanied by the ambient soundscapes of Brian Eno and the minimalist piano of Philip
    Glass, and they also draw inspiration from David Attenborough’s natural-history documentaries and Ansel Adams’s black-and-white photography, which together shape a quiet yet thoughtful artistic sensibility.
  travel: Benjamin Hagelin prefers meticulously planned solo excursions that blend environmental curiosity with relaxation, having explored the coastal charm of St. Petersburg, the mangrove trails of the
    Everglades, and the historic streets of Charleston, while now daydreaming about sustainable-energy tours in Iceland and eco-adventures in New Zealand, all budgeted around their certification tuition
    and living costs.
  culinary: Benjamin Hagelin enjoys crafting simple, nutrient-dense meals such as grilled branzino with lemon-basil quinoa, kale-avocado salads, and shrimp tacos seasoned with cilantro and lime, favors
    fresh herbs harvested from their container garden, cooks at a moderate skill level, and they occasionally surrender to fast-food burgers when pressed for time, yet they remain vigilant about limiting
    processed foods and excess sodium.
  core: Benjamin Hagelin combines relentless curiosity with a disciplined, solitary approach, thriving on methodical problem-solving while often wrestling with worry, a competitive edge, and a penchant
    for meticulous planning that fuels both ambition and occasional stress.
background:
  cultural: Benjamin grew up in Bradenton, Florida, in a middle‑class White American family with roots in the Midwest. His upbringing blended typical Southern Florida influences—beach outings, weekend barbecues,
    and high school football culture—with a respect for hard work and self‑reliance. He was raised in a Protestant household that emphasized punctuality, responsibility, and community service. Living near
    diverse coastal ecosystems, he developed an appreciation for environmental stewardship, which now informs his interest in sustainable cleaning practices.
attributes:
  skills: '["Commercial cleaning", "Floor care (strip, wax, buff)", "Restroom sanitation", "Chemical safety and handling", "Inventory management", "Time management", "Detail-oriented inspection", "Basic
    maintenance (light bulb replacement, minor repairs)", "Knowledge of sustainable cleaning practices", "Operation of cleaning equipment (auto scrubbers, vacuums)"]'
  hobbies: '["Reading non-fiction (science, sustainability)", "Fishing at local lakes and Gulf beaches", "DIY home repairs and woodworking", "Scale model building", "Container gardening", "Playing tactical
    strategy video games", "Personal finance tracking", "Volunteer community clean‑up events (small groups)", "Exploring new cleaning technology and gadgets", "Solo running for stress relief"]'
  career_goals: Benjamin aims to advance from a building cleaner to a supervisory role, eventually becoming a facilities manager. He plans to obtain certifications such as the IICRC Certified Professional
    Cleaner and pursue an associate degree in facilities management. Long‑term, he hopes to start his own eco‑friendly cleaning business that emphasizes low‑impact chemicals and data‑driven efficiency,
    positioning himself as a leader in sustainable facility services in the Tampa Bay area.
