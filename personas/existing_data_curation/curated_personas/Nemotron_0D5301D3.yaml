personas:
  professional: Tiara Darling is an aspiring curatorial assistant who leverages self‑taught graphic design, photography, and meticulous organization to translate community mural stories into museum exhibitions,
    while their competitive edge fuels a relentless push for under‑represented voices despite occasional skepticism about collaborators’ motives.
  sports: Tiara Darling enjoys early morning runs with the Northside Running Club, follows the Minnesota Timberwolves and Minnesota United FC with fervor, and participates in weekly pick‑up basketball games
    at the community center, using sport as both stress release and a competitive outlet.
  arts: Tiara Darling immerses themselves in the visual and literary scene, sketching in coffee shops while listening to Kendrick Lamar and the late Kanye West, curating Instagram posts featuring Jacob
    Lawrence-inspired murals, and attending spoken‑word nights where poets like Danez Smith ignite their own poetic reflections.
  travel: Tiara Darling prefers curated, budget‑friendly trips that blend art and culture, such as weekend explorations of the Minneapolis Institute of Art’s satellite locations, a memorable road trip to
    New Orleans to absorb its jazz heritage, and a future plan to visit Lisbon’s street‑art districts to study European mural techniques.
  culinary: Tiara Darling enjoys cooking soulful dishes like shrimp étouffée and sweet‑potato pie using smoked paprika and fresh cilantro, while they frequently order artisanal flat‑white coffee and seek
    out farm‑to‑table restaurants that feature locally sourced kale and quinoa bowls, balancing comfort food cravings with health‑conscious tweaks.
  core: Tiara Darling blends meticulous curation, artistic curiosity, and a competitive drive with a habit of over‑thinking finances and health, forging a path that champions under‑represented art while
    navigating constant inner skepticism.
background:
  cultural: Tiara grew up in a close‑knit African‑American community on Minneapolis’s Northside, where church gatherings, soulful music, and community murals were a daily presence. Her family tradition
    blends Southern U.S. roots with the vibrancy of the Twin Cities Black cultural scene, exposing her to gospel choirs, spoken‑word poetry, and local festivals like the Twin Cities Black Arts Festival.
    This heritage instilled in her a deep appreciation for Black artistic expression and a commitment to uplifting under‑represented voices while navigating the challenges of being a Black woman in a predominantly
    white city.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Digital photography'', ''Art curation and exhibition planning'', ''Creative writing and poetry'', ''Critical analysis of visual media'',
    ''Organizational planning and time management'', ''Self‑directed research'', ''Social media content creation'', ''Customer service (part‑time retail)'', ''Strategic problem solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Digital photography'', ''Creative writing and poetry'', ''Attending spoken‑word and poetry slam events'', ''Listening to
    jazz, hip‑hop, and soul music'', ''Watching art documentaries'', ''Mindfulness journaling'', ''Running in local parks'', ''Volunteering at community art workshops'']'
  career_goals: Tiara aims to turn her passion for art into a career by earning a certificate in museum studies or arts administration at a community college and eventually securing a role as a curatorial
    assistant at a local museum or cultural center. She also dreams of launching an independent online platform that showcases emerging Black artists from the Twin Cities, providing them with marketing
    support and curated sales. In the longer term, she hopes to lead community‑based art programs that empower youth in underserved neighborhoods and to become a recognized voice advocating for equitable
    representation in the arts.
