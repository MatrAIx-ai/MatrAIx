personas:
  professional: Zachary Kennedy, a 29‑year‑old full‑stack developer, merges meticulous Python and React craftsmanship with a humanities‑informed eye for accessibility, delivering clean APIs and thorough
    documentation while championing structured Agile sprints yet insisting on flexible remote days to honor his solitary, reflective nature.
  sports: Zachary Kennedy fuels his fitness through predictable weekend kayaking on the Atlantic and scheduled hikes of New England’s lighthouse trails, while occasionally joining the Swampscott running
    club for a structured group run; he roots for the Boston Red Sox and the New England Revolution as his go‑to professional sports teams.
  arts: Zachary Kennedy immerses himself in classic literature, often rereading Dostoevsky and Kant while composing acoustic guitar renditions of Nick Drake, and captures moody lighthouse silhouettes in
    the style of Ansel Adams, preferring solitary creative sessions that satisfy his reserved temperament.
  travel: Zachary Kennedy favors purposeful getaways, meticulously planning solitary road trips to historic coastal towns like Mystic, while allowing spontaneous detours to maritime museums in Portsmouth,
    England and Kyoto, Japan, balancing his remote‑work flexibility with a modest travel budget.
  culinary: Zachary Kennedy enjoys cooking fresh seafood, routinely whipping up New England clam chowder with thyme‑infused butter, pan‑seared scallops with lemon zest, and experimenting with sous‑vide
    cod, a practical home chef who occasionally splurges on specialty oysters from local farms.
  core: Zachary Kennedy is a methodical coder with a solitary soul, who oscillates between structured sprint planning and spontaneous lighthouse photo hunts, all while juggling a habit of forgetting to
    charge his camera battery.
background:
  cultural: Zachary grew up in a middle‑class New England family of Anglo‑American heritage. His upbringing in the Boston‑area suburbs immersed him in the region’s maritime history, town‑meeting civic culture,
    and a strong emphasis on education. He identifies with the quiet, self‑reliant values common to coastal Massachusetts, while also appreciating the multicultural influences of nearby immigrant communities
    that shape local food, festivals, and public life. His humanities degree deepened his connection to American literary traditions and historic preservation, which informs both his professional work and
    his community involvement.
