    acoustic guitar'', ''Cooking New England seafood'', ''Volunteering at local historical society (digitization)'']'
  career_goals: He aims to progress to a senior engineer role within the next three years, focusing on architectural design and mentorship. Long‑term, Zachary wants to lead a small product team that builds
    digital tools for cultural institutions, merging his technical skills with his passion for history and the humanities. He seeks a work environment that offers flexibility—remote days and adaptable sprint
    planning—so he can maintain a balanced personal life while continuing to develop open‑source projects for archival preservation.
