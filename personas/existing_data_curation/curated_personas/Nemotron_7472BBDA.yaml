  career_goals: Jamie dreams of turning her curiosity into a future career that blends technology and problem-solving. She aims to earn a scholarship to a STEM-focused high school, join a robotics team,
    and eventually study engineering or computer science. She is motivated to design innovative solutions, such as environmentally friendly devices or helpful software, that can improve everyday life. In
    the short term, she plans to win the school science fair, improve her coding projects, and take on leadership roles in her class. Long-term, she envisions herself as a robotics engineer or software
    developer who leads teams to create practical, cutting-edge technology.
