personas:
  professional: Jamie Davis is a budding young robotics enthusiast who blends a love of building complex LEGO sets with a methodical, organized approach to coding simple Scratch games, and their competitive
    streak drives them to lead school science club projects and meticulously plan every experiment.
  sports: Jamie Davis spends most Saturday afternoons dribbling for the Cedar Park Soccer Association’s U12 team, where they devise strategic plays and relish competing against rival clubs, while cheering
    for the Dallas Cowboys and Austin FC at home and idolizing players like Christian Pulisic for their tactical intelligence.
  arts: Jamie Davis channels their love of adventure novels into sketching dynamic characters inspired by series like Percy Jackson and Harry Potter, frequently listening to the upbeat pop tracks of Taylor Swift
    and Imagine Dragons while drawing, and they eagerly anticipate new releases from Disney Pixar, often quoting lines from Toy Story during class.
  travel: Jamie Davis’s travel style blends curiosity with careful planning, preferring family road trips to places like the Grand Canyon and the historic streets of New Orleans where they can hike and
    photograph wildlife, while dreaming of a future adventure to Japan’s Kyoto to explore temples and try authentic sushi, though limited allowance sometimes forces them to settle for local weekend getaways.
  culinary: Jamie Davis loves experimenting in the kitchen, skillfully whisking up chocolate chip cookies, homemade pizza with mozzarella and pepperoni, and simple pasta dishes flavored with garlic and
    basil, yet they sometimes over‑bake the cookies, leading to a crisp edge they jokingly call extra crunch, and they proudly serve these treats to family members after school.
  core: Jamie Davis is a meticulous, competitive 11‑year‑old who balances a love for strategic soccer, LEGO engineering, and culinary experiments with a skeptical eye toward spending, and who occasionally
    forgets to moisturize their eczema before bedtime.
background:
  cultural: Jamie grows up in Mesquite, a suburban community in Dallas County, Texas, within a family that reflects the values of many middle-class White Texan households. Her upbringing combines the warm
    hospitality and community orientation typical of the region - family BBQs, church youth events, and local school spirit - with exposure to contemporary technology and multicultural classmates. The local
    culture's emphasis on independence, practicality, and friendly competition influences her organized, goal-oriented personality. Seasonal celebrations such as Fourth of July fireworks, Texas Independence
    Day gatherings, and community rodeos provide Jamie with a sense of regional pride, while her family's involvement in church and school activities reinforces a supportive, collaborative environment.
