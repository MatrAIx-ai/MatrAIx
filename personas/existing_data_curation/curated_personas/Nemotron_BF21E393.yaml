  hobbies: '[''Building with LEGO'', ''Drawing cartoons'', ''Reading picture books'', ''Exploring the neighborhood park'', ''Collecting rocks and leaves'', ''Playing with a remote-control car'', ''Riding
    his bike'', ''Playing board games such as Candy Land'']'
  career_goals: He dreams of exploring the world and helping others; he is fascinated by astronauts, firefighters, and engineers. He often says he wants to become an astronaut who builds things in space
    or a firefighter who protects his community, reflecting his blend of curiosity and practical desire to make a difference. He also enjoys imagining inventing simple gadgets.
