personas:
  professional: An aspiring junior builder, William Brown constructs elaborate LEGO cities and designs simple mechanisms for his remote‑control car, blending curiosity with a practical eye for how pieces
    fit together while they often ignore strict instructions in favor of flexible experimentation.
  sports: An energetic explorer, William Brown spends afternoons riding a blue BMX bike around the neighborhood park, participates in a community backyard soccer league with a mini‑team called the "Park
    Rangers", and cheers enthusiastically for the hometown Chicago Cubs while they prefer casual play over structured training.
  arts: An avid young artist, William Brown fills sketchbooks with original cartoon characters inspired by the whimsical styles of Dr. Seuss and the playful simplicity of Mo Willems, while they spend evenings
    curled up with picture books like "Where the Wild Things Are" and sing along to the catchy tunes of Disney's "Frozen" soundtrack.
  travel: A curious traveler, William Brown loves spontaneous family road trips to nearby state parks and dreams of visiting the magical realms of Disney World and the towering cliffs of the Grand Canyon,
    yet they often rely on their parents' schedule and enjoy the flexibility of stopping at a roadside ice‑cream stand.
  culinary: A budding food explorer, William Brown prefers cheesy pepperoni pizza, crunchy chicken nuggets, and creamy mac & cheese, often sprinkling extra cheddar, and they proudly assist in making peanut
    butter & jelly sandwiches while occasionally sneaking a bite of the hidden banana slices in the fruit bowl.
  core: William Brown is a curious, low‑key six‑year‑old who blends imaginative LEGO engineering with a laid‑back, slightly disorganized routine, cherishing small‑group play, occasional assertiveness, and
    a penchant for saving spare change in a pink piggy bank.
background:
  cultural: William comes from a Greek-American family living in Florissant, Missouri. His parents maintain a blend of Greek traditions—such as celebrating Easter with traditional foods and learning a few
    Greek words—and Midwestern American customs, including attending community festivals, cheering at St. Louis Cardinals games, and participating in school activities. The family’s cultural mix fosters
    an appreciation for both his heritage and the local community.
attributes:
  skills: '[''Reading age-appropriate books'', ''Writing his name and simple sentences'', ''Counting to 100'', ''Basic addition and subtraction'', ''Assembling LEGO structures'', ''Drawing simple pictures'',
