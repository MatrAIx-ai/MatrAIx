  career_goals: Madeline dreams of a future where she can blend her love of communication with a desire to help others. She imagines becoming a teacher or youth mentor who encourages curiosity in schoolchildren,
    or a community health worker who supports families in her neighborhood. Her fascination with animals sometimes leads her to think about veterinary science, while her interest in local agriculture sparks
    thoughts of studying environmental or agricultural science to protect the farms of Kern County. She also enjoys the idea of hosting a radio or school news program where she could share stories and give
    a voice to her peers.
