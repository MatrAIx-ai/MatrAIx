personas:
  professional: Betty Curtis, a seasoned full‑stack software engineer, combines their mastery of React, Node.js, and Python with cloud‑native AWS expertise and Agile leadership to deliver reliable web applications
    while mentoring junior developers, and they are strategically preparing for an engineering management role by pursuing PMP and advanced AWS certifications.
  sports: Betty Curtis, an avid outdoor enthusiast, hikes the White Mountain trails with their family each weekend, pedals with the Granite State Cyclists on Saturday rides, they're an enthusiastic supporter
    of the Boston Red Sox and Boston Celtics, and they occasionally join a local CrossFit box for strength training.
  arts: Betty Curtis, a community‑theater participant, enjoys performing in productions of Neil Simon comedies and occasionally sings in a local folk choir, they frequent the Boston Symphony Orchestra and
    admire the works of painter Andrew Wyeth, and they unwind by listening to Bon Iver and reading Neil Gaiman.
  travel: Betty Curtis, a meticulous travel planner, prefers curated road trips to Acadia National Park and family beach stays on Cape Cod, they dream of trekking Patagonia's Torres del Paine, they balance
    budget constraints with splurging on unique experiences like a sushi‑making workshop in Tokyo, and they rely on a mix of Airbnb stays and boutique hotels.
  culinary: Betty Curtis, an enthusiastic home chef, hones their skills in New England cooking classes, they love preparing clam chowder, lobster rolls, and apple crisp with locally sourced maple syrup,
    they host dinner parties featuring sous‑vide salmon and fresh dill potatoes, yet they sometimes order takeout pizza when deadlines loom.
  core: Betty Curtis blends methodical engineering precision with sociable community energy, juggling leadership ambitions, family hikes, and New England culinary experiments, all while fueling their days
    with triple espressos and occasionally over‑committing to too many projects.
background:
  cultural: Betty grew up in a suburban New England town near Boston, raised in a family of Irish-English descent that values education, hard work, and community service. The region’s blend of historic
    tradition and progressive thinking has shaped her practical curiosity and collaborative spirit. She maintains strong ties to local customs, celebrating holidays like Thanksgiving with extended family
    gatherings and participating in neighborhood events such as the annual town fair. Her cultural identity emphasizes modesty, reliability, and a commitment to giving back, which aligns with her professional
    and personal pursuits.
