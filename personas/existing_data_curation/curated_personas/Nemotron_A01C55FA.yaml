  career_goals: Betty aims to progress into an engineering management role where she can steer large-scale, user-focused products from concept to market. She plans to earn a PMP certification and advanced
    AWS credentials to deepen her strategic planning capabilities. Long-term, she aspires to become a director of technology, championing inclusive hiring practices and spearheading community outreach programs
    that encourage girls and underrepresented groups to pursue STEM careers. She also envisions launching a boutique consultancy that helps midsize firms adopt sustainable, cloud-native solutions while
    maintaining a healthy work-life balance for their teams.
