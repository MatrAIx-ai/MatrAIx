  career_goals: Yong aims to become a robotics engineer or software developer focused on creating intelligent, sustainable technologies. He dreams of attending a top engineering university such as Stanford
    or MIT, then contributing to cutting‑edge projects at a leading Silicon Valley tech firm or launching his own startup that applies AI to environmental challenges. He also hopes to mentor younger students
    in his community, sharing his enthusiasm for coding, robotics, and problem‑solving.
