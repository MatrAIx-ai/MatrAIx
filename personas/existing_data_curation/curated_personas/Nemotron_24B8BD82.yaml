personas:
  professional: Yong Gonzalez, a 14‑year‑old member of his school’s robotics club, channels his love of strategy video games like StarCraft into meticulous robot design and programming, delivering competition‑ready
    machines that reflect his organized, competitive, and curiosity‑driven approach to engineering.
  sports: Yong Gonzalez dominates after‑school basketball sessions with the East Bay Falcons, idolizes the Golden State Warriors, drills twice weekly at the Silicon Valley Taekwondo Academy, and follows
    the San Jose Sharks, pursuing a disciplined yet fiercely competitive fitness routine that mirrors their strategic gaming mindset.
  arts: Yong Gonzalez streams BTS’s latest K‑pop hits alongside Bad Bunny’s Latin tracks, binge‑watches anime classics such as Neon Genesis Evangelion and Studio Ghibli films, and collects Gundam model
    kits, a blend of audiovisual passions that fuels their creative imagination and meticulous craftsmanship.
  travel: Yong Gonzalez seeks trips that merge technology and tradition, from a weekend scouting Akihabara’s gaming expos in Tokyo to a family road‑trip through Oaxaca for vibrant altar celebrations, and
    a school field day at the Computer History Museum, balancing modest allowances with a craving for immersive cultural experiences.
  culinary: Yong Gonzalez alternates between devouring spicy tacos al pastor, savoring pork dumplings (jiaozi) during Lunar New Year feasts, and whipping up quick miso‑ramen bowls, while occasionally attempting
    churro batches for friends, a palate that revels in bold, cross‑cultural flavors.
  core: Yong Gonzalez is a competitively curious teen who blends strategic gaming, meticulous robotics, and multicultural rhythms into a disciplined yet playful life, often juggling a perfectionist streak
    with a stubborn independence.
background:
  cultural: Yong grew up in San Jose, California, in a bicultural household. His father immigrated from Guangzhou, China, while his mother is of Mexican heritage, carrying the Gonzalez surname. At home,
    Mandarin is spoken alongside Spanish, and the family celebrates both Lunar New Year and Día de los Muertos, giving him a rich blend of East Asian and Latino traditions. The multicultural environment
    of Silicon Valley, with its vibrant Asian American and Hispanic communities, has shaped his worldview, fostering respect for diverse perspectives and encouraging his curiosity about technology and engineering.
