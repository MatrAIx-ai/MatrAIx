personas:
  professional: An emerging architectural drafter, Johanna Figueroa leverages AutoCAD, Revit, and SketchUp expertise to produce precise 2-D drawings and immersive BIM models, while their talkative, people-oriented
    nature turns client meetings into lively brainstorming sessions and helps translate code constraints into practical, cost-effective design solutions.
  sports: An enthusiastic beach-volleyball player and morning yogi, Johanna Figueroa trains with the Miami Beach Volleyball Club each summer, follows the Miami Heat for basketball inspiration, and maintains
    a flexible fitness routine that blends daily sunrise beach yoga with spontaneous weekend volleyball matches, though occasional disorganization sometimes leaves them skipping a session.
  arts: A vivacious lover of music and performance, Johanna Figueroa lights up karaoke nights belting out songs by Shakira and Beyoncé, hones salsa steps to the rhythms of Celia Cruz and Marc Antonio, and
    regularly attends local theater productions of Lin-Manuel Miranda's "Hamilton," allowing their extroverted spirit to fuel both social connections and personal confidence.
  travel: Preferring flexible itineraries that blend guided cultural tours with spontaneous beach downtime, Johanna Figueroa often chooses destinations like Cartagena's historic walled city, the tropical
    shores of Key West, or a weekend road-trip to the Florida Keys, balancing a modest travel budget with a desire to experience heritage sites and local cuisine.
  culinary: A proficient home chef, Johanna Figueroa delights in preparing family-style ropa vieja with shredded beef, tomatoes, olives, and a garlicky mojo sauce, as well as crispy tiritas seasoned with
    cumin and lime, often pairing these dishes with freshly brewed cafe con leche during weekly gatherings, while also experimenting with grilled plantains and mango salsa for a sweet-savory balance.
  core: Johanna Figueroa thrives on the buzz of social gatherings and the predictability of drafting workflows, juggling a love for beach yoga and karaoke with a penchant for last-minute spending and occasional
    calendar chaos that keeps their anxiety on a perpetual low-grade hum.
background:
  cultural: Johanna was raised in a Cuban‑American household in Broward County, where Spanish and English flow interchangeably at home. Family gatherings revolve around music, dance, and home‑cooked meals
    that celebrate her island roots. She participates in local Cuban festivals, maintains close ties with the Cuban diaspora in nearby Miami, and upholds traditions such as celebrating Nochebuena and Carnaval.
    Her cultural identity shapes her warm, expressive communication style and her appreciation for community‑centered activities.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''SketchUp'', ''Building Information Modeling (BIM)'', ''Technical drawing'', ''Blueprint reading'', ''Florida building code knowledge'', ''Construction documentation'',
    ''Effective verbal communication'', ''Team collaboration'']'
  hobbies: '[''Salsa dancing'', ''Karaoke nights'', ''Weekly coffee meet‑ups'', ''Beach yoga'', ''Journaling'', ''Cooking Cuban cuisine'', ''Beach volleyball'', ''Attending Cuban cultural festivals'', ''Volunteering
    as a community guide'', ''Reading contemporary fiction'']'
  career_goals: In the next three years, Johanna aims to deepen her BIM expertise, earn a professional drafter certification, and take on larger project responsibilities at her firm. She dreams of becoming
    a licensed architect, eventually leading a design team that creates resilient coastal housing in South Florida. She values a stable, routine‑oriented career path that offers clear milestones, while
    also seeking opportunities to mentor junior staff and represent her firm at community design workshops.
