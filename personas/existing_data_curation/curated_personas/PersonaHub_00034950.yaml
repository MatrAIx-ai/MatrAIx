persona_description: A materials scientist and engineer who specializes in the design and development of advanced composite materials. He is particularly interested in the study of helicoidal layered designs
  and their applications in impact-resistant structures. His research has led to the development of carbon fiber-epoxy composites with helicoidal layered structures, which have shown promising results in
  terms of impact resistance and energy absorption. His work has been recognized with a $7.5 million Department of Defense grant to continue his research.
