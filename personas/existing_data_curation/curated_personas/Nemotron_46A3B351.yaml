personas:
  professional: Sokha Tran, a detail‑oriented dental hygienist renowned for expertise in periodontal therapy, digital imaging, and patient education, channels her methodical yet compassionate style into
    streamlining clinic operations, mentoring future hygienists, and spearheading community oral‑health outreach.
  sports: Sokha Tran energizes her weekends with group fitness classes—Zumba, spin, and community boot‑camps—and tackles seasonal hikes on Rattlesnake Ledge alongside her husband and teens, while cheering
    the Seattle Seahawks and Seattle Sounders FC and participating in a local running club that meets at Green Lake.
  arts: Sokha Tran nurtures her creative side through nature photography, board‑game nights featuring Catan and Ticket to Ride, and regular visits to the Seattle Repertory Theatre, while finding inspiration
    in the music of Norah Jones and Sufjan Stevens and occasionally attending local art walks.
  travel: Sokha Tran prefers thoughtfully planned family trips that blend adventure and relaxation, having explored the Olympic Peninsula’s tide‑pools, the historic temples of Kyoto, and the alpine hikes
    of Banff, while keeping a wish list that includes New Zealand’s South Island for its breathtaking scenery.
  culinary: Sokha Tran, an enthusiastic home cook, expertly prepares aromatic dishes like pho broth, lemongrass chicken, and coconut‑milk curry, delights in sourcing fresh herbs such as cilantro and Thai
    basil, and enjoys hosting potluck gatherings where friends savor her signature mango sticky rice dessert.
  core: Sokha Tran is a meticulous dental hygienist who balances a bustling family life, community service, and personal wellness through organized routines, creative hobbies, and a constant drive to blend
    science with compassion.
background:
  cultural: Sokha grew up in a bilingual household with parents who immigrated from Vietnam, where respect for elders, communal meals, and a strong emphasis on education were core values. Her family maintained
    cultural traditions such as celebrating Tet, preparing pho and bánh mì together, and participating in local Vietnamese cultural festivals in Seattle. This upbringing instilled a collaborative spirit
    and a deep sense of harmony, which she carries into her professional and personal relationships. While fully integrated into the multicultural fabric of Redmond, she remains connected to her heritage
    through language practice, community events, and supporting newer immigrant families. The blend of Southeast‑Asian cultural emphasis on collective well‑being and her American STEM education informs
    her balanced approach to curiosity, practicality, and caring for others.
attributes:
  skills: '["Clinical prophylaxis and scaling","Root planing and periodontal assessment","Fluoride and sealant application","Patient education and motivational interviewing","Digital radiography and intra‑oral
    imaging","Dental practice‑management software (Eaglesoft, Dentrix)","Infection‑control and OSHA/CDC compliance","Dental materials science (adhesives, polymers)","Data‑driven quality improvement","Team
    coordination and staff training","Community outreach program planning","Organizational and inventory management","Stress‑management facilitation for patients"]'
  hobbies: '["Group fitness classes (Zumba, spin)","Hiking and trail walking in the Pacific Northwest", "Cooking traditional Southeast‑Asian cuisine and hosting potlucks", "Board‑game nights and community
    trivia", "Yoga and mindfulness meditation", "Reflective journaling", "Volunteer oral‑health education for schools", "Nature and family photography", "Reading popular science and health technology books"]'
  career_goals: Sokha aims to deepen her clinical expertise by obtaining an advanced certification in periodontal therapy and pursuing a Master’s degree in Dental Public Health. She envisions transitioning
    into an academic role as a clinical instructor at the University of Washington’s dental program, where she can mentor the next generation of hygienists. Long‑term, she aspires to assume a supervisory
    or clinic‑manager position that leverages her organizational talent to streamline operations and improve patient outcomes. Parallel to her professional growth, Sokha wants to spearhead a community oral‑health
    initiative in King County that provides free screenings and education to underserved families, especially recent Southeast‑Asian immigrants. She also dreams of launching a mobile dental‑hygiene service
    for seniors, integrating emerging technologies like laser de‑contamination to enhance preventive care while maintaining a balanced work‑life harmony with her family.
