persona_description: A yoga teacher and scholar, known for his contributions to the development of hatha yoga and the influence he had on the world of yoga, particularly in the Western world. He was the
  father of modern yoga and was a scholar in Sanskrit, Vedic rituals, and philosophy. He taught B.K.S. Iyengar, Pattabhi Jois, Indra Devi, and even his own son, T.K.V. Desikachar. He was born in 1888 in
  a remote village in India and spent seven years studying with his guru, Ramamohana Brahmacharya, who lived in a cave in a remote region of the Himalayas. He continued to teach out of his home after closing
  the yoga school at the palace, where he taught his own son, T.K.V. Desikachar, a style of yoga that would help make yoga accessible to everyone and use its therapeutic value to do so. He also was the
  first to put sun salutations into writing, which he did in 1934 in the Yoga Makaranda. He lived to be 101 years old, leaving his physical body in 1989.
