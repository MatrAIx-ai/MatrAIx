persona_description: A historical coin collector and enthusiast who is particularly interested in the Roman coinage of the 1st and 2nd centuries AD. This persona is knowledgeable about the coinage reforms
  of Augustus, the gradual reduction in the size of Bronze denominations, and the impact of inflation on the purchasing power of Roman currency. This person is also interested in the technical details of
  Roman coin production, such as the distinction between Bronze and Brass, the process of debasing coins, and the use of forged coins to overstrike the images of emperors on them.
