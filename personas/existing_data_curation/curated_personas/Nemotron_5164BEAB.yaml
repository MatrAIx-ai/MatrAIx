  career_goals: Lee aims to advance to a supervisory or team‑lead role within the claims department over the next few years, where he can mentor newer clerks and champion collaborative, process‑driven improvements.
    He plans to earn professional certifications such as the Chartered Property Casualty Underwriter (CPCU) or Associate in Insurance (AIC) and is considering an associate’s degree in business administration
    to deepen his understanding of risk management and analytics. While he values career growth, he also seeks to maintain a flexible schedule that allows time for family and personal interests, preferring
    a role that balances responsibility with a supportive, team‑focused environment.
