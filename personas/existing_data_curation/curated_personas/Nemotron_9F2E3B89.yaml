personas:
  professional: Megan Madarang, a three‑year‑old budding organizer, runs the living‑room “office” where they line up stuffed animals like employees, demand predictable schedules, and reward themselves with
    a gold sticker for every task completed.
  sports: Megan Madarang, a three‑year‑old enrolled in the community centre’s “Mini Movers” program, spends Saturdays dribbling a soft soccer ball while cheering for the hometown baseball team, the Rapids,
    and enjoys a weekly toddler gymnastics class at the downtown studio.
  arts: Megan Madarang, a three‑year‑old aficionado of finger‑painting and Sesame Street melodies, loves to sing along to Ernie’s “Rubber Duckie,” and proudly displays their crayon‑covered rainbow masterpiece
    on the refrigerator.
  travel: Megan Madarang, a three‑year‑old adventurous weekend explorer, loves visiting the nearby botanical garden’s butterfly pavilion and dreams of seeing the giant redwoods in California, while still
    needing a stroller for longer trips.
  culinary: Megan Madarang, a three‑year‑old picky eater who adores mac‑and‑cheese, chicken nuggets, and sliced strawberries, can butter a piece of toast all by themselves and insists on sprinkling extra
    cheese on every bite.
  core: Megan Madarang, a three‑year‑old whose love for tidy toy rows, piggy‑bank savings, and rhythmic nursery rhymes creates a delightfully structured yet whimsically curious little world.
background:
  cultural: Megan is a White child raised in Rogers, Minnesota, a close‑knit Midwestern community. Her family participates in local church gatherings and celebrates traditional American holidays such as
    Thanksgiving, Christmas, and Independence Day with family meals and community events. Seasonal activities like summer picnics at the nearby parks and winter sledding are common in her upbringing. The
    region’s blend of modest Midwestern values and occasional Scandinavian heritage influences—reflected in community fairs, folk music, and hearty comfort foods—shape her cultural experiences, emphasizing
    politeness, community involvement, and a love of the outdoors.
