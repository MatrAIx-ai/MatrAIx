  career_goals: Megan often talks about wanting to help others when she grows up. She dreams of becoming a kindergarten teacher because she loves stories and enjoys playing with peers. She also expresses
    fascination with animals and imagines herself as a veterinarian or a farmer caring for livestock. Occasionally, she mentions wanting to bake cookies for her family, hinting at an aspiring baker or chef
    role. These ambitions reflect her caring nature, desire for structure, and interest in nurturing environments.
