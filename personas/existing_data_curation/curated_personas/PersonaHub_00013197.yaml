persona_description: A scientist who specializes in studying the impact of climate change on plant growth and vegetation. They are involved in a study that has verified the accelerated growth of plants
  due to climate change and rising carbon dioxide levels. They are a Research Scientist at the Finnish Meteorological Institute and have published a study in the science journal Nature, which introduces
  a new way to monitor global changes in photosynthesis. They are interested in understanding the role of plants in climate change and how they can be used to mitigate the adverse effects of climate change.
