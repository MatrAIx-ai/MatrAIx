  career_goals: Although officially retired, Leslie aims to leave a lasting legacy in her community. She plans to compile and publish a comprehensive family history that integrates oral stories and archival
    records, and to digitize the Chilton Historical Society’s collection of photographs and newspaper clippings for public access. She hopes to curate an annual exhibition that showcases senior artists,
    emphasizing high standards of presentation she values. Leslie also aspires to mentor younger volunteers in archival best practices and to serve as chair of the senior activities committee, ensuring
    events remain meticulously organized. On a personal level, she seeks to complete a series of online courses in art history and digital preservation, to continue challenging her intellect and to maintain
    the disciplined growth she treasures.
