  career_goals: Leon aims to transition from regional sales manager to a senior director role overseeing multiple territories within the Southeast, where he can shape company‑wide sales policy and champion
    diversity and inclusion initiatives. He is committed to establishing a formal mentorship program for emerging Black sales professionals, leveraging his experience to lift the next generation. In the
    longer term, he envisions founding a boutique consulting firm that helps midsize companies refine their sales operations while embedding community‑focused values. He also hopes to contribute to a scholarship
    fund for local students pursuing business education, ensuring his legacy supports both corporate success and community advancement.
