    and CPR certification'']'
  hobbies: '[''Playing soccer in a local adult league'', ''Cooking traditional Mexican cuisine'', ''Fishing on the Rio Grande'', ''Listening to regional Mexican music (banda, norteño)'', ''Attending community
    festivals (Charro Days, Cinco de Mayo)'', ''Volunteering at church food drives'', ''Watching boxing matches with friends'']'
  career_goals: Roberto’s primary goal is to move into a supervisory position, such as shift foreman or warehouse lead, within the next two to three years so he can apply his practical knowledge to managing
    crews and optimizing workflow. He aims to complete a short‑term certification in warehouse management and safety leadership to strengthen his credentials. Long‑term, he dreams of launching his own small
    logistics business—purchasing a used truck and offering local freight services across the Rio Grande Valley—providing a stable income for his family and creating jobs for other community members.
