personas:
  professional: Roberto Santos, a 43‑year‑old veteran forklift operator and warehouse logistics specialist, leverages two decades of hands‑on experience, OSHA‑compliant safety focus, bilingual communication,
    and a competitive, structure‑driven mindset to lead crews and optimize workflow while eyeing a shift‑foreman role.
  sports: Roberto Santos anchors the midfield for the Brownsville Bulls adult soccer league every Saturday, avidly follows the Rio Grande Valley FC Toros and the Houston Astros, and spends quiet Sundays
    fishing the Rio Grande, balancing competitive drive with peaceful outdoor relaxation.
  arts: Roberto Santos immerses themselves in regional Mexican music—spinning classics from Vicente Fernández and contemporary hits by Gerardo Ortiz—regularly attends Charro Days celebrations, and enjoys
    watching films by Alejandro González Iñárritu, finding these cultural arts as a communal thread that fuels their social energy.
  travel: Roberto Santos prefers road‑tripping with family, having already explored the historic streets of San Antonio, the vineyards of Hill Country, and cross‑border excursions to Monterrey, while planning
    a future vacation to the Gulf Coast to combine beach relaxation with a fishing charter.
  culinary: Roberto Santos prides themselves on mastering traditional dishes—hand‑rolled tamales, slow‑cooked carnitas, and hearty pozole—seasoned with fresh ancho chilies and hominy, often cooking for
    neighborhood potlucks while occasionally burning the rice when juggling multiple pots.
  core: Roberto Santos blends a competitive, structure‑loving work ethic with a sociable, community‑first spirit, balancing forklift precision with weekend soccer hustle, a habit of over‑seasoning food,
    and a cautious optimism toward launching a logistics startup.
background:
  cultural: Roberto is a Mexican‑American who grew up in Mission, Texas, a city that straddles Mexican and Texan cultures. He was raised in a Spanish‑speaking household while attending public school, giving
    him fluency in both Spanish and English. His upbringing blends traditional Mexican customs—celebrating Día de los Muertos, Mexican Independence Day, and family Sunday dinners—with Texan influences such
    as attending high school football games and enjoying Tex‑Mex cuisine. A practicing Catholic, Roberto participates in parish activities and values family loyalty, hard work, and community solidarity,
    traits that shape his outlook both at work and in his personal life.
attributes:
  skills: '[''Forklift operation (certified)'', ''Heavy lifting and load securing'', ''Warehouse inventory control using basic WMS software'', ''Basic equipment maintenance and troubleshooting'', ''OSHA
