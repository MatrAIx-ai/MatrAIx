persona_description: An investor who is interested in the growth and development of Islamic finance and impact investing globally. This person is likely to have a strong understanding of Islamic finance
  principles, including the prohibition of interest, profit and loss sharing, and the prohibition of gharar. They are also familiar with the concept of Islamic bonds, known as sukuk, and their potential
  as a source of capital for infrastructure projects in sub-Saharan Africa. Additionally, this person may have a keen interest in the potential collaboration between Islamic finance and impact investing,
  as evidenced by their interest in the joint report produced by UNDP, the Islamic Research and Training Institute, and the Istanbul International Center for Private Sector in Development.
