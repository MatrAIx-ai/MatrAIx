personas:
  professional: Champa Shah, a 63‑year‑old veteran of residential and small‑business cleaning, leverages over four decades of systematic, eco‑friendly cleaning expertise to launch a boutique consulting
    service that provides personalized home‑organization solutions for senior households in Oakland County, while pursuing Certified Professional Organizer certification and mentoring younger staff.
  sports: Champa Shah, a fan of the Detroit Tigers and Detroit Red Wings, spends her mornings walking with the Clinton River Trail Walking Club, enjoys low‑impact yoga sessions at the community center,
    and occasionally joins the local senior softball league for light competition.
  arts: Champa Shah, an avid visitor of the Detroit Institute of Arts and MOCAD, finds inspiration in the works of Claude Monet, Frida Kahlo, and Kehinde Wiley, dedicates evenings to watercolor studies
    of Midwestern flora, and actively volunteers to curate art workshops at local cultural festivals.
  travel: Champa Shah prefers thoughtfully planned, senior‑friendly trips that blend cultural immersion with natural beauty, such as weekend getaways to the Grand Canyon, art‑focused visits to Paris’s Musée
    d’Orsay, and seasonal stays in Kyoto’s historic districts, always using senior discounts and staying with family or trusted inns.
  culinary: Champa Shah, an intermediate home chef, delights in creating fusion dishes like spiced corn and lentil chowder, apple‑cinnamon biryani, and roasted zucchini tossed with mustard seed and maple
    syrup, often seasoning with cumin, turmeric, and garam masala while sourcing fresh herbs from her garden.
  core: Champa Shah blends a methodical cleaning expertise with artistic curiosity, compassionate senior advocacy, and a penchant for spice‑laden fusion cooking, all while juggling meticulous budgeting,
    occasional forgetfulness of medication, and a weekend habit of watercolor painting on the river trail.
background:
  cultural: Champa was born to Indian immigrant parents who settled in Michigan in the early 1970s. She grew up speaking Hindi at home while attending public schools where she became fluent in English.
    Her family maintains traditional celebrations such as Diwali, Holi, and Eid, integrating them with local community events. These cultural practices have instilled a deep respect for hospitality, communal
    sharing, and the arts. Champa’s culinary heritage includes a repertoire of regional dishes from Gujarat and Punjab, which she adapts for her American surroundings. Although she embraces the customs
    of her adopted hometown—participating in local volunteer groups and seasonal fairs—she also keeps close ties with the South Asian diaspora, attending gatherings at the nearby Hindu temple and the Indian
    cultural association. Her cultural background informs her compassionate approach to service and her enthusiasm for sharing art and cultural knowledge with others.
