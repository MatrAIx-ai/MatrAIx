  career_goals: Looking ahead, Champa aims to transition from full‑time employment to a boutique consulting service that offers personalized home‑organization and cleaning solutions for senior households
    in the Oakland County area. She plans to obtain a professional certification in Certified Professional Organizer (CPO) and to mentor younger cleaning staff, sharing her wealth of practical knowledge.
    Additionally, Champa hopes to volunteer with local cultural centers to help organize art and heritage workshops, combining her love of art with her community‑focused mindset. Ultimately, she envisions
    a modest, sustainable retirement where she can balance a part‑time consulting role with regular participation in community art events and family gatherings.
