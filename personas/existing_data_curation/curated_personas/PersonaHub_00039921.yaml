persona_description: A professional educator who is passionate about promoting restorative justice practices in schools and is seeking to enhance their skills in facilitating circle discussions with students,
  parents, and colleagues. They are interested in learning about the history and fundamentals of circle facilitation, as well as how to use circle ways to enhance academic goals, social-emotional skill
  building, student-led curriculum development, and youth leadership. They are open to learning about the foundational principles of a restorative justice approach to discipline and are eager to apply these
  concepts in their own practice.
