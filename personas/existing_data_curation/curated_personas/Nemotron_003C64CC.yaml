personas:
  professional: John Lyon, a retired hands‑on tradesman, channels their carpentry, engine‑repair, and model‑railroading skills into mentoring high‑school apprentices at the local senior‑center, blending
    curiosity with pragmatic problem‑solving while asserting leadership when needed, and they take pride in each apprentice’s progress.
  sports: John Lyon stays fit by walking the Mississippi River trail with a senior walking club, enjoys weekend fishing on local lakes, and they loyally follow the Minnesota Twins and Minnesota Vikings
    while cheering on the nearby high‑school basketball team.
  arts: John Lyon finds artistic fulfillment in crafting wooden birdhouses, listening to Bob Dylan’s folk tunes, admiring Andrew Wyeth’s realist paintings, and attending modest church choir performances
    that echo their love for tradition and quiet community gatherings, and they cherish the calm that each creative act brings.
  travel: John Lyon prefers low‑key, road‑trip style journeys, having explored historic forts along the Upper Mississippi and the Adirondack region, they plan a Midwest reunion road trip to visit grandchildren
    in Madison, Des Moines, and Kansas City, balancing travel budget constraints with a desire for meaningful family time.
  culinary: John Lyon enjoys hearty Midwestern fare, regularly cooking pan‑fried walleye with fresh dill, a split‑pea soup seasoned with garden carrots, and blueberry pie made with home‑grown berries, showcasing
    solid cooking skills that complement their love of gardening and seasonal harvests, and they often share meals with neighbors.
  core: John Lyon, a pragmatic yet endlessly curious septuagenarian, weaves solitary woodworking, careful budgeting, and community mentorship into a steady rhythm that keeps life purposeful and grounded,
    and they take pride in each small accomplishment.
background:
  cultural: John was born and raised in central Minnesota, where his family’s Norwegian heritage and Lutheran faith have shaped his values and worldview. The Midwestern ethos of self‑reliance, modesty,
    and community service is woven into his daily life. He celebrates traditional holidays such as Christmas and St. Olav’s Day with family potlucks, and he participates in local church events that emphasize
    fellowship and mutual aid. Growing up in Sauk Rapids, he developed a deep respect for the region’s natural landscape—its lakes, forests, and farmlands—which informs his love of outdoor pursuits and
    his commitment to land stewardship. This cultural backdrop blends a strong work ethic with a quiet appreciation for simplicity and the rhythms of the seasons.
