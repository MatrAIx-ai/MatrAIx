  hobbies: '[''Woodworking'', ''Fishing'', ''Bird Watching'', ''Historical Non-fiction Reading'', ''Genealogy Research'', ''Model Railroading'', ''Gardening'', ''Attending Small Church Gatherings'']'
  career_goals: Although retired from the formal workforce, John’s ambition centers on staying purposeful and contributing to his community. He plans to finish a handcrafted Adirondack chair series to gift
    to his grandchildren, compile a detailed family genealogy booklet, and expand the senior‑center’s mentorship program for local high‑school apprentices interested in trades. He also hopes to preserve
    his family’s homestead by documenting its history and maintaining the land as a small community garden. On a personal level, John aims to stay physically active through regular walks along the Mississippi
    River, improve his digital photography skills to capture local wildlife, and travel to visit his three grandchildren scattered across the Midwest.
