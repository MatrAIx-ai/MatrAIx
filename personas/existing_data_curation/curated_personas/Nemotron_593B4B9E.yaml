  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Photography of urban architecture'', ''Volunteering as a museum docent'', ''Hosting a book‑club'', ''Solving puzzles (crosswords,
    sudoku)'', ''Attending live music concerts'', ''Indoor gardening'', ''Practicing yoga'', ''Exploring Texan BBQ restaurants with friends'']'
  career_goals: Helen’s career ambition is to move from a dedicated janitor to a supervisory or facilities‑management role within the next five years. She plans to earn certifications such as the Certified
    Professional Cleaner (CPC) and LEED Green Associate, and to lead a team that implements sustainable cleaning solutions across multiple sites. Ultimately, she hopes to launch her own boutique cleaning
    business that emphasizes eco‑friendly practices and integrates local artwork into commercial spaces, positioning herself as a bridge between facility operations and community culture.
