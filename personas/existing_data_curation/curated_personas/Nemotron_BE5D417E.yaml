    in Día de los Muertos celebrations"]'
  career_goals: Giuliana dreams of becoming a teacher or a veterinarian. She is drawn to teaching because she enjoys explaining ideas clearly, creating organized lesson plans, and helping classmates succeed.
    She also loves animals and imagines a future as a veterinarian, where she can apply her caring nature and systematic approach to caring for pets. In the short term, she is focusing on improving her
    grades and participating in school science clubs to build the foundation for these careers.
