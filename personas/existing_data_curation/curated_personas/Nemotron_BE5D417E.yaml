personas:
  professional: Giuliana Sanchez, a ten‑year‑old budding problem‑solver, turns the mystery of her adventure books into methodical LEGO projects in her school STEM club, applying their organized, reliable
    nature to each step of design and embracing their early passion for engineering.
  sports: Giuliana Sanchez kicks off the school co‑ed soccer team after class, practices with the local Sunnyvale Soccer Club, cheers on the United States Women’s National Team and enjoys watching matches
    of Manchester United on weekends, and they approach fitness with a schedule that blends drills, stretching, and a weekly friendly game with friends.
  arts: Giuliana Sanchez spends her free afternoons sketching cartoons inspired by Jim Davis and Dr Seuss, adds vibrant patterns from folk art to their drawings, and helps build colorful Día de los Muertos
    altars, drawing inspiration from the animated worlds of Hayao Miyazaki, turning each page of their sketchbook into a colourful storyboard.
  travel: Giuliana Sanchez dreams of family road trips to the Grand Canyon and a structured itinerary to Disney World, loves exploring museums during school breaks, prefers carefully planned adventures
    over spontaneous trips, and hopes to someday visit the ancient ruins of Machu Picchu with their parents.
  culinary: Giuliana Sanchez helps their mother assemble tacos and cheese‑filled quesadillas, bakes chocolate chip cookies on weekends, takes pride in mastering the perfect guacamole with fresh avocados
    and lime, and they enjoy experimenting with bright red chili powder to add a little kick to family meals.
  core: Giuliana Sanchez is a methodical ten‑year‑old who blends a love of mystery stories, LEGO engineering, soccer, and family cooking into a structured, creative life, all while they keep a tidy allowance
    ledger and a secret stash of cookies.
background:
  cultural: Giuliana comes from a Mexican‑American family that settled in Omaha’s Little Mexico neighborhood. At home, Spanish is spoken daily, and the family maintains Mexican traditions such as celebrating
    Día de los Muertos, Las Posadas, and Mexican Independence Day with food, music, and community gatherings. Her parents work in service jobs, and she often helps with cooking and cleaning, learning recipes
    passed down through generations. The family blends Mexican cultural values—family closeness, respect for elders, and communal celebrations—with the broader Midwestern environment, exposing Giuliana
    to both community festivals at the Omaha Community Center and the state’s educational system. This multicultural upbringing gives her a strong sense of identity, fluency in two languages, and appreciation
    for both Mexican cuisine and the local Nebraskan customs.
attributes:
