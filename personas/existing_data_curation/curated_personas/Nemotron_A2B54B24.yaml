  career_goals: William aspires to move into a senior program‑management role where he can lead the development of innovative, art‑based mental health initiatives that harness digital tools. He aims to
    secure research funding to evaluate the impact of creative therapies on community resilience and to publish his findings in interdisciplinary journals. Over the next five years, he hopes to become a
    director of community services for a nonprofit or municipal agency in the Bay Area, championing policies that integrate technology, evidence‑based practice, and artistic expression. He also envisions
    earning a doctorate in public health or social work to deepen his expertise and to mentor the next generation of service providers.
