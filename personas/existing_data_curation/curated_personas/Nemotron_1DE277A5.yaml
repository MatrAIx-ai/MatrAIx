  career_goals: Temeka aims to build a career that blends her love for art with community service. Over the next year she plans to enroll in a community‑college program in visual arts or nonprofit management,
    with the goal of securing a role as a program coordinator at a local community center or arts nonprofit. Long‑term, she aspires to develop and lead youth art workshops, curate community exhibitions,
    or work as a facilitator for art‑based therapeutic programs. In addition, she hopes to launch a modest online shop for her artwork to achieve financial independence.
