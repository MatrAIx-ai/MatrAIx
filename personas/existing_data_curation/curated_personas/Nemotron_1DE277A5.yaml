personas:
  professional: Temeka Cunningham, a 23-year-old aspiring community-arts program coordinator, merges her graphic design, photo-editing, and event-organizing expertise with her curious, detail-oriented nature,
    and they create inclusive youth workshops while balancing structured planning and spontaneous creative bursts.
  sports: Temeka Cunningham cycles with the Milwaukee Bike Collective through city neighborhoods, cheers on the Milwaukee Bucks during the NBA season, joins a community softball league in summer, practices
    yoga at the local studio, and they prefer low-impact activities that fit their reserved yet health-conscious lifestyle.
  arts: Temeka Cunningham spends evenings sketching at the Milwaukee Art Museum, draws inspiration from the bold patterns of Yayoi Kusama, the spoken-word power of Amanda Gorman, and the indie-film aesthetic
    of Greta Gerwig, and they curate small pop-up exhibitions featuring emerging local painters like Maya Lin.
  travel: Temeka Cunningham favors carefully planned weekend escapes to Door County's lakeside towns and budget-friendly art-centric trips to Barcelona, dreaming of a future backpacking adventure through
    Japan's rural art festivals, and they balance wanderlust with a modest travel fund.
  culinary: Temeka Cunningham enjoys cooking seasonal Midwest fare, often whipping up a creamy beet risotto with goat cheese and fresh thyme, baking sweet potato brownies laced with dark chocolate chips,
    and savoring a perfectly seared salmon with a citrus-herb glaze when dining out, and they relish sharing these dishes with close friends over tea.
  core: Temeka Cunningham is a quietly curious 23-year-old who merges artistic ambition with community stewardship, balancing meticulous planning with spontaneous creativity while they navigate occasional
    anxiety and a habit of binge-watching indie documentaries.
background:
  cultural: Temeka is a Black woman raised in Milwaukee’s vibrant African‑American community. Her family’s roots trace back to the Great Migration, and she grew up immersed in the cultural traditions of
    the Midwest's Black neighborhoods, including church gatherings, jazz and gospel music, and community festivals such as Juneteenth and Milwaukee’s African‑American Art Week. These experiences fostered
    a strong sense of community solidarity, respect for elders, and an appreciation for the arts as a vehicle for expression and social change. She values the storytelling traditions passed down from her
    grandparents, the culinary heritage of soul food, and the importance of mentorship and mutual aid within her neighborhood.
