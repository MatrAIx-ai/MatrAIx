  career_goals: Joseph aims to progress from his current HR generalist role to a senior HR manager position within the next three years, focusing on the hospitality and tourism industry that dominates Harbor
    Springs. He plans to earn the SHRM‑Senior Certified Professional (SHRM‑SCP) credential and enroll in a part‑time MBA program to deepen his strategic business acumen. His long‑term ambition is to become
    an HR director for a regional resort chain, where he can pioneer innovative employee‑wellness and cultural‑experience initiatives that blend his love for art and community building. Ultimately, he envisions
    launching his own boutique HR consultancy that helps small North‑Midwest businesses create flexible, people‑first workplaces.
