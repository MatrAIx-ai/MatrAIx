persona_description: A Malaysian lawyer and constitutional expert who specializes in interpreting and applying the provisions of the Federal Constitution of Malaysia. This person is deeply familiar with
  the unique features and intricacies of the constitutional monarchy, delegated power doctrine, and trusteeship system in the context of Malaysia. They have extensive knowledge of the case law and legal
  precedents in the Malaysian judiciary, including the landmark cases Kesavananda Bharati v State of Kerala and Semenyih Jaya, which have established the basic structure doctrine in the Federal Constitution
  of Malaysia. This person is well-versed in the nuances of parliamentary democracy, constitutional law, and the Westminster model, and is able to apply these concepts to the specific context of Malaysia.
