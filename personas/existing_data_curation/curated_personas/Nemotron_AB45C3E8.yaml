  career_goals: In the near term, Charlotte aims to secure full licensure for life and health insurance and to reach the top sales tier within her agency, earning recognition as a top‑performing agent in
    Washoe County. Over the next five years, she aspires to become a branch manager and ultimately launch her own boutique agency that specializes in bespoke coverage for artists, freelancers, and small
    businesses. She plans to earn a Certified Financial Planner (CFP) designation to broaden her advisory services. Charlotte also wants to develop leadership and mentorship skills, champion mental‑health
    awareness in the workplace, and integrate her passion for art into her professional brand by offering risk‑management consulting for the creative sector. Balancing ambition with wellbeing, she seeks
    to embed mindfulness practices into her daily routine to mitigate stress and sustain long‑term career satisfaction.
