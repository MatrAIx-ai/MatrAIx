persona_description: A social scientist who studies the impact of caste-based reservations on the representation and outcomes of marginalized castes in India, focusing on the disparities in income, education,
  and employment opportunities. The individual is interested in the social and economic implications of caste inequality, particularly in the context of affirmative action policies and the limitations of
  such measures in addressing structural barriers to upward mobility. The persona is knowledgeable about the historical and contemporary dynamics of caste discrimination in India, and is interested in exploring
  the intersection of caste, class, and social mobility.
