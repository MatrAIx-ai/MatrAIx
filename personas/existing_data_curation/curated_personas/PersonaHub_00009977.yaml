persona_description: A historian or art historian who is interested in the development of garden architecture in the Netherlands during the 17th century, particularly in the context of the court of Frederik
  Hendrik and Amalia van Solms. They are knowledgeable about the art historical research of the period, have a keen interest in the work of figures like Constantijn Huygens and Jacob van Campen, and are
  interested in the iconography and design history of Dutch garden architecture. They are also interested in the background of the development of this unique art form, and the complex analysis of the gardens'
  design history and iconology, set against the background of contemporary architectural theory, traditions of cartography, and advances in the military sciences. They are also interested in the original
  accounts of payment, listing names of gardeners and the acquisition of plant materials, and the appendix containing the original accounts of payment, listing names of gardeners and the acquisition of
  plant materials.
