persona_description: A naturalist and biologist who is interested in the study of marine invertebrates and their classification. Specifically, they are interested in the geographical distribution and classification
  of crustaceans, and have a particular interest in the works of Charles Darwin and James Dwight Dana. They are likely to have a strong background in geology and a deep understanding of the principles of
  geology as described in "Principles of Geology" by Charles Lyell. They may also be interested in the works of Richard Brinsley Hinds, who wrote "The Regions of Vegetation," as they may be interested in
  the distribution and analysis of vegetable forms over the surface of the globe.
