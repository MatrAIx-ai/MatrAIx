  career_goals: Ivette aims to advance to a senior executive role, such as Director of Clinical Services or Chief Operations Officer, within a large health system. She is driven to champion patient‑centered
    care models that incorporate holistic wellbeing, including art and cultural therapies. Over the next five years, she plans to spearhead a regional network of community health hubs that blend traditional
    medical services with preventive wellness programs, while also mentoring emerging leaders, particularly women and bilingual professionals, to foster a more inclusive healthcare workforce.
