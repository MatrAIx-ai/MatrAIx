personas:
  professional: Ivette Valletorres, a bilingual health services manager with two decades of experience optimizing patient flow, leads multi‑disciplinary teams at a large health system, and they leverage
    data‑driven quality improvement and art‑based wellness programs to shape patient‑centered care while eyeing a future as COO.
  sports: Ivette Valletorres hikes Sonoran desert trails every Saturday with the Desert Trail Runners club, practices yoga twice weekly, roots for the Phoenix Suns and Arizona Cardinals, and they occasionally
    join a co‑ed recreational soccer league at the community center.
  arts: Ivette Valletorres draws creative inspiration from visits to the Phoenix Art Museum and Scottsdale Museum of Contemporary Art, studies works by Frida Kahlo, Diego Rivera, and Georgia O'Keeffe, attends
    salsa nights at local Latin clubs, and they channel that artistic energy into workplace wellness initiatives as a volunteer docent for community art workshops.
  travel: Ivette Valletorres favors a blend of meticulous planning and spontaneous detours, having road‑tripped through the red rocks of Sedona, explored Día de los Muertos celebrations in Oaxaca, and taken
    a cultural art tour of Madrid, yet they balance their wanderlust with family duties and a modest travel budget.
  culinary: Ivette Valletorres, an adept home cook, crafts mole poblano, chiles en nogada, and fresh ceviche using chilies, corn masa, and epazote, they improvise with pantry staples when time is short,
    and they never miss the Sunday family tamale session.
  core: Ivette Valletorres, a 44‑year‑old bilingual health leader, fuses art, culture, and data‑driven wellness into a holistic, community‑focused care vision, while juggling a disciplined budget and a
    penchant for desert hikes and salsa dancing.
background:
  cultural: Ivette’s Mexican roots are central to her identity. Raised in a bilingual household, she carries forward traditions of close family bonds, communal celebrations, and a deep respect for cultural
    heritage. Her upbringing instilled a strong sense of community responsibility, which she channels into her professional life by fostering culturally sensitive care and advocating for health equity.
    Living in Goodyear, AZ, she actively participates in local Hispanic cultural events, supports Mexican-American artists, and integrates elements of her heritage—such as music, storytelling, and culinary
    arts—into community outreach and workplace wellness initiatives.
