personas:
  professional: Peter Roysdon, a budding LEGO architect, channels his love for construction toys into meticulously following step‑by‑step manuals and challenging classmates to build the tallest tower, showing
    early signs of practical problem‑solving and a competitive streak.
  sports: Peter Roysdon, a keen participant on his elementary school’s soccer team, idolizes the Arkansas Razorbacks’ defensive line, trains with the local Little League’s Saturday drills, and always grabs
    a front‑row seat at the Conway High Tigers’ Friday night basketball games while secretly hoping to score the winning goal.
  arts: Peter Roysdon spends free afternoons sketching detailed pickup trucks, humming classic country hits by Dolly Parton while assembling LEGO cityscapes, and binge‑watching the animated series ‘Octonauts,’
    which fuels his fascination with machines and everyday heroes.
  travel: Peter Roysdon loves the annual Perry County Fair’s carousel rides, dreams of exploring the natural caves of Hot Springs, Arkansas, and has a growing wish list that includes a family trip to Disney
    World’s Magic Kingdom and a weekend camping adventure in the Ozark National Forest.
  culinary: Peter Roysdon delights in the smoky flavor of pulled pork sandwiches, the buttery crunch of corn on the cob, and the cheesy goodness of homemade macaroni and cheese, often helping his mom stir
    the pot while sneaking a few extra bites of his favorite honey‑glazed chicken nuggets.
  core: Peter Roysdon is a structured, competition‑driven six‑year‑old LEGO builder who worries about missing pieces, obsessively saves allowance for new sets, and balances his love of soccer, country tunes,
    and fair‑ground rides with a habit of staying up late for cartoons.
background:
  cultural: Peter is raised in a white, Southern family in Conway, Arkansas. His upbringing includes church attendance on Sundays, community events like the Perry County fair, and family gatherings featuring
    barbecue and corn on the cob. He attends a local elementary school that emphasizes routine, respect, and community values. He is exposed to Southern folk music, country radio, and local traditions such
    as school choir performances and community service projects.
