persona_description: A scientist who specializes in the study of lens technology and manufacturing, particularly in the field of gradient-index lenses. Her work has led to significant breakthroughs in the
  development of lightweight single-lens cameras, night-vision goggles, and ball lenses for solar collectors. Her research has focused on the use of gradient-index lenses to compensate for chromatic aberration
  and improve the focus of light passing through the lenses. She has been successful in applying optical imaging techniques, such as Optical Coherence Tomography (OCT), to the analysis of these lenses,
  enabling her team to create high-resolution 3D images of the lens structure. Her work has been supported by the Manufacturable Gradient Index Optics program of DARPA and the NYSTAR Foundation.
