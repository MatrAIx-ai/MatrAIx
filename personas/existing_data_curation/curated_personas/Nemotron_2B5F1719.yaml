  career_goals: Stephen aims to transition into an executive‑level role such as Director of Operations or Vice President of Innovation within the next five years, leveraging his deep technical knowledge
    and managerial experience to drive organizational transformation. He plans to obtain a PMP certification and complete an executive leadership program to strengthen his strategic impact. Concurrently,
    he is passionate about mentoring emerging managers and wants to establish a mentorship program within his company. Long‑term, he envisions serving on the board of a local non‑profit arts organization,
    integrating his love for the arts with his business acumen to support community cultural initiatives.
