  career_goals: He often talks about becoming an astronaut because he loves exploring space and watching rockets, and he also dreams of being a firefighter, seeing the role as a practical way to help people.
    Occasionally he says he wants to be a builder, imagining constructing big houses with his block sets. His competitive streak pushes him to want to be \"the best astronaut\" or \"the bravest firefighter\"
    when he grows up.
