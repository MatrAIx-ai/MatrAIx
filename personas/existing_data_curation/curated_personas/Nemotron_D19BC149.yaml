personas:
  professional: Susan Gay, an aspiring robotics engineer and debate enthusiast, channels her curiosity and disciplined organization into building autonomous machines for her school’s robotics club while
    sharpening critical thinking skills on the debate team.
  sports: Susan Gay, a dedicated midfielder for Salt Lake United youth soccer, follows Real Salt Lake’s matches, hikes the Wasatch foothills on weekends, and incorporates cross‑training sessions at the
    community center, combining competitive team play with personal endurance goals.
  arts: Susan Gay, an avid piano player, draws inspiration from composers like Ludovico Einaudi and enjoys the cinematic scores of Hans Zimmer, while devouring science‑fiction novels by Becky Chambers and
    streaming indie films by director Greta Gerwig, integrating music and storytelling into her creative outlet.
  travel: Susan Gay, a weekend explorer, frequently trips to Park City for skiing, has road‑tripped to Zion and Bryce Canyon, and dreams of attending the International Robot Olympiad in Tokyo, balancing
    adventure with her school schedule and limited budget.
  culinary: Susan Gay, a budding home cook, loves crafting pepperoni pizza with homemade dough, whipping up mango‑pineapple smoothies, and experimenting with veggie tacos featuring roasted cauliflower,
    while still ordering the occasional protein‑packed ramen from a local eatery.
  core: Susan Gay blends razor‑sharp curiosity with disciplined organization, thriving on robotics challenges, debate battles, soccer drills, and meticulous budgeting, all while juggling teenage acne and
    a love for sci‑fi piano playlists.
background:
  cultural: Susan grew up in Salt Lake City’s diverse, family-oriented neighborhoods, where outdoor recreation and community service are highly valued. Her family, part of the broader white American demographic
    in the region, emphasizes education, self-reliance, and involvement in local events such as park clean-ups and seasonal festivals. The city’s blend of urban amenities, proximity to the mountains, and
    a culture that celebrates both academic achievement and active lifestyles has shaped her balanced outlook—combining curiosity about the world with a practical, disciplined approach to personal and communal
    goals.
