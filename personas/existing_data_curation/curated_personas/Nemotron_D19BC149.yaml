  career_goals: She aspires to earn a scholarship to a leading university and pursue a degree in engineering—preferably biomedical or renewable-energy engineering—where she can merge her curiosity for new
    technologies with practical solutions that improve lives. She aims to compete in national science and robotics competitions, secure internships in tech firms, and eventually lead a research team developing
    innovative, sustainable products. In the longer term, she envisions launching her own startup that creates affordable medical devices for underserved communities.
