  career_goals: In the next few years, Kelly aims to advance to a senior flight attendant role and become a cabin crew lead, obtaining the airline’s supervisory certification. She plans to pursue an associate
    degree in aviation management to qualify for a ground‑based safety trainer or flight operations coordinator position, which would provide a more predictable schedule for her family. Long‑term, she hopes
    to design training modules that improve cabin safety standards and mentor new attendants, leveraging her organized mindset to contribute to systematic improvements within the airline.
