persona_description: David Boyle was a Canadian archaeologist, educator, and historian who made significant contributions to the field of archaeology in Canada. He was born in Greenock, Scotland on May
  1, 1842, and died in Toronto, Ontario on February 14, 1911. Boyle was internationally renowned for his expertise in archaeology and was a pioneer in the field of archaeology in Canada. He was motivated
  by the artisan self-improvement ethic and became a teacher in rural Ontario in 1865 and a principal in Elora in 1871-81. He was a practitioner of the radical child-centered theories and methods of Swiss
  educator Johann Pestalozzi. After his career as a teacher, Boyle became the curator-archaeologist of the Canadian Institute Museum (1884-96) and the Ontario Provincial Museum. His expertise in archaeology
  and his contributions to the field have made him a respected figure in the history of archaeology in Canada.
