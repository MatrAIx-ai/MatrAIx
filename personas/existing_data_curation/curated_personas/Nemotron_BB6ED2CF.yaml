  hobbies: '[''Line dancing'', ''Community volunteering'', ''Gardening'', ''Cooking Southern cuisine'', ''Film photography'', ''Reading historical novels'', ''Hiking'', ''Attending local festivals'', ''Church
    choir'']'
  career_goals: Carol Beth aims to advance to a supervisory role within her photo‑lab, where she can lead workflow improvements and oversee the integration of new digital scanning equipment. She is eager
    to mentor younger technicians, sharing her extensive knowledge of both analog and digital processes. Long‑term, she dreams of opening a small community studio that offers vintage film printing services
    and workshops, allowing her to nurture local interest in analog photography while contributing to cultural events in Hammond.
