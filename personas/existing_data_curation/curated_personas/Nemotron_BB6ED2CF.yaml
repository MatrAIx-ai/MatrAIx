personas:
  professional: Carol Casey, a seasoned photographic process worker with three decades of expertise in calibrating large‑format film‑processing machines, blends meticulous analog craftsmanship with emerging
    digital scanning workflows, and they leverage their curiosity‑practical balance to troubleshoot equipment, train new technicians, and drive workflow improvements toward a supervisory role.
  sports: Carol Casey enjoys line dancing at the Hammond Community Center, weekend hikes along Tickfaw State Park trails, and they proudly wear a New Orleans Saints jersey while cheering on LSU Tigers football,
    also participating in a local adult softball league that meets monthly.
  arts: Carol Casey, an avid film photographer, spends weekends capturing Louisiana’s swamps and historic architecture on 35mm film, they regularly attend the Festival International de Louisiane to hear
    the Preservation Hall Jazz Band and Dr. John, and they find inspiration in historical novels by Ken Follett.
  travel: Carol Casey prefers modest road trips exploring Southern charm, having visited Savannah, Charleston, and Austin, they dream of sailing the Mississippi to New Orleans during Mardi Mardi and yearn
    to wander the historic streets of Lisbon, all while planning trips around budget and family commitments.
  culinary: Carol Casey, a competent home chef, delights in simmering gumbo and jambalaya with fresh tomatoes from their garden, Andouille sausage, and okra, they also perfect a slow‑cooked shrimp étouffée
    and relish serving beignets at family gatherings.
  core: Carol Casey merges a lifelong love of analog photography with community spirit, balancing meticulous lab work, vibrant line dancing, and a budding entrepreneurial dream, all while occasionally forgetting
    to water their magnolias.
background:
  cultural: Carol Beth grew up in a modest, middle‑class white family in Tangipahoa Parish, surrounded by the deep‑rooted traditions of Southern Louisiana. Her upbringing emphasized hospitality, church
    involvement, and a strong work ethic. While primarily identifying with mainstream Protestant (Baptist) values, she also embraces regional customs such as celebrating Mardi Gras, enjoying Creole‑influenced
    foods, and attending local country‑and‑western dance events. Her cultural identity blends the warm, community‑focused spirit of the South with a respect for the craftsmanship and legacy of analog photography.
attributes:
