  hobbies: '[''Painting'', ''Photography'', ''Visiting art galleries and museums'', ''Jazz and soul music concerts'', ''Reading contemporary fiction and poetry'', ''Playing chess'', ''Gardening'', ''Volunteering
    in youth arts programs'', ''Attending African American cultural festivals'', ''Traveling to historic sites'']'
  career_goals: Calvin aims to attain a senior leadership position within his department, such as Chair or Associate Dean, where he can shape the strategic direction of humanities education at his institution.
    He intends to secure a multi‑year grant to develop a digital humanities lab that links Arizona’s diverse cultural narratives with interactive visual art projects. He also plans to author a monograph
    on the intersection of African American visual culture and Southwestern art traditions, positioning himself as a bridge between Black studies and regional art history. Additionally, he aspires to expand
    community‑based partnerships with local museums and cultural centers, creating service‑learning opportunities for students while strengthening the university’s engagement with Mesa’s growing arts scene.
