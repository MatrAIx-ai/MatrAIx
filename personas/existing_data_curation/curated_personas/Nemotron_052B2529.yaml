personas:
  professional: Calvin Mixon, a 53‑year‑old interdisciplinary humanities professor, leverages their methodical curriculum design, competitive grant‑writing, and deep art scholarship to integrate digital
    humanities tools, curate community exhibitions, and mentor emerging scholars, all while steering departmental strategy toward inclusive cultural narratives.
  sports: Calvin Mixon, a 53‑year‑old educator, enjoys weekend round‑rock tennis matches at a local club, follows the Phoenix Suns and Arizona Diamondbacks avidly, participates in a community 5K run each
    spring, and they treat gardening as low‑impact exercise, though they sometimes skip workouts when grant deadlines loom.
  arts: Calvin Mixon, a 53‑year‑old interdisciplinary scholar, spends evenings at the Phoenix Art Museum viewing works by Kara Walker and Jean‑Michel Basquiat, attends jazz concerts featuring Kamasi Washington
    and soul shows by Erykah Badu, curates campus shows of acrylic desert landscapes infused with cross‑cultural motifs, and they regularly photograph downtown Mesa’s evolving street art.
  travel: Calvin Mixon, a 53‑year‑old professor, prefers meticulously planned trips that blend art pilgrimages—such as the Getty Center in Los Angeles and the Musée du Quai Branly in Paris—with desert retreats
    in Sedona and cultural festivals in Oaxaca, while they budget for occasional weekend getaways to nearby Santa Fe for workshops.
  culinary: Calvin Mixon, a 53‑year‑old academic, favors Southwest‑inspired cooking, whipping up roasted poblano‑stuffed squash enchiladas and quinoa tabbouleh with fresh cilantro from their garden, enjoys
    experimenting with spices like sumac and smoked paprika, and they occasionally indulge in late‑night espresso while sketching new acrylic ideas.
  core: Calvin Mixon is a methodical, curiosity‑driven scholar who balances competitive ambition with solitary garden retreats, obsessively curates art experiences, and navigates life with a healthy dose
    of skepticism and a penchant for late‑night espresso.
background:
  cultural: Calvin’s cultural identity is rooted in the African American experience, shaped by family traditions of storytelling, gospel music, and communal resilience. Raised in a Southern‑influenced household
    that emphasized education and civic engagement, he carries forward a strong sense of community service. After relocating to Mesa, Arizona, he has blended his Southern Black heritage with the multicultural
    tapestry of the Southwest, embracing both the desert’s visual aesthetic and the region’s growing Latino and Native influences. He actively participates in local Black cultural events, collaborates with
    community organizations that celebrate African diaspora art, and incorporates these perspectives into his teaching, enriching his students’ understanding of a broader, inclusive American narrative.
attributes:
  skills: '[''Curriculum design'', ''Interdisciplinary course development'', ''Academic research'', ''Scholarly writing and publishing'', ''Grant proposal writing'', ''Digital pedagogy and LMS integration'',
