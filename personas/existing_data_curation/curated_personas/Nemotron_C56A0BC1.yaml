personas:
  professional: Georgina Benach, a 32‑year‑old aspiring remote administrative professional, leverages meticulous budgeting, calendar management, and precise data‑entry skills to thrive in low‑stress, solitary
    work environments, channeling her love for routine into freelance content creation of knitting patterns.
  sports: Georgina Benach enjoys gentle sunrise beach walks, weekly community yoga sessions, and follows the San Diego Padres and the San Diego Wave FC, while also participating in a casual weekend gardening
    club that doubles as a low‑key fitness group.
  arts: Georgina Benach immerses herself in historical fiction by Hilary Mantel, cozy mysteries by Agatha Christie, listens to mental‑health podcasts such as The Hilarious World of Depression and The Anxiety
    Guy, and finds creative solace in crocheting while humming to Norah Jones and Sufjan Stevens during her knitting sessions.
  travel: Georgina Benach prefers tranquil, low‑key getaways such as a cottage on the Maine coastline, a cabin near Asheville’s Blue Ridge Mountains, and a weekend retreat to Kyoto’s Zen gardens, planning
    trips months in advance to fit her budget and avoid the anxiety of spontaneous travel.
  culinary: Georgina Benach delights in baking comfort desserts like warm apple crumble, dark‑chocolate brownies, and banana bread, frequently incorporating spices like cinnamon and nutmeg, and enjoys cooking
    simple meals using fresh vegetables from her indoor garden, mastering intermediate baking techniques.
  core: Georgina Benach is a methodical, solitude‑seeking planner who balances her anxiety with precise budgeting, comforting yarn crafts, sunrise walks, and a disciplined yet occasionally indulgent love
    for baking.
background:
  cultural: Georgina is a white American raised in a middle‑class suburban setting in Florida. Her family heritage traces back to Irish and English ancestors, embedding values of practicality, self‑reliance,
    and modest Christian traditions. Growing up in Lake Worth exposed her to a culturally diverse community, yet she identifies primarily with traditional American values, appreciating routine, order, and
    local customs such as beach outings and regional cuisine.
