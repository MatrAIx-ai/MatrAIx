  career_goals: Georgina aims to obtain her GED within the next year as a first step toward re‑entering the workforce. She seeks a stable, low‑stress remote role—such as data entry, virtual administrative
    support, or freelance content creation—that aligns with her preference for routine and solitary work environments. Simultaneously, she hopes to develop a modest home‑based craft business (e.g., hand‑knitted
    accessories) to supplement her income. A longer‑term ambition is to achieve financial independence, secure stable housing, and maintain a balanced lifestyle that supports her mental‑health goals.
