  hobbies: '[''Gardening'', ''Reading historical fiction and biographies'', ''Volunteering at a food pantry'', ''Hiking with a senior club'', ''Attending craft fairs'', ''DIY home‑improvement projects'',
    ''Woodworking'']'
  career_goals: As she approaches retirement, Marlee aims to cement her legacy by mentoring emerging managers and documenting her best‑practice guides for operational efficiency. She hopes to transition
    into a part‑time advisory role, helping small businesses in the Phoenix area adopt sustainable practices and lean processes. Additionally, she plans to spearhead a community mentorship program that
    pairs experienced workers with younger job seekers, ensuring her practical knowledge benefits the next generation.
