personas:
  professional: Xay Ngo, an 18‑year‑old aspiring software developer and UX designer, leverages a hands‑on curiosity for PC building, basic Python scripting, and digital illustration to craft intuitive tools
    for community language learning while competing for every internship that proves their technical chops.
  sports: Xay Ngo stays active by hiking the Merrimack River trails, joins a local running club for weekend jogs, occasionally plays pickup basketball with friends, and follows the Boston Bruins and New
    England Patriots as a casual fan, viewing fitness as a low‑key complement to their tech hobby.
  arts: Xay Ngo channels creative energy into sketching indie‑game characters, draws inspiration from visual artists like Jillian Tamaki and game composers such as Darren Korb, while their eclectic playlist
    ranges from Nujabes to Tame Impala, making art both a hobby and a design research tool.
  travel: Xay Ngo loves spontaneous weekend trips to New England towns like Portland, Maine, and sunrise hikes in the White Mountains, dreams of backpacking through Tokyo’s Akihabara and the ancient temples
    of Siem Reap, but balances travel ambitions against a tight student budget and family responsibilities.
  culinary: Xay Ngo frequently cooks aromatic family recipes such as spiced coconut fish stew and fermented rice cakes, experiments with seasoning while listening to synth‑wave beats, and considers their
    modest kitchen skill level a comforting escape from screen‑filled coding marathons.
  core: Xay Ngo is a curiosity‑driven, competitively minded teen who blends tech tinkering, artistic sketching, and family‑rooted cooking into a flexible, somewhat disorganized lifestyle that thrives on
    solitary projects and low‑key social gatherings.
background:
  cultural: Xay’s family emigrated from Cambodia to Lowell, Massachusetts, a city known for its vibrant Cambodian community. Raised in a bilingual household, he learned Khmer from his grandparents while
    navigating American school culture. He celebrates traditional holidays such as Cambodian New Year (Chambâk) and participates in community events at the Lowell Cambodian Living Heritage Museum. This
    dual cultural exposure shapes his worldview, fostering a strong sense of responsibility to his heritage while fueling his curiosity about the wider world.
