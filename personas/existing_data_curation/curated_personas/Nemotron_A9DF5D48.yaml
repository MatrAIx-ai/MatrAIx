  career_goals: He aspires to transform his informal technical abilities into a professional career, aiming to become a software developer or UX designer who builds tools that serve his community. Xay wants
    to blend his creative and analytical mindset to create user‑friendly apps, especially those that help language learning or preserve cultural heritage. Competitive by nature, he seeks internships where
    he can prove his skills and eventually launch a tech startup that connects Southeast Asian artisans with broader markets.
