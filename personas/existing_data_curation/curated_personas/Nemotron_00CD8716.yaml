personas:
  professional: Ying Jeon, a 32‑year‑old Denver‑based actor, merges a methodical project‑management mindset with a curiosity for cross‑cultural narratives, excelling in bilingual stage and on‑camera performance,
    script analysis, dialect work, and independent production coordination.
  sports: Ying Jeon maintains fitness through weekend hikes with the Rocky Mountain Hiking Club and winter snowshoe outings with a local mountaineering group, while avidly cheering on the Denver Broncos,
    Colorado Avalanche, and Colorado Rockies as seasonal inspirations.
  arts: Ying Jeon immerses themselves in artistic study, drawing inspiration from the cinematic storytelling of Bong Joon‑ho, the emotive stage work of Viola Davis, and the lyrical melancholy of poet Ko Un,
    while regularly attending performances at the Denver Center for the Performing Arts.
  travel: Ying Jeon prefers meticulously planned itineraries that blend adventure with cultural immersion, having trekked Rocky Mountain National Park’s high trails, explored Seoul’s historic districts,
    and now dreaming of a winter photography expedition to the Japanese Alps followed by a spring retreat in Ireland’s rolling countryside.
  culinary: Ying Jeon cooks at an intermediate level, often reimagining bibimbap with Colorado bison and quinoa, perfecting kimchi on weekends, and delighting in gochujang‑infused tacos alongside steaming
    bowls of ramen loaded with seasonal vegetables.
  core: Ying Jeon is a methodical, curiosity‑driven actor who balances disciplined budgeting with spontaneous photography hikes, yet admits to binge‑watching drama series late into the night, sacrificing
    sleep for a good story.
background:
  cultural: Ying was born to Korean immigrant parents who settled in the United States before her birth. Growing up in a bilingual household in the Denver metro area, she navigated both Korean cultural
    traditions—such as respect for elders, communal harmony, and a strong work ethic—and American individualism. This bicultural upbringing fuels her artistic sensibility, allowing her to interpret roles
    through a lens that blends East Asian storytelling aesthetics with Western performance techniques. She stays connected to her heritage by attending Korean cultural events, maintaining ties with the
    Korean diaspora community in Colorado, and incorporating Korean language and cultural nuance into her acting projects.
attributes:
  skills: '[''Stage Acting'', ''On‑Camera Acting'', ''Script Analysis'', ''Improvisation'', ''Voice & Dialect Coaching'', ''Stage Combat'', ''Movement Techniques (Laban, Alexander)'', ''Project Management
    for Productions'', ''Bilingual Script Translation (Korean/English)'', ''Mindfulness & Stress Management'']'
  hobbies: '[''Hiking in the Rockies'', ''Landscape Photography'', ''Reading contemporary fiction & Korean poetry'', ''Calligraphy'', ''Cooking Korean cuisine'', ''Yoga & Meditation'', ''Volunteering at
    local arts schools'', ''Participating in community film festivals'']'
  career_goals: Ying aims to transition from supporting roles in regional theatre to leading roles in independent film and limited‑series projects that explore cross‑cultural narratives. Over the next five
    years she plans to secure representation with a national talent agency, audition for roles that require bilingual fluency, and develop a micro‑budget web series highlighting contemporary Korean‑American
    stories. She also hopes to launch a collaborative theatre workshop in Denver that mentors emerging actors from underrepresented backgrounds, eventually expanding to a production company that produces
    bilingual stage and screen works.
