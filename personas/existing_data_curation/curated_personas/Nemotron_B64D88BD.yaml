  career_goals: Andre aims to advance to a senior engineering technologist role, where he can lead innovative infrastructure and sustainability projects within the Washington‑DC metropolitan area. He plans
    to obtain professional certifications such as Certified Engineering Technician (CET) and pursue a part‑time Master’s in Engineering Management to strengthen his leadership capabilities. Over the next
    five years, he hopes to spearhead multidisciplinary teams, mentor underrepresented youth in STEM, and eventually launch his own consulting firm focused on energy‑efficient technologies for public‑sector
    clients. His long‑term ambition is to influence policy‑driven engineering solutions that improve community resilience while maintaining a balanced work‑life schedule for his family.
