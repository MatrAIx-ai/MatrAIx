  hobbies: '[''Gardening (tomatoes, chilies, and herbs)'', ''Woodworking'', ''Traditional Mexican cooking (tamales, mole)'', ''Hiking in the Cascades'', ''Listening to classic rock and mariachi music'',
    ''Playing poker with friends'', ''Volunteer Spanish conversation circle at senior center'']'
  career_goals: At 61, Eber aims to leverage his decades of experience by establishing a mentorship program for early‑career counselors in Jackson County, sharing his pragmatic approach and cultural insights.
    He also plans to develop a culturally tailored outreach initiative that offers free counseling workshops for the local Mexican community, focusing on stress resilience and substance‑use prevention.
    While he hopes to transition to a part‑time advisory role in the next few years, he intends to continue volunteering at the senior center and remain an active voice in community mental‑health advocacy.
