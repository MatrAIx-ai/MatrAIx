personas:
  professional: Eber Pardo, a seasoned community counselor with over three decades of solution‑focused experience, leverages bilingual Spanish‑English communication and a CADC credential to run routine
    weekly group sessions while staying flexible for crisis calls, and now channels his pragmatic style into creating a mentorship program for early‑career counselors and a culturally tailored outreach
    workshop series for the local Hispanic community.
  sports: Eber Pardo enjoys spontaneous weekend hikes with the Cascade Trail Club in the foothills surrounding Central Point, follows the Oregon State Beavers football team during the fall season, and participates
    in a weekly senior‑center shuffleboard league that keeps him lightly active year‑round.
  arts: Eber Pardo relaxes by listening to classic rock staples like The Rolling Stones and Fleetwood Mac alongside traditional mariachi ensembles such as Mariachi Vargas de Tecalitlán, and occasionally
    attends community theater productions at the Medford Playhouse, which fuels his appreciation for both nostalgic and culturally resonant performances.
  travel: Eber Pardo balances careful trip planning with spontaneous getaways, having mapped out annual visits to the Willamette Valley wine region and occasional road trips to the Redwood National Park,
    while dreaming of a future journey to Mexico City to explore the culinary roots of his favorite tamales and mole recipes.
  culinary: Eber Pardo expresses his culinary creativity by cooking tamales and mole using home‑grown tomatoes, chilies, and herbs, incorporating ingredients like ancho chilies, cacao, corn masa, and fresh
    cilantro, and enjoys experimenting with traditional mole sauces that blend dried chilies, almonds, and Mexican chocolate for authentic depth of flavor.
  core: Eber Pardo blends a love for structured routine—evident in his gardening and counseling schedules—with a spontaneous streak that drives impromptu hikes, woodworking projects, and occasional splurges,
    all while navigating the quirks of a pragmatic yet occasionally disorganized mindset.
background:
  cultural: Eber was raised in a Mexican‑American household where Spanish was spoken at home and Mexican customs were celebrated, from Día de los Muertos to family gatherings centered around shared meals.
    His parents emphasized hard work, respect for elders, and a strong sense of community, values that continue to inform his compassionate counseling style. While deeply rooted in his Mexican heritage,
    he has embraced life in Central Point, Oregon, integrating into the local community and participating in regional events. His bilingual ability and cultural competence allow him to bridge the gap between
    his Mexican roots and the diverse population he serves, fostering trust and understanding across cultural lines.
attributes:
  skills: '[''Active Listening'', ''Crisis Intervention'', ''Case Management'', ''Bilingual Spanish-English Communication'', ''Community Resource Navigation'', ''Support Group Facilitation'', ''Conflict
