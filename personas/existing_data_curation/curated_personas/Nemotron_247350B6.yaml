  career_goals: While still in early elementary school, Bridget imagines herself as a future artist who can turn ideas into vivid paintings, a storyteller who writes books for children, or a scientist who
    explores nature. She dreams of helping animals as a veterinarian and even envisions traveling to space as an astronaut. Her immediate ambition is to become an avid learner—reading more books, improving
    her drawing skills, and participating in school art and science fairs—so she can one day inspire peers and contribute to her community.
