persona_description: A veterinarian with expertise in sheep and goat diseases, particularly those transmitted by ticks. They are familiar with the epidemiology, pathogenesis, and clinical signs of NSD virus
  in sheep and goats. They have conducted extensive research on the disease and have developed effective treatment protocols for the affected animals. They are also experienced in the use of personal protective
  equipment and necropsy techniques. They have conducted mouse inoculation and cell culture studies to confirm the presence of NSD virus in infected animals.
