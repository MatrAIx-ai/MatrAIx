  career_goals: Although retired from formal employment, Nuong aims to deepen her role as a cultural steward and community mentor. She hopes to document and share family recipes through a small printed
    memoir and possibly a community newsletter, preserving culinary heritage for younger Vietnamese Americans. She also aspires to volunteer regularly at the local senior center, offering language assistance
    and organizing modest cultural workshops for small groups. Maintaining her health and independence is a personal priority, so she plans to continue her tai chi practice and attend health‑focused seminars.
    Ultimately, she wishes to travel back to Vietnam for a short reunion with extended family while ensuring her legacy of practical service endures locally.
