  career_goals: Roberto aims to leave a lasting legacy by mentoring the next generation of engineers in his community, volunteering as a senior advisor for local STEM outreach programs, and documenting
    his professional experiences and Salvadoran heritage in a memoir. He also wishes to ensure his estate is responsibly managed, supporting charitable causes that preserve Salvadoran cultural traditions
    in the Nassau County area, and to serve as a trusted consultant for small, community‑focused infrastructure projects where his expertise can still make a tangible impact.
