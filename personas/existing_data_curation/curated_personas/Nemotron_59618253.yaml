personas:
  professional: An aspiring sustainable entrepreneur, Candra Vilus blends digital communication savvy with hands‑on community gardening, and they translate this blend of curiosity and practicality into
    actionable plans for a co‑op café that will serve as an artistic hub and environmental classroom.
  sports: An outdoor enthusiast, Candra Vilus spends weekends hiking Shenandoah National Park trails, joins a casual Charlottesville soccer pick‑up league, chants for the UVA Cavaliers basketball team,
    and occasionally unwinds with weekly yoga sessions at a downtown studio.
  arts: A multifaceted creator, Candra Vilus curates playlists featuring H.E.R., SZA, and Kendrick Lamar, writes spontaneous verses, captures candid street photos in the vein of Vivian Maier, and they design
    TikTok thumbnails with Canva inspired by the graffiti provocations of Banksy.
  travel: A weekend wanderer, Candra Vilus has road‑tripped the Blue Ridge Parkway, explored Savannah’s historic squares, and dreams of strolling Kyoto’s shrines and wandering Provence’s lavender fields,
    all while budgeting trips through part‑time gig earnings.
  culinary: A farm‑to‑table enthusiast, Candra Vilus crafts avocado toast topped with heirloom tomatoes, whips up veggie ramen using locally sourced mushrooms, and they experiment with chai‑spiced oatmeal
    bowls, though they sometimes default to fast‑food tacos when pressed for time.
  core: Candra Vilus is an 18‑year‑old curiosity‑driven yet laid‑back digital storyteller who oscillates between organized ambition and spontaneous creativity, juggling community projects, music, and the
    occasional procrastinated homework session.
background:
  cultural: Candra grew up in a close‑knit African‑American community in Albemarle County, where family, church, and neighborhood ties play a central role. Her upbringing blends Southern traditions—such
    as home‑cooked soul food, gospel music, and storytelling at family reunions—with contemporary urban culture, including hip‑hop, social media, and community activism. Charlottesville’s rich history of
    civil‑rights activism and its vibrant arts scene have shaped her worldview, fostering a strong sense of social responsibility and pride in her heritage.
attributes:
  skills: '[''Social media content creation'', ''Basic graphic design (Canva, Adobe Spark)'', ''HTML/CSS web page basics'', ''Interpersonal communication'', ''Team collaboration and leadership'', ''Problem
