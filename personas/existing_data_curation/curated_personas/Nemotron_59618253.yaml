  hobbies: '[''Hiking and nature walks'', ''Listening to R&B and hip‑hop music'', ''Songwriting and vocal improvisation'', ''Reading urban fantasy novels'', ''Photography (street and nature)'', ''Volunteering
    at a community garden'', ''Creating short TikTok videos'', ''Attending local farmers\'' markets'']'
  career_goals: She intends to enroll in a community college program in business administration with a focus on sustainable entrepreneurship. She aspires to launch a community‑run co‑op café that doubles
    as a space for local artists and a hub for environmental education. In the longer term, she envisions working in nonprofit program management, leveraging her practical skills to develop community outreach
    initiatives that address food insecurity and youth empowerment. She also hopes to acquire certifications in digital marketing and web development to broaden her professional toolkit.
