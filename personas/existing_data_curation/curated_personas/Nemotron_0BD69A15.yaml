  career_goals: Seeking to translate his practical abilities into a modest, sustainable income, Antonio aims to launch a part‑time handyman service focused on serving neighbors in Bessemer. He also aspires
    to obtain a community college certification in HVAC or electrical work to broaden his expertise. In addition, he hopes to become a recognized mentor for local youth through the community center’s after‑school
    programs, using his competitive spirit to coach basketball and teach responsibility. Long‑term, he envisions a stable role as a part‑time contractor for the city’s park maintenance department, allowing
    him to remain active in the community while capitalizing on his structured work style.
