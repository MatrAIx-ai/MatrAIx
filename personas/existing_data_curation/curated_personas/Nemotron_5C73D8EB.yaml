personas:
  professional: Genesis Rico is a biomedical equipment technician specialist who excels at calibrating spectrometers and medical imaging devices, merging meticulous problem‑solving with a warm, community‑focused
    communication style that reflects their cooperative nature, and is actively pursuing a Certified Biomedical Equipment Technician credential to lead a maintenance team.
  sports: Genesis Rico enjoys brisk morning walks through Pelham Bay Park, follows the New York Yankees and Knicks for a local sports connection, and participates in community salsa dance nights that double
    as cardio workouts, while occasionally joining a neighborhood adult softball league each summer.
  arts: Genesis Rico immerses themselves in salsa and bachata evenings with bands like Marc Anthony and Celia Cruz, appreciates documentary filmmaking on scientific breakthroughs, and attends monthly performances
    at a local cultural center featuring dance, music, and theater that echo the vibrant community celebrations of their upbringing.
  travel: Genesis Rico plans trips that blend family‑centric holiday gatherings in the Caribbean with weekend escapes to upstate New York ski resorts and spontaneous visits to Washington, D.C.’s museums,
    preferring a mix of structured itineraries for certification workshops and relaxed, budget‑friendly stays with friends.
  culinary: Genesis Rico loves cooking comfort dishes like mangú, sancocho, and habichuelas con dulce, expertly seasons them with plantains, yucca, and a hint of oregano, enjoys experimenting with fusion
    variations for neighborhood potlucks, yet sometimes burns the edges of homemade empanadas when multitasking between repairs.
  core: Genesis Rico balances a meticulous technical career with community‑spirit cooking, dancing, and mentorship, all while juggling a practical financial plan and a habit of occasional over‑cooking and
    late‑night circuit tinkering.
background:
  cultural: Genesis is a first-generation Dominican-American who grew up in the Bronx's vibrant Latino enclaves. She is fluent in both Spanish and English and celebrates Dominican holidays such as Independence
    Day with family gatherings, music, and traditional food. Her upbringing emphasized close family ties, respect for elders, and a strong sense of community, shaping her cooperative nature and commitment
    to helping others. Catholic traditions, weekly church attendance, and participation in the annual Dominican Parade in New York City remain important parts of her cultural identity.
attributes:
  skills: '[''precision instrument troubleshooting'', ''equipment calibration'', ''electronic circuit diagnostics'', ''mechanical repair and maintenance'', ''technical documentation'', ''quality control
    compliance'', ''customer service communication'', ''team collaboration'', ''basic welding'', ''project planning'']'
  hobbies: '[''DIY electronics projects'', ''cooking Dominican cuisine'', ''salsa and bachata dancing'', ''volunteering at youth center'', ''urban gardening'', ''walking in Pelham Bay Park'', ''listening
    to tech podcasts'', ''watching science documentaries'']'
  career_goals: She plans to earn a Certified Biomedical Equipment Technician (CBET) credential and move into a senior technician or lead maintenance role in a hospital or research laboratory. Over the
    next five years, Genesis aims to supervise a small team, develop training programs for new hires, and eventually start her own boutique repair service focused on high-precision laboratory equipment,
    with a particular emphasis on mentoring young women from the Bronx.
