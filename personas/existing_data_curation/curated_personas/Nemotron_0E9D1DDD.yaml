  career_goals: Charles aims to turn his artistic passion into a sustainable career while maintaining the flexibility he values. In the near term he plans to secure a part‑time position or internship at
    a local gallery or museum in the Youngstown‑Trumbull area, where he can apply his visual documentation and event‑planning skills. He also intends to enroll in a BFA program to deepen his conceptual
    practice and broaden his network. Long‑term, Charles envisions establishing a freelance visual‑content studio that offers illustration, photography, and curated community‑art projects, possibly launching
    an online shop for prints and limited‑edition works. He is open to unconventional paths, such as collaborating with tech‑focused creative startups or developing immersive art experiences.
