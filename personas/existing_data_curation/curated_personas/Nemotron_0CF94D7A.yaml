personas:
  professional: Tyler Urban, a 54-year-old self‑taught handyman, translates their methodical eye for detail and love of orderly records into a part‑time freelance maintenance niche focused on small‑engine
    repair and low‑interaction home‑service contracts.
  sports: Tyler Urban supports the Seattle Seahawks (NFL) and the Portland Trail Blazers (NBA) while participating in a local weekend bowling league and occasionally tending to a backyard disc‑golf target,
    viewing these low‑impact activities as a predictable way to stay lightly active.
  arts: Tyler Urban immerses themselves in classic rock from the 70s and 80s—spun on vinyl by artists like Led Zeppelin, Fleetwood Mac, and AC DC—while also curating detailed scale‑model railways, reading
    Ken Burns historical documentaries, and occasionally attending the community theater's productions of classic plays.
  travel: Tyler Urban prefers meticulously planned road trips to quiet natural destinations such as Yellowstone and the Great Smoky Mountains, where they can camp solo, enjoy low‑stress hiking, and keep
    expenses low by staying in state parks, and they dream of a solitary retreat to the Icelandic countryside for ultimate isolation.
  culinary: Tyler Urban’s culinary routine features vegetable‑garden harvests like heirloom tomatoes and baby carrots, roasted beet salad with goat cheese, hearty backyard‑grown herb chicken stew, occasional
    indulgent BBQ ribs, and a dependable cup of dark roast coffee, though they tend to neglect food variety in favor of comfort staples.
  core: Tyler Urban blends methodical solitude with a high‑gear anxiety‑management routine, turning meticulous maintenance work and classic‑rock nostalgia into a quiet, predictable life that skims the edges
    of social interaction but never loses the drive for organized self‑reliance.
background:
  cultural: Tyler was raised in Owosso, Michigan, a small Midwestern town with a predominantly white, working‑class population. His family descends from German and Polish immigrants who settled in the region
    during the early 20th century, bringing a strong work ethic, appreciation for craftsmanship, and community ties. He grew up in a Protestant (Methodist) household that emphasized self‑reliance, modesty,
    and responsibility. The local culture of steady, routine‑oriented life, reverence for manual trades, and close‑knit neighborhood networks continues to shape his values and daily habits.
