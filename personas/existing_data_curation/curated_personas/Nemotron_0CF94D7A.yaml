  career_goals: Tyler aims to leverage his handyman skills into a part‑time freelance maintenance role that offers a predictable schedule and minimal client interaction. He also hopes to earn a GED and
    obtain a certification in small‑engine repair to formalize his expertise. Long‑term, he would like to establish a modest home‑based service repairing lawn‑mower and snowblower engines for neighbors,
    providing financial stability while preserving his need for solitude.
