personas:
  professional: An experienced community program coordinator, Brooke Coleman leverages meticulous spreadsheet modeling and logistics expertise to design grant‑driven initiatives for local nonprofits, balancing
    their competitive drive with a calm, reliable demeanor to keep projects on schedule and within budget, and they consistently deliver results that exceed expectations.
  sports: An avid hiker and community sports enthusiast, Brooke Coleman trails the Buffalo Bayou pathways year‑round, follows the Houston Rockets during the NBA season, participates in the Houston Hiking
    Society’s Saturday hikes, and plays midfield on a co‑ed softball league that meets each summer, using their competitive streak to improve performance, and they relish the friendly competition of the
    league while enjoying the camaraderie of local teams.
  arts: An avid lover of the arts, Brooke Coleman immerses themselves in self‑improvement literature by Brené Brown and Malcolm Gladwell, playlists classic Willie Nelson and modern folk singer Hurray for
    the Riff Raff while cooking, and they often attend the annual Houston Art Car Parade to admire kinetic sculptures, while occasionally taking a weekend pottery class inspired by Texas folk artist Mary
    L. Simon.
  travel: An organized weekend traveler, Brooke Coleman meticulously plans road‑trip itineraries in spreadsheet form, enjoys exploring Texas Hill Country vineyards and the Gulf Coast’s Galveston beaches
    with family, and dreams of hiking New Zealand’s Milford Track and studying Japanese garden design in Kyoto, balancing low‑budget local escapes with occasional splurges on international cultural tours,
    and they always keep a travel journal to record each adventure.
  culinary: An enthusiastic home chef, Brooke Coleman relishes growing heirloom tomatoes, bell peppers, and fresh herbs in their backyard garden and turning them into vibrant dishes like tomato‑basil bruschetta,
    shrimp étouffée with locally sourced okra, and weekly vegetarian chili featuring black beans and smoked paprika, showcasing a skill level that blends confident experimentation with a preference for
    comfort‑food roots, and they often treat themselves to a glass of Texas Tempranillo after dinner.
  core: Brooke Coleman balances a fiercely organized mind with a calm, resilient spirit, channeling their competitive edge into meticulous project planning while occasionally hoarding grocery coupons in
    a binder, and they over‑solve Sudoku puzzles late into the night.
background:
  cultural: Brooke grew up in a middle‑class, Anglo‑American family in the Greater Houston area, where Southern Texas values of self‑reliance, modesty, and community service were emphasized. Her upbringing
    blended a Protestant ethic of hard work with the region's warm hospitality, fostering a practical outlook and a deep appreciation for local volunteerism and neighborhood stability.
attributes:
  skills: '[''Project planning'', ''Logistics coordination'', ''Budget analysis'', ''Spreadsheet modeling'', ''Data organization'', ''Community outreach coordination'', ''Event scheduling'']'
  hobbies: '[''Vegetable gardening'', ''Jigsaw puzzles'', ''Sudoku'', ''Hiking'', ''Book club (non‑fiction)'', ''Volunteering at local food bank'', ''Cooking experimental recipes'', ''Yoga'']'
  career_goals: Brooke aims to re‑enter the workforce in a part‑time, structured role that leverages her organizational talent—ideally as a community program manager or grant‑project coordinator for a local
    nonprofit. She plans to earn a Project Management Professional (PMP) certification within the next two years and eventually launch a small consulting practice that helps small businesses streamline
    operations while maintaining flexibility.
