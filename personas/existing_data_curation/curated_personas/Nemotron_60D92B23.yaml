personas:
  professional: Coby Alvarado loves to role‑play as a tiny librarian, and they arrange picture books on a low shelf in perfect order while calmly guiding friends through a make‑believe checkout process,
    showcasing early organizational skill and a love of routine.
  sports: Coby Alvarado enjoys playing in a community kids’ soccer league, and they cheer for the local professional team, the Sounders, while preferring the predictable schedule of Saturday morning practices
    over spontaneous playground games, showing a balance of organization and flexibility.
  arts: Coby Alvarado spends afternoons finger‑painting in the living room, and they adore listening to Raffi’s "Bananaphone" while arranging crayons in exact color order, illustrating how structured enjoyment
    of music and art creates calm focus.
  travel: Coby Alvarado loves family road trips to the nearby state park, and they prefer the familiarity of routine stops at the same diner for pancakes while eagerly anticipating the occasional splash
    in the lake, balancing adventure and comfort in a four‑year‑old’s travel style.
  culinary: Coby Alvarado delights in helping stir macaroni and cheese on the stove, and they favor the simple comfort of that dish with a dash of cheddar and a sprinkle of peas, often insisting on a consistent
    bedtime snack routine of banana slices, reflecting their practical palate and love for familiarity.
  core: Coby Alvarado is a calm, routine‑loving four‑year‑old who blends organized play, steady saving habits, and predictable comforts into a resilient, slightly assertive personality marked by quiet confidence.
