  career_goals: Although still very young, Coby is already talking about what he wants to be when he grows up. He is drawn to professions that have clear rules, predictable tasks, and a focus on helping
    others, such as becoming a firefighter, a police officer, or a veterinarian. He likes the idea of wearing a uniform and following a schedule, and he enjoys stories about rescuing people and caring for
