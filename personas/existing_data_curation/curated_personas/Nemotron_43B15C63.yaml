  career_goals: Jennifer aspires to transition into a senior learning‑and‑development leadership role, such as Director of Training, where she can shape enterprise‑wide talent development strategy. She
    aims to earn a Master’s degree in Organizational Development or an ATD Certified Professional in Learning and Performance (CPLP) credential within the next three years. Her ambition includes pioneering
    the integration of emerging technologies—such as micro‑learning, VR simulations, and AI‑driven personalization—into her organization’s learning ecosystem, while championing inclusive, culturally responsive
    training programs that reflect Miami’s diverse workforce.
