persona_description: 'A policy analyst who specializes in the prevention of HIV and teen pregnancy in Africa. This person is knowledgeable about the findings of the "Protecting the Next Generation: Learning
  from Adolescents to Prevent HIV and Unintended Pregnancy" report and has experience working with national health care systems to better serve youth. This person is interested in providing comprehensive
  sex education to young Africans, particularly those who have never attended school and those who have dropped out of school before reaching the grade in which sex education is offered. This person is
  also interested in conducting focus group discussions and in-depth interviews with hundreds of young people, parents, teachers and health care providers to gather more information about the lack of knowledge
  about pregnancy prevention among adolescents.'
