personas:
  professional: Sandra Blount, a 22-year-old HVAC and smart-home technician, leverages her methodical planning, hands-on troubleshooting expertise, and energetic, competitive drive to consistently deliver
    code-compliant installations on schedule while earning a reputation as the go-to problem-solver for complex facility maintenance projects.
  sports: Sandra Blount, a 22-year-old fitness enthusiast, devotes weekdays to high-energy Zumba at FitLife Studios and spin classes at the local YMCA, competes in the Fredericksburg Volleyball Club league,
    roots for the Washington Commanders during football season, and escapes to Shenandoah National Park on weekends for trail hikes, embodying a competitive yet community-oriented approach to athletics.
  arts: Sandra Blount, a 22-year-old multimedia aficionado, fills her playlists with R&B icons like H.E.R., Anderson .Paak, and classic soul from Marvin Gaye, attends weekly gospel choir rehearsals, captures
    sunrise landscapes of Shenandoah with her DSLR, and draws creative inspiration from Beyoncé’s choreography and the vibrant live-music scene at local venues such as The Jefferson Theater.
  travel: Sandra Blount, a 22-year-old adventure-curious traveler, meticulously plans trips using spreadsheets, alternates between weekend hikes in Shenandoah and city getaways to New Orleans for its live
    music and cuisine, and harbors a long-term dream of backpacking through Costa Rica’s rainforests and volcanic highlands.
  culinary: Sandra Blount, a 22-year-old home-cooking enthusiast, expertly grills smoked pork ribs seasoned with paprika and brown sugar, whips up Southern collard greens simmered with smoked turkey, enjoys
    spicy jambalaya at local festivals, and experiments with health-focused dishes like quinoa bowls topped with avocado and roasted sweet potatoes.
  core: Sandra Blount, a 22-year-old organized tech whiz, balances a competitive edge with a love for community BBQs, dog-ears every schematic, and can’t resist a late-night R&B groove even after a full
    day of troubleshooting.
background:
  cultural: Sandra grew up in a close‑knit African‑American community in Spotsylvania County, Virginia, where church, family gatherings, and Southern soul‑food traditions shaped her identity. She celebrates
    cultural milestones such as Juneteenth and honors the legacy of civil‑rights activism in the region. Influenced by both Southern hospitality and contemporary Black culture, she integrates gospel music,
    soul cuisine, and community service into her daily life while pursuing education and career advancement as a means of empowerment.
