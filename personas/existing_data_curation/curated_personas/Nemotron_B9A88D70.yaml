  career_goals: She aims to become a certified senior technician and eventually move into a foreman or field supervisor role within a major facilities management company. Over the next five years she plans
    to earn NATE and EPA certifications, specialize in energy‑efficient HVAC and solar installation, and pursue a bachelor’s degree in mechanical engineering or facilities management. Her long‑term ambition
    is to launch her own maintenance and energy‑efficiency consulting business, leveraging her technical expertise, organized approach, and competitive drive to deliver high‑quality service.
