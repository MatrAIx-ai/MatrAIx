personas:
  professional: Daniel Daigle, a budding junior cartoonist and budding Scratch game developer, channels their curiosity and love for unconventional ideas into daily doodles and simple interactive stories,
    while balancing their organized school assignments with flexible creative bursts, and often worries about the perfection of each panel.
  sports: Daniel Daigle kicks the ball for the Maple Valley Youth Soccer Club, idolizes Manchester United for their attacking flair, cheers on the local Toronto FC whenever they catch a game, and uses the
    energy from soccer practice to fuel weekend explorations in the woods.
  arts: Daniel Daigle fills sketchbooks with cartoon characters inspired by Bill Watterson’s Calvin and Hobbes and Art Spiegelman’s storytelling, devours Adventure Time graphic novels and watches Studio
    Ghibli films for visual cues, and contributes vibrant murals during after‑school art club sessions, often humming the tunes of They Might Be Giants for creative inspiration.
  travel: Daniel Daigle prefers road‑trip adventures that blend nature and excitement, having camped near Niagara Falls, explored the historic streets of Montreal, and now dreaming of a family vacation
    to Disneyland Paris while meticulously mapping out stops at roadside dinosaur parks and lakeside picnic spots.
  culinary: Daniel Daigle enjoys building cheesy pepperoni pizza slices and whipping up quick mac and cheese, takes pride in baking chocolate‑chip cookies with extra marshmallow fluff, and frequently requests
    apple slices topped with peanut butter for a snack, though they sometimes forget to clean the kitchen afterward.
  core: Daniel Daigle is a curious, art‑obsessed nine‑year‑old who balances soccer drills, LEGO constructions, and bedside worries over unfinished comic panels, all while sprinkling kindness and occasional
    chaos into every group activity.
background:
  cultural: Daniel lives in Mineral, a small logging community in Lewis County, Washington. His family traces its roots to French‑Canadian settlers who arrived in the Pacific Northwest in the early 1900s.
    The region’s deep forests, rivers, and close‑knit community shape his love for outdoor exploration and conservation. While his household follows mainstream American customs, they occasionally celebrate
    their French‑Canadian heritage with family meals and cultural stories. At school, Daniel learns about the Cowlitz and Chinook peoples through respectful classroom projects, fostering an appreciation
    for the land’s original Indigenous cultures.
