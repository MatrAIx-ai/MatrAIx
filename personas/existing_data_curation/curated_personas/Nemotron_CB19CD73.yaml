personas:
  professional: Samantha Llodra is a seasoned retail cashier with expert cash‑handling and POS skills, leveraging her business coursework and methodical organization to mentor new staff, while eyeing a
    shift manager role that lets her blend inventory savvy with her artful eye for visual merchandising.
  sports: Samantha Llodra enjoys weekend hikes on the Blue Ridge foothills and is a loyal fan of the Carolina Panthers and the Atlanta Braves, while occasionally joining the local Henderson County Women’s
    Walking Club and keeping a modest jog schedule that helps her manage arthritis.
  arts: Samantha Llodra spends evenings painting watercolors of mountain vistas, often inspired by the works of Winslow Homer and local artist Jane Herring, while attending openings at the Asheville Art
    Museum and listening to folk legends like Alison Krauss and The Avett Brothers to fuel her creative spirit.
  travel: Samantha Llodra favors road trips to nearby Asheville for its galleries and to Charleston’s historic waterfront for its culinary scene, but she also dreams of a slow‑paced tour of Tuscany’s hill
    towns, planning each itinerary around seasonal art festivals and limited travel time owing to her part‑time work schedule.
  culinary: Samantha Llodra’s palate leans toward classic Southern comfort foods—she masterfully cooks shrimp and grits with fresh Gulf shrimp, bakes peach cobbler using homegrown peaches, and enjoys experimenting
    with heirloom tomatoes in a chilled gazpacho, all while maintaining a modest cooking skill level that lets her whip up a satisfying supper after a day of painting.
  core: Samantha Llodra blends methodical retail expertise with a competitive drive and a quiet love for watercolor landscapes, balancing disciplined budgeting with occasional indulgent art splurges, all
    while navigating mild health issues and a spirited curiosity about the world.
background:
  cultural: Samantha comes from a Southern white family with deep roots in the Henderson County area, embodying a blend of Appalachian cultural heritage and contemporary Southern hospitality. Her upbringing
    emphasized community participation, church involvement, and a respect for regional traditions, while her education and personal curiosity have expanded her perspectives beyond the local culture, allowing
    her to appreciate both the familiar and the unconventional.
attributes:
  skills: '[''Cash handling'', ''Point‑of‑sale operation'', ''Customer service'', ''Inventory management'', ''Basic bookkeeping'', ''Scheduling and time management'', ''Conflict resolution'', ''Training
