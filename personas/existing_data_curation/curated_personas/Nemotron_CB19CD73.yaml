  hobbies: '[''Watercolor painting'', ''Photography'', ''Visiting art galleries'', ''Gardening'', ''Hiking'', ''Reading historical fiction'', ''Community theater attendance'', ''Crafting (knitting and quilting)'']'
  career_goals: Samantha aims to move into a supervisory role within the retail environment, such as shift manager or trainer, where she can apply her organizational strengths and mentor newer staff. She
    also envisions transitioning to a part‑time position that blends her love of art with community involvement, perhaps assisting at the local art center or curating small exhibitions, while securing a
    stable financial foundation for retirement.
