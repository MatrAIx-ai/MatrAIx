  hobbies: '[''Gardening'', ''Cooking Southern and Creole dishes'', ''Journaling'', ''Crossword puzzles'', ''DIY home improvement'', ''Church community events'', ''Volunteering at the local food bank'',
    ''Listening to R&B and soul music'', ''Exploring Gullah cultural sites'', ''Watching documentaries'']'
  career_goals: Amber aims to advance within the manufacturing sector by earning certifications such as Certified Production Technician and a welding certification, and eventually move into a supervisory
    role overseeing a production line. She is pursuing part‑time coursework toward an Associate’s degree in Industrial Technology to broaden her technical expertise. Her long‑term ambition is to become
    a shift supervisor or production manager where she can apply her organized, methodical style to improve workflow efficiency and mentor junior staff, while also ensuring a stable income that supports
    home ownership and future family plans. She also seeks to develop stress‑management techniques to maintain her well‑being in a demanding environment.
