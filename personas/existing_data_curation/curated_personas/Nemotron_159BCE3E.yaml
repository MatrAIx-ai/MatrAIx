personas:
  professional: Frances Simpson, a seasoned strategic business development leader with a data‑driven mindset, excels at corporate governance, financial forecasting, and digital transformation, applying
    her methodical, organized nature and curious, assertive communication style to mentor cross‑functional teams and drive sustainable growth.
  sports: Frances Simpson enjoys early‑morning trail runs with the Hill Country Runners club, follows the Dallas Cowboys in football and the Houston Rockets in basketball, and integrates weekly yoga practice
    as a low‑impact fitness regimen, prioritizing consistency over competition.
  arts: Frances Simpson frequently visits intimate gallery openings, curates works by emerging painter Leah Torres, draws inspiration from contemporary sculptor Tara West, and unwinds listening to indie
    folk artist Phoebe Bridgers and watching films by Greta Gerwig, weaving these artistic experiences into her personal narrative.
  travel: Frances Simpson prefers meticulously planned trips, often exploring cultural hubs like Santa Fe’s art scene, Florence’s Renaissance museums, and Kyoto’s zen gardens, balancing solo weekend getaways
    with occasional family visits to the Gulf Coast, and uses travel reward points to fund her adventures.
  culinary: Frances Simpson’s culinary experiments blend Mexican Oaxacan mole with Texas‑grown chiles, Japanese ramen with homemade dashi, and Mediterranean mezze featuring feta, olives, and locally harvested
    honey, reflecting a confident home‑chef skill set that favors bold flavors and seasonal ingredients.
  core: Frances Simpson merges a methodical, data‑driven business approach with a solitary love for art, nature, and disciplined self‑care, navigating life with quiet curiosity, strategic foresight, and
    occasional splurges on emerging creativity.
background:
  cultural: Frances grew up in a middle‑class, predominantly white suburb of Dallas, Texas, where values of independence, self‑reliance, and community involvement were emphasized. Her family’s cultural
    roots trace back to the American Midwest, blending Midwestern pragmatism with Southern hospitality. Raised in a Protestant household, she participated in church‑based service projects, fostering a sense
    of stewardship and civic duty. Living in Fort Worth, she has absorbed the city’s rich heritage of western art and music, while also embracing the region’s growing cosmopolitan vibe through travel and
    exposure to diverse ideas. This blend of traditional Texan values and a broadening cultural perspective informs both her professional ethos and personal pursuits.
