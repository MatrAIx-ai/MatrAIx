  career_goals: Frances aims to position her company as an industry benchmark for sustainable growth and innovative culture. Over the next five years, she plans to expand the organization’s market presence
    beyond Texas, integrate advanced AI-driven analytics into core operations, and champion robust ESG (Environmental, Social, Governance) practices. She is also committed to building a pipeline of future
    female leaders by establishing a mentorship program and serving on the board of a regional arts nonprofit, blending her business acumen with her passion for the arts. Ultimately, she envisions a legacy
    of resilient, socially responsible leadership that balances profitability with community impact.
