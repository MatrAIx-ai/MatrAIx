  career_goals: Desiree aims to move into a senior technical leadership role where she can shape product strategy for platforms that blend cultural heritage with modern technology. She is especially interested
    in integrating machine‑learning tools into digital‑archives to make historical texts more accessible. Over the next five years she plans to become an Innovation Lab Lead or a Product Manager, overseeing
    interdisciplinary teams that prototype bold solutions while maintaining pragmatic delivery standards. She also wants to expand her impact by mentoring women in tech, organizing inclusive hackathons,
    and eventually launching a consultancy that helps non‑profits adopt open‑source digital tools.
