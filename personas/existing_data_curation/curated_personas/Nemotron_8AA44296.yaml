personas:
  professional: Eddie Cruceta, a 38‑year‑old aspiring handyman‑entrepreneur in Kerr County, blends his self‑taught mechanical, woodworking, and horticultural know‑how into a flexible, on‑call repair service,
    while his aversion to strict timelines makes him schedule gigs spontaneously and rely on word‑of‑mouth referrals.
  sports: Eddie Cruceta enjoys weekend hikes along the Ingram hills, summer fishing on the Guadalupe River, occasional hunting trips, cheers on the San Antonio Spurs, follows Austin FC, and volunteers with
    the Kerr County Outdoors Club’s monthly trail‑maintenance crew.
  arts: Eddie Cruceta weaves his love of music into evenings spent strumming acoustic guitar at local gatherings, performing classics by George Strait, Willie Nelson, and Freddy Fender, while drawing creative
    inspiration from John Denver’s folk ballads and attending the Hill Country Festival’s regional art showcases.
  travel: Eddie Cruceta favors spontaneous road trips in his aging Subaru, exploring nearby gems like Big Bend National Park, the historic town of Fredericksburg, and West Texas hunting grounds, while dreaming
    of a cross‑border culinary tour of Santa Fe’s art markets and the coastal seafood stalls of Galveston.
  culinary: Eddie Cruceta channels his garden‑grown chilies, tomatoes, and herbs into hands‑on cooking of tamales, pozole, and inventive Tex‑Mex salsas—such as his smoky chipotle‑pine nut blend—while improvising
    with reclaimed kitchen tools and treating each meal as a flavorful experiment.
  core: Eddie Cruceta is a hands‑on, self‑reliant DIY enthusiast who balances a restless curiosity for building and cooking with a perpetual battle against deadline‑induced stress, often opting for spontaneous
    projects over structured plans.
background:
  cultural: Eddie is a second‑generation Mexican‑American who grew up in a bilingual household in central Texas. His parents instilled a strong sense of family, respect for traditions, and a love for Mexican
    cuisine, while the surrounding Hill Country community introduced him to Texan customs, outdoor recreation, and a laid‑back work ethic. He celebrates holidays such as Día de los Muertos and Cinco de
    Mayo with his extended family, often blending traditional Mexican foods with local Texas ingredients. Fluent in both Spanish and English, Eddie navigates both cultural worlds, which informs his cooking
    style, community involvement, and the way he relates to neighbors in Ingram.
