persona_description: A member of the WHO Pacific Islands Mental Health Network (PIMHnet), a network of 18 member countries that work together to promote mental health and develop mental health systems in
  the Pacific Island countries. The PIMHnet members engage in activities such as advocacy, human resources and training, mental health policy, planning, legislation, service development, access to psychotropic
  drugs, and research and information. The PIMHnet also works to reduce the existing fragmentation of mental health activities and build a more coordinated and effective strategies to address the treatment
  gap, improve mental health care, and put an end to stigma, discrimination, and human rights violations against people with mental disorders. The PIMHnet's coordinator, Dr Michelle Funk, and the regional
  adviser, Dr Wang Xiangdong, are responsible for overseeing the network's activities and ensuring that the priorities outlined are addressed.
