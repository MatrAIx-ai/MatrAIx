    ''Heavy Equipment Operation'', ''Crew Coordination'', ''Sustainable Building Practices'', ''Project Documentation'']'
  hobbies: '[''Hiking'', ''Biking'', ''Rock Climbing'', ''Volunteer Construction (Habitat for Humanity)'', ''Live Music Attendance'', ''Coffee Shop Exploration'', ''Community Gardening'', ''DIY Home Improvement'',
    ''Seasonal Cooking'', ''Board Game Nights'']'
  career_goals: Angel aims to transition from laborer to crew foreman within the next two years, leveraging her hands‑on expertise and leadership abilities. She plans to complete a bachelor’s degree in
    construction management and obtain the Certified Construction Manager (CCM) credential to qualify for site‑supervisor roles. Long‑term, Angel envisions managing larger commercial projects that prioritize
    green building standards and community impact. She is also interested in mentoring junior workers, especially women entering the trades, and hopes to one day start her own small‑scale construction firm
    focused on affordable, energy‑efficient housing in the Pacific Northwest.
