personas:
  professional: Angel Olmo, a seasoned construction laborer with an associate degree in construction technology, blends OSHA‑trained safety leadership, precise blueprint interpretation, and masterful framing,
    concrete pouring, and equipment operation with a curious yet pragmatic mindset, fostering collaborative crew dynamics while steering toward a foreman role.
  sports: Angel Olmo stays fit by hiking the Columbia River Gorge in spring, cycling the Springwater Corridor year‑round, and rock‑climbing with the Portland Climbing Collective, while cheering on the Portland
    Timbers in soccer, the Trail Blazers in basketball, and occasionally joining a pick‑up ultimate Frisbee league at the local park.
  arts: Angel Olmo immerses themselves in Portland’s vibrant arts scene, regularly attending live shows by indie folk band Hopestill and the legendary Portside, exploring mural installations by Shepard
    Fairey, and strolling through the Portland Art Museum’s contemporary exhibits featuring works by artists like Kerry James Marshall.
  travel: Angel Olmo favors nature‑centric weekend getaways, meticulously planning trips to Oregon’s coastal hotspots like Cannon Beach and the volcanic peaks of Mt. Hood, while dreaming of longer expeditions
    to New Zealand’s South Island and the moss‑covered forests of Hokkaido, balancing a modest travel budget with a love for immersive outdoor experiences.
  culinary: Angel Olmo delights in seasonal farm‑to‑table cooking, often preparing cedar‑plank salmon with local hazelnut‑crusted sweet potatoes, a kale‑and‑radish salad tossed with Oregon apples and pumpkin
    seeds, and a rosemary‑infused beetroot crumble, while savoring specialty coffees made with beans from a Portland micro‑roastery.
  core: Angel Olmo never skips a community garden shift, always carries a reusable water bottle, and has a stubborn habit of staying up late tinkering on DIY home projects, even when a fresh start is needed
    the next morning.
background:
  cultural: Angel grew up in a middle‑class family in the suburbs of Portland, a region known for its strong connection to nature and progressive community values. As a white American with European ancestry,
    she was raised with an emphasis on independence, hard work, and environmental stewardship—a hallmark of Pacific Northwest culture. The city’s eclectic arts scene, emphasis on sustainability, and inclusive
    ethos have shaped her worldview, encouraging a balance of practicality and curiosity. Angel’s upbringing includes participation in traditional American holidays such as Thanksgiving and Fourth of July
    celebrations, as well as local events like the Portland Rose Festival and community volunteer drives. This blend of regional identity and personal values informs her collaborative, considerate approach
    to both work and social life.
attributes:
