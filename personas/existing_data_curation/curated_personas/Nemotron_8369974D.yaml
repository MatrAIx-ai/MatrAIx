personas:
  professional: Dominique Williams, a seasoned construction project coordinator in Virginia, leverages their PMP‑style planning expertise, OSHA 30‑hour certification, and talent for clear stakeholder communication
    to keep crews on schedule while deftly mediating conflicts with the pragmatic, structured approach that defines their work style.
  sports: Dominique Williams, a dedicated member of the Hampton Roads Runner’s Club, also splashes in the weekend Virginia Beach Soccer League and avidly cheers for the Washington Commanders (NFL) and the
    Virginia Cavaliers (college basketball) while balancing a love for group workouts with occasional solo trail runs.
  arts: Dominique Williams immerses themselves in live jazz nights at the Virginia Beach Music Hall—often catching performances by Gregory Porter and Kamasi Washington—attends avant‑garde theater productions
    at the NorVa, and devours novels by Colson Whitehead, Jesmyn Ward, and Marlon James, finding inspiration that fuels their community storytelling.
  travel: Dominique Williams prefers meticulously planned weekend getaways to coastal retreats like the Outer Banks and Asheville’s Blue Ridge Mountains, while dreaming of a solo backpacking adventure through
    Portugal’s historic towns, balancing travel ambitions with a demanding work schedule and a modest travel budget.
  culinary: Dominique Williams, a confident home chef, whips up soulful Southern staples such as gumbo with Andouille sausage, crispy fried chicken with collard greens, and peach cobbler, delighting friends
    with a knack for layering smoked paprika, hot sauce, and fresh herbs while occasionally over‑salting the jambalaya in their quest for bold flavor.
  core: Dominique Williams blends a structured, project‑manager mindset with a vibrant love for community‑driven rhythm—running, dancing, and cooking—while juggling a penchant for late‑night jazz podcasts
    and an occasional habit of over‑booking their calendar.
background:
  cultural: Dominique is an African‑American woman raised in the historically rich Hampton‑Newport News region, where the legacy of the Hampton Institute, the Civil Rights movement, and a vibrant coastal
    culture shaped her identity. She grew up attending Black churches and community festivals, absorbing traditions of oral storytelling, gospel music, and Southern cuisine. The blend of Southern hospitality
    and a strong sense of Black pride informs her relational style, community involvement, and commitment to uplifting other women of color in a male‑dominated industry.
attributes:
  skills: '[''project management'', ''construction budgeting'', ''schedule coordination'', ''OSHA safety compliance'', ''Virginia building code knowledge'', ''green building and sustainability practices'',
    ''team leadership'', ''conflict resolution'', ''vendor negotiation'', ''quality control'', ''technical documentation'']'
  hobbies: '[''running'', ''soccer'', ''contemporary dance classes'', ''theater outings'', ''live jazz concerts'', ''reading contemporary Black literature'', ''cooking Southern soul food'', ''volunteering
    for youth mentorship'', ''DIY home improvement projects'']'
  career_goals: Dominique aims to move into senior management within the next five years, targeting a role as a Regional Construction Director or starting her own minority‑owned construction management
    firm that focuses on sustainable projects in the Hampton Roads area. She plans to earn a Certified Construction Manager (CCM) credential, pursue a master’s degree in construction management, and mentor
    emerging women and Black professionals in the industry. She also hopes to influence local policy on affordable housing development.
