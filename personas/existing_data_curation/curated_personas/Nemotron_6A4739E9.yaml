personas:
  professional: Hyo Liu is a certified radiologic technologist who excels in digital radiography, CT, MRI, and ultrasound, blending a practical, detail‑oriented mindset with spontaneous, talkative engagement
    to ensure patient comfort while navigating the high‑stress environment of emergency imaging.
  sports: Hyo Liu cycles weekly with the East Bay Trail Club, follows the Golden State Warriors and Oakland Athletics, and joins pick‑up soccer games at Lake Merritt, balancing a love for hiking coastal
    bluffs with a practical routine of low‑impact cardio to counter long hours on their feet.
  arts: Hyo Liu immerses themselves in the rhythmic choreography of salsa legends like Celia Cruz and the polished dance routines of K‑pop groups such as BTS, devours contemporary Asian cinema from directors
    Bong Joon‑ho and Park Chan‑wook, reads novels by Haruki Murakami and Han Kang, and relaxes by streaming art‑driven video games like Journey and Celeste.
  travel: Hyo Liu enjoys meticulously planning weekend escapes to Napa Valley vineyards and spontaneous flights to Jeju Island, blending scenic coastal hikes with cultural immersion while balancing family
    time and a modest travel budget.
  culinary: Hyo Liu’s kitchen experiments combine gochujang‑marinated pork belly tacos, kimchi‑fried rice with smoked salmon, and a signature bulgogi‑taco hybrid, showcasing confident home‑cooking skills
    and a love for bold ingredients like miso, harissa, and fresh cilantro.
  core: Hyo Liu is a socially vibrant radiologic technologist who balances meticulous imaging expertise with spontaneous salsa nights, weekend potluck experiments, and a habit of juggling budgets while
    occasionally losing track of deadlines.
background:
  cultural: Hyo Liu is a first‑generation Korean‑American whose parents immigrated from South Korea to the Bay Area. Raised in a bilingual household, she speaks both Korean and English fluently and celebrates
    cultural traditions such as Lunar New Year, Chuseok, and Korean holidays alongside typical American festivities. Her upbringing emphasized respect for elders, collective family values, and a strong
    work ethic, while living in Union City exposed her to a vibrant, multicultural community. This blend of cultural perspectives informs her empathetic patient care, her love for sharing Korean cuisine
    with friends, and her ability to navigate and bridge both Eastern and Western approaches to health and wellness.
attributes:
  skills: '[''Digital Radiography'', ''Computed Tomography (CT)'', ''Magnetic Resonance Imaging (MRI)'', ''Ultrasound Imaging'', ''Radiation Safety and Dose Monitoring'', ''Equipment Maintenance and Troubleshooting'',
    ''Patient Positioning and Comfort'', ''HIPAA Compliance'', ''Electronic Medical Record (EMR) Management'', ''Cross‑Cultural Patient Communication'', ''Team Collaboration'', ''Quality Assurance & Control'',
    ''Procedure Education for Patients'']'
  hobbies: '[''Salsa and K‑pop dance classes'', ''Cooking Korean‑fusion meals for gatherings'', ''Organizing potluck and trivia nights'', ''Volunteering at community health fairs'', ''Hiking coastal and
    East Bay trails'', ''Practicing calligraphy'', ''Watching contemporary Asian cinema'', ''Reading fiction in English and Korean'', ''Streaming video games with friends'']'
  career_goals: Hyo aims to become a certified MRI specialist within the next two years and to lead a quality‑improvement initiative that reduces scan repeat rates in her department. She aspires to mentor
    new technologists, sharing both her technical knowledge and her patient‑focused communication style. In the longer term, Hyo plans to pursue a bachelor's degree in Health Administration to transition
    into a supervisory or managerial role, where she can influence departmental policies that promote staff well‑being and patient-centered care while still maintaining a hands‑on presence in the imaging
    suite.
