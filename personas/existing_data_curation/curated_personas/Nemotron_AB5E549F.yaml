  career_goals: Rahul aims to move into a senior recruiting or talent‑acquisition lead role where he can design interview frameworks and mentor junior staff. In the longer term, he envisions transitioning
    to an HR manager position or launching a boutique consultancy that helps small businesses streamline hiring, while preserving a stable work‑life balance for his family.
