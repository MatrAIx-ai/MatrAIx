  career_goals: In the next five years, Nicholas aims to create a feature‑length documentary that captures Gloucester’s maritime heritage while exploring broader themes of memory, identity, and the sea
    as a metaphor for human experience. He intends to secure a regional arts grant to fund this project and to collaborate with local historians and marine scientists for interdisciplinary depth. Additionally,
    he hopes to launch a mentorship program for emerging filmmakers in Essex County, offering workshops on narrative construction and low‑budget production techniques. Nicholas also envisions a part‑time
    teaching role at a community college, where he can share his expertise in visual storytelling and project management while continuing to produce independent works that push artistic boundaries.
