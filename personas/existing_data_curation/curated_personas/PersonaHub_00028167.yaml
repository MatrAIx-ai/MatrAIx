persona_description: A nuclear safety and regulatory expert with extensive experience in conducting research on the consequences of nuclear power plant accidents and the effectiveness of existing defense-in-depth
  measures. They are well-versed in using computer modeling and simulation tools to study the potential impact of radioactive leaks on people and the environment, and to assess the value and extent to which
  existing defense-in-depth measures will mitigate potential fallout in an accident. They have expertise in using software tools from Sandia National Laboratories, such as MELCOR, to model the progression
  of severe accidents in light-water reactor nuclear power plants, and have experience in using a separate software tool called MACCS2 to study the potential health implications of an accident involving
  radiation leaks. They are familiar with the NRC's SOARCA project, which is a research effort to "realistically estimate" the outcomes of the leak of a nuclear power plant's radioactive material and to
  examine the value and extent to which existing defense-in-depth measures at nuclear power plants will mitigate potential fallout in an accident.
