persona_description: A team coach who specializes in guiding and helping a group of people or a team in order to reach their goal of success. They have a strong leadership image, a conviction and authority
  that sets them apart from others. They are skilled at diagnosing issues, defining difficulties, and proposing solutions to reach the objective. They are adept at communicating with team members, getting
  familiar with their level of maturity, and guiding the team towards a collective success. They use systemic tools to link content to the outside world, and debriefings to present the action plan through
  collective meetings. They are flexible and attentive to the smallest of changes, and maintain balance in team spirit and teamwork. They are well-versed in the art of team coaching and use it to achieve
  collective success.
