  hobbies: '[''Gardening (vegetables & herbs)'', ''Reading historical fiction'', ''Korean tea ceremony'', ''Calligraphy'', ''Hiking in Connecticut'', ''Cooking Korean cuisine'', ''Nature photography'',
    ''Crossword and Sudoku puzzles'', ''Small book club'', ''Financial‑literacy volunteer workshops'']'
  career_goals: Mihyun aims to attain a senior managerial or partner role within her firm, where she can spearhead digital transformation of audit processes and mentor the next generation of accountants.
    She is interested in expanding her advisory services to small businesses in her community, offering strategic financial planning and technology integration. Over the next five years, she also hopes
    to launch a series of financial‑literacy workshops for local nonprofits, blending her professional expertise with community service before transitioning to a part‑time consulting role after retirement.
