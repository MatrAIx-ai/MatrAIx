personas:
  professional: Mihyun Cheng is a seasoned accountant and auditor who leverages deep GAAP and IFRS expertise, forensic investigation skills, and emerging data‑analytics tools like Tableau to design robust
    internal controls, mentor junior staff, and drive digital transformation within their firm while they balance meticulous organization with flexible problem‑solving.
  sports: Mihyun Cheng enjoys weekend hikes on the Appalachian Trail's Connecticut segments, participates in the local Connecticut Trails Club, follows the Boston Red Sox and New England Patriots, and they
    occasionally attend a community yoga class to stay limber.
  arts: Mihyun Cheng finds solace in practicing traditional calligraphy and Korean tea ceremony, captures nature’s subtle details through photography, and they draw artistic inspiration from the works of
    poet Maya Angelou, painter Claude Monet, and cellist Yo‑Yo Ma.
  travel: Mihyun Cheng prefers thoughtful, low‑key travel, planning self‑guided trips to historic sites like the Gettysburg battlefield, exploring the serene tea gardens of Uji, Japan, and revisiting New
    England’s colorful fall foliage in Vermont, while they budget carefully to fund community financial‑literacy workshops and often document each journey in a handwritten journal.
  culinary: Mihyun Cheng cooks with confidence, regularly preparing bibimbap, kimchi jjigae, and gochujang‑marinated bulgogi using garden‑fresh herbs like cilantro and chives, and they enjoy pairing these
    dishes with a meticulously brewed barley tea while occasionally treating themselves to a dessert at a high‑end French bistro.
  core: Mihyun Cheng blends disciplined analytical rigor with quiet curiosity, balancing meticulous audit work with solitary garden care, tea rituals, and a relentless pursuit of knowledge, and they habitually
    check the stock market during afternoon coffee breaks.
background:
  cultural: Mihyun is a second‑generation Korean‑American. Her parents immigrated to the United States in the 1970s, and she grew up in the Boston suburbs while maintaining fluency in Korean. Family values
    such as respect for elders, diligence in education, and communal responsibility shaped her worldview. She celebrates Lunar New Year and Chuseok with her extended family, incorporates traditional Korean
    recipes into her cooking, and occasionally visits relatives in South Korea. While fully integrated into American professional life, she balances these cultural traditions with a pragmatic, forward‑looking
    approach to both her career and personal interests.
attributes:
  skills: '[''Financial Reporting (GAAP/IFRS)'', ''Tax Compliance'', ''Audit Planning and Execution'', ''Risk Assessment'', ''Internal Controls Design'', ''Forensic Accounting'', ''Budgeting and Forecasting'',
