  career_goals: In retirement, Kenneth aims to deepen his contributions to the community by leading heritage preservation efforts at the local historical society, curating a small exhibit of Appalachian
    folk art, and documenting oral histories of longtime residents. He wants to expand the community garden he helped start, providing fresh produce and educational workshops on sustainable gardening for
    seniors and schoolchildren. Kenneth also aspires to mentor younger volunteers in basic trades such as carpentry and gardening, and he plans to author a memoir that weaves his personal stories with the
    history of Olive Hill. Additionally, he hopes to support his church’s outreach programs, especially initiatives that bring arts and music to youth.
