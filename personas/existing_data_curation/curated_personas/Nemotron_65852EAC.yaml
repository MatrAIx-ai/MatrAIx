  hobbies: '[''Reading mystery novels'', ''Indoor succulents gardening'', ''Walking in Discovery Park'', ''Crossword and sudoku puzzles'', ''Small book‑club gatherings'', ''Knitting for charity'', ''Volunteering
    at community library'', ''Listening to educational podcasts'', ''Journaling'']'
  career_goals: Approaching retirement, Hazel aims to transition from full‑time receptionist duties to a part‑time role that leverages her experience with community outreach and educational support. She
    hopes to volunteer as a visitor liaison at the Seattle Public Library, mentor younger staff in front‑desk best practices, and perhaps enroll in a short certificate program on digital archiving to stay
    engaged with information management. Hazel also desires to maintain a stable routine that reduces stress while allowing occasional flexibility for personal interests.
