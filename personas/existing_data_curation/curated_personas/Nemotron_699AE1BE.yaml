personas:
  professional: Evans Gray, a 38‑year‑old seasoned waiter with a talent for attentive service and inventive menu suggestions, leverages their strong communication skills and hospitality management studies
    to move toward shift‑supervisor and eventually restaurant manager roles, with a vision of opening a community‑centered café that doubles as an art showcase.
  sports: Evans Gray follows the Carolina Panthers and Charlotte Hornets, regularly attends Charlotte Hurricanes games, plays pickup basketball with the local community league, and enjoys seasonal fishing
    trips to nearby lakes during the summer.
  arts: Evans Gray immerses themselves in the music of Miles Davis, B.B. King, and The Clark Sisters, attends community theater productions at the Robeson County Playhouse, and draws visual inspiration
    from the vibrant murals created by local artists featured at the downtown gallery.
  travel: Evans Gray prefers road‑trip adventures to nearby Asheville and Charleston for their culinary scenes, has visited New Orleans for its music festivals, and dreams of exploring Barcelona’s street
    markets, all while balancing travel plans around family budgeting and school schedules.
  culinary: Evans Gray experiments with dishes like collard greens simmered with smoked turkey and kimchi, shrimp‑and‑grits infused with miso and ginger, and jalapeño‑cornbread topped with smoked paprika,
    blending traditional Southern comfort foods with global flavors.
  core: Evans Gray, a curious hospitality professional with a habit of humming gospel while plating, blends Southern soul with artistic flair, balances community commitment and personal ambition, yet sometimes
    forgets to water their garden in the rush of new projects.
background:
  cultural: Evans grew up in the rural town of Saint Pauls, Robeson County, surrounded by a close‑knit African‑American community that values hospitality, church fellowship, and oral storytelling. His family
    traditions include sharing soulful foods such as collard greens, cornbread, and barbecued dishes at family gatherings, and celebrating holidays with gospel music and communal cooking. The multicultural
    environment of Robeson County—interacting with Lumbee and white neighbors—has given him an appreciation for diverse cultural expressions while reinforcing a strong sense of Black Southern identity.
    These roots shape his respectful approach to guests, his pride in Southern culinary heritage, and his commitment to uplifting his community through music, art, and mentorship.
attributes:
  skills: '["Customer service", "Effective communication", "Multitasking", "POS system operation", "Food safety compliance", "Southern cuisine knowledge", "Basic culinary preparation", "Wine and beverage
