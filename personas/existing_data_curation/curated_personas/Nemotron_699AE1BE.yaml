  hobbies: '["Visiting art galleries", "Attending community theater", "Experimental cooking", "Gardening", "Listening to jazz, gospel, and blues", "Playing hand drum", "Photography", "Volunteering at church
    youth program", "Reading biographies of African‑American leaders", "Watching cultural documentaries"]'
  career_goals: Over the next three to five years, Evans aims to advance from waiter to shift supervisor and eventually restaurant manager, pursuing a Hospitality Management certificate at a community college
    to solidify his leadership skills. He hopes to develop a signature menu that highlights African‑American Southern flavors and to launch a small community‑focused café that doubles as an art showcase
    and workshop space for local creators. In parallel, Evans wants to ensure financial stability for his family, support his children's education, and serve as a mentor for younger employees in the service
    industry, fostering a supportive workplace culture.
