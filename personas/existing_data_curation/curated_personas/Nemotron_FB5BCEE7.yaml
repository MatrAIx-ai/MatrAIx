  career_goals: When asked about the future, Nanda often says she wants to be a teacher or a nurse because she likes helping others learn and stay healthy. She also imagines herself leading a class as a
    "classroom captain," organizing activities and making sure everything runs smoothly. Her competitive streak shows in her desire to be the best at these roles.
