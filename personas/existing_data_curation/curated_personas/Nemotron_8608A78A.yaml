personas:
  professional: Guy Bouler is a veteran film and television producer who blends meticulous budgeting and crew leadership with a curiosity for emerging tech like virtual production, leveraging their deep
    appreciation for oral storytelling and community traditions to craft culturally resonant documentaries.
  sports: Guy Bouler is an avid water‑sport enthusiast who rows with the Panama City Paddle Club in summer, follows the Tampa Bay Buccaneers, Miami Heat, and Tampa Bay Rays passionately, and plays weekend
    pickup basketball at a local gym, though they often skip the gym after long shoots.
  arts: Guy Bouler is a lifelong lover of the arts who curates community theater productions, draws inspiration from Nina Simone, Stevie Wonder, and Maya Angelou, regularly attends performances by the Gulf
    Coast Jazz Society, and collects vintage film reels while occasionally day‑dreaming about directing a musical tribute to gospel harmonies.
  travel: Guy Bouler is a seasoned traveler who enjoys short‑haul Gulf Coast road trips to New Orleans and Charleston, has visited Kingston, Jamaica and Accra, Ghana for cultural research, and dreams of
    a sailing expedition to the Bahamas, balancing a tight family budget with a penchant for spontaneous weekend getaways.
  culinary: Guy Bouler is a passionate home cook who perfects soul‑food classics like collard greens with smoked turkey, jambalaya, and sweet‑potato pie, infusing them with Caribbean notes of allspice,
    scotch bonnet pepper, and mango chutney, and they often experiment with jerk‑seasoned shrimp while keeping a well‑stocked pantry of okra, plantains, and coconut milk.
  core: Guy Bouler is a meticulous storyteller who channels a relentless drive for authentic Gulf narratives into late‑night script revisions, a habit of over‑booking meetings, and an occasional weakness
    for collecting vintage film reels.
background:
  cultural: Guy M. Bouler is a Black American whose family roots trace back to the Southern United States, with grandparents who migrated from the Deep South during the Great Migration. He grew up immersed
    in the rich traditions of African American music, oral storytelling, and church life, which shaped his appreciation for narrative depth. Living in Panama City Beach, he blends this heritage with the
    coastal culture of the Gulf, often drawing inspiration from the region’s multicultural influences, including Caribbean and Latin American communities. His cultural identity informs his commitment to
    authentic representation in media and his involvement in local cultural festivals.
attributes:
  skills: '[''Film Production'', ''Directing'', ''Creative Development'', ''Budgeting and Financial Management'', ''Project Scheduling'', ''Team Leadership'', ''Script Development'', ''Storyboarding'',
    ''Virtual Production Technologies'', ''Stakeholder Negotiation'', ''Risk Assessment'', ''Conflict Mediation'']'
  hobbies: '[''Sailing'', ''Kayaking'', ''Photography'', ''Reading African Diaspora Literature'', ''Community Theater'', ''Cooking Soul Food'', ''Mentoring Youth in Filmmaking'', ''Attending Local Music
    Events'']'
  career_goals: Guy aims to establish his own boutique production company headquartered in Panama City Beach, focusing on documentary series that highlight underrepresented Black voices in the Gulf Coast
    region. Over the next five years, he seeks to secure partnerships with major streaming platforms, win regional film festival awards, and mentor emerging filmmakers from diverse backgrounds. He also
    plans to develop a weekly broadcast highlighting local arts and cultural events, balancing his creative aspirations with the desire for financial stability for his family.
