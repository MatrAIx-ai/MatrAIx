personas:
  professional: Bryant Cedeno, a 17‑year‑old pragmatic teen, merges a knack for fixing small electronics with a love for cooking family recipes, coordinates soccer games at the park and volunteers at the
    local youth center, and aspires to earn a vocational certification in automotive technology or culinary arts to secure a reliable job that supports their family.
  sports: Bryant Cedeno, a dedicated soccer enthusiast, spends afternoons playing forward for the Eastside United Youth Soccer Club at the local park, follows the LA Galaxy closely, and joins seasonal pick‑up
    basketball games at the community center, balancing competitive drive with a collaborative spirit.
  arts: Bryant Cedeno blends a love for reggaeton beats from Bad Bunny with indie rock vibes of Arctic Monkeys, often humming while sketching comic‑style superheroes during study breaks, and attends the
    annual East LA Art Walk to draw inspiration from street murals and live graffiti performances.
  travel: Bryant Cedeno prefers short road trips over long flights, planning weekend escapes to the Griffith Observatory for stargazing, surfing lessons at Santa Monica Beach, and annual family hikes to
    the Grand Canyon, while dreaming of a future backpacking adventure through the Southwest deserts once a stable income is secured.
  culinary: Bryant Cedeno experiments in the kitchen by reimagining family staples—creating pineapple‑infused tacos with smoky chipotle mayo, grilling corn on the cob brushed with lime‑cilantro butter,
    and perfecting a spicy cilantro‑lime salsa—while balancing a beginner’s cooking confidence with a drive to master advanced flavor pairings.
  core: Bryant Cedeno is a curious yet practical teen who fuses tech tinkering, soccer camaraderie, and inventive cooking into a community‑focused vision, all while juggling school, a modest budget, and
    occasional teenage stress.
background:
  cultural: Bryant comes from a Mexican‑American family rooted in Los Angeles’ Eastside neighborhoods. He grew up bilingual, celebrating traditions such as Día de los Muertos and family gatherings centered
    around food. His community’s emphasis on mutual support and respect for elders has shaped his cooperative nature. While navigating the multicultural environment of LA, he blends his heritage with contemporary
    urban influences, which informs his values, culinary tastes, and social outlook.
attributes:
  skills: '["Bilingual (English/Spanish)", "Basic computer literacy (Word, Internet research)", "Troubleshooting simple electronics", "Cooking traditional Mexican cuisine", "Teamwork and collaboration",
