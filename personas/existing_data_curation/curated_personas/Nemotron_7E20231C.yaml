  hobbies: '["Soccer", "Cooking and recipe experimentation", "Electronics tinkering", "Video gaming", "Listening to music (Reggaeton, Indie rock)", "Sketching/drawing"]'
  career_goals: Bryant aims to earn his GED within the next year, then pursue a vocational certification in automotive technology or culinary arts, which combine his practical problem‑solving and love for
    cooking. He wants to secure a stable job that allows him to support his family, and eventually explore a career in community outreach through food programs that help youths in his neighborhood.
