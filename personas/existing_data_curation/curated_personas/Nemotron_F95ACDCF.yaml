  career_goals: Amy aims to continue her dependable work as a cashier while moving toward a supervisory role, such as shift lead, where she can mentor younger staff. She plans to earn a certificate in retail
    management to broaden her skill set. Over the next few years, she hopes to transition to part‑time hours to spend more time with family and her hobbies, while still contributing to the store’s success.
    As retirement approaches, she intends to secure a comfortable financial footing and possibly launch a modest home‑based bakery that lets her share her love of Southern cooking with friends and neighbors.
    Community service remains a priority, and she envisions expanding her volunteer involvement with local senior support programs.
