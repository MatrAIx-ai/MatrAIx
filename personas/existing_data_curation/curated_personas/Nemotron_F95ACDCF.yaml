personas:
  professional: Amy Moss, a 58‑year‑old grocery store cashier, combines meticulous cash‑handling, POS expertise, and inventory oversight with a pragmatic, routine‑driven work style, while leveraging their
    sociable yet critically‑skeptical nature to mentor new staff and resolve customer disputes as they aim for a shift‑lead supervisory role and eventually a part‑time home bakery.
  sports: Amy Moss competes in the Riverbend Lanes Pin Pals bowling league, enjoys weekly line‑dancing at the community center, and supports the hometown Springfield Seniors softball team, balancing a competitive
    spirit with social camaraderie while maintaining a routine of light cardio to keep arthritis at bay.
  arts: Amy Moss sings in her church choir, frequently volunteers on set design for community‑theater productions of classics like Our Town, and immerses themselves in classic country music by listening
    to Dolly Parton, Johnny Cash, and Merle Haggard, letting these traditions shape their evenings and social gatherings.
  travel: Amy Moss favors planned road‑trip vacations with family and church groups, often traveling to Southern gems like Savannah, Charleston, and Asheville’s Blue Ridge Parkway, while budgeting carefully
    to balance the desire for leisurely scenic drives with the practical need to preserve savings for retirement.
  culinary: Amy Moss excels at Southern comfort cooking, routinely preparing crispy fried chicken, buttery cornbread, and peach cobbler using garden‑fresh tomatoes, cucumbers, and herbs, and delights neighbors
    with homemade pickles and biscuits flavored with honey and buttermilk.
  core: Amy Moss blends a steadfast love for routine‑driven community service with a competitive edge in bowling and a sweet tooth for Southern baking, all while juggling a pragmatic finance plan and a
    resilient, yet occasionally skeptical, outlook on life.
background:
  cultural: Amy was raised in a small town in Middle Tennessee within a traditional Southern Baptist family. Her cultural identity reflects the values of Southern hospitality, a strong sense of community,
    and a practical work ethic. Family gatherings, church activities, and local festivals that celebrate regional heritage shape her worldview. She values modesty, respect for tradition, and the importance
    of reliable, routine‑oriented living. While she embraces modern conveniences such as digital POS systems, she remains rooted in classic Southern customs—enjoying country music, family‑style meals, and
    the close‑knit rhythms of small‑town life.
