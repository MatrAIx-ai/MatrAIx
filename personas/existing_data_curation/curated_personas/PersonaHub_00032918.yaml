persona_description: A hematologist and researcher who specializes in the study of Notch signaling pathway and its implications for cancer stem cells. He is currently working on a two-stage drug trial that
  uses a Notch inhibitor originally developed by Merck for Alzheimer's patients in the late 1990s, followed by chemotherapy, to make cancer stem cells sensitive to the chemotherapy and knock out the tumors.
  The Notch pathway sends signals from a cell's surface membrane into its nucleus, and Maillard's team found that the signals are not required for the maintenance of blood-forming stem cells in adult mice.
  He is an assistant professor of internal medicine and an assistant professor of cell and developmental biology at the U-M Medical School and has been involved in the Notch study.
