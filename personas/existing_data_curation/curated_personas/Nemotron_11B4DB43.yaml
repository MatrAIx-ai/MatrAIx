  hobbies: '[''Sketching and drawing'', ''Animating on tablet'', ''Bird-watching'', ''Hiking'', ''Soccer'', ''LEGO building'', ''Scratch coding'', ''Improv theatre'', ''Visiting art galleries'', ''Attending
