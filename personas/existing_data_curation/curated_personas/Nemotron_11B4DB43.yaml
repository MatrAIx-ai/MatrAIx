personas:
  professional: Derek White is an aspiring young animator who blends a natural curiosity for storytelling with a relaxed, improvisational approach to creating cartoon sketches on their tablet, often juggling
    disorganized project files while thriving in collaborative school projects.
  sports: Derek White sprints across the field as a forward for the Loveland Lions youth soccer club, idolizes the Colorado Rapids and Colorado Avalanche, and spends winter weekends snowboarding at nearby
    slopes, balancing energetic practice sessions with a laid-back attitude that occasionally leads to skipping post-game stretches.
  arts: Derek White channels a love for cartooning into daily sketch sessions, draws inspiration from Pixar's Toy Story, Studio Ghibli's My Neighbor Totoro, and comic legends like Stan Lee, while regularly
    visiting the Loveland Museum's youth exhibits and attending kid-friendly screenings at the Loveland Film Festival.
  travel: Derek White enjoys spontaneous weekend family hikes through the foothills of the Rocky Mountains and day trips to Denver's museums, while dreaming of future adventures to Banff National Park in
    Canada and Disney World in Florida, preferring low-cost outdoor exploration over elaborate, pre-planned vacations.
  culinary: Derek White gravitates toward cheesy pizza, crunchy tacos with cilantro and lime, and makes enthusiastic banana-strawberry-spinach smoothies, often attempting simple recipes like grilled cheese
    and s'mores with parental supervision, while savoring Colorado green chili as a favorite local flavor.
  core: Derek White is a curiosity-driven 10-year-old whose boundless imagination fuels cartoon sketches and impromptu LEGO forts, yet their penchant for leaving art supplies scattered and forgetting homework
    deadlines adds a charming, chaotic edge to their energetic outlook.
background:
  cultural: Derek is a white American child raised in Loveland, Colorado, where the scenic Rocky Mountain environment and a strong community focus shape his worldview. His family’s cultural practices blend
    typical American suburban life—school events, holiday celebrations, and community sports—with a regional appreciation for outdoor recreation, environmental stewardship, and local arts festivals. He
    is exposed to a multicultural atmosphere through school diversity programs and community events that celebrate Indigenous heritage and Western traditions, fostering an openness to new ideas and varied
    experiences.
