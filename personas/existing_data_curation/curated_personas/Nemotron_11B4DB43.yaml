  career_goals: Derek dreams of combining his love for nature and art by becoming a wildlife documentary filmmaker or a visual storyteller who can create engaging videos about Colorado’s outdoors. He also
    entertains the idea of designing video games that feature environmental themes, hoping to inspire other kids to explore and protect the natural world. In the longer term, he imagines leading community
    art projects or festivals that bring people together, reflecting his outgoing and collaborative personality.
