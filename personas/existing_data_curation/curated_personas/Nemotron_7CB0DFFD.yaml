personas:
  professional: Hai Le, an aspiring young coder, uses Scratch to build quirky games that blend storytelling with simple physics experiments, showing a knack for problem‑solving and a meticulous yet flexible
    approach that mirrors their love for LEGO architecture, while often worrying about bugs before finally triumphing over them.
  sports: Hai Le, a forward on the Springfield Youth Soccer Club's U11 team, loves cheering for the local professional soccer franchise during weekend matches, practices dribbling after school, and occasionally
    joins community basketball pick‑ups, using sport as a way to release worry.
  arts: Hai Le, a budding visual artist who spends weekends drawing vibrant character sketches inspired by Studio Ghibli and Van Gogh, visits the City Art Museum's interactive exhibits, and collects postcards
    of Yayoi Kusama's polka‑dot installations, letting art fuel their unconventional thinking.
  travel: Hai Le, who has explored the natural history museum in Washington, D.C., the aquarium in San Diego, and the local botanical garden, dreams of traveling to Japan's Ghibli Museum and Italy's Renaissance
    art sites, preferring family‑planned itineraries with ample free time for sketch‑making.
  culinary: Hai Le, who loves helping in the kitchen by assembling simple ramen bowls with soft‑boiled eggs, baking chocolate chip cookies, and experimenting with colorful fruit smoothies, yet often forgets
    to clean up after cooking, leading to occasional messy countertops.
  core: Hai Le, a curious ten‑year‑old who blends art, code, and LEGO building into daily adventures, manages worry with journaling, and balances a generous heart with occasional impulsive spending.
background:
  cultural: Hai comes from a Vietnamese-American family that maintains many traditions from their heritage while embracing the multicultural environment of San Francisco. At home, he speaks both English
    and Vietnamese, celebrates Lunar New Year with family gatherings and traditional foods, and participates in community festivals at the local Asian cultural center. This blend of East Asian values—such
    as respect for elders, a strong sense of community, and emphasis on education—combined with the diverse, inclusive atmosphere of his city, shapes his compassionate outlook and curiosity about the world.
