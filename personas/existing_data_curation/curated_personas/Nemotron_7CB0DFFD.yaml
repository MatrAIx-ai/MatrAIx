  career_goals: Hai dreams of combining his love for art and technology to create interactive installations or educational games that bring people together and make learning fun. He aspires to become a
    teacher or a community-focused game designer who can support other children, and he is interested in studying environmental science or social work to help protect his city and foster harmony. He also
    hopes to volunteer regularly at local community centers and later pursue a career that lets him nurture others' well-being.
