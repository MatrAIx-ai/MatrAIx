persona_description: A mental health professional who specializes in the study of depression, particularly its manifestation during the holiday season. She has a keen understanding of the biology and psychology
  of depression and how it can affect individuals differently based on their personality traits and environmental factors. She is well-versed in the various triggers and coping mechanisms that can help
  individuals manage holiday depression and has developed strategies to help people recognize and mitigate their emotional and physical triggers. She is a thought leader in the field of mental health and
  has published extensively on the topic of holiday depression.
