  career_goals: Lorena dreams of a stable, caring career where she can help others in a structured environment. She is particularly interested in becoming a pediatric nurse, attracted by the routine of
    medical practice, the opportunity to support children's health, and the collaborative nature of healthcare teams. In the shorter term, she plans to focus on science and health-related courses, volunteer
    at her church's health outreach programs, and maintain strong academic performance. She also keeps the option of becoming a teacher or school librarian, roles that would let her combine her love for
    organization and reading with helping younger students.
