persona_description: An individual who is involved in the development and standardization of IP Telephony (iptel) protocols, specifically focusing on the naming and routing problems for Voice over IP (VoIP)
  protocols. They have extensive experience with the tel URI, which is used for specifying telephone numbers, and are responsible for updating the specification based on their experience. They are also
  interested in developing extensions to the tel URI, such as support for number portability indicators and trunk groups. Additionally, they are responsible for defining a protocol, Telephony Routing over
  IP (TRIP), which solves one aspect of the problem of routing between domains. They are also working on a standards track document that defines a protocol for a specific communications interface, and a
  MIB document for TRIP. They are also interested in elevating TRIP to Draft Standard at this time.
