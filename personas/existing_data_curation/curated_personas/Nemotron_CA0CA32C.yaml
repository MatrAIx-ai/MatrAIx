  hobbies: '[''Vegetable gardening'', ''Community garden volunteering'', ''Art festival attendance'', ''Watercolor painting'', ''Hiking and birdwatching'', ''Card games (bridge, poker)'', ''Garden competitions'',
    ''Trivia nights'', ''Mindfulness meditation'', ''Anxiety support group'']'
  career_goals: Jeff aims to transition from a hands‑on groundworker to a senior manager or owner‑operator of a boutique landscaping firm that specializes in environmentally sustainable and artistically
    inspired designs. He hopes to earn a professional landscape design certification, mentor younger workers, and win the annual West Virginia ‘Best Community Garden’ competition. He also wants to develop
    a community garden project in Martinsburg that combines local art installations with educational workshops, solidifying his legacy while ensuring financial stability for his family.
