personas:
  professional: Jeff Corral, a seasoned groundskeeping professional in his early sixties, leverages his deep horticultural knowledge, meticulous budgeting, and disciplined project planning to design sustainable,
    artistically inspired landscapes, while their competitive drive fuels a quest for award-winning garden installations and a future boutique firm.
  sports: Jeff Corral, an enthusiastic member of the Martinsburg Trail Runners club and the West Virginia Hiking Association, hikes the Appalachian Trail each spring, follows the West Virginia Mountaineers
    football team, and participates in a senior pickleball league at the local YMCA, balancing competitive spirit with low-impact cardio.
  arts: Jeff Corral, an avid watercolorist, finds inspiration at folk art fairs and admires the works of John Sell Cotman and contemporary Appalachian artist Kathy Hultgren, while they often paint serene
    landscapes of the Shenandoah Valley and attend live performances by folk musician Alison Krauss.
  travel: Jeff Corral prefers thoughtfully planned road trips that blend gardening inspiration with nature, having visited Kew Gardens in London, the Kyoto Imperial Palace gardens, and Shenandoah National
    Park, and now dreams of a summer pilgrimage to the tulip fields of the Netherlands and a quiet retreat at the Blue Ridge Parkway.
  culinary: Jeff Corral enjoys farm-to-table cooking, regularly preparing dishes like roasted heirloom tomatoes with fresh basil, grilled trout with dill, and a hearty butternut squash soup seasoned with
    sage and nutmeg, while their skill level is comfortable enough for jam-making from garden berries and occasional gourmet cheese pairings.
  core: Jeff Corral blends meticulous gardening expertise with a competitive, art-driven spirit, navigating anxiety through mindfulness while juggling a disciplined financial plan and a love for hiking,
    watercolor, and community-centered creativity.
background:
  cultural: Jeff grew up in a modest, white, Appalachian family in West Virginia, where self‑reliance, close‑knit community ties, and a respect for the natural landscape were core values. His high‑school
    education and lifelong work in landscaping reflect a strong work ethic typical of the region. While rooted in traditional Appalachian culture—valuing practical skills, church fellowship, and local traditions—Jeff
    also embraces new ideas, artistic expression, and sustainable practices, blending the old with the new in both his professional and personal life.
attributes:
  skills: '[''Horticulture knowledge'', ''Landscape design'', ''Irrigation system planning and maintenance'', ''Heavy equipment operation'', ''Project management'', ''Team leadership'', ''Safety compliance'',
