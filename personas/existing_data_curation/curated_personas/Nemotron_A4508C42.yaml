  hobbies: '[''Gardening'', ''Hiking'', ''Birdwatching'', ''Reading historical fiction'', ''Genealogy research'', ''Cooking comfort meals'', ''Wine tasting with friends'', ''Volunteering at the local library'',
    ''Crossword puzzle club'', ''Photography of local landscapes'']'
  career_goals: Dianne aims to secure a senior analyst or advisory role within a regional government agency or a stable mid‑size firm where she can leverage her expertise to drive long‑term efficiency projects.
    Over the next five years she plans to earn a Lean Six Sigma Black Belt and a PMP certification, positioning herself as a go‑to strategist for process optimization. She also hopes to transition into
    a mentorship capacity, guiding younger analysts and establishing a structured knowledge‑transfer program. Ultimately, she seeks a position that offers a predictable schedule, reduced travel, and a supportive
    environment that helps manage her stress while allowing her to maintain a healthy work‑life balance.
