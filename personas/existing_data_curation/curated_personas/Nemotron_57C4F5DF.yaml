  hobbies: '[''playground climbing'', ''dancing to music'', ''dress‑up and doll play'', ''drawing and coloring'', ''paper‑and‑crayon crafts'', ''nature walks with family'', ''watching cartoons'', ''group
    games like Duck, Duck, Goose'']'
  career_goals: Although Irma is only four, she already imagines future roles where she can help and create. She talks about wanting to be a teacher who helps children learn, a veterinarian who cares for
    animals, or an artist who paints beautiful pictures. She also aspires to be a kind friend, learn new things every day, and contribute to her family and community.
