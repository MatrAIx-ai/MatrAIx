personas:
  professional: Irma Racke, a budding preschool explorer, constantly asks "why?" while assembling block towers, blending innocent curiosity with a surprisingly practical knack for sorting shapes, and channels
    her sociable energy into leading impromptu play‑sessions for friends, though she often forgets to tidy up afterward.
  sports: Irma Racke, a lively member of the Tiny Turtles soccer club, dashes across the field with boundless energy, cheering for the local San Antonio Spurs while preferring short, spontaneous sprint
    drills over rigid practice schedules, and often trades her water bottle for a sticker after a game.
  arts: Irma Racke, who adores drawing bright crayon animals, sings along to the Sesame Street theme, and can recite lines from Moana’s "How Far I’ll Go," finds comfort in the familiar melodies of Disney
    classics while her wall of artwork displays a chaotic yet charming collage of stickers and handprints.
  travel: Irma Racke, an enthusiastic mini‑traveler, loves spontaneous road trips to the nearby botanical garden and the bright lights of Disneyland, often packing a small backpack with crayons and her
    favorite stuffed giraffe, but she prefers short, vivid outings over long vacations because her short attention span craves constant novelty.
  culinary: Irma Racke, a self‑declared connoisseur of peanut butter and jelly sandwiches, loves the gooey swirl of honey on warm toast, proudly adds extra banana slices to her mac‑and‑cheese, and gleefully
    insists on sprinkling rainbow sprinkles on any fruit salad, though she often forgets to wash her hands before eating.
  core: Irma Racke is a curious, energetic four‑year‑old who balances new ideas with a love for familiar routines, thrives on group play, and swings between spontaneous joy and sudden anxiety.
background:
  cultural: Irma is raised in a white Southern‑American family in Victoria, Texas. Her upbringing includes regular visits to local churches, participation in community events such as the Victoria County
    Fair and summer festivals, and family gatherings featuring regional foods like brisket, fried catfish, and pecan pie. She experiences Southern hospitality, country and bluegrass music, and enjoys outdoor
    activities typical of the Gulf Coast area, all of which shape her friendly, community‑oriented outlook.
attributes:
  skills: '[''drawing and coloring'', ''basic counting'', ''color recognition'', ''building with blocks'', ''puzzle solving'', ''storytelling through role‑play'', ''cooperative play'', ''simple household
