persona_description: A structural engineer who uses Autodesk Revit Structure to create and manage construction documentation, manage and share building design information with an extended project team,
  and collaborate with architects and engineers to accommodate last-minute design changes. This person is familiar with the bi-directional exchange of information with analysis applications and has experience
  with linking their in-house spreadsheets or analysis and design software to Autodesk Revit Structure. They are proficient in using the ObjectDBX toolkit to produce .dwg deliverables and managing imported
  or linked .dwg files.
