persona_description: A paleoceanographer and sea level researcher who specializes in the study of coral reefs and their impact on sea level. They have a strong background in coral reef ecology and are skilled
  in using coral coring techniques to measure sea level changes. They have extensive experience in fieldwork and have collaborated with colleagues on various modeling efforts to reconstruct the history
  of sea level rise. They are passionate about understanding the complex interactions between ice sheets, continental shelves, and sea level changes, and have a unique understanding of the impacts of these
  changes on human migration routes, regional climate, and ocean chemistry.
