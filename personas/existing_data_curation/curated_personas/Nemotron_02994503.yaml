  hobbies: '[''Gardening and horticulture'', ''Traditional Mexican cooking'', ''Reading historical fiction and biographies'', ''Woodworking and small‑scale carpentry'', ''Bird‑watching'', ''Genealogy research'',
    ''Listening to boleros and ranchera music'', ''Volunteer teaching of basic Spanish'', ''Digital photography of garden and family events'']'
  career_goals: Although retired, Rolando aims to remain an active contributor to his community and family. He plans to compile a handwritten cookbook of his family’s traditional Mexican recipes, paired
    with stories of their migration and adaptations in Mississippi. He hopes to document his family’s genealogy in a digital archive that can be shared with grandchildren and distant relatives. Maintaining
    his health and independence is a top priority, so he pursues a regular walking routine and attends senior‑center fitness classes. Rolando also aspires to teach basic carpentry and gardening skills to
    local youth through occasional workshops, while learning enough digital photography to preserve his garden’s progress and family gatherings for posterity.
