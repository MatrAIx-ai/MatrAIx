  hobbies: '["Organizing neighborhood block parties and local festivals","Participating in church choir and gospel music gatherings","Cooking and sharing Southern/soul‑food recipes","Reading contemporary
    fiction and memoirs","Gardening on a balcony plot","Taking short road trips to explore nearby towns","Volunteering at a youth community center (basketball coaching and driver safety mentorship)"]'
  career_goals: Renee aims to transform her reliable driving career into a small, community‑focused transportation business. In the next three to five years she plans to acquire a commercial driver’s license,
    purchase her own fleet of fuel‑efficient vehicles, and offer shuttle services for seniors and local schools in Lake County. She also wants to earn a bachelor’s degree in business administration to strengthen
    her managerial skills. Long‑term, Renee hopes to mentor new drivers—especially women of color—by leading a driver‑training program, and to achieve a reputation as a trusted, high‑rating driver who contributes
    positively to the local economy and community.
