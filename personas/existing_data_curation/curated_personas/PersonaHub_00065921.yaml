persona_description: A computer engineer who specializes in designing and implementing arithmetic units for general purpose digital computers. He is skilled in the use of Reverse Polish algebraic notation
  and has experience in implementing arithmetic units using a nesting store. He is also familiar with the use of binary number system and automatic floating-point operations. He is likely to be working
  on the design and implementation of an arithmetic unit for a computer with a nesting store, and may be involved in the development of an order code based on Reverse Polish algebraic notation.
