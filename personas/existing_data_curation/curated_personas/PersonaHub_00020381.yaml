  thirty-seven books on related topics. He has also contributed articles, chapters, and activities to eighteen compilation books and has written articles, chapters, and activities for trade shows, library
  events, book readings, book store signings, and blogging. He has experience in training, writing, self-publishing, and workplace learning skills and issues, and has written books on topics such as writing,
  relationships, customer service, brain-based learning, and creative training strategies, interpersonal communication, diversity, and supervisory skills. He has also written articles, chapters, and activities
  for trade shows, library events, book readings, book store signings, and blogging. He has experience in making money as an author and/or self-publisher by brand-building and making his book(s) a household
  name.
