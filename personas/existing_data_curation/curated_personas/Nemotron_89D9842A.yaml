  hobbies: '[''Street Art Exploration'', ''Gallery Visits'', ''Art Talk Attendance'', ''Photography'', ''Sketching'', ''Art History Reading'', ''Philosophy Podcasts'', ''Cooking'', ''Mystery Novels'', ''Board
    Games with Small Groups'', ''Volunteering in Community Art Programs'']'
  career_goals: Michael aims to advance into a senior customer service or team lead role within the next two years, seeking certification in Customer Experience Management to deepen his expertise. He aspires
    to mentor new representatives, develop training modules, and eventually transition into a community relations or client success position where he can leverage his compassionate nature to build lasting
    relationships. Additionally, he plans to enroll in part‑time courses on conflict mediation and art outreach to blend his professional growth with his personal passion for the arts.
