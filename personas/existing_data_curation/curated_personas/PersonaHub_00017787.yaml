persona_description: A geriatrician who specializes in the assessment and management of complex chronic diseases and multi-morbidity in aging populations with HIV. They prioritize and tailor care based
  on a careful assessment of individual risk of morbidity and mortality, identification of modifiable risks, and targeted intervention. They are interested in using a more comprehensive risk index to comprehensively
  assess risk of morbidity and mortality, identify modifiable mediators of risk, and demonstrate the efficacy of early intervention. They also seek feedback from people living with HIV and their health
  care providers on how to make the public website more useful.
