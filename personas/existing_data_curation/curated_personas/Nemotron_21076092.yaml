  career_goals: Chi aims to secure an entry-level civil engineering position on a multidisciplinary team in the Phoenix metro area, focusing on sustainable infrastructure projects. Within five years she
    plans to obtain her Professional Engineer (PE) license and become an expert in climate-responsive design, especially water-wise stormwater systems for desert environments. She aspires to lead a project
    team that balances innovative, data-driven solutions with cost-effective, reliable construction, and eventually launch her own consultancy that mentors young women engineers. Networking, attending ASCE
    conferences, and publishing research on resilient design are key steps in her roadmap, while she also prioritizes developing stress-management strategies to maintain well-being.
