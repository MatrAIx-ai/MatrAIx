  hobbies: '[''Hosting community trivia nights'', ''Church choir singing'', ''Spin classes and group fitness'', ''Hiking in local parks'', ''DIY home‑improvement and woodworking'', ''Smart‑home technology
    experimentation'', ''Following Atlanta Falcons and Braves'', ''Cooking Southern comfort food'']'
  career_goals: She aims to advance to a supervisory or lead‑technician role within the next three years, overseeing a production line and driving continuous‑improvement initiatives. Shannon plans to earn
    a certification in industrial maintenance and eventually transition toward a process‑engineering position, where she can apply her curiosity for emerging bonding technologies to develop more efficient,
    environmentally friendly adhesives. Long‑term, she envisions managing a multi‑shift operation and mentoring a team of operators, leveraging her sociable nature and competitive drive to foster high performance.
