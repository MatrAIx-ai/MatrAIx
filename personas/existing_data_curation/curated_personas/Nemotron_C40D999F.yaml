personas:
  professional: Tiffany Mead is an aspiring little architect who builds elaborate cardboard fortresses, channeling their curiosity with practicality by testing structural stability, applying their organized
    yet flexible mindset to each blueprint, and competing with friends to see whose design stands the tallest.
  sports: Tiffany Mead plays on the Little League soccer team, follows the Chicago Cubs during family outings, and practices jump rope at home, preferring structured drills that satisfy their organized
    nature while also enjoying solitary backyard sprints that let them flex their competitive spirit.
  arts: Tiffany Mead immerses themselves in drawing vibrant characters from Disney’s Frozen and Moana, sings along to Pixar soundtracks, and curates a sticker collection of their favorite animated scenes,
    reflecting their curiosity for new ideas and a practical habit of organizing their art supplies by color.
  travel: Tiffany Mead loves weekend trips to the local aquarium and an annual family vacation to Disney World, planning their own itinerary of ride queues and snack stops, balancing their desire for adventure
    with the comfort of familiar routines, and dreaming of someday visiting the Great Barrier Reef.
  culinary: Tiffany Mead favors cheesy pizza, crispy chicken nuggets, and strawberry smoothies, enjoys helping their mom whisk pancake batter, meticulously arranges fruit slices into smiley faces on their
    plate, yet stubbornly refuses broccoli, showcasing their practical taste preferences and competitive habit of finishing their dish first.
  core: Tiffany Mead is a curious, organized, and competitively spirited five‑year‑old who blends practical routines with imaginative play, rarely shaken by challenges, and thrives in small, focused worlds
    where they can explore at their own pace.
background:
  cultural: Tiffany comes from a middle‑class white family in Oyster Bay, a suburban community on Long Island. Her upbringing reflects typical American suburban values, including a focus on early education,
    participation in community activities at the local library and parks, and celebration of national holidays such as Thanksgiving and Independence Day. Her family blends practicality with curiosity, encouraging
    her to ask questions, explore nature, and pursue personal interests while also emphasizing responsibility and polite behavior in small social settings.
