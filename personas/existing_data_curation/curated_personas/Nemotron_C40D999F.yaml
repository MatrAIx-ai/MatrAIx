  career_goals: Tiffany often talks about becoming a veterinarian because she loves animals and enjoys caring for the family dog, envisioning herself using her curiosity and methodical nature to keep pets
    healthy. She also expresses interest in engineering, imagining herself designing new LEGO sets or simple machines, and occasionally mentions wanting to be a teacher to share the books she loves with
    younger children.
