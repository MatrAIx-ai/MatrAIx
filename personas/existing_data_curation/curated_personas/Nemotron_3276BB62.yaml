personas:
  professional: Patricia Koster is an 18‑year‑old first‑line retail supervisor who blends practical store‑operation expertise with a curiosity for emerging sales tech, leading teams with organized schedules
    yet flexible floor‑plans, and balancing assertive conflict resolution with genuine compassion for staff, and they thrive on turning data insights into actionable merchandising tweaks.
  sports: Patricia Koster enjoys hiking the rolling trails of Bucks County and participates in a local yoga studio, while cheering for the Philadelphia Eagles and the Philadelphia Phillies, and they are
    a member of a community running club that meets for weekend 5K runs.
  arts: Patricia Koster indulges in street photography, capturing everyday moments in Warminster, reads contemporary fiction by authors like Sally Rooney, follows indie folk musician Phoebe Bridgers, and
    they often attend the county fair’s art showcase where they admire local painters such as Jane Doe.
  travel: Patricia Koster loves weekend road trips that blend planned visits to historic Philadelphia museums with spontaneous stops at the Pocono Mountains for a hike, and they aim to save for a summer
    backpacking adventure across the Pacific Northwest after completing their business degree.
  culinary: Patricia Koster prefers classic Thanksgiving turkey with cranberry sauce, loves grilling burgers at summer barbecues, experiments with Korean bibimbap and avocado toast on quiet evenings, and
    they are a competent home cook who enjoys chopping fresh basil for pesto pasta.
  core: Patricia Koster balances the practicality of a retail supervisor with a restless curiosity for new ideas, a love for community‑rooted traditions, and a habit of juggling budget apps, yoga mats,
    and a camera on every spare moment, and they often find themselves planning the next store layout while sketching a new boutique concept.
background:
  cultural: Patricia comes from a middle‑class White American family rooted in the suburban Pennsylvanian tradition of hardworking values and community involvement. Raised in Warminster, she was exposed
    to a blend of historic Quaker influences and modern suburban culture, which fostered an appreciation for both tradition and innovation. Her family celebrates seasonal holidays with classic American
    customs—thanksgiving dinner, summer barbecues, and local county fair attendance—while also encouraging curiosity through travel, exposure to diverse ideas, and support for higher education.
