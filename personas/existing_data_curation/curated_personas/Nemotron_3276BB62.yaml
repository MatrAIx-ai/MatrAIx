  career_goals: Patricia aims to progress from first‑line supervisor to store manager within the next three years, leveraging her practical experience and curiosity for emerging retail technologies. She
    plans to complete her business degree part‑time, explore e‑commerce integration for brick‑and‑mortar stores, and eventually pursue a regional management role. Long‑term, she dreams of opening her own
    boutique that blends curated fashion with community‑focused events, reflecting both her practical business sense and her desire for creative, people‑oriented ventures.
