personas:
  professional: Kathryn Armstrong is a budding young programmer who uses Scratch to create simple games, blending curiosity about new ideas with a practical, organized approach while they fiercely compete
    in school coding contests.
  sports: Kathryn Armstrong plays forward for the Covington Youth Soccer Club, cheers on Louisville City FC during away games, and follows the Kentucky Wildcats basketball team, and they balance their competitive
    drive on the field with the strategic thinking honed by chess and board games.
  arts: 'Kathryn Armstrong draws comic strips inspired by Jeff Kinney’s Diary of a Wimpy Kid and Nancy Drew mysteries, listens to Taylor Swift while assembling intricate LEGO models, and they watch Avatar:
    The Last Airbender for storytelling ideas, letting these creative influences shape their leisure time.'
  travel: Kathryn Armstrong loves weekend outings to the Ohio River parks, dreams of exploring the National Museum of Natural History in Washington, D.C., and a summer trip to Disney World, and they plan
    each adventure with a hand‑drawn map and checklist while balancing schoolwork and family budget constraints.
  culinary: Kathryn Armstrong favors classic American comfort foods like macaroni‑and‑cheese, chicken nuggets, and peanut‑butter‑and‑jelly sandwiches, enjoys crafting homemade trail mix with pretzels, raisins,
    and chocolate chips, and experiments with no‑bake desserts, though they occasionally overindulge on sugary snacks after long gaming sessions.
  core: Kathryn Armstrong is a curious, competitive nine‑year‑old who mixes practical organization with imaginative play, sketching LEGO designs or mystery plots while they carefully watch their allowance
    and health.
background:
  cultural: Kathryn is raised in a middle‑class, white family in Covington, Kentucky, within Kenton County. Her family participates in community events such as the local Fall Festival, church youth gatherings,
    and neighborhood block parties, reflecting a blend of Southern hospitality and Midwestern practicality. She attends a public elementary school that emphasizes both academic achievement and extracurricular
    involvement, which shapes her balanced view of tradition and new ideas. Family traditions include holiday celebrations with classic American dishes, school field trips to the Kentucky History Center,
    and weekend outings to nearby parks along the Ohio River. Her cultural upbringing values teamwork, self‑reliance, and curiosity, supporting her pragmatic yet imaginative outlook.
