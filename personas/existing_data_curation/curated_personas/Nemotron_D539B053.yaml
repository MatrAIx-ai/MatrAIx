personas:
  professional: Josefa Alonso, a five‑year‑old kindergarten student who loves lining up alphabet blocks in perfect order, channels their preference for routine and practicality into early math puzzles while
    occasionally stalling on messy art projects due to a relaxed attitude toward obligations.
  sports: Josefa Alonso dabbles in the Tiny Tigers youth soccer club during spring, idolizes the Los Angeles Lakers for their competitive spirit, and prefers structured play on the playground, though they
    sometimes forget to bring a water bottle because they prioritize flexible fun over strict planning.
  arts: Josefa Alonso delights in drawing cartoons of their favorite Disney characters like Mickey Mouse and Elsa, sings along to Pixar movie soundtracks, and spends rainy afternoons with picture books
    by Dr. Seuss, while occasionally neglecting tidy up their art supplies in favor of spontaneous doodling.
  travel: Josefa Alonso enjoys family trips to familiar destinations such as Disneyland and the local beach resort, values the comforting routine of packing the same small suitcase, yet feels anxious about
    new airports, prompting parents to schedule travel with ample downtime and a beloved stuffed bunny for reassurance.
  culinary: Josefa Alonso favors classic kids' meals like chicken nuggets, mac and cheese, and strawberry yogurt, can skillfully spread peanut butter on toast with minimal mess, but often worries about
    trying new vegetables, leading to occasional snack‑time meltdowns when presented with unfamiliar foods.
  core: A routine‑loving five‑year‑old who obsessively lines up toys, worries about every change, yet erupts with fierce competitiveness on the soccer field and occasionally splurges on candy when their
    disciplined savings plan is broken.
background:
  cultural: Josefa is a Mexican‑American growing up in Salinas, California. Her household blends English and Spanish, celebrates Día de los Muertos, Mexican Independence Day, and family gatherings centered
    around traditional foods such as tacos, tamales, and arroz con frijoles. The close‑knit extended family emphasizes respect for elders, community, and cultural pride, shaping her daily routines and values.
