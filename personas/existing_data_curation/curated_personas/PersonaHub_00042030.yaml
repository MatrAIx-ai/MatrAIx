persona_description: An anthropologist who specializes in the study of maritime societies in the Gulf of St. Lawrence during the sixteenth century. Their research interests include the use of seagoing vessels
  by Amerindians, the intersection of maritime and Indigenous histories, and the exploitation and adaptation of the environment around them. They are particularly interested in the use of water for transport
  and the associated worldviews of the communities around the Gulf of St. Lawrence. They have a deep understanding of the role of the Gulf itself in shaping human relationships and the significance of forest
  and fauna to the cosmography of many Amerindian communities.
