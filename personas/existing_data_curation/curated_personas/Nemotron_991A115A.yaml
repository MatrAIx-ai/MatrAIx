  hobbies: '[''Gardening (herbs, vegetables)'', ''Woodworking and model building'', ''Cooking traditional Southeast Asian dishes'', ''Reading historical non-fiction'', ''Solving puzzles (jigsaw, Sudoku,
    crosswords)'', ''Walking nature trails'', ''Tai chi practice'', ''Listening to classical music'']'
  career_goals: Although Quoc is not currently in the formal workforce, his ambition is to translate his strengths into meaningful community contributions. He plans to earn a GED to formalize his education,
    which would open opportunities for volunteer tutoring of adult learners. He also aims to become a coordinator for a local community garden, applying his gardening expertise to support food‑security
    projects. In the longer term, he hopes to serve on the senior advisory board of a neighborhood cultural center, where he can help design structured programs that preserve Southeast Asian heritage and
    promote intergenerational mentorship. All of these goals reflect his desire for purposeful, organized activity while maintaining his preference for low‑key, solitary work environments.
