  career_goals: Yusif aims to progress to a senior systems analyst role and eventually step into an IT solutions architect or director of technology position within the next five years. He plans to obtain
    CBAP and PMP certifications, lead larger digital transformation initiatives, and champion user‑centered system designs that improve operational efficiency. A core ambition is to build a pipeline for
    diverse talent by mentoring underrepresented colleagues and volunteering to teach basic computing skills to youth in his community, aligning his career growth with meaningful social impact.
