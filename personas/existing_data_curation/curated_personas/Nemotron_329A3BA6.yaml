personas:
  professional: A seasoned firefighter and aspiring fire captain, Aidelis Rodriguez leverages fifteen years of incident command, hazardous‑materials expertise, and bilingual communication to lead her crew
    with calm decision‑making, while her curiosity and love of urban murals drive innovative fire‑safety workshops that blend art and community outreach, reflecting her balanced blend of organization and
    creative flexibility.
  sports: A dedicated fitness enthusiast, Aidelis Rodriguez follows the Miami Heat and Dolphins, joins the Everglades Hiking Club for weekend treks, practices yoga three times a week at a local studio,
    and plays casual beach volleyball with colleagues during the summer months.
  arts: An avid muralist and street photographer, Aidelis Rodriguez draws inspiration from Shepard Fairey's bold graphics, studies Vivian Maier's candid frames, reads contemporary fiction by Sally Rooney,
    and finds rhythm in salsa dances to the sounds of Marc Anthony while curating pop‑up art shows in Miami's Wynwood district.
  travel: A curious explorer, Aidelis Rodriguez plans weekend road trips to the Everglades and Key West, cherishes cultural immersion in Cartagena and Oaxaca, and dreams of attending Barcelona's street
    art festivals, balancing meticulous budgeting with spontaneous detours whenever her shift schedule permits.
  culinary: A confident home chef, Aidelis Rodriguez transforms classic arepas into quinoa‑black bean and avocado wraps, reinvents pabellón criollo with plantain chips and a cilantro‑lime drizzle, and perfects
    a citrus‑herb grilled fish served with yucca mash, showcasing her love for bold flavors and inventive twists on family recipes.
  core: A disciplined firefighter at 45, Aidelis Rodriguez balances high‑stress emergency calls with vibrant mural projects, often humming salsa while on the firehouse ladder and secretly obsessing over
    spreadsheet budgets to keep her art supplies funded.
background:
  cultural: Aidelis was born in Venezuela and emigrated to the United States in her early twenties. She remains deeply connected to her Venezuelan heritage through language, family traditions, and cuisine—particularly
    arepas and hallaca—while embracing the multicultural tapestry of Miami. Bilingual in Spanish and English, she participates in Venezuelan community festivals and supports fellow immigrants. Her upbringing
    instilled a strong sense of resilience, community solidarity, and appreciation for art and music, which inform both her professional dedication to public service and her personal creative pursuits.
