    ''Team leadership and mentorship'', ''Stress management and resilience training'']'
  hobbies: '[''Painting (urban murals)'', ''Street photography'', ''Reading contemporary fiction'', ''Salsa and bachata dancing'', ''Cooking Venezuelan cuisine'', ''Hiking in the Everglades'', ''Yoga and
    mindfulness practice'', ''Attending local art exhibitions'', ''Volunteer fire safety education for youth'', ''Exploring Miami’s multicultural neighborhoods'']'
  career_goals: Aidelis aims to advance to a fire captain role, where she can shape department policies on mental‑health support for firefighters and integrate creative community programs that blend fire
    safety with art workshops for at‑risk youth. She plans to earn a paramedic certification to broaden her emergency care capabilities and eventually transition into a fire prevention and education coordinator
    position for Miami‑Dade County. Mentoring the next generation of female firefighters and promoting inclusive leadership are central to her long‑term ambition.
