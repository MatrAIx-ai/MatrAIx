  hobbies: '[''Model engine building'', ''Vintage motorcycle restoration'', ''Fishing'', ''Mexican cooking'', ''Watching professional football'', ''Fitness classes'']'
  career_goals: Looking ahead, Jose aims to step into a supervisory role within the plant, leveraging his reliability and methodical mindset to lead a shift crew. He plans to earn a certified production
    manager credential and pursue a forklift‑operator license to broaden his qualifications. Long‑term, he hopes to open a small machining workshop where he can apply efficiency ideas he’s observed on the
    floor, offering customized parts to local suppliers and generating a stable income for himself and his son.
