personas:
  professional: Jose Madrid is a production floor specialist who excels at operating CNC machines and hydraulic presses, consistently applies OSHA safety standards, and is the go‑to person for troubleshooting
    mechanical glitches, using their methodical mindset to keep the plant’s output on schedule while they quietly mentor a small crew.
  sports: Jose Madrid is a dedicated fan of the Dallas Cowboys, watches every Sunday game and tracks the Dallas Mavericks, while they belong to the Limestone County Fitness Club where they join a weekend
    pick‑up basketball league and occasionally play intramural soccer with the local Limestone Legends.
  arts: Jose Madrid is an avid admirer of classic rock legends like Jimi Hendrix, finds inspiration in the industrial design works of Isamu Noguchi, and they regularly attend the regional museum’s exhibit
    on modern sculpture while occasionally re‑watching the film "The Martian" for its engineering ingenuity.
  travel: Jose Madrid is a meticulous planner who prefers solo road trips that blend fishing at remote lakes and visits to historic machining workshops, having driven the Pacific Coast Highway to explore
    Big Sur and Aspen, and they have a future itinerary to tour the precision engineering museums of Stuttgart, Germany, while keeping travel expenses within a tight budget.
  culinary: Jose Madrid is an intermediate home‑cook who experiments with family recipes such as salsa verde made from tomatillos, roasted chilies, and cilantro, and they regularly prepare tamales using
    masa, pork, and epazote, while they also enjoy grilling steak seasoned with coarse sea salt and cracked pepper.
  core: Jose Madrid is a methodical, solitary tinkerer who balances a competitive edge with a practical outlook, obsessively perfects model engines on weekends, and never misses a Friday night football
    game despite a tendency to procrastinate on paperwork.
background:
  cultural: Jose’s Mexican heritage is a steady undercurrent in his life. He grew up in a bilingual household where Spanish was spoken at home and English at school. Family gatherings centered around food,
    music, and celebrations like Día de los Muertos and Cinco de Mayo, fostering a deep appreciation for Mexican culinary traditions and folklore. Though he left school early, the cultural emphasis on hard
    work and resilience shaped his practical outlook. Living in Hewitt, Texas, he balances his Mexican roots with the local Texan work culture, often participating in community events that blend both identities.
attributes:
  skills: '[''CNC machine operation'', ''Hydraulic press operation'', ''Mechanical troubleshooting'', ''Quality inspection'', ''Safety compliance (OSHA)'', ''Inventory management'', ''Production tracking
