  career_goals: Nancy envisions a future where she can blend her love for art, people, and community. She aspires to become an elementary school teacher who incorporates creative arts into lessons, or a
    community arts coordinator who designs inclusive programs for kids. She also feels drawn to environmental advocacy, hoping to work on projects that protect the Pacific Northwest’s natural beauty while
    engaging peers through creative outreach.
