personas:
  professional: A budding visual storyteller and junior coder, Nancy Pace blends cartoon sketching with Scratch game design, channeling their curiosity and love for improv into a small portfolio of animated
    shorts that they enthusiastically share during school assemblies.
  sports: Nancy Pace fuels their love for the outdoors by hiking the nearby Willow Creek Trail, joining the school’s beginner cross‑country team, cheering on the local baseball club the River Rats, and
    they practice yoga stretches before bedtime to stay limber for drama rehearsals.
  arts: Nancy Pace's creative world spins around watercolor washes inspired by Mary Blair, cartoon sketches echoing the style of Dr. Seuss, ukulele jams of Jason Mraz songs, and weekly visits to the community
    theater to watch performances by the local kids' troupe, all of which shape their vivid imagination, and they frequently experiment with merging mediums.
  travel: Nancy Pace dreams of weekend camping trips to the Great Smoky Mountains, a school field trip to the Smithsonian National Air and Space Museum, and a future family vacation to Kyoto's bamboo forests,
    and they plan each adventure with doodles and sticky‑note itineraries.
  culinary: Nancy Pace enjoys crafting bright fruit smoothies with mango, strawberries, and coconut water, whipping up simple leaf‑wrapped cheese quesadillas after nature walks, and practicing basic knife
    skills to dice carrots for a family stir‑fry, though they often sneak extra chocolate chips into the batter when no one’s looking.
  core: Nancy Pace is a curiosity‑driven, talkative 11‑year‑old who fuses art, coding, and community service into a lively, occasionally messy routine that they keep both friends and teachers on their toes.
background:
  cultural: Nancy grew up in Sedro Woolley, a small town in Whatcom County, Washington, within a predominantly white, middle‑class American family. Her upbringing reflects the Pacific Northwest’s emphasis
    on outdoor recreation, environmental stewardship, and community involvement. Family traditions include celebrating holidays such as Thanksgiving and Christmas, weekend trips to the Skagit Valley and
    coastal shoreline, and participation in local fairs and school events. The supportive community atmosphere and appreciation for the region’s natural beauty have shaped Nancy’s values of cooperation,
    curiosity, and a love for creative expression.
