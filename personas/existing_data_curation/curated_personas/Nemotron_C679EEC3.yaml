  career_goals: Although retired from the formal workforce, Jose aims to channel his expertise into community service. He aspires to become a regular mentor for high‑school students in local STEM outreach
    programs, helping them navigate college pathways. He also hopes to join the advisory board of a nonprofit that promotes scientific education for Latino youth in Southern Nevada. On a personal level,
    he plans to complete an online certification in data visualization to keep his analytical skills sharp and to document his life story in a memoir that blends technical insight with cultural heritage.
