personas:
  professional: Tania Calderin is an aspiring concept artist who channels their love of fantasy and sci‑fi novels into hand‑drawn Colorado mountain sketches and free‑software digital collages, blending
    curious world‑building with practical use of simple tools while keeping a relaxed, sometimes disorganized schedule.
  sports: Tania Calderin prefers solitary trail hiking over team sports, regularly exploring Lookout Mountain and the nearby Rocky Mountain foothills, yet they cheer for the Colorado Avalanche and join
    the local youth hiking club on weekends for occasional group outings.
  arts: Tania Calderin’s artistic world blends hand‑drawn mountain landscapes inspired by Albert Bierstadt with digital collage experiments that echo the surreal compositions of Eva & Franco, while their
    playlists of Bad Bunny, J Balvin, and classic Salvadoran folk singer Francisco Palaviccini fuel their creative flow, and they occasionally practice traditional dance steps at family gatherings.
  travel: Tania Calderin gravitates toward low‑key, flexible travel, having hiked the trails of Rocky Mountain National Park and dreamed of trekking the Inca Trail to Machu Picchu, with a wishlist that
    includes Iceland’s geothermal lagoons for quiet contemplation, yet careful budgeting keeps most trips local and weekend‑focused.
  culinary: Tania Calderin enjoys the tactile process of making pupusas and tamales with corn masa, cheese, pork, and roasted chilies alongside family, while also experimenting with homemade cilantro‑lime
    salsa and occasionally trying to perfect a quinoa‑stuffed bell pepper, though they sometimes forget to clean up the kitchen promptly.
  core: Tania Calderin is a quietly curious teen who balances solo mountain sketching, digital world‑building, and heartfelt cooking with a laid‑back, kind‑hearted approach to obligations.
background:
  cultural: Tania grows up in a Salvadoran household in Carbondale, Colorado, where Spanish is spoken daily and family traditions from El Salvador are woven into her life. She celebrates holidays such as
    Independence Day (September 15) and participates in local church events, preserving the Catholic faith common in many Salvadoran families. Her parents and grandparents maintain strong ties to their
    community in San Salvador, passing down recipes like pupusas and stories of coastal culture. Living in a predominantly white, rural mountain community, Tania often navigates a bicultural identity, drawing
    on her heritage’s emphasis on family solidarity and community support while integrating the outdoors‑oriented values of her Colorado environment.
