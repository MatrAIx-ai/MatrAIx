  career_goals: Tania aims to complete high school or obtain a GED, then pursue further education in environmental science or community health—fields that combine her curiosity about nature with her desire
    to help others. She dreams of a flexible career such as a park ranger assistant or a community outreach coordinator, where she can apply her practical problem‑solving skills and cultural insight. In
    the short term, she plans to earn a part‑time first aid certification, volunteer with local conservation projects, and develop a portfolio of nature sketches that could support future study applications.
