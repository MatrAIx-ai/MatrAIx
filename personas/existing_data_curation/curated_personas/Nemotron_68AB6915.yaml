  hobbies: '[''Cooking Mexican cuisine'', ''Watching Liga MX soccer'', ''Listening to mariachi music'', ''Sketching and watercolor painting'', ''Reading contemporary Latin American literature'', ''Hiking
    Sonoran desert trails'', ''Volunteering at community cultural events'', ''Teaching Spanish to children'']'
  career_goals: Jorge aims to move from a front-line cashier to a supervisory role within the next two years, targeting a shift-lead position where he can apply his organizational strengths and competitive
    drive to exceed sales targets. He plans to complete a certification in retail management and eventually become a store manager, focusing on bilingual markets and community outreach. Long-term, he dreams
    of launching a small Mexican-style bakery or food-stall that blends his culinary hobby with his cultural heritage, allowing him to be his own boss while preserving family recipes.
