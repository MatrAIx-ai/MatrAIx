  career_goals: David dreams of a future where he can help people and work within clear, structured routines. He is fascinated by the idea of becoming a firefighter because he likes the disciplined training,
    teamwork, and immediate impact of rescuing others. At the same time, his competitive streak fuels a wish to become a professional baseball player, where he can test his skills against others and enjoy
    the excitement of the game. He also imagines a role as a police officer or detective, appreciating the problem‑solving and critical thinking that come with investigating mysteries.
