persona_description: Adedipo Olagbegi, a computer programming expert and ICT consultant who believes in the importance of incorporating computer programming in the primary and secondary school curricula
  to boost ICT knowledge among Nigerians. He advocates for the Nigerian school curriculum to be reviewed and for programming to be taught at the primary and secondary school levels. Olagbegi also calls
  for more initiatives like the "Code Lagos Initiative" to make coding education accessible to every student.
