  hobbies: '["Watercolor and acrylic painting (abstract)", "Sketching and drawing", "Reading art history and philosophy", "Collecting vintage paint cans and color swatches", "Gardening (herb garden)", "Walking
    and photographing natural textures along the Raritan River", "Jigsaw puzzles and crosswords", "Volunteer art workshops for seniors", "Visiting local art galleries and exhibitions", "DIY home improvement
    projects"]'
  career_goals: Olessia aims to solidify her reputation as a master painter and paperhanger in her community, focusing on high‑end decorative finishes that merge her artistic curiosity with her technical
    skill. In the next few years she plans to obtain a certified master painter designation from the Painting and Decorating Contractors of America, allowing her to offer consulting for historic‑preservation
    projects. She also hopes to launch a small boutique service, “Artful Walls,” providing custom murals and personalized color design for residential clients. Mentoring younger apprentices is a priority;
    she intends to lead weekend workshops at the local community center to share her methodical techniques and calm work ethic. Ultimately, she envisions a semi‑retirement where she balances a steady stream
    of select commissions with personal artistic painting for local exhibitions.
