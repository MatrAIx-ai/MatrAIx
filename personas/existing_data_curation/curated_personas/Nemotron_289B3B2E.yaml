  career_goals: Maria aims to transition into a senior leadership role within the next five years, such as Director of Operations or Chief Management Analyst, where she can shape enterprise‑wide efficiency
    initiatives. She plans to earn a Six Sigma Black Belt and a PMP certification to solidify her expertise in process excellence. Maria also aspires to mentor emerging analysts, champion data‑driven culture
    across the organization, and eventually launch a consultancy focused on operational improvement for midsize firms in the Midwest, while advocating for mental‑health support programs within corporate
    environments.
