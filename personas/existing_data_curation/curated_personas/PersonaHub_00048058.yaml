persona_description: A legal scholar who specializes in the study of the development and evolution of civil law in Lithuania, particularly focusing on the changes that occurred after the adoption of the
  new Civil Code in 2000. The scholar is interested in the role of Roman Law in the legal system of Lithuania and its indirect influence on the development of the Lithuanian civil law. The scholar also
  has knowledge of the historical context and the continuity of the legal tradition in Lithuania.
