personas:
  professional: Shakeisha Saleh is a seasoned community event coordinator who combines meticulous budgeting, practical problem‑solving, and a calm assertiveness to organize church choir performances, local
    festivals, and volunteer food‑bank drives, and they often juggle the anxiety of balancing new culinary studies with family responsibilities.
  sports: Shakeisha Saleh is a devoted fan of the Arkansas Razorbacks football team and the Memphis Grizzlies, joins a weekend walking club at the local park, and they occasionally play community softball,
    balancing competitive spirit with a preference for low‑impact exercise.
  arts: Shakeisha Saleh sings in their church choir, cherishes the soulful sounds of Aretha Franklin and Mahalia Jackson, reads historical fiction by Hilary Mantel and Ken Follett, and they stitch quilts
    inspired by vintage patterns while occasionally selling handcrafted pieces at local art fairs.
  travel: Shakeisha Saleh enjoys weekend road trips to New Orleans for its jazz heritage, culinary tours in Savannah, and family reunions in Asheville, and they plan each journey with detailed budget spreadsheets
    yet often get sidetracked by spontaneous stops at roadside craft markets.
  culinary: Shakeisha Saleh experiments with Southern comfort classics like fried chicken, collard greens seasoned with garden‑grown thyme, and sweet potato biscuits, adapting family recipes with a pinch
    of cayenne and a dash of nostalgia, and they sometimes sneak a slice of pecan pie before guests arrive.
  core: Shakeisha Saleh is a diligent community pillar who blends meticulous budgeting, a love of genealogy, and late‑night recipe tinkering, all while battling a tendency to over‑worry and a habit of hoarding
    craft supplies for future projects, and they often find themselves staying up scrolling through family trees.
background:
  cultural: Shakeisha is a Black woman raised in the Southern United States, with deep ties to the African‑American community of North Little Rock, Arkansas. Her upbringing was steeped in church traditions,
    family gatherings, and the rich culinary heritage of Southern soul food. The legacy of the Great Migration and local civil‑rights history influence her sense of identity and community responsibility.
    She values storytelling, music, and the intergenerational transmission of recipes and crafts. This cultural backdrop shapes her approach to food, community service, and the importance she places on
    preserving family history while navigating contemporary challenges.
