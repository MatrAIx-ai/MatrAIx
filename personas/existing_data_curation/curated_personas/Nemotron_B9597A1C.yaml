  career_goals: Shakeisha aspires to transform her culinary passion into a modest home‑based catering business that specializes in Southern comfort food, providing an additional income stream for her family.
    She is considering enrolling in a local community college program for culinary arts or small‑business management, despite feeling some anxiety about balancing studies with her caregiving responsibilities.
    Parallel to this, she hopes to take on a formal volunteer role as a community outreach coordinator for a nonprofit serving low‑income families, eventually mentoring teen mothers. Her overarching ambition
    is to achieve financial stability while continuing to give back to the North Little Rock community, all the while managing the stress that comes with new challenges.
