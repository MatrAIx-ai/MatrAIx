  hobbies: '[''Hiking'', ''Ukulele playing'', ''Fusion cooking (Vietnamese‑Hawaiian)'', ''Visiting art galleries'', ''Participating in drum circles'', ''Volunteering for STEM‑for‑Kids workshops'', ''Attending
    local festivals'', ''Open‑mic nights'']'
  career_goals: She aims to transition into a senior technologist role where she can spearhead sustainable product development, particularly integrating solar and energy‑efficient solutions for island industries.
    Over the next five years, she plans to obtain a PMP certification, lead a multidisciplinary R&D team, and establish a mentorship program for women and underrepresented minorities in engineering within
    Hawaii. Ultimately, she aspires to launch a boutique consulting firm that merges engineering expertise with community‑focused design.
