persona_description: A historian or legal scholar who is interested in the development of legal systems and the role of law in society. They are familiar with the ideas and concepts of the English Restoration
  period and the history of the Rule of Law in Anglo-American jurisprudence. They have a keen interest in the life and work of Samuel Rutherford, a Scottish Puritan minister who defended the doctrine of
  grace and limited government, and their knowledge of Rutherford's ideas and legacy is extensive. They are also knowledgeable about the historical context of the English Restoration and the struggle between
  the British Parliament and the king for power, and how these events influenced the development of legal systems in the English-speaking world.
