persona_description: A healthcare professional or public health expert focused on preventing mother-to-child transmission of HIV and developing effective interventions to prevent it. This person is highly
  knowledgeable about the transmission dynamics of HIV, the impact of antiretroviral drugs on prevention, and the challenges of implementing safe and effective interventions in resource-limited settings.
  They are actively engaged in research and development of new strategies to prevent MTCT of HIV and are committed to making these interventions widely applicable and affordable in developing countries.
