  career_goals: Carlos aims to complete his GED within the next two years and then enroll in an associate's program in engineering technology, with the long-term ambition of becoming a civil engineer or
    agricultural equipment specialist who designs sustainable infrastructure for rural Montana. He also hopes to combine his leadership skills and love of technology by eventually directing a youth robotics
    or DIY makerspace program that encourages other teens to explore practical engineering projects. His competitive drive pushes him to excel academically and to seek leadership positions, such as captain
    of his school's robotics team or project manager for community improvement initiatives.
