  hobbies: '[''Traditional Mexican Cooking'', ''Hosting Community Potlucks'', ''Gardening'', ''Volunteer Work at Senior Center'', ''Church Choir'', ''Attending Cultural Festivals'', ''Reading Romance Novels'',
    ''Watching Telenovelas'', ''Yoga for Stress Relief'']'
  career_goals: Ana hopes to re‑enter the workforce in a part‑time or volunteer capacity that allows her to support Spanish‑speaking families and children within her community. She aims to obtain a certification
    in school counseling or community education coordination, with the long‑term goal of leading after‑school programs that provide academic tutoring, cultural enrichment, and emotional support. Her ambition
    is to create a stable, routine‑focused role that blends her practical teaching skills with her desire to foster harmony and compassion among families.
