  hobbies: '[''Visiting art galleries and local murals'', ''Attending jazz and gospel concerts'', ''Participating in church choir'', ''Gardening'', ''Cooking Southern cuisine with modern twists'', ''Playing
    bridge and cards at senior center'', ''Genealogy research'', ''Photography walks in historic neighborhoods'', ''Traveling to cultural festivals and historic sites'', ''Reading biographies and civil-rights
    history'']'
  career_goals: Aziz aims to remain an active contributor to his community while continuing his lifelong learning. He intends to volunteer as a docent at the Greensboro Cultural Center, sharing his knowledge
    of local African-American history with visitors. He also plans to mentor high-school students through a senior-youth partnership program, helping them develop practical skills and confidence. Aziz is
    working on a memoir that captures his experiences of the civil-rights era and the evolution of Greensboro's cultural landscape. He hopes to enroll in a community-college art history course, experiment
    with watercolor painting, and improve his digital photography skills to document neighborhood stories. Travel to historic sites such as the National Civil Rights Museum in Memphis and Harlem Renaissance
    landmarks are among his travel aspirations. Ultimately, Aziz wants to leave a lasting, positive impact on the next generation and ensure his cultural heritage is celebrated.
