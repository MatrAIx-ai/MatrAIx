persona_description: A German national railway, Deutsche Bahn, which fears potential lawsuits from Holocaust survivors in American courts. The company has hired a New York law firm and a public relations
  agency to prepare for the possibility of such lawsuits. The proposed Holocaust Rail Justice Act would allow survivors who were transported by the French national railway, SNCF, to Nazi death camps during
  the German occupation of France to sue in American courts. Deutsche Bahn is also concerned about claims for damages from Holocaust survivors on several occasions.
