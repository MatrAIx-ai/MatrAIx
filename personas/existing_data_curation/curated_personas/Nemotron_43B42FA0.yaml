personas:
  professional: Krenar Lee, a seasoned metal fabricator with three decades of hands‑on welding, CNC operation, and blueprint reading, channels their curiosity and sociable nature into mentoring apprentices
    and spearheading small‑scale projects, while eyeing a supervisory role that blends technical leadership with the creation of custom metal art for the Harbor Springs community.
  sports: Krenar Lee, an enthusiastic community‑center basketball player and avid kayaker, roots for the Detroit Pistons and the Michigan‑based Grand Rapids Griffins, joins a local recreational basketball
    league every Thursday, paddles the inland waters of Lake Michigan on weekend mornings, and hikes the Sleeping Bear Dunes during summer, balancing team camaraderie with solo outdoor pursuits.
  arts: Krenar Lee, a hands‑on artist who melds metalwork with painting, draws inspiration from Anish Kapoor’s large‑scale sculptures and Georgia O’Keeffe’s lake‑side vistas, strums acoustic renditions
    of Bob Dylan and Joni Mitchell at Harbor Springs cafés, and volunteers to curate the annual Harbor Springs Art Fest, where they showcase custom bronze‑and‑wood pieces alongside local painters.
  travel: Krenar Lee prefers road trips that blend nature and craftsmanship, having explored Door County’s lighthouses, spent a weekend on Mackinac Island’s horse‑drawn carriage tours, hiked the Porcupine Mountains
    in Upper Peninsula, and dreams of a summer sailing adventure through Norway’s fjords to compare lake‑based cultures.
  culinary: Krenar Lee loves the taste of freshly caught perch and whitefish, often grilling the catch with lemon‑herb butter, pairing it with a side of smoked cheddar‑filled pierogies, and savoring hearty
    Midwestern staples like chicken‑pot pie, while occasionally indulging in craft IPA’s after a late‑night jam session.
  core: Krenar Lee is a curiosity‑driven metal artisan and community‑minded mentor who balances a laid‑back, sometimes disorganized lifestyle with a fierce love for art, music, and the Great Lakes outdoors.
background:
  cultural: Krenar grew up in a small Upper Midwest town with German‑Scandinavian roots, shaped by the region’s emphasis on hard work, self‑reliance, and close‑knit community values. The lake‑side lifestyle,
    seasonal festivals, and a strong tradition of folk art have influenced his appreciation for both practical craftsmanship and creative expression. His upbringing in a predominantly white, rural community
    fostered a respect for collaborative effort, modesty, and a willingness to explore new ideas while maintaining a flexible, easy‑going approach to life.
attributes:
  skills: '[''Welding (MIG, TIG)'', ''CNC machining'', ''Blueprint reading'', ''Metal fabrication'', ''Equipment maintenance'', ''Quality control'', ''Problem solving'', ''Team mentoring'', ''Basic CAD
