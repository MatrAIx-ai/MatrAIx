  hobbies: '[''Metal sculpture creation'', ''Woodworking'', ''Landscape painting'', ''Acoustic guitar'', ''Kayaking'', ''Hiking'', ''Fishing'', ''Community theater volunteering'', ''Basketball'', ''Mentoring
    apprentices'']'
  career_goals: Krenar aims to move from a purely hands‑on assembler role to a supervisory position where he can lead small‑scale projects and mentor younger workers. He is also exploring the launch of
    a side business that creates custom metal art pieces for local homes and businesses, blending his technical expertise with his artistic curiosity. To support these ambitions, he plans to earn a journeyman
    welder certification, take an introductory CAD course, and network through Harbor Springs' community art events. Ultimately, he hopes to be recognized both as a dependable production leader and a contributor
    to the local creative scene.
