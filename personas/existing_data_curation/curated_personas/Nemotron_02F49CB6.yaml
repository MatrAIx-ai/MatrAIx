  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Reading speculative fiction and magical realism'', ''Poetry writing'', ''Cooking Mexican dishes'', ''Attending small book/poetry groups'', ''Mindfulness
    meditation'', ''Photography of everyday objects'', ''DIY collage and mixed‑media crafts'']'
  career_goals: Astrid hopes to transform her passion for art and cultural expression into a sustainable freelance career. Her short‑term goal is to build an online portfolio and modest Etsy shop selling
    original prints, postcards, and handcrafted recipe cards that weave Mexican motifs with contemporary abstract designs. She plans to enroll in a community college associate program in visual arts to
    formalize her abilities and eventually open a small community art space in Fort Bend County—a refuge where Mexican‑American youth and other residents can explore art, mental‑wellness practices, and
    cultural heritage together. Long‑term, she envisions being recognized as an interdisciplinary artist whose work fosters dialogue, healing, and cultural pride.
