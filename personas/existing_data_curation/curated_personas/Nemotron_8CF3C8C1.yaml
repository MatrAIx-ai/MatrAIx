personas:
  professional: Katie Medina is an aspiring teen comic artist who melds watercolor techniques with Python‑driven simple games, channeling her boundless imagination into daily doodles while struggling with
    keeping deadlines and a messy sketchbook.
  sports: Katie Medina is a member of the Frankfort youth soccer league and a dedicated fan of the Cleveland Browns, cheering them during Sunday games while also joining seasonal cross‑country runs organized
    by her school, though she prefers the camaraderie of the field to the rigidity of structured drills.
  arts: Katie Medina draws inspiration from graphic novelists like Noelle Stevenson and the whimsical animation of Studio Ghibli, regularly sketching elaborate fantasy characters, painting watercolors of
    woodland textures, and performing improv comedy with her school club, while secretly binge‑watching anime for story ideas.
  travel: Katie Medina loves spontaneous family road trips to nearby Hocking Hills and occasional weekend visits to the county fair, while dreaming of a future backpacking adventure through the Scottish
    Highlands to sketch ancient castles, balancing her travel wishes with budget constraints and school homework.
  culinary: Katie Medina enjoys crafting buttery corn muffins, devouring homemade apple pie slices, and blending fresh berries from the woods into smoothies, yet her cooking skill hovers at enthusiastic
    beginner level, often burning the edges of her experimental macaroni art dishes.
  core: Katie Medina is a creatively restless 13‑year‑old who weaves art, code, and nature into a vivid personal tapestry, battling deadline chaos and modest budget limits with equal parts imagination and
    occasional procrastination.
background:
  cultural: Katie grew up in a white, middle‑class family in Frankfort, Ohio, a small town that values community, family gatherings, and outdoor activities. Her upbringing reflects Midwestern cultural traits
    such as modesty, a strong work ethic, appreciation for nature, and participation in local events like the county fair and school sports. She is exposed to typical American popular culture through books,
    animation, and video games, while also experiencing the close‑knit community spirit of rural Ohio that encourages volunteerism and togetherness.
