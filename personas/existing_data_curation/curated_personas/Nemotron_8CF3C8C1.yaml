    club'', ''church choir'']'
  career_goals: She dreams of turning her imagination into a career, aiming to become a concept artist or storyboard illustrator for video games or animated films. She also envisions writing fantasy or
    sci‑fi novels and exploring interactive storytelling through game design. In the near future, she hopes to join a specialized high‑school arts program, develop a strong portfolio, and eventually study
    visual arts, game development, or multimedia production at college, where she can blend art and technology.
