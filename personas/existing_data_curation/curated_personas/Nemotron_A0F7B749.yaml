  career_goals: Even at five, Dewayne is drawn to careers that promise clear rules, predictable routines, and the chance to help keep things in order. He often says he wants to become a firefighter or a
    police officer because those jobs involve protecting the community, following structured protocols, and having a sense of purpose. He also shows interest in someday being an architect or engineer, imagining
    himself designing buildings where every part fits precisely, reflecting his love for organization and predictability.
