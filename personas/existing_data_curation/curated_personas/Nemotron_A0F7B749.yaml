personas:
  professional: Dewayne Sepulvado, an aspiring mini-engineer, spends kindergarten recess meticulously assembling LEGO structures according to step-by-step guides, showcasing their natural knack for organization,
    methodical problem-solving, and a quiet confidence that shines when they share their creations with classmates.
  sports: Dewayne Sepulvado, a member of the Little Strikers youth soccer club, practices defensive drills with the same precision they use when sorting toys, cheers for the City Chargers on game days,
    and insists on a post-practice cool-down stretch to keep their nervous energy in check.
  arts: Dewayne Sepulvado, a budding illustrator, loves drawing Dr. Seuss-style characters while humming The Wiggles, collects stickers of Toy Story heroes, and carefully organizes a tiny gallery of their
    artwork on the bedroom wall, mirroring their methodical and organized nature.
  travel: Dewayne Sepulvado, an inquisitive traveler, enjoys weekend trips to the local aquarium where they follow a checklist of sea creatures, dreams of visiting Disneyland and the Eiffel Tower, and always
    packs a spare dinosaur backpack to maintain a sense of security and structure on new adventures.
  culinary: Dewayne Sepulvado, a selective eater, delights in creamy mac and cheese, crispy chicken nuggets, and apple slices with peanut butter, but will reluctantly try new foods like mild hummus if promised
    an extra story at bedtime, reflecting both a preference for familiar flavors and an occasional willingness to step outside comfort zones.
  core: Dewayne Sepulvado’s world revolves around tidy LEGO towers, carefully logged allowance, and bedtime stories rehearsed to perfection, yet a lingering worry about changes makes them cling to a favorite
    stuffed rabbit whenever the routine shifts.
background:
  cultural: 'Dewayne grows up in a typical suburban Midwestern setting in Palatine, Illinois, a community known for its family‑oriented values, public parks, and strong school system. His household reflects
    the cultural norms of many white middle‑class families in the area: regular participation in community events, seasonal celebrations like Fourth of July fireworks and Halloween trunk‑or‑treat, and attendance
    at a local church where values of responsibility and community service are emphasized. The cultural environment encourages respect for routine, punctuality, and polite social interaction, all of which
    align with Dewayne''s developing personality.'
