persona_description: A school psychologist who works with displaced persons, refugees, and asylum-seekers, advocating for their rights and advocating for local, state, and national policies that keep families
  together and enable children to remain in a culturally responsive, supportive, and safe environment. They are knowledgeable about the role of school psychologists in supporting trauma-sensitive schools
  and are familiar with relevant policy recommendations and ESSA opportunities to advance access to comprehensive school mental and behavioral health services. They are also skilled in promoting non-discriminatory
  practices and empowering students, families, and communities.
