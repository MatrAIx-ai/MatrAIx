  hobbies: '[''Reading historical fiction and classic literature'', ''Daily journaling for emotional processing'', ''Sketching local landscapes'', ''Playing piano'', ''Solving Sudoku and logic puzzles'',
    ''Learning basic Python programming'', ''Volunteering at the Chicopee animal shelter'']'
  career_goals: Polly aims to pursue a career that merges her methodical, structured mindset with her compassionate desire to help others cope with emotional distress. She plans to study psychology in college,
    focusing on child and adolescent mental health, with the ultimate goal of becoming a licensed clinical psychologist who provides a calm, predictable therapeutic environment for teenagers. In the short
    term, she intends to enroll in advanced science and social studies courses, participate in school science fairs to sharpen her research abilities, and volunteer at the local animal shelter to gain experience
    in caring for vulnerable individuals. As a backup option, she also considers a data‑analysis role in a research setting, where her attention to detail and analytical strengths would be valuable.
