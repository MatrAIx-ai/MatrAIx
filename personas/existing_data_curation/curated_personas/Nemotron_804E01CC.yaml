personas:
  professional: Polly Dollar, a detail‑oriented 14‑year‑old aspiring software developer, leverages their love of puzzles and disciplined journaling to craft small Python scripts, tutor classmates in logical
    reasoning, and maintain a rigorous piano practice schedule that mirrors a future career in data analysis, and they often set weekly goals to stay on track.
  sports: Polly Dollar favors solitary, schedule‑driven exercise, participating in early morning cross‑country runs with Springfield High, swimming laps at the local pool, and quietly supporting the Chicopee
    Wildcats baseball team from the bleachers on game days, and they find the predictable routine soothing.
  arts: Polly Dollar dives into classic literature such as Jane Austen's Pride and Prejudice and Leo Tolstoy's War and Peace, sketches tranquil reservoir landscapes in watercolor inspired by Monet, and
    finds solace playing Bach's Inventions on piano, while also enjoying modern minimalist composer Ludovico Einaudi, and they often reflect on themes of order in their art.
  travel: Polly Dollar plans trips with precise checklists, opting for low‑stimulus weekend getaways to New England spots like Rockport for lighthouse walks, and dreams of a carefully mapped solo backpacking
    route through historic Boston neighborhoods, balancing curiosity with a need for predictability, and they always pack a reusable notebook to record observations.
  culinary: Polly Dollar prefers comforting, well‑structured meals like homemade chicken noodle soup, meticulously baked apple crumble, and occasionally attempts precise dishes such as a baked soufflé,
    avoiding overly spicy foods that could upset their sensitive stomach, and they enjoy measuring ingredients with a digital scale to maintain exactness.
  core: Polly Dollar is a methodical 14‑year‑old who channels anxiety into structured hobbies, balances solitary study with cautious community service, and occasionally lets perfectionism turn into procrastination,
    and they habitually check off tasks on a to‑do list before bedtime.
background:
  cultural: Polly was raised in a predominantly white, middle‑class New England household in Chicopee, Massachusetts. Her family’s cultural values place a strong emphasis on self‑reliance, academic achievement,
    and community responsibility, while also respecting personal privacy and quiet personal space. The town’s blend of industrial history and access to the surrounding rural New England countryside has
    fostered her appreciation for orderly environments and reflective activities. Regular visits to the Chicopee Public Library and participation in community programs have nurtured her love of reading,
    learning, and structured volunteer work, shaping a cultural background that balances individual independence with a sense of civic duty.
attributes:
