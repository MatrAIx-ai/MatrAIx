persona_description: A landscape ecologist who specializes in the study of urban ecology, particularly the impact of urbanization on bird species distribution and conservation. She has conducted research
  on the effects of suburban management practices such as street tree planting and boundary design on the spatial distribution of birds in suburbs and adjacent reserves. Her research interests include the
  conservation of urban bird species and the management of suburban landscapes for improved bird conservation.
