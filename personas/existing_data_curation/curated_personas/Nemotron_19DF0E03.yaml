  hobbies: '["Beach volleyball", "Salsa dancing", "Hiking in Torrey Pines", "Attending local tech meetups", "Board game nights with friends", "Competitive online gaming (MOBA/Strategy)", "Weekend road trips
    along the Pacific Coast", "Cooking experimental meals with spouse", "Yoga and meditation for stress relief", "Participating in hackathons"]'
  career_goals: Elif aims to transition into a lead engineering role where she can shape product direction while still coding. She plans to earn a Scrum Master certification and eventually pursue an MBA
    to blend her technical and business expertise. Her ambition includes leading a high‑performing development team, driving innovative features that meet market needs, and possibly co‑founding a SaaS startup
    that solves a niche business problem. She is also focused on improving her time‑management skills to meet deadlines without sacrificing her creative spontaneity, and she aspires to be recognized internally
    for both technical excellence and strategic contributions.
