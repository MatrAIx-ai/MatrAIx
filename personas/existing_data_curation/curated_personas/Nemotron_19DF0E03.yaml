personas:
  professional: Elif Reid is a full‑stack software developer who blends a security‑first mindset with Agile Scrum expertise, turning business requirements into polished React/Node.js applications while
    mentoring teammates, yet often wrestles with deadline rigidity due to a love of spontaneous problem‑solving.
  sports: Elif Reid plays beach volleyball with the San Diego Beach Volleyball Club, dances salsa at local Latin night events, hikes the Torrey Pines trails every Saturday, and roots for the San Diego Padres
    while also following the San Diego Wave FC, combining competitive team spirit with community‑based fitness.
  arts: Elif Reid immerses themselves in the arts by dancing to Marc Anthony and Celia Cruz at salsa socials, streaming indie rock from Tame Impala, attending live shows at the House of Blues, and hosting
    board‑game nights featuring Catan and Terraforming Mars, all of which fuel their creative spark.
  travel: Elif Reid plans spontaneous weekend road trips along the Pacific Coast Highway, often stopping at Big Sur, Santa Barbara, and the vineyards of Paso Robles, while dreaming of backpacking through
    Iceland’s waterfalls and exploring Japan’s cherry‑blossom festivals when budget allows.
  culinary: Elif Reid experiments in the kitchen with dishes like seafood paella, Korean bibimbap with gochujang, and homemade chicken tikka masala, relishing ingredients such as saffron, kimchi, and chipotle,
    and proudly hosts dinner parties where friends sample their latest culinary trial.
  core: Elif Reid is a competitive, community‑driven full‑stack dev who balances a security‑focused code ethic with a penchant for spontaneous adventures, occasional deadline drift, and a never‑ending quest
    for the perfect salsa step and weekend road‑trip playlist.
background:
  cultural: Elif is a White American with mixed German and Irish ancestry, raised in a suburban California environment that emphasized independence, practicality, and a strong work ethic. Her family celebrates
    typical American holidays—Thanksgiving, Christmas, Fourth of July—while also honoring her European roots with occasional St. Patrick's Day gatherings and Oktoberfest-inspired festivities. Growing up
    in a culturally diverse state, she values both individual achievement and community involvement, which informs her competitive yet collaborative approach. Living in San Diego, she embraces the coastal
    lifestyle, outdoor recreation, and the region's multicultural food scene, blending her heritage with the vibrant local culture.
attributes:
  skills: '["Full‑stack web development (JavaScript, React, Node.js)", "Python scripting and automation", "Agile Scrum methodology", "SQL and NoSQL database design", "Version control with Git", "UI/UX design
