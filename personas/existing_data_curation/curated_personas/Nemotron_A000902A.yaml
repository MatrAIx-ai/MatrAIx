personas:
  professional: An architect, Linda Petilli channels a blend of conceptual imagination and pragmatic design into meticulously documented residential and public projects, excelling at BIM modeling in Revit,
    parametric workflows in Rhino and Grasshopper, precise drafting in AutoCAD, and strict adherence to Illinois building codes while thriving on solitary field sketching, birdwatching‑inspired material
    palettes, and a competitive drive to achieve award‑winning Passive House standards.
  sports: Linda Petilli enjoys solitary early‑morning runs along the Fox River Trail and occasionally joins the Chicago Parks Running Club’s weekend jogs, while cheering on the Chicago Cubs at Wrigley Field
    and the Chicago Bears during football season, and she follows the Chicago Fire Women’s soccer team for inspiration in her disciplined fitness routine.
  arts: Linda Petilli cultivates a rich artistic life by practicing piano pieces by Chopin and Philip Glass in her home studio, immersing herself in the writings of phenomenological architects like Peter
    Eisenman, and curating a personal gallery of Edward Weston's black‑and‑white nature photographs that inform her own design sensibility, while occasionally attending performances at the Chicago Symphony
    Orchestra.
  travel: Linda Petilli prefers low‑key, solo travel experiences that combine architectural pilgrimages with nature photography, having trekked the historic quarters of Kyoto to study traditional machiya
    houses, explored the sustainable housing showcase in Freiburg, Germany, and planned a future trip to the American Southwest to capture the rugged beauty of the Grand Canyon for her design portfolio.
  culinary: Linda Petilli’s culinary adventures revolve around mastering sourdough rye loaves, fermenting seasonal vegetables into tangy kimchi and classic Midwestern sauerkraut, and experimenting with
    heirloom tomato bruschetta, all while she treats cooking as a meditative extension of her design process, though she occasionally forgets to set timers and over‑proofs her dough.
  core: Linda Petilli is a solitary, detail‑obsessed architect who transforms quiet hikes, birdwatching, and piano practice into award‑winning Passive House designs, yet regularly loses track of time in
    the kitchen and on her latest VR experiment.
background:
  cultural: Linda was raised in the suburban outskirts of Chicago, in a middle‑class family of Irish‑Italian heritage. Growing up in Elgin, Illinois, she absorbed the Midwest’s pragmatic work ethic and
    deep respect for the natural landscape that characterizes the region’s prairie and river environments. The area’s historic brick streets and the legacy of architects like Frank Lloyd Wright informed
    her early appreciation for context‑responsive design. Although she values solitude, she remains connected to local cultural rhythms—seasonal farmers’ markets, community art fairs, and the region’s strong
    emphasis on sustainable living. Her cultural upbringing blends modest Midwestern values with a curiosity about broader architectural innovations, shaping a professional identity that balances practicality
    with experimental design.
attributes:
