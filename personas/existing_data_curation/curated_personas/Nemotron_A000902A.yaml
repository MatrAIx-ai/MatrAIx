    ''Project coordination with MEP consultants'', ''Site analysis & zoning research'']'
  hobbies: '[''Hiking and birdwatching'', ''Nature photography'', ''Architectural sketching'', ''Reading architectural theory and philosophy'', ''Playing piano'', ''Baking sourdough and fermenting foods'',
    ''Jigsaw puzzles and Sudoku'', ''Mindfulness meditation'', ''Solo running'', ''Experimenting with VR design tools'']'
  career_goals: Linda’s primary ambition is to establish a boutique architectural practice that lets her work independently on high‑performance residential and small‑scale public projects in the Midwest.
    She aims to become a recognized specialist in Passive House and net‑zero design, securing at least two regional AIA awards within the next five years. To support this, she plans to earn LEED Accredited
    Professional status and to deepen her expertise in parametric design, eventually offering immersive VR walkthroughs as a standard client service. While she values the freedom to set her own schedule
    and work in solitude, she also seeks selective collaborations with engineers and craftsmen she trusts, using her competitive edge to pursue design excellence. Long‑term, she envisions publishing a monograph
    that showcases her integration of innovative materials with pragmatic, context‑sensitive architecture.
