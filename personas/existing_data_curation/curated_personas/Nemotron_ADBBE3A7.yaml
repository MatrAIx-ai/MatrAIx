personas:
  professional: Ronny Scacco is a diligent middle‑school student who channels a love for LEGO engineering, Sudoku, and strategy video games into a budding talent for mechanical problem‑solving and coding,
    applying his preference for structure, competitive drive, and practical mindset to school science projects and the robotics club.
  sports: Ronny Scacco plays midfield for the River City Youth Soccer Club, focusing on technical drills with a tight‑knit group of friends, follows Manchester United’s tactical analysis, and competes in
    online chess tournaments, embodying a structured, competitive, and small‑group oriented athletic profile.
  arts: Ronny Scacco curates a personal playlist that fuses Bad Bunny’s reggaeton beats with Led Zeppelin’s classic rock riffs, uses the rhythm to fuel LEGO builds, and occasionally sketches comic‑style
    heroes inspired by strategy games, showing how music and visual art shape their creative downtime.
  travel: Ronny Scacco prefers meticulously planned family trips, having explored the ruins of Tikal, the bustling markets of Mexico City, and a themed amusement park in Orlando, and now dreams of a structured
    itinerary through Japan’s technology museums, balancing curiosity with comfort and a modest travel budget.
  culinary: Ronny Scacco assists their mother in preparing pepian, precisely measuring roasted pumpkin seeds and annatto for authentic flavor, enjoys the tang of freshly made guacamole, bakes flawless chocolate
    chip cookies, yet often leaves the kitchen cluttered as they rush back to a video game session.
  core: Ronny Scacco blends a strategic mind, a love for order, and a quiet competitive streak, juggling LEGO masterpieces, soccer drills, and late‑night gaming while wrestling with anxiety and a habit
    of over‑planning.
background:
  cultural: Ronny comes from a Guatemalan immigrant family that settled in Homestead, Florida. He grew up speaking Spanish at home and English at school, giving him a bicultural perspective. Family gatherings
    often feature traditional foods such as tamales and pepian, and they celebrate holidays like Día de los Muertos and Guatemalan Independence Day, preserving cultural customs. His parents emphasize the
    importance of education and hard work, encouraging responsibility and modesty. While he navigates the multicultural environment of Miami‑Dade County, he maintains a strong connection to his heritage
    through language, cuisine, and community events at the local Guatemalan cultural centre.
