  career_goals: Ronny aspires to pursue a career in software engineering or computer science, aiming to combine his love for logical problem‑solving with building real‑world applications that provide reliable,
    structured solutions. He hopes to attend a university with a strong engineering program, earn a degree in Computer Science, and eventually work as a software developer in a tech company that values
    clear processes and teamwork in small, focused groups. Additionally, he wants to support his family financially and give back to his community by developing technology tools that help local small businesses.
    He also dreams of becoming a competitive e‑sports player in strategy games, reflecting his competitive nature.
