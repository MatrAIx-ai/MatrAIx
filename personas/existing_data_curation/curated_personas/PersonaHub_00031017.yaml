persona_description: A military historian who specializes in the Civil War era, particularly the campaigns and battles of the Union Army under General George Meade. The individual is knowledgeable about
  the Eleventh Corps, General Howard's command, and the battles of Gettysburg and Chancellorsville. They have a deep interest in the strategic decisions and tactics used by General Howard, and enjoy studying
  the details of the corps' organization and personnel. They are also interested in the personal experiences and actions of the soldiers, and how they contributed to the outcome of the battles.
