  career_goals: Sherry hopes to finish middle school and enter high school with a focus on biology and environmental science. She dreams of a career that lets her help living beings while working in a calm,
    organized setting. Her primary ambition is to become a veterinarian or a wildlife rehabilitator, roles that combine her love for animals, her practical caregiving skills, and her scientific curiosity.
    She also envisions a backup path as a library assistant, where she could maintain a quiet space for community members and support literacy programs. In the short term, she plans to volunteer at the
    local animal shelter, join a science club, and take on small research projects that will strengthen her knowledge of biology and ecology. She values flexibility, so she hopes her future work will allow
    her to balance independent study with occasional teamwork.
