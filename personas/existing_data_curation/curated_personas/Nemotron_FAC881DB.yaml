personas:
  professional: Morris Cranston, an 18‑year‑old aspiring Army logistics specialist, applies his hands‑on mechanical repair skills, basic first‑aid certification, and knack for smoothing group tensions to
    a structured yet adaptable approach, favoring clear procedures while often improvising when unexpected challenges arise during base projects.
  sports: Morris Cranston enjoys playing pickup basketball and soccer on the Fort Cavazos recreation fields, follows the Dallas Cowboys and Houston Rockets avidly, and is a member of the base’s seasonal
    flag‑football league that meets every fall Saturday.
  arts: Morris Cranston spends evenings strumming acoustic renditions of Garth Brooks, Willie Nelson, and classic rock staples like Led Zeppelin on a battered guitar at campfire gatherings, while also binge‑watching
    classic westerns starring John Wayne.
  travel: Morris Cranston prefers short road‑trip adventures, having camped under the stars in the Texas Hill Country, explored Austin’s live‑music scene, and dreaming of a future spring break crawl through
    New Mexico’s Santa Fe and Albuquerque before finally landing on a family vacation to the Gulf Coast.
  culinary: Morris Cranston, a modest home cook, loves grilling smoked brisket and whipping up chili con carne with pinto beans, black pepper, and cumin, while also mastering the art of loading nachos with
    cheddar, jalapeños, and sour cream for his friends’ game nights.
  core: Morris Cranston, a sociable yet perpetually anxious teen, flips between meticulous planning and last‑minute improvisation, hoarding gaming gear and snack supplies while worrying about the next drill
    or exam.
background:
  cultural: Morris grew up in a predominantly white, middle‑class community in Central Texas, absorbing Southern cultural values such as hospitality, a respect for tradition, and a strong sense of patriotism.
    Living on Fort Cavazos has further shaped his identity, exposing him to the military lifestyle with its emphasis on discipline, camaraderie, and community service. He celebrates regional customs like
    BBQ gatherings and Texas holidays, enjoys country music, and participates in the base’s multicultural events, giving him a broadened perspective on diversity.
