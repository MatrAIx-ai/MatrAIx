  career_goals: Morris aims to enlist in the U.S. Army after graduation, targeting a logistics or communications role where his organizational strengths and technical aptitude can be applied. He also considers
    attending a community college for an associate degree in information technology if he stays civilian. His long‑term ambition is to secure a stable, structured career that offers clear advancement pathways
    while still allowing him to work closely with people and support his community.
