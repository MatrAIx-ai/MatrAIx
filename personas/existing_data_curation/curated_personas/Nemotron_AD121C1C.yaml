  hobbies: '["Hiking", "Biking", "Gardening", "Attending community festivals", "Citizen‑science volunteering", "Improvisational comedy", "Cooking", "Reading mystery novels"]'
  career_goals: Sandy aims to deepen her analytical expertise and move into a leadership role that blends her technical know‑how with her natural ability to connect with people. Over the next few years
    she plans to earn certifications in GIS and data science and to lead citizen‑science projects that inform local sustainability policies. Her long‑term ambition is to become a senior data analyst or
    program coordinator for a regional environmental agency, where she can shape community‑focused research initiatives and mentor junior staff.
