personas:
  professional: Sandy Haskin is a mid‑career environmental data analyst who leverages advanced GIS mapping, R‑based statistical modeling, and clear technical writing to translate water‑quality metrics into
    community‑friendly reports, and they let their talkative, people‑oriented personality turn data workshops into lively, collaborative sessions while embracing a flexible, sometimes chaotic, workflow
    that balances curiosity with practical delivery.
  sports: Sandy Haskin is an avid outdoor enthusiast who cycles with the Gresham Pedalers club, hikes the Columbia River Gorge during summer, follows the Portland Timbers and Trail Blazers for a splash
    of city spirit, and they treat fitness as a social activity, often organizing group bike rides even if their personal schedule feels a bit disorganized.
  arts: Sandy Haskin is a frequent attendee of Portland’s Waterfront Blues Festival and Pickathon, a fan of indie folk acts like Fleet Foxes and Sufjan Stevens, participates in improv comedy workshops,
    and they unwind by reading mystery novels by Tana French, letting the blend of live music, humor, and suspense shape their creative outlook.
  travel: Sandy Haskin is a weekend road‑trip aficionado who prefers spontaneous, eco‑friendly getaways to places like the Oregon Coast, Banff National Park, and a dream visit to Iceland’s geothermal sites,
    balancing modest budgeting with occasional splurges on unique local experiences, and they often use a hybrid car to minimize their carbon footprint.
  culinary: Sandy Haskin is a home‑cooking enthusiast who feels most at ease preparing seasonal dishes such as roasted beets with goat cheese, wild mushroom risotto, and miso‑glazed salmon using fresh market
    produce, their intermediate culinary skills let them experiment confidently, and they love dining at community farmers’ markets where they discover heirloom tomatoes and locally sourced herbs.
  core: Sandy Haskin is a curiosity‑driven environmental analyst whose knack for turning data into community stories is matched by a love for spontaneous hikes, a habit of misplacing their planner, and
    an unwavering belief that collaboration beats competition.
background:
  cultural: Sandy grew up in a middle‑class, suburban family in the Pacific Northwest, where an appreciation for nature, community involvement, and progressive social values were emphasized. Her upbringing
    blended a practical, modest work ethic with a love for outdoor recreation typical of Oregon culture. Exposure to local environmental initiatives and a strong sense of collective responsibility shaped
    her worldview, encouraging her to balance curiosity with practicality and to prioritize harmony in her personal and professional relationships.
