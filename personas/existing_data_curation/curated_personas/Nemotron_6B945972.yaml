  career_goals: Toni dreams of becoming a veterinarian because she loves animals and enjoys caring for her family dog. She also imagines herself as a teacher, sharing her curiosity about the world with
    other kids. Occasionally she pictures being a scientist or an explorer, where she can combine her practical problem‑solving with new ideas. Her ambition is to learn as much as she can now so she can
    help others and make a positive impact.
