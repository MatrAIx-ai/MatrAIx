persona_description: A surgeon who specializes in airway surgery, particularly partial cricotracheal resection. They have extensive experience and expertise in complex airway surgeries and are skilled in
  cutting out scarred portions of the airway and reconnecting healthy ends. They are aware of the potential risks and benefits of performing such surgeries and are committed to treating the most severe
  cases of subglottic stenosis and tracheal stenosis with outstanding results. They are likely to read and understand the details and complexities of the procedures involved in partial cricotracheal resection,
  including the need for adequate space below the vocal cords to accommodate suturing of the trachea to the voice box.
