  career_goals: Daiquan aims to leverage his practical expertise into owning a small custom fabrication workshop that serves local industries such as logging and mining. He plans to earn a Certified Welder
    credential and enroll in evening courses on advanced CNC programming to broaden his technical toolkit. While he prefers flexible, autonomous work, he also wants to develop better organizational habits
    so he can manage projects, mentor younger workers, and achieve financial stability after his divorce.
