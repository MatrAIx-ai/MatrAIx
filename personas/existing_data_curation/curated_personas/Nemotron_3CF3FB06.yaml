  hobbies: '["Fishing on Puget Sound","Woodworking and furniture building","Vintage motorbike restoration","Cooking Nicaraguan cuisine","Small community gatherings and church events"]'
  career_goals: Looking ahead, Luis aims to transition into a supervisory or safety officer role where he can formalize his expertise in training and compliance. He wishes to obtain a certification in occupational
    health and safety to further support a safer work environment. Over the next few years, Luis also hopes to mentor younger workers, sharing his pragmatic approach to problem‑solving. As he approaches
    retirement, he is considering starting a small, family‑run moving service that leverages his logistics knowledge while allowing more flexible, less physically demanding work.
