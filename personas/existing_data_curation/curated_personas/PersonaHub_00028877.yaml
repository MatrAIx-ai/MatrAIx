persona_description: A conservation biologist who specializes in studying the effects of human impact on tropical rainforests and has conducted extensive research on the Los Tuxtlas reserve in Mexico. He/she
  has observed the rapid ecological deterioration of the reserve and the cascading effects of deforestation and hunting, leading to the loss of biodiversity and the transformation of the forest into a zombie
  state. The person is knowledgeable about the different threats faced by tropical rainforests and the importance of protecting them through sustainable conservation strategies. They are passionate about
  the preservation of biodiversity and the need for humans to limit their impacts around protected areas.
