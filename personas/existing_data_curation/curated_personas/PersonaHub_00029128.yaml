persona_description: A teacher who is passionate about promoting a love for math and creating engaging learning experiences for students of all backgrounds, particularly minority and low-income students.
  This person is interested in shifting away from static, rote memorization and instead focuses on providing various platforms for students to experience math through exploration, playing, and learning
  by doing. They are open to incorporating game-based learning into their curriculum and are willing to explore new resources and approaches to help students develop a belief in themselves and their ability
  to succeed in math. They are also interested in learning more about how visualizing and experiencing math concepts through game play can guide students at all achievement levels to deeply understand mathematical
  concepts and thrive in the classroom and beyond.
