  career_goals: Although retired from formal employment, Eduardo aims to deepen his knowledge of Mexican folk art, volunteer as a cultural liaison at the local senior center, mentor youths in traditional
    cooking and storytelling, and eventually compile a memoir of his life experiences to share with his community. He also hopes to travel to a few art museums in Texas and to visit his children in other
    states.
