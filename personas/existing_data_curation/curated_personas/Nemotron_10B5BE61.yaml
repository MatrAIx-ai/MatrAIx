  career_goals: As he approaches retirement, Jacob’s primary ambition is to pass his accumulated knowledge to the next generation of mechanics. He aims to formalize a mentorship program through the local
    union, develop a concise handbook on refractory equipment safety, and serve as a part‑time safety consultant for Dallas‑area factories. While he does not seek promotion, he wishes to ensure that aging
    machinery stays reliable and compliant, leveraging his assertive yet cooperative style to influence workplace standards.
