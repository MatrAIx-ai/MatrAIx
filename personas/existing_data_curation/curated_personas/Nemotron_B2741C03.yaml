  career_goals: Marjorie aims to transition into a leadership role where she can shape the delivery of mental‑health services on a systemic level. Over the next five years she plans to pursue certification
    in trauma‑focused therapies, spearhead the development of a community‑based expressive‑arts counseling program for adults, and secure a director position at a non‑profit mental‑health center in the
    Bay Area. She is also interested in mentoring emerging counselors, publishing articles on resilience and structured therapeutic interventions, and occasionally teaching adjunct courses at a local university
    to share her expertise while maintaining a balanced schedule that respects her need for predictability and personal time.
