personas:
  professional: Marjorie Smith, a veteran mental‑health counselor with over twenty years of experience, blends rigorous CBT and solution‑focused brief therapy with expressive‑arts techniques, leveraging
    their methodical documentation habits and calm, resilient demeanor to lead structured group programs and crisis‑line interventions while preparing for a future leadership role.
  sports: Marjorie Smith stays fit by hiking the Berkeley Hills with the Bay Area Trail Runners Club, practicing yoga twice weekly at a local studio, and cheering on the San Francisco Giants and Golden
    State Warriors, balancing their structured exercise routine with occasional weekend kayaking on the San Francisco Bay.
  arts: Marjorie Smith immerses themselves in literary fiction, often discussing Toni Morrison and Kazuo Ishiguro at their book club, attends productions at the Berkeley Repertory Theatre, explores pottery
    at the Clay Studio, and enjoys the music of Sufjan Stevens while curating a small collection of Impressionist prints that inspire their seasonal dinner menus.
  travel: Marjorie Smith prefers meticulously planned getaways, favoring weekend retreats to Napa Valley vineyards, annual trips to the historic streets of Florence, Italy, and occasional hikes in the Canadian
    Rockies, always booking accommodations and itineraries months in advance to preserve their predictability while allowing space for spontaneous photo stops.
  culinary: Marjorie Smith delights in farm‑to‑table cooking, mastering dishes like roasted beet and goat‑cheese salad, quinoa‑crusted salmon with dill, and a seasonal ratatouille featuring heirloom tomatoes,
    while sourcing fresh herbs from their own garden and occasionally splurging on premium olive oil for their intimate dinner gatherings.
  core: Marjorie Smith is a methodical, resilient therapist who balances structured professional rigor with creative hobbies, from pottery to seasonal cooking, while maintaining a meticulously organized
    life punctuated by occasional indulgent splurges on art supplies, and they often schedule their days down to the minute.
background:
  cultural: Marjorie's cultural background is rooted in a middle‑class, white American family of Anglo‑Celtic heritage. Raised in a suburban community in the Pacific Northwest, she grew up valuing education,
    community involvement, and practical problem‑solving. After completing her graduate studies in counseling at a Bay Area university, she settled in Berkeley, where the region’s cultural diversity, progressive
    social values, and vibrant arts scene have broadened her perspective. She integrates this inclusive environment into her counseling approach, while her upbringing and methodical personality keep her
    grounded in pragmatism and structured practice.
