persona_description: A member of the University of Nottingham's steering group who is responsible for developing evidence-based reports on pandemics and infectious diseases, particularly focusing on the
  use of antivirals in treating hospitalised patients and high-risk groups. This individual is knowledgeable about the principles of evidence-based medicine, has experience in conducting research and evaluating
  the effectiveness of treatments, and is familiar with the latest research on antiviral therapies. They are also aware of the potential conflicts of interest in funding decisions and are committed to ensuring
  that any biases or conflicts of interest are transparently addressed.
