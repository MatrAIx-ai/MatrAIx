  hobbies: '[''playing soccer with friends'', ''drawing dinosaurs and cars'', ''building with LEGO bricks'', ''listening to library storytime'', ''helping prepare pupusas'', ''dancing to cumbia music'']'
  career_goals: Raul dreams of growing up to become someone who helps others and solves big problems. He often tells his parents he wants to be a firefighter because he admires their bravery, or an astronaut
    because he loves learning about space. He also imagines being a teacher so he can share stories and help younger kids learn. His ambition is guided by his love of discovery, his desire to achieve high
    standards, and his wish to make his family proud.
