personas:
  professional: Raul Perezconde, a budding junior entrepreneur who runs a meticulously organized lemonade stand, combines curiosity-driven product experiments with disciplined inventory tracking, and uses
    their outgoing nature to pitch to neighborhood friends while worrying about meeting high sales targets.
  sports: Raul Perezconde, an energetic participant in the Little Rockets soccer club, avidly follows the professional team the City Strikers, loves the spring soccer league and summer swimming lessons,
    and uses their disciplined practice schedule to improve dribbling while occasionally worrying about losing matches.
  arts: Raul Perezconde, an enthusiastic creator of colorful LEGO sculptures and a devoted fan of animated movies like "Toy Story" and "Moana", frequently sings along to songs by Idina Menzel and Lin‑Manuel
    Miranda, and channels their organized mindset into arranging art supplies by color, though they can become frustrated when drawings don’t turn out perfect.
  travel: Raul Perezconde, a curious traveler who has visited the local zoo, a seaside beach in Florida, and the bustling theme park of Disney World, dreams of exploring the Grand Canyon and the ancient
    ruins of Machu Picchu, and prefers meticulously planned day trips with a detailed itinerary, yet sometimes worries about missing a favorite snack.
  culinary: Raul Perezconde, a selective eater who loves cheesy macaroni, pepperoni pizza, and fruit kebabs with strawberries and bananas, enjoys helping stir pancake batter, and insists on arranging his
    plate in neat sections, while occasionally demanding extra cookies as a comfort snack when feeling stressed.
  core: Raul Perezconde, a five‑year‑old bundle of organized curiosity, channels high standards and social zest into every play session, yet wrestles with persistent worries that turn minor setbacks into
    big dramas.
background:
  cultural: Raul is a first-generation Salvadoran American growing up in Port Washington, NY. He lives in a bilingual household where Spanish is spoken daily, and he celebrates Salvadoran traditions such
    as Dia de los Muertos, Semana Santa, and family gatherings centered around pupusas, tamales, and marimba music. His parents maintain close ties with the local Salvadoran community, attending cultural
    festivals and Spanish-language school events. This rich cultural environment contributes to his sense of identity, his love of music and food, and his pride in sharing his heritage with classmates.
