persona_description: A physicist working on the development of acoustic probes for monitoring the quality of liquid foams used in industry, particularly in the mining and petroleum sectors. This person
  has expertise in acoustics, material science, and foam engineering, and is focused on the study of how sound propagates in liquid foams. They are part of a collaborative team working with researchers
  from Paris Diderot and Rennes Universities to understand how sound is attenuated in liquid foams and to develop acoustic probes that can be used to monitor the quality of foams.
