  career_goals: Jose aims to become a NATE Master Technician within the next two years, pursuing additional certifications in green HVAC technologies and building automation systems. He plans to transition
    from a field technician to a crew supervisor, eventually launching his own small contracting business that emphasizes sustainable, energy‑saving solutions for Houston’s diverse neighborhoods. Mentoring
    younger workers—especially recent immigrants—holds personal significance for him, and he hopes to partner with local trade schools to create apprenticeship pathways that combine practical training with
    the soft‑skill emphasis he values.
