personas:
  professional: Jose Carbajo is an experienced HVAC/R mechanic in the Houston metro area who blends meticulous service logging with on‑the‑fly problem solving, delivering cost‑effective climate solutions
    while calmly communicating with customers and crew, and is actively pursuing NATE Master certification and green‑tech expertise.
  sports: Jose Carbajo stays active by joining weekend pickup soccer games and a local flag‑football league, cheering on the Houston Dynamo in MLS and the Houston Astros in MLB, while also dedicating early
    mornings to fishing in Galveston Bay as a low‑impact way to balance cardio with relaxation.
  arts: Jose Carbajo fuels their creative side by mixing reggaeton beats from Bad Bunny, salsa classics by Marc Anthony, and timeless reggae tracks by Bob Marley while tinkering with DIY home‑improvement
    projects, often humming along as they install smart‑home devices and attend local cultural festivals that celebrate traditional music and dance.
  travel: Jose Carbajo prefers short, well‑planned weekend getaways to nearby Galveston for fishing, while dreaming of budget‑friendly adventures to Belize’s coral reefs and the historic streets of Granada,
    often using flash‑sale sites and meticulous budgeting to stretch their travel dollars.
  culinary: Jose Carbajo enjoys cooking at home, skillfully preparing family‑favorite dishes such as baleadas stuffed with refried beans, cheese, and avocado, hearty sopa de caracol flavored with lime and
    cilantro, and occasionally whipping up fresh fish tacos with mango salsa, reflecting a love for bold, comfort‑food flavors.
  core: Jose Carbajo blends a pragmatic, hands‑on mechanical mindset with a community‑focused heart, often juggling toolboxes, soccer balls, and an ever‑growing collection of smart‑home gadgets, all while
    maintaining a calm, organized approach that occasionally devolves into late‑night DIY tinkering sessions.
background:
  cultural: Jose was born in Honduras and moved to Houston with his family as a child. He grew up bilingual, speaking Spanish at home and English at school, and retains strong ties to Honduran customs—celebrating
    Semana Santa, Día de la Independencia, and family gatherings centered around traditional foods. The Honduran community in Houston provides a supportive network that reinforces values of family solidarity,
    humility, and cooperation. Jose’s Catholic upbringing shapes his respect for rituals and communal celebrations, while his experience as an immigrant fuels his commitment to helping other newcomers navigate
    the job market and integrate into American society.
