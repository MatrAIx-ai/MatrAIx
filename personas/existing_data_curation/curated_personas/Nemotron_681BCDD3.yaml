  hobbies: '[''Acrylic Painting'', ''Photography'', ''Acoustic Guitar'', ''Reading Speculative Fiction & Philosophy'', ''Creative Writing (Short Stories)'', ''Hiking'', ''Mindfulness Meditation'', ''Journaling'',
    ''Art Therapy Group Participation'', ''Community Theater Volunteering'', ''Fall Harvest Festival Involvement'']'
  career_goals: Michael aims to move from managing a single department to overseeing multiple divisions as a Director of Operations for a regional firm. He wants to lead initiatives that fuse creative thinking
    with operational efficiency, champion workplace mental‑health programs, and eventually launch his own boutique consultancy that helps small businesses adopt design‑thinking and innovation processes.
    To support these ambitions, he plans to complete a bachelor’s degree in Business Administration, earn a Project Management Professional (PMP) certification, and pursue mentorship opportunities that
    expand his strategic leadership experience.
