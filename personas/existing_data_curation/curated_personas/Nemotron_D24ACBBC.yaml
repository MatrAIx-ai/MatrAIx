  career_goals: Looking ahead, Dania aims to transition into a supervisory role where she can lead a shift team, design safer work procedures, and oversee training programs for entry‑level operators. She
    plans to earn a certification in CNC machining to stay current with emerging technologies and hopes to establish a mentorship initiative that connects Riverside youth with vocational opportunities in
    manufacturing. While maintaining her current responsibilities, she also envisions eventually scaling back to a part‑time consulting capacity, allowing her to share her expertise while dedicating more
    time to community arts projects and family life.
