personas:
  professional: Will Broadway, a veteran architectural drafter with over three decades of experience, blends curiosity‑driven exploration of Building Information Modeling with practical lean workflow optimization,
    and they use their compassionate, detail‑oriented nature to translate complex designs into precise 2‑D and 3‑D drawings while mentoring junior staff and championing workplace well‑being.
  sports: Will Broadway, an avid hiker of the White Mountains and seasonal angler, belongs to the Trailblazers Hiking Club, follows the New England Patriots and Boston Red Sox, and enjoys weekly bridge
    games as a social sport, yet they occasionally skip a hike when a demanding project deadline spikes stress.
  arts: Will Broadway, a devoted classic‑rock aficionado, fills their home with vinyl from The Rolling Stones, Bruce Springsteen, Led Zeppelin, and Fleetwood Mac, and they explore the regional history museum
    and read Stephen Ambrose biographies, all of which satisfy their curiosity and provide quiet mental respite from work stress.
  travel: Will Broadway, who prefers nature‑oriented trips, has hiked Acadia National Park, fished in Norway’s fjords, and dreamt of a road‑trip across the Scottish Highlands, and they plan each outing
    with meticulous maps, yet retirement budgeting constraints sometimes limit longer vacations to weekend getaways in nearby New Hampshire.
  culinary: Will Broadway, an enthusiastic home‑cook, loves crafting hearty New England clam chowder, grilled trout seasoned with dill and lemon, and homemade sourdough baked in a wood‑fired oven they built,
    but they tend to over‑salt dishes when excited about a new recipe, reflecting the meticulous drafting eye turned toward the kitchen.
  core: Will Broadway blends three decades of drafting precision with a compassionate, worry‑prone nature, and they find balance through woodworking, hiking, classic‑rock music, and mentorship while nurturing
    a modest, well‑planned retirement lifestyle.
background:
  cultural: 'Will grew up in a modest, middle‑class family in New England, where values of self‑reliance, community involvement, and respect for the natural environment were emphasized. His cultural upbringing
    reflects typical New Hampshire traditions: a strong work ethic, appreciation for local history, and participation in civic activities such as town meetings and volunteer fire department events. As a
    white American with a Protestant background, he maintains a connection to seasonal community gatherings, church services, and regional celebrations like autumn leaf‑peeping festivals. This background
    shapes his compassionate approach to helping others, his practical mindset, and his desire for a harmonious balance between personal pursuits and community responsibilities.'
