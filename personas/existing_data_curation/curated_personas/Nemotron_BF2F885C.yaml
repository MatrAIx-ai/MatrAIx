  career_goals: Approaching retirement, Will aims to transition from full‑time drafting to a mentorship‑focused role, guiding younger drafters and sharing his extensive industry knowledge. He plans to obtain
    certification in Building Information Modeling (BIM) to stay current with emerging technologies, and to volunteer his expertise for community‑based construction projects that promote sustainable design.
    Additionally, he hopes to reduce workplace stress for himself and his colleagues by championing well‑being initiatives, such as flexible scheduling and mindfulness practices, thereby leaving a legacy
    of both technical excellence and a healthier work culture.
