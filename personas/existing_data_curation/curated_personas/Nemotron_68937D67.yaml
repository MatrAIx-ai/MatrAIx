personas:
  professional: Ivy Handy leads frontline retail teams with data‑driven scheduling, precise visual merchandising, and inclusive coaching, consistently hitting sales targets while spearheading mentorship
    programs and partnerships with locally owned suppliers.
  sports: Ivy Handy fuels her love for movement through weekly hip‑hop and R&B dance classes at a local studio, energetic Zumba sessions at the community center, weekend yoga at a nearby park, and cheers
    for the Atlanta Falcons and Georgia Tech Yellow Jackets while occasionally joining pick‑up basketball games at her church gym.
  arts: Ivy Handy curates her artistic palate with playlists featuring H.E.R., Anderson .Paak, and classic Motown, reads contemporary fiction like 'The Vanishing Half' and 'Americanah', attends Juneteenth
    festivals showcasing drumming circles, and supports local theater productions that blend storytelling with soulful music.
  travel: Ivy Handy prefers curated weekend getaways, having explored Savannah’s historic squares, Asheville’s mountain trails, and a culinary tour of New Orleans, while dreaming of a cultural immersion
    trip to Accra to trace family roots, always balancing travel budgets with a desire to share experiences at community gatherings.
  culinary: Ivy Handy’s kitchen is a crossroads of Southern comfort and African spice, where she perfects fried chicken with a suya rub, collard greens simmered with smoked turkey and berbere, sweet potato
    pie infused with ginger, and jollof‑style rice for potluck feasts, boasting a confident home‑chef skill set that delights friends and neighbors alike.
  core: Ivy Handy, a 34‑year‑old retail strategist, blends disciplined leadership with vibrant community spirit, balancing meticulous planning with spontaneous dance‑filled gatherings, all while nurturing
    mentorship and flavor‑rich culinary traditions.
background:
  cultural: Ivy grew up in a close‑knit African American community within the Atlanta metropolitan area, where church, family gatherings, and Southern traditions shaped her values. She embraces Southern
    cuisine, storytelling, and music, while also honoring her African heritage through natural hair care, participation in Juneteenth events, and support for Black‑owned businesses. Living in Lawrenceville,
    GA, she actively engages with the diverse cultural landscape of Gwinnett County, fostering connections across generations and championing community resilience and upward mobility.
attributes:
  skills: '[''Team Leadership'', ''Staff Scheduling'', ''Performance Coaching'', ''Customer Service Excellence'', ''Sales Forecasting'', ''Inventory Management'', ''Visual Merchandising'', ''POS System
    Proficiency'', ''Data Analysis (Excel)'', ''Budgeting and Cost Control'', ''Conflict Resolution'', ''Training and Development'']'
  hobbies: '[''Hip‑hop dance'', ''Zumba fitness classes'', ''Yoga sessions'', ''Cooking Southern‑African fusion meals'', ''Community volunteering (youth mentorship)'', ''Reading contemporary fiction'',
    ''Attending local cultural festivals'', ''Curating music playlists for social gatherings'']'
  career_goals: Ivy aims to be promoted to store manager within the next two years, followed by a district‑manager role overseeing multiple locations. She plans to earn a part‑time MBA and obtain a Certified
    Retail Manager credential to deepen her strategic capabilities. Ivy is passionate about advancing diversity and inclusion in retail, so she intends to launch a mentorship program for junior staff and
    champion partnerships with Black‑owned suppliers. Long‑term, she dreams of opening her own boutique that blends African‑inspired designs with Southern comfort fashion, positioning the venture as a community‑focused
    retail destination.
