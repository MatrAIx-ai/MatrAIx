personas:
  professional: Sheila Clepper is an aspiring forensic analyst whose meticulous organization, methodical research skills, and competitive spark drive her to excel in robotics competitions and volunteer
    crime‑scene shadowing, while they apply a skeptical eye that double‑checks every clue before acceptance.
  sports: Sheila Clepper fuels a competitive edge on the Botetourt County high‑school soccer team, hones stamina on weekly hikes through the Blue Ridge, supports the Virginia Tech Hokies football program,
    and tracks stats for the Roanoke Rapids minor‑league baseball club, while they treat fitness as a disciplined science rather than a hobby.
  arts: Sheila Clepper weaves a love of mystery novels by Agatha Christie and sci‑fi epics by Neal Stephenson with evenings strumming acoustic guitar renditions of Ed Sheeran, while they regularly attend
    community‑theater productions starring local talent and quote lines from Lin‑Manuel Miranda’s *Hamilton* in casual conversation.
  travel: Sheila Clepper plans trips with spreadsheet precision, preferring a blend of adventure and culture; they’ve trekked Shenandoah National Park’s Skyline Drive, explored the museums of Washington,
    D.C., savored pizza in New York City, and dream of hiking the Scottish Highlands and strolling through Kyoto’s historic Gion district.
  culinary: Sheila Clepper enjoys cooking simple yet satisfying meals—spaghetti carbonara with pancetta, blueberry pancakes swirled with fresh blueberries, and smoky BBQ pulled pork sandwiches—though they
    often over‑salt the sauce and rely on a trusty non‑stick skillet, while their favorite dining out spot remains the local farm‑to‑table bistro serving heirloom tomato bruschetta.
  core: Sheila Clepper is a detail‑obsessed, puzzle‑loving teen who balances competitive soccer drives with an almost compulsive need to catalog every book, trail, and expense, yet they habitually procrastinate
    on laundry and forget to charge their phone overnight.
background:
  cultural: She grew up in a predominantly white, Appalachian‑influenced community in Botetourt County, Virginia. Her family traditions emphasize self‑reliance, close family ties, and participation in community
    events such as the county fair and church youth activities. Local customs like cooking Southern comfort foods, attending church services, and enjoying outdoor recreation—hiking, camping, and fishing—have
    shaped her values of hard work, modesty, and community service. While she embraces these regional traditions, she is also open to broader cultural influences through school programs, online media, and
    friendships with peers from diverse backgrounds.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic computer proficiency (Microsoft Office)'', ''Data entry and record keeping'', ''Research and analytical skills'', ''Team collaboration'',
    ''Public speaking (class presentations)'', ''Mechanical troubleshooting (basic automotive maintenance)'']'
  hobbies: '[''Hiking and nature walks'', ''Reading mystery and science fiction novels'', ''Puzzle solving (Sudoku, escape rooms)'', ''Robotics club projects'', ''Soccer'', ''Journaling'', ''Attending local
    community theater'', ''Playing acoustic guitar'']'
  career_goals: She intends to graduate high school with strong academic standing and pursue a bachelor's degree in forensic science or criminal justice at a state university. Her competitive nature and
    skeptical, detail‑oriented mindset drive her ambition to become a forensic analyst for the Botetourt County Sheriff's Office, where she can apply her methodical skills to crime‑scene investigation.
    In the short term, she hopes to secure a summer internship or volunteer position with a local law‑enforcement agency to gain hands‑on experience, and she plans to earn certifications in evidence collection
    and digital forensics to strengthen her future career prospects.
