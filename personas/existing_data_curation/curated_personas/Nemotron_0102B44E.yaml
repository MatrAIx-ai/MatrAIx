  hobbies: '[''Chess club and casual chess matches'', ''Competitive video games (strategy games)'', ''Listening to pop and K‑pop music'', ''Watching sitcoms and light‑hearted TV shows'', ''Reading manga
    and graphic novels'', ''Cooking family recipes and experimenting with fusion dishes'', ''Origami and other DIY crafts'', ''Walking in local parks'']'
  career_goals: Short‑term, Yinghua aims to graduate high school with strong grades in science and math, then enroll in a vocational program to obtain a culinary arts certification. She hopes to combine
    her love of cooking with the practical, routine‑focused environment of a professional kitchen, eventually working as a line cook in a reputable restaurant. Long‑term, she dreams of opening a modest
    family‑owned eatery that serves a blend of Chinese and American comfort foods, providing a stable livelihood while honoring her cultural heritage. Her competitive nature drives her to excel in culinary
    competitions and secure a scholarship that will support her training.
