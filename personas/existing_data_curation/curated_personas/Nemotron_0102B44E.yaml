personas:
  professional: Yinghua Chang, a 16‑year‑old high‑school senior, blends a strategic mindset honed in chess and competitive video games with a practical flair for science projects, channeling their competitive
    streak into top‑scoring math exams while quietly preparing for a culinary arts vocational program.
  sports: Yinghua Chang stays active with brief park walks, plays on the school badminton team, joins a community basketball pickup group on Saturdays, and roots for the Seattle Seahawks, treating each
    session as a low‑key competition that provides a mental reset.
  arts: Yinghua Chang unwinds by streaming Taylor Swift pop hits and BTS K‑pop tracks, binge‑watching sitcoms like Friends and The Office, flipping through One Piece manga, and folding intricate origami
    cranes inspired by Akira Yoshida’s designs.
  travel: Yinghua Chang prefers short, budget‑friendly weekend trips, often planning spontaneous visits to nearby Seattle’s Pike Place Market or a day hike in Mount Rainier National Park, while dreaming
    of a future spring break adventure in Kyoto to sample authentic street food.
  culinary: Yinghua Chang cooks simple comfort foods such as stir‑fried noodles with soy sauce, ginger, garlic, and a dash of chili, perfects family‑style dumplings, and experiments by adding cheese to
    fried rice or swapping traditional fillings for sweet‑potato chips, always sharing the results at school gatherings.
  core: Yinghua Chang blends a tactical mind, love for routine, and competitive spirit into a teen who can out‑chess classmates, meticulously budget allowance, whip up tasty snacks, yet occasionally forgets
    to file homework on time.
background:
  cultural: Yinghua is a second‑generation Chinese‑American raised in Little Ferry, New Jersey, in a family that maintains both Chinese traditions and American values. Her parents immigrated from Taiwan
    (or mainland China), and the household speaks Mandarin alongside English. Cultural celebrations such as Lunar New Year, the Mid‑Autumn Festival, and Thanksgiving are observed, reflecting a blend of
    heritage and community. Family emphasis on respect for elders, modesty, and practical achievement has shaped her outlook. Growing up in Bergen County's vibrant East Asian community, she participates
    in cultural events at the local Chinese cultural center, enjoys traditional foods, and values the strong work ethic modeled by her parents.
