personas:
  professional: Felix Scholle, an aspiring junior LEGO architect, combines a love for precise building with an innate curiosity about engineering, using step‑by‑step instructions to create intricate models
    while quietly leading collaborative construction projects with peers.
  sports: Felix Scholle, a member of the Golden Wave youth swim team who loves racing laps at the community pool, also follows the New York Yankees and the Los Angeles Lakers on TV, and enjoys occasional
    Saturday soccer games with the neighborhood kids.
  arts: Felix Scholle, who delights in the rhythmic adventures of The Beatles and the storytelling magic of Pixar’s 'Finding Nemo,' frequently paints underwater scenes after watching marine documentaries,
    and rereads the 'Magic Tree House' series for inspiration.
  travel: Felix Scholle, who adores weekend road trips to the nearby lake for beach clean‑ups and dreams of snorkeling the Great Barrier Reef after a National Geographic special, has also journeyed with
    family to Washington, D.C., where they marveled at the National Air and Space Museum.
  culinary: Felix Scholle, who favors bite‑size meals like cheese pizza, chicken nuggets, and strawberry‑topped yogurt, loves helping assemble child‑friendly sushi rolls with cucumber and avocado under
    careful supervision, yet habitually sneaks an extra cookie before finishing dinner.
  core: Felix Scholle blends orderly creativity with quiet determination, crafting LEGO marvels while secretly stashing extra cookies and dreaming of marine expeditions.
background:
  cultural: Felix comes from a white, middle‑class Californian family that embraces typical American traditions. Growing up in Long Beach, he experiences a blend of West Coast coastal culture, including
    beach activities, diverse community events, and widely celebrated holidays such as Thanksgiving and Christmas. His family values clear routines, punctuality, and mutual respect, and they actively participate
    in local library programs and volunteer projects, reinforcing his cooperative and harmony‑seeking outlook.
