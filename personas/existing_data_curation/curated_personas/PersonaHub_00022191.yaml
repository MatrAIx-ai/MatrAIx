persona_description: A researcher from the University Institute for Research in Sustainable Aquaculture and Marine Ecosystems (IU-Ecoaqua) at the University of Las Palmas de Gran Canaria, Spain, who specializes
  in the study of marine pollution and the impact of microplastics on marine life. She has published several studies on the ingestion of microplastics by farmed seabass and has participated in international
  collaborations with researchers from Italy and the United States. The persona is aware of the urgency of addressing the issue of marine pollution and is concerned about the impact of urban and tourist
  centers on the marine environment.
