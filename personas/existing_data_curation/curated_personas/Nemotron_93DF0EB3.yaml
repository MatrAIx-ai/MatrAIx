  hobbies: '[''Hiking'', ''Nature Photography'', ''Creative Writing'', ''Yoga'', ''Mindfulness Meditation'', ''Cooking Experimental Recipes'', ''Reading Historical Fiction'', ''Volunteering at Crisis Hotline'',
    ''Community Theater'']'
  career_goals: She aims to advance to a senior HR leadership role, such as HR Director, where she can shape a flexible, compassionate workplace culture that prioritizes mental‑health support and employee
    well‑being. Margaret plans to earn a professional HR certification and develop a company‑wide wellness initiative that integrates mindfulness, crisis‑intervention resources, and creative learning opportunities,
    while maintaining the work‑life balance that allows her to stay emotionally resilient.
