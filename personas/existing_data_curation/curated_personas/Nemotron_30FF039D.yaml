  hobbies: '[''building LEGO sets'', ''drawing with crayons'', ''reading picture books'', ''biking'', ''playing cooperative video games'', ''collecting and arranging action figures'']'
  career_goals: Edward often imagines future jobs that blend clear structure with hands‑on action. He frequently says he wants to be a firefighter because the role offers teamwork, predictable routines,
    and the chance to help his community. He also dreams about becoming an astronaut, reflecting his curiosity about problem‑solving and adventure. These aspirations align with his preference for practical
    tasks, occasional assertiveness in small groups, and desire for a role that balances order with flexibility.
