personas:
  professional: Edward Hamm, a budding LEGO engineer, loves constructing intricate builds and often takes charge in cooperative games, channeling their practical focus and love for structure into early
    problem‑solving.
  sports: Edward Hamm rides a red BMX bike with the Maple Shade Youth Cyclists Club, cheers for the New York Yankees during baseball season and the Philadelphia Eagles on Sundays, and joins the neighborhood
    “Tag” league every Saturday, preferring structured play over chaotic free‑form games; they often volunteer to organize the starting line‑ups.
  arts: Edward Hamm sketches Spider‑Man and Batman with bold crayons, devours picture books by Chris Van Allsburg, and spends hours assembling LEGO cityscapes, drawing inspiration from Marvel comics and
    the classic Disney movies they watch on holiday evenings.
  travel: Edward Hamm enjoys family road trips to the Pocono Mountains for fall leaf‑peeping, the Smithsonian museums in Washington D.C. during school breaks, and dreams of visiting Disneyland in California,
    preferring short, well‑planned itineraries that balance exciting outings with quiet reading time; they love making a scrapbook of each adventure.
  culinary: Edward Hamm loves cheesy macaroni, pepperoni pizza, and peanut butter‑jelly sandwiches, can confidently make a PB&J on their own, and often helps assemble snack plates with chicken nuggets and
    carrot sticks for after‑school bites; they’re known to sneak an extra cookie when no one’s looking.
  core: Edward Hamm is a meticulous LEGO builder who trades bedtime stories for bike rides, saves pennies for their next set, and occasionally forgets their vitamins but always remembers the rules of their
    favorite games.
background:
  cultural: Edward grows up in a white, middle‑class family in Maple Shade, New Jersey. His household celebrates mainstream American holidays such as Thanksgiving, the Fourth of July, and Christmas, and
    attends a local community church. The suburban environment offers quiet residential streets, public parks, and a public elementary school that emphasizes structured learning. While his cultural background
    is broadly American, his family values practical responsibility, community involvement, and a balance between routine and flexibility.
attributes:
  skills: '[''basic sight‑word reading'', ''counting to 100'', ''simple addition and subtraction'', ''following multi‑step instructions'', ''basic tablet navigation'', ''crayon drawing'', ''LEGO building'',
