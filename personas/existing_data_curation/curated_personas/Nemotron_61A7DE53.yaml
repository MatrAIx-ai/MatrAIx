    ''Use of CAD and technical schematics'', ''Analytical problem solving'', ''Process improvement and lean methodologies'']'
  hobbies: '[''Abstract painting'', ''Sketching'', ''Visiting modern art galleries'', ''Reading science fiction and philosophy'', ''Woodworking'', ''Model train building'', ''Vintage car restoration'',
    ''Playing acoustic guitar'', ''Attending local theater'', ''Photography of natural landscapes'', ''Yoga and mindfulness meditation'', ''Hiking in state parks'', ''Playing chess in community clubs'',
    ''Participating in trivia competitions'']'
  career_goals: Joshua aims to transition from supervisory responsibilities to higher-level operations management, eventually becoming a plant manager or director of maintenance for a regional manufacturing
    firm. He is drawn to integrating emerging sustainable technologies, such as renewable energy installations, into traditional mechanical services. Long-term, he envisions launching his own boutique consulting
    firm that offers innovative, eco‑focused maintenance solutions while also mentoring the next generation of technicians. Balancing his ambition with his emotional sensitivity, he seeks roles that provide
    structured support systems and opportunities for creative problem solving.
