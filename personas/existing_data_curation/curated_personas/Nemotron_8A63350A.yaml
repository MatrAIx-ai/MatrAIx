personas:
  professional: Joy Makros is a seasoned financial accountant and auditor who leverages deep expertise in GAAP compliance, QuickBooks, SAP, and Power BI to deliver precise financial statements and risk
    assessments, while their methodical, organized nature and blend of curiosity and practicality enable them to mentor junior staff and drive process improvements that balance innovative data analytics
    with proven control frameworks.
  sports: Joy Makros stays active by joining the Atlanta Trails Association for weekly hikes, balancing cardio with flexibility through yoga, while cheering on the Atlanta Falcons in football season and
    the Atlanta Hawks during the NBA playoffs, reflecting a disciplined yet community-oriented approach to fitness.
  arts: Joy Makros enriches their evenings by attending live performances by Southern soul artists like Leon Bridges and the Atlanta-based jazz ensemble The Hot Club, while their book club delves into contemporary
    novels by authors such as Celeste Ng and nonfiction by Michael Lewis, weaving literary and musical passions into their social calendar.
  travel: Joy Makros prefers thoughtfully planned weekend road trips to Southern gems such as Asheville's Blue Ridge Mountains and Charleston's historic waterfront, while dreaming of a leisurely spring
    visit to Barcelona's art districts, balancing family time and budget considerations with a mix of adventure and cultural immersion.
  culinary: Joy Makros, a confident home chef, delights in farm-to-table Southern cooking, often turning garden-grown heirloom tomatoes and sweet corn into dishes like creamy shrimp and grits, roasted okra
    with smoked paprika, and a signature peach cobbler that they serve to family gatherings.
  core: Joy Makros blends meticulous financial acumen with a love for garden-fresh Southern cooking, yet cannot resist binge-watching true-crime documentaries late into the night, a habit that sometimes
    steals sleep from early morning yoga.
background:
  cultural: Joy was raised in suburban Atlanta within a Southern white cultural context that values community, hospitality, and family traditions. Her upbringing emphasized church involvement, neighborhood
    gatherings, and a strong work ethic, while also exposing her to progressive ideas through education and professional experiences. She balances respect for Southern customs—such as sharing meals and
    supporting local charities—with an openness to new technologies and modern business practices. This blend of tradition and curiosity shapes her worldview and interpersonal interactions.
attributes:
  skills: '["Financial reporting", "Tax preparation", "Auditing", "GAAP compliance", "Advanced Excel (pivot tables, macros)", "QuickBooks", "SAP", "Budgeting and forecasting", "Internal controls", "Risk
    assessment", "Data analysis with Power BI", "Process improvement", "Team mentorship"]'
  hobbies: '["Gardening", "Hiking", "Cooking Southern cuisine", "Reading contemporary fiction and non‑fiction", "Volunteer tax assistance", "Yoga", "DIY home improvement projects", "Attending live music
    events"]'
  career_goals: Joy aims to attain CPA certification within the next year to solidify her professional credentials. Her immediate goal is to be promoted to Audit Manager, overseeing a team of auditors and
    managing larger, more complex client engagements. Long‑term, she envisions transitioning into a senior finance leadership role, such as CFO of a mid‑size firm, where she can shape strategic financial
    planning and drive automation initiatives. She also hopes to develop a boutique consulting practice that offers tax assistance and financial literacy workshops to underserved community members, blending
    her professional expertise with her commitment to service.
