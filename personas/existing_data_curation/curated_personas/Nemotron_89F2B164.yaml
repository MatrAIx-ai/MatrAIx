personas:
  professional: An ambitious real‑estate broker, Ifiok Guillaume (31) blends data‑driven market analysis with a relaxed, community‑first demeanor, leveraging both virtual tours and face‑to‑face conversations
    to negotiate deals that benefit sellers and first‑time buyers while occasionally letting a disorganized calendar slip in favor of spontaneous client meetups, and they often rely on their adaptable mindset
    to juggle multiple projects at once.
  sports: A sports enthusiast, Ifiok Guillaume (31) hits the community park for pick‑up basketball multiple evenings a week, roots for the Alabama Crimson Tide football team and the New Orleans Pelicans
    when not on the court, and balances their active lifestyle with an annual membership in the local classic‑car club that showcases restored 1970s Chevrolets, and they often stay late after games to discuss
    real‑estate trends with fellow players.
  arts: Culturally attuned, Ifiok Guillaume (31) curates a personal soundtrack of classic soul legends like Aretha Franklin, contemporary R&B stars such as H.E.R., and modern hip‑hop icons like Kendrick
    Lamar, often playing these tracks while recording a podcast on Selma real‑estate trends and attending local art walks that feature works by regional painters, and they find inspiration in the visual
    arts that informs their community‑first real‑estate philosophy.
  travel: An avid explorer, Ifiok Guillaume (31) prefers road‑trip itineraries that combine historic Southern towns—such as Charleston, Savannah, and New Orleans—with spontaneous stops at local heritage
    sites in Selma, balancing a love for adventure with a modest budget that prioritizes cultural immersion over luxury accommodations, and they often document each journey with photographs for their podcast.
  culinary: In the kitchen, Ifiok Guillaume (31) experiments with Southern staples like slow‑cooked collard greens seasoned with smoked ham hocks, gumbo brimming with okra and roux, and sweet‑potato pie
    spiced with nutmeg, showcasing a confident home‑cook level that often leads to weekend dinner parties where they proudly serve homemade biscuits with honey butter.
  core: Ifiok Guillaume, a 31‑year‑old real‑estate broker with a curiosity‑driven yet laid‑back streak, juggles historic preservation, classic car restoration, spontaneous basketball games, and a love for
    Southern soul music while occasionally letting disorganized habits spill over into missed dentist appointments, and they never lose their cool under pressure.
background:
  cultural: Ifiok is a 31-year-old African-American who grew up in Selma, Alabama. His family roots trace back to the Great Migration, and his first name reflects his parents' Nigerian heritage, giving
    him a blend of Southern and West African cultural influences. He was raised in a close-knit Baptist church community, where gospel music, Sunday fellowship, and community service shaped his values of
    resilience and mutual aid. Growing up in Autauga County, he witnessed the legacy of the civil-rights movement and carries a deep respect for Selma's historical significance. He celebrates African-American
    holidays such as Juneteenth and Black History Month, enjoys Southern hospitality traditions like backyard barbecues, and maintains strong ties to his extended family and local neighborhood networks.
