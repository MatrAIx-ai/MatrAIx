  career_goals: Ifiok aims to become the leading real estate broker in Selma and eventually expand his own boutique brokerage focused on revitalizing historic neighborhoods. He plans to obtain his Certified
    Residential Specialist (CRS) designation within the next two years, build a team of agents who share his community-first philosophy, and acquire a portfolio of rental properties to generate passive
    income. He also aspires to mentor young people from under-represented backgrounds, offering internships and workshops on homeownership and financial literacy. Long-term, he envisions developing mixed-use
    projects that provide affordable housing while preserving Selma's cultural heritage.
