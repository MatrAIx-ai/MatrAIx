personas:
  professional: Zasha Sanchez, a seasoned landscaping contractor with three decades of experience, blends their curiosity about innovative eco‑technologies with a practical, methodical approach to designing
    sustainable commercial gardens, expertly selects native drought‑tolerant species, oversees precise irrigation installations, assertively mentors crews, and they are pursuing a professional horticulture
    certification to become the lead foreperson at their firm.
  sports: Zasha Sanchez, an avid walker who logs weekly trails in Chino Hills State Park, participates in the Inland Empire Senior Walking Club, follows the Los Angeles Dodgers during baseball season, enjoys
    low‑impact yoga classes at a community center, and they avoid high‑intensity sports that could aggravate their knees.
  arts: Zasha Sanchez, a quiet enthusiast of regional Mexican folk music, regularly listens to Lila Downs, Vicente Fernández, and Juan Gabriel while gardening, attends occasional performances at the San
    Bernardino Playhouse, collects prints of Frida Kahlo, and they let artistic inspiration inform their landscape designs.
  travel: Zasha Sanchez, who prefers carefully planned road trips over spontaneous vacations, has explored the historic gardens of Seville, Spain, trekked the Mojave Desert focusing on native flora, dreams
    of attending Oaxaca’s culinary festivals, and they balance family commitments with a disciplined travel budget each year.
  culinary: Zasha Sanchez, a skilled home cook, crafts authentic tamales and mole poblano using heirloom chilies, fresh garden epazote, corn husks, and roasted chiles de árbol, delights in pairing these
    dishes with homemade salsa verde made from home‑grown tomatillos and cilantro, and they love sharing the meals with close friends during intimate gatherings.
  core: Zasha Sanchez, a methodical 56‑year‑old landscaper who blends eco‑practicality with quiet determination, mentors crews, tends a thriving garden, balances disciplined finances, and they occasionally
    indulge in premium tool splurges.
background:
  cultural: Zasha’s family roots trace back to central Mexico, and she grew up in a bilingual household where Spanish and English were both spoken daily. Cultural traditions such as Día de los Muertos,
    quinceañeras, and weekly family meals centered around Mexican cuisine remain central to her identity. She participates in local Latino festivals in Chino Hills, where she shares recipes and stories
    with neighbors. Catholic rituals and community church events have also shaped her sense of belonging. While she embraces her Mexican heritage, Zasha has adapted to the multicultural environment of Southern
    California, blending customs and values across her Mexican‑American experience.
attributes:
