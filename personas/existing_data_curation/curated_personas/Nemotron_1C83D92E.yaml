  hobbies: '[''home vegetable gardening'', ''traditional Mexican cooking'', ''nature walks in Chino Hills State Park'', ''community garden volunteering'', ''reading horticulture literature'', ''listening
    to Mexican folk music'', ''knitting'', ''small group gatherings'']'
  career_goals: Zasha aims to step into a senior supervisory role at her current company, becoming the lead crew foreperson who oversees larger commercial contracts and mentors junior staff. She plans to
    earn a professional horticulture certification from the California Landscape Contractors Association to deepen her technical knowledge. Within the next five years, she hopes to launch a modest family‑run
    landscaping consultancy focused on eco‑friendly practices, leveraging her network of local suppliers and her reputation for reliability. Her long‑term ambition is to be recognized as a go‑to expert
    for sustainable landscaping solutions in the San Bernardino County area, while still maintaining a stable work‑life balance that allows time for her family and community involvement.
