personas:
  professional: Mary Deguzman, an aspiring young naturalist and budding wildlife researcher, combines meticulous note‑taking, disciplined observation of Colorado fauna, and methodical LEGO model building
    to develop early scientific skills, while their love of structure and solitary focus translates into reliable, data‑driven field studies.
  sports: Mary Deguzman, a committed member of the local Colorado Rapids youth soccer club and a dedicated fan of the Denver Nuggets, spends Saturday mornings practicing drills with a focus on precision
    and routine, while also enjoying occasional hikes to observe wildlife, embodying their love of structured activity and solitary reflection.
  arts: Mary Deguzman, a disciplined piano student who practices scales daily, enjoys creating simple interactive stories on Scratch, and crafts intricate LEGO sculptures, often listening to classical composers
    like Mozart and contemporary game soundtracks from artists such as Koji Kondo, which together shape their quiet, methodical creative outlet.
  travel: Mary Deguzman, who prefers low‑key, nature‑focused trips, has visited Rocky Mountain National Park and the Great Sand Dunes with family, dreams of exploring Yellowstone National Park’s geysers,
    and meticulously plans each outing using a printable checklist to ensure structure and predictability while staying within a modest family budget.
  culinary: Mary Deguzman, an eager junior gardener, often harvests fresh carrots, cherry tomatoes, and basil from their backyard to toss into a simple pasta primavera, occasionally helping to bake a crusty
    sourdough loaf, but tends to over‑season with salt due to a habit of precise measurement taken too literally.
  core: Mary Deguzman is an organized, solitary 11‑year‑old who channels their love of structure into nature journaling, meticulous piano practice, and methodical budgeting, while occasionally over‑planning
    every activity.
background:
  cultural: Mary Ann grew up in Craig, a small town in Moffat County, Colorado, where ranching, outdoor recreation, and a close‑knit community shape daily life. Her family follows typical middle‑class American
    values, emphasizing hard work, self‑reliance, and respect for the natural landscape of the Rocky Mountains. She attends a local public school that integrates practical skills and community service into
    its curriculum. Cultural traditions include celebrating national holidays, attending occasional church services, and participating in community events such as the county fair, which reinforce a sense
    of belonging while allowing her to maintain her preference for quiet, structured environments.
