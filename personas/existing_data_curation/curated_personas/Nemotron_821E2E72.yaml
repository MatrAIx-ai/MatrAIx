  career_goals: Mary Ann aspires to become a wildlife biologist or environmental scientist specializing in the Rocky Mountain ecosystems of Colorado. She aims to pursue a science-focused high school curriculum,
    join biology clubs, and eventually study wildlife biology at a university. Her long-term ambition is to conduct research that supports conservation of native species while applying her systematic, data-driven
    mindset. In the interim, she plans to volunteer at local animal shelters and participate in citizen-science projects to build practical experience.
