  hobbies: '["Vegetable Gardening","Knitting and Crochet","Baking Traditional Southern Desserts","Church Choir Singing","Walking along the St. Johns River","Attending Local History Lectures","Volunteer
    Food Preparation"]'
  career_goals: Although Amy is currently not part of the formal workforce, she aims to deepen her impact through structured community service. She plans to obtain a Certified Nursing Assistant (CNA) credential
    so she can provide more formal care to seniors in her neighborhood. Simultaneously, she wants to lead the planning committee for the annual Jacksonville Riverfront Festival, applying her organizational
    talents to a larger, city‑wide event. Long‑term, Amy hopes to launch a small home‑based catering service focused on wholesome, traditional Southern dishes, allowing her to blend her love of cooking
    with a modest entrepreneurial venture that respects her need for routine and predictability.
