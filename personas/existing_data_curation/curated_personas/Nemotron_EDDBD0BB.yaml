personas:
  professional: Amy Tuttle is a community‑oriented event coordinator who leverages meticulous budgeting, spreadsheet management, and compassionate volunteer mediation to orchestrate church gatherings and
    neighborhood projects, and they are preparing to earn a CNA credential to formalize senior care support.
  sports: Amy Tuttle enjoys leisurely river walks with her husband, participates in the St. Johns Riverwalkers walking club, follows the Jacksonville Jaguars football team and the Jacksonville Jumbo Shrimp
    baseball club, and they join a seasonal adult softball league in the spring, viewing exercise as a gentle routine rather than intense training.
  arts: Amy Tuttle is a choir soprano who delights in performing hymns alongside the 'Jacksonville First Baptist Choir', finds inspiration in the gospel harmonies of 'The Gaither Vocal Band' and the storytelling
    of 'Dolly Parton', regularly visits the Cummer Museum for Southern art exhibitions, and they appreciate local historical narratives delivered by speakers at the Jacksonville Historical Society.
  travel: Amy Tuttle favors relaxed, itinerary‑light trips that combine heritage sites with quiet scenery, having visited Savannah’s riverfront and Charleston’s historic district on weekend getaways, taken
    a family cruise to the Bahamas, and they now dream of a leisurely road‑trip through the Blue Ridge Parkway, all while planning trips around church holidays to avoid conflicting with community responsibilities.
  culinary: Amy Tuttle is a proficient home cook who specializes in hearty Southern fare such as shrimp and grits, peach cobbler, and buttermilk biscuits, skillfully blends fresh garden herbs into her dishes,
    consistently bakes apple and pecan pies for church potlucks, and they occasionally indulge in a secret stash of store‑bought salty snack chips during late‑night TV.
  core: Amy Tuttle blends steadfast routine, meticulous organization, and deep community compassion, while they secretly guard a stash of extra garden seeds for unexpected winter planting.
background:
  cultural: Amy was raised in a middle‑class white family in the southeastern United States, where traditions of modesty, self‑reliance, and community involvement were emphasized. Her upbringing was anchored
    by regular church attendance and holiday gatherings that celebrated seasonal foods and family bonds. Living most of her adult life in Jacksonville, she has absorbed the region’s blend of Southern hospitality
    and coastal pragmatism, which informs her respect for routine, her practical outlook, and her dedication to helping neighbours maintain harmony.
attributes:
  skills: '["Household Management","Budgeting and Financial Planning","Event Coordination","Volunteer Management","Basic Computer Skills (Word, Excel, Email)","Elderly Caregiving","Conflict Mediation","Community
