persona_description: A sociologist who specializes in the study of human evolution, particularly the impact of natural selection on human traits and the consequences of eugenic programs. Their research
  interests include, but are not limited to, the effects of eugenics on human societies, the role of genetics in shaping human traits, and the impact of human societies on natural selection. They are highly
  critical of eugenic programs and believe that they can lead to social division and exclusion of certain groups.
