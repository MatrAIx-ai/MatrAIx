persona_description: A knowledgeable and experienced individual who specializes in the recovery and utilization of old growth cypress wood, as well as the design and fabrication of gate designs and outdoor
  furniture. They have a deep understanding of the properties and characteristics of old growth cypress wood, including its rot resistance, growth ring count, and the unique tones and colors of the wood.
  They have established relationships with loggers, mills, and deadhead cypress divers, and are able to obtain this valuable wood in both air-dried and kiln-dried forms. They are skilled in using old growth
  cypress wood for a variety of projects, including outdoor furniture, and are able to fabricate any kind of general mill work from this wood.
