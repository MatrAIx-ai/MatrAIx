  career_goals: Monroe seeks to advance within the textile manufacturing sector by becoming a lead sewing machine operator and eventually a shift supervisor. He plans to obtain certification in advanced
    industrial stitching technologies and expand his expertise to include embroidery and automated cutting equipment. In the next five years, he aims to mentor new operators, improve production efficiency,
    and secure a stable, long‑term position that matches his preference for routine. Ultimately, he envisions opening a modest bespoke tailoring shop that would allow him to apply his skills while maintaining
    a predictable work schedule.
