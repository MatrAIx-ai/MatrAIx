  career_goals: Jorge aims to advance to a team lead or supervisory role within his call‑center within the next two to three years, using his strong performance metrics and leadership potential. He plans
    to enroll in community‑college courses in business administration to earn an associate degree, eventually pursuing a bachelor’s in marketing or arts management. His long‑term ambition is to combine
    his customer‑service expertise with his passion for art by working in a cultural institution’s visitor services or community‑outreach department, where he can design engaging experiences for diverse
    audiences. He also seeks to become a certified CRM analyst to improve customer satisfaction scores and mentor new representatives.
