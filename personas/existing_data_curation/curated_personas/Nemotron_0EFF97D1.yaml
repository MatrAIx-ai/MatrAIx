  hobbies: '[''Visiting art museums and galleries'', ''Oil painting'', ''Collecting Mexican folk art'', ''Cooking traditional Mexican cuisine'', ''Reading historical biographies'', ''Book club participation'',
    ''Volunteering at cultural festivals'', ''Yoga'', ''Hiking in Texas Hill Country'']'
  career_goals: She aims to advance to a senior leadership role such as Finance Director or Chief Financial Officer within the next five years, focusing on integrating innovative data analytics and sustainable
    accounting practices. She is also passionate about guiding younger accountants, championing ESG reporting, and establishing a scholarship program for Mexican‑American students pursuing business degrees.
    Additionally, she hopes to curate a community art space that showcases Mexican and Latino artists.
