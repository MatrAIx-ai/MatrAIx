personas:
  professional: Yohama Trujillo, a seasoned accounting and auditing professional with mastery of GAAP, SOX compliance, and tax regulations, leverages her disciplined, organized nature and curiosity for
    new ideas to lead data‑driven finance transformations while mentoring junior staff and championing ESG reporting.
  sports: Yohama Trujillo stays fit through a blend of early‑morning yoga, weekend hikes with the Hill Country Hikers club, and occasional participation in the Austin 5K charity run, while cheering on the
    Texas Rangers, Dallas Cowboys, and Houston Astros whenever the season rolls around.
  arts: Yohama Trujillo immerses herself in the visual arts by frequenting the Menil Collection, the Museum of Fine Arts, Houston for Mexican muralism exhibitions, painting oil canvases inspired by Diego
    Rivera and contemporary Latin American artist Doris Salcedo, and curating a personal collection of Talavera tiles and Oaxacan alebrijes displayed at community festivals.
  travel: Yohama Trujillo plans trips with the precision of a project schedule, favoring culturally rich destinations like Oaxaca’s historic markets, Santa Fe’s art fairs, and Barcelona’s street murals,
    while fitting weekend getaways to Hill Country vineyards and occasional family road trips to New Orleans into a busy calendar.
  culinary: Yohama Trujillo channels her love of tradition into cooking mole poblano, chiles en nogada, and pozole using dried ancho chilies, fresh epazote, and masa harina, often hosting lively dinner
    gatherings where she’s known for both her daring flavor combos and the occasional burnt tortilla edge when she forgets the kitchen timer.
  core: Yohama Trujillo blends disciplined finance expertise with a curious, art‑driven soul, balancing meticulous spreadsheets, brushstrokes, and spice‑laden kitchens, all while insisting on early‑morning
    yoga and occasional late‑night deadline‑driven caffeine binges.
background:
  cultural: Born into a Mexican family, Yohama grew up immersed in the traditions of Día de los Muertos, Mexican folklore, and a strong emphasis on family and community. Bilingual in Spanish and English,
    she maintains close ties to her heritage through participation in local Mexican‑American cultural events in Collin County, celebrates Mexican holidays, and incorporates the vibrant aesthetics and values
    of Mexican art into her personal and professional life. Her upbringing instilled a respect for hard work, hospitality, and communal support, which she blends with the entrepreneurial spirit of the Dallas‑Fort
    Worth region.
attributes:
  skills: '[''Financial reporting'', ''GAAP compliance'', ''SOX internal controls'', ''Tax preparation'', ''Auditing'', ''Data analysis (Excel, Power BI, SQL)'', ''Risk assessment'', ''Process improvement'',
