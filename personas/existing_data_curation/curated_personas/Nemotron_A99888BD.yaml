  career_goals: Nicole dreams of one day becoming a scientist—perhaps an environmental researcher or wildlife biologist—because she is fascinated by the natural world she explores around Seattle. She also
    imagines herself as a detective or coder, attracted by logical problem‑solving and the chance to uncover hidden patterns. She expresses a desire to help animals and to develop technology that protects
    the environment, reflecting her competitive drive to excel and her wish to make a tangible difference.
