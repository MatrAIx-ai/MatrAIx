personas:
  professional: Marco Vigoya is a certified building inspector who leverages deep knowledge of IBC, Florida codes, and OSHA standards, employing drones and iAuditor to produce meticulous reports while competitively
    streamlining turnaround times and mentoring junior staff, and they apply a skeptical eye to uncover hidden deficiencies.
  sports: Marco Vigoya plays midfield for the Sunshine Soccer League’s St. Petersburg Strikers, avidly follows the Costa Rica national team and the Tampa Bay Buccaneers, and they spend Sunday mornings fishing
    with the Tampa Bay Anglers Club, balancing competitive team spirit with solo outdoor endurance.
  arts: Marco Vigoya unwinds by devouring mystery novels from Gillian Flynn and James Patterson, attending local theater productions at the St. Petersburg Center for the Arts, and they regularly playlist
    The Black Keys and classic blues while hosting barbecue evenings.
  travel: Marco Vigoya plans trips months ahead, returning each year to Costa Rica for family reunions in Monteverde, while also exploring Florida gems like Key West and historic St. Augustine, and they
    favor reward‑point flights and road‑trip itineraries that balance adventure with budget considerations.
  culinary: Marco Vigoya enjoys mastering the grill, serving up smoked ribs with chipotle rub, grilled mahi‑mahi topped with mango‑jalapeño salsa, and homemade corn‑bread, and they experiment with solar‑powered
    cooking gadgets while occasionally over‑salting sauces.
  core: Marco Vigoya blends a methodical, competition‑driven work ethic with a sociable, barbecue‑centric lifestyle, though they often wrestle with stress‑induced worry and a habit of double‑checking every
    detail.
background:
  cultural: Marco grew up in San José, Costa Rica, where the values of "pura vida," family cohesion, and Catholic traditions shaped his worldview. Bilingual in Spanish and English, he retains strong ties
    to the Costa Rican diaspora in the Tampa Bay area, often celebrating holidays like Día de la Independencia with traditional foods such as gallo pinto and casado. His cultural heritage instills a warm,
    hospitality‑driven approach to interpersonal interactions, which complements his natural sociability and talkative nature. While adapting to the structured, deadline‑oriented environment of American
    construction inspection, he blends his relaxed Costa Rican attitude with a disciplined, organized work ethic, allowing him to navigate both cultural expectations effectively.
