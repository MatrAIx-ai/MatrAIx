  career_goals: Marco aspires to become a senior inspector or chief building official for Hillsborough County, leveraging his expertise to shape local inspection policies and improve overall building safety.
    He plans to earn a bachelor’s degree in construction management, obtain additional certifications such as the Certified Professional Inspector (CPI), and eventually launch his own inspection consultancy
    that specializes in green building and energy‑efficient retrofits. His competitive nature drives him to set record‑low turnaround times for reports, mentor a high‑performing inspection team, and become
    a recognized speaker at industry conferences and community safety workshops.
