  hobbies: '["Reading historical biographies", "Gardening (heirloom vegetables)", "Bird-watching", "Crossword puzzles", "Sudoku", "Volunteering at the local library", "Cataloguing books", "Watercolor painting",
    "Listening to classical music", "Writing reflective journal entries"]'
  career_goals: Even at 90, Joseph's primary ambition is to leave a lasting, organized record of his family's story and the local history of Littleton for future generations. He aims to complete a memoir
    that weaves personal anecdotes with broader historical context, and to donate his curated archives to the Littleton Historical Society. Additionally, he wishes to ensure that his wife is cared for,
    by establishing a clear financial and caregiving plan, and to continue mentoring a small group of community volunteers, passing on his methodical approach to project management and collaborative harmony.
