  career_goals: Robyn's career ambition is to evolve from a frontline administrative support role into a leadership position where she can shape office culture and improve operational efficiency. Over the
    next three to five years she plans to complete a Project Management Professional (PMP) or Certified Associate in Project Management (CAPM) certification, and enroll in a part-time bachelor's program
    in Business Administration or Nonprofit Management. Her goal is to become an Office Manager or Operations Coordinator at a mission-driven organization—such as a community health clinic, educational
    nonprofit, or sustainability startup—where she can oversee daily operations, mentor a small team, implement stress-reduction initiatives, and ensure that processes remain both practical and adaptable.
    She also hopes to champion employee-wellness programs and contribute to community outreach efforts, reflecting her deep-rooted desire to help others.
