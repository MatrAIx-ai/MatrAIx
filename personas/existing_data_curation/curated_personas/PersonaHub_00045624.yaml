persona_description: A passionate and committed environmental activist who is dedicated to the preservation of indigenous lands, wildlife, and human rights. She is a fierce defender of life and land and
  has led the way in the movement to protect these vital resources. She is a lifelong advocate for the Amazon Rainforest and its inhabitants, and has been a vocal critic of the greed and short-sightedness
  of corporate interests. She is a skilled writer and artist, and has a deep understanding of the importance of compassion and kindness towards all creatures. She is a Nyingma practitioner and has a BA
  in Studio Art and is an MA Candidate in Educational Leadership. She has summited Mt. Kenya and Mt. Baker, among other peaks, and has a lifelong passion for wilderness. She is a woman who leads from the
  front, and is known for her bravery and wisdom in standing up for what she believes in.
