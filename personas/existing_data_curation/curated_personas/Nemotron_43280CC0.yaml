personas:
  professional: Raul Pereztorres, an emerging teen game‑design enthusiast, applies their love of structured planning and teamwork from Minecraft and basketball to create custom mod packs for the school’s
    coding club; they consistently meet deadlines and collaborate with classmates while maintaining a supportive, easy‑going attitude.
  sports: Raul Pereztorres, a dedicated member of their city’s youth basketball league who practices every Tuesday and Thursday with teammates that cheer for the Mississippi State Bulldogs, they also spend
    Saturday afternoons fishing on the Yazoo River, finding the steady casting rhythm a soothing complement to their structured athletic routine.
  arts: Raul Pereztorres, a comic‑book sketcher who draws superhero‑style panels inspired by Jack Kirby after school, while their playlists of Bad Bunny’s reggaetón hits and Celia Cruz’s salsa classics
    fuel spontaneous dance‑offs with their siblings, they blend visual creativity with rhythmic expression.
  travel: Raul Pereztorres, who plans trips with a detailed spreadsheet, looks forward to a family vacation to Old San Juan to explore its colorful colonial streets, live salsa bands, and local food stalls,
    while they also dream of a weekend ski outing in the Appalachian Mountains for a change of scenery.
  culinary: Raul Pereztorres, who delights in the family kitchen, follows step‑by‑step recipes to prepare arroz con gandules, alcapurrias, and pastelón, adding a pinch of smoked paprika for their personal
    twist, and they enjoy the predictable rhythm of chopping, stirring, and plating as a comforting creative outlet.
  core: Raul Pereztorres, a 14‑year‑old whose life is guided by routine‑driven hobbies like Minecraft building, basketball practice, and family cooking, they balance their creative spark with a persistent
    worry about school pressures, resulting in a friendly yet meticulously organized teen outlook.
background:
  cultural: 'Raul lives at the intersection of Puerto Rican heritage and Southern Mississippi culture. At home, Spanish is spoken, and family celebrations honor traditions such as Nochebuena and Three Kings''
    Day, with staples like pasteles and arroz con gandules on the table. Yet he also embraces Southern customs—church attendance, community barbecues, and the love of fishing in the local river. This blend
    gives him a bicultural identity: he code‑switches between Spanish and English effortlessly, enjoys both tropical rhythms and country crooners, and navigates the values of family closeness from his Puerto
    Rican roots alongside the hospitality and communal spirit of the South. He feels a strong sense of responsibility to honor his ancestors'' journey while forging his own path in a small Mid‑Southern
    town.'
