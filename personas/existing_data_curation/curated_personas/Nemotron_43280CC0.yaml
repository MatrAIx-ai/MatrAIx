  career_goals: Raul aims for a stable, hands‑on career that offers clear routines and reliable income so he can support his family. He plans to finish high school, possibly earning a GED, and then enroll
    in a community‑college trade program to become a certified automotive technician or electrician. He is attracted to the idea of working as a mail carrier or a maintenance worker because those jobs follow
    predictable schedules. Long‑term, he hopes to combine his technical skills with his bilingual ability by serving as a liaison for Spanish‑speaking residents in his community, ensuring he can give back
    while maintaining a secure livelihood.
