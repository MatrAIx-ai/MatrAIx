  hobbies: '[''Desert Hiking'', ''Native Plant Gathering'', ''Beadwork'', ''Acoustic Guitar'', ''Cooking Southwestern Cuisine'', ''Powwow Attendance'', ''Native Garden Cultivation'', ''Reading Indigenous
    History'', ''Mindfulness Meditation'', ''Desert Landscape Photography'']'
  career_goals: Carlos aims to complete his associate degree in Early Childhood Education within the next two years and obtain a Lead Teacher credential. He aspires to become the director of a community‑run
    childcare center in Maricopa County that integrates American Indian cultural curricula with structured, play‑based learning. His long‑term ambition includes designing a culturally responsive program
    that balances predictability with flexibility, mentoring junior staff, becoming a certified trainer in trauma‑informed childcare, and advocating for policy changes that support Indigenous families in
    the child‑care sector.
