personas:
  professional: Juan Trejosanchez, a veteran commercial driver turned aspiring logistics leader, leverages two decades of on‑the‑road experience with a knack for sales and bilingual client relations; they
    blend curiosity for telematics with practical maintenance know‑how, keep schedules tight yet adaptable, thrive on interacting with customers, often push themselves to out‑perform rivals while sometimes
    reacting emotionally under tight deadlines.
  sports: Juan Trejosanchez, an avid soccer enthusiast, plays midfield for the Baltimore Soccer Club’s adult community league, passionately roots for the Baltimore Ravens (NFL) and the Washington Capitals
    (NHL), tracks the MLS side D.C. United, and supplements his soccer training with weekend pick‑up basketball at the local recreation center.
  arts: Juan Trejosanchez, a music‑driven creative, fills the garage with the sounds of Celia Cruz, Marc Antonio, Bad Bunny and Shakira while restoring vintage cars, regularly attends the Baltimore Folk
    Festival and local church concerts, and enjoys occasional trips to the Baltimore Museum of Art to admire contemporary Latin‑inspired exhibits.
  travel: Juan Trejosanchez, a weekend road‑trip aficionado, maps family excursions along Maryland’s Chesapeake Bay Bridge, the historic streets of Annapolis, and the Appalachian vistas of Deep Creek Lake,
    while dreaming of a future cultural immersion vacation to Costa Rica’s cloud forests, balancing the desire for adventure with family budget constraints.
  culinary: Juan Trejosanchez, a competent home cook, expertly prepares pupusas stuffed with queso fresco and chicharrón, steaming tamales with masa de maíz and pork, and crisp yuca frita seasoned with
    garlic and lime, often gathering extended family around the dinner table to share these flavors while experimenting with fresh cilantro, jalapeños, and plantain leaves.
  core: Juan Trejosanchez blends a road‑warrior’s practical know‑how with a talkative, competitive spirit, juggling family‑centric cooking, vintage‑car passion, and a looming anxiety that fuels both high
    performance and occasional impulsive splurges.
background:
  cultural: Juan Antonio was born to Salvadoran parents who emigrated to the United States in the 1980s. He grew up in a bilingual household in Maryland, celebrating Salvadoran traditions such as Día de
    la Madre, Las Posadas, and the feast of San Salvador, while also participating in American holidays. His Catholic upbringing influences his community involvement and family values. He remains actively
    connected to the Salvadoran diaspora in Baltimore County, attending cultural events, supporting local businesses, and preserving the Spanish language at home. This bicultural identity shapes his worldview,
    culinary preferences, and his emphasis on close family ties.
attributes:
  skills: '[''Commercial Driving'', ''Vehicle Maintenance'', ''Route Planning'', ''Customer Service'', ''Sales Negotiation'', ''Bilingual Communication (Spanish/English)'', ''Inventory Management'', ''Safety
