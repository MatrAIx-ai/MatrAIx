  hobbies: '[''Playing soccer in a community league'', ''Cooking Salvadoran cuisine (pupusas, tamales)'', ''Listening to cumbia and salsa music'', ''Car restoration projects'', ''Attending local festivals
    and church events'', ''Weekend road trips with family'', ''Volunteering to teach Spanish'', ''Watching NFL and international soccer matches'']'
  career_goals: Juan Antonio aims to transition from hands‑on driving to a leadership role within the logistics sector. Over the next five years, he plans to obtain a CDL Class A with hazardous‑materials
    endorsement and complete a Certified Transportation Manager program. His ambition is to launch a small, family‑owned fleet serving local businesses in Maryland, leveraging his sales expertise to secure
    contracts and his driving background to ensure operational excellence. He also wants to mentor younger drivers, develop a reputation as a reliable regional sales manager, and achieve financial stability
    that supports his wife's and children's future. Recognizing his emotional reactivity, he intends to incorporate stress‑management training into his professional development.
