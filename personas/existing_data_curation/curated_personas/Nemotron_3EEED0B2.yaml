  hobbies: '[''Cooking Mexican cuisine'', ''Hiking and nature photography'', ''Yoga and mindfulness practice'', ''Journaling for self‑reflection'', ''Bilingual tutoring and community service'', ''Reading
    contemporary Mexican literature'', ''Participating in cultural festivals'']'
  career_goals: E aims to complete a Bachelor’s degree in Business Administration with a focus on Operations Management, positioning herself for a role as a supply‑chain analyst or junior project manager
    at a technology firm or a socially‑oriented nonprofit. She plans to obtain a PMP certification within the next three years to solidify her project‑leadership credentials. Her ultimate ambition is to
    combine her analytical expertise with her cultural insight to help small, family‑owned Mexican‑American businesses streamline operations and grow sustainably, while maintaining a stable, structured
    career path that mitigates her stress‑prone tendencies.
