  hobbies: '[''Woodworking and furniture making'', ''Vintage radio restoration'', ''Deer and turkey hunting'', ''Fishing in Tug Fork River'', ''Genealogical research'', ''Hiking Appalachian trails'', ''Church
    choir participation'', ''Skeet shooting competition'', ''Community event organization'']'
  career_goals: Although Calvin is no longer employed full‑time, he continues to set concrete goals that reflect his competitive spirit and desire for achievement. He aims to complete the construction of
    a family cabin using his own design by the end of next year, develop a structured mentorship program for at‑risk youth in Shelby Gap, document and publish a memoir of the region’s coal‑mining heritage,
    and maintain a healthy lifestyle through a disciplined daily routine of physical activity and nutrition. He also seeks to preserve his family's land by implementing sustainable forestry practices and
    ensuring the homestead remains financially self‑sufficient.
