personas:
  professional: Calvin Bourn, a 59‑year‑old former coal‑mine foreman turned community handyman, leverages meticulous planning, welding, carpentry, and diesel equipment repair expertise to deliver flawless
    projects, while their competitive drive pushes them to exceed standards in every restoration and volunteer fire‑response task.
  sports: Calvin Bourn, a devoted hunter and fisherman, spends autumn tracking deer and turkey in the Appalachian woods, casts lines on the Tug Fork River in summer, competes in skeet shooting with the
    Shelby Gap Skeet Club, and roots for the Charleston Dirty Birds as their go‑to minor‑league baseball team.
  arts: Calvin Bourn nurtures a love for the arts by crafting heirloom furniture while listening to Doc Watson’s folk ballads, cherishing the hymns of the church choir, and collecting vintage radio broadcasts
    featuring Benny Goodman’s legendary orchestra.
  travel: Calvin Bourn prefers purposeful road trips, having driven the Blue Ridge Parkway to explore historic towns and hike in Shenandoah, while dreaming of a heritage pilgrimage to the Scottish Highlands
    to trace their family’s clan origins.
  culinary: Calvin Bourn, a competent wood‑fire cook, favors hearty meals like venison stew seasoned with sage and rosemary, smoked turkey with apple‑cider glaze, and homemade cornbread made with stone‑ground
    cornmeal, often pairing them with fresh‑picked greens from their garden.
  core: Calvin Bourn, a detail‑obsessed retiree, channels their competitive streak into flawless woodworking, a strict budget, and relentless community organization, yet they hoard vintage radio parts and
    can’t resist a late‑night episode of classic westerns.
background:
  cultural: Calvin grew up in an Appalachian white community in Eastern Kentucky, where self‑reliance, family loyalty, and a strong work ethic are central values. The region’s legacy of coal mining, rural
    craftsmanship, and close‑knit church life shapes his worldview. He respects traditional customs such as communal gatherings, local storytelling, and the reverence for the land. While he embraces the
    practical, no‑nonsense mentality of his upbringing, he also carries a deep sense of pride in preserving Appalachian heritage, which influences his hobbies, community involvement, and his desire to pass
    on these traditions to younger generations.
attributes:
  skills: '[''Carpentry and woodworking'', ''Mechanical repair of diesel equipment'', ''Welding (MIG/TIG)'', ''Small‑scale farming and livestock care'', ''Budgeting and inventory management'', ''Community
