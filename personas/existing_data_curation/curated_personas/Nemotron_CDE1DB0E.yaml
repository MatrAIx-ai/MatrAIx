  career_goals: Mahendran aims to first earn his GED within the next year and then enroll in a community college program focused on information technology support or culinary arts, fields that align with
    his practical mindset. In the medium term, he plans to obtain certifications such as CompTIA A+ or a culinary apprenticeship, securing a stable, predictable job that can support his family. Long‑term,
    he hopes to become a certified network technician or a sous‑chef, positions that combine his technical aptitude with his love for structured, hands‑on work. He also expresses a desire to mentor younger
    students in his community, sharing the organizational habits that have helped him succeed.
