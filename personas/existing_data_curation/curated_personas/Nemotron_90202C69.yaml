  hobbies: '[''Bridge'', ''Poker'', ''Church socials'', ''Storytelling circle'', ''Woodworking'', ''Fishing'', ''Hunting'', ''Classic rock music'', ''College football'']'
  career_goals: Although retired, Nathan aims to remain a cornerstone of his community. He plans to mentor younger residents in practical trades, lead the annual New Creek town fair, and spearhead a local
    history preservation project that documents the coal‑mining legacy of Mineral County. He also aspires to author a memoir chronicling his Appalachian life, secure recognition as a volunteer coordinator,
    and maintain his health to celebrate his 80th birthday surrounded by family and friends.
