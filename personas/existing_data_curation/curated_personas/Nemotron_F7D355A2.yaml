personas:
  professional: Angelique Fuentes, a seasoned senior‑home cleaning specialist, channels their eco‑friendly expertise, bilingual fluency, and talkative charm into creating customized cleaning schedules that
    balance rigorous sanitation with the flexible needs of elderly clients, while mentoring new senior workers with patience and occasional assertiveness.
  sports: Angelique Fuentes stays active by salsa dancing at the senior center, walking their rescue dog Pepito through Fairfield County’s Westover Trails, and cheering for the Hartford Yard Goats and the
    New York Yankees while participating in a weekly senior tennis club at Fairfield Community Club, blending social fun with light cardio.
  arts: Angelique Fuentes, a vibrant member of the local church choir, delights in singing Spanish hymns alongside English ones, frequently enjoys the vibrant rhythms of Celia Cruz, the soulful ballads
    of Juan Luis Guerra, and the theatrical flair of contemporary Latin dance troupes, and they channel these influences into storytelling nights at the senior center.
  travel: Angelique Fuentes prefers a mix of leisurely road trips to New England’s coastal towns like Mystic and Newport, occasional cruises to Caribbean islands for their love of fresh seafood, and cultural
    pilgrimages to Andean villages to reconnect with culinary roots, always planning trips with a modest budget and a flexible itinerary to accommodate health considerations, and they relish the anticipation
    of each new destination.
  culinary: Angelique Fuentes showcases their culinary flair by preparing ceviche with fresh lime and cilantro, crispy empanadas de verde stuffed with cheese and garden herbs, and hearty arroz con menestra
    seasoned with achiote, while also experimenting with new fusion recipes and occasionally overindulging in sweet alfajores during gatherings, and they love sharing these dishes at community potlucks.
  core: Angelique Fuentes is a sociable, talkative senior who blends meticulous cleaning expertise, passionate cooking, and a love for dance into a life of community service, despite a lingering worry about
    finances and health that motivates their relentless planning, and they never miss an opportunity to be the center of a lively conversation.
background:
  cultural: Angelique grew up in a close‑knit Ecuadorian family that emphasized Catholic traditions, communal meals, and respect for elders. She carries forward the love of vibrant festivals like Carnaval
    and Día de los Difuntos, often preparing traditional foods and decorations for local celebrations. Her bilingual ability reflects her heritage, allowing her to bridge generations within both the Ecuadorian
    diaspora and her American community in Connecticut. Family gatherings are central to her identity, and she often shares recipes and folk stories passed down from her grandparents, preserving a sense
    of cultural pride while fostering connections with neighbors of diverse backgrounds.
