persona_description: A policy analyst who focuses on urban planning and community development, with a particular interest in improving access to affordable and nutritious food in underserved areas. This
  person is knowledgeable about zoning modifications, grants, and loans for new store development, and has experience implementing programs to address disparities in access to specific healthy foods. They
  are also familiar with mapping software and have a strong understanding of income levels and population density in low-income neighborhoods. This person is interested in the potential impact of public
  policy interventions on residents' food purchasing behavior and dietary habits, and how these interventions can simultaneously promote healthier choices among residents and a better supply of those choices.
