  hobbies: '["Visiting art galleries and museums", "Reading books on contemporary art and world cultures", "Cooking and sharing Salvadoran dishes", "Dancing to cumbia, salsa, and xuc at community events",
    "Painting watercolor scenes of Los Angeles neighborhoods", "Participating in community gardening projects", "Collecting and listening to Salvadoran folk music", "Watching documentary films about cultural
    history"]'
  career_goals: Although retired from formal employment, Zulma remains driven by a desire to contribute to her community and continue personal growth. She aims to launch a series of intergenerational workshops
    that celebrate Salvadoran cultural heritage, including cooking classes, dance sessions, and oral‑history storytelling circles. Zulma hopes to compile and publish a community‑based oral‑history book
    that captures the experiences of Salvadoran elders in Los Angeles. She plans to volunteer as a docent at the Los Angeles County Museum of Art, focusing on Latin American and Indigenous art, and to mentor
    younger volunteers in event planning and community outreach. Additionally, she aspires to develop a small community cookbook featuring fusion recipes that blend Salvadoran flavors with Californian ingredients,
    and to explore a new artistic medium such as pottery as a therapeutic outlet for anxiety and emotional well‑being.
