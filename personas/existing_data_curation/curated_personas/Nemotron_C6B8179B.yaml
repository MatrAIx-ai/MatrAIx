personas:
  professional: Zulma Sanchez, a 78‑year‑old retired community liaison turned volunteer docent, blends their bilingual fluency, art‑appreciation expertise, and outgoing spirit to guide visitors through
    Indigenous and global exhibits at LACMA, while juggling spontaneous intergenerational workshop planning that often runs into deadline anxiety.
  sports: Zulma Sanchez, an energetic 78‑year‑old who loves dancing cumbia, salsa, and xuc at the local senior center and participates in weekly walking groups through Griffith Park, cheers for the Los
    Angeles Dodgers, and occasionally joins a community garden fitness class, balancing activity with careful attention to joint pain while they stay socially engaged.
  arts: Zulma Sanchez, a watercolor enthusiast who paints the rolling hills and colorful streets of Los Angeles neighborhoods, frequently visits exhibitions featuring artists like Frida Kahlo, Mark Bradford,
    and Kehinde Wiley, and delights in listening to folk singers such as Silvio Rodríguez while they curate community art talks.
  travel: Zulma Sanchez, who prefers short, organized trips within California like a weekend escape to Santa Barbara’s historic missions or a coastal drive along Big Sur, dreams of a culturally immersive
    visit to a vibrant market town famed for its colorful textiles and street food, yet balances these plans against limited mobility and a fixed travel budget, making sure they can still attend local community
    events upon return.
  culinary: Zulma Sanchez, a seasoned home chef, masters traditional dishes like pupusas, tamales, and sopa de gallina, often experimenting with Californian twists such as avocado‑filled pupusas, while
    occasionally forgetting to set the timer and serving slightly over‑cooked tortillas to delighted neighbors, a quirk they quietly joke about.
  core: Zulma Sanchez, a vibrant 78‑year‑old community artist and storyteller, channels their curiosity, spontaneous nature, and occasional anxiety into lively workshops, heartfelt watercolor scenes, and
    soulful cooking that keep their neighborhood buzzing.
background:
  cultural: Zulma was born in a small town near San Salvador and grew up steeped in Salvadoran customs, Catholic traditions, and the vibrant music and folklore of her homeland. She migrated to the United
    States in her early twenties, eventually settling in Los Angeles’ Eastside, where a large Salvadoran diaspora thrives. The neighborhood’s street festivals, panadería bakeries, and community centers
    have helped her preserve her cultural identity while adapting to American life. Zulma participates in Semana Santa observances, patron saint celebrations, and the annual Feria del Pupusa, sharing these
    traditions with younger generations. She blends Salvadoran values of family cohesion, hospitality, and respect for elders with the multicultural dynamics of Los Angeles, creating a unique bicultural
    perspective that informs her art appreciation, cooking, and community involvement.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Traditional Salvadoran cooking", "Storytelling and oral history preservation", "Community event facilitation", "Art appreciation and critique",
