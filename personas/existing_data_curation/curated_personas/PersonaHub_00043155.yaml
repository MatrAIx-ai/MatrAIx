persona_description: Jana Evans Braziel, Assistant Professor at the University of Cincinnati, is a historian and expert in the study of race and lynching in the United States. She has conducted extensive
  research on the history of lynching and has written several books on the topic. Braziel is known for her detailed and comprehensive analysis of the reasons behind lynching and the impact it had on Black
  communities. She is a passionate advocate for social justice and has spoken out against racism and discrimination. Braziel's work has been widely recognized and has contributed significantly to the understanding
  of the history of lynching in the United States.
