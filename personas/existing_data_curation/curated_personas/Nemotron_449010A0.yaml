personas:
  professional: Marquita Evans, a seasoned detective in the Johnson County Sheriff’s Office, leverages two decades of expertise in evidence collection, forensic photography, and meticulous case documentation,
    pairing a pragmatic, organized workflow with a willingness to integrate emerging investigative technologies, while their built‑in skepticism drives a habit of double‑checking every lead.
  sports: Marquita Evans, a diligent hiker who trails Hoosier National Forest paths each weekend, also follows the Indianapolis Colts and supports the Chicago Bulls, and occasionally joins a local women’s
    softball league to stay active and unwind after intensive investigations.
  arts: Marquita Evans, a watercolour enthusiast who paints tranquil landscapes in their spare moments, frequents a downtown jazz lounge where the music of Miles Davis, Ella Fitzgerald, and B.B. King fuels
    their creative spirit, and devotes evenings to true‑crime literature by authors such as Ann Rule and Michelle McNamara.
  travel: Marquita Evans, a methodical planner, prefers short, well‑organized getaways—spending long weekends exploring Chicago’s blues clubs and attending the Indianapolis Museum’s art exhibits, while
    dreaming of a future trip to New Orleans for its famed jazz festivals, all balanced against their retirement budget and shift commitments.
  culinary: Marquita Evans, a competent home cook, enjoys preparing jambalaya, collard greens seasoned with smoked turkey, and sweet potato pie, often adding thyme, smoked paprika, and a dash of hot sauce,
    and they pair their meals with a dark roast French press coffee, savoring the ritual after a long day of case work.
  core: Marquita Evans is a meticulous, curiosity‑driven detective who balances disciplined solitude with a passion for jazz, watercolor, and hiking, yet they sometimes yield to nostalgic vinyl splurges
    and the challenges of maintaining consistent health habits amid demanding investigations.
background:
  cultural: Marquita is an African‑American woman rooted in the Midwest, with deep family ties to the Greenwood community. Growing up, she was exposed to the rich oral traditions and civil‑rights legacy
    of her heritage, which instilled a strong sense of justice and perseverance. Her cultural identity informs her investigative perspective—she is keenly aware of systemic issues and strives to ensure
    equitable treatment in her cases. Marquita participates in her church's outreach programs during holidays, honoring communal support while maintaining her private nature. She celebrates African‑American
    cultural holidays and enjoys the soulful rhythms of jazz and blues, which serve as both personal solace and a connection to her cultural roots.
attributes:
  skills: '[''Evidence collection and preservation'', ''Crime scene management'', ''Forensic photography'', ''Interview and interrogation techniques'', ''Analytical case file synthesis'', ''Investigative
