  hobbies: '[''Reading historical biographies and true‑crime literature'', ''Watercolor painting'', ''Hiking in local nature preserves'', ''Volunteering at a teen literacy program'', ''Participating in
    a small book club'', ''Attending jazz evenings'', ''Solving crosswords and logic puzzles'']'
  career_goals: Marquita aims to rise to a senior detective role, eventually overseeing a specialized unit such as cold case investigations or cybercrime within the Johnson County Sheriff's Office. She
    seeks to mentor younger detectives, fostering a culture of disciplined curiosity and practical problem‑solving. Recognizing the importance of continual learning, she plans to pursue advanced training
    in forensic science and leadership, while advocating for the integration of modern investigative tools that complement traditional methods. Long‑term, she envisions contributing to statewide policy
    development on investigative best practices, ensuring that her experience benefits both law enforcement and the broader community.
