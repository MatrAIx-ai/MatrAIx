  hobbies: '[''Gardening'', ''Cooking traditional South Asian dishes'', ''Knitting and crocheting'', ''Quilting'', ''Reading classic literature and devotional poetry'', ''Attending temple and community
    festivals'', ''Walking in local parks'', ''Listening to classic Bollywood music'', ''Storytelling with grandchildren via video calls'']'
  career_goals: Although retired, Devisha is driven to preserve her family’s cultural heritage and pass it on to younger generations. She aims to compile a handwritten cookbook of her beloved recipes, share
    them at the local South Asian community center, and mentor volunteers in organizing the annual Pongal and Diwali celebrations. She also hopes to establish a small intergenerational storytelling circle
    at the senior center, where elders can exchange life lessons and cultural narratives. Her goals are realistic, community‑focused, and rooted in her desire for harmony and practical contribution.
