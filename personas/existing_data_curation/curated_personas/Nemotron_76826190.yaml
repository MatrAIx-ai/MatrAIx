  career_goals: Ana aims to obtain her Professional Engineer (PE) license within the next three years and to lead larger infrastructure projects that incorporate green building standards and resilient design.
    She hopes to specialize in sustainable transportation systems for the growing Salt Lake metropolitan area, eventually taking on a senior project manager role where she can mentor junior engineers. Long‑term,
    she envisions founding her own consultancy focused on integrating cutting‑edge technology with culturally responsive community planning, leveraging her Mexican heritage to serve diverse neighborhoods.
