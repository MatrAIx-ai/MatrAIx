personas:
  professional: Ana Alanis, a 24‑year‑old junior civil engineer, they blend strong structural analysis and Python automation skills with a curiosity‑driven yet practical mindset, enabling them to streamline
    design workflows while advocating for sustainable transportation solutions in the Salt Lake metropolitan region.
  sports: Ana Alanis fuels their love for the outdoors by tackling Wasatch mountain trails in spring and summer, hitting the Brighton slopes in winter, and they stay fit through weekly trail runs and salsa
    cardio sessions, while cheering on the Utah Jazz and Real Salt Lake and maintaining a casual membership with the Wasatch Outdoor Club.
  arts: Ana Alanis revels in salsa dancing to classics like Celia Cruz's 'La Vida Es Un Carnaval', they unwind with sci‑fi novels by N.K. Jemisin, and they frequently attend Utah Symphony concerts and local
    mural tours, letting the rhythmic and narrative arts inspire both their engineering creativity and experimental kitchen creations.
  travel: Ana Alanis prefers a hybrid travel style, they meticulously plan weekend road trips to Arizona’s Grand Canyon while also embracing spontaneous visits to family gatherings in Oaxaca, Mexico for
    vibrant cultural festivals, and they dream of backpacking through the historic towns of Spain’s Andalusia region.
  culinary: Ana Alanis, an avid home cook at an intermediate skill level, they master traditional mole, tamales, and ceviche, often incorporating chipotle‑smoked chilies, fresh avocados, and locally sourced
    Utah wheat to craft inventive fusion dishes like quinoa‑infused mole tacos.
  core: Ana Alanis balances a meticulous engineering mindset with an adventurous palate, yet they habitually forget to water their indoor succulents while juggling trail hikes, salsa spins, and late‑night
    sci‑fi marathons.
background:
  cultural: Ana was raised in a bilingual household that celebrated Mexican traditions, from Día de los Muertos altars to weekly family meals featuring regional recipes. Her parents emigrated from Jalisco,
    and they instilled in her a deep respect for community, family cohesion, and the value of hard work. Growing up in Salt Lake City, Ana blends these cultural values with the outdoorsy, community‑oriented
    ethos of her Utah surroundings. She is fluent in Spanish and English, and she often incorporates Mexican cultural perspectives into her engineering projects, advocating for designs that are inclusive,
    socially responsive, and culturally aware.
