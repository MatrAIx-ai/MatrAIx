persona_description: A farmer who specializes in the management and control of pests, particularly caterpillars, using the knowledge of beneficial insects such as Habrobracon. He is experienced in the use
  of this insect to control the population of specific pests on crops and in the environment. He is aware of the importance of regular monitoring of the pest population and the optimal time for the application
  of the insect, as well as the importance of the rate of colonization and the intervals between displacements. He is also aware of the different stages of the insect's life cycle and the appropriate methods
  of control.
