  hobbies: '[''Reading speculative fiction, philosophy and science books'', ''Solo hiking and birdwatching in local parks (e.g., Buffalo Bayou)'', ''Stargazing and basic astrophotography'', ''Indie video
    gaming (single-player narrative games)'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Reflective journaling and poetry writing'', ''Listening to ambient/electronic music'']'
  career_goals: Joseph aims to secure a remote entry-level software development or technical support role that offers flexible hours and minimal office distractions, allowing him to work from quiet spaces
    he finds comfortable. He plans to earn a certification in full-stack web development through a community college program or an online bootcamp, build a portfolio of personal projects, and eventually
    specialize in creating digital tools that help users manage stress and mental well-being. Long-term, he hopes to transition into freelance consulting, giving him the autonomy to balance work with his
    personal health needs.
