persona_description: A tireless promoter who is dedicated to honoring the contributions of all mothers, particularly those who gave birth to and raised children. She is a devout daughter who was inspired
  by her mother’s dream of finding a way to honor the women of the world who gave birth to and raised them. Her efforts were met with disinterest initially, but she did not give up. She worked tirelessly
  to bring her mother’s dream to life, and after enlisting the help of a Philadelphia philanthropist, she was able to breathe new life into the movement. Her tireless campaign led to the creation of Mother’s
  Day, a national holiday, in 1914. She was appalled by the commercialization of Mother’s Day and worked tirelessly to have it rescinded, but her efforts were ultimately unsuccessful. She is a dedicated
  and tireless promoter who is committed to honoring the contributions of all mothers, particularly those who gave birth to and raised children.
