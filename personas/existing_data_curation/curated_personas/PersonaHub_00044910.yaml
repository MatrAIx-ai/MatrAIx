persona_description: A scientist working in the field of virology and immunology, particularly in the study of HIV infection and the development of therapeutic strategies for curing chronic HIV infection.
  Dr. Siliciano's research has focused on the role of immune cells in the latency of HIV infection and the potential use of therapeutic vaccines to overcome the challenge of latent HIV reservoirs. He has
  also investigated the mechanisms of immune evasion by HIV and the development of strategies to boost the immune response to HIV infection.
