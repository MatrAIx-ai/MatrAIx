  hobbies: '["Journaling for emotional regulation", "Reading fantasy and adventure novels", "Manga illustration and Chinese calligraphy", "Piano playing", "Community garden volunteering (vegetable gardening)",
    "Scratch programming for storytelling", "Small‑group book clubs and language circles"]'
  career_goals: Lien’s long‑term ambition is to work in a role where she can support children’s learning and emotional health. She dreams of becoming an elementary school teacher or a school counselor,
    hoping to create a safe, structured classroom environment that promotes both academic achievement and well‑being. In the short term, she aims to maintain high grades, earn a scholarship to a competitive
    high school, and take on leadership roles in her school’s peer‑support and community‑service clubs. She also plans to develop coping strategies for her own anxiety by participating in mindfulness workshops
    and eventually become a certified peer mentor to help other students manage stress.
