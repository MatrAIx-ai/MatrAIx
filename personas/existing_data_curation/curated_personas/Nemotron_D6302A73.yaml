personas:
  professional: A budding interactive storyteller and digital illustrator, Lien Wang channels their love for structure and narrative into creating Scratch‑based adventure games while balancing school responsibilities
    and a meticulous journaling routine.
  sports: An organized athlete, Lien Wang attends after‑school swimming lessons at the Fresno Aquatics Club, follows the Fresno State Bulldogs football season on weekends, practices weekly yoga and short
    jogging sessions for calm, and prefers solo or small‑group activities over large team sports.
  arts: A creative soul, Lien Wang spends afternoons sketching manga‑style panels inspired by Studio Ghibli visuals, practicing Chinese calligraphy with brush and ink, and playing piano pieces like Yiruma’s
    ‘River Flows in You’, weaving these artistic pursuits into a personal journal that fuels their storytelling imagination.
  travel: A curious traveler, Lien Wang has explored Yosemite’s waterfalls on a school hike, enjoyed a weekend at Disneyland’s themed attractions, and dreams of visiting the coastal city of Hualien to experience
    night markets and traditional dumpling festivals with a well‑planned itinerary that balances adventure and quiet reflection.
  culinary: A budding home chef, Lien Wang delights in rolling homemade pork‑and‑cabbage dumplings for Lunar New Year, crafting delicate mooncakes with lotus‑seed paste, simmering fresh tomato‑basil soup
    using herbs from the community garden, and indulging in bubble tea with tapioca pearls as an occasional sweet treat.
  core: Lien Wang is a disciplined yet imaginative 12‑year‑old who balances structured journaling, anxiety‑focused self‑care, and creative storytelling through manga and Scratch while quietly dreaming of
    future artistic and travel adventures.
background:
  cultural: Lien is a second‑generation Chinese‑American born and raised in Fresno, California. Her parents immigrated from Taiwan in the early 2000s, and the household blends traditional Chinese customs
    with American suburban life. Mandarin is spoken at home, and the family celebrates Lunar New Year, the Mid‑Autumn Festival, and teaches Lien traditional dishes like dumplings and mooncakes. Fresno’s
    large agricultural community and its diverse school district expose her to a mix of cultures, fostering a sense of inclusivity. The values of respect for education, family harmony, and community service
    emphasized in her upbringing shape her compassionate and cooperative nature, while the emphasis on structure and discipline aligns with her preference for predictability.
attributes:
  skills: '["Fluent Mandarin Chinese", "Proficient English reading and writing", "Organizational and planning skills", "Effective note‑taking and summarization", "Basic computer literacy (Google Classroom,
