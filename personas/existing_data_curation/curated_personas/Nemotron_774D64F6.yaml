personas:
  professional: Nestor Fraga is a budding LEGO architect who transforms complex sets into imaginative mini‑worlds, blending curiosity with practical building skills while often leaving brick pieces scattered
    as a sign of their relaxed, slightly disorganized approach.
  sports: Nestor Fraga kicks the ball for the local Mini Kickers soccer club, cheers for the city’s professional Tigers team on TV, and enjoys spontaneous games of basketball at school recess, balancing
    teamwork with a love for movement despite occasional forgetfulness about practice schedules.
  arts: Nestor Fraga draws whimsical cartoon characters inspired by classic comic strips, builds LEGO creations while listening to lively bomba and modern reggaetón beats from artists like Bad Bunny and
    El Gran Combo, and they often dance in the kitchen during cooking time, merging visual art with rhythmic expression.
  travel: Nestor Fraga loves weekend adventures to the nearby municipal park to collect shells and observe insects, dreams of a family road trip to the Grand Canyon, and they eagerly request visits to the
    city’s science museum, balancing curiosity-driven explorations with the comfort of familiar local spots.
  culinary: Nestor Fraga assists in the kitchen by measuring flour for chocolate chip cookies, slicing bananas for smoothies, and occasionally over‑salts pasta, demonstrating a budding culinary curiosity
    mixed with an occasional over‑enthusiastic seasoning habit.
  core: Nestor Fraga is a compassionate, curiosity‑driven 8‑year‑old who builds LEGO kingdoms, cares for goldfish, worries about small worries, and embraces music, sport, and cooking with a playful yet
    slightly disorganized flair.
background:
  cultural: Nestor is a proud Puerto Rican growing up in Bayamón, a vibrant municipality on the island. At home, Spanish is the primary language, while his school introduces English, giving him a bilingual
    foundation. His family participates in local traditions such as the annual Fiestas de Bayamón, where music, dancing, and community food stalls celebrate the island’s heritage. He enjoys classic Puerto
    Rican dishes like arroz con gandules and pasteles, especially when prepared with his mother’s guidance. The rhythms of bomba, plena, and contemporary reggaetón are part of his daily soundtrack, influencing
    his love for dancing. Community values—respect for elders, hospitality, and a strong sense of togetherness—are central to his upbringing, shaping his compassionate and cooperative personality.
