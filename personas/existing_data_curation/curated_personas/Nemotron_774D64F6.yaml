  career_goals: Nestor dreams of a future where he can combine his love for helping people with his curiosity about how things work. He often talks about becoming a doctor who cares for children, inspired
    by his desire to relieve others’ pain. He also imagines designing inventive toys or simple machines, hinting at a future engineer or inventor. At school he aspires to be a class helper or peer mentor,
    roles that let him support friends and keep the classroom harmonious. Ultimately, he wants a career that lets him make a positive impact on his community while continuing to learn and create.
