personas:
  professional: Orlando Santiago, a 69‑year‑old veteran construction laborer, leverages four decades of concrete mixing, framing, and scaffolding expertise, bilingual fluency, and a keen artistic eye to
    mentor crews, ensure high‑quality finishes, and pursue a transition into OSHA‑certified site safety inspection and a community‑focused handyman‑renovation business, and they balance meticulous organization
    with the flexibility needed for on‑site problem solving.
  sports: Orlando Santiago, an enthusiastic fan of the Fresno State Bulldogs baseball team and a regular participant in the senior center’s walking club, stays active through daily stretches, weekly pick‑up
    softball games at the local park, and a Saturday dance class that keeps them energetic despite occasional joint stiffness.
  arts: Orlando Santiago, who paints watercolor landscapes of the Central Valley and strums acoustic guitar to traditional folk ballads, regularly attends the Fresno Art Walk, draws inspiration from Frida
    Kahlo’s vibrant palette and the music of José Alfredo Jiménez, and they find that their curiosity for new techniques fuels a lifelong pursuit of creative expression.
  travel: Orlando Santiago prefers modestly planned trips that blend cultural immersion and family visits, has journeyed to the highland town of San Miguel de Allende for a reunion, explored the coastal
    cliffs of Big Sur on a road‑trip, and dreams of strolling through the historic streets of Seville, all while they budget carefully to maintain financial stability and manage the stress of travel logistics.
  culinary: Orlando Santiago, an accomplished home cook, spends weekends perfecting mole, simmering tamales wrapped in corn husks, and cultivating chilies and rosemary for fresh sauces, while they occasionally
    over‑season a dish in their enthusiasm for flavor, and they relish occasional meals at a local farm‑to‑table restaurant featuring grilled fish with avocado salsa.
  core: Orlando Santiago, a 69‑year‑old construction veteran with a watercolor brush in one hand and a guitar in the other, blends community mentorship, cautious budgeting, and a constant worry about health
    into a life driven by curiosity, kindness, and artistic flair, and they often find themselves juggling work, art, and family obligations with a mix of organization and flexibility.
background:
  cultural: Orlando is a first‑generation Mexican‑American whose parents immigrated from Jalisco. He grew up in a tight‑knit Latino neighborhood in the Central Valley, speaking Spanish at home and attending
    a Catholic parish where community celebrations marked holidays like Día de los Muertos, Navidad, and Cinco de Mayo. His cultural identity is reflected in his love for Mexican cuisine, folk music, and
    the tradition of mutual aid, which informs his collaborative work style and his commitment to giving back to his community. Though he has lived in Corcoran for most of his adult life, he maintains strong
    ties to his heritage through family gatherings, Spanish‑language radio, and regular trips to visit relatives in Mexico.
attributes:
  skills: '[''Concrete mixing and pouring'', ''Basic carpentry and framing'', ''Masonry'', ''Scaffolding assembly and safety'', ''Operating light heavy‑equipment'', ''Blueprint reading'', ''OSHA safety
