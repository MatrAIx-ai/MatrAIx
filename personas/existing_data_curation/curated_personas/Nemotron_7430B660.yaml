  hobbies: '[''Watercolor painting'', ''Acoustic guitar (Mexican folk music)'', ''Cooking traditional Mexican dishes'', ''Attending art walks and cultural festivals'', ''Gardening (chilies, herbs)'', ''Senior
    center dance classes'', ''Volunteering as a construction mentor'', ''Watching baseball games'']'
  career_goals: Orlando hopes to transition from physically demanding labor to a supervisory and educational role. Over the next two years he plans to obtain his GED and complete an OSHA‑Certified Safety
    Officer course, which will allow him to work as a site safety inspector. He also dreams of launching a small handyman‑renovation business that focuses on low‑income homeowners in the Central Valley,
    where he can apply his artistic sensibility to tasteful home upgrades. In the longer term, he would like to lead community workshops that teach basic construction and home‑maintenance skills to seniors
    and at‑risk youth, combining his love for teamwork with his desire to give back.
