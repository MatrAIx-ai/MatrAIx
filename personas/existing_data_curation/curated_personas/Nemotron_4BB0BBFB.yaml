personas:
  professional: Natasha Wagner, a budding junior botanist, spends afternoons at the Dane County Farmers’ Market gathering leaves and tiny wildflowers with a child-sized magnifying glass, organizing her
    finds into neat piles, which showcases her curiosity balanced by practical tidiness and her easygoing nature.
  sports: Natasha Wagner loves toddler gymnastics at the Madison Community Center, cheerfully chants for the Wisconsin Badgers during Saturday basketball games, and dribbles a tiny soccer ball with the
    Edgewater Youth Soccer Club, reflecting a playful yet organized approach to fitness and teamwork.
  arts: Natasha Wagner enjoys coloring scenes from Van Gogh's Sunflowers, dancing to Raffi's "Baby Beluga" and The Wiggles' "Fruit Salad," and eagerly watches classic Disney movies like The Lion King, integrating
    vibrant visual arts with lively musical experiences that shape her creative identity.
  travel: Natasha Wagner's favorite adventures include weekend picnics on the shores of Lake Mendota, family road trips to the Wisconsin State Fair where she samples kettle corn and rides the carousel,
    and a short getaway to Mackinac Island where she collects seashells and delights in the off‑grid atmosphere, preferring spontaneous bursts of exploration guided by her parents' itineraries.
  culinary: Natasha Wagner loves buttery cheese curds, crunchy pretzels, and helps stir blueberry pancake batter, often requesting extra strawberry slices atop her mac and cheese, and delights in tasting
    fresh apple slices during farmers' market visits, showcasing a palate that mixes classic comfort foods with fresh, seasonal produce.
  core: Natasha Wagner, a three‑year‑old with a perpetual magnifying glass, blends boundless curiosity with calming practicality, arranging toys by color, swapping bedtime stories for extra sticker trades,
    and never lets a spilled milk puddle ruin her sunny smile.
background:
  cultural: Natasha is raised in a white, middle‑class family in Madison, Wisconsin. Her upbringing reflects typical Midwestern values such as community involvement, modesty, and an appreciation for outdoor
    activities. The family celebrates widely observed American holidays like Thanksgiving, Christmas, and the Fourth of July, and also participates in local traditions such as visiting the Dane County Farmers'
    Market, attending the State Fair, and taking trips to nearby lakes for swimming and picnics. While primarily American in cultural practice, occasional references to German and Scandinavian heritage
    common in the region appear in family meals (e.g., sausages, pretzels, and rye bread) and seasonal music.
