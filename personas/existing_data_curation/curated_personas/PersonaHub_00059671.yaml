persona_description: An educational consultant and author with a unique blend of educational pedagogy and neuroscience research, David Hodgson aims to help teachers, students, and school leaders identify
  and capitalize on their natural strengths through practical strategies for improving behavior, confidence, resilience, as well as classroom and exam performance. His interactive sessions cover topics
  such as the three key things all great learners do, and consider how best to apply the latest brain research and psychology of learning, retention, motivation, and metacognition in the classroom experience.
  Hodgson's published books include "The Buzz," "The Brainbox," "Personality in the Classroom," and "The Little Book of Inspirational Teaching Activities."
