personas:
  professional: A budding content strategist, Teyonna Jones blends visual storytelling talent with a pragmatic approach to community outreach, leveraging Photoshop, Illustrator, and Premiere Pro to craft
    compelling social‑media campaigns for Houston nonprofits, while they often battle deadline procrastination due to their spontaneous work style.
  sports: An aspiring casual athlete, Teyonna Jones follows the Houston Astros and Houston Rockets, participates in a local community yoga studio, and joins a weekend pick‑up basketball league at a city
    park, preferring low‑key fitness routines over high‑intensity training; they enjoy the occasional sprint to the gym when inspiration strikes.
  arts: A passionate visual and literary aficionado, Teyonna Jones roams Houston's street‑art corridors photographing murals, draws inspiration from artists like Kehinde Wiley and musicians such as Janelle
    Monáe, and attends poetry slams featuring voices like Danez Smith, weaving these influences into their own blog essays; they often spend late nights editing photos to capture the contrast of light and
    shadow.
  travel: An adventurous yet budget‑mindful wanderer, Teyonna Jones has road‑tripped to New Orleans for its jazz and cuisine, explored the historic districts of Savannah, dreams of a cultural immersion
    in Marrakech, and typically plans trips spontaneously with friends while keeping an eye on student‑loan constraints; they relish the thrill of discovering a hidden café on a rainy afternoon.
  culinary: A creative home‑cook, Teyonna Jones experiments with Southern‑comfort staples fused with Caribbean heat, whipping up dishes like jerk‑spiced shrimp and grits, plantain‑infused cornbread, and
    sweet‑potato pie with ginger, relying on ingredients such as Scotch bonnet peppers, coconut milk, and collard greens to add bold flavor; they often keep a notebook of flavor pairings taped to the fridge.
  core: Teyonna Jones, a 20‑year‑old budding content strategist, navigates life with a blend of spontaneous creativity, community‑driven purpose, and a perpetual tug‑of‑war between disciplined budgeting
    and impulsive artistic splurges; they constantly juggle deadlines with bursts of inspiration.
background:
  cultural: Teyonna identifies as African American and grew up in the culturally rich neighborhoods of Houston, a city known for its blend of Southern traditions and global influences. Her family has deep
    roots in the local Black church community, which emphasized collective support, music, and storytelling. These experiences nurtured her appreciation for soulful music genres like R&B, neo‑soul, and
    hip‑hop, and instilled a sense of responsibility toward community uplift. Houston's diverse Black heritage—celebrated through events such as Juneteenth festivities and the annual Black Heritage Festival—has
    shaped her worldview, reinforcing values of resilience, creativity, and solidarity. While navigating the broader societal challenges faced by Black youth, Teyonna draws strength from her cultural identity,
    channeling it into her artistic expression and aspirations to empower others.
attributes:
  skills: '["Content creation (graphic and video)", "Social media strategy", "Adobe Photoshop, Illustrator, Premiere Pro", "Basic web development (HTML, CSS, WordPress)", "Copywriting and storytelling",
    "Community outreach and volunteer coordination", "Event planning for small groups", "Photography (portrait and street)", "SEO fundamentals", "Data‑driven audience analysis"]'
  hobbies: '["Photography (street and portrait)", "Exploring local street art", "Reading African‑American literature and poetry", "Creative writing and blogging", "Yoga and mindfulness journaling", "Cooking
    fusion dishes (Southern and Caribbean)", "Board‑game nights with close friends", "Attending open‑mic and poetry slam events", "Mentoring youth in digital storytelling", "Sustainable urban gardening"]'
  career_goals: Teyonna aims to complete her bachelor's degree in Communications or Marketing within the next two years, supplementing her studies with a certification in digital media design. She envisions
    securing a junior content strategist role at a community‑focused nonprofit in Houston, where she can combine her storytelling talent with her passion for social equity. Long‑term, she aspires to lead
    a outreach program that amplifies the voices of underrepresented youth, and eventually launch her own boutique agency that offers affordable digital marketing services to small Black‑owned businesses.
    Throughout this journey, she hopes to refine her project‑management skills to meet deadlines more consistently while preserving her spontaneous, creative flair.
