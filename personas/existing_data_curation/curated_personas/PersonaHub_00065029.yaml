persona_description: A professor who conducts an experiment involving a game where students make decisions by choosing to play a red or black card, and the cost of making a high-effort decision is $1. The
  experiment is designed to explore the impact of group size and the value of making a costly effort on the earnings of students. The professor may conduct additional rounds in which the value of a high-effort
  decision is reduced, such as earning $1 for playing a red card and $2 if ALL play a black card. The experiment is likely to be conducted in a classroom setting with students participating in pairs or
  larger groups of students.
