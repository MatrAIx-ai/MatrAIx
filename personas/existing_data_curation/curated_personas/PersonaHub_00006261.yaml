persona_description: 'A computer scientist who specializes in network security, particularly in developing new technologies to detect and prevent botnets and other malicious traffic. His research has led
  to the development of a new approach to detecting network intrusions that offers a significant improvement over the current state of the art. He has developed a new technology called Nemean Networks,
  LLC, which seeks to hunt down a slight vulnerability in malicious traffic: the unique "signature" such traffic generates. He has received support from the National Science Foundation, the Army Research
  Office, and the Department of Homeland Security, and his research has been funded by an angel investment group composed of UW–Madison alumni.'
