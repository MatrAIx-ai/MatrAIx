personas:
  professional: Lia Walters, a retired horticulturist and community volunteer, blends their deep knowledge of seasonal gardening, watercolor artistry, and empathetic listening to mentor younger volunteers,
    though their relaxed attitude toward deadlines sometimes leads them to shuffle project timelines at the last minute.
  sports: Lia Walters enjoys early-morning nature walks with the Blue Ridge Senior Hiking Club, participates in a gentle weekly tai chi class at the community center, and quietly roots for the Atlanta Braves
    and Charlotte Hornets during baseball and basketball seasons.
  arts: Lia Walters, an avid watercolorist, draws inspiration from the soft hues of Winslow Homer and the lyrical storytelling of folk singer Joan Baez, while attending monthly performances of classic plays
    at the local community theater featuring interpretations of Tennessee Williams' works.
  travel: Lia Walters prefers low-key road trips to historic towns like Savannah, Asheville, and Charleston, often traveling with a small group of friends and planning itineraries around garden tours and
    local archives, while dreaming of a gentle pilgrimage to the English Cotswolds to trace ancestral roots.
  culinary: Lia Walters expertly preserves seasonal peaches into fragrant cobbler jam, crafts tangy homemade barbecue sauce with a hint of brown sugar and smoked paprika, and delights in experimenting with
    traditional Southern dishes such as shrimp and grits, always sourcing fresh garden herbs like thyme and basil.
  core: Lia Walters balances a quiet, curiosity-driven life of watercolor painting, genealogy, and community mentorship with a gentle worry about unfinished projects and occasional forgetfulness, gifting
    crocheted shawls to neighbors while savoring the comfort of homemade preserves.
background:
  cultural: Lia was born and raised in a modest farming community in Iredell County, North Carolina. Her family has deep roots in the South, tracing back to generations of small‑scale farmers and church
    volunteers. The values of Southern hospitality, strong church involvement, and close‑knit family ties shaped her early years. Growing up during the civil rights era, she witnessed both the challenges
    and the gradual social changes of the time, which fostered a quiet openness to new ideas while preserving a reverence for tradition. Her cultural identity blends the modest, self‑reliant ethos of rural
    North Carolina with a lifelong curiosity that pushes her to explore art, history, and diverse perspectives. This background informs her preference for intimate gatherings, her appreciation for communal
    rituals like potlucks and church services, and her desire to contribute meaningfully to her community while honoring the legacy of her ancestors.
