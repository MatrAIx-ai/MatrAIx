personas:
  professional: Joan Howard, a retired engineering researcher with a knack for data analysis and technical writing, channels their methodical, competitive nature into volunteer STEM mentorship, meticulous
    genealogy projects, and a bid for the Wayne planning commission where they champion evidence‑based, sustainable development.
  sports: Joan Howard stays active with gentle morning birdwatching walks and a membership in the Wayne Senior Walking Club, while they loyally follow the Detroit Tigers, the Detroit Lions, and occasionally
    join a low‑impact water aerobics class at the community center.
  arts: Joan Howard finds artistic fulfillment in knitting intricate Fair Isle patterns, devouring historical nonfiction by David McCullough and Barbara Tuchman, attending local museum exhibitions featuring
    Monet and O'Keeffe, and listening to the soothing piano sonatas of Beethoven while sipping tea.
  travel: Joan Howard prefers meticulously planned, small‑group excursions to historic locales—she has explored Colonial Williamsburg, the cobblestone streets of Savannah, and the Great Lakes shoreline,
    and she dreams of a guided heritage tour of Boston’s Freedom Trail, always balancing comfort with their modest travel budget.
  culinary: Joan Howard, an adept yet modest home cook, favors farm‑to‑table dishes like roasted heirloom tomatoes with rosemary, kale and bean stew, and Sunday vegetable frittatas, often using fresh carrots
    and zucchini from their garden while playing crossword puzzles on the kitchen counter.
  core: Joan Howard, a meticulous 79‑year‑old who blends scientific rigor with a love for genealogy and gardening, navigates life with a competitive edge, an ever‑present worry, and a steadfast devotion
    to community service.
background:
  cultural: Joan was raised in a middle‑class, post‑war suburb of Philadelphia as the eldest child of a family with German‑English ancestry. The community emphasized hard work, education, and civic duty,
    while also valuing privacy and modesty. Lutheran church gatherings and local volunteer traditions instilled a sense of responsibility to neighbors, and an early fascination with science encouraged her
    pursuit of a graduate degree in engineering. Now living in Wayne, Delaware County—a borough known for its historic charm and progressive civic engagement—she blends respect for local heritage with an
    openness to evidence‑based innovation.
attributes:
  skills: '["Data analysis", "Technical writing", "Project management", "Statistical software (SPSS, R)", "Python scripting", "Genealogy research", "Horticulture", "Community budgeting", "STEM mentorship",
