  hobbies: '["Gardening", "Genealogy research", "Crossword puzzles", "Sudoku", "Historical nonfiction reading", "Small‑group book club", "Knitting", "Birdwatching", "Senior computer tutoring"]'
  career_goals: Although no longer employed, Joan aims to keep her analytical mind active and to make a lasting contribution to her community. She plans to publish a locally focused historical manuscript
    that weaves together her genealogical discoveries, to expand the senior‑oriented STEM mentorship program at the community center, and to secure a seat on Wayne’s planning commission where she can advocate
    for evidence‑based, sustainable development. Personally, she aspires to earn a certificate in historic preservation and to maintain a disciplined health regimen that helps manage her natural tendency
    toward worry.
