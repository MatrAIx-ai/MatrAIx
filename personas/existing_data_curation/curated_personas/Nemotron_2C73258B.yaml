  hobbies: '[''Gardening'', ''Cooking traditional Mexican dishes'', ''Walking the Delta Trails'', ''Yoga and mindfulness meditation'', ''Reading non-fiction (finance, self-help)'', ''Journaling'', ''Community
    volunteering for free tax assistance'', ''Puzzles (Sudoku, crosswords)'', ''Attending local cultural festivals'']'
  career_goals: Noris aims to obtain her CPA license within the next year and advance to a senior audit manager role where she can mentor junior staff, particularly women and Latinx accountants. She envisions
    leading a compliance team that implements streamlined, technology‑driven audit processes, reducing manual effort and increasing accuracy. Long‑term, she dreams of opening her own boutique accounting
    practice focused on serving low‑income Mexican‑American families and small businesses in San Joaquin County, providing affordable tax assistance and financial education. Balancing career growth with
    personal well‑being, she seeks a supportive work environment that allows flexible hours and resources for stress‑management.
