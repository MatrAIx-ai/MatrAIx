    regional cuisines'']'
  career_goals: Olivia aims to move from line cook to sous chef within the next two years, using her knack for spontaneous creativity to influence menu development. She dreams of eventually opening a small,
    community‑focused bistro in Mansfield that showcases Midwestern farm‑to‑table dishes infused with global twists. To achieve this, she plans to enroll in a culinary certification program to sharpen her
    organizational and leadership skills, and she hopes to mentor junior kitchen staff, fostering a collaborative and harmonious work environment.
