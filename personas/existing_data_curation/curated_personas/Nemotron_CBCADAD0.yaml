personas:
  professional: Margaret Merchant leverages their PE license and PMP certification to lead cross‑disciplinary engineering teams, weaving a methodical project management style with a genuine curiosity for
    sustainable design, while habitually juggling stakeholder meetings, mentoring junior engineers, and occasionally slipping into late‑night email marathons that keep their family dinner plans on hold.
  sports: Margaret Merchant hits the Chesapeake Bay trails every Saturday with their local hiking club, volunteers for a community softball team in the spring, and follows the Washington Capitals for hockey,
    while using yoga as their primary fitness regimen to counterbalance long hours at the drafting table.
  arts: Margaret Merchant shines on stage as a leading actress in their community theater’s production of 'Our Town', curates lively book‑club debates about historical fiction authors like Ken Follett and
    Hilary Mantel, and swears by live performances at the local music venue The Anthem featuring Americana artists such as Brandi Carlile and blues guitarist Gary Clark Jr.
  travel: Margaret Merchant enjoys meticulously planned weekend road trips to historic sites like Colonial Williamsburg and the Blue Ridge Parkway, dreams of a summer retreat in Asheville’s craft brewery
    scene, and balances their wanderlust with a finite vacation budget that forces them to prioritize family‑friendly destinations over solo adventures.
  culinary: Margaret Merchant regularly crafts Southern comfort meals—fried chicken with collard greens, shrimp and grits, and sweet potato casserole—using garden‑fresh tomatoes, kale, and peppers, while
    experimenting with international dishes like Korean bibimbap, and insists on sourcing smoked paprika and cayenne from their local farmer’s market.
  core: Margaret Merchant is a socially vibrant, meticulously organized civil engineer who fuses sustainability passion with theatrical flair, juggling late‑night project emails, garden harvests, yoga breaths,
    and a love for Southern comfort food.
background:
  cultural: Margaret was raised in a small town in southeastern Virginia, where Southern hospitality and a strong sense of community were integral to daily life. Her family placed a high value on education—both
    parents were educators who encouraged curiosity and practical problem‑solving, which later guided her pursuit of a STEM graduate degree. The blend of rural traditions, such as family gatherings at local
    farms and participation in county fairs, with an academic environment at a state university gave her a balanced worldview. She maintains close ties to her roots through involvement in the local church,
    volunteer work at community events, and a deep appreciation for regional history and the Chesapeake Bay’s natural landscape.
