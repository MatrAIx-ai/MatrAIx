  career_goals: Margaret aims to transition into a senior leadership role, such as Director of Engineering or Vice President of Operations, where she can shape strategic infrastructure initiatives for her
    region. She is passionate about integrating sustainable design practices, like green stormwater management, into public projects, and she plans to lead a county‑wide flood resilience program. In parallel,
    she hopes to expand mentorship programs for women and underrepresented groups in STEM, leveraging her position in professional societies to advocate for inclusive workplace policies. Achieving full
    licensure in multiple engineering disciplines and publishing technical articles on resilience engineering are also key milestones.
