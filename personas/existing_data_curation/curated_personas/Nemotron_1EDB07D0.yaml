  hobbies: '["Dancing (Mexican folk and salsa)", "Cooking traditional Mexican dishes", "Volunteering at senior center (organizing bingo & storytelling)", "Gardening (desert plants)", "Walking along the
    Rio Grande", "Listening to ranchera and corrido music", "Exploring HR software and online tools", "Reading historical novels about Mexican‑American heritage", "Participating in bilingual book clubs",
    "Attending community festivals and fiestas"]'
  career_goals: Lydia aims to transition from day‑to‑day administrative duties to a mentorship and advisory role within her organization, guiding younger HR staff and sharing her practical knowledge. She
    hopes to develop a community‑focused outreach program that connects local businesses with job‑seekers from the El Paso area, especially recent graduates and bilingual candidates. Completing her GED
    and earning basic HR certification are personal milestones she wishes to achieve before full retirement. Ultimately, she wants to be recognized for creating a more inclusive, people‑centered workplace
    culture and to leave a lasting impact through stories and best‑practice guides she can pass on to future generations.
