  hobbies: '[''Weight training'', ''Basketball'', ''Strategic video games (e.g., chess, turn‑based strategy)'', ''Listening to reggae, dancehall, salsa'', ''Cooking Caribbean and Southern cuisine'', ''Volunteer
    computer tutoring'', ''Reading personal‑development literature'', ''Reflective journaling'']'
  career_goals: James aims to translate his structured approach and practical abilities into a stable, full‑time role that offers clear responsibilities and a predictable schedule. In the short term, he
    plans to complete his associate degree in Business Administration or earn an industry‑recognized IT certification such as CompTIA A+, to qualify for entry‑level positions in administrative support,
    help‑desk, or logistics coordination. He seeks a position that values reliability and organization, where he can contribute to process improvement while learning on the job. Over the next five years,
    he hopes to advance to a project coordinator or operations specialist role, supervising small teams and managing workflow across departments. Simultaneously, he is committed to strengthening his stress‑management
    skills through professional development, aiming for financial stability that reduces personal anxiety.
