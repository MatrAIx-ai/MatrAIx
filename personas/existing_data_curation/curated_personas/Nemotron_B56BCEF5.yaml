personas:
  professional: James Dalger leverages their business coursework, Excel wizardry, and practical IT troubleshooting skills to thrive in entry‑level administrative support or help‑desk roles, relishing the
    predictable rhythm of ticket queues and systematic process documentation while quietly fretting over any missed deadlines.
  sports: James Dalger maintains a regimented fitness regimen of weight training three times a week and plays pickup basketball with the local YMCA league on weekends, proudly cheering for the Miami Heat
    and Miami Marlins while also following the FIU Panthers for college basketball excitement.
  arts: James Dalger finds creative release by listening to Bob Marley, Sean Paul, and Celia Cruz, practicing basic salsa steps at community festivals, and occasionally noodling on a portable keyboard while
    cooking, which blends their love for rhythm, melody, and cultural celebration.
  travel: James Dalger prefers structured travel plans that balance adventure with affordability, having explored New Orleans for its music scene, the Florida Keys for a weekend escape, and Montego Bay,
    Jamaica for a taste of Caribbean beaches, while dreaming of a future trip to the Dominican Republic’s historic Zona Colonial.
  culinary: James Dalger experiments in the kitchen with dishes like jerk chicken seasoned with Scotch bonnet peppers, creamy mac & cheese enriched with smoked gouda, and collard greens cooked with smoked
    turkey, often pairing meals with rum‑infused sauces and documenting each recipe in a Notion cookbook for future gatherings.
  core: James Dalger is a hyper‑organized, stress‑prone 27‑year‑old who balances a love for structure with a lively community heartbeat, constantly juggling spreadsheets, weight‑lifting sessions, and spontaneous
    dance steps at neighborhood festivals.
background:
  cultural: James is a second‑generation Haitian‑American who grew up in Miami’s Little Haiti neighborhood, surrounded by the sounds of Kompa, the aromas of Caribbean cuisine, and a vibrant community of
    recent immigrants and long‑time residents. While Haitian Creole was spoken at home, his education and social circles exposed him to English and the broader African‑American culture of Miami‑Dade County.
    This blend of Caribbean heritage and Southern‑flavored African‑American traditions informs his values of family solidarity, community service, and resilience. He regularly participates in cultural festivals
    such as the Haitian Independence Day celebrations and the local Caribbean Carnival, and he attends his local Baptist church, where gospel music and communal support play central roles. These experiences
    shape his worldview, giving him a strong sense of identity rooted in both his Caribbean ancestry and the diverse, multicultural fabric of Miami.
attributes:
