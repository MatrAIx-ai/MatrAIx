  career_goals: Short‑term, Victor aims to secure an entry‑level position or internship with a Miami‑based nonprofit or cultural organization where he can apply his design and community‑engagement skills
    while expanding his formal education toward a bachelor’s degree in Fine Arts or Social Work. He intends to build a robust portfolio of digital artwork, photography, and event‑planning projects, and
    to earn certifications in UX design and video production. Long‑term, he envisions becoming a program director for an arts‑outreach initiative that brings creative workshops and therapeutic art experiences
    to under‑served youth in the Cuban diaspora. Ultimately, he hopes to launch his own freelance studio that blends graphic design, community storytelling, and art‑therapy services, using his cultural
    background and compassionate drive to foster social cohesion and personal empowerment.
