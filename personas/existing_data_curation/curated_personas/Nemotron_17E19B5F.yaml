personas:
  professional: Victor Herrera is a budding graphic designer and community organizer who leverages their bilingual fluency, digital illustration skills, and relaxed, improvisational approach to create vibrant
    social‑media campaigns for Miami’s nonprofit arts scene, though they often miss deadlines due to a penchant for spontaneous inspiration.
  sports: Victor Herrera stays active through sunrise beach jogs, spontaneous salsa dancing at neighborhood cafés, and occasional pick‑up basketball games at the Miami Heat fan club’s community courts,
    preferring the laid‑back rhythm of movement over structured gym routines and sometimes skipping workouts when a new art project captures their attention.
  arts: Victor Herrera immerses themselves in Miami’s vivid street‑art panorama, channeling the bold graphics of Shepard Fairey and the dreamlike palettes of Frida Kahlo while winding down to the eclectic
    sounds of Radiohead, Tame Impala, and Beyoncé, which together fuel their own digital illustration and animation experiments.
  travel: Victor Herrera prefers spontaneous, low‑cost getaways that blend culture and scenery, having already backpacked through Key West’s art districts and the historic streets of New Orleans, and now
    dreaming of a week‑long immersion in the colorful neighborhoods of Oaxaca, Mexico, where they can photograph murals and share meals with locals.
  culinary: Victor Herrera enjoys recreating family recipes like ropa vieja and arroz con pollo using aromatic cumin, cilantro, and a splash of orange‑wine vinegar, while also experimenting with vegan jackfruit
    tacos, and they often host communal feasts where diners splash salsa over homemade empanadas, balancing their love for traditional flavors with a curiosity for new culinary twists.
  core: Victor Herrera is a restless creative who blends street‑art enthusiasm with compassionate community work, but they’re notorious for losing their sketchbook in cafés and forgetting to bill clients
    until the last minute.
background:
  cultural: Victor was born and raised in Miami’s vibrant Cuban‑American enclave, where his family’s traditions blend the rhythms of Havana with the pace of South Florida. He grew up bilingual, celebrating
    Cuban holidays such as El Día de la Cultura Cubana, learning to play classic son and salsa music, and helping prepare family meals that center on rice, beans, plantains, and fresh seafood. His grandparents’
    stories of migration and resilience instilled a strong sense of familismo and community responsibility. Though he embraces the multicultural fabric of Miami, Victor remains deeply connected to his Afro‑Cuban
    roots, participating in local festivals, attending community dance workshops, and supporting neighborhood initiatives that preserve Cuban heritage while fostering cross‑cultural dialogue.
