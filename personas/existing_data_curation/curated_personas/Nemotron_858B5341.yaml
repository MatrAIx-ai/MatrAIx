  hobbies: '[''Woodworking'', ''Fishing'', ''Hunting'', ''Scale Model Kit Building'', ''Crossword Puzzles'', ''Gardening'', ''Community Preservation Projects'']'
  career_goals: Arthur aims to advance from laborer to crew foreman within the next two years, securing an OSHA 30‑hour certification and a journeyman carpenter credential. Long‑term, he plans to obtain
    a Wisconsin general‑contractor license so he can lead his own crew and manage small residential and commercial projects, ensuring the high standards of craftsmanship and safety that set him apart from
    his peers.
