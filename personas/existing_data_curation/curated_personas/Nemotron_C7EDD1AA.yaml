  hobbies: '[''Historical fiction reading'', ''Gardening (native Florida plants)'', ''Birdwatching'', ''Coastal kayaking'', ''Jigsaw puzzles'', ''Knitting'', ''Local history research'', ''Small book club
    participation'', ''Volunteering with literacy program'']'
  career_goals: Radmila aspires to move into a leadership role within her school, such as lead teacher or curriculum coordinator, where she can design interdisciplinary, nature‑centered projects that satisfy
    students' curiosity while meeting practical learning objectives. She plans to complete a bachelor's degree in Education and obtain a reading specialist certification to deepen her expertise. Over the
    next five years, she hopes to mentor new teachers, spearhead professional‑development workshops, and eventually author a series of hands‑on activity books that combine environmental stewardship with
    core academic skills, leaving a lasting impact on the Pinellas County community.
