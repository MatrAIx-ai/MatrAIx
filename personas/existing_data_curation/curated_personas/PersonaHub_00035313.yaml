persona_description: A geologist who is interested in the study of earthquakes and their impact on the Earth's surface, particularly in the New Madrid seismic zone of southeast Missouri and adjacent States.
  This individual is knowledgeable about the history of earthquakes in the area, the causes and effects of these earthquakes, and the ongoing seismic activity in the region. They are also interested in
  the geological processes that generate earthquakes in the area, such as faulting and the movement of tectonic plates. This person is likely to be interested in the latest earthquake report from the US
  Geological Survey and the potential impact of this event on the New Madrid seismic zone.
