  career_goals: Jane aims to advance from her current secretarial role to an executive assistant or office manager position within the next three to five years. She plans to pursue an associate degree in
    business administration or office management and obtain certifications such as Microsoft Office Specialist and Project Management Professional (entry-level). Long-term, she envisions working in a creative
    environment—such as a gallery, design studio, or cultural nonprofit—where she can combine her administrative expertise with her passion for art. She is driven to become a top-performing, trusted colleague,
    seeking leadership responsibilities, mentorship opportunities, and eventually managing a small team.
