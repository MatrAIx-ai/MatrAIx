personas:
  professional: Jane Head is a detail‑driven secretarial professional in a Dallas office, leveraging expert Microsoft Office and Google Workspace skills to streamline calendar coordination, document preparation,
    and basic bookkeeping while channeling their competitive edge into proposing process improvements and their exceptional calm into handling high‑pressure requests with unwavering resilience.
  sports: Jane Head follows the Dallas Mavericks and Dallas Cowboys with a weekend routine of checking scores while also joining the Dallas Trailblazers Hiking Club for monthly hikes in Cedar Ridge, balancing
    their love for outdoor cardio with occasional pick‑up basketball games at the community center.
  arts: Jane Head immerses herself in contemporary art by frequenting the Dallas Museum of Art’s modern wing, sketching on a tablet inspired by the bold colors of Kehinde Wiley and the concept‑driven installations
    of James Turrell, and unwinds to eclectic playlists featuring Tame Impala, Björk, and Flying Lotus while podcast‑bing about design thinking.
  travel: Jane Head plans meticulous weekend getaways that blend art‑focused exploration—such as a solo trip to Oaxaca’s vibrant galleries and a pre‑summer visit to Berlin’s Museum Island—with relaxed camping
    nights at the Texas Hill Country, using Expedia to lock in budget‑friendly flights while saving for a future semester‑abroad program in Florence.
  culinary: Jane Head favors bright, health‑forward meals like avocado toast, quinoa‑kale salads with lemon‑tahini dressing, and poke bowls featuring ahi tuna, while their brunch habit includes occasional
    eggs Benedict with hollandaise, and they experiment on their tablet with oat‑based smoothie bowls topped with fresh berries and chia seeds, though they reluctantly admit to a late‑night craving for
    salty pretzels.
  core: Jane Head blends a calm, competitive drive with a curiosity for contemporary art, turning meticulous office routines into launchpads for creative problem‑solving while juggling brunch splurges and
    a nightly habit of sketching the next day’s ideas on a digital tablet.
background:
  cultural: Jane was raised in Garland, Texas, a suburban community within Collin County that blends traditional Texan values with the cultural diversity of the Dallas-Fort Worth metro area. Her white,
    middle-class upbringing emphasized community involvement, self-reliance, and a friendly hospitality that characterizes Southern hospitality. Growing up near a vibrant arts scene, she was exposed to
    a mix of local folk traditions, country music, and the contemporary art and music festivals of Dallas, shaping her appreciation for both classic and modern cultural expressions. Her family encouraged
    curiosity and education, fostering her love for new ideas while grounding her in the practical, hardworking ethos of the region.
