personas:
  professional: An aspiring teenage inventor and robotics hobbyist, Edna Matteo spends afternoons soldering Arduino kits, customizing game controllers for competitive advantage, and sketching blueprints
    for gadgets in a weathered journal, channeling a curious yet practical mindset while habitually abandoning projects midway due to spontaneous ideas.
  sports: Edna Matteo hones their balance on the downtown skate park, occasionally joins the school’s intramural basketball league to shoot hoops with friends, roots for the Chicago Bulls, and follows the
    NBA and WNBA seasons while keeping a personalized skateboard deck emblazoned with Rocket League graphics.
  arts: Edna Matteo channels creative energy into sketching invention concepts, devours sci‑fi novels like Neuromancer, binge‑watches anime such as Ghost in the Shell, decks out their room with posters
    of Daft Punk and The Strokes, and occasionally experiments with digital art using Procreate, reflecting a high‑octane blend of auditory and visual inspiration.
  travel: Edna Matteo dreams of swapping their hometown for a weekend in Tokyo’s Akihabara district to hunt for rare gadgets, has already taken a school field trip to the Smithsonian Air and Space Museum,
    and saves dollars for a future road‑trip across the Southwest to explore desert tech art installations.
  culinary: Edna Matteo’s palate favors bold, quick bites like loaded nachos, ramen, and pepperoni pizza, and they can confidently whip up a midnight cheese‑filled quesadilla with just a microwave and a
    sprig of cilantro, though they often skip cooking entirely in favor of energy drinks and snack bars during marathon gaming sessions.
  core: Edna Matteo lives at the nexus of competitive gaming and hands‑on tinkering, sprinting from project to project with bursts of laser focus while leaving a colorful trail of half‑finished gadgets
    and snack wrappers behind.
background:
  cultural: Edna was raised in a typical Midwestern suburban environment in Kansas City, KS. Her family observes mainstream American holidays—Thanksgiving, Fourth of July, and Christmas—with a focus on
    community gatherings and local traditions. She attends a public middle school where she experiences a blend of cultural influences from neighboring rural and urban communities. The region’s emphasis
    on practicality, self‑reliance, and friendly neighborliness shapes her outlook, while the diverse student body exposes her to a variety of perspectives, encouraging her curiosity and occasional healthy
    skepticism.
