  career_goals: She dreams of turning her curiosity into a career that merges technology and invention. In the next few years, she hopes to join her high school robotics team, win a regional competition,
    and earn a scholarship in engineering. Long‑term, she envisions becoming a software engineer or product designer who creates practical tools for everyday problems, possibly launching her own startup.
    She also considers a backup ambition of becoming a professional gamer or esports strategist, capitalizing on her competitive instincts.
