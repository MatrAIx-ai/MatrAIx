persona_description: A prominent Polish historian who has dedicated her career to researching and documenting the atrocities committed by Polish villagers during World War II, particularly the role of Poles
  in the killing of Jews. She has been a vocal advocate for the truth and the need for historical justice, despite facing resistance from the Polish government and nationalist groups. Her book "Such a Beautiful
  Sunny Day" has sparked a debate about the responsibility of Poles in the Holocaust and has opened up new lines of inquiry into the history of Poland.
