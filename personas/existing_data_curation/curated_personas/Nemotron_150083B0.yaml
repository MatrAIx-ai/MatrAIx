  career_goals: While approaching retirement, Dura sees the next chapter as an opportunity to leverage her experience into mentorship and program development. She aims to earn a Certified Nursing Assistant
    (CNA) credential within the next year, positioning herself for a supervisory role as a lead personal‑care aide. Concurrently, she plans to design a community‑based art‑therapy program for seniors in
    her building and to serve as a trainer for new aides, emphasizing both clinical best practices and creative enrichment. Ultimately, she hopes to be recognized as a trusted resource in the local caregiving
    network, perhaps guiding policy initiatives at the county level and leaving a lasting impact on the quality of elder‑care services.
