  hobbies: '["Woodworking", "Garden cultivation", "Hiking", "Vintage electronics tinkering", "Reading non‑fiction about technology and sustainability", "Craft brewing", "Community events participation"]'
  career_goals: Tyler aims to re‑enter the workforce in a capacity that leverages his hands‑on abilities while preserving a flexible schedule for his family. He is exploring the launch of a small home‑services
    business offering handyman work and sustainable garden consulting to neighbors in Enfield. Additionally, he plans to complete the remaining credits for an associate degree in business administration
    within the next two years to give his venture a solid managerial foundation.
