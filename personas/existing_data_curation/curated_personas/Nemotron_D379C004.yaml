  hobbies: '[''LEGO building'', ''Reading picture books'', ''Playing soccer and tag'', ''Drawing and coloring detailed pictures'', ''Puzzle solving'', ''Music and dance classes'', ''Helping with family
    chores'', ''Attending church community events'']'
  career_goals: Oscar dreams of becoming a teacher or a community coach because he loves creating structured learning environments, planning activities for others, and helping his friends succeed. He also
    imagines a future as a firefighter, attracted by the clear routines, teamwork, and the chance to protect and serve his community.
