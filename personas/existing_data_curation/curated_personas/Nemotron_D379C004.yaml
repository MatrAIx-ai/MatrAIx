personas:
  professional: Oscar Wise is an aspiring builder who spends hours assembling LEGO sets, dreaming of becoming a civil engineer, and they approach each build with methodical precision and a love for predictable
    instructions.
  sports: Oscar Wise plays on the neighborhood under-8 soccer team that wears bright blue jerseys, cheering for the local professional club the City Strikers, and they love the free-flow of tag during recess,
    often organizing games with a clear set of rules to keep everyone safe.
  arts: Oscar Wise enjoys drawing intricate scenes of wildlife and cityscapes, coloring with Crayola markers, and attending gospel and R&B dance classes where they mimic moves to songs by Kirk Franklin
    and Beyoncé, letting music shape their creative energy.
  travel: Oscar Wise prefers day trips to nearby nature trails or the city's children's museum, where a structured itinerary includes snack breaks and a scheduled playground session, yet they dream of a
    family vacation to Disney World's Magic Kingdom to meet favorite cartoon heroes.
  culinary: Oscar Wise loves macaroni and cheese topped with a sprinkle of cheddar, chicken nuggets with honey mustard, and fruit salad with strawberries and banana slices, and they can proudly assemble
    a simple peanut butter-jelly sandwich after watching a short cooking video.
  core: Oscar Wise is a detail-oriented, worry-prone six-year-old who balances meticulous LEGO building with energetic soccer games, a strong sense of responsibility, and a sweet tooth that sometimes overrides
    bedtime routines.
background:
  cultural: Oscar is raised in a close‑knit African‑American family in Crown Point, Indiana. His household values respect, cooperation, and education, often sharing stories of family heritage and cultural
    traditions. He regularly attends a local Black church where gospel music, community service, and celebrations of African‑American holidays such as Juneteenth are part of his upbringing. Family gatherings
    feature soul‑food meals and music ranging from classic R&B to contemporary hip‑hop, shaping his tastes and providing a strong sense of cultural identity while he also navigates the broader Midwestern
    community.
attributes:
