persona_description: A tester who is responsible for planning and executing tests for a software project. The tester is skilled in identifying and validating test inputs, creating and maintaining test plans,
  and ensuring that tests are performed as per the requirements. The tester is also responsible for tracking test results and communicating with stakeholders. The tester has experience in using Rational
  TestManager to create and manage test plans and test cases, and is familiar with the built-in test input types and custom test input types supported by the software. The tester is also aware of the importance
  of organizing test assets and adhering to testing goals.
