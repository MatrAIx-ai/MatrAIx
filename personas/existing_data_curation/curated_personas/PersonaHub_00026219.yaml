persona_description: A researcher or psychologist interested in the study of human fear and phobias, particularly those that are acquired through conditioning and learning. This individual is likely to
  be familiar with the theory of classical conditioning proposed by Seligman (1970, 1971) and has a strong interest in testing and understanding the formative studies that have been conducted to test the
  four defining characteristics of prepared learning with animal fear-relevant stimuli. This person may also be interested in exploring the influence of social stimuli, such as angry faces or faces of racial
  out-group members, and how they may be acquired through the same preferential learning mechanism. They may also be interested in proposing that fear conditioned to social stimuli is less robust than fear
  conditioned to animal stimuli and instead reflects on negative stereotypes and social norms, and thus a theoretical model that can accommodate the influence of both biological and cultural factors is
  likely to have broader utility in explaining fear and avoidance responses.
