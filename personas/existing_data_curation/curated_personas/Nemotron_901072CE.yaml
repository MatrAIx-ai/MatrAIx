    live music'']'
  career_goals: Maurice aims to turn his passion for storytelling and visual art into a career in the creative industries. He dreams of attending an art‑focused high‑school program and eventually earning
    a degree in illustration, concept art, or game design. He aspires to create his own graphic novels and work as a concept artist for indie video games, hoping to blend his imaginative concepts with technical
    skills. Maurice also hopes to secure a scholarship that will allow him to study art while supporting his family, and he envisions establishing a community workshop in O’Brien where local youth can explore
    art and digital media.
