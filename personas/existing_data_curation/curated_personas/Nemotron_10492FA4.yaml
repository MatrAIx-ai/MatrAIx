personas:
  professional: An experienced aerospace engineer, Justin Dickerson draws on four decades of propulsion design, CFD, and additive manufacturing expertise while channeling his vivid imagination into technical
    illustration, and they lead cross‑disciplinary teams with a relaxed, flexible management style that encourages creativity over rigid schedules.
  sports: A sociable cyclist and devoted fan of local teams, Justin Dickerson rides weekly with the Plano Cycle Club, joins the occasional weekend hike organized by his improv troupe, cheers loudly for
    the Dallas Cowboys on fall Sundays and the Dallas Mavericks during NBA season, and they treat fitness as a fun community activity rather than a strict regimen.
  arts: An abstract painter and improv enthusiast, Justin Dickerson spends evenings sketching swirling skies reminiscent of Van Gogh’s “Starry Night” and capturing Milky Way shots à la Ansel Adams, strums
    acoustic renditions of Bob Dylan and Neil Young at informal jam sessions, and they regularly perform spontaneous sketches for the Plano Community Theatre’s backstage promotions.
  travel: A curious road‑tripper with a love for aerospace landmarks, Justin Dickerson plots spontaneous weekend escapes to places like the Johnson Space Center in Houston, the historic airfield at Cape
    Canaveral, the art‑filled streets of Marfa, and dreams of flying to the JAXA Tsukuba Space Center in Japan and the Airbus Final Assembly Line in Toulouse, often mixing detailed flight‑simulation itineraries
    with last‑minute detours.
  culinary: A self‑taught grill master with a love for smoky Tex‑Mex, Justin Dickerson perfects brisket tacos seasoned with smoked paprika, cumin, and fresh cilantro, whips up homemade queso with jalapeños
    and pico de gallo for neighborhood potlucks, and they relish pairing their creations with local craft brews while occasionally experimenting with sous‑vide vegetables for a modern twist.
  core: Justin Dickerson, a 63‑year‑old aerospace veteran who blends engineering rigor with artistic whimsy, lives by flexible curiosity, habitually misplaces tools, and fuels their days with model rockets,
    night‑sky photography, and community jam sessions.
background:
  cultural: Justin grew up in a middle-class white family in the Dallas-Fort Worth metroplex, where the blend of Texas hospitality and the region's burgeoning aerospace industry left a strong imprint. His
    early exposure to the nearby Naval Air Station and the Air Force Academy's community sparked a lifelong fascination with flight. The cultural fabric of Plano—characterized by a mix of suburban stability,
    diverse culinary scenes, and an active tech ecosystem—shaped his pragmatic yet open-minded outlook. While rooted in traditional American values of self-reliance and neighborly cooperation, he embraces
    the collaborative, innovative spirit that defines modern Texas tech culture.
attributes:
  skills: '[''Propulsion system design'', ''Aerodynamic analysis'', ''Computational fluid dynamics (CFD)'', ''Additive manufacturing (3D printing)'', ''Systems integration'', ''Technical illustration and
    concept art'', ''Cross-disciplinary collaboration'', ''Mentorship and coaching'', ''Patent development'', ''Emerging aerospace technologies (electric propulsion, hypersonic travel)'']'
  hobbies: '[''Landscape painting'', ''Model rocketry'', ''Night-sky photography'', ''Acoustic guitar'', ''Community improv theatre'', ''Cycling with neighborhood group'', ''Science fair volunteering'',
    ''Leading maker-space workshops'']'
  career_goals: Looking ahead, Justin aims to shape the future of sustainable aviation by spearheading research on electric propulsion and low-emission aircraft designs. He plans to transition into a consultancy
    role where he can advise startups and established firms on integrating cutting-edge technologies while preserving a culture of creativity and collaboration. Additionally, he hopes to author a memoir-style
    technical book that weaves together engineering case studies with artistic reflections, and to establish a community mentorship program in Plano that inspires middle-school students—especially those
    from underrepresented backgrounds—to pursue STEM fields. Ultimately, his ambition is to leave a legacy of innovative, human-centric aerospace solutions.
