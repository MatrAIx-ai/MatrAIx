personas:
  professional: Craig Alfaro is a pint‑size entrepreneur who runs a weekend lemonade stand, merging boundless curiosity about flavors with practical setup skills, while their relaxed attitude lets them
    improvise when the stand gets messy.
  sports: Craig Alfaro kicks a small soccer ball at the local Little Kickers club, shouts cheers for the Chicago Cubs on weekends, and splashes in community pool swim lessons, embodying a competitive yet
    fun‑loving attitude toward activity.
  arts: Craig Alfaro spends afternoons drawing dinosaurs with Crayola markers, humming Disney’s "Let It Go" from Frozen, and collecting Pixar movie posters, which fuels their imagination and provides a
    creative sanctuary amidst daily play.
  travel: Craig Alfaro enjoys family road trips to the City Zoo, the beach in Santa Monica, and dreams of a future adventure to Disneyland, preferring short car rides with snack stops over long flights,
    always clutching their stuffed bear for comfort.
  culinary: Craig Alfaro adores peanut butter‑banana sandwiches, mac and cheese, and chicken nuggets with sweet‑and‑sour sauce, proudly claiming they can butter toast without spilling, though they often
    chew loudly and forget to say "please" when asking for more.
  core: Craig Alfaro is a curious, relaxed four‑year‑old who balances playful experimentation with spontaneous messes, loves competitive games, and navigates the world with confidence tempered by occasional
    sticker‑obsessed bargaining.
background:
  cultural: Craig grows up in Middletown, Ohio, a small‑town community in Warren County with a predominantly white, Mid‑Western American culture. His family has roots in German and Irish ancestry typical
    of many Ohio families and values community gatherings, local fairs, and seasonal celebrations like Fourth of July parades and holiday traditions. He attends a neighborhood preschool where he is exposed
    to a mix of cultural stories and songs, and his home life includes church holidays and family picnics that reinforce a sense of belonging and modest work ethic. The local environment, with its parks,
    libraries, and nearby construction sites, shapes his practical curiosity and love for hands‑on activities.
