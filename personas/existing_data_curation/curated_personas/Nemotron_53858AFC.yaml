personas:
  professional: Jacorey Zephir leverages a methodical, data‑driven mindset and competitive drive to design scalable, secure enterprise data architectures across Oracle, SQL Server, and MongoDB environments,
    thriving on structured project plans, rigorous performance tuning, and leading cross‑functional teams toward precise migration milestones, and they consistently hold themselves accountable to high standards
    of data integrity.
  sports: Jacorey Zephir follows the New York Knicks in the winter, the Yankees in the summer, and trains with the Yonkers Powerlifting Club, balancing a disciplined regimen of Hudson River runs and weekly
    strength sessions while cheering on the New York City FC during the MLS season, and they value the structure of scheduled workouts as a counterpoint to the competitive nature of their chess tournaments.
  arts: Jacorey Zephir immerses in classic jazz by Miles Davis and John Coltrane, enjoys contemporary R&B from H.E.R. and Leon Bridges, curates a vintage vinyl collection, and occasionally mentors youth
    at a community arts workshop where they explore spoken‑word performance, and they find the improvisational spirit of jazz mirrors their analytical approach to data modeling.
  travel: Jacorey Zephir prefers meticulously planned trips that blend tech conferences with cultural immersion, having recently visited Washington, D.C. for a data summit, explored New Orleans’ culinary
    scene, and scheduled a future itinerary to Tokyo’s Akihabara district while balancing family commitments, and they prioritize itinerary precision over spontaneous travel to maintain work‑life equilibrium.
  culinary: Jacorey Zephir is a skilled home chef who perfects soul‑food classics like smoked‑paprika fried chicken, slow‑cooked collard greens seasoned with smoked ham hocks, and sweet‑potato pie, and
    they often pair meals with a glass of bourbon while sharing the dishes at community tech workshops.
  core: Jacorey Zephir blends a competitive, data‑centric mindset with a disciplined fitness routine and a passion for soul food and jazz, all while obsessively tracking finances and occasionally neglecting
    dental appointments, and they approach life with a structured, methodical outlook.
background:
  cultural: Jacorey grew up in the vibrant, multicultural neighborhoods of the Bronx and Yonkers, where his African‑American heritage was interwoven with the rich traditions of the broader New York City
    diaspora. His family traces its lineage to the Southern United States, with grandparents who participated in the civil rights movement, instilling in him a strong sense of community responsibility and
    pride in Black history. He actively participates in local Black tech meetups and serves as a mentor for initiatives like 'Black Girls CODE' and 'Code2040', aiming to increase representation in STEM
    fields. While he embraces mainstream American culture, he also preserves cultural practices through soulful cuisine, gospel music during family gatherings, and involvement in annual Juneteenth celebrations.
    This blend of historical awareness and contemporary urban experience informs his perspective on equity, mentorship, and professional ambition.
attributes:
  skills: '["SQL", "Oracle Database", "MySQL", "PostgreSQL", "MongoDB", "Data Modeling", "Performance Tuning", "Database Security", "Disaster Recovery Planning", "Cloud Database Services (AWS RDS, Azure
    SQL)", "ETL Processes", "Data Governance", "Project Management", "Team Leadership"]'
  hobbies: '["Chess", "Running", "Weightlifting", "Woodworking", "Cooking Soul Food", "Jazz Listening", "Mentoring Youth in Tech", "Community Volunteering"]'
  career_goals: Jacorey aims to transition into a senior data architect role where he can shape enterprise data strategy and drive innovation across large-scale platforms. He plans to earn advanced cloud
    certifications (AWS Certified Solutions Architect – Professional, Azure Solutions Architect Expert) and deepen his expertise in data governance frameworks to position himself as a thought leader in
    data security. Over the next five years, he aspires to lead a data engineering division or become a chief data officer, leveraging his competitive drive to mentor the next generation of Black IT professionals.
    He also envisions publishing technical articles and speaking at industry conferences to share best practices and elevate underrepresented voices in the tech community.
