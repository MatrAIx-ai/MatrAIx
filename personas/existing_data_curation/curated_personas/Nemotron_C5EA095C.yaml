  career_goals: Jessica aims to earn professional certifications such as Certified Facility Manager (CFM) and HVAC Excellence to solidify her technical credentials. Over the next five years she plans to
    advance from a maintenance technician to a lead supervisor overseeing a team of technicians within a property management company serving Ocean County. Ultimately, she aspires to start a small, family‑run
    maintenance contracting business focused on energy‑efficient retrofits and sustainable home improvements, providing stable income and growth opportunities for her family.
