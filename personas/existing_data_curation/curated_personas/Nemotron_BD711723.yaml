personas:
  professional: Dorothy Thomas is a dynamic education professional blending STEAM curriculum design with vibrant artistic expression, leveraging their meticulous lesson planning and data-driven assessment
    to create culturally resonant learning experiences while they channel their competitive drive into mentoring peers and championing innovative classroom technology.
  sports: Dorothy Thomas is an avid weekend basketball player in a co-ed league at the Scioto Mile, a devoted fan of the Columbus Blue Jackets and the Cleveland Guardians, and a seasonal runner who participates
    in the Ohio River Trail 10K each spring, balancing their competitive drive with community camaraderie as they celebrate each game.
  arts: Dorothy Thomas channels imagination through acrylic cityscapes inspired by Jacob Lawrence and Kehinde Wiley, writes spoken-word poetry performed at local open-mic nights alongside favorite artists
    like Kendrick Lamar and Nina Simone, and regularly engages in improv comedy workshops that sharpen their quick-thinking and storytelling skills, as they thrive on the energy of live performance and
    collaborative creation.
  travel: Dorothy Thomas prefers purposeful weekend getaways that mix cultural immersion and artistic inspiration, having explored the street-art districts of Detroit, the jazz heritage of New Orleans,
    the historic Juneteenth celebrations in Galveston, and dreaming of a spring visit to the tulip fields of Keukenhof in the Netherlands, all while they plan trips around limited student-loan budgets and
    coordinate with friends for shared accommodations.
  culinary: Dorothy Thomas enjoys experimenting in the kitchen, frequently preparing spicy jambalaya with smoked paprika and fresh cilantro, perfecting a buttery cornbread baked with honey, and crafting
    a plant-based ramen that blends miso broth with sliced oyster mushrooms, although they sometimes over-season dishes in pursuit of bold flavor.
  core: Dorothy Thomas is a creatively fierce educator who blends art, technology, and cultural storytelling into every lesson while they juggle a competitive spirit, pragmatic finances, and a love for
    basketball and experimental cuisine.
background:
  cultural: Dorothy identifies as a Black woman raised in Ohio, with family roots stretching from the Southern United States to the Great Migration era. Her upbringing highlighted the importance of education,
    community church gatherings, and celebrating African‑American heritage through music, storytelling, and cuisine. She actively participates in local Black cultural events such as Juneteenth celebrations
    and spoken‑word poetry circles, and she values mentorship within the Black community, often advocating for equitable educational opportunities and preserving cultural traditions in her teaching practice.
attributes:
  skills: '[''Lesson planning'', ''Curriculum design'', ''STEAM integration'', ''Instructional technology'', ''Classroom management'', ''Data-driven assessment'', ''Mentoring and coaching'', ''Facilitating
    collaborative workshops'', ''Public speaking for educational outreach'', ''Critical evaluation of pedagogical methods'']'
  hobbies: '[''Painting (acrylic)'', ''Sketching urban landscapes'', ''Poetry writing'', ''Reading speculative fiction'', ''Improv comedy workshops'', ''Urban hiking in Columbus parks'', ''Volunteering
    as a tutor at community art programs'', ''Playing recreational basketball'', ''Experimental cooking'', ''Attending live music festivals'']'
  career_goals: Dorothy aims to secure her teaching certification and transition from a teaching assistant to a full‑time classroom teacher within the next two years. She plans to pursue a master's degree
    in Educational Leadership so she can become a curriculum coordinator, driving the creation of innovative STEAM programs for underserved schools in Columbus. Long‑term, she aspires to publish research
    on culturally responsive pedagogy, mentor new educators, and lead community initiatives that blend art, technology, and education to empower Black youth.
