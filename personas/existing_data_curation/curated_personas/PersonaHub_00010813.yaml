persona_description: A historian or a folklorist who is interested in the development and evolution of American folk games, particularly those related to the play-party, and is familiar with the history
  of American folk music and its connection with English music. They are also interested in the role of environment and cultural factors in the development of American folk games and are open to the possibility
  that American folk games may have developed away from their English originals. They are also interested in the history of the play-party in the United States and its disappearance in many places, and
  are willing to consider the lack of records as an indication of the play-party's existence long ago.
