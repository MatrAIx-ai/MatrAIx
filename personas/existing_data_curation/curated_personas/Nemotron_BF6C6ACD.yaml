  hobbies: '[''Cooking traditional Salvadoran dishes'', ''Hiking in Hill Country'', ''Reading contemporary fiction'', ''Yoga'', ''Photography'', ''Volunteering at community center'', ''Attending local festivals'',
    ''Spontaneous weekend road trips'']'
  career_goals: Gladys aims to advance from her role as an insurance sales agent to a senior account manager within the next three years, pursuing the Certified Insurance Counselor (CIC) designation and
    expanding her expertise into commercial lines. She envisions eventually opening a boutique insurance agency that specifically serves the Salvadoran and broader Latino community in San Antonio, offering
    culturally sensitive financial products and education. Mentoring new agents and leading a diverse sales team are also key ambitions, as is developing community-based financial literacy workshops that
    empower immigrants to make informed decisions about health and life coverage.
