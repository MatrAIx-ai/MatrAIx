personas:
  professional: Ricky Swander, a retired handyman with a lifetime of carpentry, gardening, and Creole cooking expertise, channels curiosity and practicality into volunteering as a historic architecture
    docent and mentoring teens in culinary arts while juggling a flexible schedule that reflects their relaxed, occasionally disorganized approach to commitments.
  sports: Ricky Swander enjoys gentle morning walks along Bayou St. John with the local senior walking club, participates in the community fishing league for early‑morning catches, rallies behind the New Orleans
    Saints on Sundays and follows the New Orleans Pelicans throughout the basketball season, using these low‑impact activities to stay fit while accommodating occasional bouts of joint pain.
  arts: Ricky Swander spends evenings immersed in live jazz at venues featuring legends like Wynton Marsalis and Miles Davis, captures the vibrant energy of second‑line parades through photography, and
    shares stories of New Orleans’ architectural heritage as a docent, reflecting a blend of curiosity, community spirit, and a relaxed, sometimes disorganized, approach to cultural engagement.
  travel: Ricky Swander prefers relaxed road trips to nearby wetlands such as the Jean Lafitte National Historical Park for birdwatching, cherishes weekend stays in the historic French Quarter, has visited
    Austin, Texas for a music festival, dreams of a guided tour of Savannah, Georgia, and balances these adventures with a modest travel budget and the occasional worry about travel logistics.
  culinary: Ricky Swander’s kitchen blends traditional Creole staples—gumbo with okra, jambalaya brimming with smoked sausage, and beignets dusted with powdered sugar—with experimental twists like basil‑infused
    tomato sauces, using home‑grown heirloom tomatoes, okra, and fresh herbs to season dishes while occasionally over‑spicing due to a habit of enthusiastic improvisation.
  core: Ricky Swander is a curious, community‑oriented septuagenarian who balances a love of jazz, gardening, and genealogy with a tendency toward worry, occasional disorganization, and a steadfast commitment
    to staying active and connected.
background:
  cultural: He was born and raised in New Orleans, Louisiana, to a family of French‑Canadian (Acadian) descent that has lived in the region for generations. Raised in a Catholic household, he grew up with
    traditions such as Mardi Gras, Creole cuisine, and the city’s celebrated jazz and blues music. The multicultural tapestry of the Crescent City—French, Spanish, African, and Caribbean influences—shaped
    his worldview and fostered a deep appreciation for community celebrations and shared heritage. While his ethnicity is white, Ricky identifies strongly with the distinctive New Orleans culture, valuing
    hospitality, resilience, and a relaxed approach to life that balances reverence for tradition with openness to new ideas.
