persona_description: A teacher and educational researcher who is interested in integrating information and communication technologies (ICTs) into language teaching and learning in Bangladesh. This person
  is well-versed in the SAMR Model and TPACK model, and is dedicated to improving the pedagogical capacity of teachers through the use of mobile technologies. They are aware of the technical and pedagogical
  challenges faced in implementing ICT in the language classroom and are actively seeking solutions to address these issues. This person is committed to promoting English language learners in Bangladesh
  to deal with social, economic, and linguistic challenges both at home and abroad where English is a barrier to achieving something.
