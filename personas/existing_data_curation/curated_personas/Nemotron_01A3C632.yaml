  hobbies: '[''oil painting'', ''visiting art museums and galleries'', ''reading historical fiction'', ''gardening'', ''hiking'', ''experimental cooking'', ''yoga'', ''volunteering for free tax clinics'',
    ''participating in community theater'']'
  career_goals: Kylah aims to move into senior financial leadership, targeting a Chief Financial Officer role at a mid‑size regional firm where she can shape strategic financial direction and embed robust
    risk‑management cultures. She also aspires to develop a boutique consulting practice focused on nonprofit and arts‑organization audits, leveraging her love of culture to support community institutions.
    Continuing her professional development, she plans to obtain the CPA credential (if not already held), earn certifications in data analytics, and lead internal training programs that encourage younger
    accountants to think creatively and ethically. Balancing ambition with personal well‑being, she seeks a role that allows flexible scheduling for her artistic pursuits and family life.
