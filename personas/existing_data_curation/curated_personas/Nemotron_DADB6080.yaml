  hobbies: '[''Surfing'', ''Beach volleyball'', ''Skateboarding'', ''Organizing beach clean‑ups'', ''Online multiplayer gaming'', ''Coastal photography'', ''Acoustic guitar'']'
  career_goals: Jay aims to complete his GED and earn a community‑college certificate in Hospitality Management or Business Administration within the next two years. He hopes to work part‑time at a local
    surf shop or beach resort to gain industry experience, eventually moving into event planning for coastal festivals or becoming a certified surf instructor. In the longer term, he envisions starting
    his own small business that combines event management and surf lessons, providing a stable income while staying connected to the beach community. He also considers a role in public safety, such as the
    Coast Guard, to blend his love for structure with service to others.
