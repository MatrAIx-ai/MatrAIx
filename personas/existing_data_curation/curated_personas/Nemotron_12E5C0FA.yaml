  hobbies: '[''Hiking on Denver foothills'', ''Yoga and meditation'', ''Gourmet cooking and baking'', ''Reading mystery and historical fiction'', ''DIY home projects (painting, woodworking)'', ''Participating
    in local hair styling competitions'', ''Attending art and craft fairs'', ''Volunteering at community senior center for hair styling'', ''Gardening in her backyard'']'
  career_goals: Jordana aims to earn a Master Stylist certification and become a recognized authority in sustainable hair‑color practices. She plans to enter regional styling competitions to test her skills
    against peers and gain industry accolades. Over the next five years, she hopes to launch a boutique salon that blends eco‑friendly products with a personalized client experience, while also developing
    a small line of signature hair‑care products that reflect her curiosity for new formulas and practical results. Mentoring emerging stylists and offering workshops on business management are also central
    to her long‑term vision.
