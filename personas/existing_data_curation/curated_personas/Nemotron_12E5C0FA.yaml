personas:
  professional: Jordana Wallace, a master stylist with over 30 years of hands‑on experience, merges precision cutting, advanced balayage, and a sustainability‑first product approach, leveraging their competitive
    edge and practical curiosity to run a meticulously organized boutique salon while mentoring junior stylists with a skeptical eye for fleeting trends.
  sports: Jordana Wallace spends weekends hiking the foothills of the Rockies, participates in a local yoga studio that aligns with the Denver Broncos fan community, follows the Colorado Avalanche with
    a competitive zeal, and joins quarterly 5 K charity races to stay fit.
  arts: Jordana Wallace immerses themselves in mystery novels from Agatha Christie and Tana French, frequents Denver art fairs showcasing regional painters like Mary Jane Hodge, and draws inspiration from
    folk‑rock artists such as The Lumineers, weaving these influences into salon décor and DIY woodworking projects.
  travel: Jordana Wallace balances short trips to Rocky Mountain National Park with aspirations to trek the alpine trails of Zermatt, Switzerland, meticulously planning travel around salon downtime and
    allocating a portion of salon profits to fund both local camping upgrades and future European adventures.
  culinary: Jordana Wallace perfects rosemary‑infused quinoa pilaf and lavender‑honey glazed salmon using herbs from their garden, while occasionally rewarding themselves with pan‑seared filet mignon topped
    with truffle butter after winning a styling contest.
  core: Jordana Wallace is a fiercely competitive, detail‑obsessive master stylist who counters chronic worry with yoga, yet can’t resist late‑night scrolling through styling competition reels before sleep.
background:
  cultural: Jordana grew up in a middle‑class family of German and Irish descent in the Midwest before relocating to Denver. Her upbringing blends the traditional work ethic, practicality, and DIY spirit
    common in many white American households with the adventurous, outdoors‑oriented culture of Colorado. She values community connections, self‑reliance, and a balanced approach to new ideas and established
    customs.
attributes:
  skills: '[''Hair cutting'', ''Advanced coloring techniques (balayage, foiling)'', ''Chemical treatments (perm, keratin smoothing)'', ''Hair extensions installation'', ''Scalp analysis and health consultation'',
