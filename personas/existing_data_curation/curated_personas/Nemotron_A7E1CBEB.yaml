personas:
  professional: An aspiring scientist‑engineer, Tonya Delice channels her curiosity and practicality into building elaborate LEGO structures and conducting bite‑size experiments, while they organize group
    projects with an eye for detail and adapt flexibly when plans shift, showcasing a natural leadership style that thrives on teamwork and attention.
  sports: An energetic youth soccer enthusiast, Tonya Delice shines on the Eastside Tigers U‑9 team, idolizing professional forward Alex Morgan and cheering for Manchester United, while they relish the
    competitive thrill of scoring goals and organizing neighborhood kick‑around games after practice.
  arts: An imaginative storyteller, Tonya Delice dazzles in her school choir with renditions of 'Let It Go' from Frozen, paints vivid comic‑book panels featuring original superheroes inspired by illustrator
    Jim Lee, and they thrive on the applause of classmates during dance recitals, channeling their sociable and talkative nature into every performance.
  travel: An adventurous explorer, Tonya Delice loves weekend trips to the city science museum where they can touch dinosaur fossils, family vacations to the Grand Canyon where they build sand‑castle forts,
    and dreaming of a future visit to Tokyo’s anime districts, balancing organized packing lists with spontaneous detours.
  culinary: An enthusiastic junior chef, Tonya Delice enjoys assembling cheesy pepperoni pizza slices, whipping up strawberry smoothies with fresh fruit, and experimenting with colorful fruit kebabs, yet
    they often forget to rinse their hands before cooking, reflecting a blend of curiosity, practicality, and occasional oversight.
  core: Tonya Delice is an eight‑year‑old blend of curiosity‑driven creator, competitive soccer star, sociable performer, and meticulous saver who balances organization with spontaneous fun, and they approach
    every activity with boundless energy.
background:
  cultural: Tonya grows up in a close‑knit Black family in Glen Allen, a suburb of Richmond known for its vibrant African‑American community. Her family celebrates cultural traditions like Juneteenth, enjoys
    soul food dishes passed down through generations, and listens to a mix of gospel, R&B, and contemporary hip‑hop music. She attends a local historically Black church where she participates in youth activities
    and learns about African‑American history and civil‑rights leaders. The community library hosts author visits and storytelling sessions featuring Black writers, which inspire Tonya’s love for reading
    and storytelling. These cultural experiences shape her identity, instilling pride, a strong sense of community, and an appreciation for both heritage and the broader world.
