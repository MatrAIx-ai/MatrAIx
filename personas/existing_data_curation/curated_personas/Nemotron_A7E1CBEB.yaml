  career_goals: Tonya dreams of a future where she can combine her love of learning, helping others, and being in the spotlight. She imagines herself as a teacher who inspires children to explore the world,
    an astronaut who discovers new frontiers, and a community organizer who creates fun, educational events for kids in Glen Allen. Her competitive spirit also fuels a goal of becoming a varsity soccer
    player, showing that she wants to excel both intellectually and athletically.
