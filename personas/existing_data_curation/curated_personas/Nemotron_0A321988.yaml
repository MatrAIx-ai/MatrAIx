  hobbies: '[''Recreational Basketball'', ''Community Volunteering'', ''Automotive Museum Visits'', ''Strategy Video Gaming'', ''Hiking in Oak Woods'', ''Cooking Experimental Meals'', ''Live Music Concerts'',
    ''Board Game Nights'', ''Local Sports League Participation'', ''Reading Non-fiction'']'
  career_goals: Wilbur aims to advance from his clerk role to a senior claims adjuster position within the next three years, pursuing a bachelor’s degree in Business Administration and the CPCU certification
    to deepen his technical expertise. He envisions leading a small team, implementing workflow efficiencies, and eventually moving into underwriting or risk‑management consulting. While he values stable
    career growth that supports future family plans, he also seeks to develop stress‑management techniques to maintain his wellbeing in higher‑responsibility roles.
