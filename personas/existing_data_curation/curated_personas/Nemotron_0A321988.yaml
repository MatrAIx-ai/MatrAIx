personas:
  professional: Wilbur Carter is a diligent insurance claims clerk who turns intricate Guidewire data into clear, empathetic client explanations, consistently spots workflow bottlenecks, and envisions leading
    a small adjuster team within three years after earning a Business Administration degree and CPCU certification.
  sports: Wilbur Carter competes in the Romulus community basketball league, roots for the Detroit Pistons, hikes the Oak Woods trails with a local outdoor club every Saturday, and joins a recreational
    softball team in the summer, balancing competitive drive with a love for team camaraderie.
  arts: Wilbur Carter frequents Detroit’s live-music venues to catch shows by Jack White and the Detroit Symphony Orchestra, hosts strategic board-game nights featuring Settlers of Catan and Ticket to Ride,
    and unwinds with narrative-rich video games like Civilization VI, seeing the arts as both social glue and mental refreshment.
  travel: Wilbur Carter prefers well-planned weekend road trips, having visited the Henry Ford Museum, taken a backpacking trek through Michigan’s Upper Peninsula, and dreaming of a spring tour of Germany’s
    automotive museums, all while keeping travel costs modest to preserve savings for future family plans.
  culinary: Wilbur Carter experiments in the kitchen by spicing up classic brunch with smoked kielbasa and sauerkraut, crafts homemade pizza dough topped with jalapeño-infused olive oil, and perfects a
    chipotle-marinated pulled-pork taco that he often serves to friends during post-game gatherings.
  core: Wilbur Carter blends meticulous claim work, community basketball energy, experimental cooking flair, and a diligent yet worry-prone mindset into a uniquely organized but constantly questioning Midwestern
    outlook.
background:
  cultural: Wilbur grew up in a middle‑class family in Romulus, Michigan, with deep roots in the Midwestern white community, reflecting a blend of German and Polish ancestry. The region’s emphasis on hard
    work, modesty, and community involvement shaped his practical outlook and cooperative spirit. Exposure to Detroit’s automotive heritage and a diverse neighboring population nurtured his curiosity about
    technology and his comfort in sociable settings. Traditional Midwestern values—reliability, humility, and a strong sense of civic duty—remain central to his identity.
attributes:
