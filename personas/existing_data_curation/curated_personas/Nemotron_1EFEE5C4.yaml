    music'']'
  career_goals: Yasmine aims to enroll in an associate’s degree program in nursing at Central Piedmont Community College within the next year, with the long‑term ambition of becoming a registered nurse
    and working in community health. She also hopes to retain her cultural roots by eventually opening a small catering service that showcases authentic Dominican cuisine, merging her healthcare career
    with entrepreneurship. She plans to gain experience through internships at local clinics and volunteer work at health fairs to build a strong professional network.
