personas:
  professional: Yasmine Ortizsantos, an organized and pragmatic high‑school graduate, leverages her bilingual communication, meticulous scheduling, and Basic First Aid certification to coordinate community
    events and assist at her family’s bakery while preparing to pursue an associate’s degree in nursing.
  sports: Yasmine Ortizsantos stays active by dancing bachata and merengue with the Mooresville Community Center Dance Club, jogging on the nearby Lake Norman trail for cardio, and cheering on the Charlotte
    Hornets and Carolina Panthers, while occasionally joining a casual pickup soccer game with friends at the local park.
  arts: Yasmine Ortizsantos immerses herself in Latin pop and reggaeton by streaming Bad Bunny, J Balvin, and Romeo Santos, reads contemporary fiction such as Angie Thomas’s *The Hate U Give* and Colson
    Whitehead’s *Harlem Shuffle*, and enjoys watching performances by Lin‑Manuel Miranda, finding these artistic outlets both a cultural anchor and a source of inspiration for her own creative cooking experiments.
  travel: Yasmine Ortizsantos prefers a blend of meticulously planned weekend getaways to nearby gems like Asheville, North Carolina, and spontaneous day trips to Charleston’s historic waterfront, while
    dreaming of a future cultural immersion in Barcelona, Spain, and a family reunion on the Caribbean island of her parents’ origin, though she balances these ambitions with a tight student budget and
    semester commitments.
  culinary: Yasmine Ortizsantos enjoys cooking traditional dishes like sancocho, mangú, and pastelitos, often swapping white rice for quinoa, using baked plantain chips instead of fried ones, and adding
    avocado and olive oil for a healthier twist, while also delighting in the bold flavors of garlic, cilantro, and lime in her everyday meals.
  core: Yasmine Ortizsantos balances a love for structured schedules and community service with a spontaneous passion for dancing, a guilty sweet‑tooth for pastelitos, and the habit of obsessively color‑coding
    her weekly to‑do lists.
background:
  cultural: Yasmine grew up in a Dominican household where Spanish was spoken daily and Dominican traditions were celebrated year‑round. Her parents immigrated from the Dominican Republic, bringing with
    them a strong emphasis on family, community, and Catholic customs. She participates in local Dominican festivals, celebrates Dominican Independence Day, and maintains close ties with the diaspora community
    in Mooresville. The blend of Dominican heritage and Southern U.S. culture shapes her identity, influencing her language, food preferences, music taste, and the value she places on family gatherings
    and community support.
