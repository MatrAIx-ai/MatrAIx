persona_description: A scientist who specializes in the field of medicine, particularly in the development of vaccines and their delivery systems. He is a professor at the University of Western Australia
  and has won the Nobel Prize in Physiology or Medicine in 2005 for his work on the discovery of Helicobacter pylori, which is one of the leading causes of peptic ulcer disease. He is concerned about the
  stress and inconvenience of vaccination needles for small children and believes that vaccines should be like medicines, which would be easier for many people to take and avoid the risk of complications
  from vaccination. He is working on a project to develop vaccines that look like food products, which would be easier for people to take and avoid the stress of needles.
