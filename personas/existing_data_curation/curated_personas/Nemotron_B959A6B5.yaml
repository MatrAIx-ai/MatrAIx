  career_goals: In the next year, Ariel plans to earn the Certified Administrative Professional (CAP) credential and complete two business‑administration courses at a local community college to deepen her
    managerial knowledge. She aims to lead a cross‑departmental efficiency project that streamlines document handling and reduces turnaround time. Over the next three to five years, she hopes to advance
    to an Office Manager or Director of Administrative Services position within the university system, overseeing multiple support teams and shaping policy on workplace well‑being. Long‑term, Ariel envisions
    completing an associate’s degree in Business Management and eventually moving into senior administrative leadership, where she can champion mentorship programs, employee‑engagement initiatives, and
    incorporate community‑art collaborations into the workplace culture.
