personas:
  professional: William Neri, a 29‑year‑old gambling surveillance officer, leverages his expert real‑time video analytics and humanities‑based communication skills to spot threats with precision, while
    methodically documenting incidents and mentoring junior guards, positioning them for a future supervisory role and CPP certification.
  sports: William Neri, a 29‑year‑old outdoor enthusiast, avidly follows the Minnesota Vikings and Twins, plays pickup basketball with the St. Paul Lions club, spends weekends fishing on Lake Minnetonka,
    hikes the Boundary Waters, and maintains a disciplined strength‑training schedule at Ironhaven Gym, balancing competitive spirit with a love for nature.
  arts: William Neri, a 29‑year‑old cultural aficionado, devotes evenings to reading non‑fiction history and philosophy, competes in local chess tournaments, listens to Bob Dylan and The National while
    home‑brewing, and attends indie film screenings that feature directors like Christopher Nolan, enriching their creative outlook.
  travel: William Neri, at 29, plans trips with meticulous spreadsheets, having trekked the Boundary Waters, road‑tripped the Pacific Northwest, and visited Toronto’s Distillery District, while dreaming
    of Iceland’s volcanic trails and Scotland’s historic castles, always balancing budget‑friendly cabin stays with the occasional splurge on a boutique brewery tour.
  culinary: William Neri, a 29‑year‑old culinary experimenter, enjoys grilling smoked walleye tacos with hickory chips, simmering elk stew seasoned with juniper berries, and brewing a crisp IPA using Cascade
    hops, often pairing meals with locally sourced wild rice, honey‑glazed carrots, and a dash of artisanal cheese.
  core: William Neri is a methodical, competitively curious surveillance specialist who channels stress into chess, woodworking, and disciplined fitness, yet constantly battles worry that fuels both meticulous
    planning and occasional overthinking.
background:
  cultural: William grew up in Osseo, a suburb of Minneapolis, within a working‑class family of German‑Irish ancestry. The Midwestern environment instilled in him values of hard work, modesty, and community
    involvement, typical of the 'Minnesota nice' ethos, while also fostering a healthy skepticism toward authority. Local traditions such as lake outings, community fairs, and support for local sports teams
    shaped his appreciation for outdoor recreation and collective gatherings. His humanities education further exposed him to a broad cultural perspective, enabling him to navigate diverse social settings
    with respect and curiosity.
