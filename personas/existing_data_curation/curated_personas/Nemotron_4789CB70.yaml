  career_goals: He aims to move from frontline surveillance to a supervisory role within casino security, eventually earning the Certified Protection Professional (CPP) designation. His long‑term ambition
    is to become a security manager for a large entertainment complex, integrating emerging AI‑driven monitoring tools to improve threat detection. He also plans to pursue a master’s degree in criminal
    justice or risk management, which would open pathways to corporate security consulting or private investigation work. Throughout his career progression, he values practical solutions grounded in solid
    data and seeks opportunities to mentor newer guards.
