personas:
  professional: Yian Roseman, a retired data scientist turned community mentor, leverages their proficiency in Python, MATLAB, and scientific research to design and lead STEM outreach workshops for underserved
    youth, using polished public speaking and storytelling skills to demystify complex concepts while balancing meticulous budget oversight with the flexibility to adapt programs on the fly, and their calm,
    resilient nature ensures they remain the energized center of each session.
  sports: Yian Roseman, a devoted fan of the New York Knicks and Yankees, joins a weekly senior walking group through Central Park, mixes in low‑impact yoga at a community center, competes in bridge tournaments
    at the Manhattan Bridge Club, and enjoys casual pickleball matches at the Hudson River Recreation Center, balancing love for team sports with gentle exercise suited to their age, and they relish the
    camaraderie of friendly competition.
  arts: Yian Roseman, an avid jazz aficionado who occasionally takes the stage to trumpet alongside tributes to Miles Davis and John Coltrane, curates a personal collection of black‑and‑white cityscape
    photographs inspired by Henri Cartier‑Bresson, and participates in a weekly book discussion group dissecting recent works by Ta‑Nehisi Coates and Rebecca Solnit, allowing the arts to continually fuel
    their curiosity and outgoing nature, and they often share their photographs at local community exhibitions.
  travel: Yian Roseman, an organized yet adventurous traveler, meticulously plans visits to historic landmarks such as the National Museum of American History in Washington, D.C., the Freedom Trail in Boston,
    and the civil‑rights sites of Selma, while also carving out spontaneous weekend getaways to the Hudson Valley vineyards and dreaming of future excursions to the jazz‑rich streets of New Orleans and
    the historic libraries of Oxford, England, and they often reflect on how each trip deepens their understanding of societal change.
  culinary: Yian Roseman, a confident home cook specializing in soulful southern staples like fried catfish, collard greens simmered with smoked turkey, and sweet potato pie, harvests fresh basil, thyme,
    and cherry tomatoes from their balcony garden to enhance dishes, while they occasionally treat themselves to upscale tasting menus at Michelin‑starred restaurants in Manhattan, balancing comfort cooking
    with refined culinary adventures.
  core: Yian Roseman, a charismatic retiree who weaves data‑driven mentorship, late‑night jazz trumpet sessions, and a habit of occasionally forgetting to water their balcony herbs into a resilient, curiosity‑fueled
    life, exemplifies how they balance practicality and sociability to amplify community impact.
background:
  cultural: Yian is a Black American who grew up in Harlem, a vibrant hub of African‑American culture in New York City. His family roots trace back to the Southern United States, with grandparents who migrated
    north during the Great Migration, carrying traditions of gospel music, storytelling, and community solidarity. Immersed in the civil‑rights legacy of his neighborhood, he values collective uplift, resilience,
    and the celebration of Black artistic expression. These cultural influences shape his commitment to mentorship, social advocacy, and the preservation of heritage through food, music, and community engagement.
attributes:
  skills: '["Data analysis", "Scientific research methods", "Python programming", "MATLAB", "Technical writing", "Public speaking", "Workshop facilitation", "Mentoring", "Community outreach", "Event planning",
    "Budget management", "Conflict resolution", "Collaborative networking"]'
  hobbies: '["Jazz music", "Playing trumpet", "Soul‑food cooking", "Urban gardening", "Traveling to historic sites", "Reading non‑fiction", "Volunteer tutoring", "Cityscape photography", "Bridge (card game)",
    "Book club participation"]'
  career_goals: Although retired from formal employment, Yian aims to channel his expertise into mentorship and advocacy. He aspires to lead STEM outreach programs for underserved youth in New York City,
    establishing workshops that combine hands‑on experimentation with practical problem‑solving. He hopes to serve on advisory boards for community tech incubators, helping minority entrepreneurs navigate
    startup challenges. Additionally, Yian plans to author a memoir that interweaves his personal journey with reflections on resilience and social change, hoping the book will inspire future generations
    to balance curiosity with pragmatic action.
