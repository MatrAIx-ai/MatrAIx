persona_description: A scientist who specializes in the development of molecular memories, particularly in the use of electrons to switch the magnetism of individual molecules. His research interests include
  the design and synthesis of molecules for information storage, and the application of molecular memories in various fields such as computing, electronics, and medicine. He is a member of the "Functions
  by Switching" project funded by the German Research Foundation (DFG).
