  hobbies: '[''Fishing on the Chippewa River'', ''Woodworking and furniture making'', ''Hiking local trails'', ''Attending community festivals'', ''Reading self‑improvement literature'', ''Volunteering
    at church food pantry'']'
  career_goals: Terry aims to transition from a first‑line supervisor to a full store manager within the next two to three years, seeking to oversee all aspects of store operations and drive higher profitability.
    He plans to enroll in a part‑time bachelor’s program in Business Administration to strengthen his strategic management skills. Long‑term, he aspires to become a district manager, overseeing multiple
    locations while championing employee well‑being programs that address stress and work‑life balance—issues he personally experiences. He also hopes to mentor emerging supervisors, building a pipeline
    of capable leaders within his company.
