personas:
  professional: Terry Edgerton, a data‑driven strategy consultant, leverages their statistical modeling and narrative‑building expertise to craft equity‑focused recommendations that embed cultural sustainability
    into client business plans.
  sports: Terry Edgerton, a dedicated member of the East Bay Mountain Club, spends weekends hiking Redwood Regional Park trails, follows the San Francisco Giants season closely, occasionally joins a community
    basketball league for light competition, and they prefer solitary early‑morning jogs along the Bay Trail over crowded gyms.
  arts: Terry Edgerton, an avid participant in Bay Area art walks, curates a personal sketchbook inspired by the murals of Shepard Fairey and Ai Weiwei, listens to John Coltrane’s jazz, Nina Simone’s soul,
    and Max Richter’s contemporary classical while experimenting with digital photography of urban facades, and they regularly write essays on the intersection of data storytelling and visual culture.
  travel: Terry Edgerton, who plans trips with spreadsheet precision, has explored the street art of Mexico City, the historic temples of Kyoto, and the vineyards of Napa Valley, and they dream of cycling
    the coastal route from San Luis Obispo to Santa Barbara while balancing a modest travel budget and a desire for quiet reflection in each destination.
  culinary: Terry Edgerton, a self‑taught experimental cook, frequently whips up sous‑vide salmon with miso glaze, heirloom tomato gazpacho seasoned with saffron, and matcha‑infused panna cotta, while they
    source rare ingredients like black garlic and za’atar at specialty markets and pair each dish with carefully selected jazz or classical playlists.
  core: Terry Edgerton, who merges a methodical data mindset with solitary artistic pursuits, channels curiosity into socially conscious strategy while they occasionally over‑invest in boutique coffee subscriptions.
background:
  cultural: Terry grew up in a multigenerational Black family in Oakland, where storytelling, community activism, and cultural pride were woven into everyday life. His parents emphasized education and exposed
    him to African American literature, jazz, and the vibrant mural tradition that defines Oakland’s streets. He regularly participates in local cultural events such as the Oakland Art Murmur, Juneteenth
    celebrations, and community youth programs that nurture artistic expression. Terry’s cultural identity blends the historical legacy of the African diaspora with the contemporary, multicultural fabric
    of the Bay Area, shaping both his personal worldview and his professional ethos.
attributes:
  skills: '["Data Analysis", "Statistical Modeling", "Financial Modeling", "Strategic Planning", "Process Improvement", "Project Management", "Research & Critical Thinking", "Report Writing", "Presentation
    Design", "Stakeholder Engagement", "Python (pandas, matplotlib)", "SQL", "Tableau", "Power BI"]'
  hobbies: '["Visiting art galleries", "Sketching and drawing", "Reading (fiction, philosophy, Black literature)", "Writing essays and poetry", "Listening to jazz and classical music", "Urban photography",
    "Hiking in nature", "Cooking experimental cuisine", "Attending public lectures and podcasts", "Meditation"]'
  career_goals: Terry aims to become a senior strategy consultant or director of analytics within an organization that values socially responsible decision‑making. He seeks to leverage data-driven insights
    to promote equity and cultural sustainability, especially for underrepresented communities. In the near term, he plans to lead cross‑disciplinary teams that blend analytical rigor with artistic insight
    and intends to pursue an MBA to enhance his leadership capacity. Long‑term, he envisions influencing corporate governance or public policy to create economic empowerment opportunities for the Black
    community and to embed cultural awareness into strategic planning.
