    fleet‑management software'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Restoring classic cars'', ''Woodworking'', ''Listening to classic rock and blues music'', ''Attending local high‑school football games'', ''Community volunteering
    at the county fair and veterans events'', ''Playing poker with friends'', ''Billiards'']'
  career_goals: Jimmy aims to expand his career within the transportation sector while maintaining the stability he values. In the next two years, he plans to obtain a hazardous‑material endorsement and
    a high‑capacity trailer endorsement for his CDL, positioning himself for higher‑pay assignments. His long‑term goal is to transition to an owner‑operator role, purchasing his own truck and building
    a small fleet serving regional distributors in Pennsylvania and neighboring states. Concurrently, he is interested in moving into a logistics supervisor position, where his organizational strengths
    can be applied to route optimization and team coordination. He also hopes to complete a certificate program in supply‑chain management, allowing him to eventually take on a sales‑manager role at the
    automotive parts company where he currently works, blending his driving expertise with his sales experience. Financially, Jimmy is focused on saving for a down payment on a house in New Bloomfield,
    seeking a permanent base that aligns with his preference for routine and community ties.
