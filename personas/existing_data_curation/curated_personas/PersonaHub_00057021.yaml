persona_description: A scientist who studies the impact of pollution in aquaculture areas on edible species and the safety of seafood. They are interested in the interaction between copper and bacteria
  in aquatic habitats and their effect on crustaceans, as well as the impact of copper exposure on bacterial community structure and histamine accumulation during storage. They are also interested in the
  potential of copper treatment during aqua culturing to improve food safety.
