persona_description: A historian or archaeologist with expertise in the study of Native American cultures in the American Southwest, specifically focusing on the Hohokam people and their platform mound
  settlements. This person is likely to be interested in the detailed architectural documentation, bioarchaeological research, and the synthesis of data from the Roosevelt Platform Mound Study project.
  They would appreciate the context of the project's goal to provide a summary and synthesis of the Hohokam platform mound settlements and their significance in understanding Native American polities in
  the region.
