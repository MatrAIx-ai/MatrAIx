personas:
  professional: Alexis Haines, a budding art-therapy facilitator, blends their sketching talent, Canva and Photoshop Elements savvy, and innate empathy to craft community workshops that prioritize flexible,
    spontaneous creative expression for at‑risk youth in the Lowcountry.
  sports: Alexis Haines jogs the winding trails of Francis Beidler Forest with the Charleston Trail Runners club, cheers on the Charleston Battery’s soccer matches and the RiverDogs’ summer baseball games,
    and prefers low‑impact yoga over rigid gym routines to stay fit.
  arts: Alexis Haines immerses herself in Charleston’s monthly art walks, drawing inspiration from the watercolor serenity of John Singer Sargent, the lyrical melancholy of indie folk artists like Sufjan
    Stevens and Phoebe Bridgers, and the bold color palettes of contemporary painter Kehinde Wiley, which all shape her own experimental acrylic‑watercolor pieces.
  travel: Alexis Haines favors unplanned weekend getaways, hopping a bus to Savannah’s historic squares or catching a ferry to the Outer Banks, while dreaming of a solo trek through the misty Redwoods of
    California and a cultural immersion trip to the music‑laden streets of Dublin, all balanced against a modest student budget.
  culinary: Alexis Haines experiments in the kitchen with a moderate skill set, perfecting Southern‑fusion desserts like bourbon‑infused peach cobbler with a dash of cardamom, and frequently pairs them
    with spicy fried chicken biscuits, while relishing fresh Gulf shrimp, collard greens, and the occasional splash of lavender in a homemade lemonade.
  core: Alexis Haines is a curiosity‑driven, free‑spirited art enthusiast who balances spontaneous marsh wanderings with compassionate volunteer work, often juggling a messy schedule, a half‑finished sketchbook,
    and an ever‑growing collection of indie folk playlists.
background:
  cultural: Raised in Goose Creek, a suburb of Charleston in Berkeley County, Alexis grew up in a middle‑class white family with Irish‑German roots. Her upbringing combined typical Lowcountry customs—Sunday
    church gatherings, family BBQs featuring shrimp and grits, and annual Charleston heritage festivals—with exposure to the region’s vibrant artistic scene. She attended the local public high school, participated
    in the art department’s portfolio class, and helped organize community service projects through her church youth group. This blend of Southern hospitality, coastal nature, and a growing appreciation
    for diverse artistic expression shapes her worldview and informs her desire to give back to the community.
attributes:
  skills: '[''Illustration'', ''Basic Graphic Design (Canva, Photoshop Elements)'', ''Creative Writing'', ''Social Media Content Creation'', ''Peer Support & Active Listening'', ''Community Outreach Coordination'',
    ''Basic First Aid'', ''Budgeting & Personal Finance'', ''Photography'', ''Event Planning (Volunteer)'']'
  hobbies: '[''Hiking & Nature Sketching'', ''Watercolor & Acrylic Painting'', ''Photography'', ''Creative Writing & Poetry'', ''Indie Folk Music'', ''Experimental Cooking & Baking'', ''Animal Shelter Volunteering'',
    ''Attending Art Walks & Gallery Openings'', ''Social Media Storytelling'']'
  career_goals: Alexis aims to enroll in a community‑college program in social work or art therapy within the next year, with the long‑term goal of blending her artistic talents and compassion to lead therapeutic
    art workshops for at‑risk youth in the Lowcountry. In parallel, she hopes to build a freelance portfolio creating visual content for local non‑profits and small businesses, allowing her to maintain
    a flexible schedule that honors her need for spontaneous exploration. Ultimately, she envisions a career that lets her foster community healing while continuing personal artistic growth.
