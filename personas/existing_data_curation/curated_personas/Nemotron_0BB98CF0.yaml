  career_goals: Lisa dreams of a future where she can blend her love for animals with her creative talents. She aspires to become a veterinarian to care for farm animals and wildlife, while also hoping
    to work as an illustrator who brings stories to life with her drawings. She imagines studying science and art in high school and college, eventually opening a community space where children can explore
    nature and create art together. Occasionally she daydreams about space exploration and wonders if she could one day be an astronaut, but her primary ambition remains focused on caring for animals and
    sharing her artistic gifts with others.
