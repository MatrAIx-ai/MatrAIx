personas:
  professional: Lisa Lester is a budding young artist who channels her curiosity and love for nature into detailed farm animal portraits using watercolor and crayons, meticulously planning each art project
    while also allowing spontaneous bursts of imagination that keep their classmates inspired.
  sports: Lisa Lester thrives on the soccer field with the Meadowbrook Junior Soccer Club, dashes around during tag at recess, cheers for the nearby professional baseball team the Greenfield Giants, and
    they believe that staying active by exploring the farm fields after school keeps their energy balanced.
  arts: Lisa Lester draws inspiration from nature‑focused artists like Mary Cassatt and wildlife photographer Jim Brandenburg, hums along to songs by Taylor Swift and the whimsical scores of Disney’s 'Frozen',
    and they eagerly participate in the school’s art club where they experiment with mixed‑media collages.
  travel: Lisa Lester dreams of camping under the Northern Lights in Iceland after the next Girl Scout trek, already loves weekend trips to the local state park’s waterfalls, and they prefer hands‑on adventure
    over luxury, often mapping routes with crayons on scrap paper.
  culinary: Lisa Lester enjoys decorating sugar cookies with rainbow sprinkles and icing, proudly bakes mini blueberry muffins using fresh farm berries, and they can whip up a simple kiwi fruit salad, showing
    budding confidence in the kitchen while sometimes over‑sweetening their treats.
  core: Lisa Lester is a curiosity‑driven eight‑year‑old who blends meticulous art planning with spontaneous outdoor exploration, saves allowance for future gadgets, manages mild allergies with a digital
    reminder, and occasionally forgets to clean up their paintbrushes.
background:
  cultural: Lisa comes from a Midwestern American background rooted in the agricultural communities of Nebraska. Her family’s heritage includes German and Scandinavian ancestors who settled the region in
    the late 19th century, bringing traditions such as harvest festivals, community fairs, and a strong emphasis on self‑reliance. Growing up in Adams, Gage County, she experiences a close‑knit community
    where neighbors often gather for church events, county fairs, and local sports. These cultural influences nurture her appreciation for the outdoors, a sense of responsibility toward her community, and
    an enjoyment of group activities and collaborative projects.
