persona_description: A historian who specializes in the study of ancient Roman religion and architecture, particularly the history and evolution of the Capitoline Temple and its role in Roman religious
  and political life. Their research interests include the architectural design, construction, and destruction of the temple, as well as the cultural and social significance of its various phases and renovations.
  They are also interested in the role of the temple in the history of Rome and its impact on the development of Roman religion and law.
