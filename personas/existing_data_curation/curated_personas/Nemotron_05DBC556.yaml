personas:
  professional: Matthews Delcueto, a seasoned steamfitter with an associate’s degree in mechanical technology, blends meticulous blueprint reading with hands‑on welding to solve fluid‑dynamic puzzles, and
    while their relaxed approach sometimes leaves work orders unfiled, they channel their curiosity and practicality toward earning ASME B31.1 certification and moving into a foreman role that balances
    leadership with family time.
  sports: Matthews Delcueto, an avid outdoorsman, spends weekends fishing at local reservoirs with a close‑knit crew and joins a seasonal hiking group that explores nearby state parks, while they cheer
    on the regional professional baseball team, the River City Royals, and support the community’s semi‑pro soccer club, the United FC.
  arts: Matthews Delcueto, a quiet acoustic‑guitar hobbyist, relaxes after a day of fitting pipes by strumming folk tunes by Bob Dylan and Johnny Cash, while they also attend small‑venue shows featuring
    indie folk singer‑songwriter The Avett Brothers and admire the vintage automotive design showcased at local classic car exhibitions.
  travel: Matthews Delcueto prefers road‑trip adventures that combine scenic fishing spots and historic rail lines, having driven the Pacific Coast Highway to soak in ocean views, trekked the Alpine trails
    of Switzerland for a weekend hike, and they are planning a future visit to Patagonia’s remote rivers to fish for trout.
  culinary: Matthews Delcueto enjoys cooking family‑style meals that anchor their heritage, expertly grilling arepas stuffed with cheese and simmering a hearty sancocho brimming with plantains, yucca, and
    tender pork, and they take pride in balancing bold flavors with the measured patience of a seasoned craftsman.
  core: Matthews Delcueto is a meticulous yet easy‑going steamfitter whose hands‑on curiosity fuels a love for DIY projects, quiet guitar riffs, and family‑rooted cooking, and they juggle a laid‑back approach
    to planning with a steadfast focus on harmony in work and life.
background:
  cultural: Matthews is the son of Colombian immigrants who settled in New Jersey in the early 1990s. He grew up speaking Spanish at home and celebrating Colombian holidays such as Carnaval de Barranquilla
    and Día de la Independencia with family gatherings centered around music like Cumbia and Vallenato and dishes like arepas, empanadas, and sancocho. Living in Lyndhurst, NJ, he remains active in the
    local Colombian community through church events, cultural festivals, and neighborhood gatherings. His heritage influences his strong family orientation, hospitality, and a deep appreciation for communal
    meals, while his everyday life reflects a blend of Colombian traditions and the multicultural environment of Bergen County.
