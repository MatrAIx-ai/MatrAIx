    ''Succulent and indoor plant gardening'', ''Calligraphy and hand-lettering'']'
  career_goals: Christopher aims to translate his curiosity about art history and practical business sense into a boutique nail studio that showcases culturally inspired designs. In the next two years he
    plans to earn an advanced nail art certification, expand his client base, and develop a line of eco-friendly nail polishes. Over five years, he hopes to open his own storefront in Pittsburgh’s Lawrenceville
    district, integrate wellness services such as foot therapy and mindfulness sessions, and author a guidebook that merges nail art with artistic narratives. He balances these ambitions with realistic
    financial planning and safeguards against stress through scheduled self-care.
