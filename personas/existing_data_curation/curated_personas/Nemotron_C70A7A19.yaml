  career_goals: He aims to move into a senior lead engineering role within the next three to five years, where he can shape architecture decisions for large‑scale, cloud‑native systems. William wants to
    deepen his expertise in system design and obtain an AWS Solutions Architect certification, while also sharpening his leadership skills to eventually become a technology manager or director. In parallel,
    he hopes to share his knowledge through speaking engagements at local meetups and industry conferences, and he nurtures a long‑term ambition of launching a side venture that merges his technical abilities
    with his love for community‑focused platforms.
