persona_description: A human rights advocate who is particularly interested in the implementation and theoretical understanding of Principle 32 of the United Nations' Universal Declaration of Human Rights.
  This individual seeks to understand the procedural aspects of the right to reparation, including the right to access remedial procedures, the requirements of national reparation programmes, and regional
  and international procedures. They are likely to be knowledgeable about the obligations of states to provide effective remedies, as well as the various reparation procedures that have been implemented,
  both judicial and administrative, dealing with gross violations of human rights at national or international level. They may also be interested in the theoretical framework of reparation procedures, and
  the ways in which these procedures can be implemented and enforced.
