  hobbies: '[''Herb gardening'', ''Cooking traditional Vietnamese dishes'', ''Knitting and crochet'', ''Reading literature'', ''Listening to Vietnamese and folk music'', ''Walking along the Bay shoreline'',
    ''Tai chi practice'', ''Volunteering at senior center'', ''Documenting family stories'']'
  career_goals: Although retired, Sun Moon aims to stay physically and mentally independent, maintaining her garden and daily walking routine. She wishes to document her life story and family genealogy
    in a modest memoir to pass on cultural heritage to great‑grandchildren. She aspires to lead a small cooking workshop at the community center, sharing Vietnamese recipes with younger generations while
    learning a few modern culinary techniques herself. Continuing her modest curiosity, she plans to become more comfortable with tablets and social media to keep close contact with family spread across
    the country. Ultimately, she seeks to ensure her home remains a welcoming, safe space for relatives and neighbors while contributing her experience to local cultural celebrations.
