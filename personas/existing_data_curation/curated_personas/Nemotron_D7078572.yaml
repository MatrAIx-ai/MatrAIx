  career_goals: Jorge aims to earn his GED within the next year and then enroll in a community college program focused on information technology or automotive technology. He hopes to secure an apprenticeship
    that lets him apply his hands‑on skills while gaining a stable income to support his family. In the long term, he envisions becoming a certified IT support specialist or a skilled automotive technician,
    and eventually leveraging his bilingual abilities to work in community outreach or tech education for underserved youth.
