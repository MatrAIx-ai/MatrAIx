personas:
  professional: Jorge Gonzalezsalas is a tech‑savvy high‑school senior who blends hands‑on tinkering with a budding drive for formal IT education; they leverage their bilingual fluency and cooperative nature
    to troubleshoot devices, mentor younger kids, and pursue an apprenticeship that will bridge practical electronics projects with a future as a certified IT support specialist.
  sports: Jorge Gonzalezsalas is a dedicated Saturday‑morning soccer player for the local community center league, cheering on D.C. United during the MLS season and fitting in weekly bike rides for cardio,
    yet they sometimes let schoolwork interfere with consistent training.
  arts: Jorge Gonzalezsalas immerses themselves in graphic novels like 'Saga' and 'Watchmen', sketches urban Washington, D.C. cityscapes with a pen‑and‑ink style reminiscent of street artist Banksy; they
    also enjoy a soundtrack that blends regional Mexican legends such as Vicente Fernández with hip‑hop icons like Kendrick Lamar, shaping both their visual and auditory creative expression.
  travel: Jorge Gonzalezsalas loves budget‑friendly trips, having explored the monuments of Washington, D.C., and dreaming of a future backpacking adventure through Mexico City’s tech hubs and the historic
    streets of Oaxaca; they plan each journey around school breaks and limited family funds.
  culinary: Jorge Gonzalezsalas cooks tacos al pastor at home, marinating pork in achiote paste, pineapple, and orange juice, garnishing with cilantro, onion, and lime, while they also master simple quesadillas
    and experiment with homemade salsa verde made from tomatillos and jalapeños.
  core: Jorge Gonzalezsalas is a curious, organized teen who constantly juggles Arduino projects, soccer games, and worries about school fees, all while they translate for neighbors and perfect tacos al
    pastor.
background:
  cultural: Jorge comes from a family of Mexican immigrants originally from the state of Jalisco. He grew up speaking Spanish at home while attending English‑language schools in Prince George’s County,
    giving him a bicultural perspective. Family gatherings often revolve around cooking homemade salsas, celebrating Día de los Muertos, and sharing stories of life in Mexico. The local Mexican community
    in the Washington‑DC metro area, including churches and cultural festivals, provides him with a sense of belonging, and he frequently participates in community clean‑ups and cultural events. This blend
    of Mexican traditions and the suburban American environment shapes his values of family solidarity, respect for hard work, and appreciation for both his heritage and his adopted home.
