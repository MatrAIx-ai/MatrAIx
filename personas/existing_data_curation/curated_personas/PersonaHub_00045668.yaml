persona_description: A team of international researchers who specialize in plant pathology, specifically focusing on the development of protein biomarkers for the identification of virus vectors in insect
  populations. They are working to tackle the global problem of plant viral diseases, which are spread by insects. The researchers are part of a three-year, Basic Research to Enable Agricultural Development
  (BREAD) grant, which they received from the National Science Foundation (NSF) and the Bill & Melinda Gates Foundation. Their goal is to develop a test kit that can be used in the field to identify if
  an insect population is likely to be a virus vector, allowing growers to target particular insects with pesticides at a certain time in their lifecycle.
