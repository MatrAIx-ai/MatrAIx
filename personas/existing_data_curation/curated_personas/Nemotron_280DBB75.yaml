  career_goals: Gonzalo aims to move into a senior regional manager position within the next five years, leveraging his managerial track record to oversee multiple locations. He plans to enroll in an MBA
    program to deepen his strategic expertise and later launch a community‑focused venture that brings authentic Honduran cuisine to Charlotte’s food scene. Mentoring emerging leaders and implementing sustainable
    operational practices are also key ambitions.
