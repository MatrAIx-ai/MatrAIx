personas:
  professional: Nely Beltran, a seasoned cashier with bilingual fluency and a knack for meticulous cash handling, leverages checklists and conflict‑resolution skills to keep the store flow smooth while
    targeting a shift‑manager role within two years.
  sports: Nely Beltran enjoys evening walks with the Alexandria Waterfront Walking Club, attends thrice‑weekly yoga at a nearby studio, supports the Washington Capitals, Washington Nationals, and Washington
    Commanders, and occasionally joins a community recreation league for beginner’s badminton, using these activities to balance structure with spontaneous fitness bursts.
  arts: Nely Beltran immerses themselves in music ranging from Andean folk artist Susana Baca to salsa legend Celia Cruz and indie band Tame Impala, participates in a local book club that discusses mystery
    novels by Agatha Christie and Gillian Flynn, and occasionally attends performances at the Arena Stage, finding that these artistic experiences enrich their sense of community and personal relaxation.
  travel: Nely Beltran prefers moderately planned trips that blend relaxation with cultural curiosity, having explored Washington D.C.’s museums, taken a weekend sailing getaway on the Chesapeake Bay, and
    dreaming of a culinary pilgrimage to Lima’s coastal markets and a serene retreat in Kyoto’s tea houses, all while balancing travel costs with a modest savings plan.
  culinary: Nely Beltran, an adept home cook, loves preparing traditional dishes such as ceviche with fresh lime, ají amarillo, and cilantro, lomo saltado featuring tender beef, onions, and soy‑vinegar
    glaze, and experimenting with causa rellena using mashed yellow potatoes and avocado, often sourcing ingredients from a community garden and sharing meals with friends as a cornerstone of their social
    life.
  core: Nely Beltran balances a structured yet easy‑going outlook, juggling ambitions for a supervisory retail role with a habit of over‑planning grocery lists that they rarely follow, a tendency to worry
    over minor details, and a love for spontaneous waterfront strolls that keep their day grounded.
background:
  cultural: Nely was raised in a bilingual Peruvian household, celebrating Andean festivals such as Inti Raymi and maintaining traditional customs like family meals and folk music. Although she has lived
    in the United States since her early teens, she preserves her cultural identity through cooking, participation in the local Peruvian diaspora community in the D.C. area, and by sharing cultural celebrations
    with friends. Her background emphasizes collective harmony, hospitality, and respect for elders, values that shape her cooperative nature at work and in community activities. The blend of Peruvian heritage
    and her American surroundings informs her appreciation for outdoor spaces, gardening, and multicultural experiences.
attributes:
  skills: '[''Cash handling'', ''Point-of-sale system operation'', ''Bilingual customer service (Spanish/English)'', ''Basic bookkeeping'', ''Inventory management'', ''Conflict resolution'', ''Data entry'',
    ''Scheduling'', ''Retail merchandising'', ''Checklist‑based organization'']'
  hobbies: '[''Cooking Peruvian cuisine'', ''Evening walks along the waterfront'', ''Yoga'', ''Community gardening'', ''Listening to music (Andean folk, salsa, indie)'', ''Reading mystery novels'', ''Book
    club participation'', ''Volunteering at community center'']'
  career_goals: Nely aims to advance from her cashier role to a supervisory position, targeting a shift‑manager role within the next two years where she can apply her organizational strengths while enjoying
    a degree of flexibility. Long‑term, she envisions either becoming a store manager or transitioning into a community‑focused position such as a customer‑experience coordinator for a local non‑profit
    serving immigrant families. To support these ambitions, she plans to complete an online bachelor’s degree in business administration, giving her broader credentials for less stress‑intensive, yet structured,
    leadership roles.
