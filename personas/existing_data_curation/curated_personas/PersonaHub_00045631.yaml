persona_description: A climate change expert and author who specializes in the Intergovernmental Panel on Climate Change (IPCC) and has written extensively on the impacts of climate change on Australia.
  He is concerned about the potential for drought, reduced crop production, and the potential for a decrease in snow coverage, as well as the potential for natural hazards such as tropical diseases, cyclones,
  and extreme rainfall events. He is also aware of the potential for coastal erosion and rising sea levels, which could present challenges to some Aboriginal groups.
