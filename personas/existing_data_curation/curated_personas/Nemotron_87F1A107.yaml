  career_goals: Belkis aims to transition into a senior leadership role where she can shape design strategy for products that improve community well-being, such as mental-health or civic-engagement platforms.
    She aspires to become a UX Design Director or Design Lead within a technology firm or a government agency in the DC metro area, overseeing multidisciplinary teams while championing accessibility and
    inclusive design for underserved Latin-American communities. Mentorship is a priority; she wants to create a structured onboarding program for junior designers and advocate for workplace mental-health
    resources. Long-term, she envisions launching a boutique consultancy that blends her Salvadoran heritage with modern design to support small businesses and cultural organizations in the region.
