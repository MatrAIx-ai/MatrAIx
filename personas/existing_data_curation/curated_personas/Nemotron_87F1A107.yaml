personas:
  professional: Belkis Mejia is a senior UX/UI designer with two decades of experience in creating inclusive digital products, leveraging a data‑driven, systematic design process that satisfies their need
    for predictability while navigating anxiety‑induced perfectionism, and now aims to steer design strategy as a UX Design Director for community‑focused platforms.
  sports: Belkis Mejia enjoys weekend hikes on the scenic trails of Shenandoah National Park, participates in a local recreational softball league, follows the Washington Capitals and Washington Wizards
    with enthusiastic game‑day rituals, and balances fitness with a disciplined yoga practice.
  arts: Belkis Mejia channels creative energy through quilting, embroidery, and DIY home‑decor projects while regularly attending exhibitions of James Turrell and listening to the soulful sounds of Nina
    Simone and Celia Cruz, which inspire their visual storytelling in design.
  travel: Belkis Mejia prefers thoughtfully planned trips that blend cultural immersion with relaxation, such as a chef‑guided culinary tour in Oaxaca, a weekend road‑trip to Asheville’s art scene, and
    a future wish to explore the historic neighborhoods of Kyoto, all while navigating family commitments.
  culinary: Belkis Mejia excels at cooking traditional family dishes like pupusas filled with cheese and loroco, crisp yuca frita seasoned with garlic, and refreshing horchata made from toasted rice and
    cinnamon, while also experimenting with seasonal farmer‑market veggies and artisanal cheeses in weekend dinner parties.
  core: Belkis Mejia balances a disciplined, structure‑driven professional life with a creative, craft‑loving spirit, uses yoga and meditation to soften an inherent anxiety, and occasionally indulges in
    impulsive craft splurges that make budgeting a playful challenge.
background:
  cultural: Belkis was raised in a close‑knit Salvadoran immigrant family that settled in the Mid-Atlantic region. She grew up speaking both Spanish and English, celebrating Salvadoran traditions such as
    Día de los Fieles Difuntos, vibrant folk festivals, and sharing family recipes passed down through generations. Her Catholic upbringing emphasized community service and respect for elders, values she
    carries into her professional life by prioritizing teamwork, harmony, and empathy. While fully integrated into American society—evident in her academic achievements and career in design—she remains
    deeply connected to her roots, often incorporating Salvadoran color palettes, folkloric patterns, and cultural narratives into her design work to reflect the experiences of Latin-American users in the
    United States.
