  career_goals: Jordan aims to become a licensed Professional Engineer within the next five years, focusing on sustainable infrastructure projects that benefit his Appalachian community. He aspires to lead
    multidisciplinary engineering teams on large‑scale water‑resource and renewable‑energy initiatives, leveraging his curiosity for emerging technologies while applying practical, proven methods. In the
    longer term, he hopes to launch his own consulting firm that offers cost‑effective, environmentally‑friendly solutions to rural municipalities, and to mentor junior engineers, fostering a collaborative
    and supportive work culture.
