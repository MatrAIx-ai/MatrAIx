personas:
  professional: Jordan Jaquez is a 25‑year‑old mechanical engineer at a regional firm who blends methodical design expertise in SolidWorks, AutoCAD, MATLAB, and ANSYS with a curiosity for sustainable water‑resource
    solutions, leading cross‑functional teams with detailed Gantt charts, risk assessments, and clear technical manuals while mentoring junior staff and volunteering engineering skills for community infrastructure
    projects.
  sports: Jordan Jaquez is a forward in a local adult soccer league, a member of the Kanawha River Kayak Association, and a regular participant in the Appalachian Trail Club, training thrice weekly, cheering
    for Seattle Sounders FC and Charleston Battery, and blending competitive soccer with weekend hikes on the Blue Ridge and kayaking trips on the Kanawha River while maintaining a personal best 5‑k run
    under 20 minutes.
  arts: Jordan Jaquet immerses themselves in artistic pursuits through board‑game nights featuring Catan and Terraforming Mars, devouring science‑fiction novels by Ursula K. Le Guin and Neal Stephenson,
    listening to engineering podcasts like "The Engineering Commons," attending live performances by local bluegrass groups such as The Appalachian String Band, and collecting vintage vinyl of John Prine
    while occasionally dabbling in video editing for YouTube tutorials.
  travel: Jordan Jaquez plans travel with the same precision as their Gantt charts, favoring nature‑focused trips like weekend hikes in Shenandoah National Park, a kayaking expedition to the Boundary Waters
    in Minnesota, and a dream adventure to Iceland’s volcanic landscapes, while balancing a modest budget that prioritizes affordable campgrounds and occasional splurges on boutique cabins in Asheville.
  culinary: Jordan Jaquez’s culinary persona revolves around mastering Southern BBQ, regularly smoking pork ribs with a hickory‑infused dry rub, experimenting with mustard‑based Carolina sauce, and occasionally
    incorporating Korean gochujang into pulled pork, all while honing intermediate cooking skills that allow them to host weekly dinner parties for friends and teammates.
  core: Jordan Jaquez is a methodical, socially driven engineer who channels curiosity into sustainable design, balances a love for outdoor adventure and BBQ with a tendency to worry and over‑plan every
    detail of life.
background:
  cultural: Jordan grew up in Nitro, West Virginia, within a tight‑knit Appalachian community. His family background is primarily white, Anglo‑American, with generations of residents who valued hard work,
    self‑reliance, and close family ties. He was raised attending a local Baptist church, which reinforced a sense of cooperation, kindness, and community service. The regional culture—marked by appreciation
    for the outdoors, folk music, and Southern cuisine—shapes his lifestyle and values. Through his marriage, he also embraces a broader cultural perspective, blending traditional Appalachian customs with
    a contemporary, inclusive outlook.
