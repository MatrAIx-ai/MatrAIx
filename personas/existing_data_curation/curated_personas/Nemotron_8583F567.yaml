  career_goals: Wayne aims to advance into senior leadership within the insurance industry, targeting a regional claims manager role where he can mentor a team of adjusters and drive process improvements.
    He plans to earn the Chartered Property Casualty Underwriter (CPCU) designation and a certification in forensic investigation to deepen his expertise. Long‑term, he envisions establishing his own consultancy
    focused on disaster‑loss appraisal and risk mitigation for insurers, leveraging his blend of practical experience and forward‑looking curiosity to develop data‑driven claim handling frameworks.
