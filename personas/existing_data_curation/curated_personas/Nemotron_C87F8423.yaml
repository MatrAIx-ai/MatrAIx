personas:
  professional: Luz Ortiz is a budding architect-in-training, channeling her love for LEGO bricks and precise color‑by‑number art into early mastery of spatial planning, while her competitive streak pushes
    her to meticulously follow building instructions and perfect each model before showing anyone.
  sports: Luz Ortiz trains with the local Little Strikers youth soccer team, practicing precise dribbling drills with her dad on Tuesdays, and cheers for the U.S. Women’s National Team while proudly wearing
    her favorite Barcelona jersey during practice matches.
  arts: Luz Ortiz delights in listening to salsa legends Celia Cruz and Hector Lavoe, imitating their rhythms with spontaneous living‑room dance moves, and complements her creative side by coloring inside
    the lines of picture books illustrated by Eric Carle, all while constructing miniature cityscapes from LEGO.
  travel: Luz Ortiz prefers structured mini‑vacations, such as a well‑planned weekend trip to the nearby state beach where she builds sandcastles in a timed competition, and dreams of a meticulously organized
    family tour of Disney World, complete with a printed itinerary for each day.
  culinary: Luz Ortiz helps wash strawberries, blueberries, and banana slices for her mother’s fruit salad, loves the sweet crunch of mango chunks sprinkled with a pinch of lime, and can flawlessly assemble
    a simple “DIY taco” using pre‑cut lettuce, shredded cheese, and tiny corn tortillas, though she insists every ingredient be laid out in separate, labeled bowls.
  core: Luz Ortiz is a six‑year‑old with a love for orderly play, from LEGO constructions to salsa beats, balancing a fierce competitive drive with a meticulous approach to allowance, health, and tiny adventures.
background:
  cultural: Luz is raised in a close‑knit Puerto Rican family in Clermont, Florida. Her home is bilingual, speaking both Spanish and English, and she celebrates traditional holidays such as Three Kings
    Day and Puerto Rican festivals with music, dance, and food like arroz con gandules and pastelitos. She frequently hears bomba, plena, and salsa rhythms, which fuel her love for dancing. Family gatherings
    often involve storytelling in Spanish, reinforcing her cultural identity. Luz also participates in community events at the local Hispanic cultural center, where she learns about her heritage through
    crafts, cooking lessons, and cultural performances.
attributes:
  skills: '[''Reading simple words'', ''Writing her name'', ''Counting to 100'', ''Basic addition and subtraction'', ''Recognizing shapes and colors'', ''Following multi‑step instructions'', ''Using educational
