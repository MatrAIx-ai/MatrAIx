  hobbies: '[''Coloring within outlines'', ''Building with LEGO bricks'', ''Playing "Simon Says"'', ''Soccer practice drills'', ''Listening to salsa and bomba music'', ''Dancing to rhythmic beats'', ''Helping
    in the kitchen with simple tasks'', ''Reading picture books with predictable storylines'', ''Solving jigsaw puzzles'']'
  career_goals: Even at her young age, Luz talks about future careers that combine care, structure, and performance. She dreams of becoming a teacher because she loves helping peers learn step by step,
    a veterinarian because she is competitive about caring for animals and wants to be the best at it, and a dancer, inspired by the rhythmic music at family gatherings, where she can show precision and
    practice. Luz envisions reaching these goals by attending school, practicing each skill methodically, and earning recognition for her effort and improvement.
