  hobbies: '["Competitive Volleyball (Co‑ed League)", "Weekly 5K Runs and Charity Races", "Hiking in Watchung Reservation and Trailside Park", "Exploring Coffee Shops and Food‑Truck Festivals", "Street
    and Nature Photography", "Attending Networking Mixers and Open‑Mic Nights", "Mentoring High‑School Student Entrepreneurs", "Reading Business and Leadership Books", "DIY Home Décor Projects"]'
  career_goals: Sara aims to advance from her current general/operations manager role to senior operations manager within the next three years, focusing on scaling operational excellence in fast‑growing
    tech or manufacturing firms. She plans to pursue an MBA to broaden her strategic perspective and earn a Green Belt certification to deepen her Lean expertise. Long‑term, Sara envisions stepping into
    a Director of Operations or Chief Operating Officer position, where she can lead large‑scale digital transformation initiatives and mentor emerging women leaders. She also aspires to launch a boutique
    consultancy focused on process innovation for small businesses in the New Jersey area, leveraging her network and community ties.
