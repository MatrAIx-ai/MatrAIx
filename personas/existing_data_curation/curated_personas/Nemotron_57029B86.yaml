  hobbies: '["Playing saxophone in a community jazz band", "Leading a school book club", "Hiking in Connecticut state parks", "Gardening", "Cooking Southern cuisine", "Coaching youth basketball", "Writing
    poetry", "Attending cultural festivals"]'
  career_goals: Ravi aims to deepen his instructional expertise by pursuing a master's degree in educational leadership within the next two years, with the long‑term goal of moving into an administrative
    role such as department chair or assistant principal. He is passionate about designing interdisciplinary curricula that weave together literature, history, and social justice, and hopes to lead school‑wide
    initiatives that promote cultural competence and student well‑being. He also aspires to mentor new teachers, publish a resource guide for inclusive humanities teaching, and expand community partnerships
    that support families and address equity.
