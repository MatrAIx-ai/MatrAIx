  hobbies: '[''Softball'', ''Hiking'', ''Fishing'', ''Homebrewing'', ''Barbecuing'', ''Attending St. Louis Cardinals games'', ''Live music events'', ''Volunteer work (food bank, Habitat for Humanity)'',
