  career_goals: Jerre plans to earn his Certified Public Accountant (CPA) license within the next year and advance to a senior audit manager position at a regional accounting firm. He aims to lead high‑profile
    audit engagements, integrate data‑analytics tools to increase efficiency, and mentor junior staff. Long‑term, he aspires to become a chief financial officer of a mid‑size manufacturing firm in the Ozarks,
    or launch his own boutique consulting practice focused on forensic accounting and financial advisory for small businesses. His competitive drive pushes him to seek professional recognition through speaking
    at AICPA conferences and publishing thought‑leadership articles.
