personas:
  professional: William Stoecklin is an ambitious high school junior who blends digital illustration, acoustic songwriting, and fledgling Python coding into experimental multimedia projects, building a
    portfolio of indie game art and interactive sketches while navigating the tension between creative spontaneity and the deadlines that often slip through their unstructured workflow.
  sports: William Stoecklin is an avid weekend hiker who regularly trails the Sawtooth Mountains with the local Idaho Trailblazers club, joins occasional pickup soccer games at the community center, and
    follows the Idaho Vandals men’s basketball team, channeling their love of nature into fitness while occasionally skipping gym sessions when a new art project captures their attention.
  arts: William Stoecklin immerses themselves in creative expression through sketching the craggy Idaho landscape, composing folk‑rock songs on an acoustic guitar inspired by artists like John Mayer, and
    diving into narrative‑rich indie games such as Celeste and Journey, while also drawing inspiration from graphic novel series like Saga and the atmospheric art of painter Albert Bierstadt.
  travel: William Stoecklin prefers spontaneous road trips that start with a sunrise hike in the Selway‑Bitterroot Wilderness, a weekend fishing stint on Henrys Lake, and a cultural detour to Portland’s
    indie art festivals, all while day‑dreaming of an eventual backpacking adventure through Japan’s rural villages to study traditional ukiyo‑e prints.
  culinary: William Stoecklin enjoys cooking simple, hearty meals that echo their outdoor lifestyle—pan‑seared trout fresh from a fishing trip, russet potato hash with rosemary, and campfire‑made apple‑cinnamon
    pancakes—while experimenting with seasonal ingredients like wild mushrooms and locally sourced honey.
  core: William Stoecklin is a nature‑driven teen creator whose curiosity fuels a restless blend of art, music, and code, tempered by an earnest struggle with organization and a tendency to over‑think.
background:
  cultural: William grew up in Rigby, Idaho, a small‑town community where traditional Midwestern values of self‑reliance, neighborliness, and connection to the outdoors are prominent. His family background
    is of European descent, and while local culture emphasizes simplicity and community events, William is also shaped by the broader digital world—online art communities, indie music scenes, and global
    pop culture—allowing him to blend rural American sensibilities with contemporary creative influences.
