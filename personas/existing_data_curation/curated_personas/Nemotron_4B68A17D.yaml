  career_goals: William aspires to merge his love for visual art and technology into a career as a multimedia designer or independent game artist. He plans to build a diverse portfolio during high school,
    attend a specialized art program or community college after graduation, and eventually freelance to maintain the flexibility he values. He hopes his work will convey unconventional ideas while fostering
    community and emotional connection, and he seeks a work environment that balances creative freedom with manageable stress levels.
