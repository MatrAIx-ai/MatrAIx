personas:
  professional: Ignacio Aguinaldo is a reliable, organized carpenter who combines precise blueprint reading with a curiosity for sustainable building, leading bilingual crews on residential remodels and
    custom furniture projects while mentoring apprentices and constantly refining his craft through trade tutorials.
  sports: Ignacio Aguinaldo plays weekly soccer for the Kankakee United league, follows the Chicago Bears (NFL) and Chicago Cubs (MLB), fishes on the Kankakee River during summer weekends, and keeps fit
    with regular cardio and strength routines, though his demanding job sometimes leads to missed gym sessions.
  arts: Ignacio Aguinaldo immerses himself in live music ranging from Banda Los Recoditos to indie rock acts like The Strokes, admires the folk paintings of Frida Kahlo and the Midwestern realism of Grant
    Wood, and frequently visits local art fairs where his woodworking designs are inspired by these visual influences.
  travel: Ignacio Aguinaldo enjoys road-tripping to the Grand Canyon and exploring Santa Fe’s art scene, while dreaming of sustainable-architecture tours in Berlin, hiking Patagonia’s Torres del Paine,
    and a culinary pilgrimage to Oaxaca for authentic mole lessons.
  culinary: Ignacio Aguinaldo cooks traditional tacos al pastor with pineapple and smoky chipotle, experiments with Midwest fare like Chicago-style deep-dish pizza topped with Wisconsin cheddar, and often
    incorporates reclaimed-wood smoked herbs such as cilantro and epazote into his eclectic kitchen creations.
  core: Ignacio Aguinaldo balances a disciplined, eco-focused carpentry career with a spontaneous urge to splurge on reclaimed wood, a love for salsa dancing at band concerts, and a habit of forgetting
    to water his indoor succulents until the end of the week.
background:
  cultural: Ignacio comes from a Mexican-American family that settled in the Midwest a generation ago. Raised in a bilingual household, he celebrates traditional holidays such as Día de los Muertos and
    Cinco de Mayo while also embracing local Illinois customs like county fairs and harvest festivals. His parents instilled strong family values, a respect for hard work, and a love for authentic Mexican
    cuisine, which he continues to share with friends and neighbors. This dual cultural heritage influences his aesthetic, blending Mexican folk art motifs into his woodworking designs and fostering a collaborative
    spirit that reflects the communal ethos of both his heritage and his rural Illinois community.
attributes:
  skills: '[''Framing'', ''Finish Carpentry'', ''Custom Furniture Design'', ''Blueprint Reading'', ''Measure & Layout'', ''Power Tool Operation'', ''Hand Tool Mastery'', ''Sustainable Woodworking'', ''Cost
    Estimation'', ''Project Planning'', ''Team Supervision'', ''Bilingual Communication (Spanish/English)'']'
  hobbies: '[''Soccer'', ''Community Volunteering (Habitat for Humanity)'', ''Woodworking Projects'', ''Cooking Mexican & Midwestern Cuisine'', ''Hiking'', ''Fishing'', ''Live Music Attendance'', ''Reading
    Trade Magazines'', ''Watching DIY Tutorials'']'
  career_goals: Ignacio aims to earn a certified journeyman carpenter credential within the next two years and eventually start his own small-scale construction firm that specializes in eco-friendly residential
    projects. He envisions expanding his custom furniture line to feature designs inspired by Mexican art and Midwestern minimalism, selling pieces both locally and online. In the longer term, he hopes
    to become a mentor for apprentices in his community, offering workshops on sustainable building techniques and bilingual project management. Ignacio also aspires to obtain a construction management
    certification, allowing him to take on larger commercial contracts while maintaining his hands-on craftsmanship.
