personas:
  professional: Bonnie Jarrard is a hands‑on audiovisual technician who excels at installing and troubleshooting sound and video systems for community events, combining precise cable‑management skills with
    a competitive drive to meet tight deadlines and a talent for improvising on‑site solutions.
  sports: Bonnie Jarrard dominates the local softball league as a shortstop, cheers on the Texas Rangers and Dallas Cowboys on game nights, and stays fit by hiking the Hill Country trails during weekend
    camping trips, preferring team camaraderie over solo workouts.
  arts: Bonnie Jarrard lights up karaoke nights belting out hits by Beyoncé and Shania Twain, enjoys the immersive soundtracks of cooperative shooter video games, and occasionally catches a community theater
    production, all of which feed a love of performance and a competitive edge to be the best onstage.
  travel: Bonnie Jarrard favors spontaneous weekend getaways to Texas Hill Country campsites like Pedernales Falls, where they hike, stargaze, and grill, while dreaming of a future road trip through the
    Pacific Northwest to explore the tech scene in Seattle and Seattle's famous coffee culture.
  culinary: Bonnie Jarrard enjoys cooking Texas‑style brisket and chili on a portable smoker during camping trips, whips up quick DIY meals like loaded nachos with fresh jalapeños at home, and has a knack
    for assembling custom spice rubs that reflect their love for bold flavors.
  core: Bonnie Jarrard blends a rugged DIY spirit with a love for group fun, balancing a competitive edge at work and on the softball field with occasional disorganization and a habit of improvising solutions
    on the fly.
background:
  cultural: Bonnie grew up in a close‑knit, white community in the heart of Texas, where Southern hospitality and a strong work ethic were daily norms. Her family emphasized practicality, self‑reliance,
    and community service, values that still shape her outlook. While she embraces traditional Texan customs—such as weekend BBQs, church gatherings, and a love for outdoor recreation—she also feels comfortable
    navigating modern, technology‑driven environments. Her cultural upbringing blends a respect for local traditions with an independent, competitive spirit that drives her professional ambitions.
attributes:
  skills: '[''AV system installation'', ''Audio equipment troubleshooting'', ''Video projection setup'', ''Cable management'', ''Signal routing and configuration'', ''Electrical safety compliance'', ''Technical
    schematics interpretation'', ''Customer communication'', ''Team coordination'', ''Basic networking for AV'']'
  hobbies: '[''Softball league'', ''Karaoke nights'', ''DIY home improvement projects'', ''Camping and hiking in Hill Country'', ''Multiplayer video gaming'', ''Cooking BBQ for friends'', ''Church AV volunteer
    work'']'
  career_goals: Bonnie aims to become a Certified Technology Specialist – Design (CTS‑D) professional within the next two years, and eventually move into senior AV system design and project management roles.
    She envisions leading a small crew that handles large‑scale installations for concert venues and corporate campuses, leveraging her competitive edge to set high performance standards. In the longer
    term, she hopes to open her own AV consulting and rental business, offering flexible services that allow her to balance family life in Whitney with a dynamic career. She also wants to mentor other women
    entering the trades, promoting greater diversity in the field.
