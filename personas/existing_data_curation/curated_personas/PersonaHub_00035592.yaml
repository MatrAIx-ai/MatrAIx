persona_description: A school district administrator who is responsible for overseeing technology use in schools and developing social media policies to foster a positive school culture. This persona is
  highly knowledgeable about technology and its impact on education, as well as legal and ethical considerations related to social media use. They are skilled at communicating with students, parents, and
  staff, and have a keen understanding of the importance of creating a culture of respect and responsibility around technology use. This persona is proactive in identifying and addressing potential risks
  associated with social media use, and is committed to ensuring that technology is used in a way that supports student learning and development.
