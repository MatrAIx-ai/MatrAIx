  career_goals: Anthony aspires to move into a leadership role within customer experience, targeting a position such as Team Lead or Customer Experience Manager within the next three years. He plans to
    acquire a bachelor's degree in Business Administration or Marketing to complement his associate's degree, and to earn certifications in customer service excellence and data analytics. He aims to leverage
    his curiosity for new ideas to implement innovative service processes and to champion a more personalized customer journey. Long‑term, he envisions transitioning into a product development or marketing
    role where he can blend his customer insights with his appreciation for creative concepts, possibly spearheading a small side venture that connects local artists with consumers.
