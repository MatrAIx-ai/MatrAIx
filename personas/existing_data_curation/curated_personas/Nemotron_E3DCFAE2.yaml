  hobbies: '[''listening to blues and soul music'', ''cooking barbecue and Southern cuisine'', ''attending church services and choir'', ''running along the Mississippi River trail'', ''weight training'',
    ''watching Memphis Grizzlies games'', ''volunteering at community youth center'']'
  career_goals: Andrew aims to advance from his current supervisory position to a regional operations manager role within the next five years. He plans to earn a Certified Transportation Professional (CTP)
    credential and enroll in a part‑time associate’s program in logistics and supply chain management. His long‑term ambition is to lead a multi‑site transportation network that integrates sustainable practices
    such as electric‑vehicle adoption and advanced route‑efficiency technologies. He also hopes to mentor younger workers, particularly from the African‑American community in Memphis, and eventually launch
    his own logistics consulting firm.
