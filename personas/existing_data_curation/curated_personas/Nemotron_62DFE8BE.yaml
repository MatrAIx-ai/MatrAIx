  career_goals: Short-term, Andrew aims to earn his Certified Financial Planner (CFP) designation, expand his client base among Brooklyn’s growing Latino community, and lead a small advisory team within
    his firm. Over the next five years he envisions launching a boutique wealth-management practice that integrates technology and artistic storytelling to make complex financial concepts accessible. He
    aspires to become a recognized thought leader in financial literacy, author a blog and occasional videos, and mentor junior advisors while maintaining a balanced personal life.
