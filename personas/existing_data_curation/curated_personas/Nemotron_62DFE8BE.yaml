personas:
  professional: Andrew Alvarado is a 32‑year‑old personal financial advisor who blends rigorous STEM training with an artistic eye, crafting Python‑powered financial models and watercolor‑styled client
    presentations that turn complex market trends into clear, actionable advice.
  sports: Andrew Alvarado is a loyal fan of the Brooklyn Nets and New York Knicks, plays pick‑up basketball at a local court on Saturdays, hikes Prospect Park trails each weekend, runs occasional 5K races
    in the spring, and attends weekly yoga sessions at a community studio to balance cardio with flexibility.
  arts: Andrew Alvarado channels imagination through sketching Brooklyn’s brick facades, watercoloring cityscapes, and photographing vibrant street art inspired by artists like Banksy and Shepard Fairey,
    while devouring modern philosophy from Michel Foucault and speculative fiction by N.K. Jemisin, often quoting passages in their client presentations.
  travel: Andrew Alvarado prefers meticulously planned weekend getaways that blend culture and nature, having explored the historic streets of Boston, the art districts of Chicago, and the vineyards of
    the Hudson Valley, while dreaming of a solo trip to Barcelona’s Gothic Quarter and a sunrise hike in Kyoto’s Arashiyama Bamboo Grove.
  culinary: Andrew Alvarado treats Mexican‑fusion cooking as a creative laboratory, mastering dishes such as chipotle‑marinated salmon tacos, quinoa‑based mole enchiladas, and avocado‑lime churro doughnuts,
    regularly sourcing fresh cilantro, smoked paprika, and heirloom corn from local farmers’ markets, though they often over‑season in the quest for bold flavor.
  core: Andrew Alvarado fuses data‑driven finance with watercolor‑rich storytelling, habitually sketches in meeting margins, meditates to silence market noise, and can’t start the day without three cups
    of espresso.
background:
  cultural: Andrew was raised in a Mexican-American household in Brooklyn, where Spanish and English were spoken daily. Family rituals such as Día de los Muertos, holiday tamales, and weekly gatherings
    instilled a strong sense of community and respect for tradition. He draws on his heritage to connect with Latino clients, offering culturally sensitive advice and bilingual communication. While he embraces
    the multicultural vibrancy of New York City, he remains proud of his Mexican roots, celebrating Mexican holidays, music, and art, and often incorporates Mexican motifs into his personal projects.
attributes:
  skills: '["Financial planning", "Wealth management", "Retirement planning", "Tax optimization", "Portfolio construction", "Risk assessment", "Data analysis", "Financial modeling (Excel, Python, R)", "Regulatory
