personas:
  professional: Nelson Pham is an aspiring junior robotics engineer who channels their methodical mind into designing moving LEGO contraptions, solving logic puzzles, and strategizing chess games, showing
    early signs of a future in mechanical design and problem solving.
  sports: Nelson Pham enjoys casual soccer matches at the neighborhood park with a small group of friends, cheering for the Washington Capitals in ice hockey and the Washington Wizards in basketball, while
    also participating in a youth swimming program that emphasizes technique over competition.
  arts: Nelson Pham immerses themselves in visual creativity, sketching elaborate sci‑fi cityscapes inspired by exhibits at the Smithsonian, experimenting with digital art apps like Procreate Pocket, and
    drawing inspiration from artists such as Hayao Miyazaki, H.R. Giger, and comic illustrator Jim Lee.
  travel: Nelson Pham prefers meticulously planned weekend excursions, favoring visits to Washington, D.C.’s interactive museums like the National Air and Space Museum, occasional family road trips to Boston’s
    Children’s Museum, and dreaming of a future vacation to Tokyo’s Miraikan to explore cutting‑edge robotics.
  culinary: Nelson Pham’s palate gravitates toward simple yet flavorful dishes such as pepperoni pizza, chicken teriyaki rice bowls, and homemade granola bars they occasionally bake, relishing the crunchy
    texture of toasted almonds and the bright zing of lime in their occasional fruit smoothies.
  core: Nelson Pham is a methodical, curious nine‑year‑old who fuses artistic imagination with mechanical tinkering, competes fiercely in puzzles and chess, and balances a disciplined savings habit with
    an occasional forgetfulness about medication.
background:
  cultural: Nelson was raised in a middle‑class, suburban household in Silver Spring, Maryland, a region known for its cultural diversity and proximity to the nation's capital. His family participates in
    community events such as library storytimes, local art festivals, and county park programs, exposing him to a variety of artistic and scientific experiences beyond his immediate neighborhood. Although
    his ethnic background is identified as white, he has grown up in a multicultural environment that values inclusive education, public museum visits, and engagement with both American and global cultural
    narratives.
