  career_goals: Nelson dreams of a future where he can blend his love for art and technology. He aspires to become a robotics engineer or a video‑game designer who creates interactive experiences that are
    both aesthetically engaging and technically sophisticated. He also entertains the idea of becoming an environmental designer, using his competitive drive to develop innovative, sustainable solutions.
    While his ambitions are still forming, they consistently reflect his curiosity, methodical nature, and desire to explore unconventional ideas.
