personas:
  professional: Marjorie Awad, a veteran metal and plastic fabricator with 25 years of factory experience, combines MIG/TIG welding, CNC plasma‑cutting, and blueprint interpretation with a pragmatic, solutions‑focused
    mindset to troubleshoot downtime and mentor apprentices, and they are pursuing Level 2 Certified Welder and CNC programming certifications to step into a lead‑technician role while launching a side
    venture creating custom metal art for local restaurants.
  sports: Marjorie Awad stays fit by taking evening walks along the lakefront, playing casual pickleball at the community center during summer, and cheering on the local minor‑league baseball team, the
    River City Rapids, while they occasionally join a weekend hiking group to explore nearby state parks.
  arts: Marjorie Awad channels creativity through repurposing scrap metal into sculptural pieces inspired by the abstract works of Richard Serra, practices calligraphy while journaling, and unwinds listening
    to classic rock legends like Led Zeppelin, The Rolling Stones, and Fleetwood Mac, often attending local gallery openings that feature regional artisans, and they find that the tactile process of welding
    mirrors the rhythm of their favorite songs.
  travel: Marjorie Awad prefers low‑key, spontaneous road trips to scenic spots such as the Grand Canyon, the Oregon Coast, and the historic town of Gettysburg, while they dream of a future pilgrimage to
    the Deutsches Museum in Munich to study its metal‑working exhibits, balancing a flexible itinerary with the need to keep travel costs modest for retirement savings.
  culinary: Marjorie Awad delights in cooking with herbs from her garden — rosemary, thyme, and basil — often preparing rosemary‑infused grilled chicken or a fragrant vegetable stew, while they also enjoy
    classic comfort dishes like beef bourguignon and occasionally treat themselves to a plate of nachos topped with fresh cilantro and jalapeño after a long day at the shop.
  core: Marjorie Awad is a pragmatic metal‑crafting veteran who transforms scrap into art, tends a fragrant herb garden, journals in elegant calligraphy, worries about future finances, and they can’t resist
    humming classic‑rock riffs while welding.
background:
  cultural: Marjorie grew up in a modest middle‑class family in the Chicago suburbs, with German‑Irish roots that emphasized hard work, modesty, and community responsibility. Raised in the Midwest, she
    absorbed practical values and a down‑to‑earth outlook, attending the local high school before entering the manufacturing workforce. Her cultural backdrop includes participation in neighborhood block
    parties, local church activities, and a strong sense of regional pride in Midwestern perseverance and cooperative spirit.
attributes:
  skills: '[''MIG/TIG welding'', ''CNC plasma cutting'', ''Sheet‑metal fabrication'', ''Plastic injection molding operation'', ''Blueprint reading'', ''Machinery maintenance'', ''Quality inspection'', ''Safety
    compliance'', ''Equipment troubleshooting'', ''Mentoring co‑workers'']'
  hobbies: '[''Metal scrap art'', ''Herb gardening'', ''Historical non‑fiction reading'', ''Calligraphy journaling'', ''Classic rock listening'', ''Lakefront evening walks'', ''Community garden volunteering'',
    ''Church social events'']'
  career_goals: Marjorie aims to obtain a Level 2 Certified Welder credential and a CNC programming certification within the next two years, positioning herself for a lead‑technician or supervisory role
    in her plant. She also hopes to transition part‑time into a small side business creating custom metal art pieces for local restaurants and community spaces, leveraging her curiosity for new design ideas
    while ensuring a steady income for retirement. Long‑term, she envisions teaching basic metal‑working workshops at the community college, sharing her practical expertise and fostering a supportive learning
    environment for younger apprentices.
