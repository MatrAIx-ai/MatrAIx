personas:
  professional: Argil Marigny is a hands‑on electrician who expertly applies the National Electrical Code in residential and light‑commercial wiring while channeling their curiosity and preference for solitude
    into designing custom LED art installations, often balancing meticulous technical work with spontaneous creative projects despite a sometimes disorganized schedule.
  sports: Argil Marigny is an avid fan of the LSU Tigers football team and the New Orleans Pelicans, jogs with the Baton Rouge Running Club on sunrise routes to clear their mind, and spends occasional weekends
    climbing at the local gym, using physical activity as a grounding counterbalance to their emotional intensity.
  arts: Argil Marigny captures Baton Rouge murals with a DSLR, renders them into charcoal sketches, builds ambient soundscapes on a Moog Mother‑32 analog synth, and draws creative inspiration from the visual
    work of Shepard Fairey, the jazz improvisations of Miles Davis, the zydeco rhythms of Clifton Chenier, and the speculative worlds of novelist Jeff VanderMeer, integrating these influences into their
    solitary artistic practice.
  travel: Argil Marigny prefers solo, low‑budget trips that blend artistic discovery with quiet exploration, having roamed the vibrant street‑art districts of Austin, the music‑laden French Quarter of New
    Orleans, and dreaming of the lantern festivals of Kyoto and the light installations of Berlin, while planning itineraries on a whim and relying on discounted travel deals.
  culinary: Argil Marigny enjoys cooking simple Southern comfort dishes such as shrimp gumbo, Cajun jambalaya, and beignets, seasoning them with cayenne pepper and thyme, and balances home‑cooked meals
    with occasional visits to local food trucks serving po’boys and crawfish boil platters, all while maintaining an enthusiastic but modest home‑cook skill level.
  core: Argil Marigny is a solitary, anxiety‑prone electrician‑artist who fuses precise wiring expertise with experimental LED lighting, often juggling impulsive creative spending and a laid‑back approach
    to deadlines.
background:
  cultural: Argil grew up in a close‑knit African‑American community in East Baton Rouge Parish, where family gatherings often revolve around Creole cooking, soulful gospel music, and stories of resilience
    from the civil‑rights era. His upbringing was shaped by the rhythms of Louisiana's rich musical heritage—jazz, blues, and Zydeco—and the vibrant street art that colors the city’s neighborhoods. Regular
    attendance at his Baptist church instilled values of community service and moral grounding, while local Mardi Gras Indian traditions sparked an appreciation for bold color palettes and expressive performance.
    These cultural threads inform his aesthetic sensibilities, his collaborative spirit, and his desire to infuse everyday spaces with artful illumination.
attributes:
  skills: '[''Residential wiring'', ''Electrical code interpretation (NEC)'', ''Conduit bending and installation'', ''Circuit troubleshooting'', ''Smart home device setup'', ''LED lighting design for artistic
    installations'', ''Basic electronics prototyping'', ''Blueprint reading'']'
  hobbies: '[''Street photography'', ''Urban sketching'', ''DIY LED art projects'', ''Analog synthesizer music creation'', ''Reading speculative fiction'', ''Listening to jazz and gospel'', ''Playing solo
    video games (indie titles)'', ''Journaling for emotional processing'']'
  career_goals: Argil aims to earn his journeyman electrician license within the next year and eventually attain master electrician status. He plans to complete an associate degree in electrical technology,
    leveraging his college coursework to deepen his technical knowledge and open pathways to specialized certifications in low‑voltage audiovisual systems. Long‑term, he aspires to launch a boutique electrical
    design studio that blends his trade expertise with his love for art, offering custom lighting solutions for galleries, performance spaces, and eco‑friendly residential projects. He also hopes to develop
    stronger stress‑management skills, possibly through continuing education in occupational safety and wellness, to support his emotionally reactive nature while taking on leadership roles.
