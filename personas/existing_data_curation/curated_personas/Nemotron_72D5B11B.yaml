  hobbies: '[''Visiting art exhibitions'', ''Reading poetry and literature'', ''Gardening'', ''Cooking traditional South Asian recipes'', ''Knitting for charity'', ''Community dance workshops'', ''Listening
    to classical Indian music and Sufi poetry'', ''Watching documentaries'', ''Online learning and lectures'']'
  career_goals: Although retired, Kalpana aims to continue mentoring younger volunteers at the Fairfield senior center, develop a weekly intergenerational cooking class that shares South Asian recipes,
    document her family's migration story in a memoir, learn digital photography to capture local cultural events, and, health permitting, travel to visit relatives in South Asia to reconnect with her heritage.
