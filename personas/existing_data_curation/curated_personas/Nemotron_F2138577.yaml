personas:
  professional: Letray Harrison is a diligent food‑processing technician at a midsize plant, whose curiosity drives continuous process tweaks while their methodical, organized nature ensures flawless HACCP
    audits, high‑speed equipment maintenance, and clear PowerBI reporting, positioning them for a supervisory role within two years.
  sports: Letray Harrison enjoys weekend fishing on the Pea River, occasional hikes on Sand Mountain, and follows the Alabama Crimson Tide football and Birmingham Barons baseball teams, while they belong
    to a local recreational 5K running club but often skip workouts when production shifts run late.
  arts: Letray Harrison spends evenings painting watercolor scenes of the Alabama foothills, plays saxophone in a community jazz ensemble inspired by John Coltrane and Kenny Garrett, and avidly follows
    hip‑hop artists like Kendrick Lamar and blues legends such as Muddy Waters, frequently visiting the Montgomery Museum of Fine Arts and the local street‑mural tours.
  travel: Letray Harrison prefers carefully planned road trips with a focus on cultural immersion, having explored the historic districts of Savannah and New Orleans, hiked the Blue Ridge Parkway, and now
    dreams of a culinary pilgrimage to Lisbon, Portugal, while budgeting constraints keep international travel occasional.
  culinary: Letray Harrison is an enthusiastic home cook who skillfully blends classic soul‑food staples like shrimp and grits with modern twists such as smoked‑paprika aioli, regularly experiments with
    homemade spice blends featuring cumin, coriander, and chipotle, and enjoys the occasional dinner at upscale Southern‑fusion restaurants, while their confidence in the kitchen is balanced by a habit
    of over‑seasoning dishes when experimenting.
  core: Letray Harrison is a curious, organized 25‑year‑old who balances meticulous food‑processing work with a vibrant creative life, often over‑seasoning their experimental sauces while meticulously tracking
    their budget and health.
background:
  cultural: Letray grew up in a close‑knit African‑American community in Troy, Alabama, where church, family gatherings, and communal meals were central to daily life. His upbringing was steeped in Southern
    black traditions, from gospel choirs and Sunday potlucks to storytelling that honored the legacy of the civil‑rights movement in the region. He learned to cook classic Southern dishes from his mother
    and grandparents, gaining an appreciation for the cultural significance of food as a means of connection. The local “Great Day” festivals, blues concerts, and community barbecues reinforced his love
    for music and communal celebration. While he embraces these roots, he also stays attuned to contemporary Black culture, following modern art, digital media, and urban fashion influences. This blend
    of historic heritage and progressive curiosity shapes his worldview and informs both his personal pursuits and his professional ambitions.
attributes:
  skills: '[''Food safety compliance (ServSafe)'', ''HACCP audit and documentation'', ''Operation of high‑speed processing equipment'', ''Routine equipment maintenance and troubleshooting'', ''Quality control
    inspection'', ''Inventory management using ERP systems'', ''Data analysis and reporting with Excel'', ''Team training and mentorship'', ''Basic food‑science knowledge'']'
  hobbies: '[''Visiting art galleries and murals'', ''Watercolor painting'', ''Home cooking and recipe experimentation'', ''Saxophone playing in a jazz ensemble'', ''Listening to hip‑hop and blues'', ''Fishing
    on the Pea River'', ''Hiking in Sand Mountain'', ''Church youth mentorship volunteering'', ''Reading nonfiction on science and culture'', ''Attending Southern heritage festivals'']'
  career_goals: Letray aims to move into a supervisory position within the next two years, targeting a shift‑lead role that will let him oversee teams and improve production efficiency. He plans to earn
    an associate’s degree in food technology or industrial safety through evening classes at a community college, and to obtain a Certified Food Scientist (CFS) credential. In the longer term, he envisions
    becoming a plant manager or starting his own small‑scale specialty food business, focusing on a line of Southern‑inspired sauces that blend traditional flavors with contemporary twists. He also wants
    to secure a stable mortgage to provide a larger home for his growing family and to give back to his community by mentoring young workers and supporting local food‑access initiatives.
