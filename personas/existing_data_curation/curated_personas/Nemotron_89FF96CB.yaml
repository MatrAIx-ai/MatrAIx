personas:
  professional: Malena Gonzalez, a 27‑year‑old animal behavior specialist, merges a painter’s attention to detail with a competitive, curiosity‑driven mindset to run a flexible, bilingual pet‑training studio
    that showcases success stories on social media while working toward CPDT‑K certification and community outreach for low‑income Spanish‑speaking families.
  sports: Malena Gonzalez stays active by hiking the Central Florida nature trails, joining the Orlando Runners club for weekend long‑distance runs, practicing yoga at a local studio, cheering for the Orlando
    Magic and Orlando City SC, and occasionally playing beach volleyball during summer months.
  arts: Malena Gonzalez fuels her creative spirit by painting animal portraits inspired by the works of Frida Kahlo and Georgia O’Keeffe, frequenting the Orlando Museum of Art, curating playlists featuring
    Björk, Tame Impala, and Alt‑J on her eclectic music podcast, and snapping behind‑the‑scenes videos of her training sessions to share on Instagram.
  travel: Malena Gonzalez prefers spontaneous, budget‑friendly road trips that blend adventure and cultural immersion, such as weekend escapes to the Florida Keys, a hiking tour of the Great Smoky Mountains,
    and a dream itinerary to explore the wildlife sanctuaries of Costa Rica and the historic streets of Lisbon.
  culinary: Malena Gonzalez enjoys cooking flavorful stews that combine plant‑based root vegetables, coconut milk, and smoked seafood like grouper or shrimp, while also mastering corn‑based flatbreads and
    mango‑lime salsa, demonstrating an intermediate skill level that balances family‑tradition recipes with experimental Floridian twists.
  core: Malena Gonzalez is a curious, art‑loving animal trainer whose competitive edge fuels a flexible, sometimes disorganized business, punctuated by a habit of over‑investing in paint supplies and an
    occasional neglect of routine health check‑ups.
background:
  cultural: Malena was born in Medellín, Colombia, and moved to the United States with her family at age 12, settling in Central Florida. She grew up in a bilingual household where Spanish was spoken at
    home and English was learned at school, giving her a deep connection to both Colombian and American cultures. Family gatherings are marked by traditional music, dancing, and meals like bandeja paisa,
    while holidays are celebrated with a blend of Colombian customs and local Floridian traditions. Her Colombian roots influence her warm, community‑focused attitude and her appreciation for vibrant art,
    while her life in Apopka exposes her to diverse wildlife and the outdoors, shaping her career as an animal trainer.
attributes:
  skills: '[''Animal behavior training (positive reinforcement)'', ''Canine and feline behavior assessment'', ''Basic veterinary first aid'', ''Spanish language proficiency'', ''Animal photography and video
    documentation'', ''Social media marketing for pet services'', ''Basic business management (scheduling, invoicing)'', ''Understanding of Colombian animal care traditions'']'
  hobbies: '[''Painting and sketching'', ''Attending local art exhibitions'', ''Cooking Colombian dishes'', ''Hiking in Central Florida nature trails'', ''Volunteering at animal shelters'', ''Reading about
    animal cognition and behavior'', ''Practicing yoga for relaxation'', ''Exploring new music and podcasts'']'
  career_goals: Malena aims to expand her animal‑training practice into a full‑service studio in Apopka that offers group classes, specialized behavior workshops, and therapy‑dog certification programs.
    She plans to earn the Certified Professional Dog Trainer (CPDT‑K) credential within the next two years and to develop a community outreach program that provides free training sessions for low‑income
    Latino families. Long‑term, she envisions launching a brand of training equipment and instructional videos that blend her Colombian heritage with modern, evidence‑based techniques.
