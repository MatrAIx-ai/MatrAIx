  career_goals: James aims to become a senior developer within the next two years, taking on ownership of critical codebases at a regional tech firm. He plans to earn an AWS Certified Solutions Architect
    credential to broaden his cloud deployment expertise. In the medium term, he hopes to lead a small development team that creates practical software tools for local non‑profits and small businesses,
    leveraging his background in community‑focused projects. Ultimately, he aspires to launch his own consultancy that offers affordable, maintainable tech solutions for underserved Southern communities.
