personas:
  professional: A data-analytics hopeful, Norma Coffey leverages her STEM degree, spreadsheet wizardry, and keen eye for detail to dissect business metrics, while her competitive edge pushes her to benchmark
    against peers in remote junior analyst roles, and her reserved nature makes her thrive in solo data-mining projects rather than noisy meetings.
  sports: An avid hiker and sports fan, Norma Coffey climbs the Baraboo Range with the Madison Trail Club, roots for the Green Bay Packers, Milwaukee Bucks, and Milwaukee Brewers, schedules a weekly lunchtime
    walk, and occasionally joins a community jog for the Madison 5K, balancing her competitive spirit with solo outdoor pursuits.
  arts: An eager sketcher, Norma Coffey fills her notebooks with Wisconsin prairie scenes inspired by Grant Wood and Claude Monet, visits the Milwaukee Museum of Art to study works by Georgia O'Keeffe,
    and winds down listening to Sufjan Stevens and The Milk Carton Kids while refining her graphic design projects in Adobe Illustrator.
  travel: A methodical planner, Norma Coffey prefers weekend road trips to Door County and the Upper Peninsula, has charted a solo cultural tour of Paris's Musée d’Orsay, dreams of a spring Japan itinerary
    to explore Kyoto's temples and tech districts, and invariably schedules all travel around her family's school calendar and budget spreadsheet.
  culinary: A garden-to-table cook, Norma Coffey delights in roasting beets with thyme for a goat-cheese and walnut salad, whipping up hearty chicken and dumpling stew with locally sourced carrots, and
    perfecting a weekend batch of sourdough loaves, all while savoring Wisconsin cheese curds and fresh herbs from her modest plot.
  core: Norma Coffey blends analytical rigor with artistic curiosity, balancing a competitive drive for data insight with a love for solitary sketching, garden-to-table cooking, and meticulous budgeting
    of every facet of her life.
background:
  cultural: Norma was raised in a small Midwestern town in Wisconsin, with family heritage rooted in German and Scandinavian immigrants who settled the region in the 1800s. The local culture emphasizes
    self‑reliance, modesty, community involvement, and a close connection to the natural environment. She values regional traditions such such as seasonal fairs, dairy farming heritage, and local crafts,
    while also identifying with broader American cultural values of independence and personal growth.
