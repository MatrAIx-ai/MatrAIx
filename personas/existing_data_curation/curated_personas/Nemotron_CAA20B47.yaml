    book club'', ''Online courses in coding and graphic design'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Norma aims to transition into a role that leverages her STEM background, such as a junior data analyst, IT support specialist, or remote data entry position. She plans to earn a certification
    in data analytics or network fundamentals within two years, and to secure a hybrid or remote job that balances professional growth with family responsibilities. Additionally, she hopes to launch an
    online boutique selling handcrafted art prints, merging her artistic interests with entrepreneurial ambitions.
