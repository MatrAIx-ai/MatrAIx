persona_description: A historian or archivist interested in the history and architecture of the American West, particularly in the mining and railroads era. This person is likely to be knowledgeable about
  the development of the Virginia and Truckee Railroad and its impact on the region, as well as the history of the Masonic Temple in Virginia and Truckee Passenger Depot. They may be interested in learning
  about the preservation efforts of the Society of Architectural Historians in maintaining the quality of the information available on SAH Archipedia.
