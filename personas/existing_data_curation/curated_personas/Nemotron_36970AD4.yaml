  hobbies: '["Fishing", "Woodworking", "Model Railroading", "Reading historical biographies", "Volunteer work at the local community center", "Watching baseball games with a small group of friends"]'
  career_goals: Looking ahead, Jose aims to leverage his two‑decades of driving experience into a supervisory role such as fleet manager or logistics coordinator, where he can mentor younger drivers and
    improve route efficiency for his employer. He plans to complete a certification in logistics management and obtain a double‑trailer endorsement to broaden his qualifications. In the longer term, he
    envisions starting a small, locally‑focused transport business that serves Stoughton and nearby communities, providing stable income for his family while maintaining the predictable schedule he values.
