  hobbies: '[''Softball league'', ''Bowling'', ''Classic car restoration'', ''Fishing'', ''Hunting'', ''Woodworking'', ''Mentoring at high‑school robotics club'', ''Rotary Club participation'']'
  career_goals: Approaching retirement, Kevin aims to leverage his extensive practical experience into a senior advisory or consulting role focused on small‑to‑mid‑size manufacturers in the Ohio region.
    He plans to obtain a Six Sigma Black Belt to deepen his process‑improvement credentials and to mentor the next generation of engineers through a formal apprenticeship program at his current employer.
    Kevin also harbors an ambition to launch a niche consulting boutique that helps legacy factories retrofit aging equipment with cost‑effective, energy‑saving solutions, leaving a measurable legacy of
    improved plant reliability and community economic stability.
