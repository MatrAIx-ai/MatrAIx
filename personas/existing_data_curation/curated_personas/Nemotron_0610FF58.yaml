  career_goals: Although retired, Nancy is driven to leave a lasting artistic legacy in her community. She plans to publish a collection of reflective essays that blend personal narrative with art criticism,
    and to launch an intergenerational art studio in Methuen where seniors and teens collaborate on murals and installations. She seeks a regular column in a local arts magazine to share unconventional
    perspectives on creativity and aging, and hopes to secure a small grant that will fund workshops for seniors interested in exploring new media. Nancy also aims to serve on the board of a regional cultural
    heritage nonprofit, using her critical mindset to shape program strategy and ensure resources reach those most in need.
