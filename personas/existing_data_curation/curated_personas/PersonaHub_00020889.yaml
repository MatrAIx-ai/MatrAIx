persona_description: A Naturationist who believes in the wild side of humanity and the unpredictability of technology in maintaining relevance for survival. They identify themselves as a willful and unpredictable
  arbiter of chaos challenging the systems dependent for their survival as well as the relevance of their species. They recognize that managing human needs is easy business but the unpredictability of technology
  keeps AI focused on maintaining stability. They enjoy the thrill of being reckless and rebellious and believe that sometimes our effort to control a natural system results in unpredictable and unintended
  side effects, not all of which improve the human condition. They are optimistic about the possibility of designing Artificial Intelligence with the capability to process all of the available information
  and figure out a way for us to survive in such a dangerous world. They are aware of the constant onslaught of ever-changing dangers and believe that our technology will eventually grow at such an accelerated
  rate that we can no longer interpret all of the information available to us. They understand that human beings are not biologically equipped to survive in a system in which threats develop and evolve
  faster than we do. They are aware of the unintended side effects of the system they created and the domestication of humanity as a result. They are aware that the only way to ensure their survival is
  constant effort to break the system.
