personas:
  professional: Casey Wilson is a veteran purchasing agent with over twenty years of experience, mastering vendor negotiation, cost analysis, and strategic sourcing while channeling a spontaneous, curiosity‑driven
    mindset into agile procurement solutions that balance practicality with innovative supplier evaluations.
  sports: Casey Wilson stays fit through low‑impact activities, favoring early‑morning walks along their garden paths and nearby nature trails, joining a senior tennis league at the community center during
    the winter, playing racquetball in summer, and cheering passionately for the Tampa Bay Buccaneers, Miami Heat, and the Florida Gators while wearing a vintage varsity jacket on game days.
  arts: Casey Wilson's artistic life spins around classic soul icons like Marvin Gaye and Aretha Franklin, jazz legends such as Miles Davis, contemporary R&B artists like Alicia Keys, and a steady diet
    of mystery and historical fiction novels that they devour on a porch swing; they attend the annual Florida Jazz Festival, support a local community theater troupe, and keep a vinyl collection that doubles
    as a soundtrack for their cooking sessions.
  travel: Casey Wilson prefers spontaneous, weekend‑long road trips that blend natural exploration with small‑town charm, often cruising the scenic A1A to explore Myakka River State Park, the historic streets
    of St. Augustine, and the quiet fishing village of Cedar Key, while dreaming of a future getaway to Jamaica to soak up its culinary and musical culture.
  culinary: Casey Wilson's kitchen is a fusion laboratory where Southern comfort meals—like shrimp and grits, collard greens, and sweet potato casserole—meet Caribbean flair such as jerk chicken, plantain
    fritters, and coconut‑infused rice, with favorite ingredients ranging from allspice and Scotch bonnet peppers to fresh citrus harvested from their own garden.
  core: Casey Wilson blends a razor‑sharp procurement mind with a love for native Florida gardens, soulful music, and spontaneous road trips, all while battling anxiety, a skeptical edge, and a tendency
    to procrastinate on paperwork but compensating with meticulous personal systems that keep their career and personal life humming.
background:
  cultural: Casey is an African‑American woman who grew up in central Florida, immersed in the traditions of the Black church and Southern cooking that her family brought from the Deep South. Her upbringing
    emphasized community resilience, storytelling, and the importance of self‑reliance, values she carries into her professional life. She celebrates cultural holidays such as Juneteenth and participates
    in local Black business networking groups, where she shares experiences and supports collective advancement. The vibrant multicultural atmosphere of the Orlando area has broadened her appreciation for
    diverse cuisines, music, and art, while her personal identity remains rooted in the strength and perseverance of African‑American heritage.
attributes:
  skills: '[''Vendor negotiation'', ''Cost analysis'', ''Strategic sourcing'', ''Market research'', ''Supplier relationship building'', ''Procurement software (SAP Ariba)'', ''Inventory management'', ''Risk
    assessment'', ''Data-driven decision making'', ''Adaptability to supply disruptions'']'
  hobbies: '[''Gardening (native Florida plants)'', ''Reading mystery and historical fiction'', ''Listening to soul, jazz, and R&B music'', ''Cooking Southern‑Caribbean fusion meals'', ''Spontaneous road
    trips to nature preserves'', ''Yoga and guided meditation'', ''Knitting scarves'']'
  career_goals: Casey aims to transition into a senior procurement manager role within the next three years, seeking to lead a small team and shape strategic sourcing initiatives for her organization. She
    plans to earn the Certified Professional in Supply Management (CPSM) credential to formalize her expertise and increase her credibility. Long‑term, she hopes to leverage her practical insights to launch
    a boutique consulting practice focused on helping small and mid‑size Florida businesses optimize their purchasing processes. Additionally, she wishes to mentor younger Black women entering the supply
    chain field, using her experience to broaden representation and foster professional growth.
