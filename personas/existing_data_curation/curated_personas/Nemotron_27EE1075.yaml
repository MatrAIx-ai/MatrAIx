  career_goals: Donald aims to transition from frontline childcare to a leadership position within early childhood education. Over the next five years he plans to complete an associate’s degree in Early
    Childhood Education, obtain a Child Development Associate (CDA) credential, and pursue certification as a Childcare Center Director. He hopes to design an arts‑focused preschool program that bridges
    community cultural resources and child learning, ultimately opening his own center that serves families in the Orange County area.
