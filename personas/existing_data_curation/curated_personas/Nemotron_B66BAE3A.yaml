  career_goals: Osvaldo aims to leverage his practical experience and curiosity to move into a supervisory role, such as shift manager, within the next two years. He plans to complete his associate degree
    in business administration, focusing on retail management and supply‑chain logistics, to qualify for store manager positions. In the longer term, he dreams of co‑owning a small Mexican‑style taquería
    with his wife, blending his cultural heritage with entrepreneurial ambition. He also hopes to mentor younger employees and contribute to community outreach programs that promote financial literacy.
