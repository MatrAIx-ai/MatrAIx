  career_goals: Michael aims to pursue further education at a community college or trade school, focusing on engineering technology, business management, or a skilled trade such as electrical work or HVAC.
    He wants a career that lets him apply his practical problem‑solving skills while staying connected to his community. Long‑term, he hopes to become a mentor or community organizer, using his cooperative
    nature to support younger students and local initiatives. Aware of his tendency toward worry, he plans to develop resilience and stress‑management strategies to sustain his ambitions.
