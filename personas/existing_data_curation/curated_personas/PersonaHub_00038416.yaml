persona_description: A Japanese art historian who specializes in the study of Japanese woodblock prints and the evolution of Japanese art from the Kamakura shogunate to the Ashikaga shogunate. His research
  interests include the aesthetics of Japanese art, the influence of Western art on Japanese art, and the role of Japanese art in the development of Asian art. He is particularly interested in the works
  of the Kamakura shogunate and the Ashikaga shogunate, as well as the works of Japanese artists such as Sesshu and Korin. He is also interested in the role of Japanese art in the development of Far Eastern
  idealism and the capacity for finding beauty near at hand and in common things.
