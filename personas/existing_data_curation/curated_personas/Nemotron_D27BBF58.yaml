personas:
  professional: Roxanne Glass is a diligent nursing assistant at a busy coastal hospital, leveraging her BLS certification, sharp EHR documentation skills, and bullet‑journal precision to streamline shift
    schedules and patient care, while her curiosity drives her to constantly learn new clinical protocols and her natural sociability builds trust with patients and the interdisciplinary team.
  sports: Roxanne Glass embraces the Atlantic lifestyle through beach volleyball with the Ocean County Sharks, weekly Zumba classes at a local community center, sunrise yoga on the dunes, and avidly follows
    the New York Jets, New Jersey Devils, and the New York Yankees, often sporting their gear during off‑season gatherings.
  arts: Roxanne Glass channels her creative energy into coastal photography inspired by Chris Burkard, playlists featuring indie artists like Mitski, The Head and the Heart, and classic rock legends such
    as Fleetwood Mac, and regularly attends live music festivals at the Jersey Shore Amphitheater, where she also enjoys impromptu jam sessions with fellow festival‑goers.
  travel: Roxanne Glass blends her love of ocean breezes with structured planning, having weekend‑tripped to Cape Cod, the Outer Banks, and Montreal's waterfront, while dreaming of a spring sail to the
    Bahamas and a cultural immersion hike through the Cinque Terre, always mapping itineraries in her bullet‑journal and budgeting carefully around her modest student stipend.
  culinary: Roxanne Glass experiments with health‑focused cooking, regularly preparing quinoa‑tabbouleh with fresh cucumber, lemon, and feta, grilling Atlantic salmon brushed with rosemary‑infused olive
    oil, and crafting avocado‑lime smoothies, yet occasionally indulges in midnight pepperoni pizza slices from the local pizzeria after late study sessions.
  core: Roxanne Glass is a 22‑year‑old beach‑loving nursing assistant whose relentless organization fuels both a budding RN ambition and a penchant for spontaneous festival nights, even if they sometimes
    trade sleep for a slice of pizza.
background:
  cultural: Roxanne was raised in a middle‑class, White, Northeastern American family in New Jersey. Her parents have mixed German and English ancestry, and she grew up with a blend of traditional American
    values—hard work, community involvement, and a deep appreciation for the coastal lifestyle. Family traditions include Thanksgiving feasts, Fourth of July barbecues on the beach, and summer trips to
    the shore. The diverse seasonal rhythms of Mantoloking, with its mix of tourists, longtime residents, and seasonal workers, exposed her to a variety of cultural perspectives, shaping her inclusive outlook
    and her commitment to providing compassionate care to people from many backgrounds.
attributes:
  skills: '[''Patient care'', ''Vital signs monitoring'', ''Basic Life Support (BLS) certification'', ''Wound care assistance'', ''Electronic health record (EHR) documentation'', ''Infection control procedures'',
    ''Medication assistance under RN supervision'', ''Patient education and communication'', ''Shift scheduling and inventory management'', ''Team collaboration'', ''First aid'', ''Emergency response'',
    ''Medical equipment sterilization'', ''Compassionate bedside manner'']'
  hobbies: '[''Beach volleyball'', ''Group fitness classes (Zumba, yoga)'', ''Kayaking'', ''Sailing'', ''Hiking in state parks'', ''Bullet journaling'', ''Photography'', ''Healthy cooking'', ''Beach clean‑up
    volunteering'', ''Reading medical journals and popular science'', ''Attending live music festivals'']'
  career_goals: Roxanne aims to leverage her practical curiosity and achievement‑driven nature to become a Registered Nurse (RN) within the next three years. She plans to earn a Bachelor of Science in Nursing
    (BSN) at a New Jersey university, then specialize in community health nursing with a focus on coastal and elderly populations. She intends to obtain certifications such as Certified Wound Care Nurse
    (CWCN) and pursue leadership training to move into a nursing supervisor or case manager role. Long‑term, Roxanne envisions starting her own home health agency that serves Ocean County residents, while
    also contributing to health education programs and volunteer initiatives that improve community well‑being.
