  hobbies: '[''Visiting contemporary art galleries'', ''Street and nature photography'', ''Playing electric guitar in small jazz/funk sessions'', ''Reading speculative fiction and science nonfiction'',
    ''Hiking local nature trails'', ''Cooking fusion dishes that blend Southern and Caribbean flavors'', ''Meditation and mindfulness practice'', ''Journaling creative ideas'', ''Volunteering in after‑school
    science and art programs'']'
  career_goals: Christ aims to lead his own research team focused on developing innovative immunotherapies for historically underserved populations. He aspires to secure a major NIH or private foundation
    grant that enables translational work bridging bench science and community health outcomes. Over the next five years, he hopes to establish a collaborative hub that integrates artistic approaches—such
    as visual storytelling and design thinking—into biomedical research, fostering more inclusive and imaginative scientific discovery. He also wants to serve as a mentor and advocate for emerging Black
    scientists, promoting equity in academic and industry settings while maintaining a flexible work environment that respects his need for autonomy and personal balance.
