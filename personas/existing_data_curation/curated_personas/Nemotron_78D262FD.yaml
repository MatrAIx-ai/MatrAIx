personas:
  professional: Christ Myles, a 35‑year‑old molecular biologist specializing in immunology and CRISPR‑based therapeutics, channels his curiosity and love of visual storytelling into designing data‑rich
    experiments and grant proposals, while his laid‑back, sometimes disorganized workflow lets him pivot between bench work, mentoring junior scientists, and impromptu jam sessions that inspire creative
    problem‑solving.
  sports: Christ Myles, an avid hiker of Central Florida’s greenways and a weekend participant in a local adult soccer league, roots for the Orlando Magic, Orlando City SC, and the Tampa Bay Lightning,
    and keeps fit with early‑morning runs as part of the Orlando Runners club, though he prefers low‑key workouts over crowded gyms.
  arts: Christ Myles, an enthusiastic patron of contemporary galleries and a self‑curated photographer of urban Orlando scenes, channels the improvisational spirit of Miles Davis and Janelle Monáe into
    his electric guitar jam sessions that fuse jazz, funk, and soul, while regularly attending exhibitions featuring artists such as Kehinde Wiley and performances by the Orlando Philharmonic Orchestra,
    letting art infuse his scientific perspective.
  travel: Christ Myles, who favors flexible itineraries that blend cultural immersion with outdoor adventure, has explored New Orleans’ jazz scene, the historic streets of San Juan, and Savannah’s moss‑draped
    oaks, and dreams of trekking the rainforests of Ghana and the beaches of Brazil, typically traveling with a tight‑knit circle of friends and balancing spontaneity with careful budgeting.
  culinary: Christ Myles, an experimental home chef who rates his cooking skills as advanced, loves melding Southern comfort dishes such as fried chicken and collard greens with Caribbean staples like jerk
    seasoning, scotch bonnet peppers, and coconut milk, creating signature plates like shrimp‑and‑grits topped with mango salsa or jerk‑spiced mac & cheese, and frequently scouts Orlando’s farmers markets
    for fresh okra, plantains, and sweet potatoes.
  core: Christ Myles blends scientific rigor with artistic spontaneity, juggling CRISPR experiments, guitar riffs, and spontaneous hikes while wrestling with a charmingly disorganized schedule that keeps
    both his lab bench and his life intriguingly fluid.
background:
  cultural: Christ grew up in a close‑knit African‑American family with roots in the southeastern United States. His upbringing blended the traditions of gospel music, community storytelling, and a strong
    emphasis on education. Moving to Orlando exposed him to a vibrant mix of cultures, including Afro‑Caribbean neighborhoods, which broadened his artistic palate and reinforced his appreciation for diverse
    perspectives. His cultural identity informs his commitment to health equity, his love for rhythmic music, and his respect for the resilience and creativity that characterize Black artistic and intellectual
    traditions.
attributes:
  skills: '[''Molecular biology'', ''Immunology'', ''CRISPR gene editing'', ''Bioinformatics (Python, R)'', ''Statistical analysis'', ''Scientific writing and grant preparation'', ''Laboratory management'',
