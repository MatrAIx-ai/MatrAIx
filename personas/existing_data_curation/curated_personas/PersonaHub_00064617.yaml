persona_description: A group of researchers who specialize in studying the attitudes and fears of university students towards mathematics, particularly focusing on the field of Health Sciences. Their work
  involves applying validated questionnaires, such as the Fennema-Sherman Mathematics Attitudes Scales, to assess the mathematical anxiety of first-year students at the University of Granada. The researchers
  aim to understand the impact of math fear on students' academic choices and to provide strategies for reducing this anxiety.
