    appreciation"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and digital illustration", "Playing pickup basketball", "K‑pop dance practice", "Hiking in the East Bay hills", "Cooking Korean cuisine", "Photography",
    "Attending local music festivals", "Reading science fiction novels", "Volunteering at community cultural events"]'
  career_goals: He plans to enroll in a community college graphic design program, later transferring to a four‑year university for a bachelor's in visual communications or marketing. His long‑term goal
    is to become a creative strategist or program director for a nonprofit arts organization, where he can design community outreach initiatives that blend contemporary art with cultural heritage. Additionally,
    he hopes to launch a digital platform that connects local artists with venues and sponsors, leveraging his organizational talents and passion for art.
