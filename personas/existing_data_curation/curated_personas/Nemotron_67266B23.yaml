personas:
  professional: Soon Kwon, a budding graphic designer proficient in Adobe Photoshop and Illustrator, channels their organized, methodical mindset and sociable energy into coordinating community art events,
    crafting compelling visual campaigns, and leveraging bilingual communication to bridge Korean and English audiences.
  sports: Soon Kwon joins a local pickup basketball league in Berkeley every Saturday, follows the Golden State Warriors religiously, runs occasional spring trail hikes on Mount Diablo, and streams San
    Francisco 49ers games on weekends, balancing a competitive drive with a laid‑back approach to overall fitness.
  arts: Soon Kwon immerses themselves in the Bay Area’s vibrant art scene, frequenting exhibitions at SFMOMA and the Oakland Museum, drawing inspiration from digital illustrators like Loish and Beeple,
    attending K‑pop dance workshops set to BTS and BLACKPINK, and volunteering to curate community art fairs that showcase emerging local talent.
  travel: Soon Kwon prefers meticulously planned weekend getaways, having trekked the misty redwoods of Muir Woods, toured the neon streets of Tokyo, and dreaming of a spring road‑trip through Iceland’s
    waterfalls, all while balancing a modest travel budget and a desire to capture each journey through photography.
  culinary: Soon Kwon enjoys experimenting in the kitchen, mastering the balance of spicy gochujang in bibimbap, perfecting kimchi jjigae, and fusing Korean flavors with California produce like avocado,
    while sharing dishes at potlucks and occasionally overindulging in late‑night ramen.
  core: Soon Kwon is a methodical, sociable twenty‑year‑old who blends art, community, and a dash of Korean spice into a life driven by curiosity and organized creativity.
background:
  cultural: Soon was born and raised in Antioch, California to Korean‑immigrant parents. He grew up bilingual, celebrating Korean holidays such as Chuseok and Lunar New Year while also partaking in mainstream
    American traditions. His family emphasizes respect, education, and community harmony, values that influence his collaborative nature. He remains actively involved in the Bay Area Korean‑American community,
    attending weekend language classes, cultural festivals, and community centers, which shape his artistic sensibilities and appreciation for multicultural experiences.
attributes:
  skills: '["Bilingual (Korean & English) communication", "Digital graphic design using Adobe Photoshop and Illustrator", "Event planning and coordination", "Social media content creation and management",
