persona_description: A fire management officer with expertise in prescribed burning, fuels management, and fire education. They are responsible for implementing and managing the prescribed burning program
  at Chickasaw National Recreation Area, Oklahoma. They are also involved in the maintenance and restoration of landscapes and fire-adapted human communities, and they work closely with local and regional
  initiatives to promote the natural ecosystem's ability to thrive. They have a strong understanding of the impacts of prescribed fires on local communities, wildlife, and the environment, and they are
  passionate about promoting fire safety and reducing wildfire hazards.
