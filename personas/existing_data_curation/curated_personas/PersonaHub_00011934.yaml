persona_description: A historian or political scientist who specializes in the study of British political history, particularly the role of political likenesses in shaping public opinion and political identities
  during the Victorian era. They are interested in the visual culture of the period, the relationship between politicians and their constituents, and the changing nature of political representation in the
  late 19th century. They are also interested in the impact of political language and electoral rhetoric on building broad coalitions of support.
