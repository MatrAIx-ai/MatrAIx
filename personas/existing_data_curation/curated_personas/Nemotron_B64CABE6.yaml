  hobbies: '[''Reading (Historical Non‑Fiction, Science)'', ''Cooking Traditional Puerto Rican Dishes'', ''Walking/Hiking at East Rock Park'', ''Listening to Salsa, Bolero, Jazz'', ''Herb Gardening'', ''Volunteer
    English Tutoring'']'
  career_goals: Eduardo aims to transition from a retail salesperson to a store manager within the next two to three years, leveraging his organized work style and curiosity for emerging retail technologies.
    He plans to enroll in a part‑time associate’s program in Business Management to solidify his leadership skills. Long‑term, he aspires to become a regional manager or open a small boutique that highlights
    Caribbean‑inspired products, blending his cultural heritage with his practical business mindset.
