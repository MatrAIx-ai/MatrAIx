personas:
  professional: An experienced architect and engineer, Tanya Ragland leverages three decades of BIM mastery, sustainable design, and multidisciplinary leadership to turn complex Bay Area projects into harmonious,
    resilient spaces, while their curiosity and balanced blend of organization and flexibility let them champion unconventional ideas without compromising deadlines.
  sports: Tanya Ragland enjoys seasonal hiking in Henry Coe State Park, participates in a local senior cycling club that rides the Pacific Coast Trail, and loyally supports the San Francisco Giants, Golden
    State Warriors, and San Jose Earthquakes, balancing low‑impact cardio with occasional weekend tennis matches at a community court.
  arts: Tanya Ragland finds inspiration in the luminous installations of James Turrell, the stark photography of Ansel Adams, and the avant‑garde street works of Banksy, regularly attending openings at
    the San Francisco Museum of Modern Art and volunteering to lead youth sketching workshops that blend historic architecture with contemporary artistic dialogue.
  travel: Tanya Ragland meticulously plans architecture‑focused trips, having explored Barcelona’s modernist landmarks, the historic alleys of Kyoto, and the coastal villages of Cinque Terre, yet they also
    relish spontaneous weekend retreats to Napa Valley vineyards or a quiet cabin near Lake Tahoe for restorative hikes.
  culinary: Tanya Ragland’s culinary pursuits revolve around farm‑to‑table Mediterranean dishes, from charcoal‑grilled branzino with rosemary and lemon to a fragrant vegetable ratatouille topped with fresh
    figs and lavender honey, and they proudly grow heirloom tomatoes and basil in their garden to enhance each home‑cooked meal.
  core: Tanya Ragland blends analytical rigor with an artistic soul, navigating complex projects with quiet confidence, a penchant for solitary sketching, and a habit of rescuing half‑finished coffee beans
    from the office grinder for late‑night espresso.
background:
  cultural: Tanya identifies with an Anglo‑American heritage rooted in a Midwestern family tradition, now settled in central California. Living in Hollister and the surrounding Santa Clara County, she blends
    the small‑town values of community and self‑reliance with the Bay Area’s progressive, environmentally conscious culture. Her upbringing emphasized hard work, appreciation for practical craftsmanship,
    and a curiosity about the wider world, which informs her respect for both classic American architectural forms and contemporary, avant‑garde design movements.
