  career_goals: Tanya aims to transition into a senior director role where she can champion innovative, sustainable architecture across the Bay Area. She plans to deepen her expertise in resilient design
    for seismic zones and to obtain advanced LEED AP certification. A key ambition is to establish a mentorship program for women in engineering and architecture within her firm, fostering a supportive
    network for underrepresented talent. Over the next five years she envisions leading flagship mixed‑use projects that integrate green technologies, while also exploring a part‑time consultancy focused
    on community‑centered design and historic preservation in Santa Clara County.
