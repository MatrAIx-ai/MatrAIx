  hobbies: '[''fishing'', ''hunting'', ''woodworking'', ''listening to classic rock'', ''Civil War history and reenactments'', ''volunteering at community events'', ''road trips'']'
  career_goals: Daniel aspires to be promoted to sergeant within the next one to two years, overseeing a community‑policing unit that emphasizes trust‑building and proactive problem‑solving. He aims to
    develop a mentorship program for new officers and, after retirement, transition into private security consulting for local businesses and schools, leveraging his on‑the‑ground experience to improve
    safety strategies while staying connected to his community.
