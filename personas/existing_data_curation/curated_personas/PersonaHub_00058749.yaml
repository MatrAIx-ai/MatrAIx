persona_description: A veterinarian with expertise in the care and management of dogs with tracheal collapse, particularly in large dog breeds. This person has extensive knowledge in the diagnosis, treatment,
  and prevention of this condition, as well as in the care of overweight dogs. They are knowledgeable about the impact of heat and humidity on dogs with tracheal collapse and have developed strategies to
  prevent this from occurring. They are also knowledgeable about the symptoms of tracheal collapse and how to recognize it in dogs.
