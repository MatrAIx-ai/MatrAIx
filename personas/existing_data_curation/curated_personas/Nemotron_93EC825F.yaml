personas:
  professional: Ben Shaw, a 34‑year‑old remote art‑commerce entrepreneur, merges self‑taught digital photo editing, graphic design, and website maintenance with a methodical, competitive mindset to curate
    limited‑edition prints from emerging Midwestern artists, leveraging their analytical research and skepticism of market hype to build a trusted, niche brand.
  sports: Ben Shaw, a self‑described solitary fitness enthusiast, prefers low‑key activities like solo jogs along the Central Canal Trail and occasional indoor climbing sessions at Indianapolis Climbing
    Academy, while cheering quietly for the Indianapolis Colts and Indiana Pacers from their balcony, reflecting their competitive streak without the social demands of team sports.
  arts: Ben Shaw’s artistic life revolves around quiet immersion in the Indianapolis Museum of Art’s after‑hours galleries, where they study works by Georgia O’Keeffe and Mark Rothko, while their own en‑plein‑air
    sketches echo the muted tones of contemporary Midwestern painter Sarah Hollander and their film‑photography experiments often reference the grainy aesthetic of William Eggleston.
  travel: Ben Shaw approaches travel as a meticulously planned solo retreat, favoring off‑season trips to quiet cultural hubs like Prague’s historic Old Town and the serene temples of Kyoto, while budgeting
    carefully to fit their entrepreneurial lifestyle and using travel‑planning apps to schedule low‑key itineraries that leave ample time for sketching and reflective walks.
  culinary: Ben Shaw, an amateur home chef, often harvests basil, thyme, and mint from their balcony garden to craft herb‑infused dishes like lemon‑rosemary roasted chicken and fresh pesto pasta, while
    their palate also enjoys the subtle complexity of single‑origin espresso and the occasional indulgence in handmade dark‑chocolate truffles, reflecting their blend of meticulous preparation and solitary
    enjoyment.
  core: Ben Shaw is a quietly competitive introvert whose obsession with cataloguing every chess move, photo exposure, and herb seed leads to a perfectly ordered life that nonetheless spirals into late‑night
    worry bouts and the occasional neglect of sleep, causing them to retreat further into solitary routines.
background:
  cultural: Ben grew up in a middle‑class, Anglo‑American family in the Indianapolis suburbs. His parents emphasized self‑reliance, modesty, and the value of hard work—traits typical of Midwestern cultural
    norms. Family gatherings centered around traditional holidays such as Thanksgiving and Fourth of July barbecues, featuring home‑cooked comfort food and occasional trips to local cultural venues like
    the Indianapolis Museum of Art. While he was raised in an environment that prized practicality, his parents encouraged his curiosity, allowing him access to books and community art classes. This blend
    of Midwestern practicality and exposure to regional arts shaped Ben’s appreciation for quiet, solitary exploration of creative ideas.
