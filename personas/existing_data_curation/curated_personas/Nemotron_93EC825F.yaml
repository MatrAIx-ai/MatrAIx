  hobbies: '[''museum visits'', ''sketching'', ''film photography'', ''reading philosophy and art theory'', ''speculative fiction'', ''online chess'', ''puzzle‑solving tournaments'', ''Arduino tinkering'',
    ''herb gardening'']'
  career_goals: Ben aims to translate his passion for art and his self‑directed technical abilities into a sustainable, remote career. His primary goal is to launch a boutique e‑commerce platform that curates
    and sells limited‑edition prints from emerging Midwestern artists, allowing him to work independently from his home in Indianapolis. In parallel, he hopes to earn a certification in digital marketing
    and perhaps an associate’s degree in art history to strengthen his credibility and broaden his market reach. Ultimately, he envisions a modest but stable entrepreneurial venture that provides financial
    security, reduces his stress, and satisfies his competitive drive by building a reputable brand in the niche art‑collecting community.
