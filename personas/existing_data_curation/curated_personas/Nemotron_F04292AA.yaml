personas:
  professional: Kimberly Bennett, a seasoned full‑stack developer, they blend curiosity with pragmatism to architect scalable AWS and Azure solutions while leading Agile teams with a competitive edge and
    meticulous code reviews.
  sports: Kimberly Bennett, an avid desert hiker and mountain‑bike enthusiast, they ride with the Phoenix Desert Explorers and Desert Riders, compete in the Arizona Road Runners 5K series, and passionately
    support the Phoenix Suns and Arizona Diamondbacks.
  arts: Kimberly Bennett, a sunrise photographer, they draw inspiration from Ansel Adams and Edward Burtynsky, unwind to The Black Keys, and feast on science‑fiction novels by Neal Stephenson and William Gibson
    for creative fuel.
  travel: Kimberly Bennett, a self‑planned road‑trip lover, they explore the Southwest’s Grand Canyon and Saguaro National Park, dream of trekking Patagonia, and plan a tech‑culture tour of Tokyo’s Akihabara
    district.
  culinary: Kimberly Bennett, an experimental home chef, they fuse comfort dishes with avant‑garde twists like truffle‑infused mac and cheese and smoky chipotle‑marinated quinoa, favoring heirloom chilies,
    fresh cilantro, and locally roasted coffee.
  core: Kimberly Bennett, a competitively curious technologist, they balance desert hikes with code, meticulously track every expense, occasionally neglect dental visits, and secretly hoard vintage sci‑fi
    paperback covers as trophies.
background:
  cultural: Kimberly is a white American whose family roots trace back to the Midwest, where a strong emphasis on practical education and self‑reliance shaped her early life. Relocating to Surprise, Arizona
    for career opportunities immersed her in the Southwest’s desert culture, fostering a love for outdoor recreation and an appreciation for the region’s diverse community. Her marriage has provided a stable,
    supportive foundation, reinforcing values of responsibility and collaborative partnership. While she identifies with mainstream American cultural norms, she embraces the multicultural vibrancy of Maricopa
    County, participating in local tech meetups and community events that reflect the area’s blend of traditions and innovation.
