personas:
  professional: A diligent IT support specialist named Angel Alvarado leverages bilingual fluency, meticulous ticket management in ServiceNow and JIRA, and a habit of creating clear documentation to keep
    support processes predictable while mentoring new technicians and infusing community‑focused values into every user interaction.
  sports: A mountain‑loving enthusiast named Angel Alvarado hikes the Sangre de Cristo trails with the local hiking club, dances salsa with a community group, and roots for the New Mexico United soccer
    team while occasionally playing pickup volleyball on weekends.
  arts: A culturally engaged creative named Angel Alvarado enjoys salsa dancing to the rhythms of Celia Cruz and Marc Anthony, attends local folk music festivals featuring Los Lobos, and curates a small
    collection of traditional New Mexican pottery, letting these artistic experiences shape their social gatherings.
  travel: A purposeful traveler named Angel Alvarado prefers road trips to nearby cultural sites like Santa Fe and the historic town of Taos, plans trips with detailed itineraries to balance work and family,
    and dreams of a pilgrimage to Oaxaca to explore the roots of the cuisine they love, all while budgeting around their community commitments.
  culinary: A passionate home cook named Angel Alvarado specializes in New Mexican enchiladas with roasted red chile sauce, hearty posole simmered with hominy and pork, and frequently experiments with blending
    green chile and cinnamon, showcasing a skill level that ranges from careful recipe adherence to occasional improvisation when entertaining friends.
  core: Angel Alvarado is a structured, socially vibrant IT professional who balances community‑driven kindness with a habit of worrying, channeling that energy into tech mentorship, yoga, and flavorful
    home‑cooked meals.
background:
  cultural: Angel was raised in Hernandez, NM, a tight‑knit Hispanic community along the Rio Grande. Growing up in a bilingual household, she speaks both Spanish and English fluently and maintains strong
    ties to family and community traditions. She celebrates holidays such as Día de los Muertos, Cinco de Mayo, and local patron saint festivals, often sharing traditional foods and music with neighbors.
    Her Catholic upbringing and the region’s blend of Hispanic and Native American influences have instilled values of respect, cooperation, and collective well‑being, which she brings to both her professional
    and personal interactions.
