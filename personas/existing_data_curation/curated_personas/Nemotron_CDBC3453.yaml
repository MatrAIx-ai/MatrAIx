  career_goals: 'Angel aims to advance to a senior IT support role and eventually transition into an IT team lead or manager position within the next five years. She plans to earn CompTIA Network+ and Microsoft
    Certified: Modern Desktop Administrator certifications to deepen her technical expertise. Angel is passionate about building efficient support processes, mentoring new technicians, and fostering a collaborative
    team environment that balances structure with flexibility. Long‑term, she hopes to integrate her technical skills with her interest in community outreach by leading technology education initiatives
    for local schools and senior centers.'
