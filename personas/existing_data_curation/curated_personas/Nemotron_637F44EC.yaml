  hobbies: '["Reading (self‑help and fiction)", "Yoga", "Hiking", "Cooking (soul food with Southwest twists)", "Succulent gardening", "Photography", "Attending jazz and cultural festivals", "Volunteering
    at food banks", "Spanish language learning"]'
  career_goals: Linda aims to progress from her current administrative assistant role to an office manager position within the next three to five years, while pursuing a bachelor’s degree in Business Administration.
    She aspires to become an executive assistant to senior leadership, providing strategic support and eventually moving into operations management. Her goals include leading efficiency‑driven initiatives,
    mentoring junior staff, and championing diversity and inclusion within her organization, all while maintaining a healthy work‑life balance that allows continued community involvement.
