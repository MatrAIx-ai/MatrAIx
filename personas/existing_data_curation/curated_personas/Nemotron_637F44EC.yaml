personas:
  professional: Linda Piquion, an administrative professional famed for flawless calendar coordination and data‑driven process improvements, leverages their curiosity for new digital tools and practical
    execution to spearhead office efficiency projects while charting a path toward office‑manager and future executive‑assistant roles within the next five years.
  sports: Linda Piquion fuels their love of movement through weekly sunrise yoga at a downtown studio, weekend treks with the Desert Trail Hikers club on Phoenix’s surrounding mesas, and avidly supports
    the Phoenix Suns and Arizona Diamondbacks, and they occasionally join local pickup basketball games when time permits.
  arts: Linda Piquion enriches their creative side by photographing the desert’s ever‑changing light, attending live performances by the Retro Jazz Collective at the Tempe Center for the Arts, celebrating
    the annual Arizona Black History Festival, and they devour contemporary fiction from authors like Sally Rooney and self‑help titles by Brené Brown.
  travel: Linda Piquion plans travel with the same detail‑oriented mindset they bring to work, favoring carefully mapped weekend escapes to Sedona’s red rocks, spontaneous road trips to Santa Fe’s art markets,
    and a long‑term goal of a cultural immersion stay in Oaxaca, Mexico, where they can practice Spanish and capture vibrant street scenes.
  culinary: Linda Piquion expresses their culinary passion by blending soul‑food staples with Southwest heat, whipping up chipotle‑infused collard greens, black‑bean enchilada casserole with masa‑crusted
    topping, and rosemary‑sprinkled grilled cactus, and they host intimate dinner parties where friends sample the aromatic, spicy fare.
  core: Linda Piquion balances a relentless love for spreadsheets with a spontaneous obsession for naming each new succulent, often losing a night’s sleep perfecting a budget only to binge‑watch a new jazz
    documentary at 2 a.m., and they still manage to greet the sunrise with yoga.
background:
  cultural: Linda identifies as African American and was raised in a close‑knit family that values community, church, and cultural heritage. Family gatherings featured traditional soul food, church choirs,
    and storytelling that reinforced a pride in civil‑rights history and African‑American contributions. She actively supports local initiatives in Phoenix, such as mentorship programs and cultural celebrations,
    and she embraces the multicultural fabric of Arizona by engaging with Hispanic neighbors, attending joint community events, and incorporating diverse culinary influences into her cooking.
attributes:
  skills: '["Office Administration", "Calendar Management", "Travel Coordination", "Document Preparation", "Data Entry", "Record Keeping", "Microsoft Office Suite", "Google Workspace", "Project Support",
