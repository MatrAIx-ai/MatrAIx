personas:
  professional: Shauna Heath, a 55‑year‑old master painter and paperhanger in the Appalachian region, blends three decades of hands‑on finishing expertise with a practical curiosity that drives them to
    test low‑VOC coatings and lead‑safe methods, balancing meticulous organization and flexible problem‑solving while their sociable, cooperative nature earns trust on community projects, even as they sometimes
    worry about meeting tight deadlines.
  sports: Shauna Heath stays active by walking the Cumberland Trail with the local 'Cumberland Trail Walkers' club, cheering on the Tennessee Titans and Nashville Predators, and participating in a community
    senior bowling league and occasional neighborhood softball games, where their outgoing, cooperative spirit turns every match into a social gathering.
  arts: Shauna Heath channels creative energy through watercolor landscapes inspired by Claude Monet and Andrew Wyeth, sings soprano in the church choir performing works by Bach and contemporary gospel
    artist Karen Peck, and leads craft workshops that celebrate folk art icons like Grandma Moses, weaving these artistic passions into a sociable, harmonious lifestyle.
  travel: Shauna Heath favors scenic road trips along the Blue Ridge Parkway, revisiting Asheville’s art galleries and Charleston’s historic waterfront, while dreaming of a pilgrimage to Sedona’s red‑rock
    vistas and the lavender fields of Provence, planning itineraries with meticulous detail yet leaving room for spontaneous stops at local farmer’s markets, though occasional financial worry tempers the
    frequency of such trips.
  culinary: Shauna Heath delights in farm‑to‑table cooking, regularly preparing heirloom tomato caprese salads, herb‑infused roasted chicken, and slow‑cooked jambalaya, wielding a well‑worn cast‑iron skillet
    to fry green tomatoes and bake peach cobbler while confidently blending fresh basil, oregano, smoked paprika, and a pinch of cayenne, though they sometimes over‑season dishes in a burst of enthusiasm
    for bold flavors.
  core: Shauna Heath is a pragmatic yet curious 55‑year‑old painter who balances green‑building ambitions, community choir harmonies, garden obsessions, and occasional money‑spending splurges, all while
    wrestling with a tendency toward worry and a habit of losing track of time in a brushstroke.
background:
  cultural: Shauna grew up in a close‑knit, white Southern community in southeastern Tennessee, where values of hospitality, self‑reliance, and church involvement are deeply rooted. The regional culture
    celebrates Appalachian folk art, storytelling, and seasonal festivals, which have shaped her appreciation for decorative finishes and community handiwork. She maintains family traditions such as Saturday
    barbecue gatherings and gospel music, and she respects the local emphasis on helping neighbors, which informs both her business ethic and her volunteer activities.
attributes:
  skills: '[''Surface preparation'', ''Drywall repair'', ''Interior and exterior painting'', ''Faux finishing'', ''Eco‑friendly low‑VOC coatings'', ''Wallpaper and paper hanging'', ''Color matching'', ''Mural
    painting'', ''Lead‑paint remediation'', ''Scaffolding safety'', ''Project estimating'', ''Crew scheduling'', ''Client communication'', ''Small‑business bookkeeping'']'
  hobbies: '[''Gardening'', ''Heirloom tomato cultivation'', ''Native wildflower planting'', ''Cooking Southern cuisine'', ''Church choir singing'', ''Community craft workshops'', ''Potluck hosting'', ''Watercolor
    painting'', ''Yoga'', ''Hiking the Cumberland Trail'', ''Knitting scarves'', ''Volunteering at local food bank'']'
  career_goals: Shauna aims to transition her solo operation into a small, women‑led painting crew that offers certified green‑painting services across Marion County and neighboring regions. She plans to
    earn a Certified Lead‑Safe Painter credential and become a certified trainer for apprentices, especially encouraging other women to enter the trade. Over the next five years she hopes to secure steady
    contracts with local schools and churches, expand her service portfolio to include decorative wall art consulting, and establish a retirement fund that allows her to reduce her workload while still
    mentoring the next generation of painters.
