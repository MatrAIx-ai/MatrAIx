  hobbies: '[''Visiting Art Galleries'', ''Attending Live Music Performances'', ''Street Photography'', ''Hiking in the Texas Hill Country'', ''Experimental Cooking'', ''Collecting Vintage Vinyl Records'',
    ''Playing Acoustic Guitar'', ''Board Game Nights'', ''Traveling to Culturally Rich Destinations'', ''Volunteering as a Youth Art Mentor'', ''Leading Community Mural Workshops'', ''Mindfulness Meditation'']'
  career_goals: Philip aims to transition from freelance cultural projects to a full‑time role in arts administration within the next two years. His short‑term goal is to secure a museum curatorial fellowship
    or an associate curator position at a regional institution such as the Blanton Museum of Art or a contemporary arts center in Austin. He plans to deepen his expertise by completing a Master’s in Museum
    Studies while gaining experience in grant writing and educational programming. In the medium term, Philip envisions directing a community arts center in Cedar Park that offers free workshops, youth
    mentorship, and public mural projects, thereby making the arts accessible to underserved neighborhoods. Ultimately, he aspires to become a senior arts administrator or cultural policy advisor who can
    shape city‑wide initiatives that integrate art into public spaces, promote cultural diversity, and support emerging artists. He also hopes to publish a series of essays on the role of resilience‑building
    through artistic practice.
