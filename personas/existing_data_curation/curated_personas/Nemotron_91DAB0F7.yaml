personas:
  professional: Maribel Rodriguez, a meticulous medical records specialist proficient in Epic and Cerner, leverages their bilingual fluency and keen eye for detail to overhaul EHR workflows, ensuring HIPAA
    compliance while quietly championing stress‑reduction initiatives for the staff.
  sports: Maribel Rodriguez runs three times a week with the local Park Run club, practices sunrise yoga at the community center, and fervently supports the Seattle Seahawks while cheering on the Seattle
    Sounders FC during the soccer season.
  arts: Maribel Rodriguez devotes evenings to unraveling Agatha Christie mysteries, sways to salsa rhythms of Marc Anthony at community events, and unwinds with the soulful guitar work of Isaac Albéniz,
    weaving these artistic passions into a balanced social life.
  travel: Maribel Rodriguez prefers meticulously planned weekend getaways, often choosing boutique B&Bs in Asheville’s Blue Ridge Mountains or exploring the historic streets of Cartagena on a tight budget,
    while keeping an eye on flight deals to fit travel into a modest savings plan.
  culinary: Maribel Rodriguez enjoys cooking family‑passed‑down dishes like aromatic rice with black beans, citrus‑marinated pork, and plantain‑infused stews, experimenting with fresh herbs and spices while
    occasionally over‑seasoning in an effort to recreate the comforting flavors of home.
  core: Maribel Rodriguez balances a structured career in health informatics with a love for morning runs, salsa dancing, and meticulous budgeting, all while wrestling with a tendency to over‑worry and
    a habit of lingering over the perfect recipe.
background:
  cultural: Maribel is a second‑generation Cuban American raised in the Tampa‑St. Petersburg area. She grew up in a bilingual household where Spanish and English were spoken interchangeably, fostering strong
    communication skills and a deep appreciation for Cuban traditions. Family gatherings often feature classic dishes like ropa vieja and plantain fritters, and she celebrates cultural holidays such as
    Nochebuena and Carnaval with music, dance, and storytelling. While she embraces the vibrant Cuban community in Seffner and nearby neighborhoods, she also integrates broader Floridian influences, reflecting
    a blend of cultural pride and adaptive openness.
attributes:
  skills: '["Medical records management","Electronic Health Record (EHR) system operation (Epic, Cerner)","HIPAA compliance and privacy protocols","Medical terminology and basic coding","Data entry accuracy
    and validation","Process improvement and workflow optimization","Bilingual communication (Spanish/English)","Attention to detail","Organizational and filing systems","Microsoft Office Suite (Excel,
    Word, PowerPoint)","Customer service and patient interaction"]'
  hobbies: '["Morning yoga sessions","Running in local parks","Cooking traditional Cuban recipes","Salsa dancing at community events","Reading mystery novels","Journaling for stress management","Volunteering
    at health fairs","Gardening"]'
  career_goals: Maribel aims to advance her expertise in health informatics by earning a Certified Professional in Healthcare Information and Management Systems (CPHIMS) credential within the next two years.
    She aspires to lead a records department, where she can design and implement data‑quality initiatives that reduce errors and improve patient safety. Pursuing an associate degree in health information
    management is also on her roadmap, positioning her for a future role as a health informatics analyst. Alongside professional growth, she seeks to mentor new staff and champion stress‑reduction practices
    within her workplace.
