  career_goals: William aims to advance to a senior procurement manager role where he can lead large‑scale sustainability projects and integrate emerging technologies like AI‑driven spend analytics into
    the purchasing function. He is passionate about mentoring younger colleagues and hopes to establish a small consulting practice in his later years, offering expertise on ethical sourcing and process
    innovation. Balancing professional growth with personal wellbeing, he also seeks to reduce workplace stress by championing work‑life balance policies within his organization.
