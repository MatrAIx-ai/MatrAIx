persona_description: A social policy expert with a focus on health promotion and disease prevention, particularly in the context of child poverty. This individual is likely to be interested in the European
  Commission's upcoming Recommendation on Child Poverty and Well-being, and is interested in contributing to the development of multi-dimensional and integrated approaches for preventing child poverty and
  social exclusion. They are also interested in the issue of child health and well-being, and are likely to be interested in the EPHA's policy recommendations on this topic. They are likely to be familiar
  with the work of the Social Protection Committee and the Cyprus Presidency of the Council of the European Union, and may have experience working on similar policy issues.
