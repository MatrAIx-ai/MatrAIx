personas:
  professional: Ronald Holmes, a 31‑year‑old IT support specialist at a municipal agency, leverages his hardware repair expertise and humanities‑sharpened communication to write clear documentation, mediate
    user conflicts, and streamline ticket resolution using Zendesk and ServiceNow, while eyeing CompTIA Network+ and ITIL certifications for a senior analyst role.
  sports: Ronald Holmes plays pickup basketball at the West End Community Center, cheers the University of Louisville Cardinals during the season, follows the Louisville City FC soccer team, and belongs
    to a local hiking group that tackles nearby nature trails on weekends.
  arts: Ronald Holmes attends live blues and jazz shows at venues like the Mercury Ballroom, where they delight in performances by artists such as Trombone Shorty and Gregory Porter, and they also sing
    in the church choir, often humming classic Billie Holiday standards during rehearsals.
  travel: Ronald Holmes prefers short road trips, having driven the Great River Road to explore Memphis’s music scene and the Blue Ridge Parkway for scenic hikes, while dreaming of a future vacation to
    New Orleans for its culinary and jazz culture, though budget constraints keep them focused on occasional weekend getaways.
  culinary: Ronald Holmes enjoys grilling Southern comfort foods, regularly mastering dishes like smoked pork ribs, fried chicken with buttermilk brine, collard greens seasoned with smoked paprika, and
    creamy macaroni‑and‑cheese, and they source fresh shrimp for a Cajun jambalaya that has become a weekend staple for family gatherings.
  core: Ronald Holmes fuses a love for community tech mentorship, lively blues rhythms, and Southern cooking with a laid‑back approach to planning that sometimes lets gaming marathons spill into weekday
    mornings.
background:
  cultural: Ronald is an African American who grew up in Louisville’s historic Black neighborhoods. His family has deep roots in the local church, which fostered a strong sense of community service and
    collective resilience. He grew up listening to soul, blues, and jazz, and his cultural identity is expressed through food, music, and participation in citywide Juneteenth celebrations. The legacy of
    the civil‑rights movement in Kentucky shaped his commitment to education and mentorship, motivating him to give back through technology outreach and community programs.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Network basics (TCP/IP, Wi‑Fi setup)'', ''Help desk ticket management (Zendesk, ServiceNow)'', ''Remote support tools
    (TeamViewer, Remote Desktop)'', ''User training and onboarding'', ''Technical documentation and knowledge base creation'', ''Customer service and conflict resolution'', ''Cross‑cultural communication'',
    ''Critical thinking and problem solving'']'
  hobbies: '[''Pickup basketball'', ''Live blues and jazz concerts'', ''Southern cooking and grilling'', ''Volunteer tech workshops for seniors'', ''Hiking in local parks'', ''Multiplayer video gaming'',
    ''College basketball fandom (University of Louisville)'', ''Church choir participation'']'
  career_goals: Ronald aims to earn CompTIA Network+ and ITIL certifications within the next year, positioning himself for promotion to senior support analyst. His long‑term ambition is to move into IT
    service management and eventually become an IT manager overseeing a small team, where he can blend his technical expertise with his humanities insight to improve user experience for public‑sector projects.
    He also hopes to mentor junior technicians and expand his involvement in community tech‑education programs for underserved youth.
