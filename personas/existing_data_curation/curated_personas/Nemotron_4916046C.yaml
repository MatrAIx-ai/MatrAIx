    Gaming'']'
  career_goals: Xuan aims to advance from his current clerk role to a supervisory position in warehouse operations within the next three years. He plans to earn the APICS Certified in Production and Inventory
    Management (CPIM) credential and eventually complete a bachelor's degree in Supply Chain Management. His long‑term ambition is to become a supply chain manager who can lead cross‑functional teams, drive
    strategic logistics initiatives, and integrate emerging technologies such as RFID and AI‑based forecasting. He also aspires to mentor newer employees, fostering a supportive and harmonious work environment.
