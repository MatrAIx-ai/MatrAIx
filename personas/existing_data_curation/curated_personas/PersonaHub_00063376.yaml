persona_description: A neurosurgeon who specializes in the diagnosis and treatment of diseases affecting the skull base, including base skull fractures, cerebrospinal fluid leaks, and tumors. They use computed
  tomography (CT) and magnetic resonance imaging (MRI) to detect and plan for surgical procedures. They are knowledgeable about the anatomy and function of the skull base, including the foramina that allow
  the passage of nerves and blood vessels. They are likely to be experienced in performing surgeries on the skull base and have a deep understanding of the risks and benefits of different surgical approaches.
