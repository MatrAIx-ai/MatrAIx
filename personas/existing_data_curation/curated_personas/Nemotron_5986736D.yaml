personas:
  professional: Kimberly Latta already arranges her plush animals by size and color, and they demonstrate a methodical mindset that foreshadows a future as a meticulous logistics coordinator, where their
    reliability and love for predictable routines will define their professional life.
  sports: Kimberly Latta delights in crawling races at the local park, watches the Alabama Crimson Tide on Sundays, and participates in the Tiny Tots T‑ball league where they practice throwing soft balls
    under their parents' watchful eyes.
  arts: Kimberly Latta is enchanted by Disney lullabies, sings along to Raffi’s 'Baby Beluga,' and spends quiet afternoons flipping through picture books like 'Goodnight Moon,' often humming the church
    choir’s rendition of 'Amazing Grace' during Sunday services, a habit that soothes them.
  travel: Kimberly Latta’s travel adventures consist of weekend drives to the Talladega National Forest for leaf‑picking, family visits to grandma’s farm where they feed chickens, and a day‑long car ride
    to see the Fourth of July fireworks, while they dream of one day strolling through Disney World’s Magic Kingdom.
  culinary: Kimberly Latta prefers pureed sweet potatoes, chicken noodle soup, and applesauce, can expertly hold a soft banana, and loves the simple flavor of cheddar cheese sprinkled on their scrambled
    eggs, with family meals often featuring homemade buttermilk biscuits at Sunday dinners.
  core: Kimberly Latta, a one‑year‑old, follows a strict nap‑and‑snack schedule, clings to their beloved plush rabbit, experiences sudden waves of anxiety over minor changes, and quietly insists on order
    in their tiny world.
background:
  cultural: Kimberly is a white child raised in Sulligent, Alabama, a small town in Lamar County known for its close‑knit community and Southern traditions. Her family participates in local church gatherings,
    values hospitality and modesty, and maintains customs such as weekly family meals and community celebrations of holidays like Thanksgiving and the Fourth of July. Growing up in a rural environment,
    she experiences a slower‑paced lifestyle, frequent exposure to nature, and the cultural emphasis on reliability, order, and personal responsibility.
