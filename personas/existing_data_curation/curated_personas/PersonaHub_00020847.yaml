persona_description: A historian who is interested in the interactions between ancient civilizations and early modern Europe, particularly in the context of the Dutch East India Company's Council of Policy
  at the Cape of Good Hope. They are familiar with the works of ancient Greek and Roman authors, and are interested in how Grevenbroek's engagement with these sources reflects his understanding of the Khoi
  people and their place in the world. They are also interested in the broader implications of Grevenbroek's framing of the Khoi in relation to the contemporary European image of them.
