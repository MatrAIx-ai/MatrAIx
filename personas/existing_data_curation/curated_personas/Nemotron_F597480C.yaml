personas:
  professional: A charismatic teenage leader, Elizabeth Mccann channels her love for routine and public speaking into the school drama club and student council, organizing rehearsals and meetings with meticulous
    checklists while they thrive on the spotlight.
  sports: A dedicated community soccer player, Elizabeth Mccann anchors midfield for the Auburn Thunder U-14 girls’ team, attends thrice-weekly drills, and they relish cheering on the Seattle Seahawks and
    Seattle Storm as extensions of their team spirit.
  arts: A budding visual storyteller, Elizabeth Mccann blends drama club performances with digital photography, capturing candid trail moments and editing short montages inspired by Lin-Manuel Miranda’s
    musical storytelling and Chloé Zhao’s cinematography, while they regularly experiment with creative transitions.
  travel: An organized explorer, Elizabeth Mccann prefers day trips that fit her school schedule, having hiked the Hoh Rain Forest and visited Pike Place Market, and they meticulously map out routes on
    paper before each adventure, dreaming of a summer road trip to the Canadian Rockies.
  culinary: A home-grown baker, Elizabeth Mccann frequently mixes chocolate chip cookies and blueberry lemon muffins using fresh berries from the farmer’s market, mastering a reliable recipe but they sometimes
    over‑mix batter when excited for a neighborhood block party.
  core: Elizabeth Mccann balances a love for routine with a flair for the spotlight, and they channel sociable energy into leading school projects, saving methodically, staying active on the soccer field,
    and baking treats, all while maintaining a calm, resilient outlook.
background:
  cultural: Elizabeth comes from a White, middle‑class American family in Auburn, Washington. Her upbringing reflects typical Pacific Northwest values such as appreciation for the outdoors, community involvement,
    and a practical, down‑to‑earth mindset. Family traditions include celebrating holidays like Thanksgiving and Christmas and participating in local community events. The region’s cultural emphasis on
    environmental stewardship and collaborative community life influences her sense of responsibility and civic engagement.
