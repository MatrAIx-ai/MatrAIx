  career_goals: Elizabeth aims to graduate high school with strong academic standing, pursue a degree in communications or education, and work in a role that blends her love for people with her organizational
    talents. She envisions becoming a community outreach coordinator or youth program director at a local nonprofit, or a school counselor, where she can lead events, mentor younger students, and create
    supportive, inclusive environments.
