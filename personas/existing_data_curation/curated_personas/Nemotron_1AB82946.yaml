personas:
  professional: James Sturgis, a junior soccer strategist, blends his love for scheduled Saturday matches with the practical imagination of building LEGO stadiums, channeling a competitive edge into early
    leadership while they relish the predictability of structured play and remain flexible about how long a build lasts.
  sports: James Sturgis plays forward for the Oakdale Kids Soccer Club, thrives on the predictable rhythm of Saturday matches, and avidly follows the regional professional team Metro United FC, cheering
    for its star forward Cristiano Ronaldo while they bring a competitive spirit to every kick.
  arts: James Sturgis delights in assembling intricate LEGO cityscapes while blasting upbeat hip‑hop tracks like Kendrick Lamar's 'HUMBLE.' and classic soul staples such as Marvin Gaye's 'What’s Going On,'
    letting the music shape the rhythm of their builds and sharing playlists with neighborhood friends.
  travel: James Sturgis has trekked the trails of Willow Creek State Park, enjoyed a family weekend at Disney World, and dreams of future adventures to the Grand Canyon's rim, balancing carefully planned
    trips with the freedom to explore spontaneous playgrounds wherever they go.
  culinary: James Sturgis prefers pepperoni pizza, spicy chicken nuggets, creamy mac and cheese made with sharp cheddar, and playful fruit kebabs with pineapple and grapes, yet they sometimes overindulge
    in pizza and neglect vegetables, reflecting a tasty yet imperfect palate.
  core: James Sturgis merges boundless soccer energy with meticulous LEGO design, stays socially vibrant yet fiercely competitive, and balances disciplined allowance savings with occasional impulsive splurges.
background:
  cultural: James grows up in a close‑knit African‑American family in Burbank, Illinois, where community, church, and family traditions play a central role. He celebrates cultural holidays like Kwanzaa
    and participates in local events hosted by the neighborhood community center, which often feature music, dance, and storytelling that highlight Black heritage. His parents emphasize the importance of
    education and pride in his ancestry, sharing stories of notable Black figures from Chicago and the broader Midwest. These influences give James a sense of identity rooted in both his immediate surroundings
    and the broader African‑American experience.
