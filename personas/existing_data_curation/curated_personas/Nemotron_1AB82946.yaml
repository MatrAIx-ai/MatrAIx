  career_goals: James dreams of turning his love for competition and teamwork into a future career. He often says he wants to become a professional soccer player because he enjoys the fast‑paced, strategic
    nature of the sport and the chance to work with a team. He also talks about wanting to be an engineer or a builder, inspired by his LEGO constructions and a local community mentor who works in construction.
    In the longer term he imagines combining his interests by designing sports equipment or building community playgrounds, hoping to give other kids the same opportunities he values.
