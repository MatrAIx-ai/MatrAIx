  career_goals: Approaching retirement, Jose aims to earn the title of Master Welder and launch a small boutique studio that produces custom metal art inspired by Mexican folk motifs and abstract concepts.
    He aspires to win regional craft competitions, secure a Certified Welding Engineer credential, and offer evening workshops at the local community college to pass his expertise to a new generation. Financial
    security for his family and preserving his cultural craft heritage are central motivations behind his competitive drive and meticulous planning.
