personas:
  professional: Jose Durangomez, a veteran welder approaching retirement, leverages three decades of precision welding expertise, disciplined inventory control, and an imaginative eye to craft metal sculptures
    that fuse folk motifs with abstract art, while they mentor apprentices and pursue Master Welder certification and a Certified Welding Engineer credential.
  sports: Jose Durangomez, a devoted fan of the Phoenix Suns and the Arizona Diamondbacks, sustains a light fitness routine through weekly walks in their herb garden, seasonal participation in senior tennis
    matches at the Arizona Senior Tennis Association, and occasional hikes with the Desert Trail Club, preferring steady activity over high‑intensity sports.
  arts: Jose Durangomez, an avid collector of Beethoven symphonies, a fan of the folk ensemble Los Tigres del Norte, a reader of Isaac Asimov’s sci‑fi novels and Friedrich Nietzsche’s philosophical essays,
    spends evenings sculpting metal pieces that echo the lyrical rhythm of these influences, while they also attend occasional local gallery openings.
  travel: Jose Durangomez, a meticulous planner with a modest travel budget, enjoys serene weekend trips to the desert towns of Taos and Santa Fe, long‑awaited pilgrimages to the historic streets of Granada,
    Spain, and dreams of exploring the ancient ruins of Machu Picchu, balancing cultural curiosity with the need to return home for family obligations.
  culinary: Jose Durangomez, an enthusiastic home cook, harvests basil, oregano, and epazote from their garden to flavor traditional regional dishes such as spiced corn soup, hand‑rolled corn tortillas
    with mole sauce, and grilled fish tacos, while their modest culinary skill lets them confidently impress guests with their signature herb‑infused refried beans.
  core: Jose Durangomez, a disciplined yet deeply imaginative metal artist in their sixties, balances relentless pursuit of perfection with an occasional habit of over‑planning, frequent worry about the
    future, and a quiet penchant for solitary midnight chess matches.
background:
  cultural: Jose was born into a Mexican family that emigrated from Jalisco, bringing with them a deep reverence for craftsmanship, family gatherings, and festive traditions like Día de los Muertos. Growing
    up in a bilingual household, he absorbed both Mexican cultural values—such as respect for elders, communal solidarity, and the celebration of artisanal work—and the diverse influences of the Los Angeles
    County Latino community. His Mexican heritage informs his artistic choices, from incorporating traditional motifs into his metalwork to preparing authentic cuisine for family gatherings, while his life
    in Norwalk, CA, blends these roots with the broader American work ethic and suburban lifestyle.
