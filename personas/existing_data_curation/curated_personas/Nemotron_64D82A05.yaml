  hobbies: '[''Metal sculpture'', ''Abstract painting'', ''Reading sci-fi and philosophy'', ''Model train building'', ''Woodworking'', ''Gardening'', ''Chess'', "Cooking traditional Mexican cuisine", ''Meditation'',
