  career_goals: Although currently not in the workforce, Jesse aims to turn his artistic pursuits into modest income streams and a sense of purpose. He plans to assemble a professional portfolio of paintings
    and photographs for local gallery showings, and to self‑publish a chapbook of poems and short stories. He hopes to teach occasional weekend workshops at community centers, sharing his skills in painting
    and basic woodworking. Over the next few years, he wants to develop a routine that balances his creative spontaneity with enough structure to meet deadlines, thereby reducing his anxiety. Ultimately,
    his ambition is to become a recognized local artist who also mentors younger creators while maintaining a healthy work‑life balance.
