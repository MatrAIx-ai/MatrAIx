    volunteering'', ''Travel‑tech blogging'', ''Listening to classical music'']'
  career_goals: Approaching semi‑retirement, David aims to transition into a mentorship and consulting role where he can share his decades of experience with emerging tech startups and local non‑profits.
    He is eager to launch a community program focused on digital literacy for seniors, integrating his passion for technology and service. Parallel to these professional goals, David aspires to develop
    a personal portfolio of multimedia art—combining photography, digital illustration, and interactive installations—and hopes to exhibit his work in small galleries around Charlotte. He also envisions
    authoring a blog that explores the intersection of technology, art, and Southern culture.
