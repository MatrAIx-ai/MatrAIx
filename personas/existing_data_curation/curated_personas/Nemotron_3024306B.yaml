personas:
  professional: Tommy White, a 12‑year‑old budding coder and LEGO builder, channels their practical, structure‑loving mindset into designing simple Scratch animations while balancing their love of spontaneous
    play, which shows in their habit of intermittently abandoning projects to join a pickup soccer game.
  sports: Tommy White, a soccer‑enthusiast who spends Saturdays playing for the Morgantown Badgers youth league and joining pickup basketball games at the local park, also follows the West Virginia Mountaineers
    football team and channels their competitive streak into a disciplined yet spontaneous after‑school training routine that mixes hill‑sprints on nearby trails with weekend fishing trips.
  arts: Tommy White, an avid comic‑book reader and budding LEGO sculptor, regularly dives into Adventure Comics and Spider‑Man issues, while their playlist swaps classic bluegrass legends like Bill Monroe
    with pop icons like Taylor Swift, shaping their creative break‑time projects and fueling their imagination.
  travel: Tommy White dreams of swapping weekend hikes in the Monongahela National Forest for a road trip to the Grand Canyon, yet their family’s budget keeps them mostly exploring nearby spots like Shenandoah
    National Park and the state fair in Fairmont, planning each outing on the fly rather than using a strict itinerary.
  culinary: Tommy White, a self‑proclaimed pizza aficionado who loves the smoky flavor of West Virginia BBQ ribs and can whip up a decent mac‑and‑cheese with canned cheese and cheddar bits, enjoys experimenting
    with simple recipes like homemade trail‑mix bars but often orders fast‑food after a late gaming session.
  core: Tommy White is a high‑energy, competitive kid who thrives on spontaneous games and LEGO builds, worries about missed opportunities, and habitually leaves school projects unfinished until the last
    minute.
background:
  cultural: Tommy grew up in Morgantown, West Virginia, a small city nestled in the Appalachian region. His family’s roots are in the rural traditions of the area, where community gatherings, high school
    sports, and outdoor activities like hiking and fishing are common. The local culture values hard work, self‑reliance, and close‑knit friendships, shaping his practical outlook and sociable nature. While
    his household reflects mainstream American middle‑class values, they also celebrate regional customs such as seasonal festivals, local music, and a strong sense of civic involvement.
