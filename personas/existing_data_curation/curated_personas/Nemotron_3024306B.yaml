  career_goals: Tommy aspires to a career that blends his love for practical problem‑solving with a desire to serve his community. He dreams of becoming a mechanical engineer or automotive technician, envisioning
    himself designing and building reliable machines. He also admires firefighters and sees a future in the fire service, appreciating the structured environment and teamwork it offers. In the short term,
    he aims to win his school’s robotics competition and earn a leadership position on his soccer team, viewing these achievements as steps toward his long‑term goals.
