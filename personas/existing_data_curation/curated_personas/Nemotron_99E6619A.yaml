personas:
  professional: Lorraine Ethridge, a senior salon stylist renowned for precision cuts and avant‑garde balayage, blends curiosity for emerging hair trends with a pragmatic, well‑organized workflow; they
    mentor junior stylists confidently while championing sustainable, sulfate‑free product choices.
  sports: Lorraine Ethridge, a devoted fan of the Houston Astros, Rockets, and Texans, participates in a weekly walking club that meets at the local park, occasionally joins a mixed‑age recreational tennis
    league at the Katy Community Center, and they enjoy cheering on the teams from their backyard patio while sipping homemade iced tea.
  arts: Lorraine Ethridge finds creative relief in a quilting circle that crafts intricate geometric patterns inspired by Yayoi Kusama, while evenings often feature mystery novels by Tana French and a playlist
    of Lyle Lovett, Sarah Jarosz, and classic cinema from Alfred Hitchcock, and they delight in sharing these artistic experiences with friends at dinner gatherings.
  travel: With a penchant for balanced planning and spontaneous discovery, Lorraine Ethridge favours leisurely road trips through the Texas Hill Country, embedding stops at Marfa’s art installations and
    a weekend retreat in Santa Fe for its vibrant market scene, and they budget carefully to keep their future boutique aspirations on track.
  culinary: Lorraine Ethridge, an adept home chef, regularly prepares hearty Tex‑Mex dishes such as chicken enchiladas with homemade salsa verde, roasted corn‑tortilla soup, and garden‑fresh cilantro lime
    rice, often garnished with cherry tomatoes harvested from their backyard, and they love pairing meals with locally sourced avocado and jalapeño.
  core: Lorraine Ethridge is a meticulous salon veteran who channels garden‑grown patience into precise color work, balances a love of sustainable creativity with an undercurrent of worry that fuels their
    drive for mindful self‑care, and they occasionally indulge in nail‑tapping as a nervous habit.
background:
  cultural: Lorraine comes from a White, second‑generation Texas family with roots in the Midwest and the South, embodying a blend of Southern hospitality and Midwestern pragmatism. Raised in the Houston
    suburbs, she grew up amidst the cultural diversity of Fort Bend County, which has shaped her appreciation for varied traditions and flavors—evident in her comfort serving a multicultural clientele and
    her love of Tex‑Mex cuisine. Her cultural identity is grounded in community‑centered values, regular church involvement, and a strong work ethic, while she remains open to new ideas, reflected in her
    willingness to adopt contemporary beauty trends and sustainable practices.
attributes:
  skills: '[''Hair cutting (precision layering)'', ''Advanced coloring techniques (balayage, foilyage)'', ''Hair styling for events and everyday wear'', ''Salon sanitation and health compliance'', ''Inventory
