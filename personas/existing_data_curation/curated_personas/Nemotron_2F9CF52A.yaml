  hobbies: '["Gardening","Fishing","Woodworking","Reading historical non-fiction","Birdwatching","Walking along lake trails","Cooking comfort meals","Volunteering at local senior center"]'
  career_goals: At this stage, Donald aims to transition from front‑line service to a mentorship and training role within his organization, leveraging his years of experience to guide younger representatives.
    He hopes to design a structured onboarding program that balances clear procedures with the flexibility needed for real‑time problem solving. Additionally, he is interested in part‑time consulting for
    local small businesses that want to improve their customer service processes, allowing him to maintain a predictable schedule while reducing daily stress. Volunteering as a crisis‑line supporter is
    also a long‑term ambition, aligning with his desire to help others and promote community harmony.
