  career_goals: Melvin dreams of turning his love for art and technology into a career as an interactive media designer or game illustrator. He hopes to attend a specialized art‑focused high school in Denver,
    then study graphic design or animation in college. His ambition includes launching a YouTube channel that documents his creative process, eventually collaborating with indie game developers to create
    culturally‑inspired characters. Long‑term, he wants to be a creative director who fuses African‑American cultural themes with mainstream digital entertainment, producing work that both entertains and
    sparks conversation.
