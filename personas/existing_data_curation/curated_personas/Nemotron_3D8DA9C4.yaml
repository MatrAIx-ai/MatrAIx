  career_goals: Gustavo aims to obtain his GED within the next year and enroll in a community college culinary program to earn a food safety certification. He aspires to advance from crew member to shift
    supervisor and eventually to restaurant manager, seeking a role that balances practical hands‑on work with the opportunity to mentor new staff. Long‑term, he dreams of launching a small neighborhood
    food‑truck that blends traditional Mexican flavors with modern twists, allowing him to channel his curiosity about cooking while establishing a stable, self‑directed business. He also hopes to develop
    better organizational habits to manage stress and meet deadlines more reliably.
