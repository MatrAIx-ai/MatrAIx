personas:
  professional: Dustin Mcafee, a seasoned business educator with over three decades of experience, designs market‑responsive curricula and delivers clear financial concepts to adult learners while leveraging
    their calm, collaborative demeanor; they foster supportive classroom discussions and community outreach.
  sports: Dustin Mcafee, an avid participant in the Monte Sano Trail Hiking Club, enjoys leisurely treks on the local hills, follows the Auburn Tigers football and the Huntsville Havoc ice‑hockey teams
    on weekends, and they occasionally play pick‑up basketball at the community center.
  arts: Dustin Mcafee, a devoted reader of historical biographies, often attends performances at the Alabama Shakespeare Festival, listens to Bob Dylan and Yo‑Yo Ma recordings while woodworking, and they
    delight in classic cinema featuring Morgan Freeman and Meryl Streep.
  travel: Dustin Mcafee, who values detailed itineraries, plans meticulously organized trips that blend history and nature—such as guided tours of Washington, D.C.’s monuments, weekend getaways to Charleston’s
    historic district, and a long‑awaited pilgrimage to the Irish countryside to trace civil‑rights leaders’ roots, and they always keep a travel journal.
  culinary: Dustin Mcafee, an enthusiastic home gardener, crafts meals centered on fresh produce like roasted heirloom tomatoes, sautéed collard greens, and shrimp and grits, occasionally baking apple pie,
    and they take pride in their moderate cooking skill that balances creative experimentation with reliable, hearty Southern comfort food.
  core: Dustin Mcafee, a methodical yet warm‑hearted mentor, blends disciplined planning with a love for gardening, bridge, and community service, and they occasionally over‑schedule their weekends, forgetting
    to water the garden.
background:
  cultural: Dustin was raised in a middle‑class family in central Alabama, where Southern hospitality, a strong work ethic, and community involvement were core values. His upbringing was shaped by regular
    church attendance, family gatherings, and a reverence for education as a pathway to stability. Living his adult life in Huntsville—a city known for its aerospace and tech industries—has blended his
    traditional Southern roots with exposure to a forward‑looking, innovative environment. This hybrid cultural background informs his respectful, cooperative demeanor and his commitment to fostering practical,
    real‑world learning for his students.
