  career_goals: Looking ahead, Dustin aims to take on a leadership role within his department, aspiring to become department chair within the next three years. He plans to launch a mentorship program that
    pairs his students with small‑business owners in Huntsville, providing hands‑on experience and networking opportunities. Additionally, he is working on a concise guidebook on personal financial management
    for adult learners, with the goal of publishing it by the end of the next academic year. While he envisions a gradual transition toward retirement, Dustin hopes to remain active as a consultant and
    guest lecturer, sharing his expertise with both the college and the broader community.
