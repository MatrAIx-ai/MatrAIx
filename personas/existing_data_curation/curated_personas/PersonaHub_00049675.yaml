  the project is completed successfully. They are aware of the importance of communicating the potential impact of issues and risks to stakeholders, and are able to use a structured approach to risk management
  to ensure that the project is managed effectively. They are also skilled in identifying and assessing the impact of issues and risks in the planning stages of a project, and are able to use this information
  to make informed decisions about the project's objectives and the risks and issues that may impact it.
