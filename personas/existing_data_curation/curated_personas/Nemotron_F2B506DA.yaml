  hobbies: '[''Gardening'', ''Cooking traditional Vietnamese cuisine'', ''Playing mahjong'', ''Playing bridge'', ''Community volunteer tutoring in STEM'', ''Walking group in Jacksonville Riverwalk'', ''Attending
    cultural festivals'', ''Birdwatching'', ''Reading historical non‑fiction'', ''Bingo competitions'']'
  career_goals: Even in retirement Luisito aims to leave a lasting impact by establishing a senior‑led mentorship program that pairs experienced professionals with high‑school students in Jacksonville's
    STEM initiatives, especially within the Vietnamese community. He also hopes to document his family's immigration story in a memoir, continue volunteering as a technology tutor at the local library,
    and maintain his health through a balanced daily routine that blends structured exercise with spontaneous community events.
