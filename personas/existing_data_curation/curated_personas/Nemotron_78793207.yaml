  hobbies: '[''Abstract painting'', ''Street photography'', ''Listening to jazz and soul music'', ''Reading philosophy and sports psychology'', ''Cooking Creole-inspired dishes'', ''Fishing on the Gulf
    Coast'', ''Mindfulness meditation'', ''Volunteering at youth sports clinics'', ''Collecting limited‑edition sneakers'', ''Attending local art exhibitions'']'
  career_goals: James aims to qualify for a professional sports league within the next two years, securing a sponsorship with an athletic apparel brand that aligns with his artistic sensibilities. He plans
    to earn a certification in sports psychology to deepen his understanding of emotional regulation and to use that expertise to support teammates and aspiring athletes. Long‑term, he envisions transitioning
    into coaching and launching a community youth development program that blends sports training with creative workshops, empowering local kids to explore both physical and artistic potential. He also
    hopes to become a spokesperson for mental‑health awareness in the athletic community, sharing his personal journey of anxiety and resilience.
