persona_description: A scientist who specializes in the study of aging and its related diseases, particularly the role of Sirtuin proteins in metabolic regulation and longevity. They are interested in developing
  drugs that can extend the lifespan and improve healthspan in mice, and are currently conducting research on the effects of a SIRT1 activator called SRT1720 on the health and lifespan of mice. They are
  also interested in the effects of high-temperature cooking on the levels of harmful compounds called advanced glycation end products, which may contribute to the aging process.
