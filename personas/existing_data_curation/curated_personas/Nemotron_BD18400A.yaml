  career_goals: Debra dreams of a future where she can combine her curiosity about how things work with a desire to help others. She often says she wants to become a scientist‑engineer who designs safe
    playgrounds for kids, or a teacher who makes learning fun and organized. She also imagines volunteering at the local library or community garden in Chesapeake when she’s older, reflecting her practical
    mindset, love of learning, and compassionate nature.
