  hobbies: '[''Gardening (vegetable and flower beds)'', ''Woodworking'', ''Fishing'', ''Church volunteering and event organization'', ''Reading historical nonfiction'', ''Crossword puzzles'', ''Model train
    building'', ''Watching local high school sports'']'
  career_goals: David aims to maintain his physical health, continue contributing to his local community, and develop new competencies that align with his interests. He hopes to earn a Master Gardener certification,
    volunteer as a coordinator for his church’s outreach program, and mentor younger community members in hands‑on trades. He also desires to establish a small, sustainable vegetable garden that can supplement
    his family’s meals and serve as a teaching tool. Financially, his goal is to manage his and his spouse’s retirement funds prudently, ensuring stability and avoiding unexpected stressors. Occasionally,
    he considers part‑time consulting on home maintenance for neighbors, leveraging his reputation for reliability.
