personas:
  professional: David Kobus, a seasoned rural handyman and community organizer, leverages their meticulous carpentry, plumbing, and equipment maintenance skills to lead church charity drives and neighborhood
    workshops, constantly applying their methodical planning and calm assertiveness to deliver reliable results.
  sports: David Kobus enjoys early‑morning fishing at Patoka Lake as their primary fitness routine, follows the Indiana Pacers and the Chicago Cubs avidly, supports the local Patoka High School Panthers
    football team on weekends, and participates in seasonal community hunting outings that blend recreation with tradition.
  arts: David Kobus finds solace in classic folk tunes, regularly listening to John Hartford and Emmylou Harris while working on their woodworking projects, and occasionally attends community theater productions
    of 'Our Town' and local historical reenactments, which they view as extensions of their love for Midwestern heritage.
  travel: David Kobus favors road trips to nearby state parks such as Hoosier National Forest and the Amish country of Lancaster for its orderly gardens, while dreaming of a guided tour of the Royal Botanic
    Gardens, Kew in England and a summer stay in Tuscany to study heirloom tomato cultivation, which they consider the ultimate blend of travel and horticultural learning.
  culinary: David Kobus delights in preparing fresh heirloom tomato bruschetta with basil, garlic, and a drizzle of olive oil, preserves cucumbers into crisp pickles, and often pairs their garden harvest
    with homemade cornbread and slow‑cooked pork shoulder, though they occasionally over‑salt dishes in the pursuit of bold flavor.
  core: David Kobus blends methodical craftsmanship, garden‑grown patience, and a quiet, anxious drive to serve their community, all while juggling a penchant for over‑salting food and occasional neglect
    of personal mental‑health care.
background:
  cultural: David grew up in a working‑class, white Midwestern family in Pulaski County, Indiana. His ancestry is primarily of German and Irish descent, common among the region’s settlers. The community’s
    values—self‑reliance, modesty, strong family ties, and a deep sense of neighborly responsibility—shaped his worldview. A lifelong Methodist, he embraces the modest, service‑oriented ethic of his church.
    Life in a small town has reinforced a preference for routine, personal accountability, and close‑knit social networks, while also fostering an appreciation for the agricultural heritage and local traditions
    of rural Indiana.
attributes:
  skills: '[''Basic home repair'', ''Plumbing and electrical troubleshooting'', ''Carpentry'', ''Farm equipment maintenance'', ''Budgeting and financial record‑keeping'', ''Community event planning'', ''Volunteer
