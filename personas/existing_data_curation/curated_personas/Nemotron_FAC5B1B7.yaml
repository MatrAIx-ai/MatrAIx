personas:
  professional: Indigo Riddle, a seasoned protective‑service veteran approaching retirement, leverages their meticulous record‑keeping, skeptical threat‑assessment mindset, and competitive drive to mentor
    emerging officers while championing stress‑reduction protocols and digital evidence integration in a senior supervisory role.
  sports: Indigo Riddle, a devoted member of the Nettleton women’s bowling league and an enthusiastic hiker on the Natchez Trace, follows the New Orleans Saints and Memphis Grizzlies, and structures their
    fitness routine around weekly cardio hikes and disciplined bowling practice to maintain stamina.
  arts: Indigo Riddle, an avid consumer of mystery literature ranging from Agatha Christie to Tana French, regularly attends performances by the Mississippi Symphony Orchestra, and cites Dolly Parton and
    William Faulkner as inspirations that inform their appreciation of storytelling and Southern artistic heritage.
  travel: Indigo Riddle, who prefers meticulously planned trips over spontaneous getaways, frequently revisits historic Charleston and Savannah for their charm, dreams of a guided bird‑watching expedition
    in Costa Rica, and balances travel ambitions with a modest retirement budget and family considerations.
  culinary: Indigo Riddle, a competent home cook, delights in preparing shrimp and grits, collard greens seasoned with smoked turkey, and pecan pie, often sourcing fresh herbs from their garden and sharing
    recipes for traditional Southern dishes at the community library.
  core: Indigo Riddle blends a lifelong protective‑service career with a relentless curiosity for puzzles, a competitive edge in bowling, and a habit of over‑analyzing both threats and grocery coupons,
    all while navigating the stress of approaching retirement.
background:
  cultural: Indigo grew up in a small, close‑knit community in rural Mississippi, steeped in Southern traditions of hospitality, self‑reliance, and church involvement. Her white, Southern upbringing emphasized
    respect for authority and a strong work ethic, while her time in college and a career in protective services introduced her to broader perspectives and diverse populations. These experiences have shaped
    a cultural identity that values community service, practical problem‑solving, and a measured openness to new ideas while preserving the enduring customs of her hometown.
