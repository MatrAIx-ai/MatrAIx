  career_goals: Approaching retirement, Indigo aims to transition into a supervisory or training position where she can institutionalize her practical innovations and stress‑reduction protocols. She seeks
    certification in Advanced Threat Assessment and plans to develop a mentorship program for new protective‑service personnel. Long‑term, she hopes to author a guide on balancing rigorous security procedures
    with staff well‑being, leaving a legacy of heightened safety and reduced workplace stress in her department.
