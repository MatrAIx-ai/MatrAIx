  career_goals: Although retired from formal employment, Kelly remains driven to make a lasting impact in her community. She aims to establish a weekly art‑therapy workshop at the local senior center, expand
    her role as a volunteer facilitator for mental‑health awareness programs, and complete a personal series of mixed‑media paintings that explore themes of memory and resilience. Over the next few years
    she hopes to serve on the board of the Jackson Community Arts Council, mentor emerging volunteers, and travel to at least three major art museums in the Northeast to deepen her artistic perspective.
