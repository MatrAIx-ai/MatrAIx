personas:
  professional: Juni Barrientes, a bilingual educational guidance specialist with a humanities background, crafts individualized career plans that blend market reality with students' passions, handles crisis
    counseling with calm poise, and is steering toward a district Director role while pursuing a master’s in school counseling.
  sports: Juni Barrientes enjoys weekend hikes on the gentle trails around Alabaster, supports the local Birmingham Barons baseball team, participates in a community walking club, and follows the Alabama
    Crimson Tide football season with casual enthusiasm.
  arts: Juni Barrientes quietly strums an acoustic guitar, improvising folk melodies inspired by Bob Dylan, Joni Mitchell, and Rodrigo y Gabriela, while devouring literary works from Octavio Paz, Gabriel
    García Márquez, and contemporary philosophy, and regularly engages in small‑group chess games that sharpen strategic thinking.
  travel: Juni Barrientes prefers low‑key road trips, having explored the historic streets of Oaxaca, the vineyards of Napa Valley, and the desert landscapes of Arizona, and plans future visits to the ancient
    ruins of Machu Picchu and the coastal towns of Portugal, balancing wanderlust with a modest travel budget and occasional family obligations.
  culinary: Juni Barrientes skillfully prepares family‑heritage dishes like mole with Mexican chocolate, tamales wrapped in corn husks, and crisp chilaquiles topped with fresh salsa verde, relishing the
    ritual of roasting dried chilies, grinding spices, and sharing the meals with close friends.
  core: Juni Barrientes blends a calm, relational counseling style with a love for solitary guitar sessions and heritage cooking, navigating life’s duties with flexible spontaneity and occasional disorganization
    while championing equity for first‑generation students.
background:
  cultural: Juni is a first‑generation Mexican American whose parents emigrated from Jalisco in the 1970s. Raised in a bilingual household, he grew up celebrating Día de los Muertos, Semana Santa, and other
    Mexican traditions while also embracing Southern hospitality and community life in Alabama. His Catholic upbringing emphasized respect, service, and the importance of family cohesion, which informs
    his collaborative and harmony‑seeking approach in counseling. Fluent in both Spanish and English, Juni acts as a cultural bridge for Hispanic families navigating the U.S. education system, often translating
    school communications and advocating for culturally relevant resources. He maintains close ties to the local Mexican community through church gatherings, cultural festivals, and a neighborhood cooking
    club, allowing him to keep his heritage vibrant while contributing to the multicultural fabric of Alabaster.
