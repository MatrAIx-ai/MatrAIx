    readiness'']'
  hobbies: '[''Reading Mexican literature and philosophy'', ''Cooking traditional Mexican dishes'', ''Playing acoustic guitar'', ''Hiking local nature trails'', ''Gardening with native herbs'', ''Volunteering
    for one‑on‑one youth guidance'', ''Participating in small‑group chess matches'', ''Watching documentary films on culture and history'']'
  career_goals: Juni aims to become the Director of Student Services for the Shelby County School District, where he can shape district‑wide counseling policies that prioritize equity and culturally responsive
    guidance. He plans to earn a Master’s degree in School Counseling within the next two years, focusing on research that supports Hispanic and first‑generation college‑bound students. In parallel, he
    hopes to launch a community‑based mentorship program that pairs local professionals with high‑school students, creating bilingual career‑exploration workshops and internship pipelines. Ultimately, Juni
    envisions authoring a handbook on integrating humanities‑based critical thinking into career planning, and presenting his findings at regional education conferences.
