  hobbies: '[''oil painting'', ''watercolor sketching'', ''digital illustration'', ''photography'', ''desert hiking'', ''succulent gardening'', ''reading speculative fiction and philosophy'', ''playing
    chess'', ''listening to jazz and classical music'', ''mindfulness meditation'']'
  career_goals: Louie's current ambition is to transform his artistic passions and caring nature into a meaningful part‑time role. He hopes to launch a series of low‑cost art workshops for seniors and fellow
    retirees in Phoenix, using his organizational skill to secure funding and venues. He also aims to compile his visual artwork and reflective essays into a self‑published book that explores the intersection
    of imagination, anxiety, and the desert landscape. By obtaining certification as a peer support specialist, Louie intends to offer informal counseling to individuals coping with anxiety, leveraging
    his empathy and experience. Ultimately, he envisions establishing a modest community art space that fosters creativity and mental well‑being.
