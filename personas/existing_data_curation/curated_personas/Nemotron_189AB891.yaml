personas:
  professional: A miniature architect in the making, Liyah Clayton stacks wooden blocks into kinetic sculptures, wielding their boundless imagination and critical eye to experiment with unconventional shapes,
    while they resist tidy cleanup and prefer solitary building sessions.
  sports: A lively playground explorer, Liyah Clayton dashes across the grass at the neighborhood park, cheering for the Chicago Cubs on a portable TV while they attend the 'Little Lions' toddler soccer
    class on Saturdays, preferring short bursts of sprinting over structured drills.
  arts: A tiny art aficionado, Liyah Clayton spends afternoons drawing wavy rainbow clouds inspired by Dr. Seuss, humming to Raffi's 'Baby Beluga' and imitating the playful gestures of the Sesame Street
    character Elmo, channeling their curiosity for abstract shapes into a solitary creative sanctuary.
  travel: A budding explorer, Liyah Clayton delights in family road trips to the Monterey Bay Aquarium and sunny beach days at nearby Santa Cruz, while they day‑dream about a future adventure to Disney
    World in Orlando, preferring short, parent‑guided outings over lengthy travel plans.
  culinary: A picky yet adventurous eater, Liyah Clayton adores creamy macaroni‑and‑cheese sprinkled with extra cheddar, dabs of honey on banana slices, and tiny peanut butter‑and‑jelly sandwiches, often
    insisting on using their small plastic fork while they stubbornly reject broccoli florets.
  core: A three‑year‑old imagination engine, Liyah Clayton builds block fortresses, hoards glitter stickers, negotiates nap times with fierce determination, and they find comfort in solitary play while
    occasionally challenging anyone to a peek‑a‑boo showdown.
background:
  cultural: Liyah is raised in Washington, DC, in a Black family that celebrates African‑American heritage through community events, museum visits, and cultural holidays such as Juneteenth and Kwanzaa.
    Her parents expose her to the stories, music, and art of the African‑American diaspora, often taking her to the National Museum of African American History and Culture. This environment nurtures her
    artistic interests and provides a sense of belonging and pride in her cultural roots.
attributes:
  skills: '[''basic language and storytelling'', ''color and shape recognition'', ''fine‑motor coordination for drawing and stacking'', ''simple puzzle solving'', ''pretend play'', ''basic physical coordination
