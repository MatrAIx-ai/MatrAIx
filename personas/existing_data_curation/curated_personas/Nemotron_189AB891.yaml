  hobbies: '[''finger painting'', ''crayon drawing'', ''building block towers'', ''listening to rhythmic music'', ''reading picture books'', ''pretend play with dolls or stuffed animals'', ''exploring nature
    in parks'']'
  career_goals: Although still very young, Liyah often says she wants to be a painter who makes big, colorful pictures that tell stories, and she imagines herself exploring faraway places like an astronaut.
    She shows a budding desire to be the best at drawing and to discover how things work, hinting at future ambitions in art, storytelling, or science.
