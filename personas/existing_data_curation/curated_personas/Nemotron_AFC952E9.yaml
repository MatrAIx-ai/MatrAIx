  career_goals: Through pretend play Malcolm imagines becoming a builder or engineer, constructing things with blocks and later real tools. He also loves music, often humming songs and pretending to play
    a guitar like his namesake, and expresses a wish to help friends and family, dreaming of being a 'helper' in his community when he grows up.
