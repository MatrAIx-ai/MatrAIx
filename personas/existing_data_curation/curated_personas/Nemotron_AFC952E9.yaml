personas:
  professional: Malcolm Young is a budding LEGO architect who meticulously plans building projects, balancing curiosity about new designs with practical building methods, and they insist on tidy, color‑coded
    bricks to meet high standards while happily sharing ideas with friends.
  sports: Malcolm Young is a lively member of the neighborhood’s mini soccer club, proudly wearing the bright red jersey of the local youth team, they cheer for the city’s professional baseball team, the
    Springfield Stingers, after games, and they love practicing obstacle courses at the community park.
  arts: Malcolm Young is an enthusiastic fan of Sesame Street and Disney’s Frozen, they love drawing Mickey Mouse with crayons, eagerly sing along to songs by the Disney Vocal Ensemble, and watch Pixar
    cartoon shorts while occasionally performing a makeshift dance for friends.
  travel: Malcolm Young enjoys family road trips to the nearby countryside farm, they have visited Disney World in Orlando and love the Magic Kingdom’s castle, and they dream of exploring the Eiffel Tower
    in Paris, preferring trips that combine playground time with ice‑cream stops.
  culinary: Malcolm Young prefers comfort foods like cheesy macaroni, chicken nuggets with ketchup, and strawberry‑banana smoothies; they can carefully stir pancake batter with a wooden spoon, and they
    love the crunch of fresh carrot sticks dipped in ranch dressing.
  core: Malcolm Young is a four‑year‑old organizer‑enthusiast who balances curiosity and practicality, thrives on group play, and applies high‑standard habits to tiny projects, saving coins, managing mild
    allergies, and dreaming big.
background:
  cultural: Malcolm grows up in a Black family in Grand Rapids, where African-American traditions such as church choir singing, family potlucks, and community celebrations are part of his weekly life. His
    parents share stories of their heritage, teach him about cultural holidays like Juneteenth and Kwanzaa, and blend these with Midwestern values of community involvement and friendliness.
attributes:
  skills: '["basic counting (1-20)", "letter recognition (A-J)", "fine-motor skills (cutting, drawing)", "building with interlocking blocks", "following daily routines", "organizing toys by category", "cooperative
