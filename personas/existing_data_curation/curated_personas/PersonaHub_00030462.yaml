persona_description: A scientist who studies the immune system and the mechanisms of DNA recognition, particularly in the context of cancer and autoimmunity. Specializes in the study of cGAS, a protein
  that plays a crucial role in the immune response. Works on understanding the evolutionary changes that allow human cGAS to distinguish between harmless DNA and foreign DNA, and how these changes affect
  the protein's ability to recognize and respond to DNA. Uses X-ray crystallography to visualize the molecular architecture of cGAS in action, revealing the precise molecular variations that allow it to
  selectively bind to long DNA, while ignoring short DNA. Publishes research in top-tier scientific journals and is a recognized expert in the field of immunology.
