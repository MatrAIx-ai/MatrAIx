personas:
  professional: Johanna Gravlin is an aspiring young visual storyteller who fills sketchbooks with watercolor scenes and builds imagined worlds with LEGO, channeling their curiosity and calm focus into
    a budding artistic practice that blends organization with imaginative freedom.
  sports: Johanna Gravlin is a budding soccer enthusiast who plays in the neighborhood league organized by Detroit Parks and Recreation, cheers for the Detroit Tigers during weekend games, practices jumping
    rope at home to stay fit, and approaches each match with their characteristic calm resilience.
  arts: Johanna Gravlin immerses themselves in art by sketching in the footsteps of the Diego Rivera murals at the Detroit Institute of Arts, enjoys listening to Motown classics like Stevie Wonder alongside
    whimsical scores from Disney, and spends afternoons crafting watercolor collages inspired by the city’s vibrant street art.
  travel: Johanna Gravlin loves family road trips that blend discovery and comfort, having explored the historic Henry Ford Museum and the shoreline of Mackinac Island, while dreaming of visiting the National
    Museum of Natural History in Washington, D.C., and the towering cliffs of Grand Canyon National Park, where they hope to marvel at the vast landscapes.
  culinary: Johanna Gravlin delights in creating snack plates of apple slices, cheddar cubes, and homemade mini pizza with fresh basil, relishes the creamy tang of mac and cheese, and occasionally experiments
    with making watermelon ribbons for a splash of summer color that they love to share with friends.
  core: Johanna Gravlin is a serene seven‑year‑old who balances meticulous sketching and LEGO world‑building with a gentle curiosity, a habit of stashing coins in their piggy bank, and occasional forgetfulness
    about bedtime routines.
background:
  cultural: Johanna is a white, Midwestern American child raised in Detroit, Michigan. Her family values community, education, and artistic expression, often taking her to local cultural institutions like
    the Detroit Institute of Arts and neighborhood festivals. The city’s rich musical heritage, street art, and history of innovation influence her curiosity and appreciation for diverse creative experiences,
    while the close‑knit neighborhood ties foster a sense of belonging and cooperation.
