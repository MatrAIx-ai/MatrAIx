  career_goals: Johanna dreams of creating things that bring joy to others. She imagines becoming an artist who paints murals in her neighborhood, a scientist who invents simple machines to help family
    and friends, or a storyteller who writes illustrated books. Her calm confidence drives her to explore many fields, aiming to combine creativity with problem‑solving to make a positive impact on her
    community.
