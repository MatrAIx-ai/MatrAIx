  career_goals: Approaching retirement, Louis aims to shift into a supervisory and safety‑focused role on construction sites. He plans to earn an OSHA 30‑hour certification and a journeyman carpenter credential,
    which will enable him to serve as a foreman or site safety officer. He also hopes to launch a small home‑repair business serving Holton and neighboring towns, allowing him to work on modest renovation
    projects while mentoring younger tradespeople. Maintaining his health and managing anxiety are central to his long‑term goal of a steady, low‑stress work life before fully retiring.
