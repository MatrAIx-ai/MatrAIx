personas:
  professional: Louis Moore, a veteran construction laborer on the verge of retirement, leverages four decades of concrete finishing, framing, and heavy‑equipment operation with their methodical, organized
    nature to coordinate crews, enforce OSHA safety standards, and mentor apprentices as they prepare for a foreman and site‑safety officer role.
  sports: Louis Moore, a dedicated fan of the Kansas City Chiefs and the Kansas City Royals, spends Saturdays cheering at Holton high‑school football games, participates in the senior‑center walking club
    after church, and keeps fit with light weight‑lifting and occasional fishing trips that double as cardio, a routine they follow to stay active.
  arts: Louis Moore, who finds solace in the storytelling of Johnny Cash, the brushwork of Grant Wood, and community theater productions of classic Americana plays, often brings homemade apple pie to local
    performances and collects vintage vinyl records of 1960s folk singers, a habit they cherish during quiet evenings.
  travel: Louis Moore, who prefers meticulously planned road trips over spontaneous getaways, has driven the historic Route 66 to the Grand Canyon, frequents the Kansas State Fair and the Iowa State Fair,
    and dreams of a leisurely river cruise along the Danube in Europe, a bucket‑list adventure they hope to accomplish soon.
  culinary: Louis Moore, an adept home cook who thrives in their backyard garden, regularly prepares hearty beef and vegetable stew with fresh tomatoes, corn, and garden beans, pairs it with homemade cornbread,
    and indulges in fish‑and‑chips made from their catch at Perry Lake.
  core: Louis Moore, a methodical yet emotionally intense handyman, balances a love for community service and DIY projects with bouts of anxiety that drive both their meticulous planning and the way they
    over‑check every nail and ledger entry.
background:
  cultural: Louis was raised in a Midwestern, white, rural community in Kansas where farming and small‑town values shaped his worldview. He grew up steeped in Protestant (Methodist) traditions, emphasizing
    hard work, self‑reliance, and community service. Family gatherings, church potlucks, and local fairs are central to his cultural identity. He respects the region’s agricultural heritage, celebrates
    American holidays with a modest, neighborly flair, and upholds the principle of helping neighbors, a trait reflected in his volunteer work and collaborative nature.
