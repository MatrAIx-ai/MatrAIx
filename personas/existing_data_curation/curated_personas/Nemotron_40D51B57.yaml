  hobbies: '[''Woodworking'', ''Photography'', ''Reading (history, art, science)'', ''Gardening'', ''Hiking'', ''Bridge (card game)'', ''Visiting Art Museums'', ''Genealogy'', ''Cooking'', ''Community Volunteering'']'
  career_goals: Now retired, Garnell aims to give back by volunteering as a mentor for young craftsmen at the local community college and offering workshops through the town’s historical society. He aspires
    to document Windsor’s architectural heritage in a photo‑essay book, combine his love for art and history. Additionally, he plans to complete a memoir that weaves together his life experiences, family
    genealogy, and reflections on the evolving art scene, while maintaining his health and staying active in community initiatives.
