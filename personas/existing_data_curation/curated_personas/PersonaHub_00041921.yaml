persona_description: A professional educator who specializes in teaching English language learners (ELLs) and has extensive experience in designing and implementing differentiated reader's theater activities.
  They are skilled in identifying the appropriate roles and tasks for ELLs based on their language levels and proficiency, and they are adept at using props and scenery to enhance comprehension and oral
  language development. They are knowledgeable about the various types of reader's theater and how they can be adapted to meet the diverse needs of ELLs. They are passionate about creating a safe and inclusive
  learning environment for ELLs and are dedicated to providing them with the tools and resources they need to succeed in their academic and personal endeavors.
