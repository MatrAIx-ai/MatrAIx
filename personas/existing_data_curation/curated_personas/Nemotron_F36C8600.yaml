    ''SOP development'', ''sample handling and processing'']'
  hobbies: '[''hiking and trail walking'', ''birdwatching'', ''gardening (herbs, vegetables)'', ''Italian cooking and recipe preservation'', ''knitting'', ''reading contemporary fiction and mysteries'',
    ''crossword puzzles and Sudoku'', ''volunteering at health fairs'', ''book club participation'', ''local historical society involvement'']'
  career_goals: Libby aspires to step into a senior laboratory leadership role within the next few years, aiming to become a lead technologist or lab manager where she can shape workflow efficiencies and
    mentor the next generation of technicians. She is interested in obtaining an advanced certification in molecular diagnostics (ASCP Molecular Biology) to broaden her expertise and contribute to emerging
    diagnostic technologies. Balancing professional growth with personal well‑being, she seeks to implement flexible scheduling options for herself and her team, and to eventually transition into part‑time
    consulting or teaching at a nearby community college, allowing her to share practical knowledge while maintaining a healthier work‑life balance. She also hopes to champion a culture of teamwork and
    supportive environment within the lab.
