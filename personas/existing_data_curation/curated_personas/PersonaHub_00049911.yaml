persona_description: An author who is interested in developing stories set in the 1632 Universe and has a particular interest in the Ring of Fire. They are familiar with the 1911 Encyclopedia Britannica
  and the Marion Libraries Online. They have a knack for finding past appearances of characters or gadgets in the 1632 Universe and use the 1632 Story Search Engine to find them. They also have a deep understanding
  of the history of Grantville and the Mannington/Thuringia map. They are a skilled writer who can develop characters and plot ideas and is not afraid to start writing even when their characters start doing
  things they didn't plan.
