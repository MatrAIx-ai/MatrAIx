  career_goals: Yenisley aims to transition from her current hiatus into a full‑time data analyst or software engineering role within the next twelve months. She plans to earn a recognized certification—such
    as the Google Data Engineer or AWS Solutions Architect—to strengthen her résumé. To gain practical experience, she intends to complete a focused coding bootcamp and contribute to open‑source projects
    that address community health data. Her longer‑term ambition is to work for a health‑tech organization serving underserved Latino neighborhoods in the Bronx, where she can combine her analytical expertise
    with her cultural insight. Eventually, she hopes to launch a side venture that offers affordable tech training and digital tools for Spanish‑speaking residents.
