personas:
  professional: Kendra Hollis, a retired civil engineer who spent three decades designing municipal infrastructure, now channels her statistical modeling, GIS expertise, and meticulous budgeting skills
    into coordinating community STEM outreach programs, leading workshops on home maintenance, and they mentor high‑school students, all while they communicate technical concepts with clear, respectful
    assertiveness.
  sports: Kendra Hollis, a dedicated member of the San Clemente Shorewalkers club, enjoys low‑impact fitness through sunrise walks along the Pacific, roots for the Los Angeles Dodgers and supports the LA
    Women’s Volleyball League, and they balance their weekly bridge games with occasional water aerobics classes designed for seniors.
  arts: Kendra Hollis blends her love for storytelling and music by volunteering in the local library’s literacy program, reading biographies of pioneering figures, participating in their church’s gospel‑infused
    choir rehearsals, and they attend monthly performances at the San Clemente Art Center featuring jazz pianist Diana Krall and playwrights like August Wilson.
  travel: Kendra Hollis prefers structured travel itineraries, having explored California’s redwood forests, the historic streets of Savannah for its Southern culinary scene, and a recent pilgrimage to
    the National Women’s History Museum in Washington, D.C., while they are planning a future road trip along the Pacific Coast Highway to visit community garden projects in Oregon.
  culinary: Kendra Hollis experiments with Southern‑inspired comfort dishes such as shrimp and grits with locally sourced heirloom tomatoes and avocado, collard greens sautéed with fresh garlic, and sweet
    potato pie spiced with cinnamon, often sourcing organic produce at the San Clemente farmers market and they occasionally forget to label leftovers in the fridge.
  core: Kendra Hollis is a methodical, community‑focused retiree whose engineering mindset shapes their garden, finances, health routine, and volunteer work, and they cherish Southern comfort food, shoreline
    walks, and structured social gatherings.
background:
  cultural: Kendra was raised in a close‑knit African‑American family that emphasized education, community service, and cultural pride. Her parents were active participants in the civil‑rights movement
    of the 1960s, instilling in her a strong sense of social responsibility. She earned her STEM degree at a historically Black university, where she forged lifelong friendships and developed a deep appreciation
    for Black intellectual traditions. Now living in San Clemente, she blends her Southern heritage with the multicultural tapestry of Southern California, regularly attending local Juneteenth celebrations,
    supporting Black-owned businesses, and mentoring youth through programs that celebrate both scientific inquiry and cultural identity.
attributes:
  skills: '[''Statistical modeling'', ''Technical drawing interpretation'', ''Project management'', ''Budgeting and financial planning'', ''Microsoft Office and Excel'', ''GIS mapping'', ''Python scripting
    for data analysis'', ''Community program coordination'', ''STEM mentoring'', ''Workshop facilitation'']'
  hobbies: '[''Native‑plant gardening'', ''Beach walking'', ''Reading historical biographies'', ''Cooking Southern‑inspired dishes'', ''Volunteer literacy tutoring'', ''Bridge club'', ''Gentle senior yoga'',
    ''Church choir participation'']'
  career_goals: Although officially retired, Kendra aims to leave a lasting legacy by expanding STEM outreach in her neighborhood, especially for girls and underrepresented youth. She hopes to author a
    memoir that weaves together her experiences as a Black woman in engineering during the civil‑rights era with practical advice for navigating career transitions later in life. Additionally, she aspires
    to serve on the board of a local environmental nonprofit, contributing her project‑management expertise to promote sustainable community gardens and coastal preservation initiatives.
