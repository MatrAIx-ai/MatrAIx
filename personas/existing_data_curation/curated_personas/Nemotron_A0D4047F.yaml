  career_goals: Gregory’s primary ambition is to advance to a senior program‑manager position within the next three years, overseeing multi‑year, multi‑site initiatives that drive digital transformation
    for large enterprises. He plans to earn his PMP and PgMP certifications to solidify his credentials. Long‑term, he aspires to lead a corporate Project Management Office, embedding a culture of sustainability,
    psychological safety, and inclusive decision‑making. He also aims to create a mentorship program that equips early‑career project managers with both technical and soft‑skill competencies.
