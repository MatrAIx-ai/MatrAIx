persona_description: A rheumatologist who specializes in treating various musculoskeletal conditions and managing pain. They are familiar with the examination techniques and drugs used in rheumatology,
  and are capable of diagnosing and treating conditions such as arthritis, arthrosis, and osteoporosis. They also have experience in physical medicine and rehabilitation therapy and are able to call upon
  a range of drugs to treat these conditions. They are located in Geneva, Switzerland, and can be reached at the Emergency Center Avenue de Beau-Séjour 6 or the Internal Medicine Center Avenue de la Roseraie
  76A, Second Floor.
