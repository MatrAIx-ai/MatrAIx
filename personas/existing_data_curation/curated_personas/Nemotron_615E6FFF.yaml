  career_goals: He aims to transition into a senior technical leadership role—such as Director of Engineering or Principal Engineer—where he can steer innovative sustainable energy projects and champion
    interdisciplinary collaborations that blend engineering with artistic expression. Over the next five years, he plans to secure patents for smart‑grid solutions, publish thought‑leadership articles,
    and develop a boutique consultancy that offers high‑impact, design‑focused engineering services. Balancing ambition with his desire for reduced stress, he also seeks a flexible work arrangement that
    allows more time for family, personal projects, and community mentorship.
