personas:
  professional: A licensed electrician named Elizabeth Holmes combines rigorous code compliance with an artist’s eye, designing bespoke LED installations for Columbus homes while juggling a restless curiosity
    that sometimes makes them miss project deadlines, yet their knack for translating client visions into illuminated realities earns them a reputation for collaborative problem‑solving.
  sports: A weekend‑active electrician named Elizabeth Holmes follows the Columbus Blue Jackets and the Cleveland Browns with casual enthusiasm, participates in a local rock‑climbing club and hikes the
    Scioto Mile trails, while they often schedule spontaneous early‑morning runs that clash with work deadlines, reflecting a love for movement tempered by a tendency toward over‑commitment.
  arts: An art‑exploring electrician named Elizabeth Holmes spends Saturday afternoons at contemporary galleries featuring artists like Yayoi Kusama and Olafur Eliasson, while they capture street murals
    by Banksy on their phone, and their eclectic playlist includes Tame Impala and experimental jazz duo BadBadNotGood, weaving these influences into their custom lighting designs.
  travel: A curiosity‑driven electrician named Elizabeth Holmes dreams of traveling from the Ohio River’s scenic parks to Kyoto’s bamboo groves, already trekked the Red River Gorge and planned a future
    eco‑tour of Iceland’s geothermal sites, yet they often postpone trips due to work deadlines and the pull of spontaneous weekend hikes close to home.
  culinary: A culinary‑adventurous electrician named Elizabeth Holmes whips up eclectic dishes like shakshuka with feta, kimchi‑fried rice, and matcha‑infused panna cotta, favoring ingredients such as sumac,
    smoked paprika, and fresh basil, while they habitually experiment with LED‑controlled sous‑vide rigs in their kitchen, even if the occasional over‑cooked batch adds a playful reminder of their experimental
    side.
  core: A 30‑year‑old electrician‑artist named Elizabeth Holmes fuses light, code, and creativity into every project, while juggling spontaneous ideas, occasional disorganization, and a gentle habit of
    worrying about the next deadline.
background:
  cultural: Elizabeth grew up in a middle‑class white family in the Midwest, where a strong work ethic and community values were emphasized. Her upbringing in Ohio blended industrial practicality with a
    growing appreciation for regional arts, such as folk music festivals and local theater. Family gatherings often featured discussions about craftsmanship, reflecting influences from both traditional
    European heritage and the pragmatic American spirit. This cultural mix instilled in her a respect for cooperation, modesty, and the belief that technical skill can coexist with creative expression.
