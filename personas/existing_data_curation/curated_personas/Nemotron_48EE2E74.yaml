  career_goals: Elizabeth aims to attain Master Electrician status within the next two years and earn a certification in renewable energy installation. She dreams of launching her own contracting business
    that specializes in sustainable electrical solutions and artistic lighting projects for homes and boutique commercial spaces in Columbus. Mentorship is also a priority; she plans to lead apprenticeship
    workshops to share her unconventional problem‑solving methods with the next generation of electricians. Balancing her professional aspirations with family life, she seeks flexible scheduling that allows
    for spontaneous creative projects and quality time with her spouse.
