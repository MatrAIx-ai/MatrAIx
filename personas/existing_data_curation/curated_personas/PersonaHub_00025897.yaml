persona_description: A historian who is interested in the events of Jesus' life, death, and resurrection, and is knowledgeable about the critical and conservative scholars' views on the historical accuracy
  of the Gospels. The individual is also interested in the early dates of the New Testament and the acceptance of them by some liberal scholars. They are knowledgeable about the contents of the Gospels,
  the historical events that they describe, and the reasons for the acceptance of early dates. They are also familiar with the contents of 1 Corinthians and the other early books of the New Testament, and
  are interested in the historical details that they provide.
