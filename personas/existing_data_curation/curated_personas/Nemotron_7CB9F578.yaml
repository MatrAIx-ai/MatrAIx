personas:
  professional: Rene Smith, a two-year-old with an early love for routine, treats every playtime as a mini-project, organizing toy blocks into neat rows and proudly announcing their 'job' of building a
    farmer's barn to anyone who watches, and they relish the predictability of the tidy setup.
  sports: Rene Smith, a two-year-old energetic explorer, loves sprinting across the family ranch's open fields, cheering loudly at the local high school football games, and participates in the community's
    'Tiny Cowboys' riding class where they practice balancing on a pony.
  arts: Rene Smith, an enthusiastic fan of classic Western cartoons, spends afternoons humming the cowboy lullabies from Mickey's Western Adventure and passionately finger-painting scenes of the Snake River,
    they often mimic the bold brushstrokes of famed painter Frederic Remington in their crayon art.
  travel: Rene Smith, an adventurous two-year-old, delights in family road trips to Yellowstone's geysers, weekend camping by the Snake River where they collect smooth stones, and day-long visits to the
    nearby rodeo, always clutching a soft bear for comfort.
  culinary: Rene Smith, a picky yet curious eater, adores buttery macaroni-and-cheese, chicken nuggets, sliced apples with caramel dip, and delights in helping stir the warm honey-glazed carrots that their
    mom prepares after a day of fishing, and they sometimes insist on scooping extra cheese before any vegetables.
  core: Rene Smith, a toddler who blends barnyard imagination with a love for order, they hoard pennies, battle minor eczema, dart across fields, sing cowboy tunes, and dream of big-river adventures, all
    while clutching a beloved teddy.
background:
  cultural: Rene is a White American toddler raised in Afton, Wyoming, a small town with deep roots in ranching, outdoor recreation, and Western frontier heritage. His family values self‑reliance, close
    community ties, and a connection to nature, often attending local church services and community events. He grows up surrounded by the Snake River scenery, with frequent family outings that include fishing,
    hiking, and weekend visits to nearby rodeos. Media in the household includes classic Western cartoons and family‑friendly nature programs, all of which shape his emerging sense of identity and aspirations.
attributes:
  skills: '["Walking and running", "Climbing low structures", "Pedaling a tricycle", "Simple sentence construction", "Following basic directions", "Block stacking and shape sorting", "Early puzzle solving",
    "Sharing and turn‑taking in group play", "Routine following", "Basic self‑care (hand washing)"]'
  hobbies: '["Outdoor exploration", "Collecting natural items (pine cones, rocks)", "Building with wooden blocks", "Drawing with crayons", "Reading picture books", "Playing with animal figurines", "Tricycle
    riding", "Simple group games at the park", "Listening to storytime", "Imitating ranch activities"]'
  career_goals: Rene is fascinated by the wide‑open landscapes and wildlife of Wyoming. He frequently points to deer, horses, and fire trucks, expressing a budding wish to become a park ranger, firefighter,
    or a helpful cowboy who cares for animals and protects the land. He loves joining his parents during ranch chores and imagines himself as a "helper" who follows orderly steps, showing an early ambition
    toward practical, hands‑on roles that serve the community and allow him to work outdoors.
