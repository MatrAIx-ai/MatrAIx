  to create coordinated, accurate digital models of transportation infrastructure projects early in the design process and is looking for ways to use the software to make last-minute changes and incorporate
  new design work into existing plans. The engineer is also interested in using the software to evaluate the accuracy of 2D plans and to create a higher-quality design.
