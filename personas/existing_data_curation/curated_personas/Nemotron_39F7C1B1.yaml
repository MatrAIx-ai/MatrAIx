  career_goals: Looking ahead, Aaron aspires to a career that blends his love for creativity with his desire for independent, flexible work. He envisions becoming an artist or illustrator who can work solo,
    a designer or architect who crafts unconventional structures, or a research scientist focused on experimental problem solving. He aims for a professional environment that values solitary focus, critical
    thinking, and the freedom to explore unconventional ideas without rigid schedules.
