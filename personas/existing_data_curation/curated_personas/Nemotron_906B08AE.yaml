personas:
  professional: Tara Bourgeois is a self‑taught visual storyteller who leverages their knack for troubleshooting computers, free‑software photo editing, and indie‑music‑inspired sketching to freelance on
    short‑form video projects for local cafés, all while chasing a GED and a community‑college certificate in graphic design with a competitive drive that keeps them a step ahead of peers.
  sports: Tara Bourgeois cycles with the River Riders club along the Connecticut River, roots for the Hartford Yard Goats minor‑league baseball team, and joins a weekend trail‑running group at the local
    high school, preferring low‑key endurance activities that let them clear their mind without rigid schedules.
  arts: Tara Bourgeois curates indie playlists featuring Phoebe Bridgers and Tame Impala while sketching in a battered notebook, frequently attends open‑mic nights at the downtown coffee house, devours
    graphic novels like 'Saga' and 'Persepolis', and draws creative inspiration from artists such as Marjane Satrapi and Hayao Miyazaki to fuel their TikTok content.
  travel: Tara Bourgeois favors spontaneous, budget‑friendly road trips, having explored Portland, Maine’s food trucks, Boston’s historic Freedom Trail, and a weekend hike in the White Mountains, while
    dreaming of a backpacking adventure through the Scottish Highlands and an Instagram‑ready street‑art tour of Berlin.
  culinary: Tara Bourgeois experiments with quick‑cook dishes like spicy sriracha stir‑fried ramen, avocado toast topped with smoked salmon, and banana‑oat pancakes, favoring fresh herbs, hot sauce, and
    farm‑fresh eggs, and showcases the results on TikTok with a casual, DIY aesthetic.
  core: Tara Bourgeois is a creatively restless teen who juggles freelance video gigs, spontaneous bike rides, and late‑night TikTok cooking experiments, all while regularly misplacing their sketchbook
    and sprinting to meet deadlines only when the pressure feels like a challenge.
background:
  cultural: Tara grew up in East Hartford, a modest, working‑class suburb of Hartford, Connecticut. Her family's roots trace back to French‑Canadian immigrants, and she was raised with a blend of New England
    small‑town values and subtle Francophone traditions, such as bilingual family gatherings and occasional celebrations of Catholic holidays. The community's emphasis on self‑reliance, seasonal outdoor
    activities, and local artisanal markets has shaped her practical outlook and curiosity about diverse crafts.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Digital photography'', ''Photo editing with GIMP/Photoshop'', ''Social media content creation'', ''Creative writing for blogs'', ''DIY home repairs'', ''Simple
    cooking and meal planning'', ''Audio mixing for gaming streams'']'
  hobbies: '[''Sketching and doodling'', ''Digital photography'', ''Bike riding on local trails'', ''Cooking experimental dishes'', ''Listening to indie/alternative music'', ''Casual video gaming'', ''Creating
    short TikTok videos'', ''Reading graphic novels'']'
  career_goals: Tara wants to earn a GED within the next year and then enroll in a community college program that offers certificates in graphic design or video production. She aims to combine her love
    for visual storytelling and practical problem‑solving by working as a freelance content creator for local businesses, eventually building a portfolio that could lead to a full‑time role in multimedia
    design or a junior position in a tech‑support team. She also keeps an open option to pursue a trade apprenticeship in carpentry, valuing the hands‑on, competitive environment it offers.
