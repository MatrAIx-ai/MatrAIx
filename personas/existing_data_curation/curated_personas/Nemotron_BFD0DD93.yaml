personas:
  professional: Miguel Campos works as a quality‑control inspector in a manufacturing plant, leveraging their precision with measuring instruments, Excel‑based statistical analysis, and bilingual communication
    to uphold product standards, while their curiosity and methodical nature fuel continuous process improvements and readiness for supervisory roles.
  sports: Miguel Campos plays in a local Saturday soccer league, cheers for Inter Miami CF and follows FC Barcelona, and also keeps fit by dancing salsa at gatherings, joining a community dance class, and
    occasionally hitting the beach volleyball courts with friends, all while they relish the camaraderie of team sports.
  arts: Miguel Campos immerses themselves in Miami’s vibrant art scene, snapping photos of Wynwood murals, attending contemporary openings featuring artists like Kara Walker and local graffiti collectives,
    and dancing to live Latin music by performers such as Bad Bunny and Carlos Vives, while they often discuss the visual storytelling with fellow enthusiasts.
  travel: Miguel Campos prefers weekend getaways that blend cultural immersion and budget‑friendly planning, often exploring nearby Caribbean islands like the Bahamas, dreaming of a fall trip to Barcelona’s
    street art districts, and using a mix of flight‑deal alerts and spontaneous road‑trip spontaneity, while they carefully track expenses in a travel budget spreadsheet.
  culinary: Miguel Campos enjoys cooking traditional dishes like bandeja paisa and arepas, experimenting with fusion twists such as taco‑filled arepas, sourcing fresh herbs and plantains at local Latin
    markets, and occasionally treating friends to homemade feasts while they still order takeout after late‑night study sessions.
  core: Miguel Campos is a detail‑oriented quality‑control professional who balances an analytical career with a passion for urban photography, soccer, salsa, and culinary experiments, often juggling disciplined
    study schedules with spontaneous creative bursts, and they rarely miss a chance to improve a process.
background:
  cultural: Miguel was born to Colombian immigrant parents and grew up in the multicultural neighborhoods of Miami. He is fluent in both Spanish and English and maintains strong ties to Colombian traditions,
    celebrating holidays such as Carnaval de Barranquilla and Día de la Independencia with family gatherings, music, and food. The rhythmic sounds of cumbia, vallenato, and salsa shape his musical tastes,
    while Colombian literature and the work of artists like Fernando Botero influence his appreciation for visual arts. Living in Miami exposes him to a blend of Caribbean, Latin American, and North-American
    cultures, fostering an open-minded outlook and a comfort with diverse perspectives. This bicultural upbringing informs his collaborative work style, his hospitality in social settings, and his pride
    in representing Colombian heritage within the broader Miami community.
attributes:
  skills: '[''Precision measurement operation'', ''Sampling and sorting techniques'', ''Data entry and Excel analysis'', ''Statistical process control basics'', ''Bilingual communication (Spanish/English)'',
