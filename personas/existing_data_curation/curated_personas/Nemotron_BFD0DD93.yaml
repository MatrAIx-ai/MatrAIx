  hobbies: '[''Exploring street art and galleries'', ''Photography'', ''Cooking Colombian cuisine'', ''Playing soccer'', ''Salsa dancing'', ''Listening to Latin and world music'', ''Reading about technology
    and design'', ''Attending cultural festivals'', ''Volunteering at community events'', ''Hiking in the Everglades'']'
  career_goals: Miguel aims to deepen his technical expertise and move into supervisory roles within quality assurance. Over the next three years, he plans to enroll in an associate's program in industrial
    technology at a local community college, earn a Certified Quality Auditor (CQA) credential, and take on lead inspector responsibilities. He aspires to become a quality assurance supervisor, guiding
    a team of inspectors, implementing process-improvement initiatives, and leveraging data-driven methods to enhance product consistency. Long-term, Miguel envisions pursuing a bachelor's degree in industrial
    engineering or supply chain management, positioning himself for a future role as a process engineer or quality manager in a multinational firm that values both operational excellence and cultural diversity.
