persona_description: A scientist with expertise in the use of dispersants and their effects on marine wildlife, particularly seabirds and fish. They have conducted research on the impacts of oil spills
  and dispersants, and have experience in the use of chemical dispersants in the Arctic. They are interested in the state-of-science regarding the use of dispersants in the Arctic and the potential risks
  and benefits of their use. They have expertise in the study of group theory and are interested in the use of this knowledge to inform decisions regarding the use of dispersants in the Arctic.
