personas:
  professional: Grace Leon is a budding young coder who creates simple games in Python and JavaScript, blending a love for science‑fiction storytelling with a practical, organized approach to debugging,
    while preferring solitary, focused work sessions over collaborative projects.
  sports: Grace Leon enjoys solitary jogs through the nearby park on weekends, participates in the local community center’s after‑school swimming club, and avidly follows the Chicago Cubs baseball team,
    while treating competitive chess as a mental sport to satisfy their competitive streak.
  arts: Grace Leon is a digital sketch artist who creates sci‑fi inspired landscapes using Procreate, curates a personal Instagram feed featuring their work alongside atmospheric soundtracks by Hans Zimmer
    and Vangelis, and draws inspiration from Ansel Adams' black‑and‑white photography for their architectural shots.
  travel: Grace Leon prefers low‑key, nature‑focused trips, often exploring nearby state parks such as Shenandoah National Park with family, dreams of visiting the misty highlands of Scotland to photograph
    medieval castles, and meticulously plans itineraries on a spreadsheet to avoid unexpected stress.
  culinary: Grace Leon favors comfort foods like pepperoni pizza and creamy mac & cheese, experiments with simple ramen broth using miso paste and green onions, and delights in snapping photos of dishes
    that feature bright red tomatoes or glossy chocolate ganache.
  core: Grace Leon is a quietly ambitious 13‑year‑old who channels sci‑fi curiosity into coding, sketching, and solitary nature walks, yet often battles worry‑induced procrastination and a competitive edge
    that makes them both meticulous and impatient.
background:
  cultural: Grace comes from a middle-class, white New England family in Warwick, Rhode Island. Her upbringing reflects the region’s emphasis on education, community involvement, and self-reliance. She
    observes local traditions such as celebrating Independence Day with fireworks, attending town fairs, and values the pragmatic outlook common in the Northeastern United States. Her family’s European
    ancestry (primarily Irish and English) informs holidays like St. Patrick’s Day and a seasonal appreciation for the coastal environment.
