  career_goals: Jenny aims to pursue a Bachelor’s degree in Business Administration with a concentration in Project Management at a university in the Northeast. She envisions starting her career as an intern
    in a corporate events or marketing department, where she can apply her organizational talents and competitive drive. Long‑term, she aspires to become a certified Project Management Professional (PMP)
    and eventually launch her own event‑planning consultancy that specializes in community‑focused festivals and youth programs in Philadelphia. She also hopes to develop a side business offering budgeting
    workshops for fellow students, blending her practical skills with a desire to help others succeed.
