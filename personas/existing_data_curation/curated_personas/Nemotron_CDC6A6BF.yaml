personas:
  professional: Jenny Oswalt, a senior student council secretary and varsity soccer captain, channels her love for structure, persuasive debating, and Excel‑based budgeting into orchestrating school events,
    managing schedules with military‑precision, and drafting a roadmap for a future project‑management internship in corporate events.
  sports: Jenny Oswalt, a competitive midfielder on her high‑school varsity soccer team, follows the Philadelphia Union and Eagles with fervor, trains with a local weekend club for extra tactical drills,
    and mixes intense cardio workouts with leisurely pick‑up games to stay fit.
  arts: Jenny Oswalt, an avid street photographer inspired by Henri Cartier‑Bresson and local muralist W. Grey, spends weekends roaming the eclectic neighborhoods of Philadelphia snapping candid moments,
    curates a small Instagram feed using Canva‑designed layouts, and unwinds listening to indie folk artists like Fleet Foxes and Phoebe Bridgers.
  travel: Jenny Oswalt, a budget‑conscious explorer, plans meticulous day‑trips to nearby New York City museums and Washington, D.C.’s historical sites, dreams of a weekend hike in the Pocono Mountains,
    and prefers structured itineraries over spontaneous backpacking, all while balancing school commitments.
  culinary: Jenny Oswalt, an experimental home‑cook, perfects quinoa bowls with roasted vegetables, reheats classic Philly cheesesteak for comfort, and plates Instagram‑worthy avocado toast, using a reliable
    set of staples—olive oil, garlic, and fresh herbs—while documenting recipes in her journal.
  core: Jenny Oswalt blends a compulsive need for order with a competitive spark, juggling secretarial duties, soccer leadership, and meticulous budgeting, yet occasionally lets spontaneity seep in through
    late‑night photo shoots and impulsive concert tickets.
background:
  cultural: Jenny was raised in a middle‑class white family in Philadelphia, Pennsylvania. Her grandparents emigrated from Germany and Ireland, and family traditions emphasize punctuality, self‑reliance,
    and hard work. Growing up in a culturally diverse city exposed her to a wide range of perspectives, fostering both an appreciation for community and a healthy dose of skepticism about people’s motives.
    Her upbringing blends East Coast urban values—pragmatism, independence, and competitiveness—with the heritage of European immigrant roots, shaping her practical outlook and competitive drive.
