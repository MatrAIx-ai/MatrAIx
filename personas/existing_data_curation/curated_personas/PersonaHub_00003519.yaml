persona_description: A scientist who specializes in environmental science, particularly in the study of biodiversity conservation and sustainable development. They have a deep understanding of the challenges
  faced by tropical countries in meeting international environmental goals, and are committed to finding effective solutions to address these challenges. They are knowledgeable about the impacts of land
  conversion and expansion on biodiversity and the need for robust land-use planning, as well as the importance of conservation priorities and the establishment of new protected areas. They are also aware
  of the urgent need for more effective sustainability standards and policies to address the production and consumption of tropical commodities, including robust land-use planning. They are passionate about
  the need to reduce or eliminate incentives for land-demanding bio-energy feed stocks and are dedicated to creating a campaign against food waste to lessen the pressure on land as yet unused for agriculture.
