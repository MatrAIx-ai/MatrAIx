  hobbies: '[''woodworking'', ''classic car restoration'', ''fishing'', ''reading construction industry publications'', ''listening to blues and jazz'', ''small‑group community volunteering (Habitat for
    Humanity)'']'
  career_goals: Johnson aims to earn the Certified Construction Manager (CCM) credential within the next two years, and to expand his responsibilities from managing single‑site projects to overseeing multiple
    sites across South Texas. He envisions launching his own contracting firm that specializes in energy‑efficient residential builds, while also mentoring younger tradespeople from underrepresented backgrounds.
    Ultimately, he wants to be recognized as a leading builder who combines innovative, eco‑friendly practices with the reliability of proven construction methods.
