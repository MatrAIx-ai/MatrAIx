personas:
  professional: Johnson Stafford, a senior construction project manager with over 15 years of residential and commercial experience, leverages his meticulous scheduling, cost estimating, and Procore expertise
    while they skeptical, competitive nature drives them to rigorously vet subcontractors and push sustainable building innovations.
  sports: Johnson Stafford follows the Dallas Cowboys and Houston Astros passionately, plays pickup basketball twice a month at a community center, and belongs to the Laredo Bass Fishing Club where they
    compete in spring tournaments along the Rio Grande.
  arts: Johnson Stafford unwinds at a South Main blues‑and‑jazz lounge, soaking live sets covering B.B. King, John Coltrane, and Stevie Ray Vaughan, and curates a modest vintage‑LP collection that inspires
    their woodworking designs, reflecting their appreciation for soulful improvisation.
  travel: Johnson Stafford prefers road‑trip itineraries that blend work and leisure, using their 1965 Chevrolet to explore Santa Fe’s adobe architecture, Portland’s green‑building tours, and weekend fishing
    charters to northern Mexico, all booked off‑season to keep costs low.
  culinary: Johnson Stafford enjoys cooking Texas‑style brisket with a dry rub of cumin, smoked paprika, and brown sugar, pairing it with homemade cornbread and pickled jalapeños, and occasionally dines
    at their favorite local BBQ joint, Smokehouse 44, while sipping a craft IPA on the patio.
  core: Johnson Stafford is a disciplined, curiosity‑driven builder who balances meticulous budgeting, skeptical negotiation, and solitary hands‑on hobbies—woodworking, classic‑car restoration, and fishing—while
    quietly competing to lead eco‑friendly construction projects.
background:
  cultural: Johnson is an African‑American Texan whose family has lived in South Texas for three generations. Growing up in a tight‑knit Black community in Jim Hogg County, he was raised with the values
    of self‑reliance, church fellowship, and Southern hospitality. The cultural blend of African‑American gospel music, Texan country cuisine, and the proximity to Mexican traditions has shaped his worldview,
    giving him a practical, community‑oriented outlook while maintaining pride in his heritage.
attributes:
  skills: '[''project scheduling'', ''cost estimating'', ''crew leadership'', ''safety compliance'', ''blueprint interpretation'', ''construction management software (Procore, Buildertrend)'', ''subcontractor
