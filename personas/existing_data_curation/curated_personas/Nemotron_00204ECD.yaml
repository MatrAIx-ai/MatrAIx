  career_goals: Over the next five years, Robert aims to assume a leadership role as department chair, guiding strategic initiatives that bridge academic research with industry application. He plans to
    launch an interdisciplinary artificial intelligence research center that attracts multi‑year NSF funding and fosters partnerships with Texas tech startups. A long‑term ambition is to author a definitive
    textbook on machine learning that becomes a core resource for graduate programs nationwide. He also seeks to expand his mentorship impact by establishing a statewide STEM scholarship pipeline for underrepresented
    students and to spin off a startup that commercializes a data‑analytics platform derived from his lab’s research. Ultimately, Robert wishes to shape Texas higher‑education policy on technology education
    while maintaining a balance between scholarly excellence and practical outcomes.
