persona_description: A medical professional who specializes in the use and application of kilovoltage X-rays in the treatment of skin cancers and other non-cutaneous malignancies. They are familiar with
  the various applications of kilovoltage X-rays and are skilled in optimizing the use of megavoltage machines for treating other non-cutaneous malignancies. They are aware of the advantages and disadvantages
  of using kilovoltage X-rays compared to megavoltage units and are knowledgeable about the different areas of kilovoltage X-ray therapy. They have experience with the design, operation, and maintenance
  of kilovoltage X-ray equipment and are skilled in interpreting the results of kilovoltage X-ray therapy.
