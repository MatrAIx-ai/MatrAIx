  hobbies: '[''Reading mystery novels'', ''Journaling'', ''Hiking with her dog'', ''Nature photography'', ''Strategic video gaming'', ''DIY crafting (knitting, birdhouse building)'', ''Listening to alternative
    music'']'
  career_goals: Kerri aims to graduate high school with a strong focus on science and health courses, then earn certification as an emergency medical technician (EMT) so she can work in a clearly defined,
    structured environment that offers immediate, tangible results. She dreams of combining this qualification with her love of the outdoors by joining a wilderness rescue team in the Colorado Rockies,
    where she can apply her practical skills while enjoying the flexibility of field work. As a long‑term goal, she hopes to pursue further training in paramedicine or environmental health, ensuring a stable
    career that balances predictability with hands‑on problem solving.
