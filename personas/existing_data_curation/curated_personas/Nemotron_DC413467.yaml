personas:
  professional: Kerri Tolbert, a teenage aspiring wildlife photographer and strategic gamer, blends a love of structure and detail in their nature shots with the competitive mindset honed in local video‑game
    tournaments, using meticulous note‑taking and shot‑lists to build a small but dedicated online following.
  sports: Kerri Tolbert enjoys short hikes with their dog in the local foothills, they also participate in the high‑school cross‑country team during fall, and they follow the Golden State Warriors with
    a loyal fan‑club membership, preferring low‑impact, structure‑oriented workouts over team sports.
  arts: Kerri Tolbert channels their creative side by photographing misty forest scenes for an online community, they listen to indie folk singer Phoebe Bridgers while knitting, and they devour mystery
    novels by Gillian Flynn, which together shape their aesthetic taste and inspire their DIY birdhouse designs.
  travel: Kerri Tolbert prefers weekend nature escapes, having camped in Yosemite and hoping to trek the glaciers of Patagonia, they plan trips with meticulous checklists yet leave room for spontaneous
    photo‑ops, while budget constraints keep most adventures within driving distance of home.
  culinary: Kerri Tolbert, a novice cook, often whips up quick chicken noodle soup and avocado toast for comfort, they experiment with cinnamon‑sugar granola bars, but they occasionally rely on instant
    ramen during late‑night gaming sessions, favoring mild flavors over spicy dishes.
  core: Kerri Tolbert is a solitary, detail‑oriented teen who balances a love for structured photography and strategy games with a lingering worry‑prone mindset; they often trade meticulous planning for
    spontaneous creativity and have a penchant for hoarding spare change for future projects.
background:
  cultural: Kerri is a white teenager raised in Montrose, Colorado, a small town nestled in the high desert and near the Rocky Mountains. Her upbringing reflects a blend of Western frontier values—self‑reliance,
    practicality, and a strong connection to the outdoors—combined with the close‑knit community spirit typical of rural Colorado. Family traditions include seasonal trips to local ski resorts and participation
    in community events like county fairs, giving her a modest, grounded cultural perspective while exposing her to the region’s natural heritage and the collaborative ethos of small‑town life.
attributes:
  skills: '[''Basic computer operation'', ''Internet research'', ''Social media communication'', ''Personal task organization'', ''Middle‑school mathematics'', ''Science fundamentals'', ''Simple cooking'',
