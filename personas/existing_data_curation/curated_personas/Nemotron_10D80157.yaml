  career_goals: Although retired from formal employment, Maria aims to preserve her independence, stay physically and socially active, and deepen her involvement in community service. She aspires to document
    and share her family’s recipes and stories for future generations, support her grandchildren’s education through tutoring and mentorship, and continue volunteering as a coordinator for church events
    and senior center activities. Additionally, she hopes to maintain her health through regular walks and gardening, and to cultivate a sense of calm and resilience against her anxiety by staying engaged
    with supportive social circles.
