  career_goals: Kayli aims to step into a senior office manager or operations coordinator role within the next three to five years, where she can lead process‑improvement initiatives and integrate data‑driven
    decision‑making into daily operations. She plans to earn a Project Management Professional (PMP) certification and a Lean Six Sigma Yellow Belt to formalize her expertise in workflow optimization. Long‑term,
    she envisions a position that blends her administrative strengths with strategic planning, allowing her to mentor junior staff, champion inclusive workplace practices, and support her family’s work‑life
    balance.
