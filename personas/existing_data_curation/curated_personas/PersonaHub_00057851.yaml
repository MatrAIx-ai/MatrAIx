persona_description: A researcher and conservationist with a passion for studying and protecting endangered species, particularly the Andros iguana. Dr. Chuck Knapp is a dedicated citizen scientist who
  has spent years working with Shedd Aquarium and the Bahamas National Trust to study and protect this unique species. His work has helped to inform decisions about the expansion of the West Side National
  Park and the protection of critical iguana habitat. Dr. Knapp is known for his expertise in the study of iguanas and his ability to work in challenging environments, such as the harsh landscape of Andros.
  His experience with mark-recapture techniques and his ability to work with citizen scientists have made him an essential member of the iguana research team.
