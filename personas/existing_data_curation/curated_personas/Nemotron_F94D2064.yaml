personas:
  professional: Mable Brown is a retired historian‑volunteer who leverages her seasoned research, storytelling, and empathetic listening to lead a community oral‑history archive at the Casper senior center,
    balancing meticulous record‑keeping with a flexible, supportive mentorship style.
  sports: Mable Brown enjoys leisurely hikes with the Bighorn Trail Society, follows the Wyoming Cowboys football team and the Yellowstone National Park ranger‑led wildlife tours, and occasionally participates
    in a senior walking club that meets every Saturday.
  arts: Mable Brown frequently attends productions by the Casper Community Players, listens to folk legends like Johnny Cash and contemporary storytellers such as Gillian Welch, and immerses herself in
    the intricate patterns of quilting while reverently reading historical novels by Hilary Mantel and biographies of frontier pioneers.
  travel: Mable Brown favors relaxed road trips to iconic western sites such as Yellowstone and Grand Teton, dreams of visiting the National Archives in Washington, D.C. for research inspiration, and plans
    weekend getaways with her grandchildren to family cabins near the Bighorn Mountains, balancing her limited budget with a love for scenic photography.
  culinary: Mable Brown delights in cooking hearty bison stew, sage‑infused roasted root vegetables, and homemade apple‑crumble pie using fresh pollinator‑friendly herbs from her garden, while her modest
    cooking skills keep her comfortable with simple, comforting meals and occasional experiments with wild edible berries.
  core: Mable Brown is a compassionate chronicler whose curiosity, meticulous quilting, and anxious heart create a living tapestry of community memory, heartfelt mentorship, and gentle perseverance.
background:
  cultural: Mable grew up in a mid‑western farming family that relocated to Casper, Wyoming, in the early 1950s. She identifies with the cultural values of the American West—self‑reliance, community stewardship,
    and a deep respect for the natural landscape. Her family traditions blend Lutheran holiday customs with the communal celebrations of Casper's Frontier Days festivals. Active participation in the local
    Methodist church has reinforced a spirit of service and harmony. Mable’s upbringing during the post‑war era and her lifelong residence in Natrona County have given her a strong sense of regional pride
    and an appreciation for Wyoming’s history, folklore, and outdoor recreation.
