  career_goals: Although retired, Mable aims to create a lasting legacy by compiling a community oral‑history archive that captures stories of Casper's early settlers and longtime residents. She hopes to
    publish a memoir that weaves her family’s genealogy with local history, providing a resource for future generations. Additionally, she aspires to mentor her grandchildren in writing and research, continue
    learning digital tools for archiving, and maintain her involvement in senior‑center programs that promote mental‑wellness and social connection. Managing her anxiety, she plans to attend support groups
    and volunteer as a peer listener, turning her emotional sensitivity into compassionate service.
