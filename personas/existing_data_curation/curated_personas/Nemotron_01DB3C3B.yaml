  hobbies: '["Watercolor painting", "Gardening (herbs and heirloom vegetables)", "Salsa dancing", "Reading historical fiction", "Exploring astronomy and astrophotography", "Crossword puzzles", "Cooking
    workshops (Puerto Rican cuisine)", "Collecting vintage Latin music records", "Knitting", "Volunteering at senior center"]'
  career_goals: Though formally retired, Lyann remains driven to create a lasting impact. She aims to launch a bilingual oral‑history project that records the stories of elder Puerto Rican residents in
    Somerset County, with the goal of publishing an anthology for local schools. She also aspires to complete a memoir that weaves her life’s artistic and community experiences, hoping to submit it to a
    regional senior‑writers’ contest. Lyann plans to deepen her photography skills, documenting community events for the local historical society, and to enroll in a short‑term digital media course at a
    nearby community college to broaden her ability to share her work online. Her ultimate ambition is to mentor a new generation of senior volunteers, instilling in them the same high standards and disciplined
    work ethic she embodies.
