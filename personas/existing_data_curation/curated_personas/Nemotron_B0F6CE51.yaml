  career_goals: Kimberlye aims to leverage her extensive retail background into a senior leadership role such as district manager or visual‑merchandising consultant within the next five years, where she
    can shape store strategies across multiple locations. Simultaneously, she plans to launch a boutique online shop that curates novelty art pieces and handcrafted accessories, blending her love for abstract
    art with her sales expertise. She also hopes to develop a mentorship program for mid‑career retail professionals, sharing her methodical approach and competitive mindset. Ultimately, she envisions a
    balanced career that allows her to continue influencing store performance while dedicating more time to her creative projects.
