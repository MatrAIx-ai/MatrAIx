  hobbies: '[''Birdwatching'', ''Hiking'', ''Vegetable gardening'', ''Woodworking'', ''Model building'', ''Digital photography'', ''Puzzle solving (jigsaw, crossword)'', ''Reading scientific journals'',
    ''Reading classic literature'', ''Remote tutoring (math & physics)'']'
  career_goals: Although retired from formal employment, Gregory aims to remain intellectually active by contributing his knowledge to local educational programs and citizen‑science initiatives. He hopes
    to mentor high‑school and college students in STEM fields, develop accessible science material for community workshops, and document his experiences in a reflective memoir that highlights the evolution
    of engineering practices. He also seeks to support environmental stewardship projects in Fort Collins, blending his technical background with his compassion for sustainable community development.
