personas:
  professional: Gregory Kelly is a retired mechanical engineer and quantitative analyst whose decades of expertise in CAD, R, and Python enable them to mentor budding engineers with a methodical yet flexible
    approach, balancing a love for structure with a relaxed attitude toward rigid schedules.
  sports: Gregory Kelly enjoys leisurely hikes on the foothills, cross‑country skiing at Loveland during winter, follows the Colorado Avalanche and the Colorado Rockies, and they participate in a senior
    walking club that meets at the Cache la Poudre River trail.
  arts: Gregory Kelly captures Colorado landscapes through digital photography inspired by Ansel Adams, reads classic literature like Melville’s Moby‑Dick, listens to Beethoven’s symphonies, and they attend
    local theater productions of "Our Town" at the Fort Collins Playhouse.
  travel: Gregory Kelly prefers slow, scenic road trips with a detailed itinerary, often revisiting Yellowstone in summer, has driven the Pacific Coast Highway, and they dream of exploring the Scottish
    Highlands and the vineyards of Tuscany on a future leisurely cruise.
  culinary: Gregory Kelly enjoys garden‑to‑table cooking, often preparing roasted root vegetable medley with rosemary and quinoa, savoring wild‑caught trout grilled with sage, and they relish a simple Colorado
    lamb stew seasoned with cumin, reflecting a modest yet adventurous palate.
  core: Gregory Kelly blends a methodical mind with a love for solitude, tending a garden, solving puzzles, and mentoring students while occasionally misplacing their keys and forgetting to water plants.
background:
  cultural: Gregory’s cultural roots trace back to a middle‑class white American family in the Midwest, where his parents emphasized education, self‑reliance, and community service. Growing up during the
    Space Race, he was inspired to pursue STEM at a time when scientific advancement was a national priority. After moving to Colorado for graduate studies, he embraced the state’s outdoor ethos, environmental
    consciousness, and collaborative community spirit. His marriage and long‑standing residence in Fort Collins reflect a blend of traditional Midwestern values with the progressive, nature‑focused culture
    of the Rocky Mountain region.
