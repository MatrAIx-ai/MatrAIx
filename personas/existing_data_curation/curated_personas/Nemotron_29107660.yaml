  career_goals: Although retired, Brian’s ambitions focus on leaving a lasting cultural and familial legacy. He aims to write and self‑publish a memoir that blends his personal history with the broader
    Mexican‑American experience in Kern County. He also plans to develop a small community garden where he can mentor younger neighbors in sustainable gardening and traditional Mexican cooking. Additionally,
    he aspires to refine his photography skills to create a visual archive of local art and heritage, and to share these works through a modest online blog.
