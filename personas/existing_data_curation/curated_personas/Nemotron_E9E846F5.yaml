  career_goals: Paul aims to transition from a logistics coordinator to a senior supply chain manager within the next five years, leading a regional distribution network. He seeks to champion the adoption
    of AI-driven forecasting and sustainable transportation practices in his organization. To support these ambitions, he plans to obtain a Certified Supply Chain Professional (CSCP) credential and enroll
    in a part‑time MBA program focused on operations strategy. He also aspires to mentor junior logisticians, fostering a culture of continuous improvement while developing his own project‑management discipline
    to better meet deadlines.
