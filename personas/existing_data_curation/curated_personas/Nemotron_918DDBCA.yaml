personas:
  professional: Argenis Rojas, a three-year-old, showcases early engineering instincts during block play, systematically constructing towers that obey simple physics and preferring the familiar set of interlocking
    bricks over spontaneous imagination, and they often parlay the structured activity into friendly competitions with peers, reflecting their love for routine and competitive nature.
  sports: Argenis Rojas, a three-year-old, joins the local Mini Kicks Soccer Club on Tuesdays, cheers for the Chicago Cubs during family game nights, and prefers the predictable drills of the soccer practice
    over impromptu backyard tag, though on hot summer days they sprint to the community pool for splash-time, blending routine with bursts of spontaneous play.
  arts: Argenis Rojas, a three-year-old, sings along to Raffi's 'Baby Beluga', watches the animated adventures of Sesame Street, and loves finger-painting scenes of their favorite Disney princesses, channeling
    the familiarity of beloved characters into creative scribbles while occasionally improvising quirky sound effects during play.
  travel: Argenis Rojas, a three-year-old, has already explored Orlando's Magic Kingdom and the sandy shoreline of San Diego's Coronado Beach, prefers vacation plans that repeat the same bedtime routine
    and familiar meals, yet they secretly wish to see the towering Eiffel Tower in Paris, balancing comfort with a budding curiosity.
  culinary: Argenis Rojas, a three-year-old, adores cheese pizza, mac and cheese, and sweet apple slices, can expertly scoop peas with a tiny fork, staunchly refuses broccoli and peas that are overcooked,
    and often bargains for an extra splash of ketchup, revealing a practical palate anchored in familiar flavors and a competitive streak for the last bite.
  core: Argenis Rojas, a three-year-old, navigates the world with a steadfast love for routine, a competitive spark that fuels toy battles, and a stubborn refusal to share snacks, and they make every day
    an orderly yet lively adventure.
background:
  cultural: Argenis is raised in a Mexican‑heritage family in Gardner, Kansas. Her household speaks both Spanish and English, exposing her to bilingual storytelling and music. The family celebrates cultural
    traditions such as Día de los Muertos, Mexican Independence Day, and enjoys Mexican cuisine like tacos, quesadillas, and tamales during family meals. These cultural practices blend with the local Midwestern
    environment, giving Argenis a rich, multicultural upbringing.
