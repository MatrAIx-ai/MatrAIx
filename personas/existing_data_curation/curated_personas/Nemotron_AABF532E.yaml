  career_goals: Kari aims to transition from a specialist role to senior leadership, targeting a Director of Operations position within the next five years. She envisions spearheading a digital transformation
    initiative that streamlines workflows while embedding robust employee‑wellness protocols to reduce workplace anxiety. Long‑term, she aspires to become a Chief Operations Officer, using her blend of
    structured process design and empathy‑driven leadership to build resilient, high‑performing teams. Parallel to her professional climb, Kari plans to mentor younger women in business, championing work‑life
    balance and mental‑health awareness across the organization.
