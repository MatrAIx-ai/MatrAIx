personas:
  professional: Kari Bigelow, a seasoned business operations specialist, leverages their expertise in ERP systems, advanced Excel modeling, and Power BI reporting to design meticulously structured workflows
    while drawing on yoga‑derived calm and an assertive yet compassionate communication style to keep high‑pressure cross‑functional teams on track.
  sports: Kari Bigelow fuels their fitness routine with early‑morning jogs around Longwood’s lake trail, joins the local women's tennis club for weekly matches, and never misses a home game of the Orlando
    Magic or the Tampa Bay Buccaneers, balancing competitive spirit with a structured, calendar‑driven approach to exercise.
  arts: Kari Bigelow enriches their downtime by attending the Orlando Museum of Art’s modern exhibitions, listening to the intricate lyrics of Lin‑Manuel Miranda’s Hamilton soundtrack, and savoring the
    atmospheric piano works of Ludovico Einaudi while occasionally quoting insights from Malcolm Gladwell’s narrative style.
  travel: Kari Bigelow prefers meticulously planned travel itineraries, often spending a week exploring historic neighborhoods in Barcelona, a weekend tasting sushi in Kyoto’s Nishiki Market, and a summer
    road‑trip through the Florida Keys, balancing a desire for cultural depth with the practical constraints of a demanding executive schedule.
  culinary: Kari Bigelow, an avid home chef, crafts elaborate, recipe‑driven dishes like heirloom tomato and basil bruschetta, roasted vegetable lasagna layered with kale and ricotta, and a fragrant turmeric‑infused
    quinoa pilaf, drawing fresh herbs straight from their Longwood garden to elevate each plate.
  core: Kari Bigelow balances a razor‑sharp operational mind with a garden‑tending soul, tempering high‑stakes anxiety through daily yoga, yet occasionally succumbs to late‑night crossword binges that delay
    bedtime.
background:
  cultural: Kari grew up in a middle‑class, white, Midwestern family that emphasized reliability, hard work, and community involvement. Relocating to Longwood, Florida, in her thirties, she adopted the
    suburb’s family‑centric lifestyle while integrating Southern hospitality and the region’s diverse cultural offerings. Her upbringing instilled a respect for tradition and punctuality, which meshes with
    her preference for structure. Simultaneously, her exposure to Florida’s multicultural environment—through local festivals, a mixed‑heritage church community, and volunteer work—has broadened her appreciation
    for collaborative diversity. This blend of Midwestern pragmatism and Floridian openness informs both her personal values and professional ethos.
