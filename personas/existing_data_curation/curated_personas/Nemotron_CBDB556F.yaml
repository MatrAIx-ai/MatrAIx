  career_goals: Johnsie aims to advance into a senior technician or supervisory role within the next three years, leveraging his deep technical knowledge and compassionate patient care to lead a team that
    delivers high‑quality pharmacy services. He is pursuing additional certifications, including immunization administration and medication therapy management, to broaden his clinical impact. Long‑term,
    he hopes to mentor the next generation of pharmacy technicians through community college adjunct teaching and local health‑fair outreach programs, integrating his curiosity for new ideas with a desire
    for practical, community‑focused health solutions. He also envisions spearheading workflow improvement projects that streamline medication dispensing while reducing errors, thereby enhancing patient
    safety and staff satisfaction.
