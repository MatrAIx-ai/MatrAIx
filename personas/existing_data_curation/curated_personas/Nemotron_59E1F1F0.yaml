  hobbies: '[''Cooking Mexican cuisine'',''Ballet folklórico / Latin dancing'',''Gardening (herbs & vegetables)'',''Reading mystery novels'',''Hiking the Brandywine Trail'',''Yoga and meditation'',''Volunteering
    at food pantry'',''Crocheting'']'
  career_goals: Herika aims to advance to a supervisory position within the transportation security field over the next three to five years, seeking roles such as Shift Supervisor or Training Coordinator.
    She intends to complete the TSA Certified Transportation Security Officer (CTSO) program and pursue a certification in security management. Leveraging her competitive drive, she plans to spearhead efficiency
    projects that reduce screening wait times while maintaining safety standards. Long‑term, she aspires to move into a regional security management role, where she can develop and implement training curricula
    and mentor new officers, all while maintaining a balanced work schedule to manage her sensitivity to stress.
