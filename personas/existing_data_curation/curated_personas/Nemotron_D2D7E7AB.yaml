  hobbies: '[''Cooking Vietnamese dishes'', ''Herb gardening'', ''Yoga and mindfulness meditation'', ''Reading contemporary fiction and Vietnamese literature'', ''Small‑group cultural workshops and language
    exchanges'', ''Walking on the beach or in parks'', ''Journaling'']'
  career_goals: Ne aims to secure a stable, low‑stress position that aligns with her practical mindset and love for routine. She plans to complete an associate’s degree in culinary arts or hospitality management,
    leveraging her cooking expertise and bilingual abilities. Her short‑term goal is to work as a kitchen assistant or catering staff member for a Vietnamese restaurant, where she can apply her consistent
    culinary skills while learning professional kitchen operations. In the longer term, Ne hopes to launch a modest home‑based catering service specializing in authentic Vietnamese meals for small community
    events, allowing her to maintain a predictable schedule, manage her stress levels, and remain closely connected to her cultural roots. She also envisions occasional community‑outreach work, such as
    providing translation assistance at local health clinics, to give back to the Vietnamese immigrant community.
