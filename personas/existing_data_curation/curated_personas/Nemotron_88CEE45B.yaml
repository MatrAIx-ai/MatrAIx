personas:
  professional: Juanita Goodlett, a business operations specialist who blends lean process improvement with an artistic sensibility, excels at streamlining retail workflows while infusing creativity into
    cross‑functional meetings, and they leverage strong communication and empathetic listening to mediate conflicts and nurture a culture of wellbeing despite a relaxed, sometimes scatter‑brained planning
    style.
  sports: Juanita Goodlett, an avid weekend hiker with the Idaho Trailblazers Hiking Club, regularly tackles the Sawtooth Mountains and joins the local “Burley Wanderers” soccer league, while they cheer
    for the Seattle Seahawks and the Portland Trail Blazers during NFL and NBA seasons.
  arts: Juanita Goodlett, a regular at Burley Community Theater and a participant in improv comedy workshops at ImprovNation, fills weekends with painting inspired by Georgia O’Keeffe, captures sunset vistas
    through photography, and draws lyrical inspiration from the music of The Avett Brothers and the cinematic world of Wes Anderson.
  travel: Juanita Goodlett, a spontaneous road‑tripper who favors flexible itineraries, has explored the hot springs of Boise, the rugged cliffs of Jackson Hole, and the lavender fields of Idaho’s Snake
    River Valley, and they dream of a cross‑country hike through the Canadian Rockies and a cultural immersion in Oaxaca, Mexico.
  culinary: Juanita Goodlett, a confident home cook who loves to whip up pan‑seared trout with lemon butter, herb‑roasted fingerling potatoes, and fresh salsa verde for salsa‑dance nights, but they often
    succumb to late‑night ramen delivery after late‑night art shows.
  core: Juanita Goodlett, a creatively curious 40‑year‑old who balances a love for art, mountain hikes, and spirited community life with an anxious mind, a relaxed approach to planning, and a relentless
    drive to turn operational chaos into elegant, people‑centric solutions.
background:
  cultural: Juanita grew up in a middle‑class, white family rooted in the agricultural and small‑town culture of southern Idaho. Her ancestry traces back to English and Scandinavian immigrants who settled
    the region in the early 20th century, instilling values of self‑reliance, community cooperation, and a respect for the outdoors. Burley’s close‑knit community and the surrounding farming landscape shaped
    her appreciation for hard work and practical problem solving, while the town’s growing arts scene and proximity to Boise exposed her to diverse cultural influences. This blend of rustic Idaho heritage
    and emerging creative currents informs both her work ethic and her artistic interests, fostering a balanced identity that honors tradition while embracing new ideas.
attributes:
  skills: '[''Process optimization'', ''Data analysis and reporting (Excel, Google Data Studio)'', ''Project coordination'', ''Stakeholder communication'', ''Team facilitation and conflict mediation'',
