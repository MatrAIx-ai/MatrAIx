  hobbies: '[''Painting'', ''Photography'', ''Local theater and improv comedy'', ''Hiking and camping in the Sawtooth Mountains'', ''Salsa dancing'', ''Community volunteering (food bank)'', ''Yoga and mindfulness
    practice'', ''Traveling to art and music festivals'', ''Participating in trivia nights'', ''Listening to business & cultural podcasts'']'
  career_goals: Juanita aims to translate her extensive hands‑on experience into a leadership role within operations, targeting a position such as Operations Manager or Regional Process Improvement Lead
    within the next three to five years. She is motivated to earn a formal Lean Six Sigma Yellow Belt certification and eventually a Green Belt to solidify her expertise. Long‑term, she dreams of founding
    a boutique consulting practice that helps small businesses in rural Idaho adopt efficient, flexible workflows while preserving a personal, community‑focused touch. She also hopes to cultivate a more
    structured professional approach that mitigates her own stress, allowing her to mentor younger employees and champion a workplace culture that values both creativity and well‑being.
