  hobbies: '["Gardening", "Traditional Mexican Cooking", "Reading Historical Biographies", "Chess", "Community Festival Participation", "Volunteer Bilingual Story‑time", "Woodworking", "Nature Walks"]'
  career_goals: Although retired from formal employment, Victor aims to leave a lasting educational legacy in Raleigh. He plans to develop a bilingual resource handbook for local schools and community centers,
    advocating for equitable access to culturally relevant materials. Victor also aspires to serve on the school district’s advisory board, using his experience to influence policies that support multilingual
    learners. On a personal level, he is dedicated to mentoring younger teachers and his own grandchildren, sharing both pedagogical wisdom and Mexican cultural heritage. Writing a memoir that captures
    his educational journey and the stories of his family’s migration is also a treasured long‑term goal.
