  hobbies: '[''Motorcycle restoration'', ''Custom woodworking'', ''Fishing'', ''Hunting'', ''Weightlifting'', ''Reading construction trade magazines'', ''Listening to engineering podcasts'', ''Watching
    NFL games'', ''Target shooting'', ''Hiking'']'
  career_goals: Robert aims to advance from laborer to foreman within the next three years, targeting an OSHA 30‑hour certification and an NCCER manual handling credential to bolster his qualifications.
    He plans to enroll in a community‑college construction management program to acquire formal training in project scheduling and cost control. In the longer term, he aspires to start his own general contracting
    business that focuses on sustainable building practices and leverages modern construction technologies. Competing for leadership roles, he seeks to be recognized for efficient project execution, safety
    record, and the ability to mentor junior laborers.
