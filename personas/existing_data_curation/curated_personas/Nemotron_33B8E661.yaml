  hobbies: '[''Reading (fiction, psychology)'', ''Gardening'', ''Hiking'', ''Landscape photography'', ''Journaling'', ''Yoga and mindfulness'', ''Puzzle solving'', ''Artisanal tea brewing'']'
  career_goals: Leeza aims to advance to a regional sales director role within the next five years, where she can shape a data‑centric sales strategy for a multi‑state territory. She plans to design a mentorship
    program that leverages educational theory to accelerate new‑rep productivity, publish a practical guide on integrating pedagogy into sales training, and eventually launch her own consultancy that helps
    mid‑market companies build high‑performing, methodical sales teams. Her ambition is driven by a desire for clear, measurable impact and professional autonomy.
