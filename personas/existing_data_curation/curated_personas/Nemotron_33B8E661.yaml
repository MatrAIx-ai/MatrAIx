personas:
  professional: Leeza Pruette is a methodical, data‑driven sales leader with eight years of experience who merges meticulous Salesforce analytics, rigorous onboarding curriculum design, and strategic budgeting
    to consistently exceed quotas, while their competitive streak and desire for measurable impact propel them toward a regional sales director position within five years.
  sports: Leeza Pruette fuels fitness through solo hikes on Seabeck’s forested trails with the local Trail Club, tracks personal bests with a GPS watch, practices yoga three times weekly, roots for the
    Seattle Seahawks and Mariners for a dose of team spirit, and participates in a casual tennis league to balance competition with social interaction.
  arts: Leeza Pruette captures the misty Pacific Northwest in landscape photography, immerses in contemporary novels by Sally Rooney and psychological nonfiction by Brené Brown, curates playlists featuring
    Sufjan Stevens and Fleet Foxes, and attends nearby gallery openings to stay inspired by emerging visual artists.
  travel: Leeza Pruette plans solitary getaways with meticulous spreadsheet itineraries, favoring solo hikes in Olympic National Park and week‑long tea‑culture immersions in Kyoto, while dreaming of an
    Icelandic road trip to photograph auroras and preferring low‑key lodging over crowded resorts.
  culinary: Leeza Pruette nurtures a modest vegetable garden, turning fresh harvests into roasted beet salad with goat cheese and matcha‑infused miso soup, while perfecting artisanal blends of Darjeeling
    and jasmine tea that they brew in meticulous cold‑brew experiments and share during intimate dinner gatherings.
  core: Leeza Pruette balances a competitive, data‑focused sales mindset with a quiet love for solitary gardens, tea experiments, and relentless self‑monitoring, letting a persistent undercurrent of worry
    drive meticulous planning and occasional over‑analysis.
background:
  cultural: Leeza was raised in a middle‑class family in the Pacific Northwest, where an emphasis on education, self‑reliance, and a pragmatic work ethic shaped her worldview. As a white American from this
    region, she values independence, appreciates the outdoors, and draws on a community‑oriented, modest cultural lens that balances curiosity with practicality.
attributes:
  skills: '[''Sales management'', ''Strategic planning'', ''Data analysis'', ''Team leadership'', ''Curriculum development'', ''CRM (Salesforce) administration'', ''Negotiation'', ''Budgeting and forecasting'',
