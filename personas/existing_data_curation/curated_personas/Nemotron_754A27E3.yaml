  hobbies: '[''Reading (Art, Science, History)'', ''Analog Photography'', ''Beach Walks'', ''Herb Gardening'', ''Collecting Vintage Scientific Instruments'', ''Listening to Mexican Folk and Classical Music'',
    ''Crossword Puzzles'', ''Documentary Watching'', ''Journaling'', ''Online Art Lectures'', ''Meditation and Mindful Breathing'']'
  career_goals: Even in retirement, Francisco aims to leave a lasting legacy by sharing his knowledge and cultural heritage. He plans to create a memoir that chronicles his family’s migration story and
    his own lifelong learning journey, hoping to inspire younger generations. He aspires to establish a small scholarship fund for Hispanic students pursuing STEM fields in the Los Angeles area. Continuing
    his love of art, he hopes to curate a traveling exhibition of Mexican folk art and local photography that he’s been collecting. On a personal level, he is committed to maintaining his mental health
    through regular meditation, reducing anxiety, and ensuring quality time with his wife through quiet, shared activities such as cooking traditional meals and morning walks on the beach.
