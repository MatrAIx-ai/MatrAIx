  career_goals: Looking ahead, Diane aims to transition into a senior operations manager role where she can shape organization‑wide policies and champion continuous improvement initiatives. She plans to
    earn a Six Sigma Green Belt to formalize her expertise in lean processes and hopes to lead a cross‑functional task force that integrates technology and employee wellness programs. Diane is also passionate
    about mentoring the next generation of women in STEM and envisions establishing a mentorship network within her company. While she remains open to a phased retirement, she wants her final years of work
    to leave a measurable legacy of elevated staff engagement, reduced operational waste, and a stronger culture of innovation.
