personas:
  professional: A veteran administrative supervisor with three decades of process‑improvement expertise, Diane Hester leverages her STEM background and Six Sigma ambition to redesign workflows, coach staff,
    and champion organization‑wide policy changes while fiercely advocating mentorship for women in technology.
  sports: An enthusiastic supporter of Twin Cities teams, Diane Hester roots for the Minnesota Vikings, Twins, and Timberwolves, joins a weekend running group at the Chain of Lakes, participates in a local
    pickleball league at her community center, and volunteers for charity walks organized by her horticulture club.
  arts: A dedicated museum‑goer and amateur creator, Diane Hester sketches Georgia O'Keeffe's works at the Weisman Art Museum, paints acrylic landscapes inspired by the Nordic light, captures macro photographs
    of wildflowers, and finds solace listening to Prince's funk classics and the folk melodies of The Tallest Man on Earth.
  travel: A road‑trip enthusiast, Diane Hester spends her weekends exploring historic Midwestern towns like Stillwater, MN, and Galena, IL, while meticulously planning future journeys to Oslo to experience
    fjord architecture and Nordic design, balancing careful itineraries with spontaneous detours to local farmers’ markets.
  culinary: A home‑grown foodie, Diane Hester loves preparing her garden’s heirloom tomatoes in a fresh ratatouille, savoring Swedish‑style köttbullar with lingonberry jam, experimenting with wild rice
    soup flavored with dill and spruce tips, and occasionally indulging in a perfectly seared walleye accompanied by lemon‑butter sauce.
  core: Diane Hester is a detail‑driven operations strategist who balances relentless process optimization with a love for sketching museum art, yet often battles lingering worry and a penchant for occasional
    impulse buys.
background:
  cultural: Diane was born and raised in a middle‑class white family in the Twin Cities, with deep Scandinavian roots—her grandparents emigrated from Norway in the 1920s. The Midwestern values of modesty,
    community involvement, and a strong work ethic shaped her upbringing. She earned her STEM degree at the University of Minnesota, where she was one of few women in her program and later became an advocate
    for gender equity in STEM fields. Diane participates in local cultural traditions, such as celebrating St. Lucia’s Day with a neighborhood choir and enjoying Swedish‑style fika gatherings. Her cultural
    identity blends a respect for the region’s natural landscape, a love for the vibrant local arts scene, and a commitment to civic service through volunteer tutoring at the public library.
