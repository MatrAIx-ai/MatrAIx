personas:
  professional: Justin Dixon, an aspiring senior instrument technician, blends meticulous hands‑on repair skills with a laid‑back attitude toward deadlines; they favor improvisational problem solving over
    rigid schedules while communicating technical issues in clear, friendly language.
  sports: Justin Dixon enjoys solitary trail hikes through the Everglades, occasional skateboarding at Jacksonville’s skate park, and follows the Miami Dolphins and Orlando Magic for a boost of community
    spirit, while their fitness routine is loosely structured, consisting of self‑directed calisthenics and a membership in a modest local cycling club they attend when motivation strikes.
  arts: Justin Dixon curates their downtime with classic rock staples like Led Zeppelin and Pink Floyd, electric reverbs of Aphex Twin, and the atmospheric soundscapes of Daft Punk, while their love for
    simulation games such as Kerbal Space Program and Cities: Skylines fuels their appreciation for technical artistry, and occasional visits to Tampa’s art walk deepen their connection to modern visual
    art.
  travel: Justin Dixon prefers flexible, spur‑of‑the‑moment travel, often budgeting for weekend road trips to the Florida Keys or the historic streets of St. Augustine, while dreaming of a future solo backpacking
    adventure through Kyoto’s temples and Iceland’s volcanic landscapes, balancing their limited student funds with a penchant for discovering hidden natural spots.
  culinary: Justin Dixon’s palate gravitates toward fresh seafood tacos with cilantro, lime, and a dash of sriracha, homemade avocado toast sprinkled with chili flakes, and occasionally a spicy jambalaya;
    they are comfortable with quick, flavorful meals yet ambitious enough to experiment with new spice blends.
  core: Justin Dixon blends a restless curiosity for gadgets with a laid‑back, sometimes disorganized lifestyle; they navigate anxiety through solitary tinkering, precise instrument repair, and the occasional
    impulsive hobby splurge.
background:
  cultural: Justin is an American of Armenian descent; his family maintains a connection to Armenian traditions, such as cooking dishes like dolma and harissa, and celebrating events like Armenian Independence
    Day, while also being fully immersed in the broader Floridian and U.S. culture. Growing up in Orlando, he experienced the multicultural environment of the city, which contributed to his openness to
    diverse ideas and practical problem‑solving mindset.
attributes:
