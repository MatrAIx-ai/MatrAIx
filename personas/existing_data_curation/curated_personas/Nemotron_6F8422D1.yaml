  hobbies: '[''Arduino projects'', ''Model airplane building'', ''Mechanical puzzles (e.g., Rubik’s Cube)'', ''Hiking in local nature preserves'', ''Skateboarding'', ''Strategy video games'', ''Journaling'',
    ''Listening to classic rock and electronic music'']'
  career_goals: He aims to earn industry certifications such as Certified Maintenance & Reliability Technician (CMRT) and become a senior instrument technician within the next five years. Eventually he
    hopes to specialize in high‑end medical imaging equipment, or to start his own boutique repair service that offers on‑site calibrations for research labs. He wants a career that balances hands‑on work
    with learning new technologies, while maintaining enough flexibility to manage his stress and personal projects.
