  career_goals: Although she is no longer in the formal workforce, Sandra aims to deepen her community impact by volunteering as a cooking instructor at the local senior center, leading art workshops for
    children, and documenting her family's migration story in a memoir. She also hopes to learn digital photography to capture the desert’s changing light, mentor younger members of the Mexican‑American
    community in cultural traditions, and organize an annual multicultural art fair that blends traditional folk art with contemporary expressions.
