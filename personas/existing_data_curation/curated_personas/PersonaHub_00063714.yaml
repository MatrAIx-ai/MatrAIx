persona_description: A lactation consultant who specializes in providing support and guidance to mothers who are breastfeeding their premature infants. Her expertise includes understanding the nutritional
  and health benefits of human milk, the risks of formula feeding for premature babies, and the challenges of providing milk for infants in the Neonatal Intensive Care Unit (NICU). Her knowledge and experience
  in this field make her an invaluable resource for mothers who are struggling with breastfeeding their premature infants.
