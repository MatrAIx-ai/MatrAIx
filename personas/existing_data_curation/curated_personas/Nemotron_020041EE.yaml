  hobbies: '[''Oil painting'', ''Sketching'', ''Photography (landscape and architectural)'', ''Reading art history and philosophy'', ''Visiting museums and galleries'', ''Gardening'', ''Woodworking projects'',
    ''Bird watching'', ''Listening to classical and jazz music'', ''Journaling'']'
  career_goals: Although Brian is not currently employed, he aims to channel his skills into meaningful community contributions and personal growth. He plans to volunteer as a docent at the nearby historic
    maritime museum, leading small‑group tours that blend his art appreciation with local history. He also wishes to establish a modest workshop where he can teach woodworking basics to seniors and youths,
    fostering intergenerational learning. On a personal level, he aspires to develop his own portfolio of oil paintings, experiment with digital photography, and complete a memoir that reflects his life
    experiences and the cultural heritage of Warren, RI. Maintaining his home and garden in excellent condition while ensuring financial stability for his family remains a core ambition.
