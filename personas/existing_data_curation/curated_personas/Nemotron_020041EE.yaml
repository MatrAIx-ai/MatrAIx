personas:
  professional: Brian Cheban, a retired handyman turned community arts mentor, merges their woodworking precision, deep art-history knowledge, and quiet, methodical demeanor to guide senior woodworking
    classes and lead thoughtful, small-group tours at the historic maritime museum.
  sports: Brian Cheban enjoys low-impact cardio through early-morning walks along the Warren shoreline, follows the Boston Red Sox and New England Patriots on television, and volunteers occasionally with
    the local senior walking club, the Rockport Ramblers; they maintain a steady but relaxed fitness regimen.
  arts: Brian Cheban immerses themselves in the works of Winslow Homer, Claude Monet, and the jazz improvisations of John Coltrane, frequenting the RISD Museum and the Providence Athenaeum, letting these
    influences shape their oil-painting style and contemplative garden sketchbooks.
  travel: Brian Cheban prefers purposeful, slow-paced journeys such as a week-long study tour of Renaissance art in Florence, a weekend road trip to the lighthouses of Cape Cod, and a nostalgic return to
    St. John's, Newfoundland, where they seek quiet inspiration.
  culinary: Brian Cheban delights in cooking classic New England fare - clam chowder simmered with fresh herbs, baked cod with maple glaze, and heirloom tomato salads - while experimenting with seasonal
    vegetables from their garden, and they often enjoy a cup of black coffee while listening to Debussy.
  core: Brian Cheban is a solitary, curiosity-driven 57-year-old who balances meticulous craftsmanship with a love of art, quietly curating a life of garden bloom, brushstroke, and community mentorship,
    all while occasionally forgetting to water their indoor ferns, and they often drift into reverie during quiet afternoons.
background:
  cultural: Brian was raised in a modest, middle‑class white New England family with deep Irish‑American roots. Growing up in the coastal towns of Rhode Island, he absorbed the region’s maritime heritage,
    historic preservation values, and seasonal rhythms. His upbringing emphasized community involvement, self‑reliance, and a respect for quiet, natural settings. Exposure to local public schools and community
    libraries fostered his early interest in art and history. He maintains traditional New England culinary practices, enjoys seasonal festivals, and participates in neighborhood volunteer efforts that
    reflect the collaborative spirit of his cultural background.
attributes:
  skills: '[''Woodworking and carpentry'', ''Home maintenance (plumbing, electrical troubleshooting)'', ''Gardening and horticulture'', ''Basic computer and internet research'', ''Art history knowledge
