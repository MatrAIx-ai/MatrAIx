  career_goals: Scott aims to advance from his current role as a Management Analyst to a senior strategy consultant within the next three to five years, eventually stepping into a director‑level position
    where he can shape long‑term business direction. He is particularly interested in roles that fuse analytics with product innovation, such as product manager for a tech‑enabled consumer service. In the
    longer term, he envisions launching his own boutique consultancy that helps midsized firms integrate data‑driven decision‑making with creative growth strategies. To achieve this, he plans to deepen
    his expertise in machine‑learning applications, earn a professional certification in strategic management, and cultivate stronger project‑leadership habits that balance his spontaneous style with effective
    deadline management.
