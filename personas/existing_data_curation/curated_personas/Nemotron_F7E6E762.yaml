personas:
  professional: Sanaa Fort, a 41-year-old middle-school STEM teacher in Montrose County, blends rigorous inquiry-based curricula with hands-on coding and outdoor experiments, leveraging their competitive
    drive and methodical planning to secure grants for makerspaces, mentor peers through data-driven professional development, and champion district-wide STEM coordination.
  sports: Sanaa Fort fuels their competitive streak by trail-running with the San Juan Trail Runners, snowboarding at the Aspen Snowboard Club during winter, and cheering on the Denver Broncos and Colorado
    Avalanche, while integrating the problem-solving mindset of rock climbing into their weekly fitness regimen.
  arts: Sanaa Fort channels their sociable energy into community theater productions, captures the Colorado wilderness through photography inspired by Ansel Adams, and unwinds to the soulful jazz of Lizz
    Wright and the clever lyrics of Tom Waits, weaving artistic experiences into their teaching narratives.
  travel: Sanaa Fort plans weekend escapes with meticulous itineraries, preferring adventurous treks in Colorado’s Great Sand Dunes and international hikes along Patagonia’s Torres del Paine, while also
    scheduling cultural sojourns to Kyoto’s temples, balancing a competitive urge to conquer new trails with the practical need to fit travel around their 41-year-old family and professional responsibilities.
  culinary: Sanaa Fort, an adept home cook who harvests heirloom tomatoes, kale, and rosemary from their sustainable garden, whips up quinoa-crusted salmon and roasted vegetable medleys for family meals,
    treats themselves to occasional spicy tacos al pastor with pineapple, and enjoys a meticulously brewed pour-over espresso after an evening of Arduino tinkering.
  core: Sanaa Fort is a methodical, curiosity-driven STEM educator who balances a competitive edge with community spirit, channeling their love for outdoor challenges, puzzle-solving, and theater into a
    lifelong quest to fuse hands-on learning with real-world impact.
background:
  cultural: Sanaa’s cultural background is rooted in Anglo‑American traditions of the Rocky Mountain West. Raised in a small Colorado town, she grew up in a community that values self‑reliance, a close
    connection to nature, and a strong work ethic. Her family emphasized academic achievement, particularly in science and mathematics, and encouraged independent thinking alongside community participation.
    This upbringing fostered a progressive, inclusive view of education that blends Western individualism with collaborative community values, shaping her commitment to fostering curiosity, practicality,
    and resilience in her students.
attributes:
  skills: '[''Curriculum development'', ''Instructional design'', ''Classroom management'', ''Data-driven instruction'', ''Technology integration'', ''Project-based learning facilitation'', ''Grant writing'',
