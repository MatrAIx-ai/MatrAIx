  hobbies: '[''Hiking and trail running'', ''Backpacking in the San Juan Mountains'', ''Snowboarding'', ''Rock climbing'', ''Landscape photography'', ''Logic puzzles and crosswords'', ''Arduino coding projects'',
    ''Community theater'', ''Volunteering at local science fairs'', ''Sustainable gardening'', ''Reading science fiction and non-fiction'']'
  career_goals: Sanaa aspires to become a district STEM coordinator, where she can scale her successful classroom innovations to benefit all schools in Montrose County. She plans to lead the creation of
    a regional makerspace that combines indoor technology labs with the surrounding natural environment, offering students experiential learning opportunities in hiking, wildlife monitoring, and renewable‑energy
    projects. Over the next five years, she aims to earn a doctorate in educational leadership, publish a guide on integrating outdoor education with STEM curricula, and secure a grant to fund a competitive
    robotics program that regularly qualifies for state and national tournaments. Ultimately, she envisions shaping district policy to embed comprehensive STEM pathways from elementary through middle school,
    ensuring equitable access for all students.
