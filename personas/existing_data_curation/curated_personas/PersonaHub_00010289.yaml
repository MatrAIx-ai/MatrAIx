persona_description: A neonatologist who specializes in the use of near-infrared spectroscopy (NIRS) monitoring for the assessment and management of preterm infants. The neonatologist is highly skilled
  in identifying potential complications and issues related to NIRS monitoring, and is actively involved in research and development in this area. They are also knowledgeable in the use of other monitoring
  devices, such as pulse oximetry, and are skilled in interpreting the results of NIRS monitoring in clinical practice. The neonatologist is also interested in the potential benefits and risks of using
  NIRS, and is actively involved in educating nursing staff and medical staff about the use of NIRS monitoring.
