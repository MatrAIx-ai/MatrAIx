  career_goals: Frances aspires to open a boutique funeral home in the Denver‑Boulder corridor that blends traditional Mexican commemorations with contemporary, eco‑conscious memorial designs. She plans
    to complete a mortuary science certification to become a fully licensed funeral director, pursue membership in the National Funeral Directors Association, and develop a mentorship program for other
    women entering the funeral industry. Long‑term, she aims to become a regional thought leader for culturally inclusive and artistic funeral services, expanding her business to offer workshops on DIY
    memorial art and sustainable burial practices.
