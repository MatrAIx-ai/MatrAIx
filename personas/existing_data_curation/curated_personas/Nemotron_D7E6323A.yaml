personas:
  professional: Frances Fuentes, a 32‑year‑old mortician in the Denver‑Boulder corridor, leverages her bilingual fluency and a keen eye for watercolor composition to create personalized memorial displays
    that blend traditional Día de los Muertos altars with modern eco‑friendly burial solutions, while her relaxed approach to scheduling and occasional disorganization keep her creative process fluid but
    sometimes cause last‑minute rushes, and her competitive streak drives her to out‑innovate peers in memorial artistry.
  sports: Frances Fuentes, an avid solo hiker of the Rockies who spends weekends photographing alpine textures, occasionally joins a local trail club, follows the Denver Broncos for football weekends and
    cheers the Colorado Avalanche during the hockey season, and balances her outdoor pursuits with gentle yoga sessions to counteract work‑induced tension.
  arts: Frances Fuentes, a watercolor enthusiast who captures Colorado’s sky‑swept peaks and symbolic marigold motifs, frequents small gallery openings featuring contemporary reinterpretations of Día de
    los Muertos iconography, draws inspiration from Frida Kahlo’s self‑portraiture and the haunting voice of Liza Downs, and spends evenings dissecting art‑history podcasts while sketching ideas for future
    memorial designs.
  travel: Frances Fuentes, who prefers intimate, purpose‑driven trips over crowded tourism, has trekked the Sierra Madre for a traditional Día de los Muertos celebration, plans relaxed road‑trip itineraries
    through the Southwest’s desert mesas, dreams of a quiet retreat in Banff National Park, and balances her wanderlust with the modest budget of a budding entrepreneur.
  culinary: Frances Fuentes, an adept home chef, habitually prepares pan de muerto, mole negro, and steaming tamales infused with rosemary and marigold petals for post‑funeral gatherings, perfects her salsa
    verde using fresh tomatillos, and experiments with succulent‑based garnish for her personalized ofrendas, while occasionally treating herself to a tasting menu at Denver’s La Loma.
  core: Frances Fuentes, a 32‑year‑old mortician whose artistic soul infuses memorials with vivid Día de los Muertos motifs, balances a competitive drive with chronic worry, and prefers solitary creativity
    over rigid schedules, embodies a uniquely compassionate yet imperfectly organized perspective on life.
background:
  cultural: Frances identifies strongly with her Mexican roots, having been raised in a family where Día de los Muertos and Catholic traditions shaped perceptions of death and remembrance. She grew up bilingual,
    speaking Spanish at home and English in school, which informs her ability to offer culturally resonant services. The emphasis on family, communal support, and vivid ritual symbolism—such as ofrendas,
    marigold petals, and traditional foods—permeates her professional approach, allowing her to blend Mexican ceremonial practices with contemporary funeral care in Colorado.
