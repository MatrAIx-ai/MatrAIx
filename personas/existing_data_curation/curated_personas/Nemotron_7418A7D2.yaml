personas:
  professional: A teen content creator named Evelyn Kelly blends self‑taught graphic design and video editing with a passion for budget‑friendly southern‑inspired cooking, and they aim to launch an independent
    brand that showcases their community’s culinary and cultural stories while juggling school and occasional freelance gigs.
  sports: Evelyn Kelly enjoys casual pick‑up basketball with neighborhood friends, follows the Memphis Grizzlies and the local high school track team, and they spend weekends jogging through Overton Park,
    preferring low‑key fitness over regimented workouts and often skipping formal gym sessions.
  arts: Evelyn Kelly sketches street corners of Beale Street, captures candid moments with a vintage DSLR, curates playlists featuring B.B. King, Al Green, and contemporary Memphis hip‑hop artist Moneybagg
    Yo, and they draw inspiration from graphic novels like 'Saga' and indie video game soundtracks, often sharing these creations at local open‑mic nights.
  travel: Evelyn Kelly prefers spontaneous weekend road trips to nearby music hubs like New Orleans and Nashville, plans occasional budget‑friendly Airbnb stays with friends, and they daydream about a future
    backpacking adventure through Jamaica’s coastal towns to explore the island’s culinary roots that echo their family’s Caribbean recipes.
  culinary: Evelyn Kelly whips up inventive comfort meals such as shrimp and grits spiced with scotch bonnet pepper, collard greens simmered with smoked turkey and a hint of allspice, and sweet‑potato biscuits
    topped with jalapeño jam, relying on improvisation and a modest pantry of staples while they occasionally over‑salt in their quest for bold flavor.
  core: Evelyn Kelly is a curiosity‑driven teen who juggles spontaneous creativity with a chronic struggle to meet deadlines, often worrying over tiny details while they turn everyday moments into vibrant
    visual stories.
background:
  cultural: Evelyn grew up in a close‑knit African‑American community in Memphis, where church gatherings, family BBQs, and neighborhood block parties are core to her identity. The sounds of W.C. Handy’s
    blues heritage and the modern Southern hip‑hop scene echo through her home, shaping her taste in music and storytelling. Her family places a strong emphasis on resilience, mutual support, and sharing
    recipes that blend Southern comfort food with a touch of Caribbean flair passed down from relatives. Through community programs at the local library and youth center, she has learned the value of giving
    back, which fuels her desire to create content that celebrates her culture while offering practical tools to her peers.
attributes:
  skills: '[''Basic cooking and experimental recipe development'', ''DIY home repairs and furniture assembly'', ''Fundamental graphic design using Canva'', ''Simple video editing with iMovie/Clipchamp'',
    ''Peer mediation and active listening'', ''Internet research and self‑directed learning'']'
  hobbies: '[''Sketching and drawing street scenes'', ''Street photography'', ''Cooking experimental dishes'', ''Curating playlists of blues, soul, and hip‑hop'', ''Reading science‑fiction and graphic novels'',
    ''Writing short stories'', ''Playing solo indie video games'', ''Attending local art fairs and open‑mic nights'']'
  career_goals: Evelyn dreams of turning her love for food, visual storytelling, and community connection into a flexible, independent career. She hopes to study culinary arts or hospitality at a community
    college while growing a personal brand that shares quick, budget‑friendly recipes and behind‑the‑scenes glimpses of Memphis culture. Simultaneously, she wants to offer freelance graphic‑design and short‑form
    video services for local musicians and small businesses, giving her the freedom to work on projects that spark her curiosity without the constraints of a rigid 9‑to‑5 schedule.
