  career_goals: Even at six, Soledad imagines a future where she merges art and science—she dreams of becoming an illustrator who brings imaginative worlds to life or an environmental designer who invents
    sustainable solutions. Her competitive side pushes her to aim to be the best at drawing and problem‑solving, while her curiosity fuels a desire to explore unconventional ideas and make a personal impact.
