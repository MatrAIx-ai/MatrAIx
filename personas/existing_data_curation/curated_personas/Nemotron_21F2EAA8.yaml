personas:
  professional: Soledad Cabrera, a budding architect‑in‑training, blends quiet sketching, elaborate LEGO constructions, and picture‑book space fantasies into early design experiments, and they tackle each
    project with boundless curiosity yet a relaxed, sometimes chaotic, planning style.
  sports: Soledad Cabrera spends Saturday mornings on solo nature trails through the neighborhood park as part of the Kids' Nature Trail Club, while cheering for the Metro City Hawks basketball team each
    winter and watching the local youth soccer league, the Tiny Titans, on Sundays, and they relish the quiet rhythm of these solitary outings.
  arts: Soledad Cabrera immerses themselves in quiet drawing, digital art apps, and the soothing Latin lullabies of Lila Downs and the gentle drumming of Rubén Blades, while also cherishing the whimsical
    illustrations of Quentin Blake and the storybook folklore of the Golden Age of comics, and they often let these artistic influences guide their LEGO narratives.
  travel: Soledad Cabrera enjoys short family trips to the city botanical garden and a nearby beach, dreams of exploring the Grand Canyon’s rocky cliffs for texture inspiration, and hopes to visit the Space
    Center in Houston to see real rockets up close, and they plan these adventures around the quiet moments they cherish.
  culinary: Soledad Cabrera favors simple comforts like cheese quesadillas, banana pancakes, fresh strawberries, and carrot sticks, helping their mom stir batter but rarely cooking solo, and they insist
    on crunchy textures that echo the rocks they collect on nature walks.
  core: Soledad Cabrera is a six‑year‑old quiet architect‑to‑be, whose relentless curiosity fuels meticulous LEGO creations, yet constant worries and a love for solitude turn even playtime into a solitary
    quest for perfect detail, and they often lose track of time while refining each piece.
background:
  cultural: Soledad comes from a bilingual Hispanic household with Mexican‑American roots. Spanish is spoken at home alongside English, and family traditions like Día de los Muertos, Cinco de Mayo, and
    holiday tamales introduce her to cultural music, stories, and foods. Living in Fountain Valley, CA, she experiences a multicultural community but maintains strong ties to her heritage through family
    gatherings, storytelling, and participation in local cultural festivals.
