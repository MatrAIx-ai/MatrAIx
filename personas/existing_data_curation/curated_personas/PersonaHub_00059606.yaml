persona_description: A historian who specializes in the study of Filipino migration to Mexico and the Americas from the Sixteenth Century, and the impact of this migration on both cultures. Has conducted
  hundreds of interviews with family members, viewed their photographs and documents, and filmed and recorded interviews with family elders, and has also done his own research. Has a deep knowledge and
  understanding of Filipino American history, and is eager to share his knowledge and insights with others. Has a passion for Filipino culture and its connection to Mexican culture, and is interested in
  the impact of this connection on both cultures. Is interested in the history of migration and its impact on individuals and communities, and is dedicated to researching and understanding this topic.
