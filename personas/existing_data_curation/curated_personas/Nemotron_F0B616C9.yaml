personas:
  professional: Wei Wong, a budding architect-in-the-making, channels their curiosity and love of LEGO cities into sketching elaborate skylines on notebook paper, using their inventive mind and relaxed
    approach to turn spontaneous ideas into detailed drawings that often surprise teachers with their imagination.
  sports: Wei Wong loves snorkeling at the local beach during summer, practices soccer with the Coastal Kids Soccer Club on weekends, cheers for the Seattle Seahawks during football season, and enjoys watching
    youth swimming lessons at the community pool, balancing energetic bursts with a preference for small‑team games over large crowds.
  arts: Wei Wong immerses themselves in drawing fantastical kingdoms, watches animated classics like My Neighbor Totoro and Pixar’s Up, often hums the soothing piano pieces of Yiruma while tapping along
    to BTS’s latest pop hits, and participates in simple calligraphy practice during Lunar New Year celebrations, blending traditional and modern influences in their creative play.
  travel: Wei Wong’s travel wishes swing between building sandcastles on Queensland’s Gold Coast, exploring the space exhibit at Houston’s Space Center, and taking short road trips to nearby nature reserves
    where they collect seashells, prefer family‑planned itineraries with plenty of free play time, and dream of a future trip to the Kennedy Space Center.
  culinary: Wei Wong delights in slurping steaming ramen, munching pepperoni pizza slices, and attempting to roll simple cucumber‑avocado sushi with a plastic mat, but they often forget to finish their
    vegetables, rely on Mom to add a splash of soy sauce for flavor, and view cooking as a playful experiment rather than a chore.
  core: Wei Wong is a curious, art‑loving seven‑year‑old who builds LEGO cities, daydreams about space, and prefers quiet play over noisy crowds, all while occasionally losing their socks in a creative
    mess.
background:
  cultural: Wei comes from an East Asian family that blends heritage traditions with life in Costa Mesa, California. He grows up bilingual—speaking English at school and his family's native language at
    home—and participates in cultural events like Lunar New Year, Mid‑Autumn Festival, and community cultural workshops. The emphasis on harmony, respect, and curiosity within his household and the diverse
    Orange County community shapes his open‑minded, flexible outlook.
