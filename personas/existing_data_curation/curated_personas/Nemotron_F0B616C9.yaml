  career_goals: Even at seven, Wei dreams of careers that blend creativity, exploration, and helping others. He imagines becoming an astronaut who discovers new worlds, an illustrator who tells stories
    through art, or an environmental scientist who invents solutions to protect nature. He values flexible, imaginative paths that let him keep learning and make a positive impact.
