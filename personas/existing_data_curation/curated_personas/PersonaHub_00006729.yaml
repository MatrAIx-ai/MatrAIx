  the diversity of all 32,000 species of terrestrial vertebrates in three dimensions: phylo-temporal diversity, compositional diversity, and trait diversity. The scientist aims to determine relationships
  among these dimensions of biodiversity and predict impending changes in these relationships through the use of extinction risk data. This scientist is likely to have expertise in collecting and analyzing
  biodiversity data, as well as in understanding the relationships between different dimensions of biodiversity.'
