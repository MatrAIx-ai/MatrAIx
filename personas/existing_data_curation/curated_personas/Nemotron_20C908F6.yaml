personas:
  professional: Delani Thoms is a veteran shipbuilding assembler and fabricator with over three decades of expertise in blueprint interpretation, precision welding, and safety compliance; they apply a methodical,
    structured mindset and calm authority to train new hires and lead small maintenance teams at the Newport News plant.
  sports: Delani Thoms enjoys low‑impact fitness such as daily waterfront walks and weekly pickleball matches with the Newport News Senior Walking Club, follows the Washington Capitals in hockey, the Washington
    Commanders in football, and occasionally watches the Washington Nationals for summer baseball, preferring structured routine over high‑intensity workouts.
  arts: Delani Thoms engages deeply with creative expression through traditional beadwork, pipe‑making, and participation in tribal storytelling circles, while also finding inspiration in folk legends like
    Joan Baez and the paintings of Andrew Wyeth, often listening to acoustic guitar sessions while crafting.
  travel: Delani Thoms prefers thoughtfully planned, moderate‑pacing trips that blend nature and heritage, having explored Shenandoah National Park and Charleston, SC, and intending to visit the coastal
    villages of Cornwall, UK, they favor short road trips with guided heritage tours rather than impromptu backpacking adventures, balancing travel costs with a modest retirement budget.
  culinary: Delani Thoms enjoys cooking simple yet flavorful meals, often preparing herb‑infused trout with rosemary and sage from their garden, wild rice pilaf with dried cranberries, and a seasonal root
    vegetable stew featuring dandelion greens and sweet potatoes, reflecting a moderate skill level and a preference for wholesome, home‑grown ingredients.
  core: Delani Thoms blends meticulous craftsmanship with quiet reverence for nature, habitually double‑checking every weld and garden seed, yet occasionally misplaces their glasses while reading blueprints,
    embodying a calm, structured yet slightly absent‑minded spirit.
background:
  cultural: Delani is of Eastern Woodland American Indian descent, tracing her lineage to the Pamunkey and Chickahominy peoples of Virginia. She was raised in a community that emphasized respect for the
    land, collective responsibility, and the preservation of cultural practices such as seasonal ceremonies, traditional crafts, and oral histories. While living in Newport News, she remains active in the
    local tribal council, attending cultural events, and integrating indigenous perspectives on environmental stewardship into her everyday life.
attributes:
  skills: '[''precision welding'', ''metal fabrication'', ''blueprint interpretation'', ''machinery troubleshooting'', ''quality inspection'', ''safety compliance'', ''team coordination'', ''basic CNC programming'']'
  hobbies: '[''gardening'', ''traditional beadwork'', ''pipe making'', ''river trail walking'', ''tribal storytelling circles'', ''heritage museum volunteering'']'
  career_goals: Delani aims to transition from hands‑on assembly to a mentorship and safety‑lead role, where she can formalize training programs for emerging fabricators and improve process reliability.
    She also hopes to document and share best‑practice guidelines within her plant, ensuring that future generations inherit a stable, well‑structured work environment. In the longer term, she envisions
    advising on ergonomic workstation design to reduce strain for veteran workers like herself.
