personas:
  professional: Neil Castillo is a senior mechanical engineer with a focus on sustainable infrastructure, wielding advanced finite element analysis, CFD, and CAD tools while leveraging their methodical,
    data‑driven mindset to lead multidisciplinary teams and translate complex environmental regulations into concrete design solutions, and their curiosity for the arts fuels innovative aesthetic considerations
    in public works.
  sports: Neil Castillo enjoys seasonal outdoor activities, hiking the Black Hills in summer, ice‑fishing on Lake Oahe in winter, and cycling rural roads, while cheering for the Minnesota Vikings, Minnesota
    Twins, and locally supporting the Sioux Falls Skyforce, and is a member of the Black Hills Hiking Club and the Lake Oahe Anglers Association.
  arts: Neil Castillo blends art and engineering by frequenting the Washington Pavilion in Sioux Falls and the Minneapolis Institute of Art, photographing prairie sunsets reminiscent of Ansel Adams, playing
    acoustic guitar to renditions of Joni Mitchell and Bob Dylan at community gatherings, and studying the contemporary sculptures of Mark Ryden, often citing exposure to these works as inspiration for
    ergonomic designs.
  travel: Neil Castillo prefers curated road trips that balance adventure and comfort, having explored the Badlands National Park, driven the historic Route 66 segment in South Dakota, visited the Gorges
    du Verdon in France, and plans a future trek to Patagonia’s Torres del Paine, all while budgeting trips with a mix of off‑season airfare deals and a well‑stocked travel fund.
  culinary: Neil Castillo’s palate favors Midwestern wild game and freshwater fish, such as bison ribeye marinated with sage and smoked trout paired with foraged chanterelle sauce, they possess solid intermediate
    cooking skills, often experimenting with sourdough starter, local honey, and fire‑roasted corn, while enjoying occasional visits to farm‑to‑table restaurants for a gourmet elk burger topped with aged
    cheddar.
  core: Neil Castillo is a methodical, curiosity‑driven engineer who balances sustainable design, late‑night photography, and a disciplined yet occasional splurge lifestyle, all while navigating mild health
    issues with disciplined routines and a love for prairie hikes and classic rock guitar sessions.
background:
  cultural: Neil grew up in a Midwestern small town in a family of German‑Irish ancestry, raised in the Lutheran tradition, which instilled values of diligence, modesty, and community service. Living most
    of his adult life in Vermillion, South Dakota, he blends the region’s agricultural roots and rugged outdoor culture with an academic environment at the University of South Dakota. He respects the local
    Lakota heritage, participating in cultural awareness events, and incorporates the Midwest’s emphasis on practicality and resilience into his personal and professional life. His cultural identity is
    a fusion of traditional Midwestern values, a strong work ethic, and a lifelong appreciation for art and new ideas.
attributes:
  skills: '["Finite Element Analysis", "Computational Fluid Dynamics", "SolidWorks", "AutoCAD", "Python", "MATLAB", "R", "Project Management", "Systems Integration", "Data Analysis", "Risk Assessment",
    "Technical Writing", "Grant Writing", "Mentoring"]'
  hobbies: '["Photography", "Hiking", "Fishing", "Cycling", "Woodworking", "Acoustic Guitar", "Visiting Art Galleries", "Reading Science Fiction", "Reading Philosophy", "Community Historical Society Volunteering"]'
  career_goals: Neil aims to transition into a senior advisory role within the regional transportation department, shaping sustainable infrastructure policy for the Midwest. He also aspires to co‑author
    a textbook on green engineering practices and to initiate a community outreach program that connects high school students with real‑world engineering projects. In the next five years, he hopes to secure
    a leadership position in a multidisciplinary research consortium focused on renewable energy integration, while preparing for phased retirement that includes part‑time consulting and teaching at the
    University of South Dakota.
