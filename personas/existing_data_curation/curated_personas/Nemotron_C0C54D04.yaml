personas:
  professional: Arnold Guitreau, a budding explorer of sensory experiences who treats building blocks as a makeshift engineering lab, demonstrates early problem‑solving skills and an uncanny ability to
    ask why that reflects their curious, relaxed, and sociable nature.
  sports: Arnold Guitreau, an energetic toddler who idolizes the New York Yankees on TV, mimics soccer moves from the local youth club the City Strikers, and participates in a weekly toddler gymnastics
    session at BrightStars Play Center, demonstrating a playful but slightly disorganized commitment to staying active.
  arts: Arnold Guitreau, a curious little art enthusiast who repeatedly sings Sesame Street’s C Is For Cookie, gazes at Mary Blair’s colorful Disney concept art, and attempts crayon sketches reminiscent
    of Dr. Seuss, letting their vivid imagination shape every play session.
  travel: Arnold Guitreau, a sociable explorer who has already splashed through the city aquarium, stared wide‑eyed at the Grand Canyon on a family road trip, and now day‑dreams about catching a glimpse
    of the Eiffel Tower’s sparkle, preferring spontaneous, parent‑led adventures over rigid itineraries.
  culinary: Arnold Guitreau, a picky yet adventurous eater who adores cheesy macaroni, banana slices, and the occasional bite of avocado toast, proudly helps stir the pot with a tiny wooden spoon, and insists
    on sprinkling cinnamon on everything, reflecting a playful yet sometimes messy approach to food.
  core: Arnold Guitreau, the endlessly curious two‑year‑old who can turn a simple cardboard box into a spaceship, refuses to nap on schedule, and insists on wearing mismatched socks, epitomizes a blend
    of spontaneous joy and charming disorganization.
background:
  cultural: Arnold comes from a white, Midwestern American family with French‑Canadian ancestry, reflected in his surname. Growing up in Sioux Falls, South Dakota, he experiences a culture that values community
    gatherings, outdoor activities, and family traditions. Local influences include participation in neighborhood park events, early exposure to community arts programs, and a blend of American and French‑Canadian
    customs celebrated by his family.
