personas:
  professional: Elizabeth Cote, a veteran administrative specialist with four decades of secretarial experience in a small-town setting, leverages her meticulous filing expertise and dual fluency in legacy
    office software and modern cloud tools to methodically digitize municipal records for the local historical society while mentoring a junior clerk with exacting patience and gentle assertiveness.
  sports: Elizabeth Cote enjoys leisurely walks in the town park each morning, follows the regional minor‑league baseball team, the Riverbend Rookies, and participates in a senior walking club that meets
    twice weekly, preferring low‑impact activity that fits her structured routine.
  arts: Elizabeth Cote finds solace in knitting intricate quilts while listening to the timeless piano works of Debussy and the vocal harmonies of the local church choir, and she regularly discusses the
    novels of Jane Austen and Louisa May Alcott with her book club, often quoting passages with theatrical flair.
  travel: Elizabeth Cote prefers short, well‑planned road trips to historic sites such as Colonial Williamsburg and the literary town of Bath, England, where she can explore Jane Austen’s legacy, but avoids
    long‑haul travel that would disrupt her garden’s seasonal cadence and her tightly managed budget.
  culinary: Elizabeth Cote favors home‑cooked, comfort‑food meals like chicken pot pie with a flaky crust, roasts seasoned with rosemary and thyme, and she enjoys preserving garden vegetables by canning
    carrots, beets, and tomatoes, though she often forgets to label the jars promptly.
  core: Elizabeth Cote, a 70‑year‑old meticulous archivist and garden‑enthusiast, channels her love of order into preserving town history, knitting, and cautious financial stewardship, while occasionally
    battling worry‑induced forgetfulness and a penchant for over‑planning.
background:
  cultural: 'Born and raised in the Midwest, Elizabeth embodies the values of a white, small‑town community in Illinois: practicality, modesty, and a strong sense of civic duty. Her upbringing emphasized
    hard work, punctuality, and respect for tradition, often reinforced by regular attendance at a Protestant church. The local culture cherishes community events such as county fairs, church potlucks,
    and volunteer service, all of which have shaped her cooperative yet self‑reliant outlook. While she appreciates her heritage, Elizabeth’s experiences have also taught her to navigate change cautiously,
    preferring the familiar rhythms of rural life and the predictable structure of her daily routines.'
