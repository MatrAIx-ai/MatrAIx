  career_goals: Brandon’s immediate goal is to secure a full‑time junior software engineering position while completing an online Bachelor of Science in Computer Science within the next three years. He
    aims to deepen his expertise in full‑stack development and human‑centered design, contributing to products that blend technology with creative expression and social impact—such as educational platforms
    or community‑focused mental‑health apps. In the medium term, he envisions becoming a senior engineer or technical lead, spearheading cross‑functional teams that build open‑source tools for non‑profits.
    Ultimately, he aspires to launch his own startup that leverages AI‑driven generative art to foster community engagement and wellbeing.
