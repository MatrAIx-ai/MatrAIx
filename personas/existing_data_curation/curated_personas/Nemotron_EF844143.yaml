personas:
  professional: Felix Pedraza, a 31‑year‑old material mover, leverages meticulous inventory control, forklift expertise, and bilingual communication to streamline warehouse operations, while their talkative
    nature makes them the go‑to mentor for new crew members and their curiosity drives them to constantly seek process improvements.
  sports: Felix Pedraza, an avid soccer enthusiast, spends Saturday afternoons in the Washington County community league playing midfield, follows the Seattle Sounders FC with fervor, and complements the
    rough‑and‑tumble pickup games with early‑morning jogs and occasional strength‑training at the local YMCA.
  arts: Felix Pedraza channels their sociable spirit through nightly guitar sessions covering Los Tigres del Norte and Juan Gabriel, regularly attends local folk‑dance performances, and draws inspiration
    from the storytelling of director Guillermo del Toro, all of which fuel their charismatic presence at community gatherings.
  travel: Felix Pedraza prefers well‑planned road trips that blend cultural immersion and culinary discovery, having recently driven to Oaxaca for its vibrant markets and dreaming of a future caravan through
    the Pacific Northwest’s Olympic National Park, all while balancing limited savings and family obligations.
  culinary: Felix Pedraza, a confident home chef, delights in slow‑cooking pozole with hominy, ancho chilies, and pork shoulder, perfects street‑style tacos al pastor with pineapple and adobo, and often
    experiments with fresh cilantro and lime to elevate neighborhood potluck spreads, though they occasionally forget to refrigerate leftovers.
  core: Felix Pedraza is a curiosity‑driven logistics whiz who loves leading dance circles, obsessively tracks every worry in a journal, and can’t resist a midnight taco run, even if it means staying up
    past their bedtime.
background:
  cultural: Felix grew up in a Mexican immigrant household where family meals, Catholic traditions, and celebrations like Día de los Muertos were central. He maintains close ties to his heritage through
    language, food, and participation in local Mexican community events in Hagerstown. While he embraces American customs and enjoys the regional outdoors, his cultural identity is expressed in bilingual
    communication, pride in his Mexican roots, and a strong sense of community responsibility, often volunteering at cultural festivals and helping new immigrants adjust to life in Maryland.
attributes:
  skills: '[''forklift operation'', ''inventory management'', ''logistics coordination'', ''equipment maintenance'', ''OSHA safety compliance'', ''bilingual communication (Spanish/English)'', ''team leadership'',
