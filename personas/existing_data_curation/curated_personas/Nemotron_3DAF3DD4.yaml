  career_goals: Thawng aims to establish a multicultural arts center adjacent to his church that offers workshops linking visual arts with spiritual practice for youth and adults. He plans to publish a
    book exploring the relationship between imagination and faith, and to pursue a Doctorate in Theology to deepen his academic grounding. He aspires to become a regional director for his denomination's
    outreach network, fostering interfaith collaborations across the Pacific Northwest, and to mentor emerging clergy who navigate both Eastern heritage and Western religious contexts.
