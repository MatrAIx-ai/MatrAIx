  hobbies: '[''Oil Painting'', ''Calligraphy'', ''Reading Philosophical Literature'', ''Traditional Vietnamese Music (đàn tranh)'', ''Hiking'', ''Cooking Vietnamese Cuisine'', ''Meditation'', ''Community
