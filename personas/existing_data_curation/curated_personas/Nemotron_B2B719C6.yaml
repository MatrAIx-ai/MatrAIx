  career_goals: Helen aims to earn her CPA license within the next year and advance to a senior audit manager position, ultimately pursuing partnership or a director role within her firm. She is motivated
    to lead initiatives that integrate data analytics and sustainability reporting into traditional audit practices, positioning her as a strategic advisor. Long‑term, she envisions transitioning to a CFO
    role in a mid‑size technology or biotech company, where she can blend her technical acumen with broader business leadership while mentoring the next generation of accountants.
