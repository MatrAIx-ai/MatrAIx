personas:
  professional: Helen Cummings is a senior audit specialist at a mid‑size public accounting firm, blending meticulous GAAP knowledge with advanced Excel, SQL, and Tableau analytics to streamline audit processes
    while championing sustainability reporting and mentoring junior staff as they prepare for CPA certification.
  sports: Helen Cummings spends most weekends hiking the Berkshires’ Appalachian Trail loops, participates in a local running club’s 5 K races, and roots for the Boston Red Sox, Celtics, and Patriots, while
    they also cheer on the New England Revolution’s soccer matches when time permits.
  arts: Helen Cummings paints watercolors inspired by Claude Monet’s light palette, regularly reads historical fiction by Philippa Gregory in a community book club, and attends live acoustic sets featuring
    artists like John Mayer and local Amherst Stage productions, allowing their creative side to balance the analytical demands of their career.
  travel: Helen Cummings plans trips with the same spreadsheet precision they use at work, favoring New England leaf‑peeping getaways to the White Mountains and weekend escapes to Cape Cod, while daydreaming
    about historic European cities such as Bath and Prague for future cultural immersion.
  culinary: Helen Cummings enjoys seasonal cooking, often whipping up roasted butternut squash risotto with sage, pairing it with a crisp New England white wine, and experiments with classic New England
    clam chowder and cranberry‑apple crisp, showcasing an intermediate skill level that blends comfort food with occasional culinary daring.
  core: Helen Cummings balances a spreadsheet‑obsessed mind with a love for solitary hikes, watercolor splatters, and occasional wine indulgences, all while occasionally forgetting to water their houseplants.
background:
  cultural: Helen grew up in a middle‑class New England family with deep roots in Massachusetts, tracing ancestry to early Anglo‑American settlers. Her upbringing emphasized education, community involvement,
    and self‑reliance, typical of the region's cultural ethos. She celebrates traditional American holidays and participates in local Amherst events such as farmer's markets and town hall discussions. Her
    cultural perspective blends a respect for the region's historical heritage with an openness to new ideas, shaped by the academic environment of nearby UMass Amherst and the progressive values of the
    broader Massachusetts community.
