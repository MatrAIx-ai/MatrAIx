personas:
  professional: A budding storyteller named Eduardo Calderon delights in turning everyday objects into imaginative narratives, building block castles and drawing vivid pictures, hinting at future creative
    pursuits.
  sports: A lively playground enthusiast, Eduardo Calderon joins toddler soccer sessions at the community park, cheers for the local baseball team, the Chicago Cubs, on TV, and loves splash‑time at the
    municipal pool.
  arts: A music‑loving explorer, Eduardo Calderon frequently sings along to Raffi's 'Baby Beluga', dances to The Wiggles' upbeat tunes, and spends afternoons finger‑painting bright swirls, showing a precocious
    appetite for artistic expression.
  travel: An inquisitive explorer, Eduardo Calderon has visited Grandma’s countryside cottage, taken a family road trip to Disneyland in California, and dreams of a future trip to the beaches of Cancun,
    reveling in new sights and sounds.
  culinary: A messy eater with a zest for flavor, Eduardo Calderon enjoys chicken nuggets, mac and cheese, sweet banana slices, and loves experimenting with tiny forks to scoop peas, often making a joyful
    mess at the kitchen table.
  core: Eduardo Calderon, a two‑year‑old whirlwind of imagination, boundless energy, and tender compassion, turns every moment into a playful adventure while occasionally losing socks in the laundry, and
    they love sharing their toys with friends.
background:
  cultural: Eduardo grows up in a Cuban‑American household in Miami, where Spanish and English flow together at home. His family celebrates Cuban traditions such as cooking ropa vieja for holidays, playing
    salsa and reggaetón during gatherings, and sharing stories of the island’s heritage. These cultural experiences shape his love for rhythmic music, vibrant colors, and close‑knit family bonds, all of
    which influence his daily play, language use, and emerging sense of identity.
attributes:
  skills: '[''basic verbal communication'', ''recognizing colors and shapes'', ''fine motor coordination for drawing and building'', ''imaginative pretend play'', ''early empathy and cooperative interaction'']'
  hobbies: '[''drawing with crayons'', ''building blocks'', ''dancing to Latin music'', ''listening to picture books'', ''pretend kitchen play'', ''playing at the park'']'
  career_goals: Although only two years old, Eduardo frequently talks about wanting to become a "helper"—he imagines himself as a friendly doctor caring for animals, a storyteller who shares picture books,
    or a firefighter who rescues people. He is motivated by a desire to make others happy, to draw pictures for his family, and to learn new things that let him care for his community.
