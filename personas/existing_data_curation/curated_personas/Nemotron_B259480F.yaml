  career_goals: Dasean aims to advance to a senior lead technologist role where he can steer multidisciplinary projects that emphasize sustainable and energy‑efficient solutions. He intends to earn a Professional
    Engineer (PE) licensure and a PMP certification to broaden his leadership credentials. Over the next five years, he plans to spearhead a small R&D team focused on renewable energy integration for industrial
    processes, mentor emerging Black engineers, and eventually launch a consulting firm that offers expertise in lean manufacturing and green technology adoption for regional manufacturers.
