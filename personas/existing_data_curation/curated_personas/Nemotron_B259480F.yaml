personas:
  professional: Dasean Woods, a 41‑year‑old engineering technologist in Texas, they blend mechanical and electrical expertise with a keen aesthetic sense to deliver CAD‑driven, PLC‑programmed solutions
    that are both functionally rigorous and visually refined, while their competitive drive pushes them to constantly optimize processes and document every step with meticulous precision.
  sports: Dasean Woods, they spend Saturday mornings fishing at Galveston Bay and attend Houston Astros games whenever possible, they are a member of a local adult softball league and follow the Houston
    Rockets, yet they rarely engage in intensive gym workouts, preferring low‑impact activities that fit their reserved schedule.
  arts: Dasean Woods, they frequent the Museum of Fine Arts, Houston and the contemporary galleries of the Montrose area, they practice street photography of urban textures, and they curate a modest collection
    of works by artists such as Kehinde Wiley, Kara Walker, and James Turrell, often analyzing each piece for both visual composition and engineering symmetry.
  travel: Dasean Woods, they plan trips with the same spreadsheet precision they use at work, favoring weekend getaways to coastal towns like Galveston and cultural excursions to New Orleans for jazz and
    cuisine, they dream of a month‑long tour of Iceland’s geothermal sites, but family commitments keep longer vacations rare.
  culinary: Dasean Woods, they enjoy cooking Southern‑inspired meals such as shrimp and grits, jambalaya, and pecan pie, they expertly season dishes with smoked paprika and cayenne, yet they admit to over‑salting
    sauces when experimenting, and they regularly source fresh fish from the Galveston market.
  core: Dasean Woods, a methodical but curious technologist, they fuse engineering precision with artistic flair, channel competitive drive into sustainability projects, balance disciplined finances with
    occasional art splurges, and relish solitary fishing trips as a quiet escape.
background:
  cultural: Dasean identifies as African American and grew up in the Houston metropolitan area, where the rich tapestry of Black culture—music, food, and community solidarity—shaped his worldview. He celebrates
    Juneteenth, participates in local church gatherings, and remains connected to extended family traditions that emphasize perseverance and collective uplift. His heritage informs his commitment to representation
    in engineering, and he actively mentors Black students to broaden diversity within the technical workforce. Living in Pearland, he blends Southern Texan influences with his cultural roots, creating
    a unique personal identity that honors both his ancestry and the multicultural environment of the Gulf Coast.
