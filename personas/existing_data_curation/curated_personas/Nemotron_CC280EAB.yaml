  career_goals: Herman dreams of becoming an illustrator or comic‑book artist, where he can combine his love of art and storytelling. He is also fascinated by wildlife and imagines a future as a wildlife
    biologist who sketches animals in their habitats. He hopes to create interactive educational games that teach kids about nature and art. By the time he reaches high school, he aims to have a polished
    portfolio of artwork and plans to attend a summer art camp to hone his skills.
