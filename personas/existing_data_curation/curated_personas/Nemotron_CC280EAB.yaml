personas:
  professional: Herman Mcdougall is a budding junior game developer who builds intricate LEGO landscapes while coding simple Scratch adventures, leveraging their meticulous attention to detail and love
    for solitary, imaginative creation.
  sports: Herman Mcdougall prefers solo jogging through the local park and participates in the after‑school cross‑country club, while occasionally cheering from the sidelines for the River City Rattlers
    minor‑league baseball team.
  arts: Herman Mcdougall channels their love for fantasy into daily sketching of woodland creatures, practices the recorder to John Williams' Hedwig's Theme, and admires the watercolor paintings of Claude
    Monet, turning each creative outlet into a quiet personal gallery.
  travel: Herman Mcdougall has explored Yellowstone National Park on a school field trip and dreams of wandering the misty fjords of New Zealand's South Island, favoring carefully planned, low‑key family
    vacations that allow plenty of time for leaf‑collecting and quiet observation.
  culinary: Herman Mcdougall delights in cheesy macaroni, homemade mushroom pizza, and banana‑blueberry muffins they whisk together with a child‑sized mixing bowl, though they often neglect to rinse their
    hands after sticky candy and tend to over‑season their soup with too much pepper.
  core: Herman Mcdougall is a quietly curious nine‑year‑old who builds worlds from LEGO and code, savors solitary adventures, yet habitually leaves candy wrappers scattered around their desk.
background:
  cultural: Herman grows up in a middle‑class family in Seekonk, Massachusetts, a town known for its close‑knit community and proximity to the Rhode Island coastline. His household reflects typical New
    England values of self‑reliance, modesty, and respect for tradition, while also encouraging curiosity and learning. The family celebrates American holidays such as Thanksgiving and the Fourth of July
    with community barbecues and local fireworks, and they often take summer trips to nearby beaches like Narragansett. He attends a public elementary school where the curriculum emphasizes reading, math,
    and arts integration, and he participates in after‑school programs at the local library that expose him to art workshops and basic coding clubs. His grandparents introduced him to classic American children's
    literature and folk songs, shaping his appreciation for storytelling. The multicultural atmosphere of the Bristol County area, with a mix of ethnic backgrounds, provides him with exposure to diverse
    communities, though his immediate cultural context remains rooted in a white New England tradition that values education, outdoor recreation, and community involvement.
