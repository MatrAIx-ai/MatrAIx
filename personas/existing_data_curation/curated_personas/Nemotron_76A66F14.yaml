personas:
  professional: Miozoty, a 16‑year‑old student council member and aspiring arts manager, channels their meticulous organization, boundless curiosity about visual culture, and bilingual communication into
    coordinating school exhibitions, leading community art festivals, and mentoring peers, where they consistently set high standards and thrive on collaborative creativity despite occasional self‑doubt.
  sports: Miozoty, a 16‑year‑old energetic teen, plays on the school soccer team, jogs with the local track club, follows the Cangrejeros de Santurce basketball squad and the New York Yankees baseball team,
    and spends weekend hikes on the Gurabo trails, combining structured athletic training with a love for community sports camaraderie.
  arts: Miozoty, a 16‑year‑old digital illustrator and avid graffiti explorer, sketches street murals in San Lorenzo, creates Procreate artworks inspired by Bad Bunny’s reggaetón beats, Marc Anthony’s salsa
    rhythms, and Tame Impala’s indie vibes, watches graphic novels like 'Saga', and volunteers at the municipal library’s art corner, where they blend traditional jíbaro motifs with contemporary urban flair
    while meticulously planning each project.
  travel: Miozoty, a 16‑year‑old adventurous planner, has visited Old San Juan, the beaches of Culebra, and spent a school trip in New York City, now dreams of wandering Barcelona’s street‑art festivals
    and exploring Mexico City’s mural districts, preferring group itineraries that balance budget constraints with immersive cultural experiences, though they often stress about coordinating schedules.
  culinary: Miozoty, a 16‑year‑old food enthusiast, loves cooking arroz con gandules with sofrito, frying alcapurrias stuffed with seasoned meat, and blending tropical fruit smoothies with mango and pineapple,
    yet often skips breakfast for late‑night study sessions, leading to occasional indulgence in street‑food empanadillas and a habit of over‑seasoning dishes in a quest for bold flavors.
  core: Miozoty, a 16‑year‑old organized, art‑obsessed teen, balances school leadership with a persistent worry about perfection while dancing through life’s colorful murals and dreaming of curating community
    exhibitions.
background:
  cultural: Miozoty grew up in San Lorenzo, a barrio of Gurabo, immersed in Puerto Rico's blend of Caribbean and American influences. Her family speaks Spanish at home and celebrates traditions such as
    Día de los Reyes, San Sebastián, and the vibrant parranda season. She identifies with the island's jíbaro heritage, valuing close family ties, community solidarity, and a love for music, dance, and
    food like arroz con gandules and alcapurrias. The multicultural environment of Puerto Rico, with its Afro‑Latino rhythms, Catholic customs, and contemporary urban culture, shapes her worldview and fuels
    her appreciation for artistic expression.
attributes:
  skills: '["Time management", "Project planning", "Public speaking", "Leadership in student groups", "Drawing and sketching", "Digital illustration (Procreate, Photoshop)", "Basic Python programming",
