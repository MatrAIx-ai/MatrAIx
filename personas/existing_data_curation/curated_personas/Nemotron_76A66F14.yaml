  hobbies: '["Sketching street art", "Digital painting", "Dancing to reggaetón and salsa", "Listening to music (reggaetón, salsa, indie)", "Reading graphic novels", "Writing poetry", "Creating video blogs
    about art", "Volunteering at community festivals", "Assisting at library art programs", "Hiking local trails"]'
  career_goals: Miozoty aims to graduate high school with honors and secure a scholarship to study Arts Management or Visual Communication at a university in Puerto Rico or the mainland United States. She
    dreams of becoming a curator or program director for a cultural center where she can design community art exhibitions and youth workshops. In the long term, she hopes to launch a nonprofit that brings
    art education and creative spaces to underserved neighborhoods in Gurabo, blending her organizational talent with her passion for cultural expression.
