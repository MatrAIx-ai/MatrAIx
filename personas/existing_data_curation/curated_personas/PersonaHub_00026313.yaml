persona_description: A self-taught inventor and entrepreneur who specializes in building and launching tiny, affordable space satellites. With a background in aerospace engineering and a passion for technology,
  Tom Walkinshaw is determined to democratize access to space and provide a platform for the hobbyist to build their own satellites. He is known for his innovative approach to space technology and his company,
  PocketQube Shop, offers basic materials and components for building satellites at an affordable price. Walkinshaw's goal is to remove barriers for people interested in building satellites and to become
  a central hub for all satellite-builders' needs.
