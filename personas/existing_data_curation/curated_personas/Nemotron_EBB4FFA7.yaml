personas:
  professional: Cynthia Suarez, an emerging 10‑year‑old comic‑strip creator, channels their love for structured fantasy stories into weekly illustrated panels after school while they balance homework and
    help with family chores in a laid‑back but practical routine.
  sports: Cynthia Suarez plays forward on a small community soccer team that practices on Saturday mornings at the local park, avidly cheers for the Los Angeles Galaxy women's squad and the U.S. women's
    national soccer team, and they cycle to the field on a bright‑orange bike, all while preferring the intimacy of a close‑knit group of teammates over big crowds.
  arts: Cynthia Suarez delights in drawing vivid comic characters inspired by the epic quests of J.K. Rowling and the colorful panels of Stan Lee, while the rhythmic beats of cumbia artist Carlos Vives
    and reggaeton star Bad Bunny fill their bedroom, shaping both their artistic style and the music they stream during study sessions.
  travel: Cynthia Suarez prefers weekend getaways that blend adventure with family time, such as biking the scenic trails of Griffith Park, visiting the interactive exhibits at the California Science Center,
    and dreaming of a future road trip to Yosemite National Park’s towering waterfalls and the historic streets of Barcelona during school break, although they sometimes struggle to pack everything needed
    for a day trip.
  culinary: Cynthia Suarez helps knead masa and fill flat corn cakes with cheese and refried beans for weekend pupusas, savors the melty cheese and tangy pickled cabbage that accompany them, and they also
    enjoy pizza with pepperoni and homemade guacamole, often experimenting with adding fresh cilantro to their dishes.
  core: Cynthia Suarez is a practical yet imaginative 10‑year‑old who balances structured fantasy storytelling with family cooking rituals, a love of soccer, and a relaxed approach to chores and finances,
    often juggling a chaotic allowance and the occasional forgotten homework assignment while they navigate school life.
background:
  cultural: Cynthia is a second‑generation Salvadoran‑American. She speaks Spanish at home and celebrates Salvadoran traditions such as making pupusas with her family, observing Día de los Muertos with
    community altars, and participating in local festivals organized by the Salvadoran community in Moreno Valley. Catholic values, close family ties, and a blend of Salvadoran cuisine and Southern California
    multicultural influences shape her daily life.
attributes:
  skills: '[''reading comprehension'', ''bilingual communication (English-Spanish)'', ''elementary mathematics'', ''digital literacy (tablet use)'', ''drawing and sketching'', ''basic cooking (pupusas)'',
    ''team collaboration in small-group projects'', ''peer tutoring'']'
  hobbies: '[''reading fiction'', ''drawing/illustration'', ''soccer (small group)'', ''biking in local parks'', ''listening to Salvadoran music'', ''cooking family recipes'']'
  career_goals: Cynthia dreams of becoming a librarian or teacher, where she can share her love of books, support other children’s learning, and preserve cultural stories from her Salvadoran heritage. She
    also hopes to one day open a small bakery that serves traditional Salvadoran dishes, combining her interest in cooking with community service.
