personas:
  professional: Jeanette Goldsmith is a methodical health‑service manager with a graduate business background who leverages data‑driven strategic planning, rigorous financial stewardship, and regulatory
    expertise to streamline operations, improve patient outcomes, and mentor emerging women leaders while championing diversity in healthcare.
  sports: Jeanette Goldsmith fuels her love of the outdoors by tackling the rugged Cascades trails with the Seattle Outdoor Hiking Club, joining the Seattle Wheelmen for weekend road rides, cheering the
    Seattle Kraken while training for charity 5K runs, and practicing yoga to balance the intensity of her cycling sessions.
  arts: Jeanette Goldsmith cultivates her creative side by photographing misty mountain vistas, leading discussions on health‑policy literature in her book club, and regularly attending productions at the
    Seattle Repertory Theatre and performances by the Pacific Northwest Ballet, all while collecting limited‑edition prints of Ansel Adams.
  travel: Jeanette Goldsmith prefers meticulously planned trips that blend adventure and relaxation, having explored the coastal towns of Cinque Terre, trekked to Machu Picchu, and aspiring to hike Torres
    del Paine, all while balancing family responsibilities and budgeting for future journeys.
  culinary: Jeanette Goldsmith delights in preparing Mediterranean dishes such as grilled branzino with lemon‑oregano, falafel drizzled with tahini, and rustic ratatouille, often using Kalamata olives,
    fresh basil, and preserved lemons, and occasionally treats herself to an extra glass of red wine after dinner.
  core: Jeanette Goldsmith balances a data‑driven leadership style with a zest for community hikes, occasional overspending on gear, and a habit of forgetting evening meds when her schedule gets tight.
background:
  cultural: Jeanette grew up in a middle‑class, predominantly white neighborhood in the Pacific Northwest, with family roots tracing back to the Midwest. Her upbringing emphasized education, hard work,
    and community service. The region’s strong environmental ethic and appreciation for outdoor recreation shaped her love of nature and active lifestyle. While identifying as a white American, she respects
    the cultural heritage of local Indigenous peoples and incorporates a spirit of inclusivity and stewardship into her personal and professional life.
attributes:
  skills: '["Strategic Planning", "Financial Management", "Healthcare Operations Management", "Regulatory Compliance", "Team Leadership", "Process Improvement", "Data Analytics", "Patient Experience Enhancement",
    "Change Management", "Project Management"]'
  hobbies: '["Hiking and trail walking", "Cycling with local group", "Volunteering at community health clinics", "Organizing charity runs", "Participating in a health‑policy book club", "Cooking Mediterranean
    cuisine", "Nature photography", "Yoga and mindfulness practice", "Attending local theater productions", "Gardening"]'
  career_goals: Jeanette aims to advance to a senior executive role—such as Director of Operations or Chief Operating Officer—within a regional health system where she can shape large‑scale service delivery
    innovations. She is passionate about building collaborative, high‑performing teams, championing diversity and inclusion in healthcare leadership, and mentoring emerging women managers. Long‑term, she
    envisions influencing health policy at the state level to improve access and quality of care while maintaining a balanced, community‑focused perspective.
