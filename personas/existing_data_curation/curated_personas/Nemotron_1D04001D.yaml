  career_goals: At 61, Hakeem aims to transition from a hands-on janitorial role to a supervisory position where he can lead a facilities team and shape cleaning policies for his building complex. He plans
    to complete an OSHA certification and a short course in sustainable facility management, positioning himself as a consultant for eco-conscious cleaning solutions for local businesses. Hakeem also hopes
    to mentor younger janitors, sharing his practical knowledge while fostering a supportive work culture. Ultimately, he seeks a part-time advisory role that allows him to maintain a steady income, enjoy
    a comfortable retirement, and stay actively involved in community beautification projects.
