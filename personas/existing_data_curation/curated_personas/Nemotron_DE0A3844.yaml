  career_goals: Wendy aims to become a senior account executive within the next three years, focusing on the technology sector where she can leverage her STEM background. In the long term, she aspires to
    move into sales leadership—such as a Sales Manager or Director—where she can mentor junior colleagues and shape strategic sales initiatives. Ultimately, she dreams of launching her own consultancy that
    helps tech startups scale their sales operations, merging her passion for innovative ideas with her sales expertise.
