personas:
  professional: Wendy White leverages her STEM‑grounded technical knowledge and natural charisma to craft data‑driven sales pitches, using Excel and Tableau to uncover client pain points while their talkative,
    center‑stage energy builds rapid rapport, and their balanced yet flexible organization style keeps pipelines moving despite occasional overcommitment.
  sports: Wendy White hits the Adirondack trails every Saturday for two‑hour hikes, belongs to the Albany Running Club for early‑morning runs, cheers on the New York Knicks and the Albany Empire, and attends
    a local yoga studio’s Vinyasa class weekly, balancing structured cardio with spontaneous outdoor adventures.
  arts: Wendy White immerses themselves in the Capital Region’s arts scene by attending monthly gallery openings at the Albany Institute, catching live shows at The Hollow Bar + Kitchen featuring indie
    acts like Big Thief, participating in a pottery workshop at Upstate Clay Studio, and drawing inspiration from digital illustrators such as Beeple and contemporary novelist Sally Rooney.
  travel: Wendy White prefers weekend getaways to the Adirondacks and occasional city breaks to Montreal and Barcelona, planning trips with a mix of spontaneous flight deals and detailed itineraries for
    museum tours, while balancing a modest travel budget that forces them to prioritize experiences over luxury accommodations.
  culinary: Wendy White enjoys cooking simple yet flavorful meals, frequently whipping up avocado toast topped with smoked salmon and poached egg, experimenting with homemade ramen broth seasoned with miso
    and kombu, and savoring craft beer paired with goat cheese and roasted beet salad, reflecting a moderate cooking skill set and a love for fresh, seasonal ingredients.
  core: Wendy White blends a fierce curiosity for art and technology with talkative charm, managing anxiety through yoga while chasing sales milestones and weekend hikes, all while indulging in spontaneous
    cultural splurges and occasional budget‑busting art tickets.
background:
  cultural: Wendy was raised in a middle‑class family of English and German ancestry in the Troy area of upstate New York. The region’s mix of historic industrial roots and a burgeoning creative community
    fostered her appreciation for both practical problem‑solving and artistic expression. Her family emphasized education, community involvement, and curiosity, encouraging her sociability and openness
    to new experiences. Proximity to Albany’s cultural institutions and the Hudson River Valley’s natural landscapes reinforced a culturally diverse yet distinctly American outlook.
