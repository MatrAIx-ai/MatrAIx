personas:
  professional: Manan Nguyen, an 8‑year‑old budding engineer, blends disciplined LEGO robotics building with a love for drawing cartoon schematics on a tablet, approaching each school challenge with a competitive
    edge and meticulous organization.
  sports: Manan Nguyen, a lively member of the local youth soccer team the Tiger Cubs, spends afternoons honing dribbling skills on the field, cheers for the professional MLS side Seattle Sounders FC during
    broadcasts, and keeps fit through weekend bike rides and quick obstacle‑course drills with friends.
  arts: Manan Nguyen, an enthusiastic cartoonist on a tablet, draws inspiration from the whimsical animation of Disney, the imaginative storytelling of Hayao Miyazaki, and the dynamic comic panels of Jeff
    Smith, while their playlist mixes current pop hits from Billie Eilish with the traditional lullabies they heard at home.
  travel: Manan Nguyen, a curious explorer who favors hands‑on experiences, eagerly tours nearby science centers like the Exploratorium, dreams of stepping inside the Kennedy Space Center in Florida and
    the Natural History Museum in London, and always packs a simple checklist of sketchbooks, snack bars, and a portable charger for each family adventure.
  culinary: Manan Nguyen, a budding kitchen experimenter, loves crafting colorful fruit kebabs, devouring pepperoni pizza, trying simple cucumber‑avocado sushi rolls, perfecting a miso‑flavored ramen bowl,
    and habitually sneaking extra chocolate chips into their homemade cookies.
  core: Manan Nguyen, an eight‑year‑old prodigy balancing competitive LEGO robotics, relentless cartoon sketching, and soccer drills with meticulous allowance‑saving habits, occasionally swears off bedtime
    to finish a new drawing.
background:
  cultural: Manan comes from a Vietnamese-American family that places a high value on education, community, and cultural traditions. At home, he celebrates Vietnamese holidays such as Tet, enjoys dishes
    like pho and bánh mì, and hears stories about his family's heritage in Vietnam. Living in Sunnyvale, a multicultural hub, he is exposed to both his Southeast Asian roots and the broader American culture.
    He attends a public elementary school where he interacts with peers from many backgrounds, and his parents encourage bilingualism, so he is learning basic Vietnamese while speaking English fluently.
    This blend of influences nurtures his curiosity, respect for tradition, and openness to new ideas.
