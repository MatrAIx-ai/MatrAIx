  career_goals: Manan dreams of a future where he can combine his love of technology and art. He aspires to design interactive video games or build innovative robots that solve real-world problems, hoping
    to win state-level robotics competitions and national science fairs. His competitive spirit drives him to be recognized as the top coder in his class and, one day, to work as a software engineer or
    game developer at a leading Silicon Valley tech company. He also imagines traveling to space as an astronaut, where he could explore scientific frontiers while achieving pioneering milestones.
