personas:
  professional: Sandra Phillips, a budding social work student with a knack for visual communication, leverages her methodical planning, Adobe design expertise, and compassionate listening to coordinate
    community art projects that aim to boost mental health and social equity.
  sports: Sandra Phillips avidly follows the New England Patriots, the Boston Celtics, and the Yale Bulldogs, participates in a local running club that meets for weekend 5K runs through New Haven’s historic
    streets, and joins a co‑ed recreational soccer league every spring, balancing her love for team spirit with casual weekend hikes at Sleeping Giant State Park.
  arts: Sandra Phillips wields acrylics to channel the emotive vibrancy of Frida Kahlo and the graphic boldness of Keith Haring, frequents the New Haven Museum of Art, curates playlists that blend Miles
    Davis, Erykah Badu, and Kendrick Lamar, and engages in weekly book‑club discussions of contemporary literature that explore themes of identity and social justice.
  travel: Sandra Phillips prefers budget‑friendly, culture‑rich getaways, often backpacking through art‑laden neighborhoods of New York City, the historic streets of New Orleans, and the vibrant markets
    of Cartagena, while dreaming of a future retreat at a Caribbean island where she can combine seaside relaxation with immersive cooking workshops.
  culinary: Sandra Phillips, a self‑taught home chef, delights in mastering soulful dishes like slow‑cooked collard greens seasoned with smoked paprika, spicy jerk chicken marinated in allspice and scotch
    bonnet peppers, and creamy sweet‑potato mac and cheese, often experimenting with fresh cilantro, coconut milk, and plantain crisps while sharing meals at community potlucks.
  core: Sandra Phillips fuses a calm, methodical mind with a restless creative spirit, channeling deep compassion into community art projects while secretly hoarding extra paint tubes and binge‑listening
    to jazz podcasts late into the night.
background:
  cultural: Sandra identifies as African American, raised in a multigenerational family that values heritage, storytelling, and community service. Growing up in New Haven, she has been shaped by the city’s
    vibrant Black cultural scene, including the Yale African American Cultural Center, local gospel choirs, and neighborhood arts collectives. Family traditions such as cooking soul food, celebrating Juneteenth,
    and participating in civil‑rights commemorations have instilled in her a deep appreciation for Black history, music, and the power of collective action.
attributes:
  skills: '["Digital Illustration", "Graphic Design (Adobe Photoshop, Canva)", "Research and Academic Writing", "Public Speaking", "Event Planning and Project Coordination", "Community Outreach & Volunteer
    Management", "Active Listening and Peer Counseling", "Conflict Resolution", "Time Management", "Basic Python Programming"]'
  hobbies: '["Acrylic Painting", "Sketching", "Visiting Art Galleries and Museums", "Reading Contemporary African American Fiction", "Volunteer Mentoring at Local Youth Center", "Yoga and Mindfulness Practices",
    "Photography", "Listening to Jazz, Neo‑soul, and Hip‑hop", "Cooking Soul Food and Caribbean Dishes", "Exploring Podcasts on Social Justice and Creativity"]'
  career_goals: Sandra aims to complete her bachelor's degree in Social Work or Art Therapy, with the goal of leading community‑based arts programs that promote mental health and social equity. She envisions
    working as a program manager for a nonprofit cultural organization in New Haven, designing workshops that blend creative expression with trauma‑informed counseling. In the long term, she hopes to found
    her own nonprofit that provides free art‑therapy services and mentorship to underserved youth, leveraging her organizational skills and compassionate nature to foster empowerment and harmony.
