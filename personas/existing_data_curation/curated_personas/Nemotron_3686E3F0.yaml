    basics'']'
  hobbies: '[''Traditional Indian cooking'', ''Herb and vegetable gardening'', ''Reading historical and scientific nonfiction'', ''Chess and bridge'', ''Yoga and mindfulness'', ''Volunteer work at senior
    center'', ''Attending cultural festivals (Diwali, Navratri)'', ''Hiking nature trails'', ''Puzzle solving (crossword, Sudoku)'', ''Learning Spanish'']'
  career_goals: Although retired from formal employment, Sweta aims to deepen her impact within the Monroe Township community. She plans to become a senior volunteer coordinator for the local South Asian
    cultural association, leveraging her event‑planning expertise. She aspires to publish a community cookbook that intertwines family recipes with personal stories of migration and adaptation. Seeking
    formal knowledge, she hopes to earn a certificate in gerontology to better serve senior neighbors. Sweta also wants to expand her mentorship by leading a weekly tutoring program for high‑school students
    in the senior center, focusing on language skills and college readiness. A long‑term ambition is to serve on the Board of the Middlesex County Seniors Council, advocating for inclusive programming that
    respects cultural diversity.
