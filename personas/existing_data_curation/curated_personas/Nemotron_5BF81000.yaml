personas:
  professional: Ellen Dearmon, a 29‑year‑old systems analyst blending data‑driven rigor with a humanistic flair, translates complex technical requirements into story‑rich user experiences, while they channel
    a competitive edge into rapid‑prototyping and stakeholder consensus in agile cultural‑tech projects.
  sports: Ellen Dearmon, a devoted fan of the Atlanta Braves and Atlanta United FC, joins a local weekend kickball league, runs occasional trail runs with the Atlanta Track Club, and balances their high‑energy
    social life with occasional yoga classes when stress peaks, while they relish the camaraderie of team sports as an outlet for their competitive drive.
  arts: Ellen Dearmon, an avid sketcher who frequents the High Museum of Art, Ponce Projects, and the annual Decatur Arts Festival, enjoys live‑music shows featuring Janelle Monáe and Childish Gambino,
    and curates pop‑up poetry nights that weave data storytelling into performance art, while they constantly seek fresh collaborations that blur the line between tech and creativity.
  travel: Ellen Dearmon, who thrives on spontaneous weekend road trips to Asheville and historic Savannah, also plans meticulous cultural pilgrimages to Florence, Barcelona, and Kyoto, balancing a limited
    travel budget with a desire to experience global artistic scenes, while they prioritize venues that offer immersive museum experiences.
  culinary: Ellen Dearmon, a self‑taught home cook with intermediate skill, loves whipping up shrimp‑and‑grits with fresh Gulf oysters, mastering Korean bibimbap with gochujang, and designing eclectic dinner
    parties featuring craft cheese boards and experimental flavor pairings, while they often improvise recipes on the fly, occasionally forgetting to clean up the kitchen.
  core: Ellen Dearmon, a socially magnetic yet anxiety‑prone tech‑art hybrid, constantly juggles creative spontaneity with competitive drive, turning every networking event into a canvas for storytelling,
    while they battle the lingering worry that perfection is never enough.
background:
  cultural: Ellen grew up in a middle‑class White family in the Atlanta metropolitan area, where Southern traditions such as communal gatherings, regional cuisine, and a strong sense of neighborhood were
    part of daily life. Her parents emphasized education, literature, and cultural enrichment, encouraging frequent trips to local museums, theater productions, and music festivals. While she appreciates
    the warmth and communal values of her Southern upbringing, Ellen was also shaped by the diverse, progressive artistic milieu of Decatur, exposing her to a wide range of cultural perspectives. This blend
    of traditional Southern roots and a vibrant, multicultural arts scene informs her nuanced appreciation for history, storytelling, and innovation, which she brings to both her professional work and personal
    interests.
attributes:
  skills: '[''Systems analysis'', ''Business process modeling'', ''Requirements gathering'', ''SQL data querying'', ''Python scripting for data manipulation'', ''Data visualization (Tableau, Power BI)'',
    ''User experience research'', ''Human‑centered design'', ''Stakeholder communication'', ''Public speaking'', ''Workshop facilitation'', ''Creative problem solving'', ''Rapid prototyping'', ''Agile methodology'',
    ''Critical thinking'', ''Interdisciplinary collaboration'', ''Strategic planning'', ''Project coordination'', ''Competitive analysis'', ''Stress‑aware performance monitoring'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Live‑music and concert attendance'', ''Sketching and watercolor painting'', ''Travel photography'', ''Podcasting about tech‑art intersections'',
    ''Improv theater and spoken‑word workshops'', ''Hosting dinner parties and exploring new restaurants'', ''Spontaneous weekend road trips'', ''Reading contemporary fiction and philosophy'', ''Participating
    in local community festivals'', ''Yoga and mindfulness practices (when needed)'']'
  career_goals: Ellen aspires to become a senior systems analyst or product manager who leads interdisciplinary teams at the intersection of technology and the arts. She aims to spearhead digital initiatives
    for museums, galleries, and cultural institutions, creating interactive platforms that enhance visitor experiences. Over the next five years, she plans to earn advanced certifications in data science
    and product management, and to complete a master’s program in information systems with a focus on digital humanities. Ellen also dreams of establishing herself as a thought leader—presenting at conferences,
    publishing articles, and hosting a podcast that explores the convergence of tech, design, and cultural expression. Ultimately, she hopes to launch a consultancy that advises cultural organizations on
    adopting innovative, data‑driven solutions while fostering inclusive, community‑focused tech practices.
