personas:
  professional: Samer Whittle is a clinical support worker at a Hanover hospital who leverages precise EMR documentation, infection control expertise, and a methodical, organized approach to streamline
    patient flow while also mentoring new staff, and they balance compassion with a pragmatic drive for efficiency.
  sports: Samer Whittle enjoys weekend hikes on the Appalachian Trail and is an active member of the Hanover Trailblazers Hiking Club, they follow the Boston Red Sox and Boston Celtics on TV and occasionally
    play in a local co‑ed ultimate‑frisbee league, reflecting a balanced love of outdoor activity and team sports.
  arts: Samer Whittle explores creative expression by attending the Dartmouth Community Theater’s productions of Lin‑Manuel Miranda’s Hamilton, listening to folk‑rock icon Joni Mitchell and the experimental
    sounds of Radiohead, and they often unwind with board‑game nights featuring Catan, revealing a taste for narrative depth and strategic art.
  travel: Samer Whittle plans trips meticulously, favoring road‑trip itineraries that combine nature hikes in the White Mountains, a weekend in Burlington, Vermont, and an adventurous backpacking stint
    in Iceland’s Highlands, they keep a spreadsheet of travel expenses and dream of trekking Patagonia’s Torres del Paine once they save enough.
  culinary: Samer Whittle cooks at a competent home‑chef level, favoring vegetable garden harvests like heirloom tomatoes, grilled zucchini, and fresh basil for a vibrant ratatouille, they also love crafting
    quinoa bowls with roasted sweet potatoes and avocado, and they occasionally treat themselves to a well‑made falafel wrap with tahini.
  core: Samer Whittle blends curiosity and practicality, organizing life like a well‑kept garden while juggling a methodical work ethic, intermittent health self‑care, and a love for hiking, woodwork, and
    late‑night board‑games.
background:
  cultural: Samer grew up in a middle‑class, white family of German‑Irish ancestry in Hanover, Pennsylvania. His upbringing was shaped by the town’s blend of agricultural heritage and close‑knit community
    values, including a strong emphasis on hard work, reliability, and modesty. He attended local public schools, where he participated in extracurricular activities such as the school’s robotics club,
    reflecting an early curiosity for practical problem‑solving. The region’s cultural landscape, with its annual fairs, Pennsylvania Dutch influences, and a supportive church community, fostered his sense
    of service and cooperation. While he identifies with his European roots, his work in healthcare has broadened his cultural awareness, exposing him to diverse patients and encouraging a respectful, inclusive
    approach.
attributes:
  skills: '[''Patient care assistance'', ''Vital signs monitoring'', ''Basic wound care'', ''Infection control'', ''CPR and first aid certification'', ''Electronic medical records (EMR) proficiency (Epic,
