  hobbies: '[''Hiking'', ''Vegetable gardening'', ''Reading (medical journals, historical non-fiction, science‑fiction)'', ''Woodworking'', ''Board‑game nights'', ''Volunteering at community health fairs'']'
  career_goals: Samer aims to advance his career by enrolling in an associate degree program in nursing to become a Registered Nurse (RN) within the next three years. He plans to acquire additional certifications
    in phlebotomy and geriatric care, positioning himself for a specialized role in senior patient support. Long‑term, he aspires to transition into a care coordination or unit supervisory position, where
    he can leverage his organizational strengths to improve patient flow and outcomes. He also hopes to contribute to community health initiatives in Hanover, utilizing his curiosity about public health
    trends to develop educational workshops and outreach programs.
