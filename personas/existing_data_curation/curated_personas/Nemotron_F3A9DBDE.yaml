  career_goals: Davin aims to leverage his deep mechanical knowledge into a leadership role within the local municipal bus fleet, aspiring to become a shop foreman or fleet service manager within the next
    five years. He plans to earn a Master Diesel Technician certification and become a Certified Emissions Specialist to broaden his expertise in sustainable diesel technologies. In parallel, he envisions
    opening a specialty workshop that focuses on biodiesel retrofits and vintage bus restorations, blending his technical skills with his appreciation for art by offering custom interior refurbishments.
    Additionally, Davin hopes to mentor younger mechanics through apprenticeship programs and contribute articles to industry trade publications, establishing himself as a forward‑thinking authority in
    diesel technology.
