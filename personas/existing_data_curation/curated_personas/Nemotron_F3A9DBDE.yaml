personas:
  professional: Davin Baker is a veteran diesel technician and ASE Certified Diesel Technician with deep expertise in heavy‑duty engine overhaul, fuel‑injection and emissions systems, who balances meticulous
    workshop organization with a hands‑on creative flair, mentoring apprentices while charting a path toward a foreman role and a future specialty shop that blends biodiesel retrofits with vintage bus restoration.
  sports: Davin Baker cycles the Bridle Trail with the Bucks County Cycle Club in spring, fishes the Delaware River for smallmouth bass in summer, and roots for the Philadelphia Eagles, the 76ers, and the
    Reading Fightin’ Phils, occasionally joining a local amateur softball league on weekends.
  arts: Davin Baker frequents the Bucks County Art Museum and the local gallery on Main Street, drawing inspiration from Edward Hopper and Andrew Wyeth for his industrial sketches, and enjoys listening
    to the folk‑rock of The Avett Brothers while restoring vintage bus interiors.
  travel: Davin Baker prefers road‑tripping in his restored classic truck, exploring Pennsylvania’s historic towns like Jim Thorpe and Lancaster, while dreaming of a future automobile pilgrimage to Germany’s
    Munich Auto Show and Japan’s Toyota Museum, balancing budget constraints with occasional weekend getaways to the Adirondacks.
  culinary: Davin Baker loves hearty Pennsylvania Dutch fare—soft pretzels, apple butter, and roast pork—while skillfully grilling fresh Delaware River trout with a homemade cedar plank, and he’s notorious
    for spending evenings perfecting a smoked paprika‑infused brisket in his custom‑built smoker.
  core: Davin Baker blends a mechanic’s precision with an artist’s curiosity, spending dawns hunched over diesel engines and dusks sketching truck silhouettes, all while juggling a toolbox of quirks like
    a secret stash of vintage parts and a habit of late‑night coffee‑fueled tinkering.
background:
  cultural: Davin comes from a multi‑generational white working‑class family rooted in Bucks County, Pennsylvania. His ancestry includes English and Irish heritage, typical of early settlers in the region.
    Raised in the blend of suburban neighborhoods and rural farmland of North Wales, he absorbed values of hard work, self‑reliance, and community involvement. The local culture, with its strong ties to
    Pennsylvania Dutch farming traditions and a vibrant regional arts scene, fostered his appreciation for both practical craftsmanship and creative expression. He participates in neighborhood events such
    as the annual Bucks County fair and supports local historical societies that preserve the area's transportation heritage.
