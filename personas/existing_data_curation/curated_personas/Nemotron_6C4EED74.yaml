  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Woodworking'', ''Classic car restoration'', ''Watching baseball (Los Angeles Dodgers)'', ''Following Liga MX soccer'', ''Listening to Ranchera
    and Mariachi music'', ''Playing acoustic guitar'', ''Participating in community festivals (Dia de los Muertos)'', ''Reading construction and technology articles'', ''Crossword puzzles'', ''Volunteering
    with Habitat for Humanity'']'
  career_goals: Carlos’s immediate ambition is to earn his California contractor’s license and transition to a foreman or site supervisor role, where he can oversee crews, ensure safety, and implement energy‑efficient
    methods. Over the next few years he hopes to mentor apprentices, develop a small family‑owned renovation business, and obtain a LEED Green Associate certification. Ultimately, he wants to leave a lasting
    impact by passing on his practical knowledge to the next generation and contributing to affordable housing projects in the Chino Hills community.
