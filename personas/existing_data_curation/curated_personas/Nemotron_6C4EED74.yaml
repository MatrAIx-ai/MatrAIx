personas:
  professional: Carlos Cea, a 61‑year‑old construction veteran, blends three decades of framing, concrete finishing, and heavy‑equipment expertise with a meticulous, data‑driven approach, using Procore
    to juggle budgets while staying flexible enough to adapt blueprints on the fly, and now targets a California contractor’s license to guide crews toward greener, LEED‑aligned builds.
  sports: Carlos Cea follows the Los Angeles Dodgers as a loyal season ticket holder, cheers for Club América in Liga MX, joins a local senior softball league on weekends, and wears his favorite Dodgers
    cap while tending the garden, balancing his competitive spirit with community camaraderie.
  arts: Carlos Cea nurtures his love for Ranchera and Mariachi by strumming an acoustic guitar while cooking tamales, collects recordings from Vicente Fernández and the Mariachi Vargas de Tecalitlán, and
    participates in Día de los Muertos art installations that showcase handmade papel picado, letting music and tradition color his leisure hours.
  travel: Carlos Cea dreams of a road trip along California’s Pacific Coast Highway, has already visited Oaxaca to study regional mole recipes, plans a future pilgrimage to Guanajuato’s historic copper
    workshops, but balances travel ambitions with family duties and a modest retirement budget.
  culinary: Carlos Cea masters tamales de puerco and pozole rojo in his backyard kitchen, often incorporating garden‑fresh zucchini, roasted chiles guajillo, and masa harina, while experimenting with quinoa‑infused
    fillings for a modern twist, and proudly serves cochinita pibil during Día de los Muertos gatherings.
  core: Carlos Cea, a 61‑year‑old builder‑turned‑green‑construction mentor, blends meticulous craftsmanship with a calm, competitive edge, savoring homemade tamales, cheering the Dodgers, and fixing his
    classic Chevy while quietly plotting his next sustainable renovation.
background:
  cultural: Carlos was born to Mexican immigrants from Jalisco who settled in Southern California in the 1970s. Raised in a bilingual household, he grew up celebrating Mexican holidays such as Día de los
    Muertos, Cinco de Mayo, and Christmas with Mexican‑American customs. He maintains a strong connection to his heritage through family gatherings, traditional food, Catholic faith, and participation in
    the local Mexican community in Chino Hills. While he embraces American work culture, his values of family loyalty, respect for elders, and communal support reflect his Mexican roots.
attributes:
  skills: '[''Framing'', ''Concrete finishing'', ''Drywall installation'', ''Heavy equipment operation (backhoe, skid‑steer)'', ''Blueprint reading'', ''OSHA safety compliance'', ''Cost estimating'', ''Project
