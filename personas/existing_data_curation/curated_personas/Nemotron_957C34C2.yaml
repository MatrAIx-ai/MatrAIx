  hobbies: '[''Reading historical fiction'',''Gardening'',''Knitting'',''Quilting'',''Birdwatching'',''Coastal walks'',''Genealogy research'',''Listening to jazz'',''Cooking nostalgic dishes'']'
  career_goals: Her current ambition is to channel her curiosity and practicality into community service and personal legacy projects. She plans to earn a nonprofit‑management certificate, volunteer as
    a docent at the Atlantic City Historical Museum, and compile a written and digital family genealogy that she can share with relatives. She also hopes to launch a modest online shop for her handcrafted
    quilts, combining her creative skill with a purposeful side‑business.
