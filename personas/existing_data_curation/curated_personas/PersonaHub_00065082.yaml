persona_description: Susanne Løgstrup, Chair of the European Public Health and Agriculture Consortium, is an advocate for a healthy and sustainable Common Agricultural Policy in the EU. She has extensive
  knowledge and expertise in public health and agriculture, and is passionate about promoting healthy living among children and vulnerable populations. Løgstrup is committed to supporting initiatives such
  as the EU School Fruit Scheme, which she believes is a model for promoting public investment in health.
