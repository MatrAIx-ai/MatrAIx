personas:
  professional: Consuela Gilbeaux, a retired community arts coordinator and master seamstress, blends her meticulous embroidery talent with a relaxed, improvisational approach to curating informal exhibitions
    of diaspora artists, using her natural empathy to mediate volunteer teams and her occasional disorganization to keep projects fluid and inclusive.
  sports: Consuela Gilbeaux enjoys low‑impact activities such as walking the Finger Lakes trails and gardening, follows the local high‑school basketball team, the Troy Trojans, watches the New York Yankees
    on weekends, and occasionally joins senior‑center yoga sessions to maintain flexibility despite a habit of skipping scheduled workouts.
  arts: Consuela Gilbeaux spends afternoons sketching watercolors of Troy’s historic architecture, immerses herself in jazz legends like Miles Davis, blues icons such as B.B. King, and world music by Fela
    Kuti, and champions the work of artists such as Jacob Lawrence and Romare Bearden in community pop‑up shows, all while juggling a slightly chaotic schedule that fuels her creative spontaneity.
  travel: Consuela Gilbeaux frequently escapes to the Finger Lakes for weekend nature hikes, dreams of a pilgrimage to Nigeria’s Yoruba heartland to trace the roots of her middle name, and occasionally
    visits historic towns like Savannah, preferring flexible, low‑cost itineraries over rigid travel plans.
  culinary: Conscola Gilbeaux (sic) delights in cooking Southern comfort dishes like collard greens and cornbread alongside Caribbean staples such as jerk chicken, frequently harvests fresh rosemary, thyme,
    and cilantro from her backyard garden, and bakes artisanal sourdough loaves for community fundraisers, though she admits to occasionally over‑seasoning in her enthusiasm for flavor.
  core: Consuela Gilbeaux is a curious, art‑loving retiree whose gentle disorganization fuels spontaneous creativity, community generosity, and a lifelong quest to stitch together heritage, music, and flavor.
background:
  cultural: Consuela is a Black American whose family’s story traces back to the Great Migration of the 20th century, moving from the rural South to upstate New York. Her middle name, Modupe, reflects a
    Yoruba heritage that was passed down through a great‑grandparent who immigrated from Nigeria, weaving subtle African cultural practices into family life. Growing up in Troy, she was deeply involved
    in the local African‑American church community, where gospel music and communal service shaped her values of harmony and caring. She celebrates both Southern culinary traditions and Caribbean flavors
    that entered her family through marriage, and she actively participates in community events that honor Black history and contemporary arts.
