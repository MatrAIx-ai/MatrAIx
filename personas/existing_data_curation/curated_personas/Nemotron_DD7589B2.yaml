  career_goals: Although retired, Consuela is driven by a desire to leave a lasting legacy. She aims to complete a memoir that weaves together her family’s migration narrative with reflections on art and
    community. She plans to launch a quarterly intergenerational quilting circle at the senior center, mentoring younger participants while preserving traditional techniques. Consuela hopes to organize
    a local exhibition highlighting Black artists from Troy and its surroundings. A personal ambition is to travel to Nigeria to explore the Yoruba roots of her middle name, Modupe, and to bring back stories
    and artifacts for her community. She also aspires to deepen her digital photography skills to document everyday moments in her neighborhood.
