  hobbies: '[''Acrylic painting'', ''Embroidery (Mexican patterns)'', ''Photography'', ''Hiking'', ''Cooking traditional Mexican cuisine'', ''Visiting art galleries'', ''Reading fiction and art history'',
    ''Attending small community art workshops'', ''Listening to indie/folk music'', ''Exploring local farmers markets'']'
  career_goals: Arely aims to rise to a store manager position within the next two to three years, leveraging her competitive drive to surpass performance targets and improve team productivity. Long‑term,
    she envisions opening her own boutique that showcases Mexican artisanal crafts and contemporary art, merging her cultural heritage with her retail acumen. She also aspires to develop expertise in visual
    merchandising for a national retailer, using her artistic sensibility to influence brand presentation on a larger scale.
