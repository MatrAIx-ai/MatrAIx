personas:
  professional: Arely Echevarriagarcia, a seasoned retail specialist who blends two decades of inventory control expertise with a flair for acrylic painting and visual storytelling, leverages bilingual
    communication to enhance store displays and mentors staff with a no‑nonsense, results‑driven approach while secretly hoarding stray receipts as a personal performance metric.
  sports: Arely Echevarriagarcia enjoys weekend hikes on Idaho’s Sawtooth trails, participates in the Boise Valley Running Club’s 5K meets, and roots for the Boise State Broncos football team while occasionally
    joining a local adult volleyball league, using the physical activity as a solitary yet social counterbalance to retail pressures.
  arts: Arely Echevarriagarcia immerses themselves in acrylic painting inspired by Georgia O'Keeffe's desert palettes, practices heritage‑inspired embroidery stitches, captures Idaho’s alpine vistas through
    a Nikon D5600, and curates an eclectic playlist featuring Bon Iver, The Luminaries, and classic folk ballads while devouring art‑history monographs on the Impressionists and renowned muralists.
  travel: Arely Echevarriagarcia favors meticulously planned solo road trips punctuated by art workshops, having recently explored the rugged cliffs of Glacier National Park and the historic galleries of
    Santa Fe, while dreaming of a future boutique opening in a coastal town where they can blend travel‑inspired décor with their own creations.
  culinary: Arely Echevarriagarcia delights in cooking family‑heritage dishes such as a spice‑infused pork stew seasoned with ancho chilies and coriander, hand‑rolled corn‑based pastries wrapped in banana
    leaves, and a vibrant salsa verde featuring tomatillos and jalapeños, while their modest cooking skill is offset by a penchant for over‑spicing and an unwavering belief that a perfectly crisp flatbread
    is the ultimate measure of success.
  core: Arely Echevarriagarcia is a competitively driven, art‑obsessed retail veteran whose reserved nature masks a coffee‑addicted streak and a relentless quest to turn solitary creativity into a thriving
    boutique empire.
background:
  cultural: Raised in a Mexican immigrant family that settled in Idaho, Arely grew up bilingual, with deep ties to the traditions of Jalisco. She celebrates Día de los Muertos, enjoys mariachi music, and
    frequently prepares dishes like mole and tamales for family gatherings. Her cultural heritage informs her aesthetic preferences—bright colors, intricate patterns, and a respect for handcrafted art—which
    she incorporates into her visual merchandising ideas. Active in the local Latino community, she participates in Cinco de Mayo events and maintains connections with relatives in Mexico, blending her
    Mexican identity with the values of resilience and hard work she’s cultivated in her Idaho surroundings.
