  career_goals: Andrew dreams of a future where he can combine his love for animals with his practical problem‑solving mindset, envisioning roles such as a wildlife biologist or a veterinarian who works
    in small‑team field studies. He also imagines becoming an engineer focused on designing simple, eco‑friendly solutions for his community, motivated by a desire to help others while avoiding large, high‑pressure
    environments. Though he sometimes worries about making the right choice, his ambition is guided by a desire for harmony, meaningful work, and the freedom to explore ideas at his own pace.
