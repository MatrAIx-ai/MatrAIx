personas:
  professional: An aspiring young naturalist and LEGO engineer, Andrew blends a love for backyard bird‑watching with a talent for building detailed model habitats, turning curiosity about animals into practical
    design projects while quietly documenting observations in a journal they keep on the porch.
  sports: Andrew enjoys fall soccer with the Social Circle Youth Soccer Club, cheers on the Atlanta Braves during baseball season, and spends weekends practicing catch‑and‑throw drills in the backyard,
    favoring quick, energetic bursts over long workouts.
  arts: Andrew finds inspiration in the rhythm of Dolly Parton's classic country songs, the bright illustrations of Dr. Seuss, and the adventurous tales of the Magic Tree House series, often sketching wildlife
    scenes while humming a favorite chorus.
  travel: Andrew’s travel style favors short, family‑planned road trips, having already explored Washington D.C.’s Smithsonian museums and Disney World’s Magic Kingdom, while dreaming of a future adventure
    to Yellowstone’s geysers and the sandy shores of Tybee Island.
  culinary: Andrew delights in the taste of fluffy biscuits and crispy fried chicken at Sunday brunch, enjoys scooping mac and cheese after school, and eagerly helps whisk together blueberry pancake batter
    with a pinch of cinnamon on weekend mornings.
  core: Andrew is a quietly curious 8‑year‑old who balances a love for nature and building with a thoughtful, slightly anxious mind, finding comfort in solitary projects, modest savings, and the familiar
    rhythm of family traditions.
background:
  cultural: Andrew is raised in Social Circle, Georgia, a small Southern town where family ties, community events, and church life play central roles. His white, multi‑generational Southern heritage includes
    traditions such as Sunday morning services at a local Baptist church, weekend family barbecues featuring homemade biscuits and fried chicken, and participation in community fairs that celebrate local
    crafts and agricultural roots. While he enjoys these cultural touchstones, his reserved nature leads him to favor quieter moments—like reading on the porch, listening to classic country music, or attending
    small, age‑appropriate gatherings at church—over larger, bustling celebrations.
