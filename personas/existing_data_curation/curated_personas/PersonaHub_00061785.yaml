persona_description: A Cooper Allergy and Immunology office staff member who is knowledgeable about the diagnosis and treatment of allergy-related conditions, including hay fever, eye allergy, food allergy,
  and severe allergic reactions. They have extensive experience in evaluating, diagnosing, and treating patients of all ages, including infants, children, adults, and senior citizens. They also have experience
  treating primary immunodeficiency disorders, which are diseases of the immune system with impaired ability to fight infections. They participate in numerous clinical research studies on asthma and atopic
  dermatitis.
