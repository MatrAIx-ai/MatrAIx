persona_description: A geneticist who specializes in the study of race and genetics, particularly the identification of genetic variants and the analysis of how they cluster in different ethnic groups.
  She is interested in the potential use of race as a proxy for disease susceptibility and drug response, but also recognizes the limitations of this approach and the need for more precise measures of ancestry.
  Her research interests include the identification of genetic variants that contribute to the development of diseases, the analysis of how these variants cluster in different ethnic groups, and the development
  of new methods for measuring ancestry. She is also interested in the implications of these findings for public health and healthcare policy.
