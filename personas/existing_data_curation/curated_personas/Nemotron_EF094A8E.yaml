personas:
  professional: Richard Lee, a 17‑year‑old aspiring small‑engine technician, channels a love of routine and hands‑on problem‑solving into a part‑time apprenticeship at the local garage where they excel
    at predictable repairs on lawn mowers and ATVs but occasionally let disorganization creep in when balancing school assignments and church group duties.
  sports: Richard Lee follows the Billings Rattlers baseball team and Montana State football, enjoys weekend fishing at Lower Willow Lake, participates in seasonal deer hunting with a local outdoor club,
    and casually maintains fitness by fixing gym equipment at the community center rather than engaging in structured workouts.
  arts: Richard Lee unwinds to classic rock legends like Led Zeppelin, The Rolling Stones, and Pink Floyd while devouring Western novels by Louis L’Amour, they occasionally attend church youth talent nights
    featuring folk singers, but their artistic expression is limited to practical woodworking projects such as birdhouses and simple shelves.
  travel: Richard Lee favors short, routine‑oriented trips to nearby mountain cabins for hunting season, enjoys annual family road trips to Yellowstone National Park, dreams of a cross‑country drive to
    visit classic automotive museums, yet anxiety and limited finances keep longer, spontaneous vacations beyond reach.
  culinary: Richard Lee prefers hearty meals like steak with baked potatoes, homemade chili, and fresh trout fried from lake catches, they enjoy grilling simple dishes over a campfire, but they are notorious
    for postponing dishwashing until the next day, reflecting a laid‑back approach to kitchen chores.
  core: Richard Lee is a routine‑driven teen mechanic who balances solitary woodworking, anxious hunting trips, and classic‑rock playlists while dreaming of a low‑stress repair shop yet struggling with
    occasional disorganization and impulsive tool splurges.
background:
  cultural: Richard grew up in Billings, Montana, within a predominantly white, rural community that values self-reliance, hard work, and traditional Western customs. His family’s lifestyle emphasizes outdoor
    activities such as hunting and fishing, a practical approach to work, and a modest, down-to-earth worldview. Local culture includes strong ties to church, community events, and a respect for the region’s
    natural landscape. These influences shape his preference for routine, practicality, and a comfortable familiarity with the surrounding environment.
attributes:
