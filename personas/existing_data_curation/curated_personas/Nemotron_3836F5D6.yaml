  hobbies: '[''Gardening'',''Book club'',''Knitting'',''Hiking'',''Cooking'',''Volunteering at community center'',''Watercolor painting'',''Traveling to national parks'',''Playing bridge'']'
  career_goals: Although not currently employed outside the home, Irene wants to leverage her organizational talents by leading a senior‑center advisory board in Star, Idaho, and eventually launching a
    small home‑based catering service that serves community events. She also hopes to mentor younger volunteers, obtain a certificate in gerontology to better support aging neighbors, and possibly complete
    a short course in digital marketing to promote her culinary venture.
