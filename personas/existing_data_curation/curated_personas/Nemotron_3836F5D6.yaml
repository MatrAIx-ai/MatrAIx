personas:
  professional: Irene Brownstein, a community event planner with a solid foundation in business administration and budgeting, channels her practical curiosity and balanced organization into leading the
    senior‑center advisory board while remaining flexible enough to adapt to volunteer needs.
  sports: Irene Brownstein, a member of the Star Community Hiking Club, spends weekends hiking the foothills, roots for the Boise State Broncos football team, and attends weekly yoga sessions at the Sun
    Valley Wellness Center to stay active.
  arts: Irene Brownstein, an avid watercolorist inspired by Claude Monet’s impressionist palette, often listens to Bob Dylan while knitting scarves for charity, and regularly attends performances by the
    Boise Philharmonic and local theater productions starring Sam Elliott.
  travel: Irene Brownstein meticulously plans summer trips with her husband to national parks such as Yellowstone, Glacier, and Grand Teton, savoring long hikes and quiet lodge evenings, while a modest
    budget keeps a coveted visit to Banff National Park in Canada on the future wish list.
  culinary: Irene Brownstein, a confident home cook, delights in making roasted garlic rosemary chicken, pan‑seared trout with lemon‑butter sauce, and hearty quinoa‑beet salads seasoned with fresh thyme,
    feta, and kale, often featuring vegetables harvested from her own garden.
  core: Irene Brownstein, a 50‑year‑old garden‑to‑table enthusiast, blends meticulous organization with sociable curiosity, often over‑commits to volunteer projects, balances modest health vigilance with
    a budding catering dream, and maintains a habit of checking the weather forecast before every garden session.
background:
  cultural: Irene was raised in a small‑town farming community in southern Idaho, where her family’s German‑Scandinavian heritage emphasized self‑reliance, community service, and practical problem‑solving.
    Growing up in the Pearl River valley shaped her appreciation for the outdoors and a modest, neighbor‑focused lifestyle. She identifies strongly with the values of the Pacific Northwest’s white American
    population—independence, a love of nature, and a commitment to contributing to local civic life.
