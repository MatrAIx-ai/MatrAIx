personas:
  professional: Joan Williams is an emerging robotics and debate enthusiast who designs Arduino‑based robots for regional STEM contests, codes simple games in Python, and crafts compelling arguments for
    the school debate club; balancing curiosity with practicality, they apply a methodical, skeptical approach to prototype testing and argument strategy, and their sociable, talkative demeanor makes them
    the go‑to MC at club events.
  sports: Joan Williams dominates the high‑school varsity basketball court as a point guard for the Houston Hightower Eagles, trains five days a week with the local AAU Rockets Academy, follows the NBA’s
    Houston Rockets and the WNBA’s Dallas Wings for strategic inspiration, and complements on‑court drills with weekly weight‑training sessions, yoga for flexibility, and weekend pick‑up games at the community
    center, all while maintaining a disciplined schedule that includes pre‑practice film study and post‑practice shooting drills to sharpen their competitive edge.
  arts: Joan Williams channels their sociable, attention‑seeking personality into a vibrant TikTok channel where they post robot demos synced to trap beats from artists like Travis Scott and Billie Eilish,
    produce original electronic tracks in FL Studio using synth presets inspired by Daft Punk, sketch streetwear‑infused fashion designs reminiscent of Off‑White and Fear of God, and draw narrative inspiration
    from sci‑fi authors such as Neal Stephenson, all while their critical eye ensures each piece meets high standards before posting.
  travel: Joan Williams explores the world with a mix of meticulous planning and spur‑of‑the‑moment road trips, having visited Space Center Houston, the vibrant murals of Austin, a family vacation to Mexico
    City, and a weekend getaway to New Orleans, while dreaming of future adventures in Tokyo’s Akihabara district and Reykjavik’s northern lights; they rely on a shared Google Travel itinerary with friends
    for budgeting but also love spontaneous detours to street food markets, balancing parental constraints with a yearning for cultural immersion.
  culinary: Joan Williams enjoys experimenting in the kitchen, mastering moderately complex dishes like chicken tacos topped with cilantro, lime, and pickled red onions, crafting homemade ramen broth with
    miso, soft‑boiled eggs, and nori, and perfecting sriracha‑glazed chicken wings, while their favorite ingredients—avocado, jalapeños, and smoked paprika—often find their way into late‑night snack creations
    that are as bold as their TikTok videos.
  core: Joan Williams is a competitively driven, organized teen who thrives on robotics, debate, basketball, and TikTok stardom, balancing disciplined savings with occasional sneaker splurges and late‑night
    snack raids.
background:
  cultural: Joan is a Black teenager raised in Houston’s culturally rich Third Ward, where African-American heritage, Southern hospitality, and a strong sense of community intertwine. Family gatherings
    feature gospel music, soul food, and storytelling that reinforce her pride in Black history and resilience. She participates in local Juneteenth celebrations, attends a neighborhood church that emphasizes
    service, and draws inspiration from Houston’s vibrant hip-hop scene. These cultural roots shape her confidence, her expressive communication style, and her desire to uplift her community while forging
    her own path.
