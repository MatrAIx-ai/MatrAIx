  career_goals: Joan aims to secure a scholarship to a top STEM high school and later pursue an engineering degree—preferably aerospace or biomedical—at a research-intensive university. She envisions herself
    working on innovative projects at NASA’s Johnson Space Center or a leading Houston medical-technology firm, where she can merge her analytical skills with her knack for leading interdisciplinary teams.
    In the short term, she plans to dominate local science fairs, win debate tournaments, and build a reputable online presence that showcases her technical projects and leadership experience.
