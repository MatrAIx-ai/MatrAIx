persona_description: A scientist who specializes in dendroclimatology, studying the relationship between tree growth and global climate change. They have conducted research in the Tarvagatay Mountains of
  western central Mongolia, taking samples of 300- to 500-year old Siberian pines undisturbed by human activity and growing at the timberline more than 8,000 feet high, the northernmost limit of tree survival
  in that part of the world. They are using this data to help scientists better understand the fluctuations in Earth's recent temperature.
