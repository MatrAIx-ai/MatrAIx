  hobbies: '[''Watercolor painting'', ''Photography of Florida nature'', ''Improv comedy workshops'', ''Escape rooms'', ''Community theater'', ''Hiking state parks'', ''Paddle‑boarding'', ''Reading contemporary
    fiction'', ''DIY home‑decor projects'', ''Volunteering at local art festivals'']'
  career_goals: Alexandra aims to advance to a regional sales manager position within the next three years, overseeing multiple teams across Florida and eventually the Southeast. She plans to pursue a bachelor’s
    degree in Business Administration or Marketing part‑time to deepen her strategic expertise. Her long‑term ambition is to lead a corporate sales‑strategy unit where she can integrate innovative, data‑driven
    approaches with creative thinking, and eventually mentor emerging leaders. She also hopes to launch a small side venture that offers custom artwork and design services, blending her artistic passion
    with her business acumen.
