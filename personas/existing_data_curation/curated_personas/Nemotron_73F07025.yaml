  career_goals: Although retired from formal employment, Makenzie is determined to stay intellectually active and give back to the STEM community. She aims to mentor high-school and college students through
    local science clubs, serve as a judge for regional science fairs, and develop a weekly senior technology workshop at the community center. She also aspires to author a series of articles highlighting
    the evolution of women in engineering, and to publish a memoir that captures her journey from a first-generation engineer to an engaged community leader. In the longer term she hopes to launch a small
    grant program that supports innovative projects led by senior volunteers, and she approaches the competitive funding process with a strategic, results‑oriented mindset.
