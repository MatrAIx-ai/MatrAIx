personas:
  professional: Joann Carr, an aspiring young author-illustrator, blends a vivid imagination with disciplined sketch-book routines, channeling their love of fantasy and mystery novels into detailed comic
    strips while staying reliably organized for school assignments and library volunteering.
  sports: Joann Carr, a member of the Lake Michigan Swim Club, spends weekends perfecting freestyle laps, cheers enthusiastically for the Chicago Cubs and Chicago Bulls, participates in the town's youth
    soccer league, and enjoys birdwatching hikes at Edgewater Park, balancing structured training with playful outdoor adventures.
  arts: Joann Carr, a budding comic artist and piano enthusiast, draws inspiration from Neil Gaiman's storytelling and Hayao Miyazaki's visual style, practices Beethoven's 'Für Elise' on the piano daily,
    collects graphic novels such as 'Adventure Time' and 'Steven Universe', and sketches scenes from favorite books to create original comic strips.
  travel: Joann Carr, an organized young explorer, loves family road trips to Michigan's Sleeping Bear Dunes and weekend visits to Chicago's Museum of Science and Industry, dreams of a future trip to the
    Wizarding World of Harry Potter in London, and balances meticulous itineraries with the freedom to collect rocks, shells, and bird feathers along the way.
  culinary: Joann Carr, an enthusiastic budding chef, favors cheesy macaroni, pepperoni pizza, and homemade chocolate-chip cookies, often blends strawberries, bananas, and Greek yogurt into fruit smoothies,
    and enjoys experimenting with simple recipes like scrambled eggs seasoned with a pinch of paprika and buttered toast with peanut butter.
  core: Joann Carr is a curious, organized 11-year-old who blends a love for fantasy storytelling, meticulous sketching, and disciplined piano practice with a practical approach to saving allowance, while
    navigating mild allergies and a bustling imagination.
background:
  cultural: 'Joann was raised in a middle‑class white family in Racine, Wisconsin, a city shaped by its proximity to Lake Michigan and a blend of industrial and agricultural heritage. Her family values
    modesty, hard work, and community involvement, traditions that echo the broader Midwestern ethos. Seasonal activities are a staple: summer trips to the lake, autumn visits to the Racine County Fair,
    winter sledding, and spring community clean‑ups. She celebrates holidays such as Thanksgiving and Christmas with family gatherings that feature home‑cooked meals and local customs, and she attends occasional
    community events at the local church and school. This upbringing combines a respect for established methods with an openness to new ideas, reflecting the balanced personality she displays.'
