  career_goals: Joann dreams of a future where she can merge her curiosity about the natural world with practical problem‑solving. She aspires to become an environmental scientist or wildlife biologist
    who studies Lake Michigan’s ecosystems and helps design community projects that protect local habitats. She also envisions sharing her love of science with younger students, perhaps by teaching or leading
    after‑school science clubs, so she can combine her cooperative nature with an assertive voice for conservation.
