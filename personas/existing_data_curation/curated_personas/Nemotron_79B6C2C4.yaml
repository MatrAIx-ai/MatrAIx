personas:
  professional: Susan Mixon, a 23‑year‑old operations research analyst, applies her rigorous training in linear programming, integer optimization, and discrete‑event simulation to deliver cost‑cutting projects
    for Great Lakes manufacturers while channeling her competitive edge and love of structure into meticulous project plans, data visualizations, and mentorship of junior teammates.
  sports: Susan Mixon, a regular on her university’s intramural soccer league, a dedicated member of the Ann Arbor Salsa Club, and an avid participant in the Michigan Hiking Club, follows the Detroit Lions
    and Detroit Red Wings while maintaining a structured weekly fitness routine that balances competitive soccer drills with weekend hikes along the Great Lakes shoreline.
  arts: Susan Mixon, who captures Michigan’s forests through a Nikon D5600 lens inspired by Annie Leibovitz, finds solace in writing short stories at a weekly open‑mic, enjoys board‑game nights featuring
    Catan and Azul, and fills her playlists with Billie Eilish and salsa classics by Celia Cruz, melding visual, literary, and musical art forms into her expressive outlet.
  travel: Susan Mixon, who meticulously plans weekend escapes to Michigan’s Upper Peninsula and occasional road trips to Chicago, dreams of hiking the Rocky Mountains and photographing Yosemite’s waterfalls,
    favoring a mix of adventurous treks and relaxed lake‑front stays while keeping travel costs low through budget‑friendly accommodations and early‑bird flight deals.
  culinary: Susan Mixon, a competent home cook who meal‑preps quinoa bowls with roasted vegetables on Sundays, relishes grilled salmon with rosemary, spiced shrimp tacos inspired by her salsa classes, and
    indulgent Michigan cherry pie for dessert, while occasionally treating herself to a late‑night pizza slice after a long study session.
  core: Susan Mixon, a 23‑year‑old data‑driven optimist, balances a fiercely competitive analytical mind with an outsized love for group sports, photography, and meditation, all while navigating an ever‑present
    undercurrent of anxiety that fuels both meticulous planning and occasional impulse spending.
background:
  cultural: Susan grew up in the Greater Lansing area, a university‑town environment in Michigan’s Midwestern heartland. Her family, of European descent, emphasized hard work, punctuality, and community
    service—values common in the region’s middle‑class ethic. She was raised with a strong respect for public education and civic engagement, frequently attending local county fairs, supporting high‑school
    sports, and participating in neighborhood clean‑up events. The Midwest’s blend of modesty, practicality, and collaborative spirit shaped her pragmatic outlook and comfort in group settings, while the
    state’s seasonal diversity sparked her love for outdoor pursuits.
