  career_goals: Susan aims to advance to a senior operations research analyst role within the next three years, leading complex optimization projects that drive cost savings for large manufacturers in the
    Great Lakes region. She plans to pursue a master’s degree in Operations Research or Data Science to deepen her methodological expertise and to earn professional certifications such as the Certified
    Analytics Professional (CAP). In the longer term, she aspires to become a team lead or analytics manager, where she can mentor junior analysts, shape strategic decision‑making processes, and champion
    data‑driven solutions across the organization. Her competitive drive pushes her to seek high‑impact, award‑winning projects that showcase measurable improvements.
