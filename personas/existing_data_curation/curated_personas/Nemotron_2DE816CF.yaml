personas:
  professional: Catherine Jackson works as a material mover in a bustling Cleveland warehouse, where they apply razor‑sharp organization, OSHA‑level safety, and data‑entry skills to keep inventory flowing,
    while their ambition drives them toward a supervisory role backed by supply‑chain certifications and a part‑time logistics degree.
  sports: Catherine Jackson dominates the Saturday night 5‑on‑5 league at the Cleveland Metro Basketball Club, cheering for the Cleveland Cavaliers while channeling competitive energy into quick‑break drills,
    and they also squeeze in occasional pick‑up soccer to stay agile.
  arts: Catherine Jackson explores the Cleveland Museum of Art’s contemporary wing, follows the work of Yayoi Kusama and Mark Bradford, devours sci‑fi by Ted Chiang and Ursula K. Le Guin, and brings that
    spark to community theater productions with a flair for abstract stage design, while their Afro‑Cuban dance classes with the Cultural Rhythm Collective keep rhythm in their soul.
  travel: Catherine Jackson maps out weekend art pilgrimages to New York’s MoMA and seasonal escapes to Barcelona’s modernist museums, balancing meticulous budgeting with spontaneous street‑art tours in
    Detroit, knowing that their limited time and upcoming certification courses demand a blend of structured itineraries and flexible, low‑cost travel.
  culinary: Catherine Jackson experiments in the kitchen with miso‑marinated pork carnitas, saffron quinoa risotto, and jerk‑spiced chicken tacos, using seasonal rooftop herbs like cilantro and basil from
    their balcony garden, and their confidence is matched only by a habit of over‑seasoning dishes with fiery habanero salsa for friends.
  core: Catherine Jackson is a hyper‑organized warehouse logistics pro who fuels a boundless imagination through art, dance, and experimental cooking, constantly juggling competitive drive with a love for
    community collaboration.
background:
  cultural: Catherine is a Black woman raised in Cleveland's historically vibrant African‑American neighborhoods, with family roots tracing back to the Great Migration from the Southern United States. Her
    upbringing was shaped by strong community ties, church gatherings, and local cultural events that celebrated music, storytelling, and civic activism. She draws inspiration from Cleveland's blend of
    industrial heritage and emerging arts scene, valuing both the resilience of her community and the opportunities to contribute to its cultural revitalization.
attributes:
  skills: '[''Inventory Management'', ''Forklift Operation'', ''OSHA Safety Compliance'', ''Heavy Equipment Maintenance'', ''Time Management'', ''Team Coordination'', ''Conflict Mediation'', ''Problem Solving'',
