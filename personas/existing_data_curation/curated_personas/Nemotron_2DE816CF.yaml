  hobbies: '[''Visiting Art Galleries'', ''Reading Science Fiction and Philosophy'', ''Creative Writing'', ''Afro-Cuban Dance'', ''Community Theater'', ''Fusion Cooking'', ''Urban Gardening'', ''Playing
    Basketball'']'
  career_goals: Catherine aims to advance to a supervisory position within the next two years, seeking certifications in supply‑chain coordination and a part‑time associate degree in logistics. She envisions
    eventually becoming a warehouse manager who can implement innovative workflow designs and mentor new hires. Parallel to her professional growth, she plans to launch a community art studio that blends
    her logistical expertise with her love for visual creativity, offering workshops and collaborative projects for local residents.
