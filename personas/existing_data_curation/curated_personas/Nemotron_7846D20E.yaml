  hobbies: '[''recreational basketball'', ''Habitat for Humanity volunteering'', ''fishing'', ''woodworking'', ''home‑brew barbecue cooking'', ''attending classic rock concerts'', ''visiting local history
    museums'', ''guided breathing exercises'', ''community yoga classes'']'
  career_goals: James aims to formalize his expertise by obtaining a Master Drywall Finisher certification and an OSHA 30‑hour safety credential within the next two years. He plans to launch a boutique
    contracting firm focused on residential remodels and energy‑efficient ceiling solutions, leveraging his curiosity about sustainable building materials. He also wants to establish a structured apprenticeship
    program to mentor a new generation of tradespeople, ensuring a legacy of quality craftsmanship. Ultimately, his ambition is to create a stable, low‑stress work environment that allows more time for
    family, community, and personal well‑being.
