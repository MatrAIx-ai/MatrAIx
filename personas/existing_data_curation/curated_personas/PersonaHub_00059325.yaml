persona_description: A researcher at Carnegie Mellon University who specializes in the study of shared visual environments in collaborative tasks. They are interested in the impact of shared visual space
  on communication and collaboration in real-time physical tasks. They are looking for opportunities to apply their research to practical uses such as telemedicine, distance learning, and the staffing of
  help desks. They are a team player and have a multidisciplinary background in computer science, social psychology, and cognitive psychology. They are interested in the training aspect of their work and
  the impact it has on the students they work with.
