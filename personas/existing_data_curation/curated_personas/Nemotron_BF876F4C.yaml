  career_goals: While still young, Pascual often talks about growing up to be an artist who paints colorful murals that celebrate his Salvadoran roots and the natural world. He also imagines becoming a
    scientist or inventor who creates simple gadgets to protect the environment. Occasionally he says he would like to be a teacher who shares stories and art with other children, combining his love of
    learning with his desire to help others.
