personas:
  professional: Pascual Morales is a budding junior builder who transforms LEGO bricks into detailed houses and rockets, showing early spatial reasoning, methodical planning, and a calm curiosity that guides
    each creation toward a future dream of architecture, while they apply the same organized diligence to school projects.
  sports: Pascual Morales loves playing soccer with friends at the neighborhood field, proudly wears a jersey of the Seattle Sounders FC’s star winger, and balances energetic drills with their innate kindness
    and tendency to ensure everyone gets a turn, reflecting their cooperative nature.
  arts: Pascual Morales draws vibrant pictures of jungle animals and bright landscapes, channeling the colorful banners of family festivals and the rhythmic beats of cumbia and salsa music, often listening
    to child‑friendly versions of Shakira and Luis Fonsi while they sketch, which fuels their lively imagination.
  travel: Pascual Morales enjoys weekend trips to the nearby Maryland beach and dreams of exploring the historic streets of San Salvador during a folk dance celebration, planning outings by coloring maps
    with crayons, and aligns these adventures with school schedules and family routines.
  culinary: Pascual Morales helps prepare pupusas filled with cheese and beans, relishing the crispy edges, while also loving a crunchy apple slice with peanut butter and savoring lime‑dressed fish tacos,
    showcasing a palate that blends traditional family flavors with everyday kid favorites.
  core: Pascual Morales is a calm, curious six‑year‑old whose methodical LEGO building, vibrant artwork, love of festive music, and devotion to family‑cooked pupusas shape a harmonious blend of organized
    play and budding aspirations.
background:
  cultural: Pascual grows up in a Salvadoran‑American household in Reisterstown, Maryland, where Spanish is spoken daily alongside English. His family maintains traditions such as celebrating Día de los
    Reyes, Semana Santa, and cooking pupusas and tamales together. He participates in community gatherings organized by the local Salvadoran diaspora, attending cultural festivals, folk dance workshops,
    and church events that emphasize family and community. This dual cultural exposure nurtures his bilingual abilities, his appreciation for vibrant colors and rhythms, and his sense of pride in his heritage
    while also integrating the broader American school and social environment.
