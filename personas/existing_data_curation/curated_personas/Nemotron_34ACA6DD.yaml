  career_goals: Ladonna dreams of turning her curiosity about animals and the natural world into a future career. She hopes to become a wildlife biologist or veterinarian, envisioning a life of studying
    animal behavior, conducting field research, and helping protect ecosystems. She also loves space, so she imagines herself one day as an astronaut or a scientist at a NASA research center. In the near
    term, she aims to win her school’s science fair, be recognized as a top student in her class, and maybe mentor younger children in reading or science clubs.
