  career_goals: Ceida aims to transition into senior leadership within the engineering sector, targeting roles such as Principal Engineer or Director of Sustainable Infrastructure in the next five to seven
    years. She plans to obtain PMP and LEED AP certifications to strengthen her credentials. Her long‑term ambition is to spearhead large‑scale renewable energy and resilient coastal infrastructure projects
    in Hawaii that also benefit Puerto Rican communities abroad. Additionally, she is committed to building mentorship programs that support women and Hispanic students pursuing STEM careers.
