  hobbies: '[''Hiking'', ''Beach Volleyball'', ''Salsa and Bomba Dancing'', ''Cooking Puerto Rican Cuisine'', ''Volunteer Work with Habitat for Humanity'', ''Kayaking'', ''Attending Hawaiian Music Festivals'',
