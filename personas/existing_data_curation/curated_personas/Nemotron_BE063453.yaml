  career_goals: In the short term, Hao aims to earn NMWS certification as a CNC press operator and secure a lead‑operator role within the next two years. He plans to lead a small team as a shift supervisor,
    acquire a Six Sigma Yellow Belt, and spearhead continuous‑improvement projects that cut waste and boost throughput. Long‑term, he intends to pursue a bachelor’s degree in Mechanical or Industrial Engineering
    to transition into a process‑engineer position, eventually managing a full production line or launching his own custom metal‑fabrication shop. Throughout his career, he is motivated to mentor new hires
    and develop comprehensive training manuals that blend established practices with emerging technologies.
