  hobbies: '[''Gardening'', ''Bird Watching'', ''Reading Historical Non-Fiction'', ''Knitting'', ''Crossword Puzzles'', ''Beach Walks'', ''Volunteering at Local Food Bank'', ''Local History Research'',
