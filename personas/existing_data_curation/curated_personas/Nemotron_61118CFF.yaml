  career_goals: Leslie aims to solidify her legacy as an operational excellence champion before transitioning to a mentorship and advisory role. She plans to earn a Lean Six Sigma Black Belt certification,
    codify best‑practice SOPs, and launch a formal mentorship program for emerging managers in her region. Over the next five years, she hopes to spearhead a sustainability initiative that reduces waste
    and energy use within her organization, aligning with her practical values and concern for the community. Ultimately, she envisions a phased retirement that allows her to consult part‑time while dedicating
    more time to volunteer coordination and supporting local charitable projects.
