  career_goals: Chelsie aims to build a compelling art portfolio that will earn her admission to a specialized high‑school program in visual arts or interactive media. She envisions pursuing a bachelor’s
    degree in graphic design, illustration, or game development, with the long‑term ambition of becoming a concept artist for video games or a writer‑illustrator of graphic novels. She also keeps an open
    option to combine art with science as a scientific illustrator, merging her love for abstract concepts with visual communication.
