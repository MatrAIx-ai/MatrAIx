personas:
  professional: Chelsie Cox, a 14-year-old aspiring visual storyteller, merges traditional sketching with digital illustration in Procreate, writes speculative micro-fiction, and channels strategic thinking
    from chess into meticulously planned art projects, all while maintaining a reliable schedule that balances schoolwork with solo creative bursts.
  sports: Chelsie Cox prefers solitary endurance activities, logging weekend trail runs on the local nature preserve while cheering on the hometown minor-league baseball team the River City Raptors and
    occasionally competing in the regional junior chess league, which they treat as a mental sport as much as a physical pursuit.
  arts: Chelsie Cox's artistic palate includes the surreal collages of James Jean, the ambient soundscapes of Brian Eno, and the speculative worlds of author N.K. Jemisin, which inspire daily sketch-journals
    filled with minimalist ink drawings and experimental Procreate compositions set to Max Richter's piano-drift tracks.
  travel: Chelsie Cox dreams of night-time road trips to dark-sky parks like Bryce Canyon and international escapes to the Atacama Desert for unrivaled stargazing, but currently satisfies wanderlust with
    meticulously planned weekend hikes to the nearby Willow Creek Trail and family visits to the historic coastal town of Portsville, where they photograph sunrise over the sea.
  culinary: Chelsie Cox delights in simple yet comforting meals such as miso-ramen with soft-boiled eggs, avocado toast topped with smoked salmon, and midnight cereal bowls of cocoa-flavored granola, often
    experimenting by adding matcha powder or chili flakes to discover unexpected flavor combos while they habitually snack on gummy bears while sketching.
  core: Chelsie Cox is a quiet, competitively-driven teen who transforms solitary curiosity into vivid art, strategic games, and night-sky adventures, all while juggling school, budget puzzles, and a penchant
    for late-night storytelling.
background:
  cultural: Chelsie comes from a white New England family rooted in Kingston, Massachusetts, a town within Plymouth County known for its colonial history and close‑knit community. Her upbringing reflects
    typical American cultural practices—celebrating holidays like Thanksgiving and Fourth of July—while also emphasizing the regional New England values of independence, self‑reliance, and respect for the
    natural landscape. Access to a strong public school system and well‑stocked local libraries has fostered her love for reading and self‑directed learning. The quiet, coastal environment and historic
    surroundings inspire her solitary artistic pursuits and curiosity about the past.
