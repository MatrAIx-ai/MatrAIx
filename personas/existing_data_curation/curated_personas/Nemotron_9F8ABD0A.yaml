  hobbies: '[''Line dancing'', ''Group fitness classes (Zumba)'', ''Volunteering at food banks'', ''Attending local festivals'', ''Reading mystery novels'', ''Gardening'', ''DIY home improvement'', ''Exploring
    new recipes'', ''Listening to country music'', ''Participating in community clean‑up events'']'
  career_goals: Agatha aims to move into a supervisory role within a larger property‑management or hotel operation, where she can apply her practical knowledge to train teams and improve service standards.
    She plans to earn a Certified Professional Cleaner credential and complete an associate’s degree in business management to support her long‑term ambition of launching her own environmentally‑focused
    cleaning business. Financial independence, reputation for high‑quality service, and the ability to mentor others are central to her career vision.
