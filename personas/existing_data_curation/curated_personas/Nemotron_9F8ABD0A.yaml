personas:
  professional: Agatha Brown is an experienced housekeeping professional who couples a curiosity for eco‑friendly cleaning innovations with a practical, systematic workflow, excelling in inventory management,
    client conflict resolution, and training new staff while balancing organization with the flexibility needed for varied client requests.
  sports: Agatha Brown stays active through weekly Zumba classes and line‑dancing nights, cheers for the Dallas Cowboys and Texas Rangers, and participates in a community 5K run organized by their local
    church, reflecting their competitive streak and love for group fitness.
  arts: Agatha Brown’s artistic side shines at Texas country music festivals where they dance to Garth Brooks and Carrie Underwood, unwind with mystery novels by Agatha Christie, and occasionally attend
    local theater productions of classic plays.
  travel: Agatha Brown prefers weekend road trips across the Lone Star State—visiting Austin’s live‑music scene, the Hill Country wineries, and the historic Fort Worth Stockyards—while dreaming of a summer
    getaway to the coastal towns of Oaxaca, Mexico, balancing careful planning with spontaneous detours.
  culinary: Agatha Brown enjoys experimenting with Tex‑Mex recipes, frequently preparing brisket tacos with smoked chipotle, homemade guacamole with fresh cilantro, and seasonal squash casserole, while
    their cooking skill ranges from confident grill master to occasional over‑salting mishap.
  core: Agatha Brown blends southern hospitality, competitive curiosity, and an eco‑conscious work ethic into a life of community service, DIY projects, and relentless pursuit of a greener cleaning business.
background:
  cultural: Agatha grew up in a middle‑class family in the Fort Worth area, absorbing the Southern hospitality and work ethic typical of Texas culture. Her upbringing emphasized community involvement, family
    loyalty, and a pragmatic approach to life. While she identifies with the broader white Texan heritage, she is also attuned to the multicultural fabric of Fort Worth, especially the Hispanic influences
    that shape local cuisine and celebrations. A lifelong association with her local church and regular participation in community events have reinforced her values of service, resilience, and personal
    responsibility.
attributes:
  skills: '[''Residential cleaning'', ''Deep‑cleaning techniques'', ''Carpet and upholstery care'', ''Inventory management'', ''Chemical safety compliance'', ''Customer service'', ''Time management'', ''Team
