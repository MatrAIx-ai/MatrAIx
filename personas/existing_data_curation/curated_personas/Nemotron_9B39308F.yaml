  career_goals: In the next five years, Butler aims to ensure a smooth transition of leadership by mentoring an associate pastor and establishing an intergenerational mentorship program that pairs senior
    congregants with younger members. He intends to author a book that explores how historic liturgical practices can enrich contemporary worship, and to secure a heritage grant for restoring the historic
    sanctuary of his Haverhill church. Expanding the church’s mental‑health counseling services and creating an online archive of local religious history are also top priorities. Ultimately, he hopes to
    leave a lasting legacy of strengthened community bonds, financial sustainability, and recognized service to the wider Haverhill area.
