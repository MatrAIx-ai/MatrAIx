  hobbies: '[''Journaling'', ''Reading (personal development, African‑American fiction, educational psychology)'', ''Baking and cooking'', ''Urban gardening'', ''Listening to R&B and soul music'', ''Community
    church events and potlucks'', ''Volunteer reading programs for children'', ''Yoga and mindfulness practice'', ''Walking in local parks'', ''Watching educational documentaries'']'
  career_goals: Shamicka aims to earn an associate degree in Early Childhood Education and later a bachelor's in Educational Administration, securing the Child Development Associate (CDA) credential along
    the way. Her long‑term ambition is to become a Director of an early‑learning center or a regional manager for a nonprofit community‑based childcare network. She envisions designing culturally responsive
    curricula that reflect African‑American heritage, expanding outreach programs for underserved families, and instituting staff‑wellness initiatives that reduce workplace stress. Ultimately, she hopes
    to combine her organizational strengths with her commitment to community empowerment to elevate the quality and accessibility of early childhood education in her region.
