  hobbies: '["Sketching", "Reading speculative fiction and philosophy", "Visiting art galleries and museums", "Photography (urban and nature)", "Playing acoustic guitar", "Creative writing (poetry and short
    stories)", "Listening to jazz and neo‑soul", "Volunteering at community art workshops"]'
  career_goals: Cornelius aims to formalize his artistic practice by earning an Associate of Arts in Graphic Design from Hillsborough Community College within the next two years. He plans to build a professional
    portfolio that blends his love for abstract concepts with socially conscious themes, eventually securing a junior graphic designer position at a nonprofit arts organization in Tampa. Long term, he envisions
    launching a community‑focused art collective that offers workshops for youth in underserved neighborhoods, using his organizational skills to coordinate events and his artistic talents to mentor participants.
    He also hopes to exhibit a series of mixed‑media pieces that explore African‑American identity and the urban landscape of Tampa.
