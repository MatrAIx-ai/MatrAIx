personas:
  professional: Cornelius Simpson, a 23‑year‑old aspiring graphic designer, blends rigorous time‑blocking with a flair for surreal illustration and vector artwork, delivering socially aware visual campaigns
    for Tampa’s nonprofit arts scene while meticulously curating an online portfolio.
  sports: Cornelius Simpson stays active by running along the Tampa Riverwalk in the spring, joining weekend pick‑up basketball games at the local YMCA, cheering for the Tampa Bay Buccaneers and Lightning,
    and riding with the Tampa Metro Cycling Club during summer weekends.
  arts: Cornelius Simpson channels inspiration from surrealist René Magritte and contemporary muralist Banksy, frequents the Tampa Museum of Art to study works by Kara Walker, and weaves the haunting melodies
    of Joni Mitchell and Radiohead into their poetry‑driven sketch sessions.
  travel: Cornelius Simpson prefers solo, meticulously planned trips that blend art and architecture, having explored New York’s galleries, New Orleans’ jazz districts, and Havana’s vibrant murals, while
    dreaming of a future pilgrimage to Kyoto’s temples and the street‑art‑laden neighborhoods of Valparaíso, all on a modest student‑budget.
  culinary: Cornelius Simpson, a competent home cook, favors plant‑based dishes like quinoa‑black‑bean bowls and masterfully brews pour‑over coffee, occasionally indulges in shrimp étouffée seasoned with
    Cajun paprika, yet admits they’re a self‑confessed weak baker, often burning the edges of cookie batches.
  core: Cornelius Simpson is a disciplined dreamer who channels surreal visions into graphic design, yet habitually hoards sketchbooks, fuels late‑night creativity with copious coffee, and sometimes postpones
    mundane chores for the allure of the next artistic spark.
background:
  cultural: Cornelius grew up as an African‑American in Tampa’s East Ybor neighborhood, a community with deep roots in civil‑rights activism and a vibrant cultural scene. His family’s weekly gatherings
    at a local Baptist church emphasized respect, cooperation, and storytelling, shaping his cooperative nature. He celebrates the city’s annual African American Heritage Festival, where he’s been exposed
    to a mix of Southern soul food, jazz, and Afro‑Caribbean rhythms, all of which influence the color palettes and themes in his artwork. The multicultural atmosphere of Tampa, combined with his family's
    emphasis on education and community service, has instilled in him a sense of responsibility to represent his heritage through creative expression.
attributes:
