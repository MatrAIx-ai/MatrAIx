  career_goals: Quang aims to become a senior civil engineer specializing in resilient, sustainable infrastructure, seeking leadership roles on large‑scale public works in the Bay Area. He aspires to develop
    innovative design solutions that marry structural efficiency with artistic expression, perhaps through integrating public art installations into bridges and transit stations. In the next five years,
    he plans to obtain the Professional Engineer (PE) licensure, lead a multidisciplinary team, and contribute research on low‑carbon construction materials. Long‑term, he envisions founding a boutique
    engineering consultancy that focuses on eco‑friendly, community‑centric projects, and publishing papers on the intersection of engineering and urban aesthetics.
