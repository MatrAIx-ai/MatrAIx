  career_goals: Masson aims to turn his hands‑on technical abilities into a career in IT support or technology repair. He plans to earn entry‑level certifications (CompTIA A+, Network+), perhaps through
    community‑college courses or online programs, enabling him to work as a help‑desk technician for a local business or start his own freelance computer‑repair service. He also envisions blending his mechanical
    skills with technology by eventually working in fields like smart‑home installation or robotics maintenance. While he recognizes the value of formal education, he prefers a path that mixes practical
    apprenticeships with targeted certifications, allowing him to earn while he learns.
