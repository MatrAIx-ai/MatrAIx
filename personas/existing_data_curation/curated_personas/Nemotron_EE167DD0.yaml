    theater attendance'', ''Volunteering at local animal shelter'', ''Landscape photography'']'
  career_goals: Susan aims to move into a Director of Development role within the next five years, leading a mid‑size nonprofit to expand its donor base and revenue streams. She plans to deepen her expertise
    in data‑driven fundraising, obtain a master's degree in nonprofit management, and build a mentorship program for emerging fundraisers. Long‑term, she envisions founding a community foundation that integrates
    sustainable fundraising practices and supports local education and health initiatives.
