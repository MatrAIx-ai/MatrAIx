personas:
  professional: Susan Cordeiro, a seasoned nonprofit fundraiser, blends methodical planning with a curiosity for innovative donor strategies, leveraging data‑driven CRM segmentation to craft personalized
    outreach while they steer large‑scale events with disciplined budget oversight.
  sports: Susan Cordeiro stays active by hiking with the Raleigh Hiking Club, they cheer on the Carolina Hurricanes during hockey season, and they unwind in a community yoga studio that balances cardio
    hikes with flexibility work, while joining a casual summer softball league for team camaraderie.
  arts: Susan Cordeiro immerses themselves in the arts through community theater roles, they attend North Carolina Symphony concerts featuring Tchaikovsky, and they curate playlists that weave together
    Adele’s soulful ballads with folk storytelling by Rhiannon Giddens.
  travel: Susan Cordeiro plans purposeful trips, they embark on weekend drives along the Blue Ridge Parkway for landscape photography, explore Charleston’s historic district for culinary inspiration, and
    dream of a month‑long immersion in Portugal’s Alentejo region to study vineyard landscapes, balancing modest budgets with a thirst for cultural depth.
  culinary: Susan Cordeiro, an enthusiastic home chef, they master Portuguese bacalhau à Brás and Southern fried chicken on the same weekend, seasoning dishes with smoked paprika, garlic, and fresh herbs
    while their backyard garden supplies heirloom tomatoes and kale for farm‑to‑table meals.
  core: Susan Cordeiro balances meticulous fundraising with spontaneous midnight hikes, they hoard garden seeds like a quiet collector, and they tend to procrastinate on dental appointments despite a strong
    commitment to health.
background:
  cultural: Susan is a third‑generation American of Portuguese descent. Raised in suburban North Carolina, she grew up with a blend of Portuguese family traditions—such as celebrating festas and preparing
    dishes like bacalhau—and Southern hospitality that emphasizes community involvement and neighborly support. Her upbringing combined Catholic values with a strong emphasis on education and public service,
    shaping her commitment to nonprofit work and her comfort navigating the diverse cultural landscape of Apex, NC.
