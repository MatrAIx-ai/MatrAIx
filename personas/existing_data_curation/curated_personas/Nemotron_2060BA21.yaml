  career_goals: Nelida aims to solidify a legacy of mentorship by developing a structured training program that empowers emerging supervisors. She hopes to implement a flexible scheduling model that improves
    work‑life balance for her staff while maintaining high sales performance. Over the next few years she envisions transitioning into a consulting role, sharing her practical retail wisdom with small‑business
    owners across Medina County. Ultimately, she plans to retire with a smooth handoff to a trusted successor, while remaining active in local community initiatives and volunteer leadership.
