personas:
  professional: Salina Marquez, a 36‑year‑old hospitality operations manager with a liberal arts background, blends analytical rigor and creative storytelling to streamline multi‑unit restaurant workflows,
    champion rigorous food‑safety standards, and foster a team culture that balances empowerment with clear accountability, all while planning to earn a ServSafe Master Trainer certification and scale up
    sustainable, farm‑to‑table sourcing.
  sports: Salina Marquez, an avid weekend hiker on the Falls Lake trail network and a regular yoga practitioner, supports the Carolina Hurricanes and the Durham Bulls, and is a member of the Raleigh Women’s
    Running Club, balancing cardio sessions with mindful stretching to maintain stamina for long shifts.
  arts: Salina Marquez, who volunteers at the local food pantry and attends productions at the Raleigh Little Theatre, draws artistic inspiration from playwright Annie Baker, admires the soulful blues of
    Alabama Shakes, and curates a small home gallery of Southern folk art, using these influences to shape the ambience of her envisioned boutique café.
  travel: Salina Marquez, a meticulous planner who loves road‑tripping with a detailed itinerary, has explored the historic streets of Savannah, the Mediterranean coasts of Santorini and Barcelona for culinary
    inspiration, and frequently escapes to Asheville’s mountain retreats, while balancing family commitments and a modest travel budget.
  culinary: Salina Marquez, a self‑taught home chef with a penchant for blending Southern comfort with Mediterranean flair, regularly cooks dishes like lemon‑herb grilled shrimp over collard‑green grits,
    roasted eggplant hummus with basil and thyme, and peach‑glazed BBQ chicken served with couscous, sourcing fresh herbs from her backyard garden and experimenting with spices like sumac and smoked paprika.
  core: Salina Marquez is a methodical hospitality professional who fuses Southern tradition with global flavors, budgets prudently while indulging in culinary splurges, and balances community devotion
    with an ambitious entrepreneurial spirit.
background:
  cultural: Salina grew up in a middle‑class white family in the suburban outskirts of Raleigh, North Carolina, where Southern hospitality and community involvement were core values. Family gatherings often
    centered around shared meals, fostering her early love for cooking and hospitality. Her upbringing was shaped by church activities, local farmers' markets, and weekend trips to nearby historic sites,
    instilling a respect for tradition while also sparking curiosity about broader cultural narratives. This Southern cultural tapestry, blended with a liberal arts education, informs her balanced worldview—valuing
    both time‑honored practices and innovative ideas.
attributes:
  skills: '[''Staff scheduling and labor budgeting'', ''Inventory management and cost control'', ''Food safety compliance (ServSafe Master)'', ''Menu development and seasonal adaptation'', ''Vendor negotiation
