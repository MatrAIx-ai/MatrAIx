    forecasting and financial reporting'', ''Sustainability initiatives (waste reduction, local sourcing)'', ''Effective written and verbal communication'']'
  hobbies: '[''Home recipe experimentation'', ''Herb gardening'', ''Contemporary fiction reading'', ''Book club participation'', ''Food pantry volunteering'', ''Hiking Falls Lake trails'', ''Yoga practice'',
    ''Community theater attendance'', ''Traveling to explore regional cuisines'', ''DIY home improvement projects'']'
  career_goals: In the near term, Salina aims to earn a ServSafe Master Trainer certification and lead a multi‑unit operation within a regional restaurant chain, using that platform to champion waste‑reduction
    and farm‑to‑table sourcing. Over the next five to ten years, she aspires to open her own boutique café in the Raleigh‑Durham area that showcases a fusion of Southern comfort and Mediterranean flavors,
    offering a community space for local artists and a training hub for emerging hospitality professionals. Parallel to these ambitions, she plans to pursue a part‑time MBA focused on sustainable business
    practices to broaden her strategic expertise.
