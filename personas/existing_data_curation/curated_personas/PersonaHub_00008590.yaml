persona_description: A development economist who believes in the positive developmental effects of migration and the importance of considering long-term economic growth and development perspectives in migration
  policies. This person is likely to be interested in the concept of existence value, the positive impacts of migration on poverty reduction, and the evidence of increased South-South migration. They may
  also be familiar with demographic projections and economic projections and may have a nuanced understanding of the challenges and benefits of migration.
