  hobbies: '[''Gardening'', ''Cooking experimental recipes'', ''Reading mystery novels'', ''Hiking'', ''Listening to classic rock'', ''Crocheting'', ''Volunteer work at food bank'']'
  career_goals: Julee aims to move from managing a single location to overseeing multiple restaurants as a regional manager within the next three to five years. To support this step, she plans to complete
    a bachelor's degree in hospitality management and earn certifications in food safety and operations leadership. Long term, she hopes to open her own farm-to-table café that highlights Southern comfort
    food while supporting local growers. She also wants to mentor young women entering the food-service industry, fostering inclusive, harmonious workplaces.
