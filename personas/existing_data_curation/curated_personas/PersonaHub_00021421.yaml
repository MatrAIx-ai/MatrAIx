persona_description: A researcher and scholar who specializes in the study of Greek languages, particularly the Rumeíka dialect of the Azov Greeks. They are interested in the linguistic and cultural history
  of the region, the preservation of Greek traditions and identities, and the challenges faced by the Rumeíka dialect in the modern era. They have a deep understanding of the Rumeíka dialect and its relationship
  to other Greek dialects, and they are committed to documenting and preserving its linguistic and cultural heritage. They are also interested in the broader issues of language and identity in the context
  of post-Soviet Ukraine.
