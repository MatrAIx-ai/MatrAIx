personas:
  professional: Gregory Joyner is a seasoned electrician with over three decades of residential and commercial wiring expertise, who blends rigorous code compliance, solar PV and smart‑home installations
    with meticulous project planning and a talkative, hands‑on mentoring style that keeps apprentices engaged and safety‑first.
  sports: Gregory Joyner plays pickup basketball at the local park, cheers the Sacramento Kings at the Golden 1 Center, joins a weekend hiking group in the Sierra foothills, and volunteers as a referee
    for community youth leagues, blending competitive energy with a love for team camaraderie.
  arts: Gregory Joyner pours his craftsmanship into woodworking projects while unwinding to classic rock legends like Bruce Springsteen and folk icons such as John Denver, enjoys visits to the Crocker Art
    Museum, and occasionally attends local theater productions featuring performances by the Sacramento Children’s Theatre.
  travel: Gregory Joyner prefers structured road‑trip itineraries that still allow spontaneous stops, frequently drives the Pacific Coast Highway to visit Big Sur and Monterey, has explored Yosemite National
    Park and the vibrant food scene of Austin, Texas, and dreams of a leisurely retirement tour of New Zealand’s geothermal wonders and Hawaii’s volcanic landscapes.
  culinary: Gregory Joyner favors hearty, home‑cooked meals like rosemary‑garlic roasted chicken, grilled salmon with lemon‑dill sauce, and a garden‑fresh vegetable stir‑fry, enjoys crafting his own sourdough
    bread and sipping locally roasted coffee, yet admits to a weakness for late‑night pizza slices after long workdays.
  core: Gregory Joyner balances a methodical, safety‑first work ethic with a gregarious, community‑driven spirit, though a persistent undercurrent of worry keeps his schedule meticulously organized and
    his mind constantly ticking over the next project.
background:
  cultural: Gregory grew up in the greater Sacramento area, immersed in a working‑class, middle‑income environment typical of many white, blue‑collar families in California’s Central Valley. He was raised
    with a strong emphasis on a solid work ethic, community responsibility, and self‑reliance—values reinforced by local churches and neighborhood associations. The cultural fabric of North Highlands, with
    its blend of agricultural roots and increasing diversity, has shaped his inclusive outlook, encouraging him to actively engage with neighbors from varied backgrounds. His lifelong exposure to the practical,
    hands‑on ethos of American trades, combined with the region’s progressive tilt toward renewable energy, informs both his professional path and his commitment to community service.
attributes:
  skills: '[''Electrical wiring and installation'', ''Circuit troubleshooting and diagnostics'', ''National Electrical Code (NEC) compliance'', ''Solar photovoltaic system installation'', ''Smart‑home automation
