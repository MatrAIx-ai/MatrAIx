  hobbies: '[''Volunteering with Habitat for Humanity'', ''DIY home‑improvement projects'', ''Woodworking'', ''Gardening'', ''Playing pickup basketball'', ''Attending Sacramento Kings games'', ''Participating
    in neighborhood block parties'', ''Reading self‑help and personal development books'', ''Practicing gentle yoga'', ''Hiking in the Sacramento foothills'']'
  career_goals: Gregory aims to obtain his master electrician license within the next year and acquire specialized certification in renewable energy systems, positioning himself to lead sustainable projects
    in his community. He aspires to launch a small contracting business that prioritizes affordable, high‑quality electrical services for low‑income households and senior citizens in North Highlands. Mentoring
    at‑risk youth through vocational training is a personal ambition, allowing him to blend his technical expertise with his compassionate drive. Long‑term, he envisions transitioning into a safety instructor
    role, reducing physical strain while continuing to share his knowledge and fostering a culture of safety and cooperation among fellow tradespeople.
