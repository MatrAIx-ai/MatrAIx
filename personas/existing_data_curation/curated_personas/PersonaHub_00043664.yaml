persona_description: A historian interested in the study of ancient cultures, particularly those from South America. This person is particularly interested in the Paracas culture and its artifacts, which
  are renowned for their depictions of human trophy heads. They are also curious about the nature of violence in Paracas culture and its relationship to ritualized elite competition or war for political
  and economic ends. They are interested in the rich exchanges of goods, peoples, and ideas between the coast, mid-valley, and highland ecological zones, and would like to gain a rich experience in excavations,
  mapping, laboratory work, and analytical techniques while living in comfortable but modest housing in the village of El Carmen.
