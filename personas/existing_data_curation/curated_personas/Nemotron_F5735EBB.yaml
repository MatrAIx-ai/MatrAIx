  career_goals: Eneida aims to progress from overseeing a single childcare center to becoming a regional director responsible for multiple sites across St. Johns County, with a focus on expanding bilingual
    and arts‑integrated programs. She plans to earn a master’s degree in Educational Leadership within the next two years to enhance her strategic planning and policy‑making skills. Long‑term, she envisions
    founding a charter school that celebrates Cuban cultural heritage while embedding inclusive, trauma‑informed practices. To achieve these goals, she intends to build a strong professional network, secure
    grants for innovative pedagogy, and champion systemic changes that reduce staff stress and improve child outcomes, reflecting her competitive drive and desire for measurable impact.
