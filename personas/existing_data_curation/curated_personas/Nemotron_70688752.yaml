  hobbies: '[''gardening'', ''cooking Mexican cuisine'', ''fishing'', ''trail walking'', ''reading self-help books'', ''community center workshops'', ''playing guitar'', ''cultural celebrations'']'
  career_goals: Fernando aims to complete his GED within the next year and enroll in a community college program for a certificate in Office Administration or Project Management. He aspires to secure a
    part‑time administrative or logistics role that offers a structured environment and steady income, allowing him to support his family and reduce financial anxiety. In the longer term, he envisions launching
    a home‑based consulting service that helps other families organize their households and finances, as well as a small catering side‑business featuring traditional Mexican dishes.
