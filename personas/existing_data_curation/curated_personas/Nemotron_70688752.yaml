personas:
  professional: Fernando Laboy, a detail‑oriented aspiring office administrator, leverages his meticulous budgeting, scheduling, and handyman skills to excel in household logistics while preparing for a
    community‑college certificate in Project Management, aiming to translate that precision into a part‑time administrative role that offers structured routines and steady income.
  sports: Fernando Laboy, an avid weekend angler and regular participant in the Lakeview Trail Hiking Club, follows the Seattle Mariners for baseball, the Portland Timbers for soccer, and fits brief cardio
    sessions into his gardening breaks to stay active without the pressure of competitive sports.
  arts: Fernando Laboy, a modest acoustic‑guitar hobbyist, finds solace strumming folk renditions of José González, Juanes, and Carlos Santana while attending local cultural celebrations that feature traditional
    dance performances and folk art exhibitions.
  travel: Fernando Laboy, a budget‑conscious traveler, enjoys day trips to the nearby Sierra lakes for fishing, has explored Oaxaca’s culinary markets, and hopes to one day drive the Pacific Coast Highway
    to soak in coastal vistas while balancing family obligations.
  culinary: Fernando Laboy, a self‑taught home chef, turns his backyard-grown herbs into authentic mole, tamales, and fresh salsa verde, experiments with chilies, corn masa, and roasted tomatillos, and
    hosts intimate dinner gatherings where he meticulously plans menus and portions.
  core: Fernando Laboy, a hyper‑organized yet anxiety‑prone family caretaker, juggles garden stewardship, meticulous budgeting, and quiet guitar sessions while secretly hoarding coupons for future savings.
background:
  cultural: Fernando is a second‑generation Mexican‑American who grew up in a Spanish‑speaking household in Southern California. He maintains a strong connection to Mexican traditions such as Día de los
    Muertos, Christmas posadas, and communal meals. He celebrates both Mexican and American holidays, and his family values emphasize respect for elders, communal support, and Catholic faith. Fluent in
    Spanish and English, he navigates both cultures comfortably, blending Mexican culinary heritage with the diverse influences of the Perris community.
