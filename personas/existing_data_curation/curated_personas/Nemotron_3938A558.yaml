  career_goals: Even in retirement, Juan Antonio remains driven to leave a lasting artistic legacy. He aims to author a memoir that weaves together his Venezuelan heritage and lifelong passion for art,
    and to publish a series of essays on the evolution of Latin American modernism. He hopes to establish an annual multicultural art festival in Largo that highlights senior creators, develop a mentorship
    program linking senior painters with younger artists, and collaborate on a public mural that celebrates the Venezuelan diaspora and the cultural richness of Pinellas County.
