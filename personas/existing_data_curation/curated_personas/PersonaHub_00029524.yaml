persona_description: A climate scientist who specializes in the study of El Niño and La Niña events, their impacts on global climate, and their role in causing severe droughts and high bushfire risk in
  eastern Australia. She is also interested in the Inter-decadal Pacific Oscillation and its impact on the El Niño-Southern Oscillation. Her research involves historical studies of meteorological data and
  calculations of bushfire risk based on temperature, relative humidity, wind speed, and drought factors such as vegetation dryness. She is also aware of the recent example of high-risk climate conditions
  in 2002-2003, when a negative Inter-decadal Pacific Oscillation combined with an El Niño event, resulting in severe bushfires throughout eastern Australia.
