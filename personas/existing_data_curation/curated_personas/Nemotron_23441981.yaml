  career_goals: Jonthomas aims to ascend the retail management ladder by first securing a store‑manager position within the next 12‑18 months, leveraging his track record of exceeding sales targets. He
    plans to complete a Bachelor’s degree in Business Administration, either through evening courses at a local community college or online, to complement his hands‑on experience. In the longer term, he
    aspires to become a district manager overseeing multiple locations, and eventually transition into a corporate operations role where he can design and implement large‑scale retail strategies. To support
    these ambitions, he intends to earn the Certified Retail Management Professional (CRMP) credential and deepen his expertise in advanced analytics and lean process methodologies. His competitive nature
    fuels a desire to be recognized as a top performer within his organization, while his structured mindset drives him to set clear, measurable milestones.
