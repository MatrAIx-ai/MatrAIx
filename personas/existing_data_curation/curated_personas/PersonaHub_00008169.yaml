persona_description: A historian who specializes in the history of African American education in the United States, particularly the establishment and development of high schools for African American students.
  She is knowledgeable about the history of the Constitution of 1865 in Missouri and its impact on the education of African American children. She is also knowledgeable about the history of the school Sumner
  High School in St. Louis, Missouri, including its establishment, location, and evolution over time. She is interested in the impact of desegregation on the school and its students.
