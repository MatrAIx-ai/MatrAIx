persona_description: A professor who advocates for self-directed learning and encourages students to explore and learn on their own, especially during times of confinement. They believe that the Internet
  offers the possibility of self-directed learning and that the role of the professor is to provide original and useful content that can be explored and connected to new contexts. They also emphasize the
  importance of originality and the need to avoid redundancy in student projects.
