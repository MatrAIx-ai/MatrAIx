  career_goals: Frank aims to advance to a senior regional director role where he can shape large‑scale mixed‑use developments that marry high‑performance construction with distinctive artistic design.
    He plans to earn his PMP certification and pursue a professional engineering license to deepen his technical credibility. Over the next five years, he hopes to lead a portfolio of sustainably built
    projects in the New York metropolitan area, championing green building certifications and innovative material use. Long‑term, Frank envisions founding his own boutique consulting firm that advises developers
    on integrating art, community engagement, and mental‑health‑focused site cultures into their projects, positioning himself as a thought leader at the intersection of construction, design, and well‑being.
