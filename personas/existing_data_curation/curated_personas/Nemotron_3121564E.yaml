personas:
  professional: A seasoned construction manager, Frank Shaffer leverages advanced scheduling tools such as Primavera P6 and MS Project, rigorous budgeting, and sustainable building practices while infusing
    artistic design elements from collaborations with architects and artists, leading multi‑phase mixed‑use developments with methodical precision and a collaborative, mental‑health‑aware leadership style
    that balances assertiveness with empathy.
  sports: Frank Shaffer straps on cleats every Saturday for the Queens Knights adult soccer league, passionately cheers for the New York Knicks at Madison Square Garden and follows the New York Giants throughout
    the football season, using these communal sporting rituals to counterbalance workplace stress and nurture their sociable, group‑oriented side.
  arts: Frank Shaffer spends weekend afternoons wandering MoMA, the Whitney, and off‑beat Brooklyn galleries, drawing inspiration from Ai Weiwei’s installations and the kinetic sculptures of Rafael Lozano‑Hemmer,
    which they channel into their architectural photography that captures the interplay of light and form in historic and modern structures.
  travel: Frank Shaffer curates a travel itinerary that alternates between architecture‑focused trips to Barcelona’s Sagrada Família and quiet retreats in Kyoto’s bamboo forests, favoring a mix of meticulously
    planned tours and spontaneous street‑food excursions while funding these adventures through a dedicated travel savings account.
  culinary: Frank Shaffer experiments in the kitchen by mastering Mediterranean dishes like moussaka with lamb and sumac, alongside Asian specialties such as Thai green curry infused with galangal and kaffir
    lime, using a well‑worn cast‑iron skillet, a modest collection of exotic spices, and an occasional splash of high‑quality olive oil to impress family and colleagues at dinner gatherings.
  core: Frank Shaffer is a meticulously organized, art‑obsessed construction leader whose anxiety fuels a relentless quest for aesthetic harmony, yet a habit of binge‑ordering artisanal coffee and spontaneous
    soccer matches often reveals a restless, sociable spirit.
background:
  cultural: Frank grew up in a middle‑class, white, suburban family in northern New Jersey. His ancestry is primarily of German and Dutch descent, reflecting the historical settlement patterns of Bergen
    County. The community emphasized hard work, reliability, and close neighborhood ties, while his proximity to New York City exposed him early to a vibrant arts scene that sparked his lifelong appreciation
    for visual and performing arts. He celebrates traditional American holidays such as Thanksgiving and the Fourth of July, often participating in local events like the New Milford parade and community
    fairs. This blend of suburban American values with an appreciation for multicultural influences informs both his professional outlook—favoring collaborative, innovative projects—and his personal interests
    in art, food, and community engagement.
