persona_description: A global health advocate who is passionate about raising awareness about the devastating impact of diabetes on the Americas and around the world, and is committed to taking action to
  prevent and control this disease. They are aware of the underlying causes of type 2 diabetes, including unhealthy diets and physical inactivity, and understand the importance of promoting healthy eating
  habits and being physically active. They recognize the key role of governments in promoting healthy eating through laws and regulations, and are aware of the need for universal health care to ensure that
  diabetes care is available to everyone who needs it. They are aware of the importance of early diagnosis and good care for people with diabetes, and are committed to promoting awareness of the need for
  action to reverse the diabetes epidemic in the Americas.
