  hobbies: '[''Playing Soccer'', ''Cooking Mexican Cuisine'', ''Dancing (Cumbia/Salsa)'', ''Urban Gardening'', ''Reading (Sci-Fi & Education)'', ''Volunteering (Community Art Workshops)'', ''Listening to
    Live Music'']'
  career_goals: He aims to complete his Texas Teacher Certification by next semester, earn a Master's in Educational Leadership, and become an assistant principal within five years. He also wants to develop
    a community partnership program linking his school with local businesses for STEM internships, and eventually start a bilingual after‑school academy that provides academic support and cultural enrichment
    for Mexican‑American youth.
