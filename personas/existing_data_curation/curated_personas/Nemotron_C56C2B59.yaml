  hobbies: '["Visiting art galleries and street‑art tours", "Volunteering at cultural festivals", "Playing soccer", "Salsa dancing", "Group trivia nights", "Cooking Mexican cuisine", "Photography", "Online
    graphic design courses", "Mindfulness and meditation practice", "Book club participation (contemporary fiction, philosophy)"]'
  career_goals: Roberto aims to advance from his current executive secretary role to an office manager position within the next two years, eventually pursuing a senior executive assistant or operations
    coordinator role that blends administrative expertise with his passion for arts and culture. He plans to earn a Certified Administrative Professional (CAP) certification and complete a bachelor’s degree
    in Business Administration or Arts Management. In the longer term, he hopes to lead a cultural programming team at a museum, community arts center, or nonprofit, using his organizational talent and
    creative mindset to forge partnerships and deliver public events that reflect both his Mexican heritage and the diverse community of Hampton Roads.
