  hobbies: '["Pick‑up basketball", "Robotics club mentoring", "Board‑game nights", "Hiking", "Snowshoeing", "Ice fishing", "Raspberry Pi tinkering", "Tech meetups", "Charity runs"]'
  career_goals: Irving aims to advance from a senior support specialist to an IT service manager, leading a high‑performing support team while driving process improvements and automation initiatives. He
    plans to earn certifications such as ITIL Expert, CompTIA Security+, and Cisco CCNP to broaden his expertise. Long‑term, he aspires to transition into a cloud operations or cybersecurity leadership
    role, overseeing strategic technology initiatives that blend innovative solutions with proven operational discipline.
