  hobbies: '[''Reading adventure and space books'', ''Sketching and watercolor painting'', ''LEGO building (engineering sets)'', ''Educational coding games on Scratch Jr.'', ''Exploring local parks and
    science museum exhibits'', ''Listening to salsa and reggaetón music'', ''Playing board games (Connect Four, junior chess) with a small group'']'
  career_goals: Juan's career dreams are shaped by his fascination with exploration, technology, and art. He envisions becoming an astronaut who can travel to space and document his journeys through sketches,
    or a marine biologist who studies the coral reefs off Florida's coast while creating vivid illustrations for scientific outreach. He also hopes to design innovative playgrounds that combine sustainability
    with vibrant Caribbean-inspired art, hoping to win design competitions. His competitive streak pushes him to aim for top places in science fairs and LEGO building contests, fueling ambition to turn
    his curiosity into a future where he can inspire other children, especially those from his Puerto Rican community, to pursue STEAM fields.
