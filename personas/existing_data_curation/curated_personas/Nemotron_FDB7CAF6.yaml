personas:
  professional: Juan Hernandez, an aspiring junior engineer, channels their curiosity about structures by racing against the clock to assemble LEGO robotics kits while dreaming of one day designing real-world
    space habitats.
  sports: Juan Hernandez, a fan of the Orlando Magic and a member of the local U8 soccer club, spends weekends dribbling a soccer ball at community fields, practicing salsa steps from family playlists,
    and joining the science center’s kid‑friendly fitness challenges, yet prefers the quiet of a backyard obstacle course over large stadium crowds.
  arts: Juan Hernandez, a budding sketch artist, fills their notebook with vibrant renditions of Puerto Rican street festivals and imaginary space colonies while humming along to salsa hits from artists
    like Celia Cruz and reggaetón grooves by Daddy Yankee, often recreating scenes with crayons during quiet moments after school.
  travel: Juan Hernandez, whose travel wishlist includes revisiting family beaches in Puerto Rico, exploring the Kennedy Space Center’s launch pads, and taking a future road trip to the National Aquarium
    in Baltimore, prefers short, well‑planned excursions where they can draw the places they visit, but sometimes resists long flights.
  culinary: Juan Hernandez, an enthusiastic junior chef, loves helping in the kitchen to mash plantains for mofongo, sprinkle cheese on homemade pizza, and whisk together guava‑flavored smoothies, yet they
    often—unintentionally—leave a trail of crumbs on the countertop while juggling a video game controller.
  core: Juan Hernandez mixes relentless curiosity with a competitive streak, turning every LEGO build into a race, every sketch into a story, and every allowance coin into a strategic game, all while occasionally
    forgetting to put away their toys before bedtime.
background:
  cultural: Juan grew up in a bilingual Puerto Rican household in Windermere, Florida. Spanish is spoken at home, and he often switches between Spanish and English, giving him early bilingual proficiency.
    Family traditions such as celebrating Three Kings Day, cooking arroz con gandules, and listening to traditional plena and bomba music are woven into his daily life. His grandparents share stories of
    the island’s colorful festivals, which inspire his love for bright colors in his artwork. While attending a diverse elementary school, Juan experiences a mix of Caribbean and Floridian cultures, and
    he participates in community events like the annual Puerto Rican Heritage Parade in Orlando. The blend of his island roots and the subtropical environment of Central Florida fuels his curiosity about
    marine life and tropical ecosystems, influencing both his hobbies and future aspirations.
attributes:
  skills: '[''Reading comprehension (second‑grade level)'', ''Basic arithmetic (addition & subtraction)'', ''Creative drawing and watercolor painting'', ''Introductory coding with Scratch Jr.'', ''LEGO
