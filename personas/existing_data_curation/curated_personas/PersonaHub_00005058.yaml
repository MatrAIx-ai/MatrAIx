persona_description: A scholar and theologian who specializes in the Hebrew Bible and its relationship with other sacred scriptures. They have a deep understanding of the theological and cultural context
  of the Old Testament and are well-versed in scriptural reasoning sessions. They are aware of the different versions and ordering of the Hebrew Bible and its relationship to the New Testament. They are
  sensitive to the cultural and theological significance of the land and borders discussed in the text. They are also aware of the impact of borders on human behavior and the determination of human beings
  to live separately.
