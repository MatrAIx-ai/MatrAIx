personas:
  professional: Brent Ahluwalia, a seasoned electrical and electronics engineer with four decades of experience in power distribution and industrial automation, blends meticulous NEC code expertise with
    a curiosity for artistic lighting projects, now transitioning toward mentorship and community sustainability consultancy.
  sports: Brent Ahluwalia, an avid cyclist who rides the Merrimack River trail every Saturday, supports the New England Patriots and the Boston Celtics, and participates in a local over‑50 rowing club that
    meets at the Lowell waterfront.
  arts: Brent Ahluwalia, a dedicated visitor of the Lowell National Historical Park’s art exhibitions, regularly photographs the city’s historic mills, volunteers in a community theater’s lighting design
    crew, and draws inspiration from light‑based installations by James Turrell and local New England artist Mary Pratt.
  travel: Brent Ahluwalia prefers carefully planned road trips across New England, frequently escapes to Portland, Maine’s lobster shacks, journeys to Boston’s historic Freedom Trail, and dreams of a post‑retirement
    road‑trip along the Pacific Coast Highway after saving for the venture.
  culinary: Brent Ahluwalia loves hosting eclectic dinner parties where he whips up Moroccan tagine with preserved lemons, Korean bibimbap with gochujang, and a classic New England clam chowder, while his
    occasional over‑cooking of rice reveals his habit of losing track of time when fine‑tuning electronic projects.
  core: Brent Ahluwalia is a pragmatic, curiosity‑driven retiree who balances methodical engineering expertise with a zest for community art, biking, vintage electronics, and flavorful meals, all while
    maintaining a modest, disciplined lifestyle peppered with occasional hobby‑centric splurges.
background:
  cultural: Brent was born and raised in the New England region, growing up in a working‑class family that valued self‑reliance, community involvement, and a strong work ethic. His upbringing in the industrial
    hub of Lowell exposed him to the city's rich manufacturing legacy and the multicultural fabric of its neighborhoods. While ethnically white, he identifies with the regional culture of modesty, pragmatism,
    and an appreciation for both tradition and innovation. This background has shaped his respectful yet inquisitive outlook, fostering a genuine curiosity for the arts and new ideas while grounding him
    in the practical realities of engineering and community service.
