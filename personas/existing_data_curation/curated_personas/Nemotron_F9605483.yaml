    and DIY magazines'',''Weightlifting with structured workout plans'',''Volunteering at a local youth center'']'
  career_goals: Rafael aims to earn his GED within the next year, then enroll in a technical college or apprenticeship program in electrical technology. He seeks to become a licensed electrician, valuing
    the clear career progression, steady income, and tangible outcomes of the trade. Long‑term, he hopes to combine his technical expertise with his cultural heritage by eventually opening a family‑run
    Mexican taquería where he can apply his budgeting, organizational, and culinary skills. He also wants to give back to the local Latino community by mentoring younger students about vocational pathways.
