  career_goals: In retirement, Mark aims to apply his technical expertise to community benefit. He plans to volunteer as a mentor for local high‑school STEM clubs, serve on the advisory board of the Springfield
    community college's engineering program, and help preserve the city's industrial heritage through a historical society. He also hopes to travel with his wife to visit engineering marvels around the
    world, document his experiences through photography, and continue learning new subjects that merge curiosity with practical impact.
