personas:
  professional: Mark Kaplan, a retired mechanical engineer turned community mentor, leverages his three decades of CAD, MATLAB, and project‑management expertise to lead volunteer STEM tutoring, where they
    balance a diligent, organized nature with a flexible, hands‑on approach to problem solving.
  sports: Mark Kaplan follows the St. Louis Cardinals in baseball and the Kansas City Chiefs in football, participates in the Springfield Seniors’ Walking Club for morning strolls, and engages in low‑impact
    gym sessions at the senior center’s fitness room during winter, keeping active while respecting their knee osteoarthritis.
  arts: Mark Kaplan regularly attends community‑theater productions of classic plays like "Our Town" at the Springfield Playhouse, enjoys listening to Johnny Cash and The Chieftains on his vintage record
    player, and collects biographies of figures such as Abraham Lincoln, letting these artistic experiences inform his storytelling when mentoring students.
  travel: Mark Kaplan plans trips with meticulous spreadsheets, prioritizing national‑park road‑trips to Yellowstone and the Grand Canyon while dreaming of engineering pilgrimages to the Eiffel Tower, the
    Great Wall, and Japan’s Skytree, balancing adventure with a modest retirement budget and occasional travel with his wife.
  culinary: Mark Kaplan prefers hearty, home‑cooked meals like slow‑roasted beef pot roast with carrots, potatoes, and heirloom tomatoes from his garden, whips up corn chowder with fresh corn kernels, and
    relishes baking apple pie with a buttery crust—displaying a competent, if occasionally overly seasoned, cooking style that reflects his love for comfort food.
  core: Mark Kaplan is a pragmatic, curiosity‑driven retiree who channels engineering precision into hands‑on projects, community mentorship, and a zest for classic cars, hearty gardens, and spirited storytelling—while
    often misplacing their glasses and forgetting to water the tomatoes.
background:
  cultural: Mark grew up in Springfield, Missouri, in a middle‑class family with German and Irish roots. His upbringing reflected the Midwestern values of hard work, modesty, community involvement, and
    a pragmatic outlook. He benefited from a strong public‑school system and later earned a STEM graduate degree at a state university, where he was exposed to both the region's conservative traditions
    and the progressive spirit of scientific inquiry. Throughout his life, he has remained active in his local church, civic organizations, and neighborhood gatherings, embodying a blend of traditional
    Midwestern American culture and a lifelong curiosity for new ideas.
attributes:
