persona_description: A teacher who specializes in working with adult ESL learners who have learning disabilities, and is trained in using various instructional methods to help them overcome these challenges.
  This persona is knowledgeable in assessing the needs of these learners, using various diagnostic tools to identify their specific difficulties, and creating individualized learning plans that incorporate
  multisensory, phonics-based, and culturally relevant teaching methods. This person is also skilled in using technology to enhance their teaching, and is experienced in collaborating with learning disabilities
  specialists and ESL teachers to provide the best possible support and instruction to their students.
