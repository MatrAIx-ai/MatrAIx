persona_description: A literary critic who is interested in the significance and relevance of the witches in Shakespeare's Macbeth. This critic is particularly interested in the Elizabethan audience's perception
  of the supernatural elements in the play and how they were perceived in the context of the time. This critic is also interested in the psychological effects of the witches' prophecies on the characters
  and how they contribute to the moral downfall of Macbeth.
