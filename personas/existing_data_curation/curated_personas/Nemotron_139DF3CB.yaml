  career_goals: In the next five years, Justine aims to advance from sales manager to district sales manager and eventually become a regional sales director, overseeing multiple stores across the Northeast.
    She plans to complete a bachelor's degree in marketing or business administration, balancing coursework with her current role and family responsibilities. Long‑term, she dreams of opening her own boutique
    that blends contemporary art with curated fashion, using her passion for aesthetics to create a community space for local artists and shoppers. She also strives to develop stronger emotional resilience,
    incorporating mindfulness practices to lead her team with calm confidence and foster a supportive workplace culture.
