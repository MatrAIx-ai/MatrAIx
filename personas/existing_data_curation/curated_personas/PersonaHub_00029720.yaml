persona_description: A digital learning expert who specializes in online accessibility and is passionate about improving the learning experience for students with disabilities. They have a deep understanding
  of online learning models and have successfully implemented strategies to enhance engagement and retention for students with disabilities. They are well-versed in note-taking accommodations and have experience
  working with institutions to develop and implement effective learning tools. They have a track record of helping institutions across the US improve learning for students with disabilities and are currently
  developing a new app called Glean, which they believe will help students take better notes independently and boost their grades.
