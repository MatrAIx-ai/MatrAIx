personas:
  professional: Komal Goel, a senior office manager in training, blends meticulous administrative expertise with a vibrant imagination to redesign workplace processes into visually engaging experiences,
    leveraging bilingual communication, advanced Microsoft Office and Google Workspace skills, and a passion for integrating arts into corporate culture.
  sports: Komal Goel fuels fitness through weekend hikes with the Canadian County Trail Club, sunrise yoga at the Oklahoma City Riverfront, occasional adult softball league play in spring, and avidly supports
    the Oklahoma City Thunder during the NBA season.
  arts: Komal Goel channels creative energy into abstract watercolor paintings inspired by Mark Rothko’s color fields, regularly attends gallery openings at the Century Center for the Arts, and delights
    in world‑music concerts featuring Anoushka Shankar, while penning occasional poetry that echoes the lyrical styles of Rumi and Mary Oliver.
  travel: Komal Goel prefers meticulously planned cultural trips, having explored New Orleans for its jazz and Creole cuisine, trekked the historic streets of Kyoto, and dreamed of a Pacific Coast Highway
    road‑trip across Canada to sketch coastal cliffs, all while balancing travel expenses against professional development savings.
  culinary: Komal Goel, an inventive home chef, experiments with fusion dishes such as tandoori chicken tacos and smoked‑paprika collard greens curry, masters the interplay of garam masala and smoked paprika,
    sources fresh cilantro, mango, and mustard greens from local farmers’ markets, and occasionally indulges in fine‑dining experiences at boutique bistros.
  core: Komal Goel, a 37‑year‑old organizer with a vivid imagination, turns every spreadsheet into a color‑coded canvas, balances relentless productivity with nightly sci‑fi binge‑reading, and can’t resist
    impulsive splurges on art supplies.
background:
  cultural: Komal is of South Asian Indian descent, with a family lineage that blends Hindu and Muslim traditions—a reflection of her names Komal (a Hindu name) and Naeema (a Muslim name). Raised in a multicultural
    environment, she grew up valuing family cohesion, hospitality, and respect for elders. Fluent in English, Hindi, and conversational Urdu, she celebrates Diwali, Eid, and Thanksgiving, weaving together
    South Asian festivities with Midwestern American customs. Her culinary skills preserve traditional recipes while embracing regional ingredients, and she participates in community cultural events throughout
    Canadian County. This rich cultural tapestry informs her compassionate, cooperative nature and fuels her appreciation for diverse artistic expressions.
