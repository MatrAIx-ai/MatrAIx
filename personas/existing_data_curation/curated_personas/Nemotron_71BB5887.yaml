  hobbies: '[''Watercolor painting'', ''Reading science fiction and fantasy'', ''Creative writing (poetry)'', ''Visiting art galleries'', ''Cooking fusion cuisine (Indian & Southern)'', ''Yoga and meditation'',
    ''Hiking'', ''Volunteer work at cultural festivals'', ''Journaling and mind mapping'', ''Listening to/world music performances'']'
  career_goals: Komal aims to obtain the Certified Administrative Professional (CAP) credential within the next year and to transition into a senior office manager role where she can lead a team and shape
    workplace culture. She is passionate about integrating her creative interests with her administrative expertise, so she plans to spearhead employee‑engagement and arts‑focused initiatives within her
    organization. Over the next five years, she envisions moving into project coordination for a nonprofit arts organization, blending her organizational strengths with community‑building efforts. Completing
    a bachelor’s degree in Business Administration remains a priority, and she hopes to eventually launch a consultancy that helps small businesses design elegant, efficient administrative systems while
    fostering a collaborative environment.
