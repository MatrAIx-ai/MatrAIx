personas:
  professional: Xiomara Khan, a seasoned commercial cleaner with fifteen years of experience in Queens, merges meticulous floor‑care expertise, OSHA safety compliance, and bilingual communication with a
    forward‑thinking push for green‑cleaning practices as they mentor staff and target a supervisory role.
  sports: Xiomara Khan enjoys early morning walks in Cunningham Park, follows the New York Knicks and New York Mets loyally, participates in a neighborhood salsa dance circle that doubles as cardio, and
    joins a community adult soccer league every summer, balancing light aerobic activity with their love for rhythmic movement.
  arts: Xiomara Khan finds artistic solace as they crochet vibrant blankets while streaming salsa legends like Celia Cruz, modern reggaetón icons such as Bad Bunny, and heartfelt ballads by Marc Anthony,
    regularly attending the annual Three Kings Day parade and local theatre productions that celebrate rhythmic storytelling.
  travel: Xiomara Khan prefers budget‑friendly trips that blend cultural immersion and relaxation, having explored historic streets of a Caribbean capital, the bustling markets of a Mediterranean city,
    and seasonal getaways to the Catskills, while they plan future visits to coastal towns where they can harvest fresh herbs for their cooking.
  culinary: Xiomara Khan’s culinary repertoire centers on crafting arroz con gandules, pastelón, and guava‑infused flan using herbs from their balcony garden, a modest but confident cooking skill set that
    thrives on the aromatic blend of sofrito, adobo, and fresh cilantro, often sharing hearty plates with neighbors during community gatherings.
  core: Xiomara Khan blends methodical curiosity with community‑driven compassion, juggling a hands‑on cleaning career, green‑tech ambitions, and a kitchen brimming with aromatic dishes, all while they
    cope with occasional coffee splurges, back‑ache protests, and a penchant for salsa rhythms that never sleeps.
background:
  cultural: Xiomara’s identity is rooted in her Puerto Rican heritage, passed down by parents who migrated to New York in the 1970s. She grew up in South Ozone Park, a vibrant enclave where Spanish is spoken
    alongside English, and where Caribbean rhythms echo in daily life. Family gatherings revolve around shared meals, music, and storytelling, reinforcing a strong sense of community. She celebrates traditional
    holidays such as Noche Buena, Three Kings Day, and the island’s patron saint festivals, often contributing by preparing food or helping organize events at the local church. While she embraces the multicultural
    fabric of Queens, she maintains a deep connection to Puerto Rican customs, language, and culinary traditions, which shape her worldview and social interactions.
attributes:
