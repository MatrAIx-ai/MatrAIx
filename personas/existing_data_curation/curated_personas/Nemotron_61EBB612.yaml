  hobbies: '[''Balcony gardening'', ''Cooking Puerto Rican cuisine'', ''Crocheting and crafting'', ''Listening to Latin music (salsa, reggaetón)'', ''Walking in local parks'', ''Attending community festivals
    and cultural events'', ''Learning DIY home‑maintenance tips via podcasts'', ''Social dancing (salsa)'']'
  career_goals: Xiomara aims to advance to a lead custodian or facilities‑supervisor role within the next three years, where she can oversee a small team and introduce environmentally‑friendly cleaning
    practices. She is planning to complete her GED and obtain a certification in green cleaning to strengthen her credentials. In the longer term, she hopes to launch a modest, community‑focused cleaning
    service that offers affordable, sustainable packages to local small businesses and residential clients. Throughout this progression, she wants to continue mentoring newcomers and contribute to a safer,
    cleaner work environment for her neighborhood.
