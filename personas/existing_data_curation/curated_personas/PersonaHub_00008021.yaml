persona_description: A healthcare professional who is interested in the field of urology and has expertise in the use of computed tomography (CT) scans for diagnosing and treating kidney tumors and other
  urinary tract issues. They are familiar with the advanced techniques used in CT scans, such as the use of contrast agents and the ability to create three-dimensional images of internal structures. They
  are also aware of the potential risks and complications associated with CT scans, such as a reaction to iodine-based dyes. They are interested in the use of CT scans in conjunction with simulation and
  radiation therapy planning.
