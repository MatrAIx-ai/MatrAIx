personas:
  professional: Frank Levy is a methodical budding coder who channels his curiosity and love for organized problem‑solving into building Scratch games, assembling robotics projects at the community center,
    and meticulously documenting each step like a junior engineer.
  sports: Frank Levy dribbles with a fierce passion for basketball, idolizing the Dallas Mavericks, participates in the school’s after‑school hoop league, and cheers on the Arlington High football team
    on Saturdays while maintaining a personal fitness routine that includes weekday sprints and weekend bike rides around the neighborhood park.
  arts: Frank Levy blends their love for storytelling with visual art, drawing comic strips inspired by sci‑fi novels and the soulful harmonies of gospel choir, while also vibing to Kendrick Lamar, H.E.R.,
    and Mary J. Blige, and they often remix these influences into animated Scratch projects.
  travel: Frank Levy prefers short, purposeful trips that mix adventure and family history, having road‑tripped to Dallas to visit grandparents, explored the Space Center in Houston with a notebook of space
    facts, and dreams of a school‑organized visit to Washington, D.C.’s National Air and Space Museum during the spring break.
  culinary: Frank Levy enjoys the comforting aromas of collard greens, mac and cheese, and sweet‑potato pie that their mother prepares for Sunday dinner, and they experiment by building creative LEGO‑shaped
    snacks like pizza squares, while honing a modest kitchen skill set that includes mastering the perfect grilled cheese.
  core: Frank Levy is a disciplined, curiosity‑driven pre‑teen whose organized mind drives a love for coding, basketball, and soulful music, punctuated by a habit of overpacking a backpack before every
    project and a sweet tooth for LEGO‑themed treats.
background:
  cultural: Frank is a Black American raised in Arlington, Texas, where his family's roots blend Southern African-American traditions with modern urban culture. He attends a historically Black Baptist church,
    where music, storytelling, and community service are central. Family gatherings feature soul food, gospel, and discussions about Black history and civil-rights achievements, which shape his sense of
    identity. The local community center offers after-school programs that expose him to coding and robotics, and he often hears stories of his grandparents' experiences in Dallas, reinforcing a legacy
    of resilience and pride that influences his aspirations and everyday life.
attributes:
  skills: '["Reading comprehension", "Arithmetic and basic algebra", "Scratch programming", "LEGO building and modeling", "Class monitor and organizational skills", "Basic drumming rhythm", "Basketball
    fundamentals", "Time management"]'
  hobbies: '["Reading science-fiction and biographies of Black scientists", "Building LEGO models", "Playing basketball with a small group of friends", "Scratch coding projects", "Listening to hip-hop,
    R&B, and gospel music", "Drawing cartoons and comic strips", "Participating in school robotics club", "Singing in church youth choir"]'
  career_goals: Frank dreams of becoming an engineer—specifically a civil or aerospace engineer—so he can design bridges, sustainable homes, or spacecraft that benefit his community and inspire other Black
    youth. He admires pioneers like Mae Jemison and George Carruthers and hopes to work for NASA or a local firm focused on green infrastructure. In the long term he wants to mentor younger students in
    coding and building, showing them how curiosity combined with practical skills can create real change.
