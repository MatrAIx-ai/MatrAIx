personas:
  professional: Rashad Williams is a data scientist who leverages Python, R, and machine-learning pipelines to turn rural health and environmental data into actionable insights, while their inquisitive
    nature and artistic flair make complex models accessible through vivid visualizations and clear technical documentation.
  sports: Rashad Williams enjoys weekend hikes with the local Randolph County Trail Club, follows the Carolina Panthers for football, the Charlotte Hornets for basketball, and participates in a community
    pickleball league each summer, balancing solitary nature walks with occasional team sport camaraderie.
  arts: Rashad Williams channels their love for Afrofuturist aesthetics into digital illustrations using Photoshop and Illustrator, all while frequenting open-mic poetry nights where they cite spoken‑word
    artists like Saul Williams and visual artists such as James Turrell as creative inspirations.
  travel: Rashad Williams prefers low-key road trips that blend nature and culture, having recently explored the Blue Ridge Parkway and the historic town of Asheville, while dreaming of a future research
    retreat in the Scottish Highlands to study remote sensing data in pristine landscapes.
  culinary: Rashad Williams is an avid home cook who masters Southern comfort dishes like shrimp-and-grits, collard greens with smoked turkey, and sweet tea, while experimenting with spice blends such as
    smoked paprika and numbing Sichuan pepper to infuse recipes with unexpected twists.
  core: Rashad Williams blends scientific rigor with artistic imagination, turning data into stories while quietly nurturing community roots through tech, art, and shared meals.
background:
  cultural: Rashad grew up in Troy, North Carolina, in a close‑knit Black family where church, storytelling, and music were central to daily life. The community’s emphasis on resilience, mutual support,
    and cultural pride shaped his worldview. He was exposed early on to the rich traditions of gospel, jazz, and hip‑hop, and he often participated in church choirs and local cultural festivals. While attending
    a regional university for his STEM degree, he maintained strong ties to his hometown, volunteering at after‑school STEM workshops for middle‑school students. This blend of Southern heritage, African‑American
    cultural expression, and a rigorous scientific education informs both his professional aspirations and his personal passions.
attributes:
  skills: '[''Python programming'', ''Statistical analysis (R, MATLAB)'', ''Machine learning model development'', ''Data visualization (Tableau, PowerBI)'', ''CAD modeling (SolidWorks)'', ''Technical writing
    and documentation'', ''Digital illustration (Adobe Photoshop, Illustrator)'', ''Hardware prototyping (Arduino, Raspberry Pi)'']'
  hobbies: '[''Digital drawing and illustration'', ''Landscape photography'', ''Hiking in the North Carolina countryside'', ''Reading science‑fiction and Afrofuturist novels'', ''Playing acoustic guitar'',
    ''DIY electronics (Arduino, Raspberry Pi) projects'', ''Attending local art galleries and poetry open‑mic events'', ''Cooking Southern‑style meals for small gatherings'']'
  career_goals: Rashad aims to re‑enter the workforce as a data scientist or analytics engineer, focusing on projects that benefit rural communities—particularly in healthcare and environmental monitoring.
    He plans to earn certifications in cloud computing (AWS) and advanced data science, and eventually pursue a Ph.D. in computational neuroscience if his research interests evolve. Long‑term, he envisions
    launching a social‑impact tech startup that provides data‑driven decision tools to locally owned businesses and nonprofit organizations, bridging his technical expertise with his commitment to community
    empowerment.
