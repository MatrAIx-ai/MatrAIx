persona_description: A researcher and policy analyst who studies the impact of education policies and interventions on student performance in low-income countries with weak public school systems. They are
  particularly interested in the effects of private schooling on test scores and its potential as a relatively inexpensive way to improve education in these regions. They are aware of the challenges faced
  by low-income countries in improving their public school systems and are seeking innovative solutions to address these issues. They are also likely to have a deep understanding of the policies and practices
  of both public and private schools in different countries and the factors that influence student performance.
