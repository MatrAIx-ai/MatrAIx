  career_goals: Emily plans to complete her associate degree in Business Administration within the next two years and obtain a Certified Credit and Collection Professional (CCCP) certification. Her short-term
    goal is to be promoted to a senior collector or team lead position, where she can mentor new hires and help shape collection strategies. In the longer term, Emily aspires to transition into a credit
    analyst or financial counseling role, allowing her to use her empathetic skills to guide clients toward healthier financial habits. She also hopes to combine her passion for helping others with her
    interest in mental wellbeing by eventually establishing a community-based financial-literacy program that incorporates stress-management workshops for young adults.
