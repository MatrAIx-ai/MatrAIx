personas:
  professional: Emily Teitelbaum, an 18‑year‑old bill collector in Fort Worth, blends her natural sociability with meticulous record‑keeping on FIS and AltaCollect, turning tense calls into empathetic negotiations
    while dreaming of leading a team of junior collectors.
  sports: Emily Teitelbaum spikes in a co‑ed volleyball league in Parker County, cheers on the Dallas Cowboys on Sundays, follows the Dallas Mavericks, and hits local line‑dancing nights where they practice
    two‑step steps as cardio, all while favoring Saturday morning jogs around Lake Ray Roberts.
  arts: Emily Teitelbaum spends weekends belting out Garth Brooks and Taylor Swift at karaoke, curates handmade friendship bracelets inspired by vintage crafts, and voraciously reads young‑adult novels
    by Sarah J. Maas and John Green, often quoting their favorite lines at volunteering events.
  travel: Emily Teitelbaum loves spontaneous road trips to the Texas Hill Country, has already explored Austin’s music scene, dreams of experiencing Mardi Gras in New Orleans and a spring‑break backpacking
    adventure through Portugal’s coastal towns, all while budgeting travel costs with a detailed spreadsheet.
  culinary: Emily Teitelbaum’s cooking skill sits at 'confident home‑chef' as they perfect chicken fried steak with country gravy, whip up creamy mac & cheese, experiment with homemade latke‑style potato
    pancakes during Hanukkah, and keep a secret stash of jalapeño cornbread for late‑night snack cravings.
  core: Emily Teitelbaum is a socially‑charged, detail‑oriented teen who balances energetic group activities with anxiety‑driven self‑care rituals, occasional impulsive spending, and a persistent quest
    to turn financial empathy into community impact.
background:
  cultural: Emily is a White American with likely Jewish heritage, as suggested by her surname Teitelbaum, raised in the suburban environment of Fort Worth, Texas. Her upbringing blends Southern hospitality
    and Texan cultural staples—such as country music, rodeos, and community barbecues—with family traditions that may include celebrating both mainstream holidays like Thanksgiving and Christmas and cultural
    observances such as Hanukkah and Passover. Growing up in Parker County, she has been influenced by a mix of Mid-South values, a strong sense of community service, and the diverse cultural tapestry of
    the Dallas-Fort Worth Metroplex.
attributes:
