persona_description: A meteorologist who specializes in forecasting and predicting weather patterns, particularly those related to hurricanes, tropical storms, and other severe weather events. This individual
  is knowledgeable about the long-term average and current active era of Atlantic hurricane season, the impact of El Nino on hurricane activity, and the predictions made by various forecasting teams. They
  are also familiar with the different types of rigs used in the Gulf of Mexico during hurricane season, including jackups, semisubmersibles, and drillships. This persona is likely to be a professional
  in the field of meteorology, with a strong background in weather forecasting and analysis.
