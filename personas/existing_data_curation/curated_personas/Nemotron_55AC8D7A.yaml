personas:
  professional: Angel Pompa, a 26‑year‑old homicide detective in Phoenix, leverages a background in education and bilingual fluency to meticulously document crime scenes, apply forensic analytics, and interview
    vulnerable witnesses, blending curiosity for emerging techniques with a practical, detail‑oriented work ethic that thrives in solitary case review.
  sports: Angel Pompa, a dedicated solo adventurer, spends weekends hiking the Sonoran Desert with the Desert Trails Hiking Club, practices yoga at the Sunstone Wellness Studio, follows the Phoenix Suns
    and Phoenix Mercury for a touch of team spirit, and occasionally joins a local community run, preferring low‑impact activities that sustain mental focus and physical resilience.
  arts: Angel Pompa, an avid connoisseur of narrative art, devotes evenings to reading true‑crime classics like "In Cold Blood," listening to forensic podcasts such as "Criminal," and captures night‑time
    desert landscapes inspired by Ansel Adams, while also enjoying the melancholic tunes of Nick Cave and the evocative film scores of Ennio Morricone, which fuel both their analytical mindset and quiet
    introspection.
  travel: Angel Pompa, a cautious explorer, meticulously plans trips that blend solitary reflection with cultural immersion, having trekked the chalky dunes of White Sands National Park, visited the historic
    streets of Oaxaca during Día de los Muertos celebrations, and plotted a weekend getaway to Santa Fe’s art districts, always budgeting travel expenses to fund the upcoming master’s program.
  culinary: Angel Pompa, a dedicated home chef, spends free evenings perfecting traditional dishes such as tamales, pozole, and mole, nurturing an indoor herb garden of cilantro, epazote, and oregano to
    infuse fresh flavor, while they meticulously organize pantry inventory and occasionally indulge in gourmet coffee from Oaxaca, all of which connects them to familial gatherings and offers a soothing
    counterbalance to investigative stress.
  core: Angel Pompa, a detail‑driven detective who channels solitary hobbies like night photography, puzzle‑solving, and yoga into a disciplined, stress‑aware lifestyle, they balance a competitive edge
    with a quiet, introspective demeanor and an occasional tendency to over‑analyze every decision.
background:
  cultural: Raised in a Mexican‑American household in Phoenix, Angel grew up with strong family ties, bilingual fluency, and a deep appreciation for Mexican traditions such as Día de los Muertos and communal
    cooking. Her parents, immigrants from Jalisco, emphasized perseverance, respect for elders, and the value of education, shaping her competitive drive and meticulous work ethic. This cultural foundation
    equips her with nuanced understanding of the Mexican‑American communities she serves, fostering cultural sensitivity in investigations. While she values collectivist aspects of her heritage, her introverted
    nature leads her to balance community engagement with solitary, focused work, honoring her roots while maintaining personal boundaries.
attributes:
  skills: '["Forensic evidence collection and analysis", "Crime scene documentation and photography", "Interview and interrogation techniques", "Bilingual communication (Spanish/English)", "Data analytics
    and crime mapping", "Digital forensics fundamentals", "Report writing and case documentation", "Critical thinking and problem solving", "Legal procedure knowledge", "Self-discipline and stress management
    techniques"]'
  hobbies: '["True crime reading and podcasts", "Yoga and meditation", "Solo desert hiking and night photography", "Puzzle solving (crosswords, Sudoku, logic puzzles)", "Cooking traditional Mexican cuisine",
    "Indoor herb gardening", "Chess (online)", "Community literacy tutoring (low interaction)"]'
  career_goals: Angel aims to become a lead detective within the homicide division, focusing on cold‑case resolution and integrating emerging forensic technologies. Over the next three years she plans to
    earn a master's in forensic science, obtain certifications in digital forensics and forensic psychology, and establish a specialized unit that addresses crimes affecting youth and schools—leveraging
    her education background. She also aspires to publish research on investigative best practices and stress resilience for officers, and to mentor aspiring female detectives, especially from the Mexican‑American
    community, while preserving a role that balances field work with analytical case review.
