personas:
  professional: Carlos Caban, a 19‑year‑old pharmacy technician, leverages their meticulous attention to detail and bilingual flair to ensure error‑free dispensing while habitually chatting with customers,
    blending curiosity about new drug therapies with a pragmatic focus on compliance, and often volunteering to lead mini‑workshops at the pharmacy despite occasionally procrastinating on paperwork.
  sports: Carlos Caban plays forward for the Spring Soccer Club’s Saturday league, passionately cheers for FC Dallas and the Dallas Cowboys, and blends high‑energy salsa dancing with weekly gym sessions,
    though they often skip recovery stretches after games.
  arts: Carlos Caban regularly performs karaoke renditions of Bad Bunny and Luis Miguel, dances to Marc Anthony’s salsa hits at community festivals, and collects vinyl records of classic mariachi legends
    like Vicente Fernández, often staying up late to perfect their own karaoke playlists.
  travel: Carlos Caban prefers budget‑friendly road trips, having road‑tripped to Austin’s music scene and a weekend getaway to New Mexico’s White Sands, while dreaming of a future excursion to Oaxaca to
    sample authentic mole and explore bustling mercados, though they often postpone bookings due to exam study schedules.
  culinary: Carlos Caban whips up authentic tacos al pastor using achiote‑marinated pork, pineapple, and corn tortillas, perfects a rich Oaxacan mole with chilhuacle peppers and chocolate, and rarely passes
    up a street‑food style elote drenched in cotija and chili powder, though they sometimes over‑season their salsas, causing a fiery kick.
  core: Carlos Caban is a sociable, detail‑driven pharmacy tech who balances curiosity and practicality, often swapping late‑night karaoke sessions for a quick study break, and occasionally forgets to refill
    their own prescriptions.
background:
  cultural: Carlos was raised in a Mexican‑American household in Spring, Texas. At home, Spanish is spoken and Mexican traditions—such as Día de los Muertos, quinceañeras, and holiday meals featuring tamales
    and pozole—are celebrated. He blends these cultural roots with the broader Texan environment, attending local Mexican festivals, supporting community churches, and maintaining strong family ties across
    the border. This bicultural upbringing informs his bilingual fluency, his appreciation for Mexican culinary arts, and his commitment to serving the Hispanic community through healthcare.
attributes:
  skills: '[''Medication dispensing'', ''Prescription verification'', ''Compounding (non‑sterile)'', ''Inventory management'', ''Pharmacy software operation (e.g., PioneerRX, QS/1)'', ''Bilingual communication
    (English/Spanish)'', ''Patient counseling'', ''Regulatory compliance'', ''Data entry and record keeping'', ''Problem‑solving and troubleshooting'']'
  hobbies: '[''Playing soccer (community league)'', ''Attending and dancing at salsa and reggaeton events'', ''Karaoke and music performance'', ''Cooking Mexican cuisine'', ''Reading science and health
    podcasts'', ''DIY electronics projects'', ''Volunteering at health fairs'', ''Watching documentaries on health and technology'']'
  career_goals: Carlos aims to become a licensed pharmacist within the next five years. He plans to enroll in a pre‑pharmacy program at a community college while continuing his work as a pharmacy technician,
    eventually pursuing a Pharm.D. He also seeks certifications such as Certified Pharmacy Technician (CPhT) and immunization administration. In the long term, he envisions opening a bilingual community
    pharmacy in Spring, TX, that offers health education workshops and culturally tailored services for the local Hispanic population. He is motivated to take on supervisory roles, develop leadership skills,
    and contribute to public health outreach initiatives.
