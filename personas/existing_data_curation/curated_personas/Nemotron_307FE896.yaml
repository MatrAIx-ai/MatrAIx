  hobbies: '[''Hiking'', ''Nature Photography'', ''Reading (Classic & Contemporary Fiction)'', ''Book Club Participation'', ''Cooking (Japanese & American fusion)'', ''Woodworking'', ''Volunteer Literacy
    Tutoring'']'
  career_goals: Mark aims to progress to a senior editorial role where he can shape the voice of a midsize publishing house and mentor junior staff. Over the next five years he hopes to lead a cross‑functional
    editorial team, develop streamlined editorial guidelines, and eventually launch his own boutique editorial consultancy that offers flexible, remote services to indie authors while preserving a balanced
    work‑life rhythm.
