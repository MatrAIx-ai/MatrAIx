  hobbies: '[''Walking along the Delaware River'', ''Photography'', ''Visiting art galleries'', ''Gardening'', ''Experimental cooking'', ''Reading historical nonfiction and poetry'', ''Attending folk and
    jazz concerts'', ''Volunteering for maritime heritage projects'', ''Writing in a personal notebook'', ''Participating in senior center photography workshops'']'
  career_goals: Although retired, Sanjeev remains driven by a desire to contribute creatively and socially. He aims to assemble a photographic series capturing the evolving industrial and natural landscapes
    along the Delaware River, culminating in a community exhibition at the local historical society. He hopes to volunteer as a docent there, sharing his knowledge of regional history with visitors. He
    also intends to mentor interested seniors in basic photography and digital storytelling through a weekly workshop at the senior center. On a personal level, he plans to travel to major East Coast museums—such
    as the Philadelphia Museum of Art, the Metropolitan Museum of Art, and the Museum of Fine Arts in Boston—to broaden his artistic perspective, and he aspires to write a short memoir reflecting on his
    life, work, and the cultural shifts he has witnessed.
