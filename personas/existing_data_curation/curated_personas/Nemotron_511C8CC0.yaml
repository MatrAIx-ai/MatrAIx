personas:
  professional: Shantal Green, a retired mechanical engineer with decades of aerospace and civil infrastructure experience, blends curiosity‑driven exploration of new design techniques with practical, data‑driven
    analysis, using CAD, MATLAB, and Python to craft mentorship workshops that are both engaging and technically rigorous, while they sometimes let a delightfully disorganized calendar of consulting gigs
    linger.
  sports: Shantal Green stays active by walking with the Brandywine Creek senior walking club, practicing gentle yoga at the community center, cheering on the Philadelphia Eagles and Philadelphia 76ers,
    and occasionally joining the Delaware County senior softball league for casual weekend games, while they enjoy the camaraderie of fellow participants.
  arts: Shantal Green creates quilts inspired by African textiles while listening to the soulful sounds of Aretha Franklin and the improvisational mastery of Miles Davis, regularly attending the Jazz at
    the Garden series and losing themselves in historical novels by James Baldwin and Toni Morrison, while they also share their creations at community craft fairs.
  travel: Shantal Green prefers relaxed, culturally rich journeys, often using senior discounts to explore historic sites in Washington, D.C., soak up the jazz heritage of New Orleans, and plan a future
    pilgrimage to the coastal villages of Ghana, while they keep itineraries modest to fit their budget and family commitments.
  culinary: Shantal Green infuses classic soul‑food dishes with contemporary flair, braising collard greens with smoked turkey, quinoa, and apple cider vinegar, and crafting a sweet‑potato and black‑bean
    casserole seasoned with smoked paprika, while they occasionally treat themselves to a slice of pecan pie at a local bakery.
  core: Shantal Green, a 72‑year‑old retired aerospace engineer, merges relentless curiosity with a delightfully disorganized schedule, nurturing heirloom gardens, quilting with African‑inspired patterns,
    championing STEM mentorship, and occasionally forgetting to water their plants during a spirited library talk, while they laugh it off.
background:
  cultural: Shantal was born and raised in Wilmington, Delaware, during the height of the civil-rights movement. As a Black woman, she grew up in a close-knit church community that emphasized resilience,
    collective uplift, and the celebration of African heritage. Her parents encouraged academic excellence, leading her to pursue a graduate degree in a STEM field at a historically Black university before
    moving to the broader academic world. Throughout her life, she has navigated the dual expectations of professional achievement and cultural responsibility, fostering a deep commitment to mentorship
    and advocacy for Black youth in science and engineering. She actively participates in local cultural events such as Juneteenth commemorations, Kwanzaa celebrations, and community gatherings that honor
    African-American history, keeping her cultural roots alive while integrating them into her modern, curiosity-driven outlook.
attributes:
  skills: '[''Mechanical engineering'', ''Systems analysis'', ''Computer-aided design (CAD)'', ''Programming (MATLAB, Python)'', ''Project management'', ''Technical writing'', ''Data visualization'', ''Curriculum
    development'', ''Mentoring'', ''Public speaking'', ''Conflict resolution'', ''Community organizing'']'
  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Historical fiction reading'', ''Genealogy research'', ''Cooking soul food'', ''Jazz and soul music'', ''Birdwatching'', ''STEM volunteer tutoring'']'
  career_goals: Although retired from formal employment, Shantal aims to leave a lasting impact on the next generation of underrepresented scientists and engineers. She plans to establish a scholarship
    fund for Black and low-income students pursuing STEM degrees at local colleges, expand the mentorship program she started at the Wilmington Public Library, and author a memoir that intertwines her engineering
    career with her experiences as a Black woman navigating the field. Additionally, she seeks occasional consulting projects that allow her to apply her practical knowledge while maintaining the flexibility
    she values.
