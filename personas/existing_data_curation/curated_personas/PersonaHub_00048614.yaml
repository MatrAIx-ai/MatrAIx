persona_description: A geologist who is interested in the chemical and mineralogical reactions occurring in the upper ocean crust and how they are influenced by microorganisms. The individual is particularly
  interested in the role of iron-oxidizing microorganisms in the alteration of the upper crust and the control they have on chemical exchange between seawater and the crust. The geologist is also interested
  in studying the geochemical effects of microbially mediated recrystallization of basalt glass and identifying the textures and chemistries of organic matter and inorganic secondary products.
