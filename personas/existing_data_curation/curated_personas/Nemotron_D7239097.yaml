  hobbies: '[''DIY Home‑Improvement'', ''Barbecue Grilling'', ''Live Music Attendance'', ''Historical Reading'', ''Chess'', ''Gardening'', ''Church Volunteering'']'
  career_goals: Kendrick's primary career ambition is to translate his extensive hands‑on skill set into a sustainable, self‑run handyman service that serves the Houston community, particularly underserved
    neighborhoods. He plans to obtain a Texas contractor's license and complete certification courses in HVAC and home safety, which will broaden his service offering. In parallel, he aspires to become
    a mentor for at‑risk youth, leveraging his practical skills and calm demeanor to teach trades‑based life skills through a local community center. Longer‑term, he hopes to serve on the board of a neighborhood
    development organization, influencing policies that promote affordable housing repairs and job training programs. Ultimately, his goal is to achieve financial stability for his family while giving back
    to the community that shaped him.
