personas:
  professional: Kendrick is a seasoned handyman turned budding business owner who leverages his carpentry, plumbing, and electrical expertise—paired with a methodical yet adaptable work style—to deliver
    reliable home repairs across Houston’s underserved neighborhoods while using his community‑organizing skills to build trust and generate referrals.
  sports: Kendrick follows the Houston Astros and Rockets avidly, plays pick‑up basketball at his neighborhood park, participates in a backyard softball league each spring, and maintains fitness through
    weekday walks and weekend garden chores rather than formal gym sessions.
  arts: Kendrick delights in live music, frequently attending blues and jazz shows at the House of Blues, streams classics by B.B. King, Gregory Porter, and Stevie Wonder, curates a vintage vinyl collection
    of Southern soul, and occasionally joins community jam sessions on his modest keyboard.
  travel: Kendrick is an enthusiastic road‑tripper who has explored New Orleans’s Creole flavors, Savannah’s historic squares, and Texas Hill Country’s wine trails, favoring spontaneous weekend drives with
    family while budgeting for modest Airbnb stays and occasional coastal fishing outings.
  culinary: Kendrick crafts smoked brisket with a coffee‑molasses rub, sides collard greens simmered with smoked ham hocks, and sweet‑potato pie spiced with nutmeg—seasoned with fresh herbs from his garden—while
    his weekend barbecue sessions double as vibrant community gatherings.
  core: Resourceful and community‑driven, Kendrick blends hands‑on pragmatism with a love for tradition and new ideas, turning his toolbox into a bridge between home repairs, mentorship, and neighborhood
    uplift.
background:
  cultural: Kendrick's cultural identity is rooted in the African‑American experience of the Gulf Coast. Raised in Houston's historically Black neighborhoods, he grew up surrounded by the rhythms of blues,
    soul, and Southern gospel that still echo in his musical tastes. Family gatherings often centered around soul food—collard greens, fried chicken, and sweet potato pie—and the storytelling tradition
    that links generations. The city's vibrant Juneteenth celebrations, the annual Texas Southern University homecoming, and the neighborhood church have reinforced a sense of community solidarity and pride.
    While he respects the traditions passed down by his parents—such as the importance of church, respect for elders, and self‑reliance—Kendrick also embraces contemporary influences, staying connected
    with digital media and modern Black culture. This blend of Southern heritage, urban Houston life, and a forward‑looking mindset shapes his worldview and informs his interactions.
attributes:
