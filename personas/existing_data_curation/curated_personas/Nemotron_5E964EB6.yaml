  hobbies: '[''Visiting contemporary art galleries'', ''Digital photography'', ''Reading sci-fi and business innovation books'', ''Participating in hackathons and tech meetups'', ''STEM mentorship for youth'',
    ''Yoga and mindfulness practice'', ''Cooking modern soul food'']'
  career_goals: Andretta aims to transition from a computer and information systems manager to a senior executive role such as Chief Information Officer or Vice President of Technology within the next five
    years. She plans to lead large-scale digital transformation initiatives, including cloud migration, AI-driven analytics, and cybersecurity modernization for a mid-size enterprise or a regional corporation.
    To support this trajectory, she intends to pursue a part-time MBA or a Master’s in Information Systems while earning industry certifications (e.g., PMP, CISSP). Additionally, she is passionate about
    championing diversity in tech, aspiring to mentor and sponsor emerging Black women engineers and to speak at industry conferences on inclusive innovation. Long-term, she envisions establishing a consulting
    boutique that helps nonprofit arts organizations adopt technology to broaden their reach.
