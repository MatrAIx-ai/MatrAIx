personas:
  professional: Ethan Dent is a seasoned management analyst who leverages Excel, SQL, and Tableau to drive data‑centric process improvements, applying Lean Six Sigma rigor and disciplined project leadership
    to deliver operational efficiencies while mentoring junior analysts toward strategic growth, and they always keep a tight schedule to meet tight deadlines.
  sports: Ethan Dent plays Thursday‑night golf with a local foursome at the Lake Worth Golf Club, joins early‑morning beach walks with friends, spends weekends fishing off the Intracoastal Waterway, and
    cheers for the Miami Dolphins, Miami Heat, and Florida Marlins as their favorite professional teams.
  arts: Ethan Dent enjoys classic American cinema like Casablanca, listens to Bruce Springsteen on drives, attends the Lake Worth Community Theatre’s seasonal productions, and collects vintage vinyl records
    that fill their home with nostalgic rock and folk melodies.
  travel: Ethan Dent plans meticulous road trips that blend coastal relaxation with structured itineraries, favoring weekend getaways to the Florida Keys, the Everglades for guided airboat tours, and dreaming
    of a spring fishing lodge in Maine’s Penobscot River.
  culinary: Ethan Dent crafts weekend family meals featuring grilled Florida grouper with citrus butter, key lime pie, and classic American BBQ ribs, confidently seasoning with fresh herbs and stone‑crab
    claws harvested from their own catches, yet still relies on pre‑made marinades when pressed for time.
  core: Ethan Dent is a disciplined strategist who fuses data‑driven rigor with a love for community rituals, balancing spreadsheets, golf clubs, and the smell of fresh‑caught seafood while occasionally
    over‑committing to volunteer projects.
background:
  cultural: Ethan identifies as a White American with roots in mid‑Atlantic European ancestry, raised in a middle‑class suburban environment. His upbringing emphasized practicality, respect for tradition,
    and community involvement, shaping a worldview that values routine, family cohesion, and civic responsibility. Living in Lake Worth, FL, he blends his traditional values with the region’s multicultural
    vibrancy, celebrating mainstream American holidays while also appreciating the diverse cultural tapestry of South Florida.
