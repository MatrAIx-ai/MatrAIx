  career_goals: Ethan aims to ascend to a senior leadership role—such as Director of Operations or Chief Strategy Officer—where he can shape enterprise‑wide initiatives and mentor junior analysts. He plans
    to earn an MBA or professional certification (e.g., PMP) within the next three years to broaden his strategic toolkit, while maintaining a balanced routine that supports his family life. His long‑term
    ambition includes leading large‑scale transformation projects that deliver measurable cost savings and operational excellence across the organization.
