  career_goals: Halee aims to move beyond retail management into a role that blends her organizational talent with her passion for community enrichment. She plans to earn a bachelor's degree in Business
    Administration or Social Work within the next three years, establishing a foundation for a senior position in a nonprofit or community development organization. In the long term, she dreams of directing
    a regional arts and cultural center that offers workshops, exhibitions, and youth programs, fostering creativity in Turner County. She also aspires to mentor more aspiring professionals and to launch
    a consulting practice that assists small rural businesses in improving operational efficiency and community engagement.
