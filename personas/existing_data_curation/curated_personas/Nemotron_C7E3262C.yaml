  career_goals: She aims to transition into a senior engineering leadership role where she can guide R&D initiatives that fuse technology with artistic expression, such as interactive installations and
    smart wearables. Belinda plans to pursue an advanced certification in systems engineering and potentially a master’s degree focused on sustainable energy systems to broaden her impact. Over the next
    five years, she intends to lead a multidisciplinary team that develops novel IoT devices for the built environment, championing inclusive design practices and mentoring junior engineers, especially
    women and underrepresented groups in STEM.
