personas:
  professional: Belinda Fender, a 36‑year‑old electrical engineer with deep expertise in analog and digital circuit design, leads small cross‑functional teams at a boutique R&D firm where she methodically
    blends systematic problem‑solving with imaginative interactive installations, and they aim to step into senior engineering leadership to champion inclusive, art‑driven IoT solutions.
  sports: Belinda Fender jogs the loops of Prospect Park with the local Prospect Park Running Club, follows the Brooklyn Nets and New York Knicks on game nights, plays recreational ultimate frisbee on weekends,
    and they treat each workout as a structured experiment in personal stamina.
  arts: Belinda Fender immerses herself in abstract painting inspired by Kandinsky and Kusama, captures street scenes of Bushwick with a Leica M, curates digital illustrations for a small online collective,
    and they revel in avant‑garde concerts featuring John Zorn and Autechre at the Brooklyn Academy of Music.
  travel: Belinda Fender prefers meticulously planned short trips that blend tech tours and art scenes, having explored Berlin’s street‑art alleys, Tokyo’s Akihabara gadget hubs, Iceland’s geothermal landscapes,
    and she now dreams of sustainable design tours in Copenhagen and culinary workshops in Oaxaca.
  culinary: Belinda Fender enjoys crafting vibrant vegan dishes like quinoa‑kale bowls drizzled with miso‑tahini, perfecting spicy ramen with fermented kimchi, brewing matcha lattes with a hand‑crafted
    bamboo whisk, and they experiment with turmeric‑infused desserts while maintaining an intermediate cooking skill level.
  core: Belinda Fender, a 36‑year‑old engineer‑artist, balances meticulous circuit design with spontaneous bursts of color, leads with quiet confidence, and never misses a chance to tinker with a new synth
    patch while humming a jazz improv.
background:
  cultural: Belinda was raised in a middle‑class, white, Anglo‑American family in the suburbs of New Jersey before moving to Brooklyn for her engineering career. Her upbringing emphasized education, self‑reliance,
    and a pragmatic work ethic, while her adult life in a culturally diverse borough has exposed her to a broad array of artistic and culinary influences. She enjoys the blend of traditional American values
    with the eclectic, open‑minded atmosphere of New York City, which informs both her professional collaborations and personal pursuits.
attributes:
