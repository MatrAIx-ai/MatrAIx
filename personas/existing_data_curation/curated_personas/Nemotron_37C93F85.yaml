  hobbies: '[''Visiting art galleries and museums'', ''Attending live music and theater performances'', ''Participating in community volunteer projects'', ''Cooking and baking for family and friends'',
    ''Organizing and hosting game nights'', ''Traveling to nearby towns for cultural festivals'', ''Practicing yoga and mindfulness meditation'', ''Journaling and creative writing'', ''DIY home décor projects'']'
  career_goals: Michelle aims to transition into a role that blends her business background with her love for the arts and community, such as a program coordinator or outreach manager at a local museum,
    cultural center, or nonprofit arts organization. She wants to design and lead workshops, exhibitions, and events that bring people together while maintaining a flexible schedule that supports her family
    life and mental‑health needs. In the longer term, she envisions launching a small social‑enterprise that sells locally crafted art and promotes mental‑well‑being through creative workshops.
