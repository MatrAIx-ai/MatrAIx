  career_goals: Michael aims to turn his artistic passions into a sustainable career that offers creative freedom and minimal rigid schedules. In the short term he plans to obtain his GED, develop a strong
    portfolio of illustration, photography, and music, and seek mentorship through local art workshops or online communities. He aspires to attend a visual‑arts or game‑design program—either a community
    college with a strong art department or a specialized art institute—so he can refine his technical skills and learn professional workflows. Long‑term, Michael hopes to work as a freelance concept artist
    and indie game developer who can also produce original music, using his work to process intense emotions and inspire others dealing with anxiety or sadness.
