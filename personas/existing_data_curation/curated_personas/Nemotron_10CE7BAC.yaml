personas:
  professional: Michael Hamidi is a budding concept artist and indie game developer who blends hand‑drawn sketches, digital illustration, and simple Arduino‑powered prototypes, channeling their curiosity
    and competitive edge from strategy games into original game worlds, yet their spontaneous, structure‑averse nature frequently clashes with the discipline required to meet client deadlines.
  sports: Michael Hamidi enjoys occasional pick‑up basketball games with a tight circle of friends, cheering for the Portland Trail Blazers while also following the Portland Timbers for soccer, and as a
    member of the school’s art‑focused intramural basketball team balances this with solo jogging to discover photography spots, though they rarely commit to a structured training regimen, preferring spontaneous
    movement over formal workouts.
  arts: Michael Hamidi immerses themselves in the arts by sketching in the aesthetic of Studio Ghibli’s Hayao Miyazaki, creating digital illustrations that echo David Lynch’s surreal visuals, strumming
    acoustic covers of Radiohead and Bon Iver on guitar, and frequenting local gallery openings featuring emerging street artist Maya Hayuk as well as community theater productions of ‘Little Shop of Horrors,’
    letting these eclectic influences shape their own narrative‑driven creations.
  travel: Michael Hamidi favors low‑budget, spur‑of‑the‑moment road trips to nearby natural spots like Columbia River Gorge for sunrise photography, while day‑dreaming about a future solo backpacking journey
    through Kyoto’s historic districts to study Japanese ukiyo‑e prints, balancing these travel aspirations with the constraints of a high‑school schedule and limited finances.
  culinary: Michael Hamidi enjoys crafting modest yet experimental meals such as charcoal‑black ramen broth seasoned with miso and smoked paprika, midnight avocado toast topped with feta and chili flakes,
    and indulging in artisanal dark‑chocolate coffee, reflecting a cooking skill level that favors creative flavor pairings over elaborate plating.
  core: Michael Hamidi is a solitary, creatively restless teen who channels intense anxiety into sketching, music, and indie game concepts, constantly battling structure‑phobia while chasing artistic freedom.
background:
  cultural: Michael grew up in Independence, Missouri, a small Midwestern city where mainstream American values such as self‑reliance, community gatherings, and modesty are prominent. His family celebrates
    typical U.S. holidays and participates in local traditions like county fairs and church events. Although his ethnic background is identified as white, his surname hints at a distant Middle‑Eastern lineage,
    which sometimes surfaces through family meals featuring Persian dishes or occasional stories about heritage. This blend of a conventional Midwestern upbringing and subtle multicultural exposure contributes
    to his curiosity about art, openness to new ideas, and preference for small, intimate social settings.
