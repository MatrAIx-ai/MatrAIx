persona_description: 'A sociologist and urban planner who specializes in the study of urban displacement, gentrification, and rebranding in Los Angeles. He/she is currently conducting a multi-year, collaborative,
  and interdisciplinary research project to develop a lasting and much-needed repository and digital archive of the myriad chocolate cities thriving, surviving, and disappearing across Los Angeles and surrounding
  communities since the city''s founding. The researcher is looking forward to engaging in conversation with authors Marcus Anthony Hunter and Zandria Robinson on their new book Chocolate Cities: The Black
  Map of American Life.'
