  career_goals: Gloria aims to advance into a supervisory or fleet‑management role within the local transportation authority. She plans to obtain a Commercial Driver’s License and complete certification
    in transportation safety and logistics management. Leveraging her curiosity, she wants to introduce digital ticketing and data‑driven scheduling to improve service efficiency. Over the next five years,
    she hopes to mentor new attendants, contribute to community transit initiatives, and potentially oversee a small team of attendants and drivers.
