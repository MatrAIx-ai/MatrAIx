personas:
  professional: Jason Shivers, a senior investment analyst at a regional asset manager, leverages advanced Excel, VBA, and Python to build ESG‑focused equity models while channeling his love for storytelling
    and community values into compelling investment narratives that resonate with diverse stakeholders.
  sports: Jason Shivers, an avid hiker who spends Saturday mornings trekking the Georgia sections of the Appalachian Trail with the Southern Ridgewalkers club, roots for the Atlanta Falcons on Sundays,
    holds a season ticket for the Atlanta Braves, and squeezes in weekly pick‑up basketball at the community recreation center to stay active and socially connected.
  arts: Jason Shivers, a regular attendee of Atlanta's High Museum of Art and a volunteer mentor for the local youth art program, draws inspiration from painters like Andrew Wyeth and musicians such as
    Jason Isbell, and frequently brings his acoustic guitar to community events to perform John Prine covers while discussing contemporary literature from authors like Chimamanda Ngozi Adichie.
  travel: Jason Shivers, who plans trips on a spreadsheet balancing budget and curiosity, has explored the historic streets of Savannah, savored the culinary scene of New Orleans, hiked the Blue Ridge Parkway,
    journeyed to Florence to study Renaissance frescoes, and dreams of an immersive cultural stay in Kyoto's tea houses to deepen his appreciation for Japanese aesthetics.
  culinary: Jason Shivers, an intermediate home chef, masters Southern staples like shrimp and grits seasoned with smoked paprika while experimenting with Thai green curry featuring locally sourced okra,
    and delights in baking fresh peach cobbler topped with a pinch of cinnamon for weekend family gatherings.
  core: Jason Shivers merges Southern hospitality with data‑driven ESG investing, balances a disciplined work ethic with a love for art, hiking, and spontaneous guitar sessions, yet sometimes forgets to
    water houseplants and neglects sunscreen during afternoon photography outings.
background:
  cultural: Jason grew up in a close‑knit Southern community in Bremen, Georgia, where values such as hospitality, community service, and a strong work ethic are deeply ingrained. His family’s roots in
    the region exposed him to local traditions, church gatherings, and Southern cuisine. While embracing these traditions, he pursued a liberal arts education that broadened his perspective, allowing him
    to blend Southern cultural sensibilities with a global appreciation for art and ideas. This dual heritage informs his professional ethos of responsible investing and his personal passion for cultural
    exploration.
