  career_goals: Jason aims to advance to a senior portfolio manager role within the next five years, leading a multidisciplinary team that integrates ESG and cultural insights into investment strategies.
    He plans to obtain the CFA charter, pursue an MBA focused on sustainable finance, and eventually shape firm-wide policy on socially responsible investing. Additionally, he aspires to mentor junior analysts
    and contribute to community financial literacy initiatives.
