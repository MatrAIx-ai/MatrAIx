  hobbies: '[''Reading'', ''Creative writing and journaling'', ''Drawing and sketching nature'', ''LEGO building'', ''Puzzle solving'', ''Birdwatching'', ''Nature walks'', ''Collecting rocks and shells'',
    ''Educational video games'']'
  career_goals: Faye aspires to work in a quiet, structured environment where she can organize information and help others. She is fascinated by books and the order of libraries, so she envisions becoming
    a librarian who curates collections and assists community members. She also dreams of exploring natural history, hoping to study wildlife in a research role that involves field observation and data
    recording. To achieve these goals, she plans to focus on her reading and science classes, aim for high grades, and eventually pursue a degree in library science or biology.
