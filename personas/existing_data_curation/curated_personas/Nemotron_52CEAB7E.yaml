  career_goals: Brandon aims to progress from senior software engineer to technical lead and eventually software architect within the next five years, focusing on building secure, scalable cloud‑native
    solutions for midsize enterprises. He plans to earn an AWS Solutions Architect certification and complete his bachelor's degree in computer science, while also establishing a side consultancy that helps
    local small businesses modernize their IT infrastructure. Additionally, he hopes to become a recognized mentor in regional tech meetups, fostering the next generation of programmers in rural Georgia.
