  career_goals: Sharon dreams of a career that lets her blend her curiosity for the natural world with her desire to help others. She hopes to become a marine biologist or wildlife rehabilitator, studying
    marine life in Florida’s ecosystems while participating in conservation projects. At the same time, she is intrigued by digital media and sees herself possibly pursuing graphic design or content creation
    to raise awareness about environmental issues. Her short‑term ambition is to excel in high school science courses, earn a scholarship for a summer marine research program, and build a portfolio of eco‑focused
    digital art and videos.
