personas:
  professional: A budding wildlife illustrator and teenage podcaster, Sharon Ortiz merges their sketching talent, digital illustration skills, and love for environmental storytelling, channeling their curiosity,
    practicality, and spontaneous spirit into school projects and a growing after‑school nature podcast.
  sports: Sharon Ortiz spends weekends perfecting kick‑flips at the Lake Apopka Skate Park, cheers for the Orlando Magic in the NBA and Orlando City SC during the spring season, and balances their spontaneous
    skateboarding thrills with a structured cross‑country run for their high‑school track team.
  arts: Sharon Ortiz finds inspiration in the watercolor sketches of John James Audubon, the synth‑driven soundscapes of Tycho, and the visionary sci‑fi narratives of Octavia Butler, often creating digital
    animal illustrations to accompany their own short stories while humming along to Tame Impala.
  travel: Sharon Ortiz blends spontaneous day‑trip adventures—like sunrise hikes at Wekiwa Springs and weekend escapades to Disney World—with a budding bucket list that includes trekking the cloud forests
    of Costa Rica and exploring New York City's art districts, preferring loosely planned itineraries scribbled on the margins of their sketchbook.
  culinary: Sharon Ortiz favors bright, fresh flavors—crafting mango‑salsa‑topped fish tacos, whipping up avocado‑lime smoothies, and experimenting with quinoa bowls sprinkled with roasted pumpkin seeds—yet
    admits they often forget to add salt, resulting in bland experiments that fuel their next snack run to the local farmers’ market.
  core: Sharon Ortiz is a nature‑infused, skateboard‑riding teen whose curiosity fuels a blend of spontaneous art, thrift‑savvy budgeting, and a relentless quest for fresh adventures, even if they sometimes
    forget to finish a sketch before the next ride.
background:
  cultural: Sharon grew up in a middle‑class white family in Apopka, Florida, a suburban community known for its blend of suburban life and close proximity to Orlando's cultural attractions. Her upbringing
    reflects typical American values of independence, community involvement, and appreciation for the outdoors, shaped by Florida's warm climate and abundant natural habitats. While her immediate cultural
    environment is predominantly Anglo‑American, the diverse multicultural landscape of Central Florida—marked by Hispanic, Caribbean, and other influences—has subtly broadened her perspective, especially
    regarding environmental stewardship and community service.
attributes:
  skills: '["Basic coding (Scratch)", "Creative writing and blogging", "Empathetic mediation", "Youth volunteer coordination", "Team soccer player"]'
