personas:
  professional: Michael Dulaney, a 43‑year‑old correctional officer, combines front‑line expertise in inmate supervision, crisis de‑escalation, and emergency response with measured empathy and a curiosity
    for creative expression, using their active listening and assertive communication to develop informal art‑based programs, and they aim to secure a shift‑supervisor position that will embed humane training
    practices.
  sports: Michael Dulaney, who favors solitary fitness routines like weekend hikes on the Appalachian Trail, seasonal fly‑fishing trips along the Susquehanna, and occasional bodyweight workouts in the garage,
    belongs to the Pine Ridge Hiking Group, follows the Pittsburgh Steelers, Pittsburgh Penguins, and Penn State Nittany Lions with fervor during football, hockey, and college seasons, and they integrate
    these activities into a low‑key, self‑directed approach to staying fit.
  arts: Michael Dulaney, a reserved amateur painter and photographer, draws creative inspiration from Andrew Wyeth’s Pennsylvania landscapes and Ansel Adams’s dramatic scenery, frequently visits the Carnegie
    Museum of Art and local galleries, and unwinds by strumming acoustic renditions of Bob Dylan and The Avett Brothers at intimate gatherings, where they also share sketches with fellow art enthusiasts.
  travel: Michael Dulaney, who prefers flexible, low‑key road trips over rigid itineraries, spends weekend getaways exploring historic sites such as Gettysburg and the Blue Ridge Parkway, has recently visited
    New York City for a Broadway show, and hopes to someday trace ancestral roots on a modest self‑guided tour of the Scottish Highlands, where they plan to blend genealogy research with rugged scenery
    while balancing adventure with a modest travel budget.
  culinary: Michael Dulaney, a competent home cook with a penchant for Appalachian flavors, often prepares pan‑seared trout with fresh lemon, wild thyme, and sage, bakes rustic cornbread infused with honey
    and locally sourced apples, experiments with smoked pork shoulder in a backyard smoker, and enjoys pairing meals with craft beers from nearby breweries, though they sometimes let a pot of stew simmer
    unattended due to their relaxed kitchen pace.
  core: Michael Dulaney blends a steady correctional career with a quiet curiosity for art, history, and nature, navigating life with measured empathy, a relaxed approach to planning, and a habit of misplacing
    grocery lists while they sketch sunrise vistas.
background:
  cultural: Michael grew up in a blue‑collar, working‑class family in Westmoreland County, an area with deep roots in coal‑mining and manufacturing traditions. His upbringing emphasized community service,
    modesty, and loyalty, values reinforced by regular attendance at a local Protestant church. The regional culture celebrates hard work, family ties, and a love for local sports, especially the Steelers,
    while also cherishing Appalachian storytelling and outdoor recreation. Although his heritage is primarily Anglo‑American, his daily interactions with a diverse inmate population have broadened his cultural
    perspective, fostering a genuine appreciation for varied artistic and cultural expressions.
