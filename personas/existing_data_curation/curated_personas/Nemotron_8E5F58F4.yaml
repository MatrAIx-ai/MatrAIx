  hobbies: '[''Painting'', ''Nature photography'', ''Reading historical biographies'', ''Woodworking'', ''Fishing'', ''Visiting local art galleries'', ''Playing acoustic guitar'', ''Genealogy research'',
    ''Hiking in the Allegheny foothills'', ''Attending small community theater productions'']'
  career_goals: Michael aims to advance to a shift‑supervisor role within the county jail, using that position to shape staff training around de‑escalation and humane inmate interaction. In the longer term,
    he hopes to transition into a correctional program coordinator role where he can integrate art‑therapy and creative workshops into rehabilitation efforts. Completing his GED and pursuing a certification
    in behavioral counseling are also on his agenda, as they would broaden his qualifications for a future as a reentry counselor or regional correctional administrator. Ultimately, he envisions a career
    that blends his operational expertise with his passion for fostering personal growth among incarcerated individuals.
