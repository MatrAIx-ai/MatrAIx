persona_description: A scientist and engineer who specializes in the development and application of advanced computational tools for understanding natural water flows and their impact on the stability of
  stream banks and the biota within the stream. They are part of a team at the St. Anthony Falls Laboratory and the National Center for Earth-Surface Dynamics, an NSF science and technology center headquartered
  at the laboratory, who are developing a science-based approach to stream-restoration. They are working on the Virtual StreamLab, a high-resolution computational fluid dynamics (CFD) computer code that
  can simulate turbulent flow in natural streams, including stream-bed erosion processes and the interaction of the flow with fish biota. Their work is focused on improving the understanding of the underlying
  physical processes governing the interactions of turbulence in the water column with the sediments and the fauna and flora in the stream, and developing effective and reliable stream-restoration strategies.
  They are using sophisticated numerical algorithms and advanced turbulence models to simulate natural water flows at scales that are necessary to understand how water flow impacts the stability of the
  stream banks and affects the biota within the stream.
