  hobbies: '[''Photography'', ''Hiking'', ''Cycling'', ''Kayaking'', ''Visiting Art Galleries'', ''Live Theatre'', ''Improv Comedy'', ''Cooking'', ''Hosting Dinner Parties'', ''Reading Science Fiction'',
    ''STEM Outreach Volunteering'']'
  career_goals: Richard aims to advance into senior executive leadership, such as Director of Operations or Vice President of Innovation, within a research institution or technology-driven organization.
    He seeks to spearhead initiatives that bridge technology and the arts, develop sustainable community partnership programs, and champion inclusive, interdisciplinary projects. Mentoring emerging talent
    and potentially launching a nonprofit focused on STEM‑arts education for youth are also central to his long‑term ambitions.
