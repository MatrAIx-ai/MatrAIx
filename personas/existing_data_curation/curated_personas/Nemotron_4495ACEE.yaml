  hobbies: '[''Knitting'', ''Crocheting'', ''Quilting'', ''Crossword puzzles'', ''Sudoku'', ''Reading classic literature'', ''Gardening'', ''Genealogy research'', ''Listening to big‑band music'', ''Small‑group
    book club'', ''Volunteer cooking at church'']'
  career_goals: Although retired, Eugenia’s primary ambition is to remain self‑sufficient and maintain a safe, organized home for as long as possible. She aims to complete a memoir documenting her life
    story and the Boudreaux family lineage, and to pass down her canning and quilting skills to her grandchildren. She hopes to keep her vegetable plot among the most productive in the neighborhood, competing
    informally with other seniors at the local fair. Additionally, she aspires to win a regional quilting contest, thereby proving her expertise and preserving a sense of personal achievement.
