personas:
  professional: Eugenia Boudreaux, a retired home‑management specialist, now dedicates their days to preserving family history, crafting heirloom quilts, and orchestrating the senior‑center book club with
    the same precision they once applied to household accounting and garden bookkeeping.
  sports: Eugenia Boudreaux, a devoted fan of the local high‑school basketball team the Tigers and a member of the neighborhood senior walking club, prefers gentle morning strolls through the garden over
    any competitive sport, yet cheerfully swaps bingo cards while watching the nearby Riverside Rangers baseball games on TV.
  arts: Eugenia Boudreaux, a lover of 1940s big‑band swing, fills their home with the sounds of Glenn Miller, Ella Fitzgerald, and Benny Goodman, while turning to classic novels by Jane Austen and Charles
    Dickens for inspiration during quilting sessions and occasional community‑theater balcony visits.
  travel: Eugenia Boudreaux, whose travel style is leisurely and meticulously planned, favors short train trips to historic towns like Charleston and Savannah, a nostalgic pilgrimage to the World’s Fair
    exhibit they read about in an agricultural magazine, and occasional family reunions in the same modest cabin where they once tended a garden.
  culinary: Eugenia Boudreaux, a seasoned canner, delights in preserving heirloom tomatoes, sweet corn, and herb‑infused pickles, regularly serving garden‑fresh tomato bisque with basil, thyme, and a dash
    of garlic, while mastering the art of flaky butter biscuits for the church charity kitchen.
  core: Eugenia Boudreaux, a meticulous centenarian who blends relentless routine with a quietly competitive streak, spends each day quilting, gardening, and scrupulously managing finances, all while nervously
    double‑checking every crossword answer and secretly fearing the next health setback.
background:
  cultural: Eugenia was raised in a traditional Midwestern white family with deep roots in the Upper Midwest. Her ancestors were French‑Canadian settlers who arrived in Michigan in the early 1900s, and
    the family has maintained a Catholic faith that shaped community involvement and holidays. Growing up in Saint Johns, she internalized values of self‑reliance, hard work, and respect for routine, typical
    of small‑town life in Clinton County. These cultural influences are reflected in her practical approach to daily tasks, her emphasis on family heritage, and her preference for familiar, close‑knit social
    circles.
