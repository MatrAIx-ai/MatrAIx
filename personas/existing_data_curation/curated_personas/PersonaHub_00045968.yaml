persona_description: A scholar with a deep interest in the study of ancient Iranian mythology, particularly the goddess Anahita. They are particularly interested in the Indo-European water deity and its
  evolution throughout the course of three successive Iranian empires over a period of a thousand years. They are knowledgeable about the written and iconographic records of Iranian societies from the Achaemenid
  period onwards and the survival of the goddess in Islamic Iran. They are also interested in the close relationship between Iranian mythology and that of other Indo-European peoples and the significant
  cultural continuities from Iran's pre-Islamic period into the Islamic present.
