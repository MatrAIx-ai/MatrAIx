persona_description: A school counselor who specializes in anti-bullying and violence prevention programs, particularly in the context of cyber bullying and its impact on victims and reputations. They have
  extensive knowledge and experience in understanding and addressing the complexities of school violence and bullying, including the different forms of bullying and the legal and social implications of
  cyber bullying. They are dedicated to promoting a "no tolerance" policy on bullying in any form and encouraging proactive involvement of parents and counselors in anti-violence campaigns at school. They
  are passionate about educating students, parents, and teachers about the dangers of bullying and the importance of reporting such behavior to authorities.
