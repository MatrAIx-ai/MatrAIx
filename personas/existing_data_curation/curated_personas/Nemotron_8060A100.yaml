personas:
  professional: Jonathan Scarlett is a warehouse material mover who leverages their forklift certification, mastery of Fishbowl and SAP WMS inventory systems, and hands‑on mechanical curiosity to keep the
    floor humming, while their energetic, sociable nature makes them the go‑to coordinator for fast‑paced tasks even as their spontaneous approach sometimes leads to paperwork slip‑ups.
  sports: Jonathan Scarlett shoots hoops for the Junction City Hoops Club, pumps iron at the county gym while rooting for the Kansas City Chiefs and Royals, and spends weekend mornings casting lines at
    Tuttle Creek Lake, making basketball their seasonal sport focus.
  arts: Jonathan Scarlett cranks out classic rock anthems from Led Zeppelin and The Rolling Stones, counts down to live Manhattan shows featuring Greta Van Fleet and local tribute bands, and channels their
    DIY spirit into assembling model kits that double as creative downtime.
  travel: Jonathan Scarlett prefers spur‑of‑the‑moment road trips within a day's drive—like a last‑minute hike in the Ozarks or a weekend music crawl through Nashville—while dreaming of a future cross‑country
    trek to New York City’s iconic concert venues once their savings allow.
  culinary: Jonathan Scarlett favors hearty American fare such as cheeseburgers with pickles, buttermilk fried chicken, and BBQ ribs seasoned with smoked paprika and jalapeños, cooking at a competent home‑chef
    level while occasionally treating themselves to sushi rolls on concert nights.
  core: Jonathan Scarlett is a high‑energy warehouse mover who balances a love for classic rock, vintage engines, and spontaneous concert splurges against bouts of anxious overthinking and a chronic struggle
    to keep their schedule organized.
background:
  cultural: Jonathan grew up in the heart of the Midwest, near Junction City, Kansas. His family has deep roots in the region, with a background in farming and small‑town values that emphasize hard work,
    community cooperation, and self‑reliance. He was raised in a close‑knit neighborhood where church gatherings and local sports were central to social life. This Midwestern upbringing instilled a pragmatic
    outlook, a strong sense of hospitality, and an appreciation for collective well‑being. While he identifies as white American, his cultural identity also reflects the diverse influences of the Kansas
    plains, including a respect for the land, a straightforward communication style, and a commitment to supporting his neighbors.
attributes:
  skills: '[''Forklift operation'', ''Pallet jack handling'', ''Inventory management software (Fishbowl, SAP WMS)'', ''Heavy lifting and material handling'', ''Load planning and staging'', ''OSHA safety
