  hobbies: '[''Amateur basketball'', ''Community event volunteering'', ''Small engine tinkering'', ''Model kit building'', ''Weightlifting'', ''Fishing at Tuttle Creek Lake'', ''Journaling'', ''Mindfulness
    meditation'', ''Listening to classic rock'', ''Attending live concerts'', ''Following logistics technology news'']'
  career_goals: Jonathan aims to turn his practical experience into a supervisory role within the next three to five years. He plans to earn a Certified Forklift Trainer credential and complete an associate
    degree in Supply Chain Management at a nearby community college. Long‑term, he dreams of opening his own moving and logistics business that emphasizes safety, employee well‑being, and community service.
    Alongside his career growth, he is committed to developing coping strategies for his anxiety, seeking a work environment that offers supportive mentorship and predictable scheduling to help balance
    his emotional health with his ambition.
