  hobbies: '[''Cooking traditional Mexican dishes'', ''Growing herbs and vegetables in her garden'', ''Reading historical fiction'', ''Volunteering at the senior center'', ''Participating in church choir
    and events'', ''Genealogy and family history research'', ''Walking in the Antelope Valley trails'', ''Quilting and craft projects'']'
  career_goals: Although retired from formal employment, Maria aims to deepen her mentorship role within the neighborhood, especially by teaching cooking and gardening to younger families. She aspires to
    compile a family cookbook that preserves her heritage recipes and to document her family's genealogy for future generations. Maintaining her health and mobility to continue volunteering at the senior
    center and supporting her grandchildren's education are central to her personal ambitions.
