personas:
  professional: Gianelle Jimenez, an aspiring marine explorer and junior game developer, merges her tide‑pool curiosity with Scratch programming to craft interactive ocean‑themed games, reflecting her methodical
    planning and practical problem‑solving.
  sports: Gianelle Jimenez, a member of the Sunset Junior Soccer Club who practices twice weekly and swims at Lakeview Community Pool, follows the national men’s soccer team and cheers for the local minor
    league baseball squad, balancing teamwork on the field with personal fitness routines.
  arts: Gianelle Jimenez, a creative bead‑craft enthusiast who also crochets simple bracelets, writes mystery short stories inspired by R.L. Stine, dances salsa to the vibrant beats of Celia Cruz, and enjoys
    the animated films of Pixar, weaving diverse artistic influences into her daily play.
  travel: Gianelle Jimenez, who loves weekend beachcombing trips to the Gulf Coast, dreams of snorkeling in the Great Barrier Reef and exploring the tide pools of Catalina Island, planning adventures with
    meticulous check‑lists while balancing schoolwork and family time.
  culinary: Gianelle Jimenez, who often helps her grandparents prepare traditional family dishes like crisp plantain chips, seasoned chicken with rice, and mango salsa, enjoys experimenting with fresh cilantro,
    lime, and garlic, and can craft a simple rice‑and‑bean bowl on her own, reflecting her hands‑on culinary curiosity.
  core: Gianelle Jimenez merges scientific curiosity with artistic flair, organizing beach discoveries into Scratch games, balancing disciplined savings with spontaneous bead purchases, and thriving on
    structured routines while occasionally forgetting to moisturize after beach outings.
background:
  cultural: Gianelle is a first‑generation Cuban‑American raised in West Palm Beach, Florida. At home, Spanish is spoken alongside English, and she celebrates both Cuban and American holidays. Her family
    maintains strong ties to Cuban culture through music, dance, and food; she listens to salsa, son, and reggaetón, and participates in traditional dances during family gatherings. Their kitchen often
    fills with aromas of ropa vieja, black beans, plantain fritters, and Cuban coffee (in a child‑friendly version). Gianelle and her family join the local Cuban community center, attending the annual Cuban
    Heritage Festival, and take part in cultural workshops that teach classic recipes and folkloric dances. The diversity of South Florida, with its beaches, multicultural schools, and vibrant immigrant
    communities, also influences her outlook, encouraging openness and bilingual communication.
attributes:
  skills: '["Bilingual Spanish/English fluency", "Reading comprehension and advanced literary interest", "Organized project planning (color-coded schedules)", "Basic coding in Scratch (interactive stories)",
