    swimming proficiency", "Soccer fundamentals"]'
  hobbies: '["Beachcombing and seashell collecting", "Reading mystery/adventure books", "Writing short stories", "Soccer practice", "Salsa dancing lessons", "Bead crafting and jewelry making", "Simple crochet
    projects", "Cooking Cuban dishes with family (plantain chips, arroz con pollo)", "Scratch coding and game design", "Swimming at community pool", "Volunteering at library story-time sessions"]'
  career_goals: While still in elementary school, Gianelle has begun shaping her future aspirations. Encouraged by her curiosity about marine life and her practical desire to protect her community’s coastal
    environment, she hopes to become a marine biologist or environmental engineer focusing on coral reef conservation. She plans to deepen her science knowledge by joining the school’s STEM club, participating
    in local marine science camps, and improving her coding skills to model ecosystems. In the longer term, she imagines attending a university with a strong marine research program, earning a degree in
    marine biology or environmental engineering, and eventually working with organizations like NOAA or a local aquarium. She also considers leveraging her bilingual abilities to engage Spanish‑speaking
    communities in environmental outreach.
