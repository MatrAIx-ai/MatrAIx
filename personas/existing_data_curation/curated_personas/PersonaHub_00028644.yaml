persona_description: Rios is a social scientist and educator who has dedicated his career to understanding and addressing systemic barriers to academic, employment, and life achievement for marginalized
  communities. He is a passionate advocate for restorative justice and has worked to bring about positive change through policy and community engagement. Rios is known for his work with the YO! Watts youth
  center, which provides programs and services to at-risk youth in South Central L.A. and has been a vocal advocate for the needs of young people living in gentrified areas. He has also worked to raise
  awareness of the impact of police brutality and the need for reform in the criminal justice system.
