  career_goals: Linda aims to become a curriculum specialist who champions arts‑infused instruction across the district. She plans to pursue a master’s degree in educational leadership within the next three
    years, positioning herself for roles as an instructional coach or eventually a school principal. A central ambition is to develop a district‑wide program that highlights African American cultural contributions
    in elementary curricula, offering professional development for teachers on inclusive practices. Additionally, she hopes to launch a sustainable after‑school arts and mentorship program that supports
    under‑represented students while balancing her career growth with a thriving family life.
