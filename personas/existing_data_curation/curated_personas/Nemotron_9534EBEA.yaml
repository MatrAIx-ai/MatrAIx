personas:
  professional: A seasoned radiologic technologist, Mariavictoria Aguayo leverages two decades of expertise in CT, MRI, digital X‑ray, and mammography, combined with meticulous organization and a compassionate
    bedside manner, to streamline imaging workflows, uphold radiation‑safety protocols, and mentor bilingual staff, and they continuously seek process improvements and quality‑assurance leadership.
  sports: Mariavictoria Aguayo enjoys solo weekend hikes on the Santa Cruz Mountains trail network, follows the San Jose Sharks and San Jose Earthquakes, and they regularly attend a Saturday morning yoga
    class at a local fitness studio that doubles as a low‑impact exercise club.
  arts: Mariavictoria Aguayo finds solace in historical fiction by Ken Follett and mystery novels by Gillian Flynn, and they unwind with playlists featuring Leonard Cohen, Joni Mitchell, and Yo‑Yo Ma while
    frequently attending chamber music concerts at the San Jose Center for the Performing Arts.
  travel: Mariavictoria Aguayo prefers meticulously planned getaways that blend cultural immersion and outdoor adventure, such as a three‑day culinary tour of Santa Fe’s historic plaza followed by a week
    of hiking in the Sierra Nevada, and they aspire to explore Kyoto’s temples and the coastal villages of Cinque Terre next.
  culinary: Mariavictoria Aguayo crafts southwestern‑inspired fusion dishes for family and friends, such as chipotle‑lime grilled chicken with cilantro‑pesto quinoa, roasted poblano salsa atop homemade
    corn tortillas, and they delight in experimenting with fresh herbs from their garden like oregano, thyme, and sage.
  core: Mariavictoria Aguayo is a methodical, compassionate radiologic technologist who balances a thriving herb garden with precise imaging protocols, secretly indulges in late‑night mystery novels, and
    treats each day as a carefully scheduled experiment.
background:
  cultural: Mariavictoria is a second‑generation Hispanic American of Mexican descent, fluent in both English and Spanish. Growing up in a bilingual household, she internalized strong family values, respect
    for elders, and a deep sense of community responsibility. Traditional celebrations such as Día de los Muertos, Cinco de Mayo, and Christmas posadas are central to her family life, often marked by homemade
    foods, music, and storytelling. Her Catholic upbringing influences her compassion and cooperative nature, guiding her desire to serve others. While she embraces the tech‑forward, multicultural environment
    of the Bay Area, she continues to integrate her cultural heritage into daily life through language, cuisine, and active participation in local Latino community events.
attributes:
  skills: '[''Radiographic (X‑ray) imaging'', ''Computed Tomography (CT) operation'', ''Magnetic Resonance Imaging (MRI) operation'', ''Mammography imaging'', ''Radiation safety and dose optimization'',
    ''Patient positioning and immobilization'', ''Image quality assessment and quality control'', ''PACS/RIS navigation and reporting'', ''HIPAA and OSHA compliance'', ''Equipment maintenance and troubleshooting'',
    ''ARRT certification and continuing education'', ''Bilingual communication (English/Spanish)'', ''Patient education and compassionate care'', ''Workflow management and scheduling'', ''Staff training
    and mentorship'', ''Documentation and record keeping'']'
  hobbies: '[''Gardening (vegetable and herb garden)'', ''Cooking (Mexican‑Californian fusion cuisine)'', ''Reading (historical fiction, mystery novels, medical literature)'', ''Yoga and meditation'', ''Hiking
    (local trail walks)'', ''Volunteering at community health fairs'', ''Mentoring bilingual radiologic technologists'']'
  career_goals: Mariavictoria aims to advance into a supervisory or lead technologist position within her current hospital or a larger health system, overseeing imaging operations, quality assurance, and
    staff development. She plans to obtain advanced certifications in CT and MRI, and to complete a bachelor's degree in radiologic sciences to qualify for administrative roles. She is passionate about
    improving patient safety and wants to lead a radiation‑dose reduction initiative and mentor new technologists, especially those from underrepresented backgrounds. In the longer term, she envisions contributing
    to curriculum development for radiology technician programs at a community college or partnering with local clinics to provide low‑cost imaging services for the Hispanic community in Santa Clara County.
