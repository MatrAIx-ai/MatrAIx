  career_goals: Donna aims to transition from a senior analyst role to a leadership position where she can shape organizational strategy and mentor the next generation of analysts. She plans to earn a PMP
    certification and deepen her expertise in advanced analytics, positioning herself as a go-to expert for data-driven decision making. Over the next five years she hopes to lead a cross-functional change-management
    team, spearhead high-impact process-reengineering projects, and publish thought pieces in industry journals. Balancing her competitive drive with a desire for greater work-life harmony, she also intends
    to develop structured stress-management practices that allow her to sustain high performance without sacrificing personal wellbeing.
