personas:
  professional: Maria-del-Pilar Mosquera, a 62‑year‑old veteran glazier with over thirty years of hands‑on experience, blends meticulous measurement skills with a steady curiosity for low‑emissivity coatings;
    they excel at reading blueprints in both English and Spanish, mentor apprentices with a mix of patience and assertiveness, and are currently pursuing state certification and OSHA safety trainer credentials
    to transition into a supervisory role while introducing eco‑friendly glazing solutions to local contractors.
  sports: Maria-del-Pilar Mosquera enjoys a seasonal mix of community sports, cheering on the Kansas City Royals during baseball season, attending Kansas State Wildcats football games with fellow alumni,
    participating in a weekly senior slow‑pitch softball league at the local park, and taking brisk walks along the Cedar Bluff trails to clear their mind, all while using a modest pair of walking shoes
    that have seen better days.
  arts: Maria-del-Pilar Mosquera immerses herself in artistic traditions by listening to classic ranchera recordings, such as those by Vicente Fernández and modern ballads by Juan Gabriel, devouring mystery
    novels from Agatha Christie and Tana French, crocheting intricate blankets featuring motifs inspired by festive celebrations, and volunteering at the annual Heritage Festival where they help set up
    traditional dance performances and appreciate local theatre productions like the community staging of Les Misérables.
  travel: Maria-del-Pilar Mosquera favors purposeful road trips that blend family visits and cultural immersion, having driven to the highlands of central Oaxaca to partake in a Dia de los Muertos altar
    workshop, exploring the adobe villages of Santa Fe for their handcrafted markets, and taking annual weekend getaways to the Colorado Rockies for hiking, all while planning each journey around a modest
    travel fund and ensuring they can still attend Sunday mass back home.
  culinary: Maria-del-Pilar Mosquera delights in cooking family recipes, expertly wrapping tamales in corn husks and simmering hearty pozole with hominy, pork, and a splash of dried chilies, while also
    cultivating cilantro, epazote, and oregano in their backyard garden to season dishes; they possess an intermediate cooking skill level, often ending meals with a sprinkle of fresh lime and a side of
    roasted Kansas sweet corn, though they have a habit of over‑spicing the stew and occasionally burning the edges of a tortilla when multitasking.
  core: Maria-del-Pilar Mosquera is a detail‑driven glazier who balances a lifelong love of gardening, crocheting, and community traditions with a determined push toward eco‑friendly certification, all
    while navigating health worries and a cautious financial plan.
background:
  cultural: Maria‑del‑Pilar was born to Mexican immigrant parents and grew up in a bilingual household, preserving many traditions from her ancestry. She celebrates Día de los Muertos, quinceañeras, and
    other Mexican holidays with family, while also embracing the close‑knit community life of rural Kansas. Her Catholic faith, love for Mexican music, and the communal spirit of both cultures shape her
    values of family loyalty, hard work, and generosity. Though she lives in Newton, KS, she maintains ties with a network of Mexican families in the region, speaking Spanish at home and often cooking and
    sharing traditional dishes with neighbors.
attributes:
  skills: '["glass cutting", "window and door installation", "glass repair and replacement", "reading blueprints and building plans", "application of safety protocols (OSHA)", "tool maintenance and calibration",
