  hobbies: '["gardening", "cooking Mexican cuisine", "reading mystery novels", "DIY home‑improvement projects", "crocheting", "attending church services", "volunteering at community garden", "participating
    in Mexican Heritage Festival", "walking on nature trails"]'
  career_goals: She aims to obtain a state‑recognized glazier certification within the next two years, enabling her to qualify as a lead installer and eventually transition to a supervisory role. Mariadelpilar
    hopes to mentor younger workers, introduce eco‑friendly glazing solutions to local contractors, and eventually start a small family‑run glass repair service that can provide a steady income for her
    retirement while reducing her physical workload. She also wishes to complete an OSHA safety trainer course to enhance workplace safety for her crew.
