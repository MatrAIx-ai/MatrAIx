persona_description: A healthcare professional who has contributed to the success of the Mobile Vision Project by using 3G-enabled mobile applications and smartphones to extend resources to China's medically
  underserved areas and assist doctors in the screening and treatment of children with amblyopia. The clinician has a passion for improving diagnosis and treatment techniques during annual pre-kindergarten
  screenings, and has reported positive impacts on the patients' outcomes. The clinician has also shared that the project has the potential to improve the efficiency and effectiveness of health workers
  in community clinics.
