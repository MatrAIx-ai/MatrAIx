  hobbies: '[''Basketball'', ''Running'', ''Jazz Concerts'', ''Theater'', ''Mentoring Youth Financial Literacy'', ''Cooking Southern Cuisine'', ''Travel'', ''Reading Tech and Finance Books'']'
  career_goals: He aims to become a Certified Financial Planner (CFP) and eventually launch his own boutique advisory firm focused on serving underserved Black and minority communities in Washington, DC.
    He aspires to take on a leadership role within his firm, develop community‑based financial literacy programs, and become a recognized thought leader in socially responsible investing, with a long‑term
    ambition of influencing public policy on financial education.
