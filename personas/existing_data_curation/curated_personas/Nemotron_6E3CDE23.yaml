  hobbies: '[''Vegetable gardening'', ''Woodworking'', ''Puzzle solving (crosswords, Sudoku)'', ''Local history research'', ''Genealogy'', ''Birdwatching'', ''Hiking'', ''Card games with friends'', ''Volunteer
    work at food bank'']'
  career_goals: Sandra aims to leverage her extensive inspection experience to transition into a senior fire‑marshal role within Allegheny County. She plans to earn advanced certifications such as Certified
    Fire Inspector II and Fire Prevention Specialist, and to spearhead a proactive fire‑prevention outreach program targeting small residential neighborhoods. Additionally, she aspires to mentor emerging
    inspectors through one‑on‑one coaching, incorporate predictive analytics into inspection scheduling, and eventually consult for municipal fire‑safety initiatives after retirement.
