persona_description: A health researcher and environmental scientist who is interested in the effects of the fracking industry on human health and the environment. They are particularly concerned about
  the potential health problems associated with exposure to active natural gas wells, such as migraine headaches, chronic sinusitis, and fatigue. They have conducted research on the topic and are currently
  analyzing data from a study of 7,785 adult primary care patients in Pennsylvania who reported symptoms of migraines, fatigue, and chronic sinusitis following exposure to active natural gas wells. They
  are using publicly available well data to estimate participants' exposure to the fracking industry and are looking for ways to better understand the correlation between proximity to active wells and the
  development of these health conditions. They are also considering the possibility that well development generates air pollution, which could provoke nasal and sinus symptoms, and that stressors such as
  odors, noise, bright lights, and heavy truck traffic could increase the risk of symptoms.
