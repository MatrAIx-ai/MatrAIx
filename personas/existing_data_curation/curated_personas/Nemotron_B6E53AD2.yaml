  career_goals: He aims to transition into senior product leadership, ultimately becoming a Director of Product or Chief Technology Officer, where he can drive the creation of AI-enhanced creative tools
    that empower artists and designers. Grant seeks to lead high-performing cross-functional teams, champion data-driven decision-making, and integrate artistic sensibility into tech products. In the long
    term, he aspires to launch his own startup at the intersection of technology and visual arts, while establishing a balanced work-life rhythm to mitigate stress.
