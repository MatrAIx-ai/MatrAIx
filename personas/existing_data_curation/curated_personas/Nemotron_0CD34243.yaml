personas:
  professional: Brandon Masinter is a budding young engineer who channels curiosity and practicality into LEGO constructions and Scratch programming, methodically planning each build and animating it with
    code while eagerly sharing the results with classmates.
  sports: Brandon Masinter is an energetic midfielder for the Sandy Soccer Club, closely follows the Portland Timbers and Oregon Ducks, and maintains fitness through weekly hikes along the Clackamas River
    and weekend bike rides with friends.
  arts: Brandon Masinter is an avid fan of adventure and sci‑fi literature, especially the works of J.K. Rowling and Veronica Roth, enjoys LEGO fan conventions, and spends free moments listening to Imagine
    Dragons and re‑watching the Star Wars saga.
  travel: Brandon Masinter loves weekend road trips to Crater Lake and Mount Hood, has camped at the Oregon State Fair’s family site, and dreams of exploring the Canadian Rockies and Japan’s cultural landmarks
    on future family vacations.
  culinary: Brandon Masinter enjoys homemade pizza topped with pepperoni and extra cheese, crafts trail mix with almonds, raisins, and dark chocolate chips, and often blends banana‑spinach smoothies for
    a healthy snack after soccer practice.
  core: Brandon Masinter blends methodical curiosity with outdoor energy, turning LEGO builds into Scratch scripts while juggling soccer drills, community garden duty, and a disciplined savings habit.
background:
  cultural: 'Brandon was raised in a middle‑class, predominantly white suburb of Sandy, Oregon. His family embraces typical Pacific Northwest values: frequent outdoor activities, a strong sense of community
    involvement, and an emphasis on environmental stewardship. He celebrates mainstream American holidays such as Thanksgiving, Independence Day, and Christmas, while also participating in regional traditions
    like the Oregon State Fair and local park clean‑ups. The cultural environment combines a respect for nature, progressive social attitudes, and a focus on educational and extracurricular enrichment.'
