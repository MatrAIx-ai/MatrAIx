personas:
  professional: Benna Mathews, an 18-year-old personal care aide, leverages their meticulous routine-oriented mindset and compassionate nature to reliably monitor vital signs, document care activities,
    and build trusting relationships with clients, all while balancing coursework toward a CNA certification and future nursing ambitions.
  sports: Benna Mathews fuels their routine-driven fitness habit by jogging the Scioto Mile each sunrise, participating in the Columbus Running Club's weekly long-run group, cheering on the Ohio State Buckeyes
    football team on Saturdays, and occasionally catching Columbus Crew SC matches, while they prefer low-impact workouts that fit into a predictable schedule.
  arts: Benna Mathews winds down with the soothing acoustic melodies of John Mayer and the storytelling lyrics of The Lumineers, occasionally attends community-theater productions at the Columbus Playhouse
    starring local actors, and finds comfort in rewatching classic films such as 'To Kill a Mockingbird,' which together provide a creative balance to their structured, caregiving routine.
  travel: Benna Mathews prefers meticulously planned weekend getaways, such as a hiking retreat in Hocking Hills State Park with a pre-packed checklist, a culturally rich day trip to Cincinnati's art museums,
    and a future goal of budgeting for a spring visit to New Orleans for its jazz scene, all while balancing a part-time work schedule and upcoming nursing exams.
  culinary: Benna Mathews, a modest home-cook, delights in turning garden harvests into simple dishes such as roasted carrot and kale salad with lemon-tahini dressing, hearty vegetable soup seasoned with
    thyme, and the occasional indulgent pepperoni pizza, while they rely on a basic set of kitchen tools and occasionally treat themselves to a weekend brunch at a local diner for pancakes topped with fresh
    berries.
  core: Benna Mathews embodies a routine-obsessed, compassion-driven 18-year-old whose nightly journaling battles pervasive worry, who can't resist an early jog or a perfectly structured video game level,
    yet occasionally splurges on board-game expansions they swear they won't need.
background:
  cultural: 'Benna grew up in a middle‑class, white family in Columbus, Ohio, with roots tracing back to German and Irish immigrants. His upbringing reflected typical Midwestern values: hard work, modesty,
    and a respect for routine. He was raised in a Protestant household that emphasized community service and humility, which reinforced his compassionate outlook. The cultural fabric of Columbus—its blend
    of university influence, the Ohio State sports culture, and the city’s seasonal fairs—shaped his appreciation for local traditions, simple pleasures, and a practical approach to life.'
attributes:
  skills: '[''Personal hygiene assistance'', ''Mobility support and transfer techniques'', ''Vital signs monitoring'', ''Care documentation'', ''Medication reminder management'', ''Infection control practices'',
    ''Empathetic communication'', ''Team collaboration'', ''Basic health science knowledge'']'
  hobbies: '[''Jogging'', ''Vegetable gardening'', ''Reading self‑help and health books'', ''Journaling'', ''Playing board games with friends'', ''Watching Ohio State football'', ''Volunteering at senior
    center'', ''Casual video gaming'']'
  career_goals: Benna aims to build a stable career in health care by first completing a CNA certification and then advancing to become a Licensed Practical Nurse (LPN). He plans to attend a community college
    program in nursing while continuing to work part‑time as a personal care aide to gain more clinical experience. In the long term, he hopes to earn a registered nursing (RN) degree and eventually specialize
    in geriatric or hospice care, where he can combine his practical skills with his strong desire to provide compassionate, routine‑focused support to older adults. He also dreams of one day managing a
    small home‑care agency that emphasizes consistent, high‑quality care for its clients.
