  hobbies: '["Gardening (herbs & flowers)", "Reading historical fiction", "Listening to classical and traditional Chinese music", "Knitting and crocheting", "Walking in local parks", "Puzzles (crosswords,
    Sudoku)", "Watercolor painting", "Participating in cultural festivals"]'
  career_goals: Although retired, Jocelyn’s ambitions focus on staying active, independent, and meaningful within her community. She aims to preserve her family’s culinary and oral traditions by recording
    recipes and stories for future generations, mentor younger seniors at the local senior center, and compile a modest memoir that intertwines personal history with the broader East Asian-American experience.
    Maintaining her health through daily walks and balanced nutrition remains a practical goal, while her curiosity drives her to experiment with new plant varieties and simple digital tools that keep her
    socially engaged.
