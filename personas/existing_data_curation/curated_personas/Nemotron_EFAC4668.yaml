personas:
  professional: Fernando Fuentes is a seasoned handyman and community organizer in Lajas who leverages a blend of practical curiosity and disciplined reliability to manage home repairs, oversee local events,
    and nurture a budding home‑based food venture, all while navigating a competitive streak that pushes them to perfect every project and recipe.
  sports: Fernando Fuentes enjoys playing casual beach volleyball at Cabo Rojo, follows the Cangrejeros de Santurce baseball team passionately, and treats local domino tournaments with the same strategic
    intensity, often competing with a competitive edge that mirrors how they approach sports.
  arts: Fernando Fuentes is an avid listener of classic boleros, especially the timeless voices of Lucho Gatica and Armando Manzanero, often playing their songs while tending the garden, and they regularly
    attend the Fiestas Patronales to watch bomba and plena performances by Grupo Bomba de la Sierra, which enriches their sense of cultural identity.
  travel: Fernando Fuentes prefers low‑key, nature‑focused trips, often planning weekend drives to the dry forest of Guánica or a sunrise fishing excursion in Vieques, while dreaming of a culinary pilgrimage
    to Oaxaca, Mexico, where they hope to study traditional mole recipes, all balanced against a modest budget and the need to keep anxiety levels manageable.
  culinary: Fernando Fuentes crafts Puerto Rican classics such as pasteles, arroz con gandules, and mofongo with a meticulous hand, frequently experimenting by incorporating heirloom tomatoes, purple carrots,
    and locally harvested okra into their dishes, and they delight in baking sweet tembleque and quesitos for family gatherings, turning every meal into a celebration of heritage and innovation.
  core: Fernando Fuentes is a practical yet curious 50‑year‑old community handyman who anchors their days with fishing, gardening, and cooking, yet wrestles with intense anxiety that fuels a competitive
    streak and a relentless drive to turn passions into a modest, resilient home‑based business.
background:
  cultural: Fernando’s identity is rooted in the vibrant Puerto Rican culture of the Lajas and Cabo Rojo region. Raised in a close‑knit family, he embraces the island’s Spanish colonial heritage, Afro‑Caribbean
    rhythms, and Catholic traditions, participating in family gatherings, community religious events, and local patron saint festivals. He values the communal spirit of his neighborhood, the importance
    of preserving traditional cuisine, and the natural beauty of the surrounding coastline and mangroves. His cultural experience informs his practical skills, love for local foods, and a deep sense of
    place that guides his daily life.
attributes:
  skills: '["home repair (plumbing, basic electrical, carpentry)", "gardening and horticulture", "traditional Puerto Rican cooking", "basic computer literacy (email, social media)", "budget and household
