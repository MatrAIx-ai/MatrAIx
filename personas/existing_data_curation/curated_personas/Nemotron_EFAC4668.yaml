  hobbies: '["coastal fishing", "gardening (vegetable and ornamental)", "traditional Puerto Rican cooking", "playing dominoes", "listening to classic boleros", "attending local festivals", "beach walking",
    "reading Puerto Rican history and sustainability literature"]'
  career_goals: Fernando aims to turn his cooking and gardening passions into a modest home‑based business, such as selling homemade pastries and fresh produce at local markets, allowing him to stay engaged
    while managing his emotional wellbeing. He also plans to obtain a certification in mental‑health first aid to better support himself and his neighbors, and to mentor younger community members in practical
    trades and cultural traditions. Ultimately, he hopes to balance earning a supplemental income with contributing positively to his community’s resilience.
