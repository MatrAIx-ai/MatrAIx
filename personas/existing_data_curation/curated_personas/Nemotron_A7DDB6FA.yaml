    resolution and assertive decision‑making'', ''Safety protocol adherence'', ''Adaptable problem‑solving'', ''Reliability & detail orientation'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Cooking Mexican cuisine'', ''Listening to regional Mexican music'', ''Reading technical and industry magazines'', ''Tinkering with electronics'', ''Volunteering
    at local Hispanic cultural center'', ''Playing in neighborhood softball league'', ''Gardening'', ''Journaling'', ''Practicing mindfulness breathing exercises'']'
  career_goals: Jovanny's primary ambition is to progress into a supervisory quality‑assurance position within the next three years, leveraging his field experience to lead a team of inspectors and shape
    plant‑wide compliance strategies. He aims to obtain a Six Sigma Green Belt and the Certified Quality Auditor credential, which will enable him to design data‑driven improvement projects and mentor junior
    staff. Ultimately, he envisions transitioning to a more strategic, office‑focused role—such as QA manager or compliance consultant—where he can apply his curiosity for new technologies while maintaining
    a predictable schedule that eases his stress. He also hopes to spearhead the implementation of a digital inspection‑tracking system to modernize reporting processes.
