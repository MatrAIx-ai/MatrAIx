  hobbies: '["Gardening", "Cooking Guatemalan Cuisine", "Reading Historical Non-fiction", "Puzzle Solving (Crossword, Sudoku)", "Woodworking", "Birdwatching", "Church Small-Group Participation", "Listening
    to Marimba and Latin Jazz", "Beach Walking"]'
  career_goals: Although retired, Rolando aims to stay intellectually active and socially useful. He plans to volunteer his engineering knowledge to local nonprofits that focus on hurricane preparedness
    and sustainable, affordable housing. He aspires to mentor at‑risk youth in STEM through community‑college outreach programs, and to co‑author a memoir that captures lessons from his three‑decade engineering
    career. A personal ambition is to travel back to Guatemala to support a small community‑development project in his ancestral hometown. He also prioritizes maintaining his health, continuing lifelong
    learning, and contributing to his church’s outreach initiatives.
