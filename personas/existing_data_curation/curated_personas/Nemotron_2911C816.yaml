personas:
  professional: Rolando Jimenez, a retired civil engineer specializing in resilient coastal infrastructure, leverages his meticulous, structured mindset and bilingual communication skills to mentor junior
    engineers and volunteer on hurricane‑preparedness projects, translating complex codes into practical solutions.
  sports: Rolando Jimenez follows the Miami Heat and Tampa Bay Buccaneers with loyal enthusiasm, joins a local senior walking club for daily sunrise beach strolls, and participates in community badminton
    leagues during the winter, balancing low‑impact fitness with his love for seaside scenery.
  arts: Rolando Jimenez, an avid listener of Latin jazz, regularly enjoys recordings by Arturo Sandoval and the marimba ensembles of the Caribbean Rhythm Orchestra, attends occasional performances by the
    Miami Symphony Orchestra, and appreciates the paintings of Diego Rivera for their storytelling, weaving music and visual art into his reflective evenings.
  travel: Rolando Jimenez prefers meticulously planned solo or small‑group trips, having explored historic St. Augustine, the coastal charms of Key West, and the colonial streets of Antigua, while dreaming
    of a purposeful journey to his ancestral Central American hometown to support a community‑development project.
  culinary: Rolando Jimenez lovingly prepares traditional dishes such as pepian and tamales, seasonings from his garden of cilantro, epazote, and habanero peppers, while balancing his meals with fresh citrus
    salads and occasionally indulging in a well‑aged steak, showcasing a blend of heritage flavors and practical home cooking.
  core: Rolando Jimenez, a detail‑driven retired engineer, blends disciplined budgeting, meticulous woodworking, and community mentorship with a quiet devotion to music and modest travel, even as a mild
    perfectionist occasionally lets unfinished projects gather dust.
background:
  cultural: Rolando’s cultural identity is anchored in his Guatemalan heritage. Born to parents who emigrated from a highland town in Guatemala, he grew up bilingual, celebrating traditions such as Día
    de los Muertos, Semana Santa, and family reunions featuring classic Guatemalan foods. In West Palm Beach, he remains active in the local Guatemalan diaspora, attending cultural festivals, supporting
    community organizations, and preserving culinary practices at home. These experiences have reinforced values of family loyalty, hospitality, respect, and a strong sense of community service, which he
    expresses through volunteer work, mentorship, and sharing his cultural traditions with friends and neighbors.
attributes:
  skills: '["Civil Engineering", "Structural Design", "Building Code Compliance (Florida)", "Project Management", "Risk Assessment", "Computer-Aided Design (AutoCAD)", "Building Information Modeling (Revit)",
