personas:
  professional: Sergio Casado, a retired secondary‑school mathematics and physics teacher, blends seven decades of bilingual STEM instruction with art‑infused STEAM projects, using his black‑and‑white photography,
    vintage radio tinkering, and watercolor sketches to turn abstract concepts into concrete experiments while mentoring younger educators with a competitive edge and a flexible, laid‑back curriculum style.
  sports: Sergio Casado, an avid chess player, follows the Sacramento Kings and Oakland Athletics, joins a weekly senior chess meetup at the Yuba City community center, and stays physically active with
    gentle orchard walks and light native‑plant gardening that keep his joints supple.
  arts: Sergio Casado draws inspiration from the folk murals of Diego Rivera and the intimate portraits of Frida Kahlo, listens to Debussy’s piano nocturnes and Itzhak Perlman’s violin concertos, and enjoys
    classic films starring Humphrey Bogart, all of which permeate his watercolor landscapes and black‑and‑white photographs.
  travel: Sergio Casado prefers low‑key travel, making day trips to Yosemite Valley’s granite cliffs, weekend getaways to the historic mission town of San Juan Bautista, and dreaming of a pilgrimage to
    a coastal colonial city where sunrise over cobblestone streets could be captured on his film camera.
  culinary: Sergio Casado delights in cooking mole poblano with roasted chilies, chocolate, and almonds, pairing it with fresh ciabatta topped with locally grown figs, goat cheese, and a drizzle of honey,
    and he relishes brewing a strong espresso while sketching his next watercolor scene.
  core: Sergio Casado, a 90‑year‑old retired teacher, channels a lifelong curiosity and competitive spirit into solitary photography, chess, and vintage radio projects, while his relaxed approach to obligations
    often leads to missed bills and occasional over‑indulgence in nostalgic hobbies.
background:
  cultural: Sergio was born to Mexican immigrant parents who settled in California’s Central Valley during the 1930s. Raised in a bilingual household, he grew up speaking Spanish at home and English at
    school, absorbing traditions like Día de los Muertos, Semana Santa, and familial storytelling. His upbringing emphasized respect for elders, a strong work ethic, and pride in Mexican folk art, which
    later influenced his teaching style. Living in Yuba City, a community with a vibrant Hispanic presence, Sergio has remained active in local cultural events, supporting the preservation of Mexican heritage
    through community murals and culinary festivals. While he values his roots, his lifelong curiosity drives him to blend Mexican cultural motifs with contemporary scientific education, reflecting an open‑minded
    yet grounded identity.
attributes:
  skills: '["Mathematics instruction (algebra, geometry, calculus)", "Physics instruction (mechanics, electromagnetism)", "Curriculum development (STEM/STEAM integration)", "Bilingual education (English‑Spanish)",
    "Hands‑on experimental design", "Mentoring students for science fairs", "Problem solving and analytical reasoning", "Technical troubleshooting of lab equipment", "Art appreciation (Mexican folk art,
    classical music)", "Photography", "Basic woodworking", "Critical thinking facilitation", "Chess strategy"]'
  hobbies: '["Photography (black‑and‑white film, nature landscapes)", "Reading (classic literature, science fiction, philosophy)", "Chess (strategic competition in small groups)", "Gardening (native California
    plants)", "Electronics tinkering (vintage radio kits)", "Watercolor sketching", "Attending intimate cultural celebrations (Día de los Muertos, Mexican folk music gatherings)", "Writing personal reflections
    for a memoir"]'
  career_goals: Although officially retired, Sergio aims to leave a lasting educational legacy by documenting his teaching methodologies in a bilingual guide for future educators. He aspires to establish
    a community STEAM after‑school program that pairs science projects with Mexican cultural art, fostering intergenerational learning. Sergio also hopes to mentor younger teachers in flexible, student‑centered
    pedagogy and to secure a modest grant to create a portable laboratory kit for low‑resource schools in the Sutter County area. Ultimately, he wishes to see his former students succeed in scientific careers
    and to preserve his family’s cultural stories through a small memoir.
