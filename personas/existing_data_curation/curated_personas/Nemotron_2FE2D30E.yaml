personas:
  professional: Elizabeth Petty, a thirty‑five‑year‑old electrical engineering technologist with deep expertise in PCB layout, embedded C, and Arduino prototyping, leverages meticulous documentation and
    a competitive drive to lead high‑stakes R&D projects that fuse cutting‑edge electronics with interactive art installations, all while systematically managing stress through verification procedures.
  sports: Elizabeth Petty enjoys solo early‑morning runs along the Schuylkill River, practices yoga three times weekly, and is a member of the Philadelphia Indoor Climbing Club, while cheering for the Eagles
    and 76ers and occasionally attending Flyers hockey games as a low‑key social outlet.
  arts: Elizabeth Petty, an avid creator of digital paintings and experimental long‑exposure photographs, draws artistic inspiration from James Turrell’s light installations, the indie ambience of Brian
    Eno, and intimate shows at Philadelphia’s The Hideout, while also weaving vintage Moog and ARP synthesizer tones into her multimedia projects.
  travel: Elizabeth Petty prefers meticulously planned solo escapades to visually rich destinations like Kyoto’s temples, Reykjavik’s northern lights, and Barcelona’s Gaudí architecture, balancing a modest
    travel budget with occasional splurges on boutique photography workshops that fuel her artistic curiosity.
  culinary: Elizabeth Petty delights in crafting elaborate meals such as saffron‑infused paella, sous‑vide duck breast, and hand‑rolled ramen, often sourcing fresh herbs and truffle, and views plating as
    another canvas where she merges sensory detail with her meticulous aesthetic.
  core: Elizabeth Petty is a thirty‑five‑year‑old tech‑savvy artist who channels competitive precision and chronic worry into intricate electronic art, disciplined finances, and a solitary yet richly creative
    life.
background:
  cultural: Elizabeth grew up in a middle-class, predominantly white, suburban neighborhood on the outskirts of Philadelphia. Her family’s heritage traces back to Irish and German ancestors, and the household
    emphasized punctuality, self-reliance, and the importance of education—values that guided her pursuit of a STEM degree. Living in the culturally diverse city of Philadelphia exposed her to a rich tapestry
    of artistic and intellectual influences, fostering her openness to unconventional ideas and her appreciation for the visual arts. While she identifies with her Euro-American roots and maintains many
    of the traditions passed down from her grandparents, she also embraces the city’s progressive, multicultural atmosphere, which informs her adventurous curiosity and collaborative spirit within small,
    like-minded groups.
attributes:
  skills: '[''Circuit design and analysis'', ''PCB layout (Altium Designer, KiCad)'', ''Microcontroller programming (C, Python)'', ''Embedded systems development'', ''Signal processing and verification'',
