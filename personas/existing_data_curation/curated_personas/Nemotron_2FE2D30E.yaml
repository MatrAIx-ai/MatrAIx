    hardware prototyping for artistic installations'']'
  hobbies: '[''Sketching and digital painting'', ''Visiting art museums and galleries'', ''Experimental photography (light painting)'', ''Arduino and Raspberry Pi prototyping'', ''Kinetic light sculptures'',
    ''Smart-home device development'', ''Reading science-fiction and philosophy'', ''Listening to indie/ambient music and attending intimate concerts'', ''Yoga and mindfulness meditation'', ''Cooking gourmet
    meals'', ''Exploring vintage synthesizers'']'
  career_goals: Elizabeth’s primary career ambition is to transition from a hands-on technician role to a senior technologist or lead engineer position in a forward-thinking R&D environment, where she can
    steer projects that blend cutting-edge electronics with artistic expression. Over the next five years she plans to earn a master’s degree in Electrical Engineering or an engineering management certificate,
    obtain her Professional Engineer (PE) license, and acquire advanced certifications in PCB design and safety compliance. She intends to lead multidisciplinary teams that develop interactive installations,
    smart-home IoT devices, or renewable-energy prototypes, leveraging her competitive drive to set high performance standards while maintaining meticulous quality control. Long-term, Elizabeth hopes to
    establish a boutique consultancy that offers bespoke electronic solutions for artists and designers, and to mentor junior technologists, helping them navigate both technical challenges and the stress-management
    strategies she has found essential for sustained productivity.
