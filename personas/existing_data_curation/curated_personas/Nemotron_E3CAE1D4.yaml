  hobbies: '["Gardening", "Woodworking", "Senior center dance classes", "Historical nonfiction reading", "Chess", "Local theater attendance", "Genealogy research", "Cooking classic recipes", "Walking in
    Central Park", "Volunteer mentorship"]'
  career_goals: Even at 89, Charles aims to leave a lasting legacy in his neighborhood. He wishes to continue serving as a senior advisor for his local community center, helping design intergenerational
    programs that blend new ideas with proven traditions. He hopes to publish a memoir that captures his experiences of mid‑century New York, and to mentor youth interested in trades like woodworking and
    gardening. His ambition is to ensure that the social fabric of his borough remains vibrant, organized, and inclusive.
