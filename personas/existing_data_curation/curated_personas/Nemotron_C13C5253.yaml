  career_goals: Although retired, Byron aims to channel his curiosity into enriching his community's cultural life. He hopes to curate a traveling exhibition of local artists' work, author a memoir that
    intertwines his personal history with reflections on art and the Montana landscape, and mentor young artists through workshops at the Dillon Public Library. He also aspires to complete a series of watercolor
    paintings inspired by the surrounding mountains and to document the region's natural history through a photo-essay.
