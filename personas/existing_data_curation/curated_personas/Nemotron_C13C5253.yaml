personas:
  professional: Byron Donaldson is a retired community arts facilitator who channels their self‑taught expertise in modern art history, watercolor painting, and photography into curating traveling exhibitions
    and mentoring emerging artists, leveraging their curiosity and spontaneous, non‑linear approach while often juggling multiple projects at once.
  sports: Byron Donaldson enjoys early‑morning hikes on the Sapphire Ridge Trail, volunteers as a senior member of the Dillon Trail Runners club, follows the Montana Grizzlies football team with seasonal
    devotion, and spends crisp winter afternoons cross‑country skiing with the local Billings Snow Club, all while preferring solitary exertion over crowded gym classes.
  arts: Byron Donaldson spends afternoons sketching the Tetons, curates weekly watercolor sessions inspired by Georgia O'Keeffe and Ansel Adams, listens to the folk melodies of John Denver and the avant‑garde
    compositions of Philip Glass, and volunteers at the local museum where they champion exhibitions featuring regional sculptor Heidi Zahradnik.
  travel: Byron Donaldson prefers off‑season road trips that blend rugged adventure with quiet reflection, meticulously planning drives to Glacier National Park, a photo‑essay pilgrimage to Iceland's volcanic
    landscapes, and a modest family reunion visit to their ancestral town in Bavaria, all while budgeting travel expenses within their modest retirement allowance.
  culinary: Byron Donaldson relishes foraging for wild huckleberries to swirl into homemade jam, expertly grills fresh trout from the Madison River with rosemary and lemon, and occasionally experiments
    with rustic bison stew seasoned with juniper berries, though they admit a stubborn habit of over‑salting when trying new recipes.
  core: Byron Donaldson is a quietly curious wanderer who blends rugged mountain solitude with a relentless love for avant‑garde art, often juggling unfinished projects, mismatched socks, and a habit of
    talking to pine trees while sketching the sunrise.
background:
  cultural: Byron's cultural background is that of a white American with deep roots in the American West. His family ancestry traces back to German and Irish immigrants who settled in Montana during the
    early 20th century. Growing up in a rural environment fostered a strong connection to the land and an appreciation for self-reliance, while his education in the humanities exposed him to European art
    and literature. He identifies with the values of independence, community solidarity, and an understated appreciation for nature typical of the Rocky Mountain region.
