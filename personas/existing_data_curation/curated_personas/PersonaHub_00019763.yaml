persona_description: A geologist who is interested in the study of geomorphic processes and the formation of high terrain, particularly the Flatirons in Boulder, Colorado. He/she has a background in climbing,
  kayaking, skiing, and backpacking, and is knowledgeable about the tectonic history of the region. The persona is interested in understanding how sedimentary rock layers form and how they are transformed
  into high mountains. They are also interested in the relationship between the rise of the Rockies and the formation of the Flatirons.
