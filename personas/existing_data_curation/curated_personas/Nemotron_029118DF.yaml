  career_goals: Alexander aspires to become a certified cleaning supervisor and earn a Facilities Management certification within the next two years. He envisions advancing to a facilities manager role
    for a mid‑size office complex, where he can integrate his knowledge of sustainable cleaning practices. Long‑term, he plans to launch his own eco‑friendly janitorial service, capitalizing on his competitive
    drive and expertise to carve out a niche market in the Tampa Bay area. He also intends to complete a bachelor’s degree in business administration to strengthen his managerial and entrepreneurial skill
    set.
