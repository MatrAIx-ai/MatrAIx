  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Photography of Coastal Scenes'', ''Reading Art History'', ''Sailing'', ''Greek Cooking'', ''Learning Basic Greek Language'', ''Walking on the Beach'',
