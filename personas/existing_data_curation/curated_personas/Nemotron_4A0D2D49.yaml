personas:
  professional: Alejandra, a budding young scientist‑in‑training, blends their curiosity about space and animals with practical hands‑on building, using LEGO to model ecosystems as they sketch detailed
    wildlife observations and read bilingual storybooks, showcasing a methodical yet adaptable approach that foreshadows a future career in environmental science.
  sports: Alejandra, an energetic member of the after‑school soccer group called the Little Strikers, dribbles the ball with a competitive edge, idolizes the local professional team the City Hawks, and
    spends Saturday afternoons sprinting through drills at the community field, while occasionally teasing teammates about scoring the winning goal.
  arts: Alejandra, a passionate young illustrator, spends afternoons drawing detailed sketches of pets and wildlife inspired by artists like Beatrix Potter and wildlife photographer Nick Brandt, while listening
    to the soothing guitar work of Andrés Segovia and watching animated films such as Finding Nemo to fuel their creative storytelling.
  travel: Alejandra, a curious mini‑explorer, dreams of revisiting the local botanical garden where they collected leaf samples, hopes to travel with their family to Yellowstone National Park to see geysers
    and bison, and also has a wish list that includes a short trip to the Smithsonian’s National Air and Space Museum in Washington, D.C.
  culinary: Alejandra, an enthusiastic junior chef, happily chops avocado and mixes masa for guacamole and tamales alongside their family, measuring ingredients with a playful insistence on using the metric
    system, while they also love helping bake chocolate chip cookies and preparing a simple spaghetti with tomato‑basil sauce that they can sprinkle with parmesan.
  core: Alejandra, a competitive, curious seven‑year‑old who balances meticulous LEGO building and wildlife art with a love for soccer, savings jars, and family cooking, all while navigating mild allergies
    with a keen eye for detail and a hint of skeptical independence.
background:
  cultural: Alejandra comes from a Mexican‑American household where Spanish is spoken daily alongside English, and family traditions such as Día de los Muertos, Día de la Independencia, and Sunday tamale
    gatherings are central to her upbringing. Her parents emphasize respect for elders, communal meals, and the importance of preserving cultural heritage while thriving in the multicultural environment
    of Houston. She celebrates holidays with vibrant music, dance, and food, and feels a strong connection to the Mexican community in Harris County, which influences her love for Mexican cuisine, folkloric
    dance, and the pride she takes in her bilingual identity.
attributes:
  skills: '["Bilingual reading (English & Spanish)", "Basic arithmetic (addition/subtraction up to 20)", "Tablet navigation and educational apps", "LEGO construction and spatial reasoning", "Sketching and
