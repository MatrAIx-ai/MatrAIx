  hobbies: '["Bilingual storybook reading", "LEGO model building", "Animal drawing and sketching", "Nature journaling", "After‑school soccer (small group)", "Helping with family cooking (Mexican cuisine)",
    "Science experiment kits and videos"]'
  career_goals: Alejandra imagines a future where she combines her love for animals, science, and hands‑on problem solving. She aspires to become a veterinarian or a wildlife biologist, motivated by her
    curiosity about how living things work and her desire to help them stay healthy. She also dreams of working at the Johnson Space Center as a junior scientist, inspired by Houston’s space heritage. While
    she enjoys the idea of helping others, she prefers roles that allow her to work independently or in small, focused teams, where she can apply her practical skills and competitive drive to achieve top
    results.
