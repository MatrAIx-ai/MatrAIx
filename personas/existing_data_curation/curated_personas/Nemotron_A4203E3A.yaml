  career_goals: Looking ahead, Derrick aims to transition into a senior partnership role at his firm, where he can shape firm strategy and develop a boutique practice that combines environmental law with
    art law. He also aspires to serve as chief legal officer for a forward‑thinking coastal development company, influencing sustainable policies. Beyond that, he plans to author articles on the intersection
    of law and the arts, speak at national conferences, and mentor the next generation of lawyers while maintaining a balanced retirement plan.
