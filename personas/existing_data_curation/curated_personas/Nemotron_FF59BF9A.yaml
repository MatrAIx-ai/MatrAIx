  career_goals: Although she is no longer in the workforce, Gloria aims to finish the remaining credits toward a bachelor's degree in business administration to formalize her lifelong financial acumen.
    She hopes to write and self‑publish a memoir that captures her family's agricultural legacy and the history of Grantville. Additionally, she seeks to expand the community garden she helped establish
    by securing a small grant, mentoring younger gardeners, and serving on the town's senior advisory council to advocate for improved services and recreational opportunities for older adults.
