persona_description: An art historian who specializes in the study of American art, particularly the works of Thomas U. Walter. She is particularly interested in the design and execution of the Rotunda
  frieze in the United States Capitol, which depicts significant events in American history. She has a deep appreciation for the intricate and precise techniques used in fresco painting, and is knowledgeable
  about the role of artists like Constantino Brumidi, Filippo Costaggini, and Allyn Cox in the creation of the frieze. She is also interested in the broader context of American art history and the influence
  of European art on American artists.
