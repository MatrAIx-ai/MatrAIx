  career_goals: Although retired, Holly’s personal ambition centers on preserving her independence and staying mentally sharp. She aims to complete a handwritten memoir of her life in Chicago Heights, documenting
    family recipes and local history for future generations. She also hopes to continue volunteering one afternoon a week at the senior center, mentoring new volunteers in organizing activities. Maintaining
    her health through regular walks and balanced meals is another goal, as is making sure her small circle of close friends remains connected through weekly phone calls and occasional tea gatherings. She
    aspires to leave a legacy of practical skills, passing on her knitting patterns and gardening tips to grandchildren and neighbors.
