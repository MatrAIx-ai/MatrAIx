personas:
  professional: Alanis Ortega, a 39‑year‑old senior graphic designer in Southern California, blends meticulous project management with a flair for typography and UI/UX, leveraging Adobe Creative Suite and
    bilingual communication to deliver culturally resonant brand identities while eyeing an art‑director role that will let them mentor junior designers and explore AR‑enhanced campaigns.
  sports: Alanis Ortega, a 39‑year‑old hiking enthusiast, joins the San Bernardino Mountain Club for weekend trail hikes, follows the Los Angeles Dodgers and LA Rams for occasional game nights, and they
    maintain fitness through scheduled yoga sessions and occasional pickup basketball at a local community center.
  arts: Alanis Ortega, a 39‑year‑old visual artist, captures desert light in photography inspired by Edward Burtynsky, sketches architectural forms in sketchbooks after browsing works by Massimo Vignelli,
    and they find creative respite listening to the ambient compositions of Brian Eno while reading historical fiction by Hilary Mantel.
  travel: Alanis Ortega, a 39‑year‑old lover of open landscapes, plans trips with a spreadsheet, favoring desert escapes like Sedona, cultural immersion in Oaxaca’s markets, and design conferences in Seattle,
    yet they keep weekend getaways budget‑friendly with stays at nearby campgrounds and boutique B&Bs.
  culinary: Alanis Ortega, a 39‑year‑old home cook, perfects dishes such as carnitas, chilaquiles, and chipotle‑infused salsa using fresh cilantro and corn masa, often experimenting with smoky roasts while
    sometimes over‑seasoning, and they enjoy sharing these meals with close friends during intimate dinner nights.
  core: Alanis Ortega, a methodical 39‑year‑old designer with a love for solitary creativity, blends precision with curiosity, savors desert hikes and spicy home‑cooked meals, and they occasionally splurge
    on camera gear while diligently saving for a community‑focused studio.
background:
  cultural: Alanis was raised in a Mexican‑American household in Southern California, where family gatherings featured music, folklore, and vibrant culinary traditions. Bilingual from childhood, he carries
    a deep appreciation for Mexican visual motifs—bold colors, intricate patterns, and symbolic imagery—which often surface subtly in his design work. His cultural heritage instills a strong sense of community
    responsibility, leading him to contribute pro‑bono design services for local festivals and outreach programs. The blend of Mexican cultural pride and the pragmatic, organized ethos of his upbringing
    shapes both his personal and professional outlook.
