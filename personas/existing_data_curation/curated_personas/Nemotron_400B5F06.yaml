  hobbies: '[''Photography'', ''Hiking'', ''Cooking Mexican cuisine'', ''Reading historical fiction'', ''Sketching'', ''Volunteering for community art projects'', ''Playing tabletop strategy games'', ''Exploring
    urban street art'']'
  career_goals: Alanis aims to transition from senior graphic designer to art director within the next five years, eventually leading a small, community‑centric studio that creates culturally resonant visual
    campaigns for local businesses and nonprofits. He plans to deepen his UX skill set by mastering prototyping tools such as Figma and exploring emerging technologies like AR‑enhanced branding. Additionally,
    Alanis is committed to mentoring junior designers, fostering collaborative environments that balance innovative ideas with practical execution, and obtaining a professional certification in inclusive
    design.
