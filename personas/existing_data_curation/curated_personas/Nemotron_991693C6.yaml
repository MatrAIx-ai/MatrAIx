personas:
  professional: Catharine Lane, a 29-year-old community mental-health specialist, blends evidence-based case management, quantitative program evaluation, and expressive-arts-therapy design, channeling their
    imaginative curiosity and compassionate collaboration into data-driven interventions that honor both scientific rigor and creative expression.
  sports: Catharine Lane, a 29-year-old avid runner, balances weekend jogs along Tuscaloosa's Black Warrior River with a bi-weekly yoga class, cheers on the Alabama Crimson Tide football team in the fall,
    supports the Birmingham Barons during spring baseball, and belongs to the local Tuscaloosa Runners Club where they log steady mileage while staying flexible with their schedule.
  arts: Catharine Lane, whose evenings are spent translating watercolor cityscapes of Tuscaloosa into abstract mixed-media installations, draws inspiration from Mark Rothko's color fields, Claude Monet's
    light studies, and the haunting narratives of Kara Walker, while their playlist cycles through Björk, Sufjan Stevens, and the theatrical scores of Lin-Manuel Miranda for creative fuel.
  travel: Catharine Lane prefers thoughtfully planned weekend getaways that blend cultural immersion with scenic photography, having explored New Orleans' jazz districts, Asheville's Blue Ridge art scene,
    and a solo pilgrimage to Edinburgh's fringe festival, while dreaming of a spring retreat to Kyoto's cherry-blossom gardens and a road-trip through the Grand Canyon National Park when budget permits.
  culinary: Catharine Lane, an adventurous home cook, masters Southern staples like shrimp and grits and fried green tomatoes while experimenting with Mediterranean flavors such as halloumi, pomegranate
    molasses, and fresh basil in weeknight pastas, often sourcing ingredients at the local farmer's market and treating themselves to occasional fine-dining brunch at Birmingham's Ovenbird for inspiration.
  core: Catharine Lane fuses data-driven social work with watercolor storytelling, juggling grant deadlines, late-night art sessions, a penchant for impromptu museum wanderings, and a habit of collecting
    vintage pens that never seem to fit any notebook.
background:
  cultural: Catharine grew up in Tuscaloosa, Alabama, immersed in Southern hospitality and community values while attending the University of Alabama for her STEM degree. Her family maintains traditional
    Southern cultural practices, such as church involvement and appreciation for regional music, yet she embraces progressive ideals and actively engages in inclusive community events. She is keenly aware
    of Alabama's civil‑rights history, which informs her commitment to equity and social justice in her work.
attributes:
  skills: '["Evidence‑Based Case Management", "Crisis Intervention", "Trauma‑Informed Care", "Quantitative Program Evaluation", "Data Analysis (R, SPSS)", "Grant Writing", "Creative Arts Therapy Integration",
    "Active Listening", "Conflict Resolution", "Public Speaking", "Multidisciplinary Collaboration"]'
  hobbies: '["Watercolor painting", "Mixed‑media art", "Speculative fiction reading", "Photography (landscape and street)", "Museum and gallery visits", "Mentoring STEM‑interested high‑schoolers", "Community
    art workshops"]'
  career_goals: Catharine aims to become a program director for a community mental health organization in Alabama, where she can design innovative, data‑driven interventions that blend technology and the
    arts. She plans to obtain her clinical licensure, pursue a Doctor of Social Work (DSW) focusing on program evaluation, and eventually influence state policy on youth mental health services. Long‑term,
    she envisions founding a nonprofit that offers expressive‑arts‑based counseling to underserved populations, leveraging her STEM background to evaluate outcomes and secure sustainable funding.
