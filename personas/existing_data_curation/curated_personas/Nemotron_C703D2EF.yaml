  career_goals: Barbara dreams of opening a boutique bakery that doubles as a community art hub where edible art, interactive workshops, and local collaborations thrive. She wants to develop a signature
    line of visually striking pastries that showcase her imagination and to build a sustainable sourcing network with nearby farms. Long‑term, she aims to become a mentor for emerging bakers, teach pastry
    courses at a community college, and publish a cookbook that blends business insights with creative baking. Recognition in regional pastry competitions and establishing a seasonal pop‑up café in nearby
    towns are also part of her ambitious roadmap.
