  career_goals: Anthony is motivated to turn his love of building things into a career that mixes invention with real‑world impact. He plans to earn his GED and attend a technical college where he can study
    mechanical engineering or robotics, with the long‑term goal of working on product design for sustainable technology. He also dreams of launching a small startup that creates affordable DIY robotics
    kits for other teens. In the short term, he hopes to win a local robotics competition and to secure a summer apprenticeship at a nearby automotive shop to deepen his hands‑on experience.
