personas:
  professional: Edward Harris is a junior visual artist and freelance designer who merges hand-lettering, mixed-media collage, and digital illustration to craft socially resonant narratives, regularly applying
    their sociology-informed research skills and conflict-mediation strengths to community art projects.
  sports: Edward Harris enjoys weekend hikes in the Cibola National Forest, plays pickup basketball with the local high-school alumni league, and follows New Mexico United soccer and the Albuquerque Isotopes
    baseball team, treating fitness as a blend of low-key outdoor adventure and social play.
  arts: Edward Harris writes experimental poetry and creates community murals while drawing creative fuel from the improvisational flow of Miles Davis, the lyrical storytelling of Kendrick Lamar, and the
    introspective melodies of Bon Iver, and they regularly visit the Museum of International Folk Art to study diverse artistic traditions.
  travel: Edward Harris plans trips with a loose itinerary that balances scheduled gallery tours with spontaneous roadside detours, having explored Santa Fe’s vibrant art scene and the desert towns of Taos,
    while dreaming of a cultural immersion in Oaxaca, Mexico, to study traditional weaving, and a future solo journey to Kyoto, Japan, for its Zen gardens and calligraphy workshops.
  culinary: Edward Harris enjoys cooking at an intermediate level, frequently preparing New Mexican staples like green-chile enchiladas and posole alongside experimental fusion dishes such as black-bean
    quinoa bowls spiced with smoked paprika and roasted cactus, and they relish dining at local farm-to-table spots that showcase fresh corn, calabaza, and heirloom tomatoes.
  core: Edward Harris is a visionary visual storyteller who chases abstract ideas across desert skies, habitually sketches on napkins during coffee breaks, stays up all night perfecting a single illustration,
    and occasionally procrastinates on paperwork, balancing boundless imagination with a tendency toward creative perfectionism.
background:
  cultural: Edward is an African‑American whose family roots trace back to the Southern United States, with grandparents who were active in the civil‑rights movement. Growing up in Milan, New Mexico, he
    has been shaped by a multicultural environment where Hispanic, Native American, and Anglo influences intersect. He draws on African‑American artistic traditions—music, storytelling, spoken word—while
    also embracing the regional cultural tapestry, integrating these diverse perspectives into his art and community work. His heritage instills a strong sense of cultural pride, solidarity, and a commitment
    to uplift his community through creative expression.
attributes:
  skills: '[''Digital illustration'', ''Mixed media art'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Hand lettering'', ''Creative writing'', ''Critical analysis'', ''Research methods'', ''Public
