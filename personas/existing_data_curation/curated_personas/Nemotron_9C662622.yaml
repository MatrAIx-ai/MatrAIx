  hobbies: '[''Sketching'', ''Digital painting'', ''Photography'', ''Reading speculative fiction'', ''Writing poetry'', ''Listening to jazz, hip‑hop, and indie folk music'', ''Hiking'', ''Volunteering at
    youth art programs'']'
  career_goals: Edward aims to merge his creative passions with social impact. He plans to pursue an MFA in Visual Arts while building a portfolio that balances fine art and graphic design. His long‑term
    ambition is to become a community arts facilitator, developing art‑therapy workshops and youth programs that empower underserved populations. He also envisions starting a nonprofit that uses collaborative
    art projects to foster dialogue and healing, while maintaining freelance design work to sustain his artistic practice.
