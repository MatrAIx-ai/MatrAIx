persona_description: A global education researcher and advocate who is passionate about promoting access to quality education for refugees and displaced students worldwide. They have a deep understanding
  of the challenges faced by these students, including issues related to displacement, trauma, and limited access to education. They are committed to building partnerships and collaborations among PEER
  partners and the EQUAL Global Research Network, and are dedicated to improving regional education systems through the development of learning outcome measures and the examination of context-specific learning
  measurements. They are also interested in the inclusion of vulnerable and marginalized populations in education systems, such as Roma children and individuals with physical disabilities, and are committed
  to developing integrated curricula and programming to address these issues.
