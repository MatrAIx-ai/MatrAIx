  hobbies: '[''visiting art galleries and museums'', ''watercolor painting'', ''photography'', ''reading non-fiction on science and philosophy'', ''home vegetable gardening'', ''experimental cooking'',
    ''hiking in nature reserves'', ''yoga and meditation'', ''journaling for emotional regulation'', ''participating in trivia competitions'']'
  career_goals: Nora aims to transition from a general farm laborer to a supervisory role where she can integrate sustainable practices and technology into everyday operations. She plans to earn a certification
    in sustainable agriculture and learn precision-farming tools such as drone imaging and GPS-guided equipment. Her long-term ambition is to launch a small-scale, community-focused farm in the Houston
    suburbs that combines organic produce with art installations and workshops, turning agriculture into an experiential space. She also hopes to mentor other workers, especially those struggling with anxiety,
    by promoting mental-health awareness on the farm.
