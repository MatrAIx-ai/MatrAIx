  hobbies: '[''gardening'', ''birdwatching'', ''reading historical novels'', ''quilting'', ''bridge'', ''genealogy research'', ''Southern cooking'', ''church choir singing'']'
  career_goals: Although retired from formal employment, Tammy aims to stay engaged by mentoring younger members of her church’s volunteer committee, continuing her genealogy project to document her family’s
    roots in the Florida Panhandle, contributing recipes and gardening tips to the local senior center newsletter, and maintaining her health so she can travel to visit grandchildren and explore historic
    sites in the Southeast.
