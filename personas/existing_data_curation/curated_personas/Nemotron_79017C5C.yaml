  career_goals: Oswaldo aims to secure a stable, structured career that offers clear advancement steps. His primary ambition is to become a certified automotive technician, attend a technical college, and
    eventually open his own auto‑repair shop where he can apply his methodical approach. He also entertains the idea of joining a public‑service field such as firefighting or law enforcement, drawn by the
    disciplined environment and community respect. In the short term, he plans to improve his grades, earn a scholarship for a vocational program, and gain part‑time experience at a local garage to build
    a solid foundation.
