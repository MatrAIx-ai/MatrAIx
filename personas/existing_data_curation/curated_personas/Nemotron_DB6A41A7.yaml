  career_goals: Jimmy aims to advance to a senior operations manager or director of manufacturing within the next five years, overseeing multiple sites and driving large‑scale efficiency initiatives. He
    plans to pursue an MBA to deepen his strategic and financial expertise, with the long‑term ambition of becoming a vice‑president of operations where he can shape company culture and champion sustainable
    practices. He also hopes to mentor emerging engineers and managers, fostering a collaborative environment that balances innovation with operational excellence.
