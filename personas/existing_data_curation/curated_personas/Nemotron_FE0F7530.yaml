  career_goals: Harold aims to transition into a senior executive role, such as Vice President of Operations or Chief Innovation Officer, where he can shape large‑scale digital transformation initiatives
    in the tourism and hospitality sector of Central Florida. He aspires to lead an interdisciplinary innovation hub that blends technology with artistic experiences, championing projects that enhance visitor
    engagement through immersive design. Additionally, he plans to mentor emerging leaders, build a robust professional network across industries, and eventually launch a boutique consultancy that helps
    midsized companies adopt flexible, data‑driven strategies while fostering creative cultures.
