  hobbies: '[''Abstract painting'', ''Mixed‑media art experimentation'', ''Reading speculative fiction and philosophy'', ''Gardening'', ''Long nature walks'', ''Jigsaw puzzles'', ''Genealogy research'',
    ''Small literary gatherings'', ''Listening to classical music'', ''Visiting antique shops for art supplies'']'
  career_goals: Although officially retired, Candy aims to continue producing meaningful creative work and to share her expertise with her community. She hopes to publish a small collection of poems and
    reflections that blend her Southern upbringing with abstract philosophical ideas. She also aspires to curate a traveling exhibition of local artists' works, mentor a handful of emerging creators in
    Williamston, and contribute to a digitized oral‑history archive that preserves Anderson County’s stories for future generations.
