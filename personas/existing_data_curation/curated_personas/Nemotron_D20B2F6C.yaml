personas:
  professional: Brittany Mendoza, an 18-year-old bank teller in Rolla, Missouri, combines meticulous cash-handling and banking-software skills with a naturally sociable, team-oriented approach, and they
    are positioning themselves for rapid promotion to personal banker and future leadership roles.
  sports: Brittany Mendoza, an active member of the Rolla community volleyball league, regularly attends Rolla High School football games, hikes the Mark Twain National Forest on weekends, and they are
    an avid supporter of the St. Louis Cardinals and the Springfield Thunderbirds.
  arts: Brittany Mendoza, who delights in salsa nights at the town cultural center, line-dances at county fair country-music stages, captures community moments with her DSLR, and they unwind by streaming
    performances from Luke Bryan, Taylor Swift, and Frank Sinatra.
  travel: Brittany Mendoza, favoring budget-friendly road trips, has explored the live-music scene in Branson, soaked in the thermal waters of Hot Springs, Arkansas, and they dream of a future visit to
    Sedona’s red-rock trails, always planning around work shifts and family holidays.
  culinary: Brittany Mendoza, a self-taught baker who perfects apple pie with a flaky crust, experiments with chicken-and-dumplings, and they often source fresh herbs and vegetables from the Rolla farmers'
    market to enhance her signature cinnamon-streusel coffee cake.
  core: Brittany Mendoza blends small-town reliability with an energetic love of group activities, balancing meticulous banking duties with salsa dancing, weekend hikes, a habit of over-planning grocery
    lists, and occasional binge-watching of streaming series into the early morning.
background:
  cultural: Brittany is a White American raised in the small‑town, Midwestern setting of Rolla, Missouri, where Ozark cultural influences and tight‑knit community values are prominent. Her upbringing emphasized
    hard work, modesty, and a strong sense of community, often expressed through church involvement, local sports, and county fairs. Growing up in a rural‑suburban environment fostered her appreciation
    for regional traditions such as high school football games, farmers markets, and volunteerism. Early marriage reflects a family-oriented culture common in some rural areas, and her educational path
    blends modern college exposure with traditional Midwestern values. This background informs her cooperative, sociable nature and her desire to contribute positively to both her workplace and local community.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''Banking Software Operation'', ''Microsoft Office (Excel, Word, PowerPoint)'', ''Basic Accounting'', ''Financial Statement Analysis'', ''Interpersonal
    Communication'', ''Conflict Resolution'', ''Team Collaboration'', ''Organizational Skills'', ''Time Management'', ''Event Planning'']'
  hobbies: '[''Dancing (salsa/line dancing)'', ''Volleyball (intramural)'', ''Hiking'', ''Cooking and baking'', ''Photography'', ''Reading (personal development, finance)'', ''Listening to podcasts'', ''Community
    volunteer work'', ''Board games'', ''Attending local festivals'']'
  career_goals: Brittany aims to advance within the banking sector, seeking promotion to personal banker within the next two years and eventually becoming a loan officer or branch manager. She plans to
    complete a bachelor's degree in finance while continuing to work, and to obtain relevant certifications such as the Certified Financial Services Counselor (CFSC) or a CFA Level I. Her curiosity about
    financial technology drives her interest in exploring fintech roles that blend customer service with digital solutions. Long‑term, she envisions co‑owning a small boutique coffee shop in Rolla to combine
    her love of hospitality with entrepreneurship, while using her banking experience to manage finances and support her community. She also hopes to mentor new employees, fostering a collaborative and
    supportive work environment.
