personas:
  professional: Prakash Parsan leverages three decades of precision metal fabrication, blueprint mastery, and CNC expertise to mentor junior fabricators, champion rigorous safety standards, and drive Lean
    Six Sigma‑style process improvements, all while using their competitive, skeptical eye and talkative charisma to mediate between floor crews and management.
  sports: Prakash Parsan anchors the Queens Cricket League’s senior side as a spin bowler, delights in weekend matches at Flushing Meadows, and cheers loudly for the New York Knicks during NBA season, using
    casual cricket drills to stay fit while occasionally skipping their scheduled yoga class.
  arts: Prakash Parsan spends Saturday mornings at the Queens Museum and the Met, capturing vibrant street celebrations with a Leica M10, and draws creative fuel from the kinetic sculptures of Alexander
    Calder and the bold colors of Gustav Klimt when designing custom metal‑art pieces that blend traditional motifs with contemporary flair.
  travel: Prakash Parsan prefers meticulously planned journeys that mix cultural immersion and downtime, having explored Rajasthan’s historic forts, toured Kyoto’s traditional wood‑working workshops, and
    routinely retreats to the Catskill Mountains for weekend fishing and photography.
  culinary: Prakash Parsan’s culinary repertoire showcases fragrant biryani layered with saffron‑infused rice, buttery butter chicken, and hand‑rolled naan brushed with ghee, while they occasionally experiment
    with wood‑fired pizza dough on a homemade stone, pairing each dish with mango‑lassi or chilled rosé.
  core: Prakash Parsan blends a competitive, detail‑oriented metal‑fabrication career with a vibrant, community‑centered love of art, food, and cricket, turning every workshop, kitchen, and festival into
    a stage for mentorship and personal expression.
background:
  cultural: Prakash was born to a South Asian (Indian) family that settled in Queens when he was a teenager. He grew up bilingual, speaking Hindi (and some Punjabi) at home while mastering English at school.
    His cultural identity is anchored in celebrating Diwali, Holi, and Navratri with elaborate rituals, yet he seamlessly integrates into the multicultural fabric of South Ozone Park. He attends services
    at the local Hindu temple, where his sociable nature helps him organize cultural programs and youth outreach. Prakash maintains strong ties to his extended family, often traveling to India to visit
    relatives, and he carries forward traditional values of respect for elders, hospitality, and the importance of community while embracing the openness and artistic curiosity encouraged by his American
    environment.
attributes:
  skills: '[''Mechanical assembly'', ''MIG/TIG welding'', ''Blueprint reading'', ''CNC machine operation'', ''Basic electrical wiring'', ''Quality control inspection'', ''Safety compliance'', ''Team training
    and mentorship'', ''Troubleshooting and preventive maintenance'', ''Lean manufacturing principles'', ''CAD (SolidWorks) basics'']'
  hobbies: '[''Visiting art museums'', ''Cooking traditional Indian cuisine'', ''Playing cricket in local leagues'', ''Photography of cultural events'', ''DIY woodworking and metal art projects'', ''Hosting
    community gatherings'', ''Attending Bollywood dance workshops'', ''Reading contemporary art magazines'']'
  career_goals: Prakash aims to move into a supervisory or foreman role where he can formalize his mentorship of younger fabricators and lead process‑improvement initiatives. He plans to earn a Lean Six
    Sigma Green Belt certification to sharpen his competitive edge in efficiency. Over the next five years, he hopes to launch a side business creating custom metal art pieces that blend traditional South
    Asian motifs with contemporary design, allowing him to channel his appreciation for art into a profitable venture. Additionally, he wants to become a recognized safety officer within his union, using
    his skeptical attention to detail to foster a culture of zero incidents.
