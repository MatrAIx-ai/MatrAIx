  career_goals: She aims to advance to a regional sales operations manager within the next three years, overseeing multiple supervisory teams across the Bay Area. She wants to obtain the Certified Professional
    Sales Leader (CPSL) credential and implement a mentorship program for new supervisors, emphasizing consistent, practical training. While seeking higher responsibility, she values stability and prefers
    roles that preserve clear procedures and predictable schedules, allowing her to manage her anxiety effectively.
