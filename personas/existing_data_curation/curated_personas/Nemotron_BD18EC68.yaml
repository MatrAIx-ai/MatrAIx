  career_goals: Walter aims to establish a small boutique studio in Oley that serves local businesses, artisans, and community events, offering design services that celebrate the region’s heritage while
    embracing contemporary aesthetics. He hopes to curate a quarterly exhibition showcasing his own work alongside that of regional makers, creating a platform for emerging talent. Over the next five years,
    he plans to launch a limited‑edition line of eco‑friendly home‑ware designs that combine his graphic skills with his woodworking hobby. To improve his ability to meet deadlines, Walter intends to adopt
    simple project‑management habits and consider hiring a part‑time administrative assistant. Ultimately, he envisions mentoring younger designers in the area, sharing his unconventional, curiosity‑driven
    approach while fostering a supportive creative network.
