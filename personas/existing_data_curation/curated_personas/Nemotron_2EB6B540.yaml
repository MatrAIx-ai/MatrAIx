personas:
  professional: Stephen Thomas, a budding robotics enthusiast, combines his knack for building intricate LEGO Technic models with Scratch programming to prototype simple autonomous functions, and they thrive
    in the structured, collaborative environment of his school’s robotics club.
  sports: Stephen Thomas dribbles for the Wharton County Youth Basketball League, idolizes the Chicago Bulls, and they spend weekends sharpening their shooting skills at the local park while also enjoying
    fish‑catching outings that keep their endurance high.
  arts: Stephen Thomas immerses himself in the worlds of Isaac Asimov and the galaxy of Star Wars, while the high‑energy beats of Imagine Dragons soundtrack their LEGO Technic builds and Scratch coding
    sessions, shaping their imaginative outlet, and they often share favorite scenes with friends during school breaks.
  travel: Stephen Thomas favors weekend trips to Lake Wharton for fishing, dreams of a family road adventure to the Grand Canyon, and they hope to someday explore Japan's Akihabara district for its tech
    culture and anime shops.
  culinary: Stephen Thomas favors pepperoni pizza and crunchy chicken nuggets, delights in cooking their own fish tacos using fresh lake catch, and they proudly master a cheesy macaroni‑and‑cheese recipe
    with a hidden dash of smoked paprika.
  core: Stephen Thomas, a structured yet adventurous 12‑year‑old, balances meticulous LEGO engineering with basketball courts, disciplined savings, and a calm resilience that fuels their curiosity, and
    they approach each new challenge with methodical optimism.
background:
  cultural: Stephen was raised in El Campo, a small agricultural community in Wharton County, Texas. His family has deep roots in the region, combining Anglo‑American traditions with Eastern European (Ukrainian/Russian)
    heritage hinted by his middle name Alexandrovich. The local culture emphasizes self‑reliance, neighborly cooperation, and participation in community events such as the county fair, high‑school football
    games, and the annual rodeo. Stephen’s upbringing reflects typical Southern‑Texan values, including respect for elders, a strong work ethic, and a Protestant Christian background that shapes his moral
    outlook and community involvement.
