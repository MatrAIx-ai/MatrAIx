  career_goals: Stephen aspires to build a career that blends his love of hands‑on work with his interest in technology. He plans to focus on STEM subjects throughout middle and high school, aiming to earn
    a scholarship to a Texas university where he can study agricultural or mechanical engineering. His long‑term goal is to design efficient, sustainable farming equipment and irrigation systems that help
    his community thrive. He also envisions volunteering as a mentor for younger students in his town’s robotics club, combining his leadership abilities with a desire to give back.
