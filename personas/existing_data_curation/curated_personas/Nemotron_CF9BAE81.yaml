  career_goals: Thuy aims to advance to an Office Manager or Administrative Supervisor role within her current organization, where she can lead a team, design efficient office procedures, and mentor younger
    employees. She also aspires to leverage her sociable personality and community ties by becoming a community outreach coordinator for a local nonprofit serving Vietnamese-American families, or by launching
    a small home‑catering business that showcases traditional Vietnamese dishes while providing flexible employment opportunities for other mothers in the area.
