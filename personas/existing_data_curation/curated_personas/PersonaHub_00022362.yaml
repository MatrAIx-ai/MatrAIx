persona_description: A radiation safety expert with expertise in managing radioactive materials and ensuring the ALARA principle is followed in handling and storing radioactive substances. This expert is
  highly trained and experienced in understanding the potential risks and hazards associated with radioactive materials and their handling, and has a deep understanding of the ALARA principle and its application
  in radiation safety. The expert is also knowledgeable about the specific risks and hazards associated with the Beverley Uranium Mine spill and has been involved in the investigation and management of
  similar spills in the past.
