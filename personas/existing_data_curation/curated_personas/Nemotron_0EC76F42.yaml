personas:
  professional: Rayshonna Kelly is an eager preschool teacher‑in‑training who loves arranging story‑time books in neat piles, thrives on predictable daily routines, yet occasionally lets the spontaneous
    chaos of glitter crafts take over, showcasing a blend of structured planning and playful flexibility that they relish.
  sports: Rayshonna Kelly darts around the local Little League Tigers (U‑4) soccer practice with boundless energy, idolizes the Chicago Cubs’ dominant pitcher, loves the rhythmic splash of swimming lessons
    at the community pool, and thrives on friendly competition while occasionally forgetting to share the ball, a spirited attitude they bring to every game.
  arts: Rayshonna Kelly bursts into impromptu karaoke sessions of Disney’s "Let It Go" while drawing vibrant portraits of Moana with Crayola crayons, cherishes the sparkle of live puppet shows at the city’s
    children’s theater, and balances a competitive streak in coloring contests with a love for collaborative story‑making, a creative spark they nurture daily.
  travel: Rayshonna Kelly has explored Grandma’s farmhouse in the countryside, eagerly lists a wish to visit Disneyland’s Magic Kingdom and the sandy beaches of Cancun, prefers short, well‑planned car trips
    with favorite stuffed companions, yet secretly dreams of spontaneous adventure beyond the familiar map, a wanderlust they whisper about at bedtime.
  culinary: Rayshonna Kelly devours chicken nuggets with honey‑mustard dip, delights in cheesy macaroni topped with a sprinkle of paprika, enjoys helping stir batter for blueberry pancakes, and insists
    on sprinkling rainbow sprinkles on every dessert, a playful palate they proudly showcase at family meals.
  core: Rayshonna Kelly is a structured yet spontaneous four‑year‑old who loves neat rows of crayons, tiny competitions on the playground, and a secret stash of glitter stickers that they guard zealously.
background:
  cultural: Rayshonna is an African‑American child raised in the Bronx, New York. Her family blends cultural traditions such as soulful cooking, celebrating Juneteenth and Kwanzaa, and a deep appreciation
    for music ranging from gospel and jazz to contemporary hip‑hop. The vibrant Bronx community, with its multicultural festivals, local parks, and community centers, provides her with diverse artistic
    and social experiences that shape her identity and worldview.
