  career_goals: Rayshonna often talks about wanting to help other kids learn, expressing a budding ambition to become a preschool teacher or a community mentor who creates safe, structured environments.
    She also imagines caring for animals as a future veterinarian, reflecting her nurturing side. These aspirations align with her love for order, practical help, and the desire to make a positive impact
    on those around her.
