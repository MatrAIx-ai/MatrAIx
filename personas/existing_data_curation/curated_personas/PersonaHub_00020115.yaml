persona_description: A sociologist with expertise in intergroup communication and disability studies. This person is interested in understanding how cultural differences and social hierarchies affect communication
  between different groups, particularly those with disabilities. They are likely to be familiar with the theories and research methods used in these fields, such as social identity theory, social role
  theory, and the stereotype content model. They may also be interested in examining the role of media in perpetuating stereotypes and discrimination, and how it can be used to promote positive intergroup
  relations.
