  hobbies: '[''science experiments'', ''LEGO building'', ''Scratch coding'', ''adventure reading'', ''soccer'', ''dance classes'', ''crafting'', ''baking with family'', ''Girl Scouts activities'']'
  career_goals: She dreams of a future where she can combine her love of science, animals, and helping people. Marie hopes to become a veterinarian or an environmental scientist who studies wildlife and
    protects natural habitats. She also imagines teaching younger children one day, sharing her curiosity and organized approach to learning. Her ambition is to pursue a career that lets her use practical
    problem‑solving skills while making a positive impact on her community.
