personas:
  professional: Marie Allen, a budding junior scientist, channels her curiosity for kitchen‑science experiments, methodical LEGO constructions, and Scratch coding into early problem‑solving projects, showing
    an organized, reliable work ethic that makes them the go‑to team leader for school science fair collaborations, even if they sometimes forget to clean up the cluttered workbench afterwards.
  sports: Marie Allen, a lively member of the Richmond Rapids youth soccer team and a dancer at the Midwest Dance Academy, cheers for the Indianapolis Colts and the Indiana Pacers, practices soccer drills
    after school, and balances an energetic schedule with occasional overcommitments that sometimes leave them sore but eager to improve, though they occasionally miss a dance rehearsal after a late‑night
    gaming session.
  arts: Marie Allen, an enthusiastic creator of friendship bracelets, painter of watercolor scenes inspired by nature books, and avid fan of author Rick Riordan and singer Taylor Swift, spends weekends
    crafting LEGO dioramas that tell interactive stories, revealing a blend of imagination, methodical skill, and a love for pop culture, even if they sometimes trade bracelets for candy at school.
  travel: Marie Allen, a curious road‑trip explorer who has visited the Wayne County Fair, spent a family weekend at the Cincinnati Zoo, and dreams of seeing the St. Louis Gateway Arch, prefers itineraries
    that include hands‑on activities and maps they color, while balancing the family’s modest travel budget, though they sometimes forget to pack a jacket for a rainy day.
  culinary: Marie Allen, a budding kitchen helper who can flawlessly measure flour for chocolate‑chip oatmeal cookies, loves making homemade pizza with mozzarella and pepperoni, enjoys crunchy apple slices
    with peanut butter, and often experiments with simple science‑style food experiments like fizzing soda volcanoes, showing a novice yet enthusiastic cooking style, even if they occasionally burn the
    edges of cookies while daydreaming.
  core: Marie Allen, a bright and organized ten‑year‑old who balances relentless curiosity with practical teamwork, often forgets to finish their veggies, sometimes leaves LEGO bricks scattered across the
    living room floor, but never misses a soccer practice or a Sunday church gathering.
background:
  cultural: Marie grows up in a typical Midwestern white family in Richmond, Indiana. Her community values hard work, self‑reliance, and friendly neighborliness. Family gatherings often feature home‑cooked
    meals, church services on Sundays, and attendance at local events such as the Wayne County Fair. The region’s emphasis on school involvement, community service, and outdoor activities shapes her outlook.
    These cultural influences nurture her balanced curiosity and practicality, encouraging her to explore new ideas while staying grounded in community traditions.
