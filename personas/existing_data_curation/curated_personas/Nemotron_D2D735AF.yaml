  hobbies: '[''Golf'', ''Hiking'', ''Wine tasting'', ''Vintage vinyl collecting'', ''Youth baseball coaching'', ''Community event organization'', ''Reading historical biographies'']'
  career_goals: John aims to cement his reputation as one of the leading real estate brokers in Monterey County, targeting annual sales exceeding $120 million within the next three years. He plans to launch
    a boutique brokerage that specializes in high‑end residential and agricultural properties, leveraging his deep local market knowledge and extensive network. He seeks to expand into property management
    and build a portfolio of rental homes that generate steady passive income. Additionally, John aspires to mentor a select group of agents, fostering a high‑performance culture, and to author a regional
    guidebook on home‑buying and investment strategies for the Central Coast area.
