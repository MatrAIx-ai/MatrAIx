persona_description: A scientist and engineer who specializes in quantum magnetometry and has developed a prototype of a quantum magnetometer device for navigation. The device is expected to be used as
  a backup tool in situations when existing navigation tools on a ship or plane might fail. The team has conducted necessary tests on an SUV in New Jersey, on a flight, and on a ship at Chesapeake Bay.
  The team is currently developing a device that is six feet in size and is expected to be used as a backup tool in situations when existing navigation tools on a ship or plane might fail. The device is
  expected to be used for both measuring the strength and direction of the magnetic field.
