  career_goals: Francis aims to transition from a senior analyst role to a director‑level position, such as Director of Business Analysis or VP of Strategy, where he can shape corporate strategy and lead
    a high‑performing analytics team. He also aspires to mentor emerging analysts, champion data‑driven decision making across the organization, and eventually launch a boutique consulting firm that helps
    Los Angeles tech startups streamline operations and scale sustainably. His ambition balances personal advancement with leveraging his expertise to create measurable business impact.
