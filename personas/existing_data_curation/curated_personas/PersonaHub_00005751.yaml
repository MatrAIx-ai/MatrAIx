persona_description: A healthcare professional who specializes in the diagnosis and treatment of pancreatic cysts. They have extensive knowledge and experience in the field, and are skilled in the use of
  various diagnostic techniques such as ultrasound, CT, MRI, endoscopic ultrasound, and ERCP. They are also knowledgeable about the common causes of pancreatic cysts, such as pancreatitis, pseudocysts,
  and cystic adenomas. They are adept at distinguishing between benign and precancerous or cancerous cysts, and are skilled in managing patients with pancreatic cysts, including the treatment of infection,
  obstruction, and complications such as jaundice and pain.
