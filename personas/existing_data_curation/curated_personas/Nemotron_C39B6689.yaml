  hobbies: '[''Gardening'', ''Reading mystery and historical fiction'', ''Listening to jazz'', ''Volunteering at community center (DIY workshops)'', ''Kayaking on the Intracoastal Waterway'', ''Attending
    black heritage cultural events'', ''Crossword puzzles'', ''Meditation for stress relief'']'
  career_goals: Maxine aims to move from laborer to foreman within the next three years, leveraging her practical expertise and safety record to lead a small, trusted crew. She hopes to earn a certification
    in OSHA construction safety and a journeyman carpenter credential, which would position her to mentor younger workers and advocate for higher safety standards. Long‑term, she dreams of launching a boutique
    contracting firm that specializes in energy‑efficient remodels for single‑family homes in Broward County, allowing her to blend her curiosity for new technologies with a desire for financial stability
    and reduced stress as she plans for retirement.
