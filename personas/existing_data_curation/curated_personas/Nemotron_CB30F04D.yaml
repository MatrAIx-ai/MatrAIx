  career_goals: Although only three, Lisa shows a budding interest in caring and organized roles. She enjoys helping her mother set the table and often imagines herself as a teacher leading a classroom
    or a veterinarian caring for animals. She expresses a desire to master reading and counting, aiming to be the first in her small playgroup to finish puzzles and earn 'big kid' stickers for independence.
    Her competitive streak fuels a quiet ambition to become the best at building the tallest block towers.
