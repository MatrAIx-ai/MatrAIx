  career_goals: Skyler aims to transform his sales experience into a purpose‑driven venture that blends commerce with art and community enrichment. He plans to launch a mobile boutique showcasing handcrafted,
    locally sourced Appalachian goods—such as pottery, prints, and bespoke accessories—providing a platform for emerging regional artists. Concurrently, he aspires to serve as a community arts liaison for
    local non‑profits, curating pop‑up exhibitions and workshops that foster creativity in schools and senior centers. To support these ambitions, he intends to earn a certification in marketing or visual
    arts from a community college, improve his organizational skills, and eventually own a sustainable small business that generates income while strengthening cultural ties in Mercer County.
