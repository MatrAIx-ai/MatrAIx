  career_goals: Khalid aims to obtain his GED within the next year, launch a modest home‑based catering service centered on South Asian cuisine, and eventually secure a part‑time role in a community‑service
    organization where his organizational skills and sociable personality can contribute to local initiatives while maintaining a stable, low‑stress routine.
