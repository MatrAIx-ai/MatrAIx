persona_description: A historian who specializes in the study of prehistoric New Zealand, particularly the moa era. Their knowledge and expertise lie in the understanding and analysis of the extinct moa
  species, including the North Island giant moa. They have a keen interest in the history, ecology, and evolutionary biology of the moa, and have a deep understanding of the paleontology and zoology of
  the time period they are researching. They have conducted extensive research on the North Island giant moa and its extinction, and have written extensively on the topic, including peer-reviewed articles
  and books.
