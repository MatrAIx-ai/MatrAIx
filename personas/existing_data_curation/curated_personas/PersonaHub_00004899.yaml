persona_description: A medical professional who is knowledgeable about the impact of network attacks on critical medical systems and the importance of implementing security measures to prevent such attacks.
  They are aware of the potential consequences of a successful network attack on patients and medical facilities, including the risk of incorrect medication, additional testing, and extended hospital stays,
  which could incur unnecessary expenses. They are also familiar with the techniques used by attackers to modify patient data in real-time on a medical network and the impact of these modifications on patients
  and medical facilities.
