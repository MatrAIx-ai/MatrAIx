  career_goals: Avani aims to move into an area‑manager role overseeing multiple stores in the Denver metro area, where she can apply her data‑driven approach to boost performance across locations. She
    also wishes to formalize a mentorship program for younger, especially women, employees in retail, and to eventually transition into a consulting role helping small independent retailers streamline operations.
    As she approaches retirement, she hopes to establish a community‑focused boutique that showcases South Asian crafts and foods, preserving cultural heritage while staying connected to her love of retail.
