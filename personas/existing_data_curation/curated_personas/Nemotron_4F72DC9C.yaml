  career_goals: Naeem’s immediate goal is to become an assistant store manager within the next 12-18 months, leveraging his reliable performance and organizational strengths. Over the next five years he
    aims to advance to a store manager position and eventually take on a district-level supervisory role. He plans to supplement his experience with a retail management certification and possibly pursue
    an MBA to broaden his strategic perspective. Long-term, Naeem hopes to open a community-focused boutique that highlights local Black artists and creators, combining his retail expertise with his passion
    for cultural expression.
