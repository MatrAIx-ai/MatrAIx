persona_description: A neuroscientist who specializes in the study of the brain and its function, particularly in the field of neurodegenerative diseases such as Parkinson's disease. She has published several
  research papers on the use of embryonic stem cells in generating new nerve cells in the brains of rats bred to model Parkinson's disease. She is aware of the ethical and legal issues surrounding the use
  of embryonic stem cells and is interested in the potential benefits and drawbacks of different types of stem cells, including embryonic stem cells and adult stem cells. She is also interested in the current
  state of research on embryonic stem cells and the potential impact of international research on the field.
