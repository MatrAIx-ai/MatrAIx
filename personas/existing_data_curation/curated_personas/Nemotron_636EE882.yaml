  career_goals: John aims to complete his associate degree in engineering technology or information technology, secure an entry‑level position in a manufacturing or IT support role within the region, and
    eventually progress to a supervisory or project management role. He values stable employment, career advancement through certifications, and wants to contribute to his community by leveraging his organized
    and reliable nature.
