personas:
  professional: John Angel, a budding engineering‑technology student, applies methodical planning and solid troubleshooting skills to excel in building and repairing small mechanical devices, aiming to
    turn that reliability into an entry‑level IT support or manufacturing role where they can follow SOPs to the letter and eventually move into supervisory project management.
  sports: John Angel joins the local Park Runners Club for early morning jogs, supports the regional baseball team the Springfield Storm, follows the NFL’s Denver Broncos, and plays casual pickup basketball
    on weekends, treating sport as both a disciplined routine and a balanced social outlet.
  arts: John Angel finds creative respite in assembling detailed model kits of WWII aircraft, listening to classic rock legends like Led Zeppelin and cinematic scores by Hans Zimmer while reading non‑fiction
    histories, and occasionally attending community theater productions, where their appreciation for precise craftsmanship influences their artistic taste.
  travel: John Angel’s travel resume includes a school field trip to Washington D.C.’s museums, a weekend road trip to the Grand Canyon, and a bucket‑list ambition to hike the Pacific Northwest’s alpine
    trails, preferring meticulously planned itineraries but craving spontaneous detours to roadside vintage shops.
  culinary: John Angel’s palate favors home‑cooked spaghetti Bolognese, grilled chicken seasoned with rosemary, and a meticulously prepared coffee latte, yet their cooking skill remains modest and they
    sometimes burn toast when distracted by a strategy game notification.
  core: John Angel is a structured 18‑year‑old tinker who balances disciplined study and community service with a penchant for late‑night gaming marathons, meticulous budgeting, and a habit of chewing pencil
    caps when concentrating.
background:
  cultural: John grew up in North Canton, a small Midwestern town in Ohio, within a predominantly white, working‑class community. His upbringing reflects traditional Midwestern values of hard work, modesty,
    and community involvement. He was raised with an emphasis on education, church attendance (though more cultural than doctrinal), local sports fandom (especially high school football), and a strong sense
    of responsibility toward family and neighbors.
attributes:
  skills: '[''Computer Troubleshooting'', ''Basic Networking'', ''Mechanical Repair'', ''Microsoft Office'', ''Technical Writing'', ''Project Planning'', ''Time Management'']'
