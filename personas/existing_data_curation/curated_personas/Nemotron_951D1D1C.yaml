  hobbies: '["Visiting art museums", "Sketching", "Watercolor painting", "Knitting", "Quilting", "Gardening", "Walking in nature", "Reading art history", "Book club participation"]'
  career_goals: Deborah aims to transition from hourly cleaning work to a supervisory role within a reputable hospitality or senior‑living organization, where she can train new staff and implement efficient
    cleaning protocols. She is also exploring certification as a professional home organizer and hopes to launch a small side business offering bespoke organization services for retirees in Smyrna. Reducing
    job‑related stress is a priority, so she seeks stable hours and benefits. Long‑term, she wishes to volunteer as an art‑program assistant at the local community center, combining her love of art with
    her nurturing personality.
