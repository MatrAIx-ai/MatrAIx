personas:
  professional: Deborah Lee, a seasoned cleaning specialist transitioning toward a supervisory role in senior‑living hospitality, leverages three decades of deep‑cleaning mastery, meticulous organization,
    and empathetic client communication to train staff and streamline protocols, while they maintain a calm, detail‑oriented presence that reflects their curiosity and steady reliability.
  sports: Deborah Lee stays active through low‑impact activities, taking daily walks along the Chattahoochee River, participating in a senior aqua‑aerobics class at the Smyrna community pool, and cheering
    on the Atlanta Falcons in football season and the Atlanta Braves during baseball, all while they prefer solitary exercise over competitive sports.
  arts: Deborah Lee deepens their artistic appreciation by attending docent‑led tours at the High Museum, studying works by Monet and Georgia O’Keeffe, discussing Southern literature by William Faulkner
    in their book club, and unwinding to the gentle piano compositions of Ludovico Einaudi, which together feed their curiosity and quiet enjoyment of the arts.
  travel: Deborah Lee favors relaxed, culturally rich getaways, often spending long weekends exploring historic Southern towns like Savannah and Charleston, planning garden‑inspired trips to Asheville’s
    Biltmore Estate, and dreaming of a leisurely art‑focused pilgrimage to Florence, Italy, all while they carefully budget to preserve their savings.
  culinary: Deborah Lee enjoys cooking with fresh herbs from their garden, frequently preparing rosemary‑infused roasted chicken, peach cobbler with locally sourced peaches, and delicate herb‑filled quinoa
    salads, displaying a competent yet unpretentious culinary skill set that reflects their love of simple, wholesome Southern flavors.
  core: Deborah Lee blends three decades of meticulous cleaning expertise with a quiet love for art, gardens, and knitting, navigating a cautious financial path, managing health concerns with steady routine,
    and balancing a gentle, sometimes worry‑laden, yet resilient outlook on life, while they remain ever mindful of the small details that bring them comfort.
background:
  cultural: Deborah was raised in a traditional Southern white family in Georgia, where church attendance, Southern hospitality, and community involvement were central values. Growing up in the 1960s and
    ’70s, she experienced the region’s cultural shift and developed a strong sense of resilience and self‑reliance. Her upbringing emphasized respect for elders, courteous service, and an appreciation for
    regional arts such as folk music and craft. Today, she remains connected to her roots through regular participation in her local Methodist congregation, attending regional festivals like the Georgia
    Peach Festival, and cooking classic Southern dishes for family gatherings. This cultural fabric shapes her considerate, harmony‑seeking nature and her affection for the arts.
attributes:
  skills: '["Residential deep cleaning", "Commercial housekeeping", "Stain removal and fabric care", "Time management", "Client communication", "Conflict resolution", "Basic home maintenance", "Pet care",
