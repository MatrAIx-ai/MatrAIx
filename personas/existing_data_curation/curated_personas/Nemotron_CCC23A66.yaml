  hobbies: '[''drawing and coloring'', ''building with wooden blocks and LEGO'', ''reading picture books'', ''pretend play (doctor, teacher)'', ''exploring the backyard and collecting natural items'', ''singing
    simple songs'', ''quiet coloring sessions'']'
  career_goals: Linda often talks about wanting to become a teacher when she grows up because she loves helping other children learn new things and making sure everyone feels included. She also dreams of
    being a veterinarian, caring for animals she sees at the local farm and ensuring they stay healthy. Her compassion drives her to imagine roles that involve helping people—like a nurse or a community
    helper—where she can make others feel safe and comfortable. Though still young, she shows a practical side, expressing interest in learning how to fix broken toys so she can keep them in good condition
    for her friends.
