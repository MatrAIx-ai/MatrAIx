persona_description: A geologist who specializes in the study of sedimentary rock formations, particularly those related to the Tertiary and Cretaceous periods. His research interests include, but are not
  limited to, the age and composition of these rocks, the formation processes that led to their formation, and the potential for additional layers or deposits to be discovered in the future. He is particularly
  interested in the use of local lenses of lignite and bentonite, as well as the potential for inclusion of lava in the geological features of the area.
