  career_goals: Angelina aims to advance to a senior facilities manager role overseeing a mixed‑use campus, where she can lead a team in integrating smart‑building technologies and sustainable retrofits.
    She plans to obtain EPA certified technician credentials and an associate’s degree in facilities management to complement her hands‑on experience. Long‑term, she aspires to launch her own boutique maintenance
    consulting firm that specializes in energy‑efficient upgrades for historic New England properties while mentoring apprentices and promoting a culture of safety and reliability.
