personas:
  professional: Angelina Hoag, a seasoned facilities maintenance specialist with two decades of diagnosing mechanical and electrical systems, leading vendor coordination, and mastering digital CMMS platforms,
    leverages her curiosity-driven tinkering with smart-building tech and a pragmatic, cost-effective mindset to push for senior facilities manager roles that blend sustainability with historic preservation.
  sports: Angelina Hoag, a co-ed softball enthusiast in the Windsor Softball League and a regular participant in weekend tennis matches at the Smithfield Country Club, follows the Boston Red Sox and the
    New England Patriots with fervor, and volunteers as a safety monitor for local youth sports events, channeling her competitive energy into both play and community service.
  arts: Angelina Hoag, an avid patron of New England’s colonial heritage, spends evenings attending performances of the local symphony featuring works by Beethoven and contemporary folk guitarist Andrea
    Barlow, enjoys the paintings of Winslow Homer at regional museums, and relaxes with classic films starring Meryl Streep, all of which knit together a love for timeless artistic expression with her community
    spirit.
  travel: Angelina Hoag, who prefers well-planned weekend road trips to historic East Coast towns like Williamsburg, VA, and Salem, MA, and dreams of exploring the Tudor houses of England’s Cotswolds, balances
    her love for immersive guided tours with the constraints of a busy work schedule by using a meticulous itinerary checklist and setting aside a travel fund for one-off adventure vacations.
  culinary: Angelina Hoag, a garden-to-table cook who delights in preparing New England clam chowder with fresh clams, diced potatoes, and thyme harvested from her backyard, masters the art of apple-cinnamon
    crumble, and regularly experiments with sous-vide salmon seasoned with rosemary and lemon, all while pairing meals with locally roasted coffee and occasional trips to food festivals to sample regional
    specialties like lobster rolls.
  core: Angelina Hoag, a pragmatic yet curious 52-year-old, blends competitive drive with community spirit, constantly optimizing building systems by day and tinkering with smart-home gadgets while juggling
    vintage tool hunts and garden chores by night.
background:
  cultural: Angelina was born and raised in Windsor, Connecticut, into a family of Irish and English ancestry that values hard work, self‑reliance, and active community involvement—traits characteristic
    of New England culture. Growing up in a close‑knit suburban neighborhood, she participated in town fairs, church socials, and school clubs, which nurtured her outgoing nature. The region’s emphasis
    on practicality, historic preservation, and modesty informs her appreciation for both traditional repair methods and modern sustainable technologies. Her long‑standing marriage, deep friendships, and
    involvement in local civic groups reinforce a cultural identity rooted in pragmatism, community service, and respect for local heritage.
