  career_goals: Although not currently part of the formal workforce, Anica aims to deepen her impact as a senior volunteer coordinator for the Trinidad Community Center, leading larger-scale sustainability
    projects such as expanding the town's community garden network and establishing an environmental education program for local schools. She aspires to become a recognized voice in regional conservation
    circles, authoring a guidebook on native plants and sustainable gardening practices for Humboldt County. Anica also seeks to mentor younger volunteers, fostering a new generation of community leaders,
    and eventually to curate an oral history archive that preserves the stories of long-time residents and indigenous cultures of the area.
