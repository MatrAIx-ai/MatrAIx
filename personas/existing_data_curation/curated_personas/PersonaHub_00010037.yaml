persona_description: A geologist who specializes in the study of the geology of the Rocky Mountains and the Sierra Madre. They have a deep understanding of the complex interactions between the two mountain
  ranges, the two deserts, and the unique biodiversity they support. They are well-versed in the effects of climate change on the sky islands, including the impact of habitat destruction, invasive species,
  and climate change on the rare subspecies of reptiles, mammals, and other animals. They are also knowledgeable about the biological intersection between the sky islands and the geology of the region,
  and the unique plants and animals that have evolved in response to the geographic isolation and environmental changes.
