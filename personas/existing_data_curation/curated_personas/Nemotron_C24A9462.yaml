personas:
  professional: Jerry Morehouse is a seasoned insurance claims professional who leverages meticulous data‑driven appraisal skills, mastery of Xactimate and Guidewire, and a penchant for structured processes
    to consistently produce fair settlements while they proactively mentor junior adjusters and champion efficiency initiatives.
  sports: Jerry Morehouse starts each day with a 5‑mile sunrise run along the Naples shoreline, plays weekend golf at the Naples Country Club, follows the Miami Heat and Miami Dolphins, and they maintain
    membership in the local Naples Fishing Association’s seasonal tournament crew.
  arts: Jerry Morehouse finds balance in evenings listening to Yo‑Yo Ma’s cello suites and the ambient piano of Ludovico Einaudi, attending quarterly exhibitions at the Naples Art Association, and they
    unwind with classic films such as "The Godfather" and Christopher Nolan’s "Inception", which inform their appreciation for structure and narrative.
  travel: Jerry Morehouse prefers meticulously planned trips, often escaping to the Florida Keys for deep‑sea fishing or to Costa Rica’s Monteverde cloud forest for guided hikes, while they dream of a future
    woodworking pilgrimage to Kyoto’s historic carpentry workshops.
  culinary: Jerry Morehouse enjoys cooking simple, health‑focused meals like grilled mahi‑mahi with rosemary‑lime butter, avocado‑citrus salad, and occasional key lime pie, relying on fresh Gulf shrimp,
    avocados, and citrus zest, and they savor the ritual of preparing each dish after a long day of claims work.
  core: Jerry Morehouse blends analytical precision with a quietly anxious streak, turning routine runs, structured fishing trips, and disciplined woodworking into coping mechanisms for a high‑stress claims
    career, and they often find themselves second‑guessing decisions even while succeeding.
background:
  cultural: Jerry is a white American raised in a middle‑class family in the southeastern United States before moving to Naples, Florida in his early twenties. His upbringing emphasized hard work, self‑reliance,
    and community involvement, values that align with the Coastal Floridian lifestyle blending outdoor recreation with a relaxed, family‑oriented community. He identifies with Naples' local culture, which
    includes a strong connection to the Gulf of Mexico, a focus on boating, fishing, and golf, as well as an appreciation for the region’s seasonal tourism and retirement population. He observes Christian
    holidays and participates in community events that celebrate local marine heritage, while maintaining a pragmatic, business‑oriented perspective shaped by his graduate business education.
