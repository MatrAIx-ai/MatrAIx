  career_goals: Jerry aims to advance to a senior claims management role within the next five years, focusing on catastrophe claims leadership and operational efficiency. He plans to obtain CPCU and ARM
    certifications to deepen his technical expertise. His ambition includes leading a team of adjusters, spearheading process automation initiatives, and developing a mentorship program for junior staff.
    Jerry also seeks to influence corporate policies on claims handling efficiency and to introduce stress‑reduction strategies for frontline adjusters. In the long term, he envisions establishing his own
    consulting firm that advises insurers on Florida‑specific risk assessment and claims management best practices.
