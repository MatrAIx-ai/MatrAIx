persona_description: A person who values personal core values and uses them to select their partnerships and handle personal resources. They take the time to reflect on their most proud and least proud
  moments, and use this introspection to provide themselves with advice. They refine their motivational statement to just a couple of words and take action on their values to see if they are the most helpful.
  They are aware of the potential harm of certain values and challenge them with honesty to better refine them. They are centered in their true selves and know that existence is out of their control, but
  being is always within their control. They are self-determined and let go of validation from the outside world.
