personas:
  professional: Pedro Roman is a hands‑on, bilingual community organizer with practical automotive and carpentry skills who is now seeking a full‑time logistics role where their knack for coordinating small
    events and customer‑service instincts can bring structure to warehouse operations despite a naturally relaxed approach to scheduling.
  sports: Pedro Roman plays pick‑up baseball on weekends with the Little Havana Community League, follows the Miami Marlins and roots for the Miami Heat, and they incorporate sunrise beach jogs into their
    fitness regimen, balancing social competition with occasional bouts of lethargy.
  arts: Pedro Roman enjoys classic Latin music from the 1960s, especially the vibrant performances of Celia Cruz, attends vintage film screenings of golden‑age movies from their heritage, and they occasionally
    volunteer as a translator at community cultural festivals, weaving artistic appreciation into their social life.
  travel: Pedro Roman prefers short, affordable trips to coastal destinations like the Florida Keys, the Dominican Republic, and Seville, plans itineraries loosely around family visits and culinary exploration,
    and they often book last‑minute deals to stretch their budget while balancing a desire for adventure with the financial need for a stable income.
  culinary: Pedro Roman delights in cooking traditional dishes such as ropa vieja and empanadas, seasoning them with fresh cilantro and oregano from their herb garden, and they love sharing these meals
    at community gatherings, though they sometimes over‑season in enthusiasm and rely on take‑out on busy job‑search days.
  core: Pedro Roman is a practical, bilingual problem‑solver who blends community‑focused kindness with a habit of over‑thinking finances and health, and they channel stress into cooking, dancing, and beach
    walks while juggling a laid‑back approach to planning.
background:
  cultural: Pedro is a first‑generation Cuban-American who grew up in Miami’s vibrant Cuban enclave. He was raised bilingual, speaking Spanish at home and English at school, and he maintains strong ties
    to Cuban traditions, from music and dance to culinary customs. Family gatherings often revolve around shared meals, stories of the island, and celebrations of Cuban holidays. He actively participates
    in local cultural festivals, which reinforces his sense of identity and community belonging. This background informs his social values—kindness, cooperation, and a deep respect for harmony—and shapes
    his desire to give back to the Cuban diaspora through volunteer work and cultural preservation.
