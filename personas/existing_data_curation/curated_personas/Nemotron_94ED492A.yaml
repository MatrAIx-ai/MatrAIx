  career_goals: Pedro is seeking a stable, full‑time position that offers a clear routine and predictable income, aiming to reduce the anxiety that comes from financial uncertainty. He plans to enroll in
    a logistics and supply‑chain certificate program at a local community college, with the goal of becoming a warehouse coordinator or shipping specialist where his organizational mindset and practical
    skills can thrive. In the longer term, he dreams of opening a modest Cuban food stall on a Miami weekend market, merging his culinary passion with entrepreneurship, while still maintaining a reliable
    income to support his personal wellbeing.
