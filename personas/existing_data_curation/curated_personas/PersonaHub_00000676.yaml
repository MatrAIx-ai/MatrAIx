persona_description: A systems engineer who specializes in the design and implementation of transaction processing systems. They have a strong background in computer science and have worked on various transaction
  processing systems, including the IBM Transaction Processing Facility (TPF), IBM Information Management System (IMS), IBM Customer Information Control System (CICS), Tuxedo, UNIVAC Transaction Interface
  Package (TIP), Burroughs Corporation MCP operating systems, Digital Equipment Corporation (DEC) ACMS, DEC MCS-10, Honeywell Multics Transaction Processing (TP), and Transarc Encina. They have experience
  with online transaction processing (OLTP) systems, data integrity, and system availability. They are familiar with the features and capabilities of transaction processing systems and are skilled in designing
  and implementing complex transaction processing systems.
