personas:
  professional: Nicole Gil is a seasoned construction specialist who expertly handles drywall and ceiling‑tile installations, blends hands‑on problem solving with strong crew communication, and they leverage
    their curiosity and practical mindset to pursue OSHA‑30 certification and green‑building credentials while mentoring other women in the trades.
  sports: Nicole Gil plays pickup soccer every Thursday at a local park, cheers for the LA Galaxy while never missing a weekend hike in the Santa Ana Mountains, and they occasionally join a community running
    group, embodying an energetic, sociable approach to fitness.
  arts: Nicole Gil is a salsa enthusiast who spends evenings dancing to the lively rhythms of Marc Anthony and Celia Cruz, and they volunteer to organize music workshops at the local cultural festival,
    while also enjoying performances by the downtown dance troupe, reflecting their outgoing and collaborative artistic spirit.
  travel: Nicole Gil prefers a balanced travel style that mixes weekend hikes in Sedona, occasional beach retreats in Maui, and culturally immersive trips to Costa Rica, and they meticulously plan itineraries
    to stay within a modest budget while coordinating with family responsibilities and saving toward future business ventures.
  culinary: Nicole Gil is an enthusiastic home chef who skillfully crafts pupusas with homemade masa and savory fillings, pairs them with fresh tomatillo salsa and plantain side dishes, experiments with
    spice blends, and they sometimes over‑season in the excitement of shared family meals.
  core: Nicole Gil blends hands‑on construction savvy with a vibrant social life, channeling curiosity and high emotional reactivity into community‑focused projects, salsa dancing, and a disciplined pursuit
    of greener building and personal growth, and they constantly seek balance between practicality and new ideas.
background:
  cultural: Nicole grew up in a close‑knit Salvadoran family that migrated to Southern California in the 1990s. Bilingual in Spanish and English, she maintains strong ties to the Salvadoran diaspora through
    church, family gatherings, and the annual cultural festival in Orange County. Her upbringing emphasized hard work, community support, and preserving traditions such as celebrating "La Fiesta de las
    Flores" and cooking pupusas together. These cultural values shape her collaborative spirit at work and her dedication to giving back to her community.
attributes:
  skills: '[''Drywall installation'', ''Ceiling tile installation'', ''Joint taping and finishing'', ''Measuring and layout'', ''Blueprint reading'', ''Material estimation'', ''Safety compliance (OSHA)'',
    ''Team coordination'', ''Customer communication'', ''Problem solving in construction'', ''Basic carpentry'', ''Power‑tool operation'']'
  hobbies: '[''Salsa dancing'', ''Pickup soccer'', ''Cooking Salvadoran cuisine'', ''Yoga and mindfulness meditation'', ''Volunteering at cultural festivals'', ''Hiking in Orange County'', ''Listening to
    DIY home‑improvement podcasts'', ''Community workshops'']'
  career_goals: Nicole aims to become a certified foreman within the next three years, earning OSHA 30‑hour certification and a green‑building credential to lead sustainable renovation projects. She dreams
    of launching her own small contracting firm that prioritizes hiring and mentoring other Latino women in the trades. In the longer term, she hopes to develop a community training program that blends
    technical construction skills with financial literacy, helping her neighborhood build both homes and economic stability.
