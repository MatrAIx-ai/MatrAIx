persona_description: A visionary American inventor, philanthropist, and industrialist who was associated with often folksy and endless platitudes, offering little or no sympathy for individuals, family
  members, business partners, and friends that did not share his mentality. He championed the average man and woman as the foundations that made America great and believed that its citizens were ready to
  accept change, pulling them in to become part of his vision. He was known to be cantankerous and he often proved to be an unsentimental business man, husband, and father. However, his love for the American
  heritage, tradition, and craft was always evident, and his inventions and production of the auto forever changed the America he professed to love even as he helped destroy it.
