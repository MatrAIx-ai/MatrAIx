persona_description: A social worker who has dedicated their career to identifying and addressing the root causes of toxic stress and trauma in children, particularly those who grow up in poverty. They
  have extensive knowledge and experience in working with families at risk of neglect and abuse, as well as in developing and implementing strategies to prevent and mitigate the long-term effects of toxic
  stress. They are committed to improving the health and well-being of children and families in their community, and to advocating for policies and practices that prioritize the needs of children and their
  families.
