personas:
  professional: Mary Sotus, a senior human resources leader with 25+ years of experience in talent acquisition, benefits administration, and workforce development, blends meticulous, data‑driven methods
    with an outgoing style; they champion inclusive policies while mentoring emerging HR talent.
  sports: Mary Sotus, an enthusiastic participant in her local co‑ed softball league and weekly Zumba classes, follows the Sacramento Kings for basketball, supports the San Francisco 49ers in football,
    and they hike the Sierra foothills year‑round to stay fit, combining team camaraderie with solo endurance training.
  arts: Mary Sotus, a devoted patron of the Fresno Philharmonic and regular attendee of community theater productions such as Arthur Miller's *The Crucible*, enjoys folk music from Gillian Welch, and they
    keep a wall of artwork by local muralist Michael Cree, weaving cultural appreciation into their social calendar.
  travel: Mary Sotus, an adventurous yet organized traveler, prefers meticulously planned road trips that blend vineyard tours in Napa, hiking in Yosemite National Park, and weekend stays at coastal cottages
    in Santa Barbara, and they always reserve a night to visit a family farm market en route for fresh produce.
  culinary: Mary Sotus, a confident home cook, spikes her Mediterranean‑inspired meals with farm‑fresh heirloom tomatoes, Kalamata olives, and locally sourced rosemary, often preparing dishes like grilled
    branzino with lemon‑garlic sauce and a slow‑roasted ratatouille, and they occasionally indulge in a decanter of Cabernet Sauvignon after a successful work project.
  core: Mary Sotus, a community‑driven HR veteran who balances meticulous planning with a love for Zumba, wine, and gardening, occasionally forgets to schedule their own dental check‑ups amid a bustling
    schedule, and they tend to overcommit to volunteer projects.
background:
  cultural: Mary Marie Sotus grew up in a middle‑class, Anglo‑American family in the Central Valley, where community and hard work are core values. Her upbringing combined traditional Midwestern sensibilities—emphasis
    on punctuality, self‑reliance, and education—with the diverse, agricultural culture of Fresno. She celebrates regional traditions such as the Fresno County Fair, enjoys farm‑fresh produce, and participates
    in local civic organizations. Though her ethnic background is White, she embraces the multicultural environment of California, reflecting a blend of classic American customs and the inclusive, collaborative
    spirit of the Central Valley.
attributes:
  skills: '[''Talent acquisition'', ''Employee onboarding'', ''Benefits administration'', ''HR compliance'', ''Performance management'', ''Conflict resolution'', ''HRIS management'', ''Data-driven workforce
