  hobbies: '[''Hiking'', ''Gardening'', ''Cooking'', ''Wine tasting'', ''Book club'', ''Community volunteering'', ''Traveling across California'', ''Zumba classes'', ''Local theater'', ''Softball league'',
    ''Neighborhood block parties'']'
  career_goals: Mary aims to advance to a senior HR leadership position, such as HR Director or Vice President of People Operations, within the next five years. She plans to earn her SHRM‑SCP certification
    to deepen her strategic expertise and to lead organization‑wide initiatives that enhance employee engagement, diversity and inclusion, and talent development. She also aspires to mentor emerging HR
    professionals, implement innovative, data‑informed HR practices, and eventually transition into a consultancy role where she can help small‑ to medium‑sized businesses in the Central Valley build robust,
    people‑first cultures.
