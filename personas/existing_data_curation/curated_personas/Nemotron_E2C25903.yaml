personas:
  professional: Jalen Coard is an aspiring graphic designer who combines Photoshop and Illustrator proficiency with rigorous organization and a competitive drive, channeling their love for strategy games
    into meticulous storyboard planning and bold visual concepts.
  sports: Jalen Coard loves street basketball at the neighborhood park, plays for the Walker Hoops Club, follows the Detroit Pistons, and prioritizes high‑intensity drills to stay sharp despite occasional
    late‑night gaming marathons.
  arts: Jalen Coard channels their love for jazz legends like Miles Davis, soulful voices such as Erykah Badu, and hip‑hop innovators like Kendrick Lamar into vibrant comic panels that echo the visual storytelling
    of Alex Ross, while sketching fan‑art during church improv nights.
  travel: Jalen Coard prefers spontaneous weekend road trips to nearby cities like Chicago for Comic‑Con events, but daydreams about a future solo pilgrimage to Tokyo’s Akihabara to soak up manga culture,
    balancing a limited teen budget with meticulous planning of cheap flights and hostel stays.
  culinary: Jalen Coard loves crafting late‑night noodle bowls topped with miso broth, pak choi, and a splash of sriracha, while their go‑to comfort dish remains a loaded pepperoni pizza, reflecting a moderate
    kitchen skill set that favors quick, bold flavors over elaborate cooking.
  core: Jalen Coard is a competitive teen artist who obsesses over perfect line weight in comics, hoards sketchbooks, and sometimes binges League of Legends through the night, sacrificing sleep for creative
    inspiration.
background:
  cultural: Jalen is a Black teenager raised in Walker, a small town in Livingston Parish, Louisiana. His family is deeply rooted in Southern African‑American traditions, with a strong emphasis on community,
    church life, and family gatherings. He grew up attending a historically Black Baptist congregation, where gospel music, storytelling, and communal service shaped his values. The local culture—marked
    by Creole culinary influences, Mardi Gras celebrations, and the rhythms of zydeco and jazz—has informed his artistic sensibilities. While he navigates the challenges of limited formal schooling, Jalen
    draws strength from a close‑knit extended family network and a community that values resilience, pride, and creative expression.
