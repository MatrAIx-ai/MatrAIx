  hobbies: '[''sketching comic strips'', ''competitive video gaming'', ''basketball'', ''improvisational theater'', ''listening to jazz and hip hop'', ''reading speculative fiction'', ''digital music production'',
    ''volunteering at church youth group'', ''creating memes and short videos'']'
  career_goals: Jalen aims to complete his GED and enroll in a community college program for graphic design or digital media, where he can build a professional portfolio. He plans to secure an internship
    at a regional advertising or multimedia studio to gain real‑world experience. Long‑term, he aspires to become a creative director or independent visual artist, launching his own studio that blends cutting‑edge
    technology with community storytelling. He also hopes to mentor younger teens in Walker by establishing a youth arts mentorship program that combines his love for art, organization, and leadership.
