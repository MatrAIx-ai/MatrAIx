personas:
  professional: Donald Wilson, a 24‑year‑old industrial maintenance mechanic, they combine a deep mechanical expertise in hydraulic, pneumatic and welding systems with an obsessive adherence to routine
    and precise CMMS documentation, positioning themselves as the go‑to lead mechanic and mentor while pursuing CMRP and Journeyman welder certifications.
  sports: Donald Wilson maintains a solitary fitness regime focused on power‑lifting three times a week at the neighborhood gym, they also join a small weekend fishing club on Lake Willow, and they ardently
    follow the River City Raptors minor‑league baseball team, tracking game statistics with the same meticulousness as their model‑train layouts.
  arts: Donald Wilson balances their precise hobbies with a quiet appreciation for classic rock icons like Eric Clapton, the sweeping scores of Hans Zimmer, and the stark black‑and‑white photographs of
    Ansel Adams, they often listen to these while polishing restored car chrome or sketching scenery for their model‑train projects.
  travel: Donald Wilson plans trips like checklists, they have already visited the Mercedes‑Benz Museum in Stuttgart and the National Railway Museum in York, and they are saving for a disciplined journey
    through Hokkaido’s historic rail lines in Japan, preferring budget hostels and detailed itineraries over spontaneous getaways.
  culinary: Donald Wilson’s culinary pursuits revolve around mastering classic American barbecue, they slow‑cook a beef brisket spiced with smoked paprika, brown sugar, and garlic in a backyard smoker,
    serve it with corn‑on‑the‑cob slathered in butter and a lime‑infused BBQ sauce, and their occasional precise chicken‑fried steak showcases their love for exacting recipes.
  core: Donald Wilson is a disciplined, routine‑driven mechanic whose meticulous mind translates into methodical hobbies, careful finances, and an ambitious drive toward professional mastery, and they quietly
    navigate social solitude while staying focused on their goals.
background:
  cultural: Donald grew up in Birmingham, Alabama, within a working‑class, Southern white family that values hard work, community, and tradition. His upbringing was shaped by the region’s industrial heritage,
    local church involvement, and the customs of Southern hospitality. He celebrates regional traditions such as backyard barbecues, high school football games, and seasonal festivals, while maintaining
    a respect for the historic narratives of the area. The cultural emphasis on self‑reliance and practical skills reinforced his preference for routine, discipline, and hands‑on problem solving. Though
    he embraces modern technology, his worldview remains grounded in the conventional, family‑oriented values typical of his community.
attributes:
  skills: '["Industrial machinery troubleshooting", "Hydraulic and pneumatic system repair", "Refractory furnace maintenance", "Welding (MIG, TIG, stick)", "Blueprint and schematic interpretation", "Preventive
    maintenance scheduling (CMMS)", "Safety compliance (OSHA, EPA)", "Metal fabrication and machining", "Diagnostic testing (vibration analysis, thermography)", "Team training and mentorship"]'
  hobbies: '["Classic car restoration", "Model train building", "Fishing", "Technical simulation gaming", "Church maintenance volunteering"]'
  career_goals: Donald aims to earn advanced certifications such as the Certified Maintenance & Reliability Professional (CMRP) and a Journeyman Welder designation within the next two years. In the short
    term, he seeks to become the lead mechanic on his shift, overseeing daily maintenance plans and mentoring new hires. Long‑term, he envisions advancing to a plant maintenance supervisor role, where he
    can design systematic reliability programs and improve operational efficiency. He also expresses interest in pursuing an associate degree in Industrial Maintenance Technology part‑time to broaden his
    engineering knowledge while staying grounded in the practical, hands‑on work he values.
