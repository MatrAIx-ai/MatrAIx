  career_goals: Daysi dreams of becoming a veterinarian because she loves caring for animals, and she also imagines herself as an artist who paints murals that tell stories from her Mexican heritage. She
    is fascinated by space and sometimes says she wants to be an astronaut who can draw the planets she visits. These ambitions reflect her curiosity about the natural world, her appreciation for art, and
    her desire to help others.
