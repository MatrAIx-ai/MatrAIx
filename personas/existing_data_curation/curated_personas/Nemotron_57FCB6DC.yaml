personas:
  professional: Daysi Varela is a budding junior explorer who combines curiosity, organized creativity, and emerging coding skills to turn playground observations into imaginative drawings, Lego structures,
    and simple Scratch animations.
  sports: Daysi Varela thrives on the soccer field with the Little Kickers youth club, emulating the teamwork of the U.S. Women’s National Team while also cheering for the local MLS side LA Galaxy, and
    balances energetic weekend drills with occasional quiet bike rides along the park trail.
  arts: Daysi Varela pours imagination into vibrant sketches of flamingos and desert scenes, drawing inspiration from the bold colors of Mary Blair, the playful lines of Eric Carle, and the whimsical storytelling
    of Beatrix Potter, while also experimenting with Scratch animations that bring their drawings to life.
  travel: Daysi Varela loves family hikes on nearby pine‑covered trails, has collected rocks from the Grand Canyon, dreams of exploring the Sahara desert’s dunes and the bright streets of Barcelona, and
    plans trips that blend adventure with the safety of familiar surroundings, always with a sketchbook in hand.
  culinary: Daysi Varela adores crafting homemade cheese quesadillas with melted cheddar, topping them with fresh avocado slices and a squeeze of lime, enjoys snacking on colorful fruit salads featuring
    mango, blueberries, and kiwi, and delights in early attempts at mixing rainbow‑colored pasta with tomato sauce and basil.
  core: Daysi Varela is a curious, organized seven‑year‑old who merges art, science, and soccer into a lively, slightly messy, yet disciplined world of imagination.
background:
  cultural: Daysi’s family is of Mexican descent, and they preserve many cultural traditions while living in American Fork, Utah. At home, Spanish is spoken daily alongside English, and the family celebrates
    Mexican holidays such as Día de los Muertos and Cinco de Mayo with altars, traditional foods like tamales and pozole, and music. She learns Mexican folk dances and songs from her grandparents, and her
    mother often cooks dishes that remind her of their heritage. Living in Utah, Daysi also participates in community events typical of the area, like hiking trips in the Wasatch Mountains and school activities
    that reflect a blend of American and Mexican cultures. This bicultural environment enriches her worldview, fostering an appreciation for both her Mexican roots and the natural landscape of her Utah
    surroundings.
