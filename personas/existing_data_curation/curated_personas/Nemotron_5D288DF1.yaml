  hobbies: '["Hosting dinner parties","Volunteer work at local food banks","Weekly cooking workshops","Hiking in the San Gabriel Mountains","Yoga and mindfulness practice","Competitive board game nights","Trivia
    contests","Herb and vegetable gardening","Reading leadership and self‑improvement books"]'
  career_goals: Christina aims to advance to a regional director of operations within a multi‑unit restaurant chain, where she can apply her systematic approach to improve efficiency across locations. She
    is also considering opening her own boutique café that blends classic American comfort food with a data‑driven operational model. Over the next five years she plans to obtain a ServSafe certification
    and complete an executive leadership program, positioning herself for higher‑level strategic roles. Her ultimate ambition is to be recognized as a leader in sustainable and profitable food service management
    while maintaining a stable, well‑structured work environment.
