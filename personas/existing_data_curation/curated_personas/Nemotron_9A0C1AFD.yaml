personas:
  professional: Jadis Aponte is an aspiring bilingual outreach coordinator who channels their knack for quick digital tool adoption and spontaneous storytelling into creating community‑focused social‑media
    campaigns, while battling a tendency to miss deadlines due to their flexible, curiosity‑driven approach.
  sports: Jadis Aponte enjoys early‑morning beach runs and occasional beach‑volleyball matches with the local North Port youth club, roots for the Tampa Bay Buccaneers and the Miami Heat, and streams Inter
    Miami games while preferring low‑impact workouts over organized school sports.
  arts: Jadis Aponte spends evenings drawing comic panels inspired by the kinetic style of Jillian Tamaki while perfecting salsa steps to Celia Cruz and reggaeton beats from J Balvin, and they binge‑watch
    anime from Studio Ghibli to fuel their storytelling imagination.
  travel: Jadis Aponte has explored the historic streets of Cartagena during a family vacation, taken day‑trips to Key West, and dreams of snorkeling in the Galápagos and hiking the Redwood forests, favoring
    spontaneous road trips over meticulously planned itineraries but occasionally constrained by school schedules.
  culinary: Jadis Aponte loves experimenting in the kitchen, turning classic arepas into cheesy‑pumpkin variations with cornmeal and mozzarella, frying sweet plantain‑filled empanadas on weekends, and pairing
    them with a splash of lime‑infused ají, while still mastering the perfect buñuelo dough under their grandmother’s watchful eyes.
  core: Jadis Aponte is a 16‑year‑old curiosity‑driven teen who blends spontaneous digital storytelling with heartfelt community care, juggling anxiety‑filled worries, deadline‑dodging habits, and a love
    for music, art, and the ocean.
background:
  cultural: Jadis grew up in a Colombian household in North Port, Florida, where Spanish is spoken daily and family traditions from Colombia are celebrated. Her family observes holidays such as Día de la
    Independencia, Semana Santa, and Christmas with traditional foods like tamales, buñuelos, and almojábanas. She participates in local Colombian cultural events organized by community groups in Sarasota
    County, maintaining strong ties to her heritage while also navigating typical American teenage life. This bicultural experience informs her values, her taste in music, and her desire to bridge both
    worlds in future endeavors.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic photo and video editing (mobile apps)'', ''DIY crafts and upcycling'', ''Improvisational problem solving'', ''Basic cooking of Colombian
    dishes'', ''Peer support and active listening'', ''Social media content creation'']'
  hobbies: '[''Listening to and dancing to Colombian music (cumbia, reggaeton, salsa)'', ''Sketching and digital art'', ''Playing video games (Fortnite, Minecraft)'', ''Beachcombing and nature walks'',
    ''Cooking and experimenting with Colombian recipes'', ''Creating and editing short videos for social media'', ''Reading graphic novels and manga'']'
  career_goals: Jadis dreams of turning her love for language and community into a career as a bilingual outreach coordinator or youth mentor for Latinx families in South Florida. She hopes to study communications
    or social work, later designing culturally‑responsive programs that blend technology and tradition. At the same time, she entertains the possibility of becoming a digital content creator who highlights
    Colombian heritage, using her knack for spontaneous storytelling while learning to manage projects more systematically.
