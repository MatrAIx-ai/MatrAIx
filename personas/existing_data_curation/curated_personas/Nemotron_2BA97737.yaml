personas:
  professional: Anthony Figueroa blends a systems architecture mindset with a creative flair, leading cross‑functional Agile teams to translate abstract business needs into robust AWS‑based data pipelines,
    while using their design‑thinking and data‑visualization prowess to craft user‑friendly interfaces that delight stakeholders.
  sports: Anthony Figueroa is an avid weekend cyclist with the Twin Cities Cycling Club, a casual kayaker at the Lake Minnetonka Kayak Club, a faithful supporter of the Minnesota Vikings and Timberwolves,
    and they schedule weekly trail hikes to stay fit while occasionally joining pick‑up basketball games at the local community center.
  arts: Anthony Figueroa immerses themselves in contemporary art at the Walker Art Center, drawing inspiration from artists like Julie Mehretu and Mark Rothko, strums acoustic renditions of Joni Mitchell
    and Nick Drake in a jam group, and hones improv skills at the Brave New Workshop, all of which fuel their penchant for novel, collaborative creativity.
  travel: Anthony Figueroa favors spontaneous weekend getaways to nearby gems like Mackinac Island and the Boundary Waters, while also planning annual trips to design‑forward cities such as Copenhagen and
    Kyoto, balancing a modest travel budget with a desire to experience diverse cultures through art, food, and outdoor adventure.
  culinary: Anthony Figueroa enjoys exploring the Twin Cities’ craft brewery scene, savoring dishes like smoked brisket with beet‑root slaw, homemade sourdough pizza topped with wild mushroom medley, and
    they experiment in the kitchen with Python‑controlled sous‑vide recipes, though they often over‑indulge in pint‑sized IPA flights.
  core: Anthony Figueroa is a relentlessly curious systems architect who balances a love for abstract art and technology with a habit of over‑committing to side projects and a tendency to binge‑watch improv
    specials late into the night.
background:
  cultural: Born and raised in the Upper Midwest, Anthony embodies the region's blend of practicality and community spirit. Growing up in a suburban setting in Wisconsin, he was exposed to a strong emphasis
    on education, civic involvement, and an appreciation for the outdoors that characterizes the Midwestern ethos. Living in Minneapolis has deepened his connection to a vibrant cultural scene, where he
    regularly engages with the city's art galleries, music venues, and tech meetups. This background fosters a balanced perspective that values both collaborative teamwork and individual creativity, shaping
    his professional approach and personal interests.
