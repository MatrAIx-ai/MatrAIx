  career_goals: Anthony aims to become a senior systems architect and eventually a technology leader who drives innovative digital transformation initiatives within a forward‑thinking organization. He envisions
    leading multidisciplinary teams that blend cutting‑edge technology with creative problem‑solving, championing the adoption of AI‑powered analytics and generative design. In the long term, he hopes to
    launch his own consultancy focused on helping midsize companies harness emerging tech while maintaining a healthy work‑life balance for himself and his family. He also aspires to mentor junior analysts
    and contribute to the Minneapolis tech community through speaking engagements and open‑source projects.
