  career_goals: Juwanna aims to re-enter the professional sphere within the next two years by securing a full-time administrative position in a municipal office or a local nonprofit where her organizational
    talents can be leveraged. Her long-term ambition is to become a senior office manager overseeing a team, ensuring smooth operations and high standards of efficiency. She is also exploring the possibility
    of launching a home-based consulting service that helps small businesses streamline their bookkeeping and workflow processes, allowing her to work within a structured routine while maintaining a competitive
    edge in the market.
