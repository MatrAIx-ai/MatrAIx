  career_goals: Kortney aims to translate her academic knowledge into a full‑time role as a business analyst or project coordinator within the Birmingham metropolitan area. In the next two years she plans
    to earn a certification in data analytics and to lead a small cross‑functional project that will sharpen her leadership and analytical skills. Her longer‑term ambition is to progress into a managerial
    position overseeing strategic initiatives that blend profitability with community impact, and eventually to launch a boutique lifestyle brand that leverages her marketing insight and commitment to sustainable
    practices. Throughout her career she intends to maintain a structured schedule and use stress‑management techniques to balance ambition with personal wellbeing.
