personas:
  professional: Kortney Royer leverages a methodical blend of financial accounting, market research, and data visualization skills to craft clear business analyses, while their sociable yet assertive demeanor
    fuels collaborative project coordination at a regional retail chain, balancing curiosity for new analytical tools with a disciplined, deadline‑driven workflow.
  sports: Kortney Royer thrives on group fitness, regularly attending Zumba and hip‑hop dance classes, cheering for the Alabama Crimson Tide at college football tailgates, supporting the Birmingham Legion
    FC when possible, and joining a local hiking club that explores the trails of Oak Mountain State Park each weekend.
  arts: Kortney Royer enjoys attending downtown Birmingham concerts featuring Leon Bridges and local jazz ensembles, reads business best‑sellers like Atomic Habits and self‑development podcasts, and occasionally
    tries spoken‑word journaling, blending analytical insight with creative expression.
  travel: Kortney Royer favors meticulously planned weekend road trips, having explored Nashville’s music scene, savored New Orleans’ Creole cuisine, and hiked the Blue Ridge Parkway to Asheville, while
    dreaming of a future cultural immersion in Kyoto to study sustainable culinary practices, always using TripIt to balance itinerary logistics with spontaneous detours.
  culinary: Kortney Royer delights in cooking Southern‑inspired comfort dishes such as fried catfish with hushpuppies, collard greens seasoned with smoked paprika, and peach cobbler, often sourcing locally
    grown heirloom tomatoes and fresh herbs to host lively dinner gatherings that showcase their hospitality and creative flair.
  core: Kortney Royer is a meticulously organized yet socially energetic 22‑year‑old who channels anxiety‑fuelled worry into structured career goals, community‑focused volunteering, and a passion for Southern
    cooking and group fitness.
background:
  cultural: Kortney’s cultural background is rooted in the Southern United States, specifically Birmingham, Alabama. Raised in a middle‑class, primarily white family, she was exposed to the region’s emphasis
    on hospitality, close‑knit community ties, and a strong work ethic. Family traditions often centered around shared meals, church gatherings, and local sporting events, especially college football. While
    she respects these conventions, her university experience introduced her to a broader, more contemporary outlook that values diversity, continuous learning, and civic engagement. This blend of traditional
    Southern values and modern professional ambition shapes her worldview and interpersonal style.
