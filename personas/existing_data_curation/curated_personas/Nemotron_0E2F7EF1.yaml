personas:
  professional: Eric Gonzalezdorta, an aspiring community arts coordinator, leverages self‑taught Photoshop and Illustrator skills, bilingual communication, and a knack for conflict mediation to design
    vibrant event branding while fostering inclusive youth workshops, reflecting their curious, organized yet flexible, compassionate nature.
  sports: Eric Gonzalezdorta, a dedicated street‑ball player, competes in the Moline neighborhood basketball league, cheers for the nearby Quad Cities River Bandits and the Iowa Wolves, and decompresses
    on weekends hiking the Mississippi River trails near Portage, blending competitive spirit with a love for outdoor reflection.
  arts: Eric Gonzalezdorta, an emerging visual storyteller, spends free hours sketching downtown Moline streets with watercolor, curating digital illustrations of local murals inspired by the raw energy
    of Banksy and the surreal palettes of Alex Ross, while listening to indie rock bands like Tame Impala, ambient composer Brian Eno, and traditional folk rhythms that accompany their graphic‑novel binge
    of Saga and Monstress.
  travel: Eric Gonzalezdorta’s travel style mixes purposeful weekend road trips to cultural hubs such as Chicago’s Pilsen neighborhood and the historic streets of Iowa City, where they photograph street
    art and sample local cuisine, with a dream of backpacking through the valleys of Oaxaca one day, all planned on a modest budget that favors hostels, public transit, and free community events.
  culinary: Eric Gonzalezdorta, a novice home chef, enjoys mastering traditional dishes like tamales wrapped in corn husks, simmering pozole with hominy and chile guajillo, and preparing chiles en nogada
    topped with pomegranate seeds, while experimenting with fresh ingredients such as poblano peppers, masa harina, and epazote, showcasing an intermediate cooking skill level fueled by cultural curiosity
    and a love for communal meals.
  core: Eric Gonzalezdorta blends artistic curiosity, community compassion, and youthful energy into a purpose‑driven life, juggling sketchbooks, basketball, and big‑picture dreams while occasionally splurging
    on tech gadgets and forgetting to floss.
background:
  cultural: Eric was raised in a Mexican‑American household in Moline, where Spanish was spoken at home and family gatherings centered around food, music, and cultural holidays. His parents emigrated from
    the state of Jalisco, and they maintain close ties to Mexican traditions such as Día de los Muertos, quinceañeras, and weekly tamale nights. Growing up in a predominantly Midwestern environment, Eric
    also absorbed local customs—football, community picnics, and a strong work ethic—while navigating a bicultural identity. He participates in the local Hispanic Community Center, helping organize cultural
    festivals that blend Mexican folklore with Midwestern sensibilities. This dual heritage informs his artistic style, which often mixes bright Mexican motifs with gritty urban themes.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Bilingual communication (Spanish/English)'', ''Video editing (DaVinci Resolve)'', ''Community outreach coordination'', ''Active listening
    and conflict mediation'', ''Group facilitation and peer tutoring'', ''Basic carpentry'', ''Microsoft Office and Google Workspace proficiency'']'
  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration and graphic design projects'', ''Photography of urban murals'', ''Listening to diverse music (Mexican folk, indie rock)'', ''Cooking
    traditional Mexican meals'', ''Volunteering as a youth mentor'', ''Playing basketball in a community league'', ''Reading graphic novels and sci‑fi books'', ''Hiking along the Mississippi River trail'']'
  career_goals: Eric plans to earn his GED within the next year and then enroll in the local community college’s associate‑degree program in Graphic Design while taking electives in Social Work. He wants
    to combine his artistic talents with his desire to serve his community, aiming to become a community arts coordinator for a non‑profit that offers art‑therapy workshops to at‑risk youth. In the long
    term, he hopes to launch his own socially‑focused design studio that provides branding and promotional materials for local Hispanic businesses and cultural events. He is also interested in obtaining
    certification as a Certified Peer Mentor to support peers in high‑school graduation programs.
