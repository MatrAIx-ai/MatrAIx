  career_goals: David aims to progress into a supervisory role on the casino floor, eventually becoming a floor manager responsible for overseeing all gaming operations and ensuring regulatory compliance.
    Over the next five years, he plans to obtain a certification in Gaming Management and possibly pursue a master's degree in Business Administration to broaden his strategic management capabilities. His
    long‑term ambition is to transition into a corporate compliance or risk‑assessment role within a major casino operator, where he can shape policy and training programs that promote responsible gambling
    and operational excellence. He also envisions mentoring junior staff and contributing to industry best practices.
