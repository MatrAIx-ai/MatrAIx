personas:
  professional: June Haughton, a retired community volunteer with a knack for organizing arts events, is channeling their methodical nature and art‑history knowledge into becoming a certified docent at
    the Nasher Museum of Art, where they also mentor younger volunteers and sketch plans for a traveling exhibition of local artists.
  sports: June Haughton enjoys low‑impact activities like brisk morning walks with the Durham Senior Fitness Club, follows the Durham Bulls during baseball season, cheers on the Carolina Hurricanes in winter,
    and participates in a community garden‑themed yoga class every spring, emphasizing consistency over competition.
  arts: June Haughton spends afternoons painting watercolors of local riverbanks inspired by Monet, frequents the Durham Performing Arts Center for productions such as 'The Glass Menagerie', curates small
    group discussions on Georgia O'Keeffe’s work, and fills their living room with recordings of folk singer Gillian Welch, letting the arts shape their social gatherings and sense of purpose.
  travel: June Haughton prefers meticulously planned weekend getaways to historic Southern towns like Charleston, Savannah, and Colonial Williamsburg—often squeezing a museum visit into the itinerary—while
    saving a modest ad‑hoc budget for an annual pilgrimage to the British Museum in London, where they savor both landmark tours and quiet moments in the reading rooms.
  culinary: June Haughton, an adept home cook, often prepares Southern classics like shrimp and grits with fresh garden tomatoes and collard greens seasoned with smoked paprika, bakes peach cobbler using
    heirloom peaches from a local farmer’s market, and enjoys experimenting with herb‑infused vinaigrettes for their garden salads.
  core: June Haughton blends a lifelong curiosity for art and genealogy with a disciplined planner’s mind, hoarding postcards as treasured relics while never missing a Sunday garden watering, embodying
    gentle ambition and nostalgic precision.
background:
  cultural: June was raised in a middle‑class white Southern family in the Research Triangle area, with deep ties to the local community and its traditions. She grew up attending church services, community
    picnics, and school events that emphasized cooperation and service. Her upbringing fostered an appreciation for Southern hospitality, respect for historical preservation, and an openness to the diverse
    cultural expressions found in Durham’s growing arts and academic scene. These influences shape her inclusive approach to community involvement and her lifelong enthusiasm for learning about varied artistic
    and cultural perspectives.
attributes:
  skills: '["Event planning and coordination","Basic art history and curation","Volunteer management and scheduling","Budgeting and record‑keeping","Senior‑friendly technology usage","Culinary arts (baking
