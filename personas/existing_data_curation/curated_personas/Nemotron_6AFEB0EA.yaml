  hobbies: '["Visiting art galleries and museums","Attending theater and live music events","Watercolor painting","Gardening (vegetable and flower)","Reading historical fiction","Book club participation","Knitting
    and handcrafted gifts","Genealogy research","Historic site travel"]'
  career_goals: Although retired from formal employment, June aims to become a certified docent at the Nasher Museum of Art, offering guided tours that blend her love of art with her organizational talents.
    She also aspires to mentor younger volunteers in community arts programs, develop a small traveling exhibition of local artists' work, and eventually compile a memoir that weaves together her lifelong
    curiosity about culture, art, and family history.
