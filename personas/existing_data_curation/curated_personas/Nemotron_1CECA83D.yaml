personas:
  professional: Jason Conaway, a seasoned visual and user experience designer with over two decades of practice, leverages their methodical project planning and a balance of curiosity and practicality to
    craft cohesive brand identities and intuitive interfaces, while they assertively guide multidisciplinary teams toward sustainable, community‑focused outcomes.
  sports: Jason Conaway pursues trail running and weekend hikes through the Rockies, hits the slopes at Aspen Snowmass each winter, belongs to the Denver Trail Running Club and the Colorado Mountain Club,
    and they cheer the Colorado Avalanche and Denver Broncos while maintaining a disciplined fitness routine that blends cardio with seasonal strength training.
  arts: Jason Conaway spends evenings strumming acoustic renditions of John Denver and Sufjan Stevens on their guitar, captures Colorado sunsets in the style of Ansel Adams with their DSLR, volunteers at
    community mural projects inspired by Shepard Fairey’s vibrant street art, and they regularly attend the Boulder Arts Festival to see performances by local folk bands and exhibitions featuring contemporary
    painter James Turrell.
  travel: Jason Conaway plans each getaway with the precision of a design brief, alternating between weekend escapades to Colorado’s Rocky Mountain National Park and longer trips to historic European sites
    like Edinburgh Castle and the Tuscan countryside, favoring a mix of adventure hiking and relaxed wine‑tasting that fits within a modest travel budget balanced against their upcoming boutique consultancy
    launch, and they always return home with a fresh batch of photographs and design inspiration.
  culinary: Jason Conaway, an enthusiastic home gardener and craft‑brew hobbyist, regularly cooks farm‑to‑table meals like roasted beet and goat cheese salad with fresh rosemary, pan‑seared trout topped
    with lemon‑thyme butter, and hearty mushroom risotto while experimenting with brewing a seasonal IPA using Cascade and Amarillo hops, and they enjoy occasional dining at farm‑focused restaurants such
    as The Farmhouse at Boulder’s Table.
  core: Jason Conaway blends a disciplined design mindset with rugged mountain pursuits, often swapping a perfectly organized project timeline for an impromptu sunrise hike, and despite a habit of procrastinating
    on filing taxes, they never miss a chance to capture a perfect sunset photo.
background:
  cultural: Jason grew up in a suburban Midwestern setting where practicality, a strong work ethic, and community values were emphasized. His bachelor’s degree in the humanities deepened his appreciation
    for European art, literature, and philosophy, influences he weaves into his design storytelling. Relocating to Loveland, Colorado, he embraced the region’s outdoor lifestyle and progressive, environmentally
    conscious culture, blending his mainstream American upbringing with the collaborative, nature‑focused ethos of the Rocky Mountain community.
