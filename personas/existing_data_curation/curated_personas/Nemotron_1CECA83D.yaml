    at Community Art Programs'', ''Gardening'', ''Homebrewing Craft Beer'']'
  career_goals: Jason aims to transition into a Creative Director role within the next five years, leading multidisciplinary design teams and shaping strategic brand experiences. He aspires to launch a
    boutique design consultancy that emphasizes sustainable, community-focused projects for public spaces in Colorado. Additionally, he plans to mentor emerging designers, develop a design-thinking workshop
    series for local nonprofits, and author a book that blends his humanities background with practical design methodology.
