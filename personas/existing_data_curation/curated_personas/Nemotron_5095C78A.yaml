personas:
  professional: Kashaad Rosalle, a budding builder who arranges Lego bricks in precise rows, loves following step‑by‑step instructions, and naturally takes charge of group play while staying reliable and
    organized.
  sports: Kashaad Rosalle, an energetic member of the Little Tigers soccer team who dribbles the ball after school, proudly wears the team jersey, and cheers for the New York Yankees while hopping on the
    playground.
  arts: Kashaad Rosalle, an enthusiastic fan of Sesame Street songs and Pixar movies, spends afternoons drawing Paw Patrol heroes with bright crayons, and eagerly mimics dance moves from Disney’s Frozen.
  travel: Kashaad Rosalle, an adventurous preschooler whose favorite trips include weekend visits to the local children’s museum, a family vacation to Disney World in Florida, and a summertime beach day
    at Clearwater, preferring outings that include a scheduled snack break.
  culinary: Kashaad Rosalle, a budding chef who loves making peanut butter and jelly sandwiches, mixing banana slices into oatmeal, and proudly eats pepperoni pizza topped with extra cheese, often insisting
    on sprinkling cinnamon sugar on their toast.
  core: Kashaad Rosalle, a vivacious five‑year‑old who thrives on orderly play, bursts of group energy, and occasional sticky‑fingered snack raids.
background:
  cultural: Kashaad comes from an African‑American family rooted in Dayton’s vibrant Black community. His parents celebrate cultural traditions such as Kwanzaa, Juneteenth, and family gatherings that feature
    soul food, storytelling, and gospel music. He attends a local church where he participates in choir and community service projects, fostering a sense of belonging and collective responsibility. Exposure
    to Dayton’s historic ties to the Wright brothers and local African‑American heritage sites fuels his curiosity about aviation and history.
