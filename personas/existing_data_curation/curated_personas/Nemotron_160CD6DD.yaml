    Service'', ''Event Planning for Community Activities'']'
  hobbies: '[''Reading (historical fiction, urban development non‑fiction)'', ''Hiking local nature trails'', ''Gardening (native plants)'', ''Architectural photography'', ''Cooking (soul‑food with healthy
    adaptations)'', ''Listening to real‑estate and sustainability podcasts'', ''Yoga and meditation'']'
  career_goals: Tia aims to complete her bachelor's degree in real‑estate management within the next three years and obtain professional certifications such as the Certified Property Manager (CPM) and Community
    Association Manager (CAM). She aspires to transition from managing a single community to overseeing a portfolio of mixed‑use properties, with a focus on integrating sustainable practices and affordable
    housing initiatives in Charles County. Long‑term, she envisions starting her own boutique property‑management firm that offers personalized, tech‑enhanced services while fostering tight‑knit, harmonious
    neighborhoods.
