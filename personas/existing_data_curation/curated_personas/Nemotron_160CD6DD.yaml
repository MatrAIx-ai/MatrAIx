personas:
  professional: A diligent property and community association manager named Tia Willis leverages their curiosity for sustainability and a systematic, systems‑oriented mindset to handle lease administration,
    budgeting, and resident relations, while quietly resolving conflicts and constantly testing new property‑management tools like AppFolio and Buildium.
  sports: A low‑key fitness enthusiast named Tia Willis follows the Washington Commanders, Washington Capitals, and DC United, participates in the Charles County Hiking Club’s weekend treks, practices yoga
    at a quiet studio three times weekly, and prefers solitary jogging on the Patuxent River Trail over crowded gym sessions.
  arts: A reflective visual storyteller named Tia Willis captures modernist architecture through a DSLR, drawing inspiration from photographers like Julius Shulman and architects such as Louis Kahn, while
    unwinding to the soulful jazz of Norah Jones and reading works by author Chimamanda Ngozi Adichie.
  travel: A solitary explorer named Tia Willis prefers loosely planned trips, has hiked the historic St. Mary's River State Park, spent a weekend strolling the cobblestone streets of Savannah, Georgia,
    and dreams of a quiet sunrise pilgrimage to Kyoto’s Arashiyama bamboo grove, always budgeting travel through a spreadsheet to keep expenses low.
  culinary: A creative home cook named Tia Willis blends traditional soul‑food flavors with healthier twists, serving dishes like collard greens sautéed with olive oil and smoked turkey, sweet‑potato‑infused
    cornbread, and a quinoa‑based jambalaya seasoned with smoked paprika and thyme, while experimenting with seasonal native herbs from her garden.
  core: An introverted property manager named Tia Willis merges a curiosity for sustainable living with a relaxed, sometimes messy, approach to obligations, preferring solitude, yoga, solo hikes, and quiet
    evenings editing architectural photographs.
background:
  cultural: Tia identifies as African American and grew up in a close‑knit Black community in the Washington, D.C. metropolitan area. Her family places a strong emphasis on mutual support, resilience, and
    community service, values reinforced by regular involvement in a historically Black church. She carries the cultural richness of Black music, cuisine, and storytelling into her daily life, often sharing
    soulful recipes and celebrating cultural holidays with family and neighbors. This heritage shapes her compassionate approach to property management, where she strives to create inclusive, respectful
    environments that reflect the collective well‑being of the residents she serves.
