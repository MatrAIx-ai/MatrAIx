personas:
  professional: Avik Kennard, a retired municipal electrical engineer turned community STEM mentor, blends decades of electrical system design, GIS mapping, and project management with a methodical, competition‑driven
    mindset; they lead structured workshops, guide youth robotics teams, and are drafting a memoir that chronicles their engineering legacy.
  sports: Avik Kennard, a competitive senior bowler and regular participant in the SilverSneakers fitness program, follows the Arizona Diamondbacks, Phoenix Suns, and Arizona Cardinals with loyal enthusiasm;
    they schedule weekly bowling league nights at the senior center, apply their analytical eye to lane patterns like a strategist, and dabble in spring pickleball matches to keep their reflexes sharp.
  arts: Avik Kennard, an avid patron of classic cinema and timeless music, frequently attends the Arizona Shakespeare Festival and enjoys the films of Alfred Hitchcock and the songs of Frank Sinatra, Ella Fitzgerald,
    and The Beatles, while they channel their craftsmanship into building ornamental wooden furniture inspired by Mid‑Century Modern design, finding artistic solace in the tactile rhythm of carpentry.
  travel: Avik Kennard, an organized explorer of the Southwest, has hiked the rim of the Grand Canyon, wandered the saguaro‑filled trails of Saguaro National Park, and visited the historic streets of Sedona,
    while their bucket list includes a pilgrimage to the ancient ruins of Machu Picchu, the historic citadel of Carcassonne, and a river cruise through the Norwegian fjords; they plan each trip with meticulous
    spreadsheets, book senior‑discount fares, and balance wanderlust with knee‑friendly itineraries.
  culinary: Avik Kennard, a proficient yet modest home cook, delights in preparing southwestern staples such as green chile enchiladas, homemade carne adobada, and roasted cactus paddles, while also mastering
    classic comfort foods like chicken pot pie and peach crumble; they often season dishes with cumin, smoked paprika, and fresh cilantro, and despite their precise woodworking projects, they occasionally
    improvise in the kitchen, leading to occasional over‑salting that they humorously chalk up to ‘engineer’s miscalculations.’
  core: Avik Kennard is a methodical, socially vibrant 77‑year‑old engineer‑turned‑mentor whose disciplined routines, competitive bowling streak, and occasional coupon‑clipping obsession reflect how they
    blend active contribution, thoughtful stewardship, and a healthy dose of stubbornness into everyday life.
background:
  cultural: Raised in a Midwestern, working‑class family of Anglo‑American descent, Avik grew up during the Space Race and the social upheavals of the 1960s, shaping his pragmatic, self‑reliant outlook.
    He identifies as a Protestant Christian and regularly attends a local church in Peoria, where community service is emphasized. Relocating to Arizona for retirement, he has embraced the desert’s outdoor
    culture, enjoys regional traditions such as Fourth of July celebrations and Mexican‑influenced cuisine, and values the blend of traditional American work ethic with the diverse, neighborly spirit of
    his new home.
