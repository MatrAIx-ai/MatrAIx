  hobbies: '[''Bowling league'', ''Bridge'', ''Community gardening'', ''Woodworking'', ''Model train building'', ''Classic car restoration'', ''Senior fitness classes'', ''Robotics mentoring'', ''Reading
    historical non-fiction'', ''Stargazing'']'
  career_goals: Avik aims to stay physically active through regular fitness classes and weekly bowling, volunteer as a mentor for a local youth robotics club, share his engineering knowledge by leading
    community workshops, write and publish a memoir recounting his STEM career and life experiences, explore Arizona’s national parks and historic sites, learn modern programming languages such as Python,
    and support his grandchildren’s education and career aspirations.
