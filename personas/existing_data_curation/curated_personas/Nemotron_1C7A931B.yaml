  hobbies: '[''Hiking and trail walking'', ''Acoustic guitar playing'', ''Podcast listening (medical/true‑crime)'', ''Cooking (Southern fusion recipes)'', ''Volunteer work (community events)'', ''Video
    gaming'', ''Photography'', ''Improv comedy workshops'', ''Reading medical journals'']'
  career_goals: David aims to transition to a paramedic role within the next two years, complete his emergency medical services degree, and obtain certifications in advanced cardiac life support and prehospital
    trauma life support. He envisions moving into a supervisory or training position at his EMS agency, and ultimately pursuing a bachelor's degree in public health to launch a community health outreach
    program focused on emergency preparedness and mental health support for first responders in Gwinnett County.
