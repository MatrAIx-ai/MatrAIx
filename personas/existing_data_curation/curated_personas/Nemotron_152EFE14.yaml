  hobbies: '[''Fishing'', ''Woodworking'', ''Model train building'', ''Historical nonfiction reading'', ''Crossword puzzles'', ''Gardening'', ''Classic Western film watching'']'
  career_goals: Although retired, Tyler aims to deepen his woodworking craft by building a custom heirloom dining table for his grandchildren. He also wants to complete a community service project by restoring
    a historic fence at the local Methodist church, preserving a piece of local heritage. Another personal ambition is to compile a detailed family genealogy and oral‑history archive to share with his family.
    Maintaining his health so he can continue these projects, he plans to attend weekly senior‑fitness classes and schedule regular medical check‑ups.
