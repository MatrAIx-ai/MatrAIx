personas:
  professional: Tyler Alavi, a retired steel manufacturing veteran with three decades of heavy‑equipment maintenance and welding expertise, now applies their meticulous craftsmanship to woodworking, furniture
    building, and restoring historic tools, using a methodical, predictable process that mirrors their former shop‑floor routines.
  sports: Tyler Alavi follows the Cleveland Guardians and Pittsburgh Steelers with a loyalty forged in community gatherings, spends quiet mornings casting a line on the Ohio River, participates in a local
    senior fishing club, and rarely engages in organized team sports, preferring solitary, low‑impact activity.
  arts: Tyler Alavi enjoys classic Western films such as 'Stagecoach' and 'The Good, the Bad and the Ugly,' reads historical nonfiction by authors like David McCullough and Michael Wall, and occasionally
    listens to Johnny Cash and bluegrass records while working in the workshop, allowing cinematic and musical narratives to balance their solitary pursuits.
  travel: Tyler Alavi prefers low‑key road trips to historic towns like Gettysburg and Roanoke, plans itineraries in a spiral notebook, dreams of a leisurely drive along the Blue Ridge Parkway during fall
    foliage, and values traveling with grandchildren when possible, balancing adventure with a modest budget.
  culinary: Tyler Alavi favors hearty Midwestern fare, regularly grilling river perch and smoked trout, simmering beef stew with garden‑grown carrots and potatoes, perfecting homemade cornbread, and delighting
    in fresh herbs such as thyme and basil from their backyard, though they occasionally over‑salt a dish in their enthusiasm.
  core: Tyler Alavi blends a steel‑maker’s precision with a solitary outdoorsman’s calm, obsessively logging every screw and fish bite while navigating retirement with disciplined finances, modest health
    quirks, and a stash of classic Westerns.
background:
  cultural: Tyler grew up in the Rust Belt town of Weirton, a region shaped by steel mills and Appalachian values of self‑reliance, hard work, and community solidarity. His family has roots in German‑American
    and Scots‑Irish immigrants who settled in the area in the early 20th century. He was raised in a Methodist household, attending church services and community events, which reinforced a sense of responsibility
    and modesty. The local culture of close‑knit neighborhoods, a love for outdoor recreation along the Ohio River, and a practical, no‑nonsense approach to life have all left an imprint on his worldview.
attributes:
