  career_goals: Although she is approaching retirement, Angela aims to ensure a smooth transition for the IT department by mentoring emerging leaders, formalizing her team's standard operating procedures,
    and implementing a sustainable technology roadmap that reduces unnecessary complexity and stress. She hopes to develop a community‑focused digital literacy program for seniors in Roscommon, leveraging
    her education background to teach basic computer skills. In the next two to three years, she plans to shift from daily operational oversight to a consulting role, advising nearby school districts on
    efficient IT practices while maintaining a balanced workload that supports her own well‑being.
