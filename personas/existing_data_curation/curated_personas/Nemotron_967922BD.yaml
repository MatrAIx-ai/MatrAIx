personas:
  professional: Angela Hale, a veteran district IT director turned consultant, blends three decades of educational technology leadership with meticulous routine-driven project management, leveraging PMP
    and ITIL expertise to mentor emerging leaders and streamline school district IT operations while championing user‑friendly digital literacy programs for seniors.
  sports: Angela Hale, an avid birdwatcher who logs sightings at Roscommon Lake, also enjoys walking with the Roscommon Senior Fitness Club, attends Detroit Tigers baseball games in the summer, and cheers
    the Detroit Red Wings during the hockey season, preferring low‑impact exercise to maintain joint health.
  arts: Angela Hale, a dedicated quilter and knitter, finds inspiration in the traditional patterns of the Gee’s Bend collective and the bright colors of Dutch tulip‑inspired fabrics, loses herself in Willa
    Cather’s 19th‑century Midwest novels, and colors her evenings with folk music from Emmylou Harris while occasionally attending plays at the Roscommon Community Theatre.
  travel: Angela Hale, who relishes meticulously planned road trips, has toured the scenic Great Lakes loop visiting Mackinac Island’s historic carriage rides and Sleeping Bear Dunes, dreams of a leisurely
    autumn visit to New England’s covered bridges, and prefers senior‑friendly B&Bs over bustling hotels, balancing her wanderlust with a modest travel budget.
  culinary: Angela Hale, an enthusiastic home chef, regularly prepares Michigan favorites such as Lake trout almondine, wild‑rice casserole, and cherry‑filled rhubarb pie, often seasoning meals with garden‑fresh
    basil, thyme, and roasted garlic, and delights in sharing these hearty dishes with friends at her monthly potluck gatherings.
  core: Angela Hale blends decades of educational IT expertise with a routine‑driven, community‑focused life, balancing meticulous planning, quiet hobbies, and a gentle worry about change.
background:
  cultural: Angela grew up in a small rural town near Lansing, Michigan, in a family of German‑Irish descent. The Midwestern cultural values of hard work, practicality, modesty, and community service shaped
    her upbringing and continue to influence her worldview. She was raised in a Methodist congregation, where participation in church activities and local volunteerism were routine. These roots fostered
    a strong sense of neighborliness often described as "Midwest nice," and an appreciation for straightforward communication and reliable, long‑term relationships. While she has lived most of her life
    in Roscommon County, she maintains close ties to her extended family and enjoys seasonal traditions such as community potlucks, local fairs, and the Thanksgiving harvest celebration.
