  career_goals: Kenneth aims to stay at the forefront of technology by mastering cloud-native and AI/ML concepts that can complement his legacy-system expertise. He plans to lead a small consultancy focused
    on modernizing defense-contract software for Norfolk’s naval industry, publish technical whitepapers on performance and security, and serve as a guest speaker at regional STEM conferences. Additionally,
    he hopes to expand his mentorship of emerging programmers through local makerspaces and high-school outreach, ensuring his knowledge is passed on while maintaining a balanced, low-stress work life.
