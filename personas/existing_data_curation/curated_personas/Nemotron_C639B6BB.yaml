  career_goals: Nancy’s current ambitions focus on preserving her family’s legacy and enriching her community. She aims to complete a written memoir that intertwines her personal story with local history,
    curate an annual heritage‑garden showcase, mentor her grandchildren and younger volunteers in practical life skills, and remain independent by maintaining a consistent health and wellness routine. She
    also hopes to master digital photography to document community events, her garden, and everyday moments, creating a visual archive for future generations.
