personas:
  professional: Jessica Lichter, a 35-year-old executive assistant in a regional office, leverages her meticulous scheduling, budgeting, and document-management expertise, combined with a calm, assertive
    demeanor, to keep senior leaders on track while quietly streamlining office processes.
  sports: Jessica Lichter enjoys Saturday hikes on the Barksdale Global Power Museum’s nature preserve, follows the New Orleans Saints and LSU Tigers, and participates in a local adult softball league on
    weekdays, using her structured training plan to balance cardio and strength.
  arts: Jessica Lichter, an avid reader of historical fiction, often quotes Hilary Mantel’s *Wolf Hall* at the Shreveport Civic Theatre’s post-show discussions, and she curates playlists featuring blues
    legends like B.B. King and contemporary singer Hozier while attending live music nights at The Strand.
  travel: Jessica Lichter plans her trips with an itinerary spreadsheet, favoring curated road trips across the Deep South—such as a weekend in Savannah’s historic district and a culinary tour of New Orleans—while
    dreaming of a spring visit to Edinburgh’s Castle for a blend of history and literary inspiration.
  culinary: Jessica Lichter, a self-taught home cook, perfects gumbo and shrimp étouffée using farm-fresh okra, Andouille sausage, and home-grown basil from her garden, and she balances her culinary experiments
    with occasional fine-dining nights at downtown Shreveport’s Cajun-fusion restaurant.
  core: Jessica Lichter is a spreadsheet-obsessed, yoga-practicing planner who quietly curates Southern flavors, historic narratives, and community connections, all while fighting a chronic habit of over-watering
    her tomatoes.
background:
  cultural: Jessica was raised in Shreveport, Louisiana, within a white Southern middle‑class family that values community, hospitality, and modest religious traditions, attending a local Methodist church.
    Growing up in the Greater Bossier Parish area exposed her to the region’s blend of Southern hospitality, Creole and Cajun culinary influences, and a strong emphasis on high school football and local
    festivals such as Mardi Gras celebrations. These cultural experiences have shaped her appreciation for structured community events, a love for Southern cooking, and a respect for traditional work ethics.
