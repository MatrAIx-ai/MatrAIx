  career_goals: Jessica aims to progress to a senior executive assistant role, overseeing a team of administrative professionals and driving process improvements within a mid-sized corporation or regional
    office. She plans to obtain a Certified Administrative Professional (CAP) credential and develop expertise in project management, with the long‑term goal of transitioning into an operations manager
    or office manager position where she can leverage her organizational strengths to shape efficient workplace systems. Additionally, she aspires to mentor junior staff and contribute to a supportive workplace
    culture.
