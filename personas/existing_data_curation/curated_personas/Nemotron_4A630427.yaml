  career_goals: Tyler aims to transition into a senior material‑mover or shift‑lead role where he can apply his long‑standing experience to improve workflow efficiency and safety standards. He plans to
    obtain formal OSHA certification and refresh his forklift operator licensing to solidify his credentials. While seeking a stable income that supports a comfortable retirement for him and his wife, he
    also hopes to mentor younger coworkers on practical job skills. Over the next few years, he values a predictable schedule that still offers enough flexibility for his personal interests and family time.
