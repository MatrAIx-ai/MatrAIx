personas:
  professional: Elizabeth Arrington is a budding junior engineer who loves assembling elaborate LEGO models, programming simple games in ScratchJr, and conducting volcano experiments, where their organized,
    methodical planning and competitive drive turn each project into a well‑structured challenge, and they always document their builds in a notebook.
  sports: Elizabeth Arrington plays midfield for the Midtown Tigers U‑9 soccer team, where their energetic competitiveness fuels fast breaks and precise passing, they cheer for the Chicago Cubs and Chicago
    Bears, and they hone their footwork at the Rhythm Crew hip‑hop dance club on Tuesday evenings.
  arts: Elizabeth Arrington is an avid reader of the Magic Tree House series, a budding comic strip creator inspired by Jeff Smith’s Bone, a regular visitor to the Natural History Museum to marvel at the
    T. rex skeleton and James Gurney’s vivid paintings, and they love moving to upbeat tracks by BTS during hip‑hop dance class.
  travel: Elizabeth Arrington enjoys weekend adventures to the nearby Discovery Center museum, fondly recalls a family road trip to Yellowstone National Park, and daydreams about flying to Kyoto, Japan
    to see cherry blossoms and explore the historic Kiyomizu‑dera temple, balancing curiosity with a meticulously planned itinerary, and they often keep a travel journal full of sketches and stickers.
  culinary: Elizabeth Arrington delights in homemade cheese pizza topped with pepperoni, classic mac and cheese finished with a crunchy breadcrumb topping, and refreshing strawberry‑banana smoothies blended
    with almond milk, often helping in the kitchen by measuring flour and grating cheese with focused precision, and they proudly present the finished meals to the family with a grin.
  core: Elizabeth Arrington is a curious, organized eight‑year‑old whose boundless energy and competitive spirit drive them to master LEGO builds, ScratchJr coding, and group games, and they sometimes double‑check
    rules a little too obsessively.
background:
  cultural: Elizabeth grew up in the vibrant, multicultural borough of Brooklyn. Her family, rooted in a white, middle‑class American background, celebrates traditional holidays such as Thanksgiving and
    Christmas while also participating in neighborhood events that showcase the city's diverse cultures. Regular outings to local parks, community centers, and museums expose her to a wide range of languages,
    foods, and artistic expressions. Her parents emphasize education, community involvement, and personal responsibility, blending classic suburban values with the dynamic, urban rhythm of Brooklyn life.
