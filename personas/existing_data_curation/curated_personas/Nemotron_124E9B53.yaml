  career_goals: Giancarlo aims to transition into a supervisory or lead role within the next two years, leveraging his experience to mentor junior staff and improve service processes. He seeks to implement
    more structured training programs and contribute to the development of a customer satisfaction improvement plan. While planning for retirement, he hopes to maintain a part‑time advisory position, allowing
    him to share his knowledge while supporting his family's financial stability.
