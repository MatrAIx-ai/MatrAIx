  hobbies: '[''Metal sculpture creation'', ''Hiking local trails'', ''Fishing'', ''Gardening (heirloom vegetables)'', ''Reading historical engineering books'', ''Model building (scale steel bridges)'',
    ''DIY home improvement'', ''Listening to classic rock'', ''Small‑group board game nights'']'
  career_goals: Tracy’s primary career ambition is to move into a supervisory role as a crew foreman within the next few years, leveraging her extensive field experience and practical knowledge. She plans
    to earn her Journeyman Ironworker certification and become an OSHA‑authorized trainer, enabling her to mentor apprentices and champion safety initiatives on her job sites. Long‑term, she envisions starting
    a small family‑run steel‑repair contracting business with her husband, focusing on niche infrastructure projects in York County. She also seeks to improve her organizational skills through targeted
    training, allowing her to manage projects more efficiently while preserving her spontaneous work style.
