personas:
  professional: Jairo Burgos, an aspiring junior robotics hobbyist, combines a love for LEGO building, simple electronic kits, and strategic video games to tinker with basic programming and mechanics, and
    they approach projects with a practical curiosity that balances new ideas with tried‑and‑tested methods.
  sports: Jairo Burgos, a vocal member of the local youth soccer league's Red Rockets and a regular participant in their middle school’s basketball practice, idolizes the national soccer team and follows
    the NBA’s Los Angeles Lakers, and they channel a competitive nature into relentless drills but often forget to stretch, leading to occasional sore knees.
  arts: Jairo Burgos, a fan of vibrant salsa beats from the Buena Vista Social Club and Celia Cruz, loves dancing in the living room, while their quieter side devours Spider‑Man comics, sketches their own
    short‑story panels, and they draw inspiration from the colorful street art of local murals.
  travel: Jairo Burgos, who prefers short bursts of adventure over long itineraries, has explored the historic streets of Old San Juan on a family vacation and dreams of snorkeling in the Great Barrier
    Reef, but they usually limit travel plans by school schedules and a modest family budget.
  culinary: Jairo Burgos, an eager junior chef, helps their parents roll dough for empanadas filled with seasoned beef and cheese, enjoys the tang of lime on grilled fish tacos, and frequently experiments
    with simple recipes using ingredients like cumin, cilantro, and plantains, though they sometimes over‑salt their creations.
  core: Jairo Burgos is a curiosity‑driven, competitive 11‑year‑old whose love of LEGO, strategy games, salsa rhythms, and impromptu soccer matches fuels a lively imagination, even as they occasionally
    let their disorganized habit cause missed homework deadlines.
background:
  cultural: Jairo comes from a Cuban‑American family that cherishes its heritage while embracing life in Harrison, New Jersey. At home, Spanish is spoken daily, and family gatherings often feature Cuban
    foods such as ropa vieja, plantains, and cafecito. He celebrates cultural holidays like Cuban Independence Day with music, dancing, and storytelling from his grandparents. The vibrant rhythms of salsa,
    son, and Latin pop influence his taste in music, and he occasionally joins community events at local Latino cultural centers. This blend of Cuban traditions and the multicultural environment of Hudson
    County shapes his identity and offers a rich tapestry of experiences.
