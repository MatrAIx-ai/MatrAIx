  career_goals: Jairo imagines a future where he can combine his love for building things with technology. He dreams of becoming a mechanical or robotics engineer, designing gadgets that solve everyday
    problems. He also entertains the idea of working on video game development, where he could merge his coding skills with his competitive gaming interests. While still young, he aspires to join a robotics
    club in middle school and later attend a high‑school program that offers hands‑on engineering projects.
