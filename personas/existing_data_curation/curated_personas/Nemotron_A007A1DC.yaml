personas:
  professional: Robeena Rebala is a junior soccer team captain in her elementary after‑school league, using their love of routine and practical organization to keep practice schedules on track while their
    sociable and considerate nature encourages teammates to cooperate and share equipment.
  sports: Robeena Rebala loves kicking the ball with friends at the community park, plays forward for the Irvine Strikers Youth Soccer Club, cheers on the Los Angeles Dodgers and Los Angeles Lakers, and
    mixes structured after‑school soccer practice with spontaneous games of tag and hopscotch to stay fit.
  arts: Robeena Rebala delights in drawing bright pictures of Disney princesses and superheroes, attends beginner Bharatanatyam classes where they emulate the graceful moves of noted dancer Shobana, and
    sings along to Kidz Bop’s upbeat version of Shake It Off while family gatherings play the timeless melodies of A. R. Rahman.
  travel: Robeena Rebala enjoys family trips that blend familiar routines with new sights, such as weekend outings to Laguna Beach tide pools, magical days at Disneyland, and an unforgettable visit to the
    Grand Canyon where they collected smooth stones, while dreaming of snowy adventures in Whistler and bustling explorations of Tokyo.
  culinary: Robeena Rebala loves helping in the kitchen by stirring batter for homemade roti, sprinkling cheese on mac and cheese, and tasting fragrant biryani seasoned with cumin and turmeric, while also
    savoring classic peanut butter and jelly sandwiches, showcasing a palate that mixes aromatic spices with comforting familiar foods.
  core: Robeena Rebala is an energetic six‑year‑old who balances a love for routine and organization with an endless enthusiasm for soccer, dance, and colorful crafts, yet often forgets to finish a snack
    before racing to the next game.
background:
  cultural: Robeena is a second‑generation South Asian American from an Indian family living in Irvine, California. At home she hears both English and Hindi, enjoys traditional foods such as biryani and
    roti, and participates in cultural celebrations like Diwali, Holi, and family gatherings that emphasize respect for elders and community service. Her family values education and harmony, and she attends
    a multicultural elementary school where she shares her heritage while building friendships with peers from diverse backgrounds.
