  career_goals: Robeena dreams of becoming a teacher or a pediatric nurse—roles that let her help other children, work within a structured environment, and stay connected with friends and families. She
    also imagines organizing community events that celebrate her cultural traditions, reflecting her desire for practical, caring, and socially engaging careers.
