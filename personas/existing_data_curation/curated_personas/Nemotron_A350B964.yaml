  hobbies: '[''gardening'', ''baking sourdough bread'', ''personal woodworking projects'', ''hiking local trails'', ''reading historical fiction'', ''volunteering at community center'']'
  career_goals: Elizabeth aims to expand her solo carpentry business into a small, family-run contracting firm that serves the broader Finger Lakes region. Over the next five years she plans to obtain a
    formal certification in construction management, secure a steady stream of residential and small-commercial contracts, and hire a trusted apprentice to mentor. She envisions owning a dedicated workshop
    space where she can design and build custom furniture pieces for supplemental income. Ultimately, she seeks financial stability for her family, the ability to pass down trade knowledge to her children
    or local youth, and a reputation as a dependable, high-quality carpenter in her community.
