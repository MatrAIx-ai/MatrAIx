personas:
  professional: Elizabeth Howard is a seasoned rural carpenter who fuses a decade of hands‑on framing, custom cabinetry, and meticulous project scheduling with a methodical, community‑oriented mindset,
    making them the go‑to professional for reliable, high‑quality builds across the Finger Lakes region.
  sports: Elizabeth Howard hikes the Genesee River trail most weekends, participates in a seasonal community walking club, and is a loyal fan of the Buffalo Bills and the Buffalo Sabres, cheering them from
    their modest living‑room while balancing solitary cardio with occasional family snowshoe outings in winter.
  arts: Elizabeth Howard draws creative fuel from the folk ballads of The Avett Brothers, the pastoral paintings of Andrew Wyeth, and the frontier narratives of Laura Ingalls Wilder, weaving these influences
    into their sourdough experiments and handcrafted furniture designs.
  travel: Elizabeth Howard favors carefully planned road trips that blend cultural heritage with nature, such as weekend getaways to the Adirondack Mountains, a visit to historic Williamsburg, Virginia,
    and a dream of exploring the Scottish Highlands to trace their ancestral roots.
  culinary: Elizabeth Howard, an avid home baker, perfects a tangy sourdough loaf using heirloom wheat, whips up a rustic ratatouille with tomatoes, zucchini, and fresh basil from their garden, and savors
    a seasonal apple‑cinnamon crumble made with locally sourced Honeycrisp apples.
  core: Elizabeth Howard balances a pragmatic carpenter’s precision with a quietly stubborn love for late‑night sourdough fermentation, often staying up past bedtime to watch the dough rise while they still
    meet every client deadline.
background:
  cultural: Elizabeth grew up in a multi-generational farming family in the rural communities of Livingston County, where self-reliance, hard work, and close-knit community ties are deeply valued. Her white,
    predominantly European ancestry—rooted in Irish and German settlers—infuses a cultural heritage that emphasizes modesty, practicality, and a strong sense of duty to family and neighbors. The region's
    agricultural rhythms and the steady pace of small-town life have reinforced her preference for predictable routines and her calm resilience. Local church gatherings and community festivals provide a
    backdrop of shared traditions, while the surrounding Finger Lakes landscape nurtures an appreciation for craftsmanship and the outdoors.
attributes:
  skills: '[''framing residential structures'', ''custom cabinetry'', ''finish carpentry'', ''blueprint interpretation'', ''project scheduling'', ''budget management'', ''tool inventory maintenance'', ''OSHA
