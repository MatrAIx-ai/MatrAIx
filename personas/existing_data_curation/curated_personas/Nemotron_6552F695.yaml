    and training of new employees'', ''Basic Lean/Kaizen process improvement'', ''Adaptation to automation and robotic systems'', ''Practical problem solving'']'
  hobbies: '[''Gardening (vegetable and flower patch)'', ''Cooking soul food and trying new recipes'', ''Reading historical nonfiction and industry publications'', ''Participating in church choir and community
    events'', ''Walking along the Flint River trail'', ''Volunteering for local clean‑up and water‑safety programs'', ''Knitting and quilting'', ''Watching classic R&B movies and TV shows'']'
  career_goals: Looking ahead, Addrienne aims to move into a supervisory or lead‑operator role where she can guide a team while continuing to apply her technical knowledge. She plans to earn a Certified
    Production Technician (CPT) credential and attend workshops on robotics integration to stay current with the plant’s shift toward automation. Parallel to her career advancement, she hopes to formalize
    a mentorship program for younger workers, especially those from the local Black community, helping them gain reliable manufacturing jobs. Ultimately, she envisions a phased transition to a part‑time
    training position that balances steady income, reduced physical strain, and increased time for community volunteering and family.
