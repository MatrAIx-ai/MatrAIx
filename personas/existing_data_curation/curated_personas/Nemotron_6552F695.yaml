personas:
  professional: Addrienne Lyttle, a veteran factory production specialist with three decades of hands‑on experience operating CNC lathes, automated feeders, and certified forklift, leverages their practical
    problem‑solving and curiosity to streamline processes while mentoring new hires, balancing a relaxed approach to scheduling with assertive safety advocacy as they eye a supervisory role and a Certified
    Production Technician credential.
  sports: Addrienne Lyttle enjoys leisurely weekend walks along the Flint River trail, they participate as a seasonal member of the local senior tennis club, and they root for the Atlanta Falcons and Georgia
    Bulldogs, occasionally joining a community "Fit‑Over‑Fifty" cardio class while preferring low‑impact activities over high‑intensity sports.
  arts: Addrienne Lyttle finds solace in the soulful melodies of Marvin Gaye and Aretha Franklin, regularly sings in their church choir, savors classic R&B films like “The Color Purple,” and spends quiet
    evenings knitting to the soundtrack of Al Green while attending the annual local theater’s production of “A Raisin in the Sun.”
  travel: Addrienne Lyttle prefers road‑trip explorations that blend historic sightseeing with comfortable accommodations, having already visited the Smithsonian National Museum of American History in Washington,
    D.C., the antebellum streets of Savannah, and the Great Smoky Mountains, while they hope to someday cruise the Mississippi River for a mix of music and river‑culture immersion.
  culinary: Addrienne Lyttle, an avid home cook, blends classic soul‑food staples like fried catfish, collard greens seasoned with smoked turkey, and cornbread with experimental dishes from food blogs such
    as quinoa‑black bean salads and spiced sweet potato gnocchi, often sourcing fresh tomatoes and herbs from their own garden and using a well‑worn cast‑iron skillet to perfect each recipe.
  core: Addrienne Lyttle balances a lifelong love of hands‑on manufacturing with a nurturing garden, a soulful soundtrack, and a flexible, occasionally disorganized approach to life that keeps them both
    grounded and endlessly curious.
background:
  cultural: Addrienne’s cultural identity is rooted in her African‑American heritage and the tight‑knit community of Flint, Michigan. Growing up during the city’s industrial boom and later the water‑crisis,
    she witnessed both the resilience and the challenges faced by Flint’s Black neighborhoods. Family gatherings centered around church, gospel music, and shared meals, reinforcing values of solidarity,
    mutual aid, and storytelling. She carries forward traditions of soul‑food cooking, church‑based service, and participation in the annual African American Heritage Festival, where she volunteers to educate
    younger residents about the city’s history. These experiences shape her worldview, fostering a pragmatic optimism and a commitment to uplift her community.
attributes:
  skills: '[''Production equipment operation'', ''CNC machine handling'', ''Preventative maintenance and troubleshooting'', ''Quality inspection and statistical process control'', ''OSHA safety compliance'',
