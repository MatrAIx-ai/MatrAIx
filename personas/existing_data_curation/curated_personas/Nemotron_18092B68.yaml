  hobbies: '[''bike riding on Columbia River Trail'', ''trout fishing'', ''camping in the Cascades'', ''playing acoustic guitar'', ''model kit building'', ''tactical video gaming'', ''reading science-fiction'',
    ''river clean-up volunteering'', ''tinkering with vintage radios'']'
  career_goals: Peter aims to enroll in a community‑college apprenticeship program for automotive technology or electrical work, seeking a journeyman certification within the next three years. He wants
    to combine his practical curiosity with formal training to eventually launch his own mobile repair service that handles both vehicle and home‑repair needs for residents of Columbia County. In the longer
    term, he envisions a modest garage focused on sustainable, eco‑friendly practices, possibly expanding to electric‑vehicle service as the market grows.
