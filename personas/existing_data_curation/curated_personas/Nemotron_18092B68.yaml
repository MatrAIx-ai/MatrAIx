personas:
  professional: Peter Cresap is an aspiring mobile repair entrepreneur who leverages hands‑on troubleshooting skills in automotive and carpentry, thrives under pressure, and balances a competitive drive
    with a laid‑back, flexible approach as they pursue a community‑college apprenticeship toward journeyman certification.
  sports: Peter Cresap is a dedicated outdoor enthusiast who cycles the Columbia River Trail, fishes for trout in local streams, and supports the Portland Trail Blazers and Seattle Seahawks while they belong
    to a regional mountain‑bike club that meets every weekend for group rides.
  arts: Peter Cresap channels creative energy into acoustic folk songwriting inspired by Bob Dylan and The Milk Carton Kids, blends it with a love for classic science‑fiction authors like William Gibson,
    and spends evenings assembling model airplane kits while tinkering with vintage radios, making them a hands‑on storyteller of both sound and steel.
  travel: Peter Cresap prefers spontaneous, budget‑friendly road trips that combine weekend camping in the Cascades with occasional hikes in Oregon’s Columbia River Gorge, while they dream of future bike‑tour
    adventures through New Zealand’s South Island and a summer trek along the Pacific Coast Trail.
  culinary: Peter Cresap enjoys cooking freshly caught trout on a cedar plank with rosemary and lemon, whipping up campfire chili with black beans and smoked paprika, and experimenting with homemade granola
    bars featuring oats, honey, and dried cranberries, reflecting their practical, outdoorsy palate.
  core: Peter Cresap is a curiosity‑driven, competitively spirited 21‑year‑old who balances hands‑on problem solving with a relaxed, sometimes chaotic lifestyle, turning tool‑sheds into creative studios
    while occasionally forgetting to schedule appointments.
background:
  cultural: Peter grew up in Saint Helens, a small town in Columbia County, Oregon, where Pacific‑Northwest outdoor culture and working‑class values shaped his outlook. His family traces its roots to German
    and Irish immigrants who settled in the region in the early 1900s. The community's emphasis on self‑reliance, environmental stewardship, and a modest, no‑frills lifestyle is reflected in his daily habits.
    He celebrates holidays like Thanksgiving and the Fourth of July with local barbecues and participates in the annual Columbia County Fair, reinforcing his connection to regional traditions.
