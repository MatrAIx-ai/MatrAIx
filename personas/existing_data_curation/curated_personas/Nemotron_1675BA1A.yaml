  hobbies: '["playing group games", "building with LEGO", "dancing to Latino music", "storytime at the library", "helping in the kitchen with Mexican recipes", "gardening and planting seeds", "simple backyard
    science experiments", "singing nursery rhymes", "preschool art projects"]'
  career_goals: Nicole imagines a future where she can help and care for others. She often says she wants to become a teacher who shares knowledge, a doctor who makes people feel better, or a community
    volunteer who ensures everyone feels safe and happy. Her love for animals sometimes leads her to dream about being a veterinarian. She is drawn to roles that blend her curiosity about how things work
    with her compassionate desire to support friends and family.
