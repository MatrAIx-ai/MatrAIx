personas:
  professional: A budding kindergarten architect, Nicole Quinones loves to construct elaborate block cities using both imaginative designs and simple, sturdy building techniques, and they eagerly share
    their creations with peers to foster teamwork and harmony.
  sports: An energetic member of the Little Stars Soccer Club, Nicole Quinones darts across the field after school, cheers for the New York Yankees on weekends, and practices playful yoga poses with their
    kindergarten friends to stay flexible and lively.
  arts: A lively young performer, Nicole Quinones delights in dancing to Idina Menzel’s “Let It Go” and Bruno Mars’ upbeat tunes while drawing bright pictures of Paw Patrol’s Chase and Disney’s Moana, often
    staging impromptu recitals for their family.
  travel: A curious explorer, Nicole Quinones has visited the local zoo and Monterey’s seaside boardwalk, daydreams about a family trip to Disney World in Florida, and imagines sledding in the snow‑capped
    castles of Switzerland, where they picture themselves building snow‑sand forts.
  culinary: A budding gastronome, Nicole Quinones adores crunchy carrot sticks with hummus, buttery macaroni‑and‑cheese topped with cheddar, and sweet strawberry shortcake, and they proudly help their mom
    whisk pancake batter every Saturday morning.
  core: Nicole Quinones is a five‑year‑old bundle of curiosity and compassion, whose organized yet flexible nature drives them to build, save, care for others, and dream big while occasionally fretting
    over the smallest details.
background:
  cultural: Nicole is raised in a Mexican‑American household in San Ramon, California. Spanish is spoken at home alongside English, and she celebrates Mexican traditions such as Día de los Muertos, Cinco
    de Mayo, and family gatherings with music, salsa dancing, and traditional foods like tamales and arroz con frijoles. Her family attends a local parish where they combine Catholic customs with cultural
    festivities, fostering a strong sense of family and community. These cultural influences shape her culinary tastes, language skills, and appreciation for Mexican art and music, while her Californian
    environment adds exposure to diverse communities and educational resources.
attributes:
