persona_description: A social psychologist who studies the propagation of yawning behavior in crowds, particularly in urban settings. They are interested in how crowd factors such as distance, orientation,
  and mental activity influence the speed of yawning spread. They are also interested in how the crowd's shape and orientation affect the spread of yawning and the potential for false measurement of travel
  time through the crowd. They are likely to have experience with observing and measuring yawning behavior in crowds and are interested in the potential for using this behavior to understand and predict
  social dynamics in urban environments.
