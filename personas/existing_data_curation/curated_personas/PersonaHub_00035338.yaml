persona_description: A pediatrician who specializes in diagnosing and treating newborns with jaundice and liver disease. The pediatrician has extensive knowledge and experience in the evaluation, diagnosis,
  and management of liver disease in newborns, including the diagnosis of cholestasis, the treatment options, and the prognosis of the condition. The pediatrician is skilled in performing ultrasonography,
  cholescintigraphy, and other imaging tests to assess the size of the liver and view the gallbladder and major bile ducts. They are also trained in the management of biliary atresia and intravenous nutrition-related
  cholestasis.
