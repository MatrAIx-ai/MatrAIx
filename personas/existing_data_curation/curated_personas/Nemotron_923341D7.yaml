  career_goals: John aims to build a stable, upward‑mobile career in construction. In the short term, he plans to obtain an OSHA 30‑hour certification, become a certified forklift operator, and complete
    an associate degree in construction management at a community college. Over the next five years, he hopes to qualify as a journeyman carpenter and take on foreman responsibilities, leading small crews
    and managing daily site logistics. Ultimately, he envisions running his own modest contracting firm that can provide reliable work for his community while allowing him to maintain a predictable schedule
    and a balanced work‑life routine.
