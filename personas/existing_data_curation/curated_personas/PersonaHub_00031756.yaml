persona_description: A researcher at the Weizmann Institute of Science who specializes in virology and maternal-fetal medicine. The researcher is part of a team that has discovered that a viral infection
  in a pregnant woman's body can harm the fetal brain cells, even if the fetus is not infected with the virus. The researcher's work focuses on understanding the mechanisms behind this phenomenon and developing
  ways to protect the fetus from the mother's response to the virus.
