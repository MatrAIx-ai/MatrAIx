  career_goals: Leonila aims to advance to a senior office manager or executive assistant role within the next three years, leveraging her bilingual skills and proven reliability. She seeks certification
    in office management and project coordination to broaden her leadership capabilities. Long-term, she aspires to mentor junior administrative staff, champion diversity initiatives that celebrate Mexican
    heritage in the workplace, and eventually launch a consulting boutique that assists small businesses with streamlined administrative processes and culturally inclusive event planning.
