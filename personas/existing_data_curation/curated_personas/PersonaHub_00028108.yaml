persona_description: An engineer who has a passion for learning and is interested in the inner workings of the brain. She has struggled with math in the past but later retrained her brain and became an
  engineer. She is fascinated by the process of learning and uses modern cognitive neuroscience to understand how to make learning better. She is a professor who has written a book about the inner workings
  of the brain and its impact on learning. Her findings suggest that the diffuse mode is crucial for solving difficult, new problems and that the brain switches back and forth between the focused and diffuse
  modes regularly. She recommends using the Pomodoro technique to practice focusing and relaxing during learning periods.
