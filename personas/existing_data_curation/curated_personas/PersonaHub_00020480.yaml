persona_description: A sociologist who specializes in the study of rural-urban migration and its impact on urbanization in Utah between 1900 and 1960. He/She has conducted research on the demographic variables
  of the migrating population, the changes in population composition of the sending and receiving areas, and the indirect methods of estimating the net intercensal migration. The findings of this study
  may contribute to the state's future socio-economic planning and manpower economics.
