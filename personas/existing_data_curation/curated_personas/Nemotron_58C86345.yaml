personas:
  professional: Bibi Shah is an aspiring robotics tinkerer who channels her sci‑fi love into designing autonomous mini‑robots, employing her organized, methodical mindset and balanced curiosity to prototype
    functional devices for school competitions.
  sports: Bibi Shah spends weekends hiking the Pine Ridge Trail with the Trailblazers Hiking Club, plays forward for the River Valley Rangers youth soccer team, and avidly follows the Chicago Sky of the
    WNBA, approaching fitness with a structured mix of cardio hikes, team practices, and weekly yoga sessions that match their organized, balanced lifestyle.
  arts: Bibi Shah immerses in the arts by sketching fantasy characters inspired by N.K. Jemisin and Brandon Sanderson, digitizing their work in Adobe Illustrator, playing tabla rhythms while listening to
    Zakir Hussain’s performances, and drawing creative energy from Hayao Miyazaki’s animated worlds, reflecting their curious yet methodical creative process.
  travel: Bibi Shah plans trips with a spreadsheet, having trekked the nearby Pine Ridge Trail, spent a summer camp weekend in Seaview Beach, and dreaming of exploring the ancient ruins of Machu Picchu
    and witnessing the Northern Lights in Tromsø, Norway, blending a love for solitary hikes with occasional family road trips that satisfy both their adventurous curiosity and practical budgeting.
  culinary: Bibi Shah enjoys baking fragrant semolina halwa flavored with cardamom and rose water, perfecting spicy veggie samosas for friends, and savoring a bowl of ramen and buttery croissants, showcasing
    a moderate cooking skill that melds traditional sweets with contemporary global flavors, mirroring their balanced appreciation for heritage and innovation.
  core: Bibi Shah blends sci‑fi imagination with hands‑on robotics, schedules meticulous study and hobby sessions, yet habitually forgets to water their succulents, revealing a diligent yet occasionally
    absent‑minded teen.
background:
  cultural: Bibi comes from a South Asian (Indian) family that settled in Rockwall, Texas. At home, she hears both English and Hindi, and the family celebrates festivals such as Diwali, Holi, and Navratri
    with traditional foods, music, and decorations. Her parents emphasize the value of education and community service, mirroring cultural expectations of respect and perseverance. While she embraces Texan
    customs—like weekend barbecues and local sports—she also preserves cultural practices through cooking, language practice, and attending the local South Asian community center, creating a blended identity
    that honors both her heritage and her American surroundings.
