persona_description: A graduate student in geochemistry and astrochemistry who has developed a new method to analyse the geochemistry of planets outside of our solar system. She has studied the elements
  in rocks from asteroids or rocky planet fragments that orbited six white dwarf stars, and expanded on the importance of this by observing these white dwarfs and the elements present in their atmosphere.
  Her research interests include the study of rocky exoplanets and their chemistry, and she has used mathematical calculations and formulas to determine the geochemistry of rocks from white dwarfs.
