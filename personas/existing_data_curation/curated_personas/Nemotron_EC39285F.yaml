personas:
  professional: Tyrone Harrison, a 19‑year‑old associate degree student in information technology, combines hands‑on device repair, basic web development, and beat‑making to run a freelance tech‑support
    service that doubles as a digital showcase for emerging Detroit hip‑hop talent, reflecting a pragmatic curiosity and a flexible, community‑oriented work style.
  sports: Tyrone Harrison, an avid basketball player at the neighborhood park and devoted Detroit Pistons fan, participates in the Westside Community Youth Basketball League during the spring and follows
    the Lions and Tigers for seasonal excitement, approaching fitness with a mix of competitive drive and laid‑back weekend pick‑up games.
  arts: Tyrone Harrison, who spends evenings remixing tracks inspired by J Dilla and the classic Motown sound of Marvin Gaye, attends open‑mic nights featuring local MCs like Sizzle, and draws visual inspiration
    from street photography of the Detroit Institute of Arts exhibitions, shaping his identity through music and visual art.
  travel: Tyrone Harrison prefers spontaneous, budget‑friendly trips that blend cultural immersion with photography, having road‑tripped to Chicago for its blues scene and New Orleans for Mardi Gras, while
    dreaming of a solo itinerary to Tokyo to capture neon‑lit street life and to Nashville to mingle with songwriters.
  culinary: Tyrone Harrison enjoys cooking at a moderate skill level, often whipping up collard greens seasoned with smoked turkey, buttery cornbread, and crispy fried chicken, while also experimenting
    with homemade hot‑sauce using cayenne and garlic, and they relish weekend trips to local diners for a slice of Detroit‑style pizza topped with pepperoni and pickles.
  core: Tyrone Harrison is a tech‑savvy beat‑maker who balances late‑night gaming marathons with a dream of building a community tech hub, often juggling impulsive spending and a habit of forgetting to
    schedule appointments.
background:
  cultural: Tyrone grew up in Detroit’s historic African‑American neighborhoods, where the legacy of Motown, the rise of hip‑hop, and the city’s resilient spirit shaped his identity. His family’s traditions
    include Sunday church gatherings, soulful family meals featuring dishes like collard greens and cornbread, and annual block‑party celebrations that blend music, food, and dance. He feels a strong sense
    of pride in the city’s history of automotive innovation and its ongoing cultural renaissance. These influences inform his love for music, his commitment to community uplift, and his entrepreneurial
    drive to create opportunities that reflect the city's blend of grit and creativity.
attributes:
