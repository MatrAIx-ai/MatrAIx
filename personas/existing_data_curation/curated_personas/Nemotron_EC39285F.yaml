  hobbies: '[''Basketball'', ''Music production (hip‑hop beats)'', ''Street photography'', ''DJing at house parties'', ''Strategy video gaming'', ''Community volunteering (youth workshops and sports events)'']'
  career_goals: Tyrone aims to finish his associate degree in information technology within the next two years, focusing on networking and cybersecurity fundamentals. He plans to launch a freelance tech‑support
    and device‑repair service that offers flexible hours, allowing him to balance work with his creative pursuits. Long‑term, he dreams of establishing a community tech hub in Detroit where young people
    can learn coding, digital media production, and practical repair skills. He is also interested in using his platform to mentor other Black youth and showcase local talent through digital media.
