data:
  user 1 personas: 'My biggest fear in life is heights.

    There s only been one set of twins in my family.

    I ve been cheated on by every ex girlfriend except for one.

    I use to be a huge superman fan as a child.'
  user 2 personas: 'My three ring binder has my drawings of ponies all over it.

    I could eat less.

    I hate that my mom made me get braces.

    My dream is to be a veterinarian.'
  Best Generated Conversation: 'User 1: What''s up?

    User 2: Not much. Just drawing some ponies.

    User 1: Oh, cool! I used to draw a lot of ponies when I was a kid.

    User 2: Really? What kind of ponies did you draw?

    User 1: I usually drew the main characters from My Little Pony: Friendship is Magic.

    User 2: Oh, cool. I love that show! I have a whole binder full of my drawings of the ponies.

    User 1: That''s awesome! I wish I still had all my old drawings of the ponies.

    User 2: You should try to find them! I''m sure they''d be fun to look at.

    User 1: I''ll try to do that. I''m sure they''re in a box somewhere.

    User 2: Cool. Let me know if you find them.

    User 1: Will do.

    User 2: So, what do you do for fun?

    User 1: I like to read, watch movies, and play video games.

    User 2: Oh, cool. I like to do those things too. What kind of books do you like to read?

    User 1: I like to read fantasy and science fiction novels.

    User 2: Oh, cool. I like those too. What''s your favorite fantasy novel?

    User 1: My favorite fantasy novel is The Lord of the Rings.

    User 2: Oh, cool. I love that book! It''s one of my favorites too.

    User 1: What''s your favorite science fiction novel?

    User 2: My favorite science fiction novel is Dune.

    User 1: Oh, cool. I''ve heard good things about that book. I''ll have to check it out.

    User 2: You should! It''s a great book.

    User 1: I will.

    User 2: So, what''s your favorite movie?

    User 1: My favorite movie is The Princess Bride.

    User 2: Oh, cool. I love that movie too! It''s one of my favorites too.

    User 1: What''s your favorite video game?

    User 2: My favorite video game is The Legend of Zelda: Ocarina of Time.

    User 1: Oh, cool. I love that game too! It''s one of my favorites too.

    User 2: So, what do you want to be when you grow up?

    User 1: I want to be a writer.

    User 2: Oh, cool. I''ve always wanted to be a writer too.

    User 1: I''m glad to hear that. I think it''s a great profession.

    User 2: I agree. It''s a great way to express yourself.

    User 1: I think so too.

    User 2: So, what kind of books do you want to write?

    User 1: I want to write fantasy and science fiction novels.

    User 2: Oh, cool. I like those too. I hope you get to write the books you want to write.

    User 1: Thank you. I hope so too.'
