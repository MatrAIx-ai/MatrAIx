  career_goals: As she approaches retirement age, Eileen aims to transition into a senior administrative role that allows her to mentor younger clerical staff while maintaining a predictable, part‑time
    schedule. She hopes to obtain a Microsoft Office Specialist certification to formalize her computer skills and to become a trusted advisor for the small nonprofit organizations in Asheboro that need
    reliable office support. Long‑term, she envisions a gradual shift toward volunteer coordination for the local community center, where her organizational strengths can help plan events and manage volunteers
    without the pressures of a full‑time paycheck.
