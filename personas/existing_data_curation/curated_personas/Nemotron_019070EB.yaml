  career_goals: Ernesto aims to secure a stable, structured role in logistics or supply‑chain coordination where his affinity for routine processes can thrive, while still allowing enough flexibility to
    apply his adaptive problem‑solving skills. He plans to leverage his associate's degree to obtain an entry‑level position as an inventory analyst at a regional distribution center, eventually pursuing
    a bachelor’s degree in Business Management. In the longer term, he dreams of opening a small automotive repair shop that blends his mechanical know‑how with his entrepreneurial spirit, providing reliable
    service to his community while maintaining a predictable work schedule.
