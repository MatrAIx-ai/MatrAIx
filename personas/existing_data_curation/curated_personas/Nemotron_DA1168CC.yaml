  career_goals: Although retired from formal employment, Nicholas aims to stay intellectually active and give back to his community. He plans to mentor high‑school and college students in STEM through the
    local senior‑lead volunteer program, share his knowledge of Florida’s coastal infrastructure by offering pro‑bono consulting for small municipal projects, and write a memoir that weaves his engineering
    career with the historical moments he witnessed. He also hopes to maintain his health so he can travel with his wife to historic sites related to space exploration and World War II, and to support his
    grandchildren’s educational pursuits.
