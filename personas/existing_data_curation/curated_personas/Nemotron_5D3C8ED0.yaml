personas:
  professional: Aura Gutierrez, a high‑school junior with a practical mind and a penchant for structure, channels basic first‑aid knowledge and small‑group coordination into volunteer health‑outreach events
    while they plan to enroll in a community‑college nursing program.
  sports: Aura Gutierrez, who favors solitary beach swims and occasional tide‑pool walks over organized workouts, cheers for the local baseball team the Coastal Hurricanes and supports the Island Sharks
    soccer club, and participates in the Sunrise Beach Swim Club’s casual weekend sessions, yet prefers low‑key exercise like gardening and sketching sea life.
  arts: Aura Gutierrez, who spends afternoons sketching intricate shoreline and mangrove scenes while listening to salsa legends Celia Cruz, bomba rhythms of Willie Colón, and modern reggaetón beats from
    Bad Bunny, immerses themselves in contemporary poetry by Ocean Vuong and Gabriela Mistral, and channels these influences into a personal journal filled with lyrical doodles and reflective verses.
  travel: Aura Gutierrez, who prefers low‑key, nature‑focused getaways, plans weekend trips to the hidden cove of Playa Escondida for sunrise sketching and the mountain village of San Lila for quiet hikes,
    while dreaming of volunteering in the kelp forests of Northern California and exploring the vibrant colonial charm of Cartagena on a future cultural immersion tour.
  culinary: Aura Gutierrez, an adept home cook who masterfully prepares traditional island dishes like arroz con gandules, alcapurrias, and pasteles, seasons seafood with fresh cilantro and lime, experiments
    with a pinch of smoked paprika in garden‑grown vegetable stew, but often forgets to clean the kitchen promptly after cooking, leaving a lingering aroma that both tempts and reminds them of their next
    culinary adventure.
  core: Aura Gutierrez, a structure‑loving yet easygoing teen, balances solitary sketching and community health dreams with a habit of misplacing school notes and a compulsive craving for fresh sea‑salted
    snacks.
background:
  cultural: Aura grew up in Maunabo, a small coastal municipality on Puerto Rico’s southeastern coast. Her family follows a blend of Catholic traditions and Afro‑Caribbean cultural practices common in the
    island, celebrating holidays such as Navidad, Día de los Reyes, and the local Feria de la Cazuela with music, dance, and communal meals. Spanish is spoken at home, while she also uses English at school
    and in media. The rhythms of bomba, plena, salsa, and modern reggaetón shape her musical taste, and she often hears stories of the island’s maritime heritage, including fishing and the protection of
    the Río de la Plata wetlands. Community ties are strong; neighbors regularly gather for backyard barbecues, and local festivals emphasize the importance of family, respect for nature, and resilience.
    Aura’s identity is rooted in these traditions, the island’s natural beauty, and the close‑knit, supportive atmosphere of her hometown.
attributes:
  skills: '["Basic computer skills (internet research, word processing)", "Spanish fluency and conversational English", "Cooking traditional Puerto Rican dishes", "Gardening and small‑scale vegetable cultivation",
    "Basic first‑aid knowledge", "Beginner‑level cuatro playing", "Drawing and sketching", "Coordinating small group activities"]'
  hobbies: '["Drawing and sketching coastal scenes", "Personal journaling", "Reading contemporary fiction and poetry (Spanish and English)", "Swimming and beachcombing", "Gardening with family", "Listening
    to salsa, bomba, and reggaetón", "Playing beginner chords on the cuatro", "Volunteering for community clean‑up events", "Preparing traditional dishes as a hobby"]'
  career_goals: Aura’s immediate goal is to finish the required coursework to obtain her high‑school diploma or a GED, knowing that education will give her the stability she values. In the next few years
    she hopes to enroll in a community‑college nursing program, building on her interest in first aid and her desire to help neighbors in Maunabo. Long‑term, she aspires to become a registered nurse who
    can work in community health, perhaps focusing on preventive care and environmental health issues that affect coastal residents. She also envisions volunteering in local health outreach programs that
    combine her medical training with her love for the sea and the natural environment.
