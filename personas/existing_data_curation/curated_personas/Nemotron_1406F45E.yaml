  hobbies: '[''Woodworking'', ''Model train building'', ''Vegetable gardening'', ''Reading detective novels'', ''Chess'', ''Fishing'', ''Hiking'', ''Volunteer tech tutoring'']'
  career_goals: Glenn aims to build on his reliable track record by earning industry certifications such as CompTIA Network+ and Security+, and eventually obtaining a Microsoft Certified Solutions Expert
    credential. His ambition is to move into a senior support or team lead role where he can mentor junior technicians and oversee the development of standardized support procedures. Long‑term, he envisions
    transitioning to an IT manager position within a midsize organization in the Raleigh area, or establishing his own managed‑services business focused on providing steady, routine IT support to local
    small businesses. Throughout his career progression, Glenn seeks stability, clear responsibilities, and the opportunity to apply his organized, practical mindset to improve operational efficiency.
