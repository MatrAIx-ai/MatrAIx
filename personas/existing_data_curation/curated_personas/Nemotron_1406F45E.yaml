personas:
  professional: Glenn Loidl, a seasoned computer support specialist known for their methodical troubleshooting and meticulous documentation, leverages deep expertise in Windows, macOS, Linux, Active Directory,
    and network configuration to streamline ticket queues while pursuing CompTIA Network+ and Security+ certifications with the goal of moving into a senior support lead role and eventually managing IT
    services for a midsize Raleigh firm.
  sports: Glenn Loidl enjoys weekend fishing trips on Jordan Lake; they also hike the well‑marked trails of the Research Triangle Park, cheer for the NC State Wolfpack football team, and occasionally join
    a local recreational softball league during summer.
  arts: Glenn Loidl channels their craftsmanship into building functional furniture and detailed model train layouts, devotes evenings to classic detective novels by Agatha Christie and Dashiell Hammett,
    attends community theater productions featuring works by Arthur Miller, and relaxes while listening to classic rock icons like The Eagles and The Rolling Stones.
  travel: Glenn Loidl prefers meticulously planned road trips to historic towns such as Williamsburg and Asheville; they also enjoy annual visits to their Midwestern hometown for family reunions and dream
    of a leisurely European tour of Munich and the Black Forest once their children are grown.
  culinary: Glenn Loidl’s culinary repertoire features hearty seasonal vegetable stews, slow‑cooked pot roast, and grilled trout seasoned with fresh herbs from their garden; they especially delight in perfecting
    a classic Southern BBQ rub for weekend cookouts.
  core: Glenn Loidl blends pragmatic routine with hands‑on craftsmanship; they balance a reliable IT career, meticulous budgeting, and a steady rhythm of gardening, woodworking, and community volunteering,
    while indulging in occasional splurges on quality lumber and classic detective reads.
background:
  cultural: Glenn is a white American with German‑Midwestern ancestry, raised in a middle‑class family that emphasized self‑reliance, practicality, and a respect for routine. After moving to Raleigh, North
    Carolina, he adopted aspects of the local Southern culture, such as community involvement and a friendly, courteous demeanor. His upbringing instilled traditional values, a strong work ethic, and a
    preference for stability, which influence his personal and professional choices. While he identifies with mainstream American cultural norms, he also appreciates the blend of Midwestern pragmatism and
    Southern hospitality that characterizes his current community.
attributes:
  skills: '[''Windows and macOS troubleshooting'', ''Linux system maintenance'', ''Active Directory administration'', ''Network configuration and troubleshooting'', ''Remote support (RDP, VPN)'', ''Technical
