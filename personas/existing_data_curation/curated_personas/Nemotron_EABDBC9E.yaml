    childhood mentorship"]'
  hobbies: '["Herb and vegetable gardening", "Traditional Mexican cooking (mole, tamales, pozole)", "Reading historical fiction and Mexican literature", "Listening to mariachi and regional Mexican music",
    "Knitting and crochet", "Chess and bridge at the senior center", "Crossword puzzle solving", "Attending neighborhood cultural celebrations (Día de los Muertos, Cinco de Mayo)", "Volunteer work at the
    Catholic church (food drives, choir support)", "Collecting and creating Mexican folk art crafts"]'
  career_goals: Although retired from formal employment, Angel aims to channel her expertise into meaningful community contributions. She plans to lead a series of small‑group cooking workshops that teach
    traditional Mexican dishes while incorporating health‑conscious twists, hoping to mentor younger Mexican‑American women in culinary entrepreneurship. Angel also aspires to become a volunteer financial‑literacy
    instructor for seniors at her local community center, leveraging her budgeting skills to help peers manage retirement finances. Her curiosity drives a personal project to document her family's genealogy
    and oral histories, creating a digital archive that can be shared with future generations. Additionally, Angel intends to travel to her ancestral hometown in Mexico to deepen her cultural roots and
    bring back stories and recipes that can enrich her workshops. She remains competitive and seeks to enter a regional senior cooking competition to showcase her culinary innovations.
