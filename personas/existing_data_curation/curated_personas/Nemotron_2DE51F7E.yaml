  hobbies: '[''Reading classic literature'', ''Genealogy research'', ''Historical photography'', ''Gardening'', ''Bridge (card game)'', ''Community theater'', ''Cooking heritage recipes'', ''Short road
    trips'', ''Volunteering at the library'', ''Participating in local history tours'']'
  career_goals: Kieston aims to leave a lasting legacy for his community by documenting and sharing Trafalgar’s local history. He plans to author a community history book and launch a digital archive of
    oral histories. He hopes to serve on the board of the Trafalgar Historical Society, mentor younger volunteers, and develop a senior‑focused wellness and storytelling program. On a personal level, he
    seeks to maintain his health, manage his stress through mindfulness, and continue learning new archival technologies.
