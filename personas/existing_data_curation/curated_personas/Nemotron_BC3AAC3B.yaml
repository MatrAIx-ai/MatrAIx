  career_goals: Gregory aims to advance to a senior operations or regional director role within the next five years, where he can shape flexible work policies that reflect his belief in work‑life balance.
    He aspires to mentor emerging managers, spearhead cross‑functional projects that blend technology with hands‑on processes, and eventually launch a family‑owned specialty store that leverages his local
    network and community ties. While ambitious, he prioritizes maintaining the relational and adaptable work culture he values.
