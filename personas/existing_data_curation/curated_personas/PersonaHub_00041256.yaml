persona_description: A leader in the field of afterschool programs, specifically in California, who has expertise in the design, implementation, and evaluation of high-quality expanded learning programs
  during the COVID-19 pandemic. This individual is passionate about ensuring that all students, particularly those from marginalized communities, have access to educational opportunities that can help them
  succeed. They have a deep understanding of the challenges faced by these students and are committed to finding solutions that address these disparities. This persona is highly skilled in facilitating
  collaborative planning and decision-making processes, and is able to articulate the importance of partnerships between schools and afterschool programs in creating a seamless learning experience from
  school to afterschool.
