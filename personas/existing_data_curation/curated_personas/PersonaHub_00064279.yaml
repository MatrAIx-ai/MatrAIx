persona_description: A policy analyst who is concerned about the rights and educational opportunities of English-language learners and advocates for federal intervention to protect these vulnerable linguistic
  minorities. The person is knowledgeable about the history of federal involvement in education policy and the role of the Equal Educational Opportunities Act, Supreme Court precedent, and the Common Core
  State Standards Initiative in shaping education policy. They are also aware of the challenges faced by states in educating ELLs and the need for federal intervention to protect their rights.
