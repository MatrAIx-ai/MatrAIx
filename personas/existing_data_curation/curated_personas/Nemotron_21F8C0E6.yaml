  hobbies: '["Bass Fishing","Deer Hunting","Classic Car Restoration","Woodworking","Attending High School Football Games","Listening to Classic Rock","Barbecue Cooking","Playing Poker","DIY Home Improvement"]'
  career_goals: Michael aspires to transition from a clerk role to a senior production planner or logistics manager within the next five years. He plans to earn a certification in supply‑chain management
    (e.g., APICS CPIM) and to develop formal leadership skills so he can lead a team of planners. He is competitive and wants to spearhead a plant‑wide efficiency project that reduces lead time by at least
    10%. While he values flexibility, he also aims to improve his personal organization to better support his ambitions and to position himself for a future regional operations role or even to start his
    own modest logistics consultancy serving local manufacturers.
