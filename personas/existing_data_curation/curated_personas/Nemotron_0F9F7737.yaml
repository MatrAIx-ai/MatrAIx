  hobbies: '[''Playing dominoes'', ''Salsa dancing'', ''Cooking Cuban cuisine'', ''Fishing'', ''Watching baseball'', ''Volunteering at church food bank'', ''DIY home improvement projects'', ''Attending
    community festivals'']'
  career_goals: Marco aims to move into a senior purchasing manager role within the next three years, overseeing a larger portfolio of suppliers and leading a team of junior agents. He plans to earn a Certified
    Purchasing Professional (CPP) credential to formalize his expertise despite his limited formal schooling. Additionally, he wants to spearhead cost‑saving initiatives that incorporate local Cuban‑owned
    businesses, enhancing community ties. He hopes to mentor younger coworkers, sharing his practical knowledge, and eventually advise on strategic procurement for his company’s expansion into the Florida
    market.
