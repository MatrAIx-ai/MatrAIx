persona_description: A marine biologist or aquarist interested in the ecology and biology of caprellid amphipods, specifically the species Caprella mutica. They are particularly interested in the species'
  natural distribution, biology, and ecology, as well as its impacts on marine special areas of conservation (SACs) designated for biogenic reefs. They are also interested in the species' introduction to
  North America and its method of introduction to the UK, as well as its abundance and distribution in high concentrations during certain months. They are interested in the species' potential for aquaculture
  and its effects on SACs.
