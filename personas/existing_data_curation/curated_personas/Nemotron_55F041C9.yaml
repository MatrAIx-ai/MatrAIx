personas:
  professional: Maria Trujillo, a 37‑year‑old real‑estate broker in Antrim County, blends data‑driven market analysis, bilingual negotiation, and eco‑focused digital marketing with an energetic, sociable
    style that turns open houses into community gatherings while her practical curiosity drives continuous adoption of green‑building certification tools.
  sports: Maria Trujillo embraces an active lifestyle through weekly hikes along the Central Lake trail, summer kayaking with the Central Lake Kayak Club, Zumba and spin classes at FitPulse Studio, and
    she cheers for the Detroit Lions and Detroit Pistons while dancing salsa at local community festivals.
  arts: Maria Trujillo, a fan of modern architecture, frequently peruses Zaha Hadid’s work in design magazines, attends live salsa nights at Casa de los Sueños featuring artists like Celia Cruz, and supports
    the Antrim County Community Theater’s productions of classic Latin American plays.
  travel: Maria Trujillo prefers purposeful travel, planning weekend getaways to the vineyards of Napa Valley and cultural immersion trips to Oaxaca and Kyoto, balancing her love of nature with a desire
    to sample local crafts, all while budgeting her trips to fit her financing goals.
  culinary: Maria Trujillo experiments in her kitchen, mastering traditional dishes such as mole poblano, carnitas tacos, and fresh salsa verde, while creatively fusing flavors like kimchi‑topped quesadillas,
    and sources ingredients from her vegetable garden, especially heirloom tomatoes, cilantro, and poblano peppers.
  core: Maria Trujillo is a socially‑charged, data‑savvy real‑estate broker whose love of sustainable homes, salsa rhythm, and garden‑fresh cooking fuels a relentless drive tempered by a habit of over‑worrying
    about every detail.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a bicultural household, celebrating traditions such as Día de los Muertos and Mexican holidays while embracing Midwestern values of
    community and self‑reliance. Bilingual in Spanish and English, she often bridges cultural gaps for clients and neighbors, offering a welcoming presence in Central Lake's diverse community. Her Mexican
    heritage influences her love for vibrant food, music, and dance, and she actively participates in local cultural events and Mexican community groups. At the same time, she has integrated the practical,
    modest lifestyle of rural Michigan, valuing hard work, neighborly support, and an appreciation for the natural surroundings of Antrim County.
attributes:
