    Management'', ''Conflict Resolution'', ''Technology Adoption (PropTech, Virtual Tours)'']'
  hobbies: '[''Hiking'', ''Kayaking'', ''Group Fitness Classes (Zumba, Spin)'', ''Salsa Dancing'', ''Cooking Mexican Cuisine'', ''Hosting Dinner Parties'', ''Volunteering (English tutoring, community festivals)'',
    ''Reading Architecture and Design'', ''DIY Home Improvement'', ''Gardening'']'
  career_goals: Maria aims to become the leading top‑producing broker in Antrim County, earning recognitions such as the NAR Certified Commercial Specialist and Green Real Estate Design certifications.
    She envisions opening a boutique brokerage focused on eco‑friendly homes and investment properties, where she can mentor new agents and foster a collaborative, supportive culture. Maria also wants to
    increase her visibility as a local market expert through regular media appearances, community workshops, and writing a blog on sustainable home buying. Balancing her ambition with personal well‑being,
    she plans to implement stress‑management practices—mindfulness, structured scheduling, and delegating tasks—to maintain high performance without burnout.
