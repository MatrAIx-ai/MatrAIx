personas:
  professional: Michael Smolcic is a proactive teen problem‑solver who coordinates school group projects and peer‑mentor sessions, applying their basic carpentry, bike‑repair, and photo‑editing skills to
    community tasks while balancing a love of structured planning with a laid‑back, flexible attitude.
  sports: Michael Smolcic dominates the local community gym’s pickup basketball courts, emulating the fast‑break style of the New York Knicks, spends weekends skateboarding at the town park with a crew
    that follows the tricks of Tony Hawk’s legacy, and hikes the Catskill trails each summer to build endurance, treating fitness as a social, flexible routine rather than a rigid schedule.
  arts: Michael Smolcic channels their creative spirit through acoustic renditions of Bob Dylan and John Mayer songs, writes simple folk‑rock lyrics inspired by The Avett Brothers, captures short performance
    videos edited with iMovie and Photoshop, and occasionally performs at neighborhood gatherings, using music as both a personal outlet and a way to connect with friends.
  travel: Michael Smolcic prefers spontaneous, budget‑friendly road trips, often joining family outings to hike the Catskill Mountains or fish along the Hudson River, while dreaming of a backpacking adventure
    through the Canadian Rockies and a summer surf break in Puerto Rico, balancing a love of nature with the constraints of a teen’s limited allowance.
  culinary: Michael Smolcic enjoys cooking simple, satisfying meals like pepperoni pizza topped with fresh mozzarella and basil, pan‑seared Hudson River trout seasoned with lemon, dill, and garlic, and
    hearty chili con carne, though they often resort to microwave mac & cheese and gaming‑night pizza rolls when homework piles up.
  core: Michael Smolcic is a hands‑on, community‑focused teen who blends a love for structured projects with a laid‑back, spontaneous vibe, always ready to fix a bike or lend an ear, but habitually procrastinates
    on school paperwork and forgets to bring their inhaler to the court.
background:
  cultural: Michael is a white American raised in Craryville, a small hamlet in Columbia County, New York. His family’s surname hints at Eastern European ancestry, though his upbringing has been rooted
    in the rural, community‑oriented culture of upstate New York. He grew up participating in town fairs, high‑school sports events, and seasonal celebrations like the Fourth of July parade and the harvest
    festival. These experiences have instilled in him a strong sense of self‑reliance, community responsibility, and an appreciation for the natural landscape that surrounds his hometown.
