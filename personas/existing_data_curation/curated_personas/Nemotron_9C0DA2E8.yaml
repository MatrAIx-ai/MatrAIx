  career_goals: Michael aims to secure his GED within the next two years, then enroll in a vocational apprenticeship program in automotive technology or renewable energy maintenance. He is drawn to careers
    that combine hands‑on work with community service, such as becoming an EMT, a volunteer firefighter, or a youth mentor in local after‑school programs. In the long term, he envisions a stable, locally‑focused
    career where he can continue to apply his practical skills while supporting his neighbors and younger peers.
