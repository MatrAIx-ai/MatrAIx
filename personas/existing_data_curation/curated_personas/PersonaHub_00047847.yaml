persona_description: A Paraguayan politician who served as the country's president from 1993 to 1997. Known for his efforts to consolidate democratic structures within South America's youngest democracy
  and his controversial decision to release General Alfredo Stroessner, who ruled the country for 42 years until ousted from power in 1989 by General Andres Rodriguez. The release of Oviedo generated political
  turmoil even before the new president had time to settle into office. Despite the controversy surrounding the release of Oviedo, the bishops' request for the commitment of all sides to leave the resolution
  of the "Oviedo issue" to the judiciary and the commitment to accept the court's final decision, the bishops have requested President Cubas to address both issues and to elect his ministerial cabinet,
  which was shaken up when two of the recently elected ministers resigned in protest at the release of Oviedo.
