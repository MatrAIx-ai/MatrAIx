persona_description: This is a website designed for students, parents, and teachers who are looking to understand and plot coordinates on a Cartesian plane. The website is intended to be fun and engaging,
  with detailed designs that can be completed in 2 days. The creator of the website is a math teacher who specializes in teaching students how to plot coordinates in all four quadrants, and who is currently
  expanding the website to include CoordinArt plotting practice in Quadrant I. The website aims to provide teachers with strategies to promote successful plotting of coordinates and to provide students
  with practice in this skill throughout the year.
