personas:
  professional: Maryk Redden, a 26‑year‑old architect in the process of earning their NC license, leverages AutoCAD, Revit, and SketchUp to deliver cost‑effective, code‑compliant residential designs that
    honor regional traditions while balancing a pragmatic, routine‑driven workflow with occasional spontaneous material experiments.
  sports: Maryk Redden enjoys weekend hikes at Crowders Mountain State Park, follows the Carolina Hurricanes for hockey, the Charlotte Hornets for basketball, and participates in a local running club that
    meets for casual 5‑k runs every Saturday morning.
  arts: Maryk Redden finds creative balance in quilting intricate patchwork patterns while listening to Bob Dylan, Fleet Wood Mac, and the Avett Brothers, and reads historical fiction by Ken Follett to
    inspire their design sketches, often citing the architectural work of Frank Lloyd Wright as a visual muse.
  travel: Maryk Redden favors mixed‑mode trips that combine careful itinerary planning with spontaneous detours, having explored Asheville’s Biltmore Estate, Charleston’s historic district, and a weekend
    getaway to Portland’s food scene, while dreaming of a sustainable retreat in the Lake District of England within a modest budget.
  culinary: Maryk Redden delights in preparing classic dishes like shrimp and grits, fried chicken, and collard greens seasoned with home‑grown rosemary and thyme, while experimenting with new recipes that
    blend spice‑infused marinades and seasonal vegetables harvested from their backyard garden.
  core: Maryk Redden blends a love of routine with occasional bursts of spontaneity, navigating a career in architecture, a garden, and quilting while juggling a relaxed approach to finances and a habit
    of misplacing receipts.
background:
  cultural: Maryk grew up in a small‑town setting in North Carolina, where Southern hospitality, strong community ties, and respect for tradition were central to everyday life. Her family includes generations
    of skilled tradespeople, which fostered her practical, hands‑on approach to problem‑solving. While she pursued a modern STEM education, she remains connected to local customs, participating in occasional
    church gatherings and regional events such as farmers markets and heritage festivals. This blend of contemporary professional training and rooted Southern cultural values informs her preference for
    functional design, historic preservation, and community‑focused projects.
