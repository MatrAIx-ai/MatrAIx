  hobbies: '[''Gardening'', ''Southern Cooking'', ''Reading Historical Fiction'', ''Architectural Magazine Subscription'', ''Hiking'', ''Quilting'', ''Volunteering with Habitat for Humanity'', ''Attending
    Farmers Market'', ''Classic Rock Listening'']'
  career_goals: Maryk aims to earn her NC architectural license within the next two years and advance to a senior architect role at her regional firm, where she can lead design teams on residential and
    modest commercial projects. She seeks to build a reputation for delivering reliable, cost‑effective designs that honor local traditions while incorporating modern efficiency. Over the longer term, she
    envisions opening a boutique practice focused on sustainable, community‑oriented homes in Iredell County, balancing a stable routine with the flexibility to choose projects that align with her practical
    values. She also hopes to mentor junior architects and contribute to historic preservation efforts in the area.
