personas:
  professional: Paige Taylor is a 14‑year‑old middle‑school student with a budding talent for concept art and digital illustration, channeling a love for fantasy literature into character designs while
    balancing schoolwork with a preference for structured creative projects and occasional brainstorming sessions, and they often seek feedback from online art communities to refine their style.
  sports: Paige Taylor is a 14‑year‑old who swims regularly at the local community pool and joins the Beachside Aquatics Club for structured lap sessions, follows the Miami Dolphins and Orlando Magic for
    weekend excitement, and they use swimming as a calm anchor while occasionally skipping workouts when anxiety spikes.
  arts: Paige Taylor is a 14‑year‑old budding character illustrator who draws inspiration from Studio Ghibli’s Hayao Miyazaki, Ross Tran’s dynamic tutorials, and the mythic world‑building of J.R.R. Tolkien,
    and they spend afternoons sketching fantasy creatures while curating indie pop playlists to set the creative mood.
  travel: Paige Taylor is a 14‑year‑old who prefers well‑planned road trips to familiar Florida spots like the Keys and Orlando’s theme parks, yet daydreams about a backpacking adventure to the United Kingdom’s
    Harry Potter filming sites, balancing family budget limits with the desire for magical, story‑laden travel experiences, and they often map out itineraries with colorful markers.
  culinary: Paige Taylor is a 14‑year‑old with a moderate cooking skill who loves homemade pizza with fresh mozzarella, mango‑infused smoothies, and shrimp tacos spiced with lime, often experimenting in
    the kitchen while they occasionally burn the edges of a grilled cheese due to a tendency to get lost in daydreams.
  core: Paige Taylor is a 14‑year‑old artistic dreamer whose structured love for fantasy illustration clashes with a chaotic, anxiety‑filled inner world, prompting them to seek solace in swimming, animal
    shelter volunteering, and meticulously curated playlists, and they often turn to journaling when emotions run high.
background:
  cultural: Paige grew up in a predominantly white, middle‑class suburban neighborhood of Tampa, Florida. Her family carries cultural ties to the American South and Midwest, celebrating traditional holidays
    like Thanksgiving, Christmas, and the Fourth of July, while also participating in local Florida customs such as beach outings, community festivals, and attending springtime food fairs. The region's
    laid‑back coastal vibe influences her love for outdoor activities and water sports, whereas the Southern hospitality of her extended family fosters her kindness and cooperative nature. Her upbringing
    includes regular church attendance in a Protestant congregation, family Sunday dinners featuring comfort food, and exposure to a multicultural city environment that broadens her appreciation for diverse
    perspectives, even though her immediate cultural practices remain rooted in mainstream American traditions.
