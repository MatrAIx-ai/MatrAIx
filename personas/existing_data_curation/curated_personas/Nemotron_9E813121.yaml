  career_goals: Paige dreams of a future where she can work closely with animals, envisioning roles such as a veterinary technician, wildlife rehabilitator, or animal shelter volunteer that allow her to
    make a tangible difference. She also hopes to keep a creative outlet, perhaps pursuing illustration or graphic design part‑time. Her career aspirations prioritize a blend of structured responsibilities—like
    routine animal care procedures—and the flexibility needed to manage her emotional wellbeing and maintain personal interests.
