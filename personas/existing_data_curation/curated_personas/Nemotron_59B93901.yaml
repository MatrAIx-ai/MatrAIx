personas:
  professional: Jerry Thomas, a 22‑year‑old aspiring electrician, leverages his disciplined time‑management and hands‑on DIY repair skills to meticulously plan community‑college coursework, apprentice projects,
    and future contracting ventures while also guiding peers in small‑group study sessions.
  sports: Jerry Thomas, a 22‑year‑old active participant in the Seattle‑area 'Northwest Hoops' basketball pickup league, cycles the Burke‑Gilman Trail thrice weekly, hikes the Columbia River Gorge on weekends,
    and roots for the Seattle Seahawks while admiring the Seattle Kraken’s precision on ice.
  arts: Jerry Thomas, an avid curator of eclectic playlists, blends Miles Davis jazz, Kendrick Lamar’s hip‑hop verses, and Erykah Badu’s soul tracks while occasionally attending live jazz sessions at the
    historic Jazz Alley and quoting favorite passages from technology biographies during conversations.
  travel: Jerry Thomas, a methodical 22‑year‑old traveler, has trekked the rugged North Cascades, explored downtown Vancouver, and dreams of visiting Japan’s tech hubs and Italy’s Renaissance museums, always
    planning itineraries down to the last bus schedule and budgeting each trip with his spreadsheet.
  culinary: Jerry Thomas, a practical home‑cook at 22, prefers grilled salmon with lemon‑dill glaze, spicy ramen bowls, and craft coffee made with a French press, often experimenting with homemade trail‑mix
    recipes while occasionally relying on the neighborhood food pantry for quick meals.
  core: Jerry Thomas, a disciplined 22‑year‑old tinkerer, balances meticulous planning with spontaneous hobby splurges, turning every project—from wiring a house to curating a jazz playlist—into a personal
    quest for order and growth.
background:
  cultural: Jerry grew up in Tacoma’s Eastside, a community with a strong African‑American presence. His family places a high value on education, faith, and mutual support, with Sunday services at a local
    Baptist church shaping his early years. He celebrates cultural milestones such as Juneteenth and family reunions that feature soul food and storytelling that connect him to his Southern roots. The Pacific
    Northwest’s outdoor culture also influences him, as he often explores local parks and trails with friends. He is aware of social justice issues affecting Black communities and occasionally engages with
    local advocacy groups, reflecting a blend of cultural pride and civic responsibility.
attributes:
  skills: '[''Time management'', ''Project planning'', ''Basic computer troubleshooting'', ''DIY home repair'', ''Personal budgeting'', ''Small-group facilitation'', ''Automotive maintenance basics'', ''Self-directed
    learning'']'
  hobbies: '[''Reading non-fiction'', ''Model building'', ''Cycling'', ''Hiking'', ''Strategy video games'', ''Basketball'', ''Listening to jazz, hip‑hop, and soul music'', ''Volunteering at a food pantry'']'
  career_goals: Jerry aims to translate his practical skill set into a stable, upward‑mobile career. He plans to enroll in a community‑college trade program to become a certified electrician, leveraging
    his DIY experience. After completing an apprenticeship, he intends to work in the construction sector, eventually obtaining a journeyman license and launching his own contracting business within five
    years. In parallel, he hopes to pursue certifications in project management to broaden his career options and possibly mentor other young people from his neighborhood.
