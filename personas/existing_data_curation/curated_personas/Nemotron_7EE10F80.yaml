  career_goals: She aims to become a senior full‑stack engineer within the next three years, leveraging her artistic sensibility to lead product teams that create culturally resonant digital experiences.
    Lashonda plans to earn a certification in Cloud Architecture (AWS) and pursue a master’s degree in Human‑Computer Interaction to deepen her expertise in inclusive design. Ultimately, she envisions founding
    a startup that merges interactive art installations with immersive web technologies, and she is committed to mentoring other Black women entering tech, advocating for greater diversity and representation.
