personas:
  professional: Lashonda King, a 25‑year‑old full‑stack engineer with a flair for visual storytelling, leverages her curiosity and methodical organization to deliver test‑driven React and Django applications
    that prioritize inclusive design, while her competitive edge pushes her teams toward high‑impact product releases.
  sports: Lashonda King supports the Jacksonville Jaguars and follows the Miami Heat, trains with the River Runners running club for weekend jogs along the St. Johns River, practices yoga at Soul Flow Yoga
    studio, and joins a community beach volleyball league each summer, balancing a competitive drive with a laid‑back love for outdoor activity.
  arts: Lashonda King spends her evenings watercolor‑painting scenes inspired by the works of Kehinde Wiley and listening to Solange’s latest album while curating a digital illustration series that blends
    Afro‑centric motifs with speculative fiction narratives, and she frequently visits the Cummer Museum to study pieces by Romare Bearden.
  travel: Lashonda King prefers meticulously planned trips that blend cultural immersion and tech inspiration, having explored Savannah’s historic squares, New Orleans’ jazz scene, and a recent solo visit
    to Berlin’s street‑art districts, while dreaming of a future immersion in Accra’s emerging tech hub, albeit constrained by a modest travel fund.
  culinary: Lashonda King enjoys cooking soul‑food classics with a modern flair—such as miso‑glazed shrimp and grits, kimchi‑topped chicken and waffles, and collard greens sautéed with ginger—while harvesting
    fresh basil, cilantro, and okra from her balcony herb garden, and they occasionally over‑salt dishes while experimenting with new flavor combos.
  core: Lashonda King is a curious, organized technologist who fuses art and inclusive design, balances disciplined ambition with spontaneous creative bursts, and channels community‑centric values into
    every project.
background:
  cultural: Born and raised in Jacksonville, Florida, Lashonda grew up in a close‑knit Black community where church, family gatherings, and local cultural festivals shaped her worldview. Her heritage is
    steeped in Southern Black traditions—gospel music, soul food, storytelling, and a strong emphasis on community empowerment. She actively participates in events like Juneteenth celebrations and supports
    organizations such as Black Girls Code and local STEAM outreach programs. This cultural foundation informs her aesthetic preferences, prompting her to incorporate Afro‑centric motifs and narratives
    into her digital designs, and fuels her drive to create technology that amplifies underrepresented voices.
