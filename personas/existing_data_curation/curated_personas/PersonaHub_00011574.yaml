persona_description: A scientist with a passion for understanding the complex and intricate relationships between living organisms and their environment, particularly in the soil. This individual is dedicated
  to learning about and studying the mycorrhizal soil fungi that collaborate with plants, enabling both to succeed where independently they probably would not. They are curious, persistent, and driven to
  uncover the ecological roles of these fungi and their importance in maintaining the balance of the ecosystem. This persona is also interested in the use of these fungi for ecological services and their
  potential to be recruited to provide these services for human use.
