personas:
  professional: A meticulous MRI technologist, Carmen Mason blends their expertise in high‑field scanner operation and Python‑based image post‑processing with a curious drive to pioneer functional and diffusion
    imaging protocols, while their organized, reliable nature ensures flawless daily workflow and patient comfort.
  sports: An energetic trail runner and weekend yogi, Carmen Mason belongs to the Boise Trails Club, hits the CrossFit box for strength training, and passionately roots for the Boise State Broncos football
    team in the fall and the Idaho Steelheads hockey squad in the winter, balancing outdoor cardio with indoor conditioning.
  arts: A creative sketcher and improv enthusiast, Carmen Mason draws inspiration from Yayoi Kusama’s immersive installations and the whimsical murals of local Boise artist Katie Slutz, regularly visits
    exhibitions at the Boise Art Museum, and rehearses improv scenes flavored by Tina Fey’s witty timing, letting art and performance fuel their sociable spirit.
  travel: A detail‑oriented explorer, Carmen Mason meticulously plans weekend road trips through the Boise foothills, has trekked the Grand Teton National Park, and dreams of a solo backpacking journey
    across the Scottish Highlands, balancing limited savings with a craving for cultural immersion and scenic photography.
  culinary: A culinary experimenter, Carmen Mason whips up Thai‑Italian fusion dishes like Pad Thai carbonara using lemongrass, miso, and pancetta, enjoys mastering the perfect balance of spicy Szechuan
    pepper in a mozzarella‑stuffed ramen burger, and delights in sourcing fresh basil and heirloom tomatoes at the Boise farmers’ market for weekend dinner parties.
  core: Carmen Mason blends a razor‑sharp technical mind with boundless artistic curiosity, juggling MRI protocols, trail runs, and spontaneous improv, yet often forgets to water their houseplants until
    the next rainstorm.
background:
  cultural: Carmen was raised in a middle‑class white family with German and Irish ancestry in the Pacific Northwest, later settling in Boise, Idaho. Her upbringing emphasized education, self‑reliance,
    and a strong work ethic, while also encouraging curiosity about the wider world. The Idaho community’s focus on outdoor recreation, neighborly cooperation, and modest, independent living shaped her
    values. She maintains a deep appreciation for the region’s natural landscapes and cultural offerings, integrating both into her personal and professional life.
attributes:
  skills: '[''Magnetic resonance imaging operation'', ''MRI safety compliance and patient screening'', ''Design and optimization of imaging protocols'', ''Radiology Information System (RIS) management'',
    ''PACS image archiving and retrieval'', ''Equipment calibration and routine quality assurance'', ''Technical troubleshooting of MRI hardware and software'', ''Basic Python scripting for image processing'',
    ''Patient positioning, education, and comfort'', ''Clinical research support and data documentation'', ''Effective interdisciplinary communication'', ''Team coordination and collaboration'', ''Time
    management and workflow optimization'', ''Instruction and mentorship of junior staff'']'
  hobbies: '[''Landscape photography'', ''Hiking and trail running in the Boise foothills'', ''Visiting art galleries and museum exhibitions'', ''Sketching and mixed‑media art'', ''Yoga and Pilates practice'',
    ''Improv theater workshops'', ''Volunteering at community health fairs'', ''Cooking experimental dishes'', ''Reading science‑fiction and technology nonfiction'', ''Traveling to national parks and cultural
    festivals'']'
  career_goals: Carmen aims to achieve ARRT certification and pursue a master's degree in biomedical imaging to deepen her technical expertise. She envisions advancing to a senior MRI technologist role,
    eventually becoming the lead imaging specialist or manager of the radiology department at a major hospital in Boise. Her curiosity drives her to develop innovative MRI protocols, especially in functional
    and diffusion imaging, and to contribute to clinical research publications. Long‑term, she hopes to teach MRI technology courses at a community college or vocational program, sharing her knowledge and
    fostering the next generation of imaging professionals.
