  atmospheric monitoring, and is responsible for overseeing the mission's development and implementation. They are likely to have a deep understanding of the mission's objectives, instruments, and the role
  they play in monitoring air quality and aerosols over Europe. They may also have experience in project management, data analysis, and communication with stakeholders.
