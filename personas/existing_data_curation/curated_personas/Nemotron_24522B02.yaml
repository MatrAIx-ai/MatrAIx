  hobbies: '[''Viewing picture books with bright illustrations'', ''Listening to lullabies and rhythmic songs'', ''Playing with soft textured toys'', ''Exploring backyard grass and sand'', ''Watching colorful
    lights at family gatherings and festivals'']'
  career_goals: Although still an infant, Adrienne displays early signs of a desire to create and to help others. Her parents notice her fascination with colors and music and imagine a future where she
    might pursue creative paths such as a community artist, early‑child educator, or a role that blends artistic expression with compassionate service, aiming to foster harmony and inspire imagination in
    those around her.
