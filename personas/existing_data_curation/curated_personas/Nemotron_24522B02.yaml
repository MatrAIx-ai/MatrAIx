personas:
  professional: Adrienne Selinsky, a one‑year‑old explorer, currently observes and imitates the collaborative dynamics of their parents at work, displaying early curiosity about adult tasks through playful
    mimicry of typing and phone conversations, which foreshadows a future inclination toward teamwork and flexible problem‑solving, and they often try to ‘help’ by handing over crayons to a laptop.
  sports: Adrienne Selinsky, who delights in the splash‑filled toddler swim class at the Norfolk Aquatics Center and waves a miniature Norfolk Tides baseball cap during family picnics, also attends a parent‑child
    gymnastics club that encourages early coordination, reflecting their love of water and a gentle team‑spirit activity for them, and they splash joyfully in the shallow pool during each lesson.
  arts: Adrienne Selinsky, who brightens up during weekly storytime at the Norfolk Public Library and giggles at the gentle folk tunes of John Denver and the playful melodies of Disney’s 'Moana', often
    creates finger‑paint swirls inspired by the vibrant exhibits at the nearby Chrysler Museum, merging their curiosity with a budding appreciation for visual and musical arts, and they often hum along
    to the soft music inside the museum.
  travel: Adrienne Selinsky, who has taken family trips to the sandy shores of Virginia Beach, the historic waterfront of downtown Norfolk, and a weekend road‑venture to Shenandoah National Park, prefers
    short car rides with a favorite plush gull and is fascinated by the sea breeze that greets them at each new coastal stop, and they eagerly point out seashells along the boardwalk.
  culinary: Adrienne Selinsky, whose palate shows a sweet spot for creamy mashed sweet potatoes, bite‑size shrimp gumbo, and buttery biscuits drizzled with honey, loves to help stir the pot while they hum
    along to the rhythmic clatter of kitchen utensils, and they often request the aromatic aroma of fresh cornbread from the oven.
  core: Adrienne Selinsky blends an ocean‑kissed upbringing with a gentle curiosity, compassionate cooperation, and a delightfully disorganized charm that turns everyday moments into tiny adventures for
    them, and they greet each new day with wide‑eyed wonder.
background:
  cultural: Adrienne is raised in a white family in Norfolk, Virginia, a coastal city steeped in Southern maritime culture. Her upbringing blends traditional Southern customs—family meals, church attendance,
    and holidays such as Thanksgiving and Fourth of July fireworks—with the diverse influences of the nearby naval community and local arts offerings like the Chrysler Museum. Growing up near the Atlantic,
    she is often surrounded by the sounds of gulls, the scent of sea breeze, and community events that celebrate both heritage and creativity.
attributes:
  skills: '[''Reaching and grasping colorful toys'', ''Crawling to explore surroundings'', ''Babbling simple sounds'', ''Recognizing familiar faces'', ''Following moving objects'', ''Responding to music
