  hobbies: '[''Community baseball league'', ''Attending local car shows'', ''DIY automotive repairs'', ''Hiking in the Arizona desert'', ''Barbecue cooking and social gatherings'', ''Listening to classic
    rock music'', ''Volunteering at local charity events'']'
  career_goals: Martin aims to advance from a parts salesperson to a regional sales manager within the next five years, overseeing multiple locations and mentoring new staff. He is also interested in specializing
    in electric‑vehicle components, leveraging his curiosity about new technologies. To support this growth, he plans to earn a high‑school equivalency diploma and complete a short certification in supply‑chain
    management, while continuing to refine his organizational habits to handle larger responsibilities.
