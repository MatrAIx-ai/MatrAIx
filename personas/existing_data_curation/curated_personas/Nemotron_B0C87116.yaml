personas:
  professional: Martin Evans, a 46‑year‑old automotive parts salesperson, blends deep product knowledge, inventory savvy, and a personable, flexible approach to guide customers toward the right components
    while eyeing a future as a regional manager specializing in electric‑vehicle parts.
  sports: Martin Evans pitches for the Desert Sun Sluggers community baseball league, cheers avidly for the Arizona Diamondbacks and Arizona Cardinals, hikes with the local Arizona Trail Association, and
    heads out for weekend fishing trips at Lake Pleasant, preferring group activities that combine fitness with camaraderie.
  arts: Martin Evans immerses himself in classic rock, spinning The Eagles, Led Zeppelin, and Pink Floyd on his vintage record player, attends local car‑show displays that double as design showcases, and
    enjoys occasional trips to the Phoenix Theatre to see productions of classic American plays.
  travel: Martin Evans favors spontaneous road trips across the Southwest, having explored Sedona’s red rocks, the Grand Canyon, and a music‑laden weekend in Austin, while dreaming of a cross‑country drive
    to Detroit’s automotive museums and a tech‑focused tour of Tokyo’s EV industry hubs.
  culinary: Martin Evans excels at backyard barbecuing, perfecting smoked brisket, grilled corn with chipotle butter, and homemade guacamole, while also whipping up quick fish tacos with cilantro‑lime slaw,
    favoring ingredients like smoked paprika, cumin, and fresh jalapeños.
  core: Martin Evans, a gregarious 46‑year‑old automotive parts guru, mixes a love for hands‑on community projects with a laid‑back, slightly chaotic approach, always ready to fire up the grill, swing a
    baseball bat, and chat about the latest EV tech.
background:
  cultural: Martin grew up in a middle‑class, white American family in the Southwest, where self‑reliance and community ties are valued. The desert environment of Peoria, AZ, shaped his love for the outdoors
    and a laid‑back lifestyle. His upbringing emphasized practical skills, friendly neighborliness, and a respect for hard work, all of which influence his approachable demeanor and his willingness to help
    others while staying open to new ideas.
attributes:
  skills: '[''Inventory Management'', ''Customer Service'', ''Product Knowledge (Automotive Parts)'', ''Sales Negotiation'', ''Logistics Coordination'', ''Basic Mechanical Diagnostics'', ''CRM Software
