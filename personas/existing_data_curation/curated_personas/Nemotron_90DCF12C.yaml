  career_goals: Kassia aims to solidify her role as a senior IT specialist within a stable organization, pursuing certifications such as CompTIA Security+ and Microsoft Azure Administrator to deepen her
    expertise. Over the next five years she hopes to transition into an IT manager or security compliance lead, where she can apply her structured approach to guide a small team, mentor junior staff, and
    shape policies that reduce operational stress for end‑users. She also prioritizes work‑life balance, seeking flexible or hybrid work arrangements that allow her dedicated alone‑time for self‑care.
