  career_goals: Although officially retired, Ao Gu Do remains driven to apply his curiosity and practical mindset to benefit his community. He aims to establish a neighborhood maker‑lab where seniors and
    youth can co‑create technology projects, offering hands‑on mentorship and fostering intergenerational learning. He plans to develop a series of accessible workshops on basic coding, microcontroller
    tinkering, and digital literacy tailored for older adults. Ao also aspires to document and share his engineering experiences through a memoir and a set of guidebooks that blend traditional engineering
    principles with emerging technologies like AI and IoT. In collaboration with local cultural organizations, he seeks to curate events that celebrate East Asian heritage while highlighting the contributions
    of Asian‑American scientists. Ultimately, he hopes to leave a legacy of empowered community members who confidently bridge tradition and innovation.
