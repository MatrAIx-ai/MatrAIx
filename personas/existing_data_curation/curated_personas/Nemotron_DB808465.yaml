personas:
  professional: Ao Do is a retired electrical and systems engineer whose boundless curiosity and ease at public speaking now fuels a community maker‑lab, where they serve as the charismatic hub translating
    decades of circuit design, PCB layout, embedded firmware (C and Python) and signal‑processing expertise into accessible hands‑on workshops that unite seniors and youth, all while maintaining an organized
    yet flexible project schedule reflective of a disciplined work ethic.
  sports: Ao Do is an avid walker who trails the Patuxent River Trail five times a week, joins a weekly pickleball league at the Bowie senior center, follows the Washington Capitals hockey team and the
    Washington Nationals baseball team for occasional game outings, and occasionally plays casual tennis with neighbors, blending low‑impact exercise with a love for local sports fandom.
  arts: Ao Do is a spirited community‑theatre actor and science‑fiction aficionado who regularly stages performances of classic plays, cites William Gibson and Liu Cixin as favorite authors, enjoys the
    cello virtuosity of Yo‑Yo Ma, and includes the filmography of Ang Lee in weekend movie marathons, using these artistic passions to fuel lively discussions at book clubs and cultural workshops.
  travel: Ao Do is a seasoned explorer who loves weekend getaways to the historic gardens of Suzhou during Lunar New Year, annual road trips to Shenandoah National Park for autumn foliage, frequent visits
    to the Smithsonian museums in Washington, D.C., and a planned cultural immersion in Seoul’s lantern festivals, balancing travel enthusiasm with a modest budget and occasional companion constraints.
  culinary: Ao Do is a culinary hobbyist who deftly prepares classic dim sum items like siu mai and har gow alongside inventive fusion dishes such as ginger‑sesame tofu tacos, favors ingredients like bok choy,
    shiitake mushrooms, fresh cilantro, and hojicha tea, enjoys cooking for neighborhood potlucks, but occasionally over‑spices the dishes in the excitement of hosting, and fervently collects rare soy sauces
    and chili pastes.
  core: Ao Do is a talkative, curious retiree who melds engineering precision with cultural tradition, turning senior‑center gatherings into lively maker‑lab adventures while nurturing community and lifelong
    learning.
background:
  cultural: Ao Gu Do is the son of immigrants from East Asia who settled in the Washington, DC metropolitan area during the 1970s. Raised in a bilingual household in nearby Hyattsville, he grew up respecting
    the Confucian values of education, filial piety, and community harmony while also embracing the individualism and openness of American culture. Celebrations of Lunar New Year, Mid‑Autumn Festival, and
    ancestral rites remain integral to his family life, and he often shares these traditions with neighbors through cultural workshops. His heritage has shaped his disciplined work ethic, reverence for
    mentorship, and love of communal gatherings such as kitchen table meals and group games. Living in Bowie, MD, he balances his cultural roots with active participation in local civic groups, reflecting
    a hybrid identity that honors both his ancestral lineage and his American experience.
