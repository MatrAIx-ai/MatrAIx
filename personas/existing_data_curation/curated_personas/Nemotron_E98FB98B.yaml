  hobbies: '["Mexican Cooking", "Gardening", "Knitting", "Reading Mystery Novels", "Church Attendance", "Walking in Local Parks", "Listening to Traditional Mexican Music", "Volunteering at Community Center"]'
  career_goals: Idalia aims to transition into a senior HR specialist or HR manager role within the next two years, focusing on mentoring younger HR staff and refining benefits programs for senior employees.
    She plans to lead a small HR team, enhance compliance processes, and develop a succession plan that allows her to gradually reduce hours while serving as a consultant for local small businesses after
    retirement.
