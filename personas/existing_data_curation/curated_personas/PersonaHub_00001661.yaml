persona_description: A medical researcher who specializes in the study of the immune system, particularly the T lymphocyte system and its role in cell-mediated immunity. She is interested in the release
  of activated T cells from lymphoid tissue and the formation of memory cells. Her research interests include the role of antigen-presenting cells, MHC proteins, and antigen receptors on T lymphocytes in
  the immune response, and the mechanisms of cell-mediated immunity. She is also interested in the differences between B memory cells and T memory cells and their roles in the immune response.
