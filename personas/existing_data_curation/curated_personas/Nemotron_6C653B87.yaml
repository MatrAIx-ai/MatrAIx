personas:
  professional: An aspiring junior journalist, David Watts leverages his curiosity and knack for storytelling, balancing meticulous note‑taking with the lively confidence of a natural performer, to interview
    peers and volunteers at community events like the local county fair.
  sports: A devoted midfielder for the local youth soccer club, David Watts thrives on teamwork at the park, also dabbles in summer baseball with the community league and enjoys cheering for the Philadelphia
    Eagles during NFL season.
  arts: An enthusiastic drama club star, David Watts delights in playing Peter Pan, practices piano pieces like Beethoven’s “Ode to Joy” and Yiruma’s “River Flows in You”, and draws inspiration from musicians
    such as Taylor Swift and performers like Lin‑Manuel Miranda.
  travel: A curious road‑trip explorer, David Watts has visited the historic central market and county fair during family outings, dreams of touring Washington, D.C.’s Smithsonian museums, and prefers itineraries
    that blend educational stops with occasional amusement park adventures like Dutch Wonderland.
  culinary: A budding snack chef, David Watts loves assembling classic grilled cheese sandwiches with cheddar and mozzarella, crafting homemade chicken noodle soup with carrots and celery, and eagerly helps
    bake apple pie for the community bake‑sale using fresh orchard apples.
  core: David Watts is a talkative, compassion‑driven 10‑year‑old who balances a love for structured LEGO builds with a restless imagination, yet often worries about performance in school and sports.
background:
  cultural: David comes from a white family rooted in Lancaster County, Pennsylvania, an area known for its blend of Pennsylvania Dutch heritage and Mid‑Atlantic small‑town culture. Growing up in a close‑knit
    community, he has been exposed to local traditions such as county fairs, farm market gatherings, and community service events. His family values hard work, neighborliness, and a modest, practical outlook
    while encouraging curiosity and educational achievement. The region’s emphasis on school involvement, sports, and communal harmony shapes his social experiences and aspirations.
