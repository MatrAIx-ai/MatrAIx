  hobbies: '[''soccer'', ''LEGO building'', ''reading adventure and science‑fiction books'', ''drama club acting'', ''piano playing'', ''volunteering at the community library'']'
  career_goals: David aspires to become a teacher or a pediatric nurse, driven by his desire to help other children and foster a caring environment. He also dreams of working in a community center where
    he can organize activities for youth, and he hopes to pursue a career that blends creativity with practical impact, such as environmental education. In the short term, he aims to maintain strong grades,
    take on leadership roles in school clubs, and volunteer in neighborhood projects.
