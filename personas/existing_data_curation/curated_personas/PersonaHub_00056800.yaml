persona_description: A scientist and entomologist working at the Center for Medical, Agricultural and Veterinary Entomology, Gainesville, Florida, who specializes in the study of noctuid moths, their behavior,
  and their potential as pest control agents. This scientist is responsible for developing and improving population monitoring techniques, alternative control strategies, and the use of synthetic floral
  chemicals to attract and capture noctuid moths, including soybean looper, velvetbean caterpillar, and corn earworm. They have experience with various moth species, including fall armyworm, corn earworm,
  soybean looper, and velvetbean caterpillar, and are skilled in using various trapping techniques and chemical baits to capture and monitor these pests.
