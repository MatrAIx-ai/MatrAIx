  hobbies: '[''reading'', ''listening to music'', ''cooking'', ''gardening'', ''knitting'', ''crossword puzzles'', ''small community gatherings'', ''video chatting with family'']'
  career_goals: Although she is no longer in the formal workforce, Chandrawati aims to stay healthy, independent, and intellectually engaged. She wishes to preserve and pass on family recipes and stories,
    perhaps compiling a modest family cookbook for her grandchildren. She also hopes to volunteer occasionally at the local senior center or cultural association, offering her cooking and gardening knowledge,
    and to ensure her home remains safe and comfortable for herself and any visiting family members.
