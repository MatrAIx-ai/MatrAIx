personas:
  professional: Chandrawati Dewji, a retired household steward and informal community elder, leverages a lifetime of budgeting, first‑aid, and bilingual communication to mediate neighborhood disputes and
    mentor younger families, all while they favor a relaxed, occasionally scatter‑brained approach that values flexibility over strict schedules.
  sports: Chandrawati Dewji follows the local cricket club and the New York Yankees on television, participates in a senior walking group that meets thrice weekly at the community park, and occasionally
    joins weekly bocce games at the senior center, all while they enjoy watching the occasional regional soccer match.
  arts: Chandrawati Dewji enjoys Indian classical ragas by Ravi Shankar, Bollywood ballads sung by Lata Mangeshkar, classic films starring Amitabh Bachchan, novels by Jane Austen and Salman Rushdie, and
    attends intimate poetry recitals at the nearby South Asian cultural center, all while they find inspiration for their own storytelling.
  travel: Chandrawati Dewji enjoys leisurely, well‑planned trips that blend family reunions with gentle sightseeing, having visited her grandchildren’s homes in London, taken a nostalgic tour of Kerala’s
    backwaters, and spent relaxing weekends at Lake Placid, while they dream of a future pilgrimage to the historic forts of Rajasthan.
  culinary: Chandrawati Dewji is a master of traditional South Asian dishes such as dal makhani, butter chicken, and paneer tikka, infusing each with roasted cumin, fresh cilantro, and a pinch of saffron,
    while they experiment with quinoa‑based biryani and seasonal garden herbs, delighting friends at community potlucks with their inventive twists.
  core: Chandrawati Dewji is an 88‑year‑old garden‑loving, crossword‑solving storyteller who blends old‑world recipes with new twists, keeps a modest budget, and occasionally forgets bills, all while they
    quietly champion their community’s cultural heartbeat.
background:
  cultural: Chandrawati was born in a rural village in Gujarat, India, and emigrated to the United States with her husband in the early 1970s. Settling in Sterling Heights, Michigan, she has blended her
    South Asian heritage with Midwestern life. Her cultural identity is shaped by Hindu traditions such as Diwali and Holi, the practice of hospitality through shared meals, and the use of Hindi and Gujarati
    at home. Over the decades, she has built a supportive network of fellow immigrants and local neighbors, drawing strength from both her Indian roots and her adopted community.
