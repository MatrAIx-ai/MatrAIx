persona_description: A researcher or clinician interested in the intersection of medical diagnosis and mental health, particularly in the context of infants with disabilities. This individual is curious
  about how doctors' expectations and mindsets about a baby's potential to do things can affect parents' views of their infant's abilities and well-being, and how this can influence the mental health of
  both the infant and their parents. This persona is likely to be interested in studies that explore the relationship between doctors' expectations and parents' perceptions, as well as the potential benefits
  of positive views of one's infant with a disability.
