personas:
  professional: Mark Morriss, a 57‑year‑old courier, blends meticulous route planning and GPS optimization with a warm, talkative demeanor that keeps customers calm, and they leverage their strong organizational
    skills and empathy to mentor new drivers while eyeing a supervisory role.
  sports: Mark Morriss cycles the extensive Portland bike trails, competes in the River City Sluggers adult softball league, follows the Portland Timbers and Trail Blazers, and they balance disciplined
    weekly rides with spontaneous weekend games and a love for seasonal outdoor activity.
  arts: Mark Morriss frequents Portland’s indie music venues to see The Decemberists and Modest Mouse, enjoys late‑night improv nights with the Rogue Theater, and they capture candid street moments of murals
    by Shepard Fairey and other local artists through their street‑photography hobby.
  travel: Mark Morriss prefers purposeful weekend getaways, having biked the Columbia River Gorge, explored Cannon Beach on the Oregon Coast, and dreaming of a cultural immersion in Kyoto’s Zen gardens,
    and they balance family time and a moderate travel budget.
  culinary: Mark Morriss starts the day with a Stumptown espresso and avocado toast topped with smoked salmon, cooks seasonal ratatouille flavored with fresh basil and rosemary, and they occasionally treat
    friends to a hearty chickpea curry spiced with cumin and turmeric.
  core: Mark Morriss is a sociable, detail‑driven courier who balances a love for community, biking, and coffee with an undercurrent of anxiety that fuels both their meticulous work ethic and their need
    for social connection.
background:
  cultural: Mark grew up in a middle‑class white family in the Pacific Northwest, absorbing the region’s values of practicality, environmental awareness, and community involvement. His upbringing emphasized
    steady work, reliability, and respect for neighbors, which aligns with Portland’s culture of progressive yet grounded community engagement. He embraces the city’s love of biking, locally sourced coffee,
    and support for social causes, while also maintaining traditional family values seen in his long‑term marriage. This blend of pragmatic Midwestern roots and Portland’s eclectic, environmentally conscious
    lifestyle shapes his worldview and informs his interactions both at work and in the community.
attributes:
  skills: '["Route planning and optimization","Time management and scheduling","Customer communication and rapport building","Conflict de‑escalation","First‑aid certification","Bicycle and van maintenance","Handheld
