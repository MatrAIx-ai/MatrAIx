  hobbies: '["Cycling scenic routes","Frequenting local coffee houses","Volunteering at the food bank","Adult softball league","Attending live music and improv comedy","Yoga and journaling for stress management","Street
    photography"]'
  career_goals: Mark aims to move into a supervisory or shift‑lead position within his courier company within the next two years, leveraging his organizational strengths and people‑skills to improve team
    performance. He plans to earn a Certified Transportation Professional (CTP) credential to formalize his logistics expertise. Long‑term, he envisions launching a small, community‑focused courier service
    that emphasizes sustainable practices, reliable service, and a supportive work environment for fellow couriers. Additionally, he hopes to develop a mentorship program that helps new drivers acclimate
    while also providing resources for managing workplace stress.
