  hobbies: '[''Gardening'', ''Quilting'', ''Woodworking'', ''Reading historical fiction'', ''Genealogy research'', ''Book club participation'', ''Volunteer work at community food pantry'', ''Hiking on local
    trails'']'
  career_goals: Arlene aims to progress into a supervisory or plant management role where she can lead continuous‑improvement initiatives, champion workplace safety, and mentor the next generation of workers.
    She intends to earn a Six Sigma Green Belt and become a certified Lean Manufacturing specialist. In the longer term, she envisions transitioning to a consulting capacity, helping other mid‑size manufacturers
    adopt best‑practice processes while maintaining a balanced work‑life schedule as she approaches retirement.
