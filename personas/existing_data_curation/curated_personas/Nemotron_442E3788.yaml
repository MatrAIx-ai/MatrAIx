personas:
  professional: Sherry Lozano, a seasoned nursing assistant with over three decades of bedside care, they rely on meticulous infection‑control protocols, precise vital‑sign tracking, clear electronic health‑record
    documentation, and compassionate mentorship while pursuing CNA certification and a supervisory role.
  sports: Sherry Lozano, an avid walker who joins the James River Seniors Walking Club, they cheer for the Richmond Kickers soccer team and follow the Virginia Cavaliers basketball season, blending gentle
    exercise with community sports enthusiasm.
  arts: Sherry Lozano, a devoted quilter and historical‑fiction lover, they spend evenings stitching while listening to the soulful sounds of Etta James and Mahalia Jackson, and attend performances at the
    Virginia Repertory Theatre, especially period dramas that echo their family’s past.
  travel: Sherry Lozano, a methodical planner of road trips, they favor historic destinations like Colonial Williamsburg, the Blue Ridge Parkway, and a weekend getaway to Charleston, where they combine
    genealogy research at local archives with leisurely strolls through antebellum districts, yet they occasionally postpone bookings due to budgeting worries.
  culinary: Sherry Lozano, a Southern‑cuisine enthusiast, they regularly prepare collard greens simmered with smoked turkey, buttery cornbread, peach cobbler, and shrimp‑and‑grits, savoring garden‑fresh
    tomatoes, okra, and sweet potatoes, and take pride in feeding church gatherings with these home‑cooked classics.
  core: Sherry Lozano is a methodical, community‑focused nurse‑assistant who balances gardening, quilting, and genealogy with a habit of worrying about health and finances, all while maintaining a warm,
    service‑oriented heart.
background:
  cultural: Sherry grew up in suburban Henrico County, part of the greater Richmond area, within a predominantly white, middle‑class community. Her family roots trace back to early 20th‑century Virginia
    settlers, and she was raised with Southern traditions of hospitality, church involvement, and a strong sense of community. She identifies with the cultural values of the American South—emphasis on family,
    respect for elders, and a love of regional cuisine such as barbecue, biscuits, and home‑preserved foods. Coming of age during the social changes of the 1970s, she blends traditional Southern values
    with a pragmatic, forward‑looking mindset, reflecting her curiosity for new ideas while maintaining a practical, methodical approach to life.
attributes:
  skills: '[''Patient care and bedside assistance'', ''Vital signs measurement'', ''Medication administration support'', ''Basic wound care and dressing changes'', ''Infection control procedures'', ''Electronic
    health record documentation'', ''Patient hygiene and mobility assistance'', ''Family communication and education'', ''Team collaboration and shift coordination'', ''Training and mentoring new nursing
    assistants'', ''Basic phlebotomy'', ''First aid and CPR certification'']'
  hobbies: '[''Gardening'', ''Quilting and knitting'', ''Reading historical fiction'', ''Cooking Southern recipes'', ''Attending church services and Bible study'', ''Volunteering at the senior community
    center'', ''Walking in local parks and along the James River'', ''Genealogy research'', ''Listening to classic country and gospel music'', ''Canning and preserving seasonal produce'']'
  career_goals: Sherry aims to deepen her clinical expertise by obtaining a certified nursing assistant (CNA) credential and pursuing a supervisory role within her facility. She hopes to develop a mentorship
    program for newly hired assistants, sharing her methodical approach to patient care and documentation. Long‑term, she is interested in completing a bachelor's degree in nursing to transition into a
    licensed practical nurse (LPN) position, allowing her to take on additional responsibilities while still providing the compassionate, hands‑on care she values. Concurrently, she wants to expand her
    involvement in community health outreach, particularly programs that support seniors in the Henrico and Richmond area.
