persona_description: A cancer immunologist who is conducting research on the distribution of immune and inflammatory cells within tumours over time, and the impact of vitamin C on these cells. The student
  is using vitamin C-dependent GULO-/- mice to investigate the effects of vitamin C on immune cell recruitment and distribution in cancer. The student is conducting immunohistochemistry and immunofluorescence
  on sectioned tumour samples to determine leukocyte localization and numbers, and correlates these with tumour size and vitamin C content of the tumour. The student is also using high performance liquid
  chromatography (HPLC) to measure vitamin C content of the tumour.
