persona_description: A researcher and scientist at the University of Queensland Centre of Excellence for Integrative Legume Research (CILR) who is passionate about the potential of Pongamia Pinnata tree
  for biodiesel production. This person is highly interested in the environmental benefits of using the tree for biodiesel production, the potential for the tree to grow on land not suitable for food crops,
  and the need for further research to determine its productivity under these conditions. This person is also interested in the potential for Pongamia Pinnata to replace crude oil in Australia's biodiesel
  industry.
