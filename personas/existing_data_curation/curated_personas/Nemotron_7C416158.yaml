personas:
  professional: Mercedes Miles is a veteran coastal architect who leverages three decades of experience in sustainable design, historic preservation and adaptive reuse—combining expert BIM, Grasshopper
    parametric modeling and immersive rendering to deliver budget‑conscious, resilient projects while mentoring junior staff and championing compassionate community workshops, they weave their curiosity
    and desire for harmony into every design.
  sports: Mercedes Miles stays fit through sunrise yoga sessions on the beach, joins the Newport Beach Hiking Society for weekend coastal treks, enjoys occasional beach volleyball matches with members of
    the local senior league, follows the Los Angeles Dodgers, Anaheim Ducks and LA Galaxy with a loyal, albeit budget‑conscious, fan’s enthusiasm, and they often debate game statistics over post‑match coffee.
  arts: Mercedes Miles nurtures a vibrant creative life, spending mornings watercolor‑painting the Pacific horizon, capturing downtown Newport’s historic facades through a Leica camera, attending gallery
    openings featuring artists like Ansel Adams, Marina Abramović and local emerging painter Nadia Geller, listening to the contemplative piano works of Ludovico Einaudi, they share insights at the community
    art collective while swapping stories about composition and technique.
  travel: Mercedes Miles embraces slow‑travel to Europe each summer, meticulously planning research trips to study Renaissance architecture in Florence, Moorish influences in Seville, and classical Greek
    columns on the island of Crete, while also indulging in weekend getaways to Big Sur and dreaming of a future pilgrimage to the Amalfi Coast’s cliff‑side villas, they balance adventure with careful budgeting
    to keep their pro‑bono projects funded.
  culinary: Mercedes Miles delights in preparing Mediterranean dishes such as grilled branzino with lemon‑thyme vinaigrette, slow‑cooked ratatouille, and chickpea falafel topped with tahini, often sourcing
    fresh basil, oregano and heirloom tomatoes from the local farmers’ market and adding a garnish of garden‑grown purslane, they occasionaly treat themselves to a tasting menu at Mastro’s for inspiration.
  core: Mercedes Miles balances a meticulous, eco‑focused architectural career with a soulful love for watercolor, yoga, and community service, yet they wrestle with a persistent worry about finances and
    health, often finding solace in garden succulents and spontaneous art purchases.
background:
  cultural: Mercedes grew up in a middle‑class, white family on the West Coast, with parents who valued education, community service, and exposure to the arts. Raised in Orange County during the 1970s and
    1980s, she absorbed the region’s surf‑inspired, environmentally‑conscious lifestyle while also experiencing the cultural diversity of nearby Los Angeles. Her undergraduate studies in a STEM‑focused
    architecture program at a California university expanded her appreciation for innovative design thinking. Frequent family trips to Europe and the American Southwest deepened her respect for historic
    preservation and multicultural aesthetic traditions, shaping a worldview that blends Californian coastal sensibilities with a broad, inclusive appreciation for global art and architecture.
attributes:
  skills: '[''Sustainable coastal architecture'', ''Historic preservation and adaptive reuse'', ''BIM (Revit, ArchiCAD)'', ''Parametric modeling (Grasshopper)'', ''Digital rendering (Enscape, Lumion)'',
    ''Project management'', ''Client relations and stakeholder communication'', ''Interdisciplinary collaboration'', ''Design research and concept development'', ''Mentorship and teaching'']'
  hobbies: '[''Watercolor painting'', ''Architectural photography'', ''Gallery visits and art collective participation'', ''Yoga and mindfulness meditation'', ''Volunteer work with Habitat for Humanity'',
    ''Travel to historic architectural sites'', ''Cooking Mediterranean cuisine'', ''Reading architectural theory and history'', ''Gardening (native succulents, coastal plants)'']'
  career_goals: Mercedes aims to transition from full‑time practice to a consultancy role that emphasizes pro‑bono work for affordable, environmentally‑responsible housing in Orange County. She plans to
    establish a small boutique studio that partners with local non‑profits and municipalities to design community centers and resilient shoreline structures. A long‑term ambition is to author a book that
    chronicles lessons from her coastal projects, blending technical guidance with reflections on compassion‑driven design. She also hopes to serve on the board of the American Institute of Architects’
    California chapter, advocating for mental‑health awareness and work‑life balance among architects.
