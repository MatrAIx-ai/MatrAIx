personas:
  professional: Travis Peterson is an aspiring concept artist who blends digital illustration, speculative storytelling, and basic Python animation to craft futuristic game visuals, applying a disciplined,
    methodical workflow and competitive drive to build a portfolio for high‑school arts‑tech programs.
  sports: Travis Peterson encourages a steady yet low‑key fitness routine, joining the Space City Skaters club for weekend skate sessions, playing pick‑up basketball with friends while cheering on the Houston
    Rockets, and occasionally jogging along Buffalo Bayou to balance their sedentary art work with cardio.
  arts: Travis Peterson regularly visits Project Row Houses and the Contemporary Arts Museum, draws inspiration from Syd Mead’s retro‑futurist concepts, Moebius’s line work, and the soulful beats of J Dilla,
    Miles Davis, and Erykah Badu, weaving these influences into their digital sketches and short‑story narratives.
  travel: Travis Peterson designs meticulous travel itineraries using Trello, favoring affordable road trips to Galveston and New Orleans and dreaming of a future backpacking adventure in Tokyo to experience
    anime studios and futuristic cityscapes, while balancing a limited teen budget and family commitments.
  culinary: Travis Peterson enjoys soulful Southern dishes like gumbo and smoked brisket tacos, the bright flavors of sushi rolls with avocado and pickled ginger, and often experiments with homemade collard
    greens seasoned with smoked paprika, but their cooking skill remains at a beginner level, preferring quick YouTube tutorials and occasional family kitchen help.
  core: Travis Peterson is a methodical, imagination‑driven teen who spends nights sketching sci‑fi worlds, hoards digital art resources, sometimes stays up too late perfecting a pixel, and tackles every
    challenge with a quietly confident, competitive edge.
background:
  cultural: Travis is an African‑American teen growing up in Houston's vibrant Fourth Ward, where the blend of Southern Black culture, music, and community art shapes his identity. Family gatherings often
    feature storytelling, gospel, and soul music, reinforcing a deep appreciation for narrative and rhythm. He participates in after‑school programs at local cultural centers, which expose him to the works
    of Black artists and foster a sense of pride in his heritage. The city's multicultural environment, especially the rich history of Juneteenth celebrations, informs his worldview and inspires his artistic
    themes. Despite his reserved demeanor, Travis values the perseverance and resilience characteristic of his community, channeling these values into his disciplined approach to creative projects.
attributes:
  skills: '[''Digital illustration'', ''Sketching'', ''Creative writing'', ''Graphic design basics'', ''Basic Python programming'', ''Strategic thinking (chess)'', ''Project planning'', ''Video editing
    basics'', ''Organizational skills'']'
  hobbies: '[''Sketching'', ''Digital painting'', ''Science‑fiction reading'', ''Creative writing'', ''Chess'', ''Beginner robotics kits'', ''Coding simple animations'', ''Urban photography'', ''Listening
    to hip‑hop, jazz, neo‑soul'', ''Visiting local art galleries'']'
  career_goals: Travis aspires to attend a specialized high‑school program that merges the arts and technology, ultimately aiming to become a concept artist for video games or animated films. He envisions
    building a compelling portfolio that lands him a scholarship to an art institute where he can refine his illustration and storytelling craft. In parallel, he hopes to compete in national art contests
    and game‑design hackathons, leveraging his competitive drive to earn recognition and mentorship from industry professionals. Long‑term, he dreams of launching an independent graphic novel series that
    blends sci‑fi narratives with striking visual style, while also exploring opportunities in UI/UX design to fuse function with creativity.
