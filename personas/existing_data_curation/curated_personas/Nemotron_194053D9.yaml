personas:
  professional: Felimon Ortiz is a bilingual community arts organizer who leverages DIY home‑maintenance expertise, digital photography, and meticulous budgeting to stage pop‑up exhibitions and cultural
    workshops, channeling a fierce curiosity and disciplined, competitive drive while maintaining a skeptical eye on collaborations to ensure high‑quality outcomes.
  sports: Felimon Ortiz stays active by jogging with the Little Havana Running Club, joining casual basketball pick‑ups at the local YMCA during winter, playing weekend beach volleyball in the summer, and
    cheering for the Miami Heat, Miami Dolphins, and Inter Miami CF, preferring low‑pressure, structured workouts that fit their disciplined routine.
  arts: Felimon Ortiz immerses themselves in visual and musical arts by frequenting the Pérez Art Museum Miami and local galleries, curating digital photo series of Little Havana murals, maintaining a vinyl
    collection of jazz, son, and Afro‑inspired rhythms, and regularly referencing artists such as Banksy, Yayoi Kusama, and Kehinde Wiley in their social media commentary.
  travel: Felimon Ortiz plans travel with meticulous itineraries, favoring culturally rich destinations like Cartagena, New Orleans, and Valencia for immersive art experiences, while balancing a modest
    budget that prompts occasional weekend road trips along the Florida Keys and occasional longer overseas journeys when grant funding becomes available.
  culinary: Felimon Ortiz cooks traditional dishes such as ropa vieja and tostones with exacting measurements, blending spices like cumin, oregano, and fresh cilantro from their indoor herb garden, while
    experimenting with new flavor pairings and treating each meal as a disciplined, creative exercise.
  core: Felimon Ortiz is a disciplined, curiosity‑driven arts enthusiast whose competitive edge fuels meticulous budgeting, structured self‑care, and a quietly fierce dedication to preserving cultural heritage
    through community projects.
background:
  cultural: Felimon grew up in a tight‑knit Cuban‑American family in Miami’s Little Havana, where Spanish was spoken at home and English at school. His parents immigrated to the United States in the late
    1970s, bringing with them the customs, music, and culinary traditions of Cuba. Weekends were marked by family gatherings featuring classic dishes like arroz con pollo, lively salsa and son music, and
    storytelling about life on the island. The community’s strong emphasis on familial loyalty, respect for elders, and collective celebration of cultural festivals—such as Carnaval de la Calle Ocho and
    Noche de San Juan—shaped his identity. Though his formal schooling ended before ninth grade, he maintains fluency in both languages and values the bicultural perspective that allows him to navigate
    both Cuban and mainstream American worlds. He identifies with the diaspora’s resilience, often reflecting on the importance of preserving heritage while adapting to new environments.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''DIY home maintenance and repairs'', ''Digital photography'', ''Basic photo editing'', ''Personal finance budgeting and spreadsheet management'',
    ''Small-scale event planning'', ''Social media art content curation'', ''Cuban culinary cooking'', ''Structured journaling for mental health'', ''Analytical critical thinking'']'
  hobbies: '[''Visiting art galleries and museums'', ''Digital photography of street scenes'', ''Cooking traditional Cuban cuisine'', ''Collecting and listening to Cuban jazz and son vinyl records'', ''Indoor
    herb gardening'', ''Guided meditation and journaling'', ''Small-group book club discussions'', ''Sketching and visual note-taking'']'
  career_goals: Felimon aims to formalize his education by earning a GED within the next two years, laying groundwork for a certificate in community arts management. He aspires to launch a modest boutique—'Cultura
    Arte'—that will organize pop‑up exhibitions of emerging Cuban‑American artists in Miami's Little Havana and provide consulting for neighborhood cultural events. He hopes to leverage his organizational
    talent and bilingual skill to secure a small business grant, allowing him to become financially independent and transition from his current out‑of‑work status. Long‑term, he envisions mentoring fellow
    immigrants, offering workshops on personal budgeting, stress‑management journaling, and preserving cultural heritage through art. Achieving these goals would satisfy his drive for achievement, competitive
    spirit, and desire to contribute meaningfully to his community.
