personas:
  professional: Jordan Petillo is an aspiring visual artist and digital illustrator who blends hand‑drawn sketches with tablet brushes, using their curiosity and love for unconventional ideas to experiment
    with mixed media while lazily juggling school assignments and art projects.
  sports: Jordan Petillo enjoys solitary hikes through nearby woods, follows the Dallas Cowboys football team and the Texas Rangers baseball club, participates in the community youth hiking club during
    spring, and occasionally joins a school basketball pickup game, preferring low‑key fitness over competitive sports.
  arts: Jordan Petillo draws inspiration from the expressive brushwork of Van Gogh, the symbolic storytelling of Frida Kahlo, the street‑art wit of Banksy, and the sonic textures of Bon Iver, Aphex Twin,
    and Bob Dylan, spending afternoons sketching in a battered notebook, layering digital paintings on a tablet, and curating mood boards featuring ambient electronic tracks.
  travel: Jordan Petillo prefers weekend road trips to natural destinations like Hill Country State Natural Area, the Gulf Coast shoreline, and the desert landscapes of New Mexico, planning itineraries
    on a whim with a mix of Google Maps and family input, while dreaming of a future backpacking adventure across the Pacific Northwest.
  culinary: Jordan Petillo favors easy comfort meals such as pepperoni pizza, chicken quesadillas, and avocado toast, but also experiments with fresh berry smoothies flavored with mint and smoked paprika‑spiced
    roasted chickpeas, often cooking late at night while listening to ambient lo‑fi beats.
  core: Jordan Petillo is a 15‑year‑old art‑obsessed introvert who channels intense emotions into sketchbooks, impulsively spends on supplies, and seeks solace in nature and music while battling frequent
    anxiety.
background:
  cultural: Jordan grew up in Silsbee, a small, close‑knit community in Hardin County, East Texas. The town’s culture blends southern hospitality, a strong sense of community, and a modest, working‑class
    background. Family gatherings often feature meals like barbecue and tamales, and local churches play a central role in social life. While the region has a traditional appreciation for country and folk
    music, Jordan’s curiosity has led him to explore a broader artistic world through the internet, exposing him to contemporary indie and visual art scenes. He participates occasionally in the town’s annual
    art fair and school art club, where he connects with peers who share his interest in drawing and music. This mix of a supportive small‑town environment and exposure to diverse artistic influences shapes
    his personal identity and creative outlook.
