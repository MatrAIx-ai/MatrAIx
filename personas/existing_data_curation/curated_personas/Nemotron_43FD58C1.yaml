  hobbies: '[''Sketching'', ''Digital illustration (tablet)'', ''Listening to music (folk, indie, ambient)'', ''Writing poetry/journal'', ''Photography (phone)'', ''Exploring nature/hiking'', ''Playing
    narrative video games'', ''Watching art documentaries'']'
  career_goals: Jordan dreams of turning his love for art into a sustainable career. He hopes to attend an art‑focused high school program or a community college where he can develop his illustration and
    graphic‑design skills. In the long term, he envisions working as a freelance illustrator or concept artist for video games and indie films, allowing him to work from his hometown or from any location
    that offers a flexible schedule. He also wants to create a personal portfolio and perhaps launch a small online store for prints and custom artwork, which would give him creative independence while
    still providing a steady income. Because of his emotional sensitivity, Jordan aspires to create art that resonates with others who struggle with anxiety, hoping his work can offer comfort and connection.
