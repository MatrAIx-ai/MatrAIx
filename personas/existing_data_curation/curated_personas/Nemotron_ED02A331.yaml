personas:
  professional: Mariana Fields, a 23‑year‑old housekeeper with a keen eye for design, merges meticulous deep‑cleaning expertise with imaginative staging suggestions, leads training for new staff, and champions
    eco‑friendly cleaning protocols at her current boutique hotel employer, and they consistently model calm composure under pressure.
  sports: Mariana Fields, a 23‑year‑old fitness enthusiast, participates in weekly group HIIT classes at the local gym, hikes the Blue Ridge trails with the Blue Ridge Hiking Club, follows the Asheville
    City SC soccer team and the Carolina Panthers, and maintains a casual Sunday cycling routine despite a tendency to skip workouts after stressful days, and they relish the community spirit of team sports.
  arts: Mariana Fields, a 23‑year‑old watercolorist and fantasy aficionado, draws inspiration from Claude Monet’s soft palettes and Hayao Miyazaki’s whimsical worlds, volunteers in community theater workshops
    at the local playhouse, and curates a personal library featuring Neil Gaiman, N.K. Jemisin, and Brandon Sanderson, allowing art to color both work and leisure, and they often blend storytelling with
    visual design in their home‑staging concepts.
  travel: Mariana Fields, a 23‑year‑old adventure‑seeker with a modest travel budget, plans spontaneous weekend getaways to the Blue Ridge Mountains, has explored Asheville’s historic Biltmore Estate and
    Savannah’s cobblestone squares, dreams of a summer road‑trip through the Scottish Highlands, and prefers crafting DIY itineraries over packaged tours to stay flexible, and they relish the anticipation
    of new landscapes.
  culinary: Mariana Fields, a 23‑year‑old home‑cooking hobbyist, frequently prepares quinoa‑and‑roasted‑vegetable bowls seasoned with sage and smoked paprika, bakes lavender‑infused lemon tarts for friends,
    experiments with heirloom tomato bruschetta drizzled with basil‑infused olive oil, and occasionally indulges in farm‑to‑table brunches featuring fresh avocado toast and artisanal coffee, while they
    still sometimes order pizza when time‑pressed.
  core: Mariana Fields, a 23‑year‑old imaginative housekeeping professional, blends meticulous cleaning with artistic flair, navigates anxiety with therapy and journaling, and pursues community‑centered
    creativity while dreaming of launching a boutique home‑staging business, and they constantly balance order and whimsy in daily life.
background:
  cultural: Mariana grew up in Candler, a small town in Haywood County, North Carolina, surrounded by the foothills of the Appalachians. Her family embodies the values of Southern hospitality, hard work,
    and close-knit community ties. Local traditions such as church gatherings, seasonal festivals, and folk crafts like quilting have shaped her appreciation for shared spaces and collective harmony. While
    identifying as white, she is aware of the region’s cultural mosaic and values inclusivity, often contributing to neighborhood clean-ups and collaborative projects that reflect the area's blend of rural
    charm and emerging artistic expression.
