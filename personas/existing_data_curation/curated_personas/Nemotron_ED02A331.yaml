  career_goals: Mariana aspires to transform her passion for clean, harmonious homes into a specialized home-staging and professional-organizing business. She plans to complete an associate degree in interior
    design or hospitality management, obtain certification as a professional organizer, and eventually launch a boutique service that blends meticulous cleaning with artistic styling. In the short term,
    she seeks leadership responsibilities within her current employer, such as training new staff and developing eco-conscious cleaning protocols. She also hopes to achieve greater emotional resilience
    through continued education and mentorship.
