  career_goals: Joseph aims to earn the Certified Administrative Professional (CAP) credential within the next two years and leverage it to advance to an Office Manager role overseeing a small team at a
    regional firm. He envisions introducing digital workflow solutions to increase efficiency, mentoring junior assistants, and eventually transitioning into an Operations Coordinator position where he
    can combine his organizational strengths with strategic planning. Long‑term, Joseph hopes to contribute to community development projects by providing pro‑bono administrative support to local nonprofits.
