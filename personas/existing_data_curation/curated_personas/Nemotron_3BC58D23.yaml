  career_goals: Approaching retirement, Jeffrey wants to channel his practical knowledge into a modest boutique workshop where he can produce limited‑edition furniture pieces and offer hands‑on apprenticeships
    to younger carpenters. He hopes to earn a Master Carpenter certification recognized by the Illinois Building Commission, and to submit a restoration project for the Chicago Historic Structures Competition.
    Additionally, he plans to author a concise guide on preserving historic woodwork that blends traditional methods with a few modern, eco‑friendly twists, solidifying his reputation in the local trade
    community.
