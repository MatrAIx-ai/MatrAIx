  hobbies: '["Cheerleading", "Hip‑hop dance classes", "Pickup basketball", "Church choir singing", "Community service volunteering at the local library", "Reading Young Adult fiction", "Sketching and comic
    drawing", "Journaling", "Cooking simple family meals"]'
  career_goals: 'Ramona aspires to graduate high school with a solid GPA and pursue a career in nursing or child counseling, fields where she can combine her love for routine, practical problem‑solving,
    and helping others. She dreams of becoming a pediatric nurse who provides steady, compassionate care, or a youth mentor at a community center where she can support other teens in navigating school and
    personal challenges. She envisions a clear, step‑by‑step path: earn a high school diploma, attend a community college nursing program, gain hands‑on experience through volunteer work, and eventually
    earn a registered nurse license or counseling certification.'
