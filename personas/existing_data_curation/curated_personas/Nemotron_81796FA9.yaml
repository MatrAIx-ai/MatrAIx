personas:
  professional: A budding event coordinator, Ramona Brooks channels her love for routine and group dynamics into planning school pep rallies, choreographing cheer routines, and organizing community service
    drives, showcasing reliability, practicality, and a flair for collaborative leadership.
  sports: Ramona Brooks fuels her competitive spirit as a varsity‑level cheerleader and frequent pickup basketball player, cheering on the Chicago Bulls while also training with the local youth basketball
    club the Midtown Hoopers, balancing disciplined practice routines with spontaneous street games after school.
  arts: Ramona Brooks expresses her creative side through hip‑hop dance classes set to Beyoncé’s latest hits, singing in her church choir with uplifting anthems, sketching comic‑style heroes inspired by
    Marvel’s Spider‑Man and the manga series My Hero Academia, and devouring YA bestsellers like The Hate U Give, fostering an eclectic artistic identity.
  travel: Ramona Brooks prefers familiar, group‑oriented trips, often joining her family on weekend road trips to the Grand Canyon or annual visits to the nearby state fair, while dreaming of a summer vacation
    to Disneyland in California, balancing a love for adventure with the comfort of a predictable itinerary.
  culinary: Ramona Brooks enjoys experimenting with simple home‑cooked meals, frequently whipping up avocado toast, cheesy pasta bake, and banana‑cinnamon pancakes, delighting in fresh basil and mozzarella,
    yet occasionally burns the edges of her cookies when distracted by phone messages.
  core: Ramona Brooks blends routine‑loving practicality with boundless social energy, juggling cheerleading, comic sketches, and a meticulous budgeting habit while wrestling with vibrant waves of anxiety
    that color every decision.
background:
  cultural: Ramona is a Black teenager raised in Tampa, Florida, within a close‑knit African‑American family that values community, faith, and tradition. Her upbringing is shaped by the vibrant local Black
    culture of Hillsborough County, from weekend church gatherings and gospel music to family barbecues featuring soul food classics like fried chicken and collard greens. She participates in neighborhood
    events such as the Tampa Black Heritage Festival and maintains strong ties to older relatives who share stories and cultural wisdom. This background instills in her a sense of pride, resilience, and
    a deep appreciation for collaboration and caring for others.
attributes:
  skills: '["Organizational planning and time management", "Group project coordination", "Empathetic listening and peer mediation", "Digital literacy with smartphones and school platforms", "Creative writing
