  hobbies: '["Watercolor painting", "Reading adventure and nature books", "Birdwatching", "Beginner piano practice", "DIY crafts (friendship bracelets, mosaic art)", "Ecuadorian cooking with family", "Scratch
    coding and creating simple games", "Student buddy mentoring", "Hiking and exploring local parks", "Listening to Ecuadorian folk music and modern pop"]'
  career_goals: As a ten‑year‑old, Hortensia already envisions a future where she can blend art, science, and service. She dreams of becoming an environmental educator or wildlife illustrator who creates
    colorful guides that inspire children to protect nature. She also imagines a role as a pediatric nurse or elementary teacher, seeing her compassion and desire to help others. In the short term, she
    is determined to lead a school recycling initiative, organize a community mural that fuses Ecuadorian patterns with Utah landscapes, and continue mentoring younger students through a buddy program.
    These goals reflect her plan‑oriented mindset, her love for creativity, and her commitment to fostering harmony and stewardship.
