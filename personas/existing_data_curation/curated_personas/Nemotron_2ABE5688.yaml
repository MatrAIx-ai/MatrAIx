personas:
  professional: An aspiring young environmental artist, Hortensia Gonzalez blends watercolor wildlife sketches with handmade crafts, channeling her organized nature and compassion into school STEM projects
    and peer‑buddy volunteering.
  sports: A nature‑oriented athlete, Hortensia Gonzalez participates in the Eagle Mountain Youth Hiking Club during spring and fall, cheers for the Utah Jazz and Real Salt Lake on weekends, and practices
    beginner’s soccer with the local U8 team, balancing her love of birdwatching with regular bike rides on community trails.
  arts: An imaginative creator, Hortensia Gonzalez fills sketchbooks with Audubon‑style bird watercolors, composes simple piano melodies inspired by Juanes and Taylor Swift, crafts friendship bracelets
    while listening to Lila Downs, and draws inspiration from Claude Monet’s use of light.
  travel: An adventurous explorer, Hortensia Gonzalez plans weekend family trips to Zion and Arches National Parks with detailed trail maps, while dreaming of a summer journey to a high‑altitude city in
    South America to explore historic plazas, balancing a modest family budget with enthusiastic research on kid‑friendly museums and hiking routes.
  culinary: A budding home cook, Hortensia Gonzalez loves to knead dough for empanadas, slice fresh mango and pineapple for fruit salads, sprinkle plantain chips with a pinch of sea salt, and experiment
    with adding a dash of cinnamon to her arroz con pollo, proudly serving family meals while mastering simple pastry techniques.
  core: Energetic, detail‑oriented, and compassionate, Hortensia Gonzalez blends her love for wildlife art, birdwatching, and family traditions into a bright, organized outlook—though she occasionally forgets
    to water her plants after a marathon sketching session.
background:
  cultural: Hortensia grew up in Eagle Mountain, Utah, in a bilingual household rooted in Ecuadorian traditions. Her parents immigrated from Quito, and Spanish fills the home while English dominates at
    school and in the community. Family gatherings feature Ecuadorian foods like empanadas, plantain chips, and arroz con pollo, accompanied by music ranging from pasillo to modern Latin pop. They celebrate
    holidays such as Día de los Inmortales and share stories of Andean legends, nurturing her appreciation for her heritage. At the same time, the Utah landscape—its mountains, deserts, and outdoor recreation—has
    shaped her love for hiking, birdwatching, and environmental stewardship. This blend of Andean culture and Western frontier life informs her values of community, hospitality, and respect for nature,
    encouraging her to bridge both worlds through art and service.
