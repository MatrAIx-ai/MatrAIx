  career_goals: In retirement, Alberto aims to mentor younger entrepreneurs in his community, offering financial advice and business planning support on a volunteer basis. He hopes to assist his grandchildren
    with college savings and to document his family's heritage through a memoir. He also aspires to contribute to local cultural festivals by organizing logistics and fundraising, ensuring practical sustainability
    for community events. His long-term ambition is to leave a legacy of financial stability and cultural pride for his family and the Carteret Hispanic community.
