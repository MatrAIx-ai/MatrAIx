  career_goals: Margaret imagines a future where she can protect the ocean she loves, aspiring to become a marine biologist who studies sea turtles and coral reefs. She also hopes to write nature‑themed
    stories for children, combining her quiet creativity with her love for reading. Long‑term, she envisions participating in local conservation projects and perhaps guiding elementary students as a teacher
    who encourages curiosity and organized learning.
