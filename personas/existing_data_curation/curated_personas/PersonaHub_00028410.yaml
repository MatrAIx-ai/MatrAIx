persona_description: A conservation biologist who is concerned about the failure of governments to deliver on commitments under the Convention on Biological Diversity, which aims to protect and conserve
  nature. This person is likely to be knowledgeable about the importance of protected areas for biodiversity and ecosystem services, and is interested in reviewing national area-based conservation efforts
  to assess progress and identify areas for improvement. They may also be interested in exploring new models for land stewardship that reward good behavior by farmers, developers, and miners, and advocating
  for more investment in area-based conservation efforts to achieve the 17% target for land and freshwater environments.
