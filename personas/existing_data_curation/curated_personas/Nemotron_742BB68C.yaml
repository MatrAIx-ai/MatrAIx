  career_goals: Approaching retirement, Gina aims to transition into a mentorship and consultancy role that allows her to share her estimating expertise with small‑business owners and junior engineers in
    the Monroe area. She envisions part‑time teaching at the local community college, authoring a practical guide on cost management for mid‑size construction firms, and offering freelance consulting services
    that give her the flexibility to choose projects that interest her while minimizing stress. Additionally, she hopes to volunteer her skills with the Monroe County Economic Development Council to help
    attract sustainable development projects to the region.
