personas:
  professional: Gina Rogers, a veteran construction cost estimator with three decades of experience, blends meticulous quantity takeoffs using ProEst and Sage with a curiosity for AI‑assisted forecasting,
    delivering clear budget forecasts while mentoring junior engineers and aspiring small‑business owners in Monroe County, and they approach each project with a blend of pragmatism and experimental curiosity.
  sports: Gina Rogers enjoys leisurely walks along the River Raisin and joins a senior fitness walking club, cheering on the Detroit Tigers and the University of Michigan Wolverines during baseball and
    football seasons, and they occasionally participate in community softball games for fun.
  arts: Gina Rogers immerses herself in historical fiction, favoring authors like Hilary Mantel and Ken Follett, attends the Monroe County Historical Museum’s rotating exhibits, and supports the local community
    theater where they adore performances of Shakespeare’s plays, while they knit scarves inspired by the stories they read.
  travel: Gina Rogers prefers relaxed road trips to historic sites such as Mackinac Island and the Freedom Trail in Boston, where they can research genealogy archives, but they also dream of a leisurely
    cruise through the Norwegian fjords to see native wildflowers in bloom.
  culinary: Gina Rogers blends Midwestern comfort foods like chicken pot pie with garden herbs, often adding a dash of Thai basil or smoked paprika discovered online, creating experimental dishes like herb‑infused
    cornbread, though they sometimes over‑season during a particularly busy Sunday.
  core: Gina Rogers balances lifelong curiosity with pragmatic flexibility, turning gardening, genealogy, and cost estimating into a retirement that’s both organized and delightfully chaotic, and they relish
    the paradox.
background:
  cultural: Gina was raised in a predominantly white, middle‑class Midwestern community in Monroe, Michigan, where values such as self‑reliance, modesty, and neighborly cooperation are deeply embedded.
    Her family traditions include attending local county fairs, supporting high school sports events, and participating in church‑based community service, reflecting a blend of Protestant work ethic and
    regional pride. The cultural emphasis on practicality and resourcefulness shaped her approach to both her career and personal life, while the area's natural waterways and seasonal changes fostered her
    appreciation for outdoor activities and seasonal cooking. These influences combine to give Gina a grounded, community‑oriented outlook balanced with an openness to new ideas and experiences.
