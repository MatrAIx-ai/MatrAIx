personas:
  professional: Theresa Thoma, a seasoned teaching assistant at Grand Meadow Elementary, channels her organized classroom support skills, proficiency with educational technology, and hands‑on gardening
    and carpentry experience to streamline lesson planning, differentiate instruction, and foster an inclusive, community‑oriented learning environment while quietly preparing for a future teaching role,
    and they consistently model reliability for both students and staff.
  sports: Theresa Thoma enjoys low‑impact fitness, regularly hiking state park trails, birdwatching at sunrise, and cheering on the Minnesota Twins and Vikings while participating in a local senior softball
    league, and they favor morning walks over crowded gyms.
  arts: Theresa Thoma cultivates a quiet love of literature and music, devouring historical fiction by Hilary Mantel and educational theory by John Hattie, knitting while listening to folk singer Brandi
    Carlile, and attending community theater productions of classic plays, though they admit to hoarding a collection of vintage sewing patterns they never use.
  travel: Theresa Thoma prefers meticulously planned road trips to nearby natural gems like the Apostle Islands and Door County, complemented by occasional overseas bird‑watching excursions to Iceland's
    wetlands, and they dream of exploring the Norwegian fjords while balancing a modest travel budget and family obligations.
  culinary: Theresa Thoma delights in home‑grown cooking, often preparing butternut squash soup, heirloom tomato salads, and rye bread made with locally milled flour, while they occasionally indulge in
    pepperoni pizza on Friday nights and have a habit of snacking on cheese and crackers while reading in the garden.
  core: Theresa Thoma blends quiet curiosity with meticulous order, turning gardening and knitting into serene routines, yet they can’t resist a secret stash of coffee shop pastries that derail their otherwise
    thrifty budget.
background:
  cultural: Theresa was raised in a middle‑class, white, Midwestern family with German‑Scandinavian roots. Growing up in rural Minnesota, she was immersed in a community that values hard work, self‑reliance,
    and modesty. Her family’s traditions include church participation, seasonal celebrations such as harvest festivals, and a strong emphasis on community service. These cultural influences shape her cooperative
    nature, respect for established methods, and commitment to harmony in both personal and professional settings.
attributes:
  skills: '["Lesson planning support","Differentiated instruction","Student assessment","Classroom management","Educational technology (Google Classroom, interactive whiteboards)","Parent‑teacher communication","Inventory
    and resource coordination","First aid certification","Basic carpentry","Gardening and horticulture"]'
  hobbies: '["Gardening","Reading (historical fiction and educational theory)","Knitting","Book club","Volunteer tutoring","Craft workshops","Hiking","Birdwatching"]'
  career_goals: Theresa aims to earn a bachelor's degree in elementary education within the next three years and transition to a full‑time teaching position at her school. She aspires to specialize in inclusive
    education, obtain a special‑education endorsement, and eventually take on a lead teaching assistant or curriculum coordinator role. Long‑term, she hopes to develop community‑based educational programs
    that integrate outdoor learning and promote student well‑being.
