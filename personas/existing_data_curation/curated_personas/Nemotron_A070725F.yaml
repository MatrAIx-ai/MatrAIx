  hobbies: '[''Gardening (vegetables and medicinal herbs)'', ''Cooking Japanese home‑cooked meals'', ''Walking on the beach'', ''Participating in local dance and fitness classes'', ''Reading historical
    novels'', ''Volunteer work at community center'', ''Attending cultural festivals'', ''Crafting (origami, embroidery)'', ''Book club meetings'']'
  career_goals: In the coming years Min hopes to deepen her impact on the local community. She aims to secure a leadership position on the San Diego Community Services Board, where she can advocate for
    accessible STEM outreach programs for under‑represented youth. She also wants to launch a weekly intergenerational cooking workshop that blends traditional Japanese recipes with local ingredients, fostering
    cultural exchange and social connection. Additionally, Min is interested in completing a short certification in nonprofit management to formalize her budgeting and program‑development expertise. Ultimately,
    she seeks to balance her family responsibilities with a fulfilling role that leverages her practical skills, community spirit, and love for harmony.
