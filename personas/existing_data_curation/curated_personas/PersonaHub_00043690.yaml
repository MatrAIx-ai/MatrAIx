persona_description: A teacher or educational professional who is concerned with developing children's critical thinking skills and understanding of the nature of human communication through television
  and other forms of mass media. This person is interested in teaching the maxims of mass communication and how to understand the mass media in order to control their use. They are likely to be familiar
  with the concept of the communication revolution and its effects on human interaction. This person is also interested in broadening perspectives about mass culture and its potential benefits and drawbacks.
  They are likely to have a background in education and communication studies, and they are interested in teaching children to develop their communication skills effectively.
