persona_description: A conservation biologist with expertise in freshwater biodiversity, particularly in Africa. This individual is passionate about protecting the aquatic ecosystems and the species that
  inhabit them. They have a keen interest in understanding the threats that these species face and the impact of human activities on their populations. This person is likely to be involved in advocacy efforts,
  working with governments and organizations to promote sustainable management of freshwater resources. They have a deep understanding of the IUCN Red List of Threatened Species™ and its impact on freshwater
  biodiversity.
