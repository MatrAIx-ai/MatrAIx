personas:
  professional: Cesar Hernandezvega, a budding builder who spends afternoons constructing elaborate forts from couch cushions and Lego bricks, channels their curiosity and practical mindset into turning
    imaginative ideas into tangible, organized play structures that they proudly share with friends.
  sports: Cesar Hernandezvega loves dashing around the community soccer field with the local Little Suns club, splashing in the warm pool during swim lessons, and cheering loudly for the Miami Marlins while
    waving a tiny baseball cap at games on family weekends.
  arts: Cesar Hernandezvega delights in drawing bright cartoon characters like Elmo and Mickey Mouse, humming the Frozen soundtrack by Idina Menzel, and proudly performing a simple dance routine to Luis
    Miguel's classic boleros at family gatherings.
  travel: Cesar Hernandezvega enjoys family road trips to the Everglades National Park, day‑long adventures at Disney World, and dreams of visiting the Smithsonian National Air and Space Museum in Washington,
    D.C., balancing a love for guided tours with a sprinkle of spontaneous beach sand play.
  culinary: Cesar Hernandezvega enthusiastically helps stir cheese‑filled arepas, roll tiny empanadas with sweet plantain filling, and savors mango slices and avocado on toast, though they often sneak a
    bite of the dough before it bakes, a cheeky habit their parents gently correct.
  core: Cesar Hernandezvega is an energetic, curious five‑year‑old who merges lively group play with a surprisingly organized knack for turning imagination into tidy projects, all while juggling a sticky‑fingered
    love for snacks and a habit of over‑packing their backpack.
background:
  cultural: Cesar grows up in a bilingual Venezuelan‑American household in West Palm Beach. Spanish is spoken at home and he celebrates Venezuelan traditions such as Día de la Independencia, Carnaval, and
    family gatherings centered around foods like arepas, empanadas, and hallacas. He also participates in local community events that blend Latin Caribbean culture with South Florida's diverse environment,
    fostering a strong sense of family, community, and cultural pride.
