persona_description: A person who is interested in the development and implementation of HSE credential programs, particularly those that are culturally competent and tailored to meet the needs of individuals
  from low-income backgrounds and diverse communities. They are also interested in the potential for these programs to increase access to postsecondary education and training, particularly for those who
  are unable to complete traditional high school due to financial or other barriers. They may be interested in researching and advocating for policy changes that support the expansion of HSE credential
  programs and the provision of additional resources and supports for individuals participating in these programs.
