  hobbies: '[''Sketching'', ''Worldbuilding (speculative writing)'', ''Playing chess'', ''Exploring indie video games (e.g., Minecraft, Terraria)'', ''Listening to experimental/ambient music'', ''Reading
    sci‑fi and fantasy novels'', ''Playing guitar'', ''Journaling'']'
  career_goals: Johnathan aims to merge his artistic vision with technology, aspiring to become an indie game developer or concept artist for video‑game studios. He dreams of creating his own graphic‑novel
    series and hopes to study visual arts or game design in a flexible, creative‑focused environment where he can retain independence and experiment with novel ideas.
