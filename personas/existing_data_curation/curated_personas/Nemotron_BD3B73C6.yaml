personas:
  professional: Johnathan Tanner, a 15‑year‑old aspiring game narrative designer, blends sketching, world‑building writing, and strategic gaming into early prototypes, while their love of novelty fuels
    experimental concepts and they embrace a relaxed approach to deadlines that leads to a fluid, sometimes chaotic, creative process.
  sports: Johnathan Tanner enjoys the strategic rigor of chess, competing in the school’s chess club, and participates in the local youth soccer league with the Riverside Rovers, favoring casual weekend
    runs over structured workouts, while they cheer for the nearby professional football team, the Metro City Titans.
  arts: Johnathan Tanner immerses in ambient soundscapes by Brian Eno, Aphex Twin, and Nils Frahm while sketching characters inspired by Studio Ghibli and the works of Moebius, and they channel emotional
    turbulence into acoustic guitar renditions of Radiohead’s ‘Everything in Its Right Place.’
  travel: Johnathan Tanner dreams of backpacking through the misty forests of Iceland and exploring the neon‑lit streets of Tokyo, preferring self‑planned itineraries that blend artistic inspiration with
    low‑budget hostels, but currently limited by parental permission and school schedules, they have already taken a family road trip to the Grand Canyon.
  culinary: Johnathan Tanner favors simple yet flavorful meals like ramen with miso broth, homemade sushi rolls with avocado and cucumber, and occasionally experiments with a carbonara pasta, boasting a
    modest cooking skill set that leans on YouTube tutorials, and they often snack on energy bars during late‑night gaming sessions.
  core: Johnathan Tanner is a creatively restless teen who channels imagination into sketches and stories, battles anxiety with strategic games, and they oscillate between disciplined saving and impulsive
    splurges, all while juggling a love for ambient music and quiet guitar sessions.
background:
  cultural: Johnathan is a white Midwestern teenager from East Moline, Illinois, part of the Quad Cities region. His family heritage includes German and Irish roots common to the area, and he grew up amid
    a blend of industrial history and a modest but growing local arts scene. Community values such as modesty, self‑reliance, and appreciation for small‑scale creative events have shaped his outlook, while
    the region’s riverside setting and proximity to cultural venues provide occasional inspiration for his artistic pursuits.
