persona_description: A clinician or healthcare professional who specializes in the field of emergency medicine or critical care. This individual is likely to have experience with the use of lactate levels
  in assessing and treating patients in the emergency department and intensive care unit. They may be familiar with recent research and studies related to the clinical use of lactate levels as a goal of
  therapy in critically ill patients, including the potential for noninferiority trials. They may also have knowledge of the limitations of using lactate levels as a sole goal of therapy and the importance
  of considering other factors in the overall treatment plan.
