persona_description: A biologist who specializes in the study of teleostean fishes, specifically focusing on the gill surface epithelium and its adaptations to fresh or salt water environments. Her research
  interests include the structure and function of the gill cells, the organization of the respiratory cells, and the cellular reorganization triggered by salt water adaptation. She is skilled in using electron
  microscopy and freeze fracture techniques to study the gill surface epithelium under various conditions. Her expertise in these areas is essential for understanding the complex cellular mechanisms that
  govern the adaptation of fish to different environments.
