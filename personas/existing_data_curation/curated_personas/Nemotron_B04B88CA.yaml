  hobbies: '[''Abstract Watercolor Painting'', ''Art Gallery Visits'', ''Contemporary Art Collecting'', ''Philosophy & Poetry Reading'', ''Speculative Fiction Literature'', ''Photography (landscape & sunrise)'',
