  career_goals: As he approaches retirement age, Don Vick Thomas aims to transition from full-time corporate leadership to part-time consulting, focusing on mentoring emerging financial professionals and
    guiding them in integrating creativity into investment strategies. He aspires to author a book that explores the intersection of art, abstract thinking, and finance, and to develop workshops that teach
    financial literacy through experiential and artistic methods. Additionally, he seeks to volunteer with local community organizations in Jupiter, offering pro bono financial advice to small businesses
    and non-profits, while prioritizing his emotional wellbeing through mindfulness practices and establishing a sustainable work‑life balance.
