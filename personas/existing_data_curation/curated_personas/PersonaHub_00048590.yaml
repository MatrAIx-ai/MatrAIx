persona_description: An anthropologist who specializes in the study of early ethnography and the impact of the phonograph on fieldwork. She has a background in folklore and has worked on the Federal Cylinder
  Project of the American Folklife Center at the Library of Congress. She is knowledgeable about the early use of the talking machine in ethnography and has published a book about the topic. She is interested
  in the gaps and silences in the picture of participants in early ethnography and the ironic silence surrounding the early use of the talking machine in that work.
