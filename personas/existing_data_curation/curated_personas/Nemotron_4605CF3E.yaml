  hobbies: '["Historical non-fiction reading", "Crossword puzzles and Sudoku", "Gardening native Florida plants", "Fishing", "Morning beach walks", "Local historical society meetings", "Classic movie nights",
    "Chess", "Bridge", "Cooking Southern dishes"]'
  career_goals: Although fully retired, Kyle is intent on channeling his business acumen into mentorship and legacy projects. Over the next two years he plans to serve as a volunteer advisor for the Pompano
    Beach Small Business Association, guiding at least 15 emerging entrepreneurs through structured business plans. He also aims to author a memoir documenting the evolution of mid-century corporate strategy,
    targeting publication before his 90th birthday. Additionally, he intends to establish a modest scholarship fund for finance students at a local community college and to maintain his mental sharpness
    by participating in senior chess and bridge tournaments, where he hopes to achieve a top-10 ranking.
