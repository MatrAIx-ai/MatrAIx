personas:
  professional: Nickolas is a senior visual designer and design strategist who blends meticulous project management with a balanced mix of curiosity and practicality, turning complex brand challenges into
    award‑winning UI/UX, brand identity, illustration, and typography solutions while fostering collaborative, community‑focused design processes.
  sports: Nickolas fuels their energetic lifestyle by hiking the Great Smoky Mountains on weekends, belongs to the local Appalachian Trail Club, plays pickup basketball at the community center, follows
    the Nashville Predators and the Tennessee Volunteers football team, and they often organize board‑game marathons after a day of outdoor activity as a social fitness recharge.
  arts: Nickolas immerses themselves in the arts as an improv performer with the Laugh Lab troupe, volunteers teaching basic design at a community arts center, curates a vintage music poster collection
    featuring iconic works by The Grateful Dead and Pink Floyd, attends live shows at the Ryman Auditorium, and they draw creative inspiration from photographers like Annie Leibovitz and street artists
    in downtown Asheville.
  travel: Nickolas prefers carefully planned road trips that balance adventure and relaxation, spending long weekends exploring Asheville’s craft breweries, attending Austin’s South by Southwest festival
    each spring, dreaming of a design‑inspired pilgrimage to Kyoto’s temples, and they budget these journeys using a travel fund that caps spending at 10 % of monthly income while still keeping an eye on
    family commitments.
  culinary: Nickolas delights in Southern cooking, mastering smoked brisket, shrimp‑and‑grits, and pimento cheese with a well‑seasoned cast‑iron skillet, sourcing heirloom tomatoes, fresh herbs, and artisanal
    hot sauce from the local farmers’ market, and they enjoy hosting dinner parties where experimental flavor pairings become a lively, communal tasting experience.
  core: Nickolas is a disciplined design leader who channels boundless social energy into community‑focused projects, Southern culinary experiments, and an ever‑growing stack of vintage music posters, while
    occasionally juggling too many commitments and forgetting to unwind.
background:
  cultural: Nickolas grew up in the Appalachian foothills of East Tennessee, a region where storytelling, folk art, and a strong sense of community are deeply rooted. His white Southern heritage has exposed
    him to traditional crafts, music, and a blend of conservative and progressive cultural values. The vibrant arts scene in Knoxville, combined with the region’s appreciation for craftsmanship and hospitality,
    has shaped his collaborative approach and his commitment to creating designs that resonate both locally and broadly.
