  career_goals: Nickolas aims to step into a senior leadership role such as Creative Director within the next five years, where he can guide multidisciplinary design teams toward high‑impact, award‑winning
    work. He aspires to build a boutique studio that prioritizes community‑focused projects and sustainable design practices, while also mentoring emerging designers and contributing thought pieces to industry
    publications.
