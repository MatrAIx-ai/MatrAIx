  career_goals: John aims to transition his solo practice into a regional investigative firm that specializes in corporate fraud and missing‑person cases across the Midwest. He seeks professional certification
    as a Certified Professional Investigator and hopes to become the go‑to consultant for local businesses needing discreet financial audits. Long‑term, he envisions authoring a practical guide on balancing
    investigative creativity with business acumen, while also establishing more structured workflows to counter his natural disorganization and reduce stress.
