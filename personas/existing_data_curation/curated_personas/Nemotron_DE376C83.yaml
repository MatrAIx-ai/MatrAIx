  hobbies: '[''True‑crime reading'', ''Vintage car restoration'', ''Shooting sports'', ''Fishing on local rivers'', ''Puzzle solving'', ''Playing guitar'', ''Poker games'', ''Hiking on Iowa trail systems'',
