personas:
  professional: John Ramirez, a 38‑year‑old private investigator, melds his business degree with a self‑taught investigative toolkit, translating financial data into evidence, conducting discreet surveillance,
    and interrogating witnesses, while his relaxed, sometimes disorganized streak drives him to improvise and rely on proven methods, and his competitive edge pushes him to seek certification and build
    a regional fraud‑focused firm.
  sports: John Ramirez spends weekends honing reflexes at the Des Moines Shooting Club, casting lines with the Des Moines Rod and Reel Association on the Des Moines River, and cheering for the Iowa Hawkeyes
    football team, while they also squeeze in occasional 5K runs to keep stamina for investigations.
  arts: John Ramirez devours true‑crime memoirs such as The Devil in the White City and In Cold Blood, strums a weathered acoustic guitar at local open‑mic nights, and draws inspiration from folk‑rock legends
    like Bob Dylan and Johnny Cash, which fuels their investigative storytelling flair.
  travel: John Ramirez plans trips that blend work and leisure, preferring the Eastern Roadshow in Detroit for vintage Mustang gatherings, weekend fly‑fishing expeditions to Montana’s Boulder River, and
    dream vacations to the Nürburgring in Germany to scout classic car auctions, though family obligations sometimes limit the frequency.
  culinary: John Ramirez favors hearty Midwestern fare—grilled ribeye steak, bratwurst with sauerkraut, corn on the cob, and whiskey‑glazed pork ribs—while their modest kitchen skill lets them occasionally
    whip up fish tacos with fresh cilantro, lime, and smoked paprika after a river catch, and they regularly indulge in the local BBQ joint’s smoked brisket.
  core: John Ramirez is a competitively minded, 38‑year‑old investigator who balances a love for gritty true‑crime narratives and vintage Mustangs with a laid‑back, occasionally disorganized lifestyle,
    using solitary pursuits like fishing and guitar to temper stress.
background:
  cultural: John grew up in the Midwestern heartland of Iowa, where pragmatic, community‑oriented values shape daily life. Though his surname reflects Hispanic ancestry, he identifies culturally as a white
    Midwesterner, blending the region’s modesty and self‑reliance with occasional family traditions like Sunday brunches featuring cornbread and chiles. He participates in local church gatherings, attends
    the Iowa State Fair, and enjoys the seasonal rhythm of agriculture‑linked festivals. This blend of Midwestern steadiness and a subtle multicultural flavor informs his practical yet curious approach
    to both work and leisure.
