personas:
  professional: Anthony Gordon, an aspiring engineer and budding programmer, channels their love of LEGO Technic and robotics into methodical Python projects, applying disciplined project‑management habits
    to every competition entry while remaining reliably organized and practical, and they approach each build with meticulous precision.
  sports: Anthony Gordon jogs the 2‑mile loop at Riverside Park three times a week, plays point guard on the local youth basketball league’s Hawks Juniors team that watches the Los Angeles Lakers for inspiration,
    and follows the San Francisco Giants in baseball, maintaining a disciplined fitness schedule that balances cardio with weekend strength drills, and they relish the post‑game camaraderie.
  arts: Anthony Gordon immerses themselves in graphic novels like "Saga" and "Watchmen," devours sci‑fi classics such as "Ender’s Game," and curates playlists that feature Kendrick Lamar, J. Cole, H.E.R.,
    and SZA, and they let thoughtful lyrics fuel their creative coding breaks and occasional doodles in the margins of their notebooks.
  travel: Anthony Gordon prefers meticulously planned weekend trips, having explored the Smithsonian museums in Washington, D.C., taken a family road‑trip to the Grand Canyon, and dreaming of attending
    the LEGO World Expo in Copenhagen, balancing their love for structured itineraries with occasional spontaneous detours to local comic conventions.
  culinary: Anthony Gordon enjoys helping plan family meals, often whipping up simple yet tasty dishes like spaghetti carbonara with pancetta, chicken teriyaki bowls with soy sauce and sesame seeds, and
    homemade pepperoni pizza, and they display budding culinary confidence while still relying on quick snacks like peanut butter‑banana sandwiches when rushing between robotics sessions.
  core: Anthony Gordon is a meticulous teen engineer who blends LEGO, chess, and hip‑hop beats into a structured routine, obsessively tracking scores, budgeting allowances, and occasionally forgetting to
    sleep after a coding sprint, and they persistently tweak their projects well into the night.
background:
  cultural: Anthony is a Black teenager growing up in Waterbury, Connecticut, a city with a vibrant, diverse community. His family’s African‑American heritage shapes his daily life through traditions of
    storytelling, music, and a strong emphasis on community solidarity. He participates in local after‑school programs at the Waterbury Youth Achievement Center, where mentorship from older Black students
    introduces him to civil‑rights history and celebrates cultural milestones such as Juneteenth. His parents stress the importance of education, resilience, and giving back to the neighborhood, encouraging
    him to be both academically disciplined and socially responsible. These cultural influences motivate his interest in technology as a tool for empowerment and his commitment to serving his community.
attributes:
  skills: '[''Mathematics (Algebra & Geometry)'', ''Basic Python programming'', ''LEGO Technic and robotics kit assembly'', ''Chess strategy'', ''Organizational planning'', ''Time management'', ''Effective
    note‑taking'', ''Team coordination in small study groups'', ''Basic video editing (iMovie)'']'
  hobbies: '[''LEGO Technic building'', ''Robotics projects'', ''Python coding (small scripts)'', ''Chess'', ''Reading graphic novels and sci‑fi'', ''Listening to hip‑hop and R&B music'', ''Jogging'', ''Meal
    planning with family'', ''Tutoring younger students'']'
  career_goals: Anthony aims to pursue a career in software engineering, focusing on educational technology that helps students organize homework and study schedules. He is determined to attend a STEM‑focused
    high school and later a university with a strong computer science program, where he hopes to earn scholarships for underrepresented students. He also envisions a backup path in community service, such
    as joining the fire department or a local public safety program, to combine his love for structure with a desire to protect his neighborhood. In the short term, he plans to deepen his coding skills,
    earn certifications in Python, and participate in hackathons geared toward youth.
