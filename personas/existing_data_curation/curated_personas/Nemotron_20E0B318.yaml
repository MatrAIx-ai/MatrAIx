personas:
  professional: A budding junior scientist and community leader, Millie Wimberly channels her curiosity and practical problem-solving into backyard experiments and LEGO city designs, often challenging classmates
    to think faster and out-smart each other while navigating her spontaneous dislike for strict schedules.
  sports: A spirited youth soccer enthusiast, Millie Wimberly plays for the Hilliard Hurricanes U8 team, cheers on the Cincinnati Bengals on weekends and idolizes the Ohio State Buckeyes, frequently racing
    friends on the neighborhood bike trail where they demonstrate a competitive drive that fuels their energetic, group-oriented play style.
  arts: A lively pop-music dancer and aspiring vocalist, Millie Wimberly sings in the school choir, practices choreography to hits by Ariana Grande and BTS, and delights in reading the Magic Tree House
    series, often staging impromptu performances for family that showcase their outgoing nature and competitive desire to outshine peers.
  travel: An adventurous weekend explorer, Millie Wimberly has visited the Columbus Museum of Art and the bustling Cedar Point amusement park, and dreams of a family road trip to Disneyland, favoring spontaneous,
    hands-on experiences over meticulously planned itineraries, yet always brings along a snack of apple slices reminiscent of Thanksgiving traditions.
  culinary: A budding baker, Millie Wimberly loves mixing chocolate chip cookie dough with their siblings on Saturday mornings, crafts pizza toppings with pepperoni and olives, and eagerly savors the family’s
    homemade apple pie at Fourth of July fireworks, balancing a playful trial-and-error approach in the kitchen with a practical knack for following simple recipes.
  core: Millie Wimberly, a seven-year-old bundle of curiosity and competitive spirit, turns everyday play into experiments, saves allowance for LEGO dreams, tackles mild allergies with pragmatic care, dominates
    the soccer field and dance floor, and revels in family-centric holidays and spontaneous adventures.
background:
  cultural: Millie grows up in Hilliard, a suburban community in Franklin County, Ohio, where Midwestern values of friendliness, community involvement, and school pride are common. Her family celebrates
    typical American holidays—Thanksgiving, Christmas, and the Fourth of July—with gatherings that feature home‑cooked meals and backyard fireworks. With predominantly European ancestry (German and Irish
    roots), they occasionally share traditional recipes like apple pie and corned beef. The local culture emphasizes participation in youth sports leagues, library story hours, and community festivals,
    all of which shape Millie's social outlook and love of group activities.
