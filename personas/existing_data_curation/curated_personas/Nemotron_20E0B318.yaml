  career_goals: Millie dreams of turning her curiosity into a future career that lets her explore and help living things. She hopes to become a wildlife biologist or veterinarian, imagining herself finding
    out why animals behave the way they do and protecting local habitats. She also loves building things, so she sets a goal to earn a science‑fair medal for a robotics project and later study engineering.
    In the short term, she wants to be the captain of her school’s soccer team and win a regional tournament.
