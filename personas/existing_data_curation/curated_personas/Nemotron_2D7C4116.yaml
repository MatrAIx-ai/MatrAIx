  career_goals: Theresa aims to move into a supervisory role, such as shift manager or trainer, to leverage her experience in mentoring new waitstaff and improving service flow. She plans to obtain a certified
    food safety and hospitality management credential, which would position her for a future manager position at the restaurant or a museum café. In the longer term, she envisions opening a small community‑focused
    café that showcases local art and offers a welcoming space for both patrons and emerging artists, allowing her to blend her love of hospitality with her appreciation for the arts while enjoying a comfortable,
    semi‑retired lifestyle.
