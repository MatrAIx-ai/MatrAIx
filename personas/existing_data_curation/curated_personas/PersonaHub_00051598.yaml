persona_description: A conservation biologist who specializes in the ecology and conservation of sharks and rays, particularly the endangered endemic Chrysichthys walkeri in the Pra Basin, Ghana. Their
  research aims to provide the first comprehensive information on the population status, ecology, and extent of the threat of Chrysichthys walkeri, and to garner grassroots support for the conservation
  of this endemic and threatened species. They also aim to develop and test a full DBI for Southern Ghana, the West African DBI (WADBI), and photographic guide to Odonata, bringing significant enhancement
  for Odonata conservation. Their overarching goal is to raise awareness and train local communities in wetland conservation, and to provide baseline diversity and phenology information across a broad range
  of sites.
