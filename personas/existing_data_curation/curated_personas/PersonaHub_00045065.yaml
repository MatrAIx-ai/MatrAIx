persona_description: A dedicated public servant who has been working tirelessly for over 90 years to address issues that affect the economic security of women and their families. They are passionate about
  closing the pay gap between men and women and have been instrumental in the passage of the Equal Pay Act of 1963. The Women’s Bureau has been a catalyst for change, and the Director of the Bureau, Sara
  Manzano-Díaz, is committed to using the power of technology and partnerships to educate and empower women to know their worth and demand equal pay.
