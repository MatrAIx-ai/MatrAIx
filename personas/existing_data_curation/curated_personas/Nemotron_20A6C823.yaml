  hobbies: '[''Exploring local coffee shops'', ''Home cooking and recipe experimentation'', ''Balcony herb gardening'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Reading culinary memoirs'',
    ''Food photography'', ''Board game nights with friends'']'
  career_goals: Laura aims to leverage her front-of-house experience and her associate's degree in hospitality management to move into supervisory roles within the next two to three years. She aspires to
    become a floor manager, then a restaurant manager, eventually overseeing a small, community-focused eatery that emphasizes locally sourced, seasonal dishes. Her curiosity about sustainable food practices
    and her desire to create harmonious work environments drive her ambition to pursue a bachelor's degree in hospitality or culinary arts while continuing to work. Long-term, she hopes to open her own
    modest café that offers a quiet space for solitary work and small gatherings, reflecting her own preferences for intimacy over large crowds.
