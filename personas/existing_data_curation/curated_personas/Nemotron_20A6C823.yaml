personas:
  professional: Laura Arjomand, a 25-year-old hospitality professional, leverages her intuitive guest‑reading ability, spontaneous problem‑solving, and practical mindset to excel in fast‑paced front‑of‑house
    roles while ambitiously pursuing supervisory positions and a future community‑focused café.
  sports: Laura Arjomand, a regular participant in sunrise yoga classes at India Point Park and a casual fan of the Boston Celtics and Providence Bruins, enjoys weekly paddle‑boarding on the Seekonk River
    during summer and follows the New England Patriots in football season, preferring low‑impact activities that align with her desire for balance and personal space.
  arts: Laura Arjomand, an avid photographer of Providence’s alleyway cafés and a collector of culinary memoirs by Anthony Bourdain and Ruth Reichl, frequently attends local gallery openings featuring photographer
    Nan Goldin and finds inspiration in indie folk musicians such as Sufjan Stevens and Bon Iver, which often color her journaling and board‑game nights with friends.
  travel: Laura Arjomand, who dreams of coffee‑centric travel, has explored Portland, Oregon’s renowned roasteries and the historic cafés of Lisbon, Portugal, and plans a future trip to Melbourne, Australia
    to dive into its vibrant brunch culture, all while carefully budgeting trips around her work schedule and maximizing points from her travel‑rewards credit card.
  culinary: Laura Arjomand, who delights in crafting seasonal dishes like rosemary‑infused roasted carrots with feta and herb‑laden matcha lattes, experiments with fresh thyme, sage, locally sourced honey
    from a nearby apiary, and a dash of smoked paprika, yet admits to over‑seasoning her experiments on occasion, leading to frequent taste‑test mishaps during her home cooking sessions.
  core: Laura Arjomand, a 25‑year‑old hospitality enthusiast, blends curiosity, spontaneity, and a quiet love for intimate spaces into a life of coffee‑filled wanderings, mindful self‑care, and a perpetual
    balancing act between ambition and anxiety.
background:
  cultural: Laura was raised in a middle-class suburban neighborhood of Providence, Rhode Island. Her family's roots trace back to several generations of New England settlers, with a blend of Irish, Italian,
    and Anglo-American heritage. Growing up in a city known for its vibrant immigrant communities, she was exposed to a variety of cultural cuisines and traditions, which sparked her curiosity about food
    and hospitality. The multicultural atmosphere of Providence, combined with the region's emphasis on community and self-reliance, shaped her values of cooperation, practicality, and respect for diverse
    perspectives.
attributes:
