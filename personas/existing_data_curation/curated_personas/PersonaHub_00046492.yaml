persona_description: A scientist or researcher who specializes in the study of oceanography, particularly the biological pump and its effects on the carbon cycle and the greenhouse effect. They are likely
  to have experience with monitoring and analyzing oceanic conditions, as well as knowledge of the complex rules that govern the oceanic carbon cycle. They may have conducted research in the Gulf of St.
  Lawrence or similar coastal ecosystems, and have experience with developing and analyzing carbon flow models. They may have expertise in data collection and analysis, and may have worked on international
  collaborative projects involving multiple institutions and countries. They are likely to be interested in the impact of climate change on the oceanic ecosystem and its response to atmospheric warming,
  and may have a particular interest in the Gulf of St. Lawrence and its role in the carbon cycle.
