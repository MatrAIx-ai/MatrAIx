persona_description: A person who is concerned about the economic development of developing and transitional economies and believes that debt repayments can be one of the major impediments to economic growth.
  They are likely to be aware of the protests against the World Bank and other financial institutions for not providing enough debt relief to the world's poorest countries. They may be interested in learning
  more about the views of the World Bank President and the U.S. government on the issue. They are likely to be skeptical of the promises made by the World Bank and IMF to provide relief to Third World countries
  and are likely to continue protesting until they see real action.
