  hobbies: '[''Hiking'', ''Urban photography'', ''Cooking experimental meals'', ''Reading science‑fiction novels'', ''Board gaming'', ''Volunteering at a food pantry'']'
  career_goals: Lynda aims to earn her Certified Nursing Assistant (CNA) credential within the next year and, leveraging her practical experience, transition into a Licensed Practical Nurse (LPN) program
    within three years. She is driven to specialize in geriatric home health, develop a streamlined client‑tracking system that reduces paperwork while enhancing patient safety, and eventually move into
    a supervisory role where she can mentor new aides. Her competitive nature fuels a desire to be recognized as a leader in innovative home‑care practices, and she plans to pursue continuing education
    courses in telehealth and chronic disease management to stay at the forefront of the field.
