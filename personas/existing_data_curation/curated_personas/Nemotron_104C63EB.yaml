personas:
  professional: Catalina Rizo is a computational biology undergraduate who fuses Python, R, Tableau, and Procreate to create interactive visual narratives of cellular processes, channeling a vivid imagination
    and a competitive spark into hackathon triumphs while their relaxed attitude toward strict deadlines often leaves schedules fluid, yet design-thinking skills enable rapid prototyping of compelling data
    stories.
  sports: Catalina Rizo enjoys hiking the rugged trails of Black Canyon City with a local desert-running club, follows the Arizona Cardinals for NFL excitement, and attends monthly yoga classes at a community
    studio, preferring solo or small-group fitness activities over crowded gyms, and occasionally joins a casual weekend soccer league with close friends.
  arts: Catalina Rizo blends digital illustration with folk-art motifs, drawing inspiration from Frida Kahlo, Beeple, and Lila Down's music while curating a Día de los Muertos mural featuring vibrant calaveras,
    indulges in graphic novels like Monstress and Saga, and channels tabletop RPG storytelling into concept art, often entering local digital art contests to outshine peers.
  travel: Catalina Rizo favors spontaneous road trips that balance desert solitude with cultural immersion, having road-tripped to Sedona’s red rocks and Oaxaca’s historic streets, dreaming of backpacking
    through Machu Picchu and Tokyo’s neon alleys, while they plan trips last-minute using a modest travel fund built from freelance commissions and rely on hostels and campgrounds for affordable stays.
  culinary: Catalina Rizo’s palate swings between crafting mole negro with chocolate and chipotle nuances and whipping up quick quinoa salads seasoned with lime and cumin, cooking tamales from scratch on
    weekend evenings, savoring street-taco tacos from a local food truck, and experimenting with avant-garde plating at pop-up art cafés, all while they occasionally splurge on exotic spices for home cooking.
  core: Catalina Rizo, a 19-year-old bio-visualizer, merges science and folklore through vivid digital art, thrives on spontaneous desert hikes, impulsively splurges on art supplies, and balances a competitive
    drive with a laid-back, sometimes disorganized, approach to life.
background:
  cultural: Catalina is a first‑generation Mexican American; her parents emigrated from Jalisco and maintain strong ties to Mexican traditions. She grew up bilingual, speaking Spanish at home and English
    at school, and regularly celebrates holidays such as Día de los Muertos, Mexican Independence Day, and family gatherings featuring foods like tamales and mole. Living in Arizona, she also identifies
    with the regional Southwest culture, blending desert‑inspired aesthetics into her art. Her Mexican heritage informs her worldview, fostering a deep respect for community storytelling, vibrant folk‑art
    motifs, and the value of cultural resilience, which she weaves into her creative projects.
attributes:
  skills: '[''Python programming'', ''R statistical analysis'', ''Computational biology'', ''PCR and gel electrophoresis'', ''Data visualization (Tableau, D3.js)'', ''Digital illustration (Procreate, Adobe
    Photoshop)'', ''Concept art creation'', ''Design thinking'', ''Rapid prototyping'', ''Creative problem solving'']'
  hobbies: '[''Hiking and desert sketching'', ''Reading speculative fiction and graphic novels'', ''Digital painting and generative art'', ''Participating in Mexican cultural festivals'', ''Mural creation
    for Día de los Muertos'', ''Tabletop role‑playing games'', ''Experimenting with algorithmic art'']'
  career_goals: Catalina aims to carve a niche at the intersection of science and visual storytelling. She hopes to secure a research internship in a biotech startup where she can develop interactive visualizations
    that translate complex biological processes for diverse audiences. Long‑term, she envisions founding a freelance studio that produces scientifically inspired artwork and educative multimedia content,
    while possibly pursuing a master’s degree in bioinformatics to deepen her technical expertise and maintain the flexibility she values.
