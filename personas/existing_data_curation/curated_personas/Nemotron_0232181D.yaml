personas:
  professional: Mohsen Kennedy, a 21‑year‑old construction worker and aspiring construction manager, melds his solid expertise in framing, concrete work, and blueprint reading with a quiet competitive streak
    and a curiosity for unconventional design, allowing him to lead small crews efficiently while secretly sketching art‑inspired building concepts on site.
  sports: Mohsen Kennedy enjoys rugged outdoor pursuits like hiking with the North Texas Trail Hikers, occasional fishing trips, and follows the Dallas Cowboys and Dallas Mavericks avidly, while keeping
    fit through weekend runs and pick‑up basketball games at the local community center.
  arts: Mohsen Kennedy spends his evenings sketching urban ruins while listening to Bon Iver and Townes Van Zandt, drawing visual inspiration from Edward Hopper’s muted cityscapes, and frequents the Dallas
    Museum of Art’s late‑night installations and the annual Deep Ellum art walk.
  travel: Mohsen Kennedy prefers solo road trips that blend rugged camping in places like Marfa and White Sands with occasional city stays in Austin for live music, has a bucket‑list stop in Barcelona for
    its modernist architecture, and plans each outing with a flexible itinerary that balances budget constraints and his love for hidden industrial sites.
  culinary: Mohsen Kennedy’s palate leans toward smoky Texas BBQ—brisket smoked over hickory, jalapeño‑infused chili, and mouth‑watering jalapeño‑cornbread—while he enjoys crafting simple meals at home,
    from hand‑rolled tortillas to grilled shrimp tacos, and his cooking skill hovers between competent home‑cook and eager experimenter with occasional burnt edges.
  core: Mohsen Kennedy is a quietly competitive, art‑infused builder who thrives on solitary sketching, meticulously budgets his life, battles back pain with posture hacks, and can’t resist a good barbecue,
    even if it means staying up late perfecting a recipe.
background:
  cultural: Mohsen grew up in Crowley, a small town in Johnson County, Texas, within a working‑class, predominantly Anglo‑American environment. His family’s values emphasize self‑reliance, hard work, and
    community involvement, typical of the West‑Texas work ethic. He was raised with traditional Southern customs—Sunday barbecues, high school football games, and country music—while also being exposed
    to the diverse cultural tapestry of the Dallas‑Fort Worth metro area, including Hispanic influences and regional art festivals. This blend of Texan pragmatism and exposure to varied artistic scenes
    nurtured his appreciation for both practical trades and creative expression.
