  career_goals: Mohsen aims to leverage his hands‑on experience and growing technical knowledge to advance within the construction industry. In the next two years he plans to earn an Associate’s degree
    in Construction Management and obtain OSHA certification and a NCCER credential. He aspires to be promoted to crew lead and then site supervisor, eventually obtaining a Certified Construction Manager
    (CCM) credential. His long‑term ambition is to launch his own boutique construction firm that blends sustainable building practices with distinctive, art‑inspired design, allowing him to combine his
    interest in architecture and aesthetics with his practical construction expertise. He also hopes to develop a portfolio of custom‑home projects that reflect his creative vision.
