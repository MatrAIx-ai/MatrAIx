  hobbies: '[''Dancing (Social & Ballroom)'', ''Karaoke Sessions'', ''Community Volunteering (Food Drives)'', ''Hiking in the Hill Country'', ''Weekend Road Trips'', ''Yoga & Mindfulness'', ''Cooking Tex-Mex
    & BBQ'', ''Attending Country Music Concerts'', ''Rodeos'', ''Puzzle Games (Crossword & Sudoku)'']'
  career_goals: Marlene aims to move from frontline cabin duties to a leadership position within the airline. In the short term she seeks promotion to Senior Cabin Crew, where she can mentor new attendants
    and lead safety briefings. Long‑term, she envisions becoming a training coordinator or regional operations manager for a Texas‑based carrier, designing programs that balance strict safety standards
    with flexible problem‑solving approaches. A stable schedule is also a priority, allowing her to support her marriage and increased community involvement.
