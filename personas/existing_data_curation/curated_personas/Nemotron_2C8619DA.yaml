personas:
  professional: Cary Hennig, a budding teenage programmer and aspiring engineer, balances schoolwork with methodical LEGO construction, wooden ship modeling, and coding simple video-game prototypes, applying
    their organized, curiosity‑driven mindset to solve problems and plan projects step‑by‑step.
  sports: Cary Hennig, an enthusiastic basketball player at the local community center and avid weekend fisherman at the Dickinson estuaries, supports the regional high school team the Dickinson Wildcats
    and cheers for the Minnesota Vikings, while participating in the Boy Scouts' wilderness survival club.
  arts: Cary Hennig, a sci‑fi aficionado who devours novels by Isaac Asimov and Alan Dean Foster, captures sunsets with a digital camera inspired by Ansel Adams, and builds imaginative LEGO worlds while
    listening to Imagine Dragons and indie game soundtracks, weaves creative expression into everyday life.
  travel: Cary Hennig, a nature‑curious teen, spends summer camps at nearby state parks like Custer State Park, dreams of trekking the Pacific Northwest's coastal trails, and plans a future fishing expedition
    to Alaska's Kenai River, balancing weekend trips with school schedules and family budget constraints.
  culinary: Cary Hennig, a budding home cook who enjoys grilling the trout they catch, perfecting fish tacos with fresh lime, cilantro, and avocado, and whipping up classic PB&J sandwiches and pepperoni
    pizza on Friday nights, experiments with DIY marinades while occasionally over‑salting their dishes.
  core: Cary Hennig is a methodical, curiosity‑driven teenager who blends organized tinkering, outdoor adventure, and creative coding into a balanced life of school, sports, and community service, even
    if they sometimes over‑indulge in late‑night gaming.
background:
  cultural: Cary was raised in Dickinson, a coastal community in Galveston County, Texas, where his family’s roots trace back several generations to the Anglo-American settlers of the Gulf Coast region.
    The local culture blends Southern hospitality, a strong sense of community, and an appreciation for the natural environment of the Gulf. Attendance at local public schools, participation in community
    events such as high school football games and county fairs, and involvement with the Boy Scouts reflect the values of teamwork, service, and self-reliance prevalent in the area. His family maintains
    modest religious practices typical of many White Texan families, attending a nearby Christian church on Sundays. The coastal setting shapes his interest in marine and environmental topics, while the
    region’s blend of traditional Texan customs and a growing multicultural presence informs a balanced, open-minded worldview.
