    community projects'']'
  career_goals: Cary aspires to attend a STEM-focused high school and later earn an engineering degree, preferably in civil or mechanical engineering, with a concentration on coastal infrastructure and
    environmental resilience. He hopes to secure a summer internship at a local marine research facility or a civil-engineering firm working on sea-wall projects to protect Galveston County. In the long
    term he envisions designing sustainable water-management systems that safeguard his hometown from storm-surge impacts while also contributing to renewable energy solutions. Alongside his engineering
    ambitions, he is open to exploring roles that combine his love of the outdoors with technology, such as a field technician for wildlife monitoring projects.
