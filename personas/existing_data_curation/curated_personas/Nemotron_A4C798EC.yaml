  career_goals: Mujib aims to become a shift supervisor within the next two years and then advance to an assistant manager role at a restaurant chain. He plans to enroll in a community‑college hospitality
    or culinary program to deepen his operational knowledge and business skills. Long‑term, he dreams of opening a fusion eatery that blends South Asian flavors with Southern comfort food, leveraging his
    curiosity for new recipes and his practical fast‑food experience. He also intends to earn a food‑safety certification and eventually franchise his concept.
