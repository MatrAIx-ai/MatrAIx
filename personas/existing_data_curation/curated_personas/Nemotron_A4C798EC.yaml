personas:
  professional: Mujib Goyani is a 23‑year‑old restaurant team member who excels at rapid order fulfillment, precise cash handling, and bilingual customer interaction, channeling their curiosity for new
    kitchen technology and spontaneous, people‑centric style into a collaborative, high‑energy work environment.
  sports: Mujib Goyani fuels their energetic routine with weekly pickup basketball at Goodale Park, follows the Columbus Crew in the MLS, hikes the rugged trails of Hocking Hills State Park on weekends,
    and occasionally joins a community adult recreational soccer league for variety.
  arts: Mujib Goyani channels their love for music by jamming to Bollywood classics from A.R. Rahman and contemporary hip‑hop tracks by Kendrick Lamar, binge‑watching films like Parasite and Inception on
    weekends, and engaging with the online gaming community while streaming on Twitch alongside favorite streamers such as Poki and Valkyrae.
  travel: Mujib Goyani’s travel style blends spontaneous weekend road trips to nearby Ohio gems like Cincinnati’s Over‑the‑River Market and Hocking Hills, a craving for culinary adventures that fuels a
    planned summer visit to New Orleans for its vibrant food scene, and occasional budget‑friendly flights to Toronto to experience multicultural festivals.
  culinary: Mujib Goyani showcases a keen palate by mastering traditional biryani and samosas for friends, experimenting with Southern twists like adding smoked brisket and collard greens to classic recipes,
    and eagerly sampling food‑truck tacos, ramen bowls, and artisanal cheese curds around Columbus.
  core: Mujib Goyani is a socially vibrant, curiosity‑driven 23‑year‑old who balances spontaneous culinary adventures with a disciplined work ethic, juggling fast‑paced service, budget splurges, and a love
    for basketball, music, and community.
background:
  cultural: Mujib comes from a Bangladeshi family whose parents emigrated to the United States. At home, Bengali language, cuisine, and celebrations such as Eid and Pohela Boishakh are central. Growing
    up in Columbus, GA, he blends his South Asian heritage with Southern culture—enjoying barbecues, football games, and local festivals while maintaining strong family ties and a hospitality‑focused upbringing.
    His bilingual background and community‑oriented values shape his cooperative nature and love for sharing food and experiences with others.
