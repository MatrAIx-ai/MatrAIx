personas:
  professional: Kyle Farner is a high‑school teacher in Somerset who blends a business education with a knack for curriculum design, and they use meticulous lesson‑plan templates and data‑driven assessment
    while allowing enough flexibility to adapt when classroom realities shift.
  sports: Kyle Farner stays active by hiking the Laurel Ridge State Park trails with the local Laurel Ridge Hiking Club and fly‑fishing at Raystown Lake on weekends, and they root for the Pittsburgh Steelers
    and Penguins while occasionally joining a community softball league in the spring.
  arts: Kyle Farner channels creativity through woodworking projects inspired by Gustav Stickley, weekly Settlers of Catan board‑game nights, and a steady soundtrack of folk artists like Bob Dylan and The
    Avett Brothers, and they unwind by reading biographies by Doris Kearns Goodwin.
  travel: Kyle Farner prefers low‑key, nature‑focused road trips, often planning spontaneous weekend getaways to the Adirondacks or Shenandoah National Park, and they dream of a longer adventure to Patagonia’s
    mountain regions once the children are grown.
  culinary: Kyle Farner embraces farm‑to‑table cooking, regularly roasting heirloom tomatoes with rosemary‑infused trout caught on Raystown Lake, crafting seasonal salads with fresh kale and goat cheese,
    and they occasionally experiment with sourdough bread in their modest kitchen.
  core: Kyle Farner is a meticulous high‑school teacher who secretly trades structured curricula for impromptu fly‑fishing excursions, but they habitually misplace tax receipts, preferring the fresh pine
    air of the forest over paperwork.
background:
  cultural: Kyle grew up in Somerset County, a region with deep Appalachian and Pennsylvania Dutch roots. His family background reflects a blend of German and British ancestry typical of the area, and he
    was raised with modest, community‑centered values emphasized by local churches and town gatherings. These influences fostered a strong work ethic, appreciation for self‑reliance, and a commitment to
    supporting neighbors. He maintains traditions such as attending the Somerset County Fair, participating in holiday church services, and enjoying regional foods like pepperoni rolls and apple orchards.
attributes:
