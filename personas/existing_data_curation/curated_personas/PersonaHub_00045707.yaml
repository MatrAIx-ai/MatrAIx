persona_description: A GIS professional who works at The Nature Conservancy and is passionate about using maps and data to solve environmental questions. They have a strong background in cartography and
  have worked on various projects such as stormwater modeling, mapping fire severity, producing numbers for timber mill projects, and modeling coastal vulnerability. Their favorite GIS project is stormwater
  modeling, and they are inspired by past and current cartographers who focus on shaded relief. They recommend Maphead by Ken Jennings and The Mapmakers by John Noble Wilford as books for map enthusiasts.
  They have been to 23 states and 6 countries and have stepped foot in 12 countries. Their most想去的地方是东南亚的亚洲象栖息地和范围，特别是上布拉马普特拉河谷，那里有令人惊叹的河流曲折和季节变化。
