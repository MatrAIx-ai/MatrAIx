persona_description: A machinist who specializes in deep hole drilling, particularly in the machining of cylindrical holes with a depth exceeding 10 times the diameter. The machinist has a deep understanding
  of the machining process, including the machining accuracy, surface roughness, and the difficulty of machining a hole compared to an outer circular surface. The machinist is skilled in selecting the appropriate
  tools and techniques based on different materials, sizes, and precision requirements, and in controlling the cutting conditions to prevent damage to the tool and the part. The machinist is also skilled
  in identifying and handling the chips that are generated during the machining process, and in making small adjustments to the feed and speed to ensure that the chips are the right size and shape for the
  machining process.
