  career_goals: Emily dreams of a future where she can combine her love for routine, organization, and helping others. She is especially drawn to becoming a teacher because she enjoys guiding friends through
    lessons and values the structured environment of a classroom. She also has a soft spot for animals and sometimes imagines a career as a veterinarian, but her primary ambition is to pursue a profession
    that allows her to care for people while maintaining a predictable schedule.
