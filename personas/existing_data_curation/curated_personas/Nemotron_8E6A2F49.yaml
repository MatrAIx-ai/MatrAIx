  career_goals: Thomas dreams of becoming an astronaut or a wildlife biologist who explores the bayous of Louisiana and helps protect the environment. He aspires to keep learning science, improve his coding
    skills, and one day lead community projects that combine his curiosity with his natural talent for organization. He also envisions possibly becoming a teacher or a youth mentor, where he can share his
    love of teamwork and kindness with others.
