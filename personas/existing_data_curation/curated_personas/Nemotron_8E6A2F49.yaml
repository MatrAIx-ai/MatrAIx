personas:
  professional: Thomas Varre, a 9‑year‑old budding STEM enthusiast, channels their organized, methodical nature into building LEGO contraptions and programming simple Scratch games, dreaming of one day
    designing rockets for community science fairs.
  sports: Thomas Varre, a lively member of the Walker Youth Soccer League and the after‑school basketball program, proudly sports a New Orleans Saints cap while cheering on teammates and practices dribbling
    drills at the community park every Saturday with the same reliability they apply to school projects.
  arts: Thomas Varre, an enthusiastic drummer in the elementary school band, taps along to songs by Billie Eilish and classic Disney soundtracks, while also diving into the adventures of Mary Pope Osborne’s
    Magic Tree House series and constructing LEGO sculptures inspired by Marvel superheroes.
  travel: Thomas Varre, an avid weekend explorer, has paddled through the Atchafalaya Basin, watched sunrise over Grand Isle’s Gulf Coast, and dreams of visiting the Space Center in Houston to see real
    rockets, while also hoping to one day experience the bright lights of New York City on a family trip.
  culinary: Thomas Varre, a self‑declared fan of regional dishes, eagerly helps stir jambalaya and sauté crawfish at family gatherings, masters the art of assembling perfect chicken‑nugget bites with ketchup,
    and occasionally experiments with making homemade beignets during Sunday bake‑offs.
  core: Thomas Varre blends a curiosity for rockets with a community‑first spirit, balancing schoolwork, sports, music, and a love for regional cuisine while staying organized, generous, and occasionally
    forgetful about their inhaler.
background:
  cultural: Thomas grows up in Walker, a small community in Livingston Parish, Louisiana, where Southern hospitality, close‑knit family life, and a mix of rural traditions shape his upbringing. His family
    attends a local Methodist church and celebrates regional customs such as outdoor picnics, fishing trips, and seasonal festivals that feature Cajun and Creole influences like jambalaya and crawfish boils.
    The community’s emphasis on helping neighbors, attending school events, and rooting for the New Orleans Saints contributes to his sense of belonging and reinforces his cooperative, considerate nature.
