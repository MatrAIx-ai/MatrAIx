  hobbies: '[''Visiting Art Museums and Galleries'', ''Attending Live Jazz and Music Performances'', ''Urban Hiking and Photography'', ''Cooking International Cuisine'', ''Reading Contemporary Fiction and
    Philosophy'', ''Playing Acoustic Guitar'', ''Exploring Historical Sites in the DC Metro Area'', ''Participating in Community Volunteer Projects'']'
  career_goals: Tyler aspires to transition into a senior HR leadership role, such as HR Director or Senior HR Business Partner, where he can shape organizational culture at a strategic level. He aims to
    champion innovative employee‑engagement programs that incorporate art, mindfulness, and experiential learning, positioning his organization as a cultural pioneer in the public‑sector landscape of Washington,
    DC. In addition, Tyler hopes to become a recognized speaker at national HR conferences and contribute thought pieces on the intersection of creativity and workplace well‑being. Long‑term, he envisions
    mentoring the next generation of HR professionals, emphasizing flexibility, empathy, and continuous learning.
