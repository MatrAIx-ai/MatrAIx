  career_goals: At 70, Tho aims to shift his focus from direct patient care to legacy building within the nursing profession. He plans to serve as a part‑time clinical instructor at a local community college,
    developing curricula that blend practical bedside skills with the latest health‑tech advancements. He also seeks to consult for health‑technology startups, ensuring new EHR modules are intuitive for
    senior clinicians and patients. A passionate advocate for caregiver well‑being, he intends to spearhead a community program that offers stress‑management workshops for healthcare workers, drawing on
    his own experiences with anxiety and worry. Additionally, Tho wishes to author a memoir that chronicles his journey as a Vietnamese‑American nurse, highlighting cultural resilience and the importance
    of lifelong curiosity.
