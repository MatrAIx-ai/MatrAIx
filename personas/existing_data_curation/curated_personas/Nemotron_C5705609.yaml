personas:
  professional: Estela Robison, a 32‑year‑old interdisciplinary curriculum specialist in Jefferson County Public Schools, leverages her meticulous lesson‑planning, data‑driven assessment design, and flair
    for theater‑inspired project‑based learning to champion STEAM integration while confidently leading teacher teams and persuading administrators with her charismatic, center‑stage presence.
  sports: Estela Robison stays active by attending weekday yoga sessions at Louisville’s CorePower studio, hiking the Jefferson Memorial Forest on weekends, cheering for the Louisville Bats baseball team,
    and participating in the local running club’s 5K races during the spring.
  arts: Estela Robison immerses herself in Louisville’s arts scene by performing with the improv troupe The Gaslight Players, collecting prints from local painter Svyatlana Skrypnyk, listening to Alabama
    Shakes on repeat, and hosting monthly book‑club discussions featuring poets like Ocean Vuong and novelists such as Hilary Mantel.
  travel: Estela Robison prefers meticulously planned weekend getaways that blend cultural immersion and outdoor adventure, having recently explored Asheville’s craft beer breweries and Blue Ridge hikes,
    while eyeing a future solo trip to Kyoto’s historic temples and a family road‑trip to the Gulf Coast’s coastal towns.
  culinary: Estela Robison delights in cooking Southern‑inspired meals, often perfecting fried chicken with a buttermilk brine, collard greens simmered with smoked paprika, and bourbon‑glazed pecan pie,
    while hosting potluck evenings where friends sample her homemade cornbread and spiced deviled eggs.
  core: Estela Robison is a hyper‑organized, stage‑loving educator who balances a relentless drive for academic excellence with a social zest for arts, community, and impromptu karaoke, even if it sometimes
    means sacrificing sleep.
background:
  cultural: Estela grew up in a middle‑class, predominantly white suburb of Louisville, where Appalachian and Southern cultural influences blended with the broader Midwestern values of community and modesty.
    Her family, of Anglo‑American heritage, celebrated traditional holidays with church gatherings and local customs—such as the Kentucky Derby festivities and bluegrass music. Her upbringing emphasized
    the importance of education, public service, and community involvement, shaping her commitment to teaching and civic engagement. Exposure to the humanities during her college years deepened her appreciation
    for diverse literary and historical perspectives, which she brings into her classroom. While rooted in local Kentucky culture, she also values broader American cultural narratives and strives to create
    an inclusive environment for students of varied backgrounds.
