  hobbies: '[''Pottery'', ''Watercolor Painting'', ''Reading Historical Fiction'', ''Book Club Discussions'', ''Attending Live Music and Theater'', ''Yoga'', ''Hiking'', ''Improv Comedy Workshops'', ''Community
    Garden Volunteering'', ''Cooking Southern‑inspired Meals'', ''Hosting Potluck Gatherings'']'
  career_goals: She aims to become an instructional coach or curriculum specialist within the Jefferson County Public Schools, leading the development of a district‑wide interdisciplinary arts‑STEAM program.
    She plans to earn a Master’s in Educational Leadership within the next two years, followed by a doctorate in Curriculum and Instruction. She also aspires to mentor new teachers, advocate for increased
    arts funding, and eventually transition into an educational policy role at the state level, shaping curricula that balance creativity with academic rigor.
