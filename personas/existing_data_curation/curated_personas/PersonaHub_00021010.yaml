persona_description: A historian and urban planner who is interested in the history and principles of urban design, particularly those related to movement systems, open space, architectural mass, and the
  impact of space, color, and perspective on the city-dweller. They are drawn to the synthesis of words and pictures provided by Edmund N. Bacon in his book "Design of Cities," and are interested in the
  historical examples that he uses to illustrate the fundamental forces and considerations that determine the form of a great city. They are likely to appreciate the insights and examples provided in the
  book and may seek out further information and resources related to urban design and planning.
