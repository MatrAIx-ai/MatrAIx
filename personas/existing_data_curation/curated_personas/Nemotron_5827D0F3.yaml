  career_goals: Though retired from full-time teaching, Karla aims to stay active in education by mentoring new teachers, leading an adult literacy program at the local library, and documenting her experiences
    for a community history project. She also hopes to organize intergenerational workshops that connect seniors with schoolchildren, and to maintain her health so she can travel to visit her grandchildren
    each summer.
