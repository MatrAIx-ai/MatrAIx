  career_goals: Elizabeth plans to earn her GED within the next year and then enroll in a community‑college program in health‑care support or hospitality management. She envisions a career that blends her
    love for people and her knack for organization—such as a patient‑services coordinator, event manager for community programs, or a manager in a boutique hospitality venue. In the longer term, she hopes
    to start her own small business offering custom crafts and event planning services, leveraging both her creative skills and practical mindset.
