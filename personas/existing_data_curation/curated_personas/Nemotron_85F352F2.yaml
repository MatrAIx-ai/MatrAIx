personas:
  professional: Elizabeth Johnson, a 17-year-old high-school senior, channels her curiosity and practicality into a budding career focus on event coordination, leveraging her strong organization, digital
    tool proficiency, and leadership in cheerleading and drama club to orchestrate school fundraisers, animal-shelter drives, and peer project timelines, while they envision future roles as a patient-services
    coordinator or boutique hospitality manager.
  sports: Elizabeth Johnson stays athletically active through her high-school cheer squad and weekend hikes across Fort Bend County, while they cheer passionately for the Houston Astros, Houston Rockets,
    and Houston Texans, and occasionally join a local community soccer league for extra cardio.
  arts: Elizabeth Johnson expresses creativity through drama club performances, nature photography captured on hikes, and short TikTok-style videos, drawing inspiration from actors like Lin-Manuel Miranda,
    musicians such as Taylor Swift, and photographers including Annie Leibovitz, which they blend into a personal aesthetic that often surfaces in their DIY upcycling projects.
  travel: Elizabeth Johnson enjoys weekend road trips to Galveston's beaches and Austin's music festivals, and dreams of a future backpacking adventure through the Grand Canyon and a relaxed island getaway
    in Maui, planning each trip with meticulous itineraries that reflect their organized nature and spontaneous love for outdoor discovery.
  culinary: Elizabeth Johnson channels her love for baking into weekly experiments with cupcakes topped with chocolate ganache and lemon-curd swirl, pies featuring apple-cinnamon filling and flaky crusts,
    and seasonal treats like pumpkin-spice muffins, all while they skillfully balance a modest kitchen confidence with a tendency to over-decorate and occasionally forget to preheat the oven.
  core: Elizabeth Johnson, forever juggling a meticulously color-coded planner and a whisk, can be found arriving late to group meetings because they paused to perfect a frosting swirl, and they secretly
    binge-watch DIY upcycling videos before bedtime.
background:
  cultural: Elizabeth was raised in a middle‑class, suburban white family in Richmond, Texas, within the broader Fort Bend County community. Her upbringing reflects a blend of Southern hospitality and a
    strong sense of neighborly involvement. Family gatherings often center around home‑cooked meals, church activities, and local events like county fairs and community festivals. The region's proximity
    to Houston exposes her to a multicultural environment, fostering an appreciation for diverse perspectives while maintaining the values of hard work, personal responsibility, and community service that
    are common in her Texan surroundings.
