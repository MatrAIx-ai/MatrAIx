  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Beach walking'', ''Reading historical fiction'', ''Yoga and meditation'', ''Volunteering at adult literacy programs'', ''Watercolor painting'',
    ''Birdwatching'']'
  career_goals: Jasmine aims to expand her impact by leading the creation of a department-wide inclusive curriculum framework that weaves bilingual content and trauma‑informed teaching practices. She aspires
    to launch a mentorship program for early‑career faculty, champion campus‑wide mental‑health initiatives for students and staff, and secure a leadership role such as department chair or program director
    within the next five years. In parallel, she hopes to author a guide on compassionate pedagogy and continue consulting for community colleges on equity‑focused education after retirement.
