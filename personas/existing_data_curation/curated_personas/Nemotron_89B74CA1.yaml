personas:
  professional: An educator named Jasmine Roldan has spent three decades shaping adult learning experiences in community colleges, specializing in bilingual, trauma‑informed curriculum design, grant writing,
    and compassionate academic advising; their keen curiosity balanced with practical organization drives inclusive program development while their deep empathy fuels mentorship and conflict resolution.
  sports: Jasmine Roldan enjoys leisurely walks along the Gulf Coast beaches near Fairhope, often joining the Sunrise Walking Club, and supports the Birmingham Barons minor‑league baseball team and the
    Auburn Tigers football program; they occasionally play casual beach volleyball with friends but prefer low‑impact activities that soothe their anxiety, like birdwatching at nearby nature preserves.
  arts: Jasmine Roldan spends quiet evenings painting watercolors of coastal sunrise scenes, drawing inspiration from Georgia O’Keeffe and Winslow Homer, while their literary palate favors historical fiction
    by authors such as James Lee Burke and Mary Lawson; they also unwind listening to the folk melodies of John Denver and the classical piano works of Ludovico Einaudi, which together enrich their creative
    and reflective worldview.
  travel: Jasmine Roldan's travel style blends careful planning with spontaneous discovery, favoring coastal retreats like the Florida Keys and cultural trips to historic towns such as Savannah, Georgia;
    they dream of exploring the art‑rich streets of Barcelona and the tranquil gardens of Kyoto, yet always prioritize visits close to home that allow for beach walks and birdwatching, balancing adventure
    with their family's financial constraints.
  culinary: Jasmine Roldan delights in preparing family recipes that feature heirloom tomatoes, fresh herbs, and regional flavors, mastering dishes like slow‑cooked tomato stew, roasted corn and bean wraps,
    and spiced corn‑bread, while their kitchen experiments often involve adding wildflower petals to salads for a fragrant twist; they bolster their modest culinary skill with weekly visits to the local
    farmer’s market where they select organic vegetables and artisanal cheese.
  core: Jasmine Roldan is a compassionate educator‑turned‑gardener whose disciplined yet anxiety‑prone nature fuels a life of inclusive teaching, mindful cooking, and watercolor meditations, and they often
    treat their garden as a sanctuary for both solace and occasional seed‑shopping splurges.
background:
  cultural: Jasmine’s cultural background is rooted in Mexican heritage; she grew up in a bilingual, intergenerational household where Spanish was spoken daily and Mexican customs—such as Día de los Muertos,
    traditional folk music, and close‑knit family gatherings—were central to life. The values of familismo, respeto, and collectivism have shaped her compassionate and cooperative nature. While living in
    Fairhope, Alabama, she blends these traditions with Southern hospitality, often sharing Mexican dishes at community events and incorporating culturally responsive examples into her curriculum to honor
    both her Mexican roots and her Southern community.
attributes:
  skills: '[''Curriculum Development'', ''Bilingual and Culturally Responsive Pedagogy'', ''Adult Learning Theory'', ''Academic Advising'', ''Educational Technology Integration'', ''Program Evaluation'',
