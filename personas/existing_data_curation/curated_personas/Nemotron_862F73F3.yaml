  hobbies: '[''Building LEGO models'', ''Drawing and coloring'', ''Reading adventure books'', ''Playing soccer with small groups'', ''Helping in the kitchen (Mexican cooking)'', ''Listening to Mexican music'',
    ''Family hikes in nature'']'
  career_goals: Jose dreams of a future where he can help others learn and build. He often says he wants to become a teacher because he enjoys sharing knowledge, or a community helper such as a firefighter
    or a construction worker who builds safe homes for families. He also imagines working in a kitchen, preparing the Mexican dishes he loves with his family, reflecting his generous and caring nature.
