personas:
  professional: A budding engineer who loves building LEGO vehicles, Jose Franco follows step‑by‑step guides yet often slips in creative tweaks, showing a practical mindset tempered by a willingness to
    improvise while they daydream about designing real‑world machines.
  sports: An enthusiastic small‑group soccer player with the Spokane Shadow Youth Soccer Club, Jose Franco enjoys weekend drills at the local park, preferring tight‑knit games with two or three friends
    over larger scrimmages, and they always lace up their well‑worn cleats before heading out.
  arts: A vivid colorist and cartoon enthusiast, Jose Franco spends afternoons drawing Adventure Time characters and coloring in storybooks while traditional mariachi tunes like the lively songs of Juan
    Gabriel play, they sway to the rhythm and practice dance steps at home.
  travel: A curious explorer who loves family hikes in the nearby foothills and recent trips to the Columbia River Gorge, Jose Franco dreams of camping at the Grand Canyon and visiting the historic ruins
    of Teotihuacan, preferring road trips with parents over crowded vacations.
  culinary: A junior kitchen helper who eagerly assembles tacos and quesadillas and stirs homemade salsa, Jose Franco learns to roll tamales with their family during festive gatherings, they love the smoky
    flavor of chipotle and the bright zest of fresh cilantro.
  core: A structured yet adaptable LEGO builder who balances quiet drawing sessions, small‑team soccer games, and caring household chores, Jose Franco blends predictability with spontaneous creativity while
    quietly nurturing family harmony.
background:
  cultural: Jose grows up in a Mexican‑American household in Spokane, where Spanish is spoken alongside English. His family celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and Cinco
    de Mayo, often preparing homemade tamales, salsa, and other dishes. He attends a bilingual community program that teaches Mexican folklore and history, fostering pride in his heritage while integrating
    into the broader Spokane community. Family gatherings are warm and cooperative, emphasizing respect, kindness, and helping one another, values that shape his caring personality.
attributes:
  skills: '[''Reading (grade 2 level)'', ''Bilingual communication (English & Spanish)'', ''LEGO building and puzzle solving'', ''Basic arithmetic (addition & subtraction)'', ''Digital literacy (educational
