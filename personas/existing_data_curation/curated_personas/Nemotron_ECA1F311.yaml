personas:
  professional: Latoya Evans, a community‑focused college junior pursuing a degree in Social Work, blends their curiosity for social‑justice research with a practical, methodical event‑planning style, using
    their organized data‑collection skills and compassionate demeanor to design youth mentorship workshops that are both evidence‑based and deeply empathetic.
  sports: Latoya Evans, an avid runner who logs morning interval runs with the Marshall Runners Club and attends weekly yoga sessions at the community center, passionately follows the Dallas Cowboys in
    football, the Dallas Mavericks in basketball, and occasionally streams Texas A&M–Commerce Lions games, while maintaining a balanced fitness routine that includes cardio, flexibility work, and pickup
    volleyball on the university courts.
  arts: Latoya Evans, a devoted church‑choir vocalist who curates playlists featuring classic R&B legends like Marvin Gaye and Aretha Franklin, gospel powerhouses such as Kirk Franklin, and modern hip‑hop
    artists like Kendrick Lamar, also spends weekends photographing everyday moments and sketching concepts inspired by visual artists like Kehinde Wiley, weaving these creative outlets into a cohesive
    artistic identity.
  travel: Latoya Evans, a thrifty traveler who prefers to combine cultural immersion with community service, has explored Austin’s live‑music scene, spent a weekend in New Orleans sampling Creole cuisine,
    hopes to tour the museums of Washington, D.C., and dreams of a restorative island retreat in the Caribbean, all while planning trips around modest budgets and semester breaks.
  culinary: Latoya Evans, an enthusiastic home cook who masters Southern comfort dishes like fried catfish with hush puppies, collard greens simmered with smoked turkey, and sweet potato pie, seasons their
    meals with locally sourced okra, fresh herbs, and a pinch of cayenne, enjoys experimenting with smoked paprika in marinades, yet sometimes overcooks the cornbread crust when juggling rehearsals and
    tutoring sessions.
  core: Latoya Evans balances a compassionate, methodical approach to activism and the arts with a habit of over‑committing to projects, leading to frequent late‑night coffee binges and occasional forgotten
    laundry.
background:
  cultural: Latoya is an African‑American young adult raised in Marshall, Texas, a community steeped in Southern Black cultural traditions. Her upbringing has been shaped by close family ties, regular church
    participation, and the historic legacy of the civil‑rights movement in East Texas. She celebrates traditions such as Juneteenth, family barbecues, and gospel‑infused worship services that blend contemporary
    soul music with traditional hymns. The region’s emphasis on community support, storytelling, and resilience informs her worldview and fuels her desire to give back to the Black community through service
    and mentorship.
attributes:
  skills: '["Written communication","Research and data analysis","Microsoft Office (Word, Excel, PowerPoint)","Event planning and coordination","Academic tutoring","Peer counseling and mental health awareness"]'
  hobbies: '["Reading (fiction and social‑justice non‑fiction)","Volunteer work at community center","Church choir singing","Yoga and jogging","Cooking Southern and soul‑food recipes","Photography","Listening
    to R&B, gospel, and hip‑hop","Journaling and sketching"]'
  career_goals: Latoya plans to complete a bachelor’s degree in Social Work or Community Health with the goal of becoming a licensed clinical social worker or community health worker. She is motivated to
    serve underserved populations in East Texas, focusing on youth mentorship, mental‑health outreach, and family support services. In the longer term, she envisions launching a nonprofit organization that
    offers after‑school programs and resources for Black youth in Marshall, while pursuing continued education and certifications in trauma‑informed care.
