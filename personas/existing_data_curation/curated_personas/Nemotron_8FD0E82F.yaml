personas:
  professional: Tyler Hatten, a 36‑year‑old seasoned educational guidance counselor, leverages evidence‑based career inventories, meticulous case documentation, and a compassionate, routine‑oriented approach
    to mentor Baltimore youth while orchestrating data‑driven program initiatives that balance structure with responsive flexibility; they excel at crisis intervention, workshop facilitation, and collaborative
    program development.
  sports: Tyler Hatten, a 36‑year‑old who jogs the Inner Harbor three times weekly with the Baltimore Mid‑Atlantic Running Club, follows the Ravens in football, cheers the Orioles in baseball, and joins
    a seasonal adult softball league in summer, balancing disciplined cardio with friendly competition; they appreciate structured team loyalty while carving out personal time for reflection.
  arts: Tyler Hatten, a 36‑year‑old with a love for classic literature like Dickens and Tolstoy, regularly attends live jazz sessions featuring Wynton Marsalis at the Royal Theatre and enjoys productions
    at Baltimore Center Stage, weaving these cultural experiences into a reflective, improvisational mindset; they find solace in the familiar narratives and spontaneous melodies that echo their own balanced
    routine.
  travel: Tyler Hatten, a 36‑year‑old who meticulously plans weekend getaways to historic East Coast sites such as Colonial Williamsburg and Philadelphia, dreams of a spring trip to Kyoto’s temples, and
    balances adventure with budget constraints by using loyalty points and staying in modest B&Bs; they favor structured itineraries that blend cultural immersion with moments of quiet reflection.
  culinary: Tyler Hatten, a 36‑year‑old home chef, skillfully recreates family staples like chicken and dumplings and herb‑roasted pork tenderloin with rosemary and thyme, occasionally experiments with
    pad thai using tamarind and fish sauce, and they favor fresh seasonal vegetables, balancing comfort cooking with occasional culinary curiosity.
  core: Tyler Hatten, a 36‑year‑old counselor who thrives on routine, volunteers weekly at a community center, sometimes hoards garden tools, and can't resist a late‑night jazz vinyl, embodies a compassionate,
    methodical approach to life, balancing meticulous planning with spontaneous generosity; they are known for a quiet habit of humming soft melodies while grading papers.
background:
  cultural: Tyler grew up in a middle‑class, predominantly white neighborhood of Baltimore, surrounded by the city’s rich tapestry of cultural influences. His upbringing emphasized education, community
    responsibility, and practical achievement, values reinforced by his parents’ encouragement to pursue higher learning in the arts and humanities. Living in a diverse urban environment exposed him to
    the traditions, languages, and artistic expressions of Baltimore’s African‑American, immigrant, and LGBTQ+ communities, fostering his deep compassion and collaborative spirit. While his personal cultural
    identity aligns with mainstream Mid‑Atlantic American norms—celebrating holidays like Thanksgiving and the Fourth of July—he also embraces the city’s local history, maritime heritage, and eclectic music
    scene, integrating these experiences into his professional ethos of inclusive, culturally sensitive counseling.
