  career_goals: Tyler aims to advance to a senior leadership role, such as Director of Student Services at a regional university or a citywide nonprofit focused on career readiness. He envisions designing
    a comprehensive, equity‑focused career guidance program that integrates vocational training with mental‑health support for Baltimore’s diverse student population. To achieve this, he plans to pursue
    a doctorate in counseling psychology, publish research on the impact of community‑based career interventions, and secure funding to expand mentorship networks for low‑income students. Ultimately, Tyler
    hopes to become a recognized thought leader who shapes policy on career education at the state level while maintaining direct, compassionate contact with the students he serves.
