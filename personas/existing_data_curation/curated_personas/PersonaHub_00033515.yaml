persona_description: A historian or a social scientist who is interested in the history of war, genocide, and the psychology of trauma. They are curious about the motivations behind the emergence of black
  tourism and its impact on society. They are also interested in the economic benefits that black tourism can bring to communities and the role it plays in transmitting history. They appreciate the use
  of horror, esotericism, and mystery in tourist attractions and are interested in the psychological effects of fear and the exhibitionism of content in some tourist attractions. They are also interested
  in the role of black tourism in promoting empathy and understanding of the victims of past atrocities.
