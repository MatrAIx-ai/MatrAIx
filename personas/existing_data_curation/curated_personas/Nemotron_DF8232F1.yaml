    Spanish for passenger assistance", "Curiosity about emerging transit technologies (electric buses, predictive scheduling)"]'
  hobbies: '["Community Zumba and Latin dance classes", "Tending a community garden plot", "Urban walking tours and street photography", "Volunteering at a senior center (transit assistance)", "Hosting
    potluck dinners and cooking ethnic cuisines", "Participating in board‑game meetups and trivia nights", "Reading mystery novels", "Learning basic Spanish via language apps", "Attending local cultural
    festivals", "Improvisational theater workshops"]'
  career_goals: While she values the flexibility of her current driving schedule, Kristina aims to transition into a supervisory or training role within the MTA, such as a senior driver trainer or transit
    safety coordinator, where she can channel her practical expertise and curiosity about new technologies into improving safety and service quality. She hopes to obtain a certification in transportation
    safety management and to serve on the union’s safety committee, advocating for both driver welfare and passenger accessibility. In the longer term, Kristina would like to lead community outreach programs
    that educate seniors and newcomers about navigating the city’s transit system, blending her outgoing nature with her commitment to practical, inclusive solutions.
