  career_goals: As he approaches the next phase of his career, Lam aims to transition into a senior leadership role—such as Director of Development or Vice President of Communications—where he can shape
    regional fundraising strategies and mentor emerging talent. He plans to lead a $20 million capital campaign for a cultural institution, integrate data‑driven donor segmentation into his organization’s
    workflow, and expand partnerships with corporate sponsors focused on corporate social responsibility. Additionally, he intends to launch a small consultancy that advises Asian‑American nonprofits on
    strategic storytelling and donor engagement, leveraging both his structured planning skills and his flexible, improvisational instincts.
