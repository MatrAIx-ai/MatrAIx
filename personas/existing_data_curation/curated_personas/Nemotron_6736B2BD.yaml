  hobbies: '["Hiking in the Rockies","Fishing","DIY home renovation","Woodworking","Classic truck restoration","Crossword puzzles","Community volunteer work","Attending local car meets","Reading technical
    manuals"]'
  career_goals: Bilal’s short‑term goal is to obtain NCCER certification and an advanced forklift‑operator license, which will qualify him for supervisory roles on larger construction projects. Over the
    next five years, he aims to become a site foreman or equipment manager, overseeing a fleet of machines and mentoring junior operators. Ultimately, he envisions starting his own equipment‑rental business
    in the Weld County area, providing reliable machinery and maintenance services to local contractors while ensuring a stable income for his growing family.
