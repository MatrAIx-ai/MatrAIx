  career_goals: Although retired, Katie’s primary ambitions revolve around preserving her independence, nurturing her close family ties, and giving back to her community. She hopes to continue her weekly
    knitting circle at the senior center, mentor younger relatives in traditional crafts, and complete a family scrapbook that captures three generations of memories. Katie also aspires to maintain her
    health through gentle gardening and regular walks around West Bloomfield’s neighborhood parks, ensuring she can remain a reliable source of support for neighbors in need. Finally, she dreams of taking
    a short road trip to the nearby Mackinac Island to experience a cherished Michigan tradition before any future health limitations arise.
