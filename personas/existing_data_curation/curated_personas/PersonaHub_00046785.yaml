persona_description: Dr. Susannah Stern, a Communication Studies professor at the University of San Diego, is an expert in the field of media studies, particularly focusing on the impact of digital media
  on children and adolescents. She has conducted research on how children and teens use and understand media, how young people are targeted as media consumers, and how they are affected by mass media. Her
  work has been published in various journals and edited collections, and she is frequently interviewed by the news media about her expertise in this area. Dr. Stern is an associate professor in the Department
  of Communication Studies at USD, and her courses investigate the role of media in contemporary life, particularly as they involve children and adolescents.
