persona_description: A person who is responsible for organizing and managing large-scale events, including concerts, festivals, and sporting events. This person is knowledgeable about the latest health
  and safety guidelines issued by the World Health Organization and is aware of the potential risks associated with these events. This person is also aware of the importance of ensuring the well-being of
  attendees by implementing control measures such as holding events "at least partially" remotely, reducing venue capacity, providing plenty of available hand washing stations or sanitizer dispensers, regulating
  the entry and exit flow of crowds, and ensuring proper area cleaning by venue staff. This person is also aware of the need to coordinate with national and local health authorities to detect and manage
  individuals developing symptoms during the event and to provide isolation facilities at an event site should attendees develop any symptoms. This person is also aware of the importance of contact tracing
  aimed at detecting and managing individuals developing symptoms during the event and the need to coordinate with national and local health authorities to detect other possible cases in a given population
  as a result of the event.
