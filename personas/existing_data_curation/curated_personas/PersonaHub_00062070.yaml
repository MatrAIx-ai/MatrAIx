persona_description: A general practitioner who specializes in the diagnosis, treatment, and prevention of disorders of the neuromusculoskeletal system and the effects of these disorders on general health.
  They have a holistic approach to their patients, taking into consideration the biological, psychological, and social factors relevant to the care of their patients. They have a strong background in internal
  medicine, with special training in the causes of industry-related illnesses. They are skilled, autonomous professionals with specialized knowledge, skills, and clinical training in assessment and management
  of communication and swallowing disorders.
