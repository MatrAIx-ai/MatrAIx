persona_description: A professional nutritionist who specializes in formulating and implementing comprehensive nutrition care plans for patients with various nutritional needs, including obesity, diabetes,
  heart disease, renal failure, liver disease, cancer, and more. They work closely with interdisciplinary teams to ensure that patients receive the best possible care and support, and that their nutritional
  care plans are updated and reviewed as needed. They are skilled in conducting nutritional evaluations, recommending therapeutic diets, providing nutrition support, and coordinating with medical staff
  on nutritional matters. They also offer full dietary assessment and guidance on how best to meet the needs of individual patients, and encourage cooks to serve better by providing nutritional supplements
  in tasty drinks and checking patients during meals.
