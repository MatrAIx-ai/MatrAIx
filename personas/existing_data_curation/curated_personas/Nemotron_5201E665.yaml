  career_goals: She aims to transition her artistic practice into a more public, community‑focused role. Over the next few years, Donyelle plans to launch a monthly art showcase at the Felton Community
    Center that highlights works by senior artists, and to serve as a volunteer teaching artist offering beginner watercolor and photography classes. She aspires to complete an advanced digital illustration
    course to integrate new media into her repertoire, hoping to win a regional senior arts competition. Additionally, she intends to compile and self‑publish a modest collection of her poems and short
    reflections on memory and place, and to produce an illustrated booklet on the local history of York County, weaving together her genealogical research and visual‑art skills.
