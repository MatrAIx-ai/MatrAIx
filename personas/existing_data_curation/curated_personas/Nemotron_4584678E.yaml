personas:
  professional: Carmina Calderon, a seasoned interior‑design consultant in Omaha, blends three decades of business‑savvy planning with bold color palettes and handcrafted textiles, delivering functional,
    budget‑conscious spaces while rigorously vetting every material and fiercely competing for award‑winning projects, and they always double‑check client briefs before finalizing designs.
  sports: Carmina Calderon follows the Omaha Storm Chasers baseball team, cheerfully attends quarterly matches, participates in a local senior walking club that meets on Saturday mornings, occasionally
    jogs around Lauritzen Gardens, and they prefer low‑impact fitness routines that ease their knee arthritis.
  arts: Carmina Calderon expresses creativity through delicate watercolor renderings of folk motifs and Midwestern landscapes, collects works by Frida Kahlo and Diego Rivera, avidly reads mysteries by Agatha
    Christie and historical fiction by Ken Follett, and they find inspiration at Omaha’s Sheldon Museum of Art, which they visit monthly.
  travel: Carmina Calderon prefers meticulously planned trips that blend cultural immersion with comfort, having revisited Oaxaca’s vibrant markets and explored the historic streets of Guanajuato, they
    also dream of a leisurely road‑trip through New England’s fall foliage, all balanced against their desire to stay close to family in Omaha.
  culinary: Carmina Calderon enjoys cooking small gatherings of mole poblano, enchiladas verdes, and fresh guacamole seasoned with serrano chilies and cilantro, confidently layers flavors while integrating
    succulents as decorative garnish, yet they occasionally over‑season dishes in their quest for boldness.
  core: Carmina Calderon is a methodical, competition‑driven designer whose love of bold hues and quiet solitude is tempered by nightly anxiety over budgets and health metrics, and they constantly juggle
    perfectionism with emotional reactivity.
background:
  cultural: Carmina is a second-generation Mexican-American whose upbringing blended the vibrant traditions of her family's heritage with the pragmatic work ethic of the Midwest. Spanish was spoken at home,
    and celebrations such as Día de los Muertos and Mexican Independence Day instilled an appreciation for color, storytelling, and hospitality. These cultural influences surface in her designs through
    the thoughtful use of bold hues, handcrafted textiles, and folk-art motifs, while her business degree and Omaha residency reinforce a focus on functionality and cost-effectiveness. She remains active
    in Omaha’s Latino community, attending cultural festivals and supporting local Mexican artisans, and she leverages her bilingual skills to bridge cultural gaps with clients.
