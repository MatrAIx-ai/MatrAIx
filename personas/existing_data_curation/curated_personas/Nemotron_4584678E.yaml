  skills: '[''Spatial Planning'', ''Color Theory & Palette Development'', ''Project Management'', ''Budgeting & Cost Control'', ''Vendor Negotiation'', ''Sustainable Materials Sourcing'', ''AutoCAD'', ''SketchUp'',
    ''Revit'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Bilingual Client Communication (English/Spanish)'', ''Business Strategy Development'', ''Trend Research'']'
  hobbies: '[''Watercolor Painting'', ''Reading (Mystery & Historical Fiction)'', ''Succulent Gardening'', ''Hatha Yoga'', ''Antique Market Exploration'', ''Mexican Cooking Experiments'', ''Small-Group
    Book Club'', ''Researching Traditional Mexican Textile Patterns'', ''Volunteer Teaching Spanish Cooking'']'
  career_goals: She aims to expand her Omaha-based practice into a boutique consultancy that advises small hotels, restaurants, and local businesses on integrating culturally resonant, Mexican-inspired
    design elements while maintaining a contemporary aesthetic. Carmina is targeting a state-level interior-design award within the next two years and plans to earn LEED certification to strengthen her
    sustainable-design credentials. She also intends to mentor a younger designer, creating a structured apprenticeship that reflects her organized, methodical teaching style. Long-term, she hopes to author
    a design handbook that blends practical budgeting advice with creative sourcing strategies, establishing a lasting professional legacy.
