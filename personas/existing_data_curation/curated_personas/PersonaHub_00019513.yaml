persona_description: A reading specialist who is a certified teacher of English language learners and special education. They are experienced in teaching decoding instruction and have a passion for helping
  struggling readers. They have a deep understanding of basic reading skills, including phonemic awareness, phonics, high-frequency words, and multisyllabic word instruction. They are knowledgeable about
  the importance of a firm foundation in basic reading skills for middle and high school students to meet rigorous state standards. They are eager to share their knowledge and skills with other educators
  to accelerate underperforming students and address the needs of adolescent struggling readers.
