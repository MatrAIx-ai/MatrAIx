  hobbies: '["Visiting art galleries and museums","Sketching outdoors","Watercolor and acrylic painting","Reading art-history books","Attending mural workshops","Mountain biking","Birdwatching","Gardening","Volunteer
    mural projects","Yoga","Cooking Southern cuisine"]'
  career_goals: Kelly aims to become a certified master painter and eventually launch her own small-scale painting and decorative-finishes company that specializes in eco-friendly coatings and custom murals
    for homes and community spaces in Chattanooga. She plans to complete a professional certification such as the NACE (National Association of the Painting Contractors) Advanced Certification, take additional
    courses in interior design, and build a portfolio of artistic wall projects. In the longer term she hopes to mentor apprentices, contribute to historic-preservation restoration projects in the Appalachian
    region, and perhaps open a community art studio where residents can collaborate on public art.
