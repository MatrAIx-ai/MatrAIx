personas:
  professional: Kelly Stephens is a detail-oriented master painter in training, blending precise interior painting expertise with fine-art sensibilities to deliver eco-friendly finishes and community murals
    across Chattanooga.
  sports: Kelly Stephens rides the trails of Lookout Mountain with the Chattanooga Mountain Bikers Club, cheers for the Tennessee Titans and the Nashville Predators, and balances weekend hikes with weekly
    yoga at a community studio, prioritizing functional fitness over competitive sports.
  arts: Kelly Stephens immerses themselves in the local art scene, drawing inspiration from the mural work of the Asheville collective, the folk storytelling of Appalachian musicians like The Avett Brothers,
    and the color palettes of Georgia O'Keeffe, while volunteering on community mural projects that blend multicultural motifs with Southern storytelling.
  travel: Kelly Stephens prefers road-trip adventures that combine outdoor exploration with cultural stops, having camped in the Great Smoky Mountains, explored Asheville's art districts, and dreaming of
    a spring visit to Santa Fe for its Southwest murals before eventually touring European folklore-rich regions like the Scottish Highlands.
  culinary: Kelly Stephens enjoys cooking Southern comfort dishes such as smoked chicken with collard greens, shrimp and grits flavored with fresh thyme and lemon, and homemade peach cobbler, boasting a
    solid intermediate skill level that shines during weekend potlucks with friends.
  core: Kelly Stephens balances a relentless work ethic with a love for spontaneous bird-watching breaks, often turning stray paint cans into mini-canvas experiments, yet they occasionally procrastinate
    on paperwork until the last minute.
background:
  cultural: Kelly grew up in the Chattanooga area of Tennessee, a region shaped by Southern hospitality, Appalachian folklore, and a strong sense of community. Her family’s European heritage—primarily Anglo-American
    roots—combined with the region’s emphasis on craftsmanship and modest living, fostering a respect for hard work and practical skills. The local culture’s appreciation for music, storytelling, and folk
    art has influenced her love for decorative painting and community murals. Although she identifies as white, she is aware of the diverse cultural tapestry of the South and values inclusivity, often integrating
    multicultural motifs into her artistic projects.
attributes:
  skills: '["Interior painting","Paper hanging","Surface preparation","Color mixing and matching","Blueprint reading","Safety and building code compliance","Hand and power tool operation","Project planning
