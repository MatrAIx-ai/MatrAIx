personas:
  professional: A budding young scientist and artist, Alexandra Lee combines a love for drawing whimsical creatures with a methodical approach to building LEGO inventions, channeling their curiosity and
    organized mindset into school science projects and after‑school dance routines.
  sports: An energetic youth soccer enthusiast, Alexandra Lee plays forward for the Aurora Soccer Club’s U‑8 team, practices drills after school, cheers for the Colorado Rapids during family game nights,
    and dotes on winter sledding adventures down the foothills, blending competitive spirit with a love for outdoor play.
  arts: A vibrant creative explorer, Alexandra Lee fills sketchbooks with colorful scenes inspired by visits to the Aurora History Museum and the Denver Museum of Nature & Science, idolizes the playful
    style of Walt Disney, the bold colors of Georgia O’Keeffe, and the whimsical music of Taylor Swift, and often recreates favorite museum exhibits in their own drawings.
  travel: A curious weekend adventurer, Alexandra Lee has hiked the trails of Rocky Mountain National Park, explored the interactive exhibits at the Denver Botanic Gardens, and taken a family road‑trip
    to Disneyland, while dreaming of future journeys to the Grand Canyon and a snowy ski resort in Utah, preferring a mix of planned itineraries and spontaneous detours.
  culinary: A budding junior chef, Alexandra Lee delights in making homemade mac and cheese with a pinch of paprika, crafting rainbow fruit kebabs with grapes, strawberries, and pineapple, sprinkling cinnamon
    on their oatmeal, and occasionally attempting to bake “LEGO‑brick” cookies, all while favoring familiar comfort foods over adventurous cuisine.
  core: Alexandra Lee is a curious, organized, and competitively spirited 7‑year‑old who channels their artistic imagination, love for science, and heightened worry into vivid creations, structured play,
    and a steadfast drive to be the best at everything they do.
background:
  cultural: Alexandra is a White American child growing up in Aurora, Colorado, a diverse suburban community within the Denver metropolitan area. Her family participates in typical American traditions such
    as celebrating the Fourth of July with fireworks, Thanksgiving with a family meal, and holiday gatherings that reflect a blend of local customs and broader national culture. She attends a public elementary
    school that incorporates multicultural lessons, exposing her to a variety of cultural perspectives while maintaining a primarily middle‑class suburban lifestyle. The Colorado environment encourages
    outdoor activities; she frequently hikes in the nearby foothills, visits local parks, and enjoys seasonal outings like sledding in winter. These experiences, combined with the region’s emphasis on community
    events and access to museums and cultural institutions, shape her appreciation for varied experiences and artistic expression.
