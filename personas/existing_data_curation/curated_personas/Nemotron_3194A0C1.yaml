  career_goals: Inspired by her love of animals, art, and discovery, Alexandra dreams of becoming a wildlife biologist or a veterinarian who studies and cares for animals, allowing her to combine scientific
    curiosity with compassion. She also imagines exploring outer space as an astronaut, reflecting her fascination with new ideas and unconventional thinking. Her organized mindset leads her to envision
    conducting experiments and presenting findings at school science fairs, aiming to be a top student and a future researcher who shares knowledge with peers. Ultimately, she aspires to a career that blends
    creativity, investigation, and the opportunity to work with others.
