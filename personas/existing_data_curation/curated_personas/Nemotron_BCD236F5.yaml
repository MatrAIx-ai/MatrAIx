  hobbies: '[''Zumba classes'', ''Yoga'', ''Hiking in the Cascades'', ''Bollywood dance'', ''Cooking South Asian fusion cuisine'', ''Volunteering at community centers'', ''Reading self-help and psychology
    books'', ''Journaling'', ''Exploring coffee shops'', ''Board game nights'']'
  career_goals: Nusrat aims to transition from an individual contributor to a team lead within the next two years, using her organizational strengths to mentor new representatives and streamline service
    workflows. She plans to complete a Bachelor’s degree in Business Administration and earn a Certified Customer Experience Professional (CCEP) credential. In the medium term, she aspires to become a Customer
    Experience Manager, shaping service strategies through data‑driven insights while fostering a supportive, inclusive team culture. Long‑term, she envisions launching a social‑enterprise platform that
    empowers South Asian women entrepreneurs, merging her curiosity for new ideas with a practical, community‑focused business model.
