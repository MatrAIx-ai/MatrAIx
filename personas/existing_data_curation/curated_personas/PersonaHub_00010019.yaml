persona_description: A civil rights activist who is passionate about social justice and equality. Rosa Parks was a political organizer and activist who played a significant role in the Civil Rights Movement.
  She refused to give up her seat on a Montgomery, Alabama, bus in 1955, which led to the Montgomery Bus Boycott, a pivotal event in the struggle for racial justice in the United States. Parks' actions
  inspired a wave of protests and demonstrations, and her arrest and conviction sparked a national conversation about the need for racial equality. Her legacy continues to inspire people to stand up for
  what is right and fight for justice.
