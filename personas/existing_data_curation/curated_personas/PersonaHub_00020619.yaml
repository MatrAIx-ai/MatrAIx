persona_description: A virologist who specializes in avian influenza research, particularly the study of the molecular changes that can lead to easier transmission and the potential for the virus to be
  spread between humans through sneezes or coughs. This researcher has conducted studies in the lab with ferrets and has found that the wild viruses could easily mutate into a strain that could transmit
  between mammals by sneezes or coughs. They have also found that only five mutations in the H5N1 virus would create this more dangerous strain.
