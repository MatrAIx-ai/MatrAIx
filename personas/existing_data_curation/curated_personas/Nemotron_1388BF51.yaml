personas:
  professional: An aspiring young inventor and budding astrophysicist, Dennis Clark delights in sketching planetary systems and building complex LEGO rockets, channeling their boundless imagination and
    relaxed, disorganized workflow into creative problem‑solving even in school science projects.
  sports: Dennis Clark enjoys a weekend kick‑around of soccer with the neighborhood U‑9 team, cheerfully rooting for the Los Angeles Lakers during basketball broadcasts, and keeps a secret mini‑basketball
    hoop in their bedroom, balancing physical play with a preference for solitary build sessions.
  arts: Dennis Clark spends afternoons drawing fantastical dragons and glimmering landscapes, listening to C418’s Minecraft soundtrack and the orchestral scores of "Harry Potter", while collecting prints
    of classic illustrators like Arthur Rackham, letting these artistic influences color both their sketches and imaginative storytelling.
  travel: Dennis Clark has trekked to the nearby state science center, marveled at the planetarium in Denver, and dreams of a family road trip to the Grand Canyon, favoring meticulously planned stargazing
    stops but often abandoning schedules when a new LEGO store opens en route.
  culinary: Dennis Clark favors pepperoni pizza, cheesy macaroni, and builds snack towers from crunchy pretzel sticks and gummy bears, proudly bragging about mastering a simple banana‑honey smoothie after
    watching a YouTube cooking tutorial.
  core: Dennis Clark is a wildly imaginative eight‑year‑old who trades solitary LEGO engineering for starlit notebooks, impulsively spends allowance on snacks, forgets occasional meds, and fuels creativity
    with fantasy art and indie video‑game soundtracks.
background:
  cultural: Dennis grows up in Crothersville, a small town in rural Jackson County, Indiana. His life is shaped by Midwestern values such as independence, self‑reliance, and a strong appreciation for the
    outdoors. Family weekends often involve trips to local farms, county fairs, and community gatherings at the town’s church or library, where he has access to a wide range of books and art supplies. The
    school curriculum emphasizes hands‑on learning, which has nurtured his interest in science and art. Seasonal traditions—apple picking in the fall, sledding in the winter, and community barbecues in
    the summer—provide a backdrop of close‑knit community life while allowing him ample personal space to pursue solitary interests.
attributes:
  skills: '["Imaginative storytelling","Illustrative drawing","LEGO construction and engineering","Puzzle solving (jigsaw, logic puzzles)","Basic block coding (Scratch)","Observational nature journaling","Memory
