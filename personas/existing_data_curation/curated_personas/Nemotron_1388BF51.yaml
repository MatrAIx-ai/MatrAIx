  hobbies: '["Reading fantasy and science books","Drawing and sketching fantastical scenes","LEGO building and engineering","Playing sandbox video games (e.g., Minecraft)","Stargazing with a telescope","Collecting
    natural objects (stones, leaves)","Creating secret codes and puzzles"]'
  career_goals: Dennis dreams of one day designing entirely new worlds—whether as a space explorer, a science‑fiction illustrator, or a video‑game creator who builds surreal, interactive environments. He
    hopes to win his school’s science fair with a project that combines art and astronomy, and he aspires to be recognized as the ‘best’ in competitions that test creativity and problem‑solving. Ultimately,
    he aims to turn his love of novelty and abstract concepts into a career that lets him work independently while inventing fresh ideas.
