    I get my nails done every saturday.

    I work as a receptionist at a lawyers office.

    I secretly love watching we wrestling.'
  Best Generated Conversation: 'User 1: Hi! I''m Sarah.

    User 2: Hi Sarah, I''m Alex.

    User 1: It''s nice to meet you.

    User 2: Same to you.

    User 1: So, what do you do for a living?

    User 2: I''m a receptionist at a lawyer''s office.

    User 1: Oh, that''s cool. I''m a dental assistant.

    User 2: Oh, that''s interesting! What''s it like working in a dental office?

    User 1: It''s fun! I get to meet a lot of interesting people.

    User 2: That''s cool.

    User 1: So, what do you like to do for fun?

    User 2: I love to watch wrestling.

    User 1: Oh, really? I love wrestling too!

    User 2: Really? That''s awesome!

    User 1: Yeah, I''ve been a fan since I was a little kid.

    User 2: Me too! I love the drama and the excitement.

    User 1: Me too! I think it''s so funny when the wrestlers get into fights.

    User 2: Yeah, it''s always so entertaining.

    User 1: So, what''s your favorite wrestling promotion?

    User 2: I like WWE the best.

    User 1: Me too! I love the big names like John Cena and Roman Reigns.

    User 2: Me too! They''re so entertaining.

    User 1: So, what''s your favorite match of all time?

    User 2: I''m not sure. I have a lot of favorites.

    User 1: Me too. I think I''d have to say my favorite match was the one between John Cena and The Rock at Wrestlemania.

    User 2: That was a great match! I was so excited when Cena won.

    User 1: Me too! That was such a great moment.

    User 2: Yeah, it was.

    User 1: Well, it was nice talking to you, Alex.

    User 2: Same to you, Sarah.'
