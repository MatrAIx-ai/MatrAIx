  career_goals: Huan aims to advance to an Operations Manager role overseeing multiple service sites in the Northeast, while earning a PMP certification to formalize his project management expertise. He
    is passionate about implementing sustainable, energy‑efficient practices in mechanical services and hopes to spearhead a mentorship program that connects under‑represented youth with trade opportunities.
    In the longer term, he envisions launching a boutique consultancy that helps small firms optimize field operations through data‑driven strategies and cultural‑aware team building.
