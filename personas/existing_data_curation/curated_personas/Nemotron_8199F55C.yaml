personas:
  professional: Steve Grandison, an 11‑year‑old budding game designer, merges a curious, competitive mind with a knack for visual storytelling to build Scratch levels, sketch detailed storyboards, and tinker
    with basic Arduino circuits, showcasing early technical skill and a drive to out‑perform peers.
  sports: Steve Grandison, point guard for the Bellevue Westside Youth Basketball Club, hones his skills by emulating the Seattle Storm’s fast breaks and the Portland Trail Blazers’ shooting drills, treating
    every after‑school practice as a personal contest to improve his stats while balancing school responsibilities.
  arts: Steve Grandison channels classic hip‑hop vibes from Kendrick Lamar and smooth R&B tones from H.E.R. into comic‑style sketches featuring a tech‑savvy superhero inspired by Stan Lee’s creations, and
    regularly visits the Bellevue Arts Museum to study street‑art techniques that fuel his storytelling.
  travel: Steve Grandison favors family road trips that mix scheduled stops at Seattle’s Museum of Pop Culture—visited last summer—with spontaneous playground breaks, and dreams of a future adventure to
    Tokyo’s Akihabara district after saving enough from their allowance.
  culinary: Steve Grandison relishes creamy cheddar‑infused mac and cheese, experiments with homemade pork‑broth ramen topped with soy sauce, sliced scallions, and nori, and often blends banana, blueberry,
    and almond milk into a post‑game smoothie for quick recovery.
  core: Steve Grandison is an 11‑year‑old tech‑savvy artist whose competitive edge drives them to perfect Scratch games and basketball shots, yet a lingering worry about missing the next big idea keeps
    them constantly checking their progress.
background:
  cultural: Steve is an African‑American boy raised in Bellevue, Washington. His family maintains strong ties to Black cultural traditions, celebrating holidays such as Kwanzaa and taking part in community
    events at the local African‑American cultural center. He grew up listening to a mix of classic hip‑hop, R&B, and contemporary Black artists, which influences his artistic style and music taste. While
    he enjoys the multicultural environment of the Pacific Northwest, he also seeks representation in the media he consumes and creates, often incorporating themes of Black identity and empowerment into
    his drawings and stories. Bellevue’s diverse community provides him with access to technology workshops, art programs, and sports leagues, allowing him to blend his cultural heritage with his interests
    in tech, art, and teamwork.
