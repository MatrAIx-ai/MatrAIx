  career_goals: Steve dreams of merging his love for art and technology by becoming a video game developer or interactive media designer. He envisions creating games that spark curiosity and encourage teamwork,
    especially for kids his age. He is also interested in a future career in software engineering or graphic design, hoping to innovate in ways that reflect his personal experiences and cultural heritage.
    Over the long term, he aspires to lead a community tech club where he can mentor other students, while developing strategies to manage his own worry and stress and channel his competitive nature into
    productive achievement.
