  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Reading poetry'', ''Gardening'', ''Building model airplanes'', ''Listening to jazz'', ''Writing memoirs'', ''Stargazing'', ''Walking desert trails'']'
  career_goals: Although retired, Pedro dreams of leaving a lasting, personal legacy. He aims to compile his memories and reflections into a memoir that intertwines his life story with anecdotes about the
    changing Southwest landscape. He also hopes to organize a small community exhibition showcasing his artwork and the pieces created by local seniors, fostering intergenerational dialogue. Additionally,
    Pedro envisions volunteering at the Sierra Vista museum to help document and preserve local history, and he aspires to mentor a few emerging artists in his neighborhood, passing on his love for creative
    exploration.
