  hobbies: '[''Drawing and painting'', ''Digital art on tablet'', ''Listening to traditional drum music'', ''Participating in powwow drumming'', ''Hiking and exploring woods'', ''Fishing'', ''Wildlife photography'',
    ''Video games with creative building'', ''School art club'', ''Cultural workshops'']'
  career_goals: Dennis wants to turn his curiosity about art, culture, and the natural world into a career that lets him blend creativity with his heritage. He dreams of becoming a multimedia storyteller
    or environmental documentary filmmaker, focusing on Indigenous perspectives and conservation issues. He hopes to study visual arts and environmental science in college, eventually working with tribal
    media centers or non‑profits to produce videos, podcasts, and interactive exhibits that celebrate Native traditions and protect the lakes and forests of Wisconsin.
