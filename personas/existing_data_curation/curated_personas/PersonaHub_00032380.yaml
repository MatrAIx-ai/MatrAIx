  in understanding the complex web of interests and conflicts that can arise in scientific research. This persona is likely to be concerned about the potential harm of genetically modified organisms and
  the role of industry in shaping public opinion on this issue. This person is likely to be interested in the history of drug trials and the ways in which industry funding can influence the results of scientific
  research.
