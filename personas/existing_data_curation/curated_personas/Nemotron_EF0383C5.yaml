  career_goals: Jimmie aims to earn a Certified Nursing Assistant (CNA) credential within the next year, followed by a Licensed Practical Nurse (LPN) certification to broaden his clinical scope. He aspires
    to move into a supervisory role at a home‑health agency where he can lead training programs and improve care protocols. Long‑term, he dreams of opening a modest adult‑day care center for seniors in
    Goliad County that emphasizes culturally responsive services and community involvement. To support these goals, he plans to complete his GED, enroll in community‑college courses in health administration,
    and continue volunteering in church‑based senior outreach initiatives.
