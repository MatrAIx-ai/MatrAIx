  career_goals: Approaching retirement, Kimberly aims to solidify her legacy by completing the current community‑center renovation project on time and under budget, and by formalizing a mentorship program
    for younger project coordinators in her county. She is working toward obtaining a CAPM certification to validate her expertise and plans to transition into a part‑time consulting role for local non‑profits,
    helping them navigate grant‑funded infrastructure initiatives. Additionally, she hopes to streamline her workload to reduce stress, allowing more time for family and community service.
