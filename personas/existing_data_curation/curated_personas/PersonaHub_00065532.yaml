persona_description: A central banker who is interested in the development of digital currencies and their potential impact on financial systems. This person is knowledgeable about the technological advancements
  in the financial sector and is keen to explore the possibilities of issuing a central-bank digital currency. They are also interested in the potential risks and benefits of such a currency, including
  its ability to address the risk of a potential crisis and its ability to control the use of digital cash. They are also likely to be interested in the potential for negative interest rates to apply to
  digital cash, and the implications of this for the use of cash as an alternative to bank deposits.
