personas:
  professional: Jocelyn Riveraheredia is a budding engineering enthusiast who turns every LEGO Technic build into a miniature project plan, applying chess‑like foresight to design gear systems, leading
    small robot‑building squads with a strict checklist, and letting their natural skepticism drive rigorous testing before any prototype moves off the workbench, so they always double‑check each connection.
  sports: Jocelyn Riveraheredia swims with the local youth team at the community pool, favoring structured lap drills over free play, follows the Riverside Raptors minor league baseball club for their strategic
    game statistics, and they spend weekends practicing short‑distance sprints with a stopwatch to satisfy their love for measurable progress.
  arts: Jocelyn Riveraheredia devotes time to piano practice, adhering to a metronome‑guided schedule that guides them through pieces by Mozart, Yiruma, and contemporary composer Ludovico Einaudi, while
    their reading list includes the mystery adventure series "The Secret of the Lost Island" by Claudia Gray, which fuels imaginative scenarios for their next LEGO scene, and they often translate those
    mysteries into new LEGO stories.
  travel: Jocelyn Riveraheredia eagerly anticipates family weekend trips to the Metro City Science Museum, where interactive circuit exhibits align with their curiosity, dreams of exploring the medieval
    castle ruins of Oldtown, and they prefer planning each outing with a printed checklist rather than spontaneous detours.
  culinary: Jocelyn Riveraheredia assists in preparing family meals such as seasoned beef stew, plantain fritters, and buttery corn patties, following recipes with a kitchen scale for exact measurements,
    takes pride in alphabetizing the spice rack, yet they often get sidetracked arranging LEGO bricks that spill onto the countertop during cooking.
  core: Jocelyn Riveraheredia is a detail‑obsessed ten‑year‑old who blends strategic thinking from chess and LEGO with a cautious, competitive edge, balancing meticulous planning against frequent bouts
    of worry, and they constantly seek order in every activity.
background:
  cultural: Jocelyn is a second‑generation Honduran‑American who was raised in a bilingual household in Glen Burnie, Maryland. At home, Spanish is spoken regularly, and she celebrates Honduran traditions
    such as Día de la Independencia (September 15) and Semana Santa with family gatherings, traditional foods like baleadas and tamales, and music from marimba bands. Her parents emphasize the values of
    hard work, community solidarity, and respect for elders, which she carries into her school life. While she attends a public elementary school where she interacts mainly with peers from various backgrounds,
    she also participates in a local Honduran cultural club that offers dance workshops and cultural lessons, helping her stay connected to her heritage. This blend of American and Honduran influences shapes
    her bilingual fluency, her love for structured activities (e.g., choreographed folk dances), and her desire to someday give back to both communities.
attributes:
  skills: '[''Bilingual communication (Spanish & English)'', ''Strong mathematical problem-solving'', ''Attention to detail in puzzles and LEGO construction'', ''Organizational and time-management skills'',
    ''Basic computer literacy (typing, educational software)'', ''Strategic thinking in chess and strategy games'']'
  hobbies: '[''Building LEGO Technic sets'', ''Playing chess'', ''Reading mystery and adventure books'', ''Practicing piano'', ''Conducting simple home science experiments'', ''Helping with family cooking
    of Honduran dishes'', ''Playing strategy video games (e.g., Minecraft Survival mode)'']'
  career_goals: Jocelyn aspires to a career that offers clear structure, tangible results, and opportunities for responsible problem‑solving. She dreams of becoming a civil engineer, fascinated by the way
    well‑planned bridges and buildings transform communities, especially those in her family's homeland of Honduras. She also expresses a growing interest in computer programming, seeing it as a disciplined
    field where she can apply her analytical mind and competitive drive. In the long term, she hopes to combine her technical talents with her bilingual abilities to design and implement infrastructure
    projects that improve the lives of underserved populations.
