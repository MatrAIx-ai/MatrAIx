personas:
  professional: Jordi Lau, a 31‑year‑old aspiring HVAC technician and freelance handyman, leverages meticulous automotive repair skills and a methodical mindset to deliver scheduled, detail‑oriented home‑service
    appointments across San Antonio, thriving on the predictability of tight work orders and spreadsheets that track each job’s parts, hours, and profit margins; they pride themselves on punctuality and
    thorough documentation.
  sports: Jordi Lau follows the San Antonio Spurs and the San Antonio FC, participates in solo early‑morning runs through Brackenridge Park, and maintains a home gym routine focused on functional strength,
    while occasionally joining a local weekend hiking club to explore the Hill Country trails; they treat each workout as a timed, measurable task.
  arts: Jordi Lau’s creative outlet includes assembling intricate model kits of historic aircraft, crafting wooden furniture inspired by mid‑century designs, and finding quiet inspiration in the works of
    Frida Kahlo and author Neil deGrasse Tyson, blending visual art and scientific curiosity during evening puzzle sessions; they often annotate their sketches with technical notes.
  travel: Jordi Lau prefers meticulously planned solo road trips, having mapped a detailed itinerary for a culinary pilgrimage through Oaxaca’s markets, a historic tour of Barcelona’s Modernist architecture,
    and frequent weekend getaways to the Texas Hill Country’s vineyards, always booking accommodations well in advance to preserve routine; they keep a travel ledger to log mileage and expenses.
  culinary: Jordi Lau excels at preparing authentic Mexican dishes—such as mole poblano, chiles en nogada, and street‑style carnitas tacos—using home‑grown cilantro, epazote, and heirloom chilies, and treats
    each cooking session as a systematic experiment, measuring spice ratios and noting results in a kitchen notebook; they relish the precise timing required for each step.
  core: Jordi Lau is a methodical, solitary craftsman who balances precise budgeting, meticulous DIY projects, and passionate Mexican cooking while quietly mastering puzzles and planning a future freelance
    handyman empire; they thrive on routine and order.
background:
  cultural: Jordi is a Mexican-American who grew up in San Antonio's vibrant Hispanic community. He maintains strong ties to his cultural heritage through bilingual communication, celebrating traditions
    like Día de los Muertos and Mexican Independence Day, and regularly preparing family recipes passed down from his grandparents. While he prefers solitude, he stays connected to his roots by participating
    in local cultural festivals and preserving Mexican culinary practices at home.
attributes:
  skills: '[''Basic automotive maintenance and repair'', ''Computer hardware troubleshooting'', ''DIY home improvement and repairs'', ''Personal finance budgeting and spreadsheet management'', ''Bilingual
    fluency in Spanish and English'', ''Meal planning and cooking traditional Mexican dishes'']'
  hobbies: '[''Model kit building'', ''Woodworking'', ''Gardening'', ''Cooking Mexican cuisine'', ''Reading non-fiction (history, technology)'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Jordi aims to secure a stable, structured technical role that allows him to work independently and apply his methodical skill set. He plans to earn a certification in automotive technology
    or HVAC from a local community college and eventually launch a small freelance handyman business that offers predictable, scheduled services to residential clients in San Antonio. His ambition is to
    build a reliable income stream while maintaining a routine-driven work schedule.
