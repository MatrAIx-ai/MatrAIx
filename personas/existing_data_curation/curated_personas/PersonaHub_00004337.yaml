persona_description: A researcher at Neuroscience Research Australia who specializes in the study of the brain's emotional system, particularly in the orbitofrontal cortex and its role in linking emotion
  and memories. The researcher is interested in the extent to which emotional deficits weaken emotional enhancement of memory in patients with frontotemporal dementia, a degenerative condition affecting
  the frontal and temporal lobes of the brain. The researcher is also interested in the development of diagnostic tools and the understanding of the source of the emotional memory impairment in patients
  with frontotemporal dementia.
