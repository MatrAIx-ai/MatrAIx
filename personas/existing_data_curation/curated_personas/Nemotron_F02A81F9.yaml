personas:
  professional: Tori Burks, a budding junior coder in her after‑school coding club, merges curiosity for block‑based programming with a practical knack for building simple LEGO machines, and their teamwork‑focused,
    organized yet flexible mindset shines as they help classmates debug projects.
  sports: Tori Burks races down the neighborhood bike trail on weekends, attends weekly soccer practice with the Roseville United Soccer Club, cheers for the Sacramento Kings during family game nights,
    and balances a love for team sports with solo hikes in local parks, always packing a water bottle and a favorite cap while they stay hydrated and upbeat.
  arts: Tori Burks spends afternoons sketching squirrels and foxes inspired by Beatrix Potter, sings along to pop hits by Taylor Swift and Ariana Grande during car rides, builds whimsical LEGO sculptures
    after watching LEGO Architecture videos, and eagerly crafts friendship bracelets while they listen to the Kidz Bop version of their favorite songs.
  travel: Tori Burks dreams of camping under the stars in Yosemite National Park after a school field trip sparked a love for nature, has already toured the interactive exhibits at the California Discovery
    Museum, and hopes to someday explore Tokyo’s anime districts and cherry‑blossom festivals, balancing a careful family‑budget road‑trip plan with an adventurous spirit as they imagine each new adventure.
  culinary: Tori Burks loves baking chocolate‑chip cookies with Mom, proudly swaps the chocolate chips for mini marshmallows for a s’mores twist, enjoys crunchy carrot sticks with hummus, and occasionally
    experiments with making simple pizza slices topped with pepperoni and extra cheese, showing a budding confidence in the kitchen as they proudly serve the family.
  core: Tori Burks is a curious, organized 8‑year‑old who blends a love for coding, outdoor adventures, and creative crafts while they juggle allowances, minor allergies, and a sweet tooth for gummy bears.
background:
  cultural: Tori grows up in a middle‑class, white family in suburban Roseville, California. Her upbringing reflects typical American values such as community involvement, school participation, and celebration
    of holidays like Thanksgiving, Independence Day, and Halloween. The family embraces the regional emphasis on outdoor activities, environmental awareness, and tech‑savvy education, often attending community
    events at the local park and participating in school‑organized cultural celebrations that expose her to diverse traditions within the broader Sacramento area.
