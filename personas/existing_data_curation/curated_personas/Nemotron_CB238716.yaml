  hobbies: '[''Co‑ed spin classes'', ''Recreational soccer league'', ''Hiking in Hudson River Valley'', ''Experimental healthy cooking'', ''Volunteering at community health fairs'', ''Mindfulness meditation
    and journaling'', ''Science fiction & popular science book club'', ''DIY health‑tech projects'']'
  career_goals: Lisa aims to advance into a leadership role within nursing, targeting a charge nurse position within the next two years, followed by a nurse manager role. She plans to pursue a Master of
    Science in Nursing (MSN) with a focus on nursing administration and health informatics. Her goal is to spearhead evidence‑based quality improvement projects that reduce readmission rates and enhance
    patient satisfaction in her hospital. Driven by her competitive streak, she seeks recognition through professional awards and is motivated to mentor junior nurses, fostering a supportive yet high‑performing
    team culture. She also aspires to develop a community health outreach program in Westchester County that integrates digital health tools to improve chronic disease management, aligning her practical
    curiosity with a desire to make tangible community impact.
