personas:
  professional: Joseph Hernandez, a 26-year-old project management specialist, leverages his business degree and four years of cross-functional coordination to craft detailed plans, enforce Agile and Waterfall
    discipline, and drive risk-aware budgets, while his love of competition and skeptical eye keeps stakeholder expectations in check and his teams sharply focused on deliverables.
  sports: Joseph Hernandez dominates the local recreational basketball league as a point guard for the Fargo Fireflies, roots for the Minnesota Timberwolves and the Green Bay Packers, hits the snow-mobile
    trails with the North Dakota Snow Riders club in winter, and spends weekends fishing for walleye on the Red River and hiking the Turtle Mountains for cardio balance.
  arts: Joseph Hernandez unwinds after board-game nights by streaming indie folk from Fleet Foxes, catching the latest Marvel film starring Tom Holland, and attending the annual Fargo Film Festival, while
    occasionally dabbling in sketching prairie landscapes with charcoal during quiet evenings.
  travel: Joseph Hernandez prefers meticulously planned road trips that blend adventure and networking, having driven the Great Plains loop from Bismarck to Minneapolis, dreaming of a summer hike in the
    Canadian Rockies and a spring cultural tour of New Orleans, while balancing travel costs against his career-advancing conference schedule.
  culinary: Joseph Hernandez enjoys hearty Midwestern fare, often cooking skillet-seared pork chops with apples and rosemary, topping them with a side of roasted sweet potatoes, and treats Friday night
    pizza from a local pizzeria as a reward after a long week of project sprints, though they tend to skip breakfast in favor of a quick protein shake.
  core: Joseph Hernandez is a competitively driven project manager who channels his love of strategy into basketball, board games, and budgeting, yet sometimes lets work pressure prompt impulsive tech purchases
    and missed medication refills.
background:
  cultural: Joseph was raised in a middle‑class, Midwestern family in West Fargo, ND, with deep roots in German and Irish ancestry and a secondary connection to Hispanic heritage reflected in his surname.
    His upbringing emphasized hard work, self‑reliance, and community involvement, and he grew up attending a Protestant church that reinforced values of modesty, stewardship, and service. The cultural
    norms of the Upper Midwest—practicality, straightforward communication, and a strong sense of neighborly responsibility—have shaped his worldview and interpersonal style.
