  career_goals: Joseph aims to earn his Project Management Professional (PMP) certification within the next year and become a senior project manager overseeing multi‑million‑dollar infrastructure projects
    in the Upper Midwest. Over the next five years, he plans to transition into a program manager role, leading a portfolio of projects that drive regional economic development. He is also interested in
    building a reputation as a go‑to expert for process improvement, eventually launching a boutique consulting firm that helps small to mid‑size manufacturers in North Dakota adopt lean project practices.
    His competitive nature fuels his desire to be recognized as a top performer within his organization and to mentor junior project coordinators.
