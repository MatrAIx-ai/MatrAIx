    and insect identification)"]'
  hobbies: '["Reading adventure books and graphic novels", "Drawing cartoons and sketching", "Building LEGO sets", "Playing soccer", "Exploring the Scioto River banks (shell/fossil hunting)", "Collecting
    river rocks", "Baking cookies with family", "Playing Minecraft", "Volunteering at the local animal shelter"]'
  career_goals: Theresa’s long‑term ambition is to work with animals and the environment. She imagines becoming a veterinarian or wildlife biologist who can protect local wildlife along the Ohio River while
    also helping families care for their pets. She also dreams of one day teaching younger children about nature, combining her love for hands‑on learning with a desire to give back to her community. Her
    practical side wants a career that offers stability and the ability to stay close to family in Portsmouth.
