personas:
  professional: Theresa Coley, an aspiring comic‑book illustrator, blends curiosity with practicality by sketching detailed characters during after‑school hours while applying a systematic LEGO‑building
    approach to storyboarding, and they often experiment with narrative structures even though they prefer flexible, un‑rigid project timelines.
  sports: Theresa Coley plays forward on the local under‑10 soccer team, the Ohio River Rapids, idolizes the Cleveland Guardians and follows their games, enjoys weekend hikes along the Scioto River collecting
    rocks and shells, and they balance competitive drills with free‑play kick‑around sessions, though they sometimes forget to stretch before practices.
  arts: Theresa Coley immerses themselves in creative expression by drawing cartoon panels inspired by Raina Telgemeier and Studio Ghibli, building elaborate LEGO scenes that replicate adventure novel settings,
    reading graphic comics like 'Bone' and 'Amulet', and they spend rainy afternoons crafting Minecraft worlds that echo their own story ideas, all while occasionally skipping homework for extra sketch
    time.
  travel: Theresa Coley loves exploring nearby natural spots such as the Scioto River banks and the Cleveland Metroparks, has visited the Cincinnati Zoo and hopes to travel to the Smithsonian National Museum
    of Natural History, prefers spontaneous day trips over meticulously planned vacations, and they often pack a small backpack with snacks and a sketchbook for on‑the‑go inspiration.
  culinary: Theresa Coley enjoys baking chocolate chip cookies with their mother, often experiments with adding a pinch of sea salt or chopped walnuts, loves simple meals like mac‑and‑cheese and homemade
    pizza, can perfectly whisk cookie batter but sometimes forgets to set the timer, and they favor crunchy river rocks (as playful decorations) for themed dessert plating.
  core: Theresa Coley is a curious, slightly disorganized nine‑year‑old who fuses a love of storytelling, LEGO building, and soccer into a vibrant, adventure‑driven outlook, often juggling creative projects
    with spontaneous play.
background:
  cultural: Theresa comes from a white, Midwestern American family that has lived in Scioto County for several generations. Her family practices a modest Protestant faith and attends a local Methodist church,
    where community service and fellowship are emphasized. Growing up in Portsmouth, she participates in town traditions such as the annual county fair, Fourth of July fireworks along the river, and the
    library’s summer reading program. The region’s blend of Ohio River heritage, Appalachian influences, and a close‑knit small‑town community shapes her values of practicality, friendliness, and a strong
    sense of belonging.
attributes:
  skills: '["Reading comprehension (4th‑grade level)", "Creative writing (short stories)", "Basic arithmetic (addition, subtraction, multiplication up to 12)", "Digital literacy (tablet navigation, educational
