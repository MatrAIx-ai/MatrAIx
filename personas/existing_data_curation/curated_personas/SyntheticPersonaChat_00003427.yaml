    User 2: I started out as a foreign language teacher, but I eventually realized that I didn''t really like teaching. I''m much more of a writer than a teacher.

    User 1: I can see that. You seem to have a real passion for writing.

    User 2: Thanks! I do. I''m so glad I found a job where I can use my writing skills.

