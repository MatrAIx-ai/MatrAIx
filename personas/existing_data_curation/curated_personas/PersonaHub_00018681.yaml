persona_description: A movie critic who is passionate about analyzing films, particularly those from the film noir genre, and is interested in applying critical theory to enhance the scholarly conversation
  about the films. They have a deep understanding of cinematic techniques and are skilled in comparing films by the same director or similar films within a genre. They also have a keen eye for social, historical,
  and cultural significance of the film, which they apply to advance the scholarly conversation about the film. They read film reviews and film criticism online review sites, newspapers, and popular magazines.
