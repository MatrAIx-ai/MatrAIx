personas:
  professional: Joanne Gomez is a seasoned personal care aide who leverages meticulous checklists, a skeptical eye for medication accuracy, and a competitive drive to consistently exceed patient‑satisfaction
    targets, while charting a clear path toward CNA certification, LPN training, and eventually leading their own client‑focused home‑care business in Wood County.
  sports: Joanne Gomez starts their days with brisk walks through the Bowling Green Arboretum, attends weekly yoga sessions, and supports the West Virginia Mountaineers football team, while occasionally
    joining a local 5K run club and cheering on the Huntington Hammer baseball team when time permits.
  arts: Joanne Gomez finds creative release in knitting blankets and crocheting accessories for the senior center, immerses herself in mystery novels by Agatha Christie and Gillian Flynn, enjoys historical
    biographies by David McCullough, and relaxes listening to folk artist The Avett Brothers and classical pianist Ludovico Einaudi.
  travel: Joanne Gomez prefers low‑key, garden‑themed escapes, having visited the Royal Botanic Gardens, Kew in England and Shenandoah National Park for wildflower hikes, while dreaming of a spring trip
    to Kyoto’s Arashiyama Bamboo Grove and a weekend getaway to Asheville’s craft fairs.
  culinary: Joanne Gomez enjoys cooking wholesome meals with fresh garden produce, often preparing rosemary‑roasted chicken, lentil soup with kale, and homemade cinnamon rolls, while savoring the tang of
    feta in a Greek salad and experimenting with Thai green curry using basil and cilantro from their plot.
  core: Joanne Gomez is a detail‑oriented caregiver who balances a competitive streak and skeptical eye with a love of crafting, early morning walks, and a perpetual worry that fuels their drive to achieve
    both professional growth and personal wellness.
background:
  cultural: Joanne grew up in a Midwestern small‑town environment in Ohio, raised in a predominantly white community with subtle Hispanic influences from her family's surname and occasional cultural traditions
    passed down by grandparents. Her upbringing emphasized hard work, self‑reliance, and community involvement, reflecting classic Midwestern values. She celebrates local customs such as the Wood County
    Fair and Ohio Buckeye festivals, enjoys regional foods like homemade corn soup, and incorporates a few Spanish family recipes into her cooking. While she identifies primarily with mainstream American
    cultural norms, her background fosters an appreciation for diverse perspectives, especially in providing culturally sensitive care to clients from various backgrounds.
attributes:
  skills: '[''Personal hygiene and ADL assistance'', ''Mobility support and safe transfer techniques'', ''Medication reminder and compliance tracking'', ''Basic wound care and infection control'', ''Documentation
    and EHR management'', ''Effective communication with patients, families, and healthcare team'', ''Crisis de‑escalation and stress management'', ''First Aid and CPR certification'', ''Knowledge of geriatric
    and disability care best practices'', ''Structured routine planning with flexible adaptation'']'
  hobbies: '[''Walking in the Bowling Green Arboretum'', ''Community gardening'', ''Knitting and crocheting'', ''Reading mystery and historical books'', ''Monthly book club participation'', ''Yoga practice'',
    ''Journaling for stress management'', ''Listening to true‑crime podcasts'', ''Volunteering at a food pantry'']'
  career_goals: Joanne aims to formalize her expertise by earning a Certified Nursing Assistant (CNA) credential within the next year, followed by a Licensed Practical Nurse (LPN) degree to broaden her
    clinical responsibilities. She aspires to become a shift supervisor or lead personal care aide at her current home‑health agency, leveraging her competitive nature to improve team performance and client
    outcomes. Long‑term, Joanne envisions launching a small, client‑focused home‑care business in Wood County that emphasizes personalized, flexible schedules while maintaining high standards of care. She
    is also interested in specializing in dementia and Alzheimer's support, attending relevant workshops to deepen her knowledge.
