personas:
  professional: James Wallace, a curious three‑year‑old who meticulously arranges his toy trucks in perfect rows, shows early signs of an aspiring engineer, employing practical problem‑solving and a love
    of predictability that turns playtime into miniature project management, and they often narrate each step with solemn authority.
  sports: James Wallace, a member of the Bright Beginnings preschool soccer club that meets on Saturday mornings, cheers for the Los Angeles Lakers during family game nights, and they relish building sandcastles
    at the community park, preferring small‑team activities over large stadium crowds.
  arts: James Wallace, a budding artist who splashes watercolors to the rhythm of The Beatles' 'Yellow Submarine', can recite 'Sesame Street' verses on demand, and they love exploring the children's museum
    where interactive exhibits make imagination soar.
  travel: James Wallace, already proud of a weekend trip to the local aquarium and dreaming of a family adventure to Walt Disney World, prefers travel itineraries that balance predictable snack breaks with
    exciting sensory discoveries, and they eagerly pack their favorite stuffed rabbit for any journey.
  culinary: James Wallace, a picky eater with an unwavering love for cheesy macaroni, pepperoni pizza, and crisp apple slices, often requests extra cheese on everything and they’ll happily trade peas for
    a chocolate chip cookie bite during mealtime.
  core: James Wallace, a three‑year‑old who channels a love of order into neatly aligned toy rows while sharing their beloved stuffed rabbit with anyone in need, perfectly blends predictability with compassion.
background:
  cultural: 'James is raised in a white, middle‑class family in Bixby, Oklahoma. His upbringing reflects Mid‑Southern small‑town values: strong family ties, community gatherings, church involvement, and
    an emphasis on kindness, routine, and cooperation taught by his parents and the local community.'
