  hobbies: '[''Vehicle maintenance and DIY repairs'', ''Cooking Gujarati and Indian cuisine'', ''Watching cricket matches'', ''Listening to Bollywood music'', ''Playing racing simulator video games'', ''Jogging
    in local parks'', ''Participating in a community soccer league'', ''Reading automotive and logistics podcasts'']'
  career_goals: Nalin aims to strengthen his credentials by obtaining a full CDL Class A license within the next year, allowing him to take on long-haul assignments. He plans to pursue certifications in
    logistics and supply-chain management to transition into a dispatch or logistics coordinator role within three to five years. Ultimately, he hopes to launch a modest family-owned trucking business that
    can serve the South-Asian community’s specialized delivery needs in the Washington, DC metro area, providing a stable income that supports his parents and future family.
