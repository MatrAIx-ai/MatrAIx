personas:
  professional: Nalin Dhesi, a 21-year-old aspiring logistics professional, leverages his Class B truck license, route‑planning expertise, and meticulous adherence to DOT and OSHA standards to deliver freight
    with a calm, customer‑focused demeanor, preferring predictable routes and harmonious team interactions.
  sports: Nalin Dhesi, a member of a local community soccer league and an avid follower of cricket, cheers for D.C. United in MLS matches, supports the Mumbai Indians in the IPL, and schedules his jogging
    sessions in Rock Creek Park to maintain fitness while balancing his shift work.
  arts: Nalin Dhesi, who enjoys Bollywood soundtracks, frequently streams Arijit Singh’s ballads and dances to Badshah’s upbeat numbers, and watches classic films starring Amitabh Bachchan and modern releases
    featuring Ranveer Singh, often incorporating the music into his garage‑work sessions.
  travel: Nalin Dhesi, who prefers well‑planned trips that blend cultural immersion with family responsibility, has visited New Delhi’s historic markets and hopes to explore the vineyards of Tuscany, while
    also taking weekend road trips to Shenandoah National Park for low‑key nature escapes.
  culinary: Nalin Dhesi, an enthusiastic home cook, masters the art of making dhokla, khandvi, and undhiyu using fresh fenugreek leaves and mustard seeds, and balances this with a love for grilling burgers
    on his truck’s portable grill during tailgate gatherings.
  core: Nalin Dhesi, a routine‑driven, quietly ambitious 21‑year‑old, blends a practical love for trucks and mechanics with a deep commitment to family traditions, often juggling worry‑induced over‑planning
    with a steady, kind-hearted approach to life.
background:
  cultural: Nalin is a second-generation South-Asian American of Gujarati descent. He was raised in a close-knit family that emphasizes respect for elders, community cohesion, and educational achievement.
    The household celebrates Diwali, Holi, and other Indian festivals, and Gujarati is spoken alongside English. Growing up in Fairfax County, he attended a local Indian cultural association, where he participated
    in youth events and volunteer projects. His cultural identity influences his work ethic, his preference for harmony in teamwork, and his desire to eventually serve the Indian-American community through
    his own logistics venture.
attributes:
