  career_goals: Richard wants to finish his education by obtaining a GED within the next two years, after which he hopes to enroll in a vocational program for automotive technology or computer networking.
    He dreams of eventually opening a small garage where he can combine his love for cars with his growing coding abilities, perhaps offering diagnostic software services to local drivers. In the longer
    term he sees himself as an independent contractor, balancing hands‑on work with freelance tech projects, allowing the flexibility he values.
