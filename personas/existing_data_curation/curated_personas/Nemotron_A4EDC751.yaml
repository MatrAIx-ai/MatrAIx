  career_goals: Looking ahead, Donna aims to leverage her wealth of driving and sales experience into a leadership or mentorship role within the logistics sector, such as a driver trainer or fleet coordinator.
    She is exploring the possibility of launching a boutique delivery service that specializes in transporting handmade and artisanal goods, allowing her to combine her love for novelty, art, and community
    networking. To broaden her professional horizons, she plans to obtain a Class A commercial driver’s license and pursue a certification in supply-chain management. Ultimately, she hopes to balance a
    stable income with more time for her creative projects and community involvement.
