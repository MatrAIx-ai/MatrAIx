  career_goals: Justin aims to advance to a senior leadership role such as Director of Business Operations, where he can shape long‑term strategic initiatives and champion digital transformation across
    the organization. He is focused on building a culture of continuous improvement and sustainability, mentoring the next generation of operations professionals, and expanding his influence through industry
    conferences and published case studies. He also envisions leveraging his humanities background to develop community‑focused programs that bridge business efficiency with local cultural preservation.
