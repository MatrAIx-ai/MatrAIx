  career_goals: Gloria aims to establish a community‑focused studio and gallery in Pelham that serves as a hub for local artists and storytellers. She plans to publish a photo book documenting the evolving
    landscapes and cultural traditions of Shelby County, and to secure exhibitions in regional art venues. Over the next five years, she hopes to develop a series of photography workshops that blend technical
    skill with narrative development, collaborate with local nonprofits to chronicle community stories, and obtain a state arts grant that will fund a residency program for emerging photographers. Ultimately,
    she envisions mentoring the next generation while maintaining a sustainable freelance practice that balances creative autonomy with modest commercial work.
