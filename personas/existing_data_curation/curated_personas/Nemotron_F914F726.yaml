  career_goals: Sharon dreams of a future where she can explore how things work while making a practical difference in her community. She hopes to become a wildlife biologist or veterinarian, combining
    her love for animals with scientific inquiry, and she imagines rescuing injured wildlife from storms in Missouri. She also envisions a career that lets her share knowledge, such as becoming a science
    teacher or a community outreach educator, so she can guide younger students through experiments that connect curiosity with real‑world solutions. Although she knows she is still young, she is already
    drawn to paths that balance discovery with tangible, helpful outcomes.
