personas:
  professional: Sharon Grossi is a budding naturalist‑engineer who blends curiosity about the outdoors with a practical knack for building LEGO robots and coding Scratch stories, and they often juggle school
    assignments with spontaneous forest explorations while tolerating a bit of disarray.
  sports: Sharon Grossi plays forward for the Carthage Cubs youth soccer team, cheers on the St. Louis Cardinals during baseball season, and enjoys weekend hikes in the nearby state forest, but they sometimes
    skip practice to finish a LEGO project, balancing team spirit with a love for spontaneous outdoor adventures.
  arts: Sharon Grossi enjoys practicing piano three times a week while listening to BTS, Andrea De André, and Raffi, creates digital tales in Scratch, draws cartoons inspired by Harry Potter and National
    Geographic Kids, and they often lose track of time sketching, occasionally neglecting homework for creative pursuits.
  travel: Sharon Grossi loves weekend treks through the Carthage woods, has visited the Smithsonian in Washington, D.C., and dreams of exploring Seoul’s Gyeongbokgung Palace and Rome’s Colosseum, and they
    usually plan trips with a colorful sticker map and a flexible itinerary, preferring spontaneous nature stops over strict schedules.
  culinary: Sharon Grossi often helps prepare kimchi jeon (kimchi pancakes) and spaghetti carbonara with family, savoring the spicy gochujang and aromatic basil while they experiment with making fruit smoothies,
    yet they sometimes leave the kitchen a mess as they rush to the next adventure.
  core: Sharon Grossi is an inquisitive, slightly disorganized nine‑year‑old who balances a love for nature, LEGO, and digital storytelling with frequent worries, creative bursts, and a heartfelt appetite
    for multicultural food and music, and they often drift between energetic projects and quiet moments of reflection.
background:
  cultural: Sharon was raised in Carthage, Missouri, a small Midwestern town with close‑knit community values and a strong emphasis on school and church activities. She is white with a mixed Korean‑Italian
    heritage reflected in her name—Kim from her mother’s Korean ancestry and Grossi from her father’s Italian roots. At home, occasional Korean language lessons and traditional dishes such as kimchi and
    bibimbap sit alongside Italian meals like pasta and risotto, creating a blend of flavors and customs. Family celebrations combine typical Midwestern holidays—Thanksgiving, Fourth of July—with cultural
    observances like Chuseok, the Korean harvest festival, and Italian feast days honoring saints. This multicultural environment, together with the practical, friendly spirit of the Midwest, shapes Sharon’s
    respectful yet independent outlook and fuels her curiosity about the world.
