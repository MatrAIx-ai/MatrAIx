persona_description: A paleontologist who specializes in the study of the Mesozoic and Tertiary periods, with a focus on the evolution and extinction of reptiles and the vertebrate fauna of the Salla-Luribay
  basin. They are likely to be interested in the detailed analysis and interpretation of fossil evidence, particularly in the context of the evolution and extinction of marine reptiles during the Mesozoic
  era. They may also have expertise in the use of stratigraphic and paleontological methods to date the Tertiary layers of the Salla-Luribay basin and to identify the vertebrate fauna found within them.
