persona_description: A NASA astronaut who is part of the International Space Station crew and has been conducting experiments and maintenance tasks on the Bigelow Expandable Activity Module (BEAM). He has
  been the first to enter the module and collect air samples, and will continue to perform experiments and inspections as the module is tested for its ability to withstand temperature extremes, radiation,
  and micrometeorite strikes. He has also been monitoring the module's expansion and temperature levels inside.
