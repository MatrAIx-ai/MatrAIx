  hobbies: '["Soccer", "Basketball", "LEGO building", "Scratch programming", "Reading adventure/science‑fiction books", "4‑H club projects", "Exploring nature trails", "Helping with farm chores"]'
  career_goals: William dreams of turning his love for animals and his practical problem‑solving skills into a future career as a veterinarian, where he can care for the livestock on his family’s farm and
    help community pets. He also imagines designing tools or equipment that make farm work easier, hinting at an ambition to study engineering. His competitive nature fuels a desire to excel academically
    and earn recognition in science fairs, while his disciplined streak drives him to set high standards for himself in any path he chooses.
