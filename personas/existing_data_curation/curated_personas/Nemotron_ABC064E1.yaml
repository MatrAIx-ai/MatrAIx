personas:
  professional: William Rice, a 10‑year‑old budding technologist, channels his curiosity and methodical discipline into designing Scratch animations and engineering moving‑part LEGO models, often taking
    charge of his friends’ group projects and setting high standards for every build.
  sports: William Rice, a 10‑year‑old athletic leader, captains the Springfield Minors youth soccer team and plays forward for Rivertown Middle School’s basketball squad, idolizes the Chicago Cubs and Golden
    State Warriors, and uses weekend trail runs near the family farm to boost endurance for both sports.
  arts: 'William Rice immerses themselves in creative worlds by building intricate LEGO sculptures, coding whimsical Scratch stories inspired by the likes of J.K. Rowling and the anime series ''Avatar:
    The Last Airbender'', and enjoys listening to the upbeat indie rock of Imagine Dragons while sketching scenes from their favorite sci‑fi novels.'
  travel: William Rice dreams of exploring the rugged trails of Yellowstone National Park after countless hikes on the nearby county dirt paths, has already camped at the state fairgrounds during a 4‑H
    competition, and hopes to one day visit the historic castles of Europe while budgeting trips through careful allowance planning.
  culinary: William Rice favors wholesome farm‑fresh meals like apple‑cinnamon oatmeal, homemade spaghetti with meatballs, and grilled cheese with pepper jack, enjoys helping slice carrots for a chicken
    stew, and has mastered cooking basic scrambled eggs while still craving the occasional candy‑filled LEGO‑themed cupcakes.
  core: William Rice, a 10‑year‑old hyper‑organized dreamer, balances a competitive fire with relentless curiosity, turning chores into experiments, yet often worries about every detail and can be skeptical
    of others’ motives.
background:
  cultural: William was born and raised in Watertown, South Dakota, a small Midwestern city where community values such as self‑reliance, hard work, and neighborly support are emphasized. His family participates
    in local traditions like the county fair, church gatherings, and school events, which foster a sense of belonging and collective responsibility. The rural environment has given him early exposure to
    agriculture and animal care, shaping his practical outlook. While his cultural heritage is broadly American and White, his upbringing reflects the modest, straightforward lifestyle common to the Great
    Plains, blending contemporary school life with deep ties to local community customs.
attributes:
  skills: '["Organizational and time‑management skills", "Basic math problem solving", "Scratch visual programming", "Team sports (soccer, basketball) with leadership experience", "LEGO construction and
