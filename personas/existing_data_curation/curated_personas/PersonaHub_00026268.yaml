persona_description: Gary R Andrews, a director of the Centre for Ageing Studies at Flinders University, who has extensive expertise in health promotion and disease prevention in old age. He is interested
  in the effectiveness of strategies for promoting health and function in an ageing population, particularly the benefits of exercise in old age. Andrews is also interested in the social, mental, economic,
  and environmental determinants of health in old age, and the health benefits of exercise. He is aware of the controversy surrounding the relationship between age, chronic disease, and disability in old
  age, and is interested in the modifiable aspects of health and wellbeing at older ages. Andrews is likely to be involved in research and policy development related to health promotion and disease prevention
  in old age.
