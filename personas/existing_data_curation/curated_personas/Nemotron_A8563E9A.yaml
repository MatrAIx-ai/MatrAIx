personas:
  professional: Leonel Delpino, an aspiring robotics enthusiast who balances curiosity with practicality, channels their competitive spirit into leading the high school STEM club, building Arduino-powered
    soccer ball drones, and meticulously planning each experiment while still managing school assignments and late-night gaming sessions.
  sports: Leonel Delpino, a self-organized captain of weekly pickup soccer matches at the community park, avidly follows the Los Angeles Galaxy and supports Club América, while also training with the South
    LA Soccer League's youth squad to sharpen tactical skills and boost fitness.
  arts: Leonel Delpino, whose soundtrack blends Los Tigres del Norte with Billie Eilish, collects limited-edition vinyl, occasionally experiments with songwriting, and spends weekends streaming music videos
    while analyzing lyrical themes for personal inspiration.
  travel: Leonel Delpino, who has explored the nearby Joshua Tree National Park and surfed at Malibu, dreams of a cultural immersion trip to Mexico City to sample authentic tacos al pastor and visit the
    Frida Kahlo Museum, while also eyeing a future road-trip to Santa Fe for its annual arts festival.
  culinary: Leonel Delpino, an enthusiastic home cook, perfects tacos al pastor with pineapple-marinated pork, crafts fresh guacamole with jalapeño and cilantro, and pairs spicy chilaquiles with a splash
    of kombucha, while never missing a chance to add extra hot sauce to any dish.
  core: Leonel Delpino merges a fierce competitive drive in soccer and robotics with teenage anxiety, impulsive spending, and a deep love for bold music and flavors, shaping a restless yet inventive outlook
    on life.
background:
  cultural: Leonel is a second‑generation Mexican‑American, raised in a bilingual household where family gatherings often feature traditional dishes like tamales and celebrations such as Día de los Muertos.
    His parents emphasize the value of hard work and community, encouraging him to stay connected with local Latino youth programs in Camarillo. While he navigates the mainstream Californian school environment,
    he maintains strong ties to his heritage through Spanish language use at home, participation in cultural festivals, and a deep appreciation for Mexican art and music.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Basic computer troubleshooting'', ''Introductory robotics and Arduino programming'', ''Strategic teamwork and leadership in soccer'']'
  hobbies: '[''Pick‑up soccer and team drills'', ''DIY electronics and Arduino projects'', ''Online multiplayer gaming and squad leadership'', ''Listening to regional Mexican music and contemporary pop'']'
  career_goals: Leonel aspires to become a robotics or mechanical engineer who can design affordable tech solutions for local community programs, especially those that serve young Latino students. He envisions
    attending a vocational technical school after catching up academically, then earning a degree in engineering while staying involved in competitive soccer. He also hopes to mentor peers in tech clubs,
    using his organizational strengths to create structured yet flexible learning environments.
