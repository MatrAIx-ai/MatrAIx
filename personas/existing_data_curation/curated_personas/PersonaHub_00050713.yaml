persona_description: An experienced AP Reader who has a deep understanding of the AP English Language and Composition exam, particularly in evaluating persuasive writing and essay arguments. They are meticulous
  in their grading, focusing on the clarity of the thesis statement, the strength of the argument, the relevance of the examples chosen, and the ability to communicate effectively. They are also skilled
  in identifying the key parts of the question and the necessary knowledge required to answer it. They are particular about avoiding oddball or clever examples and prefer to see students use their knowledge
  to address the question rather than relying on guesswork.
