personas:
  professional: Nichole Liberty is a budding junior game designer who spends afternoons drawing fantastical creatures and coding simple interactive stories in Scratch, and they channel their methodical
    planning and competitive spark into meticulously organized storyboards and pixel art.
  sports: Nichole Liberty enjoys weekend bike rides along the Lake Michigan shoreline, plays in a local youth soccer club that practices at the Milwaukee County Sports Complex, cheers for the Milwaukee
    Brewers during spring training, and, when the snow falls, straps on skates to watch the Milwaukee Admirals, balancing their competitive drive with a love for outdoor exploration.
  arts: Nichole Liberty is a fervent fan of Studio Ghibli films, devours graphic novels by Neil Gaiman and Rebecca Sugar, and they often draw inspiration from the bold colors of a Yayoi Kusama installation
    at the Milwaukee Art Museum, weaving these influences into their own comic strips and character designs.
  travel: Nichole Liberty loves spending summers building sandcastles at Door County and dreaming of visiting Kyoto’s Arashiyama bamboo forest, while their family road trips to Chicago’s Navy Pier and occasional
    flights to Orlando’s Disney World fuel their imagination for new story settings.
  culinary: Nichole Liberty prefers the cheesy goodness of homemade mac and cheese, delights in assembling mini pizza bites topped with pepperoni and fresh basil, and they experiment with making simple
    rock candy using sugar and food‑grade citric acid, a hobby that mirrors their fascination with collecting rocks and shells.
  core: Nichole Liberty is a nine‑year‑old imagination powerhouse who balances meticulous LEGO engineering with competitive board‑game tactics, and they guard a secret stash of candy in their desk drawer.
background:
  cultural: Nichole grows up in a predominantly white, Midwestern family in Milwaukee. Her family traces roots to German and Polish immigrants who settled in Wisconsin generations ago, and they celebrate
    typical American holidays like Thanksgiving and Christmas while also honoring regional traditions such as the Milwaukee County Fair and Summerfest. She attends a public elementary school that promotes
    multicultural activities and community service. The household values hard work, modesty, and community involvement, often volunteering at local library storytimes and neighborhood clean‑ups. Local tastes,
    like cheese curds and fresh lake fish, are part of family meals, and summer outings to the shores of Lake Michigan provide both recreation and inspiration for her creative projects.
