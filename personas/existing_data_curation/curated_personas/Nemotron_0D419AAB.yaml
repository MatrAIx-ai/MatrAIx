  career_goals: Nichole dreams of becoming a children's book author and illustrator, hoping to publish stories that inspire other young readers with imaginative worlds. She is also fascinated by animation
    and aspires to study concept art or character design, aiming one day to work on animated films. In the short term, she wants to win her elementary school science fair and a local Lego building contest,
    which would give her confidence for future academic competitions. She plans to develop a personal website where she shares her drawings and stories, hoping to gain a following and eventually attend
    a specialized arts academy.
