personas:
  professional: James Wiggins, a 45‑year‑old freelance fine‑art photographer based in Tampa, channels his humanities education and love of the Gulf Coast’s eclectic neighborhoods into meticulously organized
    shoots—whether on a kayak‑laden riverbank or in a studio—while balancing a restless curiosity for new visual techniques with a pragmatic drive to meet client deadlines, often double‑checking metadata
    and contracts to soothe his anxiety.
  sports: James Wiggins, an avid kayaker, joins the Hillside Kayak Club for weekly paddles through the mangroves, follows the Tampa Bay Rays and the Buccaneers religiously, and squeezes in occasional pickup
    basketball at a Ybor City gym, though their fitness routine sometimes stalls during periods of heightened work stress.
  arts: James Wiggins, a lifelong guitar player, frequents intimate venues like the Orpheum and Skipper’s Smokehouse to enjoy Latin jazz sets by artists such as Buena Vista Social Club and the improvisational
    saxophone of John Coltrane, while devoting weekends to restoring vintage Leica cameras and discussing contemporary fiction by authors like Haruki Murakami at local literary meet‑ups.
  travel: James Wiggins prefers well‑planned, photography‑centric trips—often a weekend road trip to the Florida Keys to capture sunrise over the Gulf, a scheduled visit to Cartagena’s historic walls for
    vibrant street scenes, and an annual pilgrimage to Seville’s Feria de Abril—to balance his desire for discovery with the need for budget control and structured itineraries.
  culinary: James Wiggins enjoys cooking simple yet flavorful dishes like shrimp scampi with home‑grown basil, Cuban black bean soup seasoned with cumin and orange zest, and grilled grouper topped with
    a mango‑avocado salsa, blending his love for local seafood with a modest skill set that sometimes leads to over‑spicing when his mind wanders.
  core: James Wiggins is a meticulous photographer who balances restless curiosity with anxiety‑driven precision, often caught between a perfectly organized file system and a sudden urge to chase a fleeting
    light.
background:
  cultural: James grew up in a middle‑class white family in the greater Tampa area, where the subtropical climate and the city’s blend of Southern and Caribbean influences shaped his worldview. His upbringing
    exposed him to the region’s historic Ybor City heritage, the annual Gasparilla festivities, and a culinary scene rich in Cuban, Spanish, and seafood traditions. While his formal education in the arts
    and humanities broadened his appreciation for global cultures, his local roots keep him attuned to the rhythms of the Gulf Coast, the importance of community events, and the value of self‑reliance typical
    of the state’s cultural narrative. This background informs his photographic subjects, his collaborative yet assertive work style, and his desire to capture both the everyday and the extraordinary in
    Florida’s diverse cultural tapestry.
