  career_goals: James aims to evolve his freelance practice into a recognized fine‑art photography brand anchored in Tampa’s coastal and cultural landscapes. He plans to publish a coffee‑table monograph
    that documents the interplay of the Gulf’s ecology and the city’s multicultural neighborhoods, and to exhibit the work in regional galleries and the Tampa Museum of Art. He also hopes to secure a long‑term
    partnership with the local tourism board for commercial campaigns, while dedicating time each year to teach introductory photography workshops at the community college, sharing his balanced approach
    of curiosity and practicality with emerging photographers. Managing his anxiety, he is building a structured business plan that includes regular self‑care routines and delegation of administrative tasks
    to maintain creative focus.
