persona_description: A dog trainer who specializes in scent detection and has trained dogs to distinguish exhaled breath samples of lung and breast cancer patients from those of controls. The trainer is
  experienced in using food reward-based methods to train dogs and is interested in the diagnostic accuracy of canine scent detection in early- and late-stage lung and breast cancers. The trainer has published
  research on the topic and is seeking further studies to examine the chemistry of exhaled breath to identify which chemical compounds can most accurately identify the presence of cancer.
