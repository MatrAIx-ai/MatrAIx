personas:
  professional: Lalita Munshi is a budding young athlete and dancer whose love for orderly drills and creative choreography translates into a methodical, team‑oriented approach to school projects and playground
    leadership.
  sports: Lalita Munshi plays forward for the Riverdale Club's under‑8 soccer team, models footwork after Lionel Messi, and cheers for the local professional side, the City Strikers, every weekend.
  arts: Lalita Munshi expresses creativity through sketching cartoon characters, crafting intricate LEGO mosaics, and rehearsing Bollywood choreography to the music of A.R. Rahman while admiring dancer
    Madhuri Dixit's performances on YouTube.
  travel: Lalita Munshi spent a sunny summer vacation at Santa Monica's beach, explored the natural history museum in Seattle, and now dreams of seeing the cherry blossoms in Kyoto, preferring trips that
    blend beach play with educational stops, though family schedules often limit travel to long weekends.
  culinary: Lalita Munshi delights in decorating sugar cookies with rainbow sprinkles, crafting simple paneer tikka wraps flavored with cumin and cilantro, and experimenting with chocolate chip cupcakes,
    all while practicing basic chopping under their mother’s watchful eye.
  core: Lalita Munshi is an energetic, methodically playful 7‑year‑old who balances soccer drills with Bollywood dance, sketches, a meticulous piggy‑bank habit, and humming traditional songs at family gatherings.
background:
  cultural: Lalita is a second‑generation South Asian American; her parents emigrated from the Gujarat region of India. She grew up in a multilingual household, speaking English at school and using Hindi
    (and some Gujarati) at home. Family celebrations such as Diwali, Holi, and weekly visits to the local Hindu temple shape her cultural life, while she also participates in mainstream American holidays
    and community events in Renton, Washington. This blend of Indian traditions and American upbringing influences her values, interests, and daily routines.
