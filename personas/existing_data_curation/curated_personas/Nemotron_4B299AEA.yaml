  career_goals: Lalita loves helping friends and classmates, and she often imagines becoming a teacher or a pediatric nurse when she grows up, so she can care for and guide children. She also dreams of
    working in a community library, organizing books and leading reading circles, reflecting her passion for order, learning, and supporting others.
