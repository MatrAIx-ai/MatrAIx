  hobbies: '[''Urban gardening'', ''Reading mystery and non‑fiction books'', ''Cooking Mediterranean recipes'', ''Crossword puzzles'', ''Yoga'', ''Walking in Central Park'', ''Volunteer tax assistance during
    filing season'']'
  career_goals: Ara aims to advance to a senior bookkeeping supervisor role within the next three years, leveraging her experience to lead a small team and drive efficiency improvements across financial
    processes. She is pursuing the Certified Bookkeeper credential to formalize her expertise and plans to spearhead the adoption of cloud‑based accounting solutions in her organization. Long‑term, she
    envisions establishing a boutique bookkeeping consultancy that serves New York’s small businesses, allowing her to combine her competitive drive with a strategic focus on client service excellence.
