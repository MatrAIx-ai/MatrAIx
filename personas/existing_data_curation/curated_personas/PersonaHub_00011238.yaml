persona_description: A machinist who specializes in the design and manufacture of cutting tools, including straight, bent, cranked, and round-nosed cutters, according to the shape of the head and cross
  section of the holder. They are skilled in selecting the appropriate cutting tool geometry based on the material used for the cutting element, the material being worked, the method used to produce the
  billet, and the type of machining. They are also familiar with the experimental optimum parameters for the geometry of the cutting element and have experience in simplifying the sharpening of hard-alloy
  cutters and cutters with a rounded nose. They understand the importance of machining as the most labor-intensive process in production and its efficiency depends significantly on the properties of the
  tool material.
