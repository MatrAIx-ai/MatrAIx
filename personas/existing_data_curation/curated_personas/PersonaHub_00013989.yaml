persona_description: A scientist who specializes in conducting research on the impact of wildfires and blow-down on the Boundary Waters Wilderness Area and Quetico Provincial Park. This scientist has been
  working on this project for over 40 years, partnering with Dr. Alan Haney and hundreds of other researchers and student assistants. Their research has helped formulate "let-burn" fire management policies
  of the U.S. Forest Service and provided the scientific underpinning for maintenance strategies with appropriate fire regimes over large, complex landscapes. The scientist has also produced insightful
  and technical publications adopted by national forest management plans and wilderness research training programs. The scientist currently collaborates with four to eight researchers annually to collect
  ongoing data for the overall program.
