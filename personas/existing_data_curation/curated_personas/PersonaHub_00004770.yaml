persona_description: A scientist who is passionate about teaching and has developed a sourcebook containing cooperative learning activities for teaching astronomy at the undergraduate level. They are dedicated
  to producing scientifically literate citizens who can understand and share in the excitement of scientific discoveries as well as make informed decisions regarding scientific and technological issues.
  They have experience in teaching astronomy and are seeking funding from the National Science Foundation to develop a sourcebook that includes sections on the advantages/disadvantages of group activities,
  basic cooperative learning techniques, in class/out of class activities, and how to use peer instruction to expose students to the wonder of astronomy resources on the internet.
