persona_description: A German physicist and inventor who has developed a solution to the problem of slow internet speeds by using a light-based technology called Data Through Illumination, also known as
  D-Light. He has successfully achieved high data rates of over 500 megabytes per second in the lab and is currently working on developing a consumer VLC transmitter that can transmit data at 100 MB/s,
  faster than most UK broadband connections.
