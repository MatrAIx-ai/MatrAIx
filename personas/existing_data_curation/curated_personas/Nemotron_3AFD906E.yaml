  career_goals: Jessica aims to stay actively involved in her community by volunteering as a senior mentor for high‑school students interested in STEM, developing a series of interdisciplinary art‑and‑science
    workshops at the Queens Library, and contributing articles to local magazines that explore the intersection of creativity and technology. She hopes to author a memoir or popular‑science book that weaves
    together her life experiences with the evolution of scientific thought, serve on the advisory board of the nearby museum, and maintain a lively social calendar that sustains her mental agility and sense
    of purpose.
