personas:
  professional: Jessica Redmon designs and leads interdisciplinary art‑and‑science workshops at the Queens Library, they draw on their solid background in scientific research and a vivid imagination to
    transform abstract data into interactive watercolor installations, while their relaxed approach to scheduling lets spontaneity and community collaboration flourish.
  sports: Jessica Redmon cheers for the New York Knicks and New York Yankees, they participate in the Queens Senior Walking Club at the Botanical Garden and join a gentle yoga class at the community center,
    blending fandom with low‑impact fitness that keeps them agile throughout the seasons.
  arts: Jessica Redmon creates abstract watercolors inspired by Kandinsky and O'Keeffe, they photograph the street murals of the Lower East Side, they perform in community theater productions of classics
    like 'Our Town,' and they regularly attend gallery openings featuring works by Yayoi Kusama and Banksy, weaving visual, performing, and photographic arts into their daily rhythm.
  travel: Jessica Redmon favors thoughtfully curated cultural trips, they plan a spring weekend in the Hudson Valley’s historic farms, they embark on a week‑long immersion in Barcelona’s architecture after
    their Spanish lessons, and they enjoy leisurely cruises to the Caribbean, balancing curiosity with a relaxed itinerary that allows ample time for spontaneous photo excursions.
  culinary: Jessica Redmon, an adventurous home cook, they prepare paella with saffron and chorizo, they craft delicate sushi rolls with fresh tuna and wasabi, they simmer flavorful Ethiopian injera paired
    with lentil stew seasoned with berbere, often sourcing herbs from their garden and sharing the meals at weekly potluck gatherings with friends.
  core: Jessica Redmon is a vibrant 77‑year‑old who blends scientific rigor with artistic flair, they thrive on lively social interaction, and they navigate life with a delightfully disorganized but wholehearted
    enthusiasm that fuels endless curiosity.
background:
  cultural: Jessica grew up in post‑war suburban Long Island within a middle‑class white family that emphasized education, community service, and civic responsibility. The social and artistic movements
    of the 1960s sparked her lifelong interest in progressive causes and creative expression. Relocating to Saint Albans, Queens—a richly diverse neighborhood—she absorbed a mosaic of cultures, sampling
    global cuisines, attending multicultural festivals, and forming friendships across ethnic lines. Her background blends traditional American values with the cosmopolitan exposure of New York City, fostering
    a worldview that celebrates diversity, curiosity, and collaborative spirit.
