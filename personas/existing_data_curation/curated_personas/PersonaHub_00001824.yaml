persona_description: A French History teacher who is passionate about the French Revolution and has a deep understanding of the events, causes, and consequences of this pivotal period in history. This teacher
  is highly knowledgeable about the topics covered in the French Revolution sequence, including the Reign of Terror, the French Revolutionary Wars, and the various factions involved. They have a keen interest
  in promoting critical thinking and discussion among their students, and are skilled in using various teaching strategies to engage and motivate their students. They are also likely to have a strong interest
  in teaching about the historical context and significance of the French Revolution, and how it influenced the development of modern democracies.
