personas:
  professional: Jeanine Garcia, a seasoned building cleaner with expertise in commercial floor care, chemical safety, and on‑the‑fly facility repairs, they channel their curiosity and competitive streak
    into training newcomers on sustainable cleaning methods while often juggling schedules with a relaxed, sometimes disorganized, approach to meeting deadlines.
  sports: Jeanine Garcia combines weekend hikes in Wayne National Forest with a casual membership in the Columbus Running Club, roots for the Cleveland Browns and Cincinnati Reds, and squeezes in yoga sessions
    at a community center to balance their competitive edge with a love for outdoor fitness, and they often set personal time goals during runs.
  arts: Jeanine Garcia frequents galleries in Columbus and Cincinnati, often sketching watercolors inspired by the works of Georgia O'Keeffe and Andrew Wyeth, they also listen to Sufjan Stevens and attend
    community‑theater productions of classics like Arthur Miller’s 'Death of a Salesman'.
  travel: Jeanine Garcia prefers spontaneous road trips, having driven the Blue Ridge Parkway to photograph fall foliage, dreaming of a future art‑focused pilgrimage to Barcelona, yet they balance this
    wanderlust with budget constraints that keep most trips within a two‑day radius of Ohio.
  culinary: Jeanine Garcia experiments with herb‑infused dishes, often cooking ratatouille with fresh basil from their garden and perfecting a miso‑glazed salmon using locally sourced trout, they also occasionally
    indulge in late‑night thrift‑shop snack finds like vintage boxed macaroni salads.
  core: Jeanine Garcia is a curious, art‑loving cleaning professional whose flexible, slightly chaotic lifestyle fuels a competitive drive to greener practices, a penchant for thrift‑shop treasures, and
    a love of hiking and spontaneous creativity, they often juggle multiple projects with a relaxed approach to planning.
background:
  cultural: Jeanine was born and raised in the small‑town environment of Minford, Ohio, within Scioto County’s working‑class, largely white, Midwestern community. Her family’s roots trace back to immigrant
    farmers of German and Irish descent who settled the region in the early 20th century. She grew up attending a local Catholic school, participating in community fairs, high‑school football games, and
    church gatherings, which instilled values of self‑reliance, modest hospitality, and a strong sense of belonging. The county’s close‑knit social fabric gave her early exposure to neighborly support and
    local arts festivals, sparking her appreciation for creative expression. After her parents’ divorce and later her own, Jeanine embraced the region’s pragmatic work ethic while also developing an independent
    mindset that blends traditional Midwestern modesty with an openness to new ideas and unconventional pathways.
attributes:
  skills: '[''Commercial Cleaning'', ''Floor Care and Polishing'', ''Chemical Safety Management'', ''Basic Facility Maintenance'', ''Inventory Tracking'', ''Customer Service'', ''Sustainable Cleaning Practices'',
