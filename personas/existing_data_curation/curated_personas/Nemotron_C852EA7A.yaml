  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Reading Art History'', ''Hiking'', ''Community Theater'', ''Trivia Nights'', ''Gardening'', ''Thrift Shopping'', ''Journaling'', ''Listening
    to Indie Music Podcasts'']'
  career_goals: Jeanine seeks to turn her hands‑on experience into a formal role in facilities management. Within the next two years she plans to earn a Certified Custodial Technician credential and complete
    a community‑college course in environmental health and safety. Her medium‑term goal is to become a lead custodian or facilities supervisor for a regional office, where she can influence building maintenance
    policies and introduce greener cleaning protocols. Long‑term, she envisions launching her own small‑scale, eco‑focused cleaning service that serves local businesses and community centers, giving her
    the flexibility she values while providing financial independence after her divorce.
