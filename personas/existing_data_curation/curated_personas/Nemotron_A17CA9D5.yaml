  hobbies: '[''Hiking local trails'', ''Fishing at Clear Lake'', ''Cooking Vietnamese and Californian dishes'', ''Playing badminton'', ''Mindfulness meditation'', ''Reading science‑fiction novels'', ''Staying
    updated via medical journals'', ''DIY home improvement projects'', ''Attending community cultural festivals'']'
  career_goals: Xuan aims to complete his bachelor's degree in nursing and pursue a Nurse Practitioner certification with a focus on primary care for underserved rural and immigrant populations. He wants
    to develop a community outreach program that offers health screenings and culturally tailored education. He also hopes to become a charge nurse or unit manager to improve workflow and reduce staff burnout.
    Additionally, he is interested in obtaining specialty certifications in wound care and mental health, and integrating evidence‑based alternative practices from his cultural background into holistic
    patient care.
