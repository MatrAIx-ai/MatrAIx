  hobbies: '["Sketching and drawing", "Digital illustration", "Reading fantasy and sci-fi novels", "Creative writing (short stories, poetry)", "Building LEGO models", "Playing Minecraft (creative mode)",
    "Acoustic guitar playing and songwriting", "Nature walks and birdwatching", "Volunteering at the local library reading program"]'
  career_goals: William envisions a future where he can blend his love of art with his desire to help others. In the short term, he aims to build a strong high-school art portfolio, attend summer art camps,
    and continue developing his peer-support skills. Long-term, he hopes to study psychology or counseling with a specialization in art therapy, allowing him to guide children and teens in expressing and
    managing their emotions through creative processes. He also expresses interest in environmental education, dreaming of a role that lets him combine nature hikes with artistic projects for community
    outreach.
