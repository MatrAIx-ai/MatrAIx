personas:
  professional: Teanna Miller, a retired community coordinator with a meticulous eye for budgets, leverages their horticultural expertise, quilting precision, and event‑planning acumen to orchestrate church
    fundraisers, neighborhood garden projects, and family reunions with uncompromising efficiency.
  sports: Teanna Miller enjoys brisk morning walks with the Richmond Senior Walking Club, follows the Richmond Flying Squirrels baseball team, and participates in friendly bridge tournaments that keep their
    mind sharp, balancing gentle exercise with seasonal community softball games for seniors.
  arts: Teanna Miller expresses their creative side through intricate quilting that incorporates heritage motifs, finds inspiration in the jazz of Ella Fitzgerald and the poetry of Maya Angelou, and attends
    performances at the Altria Theater, where classic musical productions fuel their artistic passions.
  travel: Teanna Miller prefers meticulously planned trips, having explored Washington, D.C.’s historic monuments and Shenandoah National Park’s Skyline Drive, while dreaming of a leisurely coastal cruise
    to Charleston to combine history, nature, and family reunions.
  culinary: Teanna Miller expertly prepares soul‑comfort dishes such as collard greens seasoned with smoked turkey, sweet potato pie, and a healthier version of fried catfish using whole‑grain cornmeal,
    blending traditional flavors with nutritional tweaks for community gatherings.
  core: Teanna Miller blends disciplined organization, competitive spirit, and a love for heritage‑rich crafts, turning every garden harvest, quilt block, and community event into a precisely measured triumph—though
    they’ll sometimes over‑schedule themselves and forget to pause.
background:
  cultural: Teanna Miller’s cultural identity is rooted in a rich African‑American heritage shaped by the Great Migration and the civil‑rights era. Born in the South and raised in a close‑knit Black community
    before her family settled in Richmond, Indiana, she carries the traditions of gospel music, storytelling, and soul‑food cuisine. Her upbringing emphasized the church as a cornerstone of social support,
    fostering a deep sense of communal responsibility and spiritual resilience. Teanna’s experience of the civil‑rights movement instilled a critical, skeptical mindset toward authority and a competitive
    drive to achieve excellence in her endeavors. She actively participates in local Black cultural events, such as Juneteenth celebrations and heritage workshops, and she mentors younger community members,
    passing down culinary recipes, historical knowledge, and the importance of preserving family narratives. This blend of historical awareness, faith, and community activism informs her daily life and
    the values she imparts to those around her.
