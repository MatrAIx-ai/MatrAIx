  hobbies: '["Vegetable gardening", "Quilting", "Historical non‑fiction reading", "Genealogy research", "Community volunteer work", "Soul‑food cooking", "Crossword puzzles", "Bridge (card game)"]'
  career_goals: Even though she is retired from formal employment, Teanna remains driven by purposeful goals. She aims to compile a detailed memoir that weaves her family's oral histories with documented
    genealogical research, preserving the legacy for future generations. She is determined to mentor her grandchildren and local youth, teaching them practical life skills such as financial literacy, gardening,
    and critical thinking. Teanna also aspires to lead a community‑garden initiative in Richmond that provides fresh produce to seniors and low‑income families, showcasing her commitment to tangible, high‑impact
    projects. Maintaining her health and independence through regular walking, low‑impact exercise, and mental stimulation (puzzles, reading) is a core personal ambition, ensuring she can continue to contribute
    to her community for years to come.
