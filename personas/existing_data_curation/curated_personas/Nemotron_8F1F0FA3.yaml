personas:
  professional: Ashmore Richards, a budding little builder, demonstrates an early love for order and creativity by arranging wooden blocks into tidy towers that they later lovingly dismantle to explore
    new configurations, revealing a nascent engineering mindset balanced by a flexible imagination.
  sports: Ashmore Richards, a spirited toddler who attends a weekly parent‑child gymnastics class at the Community Recreation Center, cheers for the local baseball team the Chicago Cubs during family game
    nights, and enjoys bouncing on a mini‑trampoline with the Little Cubs Club, embodying a playful yet slightly anxious approach to movement.
  arts: Ashmore Richards, an eager little connoisseur of bright visuals, spends afternoons drawing crayon masterpieces inspired by Dr. Seuss while singing along to the catchy tunes of The Wiggles, and they
    delight in the animated antics of Elmo from Sesame Street, reflecting their curiosity and love for unconventional ideas.
  travel: Ashmore Richards, a curious explorer who has been taken to the nearby aquarium, a weekend family getaway at the seaside town of Cape Cod, and a short road trip to grandparents’ country farm, now
    they daydream about a future adventure to Disneyland, balancing excitement for new places with the comfort of familiar bedtime routines.
  culinary: Ashmore Richards, a selective bite‑tester who adores mashed bananas mixed with oatmeal, loves soft peas sprinkled with shredded cheese, prefers warm apple slices over broccoli, and enjoys helping
    stir tiny spoonfuls of carrot puree, yet they often refuse the green beans with a determined pout.
  core: Ashmore Richards is a curious, slightly anxious two‑year‑old who balances an insatiable appetite for discovery with a strong need for routine, often fussing over tiny changes while they eagerly
    lead playtime adventures.
background:
  cultural: Ashmore is raised in a Black family in Tampa, Florida where African‑American cultural traditions intertwine with the city’s multicultural environment. His household celebrates community gatherings,
    gospel and R&B music, and seasonal cultural observances such as Juneteenth and Kwanzaa. Family members often share oral histories and folk tales, and he attends a neighborhood church that emphasizes
    fellowship, rhythmic clapping, and call‑and‑response singing. The diverse neighborhood provides exposure to Caribbean influences, Latin rhythms, and Southern cuisine, shaping his sensory preferences
    and early worldview.
