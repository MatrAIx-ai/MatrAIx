  career_goals: At two years old Ashmore’s concrete career goals are still forming, but his caregivers nurture his budding curiosity by encouraging exploration of art and the world around him. In the short
    term his ambition is to master new skills such as drawing recognizable shapes, naming colors, using the potty, and engaging confidently in preschool activities. Looking farther ahead, his environment
    supports the potential for future interests in creative fields like visual arts or storytelling and in problem‑solving areas such as engineering, reflecting his openness to unconventional thinking and
    desire for self‑reliance.
