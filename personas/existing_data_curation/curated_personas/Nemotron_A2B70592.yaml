  hobbies: '[''Reading science non‑fiction'', ''Hiking local trails'', ''Gardening'', ''Cooking'', ''Puzzle solving (crosswords, Sudoku)'', ''DIY electronics projects'', ''Board games (strategy)'', ''Volunteer
    at community STEM workshops'', ''Nature photography'']'
  career_goals: Samantha aims to deepen her expertise in STEM education by pursuing a master’s degree in curriculum and instruction with a focus on science and mathematics. In the next five years she hopes
    to become a lead teacher or STEM coordinator at her school, designing interdisciplinary programs that encourage inquiry and problem‑solving. She envisions eventually contributing to district‑wide curriculum
    development and possibly launching an after‑school robotics and coding club to expand access to hands‑on STEM experiences for under‑represented students.
