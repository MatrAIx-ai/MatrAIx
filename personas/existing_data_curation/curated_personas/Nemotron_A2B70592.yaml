personas:
  professional: Samantha Valdivia is a newly minted STEM graduate who designs data‑driven, structured lesson plans for elementary and middle‑school classrooms, leveraging interactive whiteboards, Google
    Classroom, and Scratch to create hands‑on science and math experiences while maintaining a calm, solution‑focused classroom management style.
  sports: Samantha Valdivia enjoys hiking the coastal trails of Cape Cod three times a week, runs in the Boston Marathon training club during spring, roots for the Boston Red Sox and Celtics, and follows
    a disciplined weekly fitness plan that mixes cardio, yoga for flexibility, and occasional strength training at the local community center.
  arts: Samantha Valdivia spends evenings knitting patterns from YarnCraft, reads science authors Carl Sagan and Mary Roach, listens to indie folk artists like Sufjan Stevens and The Tallest Man on Earth,
    and regularly hosts strategy board game nights featuring Catan and Terraforming Mars with a close circle of friends.
  travel: Samantha Valdivia prefers low‑key, well‑planned trips, has explored the historic lighthouses of Cape Cod, dreams of visiting Iceland’s geysers for their natural science wonders, and plans a weekend
    getaway to Acadia National Park to combine hiking with photography.
  culinary: Samantha Valdivia enjoys cooking with seasonal, locally sourced ingredients, often preparing New England clam chowder, roasted pumpkin soup, and lobster rolls, while experimenting with herb‑infused
    olive oil blends and using a cast‑iron skillet for perfect sears.
  core: Samantha Valdivia blends a love for structured learning, quiet reflection, and methodical planning into a life marked by meticulous budgeting, avid puzzle‑solving, and a habit of knitting while
    debugging code late into the night.
background:
  cultural: Samantha grew up in a middle‑class suburban community in southeastern Massachusetts, steeped in New England’s cultural emphasis on education, self‑reliance, and community service. Her family’s
    Anglo‑American heritage, with roots in the region’s early settlers, has instilled a respect for tradition and a pragmatic outlook. She participates in local volunteer initiatives, values the region’s
    love of outdoor recreation, and embraces the New England tradition of lifelong learning and civic involvement.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''STEM curriculum development'', ''Educational technology integration'', ''Differentiated instruction'', ''Data‑driven assessment'', ''Collaborative
