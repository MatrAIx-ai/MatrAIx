  hobbies: '["Gardening", "Woodworking", "Photography", "Historical society involvement", "Bridge and card games", "Volunteer cooking at community kitchen", "Group hiking", "Senior fitness classes", "Cooking
    and recipe experimentation", "Attending local theater performances"]'
  career_goals: Although retired from full‑time work, Paul aims to stay active in his community by mentoring younger retirees and aspiring entrepreneurs, serving on the board of a local senior center, and
    volunteering his facilities expertise for neighborhood improvement projects. He is also pursuing personal growth goals such as completing a photography series documenting Minneapolis neighborhoods,
    learning advanced digital editing, and staying physically fit through regular hiking and senior fitness classes. He hopes to travel to at least three national parks over the next five years and potentially
    author a short guidebook on practical home maintenance for senior homeowners.
