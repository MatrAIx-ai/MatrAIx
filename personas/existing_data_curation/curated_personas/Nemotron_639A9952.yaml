personas:
  professional: Jae Yi, an 82-year-old retired architect and interdisciplinary artist, leverages decades of drafting expertise, meticulous project management, and a disciplined routine to mentor emerging
    creators, curate a solo mixed-media exhibition, and author a reflective memoir that intertwines architecture, calligraphy, and cultural narratives, all while maintaining exacting standards and a competitive
    drive to innovate.
  sports: Jae Yi, an 82-year-old fitness enthusiast, enjoys daily desert walks, low-impact tai chi sessions at the community center, and weekly senior tennis matches on the Palm Springs courts, while cheering
    for the Los Angeles Lakers and the Phoenix Suns, and they keep a casual rivalry with a fellow club member in weekly chess tournaments that double as mental workouts.
  arts: Jae Yi, an 82-year-old conceptual artist, spends mornings sketching abstractions, evenings curating visits to the Palm Springs Art Museum, and weekends experimenting with calligraphy and watercolor
    in mixed-media pieces that echo the works of Yayoi Kusama, James Turrell, and Ai Weiwei, while they meticulously document each work on a personal blog and mentor younger artists through weekly workshops.
  travel: Jae Yi, an 82-year-old traveler with a keen eye for architectural wonder, has visited Gaudí’s Sagrada Família, the zen gardens of Kyoto, the desert landscapes of Sedona, and the historic streets
    of Vienna, preferring meticulously planned itineraries that include accessible accommodations, museum memberships, and slow-paced walking tours that let them absorb design details while maintaining
    physical comfort.
  culinary: Jae Yi, an 82-year-old culinary explorer, blends traditional family recipes such as fermented cabbage stew and rice porridge with Mediterranean flavors like olive oil, herbs, and lemon, creating
    fusion dishes like quinoa mixed‑rice bowls and miso‑infused grilled fish, while they capture the plating process in photographs and share step‑by‑step guides on their blog.
  core: Jae Yi is an 82-year-old disciplined visionary whose love of abstract art, meticulous gardening, and lifelong learning fuels a competitive, yet reflective, pursuit of creative and intellectual excellence.
background:
  cultural: Jae was born in Seoul, South Korea, in 1943 and lived through the post‑war reconstruction era before moving to the United States with his family in the early 1960s, eventually settling in Southern
    California. His upbringing was shaped by Confucian values that emphasize education, respect for elders, and communal harmony, as well as Buddhist and shamanistic cultural practices that inform his appreciation
    for balance and spirituality. He retains fluency in Korean and regularly observes traditional holidays such as Chuseok and Seollal, practices Korean tea ceremonies, and incorporates East Asian aesthetic
    principles—such as negative space, natural materials, and asymmetrical balance—into his artwork and garden designs. Within the Korean‑American community in Palm Springs, Jae participates in cultural
    festivals, serves on the advisory board of the Korean Cultural Center, and leads workshops that blend Korean artistic techniques with contemporary Western art forms, embodying a synthesis of his heritage
    and the creative environment of his adopted home.
