  career_goals: Jae wishes to consolidate his lifelong achievements by publishing a reflective memoir that intertwines his experiences in architecture, art, and Korean heritage, and by curating a solo exhibition
    of his recent mixed‑media works at a Palm Springs cultural center. He remains committed to imparting his knowledge through mentorship programs for emerging artists and minority students, aspiring to
    establish a modest scholarship fund. Although retired, he seeks to stay intellectually sharp by learning emerging digital tools—such as AI‑driven art generators and VR exhibition design—so he can experiment
    with novel forms of expression. Maintaining his physical health to continue woodworking and garden projects is also a priority, as is preserving his family’s oral histories for future generations.
