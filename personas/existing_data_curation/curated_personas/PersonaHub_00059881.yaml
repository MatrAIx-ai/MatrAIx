persona_description: A U.S. researcher in the field of microbiology and virology, particularly interested in the effects of male circumcision on the penis microbiome and its potential role in reducing HIV
  transmission. Dr. Lance Price is known for his work on the TGen Center for Microbiomics and Human Health, where he conducts research on the role of bacteria in human health. He is a senior author of the
  study published in mBio and has previously conducted research on the protective effects of male circumcision on HIV transmission.
