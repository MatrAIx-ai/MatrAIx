personas:
  professional: Kevin Hudson, a 24‑year‑old event‑savvy aspiring community arts program coordinator, leverages their graphic‑design chops, basic data‑analysis skills, and polished public‑speaking to orchestrate
    vibrant neighborhood workshops while keeping budgets tight and volunteers motivated.
  sports: Kevin Hudson dominates the local YMCA courts for spontaneous Saturday night pick‑up basketball, roots for the Philadelphia 76ers, and intermittently jogs the Lackawanna Trail to balance their
    high‑energy social life with cardio.
  arts: Kevin Hudson devotes evenings to street photography in downtown Scranton, paints abstract canvases inspired by Basquiat and Maya Angelou’s spoken‑word rhythm, and frequents live performances by
    jazz saxophonist Kamasi Washington and hip‑hop collective Run the Jewels.
  travel: Kevin Hudson plans low‑budget weekend escapes with meticulous itineraries, having already explored the art districts of New Orleans and the jazz clubs of Chicago, while day‑dreaming about a future
    cultural immersion trip to Barcelona’s street festivals.
  culinary: Kevin Hudson loves melding flavors—experimenting with kimchi‑taco mashups, miso‑glazed pork belly, and pepperoni‑roll‑inspired gnocchi—while sourcing fresh produce from Scranton’s farmer’s market
    and mastering a decent sear on a cast‑iron skillet.
  core: Kevin Hudson is a methodical art‑enthusiast who balances relentless community‑building with a habit of over‑booking their calendar and an occasional coffee‑induced insomnia.
background:
  cultural: Kevin’s cultural background is rooted in his African‑American heritage and shaped by growing up in Scranton, a city with a strong working‑class identity and a modest but vibrant Black community.
    He was raised in a multigenerational household where Sunday church services, gospel music, and family storytelling were central. Community celebrations such as Juneteenth and local Black History Month
    events have reinforced his connection to the broader Black cultural narrative. Living in Northeastern Pennsylvania exposed him to a mix of ethnic groups and traditions, fostering his openness to diverse
    artistic expressions. His marriage to his high‑school sweetheart provides a supportive family framework that values mutual growth, cultural pride, and active community involvement.
attributes:
  skills: '[''Event Coordination'', ''Graphic Design'', ''Public Speaking'', ''Community Outreach'', ''Social Media Management'', ''Basic Data Analysis'', ''Volunteer Management'', ''Time Management'']'
  hobbies: '[''Visiting Art Galleries'', ''Street Photography'', ''Painting'', ''Playing Basketball'', ''Cooking Fusion Meals'', ''Attending Live Music Shows'', ''Traveling'', ''Reading Contemporary Fiction'',
    ''Participating in Community Book Clubs'', ''Hosting Game Nights'']'
  career_goals: Kevin aims to complete his undergraduate degree in arts administration or communications, secure a full‑time role as a community arts program coordinator with a nonprofit or municipal cultural
    agency in Scranton, and later launch his own community‑driven art space that showcases emerging Black artists and fosters creative collaboration. He also hopes to develop leadership skills that will
    allow him to mentor youth and contribute to a stable household for his family.
