  hobbies: '[''Visiting art galleries and street murals'', ''Photography (urban and nature)'', ''Playing acoustic guitar'', ''Reading science-fiction and philosophy'', ''Creative writing (short stories)'',
    ''Experimenting with cooking and new cuisines'', ''Kayaking and paddle‑boarding'', ''Hiking nature trails and beach walks'', ''Attending live music performances'', ''Participating in board-game nights
    with friends'']'
  career_goals: Over the next five years, Kaiser aims to progress from his current supervisory role to a regional sales manager position, overseeing multiple branches in Florida. He plans to complete an
    associate degree in business administration and later pursue a part‑time MBA to deepen his strategic expertise. He is also interested in earning a Certified Professional Sales Leader (CPSL) credential.
    In the longer term, he envisions launching his own boutique distribution company that emphasizes sustainable products and supports local artists through corporate social responsibility initiatives.
    Throughout his career, he wants to maintain a flexible schedule that allows him to pursue his artistic interests.
