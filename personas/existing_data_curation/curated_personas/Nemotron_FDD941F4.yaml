    quiet, low‑distraction work environments'']'
  hobbies: '[''Reading nonfiction'', ''Journaling'', ''Solo hiking'', ''Beach photography'', ''Balcony herb gardening'', ''Cooking experimental recipes'', ''Yoga'', ''Puzzle solving (crosswords, sudoku)'',
    ''Podcast listening'', ''Volunteer work at local library'']'
  career_goals: Irene aims to advance from first‑line supervision to a senior office manager or operations coordinator role within the next five years. She plans to complete a bachelor's degree in Business
    Administration, earn the Certified Administrative Professional (CAP) credential, and pursue project‑management training such as PMP certification. Her long‑term ambition is to lead a mid‑size administrative
    team that implements lean office practices and integrates automation tools, all while maintaining a balanced, low‑stress work environment that allows her personal time for solitary pursuits. She also
    envisions mentoring new staff members, helping them develop the same blend of practical competence and curiosity that defines her own career.
