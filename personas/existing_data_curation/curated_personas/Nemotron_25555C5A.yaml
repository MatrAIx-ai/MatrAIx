  career_goals: Inspired by his love of new ideas and the sea, Johnny dreams of becoming an astronaut who explores distant worlds, a marine biologist who discovers ocean mysteries, and an illustrator who
    brings his vivid imagination to life in books and comics. He aspires to solve problems with creativity and hopes that one day he can teach others about art and science, balancing his desire to help
    others with his own curiosity and ambition.
