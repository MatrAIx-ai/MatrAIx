personas:
  professional: Johnny Early, a six‑year‑old budding architect, meticulously designs LEGO skyscrapers and drafts comic‑style blueprints with crayons, channeling their organized, methodical nature and curiosity
    into playful yet purposeful creations.
  sports: Johnny Early, a member of the Cape Coral Junior Swim Team and a participant in the local Little League Tigers, delights in structured pool drills and weekend beach sprints, while balancing solo
    sandcastle building with team practices.
  arts: Johnny Early, an enthusiastic comic‑style storyteller, draws inspiration from Dr. Seuss, Pixar’s Toy Story, and Mo Willems, spending hours coloring vivid panels that reflect their open‑minded curiosity
    and occasional worry about creative perfection.
  travel: Johnny Early loves collecting seashells on Cape Coral’s Gulf Coast beaches, dreams of future trips to Disney World in Orlando and the Grand Canyon, and prefers trips laid out with color‑coded
    itineraries and built‑in play breaks to ease their anxiety.
  culinary: Johnny Early favors kid‑friendly comfort foods like macaroni and cheese, chicken nuggets, and strawberry‑banana smoothies, enjoys helping whisk pancake batter, yet consistently refuses broccoli
    and trades a bite of peas for extra candy stickers.
  core: Johnny Early is a curious, organized six‑year‑old who blends art and LEGO engineering, guards a carefully saved allowance, manages mild allergies with diligence, and balances energetic play with
    occasional worry‑induced meltdowns.
background:
  cultural: Johnny is raised in a predominantly white, middle‑class family in Cape Coral, Florida, a coastal community known for its relaxed Gulf‑Coast lifestyle. His family values education, creativity,
    and outdoor recreation, often taking weekend trips to the beach and local parks. He participates in community activities such as a neighborhood kids’ club and a Sunday school program, which reinforce
    typical American cultural norms of independence, friendliness, and an appreciation for nature. The diverse tourist population and proximity to marine environments expose him to a variety of perspectives,
    subtly shaping his openness to new ideas and his interest in marine life.
