persona_description: A historian who specializes in the study of the War of 1812, focusing on the impact of the treaty of Ghent and the role of Native American leaders such as Tecumseh in the conflict.
  The historian is particularly interested in the perspectives of Native American leaders and their strategies for protecting their lands from encroachment by settlers. The historian is also knowledgeable
  about the Treaty of Ghent and its effects on the balance of power between the United States and Britain.
