personas:
  professional: Bernardo Uranga, a veteran ATM and office equipment technician, leverages three decades of hands‑on expertise to diagnose and repair complex hardware while developing a structured apprenticeship
    program for junior technicians, reflecting his systematic mindset, sociable nature, and preference for predictable, cooperative work environments.
  sports: Bernardo Uranga, an ardent Atlanta Braves supporter, attends games at Truist Park with family, follows the team's statistics, and participates in the Roswell Seniors Stroll walking club, while
    occasionally joining a local pickleball league for light competition.
  arts: Bernardo Uranga, a devoted member of the community church choir and a regular participant in salsa and cumbia dance classes, enjoys listening to classic artists like Celia Cruz and contemporary
    performers such as Bad Bunny, which fuels his energetic social life.
  travel: Bernardo Uranga, who favors well‑planned itineraries, has explored historic Savannah, spent relaxing days on Hilton Head Island, and dreams of a Caribbean cruise that balances adventure with the
    comfort of organized group tours.
  culinary: Bernardo Uranga, an enthusiastic home cook, prepares hearty sancocho, aromatic arroz con pollo, and crispy patacones each weekend, favoring ingredients like plantains, yuca, cilantro, and achiote,
    and delights in sharing these meals with his grandchildren during Sunday gatherings.
  core: Bernardo Uranga blends disciplined technical mastery with a lively social spirit, mentoring future technicians, dancing salsa, cooking traditional dishes, and cheering the Braves, all while staying
    grounded by routine and a gentle sense of humor.
background:
  cultural: Bernardo was born and raised in Panama, where family gatherings, music, and food played central roles in daily life. He grew up bilingual, speaking Spanish at home and learning English at school,
    which later facilitated his seamless integration into the United States after relocating to Georgia in his early forties. He maintains strong ties to Panamanian cultural traditions, celebrating holidays
    such as Día de la Independencia (November 3) and Día de la Virgen de la Chorrera with community events and traditional meals. His Catholic upbringing influences his participation in the local church,
    where he helps organize cultural festivals that showcase Panamanian music and dance. While fully embracing the Southern hospitality of Roswell, Bernardo blends his heritage with his adopted community,
    creating a hybrid identity that values both his roots and his American experiences.
attributes:
  skills: '[''ATM and POS hardware repair'', ''Office equipment troubleshooting'', ''Electronic diagnostics'', ''Preventive maintenance planning'', ''Firmware and software updates'', ''Compliance with banking
