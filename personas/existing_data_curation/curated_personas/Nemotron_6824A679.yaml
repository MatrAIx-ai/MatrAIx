  hobbies: '[''Salsa and cumbia dancing'', ''Walking club in Roswell parks'', ''Atlanta Braves baseball fan'', ''Cooking Panamanian cuisine'', ''Church choir volunteering'', ''Mentoring community members
    in basic tech skills'']'
  career_goals: Approaching retirement, Bernardo aims to transition from full‑time field service to a mentorship role, offering part‑time consulting for small banks and local businesses in the Roswell area.
    He wishes to develop a structured apprenticeship program that passes his systematic repair methodology to the next generation of technicians. At the same time, he hopes to volunteer his expertise with
    community centers and senior‑citizen programs, teaching basic computer and equipment maintenance to empower others. Long‑term, he envisions establishing a small, family‑run service shop that blends
    his technical knowledge with his desire for harmonious, cooperative work environments.
