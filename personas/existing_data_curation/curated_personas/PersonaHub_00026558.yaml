persona_description: A historian who specializes in the study of Scandinavian heraldry and the origins of the term "SCANDINAVIAN-TYPE CROSS". He is particularly interested in the historical context, terminology,
  and significance of this term within the broader context of heraldry and the Scandinavian region. His expertise extends to the use of this term in heraldic flags, shields, and other heraldic devices.
  He is knowledgeable about the various examples of flags and shields that use this term and has a deep understanding of the historical and cultural significance of this term in heraldry.
