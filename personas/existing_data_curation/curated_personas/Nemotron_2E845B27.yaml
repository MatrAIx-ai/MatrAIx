personas:
  professional: Ami West, a 52‑year‑old cleaning veteran with over thirty years of residential and small‑business housekeeping experience, leverages her deep‑cleaning expertise, meticulous inventory management,
    and disciplined time‑scheduling to pursue a supervisory role and eventual launch of a boutique cleaning service for high‑end clients in Richland Center.
  sports: Ami West enjoys low‑impact fitness, regularly walking the local Richland Center trail network and bird‑watching with the Wisconsin Audubon Society club, while cheering on the Green Bay Packers
    and Milwaukee Bucks from home and occasionally attending the local high school’s cross‑country meets.
  arts: Ami West immerses herself in the arts by reading mystery novels by Agatha Christie, discussing historical biographies in a four‑woman book club, and listening to classic folk and country icons such
    as Johnny Cash, Dolly Parton, and Bob Dylan, while occasionally attending a community theater production of 'Our Town' at the Richland Center Opera House.
  travel: Ami West favors carefully planned, low‑stress getaways, opting for weekend road trips to the Door County lighthouses or a short cruise on the Great Lakes, while dreaming of a guided historical
    tour of Colonial Williamsburg, but financial constraints and her grandchildren’s school schedule keep most trips domestic and brief.
  culinary: Ami West enjoys home‑grown, farm‑to‑table cooking, often preparing lentil soup, roasted root vegetables with rosemary, and herb‑infused chicken stew, a skill level she rates as intermediate,
    and she never says no to fresh tomatoes from her garden or a slice of homemade apple pie made with Granny Smith apples.
  core: Ami West is a detail‑oriented, structure‑loving cleaning veteran who balances meticulous work with solitary hobbies, a cautious financial outlook, and a quietly competitive spirit that fuels her
    ambition to launch a boutique cleaning service.
background:
  cultural: Ami grew up in a Midwestern, predominantly white community where hard work, modesty, and practicality are core values. The regional culture of self‑reliance and a strong work ethic shaped her
    approach to housekeeping and budgeting. She attends a local Lutheran church’s outreach programs and values the close‑knit social fabric of Richland Center, where neighborly support and orderly living
    are emphasized. Her upbringing stressed cleanliness, punctuality, and respect for personal space, which continue to influence both her professional standards and personal routines.
attributes:
  skills: '["Deep cleaning", "Laundry and fabric care", "Surface sanitation", "Inventory management", "Time-efficient scheduling", "Basic home maintenance", "Safe chemical handling", "Customer service",
