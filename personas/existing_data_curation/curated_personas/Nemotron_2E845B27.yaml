  hobbies: '["Vegetable gardening", "Crossword puzzles", "Knitting", "Reading mystery novels", "Historical biographies", "Listening to folk and country music", "Small-group book club", "Trail walking",
    "Bird watching", "Journaling"]'
  career_goals: Ami aims to transition from an employee to an independent contractor by obtaining a professional cleaning certification and building a small, trusted team that serves high‑end clients in
    the Richland Center area. She seeks a supervisory role within her current agency to increase her hourly rate, gain leadership experience, and eventually launch her own boutique cleaning service that
    emphasizes meticulous standards and trustworthy staff. Additionally, she wants to save enough to fund her children’s college tuition and secure a comfortable retirement.
