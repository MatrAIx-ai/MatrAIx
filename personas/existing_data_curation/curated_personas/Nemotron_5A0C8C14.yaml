  career_goals: Gavin aims to secure a full‑time software engineering or data‑science role at a technology company that values innovation and independent problem solving. He is especially interested in
    product teams where he can develop end‑to‑end solutions – from algorithm design to user‑facing interfaces – that have immediate practical impact. He also plans to launch a side project that couples
    his engineering skills with his personal experience of anxiety, such as a mobile app that uses passive data collection and simple machine‑learning models to provide real‑time stress‑management recommendations.
    In the medium term, he hopes to lead a small interdisciplinary team, contribute to open‑source projects, and earn technical patents. He views competitive hackathons and coding contests as opportunities
    to benchmark his abilities and gain recognition, and he intends to pursue a professional certification (e.g., AWS Solutions Architect) to complement his STEM degree.
