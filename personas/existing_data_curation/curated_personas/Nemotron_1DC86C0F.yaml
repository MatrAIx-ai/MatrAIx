personas:
  professional: Orlando Quinones, a budding young programmer and robotics enthusiast, blends a love of sci‑fi narratives with logic by crafting Python and Scratch games and assembling model rockets, all
    while they navigate school projects with a laid‑back, sometimes chaotic, approach that mirrors their curiosity‑driven yet practical mindset.
  sports: Orlando Quinones plays forward for the local youth soccer club Falcon FC, cycles the nearby woods on weekends, and avidly follows the Los Angeles Lakers and the New York Yankees on television,
    preferring solitary jogs after school while occasionally joining team practices that feel more obligatory than exciting.
  arts: Orlando Quinones creates comic strips inspired by Alex Ross and the cinematic imagination of Guillermo del Toro, while they unwind listening to Kendrick Lamar’s hip‑hop verses, Miles Davis’s trumpet,
    and Aretha Franklin’s soul, often sketching characters on a digital tablet that blend futuristic tech with fantasy realms.
  travel: Orlando Quinones has trekked through the redwood forests of California, explored the Kennedy Space Center in Florida, and day‑dreams of visiting Japan’s Mount Fuji and the historic streets of
    Kyoto, favoring spontaneous road trips with a trusted family member over meticulously planned itineraries, yet their worry about missing schoolwork sometimes curtails longer journeys.
  culinary: Orlando Quinones favors pepperoni pizza with extra mozzarella, homemade ramen with pork broth, avocado toast sprinkled with chili flakes, and experimental snacks that mix peanut butter, banana
    slices, and chocolate chips into oatmeal, often cooking barefoot on the kitchen counter and forgetting to clean up until bedtime.
  core: Orlando Quinones is a solitary, curiosity‑driven 12‑year‑old who blends relentless tinkering with occasional worry, turning rocket models into stories while sometimes neglecting chores and overthinking
    deadlines.
background:
  cultural: Orlando is an African‑American boy raised in Clemmons, a suburban community in Forsyth County, North Carolina. His family blends Southern traditions with the rich cultural heritage of Black
    America. He celebrates holidays such as Juneteenth and participates in church youth events that emphasize community, music, and storytelling. The local library and school STEM programs provide him with
    access to resources that nurture his curiosity. While his neighborhood is predominantly white, his family instills pride in Black history, resilience, and the importance of education. He enjoys the
    rhythms of hip‑hop and soul music passed down from older relatives, and he loves cooking with his family during weekend gatherings, where classic Southern dishes are prepared alongside newer culinary
    experiments. This multicultural environment shapes his worldview, fostering both a sense of belonging and an awareness of the broader social landscape.
