  hobbies: '[''Reading science fiction and fantasy'', ''Single‑player strategy and puzzle video games'', ''Building model kits (rockets, aircraft)'', ''Nature walks and birdwatching'', ''Digital drawing
    and comic creation'', ''Listening to hip‑hop and jazz'', ''Coding small games in Scratch/Python'', ''Robotics kits (Lego Mindstorms, Arduino)'']'
  career_goals: Orlando dreams of turning his curiosity into a future career that lets him work independently while making a positive impact. He aspires to become a software engineer or robotics developer
    who designs educational games and tools that help other kids explore science and technology. He values a low‑stress, flexible work environment, preferably with remote or project‑based opportunities,
    and hopes his work will blend creativity with practical problem solving. He also entertains the idea of creating online tutorials or a youth‑focused tech channel to share his knowledge.
