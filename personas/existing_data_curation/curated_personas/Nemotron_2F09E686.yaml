personas:
  professional: Thomas Burban, a veteran wholesale and manufacturing sales specialist with decades of relationship‑building, contract negotiating, and market analysis expertise, leverages his curiosity
    and organized flexibility to translate technical specifications into clear value propositions while leading cross‑functional teams toward eco‑friendly solutions.
  sports: Thomas Burban, an avid beach‑goer who rides early‑morning swells at Huntington Beach, competes in a local beach‑volleyball league, hikes the Laguna Coast wilderness trails on weekends, and roots
    for the Los Angeles Lakers, Dodgers, and LA Galaxy, while maintaining a disciplined but flexible fitness routine that blends cardio surf sessions with strength training.
  arts: Thomas Burban, a keen visual‑art enthusiast, spends Friday evenings at the Getty and the Orange County Museum of Art, captures coastal sunsets and downtown LA street scenes through his DSLR, follows
    the works of Ansel Adams and Banksy, and volunteers leading community art workshops that nurture creative expression among local youth.
  travel: Thomas Burban, a family‑focused explorer, meticulously plans road trips along California’s scenic coastline—like Monterey Bay and Big Sur—while also savoring spontaneous weekend getaways to Oaxaca
    for its vibrant cuisine, balancing adventure with the constraints of school schedules and a modest travel budget.
  culinary: Thomas Burban, an experimental home chef, loves crafting grilled fish tacos with charred ahi, avocado crema, and pickled radish, while also mastering rustic Mediterranean dishes like eggplant
    parmesan, yet they sometimes over‑season sauces and rely heavily on pre‑made spice mixes for convenience.
  core: Thomas Burban blends surfer energy, art‑savvy curiosity, and strategic sales acumen into a life where sunrise surf sessions, gallery visits, and eco‑focused business ambitions coexist, punctuated
    by occasional over‑spending on gear and a tendency to neglect dental appointments.
background:
  cultural: Thomas grew up in a middle‑class, white family in suburban Orange County, where the laid‑back Southern‑California beach culture blended with the region’s entrepreneurial spirit. Exposed to a
    mosaic of cultural influences—from the vibrant Latino neighborhoods to the artistic pulse of nearby Los Angeles—he developed an appreciation for multicultural art, food, and ideas. His upbringing emphasized
    hard work, community harmony, and outdoor recreation, shaping his friendly, cooperative demeanor and his love for the ocean, surf, and the diverse cultural fabric that characterizes Huntington Beach.
attributes:
  skills: '[''B2B sales'', ''Negotiation'', ''Customer relationship management (CRM) using Salesforce and HubSpot'', ''Market analysis and strategic territory planning'', ''Product knowledge in manufacturing'',
