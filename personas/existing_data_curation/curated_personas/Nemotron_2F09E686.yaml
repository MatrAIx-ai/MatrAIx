  hobbies: '[''Surfing'', ''Beach volleyball'', ''Photography of coastal and urban scenes'', ''Visiting art galleries and museums'', ''Hiking local wilderness trails'', ''Cooking and experimenting with
    new recipes'', ''Live music and theater attendance'', ''Traveling with family'', ''Exploring diverse cuisines'', ''Volunteering for community art workshops'']'
  career_goals: Thomas aspires to transition into senior leadership within the next five years, targeting a regional sales director or VP of sales role where he can shape multi‑product sales strategies,
    mentor emerging talent, and drive market expansion for sustainable manufacturing solutions. He plans to deepen his expertise through a business administration degree or a professional sales certification
    and ultimately envisions launching his own consultancy to help mid‑size manufacturers adopt innovative sales and distribution models.
