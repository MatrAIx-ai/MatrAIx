  hobbies: '[''Landscape painting'', ''Visiting art museums and galleries'', ''Historical site exploration'', ''Gardening'', ''Reading (fiction, art history, biographies)'', ''Yoga'', ''Folk music festivals'',
    ''Local theater attendance'', ''Weekend trips to Philadelphia'']'
  career_goals: Connie aspires to re‑enter the workforce in a part‑time, flexible role that aligns with her creative passions. She plans to complete her associate’s degree in liberal arts through online
    courses within the next two years. She hopes to launch an online boutique selling her handcrafted décor and artwork, and to teach introductory art workshops at the local community center. Additionally,
    she wants to expand her volunteer work by mentoring at‑risk youth in art programs and to serve on the board of the town’s historical society.
