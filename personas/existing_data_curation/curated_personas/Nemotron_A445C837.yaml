personas:
  professional: Yen Sketoe, an 82‑year‑old retired teacher with four decades of K‑12 and adult learning experience, leverages their analytical mind and boundless imagination to design avant‑garde curricula
    that blend speculative fiction, abstract art, and philosophy, while their competitive streak drives them to mentor younger teachers and win local education‑innovation contests.
  sports: Yen Sketoe, a devoted senior bridge club champion who treats each contract as a tactical battle, also enjoys brisk morning walks in the Haverhill River Trail, follows the Boston Red Sox with a
    competitive fervor, and occasionally participates in a local senior yoga class, though they sometimes skip sessions when arthritis flares.
  arts: Yen Sketoe, an abstract painter inspired by Jackson Pollock and Mark Rothko, devotes afternoons to creating textured canvases while curating a personal anthology of speculative fiction by Ted Chiang
    and poetry by Ocean Vuong, frequently attending performances of August Wilson's plays at the Haverhill Community Theater, and their critical eye leads them to dissect each exhibition at the Museum of
    Fine Arts Boston with a notebook full of incisive observations.
  travel: Yen Sketoe, an avid learner who plans trips around art and history, has explored the Met in New York, the Smithsonian in Washington, D.C., and dreamily hopes to embark on a senior‑discounted train
    journey to Florence to study Renaissance frescoes, while their budget constraints keep most vacations to day trips on the New England coast, and they relish meticulously mapping each itinerary before
    departure.
  culinary: Yen Sketoe, a competent home cook who enjoys experimenting with lavender‑infused shortbread, miso‑glazed salmon, and beet‑root salad with goat cheese, often pairs meals with Earl Grey tea, and
    while they skillfully follow recipes from Julia Child, they occasionally forget to preheat the oven, resulting in a charred crust, but they love dining at the local museum café for its seasonal soup
    of the day.
  core: Yen Sketoe, an 82‑year‑old retired educator whose imagination fuels a relentless pursuit of art, philosophy, and community legacy, balances disciplined budgeting with splurges on creative supplies,
    navigates health with pragmatic skepticism, and channels competitive spirit into bridge, walking, and mentoring, all while harboring a habit of misplacing paintbrushes and a love for lavender tea.
background:
  cultural: Yen was born and raised in a middle-class New England family of European ancestry. Growing up in Massachusetts, she absorbed the region’s strong emphasis on education, self-reliance, and community
    involvement. Her upbringing emphasized critical inquiry and a love of the arts, shaping her lifelong pursuit of knowledge and creative expression. She maintains ties to local cultural institutions,
    such as the Haverhill Historical Society and the regional public library, and she values the New England tradition of civic engagement and independent thought.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Educational Research'', ''Creative Writing'', ''Abstract Art Appreciation'', ''Critical Thinking'', ''Mentorship'', ''Public Speaking'',
