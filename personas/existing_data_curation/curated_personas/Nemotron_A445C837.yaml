  hobbies: '[''Abstract Painting'', ''Museum Visits'', ''Speculative Fiction Reading'', ''Poetry Writing'', ''Theater Attendance'', ''Bridge Club'', ''Genealogy Research'', ''Local History Exploration'',
    ''Online Courses in Philosophy'', ''Photography'']'
  career_goals: Although retired, Yen seeks to leave a lasting intellectual and artistic legacy. She aims to write and publish a memoir that weaves her educational journey with reflections on art and philosophy.
    She plans to establish a community art-and-literature program for seniors in Haverhill, offering workshops and a quarterly competition that encourages creative expression. Additionally, she hopes to
    fund a small scholarship for local high-school students pursuing studies in the humanities or visual arts.
