  career_goals: Owen aspires to transition from subcontracted work to running his own boutique workshop where he can focus on artistically driven furniture and sculptural wood pieces that merge utility
    with visual storytelling. He aims to build a modest client base of design-savvy homeowners and local galleries, and to offer evening workshops that teach both traditional carpentry and creative design
    thinking. Long-term, he hopes to document his design process in a self-published coffee-table book and to secure a semi-retired lifestyle that balances steady income with the freedom to pursue personal
    art projects.
