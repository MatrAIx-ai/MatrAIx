persona_description: 'Martin K. A. Morgan is an author/historian who specializes in American and military history. He has a background in history, a master''s degree in history, and is currently a history
  doctoral candidate at the University of Southern Mississippi. He is the author of Down To Earth: The 507th Parachute Infantry Regiment in Normandy (Schiffer, 2004) and The Americans on D--‐Day: A Photographic
  History of the Normandy Invasion (Zenith Press, 2014), and he contributes frequently to World War II Quarterly and The American Rifleman. He has also contributed to other publications such as Aviation
  History, World War II, World War II History, Armchair General, the Garand Collector’s Association Journal, 39/45 (France) and After the Battle (England). He has appeared regularly on television programs
  relating to historical subjects on Discovery, National Geographic, History, H2, The Weather Channel, Syfy, the Outdoor Channel, and The Military Channel, and has a background as a park ranger and a museum
  professional. Since 2002, he has been leading battlefield tours around the world, especially in Europe.'
