  career_goals: Although retired, Randy aims to stay mentally and physically active by mentoring younger community members, writing a memoir that captures his life in Montgomery, and deepening his knowledge
    of digital photography. He hopes to travel occasionally to visit his children and grandchildren, and to participate in the local historical society to preserve regional stories. Maintaining good health,
    fostering strong family bonds, and contributing his expertise to senior‑center workshops remain his primary ambitions.
