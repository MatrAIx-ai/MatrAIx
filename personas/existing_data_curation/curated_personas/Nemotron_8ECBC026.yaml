personas:
  professional: Randy Wilkinson, a retired maintenance supervisor turned community mentor, leverages decades of mechanical repair, carpentry, and project coordination skills to lead church fundraisers,
    teach seniors how to troubleshoot tech, and orchestrate local history talks, all while they maintain a competitive spirit that drives them to set high standards for every workshop they run.
  sports: Randy Wilkinson enjoys weekend bass fishing on the Alabama River, follows the Alabama Crimson Tide football season with fervor, participates in the Montgomery Senior Bowls Club for lawn bowling,
    and they cheer on the Atlanta Falcons during NFL playoffs, blending competitive game nights with low‑impact exercise.
  arts: Randy Wilkinson immerses themselves in classic rock legends like The Rolling Stones and Lynyrd Skynyrd, country icons such as George Strait and Dolly Parton, while crafting detailed model train
    layouts inspired by the artwork of John Bradley, and they regularly attend community theater productions at the Montgomery Playhouse and browse exhibits at the Montgomery Museum of Fine Arts.
  travel: Randy Wilkinson favors road trips with a well‑planned itinerary, having recently visited Savannah, New Orleans, and the Great Smoky Mountains, while dreaming of a family reunion cruise in the
    Gulf of Mexico and a pilgrimage to Washington, D.C.’s national museums, balancing their love for familiar Southern scenery with occasional sparks of wanderlust.
  culinary: Randy Wilkinson delights in slow‑smoked pork ribs glazed with a sweet brown‑sugar and mustard rub, blackened catfish seasoned with paprika and cumin, collard greens simmered with smoked ham
    hocks, and they relish experimenting with hickory wood chips on their backyard grill, showcasing a solid intermediate cooking skill honed through countless church potlucks.
  core: Randy Wilkinson is a gregarious 78‑year‑old who blends Southern hospitality with a tech‑savvy curiosity, dominates bridge tables, fixes anything broken, and records life’s moments on camera, all
    while managing a competitive edge and an occasional forgetful streak.
background:
  cultural: Randy grew up in Montgomery, Alabama, in a close‑knit white Southern family that emphasized hospitality, church participation, and respect for tradition. He experienced the social changes of
    the civil‑rights era, which shaped a pragmatic yet occasionally skeptical view of others' motives. His upbringing instilled a love for Southern cuisine, seasonal community gatherings, and a strong sense
    of local pride. While rooted in these cultural traditions, Randy remains curious about new ideas and technologies, balancing his heritage with a forward‑looking outlook.
