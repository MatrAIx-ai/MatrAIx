    with peers'']'
  career_goals: Although still very young, Fulvio excitedly talks about future jobs that let him help living things and explore the world. He says he wants to be a veterinarian because he loves animals,
    an astronaut because he is fascinated by space, and a teacher to share his love of art with other kids. These ambitions reflect his curiosity, caring nature, and desire to make a positive impact.
