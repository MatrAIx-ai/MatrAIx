  hobbies: '[''Playing soccer in a local league'', ''Acoustic guitar and Mexican folk music'', ''DIY small‑scale woodworking projects'', ''Cooking Mexican‑American fusion dishes'', ''Hiking in the Santa
    Monica Mountains'', ''Volunteering to teach carpentry at a community center'']'
  career_goals: Geidy aims to transition from a skilled tradesperson to a small business owner within the next five years. He plans to earn a high school equivalency diploma and pursue a carpenter apprenticeship
    certification through a local union to solidify his credentials. His long‑term ambition is to open a boutique carpentry shop that offers custom, eco‑friendly furniture and home renovations, while also
    mentoring younger workers from his community. He is motivated by the desire for financial stability, professional recognition, and the ability to create a supportive workplace environment.
