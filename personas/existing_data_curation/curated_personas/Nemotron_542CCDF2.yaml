personas:
  professional: Geidy Alvarez, a seasoned carpenter with OSHA safety certification and a talent for reading blueprints, leverages methodical precision and bilingual communication to keep projects on schedule,
    while channeling an outgoing, cooperative spirit into leading diverse crews toward timely, budget‑friendly completions.
  sports: Geidy Alvarez anchors a local weekend soccer league as a midfield defender for the Santa Monica Strikers, cheers the Los Angeles Galaxy and Dodgers from the stands, and incorporates early morning
    hikes in the Santa Monica Mountains to balance cardio fitness with stress relief.
  arts: Geidy Alvarez spends evenings strumming an acoustic guitar and singing traditional folk ballads reminiscent of Pete Seeger and Joan Baez, curates a modest collection of handcrafted furniture inspired
    by mid‑century modernists, and frequents the Getty Center to draw creative fuel from contemporary installations.
  travel: Geidy Alvarez plans low‑cost road trips to nearby coastal towns like Santa Barbara, dreams of exploring the vineyards of Napa Valley, and hopes to experience the historic streets of Oaxaca and
    the lush rainforests of Costa Rica, preferring itineraries that allow weekend getaways without compromising the business start‑up fund.
  culinary: Geidy Alvarez blends family‑style braised pork tacos with cilantro‑lime slaw and charred corn, experiments with chipotle‑marinated salmon alongside avocado‑tahini sauce, and enjoys perfecting
    homemade salsa verde using tomatillos, jalapeños, and fresh oregano, while teaching teen volunteers simple knife skills.
  core: Geidy Alvarez is a detail‑driven, bilingual carpenter who balances methodical project management with a lively love of soccer, acoustic folk music, and sustainable woodworking, all while wrestling
    with chronic stress and a cautious financial outlook.
background:
  cultural: Geidy grew up in a Mexican‑American household in Los Angeles, where Spanish was spoken at home and Mexican traditions were celebrated alongside the broader Californian culture. He identifies
    strongly with the values of hard work, family solidarity, and community service that are central to Mexican heritage. Although he has never married, he maintains close ties with his extended family
    and participates in cultural events such as Día de los Muertos and Mexican Independence Day festivals. His bicultural background influences his craftsmanship, often incorporating decorative motifs inspired
    by Mexican folk art into his woodworking.
attributes:
  skills: '[''Framing and finish carpentry'', ''Blueprint reading and interpretation'', ''Custom furniture design and construction'', ''Construction safety compliance (OSHA certified)'', ''Project scheduling
