  career_goals: Oscar dreams of becoming a firefighter or a soccer player, imagining himself rescuing people and scoring the winning goal. He also enjoys role‑playing as a teacher because he likes guiding
    friends through games and explaining rules. His competitive nature pushes him to picture himself as a team captain, while his love of structure leads him to think about future jobs that involve clear
    routines, such as a coach or a mechanic. These ambitions are shaped by his energetic, social personality and his desire to be recognized for achievement.
