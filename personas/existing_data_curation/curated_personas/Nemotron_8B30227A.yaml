personas:
  professional: A budding builder named Oscar Gilbert loves arranging colorful block towers with precise patterns, yet when a tower wobbles they quickly improvise a new design, showcasing their love for
    structure, practical problem‑solving, and flexible creativity.
  sports: An energetic little athlete named Oscar Gilbert darts around the Little Lions Soccer Club field in Dickinson, cheering for the North Dakota State Bison in fall football and the Minnesota Vikings
    in winter, while their competitive nature drives them to practice dribbling drills after school despite occasionally forgetting to tie their cleats.
  arts: A creative fan of rhythms named Oscar Gilbert sings along to the lively tunes of Selena and the upbeat hits of Ricky Martin while enjoying animated classics like Moana, and they proudly draw bright
    sugar‑skull designs for Día de los Muertos celebrations, merging cultural music, cartoon storytelling, and a love for vivid art.
  travel: A curious explorer named Oscar Gilbert dreams of visiting the Grand Canyon on a family road trip and has already delighted in a weekend excursion to the Mall of America, preferring short, well‑planned
    journeys that balance excitement with the comfort of familiar snacks.
  culinary: A budding chef named Oscar Gilbert loves helping stir the masa for tamales and sprinkling fresh cilantro on pozole, yet they also insist on crunchy carrot sticks with ranch dip for lunch, showing
    a confident palate for traditional dishes alongside a playful preference for finger foods.
  core: A sociable, structure‑loving five‑year‑old named Oscar Gilbert blends competitive block‑building with a relaxed approach to chores, always ready to trade stickers, sing lively songs, and chase the
    next adventure.
background:
  cultural: Oscar is a Mexican‑American child raised in Dickinson, North Dakota. At home, his family speaks Spanish and celebrates Mexican traditions such as Día de los Muertos, quinceañera preparations
    for older relatives, and holiday meals featuring tamales and pozole. He attends a local preschool where he interacts with peers from diverse backgrounds, yet his family maintains cultural ties through
    weekly Spanish lessons, Mexican music, and occasional visits to a nearby Mexican community center for festivals and dance classes. This blend of Mexican heritage and Midwestern environment shapes his
    worldview, language use, and the foods and celebrations he enjoys.
