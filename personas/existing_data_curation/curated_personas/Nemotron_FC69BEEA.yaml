  career_goals: Hunter aims to move into a supervisory role within his current organization, such as shift manager or food-service manager, so he can shape the dining experience for larger groups while
    still staying close to guests. He plans to finish his college coursework in hospitality management or business administration and obtain a ServSafe Manager certification. Long-term, he dreams of merging
    his love of food and art by launching a community-focused pop-up café that features rotating local-artist exhibitions and themed menu nights. He also hopes to mentor newer staff members, using his interpersonal
    strengths to foster a supportive, low-stress workplace culture.
