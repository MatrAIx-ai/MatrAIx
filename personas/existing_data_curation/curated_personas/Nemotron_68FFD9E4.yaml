personas:
  professional: Dongjun Wu, a budding junior LEGO city designer who translates the structural curiosity of Minecraft into real‑world building concepts, leads neighborhood playgroup engineering projects
    with their talkative charm, and balances inventive brainstorming with practical step‑by‑step construction despite a relaxed, disorganized approach to planning.
  sports: Dongjun Wu, an energetic member of the Springfield Tigers U9 soccer team, spends after‑school matches chasing the ball with friends, idolizes Lionel Messi of FC Barcelona and wears a Manchester
    United scarf for fun, treats fitness as a social playground, and rarely misses practice unless performance anxiety arises.
  arts: Dongjun Wu, a K‑pop enthusiast who belts out BTS choruses at family karaoke, enjoys drawing comic strips inspired by One Piece and My Hero Academia, practices beginner piano pieces by Yiruma, and
    attends community Korean cultural festivals to watch traditional dance performances, weaving these artistic passions into school talent shows.
  travel: Dongjun Wu, who prefers spontaneous weekend adventures over meticulous planning, loves revisiting the local 4th July fireworks at the riverside, dreams of exploring Tokyo’s Akihabara for arcade
    gaming, and once visited Disneyland California with the family, balancing a love for bright attractions with occasional nervousness about unfamiliar crowds.
  culinary: Dongjun Wu, whose favorite dishes include bibimbap with extra gochujang, cheesy pepperoni pizza, and crunchy sushi rolls, enjoys making homemade LEGO‑shaped cookie cutters for snack time, can
    whip up a quick ramen broth with parental help, and often trades pocket‑money for bubble tea flavors like taro and mango.
  core: Dongjun Wu is a chatty, imagination‑driven 9‑year‑old who builds LEGO metropolises, scores goals on the soccer field, sings K‑pop at karaoke, yet wrestles with bursts of anxiety that make routine
    chores feel overwhelming.
background:
  cultural: Dongjun is a second‑generation Korean‑American growing up in the suburban community of Buffalo Grove, Illinois. At home he speaks Korean with his parents and grandparents and learns Hangul through
    after‑school cultural classes. His family celebrates Korean holidays such as Seollal (Lunar New Year) and Chuseok with traditional foods like tteokguk and songpyeon, while also participating in typical
    American celebrations like Thanksgiving and Halloween. The household emphasizes respect, harmony, and academic effort, but also encourages Dongjun’s curiosity and creativity. He enjoys sharing Korean
    snacks with friends at school and feels proud of his bilingual heritage.
