  career_goals: He dreams of becoming someone who can both entertain and help others. He imagines being a teacher who makes learning fun, a veterinarian who cares for animals, or a YouTube creator who shares
    his adventures and teaches kids how to build things. He also mentions wanting to be an astronaut or a video‑game designer because they blend curiosity with practical creation. Ultimately, he aspires
    to a role where he can be in the spotlight, connect with people, and make a positive difference.
