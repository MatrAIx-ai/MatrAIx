  hobbies: '[''Hosting dinner parties'', ''Playing bridge'', ''Attending community theater'', ''Gardening'', ''Birdwatching'', ''Walking in local parks'', ''Reading historical non-fiction'', ''Woodworking'',
    ''Listening to jazz music'', ''Mindfulness and yoga'']'
  career_goals: Although retired, Sam aims to stay mentally active and socially engaged. He plans to volunteer as a mentor for local high‑school robotics teams, give guest lectures at the nearby community
    college, and lend his engineering expertise to neighborhood sustainability projects such as solar panel installations and water‑conservation initiatives. He also hopes to author a memoir that blends
    his life stories with practical engineering insights, and to support his spouse in charitable work within their community.
