persona_description: A passionate and dedicated advocate for gun safety education, Derek LeBlanc is a man who has dedicated his life to teaching kids about the importance of being safe around firearms.
  He is the President of the nonprofit Kids S.A.F.E Foundation, which has already reached 15,000 kids in Oregon, Washington, and Northern California. LeBlanc is a firearms safety instructor and has worked
  with Senator Tim Knopp and Representative Sherrie Sprenger to draft the proposed bill SB 801, which would allow schools in Oregon to teach first-graders about gun safety. LeBlanc's mission is to educate
  kids on how to respond if they encounter a gun, and to open a conversation about the importance of gun safety. He is passionate about reaching those who need his help and is driven by his desire to make
  a difference in the lives of children.
