  career_goals: Steve aims to move into a supervisory role within the next two years, becoming a shift lead where he can mentor younger workers and drive efficiency improvements. He is interested in spearheading
    lean initiatives that reduce waste and improve packaging aesthetics, merging his curiosity for design with operational goals. Over the longer term, Steve envisions either advancing to a plant‑wide packaging
    manager position or leveraging his experience to start a small venture producing locally sourced, artistically designed food packaging for regional artisans. He also hopes to continue learning new industry
    technologies while staying engaged with his community through workshops and mentorship programs.
