  career_goals: Although retired from formal employment, Deshawne aims to channel his technical expertise into informal mentorship programs for underrepresented youth in STEM, particularly on Nantucket,
    preferring small‑group, flexible engagements over rigid curricula. He aspires to author a memoir that weaves together his engineering experiences with reflections on navigating anxiety and resilience,
    and to contribute to local environmental initiatives such as a community‑led marine monitoring project. Ultimately, he seeks to leave a lasting impact on both the scientific community and his local
    cultural landscape while cultivating personal emotional well‑being.
