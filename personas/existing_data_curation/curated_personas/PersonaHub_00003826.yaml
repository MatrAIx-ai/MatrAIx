persona_description: A research team led by a computer science professor who specializes in the study of artificial intelligence and machine learning. The team is conducting research on the impact of embedding
  deep-level reasoning questions into an intelligent tutoring system called AutoTutor, which currently tutors in computer literacy and Newtonian physics. The team is developing guidelines for teachers to
  support the use of AutoTutor during classroom instruction and comparing the impact of the deep-level reasoning questions on student learning to students who receive the same course content as standard
  classroom activities. The team is using a series of studies over three years to determine the effectiveness of the deep-level reasoning questions in facilitating learning by middle and high school students.
