personas:
  professional: Arlina Fernandez is a seasoned credit counselor and adult educator who transforms dense loan risk reports into vivid abstract paintings and interactive workshop modules, using their imaginative
    curiosity and bilingual communication to empower diverse clients while eyeing a future leadership role in community financial education.
  sports: Arlina Fernandez enjoys hiking with the Lincoln Trail Hiking Club in spring, joins the Omaha Run Club for mid‑summer 5K runs, roots for the Nebraska Cornhuskers football team on Saturdays, and
    they blend low‑impact cardio with occasional dance sessions at cultural festivals to stay energized.
  arts: Arlina Fernandez channels their vivid imagination into abstract canvases inspired by Kandinsky and Kusama, eagerly devours speculative fiction by N.K. Jemisin and Octavia Butler at book club, and
    regularly participates in community theater improv sessions that echo the improvisational flair of Robin Williams.
  travel: Arlina Fernandez favors spontaneous, low‑budget road trips that balance hiking in Yellowstone with cultural immersion in places like Antigua, Guatemala and Galway, Ireland, often sketching travel
    ideas on napkins while they juggle a busy work schedule.
  culinary: Arlina Fernandez, a confident home chef, blends traditional Guatemalan flavors such as pepian and tamales with Midwestern staples like cornmeal and cheddar, seasoning their dishes with roasted
    chiles, cilantro, and a dash of smoked paprika, while they also enjoy experimenting with farm‑to‑table salads featuring locally sourced heirloom tomatoes.
  core: Arlina Fernandez is a creatively driven, mildly disorganized community advocate whose love of abstract art and spontaneous storytelling is balanced by a chronic tendency to procrastinate on paperwork.
background:
  cultural: Arlina is the daughter of Guatemalan immigrants who settled in the Midwest, and she grew up bilingual, speaking Spanish at home and English at school. Her upbringing imbued her with a deep appreciation
    for Guatemalan traditions such as Día de los Muertos, Semana Santa, and the vibrant rhythms of marimba music, which she celebrates by attending local cultural events and teaching younger community members.
    Living in Fremont, Nebraska, she has woven Midwestern values of independence and community service into her identity, creating a hybrid cultural perspective that informs both her professional ethos
    and personal life. She remains closely connected to her extended family in Guatemala through regular video calls and annual visits, and she often incorporates Guatemalan culinary and artistic elements
    into her everyday routines.
