  career_goals: Arlina aspires to transition from front‑line counseling to a leadership role where she can shape the financial‑education strategy of a credit union or nonprofit. She aims to develop a community‑wide
    financial‑literacy program that blends traditional budgeting lessons with creative, art‑driven learning modules, targeting underserved Guatemalan‑American families and other low‑income groups in rural
    Nebraska. Over the next five years she plans to earn a master’s degree in financial counseling or social work to strengthen her expertise, and eventually become a director of community outreach or a
    chief financial‑education officer. She also dreams of launching a side consultancy that offers innovative, culturally‑sensitive financial coaching for small businesses and immigrants.
