persona_description: A musicologist and ethnomusicologist who specializes in the study of traditional musical instruments from Afghanistan and the Central Asian region. He is known for his extensive fieldwork
  in Afghanistan and his work on the cultural practices and musical traditions of the region. His research has been documented in his book "Music in the Culture of Northern Afghanistan" and his donation
  of his collection of Afghani musical instruments to The Metropolitan Museum of Art. He has also written about his experiences in Afghanistan and the challenges faced by local musicians in the country.
