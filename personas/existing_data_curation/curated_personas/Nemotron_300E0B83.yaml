  career_goals: Although retired from formal employment, Kevin aims to stay active and purposeful. He plans to expand his volunteer work at the local senior center, offering DIY workshops and language tutoring.
    He hopes to launch a modest online blog sharing family recipes and gardening tips, preserving his Ecuadorian heritage for future generations. A long‑term personal goal is to travel back to Ecuador to
    visit relatives and reconnect with his roots while ensuring his family’s financial stability.
