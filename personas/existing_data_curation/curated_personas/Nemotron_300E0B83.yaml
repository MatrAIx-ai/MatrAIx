  hobbies: '[''Vegetable Gardening'', ''Ecuadorian Cooking'', ''Woodworking'', ''Fishing'', ''Reading Historical Nonfiction'', ''Listening to Classic Rock and Latin Folk Music'', ''Church Choir Participation'',
