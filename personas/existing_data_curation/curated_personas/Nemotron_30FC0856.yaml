  hobbies: '["Watercolor painting", "Digital photography", "Genealogy research", "Reading historical nonfiction", "Heirloom gardening", "Puzzle solving (crosswords, Sudoku)", "Bridge", "Small book clubs",
    "Attending local art exhibitions", "Exploring unconventional cooking recipes"]'
  career_goals: Although retired, Sally aims to deepen her community impact by becoming a lead docent at the local heritage museum, curating exhibitions that highlight underrepresented stories of Johnstown’s
    industrial past. She plans to earn a genealogy certification to assist residents in tracing their family histories. Sally also aspires to publish a memoir that weaves personal reflections with local
    lore, and to organize an annual senior-artist showcase. She hopes to foster intergenerational dialogue through a monthly history-and-art discussion circle and to continue her own artistic practice with
    the goal of exhibiting a series of watercolor landscapes in regional galleries.
