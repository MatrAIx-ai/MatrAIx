  career_goals: Reed aims to become a certified painting contractor within the next three years, earn his EPA Lead‑Safe certification, and eventually launch his own painting and wallpaper business serving
    Johnson County and surrounding areas. He also hopes to expand his expertise into small‑scale renovation projects, such as kitchen and bathroom remodels, and to eventually take on a supervisory role
    managing crews on larger commercial jobs.
