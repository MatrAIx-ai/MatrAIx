personas:
  professional: Reed Smith is a diligent residential painter and drywall specialist who leverages meticulous planning and clear communication to consistently meet homeowner expectations, while charting
    a path toward EPA Lead-Safe certification and launching his own painting and wallpaper business within the next three years.
  sports: Reed Smith joins the local community center's pickup basketball league every Tuesday, cheers on the Kansas City Chiefs on Sundays, and spends weekends angling at Truman Lake as a member of a catch-and-release
    fishing club, complementing their love of team camaraderie with a personal commitment to staying fit through weekend scrimmages and occasional jogging.
  arts: Reed Smith strums acoustic guitar on quiet evenings, drawing inspiration from John Mayer and Paul Simon while binge-watching classic sitcoms such as Seinfeld, The Office, and Friends, and they routinely
    attend local art fairs and Fourth of July parade rehearsals, where the marching band's brass and fireworks choreography fuel their appreciation for live performance.
  travel: Reed Smith likes to plan short road trips that blend adventure and relaxation, taking the family sedan to Truman Lake for fishing, a weekend getaway to Branson's live shows, and a summer road-trip
    dream to the Oregon Coast, while staying mindful of a limited budget and coordinating itineraries with their roommate.
  culinary: Reed Smith enjoys cooking simple comfort meals like grilled trout caught at Truman Lake seasoned with lemon-pepper and garlic, smoky barbecue pork ribs slathered in Kansas-style BBQ sauce, and
    occasional fish tacos with cabbage slaw, favoring fresh herbs such as rosemary and cilantro and showing a practical yet enthusiastic approach to home-cooked fare.
  core: Reed Smith is a hand-tool-savvy, community-oriented painter who balances structured career ambitions with social basketball, weekend fishing, acoustic guitar sessions, and a penchant for binge-watching
    sitcoms, all while juggling budget discipline and occasional back-pain flare-ups.
background:
  cultural: Reed grew up in a middle‑class white family in Knob Noster, Missouri, where community churches, high school sports, and small‑town values shaped his upbringing. His parents worked in manufacturing
    and valued hard work, reliability, and straightforward communication. He attended the local high school, participated in the varsity baseball team, and helped out with family chores, which reinforced
    a practical, hands‑on approach to problem‑solving. The Midwest work ethic and tight‑knit community network continue to influence his sense of responsibility, his sociable nature, and his desire to give
    back to the town that raised him.
