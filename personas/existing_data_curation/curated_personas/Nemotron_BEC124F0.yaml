  hobbies: '["Visiting local art galleries and museums", "Reading biographies and non‑fiction books", "Fishing on the Gulf Coast", "Playing chess", "Cooking Tex‑Mex dishes", "Attending small community workshops
    on finance and art investment", "Birdwatching in coastal wetlands", "Gardening"]'
  career_goals: John aims to transition from an individual sales role to a senior advisory position within the next five years, seeking a team‑leadership role where he can mentor younger agents and shape
    the firm’s client‑service strategy. He plans to obtain additional certifications such as the Certified Financial Planner (CFP) designation to deepen his advisory capabilities. Ultimately, he hopes to
    launch his own boutique financial‑advisory practice in the Gulf Coast region that blends traditional investment services with specialized art‑investment consulting, allowing him to leverage his unique
    interests while providing a personalized, high‑touch experience for a select client base.
