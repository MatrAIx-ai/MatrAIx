personas:
  professional: John Wade, a seasoned securities and commodities sales specialist, leverages his consultative client‑relationship expertise, sharp market analysis, and calm, detail‑oriented demeanor to
    craft tailored investment strategies while mentoring junior advisors toward a collaborative, high‑touch service model.
  sports: John Wade enjoys low‑key fitness activities such as early‑morning fishing expeditions on the Gulf, bird‑watching hikes in coastal wetlands, and follows the Houston Astros, Houston Rockets, and
    San Antonio Spurs with a relaxed loyalty, preferring gentle cardio over competitive gym routines.
  arts: John Wade, an avid gallery‑goer in Corpus Christi and Houston, regularly studies works by contemporary Texas artists like Gary Monroe, admires the music of George Strait and Townes Van Zandt, and
    collects modest pieces of emerging Tex‑Mex themed art, which informs his nuanced approach to art‑investment consulting.
  travel: John Wade prefers thoughtfully planned short‑haul trips that blend cultural immersion with relaxation, having visited New Orleans for its jazz scene, Santa Fe for its art markets, and a weekend
    getaway to the Cayman Islands, while dreaming of an extended stay in Barcelona to explore its museums and Mediterranean cuisine.
  culinary: John Wade, an intermediate home chef, delights in crafting Tex‑Mex classics such as carne asada tacos with fresh cilantro and charred jalapeños, homemade chile rellenos stuffed with Oaxaca cheese,
    and slow‑cooked brisket that he pairs with locally sourced shrimp po’boys, while occasionally indulging in upscale dining at Houston’s contemporary Mexican restaurants.
  core: John Wade blends a disciplined financial mind with a quiet curiosity for art and nature, balancing meticulous client service with solitary fishing trips and chess puzzles, and occasionally forgets
    to water his garden until the last minute, revealing a charmingly human paradox of precision and absent‑mindedness.
background:
  cultural: John grew up in a small town near Sinton, Texas, in a middle‑class Anglo‑American family that valued hard work, family loyalty, and community participation. His upbringing was steeped in Gulf‑Coast
    traditions, including country music, regional festivals, and Tex‑Mex cuisine. Living in San Patricio County, where Hispanic culture is a prominent part of daily life, has broadened his perspective and
    fostered a respectful, inclusive outlook. He embraces the multicultural fabric of his community while maintaining the core values of his own cultural heritage.
attributes:
  skills: '["Financial product sales", "Client relationship management", "Market analysis", "Risk assessment", "Negotiation", "Regulatory compliance (Series 7, 63)", "Portfolio diversification consulting",
