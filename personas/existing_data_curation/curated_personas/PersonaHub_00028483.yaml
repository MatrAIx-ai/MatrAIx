persona_description: A cardiologist who specializes in the study of coronary artery disease and its underlying mechanisms. They are interested in the latest research findings on endothelial dysfunction
  and its role in the development of atherosclerosis and subsequent adverse coronary events. They are also curious about the potential mechanisms by which the blood vessels' lining influences the development
  of lesions in the coronary arteries, and are eager to learn more about the experimental and clinical investigation pointing toward three major mechanisms of action.
