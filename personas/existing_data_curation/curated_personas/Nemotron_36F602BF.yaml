  career_goals: Sharon aims to transition into executive leadership within a regional health system, targeting roles such as Chief Operating Officer or Director of Clinical Services. She plans to earn a
    Master of Health Administration (MHA) and achieve Lean Six Sigma Black Belt certification to deepen her expertise in operational excellence. Over the next five years, she intends to spearhead innovative
    patient-experience initiatives—particularly integrating art and technology—to boost satisfaction and outcomes across the Shreveport-Bossier area. Sharon also aspires to expand community outreach programs
    that address rural health disparities, mentor emerging women leaders in healthcare, and contribute to policy discussions on equitable access to care.
