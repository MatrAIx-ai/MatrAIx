personas:
  professional: An experienced health services manager, Sharon Cloar blends meticulous Lean Six Sigma methodology with a curiosity for art‑driven patient experiences, driving operational efficiency, regulatory
    compliance, and community‑centric innovation across the Shreveport‑Bossier health system.
  sports: An active outdoor enthusiast, Sharon Cloar hikes the piney woods of Kisatchie National Forest each spring, plays adult recreational softball with the Shreveport Women’s League in the summer, and
    follows the New Orleans Saints (NFL) and LSU Tigers (college football) with weekend game‑day rituals that include tailgating and a bowl of jambalaya.
  arts: A lifelong patron of the arts, Sharon Cloar frequents the River City Repertory Theatre and the Shreveport Museum of Art, collects prints of George Rodrigue’s “Blue Dog,” enjoys the soulful Zydeco
    sounds of Clifton Chenier on vinyl, and finds inspiration in the contemporary novels of Chimamanda Ngozi Adichie and the piano compositions of Debussy.
  travel: A culturally curious traveler, Sharon Cloar meticulously plans road‑trip itineraries that blend historic Southern towns like Savannah and Natchez with international escapades to Quebec City and
    Oaxaca, favoring boutique B&Bs and local culinary tours while balancing a modest travel budget with a desire to experience new art scenes and community festivals.
  culinary: An avid home chef, Sharon Cloar expertly prepares classic Cajun dishes such as gumbo, jambalaya, and crawfish étouffée—using smoked sausage, okra, and a secret blend of file powder—while also
    experimenting with global flavors like Thai basil chicken, and they regularly host dinner gatherings that showcase both their culinary skill and love for communal storytelling.
  core: Sharon Cloar, a 35‑year‑old health services leader, balances methodical operational excellence with an unquenchable curiosity for art and culture, occasionally trading spreadsheets for late‑night
    piano improvisations and a habit of collecting stray pine cones from every hike.
background:
  cultural: Sharon grew up in a middle-class family in the Greater Shreveport area, shaped by the Southern hospitality and multicultural tapestry of northwestern Louisiana. Her heritage traces back to Anglo-American
    roots with a touch of French-Creole ancestry, reflected in the region’s culinary and musical traditions. Immersed in a community that values faith, family, and community service, she was raised attending
    local churches and participating in civic events. The vibrant Cajun and Zydeco music scene, annual festivals, and the prominence of Southern arts have fostered her appreciation for creative expression.
    This cultural milieu, combined with exposure to the health disparities present in rural Louisiana, has driven her commitment to equitable healthcare delivery and community engagement.
