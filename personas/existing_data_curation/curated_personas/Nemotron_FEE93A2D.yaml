  hobbies: '["Gardening (vegetable garden)", "Baking & cooking traditional recipes", "Reading historical biographies and classic literature", "Knitting and quilting", "Small‑group church bible study", "Volunteer
    at local food pantry", "Walking on nature trails", "Birdwatching", "DIY home improvement projects", "Listening to business/technology podcasts"]'
  career_goals: Barbara aims to solidify her role as a bridge between business and technology by earning PMP and ITIL certifications within the next two years. In the medium term, she seeks a promotion
    to IT Operations Manager, where she can codify and standardize operational procedures to reduce uncertainty and stress for her team. Ultimately, she envisions advancing to a Director of Business Systems
    position, overseeing strategic technology initiatives that prioritize stability, incremental improvement, and clear, predictable outcomes while maintaining a healthy work‑life balance for herself and
    her family.
