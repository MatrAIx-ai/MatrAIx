personas:
  professional: Jason Delaney, a 14‑year‑old robotics club captain, translates their organized, competitive mindset into designing and programming contest‑grade bots while using their outgoing demeanor
    to coordinate teammates and meet tight competition deadlines.
  sports: Jason Delaney, a dedicated member of the Eastside Youth Basketball League and his school’s soccer team, roots for the Los Angeles Lakers and Manchester United, practices high‑intensity drills
    each season, and prefers a win‑oriented approach that sometimes eclipses collaborative play.
  arts: Jason Delaney, an avid model‑kit builder and sketch artist, spends weekends drawing aircraft silhouettes, streams Imagine Dragons and Tame Impala for creative fuel, attends local community theater
    productions, and sees the precision of visual design as an extension of their competitive spirit.
  travel: Jason Delaney, who has already toured Washington, D.C.’s National Air and Space Museum and camped in Yellowstone, dreams of a structured itinerary to Japan’s Tsukuba Science City to explore robotics
    expos, favoring detailed trip planning over spontaneous trips.
  culinary: Jason Delaney, a budding home cook who adores pepperoni pizza with extra mozzarella and hot sauce, whips up quick spaghetti carbonara using pancetta and Pecorino Romano, and experiments with
    cookie cutters shaped like airplanes and cars for after‑school snacks.
  core: Jason Delaney merges a methodical, competitive edge with vibrant sociability, turning every pursuit—from robotics to volunteering—into a meticulously organized challenge while maintaining a notably
    calm, anxiety‑free demeanor.
background:
  cultural: Jason grew up in Mooresville, Indiana, a small, predominantly white Midwestern town where family, church, and community events are central to daily life. His upbringing emphasizes hard work,
    self‑reliance, and civic responsibility, with frequent participation in local fairs, church youth groups, and school sports. The rural, agricultural setting and close‑knit community have fostered his
    practical outlook, competitive spirit, and strong sense of reliability.
