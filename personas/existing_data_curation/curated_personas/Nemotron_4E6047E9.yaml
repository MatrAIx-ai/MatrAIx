personas:
  professional: An aspiring game creator, Jorge Garcia channels their love for comic book storytelling into Scratch animations, blending colorful sketches with rhythmic beats, though their relaxed attitude
    sometimes leaves projects half‑finished on the desk.
  sports: An enthusiastic soccer player, Jorge Garcia dribbles for the Little Lions Soccer Club after school, cheers for the New York Red Bulls, and they also join the spring track team, yet their laid‑back
    nature occasionally leads them to skip warm‑up stretches before games.
  arts: An imaginative illustrator, Jorge Garcia fills sketchbooks with original comic characters inspired by the vibrant sounds of salsa and reggaeton artists like Marc Anthony and Daddy Yankee, and they
    attend community workshops featuring street artist Banksy, while devouring graphic novels by creators such as Jo Wright and Brian K. Vernon.
  travel: An eager explorer, Jorge Garcia hikes pine‑covered trails in the nearby state park, visits the city science museum, and they dream of touring Orlando’s theme parks and Edinburgh’s historic castles,
    though they often forget sunscreen or their backpack on spontaneous trips.
  culinary: A budding chef, Jorge Garcia loves to assemble homemade pizza topped with mozzarella, pepperoni, and pineapple, blends banana‑strawberry‑mango smoothies, and they proudly make peanut butter‑banana
    sandwiches, though they frequently leave crumbs on the counter.
  core: Jorge Garcia is a curious, art‑driven ten‑year‑old who balances imaginative creation with spontaneous play, letting their relaxed habits create a delightful mess of half‑finished projects and snack
    crumbs.
background:
  cultural: Jorge’s family roots are Puerto Rican, and he grows up immersed in bilingual home life, speaking both Spanish and English. Family gatherings often feature traditional dishes like arroz con gandules,
    pasteles, and tostones, as well as lively music and dance. He celebrates holidays such as Día de los Reyes and Nochebuena with his extended family, preserving cultural customs while living in Fremont’s
    diverse community. Local Latino festivals and community centers provide him opportunities to learn about Puerto Rican folklore, art, and history, reinforcing a strong sense of identity that influences
    his creative interests.
