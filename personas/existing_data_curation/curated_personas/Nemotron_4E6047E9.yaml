  hobbies: '[''Drawing and sketching'', ''Reading graphic novels'', ''Building LEGO and model kits'', ''Exploring parks and nature trails'', ''Listening to salsa and reggaeton music'', ''Dancing to Latin
    rhythms'', ''Playing soccer with friends'', ''Coding simple games in Scratch'', ''Visiting museums and art galleries'', ''Attending community art workshops'']'
  career_goals: Jorge dreams of turning his love for art and storytelling into a future career as a graphic novelist, animator, or video‑game designer. He imagines creating colorful worlds that celebrate
    his Puerto Rican heritage and inspire others. He also hopes to travel to Puerto Rico to explore its culture firsthand and someday contribute to projects that highlight Latin music, art, and community
    stories. While still enjoying school, he aims to keep learning new artistic techniques and coding skills to bring his ideas to life.
