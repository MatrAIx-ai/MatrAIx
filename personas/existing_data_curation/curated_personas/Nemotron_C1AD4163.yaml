personas:
  professional: Devy Francis, a budding visual storyteller, leverages their solid digital illustration and photography skills along with Canva to craft community‑focused graphics, applying their methodical
    planning and empathetic communication to coordinate small‑scale mural projects while staying curious about new visual techniques.
  sports: Devy Francis, an avid fan of the Chicago Bulls and Blackhawks, channels their energy into weekly hip‑hop dance sessions with friends and occasional pick‑up basketball games at the local park,
    preferring movement that feels expressive over structured gym routines.
  arts: Devy Francis, who immerses themselves in Chicago’s vibrant street‑art scene and frequents the Art Institute and DuSable Museum, draws inspiration from artists like Banksy and Basquiat while vibing
    to Miles Davis, Kendrick Lamar, and spoken‑word poet Saeed Jones, channeling that energy into sketchbooks, graphic‑novel reads like 'Saga', and beat‑making experiments on GarageBand.
  travel: Devy Francis, who plans trips with a mix of meticulous research and spontaneous impulse, has road‑tripped to Milwaukee for a street‑art festival, dreams of visiting New York’s MoMA and New Orleans
    for its jazz heritage, yet often lets school deadlines curb longer getaways.
  culinary: Devy Francis, a self‑taught kitchen experimenter, favors classic Chicago deep‑dish pizza and Italian beef sandwiches while also whipping up avocado toast and quick ramen bowls, often seasoning
    dishes with garlic, chili flakes, and fresh basil to satisfy their artistic palate.
  core: Devy Francis blends a curious, organized mind with a love for street art and community storytelling, juggling late‑night sketch marathons, occasional impulse buys of art supplies, and a persistent
    habit of over‑planning every creative project.
background:
  cultural: Devy identifies as African American and grew up in a tight‑knit South Side community where church, family gatherings, and neighborhood block parties play a central role. Her upbringing is infused
    with the traditions of Black storytelling, gospel music, and the rich artistic heritage of Chicago’s historic Bronzeville district. She draws inspiration from local Black artists, community mural projects,
    and cultural events like Chicago’s Black History Month celebrations, which reinforce her commitment to preserving and sharing her cultural legacy through art.
attributes:
  skills: '[''Digital illustration'', ''Photography'', ''Basic graphic design (Canva)'', ''Community event planning'', ''Time management'', ''Public speaking'', ''Creative writing'', ''Empathetic listening'']'
  hobbies: '[''Sketching'', ''Exploring street art'', ''Listening to jazz and hip‑hop'', ''Visiting museums (Art Institute, DuSable Museum)'', ''Reading graphic novels'', ''Creative writing (poetry)'',
    ''Volunteering at library art club'', ''Beat‑making'', ''Hip‑hop dance'']'
  career_goals: Devy aims to earn her GED within the next year and enroll in a community‑college program focused on graphic design and visual communication. She aspires to work as a freelance visual artist
    for non‑profit organizations that serve Chicago’s neighborhoods, eventually becoming a program coordinator who leads youth‑focused art workshops and community mural projects. Her long‑term ambition
    is to use art to amplify stories from the Black community and inspire other young people to express themselves creatively.
