personas:
  professional: Khan Sarkar, a two-year-old block-builder at their local early childhood program, shows an uncanny talent for arranging colorful cubes in orderly rows while occasionally delighting peers
    with spontaneous tower-toppling improvisations.
  sports: Khan Sarkar frequently joins the Factoryville Tots soccer group on Saturday mornings, cheers aloud for the hometown Steelers during family TV evenings, and they love the swing set where they practice
    balancing like a mini-gymnast.
  arts: Khan Sarkar delights in storytime sessions where their caregiver reads classic fairy tales and sings lullabies by local children’s performer Maya Rivera, and they eagerly tap along to the rhythms
    of a simple plastic drum.
  travel: Khan Sarkar loves short family road trips to the nearby Hershey Park and seasonal visits to the historic Lancaster County fairs, where they ride the miniature train and nap peacefully in their
    car seat after the journey.
  culinary: Khan Sarkar prefers soft rice porridge with a dash of ghee, loves sweet roshogolla treats during festive gatherings, and insists on scooping mashed lentils with their tiny spoon, though they
    sometimes refuse vegetables with a stubborn frown.
  core: Khan Sarkar is a calm, structure-loving toddler who secretly thrives on spontaneous play, a tiny piggy bank, and sweet festivals, all while maintaining a gentle, compassionate demeanor.
background:
  cultural: Khan is part of a South Asian (Indian) family rooted in the Bengali community, reflected by his surname "Sarkar" and the blend of "Khan" and "Kumar" in his name. The family maintains bilingual
    communication—English at home and Bengali in cultural contexts—celebrates festivals such as Durga Puja, Diwali, and Eid, and enjoys cuisine like rice, lentils, and sweets such as roshogolla. Living
    in Factoryville, PA, they blend traditional customs with American suburban life, attending a local early childhood program and participating in community events.
