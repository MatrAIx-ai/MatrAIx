  career_goals: Brenda aims to become a senior database architect within the next five years, earning certifications such as AWS Certified Database – Specialty and Oracle Certified Professional. She wants
    to lead a collaborative team that values flexibility and open idea exchange, guiding projects that blend innovative data solutions with reliable, production‑grade systems. Long‑term, she hopes to mentor
    junior DBAs, speak at regional tech meetups, and eventually shape data‑governance policies for a midsize enterprise or a community‑focused organization, all while preserving a work environment that
    lets her maintain a healthy social and creative balance.
