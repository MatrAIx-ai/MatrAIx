persona_description: A marine geologist interested in the study of fish otoliths and their preservation in the Mediterranean Sea. This individual is likely to be interested in paleoenvironmental reconstructions,
  the taxonomic composition and abundance of fish otoliths, and the early taphonomic characteristics of these aragonitic bodies. They may be particularly interested in the distribution of fish otoliths
  across different depths and the occurrence of pre-modern subfossil taxa in the death-assemblages. They may also be interested in the preservation of otoliths and the potential for paleoenvironmental reconstructions.
