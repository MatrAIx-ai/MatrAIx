personas:
  professional: Aakash Hernandezojeda is a diligent IT support specialist who leverages bilingual fluency, methodical troubleshooting across Windows, macOS, and Linux, and a keen eye for visual documentation
    to turn complex tickets into step‑by‑step guides, all while quietly fretting over SLA targets and dreaming of an IT Service Manager role.
  sports: Aakash Hernandezojeda plays midfield for a local amateur soccer league, cheers for the Portland Timbers and Trail Blazers, hikes the Columbia River Gorge with the Gorge Hikers Club, and swaps
    winter ski trips to Mt. Hood with summer kayaking outings, maintaining a routine that balances competitive spirit and social camaraderie.
  arts: Aakash Hernandezojeda roams Portland’s art galleries, sketches street scenes inspired by Banksy’s satire, captures dramatic Oregon landscapes in the style of Ansel Adams, and fills their playlists
    with Sufjan Stevens, Jorge Drexler, and live mariachi, using these creative bursts to unwind from technical work.
  travel: Aakash Hernandezojeda plans getaways with meticulous spreadsheets, favoring weekend road trips to the Oregon coast, spontaneous hikes in the Columbia River Gorge, and occasional flights to Kyoto
    for its temples and to Oaxaca to taste authentic mole, balancing wanderlust with a modest travel budget.
  culinary: Aakash Hernandezojeda loves cooking mole poblano with ancho chilies, chocolate, and epazote, hand‑rolling tamales de elote, and experimenting with fusion twists like kimchi‑infused tacos, often
    hosting friends for elaborate meals while occasionally burning the garnish when distracted by work emails.
  core: Aakash Hernandezojeda blends methodical tech expertise, vibrant artistic pursuits, and a perpetual worry‑driven quest for balance, turning every problem into a creative solution—even if that sometimes
    means over‑cooking the rice.
background:
  cultural: Aakash is a second‑generation Mexican‑American whose parents immigrated from Jalisco. Growing up in a bilingual household in the Pacific Northwest, he celebrates both Mexican and American holidays—Día
    de los Muertos, Cinco de Mayo, Thanksgiving, and Fourth of July—often blending traditions with family gatherings centered around food, music, and storytelling. His upbringing instilled a strong sense
    of community, hospitality, and respect for elders, which now shape his collaborative work style and his commitment to mentoring others. Aakash frequently uses his Spanish fluency to assist Spanish‑speaking
    customers and volunteers at local Latino community events, where he helps bridge the digital divide. He remains proud of his heritage, incorporating Mexican art motifs into his personal projects and
    staying connected to cultural roots through music, cuisine, and family reunions.
attributes:
  skills: '["Hardware troubleshooting", "Software installation and configuration", "Network diagnostics", "Windows and macOS support", "Ticketing system management (ServiceNow, Jira)", "IT documentation
    and knowledge‑base creation", "Process improvement and SOP development", "Bilingual user support (English/Spanish)", "Digital illustration and graphic design", "Photography for documentation and creative
    projects", "User training and mentorship", "Community tech outreach"]'
  hobbies: '["Photography", "Digital illustration", "Cooking Mexican cuisine", "Soccer (local league)", "Hiking in Pacific Northwest trails", "Live music and art festivals", "Board games and trivia nights",
    "Volunteer tech workshops", "Yoga and meditation"]'
  career_goals: 'Aakash aims to transition from a front‑line support role into a leadership position as an IT Service Manager or Operations Lead within the next five years. He plans to earn advanced certifications—CompTIA
    Network+, Microsoft Certified: Azure Administrator Associate, and ITIL Foundation—to deepen his expertise in network architecture and service‑delivery frameworks. He also aspires to integrate user‑experience
    design principles into the support workflow, reducing resolution times and improving customer satisfaction. Long‑term, he envisions launching a boutique consulting practice that offers bilingual technical
    support, digital media services, and community‑focused tech education for small businesses and nonprofit organizations in the Portland metro area.'
