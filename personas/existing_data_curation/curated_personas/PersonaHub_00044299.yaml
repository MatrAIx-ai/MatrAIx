persona_description: A multidisciplinary researcher with expertise in marine sediments, geomorphology, glaciology, and climate studies, particularly interested in the reconstruction of past environmental
  conditions in the South Shetland Islands and the surrounding regions. This individual is seeking to establish a multi-, inter-, and transdisciplinary research project to integrate and complete the results
  from marine sediments with those from lakes, from glaciological studies, age determinations, and from geomorphological studies and raised Holocene beaches in the King George Island area. This researcher
  aims to detect, discriminate, and interpret regional and local environmental processes and effects from global trends, and to map similar hydroacoustic methods to compare with ground truth surface sediment
  sampling for a combined geo- and biological characterization.
