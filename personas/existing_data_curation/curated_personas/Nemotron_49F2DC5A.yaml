  hobbies: '[''Reading nonfiction (science, self-improvement)'', ''Acoustic guitar playing'', ''Cooking experimental recipes'', ''Balcony gardening'', ''Scale model building (ships, aircraft)'', ''Hiking
    in Santa Monica Mountains'', ''Indie film watching'', ''Local book-club participation'']'
  career_goals: Vincent aims to re‑enter the workforce in a role that leverages his practical tech skills and his cooperative nature, such as a part‑time IT support technician or a freelance web‑design
    consultant. He also hopes to eventually launch a small side‑business creating custom smart‑home accessories, allowing him to blend his curiosity for new tech with hands‑on craftsmanship. He prioritizes
    a stable schedule that preserves time for family and personal well‑being, and he plans to complete his associate degree to solidify his credentials.
