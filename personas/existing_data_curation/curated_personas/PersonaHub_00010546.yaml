persona_description: A researcher in the field of microbiology and human health, focusing on the role of microbial communities in disease onset and the transition from health to disease. This person is
  particularly interested in the oral microbiome, the complex ecosystem of microbes inhabiting the human mouth, and its role in periodontal disease, the most common infectious disease affecting tooth-supporting
  structures. This individual is likely to be experienced in deep sequencing techniques, including the 16S rRNA gene and whole community DNA, and has a keen interest in understanding the system-level mechanisms
  underlying the transition from health to disease. This researcher is also likely to be familiar with the concept of the disease microbiome, the oral microbiome that is enriched in virulence factors and
  adapted to a parasitic lifestyle, and shares a common structure with healthy samples, suggesting that the disease state may occupy a narrow region within the space of possible configurations of the oral
  microbiome.
