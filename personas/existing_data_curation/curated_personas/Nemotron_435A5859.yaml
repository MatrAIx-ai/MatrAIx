  career_goals: Israel aims to transition from a frontline clerk to a supervisory or inventory‑control manager within the next three to five years. He plans to earn a certification in supply‑chain management,
    such as the APICS CPIM, to solidify his expertise and position himself for a lead role overseeing a team of clerks. He also hopes to champion the adoption of automation tools like voice‑directed picking
    or robotic sortation in his current warehouse, leveraging his curiosity for new ideas while ensuring they are grounded in reliable workflow. Long‑term, he seeks greater job security and financial stability
    to reduce day‑to‑day stress, eventually mentoring younger Mexican‑American workers and possibly consulting part‑time for small businesses seeking to streamline their inventory processes.
