  hobbies: '[''abstract painting'', ''sketching'', ''photography'', ''reading speculative fiction'', ''philosophy'', ''hiking'', ''kayaking'', ''community theater set design'', ''guitar'', ''creative writing'']'
  career_goals: Ulysse aims to earn a Bachelor of Science in Nursing within the next two years, followed by certification as a Family Nurse Practitioner to broaden his clinical scope. He aspires to specialize
    in community health, developing innovative outreach programs that integrate creative health education tools. He envisions leading a multidisciplinary team in a rural health clinic, using his organizational
    strengths to streamline workflows and improve patient outcomes. Long‑term, he hopes to merge his nursing practice with medical illustration, publishing patient‑centred visual guides and contributing
    to health‑literacy initiatives at the state level.
