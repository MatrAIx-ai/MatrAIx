personas:
  professional: Shaquille Pearson is a budding junior coder and illustrator who merges meticulous LEGO engineering with vibrant sketches of Magic Tree House characters; their imaginative curiosity drives
    them to experiment with simple block‑based coding games while their reliable, quiet nature ensures they patiently debug programs and keep their creative workspace orderly.
  sports: Shaquille Pearson enjoys after‑school swimming with the Little Dolphins Club, casually follows the Los Angeles Dodgers baseball team and the Boston Celtics basketball highlights on TV, and prefers
    gentle nature walks for birdwatching over competitive team sports, though they occasionally join the school’s kick‑ball games when classmates invite them.
  arts: Shaquille Pearson finds joy sketching beloved Magic Tree House protagonists while humming Disney soundtracks composed by Alan Menken and practicing simple piano pieces by Mozart, a blend of visual
    and musical arts that fuels their inventive play and quiet afternoons of creativity.
  travel: Family trips have taken Shaquille Pearson to Disney World in Florida, the Grand Canyon’s rim for sunrise birdwatching, and a weekend stroll through Pike Place Market in Seattle, and they dream
    of exploring Paris, France’s historic museums and the towering Eiffel Tower someday.
  culinary: Shaquille Pearson loves assembling homemade pizza topped with mozzarella, pepperoni, and fresh basil, whipping up a banana‑split dessert sprinkled with strawberries and chocolate sauce, and
    can reliably cook scrambled eggs with cheddar, though they occasionally skip the broccoli on the side.
  core: A bright, solitary seven‑year‑old who transforms quiet afternoons into LEGO castles, doodles, and code, while diligently funneling allowance into a piggy‑bank and occasionally losing track of chores.
background:
  cultural: Shaquille is an African‑American boy growing up in Dallas, a small community in Paulding County, Georgia. His family maintains strong ties to Southern Black traditions, including Sunday church
    services, gospel music, and family gatherings centered around soulful cooking like fried chicken and collard greens. He participates in local community events such as Juneteenth celebrations and school
    cultural days, where he learns about the history of African‑American contributions in the South. His parents encourage academic curiosity and pride in his heritage, often sharing stories of civil‑rights
    leaders from Georgia and encouraging him to express himself through art and music.
attributes:
  skills: '[''drawing'', ''creative storytelling'', ''basic Scratch programming'', ''reading comprehension'', ''logic puzzles'']'
  hobbies: '[''sketching'', ''reading Magic Tree House books'', ''building LEGO sets'', ''birdwatching'', ''playing piano'', ''solving jigsaw puzzles'', ''basic coding games'']'
  career_goals: He dreams of a future where he can combine his love for art and discovery, hoping one day to become an illustrator of science‑fiction books or a visual designer for space exploration missions.
    He sometimes talks about wanting to create his own comic series, and he is curious about becoming a wildlife photographer who captures quiet moments in nature. While still young, his ambition centers
    on using imagination to share stories and explore the world.
