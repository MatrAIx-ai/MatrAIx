personas:
  professional: Steven Watkins is a ten‑year‑old budding project coordinator who channels his love of building LEGO sets, simple woodworking, and leading soccer drills into early leadership experiences,
    balancing routine with the flexibility needed to keep his friends engaged.
  sports: Steven Watkins is a regular on the Riverside Rovers’ under‑12 soccer team, idolizing Manchester United’s midfielders, rides his bike along the town’s greenway after practice, and proudly supports
    the local high‑school basketball team, the Tigers, while also keeping a seasonal roster of pick‑up games with friends.
  arts: 'Steven Watkins is an avid collector of classic adventure novels like "The Hobbit" and "Treasure Island", enjoys listening to the music of Imagine Dragons while constructing LEGO sets, and spends
    weekend afternoons watching the animated series "Avatar: The Last Airbender", frequently quoting the lines of actor Tom Hanks from "Cast Away" during group games.'
  travel: Steven Watkins prefers family‑organized road trips to national parks such as Yellowstone and the Grand Canyon, has visited Washington, D.C.’s National Museum of Natural History, and dreams of
    traveling with his Boy Scout pack to the historic castles of Scotland, balancing his love of routine with the excitement of discovering new hiking trail maps.
  culinary: Steven Watkins favors comfort foods like cheesy pizza, mac and cheese, and chicken nuggets, enjoys making grilled cheese sandwiches with extra butter at home, and delights in the crispy texture
    of apple slices dipped in caramel sauce, while occasionally overindulging in soda after soccer practice.
  core: Steven Watkins is a routine‑driven, competitive ten‑year‑old who thrives on group soccer games, LEGO engineering, and meticulous allowance‑saving, yet wrestles with frequent worries and occasional
    snack‑binge impulses.
background:
  cultural: Steven is raised in a white, Southern‑American family in Mount Juliet, Tennessee, a suburban community just outside Nashville. His upbringing reflects traditional Southern values such as hospitality,
    self‑reliance, and a strong connection to community institutions like the local church and school sports programs. He is exposed to country and bluegrass music, enjoys regional foods, and participates
    in seasonal community events such as county fairs and high‑school football games. This cultural environment reinforces his preference for routine, practicality, and group belonging, while also nurturing
    his competitive spirit in sports and his sense of responsibility toward his neighbors.
