  hobbies: '[''Playing soccer'', ''Bike riding'', ''Video gaming (strategy)'', ''LEGO building'', ''Simple woodworking'', ''Collecting baseball cards'', ''Reading adventure books'', ''Church youth group'',
    ''Boy Scouts'']'
  career_goals: Steven dreams of becoming a professional soccer player, hoping to one day join a college team and perhaps play in Major League Soccer. His fascination with cars and mechanics, sparked by
    watching local automotive shops, also fuels an ambition to learn automotive repair and eventually work as a technician at a nearby race track or garage. Additionally, he respects the dependable routine
    and community service of firefighting, so he sometimes imagines himself wearing the uniform and helping his town, viewing it as a backup path that aligns with his love of order and responsibility.
