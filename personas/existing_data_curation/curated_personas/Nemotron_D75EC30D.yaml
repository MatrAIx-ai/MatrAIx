  hobbies: '[''Reading (fiction & non-fiction)'', ''Photography (landscape & street)'', ''Puzzle solving (crosswords, sudoku)'', ''Indie video games'', ''DIY cooking experiments'', ''Nature hikes'', ''Journaling'',
    ''Mindfulness meditation'', ''Yoga'', ''Exploring local coffee shops'']'
  career_goals: Gabriella aims to advance from her current clerk role to an office manager or operations coordinator within the next three to five years. She plans to complete her associate degree in Business
    Administration and earn certifications such as the Certified Administrative Professional (CAP) and Microsoft Office Specialist. Her competitive drive pushes her to seek leadership responsibilities,
    improve efficiency across departments, and eventually explore a role in business analysis or supply‑chain operations. Long‑term, she envisions either managing a mid‑size office team or launching a small
    e‑commerce venture that combines her interest in operational logistics with her DIY cooking hobby.
