personas:
  professional: An 83-year-old retired volunteer coordinator named Dulce Herrera leverages her associate's degree in Business Administration, bilingual fluency, and meticulous bookkeeping skills to lead
    budgeting workshops at the senior center, organize community food drives, and mentor younger women on financial independence, all while maintaining a structured schedule that satisfies her preference
    for predictability.
  sports: Dulce Herrera enjoys daily neighborhood walks, participates in the senior center's low-impact yoga class, follows the local baseball team the River City Runners, and caps the senior women's softball
    league the Golden Blossoms, where her competitive spirit shines during weekend games.
  arts: Dulce Herrera spends evenings crocheting intricate blankets inspired by William Morris designs, reads mystery novels by Agatha Christie and Sue Grafton, attends the community theater's production
    of 'Our Town', and listens to folk singer Mercedes Sosa during her cooking sessions, blending creativity with cultural appreciation.
  travel: Dulce Herrera favors short road trips to historic towns like Santa Fe and Savannah, enjoys the relaxed pace of beachside retreats in the Gulf Coast, dreams of a pilgrimage to the ancient ruins
    of Machu Picchu, and meticulously plans each itinerary to balance adventure with her need for a predictable schedule.
  culinary: Dulce Herrera excels at preparing traditional dishes such as tamales, pozole, and homemade salsa, meticulously seasons each pot with dried oregano and chipotle, knits together recipes from her
    grandmother's handwritten notebook, and occasionally splurges on fresh cilantro and ripe avocados at the farmers market, though she sometimes forgets to refrigerate leftovers promptly.
  core: Dulce Herrera is an organized, competitive senior who channels her anxiety into structured community work, meticulous budgeting, and vibrant cultural traditions, while occasionally battling forgetfulness
    and a penchant for over-planning.
background:
  cultural: Dulce is a first‑generation Mexican‑American who grew up bilingual in Spanish and English. Her family maintains strong Catholic traditions, celebrating weekly mass, Día de los Muertos, and Mexican
    holidays such as Cinco de Mayo and Navidad with traditional foods and music. She values family cohesion, respect for elders, and community service, frequently assisting neighbors with translation and
    sharing recipes passed down from her mother. Living in Garland, Texas, she blends Mexican cultural heritage with Texan influences, participating in local cultural festivals and preserving her cultural
    identity through cooking, language, and religious practices.
