personas:
  professional: Mariela Abbey, a senior architectural drafter in Los Angeles, leverages expert-level proficiency in AutoCAD, Revit, and SketchUp with a methodical, organized workflow and a naturally sociable,
    talkative demeanor to translate sustainable design concepts into detailed construction documents, while they mentor junior staff and steer multidisciplinary teams toward LEED‑certified outcomes.
  sports: Mariela Abbey, a lively fitness enthusiast, fuels their love for movement through weekly salsa classes at a downtown studio, regular hikes in the Santa Monica Mountains with the Trail Riders club,
    and marathon training runs with the LA Road Runners, while they cheer on the Los Angeles Lakers and Dodgers as their favorite professional teams.
  arts: Mariela Abbey, a passionate urban photographer, captures LA’s architectural diversity with a style inspired by Edward Burtynsky and Henri Cartier‑Bresson, and they enjoy live performances by local
    salsa bands like Grupo Niche at the Velvet Lounge while frequently revisiting the movies of Guillermo del Toro and the paintings of Frida Kahlo for cultural inspiration.
  travel: Mariela Abbey prefers meticulously planned weekend escapes that blend outdoor adventure with cultural immersion, and they have recently trekked the trails of Joshua Tree, explored the colonial
    streets of San Miguel de Allende, and dream of a Pacific Coast Highway road trip to watch sunrise at Big Sur.
  culinary: Mariela Abbey delights in crafting authentic enchiladas rojas, slow‑cooked mole poblano, and hand‑made corn tamales, seasoning them with fresh epazote and dried ancho chiles, while they also
    seek out artisanal coffee roasts and frequently dine at LA’s Bestia and Guelaguetza for a fine‑dining twist.
  core: Mariela Abbey blends a meticulous, detail‑driven work ethic with a contagious, talkative social presence; they habitually over‑analyze project timelines, worry late into the night, and indulge in
    midnight snack runs of churros while dreaming up sustainable housing solutions for underserved neighborhoods.
background:
  cultural: Mariela identifies as Mexican‑American, growing up in a bilingual household that celebrated Mexican traditions while embracing the multicultural vibrancy of Los Angeles. Her cultural roots influence
    her love for Mexican cuisine, music, and family gatherings, and she actively participates in community events such as Dia de los Muertos celebrations and local festivals. This bicultural perspective
    informs her design sensibility, prompting her to incorporate elements that reflect Mexican heritage and community values into her projects. Mariela values the strong communal ties and collaborative
    spirit prevalent in Mexican culture, which translates into her professional emphasis on teamwork, harmony, and inclusive design practices.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''SketchUp'', ''BIM Coordination'', ''Structural Drafting'', ''California Building Code Compliance'', ''Sustainable Design Principles'', ''Project Documentation'', ''Client
    Presentation'', ''Bilingual Communication (Spanish/English)'', ''Team Collaboration'', ''Time Management'', ''Problem Solving'', ''Quality Assurance'']'
  hobbies: '[''Salsa dancing'', ''Cooking traditional Mexican dishes'', ''Hiking in the Santa Monica Mountains'', ''Urban photography'', ''Yoga and meditation'', ''Reading architectural journals'', ''Volunteering
    for STEM outreach programs'', ''Attending live music performances'', ''Traveling to explore historic architecture'', ''Hosting dinner parties for friends'']'
  career_goals: Mariela aims to transition from senior drafter to BIM Manager, leading large multidisciplinary design projects that prioritize sustainability and community impact. She plans to obtain LEED
    AP certification and eventually pursue a professional engineering (PE) license to expand her role into structural design. Passionate about mentorship, she wants to create a supportive onboarding program
    for junior drafters, emphasizing work‑life balance and stress‑management techniques. Long‑term, Mariela envisions founding a consulting firm that specializes in affordable, culturally resonant housing
    solutions for Mexican‑American neighborhoods in Los Angeles, publishing research on inclusive design and speaking at industry conferences about the intersection of technology, sustainability, and social
    equity.
