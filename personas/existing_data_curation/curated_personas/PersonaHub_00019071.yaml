persona_description: A researcher and scientist who specializes in the study of pest management and biology, particularly in the control of cereal leaf beetle. They have experience in conducting research
  and developing effective management strategies for non-native insects like the beetle. They are knowledgeable in IPM tactics and have a deep understanding of the biology and ecology of the beetle. They
  have a passion for finding solutions to control pests and have a track record of success in implementing effective management practices. They are well-versed in the use of scouting and thresholds and
  have a deep understanding of the impacts of timing and frequency of sprays. They are skilled at analyzing data and interpreting results, and are able to communicate their findings effectively to stakeholders.
