personas:
  professional: Reina Concepcion is a retired bilingual elementary educator who now channels three decades of curriculum design, grant writing, and community outreach into mentoring younger teachers and
    launching a bilingual senior tutoring program, applying their trademark meticulous organization and high standards to every lesson plan and garden workshop they pilot.
  sports: Reina Concepcion participates in the Kearney Prairie Walking Club for daily cardio, attends gentle yoga classes at the community center each week, and rallies with local fans for the Nebraska
    Cornhuskers football team while reluctantly watching the Omaha Storm hockey games whenever a weekend aligns with their relaxed schedule.
  arts: Reina Concepcion devotes their afternoons to perusing art‑history volumes and contemporary shows at the Omaha Contemporary Arts Center, drawing inspiration from the vibrant colors of Claude Monet,
    the intricate patterns of heritage textiles they reimagine in their quilting, and the spoken‑word performances of local poets at intimate café gatherings.
  travel: Reina Concepcion plans measured road trips that blend relaxed scenery with cultural stops, such as exploring Santa Fe’s historic plaza, hiking the red rocks of Utah’s Arches National Park, and
    savoring the seaside charm of Cinque Terre in Italy, while keeping a modest budget and a habit of journaling each day’s observations as they travel.
  culinary: Reina Concepcion’s kitchen is a laboratory where they refine family recipes like corn‑based stuffed flatbreads, plantain‑spiced stews, and slow‑cooked black bean casseroles, while experimenting
    with fresh garden herbs such as cilantro, oregano, and lime to craft sauces that bridge their heritage with contemporary culinary trends.
  core: Reina Concepcion is a meticulously organized, art‑obsessed retiree who cherishes quiet contemplation, obsessively catalogs garden notes, but they frequently lose sleep over imagined imperfections
    in their latest quilting pattern.
background:
  cultural: Reina was born in Guatemala and immigrated to the United States in her early twenties. She carries forward a rich blend of Maya and Spanish colonial traditions, evident in her devotion to Catholic
    holidays such as Semana Santa, the preparation of tamales and atol, and the weaving of colorful textiles that echo ancient patterns. Fluent in Spanish and culturally attuned to Guatemalan customs, she
    often shares stories and folk songs with her grandchildren and the local Latino community in Kearney. Her Guatemalan roots shape her worldview, fostering a deep respect for family interdependence, communal
    celebration, and the value of preserving cultural memory through food, craft, and oral history.
