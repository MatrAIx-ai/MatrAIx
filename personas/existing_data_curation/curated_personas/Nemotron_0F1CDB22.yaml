    and textile arts'', ''Basic computer skills (email, spreadsheets, online learning platforms)'']'
  hobbies: '[''Reading art history'', ''Visiting local museums and galleries'', ''Gardening, especially heirloom vegetables'', ''Knitting and quilting traditional patterns'', ''Cooking Guatemalan cuisine'',
    ''Birdwatching in prairie habitats'', ''Journaling and reflective writing'', ''Participating in small book clubs'', ''Learning basic Maya language phrases'', ''Volunteering at community senior center'']'
  career_goals: In retirement, Reina seeks to channel her curiosity and disciplined work ethic into legacy projects. She aims to mentor emerging teachers through a small, informal advisory circle, and to
    establish a bilingual tutoring program for Spanish‑speaking seniors in Kearney. Additionally, she wishes to document her family’s Guatemalan recipes and oral histories in a memoir that can serve as
    a cultural bridge for younger generations. By securing modest grant funding, she hopes to launch a community garden that combines her horticultural skill with educational workshops, fostering intergenerational
    learning while preserving high standards of sustainability.
