  career_goals: Although retired, Nicholas aims to become a senior advisor for the Damascus City Council, focusing on preserving historic sites and enhancing community green spaces. He aspires to mentor
    younger volunteers, sharing his knowledge of local history and project coordination. Writing a memoir that intertwines his personal journey with the region’s evolution is a long‑term goal, as is contributing
    regular columns to the county’s heritage newsletter. He also seeks to maintain his health and emotional well‑being by integrating mindfulness practices to manage his anxiety, and hopes to travel to
    select historic towns in the Pacific Northwest to deepen his research and personal enrichment.
