personas:
  professional: An architectural and engineering manager with three decades of experience, Cheick Phillips deftly translates client visions into feasible, code‑compliant designs while juggling budgets,
    multidisciplinary teams, and emerging technologies, balancing a curious eye for innovation with a grounded, flexible approach, and eyeing a future consultancy and boutique firm for sustainable, affordable
    housing.
  sports: Cheick Phillips enjoys low‑key fitness through weekend fishing trips at Lake Zorinsky and leisurely walks along the Douglas County trail system, follows the Omaha Storm Chasers baseball club and
    the Nebraska Cornhuskers football team with devoted, albeit relaxed, fandom, and occasionally participates in a local senior softball league, preferring small‑group, moderate activity over intense gym
    sessions.
  arts: Cheick Phillips captures urban decay and natural landscapes with a vintage Leica, reads the works of Frank Lloyd Wright and Le Corbusier, and loses themselves to the sounds of Miles Davis and B.B. King,
    turning these inspirations into intricate wooden models of historic houses, while occasionally attending gallery openings at the Omaha Museum of Art to stay connected to contemporary photography and
    design trends.
  travel: Cheick Phillips favors contemplative, road‑trip style travel that balances historic architecture with Southern hospitality, having explored Savannah’s cobblestone squares, Asheville’s craft‑brew
    scene, and the historic districts of New Orleans for jazz and cuisine, while planning future visits to Florence’s Renaissance palazzos and the Pacific Northwest’s rain‑soaked forests, often arranging
    trips on a whim but keeping a modest budget for overnight B&B stays.
  culinary: Cheick Phillips delights in cooking Southern comfort fare such as shrimp and grits, fried chicken, collard greens, and sweet‑potato casserole, seasoning dishes with garden‑fresh herbs like thyme
    and rosemary, while polishing their flat‑top grill with a jazzy soundtrack, though they sometimes over‑salt their sauces when distracted by a phone call.
  core: Cheick Phillips, a 58‑year‑old architectural manager who merges pragmatic design expertise with a solitary love for woodworking, gardening, and jazz‑infused cooking, yet often drifts into relaxed
    disorganization, preferring flexibility over rigid planning.
background:
  cultural: Cheick is a Black man raised in the South, whose family roots trace back to the Great Migration and the vibrant culture of Atlanta's historic Black neighborhoods. He grew up attending a close‑knit
    Baptist church, where music, community service, and storytelling were central. This heritage instilled in him a strong sense of resilience, respect for tradition, and a deep appreciation for African‑American
    culinary and musical traditions. While navigating a predominantly white engineering field, he has drawn on his cultural values of perseverance and collective uplift, often serving as a mentor to younger
    Black professionals and participating in local initiatives that celebrate and support Black history and economic empowerment.
attributes:
  skills: '[''Architectural design'',''Structural engineering fundamentals'',''Construction project management'',''Budgeting and cost estimation'',''Georgia building codes compliance'',''AutoCAD'',''Revit
    BIM'',''Team leadership'',''Client communication'',''Problem‑solving'',''Site inspection'',''Sustainable design'',''Quality control'',''Negotiation'']'
  hobbies: '[''Reading architecture and design books'',''Woodworking and model making'',''Gardening'',''Fishing'',''Photography'',''Cooking Southern cuisine'',''Listening to jazz and blues music'',''Attending
    small seminars on sustainable building'']'
  career_goals: Looking ahead, Cheick aims to transition into a consultancy role where he can mentor younger professionals and champion sustainable building practices in the Douglas County area. He plans
    to obtain a Project Management Professional (PMP) certification to formalize his project‑lead expertise and hopes to launch a boutique design firm focused on affordable, energy‑efficient housing for
    the local community. He also envisions giving back through workshops at local historically Black colleges and community centers.
