personas:
  professional: Ryan Shafei, a hands‑on civil engineer with deep expertise in site surveying, concrete mix design, and structural drafting, leverages AutoCAD, Revit, and SAP2000 to resolve on‑site challenges,
    yet frequently battles deadline pressure due to a spontaneous, skeptical mindset that values flexible problem‑solving over strict schedule adherence.
  sports: Ryan Shafei avidly tracks the Detroit Lions and Michigan Wolverines, participates in a local shooting club for seasonal hunting excursions, and joins the Upper Peninsula fly‑fishing association
    for lake outings, blending quiet solitary sport with occasional enthusiastic attendance at home games where they cheer in a reserved but competitive manner.
  arts: Ryan Shafei fuels their creative drive by designing intricate model‑railway layouts inspired by John Allen, unwinding to Bob Dylan and Jack White while hand‑crafting furniture, and regularly revisiting
    classic films starring Meryl Streep, allowing these artistic experiences to shape both their engineering precision and personal leisure.
  travel: Ryan Shafei enjoys meticulously plotted road trips to rugged locales such as Michigan’s Upper Peninsula, Banff National Park, and the Scottish Highlands, yet deliberately leaves space for spontaneous
    detours to hidden fishing spots, balancing structured itineraries with a yearning for unplanned wilderness discoveries despite limited vacation days.
  culinary: Ryan Shafei’s culinary tastes favor hearty Midwestern dishes like smoked lake trout, wild mushroom risotto, and venison chili seasoned with locally harvested thyme and maple syrup, and their
    cooking skill spans confident backyard grilling to the disciplined art of maintaining a sourdough starter, reflecting a blend of practical nourishment and hands‑on craftsmanship.
  core: Ryan Shafei is a meticulous civil engineer who juggles a love for structured project management with a spontaneous, skeptical approach to problem‑solving, while navigating cautious financial habits,
    stress‑related health issues, and a solitary hobby repertoire that underscores a constant tension between reliability and creative freedom.
background:
  cultural: Ryan grew up in a small, predominantly white community in Kalkaska County, Michigan, where his family’s ancestry traces back to German and Scandinavian settlers. The Midwestern values of self‑reliance,
    hard work, and modesty shaped his upbringing, yet his personality leans more toward independence and personal achievement than communal harmony. He is familiar with the seasonal rhythms of northern
    Michigan—cold winters, lake‑summer recreation, and a strong connection to the outdoors. While he respects local traditions, he often prefers solitary pursuits and values practical, results‑oriented
    approaches over social gatherings.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''SAP2000 structural analysis'', ''Construction site inspection'', ''Concrete mix design'', ''Cost estimation'', ''Construction safety compliance'', ''Project risk assessment'',
