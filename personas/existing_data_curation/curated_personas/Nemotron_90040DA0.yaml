  hobbies: '[''Fly fishing'', ''Woodworking'', ''Model railway building'', ''Chess'', ''Hunting'', ''Trail hiking'', ''DIY home improvement'', ''Classic car restoration'', ''Reading (history & engineering)'',
    ''Camping'']'
  career_goals: Ryan aims to obtain his Professional Engineer (PE) license and move into a senior project manager role within the next five years, where he can lead small, autonomous teams on rural infrastructure
    projects. He is interested in eventually launching his own consulting firm that specializes in cost‑effective, sustainable road and bridge solutions for small communities in northern Michigan. While
    he values the stability and predictability of a structured work environment, he also seeks enough flexibility to manage his stress and avoid overly rigid schedules that clash with his spontaneous side.
    He hopes to improve his time‑management skills to meet deadlines more reliably and to build a reputation as a reliable, yet innovative, engineer.
