persona_description: A historian who is interested in studying the impact of the First World War on Imperial Germany and the military aspects of the conflict. They are likely to be familiar with the topics
  of military mobilization, diplomacy, politics, and industrialization during the war. They may also have a particular interest in the history of Germany during the war, as well as the history of war and
  society. They are likely to be interested in the latest scholarship and have a strong understanding of the coverage of military action outside Europe, military occupation, prisoners of war, and the memory
  of war. They may also have a background in German and European history, and be interested in the history of war and society.
