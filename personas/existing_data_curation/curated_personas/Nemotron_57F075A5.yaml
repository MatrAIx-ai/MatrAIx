  hobbies: '[''Pickup basketball'', ''Pickup soccer'', ''Hiking in Marin Headlands'', ''Biking on Bay Trail'', ''DIY home improvement'', ''Electronics tinkering'', ''Attending construction trade shows'',
    ''Reading industry magazines'', ''Live music concerts'', ''Volunteering at community shelters'']'
  career_goals: Mark aims to advance from operator to site supervisor within the next three years, obtaining NCCCO certification for crane operation and completing an associate degree in construction management.
    He aspires to take on greater responsibility for project planning and safety management, eventually moving into a construction manager role overseeing multiple crews. Long‑term, he envisions launching
    his own equipment rental and consulting business, leveraging his extensive operational knowledge and industry network. He is also interested in mentoring younger operators and advocating for sustainable
    construction practices.
