  hobbies: '[''Sketching and digital illustration'', ''3D printing artistic and functional prototypes'', ''Visiting art galleries and museums'', ''Attending Kansas City jazz and blues concerts'', ''Craft‑beer
    tasting at local breweries'', ''Hiking in nearby parks and nature trails'', ''Arduino and Raspberry Pi tinkering'', ''Playing acoustic guitar'', ''Strategy board games (e.g., Settlers of Catan, Risk)'',
    ''Participating in maker fairs and hackathons'']'
  career_goals: Thomas aims to advance to a senior engineering technologist role within the next three to five years, leading small cross‑functional teams on innovative product development projects. He
    plans to earn professional certifications such as Certified Engineering Technician (CET) and Six Sigma Green Belt, and eventually pursue a Master’s in Engineering Management to broaden his strategic
    and leadership capabilities. Long‑term, he envisions launching his own consultancy that blends engineering solutions with artistic design, allowing him to create functional yet aesthetically compelling
    products while maintaining a healthy work‑life balance with his spouse.
