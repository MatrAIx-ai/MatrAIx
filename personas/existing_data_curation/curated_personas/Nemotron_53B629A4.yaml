personas:
  professional: R Brannen is a 25‑year‑old engineering technologist who merges precise SolidWorks and AutoCAD designs with artistic illustration, applying Lean Six Sigma to drive process improvements while
    questioning unverified vendor claims; they aim to lead cross‑functional teams, earn CET and Six Sigma Green Belt certifications, and eventually launch a consultancy that fuses engineering rigor with
    aesthetic design.
  sports: R Brannen is a 25‑year‑old outdoor enthusiast who hikes the trails of Rock Bridge State Park and buffers their week with weekend runs, fervently supports the Kansas City Chiefs and Royals, and
    joins a local ultimate frisbee league where their competitive streak drives them to lead the team’s strategic plays.
  arts: R Brannen immerses themselves in Kansas City’s cultural scene by sketching at the Nelson‑Atkins Museum, attending live performances by jazz saxophonist Joshua Redman and blues guitarist Derek Trucks,
    curating playlists that blend Miles Davis with Joni Mitchell, and using digital illustration tools to reimagine classic album covers, reflecting their curiosity and love for blending art with technology.
  travel: R Brannen prefers meticulously budgeted weekend road trips that combine craft‑beer tours in Portland, Oregon, and scenic hikes in the Ozarks, yet they daydream of an extended stay in Kyoto, Japan
    to study traditional tea ceremonies and cutting‑edge design studios, balancing a structured itinerary with spontaneous detours.
  culinary: R Brannen enjoys moderate cooking skills, often preparing Kansas City‑style BBQ ribs seasoned with smoked paprika, brown sugar, and Worcestershire sauce, pairing them with craft IPAs like Boulevard
    Brewing’s “Murder the Whales,” and experimenting with 3D‑printed chocolate molds for artistic desserts during relaxed evenings.
  core: R Brannen is a curiosity‑driven engineer who balances meticulous design work with a competitive maker spirit, a passion for jazz and craft beer, and a habit of late‑night tinkering that sometimes
    compromises sleep.
background:
  cultural: Thomas was raised in a Midwestern white family in the Kansas City metropolitan area, where values such as hard work, community, and modesty are emphasized. His upbringing blended the region’s
    strong DIY and maker culture with traditions of family gatherings, local BBQ, and a love for the Kansas City Chiefs. While he grew up with familiar Midwestern customs, his curiosity has led him to seek
    out diverse artistic and intellectual experiences, fostering an appreciation for both local heritage and broader cultural perspectives.
attributes:
