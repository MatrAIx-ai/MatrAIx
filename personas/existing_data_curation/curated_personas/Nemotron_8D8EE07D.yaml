personas:
  professional: Hugo Garza is an aspiring visual communications student whose curiosity and collaborative spirit drive them to blend hand‑drawn comics with digital illustration, leveraging Procreate, Canva,
    and basic coding in Scratch to prototype interactive stories while they organize school art exhibitions with the same reliable, flexible approach they bring to group projects.
  sports: Hugo Garza devotes weekend afternoons to playing forward for the Southside Youth Soccer Club, cheers on the LA Galaxy during MLS matches, and they use quick‑fire drills to stay fit, reflecting
    their energetic, sociable nature and love for team camaraderie.
  arts: Hugo Garza channels their love for graphic storytelling by sketching comic panels inspired by Frank Miller’s noir style and the vibrant colors of Alphonse Mucha, while they unwind listening to Carlos
    Vives and Shakira, and they regularly attend live salsa nights where they dance to Tito Puente’s timbales, weaving these influences into their burgeoning digital portfolio.
  travel: Hugo Garza dreams of passport stamps from Cartagena’s historic walled city and the bustling streets of Tokyo, yet they often explore nearby cultural festivals in San Antonio and weekend road trips
    to the Santa Fe art scene, planning each adventure on a shared Google doc with friends to balance spontaneity and budget constraints.
  culinary: Hugo Garza enjoys crafting homemade arepas filled with shredded cheese and avocado, experimenting with spicy ají dulce in a salsa that reminds them of family gatherings, while they remain a
    confident home‑cook who often pairs their meals with a side of freshly brewed cold brew coffee and a playlist of Cumbia classics.
  core: Hugo Garza is a bilingual, endlessly curious teen who sketches stories on the back of grocery receipts, dances salsa between homework breaks, and they meticulously save spare change for a future
    art studio, all while never missing a chance to perfect their coffee‑stained sketchbook margins.
background:
  cultural: Hugo is a first‑generation Colombian‑American raised in Katy, Texas. His household blends Colombian traditions—Spanish language, family meals featuring arepas and empanadas, and celebrations
    of holidays like Día de la Independencia—with the multicultural influences of the Houston metro area. He participates in local Colombian community events, dances to salsa and cumbia, and maintains close
    ties to his extended family in Bogotá. This bicultural upbringing shapes his worldview, fueling his appreciation for art, storytelling, and community connection.
attributes:
  skills: '["Spanish-English bilingual", "Sketching and illustration", "Digital graphic design (Canva, Procreate)", "Basic photo and video editing (iMovie)", "Scratch programming", "Team project coordination",
    "Event organization", "Salsa dancing", "Guitar basics"]'
  hobbies: '["Sketching", "Digital illustration", "Photography", "Salsa dancing", "Playing guitar", "Soccer", "Attending cultural festivals", "Reading graphic novels"]'
  career_goals: Hugo envisions pursuing a degree in visual communications or multimedia arts at a university. He aspires to become a creative director or content creator, blending his artistic talent with
    storytelling to produce culturally resonant media. He hopes to develop a platform that showcases the stories of Colombian‑American youth, and eventually work in marketing or cultural programming for
    community organizations. In the short term, he aims to build a robust portfolio, participate in youth art competitions, and secure internships in graphic design studios or local media outlets.
