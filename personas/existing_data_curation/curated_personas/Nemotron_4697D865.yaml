personas:
  professional: Bridget Westbrook, a senior software quality assurance specialist with deep expertise in manual and automated testing using Selenium, JIRA, and TestRail, they leverage their blend of curiosity
    and practicality to design robust test frameworks while assertively mentoring junior analysts within Agile and DevOps pipelines.
  sports: Bridget Westbrook, an avid hiker and occasional cross‑country skier, frequents the Golden Trail Runners club for weekend mountain treks, roots for the Colorado Avalanche and Denver Broncos, and
    balances a modest fitness routine with a love for low‑impact yoga, though they sometimes skip a morning stretch when work stress spikes.
  arts: Bridget Westbrook, a landscape photographer who captures sunrise over the Rockies with a reverence for Ansel Adams, devotes evenings to knitting scarves while listening to Johann Sebastian Bach,
    and enjoys mystery novels by Agatha Christie and contemporary folk music from Iron & Wine, weaving these artistic threads into a reflective personal tapestry.
  travel: Bridget Westbrook, a measured traveler who prefers road‑trip explorations of national parks like Yosemite and Glacier, dreams of a summer pilgrimage to Iceland’s volcanic vistas to connect with
    ancestral reverence for nature, and plans each outing with a detailed itinerary to avoid the anxiety of last‑minute changes.
  culinary: Bridget Westbrook, a home‑gardener who harvests native herbs to craft herb‑infused olive oil for grilled trout and wild mushroom risotto, delights in brewing pour‑over coffee and brewing herbal
    tea, yet has a quirk of over‑salting dishes when distracted by lingering work concerns.
  core: Bridget Westbrook, a meticulous QA veteran who balances curiosity with caution, finds solace in mountain photography and knitting, yet wrestles with persistent worry that colors both work and leisure.
background:
  cultural: Bridget is an American of predominantly Northern European ancestry, with family roots tracing back to German and Scandinavian immigrants. She grew up in a suburban community near Denver, where
    a blend of outdoor recreation and modest, self‑reliant values shaped her worldview. The local culture emphasized hard work, community involvement, and a love for the natural environment—principles she
    carries into her professional and personal life. Now residing in Golden, Colorado, she participates in the town’s historic preservation activities and local arts events while maintaining a private,
    family‑centered lifestyle.
