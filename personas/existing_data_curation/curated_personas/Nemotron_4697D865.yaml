  hobbies: '[''Hiking in the Rockies'', ''Landscape photography'', ''Reading mystery novels'', ''Gardening native plants'', ''Knitting'', ''Volunteer STEM mentorship for middle school girls'', ''Mindfulness
    meditation'', ''Playing board games with close friends'']'
  career_goals: 'Bridget aims to transition into a leadership role where she can shape quality assurance strategy for her organization. She intends to earn advanced certifications such as ISTQB Advanced
    Test Manager and explore AI‑driven testing frameworks to increase efficiency. Mentoring junior analysts is a priority; she wants to build a supportive, collaborative QA team that embraces both proven
    methods and innovative practices. Over the next five years, Bridget also hopes to consult for smaller tech firms in the Rocky Mountain region, helping them adopt robust QA processes while maintaining
    a healthy work‑life balance to manage stress.

