  hobbies: '[''Hiking'', ''Nature photography'', ''Bird watching'', ''Reading non-fiction'', ''Playing acoustic guitar'', ''Board games'', ''Community trail volunteering'', ''Camping'']'
  career_goals: Steven aims to advance within the United States Postal Service by securing a supervisory role, such as a post office manager or route supervisor, within the next five years. To prepare,
    he plans to enroll in an associate’s degree program in Business Administration or Logistics while continuing full‑time work. He is focused on building leadership and personnel management skills, with
    the long‑term ambition of overseeing a small team and improving operational efficiency in his community’s post office. Additionally, Steven dreams of leveraging his logistical expertise to transition
    into a supply‑chain role for a regional outdoor‑equipment retailer, combining his professional growth with his love of the local outdoors.
