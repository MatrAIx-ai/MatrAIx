  hobbies: '[''Digital painting'', ''Generative art coding'', ''Photography'', ''Reading science‑fiction and classics'', ''Playing chess'', ''Walking in nature'', ''Attending small art exhibitions'', ''Participating
    in local coding meet‑ups'']'
  career_goals: Henry aims to transition from corporate development to more creatively driven projects that merge code with visual art, such as interactive installations or generative art platforms. He
    hopes to mentor junior developers in small, collaborative settings where he can share his breadth of experience while fostering a supportive, low‑pressure environment. Over the next five years, he plans
    to contribute to open‑source creative‑tech libraries, take on part‑time consulting for local arts organizations, and eventually establish a boutique studio focused on custom digital experiences that
    prioritize user harmony and aesthetic exploration.
