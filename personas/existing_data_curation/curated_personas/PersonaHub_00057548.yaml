persona_description: A cosmologist who specializes in the study of the evolution of measurements of the rate of the Universe's expansion, including the Hubble Constant, over the past two decades. They are
  particularly interested in understanding the tension between two radically different methods of estimating the Hubble Constant, one using the local, mature Universe and one based on the distant, infant
  Universe. They have a unique perspective on the interplay between the local and distant Universe and the underlying cosmological model that fits observations of the cosmic microwave background.
