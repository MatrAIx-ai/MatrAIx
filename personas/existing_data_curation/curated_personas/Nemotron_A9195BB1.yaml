  hobbies: '[''Gardening'', ''Walking along the Atchafalaya River'', ''Church social events'', ''Book club'', ''Crocheting and quilting'', ''Cajun cooking'', ''Birdwatching'', ''Genealogy research'', ''Volunteer
    work at the senior center'']'
  career_goals: Although retired from the formal workforce, Tiffany aims to expand her impact as a lead volunteer organizer for the local senior center, mentor younger volunteers, and develop a community
    wellness workshop series. She also hopes to complete a gerontology certificate through a community college and compile a handwritten family recipe book for publication.
