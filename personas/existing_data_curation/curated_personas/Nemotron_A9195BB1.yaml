personas:
  professional: Tiffany Snodgrass, a retired senior support coordinator who now spearheads volunteer initiatives at the local senior center, applies her methodical event‑planning, budgeting, and conflict‑resolution
    expertise to launch a community wellness workshop series while eagerly mentoring younger volunteers, even as she frets over every detail to ensure nothing goes awry.
  sports: Tiffany Snodgrass enjoys leisurely walks along the Atchafalaya River, participates in a senior softball league with the Bayou Bend Bombers, and passionately follows the New Orleans Saints and
    the LSU Tigers, balancing gentle exercise with fandom for regional teams.
  arts: Tiffany Snodgrass expresses creativity through crocheting and quilting, finds solace in the folk melodies of Zachary Richard and the vibrant paintings of George Rodrigue, and engages in her small‑town
    book club where they regularly discuss works by Sue Monk Kidd and local Louisiana authors, blending literary and visual arts into her social calendar.
  travel: Tiffany Snodgrass prefers short, well‑planned road trips to nearby cultural gems such as the historic French Quarter in New Orleans, the pine‑forest retreat of Natchitoches, and occasional cruises
    to the Bahamas, balancing a modest travel budget with a desire for both relaxation and the chance to photograph native wildlife along the bayous.
  culinary: Tiffany Snodgrass, a self‑taught Cajun cook, expertly prepares gumbo with okra, andouille sausage, and filé powder, whips up jambalaya for family gatherings, and experiments with a Creole‑inspired
    shrimp étouffée, all while savoring the aroma of fresh herbs from her garden and occasionally indulging in a pecan pie that she claims is her secret weapon for winning bake‑sale contests.
  core: Tiffany Snodgrass is a detail‑oriented, community‑driven gardener who channels her worries into meticulous volunteer work, finds joy in crochet patterns and Cajun cuisine, and never passes up a
    chance to watch a heron glide over the river.
background:
  cultural: Tiffany grew up in a small southern Louisiana community, surrounded by the region’s mix of Southern hospitality and Cajun cultural heritage. Raised in a Catholic family, she celebrated traditions
    such as Mardi Gras, zydeco music festivals, and community potlucks. The close-knit parish life fostered values of cooperation, self-reliance, and practical problem solving, which continue to influence
    her worldview and daily routines.
