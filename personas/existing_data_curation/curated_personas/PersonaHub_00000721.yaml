persona_description: A clinical trial investigator who is conducting a randomized phase III trial to compare the effectiveness of radiation therapy with or without chemotherapy in treating patients with
  anaplastic oligodendroglioma. The investigator is specifically interested in comparing the overall survival and time to tumor progression in patients with unifocal or multifocal, supratentorial, pure
  or mixed anaplastic oligodendroglioma treated with radiotherapy with or without procarbazine, lomustine, and vincristine (PCV). The investigator is also interested in comparing the toxic effects of these
  2 regimens in these patients and the quality of life and neurologic function of patients treated with these 2 regimens. The investigator is expected to accrue 146 patients per arm for the study within
  5.4 years.
