  hobbies: '[''Bowling League'', ''Vintage Car Restoration'', ''Genealogy Research'', ''Fishing Trips'', ''Community Volunteer Work'', ''Hiking with Friends'', ''Bridge (Card Game)'', ''True Crime Book
    Club'', ''Neighborhood Watch Coordination'', ''Attending Local Music Festivals'']'
  career_goals: Approaching the end of his formal police career, Erik wants to transition into roles that let him stay connected to public safety while enjoying greater flexibility. He aims to serve as
    a community liaison or safety advisor for Northfield, helping design neighborhood‑watch apps and senior‑citizen safety workshops. He also plans to mentor junior officers through a senior‑officer mentorship
    program and explore a part‑time consultancy offering security assessments for local businesses. Long‑term, Erik hopes to author a memoir that reflects on the evolution of policing, blending the practical
    wisdom of his early years with the curiosity he has for modern technology.
