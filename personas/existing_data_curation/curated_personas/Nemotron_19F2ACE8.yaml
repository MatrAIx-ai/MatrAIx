  hobbies: '[''Building wooden block towers'', ''Picture-matching games'', ''Crayon drawing'', ''Listening to library storytime'', ''Singing nursery rhymes'', ''Playing at the playground'']'
  career_goals: Although only four, Anita often talks about what she wants to be when she grows up. She expresses a clear interest in roles that involve organization and helping others, such as a kindergarten
    teacher who can create a structured classroom, a children's librarian who keeps books in order, or a pediatric nurse who follows clear care routines. Her ambition is driven by the desire to maintain
    familiar patterns and provide reliable support to friends and family.
