personas:
  professional: Anita Carlson, a four-year-old aspiring toy librarian, meticulously arranges her stuffed animals by size and color each morning, treats playtime like a structured schedule, and insists on
    completing her puzzle-piece assignments before moving on, reflecting her routine-loving, methodical nature.
  sports: Anita Carlson, a four-year-old enrolled in the Tiny Tots Soccer Club, passionately follows the New York Yankees and the local professional baseball team, attends weekly T-ball practice, and enjoys
    a structured routine of weekend family hikes, blending her love for routine with energetic play.
  arts: Anita Carlson, a four-year-old who loves drawing with Crayola crayons, singing along to The Wiggles and Raffi, and watching Disney's Frozen, routinely visits the nearby children's museum on Saturdays,
    and delights in reenacting her favorite story scenes, demonstrating how creative expression shapes her daily life.
  travel: Anita Carlson, a four-year-old who enjoys family road trips to the beach, has visited Disneyland in California, dreams of exploring the Grand Canyon, and prefers vacations that follow a familiar
    daily schedule with bedtime rituals intact, reflecting her need for routine while satisfying her curiosity.
  culinary: Anita Carlson, a four-year-old who delights in mac and cheese, chicken nuggets, strawberry slices, and carrot sticks, helps stir pancake batter, arranges fruit into smiley faces on plates, and
    insists on eating meals at the same time each day, showcasing her organized approach to food and playful culinary quirks.
  core: Anita Carlson is a routine-loving, organized four-year-old who turns playtime into a structured schedule, meticulously manages her piggy bank, and balances diligent health habits with occasional
    forgetfulness.
background:
  cultural: Anita is raised in a white, middle-class family in Chicago’s North Side. Her parents emphasize Midwestern values such as punctuality, politeness, and community involvement. She celebrates traditional
    holidays like Thanksgiving, Christmas, and Fourth of July with family meals and neighborhood parades. The multicultural environment of Chicago exposes her to diverse foods and languages at the community
    center, while her family maintains a routine of weekly visits to the local park and library, reinforcing her love for structure and familiar community rhythms.
attributes:
  skills: '[''Sorting toys by color and type'', ''Following multi-step instructions for chores'', ''Matching shapes and completing puzzles'', ''Counting objects up to twenty'', ''Reciting songs in order'',
