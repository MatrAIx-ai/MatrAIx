personas:
  professional: Uriah Starks, a 12‑year‑old robotics club member, combines a practical, reality‑focused mindset with a love for spontaneous tinkering, excelling at building functional prototypes and coding
    simple bots while thriving in team‑oriented projects despite occasional disorganization and a lingering worry about competition deadlines.
  sports: Uriah Starks, an avid after‑school basketball player for the Eastside Middle School Hoops Club, idolizes the Chicago Bulls and practices daily drills, pairing high‑energy street‑ball games with
    weekend soccer matches to stay fit while seeking harmony with teammates and occasionally stressing over performance in friendly tournaments.
  arts: Uriah Starks, a hip‑hop dance enthusiast, spends evenings mastering moves to tracks by Kendrick Lamar and SZA, devours Spider‑Man comic books, and sketches vibrant graffiti‑style doodles on school
    notebooks, using these artistic outlets to channel social energy and soothe the worry that surfaces after intense gaming sessions.
  travel: Uriah Starks prefers spontaneous family road trips, recalling a memorable weekend in Washington, D.C., visiting the National Museum of Natural History, while dreaming of a future trip to Tokyo’s
    Akihabara district to explore gaming culture, though limited allowance and school commitments often temper longer adventures.
  culinary: Uriah Starks loves pepperoni pizza, homemade mac and cheese topped with extra cheddar, and avocado toast drizzled with lime‑squeezed olive oil, though cooking skill peaks at quickly assembling
    snack plates after basketball practice, and they sometimes skip nutritious meals in favor of sugary cereal when homework piles up.
  core: Uriah Starks blends buzzing energy with a habit of misplacing school assignments while obsessively tracking Fortnite achievements, making them a charismatic yet occasionally frazzled 12‑year‑old
    who balances structure‑like budgeting with impulsive snack grabs.
background:
  cultural: Uriah is an African‑American growing up in Antelope, California, within a close‑knit Black family that values community, faith, and cultural heritage. He regularly attends his church's youth
    group, where he participates in fellowship activities and community outreach. Family gatherings feature traditional soul food and music, and he celebrates African‑American milestones such as Black History
    Month with school projects and local events. The diverse environment of Sacramento County exposes him to a blend of cultures, while West Coast hip‑hop influences shape his musical tastes and personal
    style.
