persona_description: A biologist or environmental engineer who specializes in the field of anaerobic digestion, particularly in wet processes. They are familiar with the technological solutions and processes
  involved in the digestion of organic waste, including the use of cylindrical tanks (CSTR) in dry matter content of 10% or less, and the considerations needed in the feasibility and design study phases.
  They have experience with the operation and maintenance of anaerobic digesters and are knowledgeable about the characteristics of each system, including the retention times and the mixers used for homogenization
  and heat distribution.
