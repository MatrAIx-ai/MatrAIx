persona_description: A pioneer in wireless communication and academic leader, with a background in microwave and millimeter wave research. Known for his work at the Polytechnic Institute of Brooklyn and
  the establishment of the Microwave Research Institute. His expertise in microwave techniques and radar systems during World War II was crucial to U.S. efforts. Left the School of Engineering with an enhanced
  global reputation and stellar academic status, leaving it on solid financial footing with the launch of the PRD Company.
