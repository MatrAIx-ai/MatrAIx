personas:
  professional: Nelson Perez, a seasoned 52‑year‑old full‑stack developer and cloud architect with over 25 years of experience, channels his methodical, organization‑driven mindset and talkative charisma
    into leading technical strategy, rigorous code reviews, and community mentorship while eyeing a transition to Engineering Manager or CTO roles that allow him to steer large‑scale cloud migrations and
    shape high‑performance teams.
  sports: Nelson Perez plays midfield for a local amateur soccer club, cheers passionately for Real Madrid and the LA Galaxy, hits the waves at La Jolla Cove on weekends, and hikes Torrey Pines’ coastal
    trails, treating fitness as a competitive outlet but occasionally trading a planned workout for a board‑game night.
  arts: Nelson Perez strums flamenco guitar inspired by Paco de Lucía and performs nightly jams of traditional Spanish folk, frequents screenings of Pedro Almodóvar films, and collects vinyl records of
    jazz guitarist Wes Montgomery, letting his love of music and performance fuel his talkative presence at tech meetups.
  travel: Nelson Perez maps his trips months ahead, blending cultural immersion with surf adventures, having explored Barcelona’s Gothic Quarter, Seville’s Feria de Abril, and a photography‑focused road
    trip to Big Sur, while dreaming of a sunrise hike in the Sierra Nevada and a weekend getaway to the Azores.
  culinary: Nelson Perez cooks elaborate paella with saffron, chorizo, and fresh mussels for his friends, masters the art of toasted tortilla española, and pairs each meal with a glass of sherry, though
    he occasionally over‑season dishes while multitasking between a code review and a simmering pot.
  core: Nelson Perez blends a structured, results‑driven work ethic with a sociable, competitive spirit, turning every project, recipe, and surf session into a meticulously planned yet lively performance.
background:
  cultural: Nelson is a second‑generation Spanish American whose family originated from Andalusia. Raised in a bilingual household in Southern California, he is fluent in both Spanish and English and integrates
    his heritage into daily life through food, music, and community involvement. He regularly attends the San Diego Spanish Cultural Festival, celebrates traditional holidays such as Semana Santa and Día
    de los Reyes, and participates in local Hispanic professional networks. His cultural roots inform his collaborative style, emphasis on personal relationships, and appreciation for communal celebrations,
    while also shaping his passion for mentoring and giving back to the community.
