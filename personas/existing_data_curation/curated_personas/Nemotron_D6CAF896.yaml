  career_goals: Nelson aims to transition from senior individual contributor to strategic technology leadership. He is targeting roles such as Engineering Manager or Chief Technology Officer where he can
    shape architectural roadmaps, lead large‑scale cloud migration projects, and cultivate high‑performance engineering teams. To support this, he plans to earn advanced cloud certifications (AWS Solutions
    Architect – Professional, Azure Solutions Architect) and spearhead a company‑wide DevOps transformation. In the longer term, he envisions launching his own consultancy that assists legacy enterprises
    in modernizing their software stacks while providing mentorship and training to emerging developers. He also seeks to become a regular speaker at regional tech conferences and to expand his influence
    within the Hispanic professional tech community.
