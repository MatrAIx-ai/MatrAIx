  career_goals: Juan dreams of becoming an architect who designs vibrant, eco‑friendly homes inspired by Mexican folk art, and he also imagines one day curating a museum where children can explore art from
    around the world. He is fascinated by the idea of creating spaces where creativity and nature intersect, and he aspires to study both design and environmental science when he grows older.
