personas:
  professional: Joseph Dejesus, a retired handyman‑turned‑community mentor, leverages decades of carpentry, small‑engine repair, and bilingual communication to run hands‑on workshops for neighbors, and
    they let their spontaneous curiosity guide lesson plans, often ignoring strict timelines but ensuring participants walk away with practical know‑how.
  sports: Joseph Dejesus enjoys low‑impact morning walks along the Beaufort shoreline and occasional casual fishing tournaments, cheering on the Carolina Panthers in football season and the Charleston Battery
    in soccer, and they consider their practical hands‑on activities as the primary fitness regimen rather than organized gym workouts.
  arts: Joseph Dejesus finds artistic solace strumming folk ballads on a modest acoustic guitar, often blending in lively cumbia rhythms inspired by Carlos Vives while singing Dylan or Nelson classics,
    and they spend evenings reading historical novels by Ken Follett and attending community folk‑dance nights featuring local fiddler Maria Santos.
  travel: Joseph Dejesus favors relaxed, road‑trip style travel, often exploring historic coastal towns like Savannah and Charleston and dreaming of a sun‑kissed getaway to Caribbean islands such as Aruba
    or Barbados where they can fish the turquoise waters and discover tropical herbs for their garden.
  culinary: Joseph Dejesus, an accomplished home chef, delights in recreating hearty dishes such as bandeja paisa, arroz con pollo, and sancocho, infusing them with Southern twists like smoked sausage,
    heirloom tomatoes, and fresh cilantro, and they constantly experiment with homemade spice blends using cumin, achiote, and local peppers.
  core: Joseph Dejesus is a curious yet practical 70‑year‑old retiree who blends hands‑on craftsmanship, bilingual storytelling, and inventive cooking, while occasionally forgetting to tidy their schedule
    and they indulge in spontaneous fishing bait experiments.
background:
  cultural: 'Joseph was born in Medellín, Colombia, and moved to the United States with his family in the early 1960s, settling first in New York before relocating to the coastal town of Beaufort, South
    Carolina, in the 1970s. His Colombian heritage remains a vibrant part of his identity: he speaks fluent Colombian Spanish, celebrates Carnaval, Día de los Muertos, and enjoys traditional music such
    as vallenato and cumbia. He integrates these traditions with Lowcountry Southern culture, participating in local shrimp festivals, sharing his love of coffee, and swapping recipes that blend Colombian
    spices with Southern ingredients like grits and okra. His wife, who passed away two years ago, was also Colombian, and together they cultivated a household that blended Latin hospitality with Southern
    friendliness. Joseph maintains close ties with relatives in Colombia through regular video calls and annual visits, and he actively contributes to the modest Colombian diaspora community in nearby Charleston,
    offering translation assistance and cultural workshops.'
attributes:
  skills: '["Carpentry", "Small engine maintenance", "Bilingual Spanish-English translation", "Traditional Colombian cooking", "Home gardening and horticulture", "Community event coordination", "Basic first
