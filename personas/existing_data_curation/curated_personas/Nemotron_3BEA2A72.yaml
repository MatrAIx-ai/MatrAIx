  hobbies: '["Fishing", "Gardening", "Cooking traditional Colombian dishes", "Playing acoustic guitar", "Reading historical novels", "Walking on the beach", "Attending community festivals", "Storytelling",
    "Volunteer work at senior center"]'
  career_goals: Although retired, Joseph remains driven to share his knowledge and cultural heritage. He aspires to lead a weekly cooking class at the local community center where he teaches Colombian dishes
    to neighbors, fostering cross-cultural exchange. He hopes to mentor younger volunteers in practical home-repair skills, offering hands-on workshops that combine his curiosity for new techniques with
    his practical expertise. Joseph also plans to compile a small memoir of his immigration journey and the evolution of Colombian life in the Lowcountry, aiming to preserve these stories for future generations.
    He wishes to remain an active, supportive presence in Beaufort, contributing to local historical projects and continuing to honor his late wife's memory through charitable activities.
