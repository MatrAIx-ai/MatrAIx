  hobbies: '[''Attending art exhibitions and museum workshops'', ''Listening to live mariachi and regional music'', ''Senior folk‑dance classes'', ''Knitting and crocheting'', ''Watercolor painting'', ''Reading
    Mexican folklore and historical novels'', ''Photography (family events and coastal scenery)'', ''Backyard herb gardening'', ''Volunteering at senior‑center lunch program'', ''Singing in church choir'',
    ''Adult‑education classes (pottery, digital literacy)'']'
  career_goals: Even at 82, Emily’s ambitions focus on legacy and continued community contribution. She hopes to compile a family cookbook that captures her secret recipes and the stories behind them, sharing
    the cultural heritage with younger generations. She aspires to mentor her grandchildren and great‑grandchildren in cooking, gardening and craft skills, fostering intergenerational bonds. Emily also
    dreams of leading a weekly arts‑and‑crafts circle at the local senior center, where she can explore new mediums like pottery while encouraging peers to experiment with unconventional ideas. Maintaining
    her health and independence so she can attend local cultural festivals and remain an active voice in preserving Mexican‑American traditions in Corpus Christi remains a central goal.
