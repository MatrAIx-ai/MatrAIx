personas:
  professional: James Wells is an aspiring junior inventor who spends hours constructing intricate LEGO mechanisms and designing Minecraft worlds, channeling their organized, methodical nature and curiosity
    into early engineering projects, while their reliability makes them a go‑to helper for school science fair preparations.
  sports: James Wells plays catcher for the El Campo Tigers Little League baseball team, enjoys weekend practice sessions where their methodical nature shines in perfecting throws, and they cheer for the
    Houston Astros during spring while balancing solo bike rides in the woods with occasional family hikes.
  arts: James Wells immerses themselves in the imaginative worlds of Isaac Asimov and Orson Scott Card, sketches detailed illustrations of insects and rocks they collect, and relaxes to the sounds of country
    artists like Luke Bryan and Dolly Parton, often recreating scenes from their favorite stories with LEGO.
  travel: James Wells prefers structured family trips that blend learning and nature, having explored the San Antonio River Walk and the Space Center Houston with guided tours, while dreaming of a road
    trip to the Grand Canyon and a summer camp adventure in the Great Smoky Mountains.
  culinary: James Wells enjoys simple yet tasty meals such as spaghetti with meatballs, chicken nuggets with ketchup, and homemade peanut butter and jelly sandwiches, can whisk together scrambled eggs with
    a dash of cheese, and delights in the crunchy texture of apple slices sprinkled with cinnamon.
  core: James Wells is a quietly curious 8‑year‑old who blends meticulous LEGO engineering with a love for nature sketches, yet often worries about small setbacks and occasionally forgets to take their
    vitamins.
background:
  cultural: 'James comes from a white, rural Texas family in El Campo, Wharton County. His upbringing reflects Southern small‑town values: strong family bonds, a work ethic tied to farm life, and community
    participation in church services, county fairs, and Saturday baseball games. He enjoys Texas BBQ, country music, and the modest, cooperative spirit of his neighbors, while also being exposed to the
    Hispanic culture present in the broader community.'
