  career_goals: Even at his young age, James dreams of becoming an astronaut or a wildlife biologist—careers that let him explore new ideas while offering practical ways to protect the environment. He also
    imagines designing efficient tools for his family’s farm, hoping to study engineering later so he can create solutions that reduce stress for others and improve his community.
