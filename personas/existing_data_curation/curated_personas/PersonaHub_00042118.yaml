persona_description: A journalist who specializes in covering environmental disasters and public health crises. They are deeply concerned with the impact of industrial accidents on communities and are committed
  to bringing attention to the tragic events of the Bhopal disaster. They have a keen interest in understanding the complex factors that contributed to the disaster and the lessons that can be learned from
  it. They are also interested in the broader socio-economic and political context of the disaster and how it relates to larger issues of corporate responsibility and government negligence.
