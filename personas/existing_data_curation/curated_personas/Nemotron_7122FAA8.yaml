  career_goals: Jeffrey aspires to attend a specialized art or design program in high school and later pursue a Bachelor of Fine Arts in illustration, game design, or visual storytelling. He aims to become
    a concept artist for video games or animated films, while also developing a portfolio that could open freelance opportunities in graphic design. Recognizing his sensitivity to stress, he hopes to incorporate
    mindfulness practices into his workflow and eventually use his art to raise awareness about mental‑health challenges among peers.
