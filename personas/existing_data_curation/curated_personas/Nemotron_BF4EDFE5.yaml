  hobbies: '[''Watercolor painting'', ''Vegetable gardening'', ''Hiking'', ''Birdwatching'', ''Digital photography'', ''Attending public lectures'', ''Visiting art galleries'', ''Reading science history'',
    ''Book club participation'', ''Volunteer clean‑up coordination'']'
  career_goals: Ravina’s primary ambition is to continue contributing to her community by mentoring young volunteers, supporting local environmental conservation projects, and curating interdisciplinary
    art‑science workshops at the town library. She aims to complete a series of online courses on museum studies, write a memoir that connects her life in New Jersey with broader scientific and artistic
    themes, and travel to at least three major art museums in the United States over the next five years. Additionally, she hopes to serve on the board of a regional nonprofit focused on sustainable gardening
    and to lead a community garden initiative that integrates ecological education with creative expression.
