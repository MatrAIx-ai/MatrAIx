personas:
  professional: Michael Beasley, a 22‑year‑old aspiring HVAC apprentice, blends their hands‑on carpentry and small‑engine experience with polished customer‑service skills, preferring clear step‑by‑step
    training while occasionally drifting on paperwork, and envisions becoming a journeyman who eventually runs a trusted neighborhood service business.
  sports: Michael Beasley, a fan of the West Virginia Mountaineers football and the Pittsburgh Steelers, spends Saturdays hiking the nearby Appalachian Trail, casts lines at the Kanawha River, and joins
    a local intramural softball league that meets at the community park each weekend, where they often cheer loudly for their team.
  arts: Michael Beasley, who serenades their workshop with bluegrass legends like Bill Monroe and contemporary country storytellers such as Chris Stapleton, regularly attends live shows at the Charleston
    Civic Center and proudly displays handcrafted wooden furniture as a personal artistic outlet.
  travel: Michael Beasley, who prefers low‑cost road trips that blend outdoor adventure with occasional festival crowds, has explored Shenandoah National Park and Nashville’s country music scene, and they
    dream of driving to the Great Smoky Mountains and the vibrant streets of New Orleans once savings allow.
  culinary: Michael Beasley, a competent grill‑master who favors smoky barbecue ribs, pulled pork sandwiches with coleslaw, and buttery cornbread seasoned with smoked paprika, enjoys pairing meals with
    sweet tea and occasionally attempts homemade apple pie, though they sometimes over‑char the brisket in their enthusiasm.
  core: Michael Beasley is a pragmatic, community‑oriented 22‑year‑old who balances a love for hands‑on trades and bluegrass with a laid‑back approach to planning, often forgetting appointments but always
    showing up when friends need a helping hand.
background:
  cultural: Michael grew up in a working‑class, predominantly white community in Charleston, West Virginia, shaped by the region’s Appalachian heritage. His family values self‑reliance, community cooperation,
    and modest living, with many relatives having ties to the historic coal‑mining and manufacturing economy. He was raised with a mix of Southern hospitality and the practical, no‑frills outlook common
    in the Appalachian foothills. Church gatherings, high‑school football games, and local festivals have been regular cultural touchstones, instilling a strong sense of loyalty to his community, an appreciation
    for hard work, and a preference for straightforward, trustworthy relationships.
attributes:
  skills: '[''Basic Carpentry'', ''Fence Repair'', ''Small-Engine Maintenance'', ''Computer Troubleshooting'', ''Customer Service'', ''Cash Handling'', ''Teamwork'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Backyard Barbecues'', ''Woodworking'', ''Video Gaming'', ''Bluegrass/Country Music'', ''Volunteer Work'']'
  career_goals: Michael aims to secure a stable, hands‑on career with clear advancement pathways. He plans to enroll in a local trade apprenticeship, preferably in HVAC or electrical work, to develop a
    skilled trade that offers a predictable schedule and steady income. In the long term he hopes to become a journeyman and eventually run his own small service business, balancing structured work with
    the flexibility to take occasional freelance projects. He also intends to complete his GED, take community college courses in business fundamentals, and earn certifications that broaden his employability.
