  career_goals: Andrew aspires to become a concept artist for video games or film, creating original visual worlds that blend art and technology. He plans to earn his GED, attend a community college for
    graphic design or computer science, and eventually enroll in a specialized art institute. He hopes to build a professional portfolio that earns him freelance commissions and a scholarship for higher
    education. His competitive drive pushes him to enter art contests and coding hackathons, aiming for recognition that validates his skill and offers a pathway to a sustainable creative career.
