personas:
  professional: Andrew Dunlow, a 15‑year‑old aspiring digital artist and self‑taught coder, blends meticulous planning with a vivid imagination to craft detailed 3D models and experimental indie game prototypes,
    often thriving in solitary, focused sessions.
  sports: Andrew Dunlow channels their competitive edge into weekly chess matches at the Bowie Library’s chess club and avidly follows the Washington Wizards and Baltimore Ravens, yet prefers the quiet
    strategy of board games over team sports.
  arts: Andrew Dunlow immerses themselves in ambient electronic soundscapes by Brian Eno and Aphex Twin while creating digital illustrations inspired by speculative fiction authors like Ted Chiang, and
    they regularly browse ArtStation to study the works of contemporary concept artists such as Jama Jurabaev.
  travel: Andrew Dunlow’s travel style is low‑key and introspective, favoring solo day trips to Washington, D.C.’s Smithsonian museums and weekend hikes in Patuxent River State Park, while dreaming of an
    immersive journey to Iceland’s volcanic landscapes to sketch auroras.
  culinary: Andrew Dunlow enjoys a modest kitchen repertoire that includes whipping up avocado toast with poached eggs, mastering basic ramen broth, and experimenting with sous‑vide chicken using miso‑glaze,
    though they often rely on pizza delivery after late‑night coding sessions.
  core: Andrew Dunlow, a 15‑year‑old solitary dreamer, merges disciplined creativity with a persistent worry‑driven quest for perfection, balancing digital art, strategic chess, and cautious budgeting while
    occasionally succumbing to late‑night pizza and anxiety.
background:
  cultural: Andrew grew up in a predominantly white suburban neighborhood in Bowie, Maryland, within the diverse Prince George's County region. His family reflects middle‑class American values, with an
    emphasis on self‑discipline and academic achievement despite his current schooling challenges. Proximity to Washington, DC exposes him to a broad range of cultural institutions, such as museums and
    galleries, which he experiences mainly through online tours and occasional field trips. While his immediate community is largely homogeneous, he is aware of the multicultural fabric of the county, gaining
    indirect exposure through media, internet forums, and the occasional community event. His cultural identity blends the typical suburban American teen experience with a personal inclination toward introspection,
    artistic exploration, and a cautious view of social interactions.
