personas:
  professional: Eliza Bell blends a solid foundation in literary theory with hands‑on copyediting and developmental editing to shape inclusive manuscripts, balancing meticulous fact‑checking and style guide
    mastery with spur‑of‑the‑moment creative problem‑solving, though they sometimes wrestle with looming deadlines and rely on Trello and Pomodoro timers to stay afloat.
  sports: Eliza Bell follows the Cleveland Browns and the Cleveland Cavaliers with fervor, participates in a local Saturday morning running club that loops through the city’s lakefront park, and frequently
    signs up for community yoga‑fit challenges, though they often postpone personal gym visits when editorial deadlines surge.
  arts: Eliza Bell frequents the Cleveland Museum of Art to study works by Georgia O'Keeffe and contemporary photographer Carrie Mae Weems, writes poetry inspired by spoken‑word performances of Saïd Jones,
    and enjoys improv comedy nights at Playhouse Square, using these creative outlets to balance the precision of editing with spontaneous expression.
  travel: Eliza Bell plans trips that blend cultural immersion and relaxation, such as weekend getaways to Asheville’s craft breweries, a month‑long pilgrimage to New Orleans to explore Creole cuisine,
    and an upcoming solo journey to the historic streets of Savannah, all while juggling work commitments with meticulous itinerary spreadsheets.
  culinary: Eliza Bell experiments in the kitchen with Southern comfort foods like shrimp and grits and African‑inspired jollof rice with plantains, perfects a weekly batch of collard greens seasoned with
    smoked paprika, and delights friends with homemade injera pancakes, all while keeping a handwritten recipe journal that doubles as a stress‑relief sketchbook.
  core: Eliza Bell balances a love for meticulous editorial precision with a habit of last‑minute deadline scrambling, channels anxiety into yoga and creative cooking, and habitually over‑curates their
    bookshelf with a never‑finished reading list.
background:
  cultural: Eliza is an African‑American woman whose family roots trace back to the Great Migration, with grandparents who moved from the rural South to Cleveland in the mid‑20th century. Growing up in
    Cuyahoga County, she was immersed in the city’s vibrant Black cultural scene—church choirs, community theatre, and local literary circles. Her upbringing instilled a deep appreciation for African‑American
    history, music, and storytelling traditions, which she carries into her editorial work through a commitment to authentic representation. She actively participates in neighborhood cultural festivals,
    volunteers at youth literacy programs, and supports local Black-owned businesses, reflecting a strong sense of community and cultural pride.
attributes:
  skills: '["Copyediting", "Developmental editing", "Proofreading", "Fact‑checking", "Content strategy", "Project coordination", "Style guide enforcement (Chicago Manual, AP)", "Digital publishing tools
    (WordPress, InDesign)", "SEO optimization", "Cultural competency editing"]'
  hobbies: '["Reading contemporary fiction", "Creative writing", "Attending spoken‑word events", "Yoga and mindfulness", "Urban gardening", "Photography", "Cooking Southern and African cuisines", "Journaling",
    "Exploring local art museums", "Improv comedy"]'
  career_goals: Eliza aspires to become a senior editor within the next three to five years, overseeing a team that curates inclusive and socially relevant titles. She hopes to champion a mentorship program
    for emerging Black writers and editors, and eventually transition to a role as editorial director where she can shape publishing policies that prioritize diverse voices. In the longer term, she envisions
    launching an independent imprint dedicated to urban narratives and underrepresented authors, while maintaining a sustainable work‑life balance that protects her mental health.
