    and crocheting'', ''Watching documentary series'']'
  career_goals: Ashlynn’s primary career ambition is to transition from employee housekeeping to owning a small, locally‑focused cleaning business that emphasizes evidence‑based, eco‑friendly methods. Over
    the next two years she plans to obtain a Certified Professional Cleaner credential, build a reliable team of two to three cleaners, and develop a brand known for meticulous, competitively priced service
    in Brighton and surrounding areas. She also hopes to create a modest online resource where she shares tested cleaning hacks, positioning herself as a trusted expert while preserving the flexible schedule
    she values.
