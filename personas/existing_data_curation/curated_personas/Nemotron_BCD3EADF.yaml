personas:
  professional: Veronica Greenberg, an 18‑year‑old visual arts associate student and newlywed, merges her curiosity about Charleston’s heritage with a balanced mix of organization and flexibility, using
    Adobe Photoshop, Canva, and watercolor techniques to design flyers, illustrations, and exhibition mock‑ups while they confidently lead small collaborative projects and adapt swiftly to unconventional
    challenges.
  sports: Veronica Greenberg, an 18‑year‑old art enthusiast, stays active by walking the Battery, practicing yoga at a community studio that hosts a Charleston Battery fan group, and cheering for the South
    Carolina Gamecocks during football season, preferring low‑impact exercise over competitive sports.
  arts: Veronica Greenberg, an 18‑year‑old watercolorist, immerses themselves in the Charleston art scene by sketching historic facades, drawing inspiration from the moody landscapes of Winslow Homer and
    the lyrical poetry of Ocean Vuong, while they regularly attend intimate performances by local folk singer Sarah Jane Cunningham at coffee‑house venues.
  travel: Veronica Greenberg, an 18‑year‑old aspiring curator, prefers meticulously planned weekend getaways to Southern cities like Savannah and New Orleans, yet also dreams of wandering the cobblestone
    streets of Paris and the historic quarters of Edinburgh, balancing budget constraints with a craving for cultural immersion.
  culinary: Veronica Greenberg, an 18‑year‑old culinary hobbyist, enjoys experimenting with heirloom Lowcountry recipes such as shrimp‑and‑grits seasoned with fresh thyme, collard greens simmered with smoked
    ham hocks, and peach cobbler topped with cracked cinnamon, and they showcase a confident yet occasionally impulsive approach in their modest balcony kitchen.
  core: Veronica Greenberg, an 18‑year‑old budding curator, balances quiet curiosity and disciplined organization with a habit of collecting every stray sketchbook and a tendency to postpone bill payments
    until the last minute.
background:
  cultural: Veronica comes from a white Southern background rooted in the historic city of Charleston, South Carolina. Her family traces its ancestry to English and German immigrants who settled in the
    Lowcountry, and she was raised with the traditions of Southern hospitality, community church involvement, and a deep appreciation for regional cuisine such as shrimp and grits, collard greens, and sweet
    tea. Growing up amid Charleston’s blend of historic preservation, Gullah cultural influences, and a thriving contemporary art community, she has internalized a respect for both the city’s past and its
    evolving creative scene. The close-knit nature of her small-town upbringing, combined with the responsibilities of early marriage, has fostered a strong sense of family duty and personal resilience.
attributes:
  skills: '[''Basic graphic design using Adobe Photoshop and Canva'', ''Digital photography'', ''Creative writing (poetry and short stories)'', ''Literary analysis and criticism'', ''Event planning for
