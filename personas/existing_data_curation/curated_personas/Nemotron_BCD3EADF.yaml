  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting of historic architecture'', ''Digital photography of Charleston’s Lowcountry scenery'', ''Reading contemporary fiction
    and poetry'', ''Cooking and experimenting with Southern recipes'', ''Gardening a balcony herb garden'', ''Yoga and mindfulness practice'', ''Attending intimate live-music performances at coffee houses'',
    ''Volunteering at the Charleston Historical Society'', ''Journaling and creative writing'']'
  career_goals: Veronica aims to complete her associate degree in visual arts at a local community college while maintaining her responsibilities as a married adult. She plans to transfer to a four-year
    university to earn a Bachelor of Fine Arts in Graphic Design or Art History, with the long-term goal of working as a curator or education coordinator at the Gibbes Museum of Art or a similar cultural
    institution in Charleston. Parallel to her formal education, she hopes to develop a freelance illustration practice and an online boutique on platforms such as Etsy, showcasing her watercolor and digital
    artwork inspired by Lowcountry themes. Ultimately, she envisions blending her artistic passion with community outreach, perhaps by leading workshops that introduce young people to local art and heritage.
