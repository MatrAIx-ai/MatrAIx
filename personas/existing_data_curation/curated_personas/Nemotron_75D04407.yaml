  hobbies: '[''Hiking'', ''Nature photography'', ''Succulent gardening'', ''Crossword puzzles'', ''Logic games'', ''Yoga'', ''Meditation'', ''Technology mentorship'', ''Southwestern cooking'', ''Volunteer
