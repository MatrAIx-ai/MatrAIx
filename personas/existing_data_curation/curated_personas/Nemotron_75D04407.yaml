  career_goals: Tonya aims to transition into a senior systems architect role within the next three to five years, where she can design end‑to‑end enterprise solutions that balance reliability with scalability.
    She is interested in leading a small team of analysts, mentoring junior staff, and championing data governance initiatives that enhance decision‑making across the organization. Additionally, she aspires
    to obtain a Project Management Professional (PMP) certification to broaden her ability to manage cross‑departmental projects and to contribute to community‑focused technology programs that improve digital
    literacy in underserved neighborhoods of Tucson.
