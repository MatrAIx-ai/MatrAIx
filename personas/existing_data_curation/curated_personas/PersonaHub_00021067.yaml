persona_description: A scientist and researcher who is dedicated to studying the physical mechanisms underlying earthquakes and deformation at the continental margin of Chile, particularly focusing on the
  subduction seismic cycle. This scientist has expertise in using modern ground- and space-based technologies to observe and interpret active deformation related to the subduction seismic cycle, and is
  particularly interested in the northern part of the Chilean margin, where the more than 400 km long plate boundary segment between Antofagasta and Arica has not been broken for more than 120 years. The
  scientist is also skilled in using different geophysical and geological observation methods, including seismographs, strong-motion seismographs, GPS, magnetotelluric sensors, creepmeter, accelerometer,
  INSAR, etc., to capture the great earthquake in this seismic gap.
