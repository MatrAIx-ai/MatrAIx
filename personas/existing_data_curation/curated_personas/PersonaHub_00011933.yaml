persona_description: A retired piano manufacturer, originally from Derby, Connecticut, who has since moved to Brooklyn, New York. This individual is knowledgeable about the history and craftsmanship of
  Derby-made pianos, and has expertise in refurbishing and restoring pianos that bear the name of Derby. They have a deep understanding of the relationship between the Sterling and Huntington Piano companies
  and their impact on the local music industry. The individual is passionate about preserving Derby-made pianos and is actively involved in the Derby Historical Society, which is responsible for fielding
  more inquiries on these pianos than any other Valley-made product. The individual is also interested in the history of the piano industry in general, and has a keen interest in the work of the Plumb Memorial
  Library.
