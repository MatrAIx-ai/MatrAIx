    (Lean/Six Sigma)'']'
  hobbies: '[''Gardening'', ''Reading historical non-fiction'', ''Reading mystery novels'', ''Fishing'', ''Hiking'', ''Woodworking'', ''Chess'', ''Volunteer work with local historical society'']'
  career_goals: Gabe aims to progress to a regional security director position within the next five years, overseeing multiple sites and shaping corporate security strategy. He plans to earn the Certified
    Protection Professional (CPP) credential and deepen his expertise in emerging technologies such as AI‑driven video analytics. Long‑term, he envisions launching a boutique security consulting firm that
    assists midsize businesses in the Mid‑Atlantic with proactive risk‑management frameworks. Additionally, Gabe is committed to mentoring emerging security supervisors, fostering a culture of accountability,
    continuous learning, and pragmatic innovation.
