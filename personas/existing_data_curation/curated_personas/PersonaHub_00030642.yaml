persona_description: A scientist who is interested in the development of new vaccines for newborns and unborn babies, focusing on the study of fetal immune cells and their potential to fight off infections.
  They are particularly interested in the role of gamma delta T-cells in fetal immune responses and how they can be harnessed for the development of new vaccines. They are likely to be familiar with the
  work of David Vermijlen and his colleagues at the Institute for Medical Immunology in Brussels, Belgium, and may have a background in immunology or medical research.
