personas:
  professional: A budding junior architect, Jonathan Tisdare channels their curiosity and practicality into designing complex Minecraft realms and intricate LEGO space stations, approaching each build with
    a competitive edge while often leaving the final layout slightly disorganized due to their relaxed attitude toward planning.
  sports: An enthusiastic neighborhood soccer player, Jonathan Tisdare laces up for Saturday pick-up games with local kids, roots for the Kansas City Chiefs and idolizes Lionel Messi, and they keep a well-worn
    pair of cleats that they rarely organize in their backpack.
  arts: A creative builder and comic sketcher, Jonathan Tisdare spends afternoons assembling LEGO vehicle kits, drawing superhero-inspired comic strips reminiscent of Stan Lee's style, and they binge-listen
    to the Minecraft soundtrack while occasionally doodling on school worksheets.
  travel: A budding explorer, Jonathan Tisdare loves weekend trips to the nearby Tallgrass Prairie, has visited the historic Santa Fe Trail exhibit at the local museum, and dreams of a summer family vacation
    to Disney World where they can ride Space Mountain and collect souvenir postcards.
  culinary: A picky yet adventurous eater, Jonathan Tisdare can whip up a peanut butter-jelly sandwich, loves homemade macaroni and cheese with extra cheddar, favors a warm slice of pepperoni-and-pineapple
    pizza, and insists on adding a dash of hot sauce to their fries even when parents protest.
  core: Jonathan Tisdare is a curious, competitive seven-year-old who builds sprawling Minecraft worlds, saves allowance in a piggy bank, and navigates daily life with a relaxed, sometimes disorganized,
    yet emotionally steady approach.
background:
  cultural: Jonathan comes from a white, middle‑class American family stationed at Fort Riley, a U.S. Army base in Kansas. Growing up in a military community, he is exposed to values of service, punctuality,
    and teamwork while also enjoying the Midwest’s open spaces and local traditions. Family gatherings often include base events, patriotic holidays, and community potlucks, shaping a blend of civilian
    and military cultural influences.
