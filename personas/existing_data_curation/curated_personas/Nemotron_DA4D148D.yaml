  career_goals: Although retired from formal employment, William aims to deepen his involvement with the Fredericktown senior center by leading a weekly DIY workshop series for fellow seniors. He hopes
    to document and share the town’s oral histories, working with the local historical society as a volunteer archivist. He also aspires to serve as a part‑time advisor for local small‑business owners on
    cost‑effective maintenance practices, and to travel to visit his children and grandchildren across the East Coast while maintaining his health and active lifestyle.
