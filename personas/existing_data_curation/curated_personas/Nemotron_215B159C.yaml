personas:
  professional: Reba Smith, a 21‑year‑old electrician, merges rigorous NEC‑compliant wiring, conduit bending, and smart‑home programming with methodical project planning and a naturally talkative, competitive
    edge that drives them to lead crews, mentor apprentices, and turn Instagram DIY tutorials into engaging community workshops.
  sports: Reba Smith runs with the Peachtree Runners club, logs weekly 5K runs, rallies behind the Atlanta Falcons, Hawks, and Braves, and plays pickup basketball at a local gym, treating fitness as both
    a competitive challenge and a social gathering.
  arts: Reba Smith showcases their love for performance in a community theater troupe where they alternate between classic Shakespearean roles and modern productions, channel hip‑hop energy by dancing to
    tracks from Kendrick Lamar and Missy Elliott, and draws creative inspiration from Lin‑Manuel Miranda’s Broadway storytelling, while frequently attending shows starring Viola Davis.
  travel: Reba Smith’s travel style blends spontaneous weekend road trips to Savannah and New Orleans—where they indulge in Southern cuisine—with meticulously planned Instagram itineraries for future adventures
    to Reykjavik’s auroras and Kyoto’s tech‑savvy districts, balancing a thirst for cultural immersion against a student‑budget.
  culinary: Reba Smith’s culinary passion centers on Southern comfort food, perfecting crispy fried chicken marinated in buttermilk and smoked paprika, simmering collard greens with ham hocks, baking peach
    cobbler topped with toasted pecans, and experimenting with smart‑oven recipes while sharing the feasts on their Instagram channel.
  core: Reba Smith is a fiercely competitive, talkative 21‑year‑old electrician who fuses curiosity‑driven DIY projects with relentless ambition, even if that means sacrificing sleep and humming circuit
    diagrams as they work.
background:
  cultural: Reba was raised in Sharpsburg, GA, within a close‑knit African‑American community steeped in Southern traditions. Her family’s Sunday church gatherings, gospel music, and communal potlucks instilled
    a strong sense of belonging and collective responsibility. Growing up, she was inspired by local Black artisans and electricians who paved the way for future generations. This heritage fuels her pride
    in contributing to the skilled trades and motivates her to challenge systemic barriers by mentoring other Black women. While she embraces modern influences like hip‑hop and digital storytelling, she
    also honors the storytelling, resilience, and community solidarity that define her cultural roots.
attributes:
  skills: '[''Electrical wiring'', ''Conduit bending'', ''Blueprint reading'', ''Circuit troubleshooting'', ''NEC compliance'', ''Smart‑home system installation'', ''Solar panel basics'', ''HVAC electrical
