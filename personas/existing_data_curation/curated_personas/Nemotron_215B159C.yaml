  hobbies: '[''DIY home‑improvement videos'', ''Community theater acting'', ''Hip‑hop dancing'', ''Youth STEM volunteering'', ''Running 5K races'', ''Urban gardening'', ''Cooking Southern comfort food'',
    ''Social media content creation'']'
  career_goals: Reba aims to earn her journeyman electrician license within the next two years and subsequently achieve master electrician status. She envisions launching her own electrical contracting
    firm focused on renewable energy solutions and smart‑home technology for the South‑East region. Long‑term, she hopes to become a certified electrical contractor, expand her business to include solar
    installations, and develop a mentorship program that encourages more Black women to enter the trades. Continuing education through an associate degree in electrical engineering technology and specialized
    certifications (e.g., NABCEP) are also part of her roadmap.
