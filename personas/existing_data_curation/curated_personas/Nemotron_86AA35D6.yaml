personas:
  professional: Wayne Jacobs, a tech‑savvy high‑school sophomore, spends afternoons deconstructing cheap electronics kits and customizing his gaming PC, blending curiosity for new ideas with a practical,
    hands‑on approach while often letting school projects drift into the background because of a relaxed attitude toward deadlines.
  sports: Wayne Jacobs, an enthusiastic member of the Cumberland Trail Riders Club, spends weekends biking rugged country lanes and occasionally joins the community center’s informal soccer scrimmages,
    cheering for the local high‑school team the Cumberland Cougars while preferring solo rides over organized team sports, a balance that mirrors their need for both social interaction and alone time.
  arts: Wayne Jacobs, who fills sketchbooks with concept art while listening to The Strokes, Arcade Fire and Mumford & Sons, blends indie rock riffs with classic Southern folk storytelling, regularly attending
    the community theater’s indie film nights and citing graphic novels like Saga as creative fuel for future gaming narratives.
  travel: Wayne Jacobs, dreaming of a spring bike tour through Shenandoah National Park and a future pilgrimage to Tokyo’s Akihabara district, typically plans low‑budget weekend trips to nearby historic
    towns, balancing a desire for adventure with the constraints of schoolwork and family farm responsibilities.
  culinary: Wayne Jacobs, who enjoys whipping up simple farm‑fresh meals such as grilled chicken with roasted corn, spaghetti topped with homemade tomato sauce from garden tomatoes and occasional cornbread,
    mixes a beginner’s cooking enthusiasm with a love for snack‑centric gaming nights featuring chips and soda yet often forgets to clean the kitchen promptly.
  core: Wayne Jacobs, a curiosity‑driven teen who rebuilds PCs and rides country trails while juggling worries about school, money and health, lives with a charming blend of practical tinkering, occasional
    disorganization and a quiet fear of falling behind.
background:
  cultural: Wayne was raised in a white, middle‑class family in the rural areas of Cumberland and Buckingham Counties, Virginia. His upbringing reflects a blend of Southern Appalachian influences—frequent
    county fairs, church gatherings, and a strong sense of neighborhood community—combined with the modern digital culture of an avid teen. Family traditions include seasonal outdoor activities like hunting,
    fishing, and attending local high‑school sports events, while his parents encourage practical skills and self‑reliance, all of which shape his pragmatic yet curious outlook.
attributes:
  skills: '[''Basic computer troubleshooting'', ''DIY bike and car maintenance'', ''Introductory woodworking'', ''Peer mediation'', ''Collaborative problem solving'']'
  hobbies: '[''Video gaming (strategy/RPG)'', ''DIY electronics and PC building'', ''Bicycle riding on trails'', ''Listening to rock and folk music'', ''Community woodworking projects'', ''Gardening and
    farm chores'']'
  career_goals: Wayne aspires to combine his love for technology with hands‑on work, dreaming of a career as a field service technician or automotive technician who also integrates emerging tech, like vehicle
    diagnostics software. He envisions attending a vocational program after high school to earn certifications in automotive technology and basic networking. Long‑term, he hopes to own a small workshop
    where he can repair vehicles and gadgets for his community, providing reliable service while maintaining the personal connections he values.
