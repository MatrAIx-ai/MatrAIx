  career_goals: Lilia aims to build a steady culinary career that balances structure with creative freedom. Over the next few years she plans to complete her associate degree in culinary arts, earn a Certified
    Culinarian credential, and advance from line cook to sous‑chef at a reputable seafood restaurant in the Boston area. Her long‑term ambition is to become head chef of a farm‑to‑table bistro in Marblehead
    that showcases local, sustainable ingredients, and eventually open her own small catering venture focused on community events. She values clear milestones and seeks roles that allow her to mentor junior
    staff while fostering a supportive kitchen culture.
