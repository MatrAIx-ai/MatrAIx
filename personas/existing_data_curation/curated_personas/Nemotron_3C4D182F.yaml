  hobbies: '[''Softball league'', ''Attending Houston Astros games'', ''Fishing'', ''Barbecuing'', ''Habitat for Humanity volunteering'', ''Weight training'', ''Running'', ''Mindfulness meditation'', ''Classic
    rock listening'', ''Car restoration'']'
  career_goals: William aims to move from front‑line operator to a supervisory role within the next three years, targeting a Shift Supervisor or Assistant Plant Manager position. He plans to obtain the
    Certified Water Operator (CWO) and Certified Wastewater Operator (CWO) advanced certifications, and eventually pursue a Bachelor’s degree in Environmental Engineering or a related field to qualify for
    Plant Manager. He is motivated to implement process‑optimization projects that reduce energy consumption and improve effluent quality, and to lead a safety culture that reduces incidents. Long‑term,
    he envisions contributing to city‑wide water sustainability initiatives and mentoring junior staff.
