personas:
  professional: Claudia Battle is a junior LEGO architect who treats each kit like a small construction project, following step‑by‑step manuals with disciplined precision, sketching the finished models
    in bright crayons, and they proudly share their creations at scout badge presentations, reflecting a love for structure and practical problem‑solving.
  sports: Claudia Battle is an enthusiastic participant in the neighborhood’s Saturday soccer games, proudly wearing a Kansas City Chiefs jersey while cheering for the team on game nights, and they also
    collect Kansas City Royals baseball cards, practicing catching a soft ball in the park after school.
  arts: Claudia Battle is an avid young artist who fills sketchbooks with colorful drawings of LEGO creations, swaps stories about The Very Hungry Caterpillar and Where the Wild Things Are, and they hum
    Disney songs from Frozen and Moana while frosting cookies, letting the music guide their artistic swirls.
  travel: Claudia Battle is a curious explorer who loves organized day trips to the Kansas City Zoo, eagerly anticipates annual family vacations to Disneyland in California, and they keep a scrapbook of
    leaves and rocks collected during a summer road trip to the Badlands, preferring itineraries over spontaneous wanderings.
  culinary: Claudia Battle is a budding baker who measures flour with a bright yellow cup, loves mixing chocolate chip cookies with their family on Sunday afternoons, and they frequently request a slice
    of pepperoni pizza topped with extra cheese while snacking on apple slices drizzled with honey.
  core: Claudia Battle is a structured, LEGO‑loving 7‑year‑old who balances meticulous allowance jars, picture‑book adventures, and occasional sneezing fits with a keen eye for organization.
background:
  cultural: Claudia comes from a white, middle‑class family in Prairie Village, Kansas, a suburban community that values school involvement, neighborhood safety, and family gatherings. Her upbringing includes
    participation in local church events, celebrating traditional American holidays such as Thanksgiving and the Fourth of July, and attending community festivals. The Midwestern cultural emphasis on reliability,
    courtesy, and a structured lifestyle influences her preferences for routine and organized activities.
attributes:
  skills: '["Reading (age‑appropriate books)", "Basic arithmetic (addition and subtraction)", "Organizational skills (keeping school materials tidy)", "Following routines and schedules", "Basic tablet navigation
    (educational apps)", "Collaborative play with peers", "Pet care (feeding and grooming a family dog)"]'
  hobbies: '["Reading picture books and early chapter stories", "LEGO building (following instructions)", "Drawing and coloring", "Organized outdoor games (e.g., Red Light, Green Light)", "Baking simple
    recipes with family", "Scout troop activities (badge projects)", "Nature walks and collecting natural items"]'
  career_goals: Claudia dreams of a future where she can help animals and people. She is fascinated by veterinarians and often imagines caring for sick pets, but she also enjoys the idea of being a teacher
    who creates structured, engaging lessons for young learners. Her ambition is to pursue a career that combines compassion with clear, organized responsibilities, such as a community health aide or a
    wildlife conservation volunteer when she grows older.
