personas:
  professional: John Hancock is an eight‑year‑old budding LEGO architect and junior codier who channels their competitive, logical nature into designing complex brick structures, scripting Minecraft mini‑mods,
    and solving puzzles that balance creativity with practical problem‑solving.
  sports: John Hancock plays midfield for the local under‑9 soccer league, idolizes Lionel Messi, cheers for Manchester United on weekends, and regularly cycles the neighborhood trail to improve stamina,
    blending competition with teamwork.
  arts: John Hancock draws daily comic strips featuring a LEGO superhero, devours adventure series like Harry Potter and the Mysterious Benedict Society, and blasts the energetic tunes of Imagine Dragons
    and Kidz Bop while sketching, weaving storytelling into their creative play.
  travel: John Hancock loves weekend bike rides to the nearby river park, dreams of visiting Legoland California and the Minecraft exhibition at the Smithsonian, and recently explored the historic streets
    of Williamsburg, balancing family‑oriented trips with a budding wanderlust.
  culinary: John Hancock favors pepperoni pizza, chicken nuggets, and homemade mac‑and‑cheese, enjoys making perfectly crisp grilled cheese sandwiches, and indulges in baking chocolate‑chip cookies, often
    adding an extra handful of chocolate chips for a sweet boost.
  core: John Hancock is a curious, competitive eight‑year‑old whose Lego constructions, Minecraft code, soccer drills, and disciplined allowance‑saving combine with a love of adventure stories and a sweet
    tooth into a uniquely balanced, slightly impatient personality.
background:
  cultural: John grows up in a middle-class white family in suburban Tustin, Orange County, a region known for its sunny climate, beach proximity, and a blend of suburban and urban influences. His household
    reflects mainstream American values, emphasizing education, extracurricular involvement, and community participation. The local culture encourages sports like soccer and baseball, as well as tech-savvy
    hobbies such as gaming and coding. While the community is culturally diverse, his family’s traditions center around typical Southern California family activities—weekend trips to the beach, backyard
    barbecues, and participation in school events—providing him with a balanced view of both the broader American mosaic and his own cultural roots.
