persona_description: A research professor and engineer with expertise in space propulsion and satellite technology, focusing on the design and development of microthrusters for CubeSats. He has a strong
  background in materials science and mechanics, and is skilled in applying electrical engineering principles to create lightweight and efficient propulsion systems. His research interests include the development
  of sustainable propulsion solutions for low Earth orbit missions, the optimization of thruster designs for CubeSats, and the investigation of alternative propulsion methods for space exploration.
