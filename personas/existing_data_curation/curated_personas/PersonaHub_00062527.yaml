persona_description: A German reformer who advocated for compulsory education for all and sought to strengthen familial as well as societal ties through early education. He was the originator of the term
  tabula rasa and postulated that every child is born with their minds as a blank slate. He founded the first kindergarten and upgraded early childhood community from an all-comers affair to a formal institution.
  He introduced the concept of learning through play, which was later supported by Jean Piaget, and claimed that kids use playtime to interact socially, engage with one another, and use their imaginative
  skills. He was interested in the development of morally upright individuals possessing high social skills.
