personas:
  professional: Lori Crotzer, a thirty‑year‑old aspiring project coordinator, channels their meticulous organizational talent and DIY practicality into scheduling community events and managing small‑business
    initiatives while completing their GED to secure a stable administrative role.
  sports: Lori Crotzer enjoys the rustic cardio of daily walks on Blandon’s rural trails, occasionally joins the Lancaster County Hiking Club, and cheers quietly for the Philadelphia Eagles on Sundays while
    preferring low‑impact yoga sessions to high‑intensity gym classes.
  arts: Lori Crotzer weaves both yarn and ideas together, finding inspiration in the folk melodies of Gillian Welch, the soothing prose of Brené Brown, and the vivid narratives of local historian John H.
    McCoy while dedicating evenings to crafting knitted scarves for friends and shelter donations.
  travel: Lori Crotzer prefers low‑cost, nature‑focused getaways, having explored the rolling hills of the Hudson Valley and planning a future trip to Colorado’s Rocky Mountain National Park while balancing
    travel dreams with a modest budget and a desire for quiet reflection.
  culinary: Lori Crotzer cultivates a kitchen garden of basil, rosemary, and seasonal vegetables, turning them into herb‑laden ratatouille, lemon‑thyme roasted chicken, and rustic sourdough loaves, while
    occasionally splurging on premium saffron for experimental dishes.
  core: Lori Crotzer is an anxiety‑prone, hyper‑organized craft enthusiast who calms their mind with garden‑fresh cooking, meticulous budgeting, and quiet acts of community service.
background:
  cultural: Lori comes from a white, German‑Irish heritage common in rural Pennsylvania. Raised in Blandon, Berks County, she grew up in a close‑knit community that values self‑reliance, modesty, and mutual
    support. Family traditions include regular church attendance, participation in seasonal harvest festivals, and an emphasis on practical skills such as home maintenance and gardening. She respects the
    agricultural roots of the area, enjoys regional cuisine, and maintains a strong connection to the town’s history and neighborly ethos.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Personal budgeting'', ''Basic computer proficiency (Microsoft Office, email, social media)'', ''Event coordination'', ''DIY home improvement
