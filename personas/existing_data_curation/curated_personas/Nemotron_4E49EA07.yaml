  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Reading (self‑improvement, local history)'', ''Journaling'', ''Walking/hiking'', ''Cooking and recipe experimentation'', ''Volunteering at local
    library and church events'', ''DIY home décor projects'']'
  career_goals: Lori aims to earn her GED within the next year and secure a stable administrative or project coordination position with a local small business or non‑profit organization. She plans to leverage
    her meticulous organizational skills to manage community programs and events, with the long‑term ambition of launching a home‑based online shop selling her handcrafted goods. Financial independence,
    a predictable work routine that mitigates stress, and the ability to contribute meaningfully to her town’s social fabric are central to her career aspirations.
