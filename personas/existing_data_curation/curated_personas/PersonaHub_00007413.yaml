persona_description: A researcher and astronomer who specializes in studying the formation and early evolution of stars in the Galaxy and other galaxies using observations and modeling of molecular line
  and dust continuum emission. Their current research focuses on using large-scale projects like Hi-GAL and Spitzer Dark Cloud Survey to study the distribution of dust and young stellar objects, and the
  structure, composition, and evolution of the molecular gas in star forming regions. They are also leading the Maser Multi-Beam Survey to identify new methanol maser sources and study the physics of high
  mass star formation.
