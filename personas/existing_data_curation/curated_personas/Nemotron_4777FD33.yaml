  hobbies: '[''Drawing comics'', ''Watercolor painting'', ''LEGO building'', ''Reading adventure books'', ''Minecraft creative mode'', ''Nature walks and specimen collecting'', ''Watching science documentaries'',
    ''Playing the recorder'', ''Emotional journaling'', ''School science club'']'
  career_goals: Christopher dreams of becoming an astronaut who can explore distant worlds and capture their beauty in sketches and stories. He also envisions a future as a children's author and illustrator,
    crafting books that help other kids understand and manage strong emotions. Another ambition is to work as an environmental scientist or museum curator, combining his love for nature, art, and systematic
    research to design exhibits that inspire curiosity and stewardship. He hopes to volunteer at the local science museum and eventually lead projects that blend scientific discovery with creative expression.
