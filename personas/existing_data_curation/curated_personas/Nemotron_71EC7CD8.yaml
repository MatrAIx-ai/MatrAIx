  hobbies: '["Painting (acrylic and watercolor)", "Sketching and drawing", "Visiting art exhibitions and museums", "Cooking traditional Mexican cuisine and fusion recipes", "Hiking coastal and forest trails
    in Monterey County", "Yoga and meditation", "Photography (landscape and street)", "Volunteering at a community garden", "Participating in local cultural festivals", "Creative writing and journaling"]'
  career_goals: Martha aims to re‑enter the workforce by leveraging her creative and community‑focused skill set. She plans to pursue a bachelor's degree in arts administration or digital media while building
    a portfolio of graphic design and photography work. Her short‑term goal is to secure a role as a communications or outreach coordinator for a local non‑profit or cultural institution, where she can
    develop bilingual promotional campaigns and organize inclusive art workshops. Long‑term, she aspires to lead a community arts program in Monterey County that celebrates Mexican heritage alongside contemporary
    artistic expressions, fostering cross‑cultural dialogue and supporting emerging local artists.
