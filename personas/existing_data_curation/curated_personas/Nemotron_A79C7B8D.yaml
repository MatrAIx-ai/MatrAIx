personas:
  professional: Carlos Estrada is an aircraft maintenance mechanic who specializes in airframe inspections, hydraulic and avionics troubleshooting, and powerplant servicing, applying a meticulous eye for
    detail honed by his watercolor painting hobby, while actively mentoring junior technicians and championing collaborative problem‑solving, all within a framework of strict FAA compliance and an emerging
    focus on sustainable refurbishment practices.
  sports: Carlos Estrada enjoys early morning jogs along the shoreline, weekly yoga practice, participates in a local pickup soccer league affiliated with the Rio Grande community club, and follows the
    Cangrejeros de Santurce baseball team for a seasonal dose of hometown pride.
  arts: Carlos Estrada expresses creativity by sketching aircraft silhouettes in watercolors inspired by the vivid Caribbean sunsets, playing the cuatro during intimate jam sessions that feature classic
    salsa and plena tunes by Celia Cruz and Rubén Blades, and regularly attending community art workshops where they experiment with mixed‑media collages.
  travel: Carlos Estrada prefers thoughtfully planned trips that blend cultural immersion with aviation curiosity, having explored the historic streets of Old San Juan, the vibrant markets of Cartagena,
    and the design museums of Barcelona, while dreaming of attending the next Paris Air Show but balancing the expense against their certification fund.
  culinary: Carlos Estrada loves cooking traditional arroz con gandules and lechón asado for family gatherings, seasoning dishes with fresh cilantro and oregano from their rooftop garden, occasionally experimenting
    with a mango‑infused pastel, though they sometimes give in to late‑night pizza during heavy work periods.
  core: Carlos Estrada is a meticulous aircraft mechanic with a painter’s eye, an anxious but compassionate soul who balances night‑shift precision with sunrise jogs, rooftop herb care, and spontaneous
    cuatro jam sessions.
background:
  cultural: Carlos grew up in Rio Grande, a municipality that blends coastal traditions with vibrant urban life. His Puerto Rican heritage is evident in his fluency in Spanish and English, love for plena
    and salsa rhythms, and participation in local festivals such as the Fiestas de la Candelaria. Family gatherings often feature arroz con gandules, lechón asado, and homemade pasteles, and he values the
    close‑knit community spirit that emphasizes hospitality and mutual support. These cultural roots influence his compassionate demeanor, his appreciation for collaborative work, and his desire to preserve
    and celebrate Puerto Rican artistic expressions.
attributes:
  skills: '["Airframe Inspection", "Powerplant Servicing", "Hydraulic and Avionics Diagnostics", "FAA Regulatory Compliance", "Technical Documentation", "Composite Repair", "Welding and Fabrication", "Custom
    Aircraft Painting", "Mentorship and Team Collaboration"]'
  hobbies: '["Watercolor Painting", "Sketching Aircraft", "Science Fiction Reading", "Aviation History Collecting", "Coastal Jogging", "Yoga for Stress Management", "Rooftop Gardening", "Playing the Cuatro",
    "Community Art Workshops"]'
  career_goals: Carlos aims to become a Certified Aviation Maintenance Technician (AAM) and eventually move into a supervisory role where he can blend technical leadership with training initiatives. He
    dreams of leading a small team that focuses on sustainable aircraft refurbishment, integrating eco‑friendly materials and processes. In the longer term, he hopes to contribute to developing maintenance
    protocols for emerging electric or hybrid aircraft, aligning his technical skill set with his passion for innovative, forward‑thinking solutions.
