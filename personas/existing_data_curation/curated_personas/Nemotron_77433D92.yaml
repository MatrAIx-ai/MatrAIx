  hobbies: '[''Fishing on Lake Ouachita'', ''Ozark trail hiking'', ''Classic car restoration'', ''Woodworking'', ''Community soccer league'', ''Country line dancing'', ''Volunteer work at local fairs'',
    ''DIY electronics and drone projects'']'
  career_goals: Michael aims to advance to a lead maintenance supervisor position within the next few years, earn certifications such as Certified Maintenance & Reliability Technician (CMRT) and OSHA trainer,
    and deepen his knowledge of PLC programming. He envisions eventually launching a boutique maintenance service that supports local farms, construction sites, and recreational facilities in Garland County,
    positioning himself as the go‑to expert for heavy equipment upkeep while mentoring the next generation of tradespeople.
