  career_goals: Viola aims to leverage her extensive administrative experience into volunteer leadership roles within senior centers and local arts organizations in Philadelphia. She aspires to mentor young
    adults interested in secretarial skills, complete her GED, and potentially publish a memoir that captures her life story and the cultural history of her community. Additionally, she hopes to spearhead
    a community garden project that blends her organizational strengths with her love for nature and social harmony.
