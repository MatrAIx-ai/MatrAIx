persona_description: A scientist who specializes in plant biology, particularly the study of plant growth and metabolism. He is interested in understanding how plants integrate metabolism, cell growth,
  and biomass production. His research focuses on signaling mechanisms, specifically the regulation of actin filament production and cell expansion. He has used the altered version of the mustard family
  laboratory plant Arabidopsis to study SPIKE1's function and find the proteins that it activates and to which it binds. He has also confirmed that the SPIKE1 signaling pathway is likely to function in
  other plants including rice and corn. However, in other organisms with SPIKE1-like genes, switching off the gene kills the organism. This makes it difficult for scientists to understand the function of
  SPIKE1 and comparable genes in other organisms.
