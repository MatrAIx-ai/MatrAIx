personas:
  professional: Cecilia Lebak, a 23‑year‑old painter and crew member in the Baltimore area, combines meticulous surface‑prep and color‑mixing skills with a relaxed, routine‑driven work style, leveraging
    their sociable nature to keep small crews coordinated and clients happy while eyeing a foreman role within five years.
  sports: Cecilia Lebak, a regular participant in a local women's softball league and an avid hiker of Patapsco River trails, stays fit through weekend games and treks, cheers loudly for the Baltimore Ravens
    and occasionally streams Baltimore Orioles baseball, and they belong to the community center’s recreation club that organizes group runs.
  arts: Cecilia Lebak, who performs in community theater and leads karaoke nights, draws artistic inspiration from classic rock icons like Led Zeppelin and theatrical legends such as Lin‑Manuel Miranda,
    often quoting lines from "Hamilton" while rehearsing, and they relish the camaraderie of stagecraft as a social outlet.
  travel: Cecilia Lebak prefers spontaneous weekend getaways that blend a bit of planning with flexibility, favoring short drives to Baltimore’s Inner Harbor, historic Annapolis, and the Appalachian trails
    in West Virginia, while budgeting carefully to keep travel affordable before saving for a future cross‑country road trip to Nashville’s music scene.
  culinary: Cecilia Lebak enjoys cooking hearty Mid‑Atlantic comfort foods such as crab cakes with Old Bay seasoning, grilled BBQ ribs with a smoky paprika rub, and homemade spinach‑and‑feta stuffed chicken,
    showing a competent but not professional kitchen skill set, and they love pairing meals with craft beers from local breweries.
  core: Cecilia Lebak blends a love for routine work and lively social gatherings, often juggling paintbrushes and a karaoke mic in the same weekend, but habitually misplaces their tools and relies on last‑minute
    improvisation to keep both projects and parties afloat.
background:
  cultural: Cecilia was raised in Dundalk, a working-class suburb of Baltimore with deep roots in Irish and other European immigrant communities. The neighborhood’s emphasis on hard work, close-knit family
    ties, and practical values shaped her straightforward, routine-oriented outlook. Her family’s modest, middle-class background instilled a strong work ethic and a preference for dependable, hands-on
    occupations. While she identifies with mainstream American culture, she also participates in local traditions such as neighborhood block parties, church gatherings, and seasonal festivals that reinforce
    a sense of community and solidarity.
attributes:
