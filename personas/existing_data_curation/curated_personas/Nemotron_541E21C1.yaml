  hobbies: '[''softball league'', ''community theater'', ''karaoke nights'', ''volunteering at community center'', ''DIY home improvement'', ''hiking Patapsco River trails'', ''listening to classic rock'',
    ''Baltimore Ravens games'']'
  career_goals: Cecilia hopes to move up from a crew member to a foreman or crew lead within the next three to five years, gaining certification in lead-paint abatement and advanced safety training. She
    aims to eventually start her own small painting business focused on serving the Dundalk and wider Baltimore community, offering reliable, routine-driven services. In the longer term, she envisions mentoring
    new workers, participating in union leadership, and achieving a stable income that will allow her to purchase a home in the area.
