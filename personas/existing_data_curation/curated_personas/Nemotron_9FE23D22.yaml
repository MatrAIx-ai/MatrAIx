  hobbies: '[''Basketball pick‑up games'', ''Beat making and music production'', ''Video gaming (Fortnite, Apex Legends)'', ''Skateboarding'', ''Cooking Southern and soul food with family'', ''Volunteering
    at community center (sports coaching)'']'
  career_goals: Despite having left school before completing ninth grade, Derrick is determined to earn his GED within the next two years. He aspires to turn his mechanical knack into a career as an automotive
    technician, potentially enrolling in a community college trade program. At the same time, he hopes to develop his music‑production hobby into a side hustle, aiming to release instrumental tracks on
    streaming platforms and eventually work as a beat‑maker for local artists. He also wants to become a mentor for younger kids at the community center, sharing his basketball skills and encouraging them
    to pursue education and practical trades. Ultimately, Derrick seeks a stable income that lets him support his family while maintaining the flexibility he values.
