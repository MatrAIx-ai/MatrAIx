  hobbies: '[''Surfing'', ''Snorkeling'', ''Hiking (Diamond Head, Makapuʻu)'', ''Ukulele playing'', ''Cooking Micronesian dishes'', ''Community kapa haka group'', ''Mentoring youth coding club'', ''Reading
    science‑fiction'', ''Chess'', ''Tropical gardening'', ''Attending cultural festivals'']'
  career_goals: Loren aims to advance from a mid‑level developer to a senior full‑stack engineer within the next two years, followed by a transition into an engineering leadership role where he can shape
    product strategy and guide larger teams. He plans to complete his bachelor's degree in Computer Science, leveraging his practical experience to enrich his academic work. A key long‑term ambition is
    to create technology solutions that serve Micronesian and broader Pacific Islander communities – such as language‑learning apps, cultural heritage archives, or remote‑education platforms. He also aspires
    to become a mentor and advocate for under‑represented developers, speaking at conferences like WWDC or local tech meetups about culturally‑aware software design. Throughout, he prioritizes a balanced
    schedule that allows quality time with his spouse and children and participation in community events.
