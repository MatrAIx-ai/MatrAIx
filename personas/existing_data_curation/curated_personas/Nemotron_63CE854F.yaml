personas:
  professional: Loren Otillio is a full‑stack software developer who combines mastery of JavaScript, TypeScript, React, Node.js, and AWS with a habitually structured workflow, delivering reliable APIs through
    rigorous test‑driven development and clear documentation, and they mentor junior teammates with a blend of assertive code reviews and collaborative support.
  sports: Loren Otillio is an avid surfer who catches early morning breaks at Ala Moana Beach, hikes the Diamond Head and Makapuʻu trails for cardio, participates in the Honolulu Surf Club, cheers for the
    Hawaii Rainbow Warriors football team, and they join a weekend beach volleyball league with friends, balancing structured training with spontaneous ocean sessions.
  arts: Loren Otillio plays ukulele at family gatherings, occasionally performs with a community kapa haka group, draws inspiration from artists like Israel Kamakawiwo'ole, Jake Shimabukuro, and indie musician
    Phoebe Bridgers, enjoys reading science‑fiction works by N.K. Jemisin and Neal Stephenson, and they unwind by watching films directed by Taika Waititi.
  travel: Loren Otillio prefers meticulously planned weekend escapes that combine surf spots and cultural immersion, having explored Maui, Kauai, and Tahiti, while dreaming of trekking New Zealand's North
    Island and witnessing the Northern Lights in Iceland, and they always balance family time with solo adventure.
  culinary: Loren Otillio enjoys cooking island‑inspired dishes such as pisupo (taro) stew, tako (breadfruit) roast, and poke bowls with ahi tuna, coconut milk, and seaweed, demonstrating intermediate culinary
    skill that blends traditional flavors with modern techniques, and they love sampling fresh fish at local fish markets while occasionally treating themselves to sushi rolls with wasabi and pickled ginger.
  core: Loren Otillio blends a methodical tech mindset with a free‑spirited surf lifestyle, juggling code reviews and ukulele chords, while they habitually check the tide charts before any major decision.
background:
  cultural: 'Loren grew up in Pearl City as the son of immigrants from the outer islands of the Federated States of Micronesia, primarily Chuuk. Raised bilingual in English and Chuukese, he spent his childhood
    attending the Micronesian Center’s cultural programs, learning traditional dances, storytelling, and the value of communal feasting (faluma). The Micronesian emphasis on family cohesion, respect for
    elders, and collective responsibility shaped his organized and reliable nature. Living in Hawaii, he also embraced the Aloha spirit, participating in local Hawaiian celebrations, learning basic Hawaiian
    language phrases, and adopting outdoor activities that are central to island life. His heritage informs his worldview: he balances a strong sense of community duty with the pragmatic mindset of a tech
    professional. He remains active in his church’s Pacific Islander congregation, volunteers during Micronesian festivals, and seeks to incorporate cultural perspectives into his work, especially when
    designing software that serves island communities.'
