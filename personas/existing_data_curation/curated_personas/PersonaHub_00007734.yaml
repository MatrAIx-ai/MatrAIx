persona_description: A business strategist and entrepreneur who is passionate about creating value for customers through innovative business platforms that leverage social technology. They have a deep understanding
  of multi-sided markets and the various forms of indirect value that can be extracted from them. They are skilled at managing the tension between the economies of scale and scope of particular services
  provided by complementors and the economies of alignment involved in bringing them together as a collaboration responding to the customer situation as a whole. They are looking for ways to reduce the
  customer's costs of alignment with the various complementors to their particular situation, and are willing to take on the challenge of changing the way the business defines its competitive identity to
  a demand-side definition. They are constantly innovating and transforming industries, and are passionate about using their skills to create value for customers through business platforms that leverage
  social technology.
