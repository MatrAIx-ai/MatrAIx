  career_goals: Even though she is not currently employed, Janell aims to formalize her caregiving abilities by earning a Home Health Aide certification, which would give her confidence and a modest supplemental
    income. She also dreams of turning her love for baking into a small home‑based business selling cookies and pies to neighbors, providing a predictable routine and a creative outlet. To support these
    goals, she plans to enroll in a community‑college nutrition class to deepen her knowledge of healthy cooking. Ultimately, Janell wants to remain active in her church and local volunteer groups, using
    her cooperative nature to lead modest projects while maintaining a stable, low‑stress schedule that eases her natural worries.
