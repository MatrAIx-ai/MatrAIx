  hobbies: '[''Adult soccer league'', ''Cooking Mexican cuisine'', ''Gardening'', ''Woodworking'', ''Cultural festivals'', ''Salsa and cumbia dancing'', ''Mariachi music'', ''Volunteer work at food pantry'',
    ''Church attendance'', ''Evening walks'']'
  career_goals: Jorge aims to obtain his GED within the next year to formalize his education background, and he plans to acquire a handyman certification that will allow him to start a modest home‑repair
    side business serving the Addison neighborhood. He also hopes to become a regular volunteer mentor for at‑risk youth at the local community center, using his organizational skills to run tutoring sessions
    and life‑skill workshops. Additionally, he seeks a position on the senior‑center advisory board where he can help shape programs for older adults, while maintaining a structured daily routine that reduces
    stress and supports his health.
