personas:
  professional: Jorge Diego, a seasoned community-volunteer with a knack for organizing home-repair projects, blends their hands-on carpentry skill, bilingual communication, and meticulous budgeting to
    lead neighborhood event logistics and mentor at-risk youth while pursuing a handyman certification.
  sports: Jorge Diego competes in the Addison United adult soccer league every spring, follows the Dallas Cowboys and FC Dallas with fervor, and incorporates disciplined evening walks and weekly strength-training
    sessions at the community gym to stay fit despite occasional knee soreness from osteoarthritis.
  arts: Jorge Diego enjoys listening to classic mariachi ensembles such as Mariachi Vargas de Tecalitlan and the contemporary cumbia rhythms of Celso Pina, attends local Cinco de Mayo performances featuring
    folk dancer Ana Solis, and occasionally sketches wood-carving designs inspired by Frida Kahlo's self-portraits, weaving these artistic experiences into their community gatherings.
  travel: Jorge Diego prefers well-planned road trips and has mapped out weekend getaways to the Hill Country's vineyards, annual visits to Oaxaca's culinary festivals, and a dream pilgrimage to the historic
    churches of Seville, balancing their love for cultural immersion with a modest travel budget and family obligations.
  culinary: Jorge Diego, an avid home chef, crafts authentic tamales filled with pork and masa, simmers rich mole poblano with chilhuacle and peanuts, and whips up fresh salsa using tomatillos, jalapenos,
    and cilantro, often hosting potlucks where friends savor their perfectly seasoned carne asada and roasted corn esquites.
  core: Jorge Diego blends meticulous organization with a love for community, yet their chronic worry often drives late-night budget spreadsheets and a tendency to over-schedule, even as they sneak extra
    salsa into every potluck and forget their own rest.
background:
  cultural: Jorge was raised in a Mexican‑American household in the Chicago suburbs, where Spanish was spoken at home and Mexican traditions were celebrated. He grew up observing the values of familismo,
    respeto, and strong Catholic faith, which continue to shape his daily life. He regularly observes holidays such as Día de los Muertos and Las Posadas, and he maintains close ties with extended family
    both in the United States and Mexico. Living in Addison, IL, he has blended his heritage with Midwestern culture, participating in local community events while preserving his Mexican identity through
    cuisine, language, and cultural celebrations.
attributes:
  skills: '[''Home repair'', ''Basic carpentry'', ''Vehicle maintenance'', ''Budgeting and personal finance'', ''Community event coordination'', ''Bilingual Spanish‑English communication'', ''Conflict resolution'',
