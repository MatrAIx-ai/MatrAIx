personas:
  professional: Andres Bonilla is a casino surveillance officer who leverages keen observational skills and expertise with Genetec and Axis systems to swiftly spot suspicious activity, while they apply
    a disciplined, structured mindset and calm resilience to ensure accurate incident reporting and effective de‑escalation under pressure.
  sports: Andres Bonilla hits the Laguna Canyon trails for early‑morning jogs, joins the local Calisthenics Club at Laguna Hills Park for bodyweight workouts, and follows Club América and Chivas matches
    on weekends, while they also cheer for the LA Galaxy during MLS season, blending disciplined personal fitness with low‑key soccer fandom.
  arts: Andres Bonilla captures urban and natural landscapes with a vintage 85mm lens, drawing inspiration from photographer Dorothea Lange and painter Frida Kahlo, while they unwind listening to regional
    band Los Tigres del Norte and streaming classic Mexican cinema starring Pedro Infante, allowing artistic expression to balance their analytical work.
  travel: Andres Bonilla prefers meticulously planned road trips that mix nature and cultural immersion, having explored the historic streets of Oaxaca and the coastal cliffs of Big Sur, while they dream
    of a future adventure to Barcelona’s architecture and the remote deserts of Utah, always budgeting travel expenses in their Excel tracker.
  culinary: Andres Bonilla enjoys cooking Oaxacan mole negro and Veracruz‑style pescado a la veracruzana, mastering the balance of chilhuacle and epazote, while their modest kitchen skill lets them flawlessly
    prepare tacos al pastor for family gatherings, though they admit to over‑seasoning with chipotle when experimenting.
  core: Andres Bonilla blends a disciplined security mindset with a quiet love for vintage lenses, early‑morning jogs, and experimental cooking, all while they secretly hoard limited‑edition camera gear
    and skip floss.
background:
  cultural: Andres grew up in a bilingual Mexican‑American household in Southern California, where Spanish and English were spoken interchangeably. His parents immigrated from Michoacán and instilled in
    him a strong sense of family, respect for elders, and community responsibility. He celebrates Mexican traditions such as Día de los Muertos and Mexican Independence Day, often preparing family meals
    and gathering with relatives during these holidays. Though he lives in Laguna Hills, he maintains close ties to the local Mexican community through a church youth group and occasional participation
    in cultural festivals in nearby Santa Ana. His cultural heritage influences his work ethic, emphasizing reliability and honor, and shapes his taste in food, music (banda, norteña), and his pride in
    his Mexican identity while navigating the multicultural environment of Orange County.
