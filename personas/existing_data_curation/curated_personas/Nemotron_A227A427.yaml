  career_goals: As a 23‑year‑old security professional, Andres aims to advance within the gaming security hierarchy. His short‑term goal is to obtain the Certified Protection Officer (CPO) credential and
    to complete a specialized training program in fraud detection and electronic surveillance. Within three to five years, he aspires to become a senior surveillance officer or shift supervisor, overseeing
    a team of guards and managing the casino’s surveillance center. Long‑term, he envisions earning a bachelor’s degree in Criminal Justice or Security Management and moving into a security manager role,
    where he can design and implement comprehensive security strategies across multiple casino properties, or possibly transition into a consultant role for gaming regulators.
