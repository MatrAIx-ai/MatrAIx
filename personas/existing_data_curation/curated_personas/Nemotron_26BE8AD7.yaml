  hobbies: '[''Gardening (native plants)'', ''Reading historical nonfiction'', ''Mystery novels'', ''Crossword puzzles'', ''Quilt-making'', ''Hiking in the Ouachita National Forest'', ''Volunteer work at
    animal shelter'', ''Genealogy research'', ''Attending local history talks'']'
  career_goals: As she nears retirement, Celia aims to transition into a part-time consultancy where she can develop a locally-adopted interdisciplinary curriculum that fuses arts and sciences, mentor emerging
    educators, and secure a district grant for a small after-school inquiry club. She also hopes to present her research on critical-thinking strategies at the Arkansas Education Conference and ultimately
    publish a series of children's books that encourage skepticism and curiosity.
