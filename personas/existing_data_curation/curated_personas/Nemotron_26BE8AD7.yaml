personas:
  professional: Celia Swilley, a veteran teacher with over thirty years in Fort Smith classrooms, blends disciplined, data‑driven differentiated instruction with a quiet curiosity for STEAM projects, mentoring
    novice colleagues while flexibly juggling a nascent consultancy and a relaxed attitude toward strict deadlines.
  sports: A modest fan of the Arkansas Razorbacks football team and an avid weekend hiker, Celia Swilley joins the Ouachita Trail Club for guided hikes in the national forest, while occasionally participating
    in low‑impact yoga sessions at the local senior center.
  arts: Celia Swilley spends quiet evenings quilting alongside folk‑song enthusiast Emily Austin, devouring Agatha Christie mysteries, and admiring the watercolor landscapes of regional artist Johnnie Smith,
    letting these creative outlets shape their reflective yet skeptical outlook.
  travel: With a penchant for road‑tripping through the South, Celia Swilley has explored historic Hot Springs, the battlefields of Gettysburg, and the jazz cafés of New Orleans, favoring modest B&B stays
    and meticulous genealogical research stops while balancing a modest travel budget.
  culinary: An enthusiastic gardener, Celia Swilley often cooks Southern staples like fried catfish, collard greens seasoned with garden‑grown herbs, and cornbread, while savoring wildflower‑infused honey
    tea and occasionally treating themselves to a slice of pecan pie from a family‑owned bakery.
  core: Celia Swilley is a pragmatic, curiosity‑driven educator who quietly challenges conventions, gardens, quilts, and climbs hills, all while juggling a relaxed, occasionally disorganized, approach to
    life.
background:
  cultural: Celia grew up in a modest, middle-class white family in the American South, where Protestant work ethic and community ties shaped her values. Living most of her adult life in Fort Smith, Arkansas,
    she absorbs the region's blend of Southern hospitality, respect for tradition, and practical folk wisdom. Her background influences her teaching style - valuing hard work, self-reliance, and a measured
    openness to new ideas while preserving time-tested educational practices.
attributes:
  skills: '[''Differentiated Instruction'', ''Project-Based Learning'', ''Literacy Development'', ''Numeracy/Math Instruction'', ''STEAM Integration'', ''Formative Assessment Design'', ''Curriculum Mapping'',
