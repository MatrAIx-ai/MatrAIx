persona_description: A teacher who is passionate about making geography relevant and interesting to inner-city students, particularly those in South Los Angeles. They have developed a unique class that
  teaches geography through studies of local neighborhoods, using Auto Club maps and archival photos. The teacher is a Geography teacher at Fremont High School in South Los Angeles and has been recognized
  for their innovative approach to teaching geography. The teacher is skilled in curriculum development and teacher training, and has worked with the Auto Club of Southern California and the UCLA History-Geography
  Project to develop a curriculum that incorporates local history and geography. The teacher is interested in making history and geography more accessible and engaging for students, and has received recognition
  for their efforts in this area.
