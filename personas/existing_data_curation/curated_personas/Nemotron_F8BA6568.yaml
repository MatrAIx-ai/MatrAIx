  hobbies: '[''Hiking'', ''Skiing'', ''Cycling'', ''Group fitness classes (spin, Zumba)'', ''Recreational basketball'', ''Trivia nights'', ''Escape rooms'', ''Cooking and entertaining'', ''Photography'',
    ''Community volunteering'', ''Reading business and self-improvement books'', ''Exploring productivity apps'']'
  career_goals: Jennifer aims to advance from her current support role to an office manager position within the next two years, eventually moving into an operations manager or director of administration
    role. She plans to obtain the Certified Administrative Professional (CAP) credential and complete a business administration associate degree. Her long-term ambition is to lead a high-performing administrative
    team, implement innovative workflow solutions that boost efficiency, and possibly launch a consulting practice helping small businesses streamline their office processes.
