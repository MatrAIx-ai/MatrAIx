  hobbies: '[''Sudoku'', ''Crossword puzzles'', ''Chess'', ''Running'', ''Kickboxing'', ''Reading true‑crime books'', ''Neighborhood watch volunteering'', ''Cooking family recipes'', ''Listening to R&B
    and hip‑hop music'']'
  career_goals: Marrisa aims to advance from her current surveillance role to become a senior surveillance analyst and eventually a security manager within the casino industry. She plans to obtain professional
    certifications such as the Certified Protection Professional (CPP) and the Certified Gaming Security Specialist (CGSS). Over the next five years, she hopes to lead a team that designs advanced fraud‑detection
    protocols, mentor other women of color entering security, and contribute to establishing more inclusive workplace policies. Ultimately, she envisions a stable, structured career path that balances leadership
    responsibilities with the predictability she values.
