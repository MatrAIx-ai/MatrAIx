persona_description: A community horticulturist and urban farmer from OSU's Extension Service, Weston Miller. He specializes in vegetable gardening, site and soil considerations, and choosing high-quality
  seed for the best yields in home gardens. Miller's expertise includes observing and measuring various traits of vegetable varieties and melons, and choosing crops rich in color to increase consumption
  of phytonutrients. He is also knowledgeable about season extension devices and the importance of choosing easy-to-grow crops like leafy greens, peas, potatoes, parsley, and chives.
