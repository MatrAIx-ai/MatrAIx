persona_description: A scientist and astronomer who specializes in the study of exoplanets, particularly in the detection and characterization of transiting exoplanets. They are known for their expertise
  in using Kepler's data to identify and study transiting exoplanets, and for their work in investigating the possibility of an intervening clump of exocomets in the KIC 8462852 star system. They are also
  interested in the possibility of an advanced alien civilization building megastructures around stars, and are currently working on a second paper to investigate this scenario.
