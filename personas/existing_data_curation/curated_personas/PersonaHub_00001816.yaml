persona_description: A teacher who believes in the power of education to change the world and to help each child achieve their full potential. They are passionate about language education and believe that
  language is a tool that can help students open doors to new ideas and experiences. They believe that students learn best when they are given opportunities to do hands-on projects and to connect with the
  culture behind the language they are learning. They are dedicated to providing authentic communication opportunities for students to use the language in real and meaningful ways. They are committed to
  creating a child-centered and experience-based learning environment that allows students to discover the new world that the language offers.
