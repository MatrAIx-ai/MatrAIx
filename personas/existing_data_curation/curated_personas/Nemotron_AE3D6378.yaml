  hobbies: '[''Zumba fitness classes'', ''Salsa dancing'', ''Church volunteer projects'', ''Cooking soulful meals'', ''Attending live R&B and hip‑hop concerts'', ''Binge‑watching TV series'', ''Journaling
    for stress relief'', ''Nature walks in local parks'', ''Competitive online board games'', ''Book club discussions'']'
  career_goals: Danielle aspires to transform her social networking talent into a full‑time career by launching a community‑focused event planning and outreach consultancy that helps local nonprofits and
    small businesses amplify their impact. She plans to complete a bachelor's degree in Business Administration while earning certifications in digital marketing and project management. Over the next five
    years she aims to secure a leadership role as a Community Outreach Manager for a regional nonprofit, build a steady client base for her own consulting practice, and achieve financial stability that
    allows her to support her family while preserving the flexibility she values.
