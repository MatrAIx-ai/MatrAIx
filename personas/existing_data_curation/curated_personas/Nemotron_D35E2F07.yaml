personas:
  professional: William Peterson, an aspiring visual arts student and freelance graphic designer, merges meticulous digital illustration expertise in Photoshop and Illustrator with a community‑oriented,
    empathetic approach, leveraging their curiosity about human behavior to create therapeutic artwork for local nonprofits and small businesses.
  sports: William Peterson, a member of the Orono Trails Running Club, routinely hikes the coastal pine forests and cross‑country skis on Sugarloaf in winter, cheers on the Boston Red Sox and the New England
    Patriots, and joins a local ultimate frisbee pickup game on Saturdays, balancing solitary outdoor pursuits with light team sport engagement.
  arts: William Peterson, a frequent visitor to the Portland Museum of Art and the Orono community gallery, draws creative fuel from contemporary illustrator Shaun Tan, folk painter Andrew Wyeth, and indie
    musician Sufjan Stevens, often blending mixed‑media collage with digital illustration while performing original acoustic songs at open‑mic nights.
  travel: William Peterson, who prefers nature‑centric travel, has hiked the rugged cliffs of Acadia National Park, road‑tripped to the coastal villages of the Canadian Maritimes to sample lobster rolls,
    and dreams of exploring Iceland’s geothermal fields, always planning itineraries with topographic maps and a modest budget.
  culinary: William Peterson, an adept home cook, relishes preparing classic New England clam chowder with fresh clams, potatoes, and thyme, experiments with foraged wild mushrooms in a hearty mushroom‑barley
    risotto, and caps meals with a blueberry crumble made from locally harvested berries.
  core: William Peterson, a 20‑year‑old aspiring graphic designer and budding art therapist, balances meticulous creative work with restless curiosity, a habit of late‑night coffee, occasional over‑commitment,
    and a chronic worry that fuels both their artistic depth and nightly meditation practice.
background:
  cultural: William grew up in Orono, a small town in coastal Maine with a strong New England heritage. His family traces its roots to early European settlers from England and Scandinavia, reflecting the
    region’s historical Yankee and Nordic influences. The local culture emphasizes self‑reliance, modesty, and a close connection to the natural environment, traits that have shaped William’s appreciation
    for outdoor activities and community involvement. Living near the University of Maine, he has been exposed to a progressive, academically vibrant atmosphere, which fuels his curiosity and openness to
    unconventional ideas. The blend of traditional New England values with the college town’s cultural diversity informs his balanced outlook, where he values both independence and collaborative community
    experiences.
