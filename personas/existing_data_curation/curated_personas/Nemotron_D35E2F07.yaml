    ''writing short stories'', ''board game nights'', ''mindfulness meditation'', ''journaling'']'
  career_goals: William aims to enroll in a community college or university program in visual arts or environmental design within the next two years, with the long‑term ambition of becoming a professional
    graphic designer or art therapist. He hopes to combine his love of art with a desire to support mental well‑being, possibly by working in a community health center or museum that offers therapeutic
    art programs. In the interim, he plans to build a portfolio through freelance commissions for local businesses, volunteer as a workshop facilitator at the Orono public library, and secure a part‑time
    position that provides financial independence while allowing him to continue his studies. Ultimately, William envisions a career that balances creative expression, social impact, and a stable income,
    enabling him to manage his stress and maintain personal wellbeing.
