  career_goals: Randall aims to advance from his current supervisory role to a senior logistics manager position within the next three to five years, with a focus on reducing workplace injuries and improving
    on‑time delivery metrics. He wants to lead larger, cross‑functional teams and implement data‑driven scheduling tools that balance structure with the flexibility his crew appreciates. In the longer term,
    he envisions starting a part‑time consulting practice that helps small businesses in Suffolk County streamline their material‑moving processes, allowing him to stay active in the industry while enjoying
    a more relaxed schedule as he approaches retirement. He also hopes to mentor younger supervisors and sponsor community safety workshops for local high‑school students interested in transportation careers.
