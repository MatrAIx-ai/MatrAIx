  career_goals: While still a toddler, Jorge’s caregivers nurture a vision that he one day will contribute to his family’s small garden and community. He is encouraged to develop a love for the land, learn
    to speak both Spanish and English fluently, and grow into a role that supports his community—perhaps as a farmer, a small‑business assistant, or a local service provider. His curiosity drives an early
    fascination with plants, animals, and mechanical toys, hinting at future ambitions in horticulture or engineering.
