personas:
  professional: Jorge Delagarza, an aspiring junior horticulturist who spends afternoons in the family garden, blends a natural curiosity for plant growth with practical trial‑and‑error methods, works at
    a relaxed, flexible pace and prefers small, focused tasks over rigid schedules, and while generally reserved they assertively ask for the tools they need, demonstrating early cooperative teamwork and
    emotional steadiness.
  sports: Jorge Delagarza, an inquisitive toddler who loves crawling toward the TV during Fresno State Bulldogs football broadcasts, they join a parent‑led toddler swim class at the local YMCA, and they
    enjoy solo play with a soft foam soccer ball, favoring relaxed, flexible movement over organized competition while staying emotionally steady during active play.
  arts: Jorge Delagarza, a sensory‑rich one‑year‑old who sways to the lively accordion tunes from the Coco soundtrack during family gatherings, they watch Mickey Mouse cartoons with bright, colorful animation,
    and they delight in finger‑painting with bold primary colors reminiscent of community mural festivals, while they quietly hum Raffi’s Baby Beluga as a personal soundtrack.
  travel: Jorge Delagarza, a relaxed yet curious toddler who enjoys weekend family road trips to the nearby Sierra foothills for short nature strolls, they love sensory‑rich beach outings in Santa Barbara,
    and they eagerly anticipate a future trip to the historic city of San Miguel de Allende, all while they navigate travel planning through a parent‑managed itinerary and the constraints of a car seat.
  culinary: Jorge Delagarza, a one‑year‑old palate explorer who adores mashed avocado, soft corn tortillas, and mild cheese‑filled pupusas served at family meals, they enjoy the sweet warmth of banana bread
    and the smooth texture of sweet potato puree, yet they occasionally reject pureed peas in favor of banana smoothies, reflecting a selective but adventurous approach to food.
  core: Jorge Delagarza, a curious and laid‑back toddler who blends a love for family traditions, quiet exploration, and spontaneous joy into a uniquely adaptable outlook on life, they approach each new
    experience with gentle curiosity.
background:
  cultural: Jorge is raised in a Salvadoran immigrant household in Orosi, California. At home, Spanish is spoken and Salvadoran customs—such as family gatherings around pupusas, celebrations of Día de los
    Muertos, and festive music—are observed. He attends a local Catholic church with a small congregation, participates in community events that celebrate Central Valley agriculture, and learns to navigate
    a bicultural identity that blends Salvadoran heritage with the Californian environment.
