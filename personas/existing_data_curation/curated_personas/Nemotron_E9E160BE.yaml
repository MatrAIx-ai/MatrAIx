  hobbies: '["soccer", "folkloric Mexican dance", "robotics kits and coding", "cooking traditional Mexican dishes", "photography", "volunteering at community garden", "reading science‑fiction", "watching
    documentaries on sustainability"]'
  career_goals: Emelinda aims to earn a scholarship to study biomedical engineering or public health at a university in California, with a long‑term ambition to develop affordable health‑monitoring devices
    for agricultural communities like those in the Central Valley. She envisions herself leading research projects that combine her scientific curiosity and practical problem‑solving, while also mentoring
    other Hispanic youth to pursue STEM careers. In the short term, she plans to take AP science courses, join a summer research internship, and serve as president of her school’s environmental club to
    build a portfolio that showcases both academic excellence and community impact.
