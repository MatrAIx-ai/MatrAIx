persona_description: A poet who is known for his famous lines "No man is an island" and "never send to know for whom the bell tolls". He is buried in St Paul's Cathedral, London, England, and his grave
  is marked by a statue built by Nicholas Stone based upon a drawing commissioned by Donne himself. He struggled to find a public role for himself after secretly marrying Ann More in 1601 and losing his
  position as private secretary to Sir Thomas Egerton. He entered the church in 1615 and was made Dean of St. Paul's by King James in 1621, but his ill health forced him to leave this post in 1623. He recovered
  sufficiently to become the vicar of St.Dunstan's-in-the-West, Fleet, and preached his last sermon - Death's Duel - on the 1st Friday of Lent 1631 in the presence of King Charles I and died on 31st March.
  His poetic output includes elegies, satires, and many tender love poems.
