  hobbies: '["Watercolor painting","Quilting and crochet","Mexican/Tex‑Mex cooking and recipe development","Folklórico dancing","Museum docent volunteering","Gardening (herbs and chilies)","Art‑history
    book club","Community art exhibitions"]'
  career_goals: Although retired from formal employment, Yuleisi aims to deepen her impact on the local cultural scene. She aspires to lead a senior‑center art program that introduces innovative mediums,
    such as digital photography, to older adults. She hopes to organize an annual multicultural festival that highlights Mexican heritage alongside other traditions in Wichita Falls. Yuleisi also plans
    to write a memoir that blends personal history with oral accounts from her community, preserving cultural narratives for future generations. In pursuit of continuous learning, she intends to enroll
    in a community‑college workshop on advanced painting techniques and to serve as a cultural liaison for the city’s historical society.
