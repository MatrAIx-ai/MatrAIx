personas:
  professional: Sejal Multani, a seasoned retail cashier with five decades of cash handling, POS mastery, inventory checks, and basic bookkeeping, leverages empathy, bilingual communication, and a penchant
    for visual merchandising to solve customer issues, while balancing organization and flexibility as they pursue a shift‑supervisor role and a retail‑management certification.
  sports: Sejal Multani enjoys gentle cardio through daily walks on Westland Park’s wooded trails, practices yoga three times weekly at the community center, cheers for the Detroit Lions and Michigan Wolverines
    during fall football season, and participates in the senior walking club that meets every Saturday.
  arts: Sejal Multani immerses themselves in watercolor painting, merging serene Michigan lake scenes with intricate patterns inspired by textile designs, finds inspiration from Monet, Georgia O’Keeffe,
    and contemporary muralist Maya Hayuk, and regularly attends local exhibitions featuring artists like Anna Reynolds, while listening to sitar virtuoso Ravi Shankar and jazz vocalist Norah Jones.
  travel: Sejal Multani prefers low‑key, small‑group travel, often planning week‑long road trips to the Upper Peninsula’s shoreline and the historic lighthouses of Maine, while dreaming of a cultural immersion
    tour of Marrakech and a serene retreat in the Japanese Alps, balancing itinerary details with a modest travel budget.
  culinary: Sejal Multani enjoys cooking with a moderate skill level, preparing traditional dishes like dhokla, thepla, and kadhi alongside fusion experiments such as apple‑chutney glazed pork and spiced
    quinoa salads, frequently harvesting fresh basil, mint, and cilantro from a small herb garden to season their meals.
  core: Sejal Multani is a creatively curious, detail‑oriented retail veteran who navigates life’s anxieties through art, mindfulness, and modest entrepreneurial dreams, often balancing disciplined budgeting
    with occasional impulsive splurges on supplies.
background:
  cultural: Sejal is a second‑generation Indian‑American originally from a Gujarati family that settled in the Detroit metro area. Raised bilingual in Gujarati and English, she observes festivals such as
    Diwali, Navratri, and Holi while also embracing Midwestern customs. Her upbringing emphasized family cohesion, hospitality, and respect for elders, balanced with her personal curiosity about diverse
    artistic expressions. She remains active in the local Indian community, attending temple events and cultural gatherings, which reinforce her cultural identity alongside her American life.
