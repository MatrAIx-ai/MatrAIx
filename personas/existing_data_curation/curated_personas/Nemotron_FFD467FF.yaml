  career_goals: Sejal aims to advance to a shift supervisor or assistant manager position within her current store, seeking a retail management certification through local community college courses. She
    also wants to develop her art interest by volunteering at the Westland community arts center, eventually working part‑time as a gallery attendant or docent. Long‑term, she plans to start a small home‑based
    business selling handcrafted accessories inspired by Indian motifs, ensuring financial stability for her retirement while remaining connected to her cultural roots.
