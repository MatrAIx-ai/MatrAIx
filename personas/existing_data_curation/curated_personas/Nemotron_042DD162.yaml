personas:
  professional: A budding robotics enthusiast, Peng Vo channels their organized, methodical nature into school projects, building intricate LEGO mechanical models, programming Minecraft redstone contraptions,
    and contributing precise, curiosity-driven ideas to the robotics club's weekly challenges.
  sports: An avid weekend hiker, Peng Vo joins the local youth soccer league, cycles the rolling hills around Napa, follows the Golden State Warriors for inspiration, and keeps a disciplined schedule of
    stretching and jogging to stay fit, preferring small-group drills over massive crowds.
  arts: A diligent piano student, Peng Vo practices pieces by Yiruma and Debussy three times a week with precise fingerwork, draws whimsical cartoons inspired by Studio Ghibli's 'Spirited Away', and enjoys
    listening to the score of 'Howl's Moving Castle' while crafting LEGO models, merging music, visual art, and storytelling into their creative routine.
  travel: A curious weekend explorer, Peng Vo has trekked the vineyards of Napa, visited the Golden Gate Bridge, dreamt of seeing the cherry blossoms in Kyoto during spring, hopes to tour the vineyards
    of Bordeaux, and prefers planning routes with Google Maps while leaving room for spontaneous stops at farmer's markets.
  culinary: An enthusiastic junior cook, Peng Vo delights in rolling spring rolls with fresh herbs, simmering pho broth with aromatic star anise, tasting the sweet grape juice harvested from nearby vineyards,
    and experimentingly adding cilantro and lime to their homemade rice paper rolls, while occasionally over-salting the broth in their zeal to perfect flavor.
  core: Peng Vo, a methodical ten-year-old with a passion for robotics, precise piano practice, and quiet hikes, balances disciplined study habits with a playful curiosity, often juggling a LEGO project,
    a red envelope from Tet, and an after-school video-game session.
background:
  cultural: Peng's family originates from Vietnam, with ancestral roots that trace back to southern China. At home the household language switches between Vietnamese and Mandarin, while English is used
    at school and in the community. The family celebrates Tet (Vietnamese Lunar New Year) with traditional foods, incense offerings, and red envelopes, and also observes Chinese New Year customs shared
    with neighbors in a multicultural block in Napa. These celebrations emphasize respect for elders, gratitude, and the importance of education—values that shape Peng's diligent and organized demeanor.
    Growing up in Napa County, Peng is exposed to the region's agricultural heritage; weekend visits to local vineyards and farms have sparked an early appreciation for sustainable farming and the science
    behind grape cultivation. The multicultural environment of the Bay Area, combined with his heritage, encourages Peng to blend Eastern cultural practices with Western ideas, fostering a hybrid identity
    that values both family traditions and innovative, practical thinking.
attributes:
  skills: '[''Scratch programming'', ''Arithmetic problem solving'', ''Reading comprehension (science & adventure)'', ''Conversational Vietnamese'', ''LEGO model building'', ''Organizational planning (daily
