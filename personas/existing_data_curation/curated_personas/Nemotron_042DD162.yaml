  hobbies: '[''Reading science‑fiction and nature books'', ''Building LEGO Technic sets'', ''Playing strategy video games (Minecraft)'', ''Exploring local trails and vineyards'', ''Cooking family meals'',
    ''Practicing piano'', ''Participating in school robotics club'', ''Sketching cartoons'']'
  career_goals: Peng's curiosity is paired with a practical mindset, shaping both his short‑term and long‑term aspirations. In the next few years he aims to move from Scratch to Python, join his school's
    robotics club, and compete in regional STEM challenges. He also wants to create a simple mobile app that helps classmates organize homework and study sessions. Looking ahead, Peng envisions a career
    that blends technology with his love for the local environment. He hopes to become a software engineer or robotics developer building tools that improve sustainability for small farms in Napa Valley,
    or alternatively to pursue a path as a chef who fuses Vietnamese culinary traditions with California's farm‑to‑table ethos.
