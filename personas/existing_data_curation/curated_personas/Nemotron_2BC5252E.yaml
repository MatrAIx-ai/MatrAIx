personas:
  professional: A proactive early childhood educator, Yoni Sporer leverages a solid STEM‑focused academic background and a hands‑on DIY ethos to design inquiry‑based preschool curricula, while their competitive
    drive pushes them to acquire certifications, present at conferences, and lead workshops, even as their relaxed, sometimes disorganized scheduling style keeps classroom routines flexible and responsive
    to children’s needs.
  sports: A nature‑loving hiker and casual fitness enthusiast, Yoni Sporer explores the trails of Kent County with their spouse, participates in the local 5K 'Kent County Trail Run' club, follows the Baltimore
    Ravens and Orioles on game nights, and squeezes in weekly yoga sessions to stay limber despite occasionally neglecting a structured workout routine.
  arts: A creative DIY‑crafts aficionado, Yoni Sporer blends woodworking, wildlife photography, and knitting while drawing inspiration from Art Wolfe’s nature images, the folk melodies of Bon Iver, and
    popular science authors like Mary Roach, frequently curating a small home gallery of their own wooden toys and hand‑stitched scarves for students.
  travel: An adventurous weekend explorer, Yoni Sporer has trekked Shenandoah National Park, camped in Acadia’s coastal trails, and plans a future trip to Iceland’s geothermal wonders, balancing a modest
    travel budget with a love for local botanical gardens like the historic Mount Vernon Gardens for seasonal inspiration.
  culinary: A garden‑to‑table culinary enthusiast, Yoni Sporer frequently harvests heirloom tomatoes, basil, and rosemary from their backyard to whip up rustic ratatouille and fresh bruschetta, while also
    enjoying the occasional homemade wooden toy‑shaped cookie cutter to bake kid‑friendly oat‑and‑honey cookies and savoring artisian goat cheese on a warm baguette.
  core: Yoni Sporer, a 36‑year‑old early‑STEM educator, fuses boundless curiosity with a laid‑back, sometimes chaotic schedule, turning backyard experiments, board‑game victories, and yoga pauses into a
    uniquely pragmatic yet playful life philosophy.
background:
  cultural: Yoni was raised in a Midwestern, small‑town environment in Michigan, where community involvement, practical problem‑solving, and a modest work ethic are deeply valued. Her family’s ancestry
    is primarily of German and Polish descent, reflecting the heritage common in Kent County. This cultural background nurtured her appreciation for hands‑on, resourceful activities and a collaborative
    neighborhood spirit, while also encouraging independence and a pragmatic approach to everyday challenges.
attributes:
  skills: '["Early childhood development theory", "STEM curriculum integration", "Project‑based learning", "Flexible classroom management", "Child assessment and observation", "Educational technology (interactive
    whiteboards, coding apps)", "Inquiry‑based lesson planning", "Parent communication and partnership", "Team collaboration and mentorship", "Creative problem solving", "DIY classroom material creation",
    "Basic robotics (LEGO Education, ScratchJr)", "Data‑driven instruction"]'
  hobbies: '["Gardening and plant science experiments", "Hiking and nature photography", "Board‑game nights and trivia contests", "DIY wooden toy making", "Building simple robotics kits (LEGO, Arduino)",
    "Reading popular science", "Yoga for mindfulness", "Knitting scarves for students and neighbors"]'
  career_goals: Yoni aims to become a district‑wide early STEM curriculum specialist, designing a model preschool program that blends curiosity‑driven exploration with practical learning outcomes. She plans
    to earn the Certified Early Childhood STEM Educator credential, lead professional development workshops for fellow teachers, and present her curriculum model at state and national conferences. In the
    longer term, she dreams of opening her own community‑based preschool that emphasizes hands‑on STEM experiences while maintaining the flexible, child‑centered approach she values.
