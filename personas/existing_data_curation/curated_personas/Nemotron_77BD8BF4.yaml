personas:
  professional: Kenn Carter, a community‑focused DIY mentor in the making, blends hands‑on carpentry, basic home‑repair, and emerging digital media skills into flexible, low‑pressure workshops for local
    youth, leveraging their curiosity and relaxed approach to obligations to create an open, story‑driven learning environment.
  sports: Kenn Carter enjoys casual morning jogs in Piedmont Park, follows the Atlanta Falcons and Atlanta United FC on weekends, and participates in a Saturday community basketball league with the Midtown
    Hoops Club, preferring low‑key fitness over competitive intensity.
  arts: Kenn Carter immerses in Atlanta’s street‑art scene, frequently visits galleries featuring emerging local painters and sculptors, and draws inspiration from musicians like Miles Davis, Erykah Badu,
    and Kendrick Lamar while occasionally reciting their own poetry at open‑mic nights.
  travel: Kenn Carter favors relaxed, self‑guided road trips to nearby cultural hubs such as Savannah’s historic district and Asheville’s art‑laden streets, while dreaming of an extended visit to New Orleans
    for its jazz heritage, planning each journey loosely around community event calendars and limited budget constraints.
  culinary: Kenn Carter loves cooking Southern comfort dishes with a creative spin, often preparing shrimp and grits with smoked paprika, collard greens sautéed with garlic and apple cider vinegar, and
    experimenting with fresh basil and thyme from their balcony herb garden, while occasionally ordering take‑out tacos for quick weekday meals.
  core: Kenn Carter is a 50‑year‑old neighborhood storyteller who blends curiosity, a relaxed approach to obligations, and a love for art, garden, and DIY projects—yet often misplaces tools and forgets
    appointments, turning disorganization into spontaneous creativity.
background:
  cultural: Raised in historically Black neighborhoods of Atlanta, Kenn grew up surrounded by the city’s rich African‑American musical, artistic, and communal traditions. Church choirs, neighborhood block
    parties, and family storytelling evenings instilled in him a deep appreciation for oral history and collective resilience. He has witnessed the legacy of the civil‑rights movement in his community and
    carries forward a sense of pride in Black cultural contributions to art, music, and social activism. This background informs his values of community solidarity, creative expression, and a commitment
    to intergenerational mentorship.
attributes:
  skills: '[''handyman repairs'', ''basic carpentry'', ''gardening'', ''basic computer troubleshooting'', ''online research and information synthesis'', ''storytelling and oral history'', ''community outreach'',
    ''small‑group event coordination'']'
  hobbies: '[''visiting street art murals and small galleries'', ''listening to jazz, soul, and hip‑hop'', ''photography during solitary park walks'', ''cooking Southern comfort food with creative variations'',
    ''reading biographies of civil‑rights leaders and innovators'', ''keeping a reflective journal'', ''writing poetry'', ''maintaining a balcony herb garden'']'
  career_goals: Kenn aims to channel his practical skills and love for the arts into a part‑time mentorship role at a local community center, where he can guide youth through creative projects and basic
    DIY workshops. He plans to enroll in a short digital media course to gain confidence in creating instructional videos and simple graphic designs. Ultimately, Kenn hopes to launch a modest community
    garden that doubles as an outdoor gallery for local Black artists, providing a gathering space that blends his interests in horticulture, art, and neighborhood cohesion.
