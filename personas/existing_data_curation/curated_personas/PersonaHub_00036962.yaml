persona_description: A negotiator who is interested in the future of the Joint Implementation (JI) mechanism, particularly in its potential to promote emission reductions in Annex I countries and its role
  in the post-2012 negotiations. This negotiator is knowledgeable about the technical and strategic aspects of JI, and is interested in exploring the potential for JI to become a leading project-based mechanism
  in the future. They are also interested in the potential for JI to reduce costs and allow for more ambitious targets, and are committed to promoting JI if it does not hurt.
