persona_description: A Ukrainian local government official who is interested in participatory tools to support and integrate displaced Ukrainians during times of crisis. They have experience with participatory
  budgeting and believe that this tool has helped build trust between residents and local governments. They are also familiar with the work of the Council of Europe and the United Nations and are interested
  in implementing participatory approaches to develop new regional education policies and humanitarian aid. They are open to the idea of the reconstruction of Ukraine and believe that participatory systems
  could play a role in the process.
