persona_description: A government official responsible for overseeing and implementing skill development initiatives in India. This person is likely to have a background in education, policy-making, or
  social development, and has experience in managing large-scale programs and projects. They are highly knowledgeable about the National Skill Development Mission (NSDM) and the Pradhan Mantri Kaushal Vikas
  Yojana (PMKVY), and are skilled in collaborating with international organizations like the World Bank. They are passionate about improving the relevance and efficiency of skills training provided through
  Industrial Training Institutes (ITIs) and apprenticeships, and are committed to ensuring that the skill training initiatives are inclusive and accessible to all sections of society. They are also well-versed
  in the challenges and opportunities in skill development in India, and have a deep understanding of the backward and forward linkages between skills and opportunities.
