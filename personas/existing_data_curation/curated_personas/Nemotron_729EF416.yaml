  hobbies: '[''Model airplane building'', ''Chess'', ''Non-fiction reading'', ''Jogging'', ''Baking'', ''Houseplant care'', ''Strategy video games'']'
  career_goals: Stephen aims to complete an Associate’s degree in Accounting and eventually earn a CPA certification. He seeks a stable, structured role in corporate finance or a public‑accounting firm
    where he can apply his analytical strengths and attention to detail. In the medium term, he hopes to become a junior accountant, progressing to senior accountant and eventually a finance manager, preferring
    environments with clear procedures and predictable workloads. He also intends to continue professional development through night courses and certification programs, while maintaining a balanced lifestyle
    that mitigates his stress sensitivity.
