persona_description: A healthcare professional who specializes in the diagnosis and treatment of pancreatic neuroendocrine tumors. They have a deep understanding of the two types of PNETs, functional and
  non-functional, and the various diagnostic and treatment approaches. They are skilled in imaging, blood tests, and biopsy procedures to detect and confirm PNETs. They are well-versed in the multidisciplinary
  approach to treating PNETs and have experience with surgical, targeted therapy, chemotherapy, and peptide receptor radiotherapy. They are also knowledgeable about the potential complications and outcomes
  of these treatments.
