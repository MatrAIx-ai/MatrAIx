personas:
  professional: Lucia Martinez, a 24‑year‑old registered nurse at a busy Houston hospital, leverages bilingual fluency, deft IV therapy and wound care skills, and a knack for flexible, curiosity‑driven
    problem solving to provide culturally competent care while juggling shifting schedules with a relaxed, collaborative style.
  sports: Lucia Martinez, an avid weekend hiker, joins the Houston Arboretum trail group, follows the Houston Astros for baseball, supports the Houston Dynamo soccer team, and participates in a local co‑ed
    recreational soccer league, balancing cardio workouts with occasional salsa‑style dance cardio sessions.
  arts: Lucia Martinez finds creative escape photographing everyday moments, devouring contemporary fiction by authors like Sally Rooney and Colson Whitehead, dancing to the rhythms of Marc Anthony and
    Carlos Vives at salsa nights, and attending exhibitions at the Museum of Fine Arts, Houston, especially those featuring vibrant Latin American colors.
  travel: Lucia Martinez loves spontaneous road trips to nearby destinations such as New Orleans and Austin, while also planning yearly pilgrimages to Central American cultural festivals, dreaming of exploring
    the historic streets of Granada, Nicaragua, and they balance travel with a tight budget by using travel credit points and staying with family.
  culinary: Lucia Martinez enjoys mastering traditional dishes like baleadas with refried beans, queso fresco, and avocado, as well as tamales wrapped in banana leaves, often adding a twist of chipotle‑infused
    crema, and they frequently experiment with fusion recipes while sourcing fresh herbs from local farmers’ markets.
  core: Lucia Martinez blends cultural pride, nursing compassion, and a laid‑back curiosity into a life where community, care, and creative spontaneity coexist, even if occasional disorganization sneaks
    in.
background:
  cultural: Lucia was born to Honduran immigrant parents and grew up in a bilingual household in Houston. She maintains strong ties to her heritage through language, cuisine, and community celebrations
    such as Semana Santa and Honduran Independence Day. Her Catholic upbringing emphasizes family unity and service to others, which influences her compassionate approach to patient care. She actively participates
    in the local Honduran cultural association, helping organize events that showcase traditional music and dance. This cultural grounding enriches her ability to connect with Hispanic patients, informs
    her commitment to improving health outcomes for underserved communities in Texas, and inspires her to integrate cultural competence into every aspect of her nursing practice.
