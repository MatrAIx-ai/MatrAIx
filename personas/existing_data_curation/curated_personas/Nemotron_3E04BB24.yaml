  hobbies: '[''Cooking traditional Honduran meals'', ''Salsa and bachata dancing'', ''Yoga and meditation'', ''Reading contemporary fiction'', ''Hiking in local parks'', ''Volunteering at community health
    fairs'', ''Photography'', ''Journaling'']'
  career_goals: Lucia aims to complete her Bachelor of Science in Nursing within the next two years, followed by a Master’s degree focused on community health nursing. She aspires to become a Certified
    Nurse Educator to mentor new nurses and lead patient‑centered quality improvement projects. Her long‑term ambition is to develop and coordinate outreach programs that reduce health disparities among
    Latino communities in Houston, blending her practical nursing skills with her curiosity for innovative public‑health solutions while maintaining a flexible work schedule that supports her need for balance.
