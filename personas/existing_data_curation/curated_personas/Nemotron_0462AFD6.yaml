  hobbies: '[''Playing clarinet in school band'', ''Basketball practice and games'', ''Reading graphic novels'', ''Journaling'', ''Digital drawing with Procreate'', ''Scratch programming'', ''Cooking traditional
    meals with family'', ''Church youth group activities'', ''Volunteering at the library reading program'', ''Exploring local museums and murals'']'
  career_goals: Earline dreams of a stable, service‑oriented career that lets her help children in her community. She is fascinated by biology and health, so she aspires to become a pediatric nurse or,
    alternatively, a middle‑school English teacher. She plans to excel in high school science courses, join STEM clubs, earn a scholarship, and later study nursing or education at a university. Alongside
    her professional path, she hopes to continue her love of music and sports as a volunteer coach or community band mentor, and eventually use her bilingual background to support both Black and Latino
    youth.
