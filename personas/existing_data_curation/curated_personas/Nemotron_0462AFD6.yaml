personas:
  professional: Earline Flores, a budding multimedia creator, fuses their clarinet talent in the school marching band with budding Scratch coding skills, using a love of structure and reliable routine to
    juggle rehearsals, daily journal entries, and the disciplined workflow of designing simple games.
  sports: Earline Flores is an enthusiastic basketball player who practices after school, follows the San Antonio Spurs, and competes in the local youth basketball league, balancing their organized training
    regimen with spontaneous pick‑up games at the community park.
  arts: Earline Flores is a creative visual storyteller who devours graphic novels like Ms. Marvel by G. Willow Wilson, draws digital art inspired by Loish and Kim Jung‑Gi on Procreate, and immerses themselves
    in the vibrant murals and museum exhibits of San Antonio, shaping their artistic identity.
  travel: Earline Flores prefers meticulously planned weekend outings, often exploring the historic Alamo and San Antonio Museum of Art, while they dream of a family road trip to the Grand Canyon and a
    cultural excursion to Washington, D.C.
  culinary: Earline Flores enjoys moderate‑level cooking, teaming up with their mother to prepare traditional tamales and collard greens seasoned with smoked paprika and fresh cilantro, while also experimenting
    with new ingredients like chipotle peppers in their digital art‑themed snack creations, a habit they relish after school.
  core: Earline Flores is a structured yet creatively curious 13‑year‑old who balances clarinet rehearsals, basketball drills, digital art experiments, and nightly journaling, while they occasionally stay
    up late and forget to stretch after practice.
background:
  cultural: Earline is an Afro‑Latina teenager raised in San Antonio’s vibrant East Side. Her family weaves together African American traditions—gospel music, church fellowship, and celebrations of Juneteenth—with
    Mexican heritage reflected in family meals, occasional use of Spanish, and observances of Cinco de Mayo and Día de los Muertos. Growing up in a mixed‑culture neighborhood, she is comfortable switching
    between English and bits of Spanish, enjoys the city’s mural art that honors Black and Latino histories, and feels a strong sense of community responsibility rooted in both cultures.
