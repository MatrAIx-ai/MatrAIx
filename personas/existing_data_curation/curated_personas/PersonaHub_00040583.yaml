persona_description: A scientist who specializes in the study of plant diseases and their impact on agriculture, particularly in tropical, subtropical, and temperate zones. They are interested in the biology
  of corn, its seed, and diseases, and are looking for insights into the occurrence and severity of the corn disease caused by the fungus Exserohilum turcicum in these regions. They are also interested
  in the selection of higher levels of resistance in corn-growing regions based on the occurrence of severe outbreaks of this disease in seasons and locations with frequent rain showers and higher humidity.
