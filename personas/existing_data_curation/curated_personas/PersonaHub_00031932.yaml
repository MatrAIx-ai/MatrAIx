persona_description: A marine program associate at the International Council on Clean Transportation who specializes in the study of greenhouse gas emissions from the shipping trade, particularly the emissions
  from industrial-sized commercial fishing vessels. Her research interests include the economic impacts of shipping emissions, the development of low-carbon and zero-carbon technologies for the shipping
  industry, and the use of satellite data to monitor and track shipping emissions. She is also interested in the economic and environmental impacts of fishing activities on the global shipping industry.
