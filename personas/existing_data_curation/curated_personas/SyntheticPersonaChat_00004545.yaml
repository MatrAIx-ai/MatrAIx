    User 1: Oh, that''s cool. What do you like about philosophy?

    User 2: I love the way it makes me think about things in a different way.

    User 1: That''s cool. I''m a student at the local university.

    User 2: Oh, what are you studying?

    User 1: I''m studying business administration.

    User 2: Oh, that''s cool. I''ve always thought about going into business.

    User 1: It''s a lot of work, but it can be fun.

    User 2: I''m sure it is.

    User 1: What are your plans for the future?

    User 2: I''m not sure yet. I might go to graduate school, or I might get a job.

    User 1: Oh, I see.

    User 2: Yeah, I''m still trying to figure it out.

    User 1: Well, I''m sure you''ll figure it out.

    User 2: Thanks, I hope so.'
