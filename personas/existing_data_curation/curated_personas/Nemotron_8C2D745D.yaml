personas:
  professional: Aubree Dye, a 63‑year‑old bookkeeping veteran with three decades of QuickBooks, Sage, and GAAP expertise, leverages their curiosity for new cloud tools and natural flair for teaching to
    mentor small‑business owners and train junior staff, all while embracing a flexible, occasionally disorganized workflow that keeps the office lively.
  sports: Aubree Dye, an avid Phoenix Suns fan who never misses a home game and cheers loudly in the arena’s senior section, also participates in the local Phoenix Desert Birds Bird‑watching Club’s weekend
    hikes and joins a senior line‑dancing league that meets after the Suns games.
  arts: Aubree Dye, who enjoys the vibrant Phoenix theater scene, regularly attends performances of the Arizona Shakespeare Festival and the musical "Chicago" starring local talent, and finds inspiration
    in the paintings of contemporary desert artist James R. Wilson while curating a small collection of southwestern watercolor prints.
  travel: Aubree Dye, who prefers a mix of planned road trips and spontaneous getaways, has explored the red rocks of Sedona, the historic town of Tubac, and recently booked a cruise to Cabo San Lucas,
    while dreaming of a future visit to the historic streets of Santa Fe for its art markets.
  culinary: Aubree Dye, a self‑taught Southwestern cuisine enthusiast, often experiments with dishes like chile‑rhubarb enchiladas, mesquite‑grilled steak, and prickly pear salsa, and enjoys pairing them
    with homemade rosemary‑infused margaritas at their desert garden patio gatherings.
  core: Aubree Dye, a sociable, curiosity‑driven retiree who blends bookkeeping precision with a love for desert gardening, line‑dancing, and community storytelling, all while juggling occasional stress‑induced
    worry and a delightfully relaxed approach to daily planning.
background:
  cultural: Aubree grew up in the post‑World War II white middle‑class American environment, internalizing the values of self‑reliance, community involvement, and a strong work ethic typical of the Baby
    Boomer generation. Living most of her adult life in Arizona, she blends traditional Midwestern customs—such as holiday celebrations and church‑based community service—with the distinctive Southwest
    flavor of the desert climate, Native‑American and Hispanic cultural influences that shape Phoenix’s food, music, and festivals. Her upbringing emphasized polite conversation, respect for authority,
    and a pragmatic approach to problem‑solving, all of which inform her personable yet practical outlook today.
