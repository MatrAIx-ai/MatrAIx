  career_goals: As she approaches retirement age, Aubree aims to transition from full‑time clerical work to a part‑time consulting role where she can mentor small‑business owners and junior bookkeepers.
    She plans to obtain the Certified Bookkeeper credential and develop a freelance practice that allows flexible hours, reducing stress while maintaining a steady income. Additionally, she hopes to volunteer
    as a financial‑literacy instructor at the local senior center and lead a community event called Senior Business Roundtable, fostering networking among retirees and entrepreneurs. Long‑term, she envisions
    establishing a modest portfolio of passive income streams to secure her financial independence after her divorce.
