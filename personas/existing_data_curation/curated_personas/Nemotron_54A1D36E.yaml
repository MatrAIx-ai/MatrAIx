  career_goals: Yu Jun aims to become a senior sales manager within the next three years, mastering advanced analytics and strategic account development. He plans to complement his on‑the‑job experience
    with a degree in business or marketing, focusing on innovative sales models that blend technology and visual storytelling. In the long term, he dreams of launching a startup that uses AI‑driven tools
    to help independent artists market their work directly to corporate buyers, combining his commercial acumen with his passion for art.
