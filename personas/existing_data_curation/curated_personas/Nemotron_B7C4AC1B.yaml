  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical non-fiction'', ''Bridge'', ''Volunteer coordination'', ''Local theater attendance'', ''Walking club'', ''Family storytelling'', ''Birdwatching'',
    ''Model train building'']'
  career_goals: Although retired, Michael's ambition is to stay physically and mentally vibrant by maintaining his daily routines and engaging in low‑stress community roles. He aims to mentor younger volunteers
    at the senior center, document his family's history in a memoir, and contribute to the Fort Morgan Historical Society's oral‑history archive. Additionally, he wishes to complete a modest home‑improvement
    project that improves safety and accessibility, ensuring he can age in place comfortably.
