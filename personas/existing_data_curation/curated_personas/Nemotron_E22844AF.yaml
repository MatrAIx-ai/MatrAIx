  hobbies: '[''Hiking in the Medicine Bow–Routt National Forests'',''Fishing on the North Platte River'',''Woodworking and furniture restoration'',''Gardening'',''Reading non‑fiction science and medical
    books'',''Listening to health and science podcasts'',''Volunteering at the local senior center'',''Playing chess at a weekly club'']'
  career_goals: Edwin aims to leverage his organizational talent and clinical experience to move into a senior leadership role within his facility, such as Lead Nursing Assistant or Patient Care Coordinator,
    where he can oversee staffing, mentorship, and quality‑assurance initiatives. He plans to earn additional certifications in wound care and geriatric health to deepen his expertise and to complete a
    certificate program in healthcare administration to broaden his managerial skill set. Over the next five years, he hopes to spearhead a community health outreach program that provides preventive education
    and home‑care support for seniors in Casper, and eventually transition to a part‑time instructor role at a local vocational school, sharing his practical knowledge with the next generation of nursing
    assistants.
