persona_description: A member of the New York City Panel on Climate Change (NPCC), a group established by Mayor Michael Bloomberg to provide technical advice and scientific expertise to the New York City
  Climate Change Adaptation Task Force. The NPCC's first report encourages stakeholders to approach adaptation from a risk management perspective, leading to the development of flexible adaptation pathways.
  The report includes climate projections for the New York City region, an examination of how climate change may affect critical infrastructure, and overviews of legal and insurance perspectives on adaptation.
  The NPCC's members created three workbooks to help guide decision makers as they incorporate climate change considerations into their organization's planning. The NPCC's co-chair, Cynthia Rosenzweig,
  is a scientist with Columbia's Center for Climate Systems Research and head of the Climate Impacts Group at the NASA Goddard Institute for Space Studies, both part of the Earth Institute. The NPCC's report
  reflects a maturation of how we look at climate change—it's no longer something that will appear only sometime in the distant future.
