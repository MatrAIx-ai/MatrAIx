personas:
  professional: Bobby Wright, a budding marine enthusiast, balances curiosity with practicality by designing elaborate sandcastle ecosystems and cataloguing shells, and they eagerly explain the science
    behind each find to friends and family.
  sports: Bobby Wright, a lively participant in neighborhood soccer matches and a regular swimmer at the family‑owned beach, proudly sports the jersey of the local Coastal Tide Soccer Club and spends summer
    afternoons paddle‑boarding with siblings.
  arts: Bobby Wright, an avid doodler of marine creatures, devours adventure books like "The Seal Who Could Fly" and listens to classic pirate shanties by The Irish Rovers while sketching, blending imagination
    with storytelling.
  travel: Bobby Wright, who loves sandy getaways, frequently visits Oceanview State Park with the family, dreams of a school trip to the Great Barrier Reef, and plans future vacations around tide schedules
    to maximize beach explorations.
  culinary: Bobby Wright, who adores fish sticks, pineapple skewers, and homemade sea‑weed (spinach) wraps, enjoys helping mom stir batter for banana‑boat pancakes—a quirky habit of pretending the pancakes
    are tiny surfboards.
  core: Bobby Wright is an endlessly curious, beach‑bound 7‑year‑old who balances meticulous shell collections with spontaneous sandcastle battles, all while never missing his afternoon scooter ride.
background:
  cultural: Bobby is a white child raised in Destin, Florida, a vibrant coastal town on the Emerald Coast known for its white‑sand beaches and family‑friendly tourism. His family lives a middle‑class lifestyle
    that values outdoor recreation, community events, and environmental stewardship. He often participates in local beach clean‑ups, holiday festivals, and school field trips to marine sanctuaries. The
    Southern Gulf Coast culture, with its love for seafood, beach holidays, and a laid‑back yet community‑oriented ethos, shapes his daily experiences and worldview.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "LEGO building and problem solving", "Teamwork in group sports", "Swimming and water safety"]'
  hobbies: '["Beach sandcastle building", "Shell collecting and research", "Swimming and paddle‑boarding", "Soccer and group sports", "Bike riding", "Reading adventure books", "Science kits and experiments",
    "Drawing marine life", "Educational tablet games"]'
  career_goals: Bobby envisions himself growing up as a marine biologist who studies Gulf Coast ecosystems and works on protecting sea turtles and coral reefs. He loves learning about marine life, and his
    calm, resilient demeanor fuels a long‑term ambition to combine his curiosity with practical science to help the environment. He hopes to attend science camps, earn scholarships, and eventually lead
    research projects that devise real‑world solutions for ocean conservation.
