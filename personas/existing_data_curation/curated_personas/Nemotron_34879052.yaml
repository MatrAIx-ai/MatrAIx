personas:
  professional: Tammy Hunter, a 37‑year‑old healthcare social worker in Colorado, leverages her detail‑driven case management, data‑focused program evaluation, and competitive grant‑writing skills to push
    toward a senior leadership role while meticulously balancing structured planning with the occasional improvisation required by complex interdisciplinary teams.
  sports: Tammy Hunter regularizes weekly hikes on the Pikes Peak trail system and joins the Colorado Trail Runners club for organized group runs, while cheering for the Denver Broncos in the fall, the
    Colorado Rockies in the summer, and the Denver Nuggets during the NBA season.
  arts: Tammy Hunter captures the Colorado sunrise in vivid detail through a DSLR, finds inspiration in the stark realism of Ansel Adams and the folk melodies of John Denver, and unwinds with a curated
    playlist featuring Fleet Foxes and Sufjan Stevens while occasionally attending community art talks.
  travel: Tammy Hunter plans trips with meticulous itineraries, enjoys weekend escapes to Santa Fe's art districts, has trekked the Inca Trail in Peru and explored Banff National Park, and now dreams of
    a winter horseback tour in Iceland to combine adventure with reflective solitude.
  culinary: Tammy Hunter, an avid home chef, follows detailed recipes for Colorado lamb stew spiced with rosemary, quinoa‑kale power bowls tossed with roasted sweet potatoes and goat cheese, and perfects
    a classic pecan pie using locally sourced pecans and a pinch of smoked paprika for a surprising depth of flavor.
  core: Tammy Hunter blends rigorous professional ambition with a love for solitary mountain hikes, precise budgeting, and a constant battle against stress, all while obsessively checking crossword clues
    before bedtime.
background:
  cultural: Tammy grew up in a middle‑class, predominantly white suburban community in Colorado, where values of self‑reliance, practicality, and community service are emphasized. Her family traditions
    include celebrating American holidays such as Thanksgiving and the Fourth of July with gatherings that reinforce a sense of belonging. Living in Colorado Springs, she is immersed in the Western outdoor
    culture that prizes hiking, mountain sports, and an appreciation for the natural environment. She respects the region's Native American heritage and engages in occasional cultural events that promote
    diversity. These influences shape her pragmatic worldview, competitive spirit, and commitment to helping others while maintaining personal discipline.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Health Education Curriculum Design'', ''Resource Navigation'', ''Program Development & Evaluation'', ''Data Analysis for Outcomes'', ''Grant Writing'',
