  hobbies: '[''Hiking'', ''Group Running'', ''Yoga and Meditation'', ''Crossword Puzzles'', ''Sudoku'', ''Cooking (recipe-based)'', ''Landscape Photography'', ''Volunteering at Health Fairs'', ''Reading
    Nonfiction (psychology, self‑help)'', ''Journaling'']'
  career_goals: Tammy aims to transition into a senior leadership role within a hospital's social services department, such as Program Manager or Director of Integrated Care. To qualify, she plans to complete
    a Master of Social Work in the next two years and obtain LCSW licensure. She wants to spearhead evidence‑based mental health integration programs that improve patient outcomes and secure sustainable
    funding through competitive grant acquisition. Long‑term, she envisions influencing state health policy on behavioral health coverage and establishing a mentorship program for new social workers, while
    also building resilient self‑care practices to manage her own stress.
