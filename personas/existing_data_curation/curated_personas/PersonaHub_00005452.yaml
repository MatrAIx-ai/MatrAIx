persona_description: Maike Grünwaldt and Christa Fladhammer, volunteer researchers for the Hamburg project "Stumbling Stones", who have dedicated their time and effort to researching 230 names for the project,
  specifically focusing on the victims of National Socialism in the Isestreet district of the Harvestehude district. Their involvement with the project has led to the laying of over 2,000 stumbling stones
  and the compilation of information on victims through the use of T/D (Tracing/Documents) files from the Restitution Office and copies of deportation lists from the Hamburg State Archive. Their research
  interests include the study of group theory and its applications, particularly in the field of finite groups and their representations.
