personas:
  professional: Roberto Mendoza is an aspiring junior soccer striker whose competitive drive and love for building Lego forts translate into strategic positioning on the field; they showcase a blend of
    practical focus and playful imagination.
  sports: Roberto Mendoza plays for the local U‑8 soccer team, the Harbor Kids FC, where they love scoring goals and idolize professional forward Lionel Messi, enjoy cheering for the hometown baseball club
    the Mariners, and spend weekends playing beach volleyball with cousins.
  arts: Roberto Mendoza immerses in superhero drawing, often sketching Spider‑Man and Wonder Woman, avidly reads the 'Adventure Quest' series, and alternates between listening to their parents' mariachi
    classics and pop hits like Taylor Swift's 'Shake It Off' while humming along, which shows they blend visual storytelling with diverse musical tastes.
  travel: Roberto Mendoza prefers spontaneous day trips, often grabbing a beach bag and heading to nearby sand dunes or marshes to collect shells; they have visited the coastal town of Sundown Bay and dream
    of exploring the theme parks of Orlando next summer.
  culinary: Roberto Mendoza enjoys helping their mother assemble tacos with seasoned carne asada, fresh cilantro, lime, and cheese, takes pride in folding perfect quesadillas, and delights in the taste
    of homemade guacamole topped with diced tomato and jalapeño, which shows they appreciate bold flavors and family cooking rituals.
  core: Roberto Mendoza blends competitive soccer instincts, Lego‑building schematics, and superhero imagination into a high‑energy kid who thrives on structure at home yet delights in spontaneous play,
    often forgetting homework when a game or a new Lego set beckons, which reveals they juggle focus and fun with occasional mischief.
background:
  cultural: Roberto is a Mexican‑American raised in a bilingual household in Hardeeville, South Carolina. At home, his family speaks Spanish and celebrates Mexican traditions such as Día de los Muertos,
    Las Posadas, and family gatherings centred around homemade tacos, tamales, and arroz con pollo. He also partakes in local Southern customs, like attending community picnics, enjoying Southern barbecue,
    and learning about Southern hospitality. His family maintains a strong Catholic faith, attending church services and observing religious holidays. Growing up in a small town with a modest but close‑knit
    Latino community, Roberto blends the warmth and close family ties of Mexican culture with the friendly, community‑oriented spirit of the Lowcountry, shaping a unique cultural identity.
