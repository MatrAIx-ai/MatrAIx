  career_goals: Roberto dreams of becoming a professional soccer player who can represent his community and bring pride to his family. He also imagines himself as a firefighter one day, helping people in
    need, and as a chef who can share his family's Mexican recipes with friends. He wants to excel in school, win local soccer tournaments, and eventually coach younger kids. He sees his future career path
    as a blend of discipline, teamwork, and service.
