  career_goals: Looking ahead, Dorothy aims to deepen her expertise in advanced analytics and strategic decision‑making, targeting a senior analyst or analytics manager position within the next five years.
    She plans to earn a professional certification such as the Certified Analytics Professional (CAP) and pursue a part‑time master’s program in Business Analytics or Data Science to stay at the forefront
    of emerging technologies like machine learning. Dorothy also hopes to lead data‑driven initiatives that support regional agricultural efficiency and sustainability in Yakima County, aligning her analytical
    skills with community impact. Ultimately, she aspires to become a trusted advisor who blends rigorous data insight with the practical needs of her organization and local stakeholders.
