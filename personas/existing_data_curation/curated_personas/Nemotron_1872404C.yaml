  career_goals: James aims to progress to a Regional Director of Operations role within the next five years, overseeing multiple facilities and driving enterprise‑wide efficiency gains. He is focused on
    leading digital transformation projects that integrate IoT, AI, and automation into supply‑chain workflows. Sustainability is a core ambition; he intends to implement waste‑reduction and energy‑efficiency
    programs across his organization. Additionally, James aspires to mentor emerging managers, fostering a culture of continuous improvement, and eventually launch his own operations‑consulting practice
    that emphasizes innovative, people‑centric solutions.
