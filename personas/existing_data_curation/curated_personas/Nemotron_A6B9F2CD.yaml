  hobbies: '["Abstract painting", "Digital photography", "Bridge (card game) club", "Genealogy research", "Volunteer docent at Johnstown Flood Museum", "Community theater acting", "Woodworking", "Hiking
    in the Allegheny Trail", "Reading science-fiction novels", "Listening to and playing jazz piano"]'
  career_goals: Now retired, Billy channels the same curiosity that guided his engineering career toward community‑focused ambitions. He aims to launch a makerspace in Johnstown that offers free workshops
    in 3‑D printing, electronics, and digital art for high‑school students and seniors alike. Concurrently, he is drafting a memoir‑style book that weaves together his experiences in the steel industry,
    lessons from engineering, and reflections on the interplay between technology and art. Billy also hopes to curate an annual “Tech‑Art Bridge” exhibition that showcases collaborative works created by
    local artists and engineers, fostering dialogue across generations. Ultimately, his ambition is to be recognized as a catalyst for lifelong learning in Cambria County, ensuring that his knowledge and
    enthusiasm for novelty leave a lasting, inclusive legacy.
