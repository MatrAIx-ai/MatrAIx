personas:
  professional: Billy Bankston, a retired mechanical engineer turned community maker‑space champion, blends their expertise in CAD, finite‑element analysis, and Python scripting with an imaginative flair
    for abstract art, using their organized yet flexible approach to mentor seniors and students in hands‑on workshops that merge technology and creativity.
  sports: Billy Bankston stays active by walking the Allegheny Trail, joining the local senior hiking club each fall, cheering on the Pittsburgh Steelers in football season and the Pittsburgh Penguins during
    hockey, and participates in a weekly bridge tournament that they treat as their mental‑fitness regimen.
  arts: Billy Bankston’s artistic world fuses abstract canvases inspired by Kandinsky and Rothko with digital illustrations reminiscent of modern graphic designers, while their evenings are often filled
    with jazz piano recordings by Bill Evans and live community theater productions featuring local actors such as Jane McAllister.
  travel: Billy Bankston prefers carefully planned road trips that mix heritage rail journeys through the Appalachian Mountains, weekend hikes in Acadia National Park, and cultural stops in historic Gettysburg
    and the German city of Munich, where they trace family roots while staying within their modest senior travel budget.
  culinary: Billy Bankston enjoys cooking hearty Appalachian dishes like wild mushroom risotto and smoked trout with a splash of lemon, often experimenting with dark chocolate ganache on their signature
    cherry‑pie crust while favoring locally sourced heirloom tomatoes and fresh thyme in their kitchen.
  core: Billy Bankston is a curious, socially vibrant retiree who fuses engineering rigor with artistic imagination, turning every hobby into a collaborative learning adventure, even if their penchant for
    tinkering sometimes leaves a trail of unfinished projects.
background:
  cultural: Billy’s cultural background reflects the industrial and Appalachian heritage of Western Pennsylvania. His paternal ancestors emigrated from Germany in the late 19th century, joining the wave
    of Pennsylvania Dutch settlers, while his maternal lineage traces back to Irish immigrants who worked in the coal mines of Cambria County. Growing up in post‑war Johnstown, he experienced the close‑knit,
    working‑class community shaped by the steel mills and the memory of the 1889 flood, instilling values of resilience, self‑reliance, and collective responsibility. He was raised in a Methodist household
    that emphasized community service, which continues to influence his volunteerism. Local traditions—such as county fairs, pepperoni rolls, and storytelling evenings—have left an imprint on his identity.
    Though he embraces his European ancestry, Billy identifies strongly with the regional culture of Western Pennsylvania, where pride in the landscape, a love for small‑town camaraderie, and an appreciation
    for practical ingenuity converge.
