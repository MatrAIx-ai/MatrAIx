  career_goals: Steven aims to turn his hands‑on expertise into a stable, community‑oriented career that eases his financial worries. In the next few years he plans to earn a certified trade credential—such
    as HVAC or automotive technician—while launching a modest handyman service for neighbors in Levy County. He also hopes to take on a leadership role in local volunteer or emergency‑response groups, combining
    reliable income with the social interaction he values.
