persona_description: A heritage specialist who is responsible for managing and preserving historic buildings, sites, structures, objects, and landscapes with historical or cultural significance. They provide
  specialized technical expertise and/or design advice to developers, owners, architects, and engineers concerning the treatment of historic building materials, use of historically appropriate modern materials,
  and rehabilitation of historic interior finishes and building envelopes. They are also responsible for managing and preserving museum, library, and archival collections, and for making heritage sites
  accessible to the public. Additionally, they oversee the development and maintenance of integrated information systems and optimize information flow and access, as well as provide services for organizing
  information and assisting people in identifying, locating, accessing, and using an institution's information and resources. They are a key player in the field of heritage management and preservation,
  responsible for ensuring that historical and cultural heritage is properly maintained and protected.
