personas:
  professional: James Feliz is a methodical higher‑education educator who leverages their expertise in curriculum design, digital learning platforms, and interactive multimedia to craft evidence‑based,
    active‑learning courses, while their sociable, assertive style drives lively classroom discussions and collaborative faculty initiatives.
  sports: James Feliz is an avid runner who competes in local 5K races, trains with the Austin Track Club, follows the Texas Rangers and Austin FC for baseball and soccer thrills, and spends weekends hiking
    with the Hill Country Trekking Group, which they consider a vital mental reset.
  arts: James Feliz regularly immerses themselves in Austin’s vibrant live‑music scene, catching shows by Gary Clark Jr. and St. Vincent, participates in improv workshops at The Hideout, and hosts board‑game
    nights featuring titles like Catan and Betrayal at House on the Hill, all of which fuel their creative spark and social energy.
  travel: James Feliz prefers spontaneous weekend getaways, often backpacking through the Texas Hill Country’s Enchanted Rock and planning future trips to New Mexico’s Santa Fe for its art festivals, while
    they allocate a modest travel fund to ensure they can still attend periodic music festivals in Nashville and the Pacific Northwest.
  culinary: James Feliz enjoys a mix of Tex‑Mex comfort foods and experimental cooking, often grilling brisket tacos with smoked paprika and fresh cilantro, whipping up guacamole with ripe Hass avocados
    and lime, and occasionally trying spicy ramen bowls from a local food truck, though they admit to overindulging in late‑night burritos after 5K races.
  core: James Feliz is a sociable, goal‑driven educator who balances a pragmatic, organized lifestyle with a restless curiosity for music, tech, and the outdoors, often juggling scholarly ambitions with
    spontaneous hikes and occasional late‑night burritos.
background:
  cultural: James grew up in central Texas in a family with European‑American roots and has been shaped by the multicultural atmosphere of Austin. He celebrates traditional holidays such as Thanksgiving
    and Christmas, but also embraces local traditions like the Austin City Limits music festival and Tex‑Mex cuisine. His upbringing in a diverse college town exposed him to a range of cultural perspectives,
    fostering an inclusive outlook that he brings into his teaching and community involvement.
attributes:
  skills: '[''Curriculum development'', ''Lesson planning'', ''Assessment design'', ''Digital learning platforms (Canvas, Blackboard, Zoom)'', ''Instructional technology integration'', ''Classroom management'',
    ''Data‑driven student advising'', ''Project coordination'', ''Public speaking'', ''Group facilitation'', ''Conflict resolution'']'
  hobbies: '[''Live music events'', ''Improv comedy workshops'', ''Hiking in the Texas Hill Country'', ''Running (5K races)'', ''Board game nights'', ''DIY electronics and coding projects'', ''Volunteer
    youth tutoring'']'
  career_goals: James aims to complete a Ph.D. in Education within the next three years, transition to a tenure‑track assistant professor position, and eventually become a department chair. He is driven
    to create innovative, evidence‑based curricula that blend emerging pedagogical research with practical classroom applications. He also aspires to lead university‑wide teaching‑technology initiatives,
    mentor graduate students, and publish scholarly work on active‑learning strategies.
