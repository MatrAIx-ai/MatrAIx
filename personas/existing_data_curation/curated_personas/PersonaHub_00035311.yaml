persona_description: A scientist working on the conservation of marine mammals and their interactions with ciguatoxin, particularly with Hawaiian monk seals. This scientist has expertise in toxicology,
  molecular biology, and marine mammal behavior. They have developed experimental models to study the effects of ciguatoxin on seal foraging behavior and have identified the chemical signature of ciguatoxin
  in the blood of Hawaiian monk seals. They are working to develop new methods to analyze blood samples of monk seals to understand the extent of ciguatoxin exposure and the potential impact on their foraging
  behavior.
