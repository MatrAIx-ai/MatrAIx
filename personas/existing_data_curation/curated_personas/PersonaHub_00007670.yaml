persona_description: A trainer and assessor who is dedicated to ensuring the safety and well-being of their training participants during supervision, training, and instruction. They possess a deep understanding
  of health and safety considerations in the workplace, including the duty of care, risk management process, hazard identification, risk assessment, hierarchy of control, and WH&S reporting. They are knowledgeable
  in the safe use of resources and equipment, the communication of safety requirements, and the elimination or minimization of hazards. They are proactive in their approach to risk management and continuously
  improve their occupational health and safety policy, procedure, and management systems.
