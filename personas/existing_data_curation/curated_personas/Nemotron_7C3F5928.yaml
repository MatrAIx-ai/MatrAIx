  hobbies: '[''badminton'', ''Vietnamese cooking'', ''soccer'', ''hobbyist robotics'', ''V‑pop music'', ''cultural festivals'', ''volunteering'', ''motorcycle customization'', ''sci‑fi movies'', ''tech
    blogs'']'
  career_goals: Chao aims to advance from line operator to shift supervisor and eventually plant lead, leveraging his curiosity for emerging Industry 4.0 technologies (such as IoT‑enabled equipment monitoring).
    He plans to earn a journeyman certification and enroll in a community‑college program for advanced manufacturing technology. In the long term he envisions opening a small, family‑run metal‑fabrication
    shop in Houston that serves local contractors while providing stable jobs for other Southeast Asian immigrants. Parallel to his professional growth, he is committed to developing coping strategies for
    anxiety, including mindfulness training and peer mentorship, so he can model resilience for colleagues.
