persona_description: A scientist who specializes in the study of atmospheric chemistry and transport, particularly the development and integration of a state-of-the-art 3-D chemistry and transport model
  (CTM) that includes full chemistry for both the troposphere and stratosphere. This scientist is part of the NASA Modeling Analysis and Prediction (MAP) program and works on projects such as the GEO-CAPE
  mission, the Hurricane and Severe Storm Sentinel (HS3) mission, the EPA Gulf of Mexico Modeling and Monitoring project, and the mini-LHR instrument. The scientist also works on the National Polar-orbiting
  Operational Environmental Satellite System (NPOESS) project and the Stratospheric Aerosol and Gas Experiment (SAGE III) mission.
