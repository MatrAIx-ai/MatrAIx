  hobbies: '[''Reading mystery books'', ''Building LEGO sets'', ''Playing Minecraft'', ''Soccer'', ''Drawing comics'', ''Journaling'', ''Participating in school science fair'', ''Listening to hip‑hop and
    R&B music'', ''Baking with family'', ''Exploring nature trails'']'
  career_goals: Kelicia dreams of turning her curiosity into a career that solves real-world problems. She aspires to become a software engineer or environmental scientist who designs tools and projects
    that make life easier for kids in Euclid. She hopes to compete in science fairs, earn scholarships, and eventually lead a team that creates technology that reflects her community's needs, while serving
    as a role model for other Black girls.
