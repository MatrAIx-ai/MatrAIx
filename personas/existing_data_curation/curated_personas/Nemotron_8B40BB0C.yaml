personas:
  professional: Kelicia Myrick, a budding young engineer who channels their love of LEGO construction and Minecraft world‑building into solving hands‑on challenges at the local after‑school science club,
    exemplifies a curious yet practical mindset, embraces flexibility over strict schedules, and lets a quiet competitive streak drive them to out‑innovate peers despite occasional disorganization.
  sports: Kelicia Myrick, a spirited member of their community's under‑12 soccer league who darts across the field every Saturday, avidly roots for the nearby professional soccer team the Riverside Rangers,
    and they balance a fierce competitive drive with a relaxed, sometimes forgetful approach to scheduled drills and stretching, often opting to improvise games with friends after school.
  arts: Kelicia Myrick, who fills their sketchbook with comic‑style panels inspired by Alex Ross and Stan Lee, loses themselves listening to hip‑hop and R&B artists like Kendrick Lamar and Beyoncé while
    drawing, and they channel their curiosity into creating illustrated mystery stories that blend vivid characters with suspenseful plots.
  travel: Kelicia Myrick, who has explored the nearby Pine Ridge State Park on a family camping trip and visited the city’s science museum, dreams of a summer adventure at Orlando’s Disney World and hopes
    to someday wander the pyramids of Egypt, and they balance schoolwork, a modest allowance, and their parents’ busy schedules.
  culinary: Kelicia Myrick, an enthusiastic junior baker who confidently whiskes chocolate‑chip cookie dough and layers pepperoni pizza, delights in the sweet tang of strawberry shortcake, often experiments
    by adding a pinch of cinnamon to pancakes, yet sometimes forgets to set a timer and ends up with burnt edges, and they proudly share their creations with family.
  core: Kelicia Myrick, a curious yet slightly disorganized ten‑year‑old who blends LEGO building, mystery novels, and soccer competition with bouts of worry and a love for hip‑hop beats, often misplaces
    socks in the maze of their creations but still finds joy in sketching comic heroes, and they keep a journal to untangle their thoughts.
background:
  cultural: Kelicia grows up in a Black family rooted in the Euclid community of Cuyahoga County, Ohio. Her household celebrates African-American traditions through music, food, and stories, and she often
    attends church events and community gatherings that emphasize family bonds and cultural pride. The city's blend of Midwestern values and a vibrant nearby Cleveland cultural scene exposes her to local
    history, Black arts festivals, and mentorship programs like the Boys & Girls Club STEM workshops, shaping a strong sense of identity and a desire to give back to her neighborhood.
