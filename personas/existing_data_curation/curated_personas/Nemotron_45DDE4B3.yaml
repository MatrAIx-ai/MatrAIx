  career_goals: Bob aims to graduate with a GED and secure an apprenticeship in automotive technology, ultimately becoming a certified mechanic who can run his own community garage in Albany. He hopes to
    blend his mechanical expertise with his entrepreneurial spirit by offering lawn‑care and engine‑repair services to neighbors. At the same time, he dreams of leveraging his basketball talent to earn
    a scholarship or join a semi‑professional team, using sport as a pathway to higher education and personal achievement. The stability and clear progression of a trade career appeal to his preference
    for structure, while his competitive nature drives him to become recognized as a top‑performing technician and athlete in his community.
