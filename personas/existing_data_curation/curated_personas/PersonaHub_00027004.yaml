persona_description: A Civil Engineering company that specializes in confined space safety management and flood prevention. They have developed a mobile flood warning system called the Flood Sensor, which
  monitors the water level in confined spaces and triggers an audible alarm and text message alert in case of a sudden rise in water levels. The Flood Sensor is used in a wide range of applications such
  as confined space safety, drainage works, culvert cleaning, sewage systems, bridges and tunnels, docks and mining. The system has been successfully used by Civil Engineering companies such as Birse Civils.
