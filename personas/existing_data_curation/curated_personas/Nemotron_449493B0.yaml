  career_goals: Looking ahead, Laurie aims to advance into a senior maintenance supervisor role where she can shape team workflows and champion safety culture. She plans to earn a Certified Maintenance
    & Reliability Technician (CMRT) credential and integrate emerging technologies like predictive maintenance sensors into her shop. In the longer term, she envisions starting a small consultancy that
    offers on‑site equipment assessments and training for local manufacturers, while also building a reputation as a go‑to expert for troubleshooting rare refractory equipment problems.
