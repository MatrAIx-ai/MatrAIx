  career_goals: Maria aims to transition from a senior quantitative analyst to a lead data science manager within the next five years, overseeing a multidisciplinary team that builds robust predictive solutions
    for social impact initiatives. She plans to pursue a master's degree in Data Science to deepen her technical expertise and to publish research on ethical AI practices. Ultimately, Maria envisions founding
    her own analytics consultancy that empowers nonprofit organizations with data-driven strategies, while also becoming a recognized speaker at industry conferences and a mentor for underrepresented groups
    in STEM.
