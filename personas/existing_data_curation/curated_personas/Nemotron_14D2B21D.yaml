personas:
  professional: Maria Cross is a senior quantitative analyst who designs predictive algorithms in Python and R, excels at data storytelling, and uses her disciplined project management and sociable demeanor
    to orchestrate interdisciplinary workshops while charting a path toward a lead data science manager role.
  sports: Maria Cross trains with the NYC Asphalt Runners, completes monthly half‑marathons across the city, enjoys seasonal indoor rock‑climbing at Brooklyn Boulders, and roots for the Brooklyn Nets in
    basketball and the New York Yankees in baseball, balancing competitive drive with a structured workout schedule.
  arts: Maria Cross captures Brooklyn’s eclectic architecture through street‑photography, shreds salsa moves to the rhythms of Celia Cruz, and unwinds by listening to The Strokes and watching performance
    art pieces by Ai Weiwei, weaving a vibrant artistic tapestry into her social life.
  travel: Maria Cross meticulously plans weekend getaways using a spreadsheet, prefers short immersive trips to vibrant cities like Lisbon, Austin, and Tokyo, and dreams of a month‑long volunteer expedition
    to Nairobi, balancing adventure with budget constraints.
  culinary: Maria Cross is an adventurous eater who frequents Brooklyn’s food trucks for Korean‑BBQ tacos from Korilla and jerk chicken from Miss Lily’s, cooks occasional paella with saffron and chorizo
    at home, and appreciates the smoky flavor of chipotle in her salsa‑inspired cooking nights.
  core: Maria Cross is a hyper‑organized data wizard who runs half‑marathons in neon shoes, color‑codes her planner, can’t resist a good salsa rhythm, and occasionally binge‑watches true‑crime documentaries
    after a long day of spreadsheets.
background:
  cultural: Maria grew up in a middle‑class family of mixed Irish and Italian ancestry in suburban New Jersey, celebrating a blend of cultural traditions such as St. Patrick's Day and Italian holidays while
    maintaining a largely secular outlook. Relocating to Brooklyn for college exposed her to a richly diverse urban environment, shaping a progressive worldview that values inclusivity and multicultural
    exchange. Her European heritage and New York upbringing together influence her appreciation for community gatherings, culinary exploration, and active participation in local cultural events.
