  hobbies: '[''Reading adventure books'', ''Storytelling with friends'', ''Playing soccer'', ''Dancing'', ''Building LEGO creations'', ''Painting and drawing'', ''Exploring nature walks'', ''Coding simple
    games with Scratch'', ''Hosting playdates'', ''Singing karaoke'', ''Helping with family cooking'']'
  career_goals: Carmela dreams of a future where she can combine her love of talking to people, her curiosity about how things work, and her desire to help in practical ways. She imagines becoming a teacher
    who makes learning fun, a community event organizer who brings neighbors together, an animal care professional who looks after pets, or a TV host who interviews guests and shares stories. In any role
    she chooses, she wants to ask lots of questions, find practical solutions, and be in the spotlight where she can inspire others.
