personas:
  professional: Carmela Morello is a budding junior storyteller‑coder who blends the vivid plots of adventure books with block‑based programming, creating interactive storygames for classmates during recess
    that showcase a curious yet practical knack for turning ideas into playable prototypes.
  sports: Carmela Morello dazzles as a forward on the under‑10 River City Rangers soccer squad, shouts encouragement from the sidelines, and channels the same kinetic joy into Friday night hip‑hop dance
    classes, while cheering for the local professional team, Metro FC, during family watch parties.
  arts: Carmela Morello lights up when sketching whimsical characters inspired by Studio Ghibli films, humming along to Taylor Swift’s storytelling lyrics, and hosting karaoke bouts where they belt out
    ‘Shake It Off’ and ‘Let It Go’, proudly displaying LEGO‑themed murals alongside watercolor landscapes of forest trails.
  travel: Carmela Morello loves weekend nature hikes in the nearby state park, dreams of exploring the ancient ruins of Pompeii, and plans a future family trip to a seaside town where they can chase sunsets
    with a sketchbook in hand, yet they prefer spontaneous picnics over rigid itineraries.
  culinary: Carmela Morello enthusiastically assists in preparing homemade spaghetti carbonara and fresh basil pesto pizza, whisking olive oil and garlic while singing along to folk tunes, and they often
    experiment by adding colorful bell peppers to each mini‑pizza they craft.
  core: Carmela Morello is a sociable, curiosity‑driven 9‑year‑old who blends imagination with practicality, leading friends in story games, soccer scrums, and karaoke sing‑alongs while staying delightfully
    disorganized and serenely resilient.
background:
  cultural: Carmela grew up in Arlington, Texas, a suburb of the Dallas‑Fort Worth metroplex. Her family is of Italian‑American heritage, preserving traditions like Sunday pasta meals, celebrating Christmas
    and Easter with festive foods, and attending a local Catholic church. The Texan environment adds a love for community gatherings such as county fairs, football tailgates, and outdoor barbecues. She
    experiences a blend of Southern hospitality and Italian family values, which shape her outlook on community, food, and celebration.
