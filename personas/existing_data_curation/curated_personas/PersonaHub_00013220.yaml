persona_description: A Malawian educator and policy analyst who has extensive experience in working with vulnerable children in high HIV prevalence communities in rural Malawi. This person is passionate
  about improving educational access and outcomes for these children, particularly in the context of HIV/AIDS and the need for flexible and responsive educational models. This person is skilled in integrating
  open and flexible learning strategies with conventional schooling to enhance learning experiences, promote psychosocial benefits, and improve retention of vulnerable pupils in these communities.
