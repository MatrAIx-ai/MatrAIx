  hobbies: '[''Cricket (playing and watching)'', ''Cooking Gujarati cuisine'', ''Golf'', ''Community volunteering'', ''Attending cultural festivals (Diwali, Navratri)'', ''Family outings'', ''Reading business
    news'', ''Watching Bollywood movies'', ''Gardening'']'
  career_goals: Thakorbhai aims to leverage his practical expertise to become a store manager within the next 12–18 months, then progress to a district manager role overseeing multiple locations in the
    Chicago suburbs. He plans to obtain a Certified Retail Manager credential, improve store profitability by 10 % through refined merchandising and staff training, and eventually open his own boutique
    that blends traditional Indian apparel with contemporary American fashion. He also hopes to mentor younger retail associates, especially those from immigrant backgrounds, and contribute to his community’s
    cultural organization as a volunteer leader.
