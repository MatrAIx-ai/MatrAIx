  They are also interested in the unique features and architectural details of the dock, such as its age, its location, and its significance in the development of naval and commercial shipping in the region.
  They may have a deep understanding of the cultural and social contexts in which the dock was constructed and operated, and how it influenced the development of naval and commercial shipping in the region.
