personas:
  professional: Lucio Perrusquia is an aspiring graphic designer and digital media student, they leverage their proficiency in Procreate, Photoshop, HTML/CSS, and photography to craft culturally resonant
    visual stories, while their methodical planning and introverted focus ensure every project meets tight deadlines and personal standards.
  sports: Lucio Perrusquia enjoys weekend basketball pick‑up games at the West Hartford community gym, they follow the New England Patriots and Hartford Yard Goats avidly, and they run with a local teen
    running club that trains for the annual Hartford 5K.
  arts: Lucio Perrusquia spends evenings sketching surreal collages inspired by the visual wit of Banksy and the vibrant palettes of Frida Kahlo, they play acoustic renditions of traditional island folk
    tunes alongside indie tracks by Bon Iver, and they absorb speculative narratives from authors like Ted Chiang while attending poetry readings featuring spoken‑word artists such as Danez Smith.
  travel: Lucio Perrusquia plans travel with meticulous spreadsheets, they favor culturally rich day trips to nearby Boston and New York City museums, while they dream of a solo backpacking adventure through
    the historic streets of Barcelona and the neon alleys of Tokyo once a college scholarship eases financial constraints.
  culinary: Lucio Perrusquia delights in preparing family‑style arroz con gandules and crispy empanadillas seasoned with sofrito, they showcase their adeptness with rice, pigeon peas, plantains, and masa
    dough, and they often host small gatherings where friends sample the aromatic adobo‑spiced pork and homemade guava jam.
  core: Lucio Perrusquia is a quietly ambitious 17‑year‑old whose curiosity fuels late‑night sketch marathons, they hoard sketchbooks and random art supplies to the point of compulsive accumulation, and
    they occasionally procrastinate on GED studies while remaining unwaveringly dedicated to community art workshops.
background:
  cultural: Lucio was raised in a close‑knit Puerto Rican family that maintains strong ties to the island’s traditions while navigating life in West Hartford, Connecticut. At home, Spanish is spoken alongside
    English, and cultural celebrations such as Nochebuena, Three Kings’ Day, and the Puerto Rican parrandas are observed with music, dance, and traditional foods like lechón, arroz con gandules, and tembleque.
    His parents instilled a respect for community, family loyalty, and the Catholic faith, which often guides family gatherings and holidays. Growing up in the Hartford County area exposed Lucio to a blend
    of New England suburban life and a vibrant Latino community, fostering an appreciation for multicultural experiences. He regularly attends local Caribbean festivals and community events, where he connects
    with other Puerto Rican youths, shares stories of island life, and draws inspiration for his artistic projects that aim to preserve and reinterpret his heritage in a contemporary context.
