  hobbies: '[''Digital sketching and painting'', ''Photography (street and portrait)'', ''Acoustic guitar playing'', ''Cooking Puerto Rican dishes'', ''Reading science-fiction and speculative fiction'',
    ''Writing poetry and short stories'', ''Strategy video gaming'', ''Volunteering at community art workshops'', ''Visiting museums and cultural festivals'', ''Exploring experimental music'']'
  career_goals: Lucio’s immediate goal is to complete his GED within the next year and enroll in a community‑college program focused on graphic design or digital media. He aspires to build a professional
    portfolio that showcases his illustration, photography, and web design work, eventually securing an internship at a local design studio. In the long term, he aims to become a multidisciplinary visual
    artist or UI/UX designer, creating culturally resonant projects that highlight Puerto Rican heritage. He also hopes to work with nonprofit cultural organizations in Connecticut, leading small‑group
    art workshops and developing visual storytelling initiatives that empower youth. Lucio’s career vision blends his artistic passion with his organized, project‑management strengths, allowing him to pursue
    creative independence while contributing to his community.
