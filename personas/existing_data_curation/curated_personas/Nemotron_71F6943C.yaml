  hobbies: '[''Hiking coastal trails'', ''Badminton'', ''Tai Chi'', ''Cooking Korean cuisine'', ''Volunteering at community health fairs'', ''Gardening'', ''Beach photography'', ''Reading historical non‑fiction'',
    ''Board game nights'']'
  career_goals: Xiu aims to advance into a clinical leadership role, such as a department manager at a community health center, where he can shape service delivery and mentor emerging therapists. He plans
    to pursue a master's degree in occupational therapy to deepen his clinical expertise and obtain board certification as a Certified Hand Therapist. Additionally, he seeks to develop culturally tailored
    OT programs for East Asian seniors and veterans, expand telehealth services for remote clients, and contribute to policy initiatives that promote culturally competent care in the region.
