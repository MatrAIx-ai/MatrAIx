personas:
  professional: Xiu Ok is a seasoned occupational therapist who leverages two decades of expertise in functional assessments, ADL training, and adaptive equipment selection, coupling meticulous organization
    and a methodical, structure‑loving mindset with a sociable, supportive bedside manner to mentor junior staff and champion culturally sensitive care.
  sports: Xiu Ok enjoys hiking the rugged coastal trails of San Diego, plays competitive badminton at a local community club, practices Tai Chi thrice weekly for mindfulness, and follows the San Diego Padres
    and the San Diego Wave FC, often wearing team colors during weekend games.
  arts: Xiu Ok expresses a love for the visual and auditory arts through sunrise beach photography, attending San Diego Symphony performances, listening to Yo‑Yo Ma’s cello suites, and savoring films by
    Hirokazu Kore‑eda, while occasionally hosting board‑game nights that double as social art sessions.
  travel: Xiu Ok favors meticulously planned road trips along the Pacific Coast Highway, has already explored the volcanic island of Jeju and the historic streets of Kyoto, and looks forward to sailing
    through Norway’s fjords and tasting wine in Tuscany, blending a love for nature, culture, and family‑friendly itineraries.
  culinary: Xiu Ok is an avid home cook who masters the art of making kimchi, bibimbap, and bulgogi using gochujang, sesame oil, and napa cabbage, while also enjoying fresh grilled salmon with miso glaze,
    often sharing these meals at community gatherings.
  core: Xiu Ok blends a methodical, structure‑driven professional ethos with a vibrant social life, savoring sunrise hikes, badminton matches, and home‑cooked feasts while meticulously planning for a future
    of leadership and cultural advocacy.
background:
  cultural: Xiu Hyun Ok is a first‑generation Korean‑American who grew up bilingual in English and Korean. His upbringing emphasized respect for elders, family cohesion, and community responsibility, values
    that continue to shape his professional approach. He celebrates Lunar New Year and Chuseok, participates in local Korean cultural organizations, and often incorporates familiar cultural references and
    practices into his therapy sessions to foster comfort and trust among East Asian clients. His cultural heritage blends with the diverse environment of San Diego, enriching his perspective on inclusive
    and culturally sensitive healthcare.
attributes:
  skills: '[''Functional Assessment'', ''ADL Training'', ''Adaptive Equipment Selection'', ''Therapeutic Intervention Design'', ''Patient Education'', ''Evidence‑Based Practice'', ''Interdisciplinary Collaboration'',
