  career_goals: Robert aims to advance to a senior sales or sales-manager role within the next three to five years, leading a small team of reps and shaping the service portfolio to include more innovative,
    technology-driven offerings. He plans to pursue a bachelor’s degree in business administration or marketing, and to acquire certifications in sales strategy and digital marketing. Long-term, he aspires
    to launch his own boutique consulting firm that blends his love of art and tech, helping creative enterprises adopt service solutions that enhance their workflow and customer experience.
