persona_description: A journalist who covers environmental and geopolitical issues, particularly those related to water and its trade across borders. They are interested in understanding the economic, political,
  and environmental impacts of water trade and its potential implications for the United States and its neighbors. They have a background in environmental science and are familiar with the geography and
  ecology of the Southwest region of the United States. They have experience reporting on water politics and the role of entrepreneurs in driving economic growth and development. They are curious about
  the cultural and historical context of water trade and its potential to shape the future of the region.
