personas:
  professional: Ivan Santiagomontalvo is a budding game designer and junior programmer who leverages a love of puzzle‑platform video games, methodical LEGO building, and digital illustration to craft simple
    interactive stories, channeling their preference for structure through step‑by‑step tutorials while allowing their flexible, solitary nature to experiment with custom game mechanics on their laptop,
    and they often post prototypes on community forums for feedback.
  sports: Ivan Santiagomontalvo prefers low‑key fitness routines, like evening walks in the park and occasional weekend pick‑up basketball games, while rooting for the nearby city's minor league baseball
    team the River City Raptors and following the national soccer team during the World Cup, though they rarely join organized sports due to a preference for solitude.
  arts: Ivan Santiagomontalvo channels their imagination into comic‑style sketches inspired by artists like Jim Lee and graphic novels by Alan Moore, while they absorb the soundtrack of indie rock bands
    like The Strokes, Latin pop icons such as J Balvin, and the narrative depth of video games by Hideo Kojima, all of which fuel their own digital illustrations and storytelling.
  travel: Ivan Santiagomontalvo prefers spontaneous weekend trips to nearby science museums and the local state park for stargazing, yet they dream of saving enough to explore the Atacama Desert’s clear
    night skies in Chile and to visit Tokyo’s Akihabara district, planning each adventure with a loose list of must‑see spots rather than a rigid itinerary.
  culinary: Ivan Santiagomontalvo enjoys experimenting in the kitchen at a beginner’s level, frequently whipping up simple cheese‑filled wraps, homemade pizza topped with pepperoni and fresh basil, and
    occasional chocolate‑drizzled banana desserts, while they listen to reggaeton beats to keep the cooking vibe lively.
  core: Ivan Santiagomontalvo is a quiet, curiosity‑driven teen who can lose hours assembling LEGO masterpieces only to forget to do homework, thrives on structured puzzles yet embraces spontaneous stargazing,
    and they habitually hum reggaeton melodies while debugging code.
background:
  cultural: Ivan comes from a Salvadoran family that settled in Houston’s vibrant Hispanic community. Spanish is spoken at home, and he celebrates Salvadoran holidays such as Las Posadas, Día de la Independencia
    (September 15), and the feast day of San Salvador. Family gatherings often center around traditional foods—pupusas, tamales, yuca frita—and he has learned to make these dishes alongside his parents.
    He attends a local Catholic church where he participates in community events and occasional youth groups, though he prefers quieter participation. The multicultural environment of Houston exposes him
    to a blend of Latin American, Southern U.S., and urban cultures, influencing his taste in music, food, and social values. His heritage instills a strong sense of family responsibility, respect for elders,
    and an appreciation for community solidarity, which shape his considerate and cooperative nature.
attributes:
