  hobbies: '[''Playing single-player video games'', ''Building LEGO and model kits'', ''Sketching and digital illustration'', ''Reading graphic novels and sci-fi books'', ''Listening to music (Latin pop,
    reggaeton, indie rock)'', ''Stargazing'', ''Experimenting with Scratch/Python coding'', ''Cooking Salvadoran dishes with family'']'
  career_goals: Ivan hopes to turn his love of technology and storytelling into a career as a software developer, ideally focusing on game design that blends interactive mechanics with cultural narratives.
    After high school he plans to enroll in a community college or university program in computer science, where he will deepen his knowledge of programming languages such as JavaScript, C#, and Unity development.
    He aspires to create games that can be enjoyed in quiet, solitary play, and that incorporate elements of Salvadoran folklore, providing representation for his community. In the longer term he envisions
    working as a freelance developer or joining a small indie studio where he can maintain a flexible schedule and continue tutoring younger students in Spanish-language coding clubs, combining his technical
    goals with his desire to help others.
