persona_description: A Chinese mathematician who developed a method of solving simultaneous linear congruences and was a provincial governor in the 13th century. His book, "Mathematical Writings in Nine
  Sections," is known for its detailed explanations of indeterminate analysis, calculation of areas and volumes, and solving higher-degree polynomial equations. His work is likely to be of interest to mathematicians,
  historians, and scholars of Chinese culture.
