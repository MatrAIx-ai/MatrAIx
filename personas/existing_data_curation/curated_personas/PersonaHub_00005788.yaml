persona_description: A NASA scientist who specializes in the study of black holes, particularly the behavior and growth of supermassive black holes. Her research interests include, but are not limited to,
  the observation and analysis of distant galaxies, the detection and confirmation of black hole binary systems, and the potential for the merging of black holes. She is also interested in the impact of
  black holes on the surrounding environment and the potential for black hole mergers to produce gravitational waves.
