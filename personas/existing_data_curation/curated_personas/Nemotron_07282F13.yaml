personas:
  professional: Eva Catania is a strategic business leader who blends long‑term vision with practical execution, using data‑driven decisions and a flexible, collaborative leadership style to drive growth
    while fostering a people‑first culture.
  sports: Eva Catania plays midfield for the Springfield United co‑ed soccer league, follows the St. Louis Cardinals and Kansas City Chiefs, and attends weekly yoga sessions at Urban Flow Studio, blending
    her sociable, team‑oriented spirit with a disciplined approach to personal fitness.
  arts: Eva Catania frequents the Blue Note for live indie folk performances by Bon Iver and local acts, enjoys contemporary plays at the Starlight Theater, and devours business biographies like Indra Nooyi’s
    memoir alongside travel memoirs such as “Eat, Pray, Love,” reflecting her curiosity for new ideas and love of shared cultural experiences.
  travel: Eva Catania has backpacked through Barcelona, road‑tripped across Vermont’s leaf‑peeping routes, and escaped to Napa Valley wine country, dreams of exploring Kyoto’s temples, and prefers a mix
    of meticulously planned itineraries and spontaneous weekend getaways with friends, constrained by a busy work schedule but funded by a dedicated travel savings account.
  culinary: Eva Catania leads a community cooking club where members master dishes like risotto alla Milanese, Chicago‑style deep‑dish pizza, and Midwestern butter cake, while she enjoys brunch staples
    such as avocado toast with poached eggs and fresh mozzarella salads, boasting an intermediate cooking skill set and a penchant for experimenting with fresh herbs and seasonal produce.
  core: Eva Catania is a sociable, curiosity‑driven strategist who balances meticulous planning with spontaneous fun, leading both boardrooms and brunches while juggling a love for soccer, live music, and
    culinary experiments, all tempered by occasional financial splurges and a mild tendency to overlook mental‑health breaks under pressure.
background:
  cultural: Eva grew up in a close‑knit Italian‑American family in Springfield, Illinois. Her heritage is celebrated through family gatherings, traditional holidays like Saint Joseph's Day, and a love of
    homemade pasta and Italian pastries. The Midwestern values of community involvement, modesty, and hard work are woven into her daily life. While she identifies culturally as white with Italian roots,
    she embraces the diverse tapestry of Springfield, participating in local cultural events and maintaining a respectful awareness of the city’s broader multicultural influences.
