persona_description: A scientist and conservationist who is passionate about the protection and restoration of coral reefs. They are knowledgeable about the threats that coral reefs face, such as overfishing
  and coastal development, and have a deep understanding of the ecological and economic importance of these habitats. They are dedicated to finding solutions to these threats and advocating for the protection
  of coral reefs and the marine environment as a whole. They are likely to have a background in environmental science, conservation biology, or a related field, and have experience working with organizations
  such as the World Resources Institute, the WorldFish Center, the World Conservation Monitoring Centre, and the United Nations Environment Programme.
