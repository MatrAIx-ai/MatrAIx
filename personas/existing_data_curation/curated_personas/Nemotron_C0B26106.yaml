  career_goals: As a young professional, Estela aims to deepen her technical competence and advance within the insurance industry. In the next two years she plans to complete her associate’s degree in business
    administration and obtain the Chartered Property Casualty Underwriter (CPCU) designation. She aspires to transition from a junior underwriting role to a senior underwriter position, taking on more complex
    commercial lines and mentoring new hires. Long‑term, she envisions moving into underwriting management, where she can shape underwriting guidelines that better serve under‑insured Latino communities,
    and eventually lead a regional underwriting department. She also hopes to leverage her bilingual background to develop culturally‑tailored insurance products that address the specific needs of immigrant
    families.
