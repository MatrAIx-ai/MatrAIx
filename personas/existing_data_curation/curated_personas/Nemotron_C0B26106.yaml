personas:
  professional: Estela Colon, a 21‑year‑old junior underwriter at a regional insurer, leverages her meticulous Excel and SQL expertise and bilingual fluency to evaluate risk with data‑driven precision while
    habitually double‑checking policy language to ensure compliance, a habit that sometimes delays her evenings but fuels her ambition to earn the CPCU designation and mentor future hires.
  sports: Estela Colon hikes the Watchung Reservation trails on weekends, supports the New York Yankees during baseball season, and maintains a casual membership in the Somerset County Running Club, preferring
    low‑impact exercise that aligns with their yoga routine.
  arts: Estela Colon immerses themselves in contemporary fiction, favoring novels by Sally Rooney and Celeste Ng, finds inspiration in the soulful salsa rhythms of Marc Anthony, and appreciates the visual
    storytelling of director Greta Gerwig, often reflecting on these works in a personal journal.
  travel: Estela Colon prefers short road trips to nearby nature escapes like the Catskills and the Poconos, while dreaming of a future backpacking adventure through the Andes of Peru, planning each itinerary
    with meticulous spreadsheets yet leaving room for spontaneous detours.
  culinary: Estela Colon enjoys preparing traditional baleadas with refried beans, queso fresco, and a drizzle of crema, as well as simmering hearty menudo using beef shank and hominy, showcasing solid
    cooking skills while occasionally treating themselves to a slice of pepperoni pizza after a long workday.
  core: Estela Colon is a detail‑oriented underwriter who balances spreadsheets with salsa steps, finding harmony between rigorous risk analysis and the rhythmic pulse of their cultural roots.
background:
  cultural: Estela was born to Honduran immigrant parents who settled in Elizabeth, New Jersey. She grew up in a bilingual household where Spanish was spoken at home and English at school, giving her fluency
    in both languages. Family traditions such as celebrating Honduran Independence Day, preparing meals like pupusas and tamales, and listening to Punta and Marimba music remain central to her identity.
    She regularly participates in local Latino community festivals and contributes to cultural associations that support newer arrivals from Central America. While fully integrated into American life—attending
    a community college and working in a corporate environment—she maintains strong ties to her roots through frequent visits to Honduras during summer holidays and through the values of collectivism, hospitality,
    and respect for elders that her family emphasizes.
