personas:
  professional: Takako Vo, a 15‑year‑old high school student, is an aspiring digital illustrator who blends hand‑drawn manga‑style sketches with modern graphic design tools, volunteers teaching basic drawing
    at a community center, and meticulously plans a portfolio for future art school applications.
  sports: Takako Vo enjoys weekend hikes on the Whittier Narrows trail, cheers for the Los Angeles Lakers and the LA Galaxy, occasionally joins a local youth soccer pick‑up league, and balances fitness
    with occasional late‑night gaming sessions that sometimes cut into workout time.
  arts: Takako Vo immerses themselves in drawing manga‑inspired panels, frequents modern art exhibitions at the Getty Center and LACMA, follows digital artists such as loish and Ross Tran for stylistic
    cues, and finds inspiration in piano pieces by Yiruma as well as traditional Vietnamese melodies played during family gatherings.
  travel: Takako Vo prefers well‑planned short trips, such as weekend visits to the Griffith Observatory, day outings to Santa Barbara’s coastal art galleries, and dreams of a cultural immersion tour in
    Kyoto to study historic woodblock prints, balancing school commitments with family travel budgets.
  culinary: Takako Vo loves helping in the kitchen, especially crafting bánh chưng with glutinous rice, mung beans, and pandan leaves, simmering pho broth with star anise and ginger, and experimenting with
    matcha‑flavored macarons, while boasting decent chopping skills but often over‑seasoning the soup.
  core: Takako Vo is a meticulous teen artist who juggles sketchbooks, hikes, and family cooking, thriving on routine yet occasionally losing track of time in digital art marathons.
background:
  cultural: 'Takako is a first‑generation Vietnamese‑American raised in La Habra, California. Her household preserves many Vietnamese traditions: speaking Vietnamese at home, celebrating Tet with family
    gatherings, and cooking traditional dishes. These cultural practices are balanced with the diverse, multicultural environment of Southern California, where she regularly visits Asian art festivals,
    museums, and community events. Her family places a high value on education, respect for elders, and community contribution, which shape her organized and reliable personality. At the same time, exposure
    to the vibrant Los Angeles arts scene fuels her curiosity and openness to unconventional ideas, allowing her to blend her heritage with contemporary American culture in her creative pursuits.'
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Graphic design basics'', ''Photography composition'', ''Bilingual communication (English-Vietnamese)'', ''Project planning and organization'',
    ''Basic coding (Scratch, Python)'', ''Public speaking and debate'', ''Research and writing'', ''Time management'']'
  hobbies: '[''Sketching'', ''Digital illustration'', ''Photography'', ''Playing piano'', ''Cooking Vietnamese dishes'', ''Reading graphic novels'', ''Hiking local trails'', ''Volunteering at community
    center'', ''Attending art workshops'', ''Watching anime and independent films'']'
  career_goals: She aspires to attend a college with a strong visual arts program such as CalArts or UCLA, where she can major in Graphic Design or Illustration. Her long‑term ambition is to become a professional
    concept artist or UI/UX designer, creating visuals for games, films, or interactive media. She also hopes to integrate her Vietnamese heritage into her work, perhaps by curating exhibitions that highlight
    Asian contemporary art. She aims to earn scholarships through her portfolio and maintain her reputation as a reliable, methodical creator.
