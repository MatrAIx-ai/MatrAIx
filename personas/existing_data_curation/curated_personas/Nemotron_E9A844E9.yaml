personas:
  professional: Gregory Wilson is an aspiring LEGO architect and budding Scratch programmer who leverages their competitive streak and spontaneous curiosity to design elaborate brick constructions and simple
    interactive games, yet frequently abandons a project when a newer, more exciting idea appears, reflecting their resistance to long-term structure.
  sports: Gregory Wilson shoots hoops at the neighborhood park and plays for the Little Rock Junior Hoopers youth basketball league while cheering for the Arkansas Razorbacks and the Dallas Mavericks on
    TV, channeling the same competitive drive they show in video games into daily free-throw drills, yet their spontaneous nature sometimes leads them to skip practice for a bug-hunt in the woods.
  arts: Gregory Wilson expresses creativity by constructing elaborate LEGO models and designing Scratch games, draws inspiration from the kinetic storytelling of Pixar's 'Toy Story', the high-energy anthems
    of Imagine Dragons, and the mystery-filled worlds of author Rick Riordan, often humming the soundtrack while assembling bricks, which satisfies their solitary yet competitive spirit.
  travel: Gregory Wilson favors hands-on adventure trips, having explored the Ozark National Forest's trailheads with their family, visited the interactive exhibits at the Kansas City Science Center, and
    taken a summer excursion to Orlando's Disney World, while dreaming of a future trip to London's Natural History Museum to hunt for dinosaur fossils, preferring itineraries that blend outdoor discovery
    with interactive learning over passive sightseeing.
  culinary: Gregory Wilson loves a classic pepperoni pizza slice and cheesy macaroni with a side of chicken nuggets after a gaming marathon, enjoys blending fruit smoothies with banana and strawberry for
    a quick post-practice snack, and occasionally helps their parents make DIY granola-bar 'LEGO bricks' using oats, honey, and chocolate chips, though their cooking skill is limited to assembling ready-to-bake
    kits.
  core: Gregory Wilson, a 9-year-old LEGO architect and competitive gamer, balances restless curiosity with bouts of anxiety, impulsive spending, and a love for mystery reads, while often sprinting between
    outdoor bug hunts and structured basketball drills.
background:
  cultural: Gregory was raised in a middle‑class white family in Mabelvale, a suburban community in Pulaski County, Arkansas. His upbringing blends typical Southern small‑town values—such as community gatherings
    at the local church, county fair traditions, and Friday night high‑school football—with the pervasive influence of digital media and internet culture. He experiences both the hospitality of the South
    and the independence encouraged by modern technology, which shape his practical curiosity and competitive spirit.
attributes:
  skills: '[''LEGO building and basic engineering concepts'',''Scratch visual programming'',''Reading comprehension (grade‑4 level)'',''Logic puzzles and strategy games'',''Basic knowledge of local flora
    and fauna'',''Hand‑eye coordination for sports like baseball and basketball'']'
  hobbies: '[''LEGO construction'',''Scratch programming'',''Competitive video gaming'',''Logic and Sudoku‑style puzzles'',''Exploring nature and identifying insects/plants'',''Basketball shooting practice'',''Reading
    mystery/adventure books'']'
  career_goals: Gregory dreams of becoming a robotics engineer or a video‑game designer, where he can merge his love of building, coding, and competitive problem solving. He aims to create gadgets or games
    that are both fun and practical, hoping to earn recognition for his inventions while maintaining the freedom to explore new ideas on his own terms. He is already thinking about entering science fairs
    and coding contests as stepping stones toward those goals.
