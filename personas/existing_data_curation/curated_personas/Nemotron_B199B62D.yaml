  hobbies: '[''fishing'', ''deer hunting'', ''weekly bingo'', ''church choir'', ''gardening'', ''reading history'', ''woodworking'', ''playing acoustic guitar'', ''visiting family'']'
  career_goals: At 73, Michael’s primary ambition is to preserve his health and independence while deepening the bonds with his family and community. He hopes to keep his mind sharp by mentoring his grandchildren
    on practical skills, to complete a written memoir of his life on the Bayou, and to volunteer as a coordinator for the senior center’s weekly bingo nights. He also aims to travel occasionally to visit
    his adult children and to ensure his estate and finances are in order for future generations, easing the worry he sometimes feels about health and financial security.
