    and training'']'
  hobbies: '[''Acrylic painting'', ''Sketching'', ''Street photography'', ''Reading speculative fiction'', ''Exploring philosophy'', ''Playing acoustic guitar'', ''Cooking traditional Mexican dishes'',
    ''Hiking in local nature parks'', ''DIY home décor projects'', ''Exploring new tech gadgets'']'
  career_goals: Scott aims to move from front-line sales into a role that blends his commercial experience with his artistic passion, such as visual-merchandising manager or brand-experience lead at a lifestyle
    retailer. He hopes to earn a certification in graphic design or retail management within the next two years, allowing him to oversee store layout, window displays, and in-store events that celebrate
    cultural diversity. In the longer term, he dreams of opening a boutique that showcases Mexican-inspired art, handmade goods, and curated fashion, serving as a community hub for fellow creatives and
    bilingual shoppers. He also wants to mentor younger employees, especially those from under-represented backgrounds, fostering an inclusive workplace culture.
