  hobbies: '[''drawing and painting'', ''building with LEGO DUPLO'', ''exploring parks and nature'', ''listening to music and dancing'', ''storytime and imaginative retelling'', ''watching creative cartoon
    shows'', ''playing with simple science kits'']'
  career_goals: Angelo dreams of becoming an artist who creates vivid pictures that surprise people, a scientist who discovers new things, or an astronaut who explores space—any path that lets him blend
    curiosity with creative expression. He wants to be recognized for his original ideas and hopes to win contests or games that test his skills, reflecting his competitive nature. While his ambitions are
    still imaginative, they consistently emphasize exploration, invention, and the joy of making something new.
