personas:
  professional: Pedro Flores, a disciplined 18‑year‑old aspiring automotive technician, blends their bilingual communication, methodical car‑maintenance expertise, and competitive mindset from video gaming
    to excel in their GED studies while meticulously planning a future vocational program and eventual independent repair shop for their community.
  sports: Pedro Flores, a fervent supporter of Club Deportivo Real Estelí and a regular attendee of Inter Miami matches, channels their competitive drive into weekly pick‑up soccer at Kennedy Park and a
    disciplined weight‑lifting regimen at a neighborhood gym, viewing sports as both a social anchor and a personal performance benchmark.
  arts: Pedro Flores, an avid fan of Latin rhythm, frequently streams Bad Bunny and Carlos Vives while also appreciating the cinematic storytelling of Guillermo del Toro and the vibrant murals of local
    street artists, allowing these cultural beats and visuals to inspire their cooking creativity and strategic thinking during gaming sessions.
  travel: Pedro Flores plans their trips with a spreadsheet, opting for budget‑friendly weekend getaways to Miami Beach and the Florida Keys, while dreaming of a spring pilgrimage to their family’s hometown
    in Nicaragua and a road trip through Costa Rica’s rainforests, balancing a love for familiar coastal vibes with a desire for culturally rich adventures.
  culinary: Pedro Flores, a confident home cook, regularly prepares gallo pinto with red beans, rice, cilantro, and fried plantains, perfects nacatamales wrapped in banana leaves for family gatherings,
    and experiments with arroz con pollo flavored with achiote, showcasing their knack for melding traditional flavors with a disciplined kitchen routine.
  core: Pedro Flores is an 18‑year‑old routine‑driven mechanic‑in‑training who balances disciplined study, strategic gaming, and family‑centric cooking, yet occasionally lets their competitive streak spill
    into a stubborn reluctance to ask for help.
background:
  cultural: Pedro was raised in a close‑knit Nicaraguan family that immigrated to Miami when his parents were young. He grew up bilingual, speaking Spanish at home while mastering English at school and
    in the community. His household observes Catholic traditions, celebrating events such as Semana Santa, La Purísima, and Nicaragua's Independence Day with family gatherings and traditional foods. The
    vibrant Nicaraguan enclave in Miami, with its festivals, music, and local businesses, reinforces his cultural identity and provides a supportive network. Pedro values family loyalty, community responsibility,
    and the practicality of hard work—principles that echo his cultural heritage and shape his everyday choices.
