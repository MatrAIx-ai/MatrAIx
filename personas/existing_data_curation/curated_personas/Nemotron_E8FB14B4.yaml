  career_goals: Pedro aims to earn his GED within the next year and then enroll in a vocational program to become a certified automotive technician. He plans to combine his mechanical aptitude with his
    bilingual abilities to work in a shop that serves Miami's diverse Latino community. In the long term, he dreams of opening his own auto‑repair business that provides reliable, affordable services while
    creating apprenticeship opportunities for other young people from similar backgrounds. He also harbors an ambition to obtain a CompTIA A+ certification, giving him a backup path in IT support, ensuring
    he always has a practical, stable career option that meets his high standards of achievement.
