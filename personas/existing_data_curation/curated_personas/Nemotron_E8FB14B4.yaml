  hobbies: '[''Automotive maintenance'', ''Competitive gaming (FIFA, Street Fighter)'', ''Cooking traditional Nicaraguan dishes'', ''Soccer (watching and playing)'', ''Weightlifting'', ''Reading biographies'',
