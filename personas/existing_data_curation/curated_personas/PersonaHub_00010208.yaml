persona_description: A development professional who specializes in conflict-sensitive development interventions, particularly in areas affected by violent conflict. This professional is skilled in using
  participatory and consultative methods to link grassroots perspectives to higher level perspectives, and is aware of the potential for development processes to hold the potential for conflicts. This professional
  is also aware of the inter-connected nature of development and peacebuilding activities, and is aware of the need for conflict sensitivity in all development interventions in conflict-affected areas.
  This professional is also skilled in using similar strategies to both development and peacebuilding activities, and is aware of the potential for peacebuilding activities to work directly on conflict
  issues.
