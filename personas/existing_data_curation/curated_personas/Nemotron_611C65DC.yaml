  career_goals: Josue aims to become an executive chef at a reputable Latin American restaurant in Los Angeles, where he can lead a kitchen that balances authenticity with efficiency. Over the next five
    years he plans to earn a Certified Executive Chef credential, refine his menu development skills, and mentor emerging talent. Ultimately, he hopes to open a modest, family‑run eatery that showcases
    Guatemalan culinary heritage while offering a reliable, high‑quality dining experience for the local community.
