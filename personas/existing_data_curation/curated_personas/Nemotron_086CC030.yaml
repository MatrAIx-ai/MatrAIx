  hobbies: '[''Salsa dancing'', ''Cooking traditional Ecuadorian dishes'', ''Volunteering at STEM outreach programs'', ''Group fitness classes (spin, yoga)'', ''Reading non-fiction on leadership'', ''Urban
    gardening'', ''Attending cultural festivals'']'
  career_goals: She aims to become a director of information technology within the next five years, focusing on building scalable, resilient infrastructure for a mid‑size enterprise while championing pragmatic
    digital transformation initiatives. Camila also wants to mentor emerging women leaders in tech, develop a mentorship program within her organization, and achieve certification as a Certified Information
    Systems Security Professional (CISSP) to deepen her security expertise.
