personas:
  professional: Ayanna Jackson, a retired environmental engineer with three decades of experience in water‑resource management and data analytics, blends her curiosity and artistic sensibility to lead community
    STEAM workshops that visualize watershed health through Python‑driven graphics and watercolor illustrations, and they inspire participants to see science through an artistic lens.
  sports: Ayanna Jackson enjoys low‑impact fitness through morning yoga sessions at the local community studio, weekly nature walks along the Rehoboth Bay trail, and kayaking with the Sussex County River
    Kayak Club, while cheering on the Philadelphia Eagles and following the Delaware Blue Hens basketball team, and they view these activities as essential balance to their intellectual pursuits.
  arts: Ayanna Jackson expresses her creativity through delicate watercolors of Delaware’s coastal scenes, draws inspiration from the works of Claude Monet and John James Audubon, curates a personal library
    of poetry ranging from Emily Dickinson to contemporary voices, and volunteers as a facilitator for STEAM art‑science installations at the Millsboro Arts Council, often referencing the rhythmic flow
    of data visualizations in her paintings, and they find the blend of science and art invigorating.
  travel: Ayanna Jackson plans trips with meticulous itineraries that balance adventure and relaxation, favoring national parks like Acadia and Great Smoky Mountains for hiking, historic sites such as Gettysburg
    for cultural immersion, and occasional overseas journeys to Kyoto and the Amalfi Coast, yet they keep travel spending within a modest budget to fund community art projects.
  culinary: Ayanna Jackson’s kitchen experiments blend global flavors—from Thai green curry to Mediterranean mezze—using fresh herbs from her garden, locally sourced honey, and wildflower petals as garnish,
    and while their cooking skill is intermediate, they occasionally over‑spice dishes in their enthusiasm to perfect authentic taste.
  core: Ayanna Jackson is a curious, organized retiree who fuses environmental science with watercolor art, volunteers passionately, and balances disciplined finances with a zest for lifelong learning and
    occasional culinary daring, and they continually seek new ways to merge knowledge and creativity.
background:
  cultural: Ayanna is an African‑American woman whose family history traces back to the Great Migration of the early 20th century, when her grandparents moved from the Jim Crow South to the Mid‑Atlantic
    seeking educational and economic opportunities. Growing up in a close‑knit Black community in Delaware, she was shaped by the traditions of church fellowship, storytelling, and collective resilience.
    These cultural threads fostered a deep respect for education, community service, and artistic expression. In Millsboro, she remains active in local Black cultural events such as Juneteenth celebrations,
    historic preservation groups, and senior mentorship programs. Her heritage informs her worldview, blending a strong sense of identity with a commitment to uplifting future generations through both STEM
    and the arts.
