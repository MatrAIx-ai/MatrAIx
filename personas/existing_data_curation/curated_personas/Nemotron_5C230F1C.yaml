  hobbies: '[''Watercolor Painting'', ''Art Gallery Visits'', ''African-American Literature'', ''Native Plant Gardening'', ''Watershed Volunteerism'', ''Genealogy Research'', ''Bridge Club'', ''Yoga'',
    ''Cooking International Recipes'', ''Travel to National Parks'']'
  career_goals: Although retired from full‑time employment, Ayanna remains driven to make a meaningful impact. She aims to expand the local STEAM outreach program for middle‑school students, develop a community‑driven
    digital archive of historic African‑American sites in Sussex County, and serve on the board of the Millsboro Arts Council to integrate scientific themes into public art installations. Additionally,
    she plans to author a memoir that chronicles her journey as a Black woman in STEM and to complete a certification in art therapy, enabling her to combine scientific insight with creative healing practices
    in volunteer work with seniors. Her overarching ambition is to inspire the next generation of scientists while enriching the cultural fabric of her community.
