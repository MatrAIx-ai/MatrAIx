  hobbies: '[''Soccer (playing and watching)'', ''Cooking Salvadoran cuisine'', ''Hosting community potlucks'', ''Dancing to cumbia and salsa'', ''Community gardening'', ''Mentoring youth in maintenance
    skills'', ''Attending neighborhood festivals'', ''Reading about cleaning tech and sustainability'', ''Listening to Latin music'', ''Volunteering at local youth center'']'
  career_goals: Andres seeks to translate his hands‑on expertise into a supervisory or facilities‑management role within the next few years. He aims to obtain a Certified Professional Cleaner credential
    and complete a GED program, positioning himself for promotion to lead janitor or building services coordinator. He aspires to spearhead the adoption of sustainable cleaning practices in his current
    employer's portfolio, potentially overseeing a small team dedicated to green initiatives. Long‑term, he envisions starting a modest, family‑run cleaning business that serves the Bell Gardens community,
    leveraging his reputation, bilingual skills, and network of contacts. He also hopes to mentor younger immigrant workers, sharing both technical know‑how and professional ethics.
