personas:
  professional: Andres Perez, an experienced janitor with three decades of expertise in high‑traffic floor care, chemical safety, minor facility repairs, and bilingual crew coordination, blends practical
    curiosity with organized flexibility, remains skeptical of quick fixes, and pushes for green‑cleaning initiatives as they work toward a supervisory facilities‑management role.
  sports: Andres Perez is a steadfast fan of the LA Galaxy and LAFC, regularly cheering at matches and joining weekend pick‑up soccer games at the Bell Gardens community park, while also following the local
    high‑school basketball team, the Bell Gardens Bulldogs, and brings a competitive edge to games by often questioning opponents' strategies.
  arts: Andres Perez thrives on Latin rhythms, dancing cumbia and salsa at neighborhood festivals where they often serve as MC, draws inspiration from performers like Celia Cruz, Los Ángeles Azules, and
    Carlos Vives, and remains skeptical of overly commercialized music trends, preferring authentic community expressions.
  travel: Andres Perez prefers short, purposeful trips—weekend road trips to the Pacific coast towns of Santa Barbara and San Diego for beach outings, an annual family reunion in a mountain cabin near Big
    Bear, and a dream itinerary that includes the historic plazas of Oaxaca and the coffee farms of Guatemala—balancing limited vacation days with a love for cultural immersion while scrutinizing travel
    deals for value.
  culinary: Andres Perez enjoys cooking traditional dishes such as cheese‑filled pupusas, yucca frita with garlic mojo, and corn‑based tamales, skillfully blending masa with fresh herbs from their garden,
    frequently hosts potluck gatherings where friends rave about the smoky flavor of grilled chorizo and tangy salsa verde they craft, and is skeptical of pre‑made spice mixes, preferring fresh ingredients.
  core: Andres Perez blends a competitive, curious spirit with community‑centered generosity, juggling a disciplined work ethic, a thrift‑focused budget, and a love for soccer, salsa, and home‑cooked comfort
    food, while occasionally overindulging in festival revelry and neglecting regular exercise.
background:
  cultural: Andres Perez grew up as part of the Salvadoran diaspora in Los Angeles County, where the close‑knit Salvadoran community maintains strong ties to its Central American roots. He was raised bilingual,
    speaking Spanish at home and English in school and work, and his daily life reflects a blend of Salvadoran traditions and Southern California culture. Family gatherings often feature salsa music, lively
    storytelling, and staple dishes like pupusas and sopa de gallina. He celebrates Salvadoran holidays such as Dia de la Fundacion de El Salvador and participates in the annual Fiesta de la Tradicion in
    Bell Gardens, where he helps organize cultural dances and food stalls. Catholic faith and community solidarity are important aspects of his identity, guiding his respect for hard work, hospitality,
    and mutual support. While he embraces American optimism and the entrepreneurial spirit common in his neighborhood, he also carries forward the resilient, family‑oriented values of his Salvadoran heritage.
attributes:
  skills: '[''Floor care and polishing'', ''Chemical safety and waste disposal'', ''Minor plumbing and electrical repairs'', ''HVAC filter maintenance'', ''Sanitation compliance (OSHA, local health codes)'',
