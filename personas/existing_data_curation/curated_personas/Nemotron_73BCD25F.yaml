personas:
  professional: Juan Stuart, a curious kindergarten explorer, exhibits budding leadership as they organize LEGO building sessions and coordinate a small soccer game on weekends, using a practical, routine‑loving
    mindset to keep peers focused.
  sports: Juan Stuart, a lively budding defender for the neighborhood's 'Little Rovers' youth soccer team, delights in weekend matches on the local park field, preferring the familiar routine of warm‑ups
    and the comforting sound of teammates' cheers, though they can get distracted by spontaneous games of tag.
  arts: Juan Stuart, an imaginative cartoonist, devotes free time to sketching colorful stories inspired by family folklore, drawing influences from classic children's creators like Dr. Seuss and contemporary
    Latin pop icons such as Shakira, while they also dance to traditional rhythms with relatives.
  travel: Juan Stuart loves family road trips to the nearby lake where they build sandcastles, and dreams of a future adventure to a tropical rainforest reserve to explore waterfalls and collect bright
    seashells, preferring relaxed itineraries over packed schedules, though weekend plans often hinge on school assignments.
  culinary: Juan Stuart favors simple comfort foods like grilled cheese sandwiches, chicken nuggets with ketchup, and mango‑lime smoothies, enjoys assembling their own mini‑pizza with pepperoni and olives,
    yet frequently forgets to finish their vegetables, while their favorite dish to draw is a rainbow‑colored fruit bowl.
  core: Juan Stuart, a six‑year‑old routine lover, balances play and worry with LEGO castles and rhythmic claps, often misplacing soccer cleats but brightening any room with folkloric sketches and spontaneous
    dance steps, as they navigate the world with a practical yet sensitive eye.
background:
  cultural: Juan lives in West Haven, Connecticut, in a close‑knit Guatemalan‑American household where Spanish is spoken daily. His family celebrates Guatemalan holidays such as Día de los Muertos, Semana
    Santa, and the Guatemalan Independence Day with traditional foods like tamales, pepián, and atol de elote. They attend a local Catholic church and participate in community events at the nearby Hispanic
    cultural center. Through helping his mother prepare family recipes and listening to stories about Guatemala, Juan maintains a strong bicultural identity while also adapting to American school life.
