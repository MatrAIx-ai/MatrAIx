  career_goals: Juan often imagines himself in a stable, hands‑on career where he can help others and keep a predictable schedule. He loves the idea of becoming a firefighter because of the regular drills
    and community service, and he also dreams of being a mechanic who works with tools and follows clear procedures. Occasionally he says he would like to be a teacher one day, sharing books and stories
    with younger children. These ambitions reflect his practical mindset and his wish to support his family in the future.
