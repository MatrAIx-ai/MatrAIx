  career_goals: Looking ahead, Chris aims to move into a supervisory or training role where he can mentor new hires and shape the customer‑experience strategy for his department. He plans to obtain a Certified
    Customer Experience Professional (CCXP) credential and deepen his expertise in service‑design thinking, allowing him to blend his creative instincts with operational leadership. Over the next few years,
    he hopes to lead a small team, develop engaging onboarding programs, and introduce innovative communication tools such as visual FAQs and interactive tutorials. Ultimately, Chris envisions a phased
    transition to a part‑time consultancy that helps small businesses improve their customer service while freeing up time to pursue his artistic interests and travel.
