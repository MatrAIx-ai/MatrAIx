  career_goals: Willian aspires to turn his passion for art and his deep sense of compassion into a career that nurtures community wellbeing through creative expression. He aims to become a community arts
    program coordinator for a Denver‑based nonprofit, designing and leading art‑therapy workshops for at‑risk youth and marginalized groups. To support this path, he plans to pursue a master's degree in
    social work or museum studies, eventually moving into an arts outreach director role that blends flexible, project‑based work with a mission of cultural inclusion and mental‑health support.
