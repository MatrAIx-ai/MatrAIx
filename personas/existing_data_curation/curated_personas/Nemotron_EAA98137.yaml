  career_goals: David aims to deepen his role as a subject-matter expert on the company’s core legacy platform, seeking a senior architect position that allows him to focus on stability and incremental
    improvements rather than rapid innovation. He is motivated to mentor the next generation of developers, establishing a small, close-knit team that operates with clear, predictable processes. Over the
    next five years, he hopes to transition into a consulting capacity, offering his practical expertise to local businesses in Utah, which would give him greater control over his schedule and reduce the
    stress associated with high-pressure releases. He also aspires to obtain certifications in ITIL and cybersecurity to reinforce his practical knowledge and broaden his consulting portfolio.
