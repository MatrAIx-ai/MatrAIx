personas:
  professional: David Jones, a 52‑year‑old veteran programmer, spends his days fine‑tuning enterprise legacy systems with Java, C# and Oracle, and they channel their love of routine into meticulous code
    reviews, patient mentorship, and a steady push toward a senior architect role where stability beats rapid innovation.
  sports: David Jones finds solace on the Wasatch foothills trails, hiking the familiar Deer Creek Loop each weekend while they cheer the Utah Jazz and the Real Salt Lake soccer team from their living room
    and dabble in winter cross‑country skiing at Park City when schedule permits.
  arts: David Jones cultivates a quiet creative side by strumming classic folk tunes from Neil Young on an acoustic guitar at family gatherings and they admire the craftsmanship of Ansel Adams photography,
    while deep‑diving into historical nonfiction by Doris Kearns Goodwin and classic sci‑fi by Isaac Asimov for intellectual escape.
  travel: David Jones prefers purposeful road trips that blend predictable scenery with low‑stress planning, such as revisiting Yellowstone’s geysers each summer and dreaming of a future hike through New Zealand’s
    Milford Track, but they keep travel modest due to a fixed consulting schedule and a penchant for staying close to family.
  culinary: David Jones favors hearty, garden‑to‑table meals like rosemary‑roasted chicken with roasted carrots and kale salad, they often over‑season their dishes with garlic and pepper, and they relish
    the occasional weekend batch of smoked brisket, though they admit to neglecting more adventurous cuisines in favor of reliable comfort foods.
  core: David Jones is a methodical legacy‑system guru who balances a love of predictable routines with a quiet anxiety, an occasional disorganized streak, and a weekend world of woodworking, gardening,
    and low‑key hobbies.
background:
  cultural: 'David grew up in a middle-class, predominantly white community in Utah, where the cultural atmosphere blends traditional Western American values with the modest, community-oriented ethos common
    in the Salt Lake region. His family background includes ancestors of English and Scandinavian descent, and while not actively religious, he was raised in an environment that respected the cultural practices
    of the local Latter‑day Saint community, such: family gatherings, self-reliance, and civic participation. This upbringing fostered a practical, routine-oriented mindset and an appreciation for modest,
    reliable craftsmanship, which is reflected in his professional work and personal hobbies.'
