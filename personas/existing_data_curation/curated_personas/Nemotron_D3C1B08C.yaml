  career_goals: Jose’s big dream is to become an astronaut because he is fascinated by space and wants to explore new frontiers, yet his practical side also imagines him as a teacher who can share his love
    of science with other kids. He sometimes thinks about becoming a veterinarian, hoping to help animals, and he also likes the idea of working as a construction worker, building things he can see and
    touch. Although he worries about making mistakes, he is determined to study hard and stay organized to achieve his goals.
