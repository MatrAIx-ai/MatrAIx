personas:
  professional: Jose Rodriguez is a budding young engineer who transforms LEGO instruction manuals into miniature skyscrapers, blending meticulous attention to detail with a flair for improvisation as they
    plan future inventions.
  sports: Jose Rodriguez dribbles for the Riverside Rovers youth soccer club, cheering on the LA Galaxy while balancing assertive play on the field with cooperative teamwork and a love for friendly competition.
  arts: Jose Rodriguez sketches comic strips inspired by Stan Lee’s superheroes and Pixar’s animated storytelling, while simultaneously designing elaborate LEGO dioramas that showcase a passion for visual
    art and tactile creation.
  travel: Jose Rodriguez dreams of a family trip to Disneyland and a cultural excursion to Mexico City, preferring meticulously planned itineraries that mix thrilling rides with hands-on museum tours, though
    limited allowance means vacations often hinge on school holidays.
  culinary: Jose Rodriguez eagerly assists in preparing tacos al pastor, guacamole with ripe avocados, fresh cilantro, and lime, as well as salsa verde, displaying a budding chef’s enthusiasm despite occasional
    over-salting and a modest knack for following recipes.
  core: Jose Rodriguez is a curious, organized 7-year-old who builds LEGO marvels, worries about school tests, and balances solo imagination with lively soccer matches, all while secretly hoarding extra
    video-game minutes.
background:
  cultural: Jose is raised in a Mexican‑American household in Elk Grove, California, where his parents maintain strong ties to Mexican traditions while embracing the diversity of the Bay Area. He grows
    up bilingual, speaking Spanish at home and English at school. Family celebrations include Día de los Muertos altars, quinceañera preparations, and weekend gatherings featuring music like mariachi and
    norteño. The local Mexican community in Sacramento County hosts festivals, parades, and cultural workshops that reinforce his sense of heritage. Simultaneously, the multicultural environment of California
    exposes him to a broad range of foods, languages, and customs, shaping a hybrid cultural identity that values family, respect for elders, and community involvement.
