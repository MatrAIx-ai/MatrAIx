  hobbies: '[''Bowling league'', ''Recreational softball'', ''Fishing trips'', ''Classic car restoration'', ''Volunteer work with veterans group'', ''County fair participation'', ''Trivia nights'', ''Road
    trips with dog'']'
  career_goals: Oscar aims to move into a regional logistics management role where he can oversee a fleet of drivers, streamline routing, and improve operational efficiency. He plans to earn certification
    as a driver trainer and mentor younger drivers, leveraging his calm demeanor and practical knowledge to promote safety and professionalism. In parallel, he is interested in establishing a small independent
    trucking brokerage to capitalize on his sales background and competitive drive, targeting growth in Midwest freight markets. Ultimately, he seeks to earn a company safety award and transition into a
    sales management position that blends his driving experience with strategic market development.
