personas:
  professional: Frieda Sulzbach, an experienced educational guidance counselor, blends methodical case management, evidence‑based assessment tools like the Strong Interest Inventory and StrengthsFinder,
    and compassionate active listening to craft individualized career plans and strategic university‑wide initiatives, positioning her for a future role as Director of Career Services.
  sports: Frieda Sulzbach hikes the North Shore Trail with the local outdoor club each summer, practices yoga twice weekly at a community studio, supports the Minnesota Vikings and Twins, and joins a recreational
    softball league that meets on weekday evenings.
  arts: Frieda Sulzbach frequents the Guthrie Theater for contemporary plays, follows the Minneapolis Institute of Art’s exhibitions featuring works by Grant Wood and Kehinde Wiley, enjoys listening to
    Sufjan Stevens and folk singer‑songwriter Sarah Jarosz, and curates a blog series reviewing local theater productions.
  travel: Frieda Sulzbach prefers carefully planned road trips that balance scenic drives and cultural stops, has explored the historic streets of New Orleans during Mardi Gras, trekked Iceland’s Golden
    Circle on a winter vacation, and dreams of visiting the Finnish archipelago to experience midsummer traditions.
  culinary: Frieda Sulzbach delights in seasonal Midwestern cooking, perfecting dishes like wild‑rice and mushroom casserole, pan‑seared walleye with dill butter, and beet‑goat‑cheese salad, while honing
    her skill at hand‑kneading rye bread and preserving heirloom carrots from her garden.
  core: Frieda Sulzbach balances a methodical counseling career with a habit of knitting intricate lace patterns during conference calls, never skips Sunday crossword puzzles, and occasionally overcommits
    to volunteer projects, demanding a strict personal schedule.
background:
  cultural: Frieda was raised in a middle‑class, white family in Minneapolis with deep German‑Scandinavian roots typical of the Upper Midwest. Her upbringing reflected the "Minnesota nice" ethos—valuing
    politeness, community involvement, and a strong public education system. Though her family attended a Lutheran church, she now identifies with inclusive, progressive values and is actively engaged in
    the city's vibrant arts scene, including the Minneapolis Institute of Art and local cultural festivals. She embraces the region's love for outdoor recreation, seasonal foods, and volunteerism, which
    inform her compassionate, cooperative approach to counseling.
