  hobbies: '[''Reading classic literature'', ''Theater attendance'', ''Volunteer mentorship'', ''Hiking'', ''Gardening'', ''Yoga'', ''Knitting'', ''Blogging about career advice'', ''Crossword puzzles'',
    ''Seasonal cooking'', ''Art museum visits'', ''Book club participation'']'
  career_goals: Frieda aspires to become the Director of Career Services at a major university in the Midwest, where she can shape strategic initiatives that improve student employability and equity. She
    aims to earn the Certified Career Development Facilitator (CDF) and Certified Career Counselor (CCC) credentials, and eventually pursue a Ph.D. in counseling psychology to contribute scholarly research
    on inclusive career guidance. In the next five years, she plans to design a citywide career transition program for adult learners, mentor junior counselors, and author a guidebook on culturally responsive
    career counseling.
