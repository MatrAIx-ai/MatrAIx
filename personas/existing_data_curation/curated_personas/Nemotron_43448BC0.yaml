personas:
  professional: Daphne Harris, an ambitious high school junior, combines her love of robotics and creative writing with a practical mindset, excelling in Scratch animation projects, tutoring peers in math,
    and mapping a future in computer science or civil engineering aimed at building community‑focused tech solutions.
  sports: Daphne Harris enjoys walking the trails of Eden Park and cheering for the Cincinnati Reds, occasionally joins a youth basketball pick‑up game at the local community center, and follows the Ohio
    State Buckeyes football team, balancing low‑impact cardio with social sport activities.
  arts: Daphne Harris expresses her creativity through digital illustration inspired by the rhythms of R&B and hip‑hop, plays piano for her church’s youth choir, curates playlists featuring artists like
    H.E.R., Kendrick Lamar, and Alicia Keys, and captures urban photography of the Cincinnati skyline reminiscent of the works of photographer Andreas Gursky.
  travel: Daphne Harris favors weekend road trips to nearby destinations such as Nashville for its music scene and Chicago for its architecture, dreams of a spring visit to Washington, D.C. to explore historic
    museums, and balances travel aspirations with budget constraints by planning trips during school breaks.
  culinary: Daphne Harris, an enthusiastic home cook, recreates Southern‑inspired dishes such as collard greens seasoned with smoked turkey, buttery cornmeal cornbread, and oven‑baked “fried” chicken using
    a lighter olive‑oil coating, experimenting with healthier twists while sourcing fresh produce at the Cincinnati farmers market.
  core: Daphne Harris is a quietly driven teen who blends tech curiosity with community service, balances frugal budgeting with creative indulgences, and navigates teenage health and hobbies with a practical,
    resilient outlook.
background:
  cultural: Daphne is African American and grew up in Cincinnati's West End, a neighborhood with deep ties to the city's Black history. Her grandparents were part of the Great Migration, moving from the
    rural South to Ohio in search of better opportunities, and they passed down stories of resilience and community solidarity. Her family is active in the local Baptist church, where she participates in
    the youth group and sings in the choir. She celebrates cultural milestones such as Juneteenth and attends the annual Cincinnati Black Expo, which showcases Black entrepreneurship, art, and music. The
    blend of Southern family traditions, the vibrant city's cultural festivals, and the close-knit community she grew up in shape her identity and outlook, grounding her in a heritage that balances pride
    in her roots with a forward-looking ambition.
