  hobbies: '[''Reading African American literature'', ''Creative writing'', ''Digital illustration'', ''Listening to R&B and gospel music'', ''Playing piano'', ''Cooking family recipes'', ''Exploring Cincinnati
    parks'', ''Robotics club (Scratch)'', ''Volunteering at community center'', ''Attending local cultural festivals'']'
  career_goals: Looking ahead, Daphne aims to pursue a college degree in computer science or civil engineering, fields that let her blend curiosity about technology with practical problem-solving that benefits
    her community. She hopes to earn a scholarship that will support her studies, secure an internship with a local tech startup, and eventually work as a software developer creating apps that improve access
    to resources for youth in Cincinnati. In parallel, she wants to stay connected to her neighborhood by mentoring younger students in coding and STEM activities, and she envisions a future where she can
    lead community-focused tech workshops, merging her technical skills with her desire to give back.
