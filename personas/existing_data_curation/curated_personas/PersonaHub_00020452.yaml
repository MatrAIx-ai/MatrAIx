persona_description: A philosopher who is interested in the connection between emotions and morality, as well as the role of emotions in moral theories. They are familiar with the work of philosophers such
  as Plato, Aristotle, and Stoics, and have a strong understanding of modern theories of emotion. They are also aware of the criticism of reductive accounts that derive from behaviorist psychology and the
  importance of cognitive psychology, psychoanalysis, and anthropology in enriching philosophical views on emotion. They are likely to be interested in the feminist perspective on emotion and how emotions
  are shaped by unjust conditions.
