personas:
  professional: Joshua Gore is a seasoned groundskeeper with a horticulture background who leverages his practical mindset, strong budgeting skills, and detailed safety compliance to design low‑water native
    planting schemes, while diplomatically leading crews and confidently handling heavy equipment.
  sports: Joshua Gore plays weekend basketball pick‑up games at the local park, follows the Charlotte Hornets and Carolina Panthers, regularly volunteers with the Brunswick County Youth Basketball League,
    and balances active play with fishing trips that offer low‑impact cardio and relaxation.
  arts: Joshua Gore immerses themselves in gospel and blues music festivals, regularly enjoys performances by the local gospel choir 'Harmony Voices', collects vinyl records of B.B. King and Aretha Franklin,
    and uses a portable speaker to play these tunes while woodworking, giving their projects a rhythmic backdrop.
  travel: Joshua Gore prefers short road trips that combine nature and family, having explored the Outer Banks, Savannah’s historic squares, and a weekend cabin near Asheville, but financial constraints
    keep long‑haul vacations rare, so they favor budget‑friendly camping adventures and occasional fishing charters on the Cape Fear River.
  culinary: Joshua Gore loves cooking Southern comfort food, regularly perfecting fried catfish, collard greens simmered with smoked turkey, buttery cornbread, and sweet potato pie, and they grow many key
    herbs like dill and rosemary in their community garden, though they sometimes over‑salt dishes when stressed.
  core: Joshua Gore blends a practical, structure‑loving work ethic with a community‑centered, socially energetic lifestyle, wrestling with chronic worry that they soothe through fishing, woodworking, and
    soulful blues.
background:
  cultural: Joshua was raised in a close‑knit African‑American community in rural Virginia, where church, family, and community gatherings played central roles in his upbringing. He grew up listening to
    gospel choirs, blues, and soul music, and he learned the value of mutual support and resilience from his elders. His heritage includes a strong tradition of oral storytelling, shared meals, and a deep
    connection to the land, which informs his appreciation for horticulture and outdoor work. These cultural influences shape his community involvement, his love for soulful cooking, and his commitment
    to creating welcoming, well‑maintained spaces for his neighbors.
attributes:
  skills: '[''Landscape design'', ''Horticultural plant care'', ''Heavy equipment operation'', ''Project scheduling'', ''Client communication'', ''Budget management'', ''Team leadership'', ''Safety compliance'',
    ''Irrigation system installation'', ''Soil testing and amendment'']'
  hobbies: '[''Community gardening'', ''Weekend basketball'', ''Fishing'', ''Cooking Southern cuisine'', ''Attending gospel and blues festivals'', ''Woodworking'', ''DIY home improvement'']'
  career_goals: Joshua aims to progress from a skilled groundskeeper to a supervisory foreman, eventually managing a crew of landscapers for a regional service provider. He is working toward obtaining a
    Certified Landscape Professional (CLP) credential and hopes to incorporate sustainable practices such as native planting and low‑water irrigation into his projects. Long‑term, he envisions starting
    his own small landscaping business focused on serving residential clients in Brunswick County, where he can provide reliable, high‑quality service while creating a stable income that reduces his financial
    stress and offers flexibility for personal time.
