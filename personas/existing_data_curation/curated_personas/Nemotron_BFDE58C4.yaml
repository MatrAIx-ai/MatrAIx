  hobbies: '[''Soccer (playing and watching)'', ''Cooking Mexican cuisine'', ''Gardening'', ''Acoustic guitar'', ''Reading (medical journals and fiction)'', ''Hiking'', ''Community health volunteering'',
    ''Attending cultural festivals'', ''Meditation'', ''Strategy board games'']'
  career_goals: Carmelo aims to advance his nursing career by obtaining a Bachelor of Science in Nursing (BSN) and pursuing specialty certifications such as Critical Care Registered Nurse (CCRN) or Oncology
    Nursing Certification. He envisions moving into a leadership role as a charge nurse or unit manager, where he can mentor younger staff and shape patient care protocols. Long‑term, he hopes to develop
    a community health program that provides preventive care and health education to underserved Mexican‑American families in the Detroit metro area, combining his clinical expertise with his cultural insight.
