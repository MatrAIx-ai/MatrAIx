personas:
  professional: Carmelo Congote, a seasoned registered nurse with expertise in patient assessment, IV therapy, wound care, and bilingual communication, leverages practical curiosity and a cooperative nature
    to integrate evidence‑based practices while sometimes juggling disorganized schedules and a relaxed approach to obligations in fast‑paced clinical settings.
  sports: Carmelo Congote enjoys playing midfield for a local amateur soccer league, cheering for Detroit City FC and the Detroit Lions, and hitting the trails on weekends, balancing a love for team camaraderie
    with solitary hikes that serve as stress relief.
  arts: Carmelo Congote finds solace strumming acoustic folk songs from his heritage, inspired by artists like José González and Natalia Lafourcade, while escaping into science‑fiction worlds by authors
    such as Octavia Butler and Isaac Asimov, and attending cultural festivals like Día de los Muertos that blend music, art, and tradition.
  travel: Carmelo Congote prefers a blend of adventure and family‑friendly trips, often planning weekend getaways to the Rocky Mountains or cultural pilgrimages to Santa Fe, while dreaming of a future volunteer
    trip to a remote health clinic in Oaxaca, balancing budget constraints with a desire for meaningful experiences.
  culinary: Carmelo Congote cooks with gusto, mastering dishes like tamales, pozole, and chiles rellenos, while delighting in fresh cilantro, epazote, and roasted corn, and his kitchen skill sits comfortably
    between confident home‑cooking and occasional reliance on ready‑made sauces.
  core: Carmelo Congote is a caring, bilingual nurse who blends practical curiosity with a laid‑back, sometimes disorganized lifestyle, using music, gardening, and meditation to counterbalance chronic worry
    and a love for community service.
background:
  cultural: Carmelo comes from a Mexican heritage, raised in a bilingual household where Spanish was spoken alongside English. Family gatherings often featured traditional foods like tamales and pozole,
    and celebrations such as Día de los Muertos and Cinco de Mayo reinforced a strong sense of cultural identity. Growing up in the Detroit metropolitan area, he experienced a blend of Mexican‑American
    community life and Midwestern values of hard work and neighborliness. His Catholic upbringing informs his respect for rituals and community service. This cultural backdrop shapes his compassionate nursing
    style, his dedication to serving Mexican‑American patients, and his active participation in local cultural events.
attributes:
  skills: '[''Patient Assessment'', ''IV Therapy'', ''Wound Care'', ''Medication Administration'', ''Health Education'', ''Bilingual Spanish-English Communication'', ''Crisis Management'', ''Electronic
