persona_description: A Forest Service researcher who specializes in the study of prescribed burning, specifically the use of desktop modelling programs to simulate the movement of night smoke resulting
  from prescribed burning. His research interests include the effects of smoke on air quality and driving conditions, and the development of more accurate and effective smoke management programs. He is
  currently testing two simplified models designed to simulate the movement of night smoke, which he plans to connect with high resolution weather prediction models to increase the predictive range of the
  models to 48 hours or longer.
