  career_goals: Now retired, Joshue’s primary ambition is to leverage his experience for the benefit of his community. He aims to serve as a volunteer advisor for local senior services and neighborhood
    association projects, offering guidance on budgeting, maintenance, and grant writing. He also wishes to mentor younger relatives and community members, particularly in trades and digital skills, preserving
    practical knowledge across generations. Writing a memoir that captures his family’s history and the civil‑rights era he lived through is another personal goal, as is maintaining his health to remain
    actively involved in church outreach and cultural events.
