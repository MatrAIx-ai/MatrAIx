    ''Yoga'']'
  career_goals: Shakana aims to transition from a hands-on technologist to a senior engineering leader within the next three years, seeking a supervisory role that lets her shape process improvements and
    mentor emerging talent. She plans to earn a Lean Six Sigma Black Belt and leverage it to spearhead sustainability initiatives in manufacturing. Long-term, she envisions launching a boutique consulting
    firm that helps small-to-mid-size manufacturers adopt flexible, creative production strategies while emphasizing workforce diversity. Parallel to her professional aspirations, she is committed to expanding
    outreach programs that introduce Black girls and underrepresented youth to engineering through workshops, school partnerships, and community events.
