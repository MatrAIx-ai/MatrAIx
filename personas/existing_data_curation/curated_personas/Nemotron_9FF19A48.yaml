personas:
  professional: Shakana Wilson, a 41‑year‑old engineering technologist, merges CNC machining, SolidWorks and AutoCAD expertise with a vivid artistic imagination, turning high‑pressure troubleshooting into
    creative problem‑solving while mentoring junior staff and leading cross‑functional teams, even though their spontaneous nature sometimes collides with strict project deadlines.
  sports: Shakana Wilson stays fit by joining the Piedmont Trail Hikers club for weekend treks, cheering on the Atlanta Falcons on Sundays, and playing in a co‑ed recreational soccer league on Saturday
    evenings, though their love of spontaneous road trips sometimes supersedes a structured workout regimen.
  arts: Shakana Wilson channels artistic energy into abstract watercolors inspired by Yayoi Kusama’s patterns, grooves to Kendrick Lamar’s beats during hip‑hop classes, line‑dances to classic country hits
    at community socials, and regularly attends performances by Regina King at the Alliance Theatre, weaving these influences into both personal expression and engineering creativity.
  travel: Shakana Wilson prefers spontaneous weekend getaways, often charting last‑minute routes to Asheville’s Blue Ridge vistas, Nashville’s vibrant music scene, or Charleston’s historic waterfront, while
    budgeting modestly and nurturing a long‑term goal to explore New Orleans’s cultural mosaic.
  culinary: Shakana Wilson skillfully prepares Southern comfort dishes—crispy fried chicken, collard greens simmered with smoked turkey, and silky shrimp‑and‑grits—while experimenting with hot‑sauce blends
    featuring ghost pepper and chipotle, and occasionally indulges in upscale tasting menus at Atlanta’s Bacchanalia.
  core: Shakana Wilson is a curiosity‑driven engineer who transforms technical challenges into artistic experiments, thrives on spontaneous group outings, battles chronic worry with yoga and journaling,
    and occasionally lets impulse spending on art supplies derail meticulously planned budgets.
background:
  cultural: Shakana was raised in a close-knit African-American family in the Atlanta metropolitan area, where church, family gatherings, and community solidarity shaped her values. Her Southern Black heritage
    infuses her life with a strong sense of resilience, storytelling, and respect for elders. Traditions such as soul food cooking, gospel music, and annual Juneteenth celebrations are central to her identity.
    She stays connected to her roots through participation in local Black professional networks, volunteering at her historic neighborhood church, and attending cultural festivals that highlight African
    diaspora arts. This background informs her collaborative work style, her commitment to uplifting underrepresented voices in STEM, and her appreciation for the blend of tradition and innovation.
