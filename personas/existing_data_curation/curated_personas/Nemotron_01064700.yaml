  hobbies: '["Fishing", "Hunting", "Woodworking", "Gardening", "Darts (tournament)", "Watching NFL games", "Attending Watertown County Fair", "Reading about fabrication technology", "Arduino hobby projects",
    "Community volunteer work"]'
  career_goals: William aims to transition from a shop‑floor assembler to a lead technician or shift supervisor within the next two years, leveraging his years of experience to mentor younger workers and
    improve process efficiency. He plans to earn a Certified Production Technician (CPT) credential and complete a short course in CNC programming to broaden his technical toolkit. Ultimately, he envisions
    launching a small side business offering custom metal‑fabrication projects for local farms and hobbyists, allowing him to blend his practical skills with his curiosity for innovative design. He also
    hopes to be recognized for his contributions through a company safety award or employee‑of‑the‑month accolade, reflecting his competitive drive.
