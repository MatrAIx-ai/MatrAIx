  hobbies: '[''Playing tactical video games (e.g., Fortnite, Minecraft)'', ''Model building (airplanes, cars)'', ''Bike riding and maintenance'', ''Fishing at local streams'', ''Reading automotive repair
    manuals'', ''Gardening with family'']'
  career_goals: Troy dreams of turning his mechanical talents into a lifelong career. He aims to attend a technical high school to study automotive technology, master car and small‑engine repair, and eventually
    open a neighborhood workshop where he can offer reliable, routine maintenance services. While he values a stable trade, he also imagines combining his love for competition with a side path as a professional
    gamer or e‑sports participant, using his strategic skills to excel in that arena.
