personas:
  professional: A budding DIY mechanic, Troy Burch channels their love for routine and hands‑on work into assembling detailed model airplane kits and repairing their bike, favoring incremental, familiar
    fixes over ambitious, abstract engineering projects.
  sports: An enthusiastic cyclist, Troy Burch rides the country lanes of Lancaster County for fitness, roots for the Lancaster Barnstormers and the Philadelphia Eagles, and participates in the local Lancaster
    County Youth Soccer league, preferring solitary rides but still joining small‑team drills when needed, all while they balance competition with a relaxed team spirit.
  arts: A creative tinkerer, Troy Burch immerses themselves in building model kits while blasting classic rock from Led Zeppelin and The Who, and enjoys occasional family movie nights featuring Pixar’s
    ‘Toy Story’, reinforcing their preference for familiar, low‑key artistic outlets.
  travel: A low‑key explorer, Troy Burch enjoys weekend road trips to nearby historic sites like the Amish farms of Strasburg and Gettysburg battlefield, dreams of hiking the Great Smoky Mountains, and
    looks forward to school‑organized trips to Washington D.C., usually planning at the last minute with their family.
  culinary: A hearty eater, Troy Burch favors comfort foods such as chicken pot pie, homemade mac & cheese, and a family‑style spaghetti Bolognese made with fresh tomatoes, while being choosy about spicy
    dishes and often skipping vegetables unless they’re fresh from their garden’s sweet corn and green beans.
  core: Troy Burch is a routine‑oriented, hands‑on 11‑year‑old who blends bike mechanics and model building with competitive gaming, maintains a laid‑back money mindset, and balances practical chores with
    a skeptical yet resilient outlook, often relying on their own resourcefulness.
background:
  cultural: Troy grew up in Nottingham, a small community in Lancaster County, Pennsylvania, where the local culture emphasizes practicality, self‑reliance, and close‑knit family ties. The region's agricultural
    heritage and the presence of Pennsylvania Dutch traditions shape a lifestyle that values routine work, hands‑on craftsmanship, and modest community gatherings. While Troy is white and part of the broader
    American rural culture, his upbringing reflects the blend of Mid‑Atlantic small‑town values—hard work, straightforward communication, and a respect for the land—that influence his preferences for familiar,
    practical pursuits.
attributes:
  skills: '[''Basic computer navigation and gaming'', ''Mechanical aptitude (bike repair, model assembly)'', ''Strategic thinking in competitive games'', ''Observation and pattern recognition'', ''Routine
