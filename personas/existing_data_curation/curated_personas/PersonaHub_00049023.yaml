persona_description: A historian who specializes in the study of U.S. presidents, particularly those who have been impeached. Her research interests include the political motivations behind impeachments,
  the impact of impeachment on presidential behavior, and the constitutional implications of impeachable offenses. She is particularly interested in the case of Andrew Johnson and the Tenure of Office Act,
  and the subsequent precedent set by the Clinton impeachment trial.
