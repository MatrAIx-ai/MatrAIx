  hobbies: '["Woodworking projects", "Historic home restoration", "Reading biographies of craftsmen", "Gardening", "Birdwatching", "Genealogy club"]'
  career_goals: Susan aims to transition her solo carpentry operation into a small family‑run workshop that can take on larger renovation projects while preserving her high standards. She plans to earn
    a formal OSHA certification to bolster client confidence, develop a structured apprenticeship program for local youth, and win a regional master‑carpenter award to solidify her reputation as a top craftsperson
    in the Dallas‑Fort Worth area. Long‑term, she hopes to author a practical guide on blending traditional woodworking methods with eco‑friendly materials, leaving a lasting legacy for future generations.
