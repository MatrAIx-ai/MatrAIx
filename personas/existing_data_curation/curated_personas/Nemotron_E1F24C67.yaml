personas:
  professional: Susan Stoppa, a veteran carpenter with over four decades of hands‑on experience, leverages their meticulous tool‑care routine, mastery of traditional joinery, and pragmatic curiosity to
    run a solo construction business while methodically planning a family‑run workshop that will take on larger historic‑renovation projects in the Dallas‑Fort Worth area.
  sports: Susan Stoppa, a faithful follower of the Dallas Cowboys who joins the local senior walking club for weekly 5‑mile strolls through the Trinity River Trail and occasionally volunteers as a groundskeeper
    for the nearby community baseball league, balances their love of low‑key fitness with a competitive streak when tracking personal bests.
  arts: Susan Stoppa, an avid admirer of master woodworkers like Sam Maloof and Gustav Stickley, spends their evenings devouring biographies of pioneering craftsmen and visits the Kimbell Art Museum to
    study the intricate woodwork in the galleries, while occasionally attending local folk concerts featuring artists such as Gillian Welch.
  travel: Susan Stoppa, favoring carefully planned trips that blend historic architecture with quiet solitude, has journeyed to Charleston’s historic district, toured the timber‑framed houses of Bruges,
    and hopes to spend a week in Kyoto’s traditional carpentry workshops, always booking modest boutique inns to stay within their retirement budget.
  culinary: Susan Stoppa, who thrives on farm‑to‑table simplicity, cultivates heirloom tomatoes, sweet potatoes, and kale in their garden, then transforms them into rustic dishes like rosemary‑roasted chicken
    with grilled vegetable medley and a weekly zucchini‑and‑corn frittata, while polishing their limited but precise skill set for baking sourdough bread using heritage wheat flour.
  core: Susan Stoppa, a disciplined, solitary woodworker with an eye for eco‑friendly restoration, balances methodical project planning with a competitive drive to earn a master‑carpenter award while they
    nurture a modest garden and a curated collection of craft biographies.
background:
  cultural: Raised in a modest, working‑class neighborhood on the outskirts of Dallas, Susan grew up valuing self‑reliance, hard work, and practical problem‑solving—hallmarks of the Texan blue‑collar culture.
    Her family’s heritage includes generations of tradespeople who emphasized craftsmanship and community service. Although she identifies as white American, she embraces the blend of Southern hospitality
    and the independent spirit common in North Texas, which informs both her professional ethic and personal pursuits.
attributes:
  skills: '["Custom cabinetry", "Framing", "Finish carpentry", "Blueprint reading", "Project budgeting", "Tool maintenance", "Safety compliance", "Mentoring apprentices", "Sustainable building practices",
