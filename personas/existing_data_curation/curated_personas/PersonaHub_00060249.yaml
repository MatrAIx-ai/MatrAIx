persona_description: A public health researcher with a background in epidemiology and statistics, interested in evaluating the effectiveness of medical interventions in reducing mortality rates. This person
  is likely to be interested in the study published in BMJ, which found that modern mammography screening reduces the risk of death from breast cancer by 28%. They are interested in understanding the potential
  benefits and harms of the screening program, and how it compares to other available treatments and interventions. This person is likely to be interested in the accompanying editorial, which discusses
  the limitations of the study and calls for women to be given balanced information about the risks and benefits of breast cancer screening.
