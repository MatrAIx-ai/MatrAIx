personas:
  professional: A budding preschool storyteller who loves arranging picture books by color and pretends to lead a classroom, Brianna Lee shows early signs of organization and curiosity, planning playtimes
    with methodical precision while quietly sharing stories from family gatherings.
  sports: A playground soccer enthusiast who joins the community park’s mini‑kickball circle every Saturday, Brianna Lee proudly wears a tiny Alabama Crimson Tide jersey and cheers for the Birmingham Barons
    when they play on TV, they balance quiet observation with occasional energetic sprints.
  arts: A quiet choir helper who loves humming Stevie Wonder’s Isn’t She Lovely during Sunday service, Brianna Lee spends afternoons drawing crayons into elaborate storyboards of family gatherings and enjoys
    watching animated musicals starring Lin‑Manuel Miranda, they let music shape their gentle imagination.
  travel: An inquisitive family traveler who has visited the historic Selma to Montgomery National Historic Trail on a school field trip and dreams of seeing the Disney World fireworks, Brianna Lee prefers
    short car rides with her favorite stuffed giraffe, planning each journey with her crayon‑drawn map and insisting on a snack of peanut butter‑banana sandwiches.
  culinary: An eager kitchen assistant who loves stirring the pot of collard greens with a wooden spoon and helping Mom bake cornbread, Brianna Lee favors sweet potato casserole and often requests extra
    honey drizzle on pancakes, they proudly display their Chef sticker after each successful dish, though they sometimes forget to wash their hands before cooking.
  core: Brianna Lee blends a quiet, methodical curiosity with a love for soulful melodies and community stories; they keep their crayons organized while secretly hoarding extra cookies for midnight snack
    raids.
background:
  cultural: Brianna is raised in a Black family in Montgomery, Alabama, where the legacy of civil‑rights history and strong community ties shape her worldview. Family gatherings often feature soulful music,
    storytelling, and home‑cooked Southern dishes that celebrate African‑American culinary traditions. Regular attendance at a local church provides experiences of worship, choir singing, and community
    service, reinforcing values of respect, perseverance, and togetherness. These cultural influences nurture her kindness, cooperation, and emotional stability.
attributes:
  skills: '[''Fine‑motor coordination (drawing, coloring, block building)'', ''Early numeracy (counting to 20)'', ''Letter recognition (A‑J)'', ''Memorization of nursery rhymes'', ''Organizational skills
    (keeping toys sorted)'', ''Simple puzzle solving'', ''Empathy and cooperative play'']'
  hobbies: '[''Reading picture books'', ''Drawing and coloring'', ''Duplo block building'', ''Backyard nature exploration'', ''Simple puzzles'', ''Small‑group music and movement classes'', ''Listening to
    children’s stories and nursery rhymes'']'
  career_goals: She often talks about wanting to become a teacher or a community helper who can make other children feel safe and happy. Her ambition is to grow into someone who shares knowledge, guides
    younger kids, and helps people in need, reflecting her caring and reliable personality.
