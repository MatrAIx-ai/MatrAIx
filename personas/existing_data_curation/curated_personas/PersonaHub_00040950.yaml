persona_description: A music historian and pianist who is interested in the history and evolution of musical pitch standards, particularly those established in different countries and time periods. They
  are knowledgeable about the differences in pitch standards between different regions and are able to interpret historical variations in pitch as a reflection of cultural and social influences over time.
  They are also familiar with the use of tuning forks and other instruments for pitch calibration, and have experience tuning pianos and other musical instruments.
