persona_description: A biologist who specializes in studying the body's response to hypoxia and the role of HIF proteins in determining the level of adaptation of cells to hypoxia in different age groups.
  Her research interests include, but are not limited to, the expression of HIF proteins in different age groups, the effects of hypoxia on cell function, and the regulation of HIF activity by other proteins.
  She has conducted studies on rats to determine the expression of HIF proteins in hypoxia and the role of PHD2 in regulating the level of HIF-1α protein in prepubertal animals. Her research has been published
  in the journal Heliyon.
