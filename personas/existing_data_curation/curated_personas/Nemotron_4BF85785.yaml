personas:
  professional: Margherita Ketema, a third‑grade teacher with a BA in Arts & Humanities, leverages her methodical lesson‑planning, data‑driven assessment, and fluent use of Google Classroom and interactive
    whiteboards to weave storytelling, visual arts, and multilingual song into a culturally responsive curriculum that reflects her commitment to collective empowerment.
  sports: Margherita Ketema, an avid jogger who runs the loops of Cunningham Park each morning, plays on a community co‑ed soccer team in the spring, follows the New York Knicks and the New York Rangers,
    and participates in a local women's running club that meets twice a week for interval training.
  arts: Margherita Ketema, a passionate community‑theater participant, regularly stages productions that honor diaspora histories, draws inspiration from playwrights like August Wilson and musicians such
    as Nina Simone, and spends evenings reading contemporary poetry by voices such as Tracy K. Smith while occasionally sketching street scenes of Queens for personal projects.
  travel: Margherita Ketema, a culturally curious traveler, favors meticulously planned trips that blend museum visits and local food tours, has explored the historic districts of Cartagena, the scenic
    tea plantations of Darjeeling, and the coastal villages of Portugal, and dreams of a future immersion in a Mediterranean island where she can study traditional bread‑making while balancing her teaching
    commitments.
  culinary: Margherita Ketema, a confident home cook, delights in preparing injera with teff flour, simmering a spiced doro wot with berbere and niter kibbeh, mastering slow‑cooked collard greens with smoked
    turkey, and pairing these dishes with southern‑style cornbread and Caribbean‑seasoned plantains during weekend gatherings.
  core: Margherita Ketema, a thoughtfully organized educator who balances a love for storytelling and data‑driven instruction with a penchant for late‑night cooking experiments and occasional over‑commitment
    to community projects, approaches life with curiosity tempered by practicality.
background:
  cultural: 'Margherita grew up in the kaleidoscopic neighborhood of Springfield Gardens, Queens, where African American, Caribbean, and East African cultures intersect. Her father emigrated from Ethiopia,
    bringing the Amharic language, traditional music, and cuisine into the household, while her mother, an African‑American New Yorker, instilled a strong sense of Black heritage and community service.
    She participated in the local Baptist church and Ethiopian cultural festivals, fostering a deep appreciation for collective responsibility and storytelling. This dual heritage shapes her worldview:
    education is a vehicle for empowerment, her teaching weaves multicultural perspectives, and she often incorporates Ethiopian folk songs and African‑Diaspora literature into lessons. Fluent in Amharic
    and comfortable navigating diverse cultural settings, she creates an inclusive classroom that honors the varied backgrounds of her students.'
attributes:
  skills: '["Lesson planning", "Curriculum development (interdisciplinary)", "Classroom management", "Differentiated instruction", "Data‑driven assessment", "Educational technology integration", "Culturally
    responsive teaching", "Literacy instruction", "Early math intervention", "Parent and community outreach", "Conflict resolution", "Mentoring new teachers", "Project‑based learning design", "Public speaking
    (staff meetings, parent conferences)"]'
  hobbies: '["Reading contemporary fiction", "Writing short stories", "Community theater acting", "Cooking Ethiopian and soul food cuisine", "Yoga and meditation", "Jogging in parks", "Birdwatching", "Volunteering
    as adult ESL tutor", "Attending cultural festivals", "Visiting art museums", "Photography (urban street scenes)"]'
  career_goals: Margherita aims to obtain National Board Certification in Elementary Education within the next two years and pursue a Master’s in Education focused on Curriculum and Instruction. She aspires
    to become a lead teacher or grade‑level coordinator, eventually transitioning to a curriculum specialist role where she can design district‑wide multicultural literacy programs. Long‑term, she envisions
    moving into school administration, such as Assistant Principal, to champion equity initiatives, expand after‑school STEM clubs for girls of color, and mentor a cohort of novice teachers. She also hopes
    to author a children’s book series that reflects the diverse narratives of her community.
