  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Reading Speculative Fiction'', ''Philosophy'', ''Yoga'', ''Mindfulness Meditation'', ''Hiking'', ''Puzzle Solving'', ''Gardening'', ''Small
    Book Club'']'
  career_goals: Jaime aims to obtain full licensure as a professional counselor and pursue a master's degree focused on trauma‑informed and art‑integrated therapy. Over the next decade she envisions leading
    a community mental‑health center in Providence County, creating interdisciplinary programs that blend evidence‑based counseling with visual arts workshops. She also aspires to mentor emerging counselors,
    publish research on the efficacy of art‑based interventions, and eventually establish a private practice that offers high‑standard, data‑informed care while maintaining a sustainable work‑life balance.
