personas:
  professional: Jaime Bump, a 37-year-old licensed professional counselor in Providence County, merges evidence‑based CBT and DBT with meticulously organized program evaluation, channeling their curiosity
    and disciplined nature into pioneering trauma‑informed, art‑integrated therapy models that they aim to expand as a future community mental‑health center director.
  sports: Jaime Bump, an enthusiastic hiker and regular yoga participant, proudly follows the New England Patriots and Boston Red Sox, and joins the Providence Hiking Club’s monthly trail outings, preferring
    low‑impact cardio and solitary nature walks over crowded team sports.
  arts: Jaime Bump, a dedicated watercolorist who paints New England’s misty shoreline, frequently visits the RISD Museum to study works by Edward Hopper and contemporary marine painter Winslow Homer, listens
    to Sufjan Stevens while sketching, and engages in a small book‑club that debates speculative fiction by Margaret Atwood and philosophical essays by Michel Foucault.
  travel: Jaime Bump plans trips with exhaustive itineraries that balance solo hikes along Acadia National Park’s rugged trails, a weekend art‑focused getaway to Reykjavik’s coastal galleries, and occasional
    family visits to historic Boston, always reserving a quiet Airbnb and budgeting for local museum tickets.
  culinary: Jaime Bump, an adept home cook, relishes preparing New England classics such as lobster roll with fresh butter, creamy clam chowder seasoned with thyme and dill, and butternut squash risotto
    with sage, often plating dishes with a watercolor‑inspired aesthetic and pairing them with a crisp local white wine.
  core: Jaime Bump is a meticulously organized therapist whose curiosity drives a blend of evidence‑based and art‑integrated practices, while chronic worry and a habit of over‑planning color their personal
    and professional life.
background:
  cultural: Jaime grew up in a middle‑class New England family with Anglo‑American roots, where education, self‑reliance, and community involvement were emphasized. Living in Coventry, RI, she is attuned
    to the region’s historic colonial heritage and its vibrant contemporary arts scene. Her cultural identity reflects a blend of traditional New England modesty and a progressive appreciation for local
    creativity, shaping her values of independence, civic responsibility, and lifelong learning.
