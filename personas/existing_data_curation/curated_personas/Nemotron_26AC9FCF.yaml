  hobbies: '[''Python coding'', ''Arduino electronics projects'', ''Model car and rocket building'', ''Chess'', ''Reading science‑fiction and engineering non‑fiction'', ''4‑H club volunteering (woodworking
    and gardening)'', ''Watching documentaries about industrial history'']'
  career_goals: Jeffrey aims to turn his blend of curiosity and practicality into a career that combines technical expertise with reliable, systematic work. He plans to graduate high school, attend a technical
    college or community college, and pursue an associate degree in mechanical engineering technology or automotive technology. His long‑term ambition is to become a certified automotive technician or a
    junior mechanical engineer specializing in sustainable manufacturing processes, allowing him to contribute to the revitalization of Youngstown’s industrial base. He hopes to secure an apprenticeship
    with a local automotive shop or a manufacturing firm where his organized approach and attention to detail will be valued. Over time he envisions taking on supervisory or project‑management roles that
    let him plan and oversee projects while maintaining a low‑stress, predictable work environment.
