  career_goals: At this stage in her career, Kailah aims to transition into a senior leadership role where she can shape the data strategy of an organization, such as becoming a Director of Analytics or
    a chief data officer for a mid‑size enterprise. She aspires to lead cross‑functional analytics teams, champion data‑driven decision‑making across business units, and build mentorship programs for emerging
    statisticians. Additionally, she hopes to contribute to the professional community by presenting at industry conferences, publishing case studies on applied statistics in business, and possibly co‑authoring
    a textbook that bridges statistical theory with real‑world business applications. A secondary ambition is to serve as a guest lecturer at a local university, sharing her practical expertise with students.
