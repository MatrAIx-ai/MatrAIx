  career_goals: She aims to transition into a senior operations or office manager position within the next five years, overseeing multiple departments and driving strategic efficiency initiatives. Gloria
    plans to earn a Project Management Professional (PMP) certification and pursue advanced training in organizational psychology to better support employee mental health. She also hopes to develop a mentorship
    program for younger Dominican professionals in the Bronx, combining her leadership skills with community advocacy.
