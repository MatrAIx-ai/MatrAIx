  career_goals: Retha aims to transition from full‑time bedside nursing to a mentorship and community health education role, while pursuing a BSN to deepen her clinical knowledge. She hopes to obtain certification
    in geriatric nursing (RN‑GCR) and to develop a peer‑support program for nursing staff to address burnout and emotional distress. Additionally, she aspires to collaborate with local health departments
    on preventive health outreach for seniors, and to contribute to nursing policy through the state nursing association. In the long term, she envisions leading a multidisciplinary team focused on improving
    quality of life for older patients in hospice and home‑care settings.
