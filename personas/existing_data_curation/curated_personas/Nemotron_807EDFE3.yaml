personas:
  professional: Retha Bateman, a seasoned registered nurse with over three decades of acute and chronic care experience, leverages her methodical clinical assessment, wound-care expertise, and passion for
    mentorship to lead quality-improvement projects while transitioning toward community health education and geriatric certification.
  sports: Retha Bateman enjoys low-impact fitness, walking the Missouri River trail three times a week, cheering on the Kansas City Chiefs on Sundays, attending occasional Royals spring-training games,
    and joining a community senior cycling club that meets on warm summer evenings.
  arts: Retha Bateman finds solace in quilting with patterns inspired by the Missouri River, reads historical fiction by Philippa Gregory and biographies by Doris Kearns Goodwin, and relaxes to the folk
    songs of Johnny Cash and classic films of Frank Capra, weaving creativity into her daily routine.
  travel: Retha Bateman prefers carefully planned road trips that blend gentle sightseeing with garden stops, such as a weekend in the Ozarks, a fall foliage tour of the Great Smoky Mountains, a spring
    visit to the horticultural gardens of Asheville, and a nostalgic pilgrimage to the historic St. Louis Gateway Arch, while dreaming of a leisurely culinary tour of Tuscany’s farmer-market towns.
  culinary: Retha Bateman is a confident home cook who rewrites classic Midwestern fare—transforming a traditional chicken and dumplings potluck into a low-sodium, quinoa-enriched version, grilling Kansas
    City-style ribs seasoned with rosemary and garlic, and crafting a tangy beet-and-goat-cheese salad with locally sourced heirloom tomatoes and fresh basil.
  core: Retha Bateman, a diligent nurse-mentor with a green thumb and a habit of checking her blood pressure before every coffee, balances meticulous planning with occasional anxiety-driven late-night scrolling
    through health forums.
background:
  cultural: Retha grew up in a mid‑western, white, working‑class family in the Kansas City metropolitan area. Her upbringing emphasized modesty, community service, and the value of hard work—traits common
    in the heartland culture. Though raised in a Protestant (Methodist) tradition, she now identifies as spiritual rather than strictly religious, attending church services occasionally for social connection.
    The regional culture of Kansas City, with its blend of urban and suburban influences, has shaped her pragmatic outlook and her appreciation for modest, home‑cooked meals, local festivals, and neighborly
    support. Throughout her nursing career, she has been immersed in a professional culture that values teamwork, patient advocacy, and continuous learning, which reinforces her personal values of cooperation
    and harmony.
