  career_goals: She dreams of one day becoming an architect who designs inspiring spaces, a museum curator who highlights diverse art, or an astronaut who explores the unknown. Tanesha also imagines writing
    children’s books that celebrate different cultures, aiming to blend her love of art, organization, and scientific curiosity into a career that creates and discovers.
