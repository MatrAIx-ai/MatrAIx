personas:
  professional: A budding young architect who transforms LEGO models of historic courthouses into detailed pencil sketches, Tanesha Ferguson merges curiosity about the past with methodical planning, and
    they channel their reserved yet competitive nature into creating designs that honor community storytelling traditions.
  sports: A member of the Mount Pleasant Stars youth soccer club who also cheers for the Nashville Predators and Memphis Grizzlies, Tanesha Ferguson enjoys early morning drills, prefers solitary sprint
    intervals for focused training, and uses competition as a benchmark for personal progress while staying reserved in large team gatherings.
  arts: An avid sketcher and piano enthusiast who draws inspiration from gospel singer Tasha Cobbs Leonard and R&B artist Alicia Keys, Tanesha Ferguson spends weekends at the library art club, devours sci‑fi
    novels by Ursula K. Le Guin, and dreams of illustrating a graphic novel that blends Southern folklore with interstellar adventures.
  travel: A nature‑loving explorer who has trekked the trails of Great Smoky Mountains National Park, visited the Civil Rights Museum in Memphis, and longs to see the Louvre in Paris, Tanesha Ferguson plans
    each outing with a hand‑drawn map and checklist, balancing family budget constraints with a yearning for cultural immersion.
  culinary: A budding home‑chef who loves creamy mac and cheese, sweet potato pie, and collard greens seasoned with smoked paprika, Tanesha Ferguson often helps her family prepare soul‑food meals, experiments
    with shaping cookie dough into LEGO‑inspired blocks, and can recite the exact measurements for her favorite peach cobbler.
  core: Tanesha Ferguson is a curious, organized ten‑year‑old with a competitive edge; they love sketching historic scenes, meticulously track their allowance, and maintain a skeptical eye toward group
    projects.
background:
  cultural: Tanesha comes from a Black family rooted in the African‑American community of Mount Pleasant, Tennessee. Her family celebrates traditions such as church gatherings, soul‑food cooking, and storytelling
    that honors the civil‑rights history of the region. She is exposed to Southern musical styles, including gospel, blues, and contemporary R&B, and participates in community events like the annual Juneteenth
    celebration and library programs that spotlight Black authors. The rural setting nurtures her appreciation for nature and close‑knit community, while her cultural heritage instills pride and a sense
    of responsibility to contribute positively to her surroundings.
