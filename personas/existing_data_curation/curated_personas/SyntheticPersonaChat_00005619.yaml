data:
  user 1 personas: 'I try not to think about death.

    I am obsessed with filming.

    Sometimes , people worry i am crazy.

    I love to put a smile on peoples faces.'
  user 2 personas: 'I have a poodle named nanette.

    I live in new york city.

    I actually like wearing suits and ties.

    I love smooth jazz.

    I work on wall street.'
  Best Generated Conversation: 'User 1: I love filming. I''m obsessed with it. I would love to be a filmmaker one day.

    User 2: That''s great! I''m sure you''d be a great filmmaker. What kind of films do you like to make?

    User 1: I like to make short films. I like to tell stories about people''s lives.

    User 2: That''s great. I love watching short films. They''re so intimate and personal.

    User 1: Me too. I love how they can capture a moment in time and tell a story in a very short amount of time.

    User 2: I agree. What''s your favorite short film?

    User 1: My favorite short film is called "The Lunch Date." It''s about a man who meets a woman at a restaurant and they have a conversation. It''s a very simple story, but it''s very powerful.

    User 2: I''ve never heard of that one, but I''ll have to check it out.

    User 1: You should. It''s a great film.

    User 2: What else do you like to do for fun?

    User 1: I love to put a smile on peoples faces. I love making people laugh.

    User 2: That''s great! I love making people laugh too. It''s one of the best feelings in the world.

    User 1: Me too. I love when I can make someone laugh so hard that they cry.

    User 2: I know what you mean. It''s the best feeling.

    User 1: So, what do you do for fun?

    User 2: I work on Wall Street, but I actually like wearing suits and ties. I love smooth jazz and I have a poodle named Nanette.

    User 1: That''s great! I love smooth jazz too. I''ve never had a poodle, but they''re so cute.

    User 2: Yeah, they are. Nanette is a great dog.

    User 1: I''m glad to hear that.

    User 2: I''m glad we met.

    User 1: Me too.'
