personas:
  professional: Rachel Gardea is a 37‑year‑old salon visionary who melds a scientific background with artistic flair to deliver advanced hair coloring, chemical treatments, and personalized hair health
    analyses, using bilingual consultations, meticulous inventory control, and dynamic digital marketing to grow a boutique that doubles as an art gallery, while her talkative, center‑stage energy fuels
    community workshops and mentorship for aspiring stylists within the local diaspora.
  sports: Rachel Gardea stays active by dancing salsa and bachata three times a week, playing pick‑up basketball at local courts while cheering for the Miami Heat, following the Miami Marlins during baseball
    season, joining the Coconut Grove Running Club for weekend 5K runs, and occasionally attending Inter Miami CF matches, all while balancing a busy salon schedule with a love for low‑impact yoga in the
    evenings.
  arts: Rachel Gardea is a passionate visual creator who spends weekends painting vivid abstracts inspired by neon streetlights, snapping candid street photography of colorful neighborhoods, curating an
    Instagram feed featuring works by Frida Kahlo, Yayoi Kusama, and local muralist Carlos González, and regularly visiting the Pérez Art Museum to soak in contemporary installations, allowing these influences
    to inform her salon’s bold color palette.
  travel: Rachel Gardea prefers spontaneous weekend escapes to Caribbean islands such as Puerto Rico and Jamaica, where she explores tropical markets for botanical ingredients, while also budgeting for
    annual trips to Barcelona to study avant‑garde design, balancing these adventures with the financial and time constraints of expanding a flagship boutique in Miami.
  culinary: Rachel Gardea is an enthusiastic home chef who masterfully prepares dishes like ropa vieja with citrus‑marinated mojo, crispy plantain tostones, and lechón asado seasoned with garlic, oregano,
    and orange zest, often pairing meals with a classic mojito made from fresh mint, lime, and a splash of rum, while experimenting with tropical ingredients such as coconut milk and guava in inventive
    desserts.
  core: Rachel Gardea is a charismatic salon visionary who fuses scientific precision with bold artistic flair, thrives on community mentorship, yet wrestles with chronic worry and the habit of late‑night
    espresso binges.
background:
  cultural: Rachel is a first‑generation Cuban‑American whose family originates from Havana. Raised in Miami’s Little Havana, she grew up bilingual, steeped in the rhythms of Cuban music, the flavors of
    its cuisine, and the communal spirit of festivals like Carnaval and the Calle Ocho Parade. This heritage fuels her vibrant aesthetic sensibility, influences the bold colors and artistic décor of her
    salon, and underpins her commitment to community service and mentorship within the Cuban diaspora.
