  career_goals: She aims to open a flagship boutique salon in Miami that integrates art and science, launch an eco‑friendly hair‑care line infused with Caribbean botanicals, become a certified master colorist,
    build a popular YouTube channel teaching creative hair techniques, establish a mentorship program for aspiring stylists from the Cuban community, and be recognized as a thought leader at the intersection
    of beauty and technology.
