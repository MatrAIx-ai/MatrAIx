  career_goals: Although officially retired, Julian aims to channel his lifelong curiosity into mentoring younger engineers and students through local STEM programs and community workshops. He plans to
    document his professional experiences in a memoir that blends technical lessons with reflections on cultural heritage, hoping to inspire future generations of Mexican‑American scientists. Julian also
    wants to deepen his understanding of emerging fields like renewable energy and artificial intelligence through online courses, applying this knowledge to improve the sustainability of the community
    garden he co‑manages. Supporting his grandchildren's education and establishing a scholarship for underrepresented STEM students in Santa Barbara are also central to his long‑term ambitions.
