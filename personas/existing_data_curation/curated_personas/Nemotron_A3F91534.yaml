personas:
  professional: A seasoned family physician, Jose Cedeno, they blend six decades of clinical experience with a curiosity for new treatments, merging evidence‑based protocols with culturally resonant folk
    remedies, they lead multidisciplinary teams with calm authority, they mentor younger clinicians through bedside teaching, and they champion telehealth expansion to reach remote farm families, all while
    navigating a relaxed, flexible schedule.
  sports: An energetic community athlete, Jose Cedeno, they participate in weekly bocce matches with the Los Banos Bocce Club, they enjoy salsa and regional folk dancing as cardio workouts, they hike the
    rolling hills near their hometown on weekends, they cheer for the local high‑school football team and follow the Oakland Athletics, and they occasionally indulge in casual pickleball sessions despite
    their occasional disorganized scheduling of practice times.
  arts: A culturally engaged aficionado, Jose Cedeno, they spend evenings listening to mariachi bands and corridos on their porch, they photograph golden sunsets across the valley, they read historical
    novels by authors like Carlos Fuentes and Laura Esquivel, they attend local theater productions featuring folk storytelling and help set up community Día de los Muertos altars, and they keep a small
    collection of vintage vinyl records from legendary ranchera singers.
  travel: A curious explorer, Jose Cedeno, they favor road trips along the Pacific Coast Highway to visit historic missions, they have journeyed to a famed highland region celebrated for rich culinary traditions,
    they plan future pilgrimages to the Basilica of Our Lady of Guadalupe in Los Angeles, they enjoy weekend getaways to Napa Valley vineyards, and they balance travel with family responsibilities, often
    opting for short, manageable trips due to their flexible schedule and modest budget.
  culinary: A devoted home chef, Jose Cedeno, they master the art of tamales, pozole, and mole, they cultivate fresh chilies, corn, and tomatoes in a modest garden for daily cooking, they relish the ritual
    of hand‑rolling masa, they incorporate epazote and cilantro into sauces, they occasionally over‑cook mole until it thickens into a dark paste, and they host communal meals where friends share stories
    over steaming plates.
  core: Jose Cedeno, a 64‑year‑old bilingual physician, they blend modern medicine with folk wisdom, thrive on community celebrations and salsa rhythms, nurture a garden that feeds neighbors, and maintain
    a relaxed schedule that sometimes leads to misplacing their keys.
background:
  cultural: 'Jose was raised in a Mexican‑American household where Spanish was spoken at home and Catholic traditions guided family life. Growing up in the agricultural heart of California''s Central Valley,
    he witnessed firsthand the health challenges faced by migrant workers, which shaped his commitment to culturally competent care. He celebrates Día de los Muertos, Cinco de Mayo, and other Mexican holidays
    with vibrant gatherings that feature food, music, and storytelling, reinforcing a strong sense of community. His bicultural identity informs his medical practice: he seamlessly blends American clinical
    standards with an appreciation for traditional remedies valued by his patients. This cultural fluency, combined with his deep ties to the Los Banos community, makes him a trusted bridge between the
    healthcare system and the local Latino population.'
attributes:
  skills: '["clinical diagnosis and management", "geriatric care", "bilingual Spanish-English communication", "community health outreach", "patient education", "telemedicine integration", "team leadership
