  hobbies: '["salsa and folk dancing", "cooking traditional Mexican cuisine", "vegetable gardening", "hiking local trails", "playing bocce with friends", "volunteering at community health fairs", "reading
    historical fiction", "listening to mariachi and corridos", "attending cultural festivals", "photography of local landscapes"]'
  career_goals: In the coming years Jose hopes to transition to a mentorship‑focused role, formally guiding younger physicians and physician assistants through case discussions and bedside teaching. He
    aims to launch a community health program that provides free preventive screenings and culturally tailored education for farm‑worker families in Merced County. Leveraging his curiosity for new technologies,
    he plans to expand telehealth services to reach patients in remote agricultural areas while keeping the platform easy to use and adaptable to his flexible scheduling style. He also intends to earn a
    geriatric certification to better serve the aging population in his hometown and to author a practical guide on delivering compassionate, resilient care in bilingual settings.
