personas:
  professional: Lea Welch, a dedicated community‑center volunteer who transforms her lifelong passion for painting, quilting, and event coordination into a weekly art‑and‑craft workshop at the town library,
    where their imaginative flair and relaxed, flexible planning keep participants inspired despite occasional last‑minute scramble for supplies.
  sports: Lea Welch, an enthusiastic walker who starts each morning with a gentle stroll along the nearby river, participates in a senior yoga class at the community center, and cheerfully supports the
    local minor‑league baseball team, the River City Runners, while occasionally joining line‑dancing gatherings that double as low‑impact cardio.
  arts: Lea Welch, a prolific creator of abstract landscapes inspired by the bold color fields of Mark Rothko and the fluid brushwork of Georgia O'Keeffe, spends afternoons experimenting with mixed‑media
    collages while listening to the jazz melodies of Nina Simone and the folk storytelling of Bob Dylan, and they regularly host quilting circles that echo the vibrant patterns of regional folk art.
  travel: Lea Welch, a curious traveler who favors relaxed, culturally immersive road trips, enjoys revisiting historic river towns like Natchez and Vicksburg, dreams of a pilgrimage to the National Archives
    in Washington, D.C. to trace family roots, and occasionally plans a leisurely overseas cruise to the Mediterranean to sketch seascapes.
  culinary: Lea Welch, an avid gardener and home‑cooked chef who delights in whipping up herb‑infused shrimp étouffée, buttery buttermilk biscuits, and fresh garden salads featuring local tomatoes and basil,
    showcases a modest culinary skill level that shines in weekly recipe blog posts, and they keep a secret stash of gourmet chocolate for late‑night creative bursts.
  core: Lea Welch, a 66‑year‑old community‑focused artist whose boundless imagination fuels vibrant workshops and memoir writing, yet whose disorganized schedule and intense anxiety sometimes lead to impulsive
    spending and missed appointments.
background:
  cultural: Lea grew up in a small, tight‑knit town in rural Mississippi, steeped in Southern hospitality and church‑centered community life. Her family’s Anglo‑American roots trace back several generations
    in the Deep South, and storytelling—whether through oral history, music, or crafts—has always been a cherished family tradition. She embraces the regional cuisine, gospel music, and seasonal festivals
    that characterize Lowndes County, while also valuing the inclusive, collaborative spirit of her local community.
attributes:
  skills: '[''Acrylic and watercolor painting'', ''Mixed‑media collage and scrapbooking'', ''Community event coordination'', ''Storytelling and oral history facilitation'', ''Basic horticulture and native‑plant
