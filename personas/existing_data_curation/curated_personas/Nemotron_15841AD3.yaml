  hobbies: '[''Abstract painting'', ''Quilting circles'', ''Book club (philosophical fiction)'', ''Gardening and native‑plant care'', ''Birdwatching'', ''River walks'', ''Church choir singing'', ''Line
    dancing at community socials'', ''Genealogy research'', ''Creative writing and memoir drafting'']'
  career_goals: Although she is not formally in the workforce, Lea aims to turn her artistic passions into a lasting community legacy. She hopes to launch a weekly art‑and‑craft workshop at the town library,
    mentor younger residents in painting and storytelling, and curate a traveling exhibition of local artists’ work. Lea also dreams of writing a memoir that weaves together her family’s genealogy with
    the cultural history of Lowndes County, and she aspires to become a volunteer advocate for mental‑health awareness, using her own experiences with anxiety to support others.
