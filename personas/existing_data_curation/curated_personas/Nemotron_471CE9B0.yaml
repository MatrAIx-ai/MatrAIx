personas:
  professional: Johnnie Howes, a 27‑year‑old carpenter in Amarillo, blends practical framing expertise, custom cabinetry skill, and blueprint fluency with a competitive, curiosity‑driven mindset that pushes
    them to experiment with reclaimed wood while reliably leading crews on renovation sites.
  sports: Johnnie Howes is a regular on the Amarillo community softball league, a weekend hunter with the Texas Parks & Wildlife Federation, a devoted fan of the Dallas Cowboys, and avidly follows the Houston
    Astros during baseball season, treating every game as a chance to unwind after a hard‑working week.
  arts: Johnnie Howes finds artistic inspiration in the twang of George Strait and Chris Stapleton, the rugged narratives of classic Westerns starring John Wayne, and the craft of woodworking, often listening
    to vintage rock bands like Led Zeppelin while shaping reclaimed timber into functional art that they proudly display.
  travel: Johnnie Howes prefers road‑trip adventures that blend hunting on the Texas plains with weekend escapes to Santa Fe’s art scene, dreams of a guided safari in Patagonia, and they enjoy meticulously
    planning each getaway around a modest budget, ensuring the family can join without compromising their renovation savings.
  culinary: Johnnie Howes, a competent home cook, regularly fires up a mesquite smoker for Texas‑style brisket, whips up a hearty black‑bean chili with jalapeños and cumin, and enjoys experimenting with
    smoked pecan wood for a distinct flavor on rib‑eye steaks, while modestly mastering barbecue rub recipes passed down from family gatherings.
  core: Johnnie Howes is a hands‑on carpenter who balances a relentless drive for high‑end, eco‑friendly remodels with a habit of overworking, a love for spontaneous karaoke after softball games, and an
    occasionally skeptical eye toward anyone questioning their workmanship.
background:
  cultural: Johnnie was raised in the Texas Panhandle, a region shaped by ranching, oil, and a strong sense of independence. Growing up in Amarillo, he absorbed the values of hard work, self‑reliance, and
    community solidarity that characterize much of white, working‑class Texan culture. His family’s traditions include celebrating regional holidays such as the Fourth of July parade, attending local church
    services (he was raised in a Baptist congregation), and participating in community events like the Amarillo Livestock Show. The mix of frontier pragmatism and modern suburban life has given him a practical
    outlook tempered by curiosity about new ideas, especially in trades and sustainable building. This cultural backdrop informs his love for country music, rodeos, and outdoor recreation, as well as his
    respect for craftsmanship and the importance of providing for his family.
attributes:
