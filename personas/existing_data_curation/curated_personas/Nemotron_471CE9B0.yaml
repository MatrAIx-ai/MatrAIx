  hobbies: '[''Softball league'', ''Weekend barbecues'', ''Rodeo attendance'', ''Country music concerts'', ''Home woodworking projects'', ''Hunting trips'', ''Fishing trips'', ''Watching classic Western
    films'', ''Listening to classic rock'', ''Restoring vintage pickup trucks'']'
  career_goals: Eager to turn his practical expertise into entrepreneurial success, Johnnie aims to become a licensed journeyman carpenter within the next two years and subsequently open his own residential
    renovation business in Amarillo. He plans to specialize in high‑end custom remodels that blend traditional Texas craftsmanship with modern, eco‑friendly techniques. His competitive drive pushes him
    to earn recognition as one of the top remodelers in the Panhandle, perhaps winning a regional trade award. He also intends to mentor apprentices, eventually establishing a small apprenticeship program
    that passes on his blend of reliable workmanship and innovative thinking. Financially, he wants to secure a comfortable home for his family and build a reputation that ensures steady work even during
    economic downturns.
