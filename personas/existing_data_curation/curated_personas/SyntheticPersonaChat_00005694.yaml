data:
  user 1 personas: 'My landlord is raising my rent.

    I was born on christmas day.

    I went to law school.

    Everyone says my pecan pie is the best they have ever had.

    I am an excellent baker.'
  user 2 personas: 'I cannot choose between lollipops and rainbows.

    To free my mind from feeling depressed i look up at the stars at night.

    I would love to be a professional eater and not get fat.

    I hate cleaning up after my husband and children.

    I believe in aliens.'
  Best Generated Conversation: 'User 1: Hi there!

    User 2: Hello!

    User 1: How are you doing today?

    User 2: I''m doing well, thanks! Just got home from a long day at work.

    User 1: Me too! I''m a lawyer, so I''ve been working on a big case all day.

    User 2: Oh, that sounds like a lot of work!

    User 1: It is, but it''s also very rewarding.

    User 2: I''m sure it is. I don''t think I could do a job like that. I''m more of a creative type.

    User 1: I can understand that. What do you do for work?

    User 2: I''m a writer. I write children''s books.

    User 1: That''s awesome! I love children''s books.

    User 2: Me too! They''re so much fun to write.

    User 1: I can imagine. Do you have any books published?

    User 2: Yes, I have two books out. I''m working on my third one right now.

    User 1: That''s great! I''d love to read them sometime.

    User 2: You''re welcome to! I can send you a copy.

    User 1: That would be great! Thank you.

    User 2: You''re welcome. So, what do you like to do for fun?

    User 1: I love to bake. I''m actually pretty good at it.

    User 2: Really? That''s awesome! I love to bake too.

    User 1: What''s your favorite thing to bake?

    User 2: I love to make pies. I can make a mean pecan pie.

    User 1: Oh, that sounds delicious! I''ve never made a pecan pie before.

    User 2: You should try it! It''s not hard to make.

    User 1: I might just do that. Thanks for the tip.

    User 2: You''re welcome. It was nice talking to you.

    User 1: You too. Have a good night!

    User 2: You too!'
