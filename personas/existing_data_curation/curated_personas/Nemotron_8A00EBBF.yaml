personas:
  professional: Mabel Barcena is a veteran acute‑care and geriatric nurse with three decades of hands‑on experience, now completing an RN‑BSN while spearheading quality‑improvement projects and mentoring
    students, balancing her practical expertise with a curiosity for evidence‑based innovations as she prepares for a charge‑nurse or unit‑manager role.
  sports: Mabel Barcena enjoys low‑impact cardio by walking the historic shoreline of Plymouth and participates in a community senior rowing club while cheering for the Boston Celtics and New England Patriots,
    reflecting a balanced, socially engaged approach to fitness.
  arts: Mabel Barcena nurtures a love for New England heritage by attending reenactments at Plimoth Patuxet, listening to folk singer Joan Baez, reading works by Sarah Orne Jewett, and volunteering at the
    local historical society, integrating artistic appreciation into her weekly routine.
  travel: Mabel Barcena favors thoughtful, historically themed trips, having explored the Freedom Trail in Boston, spent summer weekends on Nantucket, and planning a future pilgrimage to County Kerry, Ireland
    to trace family roots, all while balancing travel costs with a modest retirement savings plan.
  culinary: Mabel Barcena delights in cooking fresh New England seafood, regularly preparing lobster rolls, clam chowder with locally sourced clams, and herb‑crusted baked cod seasoned with thyme and rosemary
    from her garden, while occasionally experimenting with homemade pickled cucumbers for potluck gatherings.
  core: Mabel Barcena blends seasoned geriatric nursing expertise, historic curiosity, and garden‑to‑table cooking into a community‑centered life, occasionally over‑committing to knitting projects at the
    expense of rest.
background:
  cultural: Mabel was raised in a working‑class New England family with deep roots in Massachusetts. Her heritage blends Irish and English ancestry, typical of many white families in the region. She grew
    up in a tight‑knit community that values self‑reliance, modesty, and a strong sense of civic duty. Regular participation in her local Congregational church and annual celebrations of Thanksgiving, Fourth
    of July parades, and Cape Cod summer festivals shaped her appreciation for community traditions. Living in Plymouth, she is acutely aware of the town’s colonial history and maritime culture, which inform
    her respect for heritage and her interest in local history. This background underpins her cooperative nature and commitment to serving her neighbors through nursing and volunteerism.
