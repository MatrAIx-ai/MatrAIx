  career_goals: Mabel aims to transition into a senior nursing leadership role, such as charge nurse or unit manager, while completing her RN‑BSN to broaden her qualifications. She wishes to develop a community
    health outreach program focusing on senior wellness and fall prevention in Barnstable County. Mentoring new nurses and leading evidence‑based practice initiatives are also key ambitions. Over the next
    five years she envisions taking on a nurse educator role at a local community college or hospital, sharing her practical expertise and nurturing the next generation of compassionate caregivers. She
    is also interested in earning a geriatric nursing certification to deepen her impact on older adults.
