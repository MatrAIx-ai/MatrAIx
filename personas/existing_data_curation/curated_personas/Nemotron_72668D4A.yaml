personas:
  professional: Takiyah Burns, a preschool classroom helper, uses their love for routine to meticulously line up toys each morning, displaying natural organizational talent and a competitive edge that often
    leads them to enforce the day's schedule, though they sometimes scowl when a peer suggests a new activity.
  sports: Takiyah Burns loves the Tiny Tots Soccer Club at the community center, where they energetically dribble a small orange ball and proudly wear a miniature jersey of the Chicago Cubs, and also enjoys
    swinging on the playground slide and building sandcastles at the local beach, balancing competitive play with a need for familiar, structured activities.
  arts: Takiyah Burns adores the melodic tunes of children's performer Raffi, sings along to the Lion King soundtrack, and spends hours drawing Peppa Pig characters on construction paper, often inviting
    friends to join a make-believe performance during family movie-night tradition.
  travel: Takiyah Burns prefers familiar getaways like Grandma's countryside cottage and the nearby Myrtle Beach resort, where the itinerary includes sandcastle building, a scheduled nap, and a bedtime
    story, yet they dream of a future Disney World adventure as long as the plan stays predictable and includes regular snack breaks.
  culinary: Takiyah Burns delights in buttery macaroni and cheese, crispy chicken nuggets, and fresh apple slices, but adamantly refuses broccoli and any new vegetable, often staging a brief protest at
    the dinner table when a parent attempts to introduce unfamiliar foods.
  core: Takiyah Burns is a routine-loving, competitively spirited four-year-old who thrives on organization, reacts intensely to emotional triggers, and navigates daily life with meticulous planning punctuated
    by occasional anxiety-driven tantrums.
background:
  cultural: Takiyah comes from a Black Southern family in Southaven, Mississippi, where African‑American traditions are woven into daily life. Her household celebrates church gatherings with gospel singing,
    family barbecues with soul food, and holiday celebrations that blend church traditions with community festivals. Her grandparents often share stories of the civil‑rights era and family heritage, instilling
    pride in her cultural roots. The neighborhood’s close‑knit community, church choir rehearsals, and local school events shape her sense of identity, while the rhythms of Southern Black music and the
    emphasis on family support provide a familiar and comforting backdrop to her upbringing.
attributes:
