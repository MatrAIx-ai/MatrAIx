  hobbies: '[''Block‑tower building'',''Sorting crayons by color'',''Listening to gospel music with family'',''Dancing to children’s songs'',''Organized playdates with clear rules'',''Library story time
    with repetitive books'',''Drawing with crayons'',''Backyard hopscotch'',''Creating rhyming songs'',''Watching predictable cartoons'']'
  career_goals: Even at four, Takiyah talks about wanting to become a teacher who helps children learn to read, a doctor who makes people feel better, and a dancer who performs on stage. She imagines opening
    a “learning corner” in her neighborhood where kids can play with blocks and read picture books together. Her competitive nature fuels a desire to be the best in her class and to earn praise from her
    family and teachers, while her love of routine drives her to picture a future where each day follows a helpful, predictable schedule.
