personas:
  professional: Francky Alston is a seasoned handyman‑turned‑volunteer coordinator who leverages decades of carpentry, automotive maintenance, and budgeting expertise to organize senior‑center events and
    lead a gardening club, applying a structured yet flexible approach that blends practical problem‑solving with warm interpersonal mentorship, and they thrive on the balance between order and community
    connection.
  sports: Francky Alston enjoys early‑morning fishing trips to local ponds, follows the Nebraska Cornhuskers football team and the Omaha Storm Chasers baseball club, and they regularly play bridge at the
    senior center as a low‑impact way to stay socially active.
  arts: Francky Alston sings in a gospel choir that honors the timeless sounds of Mahalia Jackson and Kirk Franklin, immerses themselves in civil‑rights documentaries narrated by Henry Louis Gates Jr.,
    and they frequently revisit classic performances by Denzel Washington and Aretha Franklin for inspiration.
  travel: Francky Alston prefers organized group tours that blend cultural heritage with gentle sightseeing, having visited the National Museum of American History, the jazz‑rich streets of New Orleans,
    and the historic homes of Savannah, while they dream of a leisurely road trip along the Great Smoky Mountains to capture fall colors.
  culinary: Francky Alston delights in preparing soul‑food classics such as fried catfish, collard greens simmered with smoked turkey, buttery cornbread, and sweet‑potato pie, often seasoning with fresh
    garden‑grown okra, tomatoes, and hot peppers, and they take pride in sharing these hearty meals at family gatherings.
  core: Francky Alston is a socially vibrant, garden‑toting gospel enthusiast who balances meticulous budgeting with a love for soul‑food cooking, community mentorship, and the occasional indulgent splurge
    on festival feasts, and they never miss a Sunday choir rehearsal.
background:
  cultural: Francky grew up as a Black American in the Midwest during the 1950s and 60s, a time of social change and civil‑rights activism. His family roots trace back to the Southern migration, bringing
    traditions of gospel music, storytelling, and home‑cooked Southern cuisine to Omaha. The local African-American church has been a cornerstone of his social life, providing a sense of belonging, mutual
    aid, and cultural continuity. Over the decades he has witnessed and contributed to the growth of Omaha’s Black community, shaping his values of resilience, communal responsibility, and pride in his
    heritage.
attributes:
