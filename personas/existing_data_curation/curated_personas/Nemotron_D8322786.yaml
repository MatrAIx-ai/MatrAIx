  career_goals: Although retired, Francky aims to stay engaged in his community. He aspires to become a volunteer coordinator at the Omaha senior center, lead a weekly gardening club for seniors, and organize
    intergenerational mentorship programs that connect youths with elder members of the African-American community. He also hopes to document his life story and family history for future generations, preserving
    the cultural heritage of Omaha’s black community.
