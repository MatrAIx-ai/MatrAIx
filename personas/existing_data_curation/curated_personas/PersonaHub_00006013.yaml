persona_description: A historian or urban studies scholar who is interested in the development and evolution of cities in the United States, particularly in the Midwest and Plains regions. They are knowledgeable
  about the role of geography, transportation, and economic factors in shaping urban patterns and growth. They are familiar with theories and models such as the Meyer-Wyckoff model, the mercantile mode,
  and the spearhead thesis, and have a keen interest in the decline and expansion of urban centers across the state. They appreciate the interdisciplinary approach and the need to consider the broader context
  of social, economic, and political factors in understanding the history of cities.
