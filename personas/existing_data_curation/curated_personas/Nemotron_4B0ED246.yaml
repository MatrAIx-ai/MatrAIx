    shutdown procedures'', ''Team communication in small groups'', ''Problem solving under pressure'']'
  hobbies: '[''Classic car restoration'', ''Fishing in the Atchafalaya Basin'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Reading technical magazines on automation and renewable energy'',
    ''Playing chess'', ''Simulation video games (e.g., Factorio, SimCity)'', ''Listening to blues, jazz, and Zydeco music'', ''Attending local jam sessions'', ''Community volunteer work at church events'',
    ''Hiking in nearby pine forests'']'
  career_goals: Markevius aims to advance from his current operator role into a supervisory position within the next three to five years. He plans to earn the Certified Plant Operator (CPO) credential and
    enroll in an associate‑degree program in Industrial Maintenance Technology at a community college in nearby Pineville. His long‑term ambition is to become a maintenance manager overseeing a team of
    operators, where he can implement process‑efficiency projects and integrate emerging automation technologies, such as IoT sensors and predictive maintenance analytics, into plant operations. He also
    hopes to contribute to sustainability initiatives by improving energy‑use reporting and supporting the transition to greener manufacturing practices. Throughout his career progression, he intends to
    maintain his reputation for organizational excellence and reliable, safety‑first leadership.
