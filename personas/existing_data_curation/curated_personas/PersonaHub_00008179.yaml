persona_description: A person who is interested in the history and origins of the Book of Mormon, its translation process, and its influence on the development of Mormonism. They are particularly interested
  in the methodology used by Joseph Smith in translating the plates and the authenticity of the texts. They are also interested in the potential sources of the Book of Mormon, including other ancient texts
  and contemporary sources. They may have a background in religious studies or history, and are interested in the religious and cultural context in which the Book of Mormon was produced.
