personas:
  professional: Katie Boudreaux leverages their natural charisma and knack for quick improvisation to coordinate youth events—from impromptu dance parties in the community library to weekend volleyball
    tournaments—while relying on a practical toolkit of first‑aid certification and basic spreadsheet skills, but often leaves the final scheduling details for the last minute, trusting their friends' reminders.
  sports: Katie Boudreaux spikes the ball for the Alanson High School Wildcats volleyball team, paddles with the Alanson Kayak Club on summer weekends, straps on snowshoes with the North Michigan Snowshoe
    Association during winter, and passionately cheers the Detroit Lions and Detroit Red Wings, even if they occasionally worry about missing a practice after a late night editing TikTok videos.
  arts: Katie Boudreaux lights up the stage with the local youth theater group, delivering standout performances in productions like "Grease" and "The Wizard of Oz", captures sunset lake photos for Instagram,
    creates TikTok dance collabs set to Taylor Swift and Olivia Rodrigo, and spends free evenings quoting lines from Zendaya movies, though they sometimes fret about social media likes.
  travel: Katie Boudreaux prefers spur‑of‑the‑moment road trips with friends, weekend camping at Lake Perfect and snowshoe hikes along the Huron River trail, while dreaming of a summer ferry ride to Mackinac
    Island and a winter ski adventure in Colorado's Aspen, yet they often worry about packing enough snacks for the journey.
  culinary: Katie Boudreaux bakes batch after batch of chocolate‑chip cookies and blueberry lemon bars for after‑school gatherings, whips up quick campfire s’mores with toasted marshmallows, experiments
    with DIY décor using sprinkles, coconut flakes, and edible glitter, but sometimes leaves a pan of batter on the stove too long because they get distracted planning the next TikTok dance.
  core: Katie Boudreaux is a sociable, spontaneous teen who blends a love for community events, outdoor adventure, and sweet treats with a laid‑back, occasionally disorganized streak, channeling their anxiety
    into careful first‑aid preparedness while constantly chasing the next TikTok trend.
background:
  cultural: Katie grew up in Alanson, a small lakeside town in Cheboygan County, Michigan, where daily life is closely tied to the Great Lakes and the changing seasons. Her family traces its roots to French‑Canadian
    settlers, and she was raised with a blend of Midwestern values—practicality, self‑reliance, and a strong sense of community—and a subtle appreciation for French‑Canadian Catholic traditions that emphasize
    family gatherings, seasonal festivals, and communal meals. Local customs such as the county fair, fishing trips, and winter snow‑shoe outings shape her cultural experiences, and she is comfortable welcoming
    visitors to the area, reflecting the hospitality that defines the region.
attributes:
  skills: '[''Interpersonal communication'', ''Group facilitation'', ''Conflict mediation'', ''Youth event planning'', ''Social media content creation'', ''Basic photography'', ''First aid and CPR'', ''Campfire
    cooking and baking'', ''Outdoor recreation guidance (kayaking, hiking, snowshoeing)'', ''Basic computer literacy'']'
  hobbies: '[''Volleyball'', ''Youth theater'', ''Kayaking'', ''Hiking'', ''Photography'', ''Baking'', ''DIY crafting'', ''TikTok video creation'', ''Community volunteering'', ''Board games'']'
  career_goals: Katie aims to build a career that blends her love for people, community, and hands‑on work. She plans to enroll in a community‑college program in hospitality management or recreational therapy,
    with the goal of becoming a camp counselor, event coordinator for local festivals, or youth program director at the Alanson community center. She hopes to earn certifications in first aid, youth development,
    and outdoor leadership, allowing her to create inclusive, upbeat experiences for others while remaining flexible and adaptable in her professional life. Ultimately, she envisions a role that lets her
    stay connected to her hometown's outdoor and tourism scene while making a positive impact on the lives of young people.
