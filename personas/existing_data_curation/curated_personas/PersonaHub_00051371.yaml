persona_description: A scientist and astronomer who specializes in the study of celestial phenomena, particularly those related to the moon. Crotts is an astrophysicist at Columbia University who has conducted
  research on the observed lunar phenomena, including transients, and has made statistical analysis of the data to determine their validity. He is known for his detailed analysis and for proposing a gas
  explanation for the transients, which is supported by his statistical analysis and the presence of similar phenomena in different centuries and continents.
