personas:
  professional: Fidelina Montana runs a boutique photography studio in Saint Charles, blending technical mastery of modern DSLR and medium‑format gear with a keen artistic eye honed by a humanities background;
    their structured client workflow, dependable workshop schedules, and bilingual communication ensure steady revenue while their outgoing nature fuels community‑focused events and mentorship programs.
  sports: Fidelina Montana hikes the Ozark Trail each weekend with the Saint Charles Trail Club, participates in a spring “Summer Sprints” group walk, follows the St. Louis Cardinals and St. Louis Blues
    on game days, and balances cardio with a weekly beginner’s yoga class to counteract studio‑related stiffness.
  arts: Fidelina Montana attends the Benton County Art Fair, draws inspiration from muralists like Diego Rivera and portraitists such as Frida Kahlo, enjoys listening to mariachi groups like Mariachi Vargas
    while editing photos, and regularly visits the St. Louis Art Museum to study both classic European masters and contemporary folk art exhibitions.
  travel: Fidelina Montana prefers meticulously planned road trips that combine photography assignments with cultural immersion, having captured street scenes in Oaxaca, explored the desert hues of Sedona,
    and taken weekend snapshots of historic Galena, Illinois; they budget travel through a dedicated savings account and often use airline loyalty points for longer trips.
  culinary: Fidelina Montana loves preparing mole negro with dried chilies, cacao, and spices, steaming tamales stuffed with masa and fresh epazote from their herb garden, and whipping up salsa verde using
    tomatillos, cilantro, and lime; they possess solid cooking skills but occasionally forget to label leftovers, resulting in occasional pantry mix‑ups.
  core: Fidelina Montana blends meticulous business planning with vibrant community engagement, juggling a thriving photography studio, health routines that need tightening, and a lifelong passion for cooking,
    hiking, and cultural storytelling.
background:
  cultural: Fidelina was raised in a bilingual household where Mexican traditions intertwined with Midwestern American life. Celebrations such as Día de los Muertos, Las Posadas, and Mexican Independence
    Day remain central to her identity, and she incorporates the vibrant colors and symbolism of these customs into her photographic style. Her strong family ties, Catholic upbringing, and appreciation
    for Mexican folk art inform her subjects and aesthetic choices, while her years in Saint Charles have added a layer of Midwestern community values, emphasizing collaboration, reliability, and civic
    engagement.
attributes:
  skills: '[''Portrait photography'', ''Event photography'', ''Studio lighting design'', ''Photo editing (Adobe Lightroom, Photoshop)'', ''Visual storytelling'', ''Client relationship management'', ''Workshop
    facilitation'', ''Cultural heritage documentation'', ''Bilingual communication (Spanish/English)'', ''Business administration'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Hiking'', ''Attending art festivals'', ''Reading art history and multicultural literature'', ''Dancing to folk and mariachi music'', ''Participating
    in a book club'']'
  career_goals: She aims to expand her boutique studio in Saint Charles into a regional hub for community‑focused photography, offering regular workshops and mentorship programs for emerging photographers.
    Fidelina plans to publish a photo book that captures the lives of Mexican‑American families in the Midwest, secure exhibitions at local museums, and collaborate with cultural institutions on heritage
    projects. Long‑term, she envisions teaching part‑time at a community college and establishing a non‑profit that provides free photography services for under‑served communities.
