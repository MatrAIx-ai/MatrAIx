  hobbies: '[''abstract painting'', ''speculative fiction reading'', ''philosophy study'', ''chess'', ''vegetable gardening'', ''nature photography'', ''postcard collecting'', ''antique toy restoration'']'
  career_goals: Garrett's primary ambition is to leave a lasting artistic and historical legacy in his community. He aims to complete a memoir that intertwines his personal narrative with the cultural evolution
    of Wooster, and to self-publish a collection of his poetry and short stories. He hopes to curate a traveling exhibition of his abstract artworks in local libraries and senior centers. Additionally,
    he plans to expand the senior art workshop series he has been leading, seeking grant funding to provide materials and mentorship for younger artists. He also aspires to digitize and make publicly accessible
    the archives of the Wayne County Historical Society, ensuring preservation of regional heritage.
