  career_goals: Although retired, Joseph aims to channel his compassion into volunteer work, focusing on mentoring young artists and assisting a local community center with art‑based outreach programs.
    He hopes to organize small workshops that blend Caribbean folk art with his knowledge of Western painting techniques, and to document oral histories of senior residents in Caguas to preserve cultural
    memory.
