  career_goals: Gerardo aims to transition into senior leadership within the next five years, targeting roles such as Director of Operations or VP of Business Transformation. He plans to earn a PMP certification
    and a Six Sigma Black Belt to deepen his project and process expertise. A key ambition is to spearhead a company‑wide digital transformation that leverages AI and automation to reduce operational waste
    by at least 20%. Long‑term, Gerardo envisions launching a consultancy focused on helping small, family‑owned businesses—particularly those within the Latino community in Colorado—to modernize their
    operations while preserving cultural authenticity. He also aspires to mentor emerging professionals, sharing his balanced approach of curiosity and practicality.
