personas:
  professional: Renee Swink is a seasoned retail manager who leverages data‑driven inventory forecasting and hands‑on coaching to lead store teams, balancing a pragmatic love of proven floor operations
    with a competitive curiosity for emerging AI tools, and they are known for turning complex data into clear action plans.
  sports: Renee Swink follows the Houston Texans with Sunday fervor, supports the Astros during baseball season, plays recreational tennis at the Magnolia Country Club, and they hike the Sam Houston National
    Forest trails each weekend for fitness.
  arts: Renee Swink enjoys listening to George Strait and Carrie Underwood on the family porch, attends occasional community theater productions starring local actors, and they discuss historical fiction
    novels by Ken Follett and business books like 'The Hard Thing About Hard Things' in a lively book club.
  travel: Renee Swink prefers well‑planned road trips that combine scenic hikes in the Texas Hill Country with culinary stops for brisket in Austin, has explored New Orleans for its music and food, and
    they dream of visiting Kyoto’s gardens to inspire their own backyard planting.
  culinary: Renee Swink excels at cooking smoked brisket, jalapeño cornbread, and fresh garden salads featuring heirloom tomatoes and Texas bluebonnet honey, often experimenting with a pinch of smoked paprika
    to reinvent classic Tex‑Mex dishes, though they occasionally burn the garnish when juggling phone calls.
  core: Renee Swink blends Texas‑born hospitality with a data‑driven work ethic, competitive curiosity, and a garden‑fueled love of cooking, while they juggle mild knee pain, disciplined finances, and a
    penchant for weekend hikes.
background:
  cultural: Renee was raised in central Texas in a middle‑class, Protestant family that emphasized hard work, community, and Southern hospitality. Her parents owned a small hardware store, giving her early
    exposure to retail fundamentals and customer service. She earned a Bachelor of Business Administration from Texas State University, where she blended traditional business principles with emerging market
    trends. Residing in Magnolia, a growing suburb of Houston, she embodies the blend of small‑town values and the multicultural dynamism of the Greater Houston area. Her cultural identity is rooted in
    Texan customs—country music, barbecue gatherings, high school football Sundays—while her openness to new ideas is reflected in her enthusiasm for technology, community involvement, and continuous learning.
attributes:
  skills: '["Retail Operations Management", "Team Leadership & Coaching", "Customer Relationship Management", "Inventory Control & Optimization", "Sales Forecasting & Data Analysis", "Visual Merchandising",
