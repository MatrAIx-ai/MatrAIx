  hobbies: '["Gardening (vegetable & native flora)", "Cooking (Texan cuisine & new recipes)", "Reading (historical fiction & business books)", "Book club participation", "Volunteering (financial literacy
    workshops)", "Hiking and nature walks", "Yoga & mindfulness practice", "Home automation experimentation", "DIY home improvement"]'
  career_goals: Renee aims to advance to a district or regional management position within the next five years, overseeing multiple stores and championing performance through technology‑enabled initiatives.
    She seeks to lead a pilot program introducing AI‑driven inventory forecasting for her chain and to develop a mentorship framework that blends hands‑on coaching with data‑driven performance metrics.
    Looking ahead to retirement, she plans to launch a consultancy focused on helping independent retailers improve operational efficiency and community engagement, while also pursuing a leadership role
    in the Magnolia Chamber of Commerce to support local entrepreneurship.
