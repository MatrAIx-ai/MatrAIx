personas:
  professional: Kaci Gibson is a budding administrative professional whose adeptness with the Microsoft Office Suite, QuickBooks, and office equipment combines with a calm, collaborative nature to produce
    polished documents, streamline scheduling, and lead team‑building events, all while they balance curiosity for new technology with a practical focus on reliable workflow improvements.
  sports: Kaci Gibson energizes their week with Zumba classes at the community center, sunrise yoga sessions, and pick‑up volleyball games with the Swartz Creek Volleyball Club, while cheering on the Detroit
    Lions and Detroit Red Wings, and they treat fitness as a social ritual, often organizing group hikes along the Flint River trail to combine exercise with camaraderie.
  arts: Kaci Gibson embraces creativity through frequent volunteer roles in community‑theater productions such as the Genesee County Playhouse’s rendition of ‘Our Town’, a playlist dominated by the energetic
    beats of Dua Lipa and the lyrical storytelling of Lin‑Manuel Miranda, and a Netflix binge of classic films featuring Meryl Streep, all of which inspire their DIY home‑decor projects and lively conversations
    with friends.
  travel: Kaci Gibson prefers spontaneous, budget‑friendly road trips with friends, often packing a cooler for a weekend hike in the Upper Peninsula’s Pictured Rocks or a lively music‑filled stay in Nashville,
    while they dream of future group adventures to Costa Rica’s rainforests and the serene fjords of Norway, balancing careful budgeting on travel apps with a love for discovering new cultures.
  culinary: Kaci Gibson, a confident baker with a flair for seasonal flavors, often whips up almond‑flour lemon bars, blueberry crumb cakes, and savory spinach‑feta pastries for their Swartz Creek animal‑shelter
    fundraisers, while they also enjoy experimenting with homemade gnocchi using ricotta and fresh basil, and they relish dining out for brunches featuring avocado toast topped with poached eggs and sriracha.
  core: Kaci Gibson blends a calm, resilient optimism with a curiosity‑driven love for collaborative projects, balancing meticulous organization at work with spontaneous bursts of DIY creativity—though
    they occasionally over‑commit to social events, leaving their inbox queuing late into the night.
background:
  cultural: Kaci grew up in a middle‑class white family in Swartz Creek, a suburban community near Flint, Michigan. Her upbringing reflects classic Midwestern values—hard work, community involvement, friendliness,
    and a pragmatic outlook. Her grandparents emigrated from Germany and Ireland, so family traditions blend German and Irish heritage with typical American celebrations such as Thanksgiving and Christmas,
    often centered around church gatherings at a local Protestant congregation. The region’s automotive manufacturing legacy has instilled a respect for blue‑collar work ethic, while exposure to the diverse
    population of nearby Flint has fostered an openness to varied perspectives. Community events like the Genesee County Fair, volunteer drives, and local sports have shaped her sense of belonging and civic
    responsibility.
