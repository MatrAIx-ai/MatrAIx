  career_goals: In the short term, Kaci plans to earn the Certified Administrative Professional (CAP) credential and complete an associate’s degree in business administration at a local community college.
    She aims to become the lead administrative assistant in her current office, taking on supervisory duties for junior staff and spearheading workflow‑improvement projects such as inventory tracking and
    digital filing systems. Over the next five years, she envisions advancing to an office manager or operations coordinator role at a mid‑size company within Genesee County, where she can blend her practical
    problem‑solving with her curiosity about new technologies. Long‑term, Kaci hopes to launch a consulting service that helps small businesses streamline their administrative processes while fostering
    a supportive, community‑focused work environment.
