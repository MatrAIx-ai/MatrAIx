  career_goals: Amber loves story time at preschool and often pretends to be a teacher for her stuffed animals. She expresses a wish to help her mother in the kitchen and says she wants to be a teacher
    when she grows up. Her immediate goals include learning to write her name, counting to ten, riding a tricycle, and mastering the alphabet, all of which reflect her desire for structured learning and
    her confidence in achieving them.
