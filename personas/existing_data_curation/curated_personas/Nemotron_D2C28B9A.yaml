personas:
  professional: Amber Green, a budding toy organizer who loves arranging blocks by color and shape, demonstrates a practical and structured approach to play that mirrors an early engineer’s mindset while
    remaining flexible enough to abandon the plan for spontaneous creativity.
  sports: Amber Green, a junior soccer enthusiast who watches the local Riverside Rockets’ matches on Saturday mornings, delights in dribbling a small foam ball in the backyard, and prefers structured practice
    drills over free‑form games, yet occasionally bursts into spontaneous tag with friends.
  arts: Amber Green, a fan of children’s music—especially the lively tunes of Raffi and the playful rhythms of The Wiggles—enjoys dancing to “Baby Beluga” while drawing vivid pictures of dinosaurs in bright
    crayons, and attends a weekly storytime at the neighborhood library that fuels their imagination.
  travel: Amber Green, an avid explorer who delights in family trips to the local zoo in search of the giraffes, cherishes a recent vacation to Disney World where they rode the Dumbo ride twice, and dreams
    of visiting the beach in Florida for sandcastles, preferring short, well‑planned outings over long, unstructured journeys.
  culinary: Amber Green, a picky eater who prefers simple, familiar foods such as cheesy macaroni, apple slices, and crunchy carrots, can expertly spread peanut butter on toast with a tiny plastic knife,
    and loves the sweet tang of strawberry yogurt topped with tiny granola bits.
  core: Amber Green, a three‑year‑old who blends a love for orderly play with an easygoing spirit, balances routine with spontaneous fun, and navigates the world with a calm confidence that makes even a
    messy lunch time feel manageable.
background:
  cultural: Amber is raised in a white, New England family in the small rural town of Sangerville, Maine. Her upbringing reflects typical New England values of self-reliance, modesty, politeness, and a
    close connection to nature. Seasonal family traditions such as apple picking, leaf collecting in the fall, and fishing in the nearby rivers shape her experiences. She attends a local preschool that
    emphasizes play-based learning, community participation, and respect for the environment. The community’s emphasis on routine, safety, and mutual support aligns with Amber’s preference for structure
    and predictability.
