personas:
  professional: Lynnette is a research data analyst who turns clinical study results into vibrant, community‑focused visual narratives by blending Python‑based statistical modeling, GIS mapping, and Tableau
    dashboards, while leading bilingual workshops that showcase their curiosity, sociable energy, and knack for merging art with science.
  sports: Lynnette stays active through salsa dancing at the Queens Salsa Society, plays pickup basketball at a local gym during summer, and cheers for the New York Knicks and NYCFC, reflecting their love
    for rhythmic movement, team spirit, and community connection.
  arts: Lynnette immerses themselves in the arts by sketching the vibrant street murals of Bushwick, attending improv shows featuring performers like Phoebe Waller‑Bridge, listening to the eclectic sounds
    of Flying Lotus and Lila Downs, and drawing inspiration from the visual storytelling of Frida Kahlo and Banksy, which fuel their own mixed‑media projects.
  travel: Lynnette plans travel adventures that blend cultural immersion and creativity, having explored the historic neighborhoods of Oaxaca for its culinary heritage, the bustling markets of Tokyo for
    design inspiration, and frequently weekend‑hopping to upstate New York’s art colonies, all while using a flexible budgeting app that lets them snag last‑minute flight deals.
  culinary: Lynnette delights in cooking traditional tamales, pozole, and mole with a modern twist—adding quinoa or avocado oil—and they source fresh epazote, chipotle, and masa from local farmers’ markets,
    while also experimenting with fusion dishes like chorizo‑filled bao buns, documenting every recipe in a vibrant visual journal.
  core: Lynnette is a curiosity‑driven data storyteller who never sleeps without a notebook, friendships fuel their energy, and a habit of over‑booking social events often leaves their calendar in colorful
    chaos.
background:
  cultural: Lynnette is a first‑generation Mexican‑American raised in the multicultural neighborhood of Woodside, Queens. At home she grew up speaking Spanish and English, celebrating traditions such as
    Día de los Muertos, quinceañeras, and weekly family tamale nights. The close‑knit Latino community in Woodside, combined with the borough’s diverse Asian and Caribbean populations, has given her a rich
    tapestry of cultural influences. She participates actively in local Hispanic heritage festivals, volunteers at a community center offering bilingual tutoring, and often incorporates Mexican visual motifs
    and folklore into her artistic projects. Her bicultural identity informs her worldview, fostering a deep appreciation for intercultural dialogue and a commitment to bridging her heritage with the broader
    fabric of New York City.
attributes:
  skills: '[''Statistical analysis'', ''Python programming'', ''R programming'', ''SQL database querying'', ''Advanced Excel'', ''Data visualization (Tableau, Power BI, matplotlib)'', ''Laboratory techniques
    (PCR, spectrophotometry)'', ''GIS mapping'', ''Project coordination (Agile, Trello)'', ''Bilingual communication (English/Spanish)'', ''Public speaking and workshop facilitation'', ''Creative interdisciplinary
    problem solving'']'
  hobbies: '[''Street art tours and gallery visits'', ''Salsa dancing'', ''Cooking Mexican cuisine with creative twists'', ''Volunteering as a STEM mentor for youth'', ''Improv and live theater attendance'',
    ''Reading science-fiction and philosophy'', ''Urban street photography'', ''Podcasting about science, art, and community'']'
  career_goals: Lynnette aims to transition from her current role as a research data analyst to a senior data scientist or research project lead within the next five years. She plans to earn a bachelor’s
    degree in Applied Mathematics or Biostatistics through part‑time study, followed by a master’s in Data Science, to deepen her methodological expertise. Her long‑term ambition is to spearhead community‑focused
    research that blends health data with artistic storytelling, creating interactive visual narratives that resonate with diverse urban populations. She also aspires to mentor underrepresented youth in
    STEM, establishing after‑school programs that combine coding, data literacy, and cultural expression.
