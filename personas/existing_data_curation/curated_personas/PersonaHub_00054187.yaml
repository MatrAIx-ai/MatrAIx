persona_description: A Murrieta, CA dentist who is passionate about the discovery and potential applications of stem cells found in teeth. Dr. William Neff believes that the discovery of stem cells in baby
  teeth and wisdom teeth is a unique opportunity for dental professionals to save these cells for future use and potentially aid in one's healthcare. Dr. Neff is a leading figure in the dental community
  and has been a vocal advocate for the use of dental pulp stem cells in dental procedures. He is knowledgeable about the controversy surrounding stem cell research and has a unique perspective on the potential
  benefits and drawbacks of using stem cells from teeth. Dr. Neff is dedicated to improving the quality of life for his patients and believes that the use of dental pulp stem cells can help achieve this
  goal.
