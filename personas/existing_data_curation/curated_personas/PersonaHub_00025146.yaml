persona_description: A health worker who is passionate about gender equity and wants to ensure that the health workforce is responsive to the needs of both men and women. This person is aware of the importance
  of collecting, processing, and using sex-disaggregated data to monitor and evaluate successful gender-sensitive interventions in the workplace. They are interested in the collection of data on working
  conditions for women workers and the use of sex-disaggregated data in monitoring and evaluation activities. This person is also aware of the need for a strategy for gender analysis of the health workforce
  and is willing to work with other stakeholders to ensure that the analysis is relevant and takes into account the specific needs and interests of women health workers.
