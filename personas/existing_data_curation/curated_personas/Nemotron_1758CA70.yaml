personas:
  professional: Laurie Heath, a budding junior architect who loves assembling LEGO skyscrapers, blends curiosity with practicality by following building instructions while inventing new designs, and navigates
    playgroup projects with cooperative yet occasionally assertive teamwork.
  sports: Laurie Heath, a member of the Neighborhood Soccer Tots league's Oak Leaf Rangers, eagerly cheers for the Los Angeles Lakers and follows the Chicago Cubs' games on family TV, preferring open-air
    play and spontaneous tag games over structured drills, yet often forgets to bring their water bottle due to a relaxed approach to obligations.
  arts: Laurie Heath, who delights in drawing colorful scenes of Mickey Mouse and Elsa from Frozen, sings along to Taylor Swift's Shake It Off and enjoys watching the whimsical antics of Sesame Street's
    Elmo, often mimicking the characters in imaginative play while occasionally insisting on using only the biggest crayons, a quirky habit.
  travel: Laurie Heath, who loves weekend trips to the nearby interactive Children's Museum and an annual family vacation to Disney World in Orlando, dreams of exploring the Grand Canyon's vistas, prefers
    spontaneous packing over detailed itineraries, and balances excitement for adventure with a need for familiar bedtime routines.
  culinary: Laurie Heath, a fan of creamy mac & cheese, peanut butter and jelly sandwiches, and carrot sticks with hummus, enjoys helping stir batter for banana muffins despite a tendency to over-mix, proudly
    declares a love for bright red strawberries and crunchy toast, and savors occasional pizza slices topped with pepperoni.
  core: Laurie Heath is a curious, pragmatically playful five-year-old who balances imaginative LEGO construction with orderly step-by-step building, hoards stickers, forgets to tidy up, and breezes through
    challenges with steady calm.
background:
  cultural: Laurie comes from a white, Midwestern family in Mount Vernon, Illinois. Her upbringing includes participation in local community events, Sunday school at the neighborhood church, and family
    traditions that celebrate holidays like Thanksgiving and Fourth of July with potluck gatherings. The town's small‑town values of friendliness, cooperation, and appreciating nature are reflected in her
    daily life.
