  career_goals: Even at 86, Natalia aims to cement her legacy by publishing a memoir‑style cookbook that captures her family’s recipes and the stories behind them, and by mentoring a young apprentice to
    ensure the bakery continues after her retirement. She also hopes to win the “Best Pie” award at the Lancaster County Fair for the first time, and to experiment with modern sugar‑sculpture techniques
    that blend her love of art with baking.
