  hobbies: '[''Gallery and museum visits'', ''Street‑art photography'', ''Sketching'', ''Cooking Southern and Afro‑Caribbean cuisine'', ''Hip‑hop and salsa dancing'', ''Fitness classes (Zumba, yoga)'',
    ''Volunteering at community centers'', ''Mentoring youth in entrepreneurship'', ''Traveling to cultural festivals'', ''Reading contemporary fiction'', ''Listening to jazz and R&B'', ''Attending live
    music events'']'
  career_goals: Kimley aims to secure an entry‑level position in marketing or brand management where she can blend her business expertise with her passion for art and culture. She envisions advancing to
    a strategic role that oversees creative campaigns for organizations that champion diversity and community empowerment. In the long term, she aspires to earn an MBA and launch her own social‑enterprise
    that provides platforms and funding for emerging Black artists in Houston and beyond.
