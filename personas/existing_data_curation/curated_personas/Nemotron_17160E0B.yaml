  hobbies: '[''Reading graphic novels'', ''Building LEGO models'', ''Scratch programming'', ''Soccer (small‑group practice)'', ''Robotics club participation'', ''Drawing and sketching'', ''Exploring local
    nature trails'', ''Assisting in cooking traditional Mexican dishes'']'
  career_goals: Rafael dreams of pursuing a future career in technology, aiming to become a software engineer or robotics specialist. He hopes to create interactive games and apps that incorporate stories
    from his Mexican heritage, and eventually attend a university program in computer science. In the short term, he wants to lead his robotics club to win competitions and contribute to community projects
    that use technology to support learning.
