personas:
  professional: Rafael Vila, a budding technologist, channels his curiosity and practicality into building intricate LEGO structures, mastering Scratch programming, and leading small groups in the school
    robotics club, where his reliable yet flexible approach yields creative solutions.
  sports: Rafael Vila, a member of the Austin Soccer Academy’s under‑10 team, enthusiastically practices soccer with his close‑knit group of friends, follows the Austin FC and Dallas Cowboys for inspiration,
    and balances his athletic routine with weekend hikes on local nature trails, all while maintaining a calm, steady demeanor on the field.
  arts: Rafael Vila immerses himself in the visual storytelling of graphic novels like "Amulet" and "Bone," spends afternoons sketching neighborhood scenes inspired by the works of illustrators such as
    Chris Riddell, and enjoys listening to the melodic riffs of Imagine Dragons, which fuels his creative drive in both LEGO design and school art projects.
  travel: Rafael Vila, who loves thoughtfully planned weekend road trips, has explored the Grand Canyon and the Redwood forests with his family, dreams of visiting Tokyo’s Akihabara district to experience
    anime culture firsthand, and prefers itineraries that balance structured museum visits with spontaneous nature walks.
  culinary: Rafael Vila, an eager kitchen assistant on weekends, takes pride in preparing homemade salsa with fresh tomatoes, cilantro, and jalapeños for family tacos, savors the flavor of cheesy quesadillas,
    and often experiments with building LEGO‑inspired vegetable platters, reflecting his blend of creativity and practical taste.
  core: Rafael Vila is a quietly determined ten‑year‑old who blends a love for solitary invention with a cooperative spirit, habitually organizes LEGO bricks by color yet sometimes forgets to put away his
    comic books, and approaches challenges with calm confidence.
background:
  cultural: Rafael is raised in a Mexican‑American household where Spanish is spoken alongside English. His family celebrates cultural traditions such as Día de los Muertos, Mexican Independence Day, and
    holiday meals featuring tamales and pozole. He attends a nearby community cultural center for Spanish language classes and folk dance workshops, and his upbringing blends Mexican customs with the diverse,
    suburban environment of Rancho Cucamonga, California.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Basic coding (Scratch)'', ''Fundamental mathematics'', ''Reading comprehension'', ''LEGO building and design'', ''Simple robotics (e.g., LEGO
