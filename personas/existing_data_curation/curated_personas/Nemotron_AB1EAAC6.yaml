personas:
  professional: Junie Boler, a 13‑year‑old aspiring comic artist and budding web developer, fuses disciplined sketching, digital illustration on a tablet, and stage design experience into a cohesive creative
    workflow that thrives on collaboration, debate‑honed argumentation, and meticulous project planning, and they consistently meet every self‑set deadline.
  sports: Junie Boler, a member of the middle‑school track team, spends spring mornings training for 800‑meter races, and passionately roots for the local high‑school basketball squad, the Riverside Tigers,
    while they join friends for weekend pick‑up volleyball matches at the community park.
  arts: Junie Boler channels an eclectic artistic taste, drawing inspiration from manga creator Akira Toriyama, Marvel comic artist Fiona Staples, and filmmaker Hayao Miyazaki, while they also perform in
    school theater productions and curate a personal blog that showcases daily sketches, character designs, and reflective essays.
  travel: Junie Boler dreams of a cultural road‑trip that starts with a weekend visit to the local history museum, followed by a family vacation to New York City’s Broadway district, and a future solo‑travel
    journey to Tokyo to explore anime studios and manga cafés, and they meticulously map each stop using a custom spreadsheet.
  culinary: Junie Boler loves whipping up quick ramen bowls with boiled eggs and sriracha, mastering the perfect grilled cheese flip, and indulging in pineapple‑topped pizza, though they often skip breakfast
    in favor of late‑night gaming snacks like nachos and soda.
  core: Junie Boler is a hyper‑organized teen who merges a boundless imagination with a love for the spotlight, juggling comic‑creation, debate victories, and meticulous budgeting while they occasionally
    forget to eat on time.
background:
  cultural: Junie is a Black teenager raised in Ashburn, Virginia, within a close-knit family that values education, cultural pride, and community service. Her parents, originally from the Southeast, instilled
    an appreciation for African-American history and traditions, celebrating Juneteenth, Kwanzaa, and family gatherings that feature soul food and storytelling. She attends a historically Black church where
    she participates in youth choir and community outreach. The Loudoun County African-American History Center and local cultural festivals provide her with opportunities to learn about Black heritage in
    the region, which she often incorporates into her art projects. Influenced by a diverse musical landscape, she enjoys hip‑hop, R&B, and jazz, and she frequently shares playlists with friends. While
    she navigates a predominantly white suburban environment, she finds solidarity through the school's Black Student Union and community mentorship programs, which reinforce her sense of identity and motivate
    her to become a future advocate for cultural representation.
