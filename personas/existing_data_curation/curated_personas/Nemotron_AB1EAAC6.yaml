    volunteering at the library'', ''Basic coding (Python) for personal projects'', ''Playing Minecraft'']'
  career_goals: Looking ahead, Junie aims to combine her passion for art, storytelling, and community impact into a career that amplifies underrepresented voices. She envisions attending a competitive magnet
    high school with a strong visual-arts curriculum, earning a scholarship to study Visual Arts and Communication at a university where she can focus on media production, museum studies, or cultural journalism.
    Her ultimate ambition is to become a multimedia curator or cultural journalist who creates exhibitions, documentaries, and digital platforms highlighting Black artists and social issues. She also dreams
    of leveraging her organizational talent to lead youth outreach programs that teach creative skills and civic engagement, positioning herself as a bridge between artistic expression and social change.
