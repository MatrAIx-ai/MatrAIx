  career_goals: Atilio aims to transition from front‑line driving to a supervisory role within the next three years, targeting a position as a logistics coordinator or fleet manager where he can mentor
    younger drivers and streamline route operations. He plans to earn a Certified Transportation Manager (CTM) credential and complete the FMCSA’s Advanced Driver Training program to bolster his safety
    and compliance expertise. Long‑term, he dreams of launching his own small‑scale regional trucking firm that can offer both freight services and on‑the‑road sales support for local businesses in Middle
    Tennessee, allowing him to combine his driving experience with his knack for sales and community networking.
