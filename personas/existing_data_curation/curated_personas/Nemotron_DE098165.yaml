personas:
  professional: An organized community and social service specialist named Eric Lee combines graduate business training with hands‑on grant management to design data‑driven outreach programs, meticulously
    aligns municipal compliance, and leads multi‑stakeholder teams toward measurable impact, while they ensure every budget line reflects the needs of underserved populations.
  sports: An enthusiastic participant named Eric Lee plays in the South Broward Basketball League, joins the Sunset Beach Volleyball Club for weekend matches, supports the Miami Heat and Inter Miami CF,
    and balances their fitness routine with daily morning runs to stay competitive, while they also mentor younger teammates.
  arts: Eric Lee, a devoted member of his church’s gospel choir, finds inspiration in the music of Kirk Franklin and the soulful vocals of Aretha Franklin, regularly attends local theater productions, and
    curates a personal playlist of contemporary jazz and classic R&B that fuels their creative cooking sessions.
  travel: A methodical planner named Eric Lee prefers short, culturally rich getaways, often revisiting the vibrant streets of New Orleans for its jazz festivals, exploring the historic sites of San Juan,
    Puerto Rico, and occasionally day‑tripping to the Everglades, while they balance travel with their family’s schedule and budget constraints.
  culinary: Eric Lee, a competent home cook, loves preparing traditional soul‑food dishes such as collard greens simmered with smoked turkey, sweet potato pie, and black‑eyed pea gumbo, while also experimenting
    with Caribbean influences like jerk‑spiced shrimp tacos and fresh mango salsa, and they often source ingredients at South Florida’s multicultural farmers’ markets.
  core: Eric Lee blends a regimented, data‑driven professional mindset with a lively community spirit, channeling anxiety into disciplined fitness and creative cooking, yet occasionally lets stress push
    them into late‑night snack runs.
background:
  cultural: Eric is an African American who grew up in a close‑knit, multigenerational family in South Florida. His upbringing blended Southern U.S. traditions with the vibrant Caribbean influences prevalent
    in Broward County, shaping his appreciation for music, food, and community cohesion. He values the strong sense of collective responsibility fostered by his church and neighborhood networks, and he
    often draws on this cultural heritage to inform his work in community development and social services.
