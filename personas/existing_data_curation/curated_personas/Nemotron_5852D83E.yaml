  career_goals: Nadine aspires to pursue a career in pediatric nursing or youth social work, where she can combine her organizational strengths with her compassion for helping others. She plans to earn
    a science‑focused high school diploma, secure a scholarship for a pre‑nursing program, and eventually obtain a Bachelor of Science in Nursing. In the longer term, she hopes to work at a children’s hospital
    or a community health center, and possibly lead volunteer programs that support at‑risk teens.
