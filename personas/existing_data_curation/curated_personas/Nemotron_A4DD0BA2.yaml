  career_goals: Michael aspires to merge his artistic talent with technology by becoming a video game designer or interactive media artist. He aims to earn a scholarship to a specialized high‑school program
    that emphasizes both art and STEM, later pursuing a degree in game design or digital arts. He is motivated to compete in coding contests and e‑sports tournaments to prove his skills, while also hoping
