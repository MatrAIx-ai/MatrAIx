personas:
  professional: Michael Klepper is a 12‑year‑old aspiring digital illustrator and budding robotics programmer whose curiosity drives them to blend sci‑fi aesthetics with custom LEGO Mindstorms creations,
    while their competitive streak pushes them to perfect their craft for school competitions despite occasional worry over perfection.
  sports: Michael Klepper is an enthusiastic member of the local YMCA youth basketball league who idolizes the Chicago Bulls, regularly practices three‑on‑three games with friends after school, and also
    hikes the nearby wetlands to observe wildlife, balancing competitive drive on the court with a relaxed appreciation for nature.
  arts: Michael Klepper is a digital art aficionado who spends evenings creating sci‑fi‑fantasy illustrations in Procreate while listening to indie bands like Tame Impala and the Game of Thrones soundtrack,
    often drawing inspiration from Studio Ghibli films and attending the county fair’s art exhibition.
  travel: Michael Klepper enjoys planning family road trips to national parks like the Grand Canyon and Everglades, while they also dream of visiting Tokyo’s Akihabara district to explore robotics shops
    and anime stores, balancing careful budgeting with spontaneous detours to local fairs when time permits.
  culinary: Michael Klepper prefers quick, creative meals such as homemade ramen topped with soft‑boiled eggs and sriracha, enjoys snack‑time pizza rolls with extra cheese, and often experiments with mixing
    fruit gummies into trail‑mix for hikes, though they occasionally forget to drink enough water.
  core: Michael Klepper is a curious, competitive twelve‑year‑old who merges digital sci‑fi art with LEGO robotics, worries about perfection, saves cautiously, and balances basketball, indie music, and
    adventurous travel dreams.
background:
  cultural: Michael grew up in Newberry, a small, close‑knit town in Levy County, Florida. His family reflects typical Southern, white, middle‑class values, emphasizing community, church involvement, and
    self‑reliance. He attends the local public middle school, where he participates in extracurricular activities like basketball and a youth art club. The area’s rural character and proximity to the Gulf
    coastal plains expose him to outdoor recreation such as fishing, hiking, and wildlife observation. While rooted in traditional Southern hospitality and family gatherings, Michael also absorbs broader
    cultural influences through the internet, music, and video games, shaping a hybrid identity that balances local customs with a curiosity for new ideas and unconventional thinking.
