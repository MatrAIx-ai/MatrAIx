persona_description: A neuroscientist who specializes in studying brain development and function, particularly in the field of neuroimaging. They are interested in understanding the differences between
  men and women's brains, the role of psychedelics in brain function, and the impact of brain size on brain activity. They are also interested in the development of white matter tracts in the brain and
  the relationship between brain size and autism symptoms. They have a keen interest in the brain areas that act as hubs for information processing and how activation patterns within these networks differ
  on an individual level.
