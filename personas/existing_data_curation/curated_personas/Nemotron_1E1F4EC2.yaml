personas:
  professional: William Mann is an aspiring young game developer who uses Scratch to prototype space‑themed adventure games, blending his fascination with the cosmos and his methodical, organized approach
    to design while habitually drafting storyboards in the margins of his school notebooks.
  sports: William Mann plays soccer on the Sunrise Soccer Club’s under‑U10 team, idolizes MLS side Los Angeles FC and follows Premier League club Liverpool FC, and balances weekly practices with weekend
    bike rides that serve as active recovery after matches.
  arts: William Mann is a budding artist who spends afternoons sketching nebulae and forest scenes, draws inspiration from Vincent van Gogh’s vibrant brushwork and Hayao Miyazaki’s whimsical storytelling,
    and regularly visits the downtown art museum to view exhibitions by contemporary muralist Banksy, feeding his curiosity for bold, unconventional ideas.
  travel: William Mann enjoys planning family trips that mix adventure and learning, dreaming of exploring the Grand Canyon’s rugged trails, visiting the Space Center in Houston, and recently trekking through
    the Redwoods on a school field trip, while also collecting postcards from classmates who visited Disneyland Paris.
  culinary: William Mann prefers finger foods like cheese‑filled pizza rolls, homemade spaghetti with tomato sauce, and bright fruit smoothies made with strawberries and mango, yet his cooking skill is
    limited to assembling ready‑made ingredients and occasionally over‑mixing pancake batter, resulting in a few kitchen mishaps he laughs off.
  core: William Mann merges a boundless curiosity for space with a meticulous habit of cataloguing stickers, often losing track of time in LEGO builds while forgetting to finish homework.
background:
  cultural: William was raised in a middle‑class white family in Milwaukee, Wisconsin. His upbringing reflects Midwestern values of community, modesty, and practicality. The family participates in local
    cultural events such as Summerfest and visits the Milwaukee County Historical Society, exposing him to the city’s German, Polish, and broader American heritage. The strong public‑school system and emphasis
    on extracurricular activities have nurtured his appreciation for art, science, and teamwork.
