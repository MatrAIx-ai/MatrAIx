  career_goals: William dreams of one day becoming a museum curator or exhibit designer, where he can combine his love of art, curiosity about science, and methodical planning to create engaging displays
    for visitors. He also imagines illustrating science books for children, hoping to make complex ideas accessible and exciting. At this age, he enjoys imagining careers that let him explore both creativity
    and discovery.
