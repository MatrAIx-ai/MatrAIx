personas:
  professional: Ricardo Aguilar, a veteran postsecondary humanities professor, leverages their three decades of expertise in Caribbean literary studies, bilingual curriculum design, and grant management
    to craft rigorous interdisciplinary courses while competitively seeking research impact and cautiously vetting collaborative proposals, reflecting a blend of curiosity and practical organization.
  sports: Ricardo Aguilar volunteers as a spirited youth soccer coach for the city’s junior league, regularly cheering for the Ponce Lions in the national championship while maintaining personal fitness
    through early‑morning walks, weekend gardening sessions, and occasional pick‑up basketball games, embodying an energetic yet organized approach to staying active.
  arts: Ricardo Aguilar immerses themselves in the local salsa circuit, dancing to classics by Celia Cruz and occasionally laying down conga rhythms, while also showcasing black‑and‑white photographs of
    historic colonial edifices inspired by Ansel Adams, acting in community theater productions of Lorca’s La Casa de Bernarda Alba, and devouring historical novels by Arturo Pérez‑Reverte, weaving a vibrant
    tapestry of artistic engagement.
  travel: Ricardo Aguilar prefers moderately planned trips that blend cultural immersion with relaxation, often journeying to nearby Caribbean islands such as St. Lucia, the Dominican Republic, and Curaçao
    to explore local festivals, historic forts, and culinary markets, while balancing travel costs with a modest pension and occasional group tours with fellow salsa enthusiasts.
  culinary: Ricardo Aguilar delights in preparing traditional island fare—meticulously crafting mofongo with green plantains and sofrito, and hand‑wrapping pasteles with yautía, alcaparrado pork, and aromatic
    cilantro from their own garden—while also savoring fresh mangoes and coffee, reflecting a seasoned yet continuously curious cook.
  core: Ricardo Aguilar melds scholarly rigor with vibrant community involvement, channeling a competitive curiosity into lifelong learning, cultural celebration, and pragmatic stewardship of health and
    finances.
background:
  cultural: Ricardo was born and raised in Ponce, the Pearl of the South, and his identity is deeply rooted in Puerto Rican traditions. He grew up in a bilingual household where Spanish was the primary
    language, but his education and professional career required fluency in English, giving him a bicultural perspective. Family gatherings centered around music, dance, and food, especially dishes like
    arroz con gandules and lechón asado, instilling a strong sense of culinary heritage. Catholic faith and local festivals such as Semana Santa and the Carnaval Ponceño have shaped his communal values
    and sense of civic responsibility. His work in the humanities draws upon the island’s colonial history, Afro‑Caribbean influences, and contemporary social movements, reflecting a commitment to preserving
    and critically examining Puerto Rican culture. He maintains close ties with local cultural institutions, including the Ponce Museum of Art and Casa Armstrong‑Poventud, and often incorporates local traditions
    into his teaching and community projects.
