  hobbies: '["Visiting local art galleries and museums","Watercolor painting","DIY furniture restoration and design","Landscape photography during trail rides","Urban gardening on a balcony plot","Hiking
    and biking on the Monon Trail and nearby state parks","Cooking eclectic dishes from different cuisines","Volunteering with Habitat for Humanity and neighborhood improvement projects"]'
  career_goals: Sara aims to move from laborer to foreman or site supervisor within the next five years, pursuing an apprenticeship in construction management and certifications in green building. She dreams
    of eventually launching a small family‑run renovation business that emphasizes sustainable materials and offers free workshops for neighborhood homeowners. Alongside professional growth, she wants to
    mentor younger workers, especially women, entering the trades, fostering a supportive and inclusive work environment.
