personas:
  professional: Sara Acheson, a 31-year-old construction laborer with hands‑on skills in concrete, framing, and scaffolding, blends her curiosity for design and eco‑friendly solutions into daily problem‑solving,
    and they are a natural candidate for foreman duties despite a habit of keeping a loosely organized toolbox.
  sports: Sara Acheson follows the Indianapolis Colts and Indiana Pacers with loyal enthusiasm, cycles the Monon Trail for weekend cardio, joins a local adult recreational softball league, practices spontaneous
    yoga at community centers, and they balance team spirit with personal fitness.
  arts: Sara Acheson spends her evenings painting watercolors of Indiana sunsets, frequents the Indianapolis Museum of Art to study the works of Monet and regional realist painters, draws inspiration from
    indie folk musicians like Sufjan Stevens and The War on Drugs, and they channel this creative energy into DIY furniture projects.
  travel: Sara Acheson enjoys quick getaways to Brown County State Park for leaf‑peeping hikes, occasional weekend road trips to Chicago’s art districts, plans her next adventure around the annual Indianapolis
    International Film Festival, and they favor spontaneous, budget‑friendly trips over rigid itineraries.
  culinary: Sara Acheson experiments with eclectic recipes, often combining sauerkraut‑style fermentations with soda‑bread textures on a sourdough base, favors fresh farmer’s‑market vegetables like heirloom
    tomatoes and kale, and they can whip up a rustic beet‑and‑goat‑cheese salad in under thirty minutes.
  core: Sara Acheson is a hands‑on builder who paints her world in watercolors, champions sustainable design, and balances community generosity with a delightfully disorganized, flexible approach to life.
background:
  cultural: Sara identifies as a White Midwesterner with familial roots in German and Irish heritage. Growing up in Indianapolis, she internalized values common to the region—hard work, community involvement,
    modesty, and a practical approach to life. She feels a strong connection to local cultural institutions like the Indianapolis Museum of Art and the downtown arts district, enjoys attending county fairs
    and supporting the city’s sports teams, and participates in seasonal community events that celebrate Midwestern traditions and culinary customs.
attributes:
  skills: '["Concrete pouring","Framing","Scaffolding assembly","Light‑weight heavy equipment operation","Blueprint reading","Safety compliance","Team collaboration","On‑site problem solving","DIY home
