persona_description: A meteorologist who specializes in weather forecasting and climate change. They are knowledgeable about the formation, movement, and impacts of various types of precipitation, including
  rain, snow, and thunderstorms. They have a deep understanding of the water cycle and how moisture from the oceans evaporates, condenses, and precipitates into clouds, which ultimately leads to the formation
  of precipitation. They are also well-versed in the mechanics of tornadoes, including the development of rotating air masses below heavy cumulonimbus clouds and the formation of tornadoes when the sun's
  warmth has heated a large body of moist air near the surface.
