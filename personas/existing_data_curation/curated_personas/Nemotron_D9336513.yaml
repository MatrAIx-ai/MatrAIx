  hobbies: '["Bike rides along the Charles River","Weekend walks in Boston parks","Reading mystery novels","Listening to classic‑rock vinyl records","Community gardening","Solving crossword puzzles","Basic
    woodworking projects","Playing board games with friends","Cooking meals with spouse"]'
  career_goals: Terry aims to translate his strong reliability and organizational abilities into a supervisory role within facilities management. Over the next few years he plans to complete a Certified
    Facility Manager (CFM) program and obtain OSHA and green‑cleaning certifications, positioning himself for a lead janitorial supervisor or facilities coordinator position at his current employer or a
    larger institution. He also aspires to eventually launch his own small commercial‑cleaning business that can provide flexible, well‑structured work for other dependable staff. Achieving a stable daytime
    schedule, higher income, and a clear career path are central to reducing his worry about financial and work‑life balance.
