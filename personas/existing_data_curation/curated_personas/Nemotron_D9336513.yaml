personas:
  professional: Terry Berube, a meticulous janitor with a talent for orchestrating flawless commercial cleaning routines, applies their detail‑oriented mindset to maintain spotless facilities, master inventory
    logs, and swiftly resolve tenant concerns, while they pursue Certified Facility Manager certification and aim for a supervisory role.
  sports: Terry Berube fuels their mornings with solo bike rides along the Charles River, joins the Boston Bike Club for weekend group rides, roots for the Boston Celtics, Red Sox, and Bruins, and occasionally
    participates in a local pickup basketball league, showing how they blend structured fitness with community sports fandom.
  arts: Terry Berube unwinds by spinning classic‑rock vinyl from Led Zeppelin to Fleetwood Mac, devouring mystery novels by Agatha Christie and Tana French, attending occasional performances at the Boston
    Symphony Hall, and engaging in board game nights with Settlers of Catan, illustrating how they weave music, literature, and social play into their creative life.
  travel: Terry Berube prefers short, meticulously planned weekend escapes to New England gems like Portland, Maine, and Acadia National Park, while dreaming of a leisurely road trip through the Scottish
    Highlands, balancing travel budgets with a desire for nature‑filled relaxation and occasional spontaneous detours.
  culinary: Terry Berube, an enthusiastic home‑cook, delights in harvesting garden vegetables for roasted beet‑and‑goat‑cheese salads, perfecting New England clam chowder with fresh clams, and pairing meals
    with a locally brewed IPA, reflecting how they blend seasonal produce with comfort food traditions.
  core: Terry Berube, a 31‑year‑old facilities‑focused pragmatist, blends a structured work ethic with sunrise bike rides, garden stewardship, and classic‑rock vinyl, all while they wrestle with a chronic
    worry habit and an occasional caffeine‑driven over‑schedule.
background:
  cultural: Terry’s cultural roots trace back to French‑Canadian immigrants who settled in the Greater Boston area in the mid‑20th century. Growing up in a working‑class New England neighborhood, his family
    emphasized hard work, modesty, and community responsibility. Although English is his primary language, he grew up hearing French expressions at family gatherings and celebrates traditional holidays
    such as Saint‑Jean‑Baptiste. Catholic values of respect and service were part of his upbringing, though he now identifies with a secular, community‑oriented outlook. Living in Allston—a vibrant, multicultural
    district—has exposed him to the eclectic energy of Boston’s student and artistic scenes, further shaping his appreciation for diverse perspectives while maintaining a pragmatic, grounded worldview.
attributes:
  skills: '["Commercial cleaning","Floor care and maintenance","Restroom sanitation","Waste and recycling management","Inventory control and supply ordering","Cleaning schedule and log management","Basic
