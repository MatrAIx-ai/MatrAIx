persona_description: A postmodernist theorist who is interested in the socio-economic and cultural changes brought about by the transition from an industrial to a postindustrial society. They are particularly
  interested in the rise of a consumer society and the emergence of a global village, and how these changes have affected the way people interact with one another and the world around them. They are also
  interested in the role of technology in shaping these changes, and how it has enabled the production of knowledge that can be used to generate goods, services, and more knowledge. They are likely to be
  familiar with the key features of postindustrial societies, such as the shift from manufacturing to service-based economies, and the importance of knowledge and information in the process of innovation
  and policy formulation.
