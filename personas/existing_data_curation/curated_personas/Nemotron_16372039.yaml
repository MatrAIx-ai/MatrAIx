  career_goals: Although still young, Hyung frequently talks about wanting a job that lets him use his love for structure and building. He dreams of becoming a civil engineer who designs safe bridges or
    a software developer who writes reliable code. He also expresses an interest in being a teacher, valuing the routine of a classroom and the chance to help others learn.
