personas:
  professional: Hyung Reuning, a budding junior architect in training, loves assembling LEGO sets by strictly following step‑by‑step manuals, and they apply this meticulous, routine‑driven approach to every
    creative project, often double‑checking each connection before moving on.
  sports: Hyung Reuning enjoys playing on the San Dimas Strikers U‑7 soccer team, preferring short, familiar matches with a handful of friends, and they approach each practice with a disciplined warm‑up
    routine, though they occasionally skip a session when a looming school test heightens their stress.
  arts: Hyung Reuning spends afternoons drawing manga‑style characters inspired by Osamu Tezuka and Hayao Miyazaki, and they immerse themselves in adventure picture books, often recreating favorite scenes
    with colored pencils while humming the accompanying soundtrack, showcasing a quiet yet vivid artistic imagination.
  travel: Hyung Reuning loves family weekend trips to Disneyland and day excursions to Lake Arrowhead, where they relish the predictable schedule of rides and nature walks, and they dream of visiting Tokyo’s
    interactive museums someday, favoring well‑planned itineraries over spontaneous travel.
  culinary: Hyung Reuning helps prepare simple dishes like vegetable fried rice and kimchi at home, confidently stirring the pan and sprinkling gochugaru, and they proudly claim the title of 'sauce master'
    when adding a splash of soy sauce and ginger, though they sometimes over‑season out of excitement.
  core: Hyung Reuning is a detail‑oriented 7‑year‑old who thrives on routine, meticulously plans LEGO builds, worries about small setbacks, bites their nails when stressed, and finds comfort in quiet creativity
    and structured play.
background:
  cultural: Hyung is a second-generation East Asian American, most likely of Korean descent, raised in the suburban community of San Dimas, California. At home, his family speaks both English and Korean,
    and they observe cultural traditions such as Chuseok and Lunar New Year. His parents emphasize education, punctuality, and respect for elders, which have instilled in him a strong sense of routine and
    practicality. He attends a public elementary school where he interacts with a diverse student body, but he also participates in a local Korean cultural center’s weekend classes, keeping a connection
    to his heritage.
