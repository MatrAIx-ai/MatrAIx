personas:
  professional: Sherry Jones, a 14-year-old aspiring agricultural-science enthusiast, blends a love of routine garden chores with the strategic planning they hone in Minecraft to excel in school science
    projects, demonstrating practical problem-solving, meticulous organization, and a competitive edge in class challenges.
  sports: Sherry Jones jogs the Appalachian foothill trails each morning, participates in their middle-school cross-country team, helps care for chickens through the local 4-H club, and they root for the
    Virginia Tech Hokies football squad on Saturdays while occasionally watching Washington Commanders games, embodying a disciplined yet routine-driven fitness routine.
  arts: Sherry Jones sketches the rolling hills of Abingdon in a folk-inspired style reminiscent of regional artist Margaret O'Keeffe, listens to classic rock legends like The Eagles and country icons such
    as Dolly Parton, and devours mystery novels by Agatha Christie and historical fiction by Philippa Gregory, weaving literary intrigue and visual art into the way they spend leisure time.
  travel: Sherry Jones prefers carefully planned road trips that blend familiar comfort with adventure, spending weekends exploring Shenandoah National Park's Skyline Drive and historic Williamsburg, while
    dreaming of a family vacation to Edinburgh's castle and the Scottish Highlands, balancing a modest allowance with savings from the budgeting plan they set.
  culinary: Sherry Jones, an eager baker with a moderate skill level, frequently crafts buttermilk chocolate-chip cookies, lemon-blueberry cupcakes, and rustic apple-cinnamon pie using Grandma's handwritten
    recipes, and they love tossing garden-fresh basil, thyme, and oregano into homemade pizza sauce, delighting in the tactile precision of measuring flour by hand.
  core: Sherry Jones, a practical 14-year-old who thrives on routine, strategic Minecraft builds, meticulous baking, and a competitive yet skeptical outlook, approaches life as a series of well-planned
    projects that they tackle with methodical focus.
background:
  cultural: Sherry was raised in Abingdon, a modest‑sized town in Washington County, Virginia, surrounded by the Appalachian foothills. Her family participates in the close‑knit, tradition‑oriented community
    typical of rural Southern Virginia, with regular involvement in local church gatherings, county fairs, and school events. The area’s emphasis on hard work, self‑reliance, and preservation of local customs—such
    as folk music, crafts, and seasonal harvest celebrations—has shaped her practical outlook and respect for routine. While her household reflects a predominantly white, middle‑class background, she benefits
    from the multicultural influences of nearby Appalachian heritage and a supportive school environment that values community service.
attributes:
  skills: '["Time management", "Organizational skills", "Basic animal care", "Microsoft Office proficiency", "Baking and cooking", "Gardening", "Math problem solving", "Cross-country running", "Effective
    communication"]'
  hobbies: '["Reading mystery and historical fiction", "Baking", "Animal care", "Gardening", "Listening to classic rock and country music", "Sketching nature", "Playing strategic video games (Minecraft)"]'
  career_goals: Sherry aims to graduate high school with a strong GPA, especially in science and math, and then enroll in a community‑college veterinary technology program. Her primary goal is to become
    a certified veterinary technician who works with both pets and farm animals in her rural community. She envisions either opening a small animal‑care clinic in Abingdon or joining the local agricultural
    extension office. Long‑term, she hopes to combine her love for animals with her practical skills by helping manage a family farm that includes livestock and a vegetable garden.
