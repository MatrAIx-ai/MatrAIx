personas:
  professional: Angel Medina, a veteran IT support specialist with over 15 years diagnosing hardware failures, configuring multi‑OS networks, and writing Python automation scripts for Bellflower’s small
    businesses, blends a methodical troubleshooting mindset with a relaxed, cooperative demeanor that translates technical jargon into clear bilingual explanations, while a penchant for flexible scheduling
    often leaves the desk a charming mess of spare parts and handwritten checklists.
  sports: Angel Medina walks their dog along Bellflower’s Oak Avenue Park three times a week, roots for the Los Angeles Angels baseball team, follows LA Galaxy soccer matches, and participates in the Bellflower
    Recreation Center’s co‑ed softball league every spring, balancing low‑impact cardio with occasional pick‑up basketball games at the community court.
  arts: Angel Medina unwinds to the timeless boleros of Luis Miguel and the modern Latin pop rhythms of Bad Bunny and Rosalía while crocheting colorful blankets at the weekly Bellflower Maker’s Circle,
    a gathering that often features community art displays inspired by local muralists.
  travel: Angel Medina prefers spontaneous, budget‑friendly road trips, often spending long weekends exploring Ensenada’s waterfront fish markets, strolling through San Diego’s Gaslamp Quarter, or sipping
    wine in Santa Barbara’s vineyards, while dreaming of a culinary pilgrimage to Oaxaca’s vibrant markets and historic kitchens.
  culinary: Angel Medina crafts traditional chiles en nogada, hearty pozole rojo, and smoky carnitas tacos using home‑grown cilantro, oregano, jalapeños, and occasional epazote, while experimenting with
    modern twists like quinoa‑filled enchiladas verdes topped with a serrano‑spiked salsa fresca made from tomatillos and Pasilla chilies.
  core: Angel Medina blends a methodical, structure‑oriented work ethic with a relaxed, community‑centric lifestyle, turning tech troubleshooting into friendly bilingual tutoring, garden‑grown chilies into
    inventive meals, and occasional desk clutter into a testament to their flexible, compassionate personality.
background:
  cultural: Angel was raised in a Mexican‑American household in the Los Angeles area, where Spanish and English were spoken interchangeably. Family traditions such as Día de los Muertos, Cinco de Mayo,
    and Christmas include festive foods, music, and religious observances that remain central to her identity. She maintains close ties with her extended family and values the communal spirit of Mexican
    culture, often preparing homemade tamales, salsa, and atole for neighbors and friends. This bicultural background informs her warm, cooperative approach to relationships and fuels her desire to give
    back to the community, especially by helping Spanish‑speaking residents navigate technology.
attributes:
  skills: '[''Hardware troubleshooting'', ''Network setup and configuration'', ''Software installation and updates'', ''Virus and malware removal'', ''Bilingual customer service (English/Spanish)'', ''Remote
    desktop assistance'', ''Basic Python scripting for automation'', ''Training and mentorship'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Volunteering to teach computer basics'', ''Crocheting'', ''Listening to music (boleros, Latin pop)'', ''Walking with dog'', ''Attending cultural
    festivals'']'
  career_goals: Angel is focused on earning industry certifications such as CompTIA A+ and Network+ within the next year, which will open pathways to a senior IT support specialist role. She plans to complete
    her GED and enroll in a community‑college associate degree in Information Technology, aiming to specialize in cybersecurity. Her medium‑term ambition is to become a team lead or small‑business IT manager,
    overseeing a group of technicians while maintaining a predictable schedule that supports her family life. In the longer term, Angel hopes to launch her own community‑focused tech consulting service
    that provides affordable, bilingual support to local households and small businesses, helping them stay secure and up‑to‑date.
