persona_description: A teacher or educator who is interested in improving the quality and equity of schooling in low SES primary schools, particularly through the use of after-school robotics programs.
  This persona is likely to have a background in education, particularly in the field of technology and media literacy, and is familiar with the concept of constructivist learning. They are interested in
  the impact of robotics programs on student engagement and learning outcomes, and are open to alternative approaches to improving education. They are likely to have experience working with after-school
  programs and have a passion for improving the lives of students in low SES communities.
