  career_goals: Nathan aims to expand his company's market presence across the Southwest, targeting a 20% revenue growth within the next three years through disciplined operational excellence and targeted
    digital transformation. He plans to cement a legacy of sustainable, routine‑driven processes that improve profitability while reducing employee turnover. In the longer term, he aspires to transition
    to a board advisory role, mentoring the next generation of executives and establishing a charitable foundation focused on STEM education and mental‑health support for high‑stress professionals. These
    goals reflect his practical mindset, achievement orientation, and desire for measurable, lasting impact.
