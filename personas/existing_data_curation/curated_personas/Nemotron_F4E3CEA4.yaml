  hobbies: '[''Bridge and Poker'', ''Community Storytelling'', ''Gardening'', ''Fishing'', ''Woodworking Tool Restoration'', ''Genealogy Research'', ''Historical Museum Volunteering'', ''Bluegrass Music'',
