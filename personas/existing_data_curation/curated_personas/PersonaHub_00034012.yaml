persona_description: A historical archaeologist who specializes in the study of prehistoric and early Bronze Age gold necklaces and their decorative techniques, particularly those found in Ireland and Brittany.
  They are interested in the dating and classification of these necklaces based on their shapes, decorations, and materials, and have a particular interest in the cultural and economic contexts in which
  they were produced. They are also interested in the potential trade routes and regional networks that may have influenced the spread of these necklaces across Europe.
