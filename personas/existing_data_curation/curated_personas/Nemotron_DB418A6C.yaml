personas:
  professional: Sherrie Cannady is a seasoned high‑voltage power line technician who translates her love of order into meticulous schematics reading, precise conduit pulling, and rigorous safety compliance,
    while mentoring junior crew members and championing smart‑grid integration as she works toward a foreman role and her own community‑focused contracting firm.
  sports: Sherrie Cannady finds balance on the water and on the field, spending sunrise hours fishing the Bayou Teche for redfish, cheering the New Orleans Saints on Sundays, supporting the LSU Tigers during
    college football season, and playing occasional pick‑up tennis at the local community center, all while preferring low‑impact activities that fit her disciplined routine.
  arts: Sherrie Cannady channels her love of soulful melodies through a gospel choir at her church and a curated jazz‑and‑blues playlist that includes Miles Davis, B.B. King, and Etta James, often attending
    intimate performances at the Riverwalk Café while occasionally dabbling in watercolor landscapes of the bayou.
  travel: Sherrie Cannady plans her getaways with the same precision she uses on power lines, favoring weekend road trips along the Gulf Coast to explore historic districts of New Orleans, Savannah, and
    Austin, dreaming of a future solo venture to the jazz‑rich streets of New York’s Harlem, and always packing a checklist of essential tools and a portable fishing rod.
  culinary: Sherrie Cannady’s palate is anchored in the heart of the bayou, where she frequently cooks gumbo and jambalaya spiced with home‑grown thyme and bay leaves, perfects a smoked catfish étouffée,
    and indulges in beignets with chicory coffee, though she sometimes over‑season dishes in her quest for bold flavor.
  core: Sherrie Cannady is a disciplined electrician who blends curiosity with order, stewards her health and money meticulously, and finds solace in jazz, fishing, and the communal flavors of her hometown.
background:
  cultural: Sherrie is an African American woman raised in Westwego, Louisiana, where she was immersed in the rich blend of Southern, Creole, and Cajun cultural traditions. She grew up attending gospel
    services and community festivals, which fostered her values of cooperation, harmony, and respect for elders. The local culinary heritage, especially dishes like gumbo and jambalaya, shaped her appreciation
    for communal meals and cooking. While never married, she maintains strong ties to her extended family and neighborhood, often offering support and mentorship within the African American community, reflecting
    a deep sense of cultural pride and responsibility.
attributes:
  skills: '[''High‑voltage electrical installation'', ''Power line maintenance and repair'', ''Electrical schematics interpretation'', ''Safety compliance (OSHA)'', ''Project planning and coordination'',
    ''Team training and mentorship'', ''Use of specialized tools (e.g., hot sticks, line pullers)'', ''Troubleshooting and fault detection'', ''Basic renewable energy integration knowledge'', ''Physical
    fitness and rope access'']'
  hobbies: '[''Reading technical manuals'', ''DIY electronics projects'', ''Gardening (herbs and vegetables)'', ''Fishing on Bayou Teche'', ''Listening to jazz and blues'', ''Church choir participation'',
    ''Community clean‑up volunteering'']'
  career_goals: Sherrie aims to advance to a crew‑lead or foreman position where she can oversee larger projects and ensure rigorous safety standards. She plans to obtain journeyman electrician certification
    and become a certified OSHA trainer, leveraging her organizational strengths to develop comprehensive training programs. Long‑term, she envisions starting her own electrical contracting business focused
    on community infrastructure and mentoring underrepresented youth in skilled trades, while remaining at the forefront of smart‑grid and renewable energy technologies.
