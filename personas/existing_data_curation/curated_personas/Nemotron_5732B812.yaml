  hobbies: '[''Cooking and recipe experimentation'', ''Community gardening'', ''Salsa dancing'', ''Knitting and crochet'', ''Walking in local parks'', ''Volunteering at after‑school programs'', ''Listening
    to bolero, salsa, and reggaeton'', ''Reading historical fiction'', ''Watching classic telenovelas'', ''Exploring Queens street markets'']'
  career_goals: Reyna aspires to turn her culinary passion into a modest home‑based catering service that offers family‑style Latin meals for neighbors and church events. She aims to deepen her involvement
    with the senior center by leading a weekly outreach program and to expand the community garden plot she helps maintain. Additionally, she wants to improve her digital skills to launch a simple blog
    sharing recipes and cultural stories, and to serve as a mentor for younger residents interested in preserving Latino traditions.
