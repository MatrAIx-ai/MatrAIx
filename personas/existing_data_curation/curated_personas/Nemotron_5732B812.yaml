personas:
  professional: Reyna Riverarodriguez, an experienced home cook turned community caterer, combines bilingual communication and hands‑on problem‑solving to deliver family‑style meals for neighbors and church
    events, while her curiosity‑driven experimentation often clashes with a spontaneous reluctance to adhere to strict timelines.
  sports: Reyna Riverarodriguez stays active by walking through Flushing Meadows-Corona Park and participating in a senior‑center fitness group, cheers for the New York Mets and the New York Knicks, and
    occasionally joins a community soccer pickup league, though they favor low‑impact activities that fit their flexible schedule.
  arts: Reyna Riverarodriguez enjoys salsa dancing nights and listens to the timeless boleros of Celia Cruz, the romantic ballads of Luis Miguel, and the modern reggaeton beats of Bad Bunny, while also
    indulging in classic telenovelas like 'La Usurpadora', reflecting a blend of nostalgia and contemporary pop culture.
  travel: Reyna Riverarodriguez loves exploring Queens' multicultural street markets and plans trips to New Orleans for its music, Barcelona for its architecture, and San Miguel de Allende to soak up artistic
    inspiration, balancing spontaneous weekend getaways with careful budgeting for longer journeys.
  culinary: Reyna Riverarodriguez experiments with family‑inspired dishes such as chipotle‑marinated chicken with cilantro‑lime rice, mango‑pepper salsa, and sweet plantain fritters, favoring fresh herbs,
    citrus, and smoky chilies while honoring time‑tested recipes during community gatherings.
  core: Reyna Riverarodriguez blends curiosity with practicality, turning spontaneous kitchen experiments into community meals, juggling budgeting quirks and health hurdles, all while dancing through life
    with a love for music, gardens, and occasional disorganization.
background:
  cultural: Reyna grew up in a bilingual household where Mexican and Puerto Rican traditions intertwined, shaping her love for family gatherings, religious celebrations, and the vibrant rhythms of Latino
    music. Living in Elmhurst, Queens, she embraces the neighborhood’s multicultural tapestry while preserving her heritage through language, cuisine, and community involvement. Her fluency in Spanish and
    deep respect for cultural solidarity guide her interactions, and she proudly blends the flavors, customs, and values of her roots with the diverse influences of her urban environment.
attributes:
  skills: '[''Culinary arts (Mexican, Puerto Rican, Caribbean)'', ''Bilingual communication (Spanish & English)'', ''Volunteer coordination'', ''Household budgeting and financial management'', ''Childcare
