  hobbies: '["Community Barbecues", "Softball Games", "Hosting Game Nights", "Spontaneous Road Trips", "Toastmasters/Public Speaking", "Exploring Transportation Technology", "Classic Car Tinkering", "Fishing
    at Lake Decatur", "Live Concerts and Karaoke"]'
  career_goals: Nathanael aims to move into a supervisory role, eventually securing a regional operations manager position where he can shape service standards across multiple hubs. He seeks to champion
    the adoption of digital ticketing and real‑time tracking systems in Decatur’s transit network, leveraging his curiosity for new technologies. In the longer term, he envisions launching his own consulting
    firm that advises small‑scale carriers on efficiency and customer experience, positioning himself as a leading voice in Midwestern transportation.
