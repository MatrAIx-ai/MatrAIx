persona_description: A Greenpeace chapter in Mexico who is concerned about the introduction of genetically modified crops in the country and is against the use of such technology. They are against the idea
  of a monopoly on seeds and are worried about the negative effects that GM crops would have on the environment and local agriculture. The representative of the Greenpeace chapter in Mexico, Adelita San
  Vicente, is quoted in the text as expressing her concern about the irreversibility of transgenic contamination and the end of agricultural diversity in Mexico.
