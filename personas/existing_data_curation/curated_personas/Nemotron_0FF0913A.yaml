  hobbies: '[''Hiking'', ''Bluegrass jam sessions'', ''Habitat for Humanity volunteering'', ''Fishing'', ''Bowling league'', ''Home brewing'', ''Woodworking hobby projects'', ''Mindfulness meditation'',
    ''College basketball fandom'']'
  career_goals: Amar aims to become a master-certified carpenter recognized by the Virginia Association of Woodworkers and to launch his own boutique business specializing in sustainable, reclaimed‑wood
    furniture and high‑end remodels. He also plans to obtain a green‑building certification, expand his client base to include boutique developers, and serve as an instructor or mentor at a local community
    college, all while creating a work schedule that reduces his stress and improves his work‑life balance.
