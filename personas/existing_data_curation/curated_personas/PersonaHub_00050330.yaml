persona_description: A researcher and biologist who specializes in studying the molecular mechanisms underlying tissue separation in the developing embryo. The individual is particularly interested in the
  role of the Xfz7-PKC noncanonical Wnt pathway in promoting Snail1 expression and controlling tissue separation in the prechordal mesoderm. The individual is likely to have a background in molecular biology,
  cell biology, and developmental biology, and has likely conducted research on Xenopus and zebrafish gastrulae, using tools such as morpholino antisense oligonucleotides (MOs) and explants. The individual
  is likely to have expertise in identifying and manipulating genes that control tissue separation, and has likely published research on the topic.
