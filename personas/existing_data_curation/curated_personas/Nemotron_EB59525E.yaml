personas:
  professional: Ruth Oberry is a corporate strategy executive who blends rigorous data analysis with an abstract, design‑thinking mindset, using her STEM foundation and love for quiet contemplation to drive
    sustainable‑technology initiatives and nurture an inclusive, creative workplace culture.
  sports: Ruth Oberry thrives on early‑morning paddleboarding along the Intracoastal Waterway, complements it with weekly yoga at the Miami Beach Yoga Studio, and avidly follows the Miami Heat, Miami Marlins,
    and Tampa Bay Buccaneers while coaching a recreational paddle club named South Florida Paddle Club.
  arts: Ruth Oberry channels her artistic soul by painting abstract canvases inspired by Wassily Kandinsky, sketching botanical studies echoing Georgia O'Keeffe, and immersing herself in the works of James
    Turrell at the Pérez Art Museum Miami, while their evening piano improvisations often echo Brian Eno’s ambient textures.
  travel: Ruth Oberry prefers meticulously planned solo trips that blend quiet reflection with cultural immersion, having explored the serene gardens of Kyoto, the avant‑garde galleries of Barcelona, and
    the remote wilderness of Patagonia, while regularly escaping to Key Biscayne’s sunrise paddles for weekend rejuvenation.
  culinary: Ruth Oberry enjoys crafting Mediterranean dishes such as quinoa tabbouleh with fresh mint, pomegranate, and lemon‑zest grilled swordfish, often using herbs harvested from their rooftop garden
    like rosemary and thyme, though they sometimes skip meals during intense work periods.
  core: Ruth Oberry is a visionary corporate strategist who marries sustainable‑tech leadership with a solitary, art‑driven soul, navigating life through disciplined routines, mindfulness, and a relentless
    quest for creative harmony.
background:
  cultural: Ruth was raised in a middle‑class Anglo‑American household in Broward County, with family roots tracing back to Irish and German immigrants who settled in Florida after World War II. Her upbringing
    emphasized education, curiosity, and community service, reflecting the post‑Baby‑Boomer values of self‑reliance and civic engagement. While she identifies with the broader white-American cultural narrative,
    the multicultural vibrancy of South Florida—particularly the proximity to Latin and Caribbean communities—has shaped her appreciation for diverse artistic expressions and global perspectives. Ruth’s
    cultural identity is a blend of traditional Mid‑Atlantic family traditions (thanksgiving gatherings, church involvement) and a personal affinity for the coastal, sun‑filled lifestyle of Fort Lauderdale,
    which informs her love of solitary water activities and quiet coastal retreats.
