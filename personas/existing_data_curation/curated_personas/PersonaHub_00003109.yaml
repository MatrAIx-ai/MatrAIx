persona_description: A historian who specializes in the study of English history, particularly focusing on the political and social differences between England and the Continent during the medieval and
  early modern periods. This historian is interested in the complex social and political group that comprised the ruling elite in England, including the nobility, squires, rich bankers and merchants, leading
  lawyers and civil servants, and officers in the army and navy. This historian is also interested in the broader implications of these differences on the development of English society and politics.
