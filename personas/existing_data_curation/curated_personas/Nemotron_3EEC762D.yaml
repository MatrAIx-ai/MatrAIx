  career_goals: Although retired from formal employment, Nathaniel aims to stay actively engaged by volunteering as a STEM mentor for local middle‑school students, serving on community‑service boards, and
    helping organize activities at the senior center. He hopes to preserve his family’s legacy by documenting his life story in a memoir and to launch a small workshop where he can teach practical skills—such
    as woodworking and basic home repairs—to neighbors of all ages. His overarching ambition is to remain a trusted resource in his community, share his expertise, and foster intergenerational learning.
