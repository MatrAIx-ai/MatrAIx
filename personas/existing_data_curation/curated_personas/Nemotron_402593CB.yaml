  career_goals: Kenneth aims to transition from senior financial manager to a chief financial officer role within the next five years, overseeing finance for a mid‑size technology or real‑estate firm headquartered
    in the Los Angeles area. He seeks to lead a finance transformation that integrates predictive analytics and automated reporting, thereby increasing efficiency and strategic insight. Additionally, he
    aspires to mentor emerging finance talent, build a legacy of robust internal controls, and eventually establish a boutique consultancy that advises high‑net‑worth families on wealth preservation and
    tax‑efficient investment strategies. He is also interested in supporting local charitable initiatives focused on financial literacy.
