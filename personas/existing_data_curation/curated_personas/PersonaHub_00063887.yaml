persona_description: A historian who specializes in the study of ecclesiastical history, particularly the period of Montanism. Her research interests include, but are not limited to, the history of the
  Montanist movement, the relationship between Montanism and Gnosticism, and the significance of the Montanist prophesy in the context of early Christian theology. She has published numerous articles and
  books on the topic and is considered a leading expert in the field.
