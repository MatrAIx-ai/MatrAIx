personas:
  professional: Brent Owens, a wildly curious five-year-old, treats every classroom activity as a stage for improvisational storytelling, using quick wit and a love for eye-catching art to lead peer-run
    business projects like selling hand-drawn maps of imaginary lands, and relishes the spotlight while never fussing about rigid schedules.
  sports: Brent Owens dashes into fall soccer practice with the Little Strikers Club, cheers loudly for the New York Yankees on family game nights, eagerly tries ice-skating during winter, and maintains
    a competitive streak that fuels endless 'who's faster?' challenges with friends.
  arts: Brent Owens, an enthusiastic fan of animated classics, spends afternoons humming the tune Let It Go from Frozen, drawing vibrant portraits of Disney princesses, reenacting scenes from Sesame Street
    starring Elmo and Cookie Monster, and constantly seeks new stories that spark imagination.
  travel: Brent Owens has explored the local zoo and a sunny beach resort during a family vacation, dreams of visiting Disneyland in California and the Eiffel Tower in Paris, and prefers spontaneous road
    trips with a packed snack stash over meticulously planned itineraries.
  culinary: Brent Owens delights in creamy mac and cheese, loves assembling peanut butter and jelly sandwiches, relishes bright fruit salad with strawberries and kiwi, often requests extra sprinkles on
    cupcakes, and proudly declares themselves a mini-chef in the kitchen.
  core: Brent Owens is a chatty, curiosity-driven five-year-old who thrives on spontaneous play, loves the spotlight, and balances a competitive edge with a relaxed approach to rules.
background:
  cultural: Brent grows up in a typical Midwestern suburban environment in Macomb, Michigan. His family reflects a predominantly white American cultural heritage with values of independence, community involvement,
    and a blend of traditional holidays such as Thanksgiving and Christmas alongside local celebrations. He is exposed to community institutions like the Macomb County Public Library’s children’s programs,
    community art classes, and the broader Detroit area’s music and automotive culture. The region’s emphasis on friendly competition in youth sports and game nights, along with an openness to new ideas,
    influences his curiosity, sociability, and competitive spirit.
