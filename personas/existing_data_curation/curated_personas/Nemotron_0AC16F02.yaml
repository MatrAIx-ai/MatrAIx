  career_goals: Brent’s career ambitions revolve around roles that combine creativity, exploration, and leadership. He frequently says he’d love to be an astronaut, allowing him to explore new frontiers
    and draw his discoveries, or a children’s television host, giving him a platform to entertain and inspire friends. He also imagines designing games or building innovative toys where he can channel his
    competitive spirit and love for building, keeping room for spontaneous play and new ideas.
