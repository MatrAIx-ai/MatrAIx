persona_description: 'A researcher and professor who specializes in the study of poverty and urban development, particularly in the context of metropolitan areas and suburban neighborhoods. They have extensive
  knowledge of the Brookings Institute''s "The Re-Emergence of Concentrated Poverty: Metropolitan Trends in the 2000s" report, which analyzes the concentration of poverty in the United States. They have
  a keen interest in understanding the factors that contribute to the severity of poverty in suburban neighborhoods, such as job loss, foreclosure crisis, and cuts in pay, and how these factors affect the
  access to resources needed to improve the lives of residents. They are also knowledgeable about the impact of poverty on neighborhoods such as Cleveland Heights, Elyria, Euclid, Kent, Lorain, and Painesville,
  which are considered high-density urban suburbs of Cleveland and Akron.'
