personas:
  professional: A diligent future project manager, Brianna Shugart leverages her Excel budgeting expertise, meticulous record‑keeping, and hands‑on farm equipment knowledge to streamline agricultural supply
    operations, while her competitive drive and love of structure push her to set and exceed tight deadlines.
  sports: A dedicated runner, Brianna Shugart competes on her former high school cross‑country team, logs weekly mileage in her planner, follows the LSU Tigers football schedule religiously on Saturdays,
    and holds season tickets for the New Orleans Saints, though she sometimes skips strength training when school projects overwhelm her.
  arts: An eclectic creator, Brianna Shugart spends evenings quilting patterned blankets to the soundtrack of classic country icons like Dolly Parton and Garth Brooks, while immersing herself in strategy
    video games like Civilization to satisfy her love of planning, and she occasionally visits local craft fairs to exchange ideas with fellow quilters.
  travel: A methodical explorer, Brianna Shugart maps out weekend getaways in a leather‑bound planner, enjoys budget‑friendly road trips to New Orleans for Mardi Gras and a weekend hike in the Great Smoky
    Mountains, and dreams of a carefully researched cultural tour of Washington, D.C., though limited college funds keep her adventures largely regional.
  culinary: A practical home chef, Brianna Shugart favors step‑by‑step recipes like jambalaya with Andouille sausage, shrimp étouffée, and classic chicken fried steak, often seasoning with cayenne, thyme,
    and bay leaves, and she proudly prepares fresh biscuits and gravy on Sunday mornings for family gatherings.
  core: Brianna Shugart is a meticulously organized 19‑year‑old who balances a competitive drive with a love for Southern traditions, using planners to turn anxiety into achievement while juggling quilting,
    running, and ambitious career goals.
background:
  cultural: Brianna was raised in Farmerville, a small town in Lincoln Parish, Louisiana. Her family is white Southern, longtime residents with deep ties to the local farming community. She grew up attending
    a Baptist church, where community service and family gatherings were central to her upbringing. The regional culture emphasizes self‑reliance, respect for tradition, and a close‑knit community network,
    with customs such as Sunday church, high‑school football nights, community potlucks, and exposure to Cajun and Creole culinary influences. While she values these traditions, she feels pressure to succeed
    academically and secure a stable future amid limited local economic opportunities.
attributes:
  skills: '[''event planning'', ''time management'', ''Microsoft Office (Excel, Word)'', ''budgeting'', ''record keeping'', ''basic farm equipment maintenance'', ''sewing/quilting'', ''cash handling'',
    ''inventory management'', ''public speaking'']'
  hobbies: '[''journaling'', ''goal setting'', ''cross‑country running'', ''knitting'', ''quilting'', ''volunteering at food pantry'', ''reading productivity books'', ''listening to country music'', ''strategy
    video games'']'
  career_goals: Brianna aims to enroll in a community college to earn an associate degree in business administration, with the long‑term goal of becoming a project manager for an agricultural supply firm
    or a logistics coordinator for a regional distribution center. She is also attracted to a career in law enforcement and is considering applying to the Louisiana State Police Academy to become a deputy
    sheriff, drawn by the clear hierarchy and disciplined environment. Her ambition is to secure a stable, respected position where she can apply her organizational strengths, achieve professional certifications,
    and eventually move into a supervisory role.
