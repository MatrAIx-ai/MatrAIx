  hobbies: '[''Bridge'', ''Community Theater'', ''Gardening'', ''Attending Trenton Thunder Baseball Games'', ''Volunteer Work at Senior Center'', ''Traveling to Historical Sites'', ''Reading Biographies'',
    ''Woodworking'', ''Cooking'', ''Digital Photography'', ''Genealogy Research'']'
  career_goals: Although retired from formal employment, Joey aims to channel his business acumen into volunteer leadership. He seeks a board position with the local historical society, wants to establish
    a scholarship fund for Trenton high‑school graduates pursuing business studies, and plans to mentor young professionals through a community entrepreneurship program. He also hopes to complete a memoir
    documenting his family's migration story and to continue expanding his knowledge through adult‑education courses in digital media and local history.
