  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Playing acoustic guitar'', ''Reading philosophy, history and creative nonfiction'', ''Walking in Druid Hill Park'', ''Container
    gardening'', ''Journaling and poetry for emotional processing'', ''Volunteering at community art workshops'', ''Attending jazz performances'', ''Participating in a book club'']'
  career_goals: Motivated by his lifelong curiosity and desire to make a deeper impact, William plans to enroll in an accredited associate‑degree nursing program to become a Registered Nurse within the
    next three years. He aims to specialize in geriatric and mental‑health nursing, integrating art‑therapy techniques he has experimented with into patient care. Long‑term, he hopes to take on a mentorship
    role for younger staff, lead a patient‑support group for seniors dealing with anxiety, and eventually pursue a bachelor’s degree in nursing education to train the next generation of compassionate caregivers.
