  career_goals: At 54, Weicheng aims to transition into a senior executive role such as Director of Operations or Vice President of Operations, where he can steer organization-wide digital transformation
    initiatives, particularly integrating AI-driven predictive analytics into supply chain workflows. He also aspires to mentor the next generation of managers, champion sustainable operational practices,
    and eventually establish his own consultancy focused on operational excellence for midsize firms in the Pacific region. Balancing his curiosity with practicality, he seeks roles that offer strategic
    impact while allowing flexibility to explore innovative process solutions.
