  hobbies: '[''Cooking Mexican dishes'', ''Dancing (cumbia, salsa)'', ''Volunteer work at local food pantry'', ''Gardening'', ''Walking in local parks'', ''Reading self‑help books'', ''Mindfulness meditation'',
