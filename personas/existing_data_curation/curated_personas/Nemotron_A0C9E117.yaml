  career_goals: Kiara aims to move from frontline assembler to a supervisory or lead position within the next three years. She plans to earn a Certified Welder credential and complete an OSHA Trainer certification,
    which will enable her to lead safety briefings and mentor staff. Long‑term, she dreams of opening a small community‑focused fabrication shop where she can train local youth and provide affordable custom
    metalwork. She also wants to improve her stress‑management skills, incorporating wellness practices into her daily routine to maintain emotional balance while pursuing professional growth.
