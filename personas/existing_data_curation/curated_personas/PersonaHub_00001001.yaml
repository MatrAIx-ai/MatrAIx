persona_description: A professional civil engineer who is interested in the testing and analysis of materials for use in subgrade layers of flexible pavements. They are familiar with the California Bearing
  Ratio test and its purpose in determining the strength and thickness of subgrade materials. They are also interested in the use of curves to predict pavement thickness based on the test results, and are
  looking for ways to simplify the process of calculating resilient modulus. They are seeking information on how to use CBR instead of resilient modulus to determine the appropriate thickness for subgrade
  materials.
