  hobbies: '["Visiting art museums and galleries", "Watercolor painting", "Collecting contemporary prints", "Community basketball league", "Coaching youth robotics", "Rotary Club volunteer work", "Kayaking
    on Lake Michigan", "Fishing trips", "Travel to culturally rich cities", "Attending concerts and theater performances"]'
  career_goals: Anthony aims to progress from plant‑level management to a regional director of operations, where he can drive strategic initiatives such as digital transformation of manufacturing processes
    and sustainability programs that reduce the plant’s carbon footprint. He is motivated to champion advanced analytics and IoT integration on the shop floor, positioning his organization at the forefront
    of Industry 4.0. Additionally, he aspires to mentor the next generation of production leaders, establishing a formal development program within his company, and to become a recognized speaker at industry
    conferences on the convergence of creative thinking and efficient manufacturing.
