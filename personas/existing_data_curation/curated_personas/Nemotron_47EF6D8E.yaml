  career_goals: As she approaches retirement, Nirja aims to transition into a senior advisory role where she can mentor the next generation of sales professionals and help her company refine its strategic
    planning processes. She also wishes to contribute to her local South Asian community by establishing a small scholarship fund for students pursuing business studies, and to consult part‑time for small
    manufacturers seeking to improve their market outreach. Her competitive spirit drives her to leave a lasting legacy of professionalism and integrity.
