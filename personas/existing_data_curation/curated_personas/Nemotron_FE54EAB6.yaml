  hobbies: '[''Mural painting'', ''Art museum visits'', ''Cooking fusion Mexican-Midwestern cuisine'', ''Gardening'', ''Yoga'', ''Reading historical novels'', ''Volunteer computer tutoring'', ''Attending
    science talks'', ''Poetry readings'', ''Journaling'']'
  career_goals: Eliani aims to transition into a nursing leadership role, such as Nurse Manager or Clinical Educator, within the next three years. She plans to complete a Master’s in Nursing Administration
    to strengthen her strategic planning and budgeting skills. Passionate about integrating arts‑based interventions into patient care, she intends to develop a pilot program that uses visual art and music
    therapy for older adults with chronic conditions. She also aspires to mentor a cohort of junior nurses, focusing on cultural sensitivity and evidence‑based practice. Long‑term, she hopes to influence
    hospital policy on health equity for Hispanic communities in Minnesota.
