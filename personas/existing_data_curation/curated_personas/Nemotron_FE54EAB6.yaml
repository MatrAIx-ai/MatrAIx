personas:
  professional: Eliani Fernandezsalvador, a meticulous 58‑year‑old registered nurse with a strong STEM foundation, blends expert clinical assessment, acute‑care mastery, and health‑informatics acumen to
    lead quality‑improvement initiatives while pursuing a Master’s in Nursing Administration to transition into nursing leadership that integrates arts‑based therapies for older adults.
  sports: Eliani Fernandezsalvador stays active by jogging along the Chain of Lakes trail each spring, joining a midsized winter curling league at the St. Paul Curling Club, cheering for the Minnesota Twins
    and Vikings, and fitting three weekly yoga sessions into her disciplined schedule.
  arts: Eliani Fernandezsalvador immerses herself in the visual arts by regularly touring the Minneapolis Institute of Art, drawing inspiration from Frida Kahlo’s vivid self‑portraits and Georgia O’Keeffe’s
    floral abstractions, and contributes her own brushstrokes to community murals that echo the colorful folk motifs of her heritage, while also attending poetry nights featuring works by local bards such
    as Sam Hamill.
  travel: Eliani Fernandezsalvador plans her leisure trips with the same methodical rigor as her work schedules, favoring week‑long road trips through the Great Plains to historic sites in Kansas City and
    Santa Fe, while saving for a dream cultural immersion tour of Andalusian villages and the vibrant markets of Oaxaca.
  culinary: Eliani Fernandezsalvador brings a seasoned palate to her kitchen, expertly merging chilies, fresh cilantro, and locally sourced Minnesota wild rice into signature dishes like chipotle‑corn chowder
    and beet‑infused enchilada rolls, while occasionally over‑salting her salsas in her quest for the perfect heat.
  core: Eliani Fernandezsalvador fuses clinical precision with boundless curiosity for art and culture, balancing meticulous spreadsheets and nursing charts with spontaneous mural painting sessions, even
    if she sometimes forgets to water her garden until the last minute.
background:
  cultural: Eliani was born in Oaxaca, Mexico, and moved to the United States in her early twenties. She maintains strong ties to her Mexican roots through language, family traditions, and community involvement.
    Bilingual in Spanish and English, she celebrates Día de los Muertos and Semana Santa with family, prepares traditional dishes, and participates in local Mexican‑American cultural festivals in Saint
    Paul. Her upbringing emphasized collectivism, respect for elders, and a deep sense of hospitality, which she brings to her nursing practice by providing culturally sensitive care. While she embraces
    Midwestern values of punctuality and community service, she blends them with Mexican customs, creating a unique bicultural identity that informs both her personal life and professional ethos.
