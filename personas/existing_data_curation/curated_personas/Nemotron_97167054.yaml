personas:
  professional: Lyly Cho is a registered nurse who blends a STEM‑trained analytical mindset with meticulous routine‑driven care, bilingual patient education, and an outgoing, assertive style to orchestrate
    shift schedules, mentor newcomers, and uphold patient safety on a busy medical unit.
  sports: Lyly Cho fuels their energetic lifestyle with weekly Zumba and yoga classes, regular hikes in the Sierra foothills with the local Sierra Trails Club, and cheering on the Oakland Athletics and
    Golden State Warriors, all while they favor flexible workout routines that fit around unpredictable shift changes.
  arts: Lyly Cho immerses themselves in K‑pop choreography with a weekly dance troupe, streams Korean dramas like ‘Crash Landing on You,’ and enjoys contemporary fiction from authors such as Sally Rooney,
    while also appreciating performances by BTS and Blackpink that blend vibrant visuals with catchy beats.
  travel: Lyly Cho prefers spontaneous, budget‑friendly getaways, often planning weekend trips to Lake Tahoe for snow play, a mellow drive to Napa Valley for wine tasting, and dreaming of a cultural immersion
    trip to Seoul’s bustling markets once their Master’s program is completed.
  culinary: Lyly Cho loves hosting dinner parties where they skillfully prepare bibimbap with gochujang‑glazed vegetables, homemade kimchi, and spicy tteokbokki, while they also experiment with fusion dishes
    like bulgogi tacos, relishing the aromatic kick of sesame oil and the satisfaction of seeing friends devour every bite.
  core: Lyly Cho balances a routine‑focused nursing career with a love for lively group activities, a habit of last‑minute budgeting, occasional health‑care procrastination, and a quirky tendency to rehearse
    K‑pop dance moves in the kitchen while the kimchi ferments.
background:
  cultural: Lyly comes from a Korean‑American family that maintains strong ties to their cultural heritage while fully embracing life in the United States. She grew up bilingual, speaking both Korean and
    English, and celebrates traditional holidays such as Lunar New Year and Chuseok with family rituals, food, and community gatherings. Her upbringing emphasized the value of education, respect for elders,
    and community service, which influence her compassionate approach to nursing. In Merced, she bridges cultures by providing culturally competent care to a diverse patient population, including Spanish‑speaking
    farmworkers, and by participating in local Korean cultural festivals and church events. This blend of East Asian traditions and Californian community life shapes her worldview and informs both her professional
    and personal pursuits.
