  career_goals: Lyly aims to advance to a charge nurse role within the next two years, using her strengths in routine management and flexible problem‑solving to improve unit efficiency. She plans to pursue
    a Master of Science in Nursing with a focus on nursing education or health informatics, allowing her to design and teach evidence‑based patient‑safety programs. Long‑term, she hopes to develop a community
    outreach initiative in Merced that provides bilingual health‑literacy workshops for underserved farmworker families, bridging cultural gaps and promoting preventive care. Balancing her desire for a
    stable schedule with opportunities for innovative program development, she also seeks to champion staff wellness initiatives to mitigate stress and burnout.
