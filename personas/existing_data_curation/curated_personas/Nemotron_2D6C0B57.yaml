  hobbies: '[''Reading historical non-fiction'', ''Yoga and mindfulness meditation'', ''Gardening (herbs and vegetables)'', ''Cooking South Asian cuisine'', ''Watching cricket and soccer'', ''Playing chess'',
    ''Walking in local parks'']'
  career_goals: He aims to advance to a district manager role within the next two to three years, overseeing multiple stores and implementing region‑wide training programs that embed structured best‑practice
    SOPs while allowing for local flexibility. He also plans to complete an executive leadership certificate to strengthen strategic planning skills. Long‑term, he dreams of opening a small family‑owned
    boutique that blends modern retail concepts with South Asian cultural products, providing a stable and predictable business environment for his family and community.
