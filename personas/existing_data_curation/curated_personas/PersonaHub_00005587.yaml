persona_description: A scientist working at the Agricultural Research Service (ARS) in Athens, Georgia, specifically in the Poultry Processing and Meat Quality Research Unit. The scientist is responsible
  for developing and testing a real-time imaging system that can detect contaminants on food surfaces, including feces and recently ingested materials on animal carcasses. The scientist has a background
  in poultry processing and meat quality research and is part of a team of researchers at the University of Georgia, ProVision Technologies (Stennis Space Center, Miss.), and the Institute of Technology
  Development. The scientist has filed a patent application covering a wide range of poultry and meat products and is working on an on-line prototype that will operate at 140 birds per minute. The scientist
  is also involved in a cooperative research and development agreement with Stork Gamco Inc., Gainesville, Ga., and expects to test the first prototype system in the lab's pilot-scale processing plant by
  September of this year.
