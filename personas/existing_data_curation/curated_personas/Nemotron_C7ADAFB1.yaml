personas:
  professional: Erick Shum, a teenage visual arts enthusiast with a flair for graphic design and community outreach, leverages Procreate, Canva, and bilingual fluency to orchestrate school art events and
    mentor peers, blending methodical planning with compassionate storytelling to envision future public murals.
  sports: Erick Shum, a regular midfielder on the Eastside Soccer Club’s U‑16 team, enjoys weekend matches at the Houston Sports Park, follows the Houston Dynamo’s MLS season, and cheers for the Houston
    Rockets during the NBA playoffs, while using soccer drills to stay fit.
  arts: Erick Shum, a digital comic creator inspired by Brian K. Vaughan and Studio Ghibli, sketches characters in Procreate, photographs vibrant murals by Banksy and local Houston street artists, and immerses
    themselves in graphic novels like "Saga" and "Watchmen", while strumming acoustic renditions of John Mayer and Ed Sheeran.
  travel: Erick Shum, an adventure‑curious teen who frequents Texas art festivals such as Austin’s SXSW and San Antonio’s Fiesta, dreams of a backpack trip to Mexico City’s mural districts and a weekend
    getaway to Barcelona’s Park Güell, and plans trips on a family‑budget spreadsheet using Google Flights and Hostelworld.
  culinary: Erick Shum, a budding home chef who loves crafting chicken‑tinga tacos, avocado‑lime quesadillas, and buttery churros, frequently experiments with cilantro‑infused salsa and jalapeño‑spiked
    guacamole, while mastering basic pasta al pesto on a modest kitchen setup.
  core: Erick Shum, a methodical yet energetic teenage artist who hoards sketchbooks, juggles soccer practice with community mentorship, and can’t resist a late‑night taco run after a mural shoot.
background:
  cultural: Erick is a second‑generation Mexican‑American raised in Humble, Texas. His family originates from Jalisco, and he grew up bilingual, speaking Spanish at home and English at school. He participates
    in cultural traditions such as Día de los Muertos, quinceañera celebrations, and local Hispanic festivals featuring mariachi music and Mexican cuisine. This blend of Mexican heritage and Texan environment
    informs his values of family, community service, and appreciation for multicultural art.
