  career_goals: Erick aims to pursue a degree in visual arts and community development, aspiring to become a community arts coordinator who designs public mural projects and youth art workshops. He envisions
    launching a non‑profit that uses art to empower at‑risk teens in the Houston area, while also working as a graphic designer for socially‑focused campaigns.
