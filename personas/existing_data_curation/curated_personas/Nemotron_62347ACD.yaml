  career_goals: Her primary ambition is to become a senior partner and lead her firm's technology and innovation practice, shaping firm strategy around emerging technologies. She also aims to establish
    a pro bono clinic that provides legal assistance to Cuban immigrants and small‑business owners in New York, leveraging her community ties. Additionally, she plans to author a practical guide on navigating
    data‑privacy law for Latin‑American startups and to continue mentoring the next generation of women lawyers, fostering a supportive and collaborative environment.
