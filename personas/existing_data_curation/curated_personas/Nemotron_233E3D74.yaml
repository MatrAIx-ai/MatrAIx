personas:
  professional: John Greene combines over 25 years of pipefitting mastery with certifications in backflow prevention and pipe stress analysis to lead small crews installing energy‑efficient heating systems,
    channeling their curiosity‑driven meticulousness and competitive edge into flawless, code‑compliant projects while gradually shifting toward supervisory oversight.
  sports: John Greene spends early mornings fishing on Big Lake, hikes local trails each autumn, roots for the Minnesota Vikings and Twins, joins a casual adult softball league for friendly competition,
    and prefers solitary cardio walks over team sports, channeling their competitive nature into personal fitness milestones.
  arts: John Greene finds creative release in crafting scale model steam locomotives and hand‑building wooden stools while listening to Neil Young and Mark Knopfler, and they regularly unwind with David McCullough
    biographies and true‑crime podcasts narrated by Sarah Koenig, blending technical precision with artistic appreciation.
  travel: John Greene favors low‑key, self‑guided road trips that blend work and wilderness, having explored fishing at Oregon’s Crater Lake, visited the railway museum in Seattle, and planning a future
    pilgrimage to Norway’s Flåm Railway for its historic steam locomotives, yet budget constraints keep most weekends anchored to the Twin Cities suburbs.
  culinary: John Greene enjoys hearty Midwestern fare, preparing pan‑fried walleye with lemon butter, a rustic beet and goat‑cheese salad, and smoked pork ribs, while their modest kitchen skills shine during
    occasional experiments with smoked paprika rubs and pairing meals with craft beers such as Lagunitas IPA.
  core: John Greene is a pragmatic, curiosity‑driven pipefitter who balances competitive ambition with a solitary lifestyle, often wrestling with worry‑induced stress yet finding calm in precise hobbies
    and steady, frugal routines.
background:
  cultural: John grew up in a modest, middle‑class family in central Minnesota, where Scandinavian‑American traditions and Lutheran community values emphasized hard work, self‑reliance, and modesty. The
    region’s seasonal extremes and close‑knit towns fostered a practical, outdoors‑oriented lifestyle. He maintains family customs such as celebrating traditional holidays (Thanksgiving, Christmas, and
    Minnesota’s State Fair) and regularly participates in community service projects organized by his local church. While his upbringing is rooted in typical Midwestern culture, he respects the growing
    cultural diversity of Sherburne County and has made an effort to learn about the local Dakota heritage and environmental stewardship practices.
