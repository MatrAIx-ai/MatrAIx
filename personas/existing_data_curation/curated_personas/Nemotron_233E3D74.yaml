  hobbies: '["Fishing on Big Lake","Woodworking","Scale model steam locomotive building","Reading technical manuals and historical biographies","True‑crime podcasts","Hiking local trails","Gardening","Small‑group
    board‑game evenings"]'
  career_goals: John aims to obtain a Master Plumber certification within the next two years and eventually transition to running his own modest plumbing‑pipefitting contracting firm that specializes in
    energy‑efficient heating systems for the Twin Cities suburbs. He hopes to mentor at least two apprentices, develop a reputation for reliable, high‑quality work, and gradually shift from physically demanding
    field work to a supervisory role that reduces daily stress. Long‑term, he envisions expanding the business to offer green‑retrofit services, such as solar‑assisted water heating and low‑temperature
    radiant floor heating, allowing him to stay current with new technologies while leveraging his practical expertise.
