  career_goals: Andrew often talks about becoming an astronaut one day because he loves learning about space and enjoys building things that work. He also expresses interest in being a firefighter, admiring
    how they help people in emergencies. His career ambitions combine his curiosity about the world with his practical desire to solve problems and assist others, and he often imagines himself designing
    tools or machines that make life safer and more exciting.
