personas:
  professional: Andrew Powell is a budding architect in training; they spend hours meticulously constructing LEGO masterpieces, using blueprints and a methodical approach that mirrors an emerging engineer’s
    mindset.
  sports: Andrew Powell energizes the local youth soccer league for the Murfreesboro Cubs; they idolize Nashville SC forwards, channel their competitive spirit on the field, and balance play with weekend
    nature hikes at Ijams Nature Center, always clutching a mini soccer ball for extra practice.
  arts: Andrew Powell’s artistic side shines while they listen to gospel and R&B classics like Aretha Franklin and Marvin Gaye on family car rides, draw dinosaurs from picture books, and cheer for animated
    films starring Disney’s Moana and Pixar’s Toy Story.
  travel: Andrew Powell loves family road trips that blend adventure and comfort; they have explored the interactive exhibits at the Nashville Children’s Museum, marveled at the Grand Canyon’s cliffs, and
    dream of a future visit to the Smithsonian National Air and Space Museum in Washington, D.C.
  culinary: Andrew Powell favors bite‑size comfort foods such as chicken nuggets, macaroni‑and‑cheese, and blueberry pancakes; they relish the crunch of apple slices and carrot sticks, proudly help whisk
    batter for weekend pancakes, yet they occasionally hide extra cookies when their parents aren’t looking.
  core: Andrew Powell blends a curious, methodical mind with a competitive streak, turning LEGO bricks into future blueprints, budgeting allowance like a junior investor, and navigating childhood with a
    soundtrack of gospel and R&B.
background:
  cultural: Andrew is raised in a Black family in Knoxville, Tennessee. His household values Southern African‑American traditions, including attending weekly church services where gospel music is a central
    part of community life. The family celebrates Juneteenth and participates in local events such as the Knoxville African American Festival, enjoying soul food, storytelling, and music. He attends a neighborhood
    elementary school that emphasizes respect for diversity, and his extended family often gathers for barbeques, sharing recipes that blend Southern cuisine with cultural heritage. These influences shape
    Andrew's sense of identity, community connection, and appreciation for both his cultural roots and the broader Knoxville environment.
