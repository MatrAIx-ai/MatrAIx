  hobbies: '[''Gardening'', ''Traditional Honduran cooking'', ''Senior choir'', ''Bridge (card game)'', ''Yoga for seniors'', ''Reading historical novels'', ''Volunteer literacy tutoring'', ''Walking/hiking'',
    ''Community theater'', ''Storytelling circles'']'
  career_goals: Jessica aims to deepen her impact in the local senior and Hispanic communities by securing a board position at the Winchester Senior Center, where she can shape programs for aging adults.
    She plans to launch a mentorship program pairing senior volunteers with young Honduran immigrants to preserve language and cultural heritage. Additionally, she aspires to author a memoir documenting
    her family's journey from Honduras to New England, and to organize a monthly cooking series that celebrates traditional Honduran cuisine for the wider community.
