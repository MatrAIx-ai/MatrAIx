  career_goals: Approaching retirement, Widley aims to transition into a mentorship‑focused role where he can pass his institutional knowledge to the next generation of supervisors. He plans to formalize
    a peer‑support network for senior staff to reduce workplace stress and improve morale. Seeking personal fulfillment, he hopes to complete his GED and earn a certificate in community leadership, which
    will empower him to volunteer as a job coach at a local community center. Widley also aspires to champion diversity and inclusion initiatives within his organization, ensuring that African‑American
    workers have a stronger voice and clearer pathways to advancement.
