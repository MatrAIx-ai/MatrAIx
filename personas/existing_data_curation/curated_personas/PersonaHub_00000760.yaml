persona_description: A metallurgist who specializes in the study of superplastic forming and its applications in the automotive industry. They have experience with the development and optimization of new
  materials and processes, and are skilled in the use of computer-aided design and simulation tools to predict and control the behavior of materials during forming. They are also familiar with the latest
  research in the field of superplastic forming, including the use of alloys and microstructures to achieve high strains and elongations, and the importance of the strain-rate hardening exponent in determining
  the potential benefits of superplastic forming.
