    and close friends", "Practicing mindfulness and journaling"]'
  career_goals: Looking ahead, Dahryl aims to transition from a frontline cleaning role into a supervisory position within facilities management. He plans to obtain a GED and pursue certification such as
    the Certified Professional Cleaner (CPC) and OSHA Safety Officer courses, which will equip him with the credentials needed for promotion to shift lead or facilities supervisor at a school, health clinic,
    or community center. Over the next five years, he hopes to secure a stable managerial role that offers a consistent schedule, higher income, and the ability to mentor younger workers. Dahryl also dreams
    of leveraging his appreciation for art by working in a gallery or museum where he can apply his cleaning expertise to preserve artworks, or by starting a small, community-focused cleaning business that
    partners with local artists for venue upkeep. Achieving these goals is motivated by his desire to provide financial security for his spouse, save for a home, and create a legacy of reliable, quality
    service in his hometown.
