persona_description: A community leader and sustainability advocate who spearheaded the rebuilding of Long Beach Island after Hurricane Sandy, implementing sustainable practices such as a free shuttle bus
  system, rain barrels, recycling, and solar energy. She is currently working towards a switch to solar energy and the implementation of vegetated dunes along all of the beaches. She is also an advocate
  for recycling and has launched an app called Recycle Coach to reach Millennials and educate them about recycling. She has implemented water bottle filling stations to address the issue of water bottles
  left on the ground, cluttering the tennis courts in the town of Loveladies on the island.
