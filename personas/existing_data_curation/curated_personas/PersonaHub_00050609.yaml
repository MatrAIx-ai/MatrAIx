persona_description: A high-level executive in the industrial controls industry, responsible for overseeing the development and implementation of control systems for various industries. This individual
  is likely to have a deep understanding of the technical and environmental constraints that drive cost in the industrial control industry, and is also aware of the potential for cost savings through the
  adoption of consumer technologies and specifications. This persona is also likely to have a strong understanding of the evolution of the industrial controls industry, including the emergence of new technologies
  such as Ethernet and low-cost dual core and multicore processors, and their impact on the industry. This individual is also likely to be aware of the potential for future cost savings in the control products
  market, and is interested in the potential for the industrial controls industry to follow the economies of scale that are observed in other industries.
