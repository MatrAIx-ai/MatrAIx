personas:
  professional: Arnaldo Irizarry is an aspiring junior IT support specialist, leveraging meticulous organizational skills, bilingual fluency, and hands‑on mechanical aptitude to troubleshoot hardware and
    software issues with a methodical, calm approach despite occasional worry about meeting deadlines.
  sports: Arnaldo Irizarry follows the San Diego Padres in baseball and the San Diego Wave in women's soccer, participates in a weekend recreational basketball league at the community center, and prefers
    structured workouts like interval treadmill runs over spontaneous activities, though they often skip a session after a long gaming night.
  arts: Arnaldo Irizarry finds solace in listening to mariachi classics by Los Camperos and folk ballads by Lila Downs, sketches scenes from their favorite video game worlds during breaks, and occasionally
    attends local performances at the neighborhood church’s cultural festival, where they admire traditional dances.
  travel: Arnaldo Irizarry enjoys meticulously planning short road trips, favoring destinations like Tijuana for family reunions, Oaxaca to explore traditional cooking workshops, and the historic streets
    of Seville for its vibrant festivals, while budgeting each journey with a spreadsheet to ensure no overspending.
  culinary: Arnaldo Irizarry loves preparing tacos al pastor with pineapple and achiote, mastering the art of hand‑shaped tamales stuffed with pork and masa, and experimenting with guajillo‑based mole sauce,
    though they often forget to refrigerate leftovers promptly, leading to occasional food‑safety lapses.
  core: Arnaldo Irizarry balances a meticulously organized mind and a love for precise model building with a lingering anxiety that fuels both disciplined study habits and occasional over‑cautiousness,
    all while juggling a quiet passion for bilingual tech support and family‑rooted cooking.
background:
  cultural: Arnaldo is a first‑generation Mexican American raised in San Diego’s vibrant border‑region community. He grew up in a bilingual household where Spanish was spoken at home and English at school,
    giving him fluency in both languages and a deep appreciation for Mexican cultural traditions. Family gatherings often feature celebrations of Día de los Muertos, quinceañeras, and holidays centered
    around food, music, and storytelling. He is connected to his local Mexican community through a neighborhood church, a youth group at a community center, and regular visits to his grandparents in Tijuana.
    This bicultural environment shapes his values of family loyalty, respect for elders, and the importance of hard work, while also exposing him to the broader American cultural context of individualism
    and academic achievement. He navigates the interplay of these influences, which informs his aspirations to succeed academically and give back to his community.
attributes:
  skills: '[''Basic computer operation'', ''Microsoft Office and Google Workspace proficiency'', ''Introductory Python programming'', ''Bilingual Spanish-English translation'', ''Personal scheduling and
    project organization'', ''Routine car maintenance'', ''Basic household appliance troubleshooting'', ''Volunteer tutoring for elementary students'']'
  hobbies: '[''Scale model building (cars, airplanes)'', ''Strategy video gaming'', ''Journaling and sketching'', ''Listening to Mexican folk and mariachi music'', ''Cooking traditional Mexican dishes'',
    ''Small group board game nights'', ''Collaborative coding projects with friends'']'
  career_goals: Arnaldo aims to pursue a career that blends his practical mindset, technical curiosity, and desire for stable, structured work. In the short term, he plans to obtain a GED and enroll in
    a community college program focused on information technology or mechanical engineering. He hopes to become a certified computer support specialist or junior technician, eventually working in network
    administration or IT help‑desk roles where clear procedures and systematic problem‑solving are central. Over the longer term, he envisions earning an associate’s degree and then a bachelor’s in engineering
    technology, with the ambition to work in a manufacturing environment that values precision and reliability. He also wants to achieve financial independence to support his family and give back to his
    community, and he aspires to mentor younger students who face similar academic and personal challenges.
