persona_description: A network administrator who is responsible for configuring and managing a DHCP server and its associated IP addresses. The administrator is skilled in managing DHCP client names, determining
  the appropriate client configuration macros, and configuring IP addresses for networks. They are familiar with the process of dynamically and permanently allocating IP addresses, and are skilled in determining
  the optimal lease type for the network. They are also knowledgeable in the use of network management tools and have experience in configuring and monitoring DHCP networks.
