personas:
  professional: Francisca Casals, a seasoned residential and historic‑home carpenter with 25 years of hands‑on expertise, blends modern CNC technology with traditional joinery while mentoring apprentices
    and steering small crews toward code‑compliant, budget‑efficient renovations.
  sports: Francisca Casals enjoys weekend hikes in the Blue Ridge foothills, follows the Carolina Panthers and UNC Tar Heels, and participates in a local adult soccer league with the Asheville FC Recreation
    team, prioritizing low‑impact cardio over high‑intensity gym sessions.
  arts: Francisca Casals finds artistic inspiration in the woodcraft videos of Marc Dean and the folk melodies of Los Panchos, regularly attends regional craft fairs featuring artisans like Jane Miller,
    and collects limited‑edition prints by American realist painter Andrew Wyeth.
  travel: Francisca Casals favors meticulously planned road trips that blend cultural immersion with outdoor discovery, having driven the Pacific Coast Highway to capture sunsets in Big Sur, explored the
    colonial streets of Antigua Guatemala, and now envisions a future workshop‑tour through the historic towns of Andalusia.
  culinary: Francisca Casals dazzles friends with homemade pupusas stuffed with loroco and cheese, expertly fried yuca with garlic aioli, and rustic tamales seasoned with annatto, while their garden’s fresh
    tomatoes and peppers often star in salsa verde that they grate by hand.
  core: Francisca Casals is a meticulous, curiosity‑driven carpenter who balances tradition with technology, channels savings into a future boutique workshop, and finds solace in solitary woodworking, garden‑fresh
    cooking, and quiet hikes.
background:
  cultural: 'Francisca was born in a small town near San Salvador and moved to the United States as a teenager, settling in Winston‑Salem with his family. Growing up in a bilingual household, he learned
    to value the close‑knit community ethos of Salvadoran culture—emphasizing mutual aid, respect for elders, and celebration of shared traditions. He participates in local El Salvadoran gatherings, such
    as the annual Fiesta de la Independencia and weekend rumba events, where he shares homemade pupusas and dances to cumbia. His Salvadoran roots influence his work ethic: a blend of meticulous craftsmanship
    and collaborative spirit that he brings to every project. While he embraces American building standards, he often incorporates subtle design elements—like the geometric patterns of traditional “cincel”
    woodwork—into his custom pieces, bridging his heritage with his present life.'
