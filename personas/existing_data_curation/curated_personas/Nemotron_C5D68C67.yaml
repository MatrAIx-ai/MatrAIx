  career_goals: His immediate goal is to earn the North Carolina Certified Journeyman Carpenter credential, which will position him to secure larger renovation contracts. Over the next five years he aims
    to open a boutique workshop that specializes in reclaimed‑wood furniture integrating subtle Salvadoran design motifs. He also plans to formalize a mentorship program for young immigrants and high‑school
    apprentices, passing on both technical skills and the value of collaborative work. Long‑term, he hopes to transition into a semi‑retired role where he teaches woodworking classes, writes a modest guide
    on sustainable carpentry, and ensures a stable income that supports his family and community responsibilities.
