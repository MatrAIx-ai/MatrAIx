persona_description: A historian who specializes in the study of the history of gentrification in Brooklyn, particularly the period from the 1960s to the present. She is particularly interested in the role
  of gentrification in the displacement of the Irish population and the subsequent rise of black communities in Fort Greene. She is also interested in the ways in which gentrification has affected the racial
  and economic makeup of Brooklyn and the broader urban landscape.
