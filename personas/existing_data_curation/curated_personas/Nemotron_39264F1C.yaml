  hobbies: '[''Gardening'', ''Cooking'', ''Reading'', ''Hiking'', ''Volunteer work at animal shelter'', ''Crafting (knitting/crocheting)'', ''Spontaneous road trips'', ''Community theater'', ''DIY home
    improvement'', ''Yoga'']'
  career_goals: Katherine aims to finish her bachelor's degree, focusing on nonprofit management or social work, to formalize her community‑service experience. She seeks a part‑time role in a nonprofit
    organization where she can apply her event planning and mediation skills while retaining flexibility for personal pursuits. In the next five years, she hopes to become a certified community mediator
    and eventually lead a community outreach program that supports underserved residents in Derby and Sedgwick County. She also envisions launching a small home‑based business selling handcrafted garden
    accessories, combining her practical talents with creative entrepreneurship.
