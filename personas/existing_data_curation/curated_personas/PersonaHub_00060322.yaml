persona_description: An economist who specializes in analyzing the egg industry, particularly focusing on trends in production, consumption, and pricing. She is knowledgeable about the industry's structure,
  including the size and scale of production, the role of different players, and the impact of market forces on supply and demand. She is also aware of the industry's environmental and social impacts, including
  the use of cage-free and enriched colony housing, and the potential for consolidation and technological change. She is interested in understanding how the industry will adapt to changing consumer preferences,
  regulatory requirements, and market dynamics, and how it will be affected by global economic and political events.
