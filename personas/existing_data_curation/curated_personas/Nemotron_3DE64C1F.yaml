  hobbies: '[''Gardening'', ''Reading historical nonfiction and classic literature'', ''Cooking Mediterranean cuisine'', ''Crossword puzzles'', ''Gentle yoga'', ''Small-group book club'', ''Mentoring nursing
    students'']'
  career_goals: Victoria aims to transition into a nursing leadership role within the next three years, pursuing a BSN and eventually a Master’s in Nursing Administration. She hopes to become a nurse manager
    or clinical educator, where she can mentor younger nurses, spearhead patient-safety initiatives, and shape unit policies. Long-term, she envisions contributing to community health programs in Nassau
    County, perhaps leading a home-health outreach team or serving on a hospital quality-improvement committee.
