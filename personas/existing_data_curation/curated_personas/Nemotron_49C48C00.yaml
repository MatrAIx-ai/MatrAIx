personas:
  professional: A seasoned analytical chemist who transitioned into community art curation, Carol Malcom merges rigorous experimental design with meticulous exhibition planning, utilizing her methodical
    nature to mentor youth in interdisciplinary STEM‑art workshops and deliver compelling public lectures.
  sports: A devoted fan of the Minnesota Twins and the Minnesota Wild, Carol Malcom follows the baseball season religiously, attends occasional winter games when weather permits, and participates in senior
    walking groups that meet at Lake Harriet for low‑impact cardio.
  arts: An avid watercolorist and gallery enthusiast, Carol Malcom draws inspiration from Monet’s hazy landscapes, Ansel Adams’s black‑and‑white photography, and local artist James C. Christensen, while
    regularly contributing intricate quilts to the Minneapolis Institute of Art’s annual charity auction.
  travel: A reflective traveler with a love for art and nature, Carol Malcom has explored the historic streets of Charleston, the shoreline of the Apostle Islands on Lake Superior, and dreams of visiting
    the Uffizi Gallery in Florence, always arranging trips through senior tour groups that accommodate her pace and budget.
  culinary: A garden‑to‑table connoisseur, Carol Malcom frequently prepares beet‑root salad with fresh goat cheese, wild‑rice soup seasoned with dill, and her signature rosemary‑infused roasted carrots,
    savoring the seasonal bounty of her vegetable plot while occasionally splurging on a perfectly seared walleye at a lakeside bistro.
  core: Carol Malcom’s disciplined curiosity fuels a lifelong blend of scientific rigor, artistic creation, and community service, all seasoned with a love of gardens, quilts, and modest indulgences.
background:
  cultural: Carol was raised in a Midwestern white family in Minnesota, where values of community service, modesty, and a strong work ethic were emphasized. Her upbringing in a Protestant household highlighted
    the importance of lifelong learning and civic responsibility, shaping her dedication to volunteerism and education. The vibrant Twin Cities arts scene and the region’s love of nature fostered her appreciation
    for both visual art and gardening. Her education at a state university’s STEM program reflects Minnesota’s commitment to accessible higher education, while her career at a major local research company
    underscores the state’s tradition of innovation. This cultural foundation blends traditional Midwestern values with an openness to new ideas, aligning with her curious, organized, and balanced personality.
