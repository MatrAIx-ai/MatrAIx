  career_goals: Although retired, Carol aims to stay intellectually active and give back to her community. She plans to write a memoir that weaves together her scientific career and her love of visual art,
    highlighting interdisciplinary insights for younger readers. She also hopes to serve as a guest lecturer at local schools and senior centers, promoting STEM literacy and art appreciation, and to lead
    a collaborative project documenting Minnesota’s scientific heritage in partnership with the Minnesota Historical Society. These ambitions reflect her curiosity, organized nature, and desire to nurture
    interdisciplinary learning for future generations.
