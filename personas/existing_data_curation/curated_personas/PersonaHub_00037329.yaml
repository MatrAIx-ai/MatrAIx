persona_description: A researcher in the field of disaster management and emergency response, specifically focused on the use of drones for disaster mapping and response. They have conducted extensive research
  on drone-based applications in various disaster types, including earthquakes, floods, and storms, and have identified gaps in the use of drones in response-related research. They are interested in demonstrating
  the potential of drones in acquiring visuals in a more timely manner than satellites and crewed aircraft, and have identified lower-income and urban areas as areas where further research is needed. They
  are likely to be knowledgeable about the use of drones in disaster response and have a strong interest in improving the use of drones in emergency management.
