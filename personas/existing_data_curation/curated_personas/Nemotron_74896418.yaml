  career_goals: Asvin aims to transition from a frontline sales manager to a regional sales director within the next four to five years, focusing on high‑growth technology sectors such as SaaS and IoT.
    He plans to earn a bachelor’s degree in Business Administration, obtain certifications like Certified Sales Professional (CSP) and Salesforce Administrator, and build a robust professional network through
    industry conferences. Long‑term, he envisions launching his own consultancy that helps emerging tech startups develop scalable sales processes, while also prioritizing personal growth in stress‑management
    and work‑life balance.
