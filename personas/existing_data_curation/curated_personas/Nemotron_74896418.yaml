personas:
  professional: Asvin Mahadevia, a 22‑year‑old front‑line sales manager, leverages fluent Hindi‑English communication, persuasive negotiation, and savvy use of Salesforce and Tableau to close B2B deals,
    thriving on the energy of group brainstorming sessions while embracing a flexible, sometimes improvised, approach to pipeline planning.
  sports: Asvin Mahadevia fuels his love for competition by playing pick‑up basketball at Klyde Warren Park and weekend soccer with a community league, while cheering the Dallas Mavericks in the NBA and
    the Dallas Cowboys in the NFL, and maintains fitness through a mix of spontaneous court drills and scheduled yoga classes.
  arts: Asvin Mahadevia immerses in artistic life by attending live indie rock shows featuring The Strokes and vibrant Bollywood dance performances by Shreya Ghoshal’s troupe, while also supporting local
    theater productions at The Dallas Theater Center, finding inspiration for his own culinary experiments.
  travel: Asvin Mahadevia prefers spontaneous weekend road trips to Austin and Tulsa, yet longs to explore the historic streets of Jaipur and the tech hubs of Tokyo, balancing relaxed planning with a desire
    for cultural immersion.
  culinary: Asvin Mahadevia, an enthusiastic home chef, reimagines classic butter chicken as butter chicken tacos using naan‑rolled tortillas, blends turmeric and smoked paprika, and regularly whips up
    paneer tikka pizza topped with fresh cilantro and mango chutney for friends.
  core: Asvin Mahadevia is a charismatic sales aspirant who mixes spontaneous social energy with a dash of disorganized flexibility, constantly juggling tech ambitions, cultural celebrations, and a persistent
    worry that fuels his drive to stay ahead.
background:
  cultural: Asvin is a second‑generation Indian‑American, raised in a bilingual household where Hindi and English were spoken interchangeably. His parents immigrated from Gujarat, India, and instilled values
    of education, family cohesion, and cultural pride. He celebrates major Indian festivals such as Diwali, Holi, and Navratri with family and the wider community in Dallas‑Fort Worth, often participating
    in cultural performances and food fairs. While fully integrated into Texan life—enjoying the local music scene and outdoor sports—he retains a connection to Indian traditions through regular visits
    to Indian restaurants, listening to Bollywood music, and practicing yoga, which blends his cultural heritage with his personal wellness goals.
