personas:
  professional: Kevin Reyes is a budding web developer who builds playful, interactive sites for his friends’ skate crews, blending code with his love for street art and showing off a competitive drive
    to outdo peers in online hackathons, and they relish the challenge of turning visual concepts into functional experiences.
  sports: Kevin Reyes regularly joins pickup soccer matches at the community park, cheering for the Las Vegas Lights FC, while hitting the local skate ramp three times a week and using a mix of cardio drills
    and freestyle tricks to stay fit, and they treat each session as a competitive playground.
  arts: Kevin Reyes spends weekends tagging vibrant murals inspired by Banksy and Shepard Fairey, drafting digital illustrations of urban scenes in Procreate while blasting Bad Bunny’s reggaeton beats,
    Arctic Monkeys’ alternative rock riffs, and classic salsa from Celia Cruz, letting these eclectic sounds shape their visual storytelling.
  travel: Kevin Reyes prefers spur‑of‑the‑moment day trips to nearby Red Rock Canyon and occasional family vacations to the Grand Canyon, yet dreams of exploring the mural‑laden streets of Berlin, the cultural
    festivals of Oaxaca, and the street‑art scene in Valparaíso, planning each journey through YouTube vlogs and saved travel funds, and they balance wanderlust with school responsibilities.
  culinary: Kevin Reyes enjoys cooking family‑style dishes like baleadas stuffed with refried beans, fried eggs, cheese, and avocado, perfecting the crisped plantain side and a tangy salsa fresca, showing
    a moderate skill level in the kitchen while experimenting with new spice blends, and they often share meals with friends after soccer practice.
  core: Kevin Reyes is a 15‑year‑old artistic tech‑enthusiast who balances a fierce competitive streak with a love for community murals, soccer, and bustling gaming sessions, all while juggling school,
    savings, and a kitchen cluttered with family recipes.
background:
  cultural: Kevin comes from a Honduran immigrant family that settled in Las Vegas. At home, Spanish is the primary language, and the family preserves traditions such as celebrating Semana Santa, preparing
    baleadas, tamales, and other Honduran fare, and enjoying Honduran folk music. Living in a diverse Nevada community, he is immersed in a blend of Hispanic, Latin American, and broader American cultures,
    shaping his identity as a bilingual, culturally proud teenager who values family, community, and the vibrant artistic scene of his city.
