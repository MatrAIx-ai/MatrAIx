  career_goals: Kevin aims to earn a spot in a specialized high‑school arts program, then pursue a college degree in Graphic Design or Digital Media. He dreams of becoming a multimedia artist who blends
    his Honduran heritage with cutting‑edge digital storytelling, works at a creative studio or video‑game development company, and eventually launches his own brand of culturally infused visual content.
