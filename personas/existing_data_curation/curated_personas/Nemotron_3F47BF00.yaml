personas:
  professional: Angela Prudhomme, a 26‑year‑old information systems manager, leverages their solid technical foundation in network infrastructure and vendor coordination with a people‑first mindset, turning
    curiosity for emerging tech into practical, user‑friendly solutions while tolerating a bit of chaos in project timelines.
  sports: Angela Prudhomme enjoys weekend hikes on the Trent River Trail, runs with the Motor City Trailblazers Run Club for early‑morning 5K sessions, proudly follows the Detroit Lions and Detroit Red
    Wings, and they balance their love of outdoor activity with a relaxed approach to gym workouts, often swapping planned weight‑lifting days for spontaneous camping trips.
  arts: Angela Prudhomme captures candid moments with their DSLR at community music nights featuring local indie acts like a White Stripes tribute band, immerses themselves in contemporary fiction by Sally
    Rooney and tech‑focused non‑fiction by Sherry Turkle, and they occasionally stream classical performances by pianist Mitsuko Uchida while painting acrylic abstracts on rainy evenings.
  travel: Angela Prudhomme plans low‑key getaways that blend outdoor adventure with cultural immersion, having trekked the Apostle Islands, spent a weekend biking around Mackinac Island, and dreaming of
    exploring the culinary scene of Québec City while balancing a modest travel budget and occasional work‑related travel constraints.
  culinary: Angela Prudhomme, an eager home cook, frequently experiments with Michigan‑inspired dishes like cherry‑glazed pork tenderloin, Detroit‑style pizza topped with pepperoni and pickles, and a French‑inspired
    ratatouille using fresh tomatoes, zucchini, and thyme, while they also enjoy sipping craft beer from local breweries such as Founders.
  core: Angela Prudhomme is a curious yet laid‑back IT manager who blends practical tech solutions with community‑centric compassion, they occasionally let disorganization streak through budgeting and self‑care,
    all while nurturing a love for hiking, photography, and spontaneous culinary experiments.
background:
  cultural: Angela is a White American raised in a middle‑class family in Macomb County, Michigan. Her family's roots trace back to French‑Canadian ancestors, which have given her a modest appreciation
    for French language and occasional cultural festivals in the region. Growing up in the Midwest, she embodies the area's values of community involvement, modesty, and a strong work ethic. These cultural
    influences reinforce her compassionate, cooperative nature and her desire to contribute positively to both her workplace and local community.
attributes:
  skills: '[''IT project management'', ''Network infrastructure design and maintenance'', ''Vendor relationship and contract management'', ''Cybersecurity best practices implementation'', ''Agile and Scrum
    methodologies'', ''IT budgeting and cost control'', ''End‑user support and training'', ''Data analysis with Excel, SQL, and Power BI'', ''Technical documentation and SOP development'', ''Team leadership
    and conflict resolution'']'
  hobbies: '[''Hiking on the Macomb County trail system'', ''Volunteering to teach basic computer skills at the local community center'', ''Experimenting with new recipes and cooking for friends'', ''Reading
    contemporary fiction and technology non‑fiction'', ''Urban photography'', ''Participating in board game nights with friends'', ''DIY home automation projects using Raspberry Pi and smart devices'']'
  career_goals: Angela aims to expand her strategic impact within the tech field by earning a bachelor's degree in information technology or business administration and obtaining certifications such as
    PMP, ITIL, and CISSP. In the next few years she plans to lead larger digital transformation projects at her organization, mentor junior staff, and champion inclusive, user‑centered technology solutions.
    Long‑term, she envisions stepping into a senior IT director role where she can shape enterprise‑wide technology strategy, promote community outreach programs that improve digital literacy, and possibly
    launch a consultancy focused on helping small businesses and nonprofits in the Macomb area adopt sustainable tech practices.
