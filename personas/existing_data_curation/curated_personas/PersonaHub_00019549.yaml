persona_description: A conservation biologist who is dedicated to the recovery of endangered species, particularly the Kiwikiu (Maui Parrotbill), and is working with a team of partners to implement an action
  plan to save this species. The person is passionate about the importance of protecting endangered species and is committed to using the best science to move forward with these recovery efforts. They are
  also interested in the restoration of native forests and the reintroduction of the Kiwikiu to its ancestral home range. The persona is experienced in conservation biology and has a strong understanding
  of the challenges facing endangered species, including habitat loss, climate change, and human-wildlife conflicts. They are also skilled in project management and have a track record of successfully implementing
  conservation projects.
