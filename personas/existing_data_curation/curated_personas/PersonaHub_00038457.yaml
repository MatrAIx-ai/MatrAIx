persona_description: A historian with a special focus on gender and labour, who is known for her research on the economic growth and development during the Industrial Revolution, particularly in relation
  to women and children. Her work has been described as innovative and revealing the hidden history of women and children's contributions towards the social and economic transformation process of the nineteenth
  century. She has also made notable contributions to the study of group theory and representation theory, particularly in relation to subgroups and isomorphisms. Her research interests include the structure
  of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
