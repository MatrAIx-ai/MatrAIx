personas:
  professional: Andy Sensat is a 28-year-old network and systems administrator whose methodical, competition-driven mindset fuels a deep expertise in LAN/WAN design, Linux/Windows environments, virtualization,
    and cloud networking, and who leverages advanced scripting to automate infrastructure while meticulously charting a path toward senior network architect certification.
  sports: Andy Sensat is an avid outdoor enthusiast who spends weekends tackling Iowa’s rolling trails on a mountain bike with the Des Moines Cycling Club, logs regular hikes in the Loess Hills, cheers
    for the Iowa Hawkeyes football team, and participates in a Sunday recreational soccer league for a balance of cardio and camaraderie.
  arts: Andy Sensat is a sci-fi aficionado who devours novels like Neuromancer and The Expanse, attends local board-game meetups to battle over Terraforming Mars, streams indie rock playlists featuring
    Arcade Fire and Daft Punk, and occasionally attends the Iowa State Fair’s folk music stage.
  travel: Andy Sensat is a 28-year-old who favors meticulously planned road trips to Midwestern national parks such as Badlands and Black Hawk, while dreaming of a tech-centric pilgrimage to Seattle’s Museum
    of History & Industry and a future Japan trip to attend the AI Expo, balancing adventure with budget constraints.
  culinary: Andy Sensat is a home-brew hobbyist who experiments with Cascade and Citra hops to craft hoppy IPAs, enjoys cooking spicy chicken tacos and indulgent cheese curds nachos, and often leaves the
    brewing equipment un‑cleaned until the weekend, citing “creative flow” as a higher priority.
  core: Andy Sensat, a 28-year-old network admin turned aspiring architect, blends methodical precision with a competitive curiosity, balancing rigorous work with hiking, board games, craft beer, and a
    disciplined yet occasionally impulsive approach to finances and health.
background:
  cultural: Andy grew up in a middle‑class family in central Iowa, where Midwestern values of hard work, reliability, and community involvement shaped his outlook. He attended the University of Iowa for
    his STEM degree, where he engaged in student engineering societies and local volunteer initiatives. His marital life in Iowa City reflects a blend of traditional family orientation and modern partnership,
    with both partners supporting each other's professional growth. While his ethnic background is European‑American, Andy identifies with the regional culture of modesty, self‑reliance, and an appreciation
    for seasonal community events such as county fairs and local farm‑to‑table gatherings.
attributes:
  skills: '[''Network architecture'', ''LAN/WAN design and implementation'', ''Linux system administration'', ''Windows Server management'', ''Virtualization (VMware, Hyper-V)'', ''Cloud networking (AWS
    VPC, Azure Virtual Networks)'', ''Automation scripting (Python, Bash, PowerShell)'', ''Network security and firewall configuration'', ''Capacity planning and performance monitoring'', ''Disaster recovery
    and business continuity planning'', ''Technical documentation and SOP development'']'
  hobbies: '[''Hiking and biking on local trails'', ''Reading science‑fiction and technology non‑fiction'', ''Board‑game strategy nights'', ''Home‑brewing craft beer'', ''Mentoring students at community
    tech programs'']'
  career_goals: Andy aims to advance from his current role as a network and computer systems administrator to a senior network architect position within the next five years. He plans to achieve higher‑level
    certifications such as Cisco CCNP and CCIE, as well as cloud‑focused credentials like AWS Certified Solutions Architect. His long‑term ambition includes leading large‑scale infrastructure projects for
    a regional university or health‑care system, and eventually establishing his own consultancy focused on secure, high‑availability network designs for midsize enterprises in the Midwest.
