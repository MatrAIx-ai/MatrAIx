personas:
  professional: Johanna Negroncruz is a results‑focused marketing manager who blends analytical acuity in SEO/SEM and programmatic advertising with culturally resonant storytelling, using bilingual communication
    and meticulous project‑management tools to drive ROI while their energetic, collaborative nature sparks team creativity and keeps deadlines in check.
  sports: Johanna Negroncruz embraces an active lifestyle, hiking the Cascade foothills in spring, cycling with the Willamette River Cycling Club year‑round, cheering on the Portland Timbers and Seattle
    Seahawks, and staying fit through morning yoga, while occasionally joining a weekend basketball pickup game with friends.
  arts: Johanna Negroncruz is a passionate cultural participant, regularly attending salsa dancing classes set to the sounds of Celia Cruz and modern beats of Rosalía, enjoys indie folk melodies of Fleet
    Foxes, and draws inspiration from the films of Guillermo del Toro and the poetry of Rupi Kaur when crafting marketing copy.
  travel: Johanna Negroncruz favors purposeful travel, meticulously planning trips that blend cultural immersion with sustainable practices; they have explored the historic plazas of Oaxaca, trekked through
    Patagonia’s national parks, and aspire to visit the vibrant markets of Medellín and the sun‑kissed beaches of Portugal’s Algarve.
  culinary: Johanna Negroncruz is a confident home chef who loves hosting dinner nights featuring handmade corn tortillas, deep‑spiced mole sauce, and stuffed peppers with fruit‑nut fillings, while also
    experimenting with fusion twists such as quinoa‑crusted fish tacos with mango‑avocado salsa, often sourcing fresh cilantro, jalapeños, and lime from the community garden.
  core: Johanna Negroncruz blends analytical rigor with a zest for community, turning data into inclusive stories, dancing through salsa nights, and balancing a spreadsheet‑obsessed finance habit with a
    love for spontaneous cooking experiments—though they often forget to water their plants when buried in campaign deadlines.
background:
  cultural: Johanna grew up in a bilingual Mexican‑American household where Spanish was spoken daily and Mexican traditions were celebrated year‑round. Family gatherings featured homemade tamales, mole,
    and festive celebrations of Día de los Muertos and Cinco de Mayo, instilling a deep appreciation for her heritage. She maintains strong ties to the local Latino community in Eugene, volunteering at
    cultural festivals and supporting Spanish‑language outreach programs. These experiences have shaped her values of collectivism, respect for elders, and community service, and they inform her professional
    approach by integrating cultural insights into marketing strategies that resonate with diverse audiences.
