    outreach'']'
  hobbies: '[''hiking in the Cascade foothills'', ''biking on the Willamette River trail'', ''salsa dancing'', ''cooking Mexican cuisine'', ''volunteering at local food banks'', ''participating in community
    garden projects'', ''yoga'', ''reading marketing and business books'', ''traveling across Latin America'', ''photography of nature and cultural events'']'
  career_goals: Johanna aims to advance to a senior marketing director role within the next five years, overseeing regional and national campaigns for sustainable and socially responsible brands. She is
    passionate about championing inclusive marketing that authentically reflects multicultural audiences, especially the growing Latino market in the Pacific Northwest. In the long term, she envisions launching
    her own consultancy focused on culturally savvy brand strategy and mentorship programs that empower emerging marketers from underrepresented backgrounds.
