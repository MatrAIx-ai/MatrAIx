  career_goals: Leonard dreams of a future where he can serve his community in a structured, hands‑on role. He is drawn to becoming a firefighter because the job offers clear protocols, teamwork, and the
    chance to help others—values that match his practical mindset and love of routine. He also imagines himself as a mechanical engineer, designing and fixing practical tools and equipment, which satisfies
    his curiosity for how things work and his competitive desire to solve challenges efficiently.
