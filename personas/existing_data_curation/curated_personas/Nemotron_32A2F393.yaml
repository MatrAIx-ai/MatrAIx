  hobbies: '[''Gardening'',''Hiking'',''Cooking and Baking'',''Volunteer Work at Food Bank'',''Journaling'',''Yoga'',''Reading Non-fiction (Health, Psychology, Personal Development)'',''Landscape Photography'']'
  career_goals: Marline aims to complete her associate's degree in nursing at a local community college and transfer to a four‑year university to earn a Bachelor of Science in Nursing. Her long‑term ambition
    is to work as a registered nurse specializing in community health, delivering preventive care and health education to underserved populations in the Hill Country. She also aspires to obtain a Master’s
    in Public Health, eventually taking on a leadership role as a community health program manager, where she can design and implement structured wellness initiatives. She plans to combine her organizational
    strengths with her compassionate drive to improve health outcomes and foster community resilience.
