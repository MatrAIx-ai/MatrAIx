  career_goals: He plans to transition into a supervisory role within the next two years, aiming to become a shift lead or warehouse supervisor where he can mentor younger employees and improve operational
    efficiency. He also hopes to acquire a certification in supply‑chain management and eventually consult small local businesses on inventory optimization, securing a comfortable retirement for his family
    while maintaining a steady income.
