persona_description: A scientist or researcher who specializes in the study of marine biology and conservation, particularly in the field of shark conservation. They are interested in understanding the
  impact of human activities on shark populations and are dedicated to preserving these magnificent creatures. They are particularly interested in the impact of orcas on shark populations and the role of
  data collection efforts in monitoring and protecting these species. They have a strong background in marine biology and have conducted research in South Africa, specifically focusing on the great white
  shark population. They are aware of the challenges posed by the COVID-19 lockdown and its impact on data collection efforts, and are actively seeking ways to overcome these challenges. They are also aware
  of the importance of looking at the big picture and considering the impact of human activities on shark populations, while recognizing the limitations of data coverage and the need for long-term monitoring
  efforts.
