  career_goals: Gertrude aims to formalize her expertise by obtaining the Certified Bookkeeper credential within the next year, positioning herself for senior bookkeeping or accounting supervisor roles.
    She hopes to lead a small team at a nonprofit organization, using her practical skills to strengthen financial stewardship while mentoring younger staff. Her competitive drive pushes her to stay ahead
    of industry changes, so she plans to learn cloud‑based accounting platforms and explore a side consultancy that offers bookkeeping services to local family‑owned businesses. Ultimately, she seeks a
    balanced transition toward part‑time work that supports her retirement goals while keeping her intellectually engaged.
