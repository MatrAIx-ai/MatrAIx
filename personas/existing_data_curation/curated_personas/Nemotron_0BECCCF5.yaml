  hobbies: '[''Fishing'', ''Hunting'', ''Hiking'', ''Model airplane construction'', ''Remote‑control drone customization'', ''Strategy video gaming'', ''Reading DIY and technical manuals'', ''Volunteer
    work at 4‑H'']'
  career_goals: Michael aims to turn his hands‑on abilities into a professional trade. He plans to enroll in a vocational program to become a certified diesel mechanic, with the longer‑term goal of opening
    his own repair shop that serves both local farmers and residents of Butler County. He also considers pursuing an apprenticeship in HVAC installation to broaden his service offerings. Recognizing the
    value of formal credentials, he intends to obtain a high‑school equivalency diploma while gaining work experience. His competitive drive pushes him to become the go‑to technician in his region, and
    he hopes to eventually mentor younger teens who are interested in trades.
