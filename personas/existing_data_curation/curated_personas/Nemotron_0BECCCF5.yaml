personas:
  professional: Michael Dee, a 17‑year‑old aspiring diesel mechanic, leverages his methodical approach and competitive streak to excel at routine automotive and small‑farm equipment repairs while meticulously
    planning his lawn‑care side‑business and sketching blueprints for a future shop that will serve Butler County’s farmers.
  sports: Michael Dee stays fit by hiking the Sandhills with the Butler County Youth Outdoor Club, joining a weekend pickup basketball game at the local gym, and rooting for the Nebraska Cornhuskers football
    team and the Kansas City Chiefs while occasionally following the regional hunting season as a competitive sport.
  arts: Michael Dee’s artistic side shines through his admiration for vintage aircraft designs, his regular listening to Bruce Springsteen and John Denver, his occasional evenings watching the documentary
    series "The Aviators," and his appreciation for the woodworking aesthetics of folk artisan Thomas Chippendale, all of which inspire his custom drone builds and model‑plane creations.
  travel: Michael Dee prefers low‑key road trips planned months ahead, having explored the Nebraska Sandhills, camped near Lake McConaughy, and driven to Yellowstone National Park, while dreaming of an
    overseas adventure to New Zealand’s South Island to test his drone‑flying skills against dramatic alpine landscapes.
  culinary: Michael Dee, a competent home‑cook, frequently whips up skillet‑seared catfish with a cornmeal crust, hearty beef chili seasoned with cumin and jalapeños, and buttery cornbread topped with honey,
    relishing the hands‑on process and the smoky flavor of a backyard grill.
  core: Michael Dee blends a restless, competitive curiosity with a meticulous, back‑yard‑work ethic, occasionally binge‑gaming late into the night while forgetting to water his plants.
background:
  cultural: Michael grew up in Dwight, a small town in Butler County, Nebraska, within a predominantly white, rural Midwestern community. His family’s heritage includes German and Scandinavian ancestry,
    and the values of self‑reliance, hard work, and community service were reinforced through church involvement and local events like the county fair and 4‑H gatherings. The agricultural setting shaped
    his practical outlook, while the tight‑knit neighborhood fostered a sense of responsibility and modest competitiveness. These cultural influences combine with his personal curiosity and methodical nature
    to define his worldview.
attributes:
  skills: '[''Automotive maintenance'', ''Farm machinery operation and repair'', ''Woodworking and carpentry'', ''Basic computer hardware troubleshooting'', ''Project planning and scheduling'', ''Lawn care
