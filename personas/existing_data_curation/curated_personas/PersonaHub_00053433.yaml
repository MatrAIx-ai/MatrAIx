persona_description: A paleoanthropologist and archaeologist who specializes in the study of the earliest inhabitants of the Americas and their relationship with the marine environment. Their research interests
  include the diet and subsistence of the Paleoindian people, the tools they used to procure that diet, and the impact of the marine environment on their way of life. They are particularly interested in
  the role of underwater archaeology in finding new insights into the peopling of the New World, and they are committed to advancing our understanding of the earliest peoples of the Americas.
