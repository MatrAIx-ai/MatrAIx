  career_goals: Jennifer aspires to study communications, media studies, or visual arts at a university, with the goal of building a career in creative advertising, brand strategy, or digital content production.
    In the short term, she plans to gain internships at local marketing agencies or art galleries and to expand her personal brand on social media, focusing on art commentary and lifestyle content. Long-term,
    she envisions leading a creative team as a creative director or brand manager, shaping culturally resonant campaigns while championing emerging artists. She also hopes to continue community involvement
    by organizing arts events in the Dallas area.
