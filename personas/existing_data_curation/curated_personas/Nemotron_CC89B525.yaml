personas:
  professional: An aspiring communications student and budding creative strategist, Jennifer Johnston leverages her debate‑honed rhetoric, drama‑fueled confidence, and digital illustration skills to craft
    edgy brand narratives for local startups, while her competitive streak pushes her to secure internships that prove her worth and sharpen her portfolio.
  sports: An energetic intramural basketball player, Jennifer Johnston competes for the Dallas High School team, roots for the Dallas Mavericks and Cowboys, and habitually stays late for pickup games, even
    when it means sacrificing study time.
  arts: A devoted art enthusiast, Jennifer Johnston roams the Dallas Museum of Art, sketches in a leather‑bound journal inspired by Keith Haring’s bold lines, creates digital tributes to street‑art legends
    like Banksy using Procreate, and shares makeup tutorials echoing Yayoi Kusama’s vibrant palettes on TikTok.
  travel: A spontaneous road‑trip planner, Jennifer Johnston seeks weekend escapes to Austin’s food‑truck scene and Santa Fe’s art festivals, while day‑dreaming about a study‑abroad semester in Paris, balancing
    a tight school schedule with a habit of curating Instagram stories from each destination.
  culinary: A food‑truck aficionado, Jennifer Johnston devours smoky brisket tacos from a downtown Dallas vendor, pairs spicy kimchi quesadillas with cold brew, and occasionally whips up avocado toast topped
    with pomegranate seeds and feta for brunch, though her competitive nature often has her finishing plates faster than she can truly appreciate the flavors.
  core: Jennifer Johnston is a curious, sociable teen whose artistic ambition and competitive drive fuel a vibrant social media presence, even as a skeptical mind and lingering anxiety keep her constantly
    juggling confidence and self‑doubt.
background:
  cultural: Jennifer grew up in Duncanville, a suburban community in Dallas County, Texas, within a predominantly white, middle‑class environment that values Southern hospitality, community involvement,
    and high school sports. Her family maintains traditional Texan customs such as attending Friday night football games and local county fairs, while also encouraging a broad appreciation for the arts.
    Proximity to Dallas’s vibrant cultural scene—museums, live music venues, and multicultural festivals—has exposed her to diverse artistic expressions and global perspectives, fostering an open‑minded
    yet locally rooted cultural identity.
