  career_goals: Dennison aims to establish a permanent studio-and-gallery space in Shelbyville that doubles as a community art hub, offering regular workshops and small exhibitions. He seeks a high-profile
    public art commission for a local civic building to showcase his ability to blend creativity with practical constraints. Over the next five years, he plans to publish an illustrated memoir that interweaves
    his Midwestern upbringing with his artistic evolution, secure a steady stream of freelance illustration contracts for regional publishers, and develop a modest but reliable income that reduces his anxiety
    about financial instability. Ultimately, he hopes to be recognized as a leading contemporary artist in the Midwest while maintaining a balanced, disciplined lifestyle.
