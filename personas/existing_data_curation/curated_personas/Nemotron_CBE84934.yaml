  hobbies: '[''Watercolor painting'', ''Calligraphy'', ''Community garden volunteering'', ''Book club (literary fiction & philosophy)'', ''Walking group'', ''Volunteer reading at senior center'', ''Local
    theater performances'', ''Cooking traditional Vietnamese dishes'', ''Learning Japanese language'', ''Collecting abstract art prints'']'
  career_goals: As she approaches retirement, Nhi aims to transition into a part‑time mentorship role within her health‑care facility, guiding new nurses in culturally competent care and the use of creative
    therapies. She aspires to launch a community‑based art‑therapy workshop series for older adults, particularly Asian immigrants, to promote mental well‑being and social connection. Additionally, she
    hopes to collaborate with local public‑health agencies to design health‑literacy programs that address the unique needs of senior residents in Union County. Nhi also wishes to document her experiences
    in a memoir that blends nursing insights with reflections on East‑Asian cultural heritage.
