persona_description: A researcher in fetal medicine and cardiovascular biology, particularly focused on the role of platelets in foetal heart failure and the potential use of transfusion of platelets in
  newborns. They are interested in understanding the mechanisms underlying the development of patent ductus arteriosus and the impact of platelet function on foetal heart development. They are also interested
  in the potential therapeutic implications of transfusing platelets in the treatment of foetal heart failure.
