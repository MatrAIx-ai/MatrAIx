persona_description: A researcher in atmospheric sciences who specializes in the study of the interactions between the Madden–Julian oscillation (MJO) and the Asian winter monsoon system during boreal winter.
  This researcher has conducted extensive research on the impacts of the intraseasonal and synoptic variability on convection in the western Maritime Continent, and has used satellite data to analyze the
  convection associated with the MJO outside of the immediate land areas surrounding the South China Sea. This researcher is interested in understanding the mechanisms that govern the dynamic and thermodynamic
  interactions between the CSs and MJO, and how these interactions impact the rainfall distribution over Southeast Asia.
