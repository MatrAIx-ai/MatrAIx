personas:
  professional: Jill Wright is an aspiring arts administrator who blends her strong interpersonal communication and basic graphic design skills to craft engaging museum promotions, while leveraging her
    knack for community outreach and event facilitation to coordinate inclusive cultural programs in the Nevada tourism sector.
  sports: Jill Wright fuels their active lifestyle with weekend hikes in the Sierra Nevada foothills, participates in a local co-ed soccer league, roots for the Vegas Golden Knights and the Las Vegas Aces,
    and attends community boot-camp classes to stay fit while balancing a love for group camaraderie.
  arts: Jill Wright immerses themselves in the regional art scene by frequenting galleries showcasing works by Yayoi Kusama, Kehinde Wiley, and local muralists, joins improv theater groups that perform
    Ceasefire-style sketches, and follows musicians such as Fleet Foxes, St. Vincent, and the Reno Philharmonic, allowing these influences to shape their creative outlook.
  travel: Jill Wright plans trips with a mix of spontaneous day hikes to Lake Tahoe and meticulously arranged weekend getaways to Portland, while dreaming of abroad adventures in Kyoto for its Zen gardens
    and Barcelona for its surreal architecture, always using travel-budget apps to balance cost with cultural immersion.
  culinary: Jill Wright enjoys an eclectic palate, savoring sushi rolls with tuna, avocado, and nori, spicy Thai pad thai featuring rice noodles, tamarind, and peanuts, and mastering a homemade cauliflower
    crust pizza adorned with fresh basil and mozzarella, while often hunting for farmer-market heirloom tomatoes for their cooking experiments.
  core: Jill Wright is a socially-driven art enthusiast who balances meticulous organization with a zest for spontaneous cultural experiences, occasionally letting competitive impulses drive both their
    career ambitions and impulse purchases.
background:
  cultural: Jill is a white American raised in the Western United States, with family roots that trace back to German and Irish ancestors who settled in the Midwest before moving westward. Growing up in
    Carson City, she has been shaped by the frontier heritage and independent spirit of Nevada, while also being exposed to a growing multicultural arts community that values creativity and public engagement.
    Her cultural outlook blends traditional American values of self‑reliance and community involvement with an appreciation for diverse artistic expressions.
