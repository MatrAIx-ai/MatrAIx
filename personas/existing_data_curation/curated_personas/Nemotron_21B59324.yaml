  career_goals: Jill aims to build a career that merges her love for the arts with her talent for organizing community experiences. She envisions starting as a program assistant at a local museum or cultural
    center in Carson City, eventually moving into a coordinator or director role where she can design and lead public art events and educational workshops. To support this path, she plans to enroll in a
    community‑college certificate program in arts administration and gain professional experience in event management and marketing within the Nevada tourism sector.
