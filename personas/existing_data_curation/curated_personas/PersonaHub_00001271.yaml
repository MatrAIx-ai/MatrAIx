persona_description: A quality control engineer in the integrated circuit industry who is responsible for evaluating the functionality of new devices before they reach the final testing stage. This persona
  is skilled in using the Nano Hardness Tester (NHT) from CSM Instruments to measure the Vickers hardness of IC bonding pads, a critical factor in ensuring the quality and functionality of the devices.
  This persona is also aware of the importance of localised measurements at specific sites to improve the accuracy and reliability of the results.
