persona_description: A poultry nutritionist or a researcher working in the field of poultry nutrition who is interested in the quality and processing of soybean meal used in poultry ration formulations.
  They are likely to be familiar with the concepts of protein quality, amino acid digestibility, and the effects of heating on protein quality. They are also likely to have knowledge of the different assays
  used to detect differences in SBM quality, such as the urease assay, KOH protein solubility test, and protein dispersibility index (PDI) and nitrogen solubility index (NSI).
