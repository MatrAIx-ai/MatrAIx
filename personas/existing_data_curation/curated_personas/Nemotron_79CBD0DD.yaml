personas:
  professional: Tina Stringfield, a meticulous preschool class helper, organizes daily activity schedules for her friends and applies her practical curiosity to solve toy puzzles, displaying early project
    management instincts.
  sports: Tina Stringfield plays on the Oakwood Cubs Little League baseball team, attends Saturday gymnastics at the Bright Stars Club, and avidly supports the Chicago Cubs, proudly wearing their cap during
    practice.
  arts: Tina Stringfield sings along to Raffi’s "Baby Beluga", mimics Disney’s Frozen vocals by Idina Menzel, and creates bold drawings inspired by Eric Carle, often performing for their stuffed audience.
  travel: Tina Stringfield has explored the local aquarium and Disney’s Anaheim park, and dreams of wandering the Sahara’s dunes and strolling Rome’s cobblestone streets, drafting imaginary itineraries
    with crayons.
  culinary: Tina Stringfield delights in cheesy macaroni, stirs strawberry‑banana smoothies, skillfully spreads butter on toast, and insists on tasting new foods like honey‑glazed carrots whenever they
    appear.
  core: Tina Stringfield blends curiosity with orderliness, lining up toys, saving pennies for a chocolate set, tackling sneezes with antihistamine, and dreaming of soccer fields and distant castles.
background:
  cultural: Tina is a White child raised in Oklahoma City, Oklahoma. Her family embraces Midwestern-Southern values, emphasizing community, hospitality, and respect for traditions. She attends a local preschool
    that incorporates elements of Oklahoma's cultural heritage, such as learning about state symbols, celebrating Thanksgiving and the Fourth of July with parades and family gatherings, and hearing country
    and folk music. Her household observes a Christian faith (Methodist), attending Sunday school, which reinforces values of kindness, responsibility, and service. The environment of the Great Plains,
    with its open fields and occasional farm visits, nurtures her love for nature and animals.
attributes:
  skills: '[''counting to twenty'', ''alphabet recognition'', ''puzzle solving (24-piece)'', ''fine motor coordination (cutting, drawing)'', ''toy organization'', ''following routines'', ''basic storytelling'',
