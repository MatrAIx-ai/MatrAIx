  hobbies: '[''drawing'', ''building with wooden blocks'', ''reading picture books'', ''outdoor sandbox play'', ''butterfly watching'', ''caring for pet rabbit'', ''singing nursery rhymes'', ''dancing to
    music'', ''crafting with glitter and stickers'']'
  career_goals: Even at four, Tina expresses a clear desire to work with animals and help others. She often says she wants to become a veterinarian because she enjoys caring for her pet rabbit and likes
    learning how living things work. She also daydreams about being a teacher, inspired by her preschool teachers, and occasionally imagines herself as an astronaut exploring new places, reflecting her
    blend of curiosity and practicality.
