persona_description: A security researcher and practitioner who is interested in developing new technologies to improve the security of batteryless embedded devices. They are particularly interested in
  the use of short-duration clocks on batteryless RFID chips to thwart attacks by RFID thieves. They are also interested in the potential of TARDIS to provide a way to defend against the type of brute-force
  attacks that try to guess the chips passwords hundreds or thousands of times per second. They are likely to be familiar with the concept of short-duration clocks and their potential applications in security
  protocols.
