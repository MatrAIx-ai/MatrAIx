persona_description: A geologist who specializes in groundwater quality and aquifer depletion, particularly in the study of the Texas Ogallala Aquifer. He/She is interested in understanding the long-term
  groundwater quality, its spatial variability, and its relationship to human health hazards. The geologist aims to identify the sources of groundwater salinization and its impact on groundwater quality.
  He/She is also interested in the natural and human factors that contribute to groundwater salinization and how they act in conjunction to cause groundwater salinization and overall water quality degradation.
