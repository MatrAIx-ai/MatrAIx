personas:
  professional: Joseph Haynes, an aspiring visual storyteller, combines cartoon drawing, digital illustration, and LEGO architecture, and their curious, organized, and collaborative nature drives them to
    lead art club mural projects and mentor classmates.
  sports: Joseph Haynes, an energetic member of the Parkside Panthers youth soccer league, passionately kicks the ball at the local park each weekend, follows the Premier League team Manchester United on
    TV, and dabbles in summer swimming lessons at the community pool to stay fit.
  arts: Joseph Haynes, a budding cartoonist and digital artist, draws inspiration from the whimsical worlds of Hayao Miyazaki, the bold lines of Stan Lee’s comics, and the playful street art of Banksy,
    while channeling that energy into LEGO‑based storytelling and collaborative mural projects with the school art club.
  travel: Joseph Haynes, an organized young explorer, enjoys weekend trips to the Smithsonian National Air and Space Museum to fuel their space curiosity, dreams of visiting the Grand Canyon’s star‑filled
    night sky, and plans meticulously for a future family vacation to Tokyo’s anime districts, balancing school responsibilities with adventure.
  culinary: Joseph Haynes, an enthusiastic junior chef, loves whipping up homemade pepperoni pizza topped with fresh basil from the community garden, enjoys snacking on carrot sticks and cherry tomatoes,
    and occasionally experiments with simple sushi rolls using rice, seaweed, and cucumber, though they sometimes over‑salt their pasta sauce.
  core: Joseph Haynes is a curious, organized, and sociable 10‑year‑old who fuses art, soccer, and community service into a disciplined yet playful approach to life, punctuated by occasional LEGO‑induced
    messes and a knack for forgetting to bring their inhaler.
background:
  cultural: Joseph was born and raised in Richmond, Virginia, in a middle‑class family with deep roots in the Mid‑Atlantic region. His upbringing reflects a blend of Southern hospitality and urban cultural
    exposure. He attends a public elementary school that emphasizes community service and the arts, and his family often visits local museums such as the Virginia Museum of Fine Arts, historic sites like
    Mount Vernon, and community festivals including the Richmond Folk Festival. Their household celebrates traditional American holidays and participates in church‑based outreach programs, instilling in
    Joseph a strong sense of community responsibility and an appreciation for diverse artistic expressions.
