  hobbies: '[''Drawing cartoons'', ''Digital art on a tablet'', ''Building LEGO structures'', ''School art club mural projects'', ''Playing soccer'', ''Volunteering at a community garden'', ''Reading graphic
    novels'', ''Watching science videos on YouTube'', ''Organizing after‑school study groups'']'
  career_goals: Joseph hopes to channel his love of art and curiosity into a future career that blends creativity, education, and community service. He envisions becoming a museum curator or interactive
    exhibit designer for children, a role that would let him combine his artistic talents, organizational abilities, and compassion for young learners. He also dreams of leading community‑based environmental
    projects, such as designing school gardens, and sees himself later in life as a teacher or mentor who inspires peers to explore new ideas and work together harmoniously.
