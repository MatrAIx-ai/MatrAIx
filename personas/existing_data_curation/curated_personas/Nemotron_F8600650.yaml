  hobbies: '[''fishing'', ''classic car restoration (parts collection)'', ''small engine tinkering'', ''reading technical manuals and DIY guides'', ''off‑road trail riding with a few close friends'', ''target
    shooting at a local range'']'
  career_goals: Mark aspires to move into a supervisory role within the next two to three years, aiming to become a shift lead or warehouse manager where he can apply his organizational strengths and hands‑on
    expertise. He plans to obtain a Certified Forklift Operator credential and attend a short course in supply‑chain basics to improve his competitiveness. Ultimately, he dreams of starting his own small
    freight‑moving business, leveraging his knowledge of material handling and his competitive drive to build a reliable service for local farms and contractors.
