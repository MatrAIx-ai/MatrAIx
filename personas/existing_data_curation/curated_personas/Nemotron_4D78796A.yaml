personas:
  professional: Vincent Kim, a 40‑year‑old handyman‑in‑training, leverages his self‑taught woodworking and mechanical know‑how to deliver reliable home repairs and custom furniture to the Negaunee community,
    balancing a relaxed work style with an assertive drive to earn a GED and a diesel‑mechanics certification within two years.
  sports: Vincent Kim spends his winters snowmobiling the Upper Peninsula trails, summers fly‑casting on Lake Superior’s tributaries, and roots for the Michigan Tech Huskies in hockey and the Detroit Lions
    in football, while occasionally joining local friends for a weekend hike with the Negaunee Raiders’ outdoor club.
  arts: Vincent Kim channels his creative spark through woodworking, crafting rustic coffee tables while listening to Bob Dylan and The White Stripes, and he regularly attends the annual Upper Peninsula
    folk arts festival featuring fiddler Michael K. Peters and local glassblowers.
  travel: Vincent Kim favors spontaneous road trips along the Great Lakes shoreline, has already explored Isle Royale and the North Shore of Minnesota, and daydreams about a summer fishing lodge in Alaska
    and a cultural trek to Norway’s fjord villages, planning each outing loosely and letting weather dictate the route.
  culinary: Vincent Kim brews his own coffee blend using local roasted beans, ferments small‑batch kombucha with wild Michigan honey, and enjoys cooking a classic Upper Peninsula walleye fry with a side
    of pasty, often seasoning the dish with fresh pine‑scented herbs he forages during hikes.
  core: Vincent Kim is a pragmatic tinkerer who balances a love for solitary outdoor pursuits with a quietly ambitious plan to turn his DIY expertise into a community‑focused handyman business, all while
    navigating a relaxed approach to finances and health.
background:
  cultural: Vincent grew up in Negaunee, a tight‑knit community in Michigan’s Upper Peninsula with roots in the region’s historic mining and lumber industries. The area’s blend of Finnish, Swedish, and
    other European immigrant traditions has fostered a culture of self‑reliance, modesty, and close community ties. This heritage, combined with the rugged natural landscape of the Great Lakes shoreline,
    has shaped his appreciation for hard work, outdoor recreation, and practical problem solving. While his ethnicity is listed as white, his family’s generational presence in the region reflects the broader
    Midwestern ethos of independence, humility, and a deep connection to the land.
