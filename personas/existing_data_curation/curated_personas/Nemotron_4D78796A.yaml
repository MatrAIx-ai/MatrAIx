  hobbies: '[''Fishing'', ''Fly casting'', ''Woodworking'', ''Furniture restoration'', ''Hiking'', ''Snowmobiling'', ''Local history exploration'', ''Reading practical guides'', ''Coffee brewing'', ''Kombucha
    making'']'
  career_goals: Vincent aims to formalize his practical knowledge by earning a GED and pursuing a certification in diesel or automotive mechanics within the next two years. He hopes to transition from occasional
    odd‑jobs to a steady, self‑run handyman service that can serve the Negaunee community, providing reliable repairs and upgrades. Long‑term, he envisions expanding the business to include custom wood
    furniture pieces and offering small‑scale equipment repair for local snowmobile enthusiasts. Financial stability for his family and the flexibility to continue exploring personal interests remain central
    to his ambition.
