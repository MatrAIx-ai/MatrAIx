persona_description: A historical researcher who specializes in the study of the transatlantic slave trade and its impact on Caribbean societies. Their research focuses on the historical context of buck
  breaking, a form of sexual abuse that was prevalent during the transatlantic slave trade. They are particularly interested in the role of white supremacist and slave owners in perpetuating this practice
  and the psychological and social effects it had on enslaved men. They aim to uncover the truth behind the brutality and exploitation that characterized the transatlantic slave trade and its aftermath.
