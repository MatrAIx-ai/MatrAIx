  career_goals: Looking to re-enter the workforce, Ivan aims to secure a part-time or contract role that leverages his organizational and interpersonal strengths, such as operations coordinator or community
    event manager. He plans to obtain a certified Associate in Project Management (CAPM) to formalize his expertise. In parallel, he wants to expand his involvement with local nonprofits, leading volunteer
    initiatives for beach clean-ups and senior services, to build a stable routine, improve his financial security, and reduce stress through purposeful work.
