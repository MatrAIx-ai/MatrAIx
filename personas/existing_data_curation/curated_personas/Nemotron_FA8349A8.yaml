  career_goals: Peter aims to earn a GED and enroll in community college to study social work or counseling, with the long-term goal of becoming a youth mentor or mental-health advocate. He also wants to
    deepen his technical abilities by obtaining certifications in computer repair and networking, enabling him to provide reliable tech support in his community. Ultimately, he envisions a career that blends
    his empathy for others with his practical skills, such as working at a community health center, serving as a school counselor, or founding a nonprofit focused on teenage mental-wellness. He is motivated
    to achieve financial independence while maintaining a balanced lifestyle that keeps him connected to friends and family.
