personas:
  professional: Peter Nolan is a socially-minded teen who leverages his knack for group facilitation and his growing technical chops to help peers at his community center, while eyeing a future in social
    work or counseling and aiming to earn certifications in computer repair so they can bridge empathy with practical support.
  sports: Peter Nolan scores points on the Harborview Youth Basketball League and laces up for the Northern Lights Youth Hockey Club during winter, while cheering for the Chicago Bulls and the New York
    Rangers on TV, and they regularly attend after‑school training at the local YMCA fitness club to stay fit.
  arts: Peter Nolan strums an acoustic guitar in jam sessions with classmates, crafting original songs inspired by John Mayer and Arctic Monkeys, while penning short stories and poems reminiscent of Rupi
    Kaur's style, and they binge‑listen to indie playlists on Spotify featuring Phoebe Bridgers and Tame Impala.
  travel: Peter Nolan has taken weekend road trips to the nearby coastal state park and a school‑organized visit to Washington D.C., dreaming of backpacking through the Scottish Highlands and exploring
    the bustling streets of Tokyo once they can afford a gap‑year adventure.
  culinary: Peter Nolan enjoys cooking simple yet flavorful meals like spicy ramen, homemade guacamole with fresh avocados, and occasionally attempts a beginner's sourdough starter, preferring bold ingredients
    such as sriracha, ginger, and lime.
  core: Peter Nolan is a high‑energy, empathetic teen who balances a love for teamwork, creative expression, and tech tinkering with intense anxiety, often finding solace in music and mindfulness while
    juggling school, sport, and a part‑time job.
background:
  cultural: Peter grew up in a middle-class household in Minneapolis, Minnesota, within a predominantly white, Midwestern cultural setting. His family observes American holidays such as Thanksgiving, Fourth
    of July barbecues, and Christmas, blending secular celebrations with Protestant traditions common in the region. The Minnesota nice ethos of politeness, community involvement, and respect for personal
    space shaped his emphasis on harmony and cooperation. Exposure to the city’s vibrant arts, music, and sports scenes, as well as the multicultural tapestry of Hennepin County, broadened his perspective
    while reinforcing a strong sense of local identity. The harsh winters encouraged a love for indoor group activities and winter sports like hockey, further influencing his social and recreational preferences.
