  career_goals: In the short term, Johanna aims to earn top grades in fifth grade, win her school's science fair, and become a leader in her after‑school clubs. Looking ahead, she dreams of a career that
    blends her love of discovery with real‑world impact—she envisions becoming a marine biologist or an environmental engineer who designs solutions for clean water in her Texas community. She also hopes
    to mentor younger kids, sharing the balance of curiosity and practical problem‑solving that guides her own learning.
