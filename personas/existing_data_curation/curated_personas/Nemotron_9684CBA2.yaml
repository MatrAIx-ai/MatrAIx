personas:
  professional: Johanna Reyes is a budding junior coder who blends imaginative storytelling from fantasy books with methodical LEGO engineering, using block‑based platforms like Scratch to prototype simple
    adventure games while balancing curiosity with practical project planning and demonstrating assertive collaboration in after‑school coding clubs.
  sports: Johanna Reyes plays forward for the Jacksonville Strikers youth soccer team, cheers for the Jacksonville Jaguars as a source of resilience, joins a local skateboarding club on weekends, and balances
    structured practice with spontaneous backyard obstacle‑course challenges, reflecting an organized yet flexible attitude toward fitness and teamwork.
  arts: Johanna Reyes sketches intricate fantasy cityscapes in a well‑worn sketchbook, practices simple melodies on a keyboard inspired by Lindsey Stirling’s violin‑piano blends, and devours graphic novels
    by J.K. Rowling and Rick Riordan, channeling their curiosity and balanced social energy into vivid artistic expression.
  travel: Johanna Reyes enjoys weekend excursions to the coastal dunes of Amelia Island and the historic streets of St. Augustine, dreams of a family trip to Washington, D.C.’s Smithsonian museums, and
    prefers carefully planned itineraries that mix guided tours with unstructured nature hikes, reflecting an organized yet adventurous spirit.
  culinary: Johanna Reyes favors homemade chicken quesadillas with melted cheddar, indulges in chocolate chip cookies topped with rainbow sprinkles, and experiments with simple fruit kebabs of pineapple
    and grapes, while often forgetting to wash their hands before snacking, a quirky habit their practical side strives to correct.
  core: Johanna Reyes is a curious, organized ten‑year‑old who juggles LEGO masterpieces, sketchbooks, soccer drills, and coding projects, often hoarding rocks in a secret drawer and postponing homework
    when a new LEGO set arrives.
background:
  cultural: Johanna was raised in Jacksonville, Texas, a close‑knit small‑town in East Texas. Her family embraces Southern hospitality, church community events, and local traditions such as Fourth of July
    barbecues and seasonal hiking trips. While identifying as white, her household also honors her Hispanic heritage through occasional Spanish phrases and family recipes like tamales, reflecting a blended
    cultural background that values both regional Texan customs and multicultural family ties.
