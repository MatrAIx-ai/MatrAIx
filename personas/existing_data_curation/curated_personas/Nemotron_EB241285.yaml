  skills: '[''Financial modeling'', ''Investment research'', ''Risk assessment'', ''Data visualization'', ''Portfolio analysis'', ''Bilingual communication (Spanish/English)'', ''Excel/VBA'', ''SQL'', ''Bloomberg
