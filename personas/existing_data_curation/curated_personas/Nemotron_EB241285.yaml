  hobbies: '[''Salsa dancing'', ''Cooking Mexican/Tex-Mex cuisine'', ''Volunteering at cultural festivals'', ''Community potluck organization'', ''Book club (historical fiction & Latin American literature)'',
    ''Hiking in West Texas'', ''Yoga'', ''Spontaneous road trips'', ''Live music events (mariachi, country)'']'
  career_goals: She aims to become a senior portfolio manager within the next five years, leading a team focused on socially responsible investing in the West Texas energy sector. Julievette plans to launch
    a community investment fund that supports Mexican‑American entrepreneurs in Odessa, leveraging her analytical expertise and cultural ties. She intends to earn the Chartered Financial Analyst (CFA) designation,
    mentor women entering finance, and eventually transition into a strategic advisory role that merges financial stewardship with community development initiatives.
