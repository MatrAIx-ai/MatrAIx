persona_description: A program director who is responsible for overseeing the curriculum development and implementation of a program, ensuring that the program meets the desired learning outcomes and that
  the program curriculum map is accurately represented. The program director is also responsible for conducting formative assessments to capture students' progress toward learning outcomes and for using
  objective assignments and performance-based assignments to assess students' skills and knowledge. The program director is also responsible for conducting item analysis to evaluate the test's validity
  and possible bias and for conducting norming sessions to train raters to use rubrics to evaluate student products and performances consistently. The program director is also responsible for using rubrics
  to score student work, and for using portfolios to collect and review student work for evidence of learning. The program director is also responsible for using scaffolding to provide students with support
  until they can complete a task on their own. The program director is also responsible for using signature assignments to demonstrate students' knowledge and skills essential to the objectives of a course/program
  and to present students' work to others as evidence of accomplishment. The program director is also responsible for using transparent assignments to clearly articulate the purpose and evaluation criteria
  of a given task.
