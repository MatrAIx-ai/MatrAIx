persona_description: A sociology professor who specializes in the study of class and its impact on American society. The professor is interested in examining the role of colleges and universities in American
  society, the differential access to higher education based on family background and income, ethnicity, and other characteristics, and the causes and consequences of this differential access. The professor
  is also interested in the role of affirmative action and race-conscious admissions in addressing the issue of access to higher education. The professor is dedicated to making access to higher education
  more equitable and is willing to spend at least four hours each week as a volunteer at the Double Discovery Center, an on-campus program that helps New York City high school students who lack many of
  the resources needed to succeed in college and to be successful in gaining admission and finding financial aid. The professor is also interested in exploring the variety of American institutions of higher
  education, admission and financial aid policies at selective and less selective, private and public, colleges, affirmative action and race-conscious admissions, what "merit" means in college admissions,
  and the role of the high school in helping students attend college.
