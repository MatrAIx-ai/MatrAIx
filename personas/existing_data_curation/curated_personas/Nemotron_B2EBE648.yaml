  hobbies: '[''Hiking the Cascades'', ''Kayaking the Puyallup River'', ''Watercolor painting'', ''Improv theatre'', ''Volunteer work at animal shelter'', ''Organizing community pet‑health fairs'', ''Recreational
    volleyball'', ''Board games and escape rooms'', ''Cooking experimental recipes'', ''Attending local art galleries'', ''Exploring farmers markets'', ''Reading investigative nonfiction'']'
  career_goals: Morgan aims to become a certified veterinary technician (CVT) and eventually a lead technologist at a high‑volume clinic, specializing in exotic animal anesthesia and analgesia. She intends
    to earn additional certifications in veterinary dental hygiene and critical care, positioning herself as a go‑to expert for complex cases. Long‑term, Morgan envisions launching a mobile veterinary outreach
    program that provides low‑cost preventive care to underserved neighborhoods in Pierce County, while also training new techs through community workshops. Her competitive drive pushes her to publish case
    studies on innovative anesthesia protocols and to become a recognized speaker at regional veterinary conferences.
