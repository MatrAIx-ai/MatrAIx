  hobbies: '[''Strategy video gaming'', ''Custom PC building'', ''Reading tech blogs'', ''Cooking Indian dishes'', ''Basketball'', ''Cricket'', ''Photography'', ''Volunteer work at cultural events'']'
  career_goals: Yogesh aims to earn his GED within the next year and enroll in a community college’s computer science program, ultimately becoming a full-stack web developer. He also dreams of opening a
    modest Indian street-food cart that serves authentic snacks to the Tallahassee community. In the long term, he hopes to combine his technical expertise with entrepreneurship, creating a tech-enabled
    food service business that leverages online ordering and digital marketing.
