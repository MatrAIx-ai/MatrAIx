  career_goals: Kala aims to advance into educational leadership within the next five years. She plans to earn a Master of Education in Educational Leadership, become head of the English department, and
    spearhead a district-wide curriculum redesign that embeds culturally responsive pedagogy. She seeks grant funding to launch an after‑school STEM‑literacy program for underserved students, hopes to be
    recognized as Teacher of the Year, and ultimately become an assistant principal where she can influence policies that promote equity and academic excellence. Alongside these goals, she intends to publish
    scholarly articles on African‑American literature and advocate for equity at the district level.
