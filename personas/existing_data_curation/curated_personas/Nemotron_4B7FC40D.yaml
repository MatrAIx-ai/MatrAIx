  career_goals: Brittany aims to ascend to a senior leadership role in analytics, such as Lead Data Scientist or Chief Analytics Officer within a forward-thinking organization, where she can shape strategy
    through advanced mathematical modeling. She is driven to publish groundbreaking research on stochastic optimization for casino gaming, seeking to present at conferences like INFORMS and SIAM. Recognizing
    her commitment to diversity, she plans to establish a mentorship program for Black and Latina women in STEM, leveraging her industry experience to open pathways. Ultimately, she envisions building a
    boutique consultancy that fuses rigorous quantitative methods with creative problem-solving, offering tailored analytics solutions that prioritize ethical data use and flexible project structures to
    maintain her well-being.
