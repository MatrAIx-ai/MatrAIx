personas:
  professional: Brittany Rosado, a 39‑year‑old applied mathematician and data scientist at a Las Vegas casino analytics firm, leverages deep expertise in stochastic modeling, Python, and D3.js to turn noisy
    gambling data into actionable insights, while their curiosity drives constant learning of new tools and their relaxed attitude toward deadlines leads them to favor flexible, improvisational project
    workflows.
  sports: Brittany Rosado, a regular member of the Red Rock Trail Hikers club, spends weekends scaling the sandstone formations outside Las Vegas, occasionally joins a casual recreational volleyball league
    that plays at the MGM Grand, roots for the Vegas Golden Knights in hockey and the Raiders in football, and prefers a low‑key, self‑paced fitness routine over structured gym sessions, though they sometimes
    skip scheduled group runs when work demands surge.
  arts: Brittany Rosado frequents the Bellagio Gallery of Fine Art and local contemporary pop‑up exhibitions, sketches watercolor abstractions of installations inspired by the works of Jackson Pollock and
    Mark Rothko, spends evenings spinning vintage Miles Davis, John Coltrane, and Aretha Franklin vinyls, and cites the surreal narratives of filmmaker David Lynch as a source of creative spark, while they
    occasionally share their own sketches in neighborhood art meet‑ups.
  travel: Brittany Rosado favors spontaneous weekend escapes to desert towns like Sedona and Santa Fe for their art festivals and red‑rock hikes, dreams of a month‑long creative retreat in Kyoto’s Gion
    district, balances travel budgets by using points from a premium credit card, and typically books flights within a week, relying on flexible tickets to accommodate their relaxed planning style.
  culinary: Brittany Rosado delights in crafting soul‑food meets Mexican fusion dishes such as chipotle‑glazed fried chicken with collard‑green slaw, black‑bean‑infused cornbread, and sweet‑potato‑and‑tamale‑filled
    empanadas, showcasing a solid intermediate cooking skill set and a love for ingredients like smoked paprika, ancho chili, and sweet‑grass, while they occasionally order upscale dining experiences to
    sample rare ingredients like wagyu beef.
  core: Brittany Rosado blends analytical rigor with artistic wanderlust, channeling competitive ambition into data science leadership while soothing stress through solitary hikes, watercolor sketches,
    and soulful vinyl, even as they habitually procrastinate on non‑essential tasks and wrestle with lingering anxiety.
background:
  cultural: Brittany identifies as African American with a multicultural heritage, reflected in her surname Rosado which connects her to Hispanic roots on her father's side. She grew up in a vibrant Black
    community where church, soul music, and family gatherings shaped her early life, while frequent visits to relatives in the Southwest introduced her to Mexican culinary and cultural traditions. In Las
    Vegas, she participates in the local Black Arts Alliance, attending poetry slams and gallery openings that celebrate African-American creativity. She also engages with Hispanic festivals and markets,
    honoring her dual heritage through food, music, and community service. This blended cultural background fuels her appreciation for artistic expression and informs her commitment to mentoring underrepresented
    youth in STEM.
