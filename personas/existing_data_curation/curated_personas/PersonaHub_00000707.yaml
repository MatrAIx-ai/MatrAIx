persona_description: A concerned citizen who is passionate about child welfare and the rights of First Nations children. They are advocating for a Royal Commission into child removals and are calling for
  a freeze on any additional funding to child protection authorities until a Royal Commission can hear the thousands of untold stories from children who were failed, from families ripped apart, from social
  workers within child protection authorities, and from social workers, psychologists, and counsellors working to the bone to repair broken lives.
