  career_goals: Bernice aims to transition from her current clerical role into a mid‑level financial analyst position within the next two years, building on her quantitative skills and seeking a professional
    certification such as the Certified Management Accountant (CMA) or Certified Financial Analyst (CFA) Level I. Long‑term, she envisions leading a finance operations team where she can design systematic
    processes that reduce errors and streamline reporting. She also hopes to leverage her organizational strengths to mentor newer staff, creating a supportive, low‑stress environment that balances her
    ambitions with her family responsibilities.
