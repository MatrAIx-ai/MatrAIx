persona_description: A scientist or researcher who studies the effects of wildfire smoke exposure on human health. The person is likely to be interested in the study of cardiovascular and cerebrovascular
  diseases, respiratory conditions, and other health outcomes associated with exposure to wildfire smoke. They are also likely to be interested in the factors that increase the risk of these outcomes, such
  as underlying cardiovascular disease risk factors and the duration and intensity of wildfire smoke exposure. The person may also be interested in the potential interventions and public health strategies
  that could help prevent or reduce the health impacts of wildfire smoke exposure.
