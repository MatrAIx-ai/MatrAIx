    Historical Fiction and Memoirs'', ''Yoga and Mindful Movement'', ''Playing Bridge'', ''Traveling to European Art Museums'', ''Attending Local Theater Performances'', ''Birdwatching'', ''Cooking Farm‑to‑Table
    Recipes'', ''Knitting'']'
  career_goals: Isa aims to broaden the scope of mental‑health services in Hutchinson by establishing a community‑based arts‑therapy center that offers workshops for seniors, veterans, and at‑risk youth.
    She hopes to secure state and private funding to sustain these programs and to become a certified art therapist, adding a formal credential to her existing counseling license. Over the next five years,
    Isa envisions mentoring a new cohort of counselors, publishing a guide on integrating creative arts into psychotherapy, and advocating for policies that increase mental‑health resources in rural Kansas.
    Her ultimate ambition is to create a model of holistic, culturally sensitive care that can be replicated in similar small‑town settings.
