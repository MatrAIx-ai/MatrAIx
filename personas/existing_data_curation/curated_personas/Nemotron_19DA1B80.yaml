personas:
  professional: Isa Baquero, a veteran mental‑health counselor in Hutchinson, they weave CBT, DBT, and trauma‑informed care with watercolor and oil painting techniques to create community‑centered art‑therapy
    workshops for seniors, veterans, and at‑risk youth, channeling their curiosity and assertive advocacy into grant proposals and mentorship while carefully balancing structured case management with the
    flexibility needed for creative sessions.
  sports: Isa Baquero, an active member of the Hutchinson Seniors’ Fitness Club, they practice gentle yoga twice a week, follow the Kansas City Chiefs for football and the Kansas City Royals for baseball,
    volunteer as a line judge for local high‑school basketball games, and maintain a competitive bridge league that satisfies their social energy and strategic mind.
  arts: Isa Baquero, an avid watercolor and oil painter inspired by the Kansas prairie and the palettes of Georgia O’Keeffe and Monet, they regularly visit the Hutchinson Museum of Art and the Denver Art
    Museum, lead art‑therapy workshops at the senior center, and draw artistic motivation from the Musée d’Orsay in Paris and the Uffizi Gallery in Florence.
  travel: Isa Baquero, a seasoned traveler with a focus on art‑rich destinations, they plan trips around museum openings, having recently explored the Van Gogh Museum in Amsterdam, the Uffizi Gallery in
    Florence, and the Louvre in Paris, while maximizing senior discounts, staying at boutique B&Bs, and returning home with sketchbooks full of impressions.
  culinary: Isa Baquero, an enthusiastic gardener, they incorporate heirloom tomatoes into fresh Caprese salads and rustic ratatouille, enjoy cooking chicken tortilla soup flavored with roasted chile de
    árbol after trips to Mexico, and often prepare simple Mediterranean dishes like lemon‑herb grilled fish using basil and oregano harvested from their own garden.
  core: Isa Baquero merges decades of counseling expertise with a painter’s eye, they channel their curiosity and worry‑prone nature into community art‑therapy, while juggling a modest retirement nest egg,
    garden‑to‑table cooking, bridge nights, and European museum pilgrimages.
background:
  cultural: Isa grew up in a multigenerational, predominantly white, Midwestern family in the Hutchinson area, where values of community service, self‑reliance, and modesty were emphasized. Though her surname
    reflects Spanish heritage, her upbringing blended Midwestern Protestant cultural norms with a subtle appreciation of Hispanic traditions through family stories and occasional cultural festivals. Her
    education in the arts and humanities fostered a lifelong curiosity for diverse perspectives, and she has incorporated this openness into her counseling practice. Isa’s cultural identity is shaped by
    the blend of rural Kansas simplicity, an artistic sensibility nurtured by museum visits and local gallery participation, and a commitment to inclusive, culturally aware mental‑health care.
