  career_goals: Short‑term, Carl aims to earn his GED and enroll in a community‑college program focused on graphic design or visual communications while completing a wilderness first‑aid certification.
    He also plans to secure an apprenticeship with a local outdoors retailer or a regional media studio to gain hands‑on experience. Long‑term, he envisions a career that merges his love for nature and
    visual storytelling – such as a wildlife photographer, environmental educator, or park ranger who documents Montana’s landscapes and educates visitors. He hopes to eventually establish a cooperative
    studio in East Helena where he can mentor other youth, produce regional artwork, and run community‑focused art workshops.
