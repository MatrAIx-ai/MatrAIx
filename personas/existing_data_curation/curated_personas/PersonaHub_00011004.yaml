persona_description: A university administrator responsible for implementing and managing sustainable initiatives, energy conservation, and environmental policies at Loyola University in Chicago, Illinois.
  This individual is skilled in building automation, demand response programs, geothermal heating and cooling, and solar-powered lighting features. They are also knowledgeable in the energy efficiency of
  buildings and have experience with variable primary systems, Enthalpy Wheel for heat recovery, demand controlled ventilation, displacement ventilation, radiant heating and cooling, and dedicated outside
  air. Additionally, they are familiar with LEED Gold certification for Cuneo Hall and Corboy Law Center Boiler and Chiller Retrofit, and have implemented sustainability initiatives such as reducing chemical
  use in fitness center swimming facilities and advancing the understanding of wildlife/human interactions through genetics in Cook County.
