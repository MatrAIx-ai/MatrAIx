persona_description: A French cartographer who was one of the leading figures in the early 18th century, known for his important contributions to the transition from decorative to scientific cartography.
  He was a member of the Academie Royale des Sciences and played a prominent role in the recalculation of latitude and longitude, setting a new standard of accuracy. His work was widely copied by other
  mapmakers of the period, including Chatelain, Covens & Mortier, and Albrizzi. His maps of the newly explored parts of the world reflect the most up-to-date information available and did not contain fanciful
  detail in the absence of solid information.
