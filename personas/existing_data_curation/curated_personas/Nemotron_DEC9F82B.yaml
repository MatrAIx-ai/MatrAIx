  hobbies: '[''Painting (acrylic)'', ''Sketching'', ''Visiting Art Museums and Galleries'', ''Reading Contemporary Fiction'', ''Writing Short Stories'', ''Gardening (herb garden)'', ''Yoga'', ''Cooking
    (international cuisines)'', ''Traveling to Cultural Festivals'', ''Volunteering at Local Museum (art workshops)'', ''Community Theater Acting'', ''Hosting Book Club'']'
  career_goals: Joy aims to become an Arts Integration Coordinator for the Orange County Public Schools, shaping district‑wide policies that embed creativity across curricula. She plans to pursue a master's
    degree in Educational Leadership to qualify for administrative roles, with a long‑term ambition to serve as a principal who champions innovative, inclusive learning environments. In parallel, she hopes
    to author a guidebook on practical arts integration for elementary educators and to speak regularly at national conferences on the impact of the arts on student engagement and achievement. Joy also
    envisions launching an after‑school program that offers community workshops in painting, theater, and digital media, extending learning beyond the classroom.
