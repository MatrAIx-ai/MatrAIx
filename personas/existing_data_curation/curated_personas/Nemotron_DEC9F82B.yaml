personas:
  professional: Joy Antley, a veteran elementary educator in Orlando, crafts interdisciplinary curricula that fuse visual and performing arts with core subjects, leveraging meticulous lesson planning, data-driven
    assessments, and technology tools like Google Classroom and SMART Boards; their natural talkativeness and confidence shine in faculty workshops, while their assertive yet compassionate leadership style
    drives high academic standards and inclusive classroom environments.
  sports: Joy Antley, an avid participant in Orlando’s adult recreational softball league and a regular member of a community yoga studio, cheers for the Orlando Magic during NBA season and supports Orlando
    City SC in the MLS, while spending weekend mornings jogging around Lake Eola and hiking the trails of Wekiwa Springs, blending competitive spirit with a love for low‑impact movement.
  arts: Joy Antley, a passionate painter and community theater performer, spends evenings mixing bright acrylics to capture Orlando’s eclectic neighborhoods and rehearses with the Orlando Repertory’s production
    of “Our Town”; they draw inspiration from Frida Kahlo, Georgia O'Keeffe, and local muralist Dave Seaton, and regularly attend shows featuring Lin‑Manuel Miranda’s “Hamilton” and exhibitions by Yayoi
    Kusama, letting those influences color both classroom projects and their own short stories.
  travel: Joy Antley, a curious traveler with a penchant for cultural festivals, meticulously plans trips using spreadsheets, prioritizing experiences like New Orleans Mardi Gras, Charleston’s Spoleto Festival,
    Savannah Music Festival, and Asheville’s LEAF Festival; they have already explored Santa Fe’s art scene, Nashville’s music venues, and aim to attend the Veracruz Carnival in Mexico next spring, balancing
    family time with solo adventures that feed their artistic imagination.
  culinary: Joy Antley, a herb‑garden enthusiast and experimental home cook, relishes crafting rosemary‑lemon roasted chicken, basil pesto linguine, and Thai green curry accented with fresh cilantro and
    Thai basil; they regularly shop at the Orlando Farmers Market for heirloom tomatoes and heirloom peppers, and occasionally experiment with a dash of ghost pepper sauce, using a medium‑high skill level
    to adapt recipes while still ordering takeout on nights when lesson‑plan deadlines loom.
  core: Joy Antley is a hyper‑organized, art‑obsessed educator who channels boundless curiosity into community workshops, fuels daily productivity with espresso, and battles a habit of over‑planning that
    often leaves little room for spontaneity.
background:
  cultural: Joy grew up in a suburban neighborhood of Central Florida, where a blend of Southern hospitality and the region's tourism-driven diversity shaped her worldview. Her family, originally from the
    Midwest, settled in Orlando during the 1980s, bringing with them traditions of community involvement, strong work ethic, and a deep appreciation for education. While identifying with mainstream white
    American culture, Joy embraces the multicultural fabric of Orange County, regularly incorporating Hispanic, Caribbean, and international perspectives into her teaching. She values the arts as a universal
    language and often celebrates local cultural festivals to foster inclusivity. Joy’s upbringing emphasized civic engagement, leading her to volunteer extensively and champion community‑based initiatives
    throughout her career.
