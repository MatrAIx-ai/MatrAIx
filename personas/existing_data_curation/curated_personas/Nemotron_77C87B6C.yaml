  hobbies: '[''Docent at Danvers Museum'', ''Weekly watercolor painting class'', ''Pottery workshop'', ''Neighborhood book club host'', ''Hiking in Middlesex Fells State Park'', ''Yoga and mindfulness practice'',
    ''Backyard gardening (heirloom vegetables)'', ''Genealogy research'', ''Travel to historic New England sites'', ''Community theater volunteer'']'
  career_goals: Annette aims to transition her paralegal career toward a leadership role that merges her legal expertise with her passion for the arts and community service. Over the next few years she
    hopes to become a senior legal liaison for a regional arts nonprofit, overseeing contracts, intellectual property matters, and grant compliance while mentoring a team of legal assistants. She also intends
    to obtain certification in elder law to support senior citizens in Shirley and surrounding towns, possibly through a legal aid clinic. Ultimately, she envisions establishing a part-time consulting practice
    that offers pro-bono legal guidance to local cultural institutions and helps individuals navigate family-law issues, allowing her to balance professional fulfillment with a healthier, less stressful
    lifestyle.
