persona_description: A Harvard neurobiologist and professor who specializes in the study of Alzheimer's disease, particularly the role of infection in triggering the disease. His research focuses on the
  role of amyloid beta proteins in the development of Alzheimer's, and how infection may be connected to the buildup of these proteins in the brain. He has published research on the link between herpes
  and Alzheimer's, and believes that a chronic infection may be a contributing factor in the development of the disease.
