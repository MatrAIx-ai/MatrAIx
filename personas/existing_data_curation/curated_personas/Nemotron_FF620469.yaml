personas:
  professional: Amanda Horan is a curious three‑year‑old who treats the backyard as a laboratory, gathers leaves and rocks for her “research projects,” leads her stuffed‑animal council in daily meetings,
    and despite her disorganized piles of crayons, they relish the freedom of play without a strict schedule, hinting at an early knack for leadership and creative problem‑solving.
  sports: Amanda Horan is a lively participant in toddler gymnastics at Tiny Tot Gym, loves to cheer loudly for the local minor‑league baseball team the River City Rockets, and they prefer spontaneous backyard
    tag over regimented drills, reflecting their sociable energy and relaxed attitude toward structured obligations.
  arts: Amanda Horan delights in creating crayon drawings inspired by the whimsical worlds of Disney’s Frozen and the bright palettes of Crayola’s Rainbow Pack, sings along to Baby Shark and The Wheels
    on the Bus, and they often stage impromptu dance performances for family members, showing their appreciation for art, new ideas, and unconventional play.
  travel: Amanda Horan is a budding explorer who loves family trips to the children’s museum, weekend visits to the downtown aquarium, and spontaneous road outings to Grandma’s farm where they collect smooth
    stones, preferring the excitement of unplanned adventures over rigid itineraries.
  culinary: Amanda Horan enjoys the comforting taste of mac and cheese, the crunch of carrot sticks with hummus, and the sweet simplicity of banana slices, can proudly spread peanut butter on toast with
    a little help, but they often trade broccoli for extra crackers, revealing a playful yet picky palate.
  core: Amanda Horan is a three‑year‑old whirlwind of curiosity and social energy, thriving on spontaneous art, group play, and tiny triumphs, while they occasionally forget to tidy up crayons or brush
    their teeth.
background:
  cultural: Amanda is raised in a suburban family in Simi Valley, California, where mainstream American customs are central—celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July,
    and attending community events at local parks and libraries. The region’s multicultural atmosphere introduces her to diverse foods, languages on signage, and occasional cultural festivals, while her
    household emphasizes typical middle‑class values of education readiness, outdoor recreation, and community participation.
