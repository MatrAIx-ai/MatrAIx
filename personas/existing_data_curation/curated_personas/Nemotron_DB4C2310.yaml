personas:
  professional: Janelle Duggan, though only four, already demonstrates the diligent traits of a budding project manager, arranging their toys with disciplined precision, planning playtime in tidy schedules,
    and persisting through puzzles with a methodical mindset that hints at future leadership in organized endeavors.
  sports: Janelle Duggan participates in the Brooklyn Mini‑Soccer League, where they enjoy the predictable twice‑weekly training drills, cheerfully wave a tiny New York Yankees cap during spring outings,
    and prefer the structured routine of scheduled practice over spontaneous backyard games.
  arts: Janelle Duggan delights in storytime at the local library, especially when Dr. Seuss books are read aloud, and often hums along to Raffi’s ‘Baby Beluga’ while reenacting scenes from Disney’s The
    Little Mermaid with their crayons, showing a quiet but deep appreciation for narrative and music.
  travel: Janelle Duggan has visited Coney Island’s Luna Park and the Brooklyn Botanic Garden, loves the ferry ride to Staten Island with a view of the Statue of Liberty, and dreams of a family trip to
    a historic European city such as Bruges, Belgium, where storybook canals and medieval architecture promise new adventures while still fitting into their love of familiar routines.
  culinary: Janelle Duggan loves buttery macaroni and cheese sprinkled with cheddar, eagerly makes peanut butter‑jelly sandwiches on whole‑grain bread by themselves, and often finishes a bowl of applesauce,
    but invariably leaves a trail of crumbs across the kitchen floor, reflecting both growing independence and a messy habit.
  core: Janelle Duggan is a four‑year‑old who thrives on routine, organizes their play with methodical precision, and balances quiet solitude with a subtle, crumb‑leaving enthusiasm for everyday adventures.
background:
  cultural: Janelle is raised in a white, Irish‑American family living in Brooklyn, New York. Her household values routine, practicality, and traditional family customs such as Sunday meals and bedtime
    stories. While her neighborhood is culturally diverse, her family maintains modest, family‑centric traditions and participates in local community events like public library story sessions and park gatherings,
    blending urban Brooklyn life with a stable, heritage‑informed upbringing.
attributes:
  skills: '[''Following simple daily schedules'', ''Letter and number recognition (A‑Z, 1‑10)'', ''Sorting objects by color and shape'', ''Basic puzzle assembly'', ''Fine‑motor tasks such as coloring and
