  hobbies: '[''Building block towers'', ''Coloring picture books'', ''Listening to nursery rhymes'', ''Organizing stuffed animals'', ''Small, familiar playdates'', ''Story time at the library'', ''Pretend
    caregiver games'']'
  career_goals: Even at four, Janelle often talks about becoming a teacher or a caregiver when she grows up. She likes the idea of helping other kids learn and keeping things orderly, and she sometimes
    pretends to lead a classroom of her stuffed animals. Her ambition is rooted in her love for routine and caring for others.
