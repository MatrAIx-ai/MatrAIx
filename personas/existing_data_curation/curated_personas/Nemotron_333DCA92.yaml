    self‑help and personal development books"]'
  career_goals: Richard aims to earn a Certified Occupational Therapy Assistant (COTA) credential and eventually pursue an Associate's degree in Occupational Therapy, with the long‑term ambition of becoming
    a licensed Occupational Therapist. He wants to develop community‑based group therapy programs for seniors and individuals with chronic conditions, and eventually lead a small clinic in the Kendall area
    that integrates holistic wellness and mental‑health support. He also hopes to mentor new aides and contribute to improving workplace practices that reduce stress for staff.
