personas:
  professional: Marisel Rodriguez is a veteran dental and ophthalmic laboratory technician with 45 years of expertise in hand‑crafted and CAD/CAM prosthetics, who now channels their disciplined, organized
    mindset into mentoring junior staff, designing apprenticeship curricula, and consulting on quality‑assurance integration of digital workflows while preserving traditional techniques.
  sports: Marisel Rodriguez stays active through low‑impact water aerobics at the senior center, joins a weekly walking group called the Riverwalk Seniors Club, cheers on the Chicago Cubs during their baseball
    season and supports the Chicago Bulls in basketball, and they also enjoy casual pickleball matches at the community recreation center every spring.
  arts: Marisel Rodriguez expresses their creativity through intricate quilting projects inspired by the geometric patterns of Anni Albers, sings alto in their church choir performing works by Handel and
    contemporary pieces by contemporary Mexican‑American composer José Santiago, and deepens their appreciation for narrative art by reading biographies of pioneering women like Frida Kahlo and listening
    to the timeless boleros of Los Panchos while sipping tea.
  travel: Marisel Rodriguez favors purposeful travel that blends cultural immersion with relaxation, having toured the historic plazas of San Miguel de Allende, explored the colonial architecture of Seville,
    Spain, and taken a scenic road trip along California’s Pacific Coast Highway where they stopped in Monterey to collect sea‑salt for their cooking, while they now dream of a serene retreat in the lavender
    fields of Provence.
  culinary: Marisel Rodriguez delights in preparing traditional tamales with masa made from freshly ground corn, simmering hearty pozole flavored with hominy, chilies, and pork shoulder, and crafting salsa
    from garden‑grown tomatoes, cilantro, and jalapeños, while they hone their culinary technique by experimenting with molecular gastronomy twists like foam‑infused guacamole during occasional dinner gatherings.
  core: Marisel Rodriguez blends a lifelong devotion to meticulous craftsmanship with a warm, community‑focused spirit, balancing their love for structure—evident in their garden schedules and quilt patterns—with
    a soft spot for spontaneous karaoke evenings, yet they often forget to water their herbs on rainy days and habitually check the clock before starting any new task.
background:
  cultural: Marisel was born to Mexican immigrant parents who settled in the Upper Midwest in the 1950s. Growing up in a predominantly Irish‑American community in Saginaw, she learned English quickly while
    preserving Spanish as a household language. Her family's Catholic faith and Mexican traditions—such as Día de los Muertos, quinceañera celebrations, and holiday feasts—remained central to her identity.
    She maintains ties with the local Mexican-American cultural association, participates in annual festivals, and often prepares traditional dishes for community events. While she embraces the values of
    hard work, respect, and familial responsibility that are prominent in Mexican culture, she also integrates Midwestern pragmatism and a strong sense of civic duty, reflected in her long career in a health‑focused
    laboratory and her volunteerism.
attributes:
  skills: '["Dental prosthesis fabrication", "Ophthalmic lens grinding and edging", "CAD/CAM design and milling", "Material selection and handling", "Quality assurance and regulatory compliance", "Inventory
    and workflow management", "Technical documentation and record keeping", "Training and mentorship of junior technicians"]'
  hobbies: '["Gardening (vegetables and herbs)", "Cooking traditional Mexican cuisine", "Quilting and crochet", "Reading historical and biographical books", "Bridge and puzzle games", "Volunteering at community
    health fairs", "Singing in the church choir"]'
  career_goals: As she approaches retirement, Marisel aims to transition from full‑time laboratory work to a mentorship and consultancy role. She hopes to develop a structured apprenticeship program for
    young technicians at her lab, champion the integration of digital workflows while preserving traditional hand‑craft skills, and serve as a quality‑assurance advisor to ensure that new equipment meets
    the high standards she has cultivated. Additionally, she envisions volunteering her expertise at community health clinics to provide affordable prosthetic solutions for underserved populations, thereby
    extending the impact of her decades‑long dedication to patient care.
