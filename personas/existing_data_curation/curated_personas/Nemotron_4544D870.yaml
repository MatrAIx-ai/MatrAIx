  hobbies: '[''Watercolor painting'', ''Acrylic painting'', ''Photography (portrait and nature)'', ''Local theater attendance'', ''Visiting art exhibitions'', ''Hiking in Kitsap County'', ''Yoga and mindfulness
    meditation'', ''Cooking multicultural recipes'', ''Knitting and textile crafts'', ''Reading contemporary art literature'', ''Volunteering at community art workshops'', ''Collecting vintage jazz vinyl
    records'']'
  career_goals: Micheline aims to advance to a supervisory role within the manufacturing sector, leveraging her reliability and leadership qualities to become a shift supervisor or quality‑assurance lead.
    She also aspires to integrate her artistic interests by moving into a production manager position at a company that produces creative or handcrafted goods. Over the next few years she plans to complete
    her college degree in industrial technology or art management, obtain relevant certifications, and develop a side business selling locally made art pieces. Throughout her career progression, she seeks
    a stable environment that supports her mental‑health needs and allows her to mentor younger workers.
