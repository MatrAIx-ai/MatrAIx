    ''teamwork in workshop'']'
  hobbies: '[''model car kit building'', ''DIY home repairs'', ''gardening'', ''baking traditional Mexican pastries'', ''listening to regional Mexican music'', ''listening to classic rock'', ''watching
    automotive shows'', ''hiking local trails'', ''volunteering at community car safety workshops'', ''reading automotive technical magazines'']'
  career_goals: Lilliam aims to achieve ASE Master Technician certification within the next two years, focusing on hybrid and electric vehicle systems. She seeks to advance to a lead‑technician role where
    she can supervise junior staff and improve workshop efficiency. Long‑term, she aspires to open her own community‑focused auto repair shop that offers bilingual services and affordable maintenance for
    working‑class families in the East Bay. She also plans to complete her GED and pursue additional training in small‑engine repair, and she hopes to mentor other women and Hispanic individuals entering
    the automotive trades.
