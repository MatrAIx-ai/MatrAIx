personas:
  professional: Lilliam Reynoso, a seasoned automotive technician, combines her mastery of hybrid/electric diagnostics, bilingual communication, and methodical, stress‑resilient work style to oversee a
    high‑volume East Bay repair shop and guide junior mechanics toward efficiency.
  sports: Lilliam Reynoso maintains fitness by cycling with the East Bay Road Warriors club, cheering on the Oakland Athletics in spring and the Golden State Warriors in the winter, and occasionally joining
    a weekend pickup soccer game with neighbors to balance her hands‑on workshop routine.
  arts: Lilliam Reynoso relaxes after a long workday by listening to the soaring guitar riffs of Led Zeppelin and the rhythmic ballads of Los Tigres del Norte, while occasionally watching classic car‑culture
    documentaries narrated by the charismatic host Jeremy Clarkson on 'Top Gear'.
  travel: Lilliam Reynoso prefers well‑planned road trips along the Pacific Coast Highway, often camping near Big Sur before heading inland to explore the Redwood forests, while dreaming of a future overland
    adventure to Costa Rica's volcanic highlands once her auto shop is established.
  culinary: Lilliam Reynoso, an avid home chef, cultivates tomatoes and cilantro in her backyard plot and uses them to craft authentic tamales and pan de muerto, while also mastering the perfect sear on
    a flank steak with a spice rub of cumin, smoked paprika, and fresh lime zest.
  core: Lilliam Reynoso blends methodical automotive expertise with a love for hands‑on DIY, a habit of meticulously cataloguing every repair in a leather‑bound journal, and a soft spot for late‑night baking
    that often leaves flour trails across her garage floor.
background:
  cultural: Lilliam is a second‑generation Mexican‑American raised in the vibrant Hispanic community of San Pablo, California. She grew up in a bilingual household where Spanish was spoken daily, and she
    celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and family gatherings centered around homemade meals. Her cultural identity emphasizes hard work, family loyalty, and community
    support, values that shape her approach to her job and her interactions with customers. She remains connected to her roots through regular visits to local cultural festivals, participation in Spanish‑language
    community groups, and by sharing Mexican cuisine with friends and colleagues. At the same time, she blends these traditions with the broader Californian lifestyle, appreciating the diversity and opportunities
    of the Bay Area.
attributes:
  skills: '[''engine diagnostics'', ''transmission repair'', ''brake system repair'', ''suspension maintenance'', ''hybrid/electric vehicle maintenance'', ''OBD-II scanner operation'', ''hydraulic lift
