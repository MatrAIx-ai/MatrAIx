persona_description: A geologist who specializes in the study of faulting processes, particularly the identification and visualization of linear geologic features such as faults and lineaments using analytical
  hillshading techniques. The geologist has extensive experience working with digital elevation models and remote sensing imagery to identify and visualize faults and lineaments in various topographic landforms.
  The geologist is also familiar with the seismology of the state of Montana, including the history of seismic activity and the potential for future earthquakes on faults in western Montana. The geologist
  is skilled in data analysis and planar regression analysis for hypocenter location studies and GIS visualization tools for lineament mapping in eastern Montana.
