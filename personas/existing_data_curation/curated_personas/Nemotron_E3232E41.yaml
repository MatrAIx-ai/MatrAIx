personas:
  professional: Pedro Perez, a 63‑year‑old bilingual community volunteer coordinator, blends practical handyman expertise with meticulous budget oversight to organize senior fellowship events, while his
    innate reliability and gentle conflict‑resolution style keep volunteers engaged despite his tendency to over‑worry about every logistical detail.
  sports: Pedro Perez participates in a weekly walking group through Flushing’s Meadow Park, cheers on the New York Mets during spring training, and embraces community cumbia and salsa dance nights as lively
    cardio sessions that keep him agile.
  arts: Pedro Perez’s artistic life blends a soulful role in the senior choir, energetic cumbia and salsa dance evenings, evenings tuned to classic bolero radio shows featuring José José and Lola Beltrán,
    and nostalgic viewings of timeless films starring Pedro Infante and María Félix.
  travel: Pedro Perez prefers structured group excursions and modest road trips, having journeyed to the historic streets of Seville, the scenic Blue Ridge Parkway, and a family gathering in San Juan, while
    his next travel goal is a relaxed cruise along the Greek islands once his savings allow.
  culinary: Pedro Perez is a seasoned home chef who skillfully prepares tamales, rich mole made with dried chilies, cacao and spices, and fresh tomatillo salsas seasoned with cilantro, oregano, and lime,
    often hosting neighbors for shared meals flavored with his signature blend of cumin and garlic.
  core: Pedro Perez is a diligent, socially‑engaged senior whose love for community, meticulous planning, and classic boleros is balanced by a perpetual worry about the little things.
background:
  cultural: Pedro was born to Mexican immigrant parents who settled in New York during the 1970s. He grew up in a bilingual household where Spanish was spoken at home and English at school, fostering a
    dual cultural identity. Mexican traditions—such as celebrating Día de los Muertos, preparing tamales with family, and attending Catholic mass—remain central to his life. Living in Flushing, he has blended
    his heritage with the multicultural fabric of Queens, participating in local Latino networks while also engaging with the broader community. His cultural background shapes his values of family solidarity,
    respect for elders, hospitality, and a strong sense of community responsibility.
attributes:
  skills: '[''Bilingual Spanish–English communication'', ''Basic automotive repair'', ''Home maintenance and handyman tasks'', ''Traditional Mexican cooking'', ''Community event planning'', ''Volunteer
