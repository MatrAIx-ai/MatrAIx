  hobbies: '[''Church senior fellowship and choir'', ''Weekly walking group'', ''Community dance nights (cumbia & salsa)'', ''Cooking traditional Mexican dishes'', ''Sharing meals with neighbors'', ''Listening
    to Mexican radio'', ''Watching Mexican cinema'', ''Crossword puzzles'', ''Volunteering at the food pantry'', ''Participating in local cultural festivals'']'
  career_goals: He aims to stay physically and mentally active, maintain his independence, and give back to his community. His primary ambition is to become a certified volunteer caretaker at a local senior
    center, where he can mentor younger seniors and share his cultural knowledge through cooking classes and storytelling. He also hopes to organize an annual neighborhood Mexican cultural festival, preserve
    traditional recipes by publishing a small family cookbook, and ensure his health remains stable through regular exercise and routine medical care.
