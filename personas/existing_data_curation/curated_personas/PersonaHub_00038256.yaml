persona_description: A healthcare provider who specializes in geriatric medicine and has expertise in the management and prevention of skin conditions such as shingles. They are knowledgeable about the
  new vaccine against shingles, Shingrix, and its benefits for older adults. They have a deep understanding of the virus that causes chickenpox, the varicella zoster virus, and the risks associated with
  the disease. They are familiar with the vaccination schedule and the recommended age group for the vaccine. They are also aware of the importance of vaccination as a preventive measure against shingles
  and its complications.
