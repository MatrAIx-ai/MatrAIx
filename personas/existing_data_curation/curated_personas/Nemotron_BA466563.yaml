  career_goals: Although still only seven, Cecilia already imagines a future where she can help and inspire others. She often says she wants to become a teacher because she loves sharing what she knows
    and enjoys being a friendly guide for younger children. She also dreams of caring for animals as a veterinarian, reflecting her practical interest in tangible, helpful work. Occasionally, she pictures
    herself on stage in a community theater production, combining her love for storytelling, being the center of attention, and her sociable spirit. These aspirations blend her practical mindset with her
    talkative, expressive personality.
