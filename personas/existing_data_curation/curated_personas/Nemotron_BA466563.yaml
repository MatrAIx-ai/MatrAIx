personas:
  professional: Cecilia Sudario, a budding classroom presenter, transforms routine reading sessions into lively storytime shows, using their karaoke flair and spontaneous imagination to engage peers, and
    they practice leadership skills with confidence.
  sports: Cecilia Sudario darts around the neighborhood soccer field as a forward for the Junior Jaguars youth club, eagerly cheering for the city’s pro team, the Thunderbolts, during weekend matches, and
    they blend structured drills with spontaneous pick-up games to keep their energy high.
  arts: Cecilia Sudario lights up when singing Disney hits like "Let It Go" from Frozen, idolizes performers from The Wiggles, and eagerly reenacts scenes from the animated movie "Moana" during school plays,
    letting music and performance shape their vibrant, expressive personality.
  travel: Cecilia Sudario dreams of revisiting the sandy shores of Sunny Cove with their family and, after a memorable trip to the local science museum and a weekend getaway to Disneyland, they now eagerly
    plan their next adventure to Japan to see cherry blossoms, though they rely on parents for all itinerary details.
  culinary: Cecilia Sudario loves munching on cheesy pepperoni pizza and crafting colorful fruit kebabs with grapes, strawberries, and melon chunks, proudly helping in the kitchen by stirring pancake batter
    and sprinkling cinnamon, yet they stubbornly refuse to eat broccoli, demanding a side of ketchup instead.
  core: Cecilia Sudario blends routine-loving schoolwork with spontaneous karaoke performances, thrives on being the center of attention, and despite a habit of forgetting socks on busy days, they charge
    through life with relentless energy and a ready-made LEGO imagination.
background:
  cultural: Cecilia grows up in a white, middle‑class family in St. Louis, Missouri, a city known for its blend of Midwestern practicality and vibrant community traditions. Her upbringing includes participation
    in local events such as the St. Louis Zoo visits, neighborhood block parties, and seasonal celebrations like Fourth of July fireworks and community holiday festivals. Her family values punctuality,
    clear routines, and hands‑on learning, which shape her preference for familiar, practical activities. At the same time, the city's diverse cultural offerings—museum trips, music performances, and sports
    culture—expose her to a broad range of social experiences, reinforcing her sociable and talkative nature.
