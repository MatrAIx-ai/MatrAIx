personas:
  professional: Marissa Henry combines eight years of hands‑on computer support, a solid business foundation, and a meticulous, organized approach to transform technical challenges into user‑friendly solutions,
    while positioning herself for an IT service management role that emphasizes mentorship and an inclusive workplace culture.
  sports: Marissa Henry channels her love for the outdoors into weekly hikes along the Texas Hill Country trails, participates in a local 5K running club during spring, and roots for the Dallas Mavericks
    and Texas Rangers, balancing a structured workout routine with occasional missed sessions when work stress spikes.
  arts: Marissa Henry immerses herself in Dallas’s visual‑arts scene, curating a blog that critiques contemporary exhibitions and shares reflections on socially engaged artists such as Banksy and Ai Weiwei,
    while also practicing watercolor painting on weekends and snapping street‑level photographs that capture the city’s vibrant community life.
  travel: Marissa Henry prefers thoughtfully planned weekend getaways that blend cultural exploration with nature, often traveling to New Orleans for its music and culinary heritage, hiking in the Hill
    Country, and occasionally embarking on a solo trip to Barcelona for its art museums, all while using a travel rewards credit card to stretch her budget.
  culinary: Marissa Henry delights in cooking comforting Southern‑style dishes like shrimp étouffée, collard greens, and pecan pie for friends, perfecting her low‑sugar sweet tea recipe, and often sourcing
    fresh herbs and tomatoes at Dallas farmers markets, though she occasionally over‑salts her dishes when multitasking between cooking and work calls.
  core: Marissa Henry is a methodical IT expert with a voracious curiosity for the arts, who balances meticulous planning with occasional anxiety‑driven perfectionism, and channels her passion into community
    mentorship, hiking, and Southern cooking.
background:
  cultural: Marissa’s identity as a Black woman from Texas is woven through her personal and professional life. Raised in a close‑knit African‑American community, she was immersed in church traditions,
    gospel music, and family gatherings that emphasized resilience and collective uplift. Her upbringing exposed her to the rich heritage of Black art and literature, shaping her appreciation for cultural
    expression. She celebrates Juneteenth and local Black History Month events, and actively supports Black‑owned businesses in Mansfield and the broader Dallas‑Fort Worth area. This cultural grounding
    informs her commitment to mentorship, community service, and fostering inclusive spaces within the tech industry.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software troubleshooting'', ''Network configuration and troubleshooting'', ''Active Directory management'', ''Ticketing system administration (ServiceNow)'',
    ''Basic scripting (PowerShell, Bash)'', ''Technical documentation'', ''User training and support'', ''Business process alignment'', ''Customer service and conflict resolution'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Digital street photography'', ''Reading non-fiction (psychology, tech, entrepreneurship)'', ''Hiking in the Texas Hill Country'',
    ''Cooking Southern cuisine for friends and family'', ''Mentoring youth in STEM through church programs'']'
  career_goals: Marissa aspires to move from individual technical support to a leadership role where she can shape IT strategy for a mid‑size company. She plans to earn industry certifications such as CompTIA
    Network+ and Cisco CCNA, and eventually pursue an ITIL or PMP certification to broaden her project‑management capabilities. Her long‑term ambition is to become an IT Service Manager or Director, overseeing
    a team that builds resilient, user‑centric technology solutions while fostering a supportive workplace culture. She also hopes to mentor Black women entering the tech field and to develop a community‑focused
    workshop series that blends business acumen with basic digital literacy.
