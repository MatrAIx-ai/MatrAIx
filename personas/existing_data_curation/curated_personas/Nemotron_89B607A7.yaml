    Development Workshop Delivery'', ''Cultural Competency'', ''Improvisational Teaching'', ''Flexible Lesson Planning'']'
  hobbies: '[''Reading literature'', ''Creative writing (poetry, essays)'', ''Chinese calligraphy'', ''Cooking Taiwanese dishes'', ''Hiking in Bay Area trails'', ''Playing piano'', ''Board games (Go)'',
    ''Small‑group book club participation'', ''Mindfulness meditation'', ''Volunteer language workshops at cultural center'']'
  career_goals: Hao aims to become the head of the Humanities department at his Fremont high school, where he can champion a cross‑cultural curriculum that weaves East Asian literary and historical narratives
    into the broader syllabus. He plans to pursue a Doctorate in Education with a focus on flexible instructional design and student engagement, eventually publishing research on how spontaneity in lesson
    delivery can coexist with accountability. In the next five years, he also wishes to mentor new teachers, lead district‑wide professional development on culturally responsive pedagogy, and refine his
    organizational skills to meet administrative deadlines more consistently.
