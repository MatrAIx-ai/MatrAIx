  career_goals: Leonard aspires to merge his love for art and technology by becoming a concept artist or visual storyteller for video games and graphic novels. He hopes to attend a high school with a strong
    arts program, earn a scholarship to study graphic design or interactive media, and eventually work in a studio where he can create characters and worlds that blend imaginative narratives with cutting‑edge
    digital tools. He also entertains the idea of pursuing a degree that combines environmental science with visual communication, using his photography and illustration skills to raise awareness about
    local ecosystems.
