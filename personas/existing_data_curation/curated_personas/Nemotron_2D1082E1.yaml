personas:
  professional: Angela Roberson is a veteran correctional officer who leverages fifteen years of frontline experience, expert crisis‑intervention and de‑escalation skills, and advanced surveillance‑technology
    analysis to run seamless inmate classification and case‑management, while their methodical, organized nature and competitive edge drive them to mentor peers and champion data‑driven, art‑based rehabilitation
    programs.
  sports: Angela Roberson hits the trails of Saylorville Lake and Gray’s Lake with her Ankeny Trail Club crew for weekly hikes, follows the Iowa Hawkeyes football season religiously, and joins a recreational
    softball league in the summer, employing a disciplined yet competitive approach to fitness that reflects their methodical law‑enforcement mindset, and they often log their mileage in a detailed spreadsheet.
  arts: Angela Roberson immerses themselves in watercolor abstractions inspired by Iowa’s rolling plains while channeling Ansel Adams‑style sunrise photography, volunteers at the Ankeny Arts Center’s workshops,
    and regularly attends Des Moines Playhouse productions of classics like 'A Streetcar Named Desire,' all of which reinforce their curiosity‑driven, art‑centric identity, and they often discuss new techniques
    with fellow artists.
  travel: Angela Roberson prefers meticulously planned road trips that blend solo sunrise photography sessions in Minnesota’s Boundary Waters with occasional family visits to Chicago’s art museums, while
    dreaming of a future summer expedition to Yellowstone’s geysers and a cultural pilgrimage to the historic streets of Edinburgh, and they meticulously document each stop with a DSLR camera.
  culinary: Angela Roberson cooks at an intermediate level, favoring Midwestern comfort foods such as pan‑seared pork tenderloin glazed with apple cider and sage, paired with a roasted beet and goat‑cheese
    salad featuring honey‑roasted walnuts, and they often experiment with seasonal ingredients like heirloom tomatoes, fresh basil, and smoky chipotle in their nightly dinner experiments.
  core: Angela Roberson blends forensic precision with artistic spontaneity, navigating correctional hallways by day and watercolor landscapes by night, all while they obsessively double‑check every lock
    and crossword clue—a competitive streak that fuels their drive but occasionally steals their sleep.
background:
  cultural: 'Angela grew up in a multigenerational, white Midwestern family in central Iowa, with deep German-Scandinavian roots common to the region. Her parents emphasized hard work, community service,
    and modesty, values that guided her decision to serve in corrections rather than pursue a purely technical career after earning a bachelor''s degree in chemical engineering from Iowa State University.
    The cultural fabric of Ankeny—a blend of small-town friendliness and proximity to the urban amenities of Des Moines—shaped her balanced outlook: she values personal independence while staying engaged
    in local civic life. Regular participation in church gatherings, community festivals, and the Ankeny Arts Center reinforced a respect for both tradition and creative expression. This background informs
    her pragmatic yet curious approach to both her profession and personal passions.'
attributes:
  skills: '["Crisis intervention and de-escalation", "Firearms handling and defensive tactics", "First aid and CPR", "Inmate classification and case management", "Incident reporting and documentation",
    "Surveillance system operation and data analysis", "Legal regulations and policy compliance", "Risk assessment and threat evaluation", "Team leadership and mentorship", "Art-based rehabilitation program
    development", "Schedule and logistics coordination", "Cultural competency training"]'
  hobbies: '["Watercolor painting", "Landscape photography", "Hiking in Iowa state parks", "Reading science fiction and popular science", "Puzzle solving (crosswords, Sudoku)", "Strategy board games", "Community
    theater attendance", "Cooking experiments", "Volunteering at local art workshops", "Listening to true-crime podcasts"]'
  career_goals: Angela aims to advance into supervisory leadership, targeting the role of Shift Commander within the Polk County Corrections Facility within the next two years. She plans to enroll in a
    part-time Master's program in Criminal Justice to deepen her understanding of correctional policy and rehabilitation theory. Her long-term ambition is to design and institutionalize an art-focused restorative
    justice program that can be adopted statewide, positioning herself as a subject-matter expert and consultant for correctional reform. Additionally, she hopes to mentor more women in law-enforcement
    careers and eventually serve on the Iowa Department of Corrections advisory board.
