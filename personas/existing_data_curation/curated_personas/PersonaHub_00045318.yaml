persona_description: A laboratory chemist who specializes in the analysis of lead ores, particularly the fire assay method. He has experience with various types of lead ores and their characteristics, and
  is skilled in the use of portable pocket assay balances for accurate measurements. He is also familiar with the effects of various metals on lead ores and their slag, and is able to adapt the assay method
  for different types of ore. He is aware of the limitations of the dry assay method for lead ores and is able to recommend alternative methods for better results. He has experience with the determination
  of lead ores and their characteristics, and is able to compare the results with true values to assess the accuracy of the assay method.
