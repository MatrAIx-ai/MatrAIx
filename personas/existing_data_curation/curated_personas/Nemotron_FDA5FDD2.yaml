personas:
  professional: Donny Potter, an experienced private tutor in mathematics and reading, blends curiosity with practicality to design flexible, inquiry‑based lessons that often feature local fishing analogies,
    while they assertively set boundaries when students drift off‑task and incorporate digital learning platforms to keep sessions engaging.
  sports: Donny Potter enjoys weekend fishing on Lake Weir, rides with the Ocala Trailblazers cycling club on local nature trails, and follows the Orlando Magic, Tampa Bay Buccaneers, and Florida Gators,
    balancing outdoor recreation with a casual fandom that fuels their community spirit.
  arts: Donny Potter is a classic‑rock vinyl enthusiast who spins Led Zeppelin, Fleetwood Mac, and The Rolling Stones, plays acoustic guitar at occasional open‑mic nights, and attends productions at the
    Ocala Playhouse, letting music and theater shape their creative downtime.
  travel: Donny Potter prefers spontaneous weekend getaways to the Florida Keys or the Everglades, uses a loosely kept spreadsheet to plan a dream trip to New Zealand’s South Island for kayaking, yet their
    flexible, low‑cost travel style often results in last‑minute bookings and missed reservations.
  culinary: Donny Potter delights in grilling fresh lake‑caught fish with lemon‑herb butter, prepares shrimp and grits with locally sourced vegetables, often cooks farm‑to‑table meals using herbs from their
    garden, and occasionally bakes banana bread for neighborhood trivia nights.
  core: Donny Potter is a laid‑back, curiosity‑driven mentor who juggles anxiety, spontaneous creativity, and a love for nature, and they often let disorganization slip into their schedule.
background:
  cultural: Donny grew up in a suburban middle‑class environment in Central Florida, shaped by the region’s outdoor lifestyle and a blend of Southern hospitality and Floridian multiculturalism. His upbringing
    emphasized self‑reliance, community involvement, and a practical work ethic. He is familiar with the local farming and equestrian culture of Ocala and values the laid‑back, yet resilient, attitudes
    common in the area. Though his formal education stopped at high school, he has continued informal learning through community colleges, workshops, and online resources, reflecting a belief in lifelong
    personal growth.
attributes:
  skills: '[''Mathematics tutoring (Algebra, Geometry, Pre‑Calculus)'', ''Reading comprehension and writing assistance'', ''Test preparation (SAT, ACT)'', ''Personalized lesson planning'', ''Use of digital
    learning tools (Khan Academy, Google Classroom)'', ''Emotional support and student motivation'', ''Classroom management and assertive communication'', ''Adaptation of curriculum to practical real‑world
    applications'']'
  hobbies: '[''Fishing'', ''Cycling on nature trails'', ''Sustainable gardening'', ''Listening to classic‑rock vinyl'', ''Playing acoustic guitar'', ''DIY home‑improvement projects'', ''Guided meditation'',
    ''Journaling'', ''Participating in trivia nights'']'
  career_goals: Donny aspires to expand his tutoring services into a community learning center in Marion County, offering both in‑person and online workshops for students and adult learners. He plans to
    obtain a teaching certification to complement his practical experience and to develop a series of self‑published study guides that reflect his pragmatic teaching style. Additionally, he aims to improve
    his own mental well‑being by attending therapy and learning stress‑management techniques, ultimately becoming a more stable and reliable mentor for his students.
