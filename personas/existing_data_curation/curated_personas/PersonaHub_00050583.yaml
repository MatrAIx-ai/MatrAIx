persona_description: A teacher who understands and respects the unique needs of introverted and extroverted students, creating a balanced approach to teaching that allows for individual and group learning,
  processing and discourse. The teacher is skilled in creating loosely-designed lessons that allow students to choose methods that fit their level of introversion and extroversion, ensuring that all students
  have the opportunity to engage in meaningful discourse and critical thinking. The teacher is also knowledgeable in the study of group theory and has a passion for teaching that is reflected in their approach
  to teaching.
