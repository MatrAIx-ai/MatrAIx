persona_description: This book is likely to be of interest to health care chaplains, students and professionals in other health care fields, and the social sciences. The book covers fundamental and practical
  knowledge about research methodology, including the scientific method, research designs, measurement, operational definitions, independent and dependent variables, measures of central tendency and variability,
  and the t-test. The author, Kevin J. Flannelly, has over 150 peer-reviewed publications and has been the Editor-in-Chief of the Journal of Health Care Chaplaincy. The book is a comprehensive resource
  for those interested in understanding and applying research methodology in health care settings.
