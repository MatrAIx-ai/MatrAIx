  career_goals: Elizabeth dreams of staying engaged in school and eventually graduating high school with honors, aiming to pursue a career that combines her love for helping others and her preference for
    structured, predictable work. She is especially interested in becoming a teacher or a pediatric nurse, professions that allow her to support her community and work within well‑defined routines. In the
    longer term, she hopes to lead youth programs—perhaps as a Girl Scouts troop leader—so she can continue fostering cooperation and kindness among her peers.
