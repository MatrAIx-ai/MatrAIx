personas:
  professional: Oneida Alston is a disciplined audit professional on the cusp of CPA licensure, leveraging mastery of GAAP, forensic accounting, advanced Excel macros, and Power BI to craft rigorous audit
    methodologies while maintaining a skeptical eye on client assertions and a competitive drive to out-perform peers in a field where women remain under-represented.
  sports: Oneida Alston follows the New York Knicks and Philadelphia Eagles with a pragmatic fan's enthusiasm, plays weekly indoor squash at a local club, and adheres to a disciplined home-based HIIT routine
    to counter sedentary audit work, while occasionally allowing themselves a cheat-day marathon of classic sports movies.
  arts: Oneida Alston explores historic architecture through photography, drawing inspiration from the works of Ansel Adams and preservationist writings of Henry Hope Reed, regularly attends the Metropolitan
    Museum's evening lectures, and finds solace in the quiet strains of Chopin's piano preludes, while also debating the merits of modernist literature in their book club.
  travel: Oneida Alston prefers meticulously planned trips that blend cultural immersion with quiet retreats, having recently spent a long weekend in Philadelphia's historic Old City, a solo hiking escape
    to the Catskills, and a future itinerary that includes a winter stay in Kyoto's traditional machiya to study Japanese garden design and tea ceremony precision.
  culinary: Oneida Alston enjoys precision cooking, regularly baking artisanal sourdough loaves and mastering the chemistry of French macarons, tending an indoor herb garden of basil, thyme, and rosemary
    for fresh garnish, and carefully weighing each ingredient with a digital scale to satisfy their love of exactness, though they admit to over-indulging in late-night pastries when stress peaks.
  core: Oneida Alston is a methodical auditor-to-be who channels curiosity, a competitive edge, and anxiety-driven attention to detail into a life of structured finance, meticulous health routines, solitary
    creative pursuits, and exacting culinary experiments, occasionally hindered by stress-induced pastry binges.
background:
  cultural: Oneida grew up in a middle-class white family in suburban Sewell, New Jersey, surrounded by the diverse cultural influences of the greater Philadelphia and New York metropolitan areas. Her upbringing
    emphasized education, self-reliance, and community service. Although her ancestry is primarily of European (Irish-German) descent, she has been exposed to a range of cultural perspectives through local
    museums, multicultural events, and her work in a field where women are still under-represented. This background fosters a pragmatic American outlook, a strong work ethic, and a competitive drive to
    excel in the accounting profession while valuing precise, organized approaches to both work and personal life.
attributes:
  skills: '["GAAP compliance", "Tax preparation", "Financial reporting", "Audit planning and execution", "Risk assessment", "Internal controls", "Advanced Excel (pivot tables, macros)", "Power BI data visualization",
    "SAP/Oracle ERP systems", "Forensic accounting techniques", "Project management", "Process improvement"]'
  hobbies: '["Historical non-fiction reading", "Classic literature", "Puzzle solving (Sudoku, crosswords)", "Yoga", "Precision cooking and baking", "Indoor herb gardening", "Photography of historic architecture",
    "Small book club", "Volunteer tax assistance"]'
  career_goals: Oneida aims to achieve Certified Public Accountant (CPA) licensure within the next year and advance to a senior auditor role within two years. She aspires to manage audit engagements, develop
    innovative audit methodologies, and eventually become an audit manager or partner at a mid-sized firm. A long-term ambition is to specialize in forensic accounting, leveraging her investigative curiosity
    while maintaining a trajectory toward a chief financial officer (CFO) position in a technology-driven company. Throughout her career, she prioritizes high performance standards, continuous professional
    development, and strategic networking in small, focused professional circles.
