  hobbies: '[''Fishing'', ''Hiking'', ''Traditional Mexican cooking'', ''Community cultural events (Día de los Muertos, festivals)'', ''Watching soccer (Liga MX, MLS)'', ''Vintage car engine restoration'',
    ''Mindful walking and breathing exercises'', ''Journaling'']'
  career_goals: Jose aims to move from first-line supervision to a plant-wide managerial role within the next five years. He plans to earn an Associate's degree in Industrial Technology and obtain certifications
    in Six Sigma Green Belt and Certified Safety Professional. His long-term ambition is to lead a multi-site operation where he can integrate his practical curiosity for new technologies—such as IoT sensors
    for predictive maintenance—with his commitment to a safe, collaborative work culture. He also hopes to develop a mentorship program that supports young workers, especially those from Hispanic backgrounds,
    and eventually start a consultancy that helps small manufacturers adopt lean practices.
