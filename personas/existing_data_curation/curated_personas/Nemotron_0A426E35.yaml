personas:
  professional: Xiaoguang Chang, a toddler‑aged budding architect, spends hours arranging brightly colored blocks into carefully planned structures, methodically mapping each tower before placing the next
    piece, and delights in calmly explaining the blueprint to curious onlookers.
  sports: Xiaoguang Chang enjoys weekly toddler gymnastics classes at the Little Leapers Club, eagerly practices balancing on soft beams after watching highlights of the Los Angeles Lakers for inspiration,
    and loves sprinting short distances during playground recess, often organizing a quick game of tag with other kids.
  arts: Xiaoguang Chang immerses in the world of children’s music, singing along to The Wiggles and Disney soundtracks while rhythmically clapping to the Beatles’ “Yellow Submarine,” and spends quiet afternoons
    drawing whimsical animals inspired by Dr. Seuss, proudly displaying the crayon masterpieces on the fridge.
  travel: Xiaoguang Chang loves family road trips, especially their annual visit to the Monterey Bay Aquarium, where they request the driver to stop at every scenic overlook, collect souvenir shells, and
    later dream about exploring the sand dunes of the Sahara after seeing pictures in a picture book.
  culinary: Xiaoguang Chang favors soft, comforting foods like macaroni and cheese with a sprinkle of cheddar, dips carrot sticks in hummus, and proudly attempts to stir a bowl of fruit salad with a wooden
    spoon, though they often get distracted and end up smearing the sauce on the tabletop.
  core: Xiaoguang Chang is a methodical little explorer who balances boundless curiosity with a gentle, organized nature, turning everyday play into miniature projects, meticulously counting coins, soothing
    skin flares, and humming lullabies while keeping a calm smile through the inevitable toddler messes.
background:
  cultural: Raised in a Chinese family in Palo Alto, Xiaoguang blends traditional East Asian values—respect for elders, harmony, and communal responsibility—with the innovative, multicultural atmosphere
    of Silicon Valley. He speaks Mandarin at home while attending bilingual preschool, celebrates Chinese festivals like Lunar New Year, enjoys both Chinese and American foods, and navigates a bicultural
    identity that emphasizes compassion and cooperation.
