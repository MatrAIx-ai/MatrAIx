  career_goals: While she does not have a fixed career plan yet, Alicia often dreams of being an artist who creates fantastical worlds, a wildlife explorer who discovers new animals, or a storyteller who
    shares her imaginative tales. She aspires to keep learning new things, help friends feel happy, and one day use her creativity to make a positive impact.
