personas:
  professional: A budding junior artist and curious experimenter, Alicia Green spends afternoons drawing vivid farm landscapes, building LEGO forts, and conducting simple kitchen science projects, channeling
    their boundless imagination into hands‑on creation while embracing a relaxed, unstructured approach to learning.
  sports: Alicia Green cheers loudly for the local high school football team, the Dakota Cornhunters, while also participating in the town's Saturday morning soccer clinic for kids, and spends summer afternoons
    exploring the nearby woods, racing squirrels, and building “obstacle courses” from fallen branches.
  arts: Alicia Green sways to the upbeat tunes of Taylor Swift and classic folk songs while drawing colorful scenes of barns and butterflies, collects stickers of Van Gogh’s *Starry Night* for inspiration,
    and spends weekend afternoons crafting friendship bracelets to exchange with classmates, letting music and art shape their playful identity.
  travel: Alicia Green loves weekend trips to the state fair in Grand Forks for cotton candy and carousel rides, annual family visits to their grandparents' farm in Minnesota for apple picking, and dreams
    of exploring the luminous Northern Lights of Canada, balancing the excitement of new places with the comfort of familiar community rituals.
  culinary: Alicia Green delights in snack‑time mac and cheese topped with a sprinkle of cheddar, enjoys munching on fresh apple slices with peanut butter, and proudly attempts to bake simple sugar cookies
    using a child‑friendly recipe, though they often leave crumbs trailing to the living room floor.
  core: Alicia Green is an endlessly curious seven‑year‑old who turns every leaf, LEGO piece, and song into a miniature adventure, though they occasionally misplace crayons and forget to tidy up their creative
    chaos.
background:
  cultural: Alicia was raised in the small, close‑knit community of Bathgate, North Dakota, a rural area with a strong agricultural heritage. Her family participates in local traditions such as community
    fairs, church gatherings, and seasonal harvest celebrations. The town’s Midwestern values—hard work, politeness, and community spirit—are part of her upbringing. While her household is predominantly
    white Midwestern, she occasionally learns about the region’s Native American history, especially the heritage of the Pembina County area, through school lessons and community events.
