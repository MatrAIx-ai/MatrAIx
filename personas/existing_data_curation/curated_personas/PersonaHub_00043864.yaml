persona_description: A woman who is passionate about the fight for women's rights and the suffrage movement, particularly in Victoria, Australia. She is dedicated to the cause and has contributed to the
  collection of signatures for the 1891 Women's Suffrage Petition. She is interested in historical records and is familiar with the digitization and indexing of the petition, as well as the facility for
  members of the public to add life details for the contributors. She is likely to be involved in activism and has a strong sense of community, as evidenced by her involvement in the Women's Christian Temperance
  Union and the Victorian Temperance Alliance.
