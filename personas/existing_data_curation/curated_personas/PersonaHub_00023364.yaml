  is likely to have expertise in space exploration, spacecraft design, and the study of planetary atmospheres. They are also likely to be familiar with the Mars Reconnaissance Orbiter and its capabilities,
  as well as the use of high-resolution imaging science experiments like the High Resolution Imaging Science Experiment (HiRISE) camera for studying Mars.
