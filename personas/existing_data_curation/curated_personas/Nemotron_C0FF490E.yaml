personas:
  professional: Tarvoris Smith is a budding IT support specialist who leverages a methodical, competitive mindset and hands‑on hardware expertise to troubleshoot problems, while using Notion and Excel to
    meticulously track tickets and personal projects, and they pride themselves on clear communication and systematic follow‑through.
  sports: Tarvoris Smith hits Seattle’s Denny‑Way Park for solo skate sessions, joins a weekly basketball league at the local community center, roots for the Seattle Kraken and Seattle Seahawks, and they
    maintain a casual membership with the local skate club Thunder Rollers.
  arts: Tarvoris Smith dives into hip‑hop beats from Kendrick Lamar, smooth jazz by Kamasi Washington, and spoken‑word poetry by Sarah Kay, attends concerts at The Crocodile, and they find inspiration for
    their custom PC builds in the futuristic visuals of Blade Runner and the designs of artist Beeple.
  travel: Tarvoris Smith prefers low‑cost road trips to nearby national parks like Olympic and Mount Rainier, saves for an annual tech‑focused trip to Tokyo’s Akihabara district, and they plan weekend getaways
    around PAX West in Seattle to combine networking with gaming fun.
  culinary: Tarvoris Smith enjoys cooking modern twists on classic soul‑food dishes—such as spicy kimchi‑glazed fried chicken, collard greens sautéed with smoked paprika, and mac‑and‑cheese infused with
    aged gouda—and they showcase a solid intermediate skill level in the kitchen.
  core: Tarvoris Smith is a meticulous tech‑enthusiast who balances solo skateboarding with competitive gaming, obsessively budgets every dollar, yet they can’t resist the lure of midnight snack runs after
    a long coding session.
background:
  cultural: Tarvoris is a 23‑year‑old African‑American raised in Seattle’s historic Central District, a neighborhood known for its strong Black community and cultural institutions. His mother, a former
    retail manager, and his father, a maintenance worker, emphasized resilience, self‑reliance, and the importance of education. Growing up, he participated in church youth groups, local Juneteenth celebrations,
    and community events that highlighted Black history and artistic expression. He identifies with the music, storytelling, and culinary traditions of African‑American culture, especially hip‑hop, jazz,
    and soul‑food cuisine. At the same time, living in the progressive, technology‑driven environment of Seattle has shaped his outlook, blending cultural pride with a forward‑looking, pragmatic mindset.
    He remains connected to his heritage through family gatherings, community festivals, and by supporting initiatives that provide tech opportunities to Black youth in his city.
attributes:
  skills: '["PC hardware troubleshooting", "Custom computer assembly", "Basic home networking", "Microsoft Excel data analysis", "Project planning with Notion/Trello", "Routine automotive maintenance",
    "Strategic problem solving", "Graphic design with Canva/Photoshop"]'
  hobbies: '["Skateboarding", "Community basketball", "Competitive online gaming", "Custom PC building", "Listening to hip‑hop and jazz", "Attending local concerts", "Reading science‑fiction and tech non‑fiction",
    "Cooking fusion soul‑food", "Volunteering in youth computer workshops"]'
  career_goals: Tarvoris aims to translate his practical curiosity into a stable career in information technology. In the short term, he plans to earn CompTIA A+ and Network+ certifications and secure an
    entry‑level IT support or help‑desk position, ideally with a company that values systematic problem solving. He also hopes to obtain an apprenticeship at a local computer‑repair shop, where he can further
    refine his hardware skills. Over the next five years, he envisions progressing to a technical specialist role and eventually managing a small tech‑services business that offers affordable repairs and
    training to underserved members of his community. Parallel to this, he is considering an associate degree in IT to broaden his knowledge base and increase his long‑term earning potential.
