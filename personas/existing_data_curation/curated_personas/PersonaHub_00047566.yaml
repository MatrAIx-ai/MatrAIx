persona_description: A historian who specializes in the study of the Civil War and its impact on the city of Belfast, Maine. She is knowledgeable about the city's involvement in the war and its aftermath,
  including the toll it took on its residents. She is interested in the role of women in the war effort and the contributions of the city's men and women to the Union cause. She is also interested in the
  city's role as a major port and center for shipbuilding during the war, and how it affected the recruitment of men to staff batteries on the western and eastern approaches to the harbor.
