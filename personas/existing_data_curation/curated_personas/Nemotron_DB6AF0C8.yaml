  career_goals: Although retired from formal employment, Ann Joy aims to deepen her impact in the Kingston community. She plans to obtain a formal caregiving certification so she can assist aging neighbors
    more professionally. She also hopes to lead a multi‑generational community garden, fostering food security and intergenerational learning. Ann Joy intends to document her family’s history and recipes
    in a memoir‑style blog, combining her love of storytelling with her curiosity about digital tools. Additionally, she aspires to take a short course in photography to capture local events and natural
    landscapes, eventually organizing a seasonal exhibit at the town library. These goals reflect her blend of practicality—building tangible community resources—and curiosity—exploring new skills and mediums.
