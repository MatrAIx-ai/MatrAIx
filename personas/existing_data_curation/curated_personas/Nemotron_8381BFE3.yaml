  career_goals: Patience aims to complete a bachelor's degree in early childhood education within the next three years, positioning herself for a lead teaching‑assistant role or a full classroom teacher
    position. She aspires to design an interdisciplinary arts‑integrated curriculum for her school district and to become a mentor for new teaching assistants. Additionally, she hopes to lead community
    outreach programs that bring art workshops to under‑served students in Harris County.
