personas:
  professional: Robert Epting is a front‑of‑house hospitality professional who leverages meticulous organization, sociable charisma, and a penchant for teaching teammates to deliver seamless service in
    Columbus’s bustling restaurant scene while quietly battling the stress of a high‑tempo environment.
  sports: Robert Epting plays forward for the Columbus Community Intramural Basketball League, regularly hikes the sandstone cliffs of Hocking Hills, and cheers for the Columbus Crew, the Cleveland Guardians,
    and the Ohio State Buckeyes during the football season, blending competitive edge with a love for the outdoors.
  arts: Robert Epting spends weekends at live shows featuring local indie acts like The Benders and national favorites such as The National, while also frequenting the Short North Arts District to admire
    works by regional muralists and attending improv nights at Columbus' ComedySportz, letting music and visual art fuel his creative side.
  travel: Robert Epting prefers weekend road trips that balance adventure with budget, having explored the rolling hills of Hocking Hills State Park, the craft‑brew scene of Portland, Maine, and the historic
    streets of Asheville, North Carolina, while keeping a detailed itinerary in a travel journal and dreaming of a future culinary pilgrimage to Barcelona.
  culinary: Robert Epting loves experimenting with farm‑to‑table recipes, often whipping up heirloom tomato bruschetta, spicy kimchi‑infused ramen, and a seasonal barley‑and‑hops ale he brews at home, all
    while hunting for fresh rosemary, locally sourced pork shoulder, and craft IPA hops at the North Market.
  core: Robert Epting is a meticulously organized, socially magnetic hospitality enthusiast who channels boundless curiosity and worry‑driven diligence into crafting community‑focused experiences, whether
    on the basketball court, in the kitchen, or while planning the next craft‑beer brew.
background:
  cultural: Robert was raised in a Midwestern, white family in Columbus, Ohio, where values such as friendliness, modesty, and community involvement are emphasized. His upbringing included participation
    in local traditions like attending Ohio State football games, supporting neighborhood block parties, and celebrating seasonal events such as summer barbecues and winter holiday gatherings. These experiences
    have instilled in him a strong work ethic, an appreciation for regional culinary customs, and a natural inclination toward hospitality and teamwork.
attributes:
  skills: '[''Customer service'', ''POS system operation'', ''Order accuracy and timing'', ''Menu knowledge (including local craft beers)'', ''Conflict resolution'', ''Team training and mentorship'', ''Shift
    scheduling'', ''Inventory management'', ''Multitasking under high pressure'', ''Basic culinary preparation'', ''Event coordination support'', ''Cash handling and reconciliation'']'
  hobbies: '[''Basketball (intramural league)'', ''Home cooking and recipe experimentation'', ''Basic home‑brewing'', ''Hiking (Hocking Hills and local trails)'', ''Listening to personal‑development podcasts'',
    ''Live music shows'', ''Volunteering at community festivals'', ''Board games with friends'']'
  career_goals: Robert aims to move into supervisory and management positions within the hospitality industry over the next three to five years. He plans to enroll in an associate program in Hospitality
    Management to solidify his theoretical knowledge while leveraging his practical experience. His long‑term ambition is to open a community‑focused gastropub that blends his love for local cuisine, craft
    beverages, and a welcoming atmosphere. He also hopes to develop staff leadership skills that foster a supportive work environment, reducing stress for himself and his team.
