persona_description: A professional organizational pattern enthusiast who is interested in the history, principles, and applications of organizational patterns in various professional organizations. This
  individual is likely to be a researcher, consultant, or practitioner who is passionate about understanding and applying organizational patterns to improve organizational performance and enhance corporate
  memory. They are knowledgeable about the software pattern community and the Agile movement, and are familiar with the principles of Christopher Alexander's work on patterns of the built world. This persona
  is also interested in the cultural and social aspects of organizational patterns, as evidenced by their interest in Kroeber's classic texts on patterns that underlie culture and society.
