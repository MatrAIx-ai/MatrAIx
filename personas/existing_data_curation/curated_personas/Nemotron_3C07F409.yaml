personas:
  professional: Chen Donald, a 59-year-old cleaning specialist, blends deep-clean expertise, eco-friendly product knowledge, and bilingual client communication with a laid-back, flexible work style; despite
    occasional disorganization, they channel a competitive edge and calm resilience toward earning a senior supervisory position and eventually launching a boutique eco-cleaning service for senior housing.
  sports: Chen Donald plays recreational volleyball with the San Jose Volleyball Club during summer evenings, roots for the San Francisco Giants at home and at Oracle Park, and occasionally joins community
    jogging groups, though they often neglect proper warm-ups before games.
  arts: Chen Donald regularly attends the annual Tet festival featuring traditional cải lương performances and enjoys classic rock concerts by The Rolling Stones and Led Zeppelin, often humming along while
    cooking, even though they sometimes sing off-key during performances.
  travel: Chen Donald prefers low-key road trips and occasional short flights, having explored Saigon’s bustling markets, California’s wine country in Napa, and the Pacific coastline to Monterey, while
    dreaming of a cultural pilgrimage to Kyoto’s temples, but their flexible planning often leaves itineraries open-ended.
  culinary: Chen Donald, an avid home chef, masters aromatic dishes such as pho, bánh mì, and fresh spring rolls, routinely seasoning with lemongrass, fish sauce, and Thai basil harvested from their garden,
    and enjoys experimenting with eco-friendly cooking tools, though they sometimes over-salt the broth in a rush.
  core: Chen Donald, a 59‑year‑old eco‑conscious cleaning veteran, balances a competitive drive with a relaxed, calm demeanor, spending free time playing volleyball, listening to classic rock, and cooking
    aromatic street‑food for friends, all while maintaining a skeptical eye toward new opportunities.
background:
  cultural: Chen Souk Donald is a first‑generation Southeast Asian (Vietnamese) immigrant who grew up within a close‑knit Bay Area community. He maintains strong ties to his cultural heritage, celebrating
    Tet, Lunar New Year, and other family traditions with authentic foods and rituals. Fluent in both English and Vietnamese, he frequently volunteers at local cultural events, helping bridge his heritage
    with his life in San Jose. His upbringing emphasized hard work, respect for elders, and communal support, values that continue to shape his personal and professional outlook.
