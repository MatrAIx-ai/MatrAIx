  career_goals: Chen aims to advance to a senior team‑lead or supervisory position within his cleaning company, earn a Certified Professional Cleaner credential, and eventually launch his own small eco‑friendly
    cleaning service that caters to senior housing and community events in the Bay Area. He also plans to complete his associate degree in hospitality management, become a recognized top performer, and
    mentor younger workers, leveraging his competitive drive to achieve excellence and community impact.
