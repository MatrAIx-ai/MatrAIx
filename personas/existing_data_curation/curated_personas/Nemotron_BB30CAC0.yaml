  hobbies: '[''competitive video gaming (Fortnite, League of Legends)'', ''LEGO robotics and building'', ''reading sci‑fi and fantasy novels'', ''listening to hip‑hop and R&B'', ''basketball at local park'',
    ''journaling for stress management'', ''watching street art and local music performances'']'
  career_goals: Kevan aspires to turn his curiosity and practical skills into a career in technology. He dreams of becoming a software engineer or robotics technician who designs tools that help his neighborhood,
    such as automated systems for community centers. He also imagines studying civil engineering to contribute to safer, smarter city infrastructure. In the short term, he wants to win a state‑level gaming
    tournament, earn a scholarship for a technology‑focused high school program, and eventually secure a stable job that lets him support his family.
