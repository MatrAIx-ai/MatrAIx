personas:
  professional: Kevan is a budding robotics programmer and competitive video‑game strategist who blends meticulous LEGO kit construction with rapid decision‑making in Fortnite and League of Legends, channeling
    their curiosity and practicality into goal‑oriented projects while staying skeptical of teammates’ motives.
  sports: Kevan shoots hoops at the neighborhood park, participates in the community youth basketball league that aligns with the city’s recreation program, proudly roots for the Boston Celtics, and they
    occasionally join pick‑up games of soccer with the local Springfield Tigers youth club during the spring season.
  arts: Kevan immerses in the local street‑art scene, attends weekend open‑mic shows featuring hip‑hop artists like Kendrick Lamar and R&B singers such as H.E.R., enjoys gospel tracks by Kirk Franklin,
    and they unwind with science‑fiction novels by Neal Gaiman and fantasy series like 'The Stormlight Archive'.
  travel: Kevan’s travel style leans toward short, family‑planned road trips to nearby attractions like the Grand Canyon and city escapes to New York City’s Times Square, where they balance school schedules
    with a craving for immersive museum tours and the occasional amusement‑park thrill.
  culinary: Kevan enjoys pizza topped with pepperoni and extra cheese, prefers spicy chicken tacos with avocado, occasionally cooks a simple mac‑and‑cheese sprinkled with hot sauce, and they love experimenting
    with snack mixes that include pretzels, chocolate chips, and dried mango.
  core: Kevan is a strategic, introspective twelve‑year‑old who channels competitive fire into gaming and robotics, guards their allowance with cautious savings, wrestles with anxiety through journaling,
    and finds balance in basketball, street art, and eclectic music while dreaming of future adventures.
background:
  cultural: 'Kevan is a Black teenager growing up in the diverse urban‑suburban mix of Houston, Texas. His family embraces Southern‑Texas Black traditions: Sunday church services, soul‑food meals like collard
    greens and cornbread, and lively Juneteenth celebrations. He is surrounded by the city’s rich musical legacy—hip‑hop, blues, and gospel—and often hears local artists on the radio and at community events.
    Community solidarity is important; he looks up to Black role models in the city, including engineers, athletes, and activists who have contributed to Houston’s growth. While navigating the challenges
    of Harris County schools, Kevan also participates in after‑school programs at the neighborhood community center, which reinforce a sense of pride in his heritage and foster a desire to give back.'
attributes:
  skills: '[''basic block-based coding (Scratch)'', ''strategic video gaming (eSports)'', ''troubleshooting basic electronics'', ''mathematical problem solving (pre‑algebra)'', ''organizing personal study
