  hobbies: '[''Digital painting'', ''Speculative fiction reading and writing'', ''Astronomy and astrophotography'', ''Hiking New England coastal trails'', ''Puzzle solving (chess, cryptic crosswords)'',
    ''Model kit building'', ''DIY electronics projects'', ''Attending intimate art exhibitions'']'
  career_goals: Warren aims to advance to a senior compliance leadership role within the next five years, overseeing a regional compliance program and shaping enterprise‑wide governance strategies. He plans
    to obtain certifications such as Certified Regulatory Compliance Manager (CRCM) and Certified Anti‑Money Laundering Specialist (CAMS) to deepen his expertise. Long‑term, he aspires to integrate emerging
    technologies like AI‑driven monitoring into compliance workflows, becoming a thought leader who publishes insights on innovative compliance practices. He also hopes to mentor junior compliance staff
    and contribute to industry panels on regulatory best practices.
