  career_goals: Samuel aims to ascend to a senior leadership role such as Director of Safety and Operational Excellence within a forward‑looking manufacturing firm, where he can shape enterprise‑wide safety
    culture and drive strategic efficiency initiatives. He also envisions launching his own consultancy that integrates emerging technologies—like AI‑based safety analytics and predictive maintenance—with
    creative problem‑solving to help clients achieve zero‑incident workplaces. Ultimately, he wants his work to be recognized for pioneering innovative, people‑centric engineering solutions that balance
    productivity with well‑being.
