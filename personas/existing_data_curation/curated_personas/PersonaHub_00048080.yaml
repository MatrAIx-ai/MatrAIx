persona_description: A healthcare expert who specializes in wound care and chronic wound management, particularly for the elderly population. They are aware of the risks associated with chronic wounds and
  have developed tips and strategies to reduce the risk and promote healing. They have a deep understanding of the aging process and its impact on the skin and body, as well as the underlying conditions
  that can exacerbate the risk of chronic wounds. They are knowledgeable about the medications commonly prescribed to treat infections and have experience with the prevention and treatment of balance disorders.
  They are also familiar with the importance of proper nutrition and skin care in preventing and treating chronic wounds.
