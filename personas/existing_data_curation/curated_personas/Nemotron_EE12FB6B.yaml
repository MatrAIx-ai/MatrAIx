personas:
  professional: Michael Hidalgo is a hands-on vehicle cleaning specialist who leverages meticulous detailing expertise, strong workflow organization, and people-centered communication, and they are steadily
    advancing toward supervisory roles in fleet services while pursuing auto-detailing certifications.
  sports: Michael Hidalgo stays active by playing pickup basketball at the local gym, joining a community flag-football league each fall, and they root for the Cincinnati Bengals, Cincinnati Reds, and Louisville
    Bats while maintaining a membership at the Henderson County Sports Club.
  arts: Michael Hidalgo frequents live music venues where they enjoy the blues of Gary Clark Jr., the storytelling of Chris Stapleton, and the indie synths of Tame Impala, and they also attend classic-car
    shows that double as retro rock festivals, feeding their love for both engines and rhythm.
  travel: Michael Hidalgo prefers spontaneous weekend road trips along the Ohio River and the rolling hills of the Great Smoky Mountains, yet they meticulously plan an annual getaway to the Florida Keys
    for fishing and a bi-annual trip to Stuttgart, Germany, to attend classic-car exhibitions, balancing budget constraints with a thirst for new horizons.
  culinary: Michael Hidalgo enjoys grilling smoked brisket, slow-cooked chili with kidney beans, and pan-seared trout seasoned with lemon and dill, they have an intermediate cooking skill level and often
    experiment with sustainable ingredients like heirloom tomatoes and fresh herbs, though they sometimes resort to fast-food burgers after late-night detailing sessions.
  core: Michael Hidalgo is a detail-obsessed, community-driven 25-year-old who balances a love for classic cars and live music with a habit of over-committing and worrying about every detail, and they often
    find themselves double-checking tasks long after they're finished.
background:
  cultural: Michael grew up in a close‑knit white working‑class family in Henderson, Kentucky, with roots that trace back several generations to the region’s farming and river‑trade heritage. His surname
    reflects a Hispanic lineage from his great‑grandparents, giving him a blended cultural perspective. He was raised with Southern hospitality values, an emphasis on hard work, church community involvement,
    and local traditions such as high‑school football Saturdays and county fairs.
attributes:
  skills: '[''Vehicle polishing'', ''Industrial equipment cleaning'', ''Chemical safety management'', ''Time management'', ''Team coordination'', ''Customer service'']'
  hobbies: '[''Pickup basketball'', ''Community football league'', ''Volunteer food pantry work'', ''Classic car restoration'', ''Fishing on the Ohio River'', ''Live music concerts'']'
  career_goals: Michael aims to advance from hands‑on cleaning to a supervisory role within a fleet services company, earning certifications in auto detailing and facilities management. He aspires to open
    his own eco‑friendly vehicle‑cleaning business, leveraging his organizational skills and community focus to provide jobs and services in Henderson County.
