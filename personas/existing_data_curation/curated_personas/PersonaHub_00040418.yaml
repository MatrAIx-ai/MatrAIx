persona_description: A dedicated environmental justice advocate and community leader, deeply committed to addressing environmental concerns and ensuring equity in communities affected by environmental issues.
  They are passionate about brownfield redevelopment and have a strong track record of community involvement, including the formation of the North/Northeast Portland Brownfield Community Advisory Committee
  and the Portland Brownfield Showcase Policy Committee. They have a proven track record of bringing federal grant money to the city and providing technical and financial assistance to restore Portland's
  vacant lands, protecting human and environmental health, improving the economy, and creating jobs. They are committed to fostering a strong sense of community and are dedicated to ensuring that communities
  affected by environmental concerns are able to take part in the decision-making process and benefit from the program's efforts.
