  career_goals: At 64, Jhonn aims to transition from full‑time clinical practice to a hybrid role that blends mentorship, education, and advocacy. He hopes to establish a formal preceptorship program for
    aspiring nurse anesthetists, emphasizing cultural competence and patient safety. He is also driven to lead a hospital committee focused on reducing anesthesia‑related adverse events, particularly for
    Spanish‑speaking patients. In the longer term, Jhonn envisions authoring a textbook chapter on culturally sensitive anesthesia practices and serving as a consultant to community clinics in Sacramento’s
    Latino neighborhoods, thereby extending his impact beyond the operating room while maintaining a balanced workload that mitigates stress.
