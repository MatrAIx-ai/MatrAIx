personas:
  professional: Jacqueline Said, a 1‑year‑old budding problem‑solver, explores building blocks and cause‑and‑effect toys with a mix of curiosity and practicality, and they display early analytical thinking,
    systematic organization, and a playful competitive streak that hints at a future in engineering or early childhood education.
  sports: Jacqueline Said, a 1‑year‑old, toddles in pastel rain‑boots to the community center’s mini‑soccer program Little Rangers, squeals at the thunder of a St. Louis Cardinals home run on family TV,
    and they race across the backyard during Fourth of July fireworks, balancing a playful competitive streak with a love for routine play.
  arts: Jacqueline Said, age 1, claps along to the sing‑along beats of 'The Wheels on the Bus' and 'Baby Shark', twirls to Raffi’s folk songs during Sunday family gatherings, and they flip through the bright
    pages of 'Goodnight Moon' with a determined fist, showcasing a blend of curiosity for new tunes and comfort in familiar bedtime rituals.
  travel: Jacqueline Said, 1, has already enjoyed a breezy car ride to her grandparents’ farm in Iowa where they chased butterflies, a sensory‑rich weekend at the St. Louis Zoo that sparked awe at giraffes,
    and a family picnic at the Fourth of July fireworks in the town square, while her parents dream of whisking them to Disneyland for a magical next birthday.
  culinary: Jacqueline Said, a 1‑year‑old, loves mashed banana‑oat cereal and bright orange sweet‑potato puree, gleefully smears a dab of hummus on crackers, grimaces at peas, and they eagerly devour leftover
    turkey and cranberry sauce during Thanksgiving family meals, exemplifying a mix of adventurous palate and practical preference for familiar textures.
  core: Jacqueline Said, the curious 1‑year‑old, hoards pennies in a pink piggy bank, giggles at Cardinals home runs, resists vitamin D syrup with a stubborn pout, and they alternate between competitive
    block‑building and cozy alone play, embodying a pragmatic yet inquisitive spirit.
