personas:
  professional: A board‑certified optometrist, Dulce Lacosta brings over 20 years of clinical expertise in comprehensive eye examinations, contact lens fitting, pediatric vision care, and low‑vision rehabilitation,
    and leverages their methodical organization and compassionate communication to run a smoothly coordinated practice while leading bilingual community outreach and pioneering tele‑optometry pilots.
  sports: An enthusiastic hiker and yoga practitioner, Dulce Lacosta joins the Chicago Hiking Club for their weekend treks in nearby forest preserves, supports the Chicago Cubs and Chicago Bulls as a seasonal
    fan, and competes in friendly pickleball matches with the Elmhurst Pickleball Club, blending low‑impact exercise with community spirit.
  arts: A culturally engaged creator, Dulce Lacosta knits blankets for charity while attending local art walks that showcase reproductions of Frida Kahlo and Diego Rivera, delights in the guitar melodies
    of Andrés Segovia and the folk tones of Natalie Merchant, and regularly enjoys cinematic masterpieces by Pedro Almodóvar, reflecting a love for both classic and contemporary artistic expressions that
    they cherish.
  travel: An adventure‑oriented traveler, Dulce Lacosta has trekked the red‑rock trails of Sedona, explored the historic plazas of Granada, Spain, and plans a culinary weekend in Oaxaca’s highlands, meticulously
    planning their itineraries months ahead while allowing spontaneous market visits and balancing family commitments with personal exploration.
  culinary: A seasoned home chef, Dulce Lacosta expertly prepares tamales layered with masa and pork, slow‑cooks mole using chilhuacle chilies and Mexican chocolate, simmers hearty pozole flavored with
    hominy and pork shoulder, and experiments with heirloom tomatoes and smoky poblano peppers, often pairing their meals with handcrafted margaritas for friends and family.
  core: Dulce Lacosta, a methodical optometrist with a green‑thumb’s tendency to over‑plant their vegetable plot, often forgets to water the newest seedlings, treats every dinner conversation as a mini‑clinic,
    and rewards themselves with a nightly slice of dark chocolate after yoga, despite knowing it nudges their cholesterol up.
background:
  cultural: 'Dulce Maria Lacosta was born to Mexican parents who immigrated to the United States in the 1960s. She grew up in a bilingual household where Spanish was spoken at home and English at school,
    giving her a deep connection to both cultures. Family gatherings feature traditional Mexican music, food, and Catholic rituals such as Las Posadas and Día de los Muertos, which she continues to observe
    with her own family in Elmhurst. Her cultural identity informs her professional practice: she routinely provides Spanish‑language eye‑care, educates patients about eye health within a cultural context,
    and supports community events that celebrate Mexican heritage. She values hard work, education, and intergenerational family ties, often traveling to Mexico to visit relatives and maintain a strong
    sense of belonging.'
