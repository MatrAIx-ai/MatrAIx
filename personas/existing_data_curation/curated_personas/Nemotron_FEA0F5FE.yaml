  career_goals: Dulce aims to expand her Elmhurst practice into a multidisciplinary vision‑health center that offers vision therapy and low‑vision services for older adults, especially the growing Hispanic
    senior population. She plans to launch a community‑based eye‑screening program in collaboration with local schools and churches, leveraging her organizational skills to coordinate volunteers and funding.
    Over the next five years, she hopes to publish research on diabetic retinopathy management in bilingual patients, mentor upcoming optometrists through a residency‑type mentorship program, and serve
    on the board of the Illinois Optometric Association to influence statewide policy. Her ambitions balance innovative technology adoption (e.g., AI‑assisted diagnostics) with proven clinical protocols.
