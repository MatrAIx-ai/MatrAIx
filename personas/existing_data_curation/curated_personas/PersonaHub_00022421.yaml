persona_description: A space scientist who specializes in Earth science missions, particularly those focused on remote sensing and data collection. The person is interested in the technical challenges faced
  by these missions, the strategies for risk mitigation, and the lessons learned from past failures. They are also knowledgeable about the SmallSat revolution and its potential for enabling scientific exploration
  and commercialization of space. The person has a deep understanding of the NASA Strategic Astrophysics Technology (SAT) Program, the PCOS/COR portfolio distribution, and the outcomes of the working group
  review of decadal-term technology needs for Earth science active optical remote sensing objectives.
