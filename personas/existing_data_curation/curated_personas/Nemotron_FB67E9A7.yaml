personas:
  professional: Antonia Castellon, a diligent retail associate with bilingual fluency and sharp point‑of‑sale expertise, leverages their calm composure and detail‑oriented nature to keep cash drawers balanced,
    streamline inventory checks, and create on‑the‑fly Excel dashboards, all while mentoring new hires with a mix of curiosity‑driven suggestions and reliable process adherence.
  sports: Antonia Castellon hits the trails at Great Falls Park for weekend hikes, joins the DC Hiking Club and the DC Jogging Crew for early‑morning runs, roots for the Washington Wizards and the DC United,
    and plays casual soccer on a community league team that meets every Thursday evening.
  arts: Antonia Castellon explores contemporary dance at a downtown studio, sketches digital illustrations of cityscapes using Procreate, devours novels by Sally Rooney and Chimamanda Ngozi Adichie, and
    finds inspiration in music from Billie Eilish, Luis Fonsi, and the experimental soundscapes of Björk.
  travel: Antonia Castellon prefers weekend getaways that blend nature and culture, having trekked the Blue Ridge Mountains in Asheville, explored the historic streets of Savannah, and planning a future
    trip to Mexico City to sample street food and visit art museums while keeping travel expenses within a modest student budget.
  culinary: Antonia Castellon loves cooking family recipes like baleadas and tamales, perfects a salsa verde with tomatillos and cilantro, enjoys experimenting with plantain‑based side dishes, and occasionally
    treats friends to homemade pupusas infused with a hint of chipotle, all while rating each dish on a handwritten flavor journal.
  core: Antonia Castellon blends a pragmatic retail mindset with a vibrant curiosity for culture, cooking, and digital creativity, balancing meticulous budgeting with occasional impulse buys, and channeling
    their bilingual charm into both customer service and future e‑commerce dreams.
background:
  cultural: Antonia was raised in a close‑knit Honduran immigrant family in Fairfax County. She grew up speaking both Spanish and English, celebrating Honduran traditions such as Semana Santa, Día de la Independencia
    (September 15), and the Feria de San Juan with extended family and the local diaspora community. Her household blends Catholic values with a strong emphasis on family responsibility and community service.
    Antonia regularly participates in the Honduran Heritage Festival in Washington, D.C., and volunteers at a neighborhood organization that supports recent Honduran arrivals, helping preserve cultural
    ties while adapting to life in the United States.
