  career_goals: Antonia aims to translate her hands‑on retail experience into a supervisory or store‑manager role within the next three years. She plans to complete an associate degree in Business Administration
    while working, gaining formal credentials in management and finance. In the longer term, she envisions launching a small e‑commerce venture that showcases Honduran artisanal products, using her bilingual
    skills and growing interest in digital marketing to connect diaspora customers. Additionally, Antonia hopes to earn a professional certification in retail management and eventually move into a corporate
    operations position that blends her practical insights with strategic planning, all while maintaining a stable work‑life balance.
