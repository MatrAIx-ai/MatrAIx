  hobbies: '[''Woodworking'', ''Chess'', ''Jazz Listening'', ''Urban Architecture Exploration'', ''Gardening'', ''Historical Society Volunteering'', ''Classic Car Restoration'', ''Reading Non-fiction (Industrial
