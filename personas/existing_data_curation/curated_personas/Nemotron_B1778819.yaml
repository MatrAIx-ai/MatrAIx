  career_goals: Bailey aims to advance to a senior leadership role within her insurance agency, such as Branch Manager or Team Lead, where she can mentor junior agents and shape a cooperative sales culture.
    She also hopes to develop a niche expertise in community‑focused insurance products, positioning herself as a trusted advisor for local small businesses and families. Over the next five years, she plans
    to increase her portfolio by 20 % while maintaining a balanced schedule that allows ample personal time. Ultimately, she envisions opening a boutique brokerage that reflects her values of harmony, client‑centric
    service, and flexible work structures.
