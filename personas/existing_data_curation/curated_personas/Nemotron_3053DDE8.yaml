  career_goals: Although retired from formal employment, Jonathan aspires to leave a lasting cultural imprint on his community. He aims to author a illustrated memoir that weaves personal history with the
    broader story of Metamora, curate a local history exhibit at the county museum, and establish a senior‑focused art workshop where he can mentor aspiring artists. Additionally, he hopes to expand his
    community garden project, secure grant funding for a public art installation, and travel to regional art fairs to showcase his own abstract paintings.
