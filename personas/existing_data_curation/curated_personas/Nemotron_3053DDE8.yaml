personas:
  professional: Jonathan Ward, a retired carpenter‑artist, leverages his woodworking mastery, garden stewardship, and storytelling flair to curate community art experiences while mentoring senior hobbyists,
    blending meticulous project management with a boundless imagination.
  sports: Jonathan Ward, a member of the Metamora Senior Fitness Club, favors low‑impact activities like daily garden walks, weekend bird‑watching hikes, and seasonal snowshoeing, while cheering on the
    Chicago Cubs and the Detroit Tigers on game days.
  arts: Jonathan Ward, an avid attendee of the Metamora Art Gallery openings and a regular at the local community theater, immerses themselves in abstract painting inspired by the bold colors of Frida Kahlo
    and the surreal forms of Salvador Dalí, enjoys the harmonica renditions of Bob Dylan, and maintains a personal library brimming with works by Ursula K. Le Guin and Philip K. Dick.
  travel: Jonathan Ward, who prefers meticulously planned trips that balance leisurely garden visits with immersive art experiences, has explored the art districts of Santa Fe and Portland, longs to wander
    Kyoto’s historic gardens, and aims to attend the Siena Art Biennale despite a fixed retirement budget.
  culinary: Jonathan Ward, whose kitchen showcases the bounty of his heirloom vegetable garden, delights in crafting rustic dishes like rosemary‑roasted carrots, wild mushroom risotto, and honey‑glazed
    heirloom tomatoes, while proudly bragging about an over‑enthusiastic use of fresh herbs that sometimes competes with the main flavors.
  core: Jonathan Ward blends a lifelong craftsman's precision with a speculative‑fiction imagination, turning every garden plot, wooden chair, or hand‑drawn sketch into a quiet rebellion against ordinary
    retirement.
background:
  cultural: Jonathan’s cultural roots are firmly planted in the Midwestern United States. Raised in a small town in Tazewell County, Illinois, he descends from generations of German and Irish immigrants
    who settled the region in the late 19th century. This heritage fostered a strong sense of community, self‑reliance, and a work ethic balanced by an appreciation for folk traditions and craftsmanship.
    Growing up in a close‑knit, predominantly Protestant community, he participated in local fairs, church gatherings, and high school extracurriculars, all of which shaped his cooperative yet assertive
    nature. The rural landscape and seasonal rhythms of the Midwest continue to inspire his artistic pursuits and his commitment to preserving local history and culture.
