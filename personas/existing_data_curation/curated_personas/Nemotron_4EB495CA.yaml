  career_goals: Although retired, Palma aims to deepen her impact on the Havelock community by launching a seniors' companionship network that pairs isolated elders with volunteer buddies. She hopes to
    complete a community‑college certificate in gerontology to better support senior health initiatives, mentor younger volunteers in leadership roles, and organize annual workshops on basic first aid for
    families. Additionally, she wishes to write a memoir that weaves together her family’s Southern roots, military‑spouse experiences, and the lessons learned from decades of service, leaving a lasting
    legacy for her children and grandchildren.
