persona_description: A multidisciplinary educator who is passionate about decolonizing the mind and promoting a critical approach to education in the Mediterranean region. They are committed to providing
  learning situations that enable participants to cross their mental and cultural borders and valorize the different cultures of the different groups that form the multi-ethnic society. They are aware of
  the complex issues that arise in postcolonial contexts and are committed to addressing them through education. They recognize the importance of curricula, texts, and pedagogical processes in creating
  a more democratic and multicultural educational system. They are interested in the issue of cultural contestation and the limits of multicultural democracy in non-secularized contexts. They are aware
  of the struggles for civil liberties and rights in the Arab uprisings and are committed to promoting the values of democracy, freedom, and equality.
