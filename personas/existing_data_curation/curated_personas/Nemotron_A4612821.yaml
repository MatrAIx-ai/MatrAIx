  hobbies: '["Playing soccer in a local league", "Cooking Mexican cuisine", "Hiking in the Blue Ridge Mountains", "Listening to Latin and indie rock music", "Reading technology and personal‑development
    blogs", "Volunteering at community food banks"]'
  career_goals: Hector aims to launch a career in the nonprofit sector, focusing on programs that empower the Mexican‑American community in the Charlotte area. His short‑term goal is to secure a community
    outreach coordinator role where he can apply his bilingual communication, data reporting, and event‑planning skills to expand service access. Long‑term, he aspires to move into program management or
    directorship, designing culturally responsive initiatives that blend technology, education, and social support. He is also considering a future graduate degree in public administration to deepen his
    impact on policy advocacy for immigrant families.
