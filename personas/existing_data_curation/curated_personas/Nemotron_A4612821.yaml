personas:
  professional: Merging bilingual communication, entry‑level data analysis, and agile event planning, Hector Calderon is a budding nonprofit outreach coordinator who expands services for underserved families
    in Charlotte, and they balance a relaxed yet reliable work style.
  sports: Hector Calderon plays forward in a local recreational soccer league, cheers for Charlotte FC and the Carolina Panthers, hikes the Blue Ridge Mountains each weekend with a regional trail club,
    and they keep a casual membership with a community running group, balancing competitive play with low‑key outdoor fitness.
  arts: Hector Calderon curates a playlist that swings from Latin pop icons like J Balvin to indie rock staples such as The Strokes, frequently streams live sessions by emerging Latin folk artists, and
    they attend occasional Charlotte Museum of Art exhibitions, letting the rhythms and visual narratives shape their creative downtime.
  travel: Hector Calderon favors weekend road trips that blend adventure and culture, having explored Asheville’s art scene, the historic streets of New Orleans, and the scenic vistas of the Great Smoky
    Mountains, while they dream of a future backpacking trek through the Peruvian Andes.
  culinary: Hector Calderon swaps between modest home‑cooking and experimental kitchen nights, mastering tamales, tacos al pastor, and refreshing aguas frescas, while they daringly add chipotle‑infused
    mole to family recipes and occasionally order pizza as a guilty‑pleasure cheat.
  core: Hector Calderon is a compassionate, curiosity‑driven 23‑year‑old who balances community activism, soccer, and cooking, yet they sometimes procrastinate on health checkups and splurge on music tickets.
background:
  cultural: Hector was raised in a Mexican immigrant family in Charlotte, North Carolina. His parents emphasized bilingualism, Catholic traditions, and strong family ties, so he grew up celebrating Día
    de los Muertos, Cinco de Mayo, and other Mexican holidays with traditional foods and music. At home, Spanish was spoken daily, preserving his cultural heritage while he also navigated the broader Southern
    U.S. environment through school and community events. He participates in local Latino cultural festivals and maintains close relationships with extended family, integrating the warmth and collective
    spirit of his Mexican background with the diversity and opportunities present in Charlotte's multicultural landscape.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Community outreach and volunteer coordination", "Basic data analysis (Excel, Python)", "Event planning and logistics", "Conflict resolution and
