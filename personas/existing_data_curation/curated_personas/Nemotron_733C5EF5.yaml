personas:
  professional: Clara Parker is an 18‑year‑old aspiring event manager who leverages their meticulous organizational skills, proficiency in Microsoft Office and Google Workspace, and natural flair for public
    speaking to coordinate campus board‑game nights, community theater productions, and volunteer summer festivals, all while methodically planning a future career in hospitality management.
  sports: Clara Parker enjoys hiking the Baraboo Range with the local trail club, plays intramural soccer for their college team during the fall, and passionately follows the Wisconsin Badgers and Green
    Bay Packers, often sporting the teams’ colors while cheering at community sports nights.
  arts: Clara Parker channels their creative side through community theater roles ranging from lead comedic parts to backstage design, captures landscapes inspired by Ansel Adams in their photography, and
    curls up to watch Broadway revivals of Hamilton and local folk performances by artists like John Prine, weaving these influences into their DIY craft blog.
  travel: Clara Parker prefers budget‑friendly road trips that blend adventure with cultural immersion, having road‑tripped to Chicago for a blues festival, backpacked the Catskills, and dreaming of a sustainable
    tourism internship in Portland, all while meticulously mapping itineraries on Google Maps and negotiating student discounts.
  culinary: Clara Parker’s palate celebrates Midwestern farm‑to‑table flavors, often whipping up quinoa‑avocado salads with locally sourced cheese curds, perfecting s’mores on Baraboo hikes, and documenting
    their culinary experiments—like a beet‑infused latte—in a blog that mixes seasonal recipes with DIY event catering tips.
  core: Clara Parker is a talkative, detail‑driven teen who turns every gathering into a meticulously organized, socially vibrant experience, all while juggling student budgets, health routines, and a passion
    for sustainable community events.
background:
  cultural: Clara grew up in Platteville, a small Midwestern town in Wisconsin with a strong sense of community and modest, practical values typical of the region. Her white, primarily German-Scandinavian
    heritage influences her appreciation for local traditions such as harvest festivals, community potlucks, and a close-knit church and school network. She embraces the Midwestern emphasis on reliability,
    friendliness, and volunteerism, which shape both her personal and professional outlook.
attributes:
  skills: '[''Event coordination'', ''Public speaking'', ''Social media content creation'', ''Microsoft Office'', ''Google Workspace'', ''Basic budgeting'', ''Conflict resolution'', ''Customer service'',
