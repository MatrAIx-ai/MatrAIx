  hobbies: '[''Organizing board-game nights'', ''Hosting book clubs'', ''Volunteering at local festivals'', ''Community theater acting'', ''Hiking'', ''Photography'', ''DIY crafting'', ''Blogging about
    local events'', ''Fitness classes (Zumba)'', ''Learning Spanish'']'
  career_goals: Clara aims to complete her associate's degree in business administration and then transfer to a four-year university to study hospitality management. She aspires to work as a community outreach
    coordinator or event manager for a nonprofit or local tourism board, leveraging her love for organizing and engaging with people. Long-term, she hopes to launch her own event-planning business that
    focuses on sustainable community festivals.
