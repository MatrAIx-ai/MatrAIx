persona_description: A financial expert who specializes in disaster relief and innovative financial models. This person is responsible for managing and overseeing the development and implementation of GFE's
  global relief vaults, ensuring that they are delivered quickly and efficiently to governments and relief organizations in need. This person is also responsible for developing and implementing additional
  donor funding streams for NGOs to bring new donors into their programs, and is skilled in managing and overseeing the secure staging facilities for the vaults. This person has a deep understanding of
  the financial models offered by GFE, and is skilled in developing and implementing innovative financial models that recognize the importance of food as an asset class.
