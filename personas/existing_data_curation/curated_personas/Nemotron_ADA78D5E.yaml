personas:
  professional: Kenneth Little is an aspiring comic artist and imaginative world‑builder who blends his love for drawing, LEGO city construction, and Minecraft sandbox storytelling, using his curious, open‑minded
    nature to experiment freely while his laid‑back attitude sometimes leads to missed deadlines and half‑finished projects.
  sports: Kenneth Little dribbles in Saturday afternoon neighborhood basketball games, idolizing the Los Angeles Lakers and cheering for the local junior league team, the Midtown Rangers, while their competitive
    drive pushes them to practice free‑throws after school, even if their disorganized schedule sometimes causes missed practices.
  arts: Kenneth Little immerses themselves in comic art, drawing inspiration from Marvel legends Stan Lee and Jack Kirby, while their drama club performances echo the energy of the musical ‘Hamilton,’ and
    they practice beginner guitar chords on songs by Taylor Swift and Ed Sheeran, all reflecting a curious, open mind and a habit of sketching whenever inspiration strikes.
  travel: Kenneth Little spends weekends exploring nearby nature trails like Riverside Park for sketching, has taken family trips to the beach in Florida and the historic streets of Washington, D.C., and
    dreams of visiting Tokyo’s Akihabara district to experience the epicenter of anime and LEGO culture.
  culinary: Kenneth Little enjoys a classic childhood diet of pizza, chicken nuggets, and mac‑and‑cheese, occasionally helping Mom bake chocolate chip cookies with chocolate chips and vanilla extract, though
    their cooking skill is limited to assembling simple sandwiches and microwaving leftovers, and they have a particular fondness for pepperoni pizza and strawberry‑flavored cereal.
  core: Kenneth Little is a curious, artistic ten‑year‑old who juggles comic‑book creation, LEGO world‑building, and weekend basketball with a competitive edge, a relaxed attitude toward responsibilities,
    and a habit of forgetting to finish what they start.
background:
  cultural: Kenneth is a White American growing up in the suburban community of Bridgewater, New Jersey. His family values curiosity, independence, and support for both sports and the arts. He attends a
    public elementary school that emphasizes collaborative learning and participates in community programs at the local library and recreation center, reflecting a typical middle-class American upbringing
    with exposure to diverse cultural events such as Fourth of July celebrations, library storytimes, and regional arts festivals.
