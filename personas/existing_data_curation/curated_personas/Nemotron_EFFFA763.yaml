  hobbies: '[''Cooking traditional Puerto Rican dishes'', ''Gardening tropical herbs and fruits'', ''Knitting and crocheting blankets'', ''Listening to boleros, salsa, and plena music'', ''Storytelling
    to family and community'', ''Attending Mass and community festivals'', ''Walking in the neighborhood'', ''Reading local newspapers and watching classic telenovelas'']'
  career_goals: Even in retirement, Yanet aims to stay actively involved in her community by volunteering at the local senior center and church, teaching cooking classes to younger families, and mentoring
    neighbors in basic smartphone use. She hopes to digitize old family photos and recordings to preserve her family's legacy, maintain her health through daily walks and gentle exercise, and celebrate
    her upcoming 60th wedding anniversary by hosting a small gathering that blends tradition with personal touches. Yanet also aspires to learn simple digital photography to document local festivals and
    family moments.
