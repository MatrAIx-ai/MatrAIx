personas:
  professional: Yanet Rosa is a retired community mentor who channels their practical home‑management skills and deep culinary expertise into weekly cooking workshops at the local church, where they blend
    a structured step‑by‑step approach with a relaxed, improvisational flair while occasionally misplacing a notebook page due to their laid‑back attitude.
  sports: Yanet Rosa is a devoted walker who joins the neighborhood Senior Strollers Club for gentle daily strolls, and they cheer on the local minor‑league baseball team the Coastal Hawks during summer
    weekends, while also participating in occasional light gardening as a form of low‑impact exercise.
  arts: Yanet Rosa fills their evenings listening to classic boleros by José José, salsa rhythms from Héctor Lavoe, and lively plena tracks by Los Pleneros, while reliving golden‑age telenovela scenes starring
    Verónica Castro, and they use these cultural sounds to inspire their storytelling and knitting patterns.
  travel: Yanet Rosa enjoys modest travel, having taken nostalgic road trips to the historic coastal town of Cartagena, a leisurely cruise through the Caribbean islands, and a pilgrimage to the famed Basilica
    of Our Lady of Guadalupe, and they always plan trips with a flexible itinerary that leaves room for spontaneous stops.
  culinary: Yanet Rosa delights in preparing traditional island staples such as seasoned rice with pigeon peas, oven‑roasted pork shoulder, and hand‑rolled pastelitos, coaxing fresh basil, tomatoes, and
    sweet papaya from their modest garden into vibrant sauces, and they relish sharing these dishes at family gatherings while occasionally forgetting to season a batch of rice.
  core: Yanet Rosa is a warm‑hearted elder who weaves structured culinary lessons with flexible storytelling, balances frugal budgeting with occasional yarn splurges, watches their blood pressure like a
    clock, walks the block with the senior club, and lets boleros soundtrack their garden‑to‑table life, all while they occasionally misplace a recipe card.
background:
  cultural: Yanet was born and raised in a close‑knit barrio near Manatí in the Morovis region, where family and Catholic traditions shape daily life. Her upbringing emphasized respect for elders, hospitality,
    and communal celebrations such as the Fiesta Patronal and Christmas parrandas. Growing up during the 1960s and 70s, she witnessed Puerto Rico’s social changes while retaining strong ties to Afro‑Caribbean
    music, traditional cuisine, and the Spanish language. These cultural roots influence her love for cooking, music, storytelling, and her dedication to preserving family heritage for future generations.
attributes:
  skills: '[''Traditional Puerto Rican cooking'', ''Home budgeting and basic repairs'', ''Family caregiving'', ''Gardening tropical herbs and vegetables'', ''Knitting and crocheting'', ''Smartphone usage
