personas:
  professional: Eduardo Pimentel, a 22‑year‑old certified electrician, they blend rigorous code compliance with a flair for LED‑based artistic installations, leveraging their meticulous documentation skills
    and love for smart‑home automation to deliver sustainable, aesthetically striking solutions for residential clients.
  sports: Eduardo Pimentel, who enjoys early‑morning runs along the Flint River and weekly weight‑training sessions at a local gym, they follow the Atlanta Hawks for basketball, the Atlanta Braves for baseball,
    and play pick‑up basketball at their church’s community center during the fall season.
  arts: Eduardo Pimentel, a solitary creator of LED art, they regularly sketch abstract designs while listening to Herbie Hancock, Kamasi Washington, and gospel choir recordings of the Staple Singers, occasionally
    jump on a digital keyboard during their church’s music ministry, and attend art talks at the Albany Cultural Center where they draw inspiration from local fresco installations.
  travel: Eduardo Pimentel, who prefers meticulously planned road trips, they have explored Savannah’s historic squares, New Orleans’ music districts, and the solar farms of Tucson, and hope to visit the
    Scandinavian design museums of Copenhagen to study minimalist lighting concepts, all while balancing travel costs with their apprenticeship savings.
  culinary: Eduardo Pimentel, who enjoys cooking collard greens with smoked paprika, black‑eyed peas spiced with cumin, and banana‑pudding dessert, they use fresh rosemary and lemon zest in shrimp étouffée,
    occasionally experiment with matcha‑infused iced tea, and love the occasional indulgence of deep‑fried catfish paired with cornbread.
  core: Eduardo Pimentel, a 22‑year‑old electrician‑artist, they merge disciplined organization with late‑night LED tinkering, habitually label every cable, and balance their drive for a green‑tech business
    with a love for gospel rhythm and quiet solitude.
background:
  cultural: Eduardo is an African American raised in Albany, Georgia, deeply rooted in the region’s Black Southern heritage. His upbringing was shaped by close family ties, the local church’s community
    life, and traditions of gospel music and storytelling. These cultural influences foster a strong sense of resilience, communal responsibility, and an appreciation for rhythm and creativity, which he
    weaves into both his professional work and personal artistic pursuits.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Electrical code compliance (NEC)'', ''Blueprint and schematic interpretation'', ''Troubleshooting complex circuitry'', ''Smart‑home automation
    integration'', ''LED lighting design and installation'', ''Basic IoT device integration'', ''Solar panel system basics'', ''Conduit bending and cable management'', ''Use of power tools and digital multimeters'',
    ''Safety inspections and documentation'']'
  hobbies: '[''LED art installations'', ''DIY electronics projects'', ''Sketching and abstract drawing'', ''Reading science‑fiction'', ''Woodworking'', ''Playing digital keyboard in a small church music
    group'', ''Attending local art talks'', ''Volunteer teaching of electrical safety'']'
  career_goals: Eduardo aims to earn his Master Electrician license within the next three years and acquire certifications in renewable energy and building automation. He envisions launching his own contracting
    business that blends sustainable electrical solutions with artistic lighting design, offering services such as solar retrofits and custom LED installations for homes and small businesses. Additionally,
    he hopes to mentor apprentices, develop community workshops that teach both technical and creative aspects of electrical work, and eventually become a trusted leader in Albany’s growing green‑tech sector.
