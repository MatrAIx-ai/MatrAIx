personas:
  professional: A curious 4-year-old named Guy Dolan loves to construct elaborate LEGO fortresses, showing budding spatial reasoning and a balance of meticulous organization with spontaneous play, and they
    always offer to share blocks with peers.
  sports: A budding athlete named Guy Dolan attends the Tiny Tigers preschool soccer program, practices basic moves at the community park, and they cheer for the hometown baseball team, the River Raptors,
    while occasionally mimicking moves from the city's professional basketball squad, the Metro Hawks, during play.
  arts: A creative spark named Guy Dolan spends afternoons drawing whimsical scenes inspired by Dr. Seuss, humming along to Disney’s Frozen soundtrack, and they proudly display a collection of hand-made
    paper crafts featuring colors from the Crayola box.
  travel: A curious explorer named Guy Dolan enjoys family road trips to the Grand Canyon, beach days in Clearwater, and annual visits to Disney World, preferring itineraries that include familiar stops
    like playground breaks and the comfort of their stuffed rabbit, and they dream of sailing on a pirate ship cruise someday.
  culinary: A tiny foodie named Guy Dolan favors cheesy macaroni, crunchy chicken nuggets, and sweet strawberry slices, proudly insists on helping stir batter for pancakes, and they occasionally negotiate
    extra dip for their veggies, revealing a budding palate and a love for finger foods.
  core: A curious, kind-hearted 4-year-old named Guy Dolan balances meticulous block building with spontaneous sticker trades, acts as a gentle peacemaker in the sandbox, yet they often forget to put on
    sunscreen before playground adventures.
background:
  cultural: 'Guy is raised in a white, middle‑class family in Canal Winchester, Ohio, a small Midwestern town known for its historic canal and community events. His upbringing reflects typical Midwestern
    values: friendly neighborliness, involvement in local school and church activities, and participation in town festivals like the Canal Festival and seasonal fairs. Family traditions include celebrating
    Thanksgiving, Christmas, and Fourth of July with communal meals, and enjoying local outdoors activities such as park visits and farmer''s market trips. This environment nurtures his appreciation for
    art, curiosity about the world, and a balanced sense of responsibility.'
