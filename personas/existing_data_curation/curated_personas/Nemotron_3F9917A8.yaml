personas:
  professional: A budding young illustrator and aspiring digital artist named Linda Adams channels curiosity and methodical planning into weekly sketchbook sessions, blending watercolor techniques with
    online tutorials to develop a signature fantasy style that they hope to showcase at the regional art fair.
  sports: An enthusiastic youth sports fan named Linda Adams follows the Dallas Cowboys and the Texas Longhorns football teams, plays on the local Hamilton Hawks soccer club during the spring season, and
    they enjoy weekend hikes with their family in the nearby piney woods, always sporting their favorite yellow Lone Star cap.
  arts: A passionate budding illustrator named Linda Adams immerses themselves in fantasy worlds, drawing inspiration from artists like Hayao Miyazaki, Brian Froud, and classic painter Claude Monet, while
    attending their school's art club meetings to exchange tips on digital illustration software such as Procreate and Photoshop.
  travel: An adventurous road-trip planner named Linda Adams loves weekend getaways to the Hill Country vineyards, annual family visits to the Texas State Fair in Dallas, and dreams of exploring the Grand
    Canyon and New Mexico's Carlsbad Caverns, often mapping routes on a physical road atlas before their parents approve the journey.
  culinary: A budding home chef named Linda Adams enjoys the smoky flavor of Texas-style brisket, the sweet tang of watermelon on hot July days, and often experiments with simple recipes like grilled cheese
    and blueberry muffins, while their favorite ingredient to sprinkle on any dish is a pinch of smoked paprika.
  core: Linda Adams is a curious, organized 13-year-old who balances sketching fantasies with community service, saves allowance for art supplies, and sometimes forgets sunscreen during woodland adventures.
background:
  cultural: Linda was raised in Hamilton, a small rural town in East Texas, within a family that values Southern hospitality, community involvement, and traditional American holidays. Her upbringing reflects
    a blend of Texan traditions—such as county fairs, barbecue gatherings, and Fourth of July fireworks—and a strong emphasis on kindness and cooperation taught through church and school programs. The close‑knit
    nature of her town encourages participation in local events, library activities, and community service, shaping her appreciation for both personal creativity and helping others. While her ethnic background
    is white, Linda is aware of the broader cultural diversity in Texas and enjoys learning about different perspectives through school projects and library resources.
attributes:
  skills: '[''Drawing'', ''Watercolor painting'', ''Digital illustration (basic)'', ''Creative writing (short stories and poetry)'', ''Research and information gathering'', ''Organizational planning and
