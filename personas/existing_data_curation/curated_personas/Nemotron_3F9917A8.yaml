  hobbies: '[''Sketching'', ''Watercolor painting'', ''Digital illustration tutorials'', ''Reading fantasy and graphic novels'', ''Creative writing'', ''Nature walks and collecting natural objects'', ''School
    art club'', ''Volunteer at local library'', ''Playing piano'']'
  career_goals: Linda dreams of turning her love for art and storytelling into a future career, aspiring to become a graphic designer, illustrator, or concept artist who can bring ideas to life visually.
    She is also intrigued by the intersection of art and technology, imagining a role in interactive media or game design. In the longer term, she hopes to use her creativity to support her community, perhaps
    by organizing local art workshops or creating a community gallery that showcases youth talent. She plans to pursue a dedicated high‑school art program and eventually a university degree in fine arts
    or visual communication.
