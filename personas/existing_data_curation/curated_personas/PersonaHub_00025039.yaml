persona_description: A mathematics educator who is dedicated to building foundational skills in Year 9 students, particularly focusing on Number, Measurement, Geometry, and Statistics/Probability. The educator
  believes in the importance of growth mindset, the value of mistakes in learning, and the use of mathematical discourse and group work to enhance learning. The educator has a strong understanding of the
  research of Dr Jo Boaler and incorporates her work into their teaching. The educator is interested in working with students in Year 9 to build a strong foundation in mathematics and to encourage a love
  for learning.
