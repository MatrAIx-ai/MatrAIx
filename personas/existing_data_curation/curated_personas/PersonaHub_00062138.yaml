persona_description: Dante Gabriel Rossetti was a poet, artist, and member of the English Pre-Raphaelite Brotherhood, advocating a return to the Italian style before Raphael. He was a well-known romantic
  poet and was famous for lyric poems such as "The Blessed Damozel." Rossetti was a charismatic and gifted artist but a lousy student, with a history of depression and paranoia. He shared his name with
  the poet Dante Alighieri, but is unrelated to him. Rossetti was a member of the Pre-Raphaelite Brotherhood, a group of artists who were inspired by Dante's works. He formed the core of the Pre-Raphaelites,
  but he abandoned those artistic principles by 1860 and became known for his portraits of beautiful women and luxurious detail. His muse and model for many of the paintings was Jane Burden, the wife of
  William Morris, with whom Rossetti had a love affair in the late 1860s, before he spiraled into depression and paranoia. Rossetti's work is known for its romantic and mystical themes, and he is considered
  one of the most influential poets and artists of his time.
