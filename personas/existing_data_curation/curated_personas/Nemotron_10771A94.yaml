  hobbies: '["museum visits (especially African American art)", "reading poetry and short fiction", "journaling", "street photography", "knitting/crocheting", "soul food cooking", "indoor herb gardening",
    "small book‑club gatherings", "jazz and gospel listening", "volunteering at community garden", "craft making and selling online"]'
  career_goals: Alexis hopes to convert her community involvement into a part‑time role that provides financial stability while preserving the flexible, low‑stress lifestyle she values. She plans to enroll
    in a community‑college certificate program in community health or art therapy, which would enable her to lead creative workshops for seniors and individuals seeking emotional expression. At the same
    time, she dreams of launching an online shop to sell her handmade jewelry and crafts, allowing her to generate income on her own schedule. Ultimately, her ambition is to blend her love for art, caregiving,
    and community service into a sustainable vocation that supports both her personal well‑being and the needs of her neighborhood.
