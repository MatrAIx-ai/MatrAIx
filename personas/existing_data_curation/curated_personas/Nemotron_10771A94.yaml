personas:
  professional: Alexis Felder is a community‑focused creative facilitator who blends basic digital skills, street photography, and hands‑on crafts to lead informal art‑therapy workshops for seniors, bringing
    a relaxed, patient demeanor that helps her nurture trust while occasionally juggling disorganized schedules.
  sports: Alexis Felder follows the Philadelphia Eagles and the Philadelphia 76ers with devoted weekend viewing, participates in a neighborhood walking club that meets at Fairmount Park, and attends a beginner’s
    yoga class at the local community center to keep her body limber, preferring low‑impact activity over competitive sports.
  arts: Alexis Felder draws inspiration from the soulful improvisations of John Coltrane, the raw storytelling of B.B. King, the uplifting hymns of Mahalia Jackson, the modern poetry of Ocean Vuong, and
    the candid street shots of Vivian Maier, weaving these influences into her weekly photo walks and handcrafted jewelry that serve as personal expressions of community and memory.
  travel: Alexis Felder enjoys short, low‑key trips that blend cultural immersion and culinary discovery, having explored Washington, D.C.’s museum corridors and New Orleans’ jazz‑laden French Quarter on
    a modest budget, while dreaming of a weekend retreat in Asheville’s Blue Ridge Mountains and a week‑long culinary tour of Oaxaca, Mexico, though she often procrastinates on booking due to her relaxed
    approach to planning.
  culinary: Alexis Felder is a confident home cook who masterfully prepares soul‑comfort meals such as collard greens seasoned with smoked paprika, crispy fried chicken brined in buttermilk, and sweet potato
    pie spiced with nutmeg and cinnamon, while tending an indoor herb garden of rosemary, thyme, and basil that freshens her dishes, and she enjoys occasional farm‑to‑table pop‑up dinners where she can
    share her culinary creations.
  core: Alexis Felder, a 43‑year‑old creative caretaker, blends street photography, handcrafted jewelry, and soulful cooking into a low‑stress lifestyle, yet often battles procrastination and worries that
    keep her evenings cluttered with unfinished projects.
background:
  cultural: Alexis grew up in West Philadelphia, surrounded by a close‑knit African‑American community that celebrates a rich tapestry of cultural traditions. Family gatherings centered around soul food,
    gospel music, and storytelling have instilled in her a deep appreciation for her heritage. She regularly participates in local cultural events such as the annual Juneteenth celebration, the Philadelphia
    Black Film Festival, and community art workshops that showcase Black artists and poets. The legacy of civil‑rights activism in her neighborhood has shaped her sense of social responsibility, prompting
    her to volunteer at community centers and senior outreach programs. Her identity is further reinforced by her frequent visits to historically Black churches, where the music, fellowship, and communal
    support have been a source of comfort and strength. These experiences influence her artistic sensibilities, culinary preferences, and the way she engages with her community, reflecting a blend of urban
    Philadelphia life and African‑diaspora heritage.
attributes:
  skills: '["basic digital literacy", "photo editing", "street photography", "handcrafted jewelry making", "elderly caregiving", "meal planning and soulful cooking", "small-group facilitation", "budget-friendly
