  hobbies: '[''Visiting art galleries and folk museums'', ''Pottery and ceramics classes'', ''Painting Appalachian landscapes'', ''Wood carving small sculptures'', ''Gardening and growing heirloom vegetables'',
    ''Hiking in the Appalachian foothills'', ''Reading historical fiction about industrial America'', ''DIY home renovation projects with artistic flair'', ''Participating in community theater productions'',
    ''Vintage photography of construction sites'']'
  career_goals: Carmen aims to transition into a crew‑lead or foreman position within the next three years, using her extensive field experience to guide a team while championing sustainable building practices
    and artistic finishes. She plans to complete an associate degree in construction management at a local community college and earn additional certifications in green construction and project management.
    Ultimately, she envisions launching a boutique renovation firm that revitalizes historic homes in the Appalachian region, blending modern eco‑friendly methods with the area's traditional craftsmanship.
    Her competitive drive pushes her to set measurable performance targets for her crew, while her flexible mindset ensures she can balance work responsibilities with her artistic pursuits.
