  hobbies: '[''Abstract painting'', ''Digital photography'', ''Woodworking'', ''Reading speculative fiction'', ''Bird-watching'', ''Gardening'', ''Chess'', ''Historical research'', ''Writing poetry'', ''Listening
    to jazz and classical music'']'
  career_goals: Charles aims to channel his lifelong curiosity into a modest body of work that bridges his technical background and artistic sensibility. He plans to compile a memoir of stories and reflections
    on rural Georgia, illustrated with his own paintings and photographs, and to self‑publish it within the next two years. He also hopes to organize a quarterly community art showcase that encourages local
    seniors and youth to collaborate on interdisciplinary projects. In addition, he aspires to mentor high‑school students interested in STEM‑arts, offering workshops on drafting basics and visual storytelling.
    Finally, he wishes to continue expanding his knowledge of modern abstract art and to travel to at least three regional galleries each year.
