personas:
  professional: Charles Bulan, a 23‑year‑old automotive technician in Branson, blends hands‑on engine rebuilding, performance tuning, and custom paint artistry with an outgoing, fast‑talking style, yet
    often forgets paperwork and meticulous planning, driving their boutique garage dream with a competitive edge and a curiosity for unconventional vehicle projects.
  sports: Charles Bulan fuels their adrenaline through weekend rides with the Ozark Riders Motorcycle Club, hikes the rugged Ozark Trail during summer, and supports the St. Louis Cardinals in baseball and
    the Kansas City Chiefs in football, while occasionally joining local pickup basketball games at the Branson community center to stay fit.
  arts: Charles Bulan channels their creative side by sketching custom car designs, snapping automotive photographs inspired by the lighting techniques of Annie Leibovitz, and playing acoustic renditions
    of Johnny Cash and Lynyrd Skynyrd at Branson open‑mic nights, using each outlet to balance their competitive drive with artistic expression.
  travel: Charles Bulan plans spontaneous road trips along the winding Ozark trails on their motorcycle, cherishes a yearly pilgrimage to Nashville for its music scene, and daydreams about attending the
    Goodwood Festival of Speed in England once their boutique garage’s savings finally allow an overseas adventure.
  culinary: Charles Bulan enjoys grilling smoky barbecue ribs seasoned with hickory‑infused paprika, whipping up quick brunch omelets loaded with jalapeños and cheddar, and cooking campfire pizzas topped
    with fresh mozzarella and basil while on Ozark hikes, though their culinary confidence peaks at the grill rather than the stovetop.
  core: Charles Bulan, a 23‑year‑old garage‑bound dreamer, fuses high‑octane car restoration with country‑rock melodies, thrives on the roar of engines and the buzz of live shows, yet wrestles with anxiety,
    disorganized finances, and a relentless competitive streak.
background:
  cultural: Charles grew up in Branson, Missouri, a tourism‑driven town nestled in the Ozarks. As a white Midwesterner, he was shaped by the region’s values of friendliness, modesty, and a strong work ethic.
    The local culture of live music venues, country and rock performances, and family‑oriented community events fostered his appreciation for the arts. Proximity to a vibrant car‑show scene and abundant
    outdoor recreation blended his love for automotive mechanics with a passion for music, art, and the natural landscape of the Ozarks.
