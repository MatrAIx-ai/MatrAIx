  hobbies: '[''Attending art exhibitions and museum tours'', ''Cooking traditional Mexican dishes and teaching cooking classes'', ''Participating in senior‑center dance nights (salsa, cumbia)'', ''Balcony
    gardening (herbs, chilies)'', ''Listening to mariachi and regional Mexican music'', ''Reading Mexican literature and art history'', ''Storytelling circles and oral history gatherings'']'
  career_goals: Even at 89, Juan remains eager to leave a lasting imprint on his community. He plans to compile a digital memoir that blends his personal stories, family recipes, and reflections on Mexican
    art, using a tablet he has recently learned to operate. He hopes to mentor younger volunteers at the museum, guiding them in curating future exhibitions that highlight contemporary Mexican-American
    artists. Juan also aspires to launch an intergenerational cooking series at the senior center, pairing seniors with teens to share culinary traditions. Finally, he wishes to stay physically active by
    participating in weekly dance classes and community walks, ensuring his health supports his cultural and educational contributions.
