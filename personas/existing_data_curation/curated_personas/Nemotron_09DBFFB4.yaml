  career_goals: Manuel aims to build on his academic strengths to pursue a career in engineering. In the short term, he plans to earn top grades in math and science, secure a place in a competitive STEM
    high‑school program, and deepen his coding abilities through advanced robotics projects. He hopes to win a regional robotics competition and obtain an Indiana STEM scholarship. Over the next five years,
    he envisions attending a leading university to study aerospace or civil engineering, focusing on sustainable infrastructure and space technology. Long‑term, Manuel aspires to design innovative transportation
    solutions that benefit both his local community and broader society, and to mentor younger Mexican‑American students, encouraging them to pursue STEM pathways.
