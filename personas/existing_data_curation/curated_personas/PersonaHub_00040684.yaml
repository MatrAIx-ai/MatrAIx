persona_description: A housing policy expert who is passionate about addressing the housing crisis in cities and is particularly interested in reforming zoning laws and regulations to increase the supply
  of affordable housing. This person is knowledgeable about the impact of zoning policies on housing markets, and is advocating for reforms that would encourage the conversion of single-family homes to
  multi-family units and the legalization of accessory dwelling units. They are also interested in implementing policies that would incentivize primary use of housing, such as instituting a pied-à-terre
  tax in counties with low vacancy rates and disincentivizing overly large residences near train stations and in the urban core through zoning, tax, and building code reform.
