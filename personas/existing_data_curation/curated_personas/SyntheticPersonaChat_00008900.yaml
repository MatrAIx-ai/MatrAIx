data:
  user 1 personas: 'I am currently studying at union college and want to be an english teacher.

    That way , after graduating , i can teach english there for a year or two.

    I am a huge buffalo bills fan , and our family has season tickets.

    I grew up in syracuse , ny with my parents and brother.'
  user 2 personas: 'I drive a restored mustang.

    I am a college student.

    I play football.

    My father is a doctor.'
  Best Generated Conversation: 'User 1: What''s up?

    User 2: Not much, just got back from class.

    User 1: Oh cool, what class did you have?

    User 2: I had English.

    User 1: Oh, how was it?

    User 2: It was good. We talked about the history of the English language.

    User 1: Interesting. I''m an English teacher.

    User 2: Oh, really? That''s awesome!

    User 1: Yeah, it is. I love teaching English.

    User 2: I''m sure you''re a great teacher.

    User 1: Thanks, I try.

    User 2: So, what do you like to do for fun?

    User 1: I like to read, watch movies, and play video games.

    User 2: Oh, cool. I like to read and watch movies too.

    User 1: Nice. What kind of movies do you like to watch?

    User 2: I like all kinds of movies, but I especially like comedies and action movies.

    User 1: Me too. I love comedies.

    User 2: What''s your favorite movie?

    User 1: My favorite movie is The Hangover.

    User 2: Oh, I love that movie!

    User 1: Yeah, it''s so funny.

    User 2: So, what''s your favorite book?

    User 1: My favorite book is The Lord of the Rings.

    User 2: Oh, I love that series!

    User 1: Yeah, it''s so good.

    User 2: So, what do you do for a living?

    User 1: I''m a teacher.

    User 2: Oh, that''s awesome! What grade do you teach?

    User 1: I teach middle school English.

    User 2: Oh, cool. I have a brother in middle school.

    User 1: Oh, really? What grade is he in?

    User 2: He''s in sixth grade.

    User 1: Oh, cool. I''m sure he''s a great kid.

    User 2: Yeah, he is.

    User 1: So, what do you like about teaching?

    User 2: I like that I get to help kids learn.

    User 1: That''s a great reason to teach.

    User 2: Yeah, it is.

    User 1: So, what''s your favorite part of teaching?

    User 2: I like seeing the light bulb go off in kids'' heads when they understand something.

    User 1: That''s a great feeling.

    User 2: Yeah, it is.

    User 1: So, what''s your least favorite part of teaching?

    User 2: I don''t like it when kids are disrespectful.

    User 1: Yeah, that can be tough.

    User 2: Yeah, it is.

    User 1: So, what''s your dream job?

    User 2: I''m not sure. I think I want to be a teacher.

    User 1: That''s a great goal to have.

    User 2: Yeah, it is.

    User 1: So, what do you want to do after college?

    User 2: I''m not sure yet. I might want to go to grad school.

    User 1: That''s a good idea.

    User 2: Yeah, it is.'
