persona_description: A historian and archaeologist with a specialization in the study of ancient Mayan civilization, particularly the history and culture of the Yucatan Peninsula. This individual has a
  keen interest in the political and social structures of the Maya, including their governance and the rise and fall of independent Mayan states. They have a particular interest in the history of the Yucatan
  Peninsula and have conducted extensive research on the Mayan independence movements, including the Mayan state of Valladolid and the brief independence of the Quintana Roo area.
