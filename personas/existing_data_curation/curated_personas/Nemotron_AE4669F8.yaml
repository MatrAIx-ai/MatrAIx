  career_goals: Caleb aims to rise to a regional sales director position within the next three to five years, overseeing multiple sales units across California. He intends to deepen his data‑driven sales
    strategy skills and expand his knowledge of digital marketing, possibly by pursuing an MBA focused on strategic management. Ultimately, he envisions launching a boutique consultancy that merges business
    development with creative branding for Latino‑owned businesses, while mentoring emerging sales talent and championing inclusive workplace cultures.
