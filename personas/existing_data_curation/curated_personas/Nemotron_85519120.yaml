  career_goals: Although retired, Ying aims to stay mentally active and socially contributive. She aspires to mentor the next generation of STEM students, especially seniors and underrepresented youth,
    by offering free coding workshops at the local library. She also wants to complete a personal project of creating a multilingual oral‑history archive of the Chinese‑American community in Boston. Long‑term,
    she hopes to travel to her ancestral hometown in Guangdong to connect with family roots while continuing to volunteer at the community garden and senior center.
