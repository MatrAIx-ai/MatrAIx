personas:
  professional: Katherine Robinson, a veteran parking attendant with a knack for courteous service and conflict resolution, blends her organized reliability with an innate curiosity for modern POS systems,
    and now pursues a hospitality management certification to step into a supervisory role where they can mentor new staff and champion inclusive, safe parking solutions for community events.
  sports: Katherine Robinson stays active by leading a weekly walking group along the Charlotte greenway, cheering on the Charlotte Hornets during basketball season, supporting the Carolina Panthers on
    Sundays, and occasionally joining the senior softball league at the community center, all while balancing low‑impact exercises that accommodate her knee osteoarthritis.
  arts: Katherine Robinson expresses creativity through soulful hymns in her church choir, a love for line‑dancing to classic country hits by artists like Dolly Parton, and admiration for gospel legends
    such as Kirk Franklin, using music and storytelling to preserve family traditions during monthly potluck gatherings.
  travel: Katherine Robinson favors relaxed, group‑oriented travel, often planning weekend getaways to the Blue Ridge Mountains around Asheville or cultural visits to Washington, D.C., where they explore
    historic sites and local cuisine, while dreaming of a future Caribbean cruise with longtime friends, balancing wanderlust with a modest travel budget.
  culinary: Katherine Robinson delights in cooking Southern comfort dishes like smoky collard greens, honey‑glazed fried chicken, and sweet potato pie, often seasoning with fresh herbs—basil, thyme, and
    rosemary—from her community garden, and plans to launch a small catering service that showcases these family‑favorite meals at neighborhood events.
  core: Katherine Robinson blends diligent organization with warm community spirit, turning everyday parking duties into mentorship opportunities while nurturing a garden, a choir, and a never‑ending love
    for potluck storytelling, though they sometimes forget to water the basil when caught up in a new project.
background:
  cultural: Katherine identifies as African American with a multicultural heritage reflected in her middle name, Ngozi, which honors her Nigerian ancestry. Raised in the Charlotte metropolitan area, she
    grew up immersed in Southern Black cultural traditions—church fellowship, family gatherings, and community activism—while also embracing elements of her African roots through music, cuisine, and storytelling.
    Her background informs her strong sense of community responsibility, her appreciation for intergenerational connections, and her commitment to fostering inclusive spaces in both her work and personal
    life.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''Conflict resolution'', ''Shift scheduling'', ''Safety and security procedures'', ''Basic vehicle maintenance'', ''Digital POS system operation'', ''Effective
    communication'', ''Problem solving'', ''Community outreach'']'
  hobbies: '[''Singing in church choir'', ''Community gardening'', ''Hosting potluck dinners'', ''Bridge club'', ''Attending local history talks'', ''Mentoring youth'', ''Line dancing'', ''Walking group'']'
  career_goals: Katherine is aiming to advance into a supervisory role within the parking operations, where she can mentor new attendants and implement efficiency improvements. She plans to complete a short
    certification in hospitality management to broaden her expertise. In the longer term, she hopes to transition into a part‑time community liaison position at the local recreation department, using her
    outgoing nature to connect seniors with activities and to promote inclusive, safe parking solutions for community events. She also envisions launching a small catering venture focused on traditional
    Southern comfort food for neighborhood gatherings.
