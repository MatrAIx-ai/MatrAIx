  hobbies: '["drawing and coloring", "watercolor painting", "dancing to music", "singing nursery rhymes", "listening to storytime", "playing group games", "sandbox and garden exploration", "simple cooking
    with family", "learning Spanish songs"]'
  career_goals: Vivian loves to imagine future roles where she can share stories and create colorful art. She often says she wants to become a teacher who reads books to children, an artist who paints big
    pictures, a dancer who performs on stage, or a veterinarian who cares for animals. Her ambition is to keep learning, making friends, and bringing joy through creative activities.
