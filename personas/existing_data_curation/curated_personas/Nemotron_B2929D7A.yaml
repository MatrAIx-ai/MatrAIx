personas:
  professional: Vivian Valdes, a preschool-age imaginative builder, channels curiosity and social energy into elaborate block constructions, they often role-play as a junior architect who effortlessly organizes
    collaborative play despite a delightfully chaotic workspace.
  sports: Vivian Valdes dashes around the playground with the Little Sprouts Soccer Club, they idolize the Los Angeles Dodgers and the LA Lakers on TV, enjoy summer swim lessons at the community pool, and
    eagerly join family outings to watch local Little League games.
  arts: Vivian Valdes delights in finger painting bright swirls, they sing along to songs from Frozen and Sesame Street, and marvel at the vivid colors of Van Gogh’s Starry Night reproductions displayed
    in a children’s museum, often trying to recreate them with crayons.
  travel: Vivian Valdes loves spontaneous road trips to the beach at Santa Monica, they cherish family vacations to Disneyland, and dream of spotting a kangaroo at Australia’s Sydney Zoo, preferring packed
    snacks and a playlist of upbeat children’s songs for the journey.
  culinary: Vivian Valdes prefers cheesy macaroni, crunchy apple slices, and peanut butter and jelly sandwiches, they help stir batter for chocolate chip cookies with a tiny wooden spoon, and proudly name
    cheddar cheese, strawberries, and honey as favorite ingredients.
  core: Vivian Valdes is a curious, energetic 4-year-old who blends artistic imagination with a lovable chaos, they constantly ask ‘why’ while juggling a rainbow of toys, snacks, and adventure plans.
background:
  cultural: Vivian grows up in a Mexican‑American household in Orange, California. At home, Spanish and English are spoken interchangeably, and family celebrations include Día de los Muertos, Mexican Independence
    Day, and gatherings with traditional foods like tacos, elote, and tamales. Music, dance, and storytelling are central to her family life, influencing her love for rhythmic movement, colorful art, and
    communal activities. The multicultural environment of Orange County exposes her to both Latino and broader American cultural experiences, shaping a bicultural identity that celebrates her Mexican heritage
    while embracing the diverse community around her.
attributes:
