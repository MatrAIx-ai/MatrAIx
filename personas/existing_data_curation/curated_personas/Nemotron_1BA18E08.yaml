personas:
  professional: Jasmin Jackson is an aspiring art-therapy facilitator who blends sketching, street photography, and basic digital design with strong empathy and active-listening skills to lead small-group
    creative workshops at a Chicago youth center, and they navigate a laid-back, sometimes disorganized approach that values flexibility over strict planning.
  sports: Jasmin Jackson enjoys casual fitness through weekend runs with the Chicago Running Club, regular yoga classes at a community studio, and occasional pickup basketball games, and they cheer for
    the Chicago Bulls, Blackhawks, and White Sox as their favorite professional sports teams.
  arts: Jasmin Jackson immerses themselves in Chicago’s art scene by sketching cityscapes at the Art Institute, capturing candid street moments, and they draw inspiration from jazz legends like Miles Davis,
    neo-soul icons such as Erykah Badu, and spoken-word poets like Andrea Gibson, shaping their creative identity.
  travel: Jasmin Jackson prefers spontaneous, low-budget explorations, often wandering through Chicago neighborhoods like Pilsen, Hyde Park, and Wicker Park, and they dream of a future art-focused trip
    to New York’s Museum of Modern Art and a cultural pilgrimage to Paris’ Musée d’Orsay.
  culinary: Jasmin Jackson cooks soul-food staples like collard greens, fried chicken, and sweet potato pie using ingredients such as smoked paprika, thyme, and fresh cornmeal, and they also experiment
    with global flavors in occasional fusion dishes, reflecting a moderate cooking skill level and a love for hearty, comforting meals.
  core: Jasmin Jackson is a creatively curious, compassion-driven 18-year-old who balances art, community service, and spontaneous living, and they often juggle disorganized plans with a deep commitment
    to helping at-risk youth.
background:
  cultural: Jasmin identifies as African‑American and grew up in Chicago’s South Side, a neighborhood steeped in the legacy of the civil‑rights movement and Black cultural expression. Her family’s roots
    trace back to the Southern United States, and she was raised on stories of resilience, gospel music, and community solidarity. The city’s vibrant blues, jazz, and hip‑hop scenes have shaped her artistic
    sensibilities, while local festivals such as the Chicago Black Arts Festival reinforce her connection to Black heritage. Jasmin’s cultural identity informs her commitment to social equity, storytelling,
    and creating spaces where young Black voices can thrive.
