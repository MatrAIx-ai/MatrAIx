  hobbies: '[''Visiting art museums (e.g., Art Institute of Chicago)'', ''Sketching and painting'', ''Street photography'', ''Listening to jazz, neo-soul, and hip-hop'', ''Reading fiction and books on social
    justice'', ''Writing poetry and journaling'', ''Attending small open-mic and spoken-word events'', ''Exploring Chicago neighborhoods and coffee shops'', ''Yoga and mindfulness meditation'', ''Volunteering
    at local youth centers'', ''Cooking and experimenting with soul-food recipes'']'
  career_goals: Jasmin hopes to complete a bachelor’s degree in social work or art therapy, blending her passion for the arts with her desire to support mental health. She aims to work with community organizations
    in Chicago that provide creative workshops for at‑risk youth, eventually launching her own non‑profit art‑and‑wellness program. In the short term, she plans to secure a peer‑support certification and
    take on part‑time roles as a facilitator for after‑school art clubs. She also envisions continuing to develop her artistic practice, possibly freelancing as a graphic designer to fund her community
    projects. Flexibility remains key; she wants a career that allows her to balance personal creativity, community service, and continual learning.
