  career_goals: Ricardo’s long‑term goal is to turn his curiosity about nature into a career that serves his community. He is fascinated by the marine life along the St. Johns River and imagines himself
    as a marine biologist or wildlife conservationist, where he can observe, catalog, and protect sea turtles and fish. At the same time, he is attracted to the orderly, team‑oriented environment of a firefighter,
    admiring the clear procedures and the chance to help neighbors in emergencies. He often tells his teachers that he wants a job where he can use his methodical skills, work with a small, trusted team,
    and make a positive impact.
