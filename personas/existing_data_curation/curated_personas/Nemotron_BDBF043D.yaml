personas:
  professional: Ricardo Wright, a budding junior engineer who loves building LEGO models, applies their organized, methodical mindset and practical curiosity to create intricate constructions and imagines
    future careers in architecture or civil engineering.
  sports: Ricardo Wright, a small‑group soccer enthusiast, plays forward for the neighborhood "Beachside Strikers" league, follows the local professional baseball team the "Longshore Mariners," and enjoys
    weekend bike rides along the coastal trail to stay fit.
  arts: Ricardo Wright, a keen reader of picture books, idolizes Dr. Seuss and Eric Carle, enjoys watching "Wild Kratts," and spends quiet afternoons sketching LEGO designs, reflecting a love for vivid
    storytelling and creative visualization.
  travel: Ricardo Wright, an adventurous yet family‑oriented traveler, loves day trips to the nearby coastal boardwalk and dreams of visiting the Grand Canyon and Disney World, preferring well‑planned itineraries
    with familiar companions over spontaneous solo trips.
  culinary: Ricardo Wright, a curious kitchen helper, delights in chopping collard greens for family meals, loves building sandwich towers with turkey, cheddar, and avocado, and enjoys the sweet crunch
    of chocolate chip cookies.
  core: Ricardo Wright, an organized 7‑year‑old LEGO architect who meticulously saves every coin for new sets, balances curiosity with methodical play, sometimes hides stray bricks in their shoes, and quietly
    leads small‑group soccer games while dreaming of future engineering feats.
background:
  cultural: Ricardo is an African‑American boy growing up in Jacksonville, FL, a city with a rich Southern Black heritage. His family maintains traditions rooted in the church, regularly attending a local
    Baptist congregation where gospel music and community service are emphasized. Holidays like Juneteenth are celebrated at home with storytelling about African ancestry, family history, and foods such
    as fried catfish, collard greens, and cornbread. He listens to a mix of contemporary hip‑hop, R&B, and classic soul, and his grandparents share memories of the civil‑rights era, instilling pride and
    a sense of resilience. The neighborhood’s community center offers after‑school programs that reinforce academic achievement and cultural pride, shaping his identity as a thoughtful, community‑oriented
    youth.
