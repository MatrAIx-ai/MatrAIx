personas:
  professional: Marrio Cole, a 30-year-old aspiring maintenance technician, leverages their hands‑on carpentry, plumbing, and electrical troubleshooting skills along with a meticulous budgeting habit to
    excel in structured property‑management environments where reliability and predictability are prized, and they thrive on the clear expectations that such roles provide.
  sports: Marrio Cole, an enthusiastic participant in pick‑up basketball games at the Belleville Community Center and a loyal fan of the New York Knicks and New York Giants, maintains fitness through weekly
    court sessions and weekend jogs in Essex County parks, while also supporting the local Belleville Hoops Club, and they value the camaraderie of small‑group play over large‑scale fan gatherings.
  arts: Marrio Cole, a devoted listener of classic jazz and soul, finds solace in the works of John Coltrane, Miles Davis, Aretha Franklin, and Bill Withers, and regularly attends the local community theater’s
    open mic nights, using music to balance their structured daily routine, and they often share favorite tracks with friends during community events.
  travel: Marrio Cole, a budget‑conscious traveler, enjoys short road trips to nearby historic sites like Philadelphia’s Independence Hall and Boston’s Freedom Trail, dreams of a culinary tour of New Orleans,
    and plans trips with detailed itineraries to maximize value while honoring their preference for predictable schedules, and they favor destinations that combine cultural richness with manageable travel
    logistics.
  culinary: Marrio Cole, an intermediate home cook, perfects soul‑food classics such as collard greens simmered with smoked turkey, shrimp and grits spiced with cayenne and smoked paprika, and sweet‑potato
    pie, treating the kitchen as another workshop where measured recipes satisfy both creativity and comfort, and they often experiment with new spice blends while preserving family traditions.
  core: Marrio Cole, a practical 30‑year‑old who loves measured woodworking, precise budgeting, and quiet jazz, balances a disciplined routine with a quirky habit of hoarding spare parts for future projects,
    and they occasionally indulge in spontaneous late‑night tool shopping sprees.
background:
  cultural: Marrio is African‑American, raised in the close‑knit Black community of Belleville, New Jersey. His upbringing was shaped by the city's diverse cultural tapestry, church gatherings, and neighborhood
    camaraderie. Family traditions centered around soul food, gospel music, and storytelling, reinforcing the values of mutual support and resilience. As a black man in a working‑class suburb, he has navigated
    systemic challenges, which deepened his appreciation for community solidarity and the importance of practical, self‑reliant skills. Local cultural influences, such as the nearby Newark jazz scene and
    the strong presence of community centers, have contributed to his love for music, volunteerism, and collaborative problem‑solving.
attributes:
  skills: '[''Basic plumbing and electrical repairs'', ''General carpentry'', ''Automotive maintenance'', ''Personal budgeting and finance management'', ''Windows computer troubleshooting'', ''Conflict
    resolution'', ''Small‑group coordination and event planning'']'
  hobbies: '[''Woodworking'', ''Pick‑up basketball games'', ''Jazz and soul music listening'', ''Reading self‑improvement and personal‑finance books'', ''Cooking family recipes (soul food)'', ''Walking
    in Essex County parks'', ''Volunteering at community center (food drives, youth programs)'']'
  career_goals: Marrio aims to re‑enter the workforce by obtaining a certified maintenance technician credential from a local vocational college. He envisions a stable, full‑time role in property management
    or facilities upkeep where his hands‑on skills and dependable nature can be leveraged. He also hopes to gradually build a modest side business offering home‑repair services to neighbors in Belleville,
    allowing him flexible hours while maintaining a predictable income. Long‑term, he aspires to become a mentor for young adults in his community, sharing practical life‑skills and helping them navigate
    post‑high‑school pathways.
