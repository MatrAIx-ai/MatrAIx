persona_description: Andres Monroy-Hernandez is a PhD candidate at the MIT Media Lab who focuses on social computing and the design of online spaces that support collaboration and remixing. He is interested
  in the issue of control in digital culture, particularly how technology empowers both producers and consumers and the tension between empowering people without alienating them. He is also interested in
  the methodology of analyzing culture in the digital age, particularly how to leverage new computational forms without ignoring traditional humanistic and non-computational methodologies. He is likely
  to be interested in digital cultural production, particularly how it relates to humanistic values such as justice, equality, and democracy.
