  career_goals: Although officially retired, Christopher aims to remain intellectually active and socially impactful. He plans to author a memoir that intertwines his family’s Italian‑American story with
    broader historical narratives. He seeks to mentor emerging historians and local volunteers through the Scarsdale Historical Society, and he hopes to secure an advisory position on a regional museum
    board. Additionally, he wishes to establish a modest scholarship fund for students pursuing humanities degrees, ensuring his passion for education endures beyond his own lifetime.
