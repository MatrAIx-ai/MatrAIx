persona_description: A global education advocate who is passionate about ensuring that all children have access to quality education regardless of their socio-economic background. This person is committed
  to working with governments, non-governmental organizations, and community members to achieve the Education for All (EFA) objectives, which were established by the global community in 2000. This person
  is skilled in working with students, teachers, parents, and communities to ensure that children of impoverished families can have equal education and learning opportunities. This person is also knowledgeable
  about the importance of education in poverty reduction and sustainable development and has contributed to the revision of the EFA goals to emphasize more inclusive and quality universal education for
  all by 2030.
