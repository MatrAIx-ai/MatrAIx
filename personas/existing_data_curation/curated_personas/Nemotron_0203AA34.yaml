personas:
  professional: Jorge Torres, a 26‑year‑old community‑focused visual artist and emerging art‑therapy facilitator, leverages watercolor, acrylic, and digital illustration skills along with bilingual communication
    to design flexible, empathy‑driven workshops, yet their relaxed attitude toward deadlines sometimes leads to last‑minute schedule shifts.
  sports: Jorge Torres hikes the bluffs of the Mississippi River with the Dubuque Outdoor Explorers Club, practices yoga three times a week at Riverbend Yoga Studio, follows the Chicago Cubs and Iowa Hawkeyes,
    plays pickup basketball at the community center, and occasionally joins a local running group, though they often skip a run when a new art project demands attention.
  arts: Jorge Torres paints watercolor scenes of the Illinois River while listening to indie folk artists like Bon Iver and Mexican alternative bands such as Café Tacvba, draws inspiration from Frida Kahlo’s
    self‑portraits and Diego Rivera’s murals, curates mini‑exhibitions at Dubuque’s Small World Gallery, and rehearses acoustic guitar chords to José González songs, merging visual and musical creativity.
  travel: Jorge Torres prefers low‑key, culturally immersive trips, having backpacked through Oaxaca’s bustling markets, taken a weekend road trip to New Orleans for its jazz scene, explored the historic
    streets of Guanajuato, and dreams of visiting Kyoto’s temples, usually planning itineraries on a spreadsheet while leaving space for spontaneous photo walks.
  culinary: Jorge Torres prepares authentic tamales with masa, pork, and chipotle salsa, simmers a rich mole poblano using ancho chilies and Mexican chocolate for friends, and crafts refreshing aguas frescas
    with hibiscus, lime, and a touch of agave, showcasing an intermediate cooking skill that blends tradition with occasional experimental twists like jalapeño‑infused honey.
  core: Jorge Torres is a creatively restless 26‑year‑old who channels anxiety into vibrant art, lives on flexible schedules, habitually over‑indulges in craft supplies, and often forgets to pay bills on
    time.
background:
  cultural: Jorge was born to Mexican parents who immigrated to the United States before his birth, and he grew up speaking both Spanish and English. His household celebrated Mexican traditions such as
    Día de los Muertos, Semana Santa, and posadas, and he learned to cook family recipes handed down through generations. He identifies strongly with the values of collectivism, respect for elders, and
    community solidarity that are central to Mexican culture. Living in Dubuque, Iowa, Jorge navigates a blend of Midwestern and Latino influences—participating in the local Latino Harvest Festival, volunteering
    at the city's multicultural center, and integrating American customs like Thanksgiving with Mexican holiday observances. He maintains regular contact with relatives in Mexico, sending remittances and
    visiting every few years, which reinforces his bicultural identity.
attributes:
