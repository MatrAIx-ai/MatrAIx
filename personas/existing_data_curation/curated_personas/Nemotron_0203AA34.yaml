  hobbies: '[''Watercolor and acrylic painting'', ''Sketching and mixed-media collage'', ''Street photography'', ''Acoustic guitar playing'', ''Reading magical realism and philosophy'', ''Cooking traditional
    Mexican cuisine'', ''Volunteering as an arts mentor'', ''Attending local gallery exhibitions and indie film screenings'', ''Hiking the Dubuque River bluffs'', ''Practicing yoga and meditation'']'
  career_goals: Jorge aims to translate his artistic passion and compassionate nature into a career that fosters community well‑being. In the short term, he plans to secure a part‑time position as a community
    art facilitator or youth mentorship coordinator at a local nonprofit, allowing him to lead workshops that blend visual arts with personal expression. He intends to complete his undergraduate coursework
    in psychology or art therapy within the next two years, and later pursue a master’s degree in counseling or art therapy. His long‑term ambition is to establish a multicultural art‑therapy studio in
    Dubuzero where Mexican‑American youth and other marginalized groups can safely explore creativity, process emotions, and build resilience. He also hopes to become a certified trauma‑informed peer supporter,
    enabling him to provide deeper emotional assistance while maintaining financial stability.
