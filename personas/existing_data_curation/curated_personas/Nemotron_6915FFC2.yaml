  career_goals: Patricia aims to attend a STEM‑focused high school and eventually earn a scholarship to study civil engineering, driven by her love of structured problem solving and community improvement.
    She envisions designing safe, accessible public spaces—especially in underserved neighborhoods with a large Salvadoran population. Alongside engineering, she hopes to leverage her bilingual abilities
    to work as a community outreach coordinator or translator, helping Spanish‑speaking families navigate local services. Her long‑term ambition is to blend technical expertise with cultural advocacy to
    create inclusive, well‑planned environments.
