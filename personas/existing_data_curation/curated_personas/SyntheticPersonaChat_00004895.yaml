    User 2: Oh, that''s cool. I''ve always wanted to learn karate.

    User 1: You should! It''s a great way to stay in shape and learn self-defense.

    User 2: I''ll have to look into it.

    User 1: You should. It''s a lot of fun.

    User 2: Do you have any other hobbies?

