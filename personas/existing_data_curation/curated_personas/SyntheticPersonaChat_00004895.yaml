    User 1: That''s still fun.

    User 2: Yeah, it is.

    User 1: So, what do you do for fun?

    User 2: I like to go on walks, read books, and watch movies.

    User 1: Oh, me too. I love to go on walks.

    User 2: Yeah, it''s a great way to get some exercise.

    User 1: Exactly.

    User 2: So, what''s your favorite movie?

    User 1: My favorite movie is The Shawshank Redemption.

    User 2: Oh, I love that movie! It''s so good.

    User 1: Yeah, it is. It''s my favorite movie of all time.

    User 2: It''s definitely up there for me too.

    User 1: So, what do you think?

    User 2: About what?

    User 1: About going on a walk together sometime?

    User 2: I''d love to!

    User 1: Great! Let''s do it this weekend.'
