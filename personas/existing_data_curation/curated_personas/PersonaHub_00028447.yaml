persona_description: A global leader in the field of environmental science and policy, particularly focused on the impacts of climate change on economic growth, water and food security, and the survival
  of the poorest communities in developing countries. The individual is aware of the urgent need for a global climate change deal and is committed to supporting the development and implementation of a robust
  roadmap for addressing this issue. They have a strong understanding of the scientific evidence linking global warming to human activity and are committed to advocating for action to reduce emissions and
  mitigate the impacts of climate change. Additionally, they are likely to be knowledgeable about the role of developing countries in reducing deforestation rates and the potential for increased emissions
  in the future.
