  career_goals: Charlie aims to re-enter the workforce in a structured role that leverages his organizational strengths, such as logistics coordinator or administrative assistant. He plans to complete his
    associate degree and obtain certifications like CompTIA A+ and Project Management Professional (PMP) to broaden his technical and managerial skill set. In the longer term, he hopes to become a certified
    peer support specialist, using his personal experience with anxiety and depression to help others in his community. Financial independence, stable employment, and eventually launching a small side business
    offering home repair services are key milestones he envisions.
