  hobbies: '["Coastal Photography", "Visiting Art Galleries", "Collecting Contemporary African‑American Art", "Yoga", "Open‑Water Swimming", "Reading (Science‑Fiction, Architectural Theory, Biographies)",
    "Mentoring STEM Outreach for Girls", "Participating in 5K Running Events"]'
  career_goals: Mae aims to become Director of Engineering within the next five years, leading multidisciplinary teams on resilient coastal infrastructure projects that blend functionality with public art
    and community space. She is driven to expand her firm’s sustainable‑design portfolio, secure patents for innovative storm‑water mitigation systems, and spearhead diversity initiatives that increase
    representation of Black women in engineering. In the long term, she envisions launching her own consultancy focused on green infrastructure and culturally responsive urban planning, while publishing
    thought pieces in industry journals and speaking at conferences on inclusive design.
