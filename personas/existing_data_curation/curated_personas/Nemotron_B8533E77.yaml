personas:
  professional: Mae Mercer, a senior civil engineer specializing in sustainable coastal infrastructure, leverages meticulous finite element modeling, Six Sigma rigor, and a keen eye for aesthetics to deliver
    resilient, community‑focused projects while they mentor women of color and champion inclusive design.
  sports: Mae Mercer embraces a balanced fitness routine that includes sunrise yoga sessions on the Pompano Beach pier, weekly laps in the ocean, and a Saturday 5K training program with the Sunnyshore Striders,
    and they cheer on the Miami Dolphins and the Miami Heat during off‑season downtime.
  arts: Mae Mercer cultivates their artistic side through coastal photography that captures the interplay of light and water, and they curate a personal collection featuring works by Kehinde Wiley, Kara Walker,
    and Bisa Butler, regularly visiting boutique galleries where they draw inspiration from contemporary visual art and sci‑fi cover designs.
  travel: Mae Mercer prefers thoughtfully planned, purposeful travel, and they favor coastal destinations like Key West, the Amalfi Coast, and Cape Town where they can photograph waterfronts, attend art
    residencies, and network with local engineers, all while adhering to a moderate budget that balances family obligations with professional development trips.
  culinary: Mae Mercer enjoys cooking fresh seafood such as seared snapper and ceviche with lime, avocado, and smoked paprika, pairs it with Mediterranean chickpea salads, and they occasionally experiment
    with Jamaican jerk seasoning, all while maintaining a semi‑professional kitchen setup that includes a high‑end DSLR‑mounted lighting rig for food plating photography.
  core: Mae Mercer blends disciplined engineering expertise with a quiet, art‑driven curiosity, and they balance rigorous project leadership with a habit of late‑night photo editing and an occasional reluctance
    to delegate tasks.
background:
  cultural: Mae Nicole Mercer identifies as African‑American with deep roots in South Florida’s Black community. Raised in a multigenerational household that celebrated gospel music, Caribbean culinary
    traditions, and storytelling, she internalized a strong sense of communal responsibility. Growing up near Miami’s vibrant art scene exposed her early to the works of Black artists and the legacy of
    the civil‑rights movement. In Pompano Beach, she participates in local cultural festivals, volunteers at the African‑American Heritage Museum, and mentors youth through the Black Engineers of Broward
    County chapter. Her cultural heritage informs her professional drive to create infrastructure that serves under‑represented neighborhoods and integrates artistic expression reflective of the community’s
    identity.
attributes:
  skills: '["Structural Analysis", "Finite Element Modeling", "Geotechnical Engineering", "Sustainable Coastal Design", "BIM (Revit) Modeling", "Python Programming", "MATLAB", "Project Management", "Risk
