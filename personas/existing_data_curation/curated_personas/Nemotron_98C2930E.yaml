  hobbies: '[''Cooking traditional Vietnamese dishes'', ''Gardening'', ''Sewing and handicrafts'', ''Attending cultural festivals'', ''Reading self‑help and wellness books'', ''Volunteering at community
    center'', ''Walking'', ''Gentle yoga'']'
  career_goals: Although Thuy is not currently part of the formal workforce, she aspires to expand her role as a community leader by organizing cultural workshops, mentoring younger families, and eventually
    launching a small home‑based catering service that offers authentic Vietnamese meals for local events. She also aims to secure a comfortable retirement fund for her family, support her grandchildren’s
    education, and continue volunteering at the local senior center to provide companionship and assistance to older adults.
