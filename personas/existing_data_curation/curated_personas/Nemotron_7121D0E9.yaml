personas:
  professional: Janet Yepes, a retired mechanical engineer and applied mathematician, leverages her advanced data analysis, statistical modeling, and technical writing skills alongside meticulous project‑management
    prowess to design evidence‑driven STEM‑art curricula for senior‑center workshops, where her charismatic, competitive style makes her the centerpiece of mentorship for aspiring young engineers.
  sports: Janet Yepes keeps active through weekly salsa dancing classes at the community center, daily morning walks with the Silver Stroll senior walking club, and follows the Dallas Cowboys and Houston
    Astros passionately, often cheering during games while balancing her competitive drive with gentle stretching routines to manage her osteoarthritis.
  arts: Janet Yepes, an avid oil painter and folk‑art curator, channels the vivid colors of Frida Kahlo and the narrative strength of Diego Rivera into her own canvases, volunteers as a docent at the local
    museum where she guides tours of Monet and O'Keeffe exhibits, and regularly attends live performances by salsa bands such as La Sonora Dinamita, blending her artistic and musical passions into community
    exhibitions.
  travel: Janet Yepes prefers meticulously planned, culturally immersive trips, having explored the historic missions of San Antonio, the galleries of the Smithsonian in Washington, D.C., and a recent art‑focused
    cruise to the Mediterranean, while she dreams of visiting Oaxaca's vibrant markets and the gardens of Kyoto, balancing her love of discovery with the comfort of senior‑friendly accommodations.
  culinary: Janet Yepes, an accomplished home chef, delights in preparing authentic mole poblano, hand‑made tamales, and chiles en nogada using fresh cilantro, dried ancho chilies, roasted nuts, and corn
    from her garden, and she regularly shares these dishes at community gatherings while occasionally indulging in a glass of mezcal as a finishing touch.
  core: Janet Yepes blends a lifelong engineer's precision with an artist's heart, obsessively cataloguing every brushstroke and scholarship goal, while her competitive spark fuels relentless community
    impact and her occasional forgetfulness about medication adds a human twist.
background:
  cultural: Janet was born to Mexican immigrants from Jalisco who settled in Central Texas. Raised bilingual, she grew up celebrating Día de los Muertos, quinceañeras, and other Mexican traditions while
    also absorbing the diverse cultural fabric of Austin. Her family maintains strong ties to Mexican culinary and artistic customs, and she actively participates in local Latino cultural festivals. Living
    in Williamson County, she blends her Mexican heritage with Texan influences, fostering a cross‑cultural perspective that enriches her community involvement and personal identity.
attributes:
