  career_goals: Although retired from formal employment, Janet is driven to leave a lasting legacy by mentoring the next generation of Latinx students in STEM, establishing a scholarship fund for promising
    high‑school girls, and authoring a memoir that chronicles her journey as a woman in engineering. She aspires to expand the reach of the community science program she volunteers with, integrate more
    art‑science interdisciplinary workshops, and ensure her family’s stories and Mexican heritage are preserved for future generations. Her competitive spirit pushes her to set high standards for these
    initiatives and to receive recognition for their impact.
