personas:
  professional: Eddy Zaldumbide, a 15‑year‑old aspiring digital illustrator, channels their methodical nature into manga‑style character design while contributing to an after‑school robotics club, where
    their competitive streak drives them to perfect autonomous prototypes and document every iteration on a personal tech blog.
  sports: Eddy Zaldumbide follows the local high school varsity soccer team and is an avid fan of the NBA’s Los Angeles Lakers, preferring solo jogs in the neighborhood park to stay fit, though their competitive
    mindset sometimes leads them to push beyond comfortable limits.
  arts: Eddy Zaldumbide immerses themselves in creative expression by drawing manga characters, listening to indie rock band Tame Impala and traditional folk group Los Folkloricos del Pueblo, and studying
    art history documentaries on YouTube, which collectively shape a uniquely eclectic aesthetic.
  travel: Eddy Zaldumbide dreams of visiting Kyoto’s Gion district to experience authentic manga culture, has already explored nearby national parks on family road trips, and meticulously plans future trips
    using travel vlogs and budgeting spreadsheets despite their limited teen freedom.
  culinary: Eddy Zaldumbide helps prepare family‑tradition tamales with masa, pork, and corn husks, as well as chicken enchiladas rojas, displaying intermediate cooking skills and a fondness for the bold
    flavors of chili, cumin, and fresh cilantro that they savor eagerly.
  core: Eddy Zaldumbide is a curious, organized teen who fuses a love for manga art with a competitive drive, a cautious wallet, and a habit of staying up late to perfect both sketches and robot code, often
    sacrificing sleep they otherwise need.
background:
  cultural: Eddy comes from a Mexican-American family that maintains strong ties to its heritage while living in Granite Bay, California. At home, Spanish is spoken alongside English, and he grew up celebrating
    Mexican holidays such as Día de los Muertos, Cinco de Mayo, and family quinceañeras. Traditional foods, music, and stories are part of his upbringing, and he has visited relatives in Mexico during summer
    trips. The community’s blend of suburban American culture and his family’s Mexican roots shapes his worldview, giving him a bicultural perspective that informs his art, language use, and sense of identity.
