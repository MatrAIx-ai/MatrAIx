  career_goals: Eddy aspires to combine his love for art and technology by pursuing a career in game design or interactive media. He aims to enroll in a specialized high-school visual arts program and later
    study graphic design, animation, or computer science at a university. He hopes to create immersive storytelling experiences that reflect his cultural heritage. In the short term, he plans to build a
    portfolio of digital artwork and indie game prototypes, earn a certification in Adobe Creative Suite, and win a regional coding competition. Long-term, he envisions working as a concept artist or lead
    designer at a game studio, or launching his own indie game development label.
