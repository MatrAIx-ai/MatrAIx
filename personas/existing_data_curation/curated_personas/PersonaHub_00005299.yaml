persona_description: A professor of "the dismal science"—or any other social science—interested in harnessing the power of Geographic Information Systems (GIS) to engage skeptical students and teach more
  effectively. This person is passionate about using GIS to illustrate concepts during lecture or discussion, and to provide specific GIS assignments for undergraduates and graduate students. They are familiar
  with the technology of GIS and understand its potential to dramatically change the way the world does business. This person is also interested in leveraging the familiar— the students’ attraction to interactive
  virtual experiences—creating a bridge for students to cross over into less familiar areas of their disciplines. They are a math professor who specializes in the study of group theory, particularly the
  concepts and theorems related to subgroups and isomorphisms, and their research interests include, but are not limited to, the structure of finite groups, representation theory of groups, isomorphism
  problems, and the theory of group automorphisms.
