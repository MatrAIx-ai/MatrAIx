personas:
  professional: Petra Rivera is a budding robotics enthusiast who leads a small group in designing autonomous LEGO robots, applying systematic planning, meticulous organization, and a competitive drive
    to excel in regional contests.
  sports: Petra Rivera plays forward for the Northside Strikers U12 soccer team, adds extra shooting drills after each practice, follows Manchester United in the Premier League, and during winter joins
    a local youth basketball league while cheering for the Chicago Bulls.
  arts: Petra Rivera sketches original comic strips inspired by Bill Watterson’s "Calvin and Hobbes," devours graphic novels by Raina Telgemeier, watches animated series like "Adventure Time," and enjoys
    Studio Ghibli films, letting their creative side balance the precision of building and robotics.
  travel: Petra Rivera loves weekend road trips to places like Grand Canyon National Park and New York City, dreams of exploring Machu Picchu and Tokyo, and prefers itineraries that mix a bit of adventure
    with time to document the journey in a travel journal, often planning the details with parents.
  culinary: Petra Rivera enjoys cooking family recipes such as corn tamales, chiles rellenos, and pupusas, loves the aroma of roasted corn and fresh cilantro, and can also whip up a respectable spaghetti
    carbonara with pancetta, showcasing both cultural pride and a willingness to experiment in the kitchen.
  core: Petra Rivera is an 11‑year‑old methodical builder who balances competitive robotics, soccer, and secret snack‑stashing habits with a quiet love for family‑rooted cooking.
background:
  cultural: Petra is a second‑generation Guatemalan‑American growing up in Los Angeles. Her household speaks Spanish at home, preserving family stories, music, and culinary traditions such as tamales and
    pepian. She celebrates Día de los Muertos with colorful altars and participates in local Latin American festivals, which reinforce her cultural identity. While fully integrated into the diverse fabric
    of Los Angeles, Petra balances her heritage with mainstream American influences, attending a public school where she interacts with peers from many backgrounds. This bicultural environment nurtures
    her bilingual abilities, respect for family cohesion, and an appreciation for community diversity.
