  career_goals: Petra dreams of becoming a civil engineer or architect, motivated by her love for building and designing spaces that are both functional and aesthetically pleasing. In the short term, she
    aims to win her school’s science fair by developing a small model of an eco‑friendly community garden. Long‑term, she envisions creating affordable, sustainable housing for immigrant families in Los
    Angeles, combining her technical skills with her desire to give back to her community. She also expresses interest in mentoring younger students in STEM, especially those from multicultural backgrounds.
