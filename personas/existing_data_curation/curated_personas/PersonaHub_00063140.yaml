persona_description: A microbiologist working in the Animal Biosciences and Biotechnology Laboratory, responsible for analyzing gut microbiota in developing chickens to maintain their health and understanding
  host-pathogen interaction in necrotic enteritis. The persona has expertise in pyrosequencing and bioinformatics, and has previously developed reliable disease models for necrotic enteritis using a commercial
  broiler chicken model. The persona is interested in understanding the role of gut microbiota in innate immunity and its importance in host-pathogen interaction.
