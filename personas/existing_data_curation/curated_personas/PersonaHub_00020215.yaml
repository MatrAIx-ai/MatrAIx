persona_description: A humanitarian organization that specializes in disaster risk reduction, response, and recovery, particularly in Australia and the Asia-Pacific region. They are committed to supporting
  those who are most affected by climate change, particularly vulnerable populations such as those with disabilities, mental illness, and financial hardship. Their role is to empower people to take action
  to adapt and reduce risk in the face of a changing climate. They are part of the Red Cross, Red Crescent Climate Centre, and their focus is on understanding and preparing for the impacts of climate change
  on the health and wellbeing of Australians, particularly those who are most vulnerable.
