    workflow automation'', ''Training and onboarding of new staff'']'
  hobbies: '[''Fishing'', ''Home brewing'', ''Woodworking'', ''Model railroading'', ''Family outings and fatherhood'', ''Reading practical non‑fiction (tech manuals, self‑improvement)'', ''Cycling on local
