personas:
  professional: Alan Guillotte, a 35‑year‑old computer support specialist, leverages their methodical mindset and love of routine to troubleshoot Windows, macOS, and Linux systems, streamline network configurations,
    and craft meticulous SOPs, and they consistently deliver reliable user training while aiming for senior IT leadership.
  sports: Alan Guillotte cheers the St. Louis Cardinals every baseball season, follows the St. Louis Blues for ice‑hockey, participates in the Missouri River Anglers Association during summer, and they
    keep a modest fitness routine by jogging along the river trail three times a week, balancing team fandom with personal outdoor activity.
  arts: Alan Guillotte channels their creativity through woodworking and model railroading, while listening to classic Americana artists like Johnny Cash, John Prine, and Bruce Springsteen, and they occasionally
    attend performances at the St. Louis Repertory Theatre, letting music and stagecraft inform their meticulous craft.
  travel: Alan Guillotte plans their trips with the same precision they apply to ticketing, favoring weekend getaways to the Ozark National Forest for fishing, a yearly pilgrimage to Bavaria to study traditional
    brewing, and a long‑term wish to explore New Zealand’s hiking trails, all while keeping travel costs within a set quarterly budget.
  culinary: Alan Guillotte brews their own seasonal ales—such as a citrus‑infused summer IPA and a spiced winter stout—using home‑grown herbs like rosemary and thyme, pairs their beers with grilled river
    trout and herb‑roasted chicken, and they enjoy experimenting with malt, hops, and yeast varieties in their modest kitchen.
  core: Alan Guillotte embodies a routine‑driven, methodical mind that balances precise technical work, disciplined finances, and a hands‑on hobby life, and they punctuate this with occasional indulgences
    in craft beer and family‑focused traditions.
background:
  cultural: Alan grew up in a suburban family in Saint Charles, Missouri, within a predominantly white, middle‑class Midwestern community. His upbringing emphasized practicality, self‑reliance, and strong
    family ties, shaped by the region's Protestant (with some Catholic) traditions and community involvement. The Guillotte surname reflects his French‑ancestral roots, but culturally he identifies with
    the values of Midwestern hospitality, modesty, and a dependable work ethic. He participates in local church activities, supports regional sports teams, and values the balance of personal responsibility
    and community service.
attributes:
