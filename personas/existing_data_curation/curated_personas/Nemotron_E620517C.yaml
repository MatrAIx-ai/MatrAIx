  career_goals: 'Alan aims to advance into a senior technical support role within the next two years, followed by a transition to an IT operations or service delivery manager position within five years.
    He plans to obtain CompTIA Network+ and Microsoft Certified: Azure Fundamentals certifications to broaden his expertise. His long‑term ambition is to lead a cohesive support team, implement ITIL‑aligned
    processes, and eventually launch a small managed‑services consultancy that offers reliable, routine‑driven IT solutions for local businesses.'
