persona_description: A professional water treatment engineer who specializes in designing and maintaining UV disinfection systems. They have extensive knowledge of the UV disinfection process and are skilled
  in analyzing various water sources to determine the appropriate fluence rates and protective sleeve designs. They are aware of the potential scaling issues and the importance of pre-treatment on water
  sources with contaminants that can affect the UV intensity. They are also knowledgeable about the use of UV sensors to ensure the effective operation of the UV system.
