personas:
  professional: Carmen Diaz is a food‑service supervisor in Miami who leverages meticulous inventory control, bilingual team leadership, and data‑driven scheduling to keep kitchen operations humming, while
    they channel their curiosity for art into innovative dining concepts.
  sports: Carmen Diaz mixes salsa and bachata classes with weekend hikes through the Everglades, follows the Miami Heat and the Miami Marlins closely, and participates in a local co‑ed recreational soccer
    league that meets on Thursday evenings, which they enjoy as a social outlet.
  arts: Carmen Diaz roams Wynwood’s mural corridors admiring works by Shepard Fairey and local emerging artist Maya Vargas, attends monthly gallery openings in the Design District that showcase contemporary
    painters like Carlos Mendoza, and curates a personal Instagram feed of food illustrations inspired by the bold colors of street art, which they share to connect with fellow creatives.
  travel: Carmen Diaz prefers spontaneous weekend road trips to the Florida Keys and curated cultural getaways to Barcelona and Tokyo, balancing a modest travel budget with a desire to experience vibrant
    art scenes and culinary markets, while they keep an eye on airline points for future flights to South America.
  culinary: Carmen Diaz fuses traditional arepas and sancocho with modern plating techniques, loves experimenting with ingredients like plantain, chorizo, coriander, and coconut milk, and regularly drafts
    Instagram‑ready food photos of dishes such as arepa rellena de queso and sancocho de pollo with a side of quinoa salad, which they post to showcase their culinary creativity.
  core: Carmen Diaz is a detail‑oriented food‑service leader who teams a love of street art, salsa rhythm, and meticulous budgeting into a fast‑track plan for a sustainable, art‑infused café, which they
    see as a personal legacy.
background:
  cultural: Carmen was born to Colombian parents who immigrated to South Florida when she was a child. She grew up bilingual, celebrating Colombian holidays like Día de los Santos and the Festival de Barranquilla,
    and she carries the warmth of family gatherings where coffee, empanadas, and music are central. The Colombian diaspora in Miami has provided a supportive network that maintains traditions while embracing
    the multicultural fabric of the city. These cultural roots inform her palate, her appreciation for rhythm and dance, and her commitment to community involvement. While she identifies strongly with her
    Colombian heritage, she also integrates the diverse influences of Miami’s Latin American and Caribbean neighborhoods into her personal and professional life.
attributes:
  skills: '[''Food service operations management'', ''Staff scheduling and shift supervision'', ''Food safety and sanitation compliance (ServSafe certified)'', ''Cost control and inventory management'',
    ''Budgeting and shift-level financial reporting'', ''Customer service excellence'', ''Team training and mentorship'', ''Bilingual communication (Spanish/English)'', ''Data-driven performance analysis
    using POS systems'', ''Process optimization and lean principles'', ''Knowledge of Colombian and Latin American cuisine'', ''Conflict resolution and team building'']'
  hobbies: '[''Exploring contemporary art galleries and street murals'', ''Food photography and sketching'', ''Salsa and bachata dancing'', ''Home cooking and culinary experimentation'', ''Yoga and mindfulness
    practice'', ''Hiking in the Everglades'', ''Reading entrepreneurship and design thinking books'', ''Volunteering at cultural festivals and culinary workshops'']'
  career_goals: Carmen aims to advance from her current supervisory role to a restaurant manager position within the next 18–24 months, overseeing multiple outlets. She plans to earn a Certified Hospitality
    Supervisor credential and enroll in a part‑time MBA program focused on hospitality leadership. In the longer term, she envisions opening a boutique café that blends contemporary Colombian flavors with
    locally sourced ingredients, featuring rotating art exhibitions from emerging Miami artists. She also aspires to mentor young professionals from the Colombian diaspora and champion sustainable sourcing
    practices within the industry.
