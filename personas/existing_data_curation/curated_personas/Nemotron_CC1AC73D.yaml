personas:
  professional: Irma Aleman is an aspiring community arts coordinator who blends bilingual communication, graphic design skills in Photoshop and Illustrator, and a meticulous yet adaptable approach to event
    planning, channeling their curiosity and love for visual storytelling into programs that celebrate local cultural festivals like Día de los Muertos.
  sports: Irma Aleman enjoys casual softball games with a community league, follows the Fargo‑Moorhead Redhawks and Minnesota Vikings for football, practices yoga at Eastside Yoga studio during winter,
    and hikes the nearby Sheyenne River Valley in summer, balancing low‑impact exercise with occasional indoor rock climbing at the Red Rock Climbing Center.
  arts: Irma Aleman frequents the Fargo Art Museum and local galleries, sketches urban scenes, curates a small book club where they discuss contemporary authors from her family's region, draws inspiration
    from a renowned painter of self‑portraits exploring cultural identity, and creates digital illustrations that blend traditional motifs with modern graphic design trends.
  travel: Irma Aleman dreams of a backpacking trip through Oaxaca’s markets and the historic streets of Mexico City, has already visited the Twin Cities for a weekend art fair, and plans a budget‑friendly
    summer road trip to the Badlands National Park, all while balancing school responsibilities and limited finances.
  culinary: Irma Aleman loves cooking homemade tamales de mole, chilaquiles with fresh salsa verde, and fresh guacamole topped with cilantro and lime, experimenting with heirloom corn masa and a variety
    of dried chilies, yet often orders pizza when pressed for time during exam weeks.
  core: Irma Aleman is a reserved yet curious 21‑year‑old who balances quiet creativity with community‑focused activism, habitually journaling late at night while occasionally binge‑watching indie documentaries.
background:
  cultural: Irma is the daughter of Mexican immigrants who settled in the United States before her birth. Raised in a bilingual household, she grew up speaking Spanish at home and English at school, absorbing
    Mexican customs such as Día de los Muertos, quinceañera celebrations, and regional culinary traditions. Living in Fargo, ND, she navigates a small but vibrant Mexican community, often connecting with
    other Latinx families through cultural festivals, community gatherings, and shared heritage projects. Her cultural identity deeply influences her artistic sensibilities, storytelling interests, and
    commitment to fostering harmony and inclusion within her social circles.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic graphic design (Adobe Photoshop, Illustrator)'', ''Art appreciation and critique'', ''Creative writing'', ''Research and information synthesis'',
    ''Event planning for small gatherings'', ''Volunteer coordination'', ''Digital media content creation'', ''Project organization'', ''Interpersonal mediation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Photography'', ''Reading contemporary Mexican literature'', ''Cooking traditional Mexican dishes'', ''Listening to indie
    and Latin music'', ''Yoga practice'', ''Journaling'', ''Small book club participation'']'
  career_goals: Irma aims to channel her artistic curiosity and cultural heritage into a career that fosters community engagement and representation. She plans to complete a degree in Arts Administration
    or Graphic Design, build a portfolio that highlights Mexican-inspired visual storytelling, and eventually work as a community arts coordinator for a cultural center in the Upper Midwest. Long‑term,
    she hopes to develop programs that celebrate diverse artistic expressions, use her bilingual abilities to bridge outreach efforts, and perhaps launch a freelance design studio focused on culturally
    resonant branding.
