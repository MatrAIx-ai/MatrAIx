persona_description: A disaster relief worker who specializes in managing natural disasters, particularly those in the Northern Plains region. They have experience working with flow volumes, recurrence
  intervals, and streamflow-gaging stations. They are skilled in analyzing and interpreting data to understand the severity and impact of the 1996-97 winter snowfall and 1997 spring floods, and are responsible
  for coordinating response efforts to minimize the damage and ensure the safety of the affected communities. They have a deep understanding of the Northern Plains region's hydrology and are adept at using
  statistical methods and modeling tools to predict and prepare for future natural disasters.
