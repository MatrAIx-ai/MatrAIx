    User 1: It''s okay. It can be a lot of work, but it''s fun meeting new people.

    User 2: Yeah, I can imagine. So, what do you like to do for fun?

    User 1: I love to play video games, watch movies, and read books.

    User 2: Me too! I love to read romance novels.

    User 1: Oh, me too! I love a good romance novel.

    User 2: So, what are you reading right now?

    User 1: I''m reading a book called "The Hating Game."

    User 2: Oh, I''ve heard good things about that book.

    User 1: It''s really good! I''m about halfway through it.

    User 2: I''ll have to check it out.

    User 1: You should! It''s a great book.'
