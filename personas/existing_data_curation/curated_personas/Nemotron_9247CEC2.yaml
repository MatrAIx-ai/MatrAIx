    Mexican/Tex‑Mex)'']'
  career_goals: Nelson aims to translate his technical and retail expertise into higher‑level management within the next two years, targeting a store manager or district manager position at his retailer.
    He wants to lead a team, implement data‑driven merchandising and inventory strategies, and consistently surpass sales targets, satisfying his competitive drive. In the longer term he plans to earn an
    MBA focused on supply‑chain analytics or entrepreneurship, which would allow him to transition into a corporate analytics role or open his own boutique electronics boutique that emphasizes sustainable
    technology. Achieving these milestones will provide the financial stability and professional stature he values while giving him the structure to balance work with personal commitments.
