  career_goals: Although approaching retirement, Carmen aims to cement her legacy by mentoring younger therapists in her community and drafting a concise guide on safe massage practices for older adults.
    She aspires to obtain a formal certification in Geriatric Manual Therapy to reinforce her credibility and expand her clientele. Over the next five years she hopes to host a monthly workshop at the local
    senior center, fostering practical self-care routines while maintaining the steady income needed to support her family.
