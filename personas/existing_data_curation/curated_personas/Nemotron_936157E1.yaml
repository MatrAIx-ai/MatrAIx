personas:
  professional: Manases Encalada is a budding help‑desk technician whose methodical, detail‑focused mindset blends a love for tinkering with Arduino and troubleshooting hardware, while their bilingual communication
    and calm, low‑stress work ethic position them for certifications like CompTIA A+ and future roles in network administration.
  sports: Manases Encalada enjoys low‑key fitness through regular park walks and participates in a local recreational soccer league that supports Atlanta United, while cheering for the Atlanta Hawks and
    Atlanta Falcons on game nights, combining community activity with relaxed fandom.
  arts: Manases Encalada immerses themselves in speculative fiction by devouring works from authors like Isaac Asimov and Nnedi Okorafor, while their music taste ranges from the synth‑driven soundscapes
    of M83 to the storytelling of regional norteño ballads, shaping a creative outlet that balances intellectual curiosity and cultural resonance.
  travel: Manases Encalada prefers thoughtfully planned short trips that blend adventure and family connection, such as weekend hikes in the North Georgia mountains, a cultural road‑trip to New Orleans
    to explore jazz heritage, and a future goal of visiting the historic streets of Oaxaca to sample regional cuisine.
  culinary: Manases Encalada delights in cooking traditional corn‑based dishes like tamales, chilaquiles, and mole, experimenting with regional chilies and fresh herbs while maintaining a modest skill level
    that allows them to serve comforting meals for family gatherings.
  core: Manases Encalada balances a quiet, curiosity‑driven mind with practical hands‑on skills, navigating stress through structured routines, modest spending, and a love for solitary gaming, tinkering,
    and family‑centric cooking.
background:
  cultural: Manases was raised in a Mexican‑American household in the Atlanta metropolitan area. Both of his parents emigrated from the state of Jalisco, and the family maintains strong ties to Mexican
    language, food, and traditions. He grew up speaking Spanish at home and English at school, which gave him bilingual fluency. Celebrations such as Día de los Muertos, Navidad with tamales, and regional
    festivals are central to his family life. Living in Lawrenceville, he is part of a growing Mexican community in Gwinnett County, attending cultural events at the local Hispanic Center and helping organize
    small gatherings. This bicultural upbringing shapes his values of family solidarity, hard work, and respect for both Mexican heritage and American civic life.
attributes:
  skills: '["Basic computer troubleshooting", "Hardware and software maintenance", "Automotive basic maintenance", "Bilingual communication (Spanish/English)", "Organizational planning and task management",
