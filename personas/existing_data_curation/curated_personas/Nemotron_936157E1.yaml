  hobbies: '["Reading science‑fiction and historical non‑fiction", "Playing strategy and puzzle video games", "Arduino and electronics tinkering", "Cooking traditional Mexican cuisine", "Walking in local
    parks", "Attending small cultural gatherings and community volunteer events"]'
  career_goals: Manases aims to translate his technical curiosity into a stable career that balances his desire for practical work with low stress. He plans to enroll in an associate‑degree program in Information
    Technology or Automotive Technology at Gwinnett Technical College within the next year. His short‑term goal is to secure an apprenticeship or entry‑level position as a help‑desk tech or automotive service
    assistant, allowing him to gain certifications such as CompTIA A+ or ASE while earning an income to support his family. Long‑term, he envisions becoming a certified network administrator or master automotive
    technician, potentially opening his own small repair shop that can serve the local Hispanic community. He also hopes to develop a side hustle fixing computers for neighbors, providing a low‑pressure
    source of income as he builds his expertise.
