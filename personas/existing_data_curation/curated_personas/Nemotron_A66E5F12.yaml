personas:
  professional: Lori Kirkman, an aspiring marine‑ecology hobbyist who catalogs tide‑pool invertebrates and builds a DIY weather‑station that streams data to a personal dashboard, channels their curiosity
    and practical DIY skills into independent projects while they let their skeptical, competitive streak drive them to out‑perform peers in occasional robotics club contests despite a preference for unstructured,
    solitary work.
  sports: Lori Kirkman, an avid beach‑volleyball player at the Saint Marina Surf Festival and a seasonal surfer with the Monterey Bay Surfers club, spends summer mornings building stamina for cross‑country
    runs while they loyally cheer on the San Jose Earthquakes and Golden State Warriors on match nights.
  arts: Lori Kirkman, a quiet acoustic‑guitar hobbyist who favors fingerpicking renditions of Jack Johnson and John Denver, translates their fascination with marine life into detailed sketches reminiscent
    of Ernst Haeckel, and they fuel their speculative short‑story writing with the works of Ursula K. Le Guin and the indie films of Greta Gerwig.
  travel: Lori Kirkman, who has hiked the rugged cliffs of Big Sur and snorkeled around the Channel Islands National Park, prefers spontaneous low‑budget weekend getaways yet they dream of a solo backpacking
    trek along the coastal Pacific Northwest from Portland to Vancouver and a future dive excursion to the Great Barrier Reef.
  culinary: Lori Kirkman, a modest home‑cook who delights in grilling salmon with a miso glaze, tossing seaweed salads with wakame and sesame oil, and assembling avocado‑lime shrimp tacos with fresh cilantro,
    usually sources kelp and heirloom tomatoes from the Saturday Seaside farmer’s market, though they occasionally opt for pizza delivery when school projects mount.
  core: Lori Kirkman, a solitary yet fiercely curious teen, blends coastal environmental activism with DIY tech and artistic pursuits, while they wrestle with chronic worry and a competitive edge.
background:
  cultural: She was raised in Seaside, California, a small coastal community in Monterey County. Her family, middle‑class, values self‑reliance and environmental stewardship, often participating in local
    beach‑cleanup events and supporting the Monterey Bay Aquarium’s education programs. The West‑Coast culture of individuality and progressive environmental awareness has shaped her worldview, while the
    relatively close‑knit nature of the town encourages familiarity with neighbors and local traditions such as the annual Saint Marina Surf Festival. She attends a public middle school where a diverse
    student body exposes her to a range of perspectives, but her home life emphasizes practical skills, such as DIY repairs and community service. This blend of coastal Californian lifestyle, environmental
    activism, and an emphasis on independent learning informs her identity.
attributes:
  skills: '[''HTML/CSS (basic)'', ''Python (introductory)'', ''Data visualization (e.g., Matplotlib, Seaborn)'', ''Adobe Lightroom'', ''Adobe Premiere'', ''Digital photography'', ''Arduino project building'',
