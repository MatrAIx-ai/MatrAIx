  hobbies: '[''Tide‑pool exploration and sketching'', ''Underwater photography'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Reading sci‑fi & writing short stories'', ''Acoustic guitar (fingerpicking)'',
    ''Strategic single‑player video games'', ''Personal data‑visualization dashboards'', ''Participating in robotics club (project‑driven)'']'
  career_goals: She aspires to pursue a career that merges her love of the ocean with her technical skill set. Her short‑term goal is to earn a scholarship to a STEM‑focused high‑school program, compete
    in regional science fairs with her water‑quality sensor project, and later attend a university that offers a strong marine science and computer science joint program. She envisions becoming a marine
    data analyst or environmental technologist, using coding and sensor data to monitor coastal ecosystems. In the long term she hopes to work for organizations such as NOAA, a marine‑tech startup, or as
    an independent consultant helping coastal NGOs collect and interpret data. Her ultimate ambition is to develop affordable, user‑friendly monitoring tools that empower local communities to protect their
    shoreline.
