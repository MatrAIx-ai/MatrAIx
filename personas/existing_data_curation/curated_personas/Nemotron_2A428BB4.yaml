personas:
  professional: A budding junior horticulturist and choir enthusiast, Nayana Sabree applies a love for structured garden routines and meticulous attention to detail to small‑scale planting projects while
    delighting in the harmony of gospel and R&B songs they rehearse with the church children’s choir.
  sports: A playful participant in the neighborhood park’s swing crew, Nayana Sabree enjoys weekly touch‑football drills with the local Little League “Tiny Tigers” club, proudly roots for the Chicago Cubs,
    and attends a junior gymnastics class at the community center on weekends.
  arts: An imaginative illustrator and craft maker, Nayana Sabree devours picture books by Dr. Seuss and Mo Willems, models drawings after the whimsical style of Oliver Jeffers, adores the soulful voice
    of Stevie Wonder, and frequently creates friendship bracelets inspired by the rhythmic patterns of gospel songs performed by the church choir.
  travel: Nayana Sabree’s travel diary includes sunny days at the family’s weekend beach retreat in Myrtle Beach, a memorable trip to a countryside farm where they helped harvest carrots, and a dream of
    visiting Disney World’s Magic Kingdom to meet favorite characters while still enjoying the comfort of familiar swings back home.
  culinary: A modest but enthusiastic eater, Nayana Sabree delights in peanut butter‑banana sandwiches, loves the bright crunch of carrot sticks dipped in hummus, and proudly helps stir spaghetti sauce
    seasoned with basil and garlic, often sprinkling a pinch of grated Parmesan on top of their plate.
  core: Nayana Sabree is a quietly creative 7‑year‑old who balances a love for structured garden routines with an impulsive habit of turning every spare moment into a handmade bracelet, all while humming
    gospel tunes.
background:
  cultural: Nayana is part of an African‑American family rooted in Stockbridge, Georgia, where church, community, and family gatherings are central to daily life. She grows up listening to gospel music
    and stories of family heritage shared by grandparents, celebrating cultural traditions like Juneteenth and local festivals. Her family places high value on mutual support, respect, and teaching younger
    members about their Southern Black cultural heritage, which shapes her compassionate outlook and desire to contribute to community wellbeing.
