  hobbies: '[''Reading'', ''Drawing'', ''Crafting jewelry'', ''Gardening'', "Children''s choir", ''Playing at the park with a small group'', ''Pet rabbit care'']'
  career_goals: Nayana dreams of a future where she can help others every day. She imagines becoming a teacher because she loves sharing stories and helping classmates understand new ideas. She also thinks
    about being a veterinarian, inspired by her bond with their rabbit and her desire to care for animals. In the meantime, she hopes to volunteer at the local library’s story‑time program and assist church
    community projects, building the skills she’ll need for those careers.
