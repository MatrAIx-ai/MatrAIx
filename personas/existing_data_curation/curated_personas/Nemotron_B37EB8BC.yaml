  skills: '[''HTML'', ''CSS'', ''JavaScript'', ''React'', ''Node.js'', ''Express'', ''Git'', ''Responsive design'', ''Web accessibility (WCAG)'', ''Testing (Jest)'', ''Agile/Scrum'']'
  hobbies: '[''Hiking'', ''Landscape photography'', ''Reading science‑fiction'', ''Puzzle solving (crosswords, sudoku)'', ''Cooking experimental recipes'', ''Meditation'', ''Journaling'']'
  career_goals: Zenaida aims to become a senior full‑stack engineer specializing in inclusive, high‑performance web applications. She plans to deepen her expertise in accessibility standards and performance
    optimization, eventually leading a remote development team that values quiet, focused work environments. In the longer term, she hopes to launch her own consultancy that helps startups build accessible
    digital products while maintaining a balance between innovative experimentation and practical delivery.
