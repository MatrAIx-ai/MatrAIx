  hobbies: '[''Gardening'', ''Baking and cooking'', ''Quilting and knitting'', ''Church choir singing'', ''Walking/hiking'', ''Reading mystery and historical fiction novels'', ''Book club participation'',
    ''Volunteering at food pantry'']'
  career_goals: Although she is currently not in the formal workforce, Kathleen aims to deepen her involvement in community service by obtaining a certified caregiver credential and leading a local senior
    support group. She hopes to mentor younger volunteers at her church, develop a weekly neighborhood outreach program, and eventually write a practical guidebook on home organization for seniors to help
    families maintain harmony and independence.
