persona_description: An academic historian specializing in the history of education in Ontario, particularly the development of secondary education in the late 19th century. This person is interested in
  the economic, social, and political factors that shaped the expansion of secondary education, as well as the shifts in curriculum and the impact of new forms of knowledge on traditional pedagogical values.
  They are likely to have a deep understanding of the empirical data derived from school records, census manuscript material, assessment rolls, and literary and biographical sources, and they are passionate
  about illuminating the roots of modern educational dilemmas.
