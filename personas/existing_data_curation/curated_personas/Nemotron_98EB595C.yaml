personas:
  professional: Michael Darensbourg is a disciplined high‑school senior who already serves as the reliable assistant for community event setups, and they are actively preparing for a carpentry apprenticeship
    by mastering blueprint reading, woodworking basics, and regimented volunteer routines.
  sports: Michael Darensbourg is a devoted fan of the Fayetteville High Bulldogs football team, spends Saturday mornings tailgating with homemade slaw, and they occasionally join a local trout‑fishing club
    that meets at Lake Rim to keep active while respecting the region’s outdoor traditions.
  arts: Michael Darensbourg channels their love for precise creation into building detailed LEGO replicas and restoring vintage model airplanes, while they unwind listening to classic Southern rock like
    Lynyrd Skynyrd and watching period dramas starring Tom Hanks.
  travel: Michael Darensbourg prefers road‑trip itineraries that blend fishing spots and historic sites, having already driven to the Great Smoky Mountains for a weekend of trout fishing and hoping to one
    day tour the historic districts of Savannah during a spring break that fits their school schedule and modest budget.
  culinary: Michael Darensbourg enjoys slow‑cooked pulled pork sandwiches, buttery cornbread, and a side of homemade coleslaw at family barbecues, and they often practice their own recipes by following
    step‑by‑step YouTube tutorials while carefully measuring each spice.
  core: Michael Darensbourg is a routine‑driven teen who balances meticulous model‑building hobbies, disciplined budgeting, and a budding ambition for a trades apprenticeship, all while navigating occasional
    stress with a mix of careful planning and Southern hospitality.
background:
  cultural: 'Michael was raised in a traditional Southern, white, middle‑class family in Fayetteville, North Carolina. His upbringing reflects the values of the military community surrounding Fort Bragg,
    including discipline, respect for routine, and a strong sense of duty. The family regularly attends a Baptist church, where community service and modesty are emphasized. Southern hospitality and practicality
    shape his worldview: he values reliable relationships, prefers familiar customs, and enjoys local traditions such as community pot‑lucks, high‑school football games, and outdoor activities like fishing
    and weekend barbecues.'
