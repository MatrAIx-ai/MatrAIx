  career_goals: Michael aims to obtain his high‑school equivalency (GED) within the next year and then secure an apprenticeship in carpentry or electrical work, fields that offer clear structures, steady
    income, and hands‑on tasks he enjoys. He is also considering enlisting in the U.S. Army, attracted by the regimented lifestyle, benefits, and the chance to support his family financially. In the long
    run, he hopes to become a certified tradesperson—either a carpenter or electrician—so he can run his own small contracting business, providing stable employment for himself and eventually for his future
    family.
