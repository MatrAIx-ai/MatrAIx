personas:
  professional: Latoya Mcghee, a 29‑year‑old community organizer and budding home‑based caterer, leverages her budgeting expertise, event‑coordination skill, and church choir leadership to launch a soulful
    food service that doubles as a neighborhood outreach hub.
  sports: Latoya Mcghee stays active through weekly Zumba sessions, plays pick‑up basketball at the local park, and rallies as a fan of the Chicago Bulls and Chicago Fire, often organizing viewing parties
    at her home.
  arts: Latoya Mcghee sings gospel harmonies in her church choir, draws inspiration from artists like Kirk Franklin and Alicia Keys, attends monthly line‑dancing workshops set to hip‑hop beats, and reads
    contemporary fiction by Angie Thomas and Celeste Ng.
  travel: Latoya Mcghee enjoys weekend road trips to St. Louis for barbecue, dreams of a culinary pilgrimage to New Orleans, and plans a future spring break in Paris to sample patisseries while staying
    within her modest travel budget.
  culinary: Latoya Mcghee expertly cooks classic collard greens, fried chicken, and sweet potato pie, and experiments by adding smoked paprika to mac and cheese and kimchi to cornbread, using fresh herbs
    from her backyard garden.
  core: Latoya Mcghee blends practical budgeting, soulful cooking, and community‑centered energy into a vibrant life that balances curiosity with reliable responsibility, even if occasional kitchen gadget
    splurges betray her thrift.
background:
  cultural: Latoya grew up in Harvey, Illinois, within a close‑knit African American community shaped by strong church ties, family solidarity, and a rich tradition of soul food and gospel music. Her upbringing
    reflects the Midwestern Black experience, where community events, neighborhood block parties, and church gatherings serve as cultural anchors. These influences have instilled in her a deep appreciation
    for collective wellbeing, storytelling through food, and the resilience of her cultural heritage.
attributes:
  skills: '[''Household management'', ''Budgeting'', ''Childcare'', ''Community event coordination'', ''Basic digital literacy (email, social media)'', ''Cooking (southern and soul food)'', ''Interpersonal
    communication'', ''Conflict resolution'', ''Time management'', ''Volunteer coordination'']'
  hobbies: '[''Cooking'', ''Church choir participation'', ''Dance classes'', ''Group fitness (Zumba)'', ''Gardening'', ''Reading contemporary fiction'', ''Quilting'', ''Potluck organizing'', ''Volunteer
    work'']'
  career_goals: Latoya aims to transform her practical skills into a small home‑based catering business that highlights traditional Black cuisine, while pursuing a GED and eventually enrolling in community
    college courses related to hospitality or social services. She aspires to become a community liaison or health worker in Cook County, using her organizational and people‑skills to support local families
    and youth programs. Long‑term, she hopes to lead a neighborhood resource center that offers workshops on budgeting, nutrition, and digital literacy.
