personas:
  professional: Iris Gibbs, a 29‑year‑old vocalist‑songwriter and indie musician, pairs soulful R&B and pop vocals with meticulous production planning—handling piano‑driven arrangements, DIY lighting cues,
    and tight budget spreadsheets—while their competitive streak fuels a relentless pursuit of gigs and strategic collaborations.
  sports: Iris Gibbs energizes their week with high‑intensity spin classes at a downtown studio and freestyle hip‑hop dance sessions at the community center, while cheering the Toledo Mud Hens in spring
    baseball, following the Cleveland Browns during football season, and occasionally joining a local recreational basketball league inspired by the Detroit Pistons’ style of play.
  arts: Iris Gibbs draws daily inspiration from the lyrical storytelling of Kendrick Lamar and the vocal nuance of H.E.R., regularly attends installations at the Toledo Museum of Art—including the recent
    Kehinde Wiley retrospective—and frequents indie film screenings featuring director Barry Jenkins, all of which feed their songwriting and performance aesthetics.
  travel: Iris Gibbs plans trips on a meticulous spreadsheet, balancing modest budgets with a craving for musical immersion, so they schedule weekend road trips to Nashville’s songwriting workshops, a soulful
    culinary pilgrimage to New Orleans for gumbo, and a scheduled tour stop in Chicago’s indie venues, while dreaming of an extended safari in Tanzania for a creative reset.
  culinary: Iris Gibbs indulges in intermediate‑level cooking, mastering Southern‑inspired gumbo with okra, smoked Andouille sausage, and fresh thyme harvested from their balcony herb garden, perfecting
    collard greens seasoned with smoked paprika, and regularly hosts potluck nights where friends share dishes like fried catfish and sweet potato pie, while they habitually finish a bowl of leftover cornbread
    with extra butter before bed.
  core: Iris Gibbs is a disciplined yet outgoing 29‑year‑old indie vocalist who channels competitive ambition into soulful songwriting, balances meticulous budgets with spontaneous kitchen experiments,
    and occasionally forgets to floss after late‑night gigs.
background:
  cultural: Iris grew up in Toledo’s historically Black neighborhoods, where church gospel choirs and community festivals shaped her early musical exposure. Her grandparents migrated north during the Great
    Migration, bringing Southern culinary traditions and stories that enrich her family’s cultural tapestry. The blend of Midwestern pragmatism and African‑American artistic heritage is evident in her disciplined
    approach to music and her reverence for soulful expression. She participates in the annual Toledo Black Arts Festival, celebrates Juneteenth with communal gatherings, and draws inspiration from local
    legends of blues and Motown that once resonated through the region’s radio waves. Her bachelor's degree in arts and humanities deepened her appreciation for Black literature, history, and visual arts,
    fueling a holistic perspective that informs both her creative work and community involvement.
attributes:
  skills: '["Vocal performance (R&B, soul, pop)", "Piano proficiency", "Basic guitar chords", "Songwriting", "Music arrangement for small ensembles", "Live performance production (stage setup, lighting,
    setlist planning)", "Project management (rehearsal scheduling, budgeting, logistics)", "Social media marketing and brand development", "Audio engineering basics (recording, mixing, DAW operation)",
    "Community workshop facilitation", "Public speaking and audience engagement"]'
  hobbies: '["Hip‑hop dance", "Spin classes", "Soul food cooking", "Reading contemporary African‑American literature", "Music mentorship volunteering", "Concert photography", "Visiting art museums", "Attending
    live music venues", "Yoga", "Balcony herb gardening", "Journaling"]'
  career_goals: Iris aims to release a polished debut EP within the next two years and secure an indie label partnership that respects artistic autonomy. She envisions a Midwest touring circuit—including
    stops in Cleveland, Chicago, Detroit, and her hometown Toledo—followed by a broader national tour. Parallel to her performing career, she plans to launch a community‑based music mentorship program for
    at‑risk youth in Toledo by 2026, providing free workshops in songwriting, production, and performance. To sustain her career, she seeks to diversify income through streaming royalties, live gigs, music
    licensing, and teaching. Iris is also pursuing a certificate in music business to sharpen her entrepreneurial skills and hopes to collaborate with artists across genres to expand her creative palette.
    Long‑term, she aspires to become a recognized voice for empowerment of Black women in the music industry and perhaps author a memoir that intertwines her artistic journey with cultural reflection.
