personas:
  professional: Stanley Colletti is an aspiring technologist who blends competitive gaming expertise with hands‑on hardware tinkering, building custom PCs, coding simple web tools, and programming LEGO
    Mindstorms robots, all while applying his curiosity‑driven yet practical mindset to solve problems and collaborate in team settings.
  sports: Stanley Colletti shoots hoops with the local high school basketball club on weekends, follows the NBA’s Los Angeles Lakers for inspiration, and cycles the nearby Pine Ridge Trail where he mixes
    endurance rides with bike‑maintenance sessions.
  arts: Stanley Colletti curates a personal soundtrack of alternative rock and hip‑hop, favoring artists like Twenty One Pilots, Kendrick Lamar, and Billie Eilish while devouring sci‑fi novels by Isaac
    Asimov and Neal Stephenson, and channels that aesthetic into his video‑editing projects on Adobe Premiere that often remix YouTuber Markiplier’s content.
  travel: Stanley Colletti dreams of a tech‑focused trip to Silicon Valley’s Computer History Museum and a cultural pilgrimage to Tokyo’s Akihabara, yet his current travel budget confines him to family
    road‑trip adventures like camping at Yellowstone and weekend visits to the nearby state fair.
  culinary: Stanley Colletti prefers speedy comfort foods such as pepperoni pizza, spicy ramen with extra pork belly, and homemade chicken nuggets, boasting a modest cooking skill that lets him experiment
    with a sizzling garlic‑butter shrimp stir‑fry using soy sauce, chili flakes, and fresh lime.
  core: Stanley Colletti is a hyper‑curious teen who balances a competitive gaming edge with hands‑on tech tinkering, yet can’t resist impulse buys of limited‑edition skins and often forgets to stretch
    after long sessions.
background:
  cultural: Stanley grew up in Davenport, a suburban community in Osceola County, Central Florida. His family’s white, middle‑class background reflects a blend of traditional Southern values and the region’s
    tourist‑driven multicultural vibe. The area’s warm climate and proximity to outdoor spaces have fostered his love of biking and basketball, while the nearby theme parks and tech‑oriented attractions
    have exposed him to entertainment and digital media trends. He was raised in a moderately religious household, likely Protestant, celebrating community events like high‑school football games and local
    fairs. The diversity of the Orlando metropolitan area has given him a pragmatic outlook, appreciating new ideas while staying grounded in familiar, practical approaches.
