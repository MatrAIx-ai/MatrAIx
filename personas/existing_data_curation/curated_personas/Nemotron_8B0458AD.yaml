  career_goals: Looking ahead, Stanley aims to turn his love for technology and gaming into a career. He plans to earn a scholarship to study computer science or software engineering, with a particular
    interest in game development and interactive media. He also hopes to join a high school robotics team and eventually compete in collegiate engineering competitions, using those experiences to build
    a portfolio for a tech internship. In parallel, he dreams of growing a modest YouTube or Twitch channel where he can share his gaming strategies and DIY tech tutorials, eventually turning it into a
    side business. His competitive streak drives him to set concrete milestones, such as completing a full‑stack web project by the end of his senior year and achieving a high rank in at least one e‑sport.
