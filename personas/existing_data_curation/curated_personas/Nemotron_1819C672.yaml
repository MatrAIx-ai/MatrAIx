  career_goals: Gitty aspires to advance to a district‑level Director of Early Childhood Education within Cumberland County, where she can shape policy, expand high‑quality childcare access, and champion
    equity for underserved families. She plans to earn a master’s degree in Educational Leadership to deepen her strategic expertise. Long‑term, she hopes to launch a nonprofit that provides structured,
    affordable preschool programs for military families and low‑income households, leveraging her business background to secure sustainable funding and create replicable models of excellence.
