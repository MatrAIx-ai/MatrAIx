personas:
  professional: Gitty Nichols, a 43‑year‑old program manager and aspiring district director in early childhood education, applies their business acumen, meticulous budgeting, and grant‑writing expertise
    to streamline compliance and staff development while championing equity with a calm, methodical approach.
  sports: Gitty Nichols, a regular participant in the Cape Fear River Trail walking group and occasional member of a local yoga studio, roots for the Carolina Panthers, cheers on the Carolina Hurricanes,
    and belongs to the Fayetteville Runners Club for weekend 5 k runs, all while maintaining a methodical schedule that slots 30 minutes of cardio three times a week.
  arts: Gitty Nichols, an avid reader of historical fiction by authors such as Hilary Mantel and Ken Follett, frequently attends performances by the Cape Fear Community Theatre, finds inspiration in the
    soulful records of Aretha Franklin and Gregory Porter, and weaves these artistic encounters into their knitting designs for community donations.
  travel: Gitty Nichols, who prefers thoughtfully planned getaways over spontaneous trips, enjoys weekend excursions to Asheville’s Blue Ridge Mountains and historic Savannah, Georgia, has visited Edinburgh
    for its literary festival, and dreams of strolling the gardens of Versailles while balancing travel costs with a dedicated vacation savings fund.
  culinary: Gitty Nichols, a confident home cook, blends Southern comfort staples like shrimp and grits and collard greens with African‑inspired spices such as smoked paprika and berbere, harvests fresh
    herbs from their organized garden to flavor dishes like sweet‑potato bisque, and treats weekly dinner parties as opportunities to share their signature peach cobbler with friends.
  core: Gitty Nichols, a 43‑year‑old who merges meticulous organization with calm resilience, can recall every grant deadline weeks ahead, keeps a garden calendar down to the day, and still finds time for
    spontaneous knitting circles where they share patterns with neighbors.
background:
  cultural: Gitty identifies as a Black woman raised in the American South, with deep ties to the African‑American community of Fayetteville and the broader cultural fabric of North Carolina. Her upbringing
    was shaped by the strong communal values of church life, family gatherings, and respect for elders, as well as the diverse influences of the nearby Fort Bragg military presence. She draws on the resilience
    and solidarity that characterize the local Black heritage, celebrating traditions through food, music, and community service. This cultural foundation informs her commitment to equity in education,
    her collaborative leadership style, and her appreciation for both Southern hospitality and the broader African diaspora.
