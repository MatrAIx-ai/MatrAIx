  hobbies: '[''Soccer'', ''Video gaming (shooters and RPGs)'', ''Cooking Mexican cuisine'', ''Listening to regional Mexican and hip‑hop music'', ''Car maintenance'', ''Community volunteering (computer tutoring)'',
    ''Exploring local art and music events'']'
  career_goals: Jose aims to finish his associate’s degree in Information Technology or Business Administration within the next two years. He plans to secure an entry‑level position as a technical support
    specialist or logistics coordinator, roles that offer clear processes and predictable workflows. Over the next five years, he hopes to earn industry certifications such as CompTIA A+, Network+, or a
    Six Sigma Green Belt and progress into a supervisory or project‑lead position where he can blend his practical mindset with his natural ability to coordinate teams. He also envisions giving back to
    the Lubbock community by mentoring younger Hispanic students interested in tech or trade careers.
