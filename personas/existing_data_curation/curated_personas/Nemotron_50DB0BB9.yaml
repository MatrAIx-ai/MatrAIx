personas:
  professional: Jose Vazquez is an aspiring technical support specialist who leverages their bilingual fluency, solid computer literacy in Python and Microsoft Office, and calm‑under‑pressure problem‑solving
    while preferring clear, structured workflows yet staying flexible enough to adjust on the fly during busy retail shifts.
  sports: Jose Vazquez energizes Saturdays by joining the Lubbock Lightning Soccer Club for pickup matches, cheers on the Dallas Cowboys on Sundays, and follows the Texas Tech Red Raiders basketball team
    during the winter season, balancing his love for team sports with occasional jogs around Mackenzie Park to stay loose.
  arts: Jose Vazquez blends a soundtrack of regional corridos like Los Tigres del Norte and contemporary hip‑hop from Kendrick Lamar, occasionally attends independent film screenings at the West Texas Cultural
    Center, and shares street‑art murals online that fuse classic mural motifs with modern graffiti.
  travel: Jose Vazquez prefers spontaneous weekend road trips, often packing a cooler of homemade tamales and heading north to Carlsbad Caverns or south toward his grandparents’ hometown for a family reunion,
    yet they also dream of a backpacking adventure through the highlands of Peru's Andes when finances allow.
  culinary: Jose Vazquez is a confident home‑cook who masters tacos al pastor using pineapple‑marinated pork, achiote, and fresh cilantro, experiments with mole negro on chicken, frequently adds a dash
    of smoked chipotle to crisp up homemade corn tortillas, and loves grabbing tacos from the local taquería on Friday nights.
  core: Jose Vazquez, an 18‑year‑old bilingual tech‑enthusiast, blends structured ambition with a laid‑back streak, juggling part‑time work, soccer, cooking, and fast‑paced video games while never quite
    mastering meticulous budgeting.
background:
  cultural: Jose grew up in a bilingual household in Lubbock, Texas, where his parents emigrated from central Mexico. His upbringing blends Mexican traditions—celebrating Día de los Muertos, sharing homemade
    tamales during holidays, and speaking Spanish at home—with the broader Texan culture of community festivals, high school football, and country music. He identifies strongly with his Mexican heritage,
    maintaining close ties to extended family and the local Hispanic community, while also feeling at home in the multicultural environment of Lubbock. This dual cultural lens shapes his values of family
    loyalty, respect for elders, and a practical work ethic.
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Microsoft Office Suite'', ''Basic Python programming'', ''Customer service'', ''Automotive maintenance'', ''Team collaboration'', ''Problem solving'', ''Flexible
