personas:
  professional: Heather Gonzalez, a 34‑year‑old landscape architect, blends advanced GIS mapping, Python‑driven water‑use modeling, and masterful AutoCAD and Rhino 3D design skills with a vivid imagination
    and methodical project‑management style, turning native‑plant ecology into award‑winning public spaces while fiercely chasing competition wins and steering multidisciplinary teams with confident, client‑focused
    communication.
  sports: Heather Gonzalez, a 34‑year‑old avid outdoorsperson, hits the Natchez Trace Trail each weekend with the local River Runners running club, practices yoga twice weekly at the community studio, and
    avidly supports the Mississippi State Bulldogs football team, balancing a disciplined training regimen with occasional missed sessions when design deadlines loom.
  arts: Heather Gonzalez, a 34‑year‑old creative soul, spends evenings watercolor‑painting wetland flora inspired by Georgia O’Keeffe, captures bird silhouettes with a Nikon DSLR in homage to Ansel Adams,
    and attends local music festivals where they rave to St. Vincent and Mississippi Delta blues legends, infusing those artistic experiences into bold landscape concepts.
  travel: Heather Gonzalez, a 34‑year‑old explorer, prefers road‑tripping along the Natchez Trace and weekend getaways to coastal Charleston for seafood and historic tours, while dreaming of a trek through
    Patagonia’s glaciers, balancing travel planning with a tight project schedule and a modest travel budget that they stretch by couch‑surfing with friends.
  culinary: Heather Gonzalez, a 34‑year‑old culinary enthusiast, blends Southern staples like shrimp‑and‑grits and fried green tomatoes with experimental flavor pairings—such as Meyer lemon‑infused barbecue
    glaze and Thai basil‑scented collard greens—while hosting communal dinners, though they sometimes over‑season dishes in moments of stress, relying on their trusty cast‑iron skillet and fresh okra to
    salvage the meals.
  core: Heather Gonzalez, a 34‑year‑old landscape architect, channels relentless curiosity and a competitive streak into sustainable design, yet their chronic worry fuels late‑night budgeting, occasional
    overspicing, and a habit of double‑booking social events to keep the creative energy flowing.
background:
  cultural: Heather grew up in the small town of Crenshaw, Mississippi, a close‑knit community steeped in Southern hospitality and a deep connection to the land. Her family, of Anglo‑White heritage, has
    lived in the Delta region for generations, and their values reflect a blend of traditional Southern customs—church attendance, family gatherings, and respect for local agrarian traditions—with an emphasis
    on education and self‑reliance. This background instilled in Heather an appreciation for the region’s natural ecosystems, from pine savannas to river floodplains, which now informs her design sensibility.
    While she embraces the region’s cultural norms, she also encourages progressive ideas, promoting sustainability and inclusive community spaces. Her exposure to the cultural tapestry of the Mississippi
    Delta, including the music, storytelling, and communal stewardship of the environment, shapes her identity as both a steward of the local landscape and a bridge between tradition and innovative design.
