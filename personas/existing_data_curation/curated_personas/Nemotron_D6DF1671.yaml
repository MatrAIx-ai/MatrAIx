  hobbies: '[''Watercolor painting'', ''Sketching'', ''Hiking'', ''Birdwatching'', ''Photography'', ''Community gardening'', ''Cooking Southern cuisine with experimental twists'', ''Yoga'', ''Trail running'',
    ''Attending local music festivals'', ''Participating in design competitions'']'
  career_goals: Heather aims to become a principal designer at her regional firm, eventually launching a boutique practice that specializes in climate‑resilient, community‑driven landscapes across the Mississippi
    Delta. She aspires to earn national recognition through award‑winning projects that showcase sustainable water‑management and native‑plant integration. Long‑term, she hopes to influence regional land‑use
    policies, publish research on innovative design methodologies, and mentor emerging women engineers and designers in STEM fields. Her competitive drive fuels a desire to win major design competitions
    and to secure commissions for high‑profile public spaces, such as riverfront parks and civic plazas that reflect the cultural identity of rural Mississippi.
