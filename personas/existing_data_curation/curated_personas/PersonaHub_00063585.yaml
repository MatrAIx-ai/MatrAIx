persona_description: A school administrator responsible for ensuring that homeless children and youth within the Savannah-Chatham County Public School System receive a free, appropriate public education.
  This individual is dedicated to providing equal access to education for these students, recognizing the unique challenges they face due to their homelessness. They are knowledgeable about the McKinney-Vento
  Homeless Education Act and its provisions, and are skilled in working with local educational agencies to ensure that these students receive the necessary support to succeed in school.
