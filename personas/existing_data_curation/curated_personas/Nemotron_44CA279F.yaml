    ''Cooking seasonal Pacific Northwest recipes'']'
  career_goals: Cameron’s primary career goal is to move from an HR assistant role to a full‑cycle HR Generalist within the next two years, supported by earning the SHRM‑CP certification. He aims to deepen
    his expertise in HR analytics and strategic workforce planning, positioning himself for a future HR Manager position where he can lead employee‑experience initiatives that integrate arts and community
    engagement. He also seeks to mentor junior HR staff, develop a company‑wide wellness and cultural enrichment program, and complete an associate degree in business administration to strengthen his organizational
    knowledge.
