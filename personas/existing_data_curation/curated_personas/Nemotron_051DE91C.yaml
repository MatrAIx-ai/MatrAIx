  career_goals: Juan aims to complete his secondary education through a GED program and then enroll in a community college to study mechanical engineering or computer science. He is driven by the desire
    to design affordable, user‑friendly technology that can serve bilingual households in his community. In the short term, he hopes to start a small side venture repairing and customizing computers for
    friends and neighbors, gaining real‑world experience while supporting his family. Long‑term, Juan envisions creating educational software that integrates Spanish and English learning, bridging his technical
    interests with his cultural heritage. He also aspires to be a mentor for younger students in after‑school STEM programs, encouraging them to explore technology while staying grounded in practical applications.
