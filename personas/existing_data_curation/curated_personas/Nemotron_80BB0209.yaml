personas:
  professional: Torie Godbolt, a veteran surveillance specialist at a regional casino complex, leverages their meticulous video monitoring, threat assessment, and conflict de‑escalation expertise while
    infusing their curiosity for new ideas and community‑centric values into training programs that empower security staff and promote culturally aware safety practices.
  sports: Torie Godbolt stays active through early‑morning yoga sessions, weekend nature walks with the Englishtown senior fitness club, and follows the New York Yankees, New Jersey Devils, and Philadelphia
    Eagles, while occasionally joining a local bridge league that doubles as a strategic game night with friends.
  arts: Torie Godbolt, a dedicated member of the Englishtown community‑theatre troupe, regularly attends performances of the New York City Ballet and jazz concerts featuring the music of Nina Simone and
    John Coltrane, draws inspiration from the literary works of Toni Morrison and Maya Angelou, and curates monthly art‑mentor sessions that showcase emerging local painters.
  travel: Torie Godbolt plans trips with a blend of careful budgeting and spontaneous curiosity, preferring cultural festivals such as the New Orleans Jazz & Heritage Festival and Savannah’s historic storytelling
    events, while also cherishing leisurely visits to Italy’s art‑rich cities like Florence and the Caribbean islands of Jamaica for their vibrant music and cuisine, all balanced against a modest retirement
    income.
  culinary: Torie Godbolt, an enthusiastic home cook with an intermediate skill set, delights in crafting gumbo with okra, Andouille sausage, and crawfish, experimenting with spice blends for jambalaya,
    and often prepares fresh salsa with tomatoes, jalapeños, and cilantro for neighborhood gatherings, while also savoring upscale dining experiences that feature dishes like rosemary‑infused lamb chops
    and lemon‑butter risotto.
  core: Torie Godbolt blends razor‑sharp surveillance expertise with a lifelong love of art and community, juggling a disciplined budget and health regimen while habitually collecting quirky vintage art
    postcards and occasionally over‑indulging in late‑night bridge marathons.
background:
  cultural: Torie is a second‑generation African American whose grandparents migrated from the American South during the Great Migration, settling in New Jersey. Growing up in a close‑knit Black community,
    she was immersed in church life, gospel music, and the rich storytelling tradition of African American history. This heritage instilled a deep sense of resilience, family loyalty, and a commitment to
    social uplift. Living in Englishtown, she engages with the broader Mid‑Atlantic Black cultural scene, attending cultural festivals, supporting local Black artists, and mentoring youth. Her cultural
    identity informs her professional ethos, emphasizing inclusion, community safety, and the celebration of diverse perspectives.
attributes:
  skills: '[''CCTV monitoring and video analytics'', ''Threat assessment and risk mitigation'', ''Incident reporting and documentation'', ''Conflict de‑escalation'', ''Crowd management'', ''First aid and
    emergency response'', ''Security protocol development'', ''Training and mentorship for security personnel'', ''Curriculum design for adult education'', ''Public speaking and communication'', ''Team
    leadership and coordination'', ''Data analysis and pattern recognition'', ''Knowledge of gaming regulations'', ''Cultural competency and community engagement'']'
  hobbies: '[''Visiting art museums and galleries'', ''Attending live theatre and music performances'', ''Community theatre involvement'', ''Reading African American literature and contemporary fiction'',
    ''Traveling to cultural festivals'', ''Playing bridge and social poker'', ''Gardening and horticulture'', ''Yoga and mindfulness practice'', ''Volunteering as an art education mentor'', ''Dancing (salsa/line
    dancing)'', ''Cooking diverse cuisines'', ''Walking and nature hikes'']'
  career_goals: Torie aims to advance to a senior surveillance supervisor role, overseeing multiple casino sites while obtaining professional certifications such as the Certified Protection Professional
    (CPP) and Certified Surveillance Officer (CSO). She aspires to create a comprehensive training curriculum that blends security best practices with adult‑learning principles, eventually mentoring the
    next generation of security officers. Long‑term, she envisions launching a security consulting boutique that advises hospitality venues on integrating safety measures with customer experience, and she
    hopes to champion community‑based safety initiatives that incorporate local art and cultural awareness.
