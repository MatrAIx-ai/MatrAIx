personas:
  professional: Harriet Thurman, a seasoned interior painter and paperhanger in Columbus, leverages a meticulous eye for color theory and eco‑friendly finishes to craft bespoke murals for upscale clients
    while rigorously budgeting projects and nurturing a growing boutique brand.
  sports: Harriet Thurman enjoys low‑impact fitness, joining the Columbus Community Center’s indoor walking group in spring, cheering on the Columbus Crew SC during soccer season, and occasionally playing
    friendly doubles tennis at the local club, all while maintaining a disciplined yet flexible approach to staying active.
  arts: Harriet Thurman frequently visits the Short North Arts District galleries and the Columbus Museum of Art, drawing inspiration from Georgia O'Keeffe’s color palettes, Yayoi Kusama’s immersive installations,
    and contemporary furniture designers like Charles and Ray Eames, which inform their own mural and restoration projects.
  travel: Harriet Thurman prefers curated cultural getaways, having explored the historic streets of Savannah, the artisan markets of Florence, and the serene vineyards of Napa Valley, while they meticulously
    plan itineraries to align with workshop schedules yet leave room for spontaneous art fair discoveries.
  culinary: Harriet Thurman experiments with seasonal cuisine, often preparing roasted beet and goat cheese salads, saffron‑infused risotto, and hand‑kneaded sourdough using fresh herbs like thyme and basil,
    while they enjoy pairing meals with a robust espresso and occasionally over‑season their dishes due to an overactive palate.
  core: Harriet Thurman blends disciplined craftsmanship with a relentless curiosity for color, yet they tend to overthink finances, hoard vintage paint cans, and wrestle with anxiety that shadows their
    creative pursuits.
background:
  cultural: Harriet was born and raised in the heart of central Ohio, a region marked by Midwestern pragmatism, modesty, and a strong work ethic. Growing up in a predominantly white, small‑town environment,
    she internalized values of self‑reliance and community responsibility, while also developing an appreciation for the region’s agricultural heritage and folk craftsmanship. Her family’s cultural foundation
    blends traditional Protestant values with a respect for hands‑on trades, shaping her disciplined yet curious nature. Living in Franklin, Montgomery County—a community that balances suburban growth with
    a close‑knit local arts scene—has exposed her to a modest yet vibrant culture of artisans and small‑scale galleries. This backdrop informs Harriet’s aesthetic sensibility, encouraging a blend of functional
    design and subtle artistic expression that honors both her Midwestern roots and her personal drive for artistic exploration.
