  career_goals: Harriet aspires to grow her own boutique painting and paper‑hanging business into a recognized brand within the Columbus metropolitan area, specializing in bespoke mural work and premium
    sustainable finishes for upscale residential and boutique commercial spaces. She aims to earn certification in historic building restoration, expanding her service portfolio to include preservation
    projects. Long‑term, Harriet envisions publishing a guide on sustainable painting practices and leading intimate workshops for a select circle of fellow craftsmen, while mentoring a small group of apprentices
    to ensure her high standards continue beyond her own hands. Financial stability, creative autonomy, and local reputation drive her ambition.
