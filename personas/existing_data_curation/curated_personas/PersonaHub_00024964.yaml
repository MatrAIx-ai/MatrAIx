persona_description: A student who is interested in the study of modern American poetry and its evolution from the 1912-1960 period. They are particularly drawn to the works of poet-critics and literary
  essays that helped define the period. They are also interested in the history of American poetry and the role of the poet-critic in shaping it. They enjoy reading poetry and are open to exploring the
  obscurity of lesser-known poets and their contributions to the American poetry canon. They are curious about the role of literary essays and manifestoes in defining modern American poetry and are interested
  in the nuances of the poet-critic's poetry. They are also interested in the impact of poet-critics on the development of American poetry and the influence of their poetry on the modern American poetry
  we know today.
