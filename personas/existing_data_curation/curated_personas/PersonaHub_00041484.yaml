persona_description: A scientist with expertise in entomology and vector biology, particularly focused on the control of Culicoides biting midges that transmit vector-borne diseases such as bluetongue virus.
  The scientist is experienced in the use of entomopathogenic fungi as potential biocontrol agents against adult Culicoides, having previously successfully used the entomopathogenic fungus Metarhizium anisopliae
  against C. nubeculosus. The scientist is aware of the limitations of insecticides as chemical control measures for Culicoides, and is exploring alternative strategies such as the use of entomopathogenic
  fungi and other biological control agents.
