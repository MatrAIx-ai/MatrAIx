personas:
  professional: A community‑focused event strategist, Mary Steffen blends her business degree with a passion for the arts to design and market local festivals, while leveraging her networking flair, grant‑writing
    savvy, and unconventional problem‑solving style to lay groundwork for a future arts‑and‑entrepreneurship hub in Rutland County.
  sports: A trail‑enthusiast and local sports fan, Mary Steffen tackles the Green Mountains every weekend, follows the Vermont Catamounts basketball team and the Boston Red Sox avidly, and participates
    in a community softball league, balancing competitive spirit with a love for group exercise.
  arts: An avid community‑theater volunteer and painter, Mary Steffen curates a modest collection featuring works by regional folk artists and the occasional Monet print, leads group painting workshops,
    and delights in discovering emerging talent at the Burlington Schedule of Contemporary Art and the Rhode Island Spouting Art Fair.
  travel: A purposeful art‑focused traveler, Mary Steffen has trekked to the Venice Biennale, wandered the galleries of the Edinburgh Festival Fringe, and toured the local Portland, Maine arts scene, always
    planning trips around exhibition openings while keeping an eye on budget constraints and family commitments.
  culinary: An experimental seasonal cook, Mary Steffen loves preparing maple‑glazed salmon with fresh herbs from her garden, simmering pumpkin soup with a dash of sage, and perfecting her signature beet
    and goat‑cheese salad, often pairing meals with locally sourced Vermont cheese and crisp apple cider.
  core: Mary Steffen blends a competitive edge with a laid‑back love for art, hiking, and community, juggling grant proposals by day and paintbrushes by night, all while occasionally missing a bill payment
    because flexibility trumps rigidity.
background:
  cultural: Mary Kay’s cultural background is rooted in the White, Anglo‑American heritage typical of rural New England. Raised in the small‑town environment of Vermont, she internalized the region’s emphasis
    on self‑reliance, community stewardship, and a deep appreciation for the natural landscape. Family traditions of seasonal farming, harvest festivals, and town meetings have shaped her sense of civic
    responsibility, while her exposure to the local arts scene has nurtured an openness to diverse creative influences.
