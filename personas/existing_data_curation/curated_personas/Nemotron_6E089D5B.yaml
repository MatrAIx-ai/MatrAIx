  hobbies: '["Hiking", "Group painting workshops", "Community theater", "Trivia competitions", "Art collecting", "Volunteer art programs", "Gardening", "Seasonal cooking", "Book club", "Board gaming", "Local
    music festivals", "Traveling to art fairs"]'
  career_goals: Mary Kay aspires to channel her business acumen and artistic passion into launching a community‑driven arts and entrepreneurship hub in Rutland County. She aims to mentor emerging local
    creators, secure grant funding for sustainable arts projects, and eventually author a guide on integrating creative thinking into small‑business strategy. Additionally, she hopes to serve on the board
    of the Florence Historical Society, contribute to local heritage preservation, and travel to regional and international art festivals to bring fresh ideas back to her community.
