  career_goals: Maria dreams of a future where she can help other children learn and stay safe. She is interested in becoming a teacher or a pediatric nurse, valuing the chance to combine her love for structure
    and her compassionate nature. In the short term, she wants to earn more Girl Scout badges that focus on community service and health, and she hopes to volunteer at the local library to develop leadership
    skills.
