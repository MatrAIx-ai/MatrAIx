persona_description: A veterinarian who is interested in equine medicine and research, particularly in the field of placental infections. They are looking for information on the causes, symptoms, and treatments
  of these infections in horses and are interested in learning about the differences between human and equine uterus reactions to bacterial infection. They are also interested in learning about the warning
  signs of uterine infection and the importance of collecting the placenta after delivery for examination by a veterinarian.
