personas:
  professional: Angelica Narvaez, a 30-year-old sewing machine operator at a fast-paced garment factory, leverages her methodical precision, bilingual communication, and calm resilience to maintain flawless
    stitch quality, streamline inventory, and mentor teammates as she prepares for a supervisory role.
  sports: Angelica Narvaez, an avid participant in sunrise group fitness classes and a member of the San Marcos Trailblazers hiking club, roots for the San Diego Padres and Los Angeles Rams while maintaining
    a disciplined weekly routine of coastal trail runs and Saturday salsa-styled cardio sessions.
  arts: Angelica Narvaez channels her creative energy through weekly salsa and folklorico lessons, embroidery projects inspired by Frida Kahlo and traditional motifs, and a deep appreciation for the music
    of Carlos Santana and Celia Cruz, often attending performances at the San Diego Civic Theatre.
  travel: Angelica Narvaez plans her travel with detailed itineraries, allocating savings for yearly trips to Oaxaca's Day of the Dead celebrations and weekend getaways to the coastal cliffs of Big Sur,
    while also dreaming of exploring the historic streets of Barcelona during a future sabbatical.
  culinary: Angelica Narvaez, an accomplished home cook, perfects mole poblano with ancho chilies and chocolate, rolls hand-made tamales filled with pork and masa, and experiments with fresh epazote and
    roasted corn in creative chilaquiles, often sharing her culinary creations at community potlucks.
  core: Angelica Narvaez balances a warm, community-focused spirit with a compulsive need to double-check every stitch and spreadsheet, often staying up late to perfect both her embroidery patterns and
    her meticulous budget.
background:
  cultural: Angelica comes from a Mexican family that has settled in San Marcos, California. She grew up bilingual, speaking Spanish at home and English at school, and she maintains strong ties to Mexican
    traditions such as Día de los Muertos, quinceañeras, and weekly family meals featuring homemade tamales and mole. Her Catholic upbringing instilled a sense of community service and respect for elders.
    The blend of Mexican work ethic—practical, hard‑working, and family‑centered—with the multicultural environment of San Diego County shapes her outlook, fostering resilience, organization, and a warm,
    outgoing demeanor that she brings to both her professional and personal life.
attributes:
