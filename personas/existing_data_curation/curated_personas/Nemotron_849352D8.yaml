  hobbies: '[''Salsa dancing'', ''Folklorico dance'', ''Community potluck gatherings'', ''Teaching sewing workshops'', ''Cooking Mexican cuisine'', ''Hiking coastal trails'', ''Group fitness classes'',
    ''Embroidery and craft projects'']'
  career_goals: Angelica plans to move into a supervisory role within her current manufacturing plant, where she can lead a team of operators and streamline production processes. She intends to earn a certified
    garment construction credential and expand her skill set in computer‑aided design (CAD) for apparel. Long‑term, she aspires to start a home‑based tailoring and alteration business that incorporates
    traditional Mexican embroidery, providing stable income for her family while preserving cultural heritage. She also hopes to mentor new employees and contribute to community vocational training programs.
