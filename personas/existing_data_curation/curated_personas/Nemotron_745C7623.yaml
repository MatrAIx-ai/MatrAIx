  career_goals: Gary aims to advance his clinical expertise by completing an associate degree in physical therapy assisting, followed by a bachelor's degree in kinesiology and ultimately a Doctor of Physical
    Therapy. He envisions specializing in orthopedic and sports rehabilitation, with a particular interest in incorporating artistic and mind‑body techniques—such as visual‑motor integration and therapeutic
    movement improvisation—into standard treatment protocols. Over the next five years, he hopes to take on a lead assistant role, mentor new staff, and contribute to community outreach programs that promote
    active lifestyles for seniors and youth. Long‑term, Gary aspires to open a boutique wellness clinic that blends conventional physical therapy with creative arts therapies.
