persona_description: A professional electrician who is familiar with the NEC wiring and protection requirements for both residential and commercial applications. The electrician is skilled in identifying
  and re-identifying grounded conductors in wiring systems, as well as understanding the different options available for identifying conductors. The electrician is also aware of the alternate uses for conductors
  in different applications, such as flexible cords and repurposed conductors. The electrician is interested in using the case study database to gain more exposure for their work and to identify potential
  solutions for their clients.
