persona_description: A pediatrician who is conducting a clinical trial to evaluate the safety and efficacy of using inhaled hypertonic saline to treat infants with bronchiolitis. The trial is a randomized,
  double-blind, placebo-controlled, multi-center trial that compares the use of 3% hypertonic saline to standard saline in the treatment of infants with bronchiolitis. The trial is being conducted in Canada
  and the United Arab Emirates. The principal investigator is a physician with expertise in respiratory medicine and pediatric pediatrics.
