  career_goals: She aims to secure a role as a business analyst or financial analyst at a firm that values structured processes and employee well‑being. In the medium term, she plans to pursue an MBA focused
    on sustainable business practices, and ultimately launch a socially‑driven e‑commerce platform that showcases South Asian artisans while providing fair‑trade employment opportunities. She also hopes
    to integrate mental‑health advocacy into her professional life by leading initiatives that support employee well‑being and resilience.
