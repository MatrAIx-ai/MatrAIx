personas:
  professional: Lasya Welborn is an aspiring business analyst who leverages strong financial modeling, Excel and Tableau expertise, and meticulous project planning to deliver data‑driven insights, while
    their organized, methodical nature and reserved independence allow them to thrive in solo research and concise report writing, balancing curiosity about new market trends with a practical, structured
    approach.
  sports: Lasya Welborn enjoys low‑impact fitness, attending weekly yoga classes at Sunrise Yoga Center and participating in small‑group chess meet‑ups at the local library, while they cheer for the New
    York Knicks during basketball season and follow the New York Rangers for hockey, favoring solo or intimate team activities over large crowds.
  arts: Lasya Welborn immerses themselves in indie music, regularly streaming artists like Mitski, Novo Amor, and The National, while also appreciating contemporary novels by Chimamanda Ngozi Adichie and
    listening to entrepreneurship podcasts hosted by Reid Hoffman and Tim Ferriss, finding creative solace in this eclectic cultural mix.
  travel: Lasya Welborn prefers thoughtfully planned, budget‑friendly trips that blend cultural immersion and personal reflection, having visited the historic streets of Kyoto and the bustling markets of
    Marrakech, and they aspire to explore the sustainable design hubs of Copenhagen while balancing student finances and academic commitments.
  culinary: Lasya Welborn enjoys cooking aromatic dishes such as dal makhani, biryani, and samosa, balancing a solid grasp of spices like cumin, coriander, and garam masala with a budding skill set that
    includes mastering the perfect tempering technique, while also appreciating quiet evenings sampling farm‑to‑table vegetarian meals at local bistros.
  core: Lasya Welborn is a methodical, anxiety‑prone 18‑year‑old who couples a love for structured financial analysis with solitary creative outlets, often over‑planning their schedule but occasionally
    succumbing to late‑night stress‑eating and binge‑reading.
background:
  cultural: Lasya is a second‑generation South Asian American, born to immigrant parents from Gujarat, India, who settled in the Greater Houston area. Growing up in Richmond, TX, she was immersed in a bicultural
    environment—English and American educational norms at school, and Gujarati language, customs, and celebrations at home. Family values emphasized academic achievement, respect for elders, and community
    cohesion, which shaped her organized and reliable demeanor. She participates in community events such as Diwali and Navratri at the local cultural association, while also navigating the expectations
    of blending traditional heritage with the individualistic ethos of American society. This dual cultural lens informs her aspirations to bridge business opportunities with cultural preservation.
