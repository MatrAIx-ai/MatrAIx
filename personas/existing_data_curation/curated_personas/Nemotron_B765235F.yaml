personas:
  professional: Amy Butler, a civil engineering intern focused on sustainable coastal infrastructure, leverages their methodical mastery of AutoCAD, Revit, Civil 3D, and GIS to design resilient storm‑water
    systems while they competitively meet project deadlines and rigorously question design assumptions.
  sports: Amy Butler, a dedicated member of the Hoboken Recreational Volleyball League, balances weekly trail hikes in the Pine Barrens and paddle sessions on the Shrewsbury River with cheering on the New
    York Giants and New York Knicks, while they follow a competitive yet methodical training regimen that mirrors their project‑management mindset.
  arts: Amy Butler, who curates a playlist featuring Bon Iver and Kamasi Washington while exploring historic preservation tours and sketching watercolor street scenes in Princeton, finds creative inspiration
    in Banksy’s politically charged murals and the Broadway brilliance of Lin‑Manuel Miranda, and they often attend local theater productions whenever time permits.
  travel: Amy Butler, who meticulously plans low‑budget getaways with spreadsheets, recently trekked the coastal trails of Acadia National Park and wandered the historic streets of Philadelphia, and they
    dream of a field‑study trip to Iceland’s geothermal sites and a volunteer‑guided excursion to Belize’s mangroves.
  culinary: Amy Butler, an adept home cook who loves the precision of sous‑vide salmon and the exact timing needed for homemade ramen broth, frequently experiments with ingredients like miso, fresh basil,
    and smoked paprika, and they treat themselves to weekly brunches featuring avocado toast with a perfectly poached egg at a local café.
  core: Amy Butler, a methodical civil‑engineering enthusiast with a competitive edge, balances meticulous project planning with spontaneous hikes and a secret obsession for puzzle‑solving, while they occasionally
    procrastinate on dentist appointments and indulge in late‑night coffee.
background:
  cultural: Amy was raised in a middle‑class suburban family in Englishtown, New Jersey. Her parents, of Irish‑German ancestry, emphasized a strong work ethic, education, and community involvement. Growing
    up on the East Coast, she absorbed the pragmatic, forward‑looking values of the Northeastern United States while also appreciating local traditions such as annual county fairs and volunteer civic events.
    Her cultural upbringing blends a respect for American individualism with a commitment to public service, which informs her passion for civil engineering projects that improve local infrastructure and
    resilience. The suburban environment fostered her love for outdoor recreation and her participation in community volunteer groups.
attributes:
  skills: '["Structural analysis", "AutoCAD", "Revit", "Civil 3D", "GIS mapping", "Python", "MATLAB", "Project management", "Budgeting", "Construction documentation", "New Jersey building codes", "LEED
    certification", "Storm‑water management design", "Site development"]'
  hobbies: '["Hiking in the Pine Barrens", "Kayaking the Shrewsbury River", "Yoga and meditation", "Volunteer community garden work", "Habitat for Humanity construction projects", "Puzzle solving (e.g.,
    logic puzzles, escape rooms)", "Engineering hackathons", "Cooking experimental recipes", "Recreational volleyball", "Historic preservation tours"]'
  career_goals: Amy aims to become a licensed Professional Engineer (PE) within the next four years, specializing in resilient coastal infrastructure. She envisions leading multidisciplinary teams on large‑scale
    transportation and water‑resource projects that address climate‑change impacts in New Jersey. In the longer term, she hopes to earn a master's degree in Engineering Management and transition into a
    senior project manager role, influencing policy on sustainable design. She also aspires to mentor young women in STEM and champion diversity within her firm.
