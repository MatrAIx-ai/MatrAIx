persona_description: An historian who is interested in the early development of the English language and the history of the British Isles between the time of the Romans and the Norman Conquest. They are
  familiar with the Anglo-Saxon Chronicle, which is significant for its treatment of this period and as an essential source for the early development of the English language. They are also interested in
  the biases of the authors and the differences between different versions of the Chronicle. They are likely to be interested in comparing the entries from different versions of the Chronicle and considering
  the biases of the authors.
