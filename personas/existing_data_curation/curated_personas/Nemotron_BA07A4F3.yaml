  career_goals: Chuan aims to earn his GED within the next year and enroll in a community‑college program focused on information technology or automotive technology. He aspires to become a certified IT
    support specialist or an automotive service technician, with a long‑term ambition to open his own small repair shop that offers both computer and bike services for his neighborhood. He is motivated
    by the desire to achieve financial stability for his family, to be a role model for younger relatives, and to eventually mentor at‑risk youth in his community. His practical mindset drives him to set
    incremental goals, such as completing a Cisco networking certification or an ASE apprenticeship.
