persona_description: A scientist with a passion for infectious diseases and their emergence, particularly in tropical developing regions. They have expertise in mapping hotspots of disease emergence and
  have studied the relationship between human settlement and disease transmission, particularly in the context of deforestation and land use change. They have a deep understanding of the role of wildlife
  in maintaining infectious diseases and have conducted research on the transmission of diseases such as Ebola and Lyme disease. They are also knowledgeable about the ecological changes that occur in tropical
  rainforests and the impact of large-scale infrastructure projects, such as dams, on vector-borne diseases.
