persona_description: A marine biologist who specializes in the study of invertebrates, particularly the jellyfish and comb jellies. Her research interests include the biology, ecology, and evolution of
  these species, as well as their role in the marine ecosystem and their potential impact on local fisheries. She is known for her work on the invasive nature of the warty comb jelly, Mnemiopsis leidyi,
  and for her studies on the strategies used by these species to survive harsh conditions. She is also interested in the broader implications of climate change on the invasion and survival of invasive species.
