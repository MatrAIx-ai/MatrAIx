  career_goals: Over the next five years Donnie aims to step into a senior leadership role—such as Director of Business Performance or VP of Operations—where he can steer organization‑wide transformation
    initiatives. He plans to deepen his expertise in data‑driven decision‑making by earning a PMP certification and pursuing an MBA focused on strategic management. Mentoring junior analysts and fostering
    an inclusive, collaborative culture are also top priorities. In the longer term, Donnie envisions launching a boutique consulting firm that helps mid‑size Texas companies streamline processes and adopt
    flexible, yet structured, growth strategies.
