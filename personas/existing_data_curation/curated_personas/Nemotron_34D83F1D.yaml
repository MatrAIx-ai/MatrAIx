  hobbies: '[''Abstract painting'', ''Sketching'', ''Reading speculative fiction'', ''Philosophy'', ''Cooking Salvadoran cuisine'', ''Yoga'', ''Mindfulness meditation'', ''Indoor gardening'', ''Volunteering
    at community art workshops'', ''Attending intimate poetry readings'']'
  career_goals: Rosa aims to advance to a senior project manager or director of a Project Management Office within an organization that marries technology, arts, and community impact in the Bay Area. Over
    the next two years she plans to earn PMP and Agile Certified Practitioner credentials, lead large‑scale cultural revitalization projects, and mentor emerging project managers, especially those from
    underrepresented backgrounds. Long‑term, she envisions launching a community‑driven program that supports Salvadoran immigrant entrepreneurs in Oakland, leveraging her project expertise and cultural
    fluency to create sustainable economic opportunities.
