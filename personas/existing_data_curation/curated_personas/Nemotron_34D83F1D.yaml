personas:
  professional: Rosa Maldonado, a Bay Area senior project manager specializing in tech‑driven cultural revitalization projects, blends meticulous agile and waterfall planning with a flair for narrative
    design, using tools like Jira, Tableau and bilingual communication to align diverse stakeholders while channeling her vivid imagination into project storytelling.
  sports: Rosa Maldonado enjoys weekend paddle‑boarding on Lake Merced, plays recreational volleyball with a local women’s league, follows the Golden State Warriors, the Oakland Athletics, and the San Francisco
    49ers, and incorporates a disciplined morning run into her routine to offset stress, preferring low‑impact activities that fit her schedule.
  arts: Rosa Maldonado maintains an eclectic creative practice, producing abstract acrylic canvases inspired by Mark Rothko’s color fields, sketching downtown Oakland vistas, curating pop‑up shows at cafés
    featuring emerging local artists, and drawing inspiration from speculative fiction authors such as Ted Chiang and philosophers like Donna Haraway.
  travel: Rosa Maldonado favors meticulously planned cultural trips, having explored the historic streets of Mexico City, the art museums of Lisbon, and the redwoods of Humboldt County, while dreaming of
    a sustainable travel immersion in Kyoto’s tea houses and Patagonia’s glaciers, always balancing adventure with a modest travel budget.
  culinary: Rosa Maldonado proudly prepares pupusas stuffed with queso fresco and loroco, tamales wrapped in corn husks, and experiments with Californian avocado‑lime salsa, showcasing a medium‑level cooking
    skill that blends traditional masa‑based dishes with fresh, locally sourced ingredients.
  core: Rosa Maldonado is an organized, imagination‑driven project manager who channels stress into yoga, art, and careful financial planning while juggling a love for cultural heritage and a tendency to
    over‑worry.
background:
  cultural: Rosa grows up in a Salvadoran immigrant household in the East Bay, where Spanish was the language of daily life and customs such as Día de los Santos, family gatherings, and traditional cuisine
    shaped her upbringing. The rich storytelling, music, and visual art traditions of El Salvador instilled a strong sense of community responsibility and a love for creative expression. Living in Oakland's
    multicultural environment, she blends her Salvadoran heritage with the progressive, diverse culture of the Bay Area, actively participating in local festivals, supporting immigrant advocacy groups,
    and serving as a cultural bridge that brings Salvadoran perspectives into broader community initiatives.
