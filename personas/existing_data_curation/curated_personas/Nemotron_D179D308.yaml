personas:
  professional: Courtney Baughn, a seasoned IT support specialist with CompTIA A+ and ITIL v4 certifications, leverages her methodical troubleshooting expertise, PowerShell and Bash automation, and an artist’s
    eye for design to craft clear documentation and engaging training sessions, while positioning herself for a future IT Service Manager role to shape regional service delivery strategy.
  sports: Courtney Baughn is an avid hiker who joins the Land Between Lakes Trail Crew for weekend treks, plays on a local co‑ed softball league, follows the Louisville Cardinals basketball team and the
    Cincinnati Bengals football club, and incorporates brisk power‑walking sessions into her routine to balance the sedentary demands of her desk job.
  arts: Courtney Baughn channels her imagination into watercolor landscapes of rolling hills and digital illustrations inspired by folk motifs, often citing Andrew Wyeth and contemporary artist Beeple as
    influences, while she unwinds at bluegrass festivals featuring The Infamous Stringdusters and loses herself in speculative fiction by N.K. Jemisin and the narrative depth of The Witcher series.
  travel: Courtney Baughn prefers immersive, moderate‑pacing trips that blend nature and culture, having explored the Great Smoky Mountains, taken a weekend road‑trip to Asheville’s arts district, and dreaming
    of a spring hike through New Zealand’s Tongariro Alpine Crossing, all while budgeting carefully to keep family obligations in check.
  culinary: Courtney Baughn enjoys cooking with fresh herbs like rosemary and lavender, frequently prepares a comfort bowl of buttermilk biscuits with honey‑glazed roasted carrots, experiments with a bourbon‑infused
    chicken glaze for special gatherings, and rates herself a competent home cook who occasionally over‑spices dishes in a quest for bold flavor.
  core: Courtney Baughn blends technical precision with vibrant creativity, worries about every detail yet never lets perfectionism stop them from mentoring seniors, painting hillsides, and planning their
    next mountain escape.
background:
  cultural: Courtney grew up in a small, close-knit community in western Kentucky, where Southern hospitality and Midwestern work ethic are deeply ingrained. Her family traditions include church gatherings,
    Sunday potlucks, and an appreciation for Appalachian folk music and storytelling. Although she identifies as white, she embraces the diverse cultural tapestry of the region, celebrating local festivals
    like the Calloway County Fair and participating in community service projects that reinforce a sense of collective responsibility. Her upbringing in Almo, surrounded by rural landscapes and a strong
    sense of neighborly support, has shaped her compassionate and cooperative worldview.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation & configuration'', ''Network diagnostics'', ''Remote support (TeamViewer, LogMeIn)'', ''PowerShell scripting'', ''Bash scripting'', ''ITIL
    v4 incident management'', ''CompTIA A+ certification'', ''Cybersecurity fundamentals'', ''Technical documentation'', ''User training and education'', ''Creative problem solving'', ''Customer empathy'']'
  hobbies: '[''Watercolour painting'', ''Digital illustration'', ''Reading speculative fiction'', ''Jigsaw puzzles'', ''Book club participation'', ''Volunteer tech mentoring'', ''Hiking'', ''Gardening'',
    ''Attending bluegrass festivals'', ''Group fitness classes'']'
  career_goals: Courtney aims to transition from a front-line support role into a leadership position where she can shape service delivery strategy for a regional organization. She plans to earn the ITIL
    4 Managing Professional designation and a CompTIA Security+ certification within the next two years, positioning herself for a role as IT Service Manager or Support Team Lead. Long-term, she envisions
    establishing a community tech-learning hub in Calloway County that offers workshops on digital creativity, cybersecurity basics, and career pathways for women and seniors. She also hopes to integrate
    her passion for abstract thinking and design by collaborating on user-experience projects that blend functionality with aesthetic appeal.
