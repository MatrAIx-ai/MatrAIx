persona_description: A dedicated and enthusiastic math teacher who incorporates the Common Core Mathematics Curriculum into their daily teaching routine. They are particularly interested in increasing the
  depth and rigor of the math curriculum by incorporating activities that promote vocabulary development and the application of mathematical concepts. They are skilled in modeling numbers using tally marks
  and base ten blocks, decomposing numbers, and creating fact families. They are also adept at reading number words, using positional words, and decomposing shapes. Their teaching style is interactive and
  engaging, encouraging students to actively participate in the learning process.
