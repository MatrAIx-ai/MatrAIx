  career_goals: Julie dreams of becoming a veterinarian because she loves caring for animals and appreciates the routine of feeding, grooming, and health checks. She hopes to attend a high-school science
    program, then study veterinary medicine at university, eventually working in a clinic that serves both pets and wildlife. She also values job stability and the chance to help her community, so she plans
    to excel academically and earn a scholarship to make her goal attainable.
