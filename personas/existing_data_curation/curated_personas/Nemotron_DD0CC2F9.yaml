personas:
  professional: Julie Nestor is an aspiring wildlife biologist who channels their love of detailed desert animal sketches and orderly research habits into systematic nature journals, while their strong
    preference for routine and occasional worry make them diligent yet sometimes hesitant when field trips deviate from the expected plan.
  sports: Julie Nestor enjoys daily bike rides around the neighborhood and weekend dog walks, follows the Arizona Diamondbacks and Phoenix Suns as their favorite professional teams, and participates in
    the local Desert Kids Bike Club where they balance a love of routine training routes with occasional spontaneous park races.
  arts: Julie Nestor channels their love of realistic detail into sketching desert landscapes and dogs while crafting friendship bracelets, regularly listening to pop icons like Taylor Swift and Ariana Grande,
    and finds inspiration in the visual storytelling of Harry Potter films and the nature photography of National Geographic, which together shape their artistic identity.
  travel: Julie Nestor prefers modest, well‑planned weekend hikes in nearby desert parks such as Joshua Tree and the Grand Canyon, enjoys collecting rocks and shells during these trips, and dreams of a
    future family adventure to the Sahara Desert to study real desert wildlife while still appreciating the comfort of a familiar itinerary.
  culinary: Julie Nestor loves helping their mom bake double‑chocolate chip cookies and often pairs them with a glass of homemade prickly‑pear lemonade, enjoys simple meals like cheese quesadillas and fresh
    fruit salads, and occasionally experiments with desert‑inspired snacks such as cactus‑shaped veggie sticks, reflecting a budding kitchen confidence.
  core: Julie Nestor thrives on orderly creativity—from detailed desert drawings to friendship bracelets—yet their constant worry fuels late‑night journaling and occasional procrastination on school tasks.
background:
  cultural: Julie comes from a white, middle-class family that has lived in Tucson for several generations, with roots in the Midwest. Her upbringing blends traditional American holidays such as Thanksgiving
    and Christmas with the unique Southwest experiences of Arizona. She often visits local attractions like Saguaro National Park and the Tucson Botanical Gardens, and she enjoys the community's annual
    festivals, including the Tucson Festival of Books and the All-Around Arizona Mexican-American cultural events. While her family primarily speaks English, she has picked up basic Spanish greetings from
    neighbors and school, reflecting the region's bilingual environment. The desert climate and outdoor lifestyle have shaped her appreciation for hiking, wildlife, and a practical, hands-on approach to
    daily activities.
