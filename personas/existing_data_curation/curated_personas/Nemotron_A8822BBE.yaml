personas:
  professional: Thao Nguyen, a seasoned industrial engineer with three decades mastering occupational health and safety in manufacturing and aerospace, blends meticulous risk assessment and Lean Six Sigma
    expertise with a curiosity for IoT wearables and AI predictive analytics, delivering engaging safety trainings while championing pragmatic yet forward‑thinking process designs.
  sports: Thao Nguyen fuels their love of the outdoors by walking daily, hiking the Angeles National Forest on weekends, practicing yoga for flexibility, and dancing ballroom on Thursdays, while cheering
    for the LA Dodgers, LA Lakers, and attending local senior hiking club meet‑ups.
  arts: Thao Nguyen channels creative energy into teaching cooking classes, dancing salsa‑ballroom, and devouring mystery novels by Agatha Christie, while also enjoying the LA Philharmonic’s concerts and
    the vibrant street art of local muralists like Shepard Fairey.
  travel: Thao Nguyen prefers immersive trips that blend culinary discovery and gentle adventure, having trekked the Grand Canyon, explored Kyoto’s shrines, and sampled street food in Oaxaca, and they dream
    of a relaxed road‑trip along New Zealand’s South Island with their husband.
  culinary: Thao Nguyen delights in preparing aromatic broth noodle soup with star anise, ginger, and cilantro, crafting crisp baguette sandwiches layered with pickled carrots, jalapeños, and grilled pork,
    sharing these dishes in community cooking classes while boasting a solid intermediate skill set.
  core: Thao Nguyen is a pragmatic safety veteran who balances tech curiosity with community cooking, adventurous hikes, and a habit of misplacing bill reminders yet never misses a ballroom dance night.
background:
  cultural: Thao is a first-generation Vietnamese American whose parents immigrated to California in the early 1970s. She grew up in a tight-knit Vietnamese community in Southern California, speaking both
    Vietnamese and English at home. Her cultural values emphasize family cohesion, respect for elders, and community service, which are reflected in her involvement in local cultural organizations and festivals.
    While deeply rooted in Vietnamese traditions such as celebrating Tet and cooking family meals, she also embraces the multicultural ethos of Los Angeles, integrating American openness and professional
    networking into her personal and professional life.
attributes:
  skills: '[''process design'', ''risk assessment'', ''ergonomic evaluation'', ''OSHA/Cal/OSHA compliance'', ''Lean Six Sigma'', ''data analysis'', ''project management'', ''cross-functional team facilitation'',
