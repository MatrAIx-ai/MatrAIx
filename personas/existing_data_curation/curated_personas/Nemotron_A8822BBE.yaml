  hobbies: '[''Vietnamese cooking'', ''community volunteering'', ''walking/hiking'', ''yoga'', ''ballroom dancing'', ''tech podcasts'', ''reading mystery novels'']'
  career_goals: Thao aims to advance to a senior safety leadership role, such as Director of Occupational Health & Safety, where she can shape enterprise-wide safety culture and champion innovative, technology-enabled
    safety solutions. She plans to obtain Certified Safety Professional (CSP) and LEED AP credentials, mentor the next generation of engineers, and eventually consult for small manufacturers and community
    organizations to improve worker health, particularly among immigrant labor forces.
