    automation'', ''Written and verbal communication'', ''Client relationship management'', ''Creative problem solving'', ''Attention to detail'', ''Adaptability to regulatory changes'', ''Art valuation
    basics'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Photography (landscape and street)'', ''Hiking and nature walks in Alabama state parks'', ''Birdwatching'', ''Cooking Southern
    cuisine'', ''Reading contemporary fiction and poetry'', ''Journaling and creative writing'', ''Yoga and mindfulness meditation'', ''Gardening (herbs and native flowers)'', ''Volunteering at a community
    art center (financial counseling for artists)'', ''Attending live music performances (jazz, folk)'']'
  career_goals: Edith aims to become a Certified Public Accountant (CPA) within the next year and pursue the Certified Internal Auditor (CIA) designation to deepen her audit expertise. She aspires to advance
    to an audit manager position, leading a team that integrates data‑analytics tools and ESG reporting into traditional audit practices. Over the next five years, she hopes to transition into a senior
    financial leadership role, possibly as a finance director for an arts organization or a boutique accounting firm that serves creative professionals. To support these goals, she plans to complete an
    MBA with a focus on sustainability and continue expanding her technical skill set through advanced analytics certifications.
