personas:
  professional: Edith Hebert, a seasoned accountant and auditor, merges deep GAAP expertise with a painter’s eye for detail, leveraging advanced Excel, Power BI, and data‑analytics tools to uncover financial
    anomalies while they channel their curiosity and occasional assertiveness into innovative audit solutions for creative clients.
  sports: Edith Hebert enjoys hiking the trails of Cheaha State Park, birdwatching at Oak Mountain State Park, and practicing yoga at the Montevallo Community Center, while they cheer on the Alabama Crimson
    Tide football team and follow the Montgomery Biscuits minor‑league baseball club for weekend excitement.
  arts: Edith Hebert spends weekends watercolor painting landscapes inspired by Monet and O’Keeffe, curates a personal photo series of Alabama hills reminiscent of Ansel Adams, and actively volunteers at
    the Montevallo Community Art Center, where they guide local artists through bookkeeping while admiring works by contemporary creators like Kehinde Wiley and Banksy.
  travel: Edith Hebert favors short, nature‑focused getaways, having explored the Blue Ridge Parkway, visited the historic streets of Savannah, and taken a photography workshop in Florence, Italy, while
    they plan trips around weekends to balance work and family responsibilities and save for a future art‑centric pilgrimage to Paris.
  culinary: Edith Hebert loves cooking Southern comfort dishes such as shrimp and grits, fried green tomatoes, and collard greens seasoned with fresh rosemary and thyme from their garden, approaching meals
    as both nourishment and creative expression, yet they often over‑season when a client call interrupts.
  core: Edith Hebert is a detail‑driven accountant with a painter’s imagination, a habit of over‑checking numbers, a passion for nature, and an unrelenting quest to turn anxiety into artistic and financial
    balance, and they constantly seek harmony between spreadsheets and watercolor palettes.
background:
  cultural: Edith grew up in the deep‑South of Alabama, where Southern hospitality, community ties, and a strong sense of local pride shaped her early years. Montevallo’s college‑town atmosphere exposed
    her to progressive ideas, diverse artistic voices, and an academic environment that nurtured her curiosity. She enjoys traditional Southern customs—church gatherings, family cookouts, and local festivals—while
    also embracing contemporary art, indie music, and global culinary trends. Her white Southern heritage informs her values of reliability and modesty, yet her open‑minded personality constantly seeks
    new perspectives, allowing her to navigate both the conventional and the unconventional sides of Southern culture.
attributes:
  skills: '[''Financial statement analysis'', ''GAAP compliance'', ''Audit planning and execution'', ''Risk assessment'', ''Internal control evaluation'', ''Tax preparation and filing'', ''Advanced Excel
