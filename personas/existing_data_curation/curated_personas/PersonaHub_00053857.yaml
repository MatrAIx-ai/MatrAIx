persona_description: A senior engineer and principal investigator at the National Renewable Energy Laboratory (NREL) of the US Department of Energy, who specializes in the development of blockchain technology
  for the energy industry. He is responsible for creating peer networks to trade electricity and conducting transactions with distributed energy resources, and is working on the development of a more efficient,
  transparent, and robust infrastructure. He is also involved in the development of a more equitable system for the energy industry, and is seeking to implement the objectives of NREL on a wider scale.
