    and recipe experimentation", "Attending local art and craft fairs", "Participating in book discussion groups"]'
  career_goals: She aims to progress into a supervisory or quality assurance manager role within the next five years, seeking certification as a Certified Quality Auditor (CQA) and ISO 9001 Lead Auditor.
    She wants to lead initiatives that integrate emerging testing technologies, such as automated weighing systems and digital data collection, to improve efficiency at her plant. Christine also hopes to
    mentor younger employees, champion safety culture, and eventually contribute to community educational programs on science and technology.
