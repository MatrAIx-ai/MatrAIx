personas:
  professional: Bryan Greenhill leverages decades of mechanical troubleshooting, electrical safety, and carpentry expertise to lead community volunteer projects, coordinate apprenticeship programs, and
    integrate smart home automation into sustainable garden initiatives while balancing meticulous planning with hands‑on flexibility.
  sports: Bryan Greenhill enjoys supporting the Grand Rapids Griffins and the Detroit Tigers, participates in the local senior center’s weekly bocce league, and maintains fitness through regular dawn fishing
    trips on Lake Michigan and seasonal volunteer tree‑planting with the county’s conservation crew.
  arts: Bryan Greenhill immerses themselves in Grand Rapids’s vibrant arts scene, attending ArtPrize installations, the annual jazz and folk festivals, and photographing sunrise over the lakes, while drawing
    creative inspiration from the works of Grant Wood and the music of The War on Drugs.
  travel: Bryan Greenhill prefers meticulously planned weekend getaways to Michigan’s Upper Peninsula, Door County, and the nearby Hocking Hills, blending camping under the stars with visits to historic
    lighthouses, though they often delay longer trips abroad due to community commitments.
  culinary: Bryan Greenhill crafts a seasonal menu featuring home‑brewed barley ale, grilled trout caught at sunrise, roasted beet and goat‑cheese salad, and herb‑infused vegetable stew, showcasing a proficient
    yet experimental cooking style rooted in garden‑to‑table freshness.
  core: Bryan Greenhill is a pragmatic, curious mastermind who balances hands‑on craftsmanship with community leadership, all while nurturing a garden, brewing beer, and capturing the world through a DSLR
    lens.
background:
  cultural: Bryan is a White Midwestern American with deep roots in Michigan. His family background includes German and Irish ancestry, reflective of the region's settlement patterns. Raised near Grand
    Rapids, he grew up in a Protestant community that emphasized hard work, modesty, and communal responsibility. The local culture of manufacturing, self-reliance, and neighborly support shaped his values,
    fostering a practical outlook coupled with curiosity about new ideas. Bryan's participation in regional traditions such as county fairs, local sports, and community service reflects this cultural heritage.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical systems maintenance'', ''Carpentry and home renovation'', ''Landscaping and garden design'', ''Project budgeting and planning'', ''Volunteer coordination'',
