  hobbies: '[''Woodworking'', ''Fishing'', ''Organic gardening'', ''Reading local history'', ''Landscape photography'', ''Volunteer work at senior center'', ''Church community events'', ''Home brewing'',
    ''Attending art and music festivals'']'
  career_goals: Bryan aims to transition his professional experience into meaningful community service, seeking leadership roles on local nonprofit boards, mentoring younger tradespeople through apprenticeship
    programs, and completing his bachelor's degree in environmental studies to deepen his knowledge of sustainable practices. He also aspires to develop a neighborhood garden project that combines his practical
    gardening skills with his curiosity about urban agriculture, and to share his woodworking expertise by offering workshops at the community center.
