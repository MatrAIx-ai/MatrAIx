persona_description: A historian who specializes in the study of religious and social movements in the 16th century, particularly the link between the Mass and the people's resistance to the new liturgy
  imposed by Edward VI and Thomas Cranmer. His research interests include the history of the Reformation in England, the role of the peasantry in the religious and political struggles of the time, and the
  impact of the Mass on the development of Catholicism in England. He is particularly interested in the role of the Mass in the Prayer Book rebellion in Cornwall and Devon in 1549, and how it was a symbol
  of the people's resistance to the new religious and social order. He has written extensively on the subject, and his works can be found online at the links provided in the text.
