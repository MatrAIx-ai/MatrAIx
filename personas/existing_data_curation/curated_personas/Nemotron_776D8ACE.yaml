personas:
  professional: Linda Kegley, a seasoned automotive service technician with decades of expertise in diesel diagnostics, classic‑car restoration, and meticulous record‑keeping, blends her methodical approach
    and clear communication to train apprentices, pursue state emissions testing certification, and envision a community co‑op garage that offers affordable repairs.
  sports: Linda Kegley stays active by tending her vegetable garden, hiking Preston County trails for birdwatching, participating in a senior bowling league, and cheering on the Pittsburgh Steelers and
    West Virginia Mountaineers, while incorporating gentle yoga stretches to manage joint stiffness.
  arts: Linda Kegley draws artistic fulfillment from Appalachian folk‑music legends like Doc Watson and Alison Krauss, singing in her church choir, quilting intricate patterns inspired by traditional motifs,
    and enjoying classic films such as Casablanca, which together shape her nostalgic yet creative leisure time.
  travel: Linda Kegley prefers leisurely road trips in her restored 1957 Chevrolet, exploring destinations like the Blue Ridge Parkway, Shenandoah National Park, and the National Corvette Museum in Bowling
    Green, while dreaming of a cultural pilgrimage to Savannah’s historic squares.
  culinary: Linda Kegley loves preparing garden‑fresh dishes such as herb‑infused roasted root vegetables, chicken and dumplings, and warm apple crumble with cinnamon, skillfully canning tomatoes and making
    sourdough starter, though she sometimes over‑salts in her enthusiasm to flavor meals.
  core: Linda Kegley exemplifies a meticulous mechanic, devoted mentor, and quiet community pillar whose careful planning tempers a propensity for worry, rewarding herself with vintage car shows and garden
    comforts.
background:
  cultural: Linda grew up in the Appalachian region of West Virginia, a community shaped by a strong sense of self‑reliance, close‑knit family ties, and a deep appreciation for the natural landscape of
    the Allegheny Mountains. Her white, working‑class heritage includes traditions of storytelling, bluegrass music, and church‑centered social life, particularly within the Methodist congregation that
    has been a central pillar of the town. These cultural influences fostered a pragmatic, hardworking ethic and a respect for preserving local customs while adapting to modern technologies in her trade.
attributes:
  skills: '[''Small‑car and light‑truck repair'', ''Diesel engine diagnostics'', ''Electrical system troubleshooting'', ''OBD‑II scanning and diagnostics'', ''Engine rebuilds and classic‑car restoration'',
    ''Tool organization and workshop management'', ''Preventive maintenance planning'', ''Customer service and communication'', ''Apprentice training and mentorship'']'
  hobbies: '[''Vegetable gardening'', ''Birdwatching'', ''Quilting'', ''Attending folk‑music gatherings'', ''Church choir participation'', ''Visiting vintage car shows'', ''Reading historical novels'',
    ''DIY home‑improvement projects'']'
  career_goals: Although approaching retirement, Linda aims to solidify her legacy by formally mentoring a new generation of mechanics, perhaps through a weekend apprenticeship program at the local garage.
    She hopes to obtain a state‑issued emissions testing certification to expand the shop’s services. Linda also dreams of converting a portion of the shop into a community co‑op where residents can access
    affordable vehicle repairs. Securing financial stability for her late husband’s family and ensuring a smooth transition out of full‑time work are practical goals that guide her everyday decisions.
