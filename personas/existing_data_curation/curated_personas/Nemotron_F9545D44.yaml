  career_goals: Elizabeth often talks about wanting to be a teacher, a nurse, or a veterinarian when she grows up, inspired by her love for caring for her stuffed animals and helping friends. She enjoys
    role‑playing "big kid" scenarios, such as pretending to help others in her playroom, and expresses a budding ambition to explore the world, learn new things, and make a positive difference in her community.
