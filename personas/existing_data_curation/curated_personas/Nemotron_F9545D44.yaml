personas:
  professional: Elizabeth Talbott, a 3-year-old who organizes her stuffed animals by size each morning, shows budding project-management instincts, insisting on a set schedule yet occasionally tossing toys
    aside in a sudden assertive tantrum when the routine is disrupted, and they gently correct peers with firm politeness.
  sports: Elizabeth Talbott, a 3-year-old who loves swinging on the playground's monkey bars, participates in the 'Tiny Tots' soccer class at Little Kickers and proudly wears a cap of the River City Rascals,
    preferring structured playdates over spontaneous rough-housing, yet they sometimes kick a ball with unchecked vigor that surprises even their coaches.
  arts: Elizabeth Talbott, a 3-year-old who sings loudly to Raffi's 'Baby Beluga', draws crayon portraits of dinosaurs while humming Disney's 'Let It Go', and they arrange their tiny studio of stickers
    and glitter in meticulous rows, using structured rhythm to calm anxiety, though they occasionally smudge glue in a rebellious burst.
  travel: Elizabeth Talbott, a 3-year-old who thrives on predictable road trips to the nearby beach, feels uneasy on long airplane rides, dreams of seeing the towering redwoods of California and the historic
    castles of Scotland, and they always pack a familiar blanket and snack to keep stress at bay.
  culinary: Elizabeth Talbott, a 3-year-old who devours mac-and-cheese with extra cheddar, delights in bite-size chicken nuggets with ketchup, refuses peas and carrots, and they can spread peanut butter
    on toast with surprising dexterity but often sneak an Oreo before dinner, reflecting a pragmatic palate punctuated by occasional sugary indulgence.
  core: Elizabeth Talbott, a 3-year-old whose meticulous toy organization clashes with sudden emotional outbursts, navigates life with a practical, structure-loving mind tempered by persistent worry about
    routine changes, and they exhibit playful assertiveness that fuels both cooperation and occasional stubbornness.
background:
  cultural: Elizabeth is raised in a white, middle‑class family in Springboro, Ohio, a suburban community in Montgomery County. Her upbringing reflects typical Midwestern American values, including participation
    in community church activities, celebrating holidays like Thanksgiving, Christmas, and Halloween, and involvement in local school and neighborhood events. English is her primary language, and she experiences
    a blend of suburban cultural norms, family traditions, and the supportive environment of a close‑knit community.
