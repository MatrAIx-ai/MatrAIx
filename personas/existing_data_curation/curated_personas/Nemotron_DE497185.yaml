  hobbies: '[''Art Gallery Visits'', ''Painting & Pottery'', ''Live Music Events'', ''Weekend Bike Rides'', ''Community Theater Improv'', ''Group Cooking Experiments'', ''Volunteer Work at Food Bank'',
