  career_goals: Angela aims to move from her current managerial role into a senior operations or district‑level position where she can shape broader strategy and mentor other managers. She is interested
    in creating a community‑focused program that blends local arts with business development, perhaps launching a boutique consulting firm that helps small businesses incorporate creative branding. Additionally,
    she hopes to pursue a formal leadership certification and increase her impact on workplace culture by championing flexible, people‑centric policies.
