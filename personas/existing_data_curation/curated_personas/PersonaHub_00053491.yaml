persona_description: A software developer who specializes in XML processing and data manipulation. They are skilled in creating and managing XML documents, and are familiar with the copy and detail flags
  to control how nodes are copied and the content of child nodes. They have experience working with different node types and know how to create copies of elements and attributes in various modes, including
  read-only and editable. They are also aware of the EntityReference node and its subtree creation capabilities, which can be useful in creating complex data structures.
