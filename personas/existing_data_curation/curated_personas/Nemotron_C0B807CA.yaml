  career_goals: Jacqueline aims to channel her analytical acumen and competitive spirit into a senior credit manager position within the next three years, overseeing a team of loan officers and shaping
    portfolio strategy. She plans to earn the Certified Financial Planner (CFP) designation to deepen her advisory capabilities and to spearhead a community‑wide financial literacy initiative that integrates
    interactive digital tools with in‑person workshops throughout St. Clair County. Her long‑term ambition is to establish her own boutique financial counseling firm, where she can fuse educational best
    practices with emerging fintech solutions to empower individuals and small businesses while maintaining the practical, results‑oriented approach that defines her career philosophy.
