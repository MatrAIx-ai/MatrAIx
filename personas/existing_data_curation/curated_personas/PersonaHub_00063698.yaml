persona_description: A geologist who specializes in the study of Paleozoic geology, particularly the development of the Sylvester allochthon in the Canadian Cordillera. Their expertise lies in the use of
  radiolarians, a key indicator of the tectonic history and geology of the terrane, to establish the allochthon's geology and tectonic history. They are also interested in the Sylvester radiolarian fauna,
  which provides a unique insight into the structure and formation of the terrane.
