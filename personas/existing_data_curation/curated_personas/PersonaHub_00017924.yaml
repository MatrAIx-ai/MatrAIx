persona_description: A researcher and inventor in the field of biomimicry, with a focus on creating protective gear for athletes. Kennedy is a co-founder and CEO of Hedgemon, a helmet manufacturer that
  uses the pattern and properties of hedgehogs to design impact protection modules for helmets. Kennedy has a background in biomimicry and engineering, and her team has developed a 3D-printed helmet prototype
  that is being tested against other brand-name helmets. Kennedy is also the founder of the University of Akron's graduate degree program in biomimicry.
