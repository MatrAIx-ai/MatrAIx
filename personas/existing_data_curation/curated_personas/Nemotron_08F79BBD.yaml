  hobbies: '[''reading historical biographies'', ''gardening'', ''digital photography'', ''visiting art galleries'', ''folk‑art workshops'', ''bridge club'', ''volunteering at church food pantry'', ''cooking
    Southern cuisine'', ''online learning (finance tech, African‑American history)'']'
  career_goals: As she approaches retirement, Jasmine aims to transition into a consulting role where she can share her decades‑long expertise with emerging entrepreneurs in the Buncombe County area. She
    is passionate about improving financial literacy among African‑American youth and plans to develop a community‑based workshop series on budgeting, credit management, and small‑business finance. Additionally,
    she hopes to serve on the board of a local non‑profit focused on arts education, merging her financial acumen with her love of art. Jasmine also seeks to mentor at least three junior financial professionals
    annually, ensuring her legacy of methodical, ethical financial stewardship continues.
