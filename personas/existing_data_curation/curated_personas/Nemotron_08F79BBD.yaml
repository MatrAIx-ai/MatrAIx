personas:
  professional: Jasmine Lewis, a seasoned financial manager with three decades of expertise in budgeting, risk assessment, regulatory compliance, and data visualization, blends methodical precision with
    a collaborative, mentoring mindset to guide emerging entrepreneurs and champion ethical stewardship in her community.
  sports: Jasmine Lewis enjoys low-impact cardio through weekly hikes along the Blue Ridge Parkway, practices tai chi at her local community center, follows the Charlotte Hornets during basketball season,
    and supports the Asheville City Soccer Club, though she rarely joins large sports gatherings, preferring intimate walking groups.
  arts: Jasmine Lewis, an avid supporter of visual arts, attends monthly gallery openings featuring artists such as Romare Bearden and Ansel Adams, participates in folk-art workshops where she learns traditional
    quilting techniques, and fills her home with prints of Georgia O'Keeffe's flower paintings, all of which deepen her appreciation for creative expression.
  travel: Jasmine Lewis prefers deliberate, modestly planned trips that blend photography and cultural immersion, often revisiting the Great Smoky Mountains and the historic streets of Charleston, while
    dreaming of a slow-paced tour of the Scottish Highlands to capture mist-shrouded landscapes, yet she keeps travel budgets tight to sustain her community work.
  culinary: Jasmine Lewis enjoys cooking Southern comfort dishes such as shrimp and grits, collard greens seasoned with smoked turkey, and sweet potato pie, drawing fresh herbs and heirloom tomatoes from
    her own garden, and while her culinary skills are solid, she occasionally over-sauces a dish to make sure nobody goes hungry.
  core: Jasmine Lewis blends meticulous financial expertise with a quiet love for garden-to-table cooking, art curation, and community mentorship, balancing disciplined routine with occasional spontaneous
    garden tool splurges and a penchant for lone photography walks.
background:
  cultural: Jasmine was born in the early 1960s in North Carolina to a family rooted in the African‑American community of the Appalachian foothills. Growing up during the civil‑rights movement, she witnessed
    both the challenges and the resilience of her community. Her upbringing was shaped by the close‑knit bonds of the church, gospel music, and family storytelling traditions. While she completed high school
    locally, she has always valued lifelong learning, a trait reinforced by the community emphasis on self‑improvement and mutual support. Living in Morganton and Buncombe County, she blends Southern hospitality
    with the cultural heritage of her ancestors, celebrating Juneteenth, maintaining strong ties to local Black churches, and participating in community events that highlight African‑American art, cuisine,
    and history. This cultural foundation informs her commitment to financial empowerment and arts advocacy within her community.
attributes:
  skills: '[''financial analysis'', ''budgeting and forecasting'', ''regulatory compliance'', ''risk assessment'', ''accounting software (QuickBooks, Sage, Excel)'', ''data visualization (Tableau)'', ''process
