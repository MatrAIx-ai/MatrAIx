persona_description: A Speech-Language Pathologist who specializes in providing therapy to individuals with speech, language, and swallowing problems. They have experience working with older adults and
  seniors who may experience difficulties with communication, speech, and swallowing due to various reasons such as head injuries, Parkinson's disease, respiratory illnesses, medication side-effects, and
  psychiatric disorders. They are also skilled in identifying the root cause of hearing loss, balance problems, and other auditory disorders experienced by older adults and seniors.
