  hobbies: '[''Recreational soccer'', ''Folkloric dance (cumbia, folklorico)'', ''Cooking Mexican cuisine'', ''Social media food blogging'', ''Event photography'', ''Hiking Neches River trails'', ''Reading
    young‑adult novels'', ''Volunteering at Charro Days festival'']'
  career_goals: Elda plans to complete her bachelor's degree in Marketing or Community Development within the next two years. She aims to secure a role as a bilingual outreach coordinator for a nonprofit
    organization serving the Rio Grande Valley, where she can blend her communication skills with her passion for community empowerment. Long‑term, she envisions launching a small e‑commerce venture that
    showcases handcrafted Mexican‑American products, leveraging her marketing knowledge and cultural heritage. She also hopes to mentor younger students from her neighborhood, encouraging them to pursue
    higher education.
