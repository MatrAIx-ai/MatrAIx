personas:
  professional: Elda Moreira, a bilingual outreach coordinator‑in‑training, blends their business administration background with event‑coordination experience to craft compelling community campaigns, leveraging
    Excel budgeting, Canva flyer design, and dynamic public speaking to rally volunteers and nonprofit partners.
  sports: Elda Moreira, an enthusiastic recreational soccer player in the local co‑ed league, also hikes the Neches River trails with the Neches Trailblazers Club, supports the Houston Astros in baseball
    and cheers for the Dallas Cowboys during football season, and participates in community volleyball tournaments during the summer, often rallying their teammates with upbeat encouragement.
  arts: Elda Moreira, a vibrant folkloric dancer and community photographer, draws inspiration from Frida Kahlo’s color palette and Annie Leibovitz’s portrait style, shares their dance videos set to traditional
    corridos on Instagram, and frequently attends local mural unveilings featuring artists like Diego Rivera.
  travel: Elda Moreira, a budget‑savvy adventure seeker, enjoys weekend road trips to Austin’s music festivals, has explored the historic city of San Antonio, dreams of a spring backpacking journey through
    Oaxaca’s markets, and hopes to photograph Día de los Muertos celebrations in Guatemala’s Antigua next year, often organizing their itineraries with a careful spreadsheet of estimated costs.
  culinary: Elda Moreira, a self‑taught home chef, perfects mole poblano with dark chocolate and chiles, rolls tamales with pork and masa, whips up quick chilaquiles with salsa verde for brunch, and experiments
    with avocado lime dressing on grilled fish, often documenting each dish’s aroma and texture on Instagram to share with their followers.
  core: Elda Moreira, a sociable 19‑year‑old community‑focused marketer‑in‑training, channels their boundless energy into soccer, folkloric dance, vibrant cooking, and grassroots outreach, while juggling
    a meticulous budget and a habit of over‑caffeinating before late‑night study sessions.
background:
  cultural: Elda was raised in Alamo, Texas, a border town with a strong Mexican‑American presence. Her family maintains many traditions from their Mexican heritage, such as celebrating Día de los Muertos,
    enjoying weekend family meals featuring homemade tamales, and attending the local Nuestra Señora de Guadalupe fiesta. Bilingualism is a daily reality at home, and she grew up hearing both Spanish lullabies
    and English pop songs. The close-knit community, where neighbors often gather for barbecues and soccer matches, has shaped her sense of collectivism and responsibility. While her upbringing is rooted
    in Catholic customs, she also embraces the secular, cross‑border cultural exchange that characterizes life in the Rio Grande Valley.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Event coordination'', ''Social media content creation'', ''Microsoft Office (Excel, PowerPoint, Word)'', ''Basic graphic design (Canva)'', ''Public
