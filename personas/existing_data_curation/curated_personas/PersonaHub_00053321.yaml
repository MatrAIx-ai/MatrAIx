persona_description: A visionary leader who has a passion for empowering individuals and organizations through the use of innovative maps and images. ODT's founder, Arno Peters, was instrumental in popularizing
  the Peters Map as a tool for changing people's perceptions of their world. ODTmaps.com is a pioneer in the use of the Peters Map in corporate training programs related to management development, corporate
  culture change, leadership, diversity, and employee empowerment. ODT's educational mission was to encourage thinking "outside the box" and to stretch self-limiting thinking about personal power and influence.
  ODT's efforts to re-position the Peters Map and to describe it in a way that was different from the "anti-colonialist" and "anti-imperialist" message that Arno Peters had flaunted in the face of his critics
  inside the cartography community were seen as a significant shift in the way the map was used and understood.
