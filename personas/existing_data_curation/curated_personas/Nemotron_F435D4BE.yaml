personas:
  professional: Carrie Roland, a 22‑year‑old aspiring school counselor, blends strong interpersonal and data‑driven counseling skills with a relaxed, sometimes disorganized approach, and they use yoga‑derived
    calm to navigate competitive client outcomes and occasional skepticism about program motives.
  sports: Carrie Roland hikes the Blue Hills with the local Boston Urban Hikers club, practices yoga three times a week, and roots for the Boston Red Sox, New England Patriots, and Boston Celtics, while
    they have a flexible schedule that sometimes leads to missed yoga classes but a strong desire to stay active.
  arts: Carrie Roland frequents live shows at Paradise Rock Club, where they gush over Phoebe Bridgers and The Strokes, binge‑watch indie films on the Sundance platform, and host board‑game nights that
    double as impromptu karaoke sessions featuring Taylor Swift’s ‘All Too Well’.
  travel: Carrie Roland prefers loosely planned weekend getaways, having explored Portland’s coffee scene, trekked the cliffs of Cape Cod, and dreaming of sunrise hikes in Bali, yet they keep international
    trips on a wish‑list while nearby adventures satisfy their love for spontaneity.
  culinary: Carrie Roland enjoys cooking intermediate‑level dishes like shakshuka with harissa, quinoa‑stuffed peppers, and miso‑glazed salmon, experimenting with ingredients such as fresh basil, gochujang,
    and pomegranate molasses, while they often pair meals with a rotating lineup of local craft coffee brews.
  core: Carrie Roland is a curious, competitive counselor‑in‑training who thrives on social energy, balances yoga‑induced calm with lingering worry, and they habitually forget to file paperwork while dreaming
    of future impact.
background:
  cultural: Carrie grew up in a middle‑class, predominantly white New England family in Somerset, Massachusetts. Her upbringing emphasized the value of education, community service, and a blend of traditional
    New England values with progressive social attitudes. Family gatherings often featured regional traditions such as celebrating Patriots’ Day and Thanksgiving with local seafood, and she was encouraged
    to participate in school and neighborhood volunteer initiatives. This cultural context has shaped her collaborative yet independent outlook, her appreciation for both new ideas and established practices,
    and her commitment to helping others navigate educational and career pathways.
attributes:
  skills: '["Active listening","Empathetic communication","Career assessment (Strong Interest Inventory, MBTI)","Group workshop facilitation","Public speaking","Labor‑market research and analysis","Evidence‑based
