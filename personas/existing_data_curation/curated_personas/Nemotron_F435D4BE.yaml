  hobbies: '["Hiking in Blue Hills","Yoga","Volunteering at youth community center","Attending live music events","Exploring coffee shops","Board‑game nights with friends","Reading psychology and self‑help
    books","Journaling","Cooking and experimenting with new recipes"]'
  career_goals: Carrie aims to earn a Master’s degree in School Counseling and obtain state certification within the next three years, positioning herself for a full‑time guidance counselor role in a high‑school
    district. She aspires to lead the development of a career‑exploration program that partners local businesses with students, and eventually to open a private practice focusing on early‑career adults
    navigating transitions. Long‑term, she hopes to become a recognized speaker on integrating data‑driven career counseling with holistic wellbeing, and to mentor new counselors in her community.
