  hobbies: '[''Visiting art museums and galleries'', ''Attending cultural festivals'', ''Participating in community theater'', ''Playing mahjong with a social club'', ''Leading a hiking group'', ''Cooking
    Asian‑fusion cuisine'', ''Practicing calligraphy'', ''Volunteering for local arts nonprofits'']'
  career_goals: Approaching retirement, Qin plans to shift from full‑time management to part‑time consulting and mentorship. He aims to help small‑to‑mid‑size businesses in the Bay Area adopt sustainable
    operational practices and to serve on the board of a local arts nonprofit, where he can champion community‑wide art programs that celebrate East Asian heritage. Qin also hopes to document his career
    lessons in a series of workshops for emerging managers, ensuring his legacy of organized, people‑centric leadership endures.
