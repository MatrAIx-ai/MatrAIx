  hobbies: '[''Fishing'', ''Hunting'', ''Hiking local trails'', ''Camping'', ''DIY mechanical repairs'', ''Playing acoustic guitar'', ''Listening to podcasts on technology and Appalachian history'', ''Puzzle
    games (Sudoku, crosswords)'', ''Casual co‑op video gaming with spouse'']'
  career_goals: Looking ahead, Daniel aims to move from cashier to shift supervisor within the next two years, leveraging his strong interpersonal skills and practical knowledge of store operations. He
    plans to enroll in part‑time community‑college courses in business administration and pursue a retail‑management certification, which will prepare him for a store manager position within five years.
    His longer‑term ambition is to open a small family‑run general store or a hardware shop in Burnsville, providing a reliable service hub for the local community and offering his spouse a role as manager
    or co‑owner. He also envisions using a personal truck to start a side delivery service for groceries and farm supplies, giving him the flexibility to balance work with family responsibilities. Financial
    stability and the ability to give his married partner and potential future children a comfortable home are central motivations behind his career plans.
