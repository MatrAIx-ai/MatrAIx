personas:
  professional: Daniel Hickman, a 20‑year‑old grocery store cashier in Burnsville, blends meticulous cash handling and POS troubleshooting with a calm, cooperative demeanor, pursuing a shift‑supervisor
    role within two years while taking part‑time business administration courses to prepare for future store‑management responsibilities.
  sports: Daniel Hickman, an avid fly‑fisher on the Gauley River and small‑game hunter in the surrounding hills, follows the Pittsburgh Steelers and West Virginia Mountaineers, and participates in a local
    hiking club that meets monthly for trail challenges.
  arts: Daniel Hickman, a quiet acoustic guitarist, often plays folk and country tunes inspired by Johnny Cash and the Carter Family at family gatherings, enjoys the Appalachian Storytelling podcast, and
    collects handcrafted wooden instruments from local artisans.
  travel: Daniel Hickman, preferring nature‑rich getaways, has camped in Shenandoah National Park, plans to hike a segment of the Appalachian Trail, and dreams of a weekend fishing trip to Banff National
    Park’s alpine lakes.
  culinary: Daniel Hickman’s home‑cooked meals feature smoked trout, venison stew, ramp‑infused cornbread, and apple pie, prepared with fresh herbs from a backyard garden and a well‑worn cast‑iron skillet.
  core: Daniel Hickman is a pragmatic, low‑key outdoors enthusiast who balances a steady retail job, weekend fishing and hunting, and a steady march toward owning a family‑run hardware store, all while
    occasionally overlooking appointments in favor of a quiet moment by the river.
background:
  cultural: Daniel grew up in Burnsville, a small town in Gilmer County, West Virginia, steeped in Appalachian culture. His family lineage traces back to English and Scots‑Irish settlers, a heritage common
    in the region, and he was raised in a close‑knit, multi‑generational household that values hard work, self‑reliance, and community support. The local Baptist church has been a cornerstone of his social
    life, shaping his moral framework and reinforcing the importance of neighborly assistance. Traditional Appalachian customs—such as seasonal hunting, fishing, and attending county fairs—are woven into
    his everyday routine. The rural setting fostered a practical, hands‑on approach to problem‑solving, while his high‑school education exposed him to a mix of classic literature and local history, nurturing
    his curiosity about the broader world. Though he identifies as white, Daniel is aware of the region’s cultural diversity and respects the mix of peoples who call the mountains home.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Basic inventory management'', ''Conflict resolution'', ''Basic bookkeeping'', ''Spreadsheet basics (Excel/Google Sheets)'',
