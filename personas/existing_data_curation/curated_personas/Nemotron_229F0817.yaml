personas:
  professional: Ramon Nogueda, a retired community organizer turned senior docent and mentor, leverages their bilingual fluency, methodical planning, and passion for folk art to orchestrate intergenerational
    workshops and curate traveling exhibitions for local schools.
  sports: Ramon Nogueda enjoys low‑intensity fitness through daily birdwatching hikes in the nearby nature reserve and follows the Tampa Bay Rays and Orlando Magic, often attending senior‑friendly viewing
    parties at the Lake Wales community center.
  arts: Ramon Nogueda spends afternoons painting delicate watercolor landscapes inspired by local sunsets, attends museum exhibitions featuring Frida Kahlo and Diego Rivera, and dances to traditional mariachi
    and salsa music with a senior cultural troupe.
  travel: Ramon Nogueda prefers thoughtfully planned trips that blend cultural pilgrimage and relaxation, such as revisiting their hometown in Jalisco to partake in the annual patron saint festival, while
    also dreaming of a leisurely week exploring the historic plazas of Seville, Spain.
  culinary: Ramon Nogueda delights in preparing authentic mole, hand‑made tortillas, and fragrant pozole using fresh garden herbs, often mastering new recipes from old family cookbooks while occasionally
    over‑salting dishes when nostalgic for childhood flavors.
  core: Ramon Nogueda, a vibrant 73‑year‑old storyteller, marries meticulous organization with boundless curiosity, channeling a lifelong love of art, food, and community into purposeful mentorship, even
    if they sometimes hoard old camera batteries for the thrill of a perfect shot.
background:
  cultural: Ramon was born in Jalisco, Mexico, where he was raised in a close‑knit family that celebrated Mexican holidays such as Día de los Muertos, Semana Santa, and Mexican Independence Day. He immigrated
    to the United States in his early twenties, settling first in Texas before moving to Florida. He maintains fluency in Spanish and English, and he actively participates in the Mexican‑American community
    in Lake Wales, helping organize cultural festivals, teaching traditional cooking classes, and preserving Mexican folk traditions for younger generations.
attributes:
  skills: '["Event Planning", "Community Outreach", "Bilingual Communication (Spanish/English)", "Art Appreciation", "Cooking (Mexican Cuisine)", "Gardening", "Mentoring", "Budget Management", "Public Speaking",
