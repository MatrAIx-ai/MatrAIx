  hobbies: '["Watercolor Painting", "Nature Photography", "Gardening", "Cooking Mexican Cuisine", "Museum Visits", "Cultural Dance", "Historical Fiction Reading", "Birdwatching", "Chess", "Volunteering
    as Art Mentor"]'
  career_goals: Although retired, Ramon aims to keep growing intellectually and artistically. He plans to master digital photography, develop a senior art program at the Lake Wales community center, and
    curate a traveling exhibition of Mexican folk art for local schools. He also intends to write and self‑publish a memoir recounting his migration experience and cultural heritage, and he hopes to visit
    his hometown in Jalisco within the next few years to reconnect with family and participate in traditional festivals.
