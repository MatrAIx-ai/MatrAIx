  career_goals: Haiyen aims to transition into a senior administrative or office manager role where she can mentor junior staff and share her best‑practice workflow strategies. She is motivated to integrate
    emerging digital tools—such as AI‑assisted scheduling and project‑management platforms—into her work to increase efficiency. Beyond corporate advancement, she aspires to leverage her organizational
    skills to support local arts and cultural nonprofits, possibly serving as a liaison or coordinator for community art initiatives in Chicago. Her long‑term ambition includes establishing a mentorship
    program for older professionals navigating career changes, while maintaining a balanced schedule that allows ample time for her volunteer and artistic passions.
