personas:
  professional: Jennie Cooper is an aspiring young writer and problem-solver whose love for structured classroom projects and meticulous journaling translates into a methodical approach to every assignment
    and fuels their dream of penning a fantasy series.
  sports: Jennie Cooper follows the New York Yankees and New York Rangers, attends Sunday youth soccer practices with the Pemberton Community Soccer Club, and spends weekend mornings on nature-filled hikes
    organized by the Girl Scouts, preferring low-key outdoor activity over large spectator events.
  arts: Jennie Cooper merges an affection for piano, practicing Mozart's Sonata No. 16 and Yiruma's River Flows in You, with sketching meadow scenes inspired by Claude Monet, while re-reading J.K. Rowling's
    Harry Potter books and humming Studio Ghibli soundtracks, crafting a personal blend of classical music, impressionist art, and modern fantasy that shapes their creative identity.
  travel: Jennie Cooper has explored nearby gems like the Delaware Water Gap and a school field trip to Washington DC's National Mall, enjoys spontaneous weekend nature walks in New Jersey's Pine Barrens,
    and dreams of traveling abroad to experience the historic castles of England and the bustling markets of Tokyo during a future family vacation.
  culinary: Jennie Cooper prefers simple, comforting meals such as homemade mac and cheese, pepperoni pizza, and chocolate chip cookies baked with their mother on holiday afternoons, enjoys crafting banana
    pineapple smoothies for after-piano practice, and experiments with easy-to-follow LEGO-themed snack recipes that often end in a sticky-fingered mess they humorously blame on their creative cooking habit.
  core: Jennie Cooper is a methodical, solitary-yet-kind 11-year-old who balances structured schoolwork, meticulous savings habits, and a love for fantasy worlds, quietly shaping a future of thoughtful
    creativity while occasionally over-organizing their day.
background:
  cultural: Jennie grows up in a predominantly white, middle‑class suburban family in Pemberton, New Jersey. Her household observes traditional American holidays such as Thanksgiving, Christmas, Easter,
    and the Fourth of July, and her parents emphasize education, responsibility, and community involvement. The family has English and Irish ancestry, and they participate in local community events, including
    church gatherings and volunteer activities. Attending a public elementary school with a multicultural curriculum exposes her to a variety of cultural perspectives, fostering respect and appreciation
    for diversity while maintaining the values of her own cultural heritage.
