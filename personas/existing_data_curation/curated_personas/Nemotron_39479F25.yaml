  career_goals: Jennie aspires to become an elementary school teacher because she values structured learning environments and enjoys helping others succeed. She aims to graduate high school with honors,
    pursue a degree in education, and eventually lead her own classroom where she can promote harmony and cooperation among students. She also considers a role as a librarian, attracted by the organization
    of books and quiet spaces that support learning.
