persona_description: A marine biologist who specializes in the study of the effects of tides on life on Earth, particularly focusing on the evolution of life in the sea and the role of tidal pools and slopes
  within the tidal range in the evolution of life. Their research interests include the development of suitable limbs, scales, and other tools needed for life to venture further inland, the importance of
  the tides to fishing, and the use of the Moon as a natural calendar. They are well-versed in the theory of tides and their effects on life, and have a unique understanding of the importance of tides in
  the evolution of life on Earth.
