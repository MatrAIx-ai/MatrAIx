personas:
  professional: David Merriman is a senior electrical engineer turned technocratic strategist, blending deep analog and digital circuit expertise with a pragmatic business mindset, and their competitive
    drive pushes them to turn renewable‑energy concepts into concrete project proposals while a community‑centered upbringing keeps focus on stakeholder collaboration.
  sports: David Merriman channels competitive energy into the Chehalis Hoops community basketball league, laces up for biweekly five‑mile runs, hits the foothills with the local outdoor club in spring and
    fall, and roots for the Seattle Seahawks and Portland Timbers while carving out a spot on the regional ski crew at Mt. Baker each winter.
  arts: David Merriman strums acoustic guitar to the tunes of Neil Young and The Decemberists, frequents intimate live shows at the local coffeehouse, participates in community‑theater improv nights, and
    unwinds by watching indie films starring Frances McDormand, drawing creative inspiration that fuels engineering problem‑solving.
  travel: David Merriman prefers meticulously planned road trips, having explored the San Juan Islands, the Oregon Coast, and a summer expedition to Alaska’s Kenai Peninsula, while a bucket‑list includes
    an eco‑focused tour of Iceland’s geothermal power plants and a weekend getaway to nearby Cascade hot springs.
  culinary: David Merriman is a passionate home‑brewer who crafts hop‑forward IPAs and Belgian‑style saisons, cooks cedar‑plank salmon with locally foraged mushrooms, experiments with wood‑fired pizza dough,
    and keeps a well‑stocked pantry of artisanal cheeses and craft coffee beans for weekend culinary lab.
  core: David Merriman is a competitive, community‑oriented engineer who balances a love for renewable tech and craft beer with a restless mind that worries about every detail, often turning stress into
    marathon runs and meticulous spreadsheets.
background:
  cultural: David is a white American who grew up in the Pacific Northwest, raised in a middle-class family that valued practical problem-solving and self-reliance. The region’s emphasis on environmental
    stewardship, outdoor recreation, and community involvement shaped his worldview. Early exposure to engineering through a parent working in the timber industry sparked his interest in technology that
    supports both industry and the environment. His graduate business education at a state university reinforced a pragmatic entrepreneurial spirit and a collaborative networking style common in the area.
    Though never married, he maintains strong ties with extended family and local community groups, reflecting the communal ethos of his hometown.
