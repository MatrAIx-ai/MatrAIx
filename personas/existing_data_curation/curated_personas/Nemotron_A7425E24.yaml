  career_goals: At 51, David aims to transition into senior leadership, such as a director of engineering or chief technology officer within a regional utility or technology firm. He plans to obtain his
    Professional Engineer license, lead a flagship renewable-energy project that serves the Chehalis community, and publish technical papers on sustainable power solutions. He also aspires to launch an
    independent consulting practice that helps small businesses adopt energy-efficient technologies while leveraging his business acumen. Mentoring junior engineers, speaking at industry conferences, and
    earning recognition for innovative yet reliable engineering outcomes are core components of his long-term ambition. He balances his competitive nature with a desire for personal well-being and financial
    security for the future.
