  career_goals: Tony aims to transition from hands‑on driving to a supervisory or fleet‑management role within the next five years, leveraging his practical experience to mentor younger drivers and improve
    safety records. He plans to obtain the Certified Transportation Professional (CTP) credential and complete a short logistics management certification to solidify his expertise. Ultimately, he dreams
    of launching a modest, family‑run logistics firm that serves local businesses in the Appalachian region, allowing him to balance steady income with a more predictable schedule that reduces his daily
    stress. He also hopes to serve as a community liaison, fostering partnerships between transportation providers and regional development projects.
