  career_goals: He aims to advance to a senior production planning supervisor role within the next three years, overseeing a team of planners and driving continuous‑improvement initiatives across the plant.
    Michael is planning to obtain the APICS Certified Production and Inventory Management (CPIM) credential and enroll in a GED program to formalize his education. Long‑term, he envisions transitioning
    into a supply‑chain consulting position where he can leverage his practical expertise to help other firms streamline operations, while also mentoring younger African‑American workers entering the industry.
