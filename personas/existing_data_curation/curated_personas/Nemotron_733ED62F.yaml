    to New Orleans and Memphis'']'
  career_goals: Shauna aims to move into a regional sales manager role within the next three years, overseeing a multi‑state territory and driving her team to achieve top‑tier performance. She seeks to
    regularly rank within the top five percent of national sales leaders, qualify for elite recognitions such as the President's Club, and spearhead the adoption of digital sales tools across her organization.
    Parallel to her professional advancement, she plans to complete a bachelor's degree in Business Administration to broaden her strategic perspective. Long‑term, she envisions transitioning to a consultancy
    role where she can leverage her industry expertise to advise multiple manufacturers and mentor emerging sales talent.
