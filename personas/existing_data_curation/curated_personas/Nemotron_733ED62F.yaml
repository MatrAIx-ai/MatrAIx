personas:
  professional: Shauna Easterling is a senior B2B sales executive in wholesale manufacturing who blends data‑driven market research with a curiosity for new product technologies, consistently exceeds quota
    by leveraging meticulous Salesforce pipeline forecasting, advanced Excel models, and a competitive yet collaborative coaching style that mentors junior staff while eyeing a regional sales manager promotion.
  sports: Shauna Easterling cheers for the New Orleans Saints and LSU Tigers, competes in the local Louisiana Bass Anglers Society’s spring tournament, attends weekly yoga classes at a downtown studio,
    and maintains a summer habit of early‑morning jogs along the Atchafalaya Basin trail.
  arts: Shauna Easterling finds inspiration in zydeco legends like Buckwheat Zydeco and country hits from Chris Stapleton, relaxes quilting while listening to Rebirth Brass Band, and unwinds with business
    biographies such as “Shoe Dog” and Southern historical novels like “The Kitchen House.”
  travel: Shauna Easterling favors spontaneous three‑day road trips to New Orleans for shrimp étouffée and Memphis for blues guitar nights, plans itineraries around regional food festivals, and dreams of
    a future culinary tour of Austin’s taco scene while balancing work travel constraints.
  culinary: Shauna Easterling is an avid home cook who perfects smoked Andouille sausage, slow‑cooks gumbo with heirloom tomatoes and peppers from her garden, experiments with Cajun spice blends, and proudly
    serves her signature smoked brisket with a side of homemade okra relish.
  core: Shauna Easterling is a data‑driven sales powerhouse who balances competitive ambition with a love for fishing, gumbo, and quilting, while occasionally forgetting dental appointments and splurging
    on weekend culinary experiments.
background:
  cultural: Shauna was born and raised in Bunkie, a close‑knit community in central Louisiana. Her family’s Anglo‑American roots intersect with the region’s French‑Cajun heritage, giving her exposure to
    Southern hospitality, Creole culinary traditions, and a strong sense of community. She grew up attending a Southern Baptist church, participating in events such as the Bunkie Riverfest, local high‑school
    football games, and farmer’s markets. The rural environment fostered values of self‑reliance, hard work, and personal responsibility, while the local culture emphasized politeness, modest directness,
    and a pragmatic outlook on life. Though she has remained unmarried, Shauna maintains close ties with extended family and neighbors, and she proudly supports regional customs, from the love of spicy
    food to the rhythm of zydeco music.
