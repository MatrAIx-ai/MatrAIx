personas:
  professional: A seasoned commercial driver, Oscar Mattey, blends his class B CDL expertise, bilingual fluency, and sales savvy to deliver timely freight across southern Louisiana while constantly tweaking
    routes for efficiency, and they pursue a Class A upgrade and refrigerated specialization with the same practical curiosity that fuels their mechanical tinkering.
  sports: A sports‑enthusiast, Oscar Mattey plays pickup basketball at the local gym, follows the New Orleans Saints and Louisiana State Tigers football teams, supports the New Orleans Pelicans during NBA
    season, and spends leisurely weekends fishing the Atchafalaya Basin and hunting waterfowl, balancing team loyalty with a personal love for outdoor recreation, and they relish the camaraderie of each
    activity.
  arts: Artistically, Oscar Mattey strums a six‑string guitar to zydeco legends like Clifton Chenier and BeauSoleil at community gatherings, dances to Cajun rhythms at Mardi Gras celebrations, and occasionally
    grooves to Latin pop icons like Juan Luis Guerra, finding music a bridge between his bilingual roots and southern festive spirit, and they often practice new riffs while the truck idles.
  travel: Travel‑wise, Oscar Mattey prefers self‑planned road trips that blend work routes with scenic detours, having explored the historic French Quarter of New Orleans, the coastal marshes of the Gulf
    Islands National Seashore, and dreaming of a cross‑border adventure to Panama’s Pacific ports to study logistics firsthand, and they keep a detailed map‑note journal of every stop.
  culinary: Culinary‑wise, Oscar Mattey cooks hearty pupusas stuffed with loroco and cheese, savory baleadas layered with refried beans and crema, and Southern staples like gumbo spiced with filé powder
    and jambalaya with Andouille sausage, showcasing a modestly advanced kitchen skill set that they showcase at family barbecues and church potlucks, and they never miss an opportunity to pair each dish
    with a home‑made salsa.
  core: Oscar Mattey is a bilingual trucker who fuses relentless curiosity about engines with community‑driven hospitality, balancing meticulous route planning with occasional impulsive auto‑parts splurges
    and a habit of humming zydeco tunes while navigating the highway, and they view each mile as a chance to blend tradition and ambition.
background:
  cultural: 'Oscar grew up in a bicultural household in Saint Martinville, Louisiana. His parents immigrated from Honduras, preserving Spanish as the language of the home and celebrating Honduran holidays
    such as Día de la Independencia and Semana Santa. The local Cajun and Creole culture also shaped his upbringing: he attended the Catholic parish school, participated in community festivals like the
    Saint Martinville Mardi Gras parade, and developed an appreciation for Louisiana cuisine, zydeco music, and French‑influenced traditions. This blend of Honduran family values—emphasis on close‑knit
    community, hospitality, and hard work—and Southern Louisiana’s communal spirit informs his worldview and daily interactions.'
attributes:
  skills: '[''Commercial Driving (Class B CDL)'', ''Vehicle Maintenance & Basic Repairs'', ''Route Planning & GPS Navigation'', ''Customer Service & Sales Negotiation'', ''Bilingual Communication (English/Spanish)'',
