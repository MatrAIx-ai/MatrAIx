  hobbies: '[''Playing Guitar (Cajun/Zydeco)'', ''Dancing (Zydeco & Salsa)'', ''Cooking Honduran Cuisine'', ''Fishing in Atchafalaya Basin'', ''Weekend Hunting Trips'', ''Watching Soccer and Football'',
    ''Playing Basketball'', ''Volunteering with Church Youth Group'', ''Automotive Tinkering'']'
  career_goals: Oscar aims to secure a full‑time position as a long‑haul truck driver with a reputable logistics company, eventually obtaining a Class A CDL and specializing in refrigerated freight. He
    aspires to transition into fleet management, leveraging his on‑the‑road experience and sales acumen to oversee driver schedules, optimize routes, and improve profitability. In the longer term, he dreams
    of starting his own regional trucking and delivery service that caters to both local businesses in Iberia Parish and cross‑border trade with Central America, providing employment opportunities for other
    bilingual workers. He also plans to complete his GED and take courses in logistics and business management.
