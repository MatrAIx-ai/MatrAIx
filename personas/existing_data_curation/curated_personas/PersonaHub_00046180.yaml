persona_description: A professional reader who is interested in the impact of fungi on ancient civilizations, particularly those in Europe, the Mediterranean, and the Near East. This reader is likely to
  be a mycologist, plant pathologist, historian, folklorist, plant breeder, anthropologist, or ethnobotanist who is interested in the co-evolution of plants, fungi, and humans from the Neolithic to the
  Middle Ages. This reader is also likely to be familiar with the methodologies for investigating the co-evolution of plants and fungi and is interested in the interdisciplinary approach of this book.
