  career_goals: Vishwanath aspires to merge his artistic talent with his technical curiosity into a future career as a creative technologist or concept artist for video games, where he can work independently
    on immersive experiences. In the short term, he aims to win a local chess tournament, develop a small video game that showcases his programming and storytelling skills, and assemble an online portfolio
    of his artwork. He hopes to attend a specialized STEM‑arts magnet program in high school to deepen his expertise while preserving his preference for focused, quiet work. Ultimately, he seeks a profession
    that rewards merit, offers clear objectives, and allows him to contribute innovative ideas with minimal social strain.
