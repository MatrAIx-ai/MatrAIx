personas:
  professional: Vishwanath Raghavan is a budding digital illustrator and junior game developer, whose precise sketching talent, love of puzzle solving, and competitive drive push them to master Python and
    Scratch in solitary, focused sessions.
  sports: Vishwanath Raghavan prefers low‑key physical activity such as solo swimming at the community pool and weekend hikes in nearby parks, while cheering on the local junior soccer team, the Redwood
    Rangers, and admiring the professional soccer club Seattle Sounders from afar, reflecting a balance of solitary fitness and occasional team enthusiasm.
  arts: Vishwanath Raghavan channels a vivid imagination into hand‑drawn fantasy landscapes and tablet‑based digital art, draws inspiration from the cinematic worlds of Hayao Miyazaki, the atmospheric scores
    of sitar virtuoso Ravi Shankar, and classic fantasy novels like Frank Herbert’s Dune, weaving these influences into weekly sketchbook sessions that shape their creative identity.
  travel: Vishwanath Raghavan enjoys carefully planned day trips to nearby state parks and interactive science museums, dreams of a family vacation to the Louvre in Paris to study the art of perspective,
    and hopes to trek the bamboo forest of Arashiyama in Kyoto one day, preferring low‑key, educational adventures that fit within a modest family travel budget.
  culinary: Vishwanath Raghavan delights in a balanced palate that ranges from homemade margherita pizza topped with fresh basil to experimenting with simple sushi rolls using nori and avocado, often attempting
    to add a pinch of turmeric or a drizzle of soy‑ginger glaze to snack‑time noodles, while their cooking skill sits at the confident beginner level, thriving in the kitchen under parental guidance.
  core: Vishwanath Raghavan is a quietly competitive 11‑year‑old whose imagination runs wild in sketchbooks, whose penchant for solitary puzzles is matched only by occasional bouts of anxiety that drive
    them to meticulously plan every creative project.
background:
  cultural: Vishwanath's family hails from the Tamil‑speaking regions of South India, and they maintain strong cultural traditions in Fresh Meadows, Queens. At home, English and Tamil intermix with Hindi
    phrases, and meals often feature dosa, sambar, biryani, and other South Asian dishes. The household celebrates major festivals such as Diwali, Pongal, and Navratri with lighting oil lamps, sharing sweets,
    and performing family pujas. He attends a local South Asian cultural center where he occasionally watches classical dance performances and learns about Indian epics like the Ramayana and Mahabharata.
    Growing up in a multicultural New York neighborhood, he blends his South Asian heritage with diverse influences from the surrounding community.
