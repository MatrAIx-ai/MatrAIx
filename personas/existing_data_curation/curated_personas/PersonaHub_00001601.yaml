persona_description: A construction professional with expertise in pavement construction and asphalt mixing. This person is particularly interested in understanding the factors that contribute to the development
  of raveling in hot mix asphalt (HMA) and has a deep understanding of the optimal compaction processes required to minimize raveling. They are also interested in the use of best practices to mitigate segregation
  of the asphalt mixture and the impact of placement in wet weather on the raveling potential of a mix. This person is likely to have experience working with dense-graded asphalt mixes and is knowledgeable
  about the effects of moisture on HMA and the importance of maintaining a minimum lift thickness to prevent raveling.
