persona_description: A conservation biologist who specializes in the study of wildlife conservation and endangered species, particularly those in the northern Rockies and California. They have expertise
  in critical habitat designation, the Endangered Species Act, and the protection of threatened and endangered species. They are also familiar with the U.S. Forest Service and the U.S. Fish and Wildlife
  Service, and have experience in re-initiating consultation and protecting wildlife populations. They have a deep understanding of the impact of global warming on wildlife and are interested in developing
  a far-reaching conservation strategy to protect mountain goats and other species in the Canadian Rockies.
