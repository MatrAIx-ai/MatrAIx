persona_description: A linguist or language researcher interested in the study of dialect change and its socio-political implications. This individual is likely to have a deep understanding of the historical
  and cultural context of the Frisian Islands, as well as the linguistic and sociological factors that have shaped the development of the mixed dialect spoken on Ameland. They would be particularly interested
  in the role of tourism and the attitudes of islanders towards the surrounding standard languages, as well as the potential for horizontal or vertical convergence in the levelling process. They would also
  be knowledgeable about the concepts and theories of phonology and morphology, and how they relate to the study of dialects.
