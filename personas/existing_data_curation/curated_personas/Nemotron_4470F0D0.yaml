  career_goals: Zachary aims to become a professional concept artist and graphic designer, ultimately contributing to the video‑game or film industry. He hopes to attend a top art or design school, such
    as the Rhode Island School of Design, where he can refine his visual storytelling skills. Long‑term, he envisions leading creative projects that blend art with user experience, creating inclusive and
    emotionally resonant designs. His ambition is driven by a desire for excellence, meaningful collaboration, and the ability to make a positive impact through visual media.
