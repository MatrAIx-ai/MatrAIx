persona_description: A researcher or historian interested in maritime activity, particularly in the XIX and XX centuries. This individual is familiar with the importance of maritime activity in Dutch society
  and has a keen interest in the documentation of this activity through newspapers. They are skilled in record linkage and article classification, and have a background in digital humanities. They are likely
  to be interested in the Dutch Ships and Sailors Linked Data Cloud project and are looking for ways to enrich historical ship records with links to newspaper archives.
