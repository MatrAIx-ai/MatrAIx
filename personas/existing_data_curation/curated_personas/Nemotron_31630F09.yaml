  hobbies: '["Visiting art galleries", "Photography", "Listening to jazz and classic hip‑hop", "Cooking Southern soul‑food", "Car restoration", "Mentoring at community youth center", "Walking along Lake
    Erie", "Playing chess", "Reading technology and science articles"]'
  career_goals: Lester aims to advance from a stocker role to a supervisory position within the next three years, pursuing a Certified Supply Chain Professional (CSCP) credential and additional training
    in logistics analytics. He envisions leading a team that implements efficiency projects, reducing order turnaround time and waste. Long‑term, he hopes to leverage his experience and community ties to
    launch a small, family‑run e‑commerce fulfillment service that supports local artisans, merging his logistical expertise with his love for art and entrepreneurship.
