personas:
  professional: Helen Lisan, a 46‑year‑old sheet‑metal veteran with over 20 years of MIG, TIG, and stick welding experience, blends industrial precision with a budding metal‑sculpture practice, leveraging
    strong problem‑solving and mentorship skills to push for a journeyman certification and a future foreperson role that will also seed a boutique art‑hardware workshop.
  sports: Helen Lisan, a 46‑year‑old outdoor enthusiast, enjoys weekend hikes along the Sacramento River trail, fervently supports the Sacramento Republic FC soccer team, and rides with a mixed‑age cycling
    club that meets for Saturday rides through Yolo County’s rolling vineyards.
  arts: Helen Lisan, 46, frequently visits the Crocker Art Museum and SFMOMA, draws inspiration from Anish Kapoor’s monumental metal works, sketches bronze‑like sculptures during gallery tours, and volunteers
    at the Woodland Arts Center teaching basic welding techniques to hobbyists.
  travel: Helen Lisan, at 46, prefers road‑trip adventures that combine natural scenery with cultural stops, having explored Yosemite’s granite cliffs, the vineyards of Napa, and a week‑long art‑focused
    getaway to Barcelona’s Gothic Quarter, while budgeting future visits to Kyoto’s metal‑craft markets.
  culinary: Helen Lisan, a 46‑year‑old intermediate home cook, loves farm‑to‑table meals such as rosemary‑roasted potatoes with grilled heirloom tomatoes, harvest‑season stir‑fry with bok choy and fresh
    basil, and experiments with locally sourced goat cheese in salads, often harvesting ingredients directly from their own vegetable garden.
  core: Helen Lisan, 46, merges gritty industrial expertise with a quiet passion for metal art, balances meticulous budgeting with occasional splurges on welding gear, tackles health issues head‑on, and
    channels curiosity into every hike, cycling ride, and creative project.
background:
  cultural: Helen was raised in a middle-class, predominantly white, working-class community in the Central Valley. Her family valued hard work, self-reliance, and practicality, traditions that were reinforced
    by the agricultural and manufacturing culture of Yolo County. Growing up near the farm fields and small towns of Woodland, she developed an appreciation for both the region's natural landscape and its
    close-knit community events, such as county fairs, farmers' markets, and local church gatherings. While her cultural heritage is rooted in mainstream American values, Helen's exposure to a diverse population
    in the greater Sacramento area has broadened her perspective, fostering an openness to varied artistic expressions and unconventional ideas.
