  hobbies: '[''Visiting art galleries and museums'', ''Sketching and design'', ''DIY home renovation'', ''Woodworking'', ''Pottery'', ''Reading science-fiction and historical nonfiction'', ''Hiking Sacramento
    River trails'', ''Gardening'', ''Community art workshops'']'
  career_goals: Helen aims to earn a certified journeyman welder credential and eventually become a foreperson on the shop floor, overseeing larger projects and implementing efficiency improvements. She
    is interested in opening a small workshop where she can produce custom metal art pieces and functional hardware for local businesses and homeowners. Mentoring the next generation of sheet-metal workers
    is also a priority; she hopes to develop a structured apprenticeship program at her plant. Long-term, Helen envisions a hybrid career that combines her technical expertise with her artistic side, perhaps
    collaborating with local designers to create bespoke metal installations for public spaces in the Sacramento-Yolo region.
