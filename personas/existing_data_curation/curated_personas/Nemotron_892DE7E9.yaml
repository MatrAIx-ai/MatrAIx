  hobbies: '[''Sketching'', ''Watercolor painting'', ''Photography'', ''Hiking'', ''Volunteer community clean‑ups'', ''Community theater'', ''Knitting and crochet'', ''DIY crafts'', ''Attending art fairs
    and festivals'', ''Reading graphic novels'', ''Curating music playlists'', ''Organizing art workshops at the library'']'
  career_goals: Ashlin aspires to pursue higher education in the visual arts or community development, with the long‑term goal of becoming a community arts coordinator or youth program director in her hometown
    or a similar rural setting. She dreams of creating inclusive art workshops that empower local youth, using creative expression to foster social cohesion. In the medium term, she plans to obtain a bachelor’s
    degree in Fine Arts, Art Education, or Social Work, gain experience through internships at regional museums or non‑profit organizations, and eventually lead initiatives that blend artistic practice
    with community outreach. She also envisions opening a collaborative studio space that serves as a hub for workshops, exhibitions, and cultural events.
