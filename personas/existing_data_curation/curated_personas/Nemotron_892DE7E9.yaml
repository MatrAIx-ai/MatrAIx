personas:
  professional: Ashlin Guyton is a high‑school student and budding community arts coordinator, whose curiosity for visual storytelling and talent for rallying peers into collaborative projects enable them
    to design inclusive art workshops that blend sketching, photography, and youth mentorship, while their calm resilience keeps event logistics on track.
  sports: Ashlin Guyton stays active through seasonal hikes with the Mora Trail Runners, weekly cross‑country runs on the high‑school team, and casual soccer matches at the Mora Youth Soccer Club, while
    cheering on the Minnesota Twins and Minnesota Timberwolves on game nights, though they sometimes skip workouts when a new art project demands late‑night crafting.
  arts: Ashlin Guyton weaves a tapestry of artistic expression by painting Mora’s natural vistas in watercolor reminiscent of Andrew Wyeth, snapping photos inspired by Ansel Adams, curating indie‑folk playlists
    that feature Bon Iver, Sufjan Siverson, and The Head and the Heart, volunteering in community theater productions of Lin‑Manuel Miranda’s works, and immersing themselves in graphic novels by Marjane
    Satrapi and Alan Moore.
  travel: Ashlin Guyton favors low‑key, nature‑centric getaways, often organizing weekend hikes to the Boundary Waters and day trips to Lake Superior’s North Shore, while dreaming of a budget‑friendly backpacking
    tour across Italy’s Tuscan art towns and a solo museum‑focused pilgrimage to Paris, blending meticulous itinerary work on Google Docs with spur‑of‑the‑moment detours to roadside craft fairs.
  culinary: Ashlin Guyton enjoys farm‑to‑table meals, often whipping up lemon‑garlic roasted cauliflower, quinoa‑stuffed bell peppers, and herb‑infused oat cookies baked with locally sourced honey and oat
    flour, while occasionally treating friends to fresh lavender‑scented iced tea during weekend art‑and‑food gatherings.
  core: Ashlin Guyton blends a calm, resilient spirit with a boundless curiosity for art and community, turning every sketch, hike, and playlist into a collaborative experience, all while occasionally staying
    up far past midnight to finish a crochet project and forgetting to set an alarm.
background:
  cultural: Ashlin was raised in Mora, a small city in Kanabec County, Minnesota, within a predominantly white, Midwestern community that values close‑knit relationships and outdoor life. The region’s cultural
    fabric includes traditions from Scandinavian and Northern European settlers, evident in local festivals, food, and seasonal celebrations. Growing up, she was immersed in community activities such as
    county fairs, potluck gatherings, and volunteer projects that emphasized cooperation and mutual support. The surrounding natural landscape—lakes, forests, and farmlands—shaped her appreciation for nature
    and inspired her artistic pursuits. This environment fostered her collaborative spirit, love for DIY crafts, and commitment to creating inclusive, community‑oriented experiences.
