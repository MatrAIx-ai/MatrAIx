    Family'']'
  career_goals: Looking ahead, Landon aims to transition from day-to-day driving to a leadership role within the logistics sector. He plans to leverage his on‑road experience and sales acumen to become
    a fleet supervisor or regional operations manager, overseeing driver performance, safety metrics, and route efficiency. Over the next five years, he hopes to obtain his Certified Professional Truck
    Driver (CPTD) designation and complete a business management certificate, positioning himself to eventually launch an independent freight brokerage that combines his practical knowledge with strategic
    sales. He also seeks to mentor younger drivers, fostering a culture of safety and professionalism while ensuring his family's financial stability and work‑life balance.
