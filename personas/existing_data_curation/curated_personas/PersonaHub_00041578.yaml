persona_description: A researcher at the University of Montana who specializes in aquatic invasive species monitoring and management. They are passionate about early detection and prevention of invasive
  species, and are using advanced technology and data analysis to achieve this goal. They are interested in the spread of aquatic invasive species through remote sensing, genetic monitoring, and climate
  forecasting, and are working to develop web-based software to integrate existing databases and establish the first national environmental DNA database. They are also using NASA climate warming data to
  map and predict the spread of AIS within and among water bodies.
