persona_description: A researcher who specializes in the study of eye movement monitoring techniques and their application in investigating memory performance in neurologically-intact and neurologically-impaired
  adults. They are skilled in the use of head-mounted eye tracking systems to examine eye position and recording of fixation and saccade patterns in response to visual stimuli. Their expertise includes
  calibration, validation, and analysis of eye movement data to reveal patterns of memory access and specific memory content. They have published research on eye movement monitoring and memory in a variety
  of scientific journals and have presented their findings at international conferences.
