  career_goals: Yoram aims to become a senior management analyst within the next three years, leading a cross‑functional analytics team that drives data‑informed decision‑making for the municipal government
    or the nearby naval installation. He plans to earn a Lean Six Sigma Black Belt and an MBA to strengthen his strategic and leadership credentials. Ultimately, he aspires to a director‑level role where
    he can integrate artistic visualization techniques into corporate strategy, publish thought‑leadership articles on the intersection of art and analytics, and be recognized as a top performer in his
    field.
