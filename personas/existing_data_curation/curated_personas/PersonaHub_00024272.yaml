persona_description: A researcher in the field of neurodegenerative diseases, particularly Alzheimer's disease and Parkinson's disease. They are interested in the etiology of these diseases, the impact
  of environmental factors, and the potential use of cerebral organoids in research. They are familiar with the various neurotransmitter systems and their role in the progression of these diseases, and
  are interested in the use of pharmacological interventions to alleviate symptoms. They are also interested in the use of chemogenetic methods to manipulate neuronal activity and understand the brain circuits
  associated with addiction.
