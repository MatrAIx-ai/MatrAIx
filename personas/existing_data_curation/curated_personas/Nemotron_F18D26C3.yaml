personas:
  professional: Amanda Muradian, a meticulous computer support specialist with a knack for documenting step‑by‑step resolutions and swift improvisation on the fly, they leverage their routine‑driven ticket
    workflow, basic scripting, and clear communication to consistently meet users’ Windows and macOS woes while charting a path toward senior IT support, certifications, and eventual leadership of a small
    team.
  sports: Amanda Muradian, an avid weekend hiker who subscribes to the San Diego Hiking Society’s weekly trail schedule, they occasionally detour for hidden vistas in Cleveland National Forest, root for
    the San Diego Padres during baseball season, and join a casual beach volleyball meetup with friends, balancing structured exercise with spontaneous outdoor exploration.
  arts: Amanda Muradian, a fan of indie video game soundtracks and board‑game strategy nights, they regularly stream music by Tame Impala and scores from the game Celeste, enjoy the cinematic storytelling
    of Christopher Nolan, and make it a point to attend the annual San Diego Comic‑Con art showcase, letting creative expression color both their leisure and problem‑solving mindset.
  travel: Amanda Muradian, who plans brief road‑trip itineraries to national parks like Yosemite and Joshua Tree using a spreadsheet but leaves room for impromptu detours, they dream of cherry‑blossom season
    in Kyoto and the historic streets of Barcelona, and balance weekend getaways with a limited budget that prioritizes affordable Airbnb stays over luxury hotels.
  culinary: Amanda Muradian, a disciplined home cook who rotates classic American comfort meals such as meatloaf, mac and cheese, and roasted chicken with family heritage grain pilaf on Tuesdays, they experiment
    with seasonal produce like heirloom tomatoes and rosemary‑infused olive oil, and occasionally treat themselves to homemade kombucha or artisanal cheese boards, yet admit to sometimes over‑seasoning
    in a burst of spontaneity.
  core: Amanda Muradian blends a love for routine and a taste for spontaneous challenges, they tackle IT support with methodical precision while sprinkling their life with impromptu hikes, gadget tinkering,
    and flavorful cooking experiments.
background:
  cultural: Amanda comes from a second‑generation Armenian‑American family. Though identified as white in census terms, her household preserves Armenian cultural traditions such as celebrating Vardavar,
    cooking dishes like dolma and baklava, and occasionally speaking Armenian at family gatherings. Growing up in Hemet, California, she was immersed in a suburban, culturally diverse environment that blends
    West Coast lifestyle with her family's strong emphasis on education, community service, and modest, practical values. She participates in both local community events and Armenian cultural festivals,
    giving her a balanced bicultural identity.
attributes:
  skills: '[''Technical troubleshooting'', ''Windows and macOS support'', ''Network fundamentals'', ''Help desk ticketing (ServiceNow, Zendesk)'', ''Remote assistance tools'', ''Basic scripting (PowerShell,
    Bash)'', ''Active Directory management'', ''Customer communication'', ''ITIL incident management'', ''Hardware repair and maintenance'', ''Documentation and knowledge‑base creation'']'
  hobbies: '[''Cooking (American and Armenian cuisine)'', ''Hiking in Cleveland National Forest'', ''Puzzle video games (e.g., Portal, The Witness)'', ''Strategy board games (e.g., Catan, Ticket to Ride)'',
    ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Reading tech blogs and sci‑fi novels'', ''Yoga and mindfulness practice'']'
  career_goals: Amanda aims to progress from her current computer support specialist role to a senior IT support or service‑management position within the next three to five years. She plans to earn industry
    certifications such as CompTIA A+, Network+, Security+, and to complete a Cisco CCNA to broaden her networking expertise. Her long‑term ambition is to lead a small support team, implement streamlined
    ticket‑resolution workflows, and eventually transition into a network administrator or cybersecurity analyst role, where she can balance routine system maintenance with occasional unexpected challenges.
    She also hopes to pursue a part‑time master's in information technology to deepen her strategic and managerial skills while maintaining a stable work‑life balance.
