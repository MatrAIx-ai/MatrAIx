personas:
  professional: Ronald Mcbride is a results-driven sales manager in oilfield services who builds rigid sales processes, leverages data analytics for revenue forecasting, and leads their team with a calm,
    competitive edge that thrives under tight deadlines, and they are known for staying composed under pressure.
  sports: Ronald Mcbride is a dedicated Texas Rangers fan who attends most home games, supports the local rodeo circuit, belongs to a regional hunting club, fits weight-lifting into a four-day split at
    the community gym, and they schedule seasonal fishing trips to Lake Texoma with a tight circle of friends.
  arts: Ronald Mcbride enjoys classic country music, frequently listening to George Strait and Willie Nelson while restoring his pickup, visits the local museum’s oil-history exhibit on weekends, and they
    read non-fiction history and business biographies that shape their strategic mindset.
  travel: Ronald Mcbride prefers low-key road trips across West Texas, often camping near oil fields and hunting lodges, dreams of a guided fishing expedition to Alaska’s Kenai River, and they plan vacations
    around the school calendar to avoid disrupting his mentorship schedule with high-school students.
  culinary: Ronald Mcbride favors hearty Texas BBQ, regularly smoking brisket with a coffee-rub, perfecting a side of jalapeno-cheddar cornbread, and enjoys cooking fresh catfish caught on his fishing trips,
    though they occasionally over-season dishes in pursuit of bold flavors.
  core: Ronald Mcbride blends a disciplined, data-driven sales mindset with a solitary, rugged lifestyle, balancing methodical investment moves in oil markets with a quiet penchant for classic pickup restoration,
    and they rarely let stress or anxiety disturb their steady routine.
background:
  cultural: Ronald is a White Texan of Scottish‑Irish descent who was raised in Midland, a city shaped by the oil boom. The local culture emphasizes self‑reliance, hard work, and conservative values, with
    family gatherings centered around barbecue, country music, and church participation. Growing up in a modest, working‑class household, he attended the public high school before entering the workforce
    directly, developing his sales acumen on the job. His identity is tied to the independent spirit of West Texas, a strong community focus on family stability, and an appreciation for the oilfield industry's
    role in the region's economy.
attributes:
  skills: '[''Strategic sales planning'', ''Data‑driven forecasting'', ''CRM (Salesforce) administration'', ''Negotiation and contract management'', ''Team leadership and coaching'', ''Competitive market
