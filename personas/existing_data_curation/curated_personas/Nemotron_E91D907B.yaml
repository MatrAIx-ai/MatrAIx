  hobbies: '[''Mariachi dancing'', ''Bridge (competitive card games)'', ''Bingo'', ''Gardening (tomatoes, chilies)'', ''Knitting'', ''Listening to Mexican radio dramas'', ''Attending Mass and choir singing'',
    ''Watching telenovelas'', ''Reading poetry'']'
  career_goals: At 82, Grissel’s primary ambitions revolve around staying healthy, remaining independent, and deepening her role as a cultural bridge in her neighborhood. She aims to mentor younger Mexican‑American
    women in cooking and traditional crafts, lead the annual Día de los Muertos celebration at her church, and expand the senior‑center’s health‑screening program. Additionally, she hopes to document family
    recipes for future generations and travel to her hometown in Mexico each year, health permitting.
