personas:
  professional: An elder community handyman and genealogical enthusiast, Dion leverages decades of carpentry, basic plumbing, and electrical troubleshooting to serve the local church and seniors center;
    they apply methodical planning and a skeptical eye to problem‑solving while mentoring grandchildren in practical trades.
  sports: A fan of local teams, Dion follows the Charlotte Hornets and Carolina Panthers with quiet devotion, attends occasional senior bowling nights at the community center, and maintains a short daily
    walk around their garden for light cardio; they prefer gentle exercise over competitive sports but still appreciate the camaraderie of the church’s weekly shuffleboard league.
  arts: An avid listener of classic jazz and gospel, Dion often plays Miles Davis, John Coltrane, and Mahalia Jackson on a vintage record player, visits the Charlotte Symphony when possible, and enjoys
    local art galleries featuring Southern narrative paintings; they occasionally sketch their model trains in charcoal, revealing a quiet creative side.
  travel: Having toured historic sites such as Gettysburg, visited New Orleans for its musical heritage, and taken a memorable cruise to the Bahamas, Dion now dreams of a low‑key pilgrimage to the Martin
    Luther King Jr. National Historic Site in Atlanta, preferring meticulously planned itineraries, modest accommodations, and short trips that accommodate their mobility needs; they cherish the blend of
    discovery and the comfort of familiar church gatherings upon return.
  culinary: Dion is a proficient home cook who delights in preparing Southern staples such as fried catfish, collard greens simmered with smoked turkey, buttery cornbread, and peach cobbler spiced with
    cinnamon, frequently using fresh garden basil and sweet tea as signature accompaniments; while they enjoy sharing meals, they occasionally over‑salt dishes, a habit they laugh off during family gatherings.
  core: Dion, a 90‑year‑old handyman, genealogist, and jazz lover, blends meticulous organization with a quiet competitive streak, savoring quiet moments crafting woodwork and solving chess puzzles while
    they critique the world around them.
background:
  cultural: Dion’s cultural identity is rooted in his African‑American heritage and the Southern traditions of Charlotte, North Carolina. His grandparents were part of the Great Migration, bringing deep
    family stories of resilience and community building to the region. Growing up, the church served as a central pillar of his life, shaping values of fellowship, service, and musical appreciation for
    gospel and spirituals. The civil‑rights movements of the 1960s left an indelible mark on his worldview, fostering a critical and skeptical outlook toward authority while emphasizing the importance of
    personal agency. Family gatherings often revolve around shared meals of Southern comfort food, storytelling, and the oral transmission of history, which fuels his passion for genealogy. Dion’s experiences
    as a Black elder in a predominantly Black but diversifying community have instilled in him a strong sense of stewardship—he feels a responsibility to preserve cultural knowledge, mentor younger generations,
    and contribute to the vibrancy of his neighborhood.
attributes:
  skills: '["Home maintenance (carpentry, plumbing, electrical)", "Woodworking and furniture making", "Financial budgeting and planning", "Genealogical research", "Digital research (online archives)", "Mentorship
    for younger family members"]'
  hobbies: '["Reading historical non‑fiction and biographies", "Woodworking projects", "Model train building and maintenance", "Gardening (vegetables and native flowers)", "Chess and crossword puzzles",
    "Listening to jazz, blues, and gospel music", "Cooking traditional Southern cuisine", "Volunteer work at church and community center", "Genealogy research", "Exploring new technologies (tablets, digital
    archives)"]'
  career_goals: At this stage in life, Dion’s primary ambition is to preserve his legacy for future generations. He is committed to completing a detailed memoir and genealogical record that documents his
    family’s history and the broader African‑American experience in Charlotte. He also aims to continue mentoring his grandchildren and great‑grandchildren in practical trades like woodworking and basic
    home repair, ensuring those skills are passed down. Maintaining his health and independence remains a priority, as does contributing his expertise on a volunteer basis to the local community center,
    where he offers occasional handyman assistance. Finally, Dion enjoys the intellectual challenge of competition and hopes to place in the top three of the regional senior chess tournament he enters each
    year.
