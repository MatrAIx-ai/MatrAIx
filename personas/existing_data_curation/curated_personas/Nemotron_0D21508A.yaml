personas:
  professional: Lamar Hepler is an aspiring junior engineer who builds LEGO structures with meticulous step‑by‑step precision, enjoys coding organized Minecraft builds, and leads small Scouts badge projects,
    demonstrating a practical focus, love of structure, and a cooperative yet relaxed approach to commitments that they carry into all activities.
  sports: Lamar Hepler enjoys riding their bike on the town’s trail system, plays defender for the Sheridan Youth Soccer Club, cheers the Sheridan Roughriders high‑school football team on Friday nights,
    and follows the Denver Broncos for professional football, blending a love of structured team sport with individual outdoor activity that they eagerly pursue.
  arts: Lamar Hepler loves the adventurous mysteries of Percy Jackson by Rick Riordan, listens to the cinematic Minecraft soundtrack by C418 while building LEGO, and watches the LEGO official YouTube channel’s
    animated short films, reflecting an artistic taste that merges storytelling, music, and visual creativity that they cherish.
  travel: Lamar Hepler relishes weekend trips to the nearby Bighorn Mountains and annual family excursions to Yellowstone National Park, dreams of seeing the Grand Canyon, and hopes to explore Tokyo’s bustling
    streets, preferring organized itineraries with room for spontaneous nature hikes that they find both exciting and comforting.
  culinary: Lamar Hepler enjoys making cheesy macaroni, assembling homemade pepperoni pizza with extra cheese, preparing trail mix of peanuts, raisins, and chocolate chips for hikes, and experimenting with
    fresh blueberries in pancakes, favoring familiar comfort foods while occasionally trying new ingredients that they find delicious.
  core: Lamar Hepler is a practical, structure‑loving nine‑year‑old who balances meticulous LEGO builds and organized Minecraft projects with a laid‑back attitude toward chores, often forgetting to tidy
    up but never missing a chance to explore the outdoors, a habit they proudly maintain.
background:
  cultural: Lamar grew up in Sheridan, Wyoming, a small town framed by the high plains and the Bighorn Mountains. His family identifies as white American with Midwestern roots, and they value independence,
    self‑reliance and community involvement common in rural western life. He often helps his parents with gardening, pet care and occasional ranch chores, learning the rhythms of the seasons and local wildlife.
    Community events such as the Sheridan County Fair, high‑school football games and the town library’s story hour shape his sense of belonging. While he enjoys quiet time in nature, he also participates
    in small, close‑knit friend groups at school and in the local Scouts troop.
attributes:
  skills: '[''Reading comprehension (3rd‑grade)'', ''Basic arithmetic'', ''LEGO assembly and craft kits'', ''Rule‑based board game strategy'', ''Bicycle riding'', ''Simple household chores'', ''Introductory
    Scratch programming'']'
  hobbies: '[''LEGO building'', ''Bicycle riding on local trails'', ''Rock and leaf collecting'', ''Minecraft gameplay with friends'', ''Reading adventure books'', ''Scouting badge projects'']'
  career_goals: Lamar dreams of a career that lets him protect and organize the world around him while staying close to nature. He often says he wants to become a forest ranger or a wildlife rehabilitator
    because those jobs have clear duties, predictable routines, and a practical focus on caring for animals and the land. He also imagines designing his own video games one day, leveraging his enjoyment
    of structured coding in Scratch. In the short term he aims to improve his math grades, earn a merit badge in scouting related to outdoor skills, and win a local LEGO competition, which he sees as stepping
    stones toward his longer‑term goals.
