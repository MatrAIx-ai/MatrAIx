  career_goals: Kasia aims to transform Spokane County’s emergency preparedness into a benchmark of innovative, community‑driven resilience. Over the next five years she plans to launch a regional "Creative
    Preparedness Initiative" that blends art, storytelling, and immersive simulation to engage citizens, especially youth, in disaster readiness. She seeks state funding to pilot virtual‑reality hazard
    forecasting and AI‑driven risk modeling. Professionally, she aspires to become a senior advisor to the Washington State Emergency Management Division, mentor emerging emergency managers, and publish
    a guide on integrating creative thinking into emergency operations. She also targets recognition as an industry thought‑leader through conference keynotes and an award from the National Emergency Management
    Association.
