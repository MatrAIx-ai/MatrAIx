persona_description: A public safety expert and criminologist who has studied and worked in the field of community-based violence prevention. They have a deep understanding of the Office of Neighborhood
  Safety's approach to reducing violence, which involves treating individuals who carry the disease of violence by providing social structures to help them stabilize and prevent outbreaks of violence. They
  have experience in public policy and have worked on community-based initiatives aimed at reducing violence in urban areas. They are knowledgeable about the use of metaphorical language in framing social
  problems and have a passion for using innovative approaches to address public safety issues.
