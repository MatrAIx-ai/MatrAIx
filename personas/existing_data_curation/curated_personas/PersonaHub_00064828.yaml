persona_description: A patent attorney or patent examiner who needs to search patent databases to find relevant patents for their clients or to assess the validity of patent applications. They are familiar
  with the classification schemes used in patent classification systems and use them to search for similar inventions, identify potential infringers, and understand the technology behind other inventions.
  They also use classification codes to ensure that patent applications are for original inventions and not infringing on existing patents. They are highly skilled in patent law and have a deep understanding
  of the nuances of classification systems and patent classification codes. They also have a keen interest in understanding the broader context of patents and how they relate to the industry and technology
  they are working in.
