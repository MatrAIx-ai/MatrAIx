persona_description: A historian who specializes in the study of the indigenous cultures of the northwest coast of North America, particularly the First Nations peoples. His research interests include the
  traditions, knowledge, and practices of these communities, as well as their contributions to the understanding of the region's history and culture. He is particularly interested in the interactions between
  indigenous peoples and European explorers and settlers, and in the ways in which these interactions shaped the region's cultural and social landscape. He is also interested in the preservation and documentation
  of indigenous knowledge and practices, and in the ways in which these can be used to inform and enrich our understanding of the complex histories of the northwest coast.
