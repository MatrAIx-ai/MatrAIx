personas:
  professional: Marcia Mercado, a senior IT strategist known for blending humanistic insight with agile execution, leverages her curiosity and competitive edge to craft data‑driven roadmaps while her relaxed,
    sometimes chaotic planning style keeps her team adaptable and resilient under pressure.
  sports: Marcia Mercado fuels her love for the Colorado outdoors by cycling with the Front Range Cycling Club on summer weekends, volunteering as a substitute setter for the Boulder Co‑ed Volleyball League,
    and joining trail‑run events hosted by the Denver Road Runners, while cheering on the Denver Broncos, Colorado Avalanche, and Colorado Rockies.
  arts: Marcia Mercado immerses herself in contemporary fiction by Sally Rooney, philosophical tomes by Martha Nussbaum, live indie shows by Sufjan Stevens, classic films starring Tilda Swinton, and curates
    a photo journal that captures the aesthetic of Colorado's sunrise vistas.
  travel: Marcia Mercado plans spontaneous weekend getaways to nearby Rocky Mountain National Park and Craters of the Moon, while dreaming of a two‑week cultural immersion in Kyoto and a hiking adventure
    in Patagonia, balancing her love for off‑the‑beaten‑path trails with the budget constraints of her growing professional ambitions.
  culinary: Marcia Mercado experiments in the kitchen with Moroccan lamb tagine spiced with ras el hanout, Korean bibimbap featuring gochujang and crisp vegetables, and Colorado bison burgers topped with
    smoked cheddar, a skill level that blends confident sauté techniques with occasional over‑salting, and she often pairs her meals with a glass of Malbec.
  core: Marcia Mercado is a competitive, curiosity‑driven IT leader who balances a love for rugged group adventures with a habit of over‑thinking finances and an occasional disorganized approach to deadlines.
background:
  cultural: Marcia grew up in a middle‑class, white family in the American West, where a blend of traditional Anglo‑American values—self‑reliance, pragmatism, and a strong work ethic—meshes with the progressive,
    outdoors‑oriented culture of Colorado. Her upbringing emphasized community involvement, environmental stewardship, and a balance between independence and collaboration. While she benefits from the privileges
    of her background, she is conscious of diversity issues in tech and actively supports equity initiatives, integrating her heritage’s emphasis on individual achievement with a modern sense of social
    responsibility.
