  career_goals: In the next five to seven years Marcia aims to rise to a senior executive role—such as Director of Information Technology or Chief Information Officer—where she can spearhead a company‑wide
    digital transformation that embeds human‑centered design and ethical technology practices. She plans to earn an MBA or a Master’s in Information Systems to deepen her business acumen, publish thought
    pieces on the intersection of humanities and technology, and become a sought‑after speaker at industry conferences. Additionally, she is committed to cultivating a resilient, flexible IT culture that
    prioritizes employee well‑being and reduces the stress that she personally finds challenging.
