personas:
  professional: Thomas Afyouni, a 27‑year‑old Training and Development Specialist in a Midwest manufacturing firm, blends adult‑learning theory with a pragmatic love of data, designing blended e‑learning
    programs in Articulate Storyline and SAP SuccessFactors that are measured against Kirkpatrick’s Level‑3 outcomes, while coaching managers and lobbying senior leaders for performance‑based budgets, all
    driven by a competitive desire to out‑perform their peers and earn the CPLP and ATD Master Trainer badges.
  sports: Thomas Afyouni plays point guard for the Council Bluffs Rec League basketball team, cheers on the Iowa Hawkeyes and the Kansas City Chiefs on weekends, and logs Saturday hikes along the Loess
    Hills where they challenge themselves with a 10‑mile trail; their competitive nature pushes them to track personal bests in free‑throw percentage and volunteer as a youth basketball mentor during the
    off‑season.
  arts: Thomas Afyouni, an avid trivia‑night regular at the local brewery, enjoys swapping facts about behavioral science with friends while sipping a locally brewed amber ale, listens to folk‑rock artists
    like The Avett Brothers and Chris Stapleton during cooking sessions, and attends the annual Council Bluffs heritage festival where regional folk dancers and a community theater troupe perform traditional
    reels that remind them of modest, service‑oriented values.
  travel: Thomas Afyouni plans weekend escapes that balance adventure and comfort, favoring road trips to the Ozarks for kayaking, a yearly pilgrimage to Chicago’s deep‑dish pizza landmarks, and a summer
    backpacking trek through the Badlands—and they book each journey using a meticulously curated spreadsheet that factors in budget limits, work commitments, and the desire to return home for the county
    fair in October.
  culinary: Thomas Afyouni and their spouse experiment with Midwestern comfort cuisine, mastering the art of crisp fried chicken, smoked bratwurst glazed with bourbon and maple syrup, and a buttery corn
    pudding seasoned with fresh shuck‑onion; they wield a pellet grill like a lab instrument, yet occasionally over‑char the steak while multitasking on a new e‑learning module.
  core: Thomas Afyouni fuses a Midwestern work ethic with data‑driven curiosity, balancing community basketball, competitive budgeting, and a passion for grilling while they relentlessly pursue a senior
    L&D role and a reputation as the go‑to performance‑focused trainer.
background:
  cultural: Thomas grew up in a middle‑class family in the Midwest, with roots tracing back to German and Irish ancestry. The region’s emphasis on community, self‑reliance, and a strong work ethic shaped
    his pragmatic outlook. He celebrates local traditions such as county fairs, fish fries, and the Council Bluffs Heritage Festival, and retains a personal connection to the Protestant (mainly Lutheran)
    values of modesty and service. His cultural upbringing is reflected in his collaborative yet competitive spirit and his commitment to contributing to the local community.
