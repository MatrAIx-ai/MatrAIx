  hobbies: '[''Basketball (Recreation League)'', ''Trivia Night Competitions'', ''Hiking (Loess Hills, Missouri River Trails)'', ''Cooking (Midwestern Comfort Food, Grilling)'', ''Podcast Listening (Behavioral
    Science, Technology)'', ''Reading (Business, Psychology)'', ''Youth Career Mentorship'']'
  career_goals: Thomas aims to become a senior learning architect or director of learning and development within a mid‑sized corporation in the Midwest, focusing on creating blended learning solutions that
    drive measurable performance improvement. He plans to earn the Certified Professional in Learning and Performance (CPLP) and ATD Master Trainer credentials, publish thought leadership on practical learning
    technology integration, and eventually launch his own consulting practice specializing in data‑driven training programs for manufacturing and logistics firms. He also aspires to be a featured speaker
    at the ATD International Conference and mentor emerging L&D professionals.
