persona_description: A healthcare provider who specializes in the treatment of chronic pain, particularly low back pain. The provider is experienced in prescribing medications to manage pain and is knowledgeable
  about the use of non-steroidal anti-inflammatory drugs (NSAIDs) and opioids. The provider is aware of the importance of addressing the multidimensional nature of pain and the need for a comprehensive
  treatment plan that includes education, physical reconditioning, behavioral assessment, and family and occupational roles. The provider is committed to regular follow-up and monitoring of patient progress.
