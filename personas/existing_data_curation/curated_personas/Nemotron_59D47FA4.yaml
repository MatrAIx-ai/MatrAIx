personas:
  professional: Wing Yan, a retired engineer with a graduate background in computer science and electrical engineering, channels their deep software development and embedded systems expertise into open‑source
    hardware contributions and tutorial videos, while their competitive Go mindset pushes them to set ambitious project goals despite a habit of flexible, occasionally haphazard, planning.
  sports: Wing Yan hikes the Santa Clara hills with a local outdoor club, follows the San Jose Sharks in the NHL and occasionally joins a weekend pickleball league, balancing solitary nature walks with
    occasional competitive sports, though their competitive streak makes them a scrappy pickleball opponent.
  arts: Wing Yan devours classic science‑fiction novels by Isaac Asimov and William Gibson, enjoys the synth‑dense scores of Vangelis and the electronic beats of Daft Punk, and they attend occasional screenings
    of Blade Runner, finding the intersection of speculative art and technology a core inspiration for their maker projects.
  travel: Wing Yan prefers loosely planned trips that mix tech festivals with nature hikes, having explored Kyoto’s historic temples and the Redwood forests of Northern California, and they dream of trekking
    the Inca Trail to Machu Picchu while juggling family constraints.
  culinary: Wing Yan cultivates a backyard garden of tomatoes, kale, and zucchinis, and they translate those harvests into flavorful stir‑fries with tofu, miso, and chili paste, while also indulging in
    quick pepperoni pizza nights and experimenting with homemade kimchi for probiotic boosts.
  core: Wing Yan merges a maker's curiosity with a mindful yet anxiety‑prone temperament, juggling spontaneous robotics projects and occasional budgeting lapses, while they let their competitive Go mindset
    fuel relentless tinkering despite a penchant for disorganized planning.
background:
  cultural: Wing Yan was born to immigrant parents from Taiwan and grew up in a bilingual household in the Bay Area. His upbringing combined the Confucian emphasis on education, respect for elders, and
    community harmony with the entrepreneurial spirit of Silicon Valley. He celebrates traditional festivals such as Lunar New Year and the Mid-Autumn Festival, and often prepares family recipes passed
    down through generations. At the same time, his daily life reflects a blend of East Asian values—such as humility and diligence—with a Western appreciation for individual curiosity and flexibility.
