  career_goals: Although retired from full-time employment, Wing Yan aims to stay intellectually active by contributing to open-source hardware projects, publishing tutorial videos that bridge cutting-edge
    technology with practical DIY applications, and mentoring the next generation of engineers through community workshops. He also aspires to complete a personal project—a low-cost, solar-powered greenhouse
    controller—to blend his technical skills with his interest in sustainable gardening. Managing his anxiety through a balanced routine and maintaining financial stability for his family remain underlying
    priorities.
