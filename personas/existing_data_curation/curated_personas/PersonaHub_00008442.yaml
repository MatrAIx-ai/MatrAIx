persona_description: A research chemist who specializes in the study of calcination reactions of limestone and Iceland spar, particularly focusing on the development of pore structure and surface area changes
  during calcination at different temperatures. The chemist is interested in the physical and chemical properties of lime and the optimal conditions for producing maximum solid-fluid reactivity in electric
  power plants. The research interests include the use of a scanning electron microscope to evaluate the pore structure and porosity of calcines, as well as the correlation between pore size and related
  surface area changes with the properties of the lime and the temperature of calcination.
