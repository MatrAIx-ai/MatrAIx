personas:
  professional: David Readlinger, a retired volunteer coordinator in Klamath Falls, channels their lifelong carpentry and native‑plant gardening expertise into community‑center event planning, using their
    compassionate, organized yet adaptable nature to knit together seniors, artists, and local tribal members for intergenerational cultural workshops.
  sports: David Readlinger, an enthusiastic supporter of the Oregon Ducks and Portland Trail Blazers, spends their spring mornings walking with the Klamath Falls Senior Hiking Club, casts a line for trout
    on Upper Klamath Lake each summer, and joins a weekly low‑impact water‑aerobics class at the senior center to stay limber, balancing their love for gentle outdoor activity with fandom for regional teams.
  arts: David Readlinger, a regular at Klamath Falls community theater productions, finds inspiration in the folk storytelling of Gregory Alan Isakov and the improvisational lyricism of jazz pianist Jason
    Moran, curates quarterly exhibitions featuring local Native American artisans alongside works by regional painter Thomas Kipp, and they frequently discuss the visual narratives of Edward Hopper with
    their book club.
  travel: David Readlinger prefers leisurely, well‑planned road trips that blend natural scenery with cultural immersion, revisiting Crater Lake National Park each fall for photography, taking a yearly
    pilgrimage to the Santa Fe art scene to explore Native American galleries, and they dream of a spring visit to Japan’s historic temples to study garden design.
  culinary: David Readlinger, a competent home cook, often prepares trout almondine with fresh Upper Klamath Lake catch, pairs it with sage‑roasted potatoes and seasonal serviceberry compote, and they enjoy
    visiting the Klamath Falls farmers market to pick up Oregon cheeses, hazelnuts, and heirloom tomatoes for their weekly communal potluck.
  core: David Readlinger, a spry 71‑year‑old with a perpetual curiosity for art and nature, weaves their woodworking, gardening, and volunteer passions into a daily rhythm of coffee‑house conversations,
    occasional fishing trips, and a habit of humming folk tunes while pruning native shrubs, even as they occasionally misplace their glasses and forget to water potted succulents.
background:
  cultural: David is a White American whose family roots trace back to Midwestern farming communities that migrated west during the mid‑20th century. He grew up in a modest household that valued hard work,
    self‑reliance, and community service, values that have carried into his life in Klamath Falls. The Pacific Northwest setting has shaped his appreciation for the region’s natural beauty and fostered
    a respect for the cultural heritage of the Klamath Tribes. He is an active member of the local Methodist congregation, which reinforces his commitment to compassion and volunteerism. While he identifies
    with mainstream American cultural norms, his experiences living in Oregon’s high desert have blended frontier pragmatism with a progressive openness to new ideas, especially in the realms of art, environmental
    stewardship, and cultural dialogue.
