  career_goals: Although retired, David aims to deepen his contributions to the Klamath Falls community. He aspires to serve as a cultural liaison, bringing together the city’s artistic groups and the local
    Native American tribes to co‑create art workshops and heritage preservation projects. He wants to document oral histories of longtime residents, eventually publishing a memoir that reflects the region’s
    evolution. Mentoring younger volunteers in event coordination and community service is another priority, ensuring the senior center’s programs continue thriving. In broader terms, David seeks to be
    a steward of local culture, a supportive neighbor to his spouse and friends, and a catalyst for intergenerational engagement.
