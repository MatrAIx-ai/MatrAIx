persona_description: A pediatrician who specializes in the diagnosis and treatment of sleep-related breathing disorders in children, particularly those who exhibit behavior problems. They are trained to
  recognize the link between loud and persistent snoring and behavior problems in young children and encourage parents to seek medical attention for their children. They are also knowledgeable about the
  link between sleep-disordered breathing and hyperactivity and are trained to recognize signs of real breathing problems at night that can be treated.
