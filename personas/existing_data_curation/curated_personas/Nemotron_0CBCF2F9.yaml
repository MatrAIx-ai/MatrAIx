personas:
  professional: Hannah Brovold is a budding junior detective who transforms the backyard into a mystery‑solving arena, using a tiny notebook to map clues, meticulously arranging evidence with colored stickers,
    and balancing their boundless curiosity with a practical, step‑by‑step method that even adults admire; they relish revisiting each case to see how the plan unfolded.
  sports: Hannah Brovold plays on the under‑6 'Lily Pad Cubs' soccer team at the community center, cheerfully follows the Seattle Seahawks for their teamwork, and participates in kids‑friendly yoga sessions
    titled 'Rainbow Flow' to stay flexible, while they occasionally throw a brief tantrum if a game doesn’t go as they envisioned.
  arts: Hannah Brovold delights in drawing Elsa and Olaf from Frozen, singing along to The Wiggles during playtime, eagerly attends the library’s weekly 'Storytime & Art' circle where they experiment with
    watercolors, and they quietly practice a few ballet moves after watching a clip of Swan Lake, using these creative outlets to calm their emotional tides.
  travel: Hannah Brovold has explored the interactive exhibits at the Children’s Museum of Indianapolis and the magical rides of Walt Disney World, is dreaming of tasting authentic gelato while twirling
    in Rome’s Piazza Navona, and they prefer family‑planned trips with a clear schedule and built‑in quiet breaks to prevent overstimulation.
  culinary: Hannah Brovold loves creamy macaroni and cheese sprinkled with extra cheddar, enjoys stirring batter for banana pancakes topped with fresh blueberries, and they take pride in assembling rainbow
    fruit kebabs with strawberries, grapes, and pineapple, though they fiercely reject any vegetable that isn’t cleverly hidden beneath cheese.
  core: Hannah Brovold is an organized little explorer whose methodical curiosity fuels imaginative detective games while their intense anxiety triggers occasional meltdowns, creating a unique blend of
    structured play and emotional sensitivity; they often rely on a trusty checklist to feel secure.
background:
  cultural: Hannah is a White American raised in Canal Winchester, Ohio, a small Midwestern town with strong community ties. Her family celebrates traditional holidays such as Thanksgiving, Christmas, and
    Fourth of July parades, and they attend local community events at the church and town park. The cultural environment emphasizes politeness, reliability, and a practical outlook, which aligns with her
    organized and methodical personality. Exposure to the rural‑suburban blend of farmland and small‑town life fosters her interest in nature and simple hands‑on activities.
