  career_goals: Even at five, Hannah loves dreaming about the future. She often says she wants to be a teacher because she enjoys helping friends learn new things, and she also imagines herself as a scientist
    who can explore how plants grow. Occasionally she mentions wanting to care for animals as a veterinarian, reflecting her compassionate side. Her ambitions are shaped by her curiosity, her desire for
    order, and her wish to make others feel safe and supported.
