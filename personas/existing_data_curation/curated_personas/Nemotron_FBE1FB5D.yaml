personas:
  professional: Wendy Hollifield, a 23‑year‑old hairstylist in Cleveland, blends meticulous precision cutting and advanced coloring with a methodical, client‑focused approach that balances creativity and
    practicality, ensuring every appointment runs on schedule while they quietly assert their vision for a calm, inclusive boutique salon.
  sports: Wendy Hollifield stays active by hiking the rolling trails of Cuyahoga Valley National Park with the local Outdoor Explorers club, attending weekly yoga classes at Serenity Studio, and cheering
    on the Cleveland Browns and Guardians while they occasionally join a casual Sunday basketball league.
  arts: Wendy Hollifield fuels their artistic side by curating DIY hair accessories inspired by contemporary fashion editorials, snapping street‑style shots reminiscent of Tim Walker’s surreal aesthetic,
    and drawing creative energy from designers like Virgil Abloh and performers such as Beyoncé.
  travel: Wendy Hollifield prefers short, purposeful getaways—spending long weekends exploring the vibrant streets of Milan for runway inspiration, taking road trips to Niagara Falls for a nature boost,
    and planning future trips to Tokyo’s Harajuku district, all while they budget through a travel‑fund spreadsheet.
  culinary: Wendy Hollifield finds solace in baking healthy treats like oat‑banana muffins, almond‑flour chocolate chip cookies, and seasonal berry crumble, favoring natural ingredients such as coconut
    oil, Greek yogurt, and locally sourced honey, and they often enjoy these creations as a quiet solo ritual.
  core: Wendy Hollifield, a 23‑year‑old hairstylist, blends an anxiety‑fueled perfectionism with a playful DIY spirit, mindful self‑care routines, and a determined vision to launch an inclusive boutique
    salon, and they constantly juggle their creative urges with practical planning.
background:
  cultural: Wendy grew up in a middle‑class white family in Cleveland, Ohio, absorbing the Midwestern values of hard work, reliability, and community involvement. Her upbringing emphasized practical education,
    weekly family meals, and participation in local church and neighborhood activities. The seasonal rhythms of the Great Lakes region influence her aesthetic sensibilities, favoring adaptable styles that
    can transition from cold winters to warm summers. This cultural backdrop nurtured her organized, methodical nature and her desire to blend curiosity with practicality in both her personal and professional
    life.
attributes:
  skills: '[''Precision Cutting'', ''Balayage and Ombré Coloring'', ''Creative Updo Styling'', ''Client Consultation and Assessment'', ''Salon Sanitation and Health Protocols'', ''Retail Product Recommendations'',
    ''Appointment Scheduling and Time Management'', ''Social Media Content Creation'', ''Basic Makeup Application'', ''Customer Relationship Management'']'
  hobbies: '[''Reading fashion and beauty magazines'', ''DIY hair accessory crafting'', ''Hiking in Cuyahoga Valley National Park'', ''Yoga and meditation'', ''Journaling'', ''Street style photography'',
    ''Cooking and baking'', ''Listening to indie music'', ''Volunteering at community beauty events'']'
  career_goals: Wendy aims to become a certified master stylist within the next three years, focusing on mastering color correction and innovative texturizing techniques. She plans to attend advanced cosmetology
    workshops and eventually complete a business management certificate to prepare for opening her own boutique salon in Cleveland that offers a calm, inclusive atmosphere for clients seeking both creativity
    and consistency. Long‑term, Wendy envisions developing a line of natural, locally sourced haircare products that reflect her practical, environmentally conscious values, and she hopes to mentor younger
    stylists entering the field.
