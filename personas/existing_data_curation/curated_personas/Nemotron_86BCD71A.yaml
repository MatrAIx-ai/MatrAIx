  hobbies: '[''Gardening (flower and vegetable)'', ''Fishing at Clearwater Harbor'', ''Birdwatching'', ''Walking along the beach'', ''Reading historical biographies'', ''Chess at the senior center'', ''Volunteering
    at the local food pantry'', ''Photography of coastal scenery'']'
  career_goals: Although retired, Michael's primary ambition is to remain a dependable pillar of the Clearwater senior community. He aims to keep local food‑distribution programs running smoothly, mentor
    newer volunteers, and ensure his own living environment stays safe, organized, and independent. He also hopes to record his life stories for future family members, preserving personal and community
    history.
