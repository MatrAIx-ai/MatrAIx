persona_description: A teacher at Frederick Bird Primary School who specializes in the 'Talk 4 Writing' approach to teaching and learning. They have a deep understanding of the curriculum, including the
  key phases of Imitation and Immersion, Invention and Invention, and the importance of daily teaching of handwriting, spelling, grammar, and punctuation. They are passionate about helping children develop
  their writing skills and creativity through the use of quality stories, non-fiction texts, and poems. They are also skilled in planning and teaching the 'Talk 4 Writing' approach, and are committed to
  underpinning their teaching with the daily teaching of these skills.
