  career_goals: Maria aims to earn a Master of Science in Nursing to become a Nurse Practitioner focusing on adult primary care, blending her curiosity for evidence‑based practice with pragmatic patient
    solutions. She plans to spearhead research on stress reduction for nurses and immigrant patients, and to publish her findings in nursing journals. A key ambition is to develop a community‑based health
    outreach program that offers Spanish‑language health literacy workshops for the Salvadoran community in Chicago. Professionally, she seeks a leadership role such as charge nurse or unit manager where
    she can implement sustainable quality‑improvement projects. Maria also hopes to create a peer‑support network for nurses coping with anxiety and burnout, and eventually transition into public‑health
    nursing to influence policy for underserved Latino populations.
