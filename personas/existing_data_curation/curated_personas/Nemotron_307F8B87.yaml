personas:
  professional: Edward Green, a seasoned personal care aide with a STEM bachelor’s degree, blends meticulous medication administration and health informatics expertise to lead structured care routines,
    while they aim for a supervisory role that integrates evidence‑based tech solutions and team mentorship.
  sports: Edward Green, a dedicated Dayton resident, regularly cheers for the Dayton Dragons baseball team and the Cincinnati Bengals, participates in a local senior hiking club that organizes trail runs
    in the summer, and they keep a modest weekly routine of morning push‑ups, embodying their loyal yet low‑key commitment to community sports.
  arts: Edward Green spends evenings at the Dayton Playhouse watching productions like 'Our Town', enjoys listening to John Prine and The National, and they occasionally dabble in watercolor painting of
    their garden, showing how the arts provide both quiet reflection and communal connection.
  travel: Edward Green prefers carefully planned road trips to nearby towns such as Mackinac Island and the Ohio River Valley, while they dream of a leisurely cruise along the Norwegian Fjords, blending
    their love for predictable itineraries with occasional yearning for distant, scenic adventures.
  culinary: Edward Green enjoys cooking hearty family‑style meals such as slow‑roasted pot roast with carrots and potatoes, homemade apple crumble with a flaky oat topping, and they take pride in growing
    fresh herbs for a savory herb‑buttered chicken, reflecting a practical yet nostalgic culinary style.
  core: Edward Green is a methodical caregiver who balances meticulous care routines, modest financial prudence, and a love of gardening and classic cars, while they occasionally neglect flossing and indulge
    in weekend woodworking projects.
background:
  cultural: Edward grew up in a Midwestern, white working‑class family in Dayton, Ohio, with roots tracing back to German and Irish ancestry. His upbringing emphasized a strong work ethic, community responsibility,
    and modesty, values reflected in the region’s Protestant Christian traditions and neighborhood gatherings. He celebrates seasonal holidays such as Thanksgiving, Fourth of July parades, and local church
    events, and he holds a deep respect for family and elder care, which informs both his personal life and his professional dedication to caregiving.
