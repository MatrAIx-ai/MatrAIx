  career_goals: Edward aims to transition into a supervisory role within the home health sector, leveraging his structured work style to oversee care teams and improve service protocols. He plans to obtain
    a Certified Nursing Assistant (CNA) credential and pursue an associate degree in health administration, positioning himself for a future as a care coordinator or training specialist. Ultimately, he
    hopes to blend his STEM background with caregiving by implementing evidence‑based practices and technology solutions that enhance patient outcomes while maintaining the compassionate, harmonious environment
    he values.
