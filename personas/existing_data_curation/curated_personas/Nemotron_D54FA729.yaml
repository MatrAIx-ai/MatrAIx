  career_goals: Sherron aims to move into a supervisory role within the next two years, leveraging her extensive field experience to lead a team of maintenance technicians. She plans to obtain certifications
    such as Certified Maintenance & Reliability Professional (CMRP) and Energy Management to broaden her expertise in sustainable building practices. Long‑term, she hopes to launch her own small contracting
    business focused on serving the Lima community, with a strong emphasis on training and employing underrepresented youth, especially women and minorities. Additionally, she is passionate about mentoring
    younger workers and delivering community workshops on home safety and energy efficiency.
