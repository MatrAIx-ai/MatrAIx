personas:
  professional: Sherron Evans is an experienced maintenance technician with three decades of hands‑on expertise in HVAC, electrical, and plumbing systems, and they are now poised to step into a supervisory
    role where their methodical planning, curiosity for emerging smart‑building tech, and assertive mentorship style will guide a team of apprentices toward sustainable, code‑compliant solutions.
  sports: Sports-wise, Sherron Evans enjoys weekend walks along the nearby rail‑trail, is a loyal fan of the Cleveland Browns and the Ohio State Buckeyes, and participates in the local senior softball league
    at the community center where they balance light competition with social camaraderie.
  arts: Arts-wise, Sherron Evans lifts their spirits by singing gospel classics like Mahalia Jackson’s “How I Got Over” in the church choir, they unwind to B.B. King’s blues on evenings after work, and
    they craft functional art through woodworking projects inspired by the rustic designs of folk artist William Morris.
  travel: Travel-wise, Sherron Evans delights in modest road trips to historic sites such as Savannah’s riverfront and the Great Smoky Mountains for hiking, they cherish a soul‑food pilgrimage to New Orleans,
    and they dream of attending a blues festival in Memphis while balancing their retirement budget and family obligations.
  culinary: Culinary-wise, Sherron Evans lovingly prepares traditional collard greens seasoned with smoked turkey, pan‑fried catfish with cornmeal crust, and sweet potato pie, they also experiment with
    quinoa‑based salads infused with fresh basil and rosemary harvested from their garden, showcasing a skill level that blends comforting nostalgia with adventurous flair.
  core: In a nutshell, Sherron Evans blends a seasoned hand‑craft mindset with a heart for community mentorship, they juggle meticulous budgeting, occasional health neglect, and a love for gospel‑blues‑infused
    cooking, all while steadfastly planning toward a sustainable contracting venture.
background:
  cultural: Sherron is a Black woman who grew up in the Midwest during the 1960s and 70s, a period that shaped her strong sense of community and resilience. Raised in a close‑knit African‑American family
    in Allen County, church, family gatherings, and local cultural traditions were central to her upbringing. These experiences reinforced values of self‑reliance, mutual support, and a deep appreciation
    for gospel music, soul cuisine, and oral storytelling. Throughout her adult life she has remained actively involved in the local Black community, participating in church events, neighborhood festivals,
    and mentorship programs that empower young people of color in trades and technical fields. Her cultural identity informs her work ethic, community service, and commitment to creating opportunities for
    the next generation.
