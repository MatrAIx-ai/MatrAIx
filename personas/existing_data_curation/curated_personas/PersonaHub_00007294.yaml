persona_description: A colonist who is dedicated to the advancement of technology and scientific research on the planet Beyond Earth. This individual is skilled in using advanced computer components made
  from firaxite, which is a strategic resource for Supremacy players. They are also knowledgeable about the properties and applications of firaxite, including its hyperconductivity and use in quantum computing,
  smart grids, power storage devices, magnetic levitation motors, and fault current inhibitors. Additionally, this colonist is aware of the importance of the electromagnets produced at near-normal temperatures
  with firaxite in mass spectrometers, SQUID microscopes, bolometers, and particle accelerators, which are vital for scientific research on Beyond Earth.
