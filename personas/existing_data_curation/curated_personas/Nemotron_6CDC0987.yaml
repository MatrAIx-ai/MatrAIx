personas:
  professional: Amparo Lopez is a civil engineer who blends meticulous structural analysis, AutoCAD, Civil 3D, and GIS expertise with a methodical, routine‑oriented work style, and they ensure every municipal
    road upgrade and water‑management project stays on schedule, meets budget constraints, and respects community priorities.
  sports: Amparo Lopez enjoys weekend hikes in the Sierra Nevada foothills as a member of the Bakersfield Trail Hikers Club, participates in the annual Bakersfield 5K charity run, and they regularly watch
    and support the Los Angeles Rams in football and the Bakersfield Condors in hockey.
  arts: Amparo Lopez immerses themselves in regional music by listening to groups such as Mariachi Vargas de Tecalitlán and Los Tigres del Norte, reads historical fiction like Ken Follett’s 'The Pillars
    of the Earth,' and they unwind by crocheting blankets inspired by folk patterns for friends.
  travel: Amparo Lopez plans trips with a balance of careful itineraries and spontaneous detours, having explored Yosemite National Park, the historic streets of San Luis Obispo, and they hope to experience
    the culinary markets of Oaxaca and the Art Nouveau architecture of Barcelona on future vacations.
  culinary: Amparo Lopez excels at preparing traditional dishes such as tamales, pozole, and chiles rellenos using fresh chilies and corn from their garden, they possess a solid home‑cooking skill set that
    blends family recipes with precise timing, though they sometimes over‑season when distracted by work calls.
  core: Amparo Lopez is a detail‑driven civil engineer who balances a routine‑focused professional life with a love for community cooking, hiking, and mentoring, while habitually over‑planning and occasionally
    forgetting to schedule personal downtime.
background:
  cultural: Amparo is a first‑generation Mexican American whose parents emigrated from Jalisco. Raised in a bilingual household in California's Central Valley, she grew up immersed in Mexican customs—celebrating
    Día de los Muertos, preparing family meals, and attending church—while also embracing the broader Californian lifestyle. Fluent in both Spanish and English, she maintains strong ties to her cultural
    heritage through community events, religious participation, and family traditions, which inform her collaborative work style and dedication to serving the local community.
attributes:
  skills: '[''Project Management'', ''Structural Design'', ''AutoCAD'', ''Civil 3D'', ''GIS Mapping'', ''Construction Planning'', ''Budgeting and Cost Estimation'', ''Regulatory Compliance'', ''Bilingual
    Communication (English/Spanish)'', ''Quality Assurance'']'
  hobbies: '[''Cooking traditional Mexican cuisine'', ''Gardening'', ''Hiking'', ''Church participation'', ''Community volunteering (STEM mentorship)'', ''Reading historical fiction'', ''Crocheting'', ''Listening
    to mariachi and norteño music'']'
  career_goals: Amparo aims to obtain her Professional Engineer (PE) license within the next two years and advance to a senior project manager role overseeing key infrastructure initiatives in Kern County,
    such as road upgrades and water management systems. She values a stable, community‑focused career and plans to later establish a small engineering consultancy that provides affordable services to local
    businesses and agricultural operations. Mentoring Hispanic women and youth in STEM is also a long‑term ambition, reflecting her commitment to giving back to her community while maintaining a healthy
    work‑life balance.
