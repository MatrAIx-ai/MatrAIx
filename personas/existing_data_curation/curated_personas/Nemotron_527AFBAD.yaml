    animal shelter'', ''family hikes in the Everglades'']'
  career_goals: Shannon envisions a future where she can protect the natural world she loves while sharing her artistic voice. She hopes to study marine biology or environmental science and combine it with
    visual arts to become an environmental artist or advocate who creates artwork that raises awareness about the Everglades and wildlife conservation. Her strong desire to help others also fuels an interest
    in becoming a children’s counselor or teacher, allowing her to support peers and promote harmony. Ultimately, she aims to pursue higher education that blends science, art, and community service, leading
    to a career that balances compassion, creativity, and stewardship of the environment.
