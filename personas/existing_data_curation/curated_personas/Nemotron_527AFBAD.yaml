personas:
  professional: Shannon Hudson, an aspiring young environmental illustrator and Scratch programmer, combines a meticulous eye for detail with boundless curiosity, channeling their love of bird‑watching
    and art into interactive stories that teach peers about local ecosystems, while their organized yet flexible approach keeps their projects on schedule.
  sports: Shannon Hudson enjoys weekend family hikes through the Everglades and plays on a local youth soccer team, cheers for the Miami Heat and the Miami Dolphins, and balances a love of outdoor exploration
    with structured practice sessions at the community pool where they work on basic swimming strokes.
  arts: Shannon Hudson immerses themselves in drawing and painting, frequently studies the works of Claude Monet and Lisa Frank for inspiration, reads fantasy novels by J.K. Rowling and mystery series by
    Rick Riordan, and listens to a mix of classical piano pieces by Mozart and contemporary pop from Billie Eilish while sketching, which fuels their creative identity.
  travel: Shannon Hudson prefers short, nature‑focused trips such as weekend camping at the Everglades National Park and day excursions to the Florida Keys, dreams of visiting the rainforest in Costa Rica
    to study exotic birds, and carefully plans each adventure using a scrapbook of maps and stickers, all while staying within family budget constraints.
  culinary: Shannon Hudson loves cooking simple dishes like homemade pizza topped with fresh basil and mozzarella, enjoys making mango smoothies with coconut milk, and has mastered whisking pancake batter
    into fun shapes, though they often forget to clean the kitchen promptly after cooking.
  core: Shannon Hudson is a curious, art‑loving 11‑year‑old who channels their compassion and worry into drawing, bird‑watching, and coding interactive stories, while balancing a disciplined savings habit
    with occasional impulsive splurges.
background:
  cultural: Shannon comes from a middle‑class Anglo‑American family living in Homestead, Florida. While her household observes common U.S. holidays such as Thanksgiving and Christmas, the multicultural
    setting of Miami‑Dade County introduces her to Hispanic and Caribbean influences. She often hears Spanish spoken in her neighborhood, enjoys Latin‑American foods like empanadas and plantains, and has
    picked up simple Spanish greetings. The nearby Everglades and its diverse wildlife inform her appreciation for nature and support her interest in conservation.
