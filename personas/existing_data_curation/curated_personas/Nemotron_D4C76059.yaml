  hobbies: '[''Watercolor painting'', ''Visiting art exhibitions'', ''Reading historical fiction'', ''Gardening (native plants)'', ''Birdwatching'', ''Crocheting and quilting'', ''Genealogy research'',
    ''Jigsaw puzzles'', ''Listening to classical music'', ''Community theater attendance'']'
  career_goals: Although retired from formal employment, Gina aims to expand her contributions to the cultural life of Charleston and Lincoln County. She plans to volunteer as a docent at the West Virginia
    State Museum, lead a weekly senior art‑appreciation class, and curate a local oral‑history project that records the stories of longtime residents. Gina also aspires to mentor younger volunteers, deepen
    her knowledge of American art movements, and travel to at least two major art exhibitions each year, such as those in Washington, D.C., and New York, while maintaining her health and family responsibilities.
