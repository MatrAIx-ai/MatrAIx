personas:
  professional: Gina Banning, a retired community organizer turned museum docent, leverages their precise budgeting, first‑aid knowledge, and compassionate counseling to run senior art‑appreciation classes,
    ensuring each session runs smoothly while their natural worry drives them to double‑check every detail.
  sports: Gina Banning enjoys low‑impact fitness by walking the Greenbrier trail, joining the local senior hikers’ club for weekend bird‑watching hikes, cheering for the West Virginia Mountaineers football
    team each fall, and occasionally attending a Columbus Blue Jackets hockey game when traveling, but they avoid high‑intensity workouts, preferring gentle stretching routines.
  arts: Gina Banning immerses themselves in the arts by creating watercolors inspired by Winslow Homer and Appalachian folk motifs, attending gallery shows featuring regional artists like Mary Jane Farr,
    listening to Beethoven’s Symphony No. 9 and Chopin’s nocturnes, and savoring community theater productions of Tennessee Williams’ plays, while they share their deep knowledge as an informal docent.
  travel: Gina Banning plans trips with a blend of careful budgeting and spontaneous curiosity, having visited the Smithsonian American Art Museum in Washington, D.C., and the Metropolitan Museum of Art
    in New York, dreaming of exploring the National Gallery in London and the art‑deco district of Miami, though they prefer short, organized journeys with their sister to keep stress at bay.
  culinary: Gina Banning enjoys cooking hearty Appalachian fare, often preparing pepperoni rolls, cornbread with honey, sautéed trout with sage and thyme, and wild mushroom risotto with foraged chanterelles,
    while they relish tasting classic French onion soup and apple crumble at local diners, and they consider themselves an intermediate cook who loves experimenting with seasonal ingredients.
  core: Gina Banning, an 81‑year‑old lifelong volunteer, balances meticulous planning with a gentle worry that fuels their devotion to preserving regional stories, even as they over‑organize garden supplies
    and occasionally forget to reply to lingering emails.
background:
  cultural: Gina was born in 1944 in a small Appalachian town in West Virginia and was raised in a close‑knit, predominantly white community with deep roots in farming, church life, and folk traditions.
    Her family’s heritage includes German and Irish ancestry, and she grew up with a strong sense of self‑reliance, community solidarity, and respect for local customs such as storytelling, music, and handcrafts.
    The cultural values of hospitality, modesty, and civic responsibility have shaped her lifelong commitment to volunteering and preserving regional history, while her exposure to urban Charleston in later
    years broadened her appreciation for the arts and diverse ideas.
attributes:
  skills: '[''Volunteer coordination'', ''Community event planning'', ''Caregiving'', ''First aid'', ''Knitting and quilting instruction'', ''Genealogy research'', ''Budgeting and household management'',
