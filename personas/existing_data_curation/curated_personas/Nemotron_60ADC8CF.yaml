  hobbies: '[''Gardening'', ''Reading historical non‑fiction'', ''Quilting'', ''Crossword puzzles'', ''Listening to R&B and gospel music'', ''Birdwatching'', ''Watching documentaries'', ''Podcasts on personal
    finance'', ''Volunteer tutoring at community center'']'
  career_goals: Patrice aims to leverage her decades of frontline experience into a supervisory position within the next two years, such as a shift lead or floor manager, where she can formalize her workflow
    improvements and mentor newer staff. She plans to earn her GED and complete a short certification in office administration to broaden her prospects for a part‑time office assistant role that offers
    more predictable hours. Long‑term, she hopes to build a modest retirement nest egg, possibly supplementing it by selling hand‑crafted quilts and garden produce at local markets, allowing her to combine
    her practical skills with her creative interests while maintaining the quiet, stable environment she values.
