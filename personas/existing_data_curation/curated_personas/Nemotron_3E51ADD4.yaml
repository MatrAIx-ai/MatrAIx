    "Organizational record-keeping", "Public speaking", "Research and scholarly writing", "Art-infused counseling modules", "Museum-based experiential learning"]'
  hobbies: '["Oil painting", "Sketching", "Photography (historic architecture)", "Visiting museums and art galleries", "Reading historical fiction and philosophy", "Playing piano", "Mindfulness meditation",
    "Gardening (vegetable garden)", "Hiking (Great Falls Park)", "Attending literary salons", "Listening to jazz in intimate venues", "Traveling to European cultural capitals for art study"]'
  career_goals: Daneil aims to become the Director of Student Services for a university or large public school district, where she can champion innovative, art-integrated career counseling models. She plans
    to develop and publish a research series on the impact of creative experiences on career decision-making, secure grant funding for a community-based arts-education counseling initiative, and mentor
    the next generation of counselors through a formal apprenticeship program. Her long-term ambition includes speaking at national counseling conferences, influencing policy on equitable guidance services,
    and establishing a regional hub that connects educational institutions with cultural organizations to expand experiential career exploration opportunities.
