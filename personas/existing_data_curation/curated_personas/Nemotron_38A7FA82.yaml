personas:
  professional: Sean Sprague blends a humanities education with 15 years of IT systems leadership, translating complex tech strategy into relatable language for non‑technical stakeholders while leveraging
    their sociable, talkative nature to rally cross‑functional teams, and despite a habit of letting loose plans slip, they consistently deliver cloud migration and cybersecurity initiatives that align
    with business goals.
  sports: Sean Sprague enjoys weekend sailing with the Leelanau Yacht Club, hikes the dunes for cardio, supports the Detroit Lions in football, cheers for the Detroit Tigers in baseball, and follows the
    Michigan Wolverines during college basketball season, while occasionally joining a local adult recreational soccer league for a mid‑summer sprint.
  arts: Sean Sprague channels a love for folk storytelling into acoustic guitar open‑mic nights, drawing inspiration from Bob Dylan and Joni Mitchell, while their literary palate spans Tolstoy to Camus,
    and their evenings often include screenings of classic films by Akira Kurosawa and attending performances by the Traverse City Symphony featuring works by Beethoven.
  travel: Sean Sprague prefers flexible road trips that blend adventure with downtime, having explored the Upper Peninsula’s waterfalls, the historic streets of Quebec City, and dreaming of a sailing expedition
    to the Greek Islands, all balanced against the modest budget of a mid‑level tech manager and occasional family obligations.
  culinary: Sean Sprague, an adept home chef, delights in farm‑to‑table meals such as cedar‑plank grilled perch with lemon‑dill sauce, roasted heirloom carrots, wild mushroom risotto, and a seasonal berry
    crumble, while their occasional over‑ambitious plating sometimes results in a spaghetti‑sauce spill on the kitchen floor.
  core: Sean Sprague is a sociable, slightly disorganized tech strategist who balances a love for nature, music, and community gathering with a perpetual undercurrent of worry that drives them to over‑prepare
    yet still embrace spontaneous adventures.
background:
  cultural: Sean grew up in a small Midwestern town in Michigan, shaped by the region's strong sense of community, work ethic, and appreciation for the outdoors. His family’s ancestry includes German and
    Polish roots, which have infused his upbringing with traditions such as holiday baking, folk music, and a reverence for craftsmanship. The Great Lakes environment fostered a connection to water-based
    recreation and conservation, reflected in his love of sailing and local environmental stewardship. His humanities education reinforced a respect for diverse narratives and cultural preservation, influencing
    his involvement with the local historical society and his commitment to integrating technology with community heritage.
attributes:
  skills: '[''IT project management'', ''Strategic planning'', ''Vendor negotiation'', ''Budget forecasting'', ''Network infrastructure design'', ''Cloud migration planning'', ''Cybersecurity awareness'',
