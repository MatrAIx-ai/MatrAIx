  hobbies: '[''Sailing on Lake Michigan'', ''Hiking Sleeping Bear Dunes'', ''Photography'', ''Hosting dinner gatherings'', ''Cooking seasonal meals'', ''Participating in local historical society'', ''Playing
    acoustic guitar at open‑mic events'', ''Reading classic literature and contemporary philosophy'', ''Volunteering as a tech mentor for high‑school students'']'
  career_goals: Sean aims to transition into a senior IT leadership role—such as Director of Information Technology or Chief Information Officer—within the next five years, ideally within an organization
    that values community impact and flexible work culture. He is pursuing advanced certifications (PMP, ITIL, and AWS Certified Solutions Architect) to bolster his strategic credentials. A long‑term ambition
    is to spearhead a regional digital‑transformation initiative that modernizes public services in Leelanau County while preserving local heritage through technology. He also envisions mentoring junior
    staff and establishing a mentorship program that blends technical growth with interpersonal development.
