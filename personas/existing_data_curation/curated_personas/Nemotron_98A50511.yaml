personas:
  professional: Lana Barnes, a wildlife rehabilitator and caretaker at the Franklin County Wildlife Sanctuary, blends meticulous record‑keeping and hands‑on veterinary first aid with a curious, art‑infused
    approach to enrichment design, using their organized mindset to train volunteers while balancing intense emotional reactivity that sometimes colors their decision‑making.
  sports: Lana Barnes fuels their love of gentle movement with daily sunrise yoga sessions, joins the Birmingham Birdwatchers Club for early‑morning hikes that double as bird‑watching workouts, and stays
    emotionally anchored by cheering on the Alabama Crimson Tide football team and the Birmingham Barons minor‑league baseball club on weekends.
  arts: Lana Barnes channels a deep appreciation for art into watercolor paintings of local birds inspired by Audubon and O'Keeffe, knits quilts echoing the patterns of Monet’s gardens, curates animal‑themed
    crafts at the Helen Keller Museum’s summer program, and unwinds to the folk melodies of Gillian Welch, which together enrich both their creative outlet and sanctuary enrichment projects.
  travel: Lana Barnes prefers meticulously planned, nature‑centric getaways, often spending long weekends bird‑watching in the Everglades or hiking the Great Smoky Mountains, and they have a growing bucket
    list that includes a Costa Rican rainforest eco‑tour and a future pilgrimage to the Galápagos Islands, all while budgeting trips through discount travel sites to keep expenses aligned with sanctuary
    funding constraints.
  culinary: Lana Barnes enjoys a farm‑to‑table kitchen where they skillfully prepare herb‑infused quinoa salads, roasted beet and goat‑cheese tarts, and Southern classics such as fried green tomatoes using
    vegetables from their backyard garden, favoring fresh ingredients like basil, thyme, and heirloom tomatoes while occasionally indulging in artisanal cheese boards during post‑work celebrations.
  core: Lana Barnes is a methodical, art‑obsessed wildlife caretaker whose relentless curiosity drives creative enrichment projects, yet their intense anxiety often fuels late‑night watercolor binges and
    a tendency to over‑commit to volunteer schedules, making them both a compassionate advocate and a self‑critical perfectionist.
background:
  cultural: Lana grew up in the small‑town surroundings of Franklin County, Alabama, where her family owned a modest farm and valued self‑reliance, community, and a deep connection to the land. Her white
    Southern heritage includes traditions such as Sunday church gatherings, homemade Southern cuisine, and an appreciation for regional folk art like quilting and mason‑jar crafts. The close‑knit nature
    of Tuscumbia fostered a strong sense of neighborly support, which she carries into her work at the sanctuary, often collaborating with local volunteers and participating in community events such as
    the annual Harvest Festival. While she embraces contemporary ideas and art, she also respects the slower, reflective pace of her upbringing, which informs her preference for solitude, reflective practices,
    and a careful, methodical approach to both life and work.
attributes:
  skills: '[''Animal handling'', ''Basic veterinary first aid'', ''Health monitoring and record keeping'', ''Habitat maintenance'', ''Enrichment design and crafting'', ''Behavioral observation'', ''Volunteer
    training and supervision'', ''Public education and outreach'', ''Emergency response planning'', ''Wildlife rehabilitation techniques'']'
  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Gardening'', ''Reading mystery novels'', ''Yoga'', ''Knitting quilts'', ''Nature photography'', ''Volunteer art workshops'', ''Creating animal enrichment
    toys'', ''Sketching wildlife'']'
  career_goals: Lana aims to deepen her expertise in wildlife rehabilitation by completing the State‑approved Certified Wildlife Rehabilitator program and earning a Veterinary Assistant certification. Over
    the next five years she hopes to advance to lead caretaker or manager of the sanctuary, where she can implement systematic enrichment programs and oversee a larger team of staff and volunteers. Long‑term,
    she envisions establishing a community outreach center that combines art workshops with animal-care education, allowing her to blend her love of creativity with her commitment to animal welfare. She
    also plans to develop a personal coping toolkit to better manage her emotional reactivity, including regular therapy, mindfulness training, and peer support groups.
