  on UEFI-based PCs using Windows Setup. This person is likely to have experience with operating systems such as Windows, Linux, and Apple's macOS, and may have a basic understanding of computer hardware.
  They may also be interested in learning more about the differences between the two partitioning methods and how to format a hard drive for either GPT or MBR.
