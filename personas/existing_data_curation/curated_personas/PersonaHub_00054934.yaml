persona_description: Erin Evans is a sleep medicine fellow at Harvard Medical School and Brigham and Women's Hospital who is passionate about understanding the mysteries of sleep. She is a sleep expert
  who is constantly challenged by her 2-year-old son and is interested in the different ways to test sleep. She has studied the effects of sleep deprivation in high-stress work situations and has helped
  hundreds of families improve the sleeping habits of their children. Her research interests include sleep duration, brain wave activity, and the impact of caffeine and light exposure on sleep. She is also
  interested in the different ways to test sleep and has studied astronauts' sleep in space.
