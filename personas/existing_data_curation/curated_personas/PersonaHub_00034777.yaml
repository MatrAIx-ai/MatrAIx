persona_description: A paleoclimatologist or hurricane researcher who is interested in studying the frequency and intensity of catastrophic hurricanes in the Florida Panhandle region. This person likely
  has expertise in paleoclimatology, paleoceanography, and/or paleohydrology, and has conducted research on the Holocene climatic regime and its variability. They are also familiar with the Western Lake
  area and its paleostratigraphic data, and have observed that the region has experienced a long-term frequency of approximately one catastrophic hurricane every 280 years. This person may have conducted
  research on paleohurricane records from the past century or even the past millennium and has noted that they are not long enough to capture the full range of variability of catastrophic hurricane activities
  inherent in the Holocene climatic regime.
