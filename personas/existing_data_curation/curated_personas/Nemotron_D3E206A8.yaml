  career_goals: Laura aspires to blend her love for art and technology by pursuing a career in graphic design or interactive media. She plans to enroll in a specialized visual‑arts high school, build a
    strong portfolio, and later earn a BFA in graphic design or a degree in digital media. She is also intrigued by museum curation, hoping to use her research and organizational skills to design compelling
    exhibits. In the short term, she aims to win regional art competitions, secure a scholarship for her senior high‑school program, and develop a personal brand that showcases her creative and technical
    talents.
