persona_description: A researcher or conservationist who is interested in the management and conservation of marine species, particularly the European flying squid. They are likely to be involved in the
  study of their life history traits, habitat impacts, and potential impacts of fishing pressure. They may also be concerned with the uncertainty surrounding the management of the stock and the need for
  effective management measures. They may have knowledge of jigger fishing practices and the impact of discards, and may be aware of the management system in place for the Eastern Central Atlantic. They
  may also be interested in the broader implications of the lack of regulation, assessment, or evaluation of the stock.
