  career_goals: Although still a toddler, Michael already talks about wanting to build big towers and make beautiful pictures when he grows up. He expresses a fascination with construction sites he sees
    in his neighborhood and dreams of becoming a builder or an artist who can turn his imagination into real things. He also shows a budding desire to help others, saying he wants to 'give hugs to people
    who are sad', indicating an early, altruistic ambition.
