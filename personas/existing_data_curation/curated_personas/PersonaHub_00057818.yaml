persona_description: A political economist who advocates for the expansion of voluntary tax contributions to the government as a means of solving government problems and reducing the deficit. They believe
  that the government can credibly commit to spending money on deficit reduction or the poor, but cannot do so if the money is spent on other things. They propose allowing taxpayers to earmark their voluntary
  tax payments as they would if donating to a charity, and expanding itemized contributions to various government functions to encourage efficiency in the delivery of government services. They also believe
  that some people prefer to help others through charity, while others prefer the government to serve this role, and that making government more like charity can offer the latter group a means of doing
  so, without coercing those who prefer the government to serve this role.
