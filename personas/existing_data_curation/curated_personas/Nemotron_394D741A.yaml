  career_goals: As he approaches retirement, Derek aims to shift from full‑time clinical practice to a part‑time role that emphasizes mentorship, medical education, and community outreach. He plans to establish
    a nonprofit that offers art‑based wellness workshops for seniors and patients with chronic illnesses, and to author a book on the intersection of narrative medicine and visual arts. He also seeks to
    serve on health‑policy advisory panels to promote preventive care at the state level and to continue publishing research on innovative patient‑centered care models.
