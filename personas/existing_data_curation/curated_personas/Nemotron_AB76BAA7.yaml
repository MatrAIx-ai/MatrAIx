personas:
  professional: Charlene Morales, a 35‑year‑old retail sales associate, leverages their meticulous inventory control, POS mastery, and calm, patient demeanor to train new hires and resolve conflicts, while
    their organized, assertive yet compassionate approach drives their ambition to become a store manager within three years.
  sports: Charlene Morales energizes their fitness routine through weekly Zumba classes at the community center, follows the Atlanta Falcons and New Orleans Pelicans with enthusiastic fan gatherings, and
    joins the local Southern Sprinters running club for seasonal 5K races and occasional weekend softball games.
  arts: Charlene Morales harmonizes their love of singing in the church choir with a creative outlet in quilting and pottery, while drawing inspiration from gospel legend Kirk Franklin, pop icon Taylor
    Swift, and mystery novels by Agatha Christie and Gillian Flynn during their leisure time.
  travel: Charlene Morales prefers well‑planned road‑trip itineraries, having explored Savannah’s historic squares, New Orleans’ jazz districts, and Asheville’s mountain trails, and they dream of attending
    the Edinburgh Festival in Scotland and trekking the rainforests of Costa Rica while budgeting for family‑friendly travel.
  culinary: Charlene Morales boasts a strong command of Southern comfort cooking, regularly perfecting shrimp and grits, fried chicken with collard greens, and buttery cornbread, while also experimenting
    with Korean‑style BBQ tacos seasoned with garden‑fresh basil and cilantro, and enjoying the occasional bake of peach cobbler using home‑grown fruit for their gatherings.
  core: Charlene Morales is a calm, organized retail leader who juggles choir rehearsals, quilting projects, and Zumba classes while relentlessly pursuing a store‑manager role, yet they admit to a nightly
    habit of scrolling recipe videos instead of sleeping.
background:
  cultural: Charlene was raised in Macon, Georgia, within a predominantly white Southern community. Her family traditions emphasize hospitality, close family ties, and regular involvement in local church
    activities. She grew up attending community events like county fairs, high school football games, and music festivals that celebrate country and gospel music. While her heritage is rooted in Southern
    customs—such as supporting local farms, enjoying Southern cuisine, and valuing modesty and hard work—Charlene's curiosity has exposed her to broader cultural influences through reading, online courses,
    and interaction with a diverse customer base.
attributes:
  skills: '["Customer Service","Sales Techniques","Point‑of‑Sale System Operation","Inventory Management","Visual Merchandising","Cash Handling","Sales Reporting","Team Training","Conflict Resolution","Basic
