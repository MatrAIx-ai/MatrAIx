  career_goals: Charlene aims to progress from her current sales associate role to a store manager position within the next three years, leveraging her organizational strengths and leadership potential.
    She plans to obtain a GED and enroll in a community college business program to solidify her managerial knowledge. Long‑term, she aspires to oversee multiple retail locations as a district manager or
    to launch her own boutique that blends traditional Southern goods with contemporary trends, employing e‑commerce platforms she has begun exploring.
