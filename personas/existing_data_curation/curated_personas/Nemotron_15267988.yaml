personas:
  professional: Joseph Carter is a budding digital artist and junior robotics enthusiast who blends their love of sketching, Minecraft world‑building, and problem‑solving into creative projects, while their
    reliable yet flexible nature keeps them organized enough to meet school deadlines and club responsibilities.
  sports: Joseph Carter is a fan of the Dallas Cowboys and Round Rock Express, participates in a community basketball league, enjoys weekend soccer matches with friends, follows the Texas Rangers, and balances
    active play with occasional video‑game tournaments, while they also enjoy cheering with classmates.
  arts: Joseph Carter immerses themselves in music by playing the keyboard to jazz greats like Miles Davis and contemporary hip‑hop artists such as Kendrick Lamar, draws graphic novel‑style characters inspired
    by Stan Lee and Neil Gaiman, and attends local youth art workshops featuring mural projects.
  travel: Joseph Carter loves road trips to the Gulf Coast’s Galveston beaches and family reunions in Nashville, dreams of exploring Washington D.C.’s museums and the historic sites of Savannah, and prefers
    a mix of structured itineraries with spontaneous stops at quirky roadside attractions, while they often ask for a travel journal to sketch along the way.
  culinary: Joseph Carter enjoys soul‑food staples such as fried chicken, collard greens, and cornbread at family gatherings, often experiments with making mac and cheese and tacos during weekend cooking
    sessions, and pairs meals with their favorite soda or sweet tea while they sketch.
  core: Joseph Carter is a curious 12‑year‑old who balances a love for digital art, robotics, and music with a habit of impulse buying LEGO sets, occasional screen‑time fatigue, and a deep appreciation
    for community traditions.
background:
  cultural: Joseph comes from an African‑American family rooted in the traditions of the Southern United States. Growing up in Round Rock, Texas, he experiences a blend of Southern hospitality, church‑centered
    community life, and the vibrant cultural expressions of Black Texas neighborhoods. Family gatherings often feature soul food dishes like fried chicken, collard greens, and cornbread, accompanied by
    a soundtrack of gospel, R&B, and contemporary hip‑hop. He participates in local Juneteenth celebrations, attends a Black youth mentorship program that emphasizes cultural pride, and enjoys storytelling
    that connects him to the broader civil‑rights heritage of the region.
