    with Scratch'', ''listening to jazz and hip‑hop'']'
  career_goals: Joseph envisions a future where he merges his love for art and technology. He aims to pursue a high‑school program that integrates visual arts with computer science, eventually earning a
    degree in graphic design, animation, or interactive media. He hopes to create digital artwork and multimedia projects that reflect his community’s stories, and later, to produce murals or interactive
    installations in Round Rock that celebrate local culture and inspire younger students. Joseph also dreams of mentoring peers in art and coding through youth programs.
