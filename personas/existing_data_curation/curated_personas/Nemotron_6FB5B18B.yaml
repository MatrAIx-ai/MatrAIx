  career_goals: Josette aims to graduate high school with strong grades, earn a scholarship to a tribal college, and eventually pursue a career that blends her love for helping people with her cultural
    roots. She envisions becoming a schoolteacher or a community health worker within the Muscogee Nation, where she can teach children, promote wellness, and preserve tribal traditions. She also hopes
    to develop her artistic skills for a future in cultural arts education, seeking a stable profession that offers clear, immediate impact on her community.
