personas:
  professional: Josette Mahadeo is an enthusiastic middle-school soccer captain who channels their practical mindset into organizing team drills, creates detailed play diagrams with a love for structure,
    yet often lets after-school paperwork slip because they prefer flexibility over strict planning.
  sports: Josette Mahadeo plays forward for their middle-school soccer team, follows the Little Rock Rangers FC with weekly match viewings, cheers for the Arkansas Razorbacks during football season, and
    spends weekend mornings sprinting on the local trail to stay fit.
  arts: Josette Mahadeo spends afternoons sketching Arkansas River vistas inspired by Claude Monet, crafts beaded jewelry echoing traditional patterns while listening to Taylor Swift’s Folklore, joins tribal
    dance workshops that incorporate rhythmic drum circles, and builds elaborate pixelated worlds in Minecraft reminiscent of a young Andy Warhol.
  travel: Josette Mahadeo enjoys weekend trips to Hot Springs, Arkansas, where they explore the historic bathhouse district, dreams of hiking the Grand Canyon and spotting elk in Yellowstone, and hopes
    to one day backpack through Banff National Park in Canada, all while planning trips around school breaks and family budgets.
  culinary: Josette Mahadeo loves whipping up buttery chocolate chip cookies, cooking simple taco bowls with black beans, corn, and fresh garden tomatoes, and blending strawberry-banana smoothies, showcasing
    a budding kitchen confidence that still leans on familiar comfort foods.
  core: Josette Mahadeo balances a love for structured soccer tactics with a relaxed, sometimes forgetful approach to schoolwork, channels creativity through art and beadwork while occasionally hoarding
    spare change for Minecraft upgrades.
background:
  cultural: Josette is a member of the Muscogee (Creek) Nation, growing up in Pryor, Oklahoma, within a close‑knit community that celebrates tribal heritage. Her family observes traditional customs such
    as seasonal powwows, storytelling circles, and the preparation of tribal foods like frybread and buffalo stew. She attends weekly Creek language classes at the community center and participates in cultural
    events that teach her native dances, drum rhythms, and beadwork techniques. The values of respect for the land, communal responsibility, and intergenerational learning are central to her upbringing.
