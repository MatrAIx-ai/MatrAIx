  hobbies: '[''Reading adventure and science books'', ''Drawing marine life'', ''Building LEGO models of ships and habitats'', ''Exploring local beaches and collecting shells'', ''Playing simple percussion
    (bongos, maracas)'', ''Caring for the family rabbit'', ''Educational coding games on tablet'']'
  career_goals: Carlos dreams of becoming a marine biologist or wildlife conservationist so he can protect the sea turtles, coral reefs, and mangroves that surround his island home. He hopes to use his
    love of science, his practical problem‑solving, and his compassionate drive to educate others and lead community projects that preserve the environment. In the longer term he also imagines mentoring
    younger children in reading and science, combining his desire to help others with his curiosity about the natural world.
