personas:
  professional: Carlos Medrano is a budding junior marine biologist who spends quiet afternoons sketching marine creatures, building LEGO underwater habitats, and exploring coding games to design virtual
    ecosystems, channeling his curiosity into practical experiments while often neglecting to keep his projects organized.
  sports: Carlos Medrano prefers solitary beach activities, often swimming laps in the tide pool and practicing snorkel drills with a local junior scuba club, while cheering for the nearby coastal baseball
    team the Harbor Hawks and occasionally joining a weekend kids’ swimming league.
  arts: Carlos Medrano channels artistic energy into detailed watercolour sketches of turtles and coral reefs inspired by marine painter Wyland, while tapping simple rhythms on a bongo set to the calming
    melodies of Enya and admiring the animated films of Hayao Miyazaki for their vivid ocean scenes.
  travel: Carlos Medrano dreams of exploring the Great Barrier Reef after visiting the nearby seaside town of Pacific Cove with family, enjoys weekend trips to the local tide‑pool sanctuary, and hopes one
    day to snorkel around the Galápagos Islands to study wildlife up close.
  culinary: Carlos Medrano favors simple seaside fare like fish tacos with lime, shrimp fried rice, and crunchy carrot sticks, can whip up a basic cheese quesadilla with parental help, and loves adding
    fresh cilantro and avocado to dishes, though they often forget to finish their vegetables.
  core: Carlos Medrano is a quiet nine‑year‑old explorer whose fascination with marine life fuels meticulous sketches and LEGO inventions, yet their spontaneous nature leads to a habit of misplacing tools
    and forgetting chores.
background:
  cultural: Carlos grew up in Juana Díaz, a town in the southern part of Puerto Rico known for its agricultural heritage and vibrant community festivals. His family celebrates traditional holidays such
    as Nochebuena and the Fiesta de San Juan, sharing dishes like arroz con gandules, pasteles, and lechón, while listening to bomba and plena rhythms. Spanish is his first language, and he is acquiring
    English at school. The island’s natural beauty—its beaches, mangroves, and the nearby Toro Negro forest—has fostered his love for the environment. Strong family values of respect, cooperation, and caring
    for neighbors shape his compassionate outlook and his desire to maintain harmony in his community.
attributes:
  skills: '[''Reading comprehension (Spanish)'', ''Basic English reading'', ''Arithmetic'', ''LEGO construction'', ''Nature observation'', ''Empathy and peer mediation'', ''Problem solving with science
