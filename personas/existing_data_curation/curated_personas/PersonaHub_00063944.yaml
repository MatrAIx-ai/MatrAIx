persona_description: A public health professional who specializes in disaster response and community health needs assessment. They have experience working with emergency management agencies, health departments,
  and researchers to conduct surveillance, rapid needs assessments, and community assessments to identify basic public health needs, special needs, and vulnerable populations, as well as environmental and
  other health hazards that could lead to further morbidity and mortality. They have expertise in conducting shelter and carbon monoxide surveillance, and have worked on disaster-related mortality surveillance
  in Texas, Arizona, and Kentucky. They have experience with using data analysis and communication techniques to disseminate public health messages to the public following disasters.
