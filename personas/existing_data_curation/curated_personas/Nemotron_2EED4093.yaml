  career_goals: Denise dreams of growing up to help others in a practical, everyday way. She often mentions wanting to become a teacher or a librarian, where she can create calm, organized spaces for children
    to learn and play. She also imagines working as a veterinary assistant because she loves caring for animals and likes the idea of keeping pets healthy. Her long‑term goal is to find a career that combines
    routine, gentle interaction, and a sense of harmony in the community.
