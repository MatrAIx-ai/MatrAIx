persona_description: A scientist who specializes in the study of lidar technology, particularly the design and operation of the Mars Observer Laser Altimeter (MOLA-1) and the SLA-02 sensor. His research
  interests include algorithm development for the EOS Laser Altimeter Mission (i.e., for the Geoscience Laser Altimeter System or GLAS) and the use of SLA-01 and SLA-02 data in support of the NASA Mission
  To Planet Earth program and the University of Maryland's Vegetation Canopy Lidar (VCL) mission.
