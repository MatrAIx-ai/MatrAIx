  hobbies: '[''exploring desert trails'', ''birdwatching'', ''sketching wildlife'', ''LEGO building'', ''Arduino projects'', ''strategy video games'', ''listening to Mexican folk music'', ''helping with
    family cooking'', ''playing soccer with a small group'', ''reading science fiction'', ''stargazing'']'
  career_goals: In the short term, Reynaldo wants to deepen his coding skills, perhaps creating simple games or helpful apps for his classmates. Long‑term, he envisions a career that blends his love for
    nature, problem‑solving, and technology—such as becoming an environmental engineer or wildlife biologist focused on water conservation and habitat protection in the Southwest. He also enjoys caring
    for neighborhood pets and could see himself as a veterinarian, but his primary ambition is to apply practical science to improve life in rural communities.
