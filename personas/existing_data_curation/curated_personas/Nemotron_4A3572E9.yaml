personas:
  professional: Reynaldo Bermudez, an aspiring junior electronics tinkerer and wildlife sketch enthusiast, channels his curiosity and practicality into building Arduino‑powered LEGO automata and documenting
    desert fauna, even as his laid‑back, slightly disorganized workshop looks more like an adventure zone than a tidy lab.
  sports: Reynaldo Bermudez, a 12‑year‑old soccer enthusiast, turns up for weekly pickup matches with his tight‑knit friend group at the community field, idols the local Desert Knights FC and follows the
    national team, while also savoring solo desert treks for endurance training on weekends.
  arts: Reynaldo Bermudez immerses himself in folk melodies by Jordan Rivers and the ethereal tunes of The Ember Trails, letting the music accompany his detailed desert wildlife sketches and his LEGO builds
    that echo the sleek aesthetics of his beloved science‑fiction novels.
  travel: Reynaldo Bermudez prefers spontaneous day‑trips to nearby desert gems like the White Sands Basin and the Grand Canyon, while dreaming of a low‑budget backpacking adventure under the stars in Chile’s
    Atacama Desert and a school‑organized field visit to the historic ruins of Machu Picchu.
  culinary: Reynaldo Bermudez often helps his family roll tamales using masa, slow‑cooked pork, dried chilies, and corn husks, and he experiments with rugged trail‑mix recipes blending roasted pumpkin seeds,
    dried mango slices, cacao nibs, and a pinch of sea salt for his desert hikes.
  core: Reynaldo Bermudez is a curiosity‑driven desert explorer who juggles sketching wildlife, tinkering with Arduino‑LEGO hybrids, and an occasional snack‑induced mess, all while humming folk tunes and
    dreaming of star‑filled skies.
background:
  cultural: Reynaldo comes from a Mexican family that maintains strong cultural ties, speaking Spanish at home and celebrating traditions such as Día de los Muertos and holiday meals featuring regional
    dishes. Living in Bylas, a small rural community in Arizona, he also experiences the broader cultural mosaic of the Southwest, including influences from nearby Indigenous communities and the desert
    lifestyle. This blend of Mexican heritage and Southwest desert culture shapes his values of family cohesion, respect for nature, practical hard work, and a flexible, curiosity‑driven outlook on life.
attributes:
