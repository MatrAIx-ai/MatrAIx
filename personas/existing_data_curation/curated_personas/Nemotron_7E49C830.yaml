personas:
  professional: Stephen Ledbetter is a seasoned automotive technician in the Denver metro area, blending eight years of hands‑on repair experience with ASE certifications in Engine Repair, Brakes, and Electrical
    Systems, and is known for methodically organizing his shop while staying flexible enough to troubleshoot hybrid and electric drivetrains using OBD‑II scanners, oscilloscopes, and custom‑built Raspberry
    Pi data loggers.
  sports: Stephen Ledbetter avidly follows the Denver Broncos, Colorado Avalanche, and Colorado Rockies, and is a member of the Rocky Mountain Hikers Association, regularly tackling off‑beat trails in the
    Rockies, fishing the South Platte River, and occasionally hitting the ski slopes at Loveland Pass; they prefer low‑key fitness, using a home gym for strength training and reserving Saturday mornings
    for a solo mountain‑bike ride on local fire‑road loops.
  arts: Stephen Ledbetter channels creative energy into acoustic guitar sessions, favoring folk‑rock classics from Neil Young and intricate fingerpicking pieces by John Fahey, while also immersing in automotive
    history documentaries and appreciating vintage automotive illustrations by Norman Rockwell; they attend local craft‑beer festivals for live music, occasionally volunteer at a community workshop teaching
    basic electronics to teens, and collect limited‑edition scale model cars of classic V8 muscle machines.
  travel: Stephen Ledbetter approaches travel as a series of purposeful escapes, meticulously planning weekend getaways to Rocky Mountain National Park, a once‑in‑a‑lifetime road trip along the Pacific
    Coast Highway, and a long‑awaited trek through Patagonia’s Torres del Paine, balancing a modest budget with a love for off‑the‑grid camping, occasional visits to automotive museums such as the Henry
    Ford Museum in Michigan, and a preference for solo or small‑group itineraries that allow quiet reflection.
  culinary: Stephen Ledbetter enjoys home brewing, experimenting with a bold Citra hop IPA and a seasonal pumpkin stout, while also perfecting a smoked trout dish sourced from the South Platte River and
    an elk chili seasoned with ancho chilies and dark chocolate; they rate themselves a competent cook but often forget to set timers, leading to occasional over‑cooked pasta, and they savor a classic bison
    burger topped with caramelized onions during post‑workout meals.
  core: Stephen Ledbetter is a meticulous, introverted car guru who blends technical precision with a quiet love for the mountains, music, and a measured approach to money, health, and life’s adventures.
background:
  cultural: Stephen grew up in a middle‑class, white working‑family suburb of Denver, where a strong DIY ethic and love of the outdoors were core values. The Colorado culture of independence, respect for
    nature, and practical problem‑solving shaped his outlook. While he identifies with mainstream American values—self‑reliance, punctuality, and modesty—he also embraces the local mountain‑state sensibility
    that prizes quiet weekends in nature and a hands‑on approach to everyday challenges. His marriage and community connections keep his cooperative side grounded, even as he prefers solitude.
attributes:
  skills: '[''Engine diagnostics'', ''Brake and suspension repair'', ''Hybrid and electric vehicle maintenance'', ''Electrical system troubleshooting'', ''OBD-II scanning'', ''ASE certification (Engine,
