  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Scale model car building'', ''Reading automotive manuals and history'', ''DIY electronics projects'', ''Playing acoustic guitar'', ''Home brewing'',
    ''Participating in automotive workshops'']'
  career_goals: Stephen aims to become a master ASE-certified technician with a specialty in hybrid and electric vehicle systems. He plans to complete Level 2 and Level 3 ASE certifications within the next
    three years and obtain EPA certification for refrigerant handling. In the longer term, he hopes to transition into a service manager role, oversee a team of technicians, and eventually open his own
    boutique garage focusing on eco-friendly vehicle maintenance and custom performance builds. He also wants to contribute to community education by leading hands-on workshops at local vocational schools.
