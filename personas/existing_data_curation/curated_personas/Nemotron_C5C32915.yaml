  career_goals: Anthony aims to turn his love of building and coding into a future career in robotics or software development. He hopes to join his high‑school’s STEM program, compete in regional robotics
    competitions, and eventually earn a degree in mechanical engineering or computer science. Although he worries about performance pressure, he is motivated by the competitive aspect of tech challenges
    and envisions creating interactive gadgets or video games that solve real‑world problems while offering the stability of a reliable engineering career. His cautious nature drives him to seek collaborative
    environments with clear, trustworthy goals and transparent team dynamics.
