personas:
  professional: Anthony Johnson, an aspiring junior game designer, merges his curiosity for coding with a practical DIY mindset, constructing Minecraft mods, Scratch games, and Arduino robots while often
    juggling school projects with a laid‑back, disorganized schedule that leaves them scrambling before deadlines.
  sports: Anthony Johnson, a basketball‑enthusiast who spends afternoons at the Finleyville Youth Basketball League court, also follows the Pittsburgh Steelers in the fall and the Penguins in winter, combining
    pick‑up games with a habit of over‑practicing dribbling drills that sometimes leaves them exhausted and reluctant to join other school sports.
  arts: Anthony Johnson, a budding comic artist, sketches superhero‑inspired characters in the style of Frank Miller while blasting classic rock legends like Led Zeppelin and The Rolling Stones, and they
    collect limited‑edition Marvel figurines that fuel their competitive desire to complete their personal collection.
  travel: Anthony Johnson, an adventure‑curious but budget‑conscious traveler, dreams of camping in Ohiopyle State Park and exploring the historic streets of Philadelphia, while their family’s annual trips
    to Washington, D.C. provide a structured itinerary that satisfies their need for planning and their cautious attitude toward unfamiliar settings.
  culinary: Anthony Johnson, a self‑taught kitchen tinkerer, can whip up a decent mac‑and‑cheese with a splash of hot sauce, loves the Pittsburgh‑style pepperoni pizza with extra cheese, and they enjoy
    experimenting with trail‑mix snacks that combine pretzels, dried cranberries, and chocolate chips.
  core: Anthony Johnson, a tech‑savvy, competitive 12‑year‑old who balances solitary coding marathons with pick‑up basketball, often feels stressed by disorganization yet they fuel their curiosity with
    LEGO builds and classic rock riffs.
background:
  cultural: Anthony grew up in Finleyville, a small community in Allegheny County, Pennsylvania. His family reflects a typical white, middle‑class upbringing in the region, with deep ties to the area's
    historic steel and manufacturing legacy. He has been raised with values of hard work, modesty, and community participation, often attending local church events, school sports, and neighborhood gatherings.
    While his household embraces mainstream American culture, it also cherishes regional traditions such as outdoor recreation, attending high‑school football games, and a love for classic rock music. This
    blend of industrious heritage and suburban life shapes Anthony’s worldview and everyday experiences.
