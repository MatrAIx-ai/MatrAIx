  career_goals: Karthik aims to progress into a senior sales leadership role, such as Director of Institutional Sales, where he can shape market-making strategies and mentor junior agents. He plans to earn
    the Chartered Financial Analyst (CFA) designation within the next two years and develop a proprietary analytics platform to enhance client forecasting. Long-term, he envisions launching a boutique advisory
    firm that offers customized commodity risk-management solutions to high-net-worth clients, while maintaining a selective, high-value client roster.
