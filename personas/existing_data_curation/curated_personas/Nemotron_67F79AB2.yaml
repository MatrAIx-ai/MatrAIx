personas:
  professional: Cecil Ng is a middle school student and aspiring game developer who spends hours designing Scratch projects and building intricate LEGO creations, channeling their love for structure into
    methodical coding while embracing a laid‑back attitude toward school deadlines.
  sports: Cecil Ng shoots hoops at the neighborhood park and cheers for the local high‑school Tigers football team and the Dallas Mavericks, participating in a youth basketball league that emphasizes teamwork
    while they relish the community spirit of Friday night games.
  arts: Cecil Ng dives into adventure novels like "Percy Jackson" and "Harry Potter", curates a playlist featuring Imagine Dragons and Taylor Swift, and expresses creativity through LEGO sculptures that
    echo the cinematic worlds of Super Mario and Minecraft.
  travel: Cecil Ng enjoys spontaneous bike rides through the pine‑covered woods surrounding Nacogdoches, weekend family trips to Lake Livingston for fishing, and dreams of a vacation to Disney World, preferring
    low‑cost, nature‑focused outings over elaborate travel planning.
  culinary: Cecil Ng loves the smoky taste of backyard‑grilled brisket and homemade mac and cheese, often helping to assemble taco kits with cilantro and lime, yet admits to a habit of over‑eating sugary
    cereal after late‑night gaming sessions.
  core: Cecil Ng blends a love for methodical LEGO builds with a laid‑back approach to school work, juggling occasional disorganization with a steady passion for gaming, coding, and community‑rooted fun.
background:
  cultural: Cecil was raised in Nacogdoches, Texas, a small city with a strong sense of community and Southern hospitality. His family values hard work, friendliness, and togetherness, often celebrating
    local traditions such as high‑school football games, county fairs, and backyard barbecues. The mix of rural surroundings and close‑knit school life provides him with opportunities to enjoy both outdoor
    activities like hiking and fishing, and the social support of a tight‑knit community.
attributes:
  skills: '[''Reading comprehension'', ''Basic mathematics (pre‑algebra)'', ''Scratch programming'', ''LEGO building'', ''Bicycle maintenance'', ''Simple cooking'', ''Basketball fundamentals'', ''Team collaboration'',
    ''Problem solving'']'
  hobbies: '[''LEGO building'', ''Video gaming (Minecraft, Super Mario)'', ''Reading adventure/fantasy novels'', ''Basketball'', ''Outdoor hiking and fishing'', ''Scratch programming'', ''Bicycle riding'']'
  career_goals: Cecil aims to pursue a future in engineering, hoping to combine his love for building and technology by studying robotics or mechanical engineering. In the short term, he plans to excel
    in school science and math, join a robotics club, and develop more advanced coding skills, with the long‑term goal of earning a scholarship to a university known for its engineering program and eventually
    designing functional projects that blend creativity with practical problem‑solving.
