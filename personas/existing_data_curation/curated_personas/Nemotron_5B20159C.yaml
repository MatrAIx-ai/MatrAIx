  hobbies: '[''Reading historical non-fiction'', ''Mystery novels'', ''Crossword and Sudoku puzzles'', ''Vegetable gardening'', ''Cooking simple meals'', ''Scale model building'', ''Early-morning hiking'',
    ''Coastal fishing'', ''Volunteer work at local library'']'
  career_goals: Nicholas aims to secure a full-time administrative or operations role in a small-to-mid-size organization where routines are well-defined and his organizational strengths can be fully utilized.
    He plans to obtain a Certified Administrative Professional (CAP) credential within the next year to enhance his qualifications. In the medium term, he hopes to advance to an office manager or operations
    coordinator position, overseeing a modest team and refining processes for efficiency. He values job stability and predictable hours, allowing him to maintain his preferred balanced lifestyle while gradually
    expanding his responsibility and leadership scope.
