  hobbies: '[''Attending art festivals and gallery openings'', ''Landscape sketching and photography during hikes'', ''Pickup basketball'', ''Weekly board‑games night'', ''Volunteering at community arts
    fairs'', ''Listening to creative‑thinking podcasts'', ''Reading speculative fiction'', ''Collecting vinyl records'']'
  career_goals: Harold aims to first obtain his GED and then enroll in part‑time courses in business management or arts administration. He expects to advance from cashier to shift supervisor within the
    next year, eventually moving into store manager or regional operations roles. In parallel, he envisions combining his love for art with retail by managing a boutique or a museum gift shop, or perhaps
    opening a community‑oriented coffee house that showcases local artists. His long‑term ambition is to secure a stable, people‑focused career that lets him mentor younger staff, stay engaged with creative
    projects, and contribute to Cedar City’s cultural scene.
