  career_goals: Even at six, Ruben imagines future roles where he can help others, use his methodical mind, and stay connected with people. He often says he wants to become a teacher to guide classmates,
    an engineer to design structures he builds with LEGO, or a community firefighter who protects his neighborhood. As he grows, his ambition is to blend his love of order with caring for others, possibly
    pursuing a career that combines technical problem solving and community service.
