personas:
  professional: Ruben Lima, a budding junior soccer team captain, blends methodical planning and reliable execution to organize team drills while using their talkative, sociable nature to keep teammates
    motivated, and their calm resilience to stay unfazed by the pressures of a close match.
  sports: Ruben Lima thrives as an energetic midfielder on the local youth soccer league, idolizes the Orlando City SC senior team, and also enjoys dancing to salsa and reggaeton beats after practice, often
    joining the community center’s junior dance club to keep footwork sharp.
  arts: Ruben Lima channels creativity into constructing elaborate LEGO cities, drawing comic-style heroes inspired by classic picture books by Mo Willems, and leading impromptu salsa circles to the music
    of Celia Cruz and modern reggaeton hits, all of which shape their vivid imagination and expressive flair.
  travel: Ruben Lima loves weekend adventures to nearby Florida beaches like Clearwater and the bustling Orlando theme parks, dreams of exploring the historic streets of Old San Juan for its lively festivals,
    and plans trips around school breaks, always packing a small suitcase with LEGO bricks for in‑flight entertainment.
  culinary: Ruben Lima enjoys helping in the kitchen by stirring arroz con gandules with sofrito, frying crisp plantain chips, and mixing mango slices into a fruit salad, while also mastering the art of
    making perfect mac‑and‑cheese and savoring the crunchy texture of homemade tortilla chips.
  core: Ruben Lima is a lively six‑year‑old who balances meticulous LEGO building with soccer leadership, chatty festival participation, and an endless appetite for adventure, all while staying remarkably
    calm and occasionally forgetting to clean up their play area.
background:
  cultural: Ruben is a first-generation Puerto Rican-American raised in Altamonte Springs, Florida. At home, Spanish is spoken alongside English, and his family preserves Puerto Rican traditions such as
    celebrating Three Kings Day, dancing bomba and plena, and preparing staple dishes like arroz con gandules, pasteles, and flan. He participates in local cultural events hosted by the Puerto Rican community,
    enjoys listening to salsa music, and values the close-knit family dynamics typical of Puerto Rican households. This bicultural environment shapes his identity, giving him a strong sense of community,
    hospitality, and pride in his heritage.
