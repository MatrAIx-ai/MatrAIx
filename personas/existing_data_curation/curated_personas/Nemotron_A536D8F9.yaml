  career_goals: Even at eight, Gail dreams of grown‑up roles where she can help others feel safe and understood. She often says she wants to become a teacher because she loves sharing knowledge and sees
    herself creating a caring classroom where every child can ask questions without fear. She also imagines being a community health worker or doctor, inspired by family members who care for neighbors,
    and she hopes to use her empathy to ease worries. Occasionally, she mentions becoming an artist or storyteller, hoping to capture feelings on paper and give voice to kids who feel stressed. These ambitions
    blend her curiosity about new ideas with a practical desire to support and uplift her community.
