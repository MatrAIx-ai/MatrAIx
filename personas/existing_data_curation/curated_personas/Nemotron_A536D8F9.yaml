personas:
  professional: Gail Jackson, an aspiring LEGO architect and budding storyteller, transforms spare afternoons into design workshops by sketching characters and constructing intricate brick models, and their
    love for curiosity and flexibility lets them experiment freely while their aversion to strict deadlines often leaves projects half‑finished.
  sports: Gail Jackson is a lively member of the neighborhood kids’ soccer league, dribbling for the Red Rockets U‑9 team, cheering on the professional women’s side Portland Thorns FC on TV, and treats
    each game as a chance to burn off energy and practice teamwork, even if they occasionally forget their water bottle.
  arts: Gail Jackson immerses themselves in the soulful grooves of classic Motown legends like Marvin Gaye and Stevie Wonder, bops to modern R&B hits from Beyoncé and contemporary hip‑hop tracks by Kendrick Lamar,
    sketches comic‑style characters inspired by Raina Telgemeier’s graphic novels, and curls up with illustrated picture books by Mo Willems, letting this eclectic mix shape their creative play.
  travel: Gail Jackson delights in family road trips to the nearby state park’s splash pad and city museum, dreams of visiting the towering castles of Disneyland and the historic streets of London’s Greenwich,
    prefers spontaneous pit‑stops over meticulously planned itineraries, yet sometimes worries about missing a favorite snack, making them cling to familiar fast‑food stops.
  culinary: Gail Jackson loves the sweet tang of strawberry‑banana smoothies, delights in building their own mini‑pizza with mozzarella, tomato sauce, and pepperoni, shows budding confidence by whisking
    simple batter for pancakes, and proudly declares chocolate chip cookies as the ultimate after‑school treat, though they sometimes sneak extra cookies before dinner.
  core: Gail Jackson, an eight‑year‑old LEGO enthusiast with a heart for Motown, uses curiosity to build, worries about forgetting inhalers, splurges on comics, and can’t resist an extra cookie before bedtime.
background:
  cultural: Gail is an African American child raised in Detroit's vibrant West Side, a community shaped by deep family bonds, church gatherings, and a rich musical legacy that spans Motown classics to modern
    hip‑hop. Her family celebrates cultural traditions such as Kwanzaa, music festivals, and neighborhood block parties, fostering a strong sense of identity and collective support. The local environment
    emphasizes resilience, mutual aid, and pride in Detroit's history of artistic and entrepreneurial spirit. These cultural influences nurture her love for music, storytelling, community involvement, and
    the values of kindness and cooperation that define her everyday interactions.
