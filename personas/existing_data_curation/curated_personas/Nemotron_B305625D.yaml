  hobbies: '[''Cooking Southern and Caribbean dishes'', ''Gardening'', ''Walking nature trails'', ''Church choir and community volunteering'', ''Reading historical fiction'', ''Genealogy research'', ''Quilting
    and crafting'', ''Participating in local food drives'']'
  career_goals: In the coming years Samira aims to transition into a senior supervisory role within the county’s revenue department, where she can shape policy and improve collection efficiency while championing
    fairness for taxpayers. She also envisions establishing a community outreach program that offers free tax‑preparation workshops for low‑income residents and mentoring aspiring revenue agents. Balancing
    her curiosity with practicality, she seeks to lead projects that integrate new technologies to simplify filing and payment processes.
