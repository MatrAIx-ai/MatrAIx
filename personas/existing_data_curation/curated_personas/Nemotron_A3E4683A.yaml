personas:
  professional: An experienced humanities educator, Jose Falla leverages over two decades of teaching to design methodical, data-driven curricula that weave classic literature with contemporary island perspectives,
    while mentoring colleagues and steering departmental logistics with meticulous precision.
  sports: A committed early-morning walker, Jose Falla follows the New Jersey Devils and the New York Giants, and participates in a local walking club that meets weekly on the Passaic River trail, while
    occasionally joining a recreational basketball league at the community center.
  arts: A devoted reader of historical nonfiction and classic novels, Jose Falla immerses themselves in works by Caribbean and Latin American authors such as Gabriel Garcia Marquez and Jose Marti, enjoys
    classical music by Beethoven and jazz saxophonist John Coltrane, and attends occasional performances by the Newark Symphony, using these artistic experiences to balance their methodical professional
    life.
  travel: A methodical planner, Jose Falla prefers well-structured trips, having organized a weekend itinerary to explore the historic streets of Old San Juan, a cultural immersion in Cartagena's colonial
    architecture, and a return to familiar New York City museums, always booking accommodations and transport months in advance to maintain a predictable schedule.
  culinary: A precise home cook, Jose Falla delights in preparing traditional island dishes such as arroz con gandules and pasteles, meticulously measuring spices like sofrito, adobo, and sazon, while also
    experimenting with seasonal vegetables from their backyard garden, and they often host modest family dinners to showcase their culinary discipline.
  core: Jose Falla is a routine-oriented educator and community organizer whose disciplined, detail-driven mindset shapes every facet of their life—from methodical curriculum design and meticulous financial
    planning to cautious health management and steady culinary pursuits, occasionally bending rules only when the schedule permits.
background:
  cultural: Jose was born and raised in Newark to parents who emigrated from Puerto Rico in the 1960s. Growing up in a bilingual household, Spanish was spoken at home while English dominated school and
    public life. He celebrated traditional island holidays such as Three Kings Day and Fiesta de San Juan, and his family kept culinary traditions alive through weekly cooking rituals. His education in
    public schools and a state university reinforced a strong sense of community responsibility, leading him to return to Newark as a postsecondary educator. Though fully integrated into American society,
    he remains deeply connected to the Puerto Rican diaspora, regularly participating in cultural festivals, supporting local Spanish‑language programs, and mentoring students from similar backgrounds.
