  career_goals: Jose intends to build a formal Puerto Rican Studies minor within the college, secure a tenure‑track position as a senior lecturer, and eventually serve as department chair, where he can
    streamline administrative processes and promote faculty collaboration. He aims to publish a monograph on the influence of diaspora narratives in contemporary Puerto Rican fiction, and to receive the
    college’s Outstanding Teaching Award. He also hopes to expand his community‑service portfolio by establishing a tutoring program for high‑school students from Newark’s Latino neighborhoods, tying academic
    resources to practical outcomes. His long‑term ambition is to leave a legacy of well‑structured curricula that support both scholarly rigor and cultural relevance.
