personas:
  professional: Connor Engblom is a seasoned HR leader who leverages a rigorous, data‑driven approach to talent acquisition, performance management, and organizational development while using their natural
    sociability to mediate conflict and champion inclusive culture, even as they occasionally let loose structure in favor of spontaneous team‑building events.
  sports: Connor Engblom plays co‑ed volleyball with the Santa Monica Beach City Club, hikes the Angeles National Forest on Saturdays, and follows the Los Angeles Lakers, LA Galaxy, and the Los Angeles
    Rams, treating weekly workouts as social rituals while rarely missing a game night.
  arts: Connor Engblom immerses themselves in Los Angeles' live‑music scene, regularly attending shows by The Red Hot Chili Peppers, Tame Impala, and local jazz ensembles, participates in improv comedy
    workshops, and captures street moments through photography inspired by Henri Cartier‑Bresson, using art as a creative outlet to balance their structured professional life.
  travel: Connor Engblom favors spontaneous weekend getaways, often planning last‑minute trips to Joshua Tree, Big Sur, or a wine‑tour in Santa Barbara, while dreaming of longer adventures to Reykjavik
    and Barcelona, balancing a desire for adventure with the financial reality of supporting a mortgage and family obligations.
  culinary: Connor Engblom enjoys an intermediate level of cooking, frequently mastering Swedish comfort dishes like köttbullar with lingonberry jam, gravlax, and kanelbullar, experimenting with multicultural
    flavors in cooking classes, and pairing meals with Pinot Noir from Malibu Wines, though they sometimes over‑season dishes in a quest for boldness.
  core: Connor Engblom is a structure‑loving yet flexibly‑oriented people strategist who channels their outgoing energy into volleyball, wine‑tasting, and community leadership, while occasionally letting
    disorganization creep into budgeting and paperwork.
background:
  cultural: Connor is a Swedish-American whose grandparents immigrated from Sweden to the Midwest before his family settled in Southern California. Growing up in the San Fernando Valley, he absorbed Nordic
    values of modesty, egalitarianism, and community together with the laid-back, outdoor-focused lifestyle of Los Angeles County. He celebrates Swedish holidays such as Midsummer and St. Lucia with his
    family, often sharing traditional dishes like gravlax and meatballs, while also participating in typical Californian traditions like beach barbecues and Thanksgiving. His multicultural upbringing informs
    his inclusive outlook and his appreciation for diverse perspectives in both his personal and professional life.
attributes:
  skills: '[''Employee Relations'', ''Talent Acquisition'', ''Performance Management'', ''Benefits Administration'', ''HRIS Administration'', ''Training & Development'', ''Conflict Resolution'', ''Organizational
    Development'', ''HR Analytics'', ''Strategic Workforce Planning'']'
  hobbies: '[''Recreational volleyball'', ''Hiking in the Santa Monica Mountains'', ''Live music concerts'', ''Cooking classes'', ''Wine tasting'', ''Leadership and HR podcasts'', ''Volunteering at a community
    shelter'', ''Street photography'', ''Improv comedy workshops'', ''Traveling to coastal destinations'']'
  career_goals: Connor aims to transition into a senior HR leadership role such as HR Director or Vice President of People, where he can shape company culture and drive strategic talent initiatives. He
    is focused on mastering advanced HR technology platforms and earning the SHRM-SCP certification within the next two years. A long-term ambition is to launch an independent HR consultancy that helps
    mid-size firms build flexible yet robust people strategies, especially around employee well-being and inclusive leadership. He also hopes to mentor emerging HR professionals and champion diversity,
    equity, and inclusion programs.
