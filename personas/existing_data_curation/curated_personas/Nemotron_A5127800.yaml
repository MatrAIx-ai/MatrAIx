personas:
  professional: Arelis Torres, an aspiring registered dietitian with a keen eye for both scientific precision and artistic expression, leverages meticulous nutritional assessments, NutriBase analytics,
    and bilingual counseling to craft culturally resonant meal plans, while navigating the stress of looming credential exams with a methodical yet compassionate approach.
  sports: Arelis Torres hikes the Mesilla Valley trails with the Lea County Outdoor Explorers, practices Vinyasa flow three times weekly at Sage Yoga Studio, roots for New Mexico United during the spring‑summer
    soccer season, and joins pickup volleyball games at the local community center whenever time permits.
  arts: Arelis Torres spends weekends capturing the New Mexico desert in watercolor, drawing inspiration from Georgia O’Keeffe’s desert series and Ansel Adams’ black‑and‑white vistas, while dancing to folk
    tunes by The Desert Voices and regularly attending gallery openings that feature works by local painter Maya Rivera.
  travel: Arelis Torres prefers low‑cost, culturally immersive trips, having explored Santa Fe’s art markets, the red rocks of Sedona, and the vibrant street murals of Austin, while dreaming of a culinary
    pilgrimage to Tuscany’s farm‑to‑table villages and a wellness retreat in Iceland’s highlands once graduate funding allows.
  culinary: Arelis Torres, a confident home chef, blends heritage ingredients like corn masa and chilies with health‑forward items such as quinoa, kale, and avocado, crafting dishes like roasted cauliflower
    taco bowls with black beans, lime‑cilantro crema, and amaranth‑sprinkled salads, while often plating meals as vibrant canvases inspired by her watercolor palette.
  core: Arelis Torres is a creatively driven, anxiety‑prone nutrition student who fuses art, folk traditions, and science to coach community health, while juggling budget restraints and an unending love
    for desert landscapes.
background:
  cultural: Arelis grew up in a Mexican‑American household in Eunice, where family gatherings centered around homemade tortillas, tamales, and shared meals that emphasized hospitality. Bilingual by nature,
    she routinely switches between Spanish and English, which enriches her ability to connect with a diverse client base. Traditional celebrations such as Día de los Muertos and Las Posadas are important
    to her, reinforcing values of community, remembrance, and intergenerational support. Her cultural heritage informs her professional perspective, motivating her to integrate Mexican culinary traditions
    into evidence‑based nutrition counseling and to advocate for culturally sensitive health education within the broader Southwest Latino community.
attributes:
  skills: '[''Clinical Nutrition Assessment'', ''Individualized Meal Planning'', ''Medical Nutrition Therapy'', ''Nutrition Analysis Software (NutriBase)'', ''Bilingual Counseling (English/Spanish)'', ''Culturally
    Tailored Dietary Counseling'', ''Health Education and Workshop Facilitation'', ''Creative Visual Communication'', ''Record Keeping and Scheduling'', ''Community Health Program Coordination'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Mexican folk dancing'', ''Cooking and recipe development'', ''Hiking and nature walks'', ''Yoga and mindfulness practice'', ''Volunteering
    at community health fairs'', ''Leading nutrition workshops for youth'', ''Listening to science podcasts'', ''Reading books on nutrition and psychology'']'
  career_goals: She aims to complete a bachelor's degree in Nutrition and Dietetics within the next two years, followed by acquiring the Registered Dietitian Nutritionist (RDN) credential. Arelis aspires
    to lead a community nutrition program in Lea County that addresses food insecurity and obesity, incorporating culturally relevant education that celebrates Mexican culinary traditions. Long‑term, she
    envisions opening her own wellness practice that blends nutrition counseling with artistic workshops, such as cooking‑art classes and visual storytelling for health behavior change. She also hopes to
    contribute research on effective nutrition interventions for rural Hispanic populations and eventually become a public health nutrition specialist with a focus on policy advocacy for equitable food
    access.
