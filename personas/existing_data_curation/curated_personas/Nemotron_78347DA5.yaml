  career_goals: Although retired from formal employment, Jorge sets personal ambitions that reflect his intellectual curiosity and desire to contribute to his community. He plans to compile a illustrated
    memoir that weaves his family’s lineage with the story of the Mahoning Valley’s industrial rise and decline. He hopes to curate a traveling mini‑exhibit of local artwork for the Warren Public Library,
    providing a platform for emerging neighborhood artists. Additionally, he seeks to mentor younger members of the local historical society, sharing research techniques and encouraging creative documentation
    of the region’s heritage. These goals combine continued learning, artistic expression, and community service.
