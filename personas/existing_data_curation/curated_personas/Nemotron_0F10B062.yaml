  career_goals: Although currently not in the workforce, Stanley aims to channel his sociable energy and practical expertise into part‑time, flexible roles that keep him connected to the community. He hopes
    to become a seasonal tour guide specializing in marine history and local fishing spots, host a weekly radio segment or podcast featuring Key West anecdotes, and run occasional pop‑up bars or sunset
    cocktail events for tourists and locals alike. He also aspires to mentor emerging hospitality workers, offering informal training sessions that blend structured best practices with the spontaneous vibe
    he enjoys.
