  career_goals: Edmundo wants to secure a stable, well‑paying technical career that lets him support his family while still satisfying his love for hands‑on work. He plans to finish high school, then enroll
    in a local community college or vocational program to study automotive technology or electrical trades. Over the next few years he hopes to earn certifications that will qualify him as a qualified mechanic
    or electrician. In the longer term he dreams of eventually starting a small contracting business that could provide services to neighbors in Edinburg, combining his practical skills with his cooperative
    nature. While he occasionally fancies a future in software development after seeing peers code, his immediate focus remains on a pragmatic path that reduces financial risk.
