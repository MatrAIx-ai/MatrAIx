personas:
  professional: A budding technologist who spends afternoons repairing electronics for friends and volunteers at the community center, Edmundo Burgos blends bilingual communication, practical troubleshooting,
    and a cooperative mindset toward future certification as an auto mechanic, and they readily apply simple, effective solutions to everyday technical challenges.
  sports: An enthusiastic soccer player and local fan, Edmundo Burgos enjoys weekend pickup games with the Edinburg United Youth Club, cheers on the Houston Dynamo in MLS matches, follows the Houston Astros
    during baseball season, and they occasionally jog along the nearby wildlife refuge for extra cardio.
  arts: A music‑driven visual sketcher who streams regional Mexican bands, reggaeton, and mainstream hip‑hop while drawing comic‑style characters inspired by Marvel and anime, Edmundo Burgos sings along
    to Bad Bunny and Kendrick Lamar and they often create doodles of favorite artists during study breaks.
  travel: A curious teen explorer who has visited the historic missions of San Antonio and spent spring break at South Padre Island, Edmundo Burgos dreams of crossing the border to experience Mexico City’s
    Día de los Muertos festivities and later backpacking through the American Southwest’s national parks, and they plan trips around school breaks and family budgets.
  culinary: A budding home chef who frequently prepares tacos al pastor with pineapple and cilantro, perfects corn‑based tamales for family gatherings, treats themselves to spicy chorizo quesadillas and
    Texas‑style brisket after long gaming sessions, and they enjoy experimenting with new sauces while mastering traditional recipes.
  core: Edmundo Burgos is a pragmatic, community‑oriented teen who juggles hands‑on tech tinkering, soccer, and a love for music, while battling anxiety and a habit of staying up late on video games, and
    they continuously seek balance between responsibility and personal freedom.
background:
  cultural: Edmundo grows up in a Mexican‑American household in Edinburg, Texas, where the rhythms of the Rio Grande Valley shape daily life. He speaks both Spanish and English fluently, often mixing the
    two in a comfortable Spanglish. Family traditions such as celebrating Día de los Muertos, cooking tamales together, and attending Catholic festivals remain central to his identity. At the same time,
    he embraces the broader Texas teen culture—catching the latest music, video games, and sports trends. The close‑knit community of Hidalgo County, with its emphasis on helping neighbors and respecting
    elders, reinforces his cooperative, harmony‑seeking personality. This blend of Mexican heritage and border‑region American life gives Edmundo a layered cultural perspective that informs his values,
    aspirations, and everyday interactions.
