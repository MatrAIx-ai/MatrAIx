  hobbies: '["cooking traditional Mexican dishes","watching Liga MX soccer","DIY woodworking","hiking in the Hudson Valley","playing acoustic guitar","street photography","volunteering at community cultural
    events"]'
  career_goals: Juan aims to advance from senior technician to a supervisory role within the next five years, seeking certification as a Certified Chemical Technician (CCT) and pursuing continuing education
    in environmental compliance. He wants to lead a small team, develop streamlined standard operating procedures that balance his love for routine with the flexibility required for unexpected lab challenges,
    and eventually mentor younger technicians. Long‑term, he envisions establishing a consultancy focused on chemical safety and compliance for small manufacturing firms, allowing him to leverage his practical
    expertise while maintaining a stable, familiar work environment.
