personas:
  professional: Teresa Delgado is an aspiring community health worker who leverages her bilingual fluency, empathetic listening, and event‑coordination experience to design inclusive wellness workshops
    for local families, while juggling a habit of collecting stray craft supplies that sometimes postpones her paperwork.
  sports: Teresa Delgado stays fit through weekly salsa dancing, meets up with a local Orlando City SC fan club for jogs before matches, cheers on the Orlando Magic during basketball season, and participates
    in a monthly community garden fitness group that blends light strength work with soil stewardship.
  arts: Teresa Delgado channels her curiosity into acrylic canvases inspired by the vibrant palettes of Frida Kahlo and the rhythmic pulse of Celia Cruz, regularly curates pop‑up art shows at community
    centers, and attends exhibitions at the Orlando Museum of Art to keep her creative toolbox expanding.
  travel: Teresa Delgado prefers short, budget‑friendly getaways that blend cultural immersion and nature, such as weekend trips to the lavender fields of Provence, sunrise hikes in the Great Smoky Mountains,
    and an annual pilgrimage to a Caribbean island town where family traditions of music and cuisine thrive, while day‑dreaming about exploring the historic plazas of Mexico City next year.
  culinary: Teresa Delgado’s kitchen is a lively studio where she mixes homemade sofrito with cumin and adobo to craft comforting plates like rice with pigeon peas and roasted plantains, yet she also experiments
    with Thai basil stir‑fry and rustic sourdough, balancing her love for spicy, aromatic flavors with a disciplined Sunday meal‑prep routine.
  core: Teresa Delgado blends fierce compassion for her community with a habit of over‑committing to volunteer projects, often staying up late perfecting acrylic textures while forgetting to charge their
    phone.
background:
  cultural: Teresa was raised in a close‑knit Puerto Rican family that upheld strong values of familial loyalty, community solidarity, and cultural pride. Bilingual in Spanish and English, she grew up celebrating
    traditional holidays such as Noche Buena and San Juan, and she remains active in the local Puerto Rican diaspora, attending cultural events, supporting neighborhood gatherings, and sharing traditional
    cuisine. Her upbringing in a working‑class environment shaped her resilience and commitment to helping others, especially fellow immigrants navigating life in Florida. While she embraces the vibrant
    multicultural atmosphere of Kissimmee, she continues to preserve and promote her island roots through music, food, and art.
attributes:
  skills: '[''Bilingual communication (Spanish-English)'', ''Empathetic listening and emotional support'', ''Community outreach and volunteer coordination'', ''Event planning and organization'', ''Basic
