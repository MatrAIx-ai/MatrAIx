  hobbies: '[''Acrylic painting'', ''Salsa dancing'', ''Cooking Puerto Rican dishes'', ''Reading fiction and mythology'', ''Community gardening'', ''Visiting art exhibitions'', ''Learning basic French'',
    ''Practicing mindfulness meditation'']'
  career_goals: Teresa aims to obtain her GED within the next year and pursue certification as a Community Health Worker, with the long‑term ambition of establishing a culturally focused community center
    that offers art workshops, wellness programs, and support services for Puerto Rican families in the Kissimmee area. She also hopes to become a part‑time caregiver or support staff at a local senior
    center, allowing her to blend her compassion for others with her interest in health and wellbeing.
