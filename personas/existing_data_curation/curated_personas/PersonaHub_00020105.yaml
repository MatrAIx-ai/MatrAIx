persona_description: A marine biologist and shark researcher who has been using the Crittercam research instrument to study the behavior and foraging habits of sharks, particularly tiger sharks. He has
  been involved in the field test of the Crittercam and is known for his expertise in shark research and the study of their foraging behavior. He is interested in the impact of sharks on the ecosystem and
  the influence they have on the population sizes of their prey. He is also interested in the adaptation of sharks to their environment and their ability to change their underwater environment.
