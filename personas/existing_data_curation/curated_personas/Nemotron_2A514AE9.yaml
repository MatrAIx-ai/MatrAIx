  hobbies: '["Book club", "Quilting circle", "Community gardening", "Church choir", "Hiking with friends", "Genealogy research", "Bridge (card game)", "Traditional cooking", "Oral storytelling events",
    "Intergenerational reading programs"]'
  career_goals: Although formally retired, Jennifer aims to continue mentoring younger teachers through informal coaching, to document and share the oral histories of her community, and to publish a memoir
    of her teaching career that highlights practical, routine‑based pedagogy. She also hopes to lead a local seniors‑youth bridge club and serve as an elder advisor for the Fayette County historical society,
    preserving regional heritage while fostering social connections.
