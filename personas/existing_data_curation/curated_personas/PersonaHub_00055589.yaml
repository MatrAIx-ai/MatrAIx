persona_description: A public health psychologist who advocates for legislation and structural changes to improve children's diets, focusing on changing children's beliefs about food and their food preferences
  through parenting programs and school-based interventions. They believe in the power of taxation to influence unhealthy consumption behavior and have experience with implementing successful taxes in other
  countries. They are well-versed in the biology, home environment, and outside factors that affect children's eating behavior and have a deep understanding of the obesogenic environment. They are passionate
  about tackling the causes of poor diets in children and are committed to promoting a healthier diet for all.
