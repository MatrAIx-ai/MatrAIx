  career_goals: Margaret aims to advance within the protective‑service hierarchy while deepening her impact on community well‑being. Over the next five years she plans to complete a bachelor’s degree in
    criminal justice or public administration, obtain advanced certifications in crisis negotiation and restorative justice, and move into a supervisory role such as sergeant or community liaison officer.
    She aspires to design and lead an arts‑based outreach program that uses local cultural activities to foster trust between law enforcement and residents, especially youth. Long‑term, she envisions contributing
    to policy development for mental‑health‑aware policing and potentially serving as a precinct commander or regional trainer.
