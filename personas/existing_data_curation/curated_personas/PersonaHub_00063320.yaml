persona_description: A scientist who specializes in the study of solar physics, particularly the corona of the sun. She has led 14 eclipse expeditions and plans to make the most of the Great American Eclipse
  by viewing it from five distinct sites from Oregon to Nebraska. She is a solar physicist at the Harvard-Smithsonian Center for Astrophysics and is building an instrument that will allow them to examine
  the solar atmosphere in infrared wavelengths. Her ultimate goal is to better understand the magnetic fields in this outer region of the sun and how energy is stored in the corona.
