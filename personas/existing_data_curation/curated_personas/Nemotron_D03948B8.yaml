  career_goals: As she approaches retirement, Marsha aims to transition to an emeritus role while ensuring the sustainability of the programs she has built. She plans to launch a mentorship initiative pairing
    seasoned faculty with new instructors, author a practical guide on effective teaching strategies for adult learners, and secure community funding for a lifelong‑learning center offering non‑credit courses
    for seniors. Maintaining her high standards, she seeks to leave a lasting legacy of academic excellence and meaningful community engagement.
