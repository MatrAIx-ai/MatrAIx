  career_goals: Evan aims to progress into a senior leadership role—such as Director of Operations or Head of Business Transformation—where he can shape enterprise‑wide initiatives and mentor the next generation
    of analysts. Over the next five years he plans to earn an MBA and achieve a Lean Six Sigma Black Belt, positioning himself as a trusted change‑agent capable of delivering measurable cost savings and
    sustainable growth. He also wishes to cultivate a healthier work‑life balance, developing stress‑management strategies for himself and his team while fostering a collaborative, supportive culture.
