  hobbies: '[''Reading novels'', ''Journaling'', ''Sketching'', ''Playing acoustic guitar'', ''Gardening'', ''Birdwatching'', ''Cooking and baking'', ''Watching wildlife documentaries'', ''Volunteering
    at animal shelter'', ''Exploring local nature trails'']'
  career_goals: Halle aspires to become a veterinarian who works in a rural animal clinic, combining her love for animals with her organized, practical nature. She plans to pursue a degree in animal science
    and hopes to specialize in small‑animal care or wildlife rehabilitation. Her calm resilience and desire to contribute to her community also motivate her to engage in outreach programs that educate children
    about responsible pet ownership and animal health.
