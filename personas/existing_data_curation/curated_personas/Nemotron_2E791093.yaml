personas:
  professional: Gerald Gibbons, a sixteen‑year‑old aspiring graphic designer, merges their self‑taught proficiency in Adobe Photoshop and Illustrator with a knack for dismantling old computers, creating
    bold digital illustrations that reflect a curious, organized mindset and a willingness to experiment beyond conventional design boundaries.
  sports: Gerald Gibbons, a devoted member of the local ‘SpinCycle’ skate crew who spends Saturdays perfecting kick‑flips at the downtown skate park, also follows the Houston Rockets for NBA excitement
    and joins informal basketball pick‑up games at the neighborhood gym, balancing a laid‑back skate culture with disciplined cardio routines.
  arts: Gerald Gibbons, who strums the melancholic chords of Arctic Monkeys on an old Fender while drawing inspiration from street‑art icons like Shepard Fairey and the vivid murals of Houston’s East End,
    also immerses themselves in graphic works by Jessica Walsh and devours William Gibson’s cyberpunk novels, letting these influences shape a visual aesthetic that mixes gritty urban textures with futuristic
    neon hues.
  travel: Gerald Gibbons, whose weekend road trips trace the live‑music trail from Austin to New Orleans and who dreams of a solo pilgrimage to Tokyo’s Akihabara district to soak in neon design culture,
    plans their adventures on a modest budget, leveraging student discounts and couch‑surfing, while keeping a scrapbook of Polaroid shots from each stop.
  culinary: Gerald Gibbons, whose kitchen experiments often result in a quick chicken‑and‑avocado quesadilla or a late‑night ramen bowl spiked with sriracha, also revels in savoring Houston’s smoked brisket
    tacos topped with fresh cilantro and pickled onions, and they’re not shy about adding smoked paprika or a drizzle of lime to elevate ordinary meals.
  core: Gerald Gibbons blends a teen’s skate‑park energy with meticulous design instincts, habitually sketching in the margins of textbooks while hoarding spare computer parts for spontaneous projects,
    and they never start a new illustration without a carefully curated indie playlist.
background:
  cultural: Gerald grew up in Rosenberg, a small city in the Houston‑Metro area of Fort Bend County. His family’s Southern roots and middle‑class upbringing emphasized a strong work ethic, regular church
    attendance, Sunday football traditions, and community gatherings like barbecues. At the same time, the multicultural fabric of Fort Bend—home to vibrant Hispanic, Asian, and African‑American neighborhoods—exposed
    him to a wide variety of foods, music, festivals, and artistic expressions. This combination of traditional Texas values and the county’s diverse cultural influences cultivated his curiosity about different
    art forms and reinforced his desire to create inclusive, community‑focused artwork.
attributes:
  skills: '[''Graphic Design'', ''Digital Photography'', ''Computer Hardware Troubleshooting'', ''Basic Woodworking'', ''Sketching'', ''Critical Thinking'', ''Effective Communication'']'
  hobbies: '[''Sketching'', ''Digital Illustration'', ''Playing Guitar'', ''Skateboarding'', ''DIY Electronics'', ''Reading Science Fiction'', ''Visiting Art Galleries'', ''Participating in Community Murals'']'
  career_goals: Gerald aims to turn his visual creativity and self‑taught technical skills into a professional career in graphic design and digital media. After obtaining his GED, he plans to enroll in
    a community‑college certificate program or an apprenticeship that focuses on graphic design, UI/UX, or multimedia production. He envisions working for a creative agency or launching a freelance studio
    that offers branding, illustration, and mural projects for local businesses and community groups. Alongside his career, he hopes to mentor younger students in Rosenberg, using art to foster inclusive
    community spaces.
