  hobbies: '["Reading historical fashion magazines", "DIY home décor projects", "Gardening", "Cooking regional dishes", "Walking by Lake Erie", "Volunteer sewing workshops", "Collecting vintage fabrics",
    "Listening to folk music", "Puzzle solving"]'
  career_goals: Christen aims to expand her home‑based workshop into a fully fledged boutique in downtown Cleveland that showcases eco‑friendly, made‑to‑measure clothing for professional women. She plans
    to launch an online line of sustainably sourced garments, develop a series of community sewing classes, and attain certification from a regional fashion institute to solidify her reputation as a craft
    expert while preserving a practical, financially sound business model.
