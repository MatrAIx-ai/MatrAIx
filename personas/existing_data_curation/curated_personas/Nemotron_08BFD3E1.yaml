personas:
  professional: Christen Glenn is a seasoned tailor and boutique owner who possesses expert-level pattern drafting, meticulous fabric cutting, and a blend of hand and industrial stitching that reflect a
    practical curiosity, while they maintain disciplined organization and a competitive edge to drive the expansion of a sustainable, made-to-measure fashion line for professional women.
  sports: Christen Glenn enjoys low‑impact fitness through weekend jogs along Lake Erie, supports the Cleveland Browns and Cleveland Guardians, and participates in a local community garden club that doubles
    as a walking group, while they avoid crowded gyms preferring solitary stretching routines.
  arts: Christen Glenn curates a vintage fabric collection inspired by folk musicians like The Carter Family and visual artists such as Grant Wood, spends quiet evenings reading Agatha Christie mysteries,
    and volunteers teaching sewing classes that incorporate the craftsmanship of early 20th‑century American costume design.
  travel: Christen Glenn favors purposeful travel, often planning weekend road trips to historic towns like Hudson, Ohio, and Amish country in Lancaster, Pennsylvania, where they explore local textile markets,
    while dreaming of a sustainable fashion retreat in Copenhagen to study Scandinavian upcycling practices.
  culinary: Christen Glenn's home cooking centers on Midwestern comfort dishes like pierogi stuffed with sauerkraut and cheddar, uses locally sourced carrots and potatoes from their garden, and they showcase
    a competent, hands‑on approach by hand‑rolling gnocchi and fermenting kimchi for occasional dinner parties.
  core: Christen Glenn combines meticulous tailoring expertise with a pragmatic, slightly skeptical entrepreneurial spirit, balancing a love for sustainable craftsmanship against a disciplined, budget‑conscious
    lifestyle.
background:
  cultural: Christen grew up in a working‑class, white Midwestern family in the Cleveland area, where values of self‑reliance, modesty, and community support were emphasized. Influenced by the region's
    industrial heritage and a family tradition of skilled trades, she learned the importance of practical craftsmanship and perseverance. Her cultural upbringing blends Protestant work ethic with an appreciation
    for local immigrant crafts, such as German tailoring techniques, fostering a deep respect for meticulous, hands‑on work and a resilient yet cautious outlook toward new opportunities.
attributes:
  skills: '["Pattern drafting", "Fabric cutting", "Hand stitching", "Industrial sewing machine operation", "Garment fitting and alterations", "Custom dress design", "Fabric sourcing", "Inventory management",
