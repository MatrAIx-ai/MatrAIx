  hobbies: '[''sketching and drawing'', ''digital illustration'', ''waterfront photography'', ''playing acoustic guitar'', ''improv comedy'', ''pickup basketball'', ''ultimate frisbee'', ''bike rides along
    the Jersey Shore'', ''community theater attendance'']'
  career_goals: Harvey aims to earn a shift‑supervisor position within the next two years, leveraging his reliability and teamwork skills. He plans to enroll in a community‑college program in industrial
    design so he can transition into a hybrid role that blends production insight with product development. Long‑term, he dreams of launching a small side venture that creates handcrafted art pieces or
    custom‑printed merchandise, allowing him to fuse his imaginative interests with his manufacturing expertise.
