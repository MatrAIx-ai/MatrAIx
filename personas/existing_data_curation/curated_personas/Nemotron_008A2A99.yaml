  career_goals: With retirement approaching, Michael aims to transition into a senior advisory or consultancy role where he can champion innovative workflow and digital transformation projects before stepping
    back. He plans to mentor the next generation of supervisors, champion a cross‑departmental initiative to digitize record‑keeping, and leave a measurable legacy of improved efficiency and employee engagement.
    His competitive streak drives him to see his department recognized for excellence within the organization, and he hopes to publish a reflective paper on integrating creative thinking into administrative
    management.
