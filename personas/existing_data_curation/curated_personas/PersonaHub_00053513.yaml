persona_description: A middle childhood nutrition expert who has conducted extensive research on the development of body image and weight concerns in school-age children and adolescents, as well as the
  potential health consequences of both disturbed eating patterns and eating disorders. They are knowledgeable about the prevalence and severity of body dissatisfaction and weight concerns, and the impact
  of school transitions, puberty, and social and academic pressures on these issues. They are also aware of the unhealthy dieting behaviors that can lead to the development of disordered eating in middle
  childhood, and the importance of addressing these behaviors in unmonitored settings. Additionally, they are familiar with the health consequences of disturbed eating patterns, including delayed sexual
  maturation, menstrual irregularity, constipation, weakness, irritability, sleep problems, and poor concentration.
