personas:
  professional: Sharareh Shook, an aspiring junior botanist, spends afternoons in the backyard cataloguing leaves with a handwritten notebook, applying their methodical curiosity and love of orderly systems
    to early scientific exploration.
  sports: Sharareh Shook, a little league soccer enthusiast, proudly wears a Columbus Crew Junior jersey, attends a local preschool gymnastics class on Tuesdays, and prefers solo play moments on the neighborhood
    park’s small climbing frame, balancing love for gentle movement with a need for quiet.
  arts: Sharareh Shook, a budding illustrator, loves drawing intricate patterns inspired by family‑cooked fragrant rice dishes in coloring books and sings along to the whimsical tunes of Encanto and Frozen,
    often humming the songs while arranging crayons in precise rows, reflecting their organized yet imaginative nature.
  travel: Sharareh Shook, a curious explorer, has visited the nearby Columbus Zoo with their family, dreamed of seeing the towering redwoods in California, and prefers meticulously planned day trips with
    detailed maps on the fridge, while softening occasional impatience with a favorite stuffed llama.
  culinary: Sharareh Shook, a tiny chef in training, delights in making peanut butter and jelly sandwiches, carefully spreading each layer with a kid‑sized knife, enjoys fluffy pancakes topped with maple
    syrup, and occasionally helps their parents stir a fragrant saffron rice dish seasoned with raisins, reflecting their love for routine and occasional exotic flavors.
  core: Sharareh Shook, a methodical five‑year‑old with a quiet imagination, meticulously arranges crayons, saves every coin, and blends curiosity with routine, all while savoring the occasional exotic
    fragrance of family‑cooked rice.
background:
  cultural: Sharareh grows up in a middle‑class, primarily white neighborhood of Columbus, Ohio. Her family observes typical Midwestern American traditions—celebrating Thanksgiving, Christmas, and Fourth
    of July with family gatherings and community events. The local preschool emphasizes inclusivity and introduces children to a variety of cultural stories and languages, giving Sharareh modest exposure
    to multicultural influences. Though her ethnic background is reported as white, her given name reflects her parents' appreciation for diverse heritage, and occasional family meals feature dishes inspired
    by Persian cuisine, creating a subtle blend of cultural influences within an American Midwestern setting.
