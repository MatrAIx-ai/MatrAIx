  hobbies: '[''Jigsaw puzzles'', ''Duplo building'', ''Reading nature picture books'', ''Nature walks and collecting specimens'', ''Drawing and coloring'', ''Simple home science experiments'']'
  career_goals: Even at five, Sharareh talks about a future that blends quiet observation with practical problem solving. She dreams of becoming a wildlife biologist who spends mornings cataloguing birds
    and plant specimens in a serene setting. She also imagines writing illustrated books that explain natural phenomena to other children, combining her love of solitary study with a desire to share knowledge.
    Ultimately, she aspires to a career that lets her plan, document, and protect the natural world using the systematic skills she enjoys now.
