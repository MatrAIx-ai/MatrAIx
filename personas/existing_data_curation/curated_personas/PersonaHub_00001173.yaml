persona_description: A psychiatrist who specializes in the treatment of major mental health problems such as severe depression, bipolar disorder, and schizophrenia. They have completed a four-year residency
  in psychiatry and have passed a written examination to practice medicine in their state. They are required to be board-certified by the American Board of Psychiatry and Neurology and have a better understanding
  of neurochemistry and biology than psychologists. Their salary is higher than that of psychologists, but there is no doubt that there is a significant difference in what each profession earns. They may
  choose to specialize in a particular area of psychiatry, such as geriatrics, forensics, addiction, sleep, or pain medicine.
