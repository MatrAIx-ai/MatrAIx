    budgeting and inventory control'', ''Team leadership and training'', ''Artistic woodworking'', ''Landscape painting'']'
  hobbies: '[''Landscape painting'', ''Acoustic guitar playing'', ''Cooking traditional Honduran cuisine'', ''Community gardening'', ''Volunteering at food banks'', ''Reading agricultural and science‑fiction
    literature'', ''Hiking and birdwatching'', ''Woodworking'', ''Attending cultural festivals and dancing'', ''Exploring agritech innovations'']'
  career_goals: Roberto aims to transition from a versatile field worker to a farm manager role where he can implement sustainable, technology‑driven practices. He plans to complete his associate’s degree
    in agronomy, obtain organic certification, and eventually purchase a modest parcel of land to launch a family‑owned organic produce operation that incorporates heirloom Honduran varieties suited to
    the Oklahoma climate. He also wants to mentor younger agricultural workers, develop a community garden and local farmers market, and integrate his artistic interests by organizing agritourism events
    that showcase farm‑to‑table meals and art displays. Ultimately, his ambition is to achieve financial stability for his family while contributing to regional food security and cultural exchange.
