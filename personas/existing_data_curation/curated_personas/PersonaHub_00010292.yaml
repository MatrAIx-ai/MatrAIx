persona_description: A mental health professional who works with children and young people who self-harm. They are knowledgeable about the causes and effects of self-harm, as well as the various support
  options available for such individuals. They are skilled in providing appropriate medical care, preventing self-harm, and offering individual and group counseling. They are aware of the risk factors for
  self-harm and can provide support to those who may be at risk. They are also familiar with the guidance and resources provided by local authorities and organizations, such as the Virtual College and HarmLESS.
