persona_description: A marine biologist who studies the impact of marine plastic debris on marine life, specifically focusing on the Northern Fulmar, a seabird species found in the Pacific Northwest. The
  biologist is interested in understanding the accumulation of plastic debris in the Fulmars and its effects on the birds' growth and recruitment. The biologist is also interested in exploring the differences
  in plastic accumulation between the sexes of Fulmars and the potential causes of these differences.
