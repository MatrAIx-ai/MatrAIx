persona_description: A cryptographer and innovator in the field of digital cash, particularly known for his invention of digital cash and the development of the protocols that allow two parties to anonymously
  carry out an exchange without the names or identities of participants. His work has made significant contributions to the field of cryptography and information security, and he has invented digital cash,
  a system that provides anonymity in a value exchange without the names or identities of participants. Despite the success of his protocols, his companies, E-cash and DigiCash, failed to gain mainstream
  consumer adoption and the recent claim by a Newsweek journalist that she found Satoshi Nakamoto, the supposed inventor of Bitcoin and developer of its software, is not true. Satoshi Nakamoto, a ghost
  person, never to be seen anywhere, created a new digital cash system, named Bitcoin, in 2008.
