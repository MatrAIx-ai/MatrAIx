personas:
  professional: Emilia Montalvo, a veteran social and human service assistant with over three decades of experience, leverages meticulous case management, crisis intervention expertise, and fluency in Spanish
    and Quechua to design culturally resonant programs for seniors and immigrant families, and they balance curiosity for new best practices with a pragmatic, organized approach.
  sports: Emilia Montalvo stays active through weekly salsa and cumbia sessions with the Pompano Beach Salsa Society, regular sunrise walks along the shoreline, and cheering on the Miami Dolphins, while
    she channels her competitive streak into occasional beach volleyball games with friends.
  arts: Emilia Montalvo nurtures her creative side by leading watercolor workshops at local senior centers, attending community theater productions featuring works by Neil Simon, and enjoying the vibrant
    rhythms of Celia Cruz and the soulful melodies of Andrés Segovia on her vintage record player.
  travel: Emilia Montalvo favors immersive travel that blends cultural discovery and relaxation, planning trips to Andean mountain villages to explore traditional markets, sunny beach resorts in the Bahamas,
    and historic neighborhoods of New Orleans, while balancing her limited vacation days with family obligations.
  culinary: Emilia Montalvo showcases her culinary passion by hand‑folding savory salteñas stuffed with spiced beef, peas, and olives, perfecting the hearty pique a lo macho with layers of fried potatoes,
    sausage, boiled eggs, and a fiery ají sauce, while tending her coastal herb garden for fresh cilantro and oregano to season every dish.
  core: Emilia Montalvo blends decades of social service expertise with a vibrant love for dance, food, and community activism, navigates life with disciplined pragmatism peppered by competitive curiosity,
    and remains fiercely sociable yet cautiously skeptical of those who underestimate her cultural insight.
background:
  cultural: Emilia was born in Cochabamba, Bolivia, to a family with roots in the Andean highlands. She grew up immersed in Bolivia’s rich traditions of folk music, dance (such as the Diablada), and communal
    celebrations like Carnaval de Oruro. After moving to the United States in the early 1990s to pursue higher education, she settled in Pompano Beach, where she remains deeply connected to the Bolivian
    diaspora through cultural associations and local festivals. She preserves her heritage by cooking classic dishes, teaching traditional dance steps to younger community members, and serving as a cultural
    liaison in her professional role, ensuring that services are delivered with respect for the language, values, and social practices of Bolivian and broader Latinx populations.
