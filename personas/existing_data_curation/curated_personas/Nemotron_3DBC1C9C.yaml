  hobbies: '[''Salsa and cumbia dancing'', ''Cooking Bolivian cuisine'', ''Coastal gardening'', ''Walking on the beach'', ''Reading historical fiction'', ''Learning Haitian Creole'', ''Volunteering at senior
    centers'', ''Leading art‑based workshops'', ''Attending community theater'', ''Watercolor painting'']'
  career_goals: Emilia aims to transition into a supervisory or program‑manager role within a nonprofit or community‑based organization, where she can design and lead culturally tailored services for older
    adults and immigrant families. She plans to pursue a Master’s in Social Work to deepen her theoretical grounding and expand her leadership toolkit. Her long‑term ambition is to launch a bilingual senior
    support program in Broward County that combines health navigation, social engagement, and cultural preservation activities, positioning her as a bridge between the Bolivian diaspora and the broader
    community.
