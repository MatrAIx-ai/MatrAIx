personas:
  professional: A seasoned retail supervisor, Maryjane Lord leverages her business degree and hands‑on store experience to coach sales associates, fine‑tune inventory flow, and blend community events into
    the sales floor, all while navigating the tension between her love of structure and a naturally flexible, sometimes disorganized, work style.
  sports: A community‑oriented fitness enthusiast, Maryjane Lord attends weekly Zumba classes at the local recreation center, leads a neighborhood walking club on the Daniel Boone trails, and roots for
    the Louisville Cardinals basketball team while cheering on the Lexington Legends minor‑league baseball club during summer weekends.
  arts: A bluegrass‑loving creative, Maryjane Lord fills her free time with quilting and DIY décor while regularly attending live shows featuring Bill Monroe tribute bands and Dolly Parton, and she unwinds
    with historical fiction by Philippa Gregory and leadership titles like Good to Great by Jim Collins, weaving her love of storytelling into both her home and her professional mindset.
  travel: A spontaneous weekend explorer, Maryjane Lord often packs a car for a short drive to the Blue Ridge Mountains of Asheville or a music‑filled night in Nashville, has a bucket‑list that includes
    the jazz streets of New Orleans, and balances her travel cravings with budgeting constraints by opting for affordable Airbnbs and group‑travel discounts with her volunteer crew.
  culinary: A hospitality‑focused host, Maryjane Lord curates potluck menus around farm‑fresh dishes such as herb‑infused quinoa salad, slow‑cooked pork shoulder with apple glaze, and fried green tomatoes,
    while regularly harvesting basil, thyme, and kale from her modest garden and experimenting with homemade cornbread and honey‑drizzled scones.
  core: Maryjane Lord is a socially vibrant retail leader who blends structured business acumen with a love for community, active hobbies, and occasional impulsive indulgences, navigating life with both
    pragmatic planning and a flexible, people‑first mindset.
background:
  cultural: Maryjane grew up in a small town near Dry Ridge, Kentucky, in a family rooted in the region’s manufacturing and education sectors. Her upbringing was shaped by a close‑knit community, frequent
    participation in Methodist church activities, county fairs, and high‑school football gatherings. The local culture emphasized hospitality, modest self‑reliance, and a strong sense of neighborliness,
    which she carries into both her personal and professional life. While she identifies with the predominantly White, Southern Appalachian heritage of central Kentucky, her education and retail career
    have broadened her perspective, blending regional values with contemporary business practices.
attributes:
  skills: '[''Team leadership'', ''Customer service management'', ''Inventory control'', ''Visual merchandising'', ''Sales performance analysis'', ''Budgeting and cost management'', ''Conflict resolution'',
