  hobbies: '[''Potluck dinner hosting'', ''Volunteer work at food pantry'', ''Hiking'', ''Zimbra classes'', ''Quilting'', ''Live music attendance'', ''Reading historical fiction'', ''Gardening'']'
  career_goals: Maryjane aims to move from first‑line supervisor to store manager within the next year, positioning herself for a district‑manager track in the next three to five years. She plans to earn
    a professional retail certification and enroll in a part‑time MBA program to deepen strategic planning skills. Long‑term, she envisions developing an omnichannel expertise that blends in‑store experience
    with e‑commerce, possibly launching her own boutique that showcases local Kentucky artisans while mentoring emerging retail talent.
