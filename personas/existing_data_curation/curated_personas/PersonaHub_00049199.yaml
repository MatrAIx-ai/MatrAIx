persona_description: A geographer who specializes in the study of coastal and marine ecosystems, particularly mangrove forests. This individual has expertise in analyzing satellite images, time-series analysis,
  and the impact of agriculture, aquaculture, and urban development on mangrove forests. They are interested in quantifying the role of mangrove forests in saving lives and property from natural disasters
  such as the Asian tsunami, and setting conservation priorities for these ecosystems.
