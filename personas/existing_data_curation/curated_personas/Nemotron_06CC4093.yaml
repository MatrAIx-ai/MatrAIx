  career_goals: Belinda aims to secure an Office Manager position at a growing nonprofit or community arts organization within the next two years. She plans to complete her associate's degree in Business
    Administration and obtain the Certified Administrative Professional (CAP) credential, building on her Microsoft Office Specialist certification. In the longer term, she hopes to combine her administrative
    expertise with her passion for art by becoming an operations coordinator for a regional museum or cultural center, where she can oversee logistics for exhibitions and educational programs. Ultimately,
    she envisions launching a part‑time consultancy that helps small arts nonprofits streamline their back‑office processes while also offering workshops on mindfulness and stress‑reduction for staff.
