personas:
  professional: Edwin Devoe, a veteran landscaper with 30+ years of hands‑on experience, blends their mastery of native‑plant design, irrigation engineering, and CAD drafting with an art‑infused aesthetic,
    guiding clients through meticulous project planning while mentoring crews with a calm, methodical precision.
  sports: Edwin Devoe, a seasonal hiker in the Catskills and occasional pickup basketball player, roots for the New York Yankees, Knicks, and Giants, and volunteers as an assistant coach for the local youth
    soccer league, using weekend trail runs to stay fit.
  arts: Edwin Devoe, an avid gallery‑goer and community‑theater supporter, immerses themselves in the sounds of Miles Davis and B.B. King while exploring works by Edward Hopper and Georgia O'Keeffe, letting
    those visual and musical rhythms inspire their garden compositions.
  travel: Edwin Devoe favors purposeful travel, having trekked the Blue Ridge Parkway, savored New Orleans' jazz heritage, and explored the gardens of Kyoto, while planning future trips to the Mediterranean
    to study historic terraced farming, balancing their itinerary around work commitments and a modest travel budget.
  culinary: Edwin Devoe, an enthusiastic home chef, perfects soul‑food staples like slow‑cooked collard greens, Cajun‑spiced gumbo, and sweet‑potato cornbread using fresh herbs, heirloom tomatoes, and peppers
    from their own garden, and treats each dinner as a studio for experimenting with flavor and presentation.
  core: Edwin Devoe’s life is a harmonious blend of horticultural expertise, jazz‑driven creativity, disciplined finances, and a habit of over‑watering at night while still carving out quiet moments to
    stare at sunrise over their vegetable beds.
background:
  cultural: Edwin is an African‑American who grew up in a close‑knit Black community in New York City, with family roots that trace back to the Great Migration from the Southern United States. He maintains
    strong ties to his cultural heritage through church participation, celebrating Juneteenth, and observing Black History Month. The rhythms of jazz, blues, and soul food are integral to his family traditions.
    Living now in Monsey, he navigates a multicultural environment, engaging respectfully with his predominantly Jewish neighbors while sharing his own cultural experiences. His background informs his appreciation
    of storytelling, community resilience, and the transformative power of art and nature.
attributes:
  skills: '[''Landscape design'', ''Horticulture'', ''Plant health diagnosis'', ''Irrigation system installation and maintenance'', ''Soil analysis and amendment'', ''Hardscape construction'', ''Equipment
