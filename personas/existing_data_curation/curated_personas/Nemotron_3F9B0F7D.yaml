  hobbies: '[''Art gallery visits'', ''Community theater attendance'', ''Jazz and blues listening'', ''Nature photography'', ''Vegetable gardening'', ''Soul‑food cooking'', ''Woodworking'', ''Reading (art
    history, urban design)'', ''Hiking'']'
  career_goals: Edwin aims to transition from employee to owner of a boutique, environmentally‑focused landscaping firm that specializes in low‑water, native‑plant gardens for suburban clients in Rockland
    County. He plans to earn certification in Sustainable Landscape Design and to develop a community garden project that provides horticultural workshops for local youth and seniors. Over the next five
    years he hopes to expand his business to include seasonal garden design for local schools and to serve as a mentor for aspiring groundkeepers, fostering a pipeline of skilled workers from diverse backgrounds.
