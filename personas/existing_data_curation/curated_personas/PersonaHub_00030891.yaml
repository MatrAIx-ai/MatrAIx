persona_description: A scholar who specializes in the representation of African American women in literary texts about the urban setting. They are interested in analyzing the intersections between race,
  class, and gender to understand the complexities of the urban experience. They have a particular interest in analyzing the challenges faced by Black women in urban life and how they have helped to create
  or reclaim urban spaces. They are eager to learn from the rich analysis provided by the texts and characters they will be studying.
