    problem solving'', ''Presentation and public speaking'', ''Networking within regional industry associations'', ''Adaptability to new sales technologies'']'
  hobbies: '[''Cooking traditional Mexican recipes'', ''Gardening (herbs, chilies, tomatoes)'', ''Reading mystery and historical fiction'', ''Attending local cultural festivals (e.g., Fiesta San Antonio)'',
    ''Volunteering at bilingual education programs'', ''Walking her dog in Hemphill Park'', ''Low‑impact yoga'', ''Salsa dancing (social evenings)'', ''Exploring new coffee shops'']'
  career_goals: Carmen aims to transition into a senior sales leadership role where she can mentor newer representatives and shape regional sales strategy. She is interested in earning a certification in
    supply‑chain management to deepen her expertise in logistics and e‑commerce integration. Over the next five years, she hopes to lead a high‑performing sales team, contribute to the development of training
    programs for bilingual sales staff, and secure a flexible schedule that balances increased responsibility with personal time as she approaches retirement.
