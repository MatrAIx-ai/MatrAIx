  hobbies: '[''Woodworking'', ''Gardening'', ''Photography'', ''Local theater'', ''Reading (art history, local history)'', ''Chess'', ''Travel to museums'', ''Birdwatching'', ''Volunteer work'', ''Community
    fairs'']'
  career_goals: He intends to stay actively engaged by mentoring retirees in DIY workshops, serving on the board of the local arts council, curating a community photo exhibit that captures York County's
    historic sites, and completing a personal travel itinerary of the nation’s major art museums before turning 80. He also aspires to write a memoir reflecting on his lifetime of curiosity and learning.
