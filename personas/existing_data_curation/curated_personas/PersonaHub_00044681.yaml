persona_description: A researcher in the field of nanotechnology, specifically focused on the development of new nanomanufacturing processes and equipment to overcome the challenges of scaling down materials
  and devices to the nanoscale. The persona is dedicated to the creation of practical, manufacturable nanoscale devices and systems, and is seeking to simplify the design and fabrication process for nanoscale
  systems. They are passionate about the unique and extraordinary mechanical, electrical and thermal properties that emerge with the scaling down of materials and devices to the nanoscale, and are committed
  to the development of new assembly methods, improved device design, and novel nanomanufacturing equipment and processes to turn these phenomena into practical, manufacturable products.
