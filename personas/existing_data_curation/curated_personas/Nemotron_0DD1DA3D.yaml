personas:
  professional: Fermin Bendana, a seasoned HVACR mechanic with two decades of experience, leverages precise diagnostic skills, EPA Section 608 certification, and a methodical work style to troubleshoot
    complex heating and cooling systems, while they balance a reserved yet assertive demeanor to ensure clear communication with homeowners and leadership on project teams.
  sports: Fermin Bendana enjoys early‑morning fishing trips on the Chesapeake Bay as a solitary sport, participates in a local anglers’ club, follows D.C. United and the Washington Capitals, and maintains
    a modest fitness routine that includes weekend jogging and occasional pickup basketball at the community center.
  arts: Fermin Bendana finds solace in traditional folk music, regularly listening to Los Tigres del Norte and Carlos Vives while cooking, appreciates the paintings of Frida Kahlo and the poetry of Pablo
    Neruda, and occasionally attends community theater productions featuring works by Lin‑Manuel Miranda.
  travel: Fermin Bendana prefers well‑planned road trips that balance cultural immersion with relaxation, having explored the colonial streets of Antigua, the rainforests of Costa Rica, and the historic
    neighborhoods of Old Town Alexandria, while they dream of a future eco‑tour in Patagonia and a pilgrimage to the basilica of Lourdes.
  culinary: Fermin Bendana enjoys preparing aromatic pepian and handmade tamales, skillfully blending roasted tomatillos, plantains, and corn masa, and they also experiment with grilled salmon seasoned
    with cilantro and lime, but they admit to over‑salting dishes when stressed.
  core: Fermin Bendana merges meticulous craftsmanship with a quiet, community‑focused spirit, relying on structure yet occasionally indulging in spontaneous fishing trips and a stubborn reluctance to delegate.
background:
  cultural: Fermin grew up in a Guatemalan immigrant family, where Spanish was spoken at home and family gatherings centered around traditional celebrations such as Semana Santa and Día de los Muertos.
    His parents instilled a strong work ethic and a sense of communal responsibility, values that continue to shape his approach to both his trade and his family life. While he has adapted to life in Silver
    Spring, Maryland, he maintains cultural ties through participation in the local Guatemalan community association, attending cultural events, and sharing traditional foods with neighbors. His Catholic
    upbringing influences his appreciation for modest rituals and communal support, and his bilingual ability enables him to bridge cultural gaps with both Spanish‑speaking clients and English‑speaking
    colleagues. These cultural roots provide him with a resilient perspective that balances the practical demands of his occupation with the importance of family, community, and heritage.
attributes:
  skills: '["HVAC system installation", "Refrigerant handling and recovery (EPA 608 certified)", "Diagnostic troubleshooting using multimeters and manifold gauges", "Ductwork design and fabrication", "Preventative
    maintenance planning", "Energy-efficiency retrofitting", "Compliance with Maryland building codes", "Electrical wiring and control system repair", "Customer communication and service documentation",
    "Mentoring junior technicians"]'
  hobbies: '["Fishing at Chesapeake Bay", "Woodworking (shelves, birdhouses)", "Cooking Guatemalan cuisine (pepian, tamales)", "Viewing Guatemalan soccer matches with friends", "Gardening", "Reading technical
    manuals and DIY guides"]'
  career_goals: Fermin aims to advance to a senior lead technician role within the next three years, overseeing small project teams and ensuring quality standards on larger commercial installations. He
    plans to obtain the NATE (North American Technician Excellence) certification to deepen his technical credibility. Over the longer term, he hopes to launch his own locally‑focused HVAC service company
    that offers reliable, energy‑efficient solutions to the Silver Spring community, while providing apprenticeship opportunities for other workers from under‑represented backgrounds. He also seeks to become
    a trusted advisor on green refrigerant alternatives, aligning his practical experience with emerging sustainability trends.
