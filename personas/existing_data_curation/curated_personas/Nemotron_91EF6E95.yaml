  career_goals: Shawna dreams of turning her love for art and science into a future career as a children's book illustrator or a product designer who creates educational toys. She hopes to win science fairs
    and art contests, eventually studying illustration or engineering at a university, and aims to combine creativity with problem-solving to design interactive museum exhibits.
