personas:
  professional: Shawna Pinkowski, a budding digital artist and junior game designer, channels a curious mind and meticulous planning into creating whimsical Scratch games, and they often push their competitive
    edge toward winning school tech showcases and mastering online chess puzzles.
  sports: Shawna Pinkowski, a forward on the Cedarwood Elementary soccer team and member of the local Cedarwood Youth Soccer Club, trains twice weekly, follows the U.S. Women's National Soccer Team and
    the nearby MLS side Portland Timbers, and they treat each match as a chance to out‑maneuver opponents with the same strategic precision they apply to chess.
  arts: Shawna Pinkowski spends afternoons sketching dragons and enchanted forests, drawing stylistic inspiration from Van Gogh’s bold brushstrokes and Hayao Miyazaki’s whimsical animation, while they listen
    to a soundtrack that swings between Ariana Grande’s pop anthems and the epic orchestral scores of How to Train Your Dragon, illustrating how art fuels their imagination.
  travel: Shawna Pinkowski’s family vacation style combines meticulously planned museum visits—such as trips to New York’s American Museum of Natural History and Washington, D.C.’s Smithsonian Air and Space
    Museum—with occasional day trips to a nearby botanical garden, and they dream of a passport‑stamped tour of the Louvre in Paris while preferring structured itineraries over spontaneous adventures.
  culinary: Shawna Pinkowski loves crafting mini‑pizza masterpieces topped with mozzarella, pepperoni, and oregano, blending banana‑strawberry‑blueberry smoothies for a burst of color, and they eagerly
    request cucumber‑avocado sushi rolls after museum outings, though they often forget to brush their teeth after indulging in sweet chocolate chip cookies.
  core: Shawna Pinkowski is a hyper‑curious nine‑year‑old whose relentless doodling, competitive chess streak, and habit of worrying over every detail shape a life lived at the crossroads of imagination
    and meticulous planning, and they constantly balance creative bursts with cautious self‑scrutiny.
background:
  cultural: Shawna is a White American growing up in The Colony, Texas, a suburban community in Denton County. Her family has Polish ancestry, reflected in occasional traditional foods like pierogi and
    celebrations of heritage. She experiences typical American middle-class values, including a strong emphasis on education, community involvement, and participation in school and neighborhood activities.
    The local culture blends Southern Texas traditions—such as football fandom and BBQ gatherings—with a diverse multicultural environment, exposing her to a variety of perspectives. Holiday celebrations
    like Thanksgiving and Christmas are central to family life, and community events often include arts festivals and museum outings, nurturing her curiosity and appreciation for the arts.
