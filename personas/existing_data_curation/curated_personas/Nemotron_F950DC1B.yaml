    staff'']'
  hobbies: '[''Art museum visits and sketching'', ''Photography of landscapes and historic transit sites'', ''Reading travel literature and collecting postcards'', ''Model‑train building'', ''Gardening'',
    ''Chess'', ''Genealogical research'', ''Planning art‑focused travel itineraries'']'
  career_goals: Approaching retirement, David aims to transition from full‑time ticketing to a part‑time consultancy role where he can mentor younger agents and help small travel agencies modernize their
    reservation processes. He hopes to compile a memoir that blends his travel industry anecdotes with his lifelong love of art, offering practical tips and cultural insights for senior travelers. A personal
    ambition is to plan and take a once‑in‑a‑lifetime art‑focused trip to Italy with his wife, visiting Renaissance museums and historic sites he has long studied. He also wishes to volunteer with the local
    historical society to document the evolution of transportation in Sanpete County.
