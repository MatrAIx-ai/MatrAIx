personas:
  professional: David Simms, a veteran reservation and transportation ticket agent nearing retirement, leverages four decades of mastery over Sabre, Amadeus, and legacy fare systems to mentor emerging agents
    and streamline small agency workflows, applying his methodical, skeptical eye to negotiate optimal pricing and ensure regulatory compliance.
  sports: David Simms, a devoted fan of the Utah Jazz and the University of Utah Utes football team, participates in a weekly senior walking club at the local park, occasionally joins a casual senior golf
    league, and maintains a low‑impact fitness routine that balances his love for gardening with gentle stretches to manage joint stiffness.
  arts: David Simms, an avid sketcher and photographer who frequents the Spring City Museum, draws inspiration from Ansel Adams' landscapes and Claude Monet's impressionist palettes, and collects vintage
    postcards featuring historic train stations, often spending evenings reproducing these scenes in charcoal while listening to classical piano recitals.
  travel: David Simms, whose travel literature stash includes John Steinbeck’s *Travels with Charley* and Bernard Moitessier’s *The Long Way*, enjoys meticulously planned road trips to historic railway
    towns like Durango and Hobo, dreams of a Renaissance‑focused pilgrimage to Florence, Tuscany, and Rome with his wife, and prefers small‑group tours that respect his need for solitude and schedule flexibility.
  culinary: David Simms, a competent home cook who cultivates herbs in his garden, favors dishes such as rosemary‑infused roasted chicken, beet and goat cheese salad, and traditional Italian pasta al pomodoro,
    yet occasionally indulges in an extra slice of pecan pie while overlooking portion control, and enjoys sipping a well‑brewed espresso after reviewing his latest postcard acquisitions.
  core: David Simms, a methodical retiree who balances a critical eye for travel costs with an unquenchable curiosity for art and history, often loses track of time sketching railway vistas, hoards antique
    postcards, and can’t resist a late‑night espresso before bed.
background:
  cultural: David grew up in Spring City, a historic settlement in Sanpete County with deep roots in the Church of Jesus Christ of Latter‑day Saints. The community’s emphasis on family, modesty, hard work,
    and service shaped his values and his reserved, methodical demeanor. While his cultural upbringing is firmly American‑Western and Mormon‑influenced, his long career in travel exposed him to diverse
    cultures and ideas, fostering a quiet curiosity about art, history, and global perspectives. He balances the traditional, close‑knit values of rural Utah with an appreciation for unconventional thinking
    and artistic expression, reflecting both his local heritage and the broader world he has encountered through his profession.
attributes:
