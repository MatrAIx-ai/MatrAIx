personas:
  professional: Ruth Crocker is an aspiring game developer who blends her love for drawing, storytelling, and Scratch coding to prototype whimsical interactive experiences, channeling their organized, critical
    mindset to meticulously plan each game’s level and mechanics.
  sports: Ruth Crocker is a forward for the Midtown Junior Soccer Club, practices three times a week, and cheers for the U.S. Women’s National Soccer Team, balancing a competitive drive on the field with
    a disciplined fitness routine that includes evening jogs and weekly yoga sessions.
  arts: Ruth Crocker immerses themselves in the visual arts by attending Saturday workshops at the City Art Center, studying the techniques of Frida Kahlo and the street murals of Banksy, while also drawing
    inspiration from the animated storytelling of Studio Ghibli and the music of Billie Eilish during creative sessions.
  travel: Ruth Crocker loves weekend road trips to the nearby Natural History Museum in Springfield, camping at Lakeview State Park, and dreams of visiting the ancient temples of Kyoto and the vibrant streets
    of Barcelona, planning each journey with detailed sketch maps and a travel journal.
  culinary: Ruth Crocker enjoys cooking simple dishes like homemade pepperoni pizza with mozzarella and fresh basil, experimenting with sushi rolls featuring avocado and cucumber, and snacking on trail
    mix with dried apricots and dark chocolate chips, yet often burns the edges of their cookies when multitasking between art projects.
  core: Ruth Crocker is a fiercely curious 12‑year‑old who merges art, code, and sport with disciplined planning, a competitive streak, and a habit of juggling too many projects at once.
background:
  cultural: Ruth grew up in Palmdale, a suburban city in the high desert of Los Angeles County. Her family celebrates typical American holidays and often takes weekend trips to the cultural institutions
    of Los Angeles, such as art museums and science centers. The local community reflects a predominantly white, middle‑class suburban environment, yet the broader region exposes her to the diverse cultural
    tapestry of Southern California. Palmdale’s aerospace heritage and proximity to desert landscapes also shape her appreciation for innovation and the outdoors.
attributes:
  skills: '["Class secretary and event coordinator", "Digital illustration with Procreate", "Traditional sketching and painting", "Team leadership in soccer", "Public speaking and debate", "Critical analysis
