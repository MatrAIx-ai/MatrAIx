  career_goals: Ruth envisions a future where she can blend her love for art and technology, aspiring to become a graphic designer or user experience (UX) designer for interactive media. She is also intrigued
    by museum work, dreaming of curating engaging exhibits that invite visitors to explore creativity. In the long term, she hopes to lead community art initiatives that inspire peers and promote innovative
    thinking.
