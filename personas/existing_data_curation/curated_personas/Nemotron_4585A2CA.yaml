  career_goals: Although retired from formal employment, David aims to leave a lasting cultural imprint on his community. He hopes to compile an illustrated memoir of Vernal's history and natural heritage,
    develop a weekly art workshop for seniors, and expand the local senior center's intergenerational programming. He also aspires to volunteer as a guide for paleontology tours at the nearby Dinosaur National
    Monument, and to complete a series of landscape paintings documenting the Uintah Basin across the seasons.
