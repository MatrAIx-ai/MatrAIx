persona_description: A decision-maker who is responsible for making choices from among two or more alternatives in an organization. This person is typically a top manager, middle or lower-level manager,
  or an employee who has job-related decision-making authority. They are aware of the problem and need to make a decision, and they interpret and evaluate information to develop alternatives and evaluate
  their strengths and weaknesses. They are aware of perceptual distortions that can bias their analysis and conclusions, and they strive to make informed decisions based on their perceptions.
