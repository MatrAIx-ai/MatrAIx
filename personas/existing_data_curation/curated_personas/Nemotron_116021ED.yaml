personas:
  professional: Richard Wiggins, a 19‑year‑old aspiring automotive technician, leverages his natural mechanical aptitude and methodical work ethic to excel at small‑engine repair and routine maintenance,
    aiming to earn ASE certification and eventually run a modest garage in Steuben County.
  sports: Richard Wiggins follows the Buffalo Bills and New York Yankees faithfully, participates in the Steuben County hunting association during deer season, rows in a local fishing league on weekends,
    and maintains fitness through occasional weight‑lifting at the community gym, preferring low‑key, routine‑based exercise over competitive sports.
  arts: Richard Wiggins, a fan of classic rock icons like Bruce Springsteen and country legends such as Johnny Cash, uses their music as the soundtrack for his woodworking and engine projects, occasionally
    attending a local folk‑art exhibit or community theater production when it fits his schedule.
  travel: Richard Wiggins prefers meticulously planned road trips to nearby fishing destinations like the Adirondack lakes and Michigan’s Upper Peninsula, balancing his love for solitude with budget‑friendly
    stays at state campgrounds, and dreams of a future cross‑country drive to explore the historic Route 66.
  culinary: Richard Wiggins enjoys hearty, home‑cooked meals—grilling trout caught on his own trips, slow‑cooking beef chili with beans and corn, and finishing with a tangy barbecue sauce on pork ribs—while
    his cooking skill hovers at confident skillet and grill proficiency.
  core: Richard Wiggins is a solitary, routine‑oriented 19‑year‑old who fixes engines by day, hunts at dawn, and meticulously tracks every expense, all while humming classic rock and occasionally forgetting
    to floss.
background:
  cultural: Richard grew up in Angola, Indiana, a small Midwestern town steeped in working‑class, white, Midwestern culture. His family emphasized self‑reliance, hard work, and community involvement, values
    common in the region. He was raised in a Protestant household that highlighted modesty, practicality, and routine. The local culture prizes straightforward, dependable lifestyles, which aligns with
    Richard's preference for familiar routines and practical solutions. He has been shaped by the close‑knit community of Steuben County, where neighborly support and modest social gatherings are the norm,
    reinforcing his reserved yet cooperative nature.
attributes:
  skills: '[''Mechanical repair (automotive & small engines)'', ''Basic carpentry and woodworking'', ''Hand tool proficiency'', ''Basic computer operation (Microsoft Office, email)'', ''Cash handling and
    point‑of‑sale basics'', ''Routine maintenance scheduling'', ''Practical problem solving'', ''Reliable time management'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking (building small furniture and workbenches)'', ''Restoring and maintaining small engines (motorcycles, lawn mowers)'', ''Listening to classic rock and
    country music'', ''Reading DIY and automotive repair manuals'', ''Playing single‑player video games'', ''Volunteer work at community clean‑up events'']'
  career_goals: Richard aims to first obtain his GED within the next year, then enroll in a vocational program at a nearby community college focusing on automotive technology or diesel equipment maintenance.
    His short‑term goal is to secure an entry‑level technician position at a local auto shop or farm‑equipment service center, where he can apply his love of routine and practical work. Long‑term, he aspires
    to earn ASE certification, specialize in diesel engine repair for agricultural machinery, and eventually open a modest garage serving the Steuben County community. He values a career that offers predictable
    schedules, clear responsibilities, and the independence to work largely on his own, aligning with his preference for solitude and stability.
