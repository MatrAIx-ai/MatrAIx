persona_description: A scientist and researcher in the field of immunology and oncology, specifically focusing on the use of T cells in adoptive cell therapy for cancer treatment. She is a PhD student at
  the Faculty of Veterinary Medicine and has published several papers on the topic. Her research involves studying Th17 cells and their interactions with other cells in dogs, as well as investigating the
  use of modified cells in dogs with cancer. She is also interested in studying calcium and sodium ion channels for sodium and calcium, and has recently joined a team of researchers at the Warsaw University
  of Life Sciences.
