  career_goals: Kristina aspires to attend a specialized high‑school program in visual arts and technology, followed by a bachelor’s degree in interactive media, graphic design, or concept art. She dreams
    of becoming a concept artist for video games or animated films, merging her love of novelty and abstract concepts with cutting‑edge digital tools. She also hopes to author and illustrate a graphic novel
    that explores futuristic themes. To achieve these goals, she plans to build a strong portfolio through school art exhibitions, online communities, and summer workshops, and seeks scholarship opportunities
    that reward creative talent and academic curiosity.
