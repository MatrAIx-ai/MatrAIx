  hobbies: '[''Home recipe experimentation'', ''Bass fishing on Lake Lewisville'', ''Attending live‑music shows in Denton'', ''Listening to tech and culinary podcasts'', ''Participating in local trivia
    competitions'']'
  career_goals: Lonnie aims to leverage his managerial experience into opening his own casual‑fine‑dining eatery that blends classic Texas barbecue with innovative international flavors. He plans to earn
    a Certified Food Manager (CFM) credential and eventually a culinary associate degree to bolsters his credibility. In the medium term, he hopes to become a regional manager for a multi‑unit restaurant
    chain, using his competitive drive to improve performance metrics across locations.
