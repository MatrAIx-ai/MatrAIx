personas:
  professional: Lonnie Madden, a 29‑year‑old food‑service manager, blends hands‑on kitchen expertise with sharp operational oversight, driving profitability through meticulous inventory control, staff mentorship,
    and a constant eye on emerging restaurant‑automation trends, all while they plan to launch a casual‑fine dining eatery that fuses classic barbecue with global flavors.
  sports: Lonnie Madden spends Saturday mornings fishing with the Lake Lewisville Bass Anglers Club, often entering local bass‑tournament brackets, while they root for the Dallas Cowboys in football season,
    the Dallas Mavericks in basketball, the Texas Rangers during baseball, and the Dallas Stars in hockey, and they squeeze in weekday pickup softball games at Denton’s community fields to stay active.
  arts: Lonnie Madden frequents Denton’s Dan’s Silverleaf and the historic Palace Theatre, delighting in indie‑folk acts like The Milk Carton Kids, country‑rock star Kacey Musgraves, and blues guitarist
    Gary Clark Jr., while their vinyl shelf boasts Johnny Cash, St. Vincent, and The Avett Brothers, and they use this eclectic soundtrack to shape their culinary creativity, blending tradition and experimentation.
  travel: Lonnie Madden prefers road‑trip adventures that combine culinary discoveries with outdoor pursuits, having driven to Santa Fe for its Southwestern art scene, to New Orleans for its vibrant jazz
    and gumbo, and dreaming of a hiking tour through Patagonia while they balance a modest travel budget that still accommodates occasional weekend getaways to nearby Austin for live‑music festivals.
  culinary: Lonnie Madden, an avid home cook, expertly prepares smoky brisket tacos infused with chipotle‑marinated pork, tangy pomegranate‑glazed carrots, and a side of jalapeño‑cornbread, constantly experimenting
    with mesquite‑smoked rubs and international spice blends, and they take pride in serving friends dishes like chili‑mac and shrimp étouffée that reflect a marriage of Southern comfort and bold global
    flavors.
  core: Lonnie Madden is a fiercely competitive yet curious food‑service leader who balances a love for Tex‑Mex‑style BBQ innovation with a penchant for weekend bass fishing, strategic budgeting, and an
    unapologetic drive to out‑perform every metric, and they never shy away from a heated trivia showdown.
background:
  cultural: Lonnie grew up in the Texan suburbs of Denton County, absorbing a blend of Southern hospitality and Mid‑Western pragmatism. His upbringing in a predominantly white, middle‑class community emphasized
    self‑reliance, hard work, and a love for regional cuisine like barbecue and Tex‑Mex. While he never completed a formal high‑school diploma, the local culture of resourcefulness and community support
    shaped his practical, hands‑on approach to work and life.
attributes:
