persona_description: A Jesuit priest who founded the nonprofit organization Solar Alternatives and Associated Programs (SAAP) in Bihar, India, with the goal of producing solar devices to save trees and
  provide a reliable energy supply. Mathew, SJ, went to Gujarat in early 1996 to study renewable energy under the inventor of the solar concentrated Scheffler community cooker, Wolfgang Scheffler. SAAP
  has filled orders for various applications of this technology in eighteen states across India, and has developed a prototype solar-powered cycle rickshaw. The organization has also developed a cost-effective
  option for the poor and is the sole fabricator in Bihar state. Mathew is popularly known as "Solar Mathew" and has produced various solar devices, including solar electricity, cookers, hot water, steam
  for turbines, and refrigerators.
