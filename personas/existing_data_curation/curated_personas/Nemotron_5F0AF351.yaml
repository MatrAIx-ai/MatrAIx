  career_goals: Mohammad dreams of a future where he can combine his love for art and exploration. He imagines becoming an artist who paints the mountains and skies of Colorado, or an astronaut who draws
    the stars while traveling through space. He also talks about wanting to be a teacher or community helper who creates fun, creative learning experiences for other kids, helping them feel safe and happy.
    His ambitions are shaped by his curiosity, his desire to bring harmony to others, and his fascination with new ideas.
