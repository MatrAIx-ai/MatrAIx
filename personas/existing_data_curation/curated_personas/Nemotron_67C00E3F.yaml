  career_goals: At three years old, Justin's ambitions are centered on growing independence and mastering foundational skills. He aims to write his name clearly, put on his shoes without assistance, and
    help set the dinner table. He also expresses a playful fascination with helping others, often saying he wants to be a firefighter or police officer when he grows up because he likes the clear rules
