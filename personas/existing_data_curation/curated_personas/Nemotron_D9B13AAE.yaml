  career_goals: Giovanni aims to pursue a stable, practical career that blends his organizational strengths with his desire to help others. He plans to enroll in a community college program in Business
    Administration or Non‑profit Management, with the goal of becoming an operations coordinator for a local organization serving the Mexican‑American community. Over the next five years, he aspires to
    advance to a program director role, where he can design and implement community support initiatives, ensuring they run efficiently and meet the high standards he values. He also hopes to earn certifications
    in project management to further enhance his effectiveness in structured environments.
