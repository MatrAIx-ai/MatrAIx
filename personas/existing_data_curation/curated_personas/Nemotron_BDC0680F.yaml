  career_goals: Maritza aims to advance to a senior program manager role within the next three years, overseeing multi‑disciplinary portfolios that blend technology and infrastructure. She plans to earn
    her PMP certification and pursue a bachelor’s degree in Business Administration to strengthen her strategic acumen. Long‑term, she envisions founding a consultancy that helps organizations adopt innovative,
    flexible project methodologies while championing culturally inclusive practices. She also aspires to mentor emerging project managers, particularly women and members of the Hispanic community, fostering
    a more diverse leadership pipeline.
