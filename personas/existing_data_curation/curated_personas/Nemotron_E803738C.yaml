  hobbies: '[''Recreational soccer'', ''Hiking local trails'', ''Cooking Southeast Asian cuisine'', ''Building custom PCs'', ''Attending cultural festivals'', ''Volunteering at youth tech workshops'', ''Playing
    tabletop board games'', ''Biking around Saint Paul'']'
  career_goals: Hoan aims to advance to a senior field‑service engineer role where he can lead a team of technicians, design maintenance protocols, and oversee larger‑scale equipment contracts. He plans
    to obtain certifications such as CompTIA A+ and the Certified Service Desk Technician (CSDT) to formalize his expertise, and is considering part‑time coursework toward an associate degree in information
    technology. In the long term, Hoan envisions launching his own boutique service company that offers quick‑response repair and preventive maintenance for banking and office equipment across the Twin
    Cities region, leveraging his network of contacts and reputation for reliability.
