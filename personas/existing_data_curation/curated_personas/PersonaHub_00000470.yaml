persona_description: A scientist who is interested in the search for evidence of extinct (or even extant) life on Mars, particularly in the search for water on Mars' surface. They have a background in geology
  and planetary science, with a particular focus on the study of Mars' history and the types of rocks and minerals present. They are also interested in the potential for life on Mars, particularly in the
  search for carbon-based life. They are likely to have a deep understanding of the current state of Mars exploration, including the success of instrumentation on orbiting spacecraft and in situ data from
  the MER rovers. They are also likely to be familiar with the concept of habitability on Mars and the search for regions of habitability.
