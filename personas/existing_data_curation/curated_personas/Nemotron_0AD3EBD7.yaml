personas:
  professional: Larry Richie, a seasoned food‑processing specialist with deep expertise in HACCP compliance, high‑speed packaging maintenance, and employee training, channels their exceptionally calm and
    resilient temperament and cooperative nature into keeping production lines running smoothly under pressure while mentoring newcomers.
  sports: Larry Richie, a devoted fan of the Dallas Cowboys and Houston Astros, spends Saturdays fishing at Lake Conroe, joins a local hunting club for spring turkey drives, and they squeeze in occasional
    weight‑lifting sessions in the garage to stay fit, preferring low‑key, outdoor‑focused activities over organized team sports.
  arts: Larry Richie, a hands‑on woodworker who restores classic cars, finds creative inspiration in the blues of Stevie Ray Vaughan, the storytelling of Cormac McCarthy, and the gritty cinematography of
    Clint Eastwood, and they often listen to the Rolling Stones while sanding a new tabletop.
  travel: Larry Richie, who favors spontaneous weekend road trips over lengthy vacations, often drives to the Texas Hill Country wineries, has a bucket‑list destination of a hunting lodge in New Zealand,
    and dreams of a culinary tour along the Gulf Coast islands, and they always balance family commitments with a desire for rugged adventure.
  culinary: Larry Richie, an accomplished backyard pitmaster, relishes smoking brisket with a coffee‑chili rub, perfecting homemade Texas‑style sausage seasoned with garlic, paprika, and cayenne, and they
    regularly experiment with mesquite wood and applewood chips to craft distinct flavor profiles for community potlucks.
  core: Larry Richie, a calm, curiosity‑driven problem‑solver, blends a love of solitary hunting and fishing with a passion for communal BBQ, yet they habitually misplace their favorite wrench in the garage
    and rely on last‑minute plans for both work projects and weekend outings.
background:
  cultural: Larry was raised in a small, close‑knit community in Central Texas, where the values of Southern hospitality, a strong work ethic, and self‑reliance are deeply ingrained. His family’s roots
    trace back to Anglo‑American settlers, with a mix of German and Irish ancestry common in the region. Growing up, he participated in church activities, local high‑school sports events, and family gatherings
    centered around backyard barbecues and hunting trips. These experiences have shaped his pragmatic outlook, respect for tradition, and appreciation for community harmony, all of which continue to inform
    his personal and professional life.
attributes:
  skills: '["Industrial food processing equipment operation", "Food safety and sanitation compliance (HACCP, FSMA)", "Quality assurance inspections", "Basic equipment maintenance and troubleshooting", "Inventory
