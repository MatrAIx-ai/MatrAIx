persona_description: A technical rescue responder who has completed the NFPA 1670 training and is familiar with the Standard's size-up points. The responder has experience conducting accurate and efficient
  scene size-ups upon arrival at vehicle incidents, including conducting a "side impact collision size-up" as described in the text. The responder is competent in conducting a scope and magnitude analysis,
  risk/benefit analysis, number/size of vehicles and/or machines affected, integrity and stability of vehicles and/or machines affected, number of known/potential victims, access to the scene, hazards such
  as disrupted or exposed utilities, standing or flowing water, mechanical, hazardous materials, electrical, and explosives, exposure to traffic, environmental factors, and available/necessary resources.
  The responder is also familiar with the NFPA 1670 size-up points as they apply to one specific vehicle crash, a Saturn 2-door coupe into a pole.
