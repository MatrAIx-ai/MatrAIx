persona_description: A Plant Physiologist and Geneticist with expertise in the use of Geographic Information Systems (GIS) in defining agro-ecosystems and understanding climate change impacts on wheat production.
  He/she has experience with spatially disaggregated datasets and GIS tools, and has contributed to the characterization and mapping of mega-environments in wheat production regions. The persona is interested
  in exploring future climate scenarios and the potential changes in wheat production environments, and is looking for opportunities to incorporate temporal aspects into environment definition. The persona
  is likely to be involved in research projects, workshops, and conferences related to wheat production, climate change, and GIS.
