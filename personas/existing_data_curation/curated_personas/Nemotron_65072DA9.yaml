  hobbies: '[''Gardening'', ''Birdwatching'', ''Hiking'', ''Woodworking'', ''Reading Historical Nonfiction'', ''Bridge (Card Game)'', ''Community Garden Volunteering'', ''Church Choir Participation'', ''Cooking'',
