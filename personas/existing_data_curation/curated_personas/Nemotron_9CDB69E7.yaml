personas:
  professional: Marcelino Choquehuanca is a budding nine‑year‑old designer‑engineer who blends cartoon drawing, LEGO city construction, and Minecraft Redstone circuitry into elaborate projects, showcasing
    an early knack for creative problem‑solving and a competitive drive to outdo peers' builds.
  sports: Marcelino Choquehuanca is a regular on the under‑10 soccer team at the local park, cheering for City United’s senior squad, and balances competitive match play with casual kick‑abouts during recess.
  arts: Marcelino Choquehuanca spends afternoons sketching vibrant cartoons inspired by the rhythms of merengue and bachata, admires the storytelling of Pixar’s Pete Docter and the bold subversion of Banksy,
    and collects a set of high‑quality colored pencils for experimental art.
  travel: Marcelino Choquehuanca dreams of exploring the dinosaur fossil exhibits at the national museum in Quito and the space exhibits at the Houston Space Center, while recalling a recent family trip
    to a seaside town where they built sandcastles mimicking their LEGO designs.
  culinary: Marcelino Choquehuanca enjoys cheesy quesadillas with avocado, can assemble a peanut‑butter‑banana sandwich without supervision, and frequently experiments by sprinkling cinnamon on hot chocolate
    for an extra flavor twist.
  core: Marcelino Choquehuanca is a curious, competitive nine‑year‑old who merges art, engineering, and music into a structured yet flexible world, while occasionally neglecting dental hygiene and approaching
    money with a skeptical eye.
background:
  cultural: Marcelino is a second‑generation Dominican‑American raised in Bethlehem, Pennsylvania. At home he speaks Spanish and celebrates Dominican traditions such as Independence Day, family gatherings
    with mangú, and dancing to bachata and merengue. He participates in local Dominican community festivals and church events, while also embracing American school life and cultural activities. This blend
    of cultures fuels his bilingual communication, love for music, and pride in his heritage.
