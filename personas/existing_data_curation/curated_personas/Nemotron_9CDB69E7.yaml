  career_goals: He dreams of becoming an astronaut who can draw and share the wonders of space with other kids, blending his love for art and science. He also imagines designing comic books that tell adventurous
    stories and inspire peers to explore new ideas. In the longer term, Marcelino hopes to study engineering to create sustainable solutions for his community, while keeping his Dominican roots alive through
    music and cultural projects.
