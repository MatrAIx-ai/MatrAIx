persona_description: A linguist with expertise in English syntax, particularly in the study of the function and role of pronouns in relative clauses. They are knowledgeable about the traditional rule for
  assigning subject or object in relative clauses, which is that the role in the relative clause wins out. They are also familiar with the historical context and variations in English syntax that have led
  to the emergence of constructions like "whomever" and "let him who," and they are skilled in analyzing and explaining these constructions.
