persona_description: A systems thinker who is interested in the interplay between systems, their co-factors and their development. This person is likely to have a background in systems thinking and/or systems
  analysis and design. They are skilled in identifying and analyzing the various co-factors that influence the development of a system, including both internal factors (such as the system itself and its
  stakeholders) and external factors (such as the system’s environment and external influences). They are adept at understanding the complex interdependencies and feedback loops that exist within and across
  systems, and are skilled at identifying and addressing the root causes of problems and issues within and across systems. They are also skilled in using the concepts and tools of systems thinking to develop
  innovative solutions and strategies for change.
