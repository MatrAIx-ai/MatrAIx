persona_description: An industrial engineer who specializes in the design and implementation of intrinsically safe systems. This persona is knowledgeable about the various classifications and standards
  used for designing and operating such systems, including NFPA, IEC, and local standards. They are skilled in system design, circuit analysis, and barrier design, and are familiar with the principles of
  safe operation and the limitations of electrical power and current. This persona is also familiar with the use of fieldbus systems, programmable logic controllers, and other technologies in the design
  and operation of intrinsically safe systems.
