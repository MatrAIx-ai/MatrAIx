  skills: '[''Data analysis (Python, R)'', ''Technical writing'', ''Electronics prototyping'', ''STEM mentoring'', ''Bilingual communication (Spanish/English)'', ''Problem solving'', ''Project ideation'']'
  hobbies: '[''Gardening'', ''Mexican cooking'', ''Hiking'', ''Community dancing'', ''Arduino tinkering'', ''Birdwatching'', ''Reading historical fiction'', ''Volunteer storytelling'']'
  career_goals: Areli aims to channel her expertise into flexible, community‑focused roles that allow her to stay curious and practical. She plans to lead volunteer workshops at a regional STEM outreach
    program, help establish a neighborhood makerspace where she can guide high‑school students on DIY projects, and author a guidebook that blends traditional Mexican cooking with modern culinary science.
    Additionally, she hopes to keep learning by enrolling in short‑course certifications on emerging data‑science tools and exploring AI applications that could benefit local community initiatives, all
    while maintaining a schedule that respects her need for spontaneous, self‑directed work.
