personas:
  professional: Jamall Ryan, a budding robotics hobbyist and concept‑artist-in‑training, channels their exceptionally organized and disciplined nature into meticulously planning and programming hobby‑kit
    robots while translating sci‑fi inspirations into polished digital sketches for school showcases and robotics club competitions.
  sports: Jamall Ryan maintains a low‑key fitness routine by swimming with the Baltimore YMCA Youth Aquatics Club, occasionally joins a weekend pick‑up basketball game at the local park, and enthusiastically
    follows the Baltimore Ravens and Orioles, treating each match as a chance to study team dynamics and strategic execution.
  arts: Jamall Ryan immerses themselves in visual and auditory arts, studying concept‑art techniques inspired by Syd Mead while listening to indie ambient playlists featuring Bon Iver, Tycho, and Brian
    Eno, and draws creative fuel from contemporary installations at the Baltimore Museum of Art, especially works by Yayoi Kusama and James Turrell.
  travel: Jamall Ryan prefers carefully planned excursions, having toured the historic streets of Annapolis on a family road trip and visited Washington, D.C.’s National Air and Space Museum with their
    school, while dreaming of a future adventure to Tokyo’s Akihabara district to experience cutting‑edge robotics culture and anime‑inspired art scenes.
  culinary: Jamall Ryan spends Saturday afternoons experimenting with quick kitchen projects like homemade ramen bowls seasoned with miso paste, sesame oil, and sliced scallions, while perfecting avocado
    toast topped with chili flakes and a drizzle of olive oil, treating each dish as a miniature design challenge that blends flavor and aesthetics.
  core: Jamall Ryan blends disciplined creativity with a quiet, strategic mind, obsessively cataloguing robot parts and art sketches while occasionally sacrificing sleep to binge‑watch sci‑fi series into
    the early morning.
background:
  cultural: Jamall grows up as a white teenager in Baltimore, Maryland, a city known for its rich historical tapestry and vibrant arts scene. His family, with roots in the Mid‑Atlantic region, values education,
    community involvement, and cultural exploration. While his household observes typical American traditions such as Thanksgiving, Fourth of July celebrations, and holiday gatherings, Jamall is also exposed
    to Baltimore’s diverse cultural influences through local events, museum visits, and community programs. This environment has fostered his appreciation for both the city’s historic architecture and its
    contemporary art movements, as well as an awareness of the social dynamics present in an urban setting.
