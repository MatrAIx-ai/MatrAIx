  career_goals: Jamall aspires to pursue a career that merges his love for technology and creative design. He aims to study engineering—specifically aerospace or mechanical engineering—while also developing
    expertise in digital media, hoping to work on the design of innovative aircraft or spacecraft interiors that combine functional engineering with aesthetic appeal. In the medium term, he plans to enroll
    in a STEM‑focused high school program, earn scholarships for advanced placement courses, and eventually attend a university known for strong engineering and fine‑arts programs. He is also ambitious
    about contributing to community STEM outreach, mentoring younger students in robotics and coding.
