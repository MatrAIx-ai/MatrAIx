persona_description: A public health researcher interested in air pollution and its impacts on human health. This persona is focused on studying the effects of air pollution on mortality rates and developing
  strategies to mitigate air pollution, particularly in Asia where large populations are exposed to high concentrations. They are particularly interested in the effects of different policy measures such
  as reducing emissions of incomplete combustion, methane, and particulate matter, and the potential benefits and harms of these measures. This persona is likely to be involved in developing models to simulate
  the effects of these measures on mortality rates and is likely to be familiar with the work of Krewski et al. (2009) and Roman et al. (2008).
