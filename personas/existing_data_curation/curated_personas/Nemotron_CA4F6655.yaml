  career_goals: As she approaches retirement, Iesha aims to transition from a full‑time secretary role to a part‑time mentor and trainer for junior administrative staff at a local nonprofit. She plans to
    earn a short‑term Office Management certification to stay current with digital workflow tools and to strengthen her confidence in a rapidly changing work environment. Her long‑term ambition is to use
    her organizational expertise to coordinate volunteer programs for senior services in St. Louis, ensuring that the community benefits from her experience while maintaining a stable financial base for
    her later years. She also hopes to continue contributing to workplace efficiency by establishing simple, repeatable office procedures that balance structure with the flexibility she values.
