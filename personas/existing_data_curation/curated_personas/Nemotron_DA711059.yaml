    ''Stress‑management and resilience facilitation'']'
  hobbies: '[''Exploring ethnic restaurants'', ''Attending pop‑up art fairs'', ''Yoga and guided meditation'', ''Cooking traditional Mexican cuisine'', ''Volunteering at community center cooking classes'',
    ''Hiking in Cleveland National Forest'', ''Journaling'', ''Spontaneous weekend road trips'']'
  career_goals: Grisel aims to transition into a senior HR leadership role, such as HR Manager or Director of Employee Wellness, where she can shape company culture with a focus on mental health and inclusive
    practices. She plans to obtain the SHRM‑Senior Certified Professional credential within the next two years and to spearhead a comprehensive employee assistance program that integrates mindfulness and
    counseling resources. Long‑term, she envisions launching a boutique consultancy that helps small businesses create culturally responsive HR frameworks while also offering workshops on emotional resilience
    for staff.
