  career_goals: In the coming years, Hing aims to expand his role as a community mentor by offering free workshops on home maintenance and sustainable gardening at the local community center. He plans to
    obtain a certification in home repair to formalize his knowledge and to develop a small community‑supported agriculture plot that supplies fresh produce to neighbors. He also hopes to author a simple
    guidebook that blends Chinese cooking traditions with Colorado’s seasonal ingredients, and to travel to his ancestral hometown in China to deepen his cultural roots. Ultimately, he aspires to leave
    a legacy of practical knowledge and community connection for his children and grandchildren.
