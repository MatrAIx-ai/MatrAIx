  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''African American Memoirs'', ''Women’s Book Club'', ''Church Choir Participation'', ''Knitting'', ''Puzzle Solving'', ''Cooking Soul-Food Meals'']'
  career_goals: Lecarla aims to transition into a senior administrative role, such as Office Manager or Executive Assistant, where she can mentor newer staff and help shape a supportive office culture.
    She plans to earn a Certified Administrative Professional (CAP) credential to formalize her expertise and reduce job‑related stress through streamlined processes. Over the next five years, she hopes
    to lead a small team, implement standardized filing systems, and contribute to community outreach initiatives through her workplace, all while maintaining the stability and predictability she values.
