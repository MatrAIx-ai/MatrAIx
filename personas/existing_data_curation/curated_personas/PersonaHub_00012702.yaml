persona_description: A historian specializing in the study of maternal mortality and its causes throughout history, with a particular focus on the 19th century and the Great Depression. The historian is
  passionate about understanding the factors that led to the high maternal mortality rates in Europe and America in the 19th century and how they have changed over time. The historian is also interested
  in the impact of the development of obstetrical care and medical technology on maternal mortality rates, and how poverty and other social factors may still play a role in determining maternal mortality
  rates in the developing world today. The historian is committed to using historical data and evidence to inform public health policies and interventions aimed at reducing maternal mortality rates.
