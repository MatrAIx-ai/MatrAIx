personas:
  professional: Abigail Raper is a front‑line IT support specialist in New Orleans who leverages CompTIA A+ and Network+ certifications to diagnose Windows, macOS, and Linux issues, manage tickets in ServiceNow,
    and translate technical jargon into friendly guidance, while their organized yet flexible workflow lets them pivot quickly during urgent incidents and lay the groundwork for future senior analyst responsibilities.
  sports: Abigail Raper cycles the 12‑mile loop around City Park each weekend with the NOLA Cyclists club, attends New Orleans Saints games at the Superdome and follows the Pelicans on the NBA season, while
    they supplement cardio with yoga and occasionally join a local pick‑up basketball game at the community center.
  arts: Abigail Raper finds inspiration in the sounds of Trombone Shorty, the piano of Dr. John, and the improvisations of Wynton Marsalis, attends weekly zydeco dances, collects vintage jazz vinyls, devours
    mystery novels by Tana French and Gillian Flynn, and captures the wrought‑iron balconies of the French Quarter through a DSLR lens, often experimenting with low‑light photography.
  travel: Abigail Raper prefers short, road‑trip getaways that blend music festivals and culinary exploration, having driven to Austin for SXSW, spent a weekend in Charleston tasting Lowcountry cuisine,
    and dreaming of a future trip to New Orleans’ sister city, Lisbon, to compare Creole and Portuguese flavors, all while balancing a modest travel budget with occasional airline reward redemptions.
  culinary: Abigail Raper is an avid home cook who perfects jambalaya with Andouille sausage, okra, and file powder, crafts gumbo broth from a roux and holy trinity vegetables, experiments with blackened
    catfish using paprika and cayenne, and treats themselves to beignets from Café du Monde, all while sourcing fresh seafood at the French Market and occasionally ordering from Commander’s Palace for inspiration.
  core: Abigail Raper blends technical know‑how, New Orleans music‑fuelled energy, and a habit of late‑night jazz binge‑watching into a balanced yet occasionally sleep‑deprived lifestyle that thrives on
    community service and culinary experiments.
background:
  cultural: Abigail grew up as a white Southern resident of New Orleans, immersed in the city’s unique blend of French‑Creole heritage, Catholic traditions, and Southern hospitality. Her family celebrated
    local festivals, cherished the communal spirit of neighborhood gatherings, and placed a strong emphasis on manners and courtesy. This cultural backdrop fostered her outgoing, sociable personality and
    her appreciation for both preserving time‑honored customs—like sharing meals and music—and embracing new ideas, a balance that now informs her professional and personal life.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Operating system support (Windows, macOS, Linux)'', ''Network diagnostics'', ''Remote assistance tools (TeamViewer,
    LogMeIn)'', ''Ticketing system management (ServiceNow, Jira Service Management)'', ''Customer service and communication'', ''Technical documentation and knowledge‑base creation'', ''Process improvement
    and workflow automation'', ''ITIL incident management fundamentals'', ''CompTIA A+ certification'', ''CompTIA Network+ certification'', ''Basic cybersecurity awareness'']'
  hobbies: '[''Live jazz and zydeco concerts'', ''Cooking Creole cuisine'', ''Biking in City Park'', ''Volunteer digital‑literacy workshops for seniors'', ''Sunday morning yoga'', ''Reading mystery novels'',
    ''Photography of historic New Orleans architecture'', ''Participating in community festivals like Mardi Gras'']'
  career_goals: Abigail aims to advance from a front‑line support specialist to a senior IT support analyst and eventually into an IT team lead role where she can shape service‑delivery standards for her
    department. She plans to deepen her expertise in network administration and cloud services by pursuing Cisco CCNA and AWS Cloud Practitioner certifications, and she hopes to enroll in a part‑time bachelor’s
    program in information technology management. In the long term, she envisions mentoring new hires, developing a formal onboarding curriculum for end‑users, and contributing to strategic projects that
    blend emerging tech with the practical needs of the organization.
