  hobbies: '[''Fishing'', ''Hunting'', ''Classic car restoration'', ''Woodworking'', ''Bible study'', ''Volunteer work at food pantry'', ''Reading historical non‑fiction'']'
  career_goals: Alexander aims to transition from frontline driving to a supervisory position in fleet operations, aspiring to become a logistics coordinator or fleet manager for a regional trucking company.
    He plans to earn advanced DOT certifications and a commercial driver’s license endorsement for hazardous materials to broaden his qualifications. Long‑term, he hopes to leverage his sales experience
    to launch a modest, owner‑operated trucking business that emphasizes dependable service and fair pricing, providing a stable retirement income while mentoring younger drivers in his community.
