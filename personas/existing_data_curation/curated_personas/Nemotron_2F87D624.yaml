personas:
  professional: Alexander Ellis is a seasoned truck driver and sales specialist whose three decades of long‑haul expertise, meticulous vehicle maintenance skills, and knack for negotiating freight contracts
    translate into a methodical, reliability‑driven approach to logistics, positioning them for a future supervisory role in fleet operations.
  sports: Alexander Ellis enjoys seasonal hunting trips and weekend carp fishing, maintains a personal fitness routine of early‑morning weightlifting at the local gym, and follows the regional college football
    team—the University of Tennessee Volunteers—while cheering for the Nashville Predators during the hockey season.
  arts: Alexander Ellis finds solace in Southern folklore literature, often revisiting classics by Joel Chandler Harris, while also appreciating the blues of B.B. King and the cinematic storytelling of
    John Ford, which together inform their woodworking designs and car restoration aesthetics.
  travel: Alexander Ellis favors road‑trip adventures along the Blue Ridge Parkway and occasional weekend getaways to historic Charleston, South Carolina, planning routes meticulously with offline maps,
    yet they are hesitant to embark on long‑haul overseas travel due to budget constraints and a preference for familiar landscapes.
  culinary: Alexander Ellis, a competent home cook, relishes preparing cast‑iron smoked catfish with a side of cornbread and collard greens seasoned with smoked ham hocks, and they source fresh local ingredients
    at the county farmer’s market while occasionally experimenting with bourbon‑infused BBQ sauces.
  core: Alexander Ellis blends a disciplined, hands‑on work ethic with a solitary, practical outlook, channeling their love of mechanics and history into classic car restorations while maintaining tight
    financial habits, yet they harbor a stubborn reluctance to delegate tasks, often taking on too much themselves.
background:
  cultural: Alexander grew up in a working‑class white family in rural Georgia, embedded in the traditions of the Southern United States. His upbringing emphasized self‑reliance, respect for hard work,
    and a strong sense of community tied to church and local events. He was raised on classic Southern cuisine, enjoys country and folk music, and maintains an affinity for the region’s natural landscapes—forests,
    rivers, and farmlands. While he values the hospitality and close‑knit networks typical of the South, his reserved personality leads him to seek smaller, familiar groups over large gatherings. This cultural
    foundation has shaped his practical outlook, loyalty to local institutions, and his commitment to contributing positively to his community.
attributes:
  skills: '[''Long‑haul truck driving'', ''Regional route planning'', ''Vehicle maintenance'', ''Basic mechanical repair'', ''DOT compliance'', ''Cargo securing'', ''Customer relations'', ''Sales negotiation'',
