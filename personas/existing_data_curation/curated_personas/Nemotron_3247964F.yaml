personas:
  professional: Marshall Garcia is a methodical aspiring automotive technician who leverages his meticulous DIY experience, precise project‑management skills, and disciplined productivity routines to excel
    in hands‑on repair work while planning to mentor junior staff and run a side handyman business; they are known for delivering punctual, high‑quality service and clear, concise instructions.
  sports: Marshall Garcia is a disciplined fitness enthusiast who runs five miles at sunrise with the Lansing Running Club, lifts weights at Iron Mavericks gym three times a week, follows the Detroit Lions
    and Michigan State Spartans football teams, and occasionally plays casual basketball with his strategy‑game friends; they track workouts in a spreadsheet to maintain measurable progress.
  arts: Marshall Garcia is a quiet appreciator of craftsmanship and classic culture, spending evenings listening to the intricate fingerstyle guitar of Andy McKee, admiring the woodworking exhibitions at
    the Mid‑Michigan Arts Alliance, and re‑watching the timeless film "The Godfather" for its meticulous storytelling; they occasionally dabble in sketching furniture designs for future projects.
  travel: Marshall Garcia is a meticulous planner who prefers low‑key road trips with a clear itinerary, has explored the automotive museums of Detroit and the historic streets of Stuttgart during the Euro
    Motor Show, dreams of a solo hiking adventure in the Canadian Rockies, and avoids spontaneous travel that could disrupt his structured routine; they use a custom travel spreadsheet to compare costs,
    routes, and lodging options.
  culinary: Marshall Garcia is a pragmatic home‑cook who favors high‑protein meals like grilled chicken with quinoa, prepares a signature chili using ground beef, black beans, and smoked paprika for comfort,
    enjoys crafting sourdough starter during weekends, and selects ingredient‑focused dishes that support his disciplined fitness regimen; they occasionally indulge in a craft beer pairing with a steak
    for a well‑earned treat.
  core: Marshall Garcia is a disciplined, detail‑obsessed problem‑solver who blends solitary curiosity with organized ambition, yet often wrestles with anxiety‑driven perfectionism and a tendency to over‑schedule
    every aspect of life.
background:
  cultural: Marshall grew up in Mason, Michigan, a small Midwestern community where practicality, a strong work ethic, and modesty are valued. His family’s cultural heritage is rooted in European‑American
    traditions, with celebrations of holidays such as Thanksgiving, Fourth of July, and Easter marked by communal meals and neighborhood gatherings. Proximity to the automotive industry in nearby Lansing
    influenced his interest in car maintenance and mechanical work. Local culture emphasizes self‑reliance, responsibility, and community service, reflected in Marshall’s involvement in neighborhood clean‑up
    projects and his support of his local church’s small‑group activities. While he prefers quiet, solitary time, these cultural values shape his cooperative attitude and desire to provide reliable help
    to family and neighbors.
attributes:
  skills: '[''Home maintenance (plumbing, electrical, carpentry)'', ''Automotive diagnostics and maintenance'', ''Project planning and logistics'', ''Budgeting and financial tracking'', ''Personal productivity
