  hobbies: '[''Reading non‑fiction (productivity, engineering, DIY)'', ''Woodworking and furniture making'', ''Model car building and restoration'', ''Puzzle solving (crosswords, Sudoku, logic riddles)'',
    ''Fitness routine (running, weight training)'', ''Small‑group strategy board games'']'
  career_goals: Marshall aims to convert his methodical skill set into a stable, full‑time role that provides structure and opportunities for advancement. In the short term he plans to enroll in a community‑college
    automotive technology program to earn an ASE certification and secure a position as a service technician in the Lansing‑area. Over the next five years he aspires to become a lead technician or shop
    supervisor, managing workflow and mentoring junior staff while maintaining high standards. He also hopes to launch a part‑time handyman business that offers reliable home‑repair services to neighbors,
    leveraging his organizational strengths to ensure punctual, quality work. Throughout his career path he seeks financial security for his family, a predictable routine that mitigates his anxiety, and
    a work environment that values teamwork in small, collaborative groups.
