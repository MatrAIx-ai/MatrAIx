personas:
  professional: Jene Seymour is a 20‑year‑old office clerk; they leverage their knack for quick learning of cloud‑based tools and natural charisma on the phone to consistently exceed data‑entry targets,
    while using digital reminders to compensate for a relaxed, occasionally disorganized work style.
  sports: Jene Seymour follows the hometown minor league baseball team, the Rivercity Rovers, and plays casual soccer in a co‑ed community league each spring; they stay fit through indoor cycling classes
    and weekend hikes, preferring group workouts that satisfy their sociable streak.
  arts: Jene Seymour delights in performing karaoke renditions of Adele's 'Rolling in the Deep', acts in community‑theater productions of Shakespeare's 'A Midsummer Night's Dream', and draws inspiration
    from photographer Annie Leibovitz; they often snap candid shots of local festivals for Instagram.
  travel: Jene Seymour prefers short, budget‑friendly trips that blend adventure and social connection, having backpacked through the Scottish Highlands and explored Berlin's street art scene; they are
    planning a solo photography trip to Kyoto to capture cherry blossoms while budgeting through a travel savings jar.
  culinary: Jene Seymour experiments in the kitchen with dishes like spicy kimchi tacos, homemade matcha latte, and avocado‑filled sushi rolls; they enjoy improvising recipes when time is tight, favor fresh
    herbs, miso paste, and smoked paprika, and often cook for friends to showcase their culinary creativity.
  core: Jene Seymour is a charismatic, worry‑prone 20‑year‑old who channels competitive energy and a love for the spotlight into karaoke, career ambitions, and social entrepreneurship, while juggling a
    tendency toward disorganization.
background:
  cultural: Jene grew up in Smithfield, North Carolina, within a middle‑class white family that values Southern hospitality, close‑knit community ties, and church involvement. Her upbringing was steeped
    in regional traditions such as country music, local cuisine (especially barbecue and fried chicken), and seasonal community events like harvest festivals. While she respects these roots, her college
    experience and natural curiosity have exposed her to broader cultural perspectives, leading her to blend traditional Southern values—like politeness and community service—with contemporary interests
    in digital media, entrepreneurship, and personal development.
attributes:
  skills: '[''Data entry'', ''Microsoft Office Suite proficiency'', ''Customer service'', ''Effective verbal communication'', ''Basic bookkeeping'', ''Digital collaboration tools (Google Workspace, Slack)'',
    ''Schedule coordination'', ''Problem solving'', ''Time-management improvisation'']'
  hobbies: '[''Karaoke'', ''Community theater'', ''Local festival volunteering'', ''Trivia nights'', ''Social media content creation'', ''Cooking experiments'', ''Reading self‑help and psychology books'',
    ''Yoga and mindfulness'', ''Nature walks'', ''Photography'']'
  career_goals: Jene aims to transition from her current office‑clerk role to an office manager position within the next three years, seeking to oversee a small team and streamline administrative processes.
    She plans to complete a bachelor's degree in Business Administration, earn a Certified Administrative Professional (CAP) credential, and eventually explore a career in human resources or small‑business
    ownership—perhaps opening a boutique coffee shop that combines her love for community interaction and entrepreneurship. Her competitive nature fuels a desire for measurable achievements, while her underlying
    worry about job stability motivates her to build a solid professional reputation and secure a stable income close to her hometown, with the flexibility to relocate if advantageous opportunities arise.
