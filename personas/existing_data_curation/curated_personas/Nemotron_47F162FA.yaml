  career_goals: Brandon dreams of growing up to combine his love of art and helping others. He imagines becoming an art teacher who uses creative projects to make children feel happy and confident, or a
    pediatric doctor who incorporates art therapy to comfort young patients. He is also fascinated by nature and thinks about being a wildlife conservationist who protects animals while educating the community.
    His long‑term ambition is to keep learning new ideas, stay organized, and use his calm, compassionate nature to make a positive difference in people’s lives.
