  career_goals: Ha aims to transition into a senior maintenance supervisor role within the next few years, using her extensive field experience to lead a small team. She plans to obtain OSHA certification
    and a specialized HVAC certification to bolster her credentials. While she values job stability for her family, she also hopes to mentor younger workers, especially those from immigrant backgrounds,
    fostering a supportive work environment. Long‑term, Ha dreams of opening a community‑focused maintenance service that offers affordable repair solutions to local small businesses and seniors, combining
    her technical expertise with her strong desire to help others.
