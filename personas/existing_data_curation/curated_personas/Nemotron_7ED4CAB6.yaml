  hobbies: '[''Hiking'', ''Fishing'', ''DIY woodworking'', ''Automotive repair'', ''Podcast listening on technology and sustainability'', ''Competitive bowling'', ''Outdoor camping'', ''Exploring new eco‑friendly
    cleaning methods'']'
  career_goals: Noah aims to leverage his hands‑on expertise into a supervisory role within facilities management. He plans to earn a Certified Facility Manager (CFM) credential and gain formal training
    in sustainable cleaning practices, positioning himself to lead a team and implement greener, cost‑effective solutions. Over the next five years, he hopes to become a lead janitor or facilities supervisor
    for a regional office park, and eventually launch his own small cleaning and maintenance service that emphasizes efficiency, safety, and innovative technology.
