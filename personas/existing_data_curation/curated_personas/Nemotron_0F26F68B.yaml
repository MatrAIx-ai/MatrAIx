  career_goals: Short‑term, Noel wants to expand her school‑news podcast and grow her YouTube channel into a platform that highlights local stories and teen perspectives. She aims to earn a scholarship
    for a communications or journalism program, and long‑term she envisions a career as a broadcast reporter or community‑outreach director who can both inform and mobilize audiences.
