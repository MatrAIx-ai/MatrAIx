persona_description: A landscape architect who specializes in incorporating modern architecture into gardens, particularly in the design of outdoor rooms and the use of materials such as exposed Australian
  timbers, rusted steel, and zinc cladding. They are interested in creating comfortable outdoor living spaces and are skilled in the use of modular housing techniques to reduce costs and increase functionality.
  They are also interested in the use of natural materials and the juxtaposition of modern forms against natural elements to create a cohesive and visually appealing garden.
