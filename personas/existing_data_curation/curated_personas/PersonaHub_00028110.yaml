persona_description: A conservationist who is interested in the management and restoration of brush habitats in CRP fields and other natural areas. They are willing to explore alternative management strategies,
  such as maintaining/enhancing existing brush, planting woody cover, and creating artificial loafing coverts. They are knowledgeable about the management practices for quail and other wildlife species,
  and are interested in minimizing damage to key shrubs/sites. They are also interested in the use of herbicides and mechanical control methods, and are willing to consider alternative approaches to minimize
  damage to key shrubs/sites.
