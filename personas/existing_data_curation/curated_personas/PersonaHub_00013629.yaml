persona_description: A member of the Tulalip Tribe who is interested in preserving and interpreting the history, traditional cultural values, and spiritual beliefs of the tribe. They are passionate about
  the significance of the Treaty of Point Elliott and the significance of the Tulalip Reservation, and are dedicated to the mission of the Hibulb Cultural Center and Natural History Preserve to revive,
  restore, protect, interpret, collect, and enhance the history, traditional cultural values, and spiritual beliefs of the Tulalip Tribes. They are knowledgeable about the significance of cedar, the importance
  of weirs, and the traditional methods of gathering shellfish, spearing fish, and catching ducks. They are also interested in the concept of sharing and conserving for future harvests, and the importance
  of protecting the environment.
