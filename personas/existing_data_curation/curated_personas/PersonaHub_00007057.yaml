persona_description: A physicist who specializes in the study of particle physics and specifically the interactions between electrons and protons in the LHC machine. His research interests include the measurement
  and understanding of the effects of electron clouds on the impedance of the bunches in the LHC bunch train. He is particularly interested in the nature of the horizontal instability created by the electron
  cloud and its impact on the wake field created by the head of the bunch. His work involves the use of experimental techniques such as head-tail motion and chromaticity measurement to obtain empirical
  measurements of the contribution of the electron cloud to the total impedance of the bunches. He is likely to be familiar with the principles of betatron oscillation and chromaticity, and is interested
  in applying these concepts to the measurement of the impedance of the bunches in an LHC bunch train.
