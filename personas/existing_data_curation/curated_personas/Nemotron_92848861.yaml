personas:
  professional: Felipe Rios, a seasoned casino security supervisor‑in‑training with a sharp eye for real‑time video analytics, bilingual de‑escalation skills, and a competitive, yet practical mindset, keeps
    the gambling floor safe while mentoring junior guards and pushing technology upgrades.
  sports: Felipe Rios, a dedicated member of the Overland Park Adult Soccer League’s “El Norte” team, also enjoys dancing at monthly traditional folk music nights, follows the Kansas City Chiefs and Sporting
    Kansas City, and keeps fit through weekend pick‑up games and regular trips to the local gym.
  arts: Felipe Rios, an avid fan of the mariachi sounds of Vicente Fernández and the guitar riffs of Carlos Santana, regularly attends live performances at the Overland Park Arts Center, and volunteers
    at the annual cultural festival where he helps curate traditional music showcases.
  travel: Felipe Rios, who prefers well‑planned family road trips that blend cultural festivals with scenic drives, has visited San Miguel de Allende for its Día de los Muertos celebrations, enjoys annual
    stays in New Orleans for the music scene, and dreams of exploring the historic streets of Seville, all while budgeting around his retirement savings.
  culinary: Felipe Rios, a confident home cook who perfects tacos al pastor with pineapple‑marinated pork, chilies, and fresh cilantro, frequently experiments with homemade salsa verde using tomatillos
    and serrano peppers, and enjoys pairing dishes with a chilled Michelada at local family gatherings.
  core: Felipe Rios blends a competitive security mindset with a love for community traditions, balancing meticulous work ethic with spontaneous salsa dancing, a streak of skepticism, and a penchant for
    classic cars and tacos al pastor.
background:
  cultural: Felipe was raised in a Mexican household that cherished family, faith, and community traditions. He grew up bilingual, celebrating Día de los Muertos, Las Posadas, and other Mexican holidays
    while adapting to life in the American Midwest. His cultural roots shape his warm, sociable demeanor and his pride in sharing Mexican food and music with friends in Overland Park. At the same time,
    his years in Kansas have blended his heritage with Midwestern values of punctuality and neighborly cooperation, creating a balanced perspective that he brings to both his personal life and his security
    career.
