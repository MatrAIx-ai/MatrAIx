  career_goals: Felipe aims to move into a supervisory role within the casino security department, eventually becoming a Shift Supervisor or Security Manager. He plans to earn the Certified Protection Professional
    (CPP) credential and attend advanced training in video analytics and anti‑fraud detection. Over the next five years, he hopes to mentor younger guards, lead a cross‑training program that blends traditional
    security methods with emerging technology, and eventually transition to a consulting role helping regional casinos develop robust security strategies.
