persona_description: A senior official from a developing country, particularly focused on climate change mitigation and REDD+ initiatives. This individual is familiar with the intricacies of the negotiations
  around REDD+ and the Paris climate talks, and is concerned about the potential for differentiation in the approach to REDD+. They are also interested in tracking and purging deforestation from corporate
  supply chains and have a deep understanding of the Forest 500, Supply-Change, and moratorium efforts to implement REDD. They are also aware of the potential for developing countries to push back against
  differentiation in the climate talks.
