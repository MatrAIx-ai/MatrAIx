personas:
  professional: Jared Stallings, a seasoned civil engineer with deep expertise in structural analysis, site grading, stormwater management, and sustainable design, leverages his curiosity and improvisational
    problem‑solving to embed artistic elements into public infrastructure while navigating California’s regulatory maze with flexible, cooperative stakeholder engagement.
  sports: Jared Stallings frequents the Santa Rosa Plateau for sunrise hikes, rides the coastal bike trail between Oceanside and Carlsbad, and roots for the Los Angeles Lakers, while occasionally joining
    the local Temecula Trail Club’s monthly meet‑ups, reflecting his love of nature, moderate competitiveness, and easygoing fitness routine.
  arts: Jared Stallings immerses himself in the regional art scene, attending gallery openings featuring works by contemporary painter Julie Mehretu, admiring Ansel Adams’ black‑and‑white landscapes, and
    enjoying live jazz performances by a Charles Mingus tribute band, and he channels this passion into mentoring teens on mural design, which satisfies both his creative curiosity and community spirit.
  travel: Jared Stallings enjoys spontaneous road trips through Southern California’s wine country, has explored the historic streets of Dubrovnik, and dreams of cycling the Amalfi Coast, favoring flexible
    itineraries over rigid schedules while balancing his retirement finances and occasional family commitments.
  culinary: Jared Stallings experiments with Mediterranean cuisine at home, regularly preparing dishes such as grilled branzino with lemon‑oregano glaze, homemade falafel with tahini, and ratatouille, supplementing
    his meals with fresh herbs from his backyard garden, though his occasional distraction leads to over‑simmered sauces.
  core: Jared Stallings is a 58‑year‑old civil engineer whose blend of artistic curiosity, sustainable passion, emotional intensity, and laid‑back lifestyle drives a lifelong quest to weave beauty into
    infrastructure while navigating personal anxieties with mindfulness and occasional disorganization.
background:
  cultural: Jared was raised in a suburban middle‑class family in Southern California, with ancestry tracing back to English and Irish immigrants. Growing up in the culturally diverse environment of the
    Greater San Diego region, he absorbed a blend of West Coast pragmatism, an appreciation for outdoor recreation, and an openness to artistic expression. His long‑standing residence in Temecula has further
    shaped his identity, intertwining the wine‑country lifestyle, a strong community focus, and a commitment to environmentally conscious living. While his cultural heritage is rooted in mainstream American
    white traditions, his values reflect a progressive, inclusive outlook shaped by decades of exposure to varied cultural and artistic influences.
attributes:
  skills: '["Structural analysis", "Site grading and stormwater management", "AutoCAD Civil 3D", "Revit", "GIS mapping", "Construction management", "Project budgeting and cost estimation", "California building
    code compliance", "Caltrans standards", "Sustainable design and LEED AP knowledge", "Innovative material selection", "Public speaking and stakeholder engagement", "Team leadership and mentorship", "Flexible
    problem solving", "Adaptability under ambiguous timelines"]'
  hobbies: '["Visiting art galleries and museums", "Attending live music and theater performances", "Wine tasting at local vineyards", "Landscape photography (architecture and nature)", "Hiking and biking
    on local trails", "Cooking Mediterranean cuisine", "Tending an herb garden", "Woodworking and small furniture projects", "Yoga and meditation", "Reflective journaling", "Reading on sustainable design,
    art history, and psychology", "Volunteering in community art programs"]'
  career_goals: Jared aims to transition into a senior consultancy role over the next five years, focusing on sustainable urban infrastructure and the integration of public art into civic projects. He seeks
    to earn LEED AP certification and to lead a flagship riverfront redevelopment in Temecula that showcases innovative green design and community art installations. He also hopes to mentor younger engineers,
    contribute articles to industry journals on the intersection of engineering and aesthetics, and eventually establish a non‑profit advisory board that guides local municipalities toward resilient, culturally
    vibrant development. On a personal level, he is committed to improving his emotional resilience through mindfulness training and therapy.
