  hobbies: '["Strategy and simulation video games", "Model kit building (airplanes, cars)", "DIY electronics (Arduino, Raspberry Pi)", "Reading science non‑fiction", "Playing electric guitar (classic rock)",
    "Hiking in the Ozarks", "Fishing", "Birdwatching", "Cooking simple meals", "Volunteering at small community events"]'
  career_goals: Assem aims to earn his GED within the next two years and then enroll in a vocational program focused on automotive technology or information technology. His short‑term goal is to secure
    an entry‑level apprenticeship at a local garage or IT support firm, where he can apply his mechanical and computer skills. Long‑term, he dreams of becoming a certified automotive technician or IT specialist
    and eventually opening his own small repair shop or tech consultancy that serves the Fort Smith community, providing reliable services while maintaining a balance between independent work and collaborative
    projects.
