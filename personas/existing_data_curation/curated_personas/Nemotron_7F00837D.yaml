  hobbies: '[''Painting'',''Sketching'',''Live music and community theatre attendance'',''Gardening'',''Cooking Wisconsin specialties'',''Quilting'',''Knitting'',''Hiking the North Woods'',''Karaoke'',''Reading
    mystery novels'']'
  career_goals: Catherine hopes to formalize her community contributions by completing her GED and pursuing a certification in community arts programming. She dreams of establishing a modest, volunteer‑run
    art space in Marinette where local artists and hobbyists can share work, host workshops, and organize pop‑up markets. In the near term, she aims to become the lead coordinator for the town’s seasonal
    festivals, incorporate more inclusive, spontaneous activities, and launch a small cottage‑industry selling her handmade quilts and knitted goods. She also envisions mentoring younger neighbors, using
    her curiosity to keep learning new crafts and cultural traditions.
