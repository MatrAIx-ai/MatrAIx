persona_description: A skilled and innovative government printer and printer, particularly known for his contributions to the development of photo-lithography and helio-type printing. He was a member of
  the Volunteer Rifles and later became a lieutenant-colonel, and he retired as a government printer with a pension. He was a member of the Anglican Church and was buried in the Anglican cemetery. He had
  a staff of 400 and an office with sixty-one new departments.
