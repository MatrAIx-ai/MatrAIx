  career_goals: Although retired from formal employment, Marina aims to deepen her impact on the local arts scene. She aspires to serve on the board of the Mesa Arts Center, helping to shape programming
    that encourages unconventional artistic expression. Marina also plans to develop a series of intergenerational workshops where she can mentor emerging artists, share her watercolor techniques, and teach
    garden-based art projects. Another ambition is to curate a community exhibition that showcases both local artists and indigenous Southwestern influences, fostering cultural dialogue. She hopes to compile
    her family memories and personal reflections into a memoir that celebrates resilience and curiosity, and she intends to travel to a few renowned art museums and historic sites she has long admired,
    such as the Getty Center and the historic missions of Arizona.
