  hobbies: '[''Strategic Board Games'', ''Marathon Running'', ''Yoga and Mindfulness'', ''Tech Trend Exploration'', ''STEM Outreach Mentoring'', ''Cooking Seasonal Meals'', ''Hosting Dinner Parties'', ''Hiking
    in Santa Monica Mountains'']'
  career_goals: Melissa aspires to transition from general management to a senior executive role, such as Vice President of Operations or Chief Operating Officer, where she can shape organizational strategy
    at a corporate level. She is motivated to lead a division focused on sustainable operations and digital transformation, leveraging her technical background to embed automation and eco‑efficiency across
    the enterprise. Long‑term, she envisions founding a boutique consulting practice that helps mid‑size companies implement data‑centric operational improvements while mentoring emerging women leaders
    in the tech‑operations space.
