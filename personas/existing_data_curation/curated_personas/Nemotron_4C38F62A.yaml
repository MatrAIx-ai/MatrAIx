personas:
  professional: Melissa Summerville, a data‑driven operational leader with 15+ years of engineering and management experience, leverages Lean Six Sigma, ERP rollouts, and advanced analytics to push sustainable
    digital transformation while her competitive edge fuels relentless benchmarking and her skeptical nature insists on rigorous risk vetting before every strategic shift.
  sports: Melissa Summerville trains for marathons with a data‑driven approach using Strava, joins the Santa Monica Trail Runners club, follows the Los Angeles Lakers and LA Galaxy for seasonal excitement,
    and balances high‑intensity runs with weekly yoga sessions to maintain flexibility and mental equilibrium.
  arts: Melissa Summerville curates eclectic dinner playlists featuring artists like Bon Iver, Sufjan Stevens, and Kamasi Washington, devotes Sunday evenings to strategic board‑game sessions with Terraforming
    Mars and Gloomhaven, and frequents the Getty Center to recharge her creative side while occasionally critiquing exhibit narratives with a healthy dose of skepticism.
  travel: Melissa Summerville prefers structured trips that blend adventure and relaxation, having recently hiked the Inca Trail to Machu Picchu, taken a tech‑focused tour of Tokyo’s Akihabara district,
    and planning a solo week‑long retreat to Sedona’s red rocks for meditation and solo reflection.
  culinary: Melissa Summerville excels at cooking seasonal dishes such as rosemary‑infused roasted chicken with root vegetables, pan‑seared salmon with miso glaze, and a fragrant wild mushroom risotto,
    often sourcing locally grown kale, heirloom tomatoes, and hazelnuts to impress close friends at intimate dinner parties.
  core: Melissa Summerville channels a competitive, data‑obsessed mind into sustainable leadership, rigorous self‑care, and meticulously curated experiences, all while wrestling with a lingering worry about
    perfection.
background:
  cultural: Melissa grew up in a middle‑class suburban community in Southern California, the daughter of second‑generation Irish‑American parents who valued education, self‑reliance, and community involvement.
    Her upbringing emphasized a blend of individual achievement and civic responsibility, shaping her balanced view of personal ambition and collaborative effort. Living in Studio City has exposed her to
    a mix of entertainment industry dynamism and tech‑startup culture, reinforcing her pragmatic yet curious outlook. She identifies with mainstream American cultural norms while also celebrating her family's
    ethnic heritage through occasional participation in St. Patrick's Day events and support of local cultural festivals.
attributes:
  skills: '[''Process Optimization'', ''Lean Six Sigma Black Belt'', ''ERP Implementation'', ''Data Analytics (SQL, Python, Tableau)'', ''Strategic Planning'', ''Budgeting & Forecasting'', ''Cross‑functional
