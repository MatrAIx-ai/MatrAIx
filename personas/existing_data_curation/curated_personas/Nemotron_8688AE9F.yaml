  career_goals: Carol aims to transition into a supervisory role such as lieutenant within the next three years, focusing on shaping department policy around community engagement and procedural integrity.
    She is passionate about building a mentorship pipeline for new officers, formalizing a training curriculum that integrates her STEM expertise with practical policing. While she values the stability
    of her current position, she also plans a phased retirement in the next five to ten years, hoping to serve as a consultant to regional law‑enforcement agencies on evidence‑based tactics and to volunteer
    on local advisory boards that bridge police and community interests.
