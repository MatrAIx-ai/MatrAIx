  hobbies: '[''Gardening'', ''Baking'', ''Reading historical fiction'', ''Reading biographies'', ''Volunteering at community center'', ''Crocheting'', ''Church activities'', ''Listening to classic country
    music'', ''Walking/hiking in nature'']'
  career_goals: She aims to advance from receptionist to office manager within the next three to five years, seeking additional training in administrative leadership and possibly completing an associate
    degree in Business Administration. Darlene aspires to develop supervisory skills, oversee office operations, and implement efficient workflow processes. Long-term, she envisions a stable career in a
    corporate or local government setting where she can contribute to community-oriented initiatives and potentially transition into a human resources or facilities management role.
