  career_goals: Kent aims to become the top‑producing broker in Amarillo and eventually launch his own boutique brokerage focused on residential and ranch properties. He seeks to exceed $10 million in annual
    sales volume within the next three years, expand his client base into commercial real‑estate, and develop a reputation for innovative, data‑driven marketing strategies. His ambition includes mentoring
    newer agents, building a high‑performing team, and leveraging technology to streamline transactions while maintaining the flexibility he values.
