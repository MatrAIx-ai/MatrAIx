personas:
  professional: Jorge Rodriguezpardo, an aspiring junior coder and environmental storyteller, merges their vivid imagination with a disciplined work ethic to create Scratch projects that simulate forest
    ecosystems, and they frequently collaborate with classmates in the school’s environmental club to design eco‑friendly solutions.
  sports: Jorge Rodriguezpardo spends weekends exploring the Redwood trails with the local youth hiking club, plays forward on the Ukiah Youth Soccer team, and cheers for the San Francisco Giants while
    they also balance a love for outdoor adventure with a light weekly basketball session at school.
  arts: Jorge Rodriguezpardo channels their boundless creativity into sketching dragons and alien landscapes inspired by Studio Ghibli and Lisa Frank, while practicing acoustic guitar covers of Joan Baez
    folk classics and devouring sci‑fi masterpieces by Isaac Asimov and Octavia Butler during quiet evenings, and they often share their drawings with friends online.
  travel: Jorge Rodriguezpardo dreams of hiking the misty canopies of Redwood National Park and the granite cliffs of Yosemite, while also hoping to visit the vibrant markets of Oaxaca during summer vacation,
    and they often map out routes with a hand‑drawn notebook despite a modest travel allowance.
  culinary: Jorge Rodriguezpardo delights in helping prepare homemade churros dusted with cinnamon sugar and a side of chocolate dipping sauce, experiments with fresh guacamole made from ripe avocados and
    lime, and occasionally rolls simple masa harina empanadas, and they love to taste‑test the final churros with an extra sprinkle of cinnamon.
  core: Jorge Rodriguezpardo is an imaginative, anxiety‑prone 11‑year‑old who balances a love for drawing fantastical creatures, building LEGO ecosystems, and humming while coding, yet they often forget
    to finish homework on time due to daydreaming.
background:
  cultural: Jorge comes from a Mexican family that maintains strong ties to their heritage while living in Ukiah, California. He speaks Spanish at home and celebrates traditions such as Día de los Muertos
    and Mexican holidays with his extended family. The blend of Mexican cultural values—family closeness, respect for elders, and communal support—and the outdoor, nature-focused lifestyle of Mendocino
    County shape his worldview. He often helps prepare Mexican dishes, learns folk songs, and participates in local cultural festivals that celebrate his dual identity.
