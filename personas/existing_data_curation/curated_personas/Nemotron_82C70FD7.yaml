  career_goals: Although officially retired, Eunice remains goal‑oriented and envisions several personal milestones for the coming years. She aims to preserve and publish a family cookbook that documents
    traditional recipes and the stories behind them, thereby passing cultural heritage to future generations. She seeks to expand her role as a volunteer coordinator at the local senior center, eventually
    overseeing a mentorship program that pairs seniors with high‑school students. Maintaining her health is a top priority; she plans to complete a senior‑friendly walking program and attend weekly yoga
    classes to enhance mobility. Eunice also hopes to finish a comprehensive genealogy project that traces her ancestors from the Great Migration to present‑day Michigan, and she intends to share these
    findings in community workshops. Finally, she aspires to win a regional quilting competition, channeling her competitive spirit into a creative outlet.
