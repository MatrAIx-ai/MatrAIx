personas:
  professional: Mariangely Alfarorodriguez, an aspiring young game designer, merges her love for storytelling from fantasy novels with her knack for drawing cartoons and coding in Scratch to prototype simple
    adventure games after school, balancing the structure of her project plans with the freedom to experiment.
  sports: Mariangely Alfarorodriguez powers through after‑school soccer drills with her Edinburg United youth team, idolizes the Houston Dynamo midfielders for their hustle, and spends weekend afternoons
    cheering on their older sibling’s love for the Dallas Cowboys while also enjoying the occasional basketball match at the local community center.
  arts: Mariangely Alfarorodriguez channels the bold hues of traditional Lotería cards and the expressive lines of Frida Kahlo into her watercolor sketches, while unwinding to the lively strings of mariachi
    alongside Ariana Grande’s pop hits, and proudly shares her creations at the after‑school art club’s monthly gallery showcase.
  travel: Mariangely Alfarorodriguez prefers spontaneous weekend road trips to the nearby Rio Grande Valley wildlife refuge for rock‑collecting expeditions, but dreams of a future family vacation to the
    historic streets of Guanajuato and the glittering lights of Disney World, balancing careful mom‑approved budgeting with a craving for colorful cultural experiences.
  culinary: Mariangely Alfarorodriguez loves rolling fresh corn tortillas and stuffing them with seasoned carne asada for tacos, mastering the art of soft, fluffy tamales with chicatanas during family gatherings,
    and occasionally whisking a tangy guacamole with lime and cilantro while sprinkling her sketches with tiny food‑inspired doodles.
  core: Mariangely Alfarorodriguez fuses a vivid imagination with a meticulous love for color, chasing butterflies in the backyard while sketching their patterns, and never misses a chance to stash loose
    change for a secret piggy bank.
background:
  cultural: Mariangely is raised in a close‑knit Mexican‑American household in Edinburg, Texas. At home she speaks Spanish and celebrates traditions such as Día de los Muertos, Cinco de Mayo, and family
    quinceañeras. Her daily life blends Texan influences—like attending public school in English—with Mexican cultural practices, including enjoying homemade tamales, sharing stories of heritage, and participating
    in community events at the local church. This bicultural environment shapes her identity, values family cohesion, and nurtures a respect for both her Mexican roots and the broader American society.
