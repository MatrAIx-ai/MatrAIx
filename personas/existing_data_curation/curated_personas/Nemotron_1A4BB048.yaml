  career_goals: Mariangely dreams of blending her love for nature and art by becoming a wildlife biologist who creates educational illustrations of local animals and ecosystems. She aspires to study environmental
    science in college, work on conservation projects in the Rio Grande Valley, and someday produce a children's book series that combines storytelling with scientific facts. She also entertains the idea
    of exploring graphic design as a complementary career path.
