  hobbies: '[''Painting'', ''Mixed-media Collage'', ''Digital Art'', ''Reading (poetry, philosophy, sci‑fi)'', ''Salsa dancing'', ''Community storytelling'', ''Cooking (Puerto Rican cuisine)'', ''Attending
    art fairs'', ''Book‑club participation'', ''Improvisational music (plena, bomba)'', ''Volunteer mentoring'']'
  career_goals: Although approaching retirement, Ana aims to shift from full‑time call handling to a part‑time advisory and mentorship role where she can shape the next generation of service representatives.
    She intends to develop a community workshop on effective communication and conflict resolution, become a recognized trainer within her company, and eventually launch a modest online gallery to sell
    her paintings and mixed‑media artwork. Her ambition also includes documenting and teaching Puerto Rican cultural narratives to youth in Las Marías, ensuring her legacy of creativity and resilience.
