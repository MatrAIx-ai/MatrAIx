persona_description: A healthcare professional who is interested in the latest developments in heart assist devices, particularly those that are used as temporary solutions for heart transplant candidates
  who are not likely to survive until a suitable organ is found. They are also interested in the cost effectiveness and clinical outcomes of these devices, and how they compare to heart transplants. They
  may have experience with heart failure and transplant programs, and may have a background in health technology assessment.
