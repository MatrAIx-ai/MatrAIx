personas:
  professional: Marie Lobo is an aspiring junior robotics engineer who leads her classroom ScratchJr projects, applying her organized, competitive nature to design step‑by‑step programs while her calm resilience
    handles debugging setbacks.
  sports: Marie Lobo is a forward on the Roseville Youth Soccer Club's U‑8 team, loves organizing tag tournaments at the community park, and cheers for the San Jose Earthquakes and the San Francisco 49ers
    while keeping a meticulous diary of practice drills and game scores.
  arts: Marie Lobo expresses creativity through building intricate LEGO cityscapes, drawing Disney‑style characters, and listening to the whimsical scores of John Williams and upbeat Disney songs from the
    'Frozen' soundtrack, often rehearsing a homemade puppet show for family gatherings.
  travel: Marie Lobo’s travel style is a family‑focused road‑trip itinerary marked with colored stickers, having explored Disneyland in Anaheim, the Lake Tahoe ski resorts in winter, and the San Francisco
    cable‑car museum, while they dream of camping under the Grand Canyon’s night sky.
  culinary: Marie Lobo enjoys homemade mac and cheese with a sprinkle of cheddar, chicken nuggets seasoned with a dash of paprika, and mixing fruit smoothies with banana, strawberry, and a splash of almond
    milk, confidently following her mother’s simple recipes and insisting on arranging their plate symmetrically before eating.
  core: Marie Lobo is a methodical, competition‑driven 7‑year‑old who turns playground games into organized score‑keeping tournaments, saves every spare coin for LEGO, and never lets a missed goal ruffle
    their iron‑clad calm.
background:
  cultural: Marie is raised in a predominantly white, middle‑class suburban environment in Roseville, California. Her family embraces mainstream American cultural traditions—celebrating holidays such as
    Thanksgiving, Christmas, and the Fourth of July, and participating in local community events like the Roseville Farmers Market and the annual summer fair. The region’s emphasis on education and outdoor
    recreation shapes her values, encouraging both academic achievement and active involvement in group activities. While her immediate cultural background reflects typical Western European American customs,
    the diverse surroundings of the Bay Area region subtly expose her to a broader multicultural tapestry.
