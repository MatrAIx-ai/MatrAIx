  career_goals: Marie aspires to a career that blends structure, problem‑solving, and leadership. She dreams of becoming a civil engineer who designs organized, safe community spaces, and also imagines
    herself as a teacher who can create clear, structured learning experiences for children. She is motivated to win school science projects and is determined to develop her skills in mathematics and design
    to achieve these goals.
