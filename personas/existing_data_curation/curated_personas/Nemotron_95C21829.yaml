personas:
  professional: Gerry White, a seasoned handyperson with decades of informal repair work, is launching a low‑key, home‑based handyman service that blends his meticulous budgeting skills with a competitive
    edge honed at the senior center’s chess and poker tables, while eagerly mentoring a handful of younger apprentices in the neighborhood.
  sports: Gerry White enjoys early‑morning fishing trips to Lake Keystone, follows the Oklahoma City Thunder and Tulsa Drillers, and participates in weekly low‑impact fitness classes at the senior center,
    where he balances his competitive spirit from chess with a relaxed, solitary workout routine.
  arts: Gerry White immerses himself in the blues and gospel sounds of B.B. King, Aretha Franklin, and local choir harmonies, often cradling his harmonica on quiet evenings, and attends community storytelling
    nights where he shares and absorbs oral histories that echo his upbringing.
  travel: Gerry White prefers low‑key road trips that blend nostalgia and music, having driven to the Mississippi Delta to trace the blues roots, spent a weekend in New Orleans savoring jazz and gumbo,
    and planning future visits to historic civil‑rights sites, all while budgeting carefully and favoring spontaneous detours over rigid itineraries.
  culinary: Gerry White excels at cooking collard greens, cornbread, and fried chicken with a cast‑iron skillet, seasoning generously with smoked paprika and hot sauce, yet his tendency to over‑salt the
    pots sometimes leaves him reaching for a glass of sweet tea to balance the flavors.
  core: Gerry White, a 71‑year‑old handyman‑entrepreneur, blends a competitive chess mind with a skeptical, worry‑prone heart, thriving on structure yet relaxed about obligations, and finds solace in fishing,
    blues, and sizzling soul food.
background:
  cultural: Gerry’s cultural identity is rooted in the Black community of Tulsa, especially the historic Greenwood District, known as “Black Wall Street.” Though he was a child when the aftermath of the
    1921 Tulsa race massacre shaped the neighborhood, stories of resilience and rebuilding were woven into his family narratives. He grew up attending a Baptist church where gospel music, oral history,
    and community service were emphasized, instilling a strong sense of solidarity. The Great Migration’s legacy and the Civil Rights era’s activism influenced his worldview, fostering a critical awareness
    of social inequities. Culinary traditions—such as collard greens, cornbread, and fried chicken—reflect Southern African-American heritage, while blues and soul records from artists like B.B. King and
    Aretha Franklin form the soundtrack of his life. These cultural threads inform his values of self-reliance, perseverance, and the importance of passing knowledge to the next generation.
