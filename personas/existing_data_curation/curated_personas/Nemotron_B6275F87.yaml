  career_goals: Although retired, Donna remains focused on making a lasting impact in her community. She plans to spearhead a mentorship program at the Yuma Senior Center that pairs seasoned retirees with
    younger volunteers, sharing practical wisdom and life stories. She also hopes to compile a community cookbook that records family recipes and the culinary traditions of Yuma’s diverse residents. Continuing
    to learn sustainable desert‑gardening techniques and staying physically active through regular walks and dance classes are also central to her personal ambitions.
