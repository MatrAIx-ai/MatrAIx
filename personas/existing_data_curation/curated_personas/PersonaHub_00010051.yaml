persona_description: A researcher interested in the impact of environmental interventions and curriculum interventions on children's obesity-related behaviors, particularly in the context of elementary
  schools. This person is interested in the development of multi-component interventions that address physical activity and obesity in children, and is seeking to evaluate the effectiveness of these interventions
  through objective and subjective assessments of physical activity, weight, and height measures, as well as assessments of mediating variables and self-reported leisure time physical activity. This person
  is also interested in the use of wearable technology, such as accelerometers, to collect data on physical activity and weight, and in the use of microgeographic analysis to understand physical activity
  behavior within elementary school grounds.
