  career_goals: Jennifer often talks about wanting to help others in a clear, predictable way. She says she would like to be a preschool teacher because she enjoys leading simple group activities and keeping
    a routine, and she also imagines being a veterinarian because she likes caring for pets and likes the idea of regular check-ups. Her ambitions reflect her preference for structured roles that provide
    immediate, tangible results.
