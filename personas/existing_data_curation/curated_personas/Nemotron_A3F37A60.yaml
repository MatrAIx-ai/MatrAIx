personas:
  professional: Jennifer Self, a four‑year‑old preschool organizer who loves creating simple daily schedules for nap time and snack time, uses a bright‑colored checklist to keep her peers in line, and demonstrates
    early leadership by politely asserting ideas while still sharing crayons with classmates.
  sports: Jennifer Self participates in weekend tee‑ball with the Hurricane Little Turtles, enjoys beginner soccer drills at the community center where they cheer for the West Virginia Mountaineers football
    team, and loves family hikes to the nearby Green River where they collect pine cones like a tiny scout.
  arts: Jennifer Self spends afternoons coloring pictures of farm animals while humming John Denver’s "Take Me Home, Country Roads", delights in listening to the local church choir’s renditions of The Carter
    Family’s folk songs, and eagerly watches Sesame Street’s bright characters for inspiration.
  travel: Jennifer Self’s travel adventures are family‑led road trips to the annual Putnam County fair, weekend getaways to Shenandoah’s Skyline Drive for picnics, and a memorable spring visit to Washington,
    D.C.’s Smithsonian museums, all planned around Mom’s color‑coded itinerary calendar.
  culinary: Jennifer Self loves buttery biscuits smothered in country gravy, munches on macaroni and cheese with extra cheddar, proudly assembles peanut butter‑jelly sandwiches by spreading with a tiny
    plastic knife, and requests a sprinkle of cinnamon on warm apple slices for dessert.
  core: Jennifer Self, a four‑year‑old who runs her preschool’s snack schedule with a crayon‑colored clipboard, guards her piggy bank like treasure, battles eczema with nightly lotion rituals, and never
    lets a rainy day stop her from lining up her stuffed animals for a pretend hike.
background:
  cultural: Jennifer is being raised in Hurricane, a small town in Putnam County, West Virginia. Her family is part of a predominantly white, Appalachian community that values close family bonds, church
    involvement, and outdoor recreation such as hiking, fishing, and seasonal festivals. Local traditions include county fairs, church picnics, and school celebrations, which expose her to community values
    of self-reliance, modesty, and respect for tradition. The cultural environment is shaped by rural life, a strong sense of neighborhood, and a clear emphasis on routine and helpfulness.
