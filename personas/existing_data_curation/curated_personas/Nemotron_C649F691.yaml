personas:
  professional: Byron Robertson, an aspiring junior digital artist and storyteller, channels their vivid imagination and curiosity into creating sci‑fi and fantasy illustrations, balancing meticulous sketch
    planning with spontaneous creative bursts while they quietly volunteer at the library to nurture younger readers.
  sports: Byron Robertson enjoys following the local high school basketball team and the NBA’s Golden State Warriors, participates in a community swim club for cardio, occasionally tries skateboarding in
    summer, but they often skip practice sessions when anxiety spikes.
  arts: Byron Robertson immerses themselves in creating digital art inspired by sci‑fi visionaries like H.R. Giger and fantasy author J.R.R. Tolkien, sketches characters while listening to Memphis blues
    legend B.B. King and hip‑hop producer DJ Premier, and admires contemporary illustrators such as Loish and Studio Ghibli’s Hayao Miyazaki, all of which shape their distinct artistic voice.
  travel: Byron Robertson loves planning low‑key trips to nearby planetariums and national parks like Yosemite for night‑sky stargazing, has visited Washington D.C.’s Smithsonian museums, and dreams of
    traveling to Iceland to chase the northern lights and to Tokyo to explore Akihabara’s anime culture.
  culinary: Byron Robertson prefers simple comfort foods like pepperoni pizza and homemade mac & cheese, enjoys crafting blueberry smoothies with almond milk, experiments with LEGO‑shaped pancake designs
    using flour, eggs, and cinnamon, and occasionally treats themselves to smoky BBQ ribs when they successfully complete a challenging LEGO set.
  core: Byron Robertson is a quietly imaginative 13‑year‑old whose boundless curiosity fuels a love of sci‑fi art and stargazing, while their compassionate nature drives library volunteering, even as they
    wrestle with anxiety‑induced worries and occasional impulsive splurges.
background:
  cultural: Byron is a Black teenager raised in Memphis, Tennessee, a city steeped in African‑American musical and cultural heritage. His family traditions include Sunday gospel services, soul‑food gatherings,
    and storytelling that connects him to the civil‑rights legacy of the South. He grew up listening to the blues of B.B. King, the soul of Stax records, and contemporary Memphis hip‑hop, which shape his
    artistic sensibility. Community events such as the Memphis in May festival and local youth mentorship programs reinforce a strong sense of resilience, collective support, and pride in Black Southern
    culture. These influences inform his artistic voice and his commitment to uplift his neighborhood.
attributes:
  skills: '["Visual storytelling (hand‑drawn comics)", "Digital illustration (tablet software)", "Creative writing (short stories, poetry)", "Basic programming (Scratch, introductory Python)", "Empathetic
    listening and peer mediation", "Volunteer tutoring", "Self‑organization and time management"]'
  hobbies: '["Reading sci‑fi and fantasy novels", "Sketching and comic drawing", "Digital illustration on tablet", "Building LEGO models", "Playing Minecraft", "Stargazing with a telescope", "Composing
    beats inspired by Memphis blues and hip‑hop", "Journaling", "Participating in after‑school art club", "Volunteering at the local library''s reading program"]'
  career_goals: Byron dreams of becoming a visual artist and social advocate. He aims to attend a specialized arts high school where he can refine illustration and animation, then pursue a Bachelor of Fine
    Arts or a degree in visual communication. He hopes to create graphic novels that highlight the experiences of Memphis youth and to launch a community art collective that offers free workshops for at‑risk
    teens. Ultimately, he sees himself using his art to foster empathy, raise awareness about mental health, and mentor younger children in his neighborhood.
