persona_description: A researcher who studies the impact of climate change and its effects on human behavior and resilience, focusing on vulnerable households and their ability to cope with natural disasters.
  They have conducted extensive fieldwork in Central America and have published results in journals such as Climatic Change and Mitigation and Adaptation Strategies for Global Change. Their work has been
  funded by the National Oceanic and Atmospheric Administration (NOAA) and they have developed tools to measure long-term resilience in households.
