personas:
  professional: Rabih Paschall, a ten‑year‑old aspiring game developer, channels his love for structure and teamwork into designing simple Scratch games that often feature clear quests and step‑by‑step
    logic, while also dreaming of building a future career in software engineering.
  sports: Rabih Paschall plays forward on his school’s soccer team, practicing twice weekly under Coach Davis, supports the Charlotte FC in the MLS, and belongs to the Apex Youth Soccer Club, where he balances
    competitive drills with a love for weekend community scrimmages.
  arts: Rabih Paschall builds intricate LEGO worlds inspired by the mythic landscapes of Percy Jackson, reads the Harry Potter series nightly, and enjoys listening to the upbeat pop of Billie Eilish while
    sketching comic panels, fostering a creative outlet that complements his structured mindset.
  travel: Rabih Paschall has visited Washington, D.C. on a school field trip, spent a summer at the beach in Myrtle Beach, dreams of exploring the Grand Canyon’s vistas, and prefers family‑planned itineraries
    that mix adventure with familiar comforts like backyard barbecues.
  culinary: Rabih Paschall favors classic Southern comfort foods such as pulled‑pork barbecue, mac and cheese, and chicken nuggets, enjoys helping his mom grill hot dogs at weekend barbecues, and can assemble
    a perfect LEGO‑shaped sandwich with cheddar and lettuce while debating the best sauce for pizza.
  core: Rabih Paschall is a diligent, socially‑charged ten‑year‑old who thrives on routines, worries about minor setbacks, and channels his energy into LEGO building, soccer, and coding, all while occasionally
    over‑indulging in snack treats during study breaks.
background:
  cultural: 'Rabih comes from a white, middle‑class family living in Apex, North Carolina, a suburban community in Wake County. His upbringing reflects typical Southern‑suburban values: a strong emphasis
    on family, community involvement, and school participation. He attends the local public elementary school, where he engages in after‑school programs and community sports leagues. Family traditions include
    weekend barbecues with neighbors, regular church attendance at a nearby Methodist congregation, and holiday celebrations that blend national customs with local community events. The cultural environment
    encourages teamwork, respect for routines, and a sense of belonging, all of which shape Rabih’s outlook and daily life.'
