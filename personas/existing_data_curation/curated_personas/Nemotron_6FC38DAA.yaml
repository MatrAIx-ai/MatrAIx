  career_goals: Rabih dreams of a career that blends structure, service, and teamwork. He is drawn to becoming a firefighter because it offers clear routines, the chance to help his community, and the excitement
    of working with a close‑knit crew. He also imagines himself as a civil engineer someday, designing safe roads and bridges that keep people moving smoothly. In the short term, he wants to earn the rank
    of Eagle Scout, which will give him leadership experience and a sense of accomplishment. Overall, his ambition is to pursue a stable, people‑focused profession where he can apply his organizational
    strengths and love for teamwork.
