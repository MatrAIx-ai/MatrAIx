persona_description: A researcher in immunology, particularly focused on the study of the role of non-CD4 immune cells in immunity against Salmonella typhi and HIV. The researcher has expertise in murine
  models for typhoid fever and has used genetic knockout mice to investigate the cellular requirements for immunity against Salmonella typhi deletion mutants. The researcher's research interests include
  the production of IFN- by non-CD4 immune cells and the identification of CD4-independent mechanisms of immunity. The researcher has published several papers on the topic and has been recognized for their
  contributions to the field of immunology.
