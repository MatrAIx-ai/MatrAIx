  career_goals: Jennifer dreams of a future where she can combine her love of science, her desire to help others, and her enthusiasm for community interaction. She is particularly drawn to becoming a pediatrician
    because she wants to use her curiosity about the human body to solve health problems while caring for children. At the same time, she imagines roles that let her share knowledge, such as a science teacher
    or a youth program coordinator, where she can inspire peers and lead collaborative projects. Her ambition includes earning a scholarship to study medicine or education, later returning to Glens Falls
    to contribute to the health and learning of her hometown.
