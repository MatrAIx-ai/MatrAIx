personas:
  professional: An aspiring young scientist and journalist, Jennifer Miller combines her love of hands‑on experiments, intricate LEGO constructions, and piano performances with a knack for writing engaging
    school newspaper articles, often leading group projects with talkative confidence while they balance curiosity with practical organization.
  sports: A dedicated member of their middle‑school soccer team and the Adirondack Youth Soccer League, Jennifer Miller balances rigorous training with weekend hikes, cheering loudly for the Buffalo Bills
    and the New York Knicks, while they maintain an energetic, sociable approach to fitness.
  arts: A passionate pianist and drama club star, Jennifer Miller dazzles friends with classical Beethoven sonatas, pop covers of Taylor Swift, and expressive stage performances inspired by Lin‑Manuel Miranda,
    while they pen spirited articles for the school newspaper and devour fantasy novels by J.K. Rowling.
  travel: An adventurous explorer, Jennifer Miller spends weekends hiking Adirondack trails, has trekked to Niagara Falls on a family road trip, and dreams of camping under the stars in Yellowstone National
    Park, while they balance meticulous itinerary planning with spontaneous detours.
  culinary: A budding home chef, Jennifer Miller delights in crafting pepperoni pizza, cheesy macaroni, and batch‑cooked chocolate chip cookies, often experimenting with fresh basil and a secret dash of
    extra marshmallows for a sweet twist, while they occasionally sneak sugary cereal into bedtime snacks.
  core: Jennifer Miller, an 11‑year‑old whirlwind of curiosity, merges LEGO engineering, piano improv, and community storytelling while they secretly stash extra‑sugary cereal for late‑night science experiments.
background:
  cultural: Jennifer comes from a white, middle‑class family rooted in the small‑town culture of Glens Falls, New York. Her ancestry includes German and Irish heritage, reflecting the broader settlement
    patterns of the region. Growing up, she has been immersed in community traditions such as the annual Glens Falls Winter Carnival, local farms' harvest festivals, and school events that emphasize neighborliness
    and civic pride. Her family celebrates a mix of American holidays and maintains a modest Protestant (Episcopal) background, which offers a sense of continuity and community service. The town’s close‑knit
    environment, combined with exposure to broader digital cultures through school programs and online resources, shapes Jennifer’s values of responsibility, cooperation, and a balanced respect for both
    tradition and new ideas.
