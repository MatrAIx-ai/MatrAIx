  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Hiking'', ''Gardening'', ''Cooking Mexican cuisine'', ''Playing guitar'', ''Reading mystery novels'', ''Community theater'', ''Día de
    los Muertos celebrations'', ''Teaching art workshops'']'
  career_goals: Magalys aims to move into a supervisory or facilities‑manager position within a larger organization, leveraging her hands‑on expertise to lead a team. She plans to complete an associate
    degree in Business Administration to strengthen her managerial credentials and to specialize in sustainable, eco‑friendly cleaning practices. Long‑term, she hopes to launch a small side business offering
    green home‑cleaning services combined with artful organization, while mentoring younger workers and contributing to community cultural programs.
