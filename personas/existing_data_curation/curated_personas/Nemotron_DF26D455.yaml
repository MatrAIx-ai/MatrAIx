  hobbies: '[''Gardening (herbs and vegetables)'', ''Traditional and fusion cooking'', ''Reading historical fiction and cultural memoirs'', ''Knitting and crocheting'', ''Walking nature trails and senior
    walking club'', ''Photography of family and garden'', ''Genealogy research and family history documentation'']'
  career_goals: Although retired from formal employment, Neisy aims to channel her expertise into community-focused pursuits. She hopes to volunteer as a cultural mentor at the local senior center, teaching
    Spanish language basics and sharing traditional recipes with younger residents. She aspires to compile a family cookbook that weaves together stories, heritage, and nutrition tips, ultimately publishing
    it for her extended family. Maintaining her health is a paramount ambition—regular walking, yoga, and routine check-ups—to stay active for her grandchildren’s milestones. A long-held dream is to travel
    to Puerto Rico (her ancestral homeland) to reconnect with distant relatives and document the trip in a photo-journal and blog. Lastly, she wishes to continue her genealogy research, mapping her lineage
    and creating a digital archive for future generations.
