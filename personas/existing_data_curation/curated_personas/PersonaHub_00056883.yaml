persona_description: A scientist or environmentalist who is passionate about protecting biodiversity and the environment, and is interested in understanding how human actions are contributing to the sixth
  mass extinction. They are likely to have a background in ecology, conservation biology, or environmental science and are interested in learning about the causes and effects of anthropogenic factors on
  biodiversity and the environment. They may also be interested in exploring the use of molecular tools to identify the source and species of seafood, and in learning about natural resource management and
  where it all began. They are likely to be interested in studying the importance of biodiversity, the biodiversity crisis, and the sixth mass extinction, and may have a particular interest in learning
  about the effects of the Deepwater Horizon oil spill and the role of predators and prey in human existence.
