personas:
  professional: Chuan Tan, an imaginative 8‑year‑old junior designer, blends a love for drawing comic characters with hands‑on LEGO engineering and Scratch Jr. coding, channeling boundless curiosity and
    a balanced, detail‑oriented mindset into every creative project.
  sports: Chuan Tan, a lively member of the Moncure Kids Soccer Club, darts across the field as a forward for the Moncure Bulldogs U‑8 team, balances soccer drills with tag games in the neighborhood woods,
    and eagerly follows the Major League Soccer team Seattle Sounders for inspiration during the winter season.
  arts: Chuan Tan, a budding comic artist, sketches heroic space explorers inspired by Hayao Miyazaki’s “Nausicaä” and Stan Lee’s classic superheroes, flips through graphic novels by Jack Kirby, and proudly
    displays hand‑drawn panels on the fridge, feeding an ever‑expanding imagination.
  travel: Chuan Tan, an adventurous family traveler, has explored the nearby Yadkin River trails and visited the historic town of Raleigh’s museums, dreams of a weekend trip to the Space Center Houston
    to see rockets up close, and prefers short, nature‑focused excursions over long flights due to school schedules.
  culinary: Chuan Tan, a curious young foodie, delights in crunchy carrot sticks, homemade cheese pizza, and sweet mango smoothies, loves to help whisk batter for chocolate chip pancakes, and occasionally
    sneaks extra chocolate chips into cookies despite their parents’ gentle reminders to keep portions in check.
  core: Chuan Tan, an inquisitive 8‑year‑old blend of comic‑making, LEGO engineering, and competitive soccer, saves each allowance for new building sets, manages mild allergies with a symptom chart, and
    fuels creative bursts with pizza and mango smoothies while dreaming of space adventures.
background:
  cultural: Chuan is an 8‑year‑old boy of East Asian heritage, with family roots tracing back to Taiwan. His household blends Mandarin language, traditional celebrations such as Lunar New Year and Mid‑Autumn
    Festival, and Chinese culinary customs with the rhythms of life in Moncure, a small town in Chatham County, North Carolina. He attends a local public elementary school where he interacts daily with
    peers from diverse backgrounds. The family values education, respect for elders, and community involvement, encouraging him to share his cultural stories during school multicultural events while also
    embracing typical American childhood activities like baseball games, library storytimes, and community fairs. This bicultural environment fuels his curiosity about both his ancestry and the broader
    world.
attributes:
