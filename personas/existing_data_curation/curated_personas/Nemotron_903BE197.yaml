  hobbies: '[''drawing and comic creation'', ''LEGO building and design'', ''reading adventure/science‑fiction books'', ''watching space documentaries'', ''soccer and group outdoor games'', ''exploring
    local nature trails'', ''rock and fossil collecting'', ''practicing Mandarin songs'', ''basic Scratch Jr. coding'']'
  career_goals: Chuan dreams of exploring space as an astronaut one day, fascinated by the night sky and science documentaries. He also loves storytelling through pictures and hopes to become a comic‑book
    illustrator who can bring adventures to life. Combining his curiosity for building things, he imagines inventing simple gadgets with LEGO and eventually studying engineering. He wants to lead his school’s
    future science club, using his natural reliability to organize experiments and help peers. Ultimately, his ambition is to merge his love of art, space, and problem‑solving into a career that inspires
    other kids to explore the world.
