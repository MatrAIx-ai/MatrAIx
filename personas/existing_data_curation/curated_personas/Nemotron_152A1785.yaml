personas:
  professional: Ashley Neary, a 19‑year‑old aspiring freelance visual storyteller, merges photography, graphic design, and creative writing into brand narratives and editorial projects while leveraging
    a critical, skeptical eye and a laid‑back, sometimes disorganized workflow that thrives on flexibility and spontaneous inspiration.
  sports: Ashley Neary channels their love of the outdoors through trail‑running with the Asheville Hiking Club and occasional pickup soccer games, avidly supports the Carolina Hurricanes during NHL season,
    and prefers spontaneous mountain hikes over regimented gym workouts, often swapping a planned workout for an impromptu photo expedition.
  arts: Ashley Neary frequents Asheville’s indie galleries and live‑music venues, sketches strangers at the Blue Ridge Art Walk, and draws artistic inspiration from Fleet Foxes’ atmospheric guitar work,
    painter Sara Baker’s poetic visual style, and Greta Gerwig’s quirky film narratives, infusing these influences into their own zine projects.
  travel: Ashley Neary plans low‑budget road trips that blend photography excursions with cultural immersion, having already hiked the Great Smoky Mountains and toured the Biltmore Estate, while dreaming
    of a solo backpack trek across Iceland’s volcanic landscapes next summer.
  culinary: Ashley Neary experiments in the kitchen with fusion dishes like kimchi‑infused ramen, sunchoke risotto flavored with black garlic, and sumac‑spiced lentil tacos, boasting moderate cooking skill
    that frequently yields delicious but sometimes overly bold flavors, always accompanied by a curated indie‑folk playlist.
  core: Ashley Neary is a curiosity‑driven, creatively restless 19‑year‑old who balances spontaneous mountain adventures with a skeptical, flexible approach to work, often swapping organized plans for last‑minute
    inspiration.
background:
  cultural: Ashley grew up in Boone, North Carolina, in a middle‑class white American family with deep roots in the Appalachian region. Her upbringing blended the traditions of mountain life—such as folk
    music, hiking, and community festivals—with the progressive, artistic atmosphere of a college town. Exposure to Appalachian heritage through local crafts and storytelling has nurtured her appreciation
    for nature and regional culture, while her college environment introduced her to contemporary art, diverse ideas, and a more global perspective. This mix of local tradition and youthful openness shapes
    her identity and influences both her creative pursuits and her worldview.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Digital illustration'', ''Photography (DSLR & mirrorless)'', ''Video editing (Premiere Pro)'', ''Creative writing'', ''Research and analysis'',
