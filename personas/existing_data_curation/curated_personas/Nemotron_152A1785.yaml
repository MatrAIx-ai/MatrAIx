  hobbies: '[''Hiking'', ''Photography'', ''Sketching'', ''Indie music concerts'', ''Reading speculative fiction'', ''Playing acoustic guitar'', ''Digital art'', ''DIY crafts'', ''Board games'', ''Cooking
    experimental recipes'']'
  career_goals: Ashley aims to build a career as a freelance visual storyteller, merging her photography, graphic design, and writing into compelling brand narratives and editorial projects. She hopes to
    secure an internship at a regional creative agency or magazine to gain professional experience while completing her degree. Long‑term, she envisions launching a personal brand on platforms like Instagram
    and TikTok that highlights Appalachian art, travel, and sustainable living, eventually expanding into a small boutique gallery‑cafe that showcases emerging artists from mountain communities. Throughout,
    she wants her work to stand out for its originality, critical edge, and ability to spark conversation.
