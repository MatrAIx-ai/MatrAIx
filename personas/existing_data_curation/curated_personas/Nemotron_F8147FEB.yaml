  career_goals: Zi aims to become a leader in early childhood education by developing an innovative, arts‑focused preschool program that blends creative expression with emerging STEM concepts. She plans
    to pursue advanced certifications in child psychology and inclusive education, eventually moving into a curriculum specialist role for the county school system or launching her own boutique early learning
    center. Zi also aspires to share her expertise through speaking engagements at regional conferences, authoring articles on curiosity‑driven pedagogy, and mentoring new teachers, all while establishing
    a reputation for excellence and competitive distinction within her field.
