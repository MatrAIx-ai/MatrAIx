personas:
  professional: Zi Vo, a 30‑year‑old early childhood educator, designs play‑based curricula that weave visual arts and emerging STEM concepts, leveraging bilingual fluency and a naturally talkative, stage‑ready
    presence to energize parents and staff while their competitive drive pushes them to pioneer a flagship arts‑focused preschool program.
  sports: Zi Vo jogs the waterfront three times a week, joins a co‑ed adult softball league in the summer, and passionately follows the Seattle Seahawks, Seattle Kraken, and Seattle Sounders, treating each
    workout as a personal scoreboard to beat.
  arts: Zi Vo frequents the local contemporary art museum for exhibitions by artists such as Yayoi Kusama, attends live performances at the Seattle Repertory Theatre, and curates a weekly sketch‑and‑share
    night while staying inspired by musicians like Bon Iver and Mitski.
  travel: Zi Vo meticulously plans trips that blend cultural immersion and relaxation, having explored Kyoto’s temple festivals, Barcelona’s Gaudí architecture, and Chiang Mai’s lantern celebrations, and
    now dreams of trekking the Inca Trail to Machu Picchu while using travel‑budget spreadsheets to fund future adventures.
  culinary: Zi Vo enjoys cooking traditional Asian dishes such as mapo tofu, Vietnamese pho, and handmade ramen, favoring ingredients like fermented soy sauce, Sichuan pepper, and miso, and often experiments
    with fusion twists like Korean‑style tacos during weekend dinner parties.
  core: Zi Vo, a 30‑year‑old early‑childhood educator, channels boundless curiosity and talkative charisma into arts‑infused teaching while wrestling with chronic worry and a fiercely competitive streak.
background:
  cultural: Born to East Asian immigrant parents and raised in the suburbs of Maryland, Zi grew up in a bilingual household where academic achievement and respect for tradition were emphasized. She celebrates
    cultural holidays such as Lunar New Year and Mid‑Autumn Festival, incorporating these traditions into her classroom to promote cultural awareness. While she values the collective ethos of her heritage,
    her experiences in a diverse American community have fostered an independent, critically minded outlook. Navigating familial expectations and personal ambitions has shaped her resilient yet introspective
    identity.
