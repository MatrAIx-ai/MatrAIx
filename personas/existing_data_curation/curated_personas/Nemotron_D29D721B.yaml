  career_goals: Carlos dreams of becoming someone who works with the natural world. He often talks about exploring the ocean as a marine biologist to protect sea turtles he has learned about in school,
    and he also imagines one day teaching younger kids about science and the environment. He sees these paths as ways to satisfy his curiosity while making a practical difference for others.
