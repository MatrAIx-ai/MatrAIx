personas:
  professional: Carlos Shulterbrandt, a budding junior LEGO architect and youth soccer forward, channels curiosity and practicality into building intricate brick creations and coordinating on the field,
    showcasing spatial reasoning, teamwork, and a reliable, organized approach.
  sports: Carlos Shulterbrandt, a dedicated member of the Red Falcons U‑9 soccer squad, spends after‑school drills mastering ball control while proudly wearing the jersey of Manchester United, and balances
    structured practice with spontaneous backyard games that keep them active and cooperative.
  arts: Carlos Shulterbrandt immerses themselves in the rhythms of Astor Piazzolla’s nuevo tango and the soulful voice of Mercedes Sosa while sketching scenes inspired by adventure novels like 'The Treasure
    of the Andes', weaving music and storytelling into their daily doodles.
  travel: Carlos Shulterbrandt, who often organizes backyard treasure hunts, enjoys family getaways to the sun‑kissed beaches of Florida, weekend camping at the state’s pine‑filled lake park, and dreams
    of one day trekking the stone pathways of Machu Picchu to fuel their love of adventure stories.
  culinary: Carlos Shulterbrandt loves assisting their parents to roll dough for empanadas filled with spiced beef, melt cheese on mozzarella sticks, and drizzle chimichurri sauce on grilled vegetables,
    showcasing a budding culinary skill and a palate that delights in savory pastries, fresh herbs, and sweet dulce de leche for dessert.
  core: Carlos Shulterbrandt, an eight‑year‑old balancing curiosity with practicality, builds LEGO cities, scores goals on the soccer field, saves allowance in three jars, and occasionally forgets to take
    antihistamines, all while humming tango melodies under a blanket of shells.
background:
  cultural: Carlos comes from an Argentine family that maintains strong ties to its heritage while living in Bonaire, Georgia. At home, Spanish is spoken alongside English, and family meals frequently feature
    Argentine staples such as empanadas, milanesas, and dulce de leche desserts. He celebrates Argentine holidays like Dia de la Independencia (July 9) and the May Revolution with traditional music and
    dance. The family also participates in local community events in Houston County, blending Southern hospitality with their Latin roots. This bicultural environment nurtures his curiosity about both his
    ancestral culture and the American community around him.
