personas:
  professional: Laura Miller is a senior IT strategist with a graduate background in education, who leverages her methodical planning, vendor‑negotiation expertise, and natural mentorship flair to drive
    digital transformation while championing inclusive tech training for staff.
  sports: Laura Miller runs three times a week with the ‘Cornfield Runners’ club on scenic regional trails, cheers on the local baseball and football teams during weekends, and incorporates weekly yoga
    sessions to balance high‑intensity cardio with flexibility.
  arts: Laura Miller stars in a community theater production of “Our Town”, curates a book‑club exploring contemporary authors like Sally Rooney and Chimamanda Adichie, and captures prairie sunsets through
    her DSLR, often citing photographer Ansel Adams as inspiration and admiring actress Meryl Streep’s performances.
  travel: Laura Miller plans each trip like a project, favoring organized itineraries that blend hiking in national parks, weekend stays at family‑run B&Bs in Asheville, and cultural immersion trips to
    Kyoto during cherry‑blossom season, all while balancing a modest travel budget and a desire for new experiences.
  culinary: Laura Miller experiments with farm‑to‑table cuisine, frequently preparing roasted beet and quinoa salad, zucchini lasagna, and spicy kimchi‑topped fried rice using home‑grown kale, heirloom
    tomatoes, and seasonal herbs, while mastering sous‑vide techniques for weekend dinner parties.
  core: Laura Miller blends disciplined planning with a community‑first spirit, channeling her tech leadership drive into inclusive training, garden‑fresh cooking, and vibrant theater, all while wrestling
    with a persistent worry that fuels both meticulous organization and occasional over‑commitment.
background:
  cultural: Laura grew up in the Midwestern United States, where a strong emphasis on community involvement, practicality, and education shaped her values. Her family encouraged hard work, reliability,
    and helping neighbors, which aligns with her compassionate and cooperative disposition. Although ethnically white, she embraces the region’s cultural diversity through volunteer work and actively seeks
    to bridge gaps between technology and everyday life for people of all backgrounds.
attributes:
  skills: '[''IT strategic planning'', ''Project management (Agile & Waterfall)'', ''Budget management and financial forecasting'', ''Vendor negotiation and contract management'', ''Cybersecurity policy
