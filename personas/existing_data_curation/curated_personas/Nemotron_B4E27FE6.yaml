  hobbies: '[''Volunteer teaching computer literacy'', ''Book club discussions'', ''Community theater acting'', ''Gardening'', ''Running with a local group'', ''Cooking and experimenting with recipes'',
    ''Hiking the Iowa Trail'', ''Yoga for stress management'', ''Photography of natural landscapes'', ''Board game nights'']'
  career_goals: Laura aims to move into senior executive leadership, targeting a Chief Information Officer role within the next five years. She is driven to spearhead digital transformation across the organization,
    integrate emerging technologies that improve operational efficiency, and create systematic training programs that elevate employee skill sets. Additionally, she hopes to champion diversity and inclusion
    initiatives that support women and underrepresented groups in tech, while maintaining a balanced workload that protects her well‑being.
