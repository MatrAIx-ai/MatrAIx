  hobbies: '[''salsa dancing'', ''merengue dancing'', ''playing dominoes'', ''cooking traditional dishes'', ''gardening'', ''attending church services'', ''volunteering at community festivals'', ''walking
    in local parks'', ''watching baseball'', ''listening to plena and boleros'']'
  career_goals: Although retired, Luis aims to stay active by volunteering at the senior center in Bayamón, where he can lead cooking workshops and organize cultural outings for fellow elders. He hopes
    to mentor younger members of his church and community groups, passing on his knowledge of traditional cooking, maintenance skills, and local customs. Luis also aspires to document his life story in
    a memoir for his grandchildren, preserving family history and the heritage of Puerto Rico. Staying physically fit through daily walks and salsa dancing, as well as learning to use a smartphone for video
    calls with distant relatives, are additional personal goals.
