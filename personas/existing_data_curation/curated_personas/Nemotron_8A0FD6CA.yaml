personas:
  professional: Luis Loza, a retired maintenance handyman turned senior‑center volunteer, applies decades of carpentry, plumbing, and automotive troubleshooting expertise to lead cooking workshops, coordinate
    neighborhood festival logistics, and mentor younger volunteers with a methodical yet flexible, routine‑driven approach.
  sports: Luis Loza, a devoted fan of the Bayamón Vaqueros baseball team, spends weekends cheering from the bleachers, joins casual soccer kick‑abouts at the local park, and incorporates salsa dancing as
    a low‑impact cardio routine to stay fit.
  arts: Luis Loza, an enthusiastic lover of island rhythms, frequently tunes into radio classics ranging from plena beats to salsa hits by Celia Cruz, Héctor Lavoe, and Rubén Blades while showcasing salsa
    and merengue steps at community‑hall events and enjoys occasional viewings of classic films starring Rita Moreno.
  travel: Luis Loza, who prefers organized, leisurely trips, often takes day excursions to the historic streets of Old San Juan and the tranquil beaches of Vieques, and dreams of a calm Caribbean cruise
    to St. Thomas and Aruba with his grandchildren.
  culinary: Luis Loza, a seasoned home chef, masterfully prepares island staples such as arroz con gandules, lechón asado, and pasteles, and delights in harvesting garden tomatoes, peppers, and herbs to
    flavor his dishes while sharing meals with family and neighbors.
  core: Luis Loza, a charismatic septuagenarian whose daily rhythm blends garden‑to‑table cooking, salsa dancing, and meticulous community organizing—yet they often misplace their trusty wrench and forget
    their glasses, quirks that fuel good‑natured banter.
background:
  cultural: Luis was born and raised in Bayamón, a vibrant municipality of San Juan, Puerto Rico. He grew up in a close‑knit Catholic family where familismo, respect for elders, and community involvement
    were core values. The island's rich musical traditions—plena, bomba, and salsa—shaped his social life, while the cuisine of his backyard kitchens taught him the importance of sharing food as a cultural
    bond. Bayamón's annual festivals, neighborly picnics, and neighborhood churches fostered his love for group activities and collective celebrations. These cultural foundations influence Luis's daily
    routines, his emphasis on practicality and tradition, and his commitment to preserving Puerto Rican heritage for future generations.
attributes:
  skills: '[''home maintenance'', ''basic carpentry'', ''plumbing'', ''automotive troubleshooting'', ''traditional Puerto Rican cooking'', ''gardening'', ''event coordination'', ''community mentorship'',
