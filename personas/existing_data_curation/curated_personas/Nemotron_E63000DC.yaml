personas:
  professional: A 10‑year‑old budding architect‑in‑training, Lino Santalla channels curiosity and practicality into designing LEGO cities and Minecraft redstone contraptions, often collaborating with friends
    while letting their relaxed approach to deadlines shape playful, improvisational projects.
  sports: A soccer‑enthusiast who drills tricks after school, Lino Santalla plays for the local youth club Hammond FC, cheers for the Indianapolis Colts in football season and the Chicago Fire in MLS, and
    balances their love of the sport with occasional basketball games in winter, though their laid‑back nature sometimes leads them to miss practice when a LEGO project tempts them.
  arts: An imaginative storyteller, Lino Santalla devours adventure series like 'Percy Jackson' and 'Harry Potter,' sketches original comic strips inspired by Alex Ross and manga styles, and dances to the
    rhythmic beats of Latin‑pop artists such as Shakira and J Balvin while helping with cultural dance workshops.
  travel: An inquisitive explorer, Lino Santalla has taken family road trips to Chicago’s Museum of Science and Industry, spent a summer vacation on the Gulf Coast in Pensacola, and dreams of visiting the
    historic plazas of a Central American capital where they can try street‑food tacos and explore ancient ruins, all while balancing school schedules and a modest allowance.
  culinary: A budding home chef, Lino Santalla loves crafting stuffed corn tortillas filled with cheese, beans, and cilantro—reminiscent of pupusas—and helps whisk together a savory baleada‑style flour
    tortilla with refried beans and scrambled eggs, while also mastering classic comfort foods like spaghetti Bolognese and pepperoni pizza.
  core: Lino Santalla is a ten‑year‑old LEGO‑building, soccer‑loving, culturally rooted dreamer who balances curiosity with a laid‑back approach, turning everyday tasks into playful projects while caring
    deeply for friends, family, and the community.
background:
  cultural: Lino comes from a Honduran‑American family that preserves strong ties to its heritage while living in Hammond, Indiana. At home, Spanish is spoken regularly, and he celebrates Honduran holidays
    such as Día de la Independencia (September 15) and enjoys traditional foods like pupusas and baleadas. His family participates in a local Central American cultural association, attending community festivals,
    dance workshops, and Spanish language classes. Catholic traditions shape many family gatherings, and Lino often helps set up for holiday celebrations, reinforcing his sense of community and cultural
    pride.
