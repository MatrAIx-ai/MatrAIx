  hobbies: '[''Soccer'', ''LEGO building'', ''Minecraft'', ''Reading adventure books'', ''Drawing comics'', ''Garden care'', ''Learning Honduran recipes and Spanish songs'']'
  career_goals: Lino dreams of becoming someone who builds useful things for his community, envisioning a future as a civil engineer or a community planner who designs safe playgrounds and bridges. He also
    imagines helping others directly by volunteering as a youth mentor or joining a local outreach program, combining his curiosity about how things work with his desire to support and uplift those around
    him. In the short term, he hopes to join his school’s robotics club and earn a badge for community service.
