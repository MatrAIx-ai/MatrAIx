personas:
  professional: Sarah Park is a budding junior coder who spends after‑school hours crafting Scratch games, applies their methodical chess strategies to programming logic, and dreams of turning their love
    of fantasy novels into interactive story adventures.
  sports: Sarah Park is a member of the Kissimmee community pool swim team, practices freestyle drills three times a week, follows the Orlando Magic and the Tampa Bay Rays, and enjoys occasional pick‑up
    basketball games at their church’s recreation hall.
  arts: Sarah Park is a piano enthusiast who practices scales thrice weekly, admires compositions by Mozart and modern pop ballads by Taylor Swift, creates scrapbooks featuring Disney movie stills, and
    draws wildlife sketches inspired by their nature walks, often listening to the soundtracks of the Harry Potter series while they work.
  travel: Sarah Park loves organized family trips, eagerly anticipates annual visits to Walt Disney World, has a wishlist that includes a weekend in the Everglades for wildlife spotting and a future trip
    to Washington, D.C. to see the National Museum of Natural History.
  culinary: Sarah Park enjoys baking chocolate chip cookies with their mother, prefers simple meals like mac‑and‑cheese and grilled cheese while occasionally sampling mango salsa after school‑sponsored
    cultural days, and likes to experiment with adding cinnamon to oatmeal.
  core: Sarah Park is a routine‑driven, competitive 11‑year‑old who balances structured chess battles, piano practice, and meticulous allowance saving while quietly questioning the world around them.
background:
  cultural: Sarah is a white American child growing up in the suburban community of Kissimmee, Osceola County, Florida. Her family follows a middle‑class, mainstream American lifestyle, celebrating holidays
    such as Thanksgiving, Christmas, and the Fourth of July, and they often attend a local community church where routine and togetherness are emphasized. The multicultural environment of Central Florida,
    with its strong Hispanic influence, adds diverse flavors to her community experiences, though her household retains traditional white‑American customs and values practicality, punctuality, and education.
    The proximity to major tourist attractions like Disney World introduces a sense of wonder and occasional family outings, while the everyday rhythm of school, extracurricular clubs, and neighborhood
    activities reinforces her preference for routine, organized schedules, and small‑group interactions.
