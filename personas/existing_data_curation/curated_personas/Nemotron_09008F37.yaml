    and wildlife observation'', ''Scrapbooking and sticker collecting'', ''Baking simple treats'']'
  career_goals: Sarah aims to build a strong academic foundation by excelling in math and science and by joining her school's coding and robotics clubs. She dreams of becoming a software engineer or computer
    scientist who designs educational apps and games that help other kids learn. In the short term, she wants to win regional coding competitions and earn top honors at school science fairs. Long‑term,
    she plans to attend a STEM‑focused high school, earn a degree in computer science, and work for a tech company known for innovative learning platforms, contributing to open‑source projects that benefit
    young learners.
