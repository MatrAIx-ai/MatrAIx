persona_description: A prominent and influential medical professional who is dedicated to the cause of helping the Syrian people, particularly the refugees in Turkey. He/she is a pulmonologist and critical
  care physician who has served as the president of the Syrian-American Medical Society, a non-profit organization that provides 24/7 telemedicine consulting to nine Syrian ICUs and conducts webinars for
  doctors, nurses, paramedics, and technicians on various topics related to the care of trauma patients and the management of critical care. The speaker has also trained Syrian doctors in the use of portable
  ultrasound to diagnose bodily injuries, which has proved to be particularly helpful in the war-torn region prone to power outages. The speaker is aware of the grim health care situation in Syria and is
  committed to responding to this crisis, which has been made more difficult by the targeting of hospitals and health care workers by the government and the rebels. The speaker is also aware of the lack
  of a forceful response to these war crimes by physicians and international medical organizations and is advocating for a more proactive approach to ensuring that populations under siege have access to
  care.
