personas:
  professional: Rhonda Green, a budding junior naturalist who spends afternoons sketching local wildlife and assembling LEGO habitats, blends keen curiosity with a practical, hands-on approach; they often
    prefer solitary projects over organized group tasks while still cooperating eagerly when friends join their imaginative doctor-or-teacher games.
  sports: Rhonda Green, a lively member of the Cleveland Cubs youth soccer team who dashes across the field after weekend creek forays, also loves splashing in the local community pool and cheering for
    the Dallas Cowboys on Sunday evenings, balancing energetic play with a preference for small-group games over large crowd spectacles, and they often celebrate a goal with a triumphant dance.
  arts: Rhonda Green, an enthusiastic fan of Beyoncé’s upbeat R&B tracks and Kirk Franklin’s gospel anthems, often bursts into spontaneous dance while sketching squirrels and foxes in the margin of picture
    books, letting the soulful melodies and vibrant colors reinforce their love of storytelling and creativity, and they sometimes hum the chorus while building LEGO scenes.
  travel: Rhonda Green, who dreams of a future visit to the Space Center Houston after devouring picture books about the stars, currently delights in weekend family picnics at Caddo Lake State Park and
    short hikes along the nearby creek, favoring unplanned nature adventures over long-distance travel due to a modest family allowance, and they eagerly map out imaginary routes using crayons.
  culinary: Rhonda Green, a self-declared connoisseur of mac and cheese, fried chicken, and sweet tea, often assists their grandparents by stirring cornbread batter and sprinkling a pinch of paprika on
    baked sweet potatoes, while also snacking on gummy bears and blueberry muffins for extra energy during play, and they proudly claim the title of 'official taste-tester' of family meals.
  core: Rhonda Green is a curious, solitary six-year-old who blends a love of nature sketches and LEGO builds with spontaneous dance bursts to R&B beats, yet occasionally forgets to pack a snack for school
    and misplaces their favorite crayon, and they sometimes daydream about exploring outer space.
background:
  cultural: Rhonda comes from a Black family rooted in Southern and East Texas traditions. Her household celebrates milestones with church gatherings, soulful music, and family meals that blend Southern
    comfort food with recipes passed down through generations. Community events like church picnics, local festivals, and neighborhood block parties introduce her to storytelling, call‑and‑response singing,
    and a strong sense of communal support. Growing up in the rural setting of Cleveland, Polk County, she is also deeply connected to the natural landscapes of East Texas, which shape her appreciation
    for outdoor play and the regional environment.
attributes:
  skills: '["Reading sight words","Counting and basic addition","Fine motor coordination (cutting, coloring, LEGO building)","Following step-by-step instructions","Asking inquisitive questions about the
    world"]'
  hobbies: '["Drawing and coloring","LEGO building","Reading picture books","Pretend play (teacher, veterinarian)","Listening to music (R&B, gospel)","Exploring nature (collecting leaves, rocks, bugs)"]'
  career_goals: Rhonda dreams of growing up to help others and explore how things work. She often says she wants to be a teacher who shares stories and encourages curiosity, or a veterinarian who cares
    for the animals she loves. She also imagines being a scientist‑inventor who creates simple solutions for everyday problems, reflecting her blend of curiosity and practicality. Though her aspirations
    are playful, she expresses a desire to make a positive impact on her community in Cleveland, Texas.
