  hobbies: '[''Visiting art galleries and murals'', ''Sketching outdoors'', ''Digital collage creation'', ''Listening to indie/folk music'', ''Reading contemporary fiction and art history'', ''Volunteering
    at the public library teen art program'', ''Nature photography'', ''Personal journaling'']'
  career_goals: Ellen plans to earn her GED within the next year and then enroll in a community college or associate‑degree program focused on graphic design or visual arts. Her long‑term ambition is to
    combine her artistic talent with her methodical planning skills by working as a graphic designer for a nonprofit organization, eventually advancing to a role such as an art coordinator or curator at
    a local museum or cultural center. She also hopes to build a personal portfolio that could lead to freelance commissions and showcase her unique creative voice.
