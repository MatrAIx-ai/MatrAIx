personas:
  professional: Ellen Bolenbaugh, a budding graphic designer and volunteer art coordinator at the Murfreesboro Public Library, blends her sketching talent, Procreate fluency, and methodical project‑planning
    skills to deliver polished visual concepts for community flyers while they quietly insist on meeting every deadline.
  sports: Ellen Bolenbaugh, a member of the Murfreesboro Youth Soccer Club and a casual fan of the Tennessee Titans and Nashville Predators, squeezes in early morning jogs along the Stones River Trail and
    uses their organized planner to balance practice, school, and weekend hikes in the nearby Smokies.
  arts: Ellen Bolenbaugh immerses themselves in the local mural scene, draws inspiration from folk icons like Gillian Welch and indie artists such as Bon Iver, studies the works of Georgia O'Keeffe and
    Banksy, and they spend evenings curating digital collages that blend Southern landscapes with abstract color fields.
  travel: Ellen Bolenbaugh dreams of weekend road trips to Asheville’s craft breweries, day‑long hikes in the Great Smoky Mountains, and a future art‑focused pilgrimage to New York’s MoMA, while they currently
    budget family vacations to Nashville’s music venues and the historic streets of Savannah.
  culinary: Ellen Bolenbaugh enjoys crafting Southern comfort dishes like shrimp and grits with a lemon‑zest twist, perfecting a homemade pimento cheese spread, and experimenting with matcha‑infused latte
    art, though they often neglect to clean their brushes promptly, leaving a subtle watercolor‑like residue on the kitchen counter.
  core: Ellen Bolenbaugh is a meticulous, art‑driven teen who thrives on organized creativity, quietly volunteers in the community, yet habitually procrastinates on school assignments until the final night,
    trading sleep for late‑night sketch sessions.
background:
  cultural: Ellen was born and raised in Murfreesboro, Tennessee, a suburban community in Rutherford County that blends Southern hospitality with a growing local arts scene. Her family is White and rooted
    in middle‑class, church‑oriented traditions typical of the region. The community values close relationships, modesty, and service, shaping Ellen’s cooperative and reliable nature. While she honors Southern
    customs such as family gatherings and community festivals, she actively seeks diverse cultural experiences through music, visual arts, and online communities, reflecting an openness to unconventional
    ideas within a generally traditional environment.
attributes:
  skills: '[''Sketching and drawing'', ''Watercolor painting'', ''Digital illustration (Procreate)'', ''Basic Adobe Photoshop editing'', ''Graphic design using Canva'', ''Project planning and time management'',
