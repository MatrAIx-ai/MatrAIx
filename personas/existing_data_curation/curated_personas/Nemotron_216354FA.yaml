personas:
  professional: A budding little scientist named George Fassett methodically arranges block towers, explores picture books about space with quiet focus, and balances a love for discovery with an orderly
    play area, demonstrating how they blend curiosity with reliability.
  sports: A playground enthusiast named George Fassett spends Saturday mornings at the Little Stars Soccer Club, prefers the quiet of the indoor mini‑field, and proudly wears a miniature Chicago Cubs cap
    while cheering quietly, showing how they balance solitary play with occasional team drills.
  arts: An imaginative illustrator named George Fassett loves to copy the swirling skies of Van Gogh’s 'Starry Night' from a children’s art book, hums along to Sesame Street melodies while coloring, and
    they eagerly visit the local children’s museum’s tactile exhibit, allowing quiet artistic exploration to shape their worldview.
  travel: A curious explorer named George Fassett enjoys short, quiet road trips to new playgrounds, has visited the San Diego Zoo and the historic forts of Williamsburg, and dreams of a gentle beach vacation
    in the Maldives where they can collect shells without crowds.
  culinary: A selective eater named George Fassett adores creamy mac and cheese with a dash of cheddar, delights in banana slices, stubbornly refuses peas and tomatoes, and they help stir pancake batter
    on weekend mornings, showcasing a playful yet picky culinary habit.
  core: George Fassett is a quietly inquisitive four‑year‑old who orders crayons by hue, hoards a pink piggy bank, shuns noisy crowds, but they secretly negotiate bedtime extensions with a practiced grin.
background:
