persona_description: A researcher studying short-term climatic events in icehouse periods and their effects on source to sink systems, focusing on the Aptian events (OAE 1a et 1b) along the Tethyan Margin
  of Tunisia. This individual has a background in facies sedimentology, sequence stratigraphy, clays mineralogy, and geochemistry, and has experience working with field and laboratory data to reconstruct
  the geometry of sediments, characterize and quantify sediment types, define system tracts, and quantify preservation differences. The researcher is proficient in using techniques such as facies sedimentology,
  sequence stratigraphy, clays mineralogy, and geochemistry to understand the effect of short-term climatic events on the sedimentary record and is likely to have a strong interest in palaeoclimatic reconstructions
  and the study of carbonates and evaporites.
