personas:
  professional: Kalishia Heard leads a dynamic Learning and Development function as a Training and Development Manager; they design data‑driven curricula, deliver immersive facilitator sessions, and leverage
    LMS and e‑learning authoring tools, all while balancing a pragmatic love of proven methods with a spontaneous willingness to pivot when business needs shift.
  sports: Kalishia Heard is a dedicated outdoor enthusiast who hikes with the Ozark Trailblazers club, paddles with the Lakefront Paddlers, attends weekly Zumba at FitLife Studios, and cheers for the St.
    Louis Cardinals while also supporting the local Springfield Cyclones soccer team; they value group activity as a way to stay energized and socially connected.
  arts: Kalishia Heard fuels their creative spirit by attending live jazz nights at The Gaslight featuring artists like Gregory Porter, revels in blues sessions with the St. Louis Jazz Orchestra, and dives
    into the soulful lyrics of H.E.R. and the rhythmic grooves of Afro‑beat DJ Sun‑E during community dance events; they often draw inspiration from these performances for both personal expression and workplace
    workshops.
  travel: Kalishia Heard embraces spontaneous road trips across the Midwest, loves weekend escapes to the Blue Ridge Parkway's scenic overlooks, has already explored New Orleans' music districts, and dreams
    of trekking the Inca Trail in Peru; they prefer last‑minute itineraries that leave room for detours and cultural immersion.
  culinary: Kalishia Heard enjoys reimagining classic comfort dishes—spicing up collard greens with quinoa and kale, swapping traditional cornbread for whole‑grain almond flour, and crafting a baked sweet‑potato
    pie with a ginger‑infused crust—while confidently experimenting with flavor‑forward ingredients like smoked paprika and fresh cilantro; they see each meal as a playground for healthier twists on beloved
    flavors.
  core: Kalishia Heard blends a vibrant social energy with a pragmatic curiosity, often sprinting from one community event to the next, occasionally missing deadlines but always landing on their feet with
    a fresh idea or a new recipe; they turn every setback into an opportunity for creative problem‑solving.
background:
  cultural: Kalishia grew up in a close‑knit African‑American family in the Midwest where church, gospel music, and storytelling were central to daily life. Her parents emphasized education, community service,
    and pride in her heritage, values she carries into her professional role. Living in Springfield, she navigates a predominantly white environment while actively engaging with local Black cultural institutions
    such as the Missouri African American Museum and Black History Month celebrations. She participates in community service groups, supports local Black entrepreneurs, and blends the rich traditions of
    African‑American cuisine, music, and resilience with Midwestern values of modesty, neighborliness, and practical problem‑solving.
attributes:
  skills: '[''Instructional Design'', ''Curriculum Development'', ''Adult Learning Theory'', ''Facilitation and Public Speaking'', ''Learning Management System Administration (Cornerstone, SAP SuccessFactors)'',
    ''E‑learning Authoring (Articulate Storyline, Camtasia)'', ''Needs Assessment and Gap Analysis'', ''Project Management (Agile and Waterfall)'', ''Stakeholder Engagement and Relationship Building'',
    ''Data‑Driven Evaluation of Learning Outcomes'', ''Coaching and Mentoring'', ''Conflict Resolution and Mediation'']'
  hobbies: '[''Dancing (R&B, Afro‑beat, Zumba)'', ''Hiking the Ozarks'', ''Kayaking on Table Rock Lake'', ''Community volunteering and mentorship'', ''Reading Black literature'', ''Cooking soul‑food with
    a healthy spin'', ''Attending live music (jazz, blues)'', ''Spontaneous weekend road trips'', ''Board game nights with friends'']'
  career_goals: Kalishia aims to advance to a senior leadership position such as Director of Learning and Development, where she can shape an organization’s enterprise‑wide learning strategy and champion
    inclusive, culturally responsive training programs. She is eager to integrate cutting‑edge technologies like immersive VR and AI‑driven personalized learning pathways. Additionally, she plans to mentor
    emerging Black talent within her company and, long‑term, launch a boutique consultancy that helps mid‑size firms build equitable learning ecosystems.
