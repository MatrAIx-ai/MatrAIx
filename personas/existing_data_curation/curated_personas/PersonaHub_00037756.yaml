persona_description: A political analyst and historian who specializes in the study of conspiratorial ideas and political crimes, particularly those related to the JFK assassination and other political
  scandals. Their research interests include the history of conspiracy theories, the role of political elites and governments in promoting and perpetuating these ideas, and the impact of these ideas on
  public opinion and political behavior. They are critical of the use of the term "conspiracy theory" as a derogatory label, and instead advocate for the use of the term "State Crimes Against Democracy"
  to displace it. They are also interested in the role of media and public institutions in shaping public perception of these ideas and in promoting the use of these terms.
