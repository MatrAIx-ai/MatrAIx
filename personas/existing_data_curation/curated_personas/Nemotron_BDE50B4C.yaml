  career_goals: Phet aims to obtain a certified heavy‑equipment operator credential and complete his GED or vocational certification in equipment maintenance. He envisions advancing to a foreman or site‑supervisor
    role where he can integrate sustainable construction practices and emerging technologies like drones and telematics. Long‑term, he hopes to own a small fleet of equipment and run his own subcontracting
    business, while mentoring younger operators and fostering a culture of safety and innovation on the job site.
