personas:
  professional: Phet Thao, a 24‑year‑old heavy‑equipment operator who expertly maneuvers excavators, bulldozers, and skid steers on busy Louisiana construction sites, blends a meticulous safety mindset
    with a flair for integrating drone‑derived aerial surveys and self‑taught CAD sketches, and they use their curiosity and artistic eye to suggest sustainable workflow improvements and on‑site efficiencies.
  sports: Phet Thao, a 24‑year‑old who follows the New Orleans Saints and Pelicans, trains with the Cajun Bayou Outdoor Club for weekend fishing, hiking, and canoeing excursions in the wetlands, and they
    maintain a flexible fitness routine that combines cardio kayaking with occasional weight‑training at the local gym.
  arts: Phet Thao, a 24‑year‑old sketch artist and landscape photographer inspired by the maritime paintings of Winslow Homer, the black‑and‑white vistas of Ansel Adams, and the Cajun accordion rhythms
    of Clifton Chenier, spends weekends capturing light on construction machinery and playing acoustic guitar to Bob Dylan and traditional folk tunes, and they use their art to unwind and document Louisiana’s
    industrial‑natural juxtaposition.
  travel: Phet Thao, a 24‑year‑old who balances a modest travel budget with a love for both spontaneous fishing trips to the Atchafalaya Basin and carefully planned road trips to New Orleans, Savannah,
    and Acadia National Park, dreams of an overseas photography expedition to the Côte d'Azur to capture Mediterranean light, and they schedule travel around construction off‑season.
  culinary: Phet Thao, a 24‑year‑old who cooks at an intermediate level, frequently whips up Cajun classics like gumbo, jambalaya, and boudin using okra, Andouille sausage, and roux, while experimenting
    with Laotian staples such as laap, sticky rice, and fish sauce infused with kaffir lime leaves, and they often share the fusion dishes at community potlucks.
  core: Phet Thao, a 24‑year‑old heavy‑equipment operator who bridges bulldozers and brushes, trades morning coffee for a sunrise drone flight, and they can’t resist a late‑night gaming session building
    virtual cities, all while juggling a chronic back ache and a borderline obsessive habit of cataloguing every construction site photo in a meticulously labeled folder.
background:
  cultural: Phet is a second‑generation Lao‑American; his parents emigrated from Laos and raised him in a bilingual household where Lao language and Buddhist traditions are honored. He celebrates Lao New
    Year (Pi Mai), attends temple ceremonies, and preserves family recipes such as larb and sticky rice. Growing up in Ponchatoula, Louisiana, he has also embraced the region's Cajun and Creole culture—enjoying
    gumbo, zydeco music, Mardi Gras parades, and swamp tours. This blend of Southeast Asian heritage and Southern Louisiana influences shapes his worldview, fostering both respect for communal values and
    an appreciation for the vibrant, eclectic community around him.
