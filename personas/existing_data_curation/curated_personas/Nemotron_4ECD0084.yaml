  career_goals: In the short term, Derrick aims to earn his EPA certification for HVAC technicians and obtain a journeyman electrician license, positioning himself for supervisory responsibilities on his
    current site. He plans to lead a small maintenance crew, implement energy‑saving initiatives, and pursue an associate degree in facilities management. Long‑term, he aspires to become a maintenance manager
    for a regional manufacturing plant or healthcare facility, where he can shape large‑scale reliability programs and mentor younger workers. Ultimately, he envisions launching his own community‑focused
    repair service that emphasizes sustainability, quick response times, and training opportunities for local youth.
