personas:
  professional: Derrick Larkins, a 26‑year‑old facilities technician, combines a methodical, curiosity‑driven mindset with hands‑on expertise in HVAC, electrical, and plumbing systems, leveraging CMMS tools
    and clear communication to lead preventative maintenance and safety compliance on a manufacturing site, and they are already preparing to supervise a small crew.
  sports: Derrick Larkins plays in the Hartsville Community Center’s Wednesday night basketball league, follows the Carolina Panthers for football season, supports the Carolina Hurricanes in hockey, hikes
    with the local Hartsville Trails Club during summer, emphasizing functional fitness over high‑intensity training, and they treat each hike as a chance to reflect on work challenges.
  arts: Derrick Larkins unwinds with R&B and hip‑hop playlists featuring Anderson .Paak, Kendrick Lamar, and H.E.R., gets lost in science‑fiction novels by Octavia Butler and N.K. Jemisin, enjoys solving
    chess puzzles, occasionally attends regional theater productions of classics like 'A Streetcar Named Desire,' and they often draw inspiration from lyrical storytelling for their DIY projects.
  travel: Derrick Larkins prefers low‑key weekend getaways to nature‑rich destinations such as the Great Smoky Mountains, Asheville’s Blue Ridge Parkway, and a cabin near Lake Hartsville, planning trips
    meticulously while balancing travel costs with a modest budget and a desire for solitude, and they keep a travel journal to capture observations for community presentations.
  culinary: Derrick Larkins cooks Southern comfort dishes like fried chicken with buttermilk brine, shrimp and grits, collard greens seasoned with smoked ham hocks, and peach cobbler, showcasing a solid
    home‑cook skill set and a penchant for experimenting with hot sauce blends, and they often share meals with neighbors after volunteer events.
  core: Derrick Larkins blends disciplined curiosity with community‑driven compassion, channeling methodical maintenance skills into sustainable projects while balancing solitary hobbies and occasional
    tool‑shopping impulse, and they constantly seek ways to help others while fine‑tuning their own craft.
background:
  cultural: Derrick grew up as a Black young adult in the rural South, where his family's church and community gatherings fostered a strong sense of solidarity and mutual aid. He carries the legacy of African‑American
    resilience and Southern hospitality, celebrating traditions like Juneteenth, gospel music, and soul food while also embracing the region's love for outdoor recreation. His cultural identity is shaped
    by a blend of Black heritage—valuing education, mentorship, and community service—and the broader Southern values of respect, perseverance, and a close‑knit neighborhood spirit.
