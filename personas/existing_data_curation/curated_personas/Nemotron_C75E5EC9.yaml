    Asian meat preparation techniques'', ''Bilingual communication (English and Cantonese)'']'
  hobbies: '[''Fishing (solo, local waters)'', ''Woodworking'', ''Knife sharpening and collection'', ''Herb gardening'', ''Tai Chi'', ''Cooking Chinese and Hawaiian fusion dishes'', ''Reading (marine biology,
    food safety)'', ''Watching documentaries on sustainable seafood'', ''Hiking coastal trails'', ''Listening to traditional Chinese and Hawaiian music'']'
  career_goals: He aims to become the lead butcher at his current facility, taking on mentorship of younger apprentices while refining sustainable processing methods. Long‑term, he envisions opening a modest,
    late‑hour stall that offers premium cuts and locally sourced seafood, allowing him to work independently, maintain flexibility, and compete on quality without the constraints of a rigid schedule.
