    volunteer clean-ups'', ''Strategy video games'', ''Classic rock listening'']'
  career_goals: Looking ahead, Troy aims to deepen his expertise in automation and move toward a senior technologist role, eventually earning a Certified Engineering Technician (CET) credential and pursuing
    a master's degree in engineering management. He hopes to lead a small team that designs and implements energy-efficient solutions for local manufacturers, possibly focusing on wind turbine maintenance
    given the regional renewable energy initiatives. While he values career advancement, he also seeks a role that offers flexibility and a supportive environment to manage his stress and maintain work‑life
    balance. He is interested in mentoring newer technicians and contributing to continuous improvement projects that streamline production while preserving a collaborative workplace culture.
