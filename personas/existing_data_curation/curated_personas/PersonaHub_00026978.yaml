persona_description: A conservation biologist who specializes in the study of lake trout, specifically the Northern Refuge in Lake Michigan. Their expertise lies in the rehabilitation of lake trout populations,
  including the assessment of their performance, growth, and mortality rates. They are interested in the natural reproduction of lake trout and the factors that contribute to their success in the Northern
  Refuge. They have conducted surveys to evaluate the performance of adult lake trout and to determine the growth and maturity rates of lake trout in the refuge. They have also analyzed catch curve analyses
  to estimate annual mortality estimates, which they believe are sufficient to allow for a self-sustaining population of lake trout.
