personas:
  professional: Thelton Penn, a 7‑year‑old elementary school class helper, channels their curiosity and compassion into organizing classroom supplies, guiding peers through simple science experiments, and
    mediating play‑time disputes with a relaxed, flexible approach.
  sports: Thelton Penn, a soccer‑loving 7‑year‑old, plays weekly in the neighborhood youth league, proudly dons a jersey of the local junior soccer club the Riverdale Rovers, and cheers for the Chicago
    Cubs while sprinting on the playground.
  arts: Thelton Penn, a budding cartoonist, fills sketchbooks with whimsical animal drawings inspired by Eric Carle’s “The Very Hungry Caterpillar,” enjoys sing‑along sessions with The Wiggles, and experiments
    with a beginner’s recorder to create off‑beat melodies.
  travel: Thelton Penn, a curious explorer, has trekked through the nearby state forest collecting bugs and leaves, loved a family road trip to the national park’s junior ranger program, and dreams of visiting
    the giant dinosaur fossils at the Museum of Natural History in Washington, D.C.
  culinary: Thelton Penn, a picky but adventurous eater, delights in cheesy macaroni, chicken nuggets with honey mustard, and crunchy carrot sticks, often asks to help stir the sauce and proudly garnishes
    plates with extra shredded cheddar.
  core: Thelton Penn, a 7‑year‑old bundle of curiosity and kindness, jumps from LEGO builds to bug hunts, forgets to tidy up their room, and hums off‑key recorder tunes while always lending a hand.
background:
  cultural: Thelton grows up in a close‑knit, predominantly white community in Lincoln, Arkansas, where Southern hospitality and family values are central. His family regularly participates in local church
    gatherings, county fair events, and neighborhood service projects such as clean‑ups. He is familiar with traditional Arkansas customs like homemade barbecue, church potluck meals, and listening to country
    and bluegrass music. These cultural influences nurture his cooperative nature and strong sense of community responsibility.
attributes:
  skills: '[''Reading comprehension (grade 2 level)'', ''Basic addition and subtraction'', ''LEGO construction'', ''Simple woodworking (birdhouse assembly)'', ''Peer mediation and empathy'', ''Basic tablet
    navigation'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Cartoon drawing'', ''Nature exploration (bug and leaf collecting)'', ''Reading wildlife books'', ''Helping with household chores'', ''Tag and other group games'',
    ''Beginner recorder music'']'
  career_goals: Thelton dreams of becoming a community helper who can combine his love for people, animals, and hands‑on projects. He aspires to work as a veterinarian to care for animals and also imagines
    one day serving as a firefighter who protects his neighbors. In the near term, he aims to improve his schoolwork, learn more about wildlife, and develop his building skills so he can eventually pursue
    a career in environmental science or engineering.
