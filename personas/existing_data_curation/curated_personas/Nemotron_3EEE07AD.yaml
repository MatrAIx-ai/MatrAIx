personas:
  professional: Joanne Awad, a budding junior coder, merges her love for structured experiments with creative problem‑solving by building Scratch games and tinkering with Python scripts, all while keeping
    meticulous lab‑style notebooks that reflect their balance of curiosity and practicality.
  sports: Joanne Awad enjoys hiking the San Gabriel Mountains on weekends with a small group of friends, follows the Los Angeles Lakers and the LA Galaxy for inspiration, and participates in school’s cross‑country
    club where they balance endurance training with a preference for low‑key, structured workouts.
  arts: Joanne Awad spends afternoons at the piano practicing Debussy’s Clair de Lune and Beethoven’s Moonlight Sonata, draws detailed nature sketches inspired by John James Audubon, and eagerly reads fantasy
    series by Sarah J. Maas and Brandon Sanderson, while also following musicians like Mitski and the indie band Tame Impala for creative fuel.
  travel: Joanne Awad loves short, purposeful trips, planning weekend hikes in the San Gabriel Mountains with a detailed checklist, and dreams of visiting the Grand Canyon and Kyoto’s Arashiyama bamboo
    forest, balancing a modest family budget with a desire for immersive, low‑crowd experiences, though they sometimes postpone longer trips to save for the next gaming console.
  culinary: Joanne Awad prefers simple, hands‑on cooking, whipping up homemade ramen with miso, soy sauce, and fresh noodles, crafting avocado toast with a sprinkle of chili flakes, and experimenting with
    fruit‑infused water, while their favorite snack remains a crunchy, cinnamon‑sugar churro‑like pastry from a local bakery, though they often skip breakfast when engrossed in a new experiment.
  core: Joanne Awad is a methodical, curiosity‑driven 12‑year‑old who balances solitary scientific tinkering with creative arts, meticulously logs every experiment, but often forgets to clean their desk
    before starting a new project.
background:
  cultural: Joanne is raised in a middle‑class, predominantly white family in Glendora, a suburban city within Los Angeles County, California. Her family celebrates traditional American holidays and places
    a high value on education, community involvement, and outdoor recreation common to Southern California, such as hiking and beach outings. While her immediate cultural environment reflects typical suburban
    American customs, growing up in a diverse county has exposed Joanne to a variety of cultural perspectives through school programs, community events, and interactions with peers from many backgrounds,
    fostering an openness to different ideas while maintaining her family's own traditions.
