  career_goals: Joanne aspires to pursue a career in STEM, aiming to become a research scientist who focuses on environmental sustainability and climate solutions. She envisions attending a university with
    strong science and engineering programs, where she can deepen her knowledge in ecology, renewable energy, or biotechnology. Her long‑term ambition is to develop practical technologies that protect natural
    ecosystems while also considering community impact. Joanne also entertains the idea of studying veterinary medicine, reflecting her compassionate nature toward animals.
