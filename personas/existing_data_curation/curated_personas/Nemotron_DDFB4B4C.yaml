personas:
  professional: Debra Sullivan, a veteran community organizer and volunteer coordinator, channels thirty years of church event logistics and meticulous budgeting into running senior‑center programs, quilting
    workshops, and local heritage festivals, with a practical, structure‑loving approach that includes double‑checking every detail due to occasional worries.
  sports: Debra Sullivan enjoys daily walks with their Labrador through the neighborhood park, participates in the Lamar County River Trail Walking Club’s weekly strolls along the river, is a devoted fan
    of the Alabama Crimson Tide football team—never missing a game broadcast on Sundays—joins the senior center’s shuffleboard league, and cheers on the nearby high‑school basketball team during Friday
    night matches.
  arts: Debra Sullivan finds comfort in singing gospel hymns by Mahalia Jackson, The Blind Boys of Alabama, and The Winans with their church choir, dedicates afternoons to quilting inspired by traditional
    geometric patterns, frequently reads historical fiction novels by Ken Follett and Bernard Cornwell, and attends seasonal performances at the local community theater where classic dramas are staged.
  travel: Debra Sullivan prefers short, well‑planned road trips that blend relaxation and heritage, having visited the historic district of Charleston, South Carolina, the Blue Ridge Parkway near Asheville,
    North Carolina, and a beloved family cabin in the Tennessee mountains, while dreaming of a leisurely tour of Washington, D.C.’s museums, though health considerations and a limited budget keep most travel
    within a day‑long drive radius.
  culinary: Debra Sullivan’s kitchen is famed for buttermilk fried chicken, slow‑cooked collard greens seasoned with smoked turkey, peach cobbler made with fresh orchard peaches, and homemade biscuits slathered
    with honey butter, and they love using garden‑fresh tomatoes in savory sauces, preserving sweet pickles in mason jars, and baking pecan pies for church fundraisers.
  core: Debra Sullivan blends a lifelong devotion to community, meticulous organization, and a love of quilting, prayerful singing, and home‑cooked meals, while a quiet undercurrent of worry and a stubborn
    habit of double‑checking keeps life predictably comforting yet occasionally tense.
background:
  cultural: Debra was raised in a small town in Lamar County, Alabama, within a devout Southern Baptist family that emphasized faith, community, and self‑reliance. Her upbringing reflects the post‑World
    War II Southern lifestyle, with strong ties to church, family gatherings, and regional traditions such as Southern hospitality and home‑cooked meals. She has witnessed the social changes of the 1960s
    while preserving the values of modesty, respect, and a deep sense of duty to family and neighbors. These cultural influences shape her daily routines, charitable involvement, and commitment to preserving
    local heritage.
