persona_description: A postdoctoral fellow for sustainability in innovation at the Chemical Heritage Foundation in Philadelphia, Benjamin Gross is an expert in the history and development of telecommunications,
  consumer electronics, and the rise of information age. He has a keen eye for detail and a deep understanding of the complex processes involved in the construction and use of magnetic memory arrays, which
  he can see through careful observation of the artifacts on display at the Sarnoff Exhibition at the College of New Jersey. Gross is also a curator and consultant for the exhibition, which traces the history
  of telecommunications from the invention of radio to the dawn of information age. He is a person who appreciates the significance of artifacts in history and is interested in the ways in which they can
  be used to understand and interpret the past.
