  hobbies: '[''Chess'', ''Long-Distance Running'', ''Strength Training'', ''Cooking Uruguayan Cuisine'', ''Hosting Dinner Gatherings'', ''Education & Leadership Podcasts'', ''Reading Nonfiction (Cognitive
    Science)'', ''DIY Home Improvement'']'
  career_goals: Seth aims to transition from classroom teaching to a district-level instructional leadership role. Over the next five years he plans to earn a master’s degree in Educational Leadership and
    obtain certification as an instructional coach. His ambition is to become a curriculum coordinator where he can shape a data-informed, bilingual STEM program across multiple schools in Harris County.
    He also hopes to publish a practical guide on classroom management for teachers working with multilingual populations, and to mentor a cohort of emerging educators, leveraging his competitive nature
    to raise overall instructional quality.
