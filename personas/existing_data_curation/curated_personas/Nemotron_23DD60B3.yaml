  career_goals: At 75, Elizabeth’s ambitions center on staying purposeful and engaged. She aims to expand her volunteer leadership by establishing a local intergenerational mentorship program that pairs
    senior volunteers with high‑school students interested in history and gardening. She also plans to compile and self‑publish a family memoir that weaves together her genealogical findings with oral histories,
    learning advanced digital publishing tools in the process. Maintaining personal health and independence is a parallel goal, so she intends to complete a senior‑focused fitness certification to guide
    peers in safe exercise routines.
