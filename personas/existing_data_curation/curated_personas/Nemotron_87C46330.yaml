personas:
  professional: Brian Chung, a meticulous facilities maintenance specialist with expertise in green cleaning, floor care, and first‑line troubleshooting, leverages their methodical planning and culturally
    attuned communication to train staff, coordinate schedules, and serve as a bridge between building management and the local tribal community, all while pursuing Certified Janitorial Professional certification
    and a supervisory role.
  sports: Brian Chung enjoys weekend fishing on the Fox River, hiking the Kettle Moraine trails with the local Fox River Anglers club, follows the Green Bay Packers and Milwaukee Brewers avidly, and sponsors
    a community softball team that plays at the county park, balancing low‑impact outdoor activity with occasional participation in a recreational adult soccer league.
  arts: Brian Chung nurtures creative expression through traditional basket weaving, drumming at powwows, and a love of folk music, regularly listening to R. Carlos Nakai, John McCutcheon, and Susan Aglukark
    while also enjoying the storytelling performances of the local theater troupe and the paintings of contemporary artist Shane Gould.
  travel: Brian Chung prefers nature‑focused trips and carefully plans each outing, having explored Door County’s lighthouses, trekked the Apostle Islands’ sea caves, taken a road‑trip to Sedona’s red rocks
    for a spiritual retreat, and dreaming of a future visit to New Zealand’s South Island to fish for trout, all while balancing vacation costs with their goal of saving for a business launch.
  culinary: Brian Chung enjoys cooking hearty, sustainable meals, often preparing wild‑rice soup with locally harvested mushrooms, pan‑seared walleye seasoned with lemon zest and dill, and a corn‑bean‑squash
    succotash that honors the traditional "three sisters" planting, while experimenting with smoked paprika, fresh thyme, and homemade corn tortillas on weekends.
  core: Brian Chung blends meticulous facility expertise with a deep respect for land and community, channeling curiosity into sustainable practices while wrestling with anxiety that fuels both a drive
    for excellence and occasional impulsive fishing splurges.
background:
  cultural: Brian is a member of the Oneida Nation of Wisconsin, raised in a bicultural environment that honors both modern American life and traditional Oneida customs. He grew up hearing oral histories,
    participating in seasonal harvest festivals, and learning the Oneida language from elders. Respect for the land, communal responsibility, and storytelling are core to his identity, and he frequently
    volunteers at tribal events, helping organize ceremonies and serve as a cultural bridge between his workplace and the community.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (stripping, waxing, buffing)'', ''Restroom sanitation'', ''Safety compliance (OSHA)'', ''Inventory management'', ''Green cleaning techniques'', ''Minor
    repairs (plumbing, electrical, HVAC)'', ''Team coordination'', ''Customer service'', ''Cultural liaison'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Gardening'', ''Traditional basket weaving'', ''Powwow drumming'', ''Cooking Oneida recipes'', ''DIY home repairs'', ''Reading Native American history'']'
  career_goals: Brian aims to earn a Certified Janitorial Professional credential and advance to a facilities supervisor role within the next three years, preferably overseeing a tribal community center
    or a school in Outagamie County. He dreams of launching a small, employee‑owned cleaning business that prioritizes sustainable practices and hires fellow Oneida members, providing steady income for
    local families. Additionally, he wants to mentor newer workers, sharing his safety knowledge and cultural values while securing a more stable financial future for his own family.
