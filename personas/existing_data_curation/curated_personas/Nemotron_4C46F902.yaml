  career_goals: Baraah dreams of attending a specialized arts‑focused high school where he can deepen his skills in concept art and visual storytelling. His long‑term ambition is to become a concept artist
    or visual developer for video games and animated films, blending his love for abstract ideas with cutting‑edge digital tools. He also hopes to explore scientific illustration, using art to communicate
    complex concepts. Ultimately, he aims to study at a university with a strong interdisciplinary program that unites art, technology, and narrative design, and to contribute to collaborative creative
    projects that emphasize teamwork and community impact.
