personas:
  professional: Baraah Kirton, an aspiring fantasy illustrator and narrative architect, merges meticulous sketching with vivid storytelling, using their high imagination and organized work ethic to produce
    detailed character designs for school art projects and personal blog commissions.
  sports: Baraah Kirton, a midfield enthusiast on the Putnam County Middle School soccer team, follows the New York Knicks and enjoys weekend hikes with the local nature club, preferring low‑key, collaborative
    activity over competitive sports.
  arts: Baraah Kirton draws creative fuel from the whimsical worlds of Hayao Miyazaki, the epic lore of J.R.R. Tolkien, and the intricate fingerpicking of Andy McKee, weaving these influences into fantasy
    sketches, blog poetry, and acoustic guitar sessions.
  travel: Baraah Kirton plans meticulously for weekend escapes to scenic spots like the Adirondack Mountains and dreams of a cultural immersion trip to Kyoto, balancing a budget‑conscious approach with
    a love for sunrise photography and quiet contemplation.
  culinary: Baraah Kirton enjoys crafting homemade pepperoni pizza and experimenting with spicy ramen bowls, favoring fresh basil, mozzarella, and miso paste, though they often over‑season their dishes
    in an enthusiastic quest for bold flavor.
  core: Baraah Kirton is a quiet, imagination‑driven teen who transforms everyday moments into elaborate fantasy realms, yet habitually leaves their desk a chaotic canvas of stray LEGO bricks, sketch pads,
    and half‑finished guitar tabs.
background:
  cultural: Baraah grew up in Greencastle, IN, a small Midwestern community with deep ties to family, church, and local gatherings. His family’s background blends modest farm‑stead living with a small‑business
    ethos, common among white families in Putnam County. The town’s culture emphasizes humility, cooperation, and a strong sense of community, which is reflected in his considerate nature and preference
    for small, supportive groups. Local institutions, such as the public library’s youth programs, community theater, and county fairs, have provided venues for his artistic exploration and reinforced Midwestern
    values of hard work, reliability, and respect for tradition while still encouraging curiosity and creativity.
