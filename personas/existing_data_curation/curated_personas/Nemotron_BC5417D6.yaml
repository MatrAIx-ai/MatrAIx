    and artists'']'
  hobbies: '[''Anatomical sketching and medical illustration'', ''Landscape and sunrise photography'', ''Classical piano playing'', ''Science‑fiction and philosophy reading'', ''Coastal hiking and trail
    walking'', ''Yoga and meditation'', ''Succulent gardening'', ''Gourmet cooking (Mediterranean cuisine)'', ''Volunteer surgical teaching workshops'', ''Visiting art museums and galleries'']'
  career_goals: Robert aims to develop a groundbreaking minimally invasive technique for pancreatic surgery that integrates AI‑driven imaging and patient‑specific 3D‑printed guides. He plans to publish
    a seminal textbook that bridges surgical science with visual art, fostering a more humane approach to operative care. By his early 60s, he hopes to assume a leadership role as chair of his hospital's
    surgery department or as a residency program director, shaping curricula to emphasize creativity, wellness, and interdisciplinary problem‑solving. He is committed to mentoring junior surgeons, expanding
    volunteer surgical missions in underserved regions, and advocating for physician mental‑health initiatives within professional societies.
