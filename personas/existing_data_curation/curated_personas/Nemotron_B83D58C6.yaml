personas:
  professional: Henry Vig, a seasoned advertising sales agent in central Texas, leverages disciplined organization, consultative selling, and data‑driven campaign strategy to win multimillion‑dollar accounts
    while balancing a curiosity for digital innovation with a firm grounding in traditional media, and they consistently apply a meticulous, achievement‑focused mindset to every client meeting.
  sports: Henry Vig, an avid participant in the local Waco Hoops basketball league and a regular hiker with the Hill Country Hikers club, fuels their fitness by tackling weekend trail runs, cheering on
    the Baylor Bears football team, and keeping an eye on the Dallas Cowboys and Texas Rangers during the offseason.
  arts: Henry Vig, a classic‑rock vinyl collector devoted to Led Zeppelin, The Rolling Stones, and Fleetwood Mac, channels their creative energy into small woodworking pieces that echo Texas’ rustic craftsmanship,
    and frequently winds down by watching Tom Hanks films or attending Baylor’s theater productions of classic dramas.
  travel: Henry Vig, who prefers meticulously planned road trips that blend adventure with comfortable stops, frequently escapes to Hill Country vineyards and weekend getaways in Austin, enjoys an annual
    pilgrimage to the New Orleans Jazz & Heritage Festival, and dreams of driving the Pacific Coast Highway to explore the coastal towns of California, all while carefully budgeting each journey to align
    with their financial goals.
  culinary: Henry Vig, a competent backyard grill master, relishes slow‑smoked Texas brisket rubbed with paprika, brown sugar, and chili powder, charcoal‑seared St. Louis‑style pork ribs finished with a
    mesquite‑infused glaze, and pairs their meals with homemade coleslaw, jalapeño cornbread, and a craft beer from local breweries like Friendly Stone, while occasionally over‑salting the sauce in their
    eagerness to impress friends.
  core: Henry Vig, a data‑driven ad strategist who balances a love for vintage rock vinyl with an obsessive spreadsheet habit, channels their high‑stress energy into nightly journaling but occasionally
    overcooks their barbecue, leaving a lingering scent of burnt brisket that reminds them of their relentless pursuit of perfection.
background:
  cultural: Henry was born and raised in central Texas, reflecting a blend of Southern hospitality and the independent, entrepreneurial spirit typical of the region. His family background is predominantly
    Anglo‑American with German and Irish ancestry, fostering values of hard work, community involvement, and respect for tradition. He embraces local customs such as weekend football rituals, neighborhood
    barbecues, and participation in community events, while also appreciating the modern, diverse influences present in Waco's growing cultural scene.
attributes:
  skills: '[''Consultative selling'', ''Media planning and buying (TV, radio, print)'', ''Digital advertising platforms (Google Ads, Meta Ads, programmatic)'', ''Client relationship management'', ''CRM
    software (Salesforce)'', ''Data analytics and campaign reporting'', ''Negotiation and contract drafting'', ''Public speaking and presentations'', ''Project management'', ''Team collaboration'']'
  hobbies: '[''Recreational basketball league'', ''Hill Country hiking'', ''Barbecue grilling'', ''Baylor Bears football games'', ''Classic rock music listening'', ''Vinyl record collecting'', ''Marketing
    podcasts and business books'', ''Journaling for stress management'', ''Volunteer work at food bank'', ''Woodworking'']'
  career_goals: Henry aims to advance into a senior account director role where he can lead a regional sales team and manage high‑profile, multi‑channel advertising accounts. He seeks to deepen his expertise
    in data‑driven digital marketing while maintaining strong ties to traditional media. Long‑term, he aspires to launch his own boutique advertising agency focused on serving local Texas businesses, leveraging
    his disciplined execution style and extensive network to become a recognized leader in the regional market.
