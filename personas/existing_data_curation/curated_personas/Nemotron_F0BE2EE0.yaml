  hobbies: '[''Cooking traditional Chinese dishes'', ''Gardening (vegetables and herbs)'', ''Knitting and crocheting'', ''Reading Chinese literature and historical novels'', ''Attending community cultural
    festivals'', ''Practicing tai chi'', ''Watching TV dramas'', ''Listening to traditional music'']'
  career_goals: Although she is not currently in the workforce, Mai aims to deepen her home‑management expertise and eventually start a modest home‑based catering service that showcases traditional Chinese
    recipes. She also plans to obtain certified caregiver training to better assist aging relatives and to become a trusted organizer for her local Chinese community center, where she can mentor younger
    women and lead cultural celebrations.
