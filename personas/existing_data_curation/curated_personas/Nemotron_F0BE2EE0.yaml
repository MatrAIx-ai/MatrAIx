personas:
  professional: Mai Yan, a seasoned home‑management specialist and aspiring community event organizer, leverages meticulous budgeting, a diverse cooking repertoire, and hands‑on DIY skills to streamline
    household operations and plan cultural gatherings, yet their love of routine sometimes clashes with occasional disorganization and a skeptical mindset that makes them double‑check every detail before
    committing.
  sports: Mai Yan, a devoted tai chi practitioner with the Seattle Tai Chi Association, enjoys cheering on the Seattle Seahawks during football season, participates in a senior softball league at the local
    community center, and treats gardening as a low‑impact form of exercise, embracing a relaxed yet steady commitment to fitness.
  arts: Mai Yan, a fervent fan of period dramas starring Chow Yun‑fat and Gong Li, regularly listens to Teresa Teng’s nostalgic ballads and the classical cello works of Yo‑Yo Ma, and immerses themselves
    in historical novels by Jin Yong, allowing these artistic choices to reinforce a reverence for tradition and storytelling.
  travel: Mai Yan, who favors well‑planned trips over spontaneous getaways, has explored the historic temples of Kyoto, spent tranquil weekends at West Lake, and dreams of a leisurely retreat in the Swiss
    Alps, balancing these travel aspirations with family budget constraints and caregiving responsibilities.
  culinary: Mai Yan, an experienced home chef, delights in crafting braised pork belly flavored with star anise and five‑spice, sweet‑and‑sour orange chicken, and classic American pot roast, sourcing fresh
    basil, cilantro, and mint from their own garden, while meticulously refining each recipe for a planned catering menu, though they sometimes over‑season dishes in pursuit of an elusive family flavor
    memory.
  core: Mai Yan blends disciplined home‑management with a love for tradition, channels a competitive streak into modest catering ambitions, yet wrestles with chronic worry and occasional disorganization
    that color daily choices.
background:
  cultural: Mai is a second‑generation Chinese‑American who grew up in a household that values Confucian principles, family hierarchy, and practical thrift. She celebrates Lunar New Year, the Mid‑Autumn
    Festival, and other traditional observances while navigating life in Chicago’s vibrant Chinatown. Her cultural identity blends respect for tradition with everyday American life, shaping her routines,
    food preferences, language use, and involvement in local cultural associations.
attributes:
  skills: '[''Meal planning and cooking (Chinese and American cuisine)'', ''Household budgeting and financial management'', ''Family caregiving and support'', ''Basic computer literacy (email, online banking)'',
