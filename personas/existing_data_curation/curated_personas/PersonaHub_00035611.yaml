persona_description: A political scientist who specializes in the study of Puerto Rican politics and the political status of the island. They have conducted research on the outcomes of plebiscites related
  to Puerto Rico's political status and the role of nationalism in shaping these outcomes. They are knowledgeable in the frameworks of economics, ideological nationalisms, and moral politics and have analyzed
  these frameworks through the lens of the Puerto Rican question. They have a deep understanding of the complexities of the Puerto Rican political landscape and are skilled in interpreting the outcomes
  of plebiscites on political status.
