    technicians'']'
  hobbies: '[''Backyard gardening'', ''Cooking traditional Mexican cuisine'', ''Recreational fishing'', ''Attending Catholic Mass and parish service'', ''Reading technical journals'', ''Reading classic
    mystery novels'']'
  career_goals: Adams aims to transition from a senior engineering role to a supervisory position where he can lead a team of electricians and engineers in delivering reliable, routine‑focused infrastructure
    projects. He plans to obtain his Professional Engineer (PE) license within the next two years to formalize his technical authority and to qualify for higher‑level project management responsibilities.
    In the medium term, he envisions establishing his own boutique electrical‑contracting firm that specializes in preventative maintenance contracts for schools and small‑business complexes in Orange County,
    leveraging his reputation for reliability and methodical delivery. He also hopes to mentor the next generation of Mexican‑American engineers through local community college programs and industry outreach.
