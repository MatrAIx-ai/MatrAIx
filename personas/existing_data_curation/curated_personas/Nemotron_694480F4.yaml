personas:
  professional: Adams Mora is a senior electrical and electronics engineer in Southern California who leverages two decades of hands‑on experience in power distribution, PLC programming, and NEC compliance
    to build methodical, preventive‑maintenance‑focused infrastructure projects, and they are known for meticulous documentation, reliable emergency response, and mentoring junior technicians.
  sports: Adams Mora is an avid recreational fisherman who frequents the Pacific coast and local reservoirs with the Orange County Anglers Club, and they cheer for the Los Angeles Dodgers and the Los Angeles
    Chargers while coaching their middle‑schooler’s soccer team on Saturdays.
  arts: Adams Mora enjoys immersing themselves in classic mystery novels such as Agatha Christie’s “Murder on the Orient Express,” listening to the guitar work of Carlos Santana, and attending the annual
    community art fair where they admire folk paintings that echo the colors of their garden’s harvest.
  travel: Adams Mora prefers meticulously planned road trips that blend fishing excursions to Monterey Bay, family visits to the historic Mission San Juan Capistrano, and short cultural tours of Santa Fe,
    balancing a love of routine with a desire for occasional new scenery.
  culinary: Adams Mora delights in preparing family‑style dishes like mole with dark chocolate, chilies, and spices, as well as tamales wrapped in corn husks, often using fresh vegetables from their backyard
    garden such as tomatoes, zucchini, and bell peppers, and they consider the kitchen a collaborative space for tradition and precision.
  core: Adams Mora is a methodical engineer and family focal point who blends routine‑driven work, gardening, fishing, and faithful cooking of time‑honored recipes into a life that values reliability, planning,
    and steady progress toward entrepreneurial goals.
background:
  cultural: Adams Garcia Mora grew up in a bilingual, Mexican‑American household in Southern California, where family, Catholic faith, and community celebrations were central. He speaks fluent Spanish and
    English, and he maintains close ties with extended family who regularly gather for holidays such as Día de los Muertos and Cinco de Mayo. His upbringing emphasized respect for tradition, hard work,
    and practical problem‑solving—values that continue to shape his professional ethic. He participates in local Mexican cultural festivals in Santa Ana, supports neighborhood youth programs, and enjoys
    passing down culinary customs to his children, blending his Mexican heritage with the multicultural fabric of Orange County.
attributes:
  skills: '[''Power distribution design'', ''PLC programming (Allen‑Bradley, Siemens)'', ''Motor‑control circuit troubleshooting'', ''NEC & California Building Code compliance'', ''Preventive maintenance
