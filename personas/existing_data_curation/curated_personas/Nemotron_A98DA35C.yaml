  career_goals: Axel aims to progress to a Director of Operations role within a technology‑driven manufacturing firm, spearheading large‑scale digital transformation initiatives. He plans to pursue an MBA
    in the next two to three years to complement his technical background with advanced business acumen. He is passionate about mentoring emerging engineers and managers, fostering a culture of continuous
    improvement. Long‑term, he envisions launching his own consultancy focused on process optimization for small‑to‑medium enterprises across the Southeast, while maintaining a healthy work‑life balance
    to support his family and cultural commitments.
