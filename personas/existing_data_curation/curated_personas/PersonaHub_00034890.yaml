persona_description: A sailor who embarked on a voyage to explore and chart new territories, particularly in the southern hemisphere. This person has a keen interest in geography, navigation, and cartography.
  They are skilled at reading and interpreting charts and maps, and are experienced in navigating through unfamiliar waters. They have a strong sense of direction and can navigate using celestial navigation.
  They are also skilled in land surveying and can accurately measure distances and directions using a sextant. They have a deep understanding of the climate and weather patterns in the southern hemisphere,
  and can use this knowledge to plan and execute successful voyages.
