  hobbies: '["Classic car restoration", "Model truck building", "Fishing on the James River", "Hiking in Shenandoah National Park", "Attending country and bluegrass concerts", "Community barbecues", "Reading
    automotive repair manuals", "Gym workouts", "Volunteering at local food bank"]'
  career_goals: Jason aims to advance from a driver‑sales role to a supervisory position within the next five years, targeting a fleet manager or logistics coordinator role where he can oversee scheduling,
    safety programs, and driver mentorship. He plans to obtain advanced certifications such as the Certified Transportation Professional (CTP) and a HazMat endorsement to broaden his qualifications. Long‑term,
    he envisions launching his own small trucking operation focused on local deliveries in the Richmond area, emphasizing reliable service, driver development, and environmentally conscious routing.
