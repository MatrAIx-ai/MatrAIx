personas:
  professional: Jason Rice, a 24‑year‑old CDL‑licensed professional driver, blends a safety‑first mindset, meticulous GPS route planning, and punctual record‑keeping with sales negotiations and client service,
    and they consistently deliver freight on time while staying organized, reliable, and focused on practical outcomes.
  sports: Jason Rice, an avid outdoorsman, spends weekends fishing the James River and hiking Shenandoah trails, cheers on the Washington Commanders and the Richmond Kickers, and they run with a local 5K
    club to maintain fitness, balancing team loyalty with personal adventure.
  arts: Jason Rice, who finds relaxation at country‑and‑bluegrass gigs featuring Sturgill Simpson and Molly Tuttle and enjoys spinning 70s classic rock vinyl in their garage, and they often pair music listening
    with restoring the sound system of their classic cars, reflecting their love for hands‑on creativity and community cultural events.
  travel: Jason Rice, who prefers short, well‑planned road trips that combine scenic drives and hands‑on experiences, has taken a weekend drive to Asheville, NC for a car show and dreams of a cross‑country
    Route 66 tour, and they balance their love of predictable routes with occasional spontaneous detours to historic towns.
  culinary: Jason Rice, a self‑taught grill enthusiast, regularly prepares smoked pulled pork, Old Bay‑seasoned catfish, and Virginia ham, experiments with a homemade BBQ rub of brown sugar, paprika, and
    coffee grounds, and they enjoy crafting hearty chili and pairing meals with sweet tea.
  core: Jason Rice, a structure‑oriented 24‑year‑old driver‑sales professional, merges practical efficiency with a hobbyist’s passion for classic cars, community service, and a steady, budget‑focused lifestyle
    punctuated by occasional impulsive upgrades, and they keep a tidy calendar to balance work and personal projects.
background:
  cultural: Jason grew up in a working‑class family in Chesterfield County, Virginia, where Southern hospitality and community values are central. His upbringing emphasized hard work, self‑reliance, and
    teamwork, reflected in local high school football culture and family gatherings centered around barbecues and country music. While largely raised in a predominantly White, middle‑American environment,
    he has been exposed to the diverse cultural fabric of nearby Richmond, fostering an appreciation for the region’s varied traditions and a respectful attitude toward different backgrounds.
attributes:
  skills: '["Commercial Driver''s License (CDL)", "Safe Driving and DOT Compliance", "Route Planning and GPS Navigation", "Vehicle Maintenance and Basic Repairs", "Load Securement and Inspection", "Customer
