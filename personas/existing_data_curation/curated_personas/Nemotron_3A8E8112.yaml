  hobbies: '[''drawing'', ''LEGO building'', ''reading adventure books'', ''soccer'', ''nature exploration'', ''school theater'', ''simple science experiments'', ''learning recorder'']'
  career_goals: Daniel dreams of a future where he can explore the unknown and create beauty. He imagines becoming an astronaut who travels to distant planets, an artist who paints large murals for his
    community, a scientist-inventor who designs helpful gadgets, or a teacher who shares his love of curiosity with younger kids. He also feels a strong desire to help animals as a veterinarian. Whatever
    path he chooses, he wants to combine his love of art, science, and kindness to make a positive difference.
