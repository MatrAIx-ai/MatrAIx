  career_goals: Looking ahead, Liz aims to achieve a senior managerial role within an audit firm or transition into a chief financial officer position at a mid‑size enterprise. She plans to deepen her expertise
    in data analytics and digital transformation, pursuing certifications in data science and blockchain for finance. Liz also intends to obtain the CPA license (if not already) and eventually seek partnership
    in her firm, where she can shape firm strategy and mentor junior staff. Her competitive drive fuels a desire to lead high‑impact audit engagements that integrate technology for greater insight. Beyond
    corporate advancement, Liz wishes to leverage her professional platform to launch community‑focused financial‑literacy workshops that empower Puerto Rican families in Orlando.
