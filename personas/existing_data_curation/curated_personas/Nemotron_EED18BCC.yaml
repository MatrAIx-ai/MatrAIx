personas:
  professional: A CPA‑qualified accountant named Liz Ferino leverages five years in public accounting and three years in corporate finance to design data‑driven audit plans, wield advanced Excel, Power BI,
    and SAP, while their bilingual fluency and skeptical eye keep engagements both rigorous and culturally attuned, positioning them for senior managerial or CFO roles.
  sports: Liz Ferino fuels their fitness routine with dawn runs along Lake Eola, weekly yoga, and membership in the Orlando Runners Club, while they cheer for the Orlando Magic and Orlando City SC and occasionally
    join a co‑ed soccer league in the winter, balancing competitive drive with a love for community sport.
  arts: Liz Ferino channels their creative energy into salsa dancing at local Latin nights, photographing Orlando’s skyline with a Canon EOS 5D, and devouring mystery novels by Agatha Christie and Gillian
    Flynn, while they also enjoy the music of Celia Cruz and the modern jazz of Brad Mehldau, weaving cultural rhythm into everyday life.
  travel: Liz Ferino plans trips with a blend of pre‑booked flights to Puerto Rico, Barcelona, and New York and spontaneous weekend getaways to Key West, navigating a moderate travel budget while honoring
    family commitments, and they favor cultural immersion over luxury, often staying in boutique guesthouses that showcase local art.
  culinary: Liz Ferino cooks traditional dishes such as mofongo, arroz con gandules, and plantain‑based empanadas, expertly seasoning with sofrito, adobo, and achiote, while they also experiment with modern
    twists like quinoa‑stuffed plantain boats, showcasing a high‑level home chef skill set that blends heritage flavors with contemporary health trends.
  core: Liz Ferino blends rigorous accounting expertise, data‑driven financial habits, a love for salsa and photography, and a proactive yet occasionally skeptical approach to health, navigating a competitive
    career while staying rooted in community‑focused cultural traditions and a habit of solving crossword puzzles during lunch breaks.
background:
  cultural: Liz Ferino identifies as a second‑generation Puerto Rican American, born and raised in Orlando’s vibrant Orange County community. Fluent in both English and Spanish, she grew up in a bilingual
    household where family gatherings were centered around music, food, and stories from the island. The cultural emphasis on hard work, resilience, and close‑knit community shaped her professional ethic
    and her competitive spirit. She participates in local celebrations such as the Puerto Rican Day Parade and Noche de San Juan, often volunteering to organize cultural events that highlight the island’s
    heritage. Religious traditions, especially Catholic observances like Three Kings Day, remain part of her family’s calendar. Liz’s connection to Puerto Rico is reinforced through frequent trips to visit
    relatives, where she immerses herself in the island’s landscapes and culinary traditions. This dual cultural identity informs her approach to teamwork, communication, and community engagement, blending
    a strong sense of pride in her heritage with the broader American professional landscape.
