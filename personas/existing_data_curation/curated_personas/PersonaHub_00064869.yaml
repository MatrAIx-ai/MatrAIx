persona_description: A maritime lawyer who specializes in the interpretation and application of international maritime law, particularly the Hague Rules and their amendments. He is well-versed in the principles
  of privity of contract, the doctrine of estoppel, and the limitations of liability in maritime law. His expertise includes the analysis of the effects of protective clauses in bills of lading and the
  interpretation of the new monetary limits allowed under the Hague-Visby Rules. He has a keen interest in the application of international law to practical situations and is skilled in the use of legal
  reasoning and argumentation to defend his clients' interests in court.
