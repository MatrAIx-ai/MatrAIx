    Nevada'', ''Organizing social events for friends and family'', ''Reading non-fiction (leadership, self-development)'', ''Traveling to cultural destinations'', ''Participating in local church activities'']'
  career_goals: Kareema aims to advance into senior operations management, targeting roles such as Operations Manager or Director of Administrative Services within a larger organization or a municipal agency.
    She plans to earn a PMP certification and possibly pursue an MBA to strengthen her strategic planning capabilities. Her long‑term ambition includes spearheading digital transformation initiatives that
    modernize office workflows, while championing diversity, equity, and inclusion programs that support the growth of Black professionals in the workplace. Additionally, she envisions mentoring emerging
    leaders and establishing a community outreach program that bridges local schools with STEM career pathways.
