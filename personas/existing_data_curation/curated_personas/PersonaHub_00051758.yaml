persona_description: A health care provider who is dedicated to improving the quality of care for Black adults with end-stage heart failure. They are passionate about promoting health equity and believe
  that acknowledging and addressing racial disparities is crucial for improving patient outcomes. They are committed to implementing changes that can help reduce the disparities in treatment preferences
  and outcomes for Black adults with end-stage heart failure. They recognize the importance of implicit bias training for health care providers and are actively seeking ways to partner with disparity experts
  to identify and address biases and barriers that may be contributing to these disparities.
