  career_goals: Seeking greater structure and impact, Mohammad aims to transition to an IT Service Manager role within the next three to five years. He plans to obtain advanced certifications such as ITIL 4
    Managing Professional, CompTIA Security+, and Cisco CCNA to deepen his strategic expertise. His ambition includes leading a small support team, improving service delivery metrics, and mentoring junior
    technicians. Long‑term, he envisions launching a boutique consultancy that provides secure remote‑work solutions for Bay Area small businesses, balancing professional growth with a predictable schedule
    that supports his personal well‑being.
