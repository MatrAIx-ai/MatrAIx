personas:
  professional: Mohammad Eban is a seasoned IT support specialist who leverages their systematic diagnostic approach and ITIL‑aligned incident management to deliver reliable service while assertively guiding
    teams toward predictable outcomes.
  sports: Mohammad Eban hikes the East Bay Regional Park trails with the East Bay Hiking Society, follows the San Francisco Giants and Golden State Warriors, and joins a local weekend pickup soccer team,
    balancing cardio with structured training.
  arts: Mohammad Eban captures sunrise over Redwood landscapes with a Canon EOS 5D, practices the dutar occasionally to interpret traditional melodies, reads Liu Cixin’s The Three‑Body Problem, and finds
    inspiration in Ansel Adams’ black‑and‑white photography and the Silk Road Ensemble’s fusion music.
  travel: Mohammad Eban prefers meticulously planned trips that blend nature and culture, having explored Yosemite’s granite cliffs, trekked the alpine trails of the Swiss Alps, and visited the historic
    bazaars of Samarkand, while dreaming of a future expedition to Patagonia’s Torres del Paine.
  culinary: Mohammad Eban enjoys preparing fragrant plov with cumin and carrots, hand‑rolled manty stuffed with seasoned lamb, and flaky samsa, demonstrating comfortable proficiency in traditional home
    cooking and occasional experimental fusion dishes like lamb kofta tacos, while pairing meals with a glass of crisp Pinot Grigio.
  core: Mohammad Eban blends a methodical IT mindset with a love for structured hikes, dutar strings, and meticulously organized weekend meals, yet occasionally gets lost in a sci‑fi novel for hours, forgetting
    dinner.
background:
  cultural: Mohammad is a second‑generation Central Asian American, likely of Uzbek or Kazakh descent. Raised in a bilingual household speaking both Uzbek (or Kazakh) and English, he grew up in the Bay
    Area where a vibrant Central Asian community reinforced traditions such as Navruz, tea hospitality, and close-knit family ties. These cultural values instill a strong work ethic, respect for education,
    and a sense of communal responsibility. At the same time, he has fully integrated into American life, blending his heritage with the diverse, pragmatic ethos of California’s tech scene.
