  hobbies: '[''Art gallery visits'', ''Digital photography'', ''Hiking'', ''Paddle‑boarding'', ''Improv theater'', ''Board‑game nights'', ''Indie folk music listening'', ''Cooking classes'', ''Community
    volunteer events'']'
  career_goals: Robin aims to transition from a clerk role to a senior financial analyst position within the next five years. She plans to earn a Certified Bookkeeper credential and enroll in community
    college courses toward an associate degree in accounting. Her ambition includes leading a small team that modernizes the firm's financial workflow, introducing automation tools and data‑visualization
    dashboards. Long‑term, Robin envisions opening her own boutique bookkeeping consultancy that serves local small businesses and nonprofits, leveraging her love for innovative solutions and her keen eye
    for detail.
