  hobbies: '["Soccer league participation", "Community center volunteering", "Cooking Mexican cuisine", "Backyard gardening", "Barbecue hosting", "Evening dog walks", "Baseball watching", "Listening to
    ranchera music", "Attending affordable‑housing meetings"]'
  career_goals: Manuel intends to grow his independent brokerage into the leading resource for Spanish‑speaking homebuyers in Sacramento County. Over the next five years he aims to recruit and mentor a
    team of three to five agents who share his commitment to structure and results, while expanding services to include property management and real‑estate investment consulting. He plans to acquire a portfolio
    of rental properties to generate passive income and to develop a training program for new agents that emphasizes systematic lead tracking and ethical negotiation. Achieving a higher annual sales volume,
    earning a reputation for closing complex deals, and securing financial stability for his family are his primary motivations. He also hopes to obtain a certification in affordable‑housing counseling
    to better serve low‑income clients.
