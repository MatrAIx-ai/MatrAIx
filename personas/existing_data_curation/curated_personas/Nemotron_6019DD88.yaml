personas:
  professional: A retired homemaker turned community garden coordinator, Tara Isler blends meticulous budgeting with a flexible, hands‑on leadership style, using their practical sensibility and occasional
    disorganization to keep volunteer projects running smoothly while still accommodating last‑minute changes.
  sports: Tara Isler enjoys low‑impact fitness, joining the local senior walking club for twice‑weekly hikes on the Oakridge nature trails, cheering on the Springfield Minor League baseball team, and occasionally
    playing shuffleboard at the senior center.
  arts: Tara Isler immerses themselves in historical fiction from authors like Philippa Gregory and Ken Follett, attends the community theater’s productions of classics such as "A Streetcar Named Desire",
    and finds quiet joy knitting scarves while listening to folk singer Joan Baez on vinyl.
  travel: Tara Isler travels with their husband on a leisurely, well‑planned itinerary that includes Midwest historic sites like the Cahokia Mounds, the Gateway Arch in St. Louis, and the Indiana Dunes,
    balancing structured museum visits with spontaneous photo walks through small towns.
  culinary: Tara Isler blends garden produce into comfort cooking, mastering dishes such as heirloom tomato bruschetta, rosemary‑infused roasted chicken, and a daily batch of lentil soup, while experimenting
    with new recipes from America’s Test Kitchen and occasionally forgetting to label leftovers.
  core: Tara Isler is a pragmatic garden‑guru who budgets like a spreadsheet, knits charitable scarves, and sometimes misplaces their glasses, all while staying rooted in community and faith.
background:
  cultural: Tara is a third‑generation Midwestern American of German‑Irish ancestry, raised in the suburbs of Chicago. Her upbringing reflects classic Midwestern values of self‑reliance, practicality, and
    strong community ties. She grew up in a Catholic household, celebrating traditional holidays and community gatherings, and has continued to engage with her church and local cultural institutions throughout
    her life.
