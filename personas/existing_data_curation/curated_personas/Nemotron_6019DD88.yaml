  career_goals: Although retired from formal employment, Tara aims to stay active and purposeful. She plans to expand her community garden, mentor younger volunteers at the local senior center, complete
    a short course on digital storytelling to document her family's history, and travel with her husband to historic sites in the Midwest. Maintaining health, deepening her faith involvement, and fostering
    intergenerational connections are central to her ambitions.
