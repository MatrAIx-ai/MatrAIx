  hobbies: '[''Drawing and painting'', ''Reading picture books'', ''Collecting leaves and shells'', ''Building with LEGO'', ''Solving puzzles'', ''Listening to classical music'', ''Solo imaginative storytelling'']'
  career_goals: Although only six, Shanika dreams of becoming an artist who creates calm, beautiful images that people can enjoy in quiet spaces like galleries or libraries. She also imagines herself as
    a future museum curator or illustrator for children's books, hoping to blend her love of art, careful planning, and curiosity about the world. She aims to keep learning, excel in school, and one day
    turn her quiet creativity into a professional career.
