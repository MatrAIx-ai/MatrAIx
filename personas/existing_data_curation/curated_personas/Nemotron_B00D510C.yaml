personas:
  professional: Shanika Akotia, an aspiring junior artist, spends her afternoons drawing intricate scenes, methodically organizes her art supplies, and approaches each new project with the same curiosity
    they apply to solving puzzles.
  sports: Shanika Akotia, a budding member of the neighborhood's Little League baseball team, eagerly practices batting drills after school, spends sunny afternoons climbing the playground's jungle gym,
    and proudly chants for the local Tigers during weekend games, cheering loudly even though they prefer quiet play at home.
  arts: Shanika Akotia, a devoted fan of classic composers like Mozart and visual storytellers such as Eric Carle, fills her sketchbook with whimsical animal portraits while listening to 'Eine kleine Nachtmusik,'
    and spends weekends curating a tiny gallery of seashell art in her bedroom, a space they keep meticulously organized.
  travel: Shanika Akotia, who loves family road trips, has collected shells from the Atlantic shore in Cape Cod, marveled at the geysers in Yellowstone, and now dreams of exploring the vibrant streets of
    Kyoto during a future summer vacation, a journey they picture in vivid, color‑filled drawings.
  culinary: Shanika Akotia, who delights in assembling peanut‑butter‑jelly sandwiches cut into star shapes, enjoys orange‑scented carrot sticks with hummus, and occasionally helps her mom bake chocolate
    chip cookies, proudly sprinkling extra chocolate chips for texture, a habit they repeat even when the kitchen gets messy.
  core: Shanika Akotia, a six‑year‑old quiet explorer, merges meticulous LEGO building, leaf‑collecting rituals, and vivid storytelling into a uniquely organized, solitary world of imagination, a habit
    they guard fiercely against noisy interruptions.
background:
  cultural: Shanika is part of a Black family rooted in the African-American community of Fort Worth, Texas. Her family celebrates cultural traditions such as Juneteenth, church music, and storytelling
    evenings where grandparents share folktales. She often visits local museums and art festivals, drawing inspiration from the vibrant heritage of the region while also enjoying the warm, community-focused
    atmosphere of her neighborhood.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic (addition & subtraction)'', ''Drawing and sketching'', ''Digital art on tablet'', ''Organizing toys and books'', ''Following multi-step instructions'',
