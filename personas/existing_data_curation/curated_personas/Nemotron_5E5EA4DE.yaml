personas:
  professional: Blake Vazquez, a 28‑year‑old engineering technologist with expertise in mechanical and electrical prototyping, CAD modeling, CNC machining, and microcontroller programming, leverages their
    vivid visual imagination and collaborative problem‑solving to translate sci‑fi concepts into functional consumer‑tech prototypes while embracing a flexible, occasionally disorganized workflow.
  sports: Blake Vazquez’s weekend fitness routine mixes trail hiking with high‑adrenaline drone racing, and they cheer on the Houston Astros in baseball, the Dallas Cowboys in football, and the Houston
    Dynamo in soccer while participating in the Austin Trail Runners club.
  arts: Blake Vazquez immerses themselves in the avant‑garde art scene, painting abstract sci‑fi canvases inspired by H.R. Giger, illustrating digital concepts in the style of Syd Mead, performing improv
    with a Second City‑style collective, and they regularly attend live shows featuring Flying Lotus and Tame Impala while citing the influence of Yayoi Kusama’s installations.
  travel: Blake Vazquez’s wanderlust favors spontaneous tech‑inspired escapades, having explored Tokyo’s Akihabara district for gadget inspiration, Berlin’s contemporary art galleries for design cues, and
    the rugged landscapes of Iceland for immersive installation ideas, while they dream of a future trek through the neon streets of Singapore.
  culinary: Blake Vazquez, an intermediate home chef, fuses Texan barbecue heat with global flavors, crafting dishes such as chipotle‑marinated kimchi pork tacos, smoked brisket ramen, and jalapeño‑infused
    miso‑glazed salmon, and they delight in ingredients like chipotle pepper, miso paste, and harissa to create bold, cross‑cultural plates.
  core: Blake Vazquez is a boundlessly imaginative technologist who bridges art and engineering, thriving on novelty while they occasionally let their laid‑back, disorganized habits spark spontaneous breakthroughs.
background:
  cultural: Blake grew up in Sugar Land, Texas, within a multicultural suburb of Fort Bend County. His family descends from Portuguese immigrants who settled in Texas in the 1970s and assimilated into the
    broader Anglo‑American community while preserving Portuguese customs and language. Raised in a bilingual household, he celebrates both traditional American holidays and Portuguese festivals. The diverse
    cultural landscape of his hometown—rich in Southern hospitality, Hispanic influences, and a thriving arts scene—shaped his inclusive worldview and appreciation for collaborative, community‑focused environments.
