  career_goals: Blake aims to advance to a senior engineering technologist role where he can lead interdisciplinary product development teams. He aspires to work on innovative consumer‑tech projects that
    blend engineering precision with artistic design, eventually earning PMP and Six Sigma certifications. In the longer term, he hopes to launch his own start‑up focused on immersive interactive installations
    that marry technology, art, and user experience, positioning himself as a bridge between technical rigor and creative vision.
