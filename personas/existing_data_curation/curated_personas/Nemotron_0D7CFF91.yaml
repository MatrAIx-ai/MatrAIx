personas:
  professional: Katie Maddrey, a 17-year-old high-school junior, combines her natural flair for public speaking, meticulous event planning, and deep empathy to lead the drama club's annual musical, coordinate
    the Rochester Public Library's teen reading program, and craft mental-health awareness campaigns using graphic-design tools, all while they mentor peers and maintain detailed checklists to keep projects
    on track.
  sports: Katie Maddrey, a 17-year-old who enjoys both structured and spontaneous activity, runs cross-country for her school, hikes the Genesee Valley Trail on weekends, follows the Rochester Red Wings
    and the New York Rangers with avid enthusiasm, and uses a smartwatch to log daily steps and weekly yoga sessions that help them release stress.
  arts: Katie Maddrey, a 17-year-old drama and choir enthusiast, shines in school productions like 'A Midsummer Night's Dream', harmonizes to the style of Ariana Grande, spends evenings sketching cityscapes
    influenced by Banksy's street art, and leads DIY craft workshops that echo Martha Stewart's polished aesthetic, all while they relish the applause and collaborative energy.
  travel: Katie Maddrey, a 17-year-old who prefers well-planned itineraries, creates detailed travel outlines in Google Docs, recalls weekend trips to the Finger Lakes and a school tour of Washington, D.C.,
    and dreams of backpacking through the Scottish Highlands and exploring the vibrant neighborhoods of New York City, balancing structured museum visits with spontaneous hikes when they feel adventurous.
  culinary: Katie Maddrey, a 17-year-old budding chef, delights in baking rustic apple pie, simmering pumpkin-spiced soups, and experimenting with seasonal ingredients such as local honey, fresh rosemary,
    and heirloom tomatoes, often measuring precisely before they occasionally abandon the recipe to improvise a comfort dessert when anxiety urges a sweet release.
  core: Katie Maddrey, a meticulous yet anxiety-prone 17-year-old, blends a love for organized creativity with a talkative, people-centered spirit, channeling nervous energy into structured arts projects
    and spontaneous performances while they habitually over-plan and rely on journaling to keep calm.
background:
  cultural: Katie was raised in a middle‑class white family in Rochester, New York, where community involvement and seasonal traditions are highly valued. Her upbringing reflects the typical upstate New
    York emphasis on hard work, education, and civic responsibility. Family holidays often include apple picking in the fall, attending the annual Lilac Festival, and supporting the local Rochester Red
    Wings baseball team. She grew up in a suburban environment that encouraged participation in school clubs and local volunteer opportunities, fostering a sense of belonging and collective harmony. While
    her cultural background is predominantly mainstream American, her family's active engagement in community service and appreciation for regional customs have shaped her identity and worldview.
