  career_goals: Katie aspires to pursue a bachelor's degree in psychology or social work, with the long‑term goal of becoming a high school counselor or community mental‑health advocate. She wants to combine
    her love for structured environments with her passion for helping others, aiming to design supportive programs that address teen anxiety and promote emotional well‑being. In the short term, she hopes
    to secure a summer internship at a local nonprofit that organizes youth outreach events, gaining experience in program coordination and counseling techniques. Ultimately, she envisions leading a youth
    services department that balances clear organizational frameworks with compassionate, person‑centered care.
