personas:
  professional: Caitlin Mcdaniel, a veteran computer support specialist, uses their three decades of cross‑platform troubleshooting, network diagnostics, and scripting automation to build rigorous SOPs
    and mentor junior staff, channeling a competitive drive and preference for structure into measurable improvements in ticket resolution times and first‑call success rates.
  sports: Caitlin Mcdaniel spends weekends paddling the Ohio River with the Bullitt River Kayak Club, follows the Cincinnati Bengals with fervent loyalty, cheers on the Louisville Cardinals men's basketball
    team, and participates in a city‑wide senior cycling group, balancing competitive spirit with low‑impact endurance activities.
  arts: Caitlin Mcdaniel frequently devours true‑crime narratives by Michelle McNamara, listens to B.B. King and Muddy Waters on vinyl, attends performances by the Cincinnati Symphony Orchestra, and designs
    knitted scarves using William Morris motifs, weaving a love of storytelling with tactile creativity.
  travel: Caitlin Mcdaniel plans trips with meticulous checklists, favoring weekend escapes to Paducah’s riverfront, spontaneous drives along the Blue Ridge Parkway, and annual pilgrimages to New Orleans’
    French Quarter, while dreaming of a culinary tour through Tuscany’s vineyards and olive groves.
  culinary: Caitlin Mcdaniel is an adept home cook who transforms heirloom tomatoes into fresh caprese salads, perfects Southern comfort staples like shrimp and grits and crispy fried chicken using buttermilk
    brine, and experiments with collard greens seasoned with smoked paprika and apple cider vinegar, often pairing meals with homemade sweet tea.
  core: Caitlin Mcdaniel fuses a methodical, competitive mindset with a devotion to heirloom gardening and true‑crime puzzles, often staying up late to finish crosswords, even at the cost of a few missed
    hours of sleep.
background:
  cultural: Caitlin was raised in the suburbs of Louisville, Kentucky, within a middle‑class, Anglo‑American family that has lived in the state for several generations. Her upbringing emphasized a Midwestern
    work ethic combined with Southern hospitality, instilling values of reliability, self‑reliance, and community service. She grew up attending a Methodist congregation, which reinforced a sense of responsibility
    toward family and neighbors. Local traditions—such as the Kentucky Derby, high‑school sports events, and regional cuisine like burgoo and bourbon—feature in her cultural identity. While she identifies
    with the mainstream white Kentuckian cultural landscape, she also respects Louisville’s broader cultural mosaic and participates in community activities that celebrate the city’s diverse heritage.
