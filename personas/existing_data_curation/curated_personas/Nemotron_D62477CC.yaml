  hobbies: '[''Gardening'', ''True‑crime reading'', ''Historical non‑fiction reading'', ''Jigsaw puzzles'', ''Crossword puzzles'', ''Yoga'', ''Volunteer computer tutoring'', ''Kayaking'', ''Cooking Southern
    recipes'', ''Knitting'']'
  career_goals: Caitlin aims to transition from a senior support role to an IT Service Manager position within the next three years, where she can implement ITIL best practices to streamline service delivery
    in her department. She plans to earn certifications such as ITIL Practitioner, CompTIA Network+, and Security+ to solidify her expertise. Driven by a competitive spirit, she seeks to lead a high‑performing
    help‑desk team, improve key performance metrics (first‑call resolution, average handling time), and be recognized as a top performer in her organization. Long‑term, she envisions establishing a small
    consultancy that offers affordable IT support and training for local small businesses and nonprofit organizations in Bullitt County, allowing her to give back to the community while leveraging her technical
    leadership.
