  hobbies: '[''Abstract Painting'', ''Digital Art'', ''Photography'', ''Chess'', ''Science Fiction Reading'', ''Philosophy'', ''Gardening'', ''Book Club'', ''Woodworking'', ''Volunteer Mentoring'']'
  career_goals: Greg aims to stay intellectually vibrant by combining his STEM expertise with creative exploration. He plans to mentor undergraduate engineering students through a local scholarship program,
    develop a community workshop that introduces generative AI art to seniors, and author a memoir that weaves his experiences in automotive innovation with reflections on abstract art and philosophy. He
    also hopes to curate a small exhibition of his abstract paintings, and to contribute occasional consulting insights to start‑up ventures focused on sustainable transportation technologies.
