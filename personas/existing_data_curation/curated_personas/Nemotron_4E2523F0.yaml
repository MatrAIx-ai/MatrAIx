personas:
  professional: Greg Davis, a retired automotive systems engineer turned interdisciplinary mentor, leverages his expertise in sensor integration, data analytics, and project management to guide senior students,
    consultancy start‑ups, and community AI‑art workshops, balancing meticulous planning with spontaneous creative bursts.
  sports: Greg Davis follows the Detroit Lions in fall, the Tigers in summer, and the Red Wings in winter, while staying active through weekly senior‑center walking groups, weekend kayaking on the Great
    Lakes, and light resistance training at a community gym, balancing his love for team spirit with a low‑impact fitness routine suited to his age.
  arts: Greg Davis immerses himself in abstract expressionism, drawing inspiration from Jackson Pollock and Mark Rothko, experiments with generative‑AI tools reminiscent of Refik Anadol, captures Great
    Lakes vistas in the style of Ansel Adams, and regularly attends Detroit Institute of Arts exhibitions featuring local muralist Charles McGee while winding down to the improvisational jazz of Miles Davis
    and the ambient soundscapes of Brian Eno.
  travel: Greg Davis favors carefully planned road trips that blend artistic pilgrimage with natural wonder—revisiting Michigan’s Upper Peninsula, exploring the maritime charm of Quebec City, and dreaming
    of a summer sojourn to Florence’s Uffizi—while balancing his retirement budget and the need to return for weekly mentorship duties.
  culinary: Greg Davis, an adept home cook, gravitates toward seasonal Midwestern cuisine—preparing pan‑seared lake perch with lemon‑butter, mushroom risotto with locally foraged porcini, and garden‑fresh
    heirloom tomato salad with basil and goat cheese—while indulging in occasional craft‑brew tastings at Detroit’s breweries and savoring a perfectly crusted sourdough loaf from his own kitchen.
  core: Greg Davis, a 66‑year‑old former automotive engineer turned abstract artist, fuses data‑driven rigor with boundless imagination, juggling senior‑center chess matches, late‑night AI‑generated canvases,
    and a penchant for forgetting to water his garden until the last minute.
background:
  cultural: Greg grew up in the Midwest, raised in a middle‑class family in Detroit suburbs. His parents were first‑generation American of German and Irish descent, instilling values of hard work, education,
    and community involvement. Living in Bloomfield Hills, he has been surrounded by a culturally diverse, affluent community that emphasizes philanthropy, the arts, and lifelong learning. His cultural
    identity combines Midwestern pragmatism with a deep appreciation for European artistic traditions and a commitment to sharing his knowledge through local civic initiatives.
