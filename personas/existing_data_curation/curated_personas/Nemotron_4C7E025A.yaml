  career_goals: Although retired, Miguel aims to channel his engineering background and artistic curiosity into community‑focused projects. He plans to mentor emerging engineers through a local STEM outreach
    program, develop a DIY‑repair workshop series for seniors, and lead a bilingual oral‑history initiative that records the Mexican‑American experience in Spokane. He also aspires to author a concise guide
    on sustainable home modifications for aging homeowners and to curate an exhibition that juxtaposes contemporary Pacific Northwest art with traditional Mexican motifs. On a personal level, he intends
    to deepen his understanding of emerging technologies such as machine‑learning through online courses, travel to his hometown in Jalisco for a family reunion, and adopt stress‑management practices to
    maintain emotional well‑being.
