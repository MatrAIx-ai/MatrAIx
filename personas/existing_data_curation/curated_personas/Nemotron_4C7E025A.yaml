personas:
  professional: Miguel Diaz, a retired civil engineer turned community maker, leverages three decades of structural analysis, AutoCAD drafting, GIS mapping, and bilingual technical writing to mentor seniors
    in DIY home repairs, and they meticulously plan each workshop, question assumptions, and push participants toward precision.
  sports: Miguel Diaz spends their mornings trekking Selkirk Mountain trails using a calibrated GPS, participates in a senior hiking club at Riverside Park, and they remain a loyal fan of the Seattle Seahawks
    and Spokane Chiefs, treating their weekly 9‑hole golf round at Spokane Country Club as disciplined exercise and a personal competition to shave a few strokes each session.
  arts: Miguel Diaz, a frequent patron of the Northwest Museum of Arts & Culture, fills their sketchbook with studies of modern architecture, draws inspiration from Emily Carr and José Marrón, and they
    volunteer to lead bilingual art‑history talks that weave contemporary Pacific‑Northwest installations with traditional motifs.
  travel: Miguel Diaz prefers meticulously planned journeys that blend cultural immersion with gentle adventure, having recently organized a family reunion trip to their ancestral hometown in their family's
    region of origin, while also mapping a leisurely road‑trip along the Pacific Coast Highway and a bird‑watching excursion to the Everglades, and they savor each moment with a detailed itinerary and a
    pocket notebook of observations.
  culinary: Miguel Diaz delights in preparing mole poblano, hand‑rolled tamales, and pozole seasoned with fresh cilantro, dried chilies, and oregano, and they often over‑season dishes with ancho chili powder,
    a quirk that sometimes overwhelms their guests, though their woodworking skills produce sturdy kitchen utensils that make cooking a pleasure.
  core: Miguel Diaz is a methodical, curiosity‑driven elder who engineers community projects with precision, yet they worry over every detail, hoard vintage hand tools, and cannot resist a late‑night, spice‑laden
    feast.
background:
  cultural: Born to Mexican immigrant parents, Miguel grew up in a bilingual household where Spanish was spoken at home and Mexican customs such as Día de los Muertos, quinceañeras, and weekly family meals
    anchored his identity. The flavors of mole, tamales, and pozole were staples, and his grandparents passed down stories of rural Jalisco, instilling a deep respect for community and resilience. After
    moving to Washington State in his early thirties, he blended this heritage with the Pacific Northwest’s love for nature and outdoor pursuits. He celebrates Mexican holidays alongside local festivities,
    volunteers at the Spokane Mexican Cultural Center, and often incorporates traditional motifs into his artistic projects. His Catholic upbringing informs his annual participation in the Good Friday procession
    at the local parish, while his Mexican roots continue to shape his worldview, emphasizing family solidarity, hospitality, and a reverence for craftsmanship.
