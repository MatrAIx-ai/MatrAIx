persona_description: A historian or archaeologist who specializes in the study of human prehistory, particularly the Neanderthals and their extinction. This individual is interested in the dietary habits
  of Neanderthals, the impact of their extinction on human populations, and the factors that contributed to their demise. They are also likely to be familiar with the isotopic evidence used to infer diet
  and the broader diet of Neanderthals, as well as the archaeological evidence that supports their extinction.
