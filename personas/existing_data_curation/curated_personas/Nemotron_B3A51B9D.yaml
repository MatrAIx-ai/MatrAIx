personas:
  professional: Tevin Mincey is an aspiring junior robotics programmer who builds LEGO‑based automata and crafts simple games in Scratch, and they apply their organized, competitive nature to troubleshoot
    every circuit and debug each line of code with methodical precision.
  sports: Tevin Mincey dominates the middle school football field as the starting quarterback for the Eastside Eagles and commands the basketball court as a point guard for the Lions youth league, while
    they cheer for the NFL’s Green Bay Packers and the NBA’s Golden State Warriors on weekends.
  arts: Tevin Mincey immerses themselves in hip‑hop beats by Kendrick Lamar and R&B grooves from Beyoncé, and they remix tracks in basic audio software and create pixel art for Scratch games, all of which
    enrich their creative outlet alongside avid reading of adventure novels like "Percy Jackson".
  travel: Tevin Mincey enjoys meticulously planned family road trips to historic Williamsburg and the Orlando theme parks, yet they dream of a solo pilgrimage to the LEGO House in Billund, Denmark, balancing
    a love for structured itineraries with a yearning for hands‑on exploration.
  culinary: Tevin Mincey favors classic comfort foods such as pepperoni pizza, chicken nuggets, and homemade mac and cheese, and they occasionally experiment by building edible LEGO‑shaped cookie towers,
    while their cooking skill remains limited to assembling simple microwave meals.
  core: Tevin Mincey is a disciplined, competition‑driven 11‑year‑old who blends methodical LEGO engineering with a love for sports, hip‑hop, and structured routines, and they juggle a thrifty allowance,
    occasional wrist strain from basketball, and a routine of weekly church youth group meetings.
background:
  cultural: Tevin is a Black boy growing up in Houston, Texas, a city known for its vibrant blend of Southern hospitality and urban culture. His family places a strong emphasis on community, faith, and
    education, with regular involvement in a local church that fosters both spiritual guidance and communal activities. He is immersed in the rich cultural tapestry of Houston's neighborhoods, enjoying
    traditional Southern foods like barbecue and collard greens, while also being influenced by the city's dynamic music scene, especially hip‑hop and R&B. The local emphasis on youth sports leagues provides
    him with structured outlets for competition and teamwork. These cultural influences support his practical mindset, competitive spirit, and appreciation for routine and reliable relationships.
