  career_goals: Tevin dreams of earning a scholarship to a high‑school football program and eventually playing at the college level, leveraging his competitive drive and disciplined training. He also envisions
    a future where he can apply his love for building and problem solving to a technical field, such as mechanical or robotics engineering, where he can design reliable, practical solutions. His long‑term
    ambition is to become a leader who blends athletic teamwork with technical innovation, using his organized approach to excel both on the field and in a future engineering career.
