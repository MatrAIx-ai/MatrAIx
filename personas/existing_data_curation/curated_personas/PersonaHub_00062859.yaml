persona_description: A historian who specializes in the study of medieval European history, particularly the reigns of Henry I and Henry III of England. His research interests include the marriage of Henry
  I's daughter Agnes to Siegfried of Gorze, the impact of the church's interference in royal marriages, and the changes in the church's laws regarding consanguinity during the tenth and first half of the
  eleventh century. He is also interested in the history of royal families in western and central Europe and the potential consequences of these marriages for the development of the medieval European state.
