  career_goals: David aims to move from an individual contributor role to a supervisory position within his call center, targeting a Team Lead promotion within the next two years. He plans to earn a Certified
    Customer Service Professional (CCSP) credential and to develop a structured mentorship program for onboarding new agents. Parallel to his corporate ambitions, he intends to launch a side venture that
    sells prints of his photography and offers weekend workshops on basic photography and creative writing, merging his love of art with entrepreneurship. Long‑term, David envisions a hybrid role that combines
    customer experience leadership with community arts outreach—perhaps as a program coordinator for a local nonprofit art center—allowing him to leverage his people skills while fostering cultural engagement.
    He also prioritizes cultivating stress‑management practices to sustain career growth and maintain a healthy work‑life balance.
