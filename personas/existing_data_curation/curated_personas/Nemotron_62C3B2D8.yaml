  hobbies: '["Watercolor painting","Visiting art exhibitions and museums","Cooking traditional Mexican recipes","Gardening herbs and vegetables","Reading historical fiction and memoirs","Listening to mariachi
    and jazz music","Dancing folklorico","Walking and socializing at the park","Volunteering at the senior center","Playing bridge","Writing in a personal journal"]'
  career_goals: Although retired, Yeiza aims to remain an active cultural ambassador and community volunteer. Her primary goals are to develop and lead intergenerational art workshops at the local senior
    center, create a collaborative cookbook that blends Mexican family recipes with Midwestern produce, document and share her family's oral histories in a memoir, and mentor younger volunteers in event
    planning and cultural stewardship. She also hopes to organize an annual Día de los Muertos celebration in Griffith that educates neighbors about Mexican traditions, fostering greater cultural understanding
    and community cohesion.
