  hobbies: '[''reading historical biographies'', ''true‑crime novels'', ''crossword puzzles'', ''knitting'', ''herb and succulent gardening'', ''early morning beach walks'', ''listening to classical music'',
    ''home cooking of comfort foods'']'
  career_goals: At 55, Satyra aims to transition into a senior or supervisory phlebotomy role that offers a predictable schedule and reduced direct patient pressure. She plans to obtain a Certified Phlebotomy
    Technician (CPT) credential to formalize her expertise, and eventually move into part‑time consulting, helping clinics develop and audit phlebotomy standard operating procedures. She also hopes to establish
    a small, home‑based emergency blood‑draw service for housebound seniors in her community, allowing her to blend compassion with the solitude she values while maintaining professional relevance.
