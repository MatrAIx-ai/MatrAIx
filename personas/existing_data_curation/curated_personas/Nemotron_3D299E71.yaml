personas:
  professional: Marianna Jackson is an aspiring junior illustrator who blends their love for crayons, watercolors, and LEGO construction with a methodical, project‑like planning approach, using their curiosity
    to experiment with new techniques and their gentle worry to perfect each line while collaborating kindly with classmates on art club projects.
  sports: Marianna Jackson plays on the Alamosa Rapids U‑8 soccer team, laces up their cleats after school for practice, cheers for the Colorado Rockies during weekend baseball games, and during the winter
    they enjoy sledding on the nearby San Luis Valley hills, balancing their love of organized team play with occasional nerves before matches.
  arts: Marianna Jackson spends afternoons in art club sketching scenes inspired by their favorite picture books, listening to the smooth tones of Louis Armstrong, the soulful power of Aretha Franklin,
    and the rhythmic grooves of Stevie Wonder, and they often recreate those musical moods with vibrant watercolors and elaborate LEGO dioramas.
  travel: Marianna Jackson loves family road trips to the nearby Great Sand Dunes National Park where they explore the dunes with a tiny explorer’s kit, enjoys weekend visits to Denver’s museum of nature
    and science, and dreams of one day flying to Disneyland, all while balancing their excitement with the careful budgeting their parents require for travel.
  culinary: Marianna Jackson often helps in the kitchen preparing family recipes like cheese quesadillas, blueberry pancakes, and cinnamon‑spiced oatmeal, showing a budding cooking skill that favors bright
    colors and sweet flavors, and they proudly add a sprinkle of fresh berries as their signature finishing touch.
  core: Marianna Jackson is a curious, organized seven‑year‑old whose boundless imagination fuels endless art projects, yet their tendency to worry over perfect details sometimes slows them down, and they
    can’t resist hoarding every extra crayon they find.
background:
  cultural: Marianna grows up in a loving Black family that honors its heritage through music, storytelling, and food. Her parents share African‑American history, celebrate Juneteenth, and introduce her
    to soul and gospel music, while also encouraging pride in notable Black artists and scientists. Living in Alamosa, a town with a rich Hispanic influence, she experiences a blend of cultures—participating
    in local festivals, learning Spanish greetings, and enjoying the diverse community atmosphere. This multicultural environment nurtures her appreciation for art, rhythm, and community harmony, shaping
    a strong sense of identity and openness to varied experiences.
