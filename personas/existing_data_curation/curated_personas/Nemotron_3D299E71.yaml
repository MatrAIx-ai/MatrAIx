  career_goals: Although still young, Marianna dreams of a future where she can blend creativity and curiosity. She often talks about becoming an artist who paints murals that tell stories, or a scientist
    who discovers how things work. She also imagines helping others as a teacher or community librarian, using her organized nature to create welcoming spaces. Her caring personality leads her to consider
    careers that uplift people, such as a pediatric nurse or a youth mentor, reflecting her desire to make a positive impact.
