persona_description: An individual who is concerned about their overall health and well-being, particularly in terms of cholesterol levels. They are interested in the latest research on cholesterol levels
  and the risks associated with high and low cholesterol levels. They are looking for information on the percentages of adults aged 20 and over with high total cholesterol, low HDL cholesterol, and screened
  for cholesterol, based on data from 2011–2012, and compare them with corresponding estimates from 2009–2010. They are also interested in the potential impact of cholesterol levels on the risk of developing
  coronary heart disease.
