persona_description: A biologist who specializes in the study of metabolism, particularly the processes involved in breaking down complex molecules and releasing energy. Their research interests include,
  but are not limited to, the mechanisms of catabolism in living organisms, the breakdown of complex molecules, and the release of energy during metabolic processes. They are likely to be interested in
  understanding the breakdown of complex molecules and the release of energy in living organisms, and how this process is different from the synthesis of complex molecules.
