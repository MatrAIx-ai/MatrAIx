personas:
  professional: Jonathan Edinger is a three-year-old aspiring engineer who transforms their block set into a structured construction site, meticulously aligning each piece while still letting spontaneity
    guide their occasional impromptu tower collapses, and they showcase a love of predictability mixed with playful flexibility and a competitive drive to out‑build their friends.
  sports: Jonathan Edinger is a three-year-old who dashes across the playground, proudly dons their miniature New York Yankees cap, and attends a Saturday morning toddler soccer circle where they compete
    to be the fastest, turning each game into a lively contest that fuels their energetic, competitive spirit.
  arts: Jonathan Edinger is a three-year-old who sings along to Sesame Street tunes, dances to Raffi’s ‘Baby Beluga’, and watches Disney’s Frozen with wide‑eyed fascination, letting these bright melodies
    and vivid animations shape their playful imagination and social interactions, and they eagerly mimic the characters during playtime.
  travel: Jonathan Edinger is a three-year-old who loves family road trips to the local zoo, a weekend stay at Grandma’s seaside cottage, and dreams of a future adventure at Disney World, preferring short,
    lively outings over long, unstructured journeys, and they chatter excitedly about each new sight.
  culinary: Jonathan Edinger is a three-year-old who eagerly slurps macaroni and cheese, chomps chicken nuggets with ketchup, and savors strawberry pancakes, yet stubbornly refuses broccoli, revealing a
    picky yet enthusiastic palate that mirrors their love for familiar comforts and occasional culinary rebels, and they often negotiate to add extra cheese.
  core: Jonathan Edinger is a three‑year‑old bundle of energy who balances a love for order with spontaneous bursts of competition, thriving on group play while occasionally letting skepticism and a stubborn
    palate add charming quirks to their daily adventures, and they always keep the toys scattered just enough to spark a new game.
