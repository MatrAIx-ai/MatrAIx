  career_goals: Shanna aspires to become a wildlife veterinarian who can help rehabilitate injured animals and advocate for their protection. She also dreams of combining her love for writing and advocacy
    by creating educational content about animal welfare and environmental stewardship for her community. In the long term, she hopes to lead outreach programs that inspire other kids to care for nature
    while balancing practical steps to achieve those goals.
