personas:
  professional: Shanna Alami is an aspiring junior environmental illustrator who merges her love of fantasy storytelling with a talent for detailed watercolor nature sketches, while channeling their curiosity
    into building intricate LEGO ecosystems and designing wildlife habitats in Minecraft.
  sports: Shanna Alami enjoys casual kayaking trips on the nearby river, follows the Chicago Cubs during baseball season, and participates in the Riverdale Rangers youth soccer club where they practice
    on Saturday afternoons, while also joining the school’s birdwatching club that meets after school for field walks.
  arts: Shanna Alami spends afternoons sketching detailed forest panoramas with watercolor washes, devours graphic novels like "Saga" and "Monstress", attends local library workshops on illustration, and
    curates playlists featuring indie artists such as Phoebe Bridgers and pop icons like Taylor Swift, which fuel their creative storytelling.
  travel: Shanna Alami loves weekend nature excursions to Redwood State Park, dreams of visiting the towering redwoods of California's national parks, has a scrapbook of family trips to the beach in Florida,
    and is eager to explore the historic castles of Scotland during a future school cultural exchange, preferring low‑key itineraries that allow time for sketching and birdwatching.
  culinary: Shanna Alami prefers simple, vibrant meals like avocado toast with sprinkled hemp seeds, enjoys making homemade strawberry‑banana smoothies, experiments with beginner‑friendly recipes for rainbow
    veggie sushi rolls, and occasionally treats themselves to pepperoni pizza while using fresh basil and mozzarella to practice herb‑pairing skills.
  core: Shanna Alami is a thoughtful, nature‑obsessed twelve‑year‑old who balances vivid fantasy daydreams with practical, hands‑on creation, yet often drifts into worry‑filled rumination and a habit of
    forgetting to tidy up.
background:
  cultural: Shanna grows up in a middle‑class family of German and Norwegian descent in Saint Paul, Minnesota. The family embraces Midwestern values such as modesty, community involvement, and appreciation
    for the outdoors, participating in seasonal activities like ice skating, sledding, and summer fishing. They celebrate traditional holidays—especially Thanksgiving and Christmas—and attend a local Lutheran
    church. Occasionally, they join community events that highlight Scandinavian heritage, such as the Nordic Fest, reinforcing a cultural connection to their ancestral roots while fostering a strong sense
    of local identity.
