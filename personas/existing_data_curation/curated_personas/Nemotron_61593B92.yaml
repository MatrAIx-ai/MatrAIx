  hobbies: '[''Building with Duplo bricks'', ''Riding a tricycle'', ''Dancing to Latin music'', ''Listening to bilingual storytime'', ''Playing tag and kickball at the park'', ''Watching cartoons'', ''Participating
    in community parades and festivals'']'
  career_goals: Although still very young, Miguel often talks about growing up to be a builder or a firefighter—roles that let him follow clear plans, keep people safe, and work with a team. He also imagines
    being a soccer player who wins matches, reflecting his competitive streak. These ambitions combine his love for structure, teamwork, and the excitement of helping others while satisfying his desire
    for predictable, reliable routines.
