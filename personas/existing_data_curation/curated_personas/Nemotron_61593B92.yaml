personas:
  professional: Miguel Lopez is a budding preschool learner who loves organizing classroom supplies, follows daily schedules religiously, and thrives on group play, yet often argues for the best seat in
    storytime.
  sports: Miguel Lopez sprints with the Stockton Little Rockets soccer squad, cheers loudly for the San Jose Earthquakes, enjoys weekly gymnastics at the community center, and already insists on keeping
    score during backyard tag games, though they sometimes get frustrated when they lose.
  arts: Miguel Lopez draws vibrant crayon murals of colorful papel picado, sings along to Luis Miguel and Selena at family gatherings, and eagerly watches episodes of Sesame Street for the lively puppets,
    often demanding a turn on the small keyboard toy despite being impatient for perfect notes.
  travel: Miguel Lopez loves road trips to Grandma’s backyard garden in the Central Valley, eagerly anticipates weekend visits to the Pixar Pier at Disneyland, and recently waved at the Golden Gate Bridge
    in San Francisco, though they always request the same window seat for comfort.
  culinary: Miguel Lopez savors homemade chicken tacos with fresh cilantro and a squeeze of lime, proudly helps mash avocado for guacamole, refuses broccoli but loves cheese‑filled quesadillas and the occasional
    chocolate chip pancake for breakfast.
  core: Miguel Lopez is a routine‑driven, energetic four‑year‑old who balances a love for group play and competition with frequent worries about losing control of their tiny world.
background:
  cultural: Raised in a Mexican‑American family in Stockton’s vibrant San Joaquin County community, Miguel’s household blends Mexican traditions with Californian life. He celebrates Día de los Muertos and
    Mexican Independence Day, enjoys family meals of tacos and arroz con pollo, and speaks both Spanish and English at home. His extended family lives nearby, and regular visits to the local church and
    community center reinforce values of family loyalty, respect for elders, and collective celebration. These cultural experiences shape his love for music, storytelling, and communal gatherings, while
    also grounding him in bilingual communication and the importance of routine and family rituals.
attributes:
  skills: '[''Bilingual communication (Spanish and English)'', ''Counting up to 20'', ''Shape and color identification'', ''Fine motor skills with building blocks'', ''Following daily routines independently'',
