  career_goals: Yolimar dreams of becoming a celebrated artist or illustrator who can design her own comic books and paint murals that tell stories from her Mexican heritage. She also hopes to win the upcoming
    school art contest and, when she grows older, to explore architecture or become a science explorer because she loves learning about new ideas. Her competitive spirit fuels her ambition to be "the best"
    in her class while staying open to innovative paths.
