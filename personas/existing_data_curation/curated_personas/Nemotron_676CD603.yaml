personas:
  professional: Yolimar Gonzalez, a budding LEGO architect who transforms park sandbox adventures into intricate brick creations, channeling a curious mind and a competitive spark into designs that balance
    structure and imagination, and they eagerly share their structures with friends during playdates.
  sports: Yolimar Gonzalez, an energetic soccer enthusiast who plays for the San Antonio Youth Soccer Club’s U‑8 team, idolizes the local professional side San Antonio FC, approaches practice with a competitive
    edge, often challenging teammates to score the most goals, and they love cheering on the pros during weekend matches.
  arts: Yolimar Gonzalez, a passionate painter who fills sketchbooks with fantastical landscapes inspired by bedtime stories, dances to the lively strings of Mariachi Vargas de Tecalitlán at family gatherings,
    draws inspiration from artists like Frida Kahlo and the animated world of Pixar’s ‘Coco’, and they proudly showcase their drawings at school art exhibitions.
  travel: Yolimar Gonzalez, an adventurous explorer who loves weekend trips to the San Antonio River Walk and the historic Alamo, dreams of visiting the ancient pyramids of Teotihuacan, prefers family‑planned
    itineraries that blend playful discovery with cultural festivals, and they keep a tiny journal to sketch each new sight.
  culinary: Yolimar Gonzalez, a budding chef who adores helping prepare tacos al pastor with fresh cilantro, crafting sweet tamales filled with cheese, sipping homemade horchata spiced with cinnamon, proudly
    mastering the art of mixing salsa roja from scratch, and they love sharing their tasty creations with friends at birthday parties.
  core: Yolimar Gonzalez is a curious, competitive seven‑year‑old who blends LEGO engineering with vibrant folklore art, fiercely guards their allowance, negotiates allergy meds with a blend of stubbornness
    and sweet charm, and they proudly share their latest creations with anyone who asks.
background:
  cultural: Yolimar is raised in a bilingual Mexican-American household in San Antonio. She speaks both Spanish and English fluently and celebrates Mexican traditions such as Día de los Muertos, Cinco de
    Mayo, and family gatherings centered around tacos, tamales, and homemade horchata. Her family attends a local Catholic church and participates in community festivals that blend Texan and Mexican cultures.
    This rich cultural environment nurtures her appreciation for art, storytelling, and community values while also exposing her to the broader multicultural fabric of Bexar County.
