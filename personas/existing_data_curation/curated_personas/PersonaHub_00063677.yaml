persona_description: A historian who specializes in the study of World War II, particularly the Holocaust and its aftermath. Their research interests include the fate of Jews in Czechoslovakia before and
  after the partition, the deportation of Jews to Theresienstadt, and the role of the German occupation authorities in the Holocaust. They are interested in the experiences of Jews in the Protectorate of
  Bohemia and Moravia, the fate of Jews in the Greater German Reich, and the role of the German SS and Police in the Holocaust. They are also interested in the fate of Jews in the Czech lands after the
  war, and the impact of the Holocaust on the Jewish community in Europe.
