  career_goals: Antonio dreams of becoming someone who can make the world brighter. He often says he wants to be an artist who paints murals in his neighborhood so everyone can enjoy the colors, and he
    also imagines being a teacher or a community helper who helps other kids learn and feel happy. He is fascinated by the idea of a doctor who cares for people, especially when he sees his parents helping
    neighbors. Overall, his goal is to create and share things that bring joy and help others, even if he doesn't yet know the exact job title.
