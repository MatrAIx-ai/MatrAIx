  hobbies: '[''Strategic Video Gaming'', ''Hiking in the Sonoran Desert'', ''Puzzle Solving (Sudoku, Jigsaw)'', ''Photography'', ''Cooking (Mediterranean/International)'', ''Reading (Mystery & Non-fiction)'',
    ''Community Volunteering'', ''Basketball'']'
  career_goals: Alfredo aims to secure a stable, full‑time administrative or project coordination role within the next year, preferably with a reputable organization in the Phoenix area that offers clear
    expectations and a predictable schedule. He plans to earn a Certified Administrative Professional (CAP) credential and complete a CompTIA A+ certification to broaden his technical support capabilities.
    Long‑term, he hopes to pursue a bachelor's degree in Business Administration while advancing to a supervisory position where he can foster a harmonious, organized workplace and mentor junior staff.
    His ambition is to combine his practical skill set with his cooperative nature to become a trusted backbone of any team.
