  career_goals: Richard aims to transition into a senior advisory role where he can mentor junior technicians and shape IT support processes. Over the next three years he plans to earn the ITIL Expert certification
    and lead a modernization project that moves his department’s help desk to a cloud-based ticketing platform. His long-term ambition is to become an IT Service Manager, focusing on improving service quality,
    reducing downtime, and fostering a supportive team culture, while also establishing a part-time consulting practice that offers remote support to small businesses in Orange County. He seeks a balanced
    workload to better manage stress and maintain his well-being.
