  career_goals: Looking ahead, Charlie aims to advance to a senior engineering or lead developer role where he can shape system architecture and guide cross‑functional teams. He plans to earn a formal computer‑science
    degree or industry certifications (AWS Solutions Architect, Certified Scrum Master) to complement his self‑taught background. In the next five years he hopes to lead a tech team at a midsize firm in
    the Greater New Haven area, drive the adoption of cloud‑native practices, and champion diversity initiatives by mentoring aspiring Black developers through local coding bootcamps and community workshops.
    Ultimately, he envisions creating a sustainable tech startup that solves real‑world problems for small businesses in Connecticut.
