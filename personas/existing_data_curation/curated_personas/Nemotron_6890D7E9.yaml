personas:
  professional: Charlie Hatcher is a pragmatic full‑stack software developer who blends curiosity for emerging tech with methodical, Agile‑driven delivery, writing clean Python and TypeScript code, orchestrating
    Docker‑based deployments on AWS, and leading code reviews while mentoring junior teammates, reflecting their organized reliability and outgoing collaborative spirit.
  sports: Charlie Hatcher scores points in the community basketball league, joins weekend pick‑up games at the local gym, roots for the New England Patriots and the Hartford Yard Goats, and integrates cardio
    hikes at Sleeping Giant State Park into a balanced fitness regimen that satisfies both their competitive drive and love of the outdoors.
  arts: Charlie Hatcher fuels their creative spark by attending live hip‑hop shows headlined by Kendrick Lamar and jazz gigs featuring Kamasi Washington, immerses in sci‑fi novels by N. K. Jemisin, and
    unwinds with board‑game nights that often feature strategy titles like Terraforming Mars, reflecting their sociable energy and curiosity.
  travel: Charlie Hatcher prefers short, well‑planned road trips across New England, mapping out itineraries that include a sunrise hike in Acadia National Park, a seafood brunch in Mystic, a weekend stay
    at a boutique B&B in Stowe, Vermont, and a quick detour to the historic streets of Providence, balancing adventure with an organized budget.
  culinary: Charlie Hatcher experiments with soul‑food barbecue on the grill, perfecting smoky ribs, caramelized sweet‑potato mash, and collard greens seasoned with smoked paprika, while also mastering
    quick weeknight meals like pepper‑corn tofu stir‑fry, showcasing both their intermediate cooking skill and love for flavor‑focused, communal dining.
  core: Charlie Hatcher is a methodical tech lead who swaps code reviews for basketball drills, grill smoke for concert vibes, and meticulous budgeting for spontaneous road trips, all while juggling mentorship
    duties and a habit of juggling too many projects at once.
background:
  cultural: Charlie is an African‑American who grew up in Waterbury, a city with a vibrant Black community rooted in the Great Migration of the 20th century. His family maintains cultural traditions such
    as soul food cooking, church gatherings, and celebrating milestones like Juneteenth and Kwanzaa. He draws inspiration from the legacy of Black innovators in technology and stays connected to his heritage
    by participating in local events hosted by the Center for African American Culture in New Haven and volunteering with organizations that promote STEM education for minority youth. His cultural identity
    shapes his values of community support, perseverance, and the desire to serve as a role model for the next generation.
