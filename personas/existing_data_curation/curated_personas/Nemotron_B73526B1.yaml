  career_goals: In the short term, Timothy plans to earn a Certified Landscape Technician (CLT) credential by enrolling in night courses at the local community college and to obtain a state landscaping
    license that will broaden the scope of services he can offer. He also hopes to complete a short certification in sustainable design, focusing on rain‑garden installation and native‑plant landscaping,
    to meet growing demand for environmentally friendly yard care. Within the next three to five years, he aims to move into a crew‑supervisor role at his current employer, where he can mentor newer workers
    and implement more structured maintenance schedules that reflect his preference for predictability while still allowing flexibility. Ultimately, Timothy envisions launching his own small, eco‑focused
    landscaping business that provides low‑maintenance, drought‑resistant yard solutions for families and local institutions such as schools and churches. He wants his venture to generate a stable income
    for his marriage, give him the freedom to choose his work hours, and enable him to give back to the community by offering free garden set‑ups for community parks and volunteering as a mentor for youth
    apprenticeship programs.
