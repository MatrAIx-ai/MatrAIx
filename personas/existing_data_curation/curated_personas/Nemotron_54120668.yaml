  career_goals: In the next five years Felix aims to be promoted to Police Captain, overseeing the Community Policing Division and spearheading evidence‑based policing initiatives that reduce crime and
    strengthen trust in the neighborhoods he serves. He plans to pursue a Master’s in Public Administration to deepen his policy expertise and eventually transition into a senior role within the City’s
    Department of Public Safety or a consultancy focused on law‑enforcement efficiency. Additionally, he wants to expand mental‑health resources for officers, drawing on his own sensitivity to stress to
    create a more resilient workforce.
