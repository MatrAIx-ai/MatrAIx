persona_description: A Product Manager with expertise in heat transfer and thermal design, who is responsible for the thermal design of new consumer products. The Product Manager is looking for accurate
  and reliable temperature predictions to support the feasibility study and parametric studies of different designs. The Product Manager is aware of the limitations of current design rules and is seeking
  a temperature prediction method that can narrow the design rule margins significantly. The Product Manager is interested in using CAD tools in the early and final design stages, but is concerned about
  the lack of accurate values in the areas of heat transfer coefficients, thermal resistances, input parameters, and temperature-reliability relationships. The Product Manager is looking for a solution
  that can predict temperatures accurately within narrow tolerances, such as ±3°C.
