  career_goals: Although retired, Timothy aims to become the neighbourhood’s go‑to mentor, sharing his practical skills with younger residents through informal workshops and one‑on‑one tutoring. He wishes
    to document the oral histories of Tamassee’s longtime families, preserving local folklore and Appalachian traditions for future generations. He also hopes to volunteer as a senior first‑aid trainer
    for the local volunteer fire department, reinforcing his calm and resilient nature while contributing to community safety.
