    music"]'
  career_goals: Edgar aims to move from his current stocker role to a supervisory position within the next three years. He plans to earn a certified forklift operator credential and a Certified Warehouse
    Manager certification, while pursuing a bachelor’s degree in Supply Chain Management part‑time. His long‑term ambition is to become a logistics coordinator for a regional distribution center, providing
    a stable income that supports his family, enables home ownership in Tacoma, and offers opportunities for further professional growth.
