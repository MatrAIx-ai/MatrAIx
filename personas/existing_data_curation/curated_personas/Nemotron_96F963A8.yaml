  career_goals: She aims to keep exploring a variety of fields during high school—participating in science fairs, joining robotics, and taking advanced STEM classes—to identify a path that blends her curiosity
    with real‑world impact. In the long term, Christina envisions earning a bachelor's degree in environmental engineering or biomedical engineering, or becoming a STEM educator, so she can apply her practical
    problem‑solving skills while inspiring others. She also hopes to secure internships or summer programs that provide hands‑on experience and to eventually contribute to community‑focused projects that
    improve local sustainability.
