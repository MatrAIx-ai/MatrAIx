  career_goals: Tracy aims to progress into senior leadership within Learning & Development, eventually steering strategic, innovation‑focused training initiatives for technology or creative‑industry firms
    in the Los Angeles area. She envisions integrating emerging modalities such as micro‑learning, AR/VR, and data‑analytics while maintaining a clear ROI focus. Long‑term, she hopes to launch a boutique
    consultancy that designs bespoke, experiential learning programs for small‑to‑mid‑size companies, and to become a recognized thought‑leader through industry publications and conference speaking.
