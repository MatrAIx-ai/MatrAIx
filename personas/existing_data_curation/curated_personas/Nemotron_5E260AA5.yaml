    consulting'']'
  hobbies: '[''Abstract watercolor painting'', ''Sketching architectural details'', ''Reading contemporary fiction and poetry'', ''Creative writing (short stories, poetry)'', ''Yoga and meditation'', ''Cooking
    traditional South Asian dishes (with fusion experiments)'', ''Attending small art gallery openings and literary readings'', ''Learning Tamil'', ''Crossword and cryptic puzzle solving'', ''Abstract photography'']'
  career_goals: Ambitious yet methodical, Dilara aims to become a leading authority in South Asian literary translation, publishing bilingual anthologies that introduce contemporary Indian poets and authors
    to English‑speaking audiences. She plans to earn ATA certification and pursue a master’s degree in Translation Studies within the next three years to deepen her theoretical foundation. Within five years,
    she envisions launching a boutique translation agency focused on arts and humanities projects, offering culturally informed consulting for museums, galleries, and nonprofit organizations. Dilara also
    intends to mentor emerging translators, particularly women from under‑represented backgrounds, by creating workshops and an online mentorship platform. Embracing emerging AI‑assisted translation technologies,
    she strives to develop hybrid workflows that retain artistic nuance while increasing efficiency. In the long term, she hopes to contribute to UNESCO’s cultural preservation initiatives and to curate
    a multilingual literary festival in New Jersey that celebrates diaspora narratives and fosters cross‑cultural dialogue.
