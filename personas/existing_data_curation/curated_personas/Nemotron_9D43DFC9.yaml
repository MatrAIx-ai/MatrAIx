personas:
  professional: Allison Amyot is a diligent carpenter‑artist who blends expert joinery—mortise‑and‑tenon, dovetail, and router‑cut details—with abstract design concepts, leveraging their methodical project
    planning, charismatic communication, and sociable energy to lead crews, delight clients, and craft sustainably sourced limited‑edition furniture.
  sports: Allison Amyot, an avid hiker of the Connecticut River Valley, spends Saturdays trail‑running in the spring, joins a co‑ed softball league with the West Springfield Sprinters during summer, snowshoe‑trails
    in winter, and cheers on the New England Patriots and Boston Red Sox as their favorite professional teams.
  arts: Allison Amyot explores abstract painting influenced by Wassily Kandinsky and digital illustration inspired by James R. Eads, performs improv comedy channeling the wit of Tina Fey and physicality
    of Jim Carrey, and strums acoustic guitar to the folk whispers of Nick Drake and the indie storytelling of Sufjan Stevens, weaving all these artistic threads into their design work.
  travel: Allison Amyot prefers meticulously planned road trips, having toured the rocky coastline of Portland, Maine, trekked the historic streets of Boston, and explored Iceland’s basalt cliffs, while
    dreaming of a summer residency in Copenhagen to study Danish sustainable design and a future solo adventure through the art museums of Florence.
  culinary: Allison Amyot enjoys cooking New England clam chowder with fresh clams and thyme, crafting weekend miso ramen brimming with shiitake mushrooms and soba noodles, and sweetening homemade apple
    crisp with locally harvested maple syrup, showcasing a moderate skill level that balances experimental flavor pairings with sustainable ingredient choices.
  core: Allison Amyot fuses a carpenter’s precision with an artist’s imagination, thrives on social buzz, hoards coffee cups, and never finishes a doodle without a coffee stain.
background:
  cultural: Allison grew up in West Springfield, Massachusetts, a town rooted in New England’s historic woodworking traditions. Her family background includes English and Irish ancestry, and she was raised
    in a community that values self‑reliance, craftsmanship, and collaborative spirit. The region’s legacy of Shaker furniture and colonial barn construction influenced her appreciation for simple, functional
    design. While she identifies as white, she is deeply aware of the cultural mosaic of Hampden County, often participating in local festivals and supporting inclusive community initiatives. This blend
    of regional heritage and contemporary multicultural exposure shapes her worldview and informs both her professional ethos and personal creativity.
attributes:
  skills: '["Framing and Structural Carpentry", "Finish Carpentry", "Custom Furniture Design", "Advanced Joinery (mortise‑and‑tenon, dovetail)", "CAD (SketchUp, Fusion 360)", "Project Planning and Scheduling",
    "Material Estimation and Budgeting", "Safety Compliance", "Team Leadership and Coordination", "Customer Communication"]'
  hobbies: '["Abstract Painting", "Digital Illustration", "Mixed‑Media Wood Sculptures", "Live Improv Comedy", "Community Workshop Facilitation", "Hiking in Connecticut River Valley", "Reading Speculative
    Fiction", "Volunteer Carpentry (Habitat for Humanity)", "Acoustic Guitar", "DIY Home Renovation Projects"]'
  career_goals: Allison aims to earn her Journeyman Carpenters' Union certification and eventually achieve master carpenter status. She envisions opening a boutique studio that creates limited‑edition,
    sustainably sourced furniture where each piece reflects her love for abstract art. In parallel, she hopes to launch a community workshop space in West Springfield that offers free carpentry and design
    classes to youth, fostering creativity and practical skills. Long‑term, she dreams of being recognized for innovative, eco‑friendly building projects and collaborating with local artists on public installations
    that celebrate New England craftsmanship.
