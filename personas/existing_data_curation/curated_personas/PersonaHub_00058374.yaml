persona_description: A healthcare professional who is concerned about the overuse and misdiagnosis of imaging tests, particularly in the context of breast cancer screening. They are interested in understanding
  the risks and benefits of these tests, and advocating for a more cautious and individualized approach to cancer treatment. They are also interested in the potential for false positives and the need for
  more accurate diagnostic tools. They are likely to be aware of the potential consequences of aggressive treatment for inconsequential lesions and would advocate for a more balanced approach to cancer
  management.
