persona_description: A scientist who studies epigenetic changes and their effects on behavior and health. This individual is particularly interested in the role of maternal behavior and neglect in the development
  of epigenetic marks and their impact on stress response genes in rats. They are also interested in comparing the epigenetic changes in humans who have experienced childhood abuse and neglect to those
  who have not, and how these differences may affect gene expression and behavior.
