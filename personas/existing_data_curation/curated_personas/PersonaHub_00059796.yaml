persona_description: A historian of medieval literature who specializes in the works of Sir Thomas Malory, particularly those related to the Knights Templar and their chimerical nature. His research interests
  include, but are not limited to, the evolution of the Christian virtues of piety, purity, obedience, and humility and the honor-based virtues of martial valor and chivalry. He has a keen understanding
  of the moral-psychological sensitivity to how the purity and honor impulses can wrestle for supremacy in the context of the works of Malory.
