personas:
  professional: Roma Bolling is a 28-year-old multidisciplinary visual artist whose practice spans oil painting, mixed-media collage, mural work, and digital illustration; they channel their curiosity and
    methodical planning into curating community exhibitions, writing grant proposals, and managing social-media campaigns, all while fostering inclusive workshops that reflect their sociable and cooperative
    nature.
  sports: Roma Bolling is an avid hiker who tackles the Flatirons weekend after weekend, attends sunrise yoga classes at Flow Studio, and is a regular member of the Boulder Cycling Club; they cheer for
    the Colorado Rockies and Denver Nuggets while occasionally joining a friendly pick-up volleyball game at the local community center.
  arts: Roma Bolling immerses themselves in the arts, crafting pottery at the Boulder Clay Studio, attending live shows by Phoebe Bridgers and Local Natives, and analyzing contemporary theory from authors
    like Hito Steyerl; they are inspired by the mural work of Shepard Fairey and the installations of Ai Weiwei, and they often quote Banksy in workshop discussions.
  travel: Roma Bolling plans trips with the same research rigor they apply to grant proposals, mapping itineraries around international art festivals such as the Venice Biennale, São Paulo Bienal, and the
    Gwangju Biennale; they also love weekend road trips to Moab and a dream of exploring the street art of Valparaíso, Chile, balancing adventure with a modest travel budget.
  culinary: Roma Bolling enjoys cooking eclectic dishes, often weaving together flavors from their travels; they have mastered shakshuka, experiment with miso-ramen, and occasionally attempt a complex mole
    poblano, while their go-to pantry staples include fresh heirloom tomatoes from Boulder’s farmer's market, cumin, and soy sauce, though they sometimes over-salt their soups.
  core: Roma Bolling is a curiosity-driven, organized artist who blends community-building with vibrant creativity, often juggling too many craft supplies while chasing the perfect hike, latte, or grant
    deadline.
background:
  cultural: Roma was raised in a midwestern suburb in a family of European descent, with roots tracing back to German and Irish heritage. Growing up, she was exposed to a blend of traditional American cultural
    values and a love for storytelling through visual arts. Relocating to Boulder for college, she embraced the city’s vibrant, progressive arts scene and the surrounding natural beauty, which now inform
    her aesthetic sensibilities. While identifying as white, Roma actively seeks out and incorporates perspectives from Indigenous Pueblo cultures, Latinx communities, and other diverse groups in the Colorado
    region, reflecting her commitment to cultural curiosity, inclusivity, and collaborative creation.
attributes:
  skills: '["Oil painting", "Acrylic painting", "Mixed-media collage", "Mural creation", "Digital illustration (Adobe Photoshop, Procreate)", "Art historical research", "Exhibition curation", "Project planning
