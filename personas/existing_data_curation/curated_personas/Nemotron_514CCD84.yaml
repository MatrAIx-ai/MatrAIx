  hobbies: '["Hiking the Flatirons", "Yoga", "Pottery and ceramics", "Live music and theatre attendance", "Reading contemporary fiction and art theory", "Traveling to art festivals", "Experimental cooking",
    "Organizing game nights and book clubs", "Leading community art walks"]'
  career_goals: Roma aims to deepen her impact on the Boulder arts ecosystem by opening a community‑focused studio space that offers affordable studio rentals, mentorship programs, and regular workshops
    for emerging artists. She seeks a recurring artist‑in‑residence fellowship that would allow her to develop a series of public art installations reflecting Boulder’s natural landscape and the region’s
    cultural heritage. Over the next five years, Roma hopes to secure representation with a reputable gallery, while also transitioning into curatorial roles that let her bridge gaps between established
    and under‑represented artists. Ultimately, she envisions building a sustainable nonprofit platform that leverages her grant‑writing expertise to fund collaborative projects that celebrate diversity,
    environmental stewardship, and artistic innovation.
