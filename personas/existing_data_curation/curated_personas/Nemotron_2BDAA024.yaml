  career_goals: She aspires to become a senior safety engineering leader or director of operations, where she can embed a culture of continuous improvement and innovative safety technologies across the
    organization. Dilia aims to earn the Certified Safety Professional (CSP) credential, mentor the next generation of engineers, and eventually launch a consultancy that blends industrial engineering with
    sustainable design and community art projects. Her ambition to influence regional safety standards and contribute to public safety initiatives reflects her cooperative yet assertive nature and her desire
    to balance responsibility with creative impact.
