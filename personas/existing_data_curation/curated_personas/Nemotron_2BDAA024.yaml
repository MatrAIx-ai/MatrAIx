personas:
  professional: Industrial engineer Dilia Ravelo leads process optimization initiatives using Lean Six Sigma and OSHA compliance expertise, blending bilingual technical communication and ergonomic workstation
    designs to deliver safety‑centric solutions while channeling the same creative curiosity she applies to watercolor painting.
  sports: Active Dilia Ravelo spends weekends tackling the Wasatch Mountain trails, cycling with the Ogden Bicycling Club on scenic routes, practicing Vinyasa yoga at Om Balance studio, and cheering on
    the Utah Jazz and Real Salt Lake, balancing team spirit with personal endurance goals.
  arts: Arts‑savvy Dilia Ravelo frequents downtown galleries featuring works by local Utah artists such as Alan Gurr, attends avant‑garde productions at The Vault theater, and spends late evenings creating
    watercolor pieces inspired by Yayoi Kusama’s immersive patterns and the speculative worlds of Ann Leckie’s novels.
  travel: Travel‑enthusiast Dilia Ravelo mixes spontaneous weekend road trips to Utah’s national parks—Bryce Canyon, Arches, and Zion—with longer voyages to sci‑fi inspired locales like Reykjavik, Iceland,
    and Kyoto, Japan, always hunting off‑season flight deals to keep adventurous itineraries within her moderate budget.
  culinary: Culinary Dilia Ravelo reimagines classic Mexican dishes by pairing quinoa‑infused chiles en nogada with a hazelnut‑laden mole sauce, crafting tacos al pastor topped with avocado‑cactus salsa,
    and grilling corn on the cob brushed with smoked chipotle butter, often accompanied by a cilantro‑lime quinoa salad.
  core: Dilia Ravelo fuses analytical rigor with artistic spontaneity, turning industrial safety challenges into canvas‑like problem‑solving while balancing yoga, watercolor, and midnight taco experiments.
background:
  cultural: Dilia was born in Mexico and grew up in a close‑knit family that celebrated traditions such as Día de los Muertos, quinceañeras, and communal cooking. She is fluent in both Spanish and English
    and often incorporates Mexican folk art motifs into her personal projects, reflecting a deep appreciation for her heritage. Living in Ogden, Utah, she actively participates in the local Mexican community,
    sharing cultural recipes, music, and stories, while also embracing the broader multicultural environment of the Intermountain West.
