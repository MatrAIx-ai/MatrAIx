persona_description: A historian with a specialization in the study of the Soviet Gulag and its relation to the broader Soviet political and economic system. They are interested in the comparative and transnational
  perspectives of the Gulag, and are particularly interested in the interrelationship and importance of the Gulag to the larger Soviet political and economic system. They are also interested in the history
  of the Gulag and the concentration camp, and are well-suited for adoption in a wide range of undergraduate and graduate courses.
