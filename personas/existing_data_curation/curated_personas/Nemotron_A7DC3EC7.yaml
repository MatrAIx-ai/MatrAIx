personas:
  professional: George Cohen is an aspiring IT support specialist who leverages their hands‑on hardware troubleshooting, basic network knowledge and Python automation skills to solve problems quickly, while
    their competitive drive pushes them to earn CompTIA A+ and Network+ certifications and envision a future on‑site computer repair business in Worcester.
  sports: George Cohen is a regular at the local recreation center basketball courts, idolizes the Boston Red Sox and follows the Boston Celtics closely, occasionally joins a community softball league,
    and never misses a weekend game at Fenway Park when tickets are affordable, reflecting their competitive nature and love for New England sports.
  arts: George Cohen unwinds by listening to electronic‑rock acts like Daft Punk and alternative rap from Kendrick Lamar while streaming narrative‑driven video games such as The Witcher 3, and they occasionally
    attend live indie music shows at Worcester’s local venues to satisfy their creative appetite.
  travel: George Cohen prefers short road trips to coastal New England towns like Portland, Maine for lobster rolls, dreams of attending the Tokyo Game Show in Japan to combine their love of gaming with
    cultural immersion, and balances these desires against a limited student budget and a part‑time job schedule, often planning trips only when they feel a sudden surge of excitement.
  culinary: George Cohen enjoys quick, protein‑rich meals like chicken‑and‑vegetable stir‑fry with garlic and chili flakes, has honed a decent skill at grilling burgers on a small balcony grill, and they
    treat occasional pizza nights with extra pepperoni as a reward after long gaming sessions.
  core: George Cohen blends a competitive, tech‑savvy mindset with laid‑back budgeting and a stubborn reluctance to plan ahead, channeling their calm under pressure into both gaming victories and DIY projects
    while occasionally forgetting to file their taxes on time.
background:
  cultural: George is a second‑generation American of primarily Irish‑American and Italian‑American descent, raised in Fitchburg, Massachusetts. Growing up in a working‑class New England town, he was shaped
    by a community that values practicality, self‑reliance, and a modest work ethic. Family traditions include celebrating St. Patrick’s Day and enjoying Italian‑American cuisine, while his upbringing emphasized
    education and resilience. The regional New England identity—characterized by independence, quiet confidence, and a pragmatic outlook—inform his calm, resilient nature and his preference for structured
    yet flexible approaches to tasks.
