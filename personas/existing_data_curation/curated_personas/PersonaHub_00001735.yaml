persona_description: A philosopher who is a follower of Kant's Idealist school, with a pessimistic view of life. Schopenhauer was born in Danzig and had a large inheritance from his father, which allowed
  him to retire early and devote his life to the study of philosophy. His major work, The World as Will and Idea, was published when he was thirty, but sales were disappointing. Schopenhauer's system of
  philosophy was based on that of Kant's, but he believed that people had no individual wills and that the feeling of separateness was an illusion. Schopenhauer saw the worst in life and was dour and glum,
  believing that he had no individual will and that man was at the complete mercy of all that was about him. He was a brilliant conversationalist and had nobody he could call family. Schopenhauer's "ascetic
  mysticism" was one that appealed to the starving artist.
