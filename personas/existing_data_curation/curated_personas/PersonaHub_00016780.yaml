persona_description: A naval officer who served in the Civil War, particularly during the Union navy's most frustrating campaign in Charleston, South Carolina. Known for his contributions to the development
  of American naval ordnance, particularly in the area of heavy smoothbores and rifled ordnance. His leadership during the campaign was marked by his cooperation with Army forces but hindered by underhanded
  machinations by the ground force commander. He took good care of his enlisted men but failed to inspire his officers. After the war, he commanded the South Pacific Squadron, the Bureau of Ordnance, and
  the Washington Navy Yard.
