persona_description: A person who is interested in policy and evidence related to equity in health, particularly in the context of southern Africa. They are familiar with the annotated bibliography on equity
  in health and have a strong interest in the concept of equity in health and its implementation in national health systems. They are also interested in the development and implementation of policy measures
  and capacities to revitalise, build and consolidate national health systems, particularly those that are public sector led, equitable, people-centred and organized around comprehensive primary health
  care. They are interested in the use of parameters to monitor equity in such health systems and are familiar with the EQUINET work aimed at building national peoples' universal health systems.
