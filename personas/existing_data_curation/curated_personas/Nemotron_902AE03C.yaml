  career_goals: She aims to obtain a Commercial Driver's License (CDL) with endorsements for hazardous materials, allowing her to qualify for higher-paying routes. Long-term, Denysha hopes to transition
    into a trainer or safety instructor role within her company, leveraging her practical experience to mentor newer drivers. She also dreams of eventually owning a small fleet of delivery vans to serve
    local businesses, giving her more control over schedules and reducing stressful overtime. In the meantime, she seeks opportunities to attend workshops on electric vehicle maintenance to stay ahead of
    industry trends, while maintaining a work-life balance that protects her mental wellbeing.
