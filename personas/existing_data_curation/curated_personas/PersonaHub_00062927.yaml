persona_description: A healthcare professional who is concerned with improving maternal health and reducing neonatal tetanus mortality in India. They are aware of the importance of providing prenatal care,
  early intervention, and the need for immunization against tetanus. They are also aware of the challenges faced by rural communities in accessing healthcare services and the need for infrastructure improvements
  in rural areas. They are aware of the importance of nutrition and physical activity during pregnancy and the role of gynaecologists and paediatricians in counseling pregnant women about healthy eating
  and staying active.
