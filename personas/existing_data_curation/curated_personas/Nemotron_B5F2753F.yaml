  career_goals: Rochelle aims to obtain her GED within the next year and pursue a certificate in hospitality or event management. She aspires to work in a dynamic, people‑focused environment such as a boutique
    hotel, community center, or local venue where she can blend her love for social interaction with practical responsibilities. In the longer term she dreams of opening a small café that doubles as a community
    gathering space, allowing her to curate events and support local artists.
