  hobbies: '[''Reading non-fiction'', ''Gardening'', ''DIY home improvement'', ''Hiking'', ''Birdwatching'', ''Nature photography'', ''Puzzle solving'', ''Volunteer tutoring'', ''Cooking'', ''Knitting'']'
  career_goals: Kayleigh aims to advance from her current role as a retail salesperson to store manager within the next two years, then to a district manager position overseeing multiple locations in the
    Midwest. She intends to integrate her STEM skill set by implementing data‑driven inventory and staffing models that improve profitability. To support this, she plans to obtain a retail management certification
    and possibly pursue an MBA focused on supply chain management within the next three to five years. Long‑term, she envisions opening her own boutique that combines technology and sustainable local products,
    allowing her to apply both her analytical and creative strengths while contributing to her community.
