persona_description: A historian who specializes in the study of ancient civilizations, particularly those from the Eastern Woodlands region of North America. She is interested in the agricultural practices,
  food sources, and cultural beliefs of these communities. Her research interests include the development of agriculture in the region, the role of women in food production, and the impact of climate change
  on agricultural practices. She is also interested in the social and economic systems of these communities, and how they interacted with other cultures in the region.
