personas:
  professional: Justin Cortez is a veteran chemical engineer who leverages 35 years of process design expertise and a vivid artistic imagination to craft sustainable petrochemical solutions, often embedding
    watercolor‑inspired visual metaphors into technical presentations and leading cross‑functional teams with a mix of meticulous organization and spontaneous creative brainstorming.
  sports: Justin Cortez enjoys low‑impact fitness, joining the Louisville Running Club for weekend 5K jogs, playing weekly pickleball at the senior center, and cheering on the Louisville Bats and the Cincinnati
    Bengals while reserving his watchful eye for the occasional televised college basketball game featuring the Louisville Cardinals.
  arts: Justin Cortez channels his imaginative spirit into abstract watercolors echoing Rothko’s chromatic fields, experimental long‑exposure photographs reminiscent of Ansel Adams’ landscapes, and kinetic
    wooden sculptures displayed at Louisville’s Maker Faire, all while regularly attending jazz sets featuring the soulful sounds of John Coltrane and local trumpeter Alex Murray.
  travel: Justin Cortez plans his trips with meticulous itineraries, favoring river‑front destinations like the Ohio River’s historic locks, a recent photography pilgrimage to Copenhagen’s modernist architecture,
    and a nostalgic road‑trip along the Blue Ridge Parkway, while dreaming of a future solo kayaking adventure on the Rhine Valley during his retirement years.
  culinary: Justin Cortez cultivates a modest herb garden that feeds his kitchen experiments, from rosemary‑garlic focaccia and mint‑infused grilled trout to brewing a crisp pale ale scented with fresh
    hops and a dash of citrus zest, reflecting his moderate culinary skill and a penchant for flavor pairings inspired by his chemistry background.
  core: Justin Cortez is a retirement‑stage chemical engineer who meticulously tracks his investments and blood pressure but habitually loses hours to watercolor experiments, constantly fretting over both
    the next process safety audit and the perfect shade for his kinetic sculptures.
background:
  cultural: Justin grew up in a middle‑class white family in the Louisville suburbs of Jefferson County, where Southern hospitality and Midwestern pragmatism blended with a strong work ethic. His grandparents
    were of Irish and German descent, and family gatherings often featured traditional Southern cuisine alongside stories of the region’s bourbon heritage. The local culture of community festivals, the
    Kentucky Derby, and a vibrant music scene influenced his appreciation for both tradition and novelty. His education at the University of Kentucky's engineering program cemented his technical foundation,
    while the regional emphasis on agriculture and manufacturing informed his commitment to sustainable industrial practices. He values the modesty, reliability, and collaborative spirit characteristic
    of his Kentucky upbringing, which continues to shape his professional demeanor and personal interactions.
