  career_goals: Approaching retirement, Justin aims to transition from full‑time plant engineering to a consultancy role where he can focus on pioneering sustainable chemical solutions for the Midwest and
    the broader industrial sector. He aspires to lead a collaborative research initiative that merges chemistry with artistic visualization to communicate complex process concepts to non‑technical audiences.
    Additionally, he seeks to mentor the next generation of engineers through university guest lectures and local STEM outreach, hoping to leave a legacy of innovation, safety, and environmental stewardship
    while maintaining a workload that allows him to manage his stress and enjoy personal pursuits.
