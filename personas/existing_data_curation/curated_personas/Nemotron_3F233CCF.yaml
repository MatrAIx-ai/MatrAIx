personas:
  professional: Dangelo Brown, a 41-year-old seasoned school psychologist, merges rigorous data‑driven assessment with community‑focused SEL curriculum design and they leverage practical curiosity to lead
    workshops, secure grant funding, and foster interdisciplinary partnerships that empower rural students.
  sports: Dangelo Brown, an avid hiker of the Blue Ridge foothills and a fan of the Carolina Panthers, regularly joins the Pickens County Trail Runners club, follows the Charlotte Hornets, and they often
    participate in community pick‑up basketball games during the summer.
  arts: Dangelo Brown, a charismatic saxophonist in a community jazz ensemble, draws inspiration from John Coltrane and Kamasi Washington, frequently performs at local food festivals, and they unwind by
    reading contemporary literature from authors such as James Baldwin, Toni Morrison, and Colson Whitehead.
  travel: Dangelo Brown, a planner who prefers weekend road trips to historic towns like Savannah and Asheville, mixes adventure hikes with culinary tours, and they dream of a summer pilgrimage to New Orleans
    to soak in its jazz heritage while staying within a modest travel budget.
  culinary: Dangelo Brown, an intermediate home chef, cultivates a vegetable plot to create low‑country dishes like shrimp and grits, collard green stew, and Hoppin’ John, favoring ingredients such as smoked
    sausage, okra, and fresh tomatoes, and they often host neighborhood potlucks featuring these family recipes.
  core: Dangelo Brown, a sociable, organized, and curiosity‑driven school psychologist, balances community leadership with a love for jazz, gardening, and disciplined financial planning, yet they occasionally
    forget to stretch after long sax solos.
background:
  cultural: Dangelo identifies as African‑American and grew up in the Southern United States, where church life, extended family networks, and a strong oral‑history tradition shaped his worldview. He draws
    on the resilience and communal values of Black Southern culture to foster trust and rapport with students and families. His upbringing in a historically Black neighborhood instilled a deep respect for
    education as a pathway to empowerment, motivating his commitment to equitable mental‑health services. He actively celebrates Black cultural milestones, such as Juneteenth and the legacy of the civil‑rights
    movement, and integrates this cultural awareness into his counseling practice to honor the identities of the students he serves.
attributes:
  skills: '["Student mental‑health assessment", "Crisis intervention and de‑escalation", "Social‑emotional learning (SEL) program design", "Data‑driven decision making", "Individualized Education Program
    (IEP) development", "Teacher and staff consultation", "Behavior‑management strategy implementation", "Public speaking and workshop facilitation", "Grant writing", "Community partnership building", "Culturally
    responsive counseling", "Project management"]'
  hobbies: '["Saxophone playing in a community jazz band", "Youth mentorship through church programs", "Gardening and Southern cooking", "Hiking in the Blue Ridge Mountains", "Reading contemporary African‑American
    literature", "Organizing neighborhood block parties", "Volunteering at community health fairs"]'
  career_goals: Dangelo aims to earn full state licensure as a certified school psychologist and to become the lead psychologist for the Pickens County School District, where he can steer district‑wide
    SEL initiatives and a comprehensive mental‑health task force. He plans to pursue a master’s degree in school psychology to deepen his clinical expertise and to conduct research on culturally responsive
    interventions for Black students in rural settings. Over the next five years, he hopes to secure grant funding for a community‑school mental‑health hub that provides services beyond school hours, mentor
    emerging school psychologists, and advocate for policy changes that increase mental‑health resources in Southern schools.
