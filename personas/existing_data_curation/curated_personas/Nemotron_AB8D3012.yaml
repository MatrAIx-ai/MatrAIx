  career_goals: Amber aspires to pursue a specialized high‑school program or community‑college pathway in visual arts and graphic design, aiming to become a professional illustrator and visual storyteller
    who highlights underrepresented voices. She wants to blend her artistic talent with community activism, eventually working for non‑profits or cultural institutions that celebrate African‑American heritage.
    Long‑term, she envisions earning a degree in Fine Arts or Media Production and possibly teaching art workshops for youth in her hometown of Coaldale.
