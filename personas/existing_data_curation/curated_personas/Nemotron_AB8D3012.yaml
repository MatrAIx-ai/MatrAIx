personas:
  professional: Amber Bingham, a 15‑year‑old aspiring illustrator and youth‑group coordinator, merges a methodical, planning‑oriented mindset with a boundless curiosity for visual storytelling, turning
    sketch‑filled journals and digital art experiments into weekly community art‑fair displays and volunteer‑led mural projects.
  sports: Amber Bingham enjoys weekend hikes on nearby nature trails with the local Trailblazers Club, follows the high school cross‑country team for training inspiration, and roots for the hometown minor‑league
    baseball team, the River City Rattlers, while maintaining a self‑directed cardio routine that balances outdoor exploration with occasional video‑game‑induced sedentary periods.
  arts: Amber Bingham immerses themselves in artistic expression by sketching passersby at the community art fair, drawing digital tributes to musicians like Nina Simone, Kendrick Lamar, and Billie Eilish,
    and writing poetry inspired by Maya Angelou’s verses, while regularly attending performances by the city’s symphony orchestra and spoken‑word open‑mic nights.
  travel: Amber Bingham prefers thoughtfully planned weekend getaways, such as camping in the Blue Ridge Mountains and exploring the historic streets of New Orleans, while dreaming of a solo backpacking
    trip through the Scottish Highlands, balancing a love for nature’s solitude with a curiosity for vibrant cultural festivals.
  culinary: Amber Bingham enjoys baking family‑passed chocolate‑chip banana bread and mastering the precise layers of a classic lasagna, while experimenting with fusion dishes like kimchi‑topped avocado
    toast, reflecting a cooking skill level that blends confident home‑cooking with occasional daring flavor combos.
  core: Amber Bingham is a methodical teen artist who juggles sketchbooks, digital tablets, and a penchant for spontaneous midnight gaming, all while habitually over‑packing their backpack for hikes and
    forgetting to water their houseplants.
background:
  cultural: Amber is a Black teenager raised in Coaldale, Pennsylvania, a small town with deep roots in the coal‑mining region of Schuylkill County. Her family’s history traces back to the Great Migration,
    and her upbringing is shaped by the close‑knit African‑American church community, gospel music traditions, and rich family storytelling. Local cultural events, such as the Schuylkill County African‑American
    Heritage Day, reinforce her connection to Black history and collective memory. Family gatherings often feature soul food recipes passed down through generations, and church choirs provide a foundation
    for her appreciation of music and performance. This cultural tapestry informs her artistic expression and fuels her desire to represent her heritage through visual storytelling.
