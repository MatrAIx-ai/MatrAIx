personas:
  professional: Sharmila Boulin is an aspiring young scientist who channels a meticulous habit of notebook‑keeping into detailed sketch‑journals of dinosaurs and space missions, fuses creativity with engineering
    by building LEGO rockets, and leverages early Scratch coding to animate their own scientific stories, all while balancing a competitive drive to out‑design peers' projects.
  sports: Sharmila Boulin is a member of the San Diego Youth Swim Club, prefers solitary laps in the community pool over team sports, cheers for the San Diego Padres during family outings, follows the San
    Diego Wave FC for inspiration, and they often watch games alone while tallying personal best times.
  arts: Sharmila Boulin devotes after‑school hours to watercolor landscapes inspired by Studio Ghibli’s Miyazaki films, sketches dinosaur scenes reminiscent of Dr. Seuss’s whimsical style, creates short
    Scratch animations set to the playful tunes of They Might Be Giants, and they keep a tiny collection of art supplies that sometimes ends up scattered across their bedroom floor.
  travel: Sharmila Boulin loves weekend explorations of La Jolla’s tide pools, day trips to Balboa Park’s Model Railroad Museum, annual family visits to Legoland California, a summer road‑trip to the Grand
    Canyon that sparked a longing to see the night sky from desert cliffs, and they often map future trips with crayons on a notebook.
  culinary: Sharmila Boulin enjoys munching on fish tacos with cabbage slaw at a local seaside stand, crafting avocado toast topped with lime zest and a pinch of sea salt, blending fresh strawberries into
    a sweet‑tangy smoothie with banana and a splash of almond milk, and they occasionally help their parents bake chocolate chip cookies, though they tend to over‑mix the batter.
  core: Sharmila Boulin is an introspective eight‑year‑old explorer who thrives in solitary creative labs, meticulously saves allowance for future space‑tech projects, questions others’ motives with a competitive
    edge, and they balance a cautious optimism with a knack for turning curiosity into tiny digital animations.
background:
  cultural: Sharmila was raised in a suburban neighborhood of San Diego, California, within a family that identifies with mainstream Anglo‑American traditions. Her household celebrates typical U.S. holidays
    such as Thanksgiving, Fourth of July, and Christmas, while also embracing the diverse cultural landscape of the region—occasionally attending community festivals, visiting local museums, and exploring
    the coastal environment. The multicultural atmosphere of San Diego, with its blend of Hispanic, Asian, and Pacific influences, provides Sharmila with a broad perspective, though her family’s cultural
    practices remain centered on valuing education, personal responsibility, and independent curiosity. Access to the city’s vibrant arts programs and science centers further nurtures her interests in both
    creativity and scientific inquiry.
