  career_goals: Sharmila envisions a future where she can explore the mysteries of the universe while expressing them through art. She aspires to become an astronaut or a space‑engineer, designing spacecraft
    and later illustrating the cosmos in vivid paintings. Her competitive nature fuels a desire to excel in science fairs, art contests, and future robotics competitions. She hopes to merge her scientific
    curiosity with her creative talents, ultimately working in a role such as a planetary scientist‑artist or a museum curator who creates interactive exhibits that inspire other young explorers.
