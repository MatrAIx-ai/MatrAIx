  hobbies: '[''Abstract painting'', ''Digital photography'', ''Reading speculative fiction'', ''Philosophy'', ''Listening to jazz'', ''Sketching'', ''Writing reflections'', ''Tinkering with vintage radios'',
    ''Building reclaimed furniture'']'
  career_goals: Approaching retirement, Jacob aims to shift from full‑time custodial duties to a part‑time caretaker role at the Manitowoc Maritime Museum, where he can blend his facility‑management expertise
    with his love of art and local history. He also hopes to organize a quarterly workshop for fellow custodial staff on sustainable cleaning methods and creative problem‑solving. On a personal level, Jacob
    plans to develop a modest body of abstract artwork for a solo exhibition at the local community center and to publish a short collection of memoir‑style essays reflecting on the intersection of manual
    labor and imagination.
