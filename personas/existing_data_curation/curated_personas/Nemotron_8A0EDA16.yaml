personas:
  professional: Jacob Miles, a veteran custodial professional with thirty‑plus years mastering floor care, chemical safety, and routine facilities maintenance, blends their imaginative curiosity and love
    of texture into developing sustainable cleaning solutions, improvising repairs, and curating the museum’s environment with the same artistic precision they apply to their abstract paintings.
  sports: Jacob Miles enjoys low‑impact fitness through weekly shoreline walks, occasional kayaking on Lake Michigan, and playing in a senior bowling league at the local community center, while cheering
    on the Milwaukee Brewers and the Green Bay Packers, and they belong to a small cycling club that organizes autumn rides through the Door County countryside.
  arts: Jacob Miles immerses themselves in abstract painting inspired by Jackson Pollock’s drip techniques, digital photography echoing Ansel Adams’ mastery of light, reading speculative fiction by Ursula
    K. Le Guin, listening to Miles Davis jazz vinyl, and crafting simple wooden furniture reminiscent of Scandinavian design, all of which inform the reflective essays they plan to publish.
  travel: Jacob Miles prefers spontaneous, self‑planned road trips along the Great Lakes—such as sailing to the Apostle Islands, exploring the historic lighthouses of Door County, and dreaming of a future
    pilgrimage to the ancient ruins of Machu Picchu—balancing a modest retirement budget with a love for both rugged adventure and quiet lakeside contemplation.
  culinary: Jacob Miles enjoys hearty Midwestern comfort foods like smoked trout chowder with fresh dill, hand‑made pierogi stuffed with potato and cheese, and occasional farm‑to‑table salads featuring
    heirloom tomatoes and rosemary, cooking at a moderate skill level in their reclaimed‑pallet kitchen while savoring a classic espresso from a local roaster after a day of studio work.
  core: Jacob Miles blends a disciplined custodial career with a restless artistic soul, navigating retirement by turning routine cleaning into sustainable craftsmanship while chasing light on abandoned
    factories and sketching the fleeting silhouettes of lake sunsets.
background:
  cultural: Jacob grew up in a modest, working‑class family in Manitowoc, a city shaped by German‑Scandinavian immigrant roots and the Great Lakes industrial heritage. The Midwest values of self‑reliance,
    humility, and community service informed his work ethic and his preference for quiet, close‑knit gatherings such as neighborhood potlucks and local art fairs. He maintains a connection to the region’s
    maritime culture through annual visits to the local maritime museum and by participating in lake‑front clean‑up initiatives. While he identifies as culturally white American, his upbringing blends Midwestern
    pragmatism with a subtle appreciation for the Germanic traditions of craftsmanship and seasonal celebrations like Oktoberfest.
