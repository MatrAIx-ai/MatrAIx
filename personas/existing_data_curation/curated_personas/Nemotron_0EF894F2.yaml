  career_goals: Although only three, Ryan frequently shares his future dreams during play. He expresses a desire to become a teacher because he enjoys helping friends learn new things and feels comfortable
    in small groups. He also shows interest in building and fixing, hinting at a future ambition to be an engineer or carpenter. These aspirations reflect his blend of curiosity and practicality, as well
    as his preference for organized, purposeful activities.
