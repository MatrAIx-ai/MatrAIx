persona_description: A researcher and activist who is interested in the politics, economics, histories, ecologies, and social conditions surrounding sites of contemporary resource extraction. They are particularly
  drawn to the exploration of mining sites and the transformation of the earth at a scale that compels architecture to think beyond individual buildings. They are also interested in the legal scenarios,
  local politics, labor rights, and geo-remediation of these sites. They are looking for innovative ways to think about architecture and construction in the face of resource scarcity and large-scale manipulation
  of the earth's surface. They are passionate about the potential of these sites to mobilize and rethink the scale of architecture.
