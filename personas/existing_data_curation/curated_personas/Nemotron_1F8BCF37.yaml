  career_goals: Braedon aims to complete his associate degree in Business Administration within the next year and secure a full‑time administrative or community‑coordination role that offers a predictable
    schedule and clear responsibilities. He envisions growing into a supervisory position such as Office Manager or Community Programs Coordinator, where he can combine his organizational strengths with
    his desire to support others and maintain harmonious work environments. Long‑term, he hopes to obtain a certification in project management to broaden his career prospects while maintaining a stable,
    routine‑oriented work life.
