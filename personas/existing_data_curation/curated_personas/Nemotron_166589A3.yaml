  career_goals: Norge aims to expand his personal brand into a boutique brokerage that specializes in serving the Cuban‑American market, targeting a top‑5% ranking among Miami‑Dade agents within the next
    three years. He plans to mentor younger agents, incorporate cutting‑edge virtual tour technology, and develop a legacy of community involvement by establishing a scholarship fund for local high‑school
    students interested in real estate. While preparing for eventual retirement, he seeks to achieve a cumulative sales volume of $200 million and secure a passive income stream through strategic property
    investments.
