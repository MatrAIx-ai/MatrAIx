personas:
  professional: Alexie Jennewein, a 32‑year‑old fast‑food shift lead, leverages precise inventory control, Canva graphics, and a vivid imagination to design eye‑catching menu specials while mentoring staff
    and driving the restaurant toward their goal of becoming a manager within three years.
  sports: Alexie Jennewein enjoys Saturday morning yoga, volunteers as a line‑dancing instructor at community events, roots for the Atlanta Falcons and Atlanta Braves, and plays in a local co‑ed softball
    league during spring while they track progress on Strava.
  arts: Alexie Jennewein spends evenings crafting abstract acrylic canvases influenced by Kandinsky and Georgia O'Keeffe, curates a Pinterest board of Tame Impala and local folk playlists, and reads speculative
    fiction by N. K. Jemisin to fuel their visual storytelling.
  travel: Alexie Jennewein prefers weekend road trips to rustic towns like Savannah, Asheville, and New Orleans, meticulously maps routes on Google Maps, while dreaming of a summer immersion in Tuscany
    to study regional cuisine and fresco painting, and they keep a travel sketchbook for each stop.
  culinary: Alexie Jennewein, a culinary experimenter, blends Southern staples like fried chicken and sweet tea glaze with unexpected ingredients such as rosemary‑infused honey and smoked paprika, skillfully
    prepares shrimp and grits with fresh garden herbs, and records each trial in a leather‑bound recipe journal for their reference.
  core: Alexie Jennewein is a meticulous, imaginative Southern soul who fuses community‑rooted hospitality with bold art and flavor experiments, and they balance disciplined ambition with a love for line
    dancing, yoga, and midnight sketch sessions.
background:
  cultural: Alexie is a white Southern American raised in Locust Grove, Georgia. She grew up in a community where Southern hospitality, church involvement, and family gatherings are central. The region’s
    culinary traditions—fried chicken, BBQ, and sweet tea—have shaped her palate and inspire her culinary curiosity. Local festivals such as Butts County Days and the county’s historic fairs provide a backdrop
    for her love of community events and music. While she embraces the values of hard work, modesty, and neighborly support common in rural Georgia, she also stays connected to broader American pop culture
    through online art communities and streaming media, creating a blend of traditional Southern roots with contemporary, globally informed interests.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''POS system operation'', ''Food safety compliance'', ''Inventory management'', ''Schedule planning and staff rostering'', ''Process improvement'', ''Creative
