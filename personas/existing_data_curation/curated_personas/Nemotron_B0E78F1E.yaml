  hobbies: '[''Acrylic painting'', ''Sketching'', ''Photography'', ''Reading speculative fiction'', ''Exploring contemporary art theory'', ''Experimental cooking and recipe development'', ''Herb gardening'',
    ''Yoga'', ''Line dancing'', ''Volunteering at the local library (children’s reading and art workshops)'', ''Attending local art fairs and community festivals'']'
  career_goals: Alexie aspires to advance from a counter position to a management role within the hospitality sector, aiming to become a restaurant manager within the next three years. She plans to complete
    a bachelor's degree in Hospitality Management or Culinary Arts, building on her associate's credentials. Long‑term, she envisions opening a boutique café that blends her love of art and food—a space
    where locally sourced dishes are presented with visually striking plating and where her own paintings adorn the walls. Additionally, she hopes to design community workshops that teach cooking and basic
    art techniques, fostering creativity in Locust Grove's residents. She is also interested in leveraging social media to build a personal brand that showcases her culinary experiments and artwork.
