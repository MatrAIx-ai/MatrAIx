  skills: '[''Basic carpentry'', ''Minor home repairs'', ''Vehicle maintenance'', ''Gardening'', ''Barbecue cooking'', ''Household budgeting'', ''Community volunteer coordination'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Watching baseball (Houston Astros) and football (Houston Texans)'', ''Listening to classic rock and country music'', ''Barbecue cooking'', ''Woodworking'', ''Community
    fair participation'', ''Bingo at the senior center'', ''Crossword puzzles'', ''Reading short stories'']'
  career_goals: Michael aims to preserve his independence and health as he ages. He wants to stay active through gardening, fishing, and regular walks. He hopes to expand his hobby of refurbishing old furniture
    into a modest home‑based business, selling pieces at local flea markets. He is considering enrolling in a GED program to earn a high‑school equivalency, partly to set a positive example for his grandchildren.
    Michael also seeks a larger role at the senior center, possibly leading event planning. Finally, he wishes to travel to a few Texas destinations, such as the Gulf Coast beaches and Hill Country wineries,
    with his sister.
