  career_goals: Yoo aims to transition from a line worker to a supervisory or training role within the next five years, leveraging his extensive on‑the‑job knowledge to mentor younger employees and improve
    overall floor efficiency. He plans to enroll in a community‑college certification program for CNC programming and industrial automation to stay relevant as manufacturing technology advances. While maintaining
    a stable income for his family and future retirement, he also hopes to reduce physical strain by moving into a quality‑assurance or safety‑audit position that allows more flexibility for his personal
    pursuits. Ultimately, he wants to leave a legacy of safety consciousness and collaborative spirit at his plant, while ensuring a comfortable retirement that funds his artistic hobbies.
