personas:
  professional: Yoo Xiao, a veteran CNC machinist at a Midwestern automotive parts plant, combines three decades of hands‑on equipment tuning, preventive maintenance, and OSHA safety compliance with a quiet
    curiosity for design, often improvising low‑key workflow fixes and crafting simple safety graphics while maintaining a relaxed, occasionally disorganized schedule that nevertheless keeps the production
    line humming.
  sports: Yoo Xiao, who prefers quiet solitude over team sports, spends weekends fishing on Lake St. Clair, trekking the Porcupine Mountains with the Michigan Outdoor Adventures Club, follows the Detroit
    Tigers, Detroit Lions, and Michigan Wolverines from their garage, and occasionally joins a casual adult basketball league for light cardio.
  arts: Yoo Xiao, a solitary craftsman, channels their love for aesthetics into reclaimed‑wood furniture, meticulous bonsai pruning, and low‑light street photography inspired by Ansel Adams, while evenings
    are often spent studying Monet and Kant and quietly attending local Yo‑Yo Ma cello recitals.
  travel: Yoo Xiao, who favors low‑key, self‑planned getaways, explores Michigan’s Upper Peninsula and the Great Lakes islands on weekend road trips, dreams of a quiet pilgrimage to Kyoto’s historic temples
    and the art museums of Florence, and always packs their vintage film camera for spontaneous shots.
  culinary: Yoo Xiao, an understated food enthusiast, enjoys delicate sushi rolls, hand‑rolled dumplings, and miso broth at community festivals, while at home they experiment with marinating reclaimed‑wood‑smoked
    salmon and perfecting a Michigan cherry‑pie glaze, though their cooking remains modest, favoring simple stovetop techniques over elaborate recipes.
  core: Yoo Xiao blends a quiet, solitary curiosity for art and precision engineering, juggling meticulous bonsai, vintage photography, and a steady CNC career while habitually delaying paperwork and savoring
    the simple rhythm of wood shavings and lake breezes.
background:
  cultural: Yoo Xiao is the son of East Asian immigrants, likely of Chinese or Korean descent, who settled in the Detroit metropolitan area during the late 20th century. His upbringing combined traditional
    values—such as respect for elders, emphasis on family cohesion, and a modest work ethic—with the Midwestern sensibilities of community involvement and practicality. At home, he grew up speaking his
    parents' native language and celebrating holidays like Lunar New Year, Mid‑Autumn Festival, and ancestor memorial rites, while also embracing American customs such as Thanksgiving and Fourth of July.
    This bicultural experience informs his polite, cooperative demeanor, his appreciation for harmony, and his subtle incorporation of traditional cuisine and art forms into his daily life. Living in Fenton,
    MI has further blended his cultural identity, allowing him to maintain strong family ties within the East Asian diaspora while participating fully in local community activities and the regional working‑class
    culture.
