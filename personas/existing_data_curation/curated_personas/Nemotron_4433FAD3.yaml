  hobbies: '[''Landscape painting'', ''Wood carving'', ''Gardening (vegetable and native plants)'', ''Acoustic guitar playing'', ''Local music festivals'', ''Reading historical fiction and popular science'',
    ''Hiking the Appalachian foothills'', ''Volunteer mentorship at senior center'', ''Community theater acting'', ''Digital photography'']'
  career_goals: Although retired from formal employment, Sean aims to deepen his impact on the Calhoun community. He aspires to launch a quarterly art‑and‑storytelling workshop that pairs senior mentors
    with local youth, preserving regional folklore while fostering creativity. He also hopes to complete a series of digital photography courses to document Gordon County’s natural and cultural landmarks,
    eventually publishing a coffee‑table book. Beyond that, Sean plans to serve on the board of the local historical society, championing initiatives that blend heritage preservation with interactive community
    events.
