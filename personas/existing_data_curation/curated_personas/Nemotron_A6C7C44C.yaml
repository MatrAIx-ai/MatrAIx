personas:
  professional: Rhonda Norris is an aspiring junior architect, applying their love for drawing animals and constructing LEGO sets to early design play while demonstrating a practical, structured mindset
    even in casual activities.
  sports: Rhonda Norris plays for the Waynesfield Little Soccer Club, practices daily after school, cheers for FC Cincinnati in the MLS and the Ohio State Buckeyes football team during fall, and spends
    summer weekends riding their bike along the town’s park trails.
  arts: Rhonda Norris draws detailed wildlife sketches, dances to pop hits by Taylor Swift and BTS, sings along to Disney’s Moana soundtrack, and builds LEGO sculptures of Star Wars characters, blending
    visual, musical, and tactile creativity.
  travel: Rhonda Norris enjoys family road trips to Hocking Hills State Park and visits to Cedar Point amusement park, and dreams of future adventures exploring the Grand Canyon and Disney World.
  culinary: Rhonda Norris loves helping Mom bake buttery chocolate‑chip cookies, devours pepperoni‑and‑mushroom pizza with extra cheese, and reaches for crunchy carrot sticks and crisp apple slices as a
    healthy snack.
  core: Rhonda Norris is a lively, structure‑loving 7‑year‑old who balances soccer, LEGO building, and drawing with a penchant for misplacing socks and over‑enthusiastic snack cravings.
background:
  cultural: Rhonda was raised in Waynesfield, a small town in Allen County, Ohio, within a white, Midwestern American family that values community, modesty, and a connection to the outdoors. Her parents
    are involved in local farming and community events, and she regularly attends the town’s elementary school, church gatherings, and county fairs. The local culture emphasizes friendliness, cooperation,
    and a love for nature, which influences Rhonda’s sociable, kind, and cooperative personality.
