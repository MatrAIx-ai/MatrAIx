  career_goals: Guided by his love for structure and achievement, Mustafa aspires to become a robotics engineer. He envisions himself attending a specialized STEM high school, joining competitive robotics
    teams, and eventually earning a scholarship to a top engineering university. His long‑term ambition is to design autonomous systems that combine precision engineering with intelligent software, aiming
