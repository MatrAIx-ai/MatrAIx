  hobbies: '[''Listening to hip‑hop, R&B, and gospel music'', ''Poetry and journaling'', ''Comic‑style drawing'', ''Church youth choir and service projects'', ''Pickup basketball'', ''Cooking family recipes'',
    ''Creating TikTok videos'']'
  career_goals: Deborah hopes to pursue a career that blends service to her community with creative expression. She is drawn to mental‑health counseling or community health work, inspired by her own experiences
    with anxiety and her desire to help peers manage stress. She also dreams of earning a nursing scholarship to work in a local hospital, where she can apply her practical problem‑solving skills. At the
    same time, she wants to keep a side‑project as a digital content creator, using video and music to raise awareness about youth mental health and celebrate African‑American culture in the Lowcountry.
