persona_description: A climate scientist who specializes in studying the impacts of El Niño-Southern Oscillation (ENSO) on the variability of the coupled atmosphere-ocean system and the spatio-temporal
  climatological evolution of the principal monsoon systems of the World. They are also interested in analyzing the output from various experiments based on the current generation of climate models developed
  at GFDL, with focus on simulating synoptic and subsynoptic scale features appearing in integrations with high-resolution (50 km or less) models and the characteristics of diurnal cycle in model atmospheres.
  They are interested in exploring the reliability of air temperature trends based on two leading satellite datasets via comparison with independently measured temperatures derived from radiosondes and
  comparing the details of the vertical variation in temperature trends from climate models with those derived from observed data.
