persona_description: A military aviation enthusiast who is interested in the history and development of aerial gunnery training. They are particularly fascinated by the story of the Flexible Gunnery School
  at Buckingham Field, which was established in 1942 and taught advanced gunnery techniques to volunteer aircrew members. They are intrigued by the various training techniques used, such as the “estimate
  speed” sighting system and the “apparent motion” sighting system, and the importance of these in improving accuracy. They are also curious about the experiences of the students who “washed out” of the
  school and the factors that led to high attrition rates.
