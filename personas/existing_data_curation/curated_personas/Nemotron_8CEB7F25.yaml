    Outreach and Public Speaking'']'
  hobbies: '[''Community Theater Acting'', ''Softball League Participation'', ''Hiking and Nature Photography'', ''Cooking and Shared Meals'', ''Volunteer Work (Habitat for Humanity)'', ''Book Club (Literature
    & Philosophy)'', ''Yoga and Mindfulness Practice'', ''DIY Home Improvement Projects'', ''Attending Live Music and Local Festivals'', ''Exploring Emerging Design Technologies (VR/AR)'']'
  career_goals: Sheldon aims to earn his Professional Engineer (PE) license and pursue an MBA to position himself for a senior director role overseeing regional infrastructure projects. He aspires to lead
    a landmark public building in Nebraska that fuses historic preservation with cutting‑edge sustainable design, creating a lasting legacy for his community. He is committed to fostering a workplace culture
    that prioritizes mental‑health awareness, mentorship, and collaborative innovation. In the longer term, he envisions launching his own consultancy focused on community‑centric architecture and engineering
    solutions that balance practicality with creative ambition.
