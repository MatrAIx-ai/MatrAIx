personas:
  professional: Sheldon Panko, a seasoned architect‑engineer, leverages BIM mastery, project‑management finesse and a humanities‑informed communication style to steer complex infrastructure projects from
    concept to construction while championing historically sensitive, sustainable design.
  sports: Sheldon Panko plays on the Lincoln Community Softball League, follows the Nebraska Cornhuskers football team, hikes the Sandhills on weekends, and keeps fit with sunrise yoga sessions, balancing
    competitive spirit with a love for low‑impact outdoor activity.
  arts: Sheldon Panko stars in local theater productions, often channeling the wit of Neil Simon, enjoys live performances by The Lumineers, collects prints of Grant Wood, and fuels their book club discussions
    with the works of Camus and Woolf.
  travel: Sheldon Panko favors meticulously planned road trips to historic sites like the Chimney Rock National Historic Site and vibrant festivals in Austin, but also squeezes in spontaneous weekend getaways
    to Yellowstone, blending a love for regional history with a craving for new scenery.
  culinary: Sheldon Panko experiments with farm‑to‑table recipes, frequently preparing grilled grass‑fed steak with rosemary‑garlic butter, hearty vegetable lasagna, and sourdough bread using locally milled
    flour, while proudly showcasing the occasional over‑spiced chili that becomes a neighborhood talk‑starter.
  core: Sheldon Panko is a community‑driven architect‑engineer whose curiosity, emotional intensity, and love for collaborative creation shape a life of sustainable design, spirited theater, and relentless
    self‑improvement.
background:
  cultural: Sheldon grew up in a small farming community near Dwight, Nebraska, with roots in German‑American heritage. The midwestern values of hard work, neighborliness, and modesty shaped his outlook,
    while his liberal arts education broadened his appreciation for history, literature, and cultural nuance. He identifies with the "Nebraska nice" ethos—polite, cooperative, and community‑oriented—and
    carries a pragmatic, down‑to‑earth approach to both personal and professional challenges. Although raised in a Protestant (Lutheran) household, his cultural identity is more defined by the spirit of
    community service, civic involvement, and an inclusive respect for diverse perspectives.
attributes:
  skills: '[''Project Management'', ''Construction Scheduling'', ''Budgeting and Cost Control'', ''Structural Design Review'', ''Building Code Compliance'', ''BIM and CAD Proficiency (Revit, AutoCAD)'',
