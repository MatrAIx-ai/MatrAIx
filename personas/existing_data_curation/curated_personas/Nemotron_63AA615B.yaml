personas:
  professional: Sergio Sardinas is a budding game developer who codes simple Scratch games, sketches UI mockups for his own projects, and leverages their curious‑practical mindset to iterate quickly while
    staying reliably organized, balancing teamwork after soccer with moments of solitary coding.
  sports: Sergio Sardinas plays in the Miami United U‑14 soccer league, idolizes Inter Miami CF’s midfielders, trains on weekends at the community park, and they complement the sport with weekend bike rides
    along South Beach, while also championing teamwork and inclusive play through volunteering at the neighborhood food bank.
  arts: Sergio Sardinas sketches vibrant Miami beachscapes inspired by the murals of Jose Parla, strums a six‑string guitar with influences ranging from the Gipsy Kings to Billie Eilish, and they absorb
    graphic novels by Brian K Vaughan and classic sci‑fi comics such as Watchmen with a curious eye for storytelling while keeping a practical habit of penciling daily.
  travel: Sergio Sardinas loves day‑tripping on a rented bike to the nearby Everglades, values solo reflection during beach sunsets, dreams of exploring Barcelona’s street art and guitar culture, and they
    save holiday budget for a family weekend getaway to the Florida Keys, balancing independent adventure with family time.
  culinary: Sergio Sardinas enjoys chowing down on fish tacos with fresh mango salsa, can whip up a decent pasta al pesto using basil, pine nuts, and olive oil, and they eagerly hunt for the perfect Cuban
    sandwich with ham, pickles, mustard, and Swiss cheese, though they sometimes skip a homemade meal in favor of a quick snack after late‑night gaming.
  core: Sergio Sardinas balances a calm, methodical approach to schoolwork with spontaneous bursts of guitar riffs and midnight bike rides, often forgetting homework in favor of sketching sunset scenes,
    and they rely on their resilient optimism to bounce back from any missed assignments.
background:
  cultural: Sergio grows up in a vibrant Hispanic/Latino household in Miami, where Spanish is spoken at home and family gatherings feature traditional foods like empanadas, arroz con pollo, and tropical
    fruit drinks. His family celebrates cultural holidays such as Día de los Muertos, Hispanic Heritage Month, and local festivals that highlight Latin music, dance, and art. The multicultural environment
    of Miami‑Dade County exposes him to a blend of Caribbean, Central, and South American influences, shaping his appreciation for diverse rhythms, cuisines, and stories. Family values emphasize respect,
    close‑knit relationships, and community service, which reinforce his compassionate and cooperative personality.
