  career_goals: Sergio aims to pursue a career that blends his technical curiosity with his strong desire to help others. He envisions studying computer science or public health in high school and college,
    eventually creating digital tools—such as mobile apps or interactive platforms—that educate and empower under‑served youth about health, nutrition, and mental well‑being. Alternatively, he is also interested
    in becoming a community health worker or youth counselor, working directly with families in Miami’s neighborhoods to promote wellness and resilience. His long‑term ambition is to be a bridge between
    technology and community service, using his skills to foster positive change.
