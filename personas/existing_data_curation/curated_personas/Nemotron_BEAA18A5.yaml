  hobbies: '[''drawing and sketching'', ''creating comic strips'', ''reading graphic novels'', ''basic digital illustration'', ''cooking traditional Mexican recipes with family'', ''exploring local parks
    and nature trails'', ''playing Minecraft'', ''listening to a mix of pop and regional Mexican music'']'
  career_goals: Ashley dreams of turning her love for art and technology into a future career as a multimedia artist or graphic designer, where she can blend Mexican cultural motifs with modern digital
    media. She is also intrigued by the idea of using visual storytelling to raise awareness about environmental issues affecting the Gulf Coast, imagining a role that combines creative communication with
    advocacy. While she enjoys dreaming big, she stays grounded by aiming to excel in school art classes and seek mentorship from teachers and community artists.
