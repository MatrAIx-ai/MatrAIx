personas:
  professional: Ashley Gonzalez, an 11‑year‑old comic enthusiast, spends afternoons doodling characters, experimenting with watercolor and digital illustration tools, and channels their curiosity into developing
    comic panels that blend mythic folklore with modern cityscapes, while they embrace a relaxed, improvisational workflow that reflects a flexible approach to obligations.
  sports: Ashley Gonzalez, a member of the Houston Rangers Youth Soccer club who also enjoys playing kickball during recess, cheers loudly for the Houston Astros on game nights, and while they use Saturday
    park visits to sketch wildlife rather than engage in rigorous workouts, they balance a love for casual team sports with a laid‑back approach to fitness.
  arts: Ashley Gonzalez, a budding illustrator who devours graphic novels by Stan Lee, collects Art Spiegelman’s Maus, idolizes Frida Kahlo’s vibrant storytelling, and spends free time recreating scenes
    from Hayao Miyazaki’s films in watercolor while humming to indie pop tracks from Clairo, and they let their eclectic tastes shape a unique artistic voice.
  travel: Ashley Gonzalez, who prefers spontaneous weekend getaways, has explored San Antonio’s River Walk during a family fiesta, visited Puebla, Mexico for a quinceañera celebration, dreams of wandering
    the ancient ruins of Chichén Itzá and the colorful streets of Oaxaca, but they usually stay within a parents‑planned road‑trip radius that balances school duties and a modest travel budget.
  culinary: Ashley Gonzalez, who loves helping in the kitchen, enjoys mastering the perfect salsa verde with fresh tomatillos, rolling soft corn tortillas for tacos al pastor, simmering arroz con pollo
    with saffron and peas, and occasionally experiments with guacamole flavored with lime and cilantro, while they often forget to clean up the mess, leaving a trail of chopped cilantro on the counter.
  core: Ashley Gonzalez, an 11‑year‑old art‑obsessed dreamer, flips between sketchbooks and Minecraft forts, hoards a rainbow piggy bank, battles pollen sneezes, and they occasionally forget to clean their
    room, embodying a curious yet delightfully disorganized spirit.
background:
  cultural: Ashley is a Mexican‑American raised in Houston, Texas, in a bilingual household where Spanish and English flow seamlessly. Her family celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and the annual quinceañera of relatives, providing her with a rich tapestry of cultural stories, music, and food. Growing up in the diverse neighborhoods of Houston, she experiences a
    blend of Tex‑Mex cuisine, community festivals, and a vibrant arts scene that reflects both her heritage and the multicultural environment of the city. This cultural duality fuels her curiosity, encouraging
    her to explore how Mexican folklore can intersect with contemporary art forms.
