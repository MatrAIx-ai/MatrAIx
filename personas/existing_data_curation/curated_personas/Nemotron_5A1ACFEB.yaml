personas:
  professional: Michael Mattie, a seasoned industrial equipment operator with 35+ years of CNC, mechanical and electrical troubleshooting experience, channels their practical curiosity and critical eye
    into mentoring younger workers while balancing meticulous adherence to safety with a willingness to experiment on low‑risk process improvements.
  sports: Michael Mattie, an avid fall hiker and weekend angler, follows the New England Patriots and Boston Red Sox religiously, belongs to the local Swanzey Trout Club, and keeps fit by trekking the White
    Mountains each October, though they skip regular gym workouts in favor of informal lumber‑yard strength training.
  arts: Michael Mattie, a modest woodworker and model‑train enthusiast, finds creative release in crafting detailed railroad scenery while listening to classic‑rock legends like Led Zeppelin, The Rolling
    Stones and The Who, and occasionally strolls the regional folk‑art exhibits featuring artists such as Andrew Wyeth, which fuels their appreciation for understated storytelling.
  travel: Michael Mattie, a measured traveler who favors road trips over flights, has explored the historic lighthouses of Maine, trekked the Acadia National Park coastline, and dreams of a quiet pilgrimage
    to the Scottish Highlands to trace ancestral roots, always planning itineraries around off‑season rates and the rhythm of local festivals.
  culinary: Michael Mattie, a competent home cook with a penchant for hearty New England fare, frequently whips up clam chowder with fresh clams, potatoes, and thyme, grills maple‑glazed trout caught on
    their own outings, and savors a slice of apple‑cinnamon crumble, while reluctantly admitting a habit of over‑salting their dishes during late‑night woodworking sessions.
  core: Michael Mattie, a pragmatic yet curious 61‑year‑old who balances meticulous work ethic with a solitary love for woodworking, fishing, and classic rock, navigates life with a mix of quiet determination,
    occasional anxiety spikes, and a penchant for careful budgeting.
background:
  cultural: Michael comes from a multi‑generational New England working‑class family, primarily of English‑Irish ancestry. He was raised in a small Connecticut town before moving to Swanzey, New Hampshire,
    where his grandparents had settled in the early 1900s. The community values self‑reliance, modesty, and a strong work ethic, which shaped his practical outlook. He grew up attending a local Congregational
    church, though his adult years have been marked by a more secular, personal approach to spirituality. His cultural identity includes a respect for seasonal rhythms, an appreciation for regional history,
    and a preference for low‑key community gatherings over large social events.
attributes:
  skills: '[''Machine operation'', ''Preventive maintenance'', ''Mechanical and electrical troubleshooting'', ''Quality inspection'', ''Safety compliance'', ''Lean process improvement'', ''Inventory management'',
    ''Basic CNC programming'', ''Team shift coordination'']'
  hobbies: '[''Woodworking'', ''Model train building'', ''Fishing'', ''Reading historical nonfiction'', ''Crossword and Sudoku puzzles'', ''Hiking in the White Mountains'', ''Genealogy research'', ''Listening
    to classic rock music'']'
  career_goals: Approaching retirement, Michael aims to transition into a mentorship role where he can train newer employees in safe machine operation and lean‑manufacturing techniques. He hopes to earn
    a certified shift supervisor badge within the next year, which would give him a modest raise and the chance to influence scheduling in a way that reduces overtime stress for the crew. Long‑term, he
    envisions consulting part‑time for small local manufacturers, helping them adopt low‑cost efficiency upgrades while still working part‑time at the plant for steady income and benefits.
