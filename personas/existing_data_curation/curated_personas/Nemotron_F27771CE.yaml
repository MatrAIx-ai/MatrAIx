  hobbies: '[''Reading'', ''Book club participation'', ''Gardening'', ''Nature walks'', ''Yoga'', ''Meditation'', ''Photography'', ''Volunteering at library'', ''Community-history tours'', ''Genealogy research'',
    ''Knitting'', ''Scrapbooking'']'
  career_goals: Allanah aims to deepen her expertise in archival practice by completing a certificate program in archival studies, and to channel her research into a local history book that documents Dublin's
    early settlement and cultural evolution. She aspires to join the advisory board of the Dublin Historical Society to guide preservation initiatives, and to mentor younger volunteers in grant writing
    and community-project management. Over the next few years she hopes to launch a small-scale community garden in partnership with the neighborhood association, secure micro-grants to support it, and
    continue her lifelong learning through evening courses at the nearby community college. She also dreams of traveling to select European historical sites to broaden her perspective and enrich her writing.
