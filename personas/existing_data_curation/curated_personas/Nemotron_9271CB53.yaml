personas:
  professional: Nancy Torres, a front‑line IT support specialist with expertise in Windows, macOS, Linux, and Python automation, uses her bilingual communication style and practical curiosity to solve users’
    tech problems while juggling an occasional disorganized ticket queue, and aims to transition into a senior cloud operations role within two years.
  sports: Nancy Torres, an avid hiker who joins the Columbia River Gorge Hiking Club for weekend treks and enjoys dancing salsa at community nights, follows the Portland Timbers, the Seattle Seahawks, and
    the Portland Trail Blazers, and squeezes in occasional yoga sessions to balance flexibility with strength.
  arts: Nancy Torres channels her love for classic rock and Latin jazz through guitar, often covering songs by The Rolling Stones and Tito Puente, attends local salsa nights, enjoys sci‑fi novels by N.K. Jemisin,
    and supports community theater productions featuring performances by local artist Maria Gonzales.
  travel: Nancy Torres prefers a mix of spontaneous road trips and curated city breaks, having already explored the San Juan Islands, the Cascade Mountain trails, and Mexico City’s vibrant street‑food scene,
    while budgeting for a future pilgrimage to a historic Caribbean capital steeped in colonial architecture.
  culinary: Nancy Torres enjoys cooking at a confident intermediate level, regularly preparing ropa vieja with slow‑cooked pork, crispy empanadas filled with seasoned beef and diced plantains, and a robust
    espresso‑style coffee brewed with fresh beans and a swirl of sweetened condensed milk, and relishes sharing these meals at neighborhood gatherings.
  core: Nancy Torres blends tech‑savvy curiosity with a laid‑back, slightly disorganized rhythm, thriving on bilingual community support, spicy weekend cooking, and occasional gadget splurges, all while
    juggling ambition and a penchant for spontaneous hikes.
background:
  cultural: Nancy grew up in a bilingual household where Spanish was spoken at home and English at school, giving her a fluid cultural identity bridging Cuban traditions and mainstream American life. Her
    parents emigrated from Havana in the early 1990s, bringing with them a love for Cuban music, festive celebrations, and a strong emphasis on family solidarity. In Vancouver, Washington, Nancy keeps these
    ties alive by participating in local Cuban cultural events, sharing recipes with neighbors, and maintaining close connections with a small but vibrant Cuban expatriate community. The experience of navigating
    two cultures has shaped her inclusive outlook, making her especially attentive to the needs of other immigrants and non‑native English speakers, both in her personal interactions and professional support
    work.
attributes:
  skills: '["Hardware repair and troubleshooting", "Software installation and configuration", "Operating system support (Windows, macOS, Linux)", "Network diagnostics (wired, wireless, TCP/IP)", "Remote
    support tools (TeamViewer, AnyDesk)", "Automation scripting (Python, PowerShell)", "Ticketing system management (ServiceNow, Jira)", "Cybersecurity best practices (phishing awareness, password hygiene)",
    "User training and documentation", "Bilingual technical support (Spanish/English)"]'
  hobbies: '["Cuban cooking", "Salsa dancing and teaching", "Hiking in Columbia River Gorge", "Reading science‑fiction literature", "Listening to tech podcasts", "Playing guitar (rock and Latin jazz)",
    "Mentoring high‑school girls in STEM", "Volunteering at community tech workshops"]'
  career_goals: Nancy aims to evolve from a front‑line support specialist to a senior IT operations role that blends technical depth with mentorship. Within the next two years, she plans to earn the CompTIA
    Network+ and AWS Certified Solutions Architect – Associate certifications, enabling her to transition into cloud‑focused support and infrastructure automation. She envisions leading a small support
    team where she can formalize onboarding programs for new hires and develop bilingual training resources for Spanish‑speaking users. Long‑term, Nancy hopes to establish a community technology workshop
    in Vancouver, WA, offering free basic‑computer classes for seniors and recent immigrants, while also advocating for greater representation of Hispanic women in the tech industry.
