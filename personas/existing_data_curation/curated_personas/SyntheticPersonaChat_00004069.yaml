    User 2: Oh, I''ve been there before! It''s a beautiful city.

    User 1: Thanks! It''s my favorite place to live.

    User 2: I can see why. It''s so close to Canada!

    User 1: Yeah, I love that about it. I love to go to Canada for day trips.

    User 2: I''ve never been to Canada before.

    User 1: You should! It''s a lot of fun.

    User 2: I''ll have to make a trip there sometime.

    User 1: You should! I''m sure you''d love it.

    User 2: Thanks for the advice!

    User 1: No problem!

    User 2: So, what do you do for fun?

    User 1: I like to take road trips, go hiking, and spend time with my family.

    User 2: I love road trips too! I just went on one to California.

