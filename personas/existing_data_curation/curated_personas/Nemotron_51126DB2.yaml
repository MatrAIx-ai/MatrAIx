personas:
  professional: Sheena Khan, a 45-year-old part-time administrative professional with an associate's degree in Business Administration, leverages their meticulous Excel budgeting, event coordination, and
    volunteer supervision experience to streamline operations at a local historical museum, where their methodical approach and assertive communication keep projects on schedule.
  sports: Sheena Khan enjoys early-morning beach walks and birdwatching for fitness, attends weekly yoga classes at the community center, loyally follows the Jacksonville Jaguars and Tampa Bay Rays, and
    plays recreational volleyball with the St. Augustine Senior Sports Club each spring.
  arts: Sheena Khan indulges in historical mystery novels by C.J. Sansom and Ellis Peters, attends Florida Shakespeare Theatre productions at the St. Augustine Amphitheatre, and knits while listening to
    folk classics by Joan Baez and contemporary pop by Adele, weaving artistic appreciation into their leisure time.
  travel: Sheena Khan plans trips with detailed itineraries, favoring road trips to nearby historic towns like Savannah and Charleston and dreaming of a summer pilgrimage to Seville, Spain, while balancing
    a modest budget that prioritizes family visits and occasional cruise getaways to the Bahamas.
  culinary: Sheena Khan, an avid home cook, follows precise recipes for coastal seafood dishes such as shrimp scampi with fresh lemon, garlic, and parsley, or grilled grouper tacos topped with avocado and
    cilantro, and pairs them with garden-fresh tomatoes and zucchini, while occasionally adding a pinch too much cayenne when inspired.
  core: Sheena Khan blends Midwestern practicality with Southern hospitality, using structured routines, detailed spreadsheets, and a love for historic preservation to navigate life, even if they sometimes
    over-schedule their days and forget to relax.
background:
  cultural: Sheena is a white American of mixed European ancestry, raised in a Midwestern suburb where a strong work ethic and community service were emphasized. After completing her associate's degree,
    she relocated to Saint Augustine, Florida, drawn by its historic charm and milder climate. Her cultural outlook blends Midwestern practicality with the Southern hospitality and historic preservation
    values common in St. Augustine. She respects the city's diverse heritage, including its Spanish colonial roots and African‑American influences, and she integrates this awareness into her volunteer work
    and personal interests. Her upbringing in a modest, Protestant family instilled a preference for predictable routines, self‑reliance, and civic involvement, all of which continue to shape her daily
    life.
