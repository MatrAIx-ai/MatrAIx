  hobbies: '[''Gardening'', ''Historical walking tours'', ''Cooking (seafood and baking)'', ''Birdwatching'', ''Yoga'', ''Knitting for charity'', ''Reading historical mystery novels'', ''Bridge'', ''Volunteer
    docent work'']'
  career_goals: Sheena aims to re‑enter the workforce in a part‑time administrative or operations role within the nonprofit sector, ideally supporting a local historical museum or heritage organization
    where her love of St. Augustine's history can be leveraged. She plans to obtain a Certified Administrative Professional (CAP) credential and a Certified Meeting Professional (CMP) designation to formalize
    her expertise. Over the next five years, she hopes to launch a small consulting service helping community groups organize events and manage volunteer programs, allowing her to balance work with her
    personal commitments. Additionally, she aspires to become a certified docent, guiding tours and contributing to the preservation of the city’s cultural legacy.
