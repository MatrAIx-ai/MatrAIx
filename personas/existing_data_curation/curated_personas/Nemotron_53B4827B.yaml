personas:
  professional: Celso Delarosa, despite being an infant, already assumes the unofficial role of household coordinator, arranging playdates with predictable rhythms and reliably guiding sibling interactions,
    showcasing an early penchant for structure and sociability.
  sports: Celso Delarosa enjoys baby swim classes and parent‑led toddler soccer sessions, often cheering along with the family when the local football club scores, and they proudly wear a tiny team jersey
    that marks their early enthusiasm for organized physical activity.
  arts: Celso Delarosa is entranced by soothing lullabies from Mozart and the gentle rhythm of a family guitar, frequently tapping tiny fingers to the beat and delighting in bright, animated cartoons like
    Peppa Pig, which they watch with rapt attention, shaping an early artistic sensibility.
  travel: Celso Delarosa favors carefully plotted road trips to nearby nature reserves where predictable rest stops, stroller‑friendly paths, and a favorite beachfront spot provide a balance of new sights
    and comforting routine, and they dream of one day strolling through the lavender fields of Provence with the family.
  culinary: Celso Delarosa prefers smooth purees such as sweet potatoes, ripe mango, and a dash of cinnamon, showing a selective palate that delights in familiar flavors and textures while their parents
    introduce new ingredients gradually, a rhythm they take to heart and enjoy.
  core: Celso Delarosa is a sociable, talkative newborn who thrives on predictable routines, loves being the center of family attention, and displays an early, gentle compassion for those around them, even
    when dealing with occasional tummy discomfort.
background:
  cultural: Celso grows up in Carolina, a vibrant municipality within the San Juan metropolitan area, immersed in Puerto Rican Caribbean culture. His household is bilingual, with Spanish as the primary
    language and exposure to English through school and media. He experiences traditional customs such as fiestas patronales, plena and bomba music, local foods like arroz con gandules and tostones, and
    regular participation in the local Catholic church, fostering a strong sense of community, hospitality, and family ties.
