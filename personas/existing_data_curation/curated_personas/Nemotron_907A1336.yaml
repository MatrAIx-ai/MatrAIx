  hobbies: '[''Hiking'', ''Gardening'', ''Reading Practical Manuals and Mystery Novels'', ''Listening to Transportation Podcasts'', ''DIY Home Projects'', ''Volunteering at Local Food Bank'']'
  career_goals: Rebecca aims to transition from driver‑sales roles to a supervisory and managerial position within the logistics sector. Over the next five years she plans to obtain a CDL with hazardous‑materials
    endorsement, complete a certified fleet‑management program, and earn a professional logistics certification. Her ultimate ambition is to launch her own boutique freight brokerage serving small businesses
    in Salem and surrounding communities, providing personalized, reliable delivery services. She also wishes to mentor younger drivers, contribute to safety‑training initiatives, and achieve financial
    independence to secure a stable home for herself.
