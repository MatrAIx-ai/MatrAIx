persona_description: A historian specializing in the study of colonial rule and its impact on the economy and society of Micronesia. This person is interested in the development of the copra industry in
  Micronesia under German and Japanese rule, the changes in production patterns and the economic impact on the islands. They are also interested in the role of the Nanyo Boeki Kaisha trading stations and
  stores in the copra trade, and how it affected the economies of the islands.
