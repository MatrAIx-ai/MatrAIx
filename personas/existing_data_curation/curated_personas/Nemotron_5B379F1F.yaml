personas:
  professional: Stella Ansley, a veteran electrical and electronics engineer with four decades of expertise in analog/digital circuit design, PLC configuration, and renewable‑energy system integration,
    applies their methodical, deadline‑driven mindset to part‑time consulting for New England utilities while mentoring young women engineers.
  sports: Stella Ansley hikes the coastal trails of Connecticut with the local Seaside Trail Club, they also enjoy occasional lunchtime tennis matches at the West Haven community courts, and they root for
    the New England Patriots and Hartford Yard Goats, balancing low‑impact exercise with a loyal fanhood.
  arts: Stella Ansley devotes evenings to reading historical fiction by Ken Follett and classic literature by Jane Austen, they listen to chamber music featuring Yo‑Yo Ma and the Berlin Philharmonic, and
    they attend Goodspeed Opera House productions of classic plays, letting refined cultural tastes shape their leisure.
  travel: Stella Ansley prefers meticulously planned road trips to New England coastal towns like Mystic and Newport, they join organized group tours to historic European sites such as Bath and Bruges,
    and they balance their love of order with occasional spontaneous weekend getaways to nearby state parks.
  culinary: Stella Ansley enjoys farm‑to‑table cooking, often preparing roasted beet and goat‑cheese salads with fresh herbs from their garden, they bake sourdough loaves flavored with rosemary, and they
    relish fresh salmon with dill, showcasing a penchant for seasonal, home‑grown flavors.
  core: Stella Ansley blends a lifelong engineering precision with a love for orderly gardening, birdwatching, and mentoring, they embody a pragmatic, habit‑driven lifestyle that balances structured work,
    quiet hobbies, and occasional indulgent quirks.
background:
  cultural: Stella grew up in a middle‑class, white New England family where practicality, self‑reliance, and community involvement were core values. Her upbringing in the post‑World War II era emphasized
    education and steady career progression, leading her to pursue a STEM bachelor’s degree at a regional university. The cultural ethos of Connecticut—a blend of modesty, respect for tradition, and quiet
    innovation—shapes her disciplined work style and her commitment to mentorship and local volunteerism. While she identifies with mainstream American cultural norms, she also embraces the New England
    appreciation for nature, evident in her love of gardening and outdoor activities.
attributes:
  skills: '[''Analog circuit design'', ''Digital signal processing'', ''Power distribution engineering'', ''Embedded firmware development (C, C++)'', ''Programmable Logic Controller (PLC) configuration'',
    ''Electrical safety compliance (NEC)'', ''Technical documentation and standards writing'', ''CAD/PCB layout (Altium Designer)'', ''MATLAB/Simulink modeling'', ''Data acquisition and analysis'', ''Project
    management (Agile, Waterfall)'', ''Mentoring and team leadership'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Hiking'', ''Reading historical fiction'', ''Knitting'', ''Volunteering for STEM outreach'', ''DIY electronics projects'']'
  career_goals: Approaching retirement, Stella aims to transition into a part‑time consulting role that focuses on sustainable energy projects for New England utilities and municipalities. She plans to
    obtain a Renewable Energy Professional (REP) certification to deepen her expertise in solar and micro‑grid design. Stella is also committed to giving back by mentoring young women engineers through
    IEEE Women in Engineering and local STEM outreach programs. Over the next five years, she hopes to author a technical paper on the reliability of legacy power systems and to contribute to a community‑based
    renewable‑energy pilot in her hometown of North Haven.
