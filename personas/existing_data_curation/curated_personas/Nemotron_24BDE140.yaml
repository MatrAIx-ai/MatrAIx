personas:
  professional: Angela Segars, a seasoned Los Angeles broker, couples her meticulous market analysis and assertive‑yet‑collaborative negotiation style with a community‑first mindset, mentoring junior agents
    while steering her firm toward a boutique focus on first‑time buyers and seniors.
  sports: Angela Segars enjoys Saturday hikes in the Santa Monica Mountains, follows the Los Angeles Lakers and Los Angeles Dodgers, and participates in a local senior walking club that meets at the beach,
    blending low‑impact fitness with community spirit.
  arts: Angela Segars regularly stages community‑theatre productions, most recently a local rendition of "Our Town," while savoring performances by Lin‑Manuel Miranda and visiting the Getty Center to admire
    works by Van Gogh and contemporary Californian artists.
  travel: Angela Segars prefers scenic Pacific Coast Highway road trips, with past stops at Big Sur, Santa Barbara, and Catalina Island, and dreams of a future overseas drive along Italy’s Amalfi Coast,
    always planning itineraries that combine galleries, historic missions, and boutique wineries.
  culinary: Angela Segars experiments in her kitchen with heirloom tomatoes, fresh basil, and grilled branzino, mastering Mediterranean dishes like ratatouille, bouillabaisse, and a rosemary‑infused focaccia,
    while often pairing them with a glass of Chianti from her wine‑tasting club.
  core: Angela Segars is a data‑driven real‑estate veteran who balances a love of hiking, vintage garden vegetables, and weekly wine clubs with an unwavering commitment to client service, even if they sometimes
    overbook their calendar and forget to drink enough water.
background:
  cultural: Angela was raised in a middle‑class white family in Southern California during the post‑war boom, a period that emphasized self‑reliance, hard work, and community involvement. Her upbringing
    reflected the West Coast values of entrepreneurship and openness to diverse ideas, shaping her practical yet collaborative outlook. Growing up near the entertainment industry in Burbank fostered an
    appreciation for networking and public presence, which later translated into her outgoing, sociable demeanor. She identifies with the broader American cultural narrative of the 'California Dream'—the
    belief that perseverance and innovation can lead to personal and professional success. While she respects traditional business norms, she also embraces the progressive, multicultural environment of
    Los Angeles County, participating in local charitable events and cultural festivals that celebrate the region's diversity.
