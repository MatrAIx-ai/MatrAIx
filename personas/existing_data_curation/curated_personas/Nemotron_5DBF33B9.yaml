  career_goals: Looking ahead, William aims to turn his organizational talent and love for interacting with people into a career that blends leadership with practical impact. He aspires to become an event
    manager or community outreach director for a regional non‑profit or municipal agency, organizing festivals, youth programs, and public safety events. As a backup, he considers a technical trade—such
    as an electrician or avionics technician—where his hands‑on curiosity and disciplined work ethic would be valued. He also entertains the possibility of launching an online brand that covers local culture,
    UFO lore, and teenage entrepreneurship, using his social media savvy to build a following. Short‑term, he plans to obtain his GED, secure a part‑time internship with a local event planning firm, and
    gain certifications in basic electrical work.
