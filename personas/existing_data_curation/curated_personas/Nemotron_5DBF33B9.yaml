personas:
  professional: William Trent is a budding event coordinator in training, blending meticulous project planning, charismatic public speaking, and DIY tech know-how to orchestrate school productions, community
    festivals, and social media promotions, all while thriving as the charismatic center of any gathering.
  sports: William Trent plays pickup basketball at the Albuquerque Community Center, cheers for the New Mexico Lobos men’s basketball team, participates in the local youth soccer league with the Sandia
    Vista Club, and squeezes in weekend desert trail runs with the Albuquerque Hiking Club, all while maintaining an organized weekly workout schedule.
  arts: William Trent is an active member of the school drama club, passionate about stagecraft and performing Shakespearean monologues, draws creative inspiration from Lin‑Manuel Miranda’s musical storytelling,
    and frequently streams retro video game soundtracks by Koji Kondo during live YouTube sessions, weaving theater and gaming into their personal artistic identity.
  travel: William Trent prefers low‑cost, meticulously planned road trips, having explored the otherworldly landscapes of Carlsbad Caverns and White Sands, dreaming of a midnight UFO‑spotting excursion
    in Roswell, and harboring a long‑term wish to experience Tokyo’s arcade districts, all while balancing school responsibilities and a modest allowance.
  culinary: William Trent enjoys bold New Mexican flavors like green chile stew and carne adovada, experiments with simple home‑cooked meals using hatch chiles and corn masa, occasionally indulges in sushi
    rolls after streaming sessions, yet admits a slightly chaotic kitchen where recipes often end up on scrap paper notes.
  core: William Trent is a hyper‑social, ultra‑organized teen who juggles drama club rehearsals, basketball games, retro game streaming, and UFO conventions, all while battling a persistent habit of procrastinating
    on homework until the last minute.
background:
  cultural: William comes from a white, middle‑class family rooted in the small‑town community of Roswell, New Mexico. His upbringing reflects a blend of traditional Southwestern values—such as a strong
    sense of community, respect for local history, and appreciation for outdoor activities—and broader American cultural influences, including participation in national holidays and school events. While
    the region includes Hispanic and Native American heritage, William's family traditions are largely centered on typical American customs, with occasional exposure to regional folklore, especially the
    famous Roswell UFO stories, which have sparked his interest in science and pop culture.
