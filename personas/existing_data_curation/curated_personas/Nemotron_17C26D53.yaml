  career_goals: Although only two years old, Teresa already shows a curiosity about adult roles and a desire to be helpful. She frequently tells caregivers she wants to "be a teacher" or "take care of animals,"
    reflecting early aspirations toward caregiving and structured professions. Her organized, methodical nature drives her ambition to master reading and writing soon, achieve early school readiness, and
    eventually work in a caring, orderly field such as early childhood education or pediatric nursing.
