personas:
  professional: Teresa Khan, a budding civil engineer in the making, showcases early spatial reasoning and systematic problem‑solving through block constructions, channeling a blend of curious experimentation
    and practical planning, while they exhibit a competitive drive to outbuild peers and a sensitivity to stress that can trigger dramatic meltdowns when towers tumble.
  sports: Teresa Khan, a lively participant in the Little Explorers Gymnastics Club, eagerly practices balance beams and floor routines during toddler classes, while they also cheer enthusiastically for
    the Chicago Cubs during family game nights, demonstrating an outgoing love for group activity and a competitive spirit that fuels both play and fandom.
  arts: Teresa Khan, an enthusiastic fan of the vibrant world of 'Bluey' and the upbeat tunes of The Wiggles, spends afternoons finger‑painting whimsical scenes of favorite characters, arranging colors
    methodically, and they channel their sociable energy into expressive art while also critiquing the quality of colors with a surprisingly skeptical eye.
  travel: Teresa Khan, who has explored the local zoo in San Diego, splashed at the Santa Monica beach, and taken a family road trip to Disneyland, prefers trips that blend interactive play with familiar
    routines, and they dream of visiting the historic castles of Europe while maintaining a careful itinerary that satisfies their practical curiosity and need for organized adventure.
  culinary: Teresa Khan, a picky yet adventurous eater, delights in soft macaroni and cheese, banana slices, and avocado toast, meticulously arranging each bite on the plate, and they often negotiate snack
    choices with a critical eye, occasionally demanding a second serving of sweet potatoes when a dish fails to meet their exacting standards.
  core: Teresa Khan is a tiny but fiercely organized explorer who lines up toys, debates snack options, and navigates the roller‑coaster of toddler emotions with a competitive edge, while they habitually
    over‑worry about spilled milk.
background:
  cultural: Teresa is being raised in Harrisonville, a small community in Fulton County, Pennsylvania, within a white, working‑class family that values practicality, close family ties, and community involvement.
    Her household emphasizes hands‑on skills and everyday chores over formal academic achievement, reflecting the rural Mid‑Atlantic tradition of self‑reliance. Local cultural influences include participation
    in church activities, county fairs, and public library programs, exposing her to regional folk music, seasonal celebrations, and communal storytelling that shape her social worldview.
