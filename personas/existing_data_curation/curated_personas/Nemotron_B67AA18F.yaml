  career_goals: Jose aims to earn his GED within the next year and then enroll in a community college program focused on culinary arts or hospitality management. He wants to gain professional kitchen experience
    by working part‑time in a local restaurant, with the long‑term ambition of launching a Mexican‑inspired food truck that showcases his cultural heritage and brings people together through food. Additionally,
    he is interested in community outreach, possibly serving as a liaison for immigrant‑support organizations in Portland, where he can combine his organizational strengths with his passion for helping
    others.
