  hobbies: '[''Biking on local trails'', ''Swimming and tide‑pool exploration'', ''Robotics club projects'', ''Crafting friendship bracelets'', ''Reading adventure and sci‑fi novels'', ''Creative writing'',
    ''Singing in school choir'', ''Organizing community beach clean‑ups'']'
  career_goals: Megan dreams of a career that blends her love for the outdoors and her curiosity about living things. She hopes to become a marine biologist or environmental educator, studying tide‑pool
    ecosystems along the Puget Sound and sharing her findings with her community. She also envisions helping younger kids as a teacher or youth program leader, valuing a flexible schedule that lets her
    stay active and involved in group activities. In the short term, she aims to excel in science classes, join the school’s robotics club, and volunteer with local beach clean‑ups to build a solid foundation
    for her future aspirations.
