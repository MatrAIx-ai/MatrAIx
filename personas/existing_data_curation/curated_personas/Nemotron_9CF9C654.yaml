personas:
  professional: Megan Moll is an aspiring marine robotics enthusiast who blends a fascination with tide‑pool ecosystems and a practical knack for coding in the school robotics club, and they channel their
    sociable, cooperative spirit into leading group projects while occasionally misplacing tools due to a laid‑back, disorganized approach.
  sports: Megan Moll fuels energetic weekends with bike rides along Hood Canal trails, swims at the local Silverdale Swim Club, participates in school cross‑country, cheers on the Seattle Mariners and Seattle
    Sounders FC, and they play forward for the Kitsap Youth Soccer Club’s under‑12 team, though they occasionally forget their water bottle during practice.
  arts: Megan Moll channels a love for storytelling into writing short sci‑fi adventures and sings upbeat covers of Billie Eilish and Taylor Swift in the school choir, while they craft friendship bracelets
    inspired by Yayoi Kusama’s colorful patterns and regularly watch Pixar movies and Lin‑Manuel Miranda’s Hamilton for creative inspiration.
  travel: Megan Moll prefers nature‑focused trips that combine kayaking in the San Juan Islands, tide‑pool exploring in Olympic National Park, and dreaming of snorkeling the coral reefs of Fiji and visiting
    futuristic museums in Tokyo, and they balance family‑planned vacations with spontaneous weekend bike‑trail adventures to nearby Portland.
  culinary: Megan Moll enjoys gathering fresh salmon at the local fish market to grill with lemon, dill, and a splash of soy sauce for their signature garlic‑butter shrimp tacos, loves snacking on sea‑salted
    kale chips, and they follow simple YouTube recipes to bake blueberry oat muffins and roll homemade sushi with nori, rice, avocado, and cucumber.
  core: Megan Moll is a curious, outgoing 12‑year‑old who blends a passion for marine robotics, beach clean‑ups, and spontaneous storytelling, even if their backpack often ends up a chaotic collection of
    shells, spare batteries, and half‑finished bracelets.
background:
  cultural: Megan is a white American raised in Silverdale, Washington, a suburban community in Kitsap County known for its proximity to the Puget Sound and a strong outdoor culture. Her family values community
    involvement, environmental stewardship, and a balanced lifestyle that mixes school responsibilities with ample time for recreation. Local traditions such as seasonal fairs, school sports, and volunteer
    beach clean‑ups shape her sense of belonging, while the broader Pacific Northwest ethos of appreciating nature and fostering collaborative, inclusive environments informs her outlook.
attributes:
  skills: '[''Basic digital literacy (Scratch)'', ''Team collaboration and peer mediation'', ''Hands‑on science experimentation'', ''Creative writing'', ''Outdoor navigation and basic environmental observation'',
