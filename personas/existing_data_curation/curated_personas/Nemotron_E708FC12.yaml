  hobbies: '[''Digital illustration and graphic design'', ''Video blogging and short‑film creation'', ''DIY science and electronics projects'', ''Exploring parks, hiking, and farmer’s markets'', ''Creative
    writing and reading sci‑fi/fantasy'', ''Board games and tabletop RPGs'', ''Volunteer tutoring at the local library'', ''Mindfulness journaling and breathing exercises'']'
  career_goals: Maria aspires to pursue a career that blends her curiosity for how things work with a desire to help others. She hopes to study environmental engineering or sustainable design at a university,
    aiming to develop practical solutions for climate challenges. Alternatively, her empathy and personal experience with stress have sparked an interest in mental‑health advocacy, where she envisions becoming
    a counselor or creating youth‑focused wellness programs. In the short term, she plans to earn a high school diploma, take community college courses in computer science, and secure an internship at a
    local nonprofit focused on youth empowerment.
