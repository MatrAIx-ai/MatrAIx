personas:
  professional: Maria Bobo, a high‑school junior with a flair for digital illustration and a budding robotics hobby, channels their curiosity and empathy into interdisciplinary school projects that fuse
    sustainable design concepts with peer‑wellness workshops, even as their relaxed attitude toward organization often pushes them into last‑minute brainstorms they scramble to finish.
  sports: Maria Bobo enjoys casual weekend runs through the Nichols Arboretum, plays intramural ultimate frisbee with friends, and cheers passionately for the Michigan Wolverines football team while occasionally
    joining a local youth swimming club, balancing a love of movement with their laid‑back approach to scheduled training, which they treat as a flexible outlet rather than a rigid regimen.
  arts: Maria Bobo spends afternoons sketching digital portraits to lo‑fi beats from artists like Clairo and Tame Impala, curates a mini‑gallery of their illustrations at the Ann Arbor Art Fair, and finds
    inspiration in indie sci‑fi series and graphic novels, letting their creative curiosity shape both school assignments and personal vlog projects they share on social media.
  travel: Maria Bobo prefers low‑cost road trips to nearby natural gems such as Sleeping Bear Dunes and the Great Lakes shoreline, enjoys weekend visits to Chicago’s museums and street food markets, and
    dreams of a future study abroad stint in a European city known for its historic canals, a plan they sketch out while budgeting carefully.
  culinary: Maria Bobo gravitates toward farm‑fresh meals, often whipping up avocado toast with radish slices and a drizzle of lemon‑olive oil, blending quinoa bowls with roasted carrots and feta, and indulging
    in homemade berry smoothies, while they never pass up a Saturday visit to Zingerman’s Deli for a classic Reuben sandwich, reflecting both a health‑conscious palate and a love for comforting local flavors.
  core: Maria Bobo is a curiosity‑driven teen who merges digital art with eco‑tech ideas, battles frequent worry with mindfulness, and occasionally lets disorganization sneak into their schoolwork, making
    them a creative yet imperfectly organized advocate for sustainable change.
background:
  cultural: Maria grew up in Ann Arbor, a university town in Michigan, within a family of European ancestry (mostly German and Irish roots). Her upbringing reflects typical Midwestern American values—emphasis
    on community, education, and modest independence—while also being shaped by the diverse, academic atmosphere of the University of Michigan campus. She celebrates holidays such as Thanksgiving and Independence
    Day with family traditions, enjoys local cultural events like the Ann Arbor Art Fair, and has been exposed to a variety of music, food, and ideas through the city’s multicultural community.
attributes:
