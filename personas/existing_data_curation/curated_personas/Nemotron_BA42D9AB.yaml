  career_goals: Cassandra aims to advance into a supervisory or training role within her call‑center, where she can combine her practical experience with her curiosity for new service technologies. She
    plans to pursue a bachelor’s degree in Business Administration to strengthen her leadership foundation, and she hopes to lead a team that implements streamlined customer‑experience initiatives. Long‑term,
    she envisions contributing to community outreach programs that use her customer‑service expertise to improve local consumer resources while maintaining a healthy work‑life balance for her family.
