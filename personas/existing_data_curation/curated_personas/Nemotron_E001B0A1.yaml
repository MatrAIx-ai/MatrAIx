  hobbies: '[''Visiting art galleries and museums'', ''Photography (street and nature)'', ''Acoustic guitar and jam sessions'', ''Jazz club attendance'', ''Improv comedy'', ''Hiking'', ''Cooking'', ''Science-fiction
    reading'', ''Mentoring a youth robotics club'', ''Attending experimental theatre'']'
  career_goals: He aims to apply his technical background to the cultural sector, developing interactive art installations and technology-driven community programs in New York. Over the next five years
    he plans to co‑found a nonprofit space that merges art, technology, and education, offering workshops for under‑served youth. He also hopes to publish a series of research‑oriented articles on the use
    of AI in creative practice, and serve on the board of a local museum. While he is not seeking full‑time employment, he wants to take on advisory consulting projects that leverage his expertise in systems
    design and digital media.
