personas:
  professional: Robert Maxwell, a senior electrical engineer turned digital media strategist, leverages his expertise in Python, MATLAB, and statistical modeling to design interactive art installations
    and lead cross‑functional teams that fuse technology with the cultural sector, all while applying his disciplined project‑management style, charismatic public‑speaking, and curious, sociable nature
    to mentor emerging artists and engineers.
  sports: Robert Maxwell, an avid member of the Hudson Valley Trail Club, spends weekends hiking the Catskills, runs weekly 5 K sessions with the New York Road Runners, follows the New York Knicks and New
    York Yankees with fervor, and balances his disciplined training regimen with occasional pickup basketball games at a local community center.
  arts: Robert Maxwell, a regular at the Metropolitan Museum’s contemporary wing, a fan of experimental theatre groups like The Wooster Group, an amateur acoustic‑guitarist who jams at Downbeat jazz club,
    an improv comedy participant at Magnet Theater, and a street‑photographer inspired by the works of Banksy and Vivian Maier, curates his artistic sensibility through nightly listening to John Coltrane
    and Brad Mehldau.
  travel: Robert Maxwell, who has explored Tokyo’s tech‑art festivals, trekked the Scottish Highlands, attended Berlin’s avant‑garde theatre scene, and spent summers in the Catskills, plans his trips with
    meticulous itineraries that blend cultural immersion with adventure, while dreaming of a future expedition to Iceland to capture aurora‑lit landscapes for his photography portfolio.
  culinary: Robert Maxwell, a self‑taught home chef, delights in crafting eclectic dishes such as miso‑infused carbonara, harissa‑spiced lamb kebabs, and ramen‑style pho, frequently experiments with ingredients
    like black garlic, fresh basil, and gochujang, yet habitually burns the edges of his soufflés when multitasking between code and cuisine, prompting late‑night pizza orders as a backup.
  core: Robert Maxwell blends razor‑sharp engineering discipline with a restless artistic curiosity, orchestrating tech‑driven cultural projects while juggling a coffee‑fuelled work habit, occasional spreadsheet‑obsession,
    and a penchant for late‑night jam sessions.
background:
  cultural: Robert was born and raised in a middle‑class Anglo‑American family in upstate New York. His parents, second‑generation Irish immigrants, instilled a strong work ethic, respect for education,
    and a love of community service. Growing up during the tech boom of the 1990s, he pursued a STEM degree while also immersing himself in the vibrant art scene of New York City after moving there for
    graduate studies. His multicultural experiences in the city—interacting with artists from diverse backgrounds—have broadened his worldview, fostering an appreciation for cultural diversity and interdisciplinary
    collaboration.
attributes:
  skills: '[''Electrical engineering'', ''Systems design'', ''Python programming'', ''MATLAB'', ''Statistical analysis'', ''Project management (Agile)'', ''Technical writing'', ''Digital media production'',
