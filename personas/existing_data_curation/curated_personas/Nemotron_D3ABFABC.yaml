personas:
  professional: An aspiring author‑illustrator, Eleanor Gulley blends a boundless curiosity for fantasy worlds with a practical knack for digital art, channeling their solitary nature into richly detailed
    stories and sketches that often explore themes of harmony, emotional resilience, and the quiet strength of shy protagonists.
  sports: Eleanor Gulley enjoys low‑key physical activity such as early‑morning bird‑watching walks in the nearby nature reserve and occasional family hikes, while cheering on the local high school soccer
    team, the Riverdale Raptors, and following the professional women’s basketball team the Seattle Storm; they rarely join organized sports clubs, preferring solitary pursuits that align with their introverted
    temperament.
  arts: Eleanor Gulley immerses themselves in creative expression by devouring the works of J.K. Rowling, Neil Gaiman, and Haruki Murakami, listening to the soothing compositions of Debussy, Max Richter,
    and Jeremy Soule’s ambient game scores, and drawing inspiration from visual storytellers like Studio Ghibli and Alex Ross, all while sketching daily in a notebook that doubles as a personal journal.
  travel: On family trips, Eleanor Gulley has explored the misty cliffs of Ireland’s County Kerry and the tranquil bamboo groves of Kyoto, both of which fueled their storytelling; they now dream of a solo
    backpacking adventure to the Scottish Highlands to observe golden eagles, preferring meticulously planned itineraries that include quiet reading nooks in local cafés.
  culinary: Eleanor Gulley favors comfort foods that fuel their creative sessions, such as homemade cheese‑and‑basil pizza, buttery croissants, and steaming bowls of miso ramen with sliced shiitake mushrooms;
    they enjoy occasional culinary experiments like lavender‑infused tea, yet often neglect regular meals, leading to late‑night snack binges on chocolate‑covered almonds.
  core: Eleanor Gulley is a quietly intense 13‑year‑old who channels solitary curiosity into fantasy storytelling, navigates anxiety with careful self‑care, and balances frugal saving with impulsive splurges
    on art supplies and books.
background:
  cultural: Raised in a middle‑class white family in Alpharetta, a suburban community in the Atlanta metropolitan area, Eleanor grew up with a blend of Southern hospitality and modern, multicultural influences.
    Her parents, a schoolteacher and an IT professional, emphasize education and community service. The family attends a local Methodist church, where community values are reinforced, yet the school's diverse
    student body exposes her to a range of cultures and perspectives. Weekly trips to the nearby Chattahoochee River and local parks foster a love of nature, while access to the public library and community
    art programs supports her creative pursuits.
attributes:
  skills: '[''Creative Writing'', ''Digital Illustration'', ''Basic Python Coding'', ''Empathetic Listening'', ''Peer Mediation'', ''Online Research'', ''Adaptable Problem Solving'']'
  hobbies: '[''Reading fantasy and literary fiction'', ''Journaling'', ''Sketching and digital illustration'', ''Playing keyboard (solo practice)'', ''Listening to classical and ambient music'', ''Bird‑watching
    in local parks'', ''Solo puzzle and strategy video games'', ''Caring for pet cat'']'
  career_goals: Eleanor envisions a future where she can blend her compassion with a practical skill set to support others. She is drawn to psychology and counseling, hoping to become a child therapist
    or school counselor who can advocate for mental‑health awareness. She also dreams of working with animals, perhaps as a veterinary technician, combining her love for quiet, caring environments with
    hands‑on help. In the short term she aims to deepen her peer‑support role at school, earn a leadership certification, and explore coursework in psychology and biology.
