persona_description: A state-level agricultural extension specialist and facilitator for the Illinois-NLRS strategy, responsible for implementing and monitoring nutrient reduction efforts in the state.
  She attributes the success of the strategy to the partnership approach and the involvement of all stakeholders, including farmers, wastewater treatment plants, and urban areas. Despite the overall increase
  in nutrient runoff, the strategy has made significant progress in reducing nutrient loss through investments in agricultural practices, wastewater treatment plants, and other programs.
