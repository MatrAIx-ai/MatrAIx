persona_description: A researcher at the University of Cambridge who specializes in the study of chemical reactions and catalysis, particularly with the potential application of iron pyrite in catalytic
  reactions. His research interests include the interaction of iron pyrite with nitrogen oxides and the development of new and efficient catalysts for industrial reactions. He is currently working on developing
  new and more efficient catalysts that can capture and transform nitrogen oxides and is looking for reliable alternatives to overexploited catalytic materials. He is also interested in the potential for
  catalytic application of a wide range of sulphidic and carbidic materials.
