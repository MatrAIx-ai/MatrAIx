personas:
  professional: Dawn Anidjar is an 81‑year‑old senior engineer turned community technologist who leverages their mastery of systems design, early programming languages and technical writing to run a disciplined
    mentorship program for seniors learning Python, while their competitive spirit drives exacting project timelines and their talkative nature makes them the charismatic lead of every workshop.
  sports: Dawn Anidjar participates in a senior walking group that meets at the Irvine Spectrum before joining the Orange County Gardeners' Club's weekly stretching class, supports the Los Angeles Lakers
    and Anaheim Ducks, and prefers structured low‑impact cardio over competitive sports.
  arts: Dawn Anidjar fuels their love of the arts by curating photo‑exhibits of community events inspired by Ansel Adams, hosting book‑club discussions that swing between classics by Jane Austen and contemporary
    nonfiction by Malcolm Gladwell, and listening to Yo‑Yo Ma's cello suites while tending their rose beds.
  travel: Dawn Anidjar enjoys meticulously planning weekend road trips to nearby coastal towns like Laguna Beach and historic sites such as Redwood National Park, while harboring a long‑standing wish to
    explore the gardens of Kyoto and the castles of Scotland when health permits.
  culinary: Dawn Anidjar, whose garden yields heirloom tomatoes, basil, and bok choy, confidently prepares a Sunday roasted vegetable lasagna layered with fresh ricotta and a dash of espresso‑infused tomato
    sauce, while also savoring authentic miso soup with seaweed and tofu at a local Japanese restaurant, relishing the structure of recipes as much as the social ritual of shared meals.
  core: Dawn Anidjar is a meticulous, competition‑driven community elder who channels their engineering precision into bridge victories, garden spreadsheets, and relentless pursuit of senior tech literacy,
    even as they battle chronic worry, an occasional over‑reliance on caffeine, and a habit of double‑checking every detail before stepping out.
background:
  cultural: Dawn comes from a mid‑20th‑century white American background rooted in post‑war suburban West Coast values. Her family emphasized self‑reliance, education, and community service, fostering a
    respect for both tradition and progress. Growing up during the Space Race, she was inspired by scientific breakthroughs and pursued a path in engineering at a time when few women entered the field.
    Her long residence in Orange County has exposed her to a diverse, yet predominantly middle‑class, environment where civic engagement and neighborhood networks are strong. This cultural context has shaped
    her practical outlook, her commitment to organized community involvement, and her appreciation for structured, competitive pursuits.
attributes:
  skills: '["Advanced mathematics", "Electrical engineering", "Computer programming (FORTRAN, C, Python)", "Technical writing", "Project management", "Event planning", "Public speaking", "Mentorship and
