  hobbies: '[''Soccer'', ''Robotics club (building and programming robots)'', ''Strategic video‑gaming'', ''Hiking and camping in the Cascades'', ''Community center volunteering'']'
  career_goals: In the short term, Stephen aims to complete his high‑school education—pursuing a GED if necessary—and enroll in a vocational program that offers hands‑on training in electrical or HVAC trades.
    He wants to build a career that provides clear structure, reliable advancement, and the ability to serve his community. Long‑term, he envisions becoming a certified electrician or a firefighter, roles
    that combine his love for practical problem‑solving, teamwork, and a disciplined work environment. He also keeps an eye on competitive e‑sports coaching as a backup path, leveraging his strategic gaming
    experience.
