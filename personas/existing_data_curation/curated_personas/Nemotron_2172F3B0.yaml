personas:
  professional: Stephen Roy is a diligent teen captain of his school soccer team and robotics club leader, leveraging his methodical planning, leadership, and hands‑on problem‑solving to coordinate practices,
    manage project timelines, and mentor peers while aiming for a trade career in electrical work or firefighting.
  sports: Stephen Roy thrills on the soccer field as captain of the Cascadia Youth Soccer League team, cheering for the Seattle Sounders FC, and joins the Cascades Hiking Club for weekend treks, balancing
    competitive drills with endurance hikes to stay fit.
  arts: Stephen Roy unwinds by streaming Imagine Dragons and playing strategy‑heavy video games like StarCraft II, while attending local community theater productions starring Chris Pratt, and he occasionally
    sketches robot designs inspired by futuristic sci‑fi aesthetics.
  travel: Stephen Roy prefers short, action‑packed trips like weekend hikes in the Cascade Range and a recent family road trip to Portland’s food trucks, yet dreams of a future exchange program to Japan
    to compete in an international robotics tournament.
  culinary: Stephen Roy favors hearty meals such as pepperoni pizza, grilled chicken stir‑fry with broccoli and soy sauce, and homemade trail mix with almonds, raisins, and chocolate chips, and he can reliably
    whip up a quick pasta carbonara for his teammates after practice.
  core: Stephen Roy is a structured, competitive teen who blends leadership in sports and robotics with a community‑first mindset, balancing disciplined planning with occasional impulsive gaming splurges
    and a knack for turning chores into team challenges.
background:
  cultural: Stephen comes from a white, Pacific Northwest family that has lived in the Ravensdale area for generations. His upbringing reflects the region’s blend of modest, self‑reliant values and a strong
    sense of community involvement. Family gatherings often emphasize hard work, practical skills, and respect for the natural environment surrounding King County. Local traditions, such as seasonal community
    fairs and outdoor recreation, shape his appreciation for teamwork and outdoor pursuits. While not strongly religious, his cultural backdrop includes a shared appreciation for American small‑town ideals,
    a focus on personal responsibility, and an informal network of neighbors who support each other in everyday tasks.
attributes:
  skills: '[''Team leadership'', ''Event planning'', ''Basic computer proficiency (Google Suite, Microsoft Office)'', ''Mechanical tinkering (bike repair, basic electronics)'', ''Strategic thinking in sports
