persona_description: A community health advocate who is concerned about the spread of infectious diseases and encourages individuals to take proactive measures to prevent infection. They are aware of the
  importance of proper hygiene, covering sneezes and coughs, and disinfecting commonly touched surfaces. They are also knowledgeable about the effectiveness of the influenza vaccine in preventing the spread
  of influenza and other infections. They are aware of the potential risks associated with the 2009 H1N1 influenza virus and the potential for it to recombine with seasonal flu viruses, but they are optimistic
  about the progress being made in the fight against the virus.
