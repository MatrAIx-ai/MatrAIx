  career_goals: Jasmine aims to earn her GED within the next year and pursue an associate degree in health sciences or nursing at a community college. She is motivated by a desire for a stable, structured
    career that allows her to help others and maintain a predictable work environment. In the longer term, she hopes to become a registered nurse or a medical assistant, possibly working in a community
    clinic serving the Bronx’s Dominican population. She also considers a backup plan in culinary arts, where she could open a small catering business focused on Dominican comfort foods.
