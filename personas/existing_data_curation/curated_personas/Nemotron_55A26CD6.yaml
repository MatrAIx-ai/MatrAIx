personas:
  professional: Jasmine Lloverasfuentes, a 17‑year‑old high school senior with a systematic mindset, leverages bilingual fluency, strong organizational abilities, and peer‑tutoring experience to pursue
    a GED and an associate degree in health sciences, envisioning a future as a registered nurse at a community clinic where they can serve local families.
  sports: Jasmine Lloverasfuentes dominates the local Eastside Hoops basketball league as a point guard, follows the New York Knicks and New York Yankees avidly, and they integrate short‑interval runs and
    daily stretching into their routine, balancing competitive play with a disciplined fitness regimen.
  arts: Jasmine Lloverasfuentes immerses themselves in Latin pop icons like Bad Bunny and Natti Natasha, spends weekends dancing bachata and merengue, and roams the Bronx’s vibrant street‑art corridors,
    where they let the colors of community murals inspire both their dance moves and a budding sketchbook habit.
  travel: Jasmine Lloverasfuentes daydreams about a weekend trip to Old San Juan, Puerto Rico, after saving enough from their part‑time job, but they currently limit travel to local cultural festivals and
    occasional family visits, preferring well‑planned itineraries over spur‑of‑the‑moment adventures.
  culinary: Jasmine Lloverasfuentes excels at preparing Dominican comfort foods such as sancocho, mangú, and empanadas, mixing seasoned plantains, garlic, and cilantro with an intermediate cooking skill
    level, while they still rely on YouTube tutorials for perfecting the dough texture and occasionally over‑salt dishes in their enthusiasm.
  core: Jasmine Lloverasfuentes is a methodical 17‑year‑old who balances organized ambition with a love for dancing, cooking, and community service, yet sometimes burns the midnight oil over schoolwork
    and cannot resist a sneaker drop despite a cautious financial streak.
background:
  cultural: Jasmine was raised in a close‑knit Dominican household in the Bronx, where Spanish is spoken at home and English outside. Family gatherings center around music, dance, and traditional foods
    like mangú, sancocho, and pastelitos. She regularly attends the local Dominican church and participates in neighborhood festivals such as the Dominican Parade in Manhattan, where she helps with preparations.
    The blend of African, European, and Indigenous influences in Dominican culture shapes her identity, and she values community solidarity, respect for elders, and the vibrant rhythms that accompany daily
    life in her Bronx barrio.
