    "Team coordination and crew leadership", "Customer service and client negotiation"]'
  hobbies: '["Basketball (community leagues)", "Soccer (local Dominican pick‑up games)", "Latin dance (merengue and bachata)", "Cooking Dominican cuisine (mangú, sancocho)", "Watercolor and acrylic painting
    as a hobby", "DIY home improvement projects", "Attending live concerts and music festivals", "Volunteer work at Dominican cultural events", "Weight training and fitness", "Watching soccer (MLS, European
    leagues)"]'
  career_goals: Orestes aims to become a Certified Master Painter within the next three years and to launch his own painting and paper‑hanging business in Grand Rapids. He plans to complete a degree in
    Construction Management to broaden his expertise, eventually expanding his company into a small general‑contracting firm that offers comprehensive interior finishing services. He also aspires to become
    a recognized interior color consultant, securing contracts with property‑management firms and establishing a reputation for meticulous, high‑quality work while providing stable employment for friends
    and family members.
