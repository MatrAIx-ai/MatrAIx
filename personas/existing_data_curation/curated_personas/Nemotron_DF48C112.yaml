personas:
  professional: Orestes Borje, a 22‑year‑old aspiring master painter, blends hands‑on trade expertise in residential and commercial painting with construction‑management studies, delivering meticulous interior
    finishes while leveraging a competitive drive and outgoing personality to win client trust and efficiently coordinate crews.
  sports: Orestes Borje competes in community basketball leagues, joins pick‑up soccer matches, lifts weights at the local gym, and avidly follows MLS side Real Salt Lake and La Liga giant Barcelona while
    cheering on the Grand Rapids community team during seasonal tournaments.
  arts: Orestes Borje channels creative energy into watercolor landscapes and acrylic abstracts inspired by Frida Kahlo and Jean‑Michel Basquiat, while dancing to bachata tracks by Prince Royce and attending
    live shows featuring Bad Bunny and the indie group The Midnight Sun.
  travel: Orestes Borje enjoys weekend road trips to Michigan’s Traverse City and Mackinac Island, yet dreams of exploring the historic streets of Lisbon and the sun‑kissed beaches of Puerto Rico, balancing
    a modest travel budget with a love for both spontaneous getaways and meticulously planned itineraries.
  culinary: Orestes Borje loves cooking Caribbean staples such as mangú with ripe plantains, hearty sancocho packed with yuca and chicharrón, and frequently experiments with ají dulce peppers and sofrito,
    though they sometimes over‑season, producing fiery dishes that delight their friends.
  core: Orestes Borje merges a disciplined, detail‑oriented work ethic with a gregarious, competitive spirit, often juggling paint swatches and basketball drills while habitually misplacing keys during
    hectic weeks.
background:
  cultural: Orestes is a first‑generation Dominican American raised in a bilingual household in Grand Rapids. His parents immigrated from the Dominican Republic, and he grew up speaking both Spanish and
    English. He maintains strong ties to Dominican culture through language, food, music, and community celebrations, regularly participating in local Dominican festivals and attending church services that
    reflect his Catholic upbringing. Family cohesion and respect for elders are central values, and he often visits relatives in the Dominican Republic during holidays. While embracing his Caribbean heritage,
    he also adopts the pragmatic Midwestern work ethic, blending Dominican warmth and humor with the structured, reliable approach valued in his trade.
attributes:
  skills: '["Surface preparation and sanding", "Drywall taping and finishing", "Interior and exterior painting", "Wallpaper and fabric wall covering installation", "Color theory and client color consultation",
