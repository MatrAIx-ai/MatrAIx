  career_goals: Although retired from formal employment, Kwanza aims to deepen his impact on the local community. He aspires to mentor younger artisans through a weekend woodworking class, curate a traveling
    exhibition of African-American art for schools in Cumberland County, and author a memoir that weaves personal stories with historical reflections. He also wishes to expand his digital photography skills
    to document local cultural events and eventually develop a small online archive celebrating the region's heritage.
