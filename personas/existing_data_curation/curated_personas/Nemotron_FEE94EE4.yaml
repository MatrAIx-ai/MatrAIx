personas:
  professional: Mary Carney, a budding infant explorer in the realm of sensory development, leverages early curiosity and practical problem‑solving skills while balancing structured routines with spontaneous
    play, showing a cooperative yet assertive demeanor and intense emotional responsiveness that shape every new discovery.
  sports: Mary Carney, a sprightly toddler who cheers for the Oklahoma City Thunder during family game nights and participates in the Tulsa Tots Soccer Club’s spring mini‑kick sessions, loves energetic
    clapping games and gentle baby yoga that combine rhythmic movement with a developing sense of balance and teamwork.
  arts: Mary Carney, an eager listener of gospel harmonies by Mahalia Jackson and classic jazz crooner Nat King Cole during family storytime, delights in animated picture books featuring vibrant illustrations,
    and occasionally mimics the expressive dance moves of Misty Copeland witnessed at community cultural events, shaping a budding artistic sensibility.
  travel: Mary Carney, whose family plans low‑key weekend trips to nearby attractions like the Tulsa Gathering Place playground and the historic Route 66 mom‑and‑pop diner in Oklahoma City, while dreaming
    of a future summer vacation at the sandy shores of Gulf Shores, Alabama, balances the comfort of familiar routines with occasional curiosity‑driven adventures.
  culinary: Mary Carney, a budding foodie who prefers smooth sweet‑potato puree, mashed banana, and soft bites of fried chicken, often enjoys family meals featuring collard greens seasoned with smoked paprika
    and freshly baked cornbread, while their parents skillfully introduce new textures and flavors during playful mealtime rituals.
  core: Mary Carney, a one‑year‑old explorer whose boundless curiosity is tempered by a practical routine, yet who can spiral into intense emotional bouts over a missing pacifier, embodies a unique blend
    of organized playfulness and occasional clingy stubbornness.
background:
  cultural: Mary Louise comes from a Black family rooted in Tulsa’s historic African‑American community. Her caregivers celebrate cultural traditions such as Juneteenth gatherings, gospel music at the local
    church, and soulful family meals featuring dishes like fried chicken, collard greens, and cornbread. Storytelling sessions often include African‑American folktales, and community events expose her to
    rhythmic clapping games and call‑and‑response songs, fostering a sense of resilience, communal pride, and cultural identity.
