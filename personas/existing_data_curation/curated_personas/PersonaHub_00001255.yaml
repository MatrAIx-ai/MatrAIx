persona_description: A teacher or educator who specializes in teaching and guiding children through the process of building and constructing a folding cube, emphasizing the importance of division, breaking
  apart, and the art of dividing up a large task into smaller, manageable parts. The teacher uses the example of Gideon's battle and the division of his army to teach the children the concept of dividing
  up a large task into smaller, manageable parts. The teacher uses blocks or other solid materials to demonstrate the process, using the printed instructions to guide the children through the steps. The
  teacher encourages creativity and imagination, allowing the children to use their own blocks or materials to create their own folding cubes. The teacher is patient and supportive, helping the children
  to learn and grow through the process.
