personas:
  professional: Lyah Huger, a 27‑year‑old instructional designer and classroom teacher, leverages meticulous lesson planning, data‑driven assessment, and integrated art‑STEM projects to create collaborative
    learning environments while channeling their curiosity and compassionate mentorship into empowering students and novice educators alike.
  sports: Lyah Huger, a 27‑year‑old fitness enthusiast, rides with the City Pedal Club on Saturday mornings, participates in Tuesday evening Zumba classes, and roots for the River City Raptors basketball
    team while using Strava to log rides and setting personal goals for a 50‑mile weekly cycling distance.
  arts: Lyah Huger, a 27‑year‑old painter and museum regular, finds inspiration in Frida Kahlo’s self‑portraits, Yayoi Kusama’s immersive installations, and contemporary composer Ólafur Arnalds, spending
    weekends sketching in local galleries and curating an Instagram feed that mixes their own watercolor series with critiques of social‑justice themed art exhibitions.
  travel: Lyah Huger, a 27‑year‑old cultural explorer, plans trips with meticulous itineraries on Notion, prefers immersive city tours over resort stays, has already visited the street murals of Mexico
    City, the Gaudí architecture of Barcelona, and hopes to trek the historic tea fields of Uji, Japan, while budgeting travel costs through a dedicated travel fund.
  culinary: Lyah Huger, a 27‑year‑old home cook, alternates between mastering family‑heritage chicken biryani and experimenting with miso‑glazed salmon, frequently incorporating fresh turmeric, lemongrass,
    and heirloom tomatoes, and enjoys hosting potluck evenings where friends sample their signature charcoal‑charred vegetable flatbread.
  core: Lyah Huger, a 27‑year‑old educator‑artist, blends disciplined lesson design with spontaneous sketching, obsessively tracks every expense, battles anxiety with breathing exercises, and can’t resist
    a late‑night episode of a true‑crime podcast before bed.
background:
  cultural: Lyah identifies as Black American, with roots in the Southern United States and extended family ties to West Africa. Growing up in the Pacific Northwest, she was immersed in a multicultural
    community that blended African‑American traditions—such as music, storytelling, and communal gatherings—with the region’s emphasis on outdoor recreation and progressive social values. She actively participates
    in local Black cultural organizations, celebrates Juneteenth and Black History Month, and incorporates African‑American literature and history into her teaching. Her cultural heritage informs her commitment
    to equity, community service, and fostering a sense of belonging for all students.
attributes:
  skills: '[''Lesson planning'', ''Curriculum development'', ''Differentiated instruction'', ''Student assessment'', ''Data analysis'', ''Classroom management'', ''Mentoring and counseling'', ''Conflict
    resolution'', ''Collaborative team teaching'', ''Technology integration'', ''Event coordination'', ''Project management'']'
  hobbies: '[''Painting'', ''Sketching'', ''Museum visits'', ''Gallery tours'', ''Group fitness classes'', ''Dance'', ''Community volunteering'', ''Youth tutoring'', ''Cultural festivals'', ''Journaling'',
    ''Reading contemporary fiction'', ''Reading non-fiction on social justice'', ''Cooking family recipes'', ''Exploring new cuisines'']'
  career_goals: Lyah aims to earn a bachelor's degree in education within the next two years, followed by a master's in educational leadership. She aspires to become a lead teacher or department head, championing
    an interdisciplinary arts‑STEM program at her school. She plans to launch an after‑school arts mentorship program for underserved students and to serve as a mentor for new teachers. Long‑term, she envisions
    influencing district policy to promote culturally responsive pedagogy and equity.
