  career_goals: Katrina envisions a future where she can blend her curiosity for science with a practical desire to help her community. She aspires to pursue a career in biomedical engineering or public
    health, aiming to develop affordable medical technologies or health education programs for underserved populations. In the short term, she plans to deepen her knowledge in STEM subjects, participate
    in science fairs, and seek mentorship opportunities that will guide her toward a college degree in a related field.
