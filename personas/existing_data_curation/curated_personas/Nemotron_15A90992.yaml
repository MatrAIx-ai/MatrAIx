personas:
  professional: Katrina Ruffin, an aspiring junior game developer, merges her love of sci‑fi storytelling and digital art with practical coding skills in Scratch, channeling her organized yet flexible nature
    into collaborative school science club projects while independently crafting narrative‑driven games that balance imaginative worlds with clear, user‑friendly mechanics.
  sports: Katrina Ruffin, who enjoys early morning beach runs and occasional surfing with the local junior surf club, follows the coastal basketball team the San Diego Clippers and cheers for the national
    women's soccer squad the USWNT during summer tournaments, while participating in the school’s swim team for competitive laps each winter.
  arts: Katrina Ruffin, an avid piano player of Ludovico Einaudi’s contemplative pieces and a digital illustrator inspired by Hayao Miyazaki’s animation, devotes evenings to composing short sci‑fi stories
    reminiscent of Neil Gaiman, while curating a personal playlist that includes the ambient synths of M83 and attending local gallery openings featuring emerging teenage artists.
  travel: Katrina Ruffin, who prefers thoughtfully planned weekend trips to nearby coastal trails like the Monterey Peninsula and dreams of exploring the neon streets of Tokyo for anime inspiration, balances
    her wanderlust with a limited family budget, often using a travel journal to sketch landscapes and research low‑cost hostels for future solo adventures.
  culinary: Katrina Ruffin, a budding home chef comfortable whipping up spaghetti carbonara with pancetta and parmigiano, crafts mango‑blueberry smoothies with chia seeds for a post‑coding snack, and experiments
    with basil pesto using fresh pine nuts, though they sometimes forget to clean the kitchen counter before starting a new project.
  core: Katrina Ruffin, a quiet yet inquisitive teen, channels solitary imagination into creative tech projects while balancing disciplined practicality with occasional impulse purchases and a habit of
    postponing chores.
background:
  cultural: Katrina is raised in a close‑knit African‑American family in Ponte Vedra, Florida. Her household emphasizes cultural pride, storytelling, and community involvement. Family gatherings often feature
    soul food and discussions about African‑American history, including celebrations of Juneteenth and visits to local cultural events. She attends a Baptist church where gospel music and community service
    are central, fostering a sense of collective responsibility. The coastal Floridian environment blends with her cultural heritage, inspiring an appreciation for beach activities and marine conservation,
    while the rhythmic influences of jazz, R&B, and hip‑hop shape her musical tastes.
