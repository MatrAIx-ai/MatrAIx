persona_description: A Michigan educator who is responsible for overseeing and administering the state's comprehensive system of assessments to measure student achievement in learning the state's content
  standards. They are also involved in the administration of summative assessments required under the Michigan State School Aid Act and/or the Federal Every Student Succeeds Act (ESSA) and participate in
  the National Assessment of Educational Progress (NAEP) in grades 4, 8, and 12. They are knowledgeable about Michigan's summative assessments, the state's comprehensive system of assessments, and the requirements
  for administering and participating in the assessments.
