  career_goals: Jennifer aims to become a recognized leader in diabetic foot care and innovative orthotic technology within the next five years. She plans to expand her current practice into a regional
    multidisciplinary foot health center that integrates podiatry, vascular medicine, endocrinology, and sports rehabilitation, providing comprehensive services to the underserved rural population of East
    Tennessee. She is committed to conducting and publishing high-impact research on wound healing and tele-medicine foot assessments, seeking NIH funding to develop a remote monitoring platform. Her competitive
    nature drives her to achieve board certification in foot and ankle surgery and to hold an executive position in the American College of Foot and Ankle Surgeons. Balancing her ambition with her sensitivity
    to stress, she intends to incorporate mindfulness and artistic workshops into her clinic’s patient care model, fostering holistic healing and reducing burnout among staff.
