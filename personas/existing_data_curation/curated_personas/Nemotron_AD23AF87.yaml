  hobbies: '[''LEGO Technic building'', ''Sudoku and logic puzzles'', ''Reading science and tech magazines'', ''Piano practice'', ''Scratch coding'', ''Robotics club participation'', ''Helping with cooking
    traditional Mexican dishes'']'
  career_goals: Guillermo dreams of becoming an engineer—preferably civil or mechanical—so he can design sturdy, efficient structures that benefit his neighborhood. He is also intrigued by software development
    and hopes to create educational tools that help other students learn math and coding. Long‑term, he wants to combine his engineering skills with his quiet, orderly approach to contribute to sustainable
    housing projects for underserved communities, while maintaining a stable, predictable career path.
