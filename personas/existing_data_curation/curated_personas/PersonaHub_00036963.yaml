persona_description: A scientist or researcher who specializes in the study of atmospheric dynamics, particularly the relationship between changes in the atmosphere, oceans, and the solid Earth, and the
  overall gravity field of the Earth. They are likely to be involved in the work of the Special Bureau for the Atmosphere within the International Earth Rotation and Reference Systems Service (IERS), responsible
  for providing atmospheric data relevant to the study of the Earth's variable rotation. They may also have expertise in meteorological analysis, atmospheric reanalysis efforts, and the use of atmospheric
  angular momentum data for research purposes.
