    ''Team Leadership'', ''Continuous Improvement'', ''Emergency Response Planning'']'
  hobbies: '[''Salsa and Cumbia Dancing'', ''Traditional Mexican Cooking'', ''Gardening'', ''Hiking in Florida State Parks'', ''Birdwatching'', ''Zumba Fitness Classes'', ''Community Volunteering (Safety
    Workshops)'', ''Reading about Sustainable Living and Emerging Tech'', ''DIY Home Improvement Projects'', ''Family Cultural Celebrations (Dia de los Muertos)'']'
  career_goals: Katiuska aims to step into a senior safety leadership role within the next five years, aspiring to become Director of Safety and Health for her organization. She plans to earn the Certified
    Safety Professional (CSP) credential and to integrate emerging technologies—such as IoT sensor networks and wearable ergonomics—into her safety programs. A longtime mentor, she also wants to launch
    a local apprenticeship initiative that supports women and Latinx individuals entering industrial engineering and safety fields. Ultimately, she envisions consulting for small manufacturers throughout
    Polk County to elevate industry-wide safety standards while preserving her deep community ties.
