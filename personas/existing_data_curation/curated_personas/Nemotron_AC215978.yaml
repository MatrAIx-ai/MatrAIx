personas:
  professional: Katiuska Perez, a 56‑year‑old industrial engineer with three decades of occupational health and safety expertise, merges curiosity‑driven exploration of emerging IoT sensor networks with
    pragmatic Six Sigma and Lean methods to design ergonomic workstations while delivering bilingual safety training that reflects the communal spirit of local festivals.
  sports: Katiuska Perez hikes the trails of Myakka River State Park, enjoys birdwatching, participates in weekly Zumba classes, cheers for Orlando City SC, and occasionally joins a senior softball league
    where they showcase assertive teamwork.
  arts: Katiuska Perez leads salsa and cumbia workshops at the community center, draws inspiration from the rhythms of Celia Cruz and the guitar work of Carlos Santana, and volunteers at the annual arts
    fair where they curate a small exhibit of folk art celebrating Día de los Muertos.
  travel: Katiuska Perez prefers road trips that blend cultural immersion with nature, having recently explored Oaxaca’s culinary scene and trekked the Everglades, and keeps a wish list that includes a
    pilgrimage to the Basilica of Guadalupe and a weekend retreat in Asheville’s mountain cabins.
  culinary: Katiuska Perez’s kitchen is a laboratory for traditional dishes like mole poblano, tamales de elote, and chiles en nogada, skillfully blending them with modern ingredients such as quinoa and
    avocado, and they frequently host neighborhood potlucks that showcase a flair for bold, layered flavors.
  core: Katiuska Perez is a community‑driven safety engineer who balances meticulous data analysis with spontaneous salsa steps, disciplined investing with occasional dance‑wear splurges, and proactive
    health monitoring while occasionally forgetting the dentist.
background:
  cultural: Born to Mexican parents, Katiuska grew up in a bilingual household where Spanish was spoken daily and Mexican traditions were celebrated year‑round. She carries forward strong family values,
    respect for elders, and a communal spirit that informs both her personal life and professional ethos. In Bartow, she actively participates in local Mexican festivals, prepares traditional foods for
    holidays, and serves as a cultural liaison, translating safety materials for the Hispanic community. Her Catholic faith shapes her involvement in church‑based charity work, and she honors cultural observances
    such as Día de los Muertos and La Virgen de Guadalupe, blending heritage with her American life.
