personas:
  professional: Eric Meehan, a retired shipyard mechanic turned volunteer historian, combines his hands‑on expertise in boat repair, woodworking, and automotive upkeep with a deep curiosity for local history
    to mentor seniors at the community historical society, while his relaxed attitude toward obligations and occasional disorganization steer him toward flexible, project‑based volunteering rather than
    rigid schedules.
  sports: Eric Meehan enjoys casual fitness through daily walks along the waterfront, follows the Seattle Seahawks and Seattle Mariners with avid enthusiasm, and participates in the local Puget Sound Fishing
    Club’s seasonal tournaments while playing bridge at the senior center, balancing low‑impact activity with his love of the water.
  arts: Eric Meehan immerses himself in classic big‑band jazz, regularly listening to recordings by Duke Ellington, Count Basie, and Ella Fitzgerald, and enjoys attending exhibitions at the Seattle Art
    Museum featuring Northwest photographers, while his evenings often include reading biographies of historical figures like Theodore Roosevelt.
  travel: Eric Meehan prefers relaxed, self‑driven road trips along the Puget Sound, has visited San Juan Island, explored Victoria, BC, and dreams of a leisurely cruise to the Norwegian fjords, planning
    trips around his modest budget and the need to stay close to family and community obligations.
  culinary: Eric Meehan, a confident home cook, loves preparing cedar‑plank salmon with wild Pacific Northwest herbs, steaming fresh Dungeness crab, and simmering garden‑grown tomato stew, often seasoning
    with rosemary and thyme, and enjoys occasional meals at local fish houses that serve clam chowder.
  core: Eric Meehan is a curious yet practical octogenarian who balances his love of hands‑on projects and community storytelling with a penchant for worrying about finances and occasional forgetfulness,
    all while savoring early mornings on his dock with a fishing rod in hand.
background:
  cultural: Eric grew up in the post‑World War II American Midwest before moving to the Pacific Northwest, embodying the values of the “Greatest Generation.” His white, working‑class background is rooted
    in a community that values self‑reliance, modesty, and service. Living in Bremerton, a naval town, he has been influenced by the maritime culture and veteran community, while embracing the region’s
    love of the outdoors, local history, and communal support. His cultural identity reflects a blend of mid‑century American traditions, a respect for practical knowledge, and a curiosity about the evolving
    world.
