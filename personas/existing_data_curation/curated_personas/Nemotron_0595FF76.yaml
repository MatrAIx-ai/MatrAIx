  hobbies: '[''Fishing'', ''Woodworking'', ''Gardening'', ''Reading historical biographies and local history'', ''Playing bridge'', ''Listening to classic jazz and big band music'', ''Genealogy research'',
    ''Digital photography'', ''Volunteer work (food bank, community clean‑up)'', ''Road trips on the Puget Sound'']'
  career_goals: Although retired, Eric’s goals focus on preserving his independence and staying mentally active. He aims to finish a written memoir of his life experiences, expand his knowledge of digital
    photography to capture family moments, volunteer at the local historical society to share his stories, and maintain his health through regular walks and community exercise classes. He also hopes to
    be a supportive mentor to his grandchildren, teaching them practical skills while learning from their tech‑savvy perspectives.
