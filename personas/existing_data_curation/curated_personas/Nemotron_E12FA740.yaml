  career_goals: Even after a long career, Courtney aims to deepen her expertise by earning a Six Sigma Yellow Belt and leading a site‑wide quality‑improvement project that reduces waste and improves safety.
    She hopes to mentor a new generation of inspectors, formalizing a training program that blends her practical know‑how with emerging digital inspection tools. As she approaches retirement, she envisions
    transitioning to a part‑time consulting role for local small manufacturers, helping them build reliable quality systems while staying engaged with the industry she values.
