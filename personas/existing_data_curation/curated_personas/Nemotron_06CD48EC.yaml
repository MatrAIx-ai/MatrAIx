personas:
  professional: Agustín Martinez, a retired community arts coordinator, leverages their bilingual communication skills, event‑coordination experience, and deep curiosity to curate informal exhibitions at
    senior centers and guide intergenerational discussion groups that blend historical narratives with contemporary visual art.
  sports: Agustín Martinez, an enthusiastic walker who strolls daily through Grant Park with their wife, participates in community Latin dance evenings and occasionally joins a low‑impact senior yoga class,
    while cheering on the Chicago Cubs at summer games and occasionally playing friendly shuffleboard at the local senior center.
  arts: Agustín Martinez, a devoted patron of the Art Institute of Chicago and the Museum of Contemporary Art, regularly attends classical piano recitals featuring Lang Lang and vibrant Latin jazz sessions
    by Chucho Valdés, and savors the works of Georgia O'Keeffe and Diego Rivera; they often lead informal gallery talks that weave storytelling with visual analysis.
  travel: Agustín Martinez, who has explored Quito and the historic streets of Santa Fe, dreams of a leisurely cruise to the Galápagos Islands and a road trip along the Pacific Coast, but typically plans
    short weekend getaways to Chicago’s lakefront beaches or nearby Wisconsin wine country, balancing their desire for adventure with a modest travel budget and the need for accessible accommodations.
  culinary: Agustín Martinez, an adept home chef, loves preparing traditional dishes such as llapingachos, seco de chivo with ají molido, and golden‑fried empanadas stuffed with cheese and plantain, frequently
    experimenting with fresh cilantro, naranjilla juice, and local Chicago farmer’s market vegetables, while sharing meals with friends at their balcony garden gatherings.
  core: Agustín Martinez, a charismatic, art‑loving senior, blends curiosity and community spirit with a tender but often anxious heart, turning their love of music, cuisine, and storytelling into vibrant
    intergenerational workshops.
background:
  cultural: Agustín was born in a small town in the Andean highlands of Ecuador and emigrated to the United States in his early twenties. He grew up with deep ties to Indigenous and mestizo traditions,
    Catholic celebrations, and vibrant folk music such as pasillo and albazo. In Chicago, he has remained active in the Ecuadorian diaspora, helping to organize cultural festivals, bilingual community events,
    and support networks for new immigrants. His heritage informs his love for storytelling, communal meals, and a strong sense of family solidarity.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Community outreach and coordination'', ''Event planning and facilitation'', ''Arts appreciation and informal curation'', ''Storytelling and oral
