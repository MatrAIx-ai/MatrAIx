  hobbies: '[''Visiting art museums and galleries'', ''Attending live music and concert events'', ''Reading historical fiction and biographies'', ''Balcony gardening'', ''Cooking traditional Ecuadorian
    cuisine'', ''Playing acoustic guitar'', ''Participating in community dance and salsa nights'', ''Walking in local parks'', ''Senior‑center craft workshops'', ''Crossword puzzle clubs'']'
  career_goals: In retirement, Agustín aims to leave a lasting cultural legacy within his Chicago community. He aspires to compile a memoir of his family's migration story, develop an intergenerational
    art and cooking workshop series that connects seniors with local schools, and serve as an advisor on the board of the local senior center. He also hopes to advocate for mental‑health awareness among
    older adults, using his own experience with anxiety to foster supportive group sessions.
