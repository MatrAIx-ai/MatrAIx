  career_goals: Frederick aims to leverage his extensive analytical background to transition into a senior strategic leadership role, such as Director of Business Strategy or Chief Strategy Officer, where
    he can shape long‑term corporate direction and champion data‑driven innovation. He aspires to embed sustainability and social responsibility into enterprise practices, aligning business goals with community
    enrichment. Additionally, he intends to serve on the board of a regional arts organization, championing programs that connect business resources with cultural initiatives. Over the next five years,
    he plans to mentor emerging analysts, develop a cross‑functional mentorship program within his firm, and eventually pivot to a part‑time advisory capacity that allows him greater time for artistic pursuits
    and volunteer work.
