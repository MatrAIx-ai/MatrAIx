persona_description: A Petroleum Engineer with expertise in prospectivity analysis, exploration and evaluation of oil and gas resources. The individual has a deep understanding of the geological and petrological
  characteristics of the Late Jurassic and Early Cretaceous fluvial-deltaic and Tertiary carbonate reservoirs in Papua New Guinea. They have experience in conducting a country-wide petroleum prospectivity
  review using their extensive integrated sub-surface database and in-country knowledge, and have a strong track record in identifying and quantifying the highly prospective under-explored focus regions
  identified in 2015. The individual is highly skilled in structuring and integrating structural, stratigraphic, burial, maturation, migration, uplift and erosion models of the total petroleum system in
  PNG, and has contributed to a new regional petroleum charge model of the Foldbelts, Foreland and Offshore regions. They are also adept at explaining why young traps both at, and hindwards, of the present
  day frontal mountain monocline have been charged despite some foldbelt oil and gas fields residing in traps either too young to have received pre-Tertiary petroleum charge or having no obvious communication
  with recently generating source kitchens.
