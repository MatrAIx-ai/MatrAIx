personas:
  professional: Bobbie Muller, a budding robotics and LEGO engineer, merges curiosity with practicality by meticulously planning complex builds, leading the school’s robotics club’s Scratch game demos,
    and confidently presenting project ideas to peers and teachers.
  sports: Bobbie Muller, a lively member of the Fort Worth United youth soccer team, also follows the Dallas Cowboys and Dallas Mavericks with enthusiasm, spends weekends cheering on the Texas Rangers at
    the stadium, and maintains a disciplined weekend routine of park jogs and playful dribbling drills.
  arts: Bobbie Muller channels their creative energy into drawing comic strips inspired by Spider‑Man and Star‑Wars, enjoys listening to Imagine Dragons and Taylor Swift while practicing Scratch game music,
    and regularly attends Saturday matinee performances at the local children’s theater.
  travel: Bobbie Muller loves family road trips to the Fort Worth Stockyards, camping under the stars in Palo Pinto County, and day‑long hikes along the Trinity River Trail, while dreaming of visiting NASA’s
    Johnson Space Center and Disney World for a cosmic adventure.
  culinary: Bobbie Muller relishes helping at weekend barbecues, especially grilling chicken‑fried steak and corn on the cob, can whip up a surprisingly decent banana pudding for dessert, and has a surprising
    knack for assembling elaborate LEGO‑themed snack platters featuring pretzel sticks and cheese cubes.
  core: Bobbie Muller blends relentless curiosity with methodical organization, turning LEGO builds, Scratch coding, and soccer drills into daily adventures, all while juggling a modest allowance, mild
    allergies, and a love for space movies and backyard BBQs.
background:
  cultural: Bobbie was raised in Fort Worth, Texas, in a middle‑class family with deep roots in the American South‑Central region. His cultural upbringing blends typical Texan values of hospitality, community
    involvement, and appreciation for outdoor activities with broader American traditions. He celebrates holidays such as Thanksgiving, Fourth of July, and Christmas, often attending local parades, fireworks,
    and community fairs. The family participates in a local church, which instills values of cooperation and service. Growing up near the Dallas‑Fort Worth metroplex, Bobbie has been exposed to a mix of
    Southern cuisine, high school football culture, and a vibrant arts scene, all of which shape his sense of identity.
