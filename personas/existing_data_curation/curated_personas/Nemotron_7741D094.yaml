  career_goals: Bobbie dreams of excelling academically, especially in science and math, with the immediate goal of winning his elementary school's science fair. He also wants to become the starting midfielder
    on his soccer team and serve as class monitor to help keep things organized. Looking farther ahead, his imagination fuels a strong desire to become an astronaut or aerospace engineer, turning his love
    of space and building things into a career that lets him explore the universe while contributing practical solutions to real‑world problems.
