  career_goals: Looking ahead, Enilsa aims to transition from full-time engineering roles into a part-time safety consulting practice that serves small businesses and non-profits in Riverside County. She
    plans to earn the Certified Safety Professional (CSP) credential to formalize her expertise and to lead a regional occupational-health coalition that delivers free safety workshops for local workers
    and senior citizens. Mentoring is a priority; she wants to establish an apprenticeship program for aspiring engineers, especially women from underrepresented backgrounds. Additionally, Enilsa hopes
    to author a practical guide on integrating lean principles with workplace safety, sharing her blend of curiosity-driven innovation and hands-on pragmatism.
