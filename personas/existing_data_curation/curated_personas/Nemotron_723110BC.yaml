personas:
  professional: An aspiring young game designer, Alexis Violet combines a love for storytelling with methodical planning; they build Scratch adventures while volunteering at the library to share digital
    projects with peers.
  sports: A dedicated youth soccer player, Alexis Violet practices with the Thunderbolts Youth Soccer Club, follows the local high‑school basketball team the Rockets, and participates in the school’s after‑school
    track program to stay active; they also cheer for the city’s professional baseball team the Tigers on weekend outings.
  arts: A budding pianist and fantasy literature enthusiast, Alexis Violet practices Beethoven’s Für Elise at home, devours the Harry Potter series, and draws inspiration from composer Hans Zimmer and illustrator
    J.K. Rowling’s style; they frequently perform for younger library visitors.
  travel: An inquisitive junior explorer, Alexis Violet has visited the local science museum in Metro City, camped at Redwood State Park, and dreams of exploring the castles of Scotland and the coral reefs
    of Bali on future family trips; they also love planning weekend bike rides around the neighborhood.
  culinary: A garden‑to‑table cooking enthusiast, Alexis Violet loves picking fresh carrots and tomatoes from the family plot to make carrot‑tomato soup, bakes banana‑chip muffins, and enjoys the occasional
    pepperoni pizza with extra cheese; they often experiment by adding garden herbs like basil and thyme to classic dishes.
  core: A curious, organized twelve‑year‑old named Alexis Violet blends a love for structured creativity with compassionate community service, all while they juggle spare‑time coding, piano practice, and
    backyard gardening.
background:
  cultural: Alexis grew up in Mandan, North Dakota, a small Midwestern town with a close‑knit community. Her family’s heritage reflects the Northern Plains settler roots common in the region, with influences
    from German and Scandinavian ancestry that appear in holiday traditions, hearty home‑cooked meals, and a connection to seasonal cycles. The local culture emphasizes self‑reliance, neighborly support,
    participation in community events like county fairs and service projects, and values of hard work, humility, and cooperation that shape her worldview.
