  career_goals: Alexis envisions a future where she can serve her community by helping others. She is attracted to careers in education and healthcare, such as becoming a teacher, school counselor, or registered
    nurse. Her love for animals also inspires a possible path as a veterinarian. She hopes to stay close to Mandan, contributing to local schools, health initiatives, or community service programs.
