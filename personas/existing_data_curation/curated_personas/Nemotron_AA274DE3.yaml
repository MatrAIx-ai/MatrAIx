  hobbies: '["pickup basketball","drumming in middle school band","multiplayer video gaming (e.g., Fortnite, Minecraft)","building LEGO Mindstorms robots","reading graphic novels and superhero comics","biking
    on city trails","volunteering at neighborhood clean-ups","helping organize community fairs"]'
  career_goals: Kenneth’s long-term ambition is to work in a role that lets him combine his love of teamwork with a practical, hands-on focus. He is interested in becoming a physical‑education teacher or
    a youth sports coach, where he can design and run structured training programs while adapting to the needs of his students. He also sees himself in community‑program coordination, helping plan events
    for local nonprofits, and he is open to exploring a technical support or IT role that leverages his basic digital skills. Over the next few years he plans to take on leadership positions in school clubs,
    earn certifications in coaching, and build a robust portfolio of organized activities to support his college applications.
