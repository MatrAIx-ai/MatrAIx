personas:
  professional: Kenneth Gilpin, a 14‑year‑old middle‑school student, channels a love of structure into designing LEGO Mindstorms robots, drumming in the school band, and organizing pickup basketball games,
    showcasing a practical, hands‑on approach to learning, teamwork, and leadership.
  sports: Kenneth Gilpin thrives on pickup basketball at Riverside Park, follows the Indianapolis Colts and the Indiana Pacers with a collection of team caps, cycles the Monon Trail for cardio, and proudly
    dons a Pacers teal jersey while shooting free throws after school.
  arts: Kenneth Gilpin drums enthusiastically in the middle‑school band, streams Imagine Dragons and Post Malone for inspiration, devours Marvel graphic novels like Spider‑Man and X‑Men, and sketches comic‑style
    doodles during free periods, blending rhythm and visual storytelling.
  travel: Kenneth Gilpin has explored local highlights such as the Indianapolis Museum of Art and the Indianapolis Zoo, taken a family road trip to Chicago’s Navy Pier, and dreams of visiting Washington,
    D.C. and Disneyland, preferring loosely planned itineraries that allow spontaneous detours while staying within a modest family budget.
  culinary: Kenneth Gilpin favors pepperoni pizza, chicken nuggets with ranch, and homemade mac and cheese, often experimenting by adding smoked paprika or jalapeños, and enjoys cooking simple snack platters
    for their robotics club after school, though they occasionally raid the pantry for late‑night chips.
  core: Kenneth Gilpin blends a structured love of robotics and team sports with a laid‑back approach to responsibilities, frequently juggling schoolwork, gaming, and community service while occasionally
    procrastinating on chores.
background:
  cultural: Kenneth grew up in a middle‑class white family in Indianapolis, Indiana. His upbringing reflects typical Midwestern values of friendliness, community involvement, and a strong connection to
    local sports culture—from the Indianapolis Colts to the Indiana Pacers. He attends a public middle school where school traditions, Friday night basketball games, and community events like the Indy 500
    celebrations shape his social life. His family often participates in church activities and neighborhood gatherings, reinforcing a culture of modesty, practicality, and mutual support. Exposure to both
    urban and suburban settings gives him a balanced perspective on regional customs, food, and seasonal festivals.
attributes:
  skills: '["team collaboration","basic digital literacy (word processing, spreadsheets, presentations)","middle-school mathematics and science knowledge","confident peer communication","conflict mediation","following
