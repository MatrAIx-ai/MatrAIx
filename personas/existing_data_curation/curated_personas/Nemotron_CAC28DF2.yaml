  hobbies: '[''Reading literary fiction'', ''Educational psychology'', ''Knitting and embroidery'', ''Gardening'', ''Hiking local trails'', ''Yoga'', ''Cooking seasonal meals'', ''Small book club'', ''Craft-making
    meetup'']'
  career_goals: Paige aims to deepen her impact on school‑wide instruction by moving into a lead‑teacher or curriculum‑coordinator role where she can mentor new educators and shape interdisciplinary units.
    She is considering a master's in educational leadership to prepare for possible administrative positions, but she also values staying classroom‑focused, so she hopes to develop a sustainable after‑school
    STEAM program that reflects her love of project‑based learning. Long‑term, she dreams of authoring a guide on flexible, student‑centered teaching that blends curiosity with practical standards, while
    simultaneously cultivating better work‑life balance through stress‑management practices.
