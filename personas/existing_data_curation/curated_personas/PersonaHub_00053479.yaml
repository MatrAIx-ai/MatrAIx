persona_description: A team of researchers at the University of Kentucky, working on the comprehensive survey of Mare Reproductive Loss Syndrome, looking for risk factors on farms to prevent the syndrome
  from recurring in the future. They are interested in the scientific investigation of the involvement of cyanide poisoning from Eastern tent caterpillars and hemlock trees, and are seeking to understand
  the animal, pasture, and environmental factors on farms.
