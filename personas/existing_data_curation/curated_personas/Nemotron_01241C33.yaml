  career_goals: William aims to move into a senior leadership role within the next five years, targeting positions such as Sales Manager or Regional Director where he can shape sales strategy and mentor
    a team. He plans to earn a certification in sales analytics and to spearhead implementation of advanced CRM automation to boost efficiency. Long‑term, he envisions launching his own niche wholesale
    distribution venture that leverages his deep industry knowledge and competitive drive, while also pursuing financial stability for his growing family.
