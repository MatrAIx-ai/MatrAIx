  career_goals: As Luz grows, she aims to earn a high‑school equivalency and pursue a vocational program in healthcare, such as becoming a certified nursing assistant, to blend practicality with her curiosity
    about how bodies heal. She also entertains the idea of launching a small home‑based business selling traditional Mexican snacks, merging cultural heritage with entrepreneurial ambition. Her critical
    and competitive nature drives her to seek leadership roles, perhaps coordinating a community outreach group for immigrant families in Perry, while her emotional stability ensures she remains focused
    on long‑term, achievable milestones.
