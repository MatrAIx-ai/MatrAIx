personas:
  professional: Calvin Cotton, a 59‑year‑old veteran bus driver with three decades of route‑planning expertise, blends a hands‑on curiosity for new transit tech with a practical, safety‑first mindset, delivering
    courteous service while mentoring newcomers despite a tendency to resist rigid schedules.
  sports: Calvin Cotton enjoys early‑morning fishing on the Pearl River as his primary sport, follows the New Orleans Saints and the Mississippi State Bulldogs baseball team, and participates in a community
    walking group that meets twice weekly, though his spontaneous nature sometimes skips scheduled workouts.
  arts: Calvin Cotton, a lover of classic R&B and gospel, regularly sings along to Al Green, Aretha Franklin, and Mahalia Jackson at church choir rehearsals, spins vinyl records of Marvin Gaye on weekends,
    and occasionally attends local theater productions, using music as a soothing counterbalance to work‑day stress.
  travel: Calvin Cotton favors laid‑back road trips to fishing hotspots like the Florida Keys and cultural havens such as New Orleans, plans trips spontaneously over strict itineraries, relies on a modest
    travel fund built from steady bus driver earnings, and dreams of a family reunion cruise down the Gulf Coast before fully retiring.
  culinary: Calvin Cotton, an avid gardener, transforms homegrown collards, sweet potatoes, and tomatoes into Southern staples like smoked collard greens, sweet potato casserole, and fresh tomato barbecue
    sauce, cooking for family gatherings with a seasoned hand that still occasionally burns the edges of a cornbread skillet when distracted.
  core: Calvin Cotton is a seasoned bus driver whose love for fishing, vintage engines, and soulful music tempers a worry‑prone, spontaneous spirit that strives to mentor the next generation while savoring
    Southern flavors at home.
background:
  cultural: Calvin was born and raised in the Mississippi Delta, part of a close‑knit African‑American community that blends Southern hospitality with a deep respect for history and family. Church has been
    a cornerstone of his upbringing, shaping his values of service, resilience, and communal support. He grew up hearing stories of the civil‑rights movement from his grandparents, which fostered a quiet
    pride in his heritage and a commitment to giving back to his neighbors. Local traditions—seasonal potlucks, church festivals, and storytelling gatherings—have instilled in him a love for food, music,
    and oral history. While he embraces modern tools at work, Calvin remains grounded in the cultural practices that emphasize perseverance, respect for elders, and the importance of nurturing the next
    generation.
