  hobbies: '[''Fishing'', ''Gardening'', ''Cooking Southern cuisine'', ''Listening to R&B and gospel music'', ''Singing in church choir'', ''Car engine restoration'', ''Playing dominoes'']'
  career_goals: Approaching retirement, Calvin hopes to transition into a mentorship role where he can share his practical knowledge with younger drivers and help shape the transit department’s training
    curriculum. He is working toward a Transportation Safety Certification and would like to lead a community‑focused pilot program that provides flexible, on‑demand rides for seniors in Jasper County.
    While he values the autonomy of his current schedule, he also seeks a position that offers a steadier routine to reduce the stress and worry that come with tight deadlines. Ultimately, Calvin aims to
    leave a legacy of safety, reliability, and community service within the local transit system.
