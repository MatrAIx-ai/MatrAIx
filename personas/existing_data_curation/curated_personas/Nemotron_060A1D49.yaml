  hobbies: '[''Soccer'', ''Cooking Mexican cuisine'', ''Cycling'', ''Listening to Tejano music'', ''Exploring logistics technology (e.g., RFID, automation)'', ''Reading bilingual poetry'', ''DIY home‑improvement
    projects'', ''Volunteer work at community center'']'
  career_goals: Francisco aims to advance from his current clerk role to a logistics coordinator position within the next two years, and eventually become a warehouse supervisor or supply chain analyst.
    He plans to earn an associate’s degree in logistics or supply chain management and obtain professional certifications such as the Certified Supply Chain Professional (CSCP). His long‑term ambition is
    to lead a regional distribution center that integrates technology‑driven efficiencies while maintaining a workplace culture of cooperation and respect.
