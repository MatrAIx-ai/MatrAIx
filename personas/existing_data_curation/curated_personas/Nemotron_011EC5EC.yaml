  career_goals: Desiree aims to complete a GED program and enroll in a community college to study communications, media production, or marketing. She hopes to become a content creator and event coordinator,
    using her sociable nature to produce engaging digital media and organize community events. Long‑term, she envisions a career that blends creativity with practical project management, possibly in youth
    outreach or nonprofit communications, while also pursuing coursework in psychology to better manage stress and help others.
