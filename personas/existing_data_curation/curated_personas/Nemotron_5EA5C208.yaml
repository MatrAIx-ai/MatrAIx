personas:
  professional: Iris Wilbor, a 55‑year‑old IT support specialist renowned for troubleshooting hardware, configuring networks, and scripting automation in Python, blends meticulous documentation with an
    artistic eye to create user‑friendly interfaces, while channeling their curiosity and patient communication style toward a goal of earning a CompTIA Network+ certification and stepping into a senior
    network administrator role at a nonprofit that champions digital inclusion.
  sports: Iris Wilbor stays active by joining a Charleston waterfront paddle‑boarding group each Saturday, cheering on the Charleston Battery soccer team, and participating in a senior walking club that
    meets thrice a week, while occasionally attending local tennis matches for social fun.
  arts: Iris Wilbor immerses themselves in the visual arts scene, attending monthly gallery openings featuring contemporary Caribbean‑inspired painters, creating luminous watercolor pieces echoing turquoise
    and coral hues, curating a vintage vinyl collection that includes classics by Celia Cruz and Juan Luis Guerra, and snapping candid photographs of Charleston’s historic streets, all of which feed their
    creative, open‑minded outlook.
  travel: Iris Wilbor prefers thoughtfully planned trips that blend cultural immersion and relaxation, such as revisiting Santo Domingo’s colonial zone to source authentic recipes, weekend road trips to
    Asheville’s Blue Ridge Mountains for hiking, and a leisurely cruise to the Bahamas where they can indulge in beachside sketching, always booking through a travel agency that offers senior discounts
    and flexible cancellation policies.
  culinary: Iris Wilbor delights in experimenting with Dominican cuisine, regularly preparing dishes like mangu with sautéed onions, sancocho brimming with root vegetables, and dulce de leche‑drizzled pastelitos,
    while their kitchen staples include plantains, sofrito, and ají dulce, and they frequently host intimate dinner parties where they pair homemade guava jam with a chilled glass of rosé.
  core: Iris Wilbor is a tech‑savvy artist whose curiosity fuels a dual passion for troubleshooting networks and painting vibrant watercolors, all while daring anxiety and a love for vintage vinyl keep
    their days lively and sometimes unpredictably impulsive.
background:
  cultural: Iris was born to Dominican parents who immigrated to the United States in the late 1970s. Growing up in a bilingual household in the Caribbean diaspora, she retained fluency in Spanish and a
    deep appreciation for Dominican customs, music, and cuisine. Living in North Charleston, she blends her Caribbean heritage with Southern hospitality, often sharing stories of her family's island celebrations
    while engaging with the diverse cultural scene of South Carolina. Her identity is shaped by the resilience of the Dominican community, the importance of family gatherings, and a commitment to preserving
    cultural traditions through community events and mentorship.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Network configuration (Cisco, Netgear)'', ''Software support (Windows, macOS, Linux)'', ''Python scripting for automation'', ''Basic web development
    (HTML/CSS)'', ''Digital graphic creation'', ''Technical documentation'', ''Help‑desk ticket management'', ''User training and support'', ''Bilingual technical assistance (English/Spanish)'']'
  hobbies: '[''Watercolor painting'', ''Photography'', ''Visiting art galleries'', ''Listening to merengue and bachata music'', ''Cooking Dominican cuisine'', ''Participating in cultural festivals'', ''Yoga
    and mindfulness meditation'', ''Walking along the Charleston waterfront'', ''Collecting vintage vinyl records'', ''Reading technology and art magazines'']'
  career_goals: Iris aims to obtain a CompTIA Network+ certification within the next year and leverage it to move into a senior network administrator role for a local nonprofit that focuses on digital inclusion.
    She dreams of designing community workshops that teach basic computer skills and digital literacy to senior citizens and Dominican youth in Charleston. Ultimately, she hopes to transition to a part‑time
    consulting position that lets her combine her technical background with her love for art, creating accessible digital tools for cultural organizations while maintaining a flexible schedule to support
    her mental‑health needs.
