  hobbies: '["Woodworking","Reading Non-fiction","Hiking","Cycling","Gardening","Classic Car Restoration","Volunteer Work (Habitat for Humanity)","Cooking","Wine Tasting"]'
  career_goals: Rudy aims to transition into a senior cost manager role, where he can lead a multidisciplinary estimating team and shape strategic budgeting processes for larger infrastructure projects.
    He plans to obtain the Certified Professional Estimator (CPE) credential and integrate emerging AI‑driven cost‑analysis tools to improve accuracy and efficiency. Long‑term, he envisions establishing
    a boutique consultancy that offers specialized cost‑control services with a focus on sustainable building practices, while maintaining a healthy work‑life balance to spend quality time with his family.
