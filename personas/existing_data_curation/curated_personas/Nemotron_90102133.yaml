personas:
  professional: Florentino Cortes is a retired handyman‑mentor whose lifelong mastery of carpentry, plumbing, and electrical basics lets them keep the neighborhood’s homes in good shape, while their competitive
    edge shines during spontaneous domino and bridge games that they treat as informal apprenticeships for the younger generation.
  sports: Florentino Cortes follows the Cangrejeros de Santurce baseball team and the national soccer squad on television, participates in low‑impact tai chi sessions with the Trujillo Alto Senior Walking
    Club, and channels their competitive spirit into weekly domino tournaments at the community center, where they treat each match as a mental workout.
  arts: Florentino Cortes enjoys listening to the timeless salsa of Celia Cruz, the romantic boleros of Los Panchos, and the poetic trova of Roy Brown on a portable radio, while occasionally watching classic
    films starring Rita Moreno, which together nourish their nostalgia for cultural storytelling and inform the way they conduct their own narrative sessions at the senior center.
  travel: Florentino Cortes prefers leisurely day trips to the historic streets of Old San Juan, occasional outings to the cooler highlands of Utuado, and yearly visits to their grandchildren in Miami,
    while they day‑dream about a future pilgrimage to the cherry blossoms of Kyoto, all planned with a simple paper itinerary and modest budget.
  culinary: Florentino Cortes expertly prepares arroz con gandules, mofongo, pasteles, and alcapurrias using garden‑fresh plantains, tomatoes, and herbs, often swapping traditional lard for olive oil to
    make healthier versions, and they delight in serving these dishes at family gatherings where they can showcase their secret sofrito recipe.
  core: Florentino Cortes is a fiercely competitive, garden‑loving nonagenarian who balances meticulous bookkeeping with a skeptical love of old radio music, never misses a domino game, and refuses to let
    a few aches stop them from preserving family stories.
background:
  cultural: Florentino was born and raised in Trujillo Alto during a transformative era marked by Puerto Rico’s industrial boom and a flourishing of island music like plena and salsa. His ancestry blends
    Spanish colonial lineage with Afro‑Puerto Rican heritage, giving him a deep appreciation for the island’s linguistic nuances, culinary diversity, and rhythmic traditions. A lifelong Catholic, he celebrates
    religious holidays such as San Juan and Navidad with familial gatherings centered on food, music, and prayer. The tight‑knit community of his barrio instilled values of responsibility, self‑reliance,
    and modest competition, evident in his organized approach to household management and his love of strategic games. Living close to the municipality of Cataño, he frequently visits the waterfront during
    festivals, where he shares stories of historic events—including the post‑World War II migration, the impact of Hurricane Hugo, and the resilience shown after Hurricane Maria—thereby preserving the collective
    memory of his generation for younger Puerto Ricans.
