  hobbies: '[''Gardening'', ''Dominoes'', ''Bridge'', ''Listening to Salsa and Boleros'', ''Traditional Cooking'', ''Reading Local Newspaper'', ''Neighborhood Walks'', ''Woodworking'', ''Genealogy Research'',
    ''Volunteer Storytelling'']'
  career_goals: Even at 96, Florentino’s ambitions center on maintaining his independence, staying mentally sharp, and leaving a lasting legacy for his family and community. He aims to document his life
    story and family genealogy in a handwritten memoir to give to his grandchildren. He wishes to continue mentoring younger relatives in cooking, gardening, and simple home repairs, turning his practical
    knowledge into a source of community pride. Florentino also plans to master the basics of video calling so he can stay in regular contact with distant family members, and he hopes to remain competitive
    in local bingo and domino tournaments, using them as a way to keep his mind active and engage with close friends.
