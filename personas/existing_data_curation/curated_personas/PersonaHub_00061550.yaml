persona_description: A paper scientist who specializes in the study of paper properties, particularly the effects of stretching, tearing resistance, and moisture content on paper quality. Her research interests
  include, but are not limited to, the development of optimal paper grades, the optimization of paper manufacturing processes, and the characterization of paper properties in various end use situations.
  She is also interested in the effects of temperature and humidity on paper properties and the development of paper conditioning techniques to maintain uniformity and improve paper quality.
