  career_goals: Joyce aspires to transform her artistic passions into a sustainable career while maintaining flexibility. She plans to obtain her GED and enroll in a community college or online program
    in graphic design, illustration, or fine arts. Long‑term, she envisions working as a freelance illustrator creating book covers, concept art for independent games, and custom commissions. She also hopes
    to publish a collection of poetry and speculative short stories. In her hometown, she aims to curate community art exhibitions that showcase local talent, providing a platform for creative exchange.
    Building an online portfolio and networking through small art collectives are central steps toward these goals.
