  career_goals: Marie often talks about becoming a "science explorer" or a "puzzle champion" when she grows up. She imagines designing inventions that solve everyday problems and hopes to win a school science
    fair. Her competitive streak drives her to aim for top scores in reading and math challenges, and she dreams of one day working as an engineer, astronaut, or research scientist who is recognized for
    excellence and precision.
