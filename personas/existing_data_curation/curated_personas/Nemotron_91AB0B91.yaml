personas:
  professional: Marie Norman, a budding junior scientist who leads the Kids Science Club’s weekly experiments by carefully arranging lab tools and documenting results, channels their curiosity and practical
    mindset into systematic exploration while upholding high standards for every project, and they feel a sense of accomplishment each time a hypothesis is proven correct.
  sports: Marie Norman, a junior soccer enthusiast who trains with the Little Eagles youth club on weekday evenings, they cheer for the Dallas Cowboys on game days, and they apply their competitive drive
    to mastering penalty kicks during practice.
  arts: Marie Norman, an enthusiastic young artist who fills their sketchbook with bold drawings of Mickey Mouse and re‑creates the vivid colors of Dr. Seuss illustrations, they often sing along to Idina
    Menzel’s 'Let It Go' on a toy keyboard, and they keep their art supplies neatly sorted.
  travel: Marie Norman, a curious explorer who enjoys meticulously planned family trips, they have already visited Disneyland in California, trekked the trails of the Great Smoky Mountains, and they dream
    of standing beneath the Eiffel Tower in Paris during a future vacation.
  culinary: Marie Norman, a selective but precise eater who declares cheese pizza and strawberry yogurt as favorites, they construct perfect peanut butter‑and‑jelly sandwiches with an exact spreading technique,
    and they insist on a side of carrot sticks for crunch, proudly arranging their plate in a neat, color‑coded layout.
  core: Marie Norman, a highly organized five‑year‑old whose curiosity meets a disciplined, competitive nature, they thrive in small‑group activities and balance achievement‑driven routines with a touch
    of skeptical independence.
background:
  cultural: Marie was raised in the coastal suburbs of Chesapeake and Virginia Beach, Virginia. Her family values punctuality, community, and a love of the outdoors, often spending weekends at the nearby
    Chesapeake Bay and local beaches. The region's school system emphasizes both academic achievement and community involvement, shaping her disciplined and achievement‑focused mindset. While her household
    reflects a predominantly white, middle‑class American background, she is exposed to the multicultural events and festivals that occur in the nearby city, fostering an appreciation for diverse traditions
    while maintaining her family's strong emphasis on order and personal excellence.
