  career_goals: Patrick dreams of turning his passion for art and imagination into a career as a concept artist for video games or a graphic novelist. He hopes to attend a specialized art academy or secure
    an apprenticeship with a creative studio where he can refine his techniques. Long‑term, he envisions launching his own indie brand that sells custom apparel and printed artwork, blending the aesthetic
    of his Southern upbringing with contemporary pop‑culture influences. He also wants to create a YouTube channel or TikTok series that showcases his creative process, giving him a platform to inspire
    other young artists from small-town backgrounds.
