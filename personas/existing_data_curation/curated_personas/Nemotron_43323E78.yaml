  hobbies: '[''Reading mystery novels'', ''Herb gardening'', ''Cooking traditional Mexican dishes'', ''DIY home repair projects'', ''Walking nature trails'', ''Embroidery'', ''Listening to regional music'',
    ''Small group church or community gatherings'']'
  career_goals: Gloria aims to earn a NCCER certification in control valve installation within the next two years, followed by advancement to a lead‑technician role where she can mentor newer installers.
    In the longer term she envisions overseeing a small crew on larger plant projects or launching her own service business focused on reliable valve maintenance for local manufacturers. She also seeks
    steady, predictable shift schedules that support her married life, and she plans to continue expanding her technical knowledge through short courses on advanced hydraulic automation.
