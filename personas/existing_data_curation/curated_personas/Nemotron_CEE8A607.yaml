  career_goals: In the next two years, Alyssa aims to step into a senior operations manager role where she can lead a company‑wide efficiency initiative that targets a measurable 15% reduction in waste
    and overhead. She plans to earn a Certified Manager (CM) credential and deepen her expertise in digital transformation by implementing IoT‑enabled monitoring systems within her current organization.
    Long‑term, Alyssa envisions becoming a director of operations or COO for a mid‑size manufacturing firm in the Niagara region, eventually shaping her own consultancy that helps small businesses adopt
    lean practices. Mentoring emerging female leaders and contributing to industry panels on operational excellence are also central to her professional ambition.
