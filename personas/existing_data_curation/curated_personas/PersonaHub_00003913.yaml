persona_description: A school district leader who is responsible for overseeing the implementation of digital learning environments in schools. This person is committed to fostering a positive school culture
  that supports the safe and responsible use of digital tools and resources, and is aware of the importance of addressing parental concerns around digital citizenship, student data privacy and security,
  and the homework gap. This person is also concerned about the availability of reliable internet access and the use of digital instructional materials, and is seeking to ensure that the school district's
  content delivery system/learning management system supports their goals and that the school/district has the technology capacity to deliver content efficiently and effectively. This person is seeking
  to collaborate with teachers, librarians, and counselors to support the development of digital learning, participatory learning, inquiry learning, and information and technology literacies with digital
  and print materials, including curation of openly licensed educational resources.
