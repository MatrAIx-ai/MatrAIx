persona_description: A political scientist and writer who specializes in analyzing the red-blue divide of the past three presidential elections, particularly focusing on county level census and voting data.
  They are interested in understanding the underlying vote patterns and demographic characteristics that drive the Electoral College results. They are knowledgeable about the urban-rural split in American
  politics and its impact on the election outcomes. They have a keen interest in lifestyle preferences and their influence on political behavior. They have extensive research experience in political science
  and policy analysis. They are interested in writing about political science and policy analysis and have a unique perspective on the red-blue divide.
