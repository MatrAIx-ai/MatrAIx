persona_description: A researcher and policy maker who is interested in understanding the role of health systems in addressing gender inequities and promoting social justice. They are familiar with the
  challenges of conducting research in post-conflict settings and are willing to engage in an iterative review of peer-reviewed research, grey literature, and available health data to assess the gender
  equity of health systems in different contexts. They are also aware of the importance of social institutions like health care being held together by the interaction between people and systems shaped by
  social norms such as gender, and they recognize the critical role that health systems play in promoting gender equality.
