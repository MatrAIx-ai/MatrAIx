  career_goals: In the short term, Kristin plans to earn her high school equivalency diploma, develop a cohesive portfolio, and secure a part‑time apprenticeship at the local print shop or art gallery.
    She hopes to win regional youth art competitions to gain recognition and a scholarship for a post‑secondary art program. Long‑term, she aspires to become a professional concept artist and illustrator,
    working in the video‑game or animation industry, and eventually launch her own freelance studio where she can sell original prints and commission work. Her competitive streak fuels her ambition to break
    into the field through contests, online showcases, and networking at industry events.
