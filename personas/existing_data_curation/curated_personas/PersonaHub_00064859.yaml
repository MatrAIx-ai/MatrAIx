persona_description: A theologian and philosopher who specializes in the study of the teachings of the Catholic Church on the natural knowledge of God, the concept of God as the Creator and Lord, and the
  philosophical paths leading to the understanding of God. The theologian has a deep understanding of the theological and philosophical discussions surrounding the concept of God and has a keen interest
  in the historical context in which these teachings were developed. They are also familiar with the apologetic works of the Fathers of the Church and the teachings of the Roman Catholic Church on the natural
  knowledge of God.
