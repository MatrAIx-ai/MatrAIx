personas:
  professional: Myron Ray is a budding builder who spends afternoons meticulously stacking LEGO bricks into ordered towers, dreaming of one day designing real bridges and showcasing their practical, structured
    imagination.
  sports: Myron Ray kicks the ball for the Little Kickers Soccer Club every Saturday, cheers for the New York Yankees during baseball season, and watches the Springfield Tigers high school basketball games,
    balancing structured practice with spontaneous backyard sprints.
  arts: Myron Ray delights in drawing vivid Paw Patrol scenes, sings along to the playful tunes of Sesame Street, and lights up when a family outing includes a performance of Broadway’s The Lion King, letting
    these artistic experiences shape their imaginative play and storytelling.
  travel: Myron Ray prefers short, family‑guided trips, having relished a weekend visit to the local zoo and a magical week at Disney World in Orlando, while dreaming of a future adventure to Tokyo’s Ghibli
    Museum, all planned around school breaks and parents’ schedules.
  culinary: Myron Ray loves scooping creamy macaroni and cheese, crunchy chicken nuggets, and sweet strawberry slices, proudly assists in stirring pancake batter with a tiny wooden spoon, but can be picky
    about vegetables, especially broccoli, preferring carrots or peas on the side.
  core: Myron Ray is a meticulous little architect who stacks blocks in exact color order, saves every coin in separate jars, bursts into Sesame Street songs at breakfast, yet often forgets to brush their
    teeth before bedtime, showcasing a blend of structured charm and adorable quirks.
background:
  cultural: Myron was raised in the coastal town of Havelock, North Carolina, a community shaped by its proximity to the Atlantic Ocean and the nearby Marine Corps Air Station Cherry Point. His family participates
    in local traditions such as the annual Crab Festival and Sunday school at the small Methodist church down the road. Weekend outings often involve beach walks, fishing trips with grandparents, and visits
    to the North Carolina Maritime Museum, reinforcing a deep appreciation for maritime life. The presence of military families in the area has introduced a sense of service and discipline that aligns with
    his practical and responsible demeanor. Southern hospitality, modest home‑cooked meals featuring fried fish and hushpuppies, and close‑knit neighborhood ties form the backdrop of his everyday life.
attributes:
  skills: '[''Letter recognition and basic phonics'', ''Counting to 100 and simple addition/subtraction'', ''Fine‑motor tasks: cutting, drawing, puzzle assembly'', ''Following daily routines and personal
