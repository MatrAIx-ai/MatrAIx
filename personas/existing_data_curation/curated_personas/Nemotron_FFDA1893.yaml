  hobbies: '[''Adult Soccer League'', ''Salvadoran Cultural Festivals'', ''Cooking Salvadoran Cuisine'', ''Hiking in Colorado'', ''Trivia Nights'', ''Salsa Dancing'', ''Reading Historical Novels'']'
  career_goals: Demostenes aims to be promoted to an assistant manager or branch manager role within the rental company, where he can oversee staff, streamline operations, and elevate customer satisfaction.
    He plans to obtain a certification in hospitality or operations management to strengthen his leadership credentials. In the longer term, he aspires to launch his own boutique equipment‑rental business
    that serves Denver's outdoor‑recreation community, leveraging his bilingual skills to attract both English‑ and Spanish‑speaking customers. He also seeks financial stability to support his family in
    El Salvador and to purchase a home in Denver, while continuing to develop his ability to manage stress and improve organizational habits.
