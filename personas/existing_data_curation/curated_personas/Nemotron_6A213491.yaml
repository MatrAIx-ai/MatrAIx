  hobbies: '["Vegetable gardening","Tai Chi","Traditional Chinese cooking","Reading historical fiction and Chinese literature","Small book club participation","Visiting art museums","Volunteering teaching
    computer basics"]'
  career_goals: As she approaches retirement, Pui aims to transition into a senior advisory role where she can apply her extensive supervisory experience to mentor the next generation of office managers.
    She plans to earn a PMP certification to formalize her project management knowledge and to lead a digital‑records initiative at her current organization, positioning the department for long‑term efficiency.
    Ultimately, she hopes to leave a measurable record of improved operational metrics and to be recognized for establishing a structured, resilient administrative framework within the company.
