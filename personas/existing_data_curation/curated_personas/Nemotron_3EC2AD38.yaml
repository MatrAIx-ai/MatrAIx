personas:
  professional: Ruth Prada is a sales representative who leverages bilingual fluency in Spanish and English, data‑driven market insights, and a compassionate conflict‑resolution style to build enduring
    wholesale partnerships while balancing a curious appetite for emerging trends with grounded, organized account management.
  sports: Ruth Prada enjoys weekend hikes through Wekiwa Springs and Seminole State Forest, participates in the local Trailblazers Hiking Club, and follows the Orlando Magic and Tampa Bay Lightning for
    a dose of team spirit, occasionally joining a recreational volleyball league with friends.
  arts: Ruth Prada finds inspiration in the lyrical storytelling of Jorge Drexler, the modernist paintings of Frida Kahlo, and the motivational talks of Simon Sinek, regularly attending intimate literary
    circles and indie film screenings that feed her reflective and compassionate worldview.
  travel: Ruth Prada prefers low‑key, purpose‑driven travel, often planning trips that blend cultural immersion and nature, such as a recent visit to Cartagena’s historic Old Town and a planned trek in
    Patagonia, while budgeting carefully to maintain her savings goals.
  culinary: Ruth Prada loves crafting traditional Colombian dishes like arepas, sancocho, and empanadas, experimenting with chorizo, plantain, and fresh cilantro, and considers herself an intermediate home
    cook who frequently hosts dinner gatherings for close friends.
  core: Ruth Prada is a quietly ambitious sales professional who balances data‑driven strategy with heartfelt compassion, finds solace in hiking and yoga, occasionally over‑indulges on kitchen gadgets,
    and nurtures lifelong learning through books and community service.
background:
  cultural: Ruth grew up in a Colombian family that cherished music, dance, and the rich flavors of her homeland. At home, Spanish was spoken daily, and celebrations like Día de la Independencia and Carnaval
    de Barranquilla were infused with traditional food, vallenato, and salsa. Relocating to Orlando, she blends these cultural roots with the multicultural vibrancy of Central Florida, maintaining strong
    ties to the Colombian diaspora through community events, cultural festivals, and a close-knit family network. This bicultural perspective informs her inclusive communication style, her appreciation
    for diverse viewpoints, and her drive to create connections across cultural boundaries.
attributes:
  skills: '["Customer Relationship Management (CRM) software", "Negotiation and consultative selling", "Product knowledge in manufacturing and wholesale", "Data analysis with Excel and Google Sheets", "Bilingual
    communication (Spanish/English)", "Time management and scheduling", "Problem solving and conflict resolution", "Team collaboration and cross‑functional coordination"]'
  hobbies: '["Cooking traditional Colombian meals", "Hiking in Central Florida nature preserves", "Reading personal development and business strategy books", "Participating in a small book club", "Volunteering
    at food banks and community centers", "Practicing yoga and meditation", "Painting watercolor landscapes"]'
  career_goals: Ruth aims to progress from her current sales representative role to a senior account manager within the next three years, eventually stepping into a sales leadership position where she can
    mentor junior reps and shape regional sales strategy. She is interested in pursuing a part‑time associate degree in business administration to deepen her strategic planning skills. Long‑term, Ruth hopes
    to champion sustainable product lines and develop partnerships that promote ethical manufacturing practices, aligning her professional success with her desire to make a positive impact on both customers
    and the broader community.
