  hobbies: '[''Lake kayaking'', ''Trail hiking'', ''Gardening'', ''Healthy cooking'', ''Book club (science fiction & health nonfiction)'', ''Community garden volunteering'', ''Crossword puzzles'', ''DIY
    home improvement projects'']'
  career_goals: Inspired by her blend of curiosity and practicality, Linda aims to expand her impact beyond the dental chair. She plans to obtain a master's degree in public health to spearhead community
    oral‑health outreach programs targeting underserved populations in rural Wisconsin. Additionally, she aspires to become a certified dental hygiene educator, lead workshops for fellow hygienists, and
    eventually hold a leadership role in a regional dental association where she can influence policy and promote evidence‑based, patient‑centered care.
