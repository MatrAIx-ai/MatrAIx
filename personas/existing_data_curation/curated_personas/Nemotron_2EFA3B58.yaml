personas:
  professional: Francisco Caballero, a 26‑year‑old software quality assurance specialist, leverages his methodical testing expertise and curiosity for AI‑assisted tools to design reliable automated suites
    while steering cross‑functional teams toward measurable quality improvements.
  sports: Francisco Caballero, a 26‑year‑old, plays forward in a local amateur soccer league, competes in beach volleyball matches at East Beach, follows the LA Galaxy and Los Angeles Lakers, and spends
    weekends tackling the Santa Ynez Mountains trails.
  arts: Francisco Caballero, a 26‑year‑old, captures coastal sunsets with a Sony A7III inspired by Steve McCurry, takes beginner tango lessons at a community studio, and regularly attends live shows by
    the indie band The Moth & the Flame and classic rock icons like Fleetwood Mac.
  travel: Francisco Caballero, a 26‑year‑old, prefers spontaneous weekend getaways to coastal spots like Santa Barbara and Maui while also planning longer trips to cultural hubs such as Barcelona and Tokyo,
    balancing budget-friendly hostels with occasional splurges on boutique hotels, and often coordinates itineraries using shared Google Docs with friends.
  culinary: Francisco Caballero, a 26‑year‑old home cook, masters empanadas filled with spiced beef and chimichurri‑marinated steak, frequently crafts homemade chimichurri sauce with parsley, garlic, and
    red wine vinegar, and pairs these dishes with a curated selection of Malbec and local California Zinfandel during monthly dinner parties with friends.
  core: Francisco Caballero, a 26‑year‑old QA enthusiast, blends a competitive drive on the soccer field with a methodical love for AI‑assisted testing, while occasionally over‑preparing dinner parties
    and secretly hoarding vintage soccer jerseys.
background:
  cultural: Francisco was born and raised in Buenos Aires, where family gatherings, shared meals, and the ritual of drinking mate shaped his appreciation for community and conviviality. Growing up amidst
    a vibrant fútbol culture instilled a competitive yet collaborative spirit that he carries into his professional life. After moving to the United States for university and settling in Santa Barbara,
    he has blended his Argentine heritage with California’s beach‑oriented lifestyle, maintaining traditions like cooking Argentine cuisine and celebrating national holidays while embracing local customs
    such as hiking and beach sports. Bilingual in Spanish and English, he often bridges cultural perspectives at work and in his social circles, using his background to foster inclusive teamwork and a balanced
    approach to innovation and practicality.
attributes:
  skills: '[''Automated UI testing (Selenium, Cypress)'', ''API testing (Postman, RestAssured)'', ''Performance testing (JMeter)'', ''CI/CD integration (Jenkins, GitHub Actions)'', ''Test case design and
