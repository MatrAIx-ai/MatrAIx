  hobbies: '[''Amateur soccer league'', ''Beach volleyball'', ''Hiking the Santa Ynez Mountains'', ''Cooking Argentine cuisine'', ''Hosting dinner parties'', ''Tech meetups and hackathons'', ''Photography'',
