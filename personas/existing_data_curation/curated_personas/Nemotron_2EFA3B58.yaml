  career_goals: Francisco aims to become a QA lead within the next three years, using his organized and reliable nature to foster a culture of quality across cross‑functional teams. He plans to earn the
    ISTQB Advanced Test Manager certification and deepen his expertise in AI‑assisted testing, positioning himself as a test architect who can design intelligent, data‑driven test suites. In the longer
    term he envisions a product reliability engineering role or launching a boutique consultancy that helps startups embed rigorous testing practices from day one. His competitive drive pushes him to set
    measurable improvement targets, while his practical planning ensures steady progress toward these ambitions.
