  career_goals: Eager to deepen his technical leadership, Ratilal aims to transition to a senior software engineer role within the next three years, with a long-term goal of becoming a technical lead who
    can shape architecture while still spending the majority of his time coding. He plans to earn an AWS Solutions Architect certification and complete a part-time bachelor's degree in Computer Science
    to broaden his theoretical grounding. He also hopes to contribute to open-source projects that align with his interest in scalable backend systems. Throughout his career progression, he seeks positions
    that offer flexible remote work, allowing him to maintain a quiet, focused environment.
