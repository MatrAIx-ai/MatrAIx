personas:
  professional: Ratilal Shah, a 28‑year‑old full‑stack software developer specializing in Python, Java, and JavaScript, leverages clean architecture and automated CI/CD pipelines to deliver scalable web
    applications while thriving in quiet, remote workspaces that satisfy their need for structure and solitude, and they aim to earn an AWS Solutions Architect certification and transition to a senior technical
    lead role within three years.
  sports: Ratilal Shah maintains a low‑key fitness routine centered on weekend hikes along the Chain of Lakes and occasional indoor cycling, while cheering for the Minnesota Twins, Vikings, Timberwolves,
    and Wild, and they belong to the Twin Cities Road Runners club for structured long‑distance runs that satisfy their need for predictable training plans.
  arts: Ratilal Shah unwinds by immersing in Indian classical ragas by Ravi Shankar and Zakir Hussain, indie folk from Bon Iver, and cinematic scores from the video game *Skyrim* while also devouring science‑fiction
    novels by William Gibson and attending occasional local theater productions, all of which shape their creative outlook and inspire problem‑solving in code.
  travel: Ratilal Shah prefers meticulously planned solo trips that blend adventure with cultural immersion, having already backpacked the alpine trails of Glacier National Park and the historic streets
    of Kyoto, while aspiring to explore Iceland’s geothermal landscapes and the lavender fields of Provence within a modest budget that balances remote‑work allowances with a love for quiet, off‑the‑beaten‑path
    experiences.
  culinary: Ratilal Shah, an avid home chef, frequently prepares fragrant lentil‑based dhokla, spiced vegetable undhiyu, and buttery khandvi using fresh cilantro, mint, and basil from their balcony garden,
    while also mastering Midwestern staples like wild‑rice soup and pan‑seared walleye, reflecting a culinary palate that balances heritage flavors with local ingredients.
  core: Ratilal Shah blends methodical coding precision with a love for solitary RPG quests, yet their relaxed attitude toward daily chores often leads to missed bill payments and a perpetually overgrown
    balcony herb garden.
background:
  cultural: Ratilal is a second-generation Gujarati Indian-American raised in the Minneapolis-St. Paul metro area. He grew up bilingual, speaking Gujarati at home and English in school, and his family maintains
    cultural traditions such as celebrating Diwali, Navratri, and participating in the local Hindu temple’s community events. The values of respect for elders, emphasis on education, and communal sharing
    of meals are central to his upbringing. At the same time, he embraces Midwestern customs, enjoying the region’s outdoor activities and local cuisine. This blend of South Asian heritage and Midwestern
    lifestyle informs both his personal and professional outlook.
