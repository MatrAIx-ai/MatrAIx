personas:
  professional: William Hilley, a seasoned security guard and gambling‑surveillance officer, applies their meticulous incident‑reporting and technical troubleshooting skills while indulging a practical
    curiosity for advanced video‑analytics, positioning themselves for a shift‑supervisor or director‑of‑surveillance role in a regional casino, and they continuously mentor peers as part of their growth
    plan.
  sports: William Hilley, an avid supporter of the Minnesota Vikings and Timberwolves, regularly attends games at U.S. Bank Stadium and Target Center, follows the Minnesota Wild hockey season, participates
    in the North Star Outdoor Club’s winter snowshoe races and local whitetail‑hunting outings, and they occasionally join a recreational bowling league for social balance.
  arts: William Hilley, a fan of classic Americana music, listens to Bob Dylan and The Avett Brothers while tinkering with vintage cassette players, devours mystery novels by Michael Connelly and Tana French
    during fishing trips, enjoys the Coen brothers’ films on quiet evenings, and they collect limited‑edition vinyl records as a low‑stress creative outlet.
  travel: William Hilley, who balances meticulous planning with spur‑of‑the‑moment detours, has road‑tripped across the Badlands and Yellowstone, spent a winter ice‑fishing the Red River, dreams of salmon‑fishing
    in Alaska and watching the Northern Lights in Tromsø, Norway, yet they often worry about travel costs and time away from night‑shift duties.
  culinary: William Hilley, an intermediate home cook, favors pan‑fried walleye with lemon‑butter sauce, venison stew seasoned with juniper berries, hearty hotdish topped with tater tots, and indulges in
    occasional sushi rolls, while they keep a well‑stocked pantry of rye bread, root vegetables, and locally sourced maple syrup for comfort meals.
  core: William Hilley, a vigilant security professional who blends Midwestern practicality with restless curiosity, navigates life through disciplined routines, strategic hobbies, and a careful balance
    of stress and leisure, and they constantly seek practical improvements.
background:
  cultural: William grew up in a small‑town, working‑class family in the Upper Midwest, where the cultural emphasis on modesty, hard work, and community involvement shaped his worldview. The region’s strong
    Scandinavian heritage and the rural‑agricultural landscape fostered an appreciation for the outdoors, self‑reliance, and seasonal traditions such as ice‑fishing and winter festivals. Local values of
    punctuality, reliability, and modest social interaction resonate with his balanced personality, while the close‑knit community of Moorhead provides both the support network he values and the independent
    space he seeks for his alone time.
attributes:
  skills: '[''CCTV operation and live monitoring'', ''Incident detection and reporting'', ''Conflict resolution and de‑escalation'', ''Physical security patrol and emergency response'', ''Knowledge of gambling
    regulations and compliance'', ''Basic self‑defence and use‑of‑force protocols'', ''First aid and CPR certification'', ''Report writing and documentation'', ''Risk assessment and threat analysis'', ''Electronic
    security systems troubleshooting'', ''Data analysis of surveillance footage'', ''Customer service and public interaction'', ''Night‑shift endurance and situational awareness'', ''Basic electronics troubleshooting'']'
  hobbies: '[''Fishing and ice‑fishing'', ''Deer hunting'', ''Snowshoeing and winter hiking'', ''Attending Minnesota Vikings and Timberwolves games'', ''Electronics tinkering and home‑automation projects'',
    ''Strategy video games (e.g., Civilization)'', ''Reading mystery and crime novels'', ''Volunteer neighborhood watch duties'']'
  career_goals: William aims to move into a supervisory position within the security field, such as shift supervisor or director of surveillance for a regional casino. He plans to complete his associate
    degree in criminal justice and obtain professional credentials like the Certified Protection Officer (CPO) and Certified Surveillance Operator (CSO). Over the next five years he hopes to master advanced
    video‑analytics tools, mentor new officers, and eventually transition into private investigations or a law‑enforcement role where he can apply his practical experience and analytical curiosity. He also
    wants to be recognized for reliability and to create a stable work‑life balance that reduces his chronic stress.
