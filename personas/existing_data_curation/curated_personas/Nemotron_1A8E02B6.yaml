personas:
  professional: Breanna Gros, a retired community historian and avid gardener, marries her keen eye for detail with hands‑on skills in organic gardening, quilting, and home‑repair to lead senior quilting
    workshops and serve as a volunteer docent at the Menomonie Historical Society, all while embracing her curious yet casually organized approach to life.
  sports: Breanna Gros faithfully follows the Green Bay Packers and Milwaukee Brewers, joins the senior walking club along the Chippewa River trail each spring, and volunteers as a bench‑warmer for the
    local women's softball league, blending low‑impact activity with loyal spectator enthusiasm.
  arts: Breanna Gros finds artistic solace in quilting, drawing inspiration from the Gee’s Bend quilts and the folk melodies of Nanci Griffith, while regularly reading historical novels by Hilary Mantel
    and attending community theater productions of Shakespeare’s "A Midsummer Night’s Dream" at the Menomonie Performing Arts Center.
  travel: Breanna Gros prefers modest road trips, having explored the scenic lighthouses of Door County and the historic streets of Savannah, Georgia, yet they dream of a quiet cabin retreat on the San
    Juan Islands, balancing a love of nature with the practicalities of limited mobility and a modest travel budget.
  culinary: Breanna Gros cooks with a garden‑to‑table philosophy, turning home‑grown zucchini, heirloom tomatoes, and wild herbs into rustic ratatouille, their signature blackberry crumble, and preserves
    seasonal harvests in mason jars, while indulging in a weekend tradition of canning homemade tomato sauce.
  core: Breanna Gros is a curious, pocket‑book‑clutching bird‑watcher who juggles a chaotic binder of quilt patterns with a rigid budget, prefers solitary hikes over social gatherings, and secretly hoards
    mismatched buttons for future crafts.
background:
  cultural: Breanna was raised in a traditional Midwestern, white, working‑class family in rural Wisconsin, where Protestant values, self‑reliance, and community interdependence were emphasized. Her family’s
    heritage includes German‑Scandinavian roots common to the Upper Midwest, reflected in celebrations such as Oktoberfest-inspired community events and a strong appreciation for seasonal agricultural cycles.
    Growing up on a small farm in Dunn County, she internalized a respect for the land, a practical approach to problem‑solving, and a modest, introspective demeanor. These cultural influences shape her
    commitment to local heritage, her involvement in the church and historical society, and her preference for quiet, close‑knit social settings.
