  career_goals: Although retired from formal employment, Breanna aims to deepen her impact on the local community and pursue personal learning projects. She plans to complete a digital memoir of her family’s
    life in Dunn County, which will include scanned photos and recorded oral histories. She hopes to learn enough computer basics to stay connected with her grandchildren via video calls and email. Breanna
    also wishes to lead a series of small‑group quilting workshops for seniors, enter her work in the county’s seasonal craft fair, and serve as a volunteer docent for the Menomonie Historical Society,
    where she can share her lifelong knowledge of local customs and history.
