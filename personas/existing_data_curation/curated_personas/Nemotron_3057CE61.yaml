    communication (English, Spanish)'', ''Energy‑efficiency and green building knowledge'', ''Smart home technology integration'', ''Creative integration of lighting and decorative fixtures'']'
  hobbies: '[''Visiting art museums and galleries'', ''Street‑art tours and mural painting'', ''Urban photography'', ''Playing drums in a Latin band'', ''Adult soccer league'', ''Community renovation volunteering'',
    ''Traditional Guatemalan cooking'', ''Reading technology and science‑fiction'', ''Restoring vintage radios'', ''Woodworking and furniture making'']'
  career_goals: Alfredo aims to transition into a foreman or senior project supervisor role where he can oversee larger commercial installations and mentor a new generation of tradespeople. He plans to
    complete his associate degree in engineering technology and obtain LEED Green Associate and Smart Home Installer certifications. In the longer term, he hopes to launch his own boutique installation
    business that specializes in sustainable, technology‑enhanced building solutions with an emphasis on artistic design elements. Alfredo also seeks recognition within his community for combining functional
    engineering with aesthetic creativity, and he wants to become a trusted advisor on energy‑efficiency upgrades for Baltimore’s residential and small‑business sectors.
