personas:
  professional: Alfredo Suh is a veteran installation, maintenance and repair professional with over three decades mastering HVAC, electrical, and plumbing systems, who blends precise technical expertise
    with a creative eye for integrating custom lighting and art installations into functional projects while mentoring apprentices and pursuing LEED and Smart Home certifications to prepare for a foreman
    role.
  sports: Alfredo Suh energizes weekends by playing midfield for a local adult soccer league, cheers on the Baltimore Orioles and Ravens, and participates in community fitness boot camps, balancing competitive
    drive with a love for teamwork.
  arts: Alfredo Suh immerses themselves in Baltimore’s vibrant art scene, painting murals inspired by folk motifs, photographing urban street life, drumming in a community salsa band, and attending performances
    by the Baltimore Jazz Orchestra and works of street artist Bono, all of which fuel their creative outlook.
  travel: Alfredo Suh curates travel experiences that blend cultural immersion and relaxation, having visited Antigua’s historic plazas, exploring the culinary streets of Oaxaca, and planning future road
    trips to the art‑rich districts of Santa Fe and the coastal charm of Charleston, while always budgeting carefully.
  culinary: Alfredo Suh delights in preparing traditional dishes like tamales, pepian, and atol using masa harina, roasted chiles, cinnamon, and plantains, pairing them with homemade horchata, while also
    experimenting with fusion recipes that incorporate local Baltimore seafood and fresh herbs.
  core: Alfredo Suh is a seasoned tradesperson turned aspiring foreman whose artistic curiosity, organized mindset, and competitive spirit shape a life of disciplined work, community art, and thoughtful,
    if occasionally anxious, planning.
background:
  cultural: Alfredo was born to Guatemalan immigrant parents who settled in Baltimore’s vibrant Latino community. Growing up bilingual, he speaks Spanish at home and English in his daily life, preserving
    the language and cultural traditions of his heritage. He participates in Guatemalan festivals such as Semana Santa and Día de la Independencia, enjoys traditional music like marimba and folk dances,
    and shares customary dishes with relatives during family gatherings. Catholicism plays a role in his upbringing, shaping his values of family cohesion and communal support. While his surname hints at
    a mixed lineage, Alfredo identifies primarily with his Guatemalan roots, integrating those cultural practices with the diverse, urban fabric of Baltimore. He embraces cross‑cultural experiences, often
    blending Latin American artistic sensibilities with contemporary American influences in both his personal life and professional work.
