personas:
  professional: Kenya Washington, a veteran civil engineer in the Atlanta metro area, leverages advanced AutoCAD, Revit, Civil 3D and GIS expertise alongside a vivid imagination to craft bridge and parking
    structure designs that double as public art installations, while their methodical, competitive nature ensures every project beats deadlines and code standards.
  sports: Kenya Washington fuels fitness through early‑morning hikes on the Stone Mountain trails, joins the DeKalb Cycling Club for weekend rides, and avidly follows the Atlanta Falcons, Atlanta Braves
    and Atlanta United FC while occasionally playing mixed‑double tennis at the local community center.
  arts: Kenya Washington immerses herself in the works of abstract expressionist Helen Frankenthaler, contemporary photographer Gregory Crewdson, and the rhythmic sounds of Yo‑Yo Ma, while regularly attending
    openings featuring local muralist Anika Tashiro and gathering inspiration from the soulful performances of Grammy‑winner H.E.R.
  travel: Kenya Washington prefers meticulously planned trips that balance cultural immersion with eco‑friendly relaxation, often escaping to Asheville’s Blue Ridge Mountains in the fall, exploring the
    historic streets of Savannah, and dreaming of a summer venture to the misty highlands of Scotland’s Isle of Skye, all while budgeting for weekend getaways that fit between project deadlines.
  culinary: Kenya Washington experiments in the kitchen with a skill level ranging from confident sauté chef to occasional burnt‑fingers baker, favoring dishes like pan‑seared salmon with dill‑infused quinoa,
    slow‑cooked Cajun jambalaya featuring Andouille sausage, and vibrant beet‑and‑goat‑cheese salads, while never missing a weekend visit to the downtown farmer’s market for heirloom tomatoes and fresh
    basil.
  core: Kenya Washington is a competitively creative engineer whose disciplined mind designs bridges that double as canvases, whose restless curiosity fuels abstract art, and whose occasional over‑planning
    hides a love for spontaneous night‑time dance classes.
background:
  cultural: Kenya grew up in the vibrant African‑American community of Atlanta, where church, family gatherings, and neighborhood barbecues shaped her sense of identity. Influenced by the legacy of the
    civil rights movement and the pioneering spirit of historically Black colleges, she values education, perseverance, and community service. Living in Lithonia, she stays connected to local traditions—such
    as Southern soul food, gospel music, and annual cultural festivals—while also championing initiatives that uplift underrepresented voices in engineering and the arts.
attributes:
  skills: '[''Structural Design'', ''Project Management'', ''AutoCAD'', ''Revit'', ''Civil 3D'', ''GIS Mapping'', ''Cost Estimation'', ''Construction Supervision'', ''LEED Sustainable Design'', ''Code Compliance
    (ACI, OSHA)'', ''Risk Assessment'', ''Team Leadership'', ''Public Speaking'']'
  hobbies: '[''Abstract Painting'', ''Photography'', ''Reading Historical Fiction'', ''Chess'', ''Community Dance Classes'', ''Volunteering for Youth STEM Programs'', ''Hiking'', ''Attending Art Exhibitions'',
    ''Participating in Book Clubs'']'
  career_goals: Kenya aims to obtain her Professional Engineer (PE) licensure within the next year and advance to a senior principal engineer role overseeing large‑scale, sustainable infrastructure initiatives
    in DeKalb County. She aspires to lead a flagship urban renewal project that incorporates green spaces and public art, reflecting her blend of technical rigor and artistic vision. Long‑term, Kenya hopes
    to launch her own consultancy focused on eco‑friendly, community‑centered designs while establishing a mentorship program that empowers women and minorities entering the engineering field.
