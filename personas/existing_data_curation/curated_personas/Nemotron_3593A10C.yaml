personas:
  professional: An experienced front‑of‑house hospitality specialist, Victoria Suazo blends bilingual communication, precise table management, and an artistic flair for décor to create warm, inclusive spaces,
    while her innate curiosity drives continual menu experimentation and her compassionate nature ensures calm conflict resolution, even as a lingering worry pushes them to double‑check every reservation.
  sports: Victoria Suazo fuels her fitness routine with early morning hikes along the Oquirrh Mountains, weekly Vinyasa sessions at Blue Lotus Yoga, and membership in the Tooele Trail Runners Club, while
    cheering for the Utah Jazz in winter and Real Salt Lake in summer, and they view these activities as both solitary refreshers and community‑building rituals.
  arts: Victoria Suazo channels her artistic passion into painting vivid canvases inspired by Frida Kahlo’s bold colors and Diego Rivera’s storytelling, weaving traditional textile techniques into community
    murals alongside local creators like Maya Dahl, and they unwind by listening to the intricate guitar work of Rodrigo y Gabriela while attending occasional Broadway productions of Lin‑Manuel Miranda’s
    hits.
  travel: Victoria Suazo prefers purposeful solo journeys that combine cultural immersion and nature, having trekked the Inca Trail in Peru, explored coffee farms in Medellín, and visited the historic plazas
    of Oaxaca, while dreaming of a quiet retreat in Tuscany’s Val d’Orcia, though limited savings occasionally delay the booking of her next adventure.
  culinary: Victoria Suazo is a confident home chef who masterfully prepares peppery pepian, steaming tamales, and sweet atol, experiments with single‑origin beans using a Chemex and Aeropress to craft
    nuanced pour‑over drinks, and they often garnish dishes with fresh cilantro, roasted corn, and a pinch of cinnamon, while occasionally treating themselves to sushi rolls with jalapeño for a bold flavor
    twist.
  core: Victoria Suazo balances a relentless curiosity for art, coffee, and community with an undercurrent of worry that fuels meticulous planning, never skips sunrise hikes, hums classic Latin ballads
    while arranging events, and habitually double‑checks reservations before bedtime.
background:
  cultural: Victoria is a first‑generation Guatemalan‑American who grew up in a household that preserved Mayan heritage and traditional Guatemalan customs. Family gatherings feature dishes like pepian,
    tamales, and atol, and celebrations such as Día de los Muertos and religious festivals are central to her identity. She maintains fluency in Spanish and English, participates in the local Latinx community
    in Tooele, and often shares cultural music, stories, and crafts with coworkers and neighbors. Her cultural background informs her hospitality philosophy—emphasizing warmth, communal sharing, and respect
    for diverse traditions.
