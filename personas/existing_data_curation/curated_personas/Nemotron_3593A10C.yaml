  career_goals: Victoria aims to become a shift manager within the next two years, then pursue an associate's degree in hospitality management to qualify for a restaurant or café general manager role. Long‑term,
    she dreams of opening her own culturally‑infused coffee shop in Tooele that showcases Guatemalan art, offers a welcoming space for community dialogue, and incorporates wellness practices like yoga sessions.
    She also hopes to mentor new staff, champion inclusive workplace culture, and create opportunities for local artists and immigrant families.
