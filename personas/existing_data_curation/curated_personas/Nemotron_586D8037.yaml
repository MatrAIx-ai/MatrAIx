personas:
  professional: Jesse Botts, a retired handyman with decades of hands‑on carpentry, plumbing, and electrical repair experience, now channels their methodical precision into volunteering as caretaker for
    their home and the local historical society, meticulously documenting mid‑century suburban history while mentoring younger relatives in DIY skills.
  sports: Jesse Botts, an early‑morning walker who keeps fit with daily strolls through Hempstead Lake State Park, follows the New York Mets and the Long Island Ducks on television, participates in a senior
    fishing league on the local lake, and prefers low‑impact activities that fit a routine rather than high‑intensity gym sessions.
  arts: Jesse Botts, a lover of classic big‑band and early rock, frequently spins recordings by Glenn Miller, Benny Goodman, Buddy Holly and Elvis Presley while perusing Long Island historical exhibits,
    and finds quiet appreciation for the works of author Richard Huston Perry, yet seldom attends live concerts, preferring solitary listening at home.
  travel: Jesse Botts, a meticulous planner who favors low‑stress road trips to historic towns such as Colonial Williamsburg, Gettysburg, and Cape Cod, maps out every stop in a handwritten notebook, avoids
    crowded airports, and opts for modest B&Bs that echo the suburban charm they value.
  culinary: Jesse Botts, an able home‑cook who transforms garden harvests into classic dishes like roasted chicken with rosemary potatoes, homemade apple pie, and clam chowder, enjoys the routine of Sunday
    pot‑luck meals, but occasionally over‑salts their vegetables, and relishes listening to big‑band tunes while simmering sauces.
  core: Jesse Botts, a 60‑year‑old retired handyman whose life revolves around routine, quiet diligence, and a nostalgic love for mid‑century American traditions, balances meticulous home stewardship with
    a solitary appreciation for history and classic tunes.
background:
  cultural: Jesse grew up in post‑war suburban Huntington Station, a predominantly white, middle‑class community on Long Island. His family’s cultural values emphasize hard work, self‑reliance, and community
    participation. He identifies with mainstream American traditions of the late 20th century—celebrating holidays such as Thanksgiving and the Fourth of July, attending a local Protestant church in his
    youth, and taking part in neighborhood block parties. These experiences have shaped his practical, routine‑driven outlook and his respect for tradition.
