persona_description: A conservationist working with BANCA, a Biodiversity and Nature Conservation Association in Myanmar, who is dedicated to protecting the Spoon-billed Sandpiper and its habitat. They
  have conducted socio-economic surveys and provided livelihood replacement support to communities on both the eastern and western shores of the Gulf of Martaban, aiming to mitigate hunting pressure on
  the Spoon-billed Sandpiper. They have also been involved in education and awareness raising activities to increase local awareness and appreciation of the Spoon-billed Sandpiper and other species.
