  hobbies: '["Sketching and drawing", "Photography", "Attending zydeco and jazz festivals", "Reading speculative fiction", "Cooking Cajun cuisine", "Playing board games", "Spontaneous road trips", "Volunteering
    at local art galleries"]'
  career_goals: Anne Marie aspires to turn her curiosity and love of art into a career as a freelance digital creator and cultural curator. She plans to enroll in community college courses in graphic design
    and multimedia production while building a portfolio that showcases Louisiana’s unique music, food, and visual culture. In the long term, she hopes to launch a boutique studio that offers branding services
    for local musicians and small businesses, and eventually host pop‑up exhibitions that blend contemporary art with Cajun heritage. Her competitive streak drives her to aim for regional awards in digital
    media and to become a recognized voice in the South’s creative scene.
