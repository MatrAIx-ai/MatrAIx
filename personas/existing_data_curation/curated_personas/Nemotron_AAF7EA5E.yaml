personas:
  professional: Anne Panzarella blends a passion for visual storytelling with a budding mastery of Canva, Adobe Photoshop, and short‑form video editing, turning every freelance project into a colorful snapshot
    of Louisiana’s music and food culture while wrestling with a natural aversion to strict deadlines and a competitive drive to win regional digital media awards.
  sports: Anne Panzarella frequents the local Parks and Recreation swimming pool for laps, joins a weekend recreational soccer league with the Lafayette Ragin’ Cajuns’ alumni group, and passionately follows
    the LSU Tigers football team and the New Orleans Pelicans, yet prefers spontaneous bike rides through the Atchafalaya Basin over structured gym routines.
  arts: Anne Panzarella dives into the local art scene by sketching murals in Lafayette’s French Quarter, curates pop‑up exhibits at the community gallery, draws inspiration from speculative fiction authors
    like N.K. Jemisin and Nnedi Okorafor, and finds rhythm in the zydeco sounds of BeauSoleil and the jazzy improvisations of Dr. John, weaving these influences into their own digital collages.
  travel: Anne Panzarella plans trips on a whim, driving down the coastal highways to the salt‑marshes of Grand Isle for sunrise photography, hopping on a weekend train to New Orleans for Mardi Gras, and
    dreaming of a future culinary pilgrimage to the Mediterranean coasts that echo their family’s homemade marinara traditions, all while balancing a student budget.
  culinary: Anne Panzarella whips up gumbo and jambalaya with a dash of personal flair—tossing in smoked Andouille, fresh okra, and a splash of espresso for depth—while experimenting with unconventional
    pairings like citrus‑marinated shrimp, proving their cooking skill sits between confident home chef and adventurous flavor hunter.
  core: Anne Panzarella is a fiercely competitive, curiosity‑driven visual creator who lives for spontaneous art projects and cultural festivals, yet constantly battles deadline dread and a coffee‑fuelled
    hustle that leaves little room for routine.
background:
  cultural: 'Anne Marie is a white American with Italian ancestry, reflected in her family’s surname and occasional traditional meals. Growing up in Lafayette, she was immersed in the city’s vibrant Cajun
    and Creole culture: the French language, zydeco music, and communal festivals shaped her worldview. She identifies with Southern hospitality and the close‑knit community spirit of Louisiana while also
    embracing her family’s Mediterranean roots. This blend gives her a multicultural perspective that informs her artistic sensibilities and her appreciation for both the lively rhythms of Cajun life and
    the storytelling traditions of her Italian heritage.'
attributes:
  skills: '["Creative writing", "Sketching and drawing", "Basic graphic design (Canva, Photoshop)", "Photography", "Social media content creation", "Informal event coordination", "Customer service (part‑time
