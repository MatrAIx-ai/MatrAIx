  career_goals: Gilberto aims to transition from a senior full‑stack developer to a technical lead or software architecture role within the next five years. He plans to earn certifications such as AWS Solutions
    Architect and Kubernetes Administrator to broaden his cloud expertise. He wants to lead a small, high‑performing engineering team where he can mentor junior developers, especially those from underrepresented
    Latino backgrounds. He aspires to design scalable micro‑service architectures for enterprise‑grade applications while maintaining a work environment that supports his need for structured routines and
    lower stress. In the longer term, he dreams of launching a SaaS product that addresses health and wellness for the Mexican‑American community, leveraging his full‑stack skills and cultural insight.
