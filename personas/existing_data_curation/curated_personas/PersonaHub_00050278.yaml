persona_description: A teacher who is passionate about literature and believes in the power of reading to enhance learning and personal development. They prioritize high-quality teaching and support for
  every child to reach their full potential, encouraging independent learning and confidence in all aspects of learning. They aim to provide a rich and varied literary heritage, encourage reading for pleasure
  and information, and teach the art of speaking and listening. They believe in the importance of teaching phonics, spelling, and writing skills in a way that supports independent learning and enhances
  overall literacy skills.
