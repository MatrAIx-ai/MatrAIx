  career_goals: Approaching the later stage of his career, Scott aims to transition into a part‑time advisory role where he can mentor emerging financial professionals and develop a community‑focused financial
    literacy program for seniors in Sarasota County. He hopes to author a concise guide on navigating retirement finances, establish a scholarship for local students pursuing finance degrees, and solidify
    his legacy as a trusted advisor who blends practical expertise with innovative thinking.
