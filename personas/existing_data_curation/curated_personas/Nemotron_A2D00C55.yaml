personas:
  professional: Annabelle Corley, a budding visual communicator, leverages her digital illustration, photography, and event‑planning skills to design community art workshops, channeling her curiosity and
    balanced organization into projects that blend creative experimentation with reliable execution.
  sports: Annabelle Corley enjoys weekend trail runs on the Piedmont Trail, joins a local co‑ed ultimate frisbee league in the spring, follows the Atlanta Falcons for football, the Atlanta Hawks for basketball,
    and incorporates morning yoga to stay flexible, balancing her active pursuits with a relaxed, community‑focused mindset.
  arts: Annabelle Corley spends evenings sketching inspired by Georgia O’Keeffe’s vibrant flora, curating playlists of indie folk artists like Sufjan Stevens and The Milk Carton Kids while she photographs
    sunrise over the Oconee hills, and she actively participates in the county library’s art program, where she shares her love for contemporary novels by Sally Rooney and experimental fiction by Ocean Vuong
    with younger readers.
  travel: Annabelle Corley prefers low‑key road trips that blend hiking and cultural stops, having explored the Blue Ridge Parkway, a weekend getaway to Asheville’s art galleries, and a spring visit to
    New Orleans for its music scene, while dreaming of an immersive study tour in Florence, Italy to study Renaissance fresco techniques.
  culinary: Annabelle Corley, a confident home cook, reimagines classic Southern comfort foods like shrimp‑and‑grits with quinoa and kale, pairs fried chicken with kimchi‑slaw, and delights in experimenting
    with smoked paprika, heirloom tomatoes, and sweet potato purée, often savoring these dishes while listening to vinyl records of folk ballads.
  core: Annabelle Corley blends an insatiable curiosity for art with a habit of procrastinating on paperwork, preferring to lose track of time sketching in coffee shops while a half‑finished spreadsheet
    gathers digital dust.
background:
  cultural: 'Annabelle was raised in a white, middle‑class family in Oconee, Washington County, Georgia. Her upbringing reflects Southern rural traditions: regular attendance at a local Methodist church,
    participation in community events such as the Oconee County Fair, and a deep appreciation for Southern hospitality. Family values emphasize kindness, cooperation, and respect for nature, aligning with
    her personal disposition. Exposure to regional folk arts—including quilting, bluegrass music, and storytelling—combined with the broader influence of contemporary art through school programs and online
    resources, has shaped her cultural perspective. She identifies both with the historical roots of the American South and a progressive outlook that embraces diverse ideas and creative expression.'
attributes:
  skills: '["digital illustration", "photography", "basic graphic design (Adobe Photoshop)", "event planning", "public speaking", "content writing and editing", "volunteer coordination"]'
  hobbies: '["sketching and painting", "hiking and nature photography", "reading contemporary literature", "book club participation", "volunteering at the local library art program", "attending indie folk
    concerts", "gardening native wildflowers", "experimenting with modern Southern cooking", "digital illustration"]'
  career_goals: Annabelle aspires to pursue a bachelor’s degree in visual communication or art education at a nearby university. She aims to merge her love for art with community engagement, hoping to become
    an arts outreach coordinator for a regional museum or cultural center. In parallel, she plans to launch a freelance graphic design and illustration practice focused on socially‑conscious projects that
    support local artists. Long‑term, she dreams of founding a non‑profit organization that brings art workshops and creative‑learning opportunities to under‑resourced schools across rural Georgia.
