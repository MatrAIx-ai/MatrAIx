  hobbies: '["Salsa Dancing", "Playing Percussion (Bongos)", "Attending Cuban Cultural Festivals", "Basketball (Playing and Watching)", "Beach Jogging", "Surfing", "Reading Latin American Literature", "Blogging
    about Community Policing", "Mentoring High School Students", "Organizing Neighborhood Block Parties", "Mindfulness Meditation", "Weight Training"]'
  career_goals: Francisco aspires to rise to the rank of sergeant and eventually lieutenant within the Miami Police Department, with a focus on leading a specialized community‑outreach unit that bridges
    law enforcement and the Cuban‑American community. He plans to earn a Master’s degree in Criminal Justice and obtain certification in crisis negotiation, aiming to develop culturally responsive policing
    policies and mental‑health support programs for officers. Long‑term, he hopes to mentor at‑risk youth, become a training instructor for new recruits, and influence department practices toward greater
    compassion and effectiveness in diverse neighborhoods.
