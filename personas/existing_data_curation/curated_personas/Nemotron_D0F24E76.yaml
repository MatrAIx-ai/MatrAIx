personas:
  professional: Elena Jordan, a lifelong community organizer, leverages their methodical budgeting and fundraising skills to orchestrate senior‑center events, church potlucks, and library drives, while
    critically evaluating each project's feasibility with a healthy dose of skepticism.
  sports: Elena Jordan maintains a gentle fitness routine of daily walks around the town square with friends, follows the local high school baseball team at the municipal stadium, and proudly dons a vintage
    Bulldogs cap while cheering on the University of Georgia football team each fall.
  arts: Elena Jordan weaves stories into their quilts while listening to the gentle strums of Johnny Cash and the piano lullabies of Fats Waller, and devotes evenings to reading Margaret Mitchell's "Gone
    with the Wind" and a fresh historical novel by Hilary Mantel.
  travel: Elena Jordan enjoys modest road trips to historic towns like Savannah and Charleston, has explored Washington, D.C.’s national archives on a day‑long excursion, and dreams of a gentle retreat
    to the Blue Ridge Mountains to photograph birds, all planned around a careful budget and the need for accessible accommodations.
  culinary: Elena Jordan specializes in classic Southern dishes such as fried chicken, collard greens simmered with smoked ham hocks, buttery cornbread, and peach cobbler, often using fresh tomatoes and
    herbs from their garden, and tends to over‑season the greens with pepper, a quirk that brings both compliments and playful teasing from their church crowd.
  core: Elena Jordan is a pragmatic, community‑driven octogenarian who blends a competitive quilting spirit with a steadfast dedication to preserving local history, all while juggling a nostalgic love of
    Southern cooking and a careful, occasionally forgetful, approach to health.
background:
  cultural: Elena was raised in a traditional white Southern family in Athens, Alabama, where church, family, and community have long been central. Her upbringing emphasized hospitality, self‑reliance,
    and respect for local customs such as high school football Saturdays, church potlucks, and county fairs. Growing up during the post‑World War II era, she witnessed the evolution of Southern society,
    balancing timeless Southern hospitality with a pragmatic openness to change. Her faith, likely Baptist or Methodist, continues to shape her values and community involvement, while her deep roots in
    Limestone County foster a strong sense of place and dedication to preserving local history.
