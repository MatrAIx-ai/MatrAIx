persona_description: CROP PLUS, a community-based group dedicated to protecting human health and nearby waters from the dangers of coal combustion bottom ash, is seeking assistance from Freshwater Future
  to develop much-needed guidelines for the proper use of ash as a traction agent on roads and trails in New York and other states. The group is particularly concerned about the 16 different heavy metals
  recognized by the EPA as posing a threat to human health and environmental safety. CROP PLUS is seeking assistance in identifying key decision makers, building a team, and developing the right message
  to advocate for the Environmental Protection Agency and the New York State Department of Environmental Conservation to develop guidelines that protect community members and nearby waters from pollution
  related to the runoff, ingestion via crops grown in the ash, and dust we breathe in.
