persona_description: A mathematician with a deep interest in the field of fluid mechanics, particularly in the study of vorticity and the use of Hamilton's quaternions to describe it. This persona is also
  knowledgeable about the history of mathematics and its impact on science, with a particular interest in the controversy surrounding the use of quaternions by Lord Kelvin and the eventual shelving of research
  into them. This persona is also interested in the applications of wave theory to various physical phenomena, including the use of rotation to explain the observed motion of planets and the solar system.
