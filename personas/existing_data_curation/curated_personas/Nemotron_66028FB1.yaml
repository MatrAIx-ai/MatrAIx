personas:
  professional: Iris Kendall, a veteran building maintenance supervisor with four decades of expertise in systematic cleaning protocols, OSHA safety compliance, inventory control, and shift scheduling,
    they bring their meticulous, structure‑loving nature and assertive yet cooperative leadership to formalize flawless cleaning standards across senior‑housing facilities while mentoring younger staff.
  sports: Iris Kendall, a regular participant in the Bucks County Senior Walking Club that meets for brisk river‑side strolls each morning, enjoys cheering on the Philadelphia Eagles in the fall and the
    Phillies during baseball season, and they incorporate light stretching routines into their schedule to ease osteoarthritis discomfort.
  arts: Iris Kendall, an avid lover of classic mystery literature from Agatha Christie and Dorothy L. Sayers, delights in quilting intricate traditional patterns inspired by 19th‑century New England farmhouse
    style, and often attends community theater productions featuring performances by local actor James Bentley, while winding down to Ella Fitzgerald’s jazz recordings, they find these artistic pursuits
    a soothing counterbalance to their penchant for worry.
  travel: Iris Kendall, who plans trips with meticulous checklists and prefers moderate‑paced itineraries that blend garden tours in Charleston’s historic plantations, relaxing river cruises on the Hudson,
    and a nostalgic weekend visit to the Cotswolds in England, they select destinations within a comfortable flight range to accommodate their health and budget while satisfying a longing for cultural enrichment.
  culinary: Iris Kendall, a competent home cook who favors farm‑to‑table meals like roasted heirloom tomatoes with fresh basil, hearty vegetable pot pie, and lemon‑infused grilled trout, frequently uses
    herbs from her garden such as thyme and rosemary, and they enjoy occasional lunches at the local seafood deli where they order the crab cake sandwich.
  core: Iris Kendall, a detail‑obsessed former maintenance supervisor who balances a love for quilting and mystery novels with a nervous habit of double‑checking every lock before bedtime and a tendency
    to worry about the smallest irregularities, they often find solace in garden chores.
background:
  cultural: Iris grew up in the post‑war suburb of Levittown, Pennsylvania, a community shaped by the ideals of the American Dream, close‑knit neighborhood cooperation, and a strong work ethic. Her family’s
    heritage traces back to mid‑Atlantic European roots, and she was raised in a modest, predominantly Protestant environment that emphasized punctuality, responsibility, and community service. Over the
    decades she has witnessed cultural shifts from the 1950s’ conformity to today’s greater diversity, yet she retains the values of self‑reliance, respect for routine, and a commitment to helping neighbors,
    which continue to inform her daily life and interactions.
attributes:
  skills: '[''Commercial cleaning'', ''Facility safety compliance (OSHA)'', ''Inventory management'', ''Shift scheduling'', ''Equipment operation and maintenance'', ''Basic plumbing and electrical troubleshooting'',
    ''Record‑keeping and documentation'', ''Staff training and mentorship'', ''Conflict resolution'']'
  hobbies: '[''Gardening (vegetable and flower)'', ''Quilting'', ''Reading mystery novels'', ''Weekly book club'', ''Walking group in local parks'', ''Volunteering at community center'']'
  career_goals: Although nearing retirement, Iris aims to secure a supervisory role where she can formalize cleaning standards across multiple sites and mentor younger workers. She plans to obtain a Certified
    Professional Cleaner (CPC) credential and complete a short occupational safety course. Her long‑term ambition is to transition into a part‑time consulting position for senior‑housing facilities in Bucks
    County, helping them implement efficient cleaning schedules and health‑safety protocols while ensuring a steady supplemental income for her retirement.
