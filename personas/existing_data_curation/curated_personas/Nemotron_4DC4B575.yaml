personas:
  professional: Angel Castro, a seasoned educator with 25 years of experience in curriculum design, bilingual instruction, and arts integration, channels a curious and flexible mindset into senior‑level
    nonprofit leadership, while their relaxed, harmony‑focused style helps mediate staff conflicts even as they wrestle with occasional stress‑driven anxiety.
  sports: Angel Castro enjoys gentle yoga sessions at the Berkeley Yoga Collective, occasional weekend hikes in the Marin Headlands, and cheering on the Golden State Warriors, San Jose Earthquakes, and
    San Francisco 49ers, while their preference for low‑impact activity reflects a desire for balanced wellness over competitive sport.
  arts: Angel Castro immerses themselves in the visual arts by curating and painting abstract canvases that weave folk motifs with contemporary textures, regularly visits the Berkeley Art Museum and the
    San Francisco Museum of Modern Art, and draws inspiration from artists such as Frida Kahlo, Yayoi Kusama, and Jackson Pollock, as well as poets like Octavio Paz and novelists like Gabriel García Márquez.
  travel: Angel Castro favors purposeful travel that blends cultural immersion and personal renewal, having explored the historic streets of Granada, the tea houses of Kyoto, and the vibrant markets of
    Marrakech, while dreaming of a future retreat in the serene landscapes of Lake Como and a wellness workshop in Bali.
  culinary: Angel Castro delights in cooking traditional dishes like tamales, mole poblano, and chiles en nogada, often experimenting by adding Mediterranean herbs or quinoa, and enjoys sourcing fresh cilantro,
    lime, and heirloom corn at local farmers’ markets to create flavorful fusion meals.
  core: Angel Castro is a curious, art‑driven educator who balances a relaxed, sometimes disorganized lifestyle with a deep commitment to community wellness, often wrestling with worry yet finding solace
    in yoga, painting, and mindful generosity.
background:
  cultural: Angel grew up in a bilingual household in the East Bay, the daughter of Mexican immigrants who arrived from Jalisco. Her upbringing blended Mexican traditions—such as Día de los Muertos altars,
    folklore music, and family gatherings centered around homemade tamales—with the progressive, multicultural environment of Berkeley. Fluent in Spanish and English, she remains active in local Mexican
    cultural centers, where she volunteers to teach Spanish storytelling workshops for children. Her cultural identity informs her professional dedication to inclusive education and her personal appreciation
    for art and communal harmony.
attributes:
  skills: '[''Curriculum Design'', ''Bilingual Instruction (Spanish/English)'', ''Arts Integration'', ''Community Outreach'', ''Staff Mentorship'', ''Conflict Mediation'', ''Educational Technology'', ''Data-Driven
