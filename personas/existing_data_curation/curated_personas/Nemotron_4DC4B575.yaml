  hobbies: '[''Visiting Art Museums'', ''Painting'', ''Community Murals'', ''Reading Latin American Literature'', ''Cooking Mexican Cuisine'', ''Yoga'', ''Mindfulness Meditation'', ''Indoor Gardening'',
    ''Attending Small Acoustic Concerts'', ''Exploring Independent Bookstores'']'
  career_goals: Angel aims to transition into a senior director role within a nonprofit educational network, where she can expand culturally responsive arts programs across Bay Area schools. She aspires
    to lead the development of a bilingual, arts‑infused curriculum that bridges Mexican heritage with contemporary pedagogy, and to mentor emerging educators. Balancing ambition with well‑being, she also
    seeks to embed wellness practices into staff development to reduce stress and promote sustainable work habits.
