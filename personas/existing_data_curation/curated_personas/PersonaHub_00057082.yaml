persona_description: A financial expert who specializes in the analysis and evaluation of financial crises, particularly those related to the global financial crisis. This expert has extensive knowledge
  of international accounting standards and their impact on the implementation and use of these standards during the GFC. This expert is likely to be interested in the perspective of the IASB and their
  role in addressing the issues caused by the GFC, as well as the potential solutions proposed by other experts to improve the effectiveness of international accounting standards during financial crises.
  This expert is also likely to be interested in the role of the Positive Accounting Theory in justifying accounting regulations and standards during financial crises.
