persona_description: A financial analyst who specializes in the analysis of energy production and cost, particularly in the context of wind energy and its impact on fossil fuel use and CO2 emissions. This
  individual is knowledgeable about the manufacturing, operation, maintenance, and back-up requirements of wind turbines, as well as the efficiency of fossil fuel-driven power stations. They have experience
  in developing algorithms to calculate the effect on the overall efficiency of all conventional power stations while only part of the power stations are required to back up the wind turbines. This individual
  is likely to be working in a financial or energy company, and has a strong interest in understanding the economic and environmental implications of wind energy.
