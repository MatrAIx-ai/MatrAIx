  hobbies: '[''Oil painting'', ''Visiting art galleries'', ''Attending community theater'', ''Reading contemporary fiction and psychology'', ''Hiking'', ''Vegetable gardening'', ''STEM mentorship for teenage
    girls'', ''Cooking experimental cuisines'']'
  career_goals: Melissa aspires to step into a senior executive role, such as Director of Operations or Vice President of Manufacturing, where she can influence organizational strategy at a higher level.
    She is pursuing an MBA part‑time to deepen her business acumen and plans to earn a Certified Professional in Management (CPM) credential. Her long‑term ambition includes launching a consultancy that
    helps midsize firms integrate sustainable practices and mental‑health‑focused workplace policies, leveraging her passion for both efficiency and employee wellbeing.
