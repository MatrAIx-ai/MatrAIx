personas:
  professional: A ten-year-old aspiring game developer named Bernard Moore builds intricate LEGO creations and codes simple Scratch games, applying their love of routine and practical problem-solving to
    turn ideas into playable prototypes, while their cooperative nature makes them a go-to helper for group projects at the community center.
  sports: A budding athlete named Bernard Moore spends afternoons shooting hoops at the Woodhaven community center, competes with the Queens Youth Basketball League, follows the New York Knicks and Brooklyn
    Nets closely, and balances their love of the sport with a routine of daily bike rides and occasional pickup games, while avidly collecting basketball cards.
  arts: A creative mind named Bernard Moore devours graphic novels like Spider-Man and Batman, curates playlists featuring Kendrick Lamar, J. Cole and Alicia Keys, and occasionally sketches their own comic
    panels during quiet moments, letting music and illustrated storytelling shape their imagination.
  travel: An adventurous explorer named Bernard Moore enjoys weekend bike trips to Coney Island and family road trips to Atlantic City, and dreams of visiting Jamaica to taste authentic jerk chicken and
    explore the island’s beaches, preferring low-cost itineraries that fit their modest allowance and school schedule.
  culinary: A budding chef named Bernard Moore loves assisting their mother with simple dishes such as jerk chicken, fried plantains, and homemade banana bread, enjoys the tang of mango salsa on tacos,
    and often experiments with LEGO-inspired plating while still mastering basic knife skills.
  core: Bernard Moore is a routine-loving ten-year-old who builds LEGO worlds, codes Scratch games, and gathers basketball cards, yet occasionally forgets their inhaler after biking and can’t resist a last-minute
    LEGO set even when their allowance is tight.
background:
  cultural: Bernard is a Black American raised in Woodhaven, Queens, in a family that blends African-American traditions with Caribbean influences. He celebrates cultural holidays such as Juneteenth and
    Kwanzaa, enjoys family meals featuring dishes like jerk chicken and plantains, and participates in church youth groups that emphasize community and harmony. Growing up in a diverse borough, he is exposed
    to many cultures, languages, and cuisines, which enrich his sense of identity and pride.
