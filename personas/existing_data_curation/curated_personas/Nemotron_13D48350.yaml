  career_goals: Bernard dreams of becoming a firefighter because he admires the teamwork, routine schedules, and community service the role provides. He plans to finish high school, attend a fire academy,
    and eventually mentor younger kids in his neighborhood. He also has a budding interest in technology and hopes to develop his coding skills to support community projects in the future.
