  career_goals: Margarita envisions a future where she can merge her love for art and her cultural heritage. She aspires to attend a specialized high school for the visual arts and later pursue a degree
    in fine arts or indigenous cultural studies. Her ultimate goal is to become a visual storyteller or art therapist who uses artwork to help others, particularly Native youth, express and process their
    emotions. She hopes to create a community space that showcases contemporary Native art, offers workshops, and provides a safe, flexible environment for creative exploration. Because she values flexibility
    and low‑stress structures, she also considers freelance illustration and collaborative community projects as viable career paths.
