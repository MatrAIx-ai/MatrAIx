  hobbies: '["Landscape photography", "Sketching and digital illustration", "Reading speculative fiction and philosophy", "Hiking in the Rockies", "Korean cooking", "Attending local art galleries", "Travel
    blogging", "Learning traditional Korean percussion"]'
  career_goals: Taemin aims to transition from driver‑sales roles into a logistics management position where he can oversee a small fleet and apply his improvisational strengths to streamline operations.
    He envisions launching a boutique moving company that incorporates a distinctive visual brand—drawing on his graphic‑design hobby—to attract niche clients interested in artistic presentation of their
    shipments. Additionally, he hopes to cultivate a travel‑photography blog that showcases the Colorado roadscape, merging his love of novelty, art, and storytelling with his professional expertise.
