  career_goals: Jacob intends to obtain his GED within the next year and then enroll in a community‑college trade program, focusing on a skilled trade such as HVAC or welding. He aims to become a certified
    technician, valuing the blend of problem‑solving and tangible results the field offers. Long‑term, Jacob hopes to launch his own small contracting business, providing reliable service to his hometown
    while creating apprenticeship opportunities for other young people. He also envisions volunteering his technical skills for local non‑profits, strengthening the community that raised him.
