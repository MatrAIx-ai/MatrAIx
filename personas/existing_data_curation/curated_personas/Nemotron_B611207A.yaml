personas:
  professional: Jacob Gillespie is a hands‑on high‑school senior who leverages their carpentry, basic automotive maintenance, and computer troubleshooting skills, using their organized and cooperative nature
    to lead church youth group projects while charting a path toward a certified HVAC or welding technician career.
  sports: Jacob Gillespie is an avid pickup basketball player who spends weekend evenings at the Lake Hickory Youth Basketball League, cheering for the Charlotte Hornets during the NBA season, and incorporates
    light cardio and bodyweight workouts to stay fit for both court play and long fishing days.
  arts: Jacob Gillespie is a budding acoustic guitarist who practices folk and classic rock classics by Bob Dylan, Neil Young, and The Eagles, while also assembling detailed model airplanes, merging technical
    precision with musical storytelling.
  travel: Jacob Gillespie prefers low‑key, nature‑focused trips, often weekend camping at Lake Hickory and annual family road‑trips to the Great Smoky Mountains, while dreaming of future hikes and fishing
    adventures in Glacier National Park.
  culinary: Jacob Gillespie has an intermediate kitchen skill set, favoring grilled catfish seasoned with lemon pepper, hearty buttermilk biscuits for breakfast, and occasional homemade pizza topped with
    fresh mozzarella, basil, and sliced pepperoni, reflecting their love for simple, flavorful meals after a day outdoors.
  core: Jacob Gillespie is a methodical teen who blends practical hands‑on skills with a curious love for music and solitary fishing, always planning the next project while keeping community harmony at
    the forefront.
background:
  cultural: Jacob grew up in Lenoir, a small town in Wilkes County, North Carolina, where the cultural landscape is shaped by Southern hospitality, a strong sense of community, and a history of textile
    and furniture manufacturing. His family has lived in the region for several generations, maintaining traditions such as church attendance, community fairs, and a close‑knit neighborhood network. While
    rooted in these local customs, Jacob is also influenced by broader digital culture through online gaming and internet resources, creating a blend of rural values and modern curiosity. This hybrid background
    informs his pragmatic outlook, respect for collaborative harmony, and desire to contribute meaningfully to his hometown.
