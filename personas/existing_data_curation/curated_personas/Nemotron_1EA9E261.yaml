  hobbies: '["Woodworking","Gardening (Mexican vegetables)","Cooking Mexican cuisine","Chess","Community cultural events and festivals","Volunteering at community center","Walking in local parks"]'
  career_goals: Although no longer in the formal workforce, Alejandro aims to channel his expertise into pro bono consulting for local non‑profits and small Mexican‑owned businesses in Santa Clara, helping
    them streamline operations and improve inventory practices. He also aspires to mentor at‑risk youth through job‑readiness workshops and life‑skill coaching, sharing his achievement‑driven mindset. A
    long‑term personal ambition is to author a practical guide on home organization that blends his disciplined approach with Mexican cultural traditions, leaving a lasting resource for his community.
