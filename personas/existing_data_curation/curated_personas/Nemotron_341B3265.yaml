personas:
  professional: An ESG‑focused audit specialist, Aliana Salinas leverages advanced Excel, SAP, and a humanities‑sharpened analytical eye to produce meticulous audit reports while channeling their competitive
    spirit into mentoring emerging underrepresented talent and navigating office dynamics with a healthy dose of skepticism.
  sports: On weekends, Aliana Salinas hikes the dunes of Indiana with a close‑knit crew, occasionally joins a co‑ed softball league, and fervently supports the Chicago Bears and Chicago Fire, balancing
    their love for group activity with a competitive drive to improve personal bests.
  arts: Aliana Salinas curates their cultural palate by attending jazz nights at the Green Mill, world‑music concerts, and organizing Día de los Muertos altars, while devouring contemporary Latin American
    authors like Gabriel García Márquez and Valeria Luiselli, letting literature fuel their critical thinking.
  travel: When planning escapes, Aliana Salinas meticulously maps out road trips to the Indiana Dunes, dreams of wandering Oaxaca’s spice‑laden markets and Seville’s historic plazas, and often overbooks
    itineraries to satisfy their competitive urge to experience it all before the next audit season.
  culinary: Aliana Salinas transforms their kitchen into a flavor workshop, perfecting mole, pozole, and tamales with chilies, cacao, and masa, yet their habit of procrastinating on prep sometimes forces
    a last‑minute take‑out, which they humorously label a ‘plan B tasting.’
  core: Aliana Salinas is a driven CPA‑candidate who blends cultural rhythm into rigorous audits, battles anxiety with yoga, never skips a dance night, and occasionally lets competitive perfectionism fuel
    both their career and culinary experiments.
background:
  cultural: Aliana is a first‑generation Mexican‑American whose parents immigrated from Jalisco. Raised in Chicago’s vibrant Pilsen district, she grew up speaking both Spanish and English, celebrating traditions
    such as Día de los Muertos, Las Posadas, and family gatherings centered around homemade food. Her upbringing emphasized respect for family, community solidarity, and the importance of education, values
    that continue to shape her work ethic and interpersonal style. She remains actively involved with local Mexican cultural organizations, volunteering at heritage festivals and supporting Spanish‑language
    literacy programs. While she embraces the entrepreneurial spirit and individuality emphasized in American culture, she also honors the collectivist and relational aspects of Mexican culture, which inform
    her collaborative approach and her commitment to giving back to the community.
attributes:
  skills: '[''Financial reporting and GAAP compliance'', ''Audit planning and execution'', ''Risk assessment and internal controls'', ''Tax preparation and filing'', ''Advanced Excel modeling'', ''Data
    visualization (Power BI, Tableau)'', ''QuickBooks and SAP accounting software'', ''Bilingual communication (Spanish/English)'', ''Technical writing and report preparation'', ''Project management'',
    ''Cross‑cultural client relations'', ''Regulatory change adaptation'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking Mexican cuisine'', ''Yoga and guided meditation'', ''Reflective journaling'', ''Community math tutoring'', ''Hiking in the Indiana Dunes'', ''Reading
    contemporary Latin American literature'', ''Attending live jazz and world‑music concerts'', ''Participating in Día de los Muertos cultural events'', ''Organizing cultural workshops'']'
  career_goals: Aliana aims to become a Certified Public Accountant within the next 18 months and to advance to a senior audit manager role at a major firm within five years. She is particularly interested
    in integrating her humanities perspective into ESG (environmental, social, and governance) auditing and forensic accounting, helping clients demonstrate ethical stewardship. She seeks to lead multidisciplinary
    audit teams, mentor junior women and Latinx professionals, and champion diversity‑inclusion initiatives within her organization. In the longer term, she envisions moving into a chief financial officer
    position at a socially‑focused nonprofit or a start‑up that serves the Mexican‑American community, where she can combine financial expertise with cultural advocacy while maintaining a sustainable work‑life
    balance that supports her mental‑health goals.
