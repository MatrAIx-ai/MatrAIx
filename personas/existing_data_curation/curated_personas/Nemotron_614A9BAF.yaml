  hobbies: '["Visiting art galleries and museums", "Sketching architectural details", "Cooking Vietnamese cuisine", "Yoga and mindfulness meditation", "Hiking in Patuxent River Park", "Reading philosophy
    and science non‑fiction", "Digital illustration", "Attending small‑group poetry readings"]'
  career_goals: Huong aims to move from her current managerial role into senior leadership within the next five years, targeting a director‑level position in operations or product development at a culturally‑focused
    organization. She plans to earn a PMP certification and later pursue an MBA to deepen her strategic expertise. Long‑term, she envisions launching a boutique consultancy that merges data‑driven business
    solutions with creative arts initiatives, leveraging her dual interests in efficiency and unconventional thinking. She also seeks to champion workplace policies that address stress management, reflecting
    her own experiences with anxiety and her desire for a healthier work environment.
