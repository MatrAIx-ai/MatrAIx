personas:
  professional: Huong Bui is a project manager who blends data‑driven decision‑making with a keen eye for visual design, using meticulous budgeting and cross‑cultural communication to streamline operations
    while quietly advocating for workplace stress‑management policies as they work toward a future director role.
  sports: Huong Bui enjoys solitary weekend hikes along the Patuxent River trails, practices yoga three times a week for flexibility and stress relief, and follows the Baltimore Ravens and Washington Capitals,
    occasionally joining a local pick‑up soccer game during the spring season.
  arts: Huong Bui frequents Baltimore’s contemporary art galleries, sketching intricate architectural details while creating digital illustrations, draws creative spark from light installations by James
    Turrell and conceptual works by Ai Weiwei, and regularly attends intimate poetry readings showcasing local spoken‑word talent and contemporary poets like Rupi Kaur.
  travel: Huong Bui plans their travel around quiet cultural immersion, favoring meticulously researched trips such as a spring weekend in Kyoto’s historic temples, a summer culinary tour of Hoi An’s night
    market, and an annual yoga retreat in Bali, all while balancing a modest budget and a need for restorative solitude.
  culinary: Huong Bui cooks with a blend of tradition and experimentation, mastering the broth of pho bo, the crisp texture of bánh xèo, and the aromatic balance of lemongrass and fish sauce while also
    delighting in crafting modern dishes like quinoa‑infused bánh mì, and they relish sourcing fresh herbs from the local farmers market.
  core: Huong Bui is a methodical yet curious planner who channels a disciplined work ethic into data‑driven leadership ambitions, while quietly battling anxiety through yoga, art, and thoughtful budgeting,
    often juggling meticulous schedules with a penchant for solitary hikes and late‑night kitchen experiments.
background:
  cultural: Huong is a second‑generation Vietnamese American raised in Maryland. Her parents immigrated from Vietnam after the war, fostering a bilingual household where both English and Vietnamese are
    spoken. She celebrates Tet and the Mid‑Autumn Festival, maintains close ties with extended family, and incorporates Vietnamese aesthetics into her personal style and creative projects. Her heritage
    informs her disciplined work ethic, respect for education, and deep appreciation for community art initiatives, while also shaping her nuanced perspective on cross‑cultural communication and identity.
