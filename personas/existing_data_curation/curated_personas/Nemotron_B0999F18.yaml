personas:
  professional: Roxana Combs, a seasoned flight attendant with over three decades of cabin safety expertise, blends meticulous safety checks with a curiosity for emerging travel technologies, and now channels
    that experience into mentoring new crew members while advocating for age‑friendly scheduling, a goal they pursue with quiet determination.
  sports: Roxana Combs, a regular participant in the Carroll County hiking group, follows the Baltimore Ravens and the Washington Commanders, enjoys low‑impact exercises like weekend walks with the local
    walking club to protect her joints, and occasionally joins community softball games, a competitive streak they channel into friendly rivalry.
  arts: Roxana Combs, an avid reader of historical fiction like Ken Follett’s Pillars of the Earth, enjoys quilting with the Westminster craft circle, captures landscape photos of Catoctin Mountain Park
    inspired by Ansel Adams, and listens to folk musician Gillian Welch while working, artistic pursuits they cherish as both relaxation and expression.
  travel: Roxana Combs, a lifelong airline crew member, favors spontaneous weekend getaways over rigid itineraries, cherishes past trips to New Zealand’s South Island and Lisbon’s historic neighborhoods,
    plans future visits to the Great Smoky Mountains and Napa Valley vineyards, balances adventure with their desire for flexibility in travel planning, and makes these choices they view as extensions of
    their curiosity.
  culinary: Roxana Combs, who cultivates native Maryland herbs like sweet‑grass and rosemary in her garden, seasons crab cakes and herb‑crusted chicken with fresh garden flavors, prepares a comforting chicken
    and dumplings stew, occasionally experiments with a Moroccan tagine on her slow‑cook weekends, and enjoys sharing these dishes with friends, culinary experiments they view as extensions of their love
    for nature.
  core: Roxana Combs blends a pragmatic, safety‑first mindset with wanderlust and a sprinkle of organized chaos, turning garden herbs into culinary delights while mentoring the next generation of flight
    attendants, a balance they maintain with quiet confidence.
background:
  cultural: Roxana grew up in a Mid‑Atlantic, working‑class family with deep ties to the local community of Westminster and surrounding Carroll County. Her upbringing emphasized practical self‑reliance,
    respect for tradition, and an openness to the broader world that she experienced through her career in aviation. While she identifies with mainstream American cultural norms—celebrating community events,
    supporting local churches, and valuing family—her years of travel have broadened her perspective, fostering an appreciation for diverse cultures and a curiosity about new ideas. This blend of local
    roots and global exposure shapes her balanced, pragmatic yet inquisitive outlook.
attributes:
  skills: '["Passenger safety procedures","Customer service excellence","Conflict resolution and de‑escalation","Emergency evacuation drills","Cabin crew coordination","Basic conversational Spanish","First‑aid
