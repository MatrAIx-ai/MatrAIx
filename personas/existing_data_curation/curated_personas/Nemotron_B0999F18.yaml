  hobbies: '["Gardening","Hiking in local state parks","Travel photography","Reading historical fiction","Cooking regional recipes","Volunteering at senior center","Quilting with a local craft circle","Visiting
    farmers'' markets"]'
  career_goals: Roxana aims to transition into a mentorship and training role within her airline, using her extensive hands‑on experience to instruct new flight attendants on safety protocols and customer‑service
    best practices. She is interested in obtaining a senior safety trainer certification and hopes to develop a workshop series on emergency preparedness for both airline staff and community groups. While
    she values the flexibility of her current position, she also aspires to advocate for more age‑friendly scheduling policies, ensuring that veteran crew members can continue contributing without compromising
    work‑life balance.
