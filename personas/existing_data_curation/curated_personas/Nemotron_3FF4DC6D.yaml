  career_goals: Gladys aims to advance from a hands‑on maintenance worker to a lead supervisor for a residential complex in Toa Baja, where she can mentor newer technicians and introduce more organized
    workflow systems that complement her spontaneous style. She is also interested in obtaining formal certifications in electrical and plumbing trades to broaden her expertise. Long‑term, she envisions
    launching a small independent handyman business that blends functional repairs with creative, tasteful design touches inspired by her appreciation for local art and culture. This venture would allow
    her to meet her own standards of quality while providing flexible scheduling for her family.
