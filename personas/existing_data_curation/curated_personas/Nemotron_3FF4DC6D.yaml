personas:
  professional: Gladys Pena is a seasoned maintenance technician in San Juan who combines a solid toolbox of electrical, plumbing, carpentry, and HVAC skills with a spontaneous, improvisational work style,
    often crafting ad‑hoc solutions when standard parts are unavailable, and she now aims to transition into a supervisory role that lets her mentor junior technicians while introducing flexible workflow
    systems—though her aversion to strict deadlines sometimes forces her to juggle schedules at the last minute.
  sports: Gladys Pena enjoys playing weekend beach volleyball with friends, follows the Cangrejeros de Santurce baseball team and the San Juan Capitals basketball squad, participates in a local hiking club
    that meets for trail runs along the northern coast, and occasionally joins spontaneous salsa dancing marathons that double as cardio workouts.
  arts: Gladys Pena spends afternoons sketching murals inspired by the vibrant color palettes of local street artist Oscar Ramos, regularly visits gallery openings showcasing the work of painter Ana Castillo,
    dances salsa to the rhythms of Marc Anthony and Celia Cruz at neighborhood events, and reads art magazines that feature contemporary creators like Banksy and Yayoi Kusama for fresh inspiration.
  travel: Gladys Pena prefers spontaneous, day‑trip style getaways, often hopping to the northern beaches for picnics, exploring the historic cobblestones of Old San Juan, and dreaming of future adventures
    to Marrakech’s bustling souks and Norway’s dramatic fjords, all while balancing family obligations and a modest travel budget.
  culinary: Gladys Pena loves cooking arroz con gandules with a homemade sofrito of cilantro, garlic, and annatto, frequently harvests fresh herbs from her balcony garden to garnish tropical dishes, savors
    street‑food fish tacos topped with mango salsa on weekend outings, and occasionally indulges in sweet pastries like tembleque, though they sometimes over‑season their meals in the excitement of experimentation.
  core: Gladys Pena blends a handyman’s pragmatic know‑how with an artist’s eye, tackling repairs with improvised flair while occasionally misplacing receipts, and they navigate life with a spontaneous
    spirit that both fuels creative projects and challenges structured planning.
background:
  cultural: Gladly is deeply rooted in her Puerto Rican heritage, having grown up in the vibrant municipality of Toa Baja. Bilingual in Spanish and English, she values strong family ties, community solidarity,
    and the island's rich traditions—from festive celebrations like Noche Buena to the rhythmic pulse of salsa and reggaetón. Her cultural upbringing emphasizes resilience, improvisation, and a communal
    spirit, which influence her approach to both work and personal life. The colorful aesthetics of Caribbean art and the lush coastal environment are reflected in her creative hobbies, while her commitment
    to helping neighbors mirrors the collective ethos of Puerto Rican neighborhoods.
