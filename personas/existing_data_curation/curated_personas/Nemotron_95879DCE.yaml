  hobbies: '[''Visiting art galleries and street murals'',''Urban photography'',''DIY home renovation projects'',''Upcycling furniture'',''Soul food cooking'',''Attending community block parties and dances'',''Jazz
    and R&B music appreciation'',''Community volunteering with Habitat for Humanity'',''Gardening in a small backyard plot'',''Line dancing'']'
  career_goals: Jacqueline aims to formalize her construction knowledge by completing a carpentry apprenticeship and earning OSHA certification within the next two years. She aspires to move from helper
    to crew lead or foreman, using her competitive drive to secure a supervisory role. Long‑term, she hopes to launch a modest remodeling business that provides affordable, aesthetically‑enhanced home upgrades
    for families in her community, blending her love of art with practical building skills.
