personas:
  professional: Jacqueline Smith is a veteran construction helper with over twenty years mastering framing, finish carpentry, concrete work, and small equipment operation, who injects her art‑savvy curiosity
    and natural sociability into on‑site design suggestions while pursuing a carpentry apprenticeship and a future crew‑lead position.
  sports: Jacqueline Smith fuels her fitness with early‑morning river‑front bike rides, a weekly spot on a mixed‑age recreational softball team, avidly roots for the Chicago Cubs and Chicago Bulls, and
    practices yoga at the community center to stay flexible for construction work.
  arts: Jacqueline Smith immerses herself in the local art scene, admiring murals by Shepard Fairey and paintings by Kehinde Wiley, while grooving to jazz legends John Coltrane, R&B icons Erykah Badu and
    D’Angelo during neighborhood block parties, and she often volunteers to curate pop‑up exhibitions, reflecting her deep blend of visual and musical passion.
  travel: Jacqueline Smith favors unplanned weekend trips to historic charms like Savannah and creative retreats in Santa Fe, yet dreams of exploring the canals of Amsterdam and the tea houses of Kyoto,
    balancing her love of culture with the practicalities of caring for her garden and family.
  culinary: Jacqueline Smith’s cooking showcases soulful Southern dishes like jambalaya with smoked sausage, bell peppers and cilantro, alongside fresh garden creations such as roasted beet‑goat‑cheese
    salad with balsamic glaze, demonstrating her confident yet experimental home‑chef approach.
  core: Jacqueline Smith merges a carpenter’s hands‑on expertise with an artist’s curiosity, thriving on community buzz while navigating a relaxed, occasionally disorganized lifestyle driven by competition
    and sociability.
background:
  cultural: Jacqueline grew up in the Philadelphia metropolitan area as part of a close‑knit African‑American community. Her grandparents participated in the Great Migration, settling in Delaware County
    where church, gospel music, and neighborhood solidarity shaped family life. In Clifton Heights she remains active in the local Black church, participates in cultural festivals, and cherishes the legacy
    of resilience, mutual aid, and artistic expression that her heritage and community have fostered.
attributes:
  skills: '[''General construction labor'',''Material handling and logistics'',''Basic framing and finish carpentry'',''Concrete mixing and pouring'',''Operation of small equipment (forklift, power drills,
