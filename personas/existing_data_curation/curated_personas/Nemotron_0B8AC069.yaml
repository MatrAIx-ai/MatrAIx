personas:
  professional: Felicita Dejesus is a chemical engineer with a business degree who leverages analytical modeling, process design, and safety compliance expertise, blending their vivid imagination and sociable
    energy to lead cross‑functional sustainability projects and inspire teams with creative, data‑driven solutions.
  sports: Felicita Dejesus is a dedicated salsa dancer who also practices yoga three times weekly, hikes with the Boston Trailblazers club on New England’s White Mountains, and follows the Boston Celtics,
    Red Sox, and Bruins passionately, using team spirit to motivate their own fitness routine.
  arts: Felicita Dejesus is a fervent abstract painter who draws inspiration from the bold colors of Yayoi Kusama, the street energy of Banksy, and the lyrical photography of Annie Leibovitz, regularly
    attending gallery openings and curating pop‑up shows that fuse folk motifs with contemporary aesthetics.
  travel: Felicita Dejesus prefers meticulously planned weekend getaways, having trekked Acadia National Park and explored the historic streets of Boston, while dreaming of a solo adventure to Iceland’s
    geothermal springs and a cultural immersion in Kyoto’s gardens, balancing a modest travel budget with a desire for both adventure and relaxation.
  culinary: Felicita Dejesus enjoys crafting fusion dishes such as roasted corn‑chipotle risotto with plantain crumble and coconut‑lime ceviche with avocado, showcasing a solid home‑chef skill set that
    blends family‑rooted flavor profiles with modern plating techniques.
  core: Felicita Dejesus combines a methodical engineering mind with a boundless artistic imagination, juggling sustainability ambitions, vivid abstract canvases, and a perpetual worry‑driven quest for
    perfect balance.
background:
  cultural: Felicita was raised in a Salvadoran immigrant family, speaking Spanish at home and celebrating cultural traditions such as Día de los Farolitos, traditional pupusas, and Catholic holidays. The
    vibrant music and rhythmic dance of her heritage, especially cumbia and salsa, influence her creative pursuits. Growing up in Medford, she balances her Salvadoran roots with American academic and professional
    environments, becoming bilingual and bicultural. Her community involvement includes volunteering at local Latinx festivals and supporting organizations that empower Latino youth in STEM, reflecting
    a deep sense of responsibility to give back to her cultural community.
