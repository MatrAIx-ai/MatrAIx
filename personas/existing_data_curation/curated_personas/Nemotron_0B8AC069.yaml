  career_goals: Felicita aims to become a senior process engineer leading sustainability initiatives in the chemical industry, eventually moving into a director role where she can shape R&D strategy for
    green chemicals. She plans to leverage her business acumen to launch a startup focused on circular economy solutions, integrating renewable feedstocks into manufacturing. She is also committed to mentoring
    Latinx women in STEM, speaking at industry conferences, and advocating for diversity and inclusive workplace cultures. In the long term, she envisions obtaining an MBA to complement her technical expertise
    and drive strategic innovation.
