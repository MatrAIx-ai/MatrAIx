  hobbies: '["Visiting art galleries", "Attending community theater", "Amateur photography", "Watercolor painting", "Community basketball league", "Weekend fishing trips", "Reading science‑fiction novels",
    "Live music concerts", "Yoga and meditation", "Peer‑support stress group"]'
  career_goals: Robert aims to advance into a supervisory role, such as shift lead or plant manager, where he can shape operational strategy and foster a culture of continuous improvement. He plans to earn
    a Six Sigma Green Belt and enroll in night courses for an associate degree in Industrial Technology to formalize his expertise. Leveraging his artistic interests, he hopes to bridge engineering and
    design by championing more visually‑engaging product packaging and workplace signage. Personally, he is committed to developing coping strategies for his anxiety, including participating in employee
    wellness programs, and to become a mentor who supports both the professional growth and emotional well‑being of his colleagues.
