  hobbies: '["Gardening", "Baking/Cooking", "Reading Historical Fiction", "Jazz Concerts", "Church Choir", "Volunteer Work at Food Bank", "Walking in Parks", "Juneteenth Celebrations", "Bridge/Card Games"]'
  career_goals: Cathy aims to transition into a supervisory or assistant manager role where she can mentor younger staff and shape store policies that balance efficiency with employee well‑being. She hopes
    to develop a community outreach program that partners the retailer with local African American artisans and small businesses, showcasing their products in store and at special events. As she approaches
    retirement, she envisions scaling back to part‑time work while launching a modest consulting service for other boutique retailers, leveraging her deep knowledge of the Kansas City market. Financial
    security and the ability to devote more time to volunteer work and family are also central to her long‑term aspirations.
