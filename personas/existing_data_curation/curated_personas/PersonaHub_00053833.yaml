persona_description: A technologist who is interested in the history and development of electrical power systems, particularly the early days of alternating current (AC) power and its impact on the development
  of domestic clocks. This persona is likely to have a background in electrical engineering or electronics and has an interest in the development of technology and its applications. They are interested
  in the history of the development of domestic clocks and the role that AC power played in their development. They may have a particular interest in the development of the Warren Company and its products,
  particularly the Type A synchronous motor clock introduced in 1916. They may also be interested in the impact of AC power on the development of other technologies, such as radio and telecommunication.
