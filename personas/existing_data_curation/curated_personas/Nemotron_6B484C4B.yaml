  career_goals: Karen aims to transition from her current cashier role to a supervisory position within the next two years, targeting an assistant manager role at her supermarket. She plans to complete
    her associate degree in Business Administration through evening classes, pursue a Certified Retail Management credential, and enroll in the company's leadership development program. Long‑term, she envisions
    managing a full store, implementing efficiency improvements, and eventually opening a small community‑focused grocery boutique as a post‑retirement venture. She also hopes to mentor younger employees
    and contribute to local charitable initiatives.
