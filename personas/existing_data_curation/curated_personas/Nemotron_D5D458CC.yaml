  hobbies: '[''Salsa Dancing'', ''Mexican Cooking'', ''Gardening (Herbs & Chilies)'', ''Hiking'', ''Reading Mystery Novels'', ''Volunteering at Community Events'', ''DIY Home Décor'', ''Attending Cultural
    Festivals'']'
  career_goals: Gumercinda aims to complete her associate’s degree in Business Administration while gaining certifications in nonprofit management. Her primary career ambition is to re‑enter the workforce
    as a community outreach coordinator or program manager for a local non‑profit serving the Bakersfield area, where she can apply her event‑planning and bilingual communication strengths. She also dreams
    of launching a small home‑based catering business that offers authentic Mexican dishes and cooking workshops, allowing her to blend her culinary passion with entrepreneurial goals. Over the next five
    years she hopes to develop leadership skills, expand her professional network, and achieve financial independence.
