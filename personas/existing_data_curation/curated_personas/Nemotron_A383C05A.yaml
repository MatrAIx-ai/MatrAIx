  hobbies: '[''Hiking'', ''Snowshoeing'', ''Fishing'', ''Woodworking'', ''Home Brewing'', ''Reading Historical Biographies'', ''Cooking'', ''Small Group Board Games'', ''Volunteer at Community Events'']'
  career_goals: John aims to progress from his current representative role to a team‑lead or shift‑supervisor position within the call‑center, where he can shape and reinforce reliable service routines.
    He plans to obtain a Certified Customer Experience Professional (CCEP) credential and develop training modules for new hires, leveraging his calm presence to mentor colleagues. In the longer term, he
    envisions moving into operations management within a local hospitality or tourism business, preserving a stable, community‑focused environment while eventually exploring the possibility of running a
    small family‑owned service venture that emphasizes dependable, practical service.
