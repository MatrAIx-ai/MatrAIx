  hobbies: '[''Drawing and planning pictures'', ''Building with blocks and LEGO'', ''Attending library storytime'', ''Participating in community arts‑and‑crafts class'', ''Helping set up snack tables at
    church'']'
  career_goals: Although only six, Bridget already dreams of careers that let her bring order and care to others. She often talks about wanting to become a teacher because she likes sharing knowledge and
    creating a calm classroom, and she also imagines becoming a pediatric nurse, valuing the chance to help children stay healthy and feel safe. Both ambitions reflect her desire to be helpful, dependable,
    and organized in a supportive role.
