personas:
  professional: Bridget Bassa, a budding junior architect, translates her love for orderly LEGO constructions into simple floor‑plans, showcasing early spatial reasoning, meticulous planning, and a methodical
    approach that mirrors her preference for structure even during kindergarten art projects.
  sports: Bridget Bassa plays on the Meadowbrook Mini‑Soccer team, rehearsing drills with precision before each match, and she avidly watches the San Jose Earthquakes, admiring how the professional players
    stick to set formations and execute strategies with disciplined teamwork.
  arts: Bridget Bassa loves drawing detailed scenes inspired by Eric Carle’s vivid collages, rehearses “The Wheels on the Bus” from Sesame Street during arts‑and‑crafts class, and delights in the structured
    storytelling of Hayao Miyazaki’s animated films, which satisfy her craving for orderly composition.
  travel: Bridget Bassa enjoys family road trips that follow a printed itinerary, such as her recent adventure to the Children’s Museum of Indianapolis and a weekend stay at a seaside resort in Myrtle Beach,
    where she organized the snack table and proudly mapped each day’s activities on a colorful chart.
  culinary: Bridget Bassa favors creamy macaroni‑and‑cheese, bright fruit kebabs made of pineapple and grapes, and she loves helping assemble snack trays of cheese cubes and baby carrots at church, though
    she sometimes leaves a trail of crumbs behind.
  core: Bridget Bassa, a six‑year‑old organized dreamer, builds meticulous LEGO blueprints, saves pennies in color‑coded jars, and tidies snack tables with a smile, yet she occasionally mixes up her shoe
    colors and forgets the floss.
background:
  cultural: Bridget is an African‑American child growing up in Fayetteville, North Carolina, a city with deep ties to military families and a vibrant Black community. Her family celebrates traditions that
    blend Southern hospitality with cultural heritage, such as soulful cooking, gospel music at church, and storytelling evenings that honor elders. She participates in community events at the local African
    American cultural center, where she learns about historic figures from the Civil Rights Movement and enjoys seasonal festivals that highlight local Black artistry and cuisine. These experiences shape
    her sense of identity, community responsibility, and appreciation for both structure and creative expression.
attributes:
  skills: '[''Reading short stories fluently'', ''Counting to 20 and simple addition'', ''Following multi-step classroom routines'', ''Organizing craft supplies and toys'', ''Listening attentively in group
