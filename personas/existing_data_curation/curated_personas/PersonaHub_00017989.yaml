persona_description: A wildlife biologist who specializes in the study of tickborne diseases, particularly the risks they pose to livestock and the potential dangers they pose to humans. She works as a
  research assistant for the WCSU Tickborne Disease Prevention Laboratory and has collected the first Asian longhorned tick in Connecticut. She is knowledgeable about the biology and behavior of ticks,
  the risks they pose to humans and livestock, and the potential for them to carry deadly diseases. She is also familiar with the detection and identification of tick species in different states and the
  strategies used to prevent tick bites and reduce the risk of tickborne diseases.
