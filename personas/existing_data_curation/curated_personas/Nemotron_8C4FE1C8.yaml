  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting and calligraphy'', ''Cooking Southeast Asian cuisine'', ''Gardening (herbs and flowering plants)'', ''Volunteering at cultural
    festivals and community centers'', ''Reading contemporary fiction and business memoirs'', ''Traveling to heritage sites in Southeast Asia'', ''Practicing mindfulness meditation and gentle yoga'', ''Photography
    of local street scenes'', ''Collecting traditional Southeast Asian art prints'']'
  career_goals: Over the next several years Yoke intends to channel her business acumen into sustained community impact. She plans to serve on the board of a local Southeast Asian cultural center, mentor
    young immigrant entrepreneurs, and launch a boutique advisory practice that helps nonprofit arts organizations achieve financial sustainability. She also hopes to author a memoir that weaves together
    her professional insights and cultural heritage, providing guidance for seniors seeking purposeful engagement. Managing her own wellbeing is a priority, so she will incorporate mindfulness practices
    into her routine and advocate for senior mental‑health resources in her neighborhood.
