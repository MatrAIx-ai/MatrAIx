  hobbies: '[''Reading young adult fiction'', ''Sketching nature scenes'', ''Wildlife photography'', ''Gardening (herbs and vegetables)'', ''Journaling'', ''Knitting'', ''Puzzle video games'']'
  career_goals: Carly aims to complete her high school education by earning a GED and then enroll in a community college program focused on environmental science or veterinary technology. She hopes to secure
    a part‑time position at the local animal shelter to gain hands‑on experience, eventually working as a veterinary assistant or wildlife rehabilitator. In the longer term, she aspires to combine her love
    for nature and practical skills by managing a small sustainable farm or a community garden that supports local food education. Throughout her journey, she plans to continue developing her organizational
    habits and technical competencies to achieve these goals.
