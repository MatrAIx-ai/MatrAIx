personas:
  professional: Carly Mccarty, a high‑school senior pursuing a GED, volunteers at the local animal shelter, where their keen eye for wildlife photography, empathetic listening, and practical gardening skills
    enable them to support veterinary staff and mediate peer issues, and they find joy in learning animal care basics, laying the groundwork for a future as a veterinary assistant or wildlife rehabilitator.
  sports: Carly Mccarty embraces solitary fitness with early‑morning trail runs and a seasonal commitment to the Greenfield Rangers community soccer club, while cheering for the Seattle Mariners, the United
    States Women’s National Soccer Team, and their local high‑school basketball squad, and they blend personal endurance with team spirit.
  arts: Carly Mccarty spends evenings sketching Monet‑inspired landscapes, attends local author talks featuring John Green, curates playlists of Sufjan Stevens and Bon Iver while processing wildlife photos,
    and they occasionally binge‑watch indie films by Greta Gerwig, letting these artistic influences shape a reflective outlook.
  travel: Carly Mccarty has trekked the nearby state park’s meadow trails, visited a historic coastal lighthouse, and dreams of backpacking through the Canadian Rockies and photographing the rainforests
    of Costa Rica, and they prefer modest, self‑planned trips over large group tours.
  culinary: Carly Mccarty enjoys cooking simple dishes like rosemary‑roasted potatoes, basil‑infused tomato pasta, and carrot‑ginger soup using fresh herbs from their garden, while they also experiment
    with homemade lavender honey tea and occasionally over‑season meals when trying to impress friends.
  core: Carly Mccarty is a quiet, nature‑loving teen who balances a passion for sketching, gardening, and animal care with a tendency to overcommit to volunteer work and they often procrastinate on school
    assignments.
background:
  cultural: Carly was raised in Columbus, a small town in Dane County, Wisconsin, where the community is predominantly white with deep German and Irish roots. The region's agricultural heritage and close‑knit
    community values have shaped her appreciation for self‑reliance, modesty, and cooperation. Local traditions emphasize seasonal festivals, community potlucks, and church gatherings that foster a sense
    of belonging and mutual support. These cultural influences, combined with the Midwestern emphasis on practicality and humility, have contributed to Carly's balanced outlook and her preference for harmony
    in relationships.
attributes:
  skills: '[''Basic computer proficiency'', ''Research and information synthesis'', ''Nature photography'', ''Sketching and drawing'', ''Active listening'', ''Empathy and conflict mediation'', ''Simple
