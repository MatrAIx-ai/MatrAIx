persona_description: A Carnegie Mellon University researcher who studies the economic feasibility of using direct current circuits to power lights in commercial buildings, particularly in buildings using
  solar photovoltaics. They are interested in the cost savings and potential safety risks associated with DC distribution and have conducted research to explore the viability of using dedicated DC circuits
  to operate lighting in commercial buildings. They are also interested in the potential impact of using LEDs with solar PV power on the cost savings and are looking for ways to remove design, installation,
  permitting, and regulatory barriers to make a dedicated DC strategy worth considering.
