  skills: '[''Reading comprehension'', ''Sketching'', ''Basic Scratch programming'', ''Soccer teamwork'', ''Project planning'', ''Public speaking'']'
  hobbies: '[''Reading adventure and science books'', ''Drawing and painting'', ''Playing with LEGO and building models'', ''Soccer'', ''Attending drama club'', ''Exploring nature trails'', ''Journaling'']'
  career_goals: Barry dreams of one day designing interactive museum exhibits where art and science meet, allowing him to share his curiosity with others. He also envisions becoming a community youth leader
    who organizes school events and local fairs, blending his organizational strengths with his love for being in the spotlight. In the longer term, he imagines a career that lets him create visual stories—perhaps
    as a graphic designer or a museum curator—while still helping peers navigate stress and anxiety through mentorship programs.
