  career_goals: Tracy hopes to attend a university with a strong engineering program, ideally focusing on robotics or sustainable technology. She envisions herself designing innovative solutions that blend
    practicality with creativity. In the near term, she plans to earn a robotics competition award and secure a summer internship at a local tech company. Long-term, she aspires to lead a multidisciplinary
    engineering team and contribute to community projects that promote STEM education for younger students.
