personas:
  professional: Tracy Perez, a budding robotics enthusiast and forward on a co‑ed soccer team, merges their curiosity for new tech with a practical, organized approach to building LEGO robots while their
    competitive edge drives them to dominate debate club rounds and constantly refine their problem‑solving skills.
  sports: Tracy Perez, a forward on the Battle Creek United co‑ed soccer squad, thrills on the field while cheering for the Detroit Lions, spends Saturday mornings hiking the Riverfront Trail, and fuels
    fitness by training twice a week with the local youth sports club.
  arts: Tracy Perez immerses themselves in science‑fiction worlds by devouring books by Becky Chambers and N.K. Jemisin, enjoys pop hits from Olivia Rodrigo to indie rock by Tame Impala, and channels a
    love of storytelling by volunteering to read to kids at the Battle Creek Public Library, often dramatizing favorite novel scenes.
  travel: Tracy Perez prefers spur‑of‑the‑moment weekend road trips to the Great Lakes shoreline, has visited Chicago's Museum of Science and Industry, dreams of exploring Tokyo's Akihabara district for
    its anime culture, and aims to camp in Door County's Upper Peninsula next summer, balancing family budget constraints with a love for hands‑on adventure.
  culinary: Tracy Perez enjoys classic pepperoni pizza, Mexican tacos with fresh cilantro and lime, and occasional sushi rolls, typically opting for quick microwave meals but sometimes attempts homemade
    spaghetti carbonara using Parmesan, eggs, and pancetta, proudly boasting a perfect avocado toast skill.
  core: Tracy Perez is a fiercely competitive, curiosity‑driven 13‑year‑old who balances robotics tinkering, forward‑line soccer, and debate with a skeptical eye toward peer pressure, a knack for budgeting,
    and a habit of juggling homework with late‑night gaming.
background:
  cultural: Tracy comes from a multicultural white family that blends Russian and Hispanic roots. Her father’s family emigrated from Russia in the early 2000s, and her mother’s parents arrived from Mexico
    in the 1990s. At home, she occasionally hears Russian lullabies and Spanish phrases, and the family celebrates holidays such as Maslenitsa and Día de los Muertos alongside the standard American observances
    of Thanksgiving and Fourth of July. Growing up in Battle Creek, Michigan, she has been shaped by Midwestern community values—emphasis on education, sports, and neighborly support—while also appreciating
    the diverse cultural traditions that are part of her heritage.
