personas:
  professional: Lashunda Lee, a second‑grade classroom monitor, channels her love of routine and sociable energy into organizing recess games, leading the church children's choir during rehearsals, and
    keeping her desk area tidy, though they sometimes forget to hand in homework on time.
  sports: Lashunda Lee thrives on outdoor games like tag and hopscotch, plays forward for the Clarkton Youth Soccer Club during the spring season, roars in support of the St. Louis Cardinals at summer baseball
    games, and they keep a well‑worn pair of soccer cleats that often get left untied after an energetic practice.
  arts: Lashunda Lee spends afternoons drawing bright pictures of the family farm while humming Mahalia Jackson's Take My Hand, Precious Lord, delights in singing Oh Happy Day with the church children’s
    choir, and they can recite lines from the animated film The Princess and the Frog, showing how gospel music and colorful art shape her joyful self‑expression.
  travel: Lashunda Lee dreams of exploring the winding trails of the Ozark National Forest to collect wild berries, longs to hear live brass bands in New Orleans, and they prefer short drives to nearby
    county fairs where they can gather souvenir marbles, while their parents’ limited vacation budget means such adventures happen only once a year.
  culinary: Lashunda Lee loves the crisp bite of fried chicken, the buttery richness of collard greens seasoned with smoked ham hocks, and the warm sweetness of fresh‑baked cornbread, eagerly assists grandma
    in chopping garden tomatoes for salsa, and they enjoy baking cupcakes with a secret habit of adding too much sugar, which makes the frosting extra sticky.
  core: Lashunda Lee is a chatter‑filled, routine‑loving seven‑year‑old who leads playground games, sings gospel loudly, worries about marbles and allergies, and they rely on bright colors and familiar
    faces for comfort.
background:
  cultural: Lashunda is an African-American girl raised in Clarkton, a small town in the agricultural heart of Dunklin County, Missouri. Her family's life is rooted in a close-knit community where church,
    family gatherings, and local traditions play central roles. Weekly attendance at the Baptist church connects her to generations of Southern gospel music and community service, while family meals feature
    classic soul and Southern comfort foods such as fried chicken, collard greens, and cornbread. Stories of her ancestors' resilience in the Mississippi Delta region are shared around the dinner table,
    fostering a strong sense of pride and cultural identity. These influences shape her values of practicality, routine, and the importance of helping others.
attributes:
  skills: '["Reading", "Basic addition and subtraction", "Storytelling and imaginative play", "Singing in the children''s choir", "Assisting with simple kitchen tasks"]'
  hobbies: '["Playing organized games with friends", "Singing gospel songs in the church choir", "Drawing and coloring", "Reading picture books", "Helping in the garden with grandmother", "Collecting marbles
    and arranging them"]'
  career_goals: Although still in elementary school, Lashunda already dreams of a future where she can help others and stay connected to her community. She imagines becoming a teacher who creates a warm,
    routine-filled classroom for young learners, or a nurse who cares for families in her hometown. She is also fascinated by the farm animals that graze near her home and hopes to become a veterinarian
    so she can look after the cows, pigs, and chickens that are part of her community's daily life. Her ambitions reflect her desire for stability, practicality, and the chance to be a supportive presence
    for those around her.
