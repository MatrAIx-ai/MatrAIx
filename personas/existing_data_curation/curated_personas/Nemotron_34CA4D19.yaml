  skills: '[''Graphic Design'', ''UI/UX Design'', ''Adobe Creative Suite (Photoshop, Illustrator, InDesign)'', ''Figma'', ''Sketch'', ''AutoCAD'', ''3D Modeling (SolidWorks)'', ''Data Visualization (Tableau,
    D3.js)'', ''HTML/CSS'', ''JavaScript'', ''Python (basic scripting)'', ''Agile Project Management (Scrum)'', ''Process Optimization'', ''Technical Documentation'', ''User Research & Usability Testing'']'
  hobbies: '[''Gardening'', ''Reading (design, history, science)'', ''Birdwatching'', ''Hiking Chesapeake Bay trails'', ''Landscape and architectural photography'', ''Cooking (Southern and Lowcountry dishes)'',
    ''Knitting'', ''STEM mentorship volunteering'', ''Small book club'', ''Visiting local art galleries'']'
  career_goals: Her immediate ambition is to become a senior design lead or creative director within a firm that values inclusive, evidence‑based design practices. She wants to mentor junior designers,
    especially those from underrepresented backgrounds, and embed accessibility standards into every product lifecycle. In the longer term, Nichole envisions launching her own design consultancy that helps
    small businesses and community organizations on the Eastern Shore adopt sustainable, user‑centered design solutions while maintaining a balanced schedule that supports her family commitments.
