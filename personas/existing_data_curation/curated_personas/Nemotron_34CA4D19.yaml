personas:
  professional: Nichole Wilson, a senior UI/UX designer with fifteen years of experience, leverages her systematic, data‑driven mindset to fuse graphic design, 3D modeling, and front‑end development, guiding
    cross‑functional teams toward inclusive, evidence‑based solutions while mentoring underrepresented junior designers.
  sports: Nichole Wilson enjoys low‑impact fitness, regularly jogging the Shenandoah Trail, participating in a local adult cycling club that rides the Chesapeake shoreline, cheering for the Baltimore Ravens
    and Washington Capitals, and keeping a modest collection of yoga mats for weekend flexibility sessions.
  arts: Nichole Wilson cultivates her artistic side by attending design exhibitions at the Baltimore Museum of Art, studying the work of modernist designer Dieter Rams, listening to Brian Eno's ambient
    albums while sketching, joining a book club that discusses Margaret Atwood and Steven Johnson, and supporting local theater productions such as the Chesapeake Shakespeare Company.
  travel: Nichole Wilson's travel style blends careful itinerary planning with a love for historic coastal towns; she has explored St. Michaels, Maryland, savored the architecture of Annapolis, and dreams
    of visiting Bruges, Belgium, to study medieval city layouts, always booking boutique B&Bs and mapping pedestrian routes in advance, though family commitments sometimes limit longer vacations.
  culinary: Nichole Wilson's kitchen is a laboratory where she refines Southern classics like shrimp and grits, collard greens, and buttermilk biscuits by measuring spices to the gram, incorporating garden‑grown
    heirloom tomatoes and fresh basil into sauces, and experimenting with a citrus‑caper beurre blanc for pan‑seared catfish, all while keeping a detailed flavor‑balance log.
  core: Nichole Wilson is a methodical senior designer who balances precise planning with quiet passions for gardening, historic photography, and inclusive mentorship, all while battling a habit of over‑budgeting
    and occasional dental neglect.
background:
  cultural: Born and raised in Baltimore, Maryland, Nichole grew up in an African American household that valued education, community service, and cultural heritage. Her parents, both teachers, encouraged
    a strong work ethic and a deep appreciation for African‑American history, which she further explored through participation in church youth groups and community cultural events. After completing her
    STEM degree, she relocated to Easton on the Eastern Shore, where she integrated into the local Black community, celebrating Juneteenth, supporting the Talbot County African American Heritage Society,
    and drawing inspiration from the region’s historic narratives of resilience. This blend of urban Baltimore roots and the slower‑pace, close‑knit life of the Eastern Shore shapes her worldview, informing
    her collaborative, harmony‑focused approach and subtly influencing the color palettes and storytelling elements she incorporates into her design work.
