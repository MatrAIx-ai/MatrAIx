  hobbies: '[''mixed‑media painting'', ''digital illustration'', ''contemporary art gallery visits'', ''reading speculative fiction and philosophy'', ''kayaking on the St. Johns River'', ''indie‑film screenings'',
    ''experimental cooking'', ''puzzle games (Sudoku, escape rooms)'', ''attending live music shows'']'
  career_goals: Cynthia aims to move beyond traditional financial management into a role where she can shape the organization’s strategic direction. In the next five years she plans to become a Finance
    Director or Vice President of Finance, leading a team that integrates innovative financial products, ESG investment analysis, and digital transformation initiatives. She is driven to champion creative
    problem‑solving in finance, launch a corporate sustainability reporting framework, and eventually position herself as a CFO who balances fiscal responsibility with imaginative growth strategies.
