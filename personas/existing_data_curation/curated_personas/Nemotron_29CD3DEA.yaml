personas:
  professional: Cynthia Bogert is a 25‑year‑old finance analyst who blends a deep mastery of financial statement analysis, advanced Excel modeling, and Tableau data visualization with a design‑thinking
    flair, turning board‑level reports into vivid narratives that inspire strategic decision‑making while she casually sketches ideas on the margins of her spreadsheets.
  sports: Cynthia Bogert embraces active weekends on the St. Johns River, kayaking at sunrise and occasionally joining a local paddle‑boarding club, while cheering for the Miami Heat and the Florida Gators,
    and practicing yoga when her schedule allows.
  arts: Cynthia Bogert immerses herself in the contemporary art scene, frequenting galleries that showcase works by Yayoi Kusama and emerging Floridian street artists, devouring speculative fiction by Neal
    Stephenson and Margaret Atwood, and attending indie‑film screenings featuring directors like David Lowery.
  travel: Cynthia Bogert prefers short, spontaneous escapes, having explored the Florida Keys, a weekend art‑focused trip to New York City, and dreaming of a culturally rich pilgrimage to Kyoto, where she
    hopes to blend her love of tradition and modern design.
  culinary: Cynthia Bogert’s kitchen experiments fuse Mediterranean and Asian flavors, from saffron‑infused paella to miso‑marinated salmon, and she loves tossing fresh basil, lemongrass, and chilies into
    quick stir‑fry dishes, though she sometimes burns the sauce while sketching new recipe ideas.
  core: Cynthia Bogert is a financially savvy dreamer who swaps spreadsheets for sketchpads, paddles through river currents, and cooks daring dishes, all while battling a habit of leaving unfinished tasks
    scattered across her digital and physical worlds.
background:
  cultural: Cynthia grew up in a middle‑class, white American family with deep roots in the Midwest before relocating to Florida for college. Living in Saint Johns County, she blends the laid‑back, coastal
    lifestyle of the Gulf Coast with a subtle appreciation for the region’s Southern hospitality and the diverse cultural tapestry of nearby Jacksonville. Her upbringing emphasized hard work and community
    involvement, while her adult life is shaped by exposure to the vibrant arts scene, multicultural food culture, and a growing emphasis on sustainable, socially‑conscious business practices.
attributes:
  skills: '[''financial statement analysis'', ''budgeting and forecasting'', ''strategic financial planning'', ''advanced Excel modeling'', ''data visualization (Tableau)'', ''ERP systems (NetSuite)'',
