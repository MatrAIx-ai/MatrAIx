personas:
  professional: Evan Solomon, a 28-year-old restaurant supervisor in Kansas City, blends meticulous inventory control and data-driven cost analysis with a curiosity for food-tech, using their disciplined,
    organized nature to lead a tight-knit team while assertively championing process-optimisation initiatives that echo the region's community-focused hospitality ethos.
  sports: Evan Solomon, an avid pickup basketball player at the local YMCA and a regular runner on the Missouri River Trail, roots for the Kansas City Chiefs, cheers for the Kansas City Royals, and belongs
    to a weekend adult basketball league that meets at the Riverfront Arena.
  arts: Evan Solomon finds artistic inspiration in the Kansas City jazz scene, regularly listens to Snarky Puppy and John Prine while prep-cooking, attends the Kansas City Symphony's performances, and enjoys
    watching culinary documentaries hosted by chefs like David Chang and Massimo Bottura.
  travel: Evan Solomon prefers weekend road trips to the Ozarks and occasional flights to Portland's food-truck festivals, balances the desire for culinary adventure with a modest travel budget, and they
    dream of a future culinary tour of Italy's Emilia-Romagna region to study regional charcuterie.
  culinary: Evan Solomon, an adventurous home cook, experiments with sous-vide pork shoulder, ferments kimchi and kombucha, favors Kansas City burnt brisket with a sweet-spicy rub, and routinely stocks
    dry-aged pork, smoked paprika, and locally sourced heirloom tomatoes for their seasonal menu creations.
  core: Evan Solomon, a 28-year-old Midwestern kitchen manager, merges data-driven discipline with culinary curiosity, budgets gadgets while saving for the future, jogs river trails, and dreams of opening
    a sustainable café that serves tech-savvy comfort food.
background:
  cultural: Evan identifies with a Midwestern American cultural background, shaped by the community‑oriented values of Kansas City, Missouri. His family heritage is European‑American, and his upbringing
    emphasized hard work, modesty, and a love for regional foods such as Kansas City barbecue and farm‑to‑table cuisine. He participates in local traditions, celebrates national holidays, and values the
    hospitality ethic common to the Midwest, which informs both his professional approach and personal interests.
attributes:
  skills: '[''Team leadership'', ''Staff scheduling'', ''Inventory control'', ''Cost analysis'', ''Food safety compliance'', ''Menu planning'', ''Basic culinary techniques'', ''Process optimization'', ''POS
    and kitchen management software'', ''Conflict resolution'', ''Data‑driven decision making'', ''Customer service'']'
  hobbies: '[''Experimenting with new recipes'', ''Sous‑vide cooking'', ''Fermentation'', ''Visiting farmers’ markets'', ''Attending food festivals'', ''Pickup basketball'', ''Running on river trails'',
    ''Reading management and culinary books'', ''Home coffee brewing'', ''Following food‑tech podcasts'']'
  career_goals: Evan aims to advance from his current first‑line supervisory role to restaurant manager within the next two years, eventually positioning himself for an operations manager role at a regional
    or national food‑service chain. He plans to complete his associate degree in hospitality management and obtain a Certified Food Safety Manager credential. In the longer term, he hopes to open his own
    concept café that blends Midwestern comfort food with seasonal, locally sourced ingredients, and to be recognized for implementing sustainable kitchen practices and high‑efficiency workflows.
