personas:
  professional: A budding digital artist and hobbyist coder named Jose Menietti blends sketching with Arduino projects, channeling their curiosity into small indie game prototypes while often procrastinating
    on school assignments.
  sports: An outdoor-enthusiast teen named Jose Menietti favors solo hikes along the Missouri River Trail and occasionally runs with the O'Fallon Middle School cross-country team, while cheering for the
    St. Louis Cardinals and St. Louis Blues from home.
  arts: A creative soul named Jose Menietti immerses themselves in ambient music by Brian Eno, Tycho, and Max Richter, studies digital illustration inspired by Loish and Studio Ghibli, and regularly attends
    Saturday workshops at the St. Charles County Arts Center.
  travel: A spontaneous road-trip lover named Jose Menietti enjoys quiet getaways to the Katy Trail State Park and weekend visits to Kansas City's jazz clubs, while dreaming of a future backpacking adventure
    through the Pacific Northwest's rainforests.
  culinary: A budding home-chef named Jose Menietti favors simple comfort foods like grilled cheese with caramelized onions and homemade pizza topped with fresh basil and mozzarella, occasionally experimenting
    with Thai green curry using coconut milk and lime leaves.
  core: Jose Menietti is a quiet, curiosity-driven teen who merges art, tech, and nature, often losing track of deadlines while seeking solitary creative escapes.
background:
  cultural: Jose comes from a white, middle‑class Midwestern family in O'Fallon, Missouri. His upbringing reflects typical suburban values of modesty, respect for community, and participation in local traditions
    such as Fourth of July fireworks, Thanksgiving gatherings, and small‑town fairs. His family emphasizes a blend of classic American customs with an openness to new cultural experiences, encouraging curiosity
    about art, music, and technology. While predominantly American in cultural identity, Jose’s exposure to the diverse artistic community of nearby St. Charles County adds a subtle appreciation for broader
    cultural expressions.
