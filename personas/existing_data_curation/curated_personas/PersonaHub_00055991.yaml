persona_description: A healthcare professional who specializes in the diagnosis and treatment of eye diseases, particularly conjunctivitis. They have experience in providing skilled and compassionate care,
  and are dedicated to providing the highest quality of eye care services. They are knowledgeable about the causes, symptoms, and treatment of conjunctivitis, and are aware of the importance of proper hygiene
  and hygiene practices. They are aware of the contagious nature of conjunctivitis and the risks of spreading the germs. They are also aware of the potential for more severe symptoms and the need for prompt
  care in cases of moderate to severe pain, significant eye redness, light sensitivity, blurred vision, a pre-existing eye condition, worsening symptoms despite antibiotic treatment, or being immune-compromised.
