  hobbies: '[''Zumba classes'', ''Hiking in the Sandhills'', ''Church outreach volunteering'', ''Cooking Southern cuisine'', ''Neighborhood potlucks'', ''Attending local art fairs'', ''Antique shop hunting'',
    ''Monthly book club'']'
  career_goals: Tina aims to obtain her South Carolina real‑estate broker license within the next year and transition from a solo sales agent to the founder of a boutique brokerage serving Sumter County
    and surrounding areas. She plans to consistently rank in the top 5% of agents by annual sales volume, build a small, high‑performing team of agents she mentors, and become a recognized community expert
    on residential property trends. Long‑term, she hopes to expand into commercial real‑estate advisory services and serve on the local chamber of commerce board to influence economic development.
