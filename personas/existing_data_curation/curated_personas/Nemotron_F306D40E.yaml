personas:
  professional: Tina Merchant is a data‑driven real‑estate sales agent who leverages meticulous market analysis, strategic negotiation, and savvy social‑media marketing while their organized, reliable nature
    and Southern‑inspired hospitality build trust that consistently earns repeat referrals.
  sports: Tina Merchant is a devoted fan of the Carolina Panthers and the Charlotte Hornets, enjoys weekly Zumba classes, and tackles the Sandhills trails on weekend hikes, often cheering on local high‑school
    soccer matches while keeping fit through community fitness challenges.
  arts: Tina Merchant regularly visits local art fairs and the South Carolina State Museum, admires the folk paintings of John Callan, curates a personal playlist featuring Rhiannon Giddens and The Avett
    Brothers, and leads a monthly book club that explores contemporary fiction by authors like Celeste Ng and Sally Rooney.
  travel: Tina Merchant prefers curated road trips to historic Southern towns, has explored Savannah, Georgia, and Asheville, North Carolina, loves the coastal charm of Charleston, and dreams of a spring
    getaway along the Blue Ridge Parkway and a music‑filled weekend in New Orleans.
  culinary: Tina Merchant revels in perfecting buttery buttermilk biscuits, peach cobbler made with fresh Georgia peaches, and slow‑smoked Carolina pulled pork, often seasoning with smoked paprika and honey
    butter, and enjoys sourcing local collard greens and sweet tea from nearby farms.
  core: Tina Merchant fuses Southern hospitality with entrepreneurial drive, balancing a burgeoning real‑estate career, community volunteerism, and a passion for cooking, while occasionally over‑booking
    their calendar and forgetting to pause.
background:
  cultural: Tina was raised in a tight‑knit white Southern family in Sumter, South Carolina, where Southern hospitality and community involvement are core values. She grew up attending church gatherings,
    community festivals like the Sumter Street Fair, and family reunions that emphasized politeness, respect, and a love for traditional Southern food. Although she attended a community college in nearby
    Columbia for business courses, she stayed rooted in her hometown, absorbing the region’s history, accent, and reverence for local traditions while also embracing a modern, forward‑thinking outlook.
attributes:
  skills: '[''Residential market analysis'', ''Property valuation'', ''Negotiation'', ''Contract drafting and compliance'', ''Client relationship management'', ''CRM and MLS proficiency'', ''Social media
