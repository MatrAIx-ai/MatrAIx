personas:
  professional: Priscilla Craven is a 23‑year‑old entrepreneur who runs a small‑town eco‑focused retail shop, blending strategic curiosity with hands‑on practicality to quickly pivot business models, negotiate
    supplier deals, and embed community trust into their growth plans.
  sports: Priscilla Craven stays active by joining the local hiking club for weekend treks, playing in an adult co‑ed softball league each spring, and cheering for the St. Louis Cardinals and Portland Timbers,
    though their flexible schedule sometimes leads to missed workouts.
  arts: Priscilla Craven turns to the acoustic folk of Sufjan Stevens, the witty storytelling of John Mulaney podcasts, the impressionist brushstrokes of Claude Monet, and the sharp humor of the TV series
    'Fleabag' while also hosting board‑game and craft nights that become their creative sanctuary.
  travel: Priscilla Craven prefers low‑key, nature‑focused getaways, planning spontaneous weekend drives to Shenandoah National Park and deliberate summer pilgrimages to Asheville’s Blue Ridge Mountains,
    while occasionally splurging on an eco‑lodge stay in Costa Rica when their business cash flow allows.
  culinary: Priscilla Craven enjoys the simplicity of seasonal cooking, frequently preparing roasted root‑vegetable medleys, quinoa salads tossed with kale and citrus vinaigrette, and hearty lentil soups
    seasoned with rosemary and cumin, all while proudly nurturing a sourdough starter and experimenting with heirloom tomatoes from their garden.
  core: Priscilla Craven is a restless yet grounded 23‑year‑old dreamer who channels their anxiety into early‑morning forest walks, spontaneous garden‑themed purchases, and a relentless quest to build a
    sustainable business while juggling disorganized spreadsheets.
background:
  cultural: Priscilla grew up in Noel, a small town in McDonald County, Missouri, within a white, Midwestern family with deep roots in the region—her ancestry includes German and Irish lineages. The community’s
    values of self-reliance, modesty, and neighborly cooperation shaped her worldview. A modest, largely Protestant upbringing emphasized hard work, humility, and service to others, while the local county
    fairs, high-school sports, and church gatherings reinforced a sense of belonging. Though her environment has been largely homogenous, her curiosity pushes her to explore ideas beyond her hometown, blending
    traditional Midwestern pragmatism with a willingness to adopt new, often urban or digital, concepts.
attributes:
