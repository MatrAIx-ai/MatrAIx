  hobbies: '[''Nature Walks'', ''Reading'', ''Journaling'', ''Cooking'', ''Gardening'', ''Podcast Listening'', ''DIY Home Improvement'', ''Board Games with Small Group'', ''Photography'', ''Mindfulness
    Meditation'']'
  career_goals: Priscilla aims to transform her small-town enterprise into a sustainable, growth-oriented business that serves both the local community and a wider online market. In the next three to five
    years she plans to formalize operational processes, implement structured financial controls, and hire a capable operations manager to reduce her day-to-day disorganization. She also hopes to enroll
    in a part-time business management program to gain a formal credential and deepen her strategic expertise. Ultimately, she envisions expanding the product line, opening a second location in a neighboring
    county, and using the business’s success to fund community projects that support local youth entrepreneurship.
