  hobbies: '[''Basketball'', ''Video gaming (FPS, RPGs, strategy)'', ''Music production (beat‑making)'', ''Hip‑hop and gospel listening'', ''Skateboarding'', ''Reading sci‑fi graphic novels'', ''Coding
    with Scratch'', ''Community volunteering at church'', ''DIY projects'', ''Cooking with family'']'
  career_goals: Stefon aims to complete his education by earning a GED or finishing high school through a flexible program, then pursue a career that lets him blend creativity with technical problem‑solving.
    He dreams of becoming a video game developer or a freelance digital content creator, where he can design games, produce music, and edit videos on his own schedule. Alternatively, he is open to learning
    a trade such as automotive or electronics repair, valuing the hands‑on nature and immediate applicability of the work. He also hopes to give back to his community by mentoring younger kids in coding,
    music, or sports, using his calm resilience and cooperative spirit to inspire others.
