  hobbies: '[''Gardening'', ''Historical preservation volunteering'', ''Quilt making'', ''Book club'', ''Nature walks/hiking'', ''Watercolor painting'', ''Woodworking'', ''Church outreach'', ''Teaching
    DIY home-maintenance'']'
  career_goals: Dora aims to expand her reputation as a trusted painter and paper‑hanger by securing more high‑profile renovation projects, especially in historic homes, and by obtaining advanced certifications
    in eco‑friendly finishes. She plans to formalize her business, hire a small team, and offer workshops for DIY enthusiasts in her community. While she envisions a gradual transition toward semi‑retirement,
    she wants to remain active through selective consulting projects, mentoring younger workers, and contributing to community art programs, ensuring her legacy of quality workmanship and collaborative
    spirit endures.
