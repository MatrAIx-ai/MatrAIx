personas:
  professional: Dora Caron, an expert residential painter and paper‑hanger with three decades of meticulous surface preparation, precision trim work, and historic colour‑matching expertise, leverages her
    organizational talent and eco‑friendly finish certifications to win high‑profile renovation contracts for historic homes while mentoring apprentices and hosting community DIY workshops.
  sports: Dora Caron participates in the local senior walking club for year‑round nature hikes, joins the community’s spring softball league, and avidly follows the Indiana Pacers basketball team and the
    Indianapolis Colts football team, often attending games with her quilting circle friends.
  arts: Dora Caron expresses her creativity through watercolor paintings inspired by Claude Monet and Georgia O'Keeffe, crafts hand‑stitched quilts after learning techniques from quilter Annie S. Oliver,
    and builds wooden picture frames in her workshop, frequently visiting the Indianapolis Museum of Art for exhibitions by contemporary American painters.
  travel: Dora Caron prefers road‑trip itineraries that combine historic preservation tours with natural scenery, such as weekend stays in Brown County, Indiana, a fall foliage drive through Asheville,
    North Carolina, and a planned spring visit to the Gardens of Versailles in France, balancing her love for relaxed family time with a thirst for cultural discovery.
  culinary: Dora Caron delights in cooking farm‑to‑table meals featuring heirloom tomatoes, roasted carrots, and fresh corn succotash seasoned with thyme, rosemary, and sage, boasting moderate cooking skills
    that let her whip up hearty vegetable stews and occasionally experiment with sourdough bread from her own starter.
  core: Dora Caron blends meticulous craftsmanship with community spirit, juggling a thriving paint business, garden oasis, and endless volunteer projects while never missing a weekly quilting circle.
background:
  cultural: Dora grew up in a traditional Midwestern white family with German‑Irish ancestry. Raised in small‑town Indiana, she was immersed in a community that values hard work, self‑reliance, and neighborly
    cooperation. Her upbringing emphasized practical skills, faith‑based service, and participation in local traditions such as county fairs and church gatherings. These cultural influences shaped her pragmatic
    outlook, strong sense of community, and commitment to preserving the region’s heritage through both her craft and volunteer activities.
attributes:
  skills: '[''Residential interior painting'', ''Exterior painting'', ''Paper hanging'', ''Surface preparation'', ''Color consulting'', ''Project scheduling'', ''Budget management'', ''Safety compliance
