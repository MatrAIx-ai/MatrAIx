personas:
  professional: Jesus Villavicencio is a budding cartoonist and LEGO architect, whose disciplined organization and boundless curiosity produce meticulously detailed sketches and intricate builds, while
    their sociable energy makes them a natural collaborator in school art clubs and community projects.
  sports: Jesus Villavicencio thrives on the soccer field at Mission United Youth Soccer Club, where their energetic, organized play style earns them a midfield spot, while they cheer for the Dallas Cowboys
    during football season and spend weekends biking around Mission Springs Park to stay active.
  arts: Jesus Villavicencio creates colorful cartoons and folk‑inspired paintings that echo the bold patterns of Diego Rivera and the playful imagination of Studio Ghibli’s Hayao Miyazaki, routinely sharing
    their artwork in school art shows and proudly displaying sticker collections on their bedroom wall.
  travel: Jesus Villavicencio prefers family road trips that blend nature hikes in Big Bend National Park with cultural stops at San Antonio’s historic missions, and dreams of exploring Disney World in
    Florida and the vibrant streets of New Orleans, balancing excitement with their parents’ budget and school schedule.
  culinary: Jesus Villavicencio delights in the taste of soft corn tacos with seasoned carne asada, sweet tamales de elote, and warm atole made with cinnamon and vanilla, often helping to assemble tacos
    in the kitchen and eagerly swapping recipes for guacamole with friends during playdates.
  core: Jesus Villavicencio blends meticulous organization with a lively curiosity, turning every doodle into a colorful story, hoarding stickers with obsessive precision, yet occasionally losing track
    of time while daydreaming about soccer goals.
background:
  cultural: Jesus grows up in a Mexican‑American household in Mission, Texas, where Spanish and English are spoken interchangeably at home and in the community. He participates in cultural celebrations
    such as Día de los Muertos, Cinco de Mayo, and family gatherings featuring traditional foods like tacos, tamales, and atole. Mexican folk art, vibrant colors, and rhythmic music are part of his daily
    life, influencing his artistic interests. The close‑knit Hispanic community and strong family ties foster values of respect, generosity, and community involvement, which shape his outgoing personality
    and collaborative spirit.
