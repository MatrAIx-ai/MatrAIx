  career_goals: Jesus dreams of becoming a scientist or astronaut who explores space and discovers new worlds, inspired by his curiosity and love for learning. He also imagines creating beautiful murals
    that tell stories of his community, merging his artistic passion with cultural pride. In the near term, he aims to excel in school, win his class's science fair, become a captain of his soccer team,
    and continue developing his drawing skills to share them with friends and family.
