persona_description: A pediatrician who specializes in treating respiratory tract infections in children, particularly in the areas of ear infections, sinus infections, and strep throat. They are dedicated
  to using stringent diagnostic criteria to distinguish between viral and bacterial infections and to educate parents and caregivers on the tools they have to ensure the games their children play are age
  appropriate. They are also interested in research on the use of a placental protein test to predict the development of preeclampsia and in the use of allergy shots during pregnancy to decrease the baby's
  chances of developing allergies.
