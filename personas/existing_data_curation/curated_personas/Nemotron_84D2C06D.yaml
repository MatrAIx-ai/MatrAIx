personas:
  professional: Deneice Simmons, a 12-year-old budding visual storyteller, blends vivid character sketches with Scratch animations for school projects, channeling boundless imagination into organized storyboards
    while they reliably meet deadlines for the literary magazine.
  sports: Deneice Simmons enjoys solo explorations of Gulf Coast nature trails, participates in the junior beachcombing club, supports the New Orleans Pelicans during free-to-air games, and they occasionally
    swim in school-organized meets to build confidence and stay active.
  arts: Deneice Simmons devotes free time to drawing original characters inspired by graphic novels like 'Amulet' and fantasy series such as 'Harry Potter', strums the ukulele to mellow tunes by Jack Johnson,
    and they join an after-school art club where they experiment with stop-motion animations using Scratch.
  travel: Deneice Simmons favors low-key family trips - spending summers collecting shells on Gulf Shores, planning weekend hikes in nearby wildlife preserves, and they dream of a future visit to New Orleans
    to explore its vibrant street-art scene.
  culinary: Deneice Simmons loves simple comfort foods like shrimp po' boys and creamy mac and cheese, enjoys making citrus-infused fruit smoothies with fresh oranges from the local farmers market, and
    they often experiment with coconut-lime rice under parental supervision.
  core: Deneice Simmons is a quietly curious 12-year-old who mixes imaginative art with disciplined practice, saves meticulously for creative tools, and they balance solitary hobbies with small-group collaborations.
background:
  cultural: Deneice was raised in a middle‑class suburban neighborhood in Alvin, Texas, where Southern hospitality, community churches, and Gulf Coast traditions shape everyday life. Her family celebrates
    typical American holidays and enjoys regional dishes such as Tex‑Mex tacos and seafood from nearby Galveston. Frequent visits to local parks, beaches, and wildlife preserves have fostered her love for
    nature. The school’s emphasis on arts and the town’s small‑town sense of community encourage her collaborative yet introspective personality.
attributes:
  skills: '[''sketching'', ''watercolor painting'', ''creative writing'', ''basic Scratch programming'', ''project planning'', ''puzzle solving'', ''reading comprehension'']'
  hobbies: '[''sketching'', ''digital animation in Scratch'', ''creative writing'', ''reading fantasy and graphic novels'', ''nature walks and shell collecting'', ''jigsaw puzzles'', ''playing ukulele'',
    ''library volunteer work'']'
  career_goals: She hopes to attend a specialized arts high school where she can study graphic design and illustration, aiming eventually to become a concept artist for video games or an author‑illustrator
    of children’s books. Deneice also dreams of combining her creative talents with a passion for environmental stewardship, perhaps by producing artwork that raises awareness about coastal ecosystems.
    She aspires to continue honing her storytelling and technical skills to turn her imaginative ideas into professional projects.
