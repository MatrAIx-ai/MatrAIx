personas:
  professional: Terry Morales, a retired systems engineer turned community mentor, applies his data‑driven analysis, meticulous technical writing, and systematic problem‑solving to leading local STEM workshops,
    while they blend structured planning with occasional spontaneous tinkering to keep projects disciplined yet creatively adaptable, and their cooperative nature ensures every volunteer feels valued.
  sports: Terry Morales keeps fit by walking the river trail three times weekly, casts a line at the Chesapeake Bay Anglers Club during spring and fall, and closely follows the Baltimore Orioles and Maryland
    Terrapins, cheering them from the comfort of his garden while occasionally joining a senior bridge‑and‑bowling league for light cardio.
  arts: Terry Morales finds artistic solace in constructing detailed model ships while listening to the folk ballads of Bob Dylan and the maritime narratives of The Decemberists, enjoys historical novels
    by Bernard Cornwell, and regularly attends local performances of the Chesapeake Playhouse featuring classics performed by actors like Kevin Kline, all of which enrich his appreciation for storytelling
    and craft.
  travel: Terry Morales prefers spontaneous, short‑duration road trips to nearby historic towns such as St. Michael's, Maryland, Williamsburg, Virginia, and Cape May, New Jersey, often mapping routes the
    night before while balancing a modest travel budget and family obligations, and they delight in exploring colonial architecture, local museums, and seaside cafés before returning home for a weekend
    of gardening.
  culinary: Terry Morales enjoys cooking fresh Chesapeake Bay crab cakes with Old Bay seasoning, simmering homemade corn chowder using garden‑grown sweet corn and heirloom tomatoes, and roasting vegetables
    like zucchini and bell peppers tossed in rosemary and thyme, displaying a competent home‑cook skill set that balances simple, hearty meals with occasional indulgence in a well‑aged Merlot at the local
    tavern.
  core: Terry Morales blends a disciplined engineer’s mind with a whimsical hobbyist’s heart, often bursting into spontaneous model‑ship building sessions mid‑garden while habitually misplacing their glasses
    in the same garden pot they just tended.
background:
  cultural: Terry was raised in a multi‑generational, middle‑class family on Maryland’s Eastern Shore, with English and Irish ancestry. His upbringing was shaped by the agricultural landscape, the rhythms
    of the Chesapeake Bay, and a close‑knit community that valued hard work, modesty, and mutual aid. He attended local public schools, participated in church activities, and learned early the importance
    of civic engagement, a legacy that informs his present dedication to community service, environmental stewardship, and respect for local traditions.
