personas:
  professional: Lincoln Diggs is a veteran USPS high-speed mail-sorting technician who blends meticulous machine maintenance with a knack for process-improvement, training new staff while dreaming of a
    supervisory role that will let them embed creative community projects into the postal workflow.
  sports: Lincoln Diggs ardently follows the Dallas Cowboys and Dallas Mavericks, plays weekly pick-up basketball at a community center, and participates in a local senior softball league that keeps their
    competitive spirit alive each spring.
  arts: Lincoln Diggs pours evenings into a neighborhood jazz combo, channeling the improvisational spirit of Miles Davis on saxophone, while their abstract canvases echo the bold colors of Jean-Michel
    Basquiat, and they regularly share the stage at poetry slams featuring works by Maya Angelou and local spoken‑word artists.
  travel: Lincoln Diggs plans travel with a balance of careful budgeting and spontaneous detours, having road‑tripped to New Orleans for jazz, explored the artsy streets of Santa Fe, and dreaming of wandering
    Kyoto’s tea houses once retirement frees more time.
  culinary: Lincoln Diggs whips up slow‑cooked brisket seasoned with smoked paprika and garlic, braised collard greens with a splash of apple cider vinegar, and often experiments with sweet‑potato mash
    and hot‑pepper sauce, showcasing a solid home‑cook skill set that satisfies friends and family alike.
  core: Lincoln Diggs blends a meticulous postal career with a boisterous love for jazz, abstract art, and community mentoring, yet often finds themselves humming sax solos while sorting mail and occasionally
    hoarding vintage stamps to the point of clutter.
background:
  cultural: Lincoln is a third‑generation African American rooted in the Fort Worth community. His family’s history traces back to the Great Migration, bringing Southern traditions and a deep connection
    to church life that continue to shape his values. He embraces the rich tapestry of Black culture in Texas—blues, jazz, and soulful cuisine—while actively participating in local festivals celebrating
    African American heritage. His upbringing in Tarrant County has fostered a strong sense of community service and pride in the historical contributions of Black Texans, influencing both his personal
    and professional life.
attributes:
