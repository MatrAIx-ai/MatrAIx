  hobbies: '[''playing saxophone'', ''abstract painting'', ''attending poetry slams'', ''science‑fiction reading'', ''cooking soul food'', ''gardening'', ''volunteering at African American Cultural Center'',
    ''mentoring youth'', ''church choir participation'']'
  career_goals: Lincoln aims to advance to a supervisory or branch‑manager role within the postal service, where he can lead a team, shape operational policies, and champion continuous‑improvement projects.
    He is also pursuing a certification in supply‑chain management to broaden his expertise and eventually transition into a logistics coordinator position for a regional distribution hub. Additionally,
    he hopes to leverage his artistic talents and community connections to launch a local youth arts outreach program sponsored by the post office, merging his love for creativity with his commitment to
    community harmony.
