persona_description: A researcher and practitioner in the field of professional learning communities (PLCs), particularly focused on the implementation and impact of PLCs on teaching practice and student
  learning. They have a strong interest in sharing best practices and case studies of PLCs in action, and are interested in the potential pitfalls or issues that may arise in implementing PLCs. They are
  also interested in the dimensions of PLCs and how they respond to critical issues in schools, and are looking for a comprehensive description of PLCs and how they work. They are also interested in the
  potential for PLCs to support educational leaders in tackling the important mandates of accountability and school improvement, and are looking for books that provide a comprehensive description of PLCs
  and how they work. They are also interested in the potential for PLCs to respond to critical issues in schools and support educational leaders in tackling the important mandates of accountability and
  school improvement, and are looking for books that provide a comprehensive description of PLCs and how they work.
