  career_goals: Ellis aspires to become a visual storyteller who amplifies Black narratives through multimedia art. He aims to enroll in a high school with a strong arts curriculum, followed by a BFA in
    Animation or Graphic Design at a university that offers robust mentorship for minority artists. His long‑term ambition is to produce a webcomic and a series of animated short films that explore the
    African American experience, eventually leading a creative team at a studio or nonprofit focused on culturally resonant content. He also hopes to secure scholarships and internships with local arts
    organizations in Wilmington to gain professional experience and give back to his community.
