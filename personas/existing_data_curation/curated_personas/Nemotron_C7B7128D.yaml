personas:
  professional: Ellis Halloway, an aspiring digital concept artist, blends speculative sci‑fi themes with motifs drawn from family storytelling and church choir rhythms, leveraging meticulous digital sketching
    skills and a disciplined yet adaptable workflow to meet school art project deadlines while confidently presenting bold ideas in their youth arts program.
  sports: Ellis Halloway, a member of the Wilmington Youth Basketball Association, enjoys small‑group pickup games after school, idolizes the Philadelphia 76ers for their teamwork, and follows the Philadelphia
    Eagles’ season while maintaining a modest fitness routine that blends basketball drills with weekend jogs through Riverfront Park.
  arts: Ellis Halloway, a diligent participant in the local youth arts program, draws creative inspiration from Miles Davis’s improvisational trumpet, Kendrick Lamar’s lyrical storytelling, and the cinematography
    of Ava DuVernay, channeling these influences into speculative digital murals that weave together futuristic cityscapes with the rhythmic cadence of gospel choir harmonies heard in church rehearsals.
  travel: Ellis Halloway, who prefers meticulously planned weekend getaways, has explored the historic museums of Washington, D.C., savored the jazz scene in New Orleans, and dreams of a summer study tour
    to Tokyo’s Akihabara district, balancing modest family budget constraints with a thirst for cultural immersion.
  culinary: Ellis Halloway, an enthusiastic home chef, frequently experiments with collard greens seasoned with smoked paprika, sweet potato pie topped with a dash of cinnamon, and weekend ramen bowls featuring
    miso broth and fresh bok choy, while also enjoying the occasional trip to a local soul‑food joint for fried chicken and cornbread.
  core: Ellis Halloway blends a boundless sci‑fi imagination with a habit of pulling all‑nighters to finish digital sketches, often forgetting to eat dinner and compensating with late‑night snack runs.
background:
  cultural: Ellis grows up within a close‑knit African American family in Wilmington, where storytelling and oral history are cherished traditions. His grandparents shared stories of the Great Migration
    and local civil‑rights activism, instilling in him a deep respect for his heritage. He participates in church choir rehearsals and community events like the Wilmington Black Film Festival, which expose
    him to Black artistic expression across music, film, and visual arts. Ellis is involved in a local youth arts program that mentors Black teenagers in graphic design and mural painting, reinforcing his
    sense of cultural pride and responsibility. His cultural background influences his creative work, encouraging him to blend contemporary digital media with motifs rooted in African American history and
    modern urban experiences.
