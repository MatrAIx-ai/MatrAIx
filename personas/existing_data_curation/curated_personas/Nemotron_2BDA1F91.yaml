  hobbies: '[''Gardening (organic vegetables and native plants)'', ''Hiking on Appalachian trails'', ''Reading science fiction and popular science'', ''Woodworking projects'', ''Quilting'', ''Cooking regional
    Pennsylvania dishes'', ''Amateur astronomy (stargazing)'', ''Volunteering at the local library’s STEM outreach program'']'
  career_goals: Barbara aims to re‑enter the professional world on a flexible basis, leveraging her analytical background to take on freelance data‑analysis or GIS consulting projects for local businesses
    and non‑profits. She also aspires to launch a community maker space in Schuylkill County, where she can mentor youth in STEM and hands‑on crafts, combining her love of learning with practical community
    impact. In the longer term, she hopes to earn a professional certification in data science to stay current with emerging technologies while maintaining the balance between her personal projects and
    part‑time professional engagements.
