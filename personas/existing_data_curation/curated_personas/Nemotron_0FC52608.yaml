  hobbies: '[''Watercolor painting'', ''Visiting art museums and galleries'', ''Reading historical fiction'', ''Crossword puzzles'', ''Chess'', ''Rose gardening'', ''Knitting and crocheting'', ''Book club
    participation'', ''Oral‑history volunteering'', ''Live jazz performances'']'
  career_goals: Although retired, Nicole aims to deepen her knowledge of art and history, curate a small community exhibition at the local senior center, and mentor younger volunteers interested in cultural
    programs. She hopes to publish a memoir that weaves her personal history with Baltimore’s mid‑century cultural changes, and to establish a modest scholarship for local high‑school students pursuing
    visual arts. Maintaining her health and staying mentally active through structured learning remain central to her ambitions.
