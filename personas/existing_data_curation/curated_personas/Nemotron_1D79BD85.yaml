  career_goals: Melanie aims to transition from a secretary role to an office manager position within the next three years, taking on greater supervisory responsibilities and leading efficiency initiatives.
    She plans to earn the Certified Administrative Professional (CAP) credential to formalize her expertise, and is considering a part‑time MBA to deepen her strategic business acumen. Ultimately, she aspires
    to balance her career advancement with family life, contributing to a supportive workplace culture while maintaining her personal well‑being.
