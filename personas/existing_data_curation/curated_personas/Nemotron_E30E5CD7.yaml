  career_goals: John aims to transition into a senior executive role such as Regional Property Management Director, where he can shape strategic initiatives that blend sustainability, technology, and resident
    well-being. He plans to obtain the Certified Property Manager (CPM) designation and pursue a part-time MBA focused on real-estate finance to deepen his business acumen. Over the next five years, he
    envisions leading a portfolio of mixed-use developments that incorporate energy-efficient systems and smart-home features, while also establishing a mentorship program for emerging property-management
    professionals. Balancing ambition with his desire for emotional stability, John is committed to implementing stress-reduction practices at work and fostering a supportive community culture.
