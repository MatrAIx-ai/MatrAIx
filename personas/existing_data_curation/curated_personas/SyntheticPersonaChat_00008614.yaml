  Best Generated Conversation: 'User 1: Hi, what''s up?

    User 2: Not much, just listening to some music.

    User 1: Oh cool, what are you listening to?

    User 2: Guns N'' Roses.

    User 1: Oh, nice! I love them!

    User 2: Me too! They''re my favorite band.

    User 1: What''s your favorite song by them?

    User 2: That''s a tough one, but I''d have to say "Sweet Child o'' Mine".

    User 1: That''s a great song! I love the guitar solo.

    User 2: Yeah, it''s one of the best ever.

    User 1: What do you like about Guns N'' Roses?

    User 2: I love their sound, their lyrics, and their live shows.

    User 1: I agree! Their live shows are amazing.

    User 2: Have you ever seen them live?

    User 1: No, I haven''t. I''m hoping to one day though.

    User 2: You should! They''re definitely worth seeing.

    User 1: I know, I''ve heard great things about their live shows.

    User 2: So, what do you like to do for fun?

    User 1: I like to play ultimate frisbee, go for walks with my dog, and watch movies.

    User 2: Oh, that sounds fun! I like to play ultimate frisbee too.

    User 1: Cool! We should play together sometime.

    User 2: Yeah, that would be fun.

    User 1: So, what do you do for a living?

    User 2: I''m a student.

    User 1: Oh, cool! What are you studying?

    User 2: I''m studying business.

    User 1: Oh, that''s cool! I''m a graduate student studying law.

    User 2: Oh, that''s interesting! What do you want to do when you graduate?

    User 1: I''m not sure yet. I''m thinking about becoming a lawyer or a judge.

    User 2: Oh, that sounds cool! I''m sure you''ll be great at it.

    User 1: Thanks! I hope so.

    User 2: So, what do you like about New York City?

    User 1: I love the energy of the city. There''s always something going on.

    User 2: Yeah, I know what you mean. There''s always something to do here.

    User 1: And I love the food here. There''s so much good food to choose from.

    User 2: Yeah, I know what you mean. I love trying new restaurants.

    User 1: So, what do you like to do in your free time?

    User 2: I like to go to concerts, play video games, and watch movies.

    User 1: Oh, that sounds fun! I like to do those things too.

    User 2: Yeah, I know what you mean. They''re all great ways to relax.

    User 1: So, what are you looking for in a friend?

    User 2: I''m looking for someone who is funny, easy-going, and likes to have fun.

    User 1: Oh, that sounds like me! I''m funny, easy-going, and I love to have fun.

    User 2: Oh, that''s great! I think we''d make good friends.

    User 1: I think so too!

    User 2: So, what do you want to do?

    User 1: Well, we could go for a walk in the park or something.

    User 2: That sounds like fun.

    User 1: Great! Let''s go.'
