personas:
  professional: Amie Martinezluna, a 53-year-old community arts organizer, combines her watercolor expertise, curatorial instinct, and spontaneous, people-centric energy to launch pop-up exhibitions and
    intergenerational workshops, even as she wrestles with maintaining tight deadlines.
  sports: Amie Martinezluna enjoys jogs along the Charles River, follows the Boston Celtics, Red Sox, and Bruins with avid loyalty, participates in a local walking club and salsa-dance fitness troupe for
    cardio, while shying away from competitive team sports.
  arts: Amie Martinezluna immerses herself in Boston's cultural life, attending openings of works by contemporary artists such as Julie Mehretu and Yayoi Kusama, regularly visits the Museum of Fine Arts
    to study pieces by Matisse, and draws inspiration from the films of Wes Anderson and the music of Caetano Veloso for her mixed-media collages.
  travel: Amie Martinezluna favors spontaneous road trips to historic New England towns like Salem, Portsmouth, and Woodstock, while planning long-term visits to Paris, Florence, and Barcelona to study
    museum programming, using a travel-rewards credit card to stretch her modest travel budget.
  culinary: Amie Martinezluna loves to craft rosemary-infused focaccia, pan-seared scallops with lemon-caper butter, and never passes up a bowl of New England clam chowder or a fresh mango salsa at her
    salsa-class potlucks, and she frequently experiments with saffron in risotto.
  core: Amie Martinezluna blends a curatorial eye with a restless, social spirit, often juggling three art projects while forgetting to water her succulents, yet she always ends the day with a splash of
    watercolor on her journal page.
background:
  cultural: Amie is a White American raised in suburban Massachusetts, with deep roots in New England's cultural and educational traditions. Her family background includes Anglo-Irish ancestry and a paternal
    lineage that bears a Hispanic surname, reflecting a blend of European and Spanish heritage that has subtly shaped her appreciation for diverse artistic expressions. Growing up in Saugus, she was immersed
    in the region's historic colonial legacy and its vibrant contemporary arts scene, fostering a strong sense of community involvement and support for local cultural institutions. Her graduate education
    in arts and humanities reinforced a lifelong curiosity toward both Western art history and global creative practices, encouraging her to seek out multicultural experiences while remaining grounded in
    the values of independence, open‑mindedness, and collaborative spirit that characterize her New England upbringing.
