  hobbies: '[''Watercolor painting'', ''Mixed-media art experiments'', ''Digital photography'', ''Gallery and museum visits'', ''Theater performances'', ''Book club'', ''Community theater improv'', ''Road
    trips to historic towns'', ''Cooking and potluck hosting'', ''Gardening'', ''Yoga'', ''Salsa dancing'']'
  career_goals: Amie aims to deepen her impact on the Saugus arts community by volunteering as a resident curator for the local historical society's gallery, developing a series of interdisciplinary art
    workshops that blend visual arts, storytelling, and performance for seniors and youth. She hopes to publish a memoir-style collection of essays reflecting on her lifelong engagement with art and travel,
    and to launch an online blog that highlights emerging local artists and unconventional creative practices. Over the next few years, she plans to travel to European cultural capitals—Paris, Florence,
    and Barcelona—to study their museum programs and bring fresh ideas back home. Additionally, she has a personal ambition to earn a certificate in museum studies through a community college, affirming
    her commitment to lifelong learning and cultural stewardship.
