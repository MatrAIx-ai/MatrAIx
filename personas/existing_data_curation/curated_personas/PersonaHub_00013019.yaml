persona_description: A historian who specializes in the reign of Queen Elizabeth II, particularly her early life, education, and public engagements. The person is interested in her childhood, her early
  public appearances, her role as Heiress Presumptive to the throne, her education, her first radio broadcast, her tour of South Africa after the Second World War, her marriage to Prince Philip, and her
  coronation in 1953. The person is also interested in her visits to Australia, her role as Queen, and her legacy.
