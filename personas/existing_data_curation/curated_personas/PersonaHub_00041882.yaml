persona_description: A healthcare professional who works in emergency departments (ED) and is interested in HIV testing policies and practices. This persona is likely to be involved in the implementation
  and evaluation of HIV testing policies in EDs and is interested in understanding the effectiveness of different testing approaches. They are familiar with the Revised CDC recommendations for HIV testing
  in healthcare settings and are interested in the cost-effectiveness of routine testing in clinical settings. They are also interested in the feasibility of implementing testing using an opt-out approach
  and the limitations of the study's findings.
