personas:
  professional: Millicent Depeazer, a senior applied mathematician at a public‑health research institute, leverages expertise in statistical modeling, Python, R, MATLAB, and machine learning to develop
    predictive epidemiological models for climate‑related disease spread in north‑Florida, while mentoring underrepresented graduate students, guiding interdisciplinary teams toward equity‑focused policy
    recommendations, and drafting grant proposals that tie quantitative methods to community health outcomes.
  sports: Millicent Depeazer enjoys low‑impact fitness, starting each day with a walk through the nearby springs, participating in a weekly yoga session at the community center, and playing leisurely doubles
    tennis with a small group at the senior club; they cheer for the Jacksonville Jaguars during football season, follow the Florida Gators basketball team, and avoid crowded gyms, preferring solitary cardio
    in the fresh air of their garden.
  arts: Millicent Depeazer nurtures artistic expression through quilting intricate patterns inspired by traditional Southern motifs, attends intimate jazz concerts featuring Wynton Marsalis and soulful
    gospel services that celebrate Mahalia Jackson’s repertoire, and loses themselves in mystery novels by Tana French and historical fiction by Colson Whitehead, weaving these cultural threads into their
    creative pursuits.
  travel: Millicent Depeazer plans trips with meticulous itineraries, favoring short road trips to historic Southern towns like Savannah and Charleston, weekend getaways to the crystal‑clear springs of
    Crystal River, and dreaming of attending the Montreux Jazz Festival in Switzerland; they prefer staying at boutique B&Bs that offer quiet reading nooks and bird‑watching opportunities, and they stretch
    travel budgets by using senior discounts and a travel‑rewards credit card.
  culinary: Millicent Depeazer’s culinary repertoire centers on Southern comfort foods, from simmering low‑sodium gumbo with garden‑grown okra to baking flaky cornbread with heirloom cornmeal, preparing
    collard greens seasoned with smoked turkey, and crafting sweet‑potato pie with a pinch of cinnamon and nutmeg; they often pluck fresh basil and rosemary from their backyard garden for sauces, though
    they sometimes forget to label spices, leading to occasional pantry mix‑ups.
  core: Millicent Depeazer blends disciplined analytical rigor with a quiet devotion to community, nurturing gardens, quilts, and mentorship while balancing structured routines and occasional indulgent
    quirks.
background:
  cultural: Millicent identifies as African American and was raised in a close‑knit Black community in Northeast Florida, where church, family storytelling, and community activism shaped her values. She
    carries forward traditions of collective responsibility, celebration of Black heritage (including Juneteenth and local cultural festivals), and a strong commitment to mentorship. Her cultural perspective
    informs her professional focus on equity in data science, her preference for collaborative yet small‑group settings, and her dedication to preserving and sharing Southern Black culinary and musical
    traditions.
attributes:
  skills: '["Applied mathematics", "Statistical modeling", "Python programming", "R programming", "MATLAB", "SAS", "Data visualization (Tableau, ggplot2)", "Machine learning", "Epidemiological modeling",
