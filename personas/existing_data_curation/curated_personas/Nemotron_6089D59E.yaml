  hobbies: '["Gardening (native Florida plants)", "Birdwatching", "Reading historical fiction and mystery novels", "Yoga", "Quilting", "Cooking Southern and soul‑food cuisine", "Listening to jazz and gospel
    music", "Volunteering for community STEM tutoring", "Solving puzzles (crosswords, Sudoku)", "Hiking in natural springs"]'
  career_goals: Millicent aims to secure a senior research position or a tenured faculty appointment at the University of Florida, where she can lead a lab focused on using quantitative methods to address
    health disparities in the Black community of North‑Florida. She seeks to develop interdisciplinary collaborations with public‑health agencies and to produce policy‑relevant research that informs state‑wide
    preparedness for climate‑related health challenges. Long‑term, she hopes to author a textbook on applied statistical methods for community health, expand mentorship pipelines for Black women in mathematics,
    and obtain a leadership role in a regional STEM education nonprofit.
