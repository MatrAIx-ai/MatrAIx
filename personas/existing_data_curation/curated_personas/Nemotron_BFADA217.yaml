  career_goals: Daisy aims to advance into a senior supervisory role within facility management, overseeing a larger team of technicians and shaping maintenance policies for a regional property portfolio.
    She plans to earn certifications in HVAC and electrical work to solidify her technical credentials, and eventually launch her own small maintenance contracting business that services local community
    centers and small businesses. Mentoring apprentices and promoting safety best practices are key personal ambitions, as is being recognized by her peers for an exemplary safety record and efficient operations.
