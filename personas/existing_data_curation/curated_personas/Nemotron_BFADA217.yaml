personas:
  professional: Daisy Febo, a 55‑year‑old facility maintenance supervisor in San Antonio, leverages decades of electrical, plumbing, and HVAC expertise with a meticulous, methodical workflow and a talkative,
    mentorship‑driven style that turns client meetings into lively problem‑solving sessions, while her competitive streak pushes her team toward flawless safety records and her bilingual fluency bridges
    language gaps on every job site.
  sports: Daisy Febo stays fit by walking the San Antonio River Walk three times a week, rooting for the San Antonio Spurs in basketball, supporting San Antonio FC on soccer weekends, and playing in a community
    adult volleyball league called the River City Vipers, all while treating their garden plot as a personal low‑impact training ground.
  arts: Daisy Febo, an avid lover of regional folk music, regularly attends live mariachi performances by Los Tigres del Norte and classic cantina shows featuring the songs of Vicente Fernández, while also
    enjoying theatrical productions at the Majestic Theatre and collecting vintage postcards of historic San Antonio murals.
  travel: Daisy Febo prefers well‑planned road trips that blend family gatherings with cultural immersion, having recently driven to Oaxaca to experience Día de los Muertos festivities, arranged a weekend
    getaway to Hill Country wineries in Fredericksburg, and always earmarks a future cruise to historic Caribbean ports like San Juan, balancing adventure with a comfortable budget and their family’s schedule.
  culinary: Daisy Febo, a seasoned home chef, excels at crafting mole poblano with a blend of dried chiles, chocolate, and panela, perfecting hand‑made tamales stuffed with pork and masa, and lovingly tending
    a herb garden for fresh cilantro, oregano, and epazote that they incorporate into their signature salsa verde, while still indulging occasionally in a well‑earned plate of brisket nachos at the local
    taquería.
  core: Daisy Febo is a hands‑on maintenance guru whose talkative, competitive nature drives them to mentor apprentices while secretly hoarding a stash of vintage car manuals they read late into the night,
    even as they sometimes skip their own doctor’s appointments in favor of a spontaneous DIY project.
background:
  cultural: Daisy’s Mexican heritage is a central part of her identity; she grew up in a bilingual household where Spanish and English were spoken interchangeably. Family ties, respect for elders, and Catholic
    traditions shape her values, and she celebrates holidays like Día de los Muertos and Cinco de Mayo with close relatives. Living in San Antonio, she embraces the vibrant Tex‑Mex culture, participating
    in local fiestas, listening to mariachi and banda music, and enjoying regional foods. Her community orientation reflects the collectivist spirit of Mexican culture, while her professional life demonstrates
    the strong work ethic and pride associated with her roots.
