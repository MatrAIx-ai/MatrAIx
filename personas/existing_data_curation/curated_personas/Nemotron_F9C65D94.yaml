personas:
  professional: A seasoned marriage and family therapist with thirty years of hands‑on practice, Elizabeth Hernandez leverages structured, evidence‑based modalities such as Emotionally Focused Therapy,
    the Gottman Method, and Solution‑Focused Brief Therapy while drawing on her sociable, talkative nature to lead community workshops, mentor emerging clinicians, and become the energetic centerpiece of
    local relationship‑health initiatives.
  sports: Elizabeth Hernandez keeps fit by hiking the Cascades with the North Bend Trailheads Club, attending low‑impact aqua‑fit classes in winter, and passionately rooting for the Seattle Seahawks, Portland
    Trail Blazers, Seattle Mariners, and Portland Timbers, while reserving Saturdays for friendly matches in the community center's senior softball league.
  arts: Elizabeth Hernandez blends her love for storytelling and visual art by directing community theater productions of contemporary plays, curating a monthly book club that highlights authors such as
    Celeste Ng and Chimamanda Ngozi Adichie, and capturing Oregon’s misty coastlines through photography inspired by Ansel Adams, while often listening to folk legends like Joni Mitchell and indie folk
    band The Decemberists during cooking evenings.
  travel: Elizabeth Hernandez prefers well‑planned, immersive trips that balance scenic exploration with culinary experiences, often returning to the Oregon Coast’s Cannon Beach and the Willamette Valley’s
    vineyards, while dreaming of a spring pilgrimage to Kyoto’s temple gardens and a summer tour of the Tuscan wine route, always packing a sturdy camera and a notebook for spontaneous photo essays.
  culinary: Elizabeth Hernandez, an adept home chef, delights in preparing seasonal seafood feasts—such as pan‑seared salmon with dill‑lemon beurre blanc, Dungeness crab cioppino, and grilled halibut with
    fennel‑infused salsa—paired with Willamette Valley Pinot noirs, while juggling a generous serving of garden‑fresh rosemary and thyme, albeit occasionally leaving the kitchen a bit messier after her
    lively dinner parties.
  core: Elizabeth Hernandez, a methodical yet sociable therapist, blends her love for hiking, Pinot noir, and community theater with a habit of over‑hosting dinner parties and occasionally neglecting their
    own medication schedule when their workshop calendar fills up.
background:
  cultural: Elizabeth is a White American with mixed European and Hispanic ancestry, reflected in her surname and family traditions. Raised in the Pacific Northwest, she grew up with a blend of Midwestern
    values—emphasizing reliability, community responsibility, and practicality—and Hispanic cultural touches such as family gatherings centered around shared meals. Living in North Bend, Oregon, she has
    embraced the region’s deep respect for the outdoors, a growing awareness of Indigenous heritage, and a community-oriented, environmentally conscious lifestyle. This cultural tapestry informs her therapeutic
    perspective, allowing her to honor diverse family narratives while maintaining a structured, compassionate approach.
