  career_goals: Christina aims to translate her deep testing expertise into senior leadership, seeking a QA Lead or Manager role where she can guide cross‑functional teams to deliver high‑quality software
    while fostering a low‑stress, collaborative environment. Within the next two years she plans to earn the Certified Software Quality Engineer (CSQE) credential and to institutionalize a mentorship program
    for junior testers at her organization. Long‑term she envisions consulting for Houston‑based startups, helping them implement robust quality frameworks, and authoring a practical guide on risk‑based
    testing for professionals entering the field later in life. She also aspires to retire on her own schedule, leaving a legacy of process improvements and a vibrant community of confident testers.
