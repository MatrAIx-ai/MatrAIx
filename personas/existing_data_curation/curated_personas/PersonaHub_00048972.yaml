persona_description: A feminist who is interested in the study of cyber harassment and the psychology of its perpetrators. She is also interested in the use of nonviolent action as a countermeasure against
  online abuse. She is familiar with the concepts and theories related to cyber feminism, including the perspective of cyber feminism, Leigh Alexander's work on men's role in online harassment, and the
  psychology of abusers. She is also aware of the importance of understanding the psychology of abusers to come up with more effective responses to online abuse. She is also interested in the use of nonviolent
  action as a countermeasure against online abuse, and she is familiar with the key features of effective nonviolent action, including non-standard, limited harm, participation, voluntary participation,
  fairness, prefiguration and skillful use.
