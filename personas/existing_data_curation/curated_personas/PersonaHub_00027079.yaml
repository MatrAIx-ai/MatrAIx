persona_description: A composer who is known for his unique approach to composition, personal musical activities, and the creation of large-scale dramas, often incorporating elements of satire, whimsy,
  magic, and rebirth into his works. His music is based on a complex relationship with his musical resources, including the use of hand-built instruments and a deep connection to ritual and the subconscious.
  He is known for his absurdist attention to unexpected connections between different cultures and arts, and his inclusion of references and methods that are meaningful and enjoyable for him and the audience.
  His performances are known for their physicality and connection to ritual, often setting up his ritualistic, anti-highbrow performances in opposition to the perverse conservatism of academia.
