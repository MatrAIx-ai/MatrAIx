personas:
  professional: Geraldine Estes is a 22‑year‑old rigging specialist who excels at interpreting technical drawings, tying a wide variety of knots, and operating hoisting equipment, balancing her curiosity
    for innovative rigging techniques with a steadfast commitment to OSHA‑mandated safety as she works toward NCCCO certification and dreams of launching a boutique consultancy.
  sports: Geraldine Estes enjoys weekend fishing off the Fort Lauderdale pier, occasional beach volleyball with friends, and follows the Miami Heat and Inter Miami CF closely, favoring low‑intensity cardio
    like shoreline jogging over structured gym workouts.
  arts: Geraldine Estes channels her love for maritime history into intricate scale‑model ship building, relaxes by crocheting petite accessories while listening to Vivaldi’s “Four Seasons” and The Tall
    Ships, and attends occasional local boat‑show exhibitions that feel like living art.
  travel: Geraldine Estes prefers spontaneous coastal getaways, having road‑tripped to Key West and taken a budget ferry to the Bahamas, while dreaming of a sailing adventure to the historic ports of Lisbon
    and the Scottish Highlands, though she balances these ambitions against her tight certification‑saving budget.
  culinary: Geraldine Estes delights in grilling fresh snapper with lemon‑herb butter, crafting mango‑pineapple salsa, and occasional fried fish tacos, though on stressful nights they reach for a quick
    bowl of ramen from a nearby Asian market.
  core: Geraldine Estes is a solitary, detail‑obsessed rigger who balances relentless mechanical curiosity with a stress‑prone personality, preferring flexible schedules yet never compromising on safety.
background:
  cultural: Geraldine grew up in a middle‑class, white family in suburban Fort Lauderdale, where the coastal lifestyle and the area's multicultural vibe subtly shaped her worldview. Her parents emphasized
    practical skills and self‑reliance, encouraging participation in vocational programs during high school, such as automotive shop and basic carpentry. Although she identifies with a broadly American
    cultural identity rooted in Southern Florida's blend of beach leisure and a strong work ethic, she also appreciates the diverse cultural influences of the Broward County community, which has informed
    her inclusive yet reserved demeanor.
attributes:
  skills: '[''Rigging and hoisting'', ''Safety compliance (OSHA)'', ''Knot tying and rope management'', ''Mechanical troubleshooting'', ''Blueprint reading'', ''Basic welding'', ''Hydraulic system operation'',
    ''Equipment maintenance'', ''Small-crew coordination'', ''Problem solving'']'
  hobbies: '[''Scale model shipbuilding'', ''Fishing'', ''Beach walking'', ''Yoga and meditation'', ''Reading technical manuals'', ''Podcast listening (engineering, DIY)'', ''Simulation video gaming'',
    ''Crocheting'']'
  career_goals: Geraldine aims to earn a nationally recognized NCCCO Rigger certification within the next two years, positioning herself for a lead‑rigger or crew‑supervisor role on larger commercial projects.
    She plans to enroll in part‑time courses toward an associate degree in construction management, hoping to blend her on‑site expertise with formal project‑planning knowledge. Long‑term, she envisions
    starting a boutique rigging consultancy that emphasizes rigorous safety culture and supports crew wellbeing, allowing her to retain the flexibility she values while reducing the high‑stress environments
    she finds taxing.
