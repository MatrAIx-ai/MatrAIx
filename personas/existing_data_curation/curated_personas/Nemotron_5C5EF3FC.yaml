  hobbies: '["Reading non-fiction (science, philosophy, education)", "Urban photography", "Chinese calligraphy", "Cooking fusion dishes", "Chess (online)", "Coastal hiking", "Volunteer tutoring"]'
  career_goals: Hau Ching aims to complete a bachelor’s degree in mathematics education within the next two years, followed by a master’s in educational technology. He seeks a full‑time adjunct faculty
    position at a community college where he can design and teach introductory STEM courses that incorporate active learning and culturally responsive pedagogy. He plans to develop a mentorship program
    that pairs Asian‑American undergraduates with high‑school students to improve college readiness. In the long term, he aspires to become a department chair and influence institutional policies that increase
    accessibility for first‑generation college students and underrepresented minorities.
