  career_goals: Although officially retired, Christopher’s ambition is to stay mentally and physically active while making a lasting contribution to his community. He aims to mentor younger volunteers at
    the Salt Lake County historical society, pass on his woodworking and home‑repair expertise to grandchildren, and document his life story and local history insights in a memoir that could serve as a
    resource for future generations. He also hopes to organize a small annual “Pioneer Skills” workshop, combining his project‑management flair with his love for practical, hands‑on learning.
