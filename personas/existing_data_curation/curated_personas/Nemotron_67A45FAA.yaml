personas:
  professional: Gladys Simeon, a 38‑year‑old freelance arts writer and independent curator in Chicago, blends keen visual literacy with improvisational problem solving to craft insightful critiques, pop‑up
    exhibitions, and digital showcases that amplify under‑represented artists while navigating a self‑structured schedule that often tests their resistance to rigid deadlines.
  sports: Gladys Simeon stays active by walking extensive city tours, joining the weekly parkrun at Grant Park, and playing casual basketball pick‑up games at the United Center’s outdoor courts, while rooting
    for the Chicago Bulls and Chicago Cubs as their favorite local teams.
  arts: Gladys Simeon immerses themselves in Chicago’s vibrant arts scene—regularly attending experimental theater at the Neo‑Futurist, live jazz at the Green Mill, and gallery openings at the Museum of
    Contemporary Art—while contributing their own voice through poetry at open‑mic nights, sketching murals, and curating community pop‑up shows that feature emerging creators.
  travel: Gladys Simeon favors spontaneous, culturally rich trips, often planning weekend getaways to nearby art hubs like Detroit’s Museum of African American History or a short flight to Montreal’s vibrant
    street art festivals, balancing the desire for adventure with a modest travel budget that prioritizes affordable hostels and public transport.
  culinary: Gladys Simeon experiments with vegan cooking, frequently blending chickpea‑based stews with aromatic spice blends inspired by West African flavors, perfecting dishes such as a plant‑based Jollof‑inspired
    rice bowl and a coconut‑lime curry, while maintaining a modest kitchen skill level that thrives on improvisation and occasional recipe mishaps.
  core: Gladys Simeon is a curiosity‑driven, 38‑year‑old arts advocate who stitches together spontaneous city walks, vegan culinary experiments, and community‑focused curatorial projects, all while juggling
    a love of harmony with a chronic battle against rigid schedules.
background:
  cultural: Gladys identifies as African‑American and was raised in Chicago’s South Side, where she absorbed the city’s rich Black cultural heritage—from gospel choirs and blues clubs to the legacy of the
    Chicago Black Arts Movement. Her family emphasizes storytelling, communal support, and social justice, shaping her view of art as a vehicle for empowerment. She maintains strong ties to local Black
    cultural institutions such as the DuSable Museum and draws inspiration from Black feminist writers and visual artists. This cultural grounding informs both her creative pursuits and her commitment to
    community outreach.
