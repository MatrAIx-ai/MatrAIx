  career_goals: Gladys aims to build a flexible, independent career that blends her love for art with community empowerment. She envisions working as a freelance arts writer and curator, producing pop‑up
    exhibitions and digital showcases that highlight under‑represented Black artists in Chicago and the Midwest. Long‑term, she hopes to launch a community‑driven online platform that offers mentorship,
    resources, and exhibition space for emerging creators, while maintaining a schedule that allows spontaneous projects and continuous learning. She seeks roles that avoid rigid hierarchies, prioritize
    collaborative harmony, and provide room for creative experimentation.
