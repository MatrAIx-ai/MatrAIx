personas:
  professional: Joy Kelly, a budding visual artist and junior scientist, channels their boundless curiosity into drawing detailed fantasy characters, painting watercolor skylines of Chicago, and conducting
    simple home experiments, while their organized yet flexible approach ensures they meet school project deadlines and their occasional worry drives them to double‑check every brushstroke and measurement.
  sports: Joy Kelly, a Chicago Cubs enthusiast who cheers loudly at televised games and plays on the Chicago Fire youth soccer club, enjoys weekend bike rides through Lincoln Park, and balances a love for
    team sports with solitary skateboarding sessions at the local rink, all while striving to stay active despite occasional stress‑induced fatigue.
  arts: Joy Kelly, an avid admirer of the Art Institute of Chicago’s impressionist collection, draws inspiration from Monet and Van Gogh, spends evenings replicating scenes from their favorite graphic novels
    like 'Amulet' by Kazu Kibuishi, and attends community art workshops where they love to experiment with mixed media, though they sometimes get frustrated when a painting doesn’t match their imaginative
    vision.
  travel: Joy Kelly, an inquisitive explorer who has visited Chicago’s Museum Campus, the historic Freedom Trail in Boston on a school trip, and dreams of seeing the Grand Canyon and the Louvre, prefers
    trips that blend structured museum tours with free‑form time to sketch new landscapes, yet their tendency to worry about packing can lead to last‑minute checklist frenzies.
  culinary: Joy Kelly, a developing home chef who delights in crafting chocolate chip cookies, topping homemade pizza with extra mozzarella and pepperoni, experimenting with avocado toast, and occasionally
    attempts to bake a simple soufflé after watching a YouTube tutorial, though they sometimes forget to set the timer, resulting in over‑baked treats.
  core: Joy Kelly is a curious, art‑obsessed ten‑year‑old whose creative energy is tempered by a habit of worrying over details, leading to meticulous projects, occasional over‑thinking, and a love for
    organized play.
background:
  cultural: Joy is raised in a middle‑class white family in a suburban neighborhood of Chicago, Illinois. Her household celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth
    of July, often incorporating local traditions like attending the Taste of Chicago festival and holiday light displays. The city’s multicultural atmosphere has exposed her to diverse cuisines, music,
    and art, fostering her openness to varied experiences. Her family places a strong emphasis on education, community involvement, and encouraging curiosity, which aligns with Chicago’s rich cultural and
    artistic heritage.
