  career_goals: Joy dreams of a future where she can combine art and science, hoping to become an illustrator who creates visually engaging educational materials or a museum curator who designs interactive
    exhibits. She also imagines a role as a community art teacher, inspiring other children to explore their creativity. In the longer term, she is interested in studying environmental design, aiming to
    develop sustainable art installations that raise awareness about climate change. Her career ambitions are guided by her love of varied experiences, her urge to help others, and her desire to turn her
    curiosity into a purposeful vocation.
