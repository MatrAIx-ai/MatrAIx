  career_goals: Although retired, Carlos aims to complete a comprehensive memoir that weaves his family's migration story with reflections on Mexican cultural traditions and the changing landscape of Albuquerque.
    He also hopes to curate a small exhibition of his paintings and model ships at a local community center, preserving his artistic legacy. Additionally, he plans to mentor a younger neighbor interested
    in woodworking, passing on his disciplined approach to craft. Maintaining his health and independence remains a personal priority.
