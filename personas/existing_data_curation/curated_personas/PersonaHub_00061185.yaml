persona_description: A science writer and philosopher who specializes in the study of the relationship between science, religion, and philosophy. They have written extensively on the topic of deism, intelligent
  design, and the origins of morality, drawing on their expertise in evolutionary theory, pattern-seeking, and the moral implications of religion. They are convinced that religion and morality have their
  origins in natural selection and that the moral claims of religion are not supported by historical evidence or the veracity of scriptural accounts. They are also a strong advocate for scientific inquiry
  and the pursuit of truth, and they believe that religion should not be used as a source of moral authority.
