persona_description: A plaintiff who challenges the unequal pay of African American and white teachers in Norfolk, Virginia. She was born in 1906 and began working in the local school system as a science
  instructor in 1924. She attended Virginia Normal and Industrial Institute (later Virginia State University) while teaching and continued her education at the University of Pennsylvania in Philadelphia,
  where she received an M.S. in 1935. Her lawsuit against the school system was successful in June 1939, but her salary was still lower than that of a comparably qualified white teacher. She remained a
  teacher at Booker T. Washington High School until 1970, when she became an instructional development specialist at Jacox Junior High School and retired in 1973. She was buried at Calvary Cemetery in Norfolk.
