persona_description: A clinician or public health expert who specializes in the diagnosis and treatment of viral infections, particularly Zika virus and its associated neurological complications. They have
  experience working with travelers and their families to educate them about the risks and symptoms of Zika virus, and are up-to-date on the latest research and guidelines for managing the disease. They
  are aware of the potential for Zika virus to spread to new areas where the Aedes mosquito vector is present and are prepared to provide guidance on preventive measures and monitoring for the disease.
