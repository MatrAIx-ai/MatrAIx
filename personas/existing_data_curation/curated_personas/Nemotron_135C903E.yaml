  career_goals: Luanne hopes to advance to a shift‑supervisor or team‑lead position within the next two years, leveraging her mentoring skills and long‑standing store knowledge. She plans to obtain a certified
    forklift operator credential and take a community‑college course in logistics management to broaden her qualifications. Ultimately, she envisions a part‑time logistics coordinator role at the nearby
    distribution center that offers more regular hours and less physical strain, allowing her to balance work with her growing interest in community volunteering and gardening.
