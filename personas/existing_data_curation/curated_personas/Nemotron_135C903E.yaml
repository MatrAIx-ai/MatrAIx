personas:
  professional: Luanne Hollis, a 54‑year‑old veteran stocker and order filler, combines two decades of inventory tracking expertise, hands‑on forklift operation, and a talent for mentoring new hires with
    a curiosity for lean‑stocking methods and a practical, flexible mindset that fuels her goal of becoming a shift‑supervisor and eventually a logistics coordinator.
  sports: Luanne Hollis stays active by walking with the Redlands Walking Circle, cheering on the Los Angeles Dodgers and the LA Lakers on game nights, and occasionally joins a community softball league
    for seniors, embracing both low‑impact exercise and lighthearted fandom.
  arts: Luanne Hollis enjoys attending productions by the Redlands Community Theatre, especially when they stage classics like 'Our Town' starring local actors, and finds inspiration in the music of Bob
    Dylan and the quilts of artist Faith Ringgold, which influence her own quilting designs.
  travel: Luanne Hollis prefers relaxed road trips along the Pacific Coast Highway to Big Sur, has visited the historic vineyards of Napa Valley, and dreams of exploring the cherry blossom festivals in
    Kyoto, balancing family visits to Disneyland with budget‑friendly weekend getaways.
  culinary: Luanne Hollis delights in baking her signature cinnamon‑spiced apple crumble and preparing comfort classics like chicken pot pie, often incorporating fresh heirloom tomatoes and basil from her
    garden into bruschetta and garden‑vegetable lasagna for her husband and grandchildren.
  core: Luanne Hollis, a caring yet worry‑prone 54‑year‑old stocker‑turned‑aspiring logistics coordinator, nurtures heirloom gardens, quilts for loved ones, and balances practical ambition with a relaxed,
    occasionally disorganized approach to life.
background:
  cultural: Luanne is a third‑generation white Californian whose family roots trace back to post‑World‑II Midwestern migrants who settled in the Inland Empire. She grew up in a modest suburban neighborhood,
    attended a Protestant church, and internalized values of hard work, community service, and modesty. Living in Redlands, she embraces the region’s blend of historic Spanish‑colonial heritage and modern
    agricultural tradition, often celebrating local festivals and supporting neighborhood initiatives.
