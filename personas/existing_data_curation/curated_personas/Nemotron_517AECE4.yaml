  hobbies: '[''building sandcastles'', ''collecting shells'', ''drawing pictures'', ''assembling block towers'', ''solving simple puzzles'', ''participating in preschool storytime'', ''sing‑along music
    classes'', ''riding a tricycle'', ''nature walks with family'']'
  career_goals: Although he is only four, Jray already talks about future jobs that combine his love of the ocean, helping others, and hands‑on problem solving. He often says he wants to become a marine
    biologist to explore sea life at the nearby beaches, or a firefighter because he likes the idea of protecting people and using practical tools. His ambitions reflect a blend of curiosity, practicality,
    and a desire to be reliable and helpful.
