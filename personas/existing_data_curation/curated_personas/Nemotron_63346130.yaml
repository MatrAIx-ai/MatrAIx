  career_goals: Bryan aims to secure a full‑time role in a technology or engineering firm where he can blend innovative problem solving with established best practices. He is targeting positions such as
    data engineer, product development engineer, or junior project manager, with a long‑term ambition to become a senior technical lead or a certified project manager (PMP) within the next five years. He
    wants to contribute to products that have tangible societal impact, while also building a stable career path that eases his stress and financial worries. Bryan plans to supplement his experience with
    industry certifications (e.g., AWS, Scrum Master) and possibly pursue a part‑time master's degree to deepen his expertise.
