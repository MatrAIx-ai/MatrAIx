  hobbies: '[''Golf'', ''Fishing'', ''Woodworking'', ''Model railroading'', ''Volunteer drafting for Habitat for Humanity'', ''Reading technical and historical nonfiction'']'
  career_goals: Matthew aims to transition into a senior CAD manager role within the next three years, overseeing a team of drafters and driving the adoption of advanced BIM workflows at his firm. He plans
    to earn the Certified Professional Drafter (CPD) credential and complete a construction management certification to broaden his project leadership capabilities. Long-term, he envisions establishing
    a boutique drafting consultancy focused on serving small construction firms in the Augusta region, leveraging his extensive experience to provide cost‑effective design solutions while mentoring the
    next generation of technical professionals.
