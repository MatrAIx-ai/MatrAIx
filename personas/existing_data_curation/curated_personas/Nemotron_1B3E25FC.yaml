personas:
  professional: Matthew Sparks is a veteran CAD drafter with 25 years of precision-driven experience in AutoCAD, SolidWorks, and Revit, who leverages their systematic workflow and competitive edge to mentor
    junior staff while targeting a senior CAD manager role and an eventual boutique consultancy.
  sports: Matthew Sparks is an avid golfer at the Augusta Country Club, a weekly participant in Masters tournament viewing parties, a dedicated fan of the Atlanta Falcons and Atlanta United, and they enjoy
    weekend fishing trips on the Savannah River that blend quiet concentration with a love of competition.
  arts: Matthew Sparks channels creative energy through woodworking, crafting custom furniture inspired by the clean lines of George Nakashima, curating a model railroading layout that mirrors the precision
    of Frank Lloyd Wright’s designs, and they unwind by listening to the jazz of John Coltrane and the classic ballads of Frank Sinatra.
  travel: Matthew Sparks favors travel that combines love for golf and fishing, having toured St. Andrews in Scotland to play historic courses, camped on Ontario’s salmon rivers, and they plan future trips
    to the Blue Ridge Parkway’s scenic overlooks and New Zealand’s Otago lakes for elite trout fishing.
  culinary: Matthew Sparks enjoys Southern comfort foods like shrimp and grits, black-eyed peas, and bourbon-glazed pork ribs, often seasoning meals with fresh rosemary and smoked paprika, and they occasionally
    showcase woodworking skill by building a custom cedar smoker for wood-fired pizza nights.
  core: Matthew Sparks blends meticulous drafting expertise with a competitive love of golf, a hands-on woodworking hobby, and a pragmatic yet occasionally skeptical outlook, and they are seasoned by a
    habit of over-checking details and a penchant for occasional indulgent splurges.
background:
  cultural: Matthew grew up in a middle‑class family in the South, rooted in the cultural traditions of the Georgia Piedmont region. His upbringing emphasized self‑reliance, hard work, and community involvement,
    often centered around his local Southern Baptist church. He values Southern hospitality and maintains strong ties to his extended family, frequently gathering for holiday barbecues and church events.
    Living in Augusta for most of his adult life, he has been influenced by the city's historic blend of military presence, sports culture—particularly golf—and a growing appreciation for local heritage.
    While identifying as a white American, he respects the diverse cultural fabric of Columbia County and engages in community initiatives that reflect the region's inclusive spirit.
attributes:
