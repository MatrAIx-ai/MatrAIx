persona_description: A faculty mentor who is interested in guiding undergraduate research projects and is familiar with the NCWIT Academic Alliance's REU-in-a-Box resource. They are also familiar with the
  articles and books on mentoring undergraduate research, and have experience with the focus of the "Score" article. They are interested in learning how to write a graduate school recommendation letter
  and have knowledge of the resources for undergraduate student researchers. They are interested in conferences with student research poster sessions and competitions, funding for academic year research
  and summer research opportunities, and the web guide to research for undergraduates. They are interested in the concept of mentorship and have experience mentoring students in science and engineering.
