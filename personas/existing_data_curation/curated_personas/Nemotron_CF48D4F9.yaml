personas:
  professional: Rafael Khan is an aspiring junior engineer who spends hours assembling LEGO sets and model kits, using their methodical, routine‑loving mindset to plan each build step‑by‑step, and they
    channel their anxiety into detailed journaling about design challenges.
  sports: Rafael Khan plays organized soccer with the local U‑10 Skyhawks, eagerly cheering for their favorite professional team Manchester United while also rooting for the nearby minor league baseball
    team the River City Cubs, and they stick to a strict pre‑game routine that includes a warm‑up puzzle to calm nerves.
  arts: Rafael Khan draws intricate geometric patterns inspired by the symmetry of machines, enjoys listening to Spanish‑language children’s songs by artists such as José Luis Orozco and the animated series
    soundtrack of 'Coco', and they spend free time exploring non‑fiction books about how engines work, blending technical curiosity with creative expression.
  travel: Rafael Khan prefers family trips that follow a detailed itinerary, having visited the natural wonder of Grand Canyon National Park and the colorful markets of Antigua, Guatemala, they dream of
    touring the interactive science museum in Berlin and a Lego‑themed resort in Denmark, always packing a notebook to document every stop.
  culinary: Rafael Khan helps prepare simple Guatemalan dishes like black beans and rice, measuring each ingredient with the precision of a young engineer, while also mastering the art of making perfect
    peanut butter sandwiches and experimenting with fresh cilantro, lime, and a dash of mild chili for flavor, and they enjoy sharing their creations with family.
  core: Rafael Khan is a routine‑driven nine‑year‑old who channels their anxiety into meticulous LEGO builds, disciplined budgeting, and organized soccer play, while balancing social fun with quiet moments
    of journaling and geometric drawing.
background:
  cultural: Rafael is a first-generation Guatemalan-American who grew up in a bilingual household in American Fork, Utah. His family maintains many traditions from Guatemala, such as celebrating Día de
    los Muertos and Semana Santa, speaking Spanish at home, and preparing traditional foods during holidays. He attends a local public school where he interacts with peers from diverse backgrounds, yet
    his family’s cultural values—respect for elders, community solidarity, and Catholic faith—play a central role in his upbringing. This blend of Guatemalan heritage and American community life shapes
    his worldview, language use, and the customs he observes.
