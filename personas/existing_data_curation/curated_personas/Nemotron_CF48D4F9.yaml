  career_goals: He imagines a future where he works in a job that offers clear structure and a tangible impact on his community, such as becoming a civil engineer who designs safe roads and bridges, a building
    contractor who oversees construction projects, or a firefighter who follows a disciplined routine to protect people. His current ambition is to earn good grades, complete a summer camp focused on engineering
    basics, and eventually earn a high school diploma that will open the path to a technical college.
