personas:
  professional: Lynne Collins is an aspiring comic creator who blends her love of cartoon art and Minecraft architecture into detailed storyboards, using her curious, open‑minded outlook to experiment with
    unconventional plot twists and vibrant bayou‑inspired backdrops.
  sports: Lynne Collins plays forward on the East Baton Rouge Youth Soccer Club, cheers for the MLS side Austin FC when she watches games, and balances her competitive drive on the field with a love for
    wandering the wetlands on nature hikes during the summer months.
  arts: Lynne Collins devotes free time to sketching characters from Adventure Time and creating original comic strips, adores the zydeco sounds of Clifton Chenier, and practices simple melodies on a pocket
    accordion, all of which infuse her artwork with a rhythmic, swamp‑inspired flair.
  travel: Lynne Collins dreams of exploring the Atchafalaya Basin’s hidden cypress tunnels, has already visited the New Orleans French Quarter with her family, and hopes to someday trek the rainforest of
    Costa Rica, though her trips are limited by school schedules and a modest family budget.
  culinary: Lynne Collins enjoys helping her mother stir simmering shrimp gumbo and dust fresh beignets with powdered sugar, prefers the bold flavors of crawfish étouffée and spicy jambalaya, and can whip
    up a simple roux after just a few guided attempts.
  core: Lynne Collins is a curious, slightly disorganized comic‑loving kid who balances a competitive soccer spirit with a penchant for swampy adventures, occasional overspending on art supplies, and a
    habit of forgetting to brush her teeth before bedtime.
background:
  cultural: Lynne is a White American raised in Thibodaux, Lafourche Parish, where Southern hospitality and Cajun influences blend into daily life. Her family attends a local Methodist church, and community
    events like Mardi Gras parades and the annual shrimp festival are regular celebrations. School curricula include lessons on the history of the bayou, basic French language exposure, and environmental
    stewardship, all of which shape her appreciation for the region's unique heritage. Family gatherings often feature gumbo, jambalaya, and beignets, reinforcing a love for Louisiana cuisine. While her
    cultural experience is rooted in mainstream Southern traditions, she also embraces the creative spirit of the local music scene and the natural beauty of the wetlands surrounding her town.
