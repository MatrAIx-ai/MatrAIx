    club'']'
  career_goals: Lynne dreams of becoming an artist who illustrates stories about the Louisiana bayou and its wildlife. She hopes one day to design a video game that teaches kids about environmental stewardship
    while letting them explore imaginative worlds. Winning a regional science fair with a project on water quality is a concrete goal she is working toward. She also aspires to travel to see famous museums,
    learn new art styles, and maybe write and illustrate her own children's book series.
