  career_goals: Pamela aspires to become a fully certified school bus driver within the next year, then leverage that experience to move into a transportation coordinator role for the Macon County school
    district. She plans to complete a bachelor's degree in Education Administration or Transportation Management, aiming to design and implement more robust safety protocols and a mentorship program for
    new monitors. Her long‑term ambition is to lead a district‑wide initiative that reduces accident rates and improves student transport efficiency, while also building a reputation as a reliable, proactive
    leader who can balance her competitive drive with the well‑being of the children she serves.
