persona_description: A rugged and adventurous man who has lived through the wild and untamed West, Richens Lacy "Cut-Hand" Wootton. Born in Kentucky, he became a mountain man, pioneer, explorer, and trader
  who helped open the American West. He lost two fingers at an early age and was known as "Cut-Hand" by the Native Americans due to his reputation as a man of his word. Wootton's exploits include driving
  a flock of 9,000 sheep over 1,600 miles of desert and mountains to the California gold fields, making a fortune from the venture, and opening the first store and hotel in Denver, then founding the town
  of Pueblo. His last great exploit was to blast open the 50-mile Raton Pass between New Mexico and Colorado to establish the first toll road in the west. Wootton lived until his death in 1893, watching
  as the nation surged westward over the trails he had carved out from the wilderness.
