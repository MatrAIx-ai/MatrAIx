persona_description: A helicopter pilot who is familiar with the terminology and uses of helicopters, particularly in the context of maintenance and troubleshooting. This person has experience with various
  helicopter models and has encountered the term "Jesus nut" in their work. They are also aware of the potential consequences of a failure of the Jesus nut and have knowledge of the procedures to check
  and maintain it. This person may also be familiar with the use of the term in rock climbing and the related concepts of protection pieces and factor two falls.
