personas:
  professional: Luis Perezmedina, a 22‑year‑old groundskeeper turned aspiring landscape supervisor, blends precise horticultural knowledge, bilingual client communication, and a love for vivid mural-inspired
    designs into methodical project plans that keep deadlines on schedule while delighting customers with culturally resonant green spaces.
  sports: Luis Perezmedina, an active 22‑year‑old who enjoys early‑morning jogs along the Rio Grande trail and plays pickup basketball on weekends, follows the Houston Astros for spring baseball, supports
    the Rio Grande Valley FC Toros in soccer, and belongs to a local running club that meets twice a week.
  arts: Luis Perezmedina, a budding visual storyteller, spends evenings sketching colorful street murals on a tablet, strums acoustic guitar to songs by Lila Downs and Sufjan Stevens, and attends live performances
    ranging from spirited mariachi ensembles to indie folk shows at the Eagle Pass Arts Center.
  travel: Luis Perezmedina, a curious traveler with a modest budget, prefers road trips that blend nature and culture – they’ve explored the desert flora of Big Bend, the historic streets of San Antonio,
    and dream of photographing the stone terraces of Machu Picchu on a future adventure.
  culinary: Luis Perezmedina, a food‑enthusiast who loves cooking family‑style tamales with masa, pork, and roasted chilies, enjoys Sunday breakfasts of chilaquiles with fresh cilantro and queso fresco,
    and often seasons grilled vegetables with nopales, lime, and smoked paprika while experimenting with fusion sauces.
  core: Luis Perezmedina, a 22‑year‑old groundskeeper with a sharp eye for design, balances diligent work routines, a thriving garden of artistic passions, and a habit of over‑stocking plant seeds that
    sometimes clutters their workspace.
background:
  cultural: Luis was raised in a bicultural Mexican‑American household in Eagle Pass, Texas, a city that straddles the U.S.–Mexico border. His family preserves traditional Mexican customs—such as celebrating
    Día de los Muertos, preparing home‑cooked tamales during holidays, and listening to regional folk music—while also embracing Texan community events and bilingual education. Fluent in both Spanish and
    English, Luis navigates seamlessly between the two cultures, which enriches his interactions with clients and coworkers. The vibrant visual culture of his neighborhood, marked by colorful murals, public
    sculptures, and annual art fairs, feeds his appreciation for aesthetics. This blend of heritage and borderland experiences informs his worldview, encouraging him to fuse Mexican artistic motifs with
    sustainable landscaping practices that reflect the ecological realities of the Rio Grande Valley.
attributes:
  skills: '[''Plant identification'', ''Irrigation system design and maintenance'', ''Landscape design basics'', ''Groundskeeping equipment operation'', ''Soil testing and amendment'', ''Sustainable planting
    practices'', ''Project planning and scheduling'', ''Team leadership and coordination'', ''Bilingual client communication (Spanish/English)'', ''Safety compliance and OSHA regulations'']'
  hobbies: '[''Sketching street murals'', ''Landscape photography'', ''Playing acoustic guitar'', ''Attending live music events'', ''Volunteer park clean‑ups'', ''Reading design and urban planning books'',
    ''Exploring local art festivals'']'
  career_goals: Luis aims to advance from an entry‑level groundskeeper to a supervisory role within the next three to five years, seeking certifications such as the Certified Horticulturist credential from
    the American Society for Horticultural Science and the Landscape Industry Certified (LIC) designation. He is interested in completing an associate’s degree in horticulture or environmental design at
    a nearby community college, which will enable him to oversee larger municipal projects and public park renovations. Long‑term, Luis envisions launching his own boutique landscaping firm that specializes
    in sustainable, culturally inspired designs—integrating native Texas‑Mexico flora with artistic elements drawn from Mexican folk art. He also plans to mentor younger workers in his community, sharing
    best practices for environmentally responsible landscaping.
