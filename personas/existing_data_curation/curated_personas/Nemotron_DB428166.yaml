personas:
  professional: Ligia Dejesus, a 55‑year‑old automotive service technician with three decades of hands‑on expertise, blends precise engine tuning, complex electrical diagnostics, and classic‑car restoration
    artistry while rigorously tracking service records and boldly experimenting with unconventional repair solutions, all aimed at achieving ASE Master Technician status and launching a boutique high‑performance
    garage.
  sports: Ligia Dejesus follows the Miami Heat and the Miami Dolphins, plays weekly tennis at the local country club, participates in the Hialeah Classic Car Club’s annual rally, and maintains a disciplined
    morning jog routine, though she often skips workouts when a tough repair job demands extra hours.
  arts: Ligia Dejesus spends her evenings painting subtle automotive murals inspired by the bold colors of traditional dance celebrations, frequents the Calle Ocho Art Gallery to view emerging Latin‑influenced
    artists, collects limited‑edition prints by Alex Gonzalez, and curates a personal photo series of vintage car details, all while listening to classic son and contemporary salsa legends like Celia Cruz
    and Arturo Sandoval.
  travel: Ligia Dejesus prefers meticulously planned road trips along the Florida Keys, enjoys spontaneous weekend getaways to Havana to reconnect with family recipes and music, dreams of attending the
    Frankfurt Motor Show in Germany, and balances travel ambitions with the financial realities of funding her boutique garage and caring for aging parents.
  culinary: Ligia Dejesus cooks arroz con pollo, ropa vieja, and plantain mofongo with a cilantro‑lime mojo sauce using herbs from her rooftop garden, expertly balances spices while humming salsa rhythms,
    yet often leaves greasy fingerprints on kitchen surfaces after a day in the garage, leading to occasional extra clean‑up.
  core: Ligia Dejesus is a fiercely competitive, art‑infused automotive technician who channels meticulous organization into creative car restorations, worries about every detail, and occasionally loses
    herself in late‑night parts‑shopping binges.
background:
  cultural: Ligia was born to Cuban immigrants who settled in Hialeah during the late 1970s, growing up immersed in the vibrant Cuban enclave of Miami‑Dade County. Spanish is her first language, and she
    maintains strong ties to Cuban traditions—family gatherings, religious festivals, and a deep love for Cuban music and cuisine. At the same time, the multicultural, entrepreneurial spirit of South Florida
    shaped her practical, hands‑on work ethic and drive for professional excellence. This dual cultural identity informs her values of perseverance, family loyalty, and a pragmatic yet creative approach
    to problem‑solving, blending the warmth of her heritage with the competitive ethos of the American automotive industry.
attributes:
  skills: '["Engine diagnostics", "Electrical system troubleshooting", "Transmission repair", "Hybrid/Electric vehicle maintenance", "Classic car restoration", "Automotive painting and custom finishes",
    "ASE certification Level 3", "Diagnostic scan tool operation", "Parts inventory management", "Customer service communication"]'
  hobbies: '["Classic car restoration", "Automotive mural painting", "Photography (automotive focus)", "Cuban music appreciation", "Cooking Cuban cuisine", "Visiting small art galleries", "Chess", "Rooftop
    herb gardening", "Reading automotive trade magazines", "Attending local car shows"]'
  career_goals: Ligia aims to achieve ASE Master Technician certification within the next two years and become a recognized specialist in hybrid and electric vehicle systems, a field she views as the future
    of automotive service. She plans to open a boutique garage that focuses on high‑performance tuning and bespoke classic‑car restorations, allowing her to compete for top honors at regional car shows.
    Additionally, she is eager to mentor aspiring technicians—especially women and members of the Cuban community—through a structured apprenticeship program, channeling her competitive nature into building
    a supportive, skill‑driven network.
