    and safety leadership'', ''Precise flight logbook and documentation management'', ''Risk assessment and emergency response planning'', ''Technical training and mentorship of junior crew'']'
  hobbies: '[''Aerial photography'', ''Sketching and watercolor painting'', ''Scale model aircraft construction'', ''Flight simulation and virtual flight training'', ''Contemporary art gallery visits'',
    ''Science‑fiction reading'', ''Mindfulness meditation'', ''Cooking Southeast Asian dishes'', ''Cycling on local trails'', ''Chess'']'
  career_goals: Luis aims to attain an airline captain seat on a major carrier within the next five years, while also pursuing a type rating for long‑haul wide‑body aircraft. He is eager to transition into
    a safety management role, contributing to data‑driven safety initiatives and mentoring pilots from under‑represented backgrounds. In the longer term, he envisions leading a flight operations department
    or starting a boutique flight‑training school that blends rigorous technical training with an appreciation for diverse cultural perspectives.
