personas:
  professional: Luis Nunez is a disciplined aircraft pilot and flight engineer whose meticulous record‑keeping and calm decision‑making under pressure are enhanced by a curiosity‑driven habit of visualizing
    flight paths through aerial photography, positioning him to earn a major‑carrier captain seat, lead data‑driven safety initiatives, and mentor pilots from under‑represented backgrounds.
  sports: Luis Nunez follows the Detroit Lions and Detroit Tigers, trains with the Grand Rapids Road Runners club for weekend long‑distance runs, skis at Mount Bohemia during winter, and maintains a disciplined
    morning strength routine that counterbalances the sedentary demands of flight duties.
  arts: Luis Nunez regularly attends contemporary art workshops at the Grand Rapids Art Museum, sketching modernist compositions inspired by Anish Kapoor, photographing sunrise over the Michigan dunes in
    the style of Edward Burtynsky, and curates playlists featuring Brian Eno’s ambient soundscapes and Kamasi Washington’s jazz, all of which fuel their creative problem‑solving.
  travel: Luis Nunez prefers meticulously planned micro‑adventures, having captured sunrise over Ha Long Bay, trekked Iceland’s Westfjords, and explored Kuala Lumpur’s night markets to reconnect with family
    recipes, yet they balance these pursuits with a realistic budget that reserves savings for a future long‑haul simulation training trip to Singapore and Europe.
  culinary: Luis Nunez cooks Southeast Asian street‑food such as pho, satay with lemongrass‑infused marinades, and bun cha, demonstrating an intermediate skill level that blends careful recipe replication
    with occasional experimental twists like charcoal‑grilled corn, while also mastering Michigan‑sourced cherry‑wood ribs during weekend gatherings.
  core: Luis Nunez is a methodical aviator with an artistic eye, who combines disciplined career ambition, precise financial planning, proactive health monitoring, and a rich tapestry of creative, athletic,
    and culinary pursuits, all tempered by a solitary yet inquisitive spirit.
background:
  cultural: Luis’s identity is rooted in his Southeast Asian heritage, with family origins in the Philippines. Growing up in Michigan, he balanced traditional customs—celebrating Lunar New Year, speaking
    Tagalog at home, and preparing family recipes—with an American upbringing that emphasized independence and personal achievement. This bicultural experience has fostered a respect for community, a strong
    work ethic, and an openness to diverse perspectives, which he brings to his professional collaborations and personal artistic pursuits.
attributes:
  skills: '[''Commercial Pilot License (CPL) with Instrument Rating'', ''Airline Transport Pilot (ATP) certification (in progress)'', ''Multi-Engine Turboprop and Regional Jet operation'', ''Advanced flight
