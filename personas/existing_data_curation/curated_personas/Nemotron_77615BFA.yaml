personas:
  professional: Avon Jones, a retired civil engineer in Catawba, leverages his structural design and project‑management expertise to mentor high‑school STEM clubs, volunteer as a design consultant for Habitat
    for Humanity, document the county’s engineering heritage, and bridge generations of engineers with compassionate teamwork.
  sports: Avon Jones stays active by fishing on Lake Hickory with the local angling club, walking the community park each morning, and cheering on the Carolina Panthers during football season while occasionally
    attending Charlotte Hornets basketball games, embodying a low‑impact, socially connected approach to fitness.
  arts: Avon Jones finds cultural enrichment in gospel concerts featuring the soulful hymns of Mahalia Jackson and contemporary performances by Kirk Franklin, attends lively Juneteenth celebrations featuring
    storytelling, music, and historical reenactments, and spends evenings reading works by David McCullough and Carl Sagan, weaving music, history, and science into a personal tapestry of artistic appreciation.
  travel: Avon Jones prefers leisurely road trips to historic Southern destinations such as Savannah’s riverfront, the Biltmore Estate in Asheville, and the battlefields of Gettysburg, often planning family
    visits that balance educational tours with restful stays at lake cabins, while dreaming of a future pilgrimage to the Smithsonian museums in Washington, D.C.
  culinary: Avon Jones delights in cooking Southern favorites like shrimp and grits, collard greens simmered with smoked turkey, and peach cobbler, often using home‑grown tomatoes, basil, and fresh herbs
    from his garden, and takes pride in canning tomatoes and making homemade biscuits for church potlucks.
  core: Avon Jones blends a lifelong engineer’s analytical mind with a tender gardener’s patience, a chess‑club strategist’s foresight, and a gospel‑singer’s soul, all while occasionally forgetting to water
    indoor plants when deep in a woodworking project.
background:
  cultural: Avon’s African‑American roots are woven into the fabric of his life in rural North Carolina. Born in the early 1950s, he grew up amid the civil‑rights era, witnessing both the challenges and
    the triumphs of the Black community in the South. Family gatherings centered around soulful gospel music, barbecued cooking, and storytelling, reinforcing a strong sense of intergenerational solidarity.
    His church has been a cornerstone for spiritual guidance and community activism, shaping his deep commitment to service and harmony. Avon embraces Southern Black culinary traditions, from collard greens
    to sweet potato pie, and participates in local Juneteenth events that celebrate emancipation and cultural resilience. He carries forward the legacy of perseverance, education, and community uplift that
    his parents and grandparents championed, blending it with his STEM background to address modern challenges in his hometown.
