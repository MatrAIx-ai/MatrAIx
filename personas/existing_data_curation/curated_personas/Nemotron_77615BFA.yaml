  career_goals: Although officially retired, Avon aims to leave a lasting legacy of knowledge and service in Catawba. He plans to establish a mentorship program linking retired engineers with local high‑school
    students interested in science and trades, offering hands‑on workshops and career guidance. He also hopes to volunteer as a design consultant for Habitat for Humanity projects, ensuring safe, accessible
    housing for low‑income families. Avon aspires to document the engineering history of Catawba County in a series of illustrated articles for the local library, preserving the region’s built heritage
    for future generations. Finally, he wishes to serve on the advisory board of his church’s community center, helping shape programs that promote health, education, and social cohesion.
