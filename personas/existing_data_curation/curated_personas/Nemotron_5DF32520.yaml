    ''Volunteering at Community Center'', ''Organizing Arts and Crafts Workshops'', ''Participating in Book Club'', ''Playing Guitar'']'
  career_goals: Scott aims to advance within the home health and assisted‑living sector, seeking certification as a Certified Nursing Assistant (CNA) within the next year. He aspires to transition to a
    supervisory role where he can design and lead art‑based therapeutic programs for seniors, blending his love of creativity with caregiving. Long‑term, he hopes to enroll in an associate’s degree in health‑services
    administration, positioning himself for a future as a care‑facility manager who promotes a culture of holistic well‑being and community engagement.
