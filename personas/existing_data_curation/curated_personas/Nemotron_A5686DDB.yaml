  career_goals: Though retired, Guillermo aims to keep contributing his expertise by mentoring younger workers through local apprenticeship programs and offering handyman workshops at the senior center.
    He hopes to become a certified home‑safety assessor for elderly residents, share his knowledge of sustainable gardening, and preserve his family's culinary heritage by compiling a cookbook of traditional
    Puerto Rican recipes. Travel to Puerto Rico to reconnect with relatives and document oral histories is also a personal ambition, as is supporting his grandchildren’s education through tutoring and hands‑on
    project assistance.
