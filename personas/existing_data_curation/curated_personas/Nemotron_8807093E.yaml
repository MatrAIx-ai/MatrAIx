  hobbies: '[''Woodworking projects'', ''Reading woodworking and folklore books'', ''Gardening'', ''Cooking Bolivian dishes'', ''Fishing'', ''Model ship building'', ''Listening to Andean music'', ''Participating
    in small community potlucks'']'
  career_goals: Manuel aims to transition his carpentry business from a purely contract‑based operation to a small boutique workshop that showcases reclaimed‑wood furniture and offers occasional hands‑on
    classes for a tight‑knit group of apprentices. He hopes to improve his workflow by introducing a modest inventory system to reduce the stress of disorganization, and to achieve a steadier income that
    allows more time for family and personal pursuits. Long‑term, he dreams of establishing an online presence that highlights his Bolivian‑inspired designs and connects with a broader community of eco‑conscious
    consumers.
