personas:
  professional: Manuel Kelly, a veteran carpenter who blends hand‑tool traditions with CNC technology to craft custom reclaimed‑wood furniture, runs a relaxed yet functional workshop, and is in the process
    of converting his contract‑focused trade into a boutique studio that offers intimate apprenticeships while keeping projects on budget.
  sports: Manuel Kelly enjoys early‑morning fly‑fishing on the nearby lakes, follows the local baseball team the Boise Prospects, and participates in a low‑impact senior cycling group that meets on Saturdays,
    preferring activities that complement a steady, solitary work rhythm.
  arts: Manuel Kelly spends evenings immersed in Andean pan‑flute recordings by Carlos Núñez, constructing scale model ships that echo historic sailcraft, and reading both woodworking treatises and regional
    folk tales, a blend that fuels their quiet creative drive.
  travel: Manuel Kelly favors modest road trips to timber‑rich destinations such as Oregon’s Columbia River Gorge, dreams of strolling through the historic wooden alleys of Bruges, and plans each journey
    around workshop commitments and a careful travel budget.
  culinary: Manuel Kelly's kitchen blends garden harvests of potatoes, corn, and beans with traditional Andean flavors, producing dishes like steamed salteñas and a spiced corn drink called api, while their
    cooking skill ranges from confident sautéing to occasional over‑seasoning when experimenting.
  core: Manuel Kelly is a fifty‑year‑old woodworker who balances curiosity with a relaxed, sometimes disorganized approach, worries about health and finances, misplaces tools frequently, yet finds solace
    in pan‑flute melodies and reclaimed‑wood design.
background:
  cultural: Manuel was born in Cochabamba, Bolivia, and moved to the United States as a young adult. He grew up in a household that blended Spanish colonial and indigenous Aymara traditions, celebrating
    Carnaval de Oruro, Día de los Muertos as observed in Bolivia, and family gatherings centered around music and food. At home, Spanish remains the primary language, and he continues to prepare Bolivian
    dishes such as salteñas, picante de pollo, and api. Living in Tampa, he participates in local Latin American festivals, maintains strong ties to the Bolivian expatriate community, and incorporates his
    cultural heritage into his craft by using reclaimed timber sourced from South American imports and incorporating traditional Andean motifs in his designs.
attributes:
  skills: '[''Custom furniture making'', ''Cabinetry'', ''Residential framing'', ''Blueprint interpretation'', ''CNC routing basics'', ''Wood finishing and staining'', ''Estimating and quoting'', ''Client
