personas:
  professional: Wesley Roper, a physical therapist assistant in a fast‑growing Chattanooga outpatient clinic, blends meticulous musculoskeletal assessments and manual therapy with a curiosity‑driven habit
    of trialing new rehab tech while maintaining a practical focus on measurable patient outcomes and a skeptical eye toward insurance paperwork, and they thrive in a team environment that satisfies their
    competitive drive to exceed treatment benchmarks.
  sports: Wesley Roper, a regular participant in Chattanooga’s pickup basketball and flag‑football leagues, a member of the local mountain‑bike club “River Trail Riders,” and an avid fan of the Tennessee
    Titans and the Chattanooga Lookouts, channels their competitive energy into weekly trail‑runs at Lookout Mountain while supporting the Nashville Predators during the hockey season.
  arts: Wesley Roper, an active contributor to Chattanooga’s live‑music scene, often grabs his acoustic guitar for impromptu jam sessions after open‑mic nights at The 2nd Stage, draws inspiration from John Mayer,
    Bob Dylan, and Hozier, and occasionally attends theater productions at the Tivoli Theatre, using music as a social outlet that balances their analytical professional side.
  travel: Wesley Roper, who plans escapes with a mix of spontaneity and checklist precision, frequently road‑trips to Asheville, NC for craft breweries, spends long weekends hiking the Blue Ridge Parkway,
    dreams of mountain‑biking the Moab desert trails, and has a bucket‑list destination of the Swiss Alps to test high‑altitude training, all while budgeting carefully to fit travel around their professional
    development goals.
  culinary: Wesley Roper, a moderate home‑cook who loves post‑workout meals, frequently prepares grilled salmon with lemon‑dill sauce, whips up protein‑packed smoothies featuring banana, spinach, whey,
    and occasionally indulges in Nashville hot chicken and smoked brisket at local BBQ joints, while mastering the art of meal‑prepping quinoa salads with roasted sweet potatoes and feta, and they enjoy
    experimenting with fresh herbs and spices to keep meals interesting.
  core: Wesley Roper channels their competitive, curious spirit into a balanced life of high‑performance rehab work, community sports, jam sessions, and disciplined finances, while occasionally overlooking
    self‑care details like dental visits.
background:
  cultural: Raised in a middle‑class family in the suburban outskirts of Chattanooga, Wesley grew up immersed in the region’s blend of Appalachian and river‑valley culture. His upbringing emphasized community
    involvement, self‑reliance, and a respect for both tradition and progress, which shaped his practical yet curious outlook. He was exposed to Southern hospitality through family gatherings and local
    events, fostering strong interpersonal skills and a comfort with group settings. The city’s growing arts and outdoor recreation scenes broadened his horizons, encouraging an appreciation for diverse
    perspectives while maintaining his roots in Southern values of hard work and modesty. These cultural influences inform his approach to patient care, emphasizing empathy, clear communication, and a balanced
    respect for evidence‑based practice and individualized treatment.
attributes:
  skills: '[''Musculoskeletal assessment'', ''Therapeutic exercise prescription'', ''Manual therapy (joint mobilization, soft‑tissue massage)'', ''Application of modalities (ultrasound, electrical stimulation)'',
    ''Gait and functional training'', ''Assistive device fitting and training'', ''Electronic health record documentation'', ''Patient communication and education'', ''Problem‑solving and treatment plan
    adaptation'', ''Professional skepticism and insurance verification'']'
  hobbies: '[''Pickup basketball'', ''Flag‑football'', ''Hiking Lookout Mountain'', ''Mountain biking on the Tennessee River greenway'', ''Trail‑running in state parks'', ''Playing acoustic guitar and attending
    live‑music events'', ''Volunteering as first‑aid coordinator for charity runs'', ''Leading wellness workshops'', ''Reading popular science books on biomechanics'', ''Attending workshops on emerging
    rehab technologies'']'
  career_goals: Driven by his curiosity about advanced rehabilitation techniques and his practical desire to see tangible patient outcomes, Wesley aims to transition from a PTA role to a licensed Physical
    Therapist within the next five years by completing a Bachelor of Science in Physical Therapy and subsequently a Doctor of Physical Therapy (DPT) program. He seeks certification in orthopaedic manual
    therapy and sports rehabilitation to specialize in treating athletes and active adults, a segment he often works with in Chattanooga’s vibrant outdoor community. Wesley aspires to become a lead clinician
    at a multidisciplinary sports medicine clinic, where he can mentor junior PTAs and contribute to the development of community wellness programs, such as injury‑prevention workshops for local schools
    and recreational leagues. Long‑term, he envisions opening his own outpatient practice focused on evidence‑based, high‑performance rehabilitation, integrating technology like wearable motion sensors
    to personalize care.
