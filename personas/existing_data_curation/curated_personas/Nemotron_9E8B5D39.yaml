personas:
  professional: Maria Sanchez is a budding junior architect who spends afternoons building intricate LEGO cityscapes, drafting floor plans in her sketchbook, and solving Sudoku puzzles to sharpen her logical
    thinking, all while meticulously logging project steps in her journal to ensure each creation follows a clear, structured process.
  sports: Maria Sanchez plays on the Metro Sprinters youth soccer team, attends weekly gymnastics sessions at the KidsFit club, follows the Metro City Mariners baseball and Metro City Hawks basketball professional
    teams on TV, and channels their love of rhythm into Spanish dance lessons every Saturday, preferring the predictable schedule of organized practice over spontaneous play.
  arts: Maria Sanchez spends her after-school hours drawing in the vibrant style of Dr. Seuss and Pixar, rehearses Flamenco steps to the guitar melodies of Paco de Lucia during Spanish dance class, draws
    inspiration from Hayao Miyazaki's Spirited Away scenes, and enjoys listening to Kidz Bop's kid-friendly covers of Taylor Swift alongside the whimsical soundtrack of Disney's Moana.
  travel: Maria Sanchez enjoys family road trips that follow a detailed itinerary they help create in their journal - recalling a recent week-long visit to Grand Canyon National Park with scheduled sunrise
    hikes, a day spent at the National Air and Space Museum in Washington D.C., and dreaming of a future vacation to Paris to see the Eiffel Tower and explore the Louvre, balancing a love for structured
    plans with a pinch of adventure.
  culinary: Maria Sanchez prefers familiar comfort foods such as cheddar macaroni and cheese, pepperoni pizza loaded with mozzarella, and chicken nuggets with ketchup; they delight in strawberry-yogurt
    smoothies blended with banana and honey, can independently assemble a peanut-butter-and-jelly sandwich or stir a simple tomato-sauce pasta with their Mom, yet stubbornly refuses plain broccoli, opting
    instead for carrot sticks dipped in ranch dressing.
  core: Maria Sanchez is a methodical nine-year-old who balances a love for structured LEGO builds and meticulous journaling with occasional impulsive sticker splurges, turning everyday routine into a well-planned
    adventure.
background:
  cultural: Maria grows up in a Mexican‑American household in Fontana, California. Spanish is spoken at home, and she celebrates cultural traditions such as Día de los Muertos, Cinco de Mayo, and family
    gatherings centered around foods like tamales and pozole. Her family places a high value on education and community involvement, often participating in local church events and neighborhood festivals.
    The blend of Mexican heritage and Southern California life shapes her bilingual identity and appreciation for both cultures.
attributes:
  skills: '[''Spanish-English bilingualism'', ''Reading comprehension'', ''Grade-level mathematics'', ''Basic coding with Scratch'', ''Organizational skills'', ''Drawing and crafts'', ''Cooperative teamwork
    in small groups'']'
  hobbies: '[''Reading chapter books'', ''Puzzle solving (jigsaw, Sudoku)'', ''LEGO building'', ''Drawing and painting'', ''After‑school art club'', ''Spanish dance lessons'', ''Sticker collecting'', ''Journaling
    and planning'']'
  career_goals: Maria dreams of becoming a teacher or a veterinarian. She aims to attend a high school with strong science and language programs, then pursue a college degree in education or animal science.
    She values a stable, structured career where she can help children learn or care for animals, and hopes to give back to her community.
