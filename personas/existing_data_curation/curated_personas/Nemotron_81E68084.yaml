personas:
  professional: Brianna Sheard is a driven insurance sales strategist who blends data‑driven risk assessment, Salesforce expertise, and persuasive presentations to consistently exceed quotas, while her
    competitive streak and occasional skepticism push her to rigorously validate client assumptions and guard against bias in policy recommendations.
  sports: Brianna Sheard is an avid participant in a Fort Lauderdale beach volleyball league, a weekly runner who maps her miles along the A1A promenade, and a dedicated fan of the Miami Heat (NBA), Miami
    Dolphins (NFL), and Tampa Bay Rays (MLB), balancing a competitive mindset on the sand with the calming rhythm of ocean‑front jogs.
  arts: Brianna Sheard immerses herself in the sounds of Alicia Keys, John Legend, and classic reggae icons like Bob Marley while painting vibrant abstracts inspired by Caribbean sunsets, and she regularly
    drops into local soul‑music venues to catch live performances by up‑and‑coming R&B singers.
  travel: Brianna Sheard prefers meticulously planned weekend getaways that blend cultural immersion with relaxation, having already explored the historic streets of Kingston, the serene lagoons of the
    Everglades, and the colorful art deco of Miami Beach, while dreaming of a future sailing trip to the Bahamas that balances adventure with a modest travel budget.
  culinary: Brianna Sheard’s kitchen is a hub of Caribbean‑flavored comfort, where she skillfully whips up jerk chicken marinated with Scotch bonnet peppers, simmers creamy ackee and saltfish with coconut
    milk, and bakes Southern collard‑green gratin alongside a sticky sweet‑potato pie, showcasing an intermediate cooking level driven by both nostalgia and a desire to share cultural stories through food.
  core: Brianna Sheard is a driven insurance professional who juggles fierce ambition, a love for reggae‑infused cooking, and a perpetual battle with anxiety, often finding balance by yoga, chess, and spontaneous
    coffee runs.
background:
  cultural: Brianna identifies as African American with strong ties to the Afro‑Caribbean community in South Florida; her mother immigrated from Jamaica and her father is a native Floridian of African‑American
    heritage. Growing up in Fort Lauderdale, she was immersed in a vibrant mix of gospel, reggae, and R&B music, and participated in church and neighborhood festivals that celebrated Black culture. These
    experiences shaped her culinary tastes, love for storytelling, and commitment to community service. As a Black woman in the insurance industry, she navigates both subtle bias and representation challenges,
    which fuels her ambition to mentor other women of color and promote financial equity within her cultural community.
attributes:
  skills: '[''Commercial Lines Insurance Sales'', ''Personal Auto and Home Insurance'', ''Risk Assessment'', ''Customer Relationship Management'', ''Negotiation and Persuasion'', ''CRM Software (e.g., Salesforce)'',
    ''Data Analysis'', ''Public Speaking'', ''Conflict Resolution'', ''Time Management'']'
  hobbies: '[''Yoga'', ''Beach Walks'', ''Reading Contemporary Fiction'', ''Cooking Afro-Caribbean Cuisine'', ''Journaling'', ''Playing Chess'', ''Volunteering at Community Centers'', ''Attending Live Music
    Events'', ''Exploring Coffee Shops'', ''Painting'']'
  career_goals: Brianna aims to rise to a senior leadership role within her agency, eventually becoming a regional sales manager overseeing a high‑performing team. She plans to earn the Chartered Property
    Casualty Underwriter (CPCU) designation and expand her expertise into life and annuity products to broaden her client portfolio. Passionate about financial empowerment, she envisions launching community‑focused
    workshops that improve insurance literacy among Black and Afro‑Caribbean residents of Broward County. While she strives for top‑tier sales performance and lucrative bonuses, she also seeks to create
    a more balanced workflow that mitigates stress and supports her personal well‑being.
