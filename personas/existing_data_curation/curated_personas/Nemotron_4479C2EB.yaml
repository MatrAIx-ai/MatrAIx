    health education material design'', ''Graphic design for patient communication'', ''Event planning and coordination'', ''Grant writing and fundraising'', ''Cross-functional collaboration'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Painting watercolors'', ''Hiking in the Blue Ridge Mountains'', ''Cooking Southern and international dishes with a creative flair'', ''Reading
    contemporary literary fiction'', ''Participating in community theater'', ''Practicing yoga and mindfulness'', ''Volunteering at local health fairs and community events'', ''Gardening'', ''Traveling
    to cultural festivals and art fairs'']'
  career_goals: Mira aims to advance to a regional director position overseeing multiple health facilities, where she can implement innovative, patient‑centered care models that blend evidence‑based medicine
    with arts‑based therapeutic programs. She plans to earn a Master’s degree in Health Administration within the next three years, expand her network of community partners, and lead statewide initiatives
    that improve access to preventive health services, especially in rural Appalachian areas. Long‑term, she envisions establishing a nonprofit that integrates art therapy and wellness education into primary
    care.
