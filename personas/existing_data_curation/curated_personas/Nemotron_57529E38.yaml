  hobbies: '[''Puzzle Solving'', ''Chess'', ''Non‑fiction Reading'', ''Journaling'', ''Jogging'', ''Community Fitness Classes'', ''Cooking (Soul Food & Caribbean Influences)'', ''Jazz & Spoken‑Word Events'',
    ''Volunteering at Community Center'', ''Urban Photography'']'
  career_goals: Lawrence aims to leverage his frontline administrative experience to move into a supervisory role such as Office Manager or Administrative Team Lead within a nonprofit serving the Bronx
    community. Over the next five years he plans to complete a bachelor's degree in Business Administration while obtaining a Certified Administrative Professional (CAP) credential. He aspires to design
    and implement efficient office systems, mentor junior staff, and contribute to program coordination that directly benefits underserved residents. A key ambition is to secure a position that offers predictable
    schedules, clear performance metrics, and supportive structures that help him manage workplace stress and maintain a healthy work‑life balance.
