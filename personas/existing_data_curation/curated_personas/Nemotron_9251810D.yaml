personas:
  professional: Dwayne Nwaobi, a retired carpenter turned community oral‑history curator, leverages their decades of hands‑on building expertise, meticulous budgeting skill, and deep art‑history knowledge
    to organize volunteer events at a senior center, mentor apprentices, and plan a inaugural exhibition of diaspora artwork, all while methodically documenting stories for a forthcoming memoir.
  sports: Dwayne Nwaobi follows the Brooklyn Nets and the New York Yankees with fervor, attends community walking groups at Prospect Park, and practices light Tai Chi at the senior center, preferring low‑impact
    activities that keep them active without straining their joints.
  arts: Dwayne Nwaobi spends Saturdays at the Brooklyn Museum and the Studio Museum, absorbing exhibitions featuring artists like Kara Walker, Jean‑Michel Basquiat, and contemporary photographer Ayana V.
    Jackson, while their vinyl collection spins Miles Davis, John Coltrane, and B.B. King, informing lively discussions in their book club and community talks.
  travel: Dwayne Nwaobi prefers curated day trips that blend cultural immersion and gentle pacing, having trekked the historic streets of Philadelphia, the gardens of the Hudson Valley’s Storm King Art
    Center, and the jazz heritage sites of New Orleans, while planning future visits to the National Gallery of Art in Washington, D.C., and the coastal town of Montauk for its serene sunrise walks.
  culinary: Dwayne Nwaobi delights in preparing simple yet flavorful dishes such as roasted rosemary chicken, spiced lentil soup with turmeric and cumin, and a comforting bowl of homemade oatmeal topped
    with fresh berries, while occasionally indulging in a perfectly grilled steak with a peppercorn crust, and they relish pairing meals with a glass of citrusy Sauvignon Blanc.
  core: Dwayne Nwaobi is a methodical, curious elder whose life intertwines meticulous craftsmanship, a deep love for art and community storytelling, and a vigilant yet occasionally worrisome approach to
    health and finances, all flavored by quiet hobbies like chess, jazz vinyl spins, and balcony gardening.
background:
  cultural: Dwayne is a first‑generation American of Igbo Nigerian descent, raised in a close‑knit Black community in Brooklyn. His family preserves traditional Igbo customs—such as storytelling, music,
    and cooking dishes like jollof rice—while also embracing African‑American cultural practices, including church fellowship and community block parties. This bicultural heritage fuels his deep appreciation
    for African diaspora art and his commitment to preserving community history. He often blends Nigerian proverbs with contemporary American perspectives in his conversations and writings, reflecting a
    rich, hybrid cultural identity.
attributes:
