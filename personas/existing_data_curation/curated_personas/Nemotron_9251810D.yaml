  hobbies: '[''Visiting Art Galleries and Museums'', ''Reading Art, Philosophy, and History Books'', ''Journaling and Memoir Writing'', ''Urban Gardening'', ''Playing Chess'', ''Solving Crossword Puzzles'',
    ''Listening to Jazz and Blues'', ''Small Book Club Participation'', ''Mindfulness Meditation'']'
  career_goals: Although retired, Dwayne aims to compile a community oral‑history archive that captures the stories of Brooklyn’s Black elders, and hopes to publish a memoir reflecting his journey from
    Nigeria‑rooted family traditions to life in Brooklyn. He also aspires to mentor younger community members interested in trade skills, and to curate a small exhibition showcasing African diaspora artwork
    at his local senior center. Continuing his education through evening art‑history courses and maintaining his mental‑wellness routine are also key personal ambitions.
