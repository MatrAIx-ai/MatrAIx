personas:
  professional: Ramona Perez is a methodical UI/UX designer who blends data‑driven user research, bilingual interview techniques, and a competitive edge to build accessible design systems and front‑end
    prototypes that serve multilingual audiences at scale.
  sports: Ramona Perez hikes the Blue Ridge trails of Shenandoah weekly, attends Vinyasa yoga classes at a downtown studio, cheers for the Washington Capitals in the NHL, and joins a co‑ed soccer league
    with friends on Saturday afternoons.
  arts: Ramona Perez creates bold, folk‑inspired digital illustrations, draws aesthetic cues from James Turrell’s light installations and Refik Anadol’s data‑driven art, frequents VR/AR exhibitions at the
    Smithsonian’s Future Design Lab, and reads speculative fiction by N.K. Jemisin and Ted Chiang for creative brainstorming.
  travel: Ramona Perez meticulously plans cultural trips—she’s photographed Alexandria’s historic streets, explores DC’s museum corridors, dreams of wandering Mexico City’s markets, strolling through Barcelona’s
    Gothic Quarter, and meditating in Kyoto’s zen gardens—while also booking spontaneous weekend drives to Shenandoah for landscape photography.
  culinary: Ramona Perez enjoys cooking pastelitos filled with masa, refried beans, and queso fresco, spices them with cumin and cilantro, masters the art of making perfect baleadas, and balances traditional
    flavors with occasional experimentation on vegan ramen bowls featuring miso broth and shiitake mushrooms.
  core: Ramona Perez fuses analytical rigor with vibrant artistic flair, channels competitive ambition into meticulous design work, relies on yoga and coffee to stay balanced, and occasionally wrestles
    with insomnia when deadlines loom.
background:
  cultural: Ramona is a first‑generation American of Honduran descent, raised in the vibrant multicultural environment of the Washington, D.C. metropolitan area. Fluent in both Spanish and English, she
    maintains close ties to the Honduran diaspora community, celebrating traditions such as Feria de San Juan, cooking family recipes, and listening to Marimba and punta music. Her cultural upbringing instilled
    a strong sense of family, community resilience, and storytelling, which she weaves into her design work through vivid color palettes and narrative‑driven user experiences. The blend of Honduran cultural
    values with her STEM education fuels her analytical rigor and creative curiosity, while her experience navigating two cultures has sharpened her sensitivity to inclusive design for multilingual audiences.
attributes:
  skills: '[''UI/UX design'', ''User research & usability testing'', ''Wireframing & prototyping'', ''Responsive and mobile‑first design'', ''Accessibility compliance (WCAG)'', ''Front‑end development (HTML5,
    CSS3, JavaScript, React)'', ''Design systems & component libraries'', ''Visual design with Adobe Creative Suite and Figma'', ''Data visualization for user metrics'', ''Agile/Scrum project management'',
    ''Bilingual user interview facilitation (Spanish/English)'', ''Cross‑cultural design sensitivity'']'
  hobbies: '[''Sketching and digital illustration'', ''Photography'', ''Visiting contemporary art galleries and VR/AR installations'', ''Cooking Honduran cuisine (baleadas, pastelitos)'', ''Learning and
    dancing to punta music'', ''Hiking in Shenandoah National Park'', ''Yoga'', ''Reading design theory and speculative fiction'', ''Mentoring immigrant youth in tech'', ''Participating in design hackathons'',
    ''Bilingual language exchange meetups'']'
  career_goals: Ramona’s career ambition is to become a senior design leader who shapes inclusive, accessible digital experiences at scale. In the next three years she aims to lead a multidisciplinary UI/UX
    team within a tech company in the Washington‑Baltimore corridor, championing design systems that serve diverse, multilingual user bases. She plans to earn a Certified Professional in Accessibility (CPACC)
    credential, publish research on culturally responsive design, and speak at industry conferences. Long‑term, she envisions launching her own consultancy focused on UX strategy for Latinx and underrepresented
    communities, while mentoring emerging designers through local meetups and university programs.
