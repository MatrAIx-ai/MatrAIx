  career_goals: Although officially retired, Jessica aims to keep her mind sharp and her contributions visible. She plans to expand her volunteer bookkeeping services for seniors, positioning herself as
    a trusted, detail‑oriented resource while maintaining a healthy skepticism toward unsolicited offers. She also intends to launch a modest online shop selling hand‑knit scarves and preserves from her
    garden, viewing the venture as a friendly competition with other local artisans. A personal wellness goal is to complete a senior anxiety‑management program, using journaling and mindfulness to mitigate
    her intense emotional reactions and preserve her independence.
