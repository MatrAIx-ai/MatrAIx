personas:
  professional: Cheryl Ortiz, a 25‑year‑old aerospace engineer with a knack for blending aerodynamic rigor and visual design, leverages her solid CFD and CAD expertise alongside her love for art to craft
    sleek, sustainable propulsion concepts, and she thrives in collaborative team settings by channeling her curiosity and assertive communication into leading multidisciplinary design reviews.
  sports: Cheryl Ortiz energizes her weekends with beach volleyball matches at the Orlando Beach Volleyball Association, hits the trails with the Winter Park Hiking Club during cooler months, and stays
    socially active by salsa dancing, while cheering on the Orlando Magic and Orlando City SC whenever their seasons run.
  arts: Cheryl Ortiz channels her creative impulse into watercolor paintings inspired by the immersive installations of Yayoi Kusama and the bold stencil work of Banksy, regularly performs improv scenes
    at the Winter Park Improv Collective, and finds artistic solace in modern art museums such as the Orlando Museum of Art, while her playlist frequently features the theatrical rhythms of Lin‑Manuel Miranda
    and the soulful vocals of Hozier.
  travel: Cheryl Ortiz curates a blend of cultural immersion and culinary experimentation in her travels, having trekked the Everglades, explored the vibrant street art of Barcelona, sampled sushi in Tokyo,
    and road‑tripped along the Florida Keys, while day‑dreaming about a future solo expedition to Iceland’s volcanic landscapes where she could test sustainable drone technology.
  culinary: Cheryl Ortiz, an amateur chef with a flair for fusion, spends weekend evenings perfecting dishes like Korean‑inspired quinoa kimchi bowls, Caribbean‑infused jambalaya with plant‑based sausage,
    and experimentally herbs‑sprinkled avocado toast, often sourcing fresh basil, smoked paprika, and heirloom tomatoes from the Winter Park farmers market to fuel her palate.
  core: Cheryl Ortiz fuses aerospace precision with artistic spontaneity, constantly juggling meticulous engineering calculations and impulsive sketch‑sessions while battling a habit of over‑thinking every
    detail and an occasional caffeine‑induced sleepless night.
background:
  cultural: Cheryl’s cultural background is rooted in a white, middle‑class American family with Irish‑German ancestry. Raised in the suburban community of Winter Park, Florida, she grew up in an environment
    that blends Southern hospitality with a vibrant local arts scene. Her upbringing emphasized both academic achievement and artistic expression, reflecting the region’s mix of traditional American values
    and the multicultural influences of Orange County, including Latin American and Caribbean cultural elements. Family traditions such as celebrating Thanksgiving, the Fourth of July, and participation
    in the annual Winter Park Art Festival have shaped her appreciation for community, creativity, and collaborative spirit.
attributes:
  skills: '["Aerodynamic analysis", "Computational Fluid Dynamics (CFD)", "3D CAD modeling (SolidWorks, CATIA)", "Structural analysis", "Propulsion system design", "MATLAB", "Python programming", "C++ programming",
