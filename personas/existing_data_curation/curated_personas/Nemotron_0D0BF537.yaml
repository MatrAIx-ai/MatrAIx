  career_goals: Cheryl aims to earn a Master’s degree in Aerospace Engineering within the next three years, focusing on sustainable propulsion and electric aircraft. She aspires to become a senior design
    engineer leading a multidisciplinary team on next‑generation UAV or space‑flight projects at a leading aerospace firm such as SpaceX, Blue Origin, or a defense contractor. In the longer term, she envisions
    moving into a technical management role where she can mentor junior engineers, drive innovation at the intersection of engineering and design, and contribute to industry standards for environmentally
    friendly aerospace technologies. She also hopes to publish research on aerodynamic efficiency and present her work at international conferences.
