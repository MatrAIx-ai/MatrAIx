  career_goals: Approaching retirement, Tommy aims to transition into a senior administrative coordinator role that allows him to mentor junior staff and lead process‑improvement projects within his organization.
    He seeks a position that balances responsibility with flexibility, such as a part‑time executive assistant or consultant for local non‑profits, enabling him to share his expertise while maintaining
    a predictable schedule. Additionally, Tommy plans to complete a short certification in project management to enhance his ability to oversee community‑based initiatives. Ultimately, his goal is to secure
    a stable, low‑stress role that leverages his extensive experience and provides a smooth financial transition into full retirement.
