  hobbies: '[''Powwow and storytelling participation'', ''Beadwork and traditional crafts'', ''Community gardening'', ''Walking and hiking in parks'', ''Cooking traditional dishes'', ''Reading historical
    fiction and oral histories'', ''Playing bridge'', ''Visiting museums with indigenous art'', ''Yoga'', ''Senior‑center dance classes'', ''Volunteer event organization at the American Indian Community
    House'']'
  career_goals: As a retired professional, Chantil’s current ambitions focus on using her expertise to empower her community and future generations. She aims to mentor American Indian youth interested in
    STEM, partnering with local schools and after‑school programs to provide guidance, tutoring, and exposure to scientific careers. She aspires to lead a sustainable community garden in her neighborhood
    that incorporates traditional ecological knowledge and serves as an educational platform. Additionally, she plans to document oral histories of her tribe and contribute to museum exhibitions, ensuring
    authentic representation of indigenous perspectives. While she does not seek formal employment, she intends to serve on advisory boards of cultural and environmental organizations, advocate for policies
    that support indigenous rights, and continue volunteering in leadership roles.
