  hobbies: '[''Reading non‑fiction'', ''Cooking Puerto Rican dishes'', ''Gardening herbs and peppers'', ''Woodworking projects'', ''Playing acoustic guitar'', ''Listening to Latin jazz and salsa'', ''Attending
