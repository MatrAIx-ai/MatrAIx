personas:
  professional: Marlen Torres, a 28‑year‑old house‑cleaning specialist, blends meticulous deep‑cleaning expertise with an eco‑friendly mindset, leveraging bilingual communication to win trust while navigating
    a flexible schedule that sometimes challenges they ability to meet deadlines, all in pursuit of a supervisory role and a future boutique cleaning brand.
  sports: Marlen Torres follows the Tampa Bay Lightning, Tampa Bay Buccaneers, and Tampa Bay Rays avidly, participates in a community adult soccer league on weekends, and balances solo trail hikes in Alafia
    River State Park with occasional weekend bike rides, embodying a flexible fitness routine that mirrors their adaptable work style.
  arts: Marlen Torres immerses themselves in jazz by listening to Arturo Sandoval and contemporary salsa playlists, enjoys reading novels by Colson Whitehead and Chimamanda Ngozi Adichie, and attends local
    performances at the Straz Center, where they occasionally take beginner salsa lessons that satisfy both their social and artistic cravings.
  travel: Marlen Torres prefers spontaneous weekend getaways, often driving to nearby Charleston and Savannah for historic strolls, while dreaming of a cultural immersion trip to Barcelona’s vibrant markets
    and a nature retreat in Costa Rica, balancing limited savings with a flexible work schedule that allows last‑minute travel plans.
  culinary: Marlen Torres, an enthusiastic home cook, masters a healthier twist on classic slow‑cooked shredded beef stew with plantain mash, frequently incorporates cumin, cilantro, and roasted bell peppers,
    and delights in preparing tostones and aromatic arroz con pollo, showcasing a moderate skill level that blends tradition with wellness.
  core: Marlen Torres is a curious yet practical cleaning pro who balances eco‑friendly hustle, spontaneous salsa nights, and a dream of launching a sustainable boutique service, all while juggling occasional
    disorganization and a love for flavorful, wholesome cooking.
background:
  cultural: 'Marlen is a first‑generation Cuban‑American who grew up in a bilingual household in Tampa’s historic Ybor City area. Her family maintains strong ties to Cuban traditions, celebrating events
    such as Carnaval, San Juan, and family gatherings that feature music, dance, and home‑cooked meals. The blend of Cuban heritage and Floridian lifestyle shapes her values: a deep sense of community,
    a hard‑working ethic, and a love for sharing her culture through food and celebration. Her fluency in Spanish and familiarity with Cuban customs enrich her interactions with clients and community members
    alike.'
attributes:
  skills: '["Deep cleaning techniques", "Eco‑friendly product usage", "Laundry and fabric care", "Floor polishing and maintenance", "Basic home repairs (plumbing, electrical)", "Bilingual communication
    (Spanish/English)", "Customer service and relationship building", "Adaptability to varied household routines"]'
  hobbies: '["Salsa dancing", "Cooking Cuban cuisine", "Exploring Tampa nature trails", "DIY home‑improvement projects", "Reading contemporary fiction", "Listening to Latin jazz", "Volunteering at community
    cultural festivals"]'
  career_goals: Marlen aims to advance from a solo housekeeping role to a supervisory position within a reputable cleaning company, eventually earning a Certified Professional Cleaner credential. She is
    interested in launching her own boutique cleaning service that emphasizes sustainable practices and serves the Cuban‑American community in Tampa. To support these ambitions, she plans to enroll in night
    courses for a certificate in facilities management and to complete her GED. She also hopes to mentor new cleaners, sharing both her practical expertise and her enthusiasm for learning new techniques.
