  career_goals: Ines aspires to turn her passion for art into a career as a visual designer or illustrator. She dreams of attending a college with a strong BFA program, eventually working in graphic design
    for culturally focused media or creating murals that celebrate Mexican heritage in her community. She also hopes to combine her artistic skills with technology by exploring interactive media and possibly
    pursuing a role in user experience design. In the short term, she aims to earn a scholarship for a summer art program, build a portfolio of her work, and secure an internship with a local art studio
    or museum education department.
