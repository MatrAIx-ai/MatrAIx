personas:
  professional: Ines Saladrigas, a 15‑year‑old aspiring visual artist, blends mixed‑media experimentation with community storytelling, and they channel the rhythm of daily life in the Central Valley into
    vibrant sketchbook pages that double as mini‑exhibitions at her school art club.
  sports: Ines Saladrigas enjoys after‑school soccer with a local youth league, cheers on the Sacramento River Cats during weekend games, and finds balance by running cross‑country routes that double as
    photo walks through the valley’s farmlands, preferring the focused solitude of early‑morning jogs to large crowd events.
  arts: Ines Saladrigas immerses themselves in visual storytelling, drawing inspiration from muralist Diego Rivera, painter Frida Kahlo, folk singer Lila Downs, indie musician Phoebe Bridgers, and graphic
    novels such as Persepolis and Saga, while sharing insights at a local library book club that explores the intersection of art and narrative.
  travel: Ines Saladrigas prefers modest road trips that blend family visits and nature, like weekend drives to Yosemite for sunrise photography and annual journeys to a grandparents’ hometown in Oaxaca
    for Día de los Muertos celebrations, while dreaming of a solo backpacking adventure through the mural‑rich streets of San Miguel de Allende.
  culinary: Ines Saladrigas helps craft homemade tamales, pozole, and fresh corn tortillas alongside their family, mastering the simmering of chiles for a rich mole rojo, and they enjoy experimenting with
    avocado‑lime salsa on grilled fish, always insisting that a pinch of smoked paprika is the secret to perfect sopes.
  core: Ines Saladrigas is a curious, solitary teen who fuses vibrant mixed‑media art with community roots, channels cultural rituals into every sketch, balances disciplined saving with occasional splurges,
    manages acne and allergies with periodic diligence, and finds quiet joy in soccer runs, indie music, and family‑cooked flavors.
background:
  cultural: Ines comes from a Mexican immigrant family that has lived in the Central Valley for generations, with deep ties to the agricultural landscape of Turlock. She grows up bilingual, celebrating
    traditions such as Día de los Muertos and the annual quinceañera, while also navigating a multicultural Californian environment. Her family’s stories of farm work and community solidarity shape her
    appreciation for collective effort and social justice. Mexican visual culture—including muralism, folk art, and vibrant color palettes—strongly influences her artistic style and drives her desire to
    honor her heritage through her creations.
