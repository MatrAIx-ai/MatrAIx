personas:
  professional: Jordan Jones, an aspiring community curator with a humanities background, channels their curiosity and collaborative spirit into designing pop‑up exhibitions that spotlight regional narratives,
    leveraging clear writing, basic graphic design, and a relaxed, occasionally disorganized workflow while asserting themselves in meetings to champion ideas they believe in.
  sports: Jordan Jones, a fan of the Birmingham Barons and occasional pickup basketball games at the community center, finds balance by hiking the nearby forests on weekends, preferring low‑key cardio over
    structured gym routines.
  arts: Jordan Jones, a sketch‑loving visual enthusiast who journals poetry and plays acoustic guitar, draws inspiration from artists like Edward Hopper, musicians such as Miles Davis and B.B. King, and
    frequents the Birmingham Museum of Art and local mural walks to fuel their creative projects.
  travel: Jordan Jones prefers spontaneous, budget‑friendly road trips to culturally rich Southern towns like Savannah, New Orleans, and Asheville, dreaming of a future art‑focused pilgrimage to Paris’s
    Musée d’Orsay while often planning trips only a week in advance.
  culinary: Jordan Jones enjoys cooking simple Southern‑inspired dishes like shrimp and grits, collard greens with smoked paprika, and sweet tea, experimenting with fresh herbs like rosemary and thyme,
    though they sometimes forget to clean up the kitchen after late‑night meals.
  core: Jordan Jones, a 25‑year‑old art‑obsessed thinker, balances a restless worry‑prone mind with a love for solitary hikes, sketching, and curating community exhibitions, all while battling a habit of
    disorganized scheduling and occasional impulsive spending.
background:
  cultural: Jordan grew up in the Black community of central Alabama, where Southern traditions and African‑American heritage intersect daily. Family gatherings often featured storytelling, gospel singing,
    and shared meals, reinforcing a deep respect for oral history and communal support. His parents emphasized education and cultural pride, encouraging him to explore both his local roots and broader artistic
    movements. This upbringing instilled an appreciation for the resilience and creativity of Black Southerners, which now informs his artistic lens. While his small‑town environment can feel limiting,
    it also offers a close‑knit network that values authenticity and mutual aid—values Jordan carries into his aspirations to uplift other local artists and preserve regional Black cultural narratives.
attributes:
  skills: '[''Art History Research'', ''Critical Writing'', ''Curatorial Planning'', ''Digital Photography'', ''Graphic Design Basics'', ''Social Media Content Creation'', ''Community Outreach'', ''Public
