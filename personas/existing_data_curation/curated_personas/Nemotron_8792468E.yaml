  hobbies: '[''Sketching'', ''Reading literature and poetry'', ''Creative journaling'', ''Visiting art galleries and museums'', ''Listening to jazz, blues, and gospel'', ''Playing acoustic guitar'', ''Digital
    photography'', ''Hiking in local nature trails'', ''Meditation'', ''Cooking experimental meals with his spouse'']'
  career_goals: Jordan aims to transition from his current period of unemployment into a role that merges his academic background with his passion for community art. His short‑term goal is to secure a freelance
    curatorial fellowship with the Birmingham Museum of Art or a local cultural center, where he can design pop‑up exhibitions that reflect Black Southern narratives. Long‑term, he envisions establishing
    a community‑based arts hub in Sterrett that offers workshops, mentorship for emerging Black artists, and collaborative projects that foster cultural dialogue. He also hopes to pursue a master's degree
    in museum studies to deepen his expertise and increase his professional credibility.
