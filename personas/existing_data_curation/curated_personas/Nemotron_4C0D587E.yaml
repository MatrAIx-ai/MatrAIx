  career_goals: Tiffany aims to move beyond the sales floor into leadership roles within the retail sector. In the short term she seeks an assistant manager position to gain experience in staff scheduling,
    coaching, and loss‑prevention. Over the next five years she plans to earn a retail management certification and advance to store manager, where she can shape visual merchandising strategies and drive
    regional sales performance. Long‑term, she envisions opening her own boutique that blends curated clothing with local artwork, leveraging her artistic sensibility and competitive drive to create a unique
    shopping experience. She also intends to stay current with e‑commerce trends, eventually integrating an online platform to expand her business reach.
