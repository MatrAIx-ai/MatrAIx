  career_goals: Michael aims to move into a senior Operations Manager role within the next three years, overseeing multi‑site logistics for a mid‑sized manufacturing firm. He aspires to lead initiatives
    that integrate sustainable transportation practices, such as electric vehicle fleets and carbon‑neutral routing. He also plans to earn the Certified Transportation Professional (CTP) designation and
    develop a mentorship program for entry‑level transportation workers in Santa Monica. Long‑term, he envisions starting his own consulting firm focused on optimizing material handling operations for environmentally
    conscious businesses.
