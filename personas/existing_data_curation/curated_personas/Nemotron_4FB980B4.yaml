personas:
  professional: William Tessmar, a ten‑year‑old budding programmer who creates simple games in Scratch and leads his school’s lunchtime soccer squads, blends curiosity for how things work with a practical,
    organized mindset, and they turn imaginative LEGO structures into collaborative problem‑solving projects.
  sports: William Tessmar excels on the soccer field as a forward for the Riverdale Rovers U10 team, regularly practices with friends at the community park, follows the professional exploits of Manchester
    United, and they balance energetic play with a disciplined after‑practice stretching routine.
  arts: William Tessmar immerses themselves in adventure and science‑fiction worlds, from devouring Jules Verne novels to building LEGO sculptures inspired by Nathan Sawaya’s art, while they also enjoy
    the cinematic scores of John Williams and the playful humor of Pixar’s Toy Story series.
  travel: William Tessmar’s favorite family road‑trip memory is exploring the Grand Canyon’s rim, they’ve also visited the National Air and Space Museum in Washington, D.C., and they dream of a future visit
    to the Kennedy Space Center to experience the astronaut training simulators.
  culinary: William Tessmar loves crafting homemade pepperoni‑and‑mushroom pizza, mixing up colorful LEGO‑shaped fruit kebabs with grapes and melon, and they proudly claim a decent skill level at making
    simple sandwiches and cereal bowls, though they sometimes over‑load their pizza with cheese.
  core: William Tessmar is a curious, organized ten‑year‑old who blends a love for building, coding, and soccer with a generous spirit, a modest allowance plan, and a habit of occasionally forgetting their
    allergy pills after a game.
background:
  cultural: William was raised in Garland, Texas, a suburban community known for its strong sense of neighborhood, love of sports, and diverse cultural celebrations. His family embraces typical Texan values
    such as friendliness, community involvement, and pride in local traditions, while also exposing him to a variety of cultural events in the Dallas County area.
