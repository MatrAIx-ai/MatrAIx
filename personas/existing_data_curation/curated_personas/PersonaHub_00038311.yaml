persona_description: A German canonist and pedagogist who is well-versed in canon law and pedagogy, and has written numerous works on ecclesiastico-criminal subjects. He was appointed professor of canon
  law and pedagogy at the faculty of Catholic theology in Tubingen and wrote several treatises on ecclesiastico-criminal matters, including essays on the influence of the Catholic Church on society and
  the treatment of clergy and monks. He also contributed to the "Archiv fur katholisches Kirchenrecht" and "Theologische Quartalschrift" and was a frequent contributor to the "Kirchenlexikon". He is known
  for his extensive knowledge of canon law and pedagogy and his contributions to the field of ecclesiastico-criminal law.
