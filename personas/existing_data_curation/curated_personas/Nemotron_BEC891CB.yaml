  career_goals: Ana dreams of one day becoming an elementary school teacher who can share her love of reading and bilingual skills with younger children. She often talks about helping kids learn to read
    and write in both English and Spanish, and she imagines a classroom filled with books, colorful charts, and organized learning stations. Occasionally she also mentions wanting to work with animals as
    a veterinarian because she enjoys caring for the family’s pet rabbit, but her primary ambition is to create a structured, supportive learning environment for other children.
