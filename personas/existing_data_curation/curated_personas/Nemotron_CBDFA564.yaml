personas:
  professional: Shawanda Williams, a skilled construction laborer turned aspiring site supervisor, leverages their expertise in concrete finishing, framing and crew coordination while channeling their curiosity
    for design and relaxed, improvisational mindset into sustainable, art‑infused building projects.
  sports: Shawanda Williams stays active by playing on the River City Rangers community soccer team, cheering on the Kansas City Chiefs (NFL) and the Los Angeles Lakers (NBA), and hitting weekend hikes
    in nearby state parks where they blend cardio with nature photography.
  arts: Shawanda Williams immerses themselves in artistic life by attending gallery openings featuring works by Kehinde Wiley, vibing to Kendrick Lamar and John Coltrane at local jazz nights, and contributing
    to community murals inspired by the bold colors of Banksy and the dynamic street art of LA’s ‘Mona L’ collective, where they blend construction precision with creative flair.
  travel: Shawanda Williams prefers spontaneous weekend road trips to nearby state parks like Red River Gorge, explores urban art scenes in cities such as Berlin and Mexico City, and dreams of a month‑long
    cultural immersion in Marrakech, planning each adventure on a flexible budget that leaves room for last‑minute mural collaborations, where they also keep a sketchbook handy.
  culinary: Shawanda Williams enjoys cooking hearty jambalaya with Andouille sausage, sweet plantains, and cayenne, while also experimenting with vegan mushroom‑bourguignon and sourcing fresh basil and
    heirloom tomatoes from their urban garden, yet they often skip meals during long workdays, relying on coffee and protein bars to tide them over.
  core: Shawanda Williams is a construction‑savvy mural enthusiast who juggles back‑breaking site work with spontaneous art projects, occasionally forgetting to pay bills on time but always remembering
    to bring extra paint cans to community clean‑ups, and they never turn down a chance to dance after a job well done.
background:
  cultural: Shawanda is an African‑American woman raised in the vibrant, culturally diverse environment of Davidson County, Tennessee. Her family has deep roots in the Southern Black church community, where
    music, storytelling, and communal support play central roles. She grew up surrounded by the rich musical heritage of Nashville, which influences her love for live performances and rhythm. The blend
    of Southern hospitality, Black cultural resilience, and a strong community ethos shapes her values of solidarity, creativity, and empowerment. She frequently celebrates cultural traditions through food,
    music, and participation in local festivals that honor African‑American history and Southern heritage.
attributes:
  skills: '[''Concrete finishing'', ''Framing and basic carpentry'', ''Power tool operation'', ''Equipment handling (cement mixer, nail gun)'', ''Blueprint reading'', ''On‑site problem solving'', ''Team
    coordination'', ''Customer service and communication'', ''Basic project budgeting'']'
  hobbies: '[''Visiting art galleries and street‑art tours'', ''Dancing workshops (hip‑hop, freestyle)'', ''Listening to and collecting vinyl jazz and R&B'', ''Community volunteer work (clean‑up, youth
    mentorship)'', ''Urban gardening in community plots'', ''Hiking in local parks'', ''DIY home improvement projects'', ''Mural painting and graffiti art'']'
  career_goals: Shawanda aims to transition from laborer to site supervisor within the next three years by completing a certification in construction management and earning an associate’s degree in the
    field. She aspires to lead her own crew, focus on sustainable building practices, and eventually launch a small, community‑focused contracting business that provides affordable renovations in underserved
    neighborhoods. Her long‑term ambition includes mentoring young workers, especially women of color, and integrating artistic elements like murals into construction projects to blend functionality with
    local culture.
