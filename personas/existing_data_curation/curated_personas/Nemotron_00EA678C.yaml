personas:
  professional: Brea Hudgins, a veteran registered nurse with over three decades of experience in acute, chronic, and community health, leverages meticulous assessment skills, certifications in geriatric
    and palliative care, and a calm, talkative demeanor to lead interdisciplinary teams, mentor newcomers, and integrate art-therapy and digital health tools into patient education.
  sports: Brea Hudgins enjoys cheering on the Washington Capitals and the Baltimore Orioles, participates in low-impact water aerobics at the Prince George’s senior center, walks with the Silver Spring
    Trailblazers hiking club on weekends, and balances community spirit with a modest, consistent exercise routine that keeps them active without pursuing competitive sports.
  arts: Brea Hudgins, an avid watercolorist who experiments with acrylics, finds inspiration in the works of Claude Monet, Georgia O'Keeffe, and contemporary painter Kehinde Wiley, frequents the Smithsonian
    American Art Museum, attends community theater productions like 'Our Town,' and lends a soulful voice to the church choir, weaving artistic appreciation into daily life.
  travel: Brea Hudgins prefers thoughtfully planned cultural trips, often joining the church choir on excursions to the New Orleans Jazz & Heritage Festival, touring historic Savannah, Georgia, exploring
    Santa Fe's vibrant arts scene, and appreciating weekend getaways to nearby Annapolis for its waterfront charm.
  culinary: Brea Hudgins, a confident home cook, blends family recipes with global flavors, crafting dishes like herb-infused lemon-roasted chicken with fresh rosemary and thyme from their garden, spicy
    miso-glazed salmon paired with pickled ginger, and a comforting ginger-pumpkin soup that reflects a love of both comfort and experimentation.
  core: Brea Hudgins is a calm, talkative retiree who fuses nursing expertise with artistic flair, channels curiosity into community health initiatives, and balances meticulous planning with occasional
    procrastination, all while nurturing a garden, a choir, and a love for cultural travel.
background:
  cultural: Brea identifies as African-American and grew up in a close-knit, church-centered community in the Washington, D.C. metropolitan area. Her family traditions include gospel music, soul-food cooking,
    storytelling, and a strong emphasis on education and service. Throughout her nursing career she has been acutely aware of health inequities affecting Black communities, which fuels her commitment to
    culturally competent care. She celebrates African-American heritage through participation in local Juneteenth events, supporting Black artists, and mentoring young professionals from underrepresented
    backgrounds. Living in Fort Washington, MD, she is deeply connected to Prince George's County's vibrant Black culture and its legacy of resilience and community activism.
