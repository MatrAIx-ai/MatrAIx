    fusion soul food'', ''Church choir participation'', ''Volunteering at health fairs'', ''Book club membership'', ''Traveling to cultural festivals'']'
  career_goals: Looking ahead, Brea aims to transition into a part-time role that blends clinical expertise with community health education. She plans to develop a local program that uses visual arts and
    music therapy to improve emotional well-being for seniors in Prince George's County. Additionally, she seeks to expand her mentorship activities, obtain a health-coaching certification, and collaborate
    with local nonprofits to address health disparities affecting African-American residents. Her long-term ambition is to leave a legacy of culturally sensitive, holistic care that empowers patients and
    nurtures the next generation of nurses.
