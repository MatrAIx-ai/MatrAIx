  career_goals: While still a toddler, Nelson frequently fantasizes about future roles he sees in his environment. He loves watching firefighters and police officers, and often points to them with excitement,
    indicating a budding ambition to help protect his community. He also enjoys watching soccer games with his family and imagines himself as a player who wins the next match. These early aspirations reflect
    his competitive streak and desire for structured, goal‑oriented activities, even though they remain playful day‑dreams at this stage.
