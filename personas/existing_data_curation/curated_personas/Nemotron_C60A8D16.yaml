  career_goals: Yanira aims to earn her bachelor’s degree in Business Administration within the next two years while gaining additional certifications such as the Certified Administrative Professional (CAP).
    She aspires to move from her current clerk role to an office manager position, overseeing a small team and leading office efficiency initiatives. Long‑term, she hopes to blend her passion for the arts
    with her administrative expertise by coordinating community art programs or managing a cultural center’s operations, thereby contributing to the cultural vitality of Jackson’s Hispanic community.
