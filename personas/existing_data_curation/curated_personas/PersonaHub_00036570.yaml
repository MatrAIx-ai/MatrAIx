persona_description: A French cartographer and geographer, Jean Baptiste Bourgignon D'Anville, who was active in the early and mid-1700s. He greatly elevated the standards of European mapmaking by rigorously
  analyzing the authenticity of the information on which previous maps were based. His attention to detail is evident in his descriptions of the coordinates of the French settlement of Chandannagar and
  the stretch of the Hooghly river between Hugli and Calcutta, as well as his description of the short cut to go to Dhaka from the mouth of the Hooghly River.
