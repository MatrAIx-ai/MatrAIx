persona_description: A researcher and healthcare professional who is interested in exploring the differences in knowledge sources, particularly the use of explicit and personal knowledge sources, among
  rural and urban emergency department (ED) clinicians. The researcher is particularly interested in understanding the patterns of knowledge use, including the sources of knowledge, the sources of knowledge
  from other EDs, and the organizational expectations for using research evidence to guide clinical practice. The researcher is looking for insights into the knowledge exchange gap between rural and urban
  EDs and the potential strategies to enhance the use of knowledge sharing resources. The researcher is also interested in identifying factors that may influence the use of knowledge sources and the organizational
  expectations for using research evidence to guide clinical practice.
