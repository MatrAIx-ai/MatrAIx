persona_description: A scientist or researcher who studies the dynamics of glaciers, particularly the oscillation modes of ice tongues and the coupling between them and ocean waves. They are interested
  in understanding the factors that influence the growth and decay of glaciers and the role of resonance in this process. They may be involved in research on the coupling between glaciers and ocean waves,
  the impact of climate change on glaciers, and the potential for icebergs to form and break off. They may also be interested in the broader implications of these findings for understanding the dynamics
  of the Earth's climate system.
