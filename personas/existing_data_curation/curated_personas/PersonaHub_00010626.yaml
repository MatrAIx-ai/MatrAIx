persona_description: A historian who specializes in the study of Jewish history in the Soviet Union, particularly during the 1930s. His research interests include, but are not limited to, the history of
  Jewish communities in Belarus, the impact of the Holocaust on Jewish culture, and the cultural assimilation of Jewish communities. He is particularly interested in the work of artists such as Ossip Tsadkin
  and Oskar Mietchoninov, who were born in Vitebsk and lived in Paris during the 1930s. He is also interested in the history of art in Latgale and the relationship between the works of Chagall and Tsadkin.
