  hobbies: '["Visiting Art Galleries and Museums", "Urban Photography", "Stamp Collecting (Philately)", "Reading Literature and Art Criticism", "Attending Indie Music Concerts", "Book Club Participation",
    "Mindfulness Meditation and Yoga", "Gardening", "Writing Personal Essays", "Exploring Local History"]'
  career_goals: Peter aims to progress within the United States Postal Service, targeting supervisory or operations management positions where he can apply his organizational expertise and people‑focused
    approach. He aspires to blend his passion for the arts by leading community outreach initiatives, such as coordinating local art exhibitions or educational programs delivered through the postal network.
    Over the next five years, he plans to obtain a certification in arts administration or a master’s degree in cultural management, enabling a transition into a cultural programming role at a museum or
    community center while retaining a stable income. Additionally, he hopes to develop a side venture that curates thematic stamp collections celebrating Midwestern artistic heritage.
