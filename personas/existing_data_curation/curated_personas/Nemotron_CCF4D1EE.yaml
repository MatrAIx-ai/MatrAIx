  hobbies: '[''Watercolor painting'', ''Food sketching'', ''Herb gardening'', ''Fermentation experiments'', ''Reading art and culinary history'', ''Solo hikes along the Providence Riverwalk'', ''Attending
    quiet gallery openings'', ''Collecting vintage cookbooks'', ''Listening to instrumental jazz while cooking'']'
  career_goals: Carol aims to move beyond line‑cook duties and become a head chef at a boutique, farm‑to‑table restaurant in Rhode Island where she can fully implement her artistic culinary vision. She
    dreams of opening a small, intimate café that highlights seasonal menus built from locally foraged herbs and sustainable seafood, offering a quiet dining experience that reflects her preference for
    solitude. Obtaining a ServSafe manager certification and attending advanced culinary workshops are concrete steps she plans to take. Long‑term, she hopes to author a cookbook that blends her love of
    art and cooking, showcasing recipes accompanied by her watercolor illustrations.
