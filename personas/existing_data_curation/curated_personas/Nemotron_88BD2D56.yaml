personas:
  professional: Mariana Rodriguez leverages an associate’s degree in Business Administration and a reputation for meticulous event coordination to run community festivals, and they are channeling that expertise
    into a home‑based Spanish catering micro‑business, balancing structured planning instincts with spontaneous menu improvisations and a competitive drive to out‑serve local vendors.
  sports: Mariana Rodriguez competes in regional salsa dance tournaments with the Bay Area Latin Rhythm Club, follows the Golden State Warriors with fervor, and they hike the rolling hills around Livermore
    each weekend as part of a balanced fitness regimen.
  arts: Mariana Rodriguez devours mystery novels by Tana French, revels in the flamenco guitar virtuosity of Paco de Lucía, and they attend local productions of classic zarzuela, allowing these artistic
    experiences to shape their evenings and fuel creative cooking experiments.
  travel: Mariana Rodriguez meticulously plans a two‑week culinary tour of Barcelona and Valencia, savoring paella workshops and local markets, while their spontaneous weekend escapes to Napa Valley wine
    country are booked on a whim, illustrating a blend of structured exploration and impulsive adventure.
  culinary: Mariana Rodriguez crafts beloved authentic dishes such as saffron‑infused paella, chilled gazpacho, and jamón serrano, frequently incorporating garden‑fresh tomatoes, bell peppers, and rosemary
    into the recipes, and they delight in tweaking traditional flavors during impromptu family dinner gatherings.
  core: Mariana Rodriguez balances a love for organized planning with spontaneous culinary flair, drives themselves competitively in salsa contests, yet they occasionally forget to water their garden in
    the rush of looming deadlines.
background:
  cultural: Mariana grew up in a Spanish‑heritage household where both Spanish and English were spoken, fostering a deep appreciation for the culinary, musical, and familial traditions of Spain. Living
    in Livermore, California, she blends these cultural roots with the diverse, progressive ethos of the Bay Area. She participates in local Spanish festivals, supports bilingual community initiatives,
    and encourages preservation of her heritage while adapting to the multicultural environment of her neighborhood.
