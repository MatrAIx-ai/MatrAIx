  career_goals: Mariana aims to translate her organizational talent into a community‑focused micro‑business, such as a home‑based catering service featuring traditional Spanish dishes and seasonal produce
    from her garden. She also aspires to complete a bachelor's degree in Community Development, enabling her to lead a mentorship program for bilingual youth in Livermore. While she values a structured
    path toward these goals, she remains open to spontaneous opportunities that align with her passion for cultural preservation and local engagement.
