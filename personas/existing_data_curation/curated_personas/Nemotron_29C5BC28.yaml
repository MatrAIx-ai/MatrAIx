  career_goals: Martin aims to earn advanced certifications such as CompTIA A+, Cisco CCNA, and manufacturer‑specific credentials, positioning himself for a regional field service manager role where he
    would oversee a team of technicians. His competitive drive fuels a desire to be recognized as a leading expert in modern, IoT‑enabled banking equipment, and he eventually plans to launch his own independent
    repair business that offers specialized services and apprenticeships for aspiring technicians.
