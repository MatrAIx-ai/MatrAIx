  hobbies: '["Playing soccer in a local amateur league", "Hiking and trail running in the Sangre de Cristo Mountains", "Cooking traditional Mexican dishes for family gatherings", "Playing acoustic guitar
    and singing folk songs", "Volunteering at community tech workshops", "Attending local music festivals and concerts", "Collecting and restoring vintage electronic gadgets", "Organizing neighborhood barbecues",
