persona_description: A conservation biologist who specializes in the study of island foxes, specifically the California Channel Island Fox. He/she is interested in the current conservation needs and management
  practices for these species, and is seeking to improve their populations through mitigation measures and habitat restoration. The persona is knowledgeable about the threats facing island foxes, including
  Golden Eagle predation and the possible introduction of canine diseases, and is interested in exploring potential solutions to these issues. The persona is also interested in the social system of island
  foxes, and is concerned about the impact of management practices on fox reproduction and the potential disruption of the social system.
