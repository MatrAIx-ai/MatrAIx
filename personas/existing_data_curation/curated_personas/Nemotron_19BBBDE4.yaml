personas:
  professional: Judith Maranville is a disciplined documentary producer who channels curiosity and practicality into meticulously planned visual projects, leveraging their expertise in curriculum design,
    grant writing, and multi‑disciplinary crew coordination while they assertively guide creative teams toward socially impactful storytelling.
  sports: Judith Maranville is an avid hiker who belongs to the Flagstaff Hiking Club, follows the Arizona Cardinals in the NFL and the Phoenix Suns in the NBA, and spends weekends trail‑running in the
    San Francisco Peaks while they meticulously log mileage and bird sightings for personal records.
  arts: Judith Maranville volunteers on the board of a local arts‑education nonprofit, curates youth workshops inspired by Maya Angelou’s storytelling and Ansel Adams’s photography, and recharges creatively
    by attending live performances of Lin‑Manuel Miranda’s Hamilton and violinist Hilary Hahn, while they regularly act in community theater productions.
  travel: Judith Maranville enjoys planning immersive trips that blend Southwest heritage with global perspectives, having trekked Antelope Canyon, explored Sedona’s red rocks, and photographed Monument
    Valley, while dreaming of wandering Kyoto’s ancient temples, cruising Norway’s fjords, and tasting Tuscany’s vineyards, and they budget each adventure in a detailed spreadsheet.
  culinary: Judith Maranville loves cooking seasonal meals, often preparing roasted heirloom carrots with cumin, wild mushroom risotto infused with sage, and a hearty prickly‑pear and bean stew, while holiday
    tables feature corned beef and sauerkraut for St. Patrick’s Day and a spiced gingerbread loaf reminiscent of family Easter traditions, and they savor the process of coaxing flavors from fresh, locally
    sourced ingredients.
  core: Judith Maranville is a methodically curious storyteller who balances disciplined production work with a love for nature, community service, and quiet reflection, often juggling meticulous planning
    with spontaneous hikes and lingering board‑game nights, and they find balance through mindful pauses.
background:
  cultural: Judith was raised in a middle‑class, Anglo‑American family in the Midwest before moving to northern Arizona in her late twenties. Her upbringing emphasized community service, hard work, and
    respect for tradition, values that continue to shape her worldview. While she identifies as White, she has cultivated a deep appreciation for the cultural diversity of the Southwest, especially the
    traditions of the Hopi and Navajo peoples, and integrates this awareness into both her personal life and professional projects. She maintains a close connection to her German‑Irish heritage through
    holiday customs and culinary traditions.
attributes:
  skills: '[''Project Planning'', ''Budgeting'', ''Scheduling'', ''Script Development'', ''Directing'', ''Team Coordination'', ''Post‑Production Supervision'', ''Curriculum Design'', ''Grant Writing'',
