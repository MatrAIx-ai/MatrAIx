  hobbies: '[''Hiking'', ''Birdwatching'', ''Photography'', ''Historical Fiction Reading'', ''Cooking'', ''Gardening'', ''Yoga'', ''Mindfulness Practice'', ''Arts‑Education Volunteering'', ''Community Theater'',
    ''Board Games'', ''Stargazing'']'
  career_goals: Judith aims to establish an independent production studio focused on documentary and educational series that spotlight environmental stewardship and cultural heritage of the American Southwest.
    She seeks national broadcast partnerships and aspires to earn prestigious recognitions such as a Peabody or Emmy for socially impactful storytelling. Long‑term, she plans to create a mentorship program
    for emerging filmmakers—especially women and under‑represented voices—and to teach a graduate seminar on film production for educators, merging her passions for media and education. She also envisions
    expanding into narrative feature films that weave educational themes while maintaining high artistic standards.
