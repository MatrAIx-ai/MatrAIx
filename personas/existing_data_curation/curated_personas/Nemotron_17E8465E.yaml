  hobbies: '[''Hiking in Columbia River Gorge'', ''Mountain Biking'', ''Landscape Photography'', ''Model Shipbuilding'', ''Acoustic Guitar Playing'', ''Home Brewing'', ''Visiting Art Galleries'', ''Woodworking
    Club'', ''Wood Carving Sculptures'', ''Reading Architecture and Design Books'']'
  career_goals: Christopher aims to evolve from a solo contractor into the owner of a boutique design‑and‑build studio that specializes in artistic, environmentally responsible furniture and small‑scale
    interior remodels. He plans to obtain master carpenter certification and LEED AP credentials, showcase his work at regional craft fairs, and create a community workshop where emerging woodworkers can
    learn and collaborate. Additionally, he intends to document his techniques on a YouTube channel and publish a guidebook on modern sustainable carpentry, positioning himself as a thought leader in the
    Pacific Northwest craftsmanship community.
