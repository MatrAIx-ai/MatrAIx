  career_goals: Gregory dreams of turning his love for art and technology into a future where he can design immersive games, animated stories, or interactive installations. He aspires to become an animated
    filmmaker, a video‑game developer, or a creative engineer who builds experiential projects for his community. He also imagines leading school or neighborhood art initiatives that let him share his ideas
    with others.
