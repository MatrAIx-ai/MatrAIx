personas:
  professional: Gregory Bonner, a 9‑year‑old budding comic creator, blends sketching, LEGO city building, and Scratch animation into a nascent storytelling practice, using their boundless curiosity and
    spontaneous energy to experiment with narrative twists while they often battle an aversion to deadlines and a need for more organized project planning.
  sports: Gregory Bonner, a 9‑year‑old after‑school soccer enthusiast, laces up for the Mound United Soccer Club every Tuesday while cheering on the Minnesota Twins in baseball and the Minnesota Vikings
    in football, and they channel their energetic sociability into dance club rehearsals that double as a fun fitness routine.
  arts: Gregory Bonner, a 9‑year‑old watercolor hobbyist, draws inspiration from comic masters like Jeff Smith and Bill Watterson, binge‑watches Pixar shorts and Studio Ghibli films by Hayao Miyazaki, and
    frequently recreates scenes from their favorite graphic novels while they jam‑listen to the upbeat tunes of They Might Be Giants during art sessions.
  travel: Gregory Bonner, a 9‑year‑old adventure‑curious explorer, spends weekends hiking the trails around Lake Minnetonka and dreaming of a family road trip to the Grand Canyon, while they also crave
    a future visit to Tokyo’s Akihabara district to soak in anime culture, balancing a love for local nature with big‑screen travel fantasies.
  culinary: Gregory Bonner, a 9‑year‑old budding chef, loves crafting homemade pizza topped with mozzarella, pepperoni, and pineapple, whipping up fruit kebabs of watermelon, grapes, and strawberries, and
    blending banana‑strawberry smoothies with Greek yogurt, but they often forget to clean the kitchen until reminded by a parent.
  core: Gregory Bonner, a 9‑year‑old whirlwind of imagination, fuels endless comic sketches and LEGO builds with spontaneous curiosity, yet they habitually leave art supplies scattered and allowance crumbs
    on the couch.
background:
  cultural: Gregory was raised in Mound, Minnesota, a close‑knit Midwestern town where community events, outdoor recreation, and school sports are central to daily life. His family’s heritage reflects the
    region’s common Northern European roots—primarily Swedish and German—shaping traditions like seasonal fairs, potluck gatherings, and a love for lake activities. The local culture’s emphasis on friendliness,
    teamwork, and appreciation for the arts and nature informs his outlook and experiences.
