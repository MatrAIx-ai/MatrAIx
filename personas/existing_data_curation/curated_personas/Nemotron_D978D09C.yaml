  hobbies: '[''volunteering (Habitat for Humanity)'', ''Vietnamese cooking'', ''hosting dinner gatherings'', ''visiting art galleries'', ''home‑decor shows'', ''yoga'', ''mindfulness meditation'', ''jigsaw
    puzzles'', ''Sudoku'', ''karaoke'', ''Vietnamese cultural festivals'']'
  career_goals: Catherine aims to transition from a skilled tradesperson to a certified painting contractor and eventually launch her own boutique painting and paper‑hanging studio serving Baltimore County.
    She plans to obtain the National Association of Home Builders (NAHB) Certified Painting Professional credential and complete a bachelor's degree in interior design to broaden her design services. Her
    ambition includes building a reputation for reliability and high‑quality finishes, mentoring apprentices, and offering personalized color‑consultation workshops. She also hopes to achieve a balanced
    work schedule that reduces stress, allowing more time for community involvement and personal development.
