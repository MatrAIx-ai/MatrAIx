personas:
  professional: Nong Nguyen is a meticulous interior painter and paper‑hanging specialist who leverages a methodical checklist‑driven workflow, strong color theory knowledge from an interior design background,
    and a talkative, client‑focused demeanor to deliver high‑quality finishes while coordinating crews and presenting design workshops.
  sports: Nong Nguyen enjoys weekday sunrise yoga sessions, occasional community badminton games at the local recreation center, and passionately supports the Baltimore Ravens and Orioles, joining teammates
    for weekend pick‑up soccer matches when schedule permits.
  arts: Nong Nguyen frequently visits the Baltimore Museum of Art, the American Visionary Art Museum, and local home‑decor expos, draws inspiration from muralist Kehinde Wiley and the vibrant street art
    scene, and showcases vocal talent at a karaoke club where they love belting out classic folk songs.
  travel: Nong Nguyen prefers meticulously planned trips that blend design research with cultural immersion, such as a recent weekend workshop in Portland’s design district and a dream itinerary to explore
    the historic markets and street food of Chiang Mai, while balancing a modest travel budget and family responsibilities.
  culinary: Nong Nguyen is an avid home cook who passionately prepares authentic phở broth with star anise, cinnamon, and lemongrass, crafts crusty bánh mì using fresh baguettes, cilantro, and pickled carrots,
    and regularly hosts friends for multi‑course dinners that double as informal color‑consultation sessions.
  core: Nong Nguyen blends methodical craftsmanship with a gregarious spirit, obsessively perfecting paint finishes while juggling community volunteering, karaoke performances, and a persistent worry about
    staying on schedule.
background:
  cultural: Catherine is a second‑generation Vietnamese‑American, raised in a close‑knit family that values harmony, respect for elders, and hard work. Growing up in the vibrant Vietnamese community of
    Baltimore County, she celebrates Tet, cooks family recipes, and maintains bilingual fluency in English and Vietnamese. Her cultural upbringing emphasizes collective well‑being, which informs her considerate
    approach to client relations and teamwork. The blend of traditional Vietnamese craftsmanship and American practicalism shapes her aesthetic sensibility, favoring clean lines, balanced spaces, and subtle
    decorative touches that reflect both heritage and modern design.
attributes:
  skills: '[''interior painting'', ''wallpaper installation'', ''decorative painting techniques'', ''surface preparation'', ''color theory'', ''spatial planning'', ''project scheduling'', ''client communication'',
