  hobbies: '[''reading mystery novels'', ''journaling'', ''yoga and meditation'', ''experimenting with Tex‑Mex and Southern cooking'', ''succulent balcony gardening'', ''volunteering at the animal shelter'',
    ''beach walks with a close friend'']'
  career_goals: Nancy aims to secure a flexible, part‑time role that leverages her caring personality, such as a peer‑support volunteer or a community outreach aide, allowing her to help others without
    a rigid schedule. She hopes to eventually launch a home‑based pet‑sitting and therapeutic gardening service that blends her love for animals and plants with a modest income stream. To strengthen her
    qualifications, she plans to complete a GED, attend mental‑health first‑aid workshops, and take short courses in small‑business management.
