  hobbies: '["Duplo block construction", "Nature walks and leaf/rock collecting", "Picture book reading", "Crayon drawing and coloring", "Singing and dancing in music class", "Pretend play with toy tool
    set", "Simple puzzles"]'
  career_goals: Charles dreams of becoming a firefighter because he loves the bright trucks and helping people, an astronaut to explore space, and a park ranger to protect the mountains he hikes near his
    home. Influenced by his practical side, he also imagines fixing things like his dad does, aspiring to be a builder or handyman. He often says he wants to "be a big helper" and values roles that combine
    caring for others with concrete, hands‑on tasks.
