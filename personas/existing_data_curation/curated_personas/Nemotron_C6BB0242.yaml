  hobbies: '[''Bridge'', ''Jazz Concerts'', ''Community Cooking Club'', ''Legal‑Aid Volunteering'', ''Historical Book Club'', ''Hiking'', ''Road Trips'', ''Mentoring Young Professionals'']'
  career_goals: Markell aims to achieve senior partnership at his firm while expanding its pro bono and mediation services. He envisions establishing a regional mediation center that offers affordable dispute
    resolution to local businesses and individuals. He also seeks to mentor emerging Black attorneys, author a practical guide on business law for small enterprises, and eventually serve as a circuit judge
    to shape equitable legal outcomes in his community.
