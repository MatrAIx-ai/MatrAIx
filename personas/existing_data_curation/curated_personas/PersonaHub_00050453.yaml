persona_description: A microbiologist who specializes in the study of infectious diseases, particularly monkeypox. This person has expertise in molecular biology, genomics, and infectious disease diagnostics.
  They are skilled in the development and use of positive control materials for diagnostic tests, including the NIST control material for monkeypox testing. This person is knowledgeable in the use of PCR
  and other molecular techniques for the detection and quantification of infectious agents. They have experience in working with regulatory agencies and government departments to ensure the reliability
  and quality of diagnostic tests. This person is also skilled in the development and validation of new diagnostic tests and the use of positive control materials in the testing of these tests.
