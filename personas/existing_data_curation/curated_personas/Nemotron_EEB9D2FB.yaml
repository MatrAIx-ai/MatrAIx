    Indianapolis sports teams'', ''Participating in church choir and gospel music activities'']'
  career_goals: Larry aims to transition from full‑time floor sales to a part‑time consulting role where he can guide small businesses and aspiring sales professionals, leveraging his decades of experience.
    He dreams of establishing a community‑focused pop‑up space that showcases local Black artists and provides a venue for workshops on entrepreneurship and financial literacy. He also wants to secure a
    comfortable retirement that allows him to spend more time mentoring youth and contributing to Indianapolis’s economic development initiatives, while preserving a steady income stream through occasional
    freelance sales consulting.
