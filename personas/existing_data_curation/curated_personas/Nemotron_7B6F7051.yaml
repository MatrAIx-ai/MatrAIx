  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Science fiction reading'', ''Community theater acting'', ''Fusion cooking (Southeast Asian & Texan)'', ''Gardening'', ''Puzzle solving (crosswords,
    Sudoku)'', ''Museum and cultural festival visits'', ''Volunteer STEM tutoring'', ''Attending poetry slams'', ''Meditation for stress reduction'']'
  career_goals: Remedios aims to channel her lifelong curiosity and organizational drive into building a community makerspace in Beaumont that fuses art, science, and technology. She aspires to design interdisciplinary
    workshops that spark novelty for seniors, youth, and underserved groups, and to mentor emerging talent in both STEM and creative fields. Over the next five years she hopes to author a memoir‑style book
    that weaves her Southeast Asian heritage, scientific insights, and artistic journey, and to become a sought‑after speaker at regional conferences on interdisciplinary education and cultural integration.
    Her ultimate ambition is to leave a lasting legacy of inclusive, creativity‑fuelled learning that reflects both her personal achievements and her desire to give back.
