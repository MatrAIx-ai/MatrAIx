personas:
  professional: A seasoned community outreach coordinator and data‑driven storyteller, Remedios Narang channels their analytical rigor and flamboyant stage presence to design interdisciplinary workshops
    that blend art, science, and technology for seniors and youth in Beaumont.
  sports: An avid supporter of the Houston Astros and Houston Texans, Remedios Narang joins a local senior walking club, participates in a community bowling league, and never misses the Saturday high school
    football games of the Beaumont Golden Eagles, balancing passive fandom with gentle physical activity.
  arts: A passionate abstract painter and digital illustrator, Remedios Narang weaves motifs from traditional lanterns and calligraphic strokes into their mixed‑media canvases, cites Yayoi Kusama and the
    improvisational jazz of John Coltrane as artistic muses, performs monologues by Tom Stoppard with their community theater troupe, and regularly attends poetry slams featuring spoken‑word artist Maya
    Lopez.
  travel: A curious globetrotter, Remedios Narang has explored the ancient citadel of Hue during Tet, sailed the limestone karsts of Ha Long Bay, wandered the French Quarter of New Orleans, and dreams of
    a tranquil tea garden retreat in Kyoto as well as a scenic road trip along the Pacific Coast Highway to San Luis Obispo.
  culinary: A culinary experimenter, Remedios Narang fuses a fragrant pho broth with smoked Texas brisket to craft a bold “Pho‑Barbecue” stew, perfects bánh mì sandwiches with jalapeño‑infused pâté, cultivates
    cilantro, Thai basil, and lemongrass in their herb garden, and invents corn‑masa‑wrapped bánh xèo tacos that marry Southeast Asian aromatics with Texas street‑food flair.
  core: Remedios Narang is a tireless community builder whose boundless curiosity fuels daily art experiments and meticulous workshop planning, yet they habitually over‑schedule themselves, worry about
    every detail, and can’t resist a midnight snack of leftover phở while scrolling through crossword puzzles.
background:
  cultural: Remedios is a first‑generation Southeast Asian American, born to Vietnamese parents who emigrated to the United States in the early 1970s. Raised in a bilingual home, she celebrates Tet and
    other traditional festivals while also embracing Southern hospitality and community values in Texas. Her upbringing blended respect for elders, communal storytelling, and the rich culinary heritage
    of her family with the rugged, friendly spirit of Beaumont. This bicultural identity informs her worldview, fueling her desire to bridge cultural gaps through art, education, and community service,
    and to preserve her heritage by sharing language, recipes, and traditions with younger generations.
attributes:
  skills: '[''Data analysis'', ''Scientific research'', ''Technical writing'', ''Digital illustration'', ''Event planning'', ''Public speaking'', ''Community outreach'', ''Project management'', ''Creative
