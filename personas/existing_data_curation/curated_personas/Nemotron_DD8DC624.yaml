  career_goals: Adelaide aspires to combine her love of the outdoors with her curiosity about science. She hopes to attend a high school with strong STEM and environmental programs, later pursue a degree
    in wildlife biology or environmental engineering, and work on conservation projects that protect Colorado's mountain ecosystems. In the short term, she wants to earn certifications in youth first aid
    and join a local robotics club to strengthen her technical skills, with the long‑term ambition of becoming a field researcher or environmental educator who inspires others to care for nature.
