personas:
  professional: Adelaide Lewis, a 13‑year‑old aspiring coder and wildlife enthusiast, channels her curiosity and practical mindset into creating simple educational games about ecosystems while volunteering
    at the animal shelter, balancing school responsibilities with a disciplined yet flexible project schedule, and they often share prototypes with classmates for feedback.
  sports: Adelaide Lewis plays midfield for the mixed‑gender Riverbend Community Soccer Club, cheers for the local professional team the Riverbend Rapids, and spends Saturday mornings hiking the foothills
    with family, using the activity to stay fit and unwind.
  arts: Adelaide Lewis expresses creativity through watercolor landscapes of misty forests, digital sketches inspired by Hayao Miyazaki’s animation, and ukulele renditions of Jason Mraz’s “I’m Yours”, often
    sharing their work on a teenage art forum while listening to indie folk artists like Sufjan Stevens.
  travel: Adelaide Lewis prefers weekend day‑trips to nearby state parks such as Crystal Cove for hiking and photography, dreams of trekking the lavender fields of Provence, and meticulously plans each
    adventure with a blend of map research and spontaneous detours, though family budget constraints sometimes limit longer journeys.
  culinary: Adelaide Lewis enjoys preparing simple veggie stir‑fry with bell peppers, carrots, and soy sauce, loves snacking on avocado toast with lemon zest, and occasionally experiments with baking banana
    bread using overripe fruit from the kitchen counter.
  core: Adelaide Lewis blends a curious, organized mind with a love for nature, code, and art, navigating teenage life with balanced ambition, occasional procrastination, and a habit of humming ukulele
    tunes while sketching.
background:
  cultural: Adelaide grew up in a white, middle‑class family in Castle Rock, Colorado, where suburban American life blends with a strong outdoor culture. Her upbringing reflects typical U.S. traditions—holiday
    celebrations like Thanksgiving, Christmas, and Fourth of July fireworks—combined with a regional appreciation for the Rocky Mountains and Colorado's emphasis on environmental stewardship. Family activities
    often include weekends at local parks, hiking trips, and community events at the town library and youth center. This milieu has nurtured her practical curiosity, cooperative nature, and respect for
    both individual responsibility and community harmony.
