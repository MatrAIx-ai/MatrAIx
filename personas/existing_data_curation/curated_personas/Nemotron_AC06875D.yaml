  career_goals: Although Thor is not currently in the workforce, he is driven by a clear vision for the next chapter of his life. He aspires to formalize his volunteer leadership by obtaining a certification
    in non‑profit management and to spearhead the creation of a community arts hub that showcases regional folk art and provides workshops for all ages. He also aims to expand the local community garden,
    implementing sustainable practices and mentorship programs for younger gardeners. Additionally, Thor plans to enroll in online courses on art history and horticulture to deepen his knowledge, and he
    hopes to author a series of essays that blend personal reflections with the cultural history of Marble Falls, thereby preserving local narratives for future generations.
