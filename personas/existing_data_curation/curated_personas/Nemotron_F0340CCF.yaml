  hobbies: '[''attending art exhibits'', ''improv comedy'', ''pickup basketball'', ''road‑tripping to regional attractions'', ''DIY electronics (Arduino, Raspberry Pi)'', ''cooking experimental meals'',
    ''listening to indie music'', ''volunteering at community festivals'', ''competitive trivia nights'']'
  career_goals: Clifford aims to move beyond his current sales role into store management, where he can implement experiential retail concepts that fuse technology and art. He envisions leading a boutique
    that showcases locally crafted artworks alongside cutting‑edge gadgets, turning the store into a community hub. To support this vision, he plans to pursue targeted leadership training—potentially an
    MBA with a focus on entrepreneurship—while maintaining the flexibility and spontaneity he values. Ultimately, he hopes to own and operate a small independent shop that revitalizes his hometown’s cultural
    scene and offers a dynamic shopping experience.
