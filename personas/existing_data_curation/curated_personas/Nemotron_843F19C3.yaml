  career_goals: Judy aims to evolve into a technology leader who shapes large-scale educational platforms. Over the next five years she envisions moving into a lead architect or senior engineering manager
    role, overseeing cross-functional teams that build scalable, user-centric learning solutions. She plans to earn a professional certification in cloud architecture (e.g., AWS Solutions Architect) and
    continue contributing to open-source projects that intersect education and software. Judy also wants to spearhead mentorship programs for women in tech, leveraging her sociable nature to build strong
    networks, while maintaining a competitive edge by setting measurable performance targets for her team and herself. Ultimately, she hopes to influence product strategy at a senior level, championing
    data-driven decision-making and practical innovation that delivers measurable learning outcomes.
