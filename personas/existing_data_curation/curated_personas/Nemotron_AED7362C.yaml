    STEM‑in‑Schools'',''Listening to Science‑Fiction Podcasts'',''Reading Non‑fiction on Psychology and Innovation'',''Attending Community Cultural Festivals'']'
  career_goals: Petra aims to advance to senior leadership within the next five years, targeting a Director of Engineering or Innovation role where she can steer large‑scale technology initiatives. She
    plans to pursue an MBA with a focus on Technology Management to strengthen her business acumen. Long‑term, she envisions launching a community‑centered incubator that blends cutting‑edge tech with local
    art, providing mentorship and resources for under‑represented youth in Riverside County. Petra also aspires to become a recognized thought leader in integrating artistic design thinking into product
    development and to contribute to industry panels on inclusive innovation.
