personas:
  professional: Petra Zapata, a thirty‑year‑old technical project manager who wields Python, SQL, and rigorous risk‑assessment to translate complex engineering data into actionable plans, blends her love
    of mural sketching into creative problem‑solving, and relentlessly pursues senior leadership while they keep a competitive edge and a skeptical eye on stakeholder motives.
  sports: Petra Zapata, a thirty‑year‑old avid hiker who spends weekends trekking the Santa Rosa Plateau and Temecula trails with the Temecula Hiking Club, supports the Los Angeles Lakers in basketball
    and the LA Galaxy in soccer, and squeezes in weekly yoga sessions to balance cardio with flexibility.
  arts: Petra Zapata, a thirty‑year‑old art enthusiast who roams Southern California galleries to study works by Ai Weiwei and Shepard Fairey, sketches murals inspired by street‑art legends like Banksy,
    creates digital illustrations that blend vibrant folk motifs with modern graphic design, and they often spend evenings curating personal mood boards for upcoming projects.
  travel: Petra Zapata, a thirty‑year‑old traveler who meticulously plans trips to blend adventure and cultural immersion—having explored Joshua Tree’s desert hikes, the historic streets of San Miguel de Allende,
    and dreaming of a spring itinerary in Kyoto and Barcelona—yet they balance these getaways with a modest travel budget and a desire for occasional solo reflection.
  culinary: Petra Zapata, a thirty‑year‑old kitchen creative who masters mole poblano, tamales de olla, and chiles en nogada using ancho chilies, cacao, and fresh pomegranate seeds, enjoys experimenting
    with fusion twists like quinoa‑filled tamales, yet they often skip meal prep on busy weeks, relying on quick avocado toast.
  core: Petra Zapata, a thirty‑year‑old driven by a restless curiosity that fuels both tech project boards and wall sketches, battles fierce anxiety with yoga and an unrelenting competitive streak, while
    secretly hoarding vintage art catalogs and over‑spending on premium spices, and they occasionally lose sleep over unfinished designs.
background:
  cultural: Petra was raised in a bicultural Mexican‑American household in Southern California. Her parents immigrated from Jalisco, and she grew up fluent in both Spanish and English, celebrating traditions
    such as Día de los Muertos, Las Posadas, and family gatherings centered around music and food. The strong sense of family, community, and perseverance characteristic of the Mexican diaspora shaped her
    values of responsibility and hospitality. Living in Menifee, CA, she participates in local cultural events, volunteers at the annual Mexican Heritage Festival, and draws inspiration from the rich mural
    art that decorates many neighborhoods in Riverside County. Her heritage informs an inclusive leadership style and fuels her commitment to creating opportunities for under‑represented groups in STEM.
attributes:
