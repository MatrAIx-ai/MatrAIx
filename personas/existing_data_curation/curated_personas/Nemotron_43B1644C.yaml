personas:
  professional: Rose Angle, a retired community organizer with an associate’s degree in Business Administration, leverages meticulous budget planning, volunteer management expertise, and assertive yet compassionate
    communication to coordinate senior center projects and mentor emerging volunteers, all while pursuing a board seat on a nonprofit focused on senior services and historic preservation.
  sports: Rose Angle, a devoted member of the neighborhood walking club, enjoys low‑impact exercise on the Anacostia River trail, follows the Baltimore Orioles and Ravens each season, and participates in
    a senior‑friendly badminton league at the community center.
  arts: Rose Angle enriches their cultural life by attending community theater productions, assisting backstage with meticulous set organization, studying watercolor techniques in weekly classes, and drawing
    inspiration from artists like Claude Monet and musicians such as Joan Baez, while they occasionally volunteer to manage backstage logistics for local productions.
  travel: Rose Angle prefers meticulously planned heritage trips, having explored colonial Williamsburg, taken weekend cruises to the Chesapeake Bay islands, and scheduled a future pilgrimage to England’s
    National Archives for genealogical research, all balanced against a modest travel budget and the need for regular medical appointments, which they schedule well in advance.
  culinary: Rose Angle delights in cooking seasonal meals using locally sourced seafood like blue crabs and rockfish, seasoned with Old Bay, paired with garden‑fresh vegetables to create classic Maryland
    crab cakes and succotash, showcasing an intermediate culinary skill set honed through weekly family dinners, which they host with meticulous preparation.
  core: Rose Angle blends disciplined organization with a curious love of history, gardening, and community service, often juggling budget spreadsheets while planting native Chesapeake Bay herbs, yet sometimes
    neglects bedtime to finish a crossword puzzle.
background:
  cultural: Rose grew up in a middle‑class, predominantly white suburb of Maryland, where her family emphasized hard work, self‑reliance, and community service rooted in Methodist traditions. The Chesapeake
    Bay ecosystem shaped her appreciation for seasonal foods, boating outings, and local history, leading her to join historic societies and volunteer for water‑way clean‑up events. Living in Anne Arundel
    County exposed her to a modestly diverse community, fostering an open yet pragmatic outlook. Her cultural identity blends Mid‑Atlantic American values of modesty and practicality with a deep respect
    for the region’s maritime heritage and communal responsibility.
attributes:
  skills: '["Organizational Management", "Budget Planning", "Event Coordination", "Volunteer Management", "Basic Computer Literacy (Microsoft Office, Email)", "Interpersonal Communication", "Conflict Resolution",
