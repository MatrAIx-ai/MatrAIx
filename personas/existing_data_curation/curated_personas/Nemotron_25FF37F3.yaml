  hobbies: '[''Watercolor painting'', ''Mixed media art'', ''Reading historical fiction and poetry'', ''Visiting galleries and museums'', ''Gardening (heirloom roses and herbs)'', ''Book club participation'',
    ''Volunteering at senior center (craft workshops)'', ''Community theater attendance'', ''Crossword puzzles'', ''Journaling'', ''Meditation'']'
  career_goals: Rebecca aims to deepen her engagement with the local arts community by curating a small exhibition of senior artists and completing a memoir that intertwines her family’s genealogy with
    reflections on cultural shifts she has witnessed. She aspires to mentor younger volunteers at the community center, develop a weekly art workshop for seniors, and travel to visit her family’s roots
    in Quebec while enhancing her French language skills. Her overarching ambition is to remain an active, creative, and supportive presence in her family and community.
