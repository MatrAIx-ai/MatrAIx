personas:
  professional: Rebecca Picard, a seasoned community arts coordinator at the local senior center, leverages her meticulous organization and vivid imagination to design intergenerational workshops, curate
    senior exhibitions, and preserve detailed genealogical archives, ensuring each project meets her high standards while fostering creative expression.
  sports: Rebecca Picard, a devoted fan of Pittsburgh’s Steelers, Penguins, and Pirates, participates in the senior center’s weekly low‑impact walking club, enjoys friendly pickleball games on weekends,
    and incorporates gentle yoga sessions to maintain flexibility, balancing community spirit with personal fitness.
  arts: Rebecca Picard, an avid watercolorist drawn to abstract landscapes, often references Monet, O’Keeffe, and local artist Mary Cassatt as inspirations, attends Carnegie Museum tours, volunteers at
    community theater productions, and mentors younger artists through a weekly senior art workshop.
  travel: Rebecca Picard, a methodical traveler with a yearning to trace her family’s Quebec roots, has planned a pilgrimage to Quebec City and Montreal, enjoys weekend road trips to the historic Amish
    farms of Lancaster County, and makes annual visits to the Gettysburg battlefield, always balancing itineraries with senior‑friendly tours and budget considerations.
  culinary: Rebecca Picard, a competent home cook who delights in heirloom roses and garden herbs, frequently prepares classic comfort foods such as thyme‑infused chicken pot pie, rosemary‑scented beef
    stew, and seasonal apple crisp, while occasionally indulging in a homemade tourtière for family gatherings.
  core: Rebecca Picard blends an imaginative artistic spirit with disciplined organization, turning each day into a canvas of community service, genealogical discovery, and gentle self‑care, all while sprinkling
    in a dash of stubborn forgetfulness and a love for modest indulgence.
background:
  cultural: Rebecca was raised in a middle‑class Catholic family in western Pennsylvania, with French‑Canadian ancestry reflected in her surname. Growing up near Pittsburgh, she absorbed the region’s strong
    work ethic, community spirit, and appreciation for the arts, especially the legacy of the Carnegie museums. Local traditions of seasonal festivals, church gatherings, and hearty home‑cooked meals have
    shaped her values of family, generosity, and modesty. Her heritage also includes a respect for storytelling and genealogy, leading her to explore her family’s roots in Quebec.
