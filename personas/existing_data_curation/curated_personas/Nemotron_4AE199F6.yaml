  hobbies: '[''Open‑mic and live‑music nights'', ''Trivia and board‑game evenings'', ''Community theater participation'', ''Reading contemporary fiction and non‑fiction'', ''Creative writing (poetry, short
    stories)'', ''Photography (urban and nature)'', ''Cooking and experimenting with new recipes'', ''Spontaneous hikes in the Adirondacks'', ''Occasional mindfulness or breathing exercises'']'
  career_goals: Justin aspires to move from a general clerk role into a supervisory position such as Office Manager or Community Engagement Coordinator within the city government. He plans to earn a certificate
    in administrative management and develop formal leadership skills so he can mentor new staff and lead small‑scale community projects. In the longer term, he dreams of launching a neighborhood coffee‑house
    that doubles as a hub for local artists and discussion groups, blending his sociable nature with his passion for the arts.
