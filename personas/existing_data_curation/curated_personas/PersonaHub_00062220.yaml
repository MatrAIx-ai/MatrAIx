persona_description: A pediatric oncologist who specializes in the treatment of neurofibromatosis and plexiform neurofibromas. She is responsible for evaluating the safety and toxicity of new oral drugs
  like selumetinib in patients with neurofibromatosis and plexiform neurofibromas. Her research focus is on understanding the molecular mechanisms of selumetinib's activity in these tumors and identifying
  potential drug targets for future treatment. She is also interested in evaluating the efficacy of selumetinib in children with neurofibromatosis and plexiform neurofibromas and conducting additional studies
  to characterize tumors that do not respond to the drug.
