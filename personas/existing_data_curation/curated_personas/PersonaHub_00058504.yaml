persona_description: A media producer who is skilled in using software programs like Final Cut Pro, AVID, After Effects and Photoshop to create visual pieces. They have a strong understanding of technology
  and use it to manage the creation of content for digital formats. They work closely with production crew and directors, sound engineers, videographers and producers to brainstorm subject matter and choose
  topics for videos, write scripts and titles, and edit audio or video footage for media projects. They also possess a solid understanding of technology and use it to produce audio and video content to
  be used online, for commercials, for motion pictures and more. They are responsible for communicating with other production and project stakeholders to build engaging audio/visual material that meets
  user needs and production goals.
