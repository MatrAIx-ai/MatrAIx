persona_description: A seasoned special education teacher with over 10 years of experience, Catherine Martin is an expert in the field of special education, particularly in the area of special education
  teaching strategies. She is an adjunct professor at George Mason University and has worked as a lead mentor for new teachers. Clara Hauth, the other author of the Survival Guide, has more than 10 years
  of experience as a special education classroom teacher and is an assistant professor of special education at Marymount University. Together, they have written The Survival Guide for New Special Education
  Teachers, a handbook that provides guidance and resources for new and experienced teachers to ensure that grades for students with disabilities are meaningful and support learning. The authors emphasize
  the importance of effective lesson planning and the use of evidence-based practices in the classroom.
