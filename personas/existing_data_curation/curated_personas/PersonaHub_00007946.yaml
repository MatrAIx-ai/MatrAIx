persona_description: A business leader who recognizes the importance of identifying and eliminating problems before they occur, and is dedicated to creating an organization that anticipates and prepares
  for potential problems. They are skilled at diagnosing problems, and are proactive in their approach to problem-solving. They value competence and anticipate potential problems, and are open to learning
  from and precluding problems that may arise. They are skilled at asking questions and recognizing when a problem requires attention, and are not afraid to speak up about the importance of addressing problems
  at their source.
