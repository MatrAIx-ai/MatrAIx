personas:
  professional: Terry Rhoden, a retired community arts coordinator, blends watercolor mastery, woodworking craftsmanship, and garden design with basic business acumen to organize local exhibitions, run
    volunteer programs, and mentor youth artists while maintaining a flexible yet organized approach to each project.
  sports: Terry Rhoden enjoys early‑morning beach walks and birdwatching as low‑impact fitness, belongs to the Myrtle Beach Senior Walking Club, plays occasional golf at the Myrtle Beach National Golf Club,
    and follows the Charleston RiverDogs minor‑league baseball team and the Carolina Panthers with weekend viewings at the local diner.
  arts: Terry Rhoden, inspired by the seascapes of Winslow Homer and the delicate brushwork of Charles Reid, listens to Debussy and Beethoven while painting coastal watercolors, recites Mary Oliver poems
    at the library’s poetry circle, and admires John James Audubon’s bird illustrations, often attending exhibitions at the Myrtle Beach Art Museum and performances at the Myrtle Beach Playhouse.
  travel: Terry Rhoden prefers quiet, short road trips to nearby coastal towns such as Savannah, the Outer Banks, and Charleston, cherishes a past weekend sailing excursion to the Gulf Islands, dreams of
    a serene retreat in the Pacific Northwest, and plans travel around modest budgets and limited mobility, avoiding crowded tourist hotspots.
  culinary: Terry Rhoden delights in cooking fresh shrimp scampi with garlic, lemon, and parsley, savors local oysters with a dash of sea salt, grows rosemary, thyme, and basil in the garden for seasonal
    dishes, and enjoys simple herb‑infused vegetable soups while occasionally treating themselves to a slice of pecan pie during library events.
  core: Terry Rhoden is a reflective, anxiety‑prone 75‑year‑old artist‑curator who channels restless imagination into watercolor seas, community mentorship, and meticulous garden designs, all while clinging
    to frugal routines and a love of quiet beach walks.
background:
  cultural: Terry grew up in a middle‑class, white Southern family in coastal South Carolina, steeped in traditional Baptist values, hospitality, and a strong sense of community. The rhythms of the seaside—sunrises,
    tides, and local folklore—shaped his appreciation for nature and quiet reflection. Living his adult life in Myrtle Beach, he has witnessed the region's gradual cultural diversification, which sparked
    his curiosity for new artistic expressions while retaining a reverence for Southern customs such as family gatherings, home‑cooked meals, and a respect for neighborly harmony. His married life reflects
    both traditional partnership dynamics and a modern, egalitarian approach to shared responsibilities.
attributes:
  skills: '[''Watercolor painting and sketching'', ''Creative writing and storytelling'', ''Historical research'', ''Woodworking and furniture restoration'', ''Garden design and horticulture'', ''Community
    event coordination and budgeting'', ''Basic photo‑editing software'', ''Mentoring and facilitation of small art workshops'', ''Conflict resolution and empathetic communication'']'
  hobbies: '[''Watercolor painting'', ''Poetry and short‑form creative writing'', ''Model ship building'', ''Garden tending and native plant cultivation'', ''Birdwatching and beachcombing'', ''Attending
    small art workshops and poetry circles'', ''Classical music listening'', ''Morning beach walks'', ''Journaling and mindfulness meditation'']'
  career_goals: Although retired, Terry aims to leave a lasting creative legacy in his community. He plans to curate a small exhibition of his watercolor series inspired by the Myrtle Beach coastline, compile
    and self‑publish a collection of memoir essays and poetry, and establish a mentorship program for local youth interested in visual arts. Additionally, he hopes to design and implement a senior‑friendly
    garden at the community center, while continuing personal growth through night‑time online courses in art history and mindfulness practices to better manage his anxiety.
