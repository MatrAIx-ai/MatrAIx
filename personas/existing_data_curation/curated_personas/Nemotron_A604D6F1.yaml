  career_goals: Madison aims to grow her current tech‑creative startup into a market leader that fuses artificial intelligence with interactive art experiences, positioning the company as a pioneer in immersive
    digital culture. She intends to expand the firm’s footprint nationally while maintaining a culture of flexibility and mental‑health awareness. Long‑term, she envisions establishing a foundation that
    funds interdisciplinary research and mental‑health initiatives for entrepreneurs, and eventually transitioning into an advisory role that mentors the next generation of visionary leaders.
