personas:
  professional: Madison Butler is a tech‑creative founder who blends engineering expertise and data analytics with an abstract artistic vision, leading a venture that fuses AI and interactive art while
    steering teams through empathetic, collaborative decision‑making and thriving on the flexible, non‑linear workflow that matches her imaginative, sometimes disorganized style.
  sports: Madison Butler fuels their love of movement through weekend hikes on the Bucks County trails, occasional trail‑run sessions with the local Quakertown Trailblazers Running Club, yoga classes at
    a nearby studio, and they cheer loudly for the Philadelphia Eagles in the fall and the Philadelphia 76ers during basketball season while holding a casual membership in a co‑ed ultimate frisbee league.
  arts: Madison Butler curates pop‑up shows featuring experimental sculpture while drawing inspiration from artists like Olafur Eliasson and James Turrell, attends avant‑garde openings where they discuss
    the works of Marina Abramović, and they unwind listening to Radiohead and the ambient compositions of Brian Eno, which shape their own abstract painting practice.
  travel: Madison Butler prioritizes immersive culture trips over typical vacations, having explored the kinetic art scene of Barcelona's MACBA, meditated at a secluded ryokan in Kyoto, and trekked Icelandic
    lava fields, but they plan future journeys to the neon‑lit tech districts of Seoul and the remote Scottish Highlands, always opting for self‑guided itineraries that allow spontaneous creativity.
  culinary: Madison Butler experiments in the kitchen by fusing Korean kimchi with Italian risotto to create a tangy kimchi risotto, perfecting miso‑glazed salmon and occasionally adding truffle oil to
    mushroom tacos, while their skill level sits at confident home‑cook who loves sourcing fresh herbs from the local farmer's market.
  core: Madison Butler is a high‑energy, imagination‑driven tech founder who balances artistic splurges and anxious rumination, often forgetting appointments but never missing a chance to blend science
    with paint.
background:
  cultural: Madison grew up in a middle‑class, predominantly white suburban community in Bucks County, Pennsylvania. Her family’s roots trace back to German and Irish ancestry, and she was raised with values
    of hard work, community involvement, and modest self‑reliance. Exposure to the nearby historic towns and Philadelphia’s vibrant arts scene fostered an early appreciation for cultural diversity and artistic
    expression. She attended a regional public high school before earning a STEM graduate degree at a state university, where she integrated her technical training with a passion for interdisciplinary collaboration.
    Her cultural identity blends traditional American suburban values with a progressive, globally curious outlook shaped by travel, art, and a commitment to social harmony.
