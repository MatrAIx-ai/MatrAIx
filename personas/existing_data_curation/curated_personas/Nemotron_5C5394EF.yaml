  career_goals: Looking ahead, Matthew aims to transition into a senior buying or category-manager role within a regional retail chain, where he can influence broader product strategies and mentor junior
    buyers. He is interested in obtaining a bachelor's degree in supply-chain management to deepen his analytical capabilities and to qualify for future director-level positions. Short-term, he hopes to
    lead a pilot project that introduces environmentally-sourced product lines, aligning his personal concern for harmony with corporate objectives. Ultimately, he envisions leveraging his buying expertise
    to launch his own curated e-commerce boutique that emphasizes sustainable, locally-sourced goods while giving him the flexibility to balance work with personal well-being.
