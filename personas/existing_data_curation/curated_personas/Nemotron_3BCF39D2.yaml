    ''Assessment Design'', ''Creative Arts Integration'']'
  hobbies: '[''Watercolor Painting'', ''Poetry Writing'', ''Cooking Traditional Hispanic Dishes'', ''Yoga and Mindfulness Meditation'', ''Hiking'', ''Reading Literature'', ''Attending Cultural Festivals'',
    ''Volunteering at Community Arts Programs'']'
  career_goals: Dalia aims to obtain an advanced credential in bilingual education within the next two years and to step into a lead‑teacher or curriculum‑coordinator role for her district. She envisions
    designing and launching a district‑wide multicultural arts program that blends visual arts, music, and storytelling with core subjects. Mentoring new teachers and becoming an instructional specialist
    in SEL are also top priorities. Outside the school, Dalia hopes to author a bilingual children’s book that celebrates Latino heritage and to spearhead a community literacy initiative that supports Spanish‑speaking
    families in Hayward.
