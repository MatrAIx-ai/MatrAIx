personas:
  professional: Dalia Santos leverages twenty‑plus years of bilingual language arts and social studies teaching to craft curricula that intertwine visual arts, poetry, and project‑based learning with state
    standards, using Google Classroom and educational apps to streamline instruction while they mentor colleagues, champion SEL initiatives, and assertively advocate for culturally responsive pedagogy despite
    occasional emotional overwhelm.
  sports: Dalia Santos hikes the East Bay trails with the Bay Area Hiking Club, follows the Oakland Athletics and Golden State Warriors, they attend a weekly restorative yoga class at the community studio,
    and they use these activities to balance their emotional reactivity with physical endurance.
  arts: Dalia Santos expresses herself through watercolor portraits inspired by Frida Kahlo and Mary Cassatt, writes bilingual poetry echoing the cadence of Pablo Neruda and Maya Angelou, they curate a
    modest home gallery featuring works by local muralists, and they regularly volunteer at after‑school arts programs to merge community and creativity.
  travel: Dalia Santos enjoys weekend escapes to the Sierra Nevada, has explored Barcelona’s art museums, they dream of immersing themselves in Oaxaca’s vibrant markets, and they plan trips with detailed
    itineraries that respect family commitments and a modest travel budget.
  culinary: Dalia Santos delights in preparing traditional dishes such as mole poblano, chilaquiles, and arroz con pollo, they balance the smoky heat of chipotle with fresh cilantro, and they often host
    potluck evenings featuring homemade tamales and salsa, using these gatherings to nurture community ties.
  core: Dalia Santos is a creatively driven educator who channels intense emotional energy into art, poetry, and community work, they juggle a pragmatic budgeting habit with occasional impulsive spending,
    and they rely on yoga and mindfulness to stay grounded.
background:
  cultural: Dalia’s family emigrated from central Mexico, and she was raised in a bilingual household in the San Francisco Bay Area. Fluent in both Spanish and English, she carries forward Mexican traditions,
    Catholic celebrations, and the rich tapestry of the East Bay Latino community. She incorporates her heritage into teaching through bilingual books, celebrations like Día de los Muertos, and the use
    of music, storytelling, and art that reflect her cultural roots. While embracing American multiculturalism, she values family interdependence, community service, and the preservation of her cultural
    identity.
attributes:
  skills: '[''Curriculum Development'', ''Bilingual Education (English‑Spanish)'', ''Literacy Instruction'', ''Culturally Responsive Teaching'', ''Classroom Management'', ''Differentiated Instruction'',
