personas:
  professional: Raul Lorenzo, a 64‑year‑old bilingual secondary‑school teacher, crafts flexible inquiry‑based curricula that weave art, regional history, and local agriculture, mentors novice teachers,
    leads community art exhibitions, and balances compassion with assertive classroom management, though a relaxed attitude toward scheduling sometimes results in last‑minute lesson adjustments.
  sports: Raul Lorenzo enjoys early‑morning walks across the Colorado plains, participates in a local senior bird‑watching hiking group, follows the Colorado Rockies baseball team, practices gentle tai
    chi at the community centre twice weekly, and volunteers as a walking buddy for students, though a tendency to procrastinate sometimes leads to missed sessions.
  arts: Raul Lorenzo paints vibrant landscapes and folk‑style scenes inspired by the works of Frida Kahlo, Diego Rivera, and folk musicians like Lila Downs, attends intimate gallery openings featuring local
    muralists, reads poetry by Octavio Paz and Gabriela Mistral, and curates community exhibitions that showcase regional craft traditions, while occasionally staying up late perfecting brush techniques
    at the expense of sleep.
  travel: Raul Lorenzo has traveled to the historic colonial town of San Miguel de Allende to study its artistic community, explored the ruins of Chichen Itza on a guided small‑group tour, enjoys weekend
    road trips to the Rocky Mountain National Park for birdwatching, and dreams of visiting the Sunken Gardens of Tikal, preferring low‑key itineraries with flexible schedules that accommodate his meditation
    practice.
  culinary: Raul Lorenzo experiments with regional cuisine, preparing dishes like tamales, mole poblano, chiles en nogada, and pozole using fresh garden corn, dried chilies, cacao, and pumpkin seeds, enjoys
    cooking with aromatic herbs from his vegetable plot, balances modest cooking skill with a love of tasting traditional flavors, and often hosts small dinner gatherings where he serves fresh salsa and
    horchata.
  core: Raul Lorenzo is a curious, art‑loving retiree who blends bilingual teaching, garden cooking, and modest travel, managing money conservatively while wrestling with worries, health quirks, and a charming
    habit of losing receipts.
background:
  cultural: Raul is a first‑generation Mexican‑American who grew up bilingual in a household that honored Mexican customs while adapting to life in rural Colorado. He celebrates Día de los Muertos, Mexican
    holidays, and family gatherings rooted in Catholic traditions. His cultural identity blends Mexican folk art, music, and culinary practices with the values of the Southwest—community, hard work, and
    respect for the land. This bicultural perspective informs his teaching, community involvement, and personal life.
attributes:
  skills: '[''Bilingual Spanish‑English instruction'', ''Inquiry‑based curriculum design'', ''Classroom management'', ''Mentoring and teacher coaching'', ''Community outreach'', ''Cultural heritage education'',
