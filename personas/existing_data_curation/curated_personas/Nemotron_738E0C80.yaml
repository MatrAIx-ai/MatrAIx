personas:
  professional: Ligia Zapata is a bilingual machine operator in a high‑speed packaging line who excels at mechanical troubleshooting, lean process tweaks, and strict safety compliance, balancing curiosity‑driven
    efficiency ideas with a practical, reliable work ethic while they mentor new crew members.
  sports: Ligia Zapata enjoys hiking the White‑Mountain trails with a local outdoor club, participates in a weekend salsa‑fitness class, follows the Boston Bruins zealously, and they squeeze in two‑hour
    weekend runs to stay fit and release work‑day tension.
  arts: Ligia Zapata’s artistic outlet is dancing salsa and bachata at community nights, listening to the rhythms of Juan Luis Guerra and Marc Anthony, attending occasional theater productions in Boston,
    and they explore DIY home‑improvement projects as a form of creative problem‑solving.
  travel: Ligia Zapata prefers a blend of nature retreats and cultural city trips, having explored the hiking routes of Acadia National Park and the historic streets of Cartagena, and they dream of a future
    culinary road‑trip through Andalusia’s villages.
  culinary: Ligia Zapata delights in cooking sancocho and mangú with homemade sofrito, fresh cilantro, and roasted plantains, and they cultivate a tiny indoor herb garden that supplies basil, thyme, and
    oregano for spontaneous fusion dishes shared with friends.
  core: Ligia Zapata balances an analytical mind with a heartfelt love for cooking, dancing, and nature, yet wrestles with anxiety that fuels both meticulous planning and occasional impulsive splurges.
background:
  cultural: Ligia grew up in a household where Dominican customs, music, and cuisine were daily celebrations, instilling a strong sense of community and family loyalty. Fluent in both Spanish and English,
    she bridges cultural gaps at work and in Pelham’s diverse neighborhoods. Her Catholic upbringing, combined with the rhythmic beats of merengue and bachata, influences her holiday traditions and social
    gatherings. Since moving to New England, she has woven together the warmth of Caribbean hospitality with the practical, quieter lifestyle of the region, creating a unique bicultural identity that informs
    her values of kindness, cooperation, and resilience.
attributes:
  skills: '["Operating packaging and filling machines", "Mechanical troubleshooting", "Preventive maintenance", "Quality control inspection", "Safety compliance (OSHA, ISO)", "Inventory and production data
    entry", "Bilingual communication (English/Spanish)", "Team collaboration and shift handover", "Process documentation", "Lean manufacturing basics", "Stress‑management techniques"]'
  hobbies: '["Cooking traditional Dominican meals", "Salsa and bachata dancing", "Hiking New Hampshire trails", "Yoga and mindfulness meditation", "Indoor herb gardening", "DIY home‑improvement projects",
    "Listening to technology podcasts and watching documentaries", "Journaling for emotional processing", "Volunteering at local Dominican cultural events", "Reading fiction and self‑help books"]'
  career_goals: Ligia aspires to advance from machine operator to shift lead, taking on supervisory responsibilities and mentoring newer staff. She plans to earn certifications in industrial automation
    (PLC programming) and advanced safety management, eventually moving into a process‑improvement specialist role where she can formalize the small efficiencies she discovers on the floor. While pursuing
    these professional milestones, she hopes to enroll in a part‑time associate program in industrial technology to broaden her technical foundation. A personal ambition is to develop a healthier work‑life
    balance, reducing anxiety through structured self‑care routines, so she can provide greater stability for her family and become a role model for other women in the manufacturing sector.
