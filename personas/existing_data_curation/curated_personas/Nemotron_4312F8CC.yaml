personas:
  professional: An emerging retail buyer, Annie Poole leverages their eye for emerging design trends, data‑driven market research, and persuasive negotiation skills to curate art‑inspired product assortments,
    while their spontaneous, competitive streak pushes them to chase the next big trend before deadlines bite.
  sports: An enthusiastic sports fan, Annie Poole plays co‑ed beach volleyball with the Lakeside Spikers league, attends Chicago Bulls games in the winter and follows the Chicago Cubs during baseball season,
    while their fitness routine blends spontaneous neighborhood yoga meets with weekly volleyball matches, even if they occasionally skip post‑game stretching.
  arts: An arts‑savvy social explorer, Annie Poole frequents the Quincy Art Barn, immerses themselves in community theater workshops and open‑mic nights, draws inspiration from street‑art legends like Banksy
    and muralist Shepard Fairey, and curates a constantly evolving Instagram feed that features everything from Philip Glasier’s sculptures to indie musician Maggie Rogers, blending their curiosity with
    a competitive urge to be the first to spotlight the next trend.
  travel: An impulsive road‑trip enthusiast, Annie Poole crams weekend getaways into a schedule of spontaneous drives to discover street art in Austin, vintage thrift shops in Portland, and regional craft
    fairs in Detroit, while dreaming of a future international sourcing trip to Barcelona’s design districts and Tokyo’s avant‑garde boutiques, though they often book flights last‑minute using travel‑point
    rewards when budget permits.
  culinary: An experimental home chef, Annie Poole whips up daring dishes like miso‑glazed aubergine with fermented kimchi, harissa‑spiced chicken tacos topped with pickled radish, and matcha tiramisu for
    their friends, showcasing a solid intermediate skill set while their Instagram‑first mindset leads them to document each plate, albeit sometimes over‑seasoning in the excitement of a spontaneous dinner.
  core: An endlessly curious, competitive twenty‑four‑year‑old, Annie Poole thrives on spontaneous creativity and they habitually juggle art‑inspired shopping binges with a chronic reluctance to file paperwork
    on time.
background:
  cultural: Raised in Quincy, Illinois—a Midwestern river town with strong German, Irish, and broader European settler roots—Annie grew up in a middle-class family that valued community, hard work, and
    modesty. The town’s vibrant local festivals, farmers’ markets, and a thriving arts scene, anchored by venues like the Quincy Art Barn and historic downtown galleries, gave her early exposure to regional
    crafts and performance arts. Her public-school education emphasized participation in marching band and student council, fostering teamwork and civic engagement. Although she pursued only some college
    courses in business and visual arts, the blend of Midwestern practicality and an openness to broader cultural currents shapes her worldview, allowing her to appreciate both local traditions and contemporary
    global trends.
attributes:
  skills: '[''Vendor negotiation'', ''Trend forecasting'', ''Market research'', ''Data-driven purchasing'', ''Inventory management'', ''Product curation'', ''Pricing strategy'', ''Supplier relationship
