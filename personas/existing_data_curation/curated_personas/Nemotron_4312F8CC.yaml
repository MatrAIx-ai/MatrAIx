  hobbies: '[''Visiting art galleries and museums'', ''Road trips to explore street art and vintage shops'', ''Community theater workshops'', ''Open-mic music nights'', ''Group improv classes'', ''Recreational
    volleyball'', ''Outdoor yoga'', ''Experimental cooking for friends'', ''Curating Instagram design feed'', ''Attending local festivals and farm markets'']'
  career_goals: Annie aims to become a senior buyer or category manager within the next five years, leading a team that shapes the regional retail assortment. She hopes to expand her sourcing trips internationally
    to bring unique, art-inspired products to Midwest consumers, and ultimately launch her own boutique that merges sustainable fashion with contemporary design. Recognized for her ability to spot cultural
    trends early, she aspires to be a key influencer in her company's merchandising strategy and to mentor junior buyers.
