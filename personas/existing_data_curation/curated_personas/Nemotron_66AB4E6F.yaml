personas:
  professional: Maria Peraza, a seasoned volunteer coordinator at the local senior center, blends bilingual communication, meticulous budgeting, and a love for gardening to design hands‑on cooking workshops
    that empower older adults while honoring family recipes and community values, and they take pride in seeing participants master each step.
  sports: Maria Peraza enjoys low‑impact activity, joining a community walking group that meets after Sunday Mass and cheering on the Los Angeles Dodgers while occasionally playing pétanque at the senior
    center league, and they find the rhythmic steps of the walk meditative and refreshing.
  arts: Maria Peraza immerses themselves in folk melodies by Carlos Mejía and traditional marimba ensembles, attends intimate theater performances starring Lin‑Manuel Miranda’s early works, and captures
    the blooming bougainvillea in their backyard through soft‑focus photography, and they often share the photos at community gatherings.
  travel: Maria Peraza prefers short trips that blend family visits with cultural immersion, such as a weekend pilgrimage to the historic cathedral in their hometown, a road trip to the coastal town of
    Ensenada for fresh seafood, and occasional flights to see their grandchildren on the East Coast, and they plan each itinerary with a notebook of family stories.
  culinary: Maria Peraza masterfully prepares baleadas with refried beans, queso fresco, and avocado, crafts tamales wrapped in banana leaves seasoned with achiote, and tends a kitchen garden of cilantro,
    oregano, and jalapeños, while experimenting with a slow‑cooked pork shoulder infused with orange zest, and they keep a recipe diary to record each variation.
  core: Maria Peraza embodies a pragmatic curiosity that fuels community service, frugal finance, gentle health routines, modest sport enthusiasm, deep artistic appreciation, purposeful travel, and a kitchen
    rooted in tradition, and they occasionally forget medication refills.
background:
  cultural: Maria was born in Honduras and moved to Southern California in her early thirties. She grew up in a close-knit Honduran family where Catholic faith, family loyalty, and community solidarity
    were central. In Pico Rivera, she maintains her heritage through speaking Spanish at home, celebrating Honduran holidays like Independence Day and Semana Santa, cooking foods such as baleadas and tamales,
    and participating in local Latino community events. Her cultural identity blends traditional Honduran customs with the multicultural environment of Los Angeles County.
