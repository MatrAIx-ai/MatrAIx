  career_goals: Continue to learn new recipes and cooking techniques, document and preserve family stories and recipes for future generations, mentor younger women in the local Hispanic community, volunteer
    at senior centers to lead small cooking workshops, maintain physical health through gardening, and travel occasionally to visit family in Honduras.
