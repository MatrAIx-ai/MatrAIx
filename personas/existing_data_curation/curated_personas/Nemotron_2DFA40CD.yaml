  career_goals: Chuan aims to transition into a senior full‑stack or product‑lead role where he can steer the development of culturally resonant, ethically designed tech products. He dreams of founding
    a startup that blends interactive storytelling with immersive media, targeting both English‑speaking and Mandarin‑speaking audiences. Alongside career advancement, he seeks to mentor under‑represented
    youth in coding, build a supportive community around mental‑health‑aware work practices, and eventually publish a whitepaper on the intersection of humanities and AI ethics.
