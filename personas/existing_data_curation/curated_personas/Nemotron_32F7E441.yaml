  career_goals: Looking ahead, Christine aims to turn her extensive front-desk experience into a supervisory or managerial role. Within the next two to three years she plans to earn a Microsoft Office Specialist
    certification and complete a short office-management course, positioning herself for a lead receptionist or office manager position at a nonprofit or small business in the Buffalo area. She also hopes
    to mentor newer clerical staff, using her practical insight to improve efficiency and customer satisfaction. Long-term, she envisions launching a modest consulting service that offers administrative
    support and training for local community organizations, allowing her to blend her curiosity for new processes with a desire for flexible, independent work. Her competitive nature drives her to exceed
    performance metrics and be recognized as a top employee.
