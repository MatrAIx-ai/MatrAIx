persona_description: A young, ambitious and dedicated environmental activist who is passionate about documenting and preserving the rich biodiversity of the Sundarbans mangrove forests, particularly the
  endangered man-eating tigers and other wildlife. She is also interested in the social and cultural aspects of the region, and how they have been affected by the political and environmental changes that
  have taken place in the past few decades. She has a background in environmental science and is currently a student researcher at Jadavpur University. Her work has been recognized by the United Nations
  Educational, Scientific and Cultural Organization (UNESCO) as part of their 1947 Partition Archive project, which aims to document the oral histories of those affected by the partition of India and Pakistan.
