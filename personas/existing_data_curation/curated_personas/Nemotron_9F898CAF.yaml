personas:
  professional: Inez Newman, a library assistant with a knack for meticulous cataloging and inventive problem‑solving, blends methodical organization with a calm, cooperative demeanor to design information‑literacy
    workshops, coordinate community outreach events, and champion emerging library technologies, all while quietly asserting themselves when patron concerns arise.
  sports: Inez Newman enjoys low‑impact fitness, regularly participating in weekday morning yoga classes at the local community center, hiking the nearby Blue Ridge trail with their husband, and cheering
    on the Atlanta Falcons during football season while being a member of the neighborhood walking club that meets on Saturday mornings.
  arts: Inez Newman weaves literary passion into daily life, finding inspiration in the prose of Toni Morrison, the poetry of Langston Hughes, and the storytelling of Maya Angelou, while also attending
    theater productions of August Wilson plays and listening to the soulful jazz of Nina Simone during quiet evenings, which fuels their quilting designs.
  travel: Inez Newman prefers thoughtfully planned getaways that combine cultural immersion with nature, having visited Charleston’s historic district, the gardens of Savannah, and a weekend retreat in
    Asheville’s Blue Ridge Parkway, while dreaming of exploring the literary cafés of Edinburgh and the serene rice paddies of Bali, all on a budget that balances family obligations and travel aspirations.
  culinary: Inez Newman delights in cooking comfort cuisine, expertly preparing dishes like collard greens simmered with smoked turkey, sweet potato pie spiced with nutmeg, and cornbread infused with honey
    and jalapeño, while experimenting with contemporary twists such as quinoa‑stuffed peppers, and they are skilled enough to host monthly dinner parties for their book club despite a habit of burning the
    edges of their loaves when distracted.
  core: Inez Newman, a 35‑year‑old library assistant, balances methodical precision with creative curiosity, channels quiet determination into community literacy work, and nurtures a love for Southern literature,
    mindful self‑care, and modest culinary experiments, while they occasionally forget to water their herb garden.
background:
  cultural: Born and raised in Nashville's historic African‑American neighborhoods, Inez grew up steeped in the traditions of Black Southern culture—gospel music, storytelling, and communal cooking. Her
    family emphasized education, resilience, and service, values she carries into her work at the library. Living in Nolensville, she bridges the small‑town environment with the vibrant cultural legacy
    of Davidson County, integrating her heritage into programming that celebrates Black literature, local history, and intergenerational dialogue. Her identity as a Black woman informs her commitment to
    fostering inclusive spaces, preserving community narratives, and mentoring the next generation.
attributes:
  skills: '[''Cataloging (Dewey Decimal, MARC)'', ''Reference and research assistance'', ''Information literacy instruction'', ''Digital archives management'', ''Data entry and records management'', ''Customer
    service'', ''Event planning and coordination'', ''Public speaking and presentation'', ''Critical analysis of literature'', ''Cultural programming'', ''Microsoft Office suite proficiency'', ''Basic HTML
    and website maintenance'', ''Budget tracking'', ''Conflict resolution'', ''Community outreach'']'
  hobbies: '[''Reading African American and Southern literature'', ''Creative writing and blogging'', ''Genealogical research'', ''Quilting'', ''Cooking soul‑food dishes'', ''Yoga and mindfulness meditation'',
    ''Gardening'', ''Small‑group book club participation'', ''Volunteer adult literacy tutoring'', ''Hiking local trails'']'
  career_goals: Inez aims to enroll in a Master of Library and Information Science program within the next three years to transition from a library assistant to a librarian with a focus on archival preservation
    of African American history. She hopes to lead community outreach initiatives that promote literacy, cultural heritage, and intergenerational storytelling, and to develop digital collections that document
    local Black histories. In the long term, she envisions serving as a program coordinator for the public library system, mentoring emerging professionals from underrepresented backgrounds, and establishing
    a collaborative space for community-driven cultural programming.
