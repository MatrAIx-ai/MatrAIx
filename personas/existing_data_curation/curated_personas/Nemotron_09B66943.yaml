personas:
  professional: Bruce Wienhoff is a front‑of‑house hospitality specialist who combines data‑driven operational insight, calm conflict de‑escalation, and a competitive drive to benchmark venue performance,
    positioning them for a future operations‑manager role in a regional amusement park.
  sports: Bruce Wienhoff plays point guard for the Midtown Madness basketball league, regularly jogs with the OKC Runners Club, and supports the Oklahoma City Thunder while hiking the Ozark foothills on
    weekends, a routine they treat as both competition and social bonding.
  arts: Bruce Wienhoff captures downtown OKC’s energy through black‑and‑white street photography inspired by Henri Cartier‑Bresson, sings karaoke classics like “Livin’ on a Prayer,” and frequents live‑music
    venues to see The Strokes and local indie acts, a habit they use to stay socially energized and creatively inspired.
  travel: Bruce Wienhoff prefers short, active getaways—weekend hikes in the Ozark foothills, a road trip to Austin’s live‑music district, and a future dream to explore Japan’s tech hubs—balancing limited
    vacation days with a desire for both adventure and cultural immersion that they meticulously plan.
  culinary: Bruce Wienhoff enjoys flavor‑packed Oklahoma barbecue—especially smoked brisket and jalapeño cornbread—while also experimenting with homemade ramen bowls, often using a sous‑vide for precise
    results, and they savor craft beers from local breweries like Bricktown Brewery during game nights.
  core: Bruce Wienhoff is a socially energized hospitality operative who mixes relentless competition, tech curiosity, and a worry‑prone mind into a life of immersive experiences, constant self‑benchmarking,
    and weekend adventures they chase with relentless energy.
background:
  cultural: Bruce grew up in a middle-class, white family of German ancestry in Oklahoma City, where Midwestern pragmatism blends with the region’s rich Native American heritage and strong community spirit.
    His parents emphasized reliability, self-reliance, and involvement in local events—values that echo in his sociable, team-oriented personality. Attending a state university for a humanities degree broadened
    his cultural perspective, fostering an appreciation for literature, theater, and the arts. Living in OKC’s diverse yet close-knit environment shaped his understanding of both traditional values and
    contemporary entertainment culture.
