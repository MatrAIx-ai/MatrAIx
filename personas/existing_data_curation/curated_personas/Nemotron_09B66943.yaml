  career_goals: Bruce aims to move from his current attendant role to an operations manager position at a regional amusement or event venue within the next five years. He plans to supplement his BA with
    a hospitality-management certificate and eventually an MBA to deepen his strategic expertise. Long-term, he aspires to spearhead the integration of immersive technologies—such as AR experiences—into
    live entertainment, and ultimately launch his own boutique event-production company in the Oklahoma City area. His competitive streak drives him to benchmark performance against industry leaders and
    continuously raise service standards.
