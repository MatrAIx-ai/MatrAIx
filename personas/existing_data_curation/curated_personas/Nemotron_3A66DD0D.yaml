  hobbies: '["Building with LEGO and wooden blocks", "Drawing and coloring pictures of animals and vehicles", "Collecting rocks and shells from the local creek", "Attending storytime sessions at the town
    library", "Watching nature‑focused cartoons", "Pretend firefighting games with a few friends", "Playing in the sandbox with defined mini‑projects"]'
  career_goals: Even at four, Michael dreams of growing up to be someone who helps others in a hands‑on way. He is fascinated by fire trucks and wants to become a firefighter, admiring the practical bravery
    and the equipment. He also imagines building things as an engineer or builder, combining his curiosity about how objects work with his knack for constructing sturdy models. These ambitions reflect his
    desire for practical impact paired with his inquisitive nature.
