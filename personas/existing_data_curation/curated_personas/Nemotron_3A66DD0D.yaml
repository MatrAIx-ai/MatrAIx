personas:
  professional: Michael Moxley, a four‑year‑old “mini‑engineer” who meticulously assembles LEGO skyscrapers, balances their curiosity for new building techniques with the practicality of following step‑by‑step
    manuals, and quietly competes with peers for the most intricate creation while preferring solo play.
  sports: Michael Moxley, a four‑year‑old who loves the local Little Tigers soccer club and watches the New York Yankees on TV, spends weekends sprinting in the backyard, prefers organized drills over chaotic
    games, and competitively tries to score the winning goal while staying wary of team dynamics.
  arts: Michael Moxley, a four‑year‑old who delights in drawing cartoon dinosaurs, sings along to “Let It Go” from Frozen, and idolizes Sesame Street’s Elmo, spends afternoons recreating favorite scenes
    with play‑dough, and uses their curiosity to experiment with colors while quietly preferring solo artistic projects.
  travel: Michael Moxley, a four‑year‑old whose family vacations include trips to Disneyland and the Grand Canyon, favors short car rides with interactive storybooks over long flights, eagerly explores
    tactile exhibits at children’s museums, and daydreams about a future safari in Kenya while their parents budget the adventure with a travel savings fund.
  culinary: Michael Moxley, a four‑year‑old who relishes cheesy macaroni, crunchy chicken nuggets, and strawberry slices, can carefully stir batter for their weekend pancakes, insists on having their pizza
    cut into perfect triangles, and occasionally refuses vegetables, claiming they’re “too mushy”, revealing a picky yet enthusiastic palate.
  core: Michael Moxley is a four‑year‑old curious inventor who quietly competes in solo play, worries about routine changes, hoards tiny treasures, and navigates the world with a blend of meticulous organization
    and spontaneous imagination.
background:
  cultural: Michael is raised in a white, Southern‑American family in Loranger, Louisiana. His upbringing blends traditional Southern customs—such as weekend church attendance, community gatherings, and
    celebrating holidays like Thanksgiving and the Fourth of July—with a strong connection to the natural outdoors of Tangipahoa Parish. The local culture emphasizes modesty, self‑reliance, and close‑knit
    community values, all of which shape his reserved demeanor, his preference for small‑group interactions, and his cautious, yet curious, outlook on new experiences.
attributes:
  skills: '["Letter recognition (A‑Z)", "Counting to twenty", "Simple puzzle assembly", "Block construction and structural stability", "Organizing and tidying toys", "Basic drawing of shapes and figures",
