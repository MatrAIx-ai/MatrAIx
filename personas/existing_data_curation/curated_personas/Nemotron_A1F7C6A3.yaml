personas:
  professional: Norma Fazzolare is an aspiring soccer captain who, when she imagines leading a team, draws play diagrams that blend disciplined drills with spontaneous improvisation, and they hope to coach
    younger kids in her community.
  sports: Norma Fazzolare plays for the under‑9 Tigers soccer team at Houston's Memorial Park, cheers for the Houston Dynamo, and spends weekends practicing goal‑keeping drills while also enjoying free‑form
    scrimmages that let her improvise on the field, and they look forward to the upcoming regional tournament.
  arts: Norma Fazzolare fills her sketchbooks with vivid animal drawings and festival scenes, listens to cumbia hits by Los Ángeles Azules and reggaeton tracks by Bad Bunny, draws inspiration from Frida
    Kahlo’s bold colors, and they proudly display wildlife stickers on her school notebooks.
  travel: Norma Fazzolare loves family trips to the Houston Museum of Natural Science and Galveston beaches, has a scrapbook page for Disneyland adventures, dreams of exploring the ancient pyramids of Mexico
    and the rainforests of Costa Rica on future school field trips, and they often plan imaginary itineraries during nature walks.
  culinary: Norma Fazzolare helps her family press cheese‑and‑bean filled corn‑meal flatbreads on Saturdays, delights in frying golden yuca sticks, proudly cooks a simple mango‑avocado salsa, though they
    sometimes forget to wash their hands before handling the dough, and they love tasting the finished pupusas with a squeeze of lime.
  core: Norma Fazzolare is a practical yet flexible eight‑year‑old who blends structured soccer drills with spontaneous art, saves coins in a piggy bank while sometimes overlooking floss, and they treasure
    family festivals and sticker collections.
background:
  cultural: Norma grows up in a Salvadoran‑American household in Houston. Spanish is spoken at home, and she celebrates Salvadoran traditions such as Independence Day on September 15 and Las Posadas during
    the Christmas season, often enjoying pupusas, tamales, and yuca frita with extended family. She participates in community events organized by the local Salvadoran Youth Club, wears traditional attire
    during festivals, and learns Salvadoran folk songs. Her family places a strong emphasis on close intergenerational bonds, communal meals, and respect for cultural heritage, which enriches her identity
    and daily life.
attributes:
  skills: '["Reading fluently at second‑grade level", "Basic addition, subtraction, and multiplication", "Using iPad for educational apps", "Bilingual Spanish‑English communication", "Following daily routines
