    everyday tasks"]'
  hobbies: '["Playing soccer with neighborhood friends", "Drawing and coloring animals and cultural scenes", "Reading bilingual storybooks", "Helping prepare pupusas and other Salvadoran dishes", "Collecting
    wildlife stickers", "Building LEGO sets following instructions", "Listening to cumbia and reggaeton music", "Exploring parks and nature walks", "Watching animal documentaries"]'
  career_goals: Norma is fascinated by roles that let her help others and work with things she can see and touch. She often tells her parents that she wants to become a teacher because she likes explaining
    things to her younger cousins, and she also dreams of being a veterinarian to care for neighborhood pets. She imagines finishing school, studying at a university, and using her love of animals and learning
    to make a positive difference in her community.
