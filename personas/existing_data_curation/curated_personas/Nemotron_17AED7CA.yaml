  career_goals: Morris aims to become a senior full‑stack engineer within the next three years, eventually stepping into a lead developer or technical product manager role where he can shape product strategy
    and guide a small, collaborative team. He dreams of launching a tech startup that offers affordable web solutions for local small businesses in Brooklyn, leveraging his business background to address
    community needs. To support these ambitions, he plans to earn cloud certifications (AWS or Google Cloud) and deepen his expertise in scalable architecture, while maintaining a flexible work schedule
    that preserves his spontaneous, social lifestyle.
