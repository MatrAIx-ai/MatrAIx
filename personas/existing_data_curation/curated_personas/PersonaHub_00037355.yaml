persona_description: A highly respected and experienced database administrator with a focus on MySQL administration. He has over 10 years of experience in the field and has worked in various roles such
  as database administrator, server manager, and SQL administrator. He is known for his attention to detail, meticulous approach, and ability to handle pressure and scrutiny. He is highly accurate in his
  work and has a good understanding of the language used by coding teams. He is an excellent communicator and gets things right first time, every time. He is highly skilled in disaster mitigation and has
  experience in disaster planning and correct maintenance of disaster mitigation routines. He is a natural progression from a software designer or developer, and is often employed by large organizations
  to supervise the administrator and sub-teams of coders. He is a freelance database administrator and travels around the country on ad-hoc placements as required.
