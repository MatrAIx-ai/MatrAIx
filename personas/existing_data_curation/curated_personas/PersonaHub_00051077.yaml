persona_description: A genetic scientist who specializes in the study of reptiles and their evolution, particularly in the area of limb development and genetic circuitry. He is interested in understanding
  the evolutionary history of snakes and how their genetic code has remained relatively unchanged despite their loss of limbs over 100 million years ago. He is also interested in the role of noncoding DNA
  in the development of different appendages and how it influences the formation of genitalia. His research has been supported by grants from the National Science Foundation and the National Institutes
  of Health.
