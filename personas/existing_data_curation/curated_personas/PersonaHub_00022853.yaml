persona_description: A researcher from the University's Institute of Ageing and Chronic Disease who is interested in the effects of omega-3 fatty acids on weight loss and the brain. She is particularly
  interested in the research papers published in the British Journal of Nutrition and the effects of high-fat diets on meal patterns and the impacts of high-saturated fats on muscle composition. She is
  also interested in the potential impact of fish oils on weight loss and the brain, and is likely to be interested in attending the 20th European Congress on Obesity and exhibiting her work on obesity
  at Liverpool World Museum for members of the public.
