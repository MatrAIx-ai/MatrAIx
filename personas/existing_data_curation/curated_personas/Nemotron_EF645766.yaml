  career_goals: Michael aims to advance from a hands‑on surveying technician to a senior GIS analyst or mapping project manager within the next five years. He plans to earn the GIS Professional (GISP) certification
    and pursue a master's degree in geomatics or urban planning to broaden his strategic perspective. He is particularly interested in leading large‑scale infrastructure mapping projects for municipal agencies
    in New Jersey, integrating drone and AI technologies to improve efficiency and accuracy. Long‑term, he envisions establishing his own consulting firm that provides high‑precision surveying, data analytics,
    and advisory services to local governments and private developers.
