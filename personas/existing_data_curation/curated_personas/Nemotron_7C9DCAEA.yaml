personas:
  professional: Evan Thabet, a senior water‑treatment plant operator, leverages their SCADA expertise and imaginative flair to devise creative process optimizations while training crew members with hand‑drawn
    visual aids and storytelling that echo the river’s rhythm, and they are eager to shepherd the plant toward AI‑driven controls.
  sports: Evan Thabet, a weekend hiker and charity‑run participant who plays in a local softball league, roots for the Kentucky Wildcats men’s basketball team and follows the St. Louis Cardinals, and they
    frequently combine fitness with community service by volunteering at river‑clean‑up relay races.
  arts: Evan Thabet, a landscape painter inspired by Thomas Hart Benton, guitarist who covers Bob Dylan and John Prine in a weekly acoustic jam, improv comedy enthusiast who idolizes Robin Williams, avid
    reader of Octavia Butler and Neal Stephenson, and frequent visitor of craft fairs showcasing artisans like ceramicist Mary Jo Larkey, and they weave these influences into vibrant visual storytelling.
  travel: Evan Thabet, who plans trips around water and culture, has kayaked the Mississippi River near Memphis, hiked the Blue Ridge Mountains, attended the Folk Alliance Festival in Nashville, and dreaming
    of river‑rafting adventures in Patagonia’s Futaleufú and a weekend art‑fair getaway to Santa Fe, and they budget travel carefully while still indulging in spontaneous weekend getaways.
  culinary: Evan Thabet, an enthusiastic home cook who perfects pan‑seared river trout with lemon‑dill butter, grills pork shoulder for Kentucky‑style burgoo, crafts craft‑beer‑battered catfish po’boys
    with Old Bay seasoning, pairs meals with locally brewed bourbon‑infused BBQ sauce, and they occasionally dabble in kimchi fried rice after a culinary trip to Seoul.
  core: Evan Thabet, a 40‑year‑old water‑treatment specialist, fuses Southern hospitality, blue‑grass rhythm, and restless imagination into creative problem‑solving, community art, and spontaneous adventures,
    even if they sometimes let their studio become a cluttered mess.
background:
  cultural: Evan grew up in Boaz, a small town in western Kentucky’s Graves County, where Appalachian and Southern traditions shape daily life. His family’s roots are in multi‑generational farming and small‑town
    community values that emphasize hospitality, self‑reliance, and a deep connection to the land and waterways. The region’s cultural fabric includes bluegrass music, folk storytelling, and a strong work
    ethic. Church gatherings and neighborly cooperation are common, fostering a close‑knit social network. While these traditions anchor his identity, Evan’s separated status and curiosity have led him
    to blend his rural heritage with a willingness to explore new artistic and technological ideas, creating a unique personal blend of practicality and creative expression.
attributes:
  skills: '[''Water treatment plant operations'', ''Pump and motor maintenance'', ''SCADA system monitoring'', ''Water quality testing and analysis'', ''Regulatory compliance (EPA and KYDEP)'', ''Process
