    for educational materials'']'
  hobbies: '[''Landscape painting'', ''Abstract art creation'', ''Playing acoustic guitar'', ''Local jam sessions'', ''Improv comedy'', ''Community river clean‑ups'', ''Hiking and fishing'', ''Reading science‑fiction
    novels'', ''Exploring IoT and smart‑home gadgets'', ''Model rocketry'', ''Participating in charity runs'', ''Experimental cooking'', ''Attending art and craft fairs'']'
  career_goals: Evan aims to advance from senior operator to shift supervisor and eventually plant manager, where he can oversee the adoption of cutting‑edge technologies such as membrane bioreactors, UV
    disinfection, and AI‑driven process control. He is also interested in establishing a regional training program for water‑treatment professionals that blends technical rigor with creative communication.
    Long‑term, he envisions launching a consulting practice that helps utilities improve efficiency while engaging the public through art‑based outreach and storytelling about water sustainability.
