  hobbies: '[''Reading Chinese literature'', ''Cooking experimental fusion dishes'', ''Herb gardening'', ''Calligraphy'', ''Tai Chi'', ''Knitting'', ''Attending cultural festivals'']'
  career_goals: Alexandra aims to earn a GED and pursue a certification as a home health aide or community volunteer coordinator, formalizing her practical knowledge. She dreams of launching a small home‑based
    catering service that offers authentic Chinese festive dishes for neighborhood gatherings. She also hopes to lead weekly cooking classes at the local community center, mentor immigrant families navigating
    school systems, and continue strengthening her family's financial security while supporting her children's educational and career aspirations.
