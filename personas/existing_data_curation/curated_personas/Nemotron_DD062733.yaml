personas:
  professional: Javier Santiago is a teenage eSports enthusiast who channels a strategic mind into fast‑paced shooters and MOBAs, following a meticulously organized practice schedule that balances daily
    schoolwork and gaming while dreaming of a college scholarship in game design.
  sports: Javier Santiago is an avid soccer player who competes with the Carthage United Youth Soccer League at the local park, regularly watches MLS matches of Sporting Kansas City, and treats competitive
    gaming with Team Liquid as a parallel sport, maintaining a balanced training routine that includes weekend pick‑up games and daily reflex drills.
  arts: Javier Santiago is a graphic‑novel enthusiast who devours titles such as Saga, Watchmen, and My Hero Academia while vibing to Bad Bunny, Travis Scott, and traditional marimba ensembles, occasionally
    dabbling in sketching fan art and remixing soundtrack playlists for their gaming streams.
  travel: Javier Santiago is a weekend explorer who hikes the nearby Ozark trails around Carthage, has taken family road trips to New Orleans and Kansas City, and dreams of attending the Tokyo Game Show
    in Japan next summer, though limited budget and school commitments keep international travel on the back‑burner for now.
  culinary: Javier Santiago is a budding home cook who assists their family in preparing spicy chicken tacos, grilled chicken with chipotle glaze, fresh guacamole made with ripe avocados, cilantro, and
    lime, and even crafts LEGO‑inspired dessert platters that showcase their love for both flavor and step‑by‑step creativity.
  core: Javier Santiago is a structure‑loving yet flexible teen who dominates virtual battlefields, scores soccer goals, builds LEGO marvels, and occasionally forgets to charge their phone while juggling
    a competitive streak with a laid‑back attitude toward daily chores.
background:
  cultural: Javier grew up in a Guatemalan‑American household where Spanish is spoken daily and family traditions from Guatemala are cherished. Catholic holidays such as Semana Santa and Día de los Santos
    are observed, often with special foods like pupusas and tamales prepared at home. He maintains strong ties to his heritage through music, cuisine, and stories shared by his grandparents, while also
    navigating life in Carthage, Missouri, blending both cultures in his daily routine.
