  career_goals: Javier aims to finish his secondary education through a GED program and then enroll in a technical college, where he hopes to study automotive technology or computer programming. He also
    dreams of turning his competitive gaming talent into a semi‑professional esports career, and he keeps the option of pursuing a college soccer scholarship open. Ultimately, he wants a stable career that
    lets him support his family, stay connected to his Guatemalan heritage, and give back to the local community through mentorship or cultural events.
