  career_goals: Hana aspires to pursue a career that blends her love for art and systematic thinking, such as UX design, graphic storytelling, or architectural visualization. She hopes to attend a magnet
    high school focused on STEM and visual arts, later study visual communication and human‑centered design at a university, and ultimately create inclusive digital experiences while advocating for mental‑health
    awareness among young people.
