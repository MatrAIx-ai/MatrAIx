personas:
  professional: Hana Payton, an aspiring digital illustrator and budding game programmer, channels her organized curiosity into crafting detailed watercolor sketches that she later animates into simple
    interactive stories.
  sports: Hana Payton stays active by attending after‑school swim practices with the River Valley Aquatics club, runs cross‑country for her middle school team, and passionately follows the nearby professional
    soccer franchise, Harbor FC, wearing their jersey on game days.
  arts: Hana Payton immerses herself in the world of speculative graphic novels, drawing inspiration from creators like Shaun Tan, Kazu Kibuishi, and Hayao Miyazaki, while her ambient soundtrack often features
    Brian Eno, Bon Iver, and Sufjan Stevens to fuel her watercolor and digital sketch sessions.
  travel: Hana Payton meticulously plans family trips, having explored Washington D.C.’s Smithsonian museums and the vibrant streets of New York City, while dreaming of a solo cultural pilgrimage to Kyoto’s
    temples and the Louvre in Paris, though her lingering anxiety sometimes delays booking.
  culinary: Hana Payton enjoys crafting simple yet flavorful meals like basil pesto pasta, sushi rolls with fresh tuna and avocado, and matcha‑infused desserts, showcasing an intermediate cooking skill
    that balances her love for experimenting with familiar comforts.
  core: A quietly curious teen artist, Hana Payton blends meticulous organization with vivid imagination, yet navigates life’s currents with an undercurrent of intense anxiety.
background:
  cultural: Hana was raised in a middle‑class, suburban family of primarily Anglo‑American heritage in Charlotte, North Carolina. Her upbringing blends classic Southern customs—such as attending community
    festivals, enjoying local food like barbecue, and participating in library reading programs—with a modern, multicultural exposure from the diverse Charlotte area. Her parents encourage both academic
    achievement and artistic exploration, and the city’s vibrant museum scene and tech‑oriented schools influence her curiosity and appreciation for varied experiences.
attributes:
