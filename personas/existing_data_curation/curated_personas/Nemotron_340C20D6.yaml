  hobbies: '[''Reading technical manuals and DIY blogs'', ''Gardening'', ''Cooking traditional South Asian dishes'', ''Photography'', ''Hiking local trails'', ''Model building'', ''Small cultural gatherings'']'
  career_goals: Nayan aims to re‑enter the workforce by securing a skilled‑trade position that leverages his practical abilities. Over the next two years he plans to obtain certifications in home‑repair
    safety (OSHA 10) and EPA lead‑safe renovation, followed by a small‑business license to launch a freelance handyman service in Salem. His ambition is to build a reliable client base focused on quality,
    eventually hiring an apprentice and offering mentorship to other newcomers from South Asian backgrounds. He also hopes to enroll in part‑time courses on project management to improve his business operations
    and to ensure financial stability for his family.
