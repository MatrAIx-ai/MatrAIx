persona_description: A scientist or researcher interested in the study of evolutionary biology, particularly the mechanisms and factors that contribute to the adaptation and thermal responses of different
  species. They are particularly interested in the effects of climate change on the evolution and adaptation of species, and how they can be used to understand and predict the effects of climate change
  on biodiversity and ecosystem functioning. They are likely to have expertise in using empirical data and models to analyze and interpret the results of experiments and observations, and to have a strong
  interest in the application of these techniques to real-world problems. They may have a background in biology, ecology, or environmental science, and may have a particular interest in the study of hybridization
  and the evolution of hybrid species.
