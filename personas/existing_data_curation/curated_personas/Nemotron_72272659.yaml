  career_goals: Jacqueline aims to progress to a senior HR leadership role—such as Director of Human Resources or Vice President of People—by deepening her strategic expertise, obtaining professional certification
    (SHRM‑CP or SHRM‑SCP), completing her bachelor's degree in Business Administration, and potentially pursuing an MBA focused on organizational leadership. She is committed to shaping a culture of continuous
    learning, equity, and well‑being within her organization, mentoring emerging HR talent, and implementing data‑driven workforce planning. Additionally, she aspires to contribute her expertise to community
    nonprofits on a pro‑bono advisory basis.
