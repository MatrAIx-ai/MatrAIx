  career_goals: Katherine’s career ambition centers on advancing to a supervisory position where she can shape department policy and deepen community ties. Over the next two years she aims to earn promotion
    to Sergeant, leveraging her organizational strengths to oversee a precinct unit focused on mental‑health crisis response. She plans to develop a mentorship program for new recruits that emphasizes empathy,
    ethical decision‑making, and data‑driven policing. In the longer term, she envisions transitioning to a police academy instructor or consultant role, contributing to statewide training curricula that
    integrate practical investigative techniques with compassionate community engagement.
