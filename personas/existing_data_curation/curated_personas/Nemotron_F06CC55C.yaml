personas:
  professional: Erick is a 25‑year‑old associate pastor who blends structured sermon preparation with a relaxed, adaptable approach to ministry, they use compassionate yet assertive counseling and practical
    administrative systems to serve their North Dakota congregation while nurturing a budding youth ministry.
  sports: Erick follows North Dakota State Bison football and the Fargo‑Moorhead RedHawks baseball with fervor, they play in a community softball league each summer, and they fit in weekend hikes along
    the Missouri River as an informal cardio routine, preferring low‑key outdoor activity over regimented gym workouts.
  arts: Erick expresses creativity by playing acoustic guitar in the church worship team, they jam on songs by Chris Tomlin and First Aid Kit, capture rural North Dakota landscapes in photographs inspired
    by Ansel Adams, and unwind with classic literature by Cormac McCarthy alongside contemporary theological works.
  travel: Erick prefers modest road trips that mix adventure with relaxation, they have driven to Badlands National Park, Yellowstone, and a weekend music‑filled getaway in Minneapolis, and they dream of
    a future pilgrimage to Jerusalem once pastoral responsibilities allow more flexibility.
  culinary: Erick enjoys home‑brewing a seasonal IPA and cooking hearty dishes such as bison stew, sourdough bread, and roasted rutabaga, they have a modest culinary skill set that blends garden‑fresh produce
    with a penchant for sharing meals at community gatherings.
  core: Erick is a structure‑loving yet easy‑going pastor‑in‑training who balances steadfast ministry duties with spontaneous outdoor hobbies, a pragmatic financial outlook, and a heartfelt commitment to
    community service.
background:
  cultural: Erick grew up in a rural Midwestern environment with deep Protestant roots that shape his worldview and vocation. While his surname, Maldonado, hints at a Hispanic lineage, his family identifies
    as white and has largely assimilated into the cultural fabric of North Dakota's agricultural communities. This blend gives him an appreciation for both the traditional values of small‑town America—self‑reliance,
    community service, and modesty—and a subtle awareness of multicultural perspectives that inform his inclusive ministry. His marriage and involvement in local traditions, such as Thanksgiving potlucks
    and county fairs, further anchor him in the region’s cultural tapestry, while his openness to diverse congregational backgrounds reflects the broader, evolving identity of contemporary Midwest clergy.
attributes:
  skills: '[''Sermon preparation with flexible delivery'', ''Pastoral counseling with compassionate assertiveness'', ''Church administration and budgeting'', ''Community event coordination'', ''Volunteer
