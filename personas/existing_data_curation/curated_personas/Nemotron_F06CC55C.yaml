  hobbies: '[''Fishing on the Missouri River'', ''Hiking prairie trails'', ''Acoustic guitar playing'', ''Home‑brewing craft beer'', ''Vegetable gardening'', ''Photography of North Dakota landscapes'',
    ''Reading classic literature and theological works'', ''Volunteering at the soup kitchen'', ''Participating in community fairs'', ''Winter snowshoeing'']'
  career_goals: In the short term, Erick aims to complete his Master of Divinity and take on additional responsibilities as an associate pastor at his congregation, focusing on developing a robust youth
    ministry and expanding the church’s outreach to the surrounding rural community. Over the next five years, he hopes to become a senior pastor, leading a multi‑generational congregation while pursuing
    certification in pastoral counseling to deepen his support for parishioners facing mental‑health challenges. Long‑term, Erick envisions establishing a regional network of small‑town churches in North
    Dakota that share resources for community health, social services, and spiritual formation. He also aspires to author a guidebook on practical faith for everyday life, blending his structured teaching
    style with the flexibility needed for real‑world application. Throughout his career, Erick seeks to balance his pastoral duties with a thriving family life, ensuring that his marriage remains a central
    source of support and inspiration.
