  career_goals: Teresa aims to obtain a Certified Billing and Coding Specialist (CBCS) credential within the next year to formalize her expertise and qualify for a senior billing clerk or team lead role
    at her current employer. She also wants to mentor newer clerks, sharing her knowledge of efficient posting techniques and troubleshooting billing errors. In the longer term, Teresa hopes to transition
    into a part‑time consulting role for small healthcare practices in West Texas, helping them streamline billing workflows while maintaining a flexible schedule that supports her health, personal interests,
    and financial security for retirement.
