personas:
  professional: Awilda Castillo, a veteran civil engineer turned interdisciplinary educator, leverages their expertise in sustainable infrastructure design, statistical modeling, and Python programming
    to methodically develop community science curricula that blend abstract scientific concepts with folk‑inspired visual art, while their competitive spirit drives them to mentor emerging women in STEM
    and secure high‑impact consultancy contracts.
  sports: Awilda Castillo, an avid hiker and dedicated member of the Santa Fe Senior Trail Club, spends weekends trekking the Sangre de Cristo foothills, follows New Mexico United soccer matches on television,
    and participates in weekly chess meet‑ups at the community center, blending low‑impact physical activity with strategic mental exercise.
  arts: Awilda Castillo, a mixed‑media painter and digital illustrator, draws inspiration from the abstract vibrancy of Frida Kahlo’s folk motifs and the desert‑lit palettes of Georgia O’Keeffe, regularly
    contributes to the Santa Fe poetry circle where bilingual verses echo her love of speculative fiction, and curates photo essays that capture the interplay of light on adobe walls.
  travel: Awilda Castillo, a meticulous planner with a love for culturally immersive trips, has charted journeys to the historic adobe towns of Taos and San Miguel de Allende, explored the botanical gardens
    of Kyoto for herb inspiration, and dreams of a research‑focused pilgrimage to the CERN facilities in Geneva, balancing modest retirement savings with occasional splurges on flight upgrades for comfort.
  culinary: Awilda Castillo, an accomplished home chef, delights in preparing traditional dishes such as mole poblano, chiles en nogada, and pozole using heirloom corn masa, dried ancho chilies, cacao nibs,
    and fresh epazote from their garden, while also experimenting with modern plating techniques learned through online culinary workshops.
  core: Awilda Castillo embodies a methodical curiosity that fuses sustainable engineering with folk art, channeling a competitive drive into mentorship while savoring late‑night puzzles, herb‑laden stews,
    and the occasional bout of skepticism toward unsolicited advice.
background:
  cultural: Awilda was raised in a Mexican‑American household that emphasized bilingualism, family cohesion, and the celebration of traditional festivals such as Día de los Muertos and Cinco de Mayo. Her
    parents instilled a respect for both Mexican culinary arts and the rich storytelling traditions of her heritage. Living in Santa Fe, a city with a vibrant blend of Hispanic, Native American, and artistic
    influences, she has woven these cultural threads into her identity. She frequently participates in local cultural events, contributes to community art projects that honor Mexican folk motifs, and mentors
    young Latinas interested in STEM fields, reflecting a commitment to preserving her cultural legacy while fostering cross‑generational learning.
attributes:
  skills: '["Data analysis", "Statistical modeling", "Python programming", "MATLAB", "Civil engineering design", "Sustainable infrastructure planning", "Project management", "STEM outreach curriculum development",
    "Digital illustration", "Mixed‑media art", "Bilingual communication (Spanish/English)", "Research on Mexican folk art"]'
  hobbies: '["Abstract painting", "Photography (architectural and natural light)", "Reading speculative fiction", "Science essays", "Gardening (native herbs)", "Cooking Mexican cuisine", "Chess", "Sudoku",
    "Volunteering at science museum (bilingual workshops)", "Bilingual poetry circle"]'
  career_goals: Awilda aims to stay intellectually active by mentoring emerging women in STEM and guiding community science projects in Santa Fe. She plans to create a digital archive that fuses scientific
    data visualizations with Mexican folk art motifs, preserving cultural narratives while showcasing interdisciplinary innovation. Additionally, she aspires to author a memoir that weaves her life experiences
    with reflections on abstract scientific ideas, and to offer part‑time consultancy on sustainable design for local NGOs. Her overarching ambition is to leverage her expertise to foster curiosity, resilience,
    and cultural pride in the next generation.
