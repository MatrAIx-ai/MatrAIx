persona_description: A historian or urban planner who is interested in the study of colonial cities and their built environment, particularly those in Asia from the 1840s to the 1940s. This person is likely
  to be familiar with the works of scholars like Abidin Kusno, Haejeong Hazel Hahn, and Carola Hein, and would appreciate the interdisciplinary approach and regional focus of the volume "Harbin to Hanoi."
  They would enjoy the detailed analysis of how colonial powers created the built environment and the complex stories of conflict, collaboration, and co-habitation between actors involved in the unevenness
  of colonial cities.
