  career_goals: Rayshawn aims to earn a certified logistics specialist credential within the next year, positioning himself for a shift‑lead or inventory supervisor role at his current warehouse. He is
    competitive about performance metrics and seeks to be recognized as the top performer in efficiency and safety. Long‑term, he plans to transition into a supervisory position that allows him to mentor
    younger workers, and eventually, after retirement, he hopes to start a small landscaping and garden‑maintenance business that leverages his hands‑on experience and love of outdoor work.
