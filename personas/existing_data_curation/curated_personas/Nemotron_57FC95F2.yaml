personas:
  professional: Geraldine Camby is a certified middle‑school teacher who designs data‑driven curricula, integrates interactive whiteboards, and leads professional development on equitable literacy instruction,
    balancing her curiosity for new tech with a methodical, organized approach to classroom management.
  sports: Geraldine Camby hikes the Uwharrie National Forest each weekend, runs with the local Pine Creek Runners club in spring, volunteers as a scorekeeper for the high‑school baseball team, and avidly
    follows the UNC Tar Heels basketball and the Carolina Panthers football, blending low‑impact fitness with regional sports loyalty.
  arts: Geraldine Camby spends evenings quilting and crocheting blankets inspired by traditional Southern patterns, attends community festivals featuring bluegrass acts like the Old Mountain String Band,
    reads historical fiction by Bernard Cornwell, and enjoys the regional theater’s productions of A Streetcar Named Desire, letting creative expression shape her sense of identity.
  travel: Geraldine Camby plans purposeful weekend getaways to Asheville’s art galleries, the historic streets of Charleston, and the Blue Ridge Parkway, while dreaming of a spring trip to the Scottish
    Highlands to explore Celtic music festivals, balancing careful budgeting with a craving for culturally rich experiences.
  culinary: Geraldine Camby loves cooking Southern comfort foods such as fried chicken with buttermilk brine, collard greens simmered with smoked turkey, and shrimp‑and‑grits topped with crisp bacon, regularly
    experimenting with heirloom tomatoes, sweet potatoes, and pimento cheese, and proudly hosts weekly family meals to test new recipes.
  core: Geraldine Camby is a meticulous educator and garden‑enthusiast who balances data‑driven instruction with Southern culinary experiments, occasional back‑pain neglect, and a habit of over‑planning
    every season’s seed catalog.
background:
  cultural: Geraldine grew up in a middle‑class white family in the coastal plains of North Carolina, where Southern hospitality and community involvement were integral to daily life. Her upbringing emphasized
    respect for tradition—such as seasonal celebrations, church gatherings, and local cuisine—while also encouraging curiosity and lifelong learning. Living in Hope Mills, she draws on the region’s blend
    of rural and suburban influences, participating in community service and cherishing the slower tempo of small‑town life. This cultural backdrop informs her teaching philosophy, which balances respect
    for established educational practices with openness to innovative, evidence‑based methods.
