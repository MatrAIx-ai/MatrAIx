  hobbies: '[''Gardening (vegetable and native plants)'', ''Hiking local trails'', ''Reading (historical fiction and education journals)'', ''Cooking Southern cuisine'', ''Quilting and crocheting'', ''Volunteering
    as a reading mentor'', ''Attending regional festivals and cultural events'']'
  career_goals: Geraldine aims to earn a Master’s degree in Curriculum and Instruction within the next two years, positioning herself for a role as a grade‑level coordinator or curriculum specialist. She
    hopes to lead a school‑wide literacy improvement project that blends proven reading interventions with innovative digital tools. Over the long term, she aspires to become an assistant principal, where
    she can shape school culture, mentor new teachers, and champion equitable instructional practices. She also seeks opportunities to present at regional education conferences and publish articles on balancing
    technology integration with evidence‑based pedagogy.
