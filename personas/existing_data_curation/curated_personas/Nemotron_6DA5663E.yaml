  career_goals: Walid aims to advance into a supervisory role within the next two years, seeking a Customer Service Team Lead position that will allow him to shape team performance and service standards.
    He plans to earn a Certified Customer Service Professional (CCSP) credential and complete a bachelor's degree in Business Management to qualify for a Shift Manager or Operations Manager role. Long‑term,
    he hopes to lead a customer experience transformation project for his company or launch a consulting practice that helps other organizations build efficient, customer‑centric service processes.
