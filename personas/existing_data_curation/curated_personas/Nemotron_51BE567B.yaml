  career_goals: Clements aims to complete his bachelor’s degree in Business Administration with a focus on nonprofit management within the next two years. He aspires to secure a role as a community outreach
    coordinator or project manager for a social services organization serving the Hispanic community in San Diego. He is motivated to develop programs that address educational inequities and provide resources
    for at‑risk youth. In the long term, he wishes to obtain a Project Management Professional (PMP) certification and potentially launch his own community‑based nonprofit that offers mentorship and job‑readiness
    training.
