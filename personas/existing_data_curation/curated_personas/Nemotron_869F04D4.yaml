  hobbies: '[''Gardening'', ''Hiking'', ''Reading mystery novels'', ''Quilting'', ''Volunteering at food pantry'', ''Community theater attendance'', ''Journaling'', ''Birdwatching'']'
  career_goals: Shannon aims to expand the reach and sustainability of Pueblo's community services by developing a region‑wide collaborative network of nonprofits focused on senior and low‑income families.
    She plans to mentor emerging leaders within her organization, formalize a succession plan, and complete her bachelor's degree in social work to deepen her academic grounding. In the next five years
    she hopes to secure a board position with a statewide advocacy coalition, spearhead a large‑scale grant initiative, and leave a documented legacy of measurable program improvements that can be replicated
    in similar mid‑size cities.
