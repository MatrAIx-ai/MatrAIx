persona_description: A Dutch painter known for his mastery of light and shadow, Rembrandt van Rijn was born into a family of millers and bakers, but he received a foundation in biblical studies and the
  classics at Latin school. He began his artistic career with a two-year apprenticeship and later opened a studio in Leiden, where he developed a method of clustering light elements in paintings to create
  a concentrated, almost furnacelike intensity of light. He married Saskia van Uylenburgh and had four children before her death in 1642. His career was marked by a decline in popularity and financial difficulties,
  but he continued to paint for himself and amassed a large collection of artworks. He declared insolvency in 1655 and was later unable to repay his debts. His son, Titus, inherited his estate and died
  the following year.
