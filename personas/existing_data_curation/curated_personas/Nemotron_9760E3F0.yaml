  career_goals: Carolyn aspires to turn her writing and visual storytelling into a freelance career that offers flexibility and quiet, independent work. She envisions launching a personal blog featuring
    short prose, poetry, and photo essays about the Pacific Northwest’s natural spaces, eventually self‑publishing a collection of her work. She also hopes to develop modest digital design skills—basic
    website layout and graphic creation—to expand her service offerings. Long‑term, Carolyn wants a sustainable income stream that lets her work from home or a small studio, allowing her to maintain a low‑key
    lifestyle while contributing environmentally conscious content to local online publications and community gardening projects.
