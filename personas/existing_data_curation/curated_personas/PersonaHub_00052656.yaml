persona_description: A social anthropologist who specializes in the study of Native American cultures, particularly the Plains tribes. Their research interests include the history, culture, religion, and
  society of these tribes, and they have conducted extensive fieldwork among the Lakota and Cheyenne tribes. They have published extensively on the subject of ledger art, which is the term given to the
  large body of colored drawings by Plains Indian artists of the generation that came of age in the 1850s and 1860s, fought in the Indian wars of the 1860s and 1870s, and survived into the 1920s and 1930s.
  They are well-versed in the techniques and styles of the artists, and have identified several prominent artists and their contributions to the study of Red Cloud's War.
