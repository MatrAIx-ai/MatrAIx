personas:
  professional: Sally Jenkins, a 38‑year‑old retail operations supervisor, blends their educational background and love for structure to coach staff, streamline inventory, and drive sales analytics, while
    their sociable, kind nature fuels a collaborative store culture and fuels their ambition to become a district manager and later launch a community‑focused boutique.
  sports: Sally Jenkins energizes their weekends with kayaking on Rainbow Springs, participates in a local Fit‑Friends boot‑camp squad, and rallies for the Florida Gators, Orlando Magic, and Tampa Bay Rays,
    blending their love of group activities with a structured fitness routine.
  arts: Sally Jenkins leads a book club that spotlights Southern authors like Marjorie Kinnan Rawlings alongside contemporary voices, enjoys live folk performances of Jimmy Buffett covers, and volunteers
    at the county theater for productions such as 'A Streetcar Named Desire', reflecting their sociable, community‑oriented artistic taste.
  travel: Sally Jenkins prefers well‑planned road trips that combine nature and cultural history, having visited Savannah’s historic squares, the Everglades, and a culinary tour of New Orleans, while dreaming
    of a kayaking adventure on Costa Rica’s Osa Peninsula, balancing family‑friendly itineraries with personal wanderlust.
  culinary: Sally Jenkins delights in cooking shrimp and grits seasoned with garden‑grown herbs, perfects blackened catfish with a secret Cajun rub, and frequently experiments with homemade hot sauces using
    their own peppers, showcasing their love for fresh seafood, Southern flavors, and garden‑to‑table creativity.
  core: Sally Jenkins fuses Southern hospitality with retail precision, balancing a thriving garden, kayaking adventures, and a mission‑driven career while meticulously budgeting and occasionally over‑caffeinating.
background:
  cultural: Sally grew up in a middle-class family in northern Florida, where community, church, and school involvement were central to daily life. Her white Southern heritage includes traditions of hospitality,
    modesty, and a deep appreciation for the natural environment, reflected in her love for the local springs and citrus groves. She earned her bachelor's degree in Education from the University of Florida
    and later completed a graduate program in educational studies, which informs her people-centered leadership style. As a divorced mother of two, she values self-reliance, collaborative support networks,
    and giving back through volunteer work, embodying the regional ethos of friendliness and civic engagement.
attributes:
  skills: '["Retail Operations Management","Team Training & Development","Performance Coaching","Scheduling & Workforce Planning","Inventory Control","Visual Merchandising","Sales Data Analysis","Conflict
