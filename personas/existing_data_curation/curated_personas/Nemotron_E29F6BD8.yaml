  career_goals: Sally aims to advance from a first-line supervisor to a district manager role within the next five years, overseeing multiple stores and implementing region-wide training programs that reflect
    best practices in adult education. She is pursuing the Certified Retail Manager credential and plans to enroll in a Master's program in Educational Leadership to blend her passion for teaching with
    retail strategy. Long-term, she hopes to design a community-focused boutique that doubles as a mentorship hub for aspiring retail professionals, while also championing diversity, equity, and employee
    well-being initiatives across the company.
