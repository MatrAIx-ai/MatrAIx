  hobbies: '[''Hip hop music'', ''Street basketball'', ''Graffiti art'', ''Photography'', ''Digital illustration'', ''Freestyle dancing'', ''Competitive video gaming'', ''Social media content creation'',
    ''Community youth events'', ''Attending local art exhibitions'']'
  career_goals: Ulysses aims to pursue a degree in media studies or visual communications, with a long‑term ambition to become a multimedia content creator who blends storytelling, design, and community
    engagement. He envisions starting a freelance digital media studio focused on amplifying local Black artists and cultural events, while also exploring opportunities in sports marketing or community
    program coordination. His competitive drive pushes him to seek internships in social media marketing or sports journalism, and he hopes to leverage scholarships that recognize his artistic portfolio
    and leadership in school clubs.
