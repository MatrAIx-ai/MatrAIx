  career_goals: Matt dreams of becoming a creator who blends art and technology. He imagines designing interactive stories, inventing gadgets that spark curiosity, or illustrating books that bring fantastical
    worlds to life. He is fascinated by wildlife and hopes to work on projects that protect the environment, such as creating educational games about local ecosystems. Ultimately, he wants a future where
    he can turn his imaginative ideas into real things that inspire others.
