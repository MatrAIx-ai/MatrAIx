  career_goals: Seeking to deepen his managerial expertise, Brandon plans to earn an associate degree in Business Administration and later a bachelor’s certification, while pursuing leadership certifications
    such as the Certified Professional Sales Leader (CPSL). He aspires to transition from first‑line supervisor to a regional sales manager within the next five years, focusing on building high‑performing,
    harmonious teams. Additionally, he hopes to integrate his creative interests by moving into a sales role that partners with the arts sector, allowing him to blend his appreciation for culture with his
    professional skill set.
