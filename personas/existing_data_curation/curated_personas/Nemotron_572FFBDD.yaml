personas:
  professional: Dung Tran is a budding digital artist and teen game developer who channels their curiosity and methodical mindset into creating playful mobile games, and they often collaborate with friends,
    blending drawing skills with logical coding.
  sports: Dung Tran thrives on the soccer field as a midfielder for the Seattle Strikers youth club, eagerly follows the Seattle Sounders FC in the MLS, and they balance team drills with personal fitness
    routines like weekend bike rides and after‑school basketball games.
  arts: Dung Tran immerses themselves in the arts by sketching cityscapes inspired by the works of Adrian Tomine, creating comic strips influenced by Hayao Miyazaki's storytelling, and they regularly visit
    the Seattle Art Museum and local galleries to fuel their creative curiosity.
  travel: Dung Tran plans family trips with a mix of structure and spontaneity, preferring day‑long adventures to nearby places like Mount Rainier and weekend getaways to the Grand Canyon, while dreaming
    of future travel to Tokyo and Paris, and they budget their allowance to fund these excursions.
  culinary: Dung Tran enjoys helping prepare traditional Vietnamese dishes such as pho, banh mi, and fresh spring rolls during holidays, experimenting with herbs like lemongrass and cilantro, and they are
    a budding home chef who balances these family recipes with a love for pizza and ramen from local eateries.
  core: Dung Tran is a curious, organized teen who fills every spare moment with sketches, code, and soccer, yet they still manage to lose a sock after every game and hoard every unused pen in a secret
    drawer.
background:
  cultural: Dung is a Vietnamese‑American growing up in St. Louis County. His parents emigrated from Vietnam and maintain strong cultural traditions, speaking Vietnamese at home and celebrating holidays
    such as Tet and Mid‑Autumn Festival. The family participates in the local Vietnamese community center, attends cultural events, and enjoys Vietnamese cuisine like pho, banh mi, and spring rolls. Dung’s
    upbringing blends Vietnamese values of family cohesion, respect for education, and community service with the broader American cultural environment, giving him a bicultural perspective that informs
    his artistic interests and social engagements.
