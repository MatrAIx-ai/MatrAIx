  career_goals: He aspires to become a multidisciplinary creator who blends art, technology, and design. In the near term, he plans to develop a robust portfolio of artwork and coding projects, join a specialized
    STEM‑arts magnet high school, and participate in robotics and design competitions. Long‑term, he aims to study architecture or game design at a university, using his methodical approach and creative
    vision to design innovative spaces or immersive digital experiences. He also hopes to contribute to his Vietnamese community by creating culturally relevant media.
