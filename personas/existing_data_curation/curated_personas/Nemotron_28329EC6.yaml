  career_goals: Johnny hopes to attend a STEM-focused high school and later study computer science or environmental engineering at a university. He envisions a career that merges his love for technology
    with his concern for the environment, such as developing sustainable software, working on renewable-energy data platforms, or joining a green-tech startup in the Seattle area. In the long term, he would
    like to mentor younger students through coding clubs and contribute to community projects that make the city more eco-friendly.
