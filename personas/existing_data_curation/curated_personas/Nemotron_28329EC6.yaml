personas:
  professional: Johnny Craddock is an aspiring indie-game developer who spends evenings building Unity prototypes, applies his robotics club experience to puzzle mechanics, and balances his curiosity-driven
    experimentation with a practical focus on meeting deadlines and club responsibilities, while they also mentor younger club members on basic coding concepts.
  sports: Johnny Craddock is a skateboarding enthusiast who drills tricks at the Cascades skatepark, hikes the trails of Discovery Park on weekends, roots for the Seattle Seahawks and Seattle Kraken, belongs
    to a local youth skate club that meets after school, and they also follow the Portland Timbers for occasional soccer excitement.
  arts: Johnny Craddock is a budding photographer who captures the city's rainy skyline, plays guitar at open-mic nights covering Jimi Hendrix and Tame Impala, writes short sci-fi stories inspired by Isaac
    Asimov, composes game soundtracks influenced by Austin Wintory, and they often hum riffs while debugging code.
  travel: Johnny Craddock is an adventurous teen who has explored Mt. Rainier, toured Vancouver's Granville Island, and visited Seattle's Pike Place Market, dreams of strolling through Tokyo's Akihabara,
    cruising Barcelona's Gothic Quarter, and catching surf in Santa Cruz, favoring family-planned itineraries with occasional spontaneous hikes, and they relish crafting detailed travel journals.
  culinary: Johnny Craddock is a self-taught kitchen experimenter who perfects ramen broth, loves pepperoni pizza with extra cheese, whips up kimchi fried rice with a spicy kick, drizzles caramel on pancakes,
    and they often grab cereal for late-night gaming snacks.
  core: Johnny Craddock is a curiosity-driven, organized teen who turns rainy cityscapes into photographs, codes indie games after school, lands on skateboards at the Cascades, and they balance a modest
    allowance with occasional homework procrastination.
background:
  cultural: Johnny grew up in Seattle's eclectic mix of tech-centric and outdoor-oriented culture. His family embraces the Pacific Northwest's emphasis on environmental stewardship, coffeehouse social life,
    and progressive values. He is exposed to the region's music legacy from the grunge era, enjoys local sports fandom for the Seahawks and Mariners, and participates in community events that celebrate
    Indigenous heritage and sustainability. The city's rainy climate and access to forests and waterways shape his appreciation for nature and his commitment to eco-friendly practices.
