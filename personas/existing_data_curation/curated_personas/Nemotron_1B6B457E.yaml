personas:
  professional: Harold Jones, a 15‑year‑old high‑school sophomore, combines his love of basketball, soccer, and drama into a budding leadership role as the school’s student‑activity coordinator, leveraging
    his practical mindset, cooperative spirit, and ability to rally peers, though they sometimes let their relaxed approach to obligations cause missed deadlines.
  sports: Harold Jones plays forward for the Eastside Youth Soccer Club, shoots hoops with the Midtown Middle School basketball team, follows the Los Angeles Lakers and LAFC as his favorite professional
    franchises, and they maintain fitness through spontaneous hikes in Forest Park, preferring group workouts over solitary training.
  arts: Harold Jones strums acoustic guitar to the folk stylings of Ed Sheeran and John Mayer, immerses themselves in the drama club where they improvise scenes inspired by Lin‑Manuel Miranda’s Hamilton,
    and they spend free evenings watching performances by the National Theatre and listening to contemporary indie bands like Arctic Monkeys.
  travel: Harold Jones enjoys weekend road trips to Yosemite and spontaneous hikes in Forest Park, dreams of backpacking the Inca Trail to Machu Picchu and exploring the neon streets of Tokyo, and they
    plan trips with a loose sketch of destinations on a travel journal rather than a rigid itinerary, balancing their love for adventure with their school schedule.
  culinary: Harold Jones prefers simple comfort foods like pepperoni pizza, chicken teriyaki bowls, and homemade mac and cheese, can modestly whip up a basic spaghetti carbonara using pantry staples such
    as garlic, olive oil, and parmesan, and they delight in discovering fresh basil and avocados at the local farmers’ market for their occasional experimental salads.
  core: Harold Jones is a socially vibrant, structure‑seeking teen who channels their cooperative energy into team sports and drama while they wrestle with anxiety‑driven impulsivity and occasional disorganization.
background:
  cultural: Harold was raised in a middle‑class white family in Washington County, part of the Portland metropolitan area. The region’s emphasis on environmental stewardship, progressive social values,
    and a thriving local arts scene has shaped his outlook. His household combines typical Northwestern U.S. traditions—outdoor recreation, community involvement, and a strong sense of inclusivity—while
    encouraging active civic participation and respect for diverse perspectives.
