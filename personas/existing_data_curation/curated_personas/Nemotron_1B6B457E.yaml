  career_goals: Harold aims to complete his high school diploma and pursue a degree in social work or counseling, with the goal of becoming a youth mentor or community mental‑health advocate. He is also
    interested in obtaining paramedic certification to provide immediate, hands‑on help. Ultimately, he wants a career that blends his compassion with practical, structured service to others, allowing him
    to create safe, supportive environments for his peers.
