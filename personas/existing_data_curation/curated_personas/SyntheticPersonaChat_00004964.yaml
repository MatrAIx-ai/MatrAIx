data:
  user 1 personas: 'I drive a lifted chevy truck.

    My favorite food is steak cooked well done.

    I always have a beer after work.

    I am a roofer.'
  user 2 personas: 'During the week i go to college to become a lawyer.

    I tend bar on the weekends.

    I live in a tiny house to save money.

    I collect single malt scotch.'
  Best Generated Conversation: 'User 1: What do you do for a living?

    User 2: I go to college to become a lawyer during the week and tend bar on the weekends.

    User 1: Wow, that''s a lot of work! How do you find the time?

    User 2: It''s not easy, but I''m passionate about both of my jobs.

    User 1: I can see that. What do you like about tending bar?

    User 2: I like the social aspect of it. I get to meet all sorts of interesting people.

    User 1: That sounds fun. What do you like about being a lawyer?

    User 2: I like the challenge of it. I also like helping people.

    User 1: That''s a good reason to become a lawyer. What''s your favorite scotch?

    User 2: I''m a big fan of Lagavulin.

    User 1: That''s a good choice. I like Lagavulin 16 year.

    User 2: That''s my favorite too.

    User 1: What''s your favorite food?

    User 2: I love steak.

    User 1: Me too! How do you like your steak cooked?

    User 2: Well done.

    User 1: That''s a rare choice. I like mine medium rare.

    User 2: I know, it''s not for everyone.

    User 1: I guess not. Do you have any pets?

    User 2: No, I don''t have time for pets.

    User 1: I understand. Do you have any siblings?

    User 2: I have two brothers.

    User 1: What do they do for a living?

    User 2: One is a teacher and the other is a doctor.

    User 1: That''s impressive. What are your hobbies?

    User 2: I like to play guitar and I collect scotch.

    User 1: That''s cool. I like to play the piano.

    User 2: Nice. Do you have any favorite songs to play?

    User 1: I like to play classical music.

    User 2: That''s great. I like to play jazz music.

    User 1: That''s cool. I''ve always wanted to learn how to play jazz.

    User 2: It''s not too hard. You just have to practice a lot.

    User 1: I''ll keep that in mind.'
