personas:
  professional: Jerry Shi, a 34‑year‑old pastor in College Station, weaves theological depth with artistic flair by delivering sermons that incorporate abstract watercolor visuals and acoustic worship music,
    while their organized, compassionate, and calm demeanor ensures seamless event planning, volunteer coordination, and strategic church budgeting.
  sports: Jerry Shi explores the Texas Hill Country on weekend hikes, captains a casual pick‑up soccer team called the College Station Strikers, roots for the Houston Astros during spring training, rallies
    behind the Dallas Cowboys in the NFL season, and volunteers as a timer for the local youth track meet, balancing cardio with occasional restorative yoga sessions.
  arts: Jerry Shi channels a love for the visual and musical arts by painting abstract watercolors inspired by Mark Rothko, curating monthly visits to Austin’s Blanton Museum of Art, performing acoustic
    covers of Paul Simon and Joni Mitchell in the worship band, and weaving verses from Rumi and Mary Oliver into sermons, crafting an interfaith worship experience that feels both contemplative and vibrant.
  travel: Jerry Shi plans pilgrimages with meticulous itineraries, having trekked to the Vatican, the Church of the Holy Sepulchre in Jerusalem, and the Santiago de Compostela Cathedral, while also scheduling
    weekend art residencies in Santa Fe and jazz festivals in New Orleans, balancing a modest travel budget with occasional splurges on guided theological tours.
  culinary: Jerry Shi experiments in the kitchen by blending Southwest flavors with Mediterranean ingredients, creating dishes such as quinoa‑infused enchiladas seasoned with cumin, fresh cilantro, and
    pomegranate molasses, while volunteering at the local food shelter where they frequently prepare hearty lentil soups and dairy‑free chocolate mousse, showcasing a moderate to advanced cooking skill
    set.
  core: Jerry Shi is a curiosity‑driven, art‑loving pastor who harmonizes worship with watercolor brushstrokes, meticulously budgets every dollar for ministry and music, manages mild allergies with disciplined
    health habits, and never misses a trail hike, even if it means occasionally forgetting to floss.
background:
  cultural: Jerry grew up in a suburban family in College Station, Texas, where Southern hospitality and community service were central values. His family attended a mainline Protestant congregation that
    emphasized social justice, inclusive worship, and the role of music and art in spiritual life. Although his surname reflects Asian ancestry, his cultural identity is rooted in American and Texan traditions,
    shaped by the vibrant college-town atmosphere, local music festivals, and the diverse population of Brazos County. This blend of Midwestern upbringing, Southern religious culture, and exposure to contemporary
    arts informs his inclusive and compassionate approach to ministry.
attributes:
  skills: '[''Pastoral counseling'', ''Public speaking'', ''Sermon preparation'', ''Community outreach'', ''Event planning'', ''Volunteer coordination'', ''Conflict mediation'', ''Interfaith dialogue'',
