  career_goals: Lisa aims to launch her own boutique painting and mural studio that merges high‑quality trade work with bespoke artistic installations. She wants to build a reputation for sustainable, eco‑friendly
    finishes while offering clients unique, culturally inspired murals that reflect diverse narratives. In the next five years, she hopes to secure contracts with boutique hotels and community centers in
    the Bay Area, earn recognition as a leading Black muralist, and mentor other women of color entering the trades. Financial stability and creative autonomy are top priorities, as she balances her competitive
    drive with the desire for a supportive, collaborative team environment.
