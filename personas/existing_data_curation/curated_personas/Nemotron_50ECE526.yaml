  career_goals: Marilyn aims to build a stable, structured career in office administration or healthcare support. She plans to enroll at a community college to earn an associate degree in Business Administration
    or Medical Office Technology, obtain certifications such as Certified Administrative Professional (CAP) or Certified Medical Office Assistant (CMOA), and progress toward roles like office manager, medical
    records coordinator, or project assistant. She values long‑term growth, professional development, and the opportunity to apply her organized approach in a predictable workplace.
