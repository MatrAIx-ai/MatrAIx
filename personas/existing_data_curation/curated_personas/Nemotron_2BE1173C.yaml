  hobbies: '[''Gardening'', ''Reading historical nonfiction'', ''Model railroading'', ''Hiking'', ''Woodworking'', ''Playing acoustic guitar'', ''Mindfulness meditation'', ''Volunteering at the local library'']'
  career_goals: David aims to transition into a school-wide instructional coaching role where he can design and implement structured literacy programs and support teachers in creating anxiety-sensitive
    classroom environments. He aspires to lead professional development workshops on evidence-based strategies for managing student emotions and to publish a guide on integrating mental health awareness
    into elementary curricula. Long-term, he hopes to influence district policy on student well-being while maintaining a balanced schedule that protects his own mental health.
