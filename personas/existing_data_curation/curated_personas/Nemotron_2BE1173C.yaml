personas:
  professional: David Mcfarland, an elementary and middle‑school teacher with two decades of experience, designs data‑driven curriculum units and leverages interactive whiteboards to create structured yet
    flexible lessons, while also coaching colleagues on anxiety‑sensitive classroom practices and preparing to transition into a district‑wide instructional coaching role.
  sports: David Mcfarland, a dedicated weekend hiker, follows the local trail club’s outings, roots for the nearby minor‑league baseball team the River City Raptors, and participates in a community tabletop
    curling league for low‑impact fitness.
  arts: David Mcfarland, a quiet acoustic guitarist, frequently strums folk classics by John Denver and Bob Dylan at family gatherings, and spends leisure hours listening to classical pianist Lang Lang
    while building intricate model railroad dioramas that showcase historic American rail lines.
  travel: David Mcfarland, a methodical traveler, prefers meticulously planned trips to natural destinations such as Yellowstone National Park and the Scottish Highlands, enjoys off‑season visits to historic
    Cambridge, UK, and balances travel aspirations with a modest budget that prioritizes family time over luxury.
  culinary: David Mcfarland, an avid gardener‑chef, harvests heirloom tomatoes and rosemary from his backyard to craft fresh salsa verde and a grilled vegetable medley, frequently bakes sourdough bread
    on weekends, and occasionally skips breakfast in favor of a quick coffee while reading historical nonfiction.
  core: David Mcfarland, a structured‑minded educator who nurtures gardens, railways, and acoustic strings, battles chronic anxiety with meditation, and balances meticulous planning with a love for quiet,
    solitary pursuits.
background:
  cultural: David is a white New Englander whose family has deep roots in the region dating back to early colonial settlers. Growing up in suburban Massachusetts, he was immersed in a culture that values
    education, civic responsibility, and modest self-reliance. The local community’s seasonal traditions—leaf-peeping in autumn, coastal outings in summer, and town meetings—have shaped his practical and
    community-oriented outlook. While he identifies with broader Anglo-American cultural norms, his personal background reflects a blend of traditional New England modesty, progressive social values, and
    a strong emphasis on family and public service.
