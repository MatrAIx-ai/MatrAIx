  career_goals: He dreams of turning his love for drawing and storytelling into a future career as a comic book artist or a video game designer, where he can blend his creative ideas with technology. He
    also hopes to use his sociable personality to inspire other kids in his community, perhaps by organizing art workshops or youth clubs once he's older.
