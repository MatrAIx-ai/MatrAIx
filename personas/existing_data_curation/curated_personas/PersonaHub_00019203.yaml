persona_description: A veterinarian who specializes in the study of canine behavior and OCD, particularly in the field of canine compulsive disorder (CCD). She is an expert in MRI brain imaging techniques
  and has conducted research on the genetic and structural brain abnormalities associated with OCD and CCD in dogs. She has published several studies on the subject and has received recognition for her
  contributions to the field. She is passionate about using evidence-based science to better understand and treat canine anxiety and compulsive disorders.
