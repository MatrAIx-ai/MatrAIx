personas:
  professional: Jessica is a detail‑oriented cleaning specialist who leverages eco‑friendly products, meticulous scheduling, and a calm demeanor under pressure to deliver top‑tier sanitation for both residential
    and commercial clients, and they are actively pursuing certification in sustainable cleaning to eventually supervise and train a green cleaning team.
  sports: Jessica is an avid hiker on local trails like the Breakheart Reservation, regularly joins the Warren Trail Club for weekend walks, supports the New England Patriots and Boston Red Sox, and they
    incorporate weekly yoga sessions to complement the physical demands of cleaning work.
  arts: Jessica enjoys mystery novels by Agatha Christie and true‑crime podcasts such as 'Serial', relaxes to the folk sounds of The Lumineers, frequently explores upcycling projects inspired by DIY YouTuber
    Bob The Builder, and they attend occasional performances at the Boston Center for the Arts.
  travel: Jessica prefers short, eco‑focused road trips to New England gems like Portland, Maine and the White Mountains, dreams of a sustainable tourism adventure in Iceland's geothermal parks, and they
    often plan trips using a spreadsheet to maximize budget while minimizing carbon footprint.
  culinary: Jessica is a moderate home‑cook who loves preparing vegetable stir‑fry with kale, quinoa, and cilantro from her garden, perfects sourdough bread on weekends, experiments with upcycled leftovers
    into vegan lentil soup, and they prioritize using seasonal, locally sourced ingredients.
  core: Jessica merges methodical organization with a green‑thumb curiosity, turning cleaning chores into sustainable art while juggling budgeting spreadsheets, garden patches, and yearly hikes, all with
    a calm, slightly eccentric love for mystery novels.
background:
  cultural: Jessica grew up in a middle-class, white working-class family in the greater Detroit area, where Midwestern values of hard work, reliability, and community involvement were emphasized. Her upbringing
    included exposure to practical skills through high-school home economics and family traditions of maintaining a tidy home. The region’s industrial and automotive heritage fostered an appreciation for
    efficiency and a pragmatic approach to problem-solving. While she identifies with mainstream American cultural norms, she also values the local neighborhood spirit of Macomb County, where neighbors
    often support each other and local businesses are prized.
