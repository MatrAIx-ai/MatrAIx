  career_goals: Jessica aims to advance within the housekeeping industry by obtaining a professional cleaning certification and eventually moving into a supervisory role where she can train new staff and
    oversee larger service contracts. In the longer term, she hopes to launch her own small, green-focused cleaning business that serves the Warren-Macomb area, leveraging her organizational strengths and
    commitment to reliable service. To support this, she plans to enroll in part-time business courses at a community college and pursue a certification in sustainable cleaning practices.
