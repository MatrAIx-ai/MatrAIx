  hobbies: '[''Reading (especially African American authors)'', ''Gardening'', ''Cooking traditional Southern dishes'', ''Quilting'', ''Attending church services and choir'', ''Volunteering at after‑school
    programs'', ''Walking in nature'', ''Journaling'', ''Exploring local history'', ''Participating in community workshops'']'
  career_goals: Jacqueline aims to transition from daily driving to a supervisory role within the district’s transportation department, such as a safety coordinator or driver trainer, where she can formalize
    her mentorship and influence policy. She also envisions leading community workshops on road safety and child development, leveraging her humanities background to create engaging, story‑driven curricula.
    Long‑term, she hopes to retire with financial security while maintaining a part‑time role as a volunteer educator in local after‑school programs, sharing her love of literature and African American
    history with younger generations.
