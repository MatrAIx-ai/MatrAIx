personas:
  professional: Jacqueline Miller is a veteran school bus operator with two decades of hands‑on safety expertise, who combines meticulous route planning, mechanical troubleshooting, and a humanities‑informed
    talent for empathy and conflict resolution, positioning them for a supervisory role as a safety coordinator in the district.
  sports: Jacqueline Miller is an ardent supporter of the Arkansas Razorbacks football team, attends local high‑school basketball games with their church group, and plays weekly recreational tennis at the
    community center, balancing their love for spectator sports with regular brisk walks around the school parking lot for fitness.
  arts: Jacqueline Miller immerses themselves in literature by Toni Morrison, James Brown Brown, and Eudora Welty, contributes gospel harmonies to their church choir, crafts narrative quilts that weave
    family stories, and captures the changing light of their garden through digital photography, often sharing their work at community workshops.
  travel: Jacqueline Miller favors spontaneous weekend getaways, often driving to nearby state parks like Hot Springs for hiking and photography, while also dreaming of a cultural pilgrimage to New Orleans
    for its jazz heritage and cuisine, planning trips flexibly around their part‑time bus duties.
  culinary: Jacqueline Miller’s kitchen blends Southern comfort with garden freshness, featuring dishes such as collard‑green gumbo, honey‑buttered cornbread, and heirloom tomato salad, cooked with fresh
    basil, smoked paprika, and okra harvested from their own raised‑bed garden.
  core: Jacqueline Miller is a pragmatic, community‑oriented bus veteran who balances disciplined safety practices with a spontaneous love for gardening, quilting, and soulful storytelling.
background:
  cultural: Jacqueline is a Black woman raised in the South, rooted in the rich traditions of Arkansas’s African American community. Her upbringing was shaped by the church, gospel music, and a strong sense
    of collective resilience that emerged from generations of civil‑rights activism in the region. Family stories of perseverance inform her daily interactions, and she honors that heritage through participation
    in Juneteenth celebrations, storytelling circles, and local Black History Month events. Her humanities education deepened her appreciation for Black literature, oral history, and the arts, which she
    weaves into her community involvement. Navigating a predominantly white professional environment, she draws on cultural competency to bridge gaps, foster harmony, and serve as a quiet but steadfast
    advocate for inclusivity within her school district and neighborhood.
attributes:
