persona_description: Connor Williams is a historian who specializes in the study of race and slavery in the Atlantic world, with a particular focus on theories and practices of racial identity and identity
  formation in the fifty years following emancipation. He has extensive experience teaching US history, government, and literature to accelerated and AP students in Indiana and Vermont, and has assisted
  museums with programming and presentations while also searching various archives for teachable documents on race and slavery. He is a member of the History and African American Studies departments at
  Yale, and studies 19th century America with a particular focus on theories and practices of racial identity and identity formation in the fifty years following emancipation. He is also a writing partner
  at the Yale College Writing Center and a researcher for the Manuscripts and Archives division of Sterling Memorial Library.
