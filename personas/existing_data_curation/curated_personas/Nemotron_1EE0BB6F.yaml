  hobbies: '[''Fishing (Kenai River)'', ''Hunting (Alaskan game)'', ''Hiking (Chugach State Park)'', ''Kayaking'', ''Nature Photography'', ''Woodworking'', ''Reading non‑fiction (leadership, Alaskan history)'',
    ''Classic rock music'', ''Community theater attendance'', ''Snowshoeing'', ''Cross‑country skiing'', ''Amateur radio (ham radio)'']'
  career_goals: Thomas aims to advance into a supervisory role within the next two years, targeting a Customer Service Team Lead position where he can apply his documentation and process‑ improvement strengths
    to raise service metrics. Over the longer term, he envisions moving into an Operations Manager capacity, overseeing multiple support channels and shaping strategic initiatives for the contact center.
    To support these goals, he plans to pursue a bachelor’s degree in Management part‑time while obtaining certifications in quality assurance and leadership. Ultimately, he hopes to transition into a consulting
    role that helps small Alaskan businesses enhance their customer experience, allowing him to give back to the community before retirement.
