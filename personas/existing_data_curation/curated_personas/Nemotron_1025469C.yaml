  career_goals: Sandy aims to transition her decades‑long tailoring practice into a legacy studio that serves both the local community and a broader online audience. She plans to launch a limited‑edition
    line of custom bridal and formal wear that highlights sustainable, locally sourced fabrics, while also offering a series of hands‑on sewing workshops at the Blairsville community center to mentor emerging
    artisans. Over the next five years, she hopes to develop a small apprenticeship program, publish a practical guide on vintage dressmaking, and secure a modest retirement fund through diversified income
    streams, including online pattern sales and occasional costume commissions for regional theater productions.
