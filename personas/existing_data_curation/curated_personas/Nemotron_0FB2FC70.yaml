  career_goals: Looking ahead, Nicholas aims to solidify his position as the senior partner of a boutique funeral home in the Washington, D.C. area, known for its seamless blend of traditional ceremony
    and modern, eco‑friendly options. He plans to attain the Certified Funeral Service Practitioner (CFSP) credential and complete advanced coursework in grief counseling and sustainable interment practices.
    He intends to introduce a memorial garden on the property, offering families a peaceful space for reflection. Additionally, Nicholas is committed to cultivating the next generation of professionals
    by establishing a structured apprenticeship program within his home, ensuring continuity of his high‑standard service ethos. In the longer term, he envisions expanding the business to include a consulting
    arm that assists other funeral establishments in streamlining operations, improving regulatory compliance, and enhancing client experience.
