personas:
  professional: Kyra Williams, a 31‑year‑old security professional specializing in real‑time CCTV monitoring, rapid risk assessment, and decisive emergency response, leverages their meticulous incident
    documentation, competitive drive, and healthy skepticism to aim for a lead surveillance analyst role at a major Detroit casino while planning a future consultancy for small‑business security solutions.
  sports: Kyra Williams, an avid runner on the Detroit Riverwalk and member of the Detroit Running Club, supports the Detroit Lions and Pistons, and incorporates disciplined weight‑training at a local gym
    into their weekly routine to sustain stamina for demanding night‑shift duties.
  arts: Kyra Williams, who relaxes after shifts by listening to classic Motown hits from Marvin Gaye and contemporary jazz from Kamasi Washington, also immerses themselves in investigative journalism by
    authors like Ann Rule, cultivating a keen eye for narrative detail and rhythm in both work and leisure.
  travel: Kyra Williams prefers structured weekend getaways, having explored nearby Ann Arbor and the Upper Peninsula's shoreline, while dreaming of a meticulously planned trip to New Orleans for its jazz
    scene and a short business‑focused visit to London’s security conferences, all balanced against a modest budget and family responsibilities.
  culinary: Kyra Williams, an intermediate home cook, enjoys preparing soulful dishes such as collard greens seasoned with smoked turkey, baked mac and cheese, and sweet potato casserole, often sourcing
    fresh okra and cornmeal at local farmers' markets to craft hearty meals for family gatherings on weekends.
  core: Kyra Williams is a methodical night‑shift security analyst whose love for true‑crime, disciplined fitness, and meticulous budgeting coexists with a worry‑prone streak and a habit of double‑checking
    locks at home.
background:
  cultural: Kyra grew up in Detroit’s east side, a community shaped by the legacy of the automotive industry and a strong Black cultural heritage. Her family emphasized resilience, self‑reliance, and the
    importance of close‑knit family and church networks. She celebrates traditional African‑American holidays, enjoys community cookouts featuring collard greens and cornbread, and has a deep appreciation
    for Motown music that grew up around her. While she values the collective spirit of her neighborhood, her personality leans toward personal accountability and cautious trust, reflecting both the challenges
    and strengths of navigating a city with economic disparities and vibrant cultural expression.
attributes:
  skills: '[''CCTV monitoring'', ''Risk assessment'', ''Emergency response'', ''Incident reporting'', ''Conflict de‑escalation'', ''Surveillance software operation'', ''Data pattern analysis'', ''Self‑defense'',
