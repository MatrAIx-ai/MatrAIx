  hobbies: '[''Reading true‑crime literature'', ''Jogging along the Riverwalk'', ''Weight‑training'', ''Listening to Motown and jazz'', ''Cooking soul‑food'', ''Playing chess'', ''Mentoring youth in safety
    workshops'']'
  career_goals: Kyra aims to move into a supervisory role within the security field, targeting a position as a lead surveillance analyst for a major casino or entertainment complex in Detroit. She plans
    to earn the Certified Protection Professional (CPP) credential and later obtain a management certification in security operations. Over the next five years, she envisions establishing a consultancy
    that offers tailored security solutions for small businesses in her community, while also mentoring new recruits to foster a disciplined, resilient security team. Her ambition is balanced with a desire
    for greater financial stability and a structured work environment that reduces stress.
