    at the library’s Spanish story hour'', ''Knitting and crocheting'', ''Listening to traditional Spanish music'']'
  career_goals: Miriam aims to complete her associate degree in Business Administration, with a focus on entrepreneurship, and subsequently earn a Certified Culinary Instructor credential. She plans to
    launch a home‑based catering service that showcases regional Spanish dishes infused with seasonal Georgia produce, allowing her to combine her culinary curiosity with practical business execution. In
    parallel, she seeks a part‑time role as a community outreach coordinator for a local health organization, where she can leverage her bilingual communication and volunteer management experience. Additionally,
    Miriam intends to become a certified mental‑health first‑aid trainer to better support her family and volunteer network, and she aspires to author a bilingual cookbook that celebrates the fusion of
    her Spanish heritage and Southern flavors.
