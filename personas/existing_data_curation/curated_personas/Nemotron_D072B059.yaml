  career_goals: Melisa aspires to lead interdisciplinary data‑science initiatives that fuse mathematical rigor with artistic expression. In the next five years she aims to step into a senior analytics leadership
    role—such as Director of Data Innovation—within a forward‑looking organization, or to launch her own consultancy that helps cultural institutions and nonprofits harness data for storytelling and impact.
    She also seeks to mentor emerging talent, develop curricula that blend mathematics with design thinking, and publish scholarly work on novel applications of stochastic modeling in the arts.
