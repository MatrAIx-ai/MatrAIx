  hobbies: '[''Abstract Painting'', ''Generative Art Coding'', ''Improv Theater'', ''Swing Dancing'', ''Hiking'', ''Live Music Concerts'', ''Board Game Nights'', ''Community Makerspace Volunteering'', ''Science
