  hobbies: '[''Sketching and doodling'', ''Digital art and illustration'', ''Street art and mural projects'', ''Listening to indie and Latin music'', ''Narrative video gaming'', ''Skateboarding'', ''Cooking
    family recipes with Mexican/Californian fusion'', ''Mindfulness journaling'']'
  career_goals: Luis aspires to turn his artistic passion into a sustainable career. He plans to enroll in a community college art program within the next year, focusing on concept art and visual development
    for video games or animated media. Long‑term, he wants to work at a design studio that values innovative storytelling, eventually becoming a senior concept artist or creative director. Luis also dreams
    of founding a youth art collective in Chula Vista, offering workshops and a safe creative space for at‑risk teens, blending his career ambitions with his desire to give back to his community.
