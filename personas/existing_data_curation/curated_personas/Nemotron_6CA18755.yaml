personas:
  professional: Luis Bermudezcolon, a 17‑year‑old aspiring concept artist, blends digital illustration skills in Photoshop and Procreate with a love for street‑level murals, and applies their organized
    yet flexible work ethic to manage a growing online portfolio while mentoring younger peers at community art workshops.
  sports: Luis Bermudezcolon spends weekends honing tricks at the Chula Vista skate park, cheers for the LA Dodgers and LA Galaxy, and belongs to a local youth skate crew that meets after school for informal
    sessions.
  arts: Luis Bermudezcolon immerses themselves in a blend of Mexican folk motifs and modern graphic novel aesthetics, drawing inspiration from artists like Frida Kahlo, street‑art icon Banksy, and the vivid
    storytelling of Studio Ghibli while curating indie‑Latin playlists featuring Café Tacvba and Tame Impala during sketch sessions.
  travel: Luis Bermudezcolon dreams of backpacking through Oaxaca to study regional mural techniques, while also planning weekend road trips to Big Sur’s coastal cliffs and a future solo visit to Tokyo’s
    Akihabara district to soak in its gaming and anime culture.
  culinary: Luis Bermudezcolon enjoys cooking at home, often remixing family recipes like tacos al pastor with a California avocado‑lime salsa and grilled corn elotes, favoring fresh cilantro, tomatillos,
    and chipotle for a smoky edge, though they sometimes burn the tortillas when multitasking between art projects.
  core: Luis Bermudezcolon is a creatively restless 17‑year‑old who channels curiosity into vibrant art and skateboarding, balances careful planning with spontaneous bursts of color, yet frequently wrestles
    with anxiety that fuels both their drive and occasional overthinking.
background:
  cultural: Luis grew up in a Mexican‑American household in Chula Vista, where both Spanish and English are spoken daily. His family celebrates Mexican traditions such as Día de los Muertos and quinceañeras,
    which have infused his artistic sensibility with vibrant colors and symbolic motifs. At the same time, he is immersed in the eclectic cultural landscape of Southern California, exposing him to diverse
    artistic expressions ranging from West Coast street art to Pacific‑Northwest indie music. This bicultural experience shapes his identity, fostering a deep appreciation for heritage while encouraging
    him to experiment with hybrid artistic styles that reflect his dual roots.
attributes:
  skills: '[''Digital illustration (Photoshop, Procreate)'', ''Traditional sketching and mixed‑media'', ''Basic graphic design'', ''Video editing (Adobe Premiere)'', ''Introductory web design (Wix)'', ''Bilingual
