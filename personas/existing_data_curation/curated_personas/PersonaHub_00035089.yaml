persona_description: A farmer who is interested in sustainable farming practices, particularly in the upland areas of Indonesia. This person is likely to be involved in the adoption of integrated farming
  systems that prioritize soil health and biodiversity. They may also be interested in exploring the potential of alley cropping and the use of legumes and grasses in terracing and hedgerow management.
  This person is likely to be involved in the early stages of the adoption process, where subsidies and credit are needed to support conservation practices and purchased production factors. They may also
  be interested in the potential of using fast-growing legume trees as a source of fodder and soil nutrients.
