    outreach and partnership building'', ''Project management (Asana/Trello)'', ''Scheduling and logistics coordination'', ''Conflict mediation and resolution'', ''Strategic planning'', ''Technology integration
    (educational software and classroom tech)'']'
  hobbies: '[''Community dance workshops'', ''Traditional Salvadoran cooking'', ''Zumba group fitness classes'', ''Gardening'', ''Reading mystery novels'', ''Hiking on local trails'', ''Attending cultural
    festivals'', ''Volunteer tutoring for Spanish‑speaking families'', ''Organizing neighborhood block parties'', ''DIY home improvement projects'']'
  career_goals: Heidi aspires to become the Director of Early Childhood Education for the Katy Independent School District, where she can scale data‑driven, STEM‑focused curricula across all pre‑K sites.
    She plans to earn a master’s degree in Educational Leadership to strengthen her policy expertise, and eventually influence state‑wide early‑learning standards to better serve multilingual and low‑income
    families. A long‑term ambition is to launch a community‑based after‑school STEM academy that provides hands‑on learning experiences for Salvadoran‑American youth, while also securing sustainable funding
    through grant acquisition and private partnerships. Throughout her career, she seeks to be recognized for improving equity, raising program accreditation scores, and cultivating a high‑performing, collaborative
    staff culture.
