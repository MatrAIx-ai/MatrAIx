persona_description: A historian who specializes in the study of American culture and Christianity in China, particularly focusing on the missionary work during the late imperial period and the current
  regime. He has a keen interest in merging his research with photography, and his doctoral dissertation is dedicated to merging his interest in photography with his research. He has found a way to combine
  his interest in photography with his research of American culture and Christianity in China, and he is delighted to have found a way to merge his interest with his research. He has studied the missionaries
  in China and has found a way to document their work, which has become the focus of his doctoral dissertation. He is interested in the influence of the missionaries on national affairs and modernizing
  projects in China.
