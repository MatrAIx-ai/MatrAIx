persona_description: A mathematics and statistics support centre manager who is responsible for overseeing and managing a team of tutors and resources to provide extra-curricular mathematics and statistics
  teaching and learning services to students enrolled on a programme of study at undergraduate or postgraduate level. The manager is skilled in identifying the salient features of mathematics support and
  positioning it among the other learning experiences provided for students in higher education institutions. They have experience in setting up and managing a mathematics and statistics support centre,
  which is a relatively new phenomenon, and have a deep understanding of the challenges and opportunities presented by very diverse student cohorts and the increasing "quantification" of many disciplines.
  They are committed to providing additional academic support to students who are struggling with the mathematical elements of their course, as well as those who are doing well but want to do even better.
  They are also involved in organizing regular networking meetings and events to share ideas and collaborate on the development of best practice in mathematics support centres.
