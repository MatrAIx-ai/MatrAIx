  hobbies: '[''playing Duck, Duck, Goose'', ''dancing and singing'', ''building with blocks'', ''drawing beach and sea‑creature pictures'', ''collecting seashells'', ''outdoor play at park and beach'',
    ''listening to storytime at library'']'
  career_goals: Even at four, Artis loves to imagine future roles. She often says she wants to become a teacher so she can help other children learn, and she is fascinated by the ocean, dreaming of being
    a marine biologist who studies sea turtles and shells she finds at the beach. Her practical side also leads her to think about helping her family by learning to cook simple meals. These aspirations
    combine her curiosity about the world, her desire to assist others, and her energetic, sociable personality.
