personas:
  professional: Artis Sankar, a budding little architect of block towers at preschool, channels boundless curiosity with practical problem‑solving while organizing pieces with surprising precision, and
    they turn playtime into an early lesson in design and teamwork.
  sports: Artis Sankar, a spirited member of the Little Tigers Soccer Club and the community’s toddler gymnastics class, dashes across fields, cheerfully chants for the Seattle Sounders during family TV
    nights, and they relish the camaraderie of group sports while constantly refining balance and coordination.
  arts: Artis Sankar, an enthusiastic finger‑painter who recreates scenes from The Wiggles and Pixar’s ‘Toy Story’, sings loudly along to ‘Baby Shark’ and Paul Simon’s ‘You Can Walk on the Wind’, and they
    let bright crayons and catchy tunes shape a vivid creative world.
  travel: Artis Sankar loves the annual family trips to the seaside boardwalk in Virginia and the exciting day at the city zoo, day‑dreams about a future expedition to Disney World’s Magic Kingdom, and
    they balance curiosity for new places with the comfort of familiar routines.
  culinary: Artis Sankar devours cheesy macaroni, crunchy chicken nuggets, strawberry slices, and peanut butter on toast, yet stubbornly refuses broccoli unless it’s diced into tiny fun shapes, and they
    display a bright palate tempered by typical preschool picky‑eating quirks.
  core: Artis Sankar is a lively, curious four‑year‑old who expertly blends imagination with practicality, thriving in group activities, managing money with a piggy bank, and navigating early health routines
    while occasionally being obstinately picky.
background:
  cultural: Artis is raised in an African‑American family in Pensacola, Florida, where Southern coastal culture blends with the rich traditions of the Black community. Family gatherings often feature fried
    chicken, collard greens, and sweet potato pie, while Sundays are marked by church services with uplifting gospel music. She participates in community events such as local festivals, Juneteenth celebrations,
    and library story hours that reflect both her cultural heritage and the maritime environment of the Gulf Coast. These experiences shape her values of community, resilience, and a love for music and
    storytelling.
attributes:
  skills: '[''letter recognition'', ''basic counting to 20'', ''simple puzzle solving'', ''fine‑motor skills (drawing, using scissors, building blocks)'', ''following routines and adapting to imaginative
