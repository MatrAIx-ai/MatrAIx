persona_description: A public health specialist who is passionate about eradicating onchocerciasis, a parasitic disease caused by Onchocerca volvulus. They have extensive knowledge and experience in controlling
  parasitic diseases through various control programs and are actively involved in the Mectizan Donation Program. They have a deep understanding of the life cycle and mechanism of the parasite and are dedicated
  to finding a cure for onchocerciasis. They are also knowledgeable about the impact of the disease on the host and the severity of the illness, and they are actively working towards preventing the recurrence
  of the disease.
