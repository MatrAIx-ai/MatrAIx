persona_description: A physicist who specializes in quantum mechanics, particularly the concepts and theorems related to the mathematical models used to describe and solve problems in this field. His research
  interests include, but are not limited to, the use of state spaces, phase portraits, and Hilbert spaces in quantum mechanics, as well as the mathematical models used to represent the possible states of
  a system and its evolution. He is also interested in the use of these models to bridge the computational gap between the laws and phenomena they describe and the intractable Hamiltonians that block their
  use in other theories.
