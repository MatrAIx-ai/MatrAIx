  hobbies: '[''Acrylic painting'', ''Sketching'', ''Photography'', ''Chess'', ''Trivia contests'', ''Scale model car building'', ''Live music attendance'', ''Art gallery visits'', ''Reading speculative
    fiction'', ''Volunteering as art workshop facilitator'', ''Gardening'']'
  career_goals: Richard aims to turn his creative passions into a sustainable venture. He plans to open a modest community art studio in Sterling Heights where he can teach classes, host exhibitions, and
    sell his own prints and handcrafted furniture. To bolster his credibility, he intends to complete his GED and obtain a certificate in graphic design. He also aspires to design and publish an original
    board game that blends storytelling with strategic gameplay, leveraging his love for abstract concepts. In parallel, he seeks to become a regular organizer of local cultural events and trivia nights,
    establishing himself as a go‑to facilitator in the area. Ultimately, he wishes to achieve financial independence while mentoring at‑risk youth, sharing his DIY and artistic skills.
