personas:
  professional: Richard Owle, a 45‑year‑old community‑focused creative entrepreneur, harnesses his self‑taught digital illustration, woodworking, and event‑planning expertise to open a modest art studio
    in Sterling Heights while meticulously budgeting and channeling a competitive edge into every project.
  sports: Richard Owle enjoys weekend 5 K runs in Belle Isle and plays pickup basketball while cheering for the Detroit Pistons, follows the Lions and Tigers with a mix of loyal fandom and analytical statistics,
    and participates in a community adult soccer league, though their packed schedule sometimes forces them to skip workouts.
  arts: Richard Owle channels an eclectic artistic palate, painting abstract acrylics inspired by Jackson Pollock, photographing Detroit’s Art Deco facades in the style of Andreas Gursky, curating visits
    to the Detroit Institute of Arts for works by Banksy, immersing themselves in live shows by The Strokes and Tame Impala, and drawing speculative‑fiction inspiration from William Gibson and Neal Stephenson
    during their frequent reading marathons.
  travel: Richard Owle prefers meticulously planned road trips that blend architecture tourism—such as a weekend cruise through Chicago’s skyline and a half‑day tour of Detroit’s historic campuses—with
    occasional overseas pilgrimages to Berlin’s cyber‑punk districts and Kyoto’s vintage car museums, always balancing travel costs against the studio’s funding needs.
  culinary: Richard Owle, a modest home‑chef, frequently whips up Detroit‑style pizza layered with pepperoni and caramelized onions, pairs it with a vine‑roasted beet and goat‑cheese salad seasoned with
    fresh basil and smoked paprika, and concocts a hearty vegetable stew using carrots, kale, and heirloom tomatoes harvested from their garden, showcasing a solid but not gourmet level of culinary competence.
  core: Richard Owle is a competitively‑driven, methodical dreamer who turns abstract art into community projects while obsessively tracking budgets, fretting over every detail, and juggling a garden, a
    model‑car hobby, and a perpetual quest for the next creative spark.
background:
  cultural: Richard grew up in the industrial suburbs of Detroit, specifically Sterling Heights, where a mix of working‑class families and immigrant communities shaped the local culture. His heritage is
    primarily of German‑Polish descent, common among many white residents of Macomb County, and he was raised in a Protestant household that emphasized self‑reliance and community involvement. The region’s
    automotive legacy, modest Midwestern values, and the seasonal rhythms of the Great Lakes have ingrained in him a practical work ethic, an appreciation for hands‑on craftsmanship, and a strong sense
    of neighborhood loyalty. While he identifies with mainstream Midwestern white culture—celebrating local sports teams, regional foods like Coney dogs, and community festivals—he also draws inspiration
    from the diverse cultural offerings within the Detroit metropolitan area.
attributes:
