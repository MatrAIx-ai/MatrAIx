  hobbies: '[''Reading (fiction & self‑help)'', ''Journaling'', ''Yoga & meditation'', ''Knitting'', ''Portrait photography'', ''Puzzle solving (crosswords, sudoku)'', ''Hiking with small groups'', ''Book
    club participation'', ''Learning basic Spanish'', ''Volunteering at an animal shelter'']'
  career_goals: Amanda aims to translate her curiosity and practicality into a stable, purpose‑driven career. She plans to complete her bachelor's degree—likely in psychology or communications—and pursue
    a certification in user‑experience research or mental‑health outreach. Her short‑term goal is to secure an entry‑level role as a research assistant, content strategist, or community outreach coordinator
    where she can blend data‑driven research with clear written communication. Long‑term, she envisions launching a freelance consulting practice that combines content creation, user‑experience insights,
    and mental‑wellbeing resources, providing both financial security and a platform to help others manage anxiety and stress.
