  hobbies: '[''Quilting'',''Crocheting'',''Historical fiction reading'',''Sustainable fabric experimentation'',''Community quilting contests'',''Vegetable gardening'',''Hiking local trails'',''Woodworking'',''Bluegrass
    music listening'',''New recipe cooking'']'
  career_goals: Saundra's primary career ambition is to move into a supervisory role on the plant floor within the next three years, leveraging her deep technical knowledge and natural leadership style.
    She plans to complete her associate degree in textile technology, which she began in college, and earn a Lean Six Sigma Yellow Belt certification to strengthen her credentials. Parallel to her advancement
    in the factory, Saundra dreams of launching a small home-based business called 'White's Heritage Quilts,' where she will design and sell handcrafted quilts and custom apparel that blend traditional
    Appalachian motifs with modern sustainable fabrics. The venture will allow her to channel her curiosity for new materials into a creative outlet while providing a steady supplemental income for her
    family. She also hopes to mentor other women in manufacturing, advocating for greater representation and offering informal workshops on textile crafts and quality practices. Ultimately, Saundra seeks
    a balanced career that combines stable employment, creative independence, and community contribution.
