personas:
  professional: A teenage aspiring game developer and digital illustrator, Sanjeev Riverafalcon blends strategic gaming insights, basic Python coding, and a flair for visual storytelling, while their methodical
    nature and sense of responsibility drive them to create organized mod projects and help family members as an informal translator.
  sports: Sanjeev Riverafalcon enjoys casual soccer matches on weekends with friends at a local park, cheers for Phoenix Rising FC and follows El Tri during World Cup qualifiers, and participates in the
    Phoenix Youth Soccer Club's after‑school league, preferring low‑pressure play to stay fit without overcommitting.
  arts: 'Sanjeev Riverafalcon channels their imagination into digital illustration, creating fan art of Avatar: The Last Airbender and Star Wars, drawing inspiration from Lila Downs'' folk melodies and
    Billie Eilish''s ethereal pop, while regularly contributing comic strips to their school’s online newsletter.'
  travel: Sanjeev Riverafalcon dreams of exploring Mexico City’s Día de los Muertos parades and Oaxaca’s culinary festivals, while also cherishing past family road trips to the Grand Canyon and Sedona,
    favoring well‑planned itineraries that balance cultural immersion with the budget constraints of a dependent teen.
  culinary: Sanjeev Riverafalcon often cooks carne asada tacos with freshly hand‑pressed tortillas, limes, cilantro, and a spicy salsa verde, while also mastering guacamole and chorizo‑filled quesadillas,
    showcasing a solid yet still growing kitchen competence.
  core: Sanjeev Riverafalcon is a detail‑oriented teen who balances a love for strategic gaming and digital art with a habit of nightly journaling to calm their chronic worry, all while serving as the family’s
    go‑to translator.
background:
  cultural: Sanjeev grew up in a Mexican-American household in Phoenix, where Spanish is spoken at home and family gatherings revolve around traditional celebrations such as Día de los Muertos, Cinco de
    Mayo, and holiday feasts. He identifies strongly with his Mexican heritage, embracing the values of familismo, respect for elders, and community solidarity. These cultural influences shape his bilingual
    fluency, culinary skills, and occasional participation in local cultural festivals. While navigating a predominantly English-speaking school environment, he often acts as an informal translator for
    relatives, reinforcing his sense of responsibility to his family. His cultural background also informs his artistic sensibilities and his desire to one day incorporate Mexican motifs into his creative
    work.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Organizational planning and time management'', ''Basic computer literacy (MS Office, internet research)'', ''Introductory Python scripting'', ''Strategic
    problem-solving through video games'', ''Basic cooking of Mexican cuisine'', ''Minor mechanical troubleshooting (bicycles, small appliances)'', ''Effective written communication (journaling, school
    essays)'']'
  hobbies: '[''Strategy video gaming'', ''Digital illustration and fan art'', ''Learning Python programming'', ''Reading science-fiction and fantasy novels'', ''Listening to Mexican folk and contemporary
    music'', ''Cooking Mexican dishes with family'', ''Playing casual soccer with a small group'', ''Journaling for stress relief'']'
  career_goals: Sanjeev aims to complete his high school education, either through a traditional diploma or a GED, and then enroll in a technical program that offers a clear, structured pathway. He is drawn
    to fields that combine his analytical mindset with tangible results, such as computer networking, IT support, or automotive technology. His immediate ambition is to obtain an entry-level certification
    (e.g., CompTIA A+ or an automotive service certificate) that will allow him to secure a reliable, well-structured job after graduation. Long-term, he hopes to become a junior network administrator or
    a certified automotive technician, eventually managing a small team where he can apply his organizational strengths. He also keeps a secondary goal of using his creative side to offer freelance graphic
    design services, hoping to integrate his cultural heritage into visual projects for local community events.
