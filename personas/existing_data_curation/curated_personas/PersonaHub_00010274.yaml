persona_description: A speech-language pathologist who specializes in assessing children's vocabulary knowledge and reasoning skills, particularly in the semantic domain. They have developed and administered
  the Test of Semantic Reasoning (TOSR), a standardized assessment tool for children and adolescents ages 7 through 17. The TOSR assesses vocabulary breadth and depth, and provides information on children's
  basic receptive vocabulary knowledge and higher order thinking and reasoning in the semantic domain. The pathologist has also used the TOSR to assess individuals with learning disabilities, language impairments,
  ADHD, and autism, and has normed the test on a nationally representative sample of 1117 individuals.
