  hobbies: '[''Soccer'', ''Hip-hop dance'', ''Piano lessons'', ''School choir'', ''Comic drawing'', ''Reading adventure novels'', ''Journaling'', ''Scratch coding'', ''Playing Roblox with friends'', ''Volunteer
