personas:
  professional: A budding coder and performer, Diann Gilzeane blends structured problem‑solving from Scratch game development with the discipline of choir rehearsals, channeling their practical mindset
    into collaborative creative projects.
  sports: A spirited teammate on the Riverdale Rangers Under‑12 soccer squad, Diann Gilzeane thrives on the camaraderie of weekend matches, idolizes the city’s professional team the Hawks, and balances
    sprint drills with after‑school hip‑hop dance workouts to stay agile.
  arts: A creative multitasker, Diann Gilzeane sketches comic strips inspired by Adventure Time and Spider‑Man, practices piano pieces like Beethoven’s Für Elise during quiet evenings, belts out Let It
    Go in school choir, and hones hip‑hop moves to Billie Eilish’s Bad Guy at community class.
  travel: An enthusiastic explorer, Diann Gilzeane has already visited the Grand Canyon on a school field trip, spent a summer weekend at Disney World with family, dreams of seeing the Harry Potter Studio
    Tour in London, and meticulously plans each outing with a colorful map notebook.
  culinary: A budding home chef, Diann Gilzeane loves making pepperoni pizza from scratch, experiments with strawberry‑banana smoothies, whips up quick mac‑and‑cheese after soccer practice, and can’t resist
    a freshly baked chocolate chip cookie from the neighborhood bakery.
  core: Diann Gilzeane is a sociable, organized twelve‑year‑old who balances structured coding and team sports with vivid imagination, but often battles intense anxiety that fuels both creative bursts and
    occasional meltdowns.
background:
  cultural: Diann is an African-American girl growing up in Beachwood, a suburban community in Cuyahoga County. Her family maintains strong ties to their cultural heritage, celebrating Juneteenth, Black
    History Month, and church events that emphasize community service. She was raised on stories about her ancestors, and her grandparents often share oral histories and traditional recipes, such as collard
    greens and cornbread, which she helps prepare. Diann's parents encourage pride in black excellence, referencing role models like Maya Angelou, Serena Williams, and Dr. Mae Jemison. Membership in a local
    Black youth mentorship program gives her a supportive network, while attending a predominantly white school provides her with a broader cultural perspective. These influences shape her identity, her
    love for music ranging from gospel to contemporary R&B, and her desire to give back to the black community through future leadership roles.
