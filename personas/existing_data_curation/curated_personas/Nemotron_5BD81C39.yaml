  career_goals: Diann aspires to become an elementary school teacher because she loves structure, likes to help younger children learn, and enjoys creating supportive classroom environments. She also hopes
    to study child psychology or school counseling in college to better understand and support kids who struggle with anxiety, drawing on her own experiences. Her long-term ambition is to launch a youth-focused
    mental-health program in her community, offering workshops and peer-support groups for middle-schoolers.
