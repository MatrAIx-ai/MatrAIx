personas:
  professional: Scottie Holmes is an aspiring concept artist and fledgling narrative developer who self‑teaches digital illustration and storyboarding thanks to a boundless curiosity, but their relaxed
    attitude toward deadlines sometimes leaves sketchbooks half‑finished.
  sports: Scottie Holmes prefers solitary fitness like weekend trail hikes, home‑based yoga, and occasional skateboarding at a local park, while cheering for the Los Angeles Dodgers in baseball and the
    Seattle Sounders FC in soccer, and they belong to a community hiking club that meets monthly.
  arts: Scottie Holmes channels a deep love for visual storytelling by filling sketchbooks with watercolor realms inspired by Hayao Miyazaki's animated worlds and the street‑art mystique of Banksy, while
    ambient soundtracks from Brian Eno and indie tunes from Tame Impala guide late‑night digital painting sessions, and they regularly explore indie comic conventions for fresh narrative ideas.
  travel: Scottie Holmes enjoys low‑key, nature‑centric getaways, having spent summer months hiking the redwood groves of California’s Muir Woods and exploring the tide pools of Olympic National Park, while
    dreaming of a solo trek through Iceland’s volcanic landscapes and a literary pilgrimage to the misty castles of Scotland’s Highlands, typically planning trips through detailed Google Maps itineraries
    but often packing at the last minute.
  culinary: Scottie Holmes favors quiet dinners of homemade pesto pasta with fresh basil and pine nuts, often complemented by miso‑glazed salmon and roasted cauliflower, while snack time usually means avocado
    toast seasoned with smoked paprika, and their culinary curiosity leads them to experiment with matcha‑infused desserts and aromatic lavender lemonade during weekend cooking marathons.
  core: Scottie Holmes is a solitary, curiosity‑driven teen who blends an ever‑wandering imagination with a habit of leaving sketchbooks unfinished and a penchant for late‑night digital gaming sprees.
background:
  cultural: Scottie grew up in Reynoldsburg, a suburban community in Licking County, Ohio, in a middle‑class American family of primarily German‑American heritage. His upbringing reflects typical Midwestern
    values such as independence, modesty, and a strong sense of community. He participates occasionally in local events like the Reynoldsburg Summer Festival and attends a nearby public high school that
    offers an art club. Exposure to both the local countryside and the nearby urban cultural scene of Columbus provides him with a blend of rural tranquility and contemporary artistic influences. While
    his family maintains some traditional customs, his personal interests are shaped by broader American pop culture, online communities, and global artistic trends.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''basic photography'', ''creative writing'', ''basic Python programming'', ''research'', ''improvisational problem‑solving'', ''adaptability'']'
  hobbies: '[''drawing'', ''digital art experimentation'', ''nature photography'', ''reading science-fiction and fantasy'', ''writing short stories'', ''listening to indie and ambient music'', ''single‑player
    narrative gaming'', ''model kit building'', ''watching art history documentaries'']'
  career_goals: Scottie aims to attend a high‑school program with an emphasis on visual arts or technology, such as a magnet school for graphic design. He hopes to build a robust online portfolio of illustrations,
    concept art, and indie game prototypes. Long‑term, he envisions a career as a freelance concept artist or game designer, possibly working remotely to maintain the flexibility he values. He also considers
    studying visual communication or interactive media at a university, with an eye toward eventually teaching workshops for other adolescents interested in art and coding.
