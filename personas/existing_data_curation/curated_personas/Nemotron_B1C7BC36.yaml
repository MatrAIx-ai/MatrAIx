  hobbies: '[''Pickup Basketball'', ''Hiking'', ''Fishing'', ''Live Music (Country & Blues)'', ''Vintage Radio Restoration'', ''Cooking Southern Cuisine'', ''Youth Sports Coaching'', ''Listening to Entrepreneurship
    Podcasts'']'
  career_goals: Michael aims to be promoted to store manager within the next 12‑18 months, leveraging his current supervisory experience to oversee broader operational responsibilities. He plans to enroll
    in a part‑time Business Administration program to earn an associate degree, later pursuing a bachelor’s to qualify for district‑manager roles across Arkansas. Long‑term, he envisions opening his own
    specialty retail outlet focused on outdoor and camping gear, integrating innovative tech solutions he discovers through his curiosity while maintaining the practical, reliable service his community
    expects.
