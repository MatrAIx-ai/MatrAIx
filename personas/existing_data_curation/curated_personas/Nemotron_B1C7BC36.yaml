personas:
  professional: Michael Mcneill, a retail supervisor at a busy department store, leverages a methodical, data‑driven approach and natural sociability to lead shift teams, resolve conflicts, and implement
    cost‑effective tech upgrades that keep the floor humming, and they thrive on turning data into action.
  sports: Michael Mcneill, a pickup basketball regular at the local gym and a weekend hiker on the Ouachita trails, supports the Arkansas Razorbacks while also cheering for the Memphis Grizzlies, and they
    volunteer as a youth basketball coach at the community center, blending cardio sessions with strength work to stay game‑ready.
  arts: Michael Mcneill, an avid live‑music fan, fills their weekends with shows by country storytellers like Chris Stapleton and blues legends such as John Lee Hooker, while their radio‑tinkering hobby
    fuels a deep appreciation for analog sound craftsmanship, and they often discuss their latest discoveries with fellow enthusiasts.
  travel: Michael Mcneill, who prefers road‑trip adventures over distant vacations, has hiked the White River National Wildlife Refuge, fished at Lake Ouachita, and dreams of a summer road‑trip to the Canadian
    Rockies before saving enough for a spring break in New Orleans to sample the local music scene, and they plan each itinerary around budget‑friendly campgrounds.
  culinary: Michael Mcneill, a competent home cook, loves frying catfish in cornmeal, baking pecan pie with fresh Arkansas pecans, and experimenting with smoked brisket rubs, often pairing meals with locally
    brewed craft beers and sharing dishes at community potlucks, and they sometimes burn the first batch of catfish while waiting for the radio to finish tuning.
  core: Michael Mcneill blends a curiosity for vintage tech with a pragmatic retail mindset, volunteers as a basketball mentor, and secretly hoards a growing collection of old radios while occasionally
    skipping sleep to finish a new DIY project, and they never miss a chance to joke about their caffeine‑fueled late nights.
background:
  cultural: Michael was raised in Hackett, a small town in Sebastian County, Arkansas, within a middle‑class white family that values Southern hospitality, hard work, and community involvement. He attended
    the local public high school, participated in football and Future Farmers of America (FFA) events, and grew up attending church gatherings and county fairs. These experiences instilled a practical work
    ethic and a curiosity about everyday problem‑solving. His upbringing emphasizes self‑reliance, respect for tradition, and a collaborative spirit, all of which shape his balanced approach to new ideas
    and established methods.
