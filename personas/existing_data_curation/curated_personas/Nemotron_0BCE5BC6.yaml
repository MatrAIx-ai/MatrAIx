  career_goals: Christian aims to pursue a career that blends his hands‑on curiosity and competitive drive. He is interested in becoming a marine‑mechanic or a mechanical engineer specializing in marine
    equipment, a path that offers practical, stable work and ties to his local waterways. Simultaneously, he dreams of reaching the professional e‑sports scene as a strategic player or coach, seeing it
    as a way to channel his competitive spirit. He also considers joining the local fire department or emergency services to combine his desire to help others with his teamwork skills, while valuing a job
    that provides clear structure and reliable income.
