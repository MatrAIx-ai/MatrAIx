personas:
  professional: Christian Cage is a budding esports enthusiast who leverages their teamwork experience from school soccer and basketball to coordinate raids in multiplayer shooters, while their DIY electronics
    hobby fuels a practical curiosity about hardware, albeit with a relaxed, sometimes disorganized approach that can make them miss practice deadlines.
  sports: Christian Cage is a high‑school soccer and basketball player who idolizes DC United and the Washington Wizards, spends weekends skateboarding at the local park, and joins a community fishing club
    on the Chesapeake Bay, often competing fiercely in scrimmages while they keep a skeptical eye on coaches' strategies.
  arts: Christian Cage creates TikTok montages of their fishing trips and skate sessions, draws inspiration from Billie Eilish’s emotive lyrics and the kinetic energy of the skateboarding film Mid90s, and
    follows YouTube channels like Kurzgesagt – In a Nutshell for visual storytelling, though they admit to binge‑watching pop‑culture memes late into the night.
  travel: Christian Cage prefers spur‑of‑the‑moment road trips to nearby wildlife refuges and occasional weekend getaways to Washington, D.C.’s museums, while they dream of a summer backpacking adventure
    through the Canadian Rockies, balancing a limited allowance with a love for exploring both urban and natural landscapes.
  culinary: Christian Cage favors Chesapeake‑style crab cakes seasoned with Old Bay, quick‑fix pizza slices, and the occasional fish taco made from their own catches, yet they consider their cooking skill
    to hover at the microwave master level, leading them to rely on ready‑to‑heat meals when gaming marathons run late.
  core: Christian Cage is a competitively spirited teen who juggles esports, skateboarding, and fishing with a curious yet laid‑back mind, a lingering anxiety about performance, and they have a habit of
    impulsively splurging on the latest tech.
background:
  cultural: Christian grew up in the suburban community of Chesapeake, Virginia, where the coastal and military influences shape a blend of Southern hospitality and coastal practicality. His family’s traditions
    include weekend seafood meals, especially crab boils, attendance at local church events, and participation in community volunteer programs. The region’s strong ties to the Chesapeake Bay foster an appreciation
    for marine life and outdoor recreation, while the broader American teen culture—music, sports, and digital media—plays a central role in his social life.
