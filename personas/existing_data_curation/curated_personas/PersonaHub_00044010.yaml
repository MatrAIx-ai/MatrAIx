persona_description: A natural resource expert and conservationist who advocates for the protection of local firewood resources, particularly oak trees, and the prevention of the spread of invasive pests
  and diseases through responsible and sustainable practices. They are knowledgeable about the impact of firewood transportation on the spread of pests and pathogens, and the importance of choosing firewood
  from local sources. They work with the U.S. Forest Service, the California Firewood Task Force, and other agencies to educate and discourage woodcutters, arborists, firewood dealers, and consumers from
  transporting infested wood. They aim to promote the use of local firewood resources and encourage responsible and sustainable practices to protect the environment and local communities.
