  career_goals: Susan aims to advance from a secretarial role to an office manager or administrative supervisor position within the next five years, seeking to deepen her expertise in project coordination
    and team leadership. She plans to complete an associate degree in business administration or obtain a Certified Administrative Professional (CAP) credential to formalize her skills. Recognizing her
    desire for flexibility, she is also exploring remote virtual‑assistant work that would allow her to balance personal responsibilities while achieving financial stability and eventually purchasing a
    home. Alongside career progression, she hopes to develop a small consulting service for local entrepreneurs needing administrative support.
