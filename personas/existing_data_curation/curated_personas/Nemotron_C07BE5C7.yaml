  hobbies: '[''Cooking traditional Puerto Rican cuisine'', ''Gardening'', ''Walking on nature trails'', ''Knitting'', ''Listening to salsa and plena music'', ''Reading mystery novels'', ''Participating
    in senior center activities'', ''Volunteering at church events'', ''Genealogy research'']'
  career_goals: While she remains fully engaged in her current role, Amarilis aims to obtain a certification in Occupational Safety and Health to formalize her expertise in workplace safety. She hopes to
    serve as a shift lead for the next few years, using her organized and cooperative style to mentor younger workers and implement small‑scale process improvements that balance new ideas with proven methods.
    Ultimately, she envisions transitioning to a part‑time mentorship or consulting position, where she can share her practical knowledge while still having ample time for family and community activities.
