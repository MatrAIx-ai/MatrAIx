personas:
  professional: Jason Nguyen is a budding junior architect who spends hours constructing intricate LEGO structures, applying their natural organization and high standards to achieve flawless designs, while
    a competitive streak drives them to outdo peers in building challenges.
  sports: Jason Nguyen is a spirited member of the Seattle Sounders Jr. Soccer Club, dedicating after‑school practice to dribbling drills, while also cheering for the Seattle Seahawks and enjoying seasonal
    ice‑skating at the Winterfest rink, reflecting their disciplined yet competitive nature.
  arts: Jason Nguyen delights in drawing vibrant dragons during Lunar New Year festivities and frequently visits the Seattle Art Museum’s kids’ workshops, where their curiosity fuels mixed‑media collage
    experiments and their disciplined eye ensures every line is perfectly straight.
  travel: Jason Nguyen loves family outings to the Pacific Science Center and weekend rides on the Seattle‑Tacoma monorail, dreaming of future adventures to Disneyland and Tokyo’s cherry‑blossom parks,
    preferring well‑planned itineraries that balance novelty with familiar comforts.
  culinary: Jason Nguyen prefers sticky rice cake and pho broth during holiday meals, yet their snack of choice is chicken nuggets with ketchup, and they eagerly help parents slice carrots for a stir‑fry,
    showcasing a blend of traditional palate and kid‑friendly cravings.
  core: Jason Nguyen is an organized, high‑achieving five‑year‑old whose fierce curiosity and emotional intensity drive them to build flawless LEGO towers, meticulously save pennies, and navigate the world
    with both competitive zeal and occasional anxious meltdowns.
background:
  cultural: Jason is raised in a Vietnamese‑American household that moved to Seattle's vibrant International District. At home, he hears both English and Vietnamese, celebrating Lunar New Year with traditional
    foods like bánh chưng and dragon dances, and learning about his ancestors' stories. Family gatherings emphasize respect for elders, diligence in school, and love of music and art, which nurture his
    disciplined approach and artistic curiosity. The multicultural environment of Seattle, with its museums, public libraries, and community festivals, reinforces his open‑mindedness and appreciation for
    diverse ideas.
