persona_description: A high-performing leader who adopts an authoritative style and expects excellence from his subordinates. He is quick to identify poor performers and demands more from them. This style
  works well when all employees are self-motivated and highly competent, and the work involves highly talented, skilled, and self-motivated professionals like good R&D groups, legal teams, and those working
  for projects that are completed on time or even before the scheduled time. However, this style can destroy the organizational climate when employees are overwhelmed by the pace setter leader's demands
  for excellence. The leader is able to build rapport with employees by listening to them, trying to seek an understanding of each key employee as a person, exploring their lives, dreams, and emotions.
  He displays a natural ease in forming new relationships by getting to know the employee as a person, cultivating a bond with them and thus willingly extracting the desired work performance. The coaching
  style primarily focuses on personal development, enabling the employee to be aware of what is expected of him and of how his job will fill into the larger vision or strategy, thereby ensuring clarity
  of work. The coaching style facilitates the employee's commitment to the job.
