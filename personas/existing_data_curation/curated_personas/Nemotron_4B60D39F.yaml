  career_goals: Although Abigail is only one year old and does not yet have formal career aspirations, her emerging interests hint at future ambitions. She loves watching her parents prepare meals and tell
    stories, showing an early fascination with nurturing and narrative. Music and movement capture her attention; she giggles and wiggles whenever a song plays, suggesting a budding desire to express herself
    through dance or rhythm. In the near term she aims to master walking, expand her vocabulary, and participate more actively in group play, laying the groundwork for possible future roles as a performer,
    caregiver, or explorer of the world around her.
