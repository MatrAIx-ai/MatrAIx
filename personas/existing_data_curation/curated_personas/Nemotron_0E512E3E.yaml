  hobbies: '[''Pickup basketball'', ''Beach volleyball'', ''Salsa and reggaeton dancing'', ''Cooking Puerto Rican cuisine'', ''Spontaneous East Coast road trips'', ''Attending car and truck shows'', ''Fishing
    off the Jersey Shore'', ''Listening to Latin music'', ''Volunteering at community events'']'
  career_goals: Yshua aims to upgrade his credentials by obtaining a Class A commercial driver's license and relevant endorsements (e.g., HazMat) so he can transition to an owner‑operator role and eventually
    purchase his own truck. He dreams of launching a small logistics firm that combines freight delivery with a niche sales component—offering local businesses personalized transport and product promotion
    services. In the medium term, he hopes to become a fleet manager or driver trainer, leveraging his practical expertise to mentor new drivers while maintaining the flexible schedule that suits his spontaneous
    nature. Completing a GED and attending short courses on logistics management are also on his roadmap to broaden his business acumen.
