  career_goals: Wilfredo's competitive spirit and love of discovery fuel his ambition to become an astronaut or a robotics engineer who designs machines that explore space and help people. In the near term,
    he aims to join his school's robotics club, win a regional science-fair award for a project that combines coding and engineering, and earn the position of team captain on his soccer squad. These goals
    reflect his desire to blend practical problem solving with innovative ideas while pursuing recognition for his achievements.
