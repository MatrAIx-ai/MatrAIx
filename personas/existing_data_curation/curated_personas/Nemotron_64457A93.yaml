personas:
  professional: Wilfredo Arambulo is a budding junior coder and LEGO architect who combines a love for building intricate brick structures with a practical curiosity that drives them to create simple Scratch
    games, often challenging themselves to debug code as competitively as they defend a goal on the soccer field.
  sports: Wilfredo Arambulo passionately plays on the Haslet Hurricanes youth soccer team in the fall and the Haslet Hoops basketball club in the winter, idolizing the Oklahoma City Thunder and cheering
    for the Dallas Cowboys, and they approach fitness with a competitive edge, always seeking to outscore peers on the field and the court.
  arts: Wilfredo Arambulo delights in dancing to lively banda beats from groups like Los Tigres del Norte, channeling that rhythm into building elaborate LEGO sculptures and creating pixel art in Scratch,
    while also enjoying the animated adventures of Pixar’s 'Toy Story' and the colorful murals at local festivals.
  travel: Wilfredo Arambulo prefers family road trips that blend adventure and comfort, recalling recent hikes in the Ouachita National Forest and a night under the stars at a New Mexico observatory, while
    dreaming of a future visit to Chile’s Atacama Desert to see the Milky Way without light pollution.
  culinary: Wilfredo Arambulo loves helping prepare family staples such as tacos, tamales, and warm atole, proudly measuring spices for a perfect salsa, yet often sneaks extra salsa packets into their lunchbox,
    reflecting both a budding culinary skill and a mischievous snack habit.
  core: Wilfredo Arambulo is a competitive, curiosity‑driven nine‑year‑old who balances soccer‑field ambition with LEGO creativity, savors spicy family dishes, and meticulously guards their allowance while
    occasionally giving in to sweet temptations.
background:
  cultural: Wilfredo is raised in a Mexican-American household in Haslet, Texas, where bilingualism (English and Spanish) is a daily routine. His family observes Mexican holidays such as Dia de los Muertos
    and Mexican Independence Day, and they celebrate Catholic traditions like Christmas Eve posadas. He regularly participates in local Hispanic cultural events, learning folk dances and helping prepare
    family meals that feature authentic Mexican recipes. At the same time, growing up in Denton County exposes him to broader Texan customs, school activities, and American popular culture, giving him a
    bicultural identity that blends Mexican values of family and community with the independent, competitive spirit of his peers.
