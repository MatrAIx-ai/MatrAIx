  career_goals: She aims to move into a supervisory role, such as lead machine operator or production floor manager, where she can mentor newer staff and improve process efficiency. In the longer term,
    she hopes to launch a small custom clothing line that blends contemporary styles with African American cultural motifs, leveraging her technical skills and community connections.
