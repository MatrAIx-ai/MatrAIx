persona_description: A health care professional who is interested in the diagnosis and treatment of iron overload disorders, specifically hemochromatosis and hemosiderosis. They are also interested in the
  effects of oxidative stress and inflammation on ferritin levels and the potential causes and treatments of high ferritin levels. They are familiar with the use of ferritin as an acute phase reactant and
  marker of acute and chronic inflammation, and are aware of the importance of iron stores in the development of anemia of chronic disease (ACD). They are also aware of the potential complications of high
  ferritin levels, such as anemia, and are aware of the strategies for reducing ferritin levels.
