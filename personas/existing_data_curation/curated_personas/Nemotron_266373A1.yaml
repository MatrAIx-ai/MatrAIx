  career_goals: Linda aims to improve her school performance and earn a spot in the upcoming science fair, deepening her interest in science and technology. Long‑term, she aspires to become an environmental
    engineer or wildlife biologist who can apply her curiosity and practicality to protect nature. She also hopes to stay connected to her community by volunteering at the local nature center and teaching
    younger kids basic coding and gardening skills.
