personas:
  professional: Leidis Vazquez, a veteran building cleaner with over 30 years of experience, applies her systematic scheduling, OSHA-compliant chemical handling, and meticulous inventory control to keep
    commercial spaces spotless while mentoring new staff, and she is actively pursuing an OSHA-trainer credential to step into a supervisory role.
  sports: Leidis Vazquez, an avid fan of the local baseball team the Cardinals and the regional soccer club the Toros, joins a senior walking group for weekly cardio, occasionally participates in a friendly
    softball league, and balances her competitive nature by cheering loudly at games while keeping a pragmatic eye on her health.
  arts: Leidis Vazquez, who finds joy in the rhythmic steps of her cumbia dance class and the harmonies of her church choir, draws inspiration from artists like Celia Cruz, Carlos Santana, and contemporary
    muralist Diego Rivera, and she often incorporates those influences into her community performances and home décor.
  travel: Leidis Vazquez, who favors short road trips that combine family visits with cultural festivals, has explored the historic streets of Oaxaca, the vibrant markets of Puebla, and the seaside charm
    of Puerto Vallarta, while also planning a relaxing retreat to the vineyards of Napa Valley, always weighing costs against her fixed retirement budget.
  culinary: Leidis Vazquez, a proficient home cook, delights in preparing mole poblano, pork carnitas, and fresh pico de gallo using garden-grown tomatoes, chilies, and cilantro, and she regularly experiments
    with traditional corn masa to perfect homemade tortillas for family gatherings and community events.
  core: Leidis Vazquez blends meticulous organization with a lively social spirit, turning every cleaning schedule, garden plot, and dance step into a disciplined yet joyous routine, though her competitive
    edge sometimes fuels both her drive and her occasional worry.
background:
  cultural: Leidis is a Mexican-American who grew up in a bilingual Mexican household in the Rio Grande Valley. She maintains strong family ties and celebrates cultural traditions such as Dia de los Muertos,
    Mexican Independence Day, and religious holidays with a blend of Mexican and Texan customs. Spanish is spoken at home, and she values the communal spirit of her neighborhood, often sharing homemade
    food and participating in local festivals that feature mariachi music and folkloric dance. Her Catholic faith and respect for elders shape her sense of responsibility and community involvement.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (strip & wax, carpet cleaning)'', ''Chemical safety and handling'', ''Inventory management'', ''Schedule planning and coordination'', ''Team training and
    mentorship'', ''Basic facilities maintenance'', ''Customer service'', ''Safety compliance (OSHA)'', ''Record keeping'']'
  hobbies: '[''Cumbia and salsa dancing'', ''Church choir singing'', ''Card games (e.g., poker, bridge)'', ''Gardening (vegetables and flowers)'', ''Cooking traditional Mexican cuisine'', ''Walking in local
    parks'', ''Knitting scarves'', ''Volunteering at community events'']'
  career_goals: Leidis aims to transition into a supervisory role within the next two years, leveraging her reliability and organized work style to lead a cleaning team. She plans to obtain an OSHA-certified
    trainer credential and become the primary point of contact for facility managers, ensuring quality control across multiple sites. Long-term, she envisions starting a small, family-run cleaning service
    that emphasizes meticulous standards and trustworthy service for local businesses, allowing her to mentor younger workers while securing a stable retirement income.
