  of methodologies and approaches in African history, including the use of archaeology, ethnography, historical linguistics, and oral traditions, as well as the exploration of new techniques used by other
  sciences, such as genetics. This individual is also likely to be interested in the use of digital sources, such as historical documents and statistics, and the challenges associated with their use, such
  as the need to develop basic understandings of them.
