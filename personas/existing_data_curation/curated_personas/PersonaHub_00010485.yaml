persona_description: A synthetic biologist who specializes in the design and construction of synthetic RNAi-based control systems for the noninvasive assessment of expression profiles and the interrogation
  of increasingly complex cellular behaviors. They have a strong background in synthetic biology, epigenetics, and cellular biology, and have conducted research on the construction of synthetic transcription
  factors that interact with chromatin to reactivate silenced loci in human cells, as well as the use of engineered epigenetic switches to maintain relative protein levels. They have also demonstrated the
  dynamics of four silencing chromatin regulators that enact distinct modifications, including DNA methylation, histone deacetylation, and histone methylation, with time-lapse microscopy via coupling to
  a fluorescent reporter protein.
