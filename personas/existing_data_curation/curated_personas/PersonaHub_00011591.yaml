persona_description: A researcher in the field of environmental ethics and social psychology, interested in the cognitive and social processes involved in justifying solutions to ethical dilemmas and reaching
  agreement on ethical behavior. The researcher has a background in value systems and has recently conducted research on the dynamics of value systems, finding that individuals have multiple value systems
  and that values are ranked or rated differently depending on the context in which they are asked to do it. The researcher is currently exploring how value accessibility mediates the effects of situational
  context on the structure of value systems.
