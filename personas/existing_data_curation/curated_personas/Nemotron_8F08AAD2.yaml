  hobbies: '[''bow hunting'', ''fly fishing'', ''ice fishing'', ''snowmobiling'', ''hiking'', ''hand‑carved woodworking'', ''building furniture'', ''tinkering with tools'', ''playing acoustic guitar'',
    ''community potlucks'']'
  career_goals: Howard aims to turn his long‑standing trade into a modest family‑run construction business that focuses on custom homes, log cabins, and renovations for neighbors in the Matanuska‑Susitna
    area. Over the next two years he plans to obtain a General Contractor license and an OSHA safety certification, expand his client base through reliable, routine service, and develop a line of hand‑crafted
    furniture to sell locally. He also hopes to formalize an apprenticeship program to pass on his practical skills to younger workers.
