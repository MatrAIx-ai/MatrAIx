  hobbies: '[''Gardening'', ''Hiking'', ''Book club (science/history)'', ''Volunteering at a makerspace'', ''Yoga'', ''Cooking Mediterranean cuisine'', ''Crossword puzzles'', ''Sudoku'', ''Board games with
    family'', ''Community theater attendance'']'
  career_goals: Mandy aims to leverage her STEM background to empower the next generation of technologists through volunteer mentorship and curriculum development for local schools. She aspires to serve
    on the board of a nonprofit focused on bridging the digital divide, author a guidebook for seniors on using modern technology, and occasionally consult on community tech projects. Although retired from
    full‑time work, she wants to stay intellectually active, contribute her expertise to socially beneficial initiatives, and foster inclusive, collaborative environments.
