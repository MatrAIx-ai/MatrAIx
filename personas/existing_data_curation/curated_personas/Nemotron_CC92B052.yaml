personas:
  professional: Mandy Adams, a retired electrical engineer turned community STEM mentor, leverages their data‑analysis and systems‑design expertise to design accessible curricula, coordinate grant‑funded
    workshops at a local makerspace, and translate complex tech concepts into friendly language for senior learners, all while balancing a love of structured project timelines with a flexible, compassionate
    approach to mentorship.
  sports: Mandy Adams enjoys hiking the nearby Redwood forests with their Redwood Hiking Club, practices gentle yoga at the Sunlit Flow studio, and they passionately root for the San Francisco Giants, Golden
    State Warriors, and San Jose Sharks while following local community runs organized by the Bay Area Fitness Group.
  arts: Mandy Adams participates in a science‑and‑history book club that often discusses works by Mary Beard and Yuval Noah Harari, attends local theater productions of classics like 'The Glass Menagerie,'
    and they find inspiration in the photography of Ansel Adams and the minimalist sculptures of Maya Lin, which inform their creative approach to problem‑solving.
  travel: Mandy Adams prefers well‑planned trips that blend cultural immersion and nature, such as a week‑long culinary tour of the Greek islands of Crete and Santorini followed by a guided hike through
    the Canadian Rockies, yet they also enjoy spontaneous weekend drives to nearby vineyards, all while balancing travel expenses with a modest retirement income.
  culinary: Mandy Adams cooks Mediterranean dishes with confident flair, favoring recipes like grilled branzino with lemon‑capers, ratatouille studded with fresh basil, and homemade hummus seasoned with
    roasted garlic and extra‑virgin olive oil, and they often experiment by adding locally sourced heirloom tomatoes from their garden to classic fare.
  core: Mandy Adams blends a structured, technically savvy mind with a compassionate, flexible heart, channeling their love of gardening, puzzles, and community mentorship into a vibrant, purpose‑driven
    retirement.
background:
  cultural: Mandy’s cultural upbringing reflects a blend of traditional white American family values and the progressive, tech‑oriented environment of the San Jose Bay Area. Raised in a middle‑class suburban
    setting during the 1970s and 1980s, she was encouraged to pursue education and community service. The rapid growth of Silicon Valley during her adult years instilled respect for innovation, collaborative
    problem‑solving, and a commitment to using technology for societal good. Living now in Santa Clara County, a diverse and multicultural region, has broadened her perspective and reinforced her dedication
    to inclusive community initiatives.
