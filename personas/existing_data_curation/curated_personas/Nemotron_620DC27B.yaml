  career_goals: Juanita dreams of becoming a veterinarian because she loves caring for animals and wants to use practical science to help them heal. She is also fascinated by the natural environment around
    Boiling Springs and hopes to study environmental science to protect local wildlife. In school she wants to join student council to develop her leadership and advocacy skills, and she aspires to grow
    into a mental‑health advocate for children, using her own experiences with anxiety to support peers. Long‑term, she envisions a career that blends practical problem‑solving with compassionate service,
    allowing her to make a tangible difference in her community.
