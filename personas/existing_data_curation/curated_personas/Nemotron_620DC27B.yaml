personas:
  professional: Juanita Mcmillan is an aspiring young biologist and budding Scratch coder, weaving her deep curiosity about woodland wildlife with practical problem‑solving skills, while her love of adventure
    novels fuels imaginative project ideas that often emerge from her relaxed, somewhat disorganized planning style.
  sports: Juanita Mcmillan plays pickup basketball after school with friends, is a member of the local Sun Valley Youth Basketball Club, and cheers for the nearby professional team, the Denver Nuggets,
    while also enjoying seasonal runs through the autumn woods, though they often forget to stretch, resulting in occasional sore calves.
  arts: Juanita Mcmillan channels artistic energy by sketching comic‑style heroes inspired by Stan Lee and Jim Lee, listening to gospel great Mahalia Jackson in church and modern R&B stars Beyoncé and Khalid
    on drives, and diving into fantasy worlds like Harry Potter and Percy Jackson, which together shape a vibrant creative identity.
  travel: Juanita Mcmillan dreams of wandering the towering redwoods of Muir Woods after countless weekend explorations of nearby county park creeks, and they hope to one day trek the historic trails of
    the Great Smoky Mountains, favoring budget‑friendly road trips that let them savor nature’s quiet over crowded airports.
  culinary: Juanita Mcmillan helps their grandma simmer collard greens with smoked turkey hocks and brew sweet tea with black tea, sugar, and a splash of lemon, while also experimenting with a beginner’s
    mac and cheese recipe that blends sharp cheddar, elbow pasta, and a pinch of paprika, reflecting growing confidence in the kitchen.
  core: Juanita Mcmillan is a curious, nature‑loving ten‑year‑old who blends imaginative storytelling, budding coding skills, and heartfelt family traditions, while navigating intense anxiety and a delightfully
    chaotic, unplanned life.
background:
  cultural: Juanita grew up in a close‑knit Black family in Boiling Springs, South Carolina, where church, family gatherings, and community traditions shape daily life. Sunday services at the local Baptist
    church infuse her with gospel music, a sense of collective support, and stories of resilience passed down from her grandparents, who recall the civil‑rights era. Family meals celebrate Southern African‑American
    cuisine—collard greens, cornbread, fried chicken, and sweet tea—reflecting a blend of African heritage and Southern flavors. The neighborhood observes Juneteenth with picnics and barbecues, and her
    family values storytelling, music, and mutual care. These cultural influences nurture Juanita’s love for music, food, community service, and a strong sense of identity, while also teaching her the importance
    of perseverance and looking out for one another.
