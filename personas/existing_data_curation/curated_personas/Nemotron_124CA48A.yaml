  hobbies: '[''Cooking'', ''Gardening'', ''Quilting'', ''Church choir and potluck gatherings'', ''Bingo'', ''Card games'', ''Listening to gospel and zydeco music'', ''Storytelling'', ''Genealogy research'']'
  career_goals: Although retired, Alecia aims to deepen her involvement in the local church by leading the choir and coordinating charitable outreach, preserve her family's culinary heritage by compiling
    a cookbook of beloved recipes, teach quilting workshops to seniors at the community center, learn new digital tools such as photo editing and video calling to stay connected with grandchildren, maintain
    her health through regular walking and low‑impact exercise, and travel to regional festivals in Louisiana to celebrate gospel, zydeco, and Creole culture.
