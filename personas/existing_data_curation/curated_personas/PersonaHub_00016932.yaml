persona_description: A landscape architect who is interested in the history and evolution of urban landscape design, and the tools and instruments used in the construction and maintenance of our urban environments.
  They are curious about the material processes, intentions, traditions, and experience of the user reflected in the choice of tool, and how technology has changed the ways tools are engaged in urban landscapes.
  They are also interested in the relationship between cultural preference and technological development in the establishment of ubiquitous regional landscape aesthetics, such as the obsession with manicured
  lawns and the development of the mower. They are looking for a visual collection of the materials and tools used in the construction of urban landscapes, and how these tools and materials shape and define
  the spaces we inhabit.
