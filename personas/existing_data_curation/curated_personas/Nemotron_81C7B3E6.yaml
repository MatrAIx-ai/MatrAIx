personas:
  professional: Amarelys Lopez, a 21‑year‑old janitor in Bellingham, combines meticulous green‑cleaning expertise with a natural flair for team leadership, using their organized, curious mindset to streamline
    facility operations while championing sustainable practices.
  sports: Amarelys Lopez hikes the Cascades weekly, paddles Lake Whatcom in the summer, follows the Bellingham Mariners baseball team, and they belong to a local kayaking club that meets every Saturday,
    balancing outdoor adventure with occasional yoga sessions to stay flexible.
  arts: Amarelys Lopez enjoys performing at open‑mic nights, dancing salsa to the rhythms of Celia Cruz and Marc Anthony, curates a blog that praises indie folk duo The Head and the Heart, and they regularly
    attend concerts at the Whatcom Museum’s cultural pavilion.
  travel: Amarelys Lopez prefers budget‑friendly road trips, having explored Seattle’s Pike Place Market, Vancouver’s Stanley Park, and the volcanic landscapes of Oregon’s Crater Lake, while dreaming of
    an eco‑tourism trek through Costa Rica’s Monteverde cloud forest.
  culinary: Amarelys Lopez experiments with Spanish cooking, perfecting dishes like paella de mariscos and tortilla española, while also favoring locally roasted coffee, avocado toast topped with smoked
    salmon, and they often incorporate fresh berries from the community garden into desserts.
  core: Amarelys Lopez is a sociable, eco‑focused 21‑year‑old who blends meticulous cleaning mastery with a love for outdoor adventure, community art, and sustainable living, even if they sometimes neglect
    finances and dental appointments.
background:
  cultural: Amarelys is a first-generation American of Mexican heritage who identifies as white Hispanic. Raised in a bicultural household in the Pacific Northwest, she speaks fluent English and conversational
    Spanish, celebrates both traditional American holidays and Mexican customs such as Día de los Muertos and Cinco de Mayo, and incorporates elements of her family's culinary traditions into her cooking.
    Living in Bellingham, she embraces the region's outdoor lifestyle while remaining connected to her cultural community through local festivals and language exchange groups.
attributes:
  skills: '[''commercial cleaning'', ''floor care (buffing, mopping)'', ''green cleaning protocols'', ''inventory management'', ''schedule coordination'', ''OSHA safety compliance'', ''minor plumbing and
