  hobbies: '[''hiking'', ''kayaking'', ''coffee shop hopping'', ''open-mic performance'', ''salsa dancing'', ''blogging about sustainable cleaning'', ''photography'', ''volunteering at community garden'',
    ''Spanish cooking'']'
  career_goals: Amarelys aims to transition from entry-level janitorial work to a supervisory role in facilities management within the next three years. She plans to complete her associate's degree in environmental
    health or business administration, which will support her ambition to become a facilities operations manager at a university or corporate campus. She is passionate about integrating sustainable practices
    into building operations and hopes to lead initiatives that reduce waste and energy consumption. In the longer term, she envisions starting her own eco-friendly cleaning service that provides training
    and employment opportunities for young adults in the Bellingham community.
