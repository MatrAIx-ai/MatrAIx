persona_description: A conceptual artist who specializes in exploring the principles of material and form, particularly the use of long sheets and ribbons as a means of creating complex flexible spaces.
  His work often incorporates the themes of reusability, Merz-work, and opposition to the established world of architecture. He is known for using the principle of the Ville Spatiale in his models and for
  creating the 'Nonument' in his 'Project for MART' in 2006. His exhibitions often feature the use of moebian structures, which are continuous shapes formed by twisting and folding lamellar structures.
