  career_goals: Looking ahead, Jason hopes to combine his artistic talent with his concern for the natural world by studying environmental graphic design and documentary filmmaking. He dreams of earning
    a degree in environmental science and visual communication, then working as an educator and visual storyteller who creates compelling illustrations, videos, and interactive media to raise awareness
    about local ecosystems in Southern California. In the long term, he sees himself leading community workshops, producing educational content for youth, and collaborating with wildlife conservation groups
    to protect habitats while promoting humane, science‑based stewardship.
