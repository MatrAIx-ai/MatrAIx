  hobbies: '[''gardening'', ''wine tasting'', ''hiking'', ''reading mystery novels'', ''reading historical nonfiction'', ''yoga'', ''knitting'', ''volunteering at animal shelter'']'
  career_goals: Frankie aims to complete her GED within the next year and then pursue a certification as a Community Health Worker so she can combine her organizational strengths with her desire to help
    others. She also plans to start a modest home‑based bakery that supplies pastries for local events and markets. Ultimately, she hopes to secure a part‑time administrative role at a nearby nonprofit
    or health clinic, using her skills to improve community services while maintaining a stable income.
