personas:
  professional: Frankie Brooks, a community health work aspirant with a knack for administrative precision, leverages their Excel expertise and calm, compassionate mediation to organize neighborhood health
    fairs, streamline volunteer schedules, and lay the groundwork for a modest home‑based bakery while targeting a part‑time role at a local nonprofit.
  sports: Frankie Brooks, an avid hiker of the Napa countryside, participates in the Napa Hiking Club, follows the Golden State Warriors and the San Francisco Giants, attends gentle yoga classes twice weekly,
    and occasionally joins a community softball league for light cardio.
  arts: Frankie Brooks, a devoted reader of Agatha Christie mysteries and David McCullough historical nonfiction, finds solace in folk singer Brandi Carlile’s concerts, contributes hand‑knit scarves to
    local arts‑craft fairs, and enjoys occasional trips to the nearby Napa Valley Art Walk.
  travel: Frankie Brooks, a low‑key explorer, plans weekend getaways to Sonoma’s boutique vineyards, has a bucket‑list destination of Tuscany’s Chianti hills, prefers self‑driven itineraries with modest
    budgets, and balances travel with volunteer commitments and GED study sessions.
  culinary: Frankie Brooks, a budding home baker, favors almond‑flour scones, rosemary focaccia, and lavender shortbread, incorporates fresh herbs from their garden, pairs pastries with local Napa Pinot
    Noir, and occasionally over‑sugars to satisfy a sweet tooth during late‑night baking marathons.
  core: Frankie Brooks, a methodical caretaker, blends meticulous budgeting, gardening, and compassionate community work into a life that balances quiet solitude with purposeful service, even if they occasionally
    binge‑read mystery novels into the night.
background:
  cultural: Frankie is a White American of Irish‑German descent who grew up in a modest, working‑class family in Northern California’s Central Valley. Her upbringing emphasized self‑reliance, community
    involvement, and a respect for the region’s agricultural roots. Living now in Napa, she has absorbed the local wine culture and a strong environmental consciousness, blending traditional family values
    with the progressive, sustainability‑focused ethos of the Bay Area.
attributes:
  skills: '[''budgeting'', ''scheduling'', ''small‑event coordination'', ''conflict mediation'', ''volunteer management'', ''basic home maintenance'', ''gardening'', ''wine tasting knowledge'', ''Microsoft
