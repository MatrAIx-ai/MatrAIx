personas:
  professional: A hands‑on problem‑solver with a meticulous, organized approach, Michael Zayac leverages their expertise in automotive maintenance, carpentry, and landscaping to deliver reliable home‑service
    solutions, while their sociable, assertive nature helps them coordinate projects, manage client expectations, and foster community trust as they build a small‑scale handyman business.
  sports: An avid outdoorsman, Michael Zayac spends their weekends fishing on Lake Conroe, hunting deer in the East Texas woods, cheering for the Dallas Cowboys and the Lakeview High School Longhorns from
    a tailgate, and competes in the Cedar Creek Bowling League every Thursday night.
  arts: A music enthusiast, Michael Zayac strums acoustic renditions of George Strait and Chris Stapleton at weekly Cedar Creek jam sessions, occasionally belts out gospel hymns at church gatherings, and
    they find inspiration in the regional folk art showcased at the annual East Texas County Fair.
  travel: A pragmatic road‑trip planner, Michael Zayac prefers short‑haul drives to Austin’s live‑music scene or New Orleans’ Mardi Mardi festivities, but dreams of a summer trek to Santa Fe’s Pueblo architecture
    and a winter cabin escape in the Colorado Rockies, always budgeting the mileage and fuel costs in their spreadsheet before hitting the road.
  culinary: An enthusiastic grill‑master, Michael Zayac cooks up Texas‑style smoked brisket, hearty bean chili spiced with chipotle and cumin, and buttery biscuits topped with honey, while their modest
    woodworking hobby doubles as a workshop for crafting custom cutting boards and spice racks.
  core: Michael Zayac blends Southern hospitality with a hands‑on work ethic, juggling weekend bow‑hunting trips, a meticulous budgeting habit, and a tendency to leave their tools out on the porch overnight,
    proving that practicality and community spirit can coexist with a dash of restless curiosity.
background:
  cultural: Michael was raised in a small‑town Texan environment, steeped in Southern hospitality and a strong sense of community. His family’s roots are primarily Anglo‑American, with generations of farming
    and ranching heritage that emphasized self‑reliance, hard work, and respect for nature. The local culture, shaped by church gatherings, county fairs, and regional traditions like country music and outdoor
    recreation, has instilled in him values of generosity, teamwork, and pride in his Texan identity. While he maintains a pragmatic outlook, he also appreciates the blend of traditional customs and modern
    influences that define contemporary East Texas life.
attributes:
  skills: '[''Basic automotive maintenance'', ''Carpentry and home repair'', ''Landscaping and outdoor maintenance'', ''Project planning and budgeting'', ''Community event coordination'', ''Team leadership
