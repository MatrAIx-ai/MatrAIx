  hobbies: '[''Fishing'', ''Hunting'', ''Camping'', ''Woodworking'', ''Playing acoustic guitar'', ''Community volunteering'', ''Supporting local high school football'', ''Bowling league'']'
  career_goals: Michael aims to translate his practical skills into a sustainable career. He plans to obtain his GED within the next year, followed by enrollment in a vocational program to earn certification
    as a handyman or licensed HVAC technician. His ultimate ambition is to launch his own small‑scale home‑services business, serving residents of Polk County with reliable repair, maintenance, and landscaping
    solutions. In parallel, he hopes to take on a volunteer leadership role at the local community center, helping organize youth programs and neighborhood improvement projects, which would further develop
    his managerial experience and provide a stable income for his family.
