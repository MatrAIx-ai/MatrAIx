personas:
  professional: Mikyung Wong, a 14‑year‑old budding multimedia illustrator, channels an imagination fueled by folklore and pop culture into watercolor sketches and digital tablets, and they blend these
    media to produce mini stop‑motion films with the school’s art club while staying on top of homework.
  sports: Mikyung Wong enjoys casual basketball at the community gym and practices soccer with the Denton Youth Soccer Club, cheering on the Dallas Mavericks and dabbling in rollerskating during summer,
    while they use nature walks by the lake as their primary form of exercise.
  arts: Mikyung Wong immerses themselves in artistic pursuits by sketching folklore‑inspired characters, listening to BTS and BLACKPINK for inspiration, admiring the brushwork of Van Gogh and the storytelling
    of Hayao Miyazaki, and they regularly attend local art workshops and museum nights at the Dallas Museum of Art.
  travel: Mikyung Wong prefers low‑key weekend getaways, having explored Austin’s music scene and the historic Fort Worth Stockyards, while dreaming of a spring trip to Kyoto’s temples and a summer adventure
    at the Pacific coastal town of Santa Cruz, and they often plan itineraries with detailed sketches of each destination.
  culinary: Mikyung Wong enjoys a blend of flavor adventures, cooking intermediate‑level bibimbap with gochujang and vegetables, whipping up tteokbokki for friends, while also indulging in Texas‑style smoked
    brisket and homemade mac and cheese, and they never miss a chance to savor fresh strawberries topped with honey.
  core: Mikyung Wong is a hyper‑creative teen who balances vivid artistic daydreams with bouts of anxiety, often retreating to the lake for photography while their desk overflows with sketchbooks, half‑finished
    comics, and a secret stash of K‑pop light sticks.
background:
  cultural: Mikyung is a second‑generation East Asian American, with parents who emigrated from South Korea. Her household blends traditional Korean customs—such as celebrating Chuseok and Lunar New Year,
    preparing kimchi, and practicing respect for elders—with the suburban Texan lifestyle. She attends a public middle school where she navigates both her family's cultural expectations and the diverse
    American teenage culture. Her bilingual upbringing influences her artistic themes, often weaving Korean folklore motifs with contemporary Texan settings. The family's strong emphasis on education and
    collective responsibility shapes her organized yet imaginative approach to schoolwork and extracurricular pursuits.
attributes:
  skills: '[''Digital illustration'', ''Creative writing (poetry & speculative fiction)'', ''Basic programming (Scratch)'', ''Project coordination for school clubs'', ''Conversational Korean'']'
  hobbies: '[''Sketching and digital illustration'', ''Creative writing (poetry, short stories)'', ''Stop‑motion animation'', ''Basic coding projects (Scratch)'', ''K‑pop listening and Korean language practice'',
    ''Nature photography at local parks'', ''Art club participation'', ''Community cultural festival planning'']'
  career_goals: Mikyung aspires to become a multimedia artist who blends visual art, animation, and interactive storytelling to explore complex emotions and cultural narratives. She dreams of attending
    a specialized high‑school program in visual arts, eventually studying graphic design or animation at a university where she can further develop her technical skills. Long‑term, she hopes to work on
    independent game design or animated short films that highlight themes of identity, mental health, and cross‑cultural experiences, while also mentoring younger students in creative expression.
