personas:
  professional: A budding mechanical engineer in the making, Jeffrey Whelan channels their love of LEGO, model trains, and Scratch coding into designing miniature contraptions, applying a methodical, detail‑oriented
    approach that mirrors the precision of the city’s historic steel heritage and the organized rhythm of the annual Three Rivers Regatta.
  sports: A dedicated soccer player for West End United, Jeffrey Whelan thrives on team drills and early morning practices, also cheering on the Pittsburgh Steelers each Sunday and watching the Penguins
    on game nights, while occasionally joining the neighborhood youth baseball league, balancing a competitive drive with a deep appreciation for the city’s sports traditions.
  arts: An aspiring acoustic guitarist, Jeffrey Whelan strums folk classics by artists like John Denver and Bob Dylan, while also exploring visual creativity through intricate LEGO sculptures and frequent
    visits to the Andy Warhol Museum, and they regularly attend performances of the Pittsburgh Symphony Orchestra, allowing their artistic side to complement a structured mindset.
  travel: A curious explorer, Jeffrey Whelan spends holiday weekends visiting regional highlights such as Ohiopyle State Park’s waterfalls, the historic Fallingwater house, and the annual Three Rivers Regatta,
    and dreams of a future trip to Washington, D.C.’s National Air and Space Museum, planning each journey with a detailed itinerary and a carefully saved travel fund.
  culinary: A budding chef with a flair for comfort food, Jeffrey Whelan often whips up creamy mac and cheese with sharp cheddar, sautéed pepperoni pizza slices, and classic Pittsburgh pierogies stuffed
    with potato and cheese, favoring ingredients like bacon, mozzarella, and fresh basil while occasionally indulging in sugary cereal for a quick snack.
  core: Jeffrey Whelan is a structured, 13‑year‑old tinkerer who balances LEGO engineering, soccer teamwork, and acoustic guitar jams, while meticulously budgeting their allowance and managing mild allergies,
    albeit sometimes over‑organizing to the point of procrastination.
background:
  cultural: Jeffrey was raised in a middle‑class, white family in Pittsburgh’s North Side, with roots tracing back to Irish and German ancestry. His family values community involvement, punctuality, and
    modest celebrations that reflect the city’s industrial heritage, such as attending local Steelers games and participating in neighborhood block parties. He regularly visits the Carnegie Library and
    the Heinz History Center, where he connects with the region’s past and its ongoing cultural renaissance. The multicultural mix of Pittsburgh’s neighborhoods, along with exposure to local traditions
    like the annual Three Rivers Regatta, informs his appreciation for diverse perspectives while grounding him in a strong sense of local identity.
