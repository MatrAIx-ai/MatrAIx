  career_goals: Jeffrey aspires to pursue a career that blends his love for structure, practical problem solving, and community benefit. He is interested in civil engineering or environmental science, hoping
    to contribute to Pittsburgh’s ongoing revitalization and sustainability efforts. His short‑term goal is to attend a STEM‑focused high school, excel in math and science courses, and earn a scholarship
    for a reputable engineering program. Long‑term, he envisions working on infrastructure projects that improve the quality of life for his hometown, while also considering a mentor role to guide younger
    students in technical subjects.
