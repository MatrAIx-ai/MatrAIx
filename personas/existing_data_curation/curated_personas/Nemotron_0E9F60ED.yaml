  career_goals: Rebecca aims to earn her master electrician license within the next two years and secure the qualifications needed to operate her own electrical contracting business in Central Texas. She
    is particularly interested in positioning herself as a specialist in solar and smart‑home installations, capitalizing on the region’s growing demand for sustainable energy solutions. Beyond certification,
    she plans to develop a formal apprenticeship program to encourage more women to enter the trade, leveraging her competitive drive to become a recognized leader in the local electrician community. Financial
    independence, a stable client base, and the ability to balance work with her personal life after her divorce are central to her long‑term ambition.
