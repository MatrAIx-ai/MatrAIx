personas:
  professional: Temperance Holloway, a 38‑year‑old part‑time freelance graphic designer and illustrator, blends meticulous project scheduling with inventive watercolor and digital palettes, and they channel
    their curiosity and organized mindset into community‑focused art‑therapy initiatives and grant proposals.
  sports: Temperance Holloway, a fan of the Dallas Mavericks and Dallas Stars, participates in a weekend community walking group, attends gentle yoga classes at the local studio, maintains a modest home
    workout routine, and they prefer low‑key physical activity over high‑intensity sports.
  arts: Temperance Holloway, an avid watercolor painter and digital illustrator, draws inspiration from Miles Davis, Erykah Badu, and the vibrant palettes of Claude Monet, regularly contributes artwork
    to the neighborhood newsletter, and they enjoy spinning vinyl at home while attending intimate jazz sessions.
  travel: Temperance Holloway, who enjoys curated cultural trips, spends weekends exploring the Texas Hill Country’s vineyards, has visited New Orleans for its jazz heritage and Oaxaca for its bustling
    markets, and they dream of a quiet retreat in Kyoto’s Zen gardens, though budget constraints keep international travel occasional.
  culinary: Temperance Holloway, who revives classic comfort‑food recipes with health‑conscious twists, frequently cooks quinoa‑based jambalaya, baked collard greens seasoned with smoked paprika, and herb‑infused
    roasted sweet potatoes using garden‑grown rosemary and thyme.
  core: Temperance Holloway, a detail‑oriented planner with a love for color, juggles a disciplined budgeting habit and a hidden stash of half‑used watercolor tubes, yet they often over‑schedule themselves
    driven by underlying anxiety.
background:
  cultural: Temperance grew up in a close‑knit African American family in the Dallas metropolitan area, where church gatherings, soulful music, and storytelling were central to family life. Celebrations
    of Juneteenth, Kwanzaa, and seasonal holidays reinforced a deep appreciation for Black cultural heritage. Her mother taught her traditional Southern cooking, while her father encouraged curiosity about
    history and the arts, leading her to visit local museums and cultural festivals. Moving to The Colony after marriage, Temperance maintains strong ties to her roots by volunteering at the African American
    museum and participating in community dialogues about mental health and cultural expression. These experiences shape her worldview, informing both her artistic sensibilities and her commitment to fostering
    inclusive, culturally resonant community spaces.
attributes:
  skills: '[''Household budgeting'', ''Event planning'', ''Watercolor painting'', ''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Research and writing'', ''Volunteer coordination'',
