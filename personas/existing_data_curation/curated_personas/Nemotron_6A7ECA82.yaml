  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading contemporary fiction and African American literature'', ''Participating in a small book club'', ''Gardening (vegetable and herb
    garden)'', ''Cooking soul‑food with a health‑conscious twist'', ''Guided meditation and gentle yoga'', ''Attending intimate jazz and neo‑soul concerts'', ''DIY home‑decor crafting'']'
  career_goals: Temperance aims to translate her creative and organizational strengths into a part‑time freelance graphic design and illustration practice that emphasizes cultural heritage and mental‑wellness
    themes. She also envisions launching a series of community art workshops in The Colony, eventually establishing a non‑profit program that offers free art‑therapy sessions for families and youth. To
    support these ambitions, she plans to complete a certificate in art therapy and enroll in part‑time counseling courses, while building a portfolio and an online platform to showcase her work and attract
    collaborative projects.
