  hobbies: '[''Hiking (Sierra foothills)'', ''Woodworking (furniture building)'', ''Listening to classic rock vinyl'', ''Recreational softball'', ''Journaling'', ''Mindfulness app usage'', ''Gardening (tomatoes
    & herbs)'', ''Reading self‑help / stress management books'']'
  career_goals: Johnny aims to advance into a supervisory role within the warehouse, such as shift lead or inventory control manager, within the next five years. He plans to earn a Certified in Production
    and Inventory Management (CPIM) credential to deepen his supply‑chain knowledge and demonstrate professional growth. Ultimately, he seeks a stable, well‑structured position that offers clear expectations
    and a defined career ladder, helping him provide for his family while reducing the unpredictability that fuels his anxiety. Alongside his competitive drive, he hopes to develop leadership skills that
    balance performance focus with supportive team building.
