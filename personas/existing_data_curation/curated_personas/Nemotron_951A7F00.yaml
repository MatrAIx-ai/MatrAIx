  career_goals: As he grows, Sebastian envisions a future where he merges his love for visual arts, music, and community storytelling into a career that both expresses his creativity and connects people.
    He aspires to become a multimedia artist or educator who designs interactive art installations and leads workshops in Shelbyville, fostering cultural appreciation among youth. His sociable nature drives
    an ambition to host community events or a local radio show that celebrates Southern heritage, art, and innovative ideas, positioning him as a catalyst for unconventional thought in his hometown.
