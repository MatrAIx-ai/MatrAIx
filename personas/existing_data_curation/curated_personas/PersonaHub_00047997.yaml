persona_description: A NASA and NOAA weather satellite operator who specializes in the use of Suomi, a satellite that can capture detailed images of Earth at night, including the entire human civilization
  spread across the planet, residing in either the glow of civilization's lights or the less populated darkness. The operator has vast experience in gathering information for the Black Marble project, which
  involves capturing the entirety of Earth's civilization at night, and has a unique ability to detect and distinguish between various kinds of light using the satellite's Visible Infrared Imaging Radiometer
  Suite, or VIIRS.
