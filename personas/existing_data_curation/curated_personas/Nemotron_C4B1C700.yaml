  career_goals: Although retired, Ethel aims to continue contributing by mentoring emerging entrepreneurs, serving on the board of the Westerville Community Arts Center, expanding intergenerational mentorship
    programs at the local senior center, and establishing a modest scholarship for high‑school seniors interested in business studies. She also hopes to document her family’s genealogy and share it through
    local historical societies.
