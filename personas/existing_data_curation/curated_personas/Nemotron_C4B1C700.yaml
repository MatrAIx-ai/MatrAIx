personas:
  professional: Ethel Robinson, a 77‑year‑old retired business strategist, leverages her decades‑long expertise in financial analysis and meticulous budgeting to mentor emerging entrepreneurs, spearhead
    fundraising for the Westerville Community Arts Center, and orchestrate intergenerational mentorship programs at the local senior center with her organized, compassionate approach.
  sports: Ethel Robinson, a 77‑year‑old senior fitness enthusiast, participates in a weekly gentle hike at Hocking Hills, follows the Columbus Blue Jackets hockey season religiously, and enjoys cheering
    on the Ohio State Buckeyes football team from the comfort of her living room, preferring low‑impact cardio to high‑intensity sports.
  arts: Ethel Robinson, an avid patron of the regional arts scene, spends her Saturdays exploring the Columbus Museum of Art, attending community theater productions at the Westerville Players, and sharpening
    her strategic mind at bridge club nights, often drawing inspiration from the works of Georgia O'Keeffe and the performances of local playwrights.
  travel: Ethel Robinson, who plans her trips with the same precision she applies to budgeting, favors cultural heritage tours to historic sites like Williamsburg, Virginia, and leisurely weekend getaways
    to the Hocking Hills State Park, always booking senior discounts and keeping a detailed travel journal to document her genealogical discoveries along the way.
  culinary: Ethel Robinson, a modest home‑cook who cultivates native Ohio perennials for fresh garnish, delights in preparing classic comfort dishes such as chicken pot pie, beet‑and‑goat‑cheese salad,
    and homemade apple crisp, yet often adds a pinch too much salt, a quirk she excuses as 'extra flavor for the soul'.
  core: Ethel Robinson blends her sharp business acumen with a warm, community‑focused spirit, orchestrating art‑centric mentorships, disciplined finances, and a garden‑filled life, all while never missing
    a bridge game or a chance to add one more pinch of salt to her recipes.
background:
  cultural: Ethel was raised in a middle‑class, Protestant family in suburban Ohio, embodying Midwestern values of hard work, modesty, and community service. Her upbringing emphasized education, civic involvement,
    and an appreciation for American art and history. These cultural roots, combined with her lifelong curiosity and compassionate nature, shape her active engagement with local cultural institutions and
    intergenerational community initiatives.
