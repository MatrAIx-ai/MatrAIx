  career_goals: Seeking to transition from marketing manager to a senior leadership role, Damaris aims to become a Director of Marketing within the next three to five years, with a focus on inclusive brand
    storytelling that authentically reflects Hispanic and Latino experiences. She is driven to mentor emerging marketers—particularly women of color—and to spearhead integrated campaigns that blend data‑driven
    insights with cultural nuance. Long‑term, she envisions leveraging her expertise as a consultant for nonprofit organizations that promote mental‑health awareness within Latino communities, while maintaining
    a balanced workflow that supports her well‑being.
