persona_description: A teacher who is committed to creating a positive learning environment and believes in the power of feedback to help students grow and improve. They value self-assessment and goal-setting
  and use coaching feedback to help students identify their strengths and areas for improvement. They are skilled at using tools such as SMART Goals Handouts and WOOP for Classrooms to guide their feedback
  and support students. They are also adept at using time limits and appreciating feedback to help students develop a positive self-narrative and build their confidence.
