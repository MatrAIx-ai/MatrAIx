personas:
  professional: Cornell Stephens, a 61‑year‑old industrial sales veteran, blends 35 years of wholesale metal expertise with a data‑driven, curiosity‑fuelled eye on emerging technologies, turning complex
    specifications into clear business value while mentoring junior staff, navigating a relaxed, sometimes disorganized workflow, and pursuing a senior leadership role to build inclusive, high‑performing
    teams.
  sports: Cornell Stephens is an avid Pittsburgh Steelers fan who attends home games at Acrisure Stadium when possible, follows the Pittsburgh Penguins for hockey, and complements his fandom with regular
    hikes along the Three Rivers Heritage Trail and occasional pick‑up basketball at the community center, embodying a flexible, community‑oriented sports spirit.
  arts: Cornell Stephens’ artistic palate is tuned to classic soul, funk, and jazz, regularly spinning Marvin Gaye, James Brown, Earth, Wind & Fire, Miles Davis, and John Coltrane while working in his workshop,
    and they often attend live performances at Pittsburgh’s Sienna Jazz Club, letting music shape their relaxed yet reflective creative rhythm.
  travel: Cornell Stephens prefers low‑key road trips that blend nature and heritage, such as weekend drives to Shenandoah National Park for hiking, a yearly pilgrimage to New Orleans for its jazz and gumbo,
    and occasional family reunions in the Carolinas, planning trips on a flexible schedule that accommodates their semi‑retirement budget and spontaneous garden‑supply stops.
  culinary: Cornell Stephens, a devoted soul‑food home chef, delights in cooking fried chicken, collard greens simmered with smoked turkey, buttery cornbread, and sweet potato pie, often infusing fresh
    basil, thyme, and heirloom tomatoes from their garden, while experimenting with spice blends that echo classic Southern comfort flavors.
  core: Cornell Stephens balances a lifelong curiosity for new ideas with a pragmatic, hands‑on approach, navigating a relaxed, sometimes disorganized routine, while nurturing community ties through mentorship,
    music, and woodwork, all underpinned by a gentle worry‑driven drive to leave a collaborative, inclusive legacy.
background:
  cultural: Cornell grew up in the Pittsburgh area, raised by parents who worked in the steel industry. Immersed in the city’s African‑American church community, he has long‑standing ties to a Baptist congregation
    where he values fellowship, storytelling, and mutual support. His heritage shapes a deep appreciation for resilience, community service, and cultural traditions such as celebrating Juneteenth and attending
    the annual Pittsburgh African‑American Festival. Navigating a predominantly white manufacturing sector, he has cultivated an awareness of inclusivity and often mentors other Black professionals. Family
    gatherings are frequent, featuring shared recipes, oral histories of civil‑rights milestones in Allegheny County, and a strong sense of kinship that continues to influence his personal and professional
    outlook.
attributes:
  skills: '["Customer Relationship Management (CRM)", "Negotiation and Contract Closing", "Industrial Product Knowledge", "Technical Translation for Non‑Technical Audiences", "Supply Chain Coordination",
    "Data Analysis and Forecasting", "Public Speaking and Presentations", "Mentoring and Training", "Problem Solving Under Pressure", "Adaptability to New Technologies"]'
  hobbies: '["Woodworking", "Cooking (Soul Food & Southern Comfort)", "Listening to Classic Soul, Funk, and Jazz", "Attending Pittsburgh Steelers games", "Volunteering at local youth mentorship program",
    "Gardening (herbs and tomatoes)", "Hiking the Three Rivers Heritage Trail", "Reading African American history biographies", "Traveling for family reunions", "Playing chess at the community center"]'
  career_goals: Cornell aims to transition into a senior sales leadership role, such as regional sales manager or director, within the next few years. In that capacity he wants to build a high‑performing
    team, streamline the sales process with data‑driven tools, and champion a more inclusive culture for Black professionals in manufacturing. He plans to earn a supply‑chain management certification to
    broaden his strategic perspective and eventually serve as a consultant for small‑to‑mid‑size manufacturers as he phases toward semi‑retirement. Mentoring emerging talent and leaving a legacy of collaborative,
    ethical sales practices are central to his long‑term ambition.
