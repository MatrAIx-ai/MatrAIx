personas:
  professional: Carlos Autry, a 56‑year‑old securities and commodities sales veteran, leverages their charismatic, talkative nature and meticulous risk‑assessment skills to build deep client trust while
    orchestrating complex equity, fixed‑income, and derivatives solutions, and they stay flexible enough to pivot strategies in volatile markets.
  sports: Carlos Autry, an avid golfer, regularly plays at the historic Bellerive Country Club to network with clients, cheers on the St. Louis Cardinals in baseball season and the St. Louis Blues during
    winter, and they keep fit with morning walks in Forest Park and occasional pick‑up basketball games at a local community center.
  arts: Carlos Autry, a dedicated patron of the St. Louis Art Museum, spends weekends absorbing works by Monet and local expressionist painters, collects vintage watches as wearable art, and they immerse
    themselves in live jazz sessions featuring Miles Davis recordings and contemporary blues at BB King’s Blues Club.
  travel: Carlos Autry, who balances business trips with cultural pilgrimages, favors meticulously planned road trips to historic sites such as Philadelphia’s Independence Hall and New Orleans’ French Quarter,
    while dreaming of a fall itinerary through Savannah’s squares and a European tour of Vienna’s art museums, all while managing family commitments and budgeting for occasional luxury stays.
  culinary: Carlos Autry, a competent home grill master, delights in slow‑smoked St. Louis‑style ribs, pork steaks, and burnt‑ends seasoned with a secret rub of paprika, brown sugar, and mustard, often
    pairing the feast with locally brewed craft beer and occasionally experimenting with a traditional sauerkraut side dish during family gatherings.
  core: Carlos Autry blends a Midwestern work ethic with a love for jazz, vintage watches, and high‑stakes finance, often juggling a demanding client roster while secretly binge‑listening to blues playlists
    and occasionally neglecting sleep to close a deal.
background:
  cultural: Carlos is a white Midwesterner with German‑Irish ancestry who grew up in the industrial corridor of East Saint Louis, Illinois. His upbringing was shaped by a close‑knit working‑class community,
    a Catholic family tradition, and the vibrant blues, jazz, and culinary heritage of the greater St. Louis region. These influences fostered a strong work ethic, a deep appreciation for the arts, and
    a community‑oriented mindset that guides his personal and professional life.
attributes:
  skills: '[''Equity and Fixed Income Product Knowledge'', ''Series 7 and Series 66 Licensed Sales'', ''Client Relationship Management'', ''Portfolio Analysis'', ''Risk Assessment'', ''Regulatory Compliance'',
