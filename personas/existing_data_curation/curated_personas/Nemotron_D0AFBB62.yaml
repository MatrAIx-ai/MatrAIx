personas:
  professional: Mayra Purnell is a curriculum development specialist at the University of Ponce, blending rigorous instructional design with culturally responsive pedagogy; while their methodical approach
    yields detailed assessment frameworks, a spontaneous streak often leads to last‑minute revisions, and their reserved yet collaborative demeanor fosters strong mentorship relationships in small faculty
    circles.
  sports: Mayra Purnell enjoys weekend hikes up the hills surrounding Ponce, is a member of the local hiking club "Cima Verde", follows the Leones de Ponce baseball team, and regularly practices salsa dancing
    at a small community studio, viewing the dance as both cultural expression and cardio workout.
  arts: Mayra Purnell engages deeply with contemporary literature, regularly discussing novels by Sally Rooney and Jesmyn Ward in a book club, captures island landscapes through photography inspired by
    Ansel Adams, and attends intimate live performances by salsa vocalist Gilberto Santa Rosa, integrating these artistic experiences into their teaching philosophy.
  travel: Mayra Purnell prefers thoughtfully planned trips that blend cultural immersion with relaxation, having explored historic Old San Juan, the waterfalls of El Yunque, and a weekend culinary tour
    of Oaxaca, while dreaming of a solo backpacking adventure through the Scottish Highlands and a weekend getaway to Cartagena for its coastal vibe.
  culinary: Mayra Purnell frequently cooks traditional island dishes such as mofongo with chicharrón and arroz con gandules, expertly seasoning with sofrito, cilantro, and recaito harvested from their balcony
    garden, while also experimenting with fusion touches like adding mango salsa to grilled fish.
  core: Mayra Purnell is a detail‑oriented curriculum expert who balances structured planning with spontaneous creativity, saves methodically yet indulges in gardening and salsa, manages mild health issues
    with diligence, and draws inspiration from literature, photography, and island travel.
background:
  cultural: Mayra grew up in Ponce, a city renowned for its Afro‑Caribbean heritage, vibrant arts, and historic architecture. Raised in a close‑knit Puerto Rican family, she celebrated fiestas, música bomba
    and plena, and the seasonal traditions of Semana Santa. Fluent in Spanish and comfortable with English, she values the concepts of familismo and community solidarity. These cultural roots shape her
    commitment to bilingual education, preservation of local traditions, and fostering a supportive environment for students from diverse socioeconomic backgrounds.
attributes:
  skills: '[''Curriculum development'', ''Instructional technology integration'', ''Bilingual instruction'', ''Student assessment design'', ''Educational research methodology'', ''Academic advising and
