  hobbies: '[''Reading'', ''Gardening'', ''Cooking traditional Puerto Rican cuisine'', ''Hiking'', ''Photography'', ''Salsa dancing'', ''Volunteer tutoring'', ''Book club participation'']'
  career_goals: Mayra aims to complete a doctorate in education within the next three years, publish research on bilingual pedagogy, and secure a tenure‑track senior lecturer position at the University
    of Puerto Rico, Ponce campus. She aspires to lead a comprehensive curriculum redesign for teacher‑preparation programs, forge partnerships with local schools for community‑based learning projects, and
    eventually become department chair, championing inclusive and culturally responsive education policies.
