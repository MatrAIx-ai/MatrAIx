personas:
  professional: Courtney Jackson, a high‑school student and aspiring event coordinator, blends a love of structure, tactical gaming, and hands‑on robotics problem solving to lead the school’s robotics competitions
    and orchestrate club fundraisers, applying meticulous project management, reliable execution, and a competitive edge.
  sports: Courtney Jackson stays active by jogging and swimming at Tybee Island, belongs to the local Tybee Island Running Club, occasionally swims with the Savannah Aquatics Team, and cheers for the Savannah
    Bananas baseball club while also following the Georgia Bulldogs football team, combining seasonal beach workouts with loyal fandom.
  arts: Courtney Jackson captures Savannah’s moss‑draped oaks and antebellum architecture through a DSLR, draws inspiration from Ansel Adams and contemporary street photographer Alex Webb, crafts handmade
    candles scented with lavender and vanilla, and reads Southern historical novels by Kate Chopin and William Faulkner, letting visual and literary arts shape their creative expression.
  travel: Courtney Jackson prefers meticulously planned weekend excursions to nearby historic sites like Charleston and New Orleans, yet also delights in spontaneous strolls through Savannah’s historic
    district, balancing a love of structured itineraries with a craving for unplanned beach discoveries at Tybee Island, all while budgeting for student discounts and family travel constraints.
  culinary: Courtney Jackson enjoys cooking classic Southern comfort dishes such as buttermilk fried chicken, shrimp and grits, and peach cobbler, often incorporating fresh tomatoes, basil, and peppers
    from their backyard garden, and their skill level ranges from confident stovetop sautéing to experimenting with homemade candle‑infused desserts.
  core: Courtney Jackson is a detail‑driven teen who balances a competitive edge in gaming and robotics with a love for historic photography, organized event planning, and Southern cooking, all while navigating
    the occasional impulse spend and occasional neglect of self‑care.
background:
  cultural: Courtney comes from a white, middle‑class Southern family rooted in Savannah, Georgia. Her upbringing reflects traditional Southern values of hospitality, community involvement, and an appreciation
    for the region’s rich history. Family celebrations—Thanksgiving, Christmas, and Fourth of July gatherings—feature Southern staples like fried chicken, collard greens, sweet tea, and homemade pies. Regular
    attendance at a local Baptist church reinforces a sense of service and communal support. Growing up near the historic district and Tybee Island has instilled a love for historic architecture, coastal
    activities, and local folklore. While she is aware of Savannah’s diverse cultural fabric, her personal identity aligns closely with her family’s English and German ancestry, common among white families
    in the area, and she cherishes the continuity of Southern traditions passed down through generations.
