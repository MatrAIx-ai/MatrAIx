  career_goals: Courtney aims to obtain her GED within the next two years and then enroll in a community college program that offers hospitality management or culinary arts, fields that blend her practical
    skill set with the vibrant tourism industry of Savannah. She is interested in vocational training for event coordination, hoping to eventually work as an event manager for historic festivals and museum
    tours in the city. In the long term, she envisions launching a boutique catering business that showcases Southern comfort food, allowing her to merge her cooking abilities with entrepreneurial ambition.
    Throughout her career path, she seeks roles that provide clear structure, measurable outcomes, and opportunities for competition and advancement.
