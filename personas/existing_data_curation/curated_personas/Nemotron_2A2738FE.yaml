personas:
  professional: An aspiring mini architect, Jahaira Rosas spends hours arranging building blocks into precise structures, displaying early spatial reasoning and a love for tidy organization balanced with
    spontaneous creativity, a reflection of the curious and balanced personality they show.
  sports: A lively little athlete, Jahaira Rosas dashes around the neighborhood park with a soft soccer ball, proudly sporting a miniature Phoenix Rising FC jersey, attends a toddler soccer class called
    'Little Kickers' on Saturdays, and during hot summer afternoons delights in splash-pad play while occasionally watching the Phoenix Suns game on the family TV, balancing bursts of energetic activity
    with needed nap breaks they cherish.
  arts: An expressive mini artist, Jahaira Rosas loves finger-painting bright marigolds and sugar-skull motifs after watching videos of Frida Kahlo and listening to lively mariachi tunes by Mariachi Vargas
    de Tecalitlán, and they often duet along to 'La Bamba' with the family's favorite children's singer, creating a colorful, music-filled routine that fuels their curiosity and imagination.
  travel: A curious little explorer, Jahaira Rosas has already traveled with family to the bustling markets of their relatives' hometown in Jalisco and to the majestic Grand Canyon, and they daydream about
    a future trip to Disneyland's magical kingdom, preferring short car rides with plenty of stops for snacks and naps that accommodate their toddler stamina.
  culinary: A budding foodie, Jahaira Rosas delights in warm tamales smothered in salsa verde and sweet corn elote topped with a drizzle of lime, yet they can be a picky eater, turning their nose up at
    broccoli while demanding extra queso on their quesadillas, reflecting a blend of cherished family flavors and typical toddler preferences.
  core: Jahaira Rosas is a curious, organized yet spontaneous two-year-old who balances tidy play with imaginative mess, worries about new experiences, and embraces family traditions through art, sport,
    and food while they occasionally battle picky-eater tantrums.
background:
  cultural: Jahaira was born into a Mexican‑American family in Phoenix, where Spanish is spoken alongside English at home. Her parents are originally from Jalisco and maintain cultural traditions such as
    celebrating Día de los Muertos, preparing tamales during holidays, and playing traditional music. The family participates in local community events in Maricopa County's vibrant Latino neighborhoods,
    and Jahaira frequently attends a culturally responsive early‑learning center with many Spanish‑speaking peers. These experiences shape her identity, infusing her daily life with Mexican customs, cuisine,
    and bilingual communication.
attributes:
  skills: '[''basic motor coordination'', ''early language development (≈200 words)'', ''color and shape identification'', ''simple toy organization'', ''assertive communication'', ''empathy and peer comfort'',
    ''problem‑solving with simple puzzles'']'
  hobbies: '[''crayon drawing and coloring'', ''listening to Mexican folk music'', ''building wooden block towers'', ''exploring the backyard garden'', ''interactive storytime at the library'', ''watching
    educational cartoons'', ''helping with simple family cooking rituals'']'
  career_goals: While Jahaira is only two, her parents nurture her strong curiosity and love of art by encouraging creative exploration, hoping she will one day pursue a path where she can express herself—such
    as a visual artist, illustrator, or early‑childhood educator. They support her desire to learn new ideas and value her growing ability to balance structure with flexibility, envisioning a future in
    which she can turn her passion for colors, stories, and community into a fulfilling career.
