  hobbies: '[''Basketball'', ''Cycling'', ''DIY home improvement'', ''Cooking experimental dishes'', ''Trivia nights'', ''Board-game meetups'', ''STEM mentoring'', ''Weekend hikes'']'
  career_goals: Daniel aims to transition from a senior technologist role to a supervisory position overseeing a multidisciplinary engineering team within the next five years. He plans to complete a part‑time
    bachelor's degree in engineering technology to qualify for a licensed engineering technician credential. Long‑term, he envisions launching his own consultancy that helps small‑to‑medium construction
    firms implement lean processes and improve equipment reliability. He is also motivated to mentor new technicians, fostering a culture of curiosity balanced with proven best practices.
