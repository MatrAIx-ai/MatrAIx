personas:
  professional: Sherry Stout, an aspiring game developer, leverages Scratch to prototype fantasy‑themed interactive stories, applying a practical mindset to structure code while delighting in spontaneous
    creative twists, and they often collaborate with friends on school projects.
  sports: Sherry Stout, a forward on the community park’s co‑ed soccer team, cheers for the Baltimore Ravens while also idolizing English Premier League side Manchester United, and they blend structured
    practice drills with spontaneous pick‑up games that reflect their mix of predictability and flexibility.
  arts: Sherry Stout, a comic‑strip enthusiast, draws inspiration from fantasy author J.K. Rowling and artist Alex Ross, spends weekends sketching original heroes, and they hone piano skills on Debussy’s
    ‘Clair de Lune,’ balancing methodical practice with bursts of improvisational play.
  travel: Sherry Stout, an avid weekend explorer, frequently hikes the Patapsco Valley State Park trails, dreams of visiting the Smithsonian museums in Washington, DC, and they plan a future family trip
    to Disney World, preferring carefully mapped routes but also spontaneous detours to hidden waterfalls.
  culinary: Sherry Stout, a budding home cook, loves making pizza topped with pepperoni, fresh basil, and mozzarella, enjoys whipping up strawberry‑banana smoothies, and they often experiment by adding
    a pinch of cinnamon to mac & cheese, yet they occasionally forget to clean the kitchen after cooking.
  core: Sherry Stout blends a love for structured fantasy storytelling with spontaneous soccer play, balancing practical planning and creative bursts while they navigate the quirks of a curious eleven‑year‑old.
background:
  cultural: Sherry grows up in a predominantly white, middle‑class suburb of Baltimore County, Maryland. Her family observes traditional American holidays such as Thanksgiving and Christmas and occasionally
    celebrates her European ancestry with events like St. Patrick’s Day. She attends a public middle school where she interacts with a diverse student body, giving her exposure to various cultural traditions.
    The local community’s pride in Baltimore’s sports teams, proximity to the Chesapeake Bay, and regional arts programs shape her experiences, while her parents’ involvement in community volunteer work
    reinforces a sense of civic responsibility.
