personas:
  professional: Jimmy Miller is a high‑school multitasker who channels a love for cartoon sketching, guitar playing, and set design into a fledgling role as the drama club’s creative coordinator, producing
    short social‑media videos, crafting eye‑catching posters with Canva and Photoshop, and orchestrating community‑service events—an early prototype of a future creative director.
  sports: Jimmy Miller plays pickup basketball at the local community center, cheers on the Murfreesboro High Cougars football team, follows the Tennessee Volunteers in college football, and watches the
    Nashville Predators hockey games, all while idolizing LeBron James for his work ethic and occasionally skipping practice to finish art projects.
  arts: Jimmy Miller immerses themselves in a blend of country classics from Dolly Parton, indie pop by Billie Eilish, and the street‑art flair of Banksy, draws cartoons inspired by Saturday morning comics,
    creates digital illustrations with Photoshop, and strums guitar covers of The 1975 at the Murfreesboro Art Museum’s youth workshops, all while volunteering at local galleries.
  travel: Jimmy Miller enjoys weekend road trips to Nashville’s bustling music scene, annual family hikes in the Great Smoky Mountains, a school‑organized field trip to Washington, D.C., and dreams of backpacking
    through New York City’s Broadway district and Los Angeles’ film studios once college finances allow.
  culinary: Jimmy Miller loves the comfort of crispy fried chicken, buttery biscuits, and slow‑cooked collard greens prepared by a family member, experiments with sushi rolls after watching online tutorials,
    and frequently snacks on pepperoni pizza and jalapeño poppers during late‑night coding sessions.
  core: Jimmy Miller is a curiosity‑driven teen who juggles cartoon sketches, guitar riffs, and community projects, often staying up late to edit videos at the expense of sleep, yet uses their sociable
    charm to rally peers for cause‑driven events.
background:
  cultural: Jimmy was raised in Murfreesboro, a mid‑size city in Middle Tennessee, within a predominantly white, middle‑class Southern community. His family embodies traditional Southern values such as
    hospitality, respect for neighbors, and a strong sense of community, while also encouraging curiosity and openness to new ideas. He grew up attending local church events, community festivals, and high
    school activities that celebrate regional heritage, such as country music concerts and football games. At the same time, exposure to national media, internet culture, and contemporary arts has broadened
    his perspective, resulting in a cultural blend of classic Southern upbringing and modern, globally‑influenced interests.
