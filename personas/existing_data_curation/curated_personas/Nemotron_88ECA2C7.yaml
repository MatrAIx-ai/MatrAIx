  career_goals: Jimmy aims to attend a university where he can major in Communications, Visual Arts, or Multimedia Production. He aspires to become a creative director, multimedia journalist, or community
    outreach coordinator, blending his artistic talents with his people‑focused mindset to produce compelling content that highlights diverse narratives. In the long term, he envisions leading a nonprofit
    organization that promotes arts education and youth empowerment in his hometown of Murfreesboro, leveraging his organizational strengths and sociable nature to build supportive networks.
