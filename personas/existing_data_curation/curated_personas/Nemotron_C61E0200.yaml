  hobbies: '[''Visiting art galleries'', ''Community theater'', ''Mixed-media art workshops'', ''Reading historical nonfiction'', ''Reading contemporary poetry'', ''Nature walks and sketching'', ''Gardening
    (heirloom tomatoes, native wildflowers, herbs)'', ''Cooking (Southern cuisine with global twists)'', ''Book club'', ''Church choir'', ''Volunteer at senior center (crafting, storytelling)'']'
  career_goals: Although retired from formal employment, Chelsie aims to deepen her involvement in community service. She plans to lead a senior mentorship program that pairs older adults with youth interested
    in arts and storytelling, fostering intergenerational learning. She also hopes to curate a traveling exhibition of local folk art and historical photographs, collaborating with the Morrow library and
    the Clayton County Historical Society. Additionally, she wants to write and self‑publish a memoir that weaves her personal stories with reflections on the cultural changes she has witnessed in the Atlanta
    metro area. These ambitions reflect her desire to contribute meaningfully, share her curiosity for art and ideas, and nurture harmony in her community.
