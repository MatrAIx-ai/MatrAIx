personas:
  professional: Francelys Moya is a hands‑on diesel‑engine specialist for a municipal fleet, renowned for diagnosing complex faults with advanced scan tools and fabricating custom parts while calmly minimizing
    downtime, and they balance their structured work ethic with a competitive drive toward ASE Master Technician certification and future hybrid‑electric retrofits.
  sports: Francelys Moya fuels their competitive spirit by playing midfield for the Desert Falcons co‑ed soccer league, cheering on the Arizona Cardinals on Sundays, and hitting the Arizona desert dunes
    in a custom‑built off‑road rig with a tight‑knit group of friends each weekend.
  arts: Francelys Moya winds down after a busy week by belting out karaoke hits alongside friends, soaking in classic rock from Fleetwood Mac and Santana on the kitchen stove while preparing dishes, and
    attending monthly community art fairs to support local muralists and street musicians.
  travel: Francelys Moya favors weekend‑long road trips that combine off‑road desert escapades with scenic cultural stops, from conquering the sand dunes near Phoenix to exploring Sedona’s red‑rock trails,
    a yearly pilgrimage to the iconic Grand Canyon, and an ambitious future adventure to the Volkswagen Heritage Museum in Germany.
  culinary: Francelys Moya showcases a skilled yet experimental kitchen style, perfecting carnitas tacos, in‑depth chilaquiles with smoky chipotle salsa and fresh cilantro, while pairing each batch with
    a classic rock playlist and occasionally swapping a traditional corn tortilla for a whole‑wheat version to keep health goals in check.
  core: Francelys Moya blends a calm, resilient temperament with a fierce competitive streak, juggling a toolbox‑full of hobbies, occasional disorganization, and a habit of scrolling through engine schematics
    during karaoke breaks.
background:
  cultural: Francelys grew up in a Mexican‑American household where Spanish was spoken at home and Mexican traditions were celebrated, from Día de los Muertos to quinceañera festivities. Her family’s strong
    work ethic and resourcefulness, hallmarks of Mexican culture, shaped her practical approach to problem‑solving. Living in Florence, AZ, she blends these roots with the Southwestern desert lifestyle,
    appreciating both the community spirit of small‑town Arizona and the vibrant cultural mosaic of the Hispanic community. This bicultural background fuels her bilingual communication skills, her love
    for Mexican cuisine, and her commitment to giving back to the local community.
attributes:
  skills: '["Diesel Engine Diagnostics", "Heavy Vehicle Maintenance", "Welding and Metal Fabrication", "Parts Inventory Management", "Bilingual Spanish-English Communication", "Safety Compliance", "Electrical
    System Troubleshooting", "Performance Tuning", "Customer Service"]'
  hobbies: '["Soccer (local league)", "Mexican cooking", "Karaoke nights", "Off‑road desert riding", "Community volunteer work (mechanics workshops)", "Listening to classic rock and salsa music", "Camping
    in the Sonoran Desert"]'
  career_goals: Francelys aims to earn ASE Master Technician certification within the next two years and eventually become the lead shop foreman for the municipal bus fleet. She is also interested in transitioning
    toward hybrid‑electric heavy‑vehicle technology, so she plans to take specialized training in electric drivetrain retrofits. In the longer term, she dreams of opening her own garage that combines high‑quality
    diesel work with sustainable upgrades, while mentoring other young mechanics, especially women and Spanish‑speaking trainees.
