  career_goals: Although retired from formal employment, Marta’s ambition is to deepen her impact on the Coachella community. She aspires to mentor younger volunteers in preserving Mexican culinary traditions,
    document family recipes in a small community cookbook, and continue leading structured wellness activities for seniors. She also plans to improve her digital skills, such as photo editing, to capture
    and share local cultural events, and to maintain her health through regular walking and yoga, ensuring she can remain an active, dependable presence for those around her.
