personas:
  professional: Mark Cordero is a field service engineer specializing in ATM and office equipment maintenance, combining meticulous hardware troubleshooting, bilingual customer communication, and a calm,
    collaborative approach that blends his curiosity for new tech with practical, solution‑focused problem solving.
  sports: Mark Cordero enjoys weekend hikes in the San Jacinto Mountains, plays pickup basketball with friends at the local community center, and passionately follows the LA Galaxy in MLS, balancing solitary
    endurance pursuits with team‑oriented camaraderie.
  arts: Mark Cordero expresses his artistic side through photography of community festivals, while his soundtrack features mariachi legends like Pedro Infante alongside indie acts such as Tame Impala, and
    they frequently attend local performances of folk dance groups.
  travel: Mark Cordero prefers carefully planned road trips that blend tech meetups with cultural immersion, having recently driven to San Diego’s Comic‑Con and family gatherings in Oaxaca, while dreaming
    of a future trek through Banff’s national parks paired with a weekend coding retreat.
  culinary: Mark Cordero cooks traditional dishes such as mole poblano, carnitas tacos, and tamales on weekends with their wife, often experimenting by adding unexpected ingredients like chipotle‑marinated
    tofu or kimchi to create vibrant fusion meals, while always keeping a well‑stocked pantry of dried chilies, corn masa, and fresh cilantro.
  core: Mark Cordero fuses a calm, community‑focused spirit with a hobbyist’s obsession for custom PC builds, balancing nightly gaming marathons with weekend family cooking, yet often forgets to sleep enough
    after late‑night soldering sessions.
background:
  cultural: Mark is a first‑generation Mexican‑American whose parents emigrated from Jalisco. Growing up in a tight‑knit Latino neighborhood in Perris, he was immersed in both Mexican traditions and Southern
    California culture. He is bilingual, speaking Spanish at home and English in school and work, and he celebrates holidays such as Día de los Muertos, Mexican Independence Day, and Christmas with family
    gatherings, festive foods, and music like mariachi and regional banda. The strong family orientation, respect for elders, and community solidarity common in Mexican culture shape his compassionate and
    cooperative personality, motivating him to give back through volunteer work and mentorship within his local community.
attributes:
