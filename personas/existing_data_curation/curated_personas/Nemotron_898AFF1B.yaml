  hobbies: '[''Custom PC building'', ''Arduino/Raspberry Pi projects'', ''Cooperative video gaming'', ''Cooking Mexican cuisine'', ''Hiking'', ''Photography'', ''Volunteer teaching computer basics to seniors'',
    ''Participating in community festivals'']'
  career_goals: Mark aims to become a senior field service engineer for a major financial institution, obtaining certifications such as CompTIA A+, Network+, and an ATM security specialist credential. He
    envisions leading a regional maintenance team, streamlining service workflows to reduce downtime and improve customer satisfaction. Long‑term, he hopes to launch his own tech support business focused
    on serving small banks and community organizations, while also creating a STEM outreach program that teaches basic computer and repair skills to at‑risk youth in the Riverside area. His ambition is
    driven by a desire to combine technical excellence with community impact.
