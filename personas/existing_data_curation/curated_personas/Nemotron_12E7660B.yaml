  career_goals: As she approaches retirement, Hannah aims to transition into a mentorship role where she can coach emerging school administrators and champion policies that promote staff well‑being and
    inclusive learning environments. She aspires to lead a district‑wide initiative that integrates arts‑based programming into early childhood curricula, leveraging local cultural institutions. Additionally,
    she hopes to author a practical guide on balancing structural efficiency with flexible, humane leadership in education settings, leaving a lasting legacy for her colleagues and the Jacksonville community.
