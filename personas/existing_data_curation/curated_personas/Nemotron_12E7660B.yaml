personas:
  professional: Hannah Mcferson, a veteran education administrator with over three decades of experience designing state‑aligned curricula and stewarding multi‑year budgets, blends their structured, data‑driven
    approach with a warm, collaborative style, now channeling their practical expertise into mentoring emerging leaders and championing district‑wide arts integration for early childhood programs.
  sports: Hannah Mcferson enjoys daily sunrise walks along Jacksonville's beachfront, is a faithful season ticket holder for the Jacksonville Jaguars, cheerfully supports the minor‑league Jacksonville Jumbo
    Shrimp, and participates in a senior‑friendly walking club that meets thrice weekly, blending low‑impact fitness with community camaraderie.
  arts: Hannah Mcferson immerses themselves in Southern literary classics—ranging from William Faulkner to contemporary voices like Jesmyn Ward—in a lively Jacksonville book club, while regularly attending
    performances at the historic Florida Theatre and drawing inspiration from musicians such as James Taylor and blues legend B.B. King for their envisioned arts‑based early childhood curricula.
  travel: Hannah Mcferson favors relaxed, culture‑rich getaways, having explored Charleston’s historic plantations, savored the Creole cuisine of New Orleans, and taken a guided literary tour of Dublin,
    while their future travel list includes a serene coastal retreat in the Outer Banks and a Mediterranean cruise that blends scenic vistas with leisurely reading sessions.
  culinary: Hannah Mcferson delights in preparing buttery shrimp and stone‑ground grits seasoned with smoked paprika, fresh Gulf shrimp, Andouille sausage, and a splash of lemon, often pairing the dish
    with collard greens and cornbread during family gatherings, and they occasionally experiment with low‑country gumbo and blackened catfish for weekend potlucks.
  core: Hannah Mcferson balances a love for structured, data‑driven leadership with a breezy, garden‑soaked lifestyle, swapping grant proposals for shrimp‑laden recipes and sunrise beach walks, all while
    nurturing a subtle habit of collecting vintage bookmark magnets that clutter their desk.
background:
  cultural: Raised in a middle‑class white family in the Jacksonville suburbs, Hannah embodies many Southern cultural values such as hospitality, respect for tradition, and a strong sense of community.
    Her upbringing included attendance at a local Catholic school, which fostered a collaborative spirit and an appreciation for service. While she cherishes Southern customs—like enjoying outdoor activities,
    local seafood, and regional festivals—she is also attuned to Jacksonville’s cultural diversity, actively engaging with neighbors from different backgrounds through her work and volunteer efforts.
