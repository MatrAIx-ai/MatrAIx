persona_description: A military historian who is interested in the history of the Second World War, particularly the New Zealand Expeditionary Force and the campaigns in the Middle East. They are interested
  in the strategies and tactics used by the New Zealand Army during the war and the role of the 2nd New Zealand Division in ensuring the unit was employed appropriately and administered as a New Zealand
  unit rather than a British one. They are also interested in the unique responsibilities and challenges faced by the 2nd New Zealand Division and the manner in which it was organized and staffed.
