  hobbies: '[''Watercolor painting'', ''Visiting galleries and museums'', ''Reading art history and genealogy'', ''Backyard gardening'', ''Woodworking and furniture restoration'', ''Fishing on the Gulf
    Coast'', ''Listening to blues and jazz'', ''Crossword puzzles'', ''Community theater'', ''Book club participation'']'
  career_goals: Alexander aims to translate his curiosity and appreciation for art into tangible community contributions. He plans to volunteer as a program coordinator for the Mobile Museum of Art and
    eventually serve on its advisory board. He aspires to author a concise history of Mobile’s port neighborhoods, combining his research expertise and writing skill. He hopes to mentor younger volunteers
    in project planning and craft techniques, fostering intergenerational learning. Additionally, he wishes to launch an annual "Art & History" weekend highlighting local artists and historical exhibits,
    encouraging cultural dialogue. On a personal front, he seeks to complete a series of watercolor paintings of the Mobile waterfront and enroll in an online modern art theory course to keep his mind engaged
    and manage stress.
