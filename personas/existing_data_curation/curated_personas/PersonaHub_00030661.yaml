  in improving the way economics is taught in the classroom, particularly in terms of the treatment of net exports within the GDP expenditures approach. The professor has experience with using the gross
  domestic product (GDP) expenditures approach to teach students about the components of GDP, but is looking for ways to improve the instruction and provide more detailed explanations of net exports.
