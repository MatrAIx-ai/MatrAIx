  hobbies: '[''Herb gardening'', ''Cooking fusion dishes with Indigenous ingredients'', ''Hiking (Turkey Mountain trails)'', ''Powwow dancing and beadwork'', ''Reading historical fiction and Indigenous
    biographies'', ''Live music outings'', ''Yoga practice'', ''Volunteering at Tulsa Indian Center'', ''Board game nights with friends'']'
  career_goals: Auxilia aims to advance to a floor manager role within the next two years, gaining broader oversight of service operations and staff scheduling. She plans to earn a hospitality management
    certification through a community college program in Tulsa. Long-term, she envisions opening her own coffee shop that serves as a cultural hub, featuring Indigenous art, traditional recipes, and a welcoming
    space for community gatherings. She also hopes to mentor other Indigenous hospitality workers and promote inclusive service standards.
