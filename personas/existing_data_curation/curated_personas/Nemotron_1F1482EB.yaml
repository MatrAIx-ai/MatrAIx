  hobbies: '[''Zumba classes'', ''Community volunteering (historical society events)'', ''Book club'', ''Hiking in Maryland'', ''Game nights with friends'', ''Wine tasting at local vineyards'', ''Journaling
    for stress relief'', ''Backyard gardening'']'
  career_goals: Jessica aims to transition from an executive administrative role to a senior operations or office‑manager position where she can influence strategic planning and efficiency initiatives.
    She seeks to lead a support team, mentor junior assistants, and develop expertise in project management and organizational development. Long‑term, she is considering launching a boutique consulting
    service that offers executive support and workflow optimization for small businesses in the Maryland region, balancing her competitive drive with a desire for greater autonomy and reduced day‑to‑day
    stress.
