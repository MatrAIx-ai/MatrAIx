persona_description: A researcher in the field of medicine, particularly in the study of the effects of smoking on the body and the mind. Dr. Glassman is interested in understanding the link between smoking
  and depression, and how smoking can be used as a form of self-medication for depressed individuals. He is studying whether anti-depressant drugs can help ex-smokers quit successfully, and is looking for
  ways to identify the underlying causes of smoking behavior in individuals with a history of depression.
