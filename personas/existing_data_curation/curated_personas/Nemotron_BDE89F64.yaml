  career_goals: Robert aims to move into a supervisory or quality‑assurance leadership role within the next two years, leveraging his extensive service background to shape team performance and service standards.
    He plans to complete his bachelor's degree in Business Management and obtain a Certified Customer Service Professional (CCSP) credential, positioning himself for a post‑retirement consulting career
    where he can advise hospitality businesses on customer experience strategies. Additionally, he seeks recognition as a top performer in his department, hoping to mentor younger agents and introduce data‑driven
    improvements that enhance both customer satisfaction and operational efficiency.
