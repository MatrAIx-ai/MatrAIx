persona_description: A street artist who uses his talents to create impactful and thought-provoking works of art that address social and environmental issues. Jetsonorama, Bruno Dias, and Candy Chang are
  all examples of artists who have used their skills to bring attention to important issues and inspire positive change in their communities. Their work often involves wheatpasting large-scale photo-collages,
  documenting everyday people, and creating spaces for dialogue and conversation. Their art serves as a reminder that even small acts of creativity and community can make a big difference in the world.
