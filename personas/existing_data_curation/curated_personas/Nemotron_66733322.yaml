personas:
  professional: Jessica Bennett is a diligent high‑school senior who leverages her systematic problem‑solving skills in science and math to lead her school’s chamber music group and coordinate data‑driven
    projects for the science fair, while aspiring to study biomedical engineering at a top university and eventually develop community‑focused medical technologies.
  sports: Jessica Bennett channels her love of the outdoors into weekly hikes through Patapsco Valley State Park as a member of her high school’s trail club, while cheering on the Baltimore Ravens in football
    season and the Baltimore Orioles during summer, maintaining a moderate fitness routine that blends cardio with occasional yoga stretches to offset long study sessions.
  arts: Jessica Bennett expresses her creative side by playing the violin in the school chamber group, drawing inspiration from virtuoso Hilary Hahn, capturing the Maryland landscape through photography
    influenced by Ansel Adams, and immersing herself in mystery novels by Agatha Christie and sci‑fi classics by Isaac Asimov, while she and friends unwind with strategic board games like Settlers of Catan.
  travel: Jessica Bennett’s travel style balances meticulous planning with a craving for spontaneous adventure, as evidenced by her family road trips to the historic streets of Washington, D.C., weekend
    camping in Shenandoah National Park, and a dreamed‑up summer exchange program to study marine biology in the Bahamas.
  culinary: Jessica Bennett enjoys experimenting in the kitchen, routinely whipping up spaghetti aglio‑olio with fresh basil and cherry tomatoes, perfecting fluffy banana pancakes on Sundays, and occasionally
    over‑salting her ramen while learning to balance flavors through YouTube tutorials.
  core: Jessica Bennett blends fierce curiosity with methodical organization, juggling varsity violin, data‑driven science projects, and weekend hikes, while occasionally procrastinating on homework in
    favor of late‑night board‑game marathons.
background:
  cultural: Jessica grew up in a white, middle‑class family in Glen Arm, Maryland. Her heritage traces back to Irish and German ancestors, and she identifies with American suburban culture that values education,
    community involvement, and self‑reliance. She celebrates typical U.S. holidays, participates in local community events, and attends a public high school that reflects a diverse but predominantly White
    student body. The region’s proximity to Baltimore’s cultural institutions and scientific community has shaped her interests in science and public service.
