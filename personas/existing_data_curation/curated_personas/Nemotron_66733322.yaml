  career_goals: Jessica aspires to attend a top‑tier university, preferably the University of Maryland or Johns Hopkins, where she can major in biomedical engineering or public health. She wants to combine
    her analytical strengths and compassionate nature to develop medical technologies or work on community health initiatives. In the long term, she hopes to lead research projects that improve health outcomes
    and mentor younger students in STEM fields.
