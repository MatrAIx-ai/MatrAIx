personas:
  professional: Jorge Santiago, a 57‑year‑old veteran farm worker turned community mentor, applies their hands‑on knowledge of tractors, garden stewardship, and meticulous budgeting to run the neighborhood
    community garden, mentor younger laborers in safe equipment use, and contribute reliable service on the church elder council, all while adhering to a strict daily routine.
  sports: Jorge Santiago, a 57‑year‑old enthusiast, spends Saturday mornings playing pick‑up soccer with the Hollister Hawks at the community park, cheering on the San Jose Earthquakes on TV, follows the
    San Francisco Giants during spring training, and meets longtime friends for spirited domino tournaments at the local senior center, balancing light cardio with social competition.
  arts: Jorge Santiago, at 57, fills his evenings with the lively strings of Mariachi Sol de la Sierra, recites passages from the Catechism of the Catholic Church, watches classic films by renowned directors
    such as Alfonso Cuarón, and actively participates in organizing cultural performances for Día de los Muertos, letting artistic expression reinforce their sense of identity and community.
  travel: Jorge Santiago, now 57, prefers modest road trips that blend family visits to relatives in Guadalajara and cultural pilgrimages to historic mission towns like San Juan Bautista, while also planning
    occasional day‑trips to Napa Valley vineyards for wine tasting, always arranging travel around church holidays and budgeting carefully to ensure the grandchildren’s school supplies remain funded.
  culinary: Jorge Santiago, a 57‑year‑old culinary enthusiast, skillfully prepares tamales de elote, sopa de tortilla, and chiles rellenos using fresh cilantro, epazote, and home‑grown tomatoes from his
    garden, enjoys sharing these meals at community festivals, yet sometimes over‑spices dishes in an effort to impress friends, revealing a playful yet disciplined approach to cooking.
  core: Jorge Santiago, a methodical 57‑year‑old community pillar, balances a steadfast love of routine and service with a lingering worry that fuels both meticulous planning and occasional over‑cautiousness.
background:
  cultural: Jorge’s roots lie in a Mexican family originally from Jalisco, who settled in the Central Valley after migrating decades ago. Spanish is spoken at home, and Catholic traditions shape family
    life, with regular observances of Holy Week, Día de los Muertos, and Christmas posadas. He maintains strong ties to the local Mexican‑American community in Hollister, participating in cultural events,
    supporting fellow immigrants, and passing down customs such as making tamales, celebrating quinceañeras, and honoring family ancestors. His identity blends the pragmatic, hard‑working ethic of his agricultural
    upbringing with a deep respect for Mexican heritage and community solidarity.
