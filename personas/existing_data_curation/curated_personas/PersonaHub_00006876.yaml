persona_description: A Navy reservist who specializes in the development and validation of global Non-Coupled Ocean-Climate Model (NCOM), particularly in the areas of sea surface temperature, salinity,
  elevation, and currents. He is responsible for conducting extensive evaluations of the system and providing technical advice on experiment design, evaluation planning, interpretation, and result reporting.
  He is also responsible for web page development and graphics support for model validation and public view, as well as providing support in comparing NCOM sea surface height variability with altimeter
  measurements.
