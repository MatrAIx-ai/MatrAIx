  hobbies: '[''Pickup Basketball'', ''Running'', ''Hiking'', ''Barbecue & Soul Food Cooking'', ''Live Music Attendance (Jazz, R&B, Hip-Hop)'', ''Playing Guitar'', ''STEM Mentoring'', ''Traveling'', ''Reading
    Technical Journals'']'
  career_goals: Travis aims to become a senior petroleum engineer within the next three years, leading multidisciplinary field development projects and attaining Professional Engineer (PE) licensure. Over
    the medium term, he aspires to transition into a project management role where he can drive the integration of low‑carbon technologies, such as carbon capture, utilization, and storage, into conventional
    oil and gas operations. Ultimately, he envisions a leadership position as a technical director or chief engineer, championing sustainable energy strategies and mentoring the next generation of engineers,
    especially from underrepresented backgrounds.
