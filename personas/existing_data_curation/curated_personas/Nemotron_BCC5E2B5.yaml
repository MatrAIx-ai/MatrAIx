  career_goals: Craig aspires to transform his passion for storytelling and visual art into a sustainable freelance career. He plans to publish a collection of speculative short stories and develop a branded
    online gallery that attracts commissions for illustrations and photographs. He also hopes to secure a part-time role as a docent or program facilitator at a DC museum, where he can share his curiosity
    about art and abstract concepts with visitors. Ultimately, he seeks a flexible professional life that allows him to continue volunteering in community mediation while maintaining creative independence.
