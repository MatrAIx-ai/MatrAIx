personas:
  professional: Craig Gallagher is an aspiring freelance storyteller who blends speculative short fiction, digital illustration, and street photography into a cohesive creative practice, leveraging their
    research and mediation skills to craft compelling narratives while they navigate a relaxed, sometimes disorganized work schedule to maintain artistic independence.
  sports: Craig Gallagher is a casual fan of the Washington Capitals and DC United, enjoys joining a weekly pick‑up basketball game at a local community center, and maintains fitness through leisurely walks
    along the C&O Canal during their photography excursions, a routine they treat as both exercise and creative inspiration.
  arts: Craig Gallagher immerses themselves in the DC arts scene, performing folk guitar renditions at intimate gatherings, attending poetry readings featuring spoken‑word artists like Saul Williams, and
    drawing inspiration from painters such as Andrew Wyeth and contemporary illustrators like Loish, which they reference when crafting visual narratives for their blog.
  travel: Craig Gallagher favors spontaneous weekend trips to historic cities like Annapolis, Charlottesville, and Portland, planning loosely around train routes and affordable B&Bs, while day‑dreaming
    about a future pilgrimage to the rugged coastlines of western Ireland and the Highlands, a nod to family storytelling traditions that they hope to explore someday.
  culinary: Craig Gallagher delights in cooking hearty stews—especially a slow‑cooked lamb and root‑vegetable broth reminiscent of ancestral recipes—while also frequenting local farmers’ markets for fresh
    herbs and enjoying craft beer and cheese boards at neighborhood gastropubs, a habit they savor after a night of writing.
  core: Craig Gallagher is a reflective, improvisational creator who balances a love of speculative storytelling with a relaxed, occasionally scatterbrained approach to life, finding harmony in quiet cafés,
    folk melodies, and mindful pauses that they cherish as creative recharge.
background:
  cultural: Craig is a White American of Irish and Scottish descent, reflected in his family's tradition of folk music and storytelling. Raised in a suburban setting outside Washington, DC, he later moved
    to the capital for its rich cultural institutions and diverse artistic scene. His heritage and the multicultural environment of DC have shaped his appreciation for both traditional folk narratives and
    contemporary global art, fostering an inclusive outlook that informs his community involvement and artistic sensibilities.
