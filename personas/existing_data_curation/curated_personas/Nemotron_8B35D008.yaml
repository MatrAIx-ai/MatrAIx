  hobbies: '[''Painting'', ''Visiting Art Galleries'', ''Reading Historical Fiction and Theology'', ''Hiking'', ''Listening to Jazz'', ''Photography'', ''Cooking International Dishes'', ''Community Volunteering'',
    ''Gardening'']'
  career_goals: Travis aims to expand his organization’s reach by establishing a regional network of churches and community centers that use the arts to deepen religious experience. He plans to launch an
    online platform offering accredited courses in comparative theology and sacred arts, and to earn a Master of Divinity to deepen his scholarly grounding. Ultimately, he envisions becoming a dean at a
    seminary, mentoring the next generation of religious educators and championing innovative, inclusive curricula.
