personas:
  professional: Travis Norman, a seasoned faith‑based education leader, leverages over two decades of interdisciplinary curriculum design and strategic grant management, and they use digital media to infuse
    visual art, music, and literature into theological learning while spearheading a regional network of arts‑centered community centers.
  sports: Travis Norman enjoys early‑morning trail runs in Iowa’s rolling hills, participates in the Des Moines Running Club, supports the Iowa Hawkeyes football team in the fall and follows the Iowa Cubs
    baseball season in summer, and they keep a flexible schedule for occasional weekend kayaking on the Mississippi River.
  arts: Travis Norman channels their curiosity into abstract canvases and contemporary biblical scenes, draws inspiration from Mark Rothko and Caravaggio, regularly attends jazz performances by Wynton Marsalis
    and local ensembles, and they volunteer as a docent at the Des Moines Art Center, where they discuss works by Georgia O’Keeffe with visitors.
  travel: Travis Norman prefers purposeful travel that blends art, history, and faith, often planning road trips to historic churches in the Hudson Valley, weekend pilgrimages to Chartres Cathedral in France,
    and a recent culinary tour of Oaxaca, Mexico, and they balance budget constraints by using airline points and staying in family‑run B&Bs.
  culinary: Travis Norman, an enthusiastic home cook, experiments with plant‑based dishes such as roasted cauliflower steak with harissa, Ethiopian lentil stew (misir wot) served over injera, and homemade
    kimchi, sourcing fresh herbs from their backyard garden and they regularly swap recipes at the community food pantry.
  core: Travis Norman blends Midwestern modesty with boundless artistic curiosity, meticulously plans community‑focused projects, and they occasionally hoard art supplies while losing track of time in the
    studio.
background:
  cultural: Travis grew up in a small Midwestern town in Iowa within a predominantly white, Protestant community, with family roots tracing back to German and Irish immigrants. The region’s emphasis on
    community service, modesty, and hard work shaped his values, while his liberal arts education broadened his worldview, fostering an appreciation for diverse artistic and cultural expressions. His cultural
    identity blends traditional Midwestern sensibilities with a curiosity for interfaith perspectives and a commitment to inclusive, arts‑centered religious education.
attributes:
  skills: '[''Program Development'', ''Curriculum Design'', ''Interfaith Facilitation'', ''Public Speaking'', ''Grant Writing'', ''Event Planning'', ''Volunteer Coordination'', ''Conflict Mediation'', ''Digital
