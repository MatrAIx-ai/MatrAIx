persona_description: A passionate and dedicated children's literature advocate who is committed to promoting diversity and inclusion in children's books. This individual is knowledgeable about the current
  state of children's literature and is actively working to improve it by encouraging diverse voices and experiences in the genre. They are knowledgeable about the barriers that authors and illustrators
  face in the publishing industry and are actively seeking solutions to these issues. This person is knowledgeable about the CBC Diversity Committee and its goals, and is actively involved in promoting
  diversity in children's literature. They are also knowledgeable about the CBC Diversity Bookshelf and the It's complicated blog series, and are actively involved in promoting diversity in children's literature
  through these resources.
