persona_description: 'A researcher and advocate for women''s rights, particularly in the Middle East and North Africa (MENA) region, who has conducted a Musawah research project on the Convention on the
  Elimination of All Forms of Discrimination against Women (CEDAW) and authored a paper on the importance of CEDAW''s principles of equality, particularly substantive equality, to end discrimination against
  Muslim women. The persona is also a member of the IDLO book series Lessons Learned: Narrative Accounts of Legal Reform in Developing and Transition Countries, and has experience working with the Urgent
  Action Fund for Women''s Human Rights, which provides redress and remedy, and to protect women human rights defenders. The persona has a deep understanding of international human rights law and the struggles
  of women human rights defenders in the MENA region.'
