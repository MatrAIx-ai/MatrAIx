persona_description: A scholar and expert in Ethiopian literature and manuscripts, particularly focusing on medieval and early modern African literature. Specializes in medieval, early modern and modern
  African literature and has expertise in Ethiopian priests from Virgin Mary Ethiopian Orthodox Täwaḥədo Church and St. Michael Ethiopian Orthodox Täwaḥədo Church. Has a passion for ancient tradition of
  written literature and bound manuscripts, and is excited about the opportunity for the greater Princeton community to meet and learn from scholars. Has a deep understanding of the significance of these
  manuscripts and the three critical facts about Ethiopia that are crucial to understanding the significance of these manuscripts. Has a unique and special knowledge of the texts and is eager to share their
  knowledge with the audience. Has a passion for Ethiopian art and archaeology and is interested in the illuminations in the manuscripts. Is a member of the Princeton community and has a unique perspective
  on the significance of these manuscripts. Is excited about the opportunity to participate in the event and is eager to learn from the scholars.
