  hobbies: '[''Woodworking'', ''DIY home improvement'', ''Automobile restoration'', ''Fishing'', ''Reading non-fiction (business, history, technology)'', ''College football (Michigan Wolverines)'', ''Community
    volunteering'', ''Board games'', ''Cooking'']'
  career_goals: Calvin aims to advance to a regional sales manager position within the next three years, overseeing a team of representatives across the Great Lakes region and driving a 20% increase in
    market share. He plans to deepen his expertise in digital sales tools and data analytics, earn the Certified Professional Salesperson (CPS) designation, and eventually transition into a senior leadership
    role such as Director of Sales. Long-term, he is interested in leveraging his experience to mentor emerging sales talent and potentially start his own consulting firm focusing on supply-chain optimization
    for manufacturers.
