personas:
  professional: Abby Swinson, an aspiring junior engineer and storyteller in elementary school, leverages their love for step‑by‑step LEGO builds and structured reading of the "Magic Tree House" series
    to excel in science projects, while their compassionate, organized nature makes them a trusted team member in group assignments.
  sports: Abby Swinson, a regular attendee of the local kids' swimming program at the Sunshine Swim Club and a seasonal fan of the Chicago Cubs, thrives on predictable lap routines, enjoys organized team
    warm‑ups in soccer during fall, and proudly wears a Jr. Cubs cap while cheering from the sidelines.
  arts: Abby Swinson, a budding digital illustrator who spends evenings creating simple sketches of characters from Disney’s "Moana" and listening to Taylor Swift’s upbeat tracks while their fingers slip
    over a stylus, also enjoys performing the "Frozen" sing‑along during family gatherings, and collects stickers of Marvel heroes.
  travel: Abby Swinson, who plans weekend excursions with a printed checklist, loves the structured adventure of visiting the nearby science museum in Seattle, dreams of exploring the Grand Canyon’s linear
    trails, and cherishes family trips to "Walt Disney World" where daily itineraries keep their curiosity organized.
  culinary: Abby Swinson, an enthusiastic home‑chef in training, frequently mixes macaroni and cheese with cheddar and peas, perfects PB&J sandwiches using whole‑grain bread, delights in baking cupcakes
    topped with sprinkles of rainbow sugar and vanilla frosting, and likes to snack on apple slices with peanut butter, though they sometimes forget to wash their hands before cooking.
  core: Abby Swinson, an organized eight‑year‑old who balances a love for LEGO construction, swimming routines, and compassionate community gardening with a sprinkle of occasional impulsive candy cravings,
    epitomizes predictable play and gentle generosity.
background:
  cultural: 'Abby comes from a white, middle‑class family living in Lakewood, Ocean County, New Jersey. Her upbringing reflects typical suburban American values: a focus on education, participation in community
    activities like library storytimes and local festivals, and seasonal outings to nearby beaches and parks. Family traditions include celebrating holidays such as Thanksgiving and the Fourth of July with
    gatherings and shared meals, while her community emphasizes kindness, cooperation, and respect for diverse neighbors.'
