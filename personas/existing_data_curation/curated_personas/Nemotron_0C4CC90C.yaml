  career_goals: As a retired professional, Bart aims to become Ferndale’s cultural catalyst. He is determined to launch an annual Art & Ideas Festival that showcases experimental visual art, spoken‑word
    performances and interdisciplinary workshops, with the ambition of earning regional recognition and awards. He plans to publish a collection of short stories and poetic essays that explore the intersection
    of nature, history and imagination. Through his network, he seeks to mentor emerging artists, organize a collaborative community mural that celebrates the town’s Victorian heritage, and win the Humboldt
    County Creative Excellence Competition. These goals reflect his competitive drive, desire for novelty, and his stable, self‑assured approach to taking on ambitious public projects.
