personas:
  professional: A budding science‑fiction storyteller and experimental artist, Jeannie Leonard blends imaginative narrative ideas with disciplined sketching routines and meticulous DIY robotics projects,
    turning classroom assignments into mini‑exhibits that showcase both creativity and precision.
  sports: Jeannie Leonard cycles along the Pacific coastline for leisurely fitness, joins the local youth surf club for weekend wave practice, and cheers for the nearby professional baseball team, the Los
    Angeles Dodgers, while they also enjoy occasional beach volleyball games at the community center.
  arts: Jeannie Leonard immerses themselves in watercolor workshops inspired by John Singer Sargent, sketches scenes reminiscent of Hayao Miyazaki’s animated worlds, collects graphic novels by Neil Gaiman
    and Marjane Satrapi, and finds solace in playing piano pieces by Ludovico Einaudi, shaping a creative identity that fuses visual and literary storytelling.
  travel: Jeannie Leonard dreams of exploring coastal wonders like Monterey Bay, yearns to trek through Redwood National Park, and hopes to visit Tokyo’s anime districts, favoring family road trips with
    detailed itineraries that balance beach time, museum visits, and dedicated sketching sessions.
  culinary: Jeannie Leonard loves crafting California sushi rolls with fresh avocado, whipping up lemon‑zest shortbread cookies, and experimenting with homemade pesto pasta, yet they remain a picky eater
    when it comes to spicy foods, preferring mild flavors that complement their artistic focus.
  core: An endlessly curious teen who balances meticulous organization with wild imagination, Jeannie Leonard channels their love for stories, science, and art into disciplined creative projects, while
    occasionally neglecting sleep for late‑night sketching marathons.
background:
  cultural: Jeannie comes from a middle‑class white family in San Diego, California. She has grown up in a culturally diverse coastal community where outdoor activities, environmental awareness, and a strong
    emphasis on education are common. Her family values creativity and academic achievement, encouraging extracurricular pursuits such as art classes, science clubs, and community service. Southern California’s
    blend of beach culture, technology hubs, and vibrant arts scenes has shaped her worldview, fostering an appreciation for both natural beauty and innovative design.
