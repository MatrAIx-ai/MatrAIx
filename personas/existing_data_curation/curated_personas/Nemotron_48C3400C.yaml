  career_goals: Jeannie dreams of becoming a multidisciplinary creator who blends art and science. She envisions a career as a concept artist for video games or animated films, designing fantastical worlds
    that reflect her curiosity about novel ideas. She also considers pursuing a degree in visual arts combined with environmental design, ultimately working as a museum exhibit designer or interactive media
    educator. In the short term, she aims to build a robust online portfolio, win a regional science‑fair award, and earn a scholarship to a specialized arts high school.
