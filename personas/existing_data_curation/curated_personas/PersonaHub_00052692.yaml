persona_description: A Sri Lankan psychiatrist who has conducted research on the effects of the civil war on the mental health of the population in the Jaffna Peninsula, and who has identified the sense
  of abandonment by the authorities and economic and social difficulties as key factors contributing to the increase in suicides. The psychiatrist believes that the government should take collective responsibility
  for rehabilitation and that social capital can be restored through the restoration of pre-existing family and social ties.
