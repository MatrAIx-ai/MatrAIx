personas:
  professional: Maya Williams, a retired computational scientist turned interdisciplinary mentor, channels their imaginative curiosity and competitive energy into designing interactive art‑and‑science workshops
    for youth, even as their love of spontaneity sometimes leads to loosely organized project timelines.
  sports: Maya Williams stays active by joining the local senior center bridge club, dancing salsa three times a week, and cheering for the Washington Wizards and Washington Commanders, while preferring
    low‑impact walks along the Anacostia River during the spring and fall seasons.
  arts: Maya Williams, an abstract painter inspired by Kandinsky and the improvisational spirit of Miles Davis, regularly exhibits sculptural installations made from reclaimed wood at community galleries,
    attends live jazz nights at Blues Alley, and participates in community theater productions of August Wilson’s plays.
  travel: Maya Williams favors spontaneous road trips through the Mid‑Atlantic, often stopping at the New Orleans Jazz & Heritage Festival and the historic streets of Savannah, while dreaming of a leisurely
    cultural immersion in Kyoto’s art districts, balancing limited pension resources with a thirst for enriching experiences.
  culinary: Maya Williams, an experienced home cook, delights in simmering collard greens with smoked turkey, baking sweet‑potato pie spiced with nutmeg, and experimenting with espresso‑marinated tofu,
    while frequently treating themselves to brunch avocado toast at The Founding Farmers.
  core: Maya Williams blends a lifelong love of jazz, abstract math‑art, and community mentorship into a vibrant, competitively spirited life that, despite occasional impulsive spending and a relaxed approach
    to deadlines, remains grounded in resilient curiosity and soulful generosity.
background:
  cultural: Maya was raised in a close‑knit African‑American family in Baltimore before moving to College Park, where she has deep roots in Prince George’s County. Her cultural identity is shaped by the
    rhythms of gospel and jazz that filled her childhood home, the oral traditions of storytelling passed down through generations, and the communal resilience forged during the Civil Rights era. She cherishes
    celebrating Juneteenth, cooking soul‑food recipes with family, and participating in church gatherings that emphasize service and empowerment. Maya's experiences as a Black woman in STEM have reinforced
    her commitment to advocacy, fostering a sense of responsibility to uplift under‑represented voices within both scientific and artistic circles.
