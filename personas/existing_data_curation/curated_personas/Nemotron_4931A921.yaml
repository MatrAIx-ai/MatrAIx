  hobbies: '[''Abstract painting'', ''Reclaimed‑material sculpture'', ''Virtual‑reality art experimentation'', ''Jazz club attendance'', ''Salsa dancing'', ''Community theater acting'', ''Speculative fiction
    book club'', ''STEM mentorship for robotics'', ''Bridge (card game)'']'
  career_goals: Although retired from formal employment, Maya aims to leave a lasting legacy in her community and beyond. She plans to launch a nonprofit that delivers hands‑on art‑and‑science mentorship
    to under‑represented youth in Prince George’s County, creating a pipeline for future innovators. Maya also aspires to publish a illustrated memoir that weaves her life story with reflections on scientific
    discovery and cultural heritage, and to become a sought‑after guest lecturer at nearby universities, sharing her interdisciplinary expertise. Ultimately, she seeks to champion equity in STEM and inspire
    the next generation to embrace curiosity without boundaries.
