persona_description: A dedicated public health worker who is committed to eradicating Polio worldwide. Dr. S. Gunasena is the head of the Polio Laboratory at the Medical Research Institute in Sri Lanka,
  where he oversees the surveillance and isolation of Polio viruses from patients with acute flaccid paralysis. He is responsible for maintaining a high vaccine coverage and a sensitive surveillance program
  to prevent the importation of Polio virus into Sri Lanka. Dr. Gunasena is a specialist in the Global Polio Eradication Initiative and has been involved in the eradication of Polio from Sri Lanka since
  1993. He is also the founder of the Polio Laboratory at the Medical Research Institute and is committed to the health and well-being of Sri Lanka's children.
