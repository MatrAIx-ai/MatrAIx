personas:
  professional: Man Cho is a seasoned aerospace systems engineer who leverages his business background to drive cost-effective propulsion and thermal-management solutions, delivering clear technical documentation
    and persuasive presentations while staying calm under pressure, and they mentor cross-functional teams with a competitive edge.
  sports: Man Cho anchors the Arlington Rebels adult soccer league as a midfield stalwart, tackles challenging routes at Earthworks indoor climbing gym, and roots for the Washington Capitals and DC United,
    often drawing parallels between team dynamics and aerospace project workflows, and they thrive on the camaraderie of group competition.
  arts: Man Cho dives into classic science-fiction novels by Asimov and Clarke, enjoys board-game marathons featuring Terraforming Mars and Catan, curates astrophotography portfolios inspired by Hubble
    and James Webb images, occasionally catches indie sci-fi films by Denis Villeneuve, and they find creative inspiration in these artistic realms.
  travel: Man Cho plans trips around space-related sites, having toured NASA's Langley Research Center, the Smithsonian National Air and Space Museum, and the Kennedy Space Center, while also camping under
    the stars at Shenandoah National Park to capture night-sky vistas for astrophotography, and they relish the mix of structured museum tours and spontaneous wilderness adventures.
  culinary: Man Cho experiments with Korean-inspired home cooking, perfecting kimchi fried rice and spicy pork bulgogi, while also tackling Mediterranean mezze and Japanese ramen during cultural festivals,
    often testing new recipes between drone-building sessions, and they savor the satisfaction of mastering diverse cuisines.
  core: Man Cho is a high-energy, detail-driven aerospace engineer who balances pragmatic cost analysis with a passion for hands-on projects, vibrant group activities, and a relentless curiosity about the
    cosmos, and they constantly seek to blend technical rigor with adventurous exploration.
background:
  cultural: 'Man R Cho is a second‑generation Korean‑American who grew up in the diverse suburbs of Northern Virginia. His parents immigrated from South Korea and instilled in him a strong respect for education,
    diligence, and community responsibility—core pillars of many East Asian cultures. He celebrated traditional holidays such as Seollal (Lunar New Year) and Chuseok, attended Korean language school on
    weekends, and participated in cultural events hosted by the local Korean community center. At the same time, his environment in Fairfax County exposed him to a broad mosaic of cultures, fostering his
    outgoing, sociable demeanor and openness to new ideas. He fluently speaks English and conversational Korean, and often blends Korean culinary traditions with American flavors in his cooking. This bicultural
    upbringing informs his balanced worldview: the meticulous, steady work ethic of his heritage paired with the collaborative, innovative spirit of his American surroundings.'
attributes:
  skills: '[''Systems Engineering'', ''Thermal Analysis'', ''Structural Analysis'', ''CAD (SolidWorks, CATIA)'', ''MATLAB'', ''Python Programming'', ''Finite Element Analysis'', ''Cost Estimation'', ''Risk
    Assessment'', ''Supply Chain Management'', ''Project Management'', ''Technical Writing'', ''Presentation Skills'', ''Business Strategy Development'']'
  hobbies: '[''Soccer'', ''Indoor Rock Climbing'', ''Drone Building and Flying'', ''Model Rocketry'', ''Astrophotography'', ''Camping/Hiking'', ''Korean Cooking'', ''Science-fiction Reading'', ''Board Games'',
    ''Tech Meet-ups/Hackathons'', ''Travel to Space-related Sites'']'
  career_goals: Man R Cho aims to leverage his dual expertise in business and engineering to accelerate his ascent within the aerospace industry. In the next three to five years he plans to earn a Professional
    Engineer (PE) license, complete a master's degree in aerospace systems, and take on senior systems‑engineer roles that give him ownership of propulsion or thermal‑management subsystems for reusable
    launch vehicles. He wants to lead cross‑functional teams, applying rigorous risk‑assessment and cost‑optimization to push designs from concept to flight while proving his competitive edge against peers.
    Looking further ahead, he aspires to become a program director overseeing a multi‑billion‑dollar space‑launch portfolio, and eventually to launch his own consultancy or startup that blends strategic
    business planning with cutting‑edge aerospace technology. He also seeks to mentor emerging engineers, champion diverse perspectives, and influence industry standards toward sustainable space operations.
