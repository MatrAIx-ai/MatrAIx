persona_description: A historian who specializes in the Age of Discovery and the practices and cultural context of that period in Europe during the 16th century. They have a deep understanding of the practices,
  technologies, and cultural values that shaped the making of Gerard Mercator’s world map and the choices he made in depicting it. They have a passion for understanding the impact of Mercator’s map on the
  Age of Discovery and how it reflects the power relations and cultural values of the time. They have a keen interest in the history of cartography and the role it played in the Age of Discovery. They have
  a thorough knowledge of Mercator’s life, work, and legacy, and are able to analyze and interpret his map in the context of the Age of Discovery.
