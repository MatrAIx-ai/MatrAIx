personas:
  professional: David Daku, a 20‑year‑old aspiring heavy‑equipment operator from the mountain community of South Fork, leverages their hands‑on expertise with excavators, bulldozers, and backhoes, meticulous
    adherence to OSHA safety standards, and a fiercely independent, competitive streak to excel in site‑plan interpretation and aim toward a foreman role.
  sports: David Daku pursues solo trail running in the San Juan foothills during summer and cross‑country skiing in winter, cheering the Denver Broncos and Colorado Avalanche, and belonging to a modest
    outdoor gym club near South Fork where they perform pull‑up sessions.
  arts: David Daku immerses in modern art by studying the light installations of James Turrell, recreating digital paintings inspired by Beeple, sketching landscapes echoing Albert Bierstadt, listening
    to ambient compositions by Brian Eno, and analyzing Terrence Malick’s cinematography for visual inspiration, which fuels their creative drive.
  travel: David Daku prefers low‑key, self‑planned road trips that blend photography and solitude, having explored Great Basin National Park and dreaming of a solo trek through the Scottish Highlands while
    budgeting trips around their equipment training schedules.
  culinary: David Daku enjoys rustic mountain fare, cooking grilled elk steak seasoned with juniper berries, smoky bean chili with smoked paprika, and perfecting a pour‑over coffee using locally roasted
    beans, though their cooking remains functional rather than gourmet.
  core: David Daku is a solitary, art‑curious heavy‑equipment enthusiast whose competitive drive fuels ambition, yet anxiety and social fatigue often shadow their confidence.
background:
  cultural: David is a white American raised in the rural mountain community of South Fork, Colorado. His family background includes generations of outdoor laborers and small‑scale ranchers, giving him
    a strong sense of self‑reliance and connection to western frontier culture. He grew up with a mix of traditional western values—hard work, independence, respect for the land—and exposure to broader
    cultural currents through internet art communities and online educational resources.
attributes:
  skills: '[''Excavator operation'', ''Bulldozer operation'', ''Backhoe operation'', ''Routine equipment maintenance'', ''Minor mechanical troubleshooting'', ''Interpretation of construction site plans'',
    ''OSHA safety compliance'', ''Spatial awareness and precision driving'', ''Independent problem solving'']'
  hobbies: '[''Landscape hiking'', ''Nature photography'', ''Sketching and digital painting'', ''Reading art and design books'', ''Building scale model machinery'', ''Playing construction simulation video
    games'', ''Operating a photography drone'', ''Listening to ambient music'']'
  career_goals: David aims to become a certified heavy‑equipment operator with a specialization in earth‑moving machinery. Over the next five years he plans to earn a commercial driver’s license and complete
    an accredited equipment‑operations program, eventually moving into a foreman or site‑supervisor role. He also harbors a long‑term ambition to acquire his own fleet of compact equipment and start a small
    contractor business that can serve the mountainous region around South Fork.
