  career_goals: Looking ahead, David aims to transition from day-to-day analysis to a mentorship and advisory role, guiding younger analysts and contributing to the strategic direction of his firm. He is
    interested in developing a legacy investment fund that supports his grandchildren’s education and community projects in Tallahassee. Additionally, he aspires to share his expertise through guest lecturing
    at local universities and by leading financial literacy workshops for senior citizens, aligning his professional ambitions with his cooperative and community‑focused personality.
