persona_description: A state health officer who played a crucial role in implementing and overseeing the use of the Marine Hospital Service for disinfection and fumigation work during a public health crisis.
  They were responsible for ensuring that the policies of eradication and sanitation impacted every level of government and communities across the south, and they had a deep understanding of the impact
  of property destruction on individuals during the policy of disinfection. They were also knowledgeable about the categorization of yellow fever as a highly contagious disease and its impact on health
  policy.
