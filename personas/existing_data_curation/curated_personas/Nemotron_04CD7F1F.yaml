  career_goals: Although retired from formal employment, Radhika aims to stay physically active and mentally engaged. She aspires to complete a memoir that captures her family's migration story and cultural
    traditions, while learning digital photography to document moments with her grandchildren. Radhika hopes to mentor younger members of the local South Asian community, sharing cooking techniques, language
    skills, and cultural knowledge. She also wishes to maintain her independence, support her husband’s health, and continue volunteering at the senior center, ultimately becoming a trusted cultural liaison
    for new immigrants in Minneapolis.
