personas:
  professional: Janelle Sparks is a senior IT leader and district technology architect who leverages her deep expertise in network, server, and cloud infrastructure, combined with a hands‑on teaching style,
    to translate complex cybersecurity concepts into practical training for educators while navigating projects with a relaxed, people‑first approach that balances curiosity and practicality.
  sports: Janelle Sparks enjoys weekend hikes through the Ozark foothills with the local Ozark Trailblazers club, follows the Arkansas Razorbacks football and basketball teams, and participates in community
    line‑dancing events that keep her moving while her flexible approach to fitness means she prefers informal outdoor activity over regimented gym routines.
  arts: Janelle Sparks immerses herself in gospel and blues evenings listening to Mahalia Jackson, B.B. King, and contemporary artist Gary Clark Jr., while she also leads a vibrant book club that delves
    into works by Toni Morrison, Maya Angelou, and James Baldwin, and she finds quiet inspiration in quilting circles featuring the art of Faith Ringgold.
  travel: Janelle Sparks favors road‑tripping to historic cultural sites such as Natchez, Mississippi, and the Civil Rights Trail in Birmingham, while also day‑tripping to Hot Springs, Arkansas, and dreams
    of a future pilgrimage to the historic churches of Seville, Spain, and the ancient ruins of Athens, Greece.
  culinary: Janelle Sparks delights in cooking Southern comfort food twists like smoked‑paprika shrimp and grits, jalapeño cheddar biscuits, and peach cobbler with fresh basil, sourcing heirloom tomatoes,
    peppers, and herbs from her garden to elevate each dish and often shares her creations at community potlucks.
  core: Janelle Sparks blends seasoned IT expertise with a community‑centric spirit, balancing a relaxed, people‑first mindset with relentless curiosity, which fuels her drive to close the digital divide
    while savoring Southern flavors, hikes, and lively gatherings.
background:
  cultural: Raised in a close‑knit Black family in Arkansas, Janelle’s formative years were shaped by the traditions of church, storytelling, and community activism that emphasized resilience, education,
    and mutual support. Her heritage instilled a deep respect for the civil‑rights legacy of the South and a commitment to uplift others through knowledge. This cultural foundation fuels her dedication
    to bridging the digital divide, mentoring young Black professionals, and preserving African‑American culinary and musical traditions. Janelle’s identity as a Black woman in tech informs her leadership
    style—grounded in empathy, collaboration, and a steadfast belief that technology can be a vehicle for social equity.
attributes:
  skills: '[''IT infrastructure management'', ''Network and server administration'', ''Cloud services (Azure/AWS)'', ''Cybersecurity and risk mitigation'', ''Project management'', ''Vendor negotiation and
