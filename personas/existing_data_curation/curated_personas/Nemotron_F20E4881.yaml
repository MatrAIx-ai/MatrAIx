    ''Stakeholder communication'']'
  hobbies: '[''Community book club'', ''Volunteer tech workshops at local church'', ''Southern cooking and recipe experimentation'', ''Gardening (herb and vegetable garden)'', ''Hiking in the Ozark foothills'',
    ''Line dancing and community folk dances'', ''Quilting and crochet'', ''Playing bridge with friends'', ''Traveling to cultural and historical sites'', ''Listening to gospel and blues music'']'
  career_goals: Janelle aims to spearhead a district‑wide digital transformation that modernizes infrastructure, expands broadband access, and embeds innovative learning tools across classrooms. She is
    committed to narrowing the digital divide for under‑served Black and low‑income communities in Arkansas by establishing after‑school tech labs and mentorship programs. Professionally, she aspires to
    attain a senior leadership role such as Chief Information Officer for a regional school system, while pursuing advanced certifications (PMP, CISSP) and a Master’s degree in Information Systems or Public
    Administration. Janelle also hopes to mentor the next generation of Black women in technology, serve on advisory boards for STEM outreach, and eventually launch a nonprofit focused on STEM education
    for youth, ensuring a lasting legacy beyond her tenure.
