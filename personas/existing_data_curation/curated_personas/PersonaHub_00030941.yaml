persona_description: A web browser enthusiast who is looking for a reliable, stable, and feature-rich browser that offers built-in support for Adobe Flash and closed-source media codecs like AAC, H.264,
  and MP3. This person values automatic updates, privacy, and the ability to customize their browsing experience with extensions from the Chrome Web Store. They are not interested in the frequent updates
  of the bleeding edge Canary channel or the built-in support for Flash or media codecs in Chromium. This person is familiar with the differences between Chrome and Chromium, and is considering which one
  is better for their specific needs.
