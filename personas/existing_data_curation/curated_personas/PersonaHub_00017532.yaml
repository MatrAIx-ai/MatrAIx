persona_description: A psychiatrist who specializes in the study of intermittent explosive disorder, a mental illness characterized by multiple outbursts of anger and aggression that are out of proportion
  to the situation, and the treatment and management of its symptoms. The psychiatrist is well-versed in the diagnostic criteria, treatment options, and the impact of the disorder on individuals' lives.
  They are interested in understanding the underlying biological and cognitive factors that contribute to the development and maintenance of the disorder, and are dedicated to improving the understanding
  and treatment of this condition.
