  career_goals: Denise aspires to transition from informal volunteer roles into a paid position within a local arts or community‑development organization, aiming first to become an event coordinator or
    program assistant. She plans to obtain her GED within the next year and enroll in adult‑education courses in arts administration and project management. Over the next five years she hopes to advance
    to a program manager or curator role, leading community exhibitions, workshops, and collaborative art projects while building a professional portfolio that showcases her organizational expertise and
    creative vision.
