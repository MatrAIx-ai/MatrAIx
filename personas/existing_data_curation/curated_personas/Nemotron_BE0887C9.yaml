personas:
  professional: Denise Stoner, an aspiring community arts coordinator, blends meticulous event-planning abilities with a vibrant visual-art sensibility, leveraging their knack for rallying volunteers and
    crafting engaging social-media narratives while staying skeptical of half-baked proposals, and they aim to transform their DIY exhibition experience into a paid program-manager role within five years.
  sports: Denise Stoner, an avid outdoor enthusiast, roots for the hometown semi-professional baseball team the Riverside Raptors, follows the national women's soccer club the Chicago Red Stars, regularly
    hikes with the Metro Trailblazers club, and they compete in a casual weekend ultimate frisbee league at the city park.
  arts: Denise Stoner, a devoted participant in the local arts scene, spends weekends exploring exhibitions by Yayoi Kusama and Kehinde Wiley, attends indie concerts featuring St. Vincent and Haim, draws
    creative inspiration from Lin-Manuel Miranda's theatrical productions and Ken Burns' documentaries, and they often recreate brush-stroke techniques from Georgia O'Keeffe in their DIY canvases.
  travel: Denise Stoner, a spontaneous yet budget-conscious traveler, prefers quick weekend escapes like a music-festival road-trip to Austin and a hiking retreat in Asheville, while dreaming of a month-long
    cultural immersion in Copenhagen's design museums and Berlin's street-art districts, and they always sketch itinerary notes in a battered Moleskine before booking cheap flights and hostels.
  culinary: Denise Stoner, an enthusiastic home cook with a flair for visual presentation, loves crafting avocado-toast brunches topped with feta and chili flakes, mastering homemade ramen broth spiked
    with miso and shiitake, whipping up vegan chocolate brownie bites using almond flour and oat milk, and they sometimes over-season dishes in the excitement of experimenting.
  core: Denise Stoner, a 25-year-old arts-obsessed organizer with a competitive edge, channels curiosity into community events while battling occasional anxiety and a tendency to over-commit.
background:
  cultural: Denise grew up in Hamburg, a small town in Erie County, New York, within a white, working‑class family that carries a modest German‑American heritage reflected in the town’s name. Her upbringing
    emphasized practicality, self‑reliance, and community volunteerism. While raised in a traditionally Protestant household, she became attracted to the broader cultural offerings of nearby Buffalo, such
    as its museums, galleries, and live‑music venues. This blend of Mid‑Atlantic modesty and exposure to a vibrant regional arts scene nurtured her appreciation for creative expression and shaped her values
    of hard work, community involvement, and open‑minded curiosity.
