  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Reading (fiction, philosophy, art history)'', ''Virtual museum tours'', ''Indie film watching'', ''Journaling'', ''Mindfulness meditation'',
    ''Yoga'', ''Desert hiking'', ''Succulent gardening'']'
  career_goals: She aims to earn her GED within the next year and enroll in a community‑college program focused on visual arts or museum studies, eventually pursuing a role as a gallery assistant or community
    outreach coordinator at a regional museum. Long‑term, Gina envisions curating exhibitions that highlight local desert culture and providing educational programming that bridges art and community. She
    also hopes to develop a freelance content‑creation portfolio that allows flexible, low‑stress work while she continues her personal artistic practice.
