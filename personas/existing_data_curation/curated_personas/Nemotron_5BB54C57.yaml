personas:
  professional: Gina Solomon, a 23‑year‑old aspiring museum studies student, leverages their meticulous organization and Canva/Photoshop skills to design exhibition proposals and community art events, while
    their curiosity drives them to weave desert‑inspired narratives into every project.
  sports: Gina Solomon, an avid desert hiker, joins a Reno‑area trail club for weekend excursions, follows the Las Vegas Golden Knights in hockey and the Las Vegas Aces in basketball, and squeezes in a
    monthly pickleball game to balance cardio with low‑impact activity, which they find both grounding and socially manageable.
  arts: Gina Solomon channels the stark silhouettes of Georgia O'Keeffe and the light mastery of Ansel Adams into their own desert photography while organizing indie‑film nights featuring Wes Anderson’s
    works and discussing art‑history podcasts that explore the oeuvre of Frida Kahlo and the provocative street murals of Banksy.
  travel: Gina Solomon prefers low‑budget, self‑planned trips that blend art and nature, having trekked through Joshua Tree National Park and explored the desert museums of Santa Fe, while dreaming of a
    summer spent wandering the lavender fields of Provence and visiting the Van Gogh Museum in Amsterdam, which they schedule around study and work.
  culinary: Gina Solomon enjoys cooking simple yet vibrant plant‑based meals, frequently whipping up quinoa salads with roasted heirloom tomatoes, avocado, peppery arugula, and a squeeze of lime, while
    their favorite indulgence is a perfectly spiced shakshuka topped with feta and served alongside fresh flatbread, and they occasionally experiment with nopal cactus tacos for a desert‑inspired twist.
  core: Gina Solomon is a meticulous, art‑obsessed 23‑year‑old whose constant worry fuels a thriving habit of journaling, desert hikes, and curating community exhibitions that celebrate the stark beauty
    of the Southwest, which they pursue with methodical dedication.
background:
  cultural: Gina comes from a white, Anglo‑American family that has lived in the rural Southwest for several generations. Growing up in Pahrump, Nevada, she was immersed in a close‑knit desert community
    where self‑reliance and neighborly support are core values. Her family’s traditions include modest Christian gatherings, weekend picnics in the open desert, and an appreciation for local folk art, all
    of which have shaped her grounded yet open‑minded outlook.
attributes:
  skills: '[''Event coordination'', ''Digital content creation'', ''Basic graphic design (Canva, Photoshop)'', ''Research and writing'', ''Photography'', ''Volunteer support in community services'', ''Time
