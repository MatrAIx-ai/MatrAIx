  hobbies: '[''Watercolor painting'', ''Reading historical biographies'', ''Gardening'', ''Woodworking'', ''Playing chess'', ''Attending small art exhibitions'', ''Cooking soul‑food recipes'', ''Listening
    to gospel and jazz music'', ''Writing memoir excerpts'', ''Community volunteer work'']'
  career_goals: Though retired, Colby aims to leave a lasting legacy in his community. He plans to volunteer as a docent at the International Civil Rights Center & Museum, sharing his firsthand memories
    of Greensboro's civil‑rights era. He also hopes to compile a memoir that weaves his personal journey with the broader story of Black culture in the region, and to organize a small showcase of artwork
    created by senior citizens. Another ambition is to establish a neighborhood garden that provides fresh produce and a peaceful gathering space, using his horticultural knowledge to mentor younger volunteers.
    Maintaining his health and mental well‑being, while staying intellectually engaged through art classes at the local community college, remains a central goal.
