  career_goals: Ronald aims to advance from his current managerial role to a regional or district manager position within the next three to five years. To support this progression, he plans to earn a professional
    management certification (such as the Certified Manager credential) and eventually complete a bachelor's degree in business administration, either online or through part‑time studies. He is also interested
    in leveraging his curiosity for operational innovation by leading cost‑saving initiatives and implementing technology upgrades in his stores. Long‑term, Ronald envisions opening his own boutique coffee
    shop that combines his love for community gathering with sustainable practices, while continuing to mentor younger colleagues and champion inclusive workplace culture.
