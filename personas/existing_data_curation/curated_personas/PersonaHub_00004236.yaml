persona_description: A molecular biologist and researcher who specializes in studying the mechanisms of viral infection and the development of cancer. Dr. Tansey and his team focus on using adenoviral oncogenes
  like E1A to illuminate important processes inside the cell that help understand why viruses like adenovirus are useful to us. They use a Tumor Virus to Illuminate Function, which involves studying the
  activity of proteins that adenovirus codes for, such as E1A, to understand the natural growth-control mechanism that the virus uses to promote cancer.
