persona_description: A young Irishman who served in the British Army during World War I and later became involved in the Irish Republican Army (IRA) during the War of Independence. He was appointed as the
  training officer for the 3rd West Cork Brigade and was known for his innovative military techniques and leadership skills. He was a skilled tradesman and solderer, and his ability to inspire his men during
  battles earned him the respect of his fellow Volunteers. He was also a member of the Flying Column and was engaged in the 1923 cease-fire/dump arms deal.
