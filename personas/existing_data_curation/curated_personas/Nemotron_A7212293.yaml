personas:
  professional: Libby Morgan, a 32‑year‑old biomedical engineer and molecular biologist, blends a curious but pragmatic mindset with a competitive drive, turning occasional disorganization into flexible,
    data‑rich lab designs for low‑cost biomedical sensors while they skillfully mentor small groups of undergraduates and navigate tight research deadlines with calm precision.
  sports: Libby Morgan, an enthusiastic runner and hiker in Minnesota, they belong to the Twin Cities Trail Runners Club, log workouts on a GPS watch, enjoy cross‑country skiing in winter, support the Minnesota
    Vikings and Minnesota Wild, and structure fitness sessions around measurable heart‑rate zones to satisfy both their competitive nature and love for solitary outdoor pursuits.
  arts: Libby Morgan, a solitary yet inquisitive arts enthusiast, they immerse themselves in science‑fiction works by Octavia Butler and Neal Stephenson, attend occasional indie film screenings of Christopher Nolan’s
    movies, and relax to the acoustic folk melodies of Bon Iver and the ambient piano compositions of Ludovico Einaudi, using these artistic escapes to balance their competitive edge and frequent worries.
  travel: Libby Morgan, favoring low‑key, nature‑focused travel, they have trekked Iceland’s Snæfellsnes Peninsula and the cherry‑blossom avenues of Kyoto, while weekend escapes to Minnesota’s Boundary
    Waters and the Superior Dunes fulfill their desire for solitary photography adventures and stress‑relieving hikes.
  culinary: Libby Morgan, an avid backyard gardener, they regularly cook herb‑infused meals such as lemon‑dill grilled salmon with rosemary quinoa and wild‑rice pilaf topped with fresh basil, experiment
    with homemade kimchi for probiotic benefits, and occasionally splurge on farm‑to‑table experiences at Minneapolis’s acclaimed Spoon‑river restaurant.
  core: Libby Morgan, a data‑driven scientist with a competitive streak, they channel curiosity into low‑cost sensor innovation while managing anxiety through structured routines, solo puzzles, and mindful
    outdoor pursuits.
background:
  cultural: Libby comes from a multi‑generational white Midwestern family with German and Norwegian ancestry, common in Rochester, Minnesota. Raised in Olmsted County, she was influenced by the region’s
    emphasis on self‑reliance, modesty, and a pragmatic work ethic. Community traditions such as county fairs, outdoor recreation, and a strong public‑school system fostered her appreciation for nature
    and seasonal rhythms. While her cultural heritage values collective responsibility, Libby’s personality leans toward individual achievement and healthy skepticism, which she balances with a respectful
    acknowledgement of the collaborative spirit typical of Midwestern academic and research environments.
attributes:
  skills: '[''Molecular biology techniques (PCR, gel electrophoresis)'', ''Statistical analysis with R and Python'', ''Data visualization (ggplot2, matplotlib)'', ''Laboratory curriculum design'', ''One-on-one
