    settings'']'
  hobbies: '[''Reading science-fiction and popular-science books'', ''Backyard herb gardening'', ''Hiking and nature photography'', ''Arduino prototyping (environmental sensors)'', ''Jigsaw puzzles and
    crosswords'', ''Chess in a small local club'', ''Mindfulness journaling'', ''Regular running for stress relief'', ''Structured breathing exercises'']'
  career_goals: Libby aims to complete her Ph.D. within the next two years and secure a tenure‑track faculty position at a research‑intensive university, where she can lead an interdisciplinary lab focused
    on developing low‑cost biomedical sensors. She seeks to build a reputation for high‑impact publications and competitive NSF or NIH grant funding, while also creating innovative, hands‑on lab curricula
    that blend inquiry‑based learning with industry‑relevant skills. Long‑term, she envisions a leadership role such as department chair or program director, allowing her to shape STEM education policy,
    mentor emerging scientists, and maintain enough flexibility to preserve a healthy work‑life balance and manage her stress levels.
