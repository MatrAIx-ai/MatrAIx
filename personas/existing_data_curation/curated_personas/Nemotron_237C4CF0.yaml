personas:
  professional: Michael Bartlett, a seasoned full‑stack software developer proficient in Java, Python, and JavaScript, they channel their meticulous UI/UX eye—shaped by watercolor painting—into building
    scalable React‑Node.js platforms, mentor junior engineers, drive Agile‑DevOps best practices, and compete fiercely to secure a principal engineer or lead architect position.
  sports: Michael Bartlett, a dedicated kayaker on the Chattahoochee River and member of the Atlanta Paddlers Club, also follows the Atlanta Falcons (NFL) and Atlanta Braves (MLB) passionately, joining
    a Saturday evening kick‑ball league with a close circle of friends to satisfy their competitive drive while maintaining a modest fitness routine, and they relish each game as a strategic challenge.
  arts: Michael Bartlett, an avid visitor of modern art galleries such as the Atlanta Contemporary and a practicing watercolorist, immerses themselves in the works of Julie Mehretu, Banksy, and James Turrell,
    captures architectural marvels through photography inspired by Ansel Adams and Michael Kenna, and they read speculative fiction authors like Neal Stephenson and N. K. Jemisin to fuel their unconventional
    creative expression.
  travel: Michael Bartlett, a curiosity‑driven traveler, has spent weekends exploring the street art of Berlin, the historic districts of Kyoto, and a road trip through the Appalachian Trail, while planning
    future trips to Barcelona’s Gaudí wonders and the Scottish Highlands, and they prefer a mix of meticulously researched itineraries and spontaneous detours that fit within a modest travel budget and
    limited family time.
  culinary: Michael Bartlett, an experimental Southern cook and craft‑beer brewer, loves to reinvent classics like smoked collard greens with miso glaze, pimento cheese infused with kimchi, and bourbon‑infused
    barbecue ribs, often incorporating ingredients such as buttermilk, smoked paprika, and peach hops into their dishes and brews, while they balance their culinary adventures with occasional over‑spending
    on specialty ingredients.
  core: Michael Bartlett, a competitive yet introspective full‑stack developer, they blend art‑inspired design, strategic risk‑taking in finance, and mindful stress‑management to navigate a tech‑driven
    life marked by curiosity, occasional anxiety, and a penchant for experimental Southern cuisine.
background:
  cultural: Michael grew up in a middle‑class white family in the Wilmington area of New Hanover County, steeped in Southern hospitality and modesty. His parents emphasized education, particularly STEM
    fields, and encouraged independent curiosity. He was raised with a blend of traditional Southern values—self‑reliance, community ties, and a love for regional cuisine like shrimp and grits—and the modern
    tech culture of remote collaboration and continuous learning. Local traditions such as barbecue festivals, church gatherings, and an appreciation for blues, country, and jazz music have shaped his worldview,
    while his exposure to contemporary art and design fuels his openness to new ideas and unconventional thinking.
