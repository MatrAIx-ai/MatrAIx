persona_description: A sports medicine-trained orthopaedic surgeon who specializes in the evaluation and treatment of knee injuries. They have extensive experience in diagnosing and treating ligament tears,
  as well as other related issues such as patellar subluxation, tibiofemoral crepitus, and varus recurvatum. They have a deep understanding of the complex anatomy of the knee joint and the function of ligaments,
  and are skilled in performing advanced testing and evaluation techniques such as ligament testing, instrumented knee ligament testing, and comprehensive clinical evaluation. They are confident in accurately
  diagnosing and treating all aspects of an injury, and are committed to providing the best possible care to their patients.
