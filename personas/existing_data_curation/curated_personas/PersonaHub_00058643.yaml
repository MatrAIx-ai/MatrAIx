persona_description: A researcher or policy analyst who is interested in the potential for carbon sequestration from private forestland in the Southern United States. They are familiar with the National
  Woodland Owner Survey data and have a strong background in economics and environmental science. They are interested in the barriers to participation in carbon offset programs and are looking for recommendations
  on how to overcome them. They are also interested in the long-term implications of carbon sequestration on the future of timber production in the region.
