  hobbies: '[''Fishing'', ''Gardening'', ''Cooking Traditional Ecuadorian Cuisine'', ''Listening to Music (Latin & Classic Rock)'', ''Watching Soccer'', ''Mechanical Restoration Projects'', ''Reading DIY
    Guides'', ''Attending Community Cultural Events'']'
  career_goals: He aims to advance to a lead operator or shift supervisor position within the next three to five years, obtain certifications in industrial automation and workplace safety, and deepen his
    PLC programming skills to support equipment upgrades. In the longer term, Luis aspires to transition into a maintenance technician role and eventually launch a small consulting side‑business that helps
    local manufacturers improve packaging line efficiency while mentoring younger workers.
