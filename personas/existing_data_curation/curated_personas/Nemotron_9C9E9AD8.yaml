personas:
  professional: Marybeth Licata, an aspiring teenage robotics engineer, blends a practical mindset with boundless curiosity to design and program small devices for school competitions, keeping project plans
    organized while staying flexible enough to experiment with new code ideas, and they often document each iteration in a notebook.
  sports: Marybeth Licata enjoys hiking the coastal trails near Coquille and plays on the local middle‑school soccer team, while cheering for the Portland Timbers and the Oregon State Beavers, and they
    balance active weekends with a love for quiet evenings reading.
  arts: Marybeth Licata expresses creativity through ukulele practice, sketching wildlife in their nature journal, and devouring speculative fiction from authors like N.K. Jemisin and Octavia Butler, often
    listening to indie folk band The Lumineers while cooking family recipes.
  travel: Marybeth Licata prefers nature‑focused trips, having camped in Oregon’s Crater Lake National Park and dreamed of exploring the redwoods of California, while planning future backpacking adventures
    that blend school field trips with family visits to historic towns like Astoria, and they often research routes on their tablet.
  culinary: Marybeth Licata experiments with family recipes that highlight tomatoes, fresh herbs, and garlic—such as a rustic tomato‑basil sauce and herb‑infused focaccia—showcasing a budding cooking skill
    but often they leave the kitchen a mess and forget to set a timer.
  core: Marybeth Licata is a curiosity‑driven teen who balances meticulous robotics projects, nature journaling, and family cooking, yet they occasionally stay up late debugging code and forget chores,
    embodying a pragmatic yet flexible outlook.
background:
  cultural: Marybeth comes from a white, Italian‑American family rooted in the rural Pacific Northwest. Her upbringing reflects the modest, self‑reliant values typical of small‑town Oregon, with an emphasis
    on community involvement and respect for the surrounding natural environment. Family traditions include preparing Italian meals during holidays, sharing stories of generational migration, and occasional
    participation in local church events. This blend of cultural heritage and regional lifestyle informs her appreciation for both tradition and innovation.
attributes:
  skills: '[''research and inquiry'', ''project planning'', ''basic Python programming'', ''photo editing'', ''gardening'', ''peer mediation'', ''public speaking'']'
  hobbies: '[''nature hikes and wildlife observation'', ''sketching and journaling'', ''ukulele playing'', ''reading speculative fiction'', ''family cooking (Italian dishes)'', ''robotics club'', ''community
    garden volunteering'']'
  career_goals: Marybeth aspires to combine her love for the environment with her technical aptitude, aiming to study environmental science or marine biology in college. She envisions a future where she
    can lead community‑based conservation projects, develop educational outreach programs for young people, and possibly incorporate digital media to raise awareness about coastal ecosystems. While she
    remains open to various pathways, her long‑term ambition is to make a tangible impact on preserving the natural landscapes of the Pacific Northwest.
