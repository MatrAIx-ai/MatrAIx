persona_description: 'A passionate and knowledgeable advocate of salt marshes, Charles Seabrook. Seabrook is a University of Georgia Press author who has written extensively about the ecological and cultural
  significance of salt marshes, particularly the coastal Atlantic salt marshes between Cape Hatteras, N.C., and Cape Canaveral, Fla. He has a deep appreciation for the natural habitat and the people who
  depend on it for their livelihoods. Seabrook''s book, "The World of the Salt Marsh: Appreciating and Protecting the Tidal Marshes of the Southeastern Atlantic Coast," provides a comprehensive look at
  the importance of salt marshes and the creatures that inhabit them.'
