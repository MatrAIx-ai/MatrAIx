persona_description: A zoologist who studies bird behavior and reproduction, particularly the behavior of oriental reed warblers and their interactions with common cuckoos. The persona is interested in
  understanding the timing and timing of parasitic activities, the duration of stay at the nests, and the egg-laying behavior of common cuckoos. They are also interested in the differences in egg-laying
  behavior between nests with and without the presence of the host bird.
