personas:
  professional: Amanda Fontaine is an aspiring visual artist who blends traditional sketching with digital painting on Procreate, leveraging her strong imagination, storytelling flair, and relaxed attitude
    toward deadlines to create free‑form fantasy illustrations that often feel like visual journals.
  sports: Amanda Fontaine enjoys weekend hikes along the coastal trails near Escondido, participates in her school’s yoga club for flexibility, cheers for the San Diego Padres and LA Galaxy, and occasionally
    visits a local teen climbing gym to stay active.
  arts: Amanda Fontaine devotes her free time to drawing in a sketchbook and experimenting with digital painting, drawing inspiration from Hayao Miyazaki’s animation, the surreal paintings of Salvador Dalí,
    and the indie sounds of Billie Eilish, while sharing short stories and poems with a close circle of friends.
  travel: Amanda Fontaine loves spontaneous drives along the Pacific Coast Highway, has visited La Jolla’s tide pools and Balboa Park’s museums, dreams of touring the Ghibli Museum in Mitaka, Japan, and
    hopes to trek through Redwood National Park next summer.
  culinary: Amanda Fontaine prefers fresh avocado toast with a squeeze of lime, enjoys crafting beginner‑level homemade sushi rolls with cucumber, crab, and cream cheese, frequents local farmers’ markets
    for fresh ingredients, and delights in occasional taco nights with fish, cilantro, and mango salsa.
  core: Amanda Fontaine is a daydream‑driven teen artist who hoards sketchbooks like treasure, drifts between surreal landscapes, and often forgets to finish school assignments while obsessively collecting
    new art supplies.
background:
  cultural: Amanda was raised in Escondido, a suburban community in San Diego County, California. Her family’s middle‑class, white American background blends typical suburban values with the diverse cultural
    influences of Southern California, such as frequent visits to the San Diego Museum of Art, local festivals, and the vibrant indie music scene. Growing up near the coast and the city’s creative hubs
    has given her exposure to a mix of outdoor recreation and multicultural artistic expressions, which she incorporates into her imaginative pursuits.
