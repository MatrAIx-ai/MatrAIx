  career_goals: She dreams of becoming a visual concept artist or illustrator, hoping to study fine arts and digital media in college. Amanda is excited about the idea of working on video game design or
    creating picture books that encourage imagination in other children. Long‑term, she aims to blend her love for art and storytelling into a career that lets her bring abstract worlds to life.
