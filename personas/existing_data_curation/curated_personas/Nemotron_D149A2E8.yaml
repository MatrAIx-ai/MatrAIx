personas:
  professional: Harriet Leathers, a four-year-old who loves to role-play as a miniature librarian, demonstrates early organizational talent by meticulously arranging picture books by color, greeting fellow
    preschoolers with a soft, courteous voice, and adheres to a strict daily schedule that mirrors her preference for structure and cooperative nature.
  sports: Harriet Leathers, a four-year-old who participates in the Tiny Tots Soccer Club's weekly lunchtime games, delights in scoring a goal with a small orange ball, proudly wears a cap of the local
    MLB team the St. Louis Cardinals, and prefers the intimacy of small, supportive scrimmages over bustling playground free-plays.
  arts: Harriet Leathers, a four-year-old who spends afternoons drawing whimsical animals with crayons, sings along to the gentle folk tunes of Raffi, watches the animated series Bluey for its calm storytelling,
    and finds joy in the predictable rhythm of coloring inside the lines, reflecting her love for structure and harmonious cooperation.
  travel: Harriet Leathers, a four-year-old who enjoys family outings to the nearby state park's lake for picnics, dreams of building sandcastles on Florida's Gulf Coast, prefers itineraries that include
    a midday nap and familiar snacks, and feels most comfortable traveling with her parents in a car seat that stays exactly the same each trip.
  culinary: Harriet Leathers, a four-year-old who adores buttery macaroni and cheese, dips crisp carrot sticks into hummus, proudly helps whisk pancake batter with a wooden spoon, stubbornly refuses broccoli,
    and secretly tucks a few extra peas under her plate when no one looks.
  core: Harriet Leathers, a four-year-old who cherishes tidy routines, quietly collaborates in small play circles, saves coins in a pink piggy bank, manages mild allergies with parental guidance, and daydreams
    of sunny beaches while drawing orderly pictures.
background:
  cultural: Harriet is raised in a white, Midwestern family in Harrisonville, Missouri. Her upbringing reflects small‑town values of community, family, and church involvement. She celebrates local traditions
    such as Thanksgiving, Fourth of July parades, and the county fair. Her family emphasizes politeness, helping neighbors, and keeping a tidy home, aligning with her preference for structure and harmony.
