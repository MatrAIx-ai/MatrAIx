  hobbies: '[''Coloring'', ''Puzzle solving'', ''Building block play'', ''Storytime listening'', ''Nature walks'', ''Simple gardening'', ''Small group playdates'']'
  career_goals: At four years old, Harriet imagines future roles where she can help others in organized settings. She often says she wants to become a teacher who keeps a tidy classroom, a nurse who cares
    for patients, or a community helper who maintains order. Her budding ambition is to combine caring for people with a predictable, structured environment.
