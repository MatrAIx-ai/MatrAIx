  career_goals: Daisy aims to obtain her GED within the next year and enroll in an associate degree program in Computer Science or Information Systems at a community college in the Worcester area. She aspires
    to become a data analyst or junior software developer, focusing on creating practical, data‑driven solutions for local businesses. Long‑term, she hopes to lead project teams, mentor other young learners,
    and possibly specialize in analytics for community development initiatives.
