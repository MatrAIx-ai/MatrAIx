personas:
  professional: Daisy Saravia, a disciplined 17-year-old self-taught Python programmer, applies their meticulous project-planning skills to freelance data-cleaning gigs for small local businesses, where
    their critical, skeptical mindset ensures robust, practical solutions.
  sports: Daisy Saravia enjoys tactical board-style soccer matches when watching the New England Revolution, occasionally participates in a local chess club that meets at the community center, and maintains
    a routine of early morning jogs through Tower Hill Park to clear their mind before study sessions.
  arts: Daisy Saravia immerses themselves in the rhythms of salsa and reggaeton while cooking family dishes, and they admire the works of Lin-Manuel Miranda and the storytelling of Pedro Almodóvar, often
    dissecting lyrical motifs and cinematic frames during solitary listening sessions.
  travel: Daisy Saravia prefers purposeful weekend trips, such as a day hike to the Wachusett Reservoir for reflection and a short stay in Boston’s historic North End to explore culinary markets, while
    dreaming of a future study abroad semester in Barcelona to combine language practice with tech workshops.
  culinary: Daisy Saravia delights in preparing arroz con gandules and flan for Nochebuena, meticulously measuring spices as they listen to classic salsa tracks, yet they sometimes forget to refrigerate
    leftovers, leading to occasional culinary mishaps.
  core: Daisy Saravia is a hyper-organized teen coder who balances a love for logic puzzles with a penchant for salsa-filled kitchens, a disciplined savings habit punctuated by impulsive gadget purchases,
    and a habit of over-committing to projects while neglecting self-care.
background:
  cultural: Daisy was raised in a Puerto Rican household in Worcester, MA. She grew up bilingual, speaking Spanish at home while using English at school and in the community. Family celebrations such as
    Nochebuena, Three Kings Day, and local Puerto Rican festivals have shaped her appreciation for music, dance, and culinary traditions. While she values these cultural roots, she balances them with the
    broader American context of her neighborhood, integrating both perspectives into her identity and daily life.
