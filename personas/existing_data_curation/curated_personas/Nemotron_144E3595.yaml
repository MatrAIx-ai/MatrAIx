personas:
  professional: Maria Swanson is a budding community storyteller who channels her methodical LEGO‑building talent, love for drama, and strong empathy into orchestrating neighborhood story‑time events, thriving
    on the spotlight while meticulously planning each cue and ensuring every child feels included.
  sports: Maria Swanson dashes through after‑school soccer practices with the River Valley Tigers U‑8 team in the fall, splashes in the Junior Dolphins Swim Club during summer, and channels her sociable
    energy into cheerfully leading warm‑up games for her friends, though she sometimes worries about keeping up with faster teammates.
  arts: Maria Swanson shines in the school drama club, starring in productions of "Annie" and "The Lion King" while sketching inspired by the vibrant colors of Claude Monet's water lilies, humming Disney
    classics, and practicing piano pieces like "Für Elise" after reading beloved stories by Dr. Seuss.
  travel: Maria Swanson dreams of weekend trips to the nearby Redwood Grove State Park and long‑awaited family vacations to Disney World, preferring carefully planned itineraries that mix adventurous treasure
    hunts in the forest with the comforting familiarity of guided tours at the local museum.
  culinary: Maria Swanson loves helping in the kitchen, confidently whisking together banana‑oat pancakes with honey and cinnamon, crafting colorful fruit kebabs featuring strawberries and kiwi, but remains
    picky about broccoli, often trading it for extra cheese on her homemade pizza.
  core: Maria Swanson is a bright, organized seven‑year‑old who balances a love for the spotlight and LEGO precision with a compassionate heart, yet often frets over tiny worries and secretly hoards glitter
    for her friendship bracelets.
background:
  cultural: Maria was born and raised in Puyallup, Washington, a suburban community in the Pacific Northwest. Her family is white, middle‑class, and values community involvement, outdoor recreation, and
    education. Growing up, she experiences the region’s rainy climate and enjoys frequent trips to nearby parks and the Puget Sound shoreline for beach outings. The family participates in local traditions
    such as the Washington State Fair, apple picking, and pumpkin carving, and celebrates American holidays like Thanksgiving and Independence Day with traditional meals. Her school emphasizes inclusivity
    and environmental stewardship, shaping Maria’s compassionate, cooperative, and socially aware outlook.
