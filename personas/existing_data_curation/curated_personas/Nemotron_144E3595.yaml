  career_goals: Maria dreams of becoming a teacher or a veterinarian because she loves caring for people and animals. She wants to lead a community garden club at school to help neighbors grow fresh produce,
    reflecting her organized nature. She imagines herself as a "science explorer" who discovers how things work while sharing her findings with classmates. Maria also hopes to organize charity events for
    children in need, channeling her compassion, and aspires to be student council president to improve school life with her sociable confidence and methodical planning.
