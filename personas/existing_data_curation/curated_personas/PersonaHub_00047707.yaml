persona_description: A geologist who is passionate about the study of geology and its impact on the economy of a region. They are knowledgeable about the Geopark concept and its role in promoting sustainable
  tourism based on geological landscapes. They have experience in managing and expanding a Geopark, including the expansion into west Fermanagh and the border with the Republic of Ireland. They are also
  familiar with the UNESCO Global Geoparks programme and its new designation, which has put the Marble Arch Caves Global Geopark on a par with other UNESCO sites in Ireland. They have a unique perspective
  on the importance of tourism in driving the economy of a region and the role of sustainable tourism in benefiting local economies.
