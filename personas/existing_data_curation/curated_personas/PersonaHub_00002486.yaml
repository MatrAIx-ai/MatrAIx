persona_description: A fishery biologist who specializes in the study of invasive species and their impact on ecosystems, particularly in the Great Lakes region. He is concerned about the potential ecological
  and economic consequences of Asian carp's invasion and has been actively working to prevent their establishment in the Great Lakes. He has a particular interest in the effects of Asian carp on native
  species and their prey, and the impact of their rapacious eating habits on their growth and survival. He is also aware of the potential for Asian carp to cause the marginalization of native species and
  the decline in their populations.
