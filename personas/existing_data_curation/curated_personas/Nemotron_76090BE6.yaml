personas:
  professional: Sammie Baig is a retired applied engineer and data‑analysis consultant who leverages decades of laboratory equipment design, statistical expertise in R and SPSS, and Python programming to
    deliver meticulous technical documentation and data‑driven strategies for local nonprofits, channeling a strong preference for routine into thorough project scaffolding while their spontaneous bursts
    of creative problem solving sometimes clash with tight deadlines.
  sports: Sammie Baig enjoys daily walks on the Klyde Warren Park trail as part of a senior walking group, follows the Dallas Cowboys and Dallas Mavericks with a competitive edge that fuels spirited debates,
    and occasionally plays in a mixed‑age tennis league at the Dallas Country Club.
  arts: Sammie Baig weaves family stories into hand‑crafted quilts while singing in their church choir to the soulful sounds of Mahalia Jackson and Aretha Franklin, devouring Agatha Christie mysteries and
    Ken Follett epics, and attending Dallas Theater Center productions of classic dramas, which together shape a rich artistic life.
  travel: Sammie Baig blends structured weekend road trips to Southern cities like Charleston, Savannah, and New Orleans—where they explore historic districts and savor gumbo—with spontaneous day trips
    to Austin for live music, all while managing a modest travel budget and a love for garden‑inspired landscapes.
  culinary: Sammie Baig delights in cooking Southern soul‑food staples such as crisp fried chicken marinated in buttermilk, collard greens simmered with smoked turkey, and peach cobbler spiced with cinnamon
    and nutmeg, confidently juggling traditional recipes with occasional experiments using fresh okra and pecan‑topped cornbread.
  core: Sammie Baig balances a lifelong love for routine with occasional spontaneous bursts, channeling meticulous engineering precision into community service while wrestling with chronic worry, competitive
    streaks, and a penchant for over‑checking everything from finances to garden hose knots.
background:
  cultural: Sammie identifies as African‑American and has spent most of her life in Dallas, Texas, where she was raised during the civil‑rights era. Her upbringing was shaped by the close‑knit Black church
    community, gospel music, and Southern family traditions. Over the years she married a partner of South‑Asian descent, adding a blend of cultural practices into her family life, such as occasional South‑Asian
    culinary influences at gatherings. Her experiences navigating both the challenges of a historically under‑represented demographic in STEM and the rich cultural tapestry of Dallas have fostered a strong
    sense of resilience, community service, and pride in her heritage.
attributes:
  skills: '[''Statistical analysis (R, SPSS)'', ''Python programming'', ''MATLAB modeling'', ''Computer‑aided design (CAD)'', ''Laboratory instrumentation troubleshooting'', ''Project management'', ''Technical
    writing and documentation'', ''Quality control and process improvement'', ''Mentoring underrepresented STEM students'']'
  hobbies: '[''Gardening'', ''Cooking Southern soul‑food'', ''Knitting and quilting'', ''Reading mystery and historical novels'', ''Bridge (card game)'', ''Walking in Dallas parks'', ''Volunteer coding
    instructor for youth'', ''Church choir singing'']'
  career_goals: Although retired from full‑time employment, Sammie wishes to stay intellectually active by offering part‑time consulting to local non‑profits on data‑driven decision making, establishing
    a community workshop series on basic coding and engineering principles for high‑school students, and authoring a memoir that highlights her journey as a Black woman in STEM. She also hopes to earn a
    certification in data visualization to better support community initiatives and to continue serving on her church’s outreach committee.
