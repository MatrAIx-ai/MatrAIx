  hobbies: '[''Abstract painting'', ''Mixed‑media collage'', ''Poetry writing'', ''Short story writing'', ''Improv theater'', ''Dance classes'', ''Speculative fiction reading'', ''Art museum visits'', ''Group
    fitness (Zumba)'', ''Game nights organization'', ''Volunteer creative literacy workshops'']'
  career_goals: She aims to move into higher-level operations management within the next five years, targeting roles such as Office Manager or Director of Administrative Services. Wanda also intends to
    leverage her education background to transition into corporate training, designing innovative learning experiences that blend art and abstract thinking with practical workplace skills. She plans to
    pursue a master's degree in Educational Leadership or Business Administration to solidify her leadership credentials. Long‑term, she envisions launching her own consulting firm focused on creative organizational
    development and staff empowerment for small businesses in rural Georgia.
