persona_description: A historian who specializes in the study of World War II and its impact on Native American communities, particularly in the context of internment camps and relocation policies. Their
  research interests include the history of internment camps, the experiences of Japanese Americans and Native Americans during World War II, and the broader implications of these events on American society
  and politics. They are knowledgeable about the details of the Poston Internment Camps, the Colorado River Indian Tribes, and the broader context of the internment era.
