    ''genealogy research'', ''crafting'', ''writing poetry'']'
  career_goals: Nekisha aims to formalize her community contributions by earning a GED and completing a certificate in nonprofit management, so she can apply for a leadership role at a local community center.
    She dreams of establishing a small neighborhood art studio where adults and teens can explore painting, photography, and crafts together. In the longer term, she hopes to author a collection of poems
    and short stories that reflect her experiences as a Black woman in the South, and perhaps self‑publish a guide on budgeting and home organization for other women in similar circumstances. She also desires
    to deepen her digital skills to help neighboring groups develop online presences.
