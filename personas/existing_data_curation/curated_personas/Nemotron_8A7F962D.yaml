personas:
  professional: Norma Hewett is a veteran flight attendant with over two decades of expertise in safety briefings, first‑aid response, and conflict de‑escalation, who leverages their curiosity and love
    of art to cultivate a cabin ambience that feels like a moving gallery while mentoring new crew with a harmonious, flexible approach.
  sports: Norma Hewett enjoys gentle yoga at the local community center, joins a seasonal hiking club for Upper Peninsula treks, and is a devoted fan of the Detroit Red Wings and the Michigan Wolverines,
    cheering them from the comfort of their travel lounge during off‑hours.
  arts: Norma Hewett spends free moments sketching Great Lakes shorelines in watercolor, drawing inspiration from Monet’s “Water Lilies” and Georgia O’Keeffe’s desert series, while also attending jazz concerts
    featuring Miles Davis and folk performances by Bob Dylan to fuel their creative notebook.
  travel: Norma Hewett prefers spontaneous road trips along the Lake Superior Circle Tour and weekend getaways to places like Banff, while using their flight attendant schedule to dart to cultural hubs
    such as Paris and Kyoto, always documenting each stop with sketches, journal entries, and a growing collection of museum tickets.
  culinary: Norma Hewett enjoys experimenting with international recipes, frequently preparing Thai pad thai with fresh cilantro, Moroccan tagine seasoned with preserved lemons, and locally sourced Lake
    Superior perch with lemon butter, showcasing an intermediate cooking skill that balances curiosity with occasional over‑spicing.
  core: Norma Hewett is a curious, art‑driven flight attendant who balances a flexible, sometimes disorganized lifestyle with a deep desire to mentor others, all while navigating mild health worries and
    a penchant for spontaneous travel and culinary adventure.
background:
  cultural: Norma grew up in Alpena, a small city on the shores of Lake Huron in Michigan’s Upper Peninsula. Her family traces its roots to Finnish and German immigrants who settled the region in the early
    1900s, imparting a blend of Midwestern modesty and a deep respect for the outdoors that defines Upper Peninsula culture. The community’s strong hospitality, love of nature, and appreciation for folk
    arts have shaped her values of harmony, cooperation, and curiosity about diverse cultures. Although her formal schooling ended before ninth grade, she has always valued lifelong learning, a trait reinforced
    by the varied people she meets as a flight attendant.
attributes:
  skills: '[''Customer service'', ''In‑flight safety briefings'', ''First aid and CPR'', ''Conflict de‑escalation'', ''Emergency equipment handling'', ''Rapid problem solving'', ''Basic Spanish communication'',
