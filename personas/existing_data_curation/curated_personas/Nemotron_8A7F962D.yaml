  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Sketching Great Lakes landscapes'', ''Cooking international cuisines'', ''Reading travel and art books'', ''Spontaneous weekend
    road trips'', ''Community book club'', ''Yoga for stress relief'', ''Attending local craft fairs'']'
  career_goals: Norma hopes to transition into a training or supervisory role within the airline, where she can design and lead mentorship programs for new flight attendants and eventually earn a corporate
    flight attendant certification. She also aims to complete a GED and take community‑college courses in art history, with the long‑term dream of curating a small local gallery or hosting art workshops
    in Alpena. In the future, she envisions a semi‑retired schedule that balances continued flying on select routes with more time for her artistic pursuits, family, and community involvement.
