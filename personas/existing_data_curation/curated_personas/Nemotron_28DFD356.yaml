  career_goals: Although not currently in the formal workforce, Argelia aims to turn her passion for the arts and community service into a semi‑professional role. She hopes to launch a neighborhood cultural
    center in Bayamón that offers art workshops, intergenerational storytelling sessions, and health‑education seminars. She aspires to become a recognized coordinator for the city’s annual art walk, securing
    grants to fund free programs for seniors and youth. To deepen her expertise she plans to earn a certificate in arts administration and to mentor younger volunteers. Ultimately she wants her efforts
    to leave a lasting imprint on the cultural vitality of her hometown while maintaining balance with her family responsibilities.
