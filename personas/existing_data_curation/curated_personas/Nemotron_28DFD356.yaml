  hobbies: '[''Acrylic Painting'', ''Visiting Art Museums'', ''Reading Historical Fiction and Poetry'', ''Cooking Traditional Puerto Rican Dishes'', ''Gardening (Herbs and Orchids)'', ''Salsa and Bomba
