personas:
  professional: Ethel Godbolt, a seasoned health information manager with three decades mastering Epic, Cerner, and Meditech, leverages their meticulous coding expertise and community‑focused mindset to
    champion patient‑centered record‑keeping, while their relaxed, sometimes disorganized work style encourages flexible, collaborative problem‑solving among staff.
  sports: Ethel Godbolt enjoys leisurely dog walks in Caddo Parish parks, follows the New Orleans Saints football season, participates in a senior swimming club at the Shreveport community center, and joins
    a weekend pickleball league, blending community spirit with low‑impact exercise.
  arts: Ethel Godbolt finds solace in watercolor painting classes at the Shreveport Regional Art Museum, regularly attends jazz and blues concerts featuring artists such as Wynton Marsalis and Diana Krall,
    and sings in the church choir performing gospel hymns, intertwining community storytelling and improvisational music into their artistic identity.
  travel: Ethel Godbolt favors road trips that combine heritage sites and natural beauty, having driven the Great River Road along the Mississippi and savored the historic French Quarter of New Orleans,
    while planning future visits to the Savannah historic district and the Blue Ridge Mountains for reflective retreats.
  culinary: Ethel Godbolt delights in cooking Creole classics such as gumbo, jambalaya, and beignets, skillfully seasoning with file powder, and maintains a modest herb garden where they grow sage, thyme,
    and cilantro, often pairing meals with sweet tea and a side of fresh cornbread.
  core: Ethel Godbolt is a compassionate health‑information veteran who balances a love of jazz, watercolor, and community storytelling with a habit of relaxed disarray, a cautious approach to finances,
    and a gentle determination to mentor and preserve local health histories.
background:
  cultural: Ethel is an African American woman who was born and raised in Louisiana during the post‑civil‑rights era. Her family’s roots trace back to the Great Migration and to a close‑knit Southern black
    community that values gospel music, Creole cooking, and storytelling. Growing up in Shreveport, she was immersed in a vibrant church life and community festivals that celebrated African American art
    and history. These cultural experiences have fostered a deep respect for community solidarity, oral tradition, and equitable access to care. In her professional role, Ethel draws on this heritage to
    advocate for patient‑centered record‑keeping, ensuring that the voices of all community members are represented in the health system.
attributes:
  skills: '[''Medical Records Management'', ''Electronic Health Record (EHR) Systems (e.g., Epic, Cerner, Meditech)'', ''HIPAA and Health Information Privacy Compliance'', ''Medical Coding (ICD-10, CPT)'',
    ''Data Entry Accuracy and Validation'', ''Patient Data Auditing and Quality Improvement'', ''Cross-Departmental Communication'', ''Staff Training and Mentorship'', ''Basic Health Data Analysis and Reporting'',
    ''Health Informatics Exploration'']'
  hobbies: '[''Visiting Art Museums and Galleries'', ''Painting and Watercolor Classes'', ''Jazz and Blues Concerts'', ''Reading African American Literature and History'', ''Cooking Creole and Southern
    Cuisine'', ''Gardening'', ''Genealogy Research'', ''Church Choir Participation'', ''Volunteering at Community Health Fairs'', ''Listening to Educational Podcasts'', ''Walking with Dog'', ''Knitting'']'
  career_goals: Ethel aims to earn a Registered Health Information Technician (RHIT) certification before transitioning to a part‑time consultant role that lets her share her deep knowledge with smaller
    clinics adopting electronic records. She hopes to lead a quality‑improvement project that streamlines record‑keeping workflows and reduces documentation errors, thereby easing staff stress. Mentoring
    remains a priority; she plans to formalize a mentorship program for junior health‑information staff. Simultaneously, she wishes to allocate more time for community work, helping preserve local health
    histories and supporting health‑literacy initiatives in Shreveport, while carefully managing her own stress and work‑life balance as she approaches retirement.
