persona_description: A legal professional with expertise in water law, specifically dealing with disputes over water rights and water scarcity. They are familiar with the history of water law in Valencia
  and have experience in handling cases involving drought, water theft, and other water-related issues. They are also aware of the effects of climate change on water resources and have a deep understanding
  of the hydrological infrastructure in Spain. They have experience in developing strategies to cope with water scarcity and have knowledge of the Qashqai nomadic pastoralism system in Iran, which they
  use to inform their work in water law and policy.
