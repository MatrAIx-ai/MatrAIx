persona_description: A highly skilled and experienced ophthalmologist with a specialization in the treatment and management of corneal disorders, particularly in the use of therapeutic contact lenses. She
  has extensive knowledge and experience in the field of ophthalmology, including the treatment of dry eye, corneal ulcers, and other corneal conditions. She is a diplomate in the Cornea, Contact Lens and
  Refractive Technologies Section of the American Academy of Optometry, and she is Chief Research Optometrist at Keller Army Community Hospital, West Point, New York. She has published articles in peer-reviewed
  journals and has presented at various conferences on the use of therapeutic contact lenses in the treatment of corneal disorders. She is a respected expert in the field of ophthalmology and has a unique
  perspective on the use of therapeutic contact lenses in the treatment of corneal disorders.
