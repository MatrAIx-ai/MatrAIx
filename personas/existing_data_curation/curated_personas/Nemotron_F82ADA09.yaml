personas:
  professional: Jason Mccartney, a retired hands‑on handyman turned community mentor, leverages his mechanical troubleshooting, carpentry, and budgeting expertise to coordinate small workshops at the senior
    center and guide younger residents on repairing classic car engines and managing limited finances, all while they balance a love for structured planning with occasional spontaneous project improvisations.
  sports: Jason Mccartney follows the Dallas Cowboys and Texas Rangers with quiet devotion, walks with the Amarillo Senior Walking Club on sunrise strolls each week, and occasionally joins a local shuffleboard
    league, treating fitness as a structured routine punctuated by spontaneous weekend hikes when weather permits, and they appreciate the harmony of small‑group activity.
  arts: Jason Mccartney delights in the storytelling of author Larry McMurtry, the folk melodies of John Denver, and the vibrant canvases of painter John Clymer, often weaving these inspirations into his
    model‑train dioramas and volunteer‑run craft workshops, and they find comfort in the blend of history and art.
  travel: Jason Mccartney prefers meticulously planned road trips across the Southwest, such as his beloved drives from Amarillo to Santa Fe and a recent visit to the Grand Canyon, yet they often add spontaneous
    stops at roadside heirloom seed farms or birdwatching hotspots, balancing a love for structure with occasional wanderlust.
  culinary: Jason Mccartney showcases a knack for Tex‑Mex cuisine, regularly crafting smoky chicken enchiladas with roasted heirloom tomatoes, fresh cilantro, and roasted poblano peppers, while also perfecting
    his signature Texas chili using chuck roast, smoked paprika, and a blend of cumin and ancho chilies, and they take pride in sharing these dishes with neighbors during small gatherings.
  core: Jason Mccartney is a methodical yet whimsically spontaneous retiree who balances a love for detailed planning—evident in their meticulously journaled birdwatching and model‑train layouts—with a
    habit of occasionally misplacing gardening tools in the most unexpected corners of their yard.
background:
  cultural: Jason is a white Texan with deep roots in both French‑Canadian (Lacroix) and Irish/Scottish (McCartney) ancestry. Raised in a small Midwestern town before relocating to Amarillo in his twenties,
    he grew up with a blend of Catholic traditions and the rugged self‑reliance typical of rural Texas. He cherishes Texas hospitality, country music, and the communal spirit of small‑town gatherings. His
    culinary tastes reflect classic Texan barbecue and comfort food, while his appreciation for local history and community service stem from his family's multigenerational emphasis on cooperation and preserving
    heritage.
