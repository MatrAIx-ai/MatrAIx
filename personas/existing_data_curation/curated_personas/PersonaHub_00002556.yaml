persona_description: A business consultant who specializes in identifying and mitigating sources of organizational drag, particularly through the use of backward incentives and limiting the flow of information
  between individuals and among teams. They have a deep understanding of the research and teaching of Stanford University's Hayag, and are skilled in evaluating and taking action to address signs of friction
  within organizations. They are particularly interested in collaboration and its impact on organizational drag, and have experience in using collaboration to help mitigate organizational drag.
