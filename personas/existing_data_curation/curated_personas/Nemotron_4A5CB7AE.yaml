    estimation", "Public speaking and technical presentations"]'
  hobbies: '["Playing recreational basketball", "Playing community soccer", "Weekend hiking in Iowa countryside", "Fishing trips with friends", "Restoring classic cars", "DIY woodworking projects", "Home‑automation
    tinkering", "Attending county fairs and local festivals", "Barbecue cooking and grilling", "Participating in maker‑space and robotics meetups", "Playing simulation video games (e.g., Kerbal Space Program)",
    "Volunteering for youth STEM outreach programs"]'
  career_goals: Michael aims to advance to a senior mechanical engineer role within the next three to five years, leading multidisciplinary design teams on innovative projects focused on sustainable energy
    systems and advanced manufacturing technologies. He plans to obtain his Professional Engineer (PE) licensure, secure patents for novel mechanisms, and eventually transition into engineering management.
    Long‑term, he aspires to launch his own consultancy that helps midsize manufacturers adopt cutting‑edge technologies while maintaining cost‑effectiveness. He also seeks to improve his stress resilience
    and work‑life balance, and to mentor younger engineers through professional societies and community programs.
