personas:
  professional: Michael Alexander, a mechanically‑oriented design engineer in central Iowa, leverages their expertise in SolidWorks, ANSYS and CNC machining to lead multidisciplinary product teams, and
    they balance a curiosity for sustainable energy solutions with a relaxed, sometimes disorganized workflow and a competitive drive to secure patents.
  sports: Michael Alexander, an active participant in the Ankeny Athletic Club, plays basketball for the local league in winter, joins a community soccer team during summer, follows the Iowa Hawkeyes and
    the Des Moines Menace, and they approach fitness as a social challenge rather than a regimented routine.
  arts: Michael Alexander mixes hands‑on craftsmanship with cultural appreciation, attending performances at the Des Moines Community Theatre, listening to John Williams soundtracks and Daft Punk, and they
    unwind with sci‑fi classics like Blade Runner, while using car restoration as a canvas for personal artistic expression.
  travel: Michael Alexander enjoys road‑trip adventures that blend meticulous DIY route planning with last‑minute packing, they have explored Yellowstone, Mackinac Island, and a spring trip to Munich’s
    Oktoberfest, and they now dream of hiking Iceland’s volcanic landscapes while balancing work commitments.
  culinary: Michael Alexander favors Midwestern comfort food – smoky BBQ ribs, pork tenderloin, and corn‑on‑the‑cob – they are comfortable grilling and tossing a stew in a Dutch oven, experiment with homemade
    hot sauce using jalapeños and habaneros, yet they often order pizza after late‑night design sessions.
  core: Michael Alexander is a 33‑year‑old engineer who fuses hands‑on problem solving with curiosity, and they juggle competitive ambition, occasional disarray, and a love for community‑driven activities.
background:
  cultural: Michael grew up in the Midwestern heartland of Iowa, immersed in a community‑oriented, pragmatic culture that values hard work, self‑reliance, and hands‑on problem solving. His family’s roots
    trace back to European immigrant settlers (primarily German and Irish) who contributed to the region’s agricultural and manufacturing heritage. Local traditions such as county fairs, church socials,
    and outdoor recreation have shaped his identity, fostering a blend of modest Midwestern values with an enthusiasm for technological innovation. As a white American from Ankeny, IA, he embodies the region’s
    modesty, collaborative spirit, and openness to practical advancements.
attributes:
  skills: '["Mechanical design", "CAD modeling (SolidWorks, AutoCAD)", "Finite element analysis (ANSYS)", "Prototype fabrication", "CNC machining", "Hydraulic and pneumatic system troubleshooting", "Product
