personas:
  professional: Caroline Adorno, a licensed civil engineer specializing in resilient coastal infrastructure, blends meticulous structural analysis with a keen aesthetic sense, often sketching historic facades
    to inspire design details while thriving in low‑stimulus office settings and pursuing senior project engineer status and PE licensure.
  sports: Caroline Adorno, a solo hiker who frequents the nearby Nature Preserve for sunrise treks and joins the Tampa Bay Trail Runners’ weekly runs, quietly supports the Tampa Bay Buccaneers and Lightning
    on relaxed evenings, and relies on yoga as her primary fitness regimen to counteract desk‑bound stress.
  arts: Caroline Adorno, an avid sketcher of historic architecture who draws inspiration from Ansel Adams and contemporary painter Julie Mehretu, immerses herself in poetry by Ocean Vuong, strums acoustic
    guitar to traditional bomba beats, and attends monthly exhibitions at the Tampa Museum of Art to satisfy her curiosity for avant‑garde installations.
  travel: Caroline Adorno, a contemplative solo traveler who meticulously plans low‑key escapes to places like the Scottish Highlands for rugged hikes and the quiet coastal villages of the Amalfi Coast
    for sunrise photography, while balancing a modest travel budget that limits frequent trips but fuels a deep desire to explore more remote nature preserves across the U.S.
  culinary: Caroline Adorno, a home‑cooking enthusiast who skillfully prepares traditional dishes such as arroz con gandules and mofongo using fresh plantains, garlic, and sofrito, occasionally experimenting
    with fusion twists like quinoa‑stuffed tamales, and enjoys pairing her meals with a glass of crisp Albariño during quiet evenings of guitar improvisation.
  core: Caroline Adorno, a detail‑obsessed civil engineer who balances a love for quiet sketching and yoga with an occasional over‑reliance on caffeine and a habit of over‑committing to mentorship despite
    bouts of anxiety, navigates life with a steady blend of precision, artistic curiosity, and a quietly stubborn resolve.
background:
  cultural: Caroline is a first‑generation American of Puerto Rican descent, raised in a bilingual household where Spanish and English flowed interchangeably. Family gatherings centered around food, music,
    and storytelling, instilling in her a deep respect for community bonds and cultural resilience. The island’s frequent encounters with hurricanes shaped her early awareness of the importance of robust
    infrastructure, sparking her interest in civil engineering. In Florida, she continues to celebrate her heritage by participating in local festivals such as the Puerto Rican Day Parade in Tampa, cooking
    dishes like arroz con gandules, and preserving the rhythm of bomba and plena. This cultural foundation influences her professional ethos, motivating her to design structures that are not only technically
    sound but also culturally sensitive and inclusive.
attributes:
  skills: '[''Structural analysis'', ''Site development planning'', ''Sustainable infrastructure design'', ''AutoCAD'', ''Revit BIM modeling'', ''GIS mapping'', ''Stormwater management'', ''Coastal resilience
    engineering'', ''Environmental impact assessment'', ''Project planning and documentation'', ''Aesthetic integration in public works'', ''Technical communication'']'
  hobbies: '[''Sketching urban architecture'', ''Reading art and sustainability books'', ''Yoga and mindfulness meditation'', ''Solo hiking in nature preserves'', ''Playing acoustic guitar'', ''Photography
    of structural details'', ''Cooking traditional Puerto Rican cuisine'', ''Listening to Latin jazz and folk music'', ''Exploring sustainability podcasts'', ''Building scale models of bridges'']'
  career_goals: Caroline aims to become a senior project engineer within the next five years, focusing on resilient coastal and flood‑mitigation infrastructure for the Gulf Coast. She plans to obtain her
    Professional Engineer (PE) licensure and pursue a specialized master’s degree in sustainable urban design to deepen her expertise in climate‑adapted construction. Long‑term, she envisions founding a
    consultancy that blends engineering rigor with artistic and cultural narratives, delivering public works that honor local Puerto Rican heritage while fostering community well‑being. She is also passionate
    about promoting mental‑health‑aware workplace practices in the engineering sector, hoping to mentor junior engineers on coping strategies for high‑stress environments.
