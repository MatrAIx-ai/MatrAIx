personas:
  professional: Jose Garza, a 17‑year‑old bilingual organizer, blends their practical mindset, assertive leadership as soccer captain, and tech‑savvy comfort with smartphones and spreadsheets into a clear
    career path toward CompTIA‑level IT support and community liaison roles that require precise coordination of youth outreach programs.
  sports: Jose Garza captains the Riverside Strikers soccer club at the local park, follows the city’s professional team the Thunder FC, and joins a winter indoor basketball league with the Hawks, embodying
    a year‑round commitment to team‑oriented athletics.
  arts: Jose Garza fills their playlists with reggaeton hits from Bad Bunny and J Balvin, hip‑hop tracks by Kendrick Lamar, bachata classics by Romeo Santos, and practices bachata steps at community events
    while admiring vibrant street murals by local graffiti crews that echo their love of colorful expression.
  travel: Jose Garza spends their school breaks exploring the nearby seaside town of Laguna Vista, has trekked to the historic district of Old San Juan, and dreams of backpacking through the ruins of Machu Picchu,
    the bustling souks of Marrakech, and the surf‑laden shores of Costa Rica.
  culinary: Jose Garza whips up family‑style pupusas stuffed with queso fresco, loroco, and refried beans, perfects plantain fritters seasoned with garlic and oregano, and experiments with cilantro‑lime
    salsa, showcasing an intermediate cooking skill that blends tradition with their own creative twists.
  core: Jose Garza is a charismatic, structure‑loving teen who leads on the soccer field and in group chats, balances disciplined budgeting with occasional gaming splurges, and can’t resist a late‑night
    snack of nachos while still dreaming of a food stall that serves their signature pupusas.
background:
  cultural: Jose’s upbringing is rooted in Salvadoran traditions, spoken at home in Spanish and celebrated through food, music, and community gatherings. He participates in Salvadoran holidays such as Independence
    Day and Semana Santa, and his family maintains customs like making pupusas together and visiting relatives in El Salvador during the summer. Living in South Gate, he is part of a vibrant Latino community
    that blends Salvadoran heritage with broader Southern California culture, exposing him to diverse festivals, bilingual schooling, and a strong sense of family responsibility.
