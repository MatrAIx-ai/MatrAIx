  hobbies: '[''Soccer'', ''Team captaincy'', ''Reggaeton and hip‑hop music'', ''Bachata dancing'', ''Multiplayer video gaming'', ''Cooking Salvadoran dishes'', ''Youth group volunteering'']'
  career_goals: Jose plans to earn his GED within the next year and pursue a certification in information technology, such as CompTIA A+ or a Cisco networking credential, to qualify for a technical support
    role. He also wants to leverage his strong communication skills by working as a community liaison for local nonprofit organizations that serve Latino youth, eventually leading outreach programs and
    after‑school activities. In the longer term, Jose envisions opening a small family‑run food stall that offers authentic Salvadoran dishes, combining his culinary talent with entrepreneurship.
