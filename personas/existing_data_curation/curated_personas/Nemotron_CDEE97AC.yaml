  career_goals: Ernesto aims to leverage his on‑the‑ground experience into a senior regional management role within the next five years, overseeing multiple locations across the Pacific Northwest. He is
    also interested in completing his associate degree in business administration and obtaining a PMP certification to formalize his project‑management capabilities. A long‑term ambition is to open a small
    family‑style Mexican taquería that blends traditional recipes with the fresh, locally‑sourced ingredients of Washington state, giving him a flexible schedule that eases his anxiety while satisfying
    his competitive drive to build a successful, independent venture.
