  career_goals: Although she is currently not employed full-time, Eva aims to bring her artistic practice into a more visible public sphere. She is determined to secure a solo exhibition in a regional gallery
    that presents her latest abstract series exploring memory, identity, and the interplay of Mexican and American cultural symbols. She also intends to compile her poetry and short stories into a manuscript
    that reflects her Mexican-American experience, seeking publication with an independent press. Recognizing her competitive drive, she plans to enter local art contests to challenge herself and gain recognition.
    Additionally, she hopes to launch a series of intimate, skill-sharing workshops for small groups of emerging artists in Santa Maria, emphasizing trust and collaborative learning while maintaining flexibility
    in structure. In the long term, Eva envisions opening a modest studio-gallery that serves as a cultural hub for art, food, and storytelling.
