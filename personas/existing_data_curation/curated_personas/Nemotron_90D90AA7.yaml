personas:
  professional: Melissa Newton blends methodical UI/UX design expertise with front‑end development acumen, consistently turning research insights into accessible wireframes and interactive prototypes while
    they uphold robust design systems and agile documentation.
  sports: Melissa Newton cycles through Michigan’s state parks on weekends as a member of the Ann Arbor Cycling Club, follows the Detroit Lions in the fall, roots for the Detroit Pistons during the NBA
    season, and they join a local pickup volleyball league each summer to balance endurance training with team play.
  arts: Melissa Newton channels their love for visual storytelling through DSLR landscape photography inspired by Ansel Adams, they attend monthly design meetups featuring speakers like Julie Zhou, volunteer
    at community art workshops, and unwind with board‑game nights that often include strategic titles such as Terraforming Mars.
  travel: Melissa Newton plans meticulous weekend road trips to explore Michigan’s shoreline towns like Saugatuck and Mackinac Island, has already visited Portland, Oregon for its food scene, and they dream
    of photographing the northern lights in Iceland while balancing a modest travel budget and a student‑loan repayment schedule.
  culinary: Melissa Newton enjoys experimenting with seasonal Midwestern fare, often whipping up smoked whitefish chowder with fresh Lake Michigan herbs, beet and goat‑cheese risotto using Michigan cherries,
    and a crisp apple crumble topped with locally sourced oats, reflecting their intermediate cooking skill and love for farm‑to‑table ingredients, and they frequently document each dish in a visual journal
    for future reference.
  core: Melissa Newton is an organized, curiosity‑driven designer who balances meticulous planning with spontaneous bike rides, daily mindfulness practice, and they have a quirky habit of cataloguing receipt
    scraps for future design inspiration.
background:
  cultural: Melissa grew up in a Midwestern, middle‑class family of European ancestry (German and Irish roots) in the Lansing area. Her upbringing emphasized hard work, community involvement, and practical
    problem‑solving, which dovetails with her pragmatic design style. She celebrates typical American holidays such as Thanksgiving and Christmas, enjoys seasonal farmers’ markets, and values the inclusive,
    diverse atmosphere of the Michigan State University community that shaped her collaborative mindset.
attributes:
  skills: '[''User Interface (UI) design'', ''User Experience (UX) research'', ''Wireframing'', ''Prototyping'', ''Responsive design'', ''HTML5'', ''CSS3'', ''JavaScript (ES6+)'', ''React'', ''Figma'',
    ''Adobe XD'', ''Sketch'', ''Accessibility (WCAG) compliance'', ''Usability testing'', ''Design systems'', ''Information architecture'', ''Agile & Scrum methodology'', ''Git version control'', ''Project
    documentation'']'
  hobbies: '[''Cycling in local parks'', ''Landscape photography'', ''Cooking experimental recipes'', ''Attending design meetups'', ''Board‑game nights with friends'', ''Sketching and digital illustration'',
    ''Volunteer teaching art workshops'', ''Journaling'', ''Mindfulness meditation'']'
  career_goals: She aims to become a senior product designer within the next five years, leading cross‑functional teams to create inclusive digital experiences. Melissa hopes to specialize further in accessibility
    and universal design, eventually shaping design strategy for large‑scale educational platforms. She is also considering a master’s degree in Human‑Computer Interaction to deepen her research skills.
    Long‑term, she envisions mentoring junior designers and possibly launching a boutique consultancy focused on accessible UI solutions for non‑profits and educational institutions.
