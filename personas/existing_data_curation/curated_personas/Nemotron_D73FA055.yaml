  career_goals: Joshua aims to advance to a Chief Information Officer role within the next five years, guiding a regional health system or university through a comprehensive digital transformation. He intends
    to champion AI‑enabled analytics, further secure the organization against evolving cyber threats, and embed resilient, cloud‑native infrastructure. Parallel to his executive aspirations, he plans to
    earn CISSP and PMP certifications, develop a mentorship program for emerging IT managers, and eventually launch a boutique consulting firm that advises nonprofits and small businesses on strategic technology
    adoption in the Appalachian region.
