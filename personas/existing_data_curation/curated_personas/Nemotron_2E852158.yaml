  hobbies: '[''watercolor painting'', ''attending art fairs'', ''hiking'', ''kayaking'', ''improv theater'', ''cooking experimental meals'', ''reading contemporary fiction'', ''volunteering at senior center'',
    ''yoga and meditation'']'
  career_goals: Judy aims to become a certified psychiatric technician within the next two years and to enroll in an associate's program in mental health counseling. She aspires to earn a bachelor's degree
    in psychology eventually, with a long‑term goal of becoming a licensed therapist. Additionally, she wants to develop and lead an art‑therapy program at her facility or a local community center, become
    a peer‑support leader for widowed adults, and advocate for holistic mental‑health approaches within her region.
