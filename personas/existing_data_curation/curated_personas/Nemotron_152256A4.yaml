personas:
  professional: Jared Willow, a budding e‑sports strategist and fledgling game designer, channels their love for tactical shooters and methodical planning into daily practice schedules, leading school gaming
    teams while meticulously building LEGO sets that sharpen spatial reasoning for future game level design.
  sports: Jared Willow, a dedicated member of the middle school soccer squad, idolizes Manchester United and the U.S. Men’s National Team, trains with regimented drills before matches, channels competitive
    spirit into every game, and keeps a personal fitness log to track stamina and improve goal‑scoring accuracy.
  arts: Jared Willow, an enthusiastic drama club lead, thrives on the stage performing scenes from *Harry Potter* and *Star Wars*, draws inspiration from actors Tom Holland and Zendaya, and finds sonic
    motivation in Imagine Dragons and Billie Eilish while dissecting adventure novels by Isaac Asimov during rehearsals.
  travel: Jared Willow, a planner of family outings, prefers structured trips to themed destinations like Disneyland and the LEGO House in Billund, balances school calendar constraints with a wish to explore
    Tokyo’s anime districts, and always packs a detailed itinerary to avoid travel anxiety.
  culinary: Jared Willow, a self‑appointed snack chef, enjoys crafting pepperoni pizza slices, cheddar‑filled quesadillas, and occasional LEGO‑shaped cookie creations, relies on quick microwave meals for
    after‑school hunger, but often overindulges in gummy bears during gaming marathons.
  core: Jared Willow is a methodical, socially vibrant 11‑year‑old whose competitive drive fuels video‑game mastery, soccer drills, and stage performances, all while navigating anxiety with meticulous planning
    and a craving for the spotlight.
background:
  cultural: Jared was raised in a middle‑class white family in the suburban community of Barrington, New Jersey. His upbringing reflects typical suburban American culture, with strong emphasis on public
    school education, community sports leagues, and participation in local extracurricular programs. Family traditions include holiday gatherings and occasional attendance at nearby churches, providing
    a backdrop of mainstream U.S. values, while media influences from television, online platforms, and video games shape his interests and worldview.
attributes:
  skills: '[''Organizational planning'', ''Public speaking'', ''Strategic game play (video games and board games)'', ''Team collaboration'', ''Digital literacy (basic coding and educational software)'',
