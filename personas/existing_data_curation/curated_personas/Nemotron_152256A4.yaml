  hobbies: '[''Competitive video gaming'', ''LEGO building'', ''Soccer'', ''Drama club / theater'', ''Reading adventure and sci‑fi novels'', ''Collecting trading cards'', ''Beginner coding (Scratch)'']'
  career_goals: Jared dreams of a future where he can blend his love of structure with his outgoing personality. He often talks about becoming a teacher or coach who can organize lessons and lead groups,
    as well as envisioning a career as a video‑game developer or professional eSports player where strategic planning and competition are key. He also imagines roles like a police officer or detective,
    drawn to the idea of investigating with a skeptical eye while helping the community. Ultimately, his ambition is to be in a position where he can guide others, use his organizational strengths, and
    thrive in a competitive environment.
