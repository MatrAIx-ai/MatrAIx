personas:
  professional: David Jacobs is a methodical 17‑year‑old high school senior who leverages his hands‑on automotive maintenance skills, Excel budgeting expertise, and event‑coordination experience to plan
    and execute community service projects, while preparing to enroll in a vocational automotive technology program.
  sports: David Jacobs is a fan of the Detroit Lions and Detroit Tigers, regularly attends his high school football games, participates in weekly weight‑training sessions at the local gym’s power‑lifting
    club, and spends early Saturday mornings fishing on Lake St. Clair with his friends’ crew.
  arts: David Jacobs enjoys the classic rock of Bruce Springsteen, the orchestral scores of John Williams, and the historical documentaries of Ken Burns, often listening to vinyl records while building
    model airplanes, and he occasionally watches the latest Marvel movies for a break from his structured routine.
  travel: David Jacobs prefers road‑trip adventures that blend nature and automotive history, having driven the Great Lakes shoreline to Mackinac Island and set his sights on a future visit to Stuttgart’s
    Mercedes‑Benz Museum, all while budgeting his travel through a detailed spreadsheet and balancing family commitments.
  culinary: David Jacobs favors hearty, protein‑rich meals like grilled ribeye steak with roasted sweet potatoes, homemade chili with black beans, and occasionally indulges in a classic cheeseburger from
    the local diner, while his cooking skill level stays at competent home‑cook using a cast‑iron skillet and a basic spice rack.
  core: David Jacobs is a disciplined teen who blends a love for engines, spreadsheets, and strategic gaming into a life of structured ambition, occasional snack‑filled study marathons, and a habit of double‑checking
    his to‑do list before bed.
background:
  cultural: David was raised in Acworth, Georgia, a suburb of Atlanta in Bartow County. His family is part of the region’s predominantly white, Southern cultural landscape. He grew up with strong community
    ties, attending a local Baptist church that shaped his values of responsibility, service, and modesty. The local culture emphasizes family gatherings, hospitality, and a respect for tradition, reflected
    in his participation in community events like county fairs, high school football tailgates, and outdoor activities such as fishing and hunting. The Southern emphasis on work ethic, modesty, and community
    service informs his practical outlook and desire to contribute to his hometown.
attributes:
  skills: '[''Automotive basic maintenance'', ''Handyman repairs (plumbing & electrical basics)'', ''Woodworking & carpentry'', ''Power tool operation & safety'', ''Microsoft Office (Excel, Word) proficiency'',
    ''Budgeting and simple accounting'', ''Scheduling and calendar management'', ''Data entry and record keeping'', ''Community event coordination'']'
  hobbies: '[''Fishing'', ''Model airplane building'', ''Remote‑controlled vehicle projects'', ''Strategy video gaming'', ''Non‑fiction reading (history, self‑improvement)'', ''Church youth group participation'',
    ''Weight training at gym'', ''Attending high school football games'', ''Community service volunteering'']'
  career_goals: David plans to earn his GED within the next year and then enroll in a vocational program at a local community college to become a certified automotive technician. He aspires to work in a
    structured environment such as a reputable dealership’s service department, eventually advancing to a service manager role. In the long term, he hopes to open his own small auto‑repair shop, providing
    reliable service to his community, and he also considers joining the U.S. Army Reserve after completing his certification to further develop discipline and leadership skills.
