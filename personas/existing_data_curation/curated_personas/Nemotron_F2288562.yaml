personas:
  professional: Illiana Frias, a 17‑year‑old aspiring community health advocate, blends organized event‑planning skills, bilingual communication, and basic first‑aid knowledge with a pragmatic curiosity,
    leading her school’s health club and coordinating local wellness workshops while maintaining a competitive drive to out‑perform peer initiatives.
  sports: Illiana Frias, a dedicated midfielder for Beaumont United Youth Soccer, trains year‑round, follows the Houston Dynamo and Houston Astros for inspiration, joins local beach volleyball pick‑up games
    in summer, and treats fitness as a competitive outlet, meticulously tracking performance metrics on a smartwatch.
  arts: Illiana Frias, a passionate participant in folkloric dance classes, channels cultural rhythm into TikTok choreography, frequently streams music by Lila Downs, Los Tigres del Norte, and contemporary
    pop artist Billie Eilish, and draws artistic inspiration from the vibrant murals of the local arts district, often designing promotional graphics for community events using Canva.
  travel: Illiana Frias, an enthusiastic road‑trip planner, prefers weekend getaways to the historic River Walk of San Antonio, the lively French Quarter of New Orleans, and occasional family visits to
    the coastal beaches of Galveston, balancing adventure with budget constraints by leveraging student discounts and ridesharing apps.
  culinary: Illiana Frias, an adept home cook, delights in preparing tamales with masa, slow‑cooked pozole broth, and cinnamon‑sugar churros infused with a hint of chipotle, while also mastering Texas‑style
    brisket rubs, often sourcing fresh chilies and locally roasted pecans to fuse flavors across her heritage and Gulf Coast palate.
  core: Illiana Frias, a diligent, competitive teen with a knack for organizing community health initiatives, merges bilingual communication, a love for soccer and folkloric dance, and a penchant for budget‑savvy
    cooking, all while juggling occasional spreadsheet‑obsessed quirks and a TikTok habit that fuels her curiosity.
background:
  cultural: Illiana was raised in a Mexican‑American household in Beaumont, Texas. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Mexican Independence Day, and Catholic
    holidays with music, food, and communal gatherings. Bilingual, she navigates seamlessly between Mexican cultural values—family loyalty, respect for elders, love of music and cuisine—and the Gulf Coast
    Texan environment, marked by Southern hospitality and a diverse Hispanic community. This blend of cultural influences shapes her worldview, social interactions, and aspirations.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Event planning and coordination'', ''Team leadership'', ''Basic graphic design (Canva)'', ''Social media content creation'', ''Microsoft Office
    proficiency'', ''Time management'', ''Basic first aid'']'
  hobbies: '[''Soccer'', ''Mexican folkloric dance'', ''Cooking Mexican cuisine'', ''Volunteering at community center'', ''Creating TikTok videos about local culture'', ''Listening to science podcasts'',
    ''Organizing neighborhood clean‑up events'']'
  career_goals: Illiana aims to pursue a career that merges her community‑focused spirit with her organizational strengths. She plans to attend a community college to study nursing or health administration,
    intent on becoming a community health advocate for underserved Mexican‑American neighborhoods in the Gulf Coast region. Long‑term, she hopes to launch a nonprofit that delivers preventive health education
    and resources, leveraging her logistical and event‑management abilities to maximize impact. She also keeps an eye on opportunities in logistics or public‑service project coordination, where her competitive
    drive and pragmatic curiosity can thrive.
