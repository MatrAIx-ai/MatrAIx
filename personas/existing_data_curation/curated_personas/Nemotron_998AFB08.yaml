  career_goals: Marcelo aims to attend a high‑performing STEM‑focused high school, followed by a top‑tier university where he can major in mechanical or aerospace engineering. He is driven to apply his
    technical skills to real‑world challenges, such as designing energy‑efficient transportation systems or building autonomous drones for environmental monitoring. His organizational nature pushes him
    to seek roles that require meticulous planning and precision, like project management in engineering firms or research and development teams. Marcelo also hopes to mentor younger students in his community,
    sharing his love for coding and robotics through after‑school clubs. In the long term, he envisions leading interdisciplinary projects that blend data analytics, engineering, and sustainability, while
    maintaining a work‑life balance that allows him to continue his personal learning pursuits.
