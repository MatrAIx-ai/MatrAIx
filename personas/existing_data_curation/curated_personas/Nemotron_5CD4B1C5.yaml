    & Expense Reporting'', ''Meeting & Event Coordination'', ''Professional Correspondence'', ''Workflow Optimization'']'
  hobbies: '[''Cooking Dominican Cuisine'', ''Listening to Merengue and Bachata'', ''Gardening (herbs and flowers)'', ''Church Choir Participation'', ''Community Volunteer Work (Youth Center)'', ''Reading
    Romance Novels'', ''Knitting'', ''Walking in Local Parks'']'
  career_goals: Yvonne aims to advance to an Office Manager or Executive Assistant role where she can oversee a small team and implement best‑practice administrative processes. She plans to obtain the Certified
    Administrative Professional (CAP) credential and explore advanced training in project‑management software to broaden her skill set. Long‑term, she hopes to transition into a specialized administrative
    position in a healthcare or nonprofit setting that aligns with her community‑focused values. A key personal ambition is to mentor younger clerical staff, sharing her organized methods while maintaining
    a stable, low‑stress work environment that supports her family responsibilities and eventual early retirement.
