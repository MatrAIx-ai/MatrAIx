persona_description: A veterinarian who specializes in the treatment of small mammals, particularly ferrets, and is experienced in the management of diabetic animals. They have a deep understanding of the
  biology and behavior of ferrets and are skilled in the use of IV fluids, dextrose, and other medications to treat liver damage and other complications associated with xylitol poisoning. They are also
  knowledgeable about the risks and dangers of human foods that can cause serious problems in small mammals, such as raisins, grapes, and chocolate, and are trained to avoid accidental poisoning.
