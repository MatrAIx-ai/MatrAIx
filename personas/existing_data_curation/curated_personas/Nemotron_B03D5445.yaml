  hobbies: '[''Soccer'', ''Hiking'', ''Cooking Mexican Cuisine'', ''Community Volunteering'', ''Reading Historical Fiction'', ''Playing Guitar'', ''Traveling'', ''Exploring Educational Technology'']'
  career_goals: Rudy aims to become a department head for the Language Arts program, where he can expand the bilingual curriculum and foster cross-cultural competencies school-wide. He plans to earn a master’s
    degree in Educational Leadership to qualify for an assistant principal role. Additionally, he wants to launch a community-based mentorship program that connects local Mexican-American families with
    the school to improve student engagement and academic outcomes. His competitive nature drives him to be recognized as a top-performing teacher, earning district awards and presenting his instructional
    innovations at regional conferences.
