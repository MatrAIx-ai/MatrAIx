personas:
  professional: Elizbeth Shine, an enterprising middle school student, blends their love for structured competition and strategic thinking into a budding role as the school’s chess club co‑captain, where
    their practical mindset and reliability keep the team organized and focused.
  sports: Elizbeth Shine, a forward on the Oakridge U11 girls soccer team, drills after school to emulate Megan Rapinoe, follows the Portland Thorns FC matches every weekend, and also enjoys weekend pick‑up
    basketball games at the community center, balancing competitive drive with structured team practice.
  arts: Elizbeth Shine fills their journal with charcoal sketches reminiscent of Shaun Tan’s whimsical worlds, rereads Nancy Drew mysteries by Carolyn Keene for plot twists, and unwinds to the pop beats
    of Billie Eilish while occasionally humming the choruses of Taylor Swift’s ‘Shake It Off’.
  travel: Elizbeth Shine, who has toured the Grand Canyon on a school field trip and spent two weeks camping in Yellowstone with their family, now dreams of exploring Tokyo’s bright districts and the historic
    castles of Edinburgh, favoring itineraries crafted by their parents but always leaving room for a surprise nature hike.
  culinary: Elizbeth Shine favors classic comfort foods—cheese‑laden pizza, buttery mac and cheese, and peanut‑butter‑banana smoothies—can whisk together a decent batch of scrambled eggs, and proudly claims
    to have mastered the art of folding a perfect empanada with the help of their mom’s seasoned salsa.
  core: Elizbeth Shine is a detail‑oriented, competitively spirited pre‑teen who channels their worries into chess strategy, soccer drills, and sketching, while juggling a tight allowance and a love for
    mystery novels.
background:
  cultural: Elizbeth is a white American growing up in Norman, Oklahoma, a city with strong ties to the University of Oklahoma and a vibrant community life. Her family follows typical mid‑Midwestern values—emphasizing
    school involvement, community service, and regular participation in local traditions such as the Oklahoma State Fair and Friday night football gatherings. She attends a public elementary school, celebrates
    national holidays and regional customs, and is exposed to a blend of suburban family life, church activities, and the collaborative spirit of a close‑knit neighborhood.
