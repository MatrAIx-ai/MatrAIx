  career_goals: Elizbeth aims to maintain top grades throughout middle school and hopes to become student‑council president, which would let her apply her organizational talents. She dreams of a future
    career as a veterinarian, drawn by the practical, science‑based work of caring for animals, and she plans to volunteer at the local animal shelter and pursue advanced science courses. She also considers
    a role in community service, such as a police officer or firefighter, because they offer clear structure, responsibility, and the chance to help others.
