  hobbies: '["Vegetable gardening", "Mexican cooking", "Playing guitar", "Dancing to cumbia and ranchera music", "Senior center bingo", "Volunteering at the local food pantry", "Fishing on the Columbia
    River", "Evening walks", "Attending community fairs", "Storytelling"]'
  career_goals: Although retired, Lino aims to stay actively engaged by leading cultural workshops that teach Mexican cooking and folklore to the Connell community, mentoring younger volunteers at the senior
    center, and preserving his family’s stories in a small memoir. He hopes to maintain a regular health‑focused routine that balances his love of gardening and walking, and he plans occasional trips to
    Mexico to reconnect with extended family and bring back new culinary ideas. His broader ambition is to be remembered as a bridge between his Mexican heritage and the Pacific Northwest, fostering understanding
    and shared celebration.
