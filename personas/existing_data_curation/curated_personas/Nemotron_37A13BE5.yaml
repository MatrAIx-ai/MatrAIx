personas:
  professional: Lino Leon, a retired hands‑on community facilitator, leverages their carpentry, gardening, bilingual translation, and event‑coordinating skills to lead cultural cooking workshops, mentor
    senior‑center volunteers, and preserve local stories, balancing a practical, structured outlook with a relaxed approach to scheduling.
  sports: Lino Leon enjoys seasonal fishing with the Columbia River Anglers Club, walks the irrigation canals for low‑impact cardio, and roots for the Seattle Seahawks, Seattle Mariners, and Washington
    State Cougars, often joining local senior league shuffleboard sessions while they cheer loudly from the sidelines.
  arts: Lino Leon serenades family gatherings with acoustic guitar renditions of classic cumbia and ranchera tunes inspired by artists like Los Tigres del Norte and Celia Cruz, while they also dance at
    community festivals and curate a small collection of folk storytelling recordings.
  travel: Lino Leon prefers loosely planned road trips that blend structured itineraries with spontaneous detours, favoring destinations such as the historic town of León, Guanajuato for family visits,
    the Columbia River Gorge for photography, and local fairs like the Washington State Fair to later share new recipes and stories while they savor each stop's unique flavor.
  culinary: Lino Leon experiments with traditional dishes such as tamales, posole, and mole verde, sourcing heirloom corn and chilies from his garden, and delights in cooking rearranged family recipes while
    they occasionally over‑simmer sauces, a quirk that leads to flavorful 'crispy‑bottom' variations.
  core: Lino Leon is a 69‑year‑old energetic community storyteller who bridges generations through gardening, cooking, guitar, and modest frugality, balancing structured routines with a laid‑back love of
    spontaneous celebration while they keep a lively smile on every face.
background:
  cultural: Lino was born in Washington to Mexican immigrant parents and grew up bilingual, navigating the traditions of his heritage alongside the rural life of the Pacific Northwest. He celebrates Día
    de los Muertos, Mexican Independence Day, and local harvest festivals, often preparing traditional foods for both his family and neighbors. His Mexican roots influence his music preferences, cooking
    style, and storytelling, while his long residence in Connell, WA, has woven in a deep appreciation for the region’s agricultural rhythms and communal values. Acting as a cultural ambassador, he frequently
    shares Mexican customs with his community and helps preserve them for future generations.
attributes:
  skills: '["Basic carpentry", "Home repairs", "Gardening", "Traditional Mexican cooking", "Spanish language proficiency", "Community event coordination", "Conflict mediation", "Storytelling", "Basic automotive
