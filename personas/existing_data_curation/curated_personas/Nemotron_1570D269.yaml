    historical fiction'']'
  career_goals: Although retired from formal employment, Rose is driven to expand her impact as a volunteer coordinator at the local senior center. She aims to design structured, sustainable programs that
    foster social interaction and lifelong learning for seniors, such as organized fitness classes, educational workshops, and intergenerational mentorship initiatives. Rose also aspires to document oral
    histories of older African‑American residents, preserving community heritage while establishing a modest scholarship fund for local Black high‑school students pursuing higher education.
