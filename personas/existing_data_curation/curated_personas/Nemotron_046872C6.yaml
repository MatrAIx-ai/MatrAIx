personas:
  professional: Claudette Atencio, a senior technology manager with two decades of experience, leverages her STEM analytical rigor and design‑thinking curiosity to drive digital transformation projects,
    orchestrating cross‑functional teams through Agile and Waterfall frameworks while championing interdisciplinary collaboration and mentorship for women in STEM.
  sports: Claudette Atencio fuels her love for the outdoors by hiking the Red Rock Trail, rock climbing at Camelback Mountain, and cheering on the Arizona Cardinals and Phoenix Suns, while participating
    in the local Phoenix Hiking Club’s monthly group outings.
  arts: Claudette Atencio immerses herself in the arts by curating watercolor series inspired by the Sonoran desert, attending exhibitions at the Phoenix Art Museum, collecting limited‑edition prints from
    contemporary photographer Sebastião Salgado, and volunteering as a mentor at youth art workshops, all while quoting the works of Frida Kahlo and Georgia O’Keeffe.
  travel: Claudette Atencio blends meticulous planning with spontaneous flair, having trekked the Sahara for a desert photography project, experienced the Venice Biennale and Documenta in Kassel, and frequently
    retreats to Sedona for yoga‑focused getaways, while budgeting her travel through a dedicated fund.
  culinary: Claudette Atencio delights in crafting Mediterranean‑inspired dishes such as herb‑crusted lamb with pomegranate glaze, pairing them with crisp Pinot Grigio or bold Malbec, and showcases her
    culinary prowess at the elaborate dinner parties she hosts, often sourcing fresh avocado and Oaxaca cheese for vibrant guacamole.
  core: Claudette Atencio is a charismatic, art‑loving tech leader who balances analytical precision with creative spontaneity, turning every project, party, and hike into a collaborative masterpiece.
background:
  cultural: Claudette was raised in a middle-class, predominantly white suburban community in the Midwest, with family roots tracing back to Irish and German ancestry. Her upbringing emphasized self-reliance,
    community service, and a strong work ethic. Relocating to Glendale, Arizona introduced her to the Southwest's unique cultural blend, where she has embraced the desert lifestyle, local Native American
    art influences, and the vibrant Hispanic culinary scene. This multicultural exposure has deepened her appreciation for diverse perspectives and informs her inclusive approach both at work and in her
    personal life.
