  career_goals: Claudette aims to transition into senior executive leadership, targeting roles such as Director of Operations or Vice President of Innovation within a forward-thinking technology firm. She
    wants to spearhead digital transformation initiatives that blend cutting-edge tech with creative design, fostering a culture of interdisciplinary collaboration. Mentorship is a priority; she plans to
    establish a structured mentorship program for emerging women leaders in STEM. Ultimately, she envisions launching her own consultancy that helps organizations integrate artistic thinking into product
    development and problem-solving processes, while also championing inclusive workplace practices.
