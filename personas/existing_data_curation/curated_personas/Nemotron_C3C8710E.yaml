  career_goals: Virgil dreams of becoming a mechanical engineer or robotics designer, hoping to create machines that solve everyday problems. He also entertains the idea of playing soccer at the collegiate
    level, aiming for a scholarship. He plans to pursue advanced STEM courses in middle and high school, and eventually attend a university known for engineering and robotics. His competitive drive pushes
    him to set short‑term goals like winning his school's robotics competition and earning a spot on the varsity soccer team.
