personas:
  professional: Rena Lomax turns the retail floor into a lively stage, using their charismatic, talkative style to build instant rapport with shoppers while aggressively upselling and cross‑selling, and
    despite a relaxed, sometimes disorganized approach to inventory they reliably mediate colleague conflicts and coach new hires with a competitive drive toward high performance.
  sports: Rena Lomax enjoys Saturday morning community yoga sessions and pick‑up volleyball games at the local recreation center, while passionately cheering for the nearby NFL team the Atlanta Falcons
    and the NBA’s Atlanta Hawks, and they keep a modest fitness routine to balance their high‑energy social lifestyle.
  arts: Rena Lomax’s artistic side shines through their role as emcee at festivals and choir member, while they unwind with karaoke renditions of classic soul hits from Aretha Franklin and contemporary
    pop from Beyoncé, and they devour mystery novels by Tana French and true‑crime podcasts such as Serial.
  travel: Rena Lomax prefers short, socially‑driven getaways that blend culinary exploration and live music, such as weekend trips to New Orleans for its jazz scene and gumbo, and a nostalgic road‑trip
    to Savannah’s historic squares, often orchestrating group itineraries on a modest budget while juggling work commitments.
  culinary: Rena Lomax experiments in the kitchen by marrying traditional Southern comfort foods—like fried chicken, collard greens, and peach cobbler—with global twists such as a gochujang‑glazed chicken
    and miso‑infused shrimp and grits, a skill level that sits between enthusiastic home cook and budding chef.
  core: Rena Lomax channels relentless curiosity and a talkative, competitive spirit into every social and professional setting, even as they juggle chronic worry, occasional disorganization, and a habit
    of procrastinating on paperwork while still turning each gathering into a high‑energy performance.
background:
  cultural: Rena grew up in a close‑knit African American community in Orangeburg County, where storytelling, music, and church were central to daily life. Her family traditions include celebrating holidays
    with soulful gospel and R&B, preparing meals that blend Southern comfort food with recipes passed down through generations, and participating in local events that honor Black heritage in the Lowcountry.
    These cultural roots shape her warm interpersonal style, her love for community-focused activities, and her commitment to uplifting the voices and crafts of fellow Black residents in her town.
attributes:
