  hobbies: '[''karaoke hosting'', ''church choir singing'', ''community event emceeing'', ''cooking experimental Southern cuisine'', ''yoga'', ''mindfulness meditation'', ''reading mystery novels'', ''listening
    to true‑crime podcasts'']'
  career_goals: Rena aspires to move from floor associate to store manager within the next two years, aiming to lead a team in her hometown store or a nearby regional branch. She dreams of one day overseeing
    multiple locations, using her people‑skills to foster a supportive, high‑energy environment. Long‑term, she envisions opening a boutique that showcases products from local Black artisans, blending her
    retail expertise with a desire to uplift her community. To support this trajectory, she plans to complete a business management certificate at a community college and seek mentorship from senior retail
    leaders.
