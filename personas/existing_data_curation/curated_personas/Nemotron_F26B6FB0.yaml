personas:
  professional: Nestor Forero, an organized and curious preschool architect, they meticulously arrange building blocks and puzzles into orderly structures, blending creative imagination with methodical
    planning while eagerly sharing their creations with peers.
  sports: Nestor Forero, a lively member of the Tiny Turtles preschool soccer club, they sprint across the field every Saturday morning, cheer loudly for the local MLS team Seattle Sounders, and organize
    mini‑relay games during recess, channeling their energetic sociability into team play while occasionally insisting on taking the ball.
  arts: Nestor Forero, an enthusiastic fan of Disney Pixar movies and The Wiggles, they spend afternoons drawing bright versions of Buzz Lightyear and humming favorite songs on a toy keyboard, eagerly joining
    group sing‑alongs that satisfy their outgoing nature and love for cooperative creativity.
  travel: Nestor Forero, a curious explorer who loves day trips to the city’s children’s museum and the nearby botanical garden, they keep a sticker map of visited spots, dream of family vacations to Disneyland
    Paris and the Grand Canyon, and often plan routes with crayons, balancing adventurous imagination with practical preparation.
  culinary: Nestor Forero, a picky yet adventurous eater, they adore buttery macaroni and cheese, strawberry‑yogurt parfaits, and can skillfully spread peanut butter on whole‑grain toast, often negotiating
    for extra carrot sticks after meals while occasionally refusing broccoli, reflecting a blend of culinary curiosity and stubborn taste preferences.
  core: Nestor Forero is a methodical, worry‑prone four‑year‑old who balances relentless curiosity with practical play, meticulous saving, health vigilance, and vibrant social energy, all while navigating
    the quirks of a young palate and big‑dream travel maps.
background:
  cultural: Nestor is raised in a bilingual Honduran‑American household in Fort Worth, Texas. He speaks both Spanish and English, often switching between the two languages at home and in community settings.
    His family celebrates Honduran traditions such as Día de la Independencia (September 15) and enjoys dishes like baleadas and pastelitos. He attends a local church that offers services in both languages,
    fostering a strong sense of community. The multicultural environment of Tarrant County, combined with his family's emphasis on family gatherings and respect for elders, shapes his social values and
    influences his love for group activities and cooperative play.
attributes:
  skills: '["Counting to twenty in English and Spanish", "Reciting the alphabet in both languages", "Following daily routines reliably", "Drawing basic shapes and figures", "Assembling simple puzzles and
