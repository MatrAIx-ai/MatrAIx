  hobbies: '["Playing tag and organized group games", "Participating in kids'' soccer", "Storytime circles at the library", "Building LEGO structures with step‑by‑step guides", "Listening to and dancing
    to Honduran folk music and English children''s songs", "Exploring nature, collecting and classifying leaves and rocks"]'
  career_goals: Inspired by his love for building and helping others, Nestor imagines a future where he becomes a community helper, such as a firefighter or a construction engineer. He aspires to one day
    design safe playgrounds for kids and to be part of a team that protects and supports his neighborhood. His desire for organization and reliability fuels an ambition to lead group projects, perhaps as
    a class captain or a young leader in community service activities.
