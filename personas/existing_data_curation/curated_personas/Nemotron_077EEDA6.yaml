personas:
  professional: Mui Kim is a high‑school sophomore who blends a solid foundation in Python and Scratch with a flair for manga‑style illustration, using tools like Procreate and Canva to prototype game concepts
    and digital posters, while leveraging their bilingual edge to translate ideas across English and Korean, and balancing a relaxed, sometimes disorganized workflow with a clear ambition to study computer
    science or interactive media and eventually become a UX designer or indie game developer.
  sports: Mui Kim joins a co‑ed soccer team at the local recreation center, cheers for the national women's soccer league and the Los Angeles Lakers during NBA season, hikes the nearby state park trails
    on weekends, and prefers casual fitness routines over strict training, balancing team camaraderie with a desire for solo outdoor exploration.
  arts: Mui Kim draws heavy inspiration from manga artists like Akira Toriyama and Studio Ghibli’s visual storytelling, curates playlists featuring BTS, Blackpink, and synth‑wave producer Com Truise, and
    often cites graphic novels by Neil Gaiman and the music of indie band Dayglow as fuels for their sketchbook sessions.
  travel: Mui Kim favors weekend road trips to Redwood National Park and family visits to the coastal town of Santa Cruz, while dreaming of a future solo adventure to Tokyo’s Akihabara district and the
    historic streets of Kyoto, planning trips with a mix of spontaneous spontaneity and careful budgeting to fit around school commitments.
  culinary: Mui Kim loves cooking family recipes such as kimchi fried rice and bulgogi, skillfully handling ingredients like gochujang, sesame oil, and garlic, experiments with ramen broth and spicy tofu
    stew, and enjoys pairing meals with bubble tea or homemade bingsu, though they sometimes forget to clean up the kitchen after a cooking spree.
  core: Mui Kim is a curious, laid‑back teen who fuses code and comics into vibrant digital worlds, juggling school, gaming, and occasional chaos with a splash of artistic spontaneity.
background:
  cultural: Mui is a second‑generation East Asian American, with Korean heritage, raised in Lewisville, Texas. At home, Korean language, cuisine, and traditions such as Chuseok and Lunar New Year are celebrated,
    while she also embraces typical Texan customs like attending local football games and enjoying barbecue. This bicultural upbringing gives her a flexible worldview that values both the collective family
    orientation of Korean culture and the individualistic, opportunity‑driven aspects of American life. She participates in the local Korean community center’s cultural events and integrates these experiences
    into her school projects and personal creative work.
