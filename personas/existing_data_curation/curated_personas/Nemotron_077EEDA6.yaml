  career_goals: Mui envisions pursuing a career that blends her love for technology and visual storytelling. She aims to study computer science or interactive media in college, with the long‑term goal of
    becoming a user experience (UX) designer or game developer who creates culturally inclusive digital experiences. She also hopes to leverage her bilingual abilities to work on projects that bridge East
    Asian and American audiences, perhaps through localization or community outreach programs that teach coding to underrepresented youth. Securing a scholarship that recognizes both academic promise and
    community involvement is a key milestone in her plan.
