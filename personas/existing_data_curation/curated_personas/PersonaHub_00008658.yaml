persona_description: An individual interested in improving indoor air quality in their home or workplace. They are likely to be a professional in the field of indoor air quality, such as a building engineer,
  HVAC technician, or environmental scientist. They are interested in learning about the causes of indoor quality deterioration and how to fix the problem, and they are seeking information on IAQ topics
  such as sick building syndrome, mold, fungi, air duct cleaning, ozone generators, and ventilation rates. They are also interested in reading about projects, publications, and staff at organizations such
  as the Quality Council and Consultants, Inc. They may be looking for information on reducing indoor air pollution, and they are familiar with sources of indoor air pollution and what they can do about
  them. They are also interested in the research being performed at the Lawrence Berkeley National Laboratory and the Institute, and they may be interested in participating in professional training, testing,
  and credentials in air quality and mold remediation fields.
