    User 2: Oh, that''s cool! I''ve never met a dental hygienist before.

    User 1: Me neither! I''m the only one in my family who''s going into the medical field.

    User 2: That''s pretty cool. Do you have any tattoos?

    User 1: I have a rose tattooed on my right ankle and thorns tattooed on my toes.

    User 2: Oh, that''s cool! I''ve never seen tattoos like that before.

    User 1: Thanks! I''m pretty happy with them.

    User 2: I can imagine. They look really good.

    User 1: Thanks!

    User 2: Do you have any siblings?

    User 1: No, I''m an only child.

    User 2: Oh, that must be lonely sometimes.

    User 1: It can be, but I also like being by myself.

    User 2: That''s fair. I''m an only child too, so I know what you mean.'
