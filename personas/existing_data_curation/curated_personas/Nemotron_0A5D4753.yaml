  hobbies: '[''Amateur basketball league'', ''Community softball games'', ''Hiking Appalachian trails'', ''Fishing in local streams'', ''Barbecue grilling and tailgating'', ''Watching NFL games'', ''Volunteer
    at local food bank'', ''Church youth group activities'', ''Multiplayer video gaming'', ''Truck restoration projects'']'
  career_goals: Alexander aims to advance from a stocker to a supervisory role within the next two to three years, seeking a shift lead position that allows him to train new staff and oversee daily operations.
    He plans to obtain certifications such as forklift operation, OSHA safety, and APICS CPIM to strengthen his credentials. In the longer term, he aspires to become a warehouse manager or logistics coordinator,
    eventually leveraging his experience to manage a regional distribution center or start his own small retail business in Glade Spring. His goals are grounded in stable, practical career progression that
    supports future family plans and financial security.
