  career_goals: Mark aims to move beyond entry‑level packing to a supervisory role within the next few years, hoping to become a shift lead or logistics coordinator. He plans to earn additional certifications
    in supply‑chain management and automation technology, and he is interested in learning about warehouse robotics and data‑driven inventory optimization. Ultimately, he envisions managing his own small
    fulfillment operation or starting a service that helps local businesses streamline their shipping processes, combining his practical experience with his curiosity about new logistics solutions.
