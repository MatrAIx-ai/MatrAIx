  hobbies: '[''LEGO building'', ''Reading picture and early chapter books'', ''Drawing wildlife and nature'', ''Exploring desert trails'', ''Gardening with family'', ''Learning Scratch coding'', ''Participating
    in after‑school cooperative club'']'
  career_goals: Alana imagines a future where she can combine her love for helping others with her curiosity about living things. She dreams of becoming a veterinarian, caring for animals in her community,
    or a teacher who creates a compassionate, organized classroom where every child feels supported. She also hopes to volunteer at local animal shelters and participate in school outreach programs that
    teach younger children about kindness and nature.
