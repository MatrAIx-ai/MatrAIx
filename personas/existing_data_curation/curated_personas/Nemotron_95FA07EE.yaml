personas:
  professional: Alana Lusk, a seven‑year‑old LEGO architect, channels their methodical planning and curiosity into building intricate desert‑scape models while they lead their after‑school Scratch club
    to create interactive stories for friends.
  sports: Alana Lusk enjoys weekend hikes on the nearby desert trails, cheers on the Phoenix Suns and Arizona Diamondbacks, and they participate in the local “Desert Rangers” youth soccer league where they
    practice organized passing drills.
  arts: Alana Lusk fills sketchbooks with detailed wildlife drawings inspired by John James Audubon, rereads picture books by Mo Willems, and they hum the tunes of Disney’s “Moana” soundtrack while crafting
    LEGO landscapes.
  travel: Alana Lusk’s travel cravings blend desert adventure with family outings, having explored the Grand Canyon’s rim, visited the nearby Pueblo Museum, and they dream of a future trip to the coastal
    dunes of Baja California.
  culinary: Alana Lusk loves snapping fresh cherry tomatoes from the garden for homemade salsa, enjoys assembling cheesy quesadillas with avocado slices, and they proudly prepare “no‑bake” oatmeal cookie
    bars for their after‑school club.
  core: Alana Lusk is a curious, organized seven‑year‑old whose love for LEGO, desert hikes, and community garden fuels a compassionate drive to create, share, and learn, even if they sometimes forget to
    finish a story before bedtime.
background:
  cultural: Alana was raised in Albuquerque, New Mexico, in a white family that embraces the multicultural spirit of the Southwest. Her household celebrates traditional American holidays such as Thanksgiving
    and the Fourth of July, while also partaking in local customs like the International Balloon Fiesta and community festivals that feature Spanish music, dance, and foods such as green‑chile roasted corn.
    She has been introduced to basic Spanish greetings at school and has learned about the region's Native American heritage through museum visits and storytelling. This blend of regional influences nurtures
    her appreciation for diversity, community harmony, and a practical, outdoors‑oriented lifestyle.
