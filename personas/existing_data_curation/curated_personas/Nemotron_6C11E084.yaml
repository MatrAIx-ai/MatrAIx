personas:
  professional: Noel Aburto, a 42‑year‑old bilingual community organizer and aspiring program coordinator, blends practical budgeting, event‑planning expertise, and emerging digital‑marketing skills with
    a calm, reliable demeanor that balances curiosity for new nonprofit strategies and a steadfast, organized approach to volunteer coordination.
  sports: Noel Aburto enjoys staying active with salsa dancing classes, weekly yoga sessions, and evening walks with the local community garden club, while rooting for the Philadelphia Eagles and the Philadelphia
    Flyers, embodying a balanced, low‑impact fitness routine that blends social activity with personal wellness.
  arts: Noel Aburto immerses themselves in contemporary fiction by authors such as Isabel Allende and Ocean Vuong, explores poetry by Julia de Burgos, attends local theater productions featuring works by
    Lin‑Manuel Miranda, and channels creativity into quilting projects inspired by the patterns of Frida Kahlo’s paintings.
  travel: Noel Aburto prefers purposeful travel that merges cultural immersion with family‑friendly budgeting, having explored New York City’s museum districts, taken a weekend road trip to the Pocono Mountains,
    and dreaming of a future culinary tour of Spain’s coastal towns while balancing time constraints and modest savings.
  culinary: Noel Aburto delights in crafting island‑inspired dishes like mofongo, arroz con gandules, and crispy tostones, skillfully balances traditional spice blends with modern twists such as quinoa‑infused
    rice, and frequently sources fresh herbs and plantains from the local farmer’s market, reflecting an intermediate cooking proficiency paired with a love for experimental flavors.
  core: Noel Aburto is a community‑driven, bilingual organizer who balances practical budgeting with a zest for cultural cooking, yoga, and volunteerism, while occasionally indulging in kitchen gadget splurges
    and skipping dental check‑ups.
background:
  cultural: Noel was raised in a bicultural Puerto Rican household that valued both Caribbean traditions and the opportunities of life in Philadelphia. Fluent in Spanish and English, she maintains close
    ties with the local Puerto Rican diaspora, regularly attending community events such as the San Sebastián Street Festival and the annual Noche de San Juan celebration. Her upbringing emphasized family
    cohesion, respect for cultural heritage, and a strong sense of community service, which continue to shape her personal identity, social connections, and professional aspirations.
attributes:
  skills: '["Event planning", "Community outreach", "Bilingual communication (English/Spanish)", "Budgeting and financial management", "Household management", "Microsoft Office proficiency", "Social media
    coordination", "Culinary arts (traditional Puerto Rican cuisine)", "Volunteer coordination", "Basic graphic design"]'
  hobbies: '["Cooking traditional Puerto Rican dishes", "Salsa dancing", "Community gardening", "Reading contemporary fiction and poetry", "Participating in cultural festivals", "Volunteering at local senior
    center", "Quilting", "Yoga"]'
  career_goals: Noel aims to re‑enter the workforce part‑time by leveraging her event‑planning and community‑service experience into a role as a program coordinator for a nonprofit serving Latino families
    in Philadelphia. She plans to complete a certificate in nonprofit management and deepen her digital marketing skills through online courses. Long‑term, she dreams of launching a home‑based catering
    venture featuring authentic Puerto Rican dishes, while also mentoring youth in cooking and cultural heritage programs. Her goals balance practical sustainability with her curiosity about new community‑development
    strategies.
