  hobbies: '[''Visiting Art Museums'', ''Digital Photography'', ''Reading Contemporary Fiction'', ''African-American Literature'', ''Journaling'', ''Cooking (Southern and Caribbean Cuisine)'', ''Yoga'',
    ''Mindfulness Meditation'', ''Knitting'', ''Jigsaw Puzzles'', ''Nature Walks in the Pinelands'']'
  career_goals: Patrina aims to leverage her extensive customer service experience and organizational expertise to move into a supervisory or quality‑assurance role within a contact‑center environment.
    She plans to pursue a bachelor’s degree in Business Administration or Communications within the next two years, with the goal of leading a team that focuses on improving service quality and employee
    wellbeing. Simultaneously, she wishes to develop a side project as a freelance art‑content creator, curating online galleries and writing articles that highlight emerging Black artists. Her long‑term
    ambition is to combine her passion for art and service by establishing a community outreach program that provides art workshops for youth in Burlington County, fostering creative expression while maintaining
    a balanced, low‑stress work schedule.
