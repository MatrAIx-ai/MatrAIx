  career_goals: Raquel aspires to move from senior designer to creative lead, eventually directing a multidisciplinary studio that blends Mexican cultural heritage with modern branding. She aims to spearhead
    projects that promote inclusive design, mentor junior designers, and expand her portfolio to include experiential and digital installations. In the next five years, she plans to earn a certification
    in user experience research, build a strong network in the Bay Area design community, and launch a side venture offering culturally‑informed branding services for small businesses in the Central Valley.
