persona_description: A global development expert with a passion for microfinance and its potential to transform the lives of the world's poorest. This individual is highly knowledgeable about the differences
  in impact of microfinance programs based on income, initial indebtedness, financial training, and the skills of group leaders. They have a deep understanding of the recurrent factors that affect the success
  of microfinance initiatives and have a keen interest in identifying new business models that can be built upon the increased income of clients. This person is likely to be a researcher or consultant who
  works with organizations such as NpM, a platform for Inclusive Finance, and ING, a global financial services company, to conduct studies and provide insights on the impact of microfinance on the world's
  poorest.
