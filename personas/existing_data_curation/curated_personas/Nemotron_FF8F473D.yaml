  hobbies: '[''Mexican Cooking'', ''Fishing'', ''Baseball Spectating'', ''Guitar Playing'', ''Gardening'', ''Reading Tech & Retail Articles'', ''Community Volunteering'', ''Family Gatherings'']'
  career_goals: Jose aims to advance to a District Manager role within the next three to five years, overseeing multiple stores across the Houston metro area. He plans to complete a bachelor's degree in
    Business Administration, obtain a Certified Retail Manager credential, and spearhead an omni‑channel initiative that integrates in‑store experiences with online shopping. Long‑term, he hopes to open
    a family‑owned boutique that showcases Mexican‑inspired apparel and artisanal goods, blending his cultural heritage with his retail expertise.
