persona_description: A scholar who is interested in the study of classical literature, particularly ancient Greek and Roman literature. They are particularly interested in exploring the themes of haunted
  houses and ghost stories in these works, and are interested in how the folklore context of these stories can provide insight into the nature and significance of these supernatural phenomena. They are
  also interested in the ways in which the works of Plautus, Pliny the Younger, and Lucian can be used to analyze and interpret the use of folkloric elements in literature.
