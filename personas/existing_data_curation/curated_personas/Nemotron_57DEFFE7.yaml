personas:
  professional: Juanita Adams, a one-year-old budding cognitive explorer, displays early pattern-recognition and fine-motor coordination as she repeatedly stacks colorful rings; they embody a strong preference
    for routine in playtime while maintaining a relaxed, flexible attitude toward spontaneous interruptions, and occasionally assert themselves by refusing to share their favorite toy.
  sports: Juanita Adams, a one-year-old who enthusiastically attends the Tiny Tots Gym's parent-and-baby gymnastics class, loves to chase a soft orange ball at the community park, and curls up during family
    evenings to watch the Chicago Cubs on television; they demonstrate a playful blend of routine activity and occasional bursts of sport fandom.
  arts: Juanita Adams, a one-year-old who eagerly sways to Stevie Wonder's 'Isn't She Lovely', giggles at Sesame Street's Elmo, and mimics simple dances from Cocomelon videos; they weave familiar musical
    and visual cues into daily routines, reflecting a soothing yet curious artistic palette.
  travel: Juanita Adams, a one-year-old who finds wonder in short family road trips to the neighborhood playground, cherishes the recent sensory overload of Disney World's Magic Kingdom, and dreams of future
    visits to the Grand Canyon's vast vistas; they balance a love for familiar surroundings with occasional cravings for new, stimulating environments.
  culinary: Juanita Adams, a one-year-old who prefers smooth sweet-potato puree, creamy avocado mash, and banana slices, delights in the bright orange of carrot puree seasoned lightly with thyme, and, while
    unable to cook themselves, watches the kitchen hum as their caregiver stirs a garlic-infused tomato soup; they show a strong attachment to familiar textures and flavors.
  core: Juanita Adams, a one-year-old who thrives on familiar routines, balances gentle curiosity with occasional assertiveness, and navigates their tiny world with a blend of flexibility and order, even
    if they sometimes fuss over bedtime.
background:
