  hobbies: '["Painting (Acrylic/Watercolor)", "Sketching & Figure Drawing", "Photography (Nature & Urban)", "Reading (Science Fiction, Philosophy)", "Model Kit Building", "DIY Home Improvement Projects",
    "Woodworking Projects", "Acoustic Guitar Playing", "Listening to Jazz and Classical Music", "Attending Local Art Fairs", "Volunteering at Community Makerspace", "Hiking in Perkiomen Valley", "Gardening",
    "Exploring Abstract Art Exhibitions"]'
  career_goals: Evan aims to transition from full‑time shop floor work to a hybrid role that blends his fabrication skills with his artistic interests. He plans to obtain a Level II CNC Machinist certification
    and take evening courses in advanced CAD modeling, enabling him to design custom metal art pieces and small‑scale furniture. Over the next five years he hopes to launch a boutique workshop in Perkiomenville
    where he creates commissioned sculptural objects and offers maker‑space classes to the local community. Concurrently, Evan wants to formalize a mentorship program at his current plant, passing on his
    craft to younger apprentices before gradually scaling back to part‑time consulting and creative projects as he approaches retirement.
