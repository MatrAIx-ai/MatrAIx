personas:
  professional: Sean Shanken, a 20‑year‑old Business Administration student, leverages strong interpersonal communication, Excel data‑tracking, and event‑planning experience to lead campus service projects
    with a practical, structured yet flexible approach that values teamwork and community harmony.
  sports: Sean Shanken stays active through pickup basketball, intramural soccer, and weekend hikes on the Blue Ridge Trail, proudly supports the Chicago Bulls and follows the local university’s soccer
    team while occasionally training at the community center’s indoor gym.
  arts: Sean Shanken’s artistic side shines during game‑night playlists featuring Arctic Monkeys, Fleetwood Mac, and The Strokes, occasional trips to indie film screenings, and DIY carpentry projects that
    blend functional design with a love for vintage aesthetics.
  travel: Sean Shanken prefers budget‑friendly road trips, having explored Shenandoah National Park, the historic streets of Asheville, and a spontaneous weekend in Portland, Oregon, planning each adventure
    on spreadsheets while balancing school credits and part‑time work.
  culinary: Sean Shanken enjoys cooking simple yet satisfying meals like grilled salmon with lemon‑herb quinoa, pepperoni pizza on homemade dough, and avocado toast topped with poached eggs, favoring fresh
    ingredients such as salmon, avocado, quinoa, and a dash of red‑pepper flakes.
  core: Sean Shanken blends a love for structure, community service, and spontaneous creativity, often juggling spreadsheets, basketball courts, and late‑night game nights while occasionally sacrificing
    sleep for the next project.
background:
  cultural: Sean comes from a Midwestern white American background, with family roots that trace back to German and Irish ancestry common in the region. Growing up in Oxford, Ohio, he was shaped by the
    town’s emphasis on community ties, self‑reliance, and a strong work ethic. His upbringing balanced practical values with a supportive, cooperative family environment, fostering his sociable nature and
    his commitment to helping others.
