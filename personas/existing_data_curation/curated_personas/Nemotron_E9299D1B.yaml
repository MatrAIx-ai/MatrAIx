  career_goals: Sean aims to complete a Bachelor’s degree in Business Administration, building on his practical mindset and organizational strengths. He envisions a career in operations or project management
    within a regional manufacturing or logistics company, where he can combine his love for structure with people‑focused leadership. Long‑term, he hopes to attain a supervisory role that offers stability,
    the ability to mentor others, and opportunities to contribute to community development initiatives in his hometown.
