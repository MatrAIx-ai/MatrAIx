personas:
  professional: Brian Powell, a 26-year-old industrial production manager in Las Vegas, blends hands-on manufacturing expertise in lean, SAP and PowerBI with an artist's eye for detail, using their curiosity
    and outgoing nature to coach cross-functional teams while occasionally letting flexible, disorganized planning delay projects.
  sports: Brian Powell fuels their energy by joining pick-up basketball games at Sunset Park, trekking the trails of Red Rock Canyon on weekends, cheering the Vegas Golden Knights and Raiders, yet they
    often forget to hydrate and occasionally miss a workout when their spontaneous social schedule overwrites their gym plan.
  arts: Brian Powell immerses themselves in Las Vegas's neon-lit contemporary art scene, from gallery openings featuring works by Kehinde Wiley to street-art tours spotlighting Banksy-style murals, and
    evenings listening to Tame Impala or Kamasi Washington while snapping urban photographs, using improv comedy workshops to sharpen their quick-thinking creative edge.
  travel: Brian Powell prefers spur-of-the-moment road trips to the Grand Canyon or Sedona, occasionally jet-setting to Tokyo's Maker Faire for tech inspiration, balancing a love for adventure with a modest
    travel budget that they stretch using airline points and last-minute deals.
  culinary: Brian Powell enjoys experimenting in the kitchen, whipping up chipotle-pineapple shrimp tacos, harissa-marinated pork ribs, and saffron-infused paella, relying on fresh cilantro, sumac, and
    poblano peppers, and their intermediate cooking skills are showcased during weekend dinner parties where they often over-season but delight guests with bold flavors.
  core: Brian Powell is a curiosity-driven production manager who blends art, tech, and social energy into a flexible, sometimes chaotic lifestyle marked by spontaneous splurges, occasional health neglect,
    and a relentless drive to make factories as vibrant as the neon streets they love.
background:
  cultural: Brian identifies as a white American with a Midwestern, working‑class upbringing that emphasized diligence, independence, and community involvement. His family valued practical skills and hands‑on
    learning, which guided his early interest in industrial technology. Relocating to Las Vegas exposed him to a diverse, entertainment‑driven environment where multicultural influences—ranging from Southwestern
    Native American art to vibrant Hispanic festivals—have broadened his cultural perspective. He blends his traditional American roots with the eclectic, artistic, and socially fluid vibes of the Nevada
    desert, fostering an appreciation for both pragmatic work ethic and creative, unconventional experiences.
attributes:
  skills: '[''Production planning'', ''Lean manufacturing principles'', ''Process optimization'', ''Team leadership and mentorship'', ''Inventory control'', ''Safety compliance'', ''Equipment troubleshooting'',
