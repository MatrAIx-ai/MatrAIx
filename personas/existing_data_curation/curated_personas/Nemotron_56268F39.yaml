  hobbies: '[''Visiting art galleries and live‑music shows'', ''Street photography'', ''Pickup basketball'', ''Hiking in Red Rock Canyon'', ''Experimental cooking'', ''Improv comedy workshops'', ''Listening
    to tech podcasts'', ''Attending maker fairs and cultural festivals'']'
  career_goals: Brian aims to deepen his technical credentials by earning a bachelor's degree in industrial engineering within the next two years and securing Six Sigma Black Belt certification. Over the
    next five years, he envisions moving into a plant manager role where he can lead larger operations and drive the adoption of sustainable, automated production systems. He also hopes to create a mentorship
    program that blends his love for collaborative environments with innovative problem‑solving, and eventually, he aspires to launch a consulting boutique that helps mid‑size manufacturers integrate lean
    and Industry 4.0 practices while fostering a culture of creativity and employee empowerment.
