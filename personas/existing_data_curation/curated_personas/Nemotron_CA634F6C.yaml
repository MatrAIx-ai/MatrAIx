  hobbies: '["Gardening","Quilting","Reading historical fiction","Listening to gospel music","Walking in local parks","Bird watching","Genealogy research","Community volunteering","Storytelling for children"]'
  career_goals: Although retired from formal employment, Gloria aims to turn her passions into lasting contributions to her community. She hopes to compile a family cookbook that preserves her mother’s
    recipes, launch a seasonal community‑garden program at the local church, and teach quilting workshops to younger women. She also aspires to mentor teenagers in her neighborhood, sharing life‑skills
    and cultural heritage, and to become a regular volunteer at the senior center, offering companionship and informal counseling. These goals reflect her desire to leave a tangible legacy while staying
    engaged, without the pressure of rigid schedules.
