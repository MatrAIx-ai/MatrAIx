persona_description: A researcher and anthropologist who specializes in the study of ancient indigenous cultures, particularly those from North America. She is particularly interested in the role of games
  in these societies and how they influenced their social, economic, religious, political, and health practices. Her research has focused on examining the diaries of Spanish explorers who arrived in Central
  Mexico and how they described a dice game played by the Aztecs, which led her to discover a similar game in Mesoamerica. Her expertise in archaeology, human ecology, and Mesoamerica has enabled her to
  conduct extensive research and analysis of the games played by ancient indigenous people throughout North America.
