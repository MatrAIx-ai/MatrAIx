    songs)'', ''birdwatching'']'
  career_goals: Leonor aims to stay an active, supportive presence at her workplace while transitioning into a mentorship role, guiding newer staff and sharing her efficient organizational methods. She
    aspires to deepen her involvement in the local Puerto Rican community by helping to organize cultural festivals, teaching traditional crafts, and preserving family recipes. Additionally, she plans to
    enroll in community‑college courses on digital photography and senior‑focused technology to satisfy her lifelong curiosity. Her overarching ambition is to leave a legacy of kindness, cooperation, and
    cultural pride, ensuring that her heritage and values are passed on to future generations.
