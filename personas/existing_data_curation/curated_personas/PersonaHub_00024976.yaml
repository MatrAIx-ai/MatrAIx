persona_description: A researcher and scientist who specializes in the field of neuroscience, particularly in the study of memory and the brain. They are interested in developing new therapeutic techniques
  to erase fear memories and are currently conducting a study at New York University. They believe that eventually, behavioral modification therapies could be developed to recall fearful memories and rewrite
  them in a similar way to how computer files are rewritten when new information is added to a file and saved again.
