  hobbies: '[''Gardening'', ''Traditional cooking'', ''Knitting and crocheting'', ''Walking in local parks'', ''Attending church services'', ''Reading historical magazines and local newspapers'', ''Listening
    to classic Vietnamese music'', ''Volunteering at the senior center'', ''Mindfulness breathing exercises'']'
  career_goals: Although no longer in the formal workforce, Truyen’s ambitions focus on leaving a lasting legacy of cultural knowledge and family cohesion. She aims to document family stories and recipes
    in a handwritten journal to share with grandchildren, mentor younger relatives in cooking and gardening, and continue volunteering at the local senior center to foster intergenerational connections.
    Maintaining her emotional well‑being is a priority; she seeks to cultivate calm through daily mindfulness breathing exercises, occasional counseling, and structured routines that reduce anxiety. She
    also hopes to support her husband’s health by coordinating their medical appointments and ensuring a steady, predictable home environment.
