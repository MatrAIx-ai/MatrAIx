  hobbies: '[''Pickup basketball'', ''Soccer'', ''Live music concerts'', ''Hiking'', ''Home brewing'', ''Cocktail experimentation'', ''Video gaming'', ''Food and travel shows'', ''Community festivals'',
    ''Charity fundraisers'']'
  career_goals: He aims to become a head bartender or bar manager within the next three to five years, mastering advanced mixology and leading a team. Long‑term, he dreams of opening his own bar or taproom
    that showcases Southern hospitality and local craft beverages, possibly paired with a small kitchen. He also considers obtaining a hospitality management certification to solidify his business skills.
