personas:
  professional: Harry Atkinson, a 24‑year‑old bartender with a knack for reading crowds and troubleshooting bar equipment, blends curiosity about emerging cocktail trends with practical cash‑handling precision,
    turning the chaotic rush of a weekend shift into an opportunity to experiment with flavor while keeping the floor organized enough for the team.
  sports: Harry Atkinson joins the downtown pickup basketball league and a co‑ed soccer squad, follows the Atlanta Hawks and Atlanta United with fervor, and caps off the week with a weekend hike in the
    Appalachian foothills to balance cardio with nature.
  arts: Harry Atkinson dives into live shows ranging from indie rock bands like The Black Keys at the local venue to jazz nights featuring Esperanza Spalding, and streams classic films by Wes Anderson for
    inspiration when crafting new cocktails.
  travel: Harry Atkinson prefers spontaneous road trips to nearby music festivals in Nashville and occasional backpacking adventures in Asheville’s Blue Ridge Mountains, but still dreams of a week‑long
    culinary tour of Barcelona’s tapas bars once their bar‑manager promotion finances allow.
  culinary: Harry Atkinson’s palate favors Southern comfort foods—smoked brisket, shrimp and grits, and a well‑balanced bourbon‑infused barbecue sauce—while their home‑brewing experiments often feature
    hibiscus, vanilla bean, and a dash of jalapeño for a spicy twist.
  core: Harry Atkinson is a sociable, curiosity‑driven bartender whose love of cocktail creativity collides with a laid‑back, sometimes chaotic approach to planning, making them the life of the bar while
    occasionally misplacing the inventory ledger.
background:
  cultural: Harry grew up in the suburban‑rural setting of Cherokee County, Georgia, absorbing Southern hospitality, a love for outdoor recreation, and a deep appreciation for local food and music. Being
    white and raised in the South, his family traditions include weekend barbecues, church gatherings, and community events that celebrate regional history. He also embraces the growing craft beverage scene
    in the Atlanta metro area, blending traditional Southern values with contemporary, experimental tastes.
attributes:
  skills: '[''Cocktail mixing'', ''Flavor pairing'', ''Customer service'', ''Crowd reading'', ''Cash handling'', ''Inventory management'', ''Bar equipment maintenance'', ''Mixology research'', ''Basic spirit
