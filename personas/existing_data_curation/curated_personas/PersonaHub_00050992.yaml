persona_description: Tracy, Charles L. is a landscape architect who is passionate about the integration of art into parks and trails, and the importance of engaging with diverse communities to ensure the
  enjoyment and stewardship of parks, trails, and greenways. Tracy's research and professional experience focus on the intersection of landscape architecture, environmental design, and community outreach,
  and he has contributed to the field through his publications and presentations on the topic. Tracy's work is particularly relevant to the NPS's centennial celebrations and the need to address the changing
  needs and demographics of park visitors.
