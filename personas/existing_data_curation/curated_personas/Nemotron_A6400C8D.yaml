  career_goals: Mary aims to transition from front‑line driving to a supervisory role within the next three years, targeting a position as a team leader or regional operations coordinator for a logistics
    company. She plans to earn a Certified Transportation Professional (CTP) credential and attend leadership workshops to strengthen her managerial skills. Long‑term, Mary envisions launching a family‑owned
    delivery service focused on serving small businesses in the Dallas area, combining her practical driving expertise with her desire for a more predictable schedule that supports her married life and
    community involvement.
