personas:
  professional: Alana Perry, a 60‑year‑old veteran of courtroom security and judicial administration, leverages their exacting organizational skills and curiosity for new technology to enforce courtroom
    protocols, de‑escalate volatile situations, and mentor bailiffs with a blend of traditional etiquette and modern digital‑evidence handling.
  sports: Alana Perry, a devoted fan of the Los Angeles Dodgers, Lakers, and Galaxy, participates in a senior hiking club that follows well‑marked Santa Monica Mountains trails each weekend and maintains
    fitness through gentle yoga, balancing competitive team spirit with low‑impact exercise.
  arts: Alana Perry regularly attends exhibitions at the Getty Center featuring Monet and O’Keeffe, enjoys listening to Ella Fitzgerald’s jazz recordings, and discusses true‑crime documentaries by Errol
    Morris at her seniors’ book club, weaving artistic appreciation into her leisure time.
  travel: Alana Perry prefers meticulously planned, low‑stress journeys such as a week‑long road tour of California’s historic missions, a guided cultural walk through Kyoto’s ancient temples, and weekend
    getaways to Santa Barbara’s seaside gardens, aligning her love of history with comfortable accommodations and budget‑conscious planning.
  culinary: Alana Perry, an avid home gardener, delights in preparing rosemary‑infused grilled chicken, lemon‑garlic salmon with fresh basil and mint, and crisp garden salads topped with heirloom tomatoes,
    while occasionally indulging in tiramisu from her favorite Beverly Hills Italian bistro.
  core: Alana Perry is a disciplined courtroom security expert whose meticulous nature fuels a passion for gardening, puzzle‑solving, and low‑impact fitness, all while quietly wrestling with a propensity
    for worry and a deep fascination with historical true‑crime narratives.
background:
  cultural: Alana is a second‑generation white American whose family traces its roots to the Midwest, with Irish and English ancestry. Growing up during the post‑World War II era, she internalized a strong
    work ethic, respect for authority, and a belief in community service. Her upbringing in suburban California exposed her to a blend of traditional American values and the progressive, multicultural environment
    of Los Angeles County. This background influences her pragmatic approach to problem‑solving, her commitment to public safety, and her appreciation for organized, detail‑oriented pursuits.
attributes:
