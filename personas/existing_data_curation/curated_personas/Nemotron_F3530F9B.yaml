  career_goals: Alana aims to transition into a senior supervisory position such as Court Operations Manager, where she can shape policies that improve courtroom safety and efficiency. She plans to complete
    her unfinished bachelor's degree in Criminal Justice within the next two years, using her practical knowledge to enrich academic studies. Long‑term, she hopes to develop a training curriculum for bailiffs
    that blends traditional courtroom etiquette with modern security technology, and to mentor a new generation of court officers. As she approaches retirement, she also envisions consulting for private
    security firms on courtroom and legal‑facility design, allowing her to continue contributing her expertise while reducing day‑to‑day stress.
