    training'']'
  hobbies: '[''Classic truck restoration'', ''Attending Philadelphia Eagles games'', ''Barbecue cooking'', ''Community volunteer work (senior transportation)'', ''Karaoke singing'', ''Fishing on the Delaware
    River'', ''Golf'', ''Gardening'']'
  career_goals: In the next five years, Terry aims to transition from day‑to‑day driving to a regional logistics coordinator role within his current company, leveraging his sales experience to improve client
    retention and route efficiency. He plans to earn the Certified Transportation Professional (CTP) credential and to lead a mentorship program for new drivers, fostering safety and professionalism. Ultimately,
    he hopes to launch a family‑owned trucking business that blends reliable service with a personal touch, allowing him to remain closely connected to his community while scaling operations and providing
    opportunities for younger workers.
