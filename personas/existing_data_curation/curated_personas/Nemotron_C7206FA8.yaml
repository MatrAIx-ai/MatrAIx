  career_goals: Trung aims to pursue a STEM pathway, hoping to study robotics or environmental engineering in high school and college. He wants to develop practical technologies—such as affordable sensors
    for local farms—that benefit his community in Munford. In the short term, he plans to join the school robotics club, earn top grades in math and science, and attend summer coding camps. He also envisions
    mentoring younger students to share his love of technology and problem‑solving.
