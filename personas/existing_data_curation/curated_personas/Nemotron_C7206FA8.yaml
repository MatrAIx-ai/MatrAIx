personas:
  professional: Trung Khan is a budding robotics enthusiast who designs LEGO robots and codes simple games on Scratch, channeling their curiosity and practical mindset into organized yet flexible project
    workflows while still managing school responsibilities.
  sports: Trung Khan loves playing midfield in community soccer leagues, cheers on the local high‑school football team and the Tennessee Titans, and spends weekends at the nearby creek practicing freestyle
    dribbling, while they reluctantly sign up for the school’s cross‑country club only when friends persuade them.
  arts: Trung Khan spends afternoons sketching manga‑style characters inspired by series like My Hero Academia, strums acoustic guitar chord progressions from Ed Sheeran, and binge‑watches Studio Ghibli
    films such as Spirited Away, which fuels their creative storytelling and artistic detail.
  travel: Trung Khan dreams of exploring the bustling streets of Ho Chi Minh City to taste authentic pho, while also planning a road trip to the Great Smoky Mountains for a weekend hike, preferring to map
    out itineraries with Google Earth and save travel money by swapping chores for extra allowance.
  culinary: Trung Khan eagerly helps whisk simmering broth for pho, fold rice noodles, and garnish with herbs like cilantro and lime, while also mastering Southern barbecue techniques—marinating pork shoulder
    in a sweet‑spicy rub and smoking it low, a hybrid palate that blends family’s traditional dishes with backyard grill classics.
  core: Trung Khan is a 12‑year‑old tech‑savvy dreamer who balances LEGO robotics, soccer, and family cooking, often juggling a love for order with spur‑of‑the‑moment video‑game marathons.
background:
  cultural: Trung is a second‑generation Vietnamese American raised in Munford, Tennessee. At home his family speaks Vietnamese, celebrates holidays like Tet with special meals and customs, and maintains
    traditions such as preparing phở and bánh bò. In the broader community, he participates in Southern activities—attending local football games, enjoying barbecues, and joining school clubs. This blend
    of Vietnamese heritage and Southern American culture gives him a unique perspective, shaping his values of family respect, education, and community involvement while also embracing the local traditions
    of the American South.
