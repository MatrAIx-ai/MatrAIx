personas:
  professional: John Hardy is a budding young technologist who, with a methodical and organized mindset, devotes his free time to constructing complex LEGO models, coding simple games in Scratch, and exploring
    Minecraft, turning his love for structure and predictability into early engineering projects that they approach with step‑by‑step precision.
  sports: John Hardy is an enthusiastic member of the neighborhood youth basketball league, cheering for the NBA team the Chicago Bulls while playing as a point guard for the local Westside Wildcats, and
    they also partake in scouting hikes that keep them fit and enjoy weekend pickup games at the community court.
  arts: John Hardy is a creative builder who draws inspiration from the imaginative worlds of author Isaac Asimov, the cinematic visuals of The LEGO Movie, and the pixel art of Minecraft, often recreating
    scenes with LEGO bricks and designing small interactive stories in Scratch, while they also enjoy listening to Billie Eilish between builds.
  travel: John Hardy is a curious traveler who loves to plan weekend scouting trips with detailed maps, has visited the Smithsonian Air and Space Museum in Washington, D.C., dreams of exploring the Kennedy
    Space Center in Florida, and they prefer structured itineraries over spontaneous vacations.
  culinary: John Hardy is a budding chef who can reliably follow a simple pancake recipe, favors pepperoni pizza, mac and cheese, and chocolate chip cookies, enjoys assembling his own spaghetti Bolognese
    with the help of a step‑by‑step cookbook, yet they occasionally overindulge in sugary cereal after late‑night gaming.
  core: John Hardy is a methodical 10‑year‑old who blends a love for structured LEGO engineering, disciplined saving, and organized scouting adventures with a playful side that sometimes leads them to candy
    splurges and gaming marathons, and they always try to return to their routine afterward.
background:
  cultural: John grows up in a suburban household in Palmdale, part of the broader Southern California inland community. His family emphasizes responsibility, education, and participation in community traditions
    such as Thanksgiving, Fourth of July celebrations, and church gatherings. The local culture is shaped by the nearby aerospace industry and Air Force presence, exposing him to space exploration themes.
    While his primary cultural influences are mainstream American, his upbringing blends regional Southern Californian values of outdoor activity, structured schooling, and a sense of civic involvement.
