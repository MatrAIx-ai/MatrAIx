  career_goals: Although she is no longer part of the formal workforce, Bela aims to deepen her community impact. She hopes to take on a leadership role at the local senior center by organizing intergenerational
    workshops and educational activities. She also plans to complete a volunteer‑tutor certification so she can assist underserved youth with basic literacy and numeracy. Additionally, Bela is keen to document
    her family’s genealogy and publish a modest memoir that blends personal history with the broader story of Bakersfield’s development.
