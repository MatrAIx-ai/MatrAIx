persona_description: A geologist who specializes in the study of geothermal resources, particularly in the Cardiff pilot area. They have experience in geological and geophysical surveys, groundwater monitoring,
  and thermal stewardship. They are responsible for developing a good understanding of the local geology, hydrogeology, and ground conditions, and for managing the heat resource under cities through a 'thermal
  stewardship' approach. They are involved in the development of a groundwater recharge model and a groundwater model, and they are responsible for estimating the ground temperatures under different scenarios
  of heat abstraction. They are also involved in the environmental monitoring of the shallow open loop ground source heat pump system and the analysis of core physical properties from the pilot region.
