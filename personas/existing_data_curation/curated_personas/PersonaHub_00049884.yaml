persona_description: A researcher or scientist interested in the field of infectious diseases, particularly tuberculosis (TB). This individual is likely to be knowledgeable about the current diagnostic
  assays used to detect TB and is interested in identifying the gaps between existing conventional tests and the ideal point-of-care tests (POCT). They are also interested in the commercial development
  of new rapid tests and research studies on nonsputum-based diagnostic biomarkers from both pathogen and host. Additionally, they are familiar with the advances in integrated microfluidics technology and
  may be interested in the potential of these technologies to aid the development of new POCTs.
