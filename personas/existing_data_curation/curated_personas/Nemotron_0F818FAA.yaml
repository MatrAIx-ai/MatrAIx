  hobbies: '[''Painting'', ''Poetry writing'', ''Reading fiction and philosophy'', ''Visiting art galleries and museums'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Gardening'', ''Volunteering
