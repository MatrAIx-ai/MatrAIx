  career_goals: Olga aims to move into a senior office manager or community‑program coordinator role where she can blend her administrative expertise with her love for art and cultural initiatives. She
    plans to earn her GED within the next year and enroll in community college courses in business administration and arts management. Her long‑term ambition is to curate and manage cultural events for
    local Puerto Rican and broader Latinx organizations in Riverside, using her organizational talents to bring novel, community‑focused programming to life. Additionally, she hopes to incorporate stress‑management
    training into her professional development to better support herself and her future teams.
