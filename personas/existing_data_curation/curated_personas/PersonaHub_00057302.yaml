persona_description: A scientist who specializes in the study of viral infections, particularly the causes and treatments of HIV and other viral diseases. This scientist has conducted extensive research
  on the mechanisms by which viruses can infect and replicate in human blood, and has developed innovative technologies to inactivate viruses and bacteria in blood products. The scientist is also known
  for his contributions to the development of pathogen-inactivation products for the cleaning of blood supplies, and has been instrumental in the FDA regulatory review of these products.
