  career_goals: In the next 2–3 years, Isah aims to become a senior full‑stack engineer, leading feature teams on high‑impact products that intersect technology with visual art. He plans to deepen expertise
    in cloud architecture, machine‑learning integration, and product design, while obtaining a professional certification in AWS and possibly a master’s degree in computer science. Long‑term, he envisions
    moving into a tech‑lead or engineering‑manager role, launching a startup that offers AI‑driven creative tools for independent artists, and mentoring underrepresented youth in tech to give back to his
    community.
