  career_goals: Although retired, Carmanita aims to remain a trusted mentor and leader within her community. She hopes to complete her GED to formalize her education, compile a family cookbook that preserves
    her culinary heritage, and continue advocating for senior services in Richmond Hill. Maintaining her health, financial stability, and the ability to support her grandchildren inform her modest yet purposeful
    ambitions.
