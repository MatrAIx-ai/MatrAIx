personas:
  professional: Carmanita Thomas is a retired community organizer and elder‑rights advocate who leverages her decades‑long skill in budgeting, event coordination, and volunteer mentorship to run highly
    structured, results‑driven programs at the Richmond Hill senior center, where their practical, detail‑oriented nature and competitive edge keep initiatives on schedule and their skeptical eye ensures
    resources are used wisely.
  sports: Carmanita Thomas keeps fit by strolling through the local parks with the Richmond Hill Seniors Walking Club, casually following the Atlanta Braves and Atlanta Falcons for a seasonal sports fix,
    and occasionally joining Caribbean dance classes that double as low‑impact cardio, though they rarely engage in competitive sports beyond a spirited game of bridge.
  arts: Carmanita Thomas expresses artistry through a steady soprano role in their church choir, where they relish hymns popularized by Mahalia Jackson and soul anthems of Aretha Franklin, while their evenings
    are spent crafting quilts inspired by Faith Ringgold’s narrative style, and they occasionally watch classic performances by Duke Ellington on television for inspiration.
  travel: Carmanita Thomas prefers low‑budget, well‑planned trips that blend relaxation with cultural discovery, such as a nostalgic family vacation to Jamaica to revisit island markets, a day‑trip to Savannah’s
    historic district for its architecture, and a yearly pilgrimage to Washington, D.C. museum circuit, all arranged around their grandchildren’s school breaks and their modest savings.
  culinary: Carmanita Thomas blends Southern comfort with Caribbean flair in their kitchen, expertly preparing fried chicken with collard greens, buttery cornbread, and rice‑and‑peas with jerk‑seasoned
    chicken, using garden‑grown thyme and Scotch bonnet peppers, and they document each recipe in a family cookbook project that reflects both tradition and their meticulous meal‑planning skill.
  core: Carmanita Thomas is a structured, community‑driven sage who balances a competitive edge with generous mentorship, yet can be obsessively frugal and they occasionally forget to take their own medication
    on time.
background:
  cultural: Carmanita's cultural identity is rooted in her African American heritage, enriched by the Caribbean influences prevalent in Richmond Hill. Raised during the Civil Rights era, she carries the
    resilience and communal spirit of that generation. Family gatherings feature soul food staples like collard greens and fried chicken alongside Caribbean dishes such as pelau and roti, reflecting a blend
    of Southern and island traditions. A lifelong member of her local African Methodist Episcopal church, she participates in gospel music, church fellowship, and community outreach, preserving the oral
    histories and values passed down from her grandparents who migrated from the Southern United States.
