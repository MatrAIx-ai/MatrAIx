persona_description: Christopher Clarkson, a renowned book conservator and historian who specializes in the conservation of medieval manuscripts, particularly the Hereford Mappa Mundi. He has worked extensively
  on the collections of major museums such as the Smithsonian Institution, the Walters Art Gallery, and the National Gallery of Art, and has won the Plowden Gold Medal for his contributions to the advancement
  of the conservation profession. His expertise includes the design and establishment of conservation facilities, teaching graphic design, wood engraving, and fine bookbinding at leading London art colleges,
  and his private practice in Oxford. He is also involved in recent projects such as the conservation of various medieval manuscripts and Wordsworth Trust & National Trust materials.
