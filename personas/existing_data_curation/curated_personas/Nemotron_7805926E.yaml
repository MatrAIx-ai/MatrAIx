  hobbies: '[''Morning Running'', ''Yoga'', ''Journaling'', ''Sudoku and Crossword Puzzles'', ''Reading Non‑Fiction (Management & Self‑Improvement)'', ''Healthy Cooking (Puerto Rican Cuisine)'', ''Salsa
    Dancing (Small Group)'', ''Community Health Outreach (Puerto Rican Community)'', ''Gardening'', ''Mindful Meditation'']'
  career_goals: Margaret aims to advance to a senior director or chief operating officer role within a multi‑site hospital network, where she can lead large‑scale digital transformation and integrate evidence‑based
    operational models across departments. She plans to earn a professional certification such as the Certified Medical Manager (CMM) and later pursue an MBA to strengthen her strategic acumen. A core ambition
    is to mentor emerging Hispanic women in health‑service leadership, creating a pipeline of culturally competent managers while championing data‑driven patient‑centered care. She also seeks to balance
    her high‑achievement drive with personal well‑being by establishing more sustainable stress‑management practices.
