personas:
  professional: Jodeane Black, a senior sales operations strategist with two decades of leading non-retail sales teams, leverages a data-driven, consultative selling mindset and a curiosity for emerging
    sales technology while balancing meticulous performance metrics with the flexibility to pivot when market conditions shift, allowing them to coach staff assertively yet cooperatively.
  sports: Jodeane Black blends seasonal fitness routines by hiking the Columbia River Gorge in the spring, practicing yoga year-round, and cheering for the Seattle Seahawks and Portland Trail Blazers while
    participating in a local cycling club that meets on summer weekends.
  arts: Jodeane Black indulges in artistic pursuits through a passion for historical fiction by authors like Philippa Gregory, attends Seattle Symphony performances featuring works by Mahler, and curates
    a small home gallery of impressionist prints by Claude Monet, all of which enrich their creative outlook.
  travel: Jodeane Black prefers low-key, historically-rich road trips along the Pacific Northwest coast, from Astoria to Cannon Beach, while also dreaming of a Mediterranean cruise to explore ancient Greek
    ruins and savor the Amalfi Coast's lemon-infused cuisine, balancing curiosity-driven itineraries with a practical, budget-conscious planning style.
  culinary: Jodeane Black enjoys experimenting with Mediterranean dishes such as grilled branzino with rosemary, chickpea falafel with tahini, and saffron-infused paella, demonstrating a solid home-cooking
    skill set that blends fresh garden vegetables with aromatic herbs like oregano and basil.
  core: Jodeane Black is a data-driven sales leader who balances curiosity for new tech with a practical, organized approach, finds solace in yoga and gardening, occasionally splurges on gourmet meals,
    and navigates life with a steady mix of assertiveness and cooperativeness.
background:
  cultural: Jodeane is a white American whose family roots trace back to Northern European (German and Scandinavian) immigrants who settled in the Pacific Northwest in the early 20th century. Raised in
    a middle‑class, Protestant‑valuing community in Oregon, she grew up with an emphasis on hard work, self‑reliance, and appreciation for the natural environment. Living in Vancouver, WA, she embraces
    the region’s blend of suburban family life and outdoor culture, which informs her balanced outlook that honors tradition while remaining open to new ideas and diverse perspectives.
