  career_goals: She aims to advance to a regional sales operations manager role within the next three years, focusing on integrating innovative sales enablement tools while preserving proven processes.
    Jodeane plans to earn a Certified Sales Leader credential, lead a company‑wide initiative to improve employee engagement and diversity, and mentor emerging female leaders in the industry. Long‑term,
    she envisions moving into a strategic planning position that shapes overall corporate sales direction and contributes to community outreach programs, balancing her curiosity for new ideas with a practical
    commitment to measurable results.
