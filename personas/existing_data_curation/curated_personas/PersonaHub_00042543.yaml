persona_description: A veterinarian who specializes in sea turtle care and research, particularly in the study of fibropapilloma associated turtle herpesvirus (FPTHV) and its effects on sea turtles. He
  has extensive experience in diagnosing and treating FPTHV in sea turtles, including the use of magnetic resonance imaging (MRI) to identify internal FPs and the CO2 laser for surgical removal of the tumors.
  He is also involved in the study of the environmental factors that may contribute to the spread of FPTHV in sea turtle populations.
