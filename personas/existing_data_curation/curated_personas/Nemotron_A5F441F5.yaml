personas:
  professional: Faith Smith leverages their business‑savvy mindset and coaching acumen to craft flexible, data‑driven scouting strategies that champion holistic, inclusive recruitment, while their curiosity
    fuels innovative, creative training programs for emerging athletes.
  sports: Faith Smith hikes the scenic trails of Middlesex County with a local trail club, follows the New York Giants as an avid football fan, and leads creative weekend sports clinics where they blend
    acoustic guitar warm‑ups with imaginative game designs for youth athletes.
  arts: Faith Smith frequents the Montclair Art Museum and local galleries, finds inspiration in Monet’s impressionist watercolors and John Mayer’s acoustic melodies, paints their own watercolor landscapes,
    and performs at open‑mic nights covering Bon Iver and indie folk favorites.
  travel: Faith Smith favors spontaneous, budget‑conscious travel that mixes hiking in the Blue Ridge Mountains, culinary forays through Kyoto’s Nishiki Market, and weekend escapes to New England coastal
    towns for fresh lobster rolls, often booking flights last‑minute to keep the adventure alive.
  culinary: Faith Smith’s kitchen is a laboratory where they reimagine classic dishes—saffron‑infused paella, kimchi‑topped pork tacos, miso‑glazed salmon—using bold ingredients like fresh ginger, smoked
    paprika, and heirloom tomatoes to craft experimental world‑cuisine meals.
  core: Faith Smith is a data‑driven sports strategist with a painter’s soul, whose compassionate, slightly scatter‑brained nature fuels a love for flexible creativity in both scouting and everyday life.
background:
  cultural: Faith grew up in a middle‑class New England suburb near Boston, with family roots tracing back to Irish and English ancestors. The region’s blend of historic tradition, vibrant academic environment,
    and strong community networks shaped her appreciation for both cultural heritage and innovative thinking. Living in Harvard, MA, she participates in town events like the Harvard Square street fair and
    values the area’s emphasis on education, civic engagement, and artistic expression.
