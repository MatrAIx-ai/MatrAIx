  career_goals: Faith aims to become a senior scouting director for a professional sports franchise, leveraging her data‑analysis skills to champion more holistic and inclusive recruitment practices. She
    also envisions launching a youth empowerment initiative that blends athletics with artistic expression, and plans to pursue a Master’s in Sports Management to deepen her strategic leadership capabilities.
