persona_description: A scientist who studies the impacts of pesticides on wildlife, specifically focusing on the fisher, a species that is considered a sensitive species in the western United States by
  the U.S. Forest Service. The scientist is particularly interested in the potential impact of illegal marijuana cultivation on the survival and health of the fisher population. The scientist has conducted
  extensive research on rodenticide exposure in fishers and has identified the illegal marijuana cultivation as a likely source of the poison. The scientist's research is important for the conservation
  of the fisher species and the other species that may be impacted by the pesticides.
