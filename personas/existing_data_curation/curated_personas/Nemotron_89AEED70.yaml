personas:
  professional: Peggy Beverly is a line cook in a busy Mesa restaurant, mastering Southwestern and Mexican-inspired dishes while juggling spontaneous recipe tweaks with a practical focus on food safety
    and team collaboration, though they often wrestle with keeping their station organized under tight service deadlines.
  sports: Peggy Beverly enjoys weekend hikes on Sonoran Desert trails with the Mesa Hiking Club, occasionally joins a co‑ed recreational soccer league, and follows the Phoenix Suns and Arizona Diamondbacks
    closely, balancing outdoor cardio with yoga sessions for flexibility.
  arts: Peggy Beverly spends evenings strumming acoustic guitar, covering songs by Sufjan Stevens and Brandi Carlile, attends local art walks showcasing desert‑inspired photography, and reads contemporary
    fiction such as 'Normal People' and 'The Vanishing Half', letting creative expression fuel their compassionate outlook.
  travel: Peggy Beverly prefers spontaneous road trips to nearby desert towns like Sedona and Flagstaff, yet they keep a small travel fund for extended journeys such as a backpacking adventure through Oaxaca,
    Mexico, where the cuisine inspires new dishes, and they often rely on last‑minute deals while worrying about overspending on flights.
  culinary: Peggy Beverly experiments with chilaquiles topped with roasted tomatillo salsa, incorporates prickly pear and nopal into tacos, loves the aroma of smoked chipotle and fresh cilantro, and while
    comfortable with high‑heat grilling they sometimes over‑season dishes in pursuit of bold flavor.
  core: Peggy Beverly is a curious yet overly worried 20‑year‑old line cook who blends spontaneous Southwestern flavors with a deep drive to serve their community, even if they occasionally lose track of
    organization and budget details.
background:
  cultural: Peggy is a white American raised in Mesa, Arizona, where the blend of Midwestern family values and Southwest cultural influences shaped her upbringing. The vibrant Hispanic culinary scene of
    the region deeply informed her cooking style, leading her to incorporate bold spices and fresh, local ingredients. She participates in community events through her local church and values the collaborative
    spirit of her neighborhood, reflecting a cultural background that emphasizes neighborliness, self‑reliance, and an appreciation for diverse regional traditions.
attributes:
  skills: '[''Southwestern cooking'', ''Knife skills'', ''Mise en place'', ''Recipe improvisation'', ''Food safety compliance'', ''Team collaboration'', ''Compassionate customer service'', ''Community event
