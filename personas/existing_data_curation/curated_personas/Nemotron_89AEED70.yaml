  hobbies: '[''Exploring farmers’ markets'', ''Hiking in the Sonoran Desert'', ''Yoga and meditation'', ''Volunteer cooking at food banks'', ''Reading contemporary fiction'', ''Playing acoustic guitar'',
    ''DIY home decor'']'
  career_goals: Peggy aims to advance from a line cook to a head chef at a community‑focused restaurant that highlights local, sustainable ingredients. She plans to enroll in a culinary certification program
    to solidify her technical knowledge and improve her organizational skills. Long‑term, she dreams of opening her own inclusive eatery that offers affordable meals and provides job‑training opportunities
    for youth and underserved populations, merging her curiosity for new dishes with her practical drive to serve others.
