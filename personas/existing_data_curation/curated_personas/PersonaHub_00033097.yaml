persona_description: A researcher in the field of developmental psychiatry who studies the early development of autism spectrum disorders and the neural circuits involved in visual orienting and attention.
  The person is interested in understanding the underlying mechanisms of autism and developing early intervention strategies. They have published research on the differences in visual orienting and attention
  in infants at different ages and are currently working on recruiting younger siblings of children with autism and their families for ongoing research.
