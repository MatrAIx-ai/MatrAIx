    to classic jazz'']'
  career_goals: Belinda aims to remain an active volunteer archivist for the Osage County Historical Society, mentoring younger volunteers in research and documentation. She wishes to write a memoir that
    weaves together her family’s genealogy and personal reflections. Maintaining her independence is a priority, so she plans to stay physically active through gardening and regular health check‑ups. She
    also seeks to improve her digital fluency to create a digital family archive and to stay connected with distant relatives. Competitively, she enjoys bridge and hopes to place in local tournaments, while
    also organizing small community workshops on budgeting and record‑keeping.
