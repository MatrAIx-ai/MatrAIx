personas:
  professional: Alfonso Saavedra is a 35‑year‑old aspiring operations specialist who leverages bilingual communication, basic project coordination, and a methodical, structure‑loving mindset to streamline
    logistics workflows while preparing for PMP certification and aiming for a supervisory role.
  sports: Alfonso Saavedra spends Saturday afternoons playing recreational soccer with a local league, passionately follows Liga MX teams such as Club América and Tigres UANL, and occasionally joins a community
    running club for 5K races to maintain fitness.
  arts: Alfonso Saavedra enjoys the vibrant rhythms of mariachi and modern Latin pop, regularly listening to artists like Luis Miguel, Natalia Lafourcade, and Jorge Drexler, and attends community theater
    productions that celebrate folk stories, which inspire his cooking and event‑planning creativity.
  travel: Alfonso Saavedra prefers road trips that blend cultural immersion with family time, planning weekend getaways to Oaxaca’s historic markets, the coastal cliffs of Baja California, and dreaming
    of a culinary pilgrimage to the black‑mole villages while staying within a modest travel budget.
  culinary: Alfonso Saavedra excels at preparing traditional dishes such as chiles en nogada, pozole rojo, and tamales de elote, often sourcing fresh tomatoes, jalapeños, and cilantro from his own garden,
    and enjoys experimenting with spice ratios though they sometimes over‑salt the salsa.
  core: Alfonso Saavedra is a structure‑driven 35‑year‑old who balances a love for DIY home projects and community soccer with meticulous budgeting, a habit of over‑salting salsa, and quiet resilience that
    fuels their dream of a family‑run catering business.
background:
  cultural: Alfonso grew up in a Mexican‑American household where family, community, and cultural traditions were central. He is fluent in both Spanish and English and maintains strong ties to his Mexican
    heritage through celebrations such as Día de los Muertos and Mexican Independence Day, as well as through food, music, and religious practices rooted in Catholicism. Living in Anaheim’s vibrant Orange
    County Mexican community, he often participates in local cultural festivals, supports neighborhood businesses, and values the close‑knit family dynamics typical of his background.
attributes:
  skills: '[''Project Coordination'', ''Bilingual Spanish-English Communication'', ''Microsoft Office Suite'', ''Google Workspace'', ''Home Maintenance'', ''Automotive Repair'', ''Event Planning'', ''Personal
