personas:
  professional: Savannah Brown is a seasoned computer systems analyst who leverages their expert-level SQL, SAP, and Oracle ERP experience to translate business needs into meticulous data models and workflow
    designs, while their methodical planning and reliable stakeholder communication keep projects on schedule and foster a culture of continuous improvement.
  sports: Savannah Brown is a disciplined early‑morning runner who logs three miles each day and attends weekly yoga classes for flexibility, while they root for the Cincinnati Bengals and the Columbus
    Blue Jackets, and belong to the local Midwest Striders running club that meets for seasonal trail runs through the nearby state park.
  arts: Savannah Brown enjoys immersing themselves in classic American folk music by artists such as Mary Chapin Carpenter and John Denver, appreciates the regional realism of Grant Wood’s paintings, and
    regularly attends community‑theatre productions of 'Our Town' and re‑watches films like 'The Pursuit of Happyness' to unwind after a busy week.
  travel: Savannah Brown prefers meticulously planned road trips that combine scenic drives through the Appalachian foothills with stays at family‑run B&Bs in Asheville, North Carolina, and they dream of
    exploring the historic Cotswolds countryside in England while still making annual pilgrimages to the Ohio State Fair and nearby Amish country for cultural immersion.
  culinary: Savannah Brown delights in preparing hearty Midwestern staples such as skillet chicken pot pie with garden‑fresh carrots, celery, and rosemary, baking apple crumb cake with Granny Smith apples
    and a dash of cinnamon, and crafting quinoa salads that showcase heirloom tomatoes and basil harvested from their own organic garden.
  core: Savannah Brown blends a steadfast Midwestern work ethic with a love for routine—whether plotting data workflows, tending their garden, or running their daily three‑mile route—while quietly indulging
    in occasional culinary splurges and meticulous budgeting, creating a life that feels both predictably productive and warmly community‑focused.
background:
  cultural: Savannah is a White American who grew up in the small-town environment of southwestern Ohio. Her family has deep roots in the Midwest, with several generations having lived in the region, and
    she was raised with the practical, community-oriented values typical of that area. She identifies with the Midwestern work ethic of reliability, modesty, and a strong sense of responsibility to family
    and neighbors. Regular participation in local church activities, volunteer service, and community events reflects her commitment to the close-knit social fabric of her hometown. While she respects broader
    American cultural traditions, her daily life is shaped by the steady rhythms of small-town life, seasonal cycles, and an emphasis on stability and continuity.
attributes:
  skills: '[''Systems Analysis'', ''Business Process Modeling'', ''SQL'', ''Advanced Excel'', ''ERP Implementation (SAP, Oracle)'', ''Requirements Gathering'', ''Data Visualization (Power BI)'', ''Project
