  hobbies: '[''Organic Gardening'', ''Cooking and Baking'', ''Morning Jogging'', ''Yoga'', ''Volunteer Work at Church Food Bank'', ''Monthly Board Game Nights'', ''DIY Home Improvement'', ''Reading Historical
    Fiction'', ''Attending County Fair'']'
  career_goals: Savannah aims to advance to a senior systems analyst role within the next two to three years, followed by a transition to a solutions architect position focused on the manufacturing sector
    that dominates her region. She plans to earn CBAP and PMP certifications to formalize her expertise and to lead cross-functional project teams. Long-term, she aspires to move into an IT manager or director
    of business systems role where she can shape technology strategy while mentoring junior analysts. Throughout her career progression, she values a predictable, structured path that allows her to maintain
    a healthy work-life balance and continue contributing to her local community.
