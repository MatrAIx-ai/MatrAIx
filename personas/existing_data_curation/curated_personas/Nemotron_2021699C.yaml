personas:
  professional: Elizabeth Greenfield is a senior UI/UX design leader who combines her STEM foundation with a creative eye, using her methodical, detail-oriented nature to build cohesive design systems,
    streamline project workflows, and mentor junior designers toward reliable, data-driven outcomes.
  sports: Elizabeth Greenfield enjoys low-impact fitness, conquering the Hocking Hills trail network on weekend hikes, participating in the Columbus Running Club's 5K races each spring, cheering on the
    Cleveland Browns during football season, and occasionally joining a local adult recreational softball league for social connection.
  arts: Elizabeth Greenfield cultivates artistic appreciation through photographing nature with a Nikon D850, drawing inspiration from Ansel Adams, minimalist painter Agnes Martin, and composer Philip Glass,
    while she volunteers on community mural projects and regularly attends performances by the Chicago Symphony Orchestra.
  travel: Elizabeth Greenfield prefers meticulously planned, low-key escapes, often choosing scenic retreats like the Upper Peninsula of Michigan's shoreline or the serene lavender fields of Provence, while
    she occasionally slips into spontaneous weekend trips to Chicago for design conferences and coffeehouse workshops.
  culinary: Elizabeth Greenfield delights in farm-to-table cooking, frequently preparing roasted root vegetable medleys with quinoa, sage, and dill-infused salmon, while she savors tea brewed with chamomile
    and lemongrass, and she enjoys tasting a perfectly seared ahi tuna poke bowl at a locally acclaimed sushi spot.
  core: Elizabeth Greenfield balances a love for meticulous design with a secret habit of hoarding quirky vintage keychains, rigorously schedules every hour of the day, yet can lose track of time whenever
    a perfect Sudoku puzzle appears.
background:
  cultural: Elizabeth grew up in a small Midwestern town in Michigan, rooted in a family heritage that traces back to German and Irish immigrants. The region’s emphasis on practicality, modesty, and community
    involvement shaped her values of reliability and cooperation. Local traditions—summer barbecues, county fairs, and close‑knit church gatherings—instilled a sense of harmony and an appreciation for structured
    social rituals. While she identifies with the broader white American cultural context, her day‑to‑day life reflects the Midwest’s steady work ethic, straightforward communication style, and a deep connection
    to the natural landscape of the Great Lakes region.
