  career_goals: Elizabeth aims to transition into a senior design leadership role where she can shape comprehensive design systems for a mid‑size tech or manufacturing company in the Midwest. She plans
    to earn a PMP certification to strengthen her project‑management credentials and to mentor emerging designers, fostering a collaborative and structured creative environment. Over the next five years,
    she envisions leading a cross‑functional design team, integrating user‑centered research with data‑driven visual communication, and eventually launching her own boutique consultancy that helps regional
    businesses streamline their brand and product design processes while maintaining a focus on harmony and reliability.
