persona_description: A researcher or scientist who is interested in studying carbon balance between the atmosphere and the biosphere, specifically in the study of carbon fluxes on ecosystem level. They
  are likely to have expertise in the eddy covariance technique for measuring CO2 fluxes and developing mathematical models for canopy level photosynthesis. They may have experience with the MANTIS canopy
  level photosynthesis model and its integration to the desired time step. They are also knowledgeable about the importance of canopy level photosynthesis in the study of carbon balance and the development
  of models to predict future ecosystem fluxes under changing climatic conditions.
