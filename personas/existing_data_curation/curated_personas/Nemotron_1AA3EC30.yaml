  hobbies: '[''Basketball'', ''Hiking'', ''Fishing'', ''PC building'', ''Model kit assembly'', ''Competitive online gaming'', ''Reading entrepreneurship non‑fiction'', ''Volunteer event organization'']'
  career_goals: Joe aims to earn his GED within the next year and then enroll in a community college program for an associate's degree in automotive technology or information technology. He plans to secure
    an apprenticeship in a local auto shop or IT support firm, gaining certified credentials that will allow him to launch his own mobile auto‑repair or tech‑support business. Long‑term, he is open to joining
    a skilled‑trades union and is considering a part‑time role in the U.S. reserves to further develop discipline and leadership.
