persona_description: A healthcare professional with a background in medicine, particularly in the field of cardiology and intensive care. This individual is highly trained and knowledgeable about the intricacies
  of medical treatments, particularly those that aim to control surrogate outcomes. They are aware of the limitations and potential pitfalls of these approaches and are critical of the use of surrogate
  outcomes as a primary measure of treatment efficacy. This individual is likely to have a strong interest in evidence-based medicine and the importance of clinical trials in the evaluation of medical treatments.
  They may also be familiar with the concept of the normalization heuristic and the challenges of treating numbers and test results in intensive care units.
