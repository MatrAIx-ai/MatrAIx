  career_goals: Dustyn aims to advance to a senior supervisory role within her regional air traffic control facility, where she can mentor new controllers and shape operational procedures. She plans to
    earn an associate degree in aviation management and eventually transition into an FAA aviation safety inspector or airfield operations manager position at a larger airport. Her long‑term ambition includes
    influencing safety policy, leading a team that embraces both innovative technologies and proven methods, and achieving a work environment that values flexibility while maintaining rigorous safety standards.
