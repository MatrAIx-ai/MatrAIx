personas:
  professional: Edgar Murphy, a 12‑year‑old robotics hobbyist, channels their disciplined, structured mindset into building and programming LEGO Mindstorms and school robotics projects, treating each challenge
    like a miniature engineering problem and consistently documenting every iteration for future reference.
  sports: Edgar Murphy follows the local Effingham County High School Tigers football team and the Atlanta Braves, participates in a community little‑league baseball squad, and keeps a meticulously organized
    baseball card collection that includes rookie cards from the 2022 season, viewing the sport as both a strategic game and a communal ritual.
  arts: Edgar Murphy enjoys the cinematic scores of John Williams, the storytelling of science‑fiction author Andy Weir, and the pixel art of indie game developer ConcernedApe, often listening to these
    while solving chess puzzles, and occasionally sketches mechanical designs inspired by the works of H.R. Giger.
  travel: Edgar Murphy prefers structured family road trips with detailed itineraries, having visited Savannah’s historic district, the beach at Tybee Island, and a weekend getaway to Orlando’s theme parks,
    while dreaming of an educational visit to Washington, D.C.’s National Air and Space Museum.
  culinary: Edgar Murphy favors Southern comfort foods such as fried chicken, peach cobbler, and collard greens, enjoys snacking on homemade peanut butter crackers made with garden‑grown peanuts, and proudly
    attempts to make their own pizza crust, though the sauce often ends up uneven.
  core: Edgar Murphy is a meticulous, self‑disciplined 12‑year‑old whose love of structured tinkering, strategic games, and Southern traditions fuels a habit of cataloging every hobby with an almost obsessive
    eye for detail, even when it means sacrificing spontaneous fun.
background:
  cultural: Edgar was raised in the small town of Rincon, Georgia, within a predominantly white, rural community in Effingham County. His family's roots are tied to the local agricultural economy, with
    seasonal work on peanut and soybean fields and a strong emphasis on self-reliance and hard work. The region's Southern culture influences his life through church attendance, community gatherings like
    the county fair, and a shared appreciation for Southern cuisine and hospitality. While the local culture celebrates collective events such as high-school football games, Edgar's reserved nature leads
    him to seek smaller, structured groups like the 4-H club and school robotics team. He internalizes the Southern values of discipline, respect for tradition, and a pragmatic outlook, which blend with
    his personal drive for organization and achievement.
attributes:
  skills: '[''Advanced mathematics (problem solving)'',''Basic Python programming'',''LEGO robotics construction and programming'',''Strategic board games (chess)'',''Personal organization and time management'',''Bike
