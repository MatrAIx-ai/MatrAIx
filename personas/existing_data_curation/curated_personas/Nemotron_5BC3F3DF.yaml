  hobbies: '[''LEGO Technic and Mindstorms building'',''Chess puzzles and tournament play'',''Strategy video games (Civilization, StarCraft)'',''Python coding projects'',''Reading engineering non-fiction
    and science-fiction'',''Collecting and cataloging baseball cards'',''Small-scale gardening'',''4-H robotics club'']'
  career_goals: Edgar aims to secure a place in a top-tier STEM summer program, such as the Georgia Tech Summer Academy, and to win the state-level 4-H robotics competition within the next two years. He
    plans to maintain a high GPA and qualify for national math contests like the Math Olympiad. Long-term, he envisions studying aerospace or mechanical engineering at a leading university, ultimately working
    on autonomous systems or space-flight technology. He also dreams of becoming a software developer who creates tools that streamline complex projects, reflecting his love for structure and efficiency.
