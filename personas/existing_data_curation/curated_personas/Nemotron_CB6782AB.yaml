  career_goals: Matthew aims to advance to a senior surveillance manager role within the next five years, overseeing multiple casino sites and shaping security strategy for the region. He plans to earn
    a bachelor’s degree in Security Management and obtain the Certified Protection Professional (CPP) certification, positioning himself for leadership responsibilities. Additionally, he hopes to mentor
    junior guards, introduce data‑driven incident‑prevention programs, and eventually consult for the broader gaming industry on best‑practice safety frameworks.
