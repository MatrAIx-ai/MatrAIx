personas:
  professional: Matthew Alcantara, a veteran casino surveillance specialist with over 25 years of experience, leverages meticulous CCTV monitoring, rapid incident response, and bilingual communication to
    deliver flawless investigative reports, and they are pursuing a CPP certification and a degree in Security Management to ascend to senior surveillance management.
  sports: Matthew Alcantara spends early mornings fishing off Biscayne Bay, roots for the Miami Marlins and Inter Miami CF, and they participate in a senior‑center bowling league, blending low‑impact recreation
    with loyal fandom for regional teams.
  arts: Matthew Alcantara’s artistic side shines during salsa nights where they dance to legends like Celia Cruz and Marc Anthony, while they also frequent the Adrienne Arsht Center for live theatre and
    admire vibrant Miami murals that echo their love for rhythmic expression and visual storytelling.
  travel: Matthew Alcantara favours relaxed getaways to the Florida Keys and weekend trips to Caribbean coastal towns, dreaming of a culinary pilgrimage to Spain’s Andalusian region while they plan trips
    within a modest retirement budget and family schedule.
  culinary: Matthew Alcantara perfects traditional ropa vieja, caramelized plantains, and aromatic cafecitos in their kitchen, seasoning with cilantro, oregano, and cumin from their own herb garden, turning
    family gatherings into flavorful celebrations of their culinary heritage.
  core: Matthew Alcantara blends disciplined casino surveillance expertise with a vibrant love for heritage cooking, community tutoring, and weekend fishing, navigating life with organized precision, modest
    financial habits, and a warm, sociable spirit tempered by a need for quiet reflection.
background:
  cultural: Matthew was born to Cuban immigrants who arrived in Miami during the 1970s exodus, growing up in the vibrant Little Havana neighborhood where Spanish was spoken at home and Cuban music, food,
    and family traditions were daily life. The values of respect, perseverance, and communal responsibility instilled by his parents shape his disciplined work ethic and cooperative nature. He actively
    celebrates Cuban holidays such as El Día de la Revolución, participates in the annual Calle Ocho Festival, and maintains strong ties to the Cuban-American community while embracing the multicultural
    tapestry of Miami‑Dade County.
