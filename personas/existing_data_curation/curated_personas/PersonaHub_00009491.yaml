persona_description: A historian or a scholar who is interested in the study of ancient Roman history, particularly the period of the Later Roman Empire. They are likely to be familiar with the topic of
  damnatio memoriae, the process of purging and rehabilitating the memory of individuals who were involved in political or social upheavals, and how this practice was used to honor ancestors and reconcile
  with the changing social, cultural, and religious landscape of the Roman world. They may also be interested in the complex dynamics of power, identity, and memory in ancient Rome.
