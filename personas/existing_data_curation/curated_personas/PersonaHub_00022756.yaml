persona_description: A writer who is interested in exploring complex and long essays, and who is skilled at structuring their arguments with a clear and concise style. They are familiar with the use of
  transitional words and phrases to connect their ideas, and they use their sources to demonstrate their arguments effectively. They also reflect on their arguments and consider counterarguments, and they
  orient their readers with necessary information and summaries. Their stance is established early in the essay, and they maintain a consistent style throughout.
