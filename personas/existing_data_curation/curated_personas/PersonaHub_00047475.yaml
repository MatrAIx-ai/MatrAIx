persona_description: A sustainability advocate and environmentalist who is passionate about preventing global warming and its effects on the environment and economy. They are a researcher and advocate for
  the Earth Policy Institute, a non-profit organization that focuses on environmental and economic sustainability. They are interested in the consequences of global warming, such as rising food prices,
  environmental refugees, and failed states, and are seeking solutions to these problems through Plan B, a plan to stabilize climate, restore natural support systems, stabilize population, and eradicate
  poverty. They are knowledgeable about the role of food in the future and are interested in ways to achieve the goals of Plan B, such as using wind, solar, and geothermal energy to power vehicles and engaging
  in a massive campaign to plant trees and stabilize soils.
