persona_description: 'A school employee who is dedicated to preventing and addressing bullying in schools, particularly in the context of school bus drivers. This persona is likely to be a teacher, support
  professional, or administrator who is involved in implementing anti-bullying policies and programs in their school district. They may also be a school psychologist or counselor who works with students
  who are experiencing bullying or who have experienced bullying in the past. This persona is likely to be knowledgeable about the National Education Association''s Bully Free: It Starts With Me campaign
  and its various initiatives to prevent and respond to bullying in schools. They may also be familiar with the NEA School Crisis Guide and its tools and resources for schools to prepare for and respond
  to school crises.'
