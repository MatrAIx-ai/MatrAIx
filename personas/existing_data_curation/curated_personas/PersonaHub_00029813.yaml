persona_description: A researcher and scientist in the field of audiology and hearing science, particularly focused on developing new types of acoustic ear-canal measurements that provide a comprehensive
  assessment of middle-ear functioning across a wide range of frequencies. This individual has contributed significantly to the project and is supported by interdisciplinary teams of physicians, audiologists,
  engineers, and hearing scientists. The project aims to assess middle-ear functioning over the full bandwidth of hearing that is critical to speech perception, with the potential diagnostic use in children
  suspected of having otitis media with effusion and in infants referred by a newborn hearing screening exam. The individual is likely to have expertise in acoustics, hearing science, and signal processing,
  and is interested in developing new methods for measuring middle-ear function that can be used in clinical settings.
