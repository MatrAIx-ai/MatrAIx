  career_goals: Michelle aims to earn her Bachelor of Science in Nursing (BSN) within the next two years while balancing family responsibilities, leading to RN licensure and expanded clinical autonomy.
    She aspires to specialize in community health nursing, focusing on preventive care and wellness programs that integrate art‑based therapies. Long‑term, she envisions a leadership role as a charge nurse
    or case manager, mentoring new LPNs and RNs, and eventually becoming a nurse educator at a local community college. She also hopes to develop a small, community‑center clinic offering holistic health
    services that blend traditional nursing with creative wellness initiatives.
