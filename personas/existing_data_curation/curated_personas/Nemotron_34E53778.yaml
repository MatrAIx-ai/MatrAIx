personas:
  professional: Lac Alkaifi is a high‑school senior who blends skillful watercolor sketching, intricate beadwork, and community storytelling into a budding role as a cultural arts facilitator, channeling
    their relaxed planning style and deep compassion into organizing small workshops that support peers’ mental well‑being while they navigate the occasional disorganization that comes from juggling school,
    art, and peer counseling.
  sports: Lac Alkaifi enjoys solitary hikes through the Black Hills and runs with the local high‑school cross‑country team during the fall, follows the South Dakota State University Jackrabbits women's
    track squad on weekends, and occasionally attends Rapid City Rush hockey games, embodying a low‑key fitness routine that balances personal connection to nature with modest team spirit.
  arts: Lac Alkaifi immerses themselves in creative expression by sketching sunrise vistas, crafting bead‑embellished journals, playing acoustic guitar to the sounds of traditional tribal chants and indie
    folk artists like Bon Iver and Fleet Foxes, and drawing inspiration from the vibrant colors of Georgia O’Keeffe and the emotive strokes of Vincent van Gogh.
  travel: Lac Alkaifi prefers low‑key, nature‑focused trips, having explored the Black Hills National Forest, Yellowstone National Park, and a weekend getaway to Sedona’s red canyons, while day‑dreaming
    about an extended backpack adventure through Patagonia’s Torres del Paine and a cultural immersion visit to Iceland’s volcanic landscapes.
  culinary: Lac Alkaifi enjoys modest cooking, often preparing wild‑flower infused herbal tea, berry‑compote topped sourdough toast, and roasted root‑vegetable stews seasoned with sage and rosemary, balancing
    a growing skill set with a love for foraging local herbs and experimenting with simple, seasonal dishes.
  core: Lac Alkaifi is a thoughtful, art‑driven teen whose curious mind and compassionate heart drive solitary creativity and community care, yet their tendency toward worry and occasional disorganization
    adds a raw, endearing edge to their journey.
background:
  cultural: Lac Miho is an Oglala Lakota teen growing up in Rapid City, South Dakota, near the Pine Ridge Reservation. Her family maintains strong ties to Lakota traditions, including language, ceremony,
    and crafts such as beadwork. She participates in community powwows, seasonal gatherings, and cultural workshops that emphasize respect for the land, interconnectedness, and oral storytelling. These
    cultural values shape her worldview, fostering a deep appreciation for nature, communal harmony, and the preservation of tribal heritage.
attributes:
  skills: '["Traditional Lakota beadwork", "Watercolor painting", "Sketching", "Storytelling and oral history", "Basic first aid", "Peer counseling", "Bilingual communication (English and Lakota)", "Digital
    art basics (using free software)", "Community event organization"]'
  hobbies: '["Nature walks in the Black Hills", "Stargazing", "Reading mythologies", "Listening to traditional Lakota songs", "Sketching landscapes", "Journaling emotions", "Playing acoustic guitar", "Collecting
    wildflowers", "Photography of natural scenes"]'
  career_goals: Lac Miho aspires to complete her high school education and later pursue a degree that merges her love for art and community service, such as cultural arts education or community health.
    She hopes to become a cultural liaison or art therapist within the Oglala Lakota community, creating programs that use traditional arts to support the mental well‑being of tribal youth. Long‑term, she
    wants to help document and revitalize Lakota artistic practices while fostering harmony and resilience among her people.
