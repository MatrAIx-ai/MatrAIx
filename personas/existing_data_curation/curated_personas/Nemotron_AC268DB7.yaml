  career_goals: Approaching retirement, Soon aims to secure the company’s long‑term financial stability while transitioning into a senior advisory role. He aspires to earn a CFA designation if not already
    held, implement an automated reporting framework that reduces manual workload, and mentor the next generation of finance leaders. Ultimately, he envisions establishing a boutique consultancy focused
    on financial strategy for family‑owned businesses, creating a lasting professional legacy and ensuring personal financial independence with minimal stress.
