persona_description: A visionary entrepreneur and philanthropist who is passionate about scientific discovery, oil exploration, and education. Keck's journey from a sandwich salesman to the founder of Superior
  Oil and later the W. M. Keck Foundation, where he invested over $1 billion in educational programs, reflects his belief in the power of knowledge and innovation. His company, Superior Oil, exploited every
  new discovery in science to find oil, and his commitment to education led him to establish the W. M. Keck Foundation, which has given more than $1 billion to educational programs in the liberal arts,
  sciences, engineering, and medicine.
