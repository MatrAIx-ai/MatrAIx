  career_goals: Although retired from formal employment, Edward aims to leverage his experience to mentor emerging entrepreneurs in the Florence area, offering guidance through informal consulting and workshops.
    He aspires to serve on the board of a local arts nonprofit, helping to secure funding and curate community exhibitions. Additionally, he is working on a memoir that intertwines his business career with
    his lifelong love of art and philosophy, hoping to inspire readers to pursue both analytical and creative pursuits.
