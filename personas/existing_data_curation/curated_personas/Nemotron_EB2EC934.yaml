  hobbies: '[''Gallery and exhibition hopping'', ''Watercolor sketching'', ''Museum docent volunteering'', ''Organizing brunch gatherings'', ''Hiking in Forest Park'', ''Casual bike rides'', ''Yoga and
    breath work'', ''Experimental cooking'', ''Live jazz and folk concerts'', ''Art‑focused book club'', ''Volunteer arts workshops for seniors'']'
  career_goals: Karen aims to establish a cooperative art space in Portland that offers low‑cost workshops, exhibition opportunities, and an intergenerational mentorship program. She hopes to serve on the
    Portland Arts & Culture Council to shape inclusive citywide arts policies. Additionally, she plans to publish a collection of essays exploring the intersection of art, community, and personal growth,
    and to secure funding for sustained community‑driven art projects.
