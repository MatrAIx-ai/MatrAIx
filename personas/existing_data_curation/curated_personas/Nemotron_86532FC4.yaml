personas:
  professional: Ana Hernandez, a seasoned mold maker and caster with over a decade of hands‑on experience, blends meticulous quality‑control protocols with an infectious enthusiasm for mentorship, leading
    team briefings and designing metal‑art projects that reflect a deep aesthetic sensibility while championing a safety‑first culture.
  sports: Ana Hernandez, a devoted fan of the Los Angeles Dodgers and Los Angeles Galaxy, joins a city‑wide walking club every Saturday morning and participates in a seasonal adult softball league, and
    they view these activities as both stress relief and a way to stay socially connected.
  arts: Ana Hernandez, who regularly attends church choir rehearsals and sketches designs for casting, finds inspiration in the bold colors of Frida Kahlo, the sculptural forms of Alexander Calder, and
    the rhythmic guitar of Carlos Santana, blending these influences into their pottery classes and metal‑art workshops while also knitting intricate blankets during downtime.
  travel: Ana Hernandez, an organized traveler who prefers detailed itineraries, has explored the colonial streets of Guanajuato, the centuries‑old cathedrals of Seville, and the bustling souks of Marrakech,
    while they dream of a future retreat in the Japanese Alps to combine metal‑casting workshops with quiet contemplation.
  culinary: Ana Hernandez, a passionate home cook of traditional Mexican cuisine, delights in preparing tamales wrapped in corn husks, rich mole negro spiced with chilies and chocolate, and refreshing agua
    fresca flavored with hibiscus, often sourcing fresh chilies, masa harina, and epazote from their garden to infuse authenticity into family celebrations.
  core: Ana Hernandez balances a methodical professional rigor with an exuberant social spirit, channeling their compassion and artistic flair into community‑focused metal‑casting projects while navigating
    anxiety with occasional over‑commitment and a love for lively gatherings.
background:
  cultural: Ana was raised in a Mexican‑immigrant household, making her bilingual in English and Spanish and deeply connected to Mexican traditions. Family cohesion, respect for hard work, and communal
    celebrations are central to her identity. She actively participates in the Mexican‑American community in Villa Rica, joining cultural festivals, organizing Día de los Muertos altars, and incorporating
    Mexican motifs into her artistic casting work. Her heritage informs her compassionate outlook, her desire to maintain harmony, and her commitment to giving back to both her cultural and local communities.
attributes:
  skills: '[''Metal casting'', ''Mold making'', ''Pattern design'', ''CNC machining'', ''Quality assurance'', ''Industrial safety compliance'', ''Process documentation'', ''Team training and mentorship'',
