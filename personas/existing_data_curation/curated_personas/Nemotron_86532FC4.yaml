  hobbies: '[''Volunteer metal‑working workshops'', ''Cooking Mexican cuisine'', ''Gardening'', ''Reading historical fiction'', ''Church choir participation'', ''Hosting potluck gatherings'', ''Knitting'',
    ''Sketching casting designs'']'
  career_goals: Ana aims to move into a supervisory or lead trainer role where she can shape a collaborative, safety‑focused workplace culture and formalize a structured mentorship program for new castors.
    She envisions establishing a community‑focused studio that blends metal casting with Mexican folk art, offering workshops that preserve cultural heritage and provide creative outlets for local youth.
    Balancing her ambition with family commitments, Ana also plans to pursue advanced certifications in foundry management and to become an advocate for mental‑wellness initiatives in her industry.
