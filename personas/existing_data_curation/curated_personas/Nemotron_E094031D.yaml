  career_goals: Giovanni aims to advance to a regional sales manager position, where he can lead a larger team and shape market‑entry strategies for new product lines. He is interested in developing a mentorship
    program for newcomers in the sales force and eventually transitioning into a consultancy role that helps manufacturers optimize their distribution networks. Financial security for a comfortable retirement
    and the ability to support community projects in Phoenix also drive his long‑term ambitions.
