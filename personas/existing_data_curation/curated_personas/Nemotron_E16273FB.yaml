personas:
  professional: Ramnarace Cheatom is a high‑school senior, soon to enroll in a state university’s computer‑science program, who blends meticulous time‑management with a hands‑on curiosity for hardware,
    leading the robotics club’s Arduino projects while coordinating community‑service drives; they excel at Excel data visualisation, Python automation, public speaking from student‑council experience,
    and serve as point guard on the school basketball team, using strategic thinking both on the court and in software design to prepare for internships that will marry tech development with mental‑health
    impact.
  sports: Ramnarace Cheatom is a point guard for the YMCA community league and the high‑school basketball team, where they orchestrate fast breaks and prioritize team cohesion, cheering for the Charlotte
    Hornets in the NBA and the UNC Tar Heels during college season, while also participating in weekend pick‑up games at the local park and following the NBA’s statistical analyses on Basketball‑Reference
    to sharpen their on‑court decision‑making.
  arts: Ramnarace Cheatom immerses themselves in classic hip‑hop legends like Nas and A Tribe Called Quest, gospel powerhouses such as Kirk Franklin and CeCe Winans, and crafts their own beats in FL Studio,
    while their leisure reading includes Isaac Asimov’s Foundation series, William Gibson’s Neuromancer, and Octavia Butler’s Kindred; they attend occasional open‑mic nights at the community centre and
    enjoy dissecting the storytelling techniques of sci‑fi authors, which fuels their creative coding projects.
  travel: Ramnarace Cheatom plans trips with the same Excel rigor they apply to schoolwork, having road‑tripped to Asheville for its Blue Ridge vistas, explored the historic sites of Washington, D.C., and
    spent a weekend in New York City catching a Broadway show; they dream of a future study‑abroad stint in Tokyo to witness cutting‑edge tech expos, and they budget future travel by setting aside a modest
    portion of their part‑time earnings each month, balancing academic obligations with a desire for cultural immersion.
  culinary: Ramnarace Cheatom enjoys cooking family‑style Southern comfort dishes on weekends, perfecting crispy fried chicken, buttery collard greens seasoned with smoked paprika, creamy mac and cheese,
    fluffy buttermilk biscuits, and sweet potato casserole topped with marshmallows; they experiment with homemade hot sauce using cayenne, garlic, and vinegar, and they often pair meals with a side of
    iced tea, though they occasionally order pizza while gaming late into the night.
  core: Ramnarace Cheatom is a meticulous, tech‑savvy teen whose disciplined curiosity and intense anxiety drive a relentless pursuit of organized innovation, community service, and basketball leadership,
    even as they occasionally over‑commit, stay up late gaming, and binge‑order pizza for comfort.
background:
  cultural: Ramnarace was raised in a close‑knit African‑American family in Waxhaw, North Carolina. His grandparents arrived in the South during the Great Migration, bringing stories of resilience from
    the civil‑rights era that shape his sense of pride and responsibility. He grew up attending the historic First Baptist Church, where gospel music, community service, and intergenerational storytelling
    formed a core part of his upbringing. The local Black community in Union County emphasizes mutual support, education, and perseverance, values that reinforce his disciplined approach to goals. At the
    same time, he embraces contemporary Black culture—hip‑hop, basketball, and online activism—which blends with Southern traditions like soul‑food cooking and church picnics. This layered cultural heritage
    informs his worldview, fuels his ambition to give back, and grounds his identity within both regional and broader African‑American experiences.
attributes:
  skills: '["Organized time management", "Advanced Excel data analysis", "Basic Python scripting", "Project planning and coordination", "Public speaking and debate", "Student council leadership", "Community
    outreach coordination", "Personal finance budgeting", "Team basketball playmaking", "Problem solving and critical thinking"]'
  hobbies: '["Raspberry Pi and Arduino tinkering", "Basketball at the local YMCA", "Producing hip‑hop beats with FL Studio", "Reading science‑fiction and tech blogs", "Journaling for mental‑health", "Playing
    strategy video games (e.g., Civilization)", "Tutoring middle‑school math at the community centre", "Cooking Southern soul‑food recipes", "Listening to gospel music", "Sketching digital art"]'
  career_goals: Ramnarace aims to translate his disciplined curiosity into a career in technology. He plans to enroll in a state university’s Computer Science program, focusing on software engineering and
    data analytics. While studying, he hopes to secure internships that let him apply his project‑management skills to real‑world tech solutions, especially those that improve mental‑health resources—a
    personal passion given his own emotional reactivity. After earning his degree, he envisions working as a software developer at a firm that values community impact, eventually leading a team that creates
    accessible mental‑wellness apps. Long‑term, he wants to mentor other Black youth from rural North Carolina, offering guidance on both technical careers and coping strategies for anxiety and stress.
