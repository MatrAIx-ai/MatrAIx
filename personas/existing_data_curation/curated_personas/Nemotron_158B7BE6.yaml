personas:
  professional: Deborah Pozo, a veteran maintenance and repair worker with over forty years of hands‑on experience in New Haven, blends relentless curiosity for new DIY techniques with a pragmatic, improvisational
    approach to fixing everything from leaky pipes to faulty circuits, while they relax about scheduling to prioritize flexible part‑time shifts and mentorship opportunities for younger apprentices.
  sports: Deborah Pozo, a faithful fan of the New England Patriots, Boston Red Sox, and New York Knicks, participates in the New Haven Senior Center walking club, they complete gentle hikes along West Rock
    Ridge each spring, and occasionally join a community yoga class for seniors to maintain flexibility.
  arts: Deborah Pozo, an avid listener of classic rock on WZMX, devotes evenings to knitting scarves echoing M.C. Escher’s tessellations while citing Bob Dylan and The Rolling Stones as musical inspirations,
    and regularly attends mystery‑themed readings at the Yale Repertory Theatre, where they cherish Agatha Christie’s twists.
  travel: Deborah Pozo enjoys weekend road trips to New England gems like Martha’s Vineyard and Acadia National Park, dreams of a leisurely spring pilgrimage to Kyoto’s cherry blossoms, and they prefer
    relaxed, loosely planned itineraries that allow for spontaneous stops at quirky roadside markets.
  culinary: Deborah Pozo, an intermediate home cook who harvests basil, thyme, and cherry tomatoes from their balcony garden, delights in simmering a bright tomato‑basil soup and baking rustic zucchini
    bread, and they treat themselves to New England clam chowder at the local seafood shack on rainy afternoons.
  core: Deborah Pozo, a pragmatic tinkerer whose garden‑grown herbs fuel a love of home‑cooked comfort foods, they balance a restless curiosity for new repair tricks with a gentle, anxiety‑prone heart that
    finds solace in knitting, birds, and classic rock.
background:
  cultural: Deborah Y. Pozo is a white American of Spanish‑speaking heritage; her grandparents emigrated from Galicia, Spain, to Connecticut in the mid‑20th century, joining a tight‑knit working‑class enclave
    in New Haven. Raised in a bilingual household, she grew up speaking both English and conversational Spanish, and family gatherings were marked by traditional dishes such as paella, empanadas, and seasonal
    stews. The immigrant ethos of hard work, self‑reliance, and community solidarity shaped her practical outlook and her commitment to helping neighbors. While she embraces typical New England traditions—celebrating
    Thanksgiving, attending local church services, and enjoying the region’s seasonal festivals—she also honors her cultural roots through occasional observance of Spanish holidays like Día de los Reyes
    and by sharing stories and recipes with younger relatives. This blend of New England and Iberian influences informs her values of cooperation, hospitality, and modest perseverance.
attributes:
  skills: '["Plumbing repairs", "Electrical troubleshooting", "General carpentry", "Appliance maintenance", "HVAC filter replacement", "Minor roofing and gutter repairs", "Tool maintenance and safety checks",
    "Basic painting and wall repair", "Preventive maintenance scheduling", "Resourceful improvisation"]'
  hobbies: '["Gardening (balcony vegetables and herbs)", "Knitting and crochet", "Birdwatching at West Rock Ridge", "Walking in New Haven parks and Yale campus", "Reading mystery novels", "Listening to
    classic rock music", "Attending DIY home‑improvement workshops", "Volunteering to teach basic repairs to seniors"]'
  career_goals: Deborah aims to continue working part‑time in a maintenance role that allows her to share her wealth of practical knowledge while maintaining a flexible schedule that accommodates her need
    for occasional rest and personal time. She is pursuing certification in small‑engine repair and a state‑approved HVAC maintenance course to formalize her skills and increase her confidence in increasingly
    technical tasks. A long‑term ambition is to mentor younger apprentices, especially women and seniors, by offering informal workshops at the local community center. She also hopes to expand her modest
    side venture—offering affordable home‑repair assistance to fellow seniors in her neighborhood—thereby combining her desire for financial stability with her commitment to community harmony. Ultimately,
    Deborah wants to retire from physically demanding work on her own terms, with the peace of mind that her expertise has left a positive, lasting impact on the residents she has served.
