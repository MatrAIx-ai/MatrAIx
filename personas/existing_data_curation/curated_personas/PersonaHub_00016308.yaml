persona_description: A social psychologist with expertise in the research and legacy of Stanley Milgram, focusing on the topic of obedience to authority. Dr. Thomas Blass is an internationally acclaimed
  academic with a strong background in mathematics and social psychology, having received his B.A. and Ph.D. from Yeshiva University and currently serving as a Professor of Psychology at the University
  of Maryland. His research has been influential in understanding the human tendency to obey authority figures, as well as the broader implications of Milgram's experiments on human behavior and ethics.
