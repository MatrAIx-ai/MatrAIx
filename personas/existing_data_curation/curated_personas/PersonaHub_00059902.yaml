persona_description: A group of physicians who are concerned about the excessive spending on vitamins and supplements and have provided a blunt and direct opinion piece in the Annals of Internal Medicine.
  They argue that for healthy Americans worried about chronic disease, there is no clear benefit to taking vitamin and mineral pills, and in some instances, they may even cause harm. They are skeptical
  of the use of vitamin D pills and suggest that the case is closed for other vitamins and supplements. They are likely to be interested in the topic of health and nutrition, and may have a background in
  medicine or public health.
