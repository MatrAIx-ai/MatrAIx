persona_description: Dr. Yolanda Reid Chassiakos, a leading expert on children and adolescents' digital media use, is a professor at UCLA and the author of the "Children and Adolescents and Digital Media
  Technical Report." Her research focuses on the impact of digital media on children's development and behavior, particularly in relation to screen time and its effects on cognitive and social skills. Chassiakos
  is an advocate for the importance of balance in children's media consumption, advocating for parents to set appropriate limits on digital media use for their children. Her expertise and research have
  been cited in various media outlets, including the American Academy of Pediatrics, to promote healthy media habits for children.
