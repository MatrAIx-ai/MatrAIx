  hobbies: '[''Reading picture books'', ''LEGO building'', ''Drawing and coloring'', ''Cycling'', ''Soccer'', ''Sticker collecting'', ''Puzzle solving'']'
  career_goals: Lily dreams of becoming a teacher or librarian one day so she can share her love of books and help other children learn. She is drawn to careers that offer clear structure, routine, and
    the chance to guide others. Occasionally she imagines being a veterinarian because she adores animals and wants to care for them in a stable, organized setting.
