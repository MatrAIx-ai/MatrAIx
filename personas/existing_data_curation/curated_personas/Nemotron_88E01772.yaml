personas:
  professional: Lily Marino, a curious elementary school student, showcases an innate knack for spatial reasoning through LEGO builds, and they translate that into early problem‑solving skills and a penchant
    for organized, step‑by‑step projects that hint at a future career in engineering or architecture.
  sports: Lily Marino, a spirited member of the local under‑8 soccer club the Riverdale Rovers, cycles three times a week around the neighborhood, idolizes the local professional team the Metro Hawks, and
    they balance structured practice with spontaneous backyard tag games to stay active.
  arts: Lily Marino, an enthusiastic sketcher, fills their notebook with vibrant drawings of animals inspired by picture books like "The Very Hungry Caterpillar" and sessions of coloring Disney's Frozen
    characters, while also vibing to the playful tunes of Taylor Swift's early pop hits, and they often hum along.
  travel: Lily Marino, an adventurous family vacationer, loves organized trips to Orlando's Disney World and seasonal beach outings in the Outer Banks, preferring a well‑planned itinerary with scheduled
    breaks for sticker‑hunting at souvenir shops, yet they dream of exploring the castles of Edinburgh someday.
  culinary: Lily Marino, a budding kitchen helper, enjoys preparing simple meals such as peanut butter and jelly sandwiches, mac and cheese, and fruit salads with diced strawberries and bananas, and they
    proudly sprinkle shredded cheese on everything, though they sometimes over‑season with extra salt.
  core: Lily Marino blends a love for routine LEGO engineering with a cheeky sticker obsession, turning everyday chores into mini‑projects while they never forget to count the coins in their piggy bank.
background:
  cultural: Lily is a white American child raised in a suburban family in Fort Worth, Texas. Her household embraces typical Texas traditions such as Sunday church attendance, Fourth of July fireworks, local
    rodeo events, and family barbecues. The family celebrates holidays like Thanksgiving, Christmas, and Easter, and enjoys country music and community soccer games. Growing up in a friendly, middle‑class
    neighborhood, Lily has been taught the values of hospitality, responsibility, and routine that are characteristic of the region.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Hand-eye coordination'', ''Personal organization'', ''Routine adherence'', ''Collaborative play'', ''Clear communication'', ''Digital literacy'',
