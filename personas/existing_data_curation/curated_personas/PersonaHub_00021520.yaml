persona_description: A public policy analyst who specializes in the study of education policy, particularly the impact of tenure laws on teacher quality and retention. The person is deeply concerned about
  the inequities faced by low-income schools and the challenges they face in attracting and retaining good teachers. They are also knowledgeable about California's educational system and the challenges
  it faces in desegregating schools and ending poverty. They are critical of Vergara's case and the arguments made by proponents, and they are actively seeking solutions to improve the process for removing
  bad teachers and improving the conditions in struggling schools.
