  career_goals: Marquetta aspires to become a multimedia artist and concept designer, blending her love for abstract art with technology. She envisions a future where she creates immersive visual experiences
    for video games or animated films, possibly pursuing a degree in Visual Arts or Game Design at a university with strong arts programs. Long‑term, she hopes to lead a creative studio that champions innovative
    storytelling while incorporating cultural narratives from the African American experience.
