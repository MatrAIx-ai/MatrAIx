personas:
  professional: An experienced former elementary school teacher, Sharon Grant leverages three decades of curriculum development and adult literacy tutoring to meticulously document oral histories, organize
    a community digital archive, and manage project budgets, all while channeling a competitive drive toward winning regional quilting contests and a practical, detail‑oriented mindset.
  sports: Sharon Grant enjoys low‑impact fitness through solitary walks along the Congaree River wetlands, occasionally joins a senior walking club, avidly follows the Charleston Battery soccer team and
    the South Carolina Gamecocks football team, and supports the local Bamberg County senior softball league, preferring quiet personal exercise over competitive team sports.
  arts: Sharon Grant immerses themselves in the arts by crafting quilts that echo African motifs, listening to gospel legends like The Staple Singers and Delta blues icons such as Blind Willie McTell on
    a vintage record player, and reading historical nonfiction by authors such as Isabel Wilkerson, all of which enrich their reflective journaling and community storytelling.
  travel: Sharon Grant favors purposeful, low‑key travel, meticulously planning weekend trips to historic sites like Selma, Alabama, and Savannah, Georgia, while dreaming of a pilgrimage to New Orleans
    for its jazz heritage, balancing cultural enrichment with a modest budget and a preference for solitary exploration.
  culinary: Sharon Grant, a skilled home cook, regularly prepares collard greens seasoned with smoked turkey, sweet‑potato pie, and black‑eyed pea stew, while experimenting with lighter twists such as quinoa
    jambalaya and integrating garden‑fresh herbs like thyme, rosemary, and basil into their nutritious yet comforting dishes.
  core: Sharon Grant is a meticulous, solitary historian and quilter whose competitive drive and lingering worry fuel a lifelong quest to preserve community memory while finding calm in gardening, music,
    and reflective journaling.
background:
  cultural: Sharon is an African‑American woman whose roots run deep in the rural Black community of Bamberg County, South Carolina. Her grandparents migrated from the Deep South during the Great Migration,
    worked as sharecroppers, and later became active participants in the Civil Rights Movement of the 1960s. Family gatherings have long featured storytelling, gospel music, and the sharing of traditional
    recipes, reinforcing a sense of resilience, independence, and communal responsibility. The local church played a central role in her upbringing, providing spiritual support and a venue for cultural
    expression. Sharon’s identity is shaped by a blend of Southern culinary traditions, the oral heritage of African‑American history, and a commitment to preserving that legacy for future generations while
    navigating the challenges of aging and loss.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''Adult Literacy Tutoring'', ''Oral History Documentation'', ''Organic Gardening'', ''Quilting'', ''Community Budget Management'', ''Digital
