  hobbies: '["softball league","community basketball pick‑up games","hunting and fishing","DIY home improvement (woodworking, small‑engine repair)","volunteering with local fire department","attending Cleveland
    Browns games","visiting county fairs and community festivals"]'
  career_goals: John aims to advance from his current material‑mover role to a supervisory position within the next three years, targeting a shift supervisor or warehouse lead role where he can apply his
    organizational strengths to larger teams. He plans to earn an associate degree in logistics or supply‑chain management and obtain additional certifications such as Certified Logistics Associate (CLA)
    and advanced forklift training. Ultimately, he aspires to become a warehouse manager or plant operations manager, with the long‑term ambition of launching a small, community‑focused freight brokerage
    that leverages his practical expertise and commitment to efficiency.
