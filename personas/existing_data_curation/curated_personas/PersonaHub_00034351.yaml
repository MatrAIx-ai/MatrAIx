persona_description: A historian who is interested in the history of protest movements and the cultural iconography that emerged from them. They are particularly fascinated by the Peace Symbol, its origins,
  and its significance in the anti-war movement. They are also interested in the role of art in protest and the ways in which artists have used their work to express their political views. They may have
  a particular interest in the works of Gerald Holtom, the artist who created the Peace Symbol, and may be familiar with his other works and contributions to the anti-war movement.
