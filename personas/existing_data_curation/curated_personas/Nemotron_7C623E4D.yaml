personas:
  professional: Hiep Ngo is an enthusiastic community‑center art program coordinator who leverages a keen eye for visual composition, bilingual storytelling, and spontaneous facilitation to curate pop‑up
    exhibitions and intergenerational workshops, even though they sometimes wrestle with strict deadlines and overly rigid planning.
  sports: Staying active through morning walks with the local senior walking club and weekly yoga, Hiep Ngo cheers on the Boston Red Sox and Boston Celtics while occasionally joining a community garden
    fitness group that does light gardening as exercise, and they enjoy watching the New England Patriots on game days.
  arts: Hiep Ngo immerses themselves in watercolor and mixed‑media creation, regularly visits exhibitions by contemporary artists like Kehinde Wiley and local Boston painter Sarah Whitcomb, attends performances
    at the American Repertory Theater, and finds inspiration in the street art of Boston’s North End, which fuels their own storytelling workshops.
  travel: Hiep Ngo prefers spontaneous, culturally rich trips, having explored Morocco’s souks and Italy’s Renaissance towns, dreaming of a future residency in their ancestors’ mountain village to study
    folk art, while also cherishing nearby getaways to Cape Cod’s lighthouses and the vibrant streets of New Orleans.
  culinary: Hiep Ngo delights in cooking fragrant pho broth, crisp bánh mì with lemongrass‑marinated pork, and fresh spring rolls using rice vermicelli, cilantro, and star‑anise, while their modest cooking
    skill is complemented by a love for tasting new herbs at the Boston Public Market and sharing meals at community potlucks.
  core: Hiep Ngo is a lively, curious 60‑year‑old who blends spontaneous art activism with gentle yoga, occasional forgetfulness about deadlines, and an unending appetite for flavorful soups and cultural
    storytelling.
background:
  cultural: Hiep is a first‑generation Vietnamese‑American. Her parents arrived in the United States as refugees after the Vietnam War and settled in Boston before moving to Mattapan. She grew up bilingual,
    steeped in Vietnamese language, cuisine, Buddhist and ancestral traditions, while also absorbing the multicultural environment of Greater Boston. She annually celebrates Tet and the Mid‑Autumn Festival,
    remains active in the local Vietnamese community and other Southeast Asian networks, and blends those heritage practices with New England customs such as attending town fairs and supporting local arts
    initiatives.
