  hobbies: '[''Watercolor painting'', ''Mixed media art'', ''Traditional Vietnamese cooking'', ''Community gardening'', ''Volunteer teaching at senior center'', ''Attending theatre performances'', ''Street
    photography'', ''Book club reading'', ''Yoga'', ''Traveling to cultural festivals'']'
  career_goals: Hiep aims to volunteer as an art program coordinator for the Mattapan Community Center, develop a series of workshops on Southeast Asian folk arts, and launch a digital archive of oral histories
    from local immigrant elders. She also hopes to write and self‑publish a memoir chronicling her family’s journey from Vietnam to New England, and eventually travel back to Vietnam for a cultural immersion
    and art residency. By sharing her love of art and culture, she seeks to inspire younger generations and strengthen intergenerational ties in her neighborhood.
