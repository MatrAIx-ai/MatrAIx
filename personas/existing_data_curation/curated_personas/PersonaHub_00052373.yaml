persona_description: A conservationist who is passionate about the protection and conservation of Cambodia's unique wildlife, particularly the Giant Ibis and White-shouldered Ibis. They are dedicated to
  the implementation of creative conservation initiatives, such as the Ibis Rice project, which aims to increase the rice yields of farmers in the forest where these birds breed and feed. The persona is
  also interested in the ecological impacts of deforestation and hunting on the birds' population, and they are committed to finding solutions to these issues. They are aware of the challenges faced by
  the birds, such as the reduction of wild mammal populations, the drying up of feeding places, and the increasing land-use pressures, and they are actively seeking ways to mitigate these impacts. The persona
  is also interested in the impact of the Ibis Rice project on the village communities, and they are interested in the social and economic benefits that the project provides. They are aware of the importance
  of the Giant Ibis and White-shouldered Ibis as national symbols of Cambodia, and they are committed to their conservation.
