  career_goals: Maria aims to advance from her current technical role to a lead data scientist position within a regional research institute or state agency, where she can shape data‑driven policies on
    environmental monitoring and community health in Northern New Mexico. She plans to earn an associate degree in statistics and obtain GIS Professional certification to deepen her expertise. A core ambition
    is to establish a mentorship program for young women and Spanish‑speaking students interested in STEM, fostering a pipeline of local talent. She also hopes to publish case studies that demonstrate how
    rigorous data practices can improve resource management in rural settings.
