personas:
  professional: Maria Ramirez, a meticulous applied mathematician and data specialist at a state research institute, transforms messy environmental datasets into reproducible predictive models using Python,
    R, SQL, and GIS, while their disciplined workflow and bilingual communication ensure clear, actionable insights for policymakers and community stakeholders.
  sports: Maria Ramirez, an avid hiker of the Sangre de Cristo Mountains and yoga enthusiast who practices three times weekly, follows New Mexico United soccer matches, occasionaly joins a local cycling
    club for low-key rides, and they prefer solitary trail runs over large team sports.
  arts: Maria Ramirez, a quiet member of a science-fiction book club, relishes novels by Isaac Asimov, Liu Cixin, and Ann Leckie, attends occasional local theater productions of contemporary plays, and
    they listen to ambient composer Brian Eno while analyzing data, which fuels creative problem-solving.
  travel: Maria Ramirez, a methodical planner, prefers short, low-stress trips to Santa Fe's art markets and nearby national forests for stargazing, while they dream of a meticulously organized adventure
    to Chile's Atacama Desert to photograph its famed night skies.
  culinary: Maria Ramirez, a competent home chef, frequently prepares paella with saffron, chorizo, and fresh cilantro, crafts empanadas and tamales using corn masa and house-grown herbs, and they occasionally
    over-season in pursuit of the perfect flavor balance, reflecting both precision and a love for comforting tradition.
  core: Maria Ramirez balances razor-sharp organization with a restless curiosity, weaving data science, night-sky observation, and precise cooking into a life marked by disciplined achievement and occasional
    anxiety-driven overanalysis that they struggle to quiet.
background:
  cultural: Maria was raised in a bilingual, Spanish‑heritage household in Ranchos de Taos, where family ties, Catholic traditions, and local Hispanic customs shape daily life. She speaks fluent Spanish
    and English and regularly celebrates cultural festivities such as Nuestra Señora de Guadalupe, Día de los Muertos, and the annual Taos Pueblo Fiesta. Her involvement with the historic Santa Cruz de
    la Cañada church and participation in community potlucks reinforce a strong sense of belonging. The blend of Spanish colonial and Pueblo influences evident throughout the Taos valley informs her appreciation
    for craftsmanship, communal responsibility, and respect for both the land and its history.
