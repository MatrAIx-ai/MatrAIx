  career_goals: Kyle wants a career that lets his creativity and social energy thrive without rigid schedules. He dreams of becoming a multimedia artist or digital content creator, producing visual art,
    music, and short videos for platforms like YouTube, TikTok, or Instagram. He is also attracted to community‑arts coordination or event planning, where he can curate experiences and bring people together.
    Ultimately, he hopes to study visual arts or digital media in college, while preserving a flexible work environment that supports his spontaneous style and provides emotional outlets.
