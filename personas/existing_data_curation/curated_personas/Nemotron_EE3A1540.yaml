personas:
  professional: William Hall, a 16‑year‑old aspiring multidisciplinary digital artist, merges hand‑drawn fantasy illustration with self‑taught Python generative art, leveraging their methodical project
    planning and intense imagination to craft narrative‑driven visual experiences while quietly navigating the demands of school.
  sports: William Hall prefers low‑impact solo activities, joining the local community center’s weekend swimming club and cheering for the Los Angeles Lakers while occasionally attending the high‑school
    basketball team, the Riverdale Raptors, for social outings, and using chess tournaments as a mental fitness regimen.
  arts: William Hall finds inspiration in the surreal brushwork of James Gurney, the narrative depth of Hay Hayao Miyazaki’s animated films, and the ambient soundscapes of Brian Eno, often revisiting these
    creators while sketching fantastical realms in a battered sketchbook.
  travel: William Hall dreams of immersive trips to the misty highlands of Scotland to study ancient folklore, the neon‑lit streets of Tokyo for its blend of tradition and tech, and weekend hikes in the
    nearby Blue Ridge Mountains to recharge away from screens.
  culinary: William Hall’s culinary curiosity leans toward experimental comfort food, occasionally attempting homemade ramen with miso, scallions, and soft‑boiled eggs, while mostly ordering take‑out sushi
    rolls with avocado and cucumber after late‑night coding marathons.
  core: William Hall is a solitary teen visionary who channels anxiety into intricate fantasy art, balances meticulous budgeting with occasional impulsive comic‑book splurges, and thrives on quiet routines
    that blend code, sketch, and a soundtrack of ambient jazz.
background:
  cultural: William grew up in Solomon, a small rural town in north-central Kansas, within a predominantly white Midwestern community. His family lineage traces back to German-American and Scandinavian
    settlers typical of the region, a heritage that values hard work, self-reliance, and modesty. The local culture emphasizes close-knit community ties, reverence for the wide-open prairie, and a pragmatic
    outlook, but offers limited exposure to broader artistic scenes. These surroundings have shaped William's preference for solitude, his appreciation for natural landscapes that often appear in his art,
    and his strong work ethic that underlies his organized approach to personal projects.
attributes:
  skills: '["traditional drawing", "digital illustration", "self-taught Python programming", "creative writing", "critical analysis of abstract concepts", "research and information synthesis", "project
