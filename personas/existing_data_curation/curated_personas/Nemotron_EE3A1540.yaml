  hobbies: '["drawing and sketching", "digital illustration", "creative writing (stories, poetry, journaling)", "coding (Python, generative art)", "reading speculative fiction and philosophy", "chess and
    logic puzzles", "piano practice", "collecting vintage comic books", "watching indie animation"]'
  career_goals: William aims to become a multidisciplinary digital artist who creates immersive narrative experiences. He plans to earn a scholarship to a specialized art-and-technology college where he
    can expand his portfolio of illustration, interactive media, and concept art. His long-term ambition is to work as an indie game developer or concept artist for an animation studio, producing visual
    stories that explore mental-health themes and abstract ideas. He also hopes to publish a graphic novel that weaves his artwork with personal narratives about anxiety and resilience, using his creations
    to connect with others who feel isolated.
