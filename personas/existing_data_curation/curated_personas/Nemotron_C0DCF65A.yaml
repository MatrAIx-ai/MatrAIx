  hobbies: '["Knitting and crocheting", "Gardening (vegetables and flowers)", "Baking pies and making preserves", "Reading historical fiction and memoirs", "Bird-watching", "Walking familiar foothill trails",
    "Church attendance and choir singing", "Volunteering at the senior center", "Participating in the Golden Farmers Market"]'
  career_goals: Although retired, Penny's ambitions are rooted in maintaining her independence and continuing her quiet contributions to her community. She aims to stay active by walking the foothill trails
    three times a week, to keep volunteering at the local senior center where she mentors new volunteers, and to compile a small family cookbook of treasured recipes for her grandchildren. She also hopes
    to support the Golden Harvest Festival by coordinating the volunteer schedule each year and to preserve the oral histories of her neighbors by recording short interviews for the town’s historic society.
    Her goals emphasize steady, purposeful engagement rather than dramatic change, reflecting her calm resilience and love of routine.
