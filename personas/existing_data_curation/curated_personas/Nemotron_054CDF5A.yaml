personas:
  professional: Mohamed Greene, a budding digital creator, blends their skill in drawing, LEGO building, and Scratch programming with their methodical planning and calm curiosity, turning playtime into
    miniature design projects.
  sports: Mohamed Greene, a regular rider for the Neighborhood Bike Club, enjoys weekly bike rides, plays on the local youth soccer team the Riverdale Rangers, cheers for the city’s major league baseball
    team the Springfield Sluggers, and keeps a hand-written log of their ride distances and soccer practice drills.
  arts: 'Mohamed Greene, an avid young artist, spends afternoons sketching in the style of Claude Monet, experimenting with digital brushes inspired by BeeBop (a kid-friendly digital illustrator), and visits
    the community art gallery to admire works by Banksy and the animated film masterpiece ‘Spider-Man: Into the Spider-Verse’, which fuels their own creative stories.'
  travel: Mohamed Greene, who loves planning day trips, frequently explores the nearby botanical garden and the city’s natural history museum, dreams of visiting the Grand Canyon's rim and Japan's teamLab
    Borderless digital art museum, and prefers travel that blends quiet nature walks with hands-on museum experiences.
  culinary: Mohamed Greene, a confident junior cook, enjoys assembling homemade pepperoni pizza with mozzarella, fresh basil, and tomato sauce, whips up a mango-banana smoothie with a splash of orange juice,
    and occasionally experiments with drawing food plates before eating, though they often forget to finish their vegetables.
  core: Mohamed Greene is a calm, methodical nine-year-old who converts curiosity into LEGO wonders, digital art experiments, and meticulously saved allowance, yet can’t resist staying up late with sci-fi
    novels and forgetting to clean their bike.
background:
  cultural: Mohamed is a white, Midwestern American growing up in Mount Clemens, Michigan, a small city in Macomb County near Detroit. His family reflects the region’s blend of suburban and small‑town culture,
    emphasizing community involvement, respect for hard work, and participation in local traditions such as the annual county fair, Fourth of July parades, and school events. He celebrates common U.S. holidays
    like Thanksgiving and Christmas, and his upbringing includes exposure to the area's automotive heritage, local art programs, and public library services that nurture his curiosity and appreciation for
    varied experiences.
