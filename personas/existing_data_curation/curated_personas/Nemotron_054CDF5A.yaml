  career_goals: Inspired by his curiosity for art and new ideas, Mohamed aspires to become a video‑game designer or an interactive storyteller, blending his visual creativity with technology. He also dreams
    of exploring space as an astronaut, reflecting his fascination with science and unconventional thinking. In the short term, he aims to master Scratch, improve his drawing skills, and lead school projects
    that combine art and tech, laying a foundation for future careers in design, engineering, or science communication.
