personas:
  professional: Kevette Braddy is a seasoned community organizer and oral historian who orchestrates neighborhood festivals, mentors volunteers in traditional cooking, and, because they are calm and resilient,
    navigates last‑minute changes while preserving the historic rhythms of the Treme district.
  sports: Kevette Braddy stays active by walking the French Quarter and Treme neighborhoods daily, dancing at local jazz clubs to the beat of the New Orleans Saints marching band during game days, and participating
    in a senior bowling league affiliated with the Pelicans fan club, while they follow a gentle stretching routine to ease arthritis.
  arts: Kevette Braddy immerses themselves in the city’s vibrant jazz tradition, regularly attending performances by Wynton Marsalis at the Jazz Museum, listening to the soulful recordings of Dr. John,
    and curating oral storytelling sessions that echo the lyrical storytelling of local poet Sonia Sanchez, because they cherish the improvisational spirit that ties community to music.
  travel: Kevette Braddy prefers modest, well‑planned trips that blend family history and music, such as a road‑trip to Biloxi to trace ancestral roots, a weekend pilgrimage to the New Orleans Jazz & Heritage
    Festival, and a recent visit to Mobile’s historic districts, while they budget carefully to keep travel affordable in retirement.
  culinary: Kevette Braddy expertly blends classic Creole dishes—gumbo simmered with okra, jambalaya spiced with thyme, and beignets dusted with powdered sugar—with fresh basil and thyme from their balcony
    garden, often adding a pinch of smoked paprika for a contemporary twist, because they love experimenting in the kitchen.
  core: Kevette Braddy is a lively garden‑tending oral‑history champion who blends meticulous organization with spontaneous celebration, never shies away from the spotlight, and keeps a secret stash of
    extra powdered sugar for midnight beignet cravings, because they love sweet surprises.
background:
  cultural: Born and raised in the historic Treme district of New Orleans, Kevette grew up immersed in a rich tapestry of African‑American and Creole culture. Her family celebrated Mardi Mardi and second‑line
    parades with fervor, and the kitchen was a hub of generational knowledge, preserving beloved Creole recipes and the rhythm of gospel and jazz music. The civil‑rights activism of the 1960s, championed
    by her grandparents, instilled a strong sense of community service and resilience. Fluent in the local Creole vernacular, she carries forward oral storytelling traditions, knows the histories of brass
    bands, and honors the culinary heritage that defines the city. Her lifelong connection to church, neighborhood festivals, and community mutual aid reflects the interwoven cultural identity of Black
    New Orleanians.
attributes:
  skills: '["Creole Cooking", "Event Planning", "Oral History Storytelling", "Community Mediation", "Urban Gardening", "Budget Management", "Mentorship and Youth Tutoring"]'
  hobbies: '["Gardening", "Cooking & Recipe Development", "Jazz and Live Music", "Walking Tours of Historic Neighborhoods", "Church Choir Singing", "Dancing (Zydeco & Jazz)", "Card Games (Bridge, Spades)",
    "Mahjong", "Oral History Recording"]'
  career_goals: At this stage of her life, Kevette aims to solidify her legacy by compiling a family cookbook that blends treasured recipes with personal stories, and by contributing a memoir of her experiences
    in New Orleans' vibrant African‑American community. She seeks to lead an oral‑history project with the Historic New Orleans Collection, training teens to record and archive the memories of longtime
    residents. Kevette also aspires to serve on the board of a local senior‑advocacy nonprofit, championing improved services and social connections for senior citizens. In addition, she hopes to travel
    to the Gulf Coast to explore her family's ancestral roots and to attend regional jazz festivals, continuing her lifelong love of music and cultural discovery.
