personas:
  professional: Lisa Sharp, a retired homemaker turned community art advocate, leverages their meticulous budgeting skills, deep curiosity for art history, and gentle assertiveness to organize senior art
    workshops, curate a neighborhood exhibition featuring senior artists, and mentor youth in creative projects.
  sports: Lisa Sharp enjoys low-impact fitness through the North Bergen Senior Walking Club, follows the New York Yankees during baseball season and the New Jersey Devils in hockey winter, and occasionally
    attends a community yoga class for seniors.
  arts: Lisa Sharp nurtures their artistic sensibility by taking watercolor and collage classes, attending live jazz performances featuring artists like Wynton Marsalis, and guiding friends through exhibitions
    that highlight Monet's Impressionist works and the regional history showcased at the Hoboken Historical Museum.
  travel: Lisa Sharp prefers curated day trips to historic New Jersey towns such as Princeton and Morristown, and dreams of weekend pilgrimages to iconic East Coast museums like the Metropolitan Museum
    of Art and the Smithsonian American Art Museum, planning each journey with a detailed itinerary and modest budget.
  culinary: Lisa Sharp combines their modest balcony garden, filled with basil, thyme, and rosemary, with confident kitchen technique to craft dishes ranging from Thai green curry and Mexican tamales to
    classic Italian risotto, and delights in baking lemon scones and almond biscotti for intimate family gatherings.
  core: Lisa Sharp, a curious yet quietly assertive retiree, balances meticulous budgeting with occasional impulse buys of vintage kitchen tools, channels artistic passion into community projects, and sometimes
    forgets to water their balcony herbs during rainy days.
background:
  cultural: Lisa is a second‑generation American of European descent, raised in a mid‑20th‑century suburban setting in New Jersey. Her family traditions blend typical American holidays, a Catholic church
    community, and an appreciation for folk music and crafts. Living in North Bergen, an ethnically diverse area, she has been exposed to a variety of cultural influences that broadened her openness to
    unconventional ideas and fostered her interest in art from multiple traditions. Her background emphasizes self‑reliance, community involvement, and respect for heritage, which are evident in her dedication
    to preserving family stories and active participation in local volunteer activities.
