  career_goals: Although retired, Lisa aims to deepen her art knowledge by pursuing a community‑college certificate in art history and curating a small exhibition featuring senior artists in her neighborhood.
    She hopes to travel to renowned East Coast museums, documenting her experiences in a memoir that intertwines personal history with reflections on art. Lisa also wishes to teach cooking workshops at
    the local senior center, volunteer as a mentor for youth art programs, and contribute to preserving North Bergen’s local history through oral‑history projects. Her broader ambition is to combine her
    love of art, storytelling, and community service to leave a lasting, positive impact on her family and neighborhood.
