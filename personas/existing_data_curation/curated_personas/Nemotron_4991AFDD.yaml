  career_goals: Osvaldo aims to earn a master's degree in educational leadership within the next two years, positioning himself for an assistant principal role. He aspires to develop a school‑wide interdisciplinary
    program focused on environmental sustainability and to lead district‑level professional development that blends research‑based practices with practical classroom strategies. Long‑term, he hopes to become
    a principal who strengthens student mental‑health supports, expands community tutoring initiatives, and contributes to education journals on effective pedagogy.
