personas:
  professional: Savyon Garcia, a 1‑year‑old infant explorer, treats each playtime as a miniature laboratory, seamlessly merging curious imagination with practical problem‑solving, eagerly joining daycare
    group circles, sharing toys out of heartfelt compassion, and navigating the spontaneous chaos of scattered blocks with a natural knack for teamwork.
  sports: Savyon Garcia, a 1‑year‑old, splashes joyfully in a weekly baby swim class at the community pool, crawls enthusiastically through the toddler gymnastics program at Tiny Tots Playgroup, and claps
    along excitedly whenever parents play the Baltimore Orioles’ radio broadcast, proudly wearing a tiny team cap.
  arts: Savyon Garcia, a 1‑year‑old, giggles to the upbeat tunes of Raffi’s ‘Baby Beluga’ and sways to the gentle lullaby “Twinkle, Twinkle, Little Star,” flips through the vivid pages of Eric Carle’s “The
    Very Hungry Caterpillar,” and eagerly mimics the expressive gestures of Sesame Street’s Elmo during interactive storytime.
  travel: Savyon Garcia, a 1‑year‑old, delights in family road trips to the sun‑kissed shores of San Diego’s La Jolla Cove, enjoys stroller‑friendly explorations of the San Diego Zoo’s panda exhibit, and
    prefers relaxed nap‑heavy stays at beachfront resorts where their caregiver can plan spontaneous sand‑castle building sessions.
  culinary: Savyon Garcia, a 1‑year‑old, relishes the natural sweetness of mashed ripe bananas, the creamy comfort of avocado puree, the bright orange of carrot mash sprinkled with a hint of cinnamon, and
    often reaches for soft cheese sticks and tiny whole‑grain crackers, while occasionally grimacing at the texture of steamed broccoli florets.
  core: Savyon Garcia, a 1‑year‑old bundle of curious energy, constantly juggles spontaneous bursts of toy‑scattering with a gentle habit of sharing, radiates compassionate giggles in group play, and occasionally
    stalls bedtime with a determined refusal to let go of a beloved plush rabbit.
background:
  cultural: Savyon is part of an American Indian family with ancestral ties to the Coast Miwok and Ohlone peoples of the San Francisco Bay region. His family lives in Daly City, where they participate in
    local tribal gatherings, seasonal ceremonies, and the passing down of oral histories. The household also reflects his Garcia surname, indicating a blend of Native and Hispanic cultural influences, with
    bilingual exposure (English and Spanish) and a cuisine that includes traditional dishes from both heritages. These cultural roots emphasize respect for the land, community cohesion, and the sharing
    of stories, which shape his compassionate and cooperative disposition.
