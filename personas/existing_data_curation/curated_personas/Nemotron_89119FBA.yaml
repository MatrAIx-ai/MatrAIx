  career_goals: Cheree dreams of a future where she can combine her love for animals, her curiosity about how things work, and her desire to help others. She envisions becoming a veterinarian who also designs
    fun, educational outreach programs for kids, or a science teacher who uses hands-on experiments to spark curiosity in classrooms. In the short term, she wants to earn a Junior Scientist badge from her
    school's science club, lead a community clean-up project, and volunteer at a local animal shelter. Her practical outlook drives her to seek a career that produces tangible results while making a positive
    impact on her community.
