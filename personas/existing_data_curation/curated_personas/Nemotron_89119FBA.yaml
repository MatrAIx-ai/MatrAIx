personas:
  professional: Cheree Cotter is an aspiring junior scientist who blends curiosity‑driven experiments with practical problem‑solving, and they often turn simple backyard projects like a baking‑soda volcano
    into mini‑engineering challenges while keeping a relaxed attitude toward school assignments.
  sports: Cheree Cotter dashes across the neighborhood field as a forward for the Little Lions Soccer Club, cheers on Manchester United and the U.S. Women's National Team during weekend matches, and they
    love high‑energy drills after school even though they sometimes misplace their cleats in the grass.
  arts: Cheree Cotter draws vibrant comic strips inspired by Marvel heroes and Pixar movies, dances to pop icons like Taylor Swift and BTS in their bedroom, and they frequently trade sketches with friends
    at the library's makerspace, showcasing a playful mix of visual storytelling and rhythm.
  travel: Cheree Cotter dreams of exploring the neon streets of Tokyo after a family trip to the California Science Center sparked their love of interactive exhibits, and they eagerly plan weekend bike
    rides to the nearby Redwood State Park, recalling a recent visit to the city's historic museum, although they sometimes forget to pack snacks for the adventure.
  culinary: Cheree Cotter whips up chocolate‑chip cookies with a pinch of sea salt and experiments by swirling in peanut‑butter or matcha, proudly labeling each batch with quirky names like Galaxy Crunch,
    yet they often over‑mix the dough and end up with flat cookies that still get devoured by friends.
  core: Cheree Cotter is a curious, sociable ten‑year‑old who turns every backyard experiment, soccer game, and comic sketch into a spontaneous adventure, even if they keep their backpack a perpetual mess.
background:
  cultural: Cheree grew up in Bolingbrook, a suburban community in DuPage County, Illinois, within a predominantly white, middle-class environment that values work ethic, community involvement, and family
    gatherings. Her family celebrates typical American holidays such as Thanksgiving, the Fourth of July, and Christmas, often with potluck meals and neighborhood block parties. Local traditions include
    attending the annual Summer Fest at the park, participating in school-organized service projects, and going to the public library for storytime and summer reading challenges. Her cultural upbringing
    blends Midwestern friendliness with a focus on practical problem-solving, reflecting the region's reputation for pragmatism and collaborative spirit. She also attends a community church where she learns
    about caring for neighbors and participating in volunteer activities.
