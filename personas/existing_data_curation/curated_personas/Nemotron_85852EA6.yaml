personas:
  professional: A retired residential maintenance specialist turned community safety consultant, Joshua Jett blends meticulous home‑repair know‑how with an easygoing, talkative style, and they lead senior
    safety workshops by applying their knack for organizing events, public speaking, and first‑aid training while balancing a preference for structure with a willingness to improvise when emergencies arise.
  sports: Joshua Jett is a die‑hard supporter of the local high‑school football team, never missing a Friday night game at Memorial Stadium, and they also enjoy casual weekend fishing trips at Galveston
    Bay while participating in a senior walking club that meets at the community park.
  arts: Joshua Jett finds solace in classic rock legends like Led Zeppelin and The Rolling Stones, sings baritone harmonies in their church choir, and they collect vintage vinyl records of 1970s country‑rock,
    which they spin while hosting backyard gatherings that double as informal music appreciation sessions.
  travel: Joshua Jett prefers road trips that combine family visits with heritage stops, having driven the historic Route 66 to explore the Grand Canyon and they have scheduled a future cruise to the Gulf
    Coast during the summer, balancing a love for familiar comforts with occasional adventurous detours.
  culinary: Joshua Jett is a backyard grill master who swears by smoker‑infused brisket, homemade salsa with fresh jalapeños, and a secret dry rub of coffee grounds and brown sugar, and they occasionally
    indulge in a late‑night slice of pepperoni pizza as a guilty comfort food.
  core: Joshua Jett is a sociable, detail‑oriented retiree who channels their love of community, classic cars, and classic rock into lively barbecues, while they battle a penchant for over‑worry and a habit
    of misplacing checklists.
background:
  cultural: Joshua is a white Texan who grew up in a suburban setting near Houston during the 1960s‑70s. Raised in a middle‑class family with roots in both agriculture and local industry, he was taught
    the value of self‑reliance, hospitality, and community involvement. His cultural identity blends Southern hospitality with Gulf Coast sensibilities, reflected in his love of communal gatherings, regional
    cuisine like Tex‑Mex, and participation in local traditions such as Fourth of July parades and county fairs. A lifelong member of a Protestant denomination, his faith has been a cornerstone of his family
    life and community service. This background informs his commitment to family, neighborly support, and preserving local heritage.
