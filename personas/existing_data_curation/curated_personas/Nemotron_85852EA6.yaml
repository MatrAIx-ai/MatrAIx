  hobbies: '[''Hosting neighborhood BBQs'', ''Watching high‑school football'', ''Classic car restoration'', ''Playing bridge and poker'', ''Genealogy research'', ''Nature walks'', ''Listening to classic
    rock'', ''Church choir singing'', ''Historical society meetings'']'
  career_goals: Although retired from the formal workforce, Joshua aims to channel his hands‑on expertise into community‑focused roles. He plans to obtain a certified CPR/First‑Aid instructor credential
    so he can lead safety workshops for seniors in his neighborhood, reducing his own anxiety about emergencies. He also hopes to start a modest home‑based consulting service providing home‑safety assessments
    for older adults, generating a small supplemental income while fostering a sense of purpose. Long‑term, he aspires to document his family's genealogy and share it with younger relatives, preserving
    his personal legacy and strengthening intergenerational ties.
