personas:
  professional: Antolin Perales is a floor‑worker at a San Antonio meat‑packing plant whose hands‑on expertise in HACCP safety, forklift operation, and rapid line troubleshooting is matched by a restless
    curiosity that drives them to experiment with unconventional process tweaks, even as they wrestle with deadline pressure while eyeing a shift‑supervisor role.
  sports: Antolin Perales bolts onto the local soccer field every Saturday for the City League, cheers for San Antonio FC, hits the courts for pickup basketball, and follows the Dallas Cowboys and the Texas
    Rangers, using the physical competition as a release from work‑day tension.
  arts: Antolin Perales sways to the brass‑filled sounds of Banda El Recodo and the corridos of Los Tigres del Norte at neighborhood festivals, while also vibing to video‑game soundtracks like those from
    The Legend of Zelda, and they occasionally dabble in amateur video editing for friends’ soccer highlights.
  travel: Antolin Perales prefers short road trips to the Hill Country vineyards and the historic Alamo, but dreams of a weekend pilgrimage to Oaxaca’s bustling markets, balancing limited savings with a
    desire to experience vibrant culinary festivals abroad.
  culinary: Antolin Perales slices pork shoulder for al pastor tacos, whips up chipotle‑marinated quinoa bowls, and experiments with kimchi‑infused salsa verde, showcasing an intermediate cooking skill
    set that blends traditional masa‑based dishes with bold global twists.
  core: Antolin Perales is a socially‑charged, competitively driven food‑processing pro who thrills to blend tacos with tech, yet often stumbles over deadlines and stress‑induced back pain.
background:
  cultural: Antolin grew up in a Mexican‑American household in San Antonio, where Spanish was spoken at home and English at school. His family celebrates Día de los Muertos, quinceañeras, and other Mexican
    traditions, emphasizing close‑knit family ties and community support. He identifies with the Catholic faith of many relatives, though he also respects the diverse spiritual practices in his neighborhood.
    The vibrant Mexican culture of Bexar County—its food, music, and festivals—has shaped his identity, giving him a strong sense of pride in his heritage while allowing him to navigate the multicultural
    landscape of Texas.
attributes:
  skills: '[''Food safety & sanitation'', ''HACCP compliance'', ''Production line operation'', ''Equipment troubleshooting'', ''Forklift operation'', ''Inventory management'', ''Bilingual communication
