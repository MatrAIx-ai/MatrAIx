  hobbies: '[''Playing soccer in a local league'', ''Cooking traditional Mexican dishes'', ''Attending community festivals and dancing to regional music'', ''Pickup basketball games'', ''Competitive video
    gaming'', ''DIY mechanical tinkering'', ''Exploring food trucks and street food'', ''Learning new cooking techniques'', ''Socializing with friends and family'', ''Listening to Mexican folk and pop music'']'
  career_goals: Antolin aims to move beyond his current floor‑worker role and become a shift supervisor within the next two years, using his on‑the‑job experience and pursuing an associate degree in industrial
    technology at a local community college. He plans to earn a Certified Food Safety Professional credential and a leadership certification to address his tendency to stress under tight deadlines. Long‑term,
    he dreams of managing a small, family‑run specialty food operation—perhaps a taco‑style boutique—where he can blend his practical knowledge of food processing with his love for Mexican culinary traditions.
    He is competitive about career advancement, hoping to earn enough to support his extended family and eventually open his own business.
