personas:
  professional: Lili Hill is a seasoned custodial specialist who leverages meticulous floor‑care expertise, strict OSHA compliance, and a methodical scheduling approach to keep large facilities spotless
    while training new staff and drafting clear SOPs, all in pursuit of a supervisory role and an eco‑friendly cleaning business.
  sports: Lili Hill enjoys weekend hikes along Lake St. Clair Metropark’s trails, participates in the local “St. Clair Hikers” club, cheers for the Detroit Lions and Detroit Tigers, and occasionally joins
    a community softball league, balancing her love for low‑impact outdoor activity with a pragmatic approach to fitness.
  arts: Lili Hill finds creative release in intricate quilting patterns inspired by traditional folk motifs, devours Agatha Christie mysteries and true‑crime podcasts, and attends monthly performances at
    the St. Clair Arts Center featuring folk singer Natalie Merchant and ballet troupe The Joffrey Company.
  travel: Lili Hill prefers well‑planned road trips that blend scenic drives with purposeful stops, having recently explored Mackinac Island’s historic sites, a weekend getaway to Toronto’s Kensington Market,
    and a culinary tour of Napa Valley’s vineyards, all while budgeting carefully to fund her garden’s expansion.
  culinary: Lili Hill loves baking seasonal pies—such as apple‑cinnamon, pumpkin‑spice, and cherry‑marbled—using home‑grown butter, local honey, and a flaky buttermilk crust, and she often pairs them with
    a warm cup of coffee while donating leftovers to her church’s food pantry.
  core: Lili Hill is a methodical custodial professional whose love for organized gardens, precise quilting, and budget‑savvy planning fuels a balanced life of community service, occasional indulgences,
    and a steadfast drive toward an eco‑friendly cleaning venture.
background:
  cultural: Lili grew up in a working-class white family in the Detroit metropolitan area, with roots in Irish-German heritage. Her parents worked in the automotive manufacturing sector, instilling a strong
    work ethic and community spirit. She attended public schools in Macomb County and has been an active member of her local Catholic parish, participating in charitable activities and neighborhood events.
    The Midwestern values of reliability, modesty, and practical problem-solving shape her outlook, and she continues to emphasize family cohesion and community involvement in her daily life.
