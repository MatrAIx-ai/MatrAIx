  career_goals: Lili aims to become a custodial supervisor within the next two years, leveraging her organizational talent to oversee a larger team and improve facility cleanliness standards. She plans
    to earn the Certified Professional Cleaner (CPC) credential and later pursue a bachelor’s degree in facilities management to qualify for a facilities manager role. In the long term she envisions starting
    her own small cleaning business that emphasizes eco-friendly products and reliable service, providing greater financial security for her family while mentoring new workers.
