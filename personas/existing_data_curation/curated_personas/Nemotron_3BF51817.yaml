  hobbies: '[''Playing acoustic guitar'', ''Cooking traditional Mexican dishes'', ''Landscape photography'', ''Attending local festivals'', ''Reading art history books'', ''Watching classic cinema'', ''Gardening
    herbs and chilies'', ''Volunteering as a church greeter'']'
  career_goals: Gerardo aspires to translate his sociable nature and love of culture into small‑scale entrepreneurship and community leadership. His primary ambition is to launch a home‑based catering service
    that offers traditional Mexican dishes for local events, complemented by cooking workshops where participants learn hands‑on techniques. He also aims to obtain a certification in HVAC repair or a related
    trade to secure part‑time work that leverages his mechanical aptitude. In the long term, Gerardo hopes to become a regular organizer of cultural events—such as art nights, music gatherings, and Día
    de los Muertos celebrations—strengthening the social fabric of Sweetwater while providing a modest income. To support these goals, he plans to continue online courses in culinary arts and basic business
    management, and to cultivate a network of local suppliers and volunteers.
