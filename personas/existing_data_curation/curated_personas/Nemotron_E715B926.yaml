  career_goals: Jorge aims to transition into a solutions architect role where he can design innovative, art‑inspired digital experiences while maintaining deep technical involvement. He aspires to lead
    a remote, cross‑functional engineering team that values quiet, focused work environments, and to mentor junior developers, fostering a collaborative and harmonious culture. Over the next five years,
    he hopes to contribute to open‑source projects that bridge technology and visual art, and eventually launch a boutique consultancy that creates interactive installations for museums and cultural institutions.
