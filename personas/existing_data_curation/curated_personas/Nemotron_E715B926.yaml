personas:
  professional: Jorge Perez is a seasoned full-stack software engineer with deep expertise in Python, Java, C++ and cloud architecture, who translates his love for visual arts into meticulously designed
    user interfaces and scalable systems, leading remote teams with a quiet, methodical style that balances technical rigor and aesthetic elegance.
  sports: Jorge Perez enjoys solitary trail hikes in the San Bernardino mountains, jogs on weekends with the local San Bernardino Hiking Club, and follows the Los Angeles Lakers, Los Angeles Dodgers, and
    LA Galaxy for seasonal sporting excitement, while preferring low-impact cardio over team sports.
  arts: Jorge Perez immerses himself in visual arts, drawing inspiration from digital pioneers like Beeple, light installations by James Turrell, classic photographs by Ansel Adams, and graphic novels by
    Moebius, while listening to Radiohead and contemplating street art by Banksy, shaping his identity through a blend of tech-driven creation and traditional artistry.
  travel: Jorge Perez plans meticulous solo trips, favoring off-peak visits to places like Iceland’s volcanic landscapes, Kyoto’s historic temples in Japan, and the remote deserts of Utah, balancing adventure
    photography with budget constraints by using points from a travel rewards credit card and staying in eco-lodges that support quiet reflection.
  culinary: Jorge Perez delights in cooking traditional family dishes such as braised pork shoulder with ancho chilies, masa-based corn cakes, and richly spiced mole sauce, experimenting with sous-vide
    techniques and incorporating modern ingredients like liquid smoke and edible foams to reinvent familiar flavors.
  core: Jorge Perez blends a disciplined engineering mind with a solitary artist’s soul, carving out quiet moments for code, canvas, and contemplation while occasionally overindulging in late-night pizza
    and neglecting social gatherings.
background:
  cultural: Jorge grew up in a Mexican‑American household where Spanish was spoken alongside English, instilling a bilingual fluency that enriches his communication style. Family gatherings centered around
    shared meals, especially dishes like mole and tamales, reinforced values of hospitality, respect, and collective well‑being. He participates in local cultural events such as Día de los Muertos celebrations
    and Mexican heritage festivals in the Inland Empire, maintaining a strong connection to his roots while blending them with the diverse Californian context. His upbringing emphasized education as a pathway
    to upward mobility, shaping his dedication to continuous learning and community mentorship.
