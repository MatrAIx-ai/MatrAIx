personas:
  professional: Jay Lundy, a retired senior research engineer turned interdisciplinary creator, leverages their deep expertise in signal processing, machine learning, and data visualization to craft generative
    art installations that fuse rigorous computational models with vivid abstract watercolors, while they channel a competitive streak into meticulous project management and mentorship of budding engineers.
  sports: Jay Lundy stays active by hiking Paynes Prairie’s trails with the Gainesville Nature Hikers Club, cheering on the Florida Gators football team and the Tampa Bay Buccaneers, and playing weekly
    chess matches at the local community center, which they treat as mental cardio.
  arts: Jay Lundy channels their love for abstract expression into watercolors inspired by Kandinsky and generative visuals echoing James Turrell, while they often spend evenings listening to Brian Eno’s
    ambient albums and attending gallery openings featuring contemporary digital artists like Refik Anadol.
  travel: Jay Lundy plans meticulous week‑long trips that blend artistic inspiration with natural wonder, and they have recently explored the geothermal landscapes of Iceland and the Zen gardens of Kyoto,
    while dreaming of a future expedition to the Galápagos to sketch endemic bird species.
  culinary: Jay Lundy experiments in the kitchen by mastering sourdough starter, crafting Mediterranean dishes such as shakshuka with heirloom tomatoes, and they often incorporate exotic spices like sumac,
    all while maintaining a modest vegetable garden that supplies fresh greens for their meals.
  core: Jay Lundy is a fiercely curious retiree who fuses engineering precision with artistic whimsy, often juggling multiple generative projects, a stubborn tendency to over‑schedule, and a habit of double‑checking
    every expense before buying a new set of paints, and they rarely miss a chance to challenge themselves.
background:
  cultural: Jay grew up in a middle‑class white family in the Midwest, where a strong emphasis on education and self‑reliance shaped his worldview. Relocating to Gainesville for his graduate studies, he
    became part of the academic and artistic circles of the University of Florida, absorbing both Southern hospitality and the vibrant, diverse cultural scene of the region. His cultural identity blends
    classic American individualism with an appreciation for multicultural artistic expressions, reflected in his eclectic interests and community involvement.
