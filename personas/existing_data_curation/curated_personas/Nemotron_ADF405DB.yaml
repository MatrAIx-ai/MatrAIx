  hobbies: '[''Abstract Watercolor Painting'', ''Generative Art Programming'', ''Science Fiction Reading'', ''Philosophical Essays'', ''Chess'', ''Hiking'', ''Bird Watching'', ''Cooking'', ''Gallery Visits'',
