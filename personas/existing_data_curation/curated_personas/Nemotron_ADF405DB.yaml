  career_goals: Although retired, Jay aims to channel his curiosity into lifelong learning and community contribution. He plans to mentor undergraduate and graduate students through informal workshops,
    author a book exploring the convergence of art and technology, develop a series of interactive public art installations in Gainesville, volunteer for STEM outreach programs targeting underrepresented
    youth, and stay current with emerging AI tools to expand his generative art practice. He also sets personal competitive challenges each year, such as mastering new programming frameworks or completing
    ambitious art projects.
