persona_description: A journalist who is interested in exploring the reasons behind people's migration decisions and the impact of migration on individuals, families, and communities. They are curious about
  the motivations behind people's decisions to leave their home countries and the challenges they face when they do so. They are also interested in the impact of migration on the countries of origin and
  destination, as well as the social, economic, and political factors that contribute to migration patterns. They are likely to be passionate about human rights and social justice issues and are committed
  to informing and educating their readers about the complexities of migration and its effects on global society.
