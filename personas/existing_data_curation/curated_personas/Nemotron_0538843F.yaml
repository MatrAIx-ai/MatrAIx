personas:
  professional: Sajan Patel, a one‑year‑old budding explorer, demonstrates a blend of curiosity and practicality by meticulously arranging stacking rings and preferring familiar, sturdy toys over new, unpredictable
    gadgets, while their relaxed attitude toward routine leads to a delightfully spontaneous play style.
  sports: Sajan Patel enjoys solitary playtime in the backyard, occasionally dribbling a soft soccer ball while watching the local professional team’s matches on TV, but avoids group activities, preferring
    the quiet rhythm of their own movements.
  arts: Sajan Patel’s evenings are filled with lullabies by classical violinist Itzhak Perlman and colorful mobile art, and they often pause to stare mesmerized at animated performances of Mulan, indicating
    a quiet yet vivid appreciation for music and storytelling.
  travel: Sajan Patel has accompanied their family on a calming trip to a nearby lake cabin and a bustling airport stopover, preferring the soothing stroller strolls and open‑air nature walks over crowded
    planes, dreaming of future gentle explorations to mountain lodges.
  culinary: Sajan Patel favors sweet pureed mango and mildly spiced lentil puree, showing a selective palate that delights in familiar flavors while grimacing at bitter greens, reflecting a cautious yet
    curious approach to new foods.
  core: Sajan Patel is a one‑year‑old quiet‑minded explorer, balancing a curious drive to experiment with a relaxed, solitary demeanor that often leads to selective tastes, intermittent worry, and a playful
    disregard for rigid schedules.
background:
  cultural: Sajan is a South Asian child raised in Clinton, Maryland, within a Gujarati‑Indian family. At home, his parents speak Gujarati and English, and they observe cultural traditions such as Diwali,
