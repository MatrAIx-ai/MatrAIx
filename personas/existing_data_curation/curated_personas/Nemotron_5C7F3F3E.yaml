personas:
  professional: Evelyn Frazier, a retired senior who now volunteers as the church choir logistics coordinator and senior‑center event planner, applies their lifelong household management expertise, precise
    budgeting, and first‑aid certification to keep community activities running on a predictable schedule they find reassuring.
  sports: Evelyn Frazier enjoys low‑impact fitness through daily walks around the historic downtown district and a weekly senior walking club, cheering on the local baseball team, the Houston Astros, and
    following the Dallas Cowboys each football season, while steering clear of high‑intensity gym routines that might disrupt their carefully managed schedule.
  arts: Evelyn Frazier expresses creativity through hand‑stitched quilts and scrapbook pages, finds solace in singing with the church choir, and indulges in classic cinema, repeatedly watching films starring
    Cary Grant and Bette Davis, while also admiring the bold floral paintings of Georgia O’Keeffe displayed in their living room.
  travel: Evelyn Frazier prefers short, thoughtfully planned getaways, often joining family for weekend trips to the historic district of Galveston or taking a scenic train ride through the Texas Hill Country,
    while keeping their modest bucket‑list goal of visiting the lush gardens of the Biltmore Estate in Asheville, North Carolina.
  culinary: Evelyn Frazier delights in preparing Texas comfort staples such as hearty chili and slow‑cooked pot roast, often enhancing them with fragrant rosemary, basil, and sage harvested from their garden,
    and occasionally bakes rustic rosemary focaccia and sweet tea infused with fresh mint for guests at church gatherings.
  core: Evelyn Frazier blends disciplined routines with heartfelt creativity, anchoring each day in gardening, quilting, and choir while their gentle anxiety fuels meticulous planning and occasional over‑cautiousness
    that both comforts and restricts them.
background:
  cultural: Evelyn was born and raised in New Braunfels, Texas, a community steeped in German and Czech traditions blended with classic Southern values. Her family traces its roots to German immigrants
    who settled the Hill Country in the late 1800s, and she grew up celebrating Oktoberfest‑style events, Wurstfest, and traditional German baked goods while also embracing Texas customs like Sunday barbecues
    and church potlucks. Raised in a Protestant (Methodist) household, she has maintained a strong faith that informs her community involvement. The practical, no‑nonsense ethos of mid‑century rural Texas—self‑sufficiency,
    hard work, and close‑knit community ties—shapes her worldview and daily habits.
attributes:
  skills: '["home budgeting and financial management", "meal planning and cooking", "gardening (roses, herbs, vegetables)", "sewing and quilting", "basic digital literacy (email, video calls, online banking)",
