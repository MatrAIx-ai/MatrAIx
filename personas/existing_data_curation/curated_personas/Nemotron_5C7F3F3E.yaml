  hobbies: '["gardening (roses, herbs)", "quilting", "scrapbooking", "attending church services and choir", "participating in local German‑Texan festivals", "walking and birdwatching", "cooking Texas comfort
    food", "reading historical fiction", "watching classic movies"]'
  career_goals: Although retired from formal employment, Evelyn’s primary ambition is to maintain her independence and physical health so she can continue living safely in her longtime home. She aims to
    keep her garden thriving and her quilting skills sharp, passing these traditions on to her grandchildren. She also wishes to expand her volunteer work at the senior center, helping new volunteers learn
    caregiving basics and organizing intergenerational craft workshops. Managing her anxiety remains a personal goal; she is dedicated to using routine, mindfulness exercises, and regular social support
    to stay emotionally balanced.
