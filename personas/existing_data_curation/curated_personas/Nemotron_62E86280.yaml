  hobbies: '[''Personal vegetable gardening'', ''Photography'', ''Community soccer league'', ''Cooking Micronesian cuisine'', ''Volunteering at cultural harvest festivals'', ''Reading sustainable agriculture'',
    ''Model ship building'']'
  career_goals: Robby aims to advance from a miscellaneous agricultural worker to a certified farm manager within the next five years. He plans to complete his associate degree in Agricultural Science and
    obtain certifications such as Pesticide Applicator and Master Gardener. His long‑term ambition is to lead a sustainable, small‑scale farm that supplies local markets and supports the Micronesian diaspora
    in Sacramento through culturally relevant produce. He also hopes to mentor newer workers, applying his organized approach to improve operational efficiency and environmental stewardship.
