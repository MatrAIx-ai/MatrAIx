personas:
  professional: Richard Edwards, a 6‑year‑old budding engineer, channels their meticulous love of LEGO, rock cataloguing, and space nonfiction into early design projects, constantly drafting detailed schematics
    and challenging themselves with logic puzzles, while their competitive streak drives them to out‑solve peers in chess and build increasingly complex models.
  sports: Richard Edwards, an enthusiastic participant in the local junior gymnastics club, spends weekends practicing on the balance beam while cheering on the Dallas Mavericks and the Houston Astros on
    TV, yet prefers the structured challenge of chess tournaments over team sports, reflecting their competitive yet solitary nature.
  arts: Richard Edwards, who spends evenings re‑creating scenes from LEGO stop‑motion videos, draws inspiration from LEGO artist Nathan Sawaya, the whimsical scores of John Williams, and the animated adventures
    of Pixar, weaving these influences into their own detailed diagrams and imaginative play.
  travel: Richard Edwards, who prefers meticulously planned road trips with a printed itinerary, has already explored Space Center Houston and the Texas State History Museum, and dreams of visiting the
    Kennedy Space Center in Florida and the Grand Canyon, balancing a thirst for scientific discovery with a need for familiar routines.
  culinary: Richard Edwards, a budding chef who can flawlessly assemble peanut butter‑banana sandwiches and whip up a simple macaroni‑and‑cheese using a mini‑microwave, favors crunchy carrots, cheese quesadillas,
    and rocket‑shaped cookies baked with cocoa powder and sprinkles, delighting in the sensory precision of each bite.
  core: Richard Edwards, a fiercely organized 6‑year‑old with a relentless curiosity for space and engineering, channels competitive precision into LEGO constructions while battling occasional anxiety and
    a stubborn refusal to deviate from their meticulously drawn plans.
background:
  cultural: Richard is raised in a middle‑class white family in Fort Worth, Texas. His upbringing blends typical suburban Texan experiences—weekend trips to the Fort Worth Stockyards, community youth sports,
    and family barbecues—with broader American middle‑class values emphasizing self‑discipline, personal achievement, and modest independence. His family attends a local Methodist church, celebrates holidays
    like Thanksgiving and Independence Day with traditional meals, and encourages respect for effort and orderly behavior while fostering a reserved, introspective demeanor.
