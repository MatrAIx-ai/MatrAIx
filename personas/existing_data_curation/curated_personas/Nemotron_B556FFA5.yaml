  career_goals: Even at six, Richard dreams of a career that rewards precision and achievement. He talks about becoming an astronaut or aerospace engineer, designing exacting space‑craft, or working as
    an architect who creates perfectly measured structures. He also imagines being a detective who solves complex puzzles. His ambition is driven by a desire to meet the highest standards, and he often
    worries about making mistakes, motivating him to study hard and aim for top grades.
