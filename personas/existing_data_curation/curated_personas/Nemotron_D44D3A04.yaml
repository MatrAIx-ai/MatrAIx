personas:
  professional: Cynthia Lee, a curious one‑year‑old, revels in organized exploration through sensory play, stacking blocks and sorting shape puzzles, hinting at a future path in early childhood education
    or design where her innate attention to detail and flexibility will flourish.
  sports: Cynthia Lee enjoys toddler swimming lessons at the community pool, participates in Saturday Kids’ Gymnastics at the local YMCA, and enthusiastically waves an Orlando Magic jersey while cheering
    for the Orlando City SC during family game nights, embodying a playful, community‑focused approach to fitness.
  arts: Cynthia Lee delights in the vibrant illustrations of Dr. Seuss books, sways to Disney movie soundtracks and Pixar scores, and regularly watches performances by the Orlando Ballet’s youth troupe,
    weaving her love of color, rhythm, and storytelling into daily play.
  travel: Cynthia Lee has already explored the enchantment of Walt Disney World’s Fantasyland, splashed through the shallow springs of Wekiwa Springs State Park, visited toddler‑friendly exhibits at the
    Kennedy Space Center, and dreams of a future family road trip to the Grand Canyon, all while her parents balance vacation planning with her preschool schedule.
  culinary: Cynthia Lee favors the smooth taste of avocado‑banana puree, loves roasted sweet potato cubes, eagerly digs into cheese‑filled mini‑pasta shells, and often embarks on messy finger‑food adventures
    with chicken nuggets and steamed broccoli, showcasing a developing palate that blends sweet, savory, and tactile curiosity.
  core: Cynthia Lee, a bright‑eyed one‑year‑old, merges relentless curiosity with a gentle, community‑centric spirit, turning every simple activity into a mini‑exploration while occasionally demanding a
    second snack before bedtime.
