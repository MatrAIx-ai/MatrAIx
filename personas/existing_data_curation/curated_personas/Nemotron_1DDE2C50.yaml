personas:
  professional: Lina Koerselman is a senior finance manager with three decades of experience leading ERP implementations, advanced Excel modeling, and risk mitigation initiatives, and they leverage their
    structured, pragmatic approach to translate complex data into clear strategic roadmaps while mentoring junior staff and championing digital transformation across the organization.
  sports: Lina Koerselman joins the senior ladies’ golf league at Willowbend Country Club every Thursday, devotes herself to regular line‑dancing nights at the community center, and faithfully follows the
    Houston Astros, balancing low‑impact exercise with spirited social competition while they occasionally insist on strict tee‑time etiquette.
  arts: Lina Koerselman actively participates in her local book club reading historical fiction like "The Nightingale," attends community theater productions of classics such as "The Glass Menagerie," and
    they enjoy listening to Willie Nelson and gospel choir performances, allowing music and literature to enrich their social gatherings and garden potlucks.
  travel: Lina Koerselman meticulously plans heritage tours to historic sites such as Gettysburg, Colonial Williamsburg, and the Alamo, relishes weekend road trips to Savannah’s oak‑lined squares, and they
    budget travel expenses to preserve time for family and volunteer commitments.
  culinary: Lina Koerselman cultivates heirloom tomatoes, okra, and sweet potatoes in her vegetable garden and transforms them into Southern‑inspired dishes like shrimp étouffée, collard greens with smoked
    turkey, and pecan pie, demonstrating an intermediate cooking skill level that they hone in weekend classes while they never miss an opportunity to share their creations at neighborhood potlucks.
  core: Lina Koerselman blends Southern hospitality with a Midwestern work ethic, and they channel their love for community, structured finance, and garden‑to‑table cooking into a life of purposeful service,
    occasional sweet‑tea indulgence, and a relentless quest for balanced predictability.
background:
  cultural: Lina identifies as a White American who was raised in the Gulf Coast region of Texas. Her upbringing blended Southern hospitality, a strong sense of community, and a Midwestern work ethic. Active
    involvement in her local church and neighborhood organizations reinforced values of responsibility, reliability, and collaboration. These cultural influences have shaped her pragmatic outlook, her commitment
    to service, and her appreciation for both tradition and progressive change.
