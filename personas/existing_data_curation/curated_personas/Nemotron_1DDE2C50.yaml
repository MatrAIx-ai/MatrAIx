  career_goals: Lina aims to leverage her extensive background to drive strategic financial planning and digital transformation within her organization, while championing the development of the next generation
    of finance leaders. Over the next few years she plans to take on a senior advisory role, guide succession planning for the finance department, and expand her impact beyond the corporate sphere by offering
    pro‑bono financial literacy workshops to local schools and community groups. Ultimately, she envisions a phased transition to part‑time consulting, allowing her to balance professional fulfillment with
    family time and volunteer commitments.
