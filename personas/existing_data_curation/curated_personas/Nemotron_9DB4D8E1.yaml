  career_goals: Although retired, Mikela aims to mentor emerging artists in Orlando through weekly workshops that blend Peruvian motifs with contemporary techniques. He plans to author a memoir that weaves
    his life story with Andean folklore, preserving family narratives for future generations. Mikela seeks volunteer docent positions at local museums to share his cultural knowledge and hopes to organize
    an annual intergenerational art festival celebrating Latin American heritage. He also wishes to travel back to Peru to document his ancestral hometown and to support his grandchildren's education by
    offering tutoring in Spanish and financial planning guidance.
