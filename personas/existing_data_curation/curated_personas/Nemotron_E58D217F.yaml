  hobbies: '[''Vietnamese cooking'', ''gardening'', ''knitting'', ''dog walking'', ''church community gatherings'', ''small-group socializing'']'
  career_goals: Phuong aims to advance to a supervisory or lead‑cashier role within the next two years, leveraging her experience to oversee shift scheduling and mentor junior staff. She plans to complete
    a short certification in retail management to strengthen her leadership credentials. Long‑term, she hopes to open a small family‑run Vietnamese snack stall or market stall, combining her cultural heritage
    with entrepreneurship, while ensuring a stable income for her household.
