personas:
  professional: Brenda Moreno is an aspiring digital illustrator who harnesses her intense curiosity and methodical planning to produce intricate murals on her tablet, drawing inspiration from bold Mexican
    muralism and the dynamic layouts of contemporary graphic novels, while she competitively enters online art contests to measure her progress.
  sports: Brenda Moreno practices archery at the quiet community center range, swims early mornings with the local youth swim club, and follows the strategic play of the Portland Trail Blazers and Seattle
    Seahawks on television, appreciating the analytical parallels between sports tactics and her chess‑like mindset.
  arts: Brenda Moreno devotes her afternoons to crafting digital murals that echo the vivid color blocks of Diego Rivera and the panel storytelling of Moebius, while she listens to the lively strains of
    Mexican folk music and the soothing arpeggios of Chopin, collects graphic novels, and frequents the city museum’s street‑art exhibit for fresh inspiration.
  travel: Brenda Moreno dreams of journeying to Mexico City to study its famed murals, trekking through the ancient terraces of Machu Picchu, and exploring the geysers of Yellowstone National Park, always
    planning trips with a detailed itinerary that balances creative exploration with the quiet downtime she craves.
  culinary: Brenda Moreno enjoys the bright zest of lime‑infused taco fillings, often rolls homemade sushi with avocado and cucumber for a snack, and occasionally over‑salts her spaghetti carbonara when
    nervous, yet she takes pride in mastering the perfect dough for her weekly homemade pizza.
  core: Brenda Moreno is a quietly competitive 11‑year‑old whose curiosity fuels a passion for digital art and puzzles, while her tendency toward worry drives meticulous organization and occasional over‑thinking.
background:
  cultural: Brenda is a Mexican‑American growing up in Palmdale, California, in a bilingual household that celebrates both Mexican and American traditions. Her family observes Día de los Muertos, prepares
    homemade tamales, and shares stories of their heritage, fostering a deep appreciation for Mexican art and culture. This multicultural environment influences her artistic style, blending vibrant Mexican
    colors and motifs with contemporary digital techniques. She values family gatherings and community festivals, which provide her with cultural grounding while she navigates her identity in a diverse
    Southern California setting.
attributes:
  skills: '["Bilingual (Spanish-English)", "Digital illustration with Procreate and Canva", "Basic coding in Scratch", "Research and information synthesis", "Strategic puzzle solving (chess, Sudoku)", "Organizational
