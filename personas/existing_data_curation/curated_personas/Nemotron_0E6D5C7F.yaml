  hobbies: '["Sketching and digital illustration","Reading science fiction and fantasy novels","Building LEGO architecture sets","Playing chess","Solving puzzles (Sudoku, crosswords)","Journaling and reflective
    writing","Listening to Mexican folk music and classical piano","Experimenting with traditional Mexican cooking with family"]'
  career_goals: Inspired by her love for art, design, and structured thinking, Brenda aspires to become an architect or a digital graphic novelist who can blend cultural storytelling with innovative visual
    design. She dreams of creating spaces or illustrated worlds that reflect her Mexican heritage while embracing modern aesthetics. In the longer term, she hopes to work independently on creative projects,
    possibly as a freelance visual designer or a tech‑savvy storyteller, allowing her the quiet environment she thrives in while still challenging herself competitively.
