  career_goals: Philip aims to build on his practical experience by securing a supervisory position within facilities management over the next two years. He plans to complete his GED, obtain an OSHA 30‑hour
    certification and pursue a Building Operator certification through a local community college, which will qualify him for a maintenance supervisor role. Long‑term, he envisions managing a portfolio of
    commercial properties or launching his own cleaning and maintenance contracting business, giving him greater financial independence and the ability to mentor new workers. Throughout this trajectory,
    his competitive nature drives him to benchmark his performance against industry standards and continuously adopt best‑practice innovations.
