personas:
  professional: Philip Riggs, a facility maintenance specialist, harnesses his expertise with industrial‑grade cleaning equipment, building‑maintenance repairs, and meticulous record‑keeping to streamline
    operations while they apply their organized, competitive nature to benchmark performance against industry standards and prepare for a supervisory role.
  sports: Philip Riggs, an avid jogger on the Wichita River Trail, rides with the Prairie Preserve Cycling Club in summer, practices at Range 101 with a close group of shooters, and they root for the Kansas
    City Chiefs and Wichita State Shockers in football and basketball.
  arts: Philip Riggs, a classic‑rock devotee who spins Led Zeppelin, The Rolling Stones, and Lynyrd Skynyrd on vinyl, paints model kits to the rhythm of the music, and they attend realist exhibitions at
    the Wichita Art Museum, believing visual precision mirrors their methodical work ethic.
  travel: Philip Riggs favors low‑key road trips that balance discovery with budget, having driven to the Tallgrass Prairie Preserve for weekend hikes, explored Santa Fe's historic downtown for artisanal
    markets, and they are planning a July excursion to the Grand Canyon to combine photography with a break from routine.
  culinary: Philip Riggs, who enjoys hearty Midwestern fare, regularly grills Kansas‑style barbecue ribs seasoned with smoked paprika and brown sugar, whips up a weekend meatloaf with fresh breadcrumbs
    and grated cheddar, and they occasionally experiment with a “Subaru‑inspired” stir‑fry of soy sauce, garlic, and jalapeño.
  core: Philip Riggs blends solitary curiosity with methodical practicality, channeling a competitive edge into both their facility‑management craft and weekend hobbies while they occasionally neglect proper
    warm‑ups before a run.
background:
  cultural: Philip grew up in a working‑class neighborhood on the west side of Wichita, where Midwestern values of self‑reliance, punctuality, and community responsibility are emphasized. His family’s background
    in manufacturing and service jobs reinforced a practical, hands‑on approach to problems and a respect for steady, honest labor. While his upbringing was culturally homogeneous, he has been exposed to
    the broader Kansas land‑scapes through annual county fairs, local high‑school football games, and seasonal events like the Kansas State Fair, shaping an identity rooted in the heartland’s modesty and
    pragmatism. He maintains ties to a small Protestant congregation that highlights personal accountability, and he appreciates regional traditions such as barbecue gatherings and outdoor recreation in
    the Flint Hills.
