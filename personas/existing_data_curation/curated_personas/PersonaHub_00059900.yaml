persona_description: A politician who is passionate about urban planning and social inclusion, particularly in the context of overcrowded cities lacking serviced land and metropolitan regions lacking any
  coordinated management and governance tradition. This persona is committed to implementing a national urban policy framework and creating a National Council to provide policy advisory board for the Ministry
  for Cities. They are dedicated to improving planning capacity at city government level and promoting integrated planning and funding systems for housing, sanitation, mobility and urban planning sectors
  previously disaggregated under different government institutions at the federal level. This persona is also interested in the creation of a National System and National Fund Social Housing, which would
  provide funds from the central government to municipalities or states for slum upgrading, infrastructure and social housing, with the requirement that local governments would also create their local funds
  and establish local advisory bodies with civil society representation.
