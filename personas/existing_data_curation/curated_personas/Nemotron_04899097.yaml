  career_goals: Jonathan aims to re‑enter the workforce in a role that leverages his strong organization and people‑skills, targeting a project‑manager position with a municipal agency, a non‑profit, or
    a small‑business focused on community development. He plans to complete his associate degree in Business Administration and attain a PMP (Project Management Professional) certification within the next
    two years. Long‑term, he envisions either advancing to a senior coordinator role within the city’s planning department or launching his own home‑services enterprise that blends his carpentry know‑how
    with his knack for coordinating schedules and budgets, providing a stable income for his family while remaining rooted in his community.
