personas:
  professional: Jonathan Reynolds, a 38‑year‑old project‑management enthusiast with a knack for logistics, leverages his expertise in budgeting, Trello, and municipal permitting to orchestrate community
    initiatives, and they aim to secure a city‑planning agency role while pursuing a PMP certification.
  sports: Jonathan Reynolds competes in a Gresham adult soccer league, cheers for the Portland Timbers and the Oregon Ducks basketball team, rides with the local Gresham Cycling Club on weekends, and they
    tackle the Columbia River Gorge’s trail system for endurance training, prioritizing weekly cardio and strength sessions to stay ready for community events.
  arts: Jonathan Reynolds enjoys indie folk concerts featuring The Decemberists and Sufjan Stevens, attends quarterly screenings at Portland’s Laurelhurst Theater, immerses himself in board‑game strategy
    nights featuring Gloomhaven and Terraforming Mars, and they volunteer at the local community arts fair, where they often help set up installations.
  travel: Jonathan Reynolds plans meticulous weekend getaways, revisiting the Oregon Coast’s Cannon Beach, exploring Crater Lake National Park, and eyeing a bucket‑list trip to Belgium’s beer festivals,
    and they use spreadsheets to allocate budget and time while balancing family commitments and his desire for new cycling routes.
  culinary: Jonathan Reynolds cultivates a modest vegetable garden, brews an American IPA with Cascade hops, grills salmon with rosemary, sweet corn, and home‑grown zucchini, often pairing his meals with
    his own craft beers, and they regularly host board‑game dinner parties featuring homemade pretzel bites and kimchi slaw.
  core: Jonathan Reynolds, a 38‑year‑old organizer who blends meticulous project planning with a love for community soccer, craft brewing, and strategic board games, sometimes overbooks his calendar, and
    they always keep a spare screwdriver handy.
background:
  cultural: Jonathan comes from a middle‑class White Anglo‑American background rooted in the Pacific Northwest. He was raised in suburban Oregon, where values of self‑reliance, environmental stewardship,
    and community involvement are deeply ingrained. His family celebrated modest Protestant traditions, emphasizing responsibility and service to others. The regional culture—outdoor recreation, support
    for local farms, and a collaborative ethos—has shaped his appreciation for sustainability, teamwork, and a practical, no‑nonsense approach to everyday challenges.
