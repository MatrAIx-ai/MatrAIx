  hobbies: '["Visiting art museums and galleries","Reading contemporary fiction and philosophy","Writing poetry and creative essays","Playing piano","Photography (urban and street photography)","Walking
    in Central Park and exploring the city","Attending small book club meetings","Practicing mindfulness meditation","Cooking experimental dishes","Volunteering at community art workshops"]'
  career_goals: Joseph aims to expand his impact by establishing a community‑focused counseling practice that embeds artistic expression into therapeutic work. He plans to earn licensure as a clinical psychologist,
    develop a nonprofit program that offers free art‑based therapy to underserved neighborhoods in New York, and publish research on the efficacy of creative interventions in trauma recovery. Over the next
    five years, he hopes to become a sought‑after speaker at mental‑health conferences, mentor emerging counselors, and contribute to policy discussions on integrating arts in public mental‑health services.
