personas:
  professional: Joseph Petersen is a licensed counselor who blends trauma‑informed therapy with art‑based interventions, leveraging their critical thinking and grant‑writing expertise to design community
    programs, while they maintain a balance of meticulous case management and creative flexibility.
  sports: Joseph Petersen follows the New York Knicks and New York City FC, they participate in the Central Park Running Club’s weekend 5K runs, attend weekly yoga classes at a loft studio, and occasionally
    join indoor climbing sessions, balancing their love for urban fitness with a preference for low‑key, small‑group activities.
  arts: Joseph Petersen is an avid piano player who often revisits Debussy’s Arabesque, they curate street photography inspired by Vivian Maier, frequent MoMA exhibitions featuring contemporary artists
    like Banksy and Marina Abramović, and lead a local book club that dissects works by Zadie Smith and Camus, letting their curiosity and solitary creativity flourish.
  travel: Joseph Petersen plans trips with meticulous research, they have explored literary Paris, Renaissance Florence, and the tranquil Hudson Valley, while dreaming of a future pilgrimage to Kyoto’s
    temples, combining a desire for cultural immersion with the constraints of a demanding practice schedule.
  culinary: Joseph Petersen enjoys experimental cooking, they master dishes such as mushroom risotto with aged Parmesan, homemade kimchi, and pan‑seared salmon with fennel, often sourcing fresh basil and
    miso from local farmers’ markets, yet occasionally burn toast during late‑night recipe trials.
  core: Joseph Petersen is a 41‑year‑old counselor who mixes therapy with art, they manage finances prudently, monitor health conditions with disciplined routines, prefer low‑key fitness, immerse in piano
    and photography, travel for cultural depth, and cook creatively while tolerating occasional kitchen mishaps.
background:
  cultural: Joseph was raised in a middle‑class, white, Northeastern American family with deep appreciation for European literature, classical music, and visual arts. His upbringing emphasized education,
    civic responsibility, and an openness to diverse ideas, shaping his progressive worldview. Living in New York City has immersed him in a multicultural environment that values artistic expression and
    social justice, reinforcing his commitment to culturally competent counseling. He draws on his heritage of Anglo‑American cultural norms—such as pragmatism and self‑reliance—while embracing the city’s
    vibrant, inclusive artistic community, which informs both his personal interests and professional approach.
