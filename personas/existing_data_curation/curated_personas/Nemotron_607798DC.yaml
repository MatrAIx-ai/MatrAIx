  hobbies: '[''reading fantasy novels'', ''drawing comics'', ''creating stop‑motion videos'', ''building LEGO sets'', ''coding simple games in Scratch'', ''participating in school drama club'', ''visiting
    local museums and art galleries'', ''playing basketball with friends'', ''listening to pop and indie music'', ''collecting graphic novels'']'
  career_goals: John dreams of turning his vivid imagination into a career that blends storytelling, visual art, and technology. He aspires to become a children's book author or a graphic novelist, and
    is fascinated by animation and video‑game design. He hopes to attend a specialized arts high school, study illustration and interactive media, and eventually work at a creative studio where he can craft
    characters and worlds that capture the wonder of his audience. He also envisions using his communication skills to lead community workshops that encourage other kids to explore art and coding.
