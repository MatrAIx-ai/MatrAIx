  hobbies: '[''Church choir'', ''Quilting circle'', ''Gardening'', ''Hiking in the Ozarks'', ''Volunteer adult literacy tutoring'', ''Attending farmers market'', ''Cooking Southern cuisine'']'
  career_goals: She aims to advance to a senior collections supervisor role where she can mentor newer collectors and design training programs that emphasize compassionate, solution‑focused communication.
    In the longer term, Victoria hopes to transition into a community financial‑literacy coordinator position with the local chamber of commerce, creating workshops that empower residents to manage debt
    and improve credit health. Ultimately, she envisions leading a small nonprofit dedicated to helping low‑income families navigate financial challenges while maintaining a balanced, flexible work schedule
    that supports her family life.
