  hobbies: '[''watercolor painting'', ''gallery visits'', ''small reading circle'', ''gardening'', ''genealogy research'', ''listening to jazz and classical music'', ''walking historic neighborhoods'',
    ''cooking and baking'', ''journaling'']'
  career_goals: Elaine’s primary goal is to stay mentally vibrant and socially connected while honoring her preference for flexibility and small-scale commitments. She hopes to finish a memoir that intertwines
    her family’s story with the history of New Kensington, curate a modest community exhibition of her paintings and local photographs, and volunteer as a docent at the nearby Carnegie Museum of Art on
    an occasional basis. She also aims to learn enough video-editing to create short digital tours of historic town sites, leaving a gentle legacy for younger generations.
