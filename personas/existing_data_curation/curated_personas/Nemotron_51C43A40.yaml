  hobbies: '[''Hiking and trail mapping'', ''Fishing on the Strait of Juan de Fuca'', ''Kayaking'', ''Nature photography'', ''Model building (e.g., wooden airplanes)'', ''Playing acoustic guitar'', ''Strategy
    video games'', ''Volunteering for beach clean‑ups'', ''Home improvement woodworking projects'', ''Reading about environmental conservation and engineering'']'
  career_goals: Anthony aims to complete his GED within the next year and enroll in a community‑college trade program, focusing on electrical or plumbing certification. He plans to secure an apprenticeship
    in a local construction or utility company to gain hands‑on experience while continuing to volunteer in environmental projects. In the longer term, he envisions becoming a licensed tradesperson, eventually
    supervising a small crew or running his own maintenance business, and possibly serving part‑time as a community safety or park ranger aide.
