  career_goals: Alexander aspires to transition from daily driving to a supervisory role where he can leverage his extensive on‑road experience to train and mentor new drivers. He hopes to become a fleet
    operations manager for a regional transportation company, overseeing safety protocols, route planning, and driver performance. Parallel to his professional ambition, Alexander dreams of launching a
    boutique logistics consultancy focused on serving small Peruvian and Latino businesses, integrating his cultural knowledge and sales acumen. He also envisions organizing regular community art and cultural
    events that combine his love for Peruvian heritage, visual arts, and local music, positioning himself as a bridge between the logistics world and the vibrant cultural scene of North Hills.
