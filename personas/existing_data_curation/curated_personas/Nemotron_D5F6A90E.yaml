  hobbies: '["Soccer (player and fan)", "Hiking in the Santa Monica Mountains", "Cooking traditional Mexican dishes", "Salsa dancing", "Attending local cultural festivals", "Wine tasting at Ventura County
    vineyards", "Improvisational theater workshops", "Group yoga and meditation", "Mentoring aspiring entrepreneurs", "Volunteering at mental‑health outreach programs"]'
  career_goals: Armando aims to expand his company’s footprint into cross‑border markets, leveraging his Mexican heritage and bilingual skills to open new distribution channels in Mexico and the southwestern
    United States. He is committed to embedding flexible, employee‑centric policies that mirror his own preference for adaptability, while also establishing a robust mental‑health support program to address
    the intense anxiety and distress he personally experiences. Over the next five years he plans to complete his undergraduate degree in Business Administration, speak at industry conferences on inclusive
    leadership, and secure a board seat with a nonprofit that provides mental‑health resources to Mexican‑American communities. Ultimately, he hopes to leave a legacy of a resilient, culturally aware organization
    that champions both growth and the well‑being of its people.
