  hobbies: '[''Gardening (herbs & vegetables)'', ''Hiking coastal trails'', ''Reading fiction and self-development books'', ''Listening to sustainability podcasts'', ''Yoga'', ''Cooking and recipe experimentation'',
    ''Hosting potluck gatherings'', ''Volunteer work at school reading programs'']'
  career_goals: She hopes to re‑enter the workforce part‑time, ideally in a role that leverages her organizational talent and community focus, such as program coordinator for a nonprofit, administrative
    assistant in an education setting, or a project manager for a small business. She is considering obtaining a certification in project management or a certificate in early childhood education to align
    with potential work in school‑based programs. Over the next five years she aims to achieve a stable work‑life balance that allows her to support her family while contributing meaningfully to her community,
    possibly launching a side business offering home‑cooking services or workshops on family budgeting.
