personas:
  professional: Catherine Lowery, a 35‑year‑old retail operations manager in Nashville, merges a rigorous STEM background with hands‑on leadership, leveraging Excel, SQL, and basic statistical modeling
    to optimize inventory, staffing, and sales metrics while channeling her competitive edge and meticulous organization into coaching high‑performing store teams and driving data‑driven process improvements.
  sports: Catherine Lowery tackles fitness with a competitive streak, powering through HIIT and spin sessions at Orangetheory while cheering on the Nashville Predators in hockey, the Tennessee Titans during
    football season, and the Nashville SC in soccer, and she joins the Great Smoky Trail Blazers hiking club for weekend mountain treks.
  arts: Catherine Lowery immerses herself in Nashville’s vibrant music scene, regularly attending live shows by Chris Stapleton, Kacey Musgraves, and emerging local singer‑songwriters, while also curating
    board‑game evenings that celebrate storytelling and visiting the Frist Art Museum to admire Southern folk art and contemporary installations.
  travel: Catherine Lowery prefers road‑trip adventures that balance active exploration with relaxation, often weekend‑hiking along the Blue Ridge Parkway to Asheville, planning an annual cultural pilgrimage
    to New Orleans for its jazz and cuisine, and dreaming of an overseas escape to Lisbon’s pastel‑laden streets, all while budgeting carefully around her regional promotion ambitions.
  culinary: Catherine Lowery’s culinary pursuits feature a love for Southern comfort foods such as shrimp and grits, smoked brisket, and pimento cheese, which she experiments with in her kitchen using buttermilk,
    smoked paprika, and fresh herbs, and she delights in farm‑to‑table brunches at The Southern and occasional fine‑dining nights at Husk.
  core: Catherine Lowery is a data‑driven retail leader who balances Southern hospitality with a relentless competitive drive, often worrying about performance, yet finds solace in line‑dancing, board‑game
    marathons, and spontaneous kitchen experiments, even if she occasionally over‑schedules herself.
background:
  cultural: Catherine grew up in the Mid‑South, absorbing the warm hospitality and community spirit typical of the region while being encouraged by her parents to pursue a rigorous STEM education. Living
    in Nashville, she is immersed in a vibrant music scene, values Southern culinary traditions, and participates in local volunteer initiatives such as food‑bank drives. Her cultural identity blends traditional
    Southern values—friendliness, respect for heritage, and community involvement—with a modern, progressive outlook shaped by her professional experience in retail leadership and her graduate training
    in engineering.
