    home improvement projects'', ''Data visualization challenges'']'
  career_goals: Catherine aims to advance from first‑line supervision to regional retail management, eventually taking on a corporate operations role where she can embed data‑driven strategies across multiple
    locations. She plans to earn a professional certification in retail management and to lead initiatives that integrate emerging technologies (such as AI‑based demand forecasting) into store operations.
    Long‑term, she envisions becoming a thought leader at industry conferences, mentoring women entering STEM and retail leadership, and possibly launching her own boutique concept that fuses cutting‑edge
    analytics with a curated customer experience.
