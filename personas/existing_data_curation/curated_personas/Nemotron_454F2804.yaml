  hobbies: '[''Hip‑hop dancing'', ''Singing in church choir'', ''Playing basketball with friends'', ''Creating TikTok videos'', ''Reading graphic novels'', ''Sketching characters'', ''Baking sweet potato
    pies'', ''Volunteering at the local community center'', ''Attending summer music camps'']'
  career_goals: Veronica dreams of a career where she can blend her love for communication, community, and creativity. She envisions becoming a youth program director or community liaison who designs events
    and workshops for teens, especially in her hometown of Shelbyville. At the same time, she is excited about the possibility of building a personal brand as a social‑media influencer who shares empowering
    content for other young people, focusing on school life, local culture, and self‑expression. Long‑term, she hopes to attend a university and major in communications or social work, eventually combining
    those fields to advocate for underrepresented voices in the South.
