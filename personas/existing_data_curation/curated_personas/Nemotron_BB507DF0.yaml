personas:
  professional: Jose Melendez, a meticulous nine‑year‑old, applies their love of routine to building intricate LEGO models and designing structured Minecraft realms, hinting at a budding future in engineering
    or architecture.
  sports: Jose Melendez, an avid after‑school soccer player for the Mattawa Minor Soccer Club, idolizes Toronto FC’s striker and spends weekends practicing dribbling drills while cheering on the Toronto
    Blue Jays during baseball season.
  arts: Jose Melendez, who devours adventure chapter books like the Magic Tree House series, tunes into lively cumbia beats of Celia Cruz and ranchera classics from Luis Miguel, and creates miniature stories
    by arranging LEGO figures into dramatic scenes.
  travel: Jose Melendez, who enjoys family road trips to nearby Lake Nipissing for camping and dreams of exploring the bustling streets of Mexico City and the magical rides of Walt Disney World, prefers
    structured itineraries with plenty of time for outdoor exploration.
  culinary: Jose Melendez, a kitchen helper who loves chopping cilantro, mashing ripe avocados for guacamole, and assembling carne asada tacos seasoned with lime and chilies, often experiments by adding
    a dash of hot sauce to their creations.
  core: Jose Melendez, a routine‑loving nine‑year‑old builder, soccer enthusiast, and budding chef, balances meticulous order with playful curiosity, though they sometimes forget to tidy up Lego pieces
    and bite their nails after a tough match.
background:
  cultural: Jose was born into a Mexican‑heritage family that settled in the small, rural community of Mattawa, Washington. At home Spanish is spoken daily, and family traditions such as celebrating Día
    de los Muertos, preparing homemade tamales, and gathering for Christmas posadas are core parts of his life. The community’s agricultural roots and close‑knit neighborhood reinforce values of hard work,
    respect for elders, and cooperation. While he attends an English‑language public elementary school and enjoys typical American childhood activities, his cultural identity remains strongly tied to Mexican
    customs, food, music, and the emphasis on family togetherness.
