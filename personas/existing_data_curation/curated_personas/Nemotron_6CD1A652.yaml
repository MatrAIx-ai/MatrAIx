  career_goals: Vue aims to attend a top university—ideally the University of Washington—to major in Computer Science or Interaction Design. She envisions a career where she creates educational technology
    platforms that support bilingual learners, blending her technical know‑how with her cultural insight. Competitive by nature, she plans to enter coding contests and secure summer internships at local
    tech firms to build a strong portfolio. Long‑term, she hopes to launch a multimedia studio that produces interactive stories and games rooted in Vietnamese folklore, allowing her to preserve and share
    her heritage while pursuing innovative design. Scholarships and mentorships that recognize both academic excellence and community involvement are central to her strategic roadmap.
