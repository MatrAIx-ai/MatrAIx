personas:
  professional: Dennis Han, a 24‑year‑old carpenter, they blend meticulous blueprint reading and sustainable building practices with a competitive drive to meet deadlines, even as their laid‑back approach
    to paperwork can cause occasional schedule tweaks.
  sports: Dennis Han, a Portland‑based fitness enthusiast, they dominate weekends with pickup basketball at the East Portland YWCA, compete in the Portland Ultimate Imagineers league, and blaze mountain‑bike
    trails, all while cheering on the Portland Timbers and maintaining a social, competitive fitness mindset.
  arts: Dennis Han, an avid creative, they strum a battered Stratocaster in a garage band that covers The Black Keys and Tame Impalas, regularly catch shows by Mitski and Father John Misty at Portland venues,
    and draw design inspiration from woodworkers such as Sam Maloof for their own pieces.
  travel: Dennis Han, a weekend wanderer, they prefer spontaneous road trips to nearby wilderness like the Columbia River Gorge, have already explored Seattle and Vancouver, and dream of backpacking through
    Banff National Park, always packing a portable tool kit for on‑the‑fly repairs.
  culinary: Dennis Han, an amateur home‑brewer, they craft hop‑forward IPAs that pair perfectly with their smoked cedar‑plank salmon and rugged stovetop mac ‘n’ cheese, while also mastering a sourdough
    starter infused with local rye for weekend brunches.
  core: Dennis Han is a socially exuberant, tool‑obsessed carpenter who courts structure with a carefree streak, turning hikes, jam sessions, and craft‑beer experiments into the rhythm of their self‑made,
    sustainably built life, and they relish every moment of hands‑on creation.
background:
  cultural: Dennis grew up in a white, middle‑class family in the Portland metropolitan area. His upbringing reflects the Pacific Northwest’s emphasis on environmental stewardship, DIY craftsmanship, and
    a vibrant indie music scene. He was exposed to progressive community values, coffeehouse culture, and a strong appreciation for outdoor recreation. While his family maintains a secular outlook, holidays
    and community gatherings often incorporate traditional American customs blended with local traditions such as farmers’ markets and craft fairs.
attributes:
  skills: '[''Framing'', ''Finish Carpentry'', ''Cabinetry'', ''Blueprint Reading'', ''Cost Estimation'', ''Project Scheduling'', ''Tool Maintenance'', ''OSHA Safety Compliance'', ''Green Building Techniques'',
    ''Custom Furniture Design'', ''Team Leadership'', ''Client Communication'', ''Quality Inspection'']'
  hobbies: '[''Hiking'', ''Mountain Biking'', ''Ultimate Frisbee'', ''Pick‑up Basketball'', ''Community Build Volunteering'', ''Personal Woodworking Projects'', ''Guitar Playing'', ''Live Music Attendance'',
    ''Home Brewing'', ''Board Games'']'
  career_goals: Dennis aims to become a master carpenter and eventually open his own custom woodworking shop that specializes in sustainable residential projects. He plans to earn a LEED Green Associate
    credential and obtain a journeyman certification through the local union. In the next five years, he hopes to lead larger renovation contracts, mentor apprentices, and expand his business to offer design‑build
    services. He also dreams of establishing a community maker space where local artisans can collaborate on projects and host workshops.
