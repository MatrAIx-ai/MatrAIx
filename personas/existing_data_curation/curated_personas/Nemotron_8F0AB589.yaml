personas:
  professional: Desiree Berhan, a seasoned community events coordinator in Hot Springs, leverages three decades of logistical expertise, budgeting acumen, and compassionate leadership to orchestrate senior
    center programs, historic walking tours, and intergenerational garden projects, balancing structured planning with flexible, people‑centered solutions.
  sports: Desiree Berhan stays active through daily walks in the Ouachita National Forest, line dancing at community gatherings, and spring gardening, cheerfully supports the Arkansas Razorbacks football
    team and the St. Louis Cardinals, and they are a regular participant in the Hot Springs Senior Walking Club.
  arts: Desiree Berhan finds creative fulfillment singing gospel classics by Mahalia Jackson and Aretha Franklin in the church choir, quilting inspired by Appalachian folk patterns, and attending local
    theater productions featuring works by August Wilson, and they often discuss favorite performances over bridge games.
  travel: Desiree Berhan enjoys weekend road trips to historic towns like Natchez and Memphis, annual pilgrimages to the National Civil Rights Memorial in Montgomery, dreams of a summer visit to Savannah’s
    historic district, and hopes to explore Ghana’s Cape Coast Castle on a future cultural tour, and they plan each trip with detailed itineraries.
  culinary: Desiree Berhan, an avid home cook, expertly prepares collard greens simmered with smoked turkey, sweet potato pie spiced with nutmeg and cinnamon, and crusty cornbread enriched with fresh garden
    rosemary, often sharing these dishes at potluck gatherings, and they relish experimenting with heirloom tomatoes from their garden.
  core: Desiree Berhan blends disciplined organization with spontaneous storytelling, often humming gospel tunes while meticulously planning community events, yet they tend to lose track of time during
    bridge games and occasionally misplace their glasses.
background:
  cultural: Desiree’s cultural identity is rooted in the African-American experience of the Arkansas Delta and the Ozarks. Raised by parents who migrated from the Deep South during the Great Migration,
    she grew up immersed in church life, gospel music, and the oral storytelling traditions of her community. Family gatherings featured soulful cooking, from collard greens to sweet potato pie, reflecting
    a blend of Southern and African heritage. Throughout her life, she has been involved in local Black churches and civic groups that preserve historic traditions while advocating for social equity. Living
    in Hot Springs, she bridges the town’s tourism culture with the rich legacy of its African-American neighborhoods, often sharing her heritage through community events, music, and food.
