    center"]'
  career_goals: Desiree aims to expand her volunteer leadership by becoming the chair of the Garland County Senior Center advisory board, where she plans to launch an intergenerational arts and garden program
    that connects seniors with local youth. She also hopes to compile an oral-history collection of African-American elders in Hot Springs and publish a small community cookbook featuring family recipes,
    preserving cultural heritage for future generations. Continuing her involvement in community health, she seeks certification in senior wellness facilitation to improve the quality of life for her fellow
    retirees.
