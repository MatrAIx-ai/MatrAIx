  hobbies: '[''Walking in Queens Greenway and Flushing Meadows Corona Park'', ''Playing bridge and poker with friends'', ''Attending senior dance nights (salsa, swing)'', ''Watching New York Mets baseball
    games'', ''Volunteering at the neighborhood food pantry'', ''DIY home‑improvement projects'', ''Street photography'', ''Researching family genealogy'']'
  career_goals: Looking ahead, Justin aims to transition from a full‑time sales associate to a supervisory or mentorship role within his store, using his deep operational knowledge to improve team performance
    and customer satisfaction. He hopes to become an assistant manager or lead trainer, shaping junior staff while maintaining the store's reliable service standards. Concurrently, he plans to gradually
    scale back his retail hours to devote more time to volunteering at the local senior center and the neighborhood food pantry, where he can apply his organizational skills to community program coordination.
