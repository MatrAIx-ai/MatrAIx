personas:
  professional: Justin Brazie, a veteran retail sales associate with over four decades of front‑line customer service, cash handling and POS mastery on Square and NCR platforms, leverages their methodical,
    organized nature and compassionate demeanor to mentor new staff, resolve conflicts calmly, and quietly experiment with basic data‑analysis techniques to improve inventory accuracy and sales tracking.
  sports: Justin Brazie, a lifelong New York Mets devotee, watches spring and summer baseball games at the neighborhood bar while staying fit through weekly walks on the Queens Greenway with a senior walking
    club, joins a community center’s gentle basketball league for occasional cardio, and hits the senior swing‑dance floor for lively cardio sessions that double as social fitness.
  arts: Justin Brazie captures the vibrancy of his Queens neighborhood through street photography, often framing candid market scenes while the rhythms of salsa legend Celia Cruz and swing classics by Benny
    Goodman play in his headphones, and they regularly attend community theater productions of Arthur Miller’s dramas to satisfy their love of storytelling.
  travel: Justin Brazie prefers organized, short‑haul trips that blend sightseeing with personal research, having taken weekend train rides to the Hudson Valley, a bus tour of historic Philadelphia, and
    plans a budget‑friendly flight to San Juan, Puerto Rico to explore colonial archives and sample local cuisine, while they avoid long‑duration travel due to health considerations.
  culinary: Justin Brazie enjoys cooking hearty meals such as chicken piccata with capers and fresh lemon, experiments with fresh basil and cilantro in homemade pho, never passes up a classic New York pepperoni
    pizza, and delights in Sunday brunches featuring eggs benedict with a silky hollandaise, though they sometimes over‑salt their dishes when distracted by a lively card game.
  core: Justin Brazie blends meticulous retail expertise, a passion for community dance and genealogy, and a habit of collecting vintage bridge cards, yet they habitually forget to water houseplants and
    occasionally let credit‑card bills linger.
background:
  cultural: Justin grew up in a working‑class white family of Irish‑Italian heritage in Queens, New York. His parents held service‑industry jobs, instilling values of hard work, reliability, and community
    cooperation. The multicultural tapestry of Queens exposed him early to a variety of languages, foods, and traditions, shaping his open‑minded and compassionate outlook. While not strongly religious,
    he maintains a connection to local community events, such as St. Patrick's Day parades and neighborhood block parties, and he cherishes classic American and Southern comfort foods that were staples
    in his household.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''Point-of-sale operation'', ''Inventory management'', ''Visual merchandising'', ''Staff training and mentorship'', ''Conflict resolution'', ''Scheduling
