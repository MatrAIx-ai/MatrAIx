personas:
  professional: Janet Mobley is a budding engineer who channels the meticulous planning of Lego builds and strategic foresight from chess into solving everyday puzzles, and their competitive, structure‑loving
    nature drives them to excel in school science fairs and organize their projects with clear step‑by‑step guides.
  sports: Janet Mobley splashes through the Wednesday swim lessons as a member of the Mini Dolphins youth swim club, cheers for the national women's swimming team during the Olympics, and occasionally joins
    the after‑school soccer practice with the Little Lions, showing a competitive edge but preferring organized, predictable routines.
  arts: Janet Mobley loses themselves in the emotive piano pieces of Claude Debussy, particularly Clair de Lune, devours mystery novels like the Enola Holmes series, sketches delicate leaf patterns in their
    nature journal inspired by the illustration style of Dr. Seuss, and enjoys watching animated adventures such as Spirited Away.
  travel: Janet Mobley loves family trips that are meticulously planned—such as the annual Mardi Gras parade outing, a weekend visit to the coastal aquarium, and a road trip to the national park with a
    detailed itinerary—while daydreaming about a future solo adventure to Disneyland and exploring the towering cliffs of the Grand Canyon.
  culinary: Janet Mobley’s favorite meals include cheesy macaroni, buttery chicken nuggets, and strawberry‑banana smoothies, they can confidently make a peanut butter and jelly sandwich and a perfect scrambled
    egg, and they delight in sprinkling fresh basil on pasta and snacking on crisp apple slices.
  core: Janet Mobley is a detail‑oriented, competitive eight‑year‑old who balances a love for structured Lego engineering, strategic board games, and piano practice with frequent worries that they channel
    into meticulous journals and budgeting habits.
background:
  cultural: Janet was raised in Metairie, a suburban community in Jefferson Parish, Louisiana. Her family blends Southern hospitality with the region’s Creole influences, attending a local Catholic school
    and participating in church activities. Holiday celebrations often include family gatherings with dishes such as jambalaya, gumbo, and beignets. Growing up near New Orleans, Janet has experienced the
    lively music and parade culture of Mardi Gras, while also enjoying the laid‑back outdoor life of the Gulf Coast—fishing, park picnics, and community swimming pools. These cultural experiences have shaped
    her values of family connection, community participation, and an appreciation for diverse traditions.
attributes:
