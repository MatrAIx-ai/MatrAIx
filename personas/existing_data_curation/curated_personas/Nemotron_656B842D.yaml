  hobbies: '["Lego building", "Chess", "Mystery book reading", "Swimming", "Piano practice", "Nature journaling", "Rock collecting", "Mardi Gras festival participation"]'
  career_goals: Janet dreams of a future where she can investigate mysteries and uncover facts, so she imagines becoming a forensic scientist who analyzes evidence in a lab. She is also fascinated by space
    exploration and hopes to be an astronaut who follows precise mission protocols. Both goals reflect her love for structured, detail‑oriented work and her competitive drive to solve problems and achieve
    measurable success. In the short term, she wants to win her school’s science fair and earn a place on the varsity swim team when she’s older.
