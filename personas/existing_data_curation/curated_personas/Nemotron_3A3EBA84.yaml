personas:
  professional: Sarah Solustri, an interior designer renowned for their meticulous space‑planning and sustainable material expertise, translates client visions into harmonious, eco‑friendly homes while
    leveraging their structured, detail‑oriented mindset to keep projects on schedule and their compassionate nature to nurture collaborative client relationships.
  sports: Sarah Solustri enjoys weekend hikes through the Texas Hill Country, practices yoga at a local studio, and cheerfully follows the Dallas Cowboys and Texas Rangers, while participating in a community
    softball league that blends their love for teamwork with an active lifestyle.
  arts: Sarah Solustri cultivates a deep appreciation for modernist painter Georgia O'Keeffe, photographer Annie Leibovitz, and contemporary designer Kelly Wearstler, regularly attending Austin City Limits
    Gallery exhibitions and listening to Willie Nelson while sketching interior concepts, integrating artistic inspiration into their design ethos.
  travel: Sarah Solustri meticulously plans design‑focused trips, having explored Barcelona’s Gaudí architecture, Copenhagen’s sustainable design districts, and Kyoto’s minimalist aesthetics, while dreaming
    of a future retreat in Marrakech to study vibrant color palettes, balancing budgetary constraints with family considerations.
  culinary: Sarah Solustri, an avid cook, expertly blends Southern comfort with Tex‑Mex flair, often preparing shrimp and grits with smoked paprika, black bean enchiladas topped with fresh cilantro, and
    brisket smoked with Texas oak, while occasionally over‑salting the rice but always plating dishes with garden‑fresh garnishes.
  core: Sarah Solustri merges a structured, eco‑centric design mindset with a compassionate, community‑driven spirit, though they sometimes forget to water their garden while binge‑watching design podcasts
    late into the night.
background:
  cultural: Sarah grew up in a middle‑class family of European descent (primarily English and German heritage) in the Fort Worth area of Texas. Her upbringing blended Southern hospitality, community‑oriented
    values, and the distinctive Texan appreciation for practicality and craftsmanship. Exposure to the local cowboy culture and regional traditions, combined with a liberal arts education that emphasized
    European art and literature, informs her design sensibility—a mix of Western comfort and historically informed aesthetics.
attributes:
  skills: '[''Space planning'', ''Color theory'', ''Material selection'', ''Sustainable design principles'', ''AutoCAD'', ''SketchUp'', ''Revit'', ''Project budgeting'', ''Vendor negotiation'', ''Building
