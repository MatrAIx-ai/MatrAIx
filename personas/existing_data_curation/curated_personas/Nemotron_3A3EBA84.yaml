  hobbies: '[''Gardening'', ''DIY home décor projects'', ''Cooking Southern and Tex‑Mex cuisine'', ''Reading art‑history and design books'', ''Visiting museums and art galleries'', ''Volunteering with Habitat
    for Humanity'', ''Yoga'', ''Hiking in Texas Hill Country'', ''Traveling for design inspiration'', ''Photography of interiors'']'
  career_goals: Sarah aims to become a senior design lead at a leading firm in Texas, eventually launching her own boutique studio that specializes in eco‑friendly, family‑centered interiors. She seeks
    LEED accreditation to deepen her expertise in sustainable design and aspires to mentor emerging designers, fostering a collaborative and compassionate workplace culture. Long‑term, Sarah hopes to contribute
    to community projects—such as designing safe, welcoming spaces for shelters and local outreach centers—while balancing professional growth with quality time for her family.
