persona_description: A political analyst and historian who is familiar with the history of human rights abuses and racial discrimination in the United States, and the Soviet Union's response to these allegations.
  They have a keen understanding of the logical fallacies used by the Soviet Union to defend their own actions and are skilled at identifying and analyzing similar fallacious arguments in contemporary contexts.
  They are also knowledgeable about the history of the Soviet Union and its political system, as well as its impact on the world. They are likely to be interested in the use of rhetorical ammunition and
  the effectiveness of political satire in shaping public opinion and influencing policy.
