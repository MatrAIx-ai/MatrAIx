personas:
  professional: Tina Michael, a budding tiny architect who builds intricate block towers, combines curiosity with practicality by testing structural stability, and shows a surprisingly organized approach
    while still allowing imaginative flexibility, often preferring solo play in the quiet corner of the living room where they can focus without interruption.
  sports: Tina Michael, a member of the Little Sprouts Soccer Club, loves kicking a soft foam ball in the backyard, cheers for the local professional team, the Seattle Sounders, while preferring quiet,
    solo practice sessions over noisy group drills, and they often worry about falling and getting scraped.
  arts: Tina Michael, an avid fan of the animated series 'Bluey' and the musical duo The Wiggles, spends afternoons drawing pastel pictures of her favorite characters, quietly humming along to 'Fruit Salad'
    while carefully arranging her crayons, and they value the soothing routine of bedtime storytime from her grandmother.
  travel: Tina Michael, an adventurous little explorer who has visited the Grand Canyon with her family and dreamed of seeing the cherry blossoms in Kyoto, enjoys meticulously planning her next trip by
    coloring maps and packing a tiny backpack, yet prefers calm destinations with gentle walks over bustling amusement parks, and they find comfort in quiet museum halls.
  culinary: Tina Michael, a picky eater with a soft spot for cheesy macaroni, peanut butter‑banana sandwiches, and strawberry‑fresh smoothies, skillfully spreads peanut butter with a small plastic knife,
    insists on separated veggies on their plate, and sometimes throws a tantrum if the broccoli isn’t cut into star shapes while they carefully arrange the food.
  core: Tina Michael, a quietly curious 4‑year‑old who balances imaginative block building with meticulous saving, worries about tiny setbacks, and they find comfort in solo play, gentle routines, and the
    familiar hum of lullabies.
background:
  cultural: Tina is a White child raised in Fort Pierce, St. Lucie County, Florida. Her family participates in typical American traditions such as Thanksgiving, Christmas, and the Fourth of July, often
    celebrating with small gatherings and community events. They attend a local pre‑K program at a public elementary school, frequent the county library’s story‑time sessions, and enjoy occasional trips
    to the nearby Atlantic beaches where they explore shells and marine life. While her household maintains middle‑class American customs, the diverse cultural atmosphere of South Florida provides her with
    occasional exposure to a variety of foods, music, and community festivals.
