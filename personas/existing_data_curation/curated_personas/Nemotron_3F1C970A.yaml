  hobbies: '[''Reading picture books'', ''Drawing and coloring'', ''Building block structures'', ''Collecting shells'', ''Listening to soft music'', ''Caring for a small plant'', ''Quiet nature walks'',
    ''Playing with stuffed animals'']'
  career_goals: Although still very young, Tina often talks about becoming a teacher or a librarian because she loves storybooks and enjoys helping others discover new ideas. She also dreams of caring for
    animals, imagining herself as a veterinarian, reflecting her kindness and desire to nurture. Over time, she hopes to grow more confident in social settings, manage her worries, and eventually turn her
    curiosity and practical thinking into a caring, organized professional life.
