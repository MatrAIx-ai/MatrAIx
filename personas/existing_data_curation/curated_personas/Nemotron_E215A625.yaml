personas:
  professional: Katrell Taylor, a four‑year‑old who already moonlights as the 'playroom organizer' at home, arranges toys by category, creates simple schedules for storytime, and uses their natural curiosity
    to ask why about every activity, while their methodical nature ensures they follow through on the tidy‑up pledge they make each afternoon, hinting at a future career in early childhood education.
  sports: Katrell Taylor, an enthusiastic member of the Carthage Little Tigers Soccer Club and a weekly gymnastics class at the community center, dashes after the whistle with boundless energy, they proudly
    wear a jersey of the New Orleans Pelicans during backyard basketball pretend games, and fervently root for the Mississippi State Bulldogs during Saturday football, balancing structured practice with
    spontaneous play.
  arts: Katrell Taylor, a tiny gospel enthusiast, sings along to Stevie Wonder’s 'Superstition' and Beyoncé’s early hits during church services, they sway to the rhythms of local choir rehearsals, delight
    in drawing colorful portraits of Maya Angelou and Billie Holiday, and wind down evenings watching Disney’s animated classics, letting these artistic influences shape their budding sense of identity.
  travel: Katrell Taylor, a curious road‑trip explorer, loves the familiar hum of the family sedan heading to grandma’s house in Jackson, eagerly anticipates splash‑filled days on the Gulf Coast beaches
    of Biloxi, and keeps a tiny scrapbook of stickers from the state fair, while they dream of spotting the Eiffel Tower in Paris after watching a preschool travel video, preferring trips that include a
    favorite stuffed animal and a predictable bedtime routine.
  culinary: Katrell Taylor, a budding food explorer, delights in the sweet‑and‑savory combo of collard greens with a drizzle of melted butter, loves buttery biscuits and mac & cheese, eagerly sprinkles
    cinnamon sugar on apple slices, and they proudly help stir the batter for Sunday cornbread at the church potluck, though they sometimes sneak a bite of frosting before dinner, showcasing both modest
    cooking skill and a mischievous sweet tooth.
  core: Katrell Taylor, a four‑year‑old with a knack for organizing toys, a gentle anxiety that fuels careful saving, a love for gospel music, and a playful curiosity, they keep life bright and orderly.
background:
  cultural: Katrell grows up in a close‑knit Black community in Carthage, Mississippi, where family ties and church life are central. Her family celebrates Southern African‑American traditions such as soul
    food gatherings, gospel music, and community festivals that blend historic roots with contemporary culture. Church services are a weekly rhythm, providing both spiritual guidance and a space for music,
    dance, and storytelling. Extended relatives often visit, sharing oral histories and emphasizing the importance of respect, resilience, and communal support. These cultural experiences shape her values
    of cooperation, faith, and a deep appreciation for music and communal celebration.
attributes:
  skills: '[''Letter recognition'', ''Counting to 20'', ''Sorting by color and shape'', ''Basic reading of simple words'', ''Fine‑motor drawing and cutting'', ''Block building'', ''Independent tablet app
    use'', ''Cooperative play and boundary setting'']'
  hobbies: '[''Story‑time and picture books'', ''Block building'', ''Nature walks and collecting natural objects'', ''Dancing to gospel and R&B music'', ''Crafting friendship bracelets'', ''Drawing and
    coloring'']'
  career_goals: Even at four, Katrell dreams of a future where she can help others. She often says she wants to become a teacher so she can share her love of books and help other children learn to read,
    and she is fascinated by animals, imagining a career as a veterinarian. She also expresses a desire to be a community helper—someone who makes people feel safe and cared for—reflecting her organized,
    compassionate nature and her wish to reduce worry for herself and others.
