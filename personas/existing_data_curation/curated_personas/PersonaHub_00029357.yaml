persona_description: A scientist who specializes in the study of parasitism, particularly the interactions between different species of wasps and their host plants. They have conducted research on the predation
  of cottony cushion scale by two parasitic species of chalcid wasps imported from Australia, and the effective predation of an Australian ladybird beetle, the vedalia beetle (Rodolia cardinalis), on the
  cottony cushion scale in California. They have also used the limited proliferation of the European rabbit in Australia by introducing myxoma virus to control it and potato blight.
