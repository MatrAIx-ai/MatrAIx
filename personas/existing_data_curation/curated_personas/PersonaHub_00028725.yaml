persona_description: A scientist or researcher involved in the monitoring and conservation of aquatic species, specifically focused on the endangered Lost River and shortnose suckers in Clear Lake Reservoir,
  California. They are interested in the population dynamics, size composition, and potential recruitment trends of these species, and are looking for ways to overcome the limitations of size composition
  data in inferring population status and dynamics due to problems with detection rates during spawning seasons with low flows in Willow Creek.
