  hobbies: '[''Hiking desert trails'', ''Salsa dancing'', ''Experimenting with cooking and mixology at home'', ''Volunteering at the local food bank'', ''Board-game meet-ups'', ''Exploring new cafés'',
    ''Attending live music concerts'', ''DIY home décor projects'']'
  career_goals: Linda aims to move from her current support role into a supervisory position within the next two years, targeting a shift lead or bar manager role at a bustling restaurant or café. She plans
    to complete an associate’s degree in hospitality management and earn a certified mixology credential. Long‑term, she hopes to become a restaurant manager or open her own community‑focused coffee bar
    in Chandler, where she can combine her love for hospitality with her passion for creating inclusive social spaces.
