  hobbies: '["Gardening", "Knitting and quilting", "Reading historical fiction and self-improvement books", "Seasonal cooking", "Birdwatching", "Spontaneous day trips to local lakes and parks", "Volunteer
    work at the church", "DIY home improvement projects"]'
  career_goals: Although she is not currently part of the formal labor force, Lori is motivated to translate her practical expertise into community-focused initiatives and modest entrepreneurial ventures.
    Over the next few years she aims to earn a horticulture certification through a local extension program so she can lead a neighborhood garden project in Trenton, fostering food security and environmental
    education. She also intends to develop an online shop for her hand-knit and quilted goods, turning a hobby into a micro-business. To broaden her options, she plans to complete a GED and take several
    community-college courses in early childhood education, which would enable her to volunteer as a classroom aide or after-school program mentor. Ultimately, Lori seeks a balance between personal fulfillment,
    family support, and modest contributions to her community.
