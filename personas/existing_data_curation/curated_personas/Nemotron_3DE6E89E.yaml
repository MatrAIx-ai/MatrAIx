personas:
  professional: Lori Brown, an aspiring horticulture specialist and micro‑entrepreneur, leverages their budgeting expertise, DIY home‑repair know‑how, and love of seasonal gardening, and they channel that
    energy into launching a neighborhood garden project while building an online shop for hand‑knit and quilted goods.
  sports: Lori Brown, an early‑morning walker and volunteer coach for the Trenton Community Garden Fitness Club, follows the Philadelphia Eagles in the fall, cheers on the New York Mets during baseball
    season, and they stay active through weekly nature‑trail hikes with the local birdwatching group.
  arts: Lori Brown, an avid reader of historical fiction and a talented quilter, draws artistic inspiration from folk musician Pete Seeger, painter Andrew Wyeth’s pastoral scenes, and actress Meryl Streep’s
    performances, and they weave these influences into their handcrafted textiles.
  travel: Lori Brown, a spontaneous weekend traveler, enjoys impromptu day trips to the Great Lakes shoreline—often exploring Michigan’s Mackinac Island and the Indiana Dunes—and they dream of a future
    road‑trip through New England’s historic towns and a springtime visit to the lavender fields of Provence.
  culinary: Lori Brown, a confident home cook, blends seasonal garden harvests into dishes such such as roasted beet and goat‑cheese salad with fresh thyme, summer corn succotash with basil, and hearty
    autumn butternut squash soup seasoned with sage, and they delight friends with inventive farm‑to‑table flavors.
  core: Lori Brown, a garden‑obsessed, spontaneous DIYer who sometimes forgets deadlines yet always keeps a fresh batch of herbs on the windowsill, embodies a blend of practical curiosity and quiet resilience,
    and they often greet their garden as a trusted companion.
background:
  cultural: Lori was born and raised in the Midwest, growing up in a predominantly white, working-class community near Detroit. The regional culture emphasizes self-reliance, modesty, and a strong sense
    of neighborhood responsibility, all of which shape her values. She was raised in a Protestant household that regularly attended a local church, fostering a community-oriented outlook and a tradition
    of volunteering. The industrial heritage of Wayne County, combined with the area's gradual shift toward service and small-business economies, has given her a pragmatic appreciation for hard work while
    remaining open to new ideas. These Midwestern roots, together with the ethnic majority of her environment, inform her practical approach to life, her preference for small social circles, and her inclination
    toward modest, community-focused ambitions.
attributes:
  skills: '["Household budgeting", "Meal planning and cooking", "Gardening and horticulture basics", "DIY home repair and maintenance", "Basic computer and smartphone navigation", "Volunteer coordination",
