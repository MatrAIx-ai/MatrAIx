  career_goals: John aspires to progress to a regional director of sales role, where he can shape the strategic direction of a technology‑focused portfolio and mentor the next generation of sales talent.
    He aims to champion innovative, customer‑centric sales models that integrate emerging technologies and experiential marketing. Over the next five years, he also envisions launching a boutique consultancy
    that helps mid‑size firms combine data analytics with creative branding to accelerate growth, while advocating for mental‑health awareness in high‑pressure sales environments.
