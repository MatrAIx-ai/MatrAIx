personas:
  professional: Shannon Doshi is a manufacturing engineer who leverages Six Sigma Green Belt expertise, lean process design, and IoT‑enabled safety monitoring to drive continuous improvement, while their
    talkative, audience‑focused style transforms technical workshops into engaging, collaborative experiences.
  sports: Shannon Doshi is an avid weekend hiker who explores Starved Rock’s trails with the Starved Rock Hiking Society, attends weekly yoga at a downtown studio, and fervently roots for the Chicago Cubs,
    Chicago White Sox, and Chicago Bulls while occasionally joining a co‑ed recreational softball league in the spring.
  arts: Shannon Doshi thrives on the stage as a comedic lead in the Cedar Valley Community Theater, channeling the wit of Neil Simon and the improvisational flair of Tina Fey, while their off‑stage playlists
    feature Chicago blues legend Buddy Guy and indie folk storyteller Sufjan Stevens.
  travel: Shannon Doshi pursues photography‑driven travel, having captured the turquoise waters of Banff’s Lake Louise and dreaming of Iceland’s volcanic landscapes, yet balances the wanderlust with budget‑conscious
    weekend road trips to Madison, Milwaukee, and occasional family visits to Kyoto.
  culinary: Shannon Doshi’s culinary adventures revolve around Midwestern seasonal bounty, crafting dishes like roasted heirloom tomato‑basil bruschetta, grilled corn‑zucchini fritters with dill crema,
    and beet‑goat‑cheese salad, while their occasional splurges include tasting menus at farm‑to‑table restaurants such as The Grove.
  core: Shannon Doshi is a charismatic safety engineer who over‑plans dinner parties, under‑organizes their inbox, worries about every detail, and finds calm through yoga and seasonal cooking.
background:
  cultural: Shannon grew up in the Chicago suburbs before moving to Normal, Illinois for college, where she has built a life rooted in Midwestern values. Her family, of European descent, emphasized education,
    community service, and a pragmatic work ethic. She embraces the Midwest’s reputation for hospitality and straightforward communication, often volunteering at county fairs, local food banks, and church‑based
    outreach programs. This cultural upbringing, combined with her STEM education, has fostered a blend of practical problem‑solving and openness to new ideas that informs both her professional and personal
    life.
