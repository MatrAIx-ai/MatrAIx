    fiction'', ''Traveling to explore new cultures and cuisines'']'
  career_goals: Shannon aims to progress into a senior leadership role where she can shape the safety culture of a large manufacturing organization. Over the next five years she plans to earn a Six Sigma
    Black Belt and the Certified Safety Professional (CSP) credential, and to lead a company‑wide continuous‑improvement program that reduces workplace incidents by at least thirty percent. She also aspires
    to become a recognized speaker at industry conferences, mentoring the next generation of engineers, and eventually moving into a Director of Operations or Safety position that balances strategic oversight
    with hands‑on engagement.
