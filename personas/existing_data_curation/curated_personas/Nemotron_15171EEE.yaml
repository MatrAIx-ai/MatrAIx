  career_goals: Although still very young, Fahed frequently talks about what he wants to be when he grows up. He is fascinated by roles that involve helping others and clear structure, such as a firefighter,
    police officer, or teacher. He also shows a budding interest in building and fixing things, describing a wish to become a "toy mechanic" or an engineer who designs fun gadgets. These ambitions reflect
    his love for orderly teamwork, practical problem‑solving, and the excitement of imaginative adventure.
