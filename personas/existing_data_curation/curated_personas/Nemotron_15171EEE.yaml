personas:
  professional: A budding block architect and imaginative storyteller named Fahed Riggs builds intricate LEGO towers with a structured precision, yet spontaneously reorganizes pieces to keep play fresh,
    showcasing early practical problem‑solving, calm composure, and a balanced mix of cooperation and assertiveness as they interact with peers.
  sports: An energetic four‑year‑old named Fahed Riggs dribbles a soccer ball for the Little Lions Youth Soccer Club in the spring, cheers for the local MLB team the River City Reds on game nights, and
    attends beginner gymnastics classes on weekends, as they balance a love for team play with a relaxed, unpressured approach to competition.
  arts: An imaginative four‑year‑old named Fahed Riggs delights in drawing bright Paw Patrol characters, sings along to Disney’s Frozen soundtrack, and watches Sesame Street, while intermittently mimicking
    the playful beats of The Wiggles, as they channel a love for structured creativity and familiar, upbeat entertainment.
  travel: A curious four‑year‑old named Fahed Riggs has explored the local zoo, spent a magical weekend at Disney World, dreams of visiting the Great Barrier Reef, and eagerly plans outings using picture‑filled
    travel books, as they prefer short, predictable trips yet feel thrilled by new playgrounds and animal encounters.
  culinary: An adventurous yet selective four‑year‑old named Fahed Riggs adores cheesy mac & cheese with sharp cheddar, loves strawberry‑yogurt parfaits, enjoys dipping carrot sticks in hummus, and proudly
    helps stir pancake batter while they insist on crunchy peas as a snack, showing a mix of familiar comfort foods and growing curiosity for new flavors.
  core: A pragmatic yet playful four‑year‑old named Fahed Riggs blends orderly block building with spontaneous sticker trades, stays calm during health check‑ups, but occasionally forgets to brush teeth,
    and they balance structured activities with a relaxed approach to money and meals.
background:
  cultural: Fahed comes from a white, Midwestern American family rooted in Greenfield, Indiana. His upbringing reflects the region's community‑focused values, such as friendliness, participation in local
    events, and an appreciation for practical, hands‑on activities. Family traditions often involve weekend outings to nearby parks, seasonal festivals, and church gatherings that reinforce a sense of belonging
    and shared cultural heritage. These influences shape his balanced personality, grounding him in both structure and the freedom to explore.
