  career_goals: Although retired, Matthew aims to compile a memoir that weaves together his lifelong curiosity about art, new ideas, and Midwestern history. He wishes to curate a small community exhibition
    of historic photographs and local artworks in Xenia, mentor younger artisans in woodworking through a weekend workshop series, and develop a modest greenhouse to experiment with heirloom vegetable varieties.
    Occasional trips to major art museums in Chicago, Cleveland, and New York are also part of his personal enrichment plan.
