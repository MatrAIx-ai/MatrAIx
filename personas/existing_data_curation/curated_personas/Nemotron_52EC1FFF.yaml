  career_goals: Tamberly aspires to become a scientist or engineer who creates practical solutions for real‑world problems. She dreams of studying environmental science and eventually working as a wildlife
    conservation biologist or a robotics engineer. She also considers a future in teaching, hoping to inspire younger students with her love of organized learning. Short‑term, she aims to earn top grades,
    win the state science fair, and continue developing her coding and musical skills while managing her worry through structured study habits.
