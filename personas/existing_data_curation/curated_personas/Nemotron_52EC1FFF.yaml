personas:
  professional: Tamberly Dossa is an aspiring junior software designer who builds Scratch games, organizes complex LEGO constructions, and applies disciplined project planning to meet high standards, balancing
    curiosity for new coding tricks with practical step‑by‑step methods.
  sports: Tamberly Dossa is a youth soccer enthusiast who plays midfield for the community’s Little Falcons club, cheers for the national women's soccer team and the local baseball club the River Rats,
    and incorporates disciplined warm‑up routines while juggling the occasional competitive frustration that fuels their need for solitary practice.
  arts: Tamberly Dossa is a budding pianist who practices Mozart’s Sonata K.545 and Ludovico Einaudi’s “Nuvole Bianche,” reads mystery series by Agatha Christie, draws inspiration from Studio Ghibli films
    such as “Spirited Away,” and channels that creative energy into designing LEGO dioramas, all while maintaining a strict practice schedule that satisfies their high standards.
  travel: Tamberly Dossa is an inquisitive traveler who has documented family hikes in Redwood National Park, collected bird‑watching notes on a weekend trip to the Great Lakes, dreams of exploring the
    ancient temples of Kyoto, and prefers meticulously planned itineraries with plenty of downtime for journaling to help manage their stress.
  culinary: Tamberly Dossa is a confident junior baker who loves whipping up chocolate chip cookies with buttery brown sugar, experiments with homemade pizza topped with fresh mozzarella and basil, and
    enjoys crafting simple salads with cucumbers, cherry tomatoes, and a dash of olive oil, all while meticulously measuring ingredients to satisfy their organized nature.
  core: Tamberly Dossa is a ten‑year‑old prodigy who blends meticulous discipline with boundless curiosity, turning every hobby—from coding to birdwatching—into a structured quest for mastery while wrestling
    with a constant undercurrent of worry.
background:
  cultural: Tamberly comes from a White, middle‑class family in Dodge City, Kansas. Her upbringing reflects Great Plains values of hard work, community involvement, and appreciation for local traditions
    such as the county fair and rodeo events. She attends a public elementary school, participates in church‑based youth groups, and experiences a mix of rural Midwestern customs and modern educational
    opportunities.
