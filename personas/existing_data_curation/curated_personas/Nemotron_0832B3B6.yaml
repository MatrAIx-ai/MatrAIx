  hobbies: '[''Cooking traditional Venezuelan dishes'', ''Playing chess'', ''Gardening vegetables'', ''Walking in local parks'', ''Listening to bolero and salsa music'', ''Attending Venezuelan cultural
    festivals'', ''Watching Texas Rangers baseball games'', ''Reading historical nonfiction'', ''Volunteering as English tutor for Spanish speakers'']'
  career_goals: Marcos aims to advance within the retail sector by moving into a supervisory role, such as shift lead or assistant store manager, where he can apply his organizational strengths and mentor
    newer staff. He plans to complete his unfinished college coursework in business administration, which would open part‑time opportunities in bookkeeping or financial consulting. Additionally, he hopes
    to contribute to his community by offering financial‑literacy workshops for Spanish‑speaking residents, and to secure a stable retirement fund through disciplined savings.
