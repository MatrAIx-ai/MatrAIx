persona_description: A researcher in the field of robotics, particularly focused on developing smart actuators. This person is interested in the development and analysis of shape memory alloy (SMA) wires
  as a mechanism for actuation in robotic trusses. They are skilled in the design, development, and analysis of smart actuators, and have experience with the use of SMA wires in the actuation of trusses.
  They are interested in the practical applications of SMA actuators in robotic systems, particularly in space environments where reduced gravity is a concern.
