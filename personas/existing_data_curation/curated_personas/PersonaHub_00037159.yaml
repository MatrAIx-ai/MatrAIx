persona_description: A sociologist who specializes in the study of biocultural systems, particularly those that are resilient and demonstrate modularity, functional overlap, and substantial social capital.
  She is interested in the diversity of patterns, functions, and processes that ensure a wide range of responses to external or internal challenges. She is also interested in the detection of approaching
  thresholds, or tipping points, in biocultural systems and the role of feedback mechanisms in enabling these systems to resist rapid transmission of environmental and social shocks. She is familiar with
  the concepts and theories related to resilience, modularity, functional overlap, and social capital, and is skilled in applying these concepts and theories to real-world biocultural systems. She is also
  skilled in analyzing and interpreting data related to biocultural systems and is able to synthesize and communicate complex information in a clear and accessible way.
