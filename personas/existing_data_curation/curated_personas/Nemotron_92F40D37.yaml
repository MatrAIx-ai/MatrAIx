  hobbies: '[''Sketching and Charcoal Drawing'', ''Photography'', ''Reading Science Fiction & Fantasy'', ''Writing Poetry'', ''Playing Indie Video Games'', ''Hiking in Local Parks'', ''Improvisational Theatre'',
    ''Listening to Experimental Jazz'', ''Studying Philosophy'', ''Participating in Street Art Projects'']'
  career_goals: Lawrence wants to leverage his creative mindset to pioneer community‑focused policing initiatives in Columbus. In the short term, he aims to join the department’s Community Relations Unit
    and develop outreach programs that connect local artists with youth. Long‑term, he aspires to become a detective specializing in cultural‑sensitive investigations, and eventually to influence policy
    as a senior officer who integrates artistic and humanistic approaches into law‑enforcement strategy.
