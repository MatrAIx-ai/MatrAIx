  career_goals: Ricardo aims to leverage his security expertise and business knowledge to transition into a senior advisory role within the casino industry, helping proprietors adopt advanced analytics
    and AI‑driven surveillance. He seeks to earn a certification in cyber‑physical security and to mentor younger guard staff, sharing his practical insights on risk assessment and ethical decision‑making.
    Ultimately, he hopes to establish a small consulting practice that advises local businesses on integrated safety and operational efficiency, while ensuring his own financial security for a comfortable
    retirement.
