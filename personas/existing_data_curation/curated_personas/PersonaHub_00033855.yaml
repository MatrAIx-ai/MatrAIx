persona_description: A regional development officer for the European Commission's SEE (South East Europe) region, with a focus on energy infrastructure and the promotion of clean, local energy solutions.
  This person is responsible for ensuring that the region's energy investments are well-thought-out and widely consulted, with realistic demand scenarios, and that investment is focused on locally available
  renewable resources and increasing energy efficiency. They are also aware of the potential negative impacts of large-scale centralized energy generation on the region, and are committed to promoting alternative
  approaches that prioritize decentralised energy production and efficiency increases.
