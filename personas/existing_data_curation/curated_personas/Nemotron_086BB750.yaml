  hobbies: '[''Surfing and paddle‑boarding'', ''Fishing (salmon, crab)'', ''Hiking coastal trails'', ''Photography (seascapes)'', ''Painting and sketching watercolors'', ''Attending art galleries and community
    art fairs'', ''Playing acoustic guitar and singing'', ''Volunteering to teach art workshops for youth'', ''Participating in Toastmasters/public speaking clubs'', ''Organizing social gatherings and barbecues'',
    ''Reading historical biographies and science‑fiction'', ''Watching local theater performances'']'
  career_goals: Robert aims to advance to a supervisory role such as shift commander within the next five years, where he can lead a team and shape daily operations. He is passionate about establishing
    a pilot art‑therapy program for inmates that blends his correctional expertise with his love of the arts, and hopes to expand it county‑wide. In the longer term, he envisions moving into a policy‑advisory
    position with the Washington State Department of Corrections to influence state‑level rehabilitation strategies. To support these goals, he plans to complete his associate degree in criminal justice,
    earn a certification in counseling, and pursue a bachelor’s degree in public administration or social work.
