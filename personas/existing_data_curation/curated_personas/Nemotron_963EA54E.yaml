  hobbies: '["Singing nursery rhymes", "Dancing to music", "Building with blocks", "Crayon drawing", "Storytime at the library", "Playdates with peers"]'
  career_goals: Although only two, Linda often pretends to be a helper, saying she wants to be a nurse or a teacher because she loves caring for her stuffed animals and making friends feel better. These
    imaginative goals reflect her strong desire to help others and work in cooperative roles as she grows.
