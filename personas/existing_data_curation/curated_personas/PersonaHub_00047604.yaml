persona_description: A scientist who specializes in the study of galaxies and their environments, particularly the circumgalactic medium (CGM) and the relationship between galaxies and their surrounding
  gas. The scientist has conducted research using data from the Cosmic Origin Spectrograph (COS) on the Hubble Space Telescope to analyze the composition of the CGM and its impact on the recycling of heavy
  elements in galaxies. The scientist has also conducted simulations to explain the puzzling observation that there appears to be less oxygen around elliptical galaxies than spiral galaxies. The scientist
  is likely to be interested in understanding the mechanisms of element recycling and the impact of the CGM on galaxy evolution.
