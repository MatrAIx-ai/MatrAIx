personas:
  professional: Chloe Schmitz, a 39-year-old construction assistant in Dayton, leverages a solid skill set in concrete finishing, framing, and blueprint reading while channeling a curiosity for sustainable
    design into leading small crews, coordinating schedules, and weaving artistic details like custom reclaimed-wood shelving into residential renovations.
  sports: Chloe Schmitz, a 39-year-old outdoor-oriented builder, stays active by hiking with the Dayton Hiking Club on weekend trails, following the Ohio State Buckeyes football season, cheering the Dayton
    Dragons in summer, and occasionally joining a local indoor rock-climbing group for strength training.
  arts: Chloe Schmitz, a 39-year-old creative builder, draws artistic inspiration from Monet's watercolors, Ansel Adams' landscapes, and Joanna Gaines' modern rustic designs, while unwinding to Sufjan Stevens'
    folk melodies and watching Greta Gerwig's films for narrative depth.
  travel: Chloe Schmitz, a 39-year-old craft-focused traveler, prefers meticulously planned solo getaways to nearby art hubs like Cincinnati and Chicago and dreams of immersive, sustainable stays in Kyoto's
    traditional machiya houses and Tuscany's vineyard-farmsteads, balancing budget constraints with a desire for quiet discovery.
  culinary: Chloe Schmitz, a 39-year-old experimental home chef, enjoys crafting sourdough starter, mastering miso-based ramen broth, and plating roasted beet and goat cheese salads with fresh thyme and
    rosemary, often cooking on a reclaimed-wood kitchen island they built themselves.
  core: Chloe Schmitz, a 39-year-old meticulous carpenter with a restless curiosity, channels anxiety into detailed sketches and sustainable DIY projects, yet sometimes over-invests in art supplies at the
    expense of sleep.
background:
  cultural: Chloe’s family traces its roots to German immigrants who settled in Ohio in the late 19th century. Growing up in the suburban community of Vandalia near Dayton, she absorbed a blend of Midwestern
    American values—hard work, modesty, and community involvement—and occasional German traditions, such as Oktoberfest celebrations and family recipes for pretzels and schnitzel. She attended local public
    schools and a community college, where practical skills were emphasized alongside liberal arts exposure that sparked her appreciation for art. Her cultural identity is anchored in this German‑American
    Midwestern heritage, shaping her respect for craftsmanship, practicality, and modest artistic expression, while her close‑knit family provides emotional support that helps her navigate her intense emotional
    reactivity.
attributes:
  skills: '["Concrete finishing", "Framing assistance", "Drywall installation", "Material handling", "Power tool operation", "Basic blueprint reading", "OSHA safety compliance", "Jobsite organization",
