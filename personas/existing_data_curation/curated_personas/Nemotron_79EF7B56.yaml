  hobbies: '["Watercolor painting", "Architectural sketching", "Landscape photography", "DIY home improvement projects", "Reading design and sustainability books", "Visiting local art galleries", "Small‑group
    woodworking workshops", "Gardening", "Hiking local trails", "Experimental cooking"]'
  career_goals: Chloe aims to earn a journeyman carpenter certification within three years, using her hands‑on experience to qualify for a foreman role on residential projects. She aspires to launch a boutique
    renovation business that blends functional construction with artistic design elements, such as custom carpentry and eco‑friendly interior finishes. Continuing education in green building, advanced project
    management, and leadership is a priority, as is cultivating a low‑stress, supportive work environment for herself and her crew. Achieving financial stability for her family while reducing work‑related
    anxiety remains a central long‑term ambition.
