  hobbies: '[''LEGO building'', ''Model train construction'', ''Reading adventure novels (e.g., Percy Jackson, Harry Potter)'', ''Strategic board games (Chess, Ticket to Ride)'', ''Boy Scouts activities'',
    ''Nature walks with family'', ''Neighborhood clean‑up volunteer work'', ''Playing soccer in a small team'']'
  career_goals: Shawn dreams of a future where he can help others in a clear, organized setting. He is especially fascinated by the idea of becoming a firefighter or emergency medical technician, roles
    that require teamwork, strict procedures, and community service. He also expresses an interest in becoming an elementary school teacher one day, so he can foster a supportive and harmonious environment
    for younger children, combining his compassionate nature with his reliability and love for structure.
