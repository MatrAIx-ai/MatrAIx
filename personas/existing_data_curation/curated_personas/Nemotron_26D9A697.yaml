  hobbies: '["Reading technical and scientific journals","Model train building","Arduino and DIY electronics projects","Woodworking","Fly‑fishing","Bird‑watching","Gardening (low‑maintenance native plants)"]'
  career_goals: Approaching retirement, William aims to shift from day‑to‑day troubleshooting to a senior advisory role where he can guide project teams and mentor apprentices. He plans to earn his Certified
    Engineering Technician (CET) credential, complete the remaining coursework toward a bachelor's degree in engineering technology, and develop a small consulting practice focused on improving reliability
    for local manufacturing firms. Additionally, he hopes to contribute to industry standards committees, sharing his practical insights on sustainability and equipment longevity.
