personas:
  professional: William Dodge, a seasoned engineering technologist with three decades of hands‑on experience in electrical and mechanical systems, leverages their meticulous attention to detail and practical
    curiosity to diagnose complex instrumentation, mentor junior technicians, and guide project teams toward reliable, sustainable solutions as they transition into a senior advisory role.
  sports: William Dodge, a quiet early‑morning fly‑fisher who also enjoys weekend bird‑watching walks, follows the Carolina Panthers in the fall, cheers on the Charlotte Hornets during the NBA season, and
    spends Saturday afternoons playing softball with the local senior league, balancing low‑impact activity with a steadfast loyalty to regional sports traditions as they stay fit without the strain of
    high‑intensity competition.
  arts: William Dodge, an avid collector of vintage radios and a weekend woodworker, finds inspiration in the blues of B.B. King, the folk melodies of Doc Watson, and the cinematic storytelling of John
    Ford, often listening to the Atlanta Symphony while sharpening chisels, and they regularly attend local heritage festivals featuring fiddlers like The Carolina Chocolate Drops.
  travel: William Dodge, a meticulous planner who prefers road trips over crowded airports, spends vacations exploring historic sites such as the battlegrounds of Antietam, the cobblestone streets of Charleston,
    and the serene trails of Shenandoah National Park, while dreaming of a future pilgrimage to the German Black Forest to connect with ancestral craftsmanship, and they always map each route with a hand‑drawn
    itinerary to ensure a blend of adventure and order.
  culinary: William Dodge, a competent home cook with a penchant for Southern comfort, frequently prepares smoked pork shoulder with a dry rub of paprika and brown sugar, pairs it with fresh trout caught
    on early‑morning streams seasoned with lemon and dill, and delights in baking peach cobbler using locally sourced honey and flaky butter crusts, and they often savor each dish while listening to classic
    radio broadcasts from the past.
  core: William Dodge, a solitary tinkerer who starts each day calibrating a vintage radio and ends it sketching CAD designs over a cup of black coffee, balances relentless order with an occasional habit
    of misplacing their favorite fishing lure in the workshop drawer, and they never miss a chance to adjust a circuit just for the joy of it.
background:
  cultural: Raised in the Upstate of South Carolina during the 1960s and 70s, William grew up in a modest, predominantly white, middle‑class family with deep roots in the region's farming and small‑town
    industrial heritage. His upbringing emphasized self‑reliance, respect for tradition, and a quiet work ethic, values that have persisted throughout his adult life. Though he attended church regularly
    in his youth, his current worldview is more secular, yet he still appreciates the community spirit and hospitality characteristic of Southern culture. His family lineage includes English and German
    ancestry, and he retains a strong connection to local history, often participating in community heritage events when they align with his interests.
attributes:
  skills: '["Technical Troubleshooting","Electrical Systems Design and Maintenance","Mechanical Systems Integration","CAD (AutoCAD, SolidWorks)","PLC Programming","Process Optimization","Quality Assurance
