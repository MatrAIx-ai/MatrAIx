  hobbies: '["Watercolor painting","Creative writing","Science fiction reading","Photography","Strategic board games","Yoga","Herb gardening","Volunteering at youth art workshops","Jazz concerts","Community
    science outreach"]'
  career_goals: Sanya aims to earn a doctorate in social work with a focus on integrating STEM education and mental‑health supports for youth. In the next five years, she plans to step into a leadership
    role—such as Director of Youth Services for the Duval County School District—where she can shape system‑wide policies that embed creative, data‑driven interventions into elementary curricula. She also
    envisions launching a nonprofit that provides arts‑and‑science enrichment programs for under‑served Black children, secured by sustainable grant funding. Through research publications on the impact
    of these hybrid interventions, she hopes to influence state legislation and become a mentor for emerging Black social workers, especially women entering the field.
