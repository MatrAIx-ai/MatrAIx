personas:
  professional: Sanya Malloy, a 35-year-old social work practitioner with a STEM graduate background, designs data-driven, arts-infused youth programs, leverages R and Python to evaluate outcomes, navigates
    interdisciplinary partnerships, assertively advocates for policy change, mentors emerging practitioners, and they balance analytical rigor with imaginative creativity.
  sports: Sanya Malloy, a Jacksonville resident, follows the Jaguars and the Jumbo Shrimp, plays in a community co-ed soccer league on Saturdays, practices yoga three times a week, joins a local rowing
    club during the cooler months for low-impact cardio, and they view regular physical activity as essential for stress management.
  arts: Sanya Malloy, who devotes evenings to watercolor landscapes and mixed-media collages inspired by Yayoi Kusama's pattern play, writes speculative-fiction echoing Ursula Le Guin, captures urban street
    scenes in the style of Henri Cartier-Bresson's black-and-white compositions, attends live jazz performances by Bill Evans and spoken-word shows featuring Sarah Kay, and they consider artistic exploration
    a vital complement to their analytical work.
  travel: Sanya Malloy, whose travel planning balances work commitments with a love for immersive cultural experiences, has explored the jazz scene of New Orleans, the aurora-lit skies of Iceland, and the
    tech-forward art districts of Seoul, still dreams of a road trip through the American Southwest to paint desert horizons, and they prioritize eco-friendly travel options whenever possible.
  culinary: Sanya Malloy, a competent home cook, favors herb-forward Mediterranean dishes such as lemon-thyme grilled chicken, makes fresh basil pesto for weekend pasta, enjoys experimenting with fermented
    kimchi, often incorporates herbs from their balcony garden like rosemary and cilantro into evenings of creative cooking, and they find the act of preparing food both grounding and inspirational.
  core: Sanya Malloy channels a boundless imagination into data-driven social work, occasionally stays up late polishing a poem, forgets garden duties, juggles a relentless pursuit of novel, creative solutions,
    and they embrace both discipline and spontaneity in equal measure.
background:
  cultural: Sanya grew up in Jacksonville’s historic African‑American neighborhoods, where multi‑generational stories of resilience and community solidarity shaped her worldview. Her grandparents were part
    of the Great Migration from the Carolinas, bringing Southern Black cultural traditions that emphasize education, faith, and collective responsibility. Family celebrations of Juneteenth, Kwanzaa, and
    local Black festivals reinforced a sense of pride in her heritage, while her mother’s career as a biomedical technician inspired Sanya’s pursuit of a STEM degree. Active in the National Association
    of Black Social Workers, she integrates African‑American oral storytelling techniques into therapeutic sessions, honoring the rich narrative tradition of her community. Balancing Southern hospitality
    with assertive advocacy, Sanya leverages her cultural roots to build trust with families and champion equitable services within Jacksonville’s diverse population.
attributes:
  skills: '["Program design and evaluation","Data analysis (R, SPSS, Python)","Quantitative research methodology","Trauma-informed counseling","Crisis intervention","Family systems therapy","School-based
