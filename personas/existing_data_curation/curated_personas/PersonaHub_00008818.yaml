persona_description: A political analyst and advocate for democratic governance, who is concerned about the impact of dirty money on democratic institutions and the integrity of elected representatives.
  They are dedicated to finding solutions to prevent the bond between criminal networks and politics, and are particularly interested in the role of decentralisation in facilitating such connections. They
  have a strong understanding of the global problem of illicit funding entering politics through various channels, including political-party finance systems, campaign support, and allocation of lucrative
  contracts. They are also knowledgeable about the corrosive effects of organised crime on democratic systems and the dangers of dirty money undermining electoral processes.
