personas:
  professional: Reginald is a budding digital storyteller who blends comic-style drawing with Scratch programming to create interactive narratives, letting their curiosity drive experimental shortcuts while
    they often skip formal planning and forget to save their work.
  sports: Reginald loves summer beach volleyball, rides their bike along the Pinellas County boardwalk, cheers for the Tampa Bay Buccaneers and Tampa Bay Lightning, and plays in the Pinellas Youth Soccer
    Club, showcasing a flexible fitness approach that mixes casual play with occasional organized practice.
  arts: Reginald admires comic legends like Stan Lee and Alex Ross, draws inspiration from the surrealist works at the Dalí Museum, and spends weekends sketching characters influenced by Studio Ghibli's
    animated films and the vibrant murals of the St. Pete Art Walk, letting these artistic touchstones shape their own visual storytelling.
  travel: Reginald’s travel style blends spontaneous beach trips to Clearwater and family road trips to the Everglades and Orlando’s theme parks with a dream to explore Havana’s historic streets, and they
    prefer hands-on discovery over rigid itineraries while balancing school commitments and limited pocket money.
  culinary: Reginald enjoys the salty tang of grilled grouper tacos with mango salsa, the sweet creaminess of key lime pie, and the bold flavors of a Cuban sandwich layered with roasted pork, ham, Swiss
    cheese, pickles, and mustard; they also help their mom whip up simple guacamole using ripe avocado, lime, and cilantro, though they remain at a microwave-savvy cooking level, preferring fresh fruit
    snacks like pineapple and watermelon.
  core: Reginald is a curious beach-grown comic creator who mixes LEGO building with digital storytelling, tends to forget sunscreen and budgeting, and habitually sketches characters on any scrap of paper
    they find.
background:
  cultural: Reginald grew up in a suburban neighborhood of Saint Petersburg, Florida, where a mix of beach lifestyle, tourism, and local arts scene shape his daily life. His family often spends weekends
    at the Gulf Coast beaches, where they practice outdoor activities like swimming, paddle boarding, and shell hunting. Seasonal community events such as the St. Pete Art Walk and local seafood festivals
    expose him to diverse cultural influences and a strong appreciation for visual arts. Although his household reflects a typical middle-class American upbringing, the multicultural atmosphere of the region,
    including exposure to Hispanic and Caribbean music and cuisine, broadens his perspective and fuels his curiosity about the world.
