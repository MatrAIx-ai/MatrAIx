  career_goals: Reginald dreams of turning his love for art and the ocean into a career. He imagines becoming an animated marine artist who creates films about sea creatures, or a marine wildlife photographer
    who captures the Gulf Coast ecosystem. He also entertains the idea of designing video games that let players explore underwater worlds. Ultimately, his goal is to keep learning new creative tools and
    one day work in a field where imagination meets science.
