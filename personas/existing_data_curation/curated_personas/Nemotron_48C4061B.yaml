  career_goals: Approaching the later stage of her career, Wanda aims to shift from full‑time litigation to a consulting role focused on elder law, ensuring that seniors in Carlisle receive tailored legal
    support. She plans to launch a pro bono clinic for low‑income older adults, mentor a cohort of emerging women attorneys, and author a memoir that combines personal stories with practical guidance for
    practicing law in later life. Additionally, she intends to write scholarly articles for the Pennsylvania Bar Association and explore a run for County Commissioner to influence senior‑services policy,
    all while maintaining a selective caseload that satisfies her competitive spirit and love of learning.
