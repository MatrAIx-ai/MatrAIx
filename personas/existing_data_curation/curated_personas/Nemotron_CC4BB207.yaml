personas:
  professional: Nilda Terc, a veteran diesel‑electric locomotive engineer with decades of hands‑on experience, combines a pragmatic curiosity and bilingual communication to troubleshoot complex signaling,
    uphold FRA safety standards, and mentor the next generation of engineers through hands‑on training and safety‑culture initiatives.
  sports: Nilda Terc, an avid supporter of the San Antonio Spurs and Texas Rangers, hikes regularly with the Hill Country Hiking Club, participates in a senior walking group at the local community center,
    and enjoys dancing energetically at Fiesta San Antonio, balancing moderate fitness with a love for team sports.
  arts: Nilda Terc, a passionate aficionado of música tejana and mariachi, frequently attends live performances by Los Tex‑Mex Legends, dances to Selena’s hits at Fiesta San Antonio, and curates a collection
    of vinyl records featuring Vicente Fernández and other regional icons, letting music shape social gatherings and personal downtime.
  travel: Nilda Terc prefers road trips through the Texas Hill Country, weekend excursions to Big Bend National Park, and scenic rail journeys aboard the Texas Eagle, while dreaming of a cultural tour of
    Andalusia in Spain; they plan trips meticulously but are also open to spontaneous family visits that occasionally reshape itineraries.
  culinary: Nilda Terc excels at preparing traditional dishes like pozole and tamales, hand‑grinding corn for fresh masa, seasoning with dried chilies, and pairing meals with a neat tequila, yet they admit
    a clumsy streak when baking pastries, often opting for stovetop mastery over oven challenges.
  core: Nilda Terc is a sociable, competitive locomotive veteran who blends practical rail expertise with a love for music, model railroading, and community feasts, all while navigating retirement planning
    and managing modest health concerns.
background:
  cultural: Nilda grew up in a close‑knit Mexican‑American family in the San Antonio area. Her parents, who migrated from Jalisco in the 1960s, instilled strong values of hard work, respect for elders,
    and community solidarity. Bilingual from childhood, she celebrates both Mexican traditions—such as Día de los Muertos, quinceañeras, and Semana Santa—and Texan customs, including local fiestas and the
    vibrant música tejana scene. Her Catholic faith and participation in neighborhood associations have shaped her sense of duty and social connectedness. Throughout her career as a locomotive engineer,
    she has navigated a predominantly male field, drawing on her cultural resilience and competitive spirit to earn respect and serve as a role model for other women and Hispanic workers.
attributes:
  skills: '[''Locomotive operation and control'', ''Mechanical diagnostics and repair'', ''Rail safety compliance (FRA)'', ''Signal and communication systems'', ''Crew resource management'', ''Bilingual
    communication (English/Spanish)'', ''Emergency response planning'', ''Schedule and dispatch coordination'', ''Training and mentorship of junior engineers'', ''Data logging and performance analysis'',
    ''Adaptation to new rail technologies'']'
  hobbies: '[''Cooking traditional Mexican cuisine'', ''Hosting family gatherings'', ''Listening to and dancing to música tejana'', ''Attending Fiesta San Antonio and local festivals'', ''Model railroading'',
    ''Gardening'', ''Hiking in the Texas Hill Country'', ''Volunteering in church choir'', ''Reading historical novels'', ''Watching classic Mexican telenovelas'']'
  career_goals: Nilda aims to transition from frontline operation to a senior instructional role within the railroad, becoming a certified locomotive engineer trainer. She hopes to lead a safety‑culture
    initiative, develop training modules that integrate both proven practices and emerging technologies, and mentor the next generation of engineers, especially women and Spanish‑speaking workers. In the
    longer term she envisions a part‑time consulting position where she can advise on operational efficiency and safety compliance, while also securing a stable retirement. Her competitive drive pushes
    her to achieve the lowest incident rate in her division and earn recognition through internal safety awards.
