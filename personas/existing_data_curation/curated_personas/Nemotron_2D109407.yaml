personas:
  professional: Lazarus Robinson, a 6‑year‑old aspiring junior scientist, channels his boundless curiosity and practical mindset into building LEGO rockets and cataloguing rocks from Spokane’s river trail
    while meticulously recording his observations in a color‑coded notebook.
  sports: Lazarus Robinson bolts across the neighborhood field every Saturday as a striker for the Spokane Soccer Club’s junior Rangers, mimicking the fast breaks of his favorite Spokane Chiefs hockey heroes
    while practicing dribbling drills after school.
  arts: Lazarus Robinson fills sketchbooks with comic panels inspired by Jim Davis’s Garfield and Mo Willems’s simplicity, while humming Disney’s ‘Moana’ and ‘The Incredibles’ themes as he assembles LEGO
    creations.
  travel: Lazarus Robinson prefers family‑guided road trips, having explored the Oregon Coast and Yellowstone’s geysers, and now dreams of a future adventure to Disney World in Florida and a summer visit
    to the towering red rocks of Sedona.
  culinary: Lazarus Robinson loves building his own tacos with seasoned ground beef, shredded cheddar, lettuce, and salsa, but consistently asks for extra cheese on his mac and cheese and delights in banana‑and‑peanut‑butter
    smoothies after LEGO sessions.
  core: Lazarus Robinson is a curious, competitively‑spirited six‑year‑old who turns every rock collection into a scientific experiment, saves allowance with a meticulous streak, and occasionally forgets
    his hat on sunny days.
background:
  cultural: Lazarus is raised in a Black family that blends African-American heritage with the local culture of Spokane, Washington. His parents emphasize the importance of community, education, and celebration
    of traditions such as Juneteenth, Black History Month events at the local library, and gospel music at church. Family gatherings often feature soul food recipes passed down through generations and storytelling
    that honors their Southern roots. He participates in a neighborhood Black youth group that offers tutoring, mentorship, and cultural activities, giving him a strong sense of identity while exploring
    the diverse natural environment of the Pacific Northwest.
