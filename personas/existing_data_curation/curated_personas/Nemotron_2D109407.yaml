  career_goals: Inspired by his curiosity about how things work, Lazarus dreams of becoming an engineer or astronaut who designs functional inventions, especially gadgets that help his family and community.
    He also imagines building robots, creating simple machines, and one day walking on the moon while keeping his projects practical and useful.
