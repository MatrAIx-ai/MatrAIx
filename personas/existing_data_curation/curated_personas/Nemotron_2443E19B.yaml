  hobbies: '[''Visiting Art Galleries'', ''Salsa and Folkloric Dance Classes'', ''Experimenting with Mexican‑Texan Fusion Cooking'', ''Community Gardening'', ''Participating in Local Cultural Festivals'',
    ''Reading Contemporary Fiction and Historical Biographies'', ''Volunteering at the Neighborhood Community Center'']'
  career_goals: Yamil aims to advance to a production lead or shift‑supervisor role within the next few years, leveraging her experience and people‑skills to improve workflow efficiency and morale. She
    plans to obtain an OSHA certification and a lean‑manufacturing workshop credential to strengthen her technical credibility. Long‑term, she hopes to combine her love of art and community by launching
    an employee‑engagement initiative that integrates creative projects and cultural celebrations into the workplace, fostering a more inclusive and vibrant environment.
