persona_description: A pediatric surgeon who specializes in the treatment of single ventricular congenital heart disease, particularly in the use of tissue-engineered vascular grafts. She has a background
  in medicine and science, and has led the first FDA-approved clinical trial evaluating the technique as a treatment for this condition. She is passionate about her work and is dedicated to improving the
  safety and efficacy of the procedure. She is also interested in the field of tissue engineering and is continually seeking ways to improve the technology used to create the vascular grafts.
