  career_goals: Although retired, Sunny aims to stay active and purposeful in her community. She hopes to document the region’s folk history and compile a small memoir that captures life in rural Missouri
    during the mid‑20th century. She plans to take a beginner’s digital photography class to better preserve her garden and local events, and she aspires to mentor younger volunteers at the senior center
    and the local library, sharing her cooking, gardening, and storytelling skills. Travel to visit her children and grandchildren, especially to attend family reunions and local fairs, remains a cherished
    ambition. Ultimately, Sunny wants to maintain her health, nurture her social circle, and leave a lasting, personal record of her community’s heritage.
