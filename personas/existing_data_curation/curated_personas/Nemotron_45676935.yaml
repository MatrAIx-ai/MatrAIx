personas:
  professional: Payton Joyce is a veteran metal and plastic fabricator with thirty‑plus years mastering MIG/TIG welding, CNC milling, and injection‑molding, who leverages their practical streak to streamline
    shop floor processes while their occasional spontaneous streak leads them to experiment with unconventional tool setups, making them both a reliable safety champion and a creative problem‑solver eager
    to earn a Certified Welder credential and a CNC advanced certification.
  sports: Payton Joyce is an avid hiker who tackles Sierra Nevada trails with the local Sierra Trail Association, follows the Sacramento Kings for basketball, supports the San Francisco 49ers during football
    season, and they participate in a senior softball league at the community center to stay fit.
  arts: Payton Joyce channels their love of metal into small sculptures inspired by Isamu Noguchi, enjoys historical fiction by Ken Follett and C.J. Sansom, and spends Friday evenings playing bridge with
    friends while listening to classic folk singer Joan Baez.
  travel: Payton Joyce favors road‑trip adventures to national parks like Yosemite and Lake Tahoe, dreams of a cultural pilgrimage to Edinburgh’s historic castle, but balances travel with budgeting constraints
    by planning short, off‑season getaways that fit their retirement income.
  culinary: Payton Joyce relishes cooking hearty barbecues featuring smoked brisket, grilled corn on the cob with rosemary, and a tangy chipotle‑infused BBQ sauce, often harvesting fresh herbs from their
    backyard garden to season dishes, and they rate themselves an above‑average grill master.
  core: Payton Joyce is a practical yet occasionally impulsive hands‑on expert who pairs a lifelong love of metalwork with a nervous eye for safety, a portfolio of modest savings, and they navigate life
    with a penchant for worry‑driven perfectionism.
background:
  cultural: Payton identifies as a White American raised in the Reno area of Nevada. Coming from a working-class, midwest-influenced family that settled in the West, she embodies the region's DIY ethic,
    appreciation for the outdoors, and strong community ties. Her upbringing emphasized self-reliance, modesty, and a respect for traditional values, which continue to shape her social interactions and
    sense of responsibility. She participates in local celebrations, supports neighborhood initiatives, and maintains close family and church connections.
attributes:
  skills: '[''Welding (MIG/TIG and stick)'', ''Metal fabrication'', ''CNC milling and turning'', ''Blueprint reading'', ''Equipment maintenance'', ''Injection molding operation'', ''Plastic fabrication'',
