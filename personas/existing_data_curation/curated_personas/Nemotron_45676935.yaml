  hobbies: '[''Gardening'', ''Hiking'', ''Metal sculpture crafting'', ''Teaching metal-working workshops'', ''Card games'', ''Cooking (especially barbecue)'', ''Reading historical fiction'', ''Crossword
    puzzles'']'
  career_goals: Payton aims to earn a Certified Welder credential and an advanced CNC certification within the next two years, positioning herself for a shop-floor supervisory role. She hopes to mentor
    younger coworkers, improve the plant's safety program, and eventually transition to a part-time consulting role that combines her metal-working expertise with community workshops on DIY metal art. Ultimately,
    she is focused on achieving a financially stable and low-stress retirement while preserving her hands-on connection to the trade.
