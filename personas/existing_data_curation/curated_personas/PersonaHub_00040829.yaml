  settings. They must also be skilled in negotiating, advocating, and implementing changes to ensure that the Convention's goals are achieved. This person must be dedicated to protecting the rights of children
  and promoting their welfare, and must be able to work collaboratively with governments, organizations, and individuals to achieve these goals.
