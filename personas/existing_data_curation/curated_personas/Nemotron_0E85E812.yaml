  career_goals: Although Ernest is no longer part of the formal workforce, he aims to stay active and purposeful in his community. His primary goal is to volunteer regularly at the local senior center,
    leading DIY workshops and assisting with event planning. He also hopes to launch a modest side venture offering handyman services to neighbors, which would allow him to leverage his practical skills
    while maintaining a flexible, routine‑oriented schedule. Long‑term, Ernest wants to secure a comfortable retirement by managing his savings wisely, preserving his independence, and staying socially
    engaged through regular group activities.
