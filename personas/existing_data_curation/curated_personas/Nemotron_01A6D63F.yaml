personas:
  professional: Patrick Collins, a seasoned journeyman electrician in Columbus, blends fifteen years of hands‑on wiring expertise with a methodical curiosity for smart‑home and renewable‑energy technologies,
    positioning themselves to earn a Master Electrician license, gain a renewable‑energy certification, and eventually lead a sustainable contracting firm as a mentor and trainer.
  sports: Patrick Collins, a quiet outdoor enthusiast, spends weekends hiking the Scioto River Greenway and joining the Columbus Hiking Club’s seasonal treks, while cheering on the Columbus Blue Jackets
    in the NHL and the Columbus Crew SC during the fall, and occasionally attends a local pick‑up basketball game to keep their cardio in check.
  arts: Patrick Collins captures the stark geometry of factories through their industrial photography, drawing inspiration from Andreas Gursky and Edward Burtynsky, and unwinds by listening to the atmospheric
    rock of Pink Floy​d and The War on Drugs while occasionally browsing exhibits at the Columbus Museum of Art featuring works by Georgia O'Keeffe.
  travel: Patrick Collins plans their trips with the same spreadsheet precision they use for job estimates, favoring solo road‑trip pilgrimages to industrial heritage sites like the Ruhr Valley in Germany
    and the geothermal fields of Iceland, while also cherishing weekend getaways to nearby Lake Erie for quiet fishing and a hike in the Hocking Hills.
  culinary: Patrick Collins, an avid home chef, spends evenings perfecting elaborate meals such as rosemary‑infused roasted chicken, hand‑crafted sourdough loaf, and smoked brisket, often seasoning with
    smoked paprika and fresh thyme while their Raspberry Pi kitchen timer blares, and they occasionally treat themselves to a craft‑beer flight at a local microbrewery after a long day on the job.
  core: Patrick Collins is a methodical electrician‑turned‑hobbyist who transforms solitary curiosity into detailed model‑train layouts and precise home‑automation experiments, yet occasionally lets their
    perfectionism delay finishing projects and forgets to reply to casual texts.
background:
  cultural: Patrick grew up in a working‑class Midwestern family outside Columbus, with German and Irish roots that value self‑reliance, hard work, and modesty. His upbringing emphasized practical skills,
    respect for the trades, and a pragmatic, quiet competence. While his family attended a local Protestant church occasionally, his cultural identity is shaped more by the Midwestern ethos of community
    responsibility and understated confidence. Living in Columbus, he appreciates the region’s blend of industrial heritage and growing diversity, yet he retains a strong sense of the traditional Midwestern
    values that guided his early life.
attributes:
  skills: '["Residential electrical wiring", "Commercial electrical system retrofitting", "NEC code compliance", "Troubleshooting complex circuits", "Conduit bending and installation", "Low‑voltage and
    data cabling", "Smart home automation and IoT integration", "Solar photovoltaic system installation", "Energy efficiency auditing", "Electrical safety inspections", "Project planning and estimation",
    "Basic PLC programming", "Technical manual interpretation"]'
  hobbies: '["Model railroading", "Woodworking", "Industrial and architectural photography", "Hiking in local parks", "Home‑automation tinkering with Raspberry Pi", "Listening to technology/history podcasts",
    "Cooking", "Reading technical manuals"]'
  career_goals: Patrick aims to earn his Master Electrician license within the next two years and add a renewable‑energy certification to specialize in solar and energy‑storage installations. He envisions
    transitioning into a supervisory role where he can mentor apprentices, eventually opening his own contracting firm that focuses on sustainable residential projects and smart‑home solutions. Long‑term,
    he hopes to become a recognized trainer within his union and to stay at the forefront of emerging electrical technologies, such as electric‑vehicle charging infrastructure.
