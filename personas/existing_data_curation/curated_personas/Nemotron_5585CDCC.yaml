  hobbies: '[''Home gardening'', ''Cooking Mexican cuisine'', ''Woodworking'', ''STEM outreach volunteering'', ''Reading historical biographies'', ''Hiking local trails'', ''Landscape photography'', ''Listening
    to regional Mexican music'', ''Attending Angels baseball games'']'
  career_goals: Pedro aims to advance to a district‑manager position where he can oversee multiple store locations and drive region‑wide initiatives that blend emerging retail technologies with the reliable
    methods he values. He seeks to implement advanced analytics for inventory and staffing, improve the overall customer experience, and mentor the next generation of supervisors. To strengthen his strategic
    expertise, he is considering part‑time enrollment in an MBA program. Long‑term, Pedro envisions consulting for retailers on operational excellence while championing community‑focused programs that highlight
    local Mexican‑American culture in his stores.
