  hobbies: '[''pickup basketball'', ''weekend fishing'', ''woodworking'', ''cooking Puerto Rican cuisine'', ''watching manufacturing documentaries'', ''mindfulness breathing'', ''reading self‑help books'']'
  career_goals: Omar aims to move from the production floor to a supervisory role within the next two to three years, targeting a shift lead position where he can blend his practical experience with his
    curiosity for new manufacturing methods. He plans to earn a Six Sigma Green Belt and a CPIM certification to deepen his expertise in lean processes and inventory optimization. Ultimately, he envisions
    a trajectory toward plant manager, driven by his competitive nature to be among the top performers in efficiency and safety metrics, while seeking a stable, supportive environment that mitigates the
    stress he often feels in high‑pressure settings.
