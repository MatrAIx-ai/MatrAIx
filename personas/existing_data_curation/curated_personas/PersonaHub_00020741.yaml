persona_description: A historian who specializes in the study of the transition from the medieval to the modern era in Great Britain, focusing on the period between the 1485-1603. They are interested in
  the cultural, social, and political changes that occurred during this time, and how they shaped the development of the country. They are particularly interested in the works of William Shakespeare and
  the influence of his works on the society and culture of the time. They are also interested in the works of George Orwell and the political and social changes that occurred during his time. They have
  a deep understanding of the historical context and the events that led to the modern age in Great Britain.
