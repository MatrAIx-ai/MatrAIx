personas:
  professional: Doretta Brownlee is a budding comic creator and theatrical performer whose vivid imagination fuels elaborate storyboards while they spontaneously turn school skits into lively productions,
    even as they sometimes scramble to meet art class deadlines.
  sports: Doretta Brownlee kicks a ball on the Lake Stevens Lightning youth soccer team each fall, splashes through the community swim club’s pool in summer, roars along with the Seattle Seahawks on Saturday
    game days, and they treat fitness as an adventurous extension of their love for storytelling.
  arts: Doretta Brownlee channels the whimsical humor of Bill Watterson, the magical world‑building of J.K. Rowling, and the vibrant color palettes of Disney’s Frozen into their comic strips, while they
    draw inspiration from the lively performances of the local kids’ drama troupe and the energetic beats of Taylor Swift’s pop anthems that echo through family road trips.
  travel: Doretta Brownlee prefers spontaneous weekend escapades—like kayaking on Lake Stevens, exploring the interactive exhibits at Seattle’s Space Needle, and taking family road trips to Disney World—while
    keeping a scrapbook of dream destinations such as the Warner Bros. Studio Tour in London and the coral reefs of Australia, where they imagine sketching underwater creatures.
  culinary: Doretta Brownlee loves devouring pepperoni pizza and whipping up backyard banana splits, but also revels in crafting rainbow fruit kebabs with strawberries, blueberries, and pineapple chunks,
    proudly displaying their budding culinary skills by stirring up simple no‑bake chocolate oat cookies during after‑school art club meetings.
  core: Doretta Brownlee is a vivid‑imagination 10‑year‑old who blends comic‑making, theatrical flair, and woodland adventures into a lively, albeit sometimes worry‑prone, daily narrative, and they often
    channel their anxieties into creative bursts.
background:
  cultural: Doretta comes from a white, middle‑class family in the suburban community of Lake Stevens, Washington. Her upbringing blends the Pacific Northwest’s love for the outdoors—hiking, kayaking, and
    lake activities—with a supportive school environment that emphasizes arts and community participation. The region’s cultural emphasis on environmental stewardship and inclusive community events has
    nurtured her sociable nature and curiosity about the world.
attributes:
  skills: '[''Creative storytelling'', ''Sketching and drawing'', ''Improvisational role‑play'', ''Basic Scratch programming'', ''Social facilitation'', ''Curiosity‑driven problem solving'']'
  hobbies: '[''Drawing'', ''Creative writing'', ''Theater improvisation'', ''Exploring nature'', ''Reading fantasy'', ''LEGO building'', ''Science experiments'', ''Board games'']'
  career_goals: She dreams of becoming an artist or animator who can bring her imaginative worlds to life, or perhaps a children's author who weaves fantastical tales. She is also fascinated by science
    and hopes to explore a future where she can merge art and technology, such as designing interactive installations or working in a creative research lab. Ultimately, Doretta seeks a career that offers
    limitless novelty, social interaction, and the freedom to think abstractly.
