  hobbies: '[''Gallery Visits'', ''Live Theater'', ''Music Concerts'', ''Museum Volunteering'', ''Photography'', ''Cycling'', ''Gardening'', ''Cooking'', ''Book Club'', ''Community Workshops'']'
  career_goals: Although officially not in the workforce, Andrew aims to channel his organizational talent into a formal leadership role within Ann Arbor’s cultural sector. He plans to obtain a short‑term
    certificate in Museum Studies from a community college, then serve as a volunteer coordinator for the Ann Arbor Art Fair and eventually as a community cultural liaison for the city. He also hopes to
    author a series of essays that explore the intersection of Midwestern industry and contemporary art, and to mentor emerging local artists through a quarterly workshop series.
