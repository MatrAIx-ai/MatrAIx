personas:
  professional: Andrew Berman, a seasoned community arts organizer, blends his manufacturing precision, grant‑writing talent, and charismatic public speaking to orchestrate large‑scale cultural events while
    mentoring emerging artists with a curious, methodical, and sociable approach.
  sports: Andrew Berman cycles the Border‑to‑Border Trail with the Ann Arbor Cycling Club, tracks the Michigan Wolverines football and basketball seasons, supports the Detroit Tigers, and attends weekly
    adult fitness classes at the local YMCA to stay active year‑round.
  arts: Andrew Berman curates his evenings around gallery openings featuring works by contemporary Michigan artists such as Kelley Walker and retrospectives of Ansel Adams, while his soundtrack often includes
    Neil Young, the jazz quartet Bad Bad Not Good, and classic Broadway scores like Stephen Sondheim’s 'Into the Woods'.
  travel: Andrew Berman’s travel style mixes meticulous planning with spontaneous detours, having explored the historic districts of Savannah, the vineyards of Tuscany, and the art‑laden streets of Montreal,
    while dreaming of a summer road trip along the Pacific Coast Highway and a cultural immersion in Kyoto’s temples.
  culinary: Andrew Berman’s culinary adventures revolve around farm‑to‑table cooking, regularly preparing roasted beet and goat‑cheese salad with heirloom tomatoes, pan‑seared trout with fresh dill and
    lemon, and a seasonal pumpkin risotto spiced with nutmeg, while sourcing heirloom carrots from his garden and splurging on premium olive oil for friends’ dinner parties.
  core: Andrew Berman is a tireless cultural catalyst who balances meticulous event planning with a habit of over‑booking his calendar, often ending the night with a late‑hour photo edit session under a
    single lamp.
background:
  cultural: Andrew grew up in a middle‑class white family in the Greater Detroit area, with roots tracing back to Irish and German immigrant ancestors. His upbringing was shaped by the Midwestern values
    of hard work, modesty, and community service, reinforced by regular involvement in church and local civic groups. Living in Ann Arbor for the past two decades has immersed him in the university town’s
    vibrant arts scene, influencing his appreciation for diverse cultural expressions while maintaining a strong connection to his regional heritage.
