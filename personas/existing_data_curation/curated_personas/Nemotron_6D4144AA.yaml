  hobbies: '[''Watercolor painting'', ''Papel picado crafting'', ''Desert gardening'', ''Reading philosophy and astronomy'', ''Attending local festivals'', ''Cooking family recipes'', ''Volunteer storytelling
    workshops'', ''Digital photography'']'
  career_goals: Although retired from formal employment, Luz remains driven to contribute meaningfully to her community and to satisfy her lifelong appetite for learning. She aspires to curate a traveling
    exhibit of her watercolor paintings that interpret the high desert’s abstract forms, and to compile a family cookbook that blends Mexican heritage with New Mexican flavors. Luz hopes to lead a community‑heritage
    project that records oral histories of older residents in Grants, partnering with the Cibola County Historical Society. She also plans to mentor younger members of her church’s youth group in storytelling
    and traditional crafts, and to pursue a series of online courses in abstract art theory and digital photography. Ultimately, she envisions herself as a cultural ambassador who preserves and shares the
    rich Mexican‑American traditions of her region.
