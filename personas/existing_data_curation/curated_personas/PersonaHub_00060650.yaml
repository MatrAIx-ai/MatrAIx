persona_description: A healthcare professional who specializes in mammography and breast cancer screening. They have extensive knowledge and experience in the use of x-ray technology to detect tumors and
  distinguish between benign and malignant breast conditions. They are likely to be knowledgeable about the process of resting the breast on a flat surface, compressing it horizontally and obliquely, and
  taking an x-ray image of each position. They may also be familiar with the importance of early detection and the need for regular mammograms to monitor breast health.
