personas:
  professional: Jeannette Small, a 27‑year‑old aspiring medical administrative assistant, leverages her meticulous scheduling talent, data‑entry accuracy, and calm conflict‑resolution style to keep a busy
    community clinic running like a well‑orchestrated hymn while balancing her desire for clear responsibilities with a habit of over‑thinking deadlines; they thrive on structured workflows.
  sports: Jeannette Small, a 27‑year‑old supportive fan of the Buffalo Bills and the New York Knicks, regularly joins the Schenectady Sun Community Walking Club for morning strolls in local parks, and volunteers
    as a scorekeeper for a youth basketball league, balancing a love for organized team sports with her preference for low‑impact group exercise; they stay active while cheering on their favorite teams.
  arts: Jeannette Small, a 27‑year‑old lover of soulful tunes, fills her playlists with Aretha Franklin, Marvin Gaye, and Kirk Franklin, attends weekly spoken‑word events at the local cultural center featuring
    poets like R. B. Harper, and eagerly supports community theater productions of classics such as August Wilson’s ‘Fences,’ which shape her creative outlook; they find inspiration in the fusion of music,
    poetry, and performance.
  travel: Jeannette Small, a 27‑year‑old travel enthusiast who plans each trip with a detailed itinerary, has explored New York City’s historic neighborhoods, the jazz‑laden streets of New Orleans, and
    the serene gardens of Asheville, while aspiring to hike the Adirondack High Peaks when time and finances allow, always balancing structured budgeting with spontaneous local experiences; they value both
    cultural immersion and controlled adventure.
  culinary: Jeannette Small, a 27‑year‑old culinary enthusiast, delights in preparing soul‑food staples like collard greens simmered with smoked turkey, crispy fried chicken, sweet potato pie, and cornbread,
    often seasoning with cayenne and thyme while knitting beside the stove, and proudly shares these dishes at church potlucks and neighborhood gatherings; they view cooking as both an art and a way to
    nurture community bonds.
  core: Jeannette Small, a 27‑year‑old organized yet worry‑prone soul‑food aficionado, blends meticulous planning with heartfelt community service, navigating stress through yoga, journaling, and the comforting
    rhythm of gospel music; they maintain a steady balance between discipline and devotion.
background:
  cultural: Jeannette is an African‑American woman whose family participated in the Great Migration, moving from the Southern United States to upstate New York in the mid‑20th century. Growing up in Schenectady,
    she was immersed in a close‑knit Black community centered around church, family gatherings, and cultural celebrations that emphasized resilience, storytelling, and collective support. Her cultural heritage
    influences her love for soul and gospel music, the importance she places on communal meals, and the value she finds in mentoring younger community members. While navigating a region where she is often
    one of few Black residents, she draws strength from her cultural identity and seeks to honor it through community involvement, preserving traditions, and advocating for inclusive spaces.
