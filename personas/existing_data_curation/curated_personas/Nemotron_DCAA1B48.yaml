  career_goals: Jeannette is focused on securing a stable, structured role that leverages her organizational strengths and offers clear responsibilities. She aims to complete her associate degree in Business
    Administration and obtain a certification as a Medical Administrative Assistant. Her short‑term goal is to work as an administrative assistant in a healthcare clinic or a nonprofit organization serving
    the Schenectady community, where she can manage schedules, maintain records, and support outreach programs. In the longer term, she aspires to advance to an office manager or community outreach coordinator
    position, overseeing teams and contributing to program development. Alongside professional growth, she seeks to improve her stress‑management techniques, ensuring she can maintain reliability and well‑being
    in demanding work environments.
