personas:
  professional: Fabio Smith, a budding LEGO architect who translates their love of building elaborate brick creations into early engineering thinking, demonstrates methodical planning, attention to detail,
    and a quiet confidence that lets them lead small group projects at school.
  sports: Fabio Smith, a member of the local youth soccer club and an enthusiastic fan of the Cleveland Browns, spends Saturday mornings dribbling on the field and joins family hikes along Lake Erie's shoreline,
    where they balance team play with a love for nature.
  arts: Fabio Smith, who devours adventure novels like The Lost World and watches animated classics such as Finding Nemo, channels their creative spark into crafting interactive stories on Scratch that
    often feature dinosaur heroes and brick-built worlds, while they enjoy the music of Imagine Dragons during building sessions.
  travel: Fabio Smith, whose family road trips have taken them to Niagara Falls and the Cleveland Museum of Natural History, prefers short, well-planned excursions that let them collect rocks on the lake
    shore and explore dinosaur exhibits, dreaming of a future visit to the Smithsonian's National Museum of Natural History.
  culinary: Fabio Smith, who delights in assembling their own nachos with layers of cheddar, black beans, and jalapeños, and often helps mom stir a pot of spaghetti with meatballs, they frequently snack
    on apple slices and claim that their favorite dish is homemade pizza topped with pepperoni and olives.
  core: Fabio Smith is a methodical, curiosity-driven seven-year-old who balances LEGO engineering, rock hunting, and quiet gaming with a steady allowance routine, all while they maintain a calm demeanor
    and an ever-growing collection of dinosaur facts.
background:
  cultural: Fabio lives in a middle‑class household in Painesville, Ohio. His family maintains Midwest traditions like holiday meals with turkey and pumpkin pie, attends community events such as the Lake
    County Fair, and participates in church and school activities. Though his ancestry includes Italian and German roots reflected in his surname, the household emphasizes kindness, cooperation, respect
    for education, and outdoor activities near Lake Erie, shaping his values and worldview.
