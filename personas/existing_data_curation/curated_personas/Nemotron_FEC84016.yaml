personas:
  professional: Brook Lee is an aspiring medical laboratory technician whose meticulous attention to detail, methodical spreadsheet skills, and love for organized routines drive their pursuit of precise
    data entry and process optimization, positioning them to excel in a future supervisory role.
  sports: Brook Lee enjoys solitary morning jogs along the Fairfield shoreline, follows the New York Yankees baseball team and the UConn women's basketball squad, and participates in the local high school
    cross‑country club, treating each run as a data‑driven training session logged in their spreadsheet for incremental improvement.
  arts: Brook Lee curates a personal library featuring classics like Jane Austen and Charles Dickens, practices piano pieces by Beethoven and Chopin, and finds solace in the ambient works of Sufjan Stevens
    and Agnes Obel, allowing these artistic influences to shape their quiet evenings of reflection.
  travel: Brook Lee prefers meticulously planned getaways, having explored the historic streets of Bruges, hiked Acadia National Park’s coastline, and dreamed of the Zen gardens of Kyoto, all while balancing
    a tight school schedule and a modest travel budget.
  culinary: Brook Lee enjoys cooking simple yet precise dishes such as spaghetti carbonara with Parmesan and pancetta, lemon‑herb grilled chicken using garden‑fresh basil, and occasional matcha‑infused
    desserts, applying their methodical nature to follow recipes step by step.
  core: Brook Lee is a detail‑obsessed teen who finds comfort in routine, thrives on solitary pursuits, and channels their competitive edge into perfecting spreadsheets, model kits, and quiet piano melodies,
    even if they sometimes neglect social invitations.
background:
  cultural: Brook grew up in the suburban community of Fairfield, Connecticut, a predominantly white, middle‑class New England town that values self‑reliance, personal responsibility, and practical achievement.
    Her family follows mainstream American cultural norms with occasional involvement in local community events and a respect for both academic and hands‑on learning. The region's historical New England
    heritage and proximity to cultural centers have exposed her to a blend of traditional etiquette and contemporary suburban life. While she left the traditional high‑school track early, the community’s
    support for vocational education and steady employment shaped her pragmatic outlook and emphasis on routine.
