    personal space'']'
  career_goals: Brook aims to pursue a vocational training program that leads to a stable, detail‑oriented career such as a medical laboratory technician, certified bookkeeping professional, or operations
    coordinator for a small business. She is motivated to achieve top marks in her coursework, obtain relevant certifications, and eventually move into a supervisory role where she can design efficient
    processes and maintain high standards of accuracy. Her competitive drive pushes her to excel academically and professionally while maintaining the structured routine she values.
