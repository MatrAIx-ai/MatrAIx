personas:
  professional: Wen Ho, a seasoned secondary‑school business educator with over twenty‑years of experience, blends data‑driven curriculum design, project‑based learning, and cutting‑edge educational technology
    to turn abstract financial concepts into practical classroom experiences, while leveraging their organizational prowess and assertive leadership to mentor colleagues and drive district‑wide literacy
    initiatives.
  sports: Wen Ho, a dedicated Tai Chi practitioner at the Montgomery County community center, also follows the Washington Capitals and Baltimore Orioles faithfully, participates in a local walking club
    that meets every Saturday, and occasionally joins a beginner’s pickleball league to stay active without the pressure of competitive sports.
  arts: Wen Ho, an avid calligrapher and tea ceremony enthusiast, finds artistic inspiration in the works of Malcolm Gladwell, the piano compositions of Yo‑Yo‑Ma, and the minimalist paintings of Agnes Martin,
    regularly attends performances at the Kennedy Center, and spends quiet evenings sketching brush strokes while savoring a perfectly brewed oolong.
  travel: Wen Ho, who prefers meticulously planned itineraries, enjoys cultural immersion trips to historic finance hubs like Zurich and Edinburgh, revisits Washington, D.C. for its museums and policy forums,
    and dreams of a serene retreat in the Canadian Rockies, all while balancing travel costs against a modest retirement budget.
  culinary: Wen Ho, a garden‑to‑table advocate, delights in preparing stir‑fried bok choy with ginger, miso‑glazed salmon, and homemade vegetable ramen using home‑grown carrots and kale, while their tea
    ritual incorporates loose‑leaf green tea, matcha powder, and a splash of jasmine essence, and they occasionally treat themselves to a weekend brunch at a farm‑to‑fork bistro featuring avocado toast.
  core: Wen Ho, the methodical educator‑gardener, balances spreadsheets, tea leaves, and crossword puzzles with disciplined precision, yet secretly hoards extra tea bags for late‑night study sessions.
background:
  cultural: Wen Ho’s cultural background is rooted in an East Asian (Chinese) immigrant family that settled in Maryland. She was raised speaking both Mandarin and English and grew up celebrating both Lunar
    New Year and American holidays. Her family’s emphasis on education, discipline, and respect for elders—values shaped by Confucian principles—has informed her strong work ethic and commitment to academic
    excellence. Living in Montgomery County’s diverse community, she blends these traditions with local customs, participating in multicultural events, sharing her heritage through cooking and occasional
    language tutoring, and fostering a bicultural identity that enriches both her personal life and professional practice.
attributes:
  skills: '["Business curriculum design", "Financial literacy instruction", "Project‑based learning facilitation", "Data analysis for student performance", "Educational technology integration", "Classroom
    management", "Assessment design", "Time management and organization", "Leadership and mentorship", "Cross‑cultural communication", "Community outreach coordination"]'
  hobbies: '["Reading non-fiction (economics, psychology)", "Gardening", "Tea ceremony and brewing", "Calligraphy", "Walking and nature trails", "Volunteer financial literacy workshops", "Tai Chi practice",
    "Puzzle solving (crossword, Sudoku)", "Attending small book club meetings", "Exploring local museums"]'
  career_goals: Wen Ho aims to advance into a school‑wide leadership role, such as department head or curriculum coordinator, where she can shape Montgomery County Public Schools’ business and financial
    literacy standards. She plans to develop a comprehensive, interdisciplinary financial literacy program that serves all grade levels and to mentor new teachers through targeted professional development
    workshops. In the longer term, she aspires to earn a doctorate in education leadership to influence district policy on career‑ready education and to become an advocate for equitable access to practical
    financial knowledge for students and the broader community.
