  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Cooking Southern cuisine'', ''Walking in nature'', ''Church volunteer work'', ''Crocheting'', ''Community book club'']'
  career_goals: Molly aims to step into a supervisory role within her restaurant, eventually becoming a shift manager and later a full‑time restaurant manager. She wishes to introduce more structured training
    protocols and streamlined inventory systems to improve efficiency. Long‑term, she dreams of opening a modest family‑run café that reflects the Southern hospitality she values, where she can mentor younger
    staff and create a stable, community‑focused business before retirement.
