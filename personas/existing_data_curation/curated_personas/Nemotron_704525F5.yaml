personas:
  professional: Molly Rupert, a meticulous restaurant server with ten years of front‑of‑house experience, leverages their methodical organization and calm conflict‑resolution skills to keep the dining room
    running like clockwork while training new staff and aims to transition into shift manager to implement structured training protocols.
  sports: Molly Rupert, a devoted fan of the Alabama Crimson Tide football team and a regular participant in the Limestone County walking club, tracks weekly step counts, enjoys weekend rounds of golf at
    the local community course, and supports the Birmingham Barons minor‑league baseball team, and they often discuss game stats over coffee.
  arts: Molly Rupert expresses creativity through quilting—favoring Log Cabin and Dresden patterns—and crocheting, while also immersing themselves in historical fiction by authors such as Philippa Gregory,
    and they enjoy listening to classic country legends like Loretta Lynn and attending community theater productions of "Harvey" in the county auditorium.
  travel: Molly Rupert favors low‑key road trips to nearby Gulf Shores for sunrise walks on the beach and occasional weekend retreats to Charleston’s historic district, while dreaming of a pilgrimage to
    Savannah’s riverfront squares and a future culinary tour of New Orleans' French Quarter, and they plan each journey with a detailed itinerary to keep costs predictable.
  culinary: Molly Rupert delights in preparing Southern comfort foods—shrimp and grits, collard greens flavored with smoked turkey, and sweet‑potato pie—using fresh herbs from their garden, and they are
    known for baking buttery buttermilk biscuits that occasionally turn a shade too golden from over‑baking.
  core: Molly Rupert blends Southern hospitality with a regimented mindset, turning everyday routines—from meticulous cash handling to garden‑to‑table cooking—into a steady rhythm, though they sometimes
    over‑plan their day to the point of missing spontaneous surprises.
background:
  cultural: Molly grew up in a traditional white Southern family in Alabama, with deep roots in the region that trace back to English and German ancestors. Her upbringing emphasized hospitality, modesty,
    and strong community ties, reinforced by regular involvement in her local Methodist church. The cultural fabric of Limestone County—family gatherings, church events, and a respect for Southern culinary
    traditions—shapes her values of reliability, orderly living, and a quiet, steady presence in her community.
attributes:
  skills: '[''Customer service'', ''Order taking'', ''Cash handling'', ''Table management'', ''Inventory control'', ''Food safety compliance'', ''Staff training'', ''Schedule planning'', ''Conflict resolution'',
