  hobbies: '[''Live music concerts (blues, jazz, house)'', ''Social dancing and dance workshops'', ''Cooking and sharing soul food recipes'', ''Volunteering as a STEM mentor for middle school students'',
    ''Community gardening'', ''Running along the Lakefront Trail'', ''Reading sci-fi and social-justice non-fiction'', ''Attending cultural festivals (e.g., Chicago Black History Month events)'', ''Playing
    basketball at local community courts'', ''Traveling to explore urban cultural scenes'']'
  career_goals: Wilda is preparing to re-enter the workforce by leveraging her technical background and passion for community impact. In the short term, she plans to earn a professional data-analytics certification
    and expand her volunteer mentorship portfolio, positioning herself for a role as a STEM education program manager at a nonprofit or a data analyst for a city health department focused on health equity.
    Over the next five years, she aims to lead large-scale community-based initiatives that use data to reduce disparities in education and public health across Chicago’s underserved neighborhoods. Ultimately,
    she aspires to become a senior director or consultant who bridges technology and social justice, guiding organizations in creating inclusive, data-driven solutions.
