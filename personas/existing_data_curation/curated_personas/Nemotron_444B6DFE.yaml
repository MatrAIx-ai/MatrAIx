personas:
  professional: Wilda Gainer leverages a graduate STEM background, data-analysis expertise in Python, R and SQL, and a knack for community outreach to design and manage data-driven STEM education programs
    that aim to close equity gaps in Chicago neighborhoods.
  sports: Wilda Gainer punches a basketball at the West Loop community court, runs the Lakefront Trail three times a week, cheers for the Chicago Bulls and follows the Chicago Run Club, yet sometimes skips
    a workout when a grant deadline looms.
  arts: Wilda Gainer immerses in the city's blues and jazz scene, frequently catching shows by Gary Clark Jr. and Kamasi Washington, hits house nights featuring Black Coffee, and participates in social-dance
    workshops that keep the rhythm of community alive.
  travel: Wilda Gainer prefers short, culture-rich city breaks - like New Orleans for its jazz heritage, Berlin for its tech-art intersections, and Detroit's music museums - planning itineraries around
    local festivals while budgeting travel costs through a mix of early-bird flights and affordable Airbnb stays.
  culinary: Wilda Gainer enjoys cooking soulful dishes that blend Southern flavors - such as black-eyed pea stew, collard greens seasoned with smoked turkey, and sweet-potato casserole - using fresh okra,
    garlic, and a dash of hot sauce to infuse each meal with comfort and community spirit.
  core: Wilda Gainer is a data-driven community builder who balances analytical rigor with a love for music, cooking, and active urban life, all while juggling disciplined finances and occasional self-care
    lapses.
background:
  cultural: Wilda is an African-American woman raised in Chicago, a city with a deep legacy of Black cultural, musical, and activist traditions. Her family’s roots trace back to the Great Migration, bringing
    Southern heritage that blends with the city’s vibrant urban Black culture. She grew up immersed in gospel choirs, jazz clubs, and community centers that championed education and civic engagement. This
    background fuels her commitment to social equity and community empowerment. Wilda values the contributions of Black scientists and engineers, regularly highlighting pioneers like Mae Jemison and George
    Washington Carver in her mentorship. She participates in local Black History Month events, supports neighborhood initiatives, and maintains strong ties to the church and cultural festivals that celebrate
    African-American identity.
attributes:
  skills: '[''Data Analysis (Python, R, SQL)'', ''Statistical Modeling'', ''Machine Learning Fundamentals'', ''Laboratory Techniques (PCR, Spectrophotometry)'', ''Project Management (Agile, Waterfall)'',
