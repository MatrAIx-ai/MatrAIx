personas:
  professional: Joel Strayhorn is a modest‑scale handyman and custom‑furniture maker who blends practical carpentry with a love of regional history, offering flexible, low‑key services to neighbors while
    using their storytelling knack to mediate community disputes and keep their schedule open for artful pursuits.
  sports: Joel Strayhorn enjoys low‑impact outdoor activities such as early‑morning fishing on the Green River, bird‑watching in the nearby woods, and cheering on the Kentucky Wildcats basketball team while
    they occasionally join a senior walking club that meets at the local park each spring.
  arts: Joel Strayhorn immerses themselves in the visual arts by sketching historic buildings, painting watercolors of the Appalachian landscape, listening to folk singer Gillian Welch and contemporary
    creator Ai Weiwei podcasts, and attending small exhibitions at the Dawson Springs art gallery featuring works by regional folk artists like Mary Cassatt, while they often discuss their observations
    at the monthly book club.
  travel: Joel Strayhorn prefers spontaneous, low‑cost road trips that let them photograph rustic towns, having already visited Nashville, Asheville, and the historic district of Savannah, while they dream
    of cruising the Blue Ridge Parkway in autumn and exploring the lavender fields of Provence with their sketchbook in hand.
  culinary: Joel Strayhorn enjoys farm‑to‑table cooking, often tossing home‑grown heirloom tomatoes, fresh peppers, and basil into a rustic ratatouille, grilling river‑caught trout with lemon zest, and
    savoring a slice of peach cobbler made with vintage canned peaches from a local co‑op while they reminisce about childhood harvest festivals.
  core: Joel Strayhorn is a curious, gentle‑minded handyman‑artist who balances solitary sketching with community mediation, tends to forget bills, and hoards vintage Kentucky postcards like treasure while
    they enjoy quiet evenings listening to folk music.
background:
  cultural: Joel grew up in a modest, working‑class family in the Appalachian foothills of western Kentucky. The region’s cultural fabric—characterized by a strong sense of community, hospitality, and respect
    for self‑reliance—has shaped his values. He was raised in a Southern Baptist environment, attending church services that emphasized kindness and cooperation, though he now identifies as spiritually
    eclectic. The local tradition of folk music, storytelling, and handcrafted crafts left a lasting impression, fueling his curiosity for art and history. He is familiar with the town’s legacy as a historic
    health‑spa destination and the surrounding oil‑boom heritage, which he often references in his community talks. While his cultural roots are firmly Appalachian, his open‑mindedness has led him to explore
    broader artistic influences beyond his hometown.
attributes:
  skills: '[''Carpentry and woodworking'', ''Mechanical repair of small engines'', ''Gardening and horticulture'', ''Ham radio operation and basic electronics'', ''Digital photography'', ''Community mediation'',
    ''Local history storytelling'', ''Basic computer use for research'']'
  hobbies: '[''Sketching and watercolor painting'', ''Digital photography'', ''Reading art history and contemporary art podcasts'', ''Visiting local art galleries and craft fairs'', ''Gardening (vegetable
    and herb cultivation)'', ''Fishing and birdwatching'', ''Collecting vintage Kentucky postcards'', ''Participating in a small book club focusing on literature and writing'']'
  career_goals: He hopes to turn his practical talents into a low‑key, flexible source of income by offering occasional handyman and custom‑furniture services to neighbours, while keeping his schedule open
    for art‑related pursuits. Joel also wishes to create a small community art‑appreciation circle at the Dawson Springs public library, where he can share his curiosity about painting, photography, and
    regional folk art with a handful of like‑minded seniors. Long‑term, he dreams of compiling an oral‑history booklet of elder residents, preserving local stories for future generations. All these ambitions
    are shaped by his desire for autonomy, modest social interaction, and meaningful contribution without rigid obligations.
