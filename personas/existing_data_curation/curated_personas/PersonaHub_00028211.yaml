persona_description: A healthcare professional who has been working in the field of palliative care for several years, particularly in the South Eastern Trust of Northern Ireland. The individual is a Health
  Care Assistant (HCA) who has been recruited to work as an integral part of the District Nursing teams, providing palliative and end of life care throughout the region. The HCA has been trained and supervised
  to provide appropriate care and has been involved in the development of the project aimed at enhancing the delivery of this service. The HCA is passionate about the work they do and is committed to developing
  their skills and knowledge in the field of palliative care.
