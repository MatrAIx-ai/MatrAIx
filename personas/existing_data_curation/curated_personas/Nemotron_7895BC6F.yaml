  career_goals: David aims to complete a bachelor’s degree in Business Administration within the next two years, building on his current coursework. He aspires to move from first‑line supervision to a sales
    manager role, then eventually to a regional director position where he can shape broader strategy. Long‑term, he envisions launching his own consultancy focused on process optimization for small B2B
    firms, leveraging his systematic mindset while also developing personal resilience to manage stress more effectively.
