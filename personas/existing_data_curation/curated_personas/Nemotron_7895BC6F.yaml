personas:
  professional: David Gibson, a 20‑year‑old first‑line sales supervisor at a bustling Boston retail hub, blends a curiosity for data trends with a methodical, process‑driven mindset, using Salesforce and
    advanced Excel models to translate metrics into clear action plans while quietly battling a tendency to over‑worry about team performance, and they constantly seek feedback to fine‑tune processes.
  sports: David Gibson, an avid commuter cyclist who joins the Somerville Cycle Club for weekend rides along the Charles River, enjoys catching Boston Celtics games at TD Garden and cheering for the New
    England Patriots, fits occasional intramural basketball into his schedule as a low‑key way to stay fit, and they relish these activities as a quiet counterpoint to work‑related stress.
  arts: David Gibson, who unwinds by attending indie‑music shows featuring artists like Mitski and Phoebe Bridgers at local spots such as Great Scott, devours contemporary sci‑fi novels from authors like
    N.K. Jemisin, and collects minimalist line‑art prints from emerging visual artists, weaving these cultural threads into his quiet creative outlet, and they use these moments to recharge before tackling
    data dashboards.
  travel: David Gibson, a budget‑conscious explorer who has backpacked through the historic streets of Dublin, road‑tripped to Portland for its craft‑beer scene, and dreams of a solo trek across Japan’s
    Kyoto temples, plans each journey with a detailed itinerary in Notion to avoid unpredictability, and they relish the sense of control each itinerary provides.
  culinary: David Gibson, a competent home cook who perfects avocado toast with ripe Hass avocados, feta, and a drizzle of lemon‑infused olive oil, and experiments with spicy ramen bowls using miso, sesame
    oil, and shiitake mushrooms, yet they often order late‑night pizza as a quick stress‑relief indulgence.
  core: David Gibson, a data‑driven yet chronically worrier, balances solitary curiosity with a disciplined routine, secretly hoarding stray receipts and late‑night pizza boxes as evidence of their quirks,
    and they find comfort in the tactile ritual of organizing receipts.
background:
  cultural: David identifies as a White American raised in Somerville, Massachusetts, a city known for its blend of historic New England roots and contemporary cultural diversity. His family background
    includes Irish‑American and broader New England heritage, emphasizing hard work, public education, and community involvement. Growing up near Boston, he has been exposed to a progressive, arts‑focused
    environment that values both individual achievement and collective responsibility, shaping his pragmatic yet curious outlook on life.
