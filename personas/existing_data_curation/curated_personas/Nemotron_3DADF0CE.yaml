  hobbies: '[''Hiking'', ''Urban gardening'', ''Cooking'', ''Board games'', ''Puzzle solving'', ''DIY projects'', ''Reading'', ''Yoga'', ''Volunteer work'', ''Podcast listening'']'
  career_goals: Allison aims to transition her analytical and organizational strengths into a remote or part‑time role such as project coordinator, data‑entry specialist, or freelance social‑media manager.
    Within the next year she plans to earn a Certified Associate in Project Management (CAPM) credential and complete a short course in Google Data Analytics to strengthen her marketability. Ultimately,
    she envisions launching an e‑commerce shop on Etsy where she sells DIY home‑organization kits and custom‑crafted décor, leveraging her hands‑on expertise and digital marketing skills. A secondary ambition
    is to become a local community advocate for sustainable living, organizing workshops that combine her love of practical solutions with her competitive drive to lead successful events.
