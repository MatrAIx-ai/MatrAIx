  hobbies: '[''Street photography'', ''Skateboarding'', ''Coastal hiking'', ''Experimental cooking'', ''Acoustic guitar'', ''Board‑game nights'', ''Volunteer tutoring'', ''Reading speculative fiction'',
    ''Visiting museums'', ''Urban exploring'']'
  career_goals: Dirk aims to deepen his formal education by completing a bachelor’s degree in Elementary Education followed by a master’s in Curriculum and Instruction within the next five years. He aspires
    to become a lead teacher or curriculum specialist at his school, where he can design interdisciplinary, project‑based learning modules that fuse science, art, and technology. He also hopes to mentor
    new teachers, champion inclusive teaching practices, and eventually spearhead an after‑school innovation lab that provides hands‑on STEM experiences for underserved students in the Los Angeles community.
