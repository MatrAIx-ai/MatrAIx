  career_goals: Zhen plans to obtain his GED within the next year and enroll in a community college IT program, aiming to become a certified network technician. He aspires to combine his technical skills
    with his passion for community engagement by eventually launching a youth-focused tech hub in Chicago that offers coding workshops and mentorship. While he keeps a pragmatic eye on stable employment,
