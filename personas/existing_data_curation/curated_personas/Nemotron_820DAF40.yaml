personas:
  professional: An enthusiastic student volunteer and choir participant, Diana Nesmith channels their talkative, sociable nature and compassionate spirit into coordinating storytime events at the neighborhood
    library, employing their practical knack for clear, step‑by‑step planning while allowing enough flexibility to adapt to the lively energy of the children.
  sports: A lively midfield player in the Greenfield Girls Soccer Club’s U‑12 team, Diana Nesmith loves weekend matches, watches the U.S. Women’s National Team and the local professional soccer franchise,
    the River City Rangers, and keeps their fitness routine flexible, often joining friends for impromptu kick‑about after school.
  arts: A vibrant performer and avid reader, Diana Nesmith delights in singing soprano parts in the school choir, starring in drama club productions of 'The Wizard of Oz', and devouring mystery series by
    Lemony Snicket, while drawing inspiration from singers like Ariana Grande and playwright Lin‑Manuel Miranda to fuel their creative flair.
  travel: An adventurous family traveler, Diana Nesmith prefers spontaneous day‑hikes in nearby forests and occasional weekend trips to places like Yellowstone National Park, yet dreams of exploring the
    historic streets of London during a school‑organized cultural exchange, balancing flexible itineraries with the comfort of familiar routines.
  culinary: A budding baker with a penchant for sweet treats, Diana Nesmith often whips up vanilla cupcakes topped with rainbow sprinkles and rich chocolate frosting for school events, mastering basic mixing
    techniques while also loving pepperoni pizza slices with extra cheese during family dinners.
  core: Diana Nesmith blends a talkative, compassionate spirit with a love for structured creativity, often juggling soccer cleats, glitter glue, and cupcake batter while occasionally forgetting to clean
    up their craft corner.
background:
  cultural: Raised in Columbia, Tennessee, Diana experiences Southern hospitality and a close-knit community that values family gatherings, church involvement, and local traditions like county fairs and
    bluegrass music. Her family participates in church choirs and community service, shaping her compassionate outlook and love for helping others. The modest, rural setting encourages her appreciation
    of outdoor activities and close relationships with neighbors.
