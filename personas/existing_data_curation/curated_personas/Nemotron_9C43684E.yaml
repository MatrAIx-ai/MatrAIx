personas:
  professional: Jovani Aki is a senior hairstylist and salon operations leader who leverages two decades of precision cutting, balayage and ombre expertise along with a practical, results‑focused mindset,
    balancing a love of structured client consultations with a flexible, sometimes spontaneous scheduling style to steadily build her boutique studio vision in Antioch.
  sports: Jovani Aki enjoys low‑impact fitness like weekend walks at Pinewood Lake Park and a summer pickleball league with the Antioch Community Center, while cheering on the Nashville Predators, the Tennessee
    Titans, and Nashville SC, and prefers a relaxed, routine‑based approach to staying active.
  arts: Jovani Aki finds creative renewal in knitting handcrafted scarves to soulful tunes by Marvin Gaye, Aretha Franklin, and Stevie Wonder, attending occasional gospel concerts at the historic St. James
    Church and browsing exhibitions at the Frist Art Museum for inspiration in her salon designs.
  travel: Jovani Aki prefers road‑trip itineraries that blend cultural immersion with family downtime, having explored Charleston’s historic districts, New Orleans’ jazz scene, and Asheville’s mountain
    artisans, while dreaming of a leisurely visit to Savannah’s garden squares and the Caribbean’s tropical spice markets.
  culinary: Jovani Aki delights in cooking Southern comfort classics such as fried chicken with buttermilk gravy, collard greens seasoned with smoked turkey, and peach cobbler spiced with fresh thyme and
    nutmeg, wielding a well‑practiced hand at the stove yet occasionally over‑salting dishes while sharing meals at large family gatherings.
  core: Jovani Aki blends salon precision with a garden‑inspired mindset, juggling a love for structured client care and spontaneous herb experiments, while habitually knitting scarves to classic soul tracks
    and occasionally misplacing appointment notes in a busy week.
background:
  cultural: Jovani is an African‑American woman born and raised in the Nashville metropolitan area, now living in Antioch, Davidson County. Her upbringing in a close‑knit Black community instilled a deep
    appreciation for church traditions, family gatherings, and the cultural significance of hair as a form of identity and expression. She draws on Southern culinary roots and the rich musical heritage
    of soul and R&B in her personal life. Her marriage and long‑standing community ties influence her values of cooperation, modest ambition, and a balanced approach to personal and professional responsibilities.
attributes:
  skills: '[''Precision haircutting'', ''Balayage and ombre coloring'', ''Custom styling for events'', ''Client consultation'', ''Product recommendation'', ''Salon scheduling'', ''Inventory control'', ''Basic
