  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking Southern comfort food'', ''Listening to soul and R&B music'', ''Knitting'', ''Volunteer mentoring at youth center'']'
  career_goals: Jovani aims to transition from working in a busy downtown salon to opening a boutique studio in Antioch that offers a relaxed, personalized experience for a small, loyal clientele. She plans
    to develop her own line of natural hair‑care products that reflect her cultural heritage and practical approach. Over the next five years, she also hopes to formalize a mentorship program for aspiring
    Black hairstylists, host quarterly workshops on hair health, and obtain a certification in advanced hair extensions to broaden her service offerings.
