  hobbies: '[''Painting'', ''Pottery'', ''Photography'', ''Hiking'', ''Yoga'', ''Reading Contemporary Fiction'', ''Cooking International Cuisine'', ''Volunteering at Community Shelters'', ''Attending Art
    Gallery Openings'', ''Participating in Book Clubs'', ''Exploring Local Cultural Festivals'', ''Gardening'']'
  career_goals: She aspires to become a director of a regional education center or a nonprofit focused on arts‑based early childhood programs, aiming to expand access to inclusive, creativity‑driven learning
    for underserved families. She plans to complete a bachelor’s degree in Educational Leadership and eventually pursue a master’s, positioning herself for leadership roles that influence policy and promote
    mental‑health support in schools. Additionally, she seeks to launch a community mentorship initiative for single parents and develop a sustainable arts‑integration model for after‑school programs.
