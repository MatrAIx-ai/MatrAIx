personas:
  professional: Brian Bence, a certified HVAC technician with EPA refrigerant handling and NATE training, they leverage a curious eye for design and a talkative flair to explain complex system schematics
    to clients while integrating smart, energy‑efficient solutions.
  sports: Brian Bence stays active by competing in a local pickup basketball league every Thursday night, they cheer on the Philadelphia 76ers and the Eagles while also following the Pittsburgh Steelers
    during the NFL season.
  arts: Brian Bence explores the downtown art scene at venues like the Spruce Street Gallery, they immerse themselves in improv with The Laugh Lab troupe, capture urban murals by artists such as Banksy
    on a vintage Nikon, and wind down playing acoustic renditions of John Mayer's 'Gravity'.
  travel: Brian Bence prefers spontaneous road‑trip adventures that blend historic architecture with culinary discovery, they have recently driven the Gettysburg–Lancaster corridor to sample Pennsylvania
    Dutch pretzels and admire colonial brickwork, while dreaming of a weekend in Asheville's art‑filled neighborhoods.
  culinary: Brian Bence, moderately skilled in the kitchen, they delight in mastering the perfect Philly cheesesteak and experimenting with smoked paprika‑rubbed chicken thighs served with caramelized onions,
    while often adding fig jam to an artisanal bruschetta for a sweet‑savory twist.
  core: Brian Bence is a curious, talkative HVAC master‑technician who balances green‑tech ambition with artistic wanderlust, yet they wrestle with chronic worry and occasional impulse splurges.
background:
  cultural: Brian was raised in Fleetwood, a small community in Berks County, Pennsylvania, an area with strong Pennsylvania Dutch and German‑American roots. His family has a tradition of skilled trades,
    and he grew up valuing hard work, community involvement, and practical problem‑solving. While his heritage is predominantly white American with German and Irish ancestry, the local culture’s emphasis
    on modesty, hospitality, and an appreciation for folk art and craftsmanship has shaped his outlook. He frequently participates in community festivals that feature traditional Pennsylvania crafts, folk
    music, and seasonal celebrations, blending his technical background with the region’s cultural appreciation for art and communal harmony.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant handling and recovery (EPA certified)'', ''Diagnostic troubleshooting'', ''Blueprint and schematic reading'', ''Energy‑efficiency auditing'', ''Smart
    thermostat and home automation integration'', ''Preventive maintenance planning'', ''Customer service and communication'', ''Project coordination'', ''Team leadership'']'
  hobbies: '[''Visiting art galleries and museums'', ''Playing acoustic guitar and songwriting'', ''Improv comedy performances'', ''Street photography'', ''DIY smart‑home automation projects'', ''Yoga and
    mindfulness meditation'', ''Weekly basketball games'', ''Road‑tripping to historic Pennsylvania towns'', ''Cooking regional dishes'']'
  career_goals: Brian aims to become a master technician and eventually lead a multi‑disciplinary service team in a regional HVAC firm. He plans to earn NATE master specialist certification and pursue additional
    training in renewable‑energy HVAC solutions, positioning himself to advise on solar‑assisted heating and cooling installations. In the long term, he envisions opening his own boutique HVAC business
    that emphasizes sustainable design, aesthetic integration of equipment, and community education workshops. He also hopes to mentor apprentices, sharing both technical knowledge and his collaborative,
    people‑first approach.
