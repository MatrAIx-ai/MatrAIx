personas:
  professional: Vanessa Serrano is a budding game designer who creates interactive stories in Scratch, blending her curiosity for fantasy novels with the methodical planning of an organized and reliable
    student, and they eagerly solicit feedback from friends to refine their projects.
  sports: Vanessa Serrano channels their energetic love for soccer into weekly matches with the Sunrise Soccer Club’s U‑12 team, follows a disciplined training schedule printed on their wall calendar, and
    cheers for Los Angeles FC during the MLS season, while also dabbling in seasonal field hockey in the spring to stay fit.
  arts: Vanessa Serrano blends a passion for Folklorico dance steps with drawing comic strips inspired by Bill Watterson’s Calvin and Hobbes, devours fantasy novels by J.K. Rowling, and fuels their creative
    bursts while listening to Taylor Swift and the rhythmic beats of traditional mariachi ensembles, shaping a vibrant artistic identity.
  travel: Vanessa Serrano plans family outings with the same organized flair they apply to Scratch projects, favoring day trips to the nearby state park’s hiking trails and weekend visits to the local science
    museum, while dreaming of a future adventure to the ancient ruins of Machu Picchu and a summer vacation at a seaside resort in Cancun.
  culinary: Vanessa Serrano whips up family‑style tacos and tamales with confidence, skillfully chopping cilantro, roasting chilies, and shaping corn masa dough, yet they still rely on their parents for
    the perfect guacamole, treating each cooking session as a hands‑on science experiment that blends tradition with their curious, methodical spirit.
  core: Vanessa Serrano is an organized, sociable 11‑year‑old who balances relentless curiosity for coding and storytelling with a habit of leaving comic sketches scattered across their room, often forgetting
    to finish homework when a new Scratch idea sparks their imagination.
background:
  cultural: Vanessa comes from a Mexican-American family that speaks Spanish at home and celebrates cultural traditions such as Día de los Muertos, Mexican Independence Day, and family gatherings centered
    around homemade foods. Growing up in Elmhurst, IL, she blends these customs with the diverse suburban environment, attending a public school where she shares her heritage through Spanish language projects
    and cultural presentations. Her family's immigrant roots and strong Catholic values influence her respect for community, family ties, and a love for Mexican music and cuisine.
