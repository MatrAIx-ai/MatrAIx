  career_goals: Vanessa dreams of becoming a bilingual elementary school teacher who can inspire children to love both science and her Mexican heritage. She is also fascinated by environmental science and
    hopes to work on community garden projects that combine sustainability with cultural education. Ultimately, she wants a career that lets her share knowledge, support her community, and continue learning
    new ideas.
