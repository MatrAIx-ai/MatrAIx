  career_goals: Thelma aims to advance into a technical leadership role within the next three years, targeting a Staff Engineer position where she can shape product strategy and champion inclusive engineering
    practices. Long‑term, she envisions becoming an Engineering Manager overseeing diverse teams while launching a community‑driven tech education initiative in Brooklyn to empower Black youth and women
    in STEM. She intends to stay at the forefront of emerging technologies such as AI‑enhanced developer tools, applying her practical mindset to deliver scalable, socially impactful products while balancing
    her family life and personal well‑being.
