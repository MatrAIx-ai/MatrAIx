personas:
  professional: Thelma Carter is a full‑stack software developer who blends a deep curiosity for emerging tools like GraphQL and serverless architectures with a pragmatic focus on delivering scalable React,
    TypeScript, and Node.js applications, and they channel their sociable energy into mentoring junior engineers, leading inclusive hackathons, and championing community tech outreach that closes the digital
    divide in their Brooklyn neighborhood.
  sports: Thelma Carter stays active by attending community yoga sessions, joining a neighborhood pick‑up basketball league that cheers on the Brooklyn Nets, and rooting for the New York Knicks during the
    NBA season, but their spontaneous scheduling often leaves workouts to the last minute.
  arts: Thelma Carter immerses herself in Brooklyn’s cultural pulse by dancing to live sets ranging from Nina Simone’s soul classics to Kendrick Lamar’s hip‑hop verses, snapping street‑art photos of murals
    inspired by Keith Haring, honing improv skills at the Upright Citizens Brigade, and they host monthly spoken‑word gatherings that celebrate their family’s Caribbean and Southern storytelling traditions.
  travel: Thelma Carter prefers loosely plotted getaway adventures, swapping a weekend street‑food tour of Kingston’s markets for a spontaneous tech‑conference meetup in Tokyo, while dreaming of a cultural
    immersion trip to Kigali’s emerging tech scene, all balanced against a modest travel budget and their family’s holiday calendar, and they often plan trips with friends who share a love for music and
    community.
  culinary: Thelma Carter is an experimental home cook who blends Jamaican jerk chicken with Brooklyn‑style sweet‑potato fries, scotch bonnet‑spiced callaloo, and a secret lime‑infused glaze for grilled
    fish, while they also indulge in acoustic jazz brunches featuring avocado toast and matcha lattes, and they proudly claim a solid grasp of both novice and advanced techniques, though they occasionally
    burn the top of their baked mac‑and‑cheese with a rogue flare from the oven.
  core: Thelma Carter is a tech‑savvy community advocate who thrives on spontaneous creativity, juggling full‑stack development, nightly jazz dances, and a relentless, worry‑laden quest for personal balance,
    all while habitually leaving their planner half‑filled and their coffee mug frequently empty.
background:
  cultural: Thelma is an African American woman with family roots in the Southern United States and the Caribbean; her mother immigrated from Jamaica and her father grew up in Harlem‑influenced neighborhoods
    of Brooklyn. Raised in Bedford‑Stuyvesant, she was immersed in Black cultural traditions such as soul music, spoken‑word poetry, and community activism. She celebrates Juneteenth, honors Black History
    Month, and incorporates Caribbean holidays like Emancipation Day into family gatherings. Her cultural identity fuels a commitment to community empowerment, resilience, and representation in tech, motivating
    her involvement in local outreach programs that bridge the digital divide.
