personas:
  professional: Norris Beveridge, a 22-year-old IT support specialist in Boston, leverages his hands-on troubleshooting expertise, PowerShell and Bash scripting, and meticulous documentation habits to resolve
    hardware and network issues with the reliability and punctuality prized by his close-knit community, while they channel a competitive edge into a drive to earn CCNA and Azure certifications and eventually
    lead a small consulting team.
  sports: Norris Beveridge, an avid pickup basketball player in the Roslindale courts, follows the Boston Celtics and Boston Bruins with fervor, joins the Blue Hills Hiking Club for weekend treks, and they
    maintain a disciplined fitness routine that balances sprint drills, weight training, and weekly hikes to counterbalance his desk-bound tech work.
  arts: Norris Beveridge, a classic-rock aficionado who streams Led Zeppelin and The Rolling Stones while editing street-photography inspired by Vivian Maier, spends his weekends wandering Boston’s art
    districts and catching indie film screenings featuring performances by actors such as Tom Hanks, and they let visual and auditory art fuel their creative problem-solving.
  travel: Norris Beveridge plans his travel with the precision of a ticketing system, favoring budget-friendly weekend escapes to the New England coast—like Cape Cod and Portland, Maine—while dreaming of
    a spring road trip to Montreal’s music festivals, and they balance their love for spontaneous hikes with a disciplined savings plan for future overseas adventures.
  culinary: Norris Beveridge, a moderately skilled home cook, gravitates toward hearty New England dishes like clam chowder and lobster rolls, mixes his own garlic-rosemary roasted potatoes for game night,
    and they often fuel late-night PC builds with pepperoni pizza and a side of nachos topped with jalapeños and shredded cheddar.
  core: Norris Beveridge blends methodical tech expertise with a competitive streak, balancing disciplined budgeting and late-night gaming, while they double-check every ticket and hoard spare cables as
    a quirky manifestation of their reliability and need for control.
background:
  cultural: Norris grew up in Roslindale, a working‑class Boston suburb with a predominantly white, Irish‑American heritage. The New England culture of modesty, punctuality, and self‑reliance shaped his
    practical outlook. Community events and neighborhood ties emphasized hard work and hands‑on learning, which encouraged him to pursue technical skills despite not completing a formal high school diploma.
    His upbringing balances a respect for tradition with an openness to new ideas, reflecting the diverse yet modest character of the area.
attributes:
  skills: '[''Hardware troubleshooting'', ''Operating system support (Windows, macOS)'', ''Basic networking (TCP/IP, DHCP)'', ''Remote desktop support (TeamViewer, Remote Desktop)'', ''Ticketing system
    management (Jira, ServiceNow)'', ''Basic scripting (PowerShell, Bash)'', ''Customer service communication'', ''Technical documentation'', ''Time management'', ''Problem‑solving methodology'']'
  hobbies: '[''Building custom PCs'', ''Strategy video games (e.g., Civilization, XCOM)'', ''Reading tech blogs and forums'', ''Attending local hackathons and maker meetups'', ''Hiking in the Blue Hills
    Reservation'', ''Playing pickup basketball'', ''Listening to classic rock music'', ''Urban photography'', ''Volunteering for digital literacy workshops'']'
  career_goals: Norris aims to advance from his current support role to a senior technical specialist and eventually become a certified network engineer. He plans to earn CompTIA Network+, Cisco CCNA, and
    possibly Microsoft Azure certifications. In the longer term, he aspires to lead a small IT team or start his own consulting business focused on small‑business tech solutions. He is driven by a desire
    to apply practical knowledge to solve complex problems and to be recognized for reliability and efficiency.
