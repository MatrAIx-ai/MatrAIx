  career_goals: Jose aims to build a stable, progressive career in finance while staying within environments that value consistency and clear processes. Over the next five years he hopes to obtain a Certified
    Banking Associate (CBA) credential and transition from a clerk to a senior accounting assistant or branch operations supervisor. He envisions leveraging his reliability and practical problem‑solving
    to mentor newer staff, improve workflow efficiency, and eventually qualify for a managerial role that balances operational oversight with direct community engagement.
