persona_description: A linguist who specializes in phonetics and phonological theory, focusing on the mapping of dynamic events to static representations, the evidence for phonological description, the
  constraints on phonological structure, and the implications of psychological speech-sound categorization for phonological theory. They are likely to have a strong background in linguistic terms and have
  taken the prerequisites for this class, and are expected to have a strong understanding of the basic tools of Phonetics, including transcription, articulatory description, and acoustic description. They
  are likely to be proficient in reading from the textbook and from a class reader, and are expected to be able to complete short answer and fill in the blank assignments, as well as longer laboratory assignments
  with short answers and sometimes graphs. They are likely to be responsible for choosing the final project option, and are expected to submit homework and reading assignments, as well as attend class regularly.
