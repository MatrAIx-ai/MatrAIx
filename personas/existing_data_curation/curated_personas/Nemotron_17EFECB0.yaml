  career_goals: John aims to advance into senior executive leadership, such as Director of Engineering or Vice President of Operations, overseeing large‑scale product development pipelines and digital transformation
    initiatives. He seeks to embed structured, data‑driven processes across the organization to improve predictability, reduce operational risk, and boost profitability. A competitive professional, he wants
    to lead his division to top industry performance metrics while championing a culture that balances high achievement with employee well‑being. In the long term, he envisions founding a boutique consulting
    practice that helps mid‑size tech firms streamline operations, adopt Lean methodologies, and build resilient, stress‑aware work environments.
