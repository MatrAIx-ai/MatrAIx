persona_description: A University of Michigan accounting professor who studies the impact of government shutdowns on the financial markets and the functioning of trade in the financial markets. His research
  interests include the role of government uncertainty in the U.S. financial markets and the economic significance of liquidity in the context of government shutdowns. He is particularly interested in the
  effects of government shutdowns on the liquidity of firms' shares and the role of government uncertainty in the U.S. financial markets.
