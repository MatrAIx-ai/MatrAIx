persona_description: A social scientist and educational theorist, with a deep understanding and commitment to the principles of social justice and lifelong learning. They are a visionary thinker who has
  a strong connection to Scotland and its history, particularly the work of Robert Owen. They have a passion for creating new understandings and frameworks that promote equitable education systems, and
  they are committed to developing local approaches that make a difference to the life chances of learners from disadvantaged backgrounds. They are a researcher and practitioner who is dedicated to conducting
  high-quality research that blurs the boundaries between research, policy, and practice, and they are interested in understanding the relationships and transitions between all phases of formal education,
  from pre-school to the university sector, and how they interact with broader public service and societal issues from a social and economic perspective.
