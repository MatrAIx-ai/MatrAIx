personas:
  professional: Miguel Espino is a budding interactive media creator who merges methodical Python coding with sketching and digital illustration to craft small sci‑fi‑themed games, channeling his curiosity
    and competitive drive into every pixel.
  sports: Miguel Espino energizes their afternoons as point guard for the Ridgecrest Wildcats youth basketball team, drills with a local AAU club, and cheers for the Los Angeles Lakers and Liverpool FC,
    blending competitive on‑court play with strategic analysis of game footage.
  arts: Miguel Espino sketches futuristic cityscapes inspired by Syd Mead, edits desert sunrise photos with Lightroom, and curates a playlist that jumps from Tycho’s ambient electronica to Grimes’s synth‑pop,
    constantly feeding a creative appetite that thrives on varied artistic influences.
  travel: Miguel Espino prefers solo road‑trip photography expeditions across the Mojave, has camped beneath the granite cliffs of Yosemite’s Half Dome, and dreams of exploring Tokyo’s Akihabara district
    and Iceland’s geothermal lagoons for a blend of urban neon and natural wonder.
  culinary: Miguel Espino experiments with spicy kimchi‑tacos, perfects a creamy carbonara on weekends, and frequently refuels with avocado toast and energy drinks, balancing a love for bold flavors with
    occasional reliance on quick, sugary snacks.
  core: Miguel Espino is a relentlessly curious teen whose competitive edge fuels both midnight gaming marathons and meticulous digital art projects, while a habit of procrastinating homework often leaves
    them scrambling before school.
background:
  cultural: Miguel is a Mexican‑American raised in Ridgecrest, California. At home, he speaks both Spanish and English, celebrating traditions such as Día de los Muertos, quinceañera preparations for family
    members, and Mexican holiday foods. The blend of his family's cultural heritage with the multicultural environment of Southern California shapes his identity; he values family closeness, respects Mexican
    customs, and simultaneously embraces the diverse artistic and technological influences of his community. This dual cultural perspective fuels his appreciation for varied experiences and informs his
    open, yet occasionally skeptical, worldview.
