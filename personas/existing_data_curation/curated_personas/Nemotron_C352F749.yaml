  hobbies: '[''Gardening'', ''Woodworking'', ''Fishing'', ''Cooking comfort food'', ''Reading historical non-fiction'', ''Walking his Labrador Retriever'', ''Volunteering at local senior center'', ''Attending
    community church events'', ''Playing golf with friends'', ''Model train building'']'
  career_goals: Alexander aims to transition into a senior medical assistant or clinic coordinator role where he can shape daily operations and champion patient‑centered care. He plans to obtain the Certified
    Medical Assistant (CMA) credential and eventually pursue a bachelor's degree in health administration to broaden his leadership opportunities. Over the next few years, he hopes to develop a mentorship
    program for junior staff, streamline workflow protocols to reduce appointment wait times, and expand his involvement in community health outreach, particularly programs that support senior citizens
    in DuPage County.
