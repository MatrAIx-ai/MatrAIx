  hobbies: '[''Reading historical nonfiction'', ''Gardening'', ''Birdwatching'', ''Woodworking'', ''Chess'', ''Photography'', ''Volunteering at food pantry'', ''Community theater'', ''Genealogy research'',
    ''Road trips to state parks'']'
  career_goals: Hunter aims to finish a memoir that weaves his family’s genealogy with the history of Anoka County, and to contribute a series of articles to the local newspaper on regional heritage. He
    wishes to mentor younger volunteers at the senior center, sharpen his digital photography skills to document historic sites, and serve on a neighborhood advisory board. Travel to historic Midwestern
    landmarks and maintaining his health and independence remain important personal ambitions.
