  career_goals: Kyle aims to transition into a senior leadership role such as Procurement Manager or Director of Supply Chain within the next five years, where he can shape corporate sourcing strategy and
    embed sustainability and ethical sourcing practices. He is interested in mentoring junior buyers, leading digital transformation projects that leverage AI and data analytics to optimize spend, and eventually
    consulting for mid‑size manufacturers in the Midwest on strategic procurement. Additionally, he envisions a phased move toward part‑time consulting after retirement to balance professional engagement
    with personal artistic pursuits.
