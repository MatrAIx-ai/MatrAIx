  career_goals: Although retired from the formal workforce, Javier’s primary ambition is to remain active, independent, and healthy. He aims to continue volunteering at the local senior center, offering
    home‑repair workshops and financial‑literacy classes to newly arrived Salvadoran families. He hopes to mentor younger community members, helping them navigate cultural adjustments while preserving their
    heritage. A personal project he cherishes is compiling a memoir of his immigration journey and family stories, which he would like to share through a small community reading series. Additionally, he
    aspires to expand his garden to a community plot, fostering food security and cultural connection through native herbs and vegetables.
