  career_goals: Alicia imagines a future where she works closely with nature and helps others—dreaming of becoming a marine biologist who studies ocean life, a teacher who creates calm, organized classrooms,
    or a veterinarian caring for animals. She aims to learn and grow in environments that are predictable and supportive, valuing teamwork, harmony, and the chance to make a positive impact.
