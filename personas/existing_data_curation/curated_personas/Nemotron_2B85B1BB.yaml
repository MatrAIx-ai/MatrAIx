personas:
  professional: Alicia Gochenour, a budding marine‑inspired engineer in training, weaves together a fascination with seashells, meticulous LEGO construction, and detailed animal picture‑book sketches into
    organized explorations that showcase their practical, calm, and responsible nature, and they often arrange Lego pieces with the precision of a tiny lab experiment.
  sports: Alicia Gochenour, a member of the neighborhood kids’ swim club and a devoted fan of the Los Angeles Dodgers, enjoys structured swim lessons twice a week, builds stamina through beach sandcastle
    races, prefers the predictability of organized water drills over chaotic playground tag, and they often cheer for the Dodgers during family game nights.
  arts: Alicia Gochenour, who delights in coloring sea turtle outlines, listening to Jack Johnson’s acoustic tunes, and watching Pixar’s Finding Nemo, channels their love for oceanic themes into creative
    art projects inspired by illustrator Eric Carle, and they proudly display the finished pieces on the fridge for the whole family to admire.
  travel: Alicia Gochenour, who treasures family beach trips to Virginia’s Outer Banks and weekend drives to nearby state parks, dreams of snorkeling the Great Barrier Reef and exploring the seaside villages
    of Cinque Terre, prefers short, well‑planned excursions over spontaneous long‑haul travel, and they often draw maps of imagined islands in their notebook.
  culinary: Alicia Gochenour, who adores buttery sugar cookies with chocolate chips, loves crunchy fish sticks with tartar sauce, eagerly mixes fresh strawberries and blueberries into a simple fruit salad,
    proudly assists their mom in the kitchen, though they occasionally over‑mix batter, creating extra‑fluffy cupcakes.
  core: Alicia Gochenour, a calm and organized six‑year‑old, balances a love for seashell hunting, LEGO mastery, and disciplined savings while quietly navigating the world with a gentle, routine‑driven
    spirit, and they often organize their toys by color before bedtime.
background:
  cultural: Alicia is raised in a white, middle‑class family in Newport Beach, California. Her upbringing blends mainstream American traditions—celebrating holidays such as Thanksgiving, Christmas, and
    Easter, and participating in community events—with a strong coastal influence that encourages beach outings, marine‑life awareness, and an appreciation for an active, outdoor lifestyle. The family values
    education, environmental stewardship, and respectful social interactions, reflecting the broader Southern Californian community culture.
