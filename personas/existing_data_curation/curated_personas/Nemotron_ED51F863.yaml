  career_goals: Although retired from formal employment, Yvonne’s ambitions focus on legacy‑building and community impact. She plans to complete a memoir that captures her family’s Galveston roots and the
    city’s maritime history, and to publish a series of local‑history articles in the regional newspaper. Yvonne aspires to chair a new ‘Coastal Heritage Project’ at the Galveston Historical Foundation,
    mentoring younger volunteers and securing grants for preservation work. She also hopes to teach a short‑term workshop on genealogy research at the public library, fostering inter‑generational learning.
    Travel remains a personal goal, with a wish to visit historic sites along the Gulf Coast and attend art exhibitions in major museums.
