personas:
  professional: Yvonne Harp, a retired humanities scholar turned community historian, leverages their expertise in genealogical research, literary analysis, and event coordination to lead the Galveston
    Historical Foundation’s Coastal Heritage Project, championing heritage tours, mentoring volunteers, and meticulously budgeting museum exhibitions.
  sports: Yvonne Harp, an energetic senior, participates in line dancing at the Galveston Senior Center, follows the Houston Astros and Houston Texans with fervor, joins a local walking club for weekly
    waterfront strolls, and competes fiercely in weekly bridge tournaments that double as mental‑sport exercise.
  arts: Yvonne Harp, a devoted patron of the arts, regularly attends community theater productions such as ‘The Glass Menagerie,’ enjoys the blues legends like B.B. King at local venues, curates a personal
    collection of vintage Southern artwork, and channels creative energy into quilting and crafting inspired by traditional motifs.
  travel: Yvonne Harp, an adventurous historian, has explored historic Gulf Coast towns like Mobile and Charleston, dreams of visiting the maritime museums of Liverpool and the Normandy D‑Day beaches, and
    annually schedules a weekend trip to New Orleans to savor its music festivals and heritage tours.
  culinary: Yvonne Harp, a Southern‑food aficionado, loves cooking shrimp and grits, collard greens seasoned with smoked turkey, and pecan pie, often experimenting with okra and sweet‑potato biscuits while
    hosting dinner gatherings for book‑club members.
  core: Yvonne Harp blends scholarly curiosity with competitive enthusiasm, turning community history into lively events while secretly hoarding vintage postcards and occasionally forgetting to water their
    garden on rainy days.
background:
  cultural: Yvonne is a White American who grew up in the coastal city of Galveston, Texas, a region shaped by Southern hospitality, maritime trade, and a strong sense of community. Her family’s deep‑rooted
    ties to the Gulf Coast have instilled an appreciation for local history, seasonal festivals, and the cultural blend of Hispanic, African‑American, and European influences common in the area. She was
    raised with Methodist (or broadly Christian) traditions that emphasize service, fellowship, and perseverance. The coastal lifestyle—sun‑soaked summers, shrimp boils, and a reverence for the sea—has
    informed her values of resilience, practicality, and a competitive spirit in community endeavors.
