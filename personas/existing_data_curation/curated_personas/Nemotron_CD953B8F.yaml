  hobbies: '[''karaoke'', ''improv comedy'', ''trivia leagues'', ''tennis'', ''yoga'', ''mindfulness meditation'', ''running'', ''journal writing'', ''escape rooms'', ''DIY electronics'', ''STEM mentoring'']'
  career_goals: Philina aims to advance from a hands‑on inspector role to a supervisory position within quality assurance, eventually becoming a Quality Assurance Manager or Lead Auditor. She plans to obtain
    certifications such as ASQ Certified Quality Engineer (CQE) and Certified Quality Auditor (CQA). In the longer term, she envisions launching a boutique consulting firm that helps small‑scale manufacturers
    in Nevada streamline their testing protocols and achieve compliance. She also wishes to mentor young women in technical fields, using her charisma and public‑speaking skills to inspire.
