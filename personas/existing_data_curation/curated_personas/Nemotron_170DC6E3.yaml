  career_goals: Maryory aims to become a Certified Public Accountant and leverage her bilingual skills to specialize in nonprofit and sustainability accounting for the growing community of small, culturally
    diverse businesses in Sonoma County. She aspires to move into a senior audit manager role where she can mentor junior staff, especially women and Latinx professionals, while shaping audit methodologies
    that incorporate both rigorous standards and culturally aware client communication. Long‑term, she envisions launching a boutique consulting practice that offers audit, tax, and financial advisory services
    tailored to Mexican‑American entrepreneurs, allowing her to balance professional advancement with a supportive, low‑stress work environment that accommodates her anxiety management needs.
