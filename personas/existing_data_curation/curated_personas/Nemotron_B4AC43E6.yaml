  hobbies: '[''Classic car restoration'', ''Woodworking'', ''Target shooting'', ''Hunting'', ''Hiking'', ''Listening to classic rock'', ''Industrial history documentaries'']'
  career_goals: John aims to advance to a shop foreman or lead technician role within the next five years, pursuing NCCER certification and an associate degree in industrial maintenance to formalize his
    expertise. He seeks to oversee larger equipment upgrades and foster a high‑performance maintenance team, leveraging his competitive drive to achieve recognition such as a company "Top Technician" award.
    Ultimately, he hopes to launch his own specialized refractory machinery repair business that emphasizes reliability, safety, and personalized service for local manufacturers.
