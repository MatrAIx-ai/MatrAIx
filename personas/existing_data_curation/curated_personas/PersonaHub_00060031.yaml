persona_description: A physicist or engineer with expertise in nanoelectronics, specifically in the modeling and simulation of light-emitting diodes (LEDs) and their scattering processes. They are familiar
  with the development and implementation of numerical tools, such as NEMO1D, for simulating quantum transport in LEDs and have experience with the use of nonequilibrium Green's function (NEGF) methods.
  They are also knowledgeable about the scattering processes of phonons, interface roughness, and disorder in LED devices and have contributed to the development of efficient algorithms for simulating these
  processes. They have likely participated in the Illinois Phys550 Molecular Biophysics Summer School and have experience with the use of ANGEL, a nonequilibrium Green's function code, for simulating LEDs.
