  career_goals: Hassan aims to transition into a pharmacy manager role at his current location, expanding services to include immunizations, chronic disease monitoring, and telepharmacy consultations for
    outlying farms. He plans to earn a certification in diabetes education and eventually open a community‑health hub that combines a pharmacy with basic primary‑care screenings. Mentoring younger pharmacy
    technicians and strengthening the town’s health outreach programs are also central to his long‑term ambitions.
