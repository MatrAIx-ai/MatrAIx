personas:
  professional: Jose Bermudez, a retired aerospace mechanical engineer, they channel three decades of CAD, finite‑element analysis, and Six Sigma expertise into mentoring high‑school robotics teams, providing
    occasional consultancy on small satellite projects, and applying the same analytical rigor to home‑renovation and garden‑automation endeavors.
  sports: Jose Bermudez, a devoted fan of the Oklahoma City Thunder and the Oklahoma Sooners football team, they attend Friday‑night watch parties, partake in seasonal walks with the Oklahoma City Walking
    Club across the prairie, and maintain a modest weekly routine of light weightlifting to support joint health.
  arts: Jose Bermudez, a frequent patron of the Oklahoma City Community Theatre, they delight in classic stage productions, collect vinyl recordings of Andrés Segovia’s classical guitar, and admire the
    works of Diego Velázquez, which often inspire the motifs in their woodworking pieces.
  travel: Jose Bermudez, an adventurous yet budget‑conscious retiree, they have already explored Santa Fe’s art galleries, plan a spring pilgrimage to Andalusia to reconnect with family heritage, and favor
    leisurely road trips across the Oklahoma prairie that combine prairie photography with quiet camping stops.
  culinary: Jose Bermudez, an enthusiastic home cook, they blend garden‑grown tomatoes, heirloom peppers, and hand‑sifted saffron to craft authentic paella and chilled gazpacho, while experimenting on weekends
    with wood‑smoked rosemary roasts and traditional Spanish desserts.
  core: Jose Bermudez, a methodical yet curious retiree, they fuse engineering precision with a love for woodworking, garden bounty, and weekend chess battles, while occasionally forgetting to water their
    succulents amid project tinkering.
background:
  cultural: Jose is a first‑generation American of Spanish descent, with his parents having emigrated from the Andalusian region of Spain in the early 1960s. He grew up bilingual, preserving family traditions
    such as the celebration of Semana Santa, Día de Los Reyes, and weekly Sunday family meals featuring tapas. While he has assimilated into the Midwestern culture of Norman, Oklahoma, he remains active
    in the local Spanish Cultural Society, participates in flamenco music workshops, and maintains close ties with relatives in Madrid, often visiting them during summer vacations. His cultural identity
    blends the disciplined, family‑oriented values of his Spanish heritage with the pragmatic, community‑focused outlook of his adopted hometown.
attributes:
  skills: '[''Mechanical engineering design'', ''Computer-aided design (CAD) – SolidWorks, AutoCAD'', ''Finite element analysis (FEA)'', ''MATLAB programming and data modeling'', ''Six Sigma process improvement'',
    ''Project management and team leadership'', ''Technical writing and documentation'', ''Electrical troubleshooting'', ''Home renovation planning'', ''STEM mentorship and tutoring'']'
  hobbies: '[''Woodworking'', ''Vegetable gardening'', ''Cooking Spanish cuisine'', ''Playing chess'', ''Puzzle solving'', ''Photography of prairie landscapes'', ''Home‑automation tinkering'', ''Reading
    historical non‑fiction'', ''Volunteer mentor for high‑school robotics'', ''Attending community theater performances'']'
  career_goals: Although retired from full‑time employment, Jose aims to stay intellectually active by mentoring aspiring engineers, contributing occasional consultancy on small aerospace projects, and
    authoring a memoir that captures the evolution of engineering practices over his career. He also seeks to expand his involvement with the local community by serving on the advisory board of a nonprofit
    that promotes STEM education for underrepresented youth, and to travel to Spain to reconnect with his family heritage before his health limits further travel.
