personas:
  professional: Shauna Green, a seasoned humanities professor at a Bay Area university, designs rigorous semester‑long curricula that blend 19th‑century American literature with contemporary social reform
    themes, leverages Canvas for blended learning, and they assertively lead faculty committees while maintaining a routine‑centered workflow that balances structure with occasional pedagogical flexibility.
  sports: Shauna Green hikes the Skyline Ridge and coastal bluffs on weekends with a close‑knit local trekking group, attends weekly yoga classes at a neighborhood studio, and they cheer on the San Francisco
    Giants during baseball season while keeping a modest jogging routine to complement their garden‑based activity.
  arts: Shauna Green frequents intimate poetry readings that showcase works by Emily Dickinson and emerging Bay Area poets, explores small gallery openings featuring paintings by contemporary local artists
    such as Jane Liu, and they unwind listening to Leonard Cohen’s folk ballads and classic American standards while sipping tea.
  travel: Shauna Green prefers low‑key, self‑guided road trips that combine hiking and literary history, such as weekend drives to Mendocino’s redwood trails and a month‑long tour of Scotland’s Highlands
    to explore the origins of the dishes they bake, plans each itinerary around boutique B&Bs and quiet reading nooks, and they budget carefully to allow occasional cultural excursions like a Gettysburg
    battlefield visit and a literary café tour in Dublin.
  culinary: Shauna Green, an adept home cook, delights in preparing classic American comfort foods like chicken pot pie and apple crisp while mastering Scottish shortbread and oatcakes using herbs from
    their garden, pairs each meal with a precisely steeped cup of Earl Grey or locally sourced artisan tea, and they often bake on Sunday afternoons while listening to Whitman’s poetry.
  core: Shauna Green balances a routine‑driven academic life with a quiet love for re‑reading classic novels, tending a herb garden at dawn, brewing tea in exact three‑minute intervals, and they quietly
    champion practical, community‑focused scholarship despite a tendency to over‑schedule their week.
background:
  cultural: Shauna was raised in a middle‑class, white Anglo‑American family in the suburban East Bay, where her parents emphasized education, modesty, and community involvement. Her Scottish ancestry,
    reflected in her maiden name McKenzie, is celebrated through occasional family gatherings featuring Celtic music and traditional dishes. Having spent the majority of her adult life on the Peninsula,
    she has absorbed the Bay Area’s progressive, environmentally conscious culture while retaining the pragmatic, routine‑oriented values of her upbringing. This blend of traditional American middle‑class
    values and the region’s multicultural openness informs her worldview, teaching philosophy, and personal habits.
