  career_goals: Shauna aims to achieve full professorship within the next three years, culminating in a tenure review that reflects her sustained teaching excellence and scholarly contributions. She plans
    to author a monograph on the intersection of American literary realism and social reform movements, seeking a university press contract. Additionally, she aspires to secure a multi‑year grant to develop
    a community‑engaged learning program that partners local schools with her department. Over the longer term, Shauna hopes to serve as department chair, where she can shape curriculum policy and mentor
    junior faculty while maintaining a balanced workload that respects her personal routine.
