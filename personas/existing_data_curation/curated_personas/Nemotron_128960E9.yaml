personas:
  professional: Vivian Wheeler, a 52‑year‑old home‑based caterer‑in‑training and community health liaison, blends meticulous budgeting, garden‑fresh recipe development, and organized volunteer coordination
    with a calm, routine‑driven demeanor that balances compassion and firm leadership.
  sports: Vivian Wheeler enjoys gentle yoga sessions at the church community center in winter, plays in a local senior softball league each spring, and follows the Florida State Seminoles football team
    with avid enthusiasm, all while maintaining daily walks through Cascades Park as a core fitness habit.
  arts: Vivian Wheeler finds solace singing gospel classics with her choir, often channeling the spirit of Mahalia Jackson, while evenings are filled with classic soul records from Aretha Franklin and Marvin
    Gaye, and they regularly attend community theater productions such as The Color Purple and intimate jazz concerts by local saxophonist Marcus Turner.
  travel: Vivian Wheeler prefers planned, low‑key road trips that blend culinary exploration with family‑friendly comforts, having already toured the historic streets of Savannah and the jazz‑rich French
    Quarter of New Orleans, while dreaming of a guided heritage tour of Ghana’s coastal villages to connect with ancestral roots.
  culinary: Vivian Wheeler, an adept home chef, reimagines classic Southern dishes—baking herb‑crusted chicken instead of frying, simmering collard greens with smoked turkey and kale, and crafting sweet‑potato
    pie with an oat crust and a hint of cinnamon—while hosting potluck gatherings where friends savor their nutrient‑rich, soul‑food creations.
  core: Vivian Wheeler is a routine‑loving, garden‑tended caregiver who balances meticulous budgeting with soulful cooking, quietly leads community service while occasionally hoarding extra coupons for
    future potluck feasts.
background:
  cultural: Vivian’s cultural identity is rooted in the African‑American traditions of the Florida Panhandle. She grew up in a close‑knit, church‑centered neighbourhood where stories of the civil‑rights
    movement and Southern resilience were part of daily conversation. Her family maintains culinary traditions such as fried chicken, collard greens, sweet‑potato pie, and festive dishes prepared for holidays
    like Juneteenth and Kwanzaa. Vivian frequently attends community events at Florida A&M University’s cultural festivals and volunteers at historically Black churches, reinforcing a sense of shared heritage
    and communal responsibility. The blend of Southern hospitality, church‑based fellowship, and African‑American perseverance informs her values of service, respect for elders, and the preservation of
    family history.
attributes:
  skills: '["Household budgeting and financial tracking", "Large‑scale meal planning and Southern cooking", "Volunteer coordination for church outreach", "Basic first‑aid and medication management", "Gardening
