    navigation"]'
  hobbies: '["Vegetable gardening and native flower cultivation", "Cooking and baking traditional Southern comfort food", "Knitting and crocheting blankets for community donation", "Reading African‑American
    history and biography", "Weekly church attendance and gospel choir participation", "Walking in Cascades Park and local nature trails", "Family genealogy research", "Volunteer work at the local food
    bank", "Listening to classic soul and R&B music"]'
  career_goals: Vivian’s primary ambition is to turn her culinary talents into a modest home‑based catering service that specializes in healthy Southern comfort food for church gatherings and local community
    events. In parallel, she plans to complete a certified caregiving program to formalize the support she already provides her spouse and to volunteer as a health‑resource liaison at the Tallahassee senior
    center. She also hopes to finish a GED or enroll in an online associate‑level nutrition course, enabling her to lead recipe‑sharing workshops for neighbours. Long‑term, Vivian aims to document her family’s
    genealogy and preserve oral histories, creating a digital archive that honors her ancestors while mentoring younger women in her church about family heritage and practical life skills.
