personas:
  professional: Grace Billiot, a 19‑year‑old part‑time insurance sales associate and business administration student, combines meticulous CRM organization, a calm demeanor under pressure, and a voracious
    curiosity about insurtech to demystify policy jargon for clients while they consistently exceed weekly sales targets.
  sports: Grace Billiot fuels their love of the outdoors through weekly hikes with the Connecticut Trails Hiking Club, maintains a disciplined yoga practice at the local community studio, and they root
    for the New England Revolution while they occasionally join a recreational volleyball league at the town recreation center.
  arts: Grace Billiot channels their artistic curiosity by sketching watercolors of the Connecticut shoreline after visits to galleries featuring works by Claude Monet and Yayoi Kusama, curates playlists
    that blend Bon Iver’s indie folk with Björk’s experimental pop, and they volunteer at the town cultural center where they help organize avant‑garde film nights.
  travel: Grace Billiot prefers purposeful weekend getaways—like paddle‑boarding on Block Island and exploring the historic streets of Providence—while they plan future trips to Portland, Oregon for its
    coastal vibe and Copenhagen for its design‑forward culture, balancing budget constraints with a desire for immersive, art‑centric experiences.
  culinary: Grace Billiot, an emerging home cook, favors fresh New England seafood such as clam chowder and lobster rolls, experiments with Mediterranean‑inspired quinoa salads dotted with feta and olives,
    and they treat themselves to occasional sushi rolls topped with avocado and jalapeño, all while maintaining a modest skill level that leaves them relying on YouTube tutorials for complex techniques.
  core: Grace Billiot blends a disciplined, data‑driven approach to insurance sales with a free‑spirit love of watercolor art, often juggling meticulous budgeting beside spontaneous shoreline sketches,
    and they occasionally forget to water their paint brushes in the rush of meeting sales quotas.
background:
  cultural: Grace grew up in a middle-class family in East Hampton, Connecticut, a small town in Middlesex County with strong New England roots. Her family values educational attainment, community involvement,
    and a respect for the region’s natural beauty. She was raised near the coast, which cultivated an appreciation for maritime history and seasonal outdoor activities. While her ancestry is primarily of
    European descent, she identifies with the broader New England cultural fabric—emphasizing pragmatism, polite independence, and a love for the arts, reflected in frequent trips to nearby cultural hubs
    like New Haven and New York City for theater, museum, and music experiences.
