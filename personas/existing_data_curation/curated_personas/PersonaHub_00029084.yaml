persona_description: A geologist who is interested in the study of metamorphic rocks and their composition, particularly granite and garnet mica schist. They are knowledgeable about the different minerals
  found in these rocks, such as quartz, feldspars, biotite, and hornblende, and can identify them based on their physical and chemical properties. They are also familiar with the metamorphic process that
  transforms original minerals into stable ones under high pressure and heat, and can describe the appearance of garnet crystals and the reddish-purple lumps in the context of garnet mica schist.
