  career_goals: Yohai aims to transition from his current non‑working status into a part‑time handyman role that leverages his hands‑on repair and maintenance expertise. He is exploring short‑term vocational
    courses at the local community college to earn a certification in residential maintenance and to obtain a GED. Long‑term, he hopes to launch a small landscaping and home‑improvement business that can
    provide reliable services to his neighbors while offering flexible hours for family commitments. He also wishes to become a regular contributor to the neighborhood association, using his organizational
    strengths to improve community programs and to mentor younger residents in practical skills.
