personas:
  professional: Yohai Lacey, a pragmatic handyman‑in‑training, leverages their methodical carpentry, gardening, and budgeting skills to deliver reliable home‑repair services while planning a future neighborhood
    landscaping business.
  sports: Yohai Lacey is a loyal Miami Dolphins fan, follows the Miami Heat, plays recreational basketball at the Pompano Beach Community Center, and belongs to the local Pompano Beach Fishing Club for
    weekend angling trips.
  arts: Yohai Lacey enjoys documentaries like “Planet Earth” and “Impossible Engineering,” listens to Jimmy Buffett and John Hartford while building model wooden boats, and appreciates the work of marine
    painter Winslow Homer, which inspires their own craftsmanship.
  travel: Yohai Lacey plans meticulous road trips, having explored the Florida Keys, Savannah, Georgia, and a weekend getaway to the Bahamas, while dreaming of a rainforest trek in Costa Rica once their
    landscaping business stabilizes.
  culinary: Yohai Lacey favors farm‑to‑table meals, frequently preparing grilled mahi‑mahi with mango salsa, roasted vegetable lasagna using garden harvests, and fresh cucumber‑avocado salads drizzled with
    lemon vinaigrette.
  core: Yohai Lacey blends a curiosity for how things work with a steadfast routine, hoarding seashells as trophies, double‑checking every repair, and occasionally postponing GED classes for a perfect garden
    harvest.
background:
  cultural: Yohai identifies as a white American with roots in the Midwestern United States, whose family relocated to Florida in the 1970s seeking a coastal lifestyle. He grew up in a working‑class environment
    that emphasized self‑reliance, hard work, and community involvement. Living in Pompano Beach, he has been influenced by the region’s blend of Southern hospitality and the multicultural vibe of Broward
    County, adopting a relaxed beach culture while maintaining traditional American values of responsibility and independence. His marriage further enriches his cultural perspective, incorporating elements
    of his spouse’s background into family traditions and celebrations.
