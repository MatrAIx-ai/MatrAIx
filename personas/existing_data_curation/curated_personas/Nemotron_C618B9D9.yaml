  hobbies: '[''Community gardening'', ''Live-music and swing dancing'', ''Volunteering at food bank'', ''Reading historical fiction'', ''Knitting'', ''Exploring farmers’ markets'', ''Hiking near Lake St.
    Clair'', ''Road-tripping to regional bakeries'']'
  career_goals: Her primary ambition is to transition from her current bakery position to owning a boutique storefront that showcases her signature Midwestern‑European fusion pastries, especially seasonal
    fruit tarts and sourdough loaves. She aims to obtain a Certified Pastry Chef credential within the next two years, launch a weekly community baking class, and develop a line of ready‑to‑bake mixes for
    local supermarkets. Long‑term, she envisions opening a second location in nearby Royal Oak and mentoring other women in the culinary trade.
