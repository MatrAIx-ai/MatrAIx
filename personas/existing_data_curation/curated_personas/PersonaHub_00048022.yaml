persona_description: A professional who is responsible for managing and sharing data and information within a government agency, such as the Department of Energy (DOE), Environmental Protection Agency (EPA),
  or National Institutes of Health (NIH). They are responsible for ensuring that data and information are released and shared as soon as feasible without compromising privacy concerns, federal and state
  confidentiality concerns, proprietary interests, national security interests, or law enforcement activities. They are also responsible for maintaining a list of circulars, policies, and federal regulations
  related to data and information management, as well as developing and implementing data management plans for their respective agencies. Additionally, they are responsible for ensuring that data and information
  are shared in a manner consistent with the agency's mission and that appropriate ocean data and related information collected under federal sponsorship be submitted to and archived by designated national
  data centers.
