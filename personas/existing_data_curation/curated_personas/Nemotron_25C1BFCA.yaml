personas:
  professional: Alice Moran, an aspiring young illustrator and storyteller, blends Appalachian folk motifs with fantasy narratives by creating watercolor sketches of the Shenandoah River and animating them
    in Scratch, approaching each project with meticulous organization balanced by spontaneous creativity.
  sports: Alice Moran enjoys solitary outdoor pursuits, participating in the Martinsburg Youth Hiking Club and rowing a small canoe on the Shenandoah River, while also cheering for the West Virginia Wildcats
    junior soccer team, though they rarely join team sports due to a preference for quiet, reflective exercise.
  arts: Alice Moran immerses herself in the arts, sketching river landscapes in the style of Andrew Wyeth, listening to folk tunes by Gillian Welch, practicing beginner piano pieces by Ludovico Einaudi,
    and creating Scratch animations inspired by Studio Ghibli’s “Spirited Away,” all while showcasing her work at the county fair's art exhibit.
  travel: Alice Moran prefers nature‑focused trips, having camped in Shenandoah National Park, visited the historic Hagerstown Fair, and dreaming of a family road‑trip to Yellowstone, all curated with hand‑drawn
    maps and travel notes, yet limited by school schedules and parental budget constraints.
  culinary: Alice Moran loves cooking simple meals, frequently preparing grilled cheese with locally sourced apple butter, experimenting with pepperoni rolls, and baking chocolate chip cookies, favoring
    fresh berries and cheddar, though they sometimes forget to clean up the kitchen properly after baking.
  core: Alice Moran fuses quiet Appalachian reverie with vivid fantasy, trading social chatter for star‑filled journals, meticulous sketchbooks, and a relentless curiosity that sometimes leaves a trail
    of crumbs and unfinished LEGO sets.
background:
  cultural: Alice is a white American growing up in Martinsburg, West Virginia, a small city with deep Appalachian roots. Her family participates in community events such as the Berkeley County Fair, local
    folk‑music gatherings, and school art showcases that emphasize regional crafts and history. The surrounding mountains and the Shenandoah River shape her appreciation for the natural environment, while
    the town’s modest, middle‑class values foster self‑reliance and a respect for quiet, solitary reflection. At school she benefits from a supportive arts program that introduces her to both traditional
    Appalachian folk art and contemporary digital media, helping her blend local cultural heritage with broader artistic influences.
