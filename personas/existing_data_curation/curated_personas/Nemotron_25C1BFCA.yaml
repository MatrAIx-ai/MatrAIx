  career_goals: Alice dreams of turning her love for art and curiosity about the world into a career that lets her work independently while still sharing her vision. She hopes to attend a specialized art
    high school, then study illustration or environmental design at college. Her long‑term ambition is to become a concept artist for video games or a children's‑book illustrator, creating visual narratives
    that inspire other curious minds. She also imagines working as a museum curator for natural‑history exhibits, blending her research skills with artistic storytelling. To achieve these goals, she is
    building a portfolio of sketches, digital pieces, and short story illustrations before turning 15.
