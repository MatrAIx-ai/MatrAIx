personas:
  professional: Chelsea Pilgrim, a 32‑year‑old electrical/electro‑mechanical assembler, blends a strong command of schematic reading, soldering, and quality inspection with a preference for routine tasks,
    yet reliably steps up to lead small projects on the shop floor, leveraging their collaborative nature to support teammates and pursue a shift‑supervisor role while working toward journeyman electrician
    certification and PLC expertise.
  sports: Chelsea Pilgrim cheers on the River Valley High School Raiders football team every Friday night, plays third base for a local co‑ed softball league, and follows the Chicago Bears as their favorite
    NFL franchise, balancing their love for community sports with weekend jogs along the nearby river trail to keep stamina for DIY projects.
  arts: Chelsea Pilgrim finds their creative outlet in classic rock, blasting Led Zeppelin, The Rolling Stones, and Fleetwood Mac while working in the garage, sometimes strumming an old acoustic guitar
    they inherited, and contributes to the neighborhood community center’s theater productions by building sets and handling lighting rigs, embodying their hands‑on appreciation for the arts.
  travel: Chelsea Pilgrim prefers low‑cost road trips in their trusty 1998 Chevrolet pickup, charting routes to nearby state parks such as Shenandoah and the Great Smoky Mountains for weekend camping, while
    dreaming of a cross‑country drive to the Pacific Northwest’s Oregon Coast, and they typically book campsites last minute, allowing room for spontaneous detours.
  culinary: Chelsea Pilgrim cooks hearty, comfort‑food meals like beef chili with kidney beans, shepherd’s pie loaded with carrots and potatoes, and homemade cornbread, favoring bold flavors of smoked paprika,
    garlic, and cumin, and they often toss fresh zucchini, kale, and tomatoes from their garden into stir‑fries or salads.
  core: Chelsea Pilgrim is a practical, hands‑on 32‑year‑old who blends a love for routine electrical work with weekend DIY home upgrades, a passion for classic rock, and a habit of procrastinating on paperwork
    while meticulously caring for their garden and pickup.
background:
  cultural: Chelsea grew up in a middle‑class, white, Midwestern family in the Detroit metro area. Her parents were first‑generation immigrants from Irish and Polish backgrounds, and she was raised with
    a strong emphasis on hard work, punctuality, and community involvement. The family attended a local Lutheran church, and holidays were marked with traditional American–European customs. Living in Royal
    Oak, she has been influenced by the region’s automotive heritage and a close‑knit suburban culture that values family stability and neighborly support.
attributes:
  skills: '[''Component placement'', ''Soldering'', ''Wire harness assembly'', ''Reading schematics'', ''Electrical troubleshooting'', ''Quality inspection'', ''Use of hand and power tools'', ''Basic PLC
    troubleshooting'', ''Team collaboration'', ''Inventory management'']'
  hobbies: '[''DIY home improvement'', ''Gardening'', ''Car maintenance'', ''Cooking comfort food'', ''Listening to classic rock'', ''Attending high-school football games'', ''Community volunteering'',
    ''Watching classic movies'']'
  career_goals: She aims to become a shift supervisor within the next two years, gaining certification as a journeyman electrician and deepening her knowledge of programmable logic controllers and automated
    assembly. Long‑term, Chelsea hopes to transition into a maintenance technician role where she can apply her troubleshooting skills to broader equipment, and eventually she envisions opening a small
    home‑based electronics repair shop to provide a stable income for her family while maintaining a predictable routine.
