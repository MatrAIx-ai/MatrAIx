persona_description: A marine biologist who specializes in the conservation and recovery of endangered species, particularly the short-tailed albatross. She has extensive experience working with the U.S.
  Fish and Wildlife Service on recovery plans for endangered species, and is well-versed in the use of decoys and recorded colony sounds to establish new breeding sites. She has international experience
  in endangered species recovery, and is well-connected within the marine conservation community. She is passionate about protecting the short-tailed albatross and its habitat, and is committed to finding
  a safe and suitable breeding site for the birds.
