  career_goals: Juana aims to advance from managing a single restaurant to overseeing multiple locations as a regional manager for a hospitality brand that values cultural storytelling through food. Long‑term,
    she dreams of opening her own boutique eatery that showcases the vibrant culinary heritage of Spain and the Southwest, incorporating locally sourced ingredients and sustainable practices. She also plans
    to mentor emerging women leaders in the food‑service industry, speak at regional culinary conferences, and possibly pursue a master's degree in hospitality management to deepen her strategic expertise.
