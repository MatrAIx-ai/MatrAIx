persona_description: A literature scholar who is particularly interested in the works of the Song Dynasty, particularly those that deal with the cane. They are knowledgeable about the variety of canes in
  Song literature and how they reflect the different inclinations of Song writers and the selective inheritance of Song culture from preceding literatures. They have a keen interest in understanding the
  evolution of worldviews, values, aesthetic tastes, and literary claims of Song writers and the rich cultural and aesthetic implications of cane-related materials, costumes, circumstances, and activities.
  They are also interested in the philosophical implications of the cane in ancient Chinese literature.
