persona_description: A veterinarian who specializes in the study of canine epilepsy, particularly the condition known as EPM2 and its associated gene mutations. She is particularly interested in the management
  and treatment of epilepsy in dogs and is currently leading a research project to develop a test for the faulty EPM2b gene in miniature wirehaired dachshunds. She is also interested in the potential use
  of this test to eradicate the disease in other breeds of dogs.
