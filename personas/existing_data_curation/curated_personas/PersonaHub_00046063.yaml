persona_description: A team of agricultural engineers and biosystem department faculty members from Agricultural Technology UGM, who are responsible for implementing biodigester technology in the community
  of Laksana village in Karangkobar district, Banjarnegara, Central Java. The team includes Dr. Ngadisih, Dr. Joko Nugroho, Dr. Hatma Suryatmojo, and M. Chrisna Satriagasa, M.Sc, who have experience in
  installing and maintaining biogas units and conducting community service projects under grants in Education for Sustainable Development (EfSD) from UGM Centre for Disaster Studies. The biodigester technology
  is aimed at generating methane gas for energy use and better sanitation, and reducing waste.
