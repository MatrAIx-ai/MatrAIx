  career_goals: Charles aims to advance within the United States Postal Service by moving into a supervisory role, such as a Route Manager or Shift Lead, where he can mentor new carriers and contribute
    to operational improvements. He is interested in leading pilot projects that integrate new delivery technologies—like electric vehicles or automated sorting systems—to enhance efficiency. Long‑term,
    he envisions becoming a regional logistics coordinator, using his on‑the‑ground experience to shape broader service strategies while maintaining a stable income to support his family.
