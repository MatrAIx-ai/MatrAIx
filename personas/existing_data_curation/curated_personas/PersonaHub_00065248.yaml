persona_description: A photographer who specializes in capturing historical and eschatological events, particularly those involving the nouveau roman authors and the office of Editions de Minuit in 1959.
  This photographer is skilled in the art of capturing the intersection of history and gesture, and is known for his ability to release the gesture through his absolute fixing of everyday gestures such
  as slouches and cigarette smoke. The photographer's work is marked by a demand for redemption and a rejection of the digital image, which he believes is unable to close the gap between the sensible and
  the intelligible.
