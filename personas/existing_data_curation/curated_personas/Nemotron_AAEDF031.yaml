  career_goals: Rebecca aspires to turn her deep curiosity for art and abstract ideas into a professional role within museum curation and arts education. In the next two years she plans to secure an internship
    or entry-level curatorial assistant position at a regional museum, while completing a portfolio of independent pop-up exhibitions that blend visual art with narrative storytelling. She intends to apply
    for a graduate program—either an MFA or a MA in Museum Studies—to deepen her theoretical knowledge and curatorial practice. Long-term, Rebecca envisions becoming a senior curator or arts program director
    who designs interdisciplinary exhibitions that challenge conventional perspectives and engage diverse audiences. She also hopes to publish a book that explores the intersection of visual culture and
    literary narrative, and to develop a sustainable work rhythm that supports her mental-health needs.
