personas:
  professional: Rebecca Bunt, a 22‑year‑old humanities graduate with sharp research acumen and advanced Adobe suite skills, channels their vivid imagination and meticulous organization into curatorial assistant
    work where they design myth‑infused exhibitions, meet exacting deadlines, and assertively collaborate with museum staff while quietly nurturing their own artistic practice.
  sports: Rebecca Bunt stays fit by hiking the rolling hills and river trails of Clermont County on weekends, joining a local outdoor adventure club for group treks, cheering on the Cleveland Browns and
    Cleveland Cavaliers during the football and basketball seasons, and occasionally participating in a community intramural soccer league to break up their studio routine.
  arts: Rebecca Bunt immerses themselves in contemporary visual culture by frequenting galleries showcasing artists like Yayoi Kusama and James Turrell, attending poetry readings featuring works by Ocean Vuong,
    curating pop‑up art showcases at neighborhood cafés featuring local illustrators, and drawing relentless inspiration from mythological motifs in the works of Neil Gaiman and the music of Björk.
  travel: Rebecca Bunt plans travel with a mix of meticulous research and spontaneous curiosity, favoring weekend escapes to Hocking Hills State Park, cultural deep‑dives in New York City’s Museum Mile,
    dream‑like trips to the ancient temples of Kyoto, and annual pilgrimage to the Edinburgh Fringe Festival, all while balancing a modest travel budget and a desire for creative immersion.
  culinary: Rebecca Bunt enjoys crafting Mediterranean‑inspired dishes like shakshuka with fresh tomatoes, feta, and za’atar, experiments with hand‑rolled sushi for weekend gatherings, pairs meals with
    a habitually brewed single‑origin pour‑over coffee, and indulges in late‑night dark‑chocolate bites while sketching, though they often neglect proper meal timing during intense project periods.
  core: Rebecca Bunt is a 22‑year‑old art‑obsessed curator‑in‑training who balances obsessive organization with a restless imagination, a chronic worry habit, and a love for coffee‑fueled midnight sketching.
background:
  cultural: Rebecca was raised in Loveland, a small city in Clermont County, Ohio, within a family of German-Irish heritage that valued community, education, and modest self-reliance—hallmarks of Midwestern
    culture. Her parents encouraged involvement in local festivals, library programs, and school arts clubs, giving her early exposure to both folk traditions and contemporary artistic expressions. Growing
    up amid the region’s rolling hills, farms, and close-knit neighborhood networks shaped her appreciation for the Midwest’s landscape and its practical, organized ethos. While she identifies as a white
    American, Rebecca embraces a broad cultural curiosity, drawing on her Midwestern roots while exploring diverse artistic, literary, and philosophical traditions beyond her immediate environment.
