  hobbies: '[''Hiking in the Rocky Mountains'', ''Cycling on Denver trails'', ''Yoga and meditation'', ''Watercolor painting'', ''Sketching landscapes'', ''Attending theater performances'', ''Reading classic
    literature'', ''Solving jigsaw puzzles'', ''Volunteering as a docent at the Denver Art Museum'', ''Target shooting practice'']'
  career_goals: Victoria seeks to advance to a supervisory security role, aiming to become a Senior Surveillance Manager overseeing a team of officers across multiple gaming venues. She plans to obtain
    the Certified Protection Professional (CPP) certification and pursue specialized training in cybersecurity for gambling platforms. Long‑term, she aspires to transition into security consulting for cultural
    institutions, integrating her love for the arts with her security expertise, ultimately securing a directorial position that blends operational leadership with heritage preservation.
