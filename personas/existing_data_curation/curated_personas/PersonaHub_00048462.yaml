persona_description: A Head of Phase Three at a secondary school, focusing on developing and delivering an engaging and challenging curriculum that prepares students for secondary education and beyond.
  The persona is committed to ensuring that the school's resources are utilized effectively and that all students have access to high-quality teaching. They are passionate about promoting a love of learning
  and are dedicated to supporting students in finding pleasure in challenge and being aspirational in their learning. The persona is also skilled in structuring core learning in small group settings, encouraging
  a love of reading, and ensuring that spelling, punctuation, and grammar are taught discretely and referenced throughout both English writing and reading sessions. They are committed to including the six
  Modern British Values throughout the curriculum and ensuring that the wider curriculum gives children memorable experience to learn from.
