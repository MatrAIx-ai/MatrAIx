    teamwork'']'
  hobbies: '[''digital illustration'', ''creative coding'', ''reading speculative fiction'', ''philosophy'', ''jazz and neo-soul music'', ''visiting art galleries'', ''volunteering for STEM outreach'',
    ''journaling and mindfulness'', ''nature hikes'', ''shell collecting at the beach'', ''board games'', ''experimental cooking'']'
  career_goals: Rosa aims to launch a career that bridges science and visual storytelling, such as scientific communication, data visualization, or user‑experience research for health‑tech platforms. She
    plans to pursue a graduate degree in bioinformatics or science communication to deepen her expertise while building a portfolio of visual science content for broader audiences. Rosa is also committed
    to mentoring other Black women in STEM, volunteering in community outreach programs, and eventually shaping policies that promote diversity in scientific research. She seeks a supportive work environment
    that values creativity, structured problem solving, and well‑being, allowing her to manage stress while pursuing impactful projects.
