personas:
  professional: Rosa Addison, a budding scientific communicator and data visualization specialist, leverages their Python, R, and Tableau expertise to transform complex bioinformatics pipelines into accessible
    visual stories, while they channel imaginative curiosity into innovative design concepts and their organized, methodical work ethic ensures every project meets rigorous academic standards.
  sports: Rosa Addison enjoys weekend hikes through the nearby nature preserve, practices yoga at a local studio for flexibility and stress relief, and avidly follows the Tampa Bay Buccaneers in football,
    the Tampa Bay Rays in baseball, and the Miami Heat in basketball, while they also play in a co‑ed recreational soccer league each spring.
  arts: Rosa Addison immerses themselves in the arts by sketching digital illustrations inspired by the surreal works of Yayoi Kusama, attending jazz nights featuring Miles Davis recordings, vibing to neo‑soul
    classics by Erykah Badu, and regularly participating in poetry slams that showcase contemporary voices like Danez Smith, all of which feed their speculative‑fiction‑driven imagination.
  travel: Rosa Addison prefers thoughtfully planned trips that blend cultural immersion with artistic inspiration, having explored the historic streets of Savannah, the vibrant markets of Marrakech, and
    the serene temples of Kyoto, while they dream of future solo hikes along Iceland’s Laugavegur trail and weekend getaways to the Florida Keys for shell‑collecting sunrise walks.
  culinary: Rosa Addison experiments in the kitchen by reinventing classic Southern dishes—such as shrimp and grits with a drizzle of black garlic oil and collard greens tossed with toasted quinoa and edible
    flowers—while they leverage their intermediate cooking skills and love for bold flavors like smoked paprika and fresh citrus.
  core: Rosa Addison is a methodical dreamer who blends scientific rigor with artistic flair, constantly juggling creative projects, anxiety‑induced worry, and a penchant for late‑night jazz listening while
    they meticulously plan every detail of their life.
background:
  cultural: Rosa is a Black American who grew up in Seffner, Florida, within a close‑knit African‑American community that blends Southern traditions with contemporary cultural expressions. Family traditions
    include church gatherings, Sunday brunches, and celebrating milestones such as Juneteenth, Kwanzaa, and local Black History Month events. She benefited from mentorship programs that encourage Black
    youth in STEM, such as the Florida A&M University STEM summer academy, shaping her academic path. Rosa’s cultural identity informs her values of resilience, community uplift, and representation, guiding
    both her personal pursuits and professional ambitions.
attributes:
