    Management'', ''Empathy‑Driven Leadership'']'
  hobbies: '[''Traditional Puerto Rican Cooking'', ''Salsa and Bomba Dancing'', ''Yoga & Mindfulness'', ''Hiking'', ''Urban Photography'', ''Community Volunteering'', ''Home‑Automation Projects'']'
  career_goals: Maytte aims to advance to a regional director role where she can shape sustainable housing policies across multiple properties. She plans to earn LEED AP and Certified Property Manager credentials,
    integrate renewable‑energy solutions into her portfolio, and champion affordable‑housing initiatives that preserve community cohesion. Long‑term, she envisions launching her own boutique property‑management
    firm that prioritizes resident wellbeing and environmental stewardship while mentoring emerging professionals from under‑represented backgrounds.
