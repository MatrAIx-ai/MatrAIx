  career_goals: Jesse dreams of becoming a marine biologist who studies ocean life and shares his discoveries through artwork and storytelling. He is also fascinated by space exploration and imagines a
    future as an astronaut‑artist, combining scientific research with visual expression. In the short term, he aspires to win a school science fair with a project about local tide‑pool ecosystems and to
    create a comic series that highlights marine conservation.
