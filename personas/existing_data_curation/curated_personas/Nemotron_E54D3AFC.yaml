personas:
  professional: Jesse Wood, an 8‑year‑old budding marine illustrator, merges a love for tide‑pool photography with meticulous LEGO ship construction, applying a disciplined plan‑first mindset when sketching
    a sea star yet staying flexible enough to swap colors when a new shell catches their eye; they channel their curiosity into detailed water‑color paintings of marine life while maintaining a tidy workspace,
    reflecting a balance of organization and creative spontaneity.
  sports: Jesse Wood plays forward for the “Seashell Strikers” in the Coastline Kids Soccer League, attending practice twice a week, and swims with the “Dolphins Swim Club” where they work on freestyle
    laps; they admire the Seattle Seahawks and emulate their teamwork on the field, while also cheering for the San Jose Sharks hockey team, blending a competitive spirit with a supportive attitude toward
    teammates.
  arts: Jesse Wood spends afternoons drawing marine creatures inspired by the vibrant illustrations of John Conway and the luminous seascapes of Winslow Homer, attends after‑school art workshops to experiment
    with watercolor techniques, and looks up to Studio Ghibli’s Ponyo and illustrator Mary GrandPré for their whimsical storytelling; their sketchbooks are filled with detailed tide‑pool studies and occasional
    practice of Claude Monet’s water‑lily brushstrokes, reflecting a deep appreciation for both realism and imagination.
  travel: Jesse Wood dreams of snorkeling along the Great Barrier Reef after already exploring Sunny Bay Beach on weekend family picnics and visiting the Monterey Bay Aquarium’s kelp forest exhibit; they
    plan trips by drawing hand‑made maps, packing a small art kit for on‑the‑spot sketches, favoring hands‑on experiences over guided tours, and their current wish list includes a road‑trip to New Zealand’s
    Fiordland to paint glacial waters.
  culinary: Jesse Wood loves homemade fish tacos with fresh lime, avocado, and cabbage slaw, often helps whisk batter for banana‑oat pancakes, enjoys sea‑salted pretzels as a snack, and delights in making
    clam‑shaped cookies using old LEGO pieces as molds; they favor gummy sea‑creature candy and carrot sticks with hummus, though they sometimes label vegetables as “treasure” in their lunchbox to coax
    themselves to eat them.
  core: Jesse Wood, an 8‑year‑old marine‑themed artist who balances meticulous LEGO ship building with spontaneous beach adventures, saves allowance in a piggy‑bank, manages mild allergies, thrives in soccer
    and swimming, draws inspiration from marine illustrators, dreams of reef‑side travel, and enjoys fish tacos while occasionally skipping sunscreen.
background:
  cultural: Jesse is a White American child raised in Los Osos, a small coastal community in San Luis Obispo County, California. His family embraces the laid‑back, nature‑focused lifestyle of the Central
    Coast, emphasizing outdoor activities like beach outings, hiking, and environmental stewardship. The local culture celebrates marine life, with community events such as beach clean‑ups and the Los Osos
    Marina Festival influencing his appreciation for the ocean. While primarily rooted in mainstream American customs, his upbringing also includes exposure to the region's Salinan Native American heritage
    through school programs and local museums, fostering a respect for diverse cultural histories.
