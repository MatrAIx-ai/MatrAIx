  hobbies: '[''Community softball league'', ''Group Zumba classes'', ''Hiking in state parks'', ''DIY home‑improvement projects'', ''Woodworking'', ''Cooking Wisconsin regional recipes'', ''Attending folk
    music festivals'', ''Volunteering at the community garden'', ''Vintage motorcycle restoration'', ''Exploring renewable energy technologies'']'
  career_goals: Adelaide aims to earn her Journeyman pipefitter certification and eventually obtain a Master Plumber license, positioning herself for a foreman or supervisory role within her local union.
    She envisions starting a small, family‑run plumbing business that emphasizes sustainable heating and water‑conservation technologies, mentoring apprentices, and fostering a collaborative workplace culture.
    While she values steady progress, she also wants to stay at the forefront of emerging plumbing innovations, integrating green‑building practices into the services she offers to her community in Seymour
    and the surrounding Shawano County area.
