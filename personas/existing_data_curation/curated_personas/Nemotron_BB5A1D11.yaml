personas:
  professional: Adelaide Vandermeulen is a seasoned pipefitter and plumber who expertly reads blueprints, performs MIG/TIG welding, and installs both traditional copper and modern PEX systems, while they
    bring a curious yet pragmatic mindset that encourages exploration of energy‑efficient heating solutions and their relaxed, collaborative style keeps crew morale high even when plans shift on the fly.
  sports: Adelaide Vandermeulen energizes weekends by playing third base for the Seymour Softball Club, attending high‑energy Zumba sessions at the local community center, hiking the Kettle Moraine State
    Forest trails, and cheering loudly for the Milwaukee Brewers, Packers, and Bucks, and they embody a social, team‑oriented approach to fitness that blends friendly competition with communal camaraderie.
  arts: Adelaide Vandermeulen finds inspiration at the annual Midwest Folk Festival, where they sway to the melodies of Sufjan Stevens and Bob Dylan, enjoy occasional performances by the local community
    theater’s production of 'Our Town,' and keep a small vinyl collection of classic folk records, letting music and stagecraft fuel their DIY spirit and neighborhood gatherings.
  travel: Adelaide Vandermeulen prefers spur‑of‑the‑moment road trips, often mapping a weekend route from Seymour to the historic canals and cheese markets of northern Europe to experience Sinterklaas celebrations,
    while they also explore national parks like Badlands and the Great Smoky Mountains, balancing adventurous wanderlust with a modest travel budget.
  culinary: Adelaide Vandermeulen enjoys cooking hearty Wisconsin fare—hand‑breaded cheese curds, bratwurst with sauerkraut, and a butter‑rich fish fry—while they occasionally experiment with a Dutch apple‑pie
    crust and master herb‑infused marinades, showcasing an intermediate skill level that blends comfort food with occasional culinary experimentation.
  core: Adelaide Vandermeulen blends pipe‑wrench precision with a laid‑back love of vintage motorcycles, spontaneous road trips, and an occasional tendency to misplace their favorite wrench in the garden
    shed, and they often joke about it during community gatherings.
background:
  cultural: Adelaide hails from a Dutch‑American family that settled in rural Wisconsin generations ago. Growing up in Seymour, she absorbed Midwestern values of hard work, self‑reliance, and community
    stewardship. Family traditions include celebrating Dutch holidays like Sinterklaas, enjoying cheese curds at local fairs, and participating in church and neighborhood gatherings. Her upbringing blends
    a pragmatic, down‑to‑earth ethic with an openness to new ideas, shaping her balanced curiosity and collaborative spirit.
