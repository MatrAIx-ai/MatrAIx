personas:
  professional: Justina Palla, an aspiring young game designer, crafts simple interactive stories in Scratch while meticulously documenting their code, channeling their curiosity and love for organized
    creativity into playful digital adventures.
  sports: Justina Palla plays forward on the Sands Point Tigers youth soccer team, enjoys weekly swim lessons at the local community pool, and passionately cheers for the New York Mets while sporting a
    lucky baseball cap during games.
  arts: Justina Palla spends afternoons painting watercolors of coastal dunes, draws inspiration from Claude Monet’s brushstrokes and Studio Ghibli’s vibrant palettes, and regularly showcases their creations
    at the school art club and community library exhibitions.
  travel: Justina Palla loves family road trips to nearby Long Island beaches like Fire Island, dreams of exploring the American Museum of Natural History in Manhattan, and plans a future summer adventure
    to the coral reefs of the Bahamas after saving up from their LEGO fund.
  culinary: Justina Palla delights in making peanut butter‑banana sandwiches, experimenting with fruit salads topped with honey and cinnamon, and occasionally helps bake chocolate chip cookies with rainbow
    sprinkles for school bake‑sale fundraisers.
  core: Justina Palla is a curious nine‑year‑old who balances meticulous LEGO constructions with spontaneous watercolor splashes, a habit of overpacking their backpack with extra crayons, and a tendency
    to lose track of time during library story hours.
background:
  cultural: Justina grows up in a White, Irish‑American family in Port Washington, NY, where community gatherings, seasonal celebrations, and storytelling are valued. Her family often visits local museums,
    attends cultural festivals in Long Island, and observes holidays such as St. Patrick’s Day and Thanksgiving with traditional foods and an emphasis on sharing and gratitude. This environment nurtures
    her appreciation for history, art, and collaborative activity while emphasizing kindness, responsibility, and respect for diverse perspectives.
