  career_goals: She dreams of blending her love for art and science, aspiring one day to become a museum curator or scientific illustrator who makes complex ideas accessible and beautiful. She also imagines
    being a marine biologist or astronaut, driven by curiosity about the natural world and space, and hopes to use her kindness and collaborative spirit to inspire peers and contribute positively to her
    community.
