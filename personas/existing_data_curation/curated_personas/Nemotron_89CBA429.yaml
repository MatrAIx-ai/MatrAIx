personas:
  professional: Juan Suarez, a 30‑year‑old postsecondary instructor in mechanical engineering and physics, blends their strong command of MATLAB, Python, and SolidWorks with a preference for routine lab
    structures, crafting inclusive, hands‑on curricula while their relaxed, moderately disorganized approach leads them to improvise when schedules shift, and their cooperative nature fuels successful grant
    writing and community outreach.
  sports: Juan Suarez participates in a local Hispanic soccer league on weekends, follows the Green Bay Packers and Milwaukee Brewers, and maintains a relaxed fitness routine that mixes casual hikes in
    the Wisconsin River Valley with weekly soccer matches, preferring the familiar structure of team play over solo gym workouts despite occasional missed practice due to their disorganized schedule.
  arts: Juan Suarez enjoys listening to classic norteño sounds by Los Tigres del Norte and mariachi tunes from Vicente Fernández while unwinding with historical novels by Mariano Azuela, and their appreciation
    for these cultural art forms fuels community involvement, such as organizing Day of the Dead altars, even if they sometimes neglect regular museum visits due to a spontaneous schedule.
  travel: Juan Suarez prefers flexible, low‑key travel, often planning weekend road trips to the Upper Midwest’s Lake Geneva and the Door County shoreline, while dreaming of a food‑focused pilgrimage to
    Oaxaca to explore regional cuisine, balancing spontaneity with occasional budgeting concerns before committing to longer vacations.
  culinary: Juan Suarez is an adept home cook who specializes in traditional dishes such as tamales stuffed with pork and masa, rich mole poblano featuring ancho chiles, chocolate, and spices, frequently
    sourcing fresh cilantro, dried chilies, and local corn from farmers’ markets, and they love hosting communal meals that blend cooking with storytelling, though they sometimes burn the mole when distracted
    by a phone call.
  core: Juan Suarez blends methodical teaching with a love for spontaneous community cooking, balancing a penchant for routine with occasional disorganized streaks that make them the reliable yet delightfully
    unpredictable neighbor.
background:
  cultural: Juan was born to Mexican immigrant parents who settled in the Midwest when he was a child. He grew up bilingual, celebrating traditions such as Día de los Muertos, quinceañeras, and religious
    holidays that blend Catholic rituals with Mexican folk customs. His family places a strong emphasis on community, hospitality, and education—values that have shaped his personal and professional life.
    In Waunakee, he actively participates in the local Mexican Cultural Center and collaborates with the Madison‑based Mexican American Chamber of Commerce to promote cultural heritage and STEM opportunities
    for Hispanic youth.
