  career_goals: Juan aims to achieve tenure within the next five years while expanding his research on sustainable energy systems. He aspires to become department chair, championing curricular reforms that
    integrate experiential learning and service‑learning projects with local industry partners. He also plans to launch a mentorship program for first‑generation college students, especially those from
    Mexican‑American families, and to develop a bilingual STEM outreach initiative in Dane County. Long‑term, Juan hopes to influence state education policy to support practical, hands‑on STEM education
    in community colleges and high schools.
