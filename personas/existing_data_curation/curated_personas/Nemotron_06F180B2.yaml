personas:
  professional: Sophy Oxendine, a 20-year-old STEM student who splits time between a research lab and a bustling Seattle café as a waitress, blends Python and R data analysis with hands-on experimental
    design to create efficiency-boosting prototypes for hospitality technology, while their sociable, assertive nature makes them a natural bridge between engineers and front-line staff.
  sports: Sophy Oxendine avidly hikes the Cascades, cycles the Lake Sammamish loop, competes in a co-ed intramural volleyball league, and cheers for the Seattle Seahawks and Seattle Storm, balancing team
    spirit with solo endurance challenges.
  arts: Sophy Oxendine spends evenings strumming acoustic guitar inspired by Sufjan Stevens, devouring sci-fi novels by Neal Stephenson, snapping macro photos of dew-covered lichens, and frequenting coffee
    houses where they discuss artful data visualizations with friends, all while citing Annie Leibovitz as a visual influence.
  travel: Sophy Oxendine’s travel style blends spontaneous weekend road trips to the Oregon coast and planned spring visits to Vancouver with a dream of wandering Kyoto’s cherry-blossom streets, budgeting
    trips around their part-time waitressing shifts and preferring budget hostels over luxury hotels.
  culinary: Sophy Oxendine experiments in the kitchen with fusion dishes like miso-marinated salmon tacos and coffee-infused chocolate brownies, favors ingredients like matcha, smoked paprika, and fresh
    herbs, and while their culinary skill is intermediate they often end up with a burnt edge on the brownies, a quirk they joke about over coffee.
  core: Sophy Oxendine fuses data-driven pragmatism with outdoor adventure, juggling coffee-fueled coding sessions, volleyball games, and a habit of leaving a stray coffee stain on lab notebooks.
background:
  cultural: Sophy was raised in a suburban community near Seattle, in a family with Northern European ancestry. Growing up in the Pacific Northwest, she was immersed in a culture that values education,
    outdoor recreation, and technological innovation. Her family emphasized a balanced work ethic and community involvement, encouraging her participation in school science fairs, local volunteer initiatives,
    and weekend hikes. While identifying as white American, she has been exposed to the region’s cultural diversity, attending multicultural festivals and collaborating with peers from varied backgrounds,
    shaping an inclusive and open-minded worldview.
attributes:
