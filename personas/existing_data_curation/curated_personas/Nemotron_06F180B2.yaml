  hobbies: '[''Hiking in the Cascades'', ''Cycling around Lake Sammamish'', ''Intramural volleyball'', ''Arduino/Raspberry Pi tinkering'', ''Exploring coffee shops'', ''Reading science fiction and popular
    science'', ''Cooking experimental dishes'', ''Playing guitar'', ''Nature photography'', ''Attending local tech meetups'']'
  career_goals: Sophy aims to leverage her STEM background to transition into a data-focused or engineering role within the technology sector while maintaining the flexibility to support herself through
    waitressing during the transition. In the short term, she seeks a junior data analyst or research assistant position, ideally at a company that values interdisciplinary collaboration and offers mentorship.
    She plans to augment her skill set with certifications in data science and machine learning, and to contribute to projects that improve operational efficiency, perhaps in hospitality-tech solutions.
    Long term, she aspires to become a project manager or product lead, steering innovative solutions that blend technology with user-centric design, and she is considering pursuing a master’s degree in
    data science or environmental engineering. Her balanced curiosity and practicality help her set realistic milestones, while her sociable, assertive nature positions her to take on leadership responsibilities.
