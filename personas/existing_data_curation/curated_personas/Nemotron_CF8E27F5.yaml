    public speaking'', ''Vintage TV binge-watching'']'
  career_goals: Sunny aims to become a certified journeyman machinist within the next two years by earning NIMS credentials and completing an associate degree in manufacturing technology. She aspires to
    be promoted to shift lead and eventually to a production supervisor role at her plant, where she can use her people-skills to mentor crews and improve workflow efficiency. In the long term, Sunny dreams
    of opening a small custom metal-and-plastic fabrication shop that serves local artisans and hobbyists, allowing her to blend her technical expertise with her love for community interaction.
