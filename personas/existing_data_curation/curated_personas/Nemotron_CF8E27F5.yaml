personas:
  professional: Sunny Love, an aspiring journeyman machinist, blends meticulous CNC and injection‑molding expertise with a talkative, people‑centric style that makes them the go‑to troubleshooter on the
    shop floor, turning routine maintenance into team‑building moments.
  sports: Sunny Love, an avid outdoor enthusiast, spends Saturdays hiking the Ledge Lakes trail, joins the Grand Rapids Bicycling Club for weekday rides, roots for the Detroit Lions and the Grand Rapids
    Griffins, and keeps a casual roster spot on a community fishing league that meets on the Grand River during summer.
  arts: Sunny Love, a regular at downtown music venues, vibes to indie rock acts like The Strokes and local band The Radiants, streams classic television series such as The Twilight Zone for late‑night
    inspiration, and channels that creative energy into crafting custom furniture while listening to jazz pianist Bill Evans.
  travel: Sunny Love favors low‑key road trips, often packing a bike and a portable grill to explore Michigan’s Upper Peninsula and the shoreline of Lake Michigan, but also dreams of a spring backpacking
    adventure through Japan’s maker districts to see cutting‑edge CNC workshops and sushi stalls.
  culinary: Sunny Love, an intermediate home chef, loves firing up the backyard grill for charcoal‑seared burgers topped with smoked cheddar and caramelized onions, whips up a quick chicken alfredo with
    fresh fettuccine, and can’t resist a slice of Detroit‑style pizza topped with pepperoni, mozzarella, and a drizzle of garlic oil.
  core: Sunny Love, the sociable twenty‑year‑old machinist who thrives on routine but occasionally misplaces their toolbox in the chaos of spontaneous game nights.
background:
  cultural: Sunny grew up in a suburban neighborhood of Grandville, Michigan, in a typically Midwestern white family. Her upbringing emphasized hard work, practical problem-solving, and community involvement.
    She attended the local public schools and later took courses at a community college, where she was introduced to industrial technology. The region’s strong manufacturing heritage, combined with a close-knit
    community culture, shaped her values of routine, reliability, and straightforward communication. While she enjoys the familiar rhythms of daily life, she also embraces the social traditions of local
    fairs, high-school sports events, and neighborhood gatherings.
