persona_description: A high-level government official responsible for education reform, specifically focusing on the role of technology in education. They are well-versed in the principles of technology
  in education, including the importance of STEM, data and analytics, and the need for improved access to digital content. They understand the challenges faced by states and local economies in the coming
  years and are aware of the need for technology to drive education reform. They are aware of the importance of the Race to the Top funding and the need for states to make dramatic progress on the four
  reform goals to be eligible for funding. They are also aware of the dropout problem and the need to boost higher education attainment for more students.
