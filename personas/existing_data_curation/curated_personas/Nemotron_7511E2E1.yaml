  career_goals: Approaching retirement, Sergio aims to transform his workshop into a mentorship hub where a few dedicated apprentices can learn the blend of classic Appalachian woodworking and selective
    modern techniques. He hopes to document his family’s German‑Swiss joinery traditions in a modest handbook for local craftsmen. Financially, he wants to secure enough savings to support his wife's leisurely
    pursuits while keeping a part‑time consulting role on historic restoration projects in Lumpkin County. A personal ambition is to design and build a handcrafted cabin for his grandchildren, showcasing
    both mortise‑and‑tenon joints and subtle contemporary touches he has been testing.
