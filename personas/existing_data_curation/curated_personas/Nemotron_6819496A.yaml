  hobbies: '["Block building", "Watercolor painting", "Dancing to music", "Singing children''s songs", "Group playground games", "Library story‑time", "Nature exploration (collecting leaves, stones)", "Imaginative
    dress‑up play"]'
  career_goals: Venida frequently talks about growing up to become someone who helps others. She dreams of being a teacher who reads stories to children, an artist who paints pictures that make people smile,
    and a community helper who visits neighbors and shares kindness. At preschool, she often expresses a desire to "take care of people" and imagines herself wearing a doctor’s coat or a firefighter’s helmet.
    Her ambitions are rooted in her compassionate nature and her love for creative expression.
