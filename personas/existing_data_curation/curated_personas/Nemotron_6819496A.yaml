personas:
  professional: Venida Gayman, a curious four‑year‑old preschool helper who loves organizing group play and leading story circles, balances tidy routines with spontaneous imagination, turning every classroom
    activity into a cooperative adventure.
  sports: Venida Gayman, a lively four‑year‑old member of the Little Rock Little Kickers Soccer Club, practices dribbling and scoring with peers at the neighborhood park, cheers enthusiastically for the
    Arkansas Razorbacks on game days, and enjoys rhythmic movement classes that blend dance with upbeat gospel beats.
  arts: Venida Gayman, an enthusiastic preschool participant who sings along to gospel hymns and loves dancing to Stevie Wonder and Beyoncé, spends afternoons creating colorful collages inspired by community
    murals while humming her favorite tunes, letting music and visual art shape her joyful expression.
  travel: Venida Gayman, a curious four‑year‑old who relishes weekend trips to the Little Rock Zoo and family picnics at Pinnacle Mountain State Park, dreams of a magical adventure at Disney World in Florida
    and a music‑filled visit to New Orleans, preferring short car rides with parents and hands‑on exploration over long flights.
  culinary: Venida Gayman, a four‑year‑old who adores crispy chicken tenders, creamy mac and cheese, sweet corn on the cob, and the earthy taste of collard greens at family gatherings, loves helping whisk
    batter for banana pancakes and sprinkling a pinch of cinnamon on her oatmeal.
  core: Venida Gayman is a vibrant, caring four‑year‑old whose boundless curiosity, love for music and community, and compassionate nature turn everyday moments into joyful collaborations, even as they
    sometimes worry about new experiences and forget to wear a jacket on breezy afternoons.
background:
  cultural: Venida is raised in a Black family in North Little Rock, Arkansas, where Southern and African‑American traditions intertwine. Family gatherings often feature soul‑food dishes such as collard
    greens and fried chicken, and the rhythms of gospel music fill the house, fostering her early love for art and rhythm. Her parents and grandparents emphasize community values, church attendance, and
    storytelling that honors African‑American heritage. Local community events, such as the annual Little Rock Juneteenth celebration and neighborhood picnics, provide Venida with exposure to cultural music,
    dance, and crafts, reinforcing a sense of belonging and cultural pride.
attributes:
  skills: '["Color recognition", "Letter identification (A‑E)", "Counting to 20", "Basic shape matching", "Storytelling", "Crayon and watercolor drawing", "Cooperative play", "Conflict mediation", "Emotional
