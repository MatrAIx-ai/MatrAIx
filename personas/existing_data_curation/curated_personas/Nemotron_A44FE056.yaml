  hobbies: '[''collecting seashells'', ''drawing sea creatures and other pictures'', ''building sandcastles'', ''playing with LEGO bricks'', ''solving simple puzzles'', ''listening to Hawaiian music and
    playing a toy ukulele'', ''swimming and snorkeling'', ''reading picture books about animals and space'']'
  career_goals: Stanley often talks about being a marine artist who draws the colorful fish and coral reefs of Hawaii, and he dreams of one day becoming a marine biologist or a professional illustrator.
    He also imagines leading a snorkeling tour for kids, showing off his knowledge and competitive spirit. At this age, his ambitions are shaped by his love of the ocean, art, and a desire to 'win' in games
    and challenges.
