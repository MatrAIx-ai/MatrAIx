personas:
  professional: Stanley Coelho, a preschool explorer with a flair for storytelling, channels curiosity and organized flexibility into building elaborate block cities and sharing them during circle time,
    while their competitive streak turns every sandbox project into a friendly contest.
  sports: Stanley Coelho, a budding soccer enthusiast who dribbles a mini ball in the backyard during spring and splashes through toddler swim lessons in summer, proudly wears a Chicago Cubs cap and trains
    with the Sunnyvale Tigers Little League team, treating each practice as a chance to outscore peers while balancing competitive drive with occasional cooperative play.
  arts: Stanley Coelho, a tiny yet passionate illustrator, spends afternoons coloring scenes from Pixar’s "Toy Story" and humming along to Raffi’s "Baby Beluga," while weekend visits to the local children’s
    museum fuel a growing love for bright abstract art and the whimsical storytelling of Mo Willems.
  travel: Stanley Coelho, an adventurous five‑year‑old who prefers short car rides packed with snack‑filled backpacks over long flights, loves revisiting the Magic Kingdom in Orlando and the Grand Canyon’s
    rim, and dreams of seeing the Eiffel Tower in Paris someday, always begging for a map to trace the route with crayons.
  culinary: Stanley Coelho, a budding junior chef who proudly assembles peanut‑butter‑and‑jelly sandwiches with extra strawberry jam and scoops cheesy macaroni‑and‑cheese with a plastic fork, delights in
    sprinkling bright green peas on top, and treats family pizza night as a chance to request extra pepperoni while occasionally sneaking a bite of the sauce off the plate.
  core: Stanley Coelho blends fierce curiosity with a competitive spark, turning everyday play into mini‑experiments while insisting on counting every coin and color in the crayon box.
background:
  cultural: Stanley is a white child raised in Kihei, Maui, where the laid‑back island lifestyle and the 'aloha' spirit shape his daily life. While his family’s heritage is European, he is immersed in Hawaii’s
    multicultural environment, learning basic Hawaiian words, joining community beach clean‑ups, and experiencing local traditions such as hula music, ukulele sessions, and respect for the ocean. The diverse
    community and natural surroundings foster his curiosity about marine life and art.
attributes:
  skills: '[''basic counting (to 20)'', ''letter recognition (A‑Z)'', ''drawing and coloring'', ''simple puzzle solving'', ''building with blocks (e.g., LEGO)'', ''basic swimming in shallow water'', ''identifying
