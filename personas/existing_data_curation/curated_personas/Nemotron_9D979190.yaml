personas:
  professional: Wendy Lyons, a budding marketing and visual communications student, leverages her strong organizational skills, Canva and Photoshop know-how, and sociable charm to storyboard compelling
    campaigns for local arts events; they thrive on leading group projects and presenting ideas with confidence.
  sports: Wendy Lyons hits the Swamp Rabbit Trail for weekend bike rides, participates in a local yoga class at the Community Center, and cheers on the Greenville Drive baseball team while they play intramural
    soccer with the Greenville Youth Club during the fall.
  arts: Wendy Lyons immerses herself in the Greenville art scene, sketching in Falls Park, curating Instagram stories of local gallery openings, and drawing inspiration from contemporary artists like Yayoi
    Kusama and the streetworks of Banksy, while they also attend live performances by H.E.R. at the Peace Center.
  travel: Wendy Lyons favors spontaneous weekend road trips to nearby cultural hotspots like Asheville, Charleston, and Savannah, planning itineraries on the fly with a trusty Google Maps list, yet they
    dream of a spring art pilgrimage to Paris’ Musée d’Orsay and a summer hike through Kyoto’s Arashiyama bamboo grove.
  culinary: Wendy Lyons enjoys cooking up Southern comfort dishes such as shrimp and grits and homemade peach cobbler, experiments with Korean bibimbap using gochujang and fresh vegetables, and they also
    appreciate the bright flavor of matcha in their afternoon lattes.
  core: Wendy Lyons blends a curiosity for art with meticulous planning, social energy, and a habit of juggling multiple creative projects while they occasionally let deadlines slip in the midst of midnight
    sketch marathons.
background:
  cultural: Wendy grew up in Taylors, a suburban community in Greenville County, South Carolina, where Southern hospitality and close‑knit neighborhood ties shaped her outlook. Her family placed a strong
    emphasis on community service, church participation, and celebrating local traditions such as summer festivals and Southern cuisine. While rooted in these customs, Wendy’s curiosity has led her to seek
    diverse artistic and cultural experiences, blending her Southern upbringing with a modern, open‑minded perspective.
attributes:
  skills: '[''Organizational planning'', ''Event coordination'', ''Basic graphic design'', ''Social media management'', ''Interpersonal communication'', ''Public speaking'', ''Photography'', ''Creative
