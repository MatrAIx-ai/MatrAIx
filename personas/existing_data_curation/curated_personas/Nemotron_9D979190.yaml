  hobbies: '[''Painting'', ''Digital illustration'', ''Photography'', ''Hiking the Swamp Rabbit Trail'', ''Attending live music events'', ''Board game nights'', ''Dance classes'', ''Volunteering at community
    art programs'', ''Reading contemporary fiction'', ''Creative writing'']'
  career_goals: Wendy plans to enroll in a community college to pursue an associate degree in marketing and visual communications, with the long‑term goal of becoming a marketing coordinator or event planner
    for a creative agency in the Greenville area. She hopes to build a robust portfolio of design work and social media campaigns, secure internships at local businesses, and eventually launch her own boutique
    agency that blends community outreach with the arts. She is also interested in continuing her involvement with arts education, possibly teaching workshops for youth.
