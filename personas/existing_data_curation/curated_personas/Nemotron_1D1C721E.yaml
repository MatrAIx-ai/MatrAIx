  career_goals: Leslie aims to transition into a leadership role within her district, such as curriculum coordinator or assistant principal, where she can shape school-wide instructional practices and provide
    structured support for teachers and students. She is pursuing a master's degree in educational leadership to deepen her expertise in administration and is committed to developing a comprehensive literacy
    intervention program for at-risk students in her community.
