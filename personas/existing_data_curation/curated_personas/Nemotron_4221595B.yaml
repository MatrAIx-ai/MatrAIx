personas:
  professional: Bonnie Hickson, a budding junior naturalist‑illustrator, blends careful bird‑watching sketches and speculative short stories into a growing portfolio, leveraging their curiosity‑practicality
    balance and compassionate volunteer work at the town animal shelter while embracing a relaxed, flexible approach to projects.
  sports: Bonnie Hickson enjoys casual weekend cycling and after‑school cross‑country runs, participates in the Apex Youth Soccer Club, and cheers for the local Apex Tigers high‑school football team while
    preferring low‑impact fitness activities that complement their love of nature walks.
  arts: Bonnie Hickson immerses themselves in the whimsical worlds of J.K. Rowling and Rick Riordan, sketches park scenes inspired by Beatrix Potter’s gentle illustration style, and curates acoustic folk
    playlists featuring Mumford & Sons and The Lumineers, all of which shape their burgeoning identity as a young storyteller and visual artist.
  travel: Bonnie Hickson’s travel dreams revolve around weekend trips to nearby state parks for bird‑watching and a future family adventure to the English countryside to explore Harry Potter filming sites,
    balancing a modest allowance with a love for low‑key exploration over crowded resorts.
  culinary: Bonnie Hickson, a novice cook, favors simple comfort foods like grilled cheese sandwiches made with sharp cheddar and sourdough, hand‑prepares carrot‑and‑herb rabbit treats for Thistle, and
    occasionally whips up a quick honey‑glazed apple crumble using fresh apples, cinnamon, and butter.
  core: Bonnie Hickson is a curious yet laid‑back thirteen‑year‑old who alternates between sketching birds, saving spare change in a dented piggy‑bank, and forgetting homework deadlines while quietly championing
    kindness in every small project.
background:
  cultural: Bonnie grows up in the suburban community of Apex, a small but rapidly growing town in Wake County, North Carolina. Her family reflects a typical middle‑class Southern upbringing, balancing
    traditional values like hospitality and community involvement with an openness to diverse ideas. Local cultural touchstones—summer barbecues with neighbors, high school football games, and community
    festivals such as the Apex Fall Festival—have shaped her sense of belonging. At school, she experiences a blend of progressive curricula that encourage inquiry and a cultural emphasis on respect and
    cooperation. Her household celebrates holidays with a mix of classic Southern food and modern twists, and Sundays often include a family service at a nearby Methodist church, though the family encourages
    independent thinking. This environment has fostered Bonnie’s practical curiosity, her cooperative spirit, and her appreciation for both new ideas and established community customs.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Basic algebra'', ''Scientific inquiry (hands‑on experiments)'', ''DIY crafting (knitting, woodworking)'', ''Small‑scale gardening'', ''Peer
    tutoring'', ''Conflict mediation'', ''Digital research'']'
  hobbies: '[''Reading fantasy and mystery novels'', ''Sketching nature journal'', ''Bird‑watching and feeding'', ''Caring for rescued rabbit'', ''Volunteering at animal shelter'', ''Knitting scarves'',
    ''Building wooden models'', ''Science kit experiments'', ''Cooperative video gaming (Minecraft, Stardew Valley)'', ''Listening to acoustic folk/indie music'', ''Writing short stories'', ''Beginner yoga'']'
  career_goals: Bonnie dreams of a career that lets her combine her love of learning, nature, and helping others. She envisions becoming an elementary‑school science teacher who incorporates outdoor lessons,
    school‑yard gardens, and cooperative projects that foster teamwork among students. To prepare, she plans to stay engaged with her school’s science club, earn leadership roles in community service, and
    eventually pursue a degree in environmental education or elementary education. Long‑term, she hopes to design after‑school programs that pair hands‑on science with service, such as mentoring younger
    students in gardening and wildlife stewardship. She also keeps a secondary interest in veterinary care, hoping she might someday volunteer at an animal clinic, but her primary ambition remains education
    and community‑focused work.
