persona_description: A healthcare professional who monitors and reports on the latest COVID-19 cases and their associated complications, particularly in children. They are aware of the rare but serious
  condition Multisystem Inflammatory Syndrome in Children (MIS-C) and are prepared to act quickly and efficiently in the event of a child presenting with the symptoms. They have a keen interest in research
  and are well-versed in the latest medical literature. They are committed to providing the best care to children with COVID-19 and related complications.
