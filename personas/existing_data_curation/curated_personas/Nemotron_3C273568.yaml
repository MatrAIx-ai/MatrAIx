personas:
  professional: Lizette Ruiz, a seasoned business mentor and event coordinator, leverages their financial budgeting expertise, strategic decision‑making, and natural charisma to organize community festivals
    while navigating their tendency toward occasional disarray and a competitive, skeptical edge that drives them to challenge younger entrepreneurs.
  sports: Lizette Ruiz, an enthusiastic fan of the Los Angeles Dodgers and a member of the Riverside County Senior Walking Club, combines weekly senior‑center dance nights to the beat of banda music with
    daily walks in their garden, balancing low‑impact exercise with spirited support for their hometown baseball team.
  arts: Lizette Ruiz, a lover of classic bandas and ranchera ballads like those of Vicente Fernández, Banda El Recodo, and Juan Gabriel, spends evenings listening to these artists and they also indulge
    in historical novels by authors such as Ken Follett, occasionally attending community theater productions starring local talent.
  travel: Lizette Ruiz, a planner who enjoys both structured itineraries and spontaneous detours, dreams of reuniting with family in the small border town of their upbringing, while also favoring weekend
    road trips to Santa Barbara, wine‑country tours in Napa Valley, and occasional cruises to the Caribbean when finances allow.
  culinary: Lizette Ruiz, an accomplished home chef, perfects tamales, mole, and pozole using fresh chilies, corn masa, epazote, and a secret blend of dried ancho and pasilla chiles, often teaching their
    grandchildren the art of layering flavors while occasionally improvising with pantry staples when ingredients run short.
  core: Lizette Ruiz, a talkative, fiercely organized yet occasionally scatter‑brained senior, blends a love for community celebration, meticulous budgeting, and spicy cooking with a skeptical eye and a
    habit of worrying about every detail, and they often find themselves juggling too many projects at once.
background:
  cultural: Lizette was born to Mexican immigrant parents and grew up in a bilingual household in Southern California. She maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Navidad,
    and quinceañeras with authenticity and reverence. Her Catholic faith influences her community involvement, and she actively participates in her parish’s outreach programs. Fluent in both Spanish and
    English, Lizette navigates the bicultural space, preserving Mexican culinary and folkloric customs while embracing the broader Californian lifestyle. Her identity as a Mexican‑American senior shapes
    her perspective on family, community solidarity, and intergenerational knowledge transfer.
