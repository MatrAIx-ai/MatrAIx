persona_description: An interdisciplinary researcher who is interested in plate tectonics and the evolution of continental margins. This person is likely to have a strong background in geology, paleontology,
  and geophysics, and is knowledgeable about the tectonic plates that make up the Earth's crust. This person is also likely to be skilled in using geophysical data and computer modeling to reconstruct the
  history of continental margins and plate boundaries. This person may have a background in paleomagnetism, which is the study of the magnetic properties of rocks, and is interested in understanding the
  tectonic history of the Earth. This person may also be interested in the role of continental margins in shaping the Earth's climate and the potential for plate tectonic processes to impact future Earth
  systems.
