personas:
  professional: Yvette Eaddy, a 22‑year‑old sustainable agriculture enthusiast, combines hands‑on farm expertise—drip‑irrigation design, livestock care, equipment maintenance, and crop‑yield data logging—with
    an artistic talent for eye‑catching signage, leveraging their curiosity and competitive streak to tell compelling stories at local farmers markets while aspiring to manage a community‑focused urban
    farm and art hub.
  sports: Yvette Eaddy, a 22‑year‑old who mixes casual fitness with fandom, jogs the Congaree River each sunrise, cheers the Columbia Fireflies at baseball games, roots for the Carolina Panthers on Sundays,
    and joins a weekend pick‑up basketball league organized by the local community garden collective.
  arts: Yvette Eaddy, an avid watercolorist capturing Lowcountry landscapes, curates weekly playlists featuring R&B icons like Erykah Badu, modern soul star H.E.R., and jazz virtuoso Kamasi Washington,
    and regularly attends gallery openings at Columbia’s The Rim and Columbia Art Center, drawing inspiration from watercolor master Alvaro Castagnet.
  travel: Yvette Eaddy, a 22‑year‑old who prefers spontaneous road trips over rigid itineraries, spends long weekends exploring Charleston’s historic markets, Savannah’s riverfront, and Asheville’s farm‑to‑table
    scene, and dreams of a study tour of the Netherlands’ cutting‑edge greenhouse districts to learn about regenerative agriculture.
  culinary: Yvette Eaddy, a 22‑year‑old home chef, reimagines classic soul‑food staples—like crisp fried chicken, collard greens, and sweet‑potato biscuits—into garden‑fresh dishes such as heirloom tomato‑infused
    collard sauté, spicy okra gumbo with fresh cornmeal dumplings, and shrimp‑and‑grits finished with home‑grown rosemary and lemon zest, all while documenting recipes on a food‑sustainability blog.
  core: Yvette Eaddy, a 22‑year‑old farm‑hand with a painter’s eye and a competitive, yet disorganized streak, constantly juggles soil‑pH testing, watercolor sessions, and market storytelling, often forgetting
    to water their own balcony herbs amidst a rush of creative problem‑solving.
background:
  cultural: Yvette’s cultural background is rooted in the African‑American community of Columbia, South Carolina. Growing up, she was immersed in family gatherings filled with soul food, gospel music, and
    storytelling traditions that emphasized resilience and communal support. Her grandparents, who tended a modest vegetable plot behind their house, passed down knowledge of season‑based planting and the
    importance of sharing harvests with neighbors. The legacy of Black farmers in the South—marked by both historic contributions and systemic challenges—shapes her awareness of food equity and fuels her
    competitive drive to succeed in agriculture. Yvette’s church youth group often organized community‑garden projects and food‑bank drives, reinforcing a sense of service and collective responsibility.
    She celebrates cultural holidays like Juneteenth and incorporates elements of African diaspora art and music into her personal expression, blending Southern heritage with a modern, forward‑thinking
    outlook.
attributes:
  skills: '[''Crop cultivation and harvesting'', ''Livestock handling (chickens, goats)'', ''Drip‑irrigation system setup and maintenance'', ''Basic soil testing (pH, nutrient levels)'', ''Organic pest
    management'', ''Farm equipment operation (tractor, skid‑steer)'', ''Equipment maintenance and troubleshooting'', ''Creative design for farm signage and planters'', ''Basic data logging of yields and
    sales'', ''Customer engagement at farmer’s markets'']'
  hobbies: '[''Watercolor painting of Southern landscapes'', ''Farm and nature photography'', ''Urban balcony gardening and hydroponics'', ''Listening to R&B, soul, and jazz music'', ''Cooking creative
    soul‑food dishes'', ''Blogging about sustainable farming'', ''Volunteering at community garden'', ''Attending local art gallery openings'', ''Reading books on regenerative agriculture'', ''DIY craft
    projects such as upcycled planters'']'
  career_goals: Yvette dreams of turning her hands‑on experience into a leadership position within a sustainable agriculture organization. In the next five years she hopes to complete a community‑college
    certificate in horticulture or agribusiness, secure an apprenticeship with a regenerative farm, and eventually become a farm manager responsible for overseeing production and staff. Long‑term, she aspires
    to launch her own urban farm on an unused lot in Columbia, creating a space that supplies fresh produce to food‑insecure neighborhoods while also serving as a community art hub where local artists can
    display work and host workshops. She wants to champion food justice for Black farmers, mentor young people of color interested in agriculture, and integrate technology such as mobile apps for crop monitoring
    to improve efficiency.
