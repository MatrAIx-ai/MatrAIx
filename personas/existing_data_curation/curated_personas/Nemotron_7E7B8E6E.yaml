personas:
  professional: Ernest Kelly, a seasoned postal carrier in Greenville, blends meticulous route planning with a calm, cooperative customer service style, using their knack for structure to keep deliveries
    on schedule while flexibly adapting to weather and traffic disruptions.
  sports: Ernest Kelly enjoys early‑morning jogs along Greenville’s Riverwalk Park, is a member of the Greenville Running Club, supports the Greenville Drive minor‑league baseball team and the Carolina
    Panthers, and occasionally joins a local pickup softball league on weekends.
  arts: Ernest Kelly is an avid reader of southern historical fiction and biographies, often discussing works by Barbara Kingsolver and Margaret Mitchell, listens to gospel legends like Mahalia Jackson
    and country icons such as Dolly Parton, and volunteers as a docent at the Pitt County Historical Society, where they help bring regional stories to life.
  travel: Ernest Kelly plans trips with a simple checklist, favoring short road trips to historic towns like Savannah, GA, and Asheville, NC, while dreaming of a cultural tour of Edinburgh, Scotland, and
    a beach getaway in the Florida Keys, balancing family time and a modest travel budget.
  culinary: Ernest Kelly enjoys cooking grilled trout caught on Lake Forest, smoky pulled pork, and classic shrimp and grits, seasoning with fresh herbs, garlic, and smoked paprika, and while their cooking
    skill is moderate, they sometimes resort to fast‑food pizza after a long delivery day.
  core: Ernest Kelly blends a love of structure with a relaxed approach to obligations, juggling postal routes, woodworking, and community service, though they sometimes forget to water the garden while
    perfecting a new carving.
background:
  cultural: Ernest is a second‑generation African‑American from Eastern North Carolina. His family’s roots trace back to the Great Migration, and his grandparents were active in the civil‑rights movement
    that shaped Greenville’s Black community. The Baptist church has been a central pillar in his life, providing spiritual guidance, social support, and a venue for cultural expression through gospel music
    and community service. He cherishes family traditions such as Sunday brunch with collard greens, fried catfish, and sweet potato pie, and he participates in local Juneteenth festivities that celebrate
    Black heritage. Growing up in a close‑knit Black neighborhood, Ernest developed a strong sense of communal responsibility, which informs his cooperative attitude at work and his desire to give back
    through volunteerism. His humanities education deepened his appreciation for African‑American literature and history, and he often integrates that knowledge into conversations with neighbors and customers.
