  hobbies: '[''Gardening'', ''Fishing'', ''Woodworking'', ''Reading historical nonfiction'', ''Community volunteering'', ''Board games'', ''Cooking'']'
  career_goals: Milton aims to turn his practical abilities into a small, locally‑focused handyman business, pursuing a certification in HVAC or carpentry over the next two years. He also plans to expand
    his volunteer coordination role at the church, eventually leading the community outreach program. Maintaining a stable, supportive family environment remains his primary long‑term ambition.
