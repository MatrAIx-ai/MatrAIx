  hobbies: '[''Hosting dinner parties'', ''Attending architectural tours and design lectures'', ''Reading contemporary fiction'', ''Yoga and mindfulness meditation'', ''Running (lakefront trails)'', ''Traveling
    to historic cities for architectural inspiration'', ''Photography (urban and nature)'', ''Participating in local improv theater'', ''Volunteering for community design workshops'', ''Gardening (structured
    flower beds)'']'
  career_goals: Johanna aims to advance to a senior project architect role within the next three years, eventually becoming an associate principal at a leading firm in the Midwest. She aspires to lead high‑profile
    mixed‑use and environmentally‑responsive developments that showcase innovative use of BIM and VR technologies. Long‑term, she envisions launching her own boutique studio focused on sustainable, community‑centric
    design in the Great Lakes region, earning AIA fellowship, and mentoring emerging architects while balancing a fulfilling family life.
