personas:
  professional: Johanna Boyce is a licensed architect who combines meticulous BIM and LEED expertise with a talkative, client‑centric style, using her critical, competitive eye to enforce rigorous design
    standards while her organized, community‑focused mindset drives collaborative project management.
  sports: Johanna Boyce fuels her competitive edge by running with the Detroit Running Club along Lake St. Clair, cheering for the Detroit Lions on Sundays, joining the city's adult recreational soccer
    league each spring, and squeezing in indoor rowing sessions at the community gym to stay fit despite a packed schedule.
  arts: Johanna Boyce channels her expressive side through weekly improv performances at the Ann Arbor Improv Collective, curates photography expeditions inspired by Ansel Adams and modernist architecture,
    and unwinds listening to Gregory Porter's soulful jazz while devouring the latest novel by Chimamanda Adichie.
  travel: Johanna Boyce meticulously plans her trips, favoring weekend architectural tours of historic cities like Chicago and Boston, and long‑haul journeys to Kyoto and Copenhagen to study sustainable
    urban design, all while balancing a modest travel budget and family obligations.
  culinary: Johanna Boyce showcases her culinary flair by mastering seasonal farm‑to‑table dishes such as mushroom risotto with locally foraged chanterelles, roasted pork tenderloin with caramelized apples,
    and rosemary focaccia, while also indulging in craft microbrew tastings and occasional fine‑dining outings at Greedy Greg's in Detroit.
  core: Johanna Boyce blends razor‑sharp architectural precision with a gregarious, talk‑filled social life, constantly juggling sustainable design projects, lake‑front runs, and a lingering anxiety that
    fuels her relentless quest for order.
background:
  cultural: Johanna grew up in the suburban outskirts of Detroit, Michigan, in a middle‑class family of European descent (German and Polish heritage). The Midwestern values of punctuality, practicality,
    and community involvement shaped her worldview. She celebrates traditional American holidays like Thanksgiving and the Fourth of July with extended family, and she maintains a connection to her cultural
    roots through occasional visits to her grandparents’ hometowns in the Upper Peninsula. Her upbringing in a region known for its seasonal extremes informs her appreciation for resilient, climate‑responsive
    design, and she draws inspiration from local modernist icons such as Frank Lloyd Wright.
