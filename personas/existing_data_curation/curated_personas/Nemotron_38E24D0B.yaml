  career_goals: Jeremy dreams of turning his passion for art and technology into a career that allows him to create immersive visual experiences. He aspires to study graphic design, illustration, or game
    art at a specialized high‑school program or future college, ultimately aiming to work as a concept artist or UI/UX designer for video‑game studios or animation companies. Because he is aware of his
    own emotional sensitivity, he also hopes to use his creative skills to develop tools or visual narratives that raise awareness about mental‑health challenges among teenagers.
