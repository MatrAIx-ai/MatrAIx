personas:
  professional: Jeremy Caparelli is an aspiring visual artist and budding game designer whose methodical planning and curious imagination combine in their intricate Minecraft builds and detailed sketchbooks.
  sports: Jeremy Caparelli follows the Dallas Cowboys and Dallas Mavericks, plays occasional Sunday league soccer with the Mineral Wells Juniors Soccer Club, and spends weekends hiking local trails for
    wildlife photography, balancing a love of team sports with solo outdoor activity.
  arts: Jeremy Caparelli immerses themselves in cartoon drawing, landscape painting inspired by Bob Ross, and digital illustration while listening to classic country legends like George Strait and indie
    bands such as Tame Impala, and contributes vibrant murals to the school’s art club.
  travel: Jeremy Caparelli enjoys family road trips to Guadalupe Mountains National Park and weekend camping near Lake Mineral Wells, dreams of visiting Kyoto for its anime culture and Paris for its museums,
    and prefers itineraries that combine organized sightseeing with spontaneous nature hikes.
  culinary: Jeremy Caparelli favors backyard BBQ ribs and homemade chili con carne while also experimenting with veggie tacos and baking soda‑fast cookies, shows intermediate cooking skills by following
    YouTube tutorials, and loves tasting the smoky flavor of mesquite‑grilled corn.
  core: Jeremy Caparelli channels intense curiosity and methodical organization into art and coding, battles bouts of anxiety with journaling, often stays up too late gaming, and never leaves the house
    without a sketchbook and a pair of mismatched socks.
background:
  cultural: Jeremy grew up in Mineral Wells, a small town in Palo Pinto County, Texas, known for its historic spring water resort and proximity to ranching and oil‑field heritage. His family holds deep
    ties to the region’s Anglo‑American traditions; weekends often involve community events such as high‑school football games, county fairs, and country‑music concerts. While he embraces these local customs,
    his innate curiosity pushes him to consume diverse artistic content from around the world through online platforms, exposing him to modern illustration styles, global music, and emerging technologies.
    This blend of rural Texan community values and global artistic influences shapes Jeremy’s worldview, fostering a respect for tradition alongside an eagerness to explore new ideas.
