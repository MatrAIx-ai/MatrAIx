  hobbies: '[''Hiking in Catoctin Mountain Park'', ''Cooking with local ingredients'', ''DIY home‑decor and furniture refurbishing'', ''Reading contemporary fiction'', ''Listening to true‑crime podcasts'',
    ''Community workshops on sustainability and gardening'', ''Playing acoustic guitar'']'
  career_goals: Anna aims to advance to a supervisory role within a housekeeping department, where she can train new staff and implement sustainable cleaning practices. She plans to earn a Certified Professional
    Cleaner credential and eventually enroll in a hospitality‑management program to broaden her qualifications. In the long term, she envisions launching her own boutique cleaning service that emphasizes
    eco‑friendly methods and personalized client care, allowing her to combine her curiosity for new techniques with her practical, community‑focused values.
