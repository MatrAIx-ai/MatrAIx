personas:
  professional: Anna Kubal, a 23‑year‑old professional housekeeper, blends a meticulous eye for eco‑friendly cleaning protocols with a spontaneous knack for adapting to last‑minute client requests, and
    leverages their curiosity to pilot new green‑cleaning technologies while eyeing a supervisory role that will let them train staff on sustainable practices.
  sports: Anna Kubal fuels their love of the outdoors by tackling the Catoctin Mountain trails on weekends, participates in a local hiking club that meets at the start of each month, occasionally practices
    yoga for flexibility, and cheers on the Washington Nationals and Washington Capitals while preferring low‑impact activities over competitive sports.
  arts: Anna Kubal finds creative release strumming an acoustic guitar at impromptu gatherings, dives into contemporary fiction by authors like Sally Rooney and Chimamanda Ngozi Adichie, queues true‑crime
    podcasts such as "Serial," and attends monthly community art showcases featuring local painters like Jenna McAllister, letting these arts shape their eclectic yet grounded identity.
  travel: Anna Kubal plans trips on a whim, often packing a backpack for weekend road trips to Shenandoah National Park or the historic streets of Savannah, while dreaming of a sustainable‑focused getaway
    to Portland, Oregon; their travel style blends spontaneity, low‑budget Airbnb stays, and a penchant for seeking out local farmer’s markets wherever they land.
  culinary: Anna Kubal enjoys cooking seasonal dishes like roasted beet and goat cheese salad, wild mushroom risotto, and sourdough‑crust pizza topped with heirloom tomatoes and fresh basil, sourcing ingredients
    from nearby farms and experimenting with homemade lavender‑infused simple syrups for summer drinks, while keeping their cooking skill at a confident home‑chef level.
  core: Anna Kubal is a curiosity‑driven eco‑cleaner who balances spontaneous DIY projects with practical sustainability goals, yet often forgets to log receipts and can be disorganized when deadlines loom.
background:
  cultural: Anna comes from a white, middle‑class family with German‑Irish roots who have lived in the Hagerstown area for generations. Growing up, she participated in local community events such as the
    Washington County Fair and attended a neighborhood church, which instilled a strong sense of community, work ethic, and hospitality. The region’s blend of rural traditions and modest suburban life shaped
    her practical, self‑reliant outlook, while family gatherings emphasized sharing meals and caring for one another. These cultural influences inform her appreciation for hands‑on work, her commitment
    to reliable service, and her interest in preserving local customs through sustainable practices.
attributes:
  skills: '[''Residential cleaning'', ''Commercial cleaning'', ''Deep-cleaning protocols'', ''Eco-friendly cleaning techniques'', ''Laundry and fabric care'', ''Minor maintenance (light repairs)'', ''Inventory
