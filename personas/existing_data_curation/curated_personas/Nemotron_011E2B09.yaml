personas:
  professional: Juan Alvarez, a retired structural and site‑civil engineer, leverages his decades of bridge‑design experience, AutoCAD and GIS expertise, and methodical, organized approach to provide pro‑bono
    consulting for non‑profit housing projects while mentoring emerging engineers through meticulous project budgeting and clear technical reports.
  sports: Juan Alvarez stays active by hiking with the Madison Senior Outdoor Club in state parks during spring and fall, follows the Green Bay Packers and Milwaukee Brewers avidly, and maintains a weekly
    walking routine with the local senior walking group, using his structured planning to track distance and elevation.
  arts: Juan Alvarez enjoys attending the Madison Symphony Orchestra concert series, listening to classical guitar works by Andrés Segovia, and reading the illustrated folktales of the Brothers Grimm, which
    inspire his woodworking designs and provide a creative escape from engineering calculations.
  travel: Juan Alvarez prefers well‑planned, culturally rich trips, having explored Oaxaca’s historic markets, the ancient ruins of Teotihuacan, and the scenic fjords of Norway, while his future itinerary
    lists a relaxed tour of the Scottish Highlands and a family reunion in New York City.
  culinary: Juan Alvarez showcases his seasoned cooking skills by preparing authentic mole with chilhuacle peppers, masa‑based tamales stuffed with pork, and a side of fresh salsa verde, often using home‑grown
    rosemary and thyme from his garden while sharing the meals at family gatherings.
  core: Juan Alvarez blends a lifelong engineer’s precision with a gardener’s patience, a crossword‑puzzle habit that fuels his lingering forgetfulness, and a warm, community‑focused spirit that keeps his
    days methodically organized yet gently spontaneous.
background:
  cultural: Juan was born in a small town in central Mexico and moved to the United States in his early twenties to pursue engineering work. He retains strong ties to Mexican traditions, celebrating Día
    de los Muertos, Cinco de Mayo, and family patron saint festivals with the local Mexican‑American community in Madison. His bilingual upbringing informs his social interactions and his dedication to
    bridging cultural gaps in the Midwest. Juan values familial responsibility and community harmony, often acting as a cultural liaison between older Mexican immigrants and the broader Madison society,
    while also embracing the Midwestern emphasis on punctuality, civic engagement, and practical problem‑solving.
attributes:
  skills: '[''Structural engineering'', ''Concrete mix design'', ''Project budgeting'', ''AutoCAD drafting'', ''GIS mapping'', ''Construction site inspections'', ''Bilingual communication (English/Spanish)'',
