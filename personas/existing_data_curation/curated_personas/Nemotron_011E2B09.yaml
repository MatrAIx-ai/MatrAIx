  hobbies: '[''Vegetable gardening'', ''Woodworking and model bridge building'', ''Reading engineering history and Mexican folklore'', ''Cooking traditional Mexican cuisine'', ''Hiking in state parks'',
    ''Crossword puzzles'', ''Volunteer Spanish lessons for seniors'']'
  career_goals: Although officially retired, Juan aims to stay professionally active by offering pro‑bono consulting to Madison’s non‑profit housing projects and serving on the city’s infrastructure advisory
    board. He aspires to mentor emerging engineers, especially those from Hispanic backgrounds, through apprenticeship programs at the local community college. Juan also hopes to document his experiences
    in a series of articles for the ASCE newsletter, highlighting the evolution of civil engineering practices over the past half‑century, and to contribute to the preservation of historic bridges in Dane
    County.
