  hobbies: '[''Experimental home cooking'', ''Food photography'', ''Playing guitar in a local band'', ''Recreational soccer league'', ''Visiting farmers markets and food festivals'', ''Homebrewing craft
    beer'', ''Volunteer work at community kitchen'', ''Urban gardening (herbs and microgreens)'', ''Listening to culinary podcasts'', ''Reading food science and history books'']'
  career_goals: Steven aims to step into an executive chef role at a reputable restaurant that emphasizes seasonal, locally sourced cuisine, using his blend of practicality and innovation to drive the kitchen
    forward. Within five years he hopes to open his own gastropub that offers a community‑focused dining experience, featuring interactive chef's‑table events and cooking workshops. He also aspires to mentor
    emerging chefs, author a cookbook that highlights his Midwest‑inspired yet globally‑influenced recipes, and gain recognition in culinary competitions.
