personas:
  professional: Steven Hunt, a 33‑year‑old chef de partie who blends classic Midwestern cooking with modern techniques, leads his kitchen crew with practical efficiency, excels at menu development and cost‑effective
    operations, and constantly experiments with sous‑vide and fermentation to keep dishes innovative while maintaining strict food‑safety standards.
  sports: Steven Hunt, a 33‑year‑old soccer enthusiast, captains the Westside Rovers in the local recreational league, roots for the Chicago Bears on Sundays, squeezes in early‑morning runs and weekend
    gym sessions to counteract long hours on his feet, and treats match‑day calories as a chance to test new pre‑game snack ideas.
  arts: Steven Hunt, a 33‑year‑old guitarist in a weekend folk‑rock band, spends evenings snapping photos of his plated dishes, draws creative inspiration from artists like Bon Iver and photographers such
    as Annie Leibovitz, and reserves Sunday afternoons for indie film marathons featuring directors like Damien Chazelle.
  travel: Steven Hunt, a 33‑year‑old food‑focused traveler, plans trips around farmers’ markets and culinary festivals—having explored the farm‑to‑table scene in Napa Valley, sampled street tacos in Portland,
    and dreaming of wandering Tokyo’s Tsukiji market—while balancing a modest travel budget with occasional weekend road‑trips to nearby vineyards.
  culinary: Steven Hunt, a 33‑year‑old home chef, combines Midwestern comfort foods like corn‑bread‑crusted pork chops with avant‑garde techniques such as sous‑vide salmon and spontaneous hop‑infused beer
    marinades, favoring heirloom tomatoes, locally sourced corn, smoked paprika, and fresh herbs from his rooftop garden to craft seasonal menus that reflect both tradition and experimentation.
  core: Steven Hunt, a 33‑year‑old culinary dynamo, balances meticulous kitchen discipline with spontaneous craft‑brew experiments, leads a bustling kitchen crew with a mix of practicality and curiosity,
    jams with his band on Saturday mornings, and occasionally forgets to log his expenses until the deadline, all while nurturing a community‑focused vision for his future gastropub.
background:
  cultural: Steven was raised in the suburbs of Chicago, Illinois, within a middle‑class, white Midwestern family that valued home‑cooked, hearty meals and community gatherings. His family’s German‑Irish
    ancestry instilled an appreciation for classic comfort foods, while the multicultural culinary landscape of the Chicago metro area exposed him early to Italian, Mexican, and Asian flavors. This blend
    of Midwestern hospitality and diverse ethnic influences shaped his cooking philosophy, encouraging him to honor tradition while exploring new culinary horizons.
attributes:
  skills: '[''Menu development'', ''Modernist cooking techniques (sous‑vide, fermentation, espuma)'', ''Food safety and sanitation compliance'', ''Cost control and budgeting'', ''Team leadership and staff
