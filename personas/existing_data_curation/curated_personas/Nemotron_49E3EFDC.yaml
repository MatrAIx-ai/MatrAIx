  career_goals: Alejandro aspires to become a multidisciplinary creator who blends art, technology, and storytelling. He hopes to study graphic design or industrial design in college, with a long‑term ambition
    to work as an interactive experience designer or concept artist for video games and immersive installations. He also dreams of contributing to community art projects in El Paso that celebrate Mexican
    heritage while incorporating innovative digital media.
