personas:
  professional: An aspiring robotics enthusiast, Alejandro Acevedo blends his love for storytelling with engineering by designing Arduino‑controlled stage props for school theater productions, and they
    channel their imaginative spark and disciplined approach into tangible, interactive creations.
  sports: Alejandro Acevedo is a devoted fan of the Los Angeles Lakers, follows the LA Galaxy, and they play midfield for the middle‑school soccer club, the Oakwood Hawks, while also hitting the community
    pool on Saturdays to keep their body as active as their mind.
  arts: A passionate sketcher and comic creator, Alejandro Acevedo draws inspiration from folklore and science‑fiction, cites artistic influences like Hayao Miyazaki, Alan Moore, and the band Imagine Dragons
    for guitar compositions, and they spend evenings attending after‑school art workshops to hone their craft.
  travel: Budget‑conscious but adventure‑seeking, Alejandro Acevedo delights in weekend trips to the nearby mountain retreat of Pine Ridge, annual family vacations to the seaside town of Port Aurora, and
    they day‑dream about exploring Tokyo’s anime districts and the ancient ruins of Athens.
  culinary: An enthusiastic home cook, Alejandro Acevedo loves whipping up spiced lentil stew, garlic‑butter pasta, and avocado‑lime tacos, often sprinkling fresh cilantro or oregano for extra flavor, and
    they enjoy the soft strum of their acoustic guitar filling the kitchen.
  core: Creative, calm, and consistently curious, Alejandro Acevedo channels their love for storytelling into tech projects, music, and art, and they balance disciplined study habits with playful bursts
    of imagination while hoarding half‑eaten snacks for later.
background:
  cultural: Alejandro grows up in a bilingual Mexican‑American household in El Paso, Texas, where Spanish and English intertwine daily. His family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Christmas posadas, and weekly Sunday meals of tamales and pozole. He is fluent in both languages, which enriches his storytelling and artistic perspective. The multicultural environment
    of the border city provides him with exposure to vibrant street art, mariachi music, and contemporary American pop culture, shaping his eclectic creative identity while grounding him in the values of
    family, community, and perseverance.
