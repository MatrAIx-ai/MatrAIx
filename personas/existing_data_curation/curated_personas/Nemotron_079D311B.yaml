  hobbies: '[''Gardening'', ''Soul‑food cooking'', ''Barbecue grilling'', ''Church gospel choir'', ''Bridge and card games'', ''Volunteer work at food banks'', ''Attending community festivals'', ''Listening
    to R&B and jazz'', ''Watching football'', ''Walking in local parks'']'
  career_goals: Although retired from formal employment, Deshon aims to stay actively engaged in his community. He plans to mentor younger entrepreneurs through local business workshops, contribute as a
    volunteer advisor for a non‑profit micro‑grant program, and occasionally consult on small‑scale budgeting projects for community groups. He also hopes to co‑author a memoir that captures his professional
    journey and the cultural history of his family, while maintaining his health through regular walks and group exercise classes.
