  hobbies: '[''Photography'', ''Art Gallery Volunteering'', ''Community Theater Improvisation'', ''Chess Club'', ''Cycling'', ''5K Running'', ''Trivia League'', ''Vintage Radio Restoration'', ''Cooking'']'
  career_goals: Dr. Park aims to transition from day‑to‑day clinical practice to a hybrid role that blends patient care with research and education. He seeks to secure a grant for a community‑based study
    on the impact of visual arts therapy on chronic pain patients. Over the next five years, he aspires to become a department chair or lead a regional medical network that emphasizes holistic, interdisciplinary
    care. He also hopes to mentor the next generation of physicians, champion evidence‑based practice, and expand telemedicine services for rural populations in Indiana.
