persona_description: A scientist specializing in the study of planetary geology and ice moon studies, particularly focusing on the occurrence and characteristics of giant landslides on icy moons like Iapetus.
  They have expertise in analyzing images from space telescopes and have conducted research on the effects of friction on icy surfaces, particularly in the context of landslides and earthquakes. They are
  interested in understanding the similarities and differences between the geological processes on icy moons and those on Earth.
