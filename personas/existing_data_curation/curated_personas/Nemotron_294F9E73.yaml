  career_goals: Christina aims to pursue a STEM career that leverages her love for structure and problem solving. She envisions attending the University of Michigan to major in civil engineering, focusing
    on sustainable infrastructure and urban planning. Her long‑term ambition is to become a licensed professional engineer and lead projects that improve community transportation networks and green building
    designs. She also harbors a secondary interest in data analytics, hoping to combine engineering expertise with data‑driven decision making. To prepare, she plans to seek internships with engineering
    firms during high school and college, and values mentorship that emphasizes meticulous planning, ethical practice, and continuous learning.
