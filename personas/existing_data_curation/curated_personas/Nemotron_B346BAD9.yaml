  career_goals: Antonio aims to transition into a technical leadership role where he can shape product vision and foster interdisciplinary innovation. Over the next five years, he hopes to become a lead
    engineer or solutions architect, guiding teams to integrate cutting‑edge technologies like AI‑driven design tools and immersive media. He is also passionate about launching a side venture that creates
    interactive digital art installations, leveraging his software expertise and artistic curiosity. Mentoring junior developers, contributing to open‑source projects, and speaking at tech‑art conferences
    are also key ambitions.
