personas:
  professional: Eric Albizu, an emerging mental health counselor who melds cognitive‑behavioral techniques with improvisational theater and interactive Arduino art installations, leverages an analytical
    mind and empathetic communication to design trauma‑informed group workshops, but often embraces a laid‑back scheduling style that results in last‑minute preparation.
  sports: Eric Albizu fuels his love for adventure by hiking the Everglades year‑round, plays pickup basketball with the Miami‑based Urban Hoops Collective, follows the Miami Dolphins and Orlando Magic
    avidly, and schedules a beach volleyball game whenever the Florida sun bursts through the clouds.
  arts: Eric Albizu channels his imagination into abstract canvases inspired by Jackson Pollock and Mark Rothko, crafts digital illustrations echoing Bee Bee Bee’s hyperrealism, performs improv sketches
    with the local Spotlight Players troupe, and finds artistic refuge in the works of Yayoi Kusama, Banksy, and James Turrell.
  travel: Eric Albizu favors spontaneous, low‑budget road trips, has explored the Cuban coast and the haunting wetlands of the Everglades, dreams of trekking Patagonia’s glacial fjords, and keeps a scrapbook
    of postcards from Reykjavik, Kyoto, and New Orleans as inspiration for future wanderlust.
  culinary: Eric Albizu experiments in the kitchen with a medium‑level skill set, blending citrus‑marinated shrimp with plantain‑based arepas, cooking up mango‑lime ceviche topped with a dash of chipotle,
    and perfecting avocado‑chocolate mousse, all while insisting on fresh herbs like cilantro and basil to season his fusion dishes.
  core: Eric Albizu is a curiosity‑driven counselor‑artist who balances evidence‑based therapy with spontaneous art projects, often juggling missed bill payments and unfinished canvases while dreaming up
    bold, tech‑infused healing experiences.
background:
  cultural: Eric was born to Venezuelan parents who emigrated during the early 2000s. He grew up bilingual, immersed in Venezuelan traditions such as music, dance, and cuisine, while adapting to life in
    Florida. The diaspora experience fostered resilience and a strong sense of community, which he brings to his counseling practice by offering culturally sensitive support to Latinx clients. He maintains
    close ties with the Venezuelan community in Broward County, participates in local festivals, and draws creative inspiration from Venezuelan literature, art, and the vibrant multicultural landscape of
    South Florida.
attributes:
  skills: '["Active listening", "Empathy", "Cognitive-behavioral therapy", "Motivational interviewing", "Crisis intervention", "Data-driven assessment", "Research methodology", "Creative/art therapy techniques",
