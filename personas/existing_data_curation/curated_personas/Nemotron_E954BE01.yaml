  hobbies: '["Abstract painting", "Digital illustration", "Acoustic guitar", "Improvisational theater", "Reading speculative fiction", "Philosophy", "Visiting art galleries", "Cooking fusion cuisine", "Hiking",
    "DIY interactive art projects", "Attending Venezuelan cultural festivals"]'
  career_goals: Eric aims to become a licensed professional counselor (LPC) within the next three years and pursue a master's degree in counseling psychology. He aspires to specialize in trauma‑informed
    care and develop community‑based mental health programs that fuse art, technology, and evidence‑based practices. In the longer term, he envisions opening a private practice that champions creative therapeutic
    approaches, authoring a guide on integrating STEM principles into mental health work, and becoming a speaker and trainer for emerging counselors.
