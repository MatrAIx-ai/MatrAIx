persona_description: A scientist and researcher who is knowledgeable in the field of evolutionary biology, particularly in the study of natural selection and its role in evolution. They are skeptical of
  the creationist argument that natural selection is untestable, and believe that the circular definition of natural selection can be tested and proven. They are also interested in the study of engineering
  design and have used it as a metaphor to explain how engineers design products that survive in the marketplace. They are a professor of computer science and seeks out students with high I.Q. scores to
  be research assistants, as they believe that high I.Q. scores are positively correlated with good work performance.
