persona_description: A psychologist who specializes in the study of working memory and its role in cognitive development, particularly in children. He/she has expertise in cognitive psychology, neurosciences,
  and developmental psychology. The persona is likely to have a background in neuroscience and cognitive science, and has published several papers in reputable journals on the topic of working memory. The
  persona is likely to have a strong interest in understanding the mechanisms of active maintenance and executive control in working memory, and has conducted research on the relationship between working
  memory capacity and high-level cognition. The persona is likely to be knowledgeable about the work of other experts in the field, such as David Shallice, and has a keen interest in the latest developments
  in the field. The persona is likely to be a member of professional organizations in cognitive psychology and neurosciences, and has a strong interest in contributing to the field through research and
  teaching.
