  hobbies: '[''Abstract Painting'', ''Sketching'', ''Visiting Art Galleries'', ''Reading Contemporary Philosophy'', ''Cooking Mexican Fusion Cuisine'', ''Hiking Coastal Trails'', ''Pottery'', ''Photography'',
    ''Journaling'', ''Attending Small Live Music Shows'']'
  career_goals: Maria aims to advance to a senior director role in a cultural institution or nonprofit where she can shape interdisciplinary art programs that celebrate Mexican heritage while fostering
    contemporary innovation. She aspires to launch a community‑based arts incubator in San Diego, mentor emerging Latina artists, and eventually author a guide on culturally responsive arts management.
