personas:
  professional: Maria Delrio merges strategic planning and artistic vision to lead interdisciplinary programs in cultural nonprofits, with an organized yet imaginative style that ensures budgets are balanced
    while fostering bold curatorial experiments.
  sports: Maria Delrio finds their most satisfying workout on the coastal trails of Torrey Pines, often joining the San Diego Hiking Collective for weekend treks, while cheering on the Padres during the
    baseball season and occasionally attending local beach volleyball meet‑ups.
  arts: Maria Delrio channels their boundless imagination into abstract paintings and sketches, drawing inspiration from Mark Rothko’s color fields and Yayoi Kusama’s immersive textures, while regularly
    visiting the Museum of Contemporary Art San Diego and hosting intimate live‑music gatherings for fellow creators.
  travel: Maria Delrio prefers meticulously planned weekend escapes to sun‑kissed locales such as Ensenada and the rugged cliffs of Big Sur, balancing tranquil photography sessions with occasional urban
    art tours in Barcelona, all within a modest arts‑grant travel fund.
  culinary: Maria Delrio enjoys crafting spice‑forward fusion dishes like chipotle‑marinated grilled shrimp served with mango‑coriander salsa and a smoky corn‑squash risotto, often sharing these plates
    at small dinner parties, though they sometimes forget to turn off the kitchen timer while immersed in a new canvas.
  core: Maria Delrio is a disciplined visionary who alternates between tight project schedules and spontaneous bursts of color, hoarding sketchbooks while occasionally neglecting their succulents.
background:
  cultural: Maria was raised in a Mexican‑American household in San Diego, where Spanish was spoken alongside English and traditions like Día de los Muertos, quinceañeras, and family cook‑outs were central.
    Her parents immigrated from Jalisco, bringing a strong sense of community, respect for folk art, and culinary heritage that she weaves into her personal and professional life. The border‑region culture
    of Southern California has given Maria a bicultural perspective that informs her inclusive approach to art and leadership.
attributes:
  skills: '[''Project Management'', ''Strategic Planning'', ''Cross-cultural Communication'', ''Creative Writing'', ''Visual Arts Curation'', ''Digital Content Creation'', ''Data-driven Decision Making'',
