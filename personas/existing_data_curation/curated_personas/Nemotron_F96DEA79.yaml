  career_goals: Even at 90, Laila’s ambition is to remain a vibrant part of Beaver’s community. She hopes to continue mentoring younger volunteers at the local senior center, to document and preserve the
    oral histories of longtime residents, and to organize an intergenerational garden project that supplies fresh herbs for the church kitchen and teaches local youth sustainable gardening practices. She
    also wants to finish a handwritten family history book for her grandchildren and to stay independent in her home for as long as possible, while ensuring she has a supportive network for any health needs.
