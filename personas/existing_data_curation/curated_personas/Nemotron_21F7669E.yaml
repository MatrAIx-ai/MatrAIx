  career_goals: George dreams of a future where he can combine his love of space, helping others, and practical problem-solving. He often says he wants to become an astronaut to explore the stars while
    also wanting to be a science teacher or community mentor who can inspire other children and design hands-on projects. He imagines leading school clubs, organizing neighborhood clean-up events, and eventually
    working at a space center where he can blend curiosity with real-world impact.
