personas:
  professional: George Mcmillan, a seven-year-old budding architect-engineer, channels their curiosity and practicality into designing intricate LEGO constructions and Minecraft realms, often leading group
    projects in class and delighting peers with an organized yet flexible building style.
  sports: George Mcmillan, an enthusiastic member of the Southwest Soccer Club, dazzles teammates on the field, cheers for the Minnesota Vikings during football season, spends winter afternoons ice skating
    at the local rink, and regularly goes fishing with their dad at Lake Minnetonka.
  arts: George Mcmillan delights in drawing comic-style cartoons inspired by Spider-Man and Star Wars, sings lead in the school choir performing songs from Disney's Frozen soundtrack, watches animated Pixar
    shorts, and grooves to the upbeat tunes of Kidz Bop during free time.
  travel: George Mcmillan loves spontaneous bike-ride excursions to nearby parks, dreams of visiting Disney World in Florida after finishing their LEGO castle, and frequently tours the Minnesota State Fair,
    savoring rides and multicultural food stalls while their parents keep trips brief due to school schedules.
  culinary: George Mcmillan’s adventurous palate shines at the State Fair where they repeatedly order corn dogs, lemonade, and caramel apple slices, while at home they experiment with frosting cupcakes
    with rainbow sprinkles and adding chocolate chips to their favorite macaroni-and-cheese.
  core: George Mcmillan is a sociable, talkative seven-year-old who never leaves a LEGO piece unconnected, sings loudly in the choir, swaps comic book lore with friends, and can be stubbornly meticulous
    about Minecraft builds, yet occasionally forgets to brush their teeth before bedtime.
background:
  cultural: George is a White American raised in Minneapolis, Minnesota, within a family that cherishes Midwestern values of community, modesty, and outdoor enjoyment. His ancestry includes German and Scandinavian
    roots common to the region, and his family participates in local traditions such as summer lake outings, winter ice-skating, and the annual Minnesota State Fair. He attends a neighborhood Lutheran church
    where community service and fellowship are emphasized. The multicultural vibe of Minneapolis exposes him to diverse cuisines, arts, and public library programs, enriching his curiosity while grounding
    him in the practical, cooperative spirit of his community.
