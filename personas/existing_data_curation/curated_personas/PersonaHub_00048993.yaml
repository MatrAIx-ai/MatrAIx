  governing telemedicine practice in North Carolina. They are committed to maintaining patient confidentiality and ensuring the privacy and security of patient information. They are aware of the importance
  of proper patient identification and verification, and they are committed to ensuring that their patients receive appropriate evaluations and care before prescribing controlled substances for the treatment
  of pain.
