  hobbies: '["Gardening (vegetables and herbs)", "Reading historical nonfiction and mystery novels", "Crossword puzzles and Sudoku", "Knitting and crochet", "Listening to gospel, jazz, and R&B music", "Walking
    along the Sacramento River trail", "Volunteer reading at Antioch library", "Attending church services", "Participating in genealogy workshops", "Hosting intergenerational gardening program"]'
  career_goals: Although retired, Natasha aims to stay purposeful and independent. Her primary ambition is to preserve her family’s legacy by completing a memoir and compiling a detailed genealogy for future
    generations. She seeks to deepen her digital skills to maintain regular video contact with her grandchildren. Natasha plans to expand her volunteer role by establishing a weekly reading circle for seniors
    at the Antioch library and coordinating an intergenerational gardening program that connects youth with elders. She also hopes to stay physically active, keep her home well‑maintained, and continue
    serving as a quiet mentor within her community.
