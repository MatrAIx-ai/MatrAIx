persona_description: A virologist with expertise in the study of smallpox eradication, antiviral drug development, and pathogenesis research. The persona has experience in using modern serologic and genomic
  methods to diagnose variola virus disease, identifying candidate antiviral drugs, and developing nonhuman primate models to replicate human smallpox infection. The persona is also interested in the development
  of an oral prodrug of cidofovir, a nucleoside phosphonate DNA polymerase inhibitor that showed antiviral activity against poxviruses, including variola.
