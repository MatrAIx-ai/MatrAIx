  career_goals: Career-wise, Darnell is driven to move from a clerk position into a supervisory or managerial role within logistics. Over the next three to five years, he plans to complete his associate
    degree in Supply Chain Management and earn professional certifications such as the APICS Certified in Production and Inventory Management (CPIM) and the Certified Supply Chain Professional (CSCP). He
    aims to lead a team of inventory specialists, implement lean processes that reduce error rates and shipping delays, and establish a formal onboarding and wellness program that supports new employees’
    success and mental health. Darnell also hopes to leverage his strong interpersonal skills to become a trusted liaison between warehouse staff, upper management, and external partners, ensuring that
    operational goals align with the needs of his family and community.
