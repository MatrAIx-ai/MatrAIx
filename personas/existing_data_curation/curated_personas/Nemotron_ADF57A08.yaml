personas:
  professional: Yen Ly, a seasoned analytics specialist with an associate degree in applied mathematics, couples expert statistical modeling and data cleaning with the knack for translating numbers into
    clear business stories, and leverages their curiosity for emerging AI tools while staying grounded in proven workflows; their sociable, flexible style turns cross‑functional workshops into lively mentoring
    sessions, even as they occasionally let loose‑ended project plans drift.
  sports: Yen Ly is an avid hiker who spends weekends trekking the Cascades with the Cascades Hiking Club, caps the summer by cheering for the Seattle Seahawks and Seattle Sounders FC, and stays fit through
    a loosely scheduled mix of morning yoga, occasional snowshoeing in the winter, and regular bridge tournaments that keep the mind sharp.
  arts: Yen Ly nurtures a love for photography inspired by Ansel Adams, enjoys the timeless melodies of David Bowie, and unwinds with bridge games while attending local gallery openings that feature works
    by contemporary artists such as Yayoi Kusama.
  travel: Yen Ly prefers flexible road‑trip itineraries that weave together weekend hikes in the Olympic Peninsula, visits to the scenic town of Port Townsend, and occasional overseas culinary pilgrimages
    to Kyoto for ramen workshops and to Chiang Mai to explore night markets, balancing a modest travel budget with a desire to share experiences at family gatherings.
  culinary: Yen Ly’s kitchen is a laboratory where they expertly craft Taiwanese‑style bao, umami‑rich miso ramen, and spicy Korean‑inspired kimchi stew using fresh shiitake mushrooms, ginger, and fermented
    soy beans, showing a high skill level that lets them host family potlucks that double as cultural celebrations.
  core: Yen Ly is an adventurous data storyteller who blends analytical rigor with community‑centric hobbies, swapping spreadsheets for hiking boots, bridge tables, and a simmering pot of fragrant broth
    whenever life calls.
background:
  cultural: Yen's family emigrated from Taiwan in the late 1970s, and she grew up in the Pacific Northwest, absorbing both traditional Taiwanese customs and the diverse cultural fabric of the Seattle metropolitan
    area. She celebrates Lunar New Year and other Taiwanese festivals, maintains fluency in Mandarin and Taiwanese at home, and blends these traditions with her American life through community events and
    local multicultural organizations. This bicultural perspective informs her inclusive approach at work and her dedication to fostering cross‑cultural understanding in the community.
attributes:
  skills: '["statistical analysis", "predictive modeling", "data cleaning and wrangling", "SQL", "Python (NumPy, Pandas, Scikit‑learn)", "R (tidyverse)", "data visualization (Tableau, Power BI)", "experimental
    design", "mathematical modeling", "problem solving", "collaborative teamwork", "public speaking", "workshop facilitation", "project coordination"]'
  hobbies: '["hiking", "cooking East‑Asian cuisine", "community gardening", "STEM outreach volunteering", "bridge", "photography"]'
  career_goals: Yen aims to transition into a senior leadership role where she can guide a small analytics team and champion data‑driven decision making across product development. She is keen to mentor
    emerging talent—especially women and under‑represented groups in STEM—by creating informal learning circles and sponsoring community outreach programs. Continuing education is also a priority; she plans
    to earn a professional data‑science certification and explore advanced AI‑enabled analytics techniques. Ultimately, she hopes to leave a lasting impact by integrating innovative methods with practical
    solutions that drive both business value and societal benefit.
