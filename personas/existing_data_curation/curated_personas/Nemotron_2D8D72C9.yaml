  hobbies: '[''Cooking Traditional Mexican Recipes'', ''Reading Self-Improvement Books'', ''Urban Gardening'', ''Listening to Regional Mexican Music'', ''Participating in Small Community Meetup Groups'',
    ''Volunteering for Local Clean-Up Events'', ''Exploring Local History Museums'']'
  career_goals: Maria aspires to move into a supervisory role within a cleaning or facilities management company, where she can mentor junior staff and implement systematic quality-control processes. In
    the longer term, she hopes to launch her own small cleaning business focused on sustainable practices, providing reliable services to households in Albuquerque while supporting her family back in Mexico.
    Continuing her education with a certification in occupational safety or property management is also part of her plan to broaden her professional scope.
