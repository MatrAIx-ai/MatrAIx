  career_goals: Although retired from full‑time work, Maria aims to stay actively engaged by offering pro‑bono consulting for local non‑profits focused on sustainable urban development and by mentoring
    Latina high‑school and college students in STEM. She also hopes to develop a community workshop series that combines basic engineering concepts with practical DIY projects for senior residents in Queens.
    Long‑term, Maria envisions contributing to policy advocacy groups that promote equitable access to STEM education for immigrant families, leveraging her structured approach to drive measurable outcomes.
