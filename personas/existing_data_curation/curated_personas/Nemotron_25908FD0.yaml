personas:
  professional: Maria Infante, a retired environmental engineer who specialized in data analytics, they apply their structured project‑management expertise to pro‑bono consulting for sustainable urban development
    non‑profits and mentor underrepresented high‑school and college students in STEM through hands‑on workshops and curriculum design.
  sports: Maria Infante, an avid walker who frequents nearby forest preserves, they are a seasonal member of a local senior walking club, attend New York Knicks basketball games and New York Yankees baseball
    outings when possible, and practice gentle yoga twice weekly to maintain flexibility.
  arts: Maria Infante, a dedicated member of a historical‑fiction book club, they regularly attend community cultural festivals featuring folk music and storytelling, enjoy Beethoven symphonies, and reserve
    weekend evenings for Broadway theatre performances.
  travel: Maria Infante, who prefers meticulously planned itineraries yet enjoys occasional spontaneous weekend getaways, they have explored the Andean glacial valleys and the Hudson Valley’s wineries,
    and aspire to trek to Machu Picchu and explore the Galápagos Islands, balancing travel dreams with a modest retirement budget.
  culinary: Maria Infante, a passionate home cook who balances a modest kitchen skill set with a love for heritage dishes such as pastel de choclo, cazuela, and empanadas, they regularly harvest basil,
    tomatoes, and peppers from their balcony garden and experiment with fresh corn and quinoa in their meals.
  core: Maria Infante blends a methodical engineering mindset with a love for gardening, community mentorship, and occasional perfectionist quirks, turning data‑driven solutions into hands‑on projects for
    seniors while still finding time to knit and solve puzzles.
background:
  cultural: Maria was born and raised in a coastal city in Chile, where family gatherings centered around shared meals, music, and storytelling. She immigrated to the United States in her early thirties,
    bringing with her a deep appreciation for Chilean traditions such as celebrating Fiestas Patrias, preparing empanadas, and preserving the Spanish language at home. In Queens, she maintains strong ties
    to the local Chilean diaspora through the Chilean-American Cultural Association, where she helps organize events that celebrate Chilean heritage. Her bicultural experience informs her values of community
    solidarity, resilience, and a pragmatic outlook on life's challenges.
