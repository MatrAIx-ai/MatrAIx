personas:
  professional: Lori Shepherd is a detail-oriented production line specialist who leverages meticulous adherence to safety protocols, forklift certification, and a knack for process documentation to drive
    efficiency, while actively pursuing lean Six Sigma and OSHA certifications to secure a shift-manager role that blends their structured mindset with a collaborative, community-focused leadership style.
  sports: Lori Shepherd energizes their week with line-dancing nights at the community center, weekly volleyball matches with the Grace United Church team, and avidly follows the Chicago Cubs, the Chicago
    Bulls, and the Milwaukee Brewers, cheering them on while also participating in the local fire-department's charity 5K runs.
  arts: Lori Shepherd finds artistic inspiration in the storytelling of Brene Brown's self-help books, the soulful country tunes of Dolly Parton and the classic folk band Alabama, the DIY home-renovation
    series hosted by Martha Stewart, and occasional community theater productions, which together shape their creative outlet for stress relief and personal expression.
  travel: Lori Shepherd favors road trips to scenic national parks like the Great Smoky Mountains and Zion, enjoys weekend getaways to Asheville, North Carolina for its artsy vibe, and dreams of a summer
    vacation on Oregon's Cannon Beach, all planned meticulously around work schedules, family commitments, and a modest travel budget.
  culinary: Lori Shepherd delights in farm-to-table cooking, often preparing grilled chicken fajitas with fresh cilantro and lime, hearty quinoa salads tossed with roasted vegetables and basil from their
    garden, and indulgent BBQ pork ribs glazed with a honey-mustard sauce, while their go-to comfort dish remains homemade chicken noodle soup seasoned with rosemary.
  core: Lori Shepherd is a structured, community-driven achiever who balances meticulous work discipline with a love for dancing, volleyball, and DIY projects, yet constantly wrestles with a tendency toward
    over-worry and self-critical perfectionism.
background:
  cultural: Lori was raised in a close‑knit, rural part of Tennessee, steeped in Southern traditions and a strong sense of community. Her family’s background is rooted in Protestant (Baptist) faith, with
    regular church involvement shaping her values of hospitality, hard work, and mutual support. Growing up in Perry County, she has been influenced by the region’s agricultural heritage, local festivals,
    and the emphasis on family ties and community service.
