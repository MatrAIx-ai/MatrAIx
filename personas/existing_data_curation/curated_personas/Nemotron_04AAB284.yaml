  hobbies: '[''line dancing'', ''volleyball'', ''community volunteering'', ''gardening'', ''DIY home improvement'', ''reading self‑help books'', ''journal writing'', ''cooking for family gatherings'']'
  career_goals: Lori aims to advance to a supervisory role within her plant, eventually becoming a shift manager or production coordinator. She plans to earn additional certifications in lean Six Sigma
    and OSHA safety training to lead process improvement projects. Over the next five years, she hopes to mentor new hires, champion a culture of safety and efficiency, and secure a stable salary that supports
    her family's long‑term financial security. She also envisions possibly opening a small home‑based crafts business, leveraging her organized nature and community connections.
