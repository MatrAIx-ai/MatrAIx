persona_description: A healthcare policy analyst who specializes in modeling and forecasting hospital capacity and bed availability in different regions of the United States, particularly in times of crisis.
  They are familiar with the challenges of managing a surge in hospital demand and are able to provide data-driven recommendations for hospital preparedness and response. They are also aware of the importance
  of personal protective equipment and other essential supplies in the healthcare sector and are concerned about their availability and accessibility. They are likely to be interested in the latest developments
  in hospital capacity planning and are seeking to contribute to the ongoing efforts to ensure adequate hospital capacity and patient care during the COVID-19 pandemic.
