persona_description: A global education expert and policy analyst who is passionate about addressing the skills gap in education and promoting partnerships between educators and employers. This person is
  knowledgeable about the challenges and opportunities in the education sector and is committed to finding solutions that can help prepare students for the workforce. They are also aware of the importance
  of integrating work experience into the curriculum and the role of private capital in providing education around the world. This person is likely to attend conferences and events related to education
  and policy, and to engage in discussions about the importance of education and the need for better collaboration between educators and employers.
