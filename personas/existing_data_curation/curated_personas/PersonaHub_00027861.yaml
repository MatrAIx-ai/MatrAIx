persona_description: A geologist who specializes in the study of the movement and distribution of elements in the earth's crust, particularly in relation to the transfer of uranium and thorium. He or she
  is interested in understanding the mechanisms by which these elements are transferred to the crust and the effects of this transfer on the composition and distribution of rocks in the earth's crust. This
  persona is likely to be involved in research on the geochemical distinction of uranium mineralization processes, the oceanic migration history of uranium and thorium, and the potential for uranium and
  thorium to be concentrated into economic deposits.
