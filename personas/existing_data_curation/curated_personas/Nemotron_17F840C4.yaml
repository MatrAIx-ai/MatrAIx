  career_goals: Olivia envisions a future where she can merge her love for science with her compassion for others. She aspires to pursue a career in pediatric nursing or community health, aiming to support
    children’s well‑being and promote health education. She hopes to volunteer at local hospitals and later lead youth health outreach programs in Middlesex County. Additionally, Olivia is interested in
    environmental science and dreams of contributing to conservation projects that protect the natural spaces she enjoys exploring.
