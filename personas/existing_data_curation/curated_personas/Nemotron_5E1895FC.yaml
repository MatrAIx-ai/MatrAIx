  career_goals: Omar is aiming to acquire a stable, community-focused career that balances predictability with flexibility. He plans to enroll in a local community college to earn an associate degree in
    information technology or a certified trade program such as automotive technology or electrical work. His goal is to secure a full‑time position where he can apply his technical skills, help others—perhaps
    in a tech support role for a regional business or as a maintenance technician for the town’s facilities—and maintain a regular schedule that reduces his stress. Long‑term, he hopes to become a trusted,
    reliable member of the local workforce, eventually taking on a supervisory role that allows him to mentor younger workers while preserving a healthy work‑life balance.
