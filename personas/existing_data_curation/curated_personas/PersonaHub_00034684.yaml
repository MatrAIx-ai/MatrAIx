persona_description: A scientist and researcher who has made significant contributions to the field of neurology, particularly in the development of new treatments for multiple sclerosis. He is a senior
  consultant in neurology at Scripps Clinic and has been a speaker in the Thomas Cole Lecture Series, named after a 1958 graduate and longtime biology professor at the college. Dr. Sipe has helped create
  a groundbreaking treatment for multiple sclerosis using an old drug, Cladribine, which has shown promise in suppressing the formation of new brain lesions and preventing relapses. He is hopeful that the
  drug will be approved by the Food and Drug Administration, but acknowledges the competition in the market.
