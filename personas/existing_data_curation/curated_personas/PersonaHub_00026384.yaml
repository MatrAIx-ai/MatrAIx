persona_description: A veterinarian who specializes in the management and treatment of canine herpesvirus infections in dogs. This veterinarian has extensive experience in diagnosing and treating the disease
  in pups, as well as in managing the health and wellbeing of dogs with this infection. They are skilled in conducting thorough physical examinations, performing complete blood counts and urinalysis, and
  isolating the causative virus through cell cultures or frozen tissue examinations. In addition, they are knowledgeable in providing preventative measures for dogs that are at risk of contracting the disease,
  and have experience administering a serum removed from bitches that have recovered from CHV infection to pups before the illness' onset.
