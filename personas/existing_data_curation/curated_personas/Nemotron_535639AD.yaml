personas:
  professional: An aspiring young illustrator and storyteller, Susan Lord merges her boundless curiosity with a love of nature by creating detailed watercolor animal sketches and imaginative short stories,
    while her relaxed attitude toward obligations lets her work at a fluid pace, often preferring spontaneous inspiration over strict deadlines.
  sports: A nature‑loving participant in after‑school activities, Susan Lord plays on the local youth soccer team the River Valley Cubs, follows the United States Women’s National Soccer Team on TV, and
    spends weekends hiking with the Junior Rangers club, where she combines light cardio with wildlife spotting to stay fit.
  arts: A passionate creator, Susan Lord draws inspiration from the whimsical illustrations of Beatrix Potter, the impressionist landscapes of Claude Monet, and the melodic scores of Studio Ghibli films,
    while she also enjoys listening to Tchaikovsky’s Swan Lake during piano practice and collecting postcards of famous museums.
  travel: An eager explorer, Susan Lord prefers short family road trips to nearby state parks such as Redwood Forest and interactive museums like the Science Museum of Chicago, dreams of snorkeling the
    Great Barrier Reef and wandering the medieval castles of Scotland, and plans each adventure with a hand‑drawn map and a checklist of must‑see wildlife.
  culinary: A budding foodie, Susan Lord loves crafting animal‑shaped cookies with oat flour and honey, sips strawberry‑banana smoothies, delights in simple pasta with marinara sauce and fresh basil, enjoys
    Sunday roasts featuring carrots, potatoes, and rosemary, and often experiments with exotic fruits like kiwi in her kitchen experiments.
  core: A curious, solitary dreamer, Susan Lord channels her anxiety into intricate sketches, forgets to tidy her desk, and can become fiercely assertive when defending the fantastical worlds she builds.
background:
  cultural: Susan is raised in Graniteville, a small town in Aiken County, South Carolina, where Southern hospitality, close‑knit community values, and a strong sense of local history shape daily life.
    Her family participates in church activities and traditional Southern gatherings, sharing meals that feature regional dishes such as fried chicken and sweet tea. The area’s natural landscape—forests,
    creeks, and historic textile mill sites—instills in her an appreciation for the outdoors and local heritage. At the same time, access to the internet and school programs introduces her to broader cultural
    influences, allowing her to blend Southern roots with contemporary art and science interests.
