  career_goals: Looking ahead, Susan dreams of turning her love for art and storytelling into a career as an illustrator or children's book author, where she can bring imaginative worlds to life. She also
    envisions herself as a young scientist or environmental researcher, exploring local ecosystems and sharing her findings through illustrated guides. Inspired by her desire to help others manage worry,
    she occasionally imagines becoming a school counselor or child therapist who uses creative activities to support peers. Ultimately, she aims to combine creativity, curiosity, and compassion in a profession
    that lets her inspire and comfort others.
