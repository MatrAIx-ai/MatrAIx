personas:
  professional: Brandi Lane, a seasoned journeyman electrician at 43, leverages two decades of residential, commercial and light‑industrial wiring expertise, precise blueprint interpretation, and a relentless
    curiosity for sustainable technologies to lead disciplined crews, mentor apprentices with assertive collaboration, and meticulously plan energy‑efficiency retrofits while pursuing master electrician
    status and her own contracting business.
  sports: Brandi Lane stays fit by hiking the Blue Ridge foothills with the Blue Ridge Outdoor Club, joining weekend yoga sessions, cheering on the Carolina Panthers and the NC State Wolfpack basketball
    team, and occasionally playing pick‑up softball at her local community center, balancing high‑energy trail walks with low‑impact stretching.
  arts: Brandi Lane channels her creative side through building custom mid‑century modern furniture, devouring mystery novels by Agatha Christie and Gillian Flynn, attending live shows by The Lumineers
    at the local amphitheater, and enjoying classic cinema reruns of films starring Meryl Streep, which together enrich her identity beyond the electrical trade.
  travel: Brandi Lane prefers meticulously planned road trips, having explored the historic streets of Savannah, the geothermal wonders of Reykjavik, the vineyards of Napa Valley, and the Blue Ridge Parkway,
    while dreaming of a solar‑farm tour in Germany and a hiking expedition in the Andes, always balancing adventure with budget constraints and family commitments.
  culinary: Brandi Lane delights in cooking herb‑crusted roasted chicken seasoned with rosemary and thyme, mastering wood‑fired pizza topped with fresh basil, mozzarella, and locally sourced heirloom tomatoes,
    and delighting in quinoa salads tossed with lemon‑zest, avocado, and toasted pumpkin seeds, reflecting a palate that merges comfort food with health‑forward choices.
  core: Brandi Lane is a disciplined, curiosity‑driven electrician whose passion for sustainable tech, meticulous planning, and hands‑on DIY creativity is tempered by a chronic worry streak and a habit
    of squeezing work into every spare moment.
background:
  cultural: Brandi grew up in a middle‑class white family in Charlotte, North Carolina, where the Southern work ethic and community spirit shaped her practical outlook. The region’s emphasis on self‑reliance
    and hands‑on craftsmanship influenced her decision to enter the electrical trade. While she values the independence associated with American middle‑class culture, she also embraces local traditions
    such as attending community festivals and supporting regional charities. Her cultural background provides a blend of Southern hospitality, a pragmatic approach to problem‑solving, and a strong sense
    of responsibility toward her community.
