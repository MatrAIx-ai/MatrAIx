  hobbies: '[''DIY home improvement'', ''Furniture woodworking'', ''Reading mystery novels'', ''Technical manual study'', ''Yoga'', ''Hiking'', ''Volunteer electrical safety education'', ''Women‑in‑trades
    networking'']'
  career_goals: Brandi aims to achieve master electrician status within the next two years and eventually become a licensed electrical contractor so she can run her own business focused on sustainable energy
    retrofits. She aspires to develop a specialized apprenticeship program for women and underrepresented groups in the trade, leveraging her organizational talent to create a structured curriculum. Additionally,
    she plans to obtain certifications in solar and energy‑storage systems, positioning herself as a regional expert in green‑technology installations. While she is driven by professional achievement, she
    also seeks to improve her work‑life balance by implementing stress‑reduction practices and delegating routine tasks.
