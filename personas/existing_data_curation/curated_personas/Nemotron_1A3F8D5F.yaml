  hobbies: '[''Community health fair volunteering'', ''Group hiking'', ''Pottery class'', ''Improv theater'', ''Cooking and recipe experimentation'', ''Reading contemporary fiction and poetry'', ''Line
    dancing'', ''Attending music festivals'', ''Journaling'']'
  career_goals: Akemi aims to advance from a pharmacy technician to a supervisory or pharmacy manager role within the next five years, pursuing additional certifications such as immunization administration
    and medication therapy management. She is also interested in bridging her humanities training with health care by obtaining a bachelor's degree in health communication or a related field, eventually
    becoming a health education coordinator for her community. Long‑term, she envisions launching a regional health‑and‑wellness outreach program that combines medication safety education with artistic
    workshops, leveraging her curiosity and practical mindset to improve public health outcomes in Henry County and beyond.
