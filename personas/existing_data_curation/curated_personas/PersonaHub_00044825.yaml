persona_description: A person who is interested in managing natural areas such as prairies, oak savannas, wetlands, and oak woodlands through the use of prescribed fire. They are experienced in controlling
  fires and have knowledge of local burning regulations and the importance of monitoring and evaluating the success of the burn. They are also interested in managing for grassland wildlife, exotic trees
  and shrubs, excess plant matter, weeds, and buildings and are willing to work with neighbors and the local fire department. They have a critical eye for identifying potential problems and are willing
  to create firebreaks and evaluate the burn.
