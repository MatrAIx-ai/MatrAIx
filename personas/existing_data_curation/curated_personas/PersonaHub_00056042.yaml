persona_description: A physical therapist who specializes in the assessment and treatment of low back pain. They are skilled in conducting the Back Assessment Tool (BAT-Back) to identify safety behaviors
  and beliefs of patients, as well as their tendency to avoid certain movements. They are experienced in using the BAT-Back to generate hypotheses about the cause of the patient's pain and to develop a
  better understanding of the patient's thoughts and beliefs. They are also skilled in conducting other tests and treatments for low back pain, but the BAT-Back is their primary tool for assessing patient
  pain and behavior. They are aware of the limitations and assumptions of the BAT-Back and are skilled in using it in a clinical setting.
