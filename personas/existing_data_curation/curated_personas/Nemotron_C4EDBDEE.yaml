  career_goals: Leroy aims to secure his Colorado teaching credential within the next year and subsequently pursue a master's degree in Education, focusing on curriculum innovation and interdisciplinary
    instruction. He aspires to design and implement a school-wide Business-and-Arts integration program that equips students with both financial literacy and creative thinking skills. Over the next five
    years, he hopes to lead the business department as a curriculum specialist, mentor new teachers, and launch an after-school entrepreneurship incubator. Long-term, he envisions moving into instructional
    leadership—potentially as an assistant principal or district curriculum coordinator—where he can influence broader educational policy and promote experiential learning models statewide.
