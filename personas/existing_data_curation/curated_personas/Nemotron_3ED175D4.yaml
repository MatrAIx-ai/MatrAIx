personas:
  professional: Afsaneh Hagy is a seasoned humanities teacher who designs interdisciplinary curricula that weave literature, history, and the arts, using differentiated instruction and digital storytelling
    to foster curiosity while maintaining clear classroom structure, and they assertively mentor novice teachers, balancing innovative ideas with practical assessment strategies.
  sports: Afsaneh Hagy enjoys quiet hikes on the Blue Ridge Parkway with the local North Carolina Hiking Association, attends weekly yoga classes, supports the Charlotte Hornets in the NBA and the Carolina
    Panthers in the NFL, and they are a member of a community running club that organizes seasonal 5K races.
  arts: Afsaneh Hagy regularly visits the Mint Museum and the historic Greensboro Art Center, finds inspiration in the poetry of Mary Oliver, the paintings of Andrew Wyeth, and the folk music of Neko Case,
    and they often quote passages from Flannery O'Connor's Southern Gothic novels during reflective evenings.
  travel: Afsaneh Hagy prefers thoughtfully planned trips that blend nature and culture, has explored Asheville’s craft breweries, walked the historic streets of Charleston, admired Prague’s Gothic architecture,
    and they dream of a spring pilgrimage to Kyoto’s zen gardens and tea houses.
  culinary: Afsaneh Hagy delights in farm‑to‑table cooking, frequently prepares roasted root vegetables with rosemary, grilled trout with lemon‑herb sauce, and sourdough bread using a starter cultivated
    from local wild yeast, and they love adding topinambur to hearty soups for extra earthiness.
  core: Afsaneh Hagy blends scholarly rigor with solitary creativity, balancing disciplined planning with spontaneous curiosity, while occasionally forgetting to water succulents and piling coffee mugs
    on the kitchen counter.
background:
  cultural: Afsaneh is a white American who grew up in the suburban South, specifically in the Raleigh‑Durham region of North Carolina. Her upbringing immersed her in Southern cultural traditions—storytelling,
    a reverence for local history, and a strong sense of community hospitality. Her graduate education in arts and humanities broadened her perspective, fostering an appreciation for global literary and
    artistic movements while remaining rooted in the regional heritage. She actively engages with local cultural institutions such as the North Carolina Museum of Art and the historic sites of Johnston
    County, blending her Southern identity with a progressive, inclusive worldview that informs her teaching philosophy and community involvement.
attributes:
  skills: '[''Curriculum Development'', ''Interdisciplinary Humanities Integration'', ''Differentiated Instruction'', ''Classroom Management'', ''Educational Technology Integration'', ''Critical Literary
    Analysis'', ''Assessment Design'', ''Teacher Mentoring'', ''Professional Development Facilitation'', ''Project-Based Learning'', ''Cultural Competency'', ''Community Outreach'']'
  hobbies: '[''Reading Literary Fiction and Poetry'', ''Writing Personal Essays and Short Stories'', ''Gardening (Native Plants and Herbs)'', ''Hiking in State Parks'', ''Yoga and Mindfulness Meditation'',
    ''Visiting Museums, Historic Sites, and Art Galleries'', ''Cooking Seasonal Farm-to-Table Meals'', ''Knitting and Handcrafts'', ''Participating in a Small Book Club'']'
  career_goals: She aspires to become a department chair or instructional coordinator within the Johnston County School District, leveraging that role to spearhead an interdisciplinary humanities program
    across middle and high schools. Afsaneh plans to pursue an Ed.D. in Curriculum and Instruction, focusing on innovative integration of technology and experiential learning. She aims to publish a textbook
    on 20th‑century American literature and develop a regional literacy partnership that connects schools, libraries, and community organizations. Ultimately, she seeks to influence district policy to ensure
    equitable resources for all students and to mentor a new generation of educators.
