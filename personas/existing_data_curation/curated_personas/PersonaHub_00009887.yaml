persona_description: A historian or a scholar who is interested in the mythology and religion of ancient Mesopotamia, specifically the Sumerian, Akkadian, Assyrian, and Babylonian deities, including the
  Anunnaki. They are particularly interested in the mythological and religious narratives surrounding the creation of humanity, the division of the Anunnaki among their respective stations, and the role
  of the Anunnaki in the Epic of Creation. They have a deep understanding of the Sumerian, Akkadian, Assyrian, and Babylonian pantheon and their place in the ancient Mesopotamian worldview. They are also
  knowledgeable about the later developments and interpretations of the Anunnaki in later mythologies and texts.
