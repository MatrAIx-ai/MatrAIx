persona_description: A historian who is interested in the history of Haiti and the slave uprising that occurred in the country in the early 18th century. This persona is likely to have a deep understanding
  of the political, social, and economic factors that contributed to the revolution and the subsequent struggle for freedom. They would be interested in reading about the brutal treatment of the slave population
  by their French masters and the atrocities committed by all sides in the course of the struggle. This persona would also be interested in learning about the life and legacy of Toussaint L'Ouverture, the
  former slave who led the revolution and struggled to end slavery.
