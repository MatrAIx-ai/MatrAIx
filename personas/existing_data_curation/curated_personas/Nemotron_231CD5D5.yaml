  career_goals: Although Erma is approaching retirement, she is focused on leaving a lasting impact on her industry. Her primary goal is to transition into a safety supervisor role, where she can formalize
    the safety culture she has championed for years. She also aims to develop a mentorship program for younger workers, especially women, to encourage greater gender diversity in extraction roles. In the
    longer term, Erma wishes to establish a modest scholarship fund for local high‑school graduates pursuing technical training in energy or maritime fields, ensuring the next generation has opportunities
    she values.
