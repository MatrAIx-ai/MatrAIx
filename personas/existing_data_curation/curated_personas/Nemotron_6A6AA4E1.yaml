personas:
  professional: John Howard, a 29-year-old front-of-house professional, blends solid food-safety knowledge and an uncanny ability to recall menu details with a quietly observant, solitary demeanor, delivering
    seamless dining experiences while flexibly navigating his somewhat disorganized schedule as he works toward a shift-manager role.
  sports: John Howard, a 29-year-old outdoor enthusiast, tackles the Ozark trails year-round with the Ozark Hiking Club, roots for the St. Louis Cardinals and the Kansas City Chiefs from his porch, and
    keeps fit through weekend hikes and solo bike rides, preferring low-key activity over organized team sports.
  arts: John Howard, a 29-year-old hobbyist, dives into historical nonfiction by David McCullough and science podcasts like Radiolab, while finding solace in the mellow folk sounds of Nick Drake and Sufjan
    Stevens and occasionally browsing local art fairs for handmade ceramics.
  travel: John Howard, a 29-year-old modest traveler, favors quiet, nature-focused weekend escapes such as the Great Smoky Mountains and the Ozark National Forest, planning trips with flexible spreadsheets,
    and dreams of a low-key spring visit to Kyoto’s tea fields and the serene lakes of Finland.
  culinary: John Howard, a 29-year-old home brewer and baker, cultivates fresh vegetables in his garden to craft rustic ratatouille, sourdough loaves, and aromatic stout using heirloom hops, relishing the
    experimental process while sometimes neglecting precise measurements in favor of instinctive tweaks.
  core: John Howard, a 29-year-old solitary curiosity-driven planner, balances meticulous brewing and gardening experiments with a laid-back, occasionally disorganized approach to work and life, quietly
    building toward his dream coffee-shop while indulging in quiet hobbies.
background:
  cultural: John grew up in a modest, middle‑class white family in rural Arkansas, where Southern hospitality and community ties were emphasized. His upbringing blended traditional Southern values—politeness,
    respect for elders, and a love of home‑cooked meals—with a pragmatic work ethic. Attending a local community college for an associate’s degree in hospitality exposed him to a broader spectrum of culinary
    traditions, and living in Harrison has reinforced his appreciation for small‑town solidarity while allowing him to maintain his preference for a quiet, low‑key lifestyle.
