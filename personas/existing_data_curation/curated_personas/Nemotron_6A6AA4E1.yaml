  career_goals: John aims to transition from a line waiter to a supervisory role such as shift manager within the next two years, leveraging his hospitality education and on‑the‑job experience. He plans
    to complete a bachelor’s degree in hospitality management online to broaden his qualifications. Ultimately, he envisions opening a small, quiet coffee‑and‑pastry shop on the outskirts of Harrison where
    he can work behind the counter, curate a thoughtful menu, and maintain a calm atmosphere that aligns with his preference for solitude and considerate interaction.
