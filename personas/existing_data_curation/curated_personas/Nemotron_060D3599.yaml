  career_goals: Gaston aims to advance into a senior executive role such as 'Chief Operating Officer' within a health system that serves underserved Black and Afro‑Caribbean communities in South Florida.
    He is driven to embed artistic and therapeutic programs into patient care, expand mental‑health services that address anxiety and depression, and champion culturally competent policies. Additionally,
    he seeks to mentor emerging health administrators, publish on compassionate leadership, and eventually transition into consulting to help organizations build flexible, empathy‑focused operations.
