personas:
  professional: Gaston Foster, a 58‑year‑old health services executive with over three decades of operational leadership, channels curiosity and deep compassion into designing innovative, art‑integrated
    care models while they manage budgets with a flexible, relaxed planning style that tolerates occasional disorganization.
  sports: Gaston Foster enjoys paddle‑boarding on Biscayne Bay, cheers for the Miami Heat, participates in a weekend soccer league with the Coral Gables Community Club, and maintains a casual jogging routine,
    though their flexible schedule sometimes leads them to miss workouts when art events arise.
  arts: Gaston Foster immerses themselves in Miami’s vibrant arts scene, attending jazz concerts by Wynton Marsalis, Latin‑infused performances by Los Hombres del Mar, strolling through Wynwood Walls to
    admire murals by Keith Haring and Fintan Magee, and they volunteer at art‑therapy workshops inspired by Maya Angelou’s poetry.
  travel: Gaston Foster favors culturally immersive, low‑stress travel, having explored Cartagena’s historic plazas, Lisbon’s seafood markets, and Costa Rica’s rainforests, while they dream of a mindfulness
    retreat in the Himalayas and a Caribbean cruise to savor island flavors.
  culinary: Gaston Foster, an enthusiastic home chef, experiments with soulful Caribbean‑infused dishes such as jerk‑spiced salmon with mango salsa, plantain mofongo, and turmeric‑laden sweet‑potato soup,
    while they also relish a perfectly seasoned pork carnitas taco from a beloved local taquería.
  core: Gaston Foster blends a seasoned strategic mind with a free‑spirit’s love of art, often juggling multiple project drafts, forgetting appointments, yet they find calm in spontaneous jazz improvisations
    and evening yoga breaths.
background:
  cultural: Gaston is an African American who grew up in the Southern United States before moving to Miami, where he became part of the city’s diverse Black diaspora that includes Afro‑Caribbean and Afro‑Latin
    influences. His cultural identity is shaped by family traditions of soulful music, storytelling, and communal gatherings, as well as the vibrant multicultural neighborhoods of Miami‑Dade County. He
    maintains strong ties to local Black churches and community organizations, values the rich culinary heritage of Southern and Caribbean cuisine, and often serves as a bridge between the healthcare system
    and Black patients, advocating for culturally sensitive care and health equity.
