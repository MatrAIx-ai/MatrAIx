persona_description: A healthcare professional who is experienced in first aid for elderly people who have had a stroke, particularly in the management of symptoms such as slanted lips. They have a strong
  understanding of the causes and symptoms of stroke and are knowledgeable in the management of patients with this condition. They have experience in direct examination, blood checks, head CT scans, and
  heart records to establish a diagnosis. They are skilled in providing care for patients with symptoms of slanted lips, which may be caused by a stroke, and have knowledge of the causes and management
  of this condition.
