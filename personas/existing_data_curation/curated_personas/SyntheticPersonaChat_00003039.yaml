    User 2: I''m not much of a gamer, but I do enjoy watching my husband play.

    User 1: That''s cool. What kind of games does he like to play?

    User 2: He likes to play a lot of the same games you do, like RPGs and action-adventure games. He also likes to play multiplayer games with his friends.

    User 1: That''s cool. I''m glad he''s found a hobby he enjoys.

    User 2: Me too. It''s a great way for him to relax and have fun.

    User 1: I agree. And it''s also a great way to connect with friends.

    User 2: Exactly.'
