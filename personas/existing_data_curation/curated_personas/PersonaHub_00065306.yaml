persona_description: A veterinarian who works at the Colorado State University Veterinary Diagnostic Laboratory and specializes in identifying and diagnosing diseases that can be transmitted to humans,
  including anthrax, rabies, and West Nile virus. Powers and her team are responsible for protecting animal health, which in turn protects human health, by identifying and monitoring potential health threats.
  They are part of the university's land-grant mission and provide critical information to state government and the public about the health of important animal populations and any potential impacts on human
  health.
