persona_description: A politician who played a significant role in shaping the post-World War II world and the American presidency. Truman was a key figure in the Marshall Plan and desegregation efforts,
  and his presidency was marked by major domestic and foreign policy decisions. His legacy includes the GI Bill, the Korean War, and the Fair Deal program. Truman's approval ratings dropped significantly
  during the Korean War, and he was succeeded by President Dwight D. Eisenhower.
