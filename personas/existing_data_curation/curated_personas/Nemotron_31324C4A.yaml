  hobbies: '[''Art museum visits'', ''Theater attendance'', ''Watercolor painting'', ''Gardening'', ''Reading historical fiction'', ''Reading scientific literature'', ''Digital photography'', ''Cooking
    (Southern‑Italian fusion)'', ''Book club participation'', ''Technology workshops for seniors'']'
  career_goals: Beverly aims to leave a lasting legacy by establishing a scholarship fund for local students pursuing STEM fields, authoring a memoir that weaves together her life story with reflections
    on art and science, and continuing to learn emerging technologies such as digital media and AI tools. She also aspires to expand her leadership role within regional arts councils, fostering intergenerational
    collaboration and promoting innovative, inclusive cultural programming in her community.
