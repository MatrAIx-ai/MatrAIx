personas:
  professional: Susan Cox, a seasoned inventory manager with decades of hands‑on retail and warehouse experience, leverages their razor‑sharp organizational discipline, expert barcode‑scanning proficiency,
    and Excel reporting skill to design streamlined stock‑rotation systems and mentor younger staff, while they balance curiosity about new supply‑chain tools with a pragmatic, methodical problem‑solving
    style.
  sports: Susan Cox enjoys attending Alabama Crimson Tide football games on television and cheering for the Dothan Dodgers local baseball team, participates in a senior walking club that meets three times
    a week at the community park, and joins the church’s low‑impact yoga class to maintain mobility, though they admit they often skip the yoga when a quilting deadline looms.
  arts: Susan Cox, an avid quilter and hobby photographer, draws inspiration from the detailed narratives of historical‑fiction author Philippa Gregory and the soulful melodies of Dolly Parton, spends Saturday
    mornings solving crossword puzzles in the church hall, and curates a modest online gallery of iPad snapshots of their garden roses, while they occasionally over‑invest in expensive quilting fabrics
    that crowd their studio.
  travel: Susan Cox prefers low‑stress, short‑duration trips, such as a weekend drive to Savannah to explore historic squares, an annual pilgrimage to the Dothan Peanut Festival, and a yearly family reunion
    in the Blue Ridge Mountains of North Carolina, planning each itinerary with a printed checklist and budgeting carefully to avoid overspending on airfare, yet they sometimes daydream about a solo cruise
    along the Gulf Coast.
  culinary: Susan Cox cooks classic Southern dishes like fried catfish with hush‑puppy batter, shrimp and grits seasoned with smoked paprika, and peach cobbler topped with buttery crumble, sourcing fresh
    tomatoes and beans from their garden and using locally sourced sweet tea as both a beverage and a cooking glaze, but they sometimes over‑salt the catfish while multitasking between quilting and bridge.
  core: Susan Cox, the meticulous 74‑year‑old inventory guru who melds quilting precision with garden bounty, balances a love of Southern comfort food and church service with a wary eye on health worries
    and a habit of over‑committing to community projects, and they often find themselves juggling one more responsibility than they originally planned.
background:
  cultural: Susan grew up in a small, rural community in southeastern Alabama during the post-war era, raised in a Baptist family that emphasized southern hospitality, hard work, and church involvement.
    Her upbringing reflected the traditional values of the American South—respect for elders, modesty, and a strong sense of community. She has lived her whole adult life in Dothan, often referred to as
    the "Peanut Capital of the World," and participates in regional events like the Peanut Festival and county fairs. The cultural fabric of her life includes family reunions, home-cooked meals featuring
    cornbread and fried fish, and a deep connection to the land through gardening. While she holds onto these traditions, she also welcomes new ideas, such as adopting modern inventory technology at work
    and exploring digital photography, showing a blend of curiosity and practicality typical of her generation.
