  hobbies: '["quilting", "garden tending", "historical fiction reading", "genealogy research", "bridge", "crossword puzzles", "digital photography", "church volunteering", "attending local festivals", "cooking
    Southern dishes", "journaling"]'
  career_goals: 'Although she is approaching retirement age, Susan remains driven to leave a lasting impact at her store. Her primary goal is to formalize a streamlined inventory system that reduces errors
    and improves turnover rates, then train a small group of younger staff to sustain those standards after she steps back. She hopes to earn a certification in logistics or supply-chain basics to bolster
    her credibility and possibly serve as a part-time consultant for the regional distribution center. Volunteering is also a core ambition: she plans to apply her organizational skills to the church’s
    food-pantry and the local senior center, creating efficient donation-tracking processes. Additionally, she hopes to lead a brief workshop on stress-reduction techniques for her coworkers, sharing simple
    coping methods she has found effective. Ultimately, Susan wants to be recognized as a dependable mentor who balances practical efficiency with a curiosity for modern tools, ensuring her legacy of high
    standards persists in her community.'
