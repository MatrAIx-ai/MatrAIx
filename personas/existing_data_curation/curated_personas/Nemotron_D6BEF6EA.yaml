personas:
  professional: Mark Sellers is a retired handyman turned community workshop facilitator; they leverage their seasoned woodworking, home‑maintenance, and small‑engine repair skills to run calm, cooperative
    DIY classes at the local center, blending a preference for structured lesson plans with occasional spontaneous project improvisations.
  sports: Mark Sellers is a dedicated member of a local seniors’ fishing club on Lake Erie, regularly joins community walking groups, and passionately follows the Buffalo Bills and Buffalo Sabres; they
    blend structured weekly outings with occasional spontaneous weekend hikes that keep them active and engaged.
  arts: Mark Sellers cultivates his artistic side through woodworking carvings, enjoys listening to Mulatu Astatke’s East African jazz alongside classic rock legends such as Led Zeppelin, participates in
    his church choir, and spends evenings immersed in historical biographies; they reflect a calm, cooperative spirit that balances structured study with spontaneous creative bursts.
  travel: Mark Sellers plans a culturally rich trip to Ethiopia to explore ancestral roots, while his travel history includes a music‑filled weekend in New Orleans and a scenic drive through the Great Smoky
    Mountains; they favor organized itineraries but allow spontaneous detours when local festivals spark curiosity.
  culinary: Mark Sellers delights in preparing injera made from teff flour and a spicy doro wat simmered with berbere spice, often pairing these dishes with freshly harvested tomatoes, heirloom greens,
    and a side of roasted sweet potatoes; they showcase a love of both traditional culinary rituals and garden‑to‑table freshness.
  core: Mark Sellers is a calm, cooperative retiree who blends structured community workshops with spontaneous woodworking creations, they balance disciplined health habits with occasional lapses, and they
    cherish cultural rituals, gardening, and family.
background:
  cultural: Mark is of Ethiopian descent; his parents immigrated to the United States in the 1960s. Raised in a Black community in New York, he grew up balancing Ethiopian customs—such as the coffee ceremony,
    Amharic language, and traditional music—with broader African‑American cultural experiences. Living in Batavia, NY, he celebrates Ethiopian holidays, prepares dishes like injera and doro wat for family
    gatherings, shares his heritage through community events at his local Black church, and stays connected with the Ethiopian diaspora through occasional visits and cultural groups.
attributes:
  skills: '["Mechanical troubleshooting", "Small engine repair", "Carpentry and woodworking", "Garden planning and horticulture", "Budgeting and personal finance", "Basic computer literacy (email, spreadsheets)",
