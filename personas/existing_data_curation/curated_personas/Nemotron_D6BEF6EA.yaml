  hobbies: '["Gardening (vegetables and heirloom varieties)", "Woodworking (furniture and decorative pieces)", "Fishing (Lake Erie)", "Church fellowship and volunteer service", "Reading historical biographies",
    "Listening to Ethiopian jazz and classic rock", "Solving puzzles (Sudoku, crosswords)", "Genealogy research", "Community gardening club participation"]'
  career_goals: Although retired, Mark aims to stay actively engaged by offering regular DIY workshops at the local community center, expanding a modest woodworking side business for farmers‑market sales,
    supporting his grandchildren’s education through tutoring, and planning a trip to Ethiopia to deepen his cultural roots. He also hopes to maintain his health through gardening, fishing, and regular
    exercise, while continuing to contribute to his church’s outreach programs.
