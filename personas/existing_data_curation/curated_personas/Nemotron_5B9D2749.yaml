  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading speculative fiction and poetry'', ''Native plant gardening'', ''Birdwatching'', ''Piano playing'', ''Book club participation'',
    ''Amateur astronomy'']'
  career_goals: Although retired, Paula seeks to remain intellectually engaged and socially harmonious. She aims to mentor high‑school students in STEM through a local after‑school program, curate a community
    art exhibit that intertwines scientific concepts with abstract art, and author a memoir reflecting her lifelong curiosity. She also aspires to volunteer with mental‑health outreach groups, offering
    supportive listening to peers experiencing anxiety or sadness, and to secure a modest grant to document native wildlife in Johnson County, merging her scientific interest with her love for nature.
