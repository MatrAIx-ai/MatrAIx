persona_description: A medical researcher and scientist who specializes in the field of cancer immunotherapy, particularly in the development and application of new chemotherapy drugs to enhance the body's
  immune response against cancer. Dhodapkar's research focuses on the use of bortezomib, a drug that selectively kills multiple myeloma cells in tissue culture, and the potential of this drug to enhance
  patients' immunity to tumors. He plans to test the drug in patients to determine its efficacy and to directly target tumors in patients to take advantage of bortezomib's distinct properties.
