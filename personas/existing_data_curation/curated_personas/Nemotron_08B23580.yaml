personas:
  professional: Lisa Moore, a 59‑year‑old veteran educator, blends deep pedagogical expertise with a pragmatic, curiosity‑driven outlook, designing differentiated curricula, mentoring teachers, and weaving
    educational technology into lessons, all while embracing a relaxed, occasionally disorganized schedule that reflects their easy‑going, cooperative nature.
  sports: Lisa Moore, a dedicated yoga practitioner, spends mornings walking the nearby nature preserve, cheers for the Orlando Magic basketball team and the Tampa Bay Buccaneers football team, and participates
    in a senior walking club that meets every Saturday at the local park, blending low‑impact fitness with community spirit.
  arts: Lisa Moore, an avid lover of literature and crafts, reads historical fiction by Hilary Mantel and Philippa Gregory, knits to the folk melodies of Joan Baez, and regularly attends the Orlando Museum
    of Art's rotating exhibitions featuring works by Georgia O'Keeffe and contemporary Latin American painters.
  travel: Lisa Moore, a meticulous planner who favors intimate, culturally rich trips, has explored the historic streets of Savannah, the botanical gardens of England’s Cotswolds, and frequently returns
    to nearby Curaçao for its vibrant markets and cuisine, always arranging low‑key itineraries that fit their flexible, relaxed schedule.
  culinary: Lisa Moore, an adventurous home cook, delights in preparing paella with locally sourced shrimp, Thai green curry flavored with fresh lemongrass, and classic Floridian stone crab bisque, while
    pairing their knitting sessions with a cup of Ethiopian coffee and occasional experiments with homemade sourdough.
  core: Lisa Moore, a curious yet easy‑going educator, balances disciplined learning with a relaxed, sometimes disorganized lifestyle, finding solace in gardens, books, and gentle yoga.
background:
  cultural: Lisa grew up in a middle‑class, white family in the Midwest, where community gatherings centered around churches, local fairs and family picnics. Her parents emphasized education, self‑reliance
    and courteous interaction. After earning her graduate degree in education, she relocated to Orlando, Florida, where she has lived for the past three decades. In Orange County she has become comfortable
    navigating a culturally diverse environment, interacting daily with students from Hispanic, African‑American, Caribbean and Asian backgrounds. She respects the region’s blend of Southern hospitality,
    Latin influences, and the vibrant tourism‑driven community, while maintaining her own family traditions—holiday brunches, an annual summer garden party, and a love for classic American literature. This
    cross‑regional experience informs her inclusive teaching approach and community involvement.
