  career_goals: In the next five years, Lisa aims to transition from daily classroom teaching to a mentorship and curriculum specialist role within her district. She plans to lead a professional‑development
    series on integrating project‑based learning with technology, mentor early‑career teachers through a peer‑coaching program, and complete a certificate in trauma‑informed education to better support
    diverse learners. Simultaneously, she hopes to author a concise guide for teachers on balancing curiosity‑driven innovation with practical classroom constraints. Ultimately, she envisions a gradual
    shift toward part‑time consulting for local schools, allowing her to stay engaged in education while enjoying more flexible time for her personal interests.
