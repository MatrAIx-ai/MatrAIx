personas:
  professional: Tam Tailor, a 53‑year‑old veteran technology leader, blends thirty years of strategic IT planning, data analytics, and PMP‑certified project management with a routine‑oriented yet adaptable
    approach, making them a persuasive presenter at tech meetups and a reliable bridge between technical teams and executive stakeholders.
  sports: Tam Tailor enjoys weekly walks along Reston’s scenic trails, practices yoga at a local studio each morning, follows the Washington Capitals and Washington Nationals with enthusiasm, and treats
    bridge at the senior center as both a social and mental‑fitness activity.
  arts: Tam Tailor frequently attends the cultural association’s Diwali music recitals featuring sitar maestro Ravi Shankar, enjoys classic Shakespeare productions at the Reston Community Theater, and watches
    Bollywood films starring Shah Rukh Khan, which together enrich their creative outlook.
  travel: Tam Tailor prefers meticulously planned trips that blend cultural immersion with comfort, having explored New York City’s museums, Washington, D.C.’s historic sites, and Dubai’s Diwali celebrations,
    while dreaming of a future pilgrimage to Kyoto’s temples and Marrakech’s souks.
  culinary: Tam Tailor delights in preparing festive dishes such as fragrant chicken biryani, golden samosas filled with spiced potatoes, and sweet kheer made with basmati rice, cardamom, and saffron, often
    enhancing the recipes with fresh herbs and vegetables from their backyard garden.
  core: Tam Tailor approaches life as a disciplined strategist who balances routine with occasional spontaneity, enjoys lively social gatherings, occasionally over‑commits to volunteer events, and can’t
    resist a nightly bridge game that sometimes runs late into the night.
background:
  cultural: Tam was born to immigrant parents from the northern Indian state of Punjab who settled in the Washington, D.C. metropolitan area in the early 1970s. Raised in a household that valued education,
    hard work, and community service, she grew up bilingual, speaking Punjabi at home while attending American schools. Family traditions such as celebrating Diwali, Holi, and Sikh festivals, sharing homemade
    sweets, and listening to classical music remain central to her identity. Though she never married, she maintains close ties with her extended family, often traveling to India to visit relatives. In
    Reston, she balances assimilation into suburban American life with active participation in the South Asian diaspora, contributing to multicultural events and mentoring younger immigrants seeking careers
    in technology.
attributes:
