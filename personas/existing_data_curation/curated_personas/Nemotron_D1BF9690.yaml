  hobbies: '["Cooking South Asian cuisine", "Gardening", "Yoga", "Walking on Reston trails", "Volunteering for cultural events", "Attending tech meetups", "Playing bridge", "Reading historical fiction"]'
  career_goals: Tam aspires to become a senior executive—such as Director of IT Strategy or Vice President of Digital Transformation—within a mid‑size technology firm or a government contractor in the Fairfax
    County area. She aims to spearhead organization‑wide digital initiatives that streamline operations while maintaining reliable, repeatable processes. Mentoring the next generation of women and minorities
    in tech is a personal priority, and she hopes to champion inclusive policies and mentorship programs. Over the next five years she plans to obtain a Certified Scrum Master credential and to lead at
    least two large‑scale cloud migration projects that demonstrate measurable cost savings and efficiency gains.
