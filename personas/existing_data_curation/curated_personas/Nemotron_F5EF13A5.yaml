personas:
  professional: Maria Rouco, a retired family caretaker who now volunteers as a community garden mentor, uses her practical gardening knowledge and meticulous budgeting skills to teach sustainable low‑water
    planting while quietly balancing curiosity with dependable organization.
  sports: Maria Rouco, a leisurely fitness enthusiast, follows the Los Angeles Dodgers in baseball, participates in the local senior walkers’ club that meets at the Whispering Pines Trail each Saturday,
    and practices gentle yoga at the community center to keep flexible for gardening.
  arts: Maria Rouco, an avid lover of the arts, devotes evenings to reading historical fiction by Hilary Mantel and Ken Follett, enjoys the acoustic folk recordings of Joan Baez, and collects hand‑painted
    tiles from local artisan fairs, which she occasionally displays at the senior center.
  travel: Maria Rouco, a thoughtful explorer, plans trips around garden festivals and has visited Joshua Tree National Park, the Napa Valley vineyards, and the historic adobe town of Taos, while dreaming
    of a future pilgrimage to the sun‑baked terraces of Andalusia to study ancient irrigation techniques.
  culinary: Maria Rouco, a seasoned home cook, refines family recipes by incorporating fresh zucchini, heirloom corn, roasted chiles, and aromatic lavender into a signature herb‑infused broth, occasionally
    experiments with quinoa salads and whole‑grain tortillas, and delights in baking rosemary‑scented focaccia for neighbors.
  core: Maria Rouco, a 74‑year‑old garden‑minded archivist, blends solitary curiosity with meticulous organization, fearing financial shortfalls yet finding solace in knitting and preserving family recipes.
background:
  cultural: Maria was born to Mexican immigrant parents who settled in California in the early 1950s. Raised in a bilingual household, she grew up hearing stories of her family's origins in Jalisco and
    participating in celebrations such as Día de los Muertos and Las Posadas, which reinforced her deep respect for family and tradition. Catholic customs and community gatherings shaped her values of respect,
    hospitality, and collective responsibility. While she adopted many aspects of American life, Maria retained core Mexican culinary practices, language idioms, and a strong sense of cultural pride. She
    often shares these traditions with her grandchildren, teaching them to prepare tamales and recite traditional prayers, thereby ensuring that her heritage remains a living part of her family's identity.
attributes:
  skills: '[''Traditional Mexican cooking'', ''Desert-friendly gardening'', ''Hand knitting and crochet'', ''Basic sewing and mending'', ''Bilingual Spanish‑English communication'', ''Basic smartphone and
