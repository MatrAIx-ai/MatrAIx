persona_description: A neurologist who specializes in the treatment and management of brain injuries and spinal cord injuries, particularly in children. Her research focuses on the effectiveness of hippotherapy
  in improving functional outcomes and reducing spasticity in patients with brain injuries and spinal cord injuries. She is also interested in the psychological and emotional benefits of hippotherapy for
  children with cerebral palsy and the impact of hippotherapy on their cognitive abilities and respiratory base for speech. She is passionate about the scientific proof of the effectiveness of hippotherapy
  and the potential for it to be widely used in clinical settings.
