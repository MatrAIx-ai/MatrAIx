persona_description: A historian who is deeply interested in the history of Native Hawaiian beliefs and their evolution from the time of the priests ending traditional temple worship in 1819 to the present
  day controversies over sacred sites and objects. With a background in cultural affairs and preservation, Malcolm Nāea Chun has extensive knowledge of the conflicts and struggles that involve and invoke
  Hawaiian beliefs. He has written and published several articles on the historical dialogue between traditional religion and Christianity, using primary Native Hawaiian sources to compare pre-contact practices
  with contemporary beliefs and practices, looking for what has been retained, what has changed, and which current practices should be considered questionable as Native Hawaiian.
