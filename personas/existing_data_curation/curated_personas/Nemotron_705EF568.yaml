  hobbies: '[''Attending art galleries and street murals'', ''Salsa dancing'', ''Photography'', ''Cooking Mexican cuisine'', ''Collecting vintage hair styling tools'', ''Exploring desert landscapes'', ''Reading
    fashion and design magazines'', ''Participating in community cultural festivals'']'
  career_goals: Frank aims to open a boutique salon that blends contemporary hairstyling with Mexican cultural aesthetics, offering an immersive experience for clients. He aspires to become a recognized
    stylist in the Phoenix metropolitan area, featuring his work in local fashion shows and art events. He plans to develop a line of natural hair care products inspired by traditional Mexican ingredients
    and to host workshops that teach innovative coloring techniques. Mentoring younger stylists and creating a supportive community within his salon are also central to his vision. Balancing his competitive
    drive with stress management, he seeks to build a sustainable business that allows flexibility while maintaining artistic freedom.
