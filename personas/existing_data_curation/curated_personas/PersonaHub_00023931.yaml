persona_description: A geologist who specializes in water and soil geochemistry, particularly in the analysis and interpretation of trace metal concentrations in drinking water and soil. She has experience
  using ArcGIS and well depth information to identify the surface geology, physiographic province, soil type, distance to the nearest surface water body, and aquifer for each site. She is responsible for
  maintaining the database for water and soil geochemical data, paired with the site’s geographic location. She has experience with logistic regression modeling and is interested in determining if any relationships
  exist between geologic, pedologic, or hydrologic settings and trace metal concentrations in the groundwater. She is particularly motivated and has strong support from an academic advisor interested in
  logistic regression modeling.
