persona_description: A municipal water and wastewater manager who is interested in promoting public-private partnerships and innovative financing for water infrastructure. They recognize the challenges
  of maintaining and upgrading municipal water and wastewater facilities and are aware of the importance of full-cost pricing for ensuring financial sustainability. They also appreciate the potential for
  attracting private sector partners through alternative financing models and are eager to learn more about educational outreach programs and workshops. They are committed to promoting water conservation
  and building a water conservation industry, and are aware of the importance of full-cost pricing as a means to achieve this.
