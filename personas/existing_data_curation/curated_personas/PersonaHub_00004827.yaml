persona_description: A healthcare practitioner who values the importance of natural and social environment in promoting and maintaining health, and advocates for the principle of harmony in treating diseases.
  This individual believes in treating individuals based on their unique constitution, lifestyle, and environmental factors, and emphasizes preventative treatment to guard against illness. They are skilled
  in various non-pharmacological treatments such as acupuncture, tuina, and cupping, and are knowledgeable about the principles of TCM, including the importance of maintaining the dynamic balance of body
  functions and the golden mean.
