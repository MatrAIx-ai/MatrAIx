  hobbies: '["Model kit building (RC cars, aircraft)", "Strategy video gaming (e.g., Civilization, SimCity)", "Bike riding/hiking", "Listening to classic rock and alternative music", "Sketching/doodling",
    "Reading science-fiction novels", "Volunteering at community centre (teaching basic computer skills)", "Journaling for stress management"]'
  career_goals: Myron aims to secure a reliable, well‑structured career that leverages his hands‑on skills and his love for problem solving. In the near term he plans to enroll in a local automotive technology
    program or an apprenticeship with a garage to earn a certification as a motor mechanic. Simultaneously he wants to boost his academic credentials by completing a high‑school equivalency diploma and
    taking introductory courses in computer networking, with the long‑term ambition of becoming a certified IT support specialist. Ultimately he envisions opening a small auto‑repair or custom bike‑shop
    where he can blend his technical expertise with entrepreneurial independence. Achieving these goals would give him financial stability, a clear routine, and a sense of mastery that helps counteract
    his tendency toward worry and stress.
