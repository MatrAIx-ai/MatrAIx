personas:
  professional: Julie Jones is a budding tech enthusiast and self‑taught maker who blends disciplined project management with a skeptical eye for emerging gadgets, documenting Arduino and Raspberry Pi experiments,
    logic puzzles, and evidence‑based reflections on a personal blog where they record each prototype’s performance.
  sports: Julie Jones sprints for the high school track team, idolizing the Iowa Hawkeyes’ track legends and secretly benchmarking against Usain Bolt’s split times while club‑training with the Cedar Rapids
    Athletic Club, and they view each 100‑meter dash as a personal test of discipline and competitive edge.
  arts: Julie Jones curates a minimalist Instagram gallery of Iowa prairie vistas inspired by Ansel Adams and the ambient soundscapes of Tycho, and they spend weekends sketching circuit diagrams that feel
    like modern art, blending scientific precision with creative expression.
  travel: Julie Jones plans travel with spreadsheet precision, favoring day‑trips to the Iowa State Fair and weekend hikes in the Badlands while dreaming of attending the Maker Faire in Chicago and the
    Kyoto International Science Festival, all balanced against a modest family allowance and school schedule.
  culinary: Julie Jones prefers nutrient‑dense meals such as quinoa‑berry bowls and grilled salmon with roasted asparagus, but they secretly relish late‑night pepperoni pizza and experimentally stir matcha
    powder into oatmeal for a tech‑inspired twist.
  core: Julie Jones is a disciplined teen tinkerer who fuses a competitive sprint mindset with a skeptical curiosity for emerging tech, while secretly indulging in pizza, late‑night coding marathons, and
    occasional sleep debt.
background:
  cultural: Julie was raised in a middle‑class family in Des Moines, Iowa, within a community that values independence, hard work, and education. The Midwestern environment emphasizes practical achievement
    and self‑reliance, with strong support for STEM initiatives in local schools. Her family participates in community events such as county fairs and local sports, fostering a sense of civic involvement
    while encouraging individual ambition. Although she identifies as White American, her upbringing reflects a blend of suburban and small‑town cultural influences that prioritize responsibility, volunteerism,
    and a pragmatic outlook on life, all of which align with her organized, achievement‑driven personality.
attributes:
  skills: '[''Advanced mathematics (algebra, geometry)'', ''Scientific research and laboratory techniques'', ''Python programming'', ''Arduino/Raspberry Pi hardware tinkering'', ''Robotics design and construction'',
