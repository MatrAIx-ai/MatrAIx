  hobbies: '[''Reading science non-fiction'', ''Arduino/Raspberry Pi tinkering'', ''Chess'', ''Track and field (sprinting)'', ''Science blog writing'', ''Puzzle solving (Sudoku, logic puzzles)'', ''Strategic
    board games (e.g., Settlers of Catan)'', ''Nature photography'']'
  career_goals: Julie aims to pursue a degree in engineering—preferably mechanical or biomedical—with a focus on robotics and medical device innovation. She envisions working on cutting‑edge research that
    translates practical solutions into real‑world healthcare applications. In the short term, she plans to attend competitive summer STEM programs, secure scholarships, and obtain internships in university
    engineering labs. Long‑term, she aspires to lead a technology startup that merges her analytical rigor with her entrepreneurial drive, ultimately contributing to advancements that improve lives while
    achieving personal excellence.
