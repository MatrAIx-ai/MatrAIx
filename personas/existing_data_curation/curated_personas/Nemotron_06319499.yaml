  hobbies: '["Watercolor painting (especially lakeside scenes)", "Visiting art museums, galleries, and regional art fairs", "Lakefront walking and birdwatching", "Reading (classic literature, contemporary
    fiction, art theory)", "Collecting vintage postcards and local history ephemera", "Cooking experimental recipes inspired by travel", "Community gardening and seed swapping", "Sailing on Lake Michigan",
    "Writing memoirs and poetry"]'
  career_goals: Although retired from formal employment, Rachel aims to deepen her engagement with the arts and her community. She plans to complete a memoir and a collection of poems that weave together
    her personal history, love of art, and Midwestern roots. She hopes to launch a weekly art‑discussion circle at the Port Washington community center, where participants can share and critique works in
    an informal setting. Rachel also aspires to become a volunteer curator at the local museum, helping to design rotating exhibits that highlight regional artists and folk traditions. To broaden her outreach,
    she wants to improve her digital skills—particularly photo‑editing and blog creation—so she can share her watercolor paintings and photography with a wider online audience. Finally, she seeks to mentor
    younger volunteers, offering guidance on community engagement and creative project planning while maintaining her own health and lifelong learning through occasional short courses in art history or
    horticulture.
