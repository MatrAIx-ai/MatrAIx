  career_goals: Anthony aims to obtain his CPA license within the next year and pursue the CIA certification, positioning himself for promotion to senior audit manager within his firm. He envisions leading
    a small audit team, driving the adoption of data‑analytics and automation tools to increase efficiency and reduce error rates. Over the next five years, he hopes to transition into a corporate finance
    or CFO role at a midsized regional company, or alternatively launch a boutique consulting practice focused on compliance and forensic services for Mississippi’s agricultural and nonprofit sectors. He
    also aspires to share his knowledge as an adjunct professor at Mississippi State University, blending his curiosity for new ideas with the practical experience he has built.
