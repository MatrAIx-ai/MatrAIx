    Resolution'', ''Mentoring and Training'', ''Bilingual Communication (English/Spanish)'']'
  hobbies: '[''Mural Painting'', ''Architectural Photography'', ''Cooking Mexican Cuisine'', ''Soccer'', ''Community Volunteering'', ''Mentoring Youth in Trades'', ''Exploring Emerging Construction Technologies'',
    ''Attending Art Exhibitions'', ''DIY Home Renovation Projects'', ''Reading Architectural and Design Literature'']'
  career_goals: Jose Antonio aims to rise to a senior executive role such as Director of Operations within a forward‑thinking construction firm, where he can champion sustainable building practices and
    integrate artistic design elements into large‑scale projects. He plans to earn a Project Management Professional (PMP) certification, become a LEED Accredited Professional, and complete a bachelor’s
    degree in construction management to deepen his technical expertise. Passionate about community impact, he envisions launching a mentorship program that trains Mexican‑American youth in skilled trades
    and eventually establishing his own consultancy that delivers eco‑friendly, culturally resonant construction solutions across Southern California.
