personas:
  professional: Jose Manzano is a construction management leader who merges lean scheduling, BIM‑driven site monitoring, and artistic vision to deliver residential and commercial projects, and they channel
    their methodical planning and sociable, collaborative style into harmonious crew coordination and innovative design solutions.
  sports: Jose Manzano joins a local amateur soccer league at Echo Park, cheering for LA Galaxy and LAFC while mixing weekend pick‑up games with morning hill‑runs, and they subscribe to the LA Lakers season
    pass to stay connected to the city's sports pulse.
  arts: Jose Manzano immerses themselves in street‑art culture, drawing inspiration from Frida Kahlo, Diego Rivera, and contemporary muralist Shepard Fairey, while attending live performances by Los Lobos
    and Santana, and they frequently curate photo exhibitions of LA’s industrial skyline.
  travel: Jose Manzano prefers purposeful road trips that blend work and leisure, having road‑traveled the Pacific Coast Highway to Santa Barbara, explored the vibrant festivals of Oaxaca, and they planned
    an upcoming eco‑tour of the Redwood National Park, balancing family responsibilities with a taste for cultural immersion.
  culinary: Jose Manzano is an enthusiastic home chef who skillfully prepares mole with ancho and pasilla chilies, hand‑rolled tamales on family Sundays, and they experiment with avocado‑lime salsa, yet
    they often forget to refrigerate leftovers, leading to occasional food‑borne mishaps.
  core: Jose Manzano blends disciplined construction expertise with a flair for vibrant mural art, turning every project into a canvas of community pride while they juggle a habit of late‑night sketching
    that sometimes erodes sleep.
background:
  cultural: Jose Antonio was raised in a close‑knit Mexican immigrant family in the Los Angeles area, speaking Spanish at home while navigating an English‑dominant society. His heritage instills a strong
    sense of family loyalty, respect for hard work, and a communal outlook that shapes his collaborative leadership style. He proudly celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo,
    and regional festivals, often incorporating cultural motifs and vibrant color palettes into his construction projects. Bilingual and culturally fluent, he serves as a bridge between his community and
    the broader industry, advocating for inclusive workplace practices and opportunities for Latino youth.
attributes:
  skills: '[''Project Management'', ''Construction Planning'', ''Budgeting and Cost Control'', ''Safety Compliance (OSHA)'', ''Blueprint Reading'', ''Lean Construction'', ''Building Information Modeling
