personas:
  professional: Michele Villalta, a 25‑year‑old aspiring community arts coordinator, merges vivid abstract illustration with meticulous event planning, leveraging bilingual communication, Canva and Photoshop
    expertise, and a methodical, reliable nature to design inclusive murals and workshops that empower local youth.
  sports: Michele Villalta stays active by salsa dancing at the Kankakee Community Dance Center, joins a weekend intramural soccer league, and fervently follows the Chicago Bulls, Chicago White Sox, and
    Chicago Bears, treating each game as a communal rally.
  arts: Michele Villalta’s artistic soul is fed by abstract painting sessions inspired by the luminous patterns of Yayoi Kusama, the candid street moments captured by Henri Cartier‑Bresson, and the speculative
    verses of Ocean Vuong, while regular visits to local galleries and music festivals featuring Tame Impala and Lila Downs shape her creative identity.
  travel: Michele Villalta prefers thoughtfully planned road trips that balance cultural immersion and creative inspiration, having recently explored the vibrant murals of Oaxaca City and the historic streets
    of Barcelona, while dreaming of a solo photography journey through the deserts of New Mexico.
  culinary: Michele Villalta, an avid home cook, relishes preparing family‑rooted dishes like handmade corn‑based tamales, slow‑roasted pork with chipotle glaze, and fresh salsa verde, experimenting with
    plating that mirrors the colors of their abstract canvases, yet sometimes over‑salts the sauces in the rush of hosting friends.
  core: Michele Villalta is a bright, organized dreamer who channels boundless creativity into community art while juggling occasional procrastination on paperwork, a penchant for late‑night sketching,
    and a habit of over‑indulging in festival snacks.
background:
  cultural: Michele was raised in a Mexican‑American household where Spanish and English were spoken interchangeably. Family traditions such as Día de los Muertos, quinceañeras, and weekly family meals
    shaped her sense of community and identity. She participates in the local Hispanic community in Kankakee, helping organize cultural festivals and bilingual outreach programs. Her Catholic upbringing
    and close ties to extended family provide a strong support network, while her experience living in the Midwest has given her a blend of Mexican heritage and Midwestern values.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Event planning and coordination'', ''Creative writing'', ''Basic graphic design (Canva, Photoshop)'', ''Digital photography'', ''Social media
    content creation'', ''Crafting and DIY projects'', ''Facilitating art workshops'', ''Organizational and time‑management skills'']'
  hobbies: '[''Painting (abstract and figurative)'', ''Sketching and drawing'', ''Digital photography'', ''Reading speculative fiction'', ''Salsa dancing'', ''Cooking traditional Mexican dishes'', ''Volunteer
    work at local community center'', ''Attending live music and cultural festivals'', ''Crafting and DIY projects'', ''Journaling and poetry writing'']'
  career_goals: Michele aims to pursue an associate’s degree in graphic design or community arts while building a portfolio of local mural and workshop projects. She aspires to become a community arts coordinator
    or cultural liaison for a nonprofit organization, where she can blend her artistic vision with her passion for serving the Hispanic community in Kankakee. Long‑term, she envisions opening a bilingual
    community art studio that offers classes, exhibitions, and mentorship for young artists.
