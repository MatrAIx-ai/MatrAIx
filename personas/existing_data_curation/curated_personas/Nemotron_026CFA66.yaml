personas:
  professional: Nathaniel Tanner, an inquisitive nine-year-old who blends a love for tide-pool exploration with methodical LEGO building, envisions a future as a marine scientist, eagerly sketching marine
    ecosystems while confidently presenting their findings at school science fairs.
  sports: Nathaniel Tanner, a budding surf enthusiast training with the community group 'Waikiki Wave Riders' during summer lessons, also kicks a soccer ball for the 'Aina Kai Youth Soccer League' after
    school, practices swimming for safety at the local pool, and they passionately root for the Hawaii Rainbow Warriors and the LA Galaxy, embodying their love for both individual water sports and team
    competition.
  arts: Nathaniel Tanner, a fledgling ukulele player who strums beginner chords to Israel Kamakawiwo'ole's 'Somewhere Over the Rainbow', doodles intricate fish and coral scenes inspired by National Geographic
    marine illustrator David Doubilet, and they eagerly visit local cultural festivals to watch hula performances and learn new Hawaiian words, letting their creative curiosity thrive alongside their practical
    problem-solving side.
  travel: Nathaniel Tanner, who delights in shoreline adventures, has collected shells from Hanauma Bay and dreams of snorkeling the Great Barrier Reef, and they also plan a family trip to the Monterey
    Bay Aquarium by mapping out travel routes and budget in a colorful scrapbook, reflecting their organized yet imaginative approach to exploring the world.
  culinary: Nathaniel Tanner, a fan of fresh pineapple-mango smoothies and school-lunch fish tacos made with grilled cod and tangy slaw, often snacks on honey-glazed popcorn while building LEGO creations,
    and they occasionally barges into the kitchen to sprinkle shredded cheese on mac and cheese, showcasing their practical palate paired with occasional culinary curiosity.
  core: Nathaniel Tanner merges a relentless fascination for marine life with an orderly habit of cataloguing every shell they find, yet they sometimes forget to brush their teeth after beach days, revealing
    a charming blend of curiosity, practicality, and occasional forgetfulness.
background:
  cultural: Nathaniel’s cultural background is rooted in his white, mainland‑American family heritage, but his everyday life is deeply shaped by the vibrant, multicultural environment of Wailuku, Maui.
    Growing up on the island, he has absorbed Hawaiian values such as aloha ʻāina (love of the land) and respect for the ocean. He regularly hears Hawaiian words in school and community events, participates
    in local festivals like the makahiki celebration, and has started learning basic Hawaiian greetings. His peers include children of Japanese, Filipino, Native Hawaiian, and other Pacific Islander descent,
    giving him a natural appreciation for diverse traditions. While his family maintains typical Mid‑western customs, they have embraced island life—spending weekends at the beach, enjoying fresh poke,
    and supporting community conservation projects. This blend of mainland roots and island culture informs his worldview and influences his interests in marine conservation and community service.
