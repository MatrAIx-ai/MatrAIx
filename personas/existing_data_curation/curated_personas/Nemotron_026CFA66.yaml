  hobbies: '[''Exploring tide pools'', ''Surfing lessons'', ''Collecting shells'', ''Building LEGO sets'', ''Reading adventure books'', ''Playing ukulele'', ''Coding simple games with Scratch Jr.'', ''Participating
    in school science fairs'', ''Drawing marine life'', ''Playing soccer with friends'']'
  career_goals: Nathaniel dreams of becoming a marine biologist who studies and protects Hawaii’s coral reefs. He imagines spending his days snorkeling to observe reef health, collecting data, and later
    using coding skills to analyze that information. He hopes to earn a science degree, learn advanced marine ecology, and develop simple monitoring devices that local communities can use. His long‑term
    ambition also includes sharing his love of the ocean by leading school‑age outreach programs, teaching peers about conservation, and perhaps writing a children’s guide to Hawaiian marine life.
