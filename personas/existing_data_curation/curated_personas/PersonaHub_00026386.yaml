persona_description: Benjamin Hooks was a highly influential civil rights leader and former FCC Commissioner who dedicated his life to advancing the participation and rights of minorities and the poor.
  His work at the FCC included advocating for minority broadcast ownership and increasing minority employment in the broadcast industry. He was a Baptist minister for two churches, a businessman, a lawyer,
  and the first black criminal court judge appointed to the Tennessee bench. He was appointed to the FCC in 1972 by the Nixon administration and served as the first African-American commissioner at the
  agency. He was also the executive director of the National Association for the Advancement of Colored People from 1977 to 1992. His legacy includes renaming the FCC's Blacks in Government Chapter in his
  honor in 2002.
