personas:
  professional: Bartolo is a seasoned postsecondary educator with deep expertise in bilingual curriculum design, Latin American literary analysis, and grant writing, who channels his structured yet adaptable
    mindset into spearheading interdisciplinary courses, mentoring junior faculty, and driving community‑engaged research initiatives.
  sports: Bartolo avidly follows the Golden State Warriors and San Francisco Giants, plays weekly tennis at the community center, hikes the Marin Headlands whenever weather permits, and keeps his salsa
    dancing fresh as a low‑impact cardio routine.
  arts: Bartolo shines on his acoustic guitar at local gatherings, curates a collection of vintage Mexican film posters, frequents Bay Area literary readings featuring authors like Octavio Paz and Sandra
    Cisneros, and loses himself in salsa dances to the rhythms of Celia Cruz.
  travel: Bartolo balances weekend escapades to Yosemite and the coastal redwoods with annual pilgrimages to historic sites in Mexico such as Teotihuacan and Oaxaca’s colonial centers, all while budgeting
    for a future cultural trek to Machu Picchu.
  culinary: Bartolo's kitchen is a hub for cooking mole poblano, chiles en nogada, and pozole using ancho chilies, epazote, and fresh masa, and he regularly hosts friends for communal meals on his balcony
    garden where cilantro and lime are never in short supply.
  core: Bartolo blends meticulous academic planning with spontaneous music, dance, and culinary flair, navigating retirement prep with a dash of vintage poster collecting and a habit of occasionally overlooking
    small bill payments.
background:
  cultural: Bartolo was born to immigrant parents from Jalisco, Mexico, and grew up navigating a bicultural identity in the Bay Area. Fluent in both Spanish and English, he maintains strong ties to Mexican
    traditions—celebrating Día de los Muertos, honoring family rituals, and sharing Mexican cuisine with his community. His Mexican heritage informs his teaching philosophy, emphasizing cultural relevance
    and social justice. Active in Oakland's Latino cultural organizations, he advocates for immigrant rights and works to preserve Mexican artistic expressions within the diverse tapestry of California.
attributes:
  skills: '[''Curriculum Design'', ''Bilingual Instruction (Spanish-English)'', ''Latin American Literature Analysis'', ''Cultural Studies Research'', ''Academic Advising'', ''Grant Writing'', ''Community
    Outreach'', ''Digital Pedagogy'', ''Interdisciplinary Collaboration'', ''Public Speaking'', ''Mentorship of Junior Faculty'', ''Program Evaluation'']'
  hobbies: '[''Acoustic Guitar'', ''Mexican Cooking'', ''Salsa Dancing'', ''Community Literacy Volunteering'', ''Hiking'', ''Literary Readings'', ''Urban Gardening'', ''Travel to Mexico'', ''Collecting
    Vintage Film Posters'', ''Chess Club'']'
  career_goals: Bartolo aims to create a flagship interdisciplinary course that links Mexican diaspora literature with contemporary social issues, securing a major grant to support community‑based research
    in Oakland's Latino neighborhoods. He aspires to mentor emerging scholars, publish a monograph on 20th‑century Mexican literature, and serve as department chair to shape curriculum policy before his
    planned retirement. Additionally, he wants to expand the campus's Latinx studies center to become a hub for cultural exchange and student support.
