personas:
  professional: A seasoned custodial specialist, Deep Pabon leverages over a decade of floor‑care mastery, eco‑friendly cleaning expertise, and minor‑maintenance know‑how to streamline facility operations
    while they infuse an artist’s eye for detail into every polished surface.
  sports: A devoted hiker, Deep Pabon spends weekends traversing the trail network of Olympic National Park, participates in the local Olympic Hiking Club, and roots for the Seattle Seahawks, Seattle Sounders
    FC, and the Washington Huskies during the football, soccer, and college basketball seasons, while they occasionally join a neighborhood yoga class to stretch after long treks.
  arts: Deep Pabon nurtures a dual passion for visual and auditory arts, sketching watercolor studies of coastal forests inspired by Ansel Adams and indigenous motifs, while they curate evenings at Port Angeles
    galleries that showcase artists like Dale Chihuly and listen to folk‑indie acts such as Fleet Foxes, Phoebe Bridgers, and Iron & Wine to fuel creative contemplation.
  travel: An adventure‑oriented traveler, Deep Pabon meticulously plans photo‑centric trips to places like Iceland’s waterfalls, Banff’s turquoise lakes, and New Zealand’s South Island, favoring rugged
    hikes and local art museums over resort stays, yet they often schedule these escapes around the seasonal lull of their cleaning business to keep finances in check.
  culinary: A modest home chef, Deep Pabon delights in crafting herb‑infused dishes such as cedar‑plank salmon with dill‑thyme chimichurri, quinoa salads tossed with roasted beets and basil, and clam chowder
    seasoned with seaweed, drawing fresh ingredients from their container garden and they occasionally experiment with Pacific Northwest foraged mushrooms.
  core: Deep Pabon blends meticulous custodial expertise with a restless artistic curiosity, managing anxiety through garden‑grown herbs and mindfulness while they juggle a dream of eco‑cleaning entrepreneurship
    and a future community art hub.
background:
  cultural: Deep grew up in a working‑class family in the Pacific Northwest, absorbing the region’s blend of rugged individualism and communal stewardship of the environment. Although he identifies as white,
    his cultural outlook is shaped by the local appreciation for nature, sustainability, and respect for the heritage of the Clallam and other Coast Salish peoples. He values modesty, self‑reliance, and
    the quiet dignity of honest labor, while also holding a deep respect for the artistic traditions of the area, often seeking inspiration from both contemporary Northwest art and indigenous motifs.
attributes:
  skills: '[''Commercial custodial work'', ''Floor care (stripping, waxing, buffing)'', ''Eco‑friendly cleaning product knowledge'', ''Minor plumbing and electrical repairs'', ''Inventory and supply management'',
    ''OSHA safety compliance'', ''Crew scheduling and coordination'', ''Attention to detail'', ''Adaptability'', ''Art history and design appreciation'']'
  hobbies: '[''Hiking and nature photography'', ''Sketching and watercolor painting'', ''Listening to folk/indie music'', ''Attending small gallery openings'', ''Participating in art‑talk meet‑ups'', ''Journaling'',
    ''Mindfulness meditation'', ''Container gardening'']'
  career_goals: He aims to move from frontline custodial duties to a supervisory or facilities‑management role within the next three years, seeking certification in Building Operations Management. Deep
    also wants to launch a small side business offering environmentally responsible cleaning services to local boutiques and art galleries, allowing him to merge his expertise in cleaning with his passion
    for art. Long‑term, he envisions establishing a community art space where he can curate exhibitions while overseeing its upkeep, creating a venue that supports local artists and offers a tranquil setting
    for his own creative practice.
