personas:
  professional: Wesley Birch, an ironworker with over a decade of structural steel experience, blends meticulous blueprint reading, MIG welding, and heavy‑equipment operation with a curiosity for BIM and
    lean construction, making them a reliable crew coordinator who pushes for safer, more efficient installs while quietly questioning shortcuts.
  sports: Wesley Birch, a member of a local recreational soccer league and a die‑hard Jacksonville Jaguars fan, hits the gym for functional strength training during the off‑season, never misses a Jumbo
    Shrimp game at the stadium, and spends Saturdays fishing, they illustrate a competitive, community‑oriented approach to sports.
  arts: Wesley Birch, an avid attendee of Jacksonville live‑music nights, especially for Southern rock covers at The Elbow and blues performances by Tab Benoit, streams classic John Wayne films and enjoys
    local theater productions at the Florida Theatre, weaving community heritage into their leisure, and they often share concert stories over a cold beer.
  travel: Wesley Birch, who prefers well‑planned road trips that balance fishing excursions on the St. Johns River with cultural stops in New Orleans and Miami, and dreams of a summer cabin getaway in the
    Appalachian Mountains, they usually book mid‑week flights to keep costs low, reflecting a pragmatic yet adventure‑seeking travel style.
  culinary: Wesley Birch, a proficient backyard griller, relishes slow‑smoked pork ribs with a bourbon‑infused glaze, whips up shrimp‑and‑grits on rainy evenings, and isn’t shy about adding hot sauce to
    everything, though they sometimes over‑season their classic biscuits, embodying a hearty, hands‑on culinary personality.
  core: Wesley Birch, a 33‑year‑old ironworker who mixes meticulous safety focus with a competitive love for fantasy football and a penchant for weekend barbecues, they constantly juggle blue‑collar practicality
    with a quiet curiosity for emerging construction tech.
background:
  cultural: Wesley grew up in a middle‑class, white family in the Jacksonville suburbs, with deep roots in the southeastern United States. His family heritage traces back to English and Irish ancestors
    who settled in Florida during the mid‑20th century. Raised in a community that values hard work, hospitality, and a strong sense of local pride, Wesley’s upbringing included Friday night high‑school
    football games, church gatherings, and family outings to the Gulf beaches. The Southern coastal culture shaped his love for fishing, barbecue, and warm, outgoing social interactions, while his parents’
    emphasis on reliability and practical skill‑building steered him toward a career in the trades.
attributes:
  skills: '[''Welding (shielded metal arc)'', ''MIG welding'', ''Blueprint reading'', ''Rigging and hoisting'', ''OSHA safety compliance'', ''Structural steel erection'', ''Heavy equipment operation (cranes,
    forklifts)'', ''Team coordination'', ''Problem solving under time pressure'', ''Basic CNC machining'', ''Construction site logistics'']'
  hobbies: '[''Playing recreational soccer'', ''Fishing on the St. Johns River'', ''Attending live music concerts'', ''Restoring a classic Chevrolet Camaro'', ''DIY home improvement projects'', ''Fantasy
    football league participation'', ''Volunteering with Habitat for Humanity'', ''Barbecue gatherings with friends'', ''Gym workouts (crossfit)'', ''Watching sci‑fi series'']'
  career_goals: Wesley aims to transition from being a skilled ironworker to a foreman and eventually a project supervisor within the next five years. He plans to earn NCCER level‑3 certification, complete
    an OSHA trainer course, and acquire a solid understanding of BIM tools to bridge the gap between field work and design. Long‑term, he envisions starting his own small steel‑fabrication contracting firm
    that emphasizes safety, sustainable material use, and on‑time delivery. He also wants to mentor younger workers and contribute to community‑building projects such as Habitat for Humanity.
