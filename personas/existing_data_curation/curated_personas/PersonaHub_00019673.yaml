persona_description: A researcher or policymaker interested in infectious diseases, particularly Japanese encephalitis (JE), who is looking for accurate and up-to-date information on the disease's impact
  and vaccination effectiveness. This persona is likely to be interested in the study published in eLife, which provides a mathematical model and case data to estimate the regional disease burden and the
  impact of vaccination, even in the absence of robust surveillance data. They would be interested in understanding how the use of a recently developed and inexpensive vaccine has increased over recent
  years and how these estimates can guide rational assessment of the cost and benefit of vaccinations and support policymaker decisions on allocating vaccines.
