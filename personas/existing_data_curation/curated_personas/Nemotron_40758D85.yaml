personas:
  professional: Deshondra Broughton, a seasoned hospitality professional with a knack for meticulous table management and staff training, leverages their methodical nature and assertive communication to
    excel in fast‑paced dining environments, they aim to secure a shift‑lead role within the next two years while completing a hospitality management certificate.
  sports: Deshondra Broughton enjoys evening walks along the Chesapeake shoreline, they cheer for the Baltimore Ravens and Washington Wizards, and they participate in a local women's soccer league that
    meets at a community park every Saturday.
  arts: Deshondra Broughton finds solace in gospel legends like Kirk Franklin and soul classics from Aretha Franklin, they regularly attend performances at the local theater showcasing works by emerging
    playwrights, and they discuss self‑improvement literature in a weekly book club that often references authors such as Brené Brown and Malcolm Gladwell.
  travel: Deshondra Broughton plans weekend getaways to historic Southern cities such as Charleston and Savannah, they dream of a culinary pilgrimage to New Orleans for authentic jambalaya, and they balance
    these trips with careful budgeting that favors affordable Airbnbs and car‑share rides.
  culinary: Deshondra Broughton perfects Southern comfort dishes like crispy fried chicken, smoky collard greens, and buttery cornbread, they often incorporate home‑grown tomatoes and fresh basil from their
    backyard garden, and they follow cooking shows like "The Pioneer Woman" for technique tips.
  core: Deshondra Broughton blends a love for community‑rooted comfort cooking with a regimented work ethic, they habitually juggle shift schedules, budget spreadsheets, and garden chores, and they occasionally
    lose track of time during late‑night recipe experiments.
background:
  cultural: Deshondra is an African‑American woman who grew up in Maryland’s vibrant community of Annapolis and later settled in Riva, Anne Arundel County. Her family’s cultural traditions include Sunday
    church gatherings, seasonal potlucks featuring soul food, and celebrations of Juneteenth and Kwanzaa, which have instilled a deep sense of heritage and community pride. She maintains strong ties to
    her local Black church, where she participates in choir and community outreach programs. The cultural emphasis on resilience, mutual support, and the sharing of home‑cooked meals influences both her
    professional demeanor—focused on service with dignity—and her personal interests. She also values the rich history of African‑American contributions in the Chesapeake region, often attending local heritage
    events and supporting neighborhood initiatives that promote cultural awareness.
