  hobbies: '[''Cooking traditional Southern comfort foods'', ''Gardening and vegetable gardening'', ''Walking along the Chesapeake shoreline'', ''Listening to gospel and soul music'', ''Reading self‑help
    and practical nonfiction (book club)'', ''Volunteering at church food‑bank'']'
  career_goals: Deshondra aims to transition from a front‑of‑house role to a supervisory position within the next two years, seeking a shift lead or assistant manager role where she can apply her organizational
    strengths and set consistent routines for the team. She plans to complete a certificate in hospitality management at a local community college to strengthen her managerial credentials. Long‑term, she
    envisions opening a small family‑style café that highlights traditional African‑American Southern recipes, offering a stable, community‑focused dining experience. She also hopes to mentor other young
    women entering the service industry, providing guidance on career advancement and financial stability.
