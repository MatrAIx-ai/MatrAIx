  hobbies: '[''building block towers'', ''toddler music class'', ''sandbox play with peers'', ''playground group games and slide races'', ''library storytime sessions'', ''watching animated animal shows'']'
  career_goals: Although formal career planning is far ahead, Jimmy already expresses a vivid fascination with roles that combine structure, responsibility, and a chance to be first. He loves watching the
    local fire trucks during community parades and says he wants to become a firefighter because he admires the predictable routines and the chance to help others. He also enjoys racing his friends at the
    park and proudly declares that someday he will be the 'fastest runner' or a 'snow‑plow driver' who clears the streets in winter, reflecting his competitive streak and love for organized tasks.
