  hobbies: '[''Gardening'', ''Knitting'', ''Crossword Puzzles'', ''Book Club'', ''Museum Volunteering'', ''Classic Film Screenings'', ''Listening to Jazz and Classic Rock'']'
  career_goals: Although retired from formal employment, Gertrude aims to continue contributing to her community by expanding her volunteer leadership at the local senior center. She plans to mentor younger
    volunteers, develop a weekly knitting circle, and document her family’s history for future generations. Maintaining her independence and health is also a priority, so she seeks to stay physically active
    through regular walks and low‑impact exercise. Ultimately, she hopes to leave a lasting, organized legacy of service and family stories within her Los Angeles neighborhood.
