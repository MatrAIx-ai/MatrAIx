  career_goals: Theresa aims to transition into a senior technologist role where she can lead cross‑functional process improvement initiatives and shape the next generation of skilled workers through structured
    training programs. She plans to earn a Six Sigma Black Belt and pursue professional engineering certification to solidify her technical authority. Long‑term, she envisions establishing a community partnership
    between local manufacturers and the county’s technical college to offer apprenticeship pathways, while also carving out time for personal health and stress‑management practices.
