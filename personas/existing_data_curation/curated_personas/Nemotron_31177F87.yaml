personas:
  professional: Theresa Hurtt, a seasoned engineering technologist with two decades of CNC machining and Lean Six Sigma expertise, blends her curiosity‑driven love of new technology with a practical, data‑focused
    mindset to streamline production workflows while assertively mentoring junior staff and championing safety.
  sports: Theresa Hurtt, an avid hiker of the Blue Ridge foothills and a dedicated yoga practitioner, joins the local Blue Ridge Hikers Association during spring and fall, while cheering on the Charlotte
    Hornets in basketball and the Carolina Panthers in football, and she logs weekend bike rides to balance her love of outdoor endurance with low‑impact cardio.
  arts: Theresa Hurtt, a lifelong reader of historical fiction such as Hilary Mantel’s *Wolf Hall* and a regular attendee of Charlotte Repertory Theatre productions, finds inspiration in the works of folk
    singer Alison Krauss and enjoys the photography of Ansel Adams, allowing the arts to infuse her woodworking designs with narrative flair.
  travel: Theresa Hurtt, who prefers meticulously planned road trips that blend scenic hiking in the Blue Ridge Mountains with visits to historic towns like Asheville and Savannah, dreams of a future pilgrimage
    to England’s Bath and the Scottish Highlands to walk the landscapes that mirror the settings of her beloved novels, all while budgeting trips around her retirement savings timeline.
  culinary: Theresa Hurtt, a competent home cook who delights in tossing fresh garden vegetables into a roasted beet and goat cheese salad, perfects quinoa‑crusted trout with lemon‑dill sauce, and occasionally
    indulges in Southern barbecue brisket, she balances simple, health‑focused meals with occasional splurges on farm‑to‑table dining experiences.
  core: Theresa Hurtt merges a data‑driven engineering mind with a garden‑grown, hands‑on creativity, balancing meticulous planning and occasional worry into a purposeful, community‑focused life.
background:
  cultural: Theresa grew up in the Southern United States, absorbing a blend of traditional community values and a strong work ethic typical of the region. While she participates in local church and civic
    events, her education and career have fostered a progressive outlook focused on STEM advocacy and gender equity in technical fields. She values self‑reliance and lifelong learning, often bridging the
    gap between local cultural traditions—such as southern hospitality and community volunteerism—and modern engineering practices to promote inclusive, practical education within her Concord, NC community.
