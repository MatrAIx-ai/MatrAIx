persona_description: A researcher who studies the effects of hypertension on children's cognitive skills and is interested in potential treatments that could improve cognitive performance in children with
  hypertension. They are looking for evidence that hypertension in children is tied to a subtle pattern of decreased performance on cognitive testing and want to better understand how physical changes to
  the brain in children with hypertension might explain these cognitive test results.
