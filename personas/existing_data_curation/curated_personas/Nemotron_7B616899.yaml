personas:
  professional: Jessica Harrison, an aspiring marine biologist in training and budding Scratch game developer, combines their curiosity for tide pools with practical LEGO engineering, using their organized
    yet flexible mindset to methodically document sea creature behaviors while still improvising new game mechanics and storylines.
  sports: Jessica Harrison, a spirited member of the Rainbow United youth soccer club, plays as a midfielder for the school's team, cheers on the U.S. Women’s National Soccer Team, and during off‑season
    enjoys swimming at the community pool and occasional beach volleyball, balancing their love for teamwork with a personal habit of practicing free‑kick drills alone on the backyard grass.
  arts: Jessica Harrison, an enthusiastic mini‑artist, sketches marine life inspired by the works of John James Audubon while listening to Beethoven’s Für Elise on piano, creates LEGO sculptures reminiscent
    of the surrealist style of Salvador Dalí, and writes short stories that echo the mystery of Agatha Christie, all of which fuel their creative outlet and provide a calming retreat from school stress.
  travel: Jessica Harrison, an inquisitive traveler, loves weekend trips to the nearby tide‑pool‑rich Crescent Bay where they collect shells, dreams of snorkeling in the Great Barrier Reef and exploring
    the volcanic islands of the Galápagos, and plans each adventure with handmade maps and stickers, though family budget limits long‑haul excursions to the occasional summer vacation.
  culinary: Jessica Harrison, a budding home chef, delights in making simple seafood tacos with grilled shrimp, lime, cilantro, and mango salsa, enjoys munching on avocado toast with a sprinkle of feta,
    and often helps bake banana‑pancake stacks topped with fresh berries, while occasionally indulging in sugary gummy bears when stressed.
  core: Jessica Harrison, a curious yet worry‑prone nine‑year‑old, balances a love for marine exploration, LEGO engineering, and piano practice with meticulous budgeting, careful health routines, and a
    habit of turning mindfulness breathing into a superpower against school stress.
background:
  cultural: Jessica grows up in Palm Coast, a coastal community in Flagler County, Florida. Her family lives in a typical suburban neighborhood, where weekend trips to the beach and local nature preserves
    are common. The region’s blend of Southern hospitality and a laid‑back beach lifestyle influences her values—she appreciates community events such as the annual Sea Turtle Festival and participates
    in local extracurriculars like Girl Scouts and a community library reading program. Her household reflects mainstream American middle‑class traditions, celebrating holidays such as Thanksgiving and
    Christmas with extended family, while also embracing Florida’s outdoor culture through swimming, fishing, and camping. This environment nurtures her curiosity about marine life and supports her collaborative,
    considerate nature.
