  career_goals: Jessica dreams of becoming a marine biologist who studies sea turtles and helps protect Florida’s coastal ecosystems. She is also fascinated by teaching, hoping to share her love of science
    and reading with younger kids. Her practical side leads her to consider a future as a wildlife rehabilitator, where she can combine her empathy for animals with hands‑on problem solving. Although she
    sometimes worries about making mistakes, she sets small, achievable goals, such as winning her school science fair or earning a yellow belt in swimming, to build confidence for her long‑term ambitions.
