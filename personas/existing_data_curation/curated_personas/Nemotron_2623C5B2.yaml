personas:
  professional: Kimberly Goins is an artisan baker who blends classic Utah flavors with cutting‑edge pastry trends, harnessing their methodical inventory control and competitive spirit to consistently deliver
    high‑quality breads and cakes while training junior staff and managing a fast‑paced bakery.
  sports: Kimberly Goins enjoys weekend hikes through the Wasatch foothills, participates in the local Wasatch Trail Runners club for trail runs, enjoys cheering on the Utah Jazz and Real Salt Lake, and
    hits the slopes at nearby ski resorts each winter to stay fit.
  arts: Kimberly Goins immerses themselves in creative pursuits by attending the Utah Shakespeare Festival, listening to folk‑rock artists like Bon Iver and classical cellist Yo‑Yo Ma while designing intricate
    cake decorations inspired by museum exhibits they explore during local art walks.
  travel: Kimberly Goins plans meticulously for weekend road trips, recently driving to Portland, Oregon for its famed food‑truck scene, to Santa Fe, New Mexico for the annual chile festival, and to Denver,
    Colorado to sample the Rocky Mountain coffee roasters, balancing adventure with a clear budget and a desire to source new ingredients for their bakery.
  culinary: Kimberly Goins relishes crafting sourdough loaves with rye and spelt, flavor‑infusing honey‑lavender butter, and herb‑topped focaccia with rosemary, thyme, and sage, and they regularly experiment
    with caramelized fig turnovers and matcha‑white chocolate ganache while drawing inspiration from the classic French pastry book ‘Baking Artisan Bread.’
  core: Kimberly Goins is a methodical yet fiercely competitive baker who balances an herb‑garden hobby, meticulous budgeting, and weekend board‑game marathons, all while dreaming of opening a boutique
    bakery that fuses tradition with innovation.
background:
  cultural: Kimberly grew up in a white, middle‑class family rooted in Pleasant Grove’s predominantly LDS‑influenced community. Her upbringing emphasized family cohesion, self‑reliance, and service to others,
    values that continue to shape her personal and professional life. The town’s strong sense of community, love for the outdoors, and entrepreneurial spirit have fostered her competitive drive and sociable
    nature. While she respects traditional Utah customs—such as holiday gatherings and church service—she also embraces broader American culinary trends, creating a blend of local heritage and contemporary
    culture in her baking.
attributes:
