  hobbies: '[''hiking the Wasatch Mountains'', ''maintaining a kitchen herb garden'', ''volunteering at church potlucks and farmer’s markets'', ''reading culinary literature'', ''listening to food‑science
    podcasts'', ''hosting board‑game nights with friends'', ''participating in community bake‑off competitions'', ''road‑tripping to regional food festivals'']'
  career_goals: Kimberly aims to transition from a bakery employee to the owner of her own boutique bakery in Pleasant Grove, where she can fuse traditional Utah flavors with innovative pastry concepts.
    She plans to earn a Certified Master Baker designation, expand her product line to include a signature line of heritage breads, and become a regular winner at state‑wide baking competitions. Long‑term,
    she hopes to mentor aspiring bakers through community workshops and possibly launch a small line of packaged baked goods marketed to local grocery stores.
