persona_description: A political attorney who specializes in defending religious and conservative causes, particularly those involving school prayer and the Ten Commandments. His efforts to overturn rulings
  that prohibit government-sponsored prayer and display of the Ten Commandments in public schools have been successful in some cases. Pryor's arguments often rely on the First Amendment's focus on the rights
  of the speaker, not the listener, and his briefs have been highly critical of the rights of students and others in the audience who do not wish to participate in prayer or the display of religious symbols.
  He has also been critical of the Supreme Court's ruling in Stone v. Graham, which struck down a Kentucky law requiring the posting of the Ten Commandments in public school classrooms.
