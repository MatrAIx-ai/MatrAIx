  career_goals: Philip aspires to become a senior leader in a major engineering consultancy or a municipal infrastructure department, where he can integrate innovative, sustainable solutions into Chicago’s
    built environment. He aims to earn his Professional Engineer (PE) license and pursue additional credentials such as LEED AP and an executive MBA to deepen his strategic expertise. Over the next decade,
    he envisions directing large-scale smart-city and climate-resilience projects, championing the use of cutting-edge technologies like IoT-enabled infrastructure and advanced BIM, and fostering interdisciplinary
    teams that blend engineering rigor with artistic vision. He also hopes to mentor emerging engineers and contribute thought leadership through conference presentations and industry publications.
