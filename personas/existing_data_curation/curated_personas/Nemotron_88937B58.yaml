  hobbies: '[''Karaoke and live‑music outings'', ''Hosting game‑night potlucks'', ''Community theatre acting'', ''DIY electronics and 3‑D printing'', ''Spontaneous road trips around Michigan'', ''Attending
    Detroit Red Wings games'', ''Zumba fitness classes'', ''Recreational dodgeball league'', ''Exploring local breweries'', ''Social media content creation about hobbies'']'
  career_goals: In the next two years Rachel aims to move from the shop floor to a first‑line supervisory role, taking charge of a shift and formally leading continuous‑improvement projects. She plans to
    enroll part‑time in a bachelor's program in Operations Management to broaden her theoretical base, and ultimately aspires to become a plant manager who can blend her curiosity for new production technologies
    with practical efficiencies. Long‑term, she envisions launching a small consulting boutique that helps midsize manufacturers adopt lean practices while preserving a flexible, people‑focused work culture.
