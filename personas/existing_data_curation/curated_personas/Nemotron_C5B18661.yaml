  hobbies: '[''Fishing'', ''Basketball'', ''Listening to music (hip‑hop, blues, gospel)'', ''Cooking Southern cuisine'', ''Car restoration'', ''Church community activities'', ''Volunteering'', ''Reading
    personal development books'']'
  career_goals: Arthur aims to obtain his Commercial Driver’s License within the next year and transition from local deliveries to long‑haul trucking, which will broaden his experience and increase earnings.
    He plans to complete an associate’s degree in logistics or supply‑chain management at a community college in nearby Jackson, strengthening his qualifications for a supervisory role. Ultimately, he aspires
    to become a fleet manager or start his own small regional transport service that combines his driving expertise with sales acumen. By building a solid professional reputation and expanding his technical
    knowledge, he hopes to provide greater financial stability for his family and mentor younger drivers from his community.
