personas:
  professional: Arthur Woods is a reliable regional driver who excels at route optimization, strict DOT compliance, and friendly customer sales, blending a practical, structured mindset with calm problem-solving
    under pressure.
  sports: Arthur Woods plays pickup basketball at the local community center, follows the Memphis Grizzlies and Mississippi State Bulldogs, and spends weekends fishing the Yazoo River while tracking the
    Bassmaster Classic.
  arts: Arthur Woods enjoys a mixtape of Kendrick Lamar, B.B. King, and Mahalia Jackson while driving, sings gospel in the church choir, and attends occasional blues festivals featuring Buddy Guy.
  travel: Arthur Woods favours weekend road trips along the Natchez Trace to explore historic Natchez and the Gulf Coast, plans routes with GPS to hit new diners, and dreams of a cross-country delivery
    tour into the Pacific Northwest once his CDL is secured.
  culinary: Arthur Woods loves cooking Southern classics like fried catfish, collard greens, cornbread, and shrimp-and-grits for church potlucks, often seasoning with hot sauce and a splash of sweet tea-infused
    glaze.
  core: Arthur Woods is a structure-loving driver who balances reliable logistics work, disciplined finances, low-back care, weekend basketball, gospel music, Southern cooking, and road-trip dreams, while
    occasionally overspending on truck upgrades.
background:
  cultural: Arthur grew up in a close‑knit African‑American community in Yazoo County, where family, church, and local traditions play a central role. His upbringing was shaped by the rhythms of Southern
    gospel music, the flavors of soul food, and the strong work ethic passed down from older generations who weathered the civil‑rights era. Regular attendance at his Baptist church reinforced values of
    cooperation, service, and resilience. Community events such as Juneteenth celebrations and church potlucks connect him to his cultural heritage, while the shared history of the Mississippi Delta informs
    his appreciation for blues music and storytelling. These influences foster a sense of pride, responsibility, and perseverance that guides both his personal life and professional ambitions.
attributes:
  skills: '[''Safe driving'', ''Route planning'', ''Basic vehicle maintenance'', ''Customer service'', ''Sales negotiation'', ''Time management'', ''Regulatory compliance'', ''Logistics coordination'',
