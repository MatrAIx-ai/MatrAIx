persona_description: A pediatric ophthalmologist who specializes in the study of retinal detachment, particularly in the long-term risks associated with preterm birth. She has conducted a large-scale study
  on the association between preterm birth and retinal detachment in children and adults, and is now recommending the need for ophthalmologic follow-up in these individuals. She is also interested in the
  long-term consequences of preterm birth on other ophthalmologic complications, such as subnormal visual acuity, visual perceptual problems, strabismus, refractive errors, and reduced contrast sensitivity
  and visual fields.
