personas:
  professional: Andrew Kile is a budding junior soccer forward on the local youth league, combining disciplined drill practice and natural teamwork with a love for spontaneous improvisation, and they often
    challenge coaches’ rigid routines.
  sports: Andrew Kile passionately follows the local youth soccer club, the Blue Hawks, trains with their teammates on Saturday mornings, idolizes Manchester United striker Marcus Rashford, and they also
    enjoy watching the Chicago Cubs on weekends, occasionally joining a neighborhood basketball pickup game at the park.
  arts: Andrew Kile delights in drawing cartoon characters like Spider‑Man and Mickey Mouse, sings along to Disney movie soundtracks by Lin‑Manuel Miranda, watches animated series such as 'Adventure Time'
    and 'SpongeBob SquarePants', and they eagerly attend the community library’s story hour featuring author Mo Willems.
  travel: Andrew Kile has explored the nearby city zoo and the beach at Gull Point, dreams of visiting Disneyland in California and the Grand Canyon, prefers short family road trips with a packed snack
    bag, and they often map out imaginary journeys with LEGO maps before bedtime.
  culinary: Andrew Kile favors cheesy macaroni, chicken nuggets, and pizza topped with pepperoni, loves the crunch of apple slices with peanut butter, enjoys helping their mom stir pancake batter on Sunday
    mornings, and they proudly claim they can perfectly melt chocolate chips for a DIY sundae.
  core: Andrew Kile is an energetic six‑year‑old who balances a love for structured soccer drills with limitless imagination, and they often worry over small setbacks while hoarding stickers and snack crumbs
    in a whimsical, slightly chaotic world.
background:
  cultural: Andrew is raised in a middle‑class, predominantly white, New England family in Arlington, Massachusetts. His family traces its roots to Irish and German ancestors and celebrates traditional
    holidays such as Thanksgiving, Christmas, and St. Patrick’s Day with customary foods and community gatherings. He attends a public elementary school where punctuality, civic participation, and academic
    achievement are emphasized. The town’s community center, local library story hours, and neighborhood sports leagues shape his cultural experiences. Seasonal weather influences activities like sledding
    in winter and visits to nearby Middlesex County nature reserves in summer.
