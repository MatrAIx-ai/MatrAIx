  hobbies: '[''Gardening'', ''Quilting'', ''Cooking traditional Southern cuisine'', ''Reading historical fiction'', ''Book club participation'', ''Church choir singing'', ''Genealogy research'', ''Local
    history projects'', ''Volunteering at senior center'', ''Attending community festivals'']'
  career_goals: Although retired from formal employment, Ines is determined to remain an active contributor to her community. She seeks to expand her mentorship of middle‑school and high‑school students
    in STEM through after‑school clubs and weekend workshops, aiming to inspire the next generation of Black scientists and engineers. Ines also aspires to serve on the board of a local nonprofit focused
    on youth education and health equity, using her project‑management and grant‑writing experience to drive sustainable programs. Additionally, she plans to continue learning emerging technologies—such
    as data‑visualization tools and basic AI concepts—to keep her skill set current and incorporate them into community teaching sessions.
