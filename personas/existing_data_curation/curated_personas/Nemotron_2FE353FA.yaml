  career_goals: Elizabeth aims to transition into a senior advisory role that allows her to shape sustainable investment strategies and champion environmental, social, and governance (ESG) initiatives within
    the financial sector. She is passionate about mentoring the next generation of women leaders in finance, and she plans to formalize a mentorship program at her firm. Additionally, she hopes to devote
    a portion of her time to nonprofit financial management, helping community organizations improve fiscal stewardship and expand financial‑literacy outreach to underserved populations in New York City.
