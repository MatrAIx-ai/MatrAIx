  career_goals: Miralys aims to earn a scholarship to study civil or environmental engineering, focusing on resilient infrastructure for the Gulf Coast. She envisions leading multidisciplinary teams that
    design flood-resistant communities and integrate sustainable practices. Long-term, she hopes to combine her engineering expertise with her love of Mexican culinary heritage by developing community food
    projects that promote healthy, culturally relevant meals.
