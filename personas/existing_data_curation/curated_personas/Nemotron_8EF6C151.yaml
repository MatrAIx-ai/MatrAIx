personas:
  professional: Miralys Quintero is a 15‑year‑old robotics club captain who turns strategic video‑game tactics into methodical engineering designs, channeling their curiosity and competitive drive into
    building autonomous underwater drones for beach clean‑ups while meticulously logging each prototype in a bilingual lab notebook.
  sports: Miralys Quintero swims competitively for the Dickinson Dolphins, attends weekly strength‑conditioning sessions at the community gym, follows the Dallas Cowboys and Houston Astros avidly, and joins
    casual beach‑volleyball games at Galveston on weekends, approaching fitness with the same organized, methodical planning they apply to robotics while savoring the occasional friendly rivalry with teammates.
  arts: Miralys Quintero creates digital illustrations that fuse cyber‑punk cityscapes with intricate papel picado motifs, draws inspiration from synthwave pioneer Perturbator and Japanese YouTube musician
    HIKAKIN, and channels cultural pride by performing traditional folk dances at local festivals, letting the rhythm of those performances shape their artistic identity.
  travel: Miralys Quintero enjoys weekend getaways to the Gulf Coast beaches of Galveston for surfing and tide‑pool exploration, has toured the historic River Walk in San Antonio, dreams of visiting the
    marine research labs in Monterey, California, and aims to attend the International Robotics Expo in Tokyo, meticulously planning itineraries months ahead while leaving room for spontaneous beach bonfires.
  culinary: Miralys Quintero loves preparing family‑style handmade corn tortillas, salsa verde with roasted tomatillos, and shrimp ceviche seasoned with lime and cilantro, shows moderate kitchen skill by
    adding a dash of chipotle to classic dishes, occasionally forgets to preheat the oven before school projects, and relishes the fish tacos at the local taquería El Mar while experimenting with ramen
    broth after reading culinary magazines.
  core: Miralys Quintero is a calm, methodical teen who blends competitive gaming strategy, robotics ingenuity, and cultural traditions into a disciplined yet occasionally impulsive lifestyle marked by
    a love for underwater drones and a habit of late‑night snack raids on the family pantry.
background:
  cultural: Miralys grew up in a close-knit Mexican-American family in Dickinson, Texas. Her parents immigrated from central Mexico and maintain strong ties to their cultural roots, speaking Spanish at
    home and celebrating holidays such as Día de los Muertos, Mexican Independence Day, and the Feast of Our Lady of Guadalupe. The coastal Texas environment blends with her heritage, influencing her love
    for seafood, beach outings, and a deep appreciation for community resilience after hurricanes. She is bilingual, values family traditions, and participates in local cultural events organized by the
    Mexican community in Galveston County.
