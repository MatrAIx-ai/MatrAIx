  career_goals: Calvin aims to transition into a senior leadership role within the Maricopa County social services system, such as Director of Community Services, where he can implement streamlined processes
    and evidence-based interventions that improve client outcomes. He plans to obtain a Certified Social Work Manager credential and to spearhead a county-wide initiative that expands mental-health resources
    for at-risk families. While pursuing these professional milestones, Calvin also intends to mentor the next generation of social workers, ensuring a legacy of disciplined, compassionate practice that
    balances high standards with personal well-being.
