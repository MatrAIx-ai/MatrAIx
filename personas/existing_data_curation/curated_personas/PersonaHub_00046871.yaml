persona_description: A professional calibration specialist who specializes in the calibration of pressure sensors, particularly in the use of deadweight testers to calibrate these sensors. They have a deep
  understanding of the principles of pressure measurement and the use of pressure sensors in various applications. They are skilled in the use of deadweight testers to build up static pressure gradually
  and keep it constant, and in the comparison of the output signal from the UUT with the reference pressure. They are also familiar with the sensitivity of piezoelectric sensors and the measurement method
  of quasistatic calibration.
