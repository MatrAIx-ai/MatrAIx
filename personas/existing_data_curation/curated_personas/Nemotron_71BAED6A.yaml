  career_goals: Jessica aims to transition into a Chief Financial Officer role within the next three to five years, focusing on driving digital transformation of finance operations, strengthening enterprise
    risk management, and embedding a culture of fiscal stewardship. She also intends to serve on the board of a local nonprofit, mentor emerging female finance professionals, and launch a community financial‑literacy
    program for adults. Long‑term, she envisions moving into a consulting capacity that leverages her expertise while allowing a balanced schedule to support her well‑being and reduce work‑related stress.
