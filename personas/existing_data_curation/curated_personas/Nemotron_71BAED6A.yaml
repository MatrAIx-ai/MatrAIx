personas:
  professional: Jessica Lumbard, a veteran CPA with over three decades of corporate budgeting and strategic finance leadership in manufacturing and service firms, blends meticulous data‑driven analysis
    with a calm, assertive demeanor to steer cross‑functional teams toward digital finance transformation, risk‑resilient reporting, and a culture of fiscal stewardship as she positions herself for a future
    CFO role.
  sports: Jessica Lumbard enjoys low‑impact fitness such as sunrise yoga sessions at the local park, leisurely walks along the Ohio & Erie Canal Towpath, follows the Cleveland Guardians and the Ohio State
    Buckeyes football team, and participates in a community gardening club that organizes weekend hiking trips to nearby state parks.
  arts: Jessica Lumbard spends evenings immersed in classic literature—revisiting Tolstoy’s "War and Peace" and Woolf’s "Mrs Dalloway"—while listening to the chamber music of Mozart, attending museum exhibit
    tours at the Canton Historical Society, and occasionally savoring the poetry of Mary Oliver, all of which shape her reflective yet inquisitive creative palate.
  travel: Jessica Lumbard prefers meticulously planned weekend getaways to historically rich sites such as Gettysburg, Pennsylvania; Colonial Williamsburg, Virginia; and Savannah, Georgia, often pairing
    museum visits with antique‑shop hunting, and dreams of a solo pilgrimage to Bath, England, where she can explore Georgian architecture and tea culture.
  culinary: Jessica Lumbard delights in preparing farm‑to‑table meals that showcase heirloom tomatoes, fresh basil, and roasted carrots from her garden, frequently cooking ratatouille, quinoa salads with
    lemon‑thyme vinaigrette, and a Sunday roast with rosemary potatoes, while she indulges in the occasional artisan cheese board featuring aged cheddar and brie when she hosts book‑club members.
  core: Jessica Lumbard is a methodical finance veteran whose curiosity fuels a love of historic literature, gardening, and quiet reflection, balancing disciplined stewardship with occasional indulgent
    quirks while navigating anxiety through mindfulness.
background:
  cultural: Jessica’s cultural background is rooted in the Midwestern, small‑town ethos of Canton, Ohio. Raised in a middle‑class family of Irish‑German descent, she was taught the values of hard work,
    modesty, and community service. Her liberal‑arts education fostered a deep appreciation for literature, history, and cultural diversity, which she integrates into both her professional approach and
    personal life. These influences combine practical pragmatism with a lifelong curiosity, shaping her identity as a dependable, reflective, and community‑oriented individual.
