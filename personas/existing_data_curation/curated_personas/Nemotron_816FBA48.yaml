personas:
  professional: Kathy Tagle, a veteran STEM educator with over two decades of elementary and middle‑school teaching experience, blends graduate‑level STEM training with a structured yet adaptable curriculum
    design approach, using data‑driven assessment tools and collaborative project‑based learning to cultivate curiosity while assertively managing classroom dynamics, and currently pursues a district‑wide
    STEM coordination role and a doctorate in educational leadership.
  sports: Kathy Tagle, a dedicated weekend hiker who tackles the trails around Stone Mountain and the Chattahoochee River with a close group of friends, supports the Atlanta Falcons and the Atlanta Braves,
    participates in a local hiking club’s monthly outings, and occasionally joins a casual pick‑up ultimate frisbee game at a community park.
  arts: Kathy Tagle, an avid reader of science‑fiction titles such as The Expanse series and historical biographies like Team of Rivals, enjoys low‑key board‑game nights featuring strategy games like Settlers
    of Catan, attends occasional performances at the local community theater, and finds inspiration in the ambient electronic compositions of Vangelis and the folk storytelling of Joan Baez.
  travel: Kathy Tagle, who prefers thoughtfully planned weekend getaways over spontaneous vacations, has explored the Appalachian Trail sections in Georgia, visited the historic streets of Charleston, South
    Carolina, and dreams of witnessing the Northern Lights in Iceland while budgeting travel costs to protect funding for her after‑school STEAM hub.
  culinary: Kathy Tagle, a garden‑to‑plate enthusiast, frequently cooks herb‑infused grilled salmon with rosemary and thyme, roasted vegetable quinoa bowls, and fresh tomato‑basil bruschetta, masters homemade
    pesto using basil and pine nuts, yet sometimes orders pizza on busy weeknights when lesson planning overruns.
  core: Kathy Tagle, a structured yet adaptable STEM teacher, balances a love for solitary nature pursuits with a drive to empower under‑served youth, occasionally lets flexibility outweigh rigid planning,
    and tends to forget to water her garden when absorbed in lesson design.
background:
  cultural: Kathy grew up in a middle-class suburban family in the Atlanta metropolitan area, steeped in Southern hospitality and a strong emphasis on education. Her family's Anglo-American heritage valued
    self-reliance, community service, and academic achievement, which guided her decision to earn a graduate degree in STEM at Georgia Tech. While she embraces the relaxed, informal rhythm of Southern life—frequent
    family gatherings, community events, and backyard barbecues—she also carries the cultural expectation of lifelong learning and civic involvement, evident in her dedication to teaching, mentorship, and
    local STEM outreach.
attributes:
  skills: '[''STEM curriculum design'', ''Inquiry-based learning'', ''Project-based learning facilitation'', ''Differentiated instruction'', ''Data-driven assessment'', ''Educational technology integration'',
    ''Classroom management'', ''Mentoring new teachers'', ''Professional development facilitation'', ''Community STEM outreach coordination'']'
  hobbies: '[''Gardening (vegetables and herbs)'', ''Stargazing'', ''Hiking local trails'', ''Reading science-fiction and historical biographies'', ''Playing strategy board games'', ''Volunteering at library
    coding workshops'']'
  career_goals: Kathy aims to move into a district-wide STEM coordination role where she can shape curriculum standards across schools and lead professional-development programs for teachers. She plans
    to pursue a doctorate in educational leadership to deepen her research on effective STEM pedagogy, and she hopes to author a guidebook on integrating flexibility into structured lesson planning. Long-term,
    she envisions establishing an after-school STEAM hub in DeKalb County that offers low-cost robotics and coding workshops for youth from under-served neighborhoods.
