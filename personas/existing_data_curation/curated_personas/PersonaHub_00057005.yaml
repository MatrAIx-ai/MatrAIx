persona_description: A craftsman who specializes in the production of wax patterns for casting processes, focusing on the design and assembly of multi-cavity tools and gates for precise and accurate casting
  of components. They have extensive knowledge of the geometry replication, volumetric shrinkage compensation, and casting operations, and are skilled in the use of hand-operated and automated tools. They
  are also familiar with the functions and applications of gates in the casting process, including their role in attaching patterns to runners, forming clusters, draining melted pattern material, guiding
  molten metal, and ensuring a sound part during solidification.
