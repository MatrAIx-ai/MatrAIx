personas:
  professional: Charlotte Garbutt, an aspiring home organization consultant with a budding background in community event coordination, leverages their meticulous planning, calm resilience, and collaborative
    spirit to streamline family spaces and finances while ensuring every detail aligns with practical, neighbor‑friendly solutions.
  sports: Charlotte Garbutt, a member of the West Valley Trail Club and occasional pick‑up volleyball player, spends crisp spring mornings hiking the Wasatch Front, follows the Utah Jazz and Real Salt Lake
    with devoted fandom, and incorporates weekly Pilates classes into their routine to maintain a balanced, low‑impact fitness regimen.
  arts: Charlotte Garbutt, an avid reader of contemporary fiction by authors like Sally Rooney and Celeste Ng, enjoys listening to folk‑rock artist Brandi Carlile, attends seasonal performances by the Utah
    Symphony, and spends Saturday afternoons crafting handmade décor that reflects their appreciation for the minimalist aesthetics of Scandinavian design.
  travel: Charlotte Garbutt, a meticulous planner who favors weekend road trips to nearby national parks such as Zion and Bryce while dreaming of an organized solo itinerary through the temperate gardens
    of Kyoto and the fjords of Norway, balances their wanderlust with a modest travel budget and a love for quiet, nature‑focused getaways.
  culinary: Charlotte Garbutt, a budding baker who expertly kneads sourdough starters and whips up rosemary focaccia using locally sourced honey and heirloom tomatoes, enjoys simple farm‑to‑table meals
    like quinoa salads with fresh mint, and delights in occasional brunch outings for avocado toast with poached eggs and smoked salmon, a treat they savor after a productive baking session.
  core: Charlotte Garbutt, a calm, methodical organizer who finds peace in tidy spreadsheets, garden rows, and the quiet of a well‑baked loaf, yet secretly hoards stray pens from community events as a quirky
    reminder of their bustling volunteer life.
background:
  cultural: Charlotte grew up in West Valley City, Utah, within a suburban American setting that values self‑reliance, community involvement, and a connection to the outdoors. Her cultural experiences reflect
    the Intermountain West's emphasis on modesty, practicality, and family cohesion, while also appreciating the region's diverse population and the spirit of civic participation that encourages volunteering
    and neighborly support.
attributes:
  skills: '["home organization","budgeting","cooking","basic carpentry","event planning","volunteer coordination","digital literacy","social media management","first aid","childcare"]'
  hobbies: '["hiking","gardening","baking","reading","DIY home decor","volunteering at animal shelter","pilates","board games","documentary watching","budget-friendly meal planning"]'
  career_goals: Charlotte aims to translate her organizing talent into a part‑time home‑consultancy that helps families streamline their spaces and finances while still maintaining a balanced home life.
    She plans to enroll in a community‑college program to earn an associate degree in business administration or project management, and to obtain certifications in event planning and financial literacy
    education. Long‑term, she hopes to take on a role within a non‑profit or local government agency focused on community development, where she can combine her calm resilience, collaborative nature, and
    practical skills to improve neighborhood resources and support families in West Valley City.
