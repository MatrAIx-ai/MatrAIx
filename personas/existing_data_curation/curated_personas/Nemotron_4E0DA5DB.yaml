  career_goals: Christy aspires to pursue a career that combines her love for animals with a clear, structured educational path. She dreams of becoming a veterinarian, envisioning a future where she can
    care for pets and farm animals while applying scientific knowledge. To achieve this, she plans to earn good grades in science and math, graduate high school with honors, and attend a university with
    a pre‑veterinary program. She also considers nursing as an alternative, appreciating the stability and caregiving aspect. She sets short‑term goals such as improving her GPA, participating in science
    fairs, and earning the "Veterinary Science" badge in Girl Scouts. Her desire for a reliable, meaningful profession reflects her need for predictability and her concern about future security.
