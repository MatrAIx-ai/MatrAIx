personas:
  professional: Christy Murphy, a diligent middle-school student and active Girl Scout, showcases emerging project-management and teamwork skills by leading badge projects, coordinating soccer drills, and
    organizing community service events, blending her love of structure with her sociable, assertive nature.
  sports: Christy Murphy, a midfield stalwart for her middle-school soccer team and a member of the Springfield Youth Soccer Club, combines regular after-school drills with weekend hikes in the Ozark foothills,
    idolizing the teamwork of the St. Louis Cardinals and the perseverance of the Missouri State Bears as inspiration for her own fitness routine.
  arts: Christy Murphy channels her creative energy into sketching wildlife scenes reminiscent of Bill Watterson’s whimsical style and doodling cartoons inspired by Jim Davis’s *Garfield*, practices beginner
    piano pieces by Yiruma, and devours mystery series such as *Nancy Drew* and *The Hardy Boys*, letting these influences shape her artistic identity.
  travel: Christy Murphy prefers structured weekend getaways with her family, exploring nearby state parks like Table Rock Lake and the Ozark National Scenic Riverways, while daydreaming about a future
    trip to Yellowstone National Park and an overseas adventure to Kyoto, Japan, balancing her love for familiar nature trails with a budding curiosity for distant cultures.
  culinary: Christy Murphy enjoys baking chocolate chip cookies and sugar-glazed snickerdoodles with her family, often experimenting with a pinch of sea salt and cinnamon, while her everyday meals favor
    simple comforts like mac & cheese, pepperoni pizza, and fresh apple slices, reflecting a modest yet enthusiastic approach to cooking.
  core: Christy Murphy is a structured yet socially vibrant 12-year-old who balances soccer, Girl Scout projects, and sketching, but often worries about perfection, bites her nails when stressed, and secretly
    hoards mystery novels under her bed.
background:
  cultural: Christy was born and raised in Waynesville, a small town in Pulaski County, Missouri. Her family is white, middle‑class, and embodies many Midwestern values such as hard work, community involvement,
    and modesty. The town’s close‑knit atmosphere, a strong presence of military families from nearby Fort Leonard Wood, and frequent community events like the county fair, Fourth of July parades, and church
    gatherings shape her upbringing. Family traditions include Sunday dinner, attending a local Baptist church, celebrating holidays with extended relatives, and participation in school and community service
    activities. These cultural influences foster a sense of responsibility, cooperation, and an appreciation for structured, predictable environments.
attributes:
  skills: '["Organizational and time-management skills", "Strong reading comprehension", "Middle-school math proficiency (fractions, decimals, geometry)", "Basic computer literacy (Google Suite, Scratch)",
