  hobbies: '[''Visiting art galleries and museums'', ''Reading popular‑science, history, and poetry books'', ''Gardening (heirloom vegetables and native flowers)'', ''Birdwatching in local parks'', ''Digital
    photography and photo essay creation'', ''Participating in small‑group book clubs'', ''Knitting and craft circles'', ''Volunteering at the community library reading program'']'
  career_goals: Although retired, Gladys intends to remain intellectually active by volunteering as a STEM mentor for local high‑school students, contributing articles that connect science with everyday
    life for the community newsletter, and collaborating with a neighborhood art collective to create exhibitions that highlight the intersection of art and science. She also aspires to complete a personal
    memoir that reflects on her career and the lessons learned from decades of research, and to continue learning new subjects such as environmental sustainability and digital storytelling.
