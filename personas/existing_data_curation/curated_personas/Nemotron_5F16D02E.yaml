  career_goals: Cesar aims to deepen his impact in religious education by completing a master’s degree in theological studies or counseling within the next three years, paving the way for senior leadership
    roles such as Director of Faith‑Based Education for a regional nonprofit or Dean of Religious Studies at a university. He aspires to create an interfaith youth mentorship program that merges innovative
    teaching tools with time‑honored spiritual practices, and seeks opportunities to present his work at national conferences, earning recognition for program effectiveness and community transformation.
