  career_goals: Madison aspires to become a senior safety engineer and eventually lead the occupational health and safety department of a regional manufacturing hub. She plans to earn the Certified Safety
    Professional credential and pursue a master's degree in Sustainable Occupational Health. Her long‑term ambition is to integrate cutting‑edge technologies such as wearable sensors and AI‑driven risk
    analytics into workplace safety programs, while also championing mental‑health initiatives and creating a consultancy that helps small rural businesses implement effective safety cultures.
