personas:
  professional: Stephanie Hechavarria, a meticulous high‑school student with a talent for scheduling and bilingual communication, leverages their Excel‑savvy planning and calm, reliable demeanor to lead
    the student council’s event logistics while dreaming of a future as a healthcare office manager.
  sports: Stephanie Hechavarria stays active by running cross‑country for their high school, participates in a community soccer league with the FC Fort Worth Juniors, and roots for the Dallas Cowboys and
    Dallas Mavericks while scheduling weekend bike rides as part of their methodical fitness routine.
  arts: Stephanie Hechavarria blends their love for storytelling and rhythm by performing in a folklórico dance troupe to the sounds of Los Tigres del Norte and Natalia Lafourcade, while unwinding with
    contemporary YA novels from John Green and Sarah J. Maas, and they occasionally sketch comic panels inspired by anime.
  travel: Stephanie Hechavarria favors meticulously planned road trips, having charted weekend getaways to Austin’s music scene and a family adventure to the Grand Canyon, while they daydream about a cultural
    immersion tour of Oaxaca’s markets and a future solo backpacking journey across Japan’s historic towns.
  culinary: Stephanie Hechavarria delights in crafting family‑style tamales with masa, ancho chilies, and freshly roasted corn, whips up zesty salsa verde using tomatillos and cilantro, and they balance
    their love for traditional flavors with occasional experimentation on spicy ramen bowls.
  core: Stephanie Hechavarria is a planner‑obsessed teen who fills every spare minute with color‑coded to‑do lists, yet they habitually forget to water their succulents until the last possible day.
background:
  cultural: Stephanie comes from a Mexican-American family that maintains strong ties to Mexican traditions. She celebrates holidays such as Día de los Muertos and Cinco de Mayo, often helping prepare traditional
    foods and decorations. She is fluent in Spanish and participates in community events at her local Catholic church, where she volunteers as a youth aide. Her cultural upbringing emphasizes family, respect,
    and community service, which informs her cooperative nature and her interest in preserving heritage through cooking and dance.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic Microsoft Office (Word, Excel)'', ''Google Workspace'', ''Bilingual communication (English/Spanish)'', ''Community volunteer coordination'',
    ''Basic cooking (Mexican cuisine)'', ''Attention to detail'']'
  hobbies: '[''Journaling and planner making'', ''Student council event organization'', ''Cooking Mexican dishes'', ''Folklórico dance'', ''Reading YA fiction'', ''Listening to regional Mexican music'',
    ''Playing strategy video games'']'
  career_goals: She aims to complete her high school education (or obtain a GED) and pursue an associate degree in business administration at Tarrant County College, with the long-term goal of becoming
    an office manager or administrative professional in a healthcare setting. She also expresses interest in eventually opening a small family-run Mexican restaurant, but prioritizes gaining stable employment
    and further education first.
