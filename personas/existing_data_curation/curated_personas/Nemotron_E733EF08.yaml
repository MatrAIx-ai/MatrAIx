personas:
  professional: Asalia Feliciano, a retired civil engineer with a lifetime of managing water‑resources infrastructure projects, leverages meticulous project‑planning skills, AutoCAD and GIS expertise, and
    bilingual communication to mentor young women in STEM through structured workshops and to steer community development advisory boards with a methodical, results‑focused approach.
  sports: Asalia Feliciano enjoys low‑impact fitness, trekking the trails of Saguaro National Park with her senior walking club, cheering on the Arizona Diamondbacks at Chase Field, and participates in
    a bridge league that doubles as a mental‑sharpness sport, while occasionally attending a Sunday yoga class at the local community center.
  arts: Asalia Feliciano lights up the senior choir with renditions of classic boleros by José José and contemporary ballads by Linda Ronstadt, regularly attends community theater productions such as "Our
    Town" at the Tucson Playhouse, and keeps a collection of recorded works by Frida Kahlo and Diego Rivera, feeling that the visual and performing arts enrich her cultural gatherings.
  travel: Asalia Feliciano prefers thoughtfully planned trips that mix gentle adventure with cultural immersion, having recently organized a slow‑paced road tour to Sedona’s red rocks, a week‑long pilgrimage
    to Oaxaca’s historic markets, and a leisurely cruise along the California coast, always booking accommodations well in advance and using a travel journal to catalogue each stop.
  culinary: Asalia Feliciano’s culinary persona shines in her kitchen where she expertly prepares mole poblano with ancho and pasilla chilies, hand‑rolled tamales stuffed with pork and masa, and fresh pico
    de gallo bursting with cilantro and lime, treating each dish as a laboratory and insisting on high‑quality heirloom corn and locally sourced epazote, though she admits to over‑seasoning her salsas when
    experimenting.
  core: Asalia Feliciano blends disciplined engineering precision with vibrant cultural stewardship, channeling her structured mindset into community mentorship, meticulous budgeting, and a zest for desert
    gardening, while her sociable spirit fuels a bustling senior choir, bridge table, and intergenerational celebrations—punctuated by a fondness for heirloom chilies and occasional forgetfulness about
    flu shots.
background:
  cultural: Born to Mexican immigrant parents, Asalia grew up in a bilingual household rich with Mexican traditions such as Día de los Muertos, family gatherings, and folk music. Living in Tucson, she remains
    deeply connected to the vibrant Mexican‑American community, integrating her heritage into daily life through cuisine, storytelling, and cultural celebrations while embracing the desert environment and
    the collaborative spirit of her neighborhood.
