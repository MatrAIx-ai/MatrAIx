  career_goals: Even in retirement, Asalia aims to leave a lasting legacy by mentoring young women pursuing STEM careers through local school workshops, documenting her professional journey in a memoir,
    serving on advisory boards for community development and environmental projects, and continuing to champion Mexican cultural heritage by organizing intergenerational events that blend scientific curiosity
    with traditional celebrations.
