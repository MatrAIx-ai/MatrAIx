personas:
  professional: Kelly Boggs, an aspiring graphic designer, blends a curiosity for sci‑fi visual motifs with a practical mastery of Adobe Illustrator and hand‑sketching, and they apply this balanced love
    of new ideas and proven methods to produce eco‑focused multimedia projects for school clubs and local conservation groups.
  sports: Kelly Boggs plays forward on the high school varsity soccer team, joins weekend pickup basketball games at the community park, and hikes regional pine‑forested trails for cardio, cheering on the
    U.S. Women’s National Soccer Team while valuing flexible practice schedules that accommodate their love of outdoor exploration, and they often forget to bring water during spontaneous hikes.
  arts: Kelly Boggs spends evenings sketching fantasy characters inspired by Hayao Miyazaki and listening to indie playlists featuring Billie Eilish and Tame Impala, while curating a digital illustration
    portfolio on Procreate that reflects a quirky mix of pop culture references and wildlife motifs, and they occasionally stay up late perfecting line work despite early school mornings.
  travel: Kelly Boggs dreams of road‑tripping to Yosemite and Acadia National Parks, opting for spontaneous day hikes and budget‑friendly hostels that let them capture sunrise photos of pine forests, yet
    they often delay planning due to a preference for last‑minute spontaneity, and they sometimes rely on their friends' car to make the journey happen.
  culinary: Kelly Boggs loves experimenting with cupcakes, recently perfecting a vanilla cupcake topped with lavender cream cheese frosting and a pinch of edible rose petals, while also whipping up quick
    avocado‑quinoa bowls for dinner, showing a beginner but enthusiastic culinary skill set, and they occasionally over‑mix batter when distracted by a new song.
  core: Kelly Boggs is a 16‑year‑old creative whiz who balances a love for eco‑focused graphic design, spontaneous cupcake baking, and occasional disorganized spontaneity with a strong sense of community,
    and they often find themselves juggling school projects while day‑dreaming about wildlife sketches.
background:
  cultural: Kelly grew up in a small, predominantly white community in the Florida Panhandle, where a laid‑back, outdoor‑oriented lifestyle and Southern hospitality are common. Her family values self‑reliance,
    community involvement, and a pragmatic approach to everyday life, emphasizing family gatherings, county fairs, and occasional church or school events. While her immediate cultural influences are rooted
    in rural Floridian traditions—such as fishing trips, camping, and neighborhood block parties—her middle school environment has exposed her to a broader regional diversity, including Hispanic cultural
    elements, which she experiences through language classes and community festivals.
attributes:
