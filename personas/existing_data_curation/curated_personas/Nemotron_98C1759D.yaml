  hobbies: '[''Reading fantasy and sci‑fi novels'', ''Sketching and basic digital illustration'', ''Nature photography'', ''Playing soccer'', ''Baking cupcakes and experimenting with recipes'', ''Hiking
    local parks and observing wildlife'', ''Playing video games (Minecraft, The Sims)'', ''Listening to pop and indie music'', ''Volunteering at the animal shelter'', ''Practicing basic Spanish'']'
  career_goals: Kelly hopes to turn her love for visual storytelling and her concern for the environment into a career, ideally in graphic design or multimedia communication for a conservation‑focused organization.
    She is also drawn to animal care and is considering veterinary technology, inspired by her volunteer work at the local shelter. After high school she plans to attend community college, exploring both
    design and natural sciences, before choosing a path that offers creative freedom, practical stability, and the flexibility she values.
