personas:
  professional: Lana Collins is a veteran mechanical assembler and CNC programmer who blends meticulous blueprint‑reading and welding expertise with a hands‑on leadership style, championing safety compliance
    and routine‑driven workflow improvements as they prepare to step into a shift‑supervisor role and mentor new hires.
  sports: Lana Collins is a lifelong fan of the Chicago Bears and the Milwaukee Bucks, frequently joining the Rotary Club’s watch parties, while also cheering the local high‑school Tigers football and Hawks
    basketball teams at every home game, and they maintain personal fitness through regular walks on the nearby Pine Creek nature trail.
  arts: Lana Collins expresses creativity through a weekly quilting circle where they repurpose vintage fabrics into intricate patchwork, sings alto in the church choir interpreting classic gospel songs
    by Mahalia Jackson, and enjoys attending community theater productions of classic American plays, often quoting lines from Rodgers and Hammerstein after rehearsals.
  travel: Lana Collins prefers organized, purpose‑driven trips, often traveling with Rotarian groups to historic Midwestern towns like Galena and to volunteer at senior‑care facilities in New Orleans, while
    their bucket list includes a relaxed road‑trip along Route 66 with stops at vintage diners and a weekend getaway to the Grand Canyon for sunrise photography.
  culinary: Lana Collins delights in cooking hearty Midwestern comfort food, mastering dishes such as pork tenderloin with apple‑onion glaze, chicken pot pie, and butter‑rich corn casserole, and they savor
    incorporating fresh herbs from their community garden into each meal while occasionally experimenting with homemade raspberry crisp for the senior center pot‑luck.
  core: Lana Collins blends a love for routine and community service with a practical, hands‑on approach—whether tightening a CNC safety latch, stitching a new quilt block, or marching to the rhythm of
    the choir—while occasionally overcommitting to volunteer events and double‑checking every detail.
background:
  cultural: Lana is a white Midwesterner from Defiance County, Ohio, whose family roots trace back to German and Irish immigrants who settled the region in the early 20th century. Raised in a small-town,
    Protestant (Methodist) community, she internalized values of hard work, modesty, self-reliance, and community service. The local culture emphasizes agricultural heritage, manufacturing pride, and traditional
    American holidays like Thanksgiving and Independence Day. These influences shape her practical outlook, love of routine, and sociable, community-oriented personality.
attributes:
  skills: '[''Mechanical assembly'', ''Blueprint reading'', ''MIG/TIG welding'', ''CNC machine operation'', ''Quality inspection'', ''Troubleshooting'', ''Safety compliance'', ''Team leadership'', ''Inventory
    management'', ''Basic CAD drafting'', ''Forklift operation'']'
  hobbies: '[''Quilting'', ''Community gardening'', ''Church choir singing'', ''Volunteer work at senior center'', ''Cooking Midwestern comfort food'', ''Bridge (card game)'', ''Attending high school football
    and basketball games'', ''DIY home renovation projects'', ''Walking local nature trails'', ''Rotary Club social events'']'
  career_goals: Lana aims to advance to a shift-supervisor role where she can mentor new hires and improve production efficiency. She plans to complete her associate degree in industrial technology and
    obtain a CNC programming certification. Over the next few years she hopes to lead a small team, streamline workflow, and eventually transition into a part-time consulting role helping local manufacturers
    adopt best-practice safety and quality standards before retiring.
