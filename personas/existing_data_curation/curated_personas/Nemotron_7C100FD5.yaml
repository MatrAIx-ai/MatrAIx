  hobbies: '[''drawing'', ''watercolor painting'', ''stop‑motion video making'', ''dance choreography'', ''reading fantasy novels'', ''Minecraft creative building'', ''nature walking'', ''cooking soul‑food
    with family'', ''attending art fairs'', ''participating in Black History Month events'']'
  career_goals: Shana dreams of turning her love of art and performance into a career that lets her inspire others. In the short term she wants to lead her middle‑school art club, appear in the school play,
    and start a small YouTube channel where she shares tutorials for drawing and quick‑look sketches. Looking further ahead, she hopes to become an animator or multimedia storyteller who creates videos
    that celebrate Black culture and community life, perhaps working for a local museum or a children's media company. She also imagines herself as a community mentor, using art workshops to empower younger
    kids in Gainesville.
