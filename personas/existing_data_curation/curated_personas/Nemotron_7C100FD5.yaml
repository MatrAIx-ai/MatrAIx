personas:
  professional: A budding junior visual storyteller named Shana Oliver, who blends cartoon sketching, watercolor washes, and stop‑motion LEGO videos, channels their curiosity and sociable energy into creating
    vibrant, narrative‑driven art projects for school presentations and community murals, while often juggling school deadlines with spontaneous bursts of inspiration.
  sports: An energetic youth athlete named Shana Oliver, who loves dancing to pop and hip‑hop beats as a form of cardio, also participates in the local YMCA soccer league with the Gainesville Gators junior
    team, cheerfully cheering for the Florida Gators football squad on Saturdays, and sometimes joins a beginner swim class at the community pool, where they practice freestyle laps.
  arts: A passionate junior creator named Shana Oliver, who spends afternoons sketching characters from Disney's "Moana" and "Adventure Time", experiments with watercolor techniques reminiscent of local
    muralist collaborations at the Alachua County Library, and dances along to the beats of Beyoncé and Lil Nas X, letting these influences shape their own stop‑motion narratives.
  travel: A curious explorer named Shana Oliver loves weekend road trips to the nearby Sweetwater Wetlands for nature hikes and has taken a family vacation to Orlando's theme parks, while dreaming of a
    future backpack adventure to New York City’s Museum of Natural History and a seaside retreat in the Florida Keys, and they prefer spontaneous itineraries over rigid schedules.
  culinary: A budding home chef named Shana Oliver enjoys helping in the kitchen to perfect collard greens seasoned with smoked paprika, creamy mac and cheese with a crunchy breadcrumb topping, and sweet
    potato pie spiced with nutmeg, while they occasionally experiment by adding a splash of honey to their watercolor‑inspired desserts.
  core: A vivacious, talkative 11‑year‑old named Shana Oliver fuses art, music, and nature into daily adventures, thriving on spontaneous creativity while they juggle a scattered schedule and occasional
    forgetfulness about health and money matters.
background:
  cultural: Shana is a Black girl raised in Gainesville, Florida, where Southern hospitality blends with a vibrant, multicultural community. Her family is rooted in African‑American traditions—Sunday church
    services, gospel music, storytelling, and shared meals of collard greens, macaroni and cheese, and sweet potato pie. Growing up near the University of Florida, she has been exposed to campus cultural
    programs, local museums, and the city’s lively art scene. The annual Gainesville Black History Month parade and the community murals at the Alachua County Library have shaped her appreciation for heritage
    and civic pride. Her upbringing also reflects the natural Florida environment, with frequent visits to nearby wetlands and parks, fostering an early respect for nature that occasionally surfaces in
    her artwork.
attributes:
