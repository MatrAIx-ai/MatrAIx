personas:
  professional: Jon Edwards is an organized community arts coordinator who blends meticulous project management with a creative eye for photography and woodworking, and they lead volunteer teams to produce
    inclusive cultural programming in Jefferson City.
  sports: Jon Edwards channels their love of the outdoors into weekly hikes along the Appalachian foothills, participates in the local Jefferson City Hiking Club, roots for the St. Louis Cardinals, and
    they join a casual Saturday morning basketball pick‑up at the community center.
  arts: Jon Edwards is a passionate photographer and amateur painter who frequents the Missouri Repertory Theatre, attends acoustic performances by local folk bands like The Hightower Brothers, curates
    their own gallery of Ansel Adams‑style landscapes, and they find inspiration in the folk art of regional craftspeople.
  travel: Jon Edwards prefers weekend road trips that blend photography and cultural immersion, having explored Asheville's Blue Ridge Parkway, the historic French Quarter of New Orleans, and the art colonies
    of Taos, while they dream of a summer visit to Santa Fe's adobe museums.
  culinary: Jon Edwards enjoys cooking communal meals featuring dishes such as pan‑seared trout with lemon butter, fresh herb‑infused quinoa salad, and homemade sourdough, often sourced from local farmers'
    markets, and they pair these meals with a glass of Missouri Riesling.
  core: Jon Edwards is a methodical yet adventurous community arts champion who balances meticulous budget‑keeping with a zest for photography, hiking, and collaborative cooking, and they occasionally indulge
    in impulse purchases of vintage gear.
background:
  cultural: 'Raised in a small Tennessee town, Jon grew up immersed in Southern hospitality, church‑centered community life, and Appalachian folk traditions. His family emphasized reliability, hard work,
    and a love for local music and storytelling. While rooted in these values, he was also encouraged to explore broader artistic and intellectual horizons, a blend that fuels his appreciation for both
    regional craft and contemporary art. This dual influence shapes his worldview: a respect for tradition paired with an openness to new ideas and varied experiences.'
attributes:
  skills: '[''Event planning'', ''Community outreach'', ''Project coordination'', ''Budget management'', ''Basic graphic design'', ''Photography'', ''Woodworking'', ''Public speaking'', ''Volunteer management'',
    ''Digital literacy (Microsoft Office, email)'']'
  hobbies: '[''Photography'', ''Playing acoustic guitar'', ''Woodworking projects'', ''Attending live theater and concerts'', ''Exploring local art galleries'', ''Hiking in the Appalachian foothills'',
    ''Volunteering at the Jefferson City Library'', ''Cooking and hosting dinner parties'', ''Reading art history and modern philosophy'', ''Gardening'']'
  career_goals: Jon aims to channel his organizational talent and artistic curiosity into a part‑time role as a community arts program coordinator or nonprofit project consultant in Jefferson County. He
    hopes to launch a series of free workshops that blend local folk art, photography, and hands‑on crafts, while also mentoring younger volunteers to develop leadership skills. Long‑term, he envisions
    serving on the board of the city’s cultural center to shape inclusive, creative programming for residents of all ages.
