personas:
  professional: Pearlie Murphy, a budding preschool leader with a penchant for organizing make‑believe tea parties, demonstrates a natural mix of curiosity for how things work and a practical streak for
    keeping snacks within easy reach, yet often lets the crayons wander off the table because strict order feels too confining.
  sports: Pearlie Murphy, a lively member of the neighborhood Tot‑Trot soccer club, loves chasing the bright orange ball after school, cheers for the local Major League Baseball team the Chicago Cubs whenever
    they watch on TV, and occasionally joins the after‑school gymnastics class to tumble and flip, despite habitually forgetting to return a borrowed water bottle.
  arts: Pearlie Murphy delights in drawing bright dinosaurs with crayons, sings every lyric from Disney's Frozen soundtrack at bath time, and basks in Saturday morning cartoons featuring the whimsical adventures
    of Peppa Pig, while also quietly practicing simple dance steps from a kids’ yoga video by Super Simple Songs.
  travel: Pearlie Murphy prefers spontaneous family road trips to the nearby beach where they build sandcastles, dreams of tasting the magical lights of Disneyland in California, and keeps a doodle‑filled
    travel journal with stickers from the local zoo and a map of their imagined journey to the Grand Canyon, rather than planning elaborate itineraries.
  culinary: Pearlie Murphy favors the creamy comfort of mac and cheese with a sprinkle of cheddar, insists on buttered toast cut into dinosaur shapes, enjoys helping stir the batter for banana pancakes
    on weekends, but can be stubborn about eating green peas, often swapping them for gummy fruit snacks.
  core: Pearlie Murphy is a four‑year‑old whirlwind of curiosity and calm, who navigates the world with a practical imagination, a love for group play, and an endearing habit of leaving crayons scattered
    wherever they go.
background:
  cultural: Pearlie is raised in a close‑knit Black family in Summerville, South Carolina, where community, family ties, and Southern hospitality are central. Her weekends often begin with Sunday church
    services that feature gospel music and uplifting sermons, followed by family meals of soul‑food favorites like collard greens, cornbread, and sweet tea. She participates in neighborhood block parties
    and local festivals that celebrate African‑American heritage, such as Juneteenth and Kwanzaa, where storytelling, music, and dance are shared across generations. Her grandparents often tell her stories
    about their lives in the South, instilling a sense of resilience, pride, and respect for her cultural roots while encouraging her curiosity about the world.
attributes:
  skills: '[''basic counting (1-10)'', ''recognizing letters A-E'', ''drawing basic shapes'', ''cooperative play'', ''simple problem solving with puzzles'', ''basic phonemic awareness'', ''sharing and taking
