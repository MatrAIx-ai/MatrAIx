  hobbies: '[''drawing and coloring'', ''singing nursery rhymes'', ''building block towers'', ''playing hide-and-seek with friends'', ''exploring backyard nature'', ''attending storytime at the library'',
    ''dancing to children’s music'']'
  career_goals: Pearlie dreams of growing up to be someone who helps others learn and stay happy. She often says she wants to be a teacher because she enjoys sharing stories and helping friends understand
    new things. She also loves animals and sometimes imagines being a veterinarian to care for pets. Her ambitions are shaped by her caring nature, her love of group activities, and her calm confidence
    in trying new roles.
