persona_description: A professional who is highly sensitive to the demands and stress of their job, and who has experienced burnout. This individual is likely to be a healthcare professional, such as a
  physician or a mental health worker, who has seen the devastating effects of burnout on their patients and colleagues. They may be motivated by a desire to make a difference in the lives of others and
  to help alleviate the suffering caused by burnout. They may also be aware of the potential health risks associated with burnout and may be committed to advocating for policies and practices that can help
  prevent and mitigate burnout.
