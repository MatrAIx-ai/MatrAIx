  hobbies: '[''Gardening'', ''Cooking traditional South Asian cuisine'', ''Book club participation'', ''Volunteer reading programs for children'', ''Attending cultural festivals (Diwali, Eid)'', ''Yoga
    practice'', ''Nature photography'', ''Traveling to India'', ''Knitting'', ''Walking in local parks'', ''Birdwatching'']'
  career_goals: Reshma aims to expand the library’s role as a cultural hub by creating a digital archive of South Asian diaspora literature and oral histories, ensuring these resources are accessible to
    both scholars and the local community. She hopes to mentor emerging librarians, especially those from underrepresented backgrounds, through workshops and one‑on‑one coaching. Securing funding for a
    mobile library service that reaches senior residents in rural Bucks County is a priority, as is establishing a multicultural storytelling series that brings together schools, community centers, and
    cultural organizations. Over the next few years, she envisions serving on a regional advisory board to shape inclusive library policies statewide.
