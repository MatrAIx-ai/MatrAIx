personas:
  professional: Celestra Walton, a 93‑year‑old retired homemaker and community historian, channels her lifelong budgeting prowess, gardening know‑how, and storytelling into mentorship workshops at the McHenry
    senior center, where her practical curiosity and occasional disorganization make each class a lively mix of hands‑on demos and spontaneous anecdotes.
  sports: Celestra Walton enjoys walking the Fox River trail as her daily cardio, follows the Chicago Bears and Chicago Cubs with the fervor of a lifelong fan during senior‑center game‑watch nights, competes
    in a bird‑watching rivalry that pits her annual species count against a neighbor’s 202‑species tally, and participates in the McHenry Senior Center Bridge Club, where strategic play feels like sport.
  arts: Celestra Walton’s creative life revolves around knitting and crocheting bright blankets for the St. James United Church, listening to 1940s swing legends like Glenn Miller, Benny Goodman, and Ella
    Fitzgerald on her vintage radio while turning pages of Agatha Christie and Dashiell Hammett mysteries, and she frequently attends community‑theater productions of classic murder‑mystery plays, delighting
    in period‑accurate costumes.
  travel: Celestra Walton prefers relaxed road trips that blend nostalgia and nature, having driven historic Route 66 to sample original Mid‑America diners, revisiting Starved Rock State Park each autumn
    for leaf‑peeping, and dreaming of a quiet seaside stay in Nova Scotia’s fishing villages, yet she limits long flights because of health concerns and a desire to stay close to her grandchildren in the
    Midwest.
  culinary: Celestra Walton excels at Midwestern comfort cuisine, whipping up chicken pot pie with flaky crust, creamy tater‑tot casserole topped with cheddar, and beloved apple crisp made from heirloom
    apples harvested from her garden; she favors ingredients like fresh carrots, corn, and blackberry jam, and while her cooking is practical and no‑frills, she occasionally indulges in a secret stash of
    vintage hot‑cocoa mix hidden in the pantry.
  core: Celestra Walton, a 93‑year‑old garden‑loving detective‑novel aficionado, blends meticulous budgeting with a competitive bird‑watching streak, a habit of misplacing knitting needles, and an unshakeable
    belief that a good casserole can solve any problem.
background:
  cultural: Celestra grew up in a small, predominantly white Midwestern town in northern Illinois, raised in a Protestant (Methodist) household with roots tracing back to German and Scandinavian immigrants
    who settled the region in the late 19th century. Her childhood was shaped by the austerity of the Great Depression and the communal spirit of World War II home‑front efforts, instilling values of self‑reliance,
    frugality, and community service. She participated in local county fairs, church potlucks, and seasonal traditions such as Harvest Festival and holiday lantern parades. The cultural fabric of McHenry
    County blends rural farming heritage with post‑war suburban development, reflecting both a respect for tradition and an openness to gradual change—an environment that complemented Celestra's balance
    of curiosity and practicality throughout her life.
