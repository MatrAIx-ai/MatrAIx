  career_goals: Although retired, Celestra aims to become a mentor for younger neighbors at the McHenry senior center, offering workshops on gardening, cooking, and family history research. She hopes to
    compile a memoir of her life, preserving the perspectives of a woman who lived through the Great Depression, World War II, and the rapid suburban growth of the region. She also aspires to lead a local
    history project that records oral testimonies from longtime residents, thereby strengthening community identity. Finally, she wishes to stay physically active by joining weekly walking groups and to
    advocate for age‑friendly policies in McHenry County, ensuring seniors have easy access to public transportation and recreational spaces.
