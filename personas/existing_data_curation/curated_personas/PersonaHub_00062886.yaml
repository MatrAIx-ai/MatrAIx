persona_description: A virtual-world science center that creates immersive and interactive exhibits in Second Life (SL) for visitors to explore and learn about science and technology. The center is known
  for its unique approach to education, where visitors can walk around and interact with exhibits, and for its collaboration with other educational content creators in-world. The center has hosted live
  webcasts and events, including astronomy presentations and Pi Day events, and has built an entire island called Sploland filled with both serious and humorous exhibits. The center is part of a group of
  science-technology-themed SL locations called SciLands, and is looking to expand its offerings and reach new audiences.
