personas:
  professional: Ofelia Reyes is a senior library specialist who leverages her expertise in MARC21 and RDA cataloging, digital preservation, and bilingual patron services to design meticulously organized
    special collections while mentoring staff and championing culturally relevant programming.
  sports: Ofelia Reyes enjoys hiking the nearby Cascades with the Tacoma Outdoor Hiking Club, follows the Seattle Mariners during baseball season, supports the Tacoma Defiance in soccer, and practices gentle
    yoga on weekends to balance her structured routine.
  arts: Ofelia Reyes devotes evenings to crafting traditional papel picado and embroidery while immersing herself in historical novels by Abel Posse, appreciates the murals of Diego Rivera, and frequently
    listens to Lila Downs and the Tacoma Symphony Orchestra, allowing artistic expression to complement her methodical mind.
  travel: Ofelia Reyes prefers meticulously planned trips, having trekked the historic streets of Oaxaca, explored colonial Granada, and organized a family pilgrimage to the vineyards of Napa Valley, while
    dreaming of a solo journey through the castles of Wales, always booking through a boutique travel agency that offers small‑group tours.
  culinary: Ofelia Reyes favors cooking family recipes such as mole poblano, tamales wrapped in corn husks, and chiles en nogada, expertly seasoning with dried ancho and fresh garden cilantro, and enjoys
    experimenting with seasonal vegetables from her own plot, though she sometimes forgets to rotate pantry stock.
  core: Ofelia Reyes is a methodical librarian whose love for history, precise cataloging, and craftful rituals coexist with a tendency to over‑budget on yarn and a quiet penchant for late‑night novel marathons.
background:
  cultural: Ofelia was born to Mexican immigrant parents and grew up in a bilingual household, celebrating traditions such as Día de los Muertos and Mexican Independence Day while also embracing the multicultural
    environment of the Pacific Northwest. Her Mexican heritage informs her commitment to culturally relevant library services, especially bilingual programming, and she maintains close ties with both her
    local Latino community and her extended family in Mexico.
attributes:
  skills: '[''Cataloging (MARC21, RDA)'', ''Metadata creation'', ''Archival preservation'', ''Reference services'', ''Bilingual Spanish-English patron support'', ''Digital repository management'', ''Collection
    development'', ''Grant writing'', ''Project coordination'', ''Cultural heritage programming'']'
  hobbies: '[''Reading historical fiction'', ''Crafting papel picado'', ''Cooking Mexican cuisine'', ''Gardening'', ''Hiking'', ''Small-group book clubs'', ''Knitting and embroidery'']'
  career_goals: She aims to advance to a senior leadership role such as Library Director or Head of Special Collections, spearhead a regional digital preservation initiative that safeguards local historical
    records, expand bilingual outreach programs to serve the growing Latino community in Tacoma, obtain certification in digital librarianship, and mentor junior staff while maintaining a balanced work‑life
    integration.
