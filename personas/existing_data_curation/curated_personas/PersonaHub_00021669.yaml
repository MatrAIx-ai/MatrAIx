persona_description: A historian who specializes in the study of the American Civil War, particularly the Reconstruction era following the war. This historian is interested in the impact of the Emancipation
  Proclamation on the Civil War and the Reconstruction era, as well as the legacy of the Civil War and its impact on American society. This historian is also interested in the role of the Thirteenth Amendment
  in the end of slavery and the impact of the Civil War on American white supremacy and the nation-state.
