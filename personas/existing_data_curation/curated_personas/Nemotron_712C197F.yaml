  hobbies: '["playing soccer with friends", "dancing to bomba and plena", "playing percussion instruments", "building LEGO sets", "solving puzzles", "reading adventure comics", "drawing cartoons", "participating
    in school theater", "exploring historic Ponce", "watching local children''s TV shows"]'
  career_goals: Matthew dreams of becoming a host for a children’s TV program that celebrates Puerto Rican culture and community stories, allowing him to combine his love for public speaking, organization,
    and sociable energy. He also envisions coaching a youth soccer team to mentor younger kids. Inspired by his caring nature, he sometimes imagines a future as a teacher or doctor, roles that let him help
    friends, family, and neighbors while providing structure and reliability in their lives.
