personas:
  professional: Matthew Rodriguez, a budding LEGO architect and classroom team leader, harnesses their love for structure and puzzles to design intricate model skylines for school projects, while naturally
    stepping into the role of charismatic coordinator during group activities.
  sports: Matthew Rodriguez thrives on the soccer field at the barrio park, playing as a forward for the local Ponce Soccer Academy, idolizing the Puerto Rico national soccer team and cheering for the Cangrejeros
    de Santurce baseball squad during off‑season, and they maintain a disciplined routine of daily dribbling drills and weekend matches to channel their boundless energy.
  arts: Matthew Rodriguez immerses themselves in creative expression by dancing to bomba and plena rhythms during family celebrations, practicing percussion on hand‑crafted drums, sketching comic‑style
    cartoon characters inspired by the works of creator Jeff Smith, and they frequently admire the vibrant murals of local street artist Lobo in Ponce, fueling a growing passion for visual storytelling.
  travel: Matthew Rodriguez prefers family‑guided day trips that blend structured itineraries with spontaneous exploration, often revisiting the historic district of Ponce to study colorful murals, taking
    weekend excursions to Old San Juan’s forts, and dreaming of a future adventure to the cobblestone streets of Cartagena, all while they keep a handwritten travel journal to soothe their worries about
    the unknown.
  culinary: Matthew Rodriguez delights in the comforting flavors of mofongo made with fried plantains, adobo‑spiced chicken, and a dash of garlic, eagerly helps their family stir the sauce for homemade
    pizza topped with mozzarella, olives, and fresh basil, and they proudly claim the title of junior sous‑chef whenever the kitchen smells of simmering sofrito.
  core: Matthew Rodriguez is a talkative, structure‑loving ten‑year‑old who channels nervous energy into meticulous LEGO builds and lively soccer matches, yet often worries about meeting expectations and
    they can’t resist a good puzzle before bedtime.
background:
  cultural: Matthew comes from a Puerto Rican family in Ponce, a city renowned for its rich Afro‑Caribbean heritage, historic architecture, and vibrant festivals. His family participates in traditional
    celebrations such as Las Fiestas Patronales, where music, dance, and food play central roles. Meals at home often feature lechón asado, arroz con gandules, and mofongo, and conversations flow in both
    Spanish and occasional English due to media influence. Raised with Catholic values, he respects elders, helps clean neighborhood sidewalks, and assists at the local church. The coastal environment,
    love for baseball and soccer, and the rhythms of bomba and plena shape his everyday life, fostering a strong sense of community and cultural pride.
attributes:
  skills: '["bilingual Spanish-English communication", "public speaking for school presentations", "organizing group activities", "basic mathematics and problem solving", "puzzle solving (Sudoku, jigsaw)",
