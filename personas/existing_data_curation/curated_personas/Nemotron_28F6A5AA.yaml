personas:
  professional: Thomas Colon, a seasoned corporate manager in the STEM sector, leverages PMP, Agile, Six Sigma, and advanced analytics in Excel, SQL, and Python to drive lean, technology‑driven initiatives,
    while their curiosity for art and meticulous nature ensure every project is documented with precision and infused with creative design thinking.
  sports: Thomas Colon spends early mornings hiking the coastal trails of York County, sails on weekends with the Casco Bay Yacht Club, follows the New England Patriots, Boston Red Sox, and Portland Sea
    Dogs, and they schedule bi‑weekly strength‑training sessions at a local gym to counterbalance the back strain from woodworking.
  arts: Thomas Colon frequently visits the Portland Museum of Art to study Edward Hopper and Monet, curates a black‑and‑white coastal photography series inspired by Ansel Adams, and attends intimate jazz
    evenings featuring the Miles Davis Legacy Band, while they often quote Heidegger during design brainstorming sessions.
  travel: Thomas Colon prefers meticulously planned, low‑key getaways that blend cultural immersion with coastal scenery, having explored Boston’s historic neighborhoods, Iceland’s fjords, and Tuscany’s
    vineyards, and they dream of sailing the Greek islands of Santorini and hiking Patagonia’s Torres del Paine when time permits.
  culinary: Thomas Colon, an accomplished home‑brewer, delights in pairing a crisp New England IPA with a classic lobster roll, regularly prepares cedar‑plank salmon seasoned with dill and lemon, and they
    enjoy occasional splurges at farm‑to‑table restaurants featuring heirloom beet salads and locally sourced goat cheese.
  core: Thomas Colon, a methodical yet art‑obsessed corporate strategist, balances spreadsheets with sunrise photography, worries about the next deadline while perfecting craft‑beer recipes, and habitually
    reorganizes their bookshelf by color.
background:
  cultural: Thomas grew up in a middle‑class New England family rooted in the coastal communities of Maine. His ancestry is primarily Anglo‑American, with deep ties to the region’s maritime and agricultural
    heritage. The cultural values of self‑reliance, modesty, and a strong work ethic—hallmarks of the New England Puritan legacy—shaped his disciplined approach to both his career and personal life. At
    the same time, the vibrant local arts scene, including community theaters, craft fairs, and historic preservation societies in York County, cultivated his appreciation for artistic expression. Thomas
    actively participates in community initiatives such as the Gorham Historical Society and volunteers at the local library’s adult education programs, reflecting a blend of traditional New England communal
    responsibility and a modern, curiosity‑driven outlook.
