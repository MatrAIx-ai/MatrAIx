  career_goals: Thomas aims to transition from operational management to a strategic leadership role such as Director of Operations or Vice President of Strategy within the next five years, focusing on
    integrating sustainability and innovation across the company's product line. He wants to lead initiatives that combine his technical expertise with his passion for the arts, such as spearheading corporate
    social responsibility programs that support local arts education and community projects. He also aspires to mentor the next generation of engineers, develop a mentorship framework for his organization,
    and eventually launch his own consulting boutique that helps midsize firms adopt lean, technology‑driven processes while preserving a human‑centric workplace culture. A personal ambition is to achieve
    a healthier work‑life balance, incorporating mindfulness practices to mitigate stress.
