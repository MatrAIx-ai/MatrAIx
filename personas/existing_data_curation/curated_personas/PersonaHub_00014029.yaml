persona_description: A climate researcher who specializes in studying the effects of El Niño on orangutan populations in Borneo. She is interested in understanding how orangutans adapt to changing climatic
  conditions and how this adaptation may be influenced by the El Niño cycle. She is also interested in the impact of human-caused climate change on orangutan populations and the potential for orangutans
  to use migration as a strategy to adapt to changing climatic conditions.
