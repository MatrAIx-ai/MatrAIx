  career_goals: Approaching the culmination of a long career, Joseph aims to transition from full‑time courtroom work to a senior advisory role where he can shape policy and practice within the Boise legal
    community. He aspires to serve as a senior counsel for a boutique firm that focuses on probate, small‑business, and elder‑law matters, while also establishing a free legal‑aid clinic for low‑income
    seniors. Joseph hopes to publish a practical guidebook on navigating the Idaho legal system for everyday citizens, and to secure a seat on the Idaho State Bar’s Ethics Committee, where his emphasis
    on integrity and cooperation can influence the next generation of attorneys. A key personal ambition is to formalize a mentorship program that pairs experienced lawyers with recent bar graduates, thereby
    passing on his disciplined, organized approach to lawyering.
