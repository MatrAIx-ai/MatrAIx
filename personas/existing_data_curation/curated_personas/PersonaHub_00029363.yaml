persona_description: A professor who teaches courses in political science and international relations, with a particular focus on the intersection of race, gender, and international relations. They are
  experienced in teaching and learning about these topics, and are aware of the diverse perspectives and voices related to these issues. They are also sensitive to the negative rhetoric and the potential
  for students to feel unsafe and unwelcome amidst the current political climate. They are prepared with self-care strategies and have a strong commitment to including the voices and perspectives of marginalized
  groups in their course materials and texts. They are aware of the challenges of teaching in this context and are available to talk with instructors about planning courses or class sessions or responding
  to difficult moments if they arise.
