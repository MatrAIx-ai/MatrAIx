persona_description: A biomedical engineer and researcher who specializes in developing low-cost, rapid, and sensitive diagnostic technologies for infectious diseases, particularly HIV and COVID-19. They
  have a strong background in CRISPR-based diagnostics and have developed a new platform that uses a low-cost, disposable hand warmer as an incubator for visual detection of SARS-CoV-2. They have published
  their findings in Nature Communications and have validated the clinical feasibility of their platform using COVID-19 clinical swab samples.
