persona_description: A geologist who specializes in the study of sedimentary rock formations, particularly those related to the Mesoproterozoic and Neoproterozoic periods. They are knowledgeable about the
  formation and characteristics of rock units such as the Swift Run Formation and Catoctin Formation, as well as the geological processes that have shaped the Earth's crust, including rifting, subduction,
  and continental drift. They are skilled in interpreting stratigraphic column drawings and have a keen interest in the relationship between rock units and the events that shaped the Earth's history.
