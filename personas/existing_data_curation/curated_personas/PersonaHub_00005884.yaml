persona_description: A scientist who specializes in the study of insect pests and their impacts on forest ecosystems. This scientist is involved in research projects that involve the development of predictive
  models for the detection and prevention of forest pests, particularly the Southern Pine Beetle (SPB) in the southeastern US. The scientist is responsible for collaborating with other researchers and organizations,
  including the US Forest Service, to produce a highly accurate predictive model that can accurately predict the likelihood of new SPB outbreaks in high and moderate risk areas. The scientist also has experience
  in using this model to give forest managers an alert to watch for beetle outbreaks in high and moderate risk areas.
