personas:
  professional: Angel Tyson is a diligent machine operator at a Montgomery packaging plant, excelling at high‑speed equipment maintenance, data‑driven quality inspection, and training new staff, and they
    leverage their organized, methodical nature to streamline processes while fostering a collaborative floor environment.
  sports: Angel Tyson fuels their fitness routine with weekly Zumba classes at a local community center, early‑morning jogs in Oak Park, and weekend cycling rides with the Montgomery Cycle Club, while cheering
    for the Alabama Crimson Tide football squad and the Atlanta Falcons as their favorite seasonal teams, and they never miss a chance to join the community's pick‑up basketball games.
  arts: Angel Tyson finds creative fulfillment leading the church’s gospel choir, where they channel the spirit of Aretha Franklin and Kirk Franklin, they also dance to R&B hits by Beyoncé and hip‑hop anthems
    from Kendrick Lamar at community gatherings, and they unwind with contemporary novels by Sally Rooney and Ocean Vuong, weaving these artistic influences into their daily rhythm.
  travel: Angel Tyson embraces weekend getaways, preferring road trips to nearby gems like New Orleans for its vibrant jazz scene and Savannah’s historic squares, while dreaming of a solo backpacking adventure
    through the national parks of the Pacific Northwest, they balance travel planning with a modest budget by snapping up off‑season deals and packing meals from their own kitchen.
  culinary: Angel Tyson is a spirited home‑cook who masterfully prepares Southern soul‑food delights like smoked collard greens seasoned with smoked turkey, crispy fried catfish paired with hush‑puppy cornmeal
    fritters, and sweet‑potato pie spiced with cinnamon and nutmeg, often sourcing fresh herbs and heirloom tomatoes from the local farmers’ market to elevate each potluck spread, and they love experimenting
    with new seasonal produce each month.
  core: Angel Tyson balances a meticulous, planner‑driven work ethic with an infectious love for gospel singing, yet they can’t resist staying up late binge‑watching reality TV after a potluck, often swapping
    a night‑out for an extra cup of coffee to power through late‑night study sessions.
background:
  cultural: Angel identifies as African American and grew up in Montgomery, a city steeped in civil‑rights history. Her family's strong ties to the local Black church and community have instilled values
    of resilience, hospitality, and collective advancement. She celebrates cultural traditions such as Juneteenth, soul‑food cooking, and church‑based events, while also honoring the legacy of Montgomery’s
    activists by participating in local historical tours and community service. This blend of Southern hospitality and a proud African‑American heritage shapes her outlook, emphasizing both personal achievement
    and giving back to her community.
