  hobbies: '[''Church gospel choir'', ''Dancing (R&B, hip‑hop)'', ''Zumba fitness classes'', ''Jogging'', ''Cooking Southern soul food'', ''Organizing potlucks'', ''Reading contemporary fiction'', ''Jigsaw
    puzzles'', ''Mentoring STEM students'']'
  career_goals: Angel aims to advance from machine operator to shift supervisor within the next two years, leveraging her organizational strengths and collaborative style. She plans to earn a bachelor’s
    degree in industrial engineering or manufacturing management while obtaining Six Sigma Green Belt certification. Her long‑term ambition is to become a production manager overseeing multiple lines, and
    eventually to mentor and develop apprenticeship programs for young women in the Montgomery manufacturing sector. She also hopes to contribute to process‑improvement initiatives that increase efficiency
    and sustainability in her plant.
