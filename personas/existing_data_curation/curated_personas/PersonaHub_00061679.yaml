persona_description: A NASA astronaut who is returning to Earth after a mission that was made more dangerous by the loss of the space shuttle Columbia. He is the first person to return to Earth in a Soyuz
  spacecraft that has never made a descent before. He is expected to be the luckiest person to come from Earth for the next six months, as he will be living aboard the international space station with two
  other astronauts. He is also the first person to return to Earth with the reduced crew size of the space station.
