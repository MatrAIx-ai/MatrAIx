personas:
  professional: Andrew Ancrum is a dedicated information security analyst who leverages deep expertise in network security architecture, SIEM platforms like Splunk and QRadar, and Python automation to systematically
    hunt threats, while his competitive drive and meticulous curiosity compel him to double‑check every finding and continuously outpace emerging adversaries.
  sports: Andrew Ancrum fuels fitness by conquering the Potomac’s ridge trails, follows the Washington Capitals and DC United with a loyal season‑ticket mindset, and belongs to a low‑key local trail‑running
    club that meets monthly for early‑morning loops.
  arts: Andrew Ancrum channels a love for visual storytelling into sunrise landscape photography inspired by Ansel Adams, while devouring cyber‑punk novels by William Gibson and escaping to the synth‑driven
    soundscapes of Daft Punk and Aphex Twin during quiet evenings.
  travel: Andrew Ancrum prefers meticulously planned solo trips, having trekked Iceland’s volcanic craters, explored Tokyo’s Akihabara tech districts, and spent weekends at Virginia’s Shenandoah National
    Park, while dreaming of a future retreat in the Scottish Highlands to photograph misty lochs.
  culinary: Andrew Ancrum experiments in a compact kitchen, mastering sous‑vide salmon with miso glaze, crafting kimchi‑infused ramen, and tweaking flavor with sumac and black garlic, all while treating
    each dish as a controlled experiment measured by precise temperature logs.
  core: Andrew Ancrum is a solitary cyber‑security aficionado whose relentless curiosity fuels threat hunting, yet they hoard obscure hardware kits and often sacrifice social gatherings for the next puzzle.
background:
  cultural: Andrew identifies as African American, raised in a close‑knit Black middle‑class family in Montgomery County, Maryland. His parents, who grew up in the American South, emphasized education,
    self‑reliance, and community involvement. He attended an HBCU for his undergraduate studies, where he developed a strong sense of cultural pride and mentorship. In his daily life, Andrew draws inspiration
    from African‑American traditions, such as soul food cooking, jazz and hip‑hop music, and participation in local diversity initiatives within the tech sector. His cultural heritage informs his resilience,
    competitive drive, and desire to serve as a role model for other Black professionals entering cybersecurity.
