    awareness training development'']'
  hobbies: '[''Solitary hiking on local trails'', ''Reading science‑fiction and cyberpunk novels'', ''Playing strategic video games (e.g., Civilization, chess)'', ''Home lab tinkering with cybersecurity
    tools'', ''Arduino/Raspberry Pi projects'', ''Landscape photography'', ''Cooking experimental meals'', ''Puzzle solving (cryptograms, sudoku)'']'
  career_goals: Andrew aims to transition from his current analyst role to a senior security engineer position within the next two years, pursuing certifications such as CISSP, CISM, and OSCP to solidify
    his expertise. He envisions eventually leading a SOC or becoming a principal security architect, where he can design comprehensive security frameworks for critical infrastructure in the Washington‑DC
    metro area. Long‑term, Andrew hopes to launch a boutique consulting firm that provides threat intelligence and penetration testing services to government contractors and healthcare organizations, establishing
    himself as a recognized thought leader through conference talks and published research.
