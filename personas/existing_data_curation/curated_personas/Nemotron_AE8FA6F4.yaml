personas:
  professional: Isaac Crawford, a four‑year‑old with a budding love for building block structures, shows early architectural curiosity, methodical planning, and a reliable approach to completing projects,
    balancing creative play with a need for order.
  sports: Isaac Crawford, a young enthusiast who joins the local kindergarten soccer club, cheers for the New York Yankees and the Los Angeles Lakers on TV, and eagerly participates in weekend family bike
    rides along the park trail, showing a balanced, structured approach to fitness and team spirit.
  arts: Isaac Crawford, a preschool creative who delights in drawing cartoon dinosaurs, sings along to Mister Rogers and Sesame Street songs, and collects storybooks by Dr. Seuss, letting his imaginative
    flair shape his playtime while still preferring a tidy art supply drawer.
  travel: Isaac Crawford, an adventurous four‑year‑old who loves road‑trip snack packs, has collected stickers from visits to Disneyland, the beach at Gulf Shores, and the Grand Canyon, and prefers staying
    in family‑run motels with predictable bedtime routines over long flights.
  culinary: Isaac Crawford, a picky eater who adores creamy mac and cheese, chicken nuggets with honey mustard, and fresh strawberries, enjoys helping stir pancake batter with a small wooden spoon, yet
    consistently refuses broccoli and mushrooms, reflecting his structured palate and occasional stubbornness.
  core: Isaac Crawford, a four‑year‑old who thrives on routines, trades stickers for treats, and transforms block towers into engineering challenges while insisting on a 7 p.m. bedtime.
background:
  cultural: Isaac comes from a white, middle‑class family living in Hallandale, Florida, a suburb of Miami in Broward County. His household reflects typical Southern‑Florida American culture, celebrating
    holidays such as Thanksgiving, Christmas, and the Fourth of July with family gatherings and community events. Weekend trips to nearby beaches and visits to local parks are common. While his family’s
    heritage traces back to European roots (likely Anglo‑American), growing up in Hallandale exposes Isaac to a multicultural neighborhood where he hears Spanish music, sees diverse cuisines, and interacts
    with peers from many backgrounds, giving him an early appreciation for cultural variety while maintaining his core American upbringing.
