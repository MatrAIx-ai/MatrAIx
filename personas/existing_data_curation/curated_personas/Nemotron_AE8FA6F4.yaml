  career_goals: Even at four, Isaac imagines a future where he can help others and work in a highly organized setting. He often says he wants to become a firefighter because he admires the clear routines,
    teamwork, and the chance to rescue people. He also dreams about being an astronaut, fascinated by the structured training and the adventure of exploring outer space. In the short term, he aims to become
    the "big helper" at home, mastering tasks like tidying up his room and helping set the table, building the responsibility and reliability that will serve his future ambitions.
