  hobbies: '[''Watercolour painting'', ''Acoustic guitar playing and choir singing'', ''Organic gardening'', ''Cooking traditional Guatemalan cuisine'', ''Volunteering at senior center (reading, activity
    coordination)'', ''Attending local art exhibitions and craft fairs'', ''Collecting Guatemalan folk art and textiles'', ''Hiking nature trails in Warren County'', ''Exploring basic Mayan language words'',
    ''Writing memoirs and family stories'']'
  career_goals: Although retired, Antonio aims to stay active as a cultural facilitator and lifelong learner. He hopes to launch a monthly art-workshop at the senior center where he can guide participants
    through painting and art appreciation. He plans to develop a cultural-exchange program that brings Guatemalan folk stories, music, and cuisine into local school curricula, fostering cross-generational
    dialogue. Antonio also wishes to document his family's migration history and traditional recipes in a community-published booklet, preserving heritage for future generations. He looks forward to mentoring
    local youth in woodworking and Spanish language skills, and to traveling back to Guatemala to reconnect with relatives and explore historic sites. Completing an intermediate digital-photography course
    is another personal goal, allowing him to capture the natural beauty of Warren County and share it in community exhibitions.
