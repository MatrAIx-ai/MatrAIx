persona_description: A team of experts from Turkey's Ministry of Environment and Forestry, Ministry of Energy and Natural Resources, and relevant agencies in a member state of the European Union, who are
  responsible for managing and implementing the EU directive on managing waste from extractive industries in Turkey. They are seeking to strengthen Turkey's waste management capacity in the mining sector
  by adopting the relevant EU directive into national law. They are also responsible for reviewing the existing institutional, technical, and legal framework, developing guidelines on reducing, treating,
  and recovering of all types of mining waste, devising an action plan for preventing major accidents and minimizing their effects, training staff in implementing the directive, and preparing a database
  of all active, closed, and abandoned mining waste facilities to assess their environmental risk and compile rehabilitation plans for two sample mining facilities.
