persona_description: Michelle Leinfelder-Miles, Ph.D., is a farm advisor who specializes in crop production, water and soil quality, and addressing issues related to crop production in the Delta region
  of California. She grew up in San Joaquin County, just east of Stockton, where her family has been farming for six generations. She received her B.S. in Crop Science and Management from U.C. Davis and
  her M.S. and Ph.D. in Horticulture from Cornell University. Michelle's research focuses on soil management in apple orchards, as well as studies in Spain, Chile, and New Zealand. As the new Delta crops
  farm advisor, she will serve San Joaquin, Sacramento, Yolo, Solano, and Contra Costa counties, addressing issues related to crop production and water and soil quality.
