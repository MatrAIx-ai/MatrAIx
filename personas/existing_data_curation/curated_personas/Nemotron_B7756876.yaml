personas:
  professional: Glen Cole, a 33-year-old software developer with deep expertise in Java, C# and Python, leverages their methodical debugging and routine-driven mindset to steward legacy codebases and mentor
    junior engineers, envisioning a transition to software architect and eventually a consultancy that modernizes Midwestern small-business IT.
  sports: Glen Cole enjoys low-impact fitness, spending Saturday mornings on the Mississippi River practicing fly-fishing with the Dubuque Anglers Club, cheering the Iowa Hawkeyes football team in the fall
    and the Chicago Cubs during baseball season, and maintaining a steady routine of weekend hikes and occasional pickup basketball at the local community center.
  arts: Glen Cole’s artistic side surfaces through evenings listening to Bob Dylan and classical pieces by Bach while woodworking, reading science-fiction by Isaac Asimov and non-fiction by Malcolm Gladwell,
    occasional visits to the Dubuque Community Theatre for productions like "Our Town", and immersing themselves in the strategic storytelling of Civilization, which they regard as a digital canvas.
  travel: Glen Cole prefers meticulously planned road trips that blend quiet reflection with outdoor pursuits, having already explored the Upper Peninsula of Michigan’s forested trails, the serene farms
    of Vermont, and the historic river towns of the Mississippi Valley, while dreaming of a low-key fishing expedition to New Zealand’s South Island and a cultural pilgrimage to the historic streets of
    Edinburgh.
  culinary: Glen Cole, an adept home cook, often crafts hearty meals such as rosemary-roasted chicken with garden-fresh carrots and potatoes, pan-seared trout seasoned with dill and lemon, and a weekend
    vegetable stew featuring tomatoes, zucchini, and basil, while occasionally treating themselves to a locally brewed IPA after a successful woodworking project.
  core: Glen Cole is a methodical 33-year-old developer who balances a penchant for routine-driven reliability with a quiet love for fly-fishing, woodworking, and occasional overthinking that fuels both
    meticulous planning and occasional bouts of unnecessary worry.
background:
  cultural: Glen grew up in Dubuque, Iowa, within a Midwestern white community that values hard work, modesty, and reliability. His family has roots in German and Irish immigration, and he was raised in
    a Protestant‑Christian household that emphasized community service and regular church attendance. The cultural climate of Dubuque—small‑town friendliness, a strong sense of civic duty, and a connection
    to the Mississippi River’s outdoor lifestyle—shapes his preferences for routine, practical activities, and involvement in local events such as high‑school sports and community festivals.
attributes:
  skills: '["Java", "C#", "Python", "SQL", "Git", "Automated Testing", "Technical Documentation", "Debugging", "System Architecture", "Agile Development"]'
  hobbies: '["Woodworking", "Fly fishing", "Gardening", "Puzzle solving (crosswords, Sudoku)", "Reading sci‑fi and non‑fiction", "Strategy video games", "Volunteer coding workshops"]'
  career_goals: Glen aims to advance to a senior or lead developer role where he can mentor junior engineers while continuing to work on stable, high‑quality systems. He is interested in becoming a software
    architect focused on designing scalable, maintainable applications that support long‑term reliability. Because he values routine and low‑stress environments, he prefers positions with clear processes
    and predictable workloads, possibly within a mid‑size Midwest tech firm or a remote role that lets him stay in Dubuque. Over the next five years he hopes to earn professional certifications (e.g., AWS
    Certified Solutions Architect) and eventually open a small consultancy that helps local businesses modernize their IT infrastructure without sacrificing reliability.
