personas:
  professional: Wendy Summerville, a 14‑year‑old aspiring game developer, merges structured Scratch coding with comic‑style illustration, channeling the disciplined practice habits honed on the basketball
    court into meticulously planned mini‑games that balance storytelling and interactivity.
  sports: Wendy Summerville, a point guard on the middle school basketball team, adheres to a five‑day‑a‑week practice schedule, looks up to the Denver Nuggets and the WNBA’s Seattle Storm for inspiration,
    and supplements team drills with weekly jogs around City Park to maintain stamina and coordination.
  arts: 'Wendy Summerville, a diligent piano student and comic‑strip enthusiast, spends weekends mastering Beethoven sonatas, drawing panels inspired by ''Spider‑Man: Into the Spider‑Verse'', and curating
    playlists featuring R&B artists like H.E.R. and hip‑hop icons such as Kendrick Lamar to fuel creative flow.'
  travel: Wendy Summerville favors short, budget‑friendly road trips, has trekked the trails of Rocky Mountain National Park multiple times, dreams of exploring the Smithsonian museums in Washington, D.C.,
    and plans to attend New York Comic‑Con next summer, balancing family responsibilities with a part‑time babysitting job to fund the adventure.
  culinary: Wendy Summerville enjoys preparing avocado toast topped with poached eggs, baking homemade veggie pizza with mozzarella, basil, and cherry tomatoes, and blending berry‑spinach smoothies with
    chia seeds, though they sometimes forget to label leftovers, leading to occasional food waste.
  core: Wendy Summerville is a calm, organized teen who balances basketball drills, piano practice, comic art, and budding coding projects while meticulously budgeting their allowance and thriving on structured
    creativity.
background:
  cultural: Wendy belongs to a multigenerational African American family that has lived on Denver's west side since the 1970s. Her grandparents were active in the civil rights movement, imparting a strong
    sense of pride and resilience. She attends a historically Black church, celebrates Juneteenth and Black History Month, and participates in community events like the Denver Black Film Festival. Her family's
    traditions blend Southern cultural influences with the urban Colorado lifestyle, shaping her identity and fostering a deep connection to her community.
attributes:
  skills: '["Time management","Organizational skills","Basic arithmetic","Reading comprehension","Introductory coding (Python)","Team collaboration","Leadership in group projects","Problem solving","Home
    caretaking","Public speaking"]'
  hobbies: '["Basketball","Playing piano","Reading graphic novels","Drawing comics","Coding simple games in Scratch","Community gardening","Listening to R&B and hip‑hop","Attending local cultural festivals"]'
  career_goals: Wendy aims to graduate high school with strong grades in science and math, then pursue a pre‑veterinary program at a university. She is drawn to a structured, science‑based career that offers
    clear pathways and tangible community impact, ultimately wanting to become a veterinarian who provides affordable care for pets in Denver's underserved neighborhoods. Alongside this, she hopes to mentor
    younger Black students through STEM outreach, combining her passion for helping others with her desire for a stable, respected profession.
