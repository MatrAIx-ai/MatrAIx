  career_goals: In the short term, Maria aims to earn the Certified Production Technician (CPT) credential and move into a shift supervisor role within the next 12 to 18 months. Over the medium term, she
    plans to lead a continuous‑improvement team, implementing Lean projects that raise line efficiency by at least ten percent over two years. Her long‑term ambition is to transition into a plant training
    manager position, leveraging her bachelor's in education to develop comprehensive onboarding and skill‑development programs, or to pursue a master’s degree in Industrial and Organizational Psychology
    and eventually start her own consultancy focused on workforce development for manufacturing firms.
