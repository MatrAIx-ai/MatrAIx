  hobbies: '["Colouring and drawing", "Building with blocks", "Dancing to music", "Listening to picture book stories", "Visiting children’s museum or library", "Playdates with storytelling and role‑play"]'
  career_goals: Reginald dreams of becoming someone who helps and inspires others. He often says he wants to be a teacher who tells wonderful stories, an artist who paints bright pictures, or a community
    helper like a firefighter. His love for sharing and caring shapes a vision of a future where he brings joy and comfort to friends and family.
