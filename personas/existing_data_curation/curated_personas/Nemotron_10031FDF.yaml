  career_goals: Steven hopes to attend a STEM‑focused high school where he can deepen his coding and engineering skills, with the long‑term ambition of becoming an aerospace engineer who designs satellite
    components. At the same time, his love for team sports drives him to aim for a college scholarship in basketball, and he envisions using his engineering knowledge to improve sports equipment. He also
    wants to volunteer with local environmental groups, so he imagines a career that blends technical expertise with community service.
