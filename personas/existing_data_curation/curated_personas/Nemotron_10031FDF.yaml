personas:
  professional: Steven Doyle is a budding robotics enthusiast who spends Saturdays building sophisticated LEGO Technic and Mindstorms creations, they apply a practical‑curious mindset to program competitions
    while channeling the same competitive drive that fuels his after‑school basketball games.
  sports: Steven Doyle dominates the local middle‑school basketball league, idolizing the Denver Nuggets and the Chicago Bulls, they also ride a mountain bike on prairie trails as part of a community cycling
    club and camp under the stars after weekend games, blending competitive spirit with a love for outdoor endurance.
  arts: Steven Doyle devours science‑fiction novels by Isaac Asimov and Andy Weir, they edit wildlife photos taken on their digital camera while listening to Imagine Dragons, and they showcase their robot
    designs at regional comic‑con events, weaving artistic expression into their technical pursuits.
  travel: Steven Doyle prefers rugged, budget‑conscious getaways, they have camped at Badlands National Park and fished at Lake Sakakawea, dream of visiting the Kennedy Space Center in Florida, and meticulously
    plan bike tours across neighboring prairie towns, balancing adventure with school responsibilities.
  culinary: Steven Doyle loves the classic combo of pepperoni pizza and chocolate milk, they can whip up a quick microwavable mac‑and‑cheese, snack on trail mix during robotics practice, and experiment
    with grilling cheese‑filled quesadillas on a portable camp stove during weekend trips.
  core: Steven Doyle is a competition‑driven 12‑year‑old who fuses a love for fast‑paced basketball, meticulous robotics, and skeptical curiosity into a relentless quest for personal victory, they often
    juggle a tight allowance budget and occasional forgetfulness about hydration.
background:
  cultural: Steven grew up in Wichita Falls, a mid‑size city in north‑central Texas characterized by a mix of modest suburban neighborhoods and a strong sense of community. His family participates in typical
    regional traditions such as weekend barbecues, local high‑school football games, and seasonal festivals like the Texas Rodeo Reunion. He attends a public middle school with a diverse student body, where
    he’s exposed to both Southern hospitality and a growing interest in technology and STEM education. The cultural atmosphere, which blends Texan pride, community involvement, and an increasing emphasis
    on innovative learning, shapes his values of hard work, teamwork, and curiosity.
