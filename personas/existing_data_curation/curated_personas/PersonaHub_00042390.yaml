persona_description: A senior circuit designer who is interested in optimizing the performance of microprocessors, digital signal processors (DSPs), and other fast chips. This person is familiar with the
  challenges of reducing sequencing overhead in domino circuits and is looking for a systematic way to achieve the same goal while reducing the impact of clock skew. They are also interested in understanding
  the latest literature on skew-tolerant design and have a desire to learn from the experiences of senior designers who have developed their own techniques for reducing the sequencing overhead of domino
  circuits. This person is looking for a clear tutorial that presents skew-tolerant techniques and provides incisive instruction and advice punctuated by humorous illustrations, along with exercises to
  test understanding of key concepts and solutions to selected exercises.
