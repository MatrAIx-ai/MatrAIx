personas:
  professional: Ian Bullard is a seasoned long-haul truck driver with a commercial Class A license and hazmat endorsement, leveraging their meticulous route‑planning expertise, diesel troubleshooting skills,
    and top‑10% safety record to pursue a supervisory logistics role as they work toward CTP certification and dream of owning a small fleet.
  sports: Ian Bullard follows the Boston Red Sox with fervor, occasionally attends games at Fenway Park, participates in local fishing tournaments, and joins a small sailing club that practices on the New
    Bedford harbor each summer, while they prefer low‑impact workouts like brisk walks along the waterfront over intense gym sessions.
  arts: Ian Bullard enjoys the gritty realism of 19th‑century whaling paintings at the New Bedford Whaling Museum, relaxes to classic folk rock from Bob Dylan and The Decemberists, and occasionally attends
    community theater productions of maritime plays, finding that these artistic touches add texture to their otherwise pragmatic life.
  travel: Ian Bullard prefers meticulously planned road trips that combine fuel‑efficiency calculations with coastal scenery, having recently driven the Cape Cod National Seashore loop, sailed to Martha’s
    Vineyard, and dreaming of a future sailing expedition to the Bahamas, all while they balance family obligations and a modest travel budget.
  culinary: Ian Bullard favors New England seafood staples, regularly preparing clam chowder with fresh clams, potatoes, and cream, grilling lobster tails brushed with butter and garlic, and cooking BBQ
    pulled pork using a dry rub of paprika, brown sugar, and cayenne, while their cooking skill hovers at confident home‑chef level.
  core: Ian Bullard is a methodical, solitary logistics veteran who blends a love for vintage trucks, precise data‑driven efficiency, and New England maritime heritage into a disciplined yet occasionally
    indulgent lifestyle.
background:
  cultural: Born and raised in a working‑class family in New Bedford, Ian’s cultural background reflects traditional New England values of self‑reliance, punctuality, and community responsibility. As a
    white Anglo‑American with Irish ancestry, he grew up attending local Catholic parishes and celebrating holidays such as Thanksgiving and St. Patrick’s Day with family gatherings. The maritime heritage
    of New Bedford has shaped his appreciation for the sea, influencing his love of fishing and the local seafood cuisine. He identifies with the pragmatic, modest ethos of the region, valuing hard work,
    direct communication, and a straightforward approach to both work and personal life.
attributes:
