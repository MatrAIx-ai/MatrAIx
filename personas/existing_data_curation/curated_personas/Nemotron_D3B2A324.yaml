  hobbies: '[''Fishing in New Bedford harbor'', ''Sailing with spouse'', ''Restoring a vintage Chevrolet pickup'', ''Reading automotive repair manuals'', ''Participating in local fishing tournaments'',
    ''Historical tours of New Bedford’s whaling sites'', ''Building custom route‑optimization spreadsheets'', ''Watching Boston Red Sox games'', ''Volunteer coastal water‑quality monitoring'']'
  career_goals: He aims to transition from pure driving to a supervisory logistics role within the next three years, seeking a position as a fleet manager or operations supervisor where he can apply his
    safety record and sales experience to improve efficiency. He is pursuing additional certifications such as the Certified Transportation Professional (CTP) and Advanced Driver Safety Training. Long‑term,
    he hopes to acquire a small fleet of owner‑operator trucks to run a family‑owned freight brokerage, providing stable income for his family and mentoring younger drivers. He also intends to increase
    his sales volume, targeting key regional manufacturers and expanding his client base, while maintaining his top‑10% safety performance rating.
