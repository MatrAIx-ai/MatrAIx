personas:
  professional: Charles Jernigan, a 23‑year‑old construction laborer with a knack for reading blueprints and a passion for sustainable design, leverages their solid framing, masonry, and interior finish
    expertise to craft eco‑friendly interiors while sketching mural concepts on site, aiming to become a certified journeyman carpenter and later launch a design‑build firm that mentors emerging tradespeople.
  sports: Charles Jernigan enjoys playing pickup basketball with friends at the local recreation center, cheering on the Kentucky Wildcats, hikes the scenic trails along the Kentucky River on weekends,
    and casually joins a community running club for short jogs, preferring outdoor activity over gym workouts.
  arts: Charles Jernigan frequently explores Lexington’s street‑art corridors, sketching murals inspired by jazz and soul rhythms while listening to Kendrick Lamar, J Dilla, and Miles Davis, and they volunteer
    at art festivals to help erect installations, drawing creative influence from contemporary muralists such as Shepard Fairey and local visual storytellers.
  travel: Charles Jernigan favors spontaneous road trips that blend cultural immersion with creative inspiration, having road‑tripped to New Orleans for its music scene, to Asheville for its mountain art
    retreats, and planning a future visit to Detroit’s mural festivals, all while balancing a modest travel budget and the occasional family commitment.
  culinary: Charles Jernigan experiments in the kitchen by marrying Southern soul food staples—like fried chicken and collard greens—with global flavors such as Korean gochujang glaze and Moroccan harissa,
    rating their cooking skill as intermediate and often sourcing fresh herbs from the local farmers’ market to elevate dishes like shrimp‑and‑grits with miso butter.
  core: Charles Jernigan blends hands‑on construction know‑how with a vivid artistic imagination, navigating life with relaxed flexibility, occasional disorganization, and a habit of sketching new ideas
    on every worksite.
background:
  cultural: Charles is a Black man from Lexington, Kentucky, whose family roots trace back to the Great Migration and rural Southern farms. He grew up in a close‑knit African‑American community that valued
    church, music, and storytelling. His mother, a teacher, emphasized education, while his father worked in the trades, giving Charles early exposure to construction. He maintains ties to African‑American
    cultural traditions through attending local gospel services, celebrating Juneteenth, and engaging with the Kentucky African American Museum. He also draws inspiration from contemporary Black artists
    and designers, integrating that heritage into his creative pursuits. The blend of Southern hospitality, community solidarity, and a modern urban outlook shapes his worldview and informs his aspirations
    in both his trade and artistic interests.
