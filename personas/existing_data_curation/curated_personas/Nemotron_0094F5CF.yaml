  hobbies: '[''Sketching street murals'', ''Photography'', ''Digital illustration'', ''DIY home improvement'', ''Playing basketball'', ''Hiking'', ''Volunteering at art festivals'', ''Reading sci‑fi novels'',
    ''Listening to design podcasts'', ''Cooking fusion recipes'']'
  career_goals: Charles aims to become a certified journeyman carpenter within the next three years, then pursue an associate’s degree in construction management. He wants to eventually transition into
    a foreman role and later launch his own design‑build firm that blends eco‑friendly construction with artistic interiors, allowing him to express his love for art while providing flexible work schedules.
    He also hopes to mentor other young Black workers entering the trades and to contribute to community revitalization projects in Lexington.
