  career_goals: Jennifer aims to complete her bachelor’s degree in criminal justice within the next two years and earn her full detective certification. She aspires to specialize in cybercrime and digital
    forensics, eventually leading a dedicated unit within the Torrance Police Department. Long-term, she envisions a role in a federal agency such as the FBI, where she can apply her investigative skills
    on a national scale. She also seeks to mentor junior officers, develop community-focused crime-prevention programs, and create a balanced work environment that prioritizes mental-health strategies to
    manage stress.
