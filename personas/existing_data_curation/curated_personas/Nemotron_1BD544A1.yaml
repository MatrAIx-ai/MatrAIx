  hobbies: '[''Reading True-Crime Books and Podcasts'', ''Journal Writing'', ''Yoga and Meditation'', ''Hiking Coastal Trails'', ''Urban Photography'', ''Strategic Video Games (e.g., L.A. Noire)'', ''Cooking
