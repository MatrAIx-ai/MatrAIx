personas:
  professional: Jennifer Sauer is an aspiring criminal justice major who blends a detail‑oriented investigative skill set—including interviewing, forensic data analysis, and digital evidence handling—with
    a practical curiosity that drives her to solve puzzles, all while juggling the anxiety of wanting flawless case files and the flexibility needed when investigations shift.
  sports: Jennifer Sauer hits the coastal trails of the South Bay for weekend hikes, volunteers with a local surf clean‑up crew, follows the LA Dodgers and the Los Angeles Lakers, and occasionally joins
    a community volleyball league, using physical activity to temper her stress‑prone mindset.
  arts: Jennifer Sauer captures urban landscapes with her DSLR, drawing inspiration from street photographer Brandon Stanton, curates playlists featuring Billie Eilish and Halsey while dissecting true‑crime
    podcasts, and attends the monthly Torrance Art Walk to stay connected to creative expression.
  travel: Jennifer Sauer dreams of a road trip along the Pacific Coast Highway to explore Big Sur, plans meticulous itineraries for future visits to Yosemite National Park and Tokyo’s cybercrime conferences,
    but often postpones trips due to school workload and limited funds.
  culinary: Jennifer Sauer prepares balanced meals like quinoa‑and‑salmon bowls seasoned with dill and lemon, masters avocado‑lime smoothies for post‑yoga refuel, yet quietly indulges in late‑night chocolate
    chip cookies as a stress‑relief treat.
  core: Jennifer Sauer, a 20‑year‑old aspiring detective, channels her restless curiosity and anxiety‑driven perfectionism into crime‑solving, finding balance through yoga, nightly journaling, coastal hikes,
    and a secret love for late‑night cookies.
background:
  cultural: Jennifer was raised in Torrance, a suburb of Los Angeles County, in a middle-class white family with parents who worked as a public-school teacher and a small-business owner. Growing up in the
    culturally diverse South Bay exposed her to a blend of American traditions and neighboring Asian and Hispanic communities, fostering an appreciation for multicultural perspectives while maintaining
    a core American identity. She celebrates typical holidays such as Thanksgiving and the Fourth of July, participates in community events like beach clean-ups and local festivals, and values civic duty,
    reflecting the region’s blend of suburban stability and coastal openness.
