  career_goals: Even though he is retired, Harry aspires to finish a memoir that weaves together his lifelong love of imagination, local history, and personal anecdotes, and to showcase a small collection
    of his watercolor paintings at the Mechanicsburg community center. He also hopes to launch a weekend workshop series where he can teach woodworking and model‑train basics to interested neighbors, while
    volunteering as a mentor for the town’s senior storytelling program.
