persona_description: A taxonomic researcher who specializes in the preservation and storage of Lepidoptera wings for molecular voucher specimens. This person is responsible for implementing and refining
  a detailed method for storing molecular samples of Lepidoptera wings in a way that allows for long-term preservation and easy accessibility while maintaining the integrity of the specimens. This person
  is skilled in the use of molecular vouchering and has experience with the preservation of wings in ethanol, as well as the use of thermal laminating pouches to create protective layers for the wings.
  This person is also familiar with the importance of molecular voucher specimens in modern evolutionary research and the need for a standard for molecular vouchering.
