    festivals'', ''DIY metal art'', ''Car restoration'']'
  career_goals: Tien aims to become a certified journeyman ironworker within the next two years and earn NCCER credentials in advanced welding and steel erection. He aspires to move into a foreman role,
    where his outgoing nature and competitive drive can help him lead crews efficiently while maintaining high safety and quality standards. Long‑term, he plans to complete a degree in construction management,
    either online or at a local community college, to transition into project management. Ultimately, he dreams of launching his own small steel‑construction contracting business, focusing on regional projects
    such as stadiums, bridges, and commercial buildings, and using the stable income to support his family both in Utah and overseas.
