personas:
  professional: An ambitious structural ironworker with a talent for MIG and TIG welding, Tien Hong thrives on coordinating crew tasks on steel erection sites, using their competitive drive and sociable
    nature to motivate teammates, while their love of routine clashes with a spontaneous streak that sometimes leads to missed deadlines but also quick on‑the‑fly problem solving, and they excel at interpreting
    blueprints under noisy conditions.
  sports: An avid weekend athlete, Tien Hong plays pickup basketball at the local gym, hikes Utah’s Canyonlands and Zion with a club, practices Taekwondo twice a week, follows the Utah Jazz, the Utah Utes
    football team, and Real Salt Lake, and they proudly wear the Jazz jersey during team‑based shooter gaming nights as a personal ritual.
  arts: A creative hobbyist, Tien Hong crafts custom metal art pieces and small furniture in their garage, enjoys listening to Vietnamese pop star Son Tung M‑TP, indie rock band The Strokes, and the film
    scores of Bong Joon‑ho, and they occasionally showcase their welding sculptures at community center art fairs.
  travel: A weekend road‑trip enthusiast, Tien Hong explores Utah’s national parks like Bryce Canyon and Arches, dreams of trekking Ha Long Bay in Vietnam and discovering Kyoto’s temples, prefers spontaneous
    itineraries over rigid plans, and they often budget trips around their welding projects and family obligations abroad.
  culinary: A passionate home chef, Tien Hong regularly prepares pho broth with star‑anise, lemongrass, and fish sauce, rolls fresh spring rolls with shrimp and rice paper, experiments with charcoal‑grilled
    bratwurst at community barbecues, and they relish the tactile feedback of welding by the stove while perfecting the balance of sweet, salty, and sour flavors.
  core: Tien Hong is a sociable, competitive 24‑year‑old ironworker who balances a love for metal art, basketball, and Vietnamese cooking with occasional impulsive spending and a stubborn tendency to overlook
    minor health warnings, and they often push themselves to the limit in both work and play.
background:
  cultural: Tien was born in the United States to Vietnamese immigrant parents. He grew up in a bilingual household where Vietnamese was spoken at home and English at school, fostering a deep respect for
    his family's cultural traditions. He celebrates Lunar New Year and Mid‑Autumn Festival with his extended family, often preparing ancestral dishes and sharing stories from the old country. At the same
    time, living in Provo, Utah, he has assimilated many aspects of the local community, participating in regional events, attending university‑linked social gatherings, and understanding the values of
    the surrounding predominantly LDS environment. This blend of East Asian heritage and Western Utah culture shapes his practical outlook, his emphasis on hard work and family responsibility, and his enjoyment
    of communal activities.
