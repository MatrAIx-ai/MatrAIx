  career_goals: Matthew aims to advance from his current assistant role to become a licensed Physical Therapist. He plans to enroll in an accredited associate’s program, followed by a bachelor’s degree
    in health sciences and eventually a Doctor of Physical Therapy (DPT). His long‑term ambition is to open a boutique rehabilitation clinic that blends conventional physical therapy with art‑based or music‑guided
    interventions for holistic recovery. He also hopes to specialize in sports and orthopedic rehabilitation, become a go‑to therapist for local high schools and amateur sports leagues, and lead community
    wellness workshops that promote active, creative lifestyles.
