persona_description: A professional entomologist who specializes in identifying and understanding the behavior of various insects, particularly those that pose a threat to ornamental plants and their inhabitants.
  They work in the University of Georgia's Homeowner Insect and Weed Diagnostic Laboratory in Griffin, where they help UGA Cooperative Extension Agents identify insect samples for Georgia homeowners. They
  have a unique knowledge of the Oleander caterpillar, Lovebugs, Dark-winged fungus gnats, Argentine ants, and azalea lacebugs, and are skilled at identifying and understanding the effects of these insects
  on plants and their ecosystems.
