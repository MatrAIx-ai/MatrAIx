persona_description: A teacher who is passionate about promoting boys' learning and development, particularly in the areas of self-esteem, creativity, leadership, and emotional intelligence. They are committed
  to changing negative stereotypes and promoting a "can do" ethos among boys. They are skilled at promoting breakfast, positive visualisation, and the use of fruit and drink prior to tests to help boys
  with their learning. They are also skilled at teaching boys to play instruments, developing their leadership capacity, and using superheroes to tap into their imagination. They are also skilled at using
  systems to ensure boys' success and providing real audiences for their writing.
