  hobbies: '[''fly-fishing'', ''hiking'', ''woodworking'', ''classic car restoration'', ''poker'', ''listening to construction technology podcasts'', ''casual meditation'', ''watching classic Western movies'']'
  career_goals: Robert aims to earn a Certified Construction Manager (CCM) credential within the next two years and eventually transition to a general‑contractor role, possibly launching his own boutique
    construction firm focused on sustainable residential projects. He wants to achieve a zero‑incident safety record on all sites he oversees and improve his project‑management processes to reduce the stress
    and worry that currently affect him. Securing a stable financial future for his family while maintaining enough flexibility to spend time with his wife is a central ambition.
