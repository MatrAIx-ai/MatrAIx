  career_goals: Malika aims to ascend to an HR Director or Vice‑President role within the next five years, where she can shape organization‑wide talent strategies and embed robust DEI frameworks. She plans
    to earn the SHRM‑SCP certification and to lead a regional mentorship program that supports emerging HR professionals, especially women of color in the South. Additionally, she envisions establishing
    a community partnership with local colleges and the Clay County Chamber of Commerce to develop workforce‑training pipelines that address regional employment gaps. Long‑term, she hopes to transition
    into a boutique HR consulting practice that assists small businesses in rural Mississippi with building inclusive, resilient workplaces.
