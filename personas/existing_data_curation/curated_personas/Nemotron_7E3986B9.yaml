  hobbies: '[''Community cultural festival organization'', ''vegetable gardening'', ''mahjong'', ''attending Sacramento River Cats baseball games'', ''volunteering with bereavement support groups'', ''cooking
    Vietnamese cuisine'', ''reading business news'', ''listening to sales podcasts'']'
  career_goals: Quang aims to transition into a regional sales leadership role within the next three years, where he can design and implement structured sales training programs that reflect his methodical
    approach. He also aspires to launch a consulting practice focused on helping small manufacturers improve their sales processes and adopt data‑driven decision‑making before he fully retires. Additionally,
    he wants to leave a legacy of mentorship by establishing a scholarship for local high‑school students interested in business and sales.
