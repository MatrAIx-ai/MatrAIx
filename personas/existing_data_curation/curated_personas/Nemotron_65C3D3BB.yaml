  hobbies: '[''Reading (fiction and self‑help)'', ''Journaling'', ''Yoga'', ''Herb gardening'', ''Crossword puzzles'', ''Chess'', ''Volunteering at animal shelter'', ''DIY home organization'', ''Nature
    walks on local trails'']'
  career_goals: Karen aims to advance from her current general office clerk position to an administrative coordinator role within the next two years, followed by a promotion to office manager. She plans
    to complete a bachelor's degree in Business Administration at a local community college while earning the Certified Administrative Professional (CAP) credential. Her long‑term ambition is to specialize
    in process improvement for a mid‑sized nonprofit or small business, leveraging her curiosity for efficient systems and her competitive drive to lead operational initiatives that enhance productivity
    and workplace stability.
