  hobbies: '[''Cumbia and salsa dancing'', ''Cooking traditional Mexican dishes'', ''Volunteering at health fairs'', ''Kayaking'', ''Beach volleyball'', ''Hiking in Padre Island'', ''Yoga'', ''Reading contemporary
    fiction'', ''Photography of coastal landscapes'', ''Listening to regional Mexican music'', ''Following soccer'']'
  career_goals: Rosa plans to earn her Bachelor of Science in Nursing (BSN) within the next two years, followed by a Master of Science in Nursing with a concentration in family health. She aims to obtain
    certification as a Community Health Nurse and eventually become a Family Nurse Practitioner serving the Mexican‑American population in Corpus Christi. In the medium term, she hopes to lead a bilingual
    health‑education program that reduces health disparities, mentor nursing students as a clinical preceptor, and later assume a nurse manager role where she can integrate evidence‑based practice with
    practical workflow improvements.
