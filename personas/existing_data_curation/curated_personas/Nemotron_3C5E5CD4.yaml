  career_goals: Hyun aims to progress from senior system administration into a network architect role, eventually overseeing multi‑site infrastructure strategy for a mid‑size tech firm. He plans to earn
    advanced certifications such as CCNP, CISSP, and AWS Solutions Architect to deepen his expertise in secure, cloud‑native networking. In the longer term, he aspires to lead an IT department or launch
    a boutique consulting practice that helps small businesses adopt hybrid cloud solutions while maintaining robust security and practical cost controls.
