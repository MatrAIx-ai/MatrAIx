    practice'', ''Culturally competent care for diverse patient populations'']'
  hobbies: '[''Cooking soul‑food and Caribbean dishes'', ''Hosting dinner parties for friends and colleagues'', ''Salsa and Afro‑beat dancing'', ''Running in Prospect Park and training for 5K races'', ''Yoga
    and mindfulness meditation'', ''Volunteering at community health fairs'', ''Reading contemporary Black literature'', ''Attending author talks at the Brooklyn Public Library'', ''Maintaining a bullet‑journal
    for planning'', ''Exploring local art exhibitions and live music venues'']'
  career_goals: Rufina aims to complete her RN‑to‑BSN program within the next year and obtain a certification in Emergency Nursing (CEN). She aspires to become a charge nurse on her current unit within
    two years, leveraging her organizational strengths to streamline staffing and improve patient flow. Long‑term, she envisions stepping into a nurse manager or clinical educator role where she can design
    mentorship programs for new nurses and spearhead community outreach projects that address health disparities among Black residents of Brooklyn. Rufina also hopes to contribute to hospital policy on
    cultural competency and patient safety.
