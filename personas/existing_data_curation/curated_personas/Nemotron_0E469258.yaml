personas:
  professional: Rufina Whittingham is a registered nurse who combines meticulous charting and strong assessment skills with a calm, structured demeanor, allowing them to lead interdisciplinary rounds, train
    colleagues on EHR best practices, and naturally become the energetic hub of patient education sessions.
  sports: Rufina Whittingham is a regular runner who logs morning miles in Prospect Park, trains for seasonal 5K races, supports the Brooklyn Nets and New York Knicks with spirited watch parties, and releases
    their energy in a local salsa and Afro‑beat dance troupe that meets twice weekly.
  arts: Rufina Whittingham cultivates a vibrant artistic life, attending author talks featuring Ta‑Nehisi Coates and Chimamanda Ngozi Adichie, dancing to the sounds of Fela Kuti and Celia Cruz, and frequently
    quoting lines from Lin‑Manuel Miranda’s Hamilton during community gatherings.
  travel: Rufina Whittingham favors a blend of meticulously planned weekend escapes to destinations like New Orleans and the Caribbean islands of Jamaica and the Dominican Republic, alongside spontaneous
    day trips to Brooklyn’s historic neighborhoods, all while maintaining a travel fund earmarked for a future cultural heritage tour of Ghana.
  culinary: Rufina Whittingham delights in cooking soul‑food and Caribbean fare, mastering dishes such as jerk chicken, collard greens, rice and peas, and sweet potato pie, while hosting lively dinner parties
    where they experiment with fresh scotch bonnet peppers, coconut milk, and homemade hot sauce.
  core: Rufina Whittingham merges nursing precision with salsa rhythm, maintains a bullet‑journal of color‑coded shift schedules and recipe ideas, and balances disciplined financial planning with spontaneous
    bursts of culinary creativity and community dance.
background:
  cultural: Rufina grew up in a close‑knit Black family in Brooklyn, where West African and Caribbean traditions interwove with the rhythms of hip‑hop and soul music that define the borough. Family gatherings
    celebrated holidays such as Juneteenth and Kwanzaa, and her mother’s cooking introduced her to dishes from the Caribbean diaspora, shaping Rufina’s own culinary passions. The diverse neighborhoods of
    Brooklyn exposed her to a mosaic of cultures, strengthening her appreciation for multicultural perspectives and informing her commitment to culturally competent nursing. Community churches, local block
    parties, and the activism legacy of the civil‑rights movement in New York have also played pivotal roles in shaping her values of service, resilience, and collective uplift.
