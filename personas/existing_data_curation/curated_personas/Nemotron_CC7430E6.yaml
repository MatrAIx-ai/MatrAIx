personas:
  professional: Rafael Feliciano, a seasoned construction specialist with over 25 years of hands‑on experience in framing, concrete, and drywall, leverages his bilingual fluency and methodical planning
    to bridge crew communication, while pursuing journeyman foreman certification and a future eco‑friendly contracting firm.
  sports: Rafael Feliciano, an avid soccer fan who never misses a San Jose Earthquakes match, follows the Golden State Warriors in the off‑season, belongs to a local fishing club that meets at nearby lakes,
    and keeps fit through early‑morning walks and occasional weight‑lifting sessions at the community gym.
  arts: Rafael Feliciano, an amateur acoustic guitarist who strums traditional folk tunes and contemporary songs like Rodrigo y Gabriela’s “Tamacun” at intimate gatherings, appreciates woodcraft as an art
    form, and finds inspiration in construction history books and the works of painter Diego Rivera, even if he rarely attends large cultural events.
  travel: Rafael Feliciano, an organized traveler who plans family road trips around school breaks, has explored Oaxaca’s historic markets, hiked the Sierra Nevada, and fished the Canadian Rockies, while
    dreaming of a sustainable‑architecture tour in Copenhagen and an adventure trek through Patagonia when his children are grown.
  culinary: Rafael Feliciano, a home‑chef who expertly prepares mole poblano, hand‑made tamales, and grilled fish with salsa verde using home‑grown cilantro, jalapeños, and roasted tomatillos, enjoys experimenting
    with a sous‑vide for low‑waste cooking, yet sometimes over‑seasones his dishes in enthusiasm.
  core: Rafael Feliciano, a methodical foreman with a green thumb, a guitar at hand, and a stubborn habit of hoarding spare nails for future projects.
background:
  cultural: Rafael was born to Mexican immigrant parents and grew up in a bilingual household in the Bay Area, blending Mexican cultural traditions with Californian influences. He maintains strong ties
    to his heritage through family celebrations, traditional foods, and community events at the local Mexican church. His upbringing emphasized family unity, respect for elders, and a cooperative spirit,
    which he carries into his work and personal life. His bilingualism and cultural awareness enable him to bridge the gap between Mexican and American colleagues, fostering harmony on the job site.
attributes:
  skills: '[''Framing'', ''Concrete finishing'', ''Drywall installation'', ''Carpentry'', ''Heavy equipment operation (forklift, concrete mixer)'', ''Blueprint reading'', ''OSHA safety compliance'', ''Bilingual
    Spanish-English communication'', ''Basic sustainable building practices'', ''Basic BIM software familiarity'']'
  hobbies: '[''Woodworking'', ''Gardening'', ''Fishing'', ''Cooking Mexican cuisine'', ''Watching soccer'', ''Reading construction history'', ''DIY home improvement'', ''Playing acoustic guitar'']'
  career_goals: Rafael aims to achieve a journeyman foreman certification within the next two years, take on supervisory responsibilities on larger projects, and eventually launch his own small contracting
    firm focusing on eco‑friendly residential remodels. He also plans to complete his associate degree in construction management, enhance his expertise in green building techniques, and mentor younger
    workers, passing on his practical knowledge while incorporating newer, efficient methods.
