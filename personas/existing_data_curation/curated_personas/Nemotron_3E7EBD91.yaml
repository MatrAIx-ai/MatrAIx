  career_goals: Emilio dreams of becoming a creator of worlds—perhaps an illustrator of children's books, a video‑game developer, or a scientist‑artist who can turn his love of discovery and art into inventions
    that spark wonder. He imagines designing characters that travel to distant planets or drawing maps of mythical realms. While he enjoys flexibility and the freedom to explore many interests, he hopes
    one day to combine his storytelling talent with his curiosity about science and technology.
