  hobbies: '[''Podcast listening (science, philosophy, personal development)'', ''Urban hiking/walking trails'', ''Digital photography'', ''DIY home decorating'', ''Cooking experimental recipes'', ''Yoga
    and mindfulness meditation'', ''Board game nights with friends'', ''Community volunteer clean‑up events'']'
  career_goals: Ema aims to secure a stable, entry‑level position in administrative support or retail management that offers structure while allowing her to apply her curiosity and practical mindset. She
    plans to enroll in a community‑college associate program in business administration and obtain an office‑admin certification to boost her credentials. In the medium term, she hopes to advance to a team‑lead
    or project‑coordinator role where she can propose process improvements and lead competitive initiatives. Ultimately, she seeks financial independence and a career path that balances flexibility with
    clear responsibilities, helping to mitigate the stress and worry she often feels.
