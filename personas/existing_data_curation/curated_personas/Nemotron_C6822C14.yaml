personas:
  professional: Liliana Wong is a detail‑oriented accountant at a regional firm who leverages strong GAAP knowledge, QuickBooks expertise, and advanced Excel analysis while letting their balanced curiosity
    and practicality drive them to pilot ESG reporting initiatives and mentor junior staff, all the while managing a high workload with empathetic client communication and coping with occasional anxiety‑driven
    perfectionism.
  sports: Liliana Wong hikes the scenic Monongahela River trails with a local outdoor club, practices yoga three times a week for stress relief, supports the Pittsburgh Steelers and Penguins as their favorite
    professional teams, and dances competitively in a campus salsa group that doubles as their cardio routine.
  arts: Liliana Wong unwinds by listening to indie Latin artists such as Carla Morrison, Jorge Drexler, and Natalia Lafourcade, strums an acoustic guitar while composing simple melodies, reads contemporary
    fiction from authors like Sally Rooney and Chimamanda Ngozi Adichie, and attends campus theatre productions featuring modern playwrights that fuel their creative imagination.
  travel: Liliana Wong prefers short, budget‑friendly road trips to nearby cultural hubs like Asheville, New York City, and Santa Fe, plans itineraries using student discounts and public transit, dreams
    of a culinary pilgrimage to Oaxaca to explore regional food traditions, and balances their wanderlust with their audit schedule by scheduling travel during semester breaks.
  culinary: Liliana Wong delights in cooking traditional Mexican dishes such as mole, enchiladas, and tamales with a modern twist—like quinoa‑based taco shells or pineapple‑chipotle salsa—while meticulously
    sourcing fresh chilies, corn masa, avocado, and herbs, and they document their experiments in a handwritten recipe journal that doubles as a stress‑relief ritual.
  core: Liliana Wong merges meticulous accounting acumen with a creative culinary flair, navigates anxiety through structured routines, and pursues sustainable impact by bridging finance, culture, and community.
background:
  cultural: Liliana was raised in a bilingual Mexican‑American household where family gatherings, Día de los Muertos celebrations, and homemade tamales are central traditions. Her parents instilled a strong
    work ethic and respect for communal values, which she carries into her professional life. Living in Morgantown, WV, she blends her Mexican heritage with the Appalachian college‑town culture, enjoying
    local festivals while maintaining strong ties to the Mexican community through cultural clubs at West Virginia University. This dual cultural lens informs her inclusive approach to client service and
    her desire to support underrepresented groups in the region.
attributes:
  skills: '[''Financial Statement Preparation'', ''GAAP Compliance'', ''Audit Planning and Execution'', ''Tax Preparation'', ''QuickBooks'', ''Microsoft Excel (advanced)'', ''Data Analysis'', ''Internal
    Controls Assessment'', ''Risk Management'', ''Client Communication'', ''Team Collaboration'', ''Time Management'', ''Empathy in Client Interactions'']'
  hobbies: '[''Hiking in the Monongahela River Trail'', ''Yoga and mindfulness meditation'', ''Cooking traditional Mexican dishes with modern twists'', ''Reading contemporary fiction'', ''Volunteering at
    a community financial‑literacy program'', ''Playing acoustic guitar'', ''Salsa dancing'', ''Exploring the local music scene'']'
  career_goals: Liliana aims to become a Certified Public Accountant within the next three years, leveraging her audit experience to move into a senior auditor role at a regional firm. She is eager to specialize
    in ESG (Environmental, Social, Governance) reporting to combine her curiosity about sustainable business practices with her accounting expertise. Long‑term, she aspires to a leadership position such
    as CFO, or to launch her own boutique accounting practice that offers culturally sensitive financial services to the growing Latino community in West Virginia. She also plans to pursue a part‑time master's
    in accounting to deepen her technical knowledge while maintaining a balanced work‑life schedule to manage her anxiety.
