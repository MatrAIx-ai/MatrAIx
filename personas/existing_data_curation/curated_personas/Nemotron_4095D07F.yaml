personas:
  professional: Maria Perez is an experienced warehouse logistics specialist and certified forklift operator who leverages bilingual communication and a calm, adaptable approach to keep shipments on schedule
    while eyeing a supervisory role to impose structured safety protocols and mentor newcomers.
  sports: Maria Perez enjoys leisurely walks with her mixed-breed dog around the Franklin Mountains and occasionally joins a small local walking club, while rooting for the El Paso Chihuahuas baseball team
    and cheering on the Dallas Mavericks during the NBA season as a way to balance solitary fitness with light community engagement.
  arts: Maria Perez finds solace in the lively twangs of norteño and banda music from groups like Los Tigres del Norte while assembling intricate jigsaw puzzles and tackling crosswords, turning these solitary
    arts into a rhythmic backdrop that steadies her mind after a demanding shift.
  travel: Maria Perez prefers short, budget-friendly road trips to scenic destinations such as Santa Fe, New Mexico, and the Hill Country vineyards, planning each outing around her dog’s schedule and her
    work roster to ensure predictable timing and a low-stress escape from the warehouse floor.
  culinary: Maria Perez is a passionate home cook who harvests fresh cilantro and chilies from her modest garden to craft authentic tamales, pozole, and salsa, often experimenting with different chilies
    like ancho and guajillo, yet sometimes over-spices dishes when emotions run high after stressful shifts.
  core: Maria Perez blends meticulous hands-on logistics expertise with a love for garden-fresh cooking and quiet music, navigating life’s unpredictability through structured routines, low-risk finance,
    and a steady stream of solo puzzles that both calm and occasionally overstimulate their anxieties.
background:
  cultural: Maria is a Mexican‑American who was raised in the border city of El Paso, Texas. Her family speaks both Spanish and English, and she maintains strong ties to Mexican cultural traditions such
    as Día de los Muertos, Mexican Independence Day, and weekly family gatherings centered around homemade cuisine. Catholic practices, including attending mass and celebrating religious holidays, shape
    her values of community and service. Living in a predominantly Hispanic neighborhood has reinforced a sense of solidarity and mutual support, prompting her involvement in local community initiatives
    like neighborhood cleanups and immigrant assistance groups. These cultural influences inform her work ethic, her preference for close‑knit relationships, and her culinary passions.
attributes:
  skills: '[''forklift operation (counterbalance and reach)'', ''inventory cycling and reconciliation'', ''material handling'', ''basic equipment maintenance'', ''OSHA safety compliance'', ''bilingual communication
