  hobbies: '[''vegetable gardening'', ''cooking traditional Mexican dishes'', ''listening to norteño and banda music'', ''solving crosswords and jigsaw puzzles'', ''walking her dog'', ''volunteering at
    the local food bank'', ''reading mystery novels'']'
  career_goals: Maria aims to transition from a front‑line material mover to a supervisory position where she can shape shift schedules, enforce safety protocols, and mentor newer workers. She is pursuing
    a Certified Warehouse Supervisor credential and plans to complete an Associate’s degree in Logistics and Supply Chain Management to strengthen her qualifications. A long‑term ambition is to secure a
    stable, predictable work environment that minimizes sudden schedule changes, thereby reducing her anxiety. Maria also hopes to develop personal coping strategies through community support groups, allowing
    her to handle stress more effectively while continuing to provide for herself and her extended family.
