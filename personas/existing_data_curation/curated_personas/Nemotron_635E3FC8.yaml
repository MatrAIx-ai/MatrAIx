personas:
  professional: Bruce Gresham is a seasoned commercial cleaner who excels in floor care, ride‑on scrubber operation, and basic plumbing and electrical fixes, using their practical curiosity to troubleshoot
    safety issues, calmly mediate occupant complaints, and push toward a supervisory role and a future environmentally‑focused cleaning startup.
  sports: Bruce Gresham is a devoted fan of the South Carolina Gamecocks football team and the Columbia Fireflies minor‑league baseball club, regularly attends local high‑school football games, participates
    in the Lake Murray Anglers fishing club, and squeezes in weekend pickup basketball at the community center when their schedule permits.
  arts: Bruce Gresham unwinds to classic rock staples like Led Zeppelin and The Allman Brothers Band, devours science‑fiction novels such as Dune and Ender’s Game, plays competitive chess on Chess.com while
    listening to podcasts, and watches technology documentaries featuring figures like Elon Musk and historical series on Netflix, all of which satisfy their inquisitive nature.
  travel: Bruce Gresham prefers low‑key, spontaneous road trips, often spending long weekends fishing at Lake Hartwell or exploring Charleston’s historic waterfront, dreaming of a future drive to Asheville’s
    Blue Ridge Parkway and a culinary pilgrimage to New Orleans, while budgeting carefully to balance family expenses.
  culinary: Bruce Gresham enjoys experimenting with Southern barbecue, perfecting smoked pork shoulder using hickory wood chips and a rub of brown sugar, cayenne, and paprika, while also cooking shrimp
    and grits with fresh Gulf shrimp, collard greens seasoned with ham hocks, and serving hush puppies alongside family meals.
  core: Bruce Gresham is a practical, curiosity‑driven soloist who balances a love for hands‑on problem solving and classic rock with a wavering knack for organization, a steady undercurrent of worry, and
    a dream of turning his modest cleaning expertise into an eco‑friendly family business.
background:
  cultural: Bruce grew up in a middle‑class neighborhood in Columbia, South Carolina, where Southern hospitality and community ties are woven into daily life. His family attended a local Baptist church,
    instilling values of modesty, responsibility, and respect for tradition. He grew up with a strong appreciation for Southern cuisine, especially home‑cooked meals and barbecues shared with relatives.
    Local customs such as attending the South Carolina State Fair, participating in church fellowship events, and supporting high school football fostered his sense of belonging. While he embraces these
    regional influences, Bruce also balances them with a pragmatic outlook, focusing on steady work and incremental self‑improvement.
attributes:
  skills: '["Commercial cleaning", "Floor care (stripping & waxing)", "Basic plumbing repairs", "Electrical fixture replacement", "Inventory management", "Hazardous waste handling", "Customer service",
    "Facility safety compliance", "Equipment operation (floor scrubbers, pressure washers)", "Basic hardware maintenance"]'
  hobbies: '["Fishing", "DIY home repairs", "Gardening", "Listening to classic rock", "Reading sci‑fi novels", "Playing online chess", "Car maintenance", "Southern cooking", "Nature walks", "Watching documentaries"]'
  career_goals: Bruce aims to advance from frontline cleaning to a supervisory role within facilities management. He plans to enroll in a community‑college certificate program for Facility Maintenance and
    to earn the Certified Professional Cleaner (CPC) credential. Over the next five years, he hopes to become a shift lead, overseeing a team, scheduling work, and mentoring new staff. Long‑term, Bruce
    harbors an entrepreneurial ambition to launch a small, locally‑owned cleaning service that emphasizes environmentally friendly practices, giving him greater financial stability for his family while
    allowing him to apply his practical knowledge in a more autonomous setting.
