personas:
  professional: Sebastian Arcerivera, a 33‑year‑old geospatial specialist in Los Angeles, blends meticulous GIS analysis with a compassionate, community‑first mindset, leading multidisciplinary mapping
    projects that integrate AI‑driven analytics and real‑time sensor networks to improve infrastructure equity and disaster preparedness while mentoring junior technicians and contributing open‑source tools.
  sports: Sebastian Arcerivera, an avid hiker and weekend yogi, conquers the Angeles National Forest’s hidden trails with a handheld GPS, trains at a local climbing gym as part of a small community of enthusiasts,
    follows the Los Angeles Dodgers and LA Galaxy with quiet devotion, and prefers solitary cardio and mindful movement over crowded team sports.
  arts: Sebastian Arcerivera, a landscape photographer inspired by Ansel Adams and the vibrant street murals of East LA, spends evenings editing aerial shots from his drone flights, enjoys the marimba rhythms
    of Semana Santa processions and the acoustic intimacy of local coffee‑house gigs featuring artists like the Arctic Monkeys, and lets these visual and auditory experiences inform his cartographic storytelling.
  travel: Sebastian Arcerivera, a methodical yet adventurous planner, crafts self‑guided itineraries to remote valleys in Yosemite, the rugged coast of Big Sur, and the highlands of Antigua where he partakes
    in traditional celebrations, favoring off‑the‑beaten‑path experiences that balance quiet reflection with the thrill of discovering lesser‑known routes.
  culinary: Sebastian Arcerivera, who whips up fragrant pepian and hearty kakʼik for community gatherings, also savors single‑origin Guatemalan coffee, crafts avocado‑lime tacos and quinoa salads for weekday
    lunches, and occasionally orders pizza while processing LiDAR data, reflecting a culinary palette that blends heritage flavors with modern, health‑focused dishes.
  core: Sebastian Arcerivera merges precise geospatial expertise with a calm, community‑oriented ethos, balancing high‑tech hobbies, solitary reflection, and a steadfast drive for equitable urban planning.
background:
  cultural: Sebastian’s Guatemalan heritage is a core part of his identity, even as he lives in the multicultural fabric of Los Angeles. Raised in a bilingual household, he grew up speaking Spanish at home
    while navigating English‑dominant schools, giving him fluency in both languages and a deep appreciation for cultural nuance. Family traditions such as celebrating Semana Santa, Día de Los Muertos, and
    preparing dishes like pepian and kak'ik keep his connection to Guatemalan customs alive. He maintains ties to the Guatemalan diaspora community in LA through participation in cultural festivals, volunteering
    at community centers, and supporting fellow immigrants. This background informs his compassionate outlook and drives his commitment to using spatial technology to benefit underserved communities, echoing
    the communal solidarity valued in Guatemalan culture.
