  career_goals: Sebastian aims to become a senior geospatial specialist leading a multidisciplinary mapping team within a forward‑looking municipal or consultancy firm. He plans to obtain a master’s degree
    in GIS/Remote Sensing and earn professional certifications such as ASPRS Certified Photogrammetrist. His long‑term ambition is to integrate advanced spatial technologies—AI‑driven analytics, real‑time
    sensor networks, and open‑source platforms—into resilient urban planning projects that improve infrastructure equity and disaster preparedness in Los Angeles. He also hopes to mentor junior technicians,
    develop community‑focused mapping initiatives for underserved neighborhoods, and contribute to open‑source tools that empower other professionals and citizen scientists.
