  career_goals: Juan Jose aims to enroll in a Bachelor’s program in Fine Arts or Visual Communication, with the ambition of becoming a professional concept artist or UI/UX designer for interactive media,
    such as video games or immersive installations. He seeks to build a strong freelance portfolio that blends his abstract artistic vision with user‑centered design. Over the next five years, he hopes
    to secure a full‑time position at a creative studio that values cultural storytelling, allowing him to incorporate Puerto Rican themes into mainstream media while achieving financial stability and creative
    autonomy.
