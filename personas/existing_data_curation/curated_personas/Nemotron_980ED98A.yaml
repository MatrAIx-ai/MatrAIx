personas:
  professional: Juan Hernandez, an aspiring concept artist and budding UI/UX designer, blends their vivid imagination with methodical project planning, leveraging Photoshop, Illustrator, Procreate, and
    basic Python to create narrative‑rich visual assets while consistently meeting tight deadlines through disciplined time‑management.
  sports: Juan Hernandez enjoys weekend pick‑up basketball at the local community center, follows the Los Angeles Lakers and New York Knicks on TV, and belongs to a small cycling club that rides the coastal
    trail during spring, preferring low‑key, social fitness activities over competitive sports.
  arts: Juan Hernandez immerses themselves in digital painting, sketching, and speculative fiction, drawing inspiration from artists like Beeple, Frida Kahlo, and musician Boards of Canada, while regularly
    attending indie film showings of directors such as Sofia Coppola and participating in community mural projects.
  travel: Juan Hernandez prefers low‑budget, self‑planned trips that blend art exploration and solitude, having ventured to the vibrant street‑art districts of Berlin and the historic plazas of Oaxaca,
    while dreaming of a future hike through the misty forests of Hokkaido, Japan.
  culinary: Juan Hernandez favors a mix of bold flavors, often cooking homemade ramen bowls with miso and pork belly or crafting avocado‑topped tostadas with lime‑marinated shrimp, yet tends to rely on
    late‑night coffee and energy drinks when pulling all‑nighters for digital sketches.
  core: Juan Hernandez, a 19‑year‑old dreamer, channels restless imagination into solitary art while obsessively tracking expenses and battling occasional anxiety, often staying up all night perfecting
    digital sketches and coffee‑stained notebooks.
background:
  cultural: Juan Jose was raised in Hialeah, Florida, a community with a dense Puerto Rican diaspora. His upbringing combined traditional island customs—such as family gatherings centered around food, salsa
    music, and celebrations like the Festival de San Sebastián—with the multicultural vibe of Miami‑Dade County. Fluent in both Spanish and English, he navigates dual cultural spheres, often weaving Caribbean
    color palettes, island motifs, and bilingual text into his artwork. The strong sense of Puerto Rican pride and community responsibility informs his desire to represent and preserve his heritage through
    modern visual media.
