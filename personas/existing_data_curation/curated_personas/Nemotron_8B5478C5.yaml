  career_goals: After a period focusing on family and community work, Meggie aims to transition back into the paid workforce in a role that leverages her analytical background while offering flexibility.
    She is targeting part‑time or contract positions in data analytics or sustainability consulting, with a long‑term ambition to launch a small consultancy that helps local non‑profits and small businesses
    adopt data‑driven decision‑making. She also hopes to complete a certification in data science to refresh her technical toolkit, and to build a stable income that reduces her financial worries.
