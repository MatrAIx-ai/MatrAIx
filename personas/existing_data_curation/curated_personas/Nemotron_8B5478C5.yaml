personas:
  professional: Meggie Sheba, a 46‑year‑old data analyst with a STEM B.S., merges her quantitative expertise—Excel, Python, data extraction, technical reporting—and her talent for orchestrating community
    events to deliver clear, data‑driven insights for sustainability projects while negotiating flexible part‑time consulting contracts that accommodate their family commitments.
  sports: Meggie Sheba pedals with the Portland Wheelmen cycling club every Saturday, cheers for the Portland Timbers in MLS and the Trail Blazers in the NBA, and balances endurance rides with yoga sessions
    to stay flexible for weekend hikes in the Columbia River Gorge.
  arts: Meggie Sheba thrives on stage as an avid member of a community theater troupe performing both Shakespeare and contemporary works, regularly visits the Portland Art Museum to admire pieces by Yayoi Kusama
    and local Pacific Northwest painters, and fills playlists with Brandi Carlile and Lin‑Manuel Miranda’s scores.
  travel: Meggie Sheba enjoys carefully planned weekend escapes to the Columbia River Gorge and Seattle’s Pike Place Market, has taken a road trip along the Pacific Coast to San Francisco, and dreams of
    sustainable travel adventures exploring Iceland’s geothermal sites, Greece’s Mediterranean seafood markets, and Japan’s cherry‑blossom festivals, balancing budget constraints with reward‑point strategies.
  culinary: Meggie Sheba, an enthusiastic home cook, experiments with seasonal ratatouille using heirloom tomatoes and fresh basil, crafts creamy mushroom risotto with foraged porcini, whips up a spicy
    chickpea curry with turmeric and cumin, and frequently dines at Portland’s Le Pigeon for its inventive Pacific‑Northwest cuisine.
  core: Meggie Sheba is a data‑savvy community champion whose curiosity fuels both spreadsheets and stage lights, yet chronic worry often shadows their otherwise vibrant, collaborative spirit.
background:
  cultural: Meggie grew up in the progressive, middle‑class suburbs of Chicago, specifically Oak Park, Illinois. The town’s historic emphasis on education, civic engagement, and architectural preservation
    shaped her values. As a white American of German‑Irish ancestry, she internalized Midwestern virtues of hard work, self‑reliance, and community cooperation, while also being exposed to the city’s cultural
    diversity through local festivals and multicultural initiatives. This background informs her practical outlook and strong commitment to local community involvement.
