    with friends", "DIY crafts and scrapbooking", "Learning basic Spanish phrases", "Following art podcasts and blogs", "Journaling and mindfulness practice"]'
  career_goals: Jaime aspires to transition from her current role as an administrative assistant to an office manager position within a cultural or creative organization, such as a local art center or museum.
    She plans to enroll in a community college program for business administration and earn certifications in project management and advanced office technology. In the long term, she hopes to lead a small
    team, oversee program logistics, and contribute to community arts initiatives, while also developing stress‑management strategies to sustain her well‑being.
