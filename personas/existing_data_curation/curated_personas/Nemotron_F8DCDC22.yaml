  career_goals: As a senior finance professional, Jayson aims to transition from operational finance management to a chief financial officer role, where he can shape his company's long‑term financial strategy.
    He is driven to lead digital transformation initiatives that integrate advanced analytics and AI‑enhanced forecasting while safeguarding compliance and fiscal discipline. Jayson also seeks to mentor
    the next generation of Mexican‑American finance talent by establishing a formal mentorship program within his organization and delivering community financial‑literacy workshops. Ultimately, he wants
    to leave a legacy of sustainable financial practices that balance profitability with social responsibility, particularly supporting initiatives that benefit the Latino community in Southern California.
