personas:
  professional: Mary Davis, a certified pharmacy technician renowned for her meticulous sterile and non‑sterile compounding, data‑driven drug‑interaction analyses, and savvy use of PioneerRx and QS/1, blends
    a calm, resilient demeanor with a competitive drive, and they aim to spearhead medication‑safety projects while leading a supervisory team within their health‑system pharmacy.
  sports: Mary Davis, a competitive tennis player in the Fort Wayne Tennis Club league and avid weekend hiker and cyclist on the Maumee River trail, roots their fitness routine in disciplined practice while
    cheering on the Indiana Pacers and Indianapolis Colts whenever the seasons align.
  arts: Mary Davis, who showcases hand‑crafted kombucha‑themed pottery at the Fort Wayne County Fair and unwinds with sci‑fi novels by Octavia Butler while listening to The Lumineers and attending productions
    at the Fort Wayne Civic Theatre, weaves a pragmatic curiosity into a modest yet passionate arts life, and they often discuss the symbolism of their pieces with fellow volunteers.
  travel: Mary Davis, who prefers carefully planned road trips blending trail hikes in the Great Smoky Mountains with weekend getaways to Cincinnati’s riverfront and dreams of a spring pilgrimage to Kyoto’s
    tea gardens, balances adventure with a modest budget and family commitments, and they schedule each itinerary around volunteer weekends.
  culinary: Mary Davis, an enthusiastic home fermenter who perfects ginger‑lime kombucha and crafts echinacea tinctures, enjoys cooking farm‑to‑table dishes like roasted beet and goat‑cheese salad with
    walnuts, and they treat themselves to occasional visits to the local farm‑stand bistro for griddled trout with lemon‑dill sauce.
  core: Mary Davis, a calm yet competitively driven pharmacy technician who balances meticulous medication safety with a penchant for late‑night kombucha experiments and a habit of double‑checking every
    spreadsheet, and they embody a pragmatic curiosity that bridges community service with personal innovation.
background:
  cultural: Mary grew up in a midwestern white family near Fort Wayne where education, hard work, and community involvement were core values. Her upbringing emphasized practical problem‑solving, self‑reliance,
    and respect for routine, while also encouraging curiosity about the wider world. Regular participation in local traditions—such as county fairs, church gatherings, and volunteer drives—instilled a strong
    sense of civic responsibility. These cultural influences blend with her STEM background and calm demeanor, shaping a persona that values both innovation and dependable service to her community.
attributes:
  skills: '["Medication dispensing", "Dosage calculation", "Sterile and non‑sterile compounding", "Drug‑interaction analysis", "Pharmacy management software (PioneerRx, QS/1)", "Inventory control", "Regulatory
    compliance (HIPAA, state pharmacy laws)", "Health informatics", "Patient counseling", "Workflow optimization", "Basic pharmacological research", "Quality‑improvement initiatives"]'
  hobbies: '["Trail hiking", "Cycling", "Tennis (league play)", "Yoga", "Reading (science‑fiction, popular science)", "Home‑brewing kombucha", "Herbal tincture crafting", "Volunteering at health fairs",
    "Food bank service", "County‑fair arts and crafts"]'
  career_goals: Mary aims to deepen her clinical expertise by earning a Certified Immunizer credential and pursuing the Certified Pharmacy Technician (CPhT) certification. Over the next five years she envisions
    moving into a supervisory role, leading a pharmacy team, and spearheading medication‑safety projects within her health system. She is also considering part‑time coursework toward a PharmD to broaden
    her scope of practice. Ultimately, Mary hopes to combine her competitive drive with community service by establishing a patient‑education program that improves medication adherence in the Fort Wayne
    area.
