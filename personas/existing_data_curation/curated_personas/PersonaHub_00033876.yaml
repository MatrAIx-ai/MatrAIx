persona_description: A person who has experienced phantom sensations in their amputated limb or other body parts, and is seeking information on the causes, treatments, and potential remapping of sensory
  input in the somatosensory cortex. They may also be interested in the psychological and emotional impact of phantom sensations, as well as the potential for the sensations to be treated or managed. They
  may be seeking information on the latest research and developments in the field, and may be interested in discussing their experiences with others who have similar conditions.
