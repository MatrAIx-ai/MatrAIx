  hobbies: '[''Painting'', ''Sketching'', ''Visiting art galleries'', ''Reading contemporary literature and philosophy'', ''Creative writing'', ''Yoga and meditation'', ''Cooking Mexican cuisine'', ''Volunteering
    at health fairs'', ''Attending cultural festivals (e.g., Día de los Muertos)'', ''Traveling to explore heritage sites'']'
  career_goals: Diana aims to become a director of community health programs within a major healthcare system, where she can champion the integration of arts and culturally tailored interventions to improve
    health outcomes for underserved Latino populations in Brooklyn. She aspires to lead initiatives that develop innovative health‑promotion strategies, secure grant funding for community‑based projects,
    and influence health policy at the city level. In the longer term, she envisions founding a nonprofit that provides holistic, arts‑infused health services and educational workshops for immigrant families.
