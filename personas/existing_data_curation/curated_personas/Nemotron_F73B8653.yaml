personas:
  professional: Diana Marindiaz, a 26‑year‑old medical services manager in Brooklyn, leverages her imaginative curiosity and methodical planning to fuse arts‑based interventions with data‑driven health
    administration, excelling in strategic program development, cross‑cultural outreach, and collaborative team leadership.
  sports: Diana Marindiaz, who prefers low‑key workouts over crowds, joins a weekend yoga circle at a Brooklyn co‑op, plays pickup basketball with the NY Road Runners’ women's league in spring, follows
    the Brooklyn Nets and New York Yankees, and cycles the Hudson River Greenway for cardio on summer evenings.
  arts: Diana Marindiaz spends evenings sketching inspired by Kehinde Wiley’s portraiture, attends gallery openings featuring emerging Latinx artists, collects limited‑edition prints by Yayoi Kusama, and
    draws creative energy from listening to the poetic lyricism of Lila Arias and the ambient soundscapes of Nils Frahm.
  travel: Diana Marindiaz, an organized planner who maps trips in a bullet‑journal, favors cultural immersion over luxury, has explored the historic streets of Oaxaca and the murals of Valparaíso, and dreams
    of tracing pre‑Columbian sites in Peru while budgeting for a future solo retreat to Kyoto’s temple gardens.
  culinary: Diana Marindiaz, a self‑taught home cook, delights in crafting tacos al pastor with pineapple‑marinated pork, drizzling fresh cilantro‑lime salsa verde, and experimenting with mole negro, while
    frequently patronizing Brooklyn’s fusion taquerias for their avocado‑infused ceviche and mezcal cocktails.
  core: Diana Marindiaz balances a relentless quest for creative integration in healthcare with a habit of over‑scheduling, a secret stash of half‑read philosophy books, and a nightly ritual of journaling
    that sometimes runs past midnight, fueling both their compassion and occasional insomnia.
background:
  cultural: Diana is a second‑generation Mexican‑American raised in a bilingual household. She grew up celebrating traditional Mexican holidays such as Día de los Muertos and Las Posadas, and she maintains
    strong ties to the Mexican community in Brooklyn’s Sunset Park and Bushwick neighborhoods. Her cultural heritage informs her compassionate approach to healthcare, emphasizing family involvement, communal
    support, and respect for cultural traditions. She frequently incorporates Mexican folk‑art motifs into her creative projects and draws on her bicultural perspective to design health programs that resonate
    with Latino patients.
