  hobbies: '[''basketball (adult league)'', ''beach volleyball'', ''hiking'', ''community food bank volunteering'', ''car restoration'', ''classic rock listening'', ''multiplayer video gaming'', ''weightlifting'',
    ''social gatherings'']'
  career_goals: Clayburn aims to move from hands‑on material handling into a supervisory role within the next three to five years. He plans to complete a Certified Logistics Associate program and obtain
    a CAPM (Certified Associate in Project Management) credential to broaden his understanding of supply‑chain processes. His short‑term goal is to become a shift lead, overseeing a crew, refining workflow,
    and implementing safety initiatives. Long‑term, he envisions managing an entire warehouse or starting his own small logistics and freight‑forwarding business that can serve the growing trade activity
    in the San Diego region. He is motivated by the prospect of combining his practical experience with leadership responsibilities.
