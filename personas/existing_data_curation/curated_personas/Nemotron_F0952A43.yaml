  arts: Troy Birdsong’s artistic side shines in community theater workshops where they relish stagecraft and improv, and they unwind by listening to classic rock legends like Bruce Springsteen, John Mayer
    and the Foo Fighters, a love for storytelling fostering a social anchor for their outgoing personality.
  travel: Troy Birdsong plans trips with the same meticulous care they apply to inventory audits, favoring road‑trip adventures to national parks such as Yellowstone and Acadia, while dreaming of a cultural
    immersion in Kyoto, Japan, yet their budget constraints keep most vacations within a moderate 5‑day weekend window.
  culinary: Troy Birdsong enjoys hearty Midwestern comfort food, often cooking smoky barbecue ribs, chicken pot pie, and grilled salmon seasoned with rosemary and smoked paprika, yet their wooden workshop
    hands sometimes leave a smear of sawdust on the kitchen counter, a quirky reminder of their dual passions.
  core: Troy Birdsong is a methodical, socially vibrant 51‑year‑old who blends pragmatic project management with a competitive streak, while they often dive into woodworking projects without cleaning up
    the sawdust—an endearing but messy quirk.
