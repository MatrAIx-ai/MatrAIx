personas:
  professional: Clelie Hankins, a 19‑year‑old administrative specialist with a strong humanities background, merges meticulous calendar and document management with a competitive drive to streamline arts
    programming, aiming to become an assistant curator at a regional museum while leveraging Canva‑crafted promotional materials for community outreach.
  sports: Clelie Hankins enjoys early‑morning runs along the Chesapeake Bay Trail, plays recreational tennis at the Stevensville Community Center, follows the Baltimore Ravens with fervor, and, while they
    volunteer as a youth soccer league scorekeeper in the summer, prefer low‑key, small‑group workouts over crowded gyms.
  arts: Clelie Hankins pursues sketching and analog photography inspired by the moody chiaroscuro of Caravaggio and the candid street captures of Vivian Maier, immerses themselves in contemporary poetry
    from Ocean Vuong and the jazz improvisations of Joshua Redman, and they regularly contribute thoughtful commentary to a local book club that celebrates diverse literary voices.
  travel: Clelie Hankins prefers meticulously planned weekend getaways to historic coastal towns like Annapolis and the cultural bustle of Washington, D.C., while dreaming of a week‑long art pilgrimage
    to Paris’s Musée d’Orsay and the serene temples of Kyoto, and they balance a modest travel budget with a desire for immersive, low‑key experiences.
  culinary: Clelie Hankins, an eager home cook with intermediate skills, loves experimenting with global cuisines, regularly whipping up Moroccan tagine with preserved lemons and apricots, Korean bibimbap
    featuring gochujang and fresh kimchi, and a weekend ritual of brewing pour‑over coffee with Ethiopian beans, though they occasionally over‑salt their dishes when distracted.
  core: Clelie Hankins blends a quietly competitive spirit with a love for solitary artistic exploration, tending to over‑organize schedules while they occasionally succumb to late‑night sketch marathons
    fueled by caffeine.
background:
  cultural: Clelie grew up in a Black family in Michigan, with roots tracing back to the Great Migration. Her parents emphasized the importance of education, storytelling, and cultural pride. She was immersed
    in African‑American traditions such as gospel music, soul‑food cooking, and community gatherings at the local church. Her upbringing in Stevensville, a predominantly white rural area, gave her a unique
    perspective on navigating cultural identity, fostering resilience and a critical awareness of systemic inequities. She draws inspiration from Black artists, writers, and musicians, and actively seeks
    to celebrate her heritage by supporting local Black artists and participating in regional cultural festivals.
attributes:
  skills: '["Office administration", "Calendar and schedule management", "Document and records management", "Research and academic writing", "Art history and cultural analysis", "Data entry and database
    management", "Event planning and coordination", "Budget tracking", "Basic graphic design (Canva)", "Professional written communication", "Critical thinking and problem solving", "Stakeholder liaison"]'
  hobbies: '["Sketching and drawing", "Photography", "Journaling and creative writing", "Reading contemporary literature and poetry", "Chess", "Small‑group trivia nights", "Community gardening", "Experimental
    cooking", "Volunteering with local historical society", "Attending intimate music performances", "Participating in a diverse book club"]'
  career_goals: Clelie aims to leverage her administrative expertise and passion for the arts into a career in arts management. In the next three to five years, she plans to secure a position as an assistant
    curator or program coordinator at a regional museum or cultural center, where she can help design exhibitions and community outreach programs. She intends to pursue a certification in museum studies
    and eventually enroll in a master's program in arts administration. Long‑term, she aspires to become the director of a community art space in Stevensville, creating inclusive programming that reflects
    diverse narratives and provides mentorship opportunities for emerging Black artists. Her competitive nature drives her to seek leadership roles, professional recognition, and to publish articles on
    cultural heritage preservation.
