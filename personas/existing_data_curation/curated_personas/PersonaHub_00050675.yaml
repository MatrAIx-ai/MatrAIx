  of Métis communities. They are also knowledgeable about the broader context of Métis identity and the ongoing issues of Métis sovereignty and self-determination. This persona is likely to be interested
  in the author's research on the lives of Métis women and their self-fashioning as pioneers, as well as the broader historical and cultural context of Métis history.
