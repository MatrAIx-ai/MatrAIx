  career_goals: Antonio aims to release a concept album that weaves scientific narratives and modern sound design, positioning himself as a unique voice in the Midwest indie‑rock scene. He plans to open
    a community‑focused studio where emerging musicians can learn both artistic craft and the technical side of recording, leveraging his competitive drive to secure regional gigs and licensing deals for
    film and video games. Long‑term, he envisions a role as a music director for a university ensemble, providing mentorship while maintaining financial independence through diversified income streams.
