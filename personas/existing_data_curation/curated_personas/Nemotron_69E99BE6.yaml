personas:
  professional: Stacey Tallon, a 22‑year‑old full‑stack developer, leverages Python, Java, and JavaScript to craft cloud‑native web apps, applying meticulous Agile workflows and a competitive drive to out‑perform
    sprint goals while mentoring junior coders with methodical documentation.
  sports: Stacey Tallon fuels her active lifestyle with weekend kayaking on Lake Jessup, hikes through the Ocala National Forest, and a loyal fandom for the Orlando Magic, while also playing in a co‑ed
    recreational soccer league that competes in the Central Florida Adult Soccer Association.
  arts: Stacey Tallon channels her love of speculative narratives through avid reading of Liu Cixin and William Gibson, attends local sci‑fi film screenings featuring works by Denis Villeneuve, and frequently
    plays board games from Stonemaier Games, while unwinding to the synthwave sounds of Daft Punk and the ambient scores of Hans Zimmer.
  travel: Stacey Tallon prefers meticulously planned weekend getaways that blend adventure and relaxation, having backpacked the White River National Forest in Oregon, explored Tokyo’s Akihabara tech district,
    and now saving for a solo trek through Iceland’s volcanic landscapes, while always squeezing in a visit to a local farmers market for fresh produce.
  culinary: Stacey Tallon, a self‑taught home chef with a green thumb, often harvests tomatoes, basil, and zucchini from her garden to craft fresh pesto‑zucchini pasta, ramps up protein with grilled tempeh,
    and indulges in occasional sushi rolls from the local Japanese spot, though she admits to over‑relying on strong coffee to power late‑night coding sessions.
  core: Stacey Tallon is a competitively curious 22‑year‑old full‑stack developer who balances methodical code craftsmanship with a love for puzzles, outdoor escapades, and a habit of late‑night coffee‑fueled
    hackathons.
background:
  cultural: Stacey grew up in a suburban Anglo‑American family in the southeastern United States, where a mix of traditional values and early exposure to technology shaped her worldview. Her upbringing
    emphasized self‑reliance, education, and community involvement, which aligns with the Southern hospitality and volunteer spirit prevalent in The Villages area. While she identifies as white American,
    she incorporates a pragmatic, goal‑oriented mindset common to her regional culture, balanced with an openness to diverse ideas fostered by her STEM education.
