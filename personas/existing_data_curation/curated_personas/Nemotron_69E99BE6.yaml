  career_goals: Stacey aims to become a senior software engineer within the next three years, focusing on cloud‑native architecture and AI‑driven solutions. She plans to earn AWS Solutions Architect and
    Certified Machine Learning Professional certifications, and eventually transition into a lead engineering role where she can drive technical strategy and oversee cross‑functional teams. Long‑term, she
    envisions launching a boutique tech consultancy that provides digital transformation services to small businesses and senior‑focused communities in Central Florida, leveraging her competitive drive
    to differentiate through innovative, practical solutions.
