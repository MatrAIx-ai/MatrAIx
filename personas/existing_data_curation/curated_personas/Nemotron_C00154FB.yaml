  hobbies: '[''Reading African-American literature'', ''Yoga and mindfulness'', ''Gardening'', ''Volunteering at community center'', ''Cooking soul-food with a health twist'', ''Attending live music events
    (jazz, neo-soul)'']'
  career_goals: Kassia aims to become a department chair within the next three years, then transition to an assistant principal role to influence schoolwide equity initiatives. She plans to pursue an Ed.D.
    focused on culturally responsive pedagogy and hopes to develop a district-wide curriculum framework that embeds African-American literature and history across subjects. Long-term, she envisions founding
    a nonprofit that provides STEM and literacy enrichment for underserved Black youth in Los Angeles, leveraging her teaching expertise and community networks.
