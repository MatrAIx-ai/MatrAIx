personas:
  professional: Kassia Marshall, an experienced secondary educator specializing in English Language Arts and Social Studies, blends a competitive drive with a curious appetite for innovative teaching tools,
    using meticulous organization, data‑driven assessment, and a practical standards‑aligned approach to design rigorous, culturally responsive curricula and mentor peers.
  sports: Kassia Marshall, a devoted fan of the Los Angeles Lakers, Dodgers, and Galaxy, participates in the LA Trail Running Club to track personal bests, plays recreational tennis, and relies on Sunday
    yoga as the cornerstone of their disciplined fitness routine.
  arts: Kassia Marshall, a regular at LA’s live‑music venues, satisfies a curious ear for new sounds while staying grounded in classic jazz by attending Kamasi Washington’s sets, neo‑soul evenings with
    Erykah Badu, and indie theatre productions featuring actors like John C. Reilly.
  travel: Kassia Marshall, a detail‑oriented explorer, crafts meticulously planned weekend road trips to Santa Barbara’s coast and Sedona’s red rocks, while dreaming of immersive cultural stays in Barcelona’s
    tapas bars and Tokyo’s fish markets, balancing adventure with a structured budget.
  culinary: Kassia Marshall, a confident home cook, reimagines soul‑food classics—collard greens sautéed with smoked turkey, sweet‑potato mash with tahini drizzle, and quinoa‑based black‑eyed pea salad—using
    smoked paprika, turmeric, and fresh cilantro to keep each dish health‑forward yet indulgently flavorful.
  core: Kassia Marshall balances a competitive, organized career with disciplined self‑care, occasional indulgences, and a deep love for community‑rooted learning, music, and cooking, all while keeping
    a skeptical eye on external advice.
background:
  cultural: Kassia is an African-American woman raised in South Los Angeles. Her family's traditions blend church-centered community service, storytelling, and a strong emphasis on education as a path to
    advancement. She identifies with the Black cultural heritage of resilience and collective uplift, often celebrating Juneteenth, Kwanzaa, and local Black arts festivals. Growing up in a multicultural
    city, she incorporates Afro-Latino influences and is fluent in conversational Spanish, reflecting the diverse linguistic environment of Los Angeles. Her cultural identity informs her teaching philosophy,
    advocating for representation, equity, and culturally responsive pedagogy in the classroom.
attributes:
