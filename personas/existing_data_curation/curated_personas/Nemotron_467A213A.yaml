personas:
  professional: Fatin Lieu, a budding mini engineer who loves snapping together wooden blocks and unscrewing the plastic lids on play containers, is already demonstrating early problem‑solving skills that
    suggest a future in product design where curiosity and practicality guide each playful prototype.
  sports: Fatin Lieu, an energetic infant who loves crawling after rolling soft play balls, joins the neighborhood Little Explorers parent‑child gym class, and enthusiastically claps when the local baseball
    team, the City Bears, scores a home run on family TV outings.
  arts: Fatin Lieu, a bright‑eyed infant who delights in the soothing melodies of Wolfgang Amadeus Mozart and the playful rhythms of Raffi’s Baby Beluga, frequently giggles at the animated bright‑colored
    illustrations in picture books by Eric Carle, and enjoys watching gentle dance performances by Misty Copeland on family screens.
  travel: Fatin Lieu, a curious tot who prefers stroller‑friendly outings, has already explored the local city park, visited the nearby aquarium with her family, and dreams of one day seeing the gentle
    waves of the Caribbean beaches while snuggled in a travel carrier.
  culinary: Fatin Lieu, a budding little food explorer, favors smooth pureed sweet potatoes, mashed bananas, and avocado with a hint of cinnamon, can skillfully fling peas onto the floor as a playful mess,
    and enjoys the occasional finger‑food snack of soft cheese cubes on her high‑chair tray.
  core: Fatin Lieu, a vivacious one‑year‑old whose boundless curiosity is tempered by a surprisingly tidy diaper routine, loves gathering shiny coins, drops everything within reach, and constantly seeks
    harmony in the bustling world around her.
background:
  cultural: Fatin is raised in Riverside, California, within a close-knit Southeast Asian family - her parents immigrated from Vietnam and maintain many traditions from their heritage. The household blends
    bilingual communication, speaking both English and Vietnamese, and celebrates cultural festivals such as Lunar New Year with special foods, decorations, and family gatherings. Traditional values of
    respect for elders, communal harmony, and compassion are woven into daily life, influencing her compassionate nature and cooperative spirit, while her American environment adds exposure to local customs,
    school routines, and a diverse community.
