  career_goals: Ahching aims to publish his debut novel—a literary work exploring themes of identity, migration, and belonging—through a major publishing house within the next three years. He also plans
    to release a collection of personal essays that blend memoir and cultural commentary, establish a monthly newsletter that spotlights emerging Midwest writers, and lead community workshops on narrative
    craft. Long‑term, he envisions leveraging his writing career to mentor young writers from underrepresented backgrounds and eventually transition into screenwriting for indie film projects.
