personas:
  professional: Gloria Villamayor, a 24‑year‑old software quality assurance professional, blends meticulous manual testing expertise with growing automation prowess, designing detailed test cases in JIRA,
    crafting Selenium‑Python suites, and championing data‑driven defect metrics while leveraging her competitive edge and structured mindset to push her Agile team toward higher coverage and reliability.
  sports: Gloria Villamayor fuels her competitive streak by logging weekend hikes on the Blue Ridge Trail, racing in local 5K community runs, practicing sunrise yoga, and cheering on the Charlotte Hornets
    (NBA) and Carolina Panthers (NFL) while belonging to a regional running club.
  arts: Gloria Villamayor captures everyday moments with a DSLR, drawing inspiration from photographers Vivian Maier and Sebastião Salgado, while unwinding with indie folk playlists featuring Sufjan Stevens
    and attending local gallery openings that showcase contemporary muralists.
  travel: Gloria Villamayor prefers meticulously planned weekend getaways, having explored Asheville’s art scene, the historic streets of New Orleans, and the peaks of Shenandoah National Park, while dreaming
    of trekking Patagonia’s Torres del Paine and tasting authentic Neapolitan pizza in Naples.
  culinary: Gloria Villamayor masters the art of traditional comfort food, regularly preparing tamales stuffed with pork and masa, simmering mole with chocolate and ancho chilies, and crafting fresh salsa
    verde from tomatillos, cilantro, and jalapeño, while also experimenting with homemade chorizo and exploring seasonal farmers‑market produce.
  core: Gloria Villamayor is a structured, detail‑obsessed QA engineer who balances analytical rigor with creative cooking, mountain hikes, and a competitive drive to automate every test she touches.
background:
  cultural: Gloria was born to Mexican parents who emigrated from Oaxaca, and she was raised in a bilingual household where Spanish is spoken daily. Her family maintains strong ties to Mexican traditions,
    celebrating Día de los Muertos, Mexican Independence Day, and the Christmas posada customs with music, lit candles, and homemade foods. The values of hard work, family solidarity, and respect for elders,
    common in Mexican culture, shape her personal ethos. Living in Athens, GA, Gloria blends these traditions with Southern hospitality—participating in community festivals and volunteering locally. Her
    cultural heritage influences her love for cooking, her enjoyment of Mexican folk music, and a deep appreciation for intergenerational storytelling, while also fostering a pragmatic, resilient outlook
    that complements her professional demeanor.
attributes:
  skills: '[''Manual functional testing'', ''Automated testing with Selenium (Python)'', ''Test case design and execution'', ''Defect tracking using JIRA'', ''Test management with TestRail'', ''API testing
    using Postman'', ''Agile Scrum methodology'', ''Regression testing'', ''Performance testing basics with JMeter'', ''SQL query writing for data validation'', ''Version control with Git'', ''Continuous
    integration pipelines with Jenkins'', ''Quality metrics reporting'', ''Risk-based testing'', ''Documentation and test coverage analysis'']'
  hobbies: '[''Chess'', ''Sudoku and crosswords'', ''Hiking on Blue Ridge trails'', ''Yoga'', ''Running (5K races)'', ''Cooking traditional Mexican dishes'', ''Photography (composition-focused)'', ''Tech
    meetups'', ''Volunteer coding tutoring'', ''Board games (Catan, Settlers of Catan)'']'
  career_goals: Gloria aims to transition from a tester role to a test-automation specialist within the next two years, earning the ISTQB Advanced Test Analyst and Selenium WebDriver certifications along
    the way. She plans to complete her bachelor's degree in Computer Science, leveraging her current coursework to deepen her programming skills. In the medium term, she aspires to become a QA Lead or Quality
    Engineering Manager, where she can shape testing strategies, mentor junior analysts, and champion the adoption of AI-driven test automation tools. Ultimately, Gloria envisions contributing to industry
    conferences and publishing case studies on improving software quality in fast-paced Agile environments.
