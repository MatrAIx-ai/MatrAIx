  hobbies: '["Gardening (vegetables, herbs)", "Traditional Mexican cooking", "Crocheting and knitting", "Reading historical fiction and biographies", "Solving crossword puzzles", "Attending weekly Catholic
    Mass and choir", "Walking along the Hudson River Park", "Listening to mariachi and bolero music", "Documenting family recipes and stories"]'
  career_goals: Although retired from formal employment, Sandra’s ambitions focus on maintaining her independence, health, and the cultural legacy she cherishes. She aims to keep her health regimen consistent—tracking
    appointments, medication, and nutrition—by using a structured weekly planner. Sandra wishes to expand her volunteer role at the Newburgh senior center, mentoring younger seniors in Spanish language
    skills and guiding them through bureaucratic processes. She also hopes to document her family’s recipes and oral histories in a handwritten notebook that can be passed down to grandchildren, preserving
    her Mexican heritage. Learning basic smartphone and video‑call functions is another personal goal, allowing her to stay connected with family members scattered across the country. Ultimately, Sandra
    seeks to be a reliable, reassuring presence for her family and community while ensuring her daily life remains orderly and stress‑free.
