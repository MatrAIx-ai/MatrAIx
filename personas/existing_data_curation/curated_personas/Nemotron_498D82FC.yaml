personas:
  professional: Julio Cabrera, a seasoned technology executive with an engineering foundation, they leverage over three decades of C‑suite leadership to steer their company toward sustainable technology
    and ethical governance, translating complex data into practical strategies while mentoring the next generation and balancing curiosity with pragmatic decision‑making.
  sports: Julio Cabrera, an avid hiker, spends weekends traversing the Wichita Mountains with the local Wichita Mountains Hiking Club, they follow the Oklahoma City Thunder with fervor, play doubles tennis
    at the Edmond Country Club, and enjoy occasional rounds of golf at Sand Creek Golf Course, valuing both solo outdoor pursuits and community sports camaraderie.
  arts: Julio Cabrera, a classical guitar enthusiast, they spend evenings practicing pieces by Andrés Segovia and Joaquín Rodrigo, regularly attend performances by the Oklahoma City Philharmonic, delight
    in flamenco guitar recordings, read historical non‑fiction works like 'The Rise and Fall of the Third Reich' and business classics such as 'Good to Great', and volunteer at the local cultural society’s
    art exhibitions.
  travel: Julio Cabrera plans an annual pilgrimage to Spain, where they visit family in Madrid, explore the historic streets of Seville during Semana Santa, and sample regional wines in Rioja, while also
    embarking on domestic road trips to Yellowstone and the Grand Canyon, preferring a balanced itinerary that combines detailed planning with spontaneous detours, mindful of budget constraints and a desire
    for cultural immersion.
  culinary: Julio Cabrera, an avid home chef, they masterfully prepare paella with saffron, rabbit, and fresh garden herbs, craft gazpacho with heirloom tomatoes, and whip up tortilla  española, pairing
    these dishes with Rioja and Ribera del Duero wines, while tending a modest herb garden of rosemary, thyme, and oregano that supplies their kitchen, and occasionally splurge on a costly vintage bottle
    as a reward for a successful project.
  core: Julio Cabrera, a 63‑year‑old tech leader who blends analytical rigor with a love for Mediterranean music, gardening, and sustainable stewardship, often worries but channels that energy into strategic,
    community‑focused action.
background:
  cultural: Julio was born to Spanish parents who immigrated to the United States in the early 1970s, and he was raised in a bilingual household where both Spanish and English were spoken daily. He grew
    up celebrating Spanish holidays such as Semana Santa, Día de los Reyes, and regional festivals, and he retains a deep appreciation for Mediterranean cuisine, music, and family-centered gatherings. After
    completing his STEM degree, he built his career in the United States, eventually settling in Edmond, Oklahoma. There, he has blended his Spanish cultural values—warmth, hospitality, and a strong sense
    of community—with Midwestern sensibilities of modesty, civic involvement, and a love for the outdoors. Julio remains actively connected to his roots through regular trips to Spain, participation in
    the local Spanish cultural society, and maintaining fluency in both languages.
attributes:
  skills: '["Strategic Planning", "Financial Management", "Operations Optimization", "Technology Integration", "Data Analytics", "Risk Assessment", "Corporate Governance", "Cross-Cultural Communication",
