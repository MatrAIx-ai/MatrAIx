  career_goals: At this stage of his career, Julio aims to cement a lasting legacy by positioning the company as a leader in sustainable technology and ethical governance. He seeks to expand the organization’s
    global footprint, particularly strengthening ties with European partners in Spain, while embedding a culture of employee well-being and work-life balance. Succession planning is a top priority; he is
    mentoring his designated successor and preparing to transition into a board-level advisory role. Additionally, he aspires to launch a philanthropic foundation focused on STEM education for under-represented
    youth, leveraging his own background to inspire the next generation of engineers and innovators.
