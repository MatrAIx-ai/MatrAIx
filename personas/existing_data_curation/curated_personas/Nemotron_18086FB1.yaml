  career_goals: Joel aims to become an indie game developer and concept artist, eventually launching his own studio that blends compelling narratives with striking visual design. In the short term, he plans
    to finish high school, enroll in a community college program that combines computer science and digital art, build a robust portfolio of freelance illustration work, and compete in game‑design contests.
    He also hopes to earn a scholarship for a BFA in visual arts or a related degree, positioning himself for a career that balances creative freedom with technical expertise.
