personas:
  professional: Joel Johnson, a 16‑year‑old aspiring indie game developer and concept artist, merges strong analytical thinking with a flair for digital illustration, using Procreate and Photoshop to prototype
    game assets while rigorously dissecting gameplay mechanics to refine game design concepts.
  sports: Joel Johnson thrills on a local skate crew at the downtown skatepark, follows the Portland Timbers and the Portland Trail Blazers for occasional weekend viewings, hikes the Deschutes River Trail
    every summer, and incorporates daily 30‑minute jogs to maintain stamina for both gaming marathons and physical pursuits.
  arts: Joel Johnson immerses themselves in street sketching of downtown murals, draws inspiration from Hayao Miyazaki’s fantastical worlds and the graphic style of Bee Bee Bee, attends indie‑music gigs
    featuring artists like Mitski and Car Seat Headrest, and curates short TikTok video edits set to the music of Tame Impala.
  travel: Joel Johnson plans budget‑friendly day trips to the Oregon Coast for tide‑pool photography, dreams of backpacking through Japan’s Akihabara district to soak up game culture, balances family obligations
    by visiting grandparents in the valley during holidays, and prefers spontaneous hikes over elaborate itineraries.
  culinary: Joel Johnson enjoys cooking up spicy ramen bowls with miso broth and extra garlic, perfects a crusty sourdough pizza topped with pepperoni and fresh basil on weekends, and snacks on pork‑filled
    dumplings and avocado toast while editing video clips, though they often forget to eat breakfast before school.
  core: Joel Johnson blends a competitive gamer’s edge with a sketch artist’s imagination, turning every spare moment into a creative experiment, even if that means sacrificing sleep, budget, or a regular
    dental check‑up.
background:
  cultural: Joel is a white, mid‑western American who grew up in Bend, Oregon—a community known for its outdoor recreation, vibrant indie arts scene, and progressive, environmentally conscious culture.
    His upbringing blended suburban family life with frequent exposure to the Pacific Northwest’s mountains, rivers, and forestry, fostering a deep appreciation for nature and a laid‑back yet curious worldview.
    Local influences include the town’s skate parks, the thriving craft‑beer and music venues, and a supportive network of youth art programs that encourage unconventional thinking and self‑expression.
