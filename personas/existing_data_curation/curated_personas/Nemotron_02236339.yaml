  career_goals: Marvin aims to complete a bachelor's degree in Emergency Medical Services or nursing within the next three years, positioning himself for advanced clinical roles. He is working toward the
    Certified Flight Paramedic (FP‑C) credential to join a regional air‑medical transport team. Long‑term, he envisions a leadership position as an EMS supervisor or coordinator for the Rialto fire department,
    where he can implement data‑driven response strategies and develop community outreach programs that address the opioid crisis and disaster preparedness. He also hopes to mentor new paramedics and eventually
    teach at a local community college.
