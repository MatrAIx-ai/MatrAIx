personas:
  professional: Patricia Taylor, a 25-year-old aspiring journeyman carpenter, merges practical carpentry expertise with an artistic eye, using reclaimed wood, low‑VOC finishes, and custom design to craft
    functional art while coordinating small crews with a cooperative, laid‑back style.
  sports: Patricia Taylor fuels fitness through weekend hikes in the Selkirk Mountains, trail runs along the Spokane River, and regular yoga classes, cheering on the Spokane Chiefs hockey team and occasionally
    joining a local climbing gym for a change of pace.
  arts: Patricia Taylor expresses creativity through watercolor landscapes, analogue nature photography, and folk guitar sessions around campfires, drawing inspiration from Ansel Adams, Andrew Wyeth, and
    Joni Mitchell while sharing techniques at Spokane’s maker space.
  travel: Patricia Taylor prefers nature‑centric getaways, having trekked the Canadian Rockies and explored the Oregon Coast, while dreaming of Iceland’s waterfalls; they plan trips spontaneously with a
    modest budget, often combining weekend hikes with visits to local artisan fairs.
  culinary: Patricia Taylor enjoys farm‑to‑table cooking, often preparing grilled trout with rosemary, roasted root vegetables, and homemade sourdough, using herbs from their garden and chopping on reclaimed‑wood
    boards, though they sometimes over‑complicate recipes with unnecessary garnishes.
  core: Patricia Taylor blends a restless curiosity for sustainable craftsmanship with a calm, occasionally anxious nature, juggling creative projects, nature escapes, and a habit of procrastination that
    fuels both spontaneity and stress.
background:
  cultural: Patricia grew up in a white, working‑class family with deep roots in the Pacific Northwest. Her paternal grandparents emigrated from Germany in the early 1900s, while her maternal ancestors
    were Swedish settlers who arrived in Washington during the logging boom of the 1920s. The family settled in Spokane’s South Hill neighborhood, where a blend of industrial labor and community solidarity
    shaped her values. Local traditions of outdoor recreation, such as camping, fishing, and mountain hiking, were a staple of her childhood, as were annual visits to the Spokane Art Center and community
    craft fairs. This environment fostered a respect for craftsmanship, an appreciation for nature, and a cooperative spirit that informs her daily interactions. As a married young adult, she balances the
    region’s pragmatic work ethic with an emerging desire to integrate sustainable, artistic expression into her trade.
