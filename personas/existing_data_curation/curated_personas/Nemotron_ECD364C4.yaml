  career_goals: Patricia aims to turn her craft into a sustainable business while securing a stable income for her family. Over the next three to five years she plans to complete a journeyman carpenter
    certification, expand her portfolio of custom, art‑inspired furniture, and eventually open a small studio in Spokane that showcases reclaimed‑wood pieces and offers workshops for community members.
    She also hopes to mentor apprentices, integrate eco‑friendly design principles, and collaborate with local galleries to bring functional art to a broader audience.
