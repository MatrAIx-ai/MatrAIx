  career_goals: Ashton dreams of turning his passion for visual art and coding into a future career as a game designer or interactive media artist. He aims to deepen his programming and illustration abilities,
    compete in school robotics and art contests, and eventually attend a specialized high school or university program that blends computer science with visual storytelling. He also hopes to create projects
    that help other kids manage anxiety, channeling his own sensitivity into positive impacts.
