personas:
  professional: Ashton Nguyen, an aspiring game developer and junior inventor, blends their love for manga art, Scratch programming, and Snap Circuits to prototype simple interactive stories, while their
    competitive edge drives meticulous refinement despite occasional over‑worry about perfection.
  sports: Ashton Nguyen, a low‑key sports fan, cheers for the New York Knicks and Mets, plays pickup basketball at a local Queens park, and participates in the Queens Youth Soccer Club, they view physical
    activity as a necessary break rather than a passion.
  arts: Ashton Nguyen, a manga‑enthusiast and indie‑instrumental aficionado, spends afternoons sketching characters inspired by Eiichiro Oda and Masashi Kishimoto while listening to Explosions in the Sky
    and Ryuichi Sakamoto, and they frequent the Queens Museum’s street‑art exhibitions for fresh inspiration.
  travel: Ashton Nguyen, a curious explorer, enjoys weekend trips to Coney Island’s boardwalk, yearly visits to the cherry‑blossom festival in Washington D.C., and dreams of traveling to Kyoto’s lantern
    festivals that echo family celebrations, though family budgets keep most adventures within the borough, and they often plan trips with a spreadsheet.
  culinary: Ashton Nguyen, an eager junior chef, helps perfect the broth for family pho, crafts bánh mì sandwiches with crusty baguettes, cilantro, and pâté, experiments with fresh spring roll fillings
    of shrimp, rice vermicelli, and mint, and they also delight in pepperoni pizza and sushi rolls on occasional outings.
  core: Ashton Nguyen is a meticulous, worry‑prone 11‑year‑old who channels competitive curiosity into manga art, game coding, and family cooking, and they can be stubborn about sharing snacks while over‑organizing
    sketchbooks.
background:
  cultural: Ashton is a second‑generation Vietnamese‑American growing up in Sunnyside, Queens. At home he speaks Vietnamese with his parents and grandparents and celebrates cultural holidays such as Tet
    and the Mid‑Autumn Festival. His family often prepares traditional dishes like pho, bánh mì, and spring rolls, giving him a direct connection to his heritage. The diverse Queens neighborhood exposes
    him to a multitude of languages, foods, and artistic traditions, shaping a blended identity that values both academic diligence and creative expression. This dual cultural lens fuels his curiosity,
    openness to new ideas, and the subtle pressure to succeed, which sometimes contributes to his worries.
