personas:
  professional: Crystal Castillo is a detail‑oriented interior painter and paperhanger whose bilingual fluency and precise job‑estimating expertise enable them to lead small crews in delivering eco‑friendly,
    low‑VOC finishes on schedule, while their methodical planning and assertive customer service ensure every project meets exacting quality standards.
  sports: Crystal Castillo balances fitness with fun by hiking the Santa Monica Mountains on weekends, joining a co‑ed volleyball league at the community center, and cheering for the Los Angeles Lakers
    and Los Angeles Dodgers while occasionally swapping a salsa‑dance cardio session with friends.
  arts: Crystal Castillo finds creative release in painting vivid abstracts inspired by Henri Matisse, perusing interior‑design magazines for Kelly Wearstler’s bold spaces, and attending live performances
    by the downtown jazz quartet ‘Blue Skyline,’ which fuels their artistic sensibility.
  travel: Crystal Castillo’s travel style blends structured design pilgrimages—such as a weekend workshop touring Santa Fe’s adobe galleries—and spontaneous nature escapes, exemplified by a dream hike through
    the Canadian Rockies, all meticulously budgeted with a travel spreadsheet.
  culinary: Crystal Castillo relishes preparing bold, flavor‑rich meals such as herb‑crusted pork shoulder, lemon‑zest grilled chicken, and fresh homemade flatbreads, showcasing an intermediate‑to‑expert
    home‑cook skill set, and they love hosting lively dinner gatherings, though they sometimes over‑season or forget to set a timer, leading to the occasional burnt edge.
  core: Crystal Castillo merges disciplined project management with a love for salsa dancing and community volunteering, thriving on structured routines while often overcommitting to DIY home projects and
    occasionally neglecting personal downtime.
background:
  cultural: Crystal is the daughter of Mexican immigrants and grew up in a close‑knit Mexican‑American community in the Chicago suburbs. She is bilingual, celebrating traditions such as Día de los Muertos,
    Mexican Independence Day, and family quinceañeras. Her upbringing emphasized hard work, respect for elders, and the importance of community support. Mexican cuisine, music, and Catholic holidays are
    integral parts of her life, and she often incorporates these cultural elements into her social gatherings and cooking.
