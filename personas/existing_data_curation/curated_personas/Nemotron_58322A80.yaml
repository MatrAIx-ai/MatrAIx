  career_goals: Crystal aims to become a licensed general contractor within the next five years and eventually launch her own painting and finishing company that specializes in eco‑friendly, low‑VOC paints
    for residential and boutique commercial clients. She wants to build a reputation for reliable, high‑quality work while creating apprenticeship opportunities for other women and bilingual workers in
    her community. A long‑term ambition is to be recognized as a go‑to expert for decorative finishes and to lead a small crew that consistently exceeds client expectations.
