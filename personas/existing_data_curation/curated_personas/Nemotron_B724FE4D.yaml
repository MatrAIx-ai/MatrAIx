  hobbies: '[''Visiting Art Museums'', ''Sketching and Watercolor Painting'', ''Hiking'', ''Yoga'', ''Trivia Nights'', ''Board‑Game Groups'', ''Live Music Events'', ''Experimental Cooking'', ''Street‑Art
    Photography'']'
  career_goals: Mildred aims to re‑enter the workforce within the next two years by completing a bachelor’s degree in Art History or Museum Studies. Her short‑term goal is to secure a full‑time position
    as an Arts Program Coordinator for a Denver‑based nonprofit, where she can design inclusive community art initiatives and manage public events. In the medium term, she aspires to become a Director of
    Community Arts Engagement, overseeing a network of galleries, workshops, and public art projects. She also entertains the possibility of launching her own curatorial consultancy that partners with local
    artists and cultural institutions to create experimental exhibitions.
