personas:
  professional: Mildred Mims, a 32‑year‑old Arts Program Coordinator‑in‑training, blends meticulous project‑management checklists with a razor‑sharp curiosity about inclusive community art, channeling her
    competitive edge into designing award‑winning public art festivals for Denver nonprofits.
  sports: Mildred Mims, an avid hiker and weekend yogi, belongs to the Boulder‑Based Alpine Trek Club, frequently conquers Colorado’s high‑altitude trails in summer, roots for the Denver Broncos and Colorado
    Avalanche, and approaches fitness with a competitive mindset, often timing her runs against personal bests.
  arts: Mildred Mims, a watercolor sketcher and frequent patron of the Denver Art Museum, draws inspiration from both European classical painters like Monet and contemporary Indigenous artists such as Natalie
    White Feather, while also devouring the music of Yo‑Yo Ma, R. Carlos Nakai, and The Lumineers to fuel her creative brainstorming sessions.
  travel: Mildred Mims, a strategic traveler who prefers meticulously planned week‑long road trips, has explored the historic streets of Santa Fe, the alpine villages of Austria, and dreams of hiking the
    Swiss Alps, but balances her wanderlust with a modest savings plan that prioritizes local weekend escapes to nearby mountain towns.
  culinary: Mildred Mims, an experimental home cook with a solid grasp of Mediterranean flavors, regularly prepares quinoa‑crusted salmon with pomegranate glaze, loves incorporating seasonal Colorado produce
    like heirloom carrots, and occasionally over‑indulges in spicy Sichuan hot‑pot nights with friends.
  core: Mildred Mims, a 32‑year‑old organized creative with a competitive streak, channels her anxiety into meticulous planning, thriving in community art projects while juggling a fondness for hiking,
    experimental cooking, and an occasional impulse purchase of limited‑edition prints.
background:
  cultural: Mildred is a white American who grew up in Denver, Colorado, near the foothills of the Rockies. Her family’s heritage traces back to German and Anglo‑American roots, but she has been shaped
    by Denver’s vibrant, multicultural environment. Exposure to the city’s diverse festivals, Indigenous art exhibits, and progressive arts scene has cultivated an appreciation for both European classical
    traditions and contemporary Native American influences. She identifies strongly with the independent, outdoors‑oriented ethos of Colorado while actively participating in the city’s inclusive cultural
    community.
