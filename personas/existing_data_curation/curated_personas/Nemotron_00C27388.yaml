  hobbies: '["Strategic board games","Puzzle solving (Sudoku, crosswords)","Weight training","Tai Chi","Cooking Asian cuisine","Reading business and self‑improvement books","Investing and personal finance","Hiking
    in local parks","Strategy video gaming","Meditation and journaling"]'
  career_goals: Ok Cheng aims to become a senior project manager within the next three years, leading large‑scale infrastructure and energy projects in the Houston area. He plans to earn the PMP certification
    soon, pursue an MBA to deepen his strategic business knowledge, and eventually obtain a PgMP to qualify for a PMO director role. Long‑term, he aspires to launch his own consultancy focused on efficiency‑driven
    project solutions, earning recognition as a trusted leader in high‑impact project delivery.
