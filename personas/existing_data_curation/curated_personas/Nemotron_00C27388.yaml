personas:
  professional: An ambitious project manager, Ok Cheng leverages Six Sigma, Agile, and advanced Excel to orchestrate risk‑aware, on‑time infrastructure projects, while they maintain a competitive edge,
    skeptical of stakeholder motives, and relentlessly pursue rigorous process optimization.
  sports: An energetic fitness enthusiast, Ok Cheng hits the local gym for weight training, practices Tai Chi at sunrise for focus, plays pickup basketball with fans of the Houston Rockets, tracks the Astros’
    season, and hikes the Buffalo Bayou Trail on weekends.
  arts: An avid cultural appreciator, Ok Cheng routinely attends live piano recitals featuring Yo‑Yo Ma, streams soundtracks by Hans Zimmer, binge‑watches Lin‑Manuel Miranda’s Broadway productions, and
    analyzes the strategic narratives in board‑game art like those of Settlers of Catan, reinforcing a blend of analytic and creative stimulation.
  travel: A meticulous traveler, Ok Cheng plans trips with spreadsheet‑precision, has explored the music festivals of New Orleans and the culinary lanes of Austin, trekked Taiwan’s night markets, and dreams
    of aurora‑hunting in Tromsø while balancing a limited budget and a desire for immersive cultural experiences.
  culinary: An experimental home chef, Ok Cheng masters the balance of fiery mapo tofu, sweet‑savory char siu pork, delicate jiaozi dumplings, and uses fresh ginger, garlic, and Sichuan peppercorns to infuse
    each plate, while frequently documenting recipes in a digital journal and occasionally burning the garlic when multitasking between video game raids.
  core: Ok Cheng is a structured, goal‑driven 25‑year‑old whose relentless pursuit of efficiency is tempered by chronic worry, a competitive streak, and a penchant for over‑analyzing both work and leisure.
background:
  cultural: Ok Cheng is a second‑generation East Asian American of Chinese heritage, born and raised in Houston, Texas. He grew up bilingual, speaking Mandarin at home and English at school, and his family
    places strong emphasis on education, discipline, and respect for elders. Cultural traditions such as Lunar New Year, the Mid‑Autumn Festival, and family reunions remain important in his life. The multicultural
    environment of Houston has exposed him to diverse cuisines and community events, shaping a blended identity that honors his Asian roots while embracing broader American values.
attributes:
  skills: '["Project Planning","Risk Management","Budget Management","Stakeholder Communication","Process Optimization","Agile & Scrum","Data Analysis","Microsoft Project","JIRA","Six Sigma Green Belt","Team
