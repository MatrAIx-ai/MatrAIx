persona_description: A paleontologist who specializes in the study of marine reptiles, particularly ichthyosaurs and their eye anatomy. His research interests include the evolution and evolution of eye
  size in marine reptiles, the role of large eyes in hunting and survival strategies, and the fossil record of marine reptiles. He is particularly interested in the largest known eyeball in the fossil record
  and its possible significance in understanding the evolution of marine reptiles. He is also interested in the potential for large eyes to be an adaptation for deep-sea living and the potential for the
  largest known eyeball in the fossil record to be an adaptation for deep-sea living.
