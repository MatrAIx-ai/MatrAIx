  hobbies: '[''Playing acoustic guitar'', ''Cooking traditional Mexican dishes'', ''Sketching and doodling'', ''Gardening and caring for plants'', ''Journaling for self‑reflection'', ''Listening to regional
    Mexican music'', ''Watching educational YouTube videos on biology and nutrition'']'
  career_goals: Maria aims to complete her GED within the next two years and then enroll in a community college program for health sciences, with the short‑term goal of earning a Certified Nursing Assistant
    (CNA) credential. She is drawn to the medical field because it combines her curiosity about biology and nutrition with a practical, stable career that can support her family. In parallel, she hopes
    to deepen her culinary skills through a vocational certificate in Mexican cuisine, envisioning a future where she could either work in a local restaurant or start a small home‑based catering service.
    Maria's long‑term ambition is to become a bilingual community health worker who can educate and assist Spanish‑speaking residents in Fresno about preventative health, nutrition, and access to resources,
    blending her cultural roots with her desire to give back to her community.
