personas:
  professional: Maria Mendoza is a diligent teen preparing to earn a GED and pursue a CNA credential, balancing their curiosity about biology with the practical goal of supporting their family, and they
    often volunteer at community health fairs while helping their younger siblings with schoolwork.
  sports: Maria Mendoza enjoys playing intramural soccer with the school’s girls’ team and follows the Fresno State Bulldogs, using garden work as a low‑intensity fitness routine, while they cheer on local
    baseball games at the stadium during weekends.
  arts: Maria Mendoza is an aspiring acoustic guitarist who learns new chords from YouTube tutorials and sings regional ballads, while they sketch neighborhood scenes in a notebook and draw inspiration
    from artists such as Vicente Fernández and contemporary indie folk singer Kacey Musgraves.
  travel: Maria Mendoza loves weekend trips to nearby Yosemite for hiking, dreams of exploring Oaxaca's culinary markets, and they carefully plan low‑budget family vacations that balance adventure with
    their responsibilities at home.
  culinary: Maria Mendoza delights in preparing tamales, sopes, and homemade salsa, meticulously noting each variation in a handwritten recipe journal, and they favor fresh peppers, tomatoes, and cilantro
    from the community plot, though they sometimes over‑salt dishes when stressed.
  core: Maria Mendoza is a caring, organized teen who blends a love for music, cooking, and community health with a tendency toward worry, and they keep a journal to help maintain balance.
background:
  cultural: Maria grew up in a close‑knit Mexican‑American family in Fresno, where Spanish is spoken at home and English is used at school and in the broader community. Family traditions such as celebrating
    Día de los Muertos, quinceañeras, and weekly family meals are central to her identity, reinforcing values of collectivism, respect for elders, and 'familismo.' Her parents and extended relatives have
    long worked in the Central Valley's agricultural sector, exposing her to farm life and the rhythms of seasonal labor. This background has instilled a strong work ethic, a deep appreciation for fresh,
    locally grown produce, and a sense of responsibility toward her community. Religious customs, often linked to Catholic observances, provide additional social gatherings and volunteer opportunities,
    further shaping her empathy and communal mindset.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Basic cooking and meal preparation'', ''Fundamental computer literacy (email, social media, word processing)'', ''Organizational and scheduling
