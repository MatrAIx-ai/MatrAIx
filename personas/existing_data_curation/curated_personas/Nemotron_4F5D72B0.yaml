personas:
  professional: A budding junior architect, Richard Hymel channels their vivid imagination into constructing intricate LEGO models and sketching detailed drawings, while their balanced approach to organization
    ensures projects are completed on time and their sociable nature makes them a collaborative star in classroom group work.
  sports: An energetic youth soccer enthusiast, Richard Hymel stars as a forward for the Maple Grove Kids Soccer Club, thrives on teamwork and cheering with friends, practices drills after school, but occasionally
    skips warm‑up stretches, leading to occasional sore knees.
  arts: A creative young artist, Richard Hymel spends afternoons drawing cartoon heroes, painting vibrant landscapes, and practicing beginner keyboard songs like “Twinkle Twinkle Little Star,” while drawing
    inspiration from musicians such as Kidz Bop and the classic melodies of The Beatles.
  travel: A curious little explorer, Richard Hymel enjoys family trips to places like Yellowstone National Park, Ocean City beach, and the local botanical garden, preferring short hikes with packed snacks,
    hands‑on map activities, and the excitement of discovering new wildlife.
  culinary: A budding foodie, Richard Hymel loves pizza with pepperoni, mac‑and‑cheese, fresh strawberry smoothies, and delights in helping mom bake banana muffins, confidently measuring flour and sugar,
    while experimenting with colorful frosting designs.
  core: Richard Hymel is a bright, imaginative 7‑year‑old who fuses LEGO engineering, soccer energy, and a love for art into a lively, cooperative explorer of the world around them.
background:
  cultural: Richard grows up in District Heights, MD, within a middle‑class, primarily white family that values community, education, and participation in local events. He celebrates typical American holidays
    such as Thanksgiving, Christmas, and Fourth of July with family traditions that include communal meals and fireworks. The diverse neighborhood of Prince George's County provides exposure to multicultural
    perspectives through school and community programs, fostering an inclusive outlook. His upbringing includes regular visits to the public library, after‑school art classes, and neighborhood sports leagues,
    all of which shape his collaborative and creative spirit.
