  hobbies: '[''Reading contemporary African American literature'', ''Writing poetry'', ''Watercolor sketching'', ''Yoga and mindfulness meditation'', ''Hiking in Nevada’s desert and mountain trails'', ''Cooking
    health‑focused soulful meals'', ''Volunteering at community health fairs'', ''Leading small nutrition and stress‑management workshops'']'
  career_goals: Driven by both curiosity and practicality, Dorothy aims to advance her nursing career by obtaining a Bachelor of Science in Nursing (BSN) within the next two years, followed by a Master
    of Science in Nursing with a focus on community health leadership. She aspires to become a charge nurse and eventually a nurse manager, where she can spearhead culturally sensitive health promotion
    programs for underserved Black communities in Nevada. Dorothy is also interested in developing a therapeutic art program that integrates her humanities background into patient care, and she hopes to
    contribute scholarly articles on nursing practice and health equity to professional journals.
