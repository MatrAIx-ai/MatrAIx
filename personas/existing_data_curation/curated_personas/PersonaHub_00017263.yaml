persona_description: A zoologist who specializes in zooarchaeology, particularly the study of animal remains from the Iron Age in Britain. She is interested in how zooarchaeological research can reveal
  aspects of social status and hierarchy in the past, and how animal bones can be interpreted to demonstrate this. She is knowledgeable about the symbolic value of animals like pigs and horses, their use
  in hunting and warfare, and their burial practices. She is also interested in the interpretation of animal remains from other cultures and time periods.
