  hobbies: '[''Visiting Art Galleries'', ''Collecting Puerto Rican Folk Art'', ''Attending Local Music and Dance Festivals'', ''Hiking in El Yunque and Coastal Trails'', ''Practicing Yoga and Guided Meditation'',
    ''Cooking Traditional Puerto Rican Dishes'', ''Reading Contemporary Literature'', ''Journaling'', ''Volunteer Teaching Art Workshops'', ''Exploring Historical Sites in Hatillo'']'
  career_goals: Wilmary aims to position her lodging property as the premier eco‑certified destination in the Hatillo region, pursuing LEED or Green Key certification within the next three years. She envisions
    establishing a community apprenticeship program that partners with local high schools and vocational schools to train the next generation of hospitality professionals, integrating her educational background
    into real‑world practice. Long‑term, she hopes to expand the current property into a boutique inn that offers curated cultural experiences—art showcases, cooking workshops, and heritage tours—highlighting
    Puerto Rican creativity. To support these ambitions, she plans to pursue a professional certificate in Sustainable Tourism Management and to earn a regional award for hospitality excellence.
