persona_description: A person interested in history, particularly the Civil Rights Movement and its impact on American society. They are a scholar of John M. Perkins, a Jacksonian who has made significant
  contributions to the formation of the Christian Community Development Association and the emerging generation of young evangelicals. They are also interested in the history of Mississippi and the role
  of religion in American society. They are likely to be interested in the Old Capitol Museum and the History Is Lunch Series, which are events that celebrate the life and work of John M. Perkins and his
  legacy.
