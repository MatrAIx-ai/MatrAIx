  career_goals: Terrence aspires to become a STEM professional—ideally a mechanical or aerospace engineer—who designs functional inventions that solve real‑world problems. In the short term, he aims to
    win his middle school science fair with a project that combines coding and engineering, secure a leadership role in his school’s robotics or coding club, and maintain a top academic standing. He also
    envisions eventually studying at a university renowned for engineering while still contributing to his community by mentoring younger students.
