personas:
  professional: Terrence Barrios is a budding young coder who designs simple games in Scratch and constructs detailed LEGO models, channeling his meticulous organization and curiosity into disciplined problem‑solving
    and collaborative coding club projects.
  sports: Terrence Barrios pitches for the Royston Little League baseball team in the spring, dribbles in a community soccer clinic in the fall, follows the Atlanta Braves and Georgia Bulldogs with fervor,
    and logs daily step counts on a smartwatch to maintain disciplined fitness.
  arts: Terrence Barrios practices piano pieces by Ludwig van Beethoven and Dolly Parton’s Jolene, devours science‑fiction novels by Jules Verne, watches Marvel movies starring Chris Pratt, and collects
    comic strips from The Peanuts series, weaving these artistic influences into imaginative Scratch stories.
  travel: Terrence Barrios dreams of road‑tripping to the Great Smoky Mountains and Washington, D.C., loves seasonal visits to the local county fair in Royston, and meticulously maps out family vacations
    with hand‑drawn itineraries, balancing a modest allowance with a love for exploring new landscapes.
  culinary: Terrence Barrios favors Southern comfort foods like fried chicken, mac and cheese, peach cobbler, and grits, enjoys assembling PB&J sandwiches and baking simple chocolate chip cookies using
    a child‑sized kitchen set, and often trades recipes for homemade lemonade at the church potluck.
  core: Terrence Barrios blends childlike curiosity with disciplined order, turning LEGO bricks, Scratch code, and piano keys into a precise, solitary playground while habitually cataloguing allowance and
    health logs.
background:
  cultural: Terrence’s cultural background is rooted in a rural Southern community in Royston, Georgia. He grew up in a close‑knit family that values Southern hospitality, community involvement, and faith‑based
    traditions. Local customs such as church gatherings, school‑spirit events, and county fairs have shaped his sense of belonging. While his household reflects a predominantly Anglo‑American heritage,
    his upbringing includes exposure to regional music, cuisine, and a strong emphasis on personal responsibility and respect for nature.
