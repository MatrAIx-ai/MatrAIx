  hobbies: '[''Gardening'', ''Quilting'', ''Birdwatching'', ''Listening to classic rock vinyl'', ''Weekend trips to the Jersey Shore'', ''Reading cozy mystery novels'', ''Volunteer work at a food pantry'']'
  career_goals: Sarah aspires to move into a supervisory role on the production floor, where she can combine her practical expertise with her natural assertiveness to improve team efficiency and morale.
    She plans to complete a Certified Production Technician (CPT) program and earn a Lean Six Sigma Yellow Belt to strengthen her process‑improvement credentials. Long‑term, she hopes to transition into
    a quality assurance specialist position that offers a more predictable schedule, reducing the stress of constant deadline pressure. She also entertains the idea of eventually starting a small home‑based
    craft business—such as handmade quilts—to supplement her income while allowing more flexibility.
