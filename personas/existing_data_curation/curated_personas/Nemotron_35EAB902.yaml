personas:
  professional: Sarah Minneman, a 42‑year‑old production line specialist with over a decade of hands‑on experience operating CNC cutters, packaging wrap‑around machines, and conveyor control panels, blends
    a meticulous, safety‑first mindset with a spontaneous knack for quick fixes, positioning her as a natural candidate for a supervisory role where she can lead lean initiatives while mentoring new hires.
  sports: Sarah Minneman is a casual fan of the New York Giants and the New Jersey Devils, attending a few games each season, and she joins a weekend walking group at Sandy Hook that serves as her low‑impact
    fitness routine, preferring steady, solitary activity over competitive sports.
  arts: Sarah Minneman nurtures her artistic side through intricate quilt‑making and a devotion to classic rock and 70s soul vinyl, frequently spinning records by Led Zeppelin, The Rolling Stones, Aretha
    Franklin, and Marvin Gaye while she stitches, which provides both a soothing ritual and an emotional outlet for her worries.
  travel: Sarah Minneman favors spontaneous, short‑haul getaways, often packing a tote for a weekend drive to the Jersey Shore to stroll the boardwalk, collect seashells, and breathe salty air, while keeping
    a wishlist of tranquil spots like the Hudson Valley farms and Cape May to satisfy her desire for quiet scenery within a modest budget.
  culinary: Sarah Minneman delights in farm‑to‑table cooking, regularly tossing home‑grown basil, rosemary, and ripe tomatoes into fresh pasta sauces or herb‑infused olive oil for salads, and she enjoys
    mastering a perfectly roasted chicken and experimenting with seasonal preserves using garden harvests.
  core: Sarah Minneman, a meticulous yet spontaneously impulsive 42‑year‑old production line veteran, finds solace in quiet quilting and garden rituals while battling chronic worry that fuels both her safety‑driven
    work ethic and her occasional over‑thinking.
background:
  cultural: Sarah grew up in a middle‑class, white, working‑family in the suburban towns of Ocean County, New Jersey. Her family’s cultural practices reflect mainstream American customs—celebrating holidays
    such as Thanksgiving, Fourth of July barbecues, and Easter gatherings, often with a modest Catholic or Protestant background. The community emphasizes hard work, practicality, and neighborly support,
    values that shaped her reserved yet cooperative demeanor. Living in Lakewood, a town with a mix of cultures, she has adopted a pragmatic, inclusive outlook while retaining a strong identification with
    the working‑class, blue‑collar ethos of the New Jersey shoreline region.
attributes:
  skills: '[''Machine operation'', ''Preventive equipment maintenance'', ''Forklift operation'', ''Quality inspection'', ''Safety compliance'', ''Technical troubleshooting'', ''Process documentation'',
