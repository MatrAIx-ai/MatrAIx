personas:
  professional: Sokchea Vang, a budding robotics hobbyist, channels their competitive drive and love of routine into meticulously programming autonomous machines for the school club, while their critical
    eye keeps team projects sharply focused.
  sports: Sokchea Vang energizes the school soccer team as a forward, also training with the local Malden Youth Soccer Club, and draws inspiration from the Boston Celtics and Boston Red Sox, balancing high‑intensity
    drills with a routine conditioning schedule that satisfies their competitive nature.
  arts: Sokchea Vang immerses themselves in after‑school traditional dance lessons, while streaming Taylor Swift and BTS for musical inspiration and quoting favorite lines from YA novelist Sarah J. Maas
    during casual hangouts, blending cultural heritage with contemporary pop culture.
  travel: Sokchea Vang prefers well‑planned weekend getaways, having visited the family’s ancestral village in Southeast Asia and the historic temples of Kyoto, they now dream of hiking the Grand Canyon
    and savoring gelato on a Roman piazza during future school breaks.
  culinary: Sokchea Vang proudly chops herbs for num banh chok and carefully wraps fish in banana leaves under parental guidance, while also experimenting with homemade pizza and sushi rolls, showcasing
    a budding culinary confidence that balances tradition with teenage curiosity.
  core: Sokchea Vang blends a disciplined love for routine with a fierce competitive spirit, juggling soccer, robotics, and cultural dance while secretly hoarding snack wrappers for later art projects and
    constantly worrying about every missed goal.
background:
  cultural: Sokchea is a second‑generation Cambodian‑American raised in Malden, Massachusetts, a city with a thriving Cambodian enclave. Her parents arrived as refugees in the early 1990s and have preserved
    strong ties to Cambodian culture, including the Khmer language, Buddhist traditions, and communal celebrations such as Pchum Ben and Khmer New Year. At home, she helps prepare traditional meals and
    participates in cultural festivals at the local community center. While she fully embraces American school life and extracurriculars, her family’s emphasis on respect for elders, practical responsibility,
    and cultural pride profoundly shapes her everyday routines and values.
