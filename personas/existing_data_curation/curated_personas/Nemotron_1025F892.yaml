  career_goals: Sokchea aspires to pursue a career that combines her love for practical problem solving and community service. She aims to earn a scholarship to study biomedical engineering or computer
    science, hoping to design affordable medical devices that could benefit underserved populations, including her own cultural community. She also envisions becoming a mentor for younger Southeast Asian
    students, encouraging academic excellence and cultural pride. In the long term, she considers opening a small business that offers traditional Cambodian baked goods, blending entrepreneurship with cultural
    preservation.
