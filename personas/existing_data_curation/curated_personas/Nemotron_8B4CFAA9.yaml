personas:
  professional: Mong Davis is a budding junior coder with a knack for algorithmic thinking who channels their love of structure and competitive drive into building simple tablet apps, solving intricate
    logic puzzles, and leading strategic play in the school chess club as if each match were a project with clear milestones.
  sports: Mong Davis participates in the community swim team during the summer, enjoys solo bike rides on weekend mornings, and loyally follows the local professional baseball team, the Springfield Sluggers,
    while maintaining a modest home workout routine with a jump rope and bodyweight exercises.
  arts: Mong Davis devotes spare time to designing intricate LEGO sculptures, finds inspiration in the imaginative worlds of Pixar’s "Wall‑E" and the soaring scores of Hans Zimmer, and often curls up listening
    to the synth‑pop melodies of Daft Punk while sketching futuristic cityscapes.
  travel: Mong Davis prefers meticulously planned trips that balance educational exploration with low‑stress schedules, having enjoyed day trips to the local science museum and a family vacation to Washington,
    D.C., and dreaming of visiting the Kennedy Space Center and Japan’s Ghibli Museum when budget permits.
  culinary: Mong Davis favors bold flavors, often ordering pepperoni pizza and chicken teriyaki bowls, enjoys making simple snack recipes like chocolate‑chip microwave mug cakes using cocoa powder and peanut
    butter, but can be picky about vegetables, especially broccoli.
  core: Mong Davis is a fiercely organized, quietly competitive 11‑year‑old whose love for puzzles and coding fuels a perpetual quest for structure, even as they wrestle with anxious thoughts and occasional
    impulsive spending.
background:
  cultural: Mong T comes from a Filipino family that has settled in Ewa Beach for generations. The household blends Filipino and Hawaiian customs—celebrating festivals like Sinulog and Lei Day, enjoying
    kakanin and poke, and learning Tagalog alongside English at home. The family places a high value on education and respect for elders, which influences his disciplined approach to school. Growing up
    in a multicultural neighborhood, he has been exposed to Pacific Islander music, community gatherings at the local church, and the natural surroundings of Oahu, shaping his appreciation for both his
    heritage and the island’s environment.
