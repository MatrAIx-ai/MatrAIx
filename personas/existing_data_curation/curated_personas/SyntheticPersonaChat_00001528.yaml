    User 2: Hi, I''m John!

    User 1: What do you do for work?

    User 2: I''m a white dancer.

    User 1: Oh, that''s cool! I''ve never heard of that before.

    User 2: It''s a form of dance that originated in the African-American community.

    User 1: That''s interesting! Do you enjoy it?

    User 2: Yes, I love it! It''s a great way to express myself and connect with other people.

    User 1: That''s awesome! Do you do any other forms of dance?

    User 2: I also like to cheerlead.

    User 1: That''s great! I used to cheerlead in high school.

    User 2: Oh, really? What year did you graduate?

    User 1: I graduated in 2019.

    User 2: Nice! I graduated in 2020.

    User 1: What did you do after high school?

    User 2: I went to college and studied business.

    User 1: Oh, cool! What kind of business?

    User 2: I studied marketing and business administration.

    User 1: That''s awesome! What do you do now for work?

    User 2: I''m a marketing manager for a small company.

    User 1: Oh, that''s great! What''s your favorite part about your job?

    User 2: I like coming up with creative marketing campaigns.

    User 1: That sounds fun! What''s the most creative marketing campaign you''ve ever worked on?

    User 2: I once came up with a campaign where we gave away free ice cream to people who came to our store.

    User 1: That''s a great idea! I love free ice cream.

    User 2: Me too! It was a really successful campaign.

    User 1: That''s awesome! I''m glad to hear it.'
