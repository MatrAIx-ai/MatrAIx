persona_description: A biologist who specializes in the study of symbiotic interactions between living things, particularly focusing on competition as a form of symbiosis. They are interested in the different
  forms of competition, including intraspecific and interspecific competition, and how it affects populations and communities in various ecological areas. They have a keen interest in understanding the
  factors that influence competition, such as species requirements for reproduction and growth, and the impact of interspecific competition on populations and communities. They are also likely to be knowledgeable
  about the different examples of interspecific competition and how it can alter populations or communities.
