  career_goals: Stephen dreams of a future where he can combine his love for structure and helping others. He is fascinated by civil engineering and hopes to design safe bridges and community buildings
    that support his hometown. He also considers becoming a veterinarian because of his caring nature toward animals. In the short term, he aims to improve his math and science skills, earn the top spot
    on his class's honor roll, and earn a leadership badge in his local 4‑H club, laying the groundwork for a career dedicated to reliable, community‑focused work.
