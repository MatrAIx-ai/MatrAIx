personas:
  professional: Stephen Krege, an aspiring junior engineer, leverages their knack for assembling LEGO kits and solving jigsaw puzzles to excel in the school science club, where they meticulously design
    and document small‑scale experiments, favoring structured procedures and reliable teamwork.
  sports: Stephen Krege enjoys casual weekend fishing trips with their father at the nearby pond, follows the local high school basketball team the Riverdale Raptors, and participates in the community youth
    soccer league, preferring low‑key, team‑oriented activities over large crowds.
  arts: Stephen Krege immerses themselves in mystery novels by Nancy Drew and Agatha Christie, practices piano pieces by Beethoven and John Williams film scores, and draws inspiration from the animated
    works of Studio Ghibli, especially My Neighbor Totoro, shaping a quiet but imaginative artistic side.
  travel: Stephen Krege loves nature hikes on the nearby forest trail, has visited the state capital’s science museum in Springfield, dreams of exploring the Grand Canyon and a future trip to Tokyo’s cherry
    blossom festival, but prefers trips that combine structured itineraries with ample downtime for solitary exploration.
  culinary: Stephen Krege favors simple comfort foods like homemade mac and cheese with cheddar and pepper jack, enjoys assembling DIY sushi rolls with cucumber, avocado, and crab, and proudly cooks grilled
    cheese sandwiches using sourdough bread and butter, often experimenting with extra toppings like sliced apple for a crunchy twist.
  core: Stephen Krege is a methodical, quietly curious ten‑year‑old who balances a love for structured projects with a gentle, cooperative spirit, occasionally over‑organizing their LEGO collections and
    forgetting to take breaks.
background:
  cultural: Stephen was raised in Harvest, a small rural community in Madison County, Alabama. His family’s white Southern heritage is reflected in traditions such as Sunday church services, community picnics,
    and the annual county fair, where local agriculture and crafts are celebrated. He grew up with Southern hospitality values, emphasizing respect, kindness, and a strong sense of community. The region’s
    agricultural roots influence his appreciation for gardening and outdoor activities, while local schools and churches provide a supportive environment that reinforces his practical and cooperative personality.
