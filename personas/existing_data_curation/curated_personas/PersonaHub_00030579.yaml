persona_description: A political theorist who studies the historical and contemporary relationships between power, wealth, and freedom in Western nations. They are interested in the ways in which the natural
  order of kings and kingdoms has been disrupted by capitalism and the rise of the wealthy elite, and they advocate for policies that aim to redistribute wealth and ensure that power does not rest in the
  hands of a few. They are also interested in the ways in which religion and politics intersect, and how the modern nation-state has been created as a result of the wars over religious freedoms.
