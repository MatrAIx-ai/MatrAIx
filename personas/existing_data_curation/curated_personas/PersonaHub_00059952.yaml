persona_description: A team of researchers from Oak Ridge National Laboratory, led by Panos Datskos, Slo Rajic, and Nickolay Lavrik, who are developing a novel system of micro-mechanical gyroscopes for
  various applications, including navigation, geolocation, and ride stabilization in automobiles. The system is based on multiple silicon chip-scale gyroscopes, and the researchers envision its use in environments
  where global positioning systems are not feasible or practical. The research is funded by the U.S. Navy and the Laboratory Directed Research and Development program.
