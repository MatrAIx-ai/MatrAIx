  hobbies: '["Drawing and doodling", "Reading chapter books", "Soccer", "Church choir singing", "Beginner piano lessons", "Sticker collecting", "Friendship bracelet making", "Family cooking and food festivals",
    "Attending local cultural celebrations"]'
  career_goals: Rosa Mae dreams of a future where she can help and teach others. She often says she wants to become a teacher because she enjoys explaining things to classmates and sees teaching as a way
    to make a lasting impact on her community. She also admires nurses for their caring role and has expressed interest in health care, hoping to combine compassion with science. In the shorter term, she
    aims to stay at the top of her class, earn a spot on the student council, and lead a school project that benefits local younger children, such as a reading buddy program. Her long‑term ambition is to
    be a community‑focused professional—either an educator or a health‑care provider—who can give back to the Black community in Winston‑Salem and inspire younger kids to believe in their potential.
