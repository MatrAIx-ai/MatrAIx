personas:
  professional: Rosa Young is a budding illustrator and storyteller who fills sketchbooks with vibrant characters inspired by their favorite chapter books, organizing each page with the same structured
    precision they apply to school assignments and choir rehearsals.
  sports: Rosa Young plays forward on the Winston‑Salem Youth Soccer Club, practices twice a week under Coach Davis, cheers for the Charlotte FC during MLS season, and they often follow the NC State Wolfpack
    women's basketball team for inspiration.
  arts: Rosa Young expresses creativity through drawing whimsical scenes inspired by Mary Pope Osborne’s Magic Tree House, singing in the church choir with arrangements reminiscent of gospel legend Mahalia
    Jackson, practicing beginner piano pieces by Ludwig van Beethoven’s "Für Elise" simplified version, and they also collect stickers featuring pop stars like Ariana Grande.
  travel: Rosa Young enjoys family road trips that blend structured itineraries with spontaneous stops, having explored the North Carolina Black History Museum in Raleigh and the seaside town of Wilmington,
    and they dream of visiting Washington, D.C.’s National Museum of African American History and Culture during a school field trip.
  culinary: Rosa Young helps prepare comforting family meals like collard greens seasoned with smoked turkey, crispy fried chicken with a secret spice blend, and sweet potato pie topped with marshmallow
    frosting, and they relish tasting the buttery crust of cornbread while practicing a budding skill in measuring herbs.
  core: Rosa Young is a disciplined ten‑year‑old who balances sketching, soccer, and choir with meticulous routine, yet secretly hoards a glittery sticker stash under the pillow and occasionally forgets
    homework when a new art idea sparks.
background:
  cultural: Rosa Mae grows up in a close‑knit African‑American family in Winston‑Salem, a city with a rich Black heritage and a strong tradition of community churches, family gatherings, and cultural festivals.
    Her family places a high value on education and community service, echoing the legacy of local Black leaders who championed civil rights and youth empowerment. Sundays are often spent at a historic
    Baptist church where gospel music, choir rehearsals, and community outreach programs are central to her life. At home, she enjoys dishes passed down through generations—collard greens, fried chicken,
    sweet potato pie—and participates in per‑year celebrations like Juneteenth, which reinforce her connection to Black history. The neighborhood’s after‑school programs, youth sports leagues, and the nearby
    North Carolina Black History Museum provide Rosa Mae with opportunities to learn about her cultural roots, inspire pride, and develop a sense of responsibility toward her community.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Spelling and vocabulary", "Organizational planning with color‑coded binder", "Peer mentorship", "Basic Scratch programming", "Teamwork in group
