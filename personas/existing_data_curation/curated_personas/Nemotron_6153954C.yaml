  career_goals: Alberto aims to advance to a senior director role overseeing regional operations, leveraging his deep operational knowledge to shape strategic growth initiatives. He plans to earn certifications
    such as PMP and Six Sigma to formalize his expertise. In the longer term, he envisions launching his own consulting firm that helps small businesses in the San Diego area—particularly those owned by
    Latino entrepreneurs—integrate creative, art‑inspired approaches to operational efficiency. He also aspires to mentor emerging Nicaraguan professionals, fostering a pipeline of talent that combines
    cultural insight with modern management practices.
