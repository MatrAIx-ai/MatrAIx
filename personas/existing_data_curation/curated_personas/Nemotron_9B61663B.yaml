personas:
  professional: Nora Pratt is a budding project coordinator with an associate’s degree in Business Administration, leveraging solid office administration, data entry, and bookkeeping skills together with
    self‑taught social‑media marketing and Canva design, they apply a critical, skeptical eye to streamline processes while balancing structured planning with flexible adaptation in fast‑moving mid‑sized
    companies.
  sports: Nora Pratt enjoys regular walks in city parks and has joined the Valdosta Striders running club for weekend 5Ks, they follow the Atlanta Falcons in football and the Atlanta Braves in baseball,
    and they occasionally play co‑ed volleyball at the community recreation center during the summer months.
  arts: Nora Pratt expresses creativity through street photography and portrait sketching, they draw inspiration from Diane Arbus and Vivian Maier, curate an Instagram feed set to soulful R&B tracks by
    H.E.R. and Leon Bridges, attend local art gallery openings and community theater productions, and they habitually capture candid moments at church gatherings.
  travel: Nora Pratt, a 22‑year‑old budget‑conscious explorer, they prefer short road trips to Southern gems like Savannah, Georgia, Asheville, North Carolina, and New Orleans, Louisiana, while dreaming
    of a future backpacking adventure through Portugal and Spain, and they meticulously plan itineraries with Google Trips to maximize cultural immersion on a student budget.
  culinary: Nora Pratt loves experimenting with Southern‑style cooking, they often prepare shrimp and grits, fried chicken with collard greens, and cornbread, seasoning dishes with hot sauce, smoked paprika,
    and fresh basil from their balcony garden where they grow basil, okra, and cherry tomatoes, and they enjoy pairing meals with sweet tea or a cold craft brew.
  core: Nora Pratt is a data‑driven, altruistic planner who balances relentless curiosity and competitive drive with a heartfelt need for solitude, often juggling anxiety‑fuelled perfectionism against the
    backdrop of vibrant photography and soulful R&B.
background:
  cultural: Nora's cultural background is rooted in the African American community of Valdosta, Georgia. She was raised in a close‑knit neighborhood where family, church, and Southern traditions—such as
    gospel music, storytelling, and comfort food—shaped her values. The legacy of the civil‑rights movement and ongoing dialogues about racial equity fostered a critical awareness of systemic barriers,
    aligning with her skeptical personality. She embraces both the cultural rituals of Sunday services, family gatherings, and local celebrations, and contemporary digital culture. Her sense of responsibility
    to give back is reflected in her mentorship volunteering, blending personal ambition with a deep connection to her heritage.
attributes:
  skills: '[''Office administration'', ''Data entry'', ''Basic bookkeeping'', ''Microsoft Office Suite'', ''Google Workspace'', ''Social media marketing'', ''Graphic design (Canva, Adobe Spark)'', ''Data
    analysis'', ''Event planning'', ''Community outreach'', ''Interpersonal communication'']'
  hobbies: '[''Reading (non‑fiction, entrepreneurship, psychology)'', ''Journaling'', ''Photography (street, portrait)'', ''Sketching'', ''Cooking Southern cuisine'', ''Urban gardening'', ''Listening to
    R&B and soul music'', ''Attending church and community events'', ''Book club'', ''Strategy and puzzle video games'', ''Volunteering as youth mentor'', ''Walking in local parks'']'
  career_goals: Nora aims to translate her practical skill set into an entry‑level role in project coordination or marketing at a mid‑sized company, where she can showcase her analytical abilities and drive
    for results. She plans to complete a bachelor's degree in Business Administration within the next two years, likely through a part‑time program at Valdosta State University, while building a freelance
    portfolio of social‑media campaigns. Long‑term, she aspires to become a senior project manager or launch her own boutique consultancy that helps local small businesses improve their digital presence,
    marrying her curiosity for new ideas with a results‑oriented, competitive mindset. To manage her tendency toward worry and stress, she intends to adopt structured self‑care routines and resilience‑building
    strategies.
