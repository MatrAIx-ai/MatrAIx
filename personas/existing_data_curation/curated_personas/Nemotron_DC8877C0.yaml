  hobbies: '[''Reading'', ''Digital illustration'', ''Playing guitar'', ''Volunteer work at animal shelter'', ''Hiking'', ''Soccer'', ''Social media content creation'']'
  career_goals: Marjory aims to complete her high school education—either by graduating or earning a GED—so she can pursue further training in a field that blends her love for science and helping others.
    She is interested in studying veterinary technology or nursing at a community college, with a long‑term goal of working at a local clinic or animal hospital. She also hopes to develop her digital art
    skills enough to create freelance illustrations, giving her a practical way to earn income while staying creatively engaged.
