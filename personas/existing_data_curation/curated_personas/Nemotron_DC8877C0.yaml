personas:
  professional: Marjory Lamb is a budding digital illustrator and teen content creator who blends curiosity about emerging design tools with practical school project deadlines, balancing organized time
    management with the flexibility to experiment on TikTok, and they readily contribute to group assignments while asserting their creative vision when needed.
  sports: Marjory Lamb plays forward on their high school soccer team, joins the local youth soccer club on weekends, follows the Dallas Cowboys for NFL excitement and roots for the Dallas Stars during
    hockey season, and they incorporate trail hikes around Alvarado into their fitness routine to complement team training.
  arts: Marjory Lamb immerses themselves in digital illustration inspired by contemporary YA cover art while strumming acoustic renditions of Taylor Swift and Olivia Rodrigo songs, enjoys binge‑watching
    Greta Gerwig’s films, and frequently cites the whimsical sketches of Hayao Miyazaki as motivational influences.
  travel: Marjory Lamb loves weekend road trips to Austin’s live‑music scene and the historic missions of San Antonio, dreams of exploring the rugged landscapes of Colorado’s Rocky Mountains, prefers planning
    itineraries with their family’s input but occasionally embarks on last‑minute TikTok‑inspired day trips to nearby state parks.
  culinary: Marjory Lamb favors spicy Tex‑Mex fare, often cooking homemade chicken‑tortilla soup with chipotle peppers and fresh cilantro, enjoys experimenting with avocado‑lime smoothie bowls, and while
    their cooking skill is still developing, they relish trying new ingredients like pomegranate seeds in salads.
  core: Marjory Lamb balances a tidy schedule of school, soccer, and volunteer work with bursts of creative TikTok video production, but they habitually stay up late scrolling through art feeds, resulting
    in occasional caffeine‑fuelled mornings and a steady stream of sketch‑filled notebooks.
background:
  cultural: Marjory grew up in a white, Southern‑Texas family in Alvarado, Johnson County. Her upbringing reflects the values of Southern hospitality, community involvement, and a strong connection to the
    local church, where she participates in youth groups and volunteer events. Family traditions include celebrating Texas Independence Day, Fourth of July fireworks, and annual county fairs featuring rodeo
    and country music. These cultural experiences have shaped her appreciation for teamwork, self‑reliance, and a balanced blend of tradition and modern interests.
