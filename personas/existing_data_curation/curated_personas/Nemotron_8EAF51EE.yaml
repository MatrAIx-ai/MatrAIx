  hobbies: '[''Watercolor painting'', ''Art museum visits'', ''Cooking diverse cuisines'', ''Community gardening'', ''Competitive bridge'', ''Community theater'', ''Book club participation'', ''Senior center
    volunteering'', ''Language learning (Hindi, Bulgarian)'', ''Travel to historic sites'', ''Genealogy research'']'
  career_goals: Even in retirement, Iordanka aims to deepen her impact on the Fulton community by establishing an intergenerational art workshop series that pairs seniors with local schoolchildren. She
    hopes to compile and publish a collection of oral histories from longtime residents, preserving the town’s cultural memory. Additionally, she aspires to co‑organize an annual multicultural festival
    that celebrates her Eastern European roots and her family’s Indian heritage, while continuing to refine her watercolor technique for a regional exhibition. Mentoring younger volunteers and serving as
    a trusted advisor for community projects remain central to her ambition.
