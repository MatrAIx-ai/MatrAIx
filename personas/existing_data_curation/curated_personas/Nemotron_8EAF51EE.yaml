personas:
  professional: Iordanka Solanki, a retired community organizer with a flair for event planning, archival research, and teaching watercolor, quilting, and knitting, leverages their analytical yet sociable
    nature to design intergenerational workshops that balance meticulous logistics with spontaneous creative exploration.
  sports: Iordanka Solanki, an avid member of the Fulton Senior Walking Club who clears several city blocks each morning before cheering on the Buffalo Bills and Buffalo Sabres, keeps fit with low‑impact
    cardio and maintains mental sharpness by competing in weekly bridge tournaments that they treat as a cerebral sport.
  arts: Iordanka Solanki, a watercolor enthusiast who draws inspiration from the serene Hudson River scenes of Winslow Homer and the bold colors of Georgia O'Keeffe, frequently volunteers to teach quilting
    and knitting at the local senior center while attending monthly gallery openings featuring contemporary artists like Kehinde Wiley.
  travel: Iordanka Solanki, a meticulous planner who favors weekend getaways to historic upstate New York towns like Saratoga Springs, Hudson, and Lake Placid, while dreaming of a cultural pilgrimage to
    Edinburgh’s Old Town and Jaipur’s historic palaces, carefully balancing senior discounts with modest travel funds.
  culinary: Iordanka Solanki, a confident home chef whose repertoire blends classic American comfort dishes such as chicken pot pie with aromatic cumin and cardamom, and Eastern European delights like pierogi
    stuffed with potato and dill, often showcased at community potlucks where they experiment with flavors like smoked paprika and fresh basil.
  core: Iordanka Solanki, a curiosity‑driven, socially vibrant retiree who balances meticulous organization with spontaneous creativity, while generously sharing art, food, and stories, yet occasionally
    lets competitive bridge instincts infiltrate friendly gatherings.
background:
  cultural: Iordanka was born and raised in Fulton, New York, in a predominantly White, working‑class community that emphasized self‑reliance, local traditions, and active civic participation. Her given
    name reflects her Eastern European (Bulgarian) ancestry, and her marriage to a man of Indian (Gujarati) descent introduced South Asian customs, cuisine, and festivals into her household. Over the years
    she has blended these influences, actively engaging with the local historical society, attending folk art fairs, and helping organize multicultural celebrations that showcase both her American upbringing
    and the Indian and Eastern European elements of her family life. This mixed cultural tapestry informs her appreciation for diverse artistic expressions and her commitment to fostering inclusivity in
    community events.
