  hobbies: '["Reading mystery and historical biographies","Balcony gardening (herbs, vegetables)","Cooking healthy meals","Yoga and mindfulness meditation","Walking in Prospect Park","Small book club participation","Volunteering
    at a senior center (admin support, activity planning)"]'
  career_goals: Linda aims to advance from a general office clerk to an office manager or senior administrative coordinator within the next five years. She plans to obtain a Certified Administrative Professional
    (CAP) credential and possibly enroll in part-time community college courses to earn an associate's degree in business administration. Her long-term ambition is to lead a small team in a nonprofit organization
    where she can apply her organizational expertise and compassionate nature to support community services, while also mentoring younger employees and fostering a harmonious workplace culture.
