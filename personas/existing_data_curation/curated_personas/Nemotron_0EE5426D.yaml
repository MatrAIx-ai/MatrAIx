personas:
  professional: Linda Elliott, an experienced office administrator in a nonprofit setting, leverages their Excel expertise, meticulous filing system, and compassionate mediation style to streamline operations
    while they nurture a harmonious workplace.
  sports: Linda Elliott enjoys low‑impact fitness, walking the 1.5 mile loop in Prospect Park thrice weekly, playing recreational tennis at the Brooklyn Community Center, and cheering for the Brooklyn Nets
    and New York Yankees while they follow the local running club for occasional 5K races.
  arts: Linda Elliott is an avid reader of Agatha Christie, Tana French, and Walter Isaacson biographies, attends weekly screenings of classic films starring Meryl Streep, and they regularly visit the Brooklyn
    Museum to view works by contemporary artist Kehinde Wiley.
  travel: Linda Elliott prefers meticulously planned cultural mini‑trips, having explored historic Boston, the artsy streets of Dublin, and the vineyards of upstate New York, while they dream of a quiet
    autumn visit to the Italian countryside, balancing family commitments with limited vacation days.
  culinary: Linda Elliott cooks health‑focused meals, often featuring herb‑infused grilled salmon, quinoa salad with basil and rosemary from their balcony garden, and occasional homemade spaghetti aglio
    e olio, while they savor a weekly Saturday brunch of avocado toast at a local farm‑to‑table café.
  core: Linda Elliott blends razor‑sharp organization with quiet anxiety, tending their herb garden, aligning spreadsheets, and meditating between bursts of worry about the next deadline.
background:
  cultural: Linda comes from a middle‑class white American family with Irish and Italian ancestry that settled in the New York tri‑state area in the mid‑20th century. She was raised in a suburban neighborhood
    of Brooklyn, where she absorbed the work ethic and community values of her parents, who emphasized honesty, diligence, and helping neighbors. While she respects her family’s cultural traditions—celebrating
    holidays like Christmas, Easter, and St. Patrick’s Day—living in Brooklyn’s diverse environment has broadened her appreciation for multicultural perspectives. This background informs her compassionate
    approach to both her personal relationships and her professional collaborations.
attributes:
  skills: '["Office administration","Data entry","Document preparation","Filing and records management","Microsoft Office Suite (Excel, Word, Outlook)","Basic QuickBooks","Scheduling and calendar management","Inventory
