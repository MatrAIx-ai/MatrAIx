persona_description: A scientist conducting research on the Epstein-Barr virus (EBV), specifically on the genetic mutations responsible for Chronic Epstein-Barr virus (CAEBV) and the natural history of
  the disease. The scientist aims to identify genetic causes for CAEBV and discuss the results with patients in person or by telephone, as well as to provide genetic indications of risk for other diseases.
  The scientist may also be involved in the study of the immune response, transformation of B cells with EBV, and the ability of patient blood cells to kill EBV-infected cells.
