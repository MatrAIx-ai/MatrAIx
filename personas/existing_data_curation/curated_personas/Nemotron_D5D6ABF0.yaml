  career_goals: Approaching retirement, Haley aims to leverage her extensive experience to give back to the community. She plans to develop a mentorship program that pairs senior citizens with volunteer
    tech guides, helping bridge the digital divide. She also intends to author a user‑friendly guidebook on online safety and privacy for older adults. Professionally, she seeks advanced certifications
    such as CompTIA Security+ and ITIL Practitioner to bolster her credibility as a consultant specializing in accessibility and user experience for aging populations. Additionally, Haley aspires to curate
    an online art‑technology portfolio that combines her love of traditional painting with emerging AI tools, showcasing interdisciplinary creativity.
