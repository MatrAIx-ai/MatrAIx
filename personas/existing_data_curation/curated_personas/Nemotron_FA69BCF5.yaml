personas:
  professional: Curley Williams, a seasoned upholsterer with 15 years of experience, blends methodical craftsmanship and strategic planning to deliver precision‑restituted furniture while pursuing certification
    and building a boutique studio that will specialize in eco‑friendly, reclaimed‑material restorations for historic homes.
  sports: Curley Williams competes in a local pickup basketball league, follows the Charlotte Hornets and the Carolina Panthers, spends sunrise weekends fishing at Lake Rimert, and hikes with the Carvers
    Creek Trail Club, maintaining a competitive edge despite occasional knee aches.
  arts: Curley Williams immerses themselves in live blues at the downtown Riverfront Jazz Club, cherishes performances by Stevie Ray Vaughan tribute bands and John Coltrane standards, and curates an eclectic
    vinyl collection that fuels weekend cooking sessions.
  travel: Curley Williams prefers meticulously planned road trips that blend craft‑oriented stops—such as the historic furniture district of Charleston—with relaxed fishing getaways to Lake Rimert, and
    dreams of a heritage tour of Savannah and the Blue Ridge Parkway, yet keeps travel budgets tight to protect the future studio fund.
  culinary: Curley Williams enjoys experimenting with soul‑food classics like smoked pork collard greens, Cajun gumbo with okra and Andouille sausage, and perfectly fried chicken, boasting a moderate kitchen
    skill set that balances meticulous seasoning with occasional over‑salting that becomes an inside joke among friends.
  core: Curley Williams is a pragmatic, methodical craftsman whose competitive spirit fuels a relentless pursuit of boutique success, even as they juggle a love for southern cooking, community basketball,
    and a habit of over‑ordering vintage fabric rolls.
background:
  cultural: Curley is a second‑generation African American whose family has lived in the Fayetteville area for several generations, rooted in the city's historically Black neighborhoods. He grew up attending
    a Baptist church that emphasized community service and music, which shaped his love for gospel and blues. Family gatherings feature soul‑food traditions, storytelling, and a strong sense of resilience
    that reflects the broader Southern Black experience. He maintains close ties with the local Black community through church events, neighborhood block parties, and participation in the annual Fayetteville
    African American Heritage Festival, where he sometimes showcases his handcrafted furniture.
attributes:
  skills: '["Upholstery repair", "Custom furniture design", "Fabric and leather selection", "Pattern drafting", "Hand and machine sewing", "Carpentry and frame restoration", "Ergonomic seating design",
    "Project planning and scheduling", "Budgeting and cost estimation", "Customer service and communication", "Workshop organization", "Inventory management"]'
  hobbies: '["Pickup basketball", "Fishing", "Youth woodworking mentorship", "Southern cooking", "Blues and jazz concerts", "Hiking", "Juneteenth celebration", "Church choir"]'
  career_goals: Curley aims to transition from working as an employee to owning a small boutique upholstery studio in downtown Fayetteville. Over the next five years he plans to obtain a professional certification
    from the American Upholstery Association, expand his service offerings to include eco‑friendly and reclaimed‑material upholstery, and develop a niche in restoring historic homes in the historic districts
    of the city. He envisions hiring two apprentices, establishing partnerships with local interior designers, and eventually becoming a recognized craftsperson whose work is featured in regional home‑and‑garden
    shows.
