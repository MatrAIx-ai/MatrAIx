persona_description: A field naturalist or entomologist who specializes in systematic entomology, particularly focusing on the collection and identification of ectoparasites from various animal hosts, including
  birds. They are interested in understanding the modes of transport and potential modes of association between ectoparasites and their hosts, and how this information can be used to inform ecologists,
  economic entomologists, acarologists, ornithologists, and regulatory agencies. They have expertise in identifying and collecting ectoparasites from various animal hosts, as well as in the use of scientific
  literature and peer-reviewed journals to obtain and interpret information on the associations and modes of transport of ectoparasites. They are likely to have a strong background in systematics and taxonomy,
  as well as in the study of entomology and parasitology.
