persona_description: A historian who is interested in the cultural and historical aspects of New Zealand, particularly the Maori and European heritage. They are fascinated by the stories and legends associated
  with the naming of Te Rohe Pōtae and the creation of the hat-shaped monument in Ōtorohanga and Taumarunui. They enjoy reading about the political and social changes that occurred during this time period
  and how they influenced the development of the region. They are also interested in the personal stories of the people involved in the naming and monument creation, and how they contributed to the cultural
  identity of the area.
