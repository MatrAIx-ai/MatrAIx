personas:
  professional: Rachel Wright, a 23-year-old certified MIG/TIG welder, merges disciplined metal fabrication expertise with a vivid imagination for abstract sculpture, leading small crews on tight deadlines
    while pursuing Certified Welding Inspector certification and planning a boutique metal‑art studio.
  sports: Rachel Wright fuels weekly energy with Zumba and hip‑hop dance classes, rallies behind the Washington Capitals and DC United for a competitive edge, and joins a community ultimate frisbee league
    each summer for extra cardio.
  arts: Rachel Wright immerses themselves in the makerspace ecosystem, shaping metal jewelry inspired by Dan Flavin’s light installations and Theo Jansen’s kinetic sculptures, attending avant‑garde gallery
    openings that showcase Anish Kapoor, while curating digital illustrations to the beats of Grimes and Flying Lotus.
  travel: Rachel Wright mixes spontaneous weekend road trips to Asheville’s vibrant arts district with carefully plotted visits to the Design Museum in London when budget allows, using sketch maps and travel
    blogs to balance wanderlust with the financial realities of launching a future metal‑art studio.
  culinary: Rachel Wright delights in mastering Southern comfort dishes like collard greens, smoked pork ribs, and buttery cornbread, experimenting with spice rubs in a handmade copper skillet, and hosting
    friends for communal meals that double as informal art critique circles.
  core: Rachel Wright is a disciplined, competitive welder‑artist whose imagination fuels abstract metal creations, energetic social dance, meticulous budgeting, and a relentless drive to mentor the next
    wave of women in the trades.
background:
  cultural: Rachel grew up in the culturally vibrant suburbs of Montgomery County, deeply rooted in African‑American traditions. Her family celebrates the legacy of Black artisans and musicians, which fuels
    her appreciation for craft and rhythmic movement. She participates in community events like the Takoma Park African Heritage Festival and supports local Black‑owned businesses. The progressive atmosphere
    of Takoma Park, combined with her heritage, shapes her strong sense of identity and commitment to expanding representation in skilled trades.
