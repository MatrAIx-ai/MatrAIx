  skills: '[''MIG welding'', ''TIG welding'', ''Brazing'', ''Soldering'', ''Metal fabrication'', ''Blueprint reading'', ''CNC plasma cutting'', ''Welding robot operation'', ''Quality assurance'', ''Safety
    compliance'', ''Metallurgical basics'', ''Problem solving'', ''Team coordination'', ''Time management'', ''Technical drawing'']'
  hobbies: '[''Metal sculpture'', ''Jewelry making'', ''Makerspace collaborations'', ''DIY robotics'', ''3D printing experiments'', ''Zumba classes'', ''Hip‑hop dance'', ''Attending art fairs'', ''Reading
    speculative fiction'', ''Digital illustration'', ''Cooking soul‑food'', ''Socializing with friends'', ''Community volunteering'']'
  career_goals: Rachel aims to earn a Certified Welding Inspector (CWI) credential within the next three years, positioning herself for supervisory roles in high‑tech manufacturing. She aspires to lead
    a boutique metal‑art studio where she can merge her technical expertise with her passion for abstract sculpture, producing custom installations for galleries and public spaces. In the longer term, she
    hopes to mentor young women of color entering the trades, establishing an apprenticeship pipeline in Montgomery County. Ultimately, she envisions owning a small fabrication shop that serves aerospace
    and renewable‑energy clients while offering community workshops.
