persona_description: A scientist or engineer with expertise in the field of acoustic engineering and physics, particularly in the use of acoustic tweezers for noncontact manipulation in biomedicine. They
  are interested in developing and optimizing practical devices for dexterous manipulation using arrays of ultrasound sources. They are passionate about advancing the theory and application of acoustic
  radiation pressure and its interactions with deformable particles such as cells. They have a deep understanding of the inverse problem of generating the desired ultrasonic field and designing practical
  devices to achieve it. They are dedicated to the development of dexterous acoustic tweezers for tissue engineering and the assembly of composite materials.
