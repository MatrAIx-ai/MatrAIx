  career_goals: Even at three, Angel expresses a vivid imagination about helping others and creating orderly spaces. She dreams of becoming a teacher who can organize fun learning activities and guide younger
    children, reflecting her love of routine and caring nature. Angel also shows interest in caring for animals, often playing doctor with her stuffed toys, hinting at a future as a veterinarian. Inspired
    by the colorful homes of Juncos, she sometimes imagines designing safe, beautiful houses for her community, showing an early fascination with architecture. Overall, her ambitions blend curiosity, compassion,
    and a desire to bring order and kindness to the world.
