personas:
  professional: Angel Debarros is a budding preschool organizer who loves arranging storybooks by color and eagerly assists teachers in setting up daily activities, using their methodical curiosity to anticipate
    classroom needs and reliably follow through on each tiny task.
  sports: Angel Debarros frequently joins the neighborhood toddler soccer group, cheerfully mimics the moves of the Chicago Cubs mascot on family TV nights, and enjoys weekly splash‑pad sessions at the
    local park while proudly wearing a jersey from the Seattle Seahawks.
  arts: Angel Debarros loves singing along to Raffi’s ‘Baby Beluga,’ giggles at Elmo’s antics on Sesame Street, and delights in drawing colorful pictures of Mickey Mouse, which shape daily playtime and
    foster a playful artistic spirit.
  travel: Angel Debarros adores family road trips to Grandma’s rustic farm in upstate New York, brightens at the city zoo in San Diego, and dreams of a magical day at Disney World in Florida, balancing
    excitement with a need for familiar routines.
  culinary: Angel Debarros, an enthusiastic little chef, loves scooping warm macaroni and cheese onto a bright plate, smearing peanut butter on whole‑grain toast, and mixing diced strawberries into yogurt,
    though they often spill the peas in the process.
  core: Angel Debarros balances a toddler’s boundless curiosity with a meticulous habit of sorting everything by color, turning even playtime into a charmingly organized adventure.
background:
  cultural: Angel is raised in Juncos, a close‑knit municipality in Puerto Rico, where family and community ties are strong. Her home is filled with the warm sounds of bomba and plena, especially during
    local festivals like the Fiesta Patronal honoring San Juan. Bilingual by environment, she primarily speaks Spanish with her grandparents and parents, while also picking up English at preschool. Traditional
    foods such as arroz con gandules, pastelón, and empanadillas are part of family meals, and she often helps her madre stir the sofrito. Religious celebrations, like Christmas posadas and Easter processions,
    reinforce her cultural identity. Angel’s abuela shares stories of Puerto Rican folklore, teaching her about La Llorona and the coquí’s song, deepening her connection to the island’s heritage and natural
    landscape.
