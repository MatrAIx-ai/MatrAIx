  hobbies: '[''Reading mystery novels and historical non-fiction'', ''Gardening desert‑adapted plants'', ''Knitting and crochet'', ''Stargazing'', ''Birdwatching'', ''Crossword and Sudoku puzzles'', ''Genealogy
    research'', ''Documenting local oral histories'', ''Cooking and food preservation'', ''Volunteering at the senior center'']'
  career_goals: Kay’s foremost goal is to preserve her independence while deepening her involvement in the local community. She plans to earn her GED and take a community‑college class in local history
    or genealogy, mentor peers at the senior center, and document oral histories of longtime residents for a small publication. Additionally, she hopes to launch a modest online shop selling hand‑knit blankets,
    improve her physical health through regular walks, and achieve a top ranking in the local bridge club.
