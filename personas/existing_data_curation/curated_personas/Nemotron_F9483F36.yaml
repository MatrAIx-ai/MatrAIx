personas:
  professional: John Jones is a budding digital storyteller who crafts interactive Scratch animations and LEGO stop‑motion short films, blending their boundless curiosity for new software with a practical,
    organized workflow that meets school deadlines and encourages collaboration with friends.
  sports: John Jones is a dedicated player for the Maple Grove Youth Soccer Club, practicing drills after school and cheering for Manchester United on weekends, balancing enthusiastic training sessions
    with occasional lazy days when homework piles up.
  arts: John Jones is an enthusiastic comic‑artist in training, inspired by the bold lines of Stan Lee and Jim Lee, who spends afternoons sketching superhero characters while listening to Hans Zimmer’s
    adventurous film scores.
  travel: John Jones loves exploring the nearby Lake Greenwood trail on weekends and day‑trips to the Grand Canyon, while dreaming of a future adventure to the ancient citadel of Machu Picchu, preferring
    trips that blend guided learning with independent discovery.
  culinary: John Jones enjoys assembling homemade pizza topped with pepperoni, fresh mozzarella, and basil, experimenting with a splash of olive oil, and often munches on crunchy carrot sticks with hummus,
    though they sometimes forget to wash their hands before cooking.
  core: John Jones is a curious, organized 11‑year‑old who mixes LEGO building, coding, and soccer, yet occasionally forgets to stretch before games and hoards spare change for future LEGO sets.
background:
  cultural: John is a White American raised in Haines City, a suburban community in central Florida. His family is middle‑class and active in the local Methodist church, where community service projects
    are common. Growing up in Polk County, he experiences a blend of Southern hospitality and the multicultural influences of a tourist‑driven region. Seasonal events such as the county strawberry festival,
    Fourth of July fireworks, and school celebrations of diverse cultures shape his sense of community. Proximity to Florida’s wetlands, lakes, and wildlife parks nurtures his interest in nature and conservation,
    while the popularity of sports like soccer and baseball in his neighborhood reinforces his team‑oriented values.
