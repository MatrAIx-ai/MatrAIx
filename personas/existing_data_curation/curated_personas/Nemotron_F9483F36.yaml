  career_goals: John aspires to pursue a career that merges his love of nature with his problem‑solving mindset. He frequently talks about becoming a wildlife biologist studying Florida’s wetlands or an
    environmental engineer designing sustainable solutions for his community. He is also fascinated by video‑game design and hopes to create educational games that teach science concepts. To reach these
    goals he plans to keep his grades high, join the school’s science club, take advanced STEM courses in high school, and seek mentorship from teachers and local professionals.
