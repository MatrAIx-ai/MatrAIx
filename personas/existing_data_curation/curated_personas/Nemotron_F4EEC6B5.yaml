  career_goals: Dianne aims to advance to a senior operations research role where she can lead multidisciplinary teams tackling large‑scale logistics and sustainability challenges in the Mountain West.
    She aspires to obtain a master's degree in applied mathematics or data science to deepen her theoretical foundation, and eventually to publish applied research on optimizing water resource allocation
    for agricultural communities. In the long term, she envisions moving into a chief analytics or strategy position within a regional development agency, leveraging her analytical rigor to shape policies
    that balance economic growth with environmental stewardship, while also cultivating a work environment that respects her need for focused, quiet workspaces.
