personas:
  professional: Jorge Gudiel, a 17‑year‑old aspiring auto‑tech apprentice, blends their practical, routine‑driven work ethic with a competitive streak by leading neighborhood bike‑repair pop‑ups, meticulously
    organizing school projects, and constantly questioning standard repair guides to find more efficient solutions.
  sports: Jorge Gudiel dominates the local Smith Park soccer scene, captains a DeKalb County Youth Soccer League team, rides their BMX bike on Saturday mornings, and follows Atlanta United in MLS and the
    Atlanta Hawks in the NBA, all while sporting a vintage Real Madrid jersey during casual pick‑up matches.
  arts: Jorge Gudiel curates a playlist that mixes reggaeton hits from Bad Bunny and J Balvin with classic salsa tracks by Celia Cruz, fueling their spontaneous dance sessions at community events and providing
    a high‑energy soundtrack for their competitive multiplayer gaming marathons.
  travel: Jorge Gudiel plans weekend road trips to the Georgia coast for surf lessons, dreams of a spring break in Orlando’s theme parks, and maintains their modest travel fund saved from part‑time wages
    to eventually explore the historic streets of Cartagena during a future summer exchange.
  culinary: Jorge Gudiel hones their culinary chops by co‑cooking pupusas stuffed with cheese and chicharrón and tamales wrapped in corn husks alongside their mother, often experimenting with spicy salsa
    verde and occasionally grilling backyard BBQ ribs after a long practice session.
  core: Jorge Gudiel blends a regimented, competitive drive with a love for community‑centered hustle, balancing practical skill building and social fun while never missing a chance to prove themselves
    on the field or the gaming console.
background:
  cultural: Jorge is a first‑generation Guatemalan‑American raised in a Spanish‑speaking household in the diverse neighborhoods of DeKalb County, Atlanta. His parents emigrated from Guatemala in the early
    2000s seeking better opportunities, and they instilled in him strong family values, respect for elders, and a sense of community responsibility. At home, Spanish is the primary language, and traditions
    such as celebrating Guatemala’s Independence Day on September 15, cooking pupusas, and attending local Latino festivals are integral to his upbringing. He participates in the annual Guatemalan cultural
    fair in the Atlanta area, where he helps with food stalls and community outreach. While he embraces American school life and social circles, he retains a deep connection to his heritage through language,
    food, music, and involvement in the local Guatemalan diaspora.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Basic computer operation and social media management", "Time management and scheduling", "Team sports coordination and leadership", "Routine mechanical
    maintenance (car & bike)", "Basic cooking and food preparation", "Community event assistance"]'
  hobbies: '["Soccer", "BMX biking", "Multiplayer video gaming", "Listening to reggaeton and Latin pop", "Salsa dancing", "Cooking Guatemalan dishes", "Watching professional sports"]'
  career_goals: Jorge aims to secure a paid apprenticeship in automotive technology or HVAC within the next year, leveraging his mechanical aptitude and routine‑focused work style. He plans to earn a recognized
    certification from a technical college in Atlanta, after which he hopes to work as a reliable technician for a local service company. Over the next five years, his ambition is to launch his own mobile
    auto‑repair business, allowing him to serve the Guatemalan community and other residents in DeKalb County while maintaining a predictable schedule. He also wants to become a mentor for younger members
    of his community, helping them see a clear pathway to stable, skilled employment.
