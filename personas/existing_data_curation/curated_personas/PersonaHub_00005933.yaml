persona_description: A journalist who specializes in environmental reporting, particularly focusing on the impact of whaling on whale populations and the global trade in whale meat. The journalist has a
  keen interest in Iceland's relationship with whales and its controversial whaling industry, which has led to international attention and controversy. The journalist is committed to reporting the truth
  and holding those in power accountable for their actions. The journalist is also interested in uncovering the truth behind the Icelandic government's decision to resume whaling under a reservation to
  the whaling moratorium and the company's efforts to increase international trade in whale products.
