  career_goals: Dionne dreams of turning her love for visual storytelling into a career as a professional illustrator or graphic designer. She envisions attending a specialized art high school where she
    can refine her digital illustration skills and learn animation. Long‑term, she hopes to work on book covers, create concept art for video games, or design community murals that celebrate local heritage.
    Dionne is also intrigued by the possibility of combining art with technology, so she aspires to study interactive media or game design in college, eventually leading creative projects that invite others
    to explore new ideas in an accessible, visually rich way.
