personas:
  professional: A budding interdisciplinary creator, Dionne Stone spends afternoons designing costumes for the school theater, painting backdrops for community projects, and experimenting with 3D‑printed
    props, blending traditional art with digital fabrication while their easygoing nature keeps the process fun and collaborative.
  sports: A fan of the Indiana Pacers and the Indianapolis Colts, Dionne Stone joins a weekend neighborhood soccer pickup and hikes the local nature trails with friends, preferring low‑key outdoor activity
    over organized team sports.
  arts: Enthusiastic about both classic and contemporary influences, Dionne Stone draws inspiration from Van Gogh’s brushwork, Miyazaki’s whimsical storytelling, and street artist Banksy’s bold statements,
    channeling this into set paintings, costume design, and stop‑motion videos created in the town’s makerspace.
  travel: Eager for both local adventure and far‑flung dreams, Dionne Stone often explores the Indiana Dunes and nearby farmstands on spontaneous family road trips, while pinning future trips to the Smithsonian
    in Washington, D.C., and Disney World on their bedroom wall.
  culinary: With a budding palate, Dionne Stone loves assembling veggie‑loaded pizzas, whisking strawberry‑basil smoothies, and crafting pressed‑flower cupcakes, using fresh corn, local honey, and a sprinkle
    of edible glitter to brighten each bite.
  core: Dionne Stone, a 13‑year‑old artistic whirlwind, fills every free moment with color‑splashed projects, collaborative games, and spontaneous adventures, all while occasionally misplacing their sketchbook
    and forgetting to budget for snacks.
background:
  cultural: Dionje is a white American teen raised in Brazil, Indiana, a small Midwestern town known for its close‑knit community and annual Brazil Days festival. Her family traces its roots to German and
    Irish immigrants who settled in the region in the late 19th century, and they maintain a blend of Protestant traditions and community volunteerism. Growing up, she has been immersed in the values of
    Midwestern hospitality, modesty, and a strong sense of belonging to local institutions such as the public library, the high school sports scene, and the county fair. The rural landscape, with its farms,
    open fields, and seasonal changes, has nurtured her appreciation for nature and simple pleasures, while the town’s emphasis on collaborative events has reinforced her cooperative and harmonious outlook.
