personas:
  professional: Jorge Ortiz, an 18-year-old flooring apprentice with a talent for measuring, cutting, and installing carpet, hardwood, laminate, and tile, blends meticulous precision with a collaborative
    crew mindset, they thrive on structured project timelines while keeping a friendly rapport with clients.
  sports: Jorge Ortiz competes in the Marysville Adult Soccer League, they are a devoted fan of the Seattle Sounders FC and the Seattle Kraken, and they regularly hike the Cascade foothills with a local
    outdoor club.
  arts: Jorge Ortiz enjoys salsa dancing to the rhythms of Ruben Blades and Willie Colon, they play acoustic guitar covering songs by Bad Bunny and The Head and the Heart, and they attend community cultural
    festivals whenever possible.
  travel: Jorge Ortiz prefers organized weekend road trips to the Oregon Coast and Vancouver, they also dream of a longer backpacking journey to the isthmus of their family's roots, balancing budget-friendly
    planning with spontaneous detours to local waterfalls.
  culinary: Jorge Ortiz loves cooking sazón-rich dishes like sancocho, arroz con pollo, and plantain tostones, they skillfully blend fresh cilantro, garlic, and local salmon into fusion meals, and they
    often host dinner nights for friends to share cultural flavors.
  core: Jorge Ortiz is a structured yet sociable flooring apprentice who channels energetic community vibes into dance, gaming marathons, and meticulous budgeting, they occasionally procrastinate on paperwork
    but always show up ready to help.
background:
  cultural: Jorge belongs to a Panamanian family that values close‑knit relationships, community support, and vibrant cultural traditions. He grew up speaking Spanish at home, celebrating Carnaval, and
    enjoying music styles like salsa, reggae en Español, and típico. His family’s emphasis on hospitality and helping neighbors influences his compassionate nature and cooperative spirit. While adapting
    to life in Marysville, Washington, he balances his Panamanian heritage—through food, language, and community gatherings—with the local Pacific‑Northwest lifestyle, often sharing his culture with friends
    and coworkers.
