  career_goals: Jorge aims to become a certified master flooring installer within the next five years, pursuing apprenticeship programs and obtaining industry certifications in sustainable flooring practices.
    He aspires to join a reputable union guild to deepen his technical expertise and expand his professional network. Long‑term, he envisions opening his own flooring business that emphasizes quality workmanship,
    fair pricing, and community involvement, offering apprenticeships to help other young workers gain stable, skilled employment.
