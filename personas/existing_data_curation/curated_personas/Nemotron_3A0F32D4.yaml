  hobbies: '[''Soccer'', ''Salsa dancing'', ''Hiking in the Cascades'', ''Gaming (multiplayer sports and shooters)'', ''Cooking Panamanian cuisine'', ''Playing guitar'', ''Volunteering at local youth centers'',
