personas:
  professional: Christabel Davis, a data‑driven restaurant operations manager with over a decade of experience, leverages her STEM background to integrate POS analytics, optimize inventory, and uphold rigorous
    food‑safety standards, while her skeptical yet practical nature keeps them vigilant about cost overruns and team performance as they eye a regional manager role.
  sports: Christabel Davis, a regular member of the Durham Hiking Club, spends weekends tackling the trails of Eno River State Park, follows the Carolina Panthers (NFL) and the Durham Bulls (AAA baseball)
    for a dose of team spirit, and engages in seasonal cross‑country runs in spring while preferring low‑impact yoga sessions in winter to balance competitiveness with personal wellness.
  arts: Christabel Davis, an avid participant in a small book club, finds artistic inspiration in the experimental soundscapes of St. Vincent, the narrative craft of Margaret Atwood, and the Southern‑flavored
    cinematography of the Coen brothers, while occasionally sketching botanical illustrations of garden herbs during quiet evenings, and they proudly collect vintage vinyl of Nina Simone.
  travel: Christabel Davis plans travel like a project, mapping weekend road trips to Asheville and Charleston in spreadsheets, prefers adventure‑oriented stays such as hiking the Blue Ridge Parkway or
    a farm‑stay in Tuscany for culinary immersion, yet balances this with a modest budget that precludes extended overseas vacations, though they dream of a month‑long research‑cooking expedition in Kyoto’s
    Nishiki Market.
  culinary: Christabel Davis, an advanced home chef, regularly crafts sous‑vide duck breast glazed with miso and fermented kimchi‑marinated carrots, experiments with hydrocolloid gels using agar‑agar and
    xanthan gum, and blends heirloom tomatoes, sweet corn, and locally sourced okra into a Southern‑inspired gumbo that they serve at pop‑up tastings for friends.
  core: Christabel Davis is a solitary, data‑obsessed culinary tinkerer who balances meticulous menu engineering with a habit of over‑caffeinating during late‑night experiments, and their skeptical edge
    often drives them to double‑check every detail before trusting any new idea.
background:
  cultural: Christabel was raised in a middle‑class, Anglo‑American family in the American South, where she internalized the values of Southern hospitality, self‑reliance, and respect for tradition. Her
    upbringing emphasized the importance of education and practical problem‑solving, which complemented her later pursuit of a STEM degree. Living in Durham, a city known for its academic vibrancy and evolving
    culinary scene, she has been shaped by a blend of Southern food traditions, an appreciation for diverse cuisines, and the progressive, community‑focused atmosphere of a university town.
attributes:
  skills: '["Food service operations management", "Team leadership and staff development", "Inventory control and cost optimization", "Food safety compliance (ServSafe)", "Data analysis for performance
    metrics", "POS and restaurant technology integration", "Budget planning and financial forecasting", "Menu development and nutritional analysis", "Process improvement (Lean principles)", "Conflict resolution
    and communication", "Scheduling optimization using software", "Customer experience enhancement"]'
  hobbies: '["Experimental cooking (sous‑vide, fermentation, flavor chemistry)", "Home vegetable gardening", "Hiking and nature walks in local parks", "Logic puzzles and chess", "Reading popular science
    and technology literature", "Small‑group book club", "Volunteer food‑safety education at community kitchen"]'
  career_goals: Christabel aims to move from managing a single outlet to overseeing multiple locations as a regional operations manager within the next three to five years. She intends to leverage her analytical
    skills to boost profitability and operational consistency across sites while championing sustainable sourcing practices. To support this trajectory, she plans to earn a Certified Hospitality Revenue
    Manager (CHRM) credential and eventually launch her own boutique farm‑to‑table café that highlights Southern culinary traditions infused with innovative, science‑based cooking techniques.
