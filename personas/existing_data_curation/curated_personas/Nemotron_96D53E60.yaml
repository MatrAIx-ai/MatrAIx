  career_goals: Myles aims to advance within the Huntington Beach Police Department by moving into a specialized investigative role, such as a detective in the community liaison unit, where he can blend
    his structured policing foundation with his desire for flexible, people‑focused work. He plans to complete his associate’s degree in criminal justice and pursue certifications in mental‑health crisis
    response, positioning himself as a go‑to officer for incidents involving heightened emotional distress. Long‑term, he hopes to attain the rank of sergeant, overseeing a small team that prioritizes community
    outreach and collaborative problem‑solving. Alongside his professional ambitions, Myles is committed to building personal resilience, seeking ongoing therapy and mindfulness training to better manage
    his anxiety, with the broader aim of becoming a mentor for younger officers navigating similar emotional challenges.
