personas:
  professional: Madison Kingsbury is a veteran sheet metal fabricator with three decades of expertise in CNC shearing, MIG/TIG welding, and blueprint interpretation, who mentors apprentices, leads safety
    briefings, and continuously refines workflow, while they pursue a foreman position that lets them blend technical mastery with their curiosity‑driven artistic metal sculpting vision.
  sports: Madison Kingsbury spends weekends hiking the Lakeshore Trail, playing recreational tennis with the Detroit Amateur Racquet Club, and cheering on the Detroit Tigers and Red Wings while following
    the local rowing crew on Lake St. Clair.
  arts: Madison Kingsbury nurtures their artistic soul by painting watercolor vistas of the Great Lakes, photographing rust‑stained industrial sites reminiscent of Ansel Adams' dramatic contrast, attending
    gallery openings featuring Monet reproductions, and supporting community theater productions at The Purple Rose Theatre, all while drawing design inspiration from Georgia O'Keeffe's bold forms.
  travel: Madison Kingsbury prefers thoughtfully planned getaways that blend scenic drives along the Great Lakes shoreline with cultural stops, such as a summer ferry trip to Mackinac Island, a weekend
    art pilgrimage to Monet’s Giverny in France, and occasional city breaks in Chicago for jazz festivals, all balanced against a modest travel budget and the need to schedule around workshop commitments.
  culinary: Madison Kingsbury finds comfort in cooking Midwestern staples like Detroit‑style pizza, buttery chicken pot pie, and fresh lake‑caught perch fillets seasoned with dill and lemon, while they
    experiment with new recipes that incorporate garden‑grown tomatoes, basil, and a dash of smoked paprika.
  core: Madison Kingsbury fuses steel and watercolor to sculpt both metal and ideas, champions women in the trades, and occasionally hoards unfinished art projects in the workshop for months, all while
    nursing a habit of late‑night coffee that disrupts their sleep.
background:
  cultural: Madison grew up in a white, working‑class family in the Metro‑Detroit region, where her father was a factory machinist and her mother a school secretary. The community’s strong union presence
    and Midwestern values of diligence, reliability, and modesty shaped her worldview. She was raised in a Protestant household that emphasized community service and participation in local events like county
    fairs and Fourth of July parades. Living in New Baltimore, a small city on the shores of Lake St. Clair, she developed a deep appreciation for the Great Lakes culture—fishing, boating, and seasonal
    festivals. Her background combines the practical, hands‑on ethos of the Rust Belt with a genuine curiosity for art and new experiences, informing both her professional path and personal pursuits.
attributes:
  skills: '["Sheet metal fabrication (cutting, bending, forming)", "Blueprint reading and technical drawing interpretation", "CNC machine setup and operation", "MIG/TIG/stick welding", "OSHA 10‑hour safety
    compliance", "AWS welding certification and Certified Welding Inspector training", "Problem solving and improvisational repairs", "Mentoring and training apprentices", "Project coordination and deadline
    management", "Effective communication and assertive teamwork"]'
  hobbies: '["Watercolor painting (landscape, especially Lake Michigan scenes)", "Photography (industrial and nature subjects)", "Metal sculpture creation as a hobby", "DIY home improvement projects involving
    metalwork", "Gardening and horticulture", "Hiking the Lakeshore Trail and nature walks", "Boating on Lake St. Clair", "Attending local art galleries and community theater", "Cooking and experimenting
    with Midwestern recipes"]'
  career_goals: Madison aims to advance into a foreman or supervisory role within her union‑affiliated metal shop, leveraging her technical mastery and people‑leadership experience. She plans to complete
    her associate’s degree in industrial technology, which she began years ago, and eventually pursue a bachelor’s in mechanical engineering to broaden her design capabilities. A long‑term ambition is to
    launch a small side studio that creates artistic metal sculptures and custom furniture, merging her love for art with her trade skills. She also hopes to champion greater female participation in the
    trades by organizing mentorship programs and speaking at local vocational schools.
