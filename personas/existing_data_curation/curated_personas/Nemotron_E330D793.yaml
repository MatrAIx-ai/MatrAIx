personas:
  professional: Maria Aviles is an aspiring digital illustrator and junior game creator who combines strong sketching skills, early coding in Scratch, and a competitive chess mindset to craft detailed comic‑style
    animations, balancing meticulous organization with the freedom to experiment in their artwork.
  sports: Maria Aviles plays for the Little Miami Lions youth soccer club during the fall, swims at the community pool throughout summer, follows the Miami Heat and Miami Dolphins for inspiration, but prefers
    solitary fitness routines such as early‑morning jogging and daily chess puzzles to keep their mind sharp.
  arts: Maria Aviles draws inspiration from graphic novels like "Saga" and "Maus", admires the painterly style of Alex Ross, enjoys the rhythmic sounds of the cuatro in traditional folk songs, and follows
    indie animator Rebecca Sugar’s work, weaving these influences into their own Scratch short films and sketchbook illustrations.
  travel: Maria Aviles enjoys meticulously planning family trips, has visited Disney World in Orlando and the Florida Keys for snorkeling, dreams of exploring Barcelona’s architecture, and hopes to attend
    a cultural festival in New York that celebrates traditional crafts, and they balance curiosity with a desire for quiet, structured experiences.
  culinary: Maria Aviles loves helping in the kitchen preparing arepas filled with shredded cheese and black beans, has become proficient at achieving the perfect dough texture, also enjoys pizza margherita
    topped with fresh basil and cherry tomatoes, often pairing meals with sliced mango while they sketch.
  core: Maria Aviles is a quietly competitive 11‑year‑old who fills sketchbooks with folklore‑inspired art, strategizes on chess boards, saves allowance for a future graphics tablet, and they navigate mild
    allergies and social fatigue with a blend of organization and creative improvisation.
background:
  cultural: Maria comes from a Venezuelan family that settled in Miami after leaving their homeland due to economic and political challenges. At home, Spanish is spoken daily, and family traditions such
    as preparing arepas, celebrating Día de la Independencia, and listening to folk rhythms are central to her cultural identity. While she embraces the multicultural vibrancy of Miami, attending local
    Latino festivals and community events, she also maintains a strong connection to her roots through stories, music, and occasional visits to Venezuelan cultural centers. This blend of diaspora experience
    and local influences shapes her perspective, fostering resilience and a deep appreciation for her heritage.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Digital illustration using Procreate'', ''Basic Scratch programming'', ''Creative writing and journaling'', ''Critical research and fact‑checking'',
    ''Organizational planning for school projects'', ''Competitive chess strategy'', ''Attention to detail in visual art'']'
  hobbies: '[''Sketching and drawing in a personal journal'', ''Reading graphic novels and sci‑fi books'', ''Scratch coding for simple animations and games'', ''Journaling personal reflections'', ''Listening
    to Venezuelan folk music'', ''Playing chess online'', ''Exploring virtual museum tours'', ''Collecting and organizing art supplies'']'
  career_goals: Maria aspires to become a visual storyteller who merges her love for art and technology, envisioning a future as an illustrator for children's books that celebrate Venezuelan culture or
    as a developer of educational games that spark curiosity. She aims to earn a scholarship to a specialized arts high school, win local art competitions, and build a portfolio that showcases her unique
    blend of cultural heritage and digital skill. Her competitive nature fuels a desire to be recognized for excellence while maintaining the independence she values.
