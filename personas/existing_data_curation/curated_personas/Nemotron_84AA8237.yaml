  career_goals: Now retired from full‑time work, Gerard aims to mentor emerging managers in his community, serve on the local Chamber of Commerce board, and help small businesses navigate regulatory hurdles.
    He also hopes to document his management practices in a concise guide for his grandchildren and future family members, preserving a legacy of practical leadership.
