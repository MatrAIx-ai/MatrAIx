  career_goals: Min Ha dreams of becoming a children's book author and illustrator, where she can combine her love for storytelling, art, and imaginative worlds. She also envisions designing educational
    toys or interactive digital experiences that inspire curiosity in other kids. In the longer term, she hopes to study graphic design or fine arts while staying connected to her cultural roots and using
    her work to promote kindness and creativity.
