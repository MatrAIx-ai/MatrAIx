personas:
  professional: Min Wang is a budding comic creator who spends afternoons sketching original characters, meticulously planning storyboards, and experimenting with simple slime chemistry, demonstrating an
    impressive blend of artistic imagination and methodical curiosity.
  sports: Min Wang is a member of the local youth soccer club, the Northside Tigers U9, and also cheers for the nearby professional basketball team, the Chicago Bulls, while spending Saturday mornings at
    the community pool for beginner swimming lessons.
  arts: Min Wang is an avid fan of the whimsical illustrations of Hayao Miyazaki, the kinetic murals of contemporary street artists, and the playful piano renditions of Mozart’s "Rondo" on their instrument,
    often drawing inspiration from a playlist that mixes Korean folk tunes, K‑pop hits, and classic Beethoven symphonies.
  travel: Min Wang loves family road trips to the nearby mountain park for nature hikes, annual visits to historic Gyeongju to explore ancient palaces, and dreams of attending a LEGO exhibition in Copenhagen
    next summer, balancing curiosity with the comfort of parental supervision.
  culinary: Min Wang enjoys experimenting with Korean cuisine at home, frequently making kimchi fried rice and tteokbokki under their parents' guidance, while also perfecting a blueberry muffin recipe discovered
    on a children's cooking show, and they occasionally snack on gummy bears while solving a puzzle.
  core: Min Wang channels a vivid imagination into daily comic sketches, keeps a meticulously organized notebook of ideas, fiercely guards a secret stash of glitter pens, and can be found humming Korean
    folk melodies while carefully counting their allowance for the next LEGO set.
background:
  cultural: Min Ha comes from a Korean‑American family that balances traditional East Asian values with American life in Brookline, MA. At home she speaks Korean and celebrates holidays such as Lunar New
    Year and Chuseok, often preparing dishes like kimchi jjigae and tteokguk with her parents. She participates in a weekend Korean language school where she learns calligraphy and folk stories, which influence
    her artistic style. The emphasis on education, respect for harmony, and community support from her cultural heritage shape her organized, cooperative, and empathetic personality.
