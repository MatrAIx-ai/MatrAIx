  career_goals: Jeffery aims to advance to a senior maintenance supervisor role within his regional organization, obtaining certifications such as EPA‑approved HVAC technician and Certified Maintenance
    Manager. He aspires to lead a team that drives energy‑efficiency upgrades in public facilities and to mentor younger tradespeople. Long‑term, he envisions launching a community‑focused handyman service
    that offers reliable, affordable repairs while supporting local charities and youth apprenticeship programs.
