personas:
  professional: Theresa Jones, a 63‑year‑old seasoned chef and community kitchen coordinator, blends three decades of fast‑paced restaurant experience with their curiosity for new flavor pairings, leading
    volunteer cooking workshops in a relaxed, talk‑heavy style that often bends schedules to accommodate spontaneous ideas while still delivering cost‑effective, health‑focused Gulf‑coast menus.
  sports: Theresa Jones stays active by walking the Gulf shoreline with the Cape Coral Beach Walking Club and fishing early mornings, while they cheer on the Tampa Bay Buccaneers in fall football, the Miami
    Heat during the NBA season, and the Tampa Bay Rays in summer baseball, reflecting a laid‑back yet sociable approach to fitness.
  arts: Theresa Jones immerses themselves in the arts by attending live Cape Coral concerts featuring the Zac Brown Band and John Mayer, listening to culinary podcasts like 'Gastropod' and 'The Splendid
    Table', enjoying community theater productions of 'Our Town', and collecting vintage cookbooks adorned with artwork by Southern folk painter Maggie Pierce, which together fuel their sociable storytelling
    at the dinner table.
  travel: Theresa Jones prefers spontaneous weekend getaways to nearby Gulf destinations like the Florida Keys and historic Savannah, while they dream of a Mediterranean cruise to the Amalfi Coast, balancing
    a love for relaxed beach walks with occasional limited‑budget constraints that keep their travel plans flexible and low‑stress.
  culinary: Theresa Jones, a masterful home chef, crafts Gulf‑coast staples like blackened red snapper with lemon‑butter basil sauce, shrimp gumbo seasoned with fresh thyme and cayenne, and low‑sodium collard
    greens with smoked turkey, constantly experimenting with heirloom basil, rosemary, and citrus zest from their herb garden while hosting convivial dinner parties that showcase their practical yet adventurous
    culinary flair.
  core: Theresa Jones, a talkative 63‑year‑old chef who blends Southern comfort with Gulf freshness, can be delightfully disorganized—often forgetting to turn off the stove while sharing a story—but always
    ensures every guest leaves with a full belly and a smile.
background:
  cultural: Theresa was raised in a middle‑class family of European descent that settled in the American South during the post‑war era. Her grandparents emigrated from Ireland and Germany, bringing a tradition
    of hearty, home‑cooked meals that emphasized fresh, seasonal ingredients. Moving to Florida in her twenties, she embraced the coastal culture of Cape Coral, where the laid‑back lifestyle, love of the
    Gulf, and community spirit shaped her culinary style. Her cultural background blends mainstream American values—individualism, hard work, and hospitality—with the regional flavors of the Gulf Coast,
    reflected in her preference for fresh seafood, citrus, and simple, comforting dishes.
attributes:
  skills: '[''Gulf Coast seafood preparation'', ''Southern comfort cooking'', ''Recipe development and improvisation'', ''Menu planning for senior-friendly nutrition'', ''Food safety and sanitation (ServSafe
    knowledge)'', ''Kitchen inventory and cost control'', ''Catering for small community events'', ''Teaching beginner cooking classes'', ''Team communication and conflict mediation'', ''Adapting dishes
    for dietary restrictions (low‑sodium, diabetic‑friendly)'']'
  hobbies: '[''Herb and vegetable gardening'', ''Fishing trips and beachcombing'', ''Hosting dinner parties'', ''Participating in church potluck events'', ''Volunteering at the local food bank'', ''Walking
    along the Gulf shoreline'', ''Attending live music events in Cape Coral'', ''Reading vintage and modern cookbooks'', ''Exploring culinary podcasts'', ''Taking weekend cooking workshops'']'
  career_goals: Theresa hopes to transition her passion for cooking into a more community‑oriented role as she approaches retirement. She aims to earn a formal ServSafe certification, publish a collection
    of her favorite Gulf‑coast family recipes, and launch a modest weekend pop‑up kitchen that serves healthy, locally sourced meals to neighbors and seniors. Additionally, she wants to mentor young cooks
    at the local community college, share her knowledge through cooking workshops, and eventually volunteer as a nutrition educator at the regional senior center, ensuring her love of food continues to
    nourish both bodies and relationships.
