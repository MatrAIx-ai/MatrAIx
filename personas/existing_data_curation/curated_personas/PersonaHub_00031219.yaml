persona_description: A professional engineer who specializes in the design and construction of heavy-duty and industrial applications, particularly in the automotive, aerospace, and construction industries.
  They are familiar with various types of lock nuts and their applications in these industries, and they use this knowledge to develop innovative solutions for their clients. They are also skilled in the
  use of torque forces and the appropriate selection of lock nuts for different applications. They are aware of the different types of lock nuts available, including nylon insert locknuts, hex jam nuts,
  center lock nuts, serrated flange locknuts, and Keps K-Lock, and they can identify the appropriate type for a given application.
