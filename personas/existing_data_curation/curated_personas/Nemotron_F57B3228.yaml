  hobbies: '[''Kayaking'', ''Stand‑up paddleboarding'', ''Hiking (Lanikai Pillbox Trail)'', ''Snorkeling'', ''Nature photography'', ''DIY woodworking'', ''Raspberry Pi projects'', ''Reading science‑fiction'',
    ''Cooking Hawaiian‑inspired meals'', ''Volunteering for beach clean‑ups'', ''Attending local music festivals'']'
  career_goals: Joseph aims to transition from front‑line representative to a supervisory role within the next two years, pursuing a Team Lead or Shift Manager position in the hospitality‑focused customer
    service department. He plans to earn a Six Sigma Green Belt and a Project Management Professional (PMP) certification to strengthen his process‑improvement credentials. Long‑term, he envisions moving
    into a Customer Experience Strategy or Operations Analyst role where he can merge his STEM expertise with service leadership, driving measurable improvements in CSAT, first‑call resolution, and operational
    efficiency while maintaining a healthy work‑life balance for his family.
