  career_goals: Driven by a competitive streak, Nohelia aims to ascend to a senior leadership role within the next five years—either as a senior audit manager at a top‑tier public accounting firm or as
    chief financial officer of a fast‑growing Houston‑based company. She plans to deepen her expertise in data‑analytics‑driven auditing, positioning herself as a thought leader in leveraging AI for financial
    risk management. Long‑term, she envisions launching a boutique advisory practice that helps Hispanic‑owned small businesses navigate tax compliance and financial reporting, using her bilingual skills
    to bridge cultural gaps. She also aspires to mentor junior accountants, especially women and Latinx professionals, championing diversity in the finance sector.
