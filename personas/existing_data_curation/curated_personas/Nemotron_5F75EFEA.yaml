personas:
  professional: Justiss Obery, a 22‑year‑old aspiring administrative professional, leverages their strong organization, time‑management, and budgeting skills to excel in a part‑time retail role while targeting
    a structured receptionist position at a local nonprofit, where their practical, reliability‑driven nature thrives.
  sports: Justiss Obery, who plays basketball three times a week at the community center, follows the Miami Heat during the NBA season, and supports the local women's recreational league, balancing a competitive
    edge with a relaxed approach to fitness.
  arts: Justiss Obery, an avid attendee of jazz and R&B shows featuring artists like Gregory Porter, H.E.R., and local saxophonist Jamal Davis, also immerses themselves in contemporary fiction by authors
    such as Sally Rooney and personal‑development podcasts, letting music and literature shape their creative outlook.
  travel: Justiss Obery, who prefers carefully planned yet flexible weekend getaways, frequently drives to Asheville, NC, and dreams of a culinary pilgrimage to New Orleans, balancing budget constraints
    with a love for spontaneous detours to live‑music venues.
  culinary: Justiss Obery, a confident home cook, delights in preparing shrimp and grits, collard greens simmered with smoked turkey, and sweet tea infused with fresh mint, often tweaking family recipes
    while occasionally treating themselves to upscale brunches at local bistros.
  core: Justiss Obery, a 22‑year‑old with a penchant for structured routines, blends a competitive spirit with a love for jazz, meticulous budgeting, and occasional over‑planning, all while juggling a skeptical
    outlook that fuels their drive for personal growth.
background:
  cultural: Justiss is a second‑generation African American raised in Richmond, Virginia. Her upbringing in a close‑knit extended family emphasizes the importance of church, storytelling, and community
    gatherings. The city’s rich Black heritage—highlighted by historic neighborhoods, the Richmond African American History Museum, and annual Juneteenth celebrations—has instilled a strong sense of resilience,
    pride, and collective responsibility. Family traditions such as shared meals, gospel music, and mentorship from local community leaders shape her values and inform both her personal outlook and professional
    ambitions.
