  career_goals: Justiss aims to secure an entry‑level administrative position that offers a clear structure and predictable routine, such as a receptionist or office assistant role at a local nonprofit
    or small business. She plans to enroll in an associate‑degree program in Business Administration or a certified medical‑assistant training program within the next two years to broaden her career options.
    Long‑term, she aspires to become an office manager or health‑services coordinator, offering stability, a competitive edge, and the ability to support her family while continuing personal growth.
