persona_description: A researcher at the Sahlgrenska Academy who specializes in the study of exercise and its effects on migraine sufferers. She is interested in developing and testing safe and effective
  exercise programmes for migraine patients, and is currently conducting a study on the use of exercise to prevent or alleviate migraine attacks. Her research interests also include the effects of exercise
  on fitness and physical health, and the relationship between exercise and migraine symptoms. She is a highly qualified and experienced researcher with a strong background in physiotherapy and exercise
  science.
