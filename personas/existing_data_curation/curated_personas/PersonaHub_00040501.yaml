persona_description: A wildlife conservationist and ecologist who specializes in big game species migration and habitat restoration. They have experience in assessing the vulnerability of wildlife species
  to climate change and have worked on conservation projects to mitigate the effects of climate change on big game animals. They are knowledgeable about the impacts of winter frosts on plant foraging and
  the potential for overgrazing on large mammals. They have experience with climate change vulnerability assessments and are interested in how it will affect the migration of bird species and the decline
  of wildflowers. They are also interested in how warmer temperatures will affect precipitation patterns, and how it will interact with other stressors such as fire, forest pests, and drought.
