  hobbies: '[''Woodworking'', ''Herb and chili gardening'', ''Non‑fiction reading (history, technology, DIY)'', ''Documentary watching'', ''Cooking Dominican cuisine with a fusion twist'', ''Small‑group
    basketball games'']'
  career_goals: Eric aims to translate his hands‑on expertise into a reliable part‑time freelance handyman service focused on the Paterson community, leveraging his reputation for reliability and low‑stress
    problem solving. He plans to obtain a formal certification as an electrician to broaden the scope of services he can offer and increase his earning potential. Additionally, he hopes to launch a small
    home‑based catering venture that showcases traditional Dominican dishes, combining his culinary passion with entrepreneurial ambition. A longer‑term goal is to mentor at‑risk youth in his neighborhood,
    teaching practical trades and responsible budgeting as a way to give back and foster community resilience.
