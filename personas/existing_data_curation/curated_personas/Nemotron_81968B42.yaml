personas:
  professional: Eric Chang, a 49‑year‑old part‑time freelance handyman in Paterson, blends meticulous carpentry, electrical troubleshooting, and computer networking with a pragmatic curiosity that drives
    them to devise low‑stress, reliable fixes for neighbors while staying organized yet flexible for each DIY project.
  sports: Eric Chang follows the New York Knicks with a loyal, relaxed fandom, watches the New Jersey Devils during hockey season, and joins a local basketball pick‑up league at the Paterson Community Center,
    preferring weekend shoot‑around sessions over formal gym workouts.
  arts: Eric Chang finds artistic inspiration in the rhythmic melodies of Romeo Santos and the vibrant energy of Aventura, enjoys documentary series by Ken Burns, and admires the handcrafted elegance of
    furniture maker Sam Maloof, all of which inform their own woodworking aesthetics.
  travel: Eric Chang prefers low‑key road trips to historic towns like Cartagena and New Orleans, planning itineraries around culinary stops and heritage festivals, while dreaming of a future sailing vacation
    to the Caribbean islands they savor in family recipes.
  culinary: Eric Chang, an avid home cook, expertly prepares mangú with sautéed onions, sancocho brimming with yucca and plantains, and experimental fusion tacos that blend cilantro, Scotch bonnet chilies,
    and smoked pork, while their pantry is stocked with fresh herbs like oregano and epazote.
  core: Eric Chang balances meticulous DIY expertise with a love for soulful kitchen experiments, yet habitually leaves workshop lights on overnight, believing the extra illumination fuels their nighttime
    brainstorming.
background:
  cultural: Eric’s Dominican heritage is a central thread in his identity. Growing up in a bilingual household, he carries forward traditions of music, food, and community solidarity. He celebrates Dominican
    holidays such as Día de la Independencia with family gatherings that feature bachata, merengue, and homemade dishes like mangú and sancocho. In Paterson, a city known for its multicultural fabric, Eric
    maintains close ties with the local Dominican diaspora, participating in cultural festivals, supporting community gardens, and volunteering at neighborhood events. His cultural background informs his
    culinary interests, his fluency in Spanish for everyday communication, and his commitment to fostering a sense of belonging within his immediate social circle.
