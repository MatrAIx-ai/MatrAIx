personas:
  professional: A seasoned warehouse professional, Courtney Greico leverages thirty years of hands-on freight experience and a knack for dependable, routine-driven material handling, using expertise with
    forklifts, pallet jacks, and OSHA compliance to position themselves as a natural shift-lead candidate ready to mentor younger staff while embracing an upcoming part-time transition before retirement.
  sports: An avid bowler and casual hiker, Courtney Greico competes in the local Midwest Bowling League for the Riverside Lanes team, follows the Chicago Cubs and the Detroit Lions, walks the Ice Age Trail
    each weekend to stay limber, and joins a community walking club, balancing structured competition with low-impact cardio suited to their 60-year-old stamina.
  arts: A devoted crafts enthusiast, Courtney Greico stitches traditional nine-patch quilts while listening to The Rolling Stones, Fleetwood Mac, and Bob Dylan, reads Agatha Christie mystery novels on porch
    evenings, and occasionally attends local theater performances of classic American plays, letting classic rock melodies and nostalgic stories shape their creative downtime.
  travel: A measured traveler, Courtney Greico prefers road-trip itineraries that allow for garden-stop visits and mid-week stays, has explored the historic streets of St. Louis, the natural beauty of Michigan's
    Upper Peninsula, and dreams of a leisurely cruise to New England's coastal towns like Bar Harbor, balancing budget awareness with a desire for relaxed, moderately social experiences.
  culinary: A home-cooking connoisseur, Courtney Greico excels at Midwestern comfort foods—preparing hearty chicken pot pie with flaky pastry, creamy corn casserole seasoned with fresh thyme, and classic
    meatloaf glazed with ketchup—while sourcing local root vegetables and always keeping a jar of tangy dill pickles on hand, reflecting a practical yet flavorful kitchen style.
  core: Courtney Greico is a routine-loving, competitively spirited 60-year-old who balances steady warehouse expertise with gardening, bowling, and classic rock, occasionally misplacing a screwdriver but
    never missing a Friday night league.
background:
  cultural: Courtney grew up in a working‑class family in the Milwaukee suburbs of Waukesha County, the daughter of second‑generation German‑Polish immigrants. Her upbringing was shaped by Midwestern values
    of hard work, modesty, and community involvement. She was raised Catholic and participated in church activities, local fairs, and community potlucks. The region’s seasonal climate, love of outdoor recreation,
    and support for local sports teams—especially the Green Bay Packers—have also influenced her cultural identity. She values thrift, practicality, and a straightforward approach to life, reflecting the
    traditional values of her upbringing.
attributes:
  skills: '["Forklift operation", "Loading and unloading trucks", "Inventory management", "Warehouse safety compliance", "Equipment maintenance", "Basic computer skills (WMS)", "Physical stamina", "Logistics
