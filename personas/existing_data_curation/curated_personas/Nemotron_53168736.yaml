  hobbies: '["Gardening (vegetable & flower beds)", "Bowling league", "Walking the Ice Age Trail", "Quilting", "Cooking classic Midwestern dishes", "Listening to classic rock", "Reading mystery novels",
    "Fishing on Lake Michigan"]'
  career_goals: Courtney aims to secure a shift‑lead or senior material‑mover position that leverages her reliability and deep knowledge of the warehouse routine. Over the next year she plans to obtain
    a certified forklift operator credential and complete an OSHA safety‑aware training course, positioning herself for a supervisory or training role before retirement. She also hopes to mentor younger
    colleagues, sharing her practical expertise while fostering a competitive environment that rewards efficiency. Ultimately, she intends to transition to a part‑time schedule that maintains her steady
    income while allowing more time for her garden and craft projects.
