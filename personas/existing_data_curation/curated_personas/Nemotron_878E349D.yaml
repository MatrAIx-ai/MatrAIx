personas:
  professional: Sangwoo Davis is an aspiring junior ecologist whose knack for meticulous observation and LEGO-style systematic thinking fuels a practical, curiosity-driven approach to studying animal habitats,
    while their reserved yet cooperative nature shines through in collaborative class projects and school science fairs, and they often share their findings with classmates.
  sports: Sangwoo Davis is a member of the Fargo Youth Ice Skating Club, eagerly follows the Minnesota Wild in the NHL and the North Dakota State Bison football team each fall, enjoys occasional jogs along
    the Missouri River to keep fit, and they prefer quiet nature walks over team sports, while cheering on the Fargo Moorhead RedHawks during the summer baseball season.
  arts: Sangwoo Davis delights in drawing whimsical cartoons inspired by Mo Willems' Elephant & Piggie, creates Scratch animations that echo the rhythm of Mozart's Clarinet Concerto, watches Studio Ghibli's
    My Neighbor Totoro for color ideas, and they build LEGO Architecture sets designed by Adam Reed Tucker, all of which nurture a vivid, detail-oriented creative spark.
  travel: Sangwoo Davis prefers small, nature-focused trips, often joining parents on bird-watching excursions to Lake Sakakawea, has explored the historic grandeur of Mount Rushmore and the bustling Mall
    of America, and they dream of a summer expedition to Yellowstone National Park to study geysers and bison herds firsthand.
  culinary: Sangwoo Davis favors simple, wholesome fare like peanut butter-banana sandwiches, homemade macaroni and cheese spiced with sharp cheddar, and snack-size carrot sticks with hummus, and they occasionally
    experiment by sprinkling dried rosemary on baked potatoes for a subtle culinary twist.
  core: Sangwoo Davis is a quietly curious, puzzle-loving 10-year-old who balances a methodical love of nature and LEGO engineering with a compassionate streak, yet they often forget to floss after gaming
    marathons.
background:
  cultural: Sangwoo was born and raised in Bismarck, North Dakota, a modest Midwestern city where his white family reflects the region’s German‑Russian and Scandinavian ancestry. The community emphasizes
    self‑reliance, modesty, and participation in local traditions such as the North Dakota State Fair, church gatherings, and volunteer service projects. Growing up in a climate with harsh winters, he learned
    to enjoy outdoor activities like ice skating and snowshoeing, while his summers are often spent exploring the plains and riverbanks. His public elementary school stresses practical learning, respect
    for established methods, and collaboration in small groups. Family celebrations include typical American holidays—Thanksgiving, Fourth of July—and regional customs that honor local history and agricultural
    heritage. This backdrop blends a practical Midwestern work ethic with a compassionate family environment that values helping others and maintaining harmony.
attributes:
  skills: '[''Reading comprehension'', ''Elementary mathematics'', ''Basic computer operation'', ''Scratch programming'', ''Science experiment execution'', ''LEGO model building'', ''Empathetic listening'',
