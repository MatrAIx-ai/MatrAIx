  hobbies: '[''Reading animal books'', ''Birdwatching'', ''LEGO building'', ''Scratch coding'', ''Drawing cartoons'', ''Clarinet practice'', ''Puzzle solving'', ''Family nature walks'', ''Ice skating'']'
  career_goals: Inspired by his compassion for living things and his interest in practical problem‑solving, Sangwoo aspires to work in a career that helps both animals and people. He dreams of becoming
    a wildlife veterinarian or a conservation biologist who protects habitats and treats injured animals. He also entertains the idea of a community health aide or a future teacher, roles that would let
    him share knowledge and maintain harmony in his community. His long‑term ambition is to combine scientific curiosity with a practical, service‑oriented profession.
