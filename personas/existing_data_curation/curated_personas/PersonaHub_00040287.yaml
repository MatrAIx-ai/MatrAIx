persona_description: A historian who specializes in the study of World War II and the Holocaust, particularly the events that occurred in Poland and Germany during the early 1930s. This person is interested
  in understanding the impact of World War II on European history and the role of the Nazi regime in perpetuating anti-Semitic policies. They are also interested in learning about the role of the Canadian
  and British forces in the war and the role of women in protesting against the Russian empire's collapse.
