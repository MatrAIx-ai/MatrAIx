  hobbies: '[''Sketching fantasy creatures'', ''Watercolor landscape painting'', ''Writing poetry'', ''Reading sci‑fi/fantasy novels'', ''Collecting vintage comics'', ''Playing narrative indie video games'',
    ''Nature photography'', ''Tabletop RPG sessions'']'
  career_goals: Jenifer aims to turn her passion for visual storytelling into a professional career. In the short term, she plans to earn a GED, build a robust portfolio of concept art and graphic narratives,
    and secure freelance commissions from indie game developers or self‑publishing authors. Long‑term, she dreams of attending a respected art school or BFA program, working as a concept artist for video
    games or animated films, and eventually launching her own independent graphic‑novel series that blends surreal imagery with speculative‑fiction themes. Her competitive streak pushes her to enter regional
    art contests and online challenges to gain exposure.
