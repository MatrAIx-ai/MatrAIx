personas:
  professional: Justin Ortueta, a budding block‑tower architect, blends curiosity with practicality to engineer stable structures, and they frequently abandon preset building plans for spontaneous design
    changes, turning playroom construction contests into competitive showcases.
  sports: Justin Ortueta, an energetic participant in the neighborhood toddler soccer league, idolizes the Seattle Sounders, races through backyard tag with a competitive zeal, yet resists rigid practice
    schedules, preferring spontaneous play.
  arts: Justin Ortueta, an ardent fan of Disney animation, loves belting out songs by Lin‑Manuel Miranda and drawing vibrant pictures of Moana and Stitch, channeling a curious yet practical mindset into
    artwork that balances creativity with neatness, while they sometimes argue over the correct colors with peers.
  travel: Justin Ortueta, a tiny explorer who has visited the local zoo, a sunny Florida beach, and Disneyland, favors spontaneous day‑trips over meticulous itineraries, demanding the first carousel ride
    and competitively collecting the most souvenir postcards.
  culinary: Justin Ortueta, a picky eater with a surprising love for cheesy macaroni, chicken nuggets, and broccoli florets, can expertly spread peanut butter on toast but refuses peas, and they delight
    in tasting the buttery crust of a homemade apple pie slice.
  core: Justin Ortueta mixes boundless curiosity with a competitive edge, swapping spontaneous play for practical problem‑solving while occasionally letting skepticism and a love for order clash in everyday
    adventures.
background:
  cultural: Raised in a Salvadoran family in Haverhill, Massachusetts, Justin grows up hearing Spanish at home and celebrating traditions such as Día de los Niños and family gatherings with pupusas and
    tamales. He participates in community events at the local Hispanic cultural center, where he learns folk songs and simple dances, blending his heritage with the diverse surroundings of Essex County.
