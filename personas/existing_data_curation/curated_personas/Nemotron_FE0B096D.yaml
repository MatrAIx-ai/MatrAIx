  career_goals: While still a toddler, Stephanie often talks about wanting to "help people" like the nurses she sees at the clinic or the teachers who read stories to her class. She imagines herself wearing
    a bright uniform, giving hugs, and sharing her crayons with others. Her aspirations are rooted in her strong desire for harmony and compassion, hinting at future interests in caregiving, teaching, or
    community service.
