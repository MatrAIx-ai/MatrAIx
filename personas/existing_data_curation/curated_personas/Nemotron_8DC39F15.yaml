personas:
  professional: Annie Moultrie, a seasoned locksmith and safe‑repair specialist with over four decades of hands‑on experience, blends meticulous, methodical craftsmanship with a curiosity for new smart‑lock
    tech, running a small, tightly organized security consultancy while mentoring apprentices and delivering reliable, trust‑based service to Chicago’s residential and commercial clients.
  sports: Annie Moultrie stays active with a weekly senior walking group through Grant Park, favors low‑impact cardio over competitive sports, roots for the Chicago Bulls in winter and the Cubs in summer,
    and occasionally joins a casual community softball league, balancing energetic social participation with a pragmatic focus on joint health.
  arts: Annie Moultrie expresses her love for the arts by singing in her church choir, regularly attending the Chicago Blues Festival to hear legends like Muddy Waters and B.B. King, and listening to classic
    jazz icons such as John Coltrane and Ella Fitzgerald while collecting vintage lock puzzles that double as decorative conversation pieces.
  travel: Annie Moultrie prefers well‑planned, budget‑conscious trips that blend cultural heritage with relaxation, having taken a road‑trip to New Orleans for its jazz scene and a family vacation to Savannah
    to explore Southern cuisine, and now dreaming of a pilgrimage to the Musée des Arts et Métiers in Paris to study historic lock mechanisms while balancing a modest retirement fund.
  culinary: Annie Moultrie delights in cooking soul‑food classics, expertly simmering gumbo with smoked turkey, okra, and andouille sausage and slow‑cooking collard greens seasoned with ham hocks and hot
    sauce, while also enjoying occasional outings to downtown soul‑food eateries for chicken‑and‑waffles and sweet‑potato pie.
  core: Annie Moultrie blends a life‑long devotion to community craftsmanship with a restless curiosity for new security tech, yet often battles a lingering worry that keeps them double‑checking locks (and
    bills) long after the workday ends.
background:
  cultural: Annie’s cultural identity is rooted in the African‑American experience of the Great Migration. Her parents moved from the rural South to Chicago’s South Side in the 1950s, where she grew up
    surrounded by a strong community of churches, jazz clubs, and civil‑rights activism. The values of resilience, mutual aid, and storytelling were ingrained in her from an early age. She maintains close
    ties to the Black community through church, local festivals like the Chicago Blues Festival, and by supporting Black‑owned businesses. Her culinary traditions reflect Southern soul‑food heritage, and
    she often shares those recipes with friends and family. Annie’s professional ethos emphasizes trust and craftsmanship, echoed in the longstanding Black trades traditions of mentorship and collective
    uplift.
