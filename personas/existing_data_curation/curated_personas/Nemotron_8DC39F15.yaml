  career_goals: Annie aims to transition her business into a full‑service security consultancy before retirement, adding smart‑home integration and cybersecurity basics to her offerings. She wants to mentor
    a new generation of Black apprentices, establishing a formal apprenticeship program in partnership with a local community college. Additionally, she plans to earn an advanced certification in electronic
    access control to stay ahead of industry trends. Financially, she seeks to secure a stable retirement fund for herself and her husband while preserving the business as a legacy for her children. She
    also hopes to be recognized by the Chicago chapter of the IUPAT for her contributions to the trade and community.
