personas:
  professional: Charles Gilligan is a budding junior inventor who spends his afternoons tinkering with Arduino kits, building LEGO Technic contraptions, and experimenting with simple chemistry projects
    in the school science club, blending his natural curiosity with a practical, hands‑on approach that often results in impressively functional prototypes for a ten‑year‑old, and they eagerly share their
    creations at the county‑fair science fair despite occasional disorganization in gathering materials.
  sports: Charles Gilligan follows the Detroit Tigers with enthusiasm, enjoys watching Friday night Little League baseball games at the local park, participates in community soccer drills during the summer,
    prefers solo bike rides along nearby nature trails to stay active, and they occasionally skip daily stretching because they value jumping straight into play over rigid routines.
  arts: Charles Gilligan immerses himself in science‑fiction literature, devouring novels by Jules Verne and the Artemis series, while listening to video game soundtracks from Minecraft and Super Mario,
    often sketching scenes of imagined inventions inspired by the works of Hayao Miyazaki and classic Pixar films like Wall‑E, and they occasionally create stop‑motion clips of their LEGO builds set to
    these melodies.
  travel: Charles Gilligan dreams of exploring the Henry Ford Museum in Detroit to see historic cars, hiking the Sleeping Bear Dunes for a weekend adventure, has already visited Michigan’s Upper Peninsula
    to collect rock specimens for his nature journal, and they hope to one day travel to the Grand Canyon for its awe‑inspiring vistas, all while balancing family budget constraints and school schedule.
  culinary: Charles Gilligan enjoys classic comfort foods such as cheesy macaroni, pepperoni pizza, and apple pie served at Thanksgiving, experiments with making his own trail mix using dried berries, pretzels,
    and a dash of cinnamon, often buzzes his Mom about adding extra cinnamon to his oatmeal, though they occasionally sneak a handful of gummy bears from the pantry when no one is looking.
  core: Charles Gilligan is a curious, solitary ten‑year‑old tinkerer who blends a love for LEGO, nature trails, and sci‑fi stories with a laid‑back, sometimes disorganized routine that fuels their inventive
    spirit.
background:
  cultural: Charles grew up in Livonia, a suburban community in the Detroit metropolitan area of Michigan. His family reflects a typical Midwestern white American background, with values that emphasize
    modesty, self‑reliance, and community involvement. He attends a public elementary school that offers robust STEM programs and participates in local library reading initiatives and county‑fair science
    fairs. Seasonal traditions such as Fourth of July fireworks, Thanksgiving gatherings, and church community events shape his sense of cultural identity. The region’s automotive heritage and nearby natural
    parks influence his curiosity about both technology and the outdoors.
attributes:
  skills: '[''Reading comprehension (science)'', ''Basic Scratch coding'', ''Tinkering and simple electronics'', ''Observational skills'', ''Model building (LEGO, model rockets)'']'
