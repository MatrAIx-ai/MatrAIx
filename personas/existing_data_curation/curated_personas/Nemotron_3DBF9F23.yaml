    inventions'']'
  career_goals: Charles dreams of becoming an aerospace engineer or a wildlife biologist, envisioning a future where he can design sustainable technologies while preserving natural habitats. He is also
    intrigued by video‑game development, hoping to create immersive educational games that combine his love of storytelling with his practical problem‑solving skills. He sees himself working in a field
    that lets him balance solitary research with occasional teamwork, preferring flexible, project‑based roles.
