  hobbies: '["building block towers", "drawing with crayons", "listening to nursery rhymes", "story time at the library", "sandbox play", "pretend cooking", "singing familiar songs"]'
  career_goals: Although only three years old, Jasmine imagines helping others in the future. She often talks about wanting to be a teacher who guides younger children, a caregiver who looks after family
    members, and occasionally a veterinarian because she enjoys caring for the family’s pet rabbit. Her love for predictable activities makes her dream of roles that involve routine, organization, and caring
    for others, such as a ‘big helper’ at home or a future educator who sets clear schedules for her students.
