personas:
  professional: Jasmine Hernandez, a preschool explorer who delights in arranging blocks into neat rows, showcases early organizational skill and a practical, detail‑oriented mindset that makes building
    towering structures in a predictable pattern a favorite activity they love.
  sports: Jasmine Hernandez loves the splash pool at the community center and dabbles in the Little Sprinters Soccer Club, often mimicking the River City Tigers’ mascot during family game nights while they
    insist on orderly lining up of their swim toys.
  arts: Jasmine Hernandez spends afternoons humming Raffi’s ‘Baby Belugă’ while coloring pictures of The Wiggles, and they adore watching Sesame Street’s Elmo, which shapes their playful imagination and
    fuels their budding love for music and storytelling.
  travel: Jasmine Hernandez enjoys family trips to the nearby city zoo and sunny beach outings in Santa Monica, and they dream of someday visiting Disneyland Paris, though long car rides still make them
    cling to their favorite stuffed bunny for comfort.
  culinary: Jasmine Hernandez favors creamy macaroni and cheese, crispy chicken nuggets, and buttery apple slices, often demanding the extra sprinkle of cheddar on their pasta, while they proudly spread
    peanut butter on toast with their tiny, clumsy hands.
  core: Jasmine Hernandez is a meticulously organized toddler who transforms everyday play into structured adventures, yet habitually frets over missing puzzle pieces and clings to routines like a security
    blanket.
background:
  cultural: Jasmine is raised in an African‑American family in Cincinnati’s West End neighborhood. Her family celebrates cultural traditions such as Juneteenth and honors African‑American heritage through
    storytelling, gospel music, and regular attendance at a local Baptist church. She frequently enjoys meals featuring soul‑food recipes like collard greens, cornbread, and sweet potato pie, and participates
    in community events at the Cincinnati Kids Club and the National Underground Railroad Freedom Center. These experiences foster a strong sense of identity, community pride, and an appreciation for resilience
    and collective support.
attributes:
