personas:
  professional: Yamilka Arredondo, a 26‑year‑old self‑taught digital illustrator who blends vivid island folklore with modern design, runs a modest home studio, sells prints on Etsy, and leverages bilingual
    storytelling to market handcrafted jewelry while they juggle a relaxed, sometimes chaotic workflow.
  sports: Yamilka Arredondo enjoys solitary jogs along the Toa Baja coastal trail three times a week, plays casual beach volleyball at a nearby club in the summer, and faithfully follows the Cangrejeros
    de Santurce baseball team while they prefer low‑impact fitness activities that fit their relaxed schedule.
  arts: Yamilka Arredondo immerses themselves in the local art scene by visiting galleries like Galería 13, draws inspiration from contemporary painter Ana Rivera, listens to a blend of traditional bomba
    rhythms and indie folk artists such as Bon Iver while they sketch, and channels these influences into their digital illustrations and handcrafted jewelry.
  travel: Yamilka Arredondo favors spontaneous, low‑cost getaways, often weekend‑hopping to nearby beaches like Culebra and Vieques, dreams of exploring the historic streets of Barcelona and the volcanic
    landscapes of Iceland, and they rely on flexible Airbnb stays and travel blogs rather than rigid itineraries.
  culinary: Yamilka Arredondo excels at preparing traditional dishes like arroz con gandules, tostones, and tembleque, loves cooking with sofrito, plantains, and fresh cilantro, experiments with fusion
    twists in their kitchen, and they treat each meal as a nostalgic homage to family gatherings.
  core: Yamilka Arredondo, a creatively restless 26‑year‑old, balances solitary artistic pursuits with a habit of impulsively buying supplies, prefers flexible routines, and they turn everyday textures
    into vibrant digital narratives.
background:
  cultural: Yamilka grew up in the municipalities of Toa Baja and Trujillo Alto, absorbing the island's rich blend of Spanish, African, and Taino influences. Bilingual in Spanish and English, she participates
    in community festivals, attends bomba and plena performances, and values the warmth of Puerto Rican hospitality. Her family traditions include preparing arroz con gandules, sharing stories of island
    folklore, and celebrating local patron saint feasts. This multicultural heritage informs her artistic sensibility, leading her to incorporate island motifs, vibrant colors, and narrative depth into
    her creative work while remaining open to global artistic currents.
