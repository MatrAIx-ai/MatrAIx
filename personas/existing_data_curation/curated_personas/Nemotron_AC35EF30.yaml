  career_goals: Yamilka aspires to build a flexible, home‑based creative studio where she can produce and sell digital artwork and handcrafted accessories that celebrate Puerto Rican culture. She plans
    to launch an online storefront on platforms like Etsy and cultivate a social media presence to reach a wider audience. Over the next few years, she hopes to start a blog or podcast that explores unconventional
    art, philosophy, and island folklore, eventually pursuing a formal art certificate to deepen her technical skills while maintaining the freedom to work on her own schedule.
