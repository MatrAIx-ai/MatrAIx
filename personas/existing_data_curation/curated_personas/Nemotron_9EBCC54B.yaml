  career_goals: Charity aims to earn an associate’s degree in business administration within the next two years and later pursue a bachelor’s degree in management. She aspires to ascend from first-line
    supervisor to office manager and eventually to operations manager for a regional office. Additionally, she wants to design and lead a workplace wellness program that addresses anxiety and stress among
    staff, positioning herself as a champion of mental-health initiatives in her organization and the wider Overland Park community.
