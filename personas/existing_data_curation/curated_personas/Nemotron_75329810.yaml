  career_goals: Najat aims to progress from her current receptionist role to an office manager or director of visitor services position within a cultural institution such as a museum, gallery, or community
    arts center, where she can blend her organizational strengths with her passion for art and novelty. She plans to obtain a professional certification in administrative management and pursue part‑time
    coursework in arts administration to enhance her qualifications. Long‑term, she envisions leading a team that curates engaging public experiences, overseeing event programming, and implementing innovative
    service models that reflect high standards of excellence while fostering a welcoming, inclusive environment.
