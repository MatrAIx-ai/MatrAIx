personas:
  professional: Dennys Espinosa, a 28‑year‑old automotive technician, blends meticulous diagnostics with a curiosity for emerging hybrid and electric technologies, leveraging their ASE‑master aspirations
    and methodical workshop management to build client trust while laying the groundwork for a future community‑focused garage in San Juan.
  sports: Dennys Espinosa hits the court for the East San Juan community basketball league each Thursday, rooting passionately for the Los Angeles Lakers while also joining weekend salsa dance circles that
    keep their cardio sharp.
  arts: Dennys Espinosa balances their mechanical world with a love for salsa rhythms, regularly dancing to Marc Anthony and Celia Cruz at community festivals, while unwinding by watching classic car‑centric
    documentaries and sketching restoration plans as a form of artistic expression.
  travel: Adventurous Dennys Espinosa prefers weekend road trips along scenic mountain passes and rainforest hikes, having explored the misty trails of El Yunque and a recent tech‑focused visit to Detroit’s
    automotive museums, while dreaming of an immersive study of electric‑vehicle innovation in Japan.
  culinary: Dennys Espinosa is a moderately skilled home cook who revels in crafting island staples such as mofongo with garlic‑shrimp, arroz con gandules, and lechón asado, often seasoning with adobo,
    sofrito, and fresh cilantro, while also experimenting with grilled fish marinated in lime and oregano.
  core: Boldly practical yet endlessly curious, Dennys Espinosa merges a garage‑side love for classic car restorations with salsa‑floor flair, methodically plans every project while occasionally splurging
    on rare tools and postponing doctor visits for the thrill of a weekend ride.
background:
  cultural: Dennys grew up in the vibrant multicultural environment of San Juan, absorbing the island's blend of Spanish, African, and Taíno heritage. Bilingual in Spanish and English, he values the strong
    family ties, community solidarity, and the island's resilient spirit. His Puerto Rican identity is reflected in his love for local music, food, and traditions such as fiestas and salsa dancing. The
    pragmatic work ethic of the "jibaro" and the pride in local craftsmanship shape his approach to both his profession and personal life.
attributes:
  skills: '["Engine diagnostics", "Transmission repair", "Electrical system troubleshooting", "Preventive maintenance planning", "Parts inventory management", "Customer communication", "OBD-II scanner operation",
