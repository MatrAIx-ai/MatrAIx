  hobbies: '["Classic car customization", "Motorcycle restoration", "Attending car shows", "Playing basketball", "Salsa dancing", "Cooking Puerto Rican dishes", "Hiking in El Yunque", "Volunteering at youth
    mechanics workshops", "Listening to reggaeton music"]'
  career_goals: Dennys aims to earn his ASE Master Technician certification and become a specialist in hybrid and electric vehicle systems, capitalizing on the growing market in Puerto Rico. In the next
    five years, he plans to open his own auto repair shop in San Juan that emphasizes high-quality service, community outreach, and mentorship for aspiring technicians. He also intends to pursue a bachelor's
    degree in automotive engineering to deepen his technical expertise and eventually transition into a teaching role at a local technical institute.
