  career_goals: Bruno aims to pursue a future in STEM, specifically wanting to become a robotics engineer or software developer who designs functional robots to solve everyday challenges. He is driven to
    join advanced robotics clubs, take high‑school engineering courses, and seek mentorship from professionals in the field. At the same time, his love for soccer and competitive sports keeps the door open
    for a possible career as a professional athlete, blending teamwork with personal ambition. He envisions a path that balances technical innovation with the discipline and teamwork learned on the field.
