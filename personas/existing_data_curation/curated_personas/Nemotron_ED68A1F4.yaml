personas:
  professional: Bruno Nunez, an aspiring young robotics engineer, channels their methodical curiosity and competitive edge into designing, building, and programming school robots, treating each competition
    like a deadline-driven project.
  sports: Bruno Nunez plays forward on the local youth soccer league, idolizes the flair of Lionel Messi and follows the games of the Los Angeles Galaxy, and channels their competitive spirit into Saturday
    matches while also cheering for the NBA’s Lakers during school holidays.
  arts: Bruno Nunez dives into graphic novels by Stan Lee, Neil Gaiman, and Japanese manga like My Hero Academia, while crafting Day of the Dead altars and customizing LEGO sculptures, using these artistic
    outlets to balance the analytical mind of a budding engineer.
  travel: Bruno Nunez enjoys family road trips to national parks such as the Grand Canyon and amusement hubs like Orlando’s Disney World, plans future visits to a space museum in Houston and a historic
    castle in Scotland, but balances wanderlust with the constraints of school schedules and a limited travel budget.
  culinary: Bruno Nunez helps prep family favorites—soft corn tacos with seasoned meat, zesty guacamole with lime and cilantro, and sweet corn tamales wrapped in husks—while mastering the art of perfectly
    grilling quesadillas and discovering a knack for sprinkling fresh jalapeño slices on everything.
  core: Bruno Nunez blends a competitive, methodical mind with a love for teamwork, turning every soccer game, LEGO build, and robot code into a strategic quest, even if that means hoarding extra snack
    crumbs for the next level.
background:
  cultural: Bruno grows up in a Mexican‑American household in El Paso, Texas, a city that blends U.S. and Mexican cultures. His family speaks both Spanish and English at home, preserving Mexican traditions
    while navigating daily life in the United States. He celebrates Mexican holidays such as Día de los Muertos and Mexican Independence Day, often helping to set up altars and prepare festive foods. Family
    gatherings revolve around shared meals, music, and storytelling that reinforce his cultural identity. The border environment exposes him to a diverse community, fostering bilingual communication, a
    respect for both cultures, and an appreciation for the resilience and close‑knit nature of his community.
