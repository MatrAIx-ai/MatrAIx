persona_description: A person who is interested in the topic of dry eye and its symptoms, causes, diagnosis, treatment, and prevention. They are likely to be knowledgeable about the symptoms of dry eye,
  such as stinging, burning, stringy mucus, and excessive tearing, and their underlying causes, such as age-related tear production decrease, medications, and certain conditions. They are also likely to
  be interested in the various treatment options available, such as artificial tears, ointments, gels, punctal plugs, and conserving the eyes' own tears. They may also be interested in the prevention of
  dry eye, such as using wrap around glasses and avoiding warm rooms, smoking, and certain foods.
