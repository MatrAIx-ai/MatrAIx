personas:
  professional: Mariegrace Coley, a seasoned retail supervisor with over twenty‑five years of front‑line experience, applies their practical, structured mindset to lead teams, control inventory, optimize
    budgeting, and craft visual merchandising displays, consistently surpassing sales targets while mentoring staff toward their goal of store and district management.
  sports: Mariegrace Coley, an avid supporter of the Oak Ridge Panthers high‑school football team and the Meadowbrook Bison minor‑league baseball club, stays physically active by walking their dog with
    the senior walking group three times a week and attending a gentle yoga class for seniors at the community center, and they enjoy cheering for both teams on game days.
  arts: Mariegrace Coley channels their creative spirit through quilting inspired by Faith Ringgold’s bold patterns, escapes into historical romance novels by Nora Roberts, and they find solace listening
    to Dolly Parton’s folk‑country storytelling and Yiruma’s tranquil piano compositions, all of which nurture their appreciation for narrative and handmade art.
  travel: Mariegrace Coley prefers road‑trip adventures that balance scenic drives with cultural immersion, such as a weekend pilgrimage to Savannah’s historic district, an autumn leaf‑watching retreat
    in the Blue Ridge Mountains, and an annual visit to the state’s heritage festival in downtown Charleston, where they enjoy local crafts and traditional music.
  culinary: Mariegrace Coley crafts comforting meals like chicken pot pie, creamy mashed potatoes, and peach cobbler, often enhancing soups and stews with fresh vegetables from their garden, while their
    intermediate cooking talent shines during family gatherings where they serve homemade biscuits paired with fresh berry jam.
  core: Mariegrace Coley, a structured retail leader and devoted community volunteer, balances meticulous budgeting, health monitoring, and a love for gardening, quilting, and cozy family meals, while they
    occasionally give in to impulse purchases of premium craft supplies.
background:
  cultural: Raised in rural Ohio in a white, working‑class family of German‑Irish descent, Mariegrace grew up in a close‑knit Midwestern community where self‑reliance, modesty, and a strong sense of duty
    were emphasized. Her family attended a Protestant (United Methodist) church, instilling values of service and humility. The regional culture of Dayton and Greene County, with its emphasis on small‑town
    camaraderie, local fairs, and support for community institutions, shaped her worldview. She maintains traditional Midwestern customs such as seasonal gardening, holiday gatherings centered on family,
    and active participation in church and volunteer activities.
attributes:
  skills: '[''Team leadership'', ''Inventory management'', ''Staff scheduling'', ''Customer service'', ''POS system operation'', ''Sales performance analysis'', ''Visual merchandising'', ''Conflict resolution'',
