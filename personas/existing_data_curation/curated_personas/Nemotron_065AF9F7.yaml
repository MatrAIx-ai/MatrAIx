  hobbies: '[''Gardening'', ''Quilting and knitting'', ''Reading historical romance novels'', ''Walking her dog'', ''Church women’s group'', ''Volunteering at community food bank'', ''Cooking comfort foods'',
    ''Attending county fairs'']'
  career_goals: Mariegrace aims to progress from her current supervisory role to a store manager position within the next three to five years, and eventually to a district manager role. She plans to obtain
    her GED and pursue a retail management certification to formalize her expertise. Her ambitions include mentoring younger employees, boosting store sales and customer satisfaction metrics, implementing
    streamlined processes, and eventually transitioning into a corporate training role, all while maintaining a balanced work‑life schedule for her family.
