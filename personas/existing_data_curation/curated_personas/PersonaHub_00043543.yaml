persona_description: A neurosurgeon with expertise in the treatment of astrocytomas, a type of cerebral tumor. They are experienced in performing microsurgical procedures to completely remove the tumors,
  even in cases where the tumors are located near critical areas of the brain. They are also skilled in the use of advanced surgical techniques, such as navigation, MRI tractography, and intraoperative
  imaging, to ensure the safety and efficacy of the operation. They have a deep understanding of the role of functional MRI (fMRI) and intraoperative complex neuromonitoring in providing high standards
  of safety during surgery. They are aware of the importance of the extent of the surgical oncotomy and pathology report in the prognosis of the patient, and they are prepared to perform a biopsy if the
  tumor is inoperable.
