  career_goals: William aspires to work in a field that blends his love of building with a desire to help his community. He dreams of becoming a civil or robotics engineer who designs safe bridges, bike
    lanes, or innovative robots. In the short term, he hopes to join his school's STEM club, participate in robotics competitions, and explore hands‑on engineering projects. Over the longer term, he envisions
    attending a STEM‑focused high school, earning an engineering degree, and contributing to environmental or infrastructure projects that improve the quality of life in Bridgewater. He also enjoys the
    idea of sharing knowledge, so he keeps open the possibility of becoming a teacher who inspires other young learners.
