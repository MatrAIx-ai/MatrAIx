personas:
  professional: Sabrina John, a 27-year-old facilities specialist who expertly blends industrial cleaning expertise with an eye for aesthetic presentation, leverages bilingual communication to streamline
    operations, and they dream of leading a green-cleaning team that integrates art installations in public spaces, while their relaxed approach to obligations fuels a flexible, creative problem-solving
    style.
  sports: Sabrina John enjoys early-morning yoga at Bridgeport's Riverfront Studio, follows the Bridgeport Islanders in hockey, supports the New York Yankees in baseball, and they join a casual weekend
    soccer league with Bridgeport FC, preferring low-impact exercise that fits their flexible schedule.
  arts: Sabrina John frequently wanders Bridgeport's mural trails, draws inspiration from street artists like Shepard Fairey and muralist Jorge Gutierrez, paints watercolor scenes reminiscent of Yayoi Kusama's
    patterns, and they curate playlists featuring Los Azules (cumbia), Bon Iver (indie folk), and Kamasi Washington (jazz) while attending local gallery openings featuring works by Kara Walker.
  travel: Sabrina John favors spontaneous, budget-friendly trips that blend cultural immersion with creative renewal, having explored Oaxaca's spice markets and the colorful murals of Mexico City, they
    now dream of a weekend retreat to Santa Fe's art colonies and a future research trip to the street-art district of Berlin.
  culinary: Sabrina John's kitchen revolves around mastering family-style pozole with hominy, ancho chilies, and fresh cilantro from their balcony garden, perfecting tamales wrapped in corn husks, and experimenting
    with herb-infused olive oil to drizzle over quesadillas, while they proudly roll sushi with avocado and cucumber for friends.
  core: Sabrina John is an eco-conscious custodian-turned-creative, who balances meticulous green-cleaning routines with spontaneous watercolor bursts and a relaxed, harmony-seeking outlook, and they approach
    life with a steady, upbeat rhythm.
background:
  cultural: Sabrina is a first-generation Mexican-American. Her parents immigrated from Michoacán, and she grew up in a bilingual household where Spanish traditions and American customs blended. She celebrates
    Dia de los Muertos and other Mexican holidays with family gatherings, traditional foods, and vibrant altars, while also embracing the multicultural fabric of Bridgeport. Her Mexican heritage influences
    her taste for bold flavors, folk art, and community solidarity, and she often incorporates elements of Mexican craft techniques into her DIY projects. At the same time, she values the opportunities
    and diversity of her Connecticut community, which she sees as an extension of her cultural identity.
attributes:
  skills: '[''Industrial floor care (scrubbing, strip & wax)'', ''Eco-friendly cleaning techniques'', ''Chemical safety and hazardous material handling'', ''Basic maintenance (light plumbing, HVAC filter
    replacement)'', ''Inventory management and supply ordering'', ''Customer service and clear communication'', ''Bilingual Spanish-English proficiency'', ''Aesthetic sense for spatial arrangement'', ''Problem
    solving under pressure'', ''Team collaboration and mentorship'']'
  hobbies: '[''Visiting local art galleries and mural tours'', ''Watercolor painting and folk-art crafts'', ''Balcony gardening (herbs and succulents)'', ''Listening to diverse music genres'', ''Cooking
    Mexican dishes and attending cooking classes'', ''Participating in community dance and cultural festivals'', ''Reading books on art, design, and unconventional ideas'', ''Journaling personal reflections
    and creative ideas'']'
  career_goals: Sabrina aims to move from front-line cleaning to a supervisory or facilities-management role. She plans to obtain the Certified Professional Cleaner (CPC) credential and enroll in a community-college
    program in facilities management or environmental health. Within five years, she hopes to become a lead custodian overseeing a team, integrating green-cleaning protocols, and coordinating art-focused
    installations in public spaces. She also dreams of launching a small side business offering eco-friendly residential cleaning services, where she can blend her love for sustainability with creative
    design ideas. Long-term, she sees herself as a mentor for other young workers, especially those from immigrant backgrounds, helping them navigate career pathways in the service industry.
