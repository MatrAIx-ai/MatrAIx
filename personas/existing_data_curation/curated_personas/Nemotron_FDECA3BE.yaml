  career_goals: Although retired, Elizabeth’s ambitions focus on staying active, healthy, and contributing to her community. She aims to complete the associate degree she began decades ago, documenting
    her studies in local history. She plans to write a memoir that blends personal stories with her family’s genealogy, preserving her legacy for future generations. Elizabeth also hopes to continue leading
    the senior‑center’s annual fundraising events, mentor younger volunteers, and maintain her independence by managing her own home and garden.
