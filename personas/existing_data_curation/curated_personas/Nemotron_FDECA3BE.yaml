  hobbies: '[''Gardening'', ''Knitting'', ''Quilting'', ''Crossword Puzzles'', ''Historical Fiction Reading'', ''Genealogy Research'', ''Church Participation'', ''Community Theater Volunteering'', ''Birdwatching'',
