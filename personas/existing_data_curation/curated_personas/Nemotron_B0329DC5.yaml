personas:
  professional: Keisha Givens, a 37‑year‑old assembler and fabricator at a Dayton manufacturing plant, blends precision assembly expertise with a relentless curiosity that drives them to experiment with
    novel fastening methods, mentor colleagues on lean‑manufacturing practices, and champion ergonomic, art‑inspired workstations as they pursue a Certified Production Technician credential and a future
    supervisory role.
  sports: Keisha Givens, an avid cyclist, spends weekend mornings pedaling the Great Miami River Trail, participates in a local adult softball league during summer, and roots for the Dayton Dragons minor‑league
    baseball team, using sport as both a physical release and a community‑building outlet.
  arts: Keisha Givens channels their love of metal sculpture into personal projects inspired by the kinetic works of Anthony Caro and the bold lines of local Dayton artist Mary Beth Morgan, captures urban
    street scenes in black‑and‑white photographs reminiscent of Vivian Maier, and finds literary solace in speculative fiction by N.K. Jemisin and African‑American classics such as Toni Morrison, while
    regular visits to the Dayton Art Institute fuel a constant stream of creative ideas.
  travel: Keisha Givens enjoys planned road trips that blend cultural immersion and artistic discovery, having explored New Orleans for its vibrant music scene, visited Washington D.C.’s National Museum
    of African American History and Culture, and taken weekend getaways to Cincinnati’s Over-the-Rhine district, while dreaming of a future pilgrimage to Accra, Ghana, to study West African metal‑working
    traditions.
  culinary: Keisha Givens, a competent home cook, favors Southern‑influenced comfort foods such as collard greens with smoked turkey, cornbread, and jambalaya, experiments with spice‑forward dishes like
    chiles rellenos using fresh poblano peppers, and often incorporates reclaimed‑wood cutting boards and hand‑crafted metal serving trays into their dining experience, while still enjoying occasional fine‑dining
    outings at Dayton’s award‑winning restaurants.
  core: Keisha Givens is a 37‑year‑old fabricator whose competitive drive, artistic curiosity, and disciplined habit of balancing precision work with creative pursuits shape a life that blends metal‑making,
    community culture, and forward‑thinking ambition.
background:
  cultural: Keisha identifies as African-American and grew up in Dayton’s historic Hilltop neighborhood, where church, family gatherings, and community festivals played a central role in her upbringing.
    Her parents emphasized the importance of hard work, education, and preserving cultural traditions such as gospel music, storytelling, and soul-food cooking. She remains connected to her heritage through
    regular participation in the Dayton Black History Month events, volunteering at the local African-American museum, and supporting youth programs that teach STEAM skills to Black students. Keisha’s cultural
    perspective fuels her pride in the resilience of her community and informs her desire to create functional art that reflects both her technical training and the rich artistic legacy of African-American
    craftsmanship.
