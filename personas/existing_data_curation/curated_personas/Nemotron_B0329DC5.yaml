  hobbies: '[''Visiting art galleries and museums'', ''Metal sculpture and DIY home-decor projects'', ''Photography (urban and community events)'', ''Reading speculative fiction and African-American literature'',
    ''Cycling on local trails'', ''Cooking and exploring soul-food recipes'', ''Participating in local Black cultural gatherings'', ''Sketching and journaling'']'
  career_goals: Keisha aims to advance from the shop floor to a supervisory role within the next three years, seeking certification as a Certified Production Technician (CPT) and eventually becoming a production
    manager overseeing a multi-shift assembly line. She is eager to lead process-improvement projects that integrate her artistic curiosity, such as introducing ergonomic work‑stations and exploring new
    composite materials for lighter components. Long‑term, she dreams of opening a small custom-fabrication studio that blends functional metalwork with decorative art, allowing her to mentor apprentices
    and showcase her community’s cultural heritage through handcrafted pieces.
