personas:
  professional: Phuoc Nguyen is a meticulous records manager in the public sector who leverages advanced Excel, SharePoint, and VBA automation to streamline data workflows, while their sociable, cooperative
    nature makes them a natural mentor and bilingual liaison for community members navigating bureaucratic processes.
  sports: Phuoc Nguyen is a forward on a Portland Metro Soccer League team who follows the Portland Timbers and Seattle Seahawks fervently, spends weekends hiking the Columbia River Gorge and mountain biking
    Forest Park trails, and incorporates seasonal cross‑country skiing at Mount Hood into a balanced fitness routine that blends competitive team play with solo outdoor challenges.
  arts: Phuoc Nguyen captures the misty Oregon landscape through nature photography inspired by Ansel Adams, enjoys board‑game evenings featuring Catan and Ticket to Ride, attends trivia nights at local
    cafés, and relaxes listening to folk‑rock artists like The Decemberists and indie singer Sufjan Stevens, while also honoring cultural festivities with traditional music performances at Tet celebrations.
  travel: Phuoc Nguyen blends structured itineraries with spontaneous side trips, often exploring the Pacific Northwest’s Columbia River Gorge and Mount Rainier, while also ticking off international bucket‑list
    spots like Hokkaido’s flower fields and the historic lantern‑lit streets of Hoi An, all while juggling a modest budget and occasional family obligations.
  culinary: Phuoc Nguyen is a passionate home cook who expertly prepares aromatic pho broth with star anise, ginger, and fish sauce, hand‑rolls fresh gỏi cuốn using rice paper, herbs, and shrimp, and crafts
    bánh chả with pork and rice flour, often sharing these dishes at community potlucks while occasionally treating themselves to upscale sushi nights.
  core: Phuoc Nguyen fuses a data‑driven meticulousness with an adventurous outdoors spirit, balancing spreadsheets and home‑automation tinkering by day with soccer, pho‑making, and spontaneous hikes by
    weekend, all while habitually forgetting to water houseplants until the last minute.
background:
  cultural: Phuoc is a second‑generation Vietnamese‑American whose parents immigrated to the United States in the early 1990s. Raised in a bilingual household in the Portland area, he grew up speaking both
    Vietnamese and English, celebrating Vietnamese holidays such as Tet and the Mid‑Autumn Festival alongside mainstream American holidays. His family maintains strong ties to the vibrant Vietnamese community
    in Portland’s Jade District, frequently attending community events, supporting local Vietnamese businesses, and participating in cultural organizations. The cultural values of collectivism, respect
    for elders, and hospitality have shaped his considerate and cooperative demeanor. Phuoc often acts as a cultural bridge, assisting Vietnamese‑speaking residents with navigating county services and translating
    information when needed. His heritage influences his love for sharing food, his commitment to community service, and his emphasis on harmony in personal and professional relationships.
attributes:
  skills: '[''Records Management'', ''Data Entry'', ''Database Management (MS Access, SQL)'', ''Microsoft Office Suite (Excel, Word, Outlook)'', ''SharePoint Administration'', ''Privacy Compliance (HIPAA,
    Oregon public records law)'', ''Process Improvement and Automation (VBA, Power Automate)'', ''Customer Service'', ''Staff Training and Mentorship'', ''Bilingual Communication (Vietnamese/English)'',
    ''Basic Python Scripting'']'
  hobbies: '[''Hiking and Mountain Biking'', ''Adult Soccer League'', ''Traditional Vietnamese Cooking'', ''Cultural Festival Participation'', ''Trivia Nights and Board Games'', ''Nature Photography'',
    ''Volunteer Work with Refugee Resettlement'', ''Home Automation and Tech Exploration'']'
  career_goals: Phuoc aims to advance to a senior records manager or information governance specialist within the public sector, securing certifications such as the Certified Records Manager (CRM) or the
    Institute of Certified Records Managers (ICRM) designation. He plans to pursue a master's degree in Information Science to deepen his expertise in digital archiving and data analytics. His long‑term
    ambition is to lead a department‑wide digital transformation initiative that migrates legacy paper records to a secure, searchable electronic system, improving accessibility for both staff and the community.
    He also seeks to become a liaison between IT and public service teams, fostering cross‑functional collaboration. Outside the workplace, Phuoc wishes to mentor emerging professionals from underrepresented
    backgrounds and develop community‑focused data projects that help local immigrant families navigate public resources more efficiently.
