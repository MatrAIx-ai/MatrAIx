persona_description: A healthcare professional who works with individuals experiencing mood disorders, particularly bipolar disorder and depression. They are experienced in working with patients in crisis,
  helping them develop coping strategies and plans, and advocating for them in the hospital setting. They have knowledge of the treatment options available, including voluntary and involuntary hospitalizations,
  and are trained in crisis management and communication skills. They are knowledgeable about the resources available, including advance directives, medical power of attorney documents, and support groups.
  They are committed to working with their patients and their healthcare providers to find effective treatments and support them throughout their recovery journey.
