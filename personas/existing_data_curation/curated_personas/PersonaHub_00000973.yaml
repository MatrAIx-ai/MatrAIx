persona_description: A researcher in the field of cognitive neuroscience, specifically focusing on the study of adaptive behavior and the brain mechanisms involved in decision-making. They are interested
  in understanding the neural mechanisms that underlie flexible behavior, and how these mechanisms change in the context of drug addiction. They are particularly interested in the effects of drugs of abuse
  on flexible behavior, and how changes in brain circuitry contribute to compulsive and "automatized" behavior. They are likely to be involved in research using a variety of biobehavioral techniques, including
  administration models, automated and manual behavioral techniques, and combining these with research in the neuromodulation of candidate areas like the prefrontal cortex, amygdala, striatum, and thalamus.
  They are likely to be interested in the effects of drugs of abuse on flexible behavior and the neural mechanisms that underlie these changes.
