personas:
  professional: Cynthia Wiley, a 19‑year‑old community youth educator, designs structured financial‑literacy lesson plans, utilizes data analysis and project‑management tools to track outcomes, and blends
    their methodical organization with their sociable, assertive teaching style, positioning them for a future as a Business Education department head.
  sports: Cynthia Wiley devotes their weekends to beach volleyball with the Sunshine Beach Volleyball Club and joins community dance classes for cardio, follows the Miami Dolphins in football and the Orlando
    Magic in basketball, and structures their fitness routine with a mix of scheduled pool laps and daily morning jogs along Florida’s coastal trail.
  arts: Cynthia Wiley captures coastal sunrise scenes with their DSLR, curates a playlist that swings from Taylor Swift to local folk guitarist Jess Cameron, frequents the weekly Wynwood Art Walk, and draws
    inspiration from the vibrant murals of Florida’s beach towns, letting music and visual art infuse their lesson plans.
  travel: Cynthia Wiley prefers day trips and budget‑friendly getaways, often planning weekend hikes in the Everglades or road trips to Savannah, while dreaming of backpacking through the Pacific Northwest’s
    national parks and a future cultural immersion trip to Mexico’s Yucatán Peninsula.
  culinary: Cynthia Wiley, an experimentally health‑focused home cook, frequently prepares quinoa‑black bean bowls with avocado, grilled tilapia seasoned with lemon‑thyme, and pineapple‑coconut smoothies,
    loves trying new plant‑based recipes, and enjoys hosting potlucks where friends sample their freshly baked banana‑oat muffins.
  core: Cynthia Wiley blends meticulous organization with an unstoppable love for beach volleyball, turning every lesson plan into a well‑orchestrated community project while secretly hoarding a stash of
    rainbow‑colored pens for spontaneous doodling.
background:
  cultural: Cynthia was raised in a middle-class, white American family in Stuart, Florida, where the coastal lifestyle and a blend of Southern hospitality and diverse community influences shaped her worldview.
    Growing up near the Atlantic coast fostered an appreciation for outdoor activities and environmental stewardship. Her upbringing emphasized education, community service, and practicality, values that
    align with her structured and collaborative personality while also embracing the multicultural dynamics present in Martin County.
