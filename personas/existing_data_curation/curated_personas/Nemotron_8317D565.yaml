  career_goals: Cynthia aims to become a lead teacher and eventually a department head for Business Education within her school district. She plans to pursue a master's degree in Educational Leadership
    to qualify for administrative roles such as Assistant Principal or Curriculum Coordinator. She is passionate about developing a district-wide youth entrepreneurship program that combines real-world
    business projects with classroom instruction, and she hopes to mentor fellow teachers in integrating experiential learning into their curricula.
