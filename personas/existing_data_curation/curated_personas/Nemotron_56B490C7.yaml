  career_goals: Kevin imagines a future where he can combine his love for structure, helping others, and hands‑on creation. He is particularly interested in becoming a civil engineer, designing safe bridges
    and community spaces that people can rely on. He also dreams of one day working as a teacher or mentor, using his communication skills to support younger students. The idea of a career that balances
    practical problem‑solving with a sense of service—such as a firefighter or community planner—appeals to his desire for stability and contribution.
