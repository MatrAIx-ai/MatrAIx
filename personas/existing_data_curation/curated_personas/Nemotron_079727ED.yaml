personas:
  professional: An aspiring logistics coordinator, Frank Hanna channels their meticulous inventory management expertise and vivid visual imagination into redesigning warehouse workflows while they assertively
    advocate for Lean Six Sigma improvements.
  sports: A dedicated cyclist and occasional rock climber, Frank Hanna rides with the Jackson Bike Collective on weekends, follows the Mississippi Braves baseball team, and they hit the indoor climbing
    walls at Bouldering 101 to maintain a balanced fitness routine.
  arts: A passionate visual storyteller, Frank Hanna devotes evenings to sketching urban scenes inspired by the works of Syd Mead and Zdzisław Beksiński, while they draw creative inspiration from sci‑fi
    authors like N.K. Jemisin and listen to the ambient tones of Brian Eno during Dungeons & Dragons sessions.
  travel: An organized explorer, Frank Hanna meticulously plans trips using spreadsheets, has trekked the historic streets of Prague and the neon districts of Tokyo, and they dream of a road‑trip along
    Route 66 to capture America’s varied landscapes, all while balancing a modest travel budget.
  culinary: A moderately skilled home cook, Frank Hanna enjoys whipping up spicy ramen bowls with miso broth, crafting avocado toast topped with smoked salmon, and experimenting with artisanal cheese plates
    featuring brie and aged cheddar, often while they sketch new product concepts.
  core: Frank Hanna is a detail‑obsessed dreamer who balances relentless organization with bursts of artistic flair, often juggling spreadsheets, sketchpads, and they wrestle with lingering anxiety about
    the future.
background:
  cultural: Frank grew up in Jackson, Michigan, a mid‑size Midwestern city with a mix of manufacturing heritage and a modest arts scene. His family roots are in the region’s blue‑collar workforce, and values
    such as hard work, community responsibility, and modesty were emphasized at home. The local culture—characterized by friendly neighborliness, a strong sense of civic pride, and support for local events
    like the Jackson Art Walk—has shaped Frank’s cooperative yet self‑reliant outlook. Exposure to the city’s modest galleries and community theater sparked his appreciation for visual creativity, while
    the economic shifts in the area reinforced his pragmatic approach to career advancement. He identifies with the broader white Midwestern American identity, valuing reliability, modest ambition, and
    an openness to new ideas that he balances with his small‑town upbringing.
attributes:
  skills: '[''Inventory Management'', ''Warehouse Operations'', ''Data Entry'', ''Time Management'', ''Attention to Detail'', ''Physical Stamina'', ''Problem Solving'', ''Creative Spatial Planning'', ''Basic
