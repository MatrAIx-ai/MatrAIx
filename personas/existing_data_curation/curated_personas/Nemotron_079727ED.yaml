  hobbies: '[''Sketching'', ''Reading science fiction and fantasy'', ''Playing Dungeons & Dragons'', ''Scale model building'', ''Cycling'', ''Photography'', ''Journaling'', ''Guided meditation'', ''Indoor
    rock climbing'']'
  career_goals: Frank aims to move beyond his entry‑level stocking role into a logistics coordination position within the next two years. To achieve this, he plans to enroll in night courses toward an associate
    degree in Supply Chain Management and obtain a Lean Six Sigma Yellow Belt certification. His medium‑term ambition is to become a warehouse supervisor, overseeing inventory control, workflow optimization,
    and staff training. Long‑term, he envisions blending his organizational talent with his artistic passion by leading visual merchandising for an e‑commerce retailer that sells creative goods, or by launching
    his own online shop featuring his digital illustrations and custom‑designed merchandise. He also hopes to develop a reputation for innovative process improvements that enhance both efficiency and the
    aesthetic appeal of the retail environment.
