personas:
  professional: Jeremie Bruno, a 34-year-old diesel technician, blends deep diagnostic expertise, precision welding, and blueprint mastery with a curious, methodical mindset, steering complex emission-reduction
    projects while channeling a competitive drive that pushes them to dominate regional trade-show contests and mentor apprentices through rigorously documented training programs.
  sports: Jeremie Bruno stays active by tackling the North Georgia foothills on weekend hikes with the Georgia Trails Hiking Club, cheering fiercely for the Atlanta Falcons and Atlanta United, and channeling
    their competitive nature into occasional drag-racing nights at Georgia Motorsports Park, all while adhering to a disciplined strength-training regimen to support their physically demanding work.
  arts: Jeremie Bruno fuses a reverence for diesel craftsmanship with a deep appreciation for blues icons like Stevie Ray Vaughan and B.B. King, regularly visits the High Museum of Art to study contemporary
    photography by Sebastião Salgado, and captures gritty engine close-ups that echo the raw, soulful energy of those musical legends.
  travel: Jeremie Bruno meticulously plans road-trip pilgrimages, having already explored the Detroit Automotive Heritage Museum and the German Autobahn corridor to study diesel technology, while dreaming
    of a weekend escape to Asheville’s Blue Ridge Mountains for hiking, craft breweries, and intimate live-blues sets.
  culinary: Jeremie Bruno, a confident home cook, transforms Southern comfort staples—such as smoked pork shoulder glazed with honey-chipotle and shrimp-and-grits seasoned with smoked paprika and fresh
    thyme—into modern twists, and occasionally splurges on a farm-to-table tasting menu featuring sous-vide duck confit with heirloom tomatoes.
  core: Jeremie Bruno is a diesel-savvy artisan who meticulously rebuilds engines, paints trucks like canvases, fuels a relentless competitive streak, and can’t resist cataloguing every tool—even when the
    garage shelves are already overflowing.
background:
  cultural: As a white Southern male raised in the outskirts of Atlanta, Jeremie grew up in a working‑class, family‑oriented community where hard work, self‑reliance, and hospitality are core values. His
    father was a diesel mechanic, giving him early exposure to the trade and a deep respect for the region’s strong automotive and logistics culture. He occasionally attends a local Southern Baptist congregation,
    enjoys Southern music traditions (blues, country, rock), and participates in community events like county fairs and volunteer drives. The blend of Southern culinary traditions, love for the outdoors,
    and exposure to the vibrant Atlanta arts scene shapes his appreciation for both practical craftsmanship and creative expression.
attributes:
  skills: '[''Diesel engine diagnostics and repair'', ''Hydraulic system troubleshooting'', ''Electrical wiring and schematic interpretation'', ''Fuel injection system calibration'', ''Emissions testing
