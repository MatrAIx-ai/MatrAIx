    ZF)'', ''Inventory control and parts management'', ''Safety and OSHA compliance'', ''Apprentice training and mentorship'', ''Customer service and technical reporting'', ''Advanced powertrain technologies
    (biodiesel, hybrid)'', ''Root cause analysis and systematic problem solving'']'
  hobbies: '[''Classic truck restoration and custom painting'', ''Macro photography of mechanical components'', ''Playing electric guitar (blues/rock)'', ''Visiting art galleries and museums'', ''Attending
    car shows and drag‑racing events'', ''Hiking in North Georgia foothills'', ''Reading automotive and technical literature'', ''Volunteering at community STEM workshops'', ''Cooking Southern cuisine with
    contemporary twists'', ''Collecting vintage diesel manuals'']'
  career_goals: Jeremie aims to become a Master ASE Diesel Technician within the next two years and to obtain EPA Emission Specialist certification. He plans to move into a senior service manager role overseeing
    a regional fleet of buses or trucks, eventually establishing his own boutique diesel repair shop in Paulding County that blends high‑performance servicing with custom artwork for vehicle exteriors.
    He also seeks to stay at the forefront of emerging diesel technologies, such as biodiesel blends and hybrid systems, by attending industry conferences and earning additional certifications. Mentorship
    is important to him, so he intends to develop a structured apprenticeship program and gain recognition through competition wins at regional trade shows.
