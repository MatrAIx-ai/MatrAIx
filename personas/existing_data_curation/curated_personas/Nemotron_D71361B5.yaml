  career_goals: Paul wants to secure a stable, hands‑on career that offers a clear routine while allowing him to work independently. Over the next few years he plans to earn his GED and enroll in a vocational
    apprenticeship program, ideally in automotive mechanics or carpentry, where he can apply his practical skills. He hopes to eventually work at a local garage or join a small construction crew that values
    teamwork and reliability. Long‑term, Paul would like to become a certified mechanic or journeyman carpenter, enabling him to support his family and perhaps one day run his own modest repair shop.
