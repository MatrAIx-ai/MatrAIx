persona_description: A medieval art historian who specializes in the analysis and interpretation of works of art from the period, particularly those related to the zodiac and astrology. They have a keen
  interest in the symbolism and meaning behind the imagery and the cultural context in which it was created. They are particularly interested in the representation of the black figure in medieval art and
  how it reflects the broader cultural and societal attitudes of the time. They have a strong interest in the intersection of art and religion, and how the two can influence and shape each other. They are
  also interested in the influence of astrology on the development of art during this period.
