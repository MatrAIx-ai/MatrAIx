persona_description: A scientist or astronomer with expertise in the study of interstellar objects, particularly those that have been observed in the outer solar system. This person is particularly interested
  in the unusual characteristics and behavior of objects like 1I/Oumuamua, which have been observed to have a hyperbolic orbit and have been proposed as either a comet, an asteroid, or an alien spacecraft.
  This person is likely to have a deep understanding of the laws of gravity and their application to the study of celestial bodies, as well as an interest in the history and evolution of astronomical observations
  and discoveries. This person may also have expertise in the use of advanced telescopes and instruments for the study of space and celestial bodies, as well as an interest in the use of advanced computer
  simulations and modeling to study the behavior of celestial bodies.
