  career_goals: Jose aims to secure stable full‑time employment that leverages his practical abilities, such as a facilities manager or maintenance supervisor for a local agribusiness, school district,
    or community center. He plans to obtain certifications in OSHA safety, HVAC, and obtain a GED to broaden his qualifications. In the long term, he aspires to launch a family‑run service business offering
    home repairs and landscaping, providing financial security for his wife and future children.
