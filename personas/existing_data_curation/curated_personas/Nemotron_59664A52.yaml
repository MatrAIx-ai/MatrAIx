personas:
  professional: Jose Molina is a hands‑on maintenance specialist who leverages his carpentry, irrigation, and automotive repair expertise to keep facilities operating efficiently, expertly schedules work
    using Excel, and is actively pursuing OSHA, HVAC, and GED certifications to qualify for a facilities manager or maintenance supervisor role.
  sports: Jose Molina follows Liga MX passionately, cheering for Club América, attends local high‑school soccer matches each Friday night, supports the nearby Sacramento Republic FC in the USL, and keeps
    fit by hiking the Sierra Nevada foothills on weekends.
  arts: Jose Molina enjoys strumming an acoustic guitar at family gatherings, drawing inspiration from folk legend José Alfredo Jiménez and classic rock icons like Neil Young, and regularly volunteers to
    organize music and dance events at the senior center where he also appreciates the work of local muralists.
  travel: Jose Molina prefers low‑key road trips that blend nature and culture, planning weekend hikes to Yosemite and the Lake Tahoe area while dreaming of a culinary pilgrimage to Oaxaca and a brief visit
    to Barcelona’s bustling markets, yet balances these aspirations with family responsibilities and a modest travel budget.
  culinary: Jose Molina delights in preparing rustic tomato‑and‑pepper salsa, roasted chiles rellenos with fresh cilantro and queso fresco, and slow‑cooked carnitas seasoned with oregano and bay leaf, always
    incorporating herbs like basil and epazote harvested from his own garden.
  core: Jose Molina blends a toolbox of practical skills with a gardener’s patience, balancing meticulous budgeting with occasional splurges on heirloom seeds, and while he can be methodically organized,
    he sometimes forgets to water new seedlings until the last minute.
background:
  cultural: Jose’s Mexican heritage shapes his daily life. Raised in a bilingual household, he speaks Spanish at home and English at work, preserving traditions such as Día de los Muertos, quinceañeras,
    and family‑centered celebrations. He values strong family bonds, respect for elders, and the communal spirit common in Mexican culture. His Catholic upbringing influences his worldview, and he regularly
    participates in cultural events at the Madera Mexican community center.
