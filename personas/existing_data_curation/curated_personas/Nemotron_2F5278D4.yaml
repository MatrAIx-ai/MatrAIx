personas:
  professional: Nieves Alvarez, a budding junior scientist and coder, channels their curiosity and disciplined organization into designing LEGO ecological models and they lead the school's chess club with
    strategic precision.
  sports: Nieves Alvarez enjoys practicing soccer with the Riverside Tigers youth club, follows the Los Angeles Dodgers during baseball season, and they spend weekend mornings jogging in the local park
    to balance team spirit with personal fitness.
  arts: Nieves Alvarez expresses creativity by sketching wildlife scenes inspired by John James Audubon's bird illustrations, listening to the folk sounds of Mumford & Sons, and they occasionally reenact
    favorite moments from the animated film Moana for family gatherings.
  travel: Nieves Alvarez loves organized family trips to the nearby state park, dreams of exploring the Amazon rainforest, and they keep a travel journal filled with sketches of the Grand Canyon and plans
    for a future visit to Machu Picchu.
  culinary: Nieves Alvarez helps the family prepare traditional dishes like tamales, pepian, and guacamole, they have mastered the perfect grilled cheese sandwich with tomato soup, and they especially love
    the bright flavor of lime and the crunch of fresh corn.
  core: Nieves Alvarez is a meticulous, curious ten-year-old who blends organized LEGO engineering with a compassionate love for nature, chess strategy, and family tradition, and they often forget bedtime
    because of their projects.
background:
  cultural: Nieves is a second‑generation Guatemalan‑American raised in Mcminnville, Tennessee. At home, Spanish is spoken alongside English, and she celebrates Guatemalan traditions such as Día de los
    Reyes and traditional Semana Santa processions with her family. She embraces the communal values of her heritage, often assisting in family gatherings and community events. This bicultural upbringing
    enriches her worldview, encouraging respect for both her Latin American roots and the Southern Appalachian community she lives in.
attributes:
  skills: '[''Organizational planning'', ''Bilingual communication (English/Spanish)'', ''Reading comprehension'', ''Basic scientific inquiry'', ''Classroom helper leadership'', ''Peer tutoring'', ''Community
    garden assistance'']'
  hobbies: '[''Reading adventure and science books'', ''Sketching wildlife'', ''LEGO building'', ''Cooking Guatemalan recipes with family'', ''Nature walks and field journaling'', ''Basic coding on tablet'',
    ''Chess club'']'
  career_goals: Nieves aspires to become a veterinarian, driven by her love for animals and her desire to help them stay healthy. She envisions herself excelling academically, earning scholarships, and
    eventually pursuing a degree in veterinary medicine. In the meantime, she aims to win her school science fair, deepen her knowledge of biology, and continue assisting her community through volunteer
    work. Her long‑term ambition includes using her bilingual skills to serve under‑represented families in rural Tennessee and Guatemala, bridging cultural gaps in healthcare and education.
