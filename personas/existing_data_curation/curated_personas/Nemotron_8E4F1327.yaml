  career_goals: 'As a toddler, Cheuk’s primary ambitions revolve around mastering independence: he aims to speak more clearly, run farther, and explore his surroundings with confidence. He expresses a budding
    desire to help in the kitchen, "fix" toys, and later, when older, hopes to become a storyteller for his community, sharing the traditions of his American Indian heritage while discovering the world
    beyond his hometown.'
