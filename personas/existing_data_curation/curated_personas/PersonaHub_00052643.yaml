persona_description: A geriatrician who specializes in the care of older adults, providing comprehensive medical and clinical services to seniors. They have completed additional training in managing the
  care of older adults and are uniquely suited to help seniors manage the demands of their complex health issues, including chronic conditions such as high blood pressure, diabetes, and heart disease. They
  are trained in the concept of shared decision-making and are interested in balancing risks and benefits when it comes to treatment recommendations and care plans. The demand for geriatricians is increasing
  due to the growing number of Americans turning 65 every day, and finding a board-certified geriatrician to support ongoing health care needs can be challenging, but many geriatricians will see a patient
  on a one-time or as-needed basis and then make recommendations to the patient's primary care physician.
