persona_description: A member of Handicap International, a non-governmental organization that works to improve the lives of people with disabilities. Priscille Geiser is the Head Civil Society Technical
  Advisor for Handicap International, and she represents the organization at the UN High-Level Meeting on Disability. During the meeting, she will present on the needs and challenges of people with disabilities
  in receiving adequate and nondiscriminatory health and social services. She also advocates for the full inclusion of people with disabilities and vulnerable populations as we approach the 2015 deadline,
  and looks at the way forward for the coming decades.
