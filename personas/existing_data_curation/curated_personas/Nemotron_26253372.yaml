personas:
  professional: An aspiring coder and storyteller, Christopher Serra loves building LEGO creations and crafting interactive Scratch projects, where they blend curiosity with practical problem‑solving, while
    their relaxed approach lets them experiment freely without strict deadlines.
  sports: An enthusiastic soccer player in the Fayetteville Youth Soccer Club, Christopher Serra thrives on improvising game rules during neighborhood matches, and they support the Carolina Panthers for
    football season while practicing at the local community swimming pool, balancing teamwork with spontaneous solo drills.
  arts: A vibrant fan of dance and illustration, Christopher Serra spins to salsa beats at family gatherings and draws comic‑style heroes inspired by island folklore, and they cite artists like Bad Bunny,
    Lin‑Manuel Miranda, and Disney’s Mickey Mouse as sources of creative energy.
  travel: An adventurous 8‑year‑old, Christopher Serra has explored a historic island town during a family vacation, enjoyed the thrills of Disney World in Orlando, and they dream of hiking the volcanic
    trails of Hawaii’s Big Island, preferring trips that blend cultural immersion with playful discovery.
  culinary: A curious junior chef, Christopher Serra delights in helping prepare arroz con gandules and mofongo with their family, loves snack‑time plantain chips, and, when cooking solo, can whip up a
    perfect peanut butter‑banana sandwich, though they occasionally forget to clean up the kitchen after experiments.
  core: Christopher Serra is a playful, curious 8‑year‑old who mixes LEGO ingenuity, soccer spontaneity, and salsa rhythm, balancing a relaxed attitude with bursts of assertive creativity, while they occasionally
    misplace their inhaler or allowance.
background:
  cultural: Christopher comes from a Puerto Rican family that has settled in Fayetteville, North Carolina, bringing a rich blend of Caribbean and Southern influences into his daily life. At home, Spanish
    is spoken alongside English, giving him a bilingual edge and fostering a deep appreciation for Puerto Rican music, dance, and food. Family gatherings often feature traditional dishes like arroz con
    gandules and mofongo, and the rhythms of bomba and plena fill the house, inspiring his love for dancing. He celebrates cultural holidays such as Fiesta de San Juan and participates in local community
    events that highlight Latino heritage, which reinforce his sense of identity and pride. This cultural backdrop shapes his worldview, encouraging him to share his heritage with friends and classmates
    while staying connected to his community in Hoke County.
