  career_goals: Robert is determined to earn his GED within the next two years and then enroll in a community college program focused on graphic design or digital media. He aims to build a diverse portfolio
    that showcases his hand‑drawn and digital artwork, as well as short video tutorials and animations. Ultimately, he hopes to work as a freelance illustrator or a content creator for online platforms,
    allowing him the flexibility to explore varied artistic projects and travel for inspiration. He also envisions collaborating with community arts programs in Bedford, using his skills to mentor younger
    students and contribute to local murals. His long‑term ambition is to merge his love for art, technology, and social impact into a career that balances creative freedom with meaningful community engagement.
