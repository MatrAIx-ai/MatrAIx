personas:
  professional: Robert East, an aspiring graphic design student and freelance illustrator, merges hand‑drawn sketches with digital tools, harnessing their curiosity and flexible mindset to experiment across
    mediums while often juggling projects in a delightfully chaotic schedule.
  sports: Robert East spends free afternoons at the local skate park as a member of the Downtown Free‑wheelers club, cheers on the Dallas Cowboys and the Dallas Mavericks during televised games, and joins
    friends for occasional trail hikes in nearby parks, balancing adrenaline‑filled skate sessions with low‑key outdoor recreation.
  arts: Robert East, a self‑taught visual artist, captures street art and natural scenes through sketchbooks and a digital tablet, admires the surreal illustrations of James Jean and the atmospheric soundscapes
    of John Mayer's acoustic work, and regularly attends community theater productions starring local talent like Maya Miller, weaving these influences into their own storytelling and illustration style.
  travel: Robert East dreams of spontaneous weekend road trips to Austin’s live‑music scene and a future backpacking adventure through Barcelona’s galleries, planning trips with a mix of Google Maps research
    and last‑minute ticket grabs, while limited budget and school commitments sometimes force them to postpone more distant excursions.
  culinary: Robert East enjoys savoring Texas‑style brisket tacos with cilantro and lime, experiments with ramen bowls seasoned with smoked paprika and sesame oil, and often cooks quick pasta al aglio e olio,
    yet they habitually raid the fridge for late‑night snack chips while gaming, a guilty pleasure that fuels their creative sessions.
  core: Robert East, a 16‑year‑old sketch‑loving, guitar‑strumming, skateboarding dreamer, balances chaotic creativity with occasional impulsive spending, late‑night snacking, and a relentless curiosity
    that fuels both art and adventure.
background:
  cultural: Robert grew up in Bedford, Texas, a suburban community in Tarrant County within the Dallas‑Fort Worth metroplex. His family belongs to a white, middle‑class background that blends traditional
    Texan values—such as community involvement, hospitality, and an appreciation for local sports—with the diverse cultural offerings of a large metropolitan area. He was raised with exposure to Southern
    cuisine, occasional church gatherings, and neighborhood barbecues, while also experiencing the vibrant arts scene of the DFW region, including street murals, music festivals, and multicultural events.
    This mix has fostered his openness to varied experiences and his respect for different perspectives, while his upbringing emphasized kindness, cooperation, and a collaborative spirit.
