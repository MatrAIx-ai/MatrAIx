  career_goals: 'Jalicia aims to deepen her expertise as an executive assistant while moving toward a senior or office manager role within the next five years. She plans to earn a Certified Administrative
    Professional (CAP) credential and take short courses in project management and business communications to broaden her skill set. Ultimately, she envisions leveraging her calm, resilient nature to become
    a trusted operational partner for C‑suite executives, perhaps transitioning into a strategic operations or employee engagement role that allows her to influence workplace culture while maintaining the
    flexibility she values.


    She also hopes to mentor other young professionals from her community, sharing practical guidance on navigating corporate environments and emphasizing the importance of self‑care and emotional balance.'
