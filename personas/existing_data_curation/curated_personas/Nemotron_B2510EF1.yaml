personas:
  professional: Shayla Jow, a seven‑year‑old budding team‑player, blends curiosity with practicality by inventing new soccer drills on the playground while still enjoying the structure of group dance classes,
    though they often forget to put away the LEGO bricks afterward.
  sports: Shayla Jow, a devoted member of the community’s after‑school soccer club, idolizes the local youth team the River City Rovers and dreams of playing for the professional club the Metro Strikers,
    spending weekends sprinting across the park, collecting shells as trophies, and leading impromptu tag games for friends.
  arts: Shayla Jow, who loves dancing to upbeat pop hits like "Shake It Off" by Taylor Swift and drawing bright scenes of dinosaurs and seashells, spends evenings building elaborate LEGO landscapes inspired
    by Pixar movies while also humming along to the soundtrack of "Frozen" during group dance class.
  travel: Shayla Jow, with a passport of imagination, has explored the tide pools at Santa Cruz Beach, trekked through Redwood National Park’s giant ferns, and wishes to visit the coral reefs of the Great
    Barrier Reef, preferring spontaneous day‑trip adventures over meticulously planned vacations.
  culinary: Shayla Jow, who adores crunchy carrot sticks, cheesy pizza slices, and peanut‑butter‑jelly sandwiches, often helps mom stir batter for chocolate chip cookies, yet sometimes forgets to wash their
    hands after playing in the garden, leading to occasional sticky fingertips on the dinner table.
  core: Shayla Jow, a seven‑year‑old whirlwind of curiosity, energy, and occasional worry, toggles between leading boisterous soccer games and quietly sketching shells, all while juggling a love for group
    fun and a stubborn habit of misplacing their favorite LEGO piece.
background:
  cultural: Shayla is part of an African American family in Winter Haven, Florida, where community, music, and storytelling are central to daily life. Her family celebrates cultural holidays such as Juneteenth
    and Kwanzaa, attends church services where gospel and soulful music are enjoyed, and often gathers for picnics by the lakes. The warm climate and proximity to water encourage activities like swimming
    and nature walks, blending her heritage with the local Floridian lifestyle.
attributes:
  skills: '[''basic reading'', ''simple addition and subtraction'', ''improvisational storytelling'', ''drawing and coloring'', ''organizing group games'', ''peer conflict mediation'', ''digital learning
    on tablets'', ''musical rhythm and singing'']'
  hobbies: '[''playing soccer'', ''group dance classes'', ''drawing and coloring'', ''building LEGO structures'', ''exploring local parks and nature trails'', ''collecting rocks and shells'', ''reading
    picture books'', ''listening to music and singing'']'
  career_goals: Shayla dreams of becoming a veterinarian one day because she loves animals and wants to help them feel better. She also imagines herself as a teacher, sharing what she learns with other
    kids and making learning fun. Occasionally, she says she wants to be a team captain or a community helper, reflecting her desire to lead group activities and support her friends.
