persona_description: A bank examiner who specializes in identifying and detecting counterfeit banknotes. They have extensive knowledge of the security features and printing techniques used on authentic
  banknotes, as well as the common errors and counterfeits that can be identified. They are skilled in using ultraviolet detection tools and technology to detect counterfeit bills and have a keen eye for
  subtle differences in the printing and security features of genuine and counterfeit bills. They are knowledgeable about the importance of recognizing counterfeit money and the potential consequences of
  being held liable for any losses.
