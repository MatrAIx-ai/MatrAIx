personas:
  professional: Herminia Archambault, a 22‑year‑old environmental studies senior, blends curiosity with practicality by turning data‑driven research into clear community outreach plans, coordinating garden
    events and crafting grant proposals with a detail‑oriented yet adaptable workflow.
  sports: Herminia Archambault, an avid hiker and seasonal runner, spends weekends traversing Catskills trails, trains with the Woodstock Trailblazers running club, roots for the Hudson Valley Renegades,
    and follows the New York Knicks during winter months.
  arts: Herminia Archambault channels creativity through landscape photography, knitting indie scarves, and attending Woodstock shows featuring artists like Mitski, Fleet Foxes, and local folk singer Annelise,
    while devouring contemporary novels by Sally Rooney and Ocean Vuong.
  travel: Herminia Archambault prefers budget‑friendly, self‑planned trips that balance adventure and relaxation, having explored Montreal’s summer festivals, the rugged coast of Acadia National Park, and
    Portland’s food trucks, while dreaming of an eco‑tour of Iceland’s geysers and glaciers.
  culinary: Herminia Archambault cooks plant‑based meals at an intermediate skill level, perfecting lentil shepherd’s pie, cauliflower steak with tahini glaze, and a vegan tourtière featuring mushrooms
    and potatoes, often seasoning dishes with rosemary, cumin, and smoked paprika.
  core: Herminia Archambault is a purpose‑driven environmental enthusiast who juggles research, community gardening, and indie concerts, yet occasionally forgets to water their indoor succulents and procrastinates
    on paperwork until a deadline looms.
background:
  cultural: Herminia was raised in the Hudson Valley region of New York, an area with a legacy of French‑Canadian settlement. Her family’s French‑Canadian ancestry, reflected in the surname Archambault,
    has introduced occasional French language exposure and a fondness for traditional dishes such as tourtière. Growing up in a middle‑class, suburban setting near SUNY New Paltz, she experienced a blend
    of American holiday traditions (Thanksgiving, Fourth of July) and a strong community ethic that emphasizes outdoor recreation, local arts, and environmental stewardship.
attributes:
  skills: '[''Research (qualitative & quantitative)'', ''Data analysis (Excel, SPSS basics)'', ''Effective written communication'', ''Public speaking'', ''Project coordination'', ''Event planning'', ''Adaptability'',
    ''Team collaboration'', ''Basic graphic design (Canva)'', ''Time management'']'
  hobbies: '[''Hiking'', ''Nature photography'', ''Yoga'', ''Reading (fiction & non-fiction)'', ''Volunteer work (community garden)'', ''Cooking (plant-based)'', ''Indie music concerts'', ''Crafting (knitting)'']'
  career_goals: Herminia plans to finish her bachelor's degree in Environmental Studies or Communications within the next year and secure an internship with a local nonprofit focused on sustainability education.
    Her short‑term goal is to work as a program assistant, gaining experience in community outreach, grant writing, and project evaluation. In the long term, she aspires to become a program manager leading
    regional sustainability initiatives, combining her curiosity for innovative solutions with a practical, results‑oriented mindset. She also hopes to pursue a master’s degree in public policy to deepen
    her impact on environmental advocacy.
