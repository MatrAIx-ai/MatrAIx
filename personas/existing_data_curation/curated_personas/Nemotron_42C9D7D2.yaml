  career_goals: He aims to transition from informal, part‑time work into a certified technical trade. Specifically, James plans to enroll in a community‑college automotive technology program to become a
    licensed mechanic, or alternatively to launch a mobile car‑detailing and minor‑repair business. He is motivated to achieve financial independence, support his family, and demonstrate his capability
    in a competitive job market. Long‑term, he hopes to own a small automotive service shop that can also provide mentorship to other local youths.
