  career_goals: As he approaches retirement, Larry aims to transition from day‑to‑day sales execution to a mentorship and advisory role within his agency. He envisions establishing a structured training
    program for junior sales representatives, passing on his disciplined work ethic, client‑service standards, and curiosity‑driven approach to creative problem‑solving. Simultaneously, he plans to launch
    a boutique consultancy that helps small‑to‑medium local businesses navigate the shift toward digital advertising while preserving a strong visual identity rooted in artistic sensibility. Over the next
    five years, Larry also hopes to set up a scholarship at his former high school for students interested in marketing or the visual arts, thereby creating a lasting legacy that blends his professional
    expertise with his love of art.
