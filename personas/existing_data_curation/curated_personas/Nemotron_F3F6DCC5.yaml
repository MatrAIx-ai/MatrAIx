  career_goals: Magda's primary ambition is to advance to a senior data architect role where she can design enterprise-wide data platforms that fuse robust engineering with compelling visual narratives.
    She plans to earn advanced certifications such as the Google Professional Data Engineer and the Certified Information Systems Security Professional (CISSP) to deepen her expertise in cloud and data
    security. Over the next five years she hopes to lead cross-functional projects that implement data-mesh architectures, and to become a sought-after speaker at industry conferences and Bay Area tech
    meetups. Magda also dreams of launching a boutique consultancy that helps organizations turn complex data into story-driven visual experiences, while mentoring women and Latinx professionals in the
    field. Balancing her competitive drive, she is committed to developing personal strategies for stress resilience to sustain high performance.
