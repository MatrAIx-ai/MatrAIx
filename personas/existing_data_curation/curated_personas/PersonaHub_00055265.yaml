persona_description: A professional consultant specializing in resilience planning, specifically focusing on Whole Community Resilience. They are experienced in using climate change projections and higher
  emissions pathways to develop strategies for climate resilience. They are familiar with the importance of communication materials for laypeople and have experience in conducting workshops to engage local
  experts from all community sectors to identify and prioritize vulnerabilities. They prioritize co-benefits and cross-sector collaboration in their planning process and have a unique understanding of the
  concepts related to subgroups and isomorphisms in group theory.
