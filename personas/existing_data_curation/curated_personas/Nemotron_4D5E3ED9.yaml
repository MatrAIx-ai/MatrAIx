  hobbies: '[''Watercolor painting'', ''Sketching'', ''Photography'', ''Visiting art galleries and museums'', ''Reading contemporary fiction by Black authors'', ''Yoga and mindfulness practice'', ''Listening
    to indie and jazz music'', ''Volunteering at community center'', ''Organizing small cultural events'']'
  career_goals: Vera aims to deepen her strategic impact by moving into a senior management consulting role or a director of strategy position within a mid‑size firm. She plans to enroll in an MBA program
    within the next two years to broaden her business acumen and leadership capabilities. Long‑term, she envisions leading cross‑functional initiatives that blend data‑driven decision making with creative,
    human‑centered design, while championing diversity and inclusion programs that reflect her commitment to community harmony and equitable workplaces.
