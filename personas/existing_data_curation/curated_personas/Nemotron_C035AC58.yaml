  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Attending local theatre'', ''Kayaking'', ''Birdwatching'', ''Hiking'', ''Yoga'', ''Mindfulness meditation'', ''Journaling'', ''Knitting'',
    ''Cooking seasonal recipes'']'
  career_goals: Patricia aims to obtain the SHRM Certified Professional (SHRM‑CP) credential and complete a bachelor's degree in Human Resource Management within the next three years. She aspires to advance
    to an HR manager role where she can design and implement a comprehensive mental‑health and wellness initiative for her organization, champion inclusive and flexible workplace policies, and mentor junior
    HR staff. Long‑term, she envisions transitioning to a regional HR consultancy serving small businesses in Northern Michigan, helping them cultivate empathetic, adaptable workplace cultures.
