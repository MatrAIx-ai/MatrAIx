  career_goals: Ana aims to transition from her current secretary position to an office manager role within the next two to three years, using her systematic approach and technical background to oversee
    larger operational functions. She plans to earn the Certified Administrative Professional (CAP) credential and eventually pursue a Project Management Professional (PMP) certification so she can lead
    cross‑functional projects. Long‑term, she envisions moving into a business analyst or technical operations role at a technology firm in the Bay Area, where she can apply her STEM training to improve
    organizational efficiency. Throughout her progression, she remains committed to mentoring other young Latino professionals and fostering inclusive workplace cultures.
