  career_goals: Even at her young age, Jennifer enjoys dreaming about helping others. She often talks about wanting to become a teacher because she likes explaining things to friends, a veterinarian because
    she loves animals, and a community helper such as a firefighter because she admires people who keep others safe. Her aspirations reflect her practical, caring nature and her desire for routine‑filled,
    service‑oriented roles.
