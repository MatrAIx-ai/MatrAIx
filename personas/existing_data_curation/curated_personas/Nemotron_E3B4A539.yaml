  career_goals: Kamal aims to transition from his current administrator role to a district‑wide director of early childhood education, where he can champion district‑level policies that center arts, equity,
    and trauma‑informed care. He plans to pursue a master’s in educational leadership within the next two years to deepen his strategic planning capabilities. Long‑term, he envisions founding a non‑profit
    that delivers mobile art‑based learning workshops to underserved neighborhoods across Indiana, and becoming a recognized speaker on integrating creativity into early childhood curricula. He also hopes
    to mentor emerging educators, especially those from underrepresented backgrounds, to build a more diverse leadership pipeline.
