personas:
  professional: Andrea Willis, a two‑year‑old budding architect, treats the playroom as a design studio where they organize block towers with meticulous care yet remain flexible enough to rebuild them spontaneously,
    revealing early signs of the curiosity and balanced reliability that will shape a future career in creative problem‑solving.
  sports: Andrea Willis, who loves chasing a bright orange ball in the backyard, participates in a local toddler gymnastics class and the “Little Hoops” preschool basketball league, and watches the Kentucky
    Wildcats basketball team on TV, where they often mimic a slam dunk in the living room.
  arts: Andrea Willis, who frequently hums bluegrass tunes by Bill Monroe and sings along to Raffi’s children’s songs, spends afternoons sketching whimsical animals inspired by Dr. Seuss and dancing to
    Disney’s ‘Moana’ soundtrack, where they turn the living room into an ever‑changing art studio.
  travel: Andrea Willis, whose family road trips regularly include stops at the Kentucky State Fair and weekend getaways to the Blue Ridge Mountains, where they dream of feeling the breeze at the Grand
    Canyon and hearing the waves at Florida’s Gulf Coast, preferring short car rides and familiar routines over long flights.
  culinary: Andrea Willis, who delights in the buttery crunch of homemade biscuits, the crisp skin of fried chicken, and dipping carrot sticks into ranch, they proudly sprinkle shredded cheddar on mac and cheese
    and help stir mashed sweet potatoes with a tiny wooden spoon, always requesting a bite of apple slices after dinner.
  core: Andrea Willis is a curious two‑year‑old who balances organized block towers with spontaneous giggly exploration, clinging to routine yet always ready to try a new song or snack, and they delight
    in discovering the world one small step at a time.
background:
  cultural: Andrea is a white American child raised in Lexington, Kentucky. Her family participates in regional traditions such as the Kentucky State Fair and occasional horse‑related events, and enjoys
    Southern family meals featuring biscuits, fried chicken, and seasonal vegetables. She is exposed to the area's bluegrass music, the rolling hills of the Bluegrass region, and the warm hospitality common
    to the local community, all of which enrich her early experiences and fuel her curiosity.
