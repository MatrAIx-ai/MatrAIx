  career_goals: Although still a toddler, Andrea expresses budding ambitions through pretend play, often dressing up as a teacher, a painter, or a scientist. These early narratives suggest future aspirations
    toward creative and inquisitive professions. Her overarching goal is to keep exploring, learning new ideas, and sharing knowledge, hinting at a future desire to become an educator, artist, or researcher.
