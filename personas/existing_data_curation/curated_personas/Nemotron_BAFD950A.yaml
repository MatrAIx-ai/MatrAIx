  hobbies: '[''Watercolor painting'', ''Visiting art museums'', ''Reading about art and philosophy'', ''Gardening (herbs and vegetables)'', ''Cooking traditional Mexican dishes'', ''Salsa dancing'', ''Participating
    in community festivals'', ''Knitting and embroidery'', ''Genealogy research'', ''Volunteering at senior center events'']'
  career_goals: Although retired from formal employment, Angel aims to broaden her impact by launching a monthly multicultural arts series at the local senior center, mentoring younger volunteers, and compiling
    a community cookbook that preserves family recipes and stories. She aspires to be recognized as a bridge between generations, ensuring Mexican traditions thrive in the Pacific Northwest while fostering
    inclusive, creative spaces for seniors and neighbors alike.
