personas:
  professional: Angel Vega is a retired community organizer and cultural liaison; they use meticulous event-planning skills, bilingual fluency, and a disciplined work ethic to coordinate senior-center arts
    programs and volunteer schedules, ensuring that traditional celebrations like Dia de los Muertos and folk dances thrive in the local community.
  sports: Angel Vega stays active through weekly salsa dancing at the community center; they also participate in a senior walking club that meets on Saturdays to explore the Columbia River Gorge trails,
    and they passionately follow the Portland Timbers and Seattle Seahawks, cheering them during the football season.
  arts: Angel Vega devotes afternoons to watercolor landscapes of their herb garden; they draw inspiration from the bold colors of Frida Kahlo and Diego Rivera, and they volunteer as a docent at the regional
    art museum, guiding tourists through contemporary exhibitions and local craft fairs.
  travel: Angel Vega enjoys seasonal trips to the coastal town of Ensenada for family Day of the Dead celebrations; they also delight in weekend road trips to the Oregon wine country to tour vineyards,
    and they dream of attending the vibrant Dia de los Muertos festivities in Oaxaca next year.
  culinary: Angel Vega frequently prepares dishes such as chiles en nogada, pozole, and arroz con mole, skillfully blending chilies, corn, and cacao, often garnished with fresh cilantro from their garden;
    they also experiment with fusion plates that incorporate local salmon and seasonal vegetables, while maintaining a secret stash of heirloom seed packets for future planting.
  core: Angel Vega's life is a vibrant tapestry woven from disciplined organization, boundless curiosity for art and heritage, and a love of community dance; they also have a tendency to hoard porcelain
    mugs and occasionally miss a dentist appointment.
background:
  cultural: Angel was born in Jalisco, Mexico, to a family that maintained strong ties to Mexican customs, language, and cuisine. She moved to the United States in her early twenties and settled in the
    Pacific Northwest, where she and her husband built a life in Vancouver, WA. Throughout her years, she has celebrated Día de los Muertos, Semana Santa, and Mexican Independence Day, while sharing traditional
    music, dance, and recipes with her community. Her Mexican heritage remains a central part of her identity, influencing her daily practices, social engagements, and the way she contributes to the multicultural
    fabric of her neighborhood.
