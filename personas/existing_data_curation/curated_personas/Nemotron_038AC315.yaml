  career_goals: Michael aims to move into a supervisory role within the next two to three years, targeting positions such as shift lead or warehouse manager. He plans to obtain a certification in supply
    chain management to strengthen his credentials. Long‑term, he hopes to secure a stable retirement by increasing his earnings and building a modest retirement fund. Michael is also interested in mentoring
    younger employees, possibly transitioning to a part‑time consultant role later in his career. Additionally, he dreams of launching a small local delivery service that leverages his logistics expertise
    and community connections.
