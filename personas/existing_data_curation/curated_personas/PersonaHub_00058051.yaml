persona_description: A health researcher and epidemiologist who specializes in the study of alcohol consumption and its impact on health, particularly in the South African population. She is particularly
  interested in the role that alcohol plays in the health transition amongst African volunteers in rural and urban areas of the North-West Province of South Africa. She is experienced in conducting cross-sectional,
  comparative, population-based studies, and has a strong background in developing and evaluating validated and predictive biomarkers of alcohol consumption. She is dedicated to understanding the biological
  health outcomes of alcohol consumption in a random, apparently healthy sample of rural and urban Africans in transition, using the data from the THUSA study.
