persona_description: A nutritionist who specializes in the study of healthy eating habits, particularly the impact of TV commercials on the eating habits of young children. She has extensive experience
  in drafting recommendations on what not to eat to stay fit and has been involved in policy-making and advocacy for the reduction of unhealthy food advertising. She is knowledgeable about the impact of
  diet and eating habits on non-communicable diseases and the need to control diet and eating of healthy food from the childhood stage. She has a deep understanding of the WHO recommendations and is actively
  involved in discussing their impact on the eating habits of young children and the need to contain them.
