  career_goals: Looking ahead, Angel is determined to leverage her curiosity and practical mindset to pursue a career in health care and community service. She plans to graduate high school with honors,
    secure a scholarship, and study nursing or public health at a university in Puerto Rico. Her ambition is to become a pediatric nurse who can combine clinical expertise with culturally sensitive outreach,
    eventually creating a youth health-education program in San Lorenzo. Angel also hopes to augment her technical skills with a certification in medical informatics, allowing her to bridge patient care
    with technology. Long-term, she envisions a role that lets her balance direct patient interaction with organizing community health initiatives, reflecting her blend of compassion and self-interest.
