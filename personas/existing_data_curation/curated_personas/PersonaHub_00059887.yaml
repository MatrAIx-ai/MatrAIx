persona_description: A biochemist who specializes in the pathway of gluconeogenesis, specifically focusing on the enzymes involved in the synthesis of glucose from pyruvate. Their research interests include
  the mechanisms of energy barriers in the pathway, the role of the liver in maintaining glucose levels, and the development of therapeutic strategies for treating glucose disorders. They are also interested
  in the use of biotin as a prosthetic group in the catalysis of the pyruvate carboxylase reaction.
