personas:
  professional: Wanda Petersen, an ambitious residential roofing specialist who blends meticulous building‑code knowledge and OSHA safety expertise with a hands‑on curiosity for sustainable materials, uses
    their practical mindset to keep job sites organized despite a naturally relaxed approach to scheduling, and often steps up as a de‑facto leader when crew dynamics become chaotic.
  sports: Wanda Petersen, an enthusiastic outdoors enthusiast who spends weekends biking the Amarillo–Lubbock trail and hiking Palo Duro Canyon while cheering on the Dallas Cowboys, Texas Tech Red Raiders
    football, and the Dallas Mavericks, and occasionally joins a local climbing gym to stay fit.
  arts: Wanda Petersen, a devoted fan of classic rock legends like Led Zeppelin and country icons such as Willie Nelson, spends evenings strumming acoustic covers of their hits, unwinds with mystery novels
    by Agatha Christie, and binge‑watches building‑focused series like This Old House for creative inspiration.
  travel: Wanda Petersen, a budget‑conscious adventure seeker who prefers self‑planned road trips to national parks such as Grand Canyon, Yellowstone, and the nearby Palo Duro Canyon, often camps under
    the stars with a minimalistic pack, yet still dreams of a future cross‑country bike tour through the Pacific Northwest.
  culinary: Wanda Petersen, a self‑taught kitchen tinkerer who batches hearty Tex‑Mex chili and brisket tacos on weekends, seasons dishes with smoky chipotle and fresh cilantro, and occasionally attempts
    to bake sourdough bread in a cast‑iron pot while still mastering the perfect flip of a pancake.
  core: Wanda Petersen, a curious yet laid‑back roofer who balances a love for sustainable building, spontaneous outdoor escapades, and a habit of misplacing their favorite screwdriver, while they dream
    of running their own eco‑friendly roofing crew.
background:
  cultural: Wanda grew up in a modest, close‑knit family in Amarillo, Texas, where the values of hard work, self‑reliance, and community are deeply rooted. Her surname hints at a Scandinavian heritage,
    and family traditions occasionally include holiday gatherings featuring potluck meals and a fondness for outdoor barbecues. The West Texas environment—vast plains, strong winds, and a vibrant local
    music scene—has shaped her practical outlook and love for open‑air activities. Growing up near the Amarillo Fairgrounds, she was exposed to regional celebrations and rodeos, reinforcing a sense of regional
    pride while also fostering an openness to diverse ideas and new technologies, especially in her trade.
attributes:
  skills: '[''Roof Installation'', ''Shingle Replacement'', ''Metal Roofing'', ''Basic Carpentry'', ''Measurement and Layout'', ''Construction Safety Compliance'', ''Team Coordination'', ''Client Communication'',
    ''Problem Solving'', ''Basic Estimating'']'
  hobbies: '[''Hiking in Palo Duro Canyon'', ''Biking on local trails'', ''Camping trips'', ''DIY home improvement projects'', ''Playing acoustic guitar'', ''Listening to classic rock and country music'',
    ''Reading mystery novels'', ''Volunteering for community clean‑up events'', ''Watching building‑tech YouTube channels'']'
  career_goals: Wanda plans to earn her Texas Roofing Contractor license within the next two years and eventually become a crew foreman. She is interested in pursuing a certification in sustainable roofing
    to integrate solar technologies into her projects. While staying flexible about her work schedule, she hopes to start her own small roofing business that emphasizes safety, quality, and environmentally‑friendly
    materials. She also wants to take community college courses in construction management to broaden her leadership skills.
