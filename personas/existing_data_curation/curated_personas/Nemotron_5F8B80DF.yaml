personas:
  professional: Henry Cleveland, an aspiring software developer and IT specialist, leverages their self‑taught Python and circuit‑design skills to build custom PCs and prototype small automation projects,
    approaching each task with meticulous planning, detailed documentation, and a preference for solitary, focused work environments.
  sports: Henry Cleveland follows the Philadelphia Eagles and the Philadelphia Phillies while personally engaging in solitary fitness activities such as early‑morning lake trail runs, weekend kayaking on
    Wrightstown’s lake, and occasional intramural strategy tournaments at the community center.
  arts: Henry Cleveland’s artistic taste leans toward ambient soundscapes by Brian Eno, Max Richter, and Ryuichi Sakamoto, occasional indie game soundtracks, and a modest collection of illustrated science‑fiction
    graphic novels, which they study for narrative structure while listening to instrumental music during woodworking.
  travel: Henry Cleveland prefers low‑key nature retreats, having explored the Shenandoah National Park and the coastal trails of Acadia, while dreaming of a quiet solo trip to Iceland’s geothermal lagoons,
    yet budgets travel around a part‑time tech‑repair gig and GED tuition.
  culinary: Henry Cleveland enjoys simple, functional meals like rosemary‑roasted potatoes, avocado toast, and homemade ramen, often cooking in the small kitchen they set up beside their workstation, and
    they have a habit of snacking on trail mix while debugging code.
  core: Henry Cleveland is a methodical teenage tech enthusiast who thrives in solitude, balances curiosity with practicality, and occasionally neglects sleep for the perfect line of code.
background:
  cultural: Henry grew up in Wrightstown, a small town in Brown County, Wisconsin, within a white, middle‑class family rooted in Midwestern values of self‑reliance, practicality, and community service.
    His upbringing reflects a blend of Protestant cultural traditions, an appreciation for the outdoors, and a family emphasis on quiet, independent pursuits. These influences have shaped his preference
    for solitude, his methodical approach to tasks, and his pragmatic outlook on education and career.
attributes:
  skills: '[''Python programming'', ''JavaScript basics'', ''Electronics prototyping'', ''Woodworking'', ''Technical writing'', ''Project planning'', ''Data analysis (Excel)'', ''Research and fact‑checking'']'
