    music listening'']'
  career_goals: Henry aims to complete his GED within the next year and enroll in a community‑college technical program focused on computer science or network engineering. He envisions a career as a software
    developer or IT specialist where he can work independently, solve complex problems, and eventually offer freelance consulting services. Practical stability and the ability to work in quiet, focused
    environments are central to his long‑term professional ambitions.
