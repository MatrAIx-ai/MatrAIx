  career_goals: Brian dreams of roles that let him be in the spotlight and lead a team. He talks about becoming an astronaut who commands space missions, a professional soccer player who scores winning
    goals, or a performer on stage and screen. He also enjoys pretending to be a teacher or class monitor, showing an early interest in guiding peers. His ambitions are framed by a desire to be admired,
    compete, and take on responsibility when he grows older.
