personas:
  professional: Brian Jenks, an aspiring mini‑entrepreneur of make‑believe enterprises, leverages their love of structure to design detailed LEGO storefronts and uses their talkative, competitive nature
    to lead friends in organized pretend‑play scenarios.
  sports: Brian Jenks, a spirited participant in weekend backyard soccer matches and a member of the Little Roos division of the Seattle Soccer Club, cheers on the Seattle Sounders FC when watching on TV,
    favors fast‑paced play over teamwork, and insists on practicing goal‑scoring drills after school.
  arts: Brian Jenks, an enthusiastic karaoke singer who belts out The Wiggles and Disney’s Frozen hits, sketches detailed dinosaurs and rockets inspired by Jurassic World and Star Wars, and builds elaborate
    LEGO sculptures that double as stage sets for their imaginative plays.
  travel: Brian Jenks, a curious explorer who spends Saturday mornings trekking through Seattle’s Discovery Park and Green Lake, dreams of a family road trip to the Oregon Coast to collect seashells, prefers
    spontaneous nature walks over structured tours, and asks for extra snack breaks to fuel their endless curiosity.
  culinary: Brian Jenks, a budding chef who proudly assembles peanut‑butter‑and‑jelly sandwiches with extra strawberry jam, devours mac and cheese topped with cheddar and breadcrumbs, and delights in tasting
    pineapple chunks on pizza despite parental skepticism, often insisting on adding crunchy cereal as a garnish.
  core: Brian Jenks, a talkative, competition‑driven 6‑year‑old who thrives on structured make‑believe games, hoards pine cones as trophies, and frequently forgets to clean up LEGO bricks, embodying a lively
    mix of order‑loving imagination and delightful messiness.
background:
  cultural: Brian comes from a white, middle‑class family in Seattle, Washington. His upbringing reflects the Pacific Northwest's blend of urban modernity and outdoor appreciation. He is exposed to a community
    that values environmental stewardship, multicultural awareness, and tech‑savvy activities. Family traditions include weekend trips to nearby forests and the occasional visit to the local science museum,
    while his parents encourage curiosity, inclusive social interaction, and a balance of structure and creative freedom.
