  career_goals: Jamie aims to step into a shift‑supervisor role within the next two years, earn an Industrial Maintenance certification, and spearhead continuous‑improvement projects that cut machine downtime
    by at least 15%. She plans to develop a formal onboarding and mentorship program for new hires and eventually transition into plant‑management or launch a consulting service that helps regional manufacturers
    optimize their packaging processes.
