  hobbies: '[''Piano playing'', ''Acoustic guitar'', ''Chess'', ''Gardening'', ''Reading biographies and music history'', ''Cooking Mexican dishes (mole, tamales, pozole)'', ''Collecting vintage vinyl records'',
    ''Volunteering in community music education'', ''Attending cultural festivals (Fiesta de la Hispanidad)'', ''Hiking in the Texas Hill Country'']'
  career_goals: Recaredo aims to leave a lasting artistic legacy by commissioning a symphonic work that weaves Mexican folk motifs into a classical framework, showcasing his dual cultural heritage and technical
    fluency. He plans to establish a structured, sustainable youth music mentorship program in Dallas that integrates STEM concepts with music education, providing pathways for underrepresented Latino students.
    Additionally, he seeks to publish a handbook on algorithmic composition for traditional ensembles, secure a residency with a major orchestra to debut his new compositions, and ensure a financially secure
    retirement that allows him to continue composing and community service without the pressure of uncertainty.
