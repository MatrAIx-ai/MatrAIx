persona_description: A forensic scientist with expertise in DNA profiling, particularly in the use of mitochondrial DNA and Y-STR profiling. They are interested in understanding the strengths and limitations
  of DNA evidence in criminal cases, and are looking for practical and theoretical knowledge to effectively use forensic DNA in criminal justice proceedings. They are also interested in the use of DNA evidence
  in the context of the adversarial system, and are seeking to understand when to emphasize DNA evidence, when to challenge it, and when to secure an advantage.
