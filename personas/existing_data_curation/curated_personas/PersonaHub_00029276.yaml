persona_description: A scientist working on the Elwha River dam removal project, focusing on the nearshore impacts of the dam removals on coastal habitats and sediment transport in the Puget Sound region.
  The scientist is involved in mapping, monitoring, and modeling activities to assess the effects of dam removal on the river-mouth delta and the surrounding marine environment. They are collaborating with
  local, tribal, State, and Federal parties to develop coordinated monitoring and modeling plans and are using the USGS Coastal Habitats in Puget Sound Project to employ three major techniques to evaluate
  dam-removal impacts, including mapping, monitoring, and modeling. The scientist is also involved in the "Technical Workshop on Nearshore Restoration in the Central Strait of Juan de Fuca" held in March
  2004, where they agreed on the high-priority need for a conceptual model of sediment transport and deposition off the Elwha River.
