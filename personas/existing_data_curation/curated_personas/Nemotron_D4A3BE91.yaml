personas:
  professional: Sandra Raffaldt, a highly organized registered nurse on a busy medical‑surgical floor, leverages meticulous patient assessments, precise IV therapy and wound care, exacting electronic health
    record documentation, and assertive interdisciplinary communication; they champion patient safety while mentoring junior staff toward structured workflow improvements.
  sports: Sandra Raffaldt enjoys early‑morning walks on local nature trails, joins the Madison Trail Runners Club for weekend runs, follows the Milwaukee Brewers in baseball and the Milwaukee Bucks in basketball,
    and practices yoga twice a week to sustain flexibility and mental calm, all while maintaining a disciplined schedule that mirrors their professional routine.
  arts: Sandra Raffaldt finds creative release in crocheting intricate William Morris‑inspired motifs, immerses themselves in classic literature by Jane Austen and Virginia Woolf, relaxes to the folk melodies
    of Joni Mitchell and the piano works of Ludovico Einaudi, and occasionally attends performances by the Chicago Symphony Orchestra, weaving these artistic influences into their quiet, structured daily
    life.
  travel: Sandra Raffaldt prefers meticulously planned trips that blend relaxation with cultural immersion, having explored the historic streets of Savannah, Georgia, the vineyards of Napa Valley, California,
    and the lavender fields of Provence, France, while dreaming of a serene hiking expedition through New Zealand’s Fiordland National Park when finances and family obligations permit.
  culinary: Sandra Raffaldt excels at artisanal baking, routinely perfecting sourdough loaves, buttery croissants, and rosemary focaccia, while they delight in incorporating rye flour, wild honey, fresh
    herbs, and a splash of vanilla into pastries, often pairing their creations with a steaming cup of Earl Grey tea for a comforting ritual.
  core: Sandra Raffaldt is a detail‑driven nurse who balances a love for structured routines—from precise baking and crocheting to meticulous patient care—with a persistent undercurrent of anxiety that
    fuels both their compassion and their quest for order.
background:
  cultural: Sandra grew up in a traditional Midwestern white family with deep roots in Missouri's agricultural communities, tracing her ancestry to German and Scandinavian settlers. Her upbringing emphasized
    practicality, self‑reliance, and strong family values. Community events, church gatherings, and local festivals shaped her sense of belonging and reinforced the importance of routine and modesty. The
    region's close‑knit, small‑town culture fosters her preference for intimate social settings and her commitment to contributing to the well‑being of her neighbors through her nursing career.
