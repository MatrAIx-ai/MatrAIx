  hobbies: '[''Baking'', ''Crocheting'', ''Backyard gardening'', ''Reading classic literature'', ''Journaling'', ''Walking nature trails'', ''Volunteering at community health fairs'']'
  career_goals: Sandra aims to obtain a Bachelor of Science in Nursing within the next two years to qualify for leadership roles. Her short‑term goal is to become a charge nurse on her current medical‑surgical
    unit, where she can implement structured workflow improvements and mentor junior staff. Long‑term, she aspires to become a nurse manager overseeing a small team in a community hospital, focusing on
    enhancing patient safety and developing mental‑health outreach programs for rural populations. She also plans to earn certifications such as the Medical‑Surgical Nursing (CEN) credential and to pursue
    continuing education in stress‑reduction techniques for healthcare providers, aligning her professional growth with her personal commitment to disciplined, compassionate care.
