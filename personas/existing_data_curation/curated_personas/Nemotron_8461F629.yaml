personas:
  professional: Corey Alarcon, an experienced earth-drilling technician, combines meticulous rig-operation and geotechnical analysis with an imaginative, detail-oriented mindset, using their strong spatial
    awareness and collaborative communication to keep crews safe while dreaming of a supervisory role that merges innovative horizontal directional drilling with eco-friendly practices.
  sports: Corey Alarcon fuels fitness by hiking Everglades trails with the local Everglades Hikers Club, cheering the Miami Heat and Miami Dolphins, and joining casual pick-up soccer games on weekends,
    balancing their active recreation with the physical demands of field work.
  arts: Corey Alarcon expresses their vibrant imagination through abstract acrylic canvases inspired by subsurface textures, street photography of Wynwood murals, improvisational electric-guitar jams echoing
    Miles Davis, while volunteering to teach teens drawing, drawing creative fuel from artists like Jackson Pollock and the urban aesthetic of Banksy.
  travel: Corey Alarcon prefers immersive, low-stress trips, having explored the Florida Keys, trekked the Grand Canyon, attended a design conference in Barcelona, and dreaming of Iceland’s geothermal fields
    to study sustainable drilling technologies, reflecting their love for both adventure and environmental insight.
  culinary: Corey Alarcon enjoys fresh seafood like grilled mahi-mahi with mango salsa, crafts classic Cuban sandwiches with slow-roasted pork, and experiments with avocado toast topped with smoked paprika,
    often accompanied by a strong Cuban coffee that fuels their creative evenings.
  core: Corey Alarcon is a safety-obsessed driller with an artist’s soul, whose anxiety fuels meticulous work habits and an unquenchable drive for creative expression, shaping their every decision.
background:
  cultural: Corey identifies as Black American with deep roots in the South Florida black community. His parents immigrated from Jamaica, bringing a rich blend of Caribbean traditions, reggae rhythms, and
    culinary flavors that shaped his upbringing in Broward County. Growing up amid the multicultural tapestry of Hollywood, FL, he was exposed to Afro‑Caribbean festivals, hip‑hop, and the vibrant street‑art
    scene, fostering his love for rhythm, color, and community expression. He maintains close ties to his family’s church, where he learned the values of cooperation, respect, and service to others. These
    cultural influences inform his collaborative work style, his affinity for music and visual art, and his commitment to giving back through local mentorship programs.
attributes:
