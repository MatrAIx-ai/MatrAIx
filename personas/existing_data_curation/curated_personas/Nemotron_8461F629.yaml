    conflict resolution'']'
  hobbies: '[''Abstract painting'', ''Street photography'', ''Electric guitar and improvisational jazz'', ''Reading science‑fiction and philosophy'', ''Hiking in the Everglades'', ''Mindfulness meditation'',
    ''Volunteer art tutor for teens'']'
  career_goals: In the next five years Corey aims to move from frontline driller to a supervisory role, obtaining his IADC Certified Driller credential and completing an associate’s degree in construction
    management. He is eager to lead a crew that prioritizes safety, environmental stewardship, and innovative drilling techniques such as horizontal directional drilling for renewable‑energy infrastructure.
    Long‑term, he dreams of launching a boutique drilling consultancy that offers eco‑friendly geotechnical services to developers in South Florida, integrating his curiosity for new technologies with his
    commitment to community‑focused projects. He also hopes to mentor young workers, especially from under‑represented backgrounds, to create a more inclusive industry.
