  career_goals: Cheryl dreams of a future where she can help others and work with animals. She often says she wants to be a teacher because she likes sharing knowledge with friends, or a veterinarian because
    she loves caring for her family dog and other pets. She also imagines herself organizing fun group activities for neighborhood kids, reflecting her desire to create harmony and enjoyable routines for
    her friends.
