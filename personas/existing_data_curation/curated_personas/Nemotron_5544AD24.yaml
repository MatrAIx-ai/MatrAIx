personas:
  professional: Cheryl Attanasio is a budding team player and disciplined performer, excelling on her local soccer squad and weekly ballet class where their love of routine and sociable energy translate
    into reliable teamwork and graceful coordination.
  sports: Cheryl Attanasio kicks off evenings with her community Soccer Stars team, cheers for the LA Galaxy and the U.S. Women's National Soccer Team, and practices ballet at the Little Stars Dance Club,
    balancing high-energy field play with disciplined studio routines.
  arts: Cheryl Attanasio crafts friendship bracelets, paints whimsical scenes, and devours adventure series by J.K. Rowling and Mary Pope Osborne, while animated shows like "Adventure Time" and "SpongeBob
    SquarePants" shape their creative imagination and inspire weekend art projects.
  travel: Cheryl Attanasio prefers spontaneous weekend getaways to nearby beach spots like Santa Monica and local parks such as Griffith Park, dreaming of future trips to Disney World and the Grand Canyon,
    planning trips by scribbling ideas in a doodle notebook rather than strict itineraries.
  culinary: Cheryl Attanasio enjoys measuring out chocolate chips for classic cookies, mixing batter with a splash of vanilla extract, and proudly serving homemade pizza slices topped with mozzarella and
    pepperoni, yet often forgets to wash their hands before cooking, prompting gentle reminders from Mom.
  core: Cheryl Attanasio blends a love for routine, group fun, and crafty creativity into a lively, slightly disorganized personality that thrives on soccer, ballet, and cookie baking, while occasionally
    misplacing stickers and forgetting chores.
background:
  cultural: Cheryl comes from an Italian‑American family that celebrates traditional holidays like Christmas Eve with a big feast and enjoys homemade pasta dishes. Growing up in Westminster, Orange County,
    she is exposed to a vibrant multicultural environment, often joining community festivals that feature a mix of cultures, from Asian street fairs to local beach celebrations. Her family attends a Catholic
    parish, which informs some of her values around kindness, cooperation, and community service. The sunny Southern California climate encourages her love for outdoor activities and beach outings, shaping
    a blend of Italian heritage and Southern California lifestyle.
