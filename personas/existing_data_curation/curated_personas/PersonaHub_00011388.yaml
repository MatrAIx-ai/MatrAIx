persona_description: A person who is interested in education policy and is familiar with the Elementary and Secondary Education Act of 1965 and its recent reauthorizations. This person may be a teacher,
  school administrator, or a researcher in the field of education policy. They are likely to have a strong interest in improving education opportunities for children and have knowledge of the various reforms
  and initiatives that have been implemented in the United States to achieve this goal. They may have access to up-to-date information and resources related to education policy and may be able to provide
  insights and analysis on the current state of education in Arkansas and the implications of the Every Student Succeeds Act of 2015 for the state.
