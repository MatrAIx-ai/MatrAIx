  career_goals: Though still very young, Victoria loves to imagine future roles where she can help and guide others. In pretend play she often takes on the role of a teacher caring for dolls or a doctor
    tending to stuffed animals, reflecting an emerging ambition to become a caregiver or community helper. She also enjoys organizing her toys and setting up “classrooms” for her stuffed friends, hinting
    at a future interest in teaching or early‑childhood education. Her curiosity about how things work sometimes leads her to pretend to fix toy cars, suggesting a nascent interest in hands‑on problem solving.
