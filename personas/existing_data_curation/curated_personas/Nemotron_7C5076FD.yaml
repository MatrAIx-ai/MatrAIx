personas:
  professional: Victoria Klak is a tiny, methodical explorer who turns every block‑building session into a mini‑project, meticulously planning which shape goes where and proudly presenting the finished
    structure to their parents and peers.
  sports: Victoria Klak is a preschool sports enthusiast who attends weekly toddler swim lessons at the community pool, lines up eagerly for the mini‑soccer game at the local park, and proudly wears a cap
    of the hometown baseball team, the River City Mariners, while quietly cheering for their stuffed‑animal squad during play.
  arts: Victoria Klak is a budding arts lover who spends afternoons doodling Dr. Seuss‑style creatures, sings along to The Wiggles and Raffi, mimics the dance moves from Disney’s Frozen soundtrack, and
    proudly shows off a finger‑painting of a Pixar‑inspired sunrise that they consider a masterpiece.
  travel: Victoria Klak is a tiny traveler who has explored the city’s children’s museum and nearby aquarium on a family weekend, treasured a sunny day at the local beach sand dunes, and dreams of seeing
    the Eiffel Tower in Paris and meeting Disney characters at Disneyland, adventures they eagerly recount during bedtime story time.
  culinary: Victoria Klak is a little foodie who insists on spoon‑feeding the creamy mac and cheese with extra cheddar, loves dipping chicken nuggets in honey‑mustard, delights in strawberry‑banana smoothies,
    and proudly pretends to stir a pot of vegetable soup with a plastic ladle, taste experiments they label as their “gourmet creations.”
  core: Victoria Klak is a meticulous three‑year‑old who arranges toys by color and counts every snack bite, yet bursts into giggly mess whenever a new sticker pack arrives, a quirky contrast to their otherwise
    orderly play.
background:
  cultural: Victoria is a white child growing up in Martinsville, Indiana, a small Midwestern community with strong family and community ties. Her upbringing reflects typical Midwestern values of politeness,
    cooperation, and modest ambition. She participates in local traditions such as the county fair, Fourth of July parades, and holiday celebrations like Thanksgiving and Christmas, often centered around
    family gatherings and community events. The family environment emphasizes early education, kindness, and respect for neighbors, and she is exposed to both urban conveniences and rural touches, such
    as occasional visits to nearby farms or nature walks in the countryside.
