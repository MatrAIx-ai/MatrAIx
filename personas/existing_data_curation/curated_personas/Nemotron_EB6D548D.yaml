personas:
  professional: Jose Martinez, an emerging robotics enthusiast and meticulous LEGO architect, channels his curious yet practical mind into designing functional mechanisms for his school’s robotics club,
    where his methodical planning and love for strategic games enable him to lead small project teams while balancing solo coding experiments in Minecraft.
  sports: Jose Martinez, a midfield dynamo for the U11 community soccer team, thrives on coordinating passes and anticipates opponents’ moves, idolizes the club’s senior side, follows the national league,
    and cheers for his favorite professional team, the LA Galaxy, every weekend.
  arts: Jose Martinez channels his love for storytelling into drawing comic strips that blend everyday school life with characters inspired by folklore, often referencing the legendary La Llorona, and fuels
    his creative bursts while listening to cumbia legends like Los Ángeles Azules and pop hits from artists such as Ariana Grande.
  travel: Jose Martinez favors short, family‑planned road trips to nearby attractions like the state science museum and the coastal boardwalk, and dreams of exploring the ancient ruins of Chichen Itza and
    the vibrant streets of Barcelona, balancing his curiosity for history with the comfort of organized itineraries.
  culinary: Jose Martinez proudly assists in preparing tacos al pastor on weekends, mastering the sweet‑spicy pineapple‑marinated pork and crafting fresh guacamole with cilantro and lime, while also experimenting
    with making his own corn tortillas, reflecting his hands‑on approach to cooking.
  core: Jose Martinez is an organized, curiosity‑driven pre‑teen who balances building robots, sketching folklore comics, and soccer midfield play with a methodical approach to saving allowance and a habit
    of occasionally forgetting to eat breakfast.
background:
  cultural: Jose comes from a Mexican‑American household in Cicero, Illinois, where Spanish is spoken alongside English. His family maintains strong ties to Mexican traditions, celebrating holidays such
    as Dia de los Muertos, Cinco de Mayo, and the Day of the Virgin of Guadalupe. Community gatherings at the local Hispanic cultural center reinforce a sense of identity and mutual support. The neighborhood’s
    vibrant mix of Latin American families provides Jose with a network of peers who share similar cultural values, emphasizing family respect, collective responsibility, and a love for music, food, and
    storytelling. His Catholic upbringing and participation in church events further shape his worldview.
attributes:
  skills: '["Bilingual Spanish–English", "Mathematics problem‑solving", "Basic Scratch and Python coding", "LEGO and simple mechanical building", "Soccer tactics and teamwork", "Time‑management and project
    organization"]'
  hobbies: '["Soccer (midfielder)", "LEGO building", "Robotics club & basic coding", "Minecraft and game design", "Comic drawing (Mexican folklore)", "Family cooking (traditional Mexican dishes)", "Attending
    cultural festivals (Dia de los Muertos, Cinco de Mayo)", "Listening to cumbia and pop music"]'
  career_goals: Inspired by his love for building and problem solving, Jose hopes to become a civil engineer or a software developer who creates games that teach teamwork and cultural stories. He dreams
    of designing bridges or community spaces in Chicago that reflect both practical needs and Mexican heritage. Jose aims to excel in STEM subjects, earn a scholarship for a top high school, and later study
    engineering at university. He also wants to give back to his neighborhood by mentoring younger kids in robotics and cultural activities, combining his practical ambitions with a desire to support his
    community.
