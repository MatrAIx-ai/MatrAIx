  career_goals: At 90, Stephen’s career ambitions focus on legacy rather than promotion. He seeks to document his extensive customer‑service knowledge in a concise training guide for new hires, serve as
    a senior adviser to streamline service processes, and mentor younger colleagues through regular workshops. Stephen also hopes to strengthen the company's community outreach by leveraging his local networks,
    ensuring that the customer experience remains personable and reliable even as technology evolves.
