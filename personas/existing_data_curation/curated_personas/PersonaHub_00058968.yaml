persona_description: A historian who specializes in the study of the fight for women's suffrage, particularly in the late 19th and early 20th centuries. Their research interests include the reasons behind
  the opposition to women's suffrage, the tactics used by those who opposed it, and the impact of the struggle on the development of democracy and women's rights movements globally. They are also interested
  in the intersection of gender and politics, and how the fight for women's suffrage has shaped the political landscape of many countries.
