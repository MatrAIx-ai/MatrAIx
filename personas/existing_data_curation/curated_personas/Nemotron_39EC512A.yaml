personas:
  professional: Ignazio Modine, a 2‑year‑old, shows early signs of a budding engineer, obsessively building and dismantling cardboard towers and wooden blocks, preferring familiar, repeatable structures
    and a practical, hands‑on approach over imaginative play.
  sports: Ignazio Modine loves the toddler gymnastics class at Sunshine Play Center, idolizes the city's minor league baseball team the River Rats, and eagerly joins backyard soccer games with peers, preferring
    routine drills over spontaneous scrimmages.
  arts: Ignazio Modine lights up to the sounds of The Wiggles and Sesame Street, delights in finger‑painting bright blocks reminiscent of Joan Miró, and spends evenings watching classic Disney cartoons,
    shaping a playful artistic identity.
  travel: Ignazio Modine’s family outings focus on day trips to the nearby zoo and beach, and he dreams of seeing the giant pandas at a famed research center after spotting them in picture books, though
    limited daycare schedules keep his adventures short and local.
  culinary: Ignazio Modine prefers soft macaroni‑and‑cheese, mashed banana, and peanut butter‑and‑jelly sandwiches, can expertly spread peanut butter with a plastic knife, and shows a particular fondness
    for bright fruit slices like strawberry and kiwi.
  core: Ignazio Modine is a routine‑loving, playful toddler who oscillates between meticulous block building and spontaneous snack raids, balancing a modest competitive streak with a love for familiar comforts.
background:
  cultural: Ignazio was raised in Mahomet, Illinois, a small Midwestern town with strong community ties and a predominance of white, middle‑class families. His family is of Italian descent, preserving traditions
    such as Sunday family meals, occasional Italian language phrases, and celebration of Catholic holidays like Easter and Christmas. The local culture emphasizes practicality, modesty, and participation
    in community events such as county fairs and church picnics, which shape Ignazio's everyday experiences and values.
