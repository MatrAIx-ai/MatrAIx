    Music Sessions at local venues'', ''Texas BBQ cooking'', ''Design Meetups and networking events'']'
  career_goals: Roy aims to transition from senior designer to design manager within the next three years, overseeing a multidisciplinary team and shaping the strategic direction of product experiences
    at a mid‑size tech firm in Plano. He plans to earn an Adobe Certified Expert credential and complete a professional UX certification to deepen his analytical skill set. In the longer term, he envisions
    launching his own boutique design studio that offers integrated branding and digital design services, leveraging his competitive drive to win regional design awards and attract high‑profile clients.
    Achieving these goals will provide the structure, predictability, and recognized achievement he values while allowing him to mentor emerging designers.
