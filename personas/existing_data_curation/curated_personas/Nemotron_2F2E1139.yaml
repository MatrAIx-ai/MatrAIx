  career_goals: 'Although retired, William aims to stay physically and mentally independent by maintaining his garden and home. He hopes to become a regular volunteer at the local community center, teaching
    basic home‑maintenance skills to younger residents and leading a small storytelling group for seniors. He also wishes to record his life story, preserving the oral history of his family''s journey from
    the Great Migration to the present day. Travel is modest: he wants to visit his children and grandchildren in neighboring states and attend the annual Juneteenth celebration in Nashville.'
