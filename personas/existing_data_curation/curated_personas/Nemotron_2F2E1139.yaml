personas:
  professional: William Sims, a retired handyman with decades of experience in home repair, gardening, and woodworking, now volunteers teaching basic maintenance skills at the community center, blending
    his practical know‑how with a steady, patient teaching style that reflects his love of predictable routines and occasional improvisation.
  sports: William Sims follows the local baseball team on TV, participates in a weekly senior walking group at the community center, and occasionally joins a low‑impact bowling league, all of which complement
    his love of gentle, structured activity.
  arts: William Sims finds solace in classic gospel and blues recordings—from Mahalia Jackson to B.B. King—regularly reads historical novels and biographies, and attends occasional community theater shows
    that celebrate local history, allowing them to stay connected to storytelling and musical heritage.
  travel: William Sims prefers short, purposeful road trips to visit children and grandchildren in neighboring states and to attend the annual Juneteenth celebration in Nashville, planning itineraries just
    weeks ahead and balancing travel with the need to stay within a comfortable physical pace.
  culinary: William Sims delights in cooking Southern comfort dishes like fried catfish, slow‑cooked collard greens, and buttery cornbread, often seasoning with fresh herbs from the garden and serving family
    gatherings where they relish sharing hearty meals.
  core: William Sims blends a lifelong love of practical hands‑on work, quiet song, and garden‑fresh cooking with a steadfast yet flexible approach to life, occasionally letting stubbornness slip into missed
    medication refills and occasional splurges on garden tools.
background:
  cultural: William was born in the early 1940s in a tight‑knit African‑American community in Maury County, Tennessee. His parents were part of the Great Migration era, moving from Mississippi to find work
    in the cotton fields and later in local textile mills. Growing up during segregation, the church served as the central hub of social and cultural life, instilling in him a deep appreciation for gospel
    music, communal support, and oral storytelling. Southern cuisine, especially soul food, shaped his culinary tastes, while community gatherings like church potlucks and neighborhood barbecues reinforced
    values of hospitality and mutual aid. Over the decades, he has witnessed and contributed to the gradual integration of the town, and he remains proud of his heritage, often sharing family recipes and
    stories of the civil‑rights movement with younger generations.
