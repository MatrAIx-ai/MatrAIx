  hobbies: '[''Watercolor painting'', ''Quilting'', ''Community theater'', ''Reading historical fiction'', ''Gardening'', ''Birdwatching'', ''Volunteering at church events'', ''Organizing local art fairs'',
    ''Listening to art and culture podcasts'']'
  career_goals: Nealey aims to advance from a stocker to a supervisory role within the next three years, seeking certification in logistics or supply chain management through a local community college.
    She hopes to lead a team, improve process efficiency, and mentor newer employees. In the longer term, she envisions combining her logistics expertise with her passion for the arts by managing inventory
    for a community arts‑and‑crafts cooperative or opening a small boutique that showcases regional folk art.
