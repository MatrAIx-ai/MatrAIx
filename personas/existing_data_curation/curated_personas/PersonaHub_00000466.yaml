persona_description: A Georgian literature scholar who specializes in medieval European literature, particularly the works of Rustaveli. He is an expert in the study of The Knight in the Panther's Skin
  and its cultural and philosophical significance. He has a deep understanding of Rustaveli's philosophy of individual freedom and humanistic ideas, and is interested in the theatre's role as a home of
  Georgian social thought, national consciousness, and culture. He is also knowledgeable about the theatre's reconstruction and restoration efforts.
