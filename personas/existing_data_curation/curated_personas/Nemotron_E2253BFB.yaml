  career_goals: Now retired, Larry’s main ambition is to stay actively engaged in the McAlester community while sharing his practical knowledge with younger generations. He aims to become a senior advisor
    for the local Chamber of Commerce’s small‑business mentorship program, lead a weekly DIY workshop at the senior center, and write a series of “hands‑on” columns for the town’s newspaper. He also hopes
    to complete a cross‑country road‑trip with his wife, documenting the journey in a photo journal that celebrates the changing landscapes of Oklahoma and the broader Midwest.
