    country music", "DIY home projects"]'
  career_goals: Whitney aims to secure a Commercial Driver's License so she can expand her driving services to include larger passenger vans or shuttle buses, especially for senior citizens in her community.
    She hopes to eventually start a small family‑owned transportation business that offers reliable, scheduled rides to neighboring towns. Additionally, she plans to take a driver safety certification course
    to enhance her qualifications and pursue a supervisory role within the local taxi fleet, ensuring a stable income for her family and contributing to community mobility.
