personas:
  professional: A seasoned taxi driver named Whitney Davis, 35, leverages their intimate knowledge of Jackson’s road network, meticulous route planning, and flawless customer service to deliver reliable
    rides, while they methodically pursue a Commercial Driver’s License and driver‑safety certification to launch a senior‑focused shuttle service and eventually supervise a family‑owned transport fleet.
  sports: Whitney Davis enjoys casual fitness through morning trail walks with their Labrador, roots for the Mississippi Braves baseball team and the New Orleans Saints NFL squad, and participates in a
    local senior‑citizen softball league, embodying their competitive streak while staying active.
  arts: Whitney Davis immerses themselves in classic country music, spinning Dolly Parton and Johnny Cash on their vintage radio while quilting, reads Agatha Christie mysteries, and regularly attends the
    community theater’s monthly productions, melding their love for storytelling, music, and handcrafted art.
  travel: Whitney Davis prefers road‑trip itineraries that blend cultural stops and family visits, having driven the blues trail to New Orleans, explored Savannah’s historic squares, and planning a future
    weekend in the Great Smoky Mountains, all while they budget meticulously and schedule trips around their taxi shifts.
  culinary: Whitney Davis delights in cooking hearty Southern fare—such as fried‑chicken, collard greens, and gumbo seasoned with smoked paprika and cayenne—while they expertly knead biscuit dough, and
    they often exchange recipes during church potlucks, reflecting their nurturing, methodical kitchen style.
  core: A pragmatic, routine‑driven 35‑year‑old taxi driver named Whitney Davis blends meticulous work ethics with Southern hospitality, balancing a love for gardening, quilting, and classic country music
    against a quest for financial stability and community service, all while they navigate occasional health neglect and a competitive edge.
background:
  cultural: Whitney was raised in the rural Appalachian region of Eastern Kentucky, embodying the traditional Southern values of family, community, and self‑reliance. Her white, working‑class background
    is shaped by a close‑knit small‑town culture where church, local festivals, and neighborly support play central roles. She respects the region’s heritage, from its folk music and storytelling to the
    emphasis on practical hard work and modest living.
attributes:
  skills: '["Local navigation", "Safe driving", "Customer service", "Routine vehicle maintenance", "Cash handling", "Digital payment processing", "Daily log record-keeping", "Time management", "Route planning"]'
