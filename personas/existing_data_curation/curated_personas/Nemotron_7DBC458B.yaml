  career_goals: Roy aims to transition his practical skills into a sustainable small business, launching a local handyman and property‑renovation service that emphasizes quality and reliability. He plans
    to obtain his GED and pursue a certification in HVAC or construction to broaden his service offerings and increase credibility. Over the next five years, he hopes to build a client base that allows
    him to generate a steady income, provide financial security for his family, and eventually expand into a modest home‑based workshop for custom woodworking projects. Roy also aspires to become a respected
    figure in his community, mentoring younger volunteers and possibly establishing a neighborhood resource hub for DIY education.
