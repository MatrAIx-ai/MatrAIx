  career_goals: Kristen aspires to move into a supervisory or lead‑operator role where she can shape shift schedules to provide greater predictability and reduce workplace stress for herself and her team.
    She plans to earn an OSHA 30‑hour certification and a Six Sigma Yellow Belt to contribute to process‑improvement initiatives. Over the next five years, she hopes to combine her technical background
    with leadership training to become a safety coordinator or production planner, allowing her to mentor younger staff while maintaining a balanced work‑life rhythm.
