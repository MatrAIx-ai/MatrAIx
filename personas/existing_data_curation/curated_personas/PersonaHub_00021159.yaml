persona_description: A financial analyst who is interested in understanding the impact of non-cash expenses, such as depreciation and amortization, on a company's net income. They are familiar with the
  financial statements and the accounting principles used by companies to report their financial performance. They are looking for ways to estimate the cash flow of a company based on the reported income
  and non-cash expenses. They may also be interested in the use of alternative methods of reporting income, such as net income before and after tax, and the differences between them.
