  career_goals: Vivien aims to continue her reliable service as a cashier while expanding her expertise in emerging payment technologies. She plans to obtain a customer‑service excellence certification
    and take on a part‑time training role to mentor younger colleagues. Looking ahead, she hopes to transition to volunteer work teaching basic budgeting and financial literacy to seniors at a local community
    center, blending her practical curiosity with her desire to foster harmony and support in her community.
