  hobbies: '[''Traditional Mexican Cooking'', ''Herb and Vegetable Gardening'', ''Community Cultural Events'', ''Reading Historical Fiction'', ''Gentle Yoga'', ''Volunteering at Local Food Bank'', ''Listening
