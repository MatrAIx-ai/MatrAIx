  career_goals: Jason aspires to become a leader in community health by establishing a multidisciplinary clinic that blends conventional medicine with arts‑based therapeutic programs. He aims to earn a
    fellowship in integrative medicine, author research on the impact of artistic engagement on patient outcomes, and eventually serve as a medical director who mentors junior physicians and advocates for
    culturally responsive care in underserved Miami neighborhoods.
