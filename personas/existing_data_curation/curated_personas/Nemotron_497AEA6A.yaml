personas:
  professional: Jason Hilbert, a 29‑year‑old primary‑care physician in Miami, leverages their knack for creative problem‑solving and fluent Spanish to blend evidence‑based medicine with arts‑based therapies,
    while juggling patient panels, research on art’s impact on health outcomes, and the dream of a multidisciplinary community clinic.
  sports: Jason Hilbert energizes their evenings playing for the South Beach Beach Volleyball Club, cheers loudly for the Miami Heat and the Miami Dolphins, and hits salsa nights as a lively social sport,
    using the kinetic rhythm to balance their demanding clinical shifts.
  arts: Jason Hilbert channels their inner Pollock in abstract expressionist canvases, draws inspiration from contemporary artists like Julie Mehretu, volunteers at local youth art workshops, and fills
    their downtime attending live jazz at the New World Symphony and exploring exhibitions at the Pérez Art Museum Miami.
  travel: Jason Hilbert, a restless street‑photographer, impulsively books flights to vibrant locales like Barcelona’s La Rambla, Buenos Aires’ La Boca, Marrakesh’s souks, and Tokyo’s Shibuya, capturing
    candid moments while juggling clinic duties and often returning with a fresh gastronomic idea for their kitchen.
  culinary: Jason Hilbert fuses Latin zest and Mediterranean heart in dishes such as cilantro‑lime grilled octopus tacos with tzatziki drizzle, cumin‑infused paella with preserved lemons, and roasted eggplant
    shakshuka, displaying an intermediate cooking skill that shines when they host improvised dinner parties for friends.
  core: Jason Hilbert is a socially vibrant, art‑obsessed physician whose spontaneous spirit paints both their clinic and canvas with equal passion, even if organization sometimes slips through the cracks.
background:
  cultural: Jason is a white American of mixed German‑Scandinavian ancestry, raised in a suburban Midwestern town before moving to Miami for his medical career. Living in a multicultural coastal city has
    broadened his perspective, and he embraces the city’s Cuban, Haitian, and broader Latin influences, which he reflects in his social interactions, language use, and culinary interests while retaining
    the values of his Midwestern upbringing.
