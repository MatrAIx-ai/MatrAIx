persona_description: A historian who specializes in the study of Native American conflicts and treaties, particularly those involving the United States and Native American tribes. Their research interests
  include the causes and effects of conflicts between Native Americans and the United States, the negotiation and enforcement of treaties between Native American tribes and the United States, and the impact
  of these conflicts on Native American societies. They are particularly interested in the Chickamauga Wars, the Cherokee struggle against white encroachment, and the Old Northwest War.
