persona_description: A Wisconsin Department of Natural Resources vegetation specialist who monitors aquatic vegetation in the Mississippi River, including monitoring methods such as fixed transects, stratified
  random point sampling, aerial photos, and interpreting aerial photography for floating leafed, emergent, and terrestrial vegetation. The persona also specializes in the study of aquatic vegetation, including
  the monitoring of wild celery, crowsfoot, arrowhead, wild rice, and purple loosestrife, and has experience interpreting aerial photography for floodplain forest regeneration and tree seedfall.
