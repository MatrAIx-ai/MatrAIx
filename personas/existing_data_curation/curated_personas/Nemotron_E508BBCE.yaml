  hobbies: '[''Acrylic painting'', ''Digital illustration'', ''Photography (portrait and nature)'', ''Visiting art galleries and museums'', ''Reading science, art, and contemporary fiction'', ''Hiking local
    trails'', ''Puzzle solving (crosswords, Sudoku)'', ''Yoga and mindfulness practice'', ''Volunteering at community art workshops'']'
  career_goals: Donna aims to obtain full ARRT certification and pursue advanced credentials in CT and MRI to broaden her clinical expertise. Over the next five years, she plans to earn a bachelor's degree
    in health sciences, positioning herself for a lead technologist or supervisory role where she can influence departmental protocols and mentor new technologists. She is also interested in joining research
    initiatives that explore innovative imaging techniques and hopes to blend her artistic sensibility with her technical work by contributing to medical illustration projects. Ultimately, Donna aspires
    to be recognized as a thought leader in radiologic education within her regional health network.
