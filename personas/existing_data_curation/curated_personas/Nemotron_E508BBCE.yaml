personas:
  professional: Donna Yeoman combines meticulous radiologic technologist expertise in digital X‑ray, CT, and mammography with a natural curiosity and competitive drive, excelling at patient positioning,
    dose optimization, and PACS management while they frequently mentor junior staff and propose workflow improvements that reflect their artistic eye for detail.
  sports: Donna Yeoman stays active through weekend hikes with the Adirondack Trail Hikers, weekly Vinyasa yoga at Rochester Yoga Flow, and occasional intramural softball, while they cheer for the Buffalo
    Bills, Rochester Red Wings, and New York Knicks, reflecting a balanced but slightly competitive approach to fitness.
  arts: Donna Yeoman nurtures their artistic side by painting acrylics inspired by Yayoi Kusama’s vibrant patterns, creating digital illustrations reminiscent of Loish’s stylized characters, capturing black‑and‑white
    portraits in the spirit of Ansel Adams, and volunteering to lead community workshops at the Geneseo Art Gallery, where they regularly discuss contemporary exhibitions with fellow art lovers.
  travel: Donna Yeoman favors a blend of meticulously planned weekend getaways to local state parks like Letchworth Gorge and spontaneous week‑long art pilgrimages to destinations such as Paris’s Musée
    d’Orsay, Kyoto’s Gion district, and Santa Fe’s Canyon Road, balancing a limited vacation budget with a craving for cultural immersion.
  culinary: Donna Yeoman enjoys cooking Mediterranean dishes like grilled eggplant with tahini, spicing up quinoa salads with feta and sun‑dried tomatoes, and unwinding with sushi rolls from the local market,
    often plating meals with the same compositional care they apply to their acrylic canvases.
  core: Donna Yeoman blends a meticulous radiology career with an insatiable artistic curiosity, balancing disciplined financial habits and a competitive edge with occasional wrist‑strain neglect, while
    filling free time with yoga, puzzles, and vibrant brushstrokes.
background:
  cultural: Donna grew up in a small Midwestern town in Illinois, deeply rooted in the region’s values of community, modesty, and a strong work ethic. Her family’s ancestry includes German and Irish immigrants,
    and she was raised with a blend of Protestant traditions and secular community involvement. She cherishes local customs such as the Henry County fair, homemade apple pies, and seasonal outdoor festivals,
    while also embracing a broader worldview fostered by her curiosity about art and new ideas. This cultural tapestry influences her balanced approach to professional responsibility, social interaction,
    and personal creativity.
attributes:
  skills: '[''Digital radiography operation'', ''Computed tomography (CT) scanning'', ''Mammography'', ''Radiation safety and dose optimization'', ''Patient positioning and communication'', ''Medical record
