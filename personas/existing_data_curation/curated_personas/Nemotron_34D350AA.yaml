    society'', ''Attending art fairs and gallery openings'', ''DIY home decor projects'']'
  career_goals: Jynette aims to transition from freelance work to establishing her own boutique design studio focused on serving small‑town businesses and community organizations in Indiana. She envisions
    the studio becoming a hub for sustainable branding, where she mentors emerging designers and collaborates with local artisans. In the longer term, she aspires to take on a senior creative director role
    at a regional agency or teach part‑time design courses at a community college, sharing her blend of practical expertise and innovative curiosity with the next generation.
