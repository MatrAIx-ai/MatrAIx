personas:
  professional: Johnathon Alvarado is an aspiring teen robotics enthusiast who blends his curiosity for Arduino electronics with a practical, methodical approach to building competition robots; they meticulously
    document code yet leave room for spontaneous tinkering during club sessions.
  sports: Johnathon Alvarado spends weekends biking along the D&R Canal towpath and joining pickup basketball games at the local park, cheerfully rooting for the New York Knicks while they balance social
    play with personal fitness goals.
  arts: Johnathon Alvarado sketches weekly comic strips featuring a sarcastic superhero sidekick, drawing inspiration from Stan Lee’s classic Marvel heroes and the graphic novel style of Neil Gaiman’s 'Sandman',
    while they unwind by listening to lo‑fi beats of J Dilla.
  travel: Johnathon Alvarado prefers short road trips to upstate New York’s Finger Lakes and the historic Hudson Valley during school breaks, but dreams of a future adventure to Tokyo’s Akihabara district;
    they plan trips meticulously, balancing cost considerations with a desire for both outdoor biking trails and immersive cultural experiences.
  culinary: Johnathon Alvarado enjoys quick comfort foods like pepperoni pizza and instant ramen with soft‑boiled eggs, experimenting at home with homemade garlic butter noodles and avocado toast, though
    they sometimes overcook the toast while engrossed in Arduino debugging.
  core: Johnathon Alvarado, a 15‑year‑old tech‑savvy dreamer, harmonizes his curiosity for electronics with a love for sketching, balancing social basketball games and mindful journaling to tame his chronic
    worry.
background:
  cultural: Johnathon grew up in Kendall Park, a suburban community in Middlesex County, New Jersey, characterized by a mix of middle‑class families and a diverse neighboring population. His family’s roots
    are primarily European—descendants of Irish and German immigrants—though the local culture reflects the broader multicultural tapestry of New Jersey, exposing him to a variety of cuisines, festivals,
    and perspectives. The suburban environment encourages extracurricular involvement, and the community places a strong emphasis on education and civic responsibility, shaping his cooperative nature and
    desire to contribute positively. While he identifies with mainstream American cultural values, his experiences in a diverse setting have fostered an openness to different ideas and an awareness of social
    dynamics.
