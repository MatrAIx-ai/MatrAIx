  career_goals: Johnathon aspires to attend a specialized high school with a strong STEM focus, aiming to deepen his knowledge of computer science and engineering. He hopes to eventually study computer
    engineering or software development at a university, with a particular interest in creating user‑friendly applications that support mental‑health and stress‑management for teens. His desire to make
    a positive impact on others, combined with his practical mindset, drives him to consider a career where he can blend technical expertise with thoughtful design. He is also open to exploring roles in
    educational technology that help classmates learn more effectively. While his future path feels uncertain, his ambition to stay curious, reliable, and helpful remains constant.
