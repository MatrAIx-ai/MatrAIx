  hobbies: '[''Soccer (playing and watching)'', ''Cooking Mexican cuisine'', ''Fishing along the Pacific coast'', ''Gardening (citrus and vegetable garden)'', ''Participating in local cultural festivals'',
    ''Listening to banda and mariachi music'', ''Volunteer work at community church'', ''Reading historical non‑fiction'', ''DIY woodworking'', ''Traveling to market trade shows'']'
  career_goals: Willie aims to advance to a regional sales director role within the next five years, leading a team of sales representatives and expanding market share for his company throughout the Central
    Coast and beyond. He is focused on integrating e‑commerce solutions and sustainable product lines into his portfolio, positioning the business as a forward‑thinking partner for manufacturers. In the
    longer term, he aspires to launch a consulting practice that helps small‑to‑mid‑size manufacturers improve their sales strategies, while also mentoring aspiring Mexican‑American sales professionals
    to promote greater representation in the industry. Throughout his career progression, he remains committed to maintaining a healthy work‑life balance to support his family and community commitments.
