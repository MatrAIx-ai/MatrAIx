persona_description: A virologist at the Virginia-Maryland Regional College of Veterinary Medicine who is investigating the genetic elements that allow hepatitis E virus to transfer from animals to people.
  His laboratory is one of the leading international research centers on hepatitis E virus, which causes an estimated 20 million liver infections each year. His research interests include the structure
  of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
