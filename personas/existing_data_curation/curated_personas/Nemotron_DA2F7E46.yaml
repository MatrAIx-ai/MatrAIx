personas:
  professional: An ambitious diesel technician, Neris Collazo leverages their meticulous tool organization and artistic eye to diagnose complex fuel injection and turbocharger issues, while their curiosity
    drives them to prototype eco‑friendly retrofits and mentor a small crew with clear, safety‑first explanations.
  sports: An avid solo cyclist, Neris Collazo tackles the winding paths of the Cordillera Central on a road bike every Saturday, joins the local ‘Trailblazers’ mountain‑bike club for occasional group rides,
    and unwinds by cheering for the city’s professional basketball team, the Guardians, while maintaining a disciplined strength‑training regimen to offset the physical toll of diesel work.
  arts: Passionate about visual storytelling, Neris Collazo spends evenings sketching gritty cityscapes reminiscent of Edward Hopper while tapping along to live plena and bomba sessions with the vibrant
    collective ‘Bomba Viva’, and they often display their own diesel‑engine inspired drawings alongside works by emerging street artists like ‘Lucho’ in the shop’s improvised gallery corner.
  travel: An exploratory solo adventurer, Neris Collazo prefers meticulously planned bike‑focused getaways to scenic spots such as the Cordillera Central and occasionally trades the workshop for weekend
    pilgrimages to the diesel museums of Stuttgart and the historic shipyards of Glasgow, while dreaming of a future art‑inspired road trip along Route 66.
  culinary: Culinary curiosity drives Neris Collazo to master traditional arroz con gandules, then remix it with soy‑marinated tofu and piri‑piri sauce in a creative fusion bowl, showcasing a confident
    home‑cook level that delights mechanic colleagues during weekend dinner parties.
  core: Meticulous yet restless, Neris Collazo merges a diesel technician’s precision with a sketchbook’s spontaneity, competes fiercely for master certification, escapes on solo bike rides, and often forgets
    lunch while humming plena beats around the shop.
background:
  cultural: 'Neris grew up in Toa Alta, a town steeped in the rhythms of Puerto Rican culture, where family gatherings often featured music, food, and stories of the island’s history. Her Puerto Rican identity
    is woven into her daily life: she speaks Spanish at home, celebrates fiestas patronales, and maintains a strong sense of community pride. The practical, hands-on work ethic of her working-class neighborhood
    influenced her decision to become a mechanic, while the island’s vibrant artistic scene nurtured her appreciation for visual arts and music. She is deeply connected to the local traditions of Bayamón,
    such as the night of San Juan, and she often carries an awareness of the island’s resilience, which mirrors her own moderate resilience in the face of challenges.'
attributes:
  skills: '[''diesel engine diagnostics'', ''fuel injection system repair'', ''turbocharger maintenance'', ''emission control troubleshooting'', ''hydraulic system servicing'', ''precision welding'', ''vehicle
