  hobbies: '[''sketching urban and mechanical subjects'', ''solo mountain biking'', ''listening to and playing plena/bomba music'', ''attending small live music sessions'', ''collecting vintage diesel manuals'',
    ''building model engine kits'', ''cooking traditional Puerto Rican dishes'', ''exploring local art galleries'', ''reading automotive innovation articles'']'
  career_goals: She aims to become a Certified Master Diesel Technician, earning ASE Advanced Diesel certification and specialized training from major manufacturers like Cummins and Mack. Within five years,
    she envisions leading a fleet maintenance department for a municipal transit authority, overseeing a team of mechanics while introducing eco-friendly diesel technologies and predictive maintenance analytics.
    Ultimately, she hopes to open her own boutique diesel-service shop that integrates a small gallery space where local artists can display work, reflecting her love for art and unconventional thinking.
