persona_description: A Catholic scholar or historian who is interested in the history and theology of the Catholic Church, particularly the interpretations of key figures such as St. John Paul II, Pope
  Francis, and St. Augustine. They are also knowledgeable about the history and significance of the Cross, the symbol of the Catholic faith, and the use of the Latin words Iesus Nazarenus Rex Iudaeorum
  on it. They are likely to be familiar with the thirteenth century origin of the use of the Latin words on the Cross and the significance of the Cross in Christian symbolism and theology.
