personas:
  professional: Bernard Noegel, an aspiring junior robotics enthusiast, channels his curiosity and competitive spirit into building simple programmable LEGO robots at his after‑school STEM club, often improvising
    solutions on the fly while occasionally missing deadlines due to his spontaneous nature.
  sports: Bernard Noegel thrives on the soccer field with the local Parkside Tigers youth league, cheering for Manchester United while always aiming to score the winning goal during weekend matches at the
    neighborhood park.
  arts: Bernard Noegel channels his love for storytelling into building elaborate LEGO worlds and performing quick magic tricks for classmates, while his playlists feature Imagine Dragons and the soothing
    Minecraft soundtrack by C418 that fuel his imagination.
  travel: Bernard Noegel's travel dreams oscillate between exploring the towering redwoods on family hikes in the Pacific Northwest and visiting Disney World, where he imagines stepping into the real‑life
    adventures of his Magic Tree House books.
  culinary: Bernard Noegel enjoys devouring pepperoni pizza and crafting easy snack towers of macaroni and cheese topped with sliced apples, yet his kitchen experiments often end with a chaotic blend of
    sauce and LEGO bricks strewn across the counter.
  core: Bernard Noegel is a curious, talkative eight‑year‑old who balances a love for building, competition, and spontaneous fun with occasional forgetfulness and a knack for turning everyday moments into
    mini‑performances.
background:
  cultural: Bernard was raised in Spartanburg, South Carolina, a suburban community with strong Southern hospitality and close‑knit neighborhoods. His family participates in local church gatherings, enjoys
    community events such as the annual Spartanburg County Fair and high‑school football games, and shares Southern culinary traditions like barbecue and peach cobbler. The regional emphasis on outdoor
    recreation, friendly competition, and social interaction shapes his daily life and outlook.
