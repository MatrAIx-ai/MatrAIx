persona_description: A mathematician by training, an artist by vocation, and a draughtsman of skill, who has spent years walking and surveying the rugged landscape of the Aran Islands, Ireland, to create
  a two-volume study of the islands, a local epic that would be accompanied by a new map of the islands that he would survey and draw. His work is at once territorially specific and mythic, tracing the
  history, lore and myth of each littoral feature, and exploring the difficulties and rewards of dwelling in a place that is both blessed and broken. His writing is rich with clandestine places, runnels,
  valleys, crevasses, dens, hollows, gulleys, and the vast, involuted surface area of a coastline or a lung's interior. His prose is polished and contains an enormous complexity of thought, matched by the
  ancient oral culture of the Aran Islands, and his patient, generous record-keeping.
