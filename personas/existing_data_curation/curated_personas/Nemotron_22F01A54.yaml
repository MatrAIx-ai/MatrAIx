personas:
  professional: Dina Poppell, a 37‑year‑old manicurist‑pedicurist in Elgin, blends precise acrylic techniques with a humanities‑inspired eye for colour and composition, and they deliver calming, art‑rich
    sessions that reflect their organized, compassionate nature and their curiosity for literary motifs.
  sports: Dina Poppell follows the Carolina Panthers on Sundays, participates in the weekly community walking club at the Kershaw County park, and enjoys casual paddle‑boarding on Lake Wateree during summer,
    preferring low‑impact, social activities over intense competition and they find the rhythm of these pursuits soothing for their anxiety.
  arts: Dina Poppell engages with the arts by attending intimate folk‑music concerts featuring Old Crow Medicine Show, drawing inspiration from poet Ocean Vuong’s lyricism while sketching botanical illustrations
    reminiscent of Georgia O'Keeffe, and they channel this creative energy into intricate nail designs that serve as personal storytelling canvases.
  travel: Dina Poppell indulges their wanderlust with weekend trips to Charleston’s historic district, sunrise hikes in the Blue Ridge Mountains, and a cherished pilgrimage to Kyoto’s tea gardens, and they
    dream of exploring the lavender fields of Provence during a future sabbatical, balancing budget‑conscious itineraries with occasional splurges on boutique stays.
  culinary: Dina Poppell reimagines classic comfort food by infusing shrimp and grits with rosemary‑infused olive oil and citrus zest, crafting beet‑root infused sweet tea, and layering collard greens with
    smoked paprika and toasted pecans, and they experiment with plant‑based nail polish recipes that echo the flavors of peach cobbler, reflecting a culinary curiosity that blends tradition with modern
    twists.
  core: Dina Poppell is a methodical, art‑driven nail therapist who channels their deep empathy and anxiety‑fuelled creativity into a soothing boutique‑style salon experience, balancing meticulous budgeting
    with occasional splurges on vintage curiosities, and they constantly seek new ways to blend therapeutic care with artistic expression.
background:
  cultural: 'Dina Lynn Poppell grew up in the tight‑knit rural community of Kershaw County, South Carolina, where Southern hospitality, modesty, and a strong sense of place are woven into daily life. Raised
    in a working‑class family that attended a local Methodist church, she experienced community gatherings such as church socials, church‑yard picnics, and county festivals like the Strawberry Festival,
    which fostered her early appreciation for shared traditions and collective harmony. While her formal education in arts and humanities exposed her to a broad spectrum of cultural narratives, literature,
    and visual arts, she retained a deep connection to her Southern roots—cherishing regional cuisine, folk music, and the slower, reflective pace of small‑town living. This dual exposure cultivated an
    open‑minded yet grounded worldview: she values the comforts of familiar customs while actively seeking unconventional ideas and artistic expressions. Her cultural identity also informs her compassionate
    approach to service, emphasizing respect, empathy, and a desire to create inclusive, welcoming spaces for all clients.'
attributes:
  skills: '[''Nail shaping and filing'', ''Cuticle care and skin health'', ''Acrylic, gel, and dip powder application'', ''Free‑hand and air‑brush nail art'', ''Colour theory and design composition'', ''Sanitation
    and OSHA compliance'', ''Client consultation and emotional support'', ''Hand and foot massage with aromatherapy'', ''Small business management (scheduling, inventory, bookkeeping)'', ''Social media
    marketing for a boutique salon'', ''Mental‑health first‑aid certification'']'
  hobbies: '[''Botanical sketching and painting'', ''Reading contemporary fiction, poetry, and art history'', ''Journaling for emotional processing'', ''Yoga and guided meditation'', ''Hiking local nature
    trails'', ''Cooking Southern-inspired dishes with creative twists'', ''Listening to folk and acoustic music'', ''Attending small art fairs and community events'', ''Participating in a book club'', ''Volunteering
    to teach nail‑care workshops'', ''DIY jewelry making'', ''Collecting vintage postcards'']'
  career_goals: Dina aims to transform her current practice into a boutique studio that merges artistic nail design with a therapeutic atmosphere. Over the next three years she plans to secure a dedicated
    storefront in Kershaw County where she can offer private, low‑light rooms for clients with anxiety, incorporate gentle music, and provide optional guided breathing sessions during services. She is pursuing
    advanced certification in master‑level nail art and intends to develop a signature line of non‑toxic, plant‑based nail polishes inspired by South Carolina’s native flora, such as the Carolina jasmine
    and dogwood. Additionally, Dina hopes to host monthly workshops that teach both nail‑art techniques and basic self‑care practices to small groups, especially seniors and teenagers. She dreams of publishing
    a visual journal that documents her artistic explorations and reflections on mental well‑being, and of contributing tutorials to an online platform that promotes creative expression as a pathway to
    emotional resilience.
