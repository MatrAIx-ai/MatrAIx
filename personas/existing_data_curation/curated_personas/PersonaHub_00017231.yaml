persona_description: A SAP Product Cost Controlling Specialist who is responsible for managing the process of costing materials in a manufacturing facility. This person is skilled in understanding and implementing
  the costing levels, determining the sequence of costing multiple materials, and ensuring that the costs are accurately reflected in the product cost. They are also proficient in using the system to roll
  up the costs to the next level and to absorb overheads. They are able to effectively segregate errors by costing level, and are skilled in troubleshooting and error analysis. Additionally, they have experience
  with the process of costing materials at the same time and have a deep understanding of the activities that are costed during the costing process.
