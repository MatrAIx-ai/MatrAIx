  hobbies: '[''Organizing school club events'', ''Playing intramural soccer'', ''Volunteering at the community center'', ''Baking and experimenting with new recipes'', ''Solving puzzles (Sudoku, escape‑room
    games)'', ''Digital photography'', ''Reading contemporary YA fiction'']'
  career_goals: Teresa plans to pursue a bachelor’s degree in Business Administration with a focus on Operations and Supply Chain Management at a university in Pennsylvania. She aims to secure internships
    in logistics or project coordination to apply her planning skills, then obtain a full‑time role as a logistics analyst or project manager. Over the next decade, she hopes to advance to a senior operations
    leadership position, while also volunteering to organize community events and mentorship programs for high‑school students.
