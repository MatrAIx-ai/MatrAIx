personas:
  professional: Teresa Hay is a budding operations enthusiast who channels their Excel wizardry, basic Python scripting, and certified first‑aid expertise into flawlessly coordinating campus clubs and community
    events, a skill set they intend to translate into a logistics analyst role after completing their Business Administration degree.
  sports: Teresa Hay energizes their week by playing intramural soccer for the University’s Panthers club, cheering on the Pittsburgh Steelers on Sundays, and following the Penguins’ playoff run, all while
    incorporating morning jogs along the Three Rivers Trail to stay fit.
  arts: Teresa Hay captures Pittsburgh’s industrial charm through digital photography, fuels their creative downtime with the indie folk sounds of The Avett Brothers and the cinematic storytelling of Greta
    Gerwig’s films, and unwinds by devouring contemporary YA novels such as "The Hate U Give" and "They Both Die at the End."
  travel: Teresa Hay prefers structured weekend getaways, having explored the historic neighborhoods of Boston and the scenic vistas of the Allegheny National Forest, while they dream of a summer backpack
    trip through Ireland’s coastal towns and a cultural immersion in Dublin’s literary pubs, balancing travel costs with careful budgeting.
  culinary: Teresa Hay delights in baking, perfecting blueberry muffin batches with fresh lemon zest and a dash of vanilla, while also mastering a quick pizza dough that they top with pepperoni and smoked
    mozzarella, and they often pair their creations with a cup of Earl Grey tea for community gatherings.
  core: Teresa Hay blends meticulous planning with a vibrant social spirit, turning every club meeting, bake sale, and photo shoot into a well‑orchestrated celebration of community and personal growth.
background:
  cultural: Teresa comes from a multigenerational white family with roots in German and Irish immigrant communities that settled in the Pittsburgh region. Growing up in Allegheny County, she was immersed
    in the city’s blend of industrial heritage and vibrant cultural scene, attending local public schools and participating in community festivals. Her family values emphasize education, hard work, and
    community service, and she celebrates traditional American holidays alongside occasional heritage customs such as St. Patrick’s Day gatherings. This background has shaped her pragmatic outlook, strong
    sense of civic responsibility, and appreciation for the diverse neighborhoods of Pittsburgh.
attributes:
  skills: '[''Event planning and coordination'', ''Public speaking'', ''Organizational tasks (scheduling, time management)'', ''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Basic Python coding'',
