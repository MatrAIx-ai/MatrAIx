  career_goals: Jonathan aims to transition from senior development to a principal architect role where he can shape the technology roadmap for a mid‑size Texas‑based startup or a community‑focused tech
    hub. He wants to champion the integration of artistic design principles into software products, creating experiences that resonate culturally. Long‑term, he envisions founding a mentorship program that
    pairs experienced developers with emerging talent from under‑represented Hispanic communities, and potentially stepping into a CTO position that balances technical excellence with social impact. He
    also hopes to author a series of technical articles that explore unconventional problem‑solving approaches, reflecting his competitive and skeptical mindset.
