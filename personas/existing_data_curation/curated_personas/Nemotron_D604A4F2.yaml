personas:
  professional: Jonathan Llanio, a 52‑year‑old senior software developer with three decades of full‑stack, cloud‑native expertise, leads agile teams by translating complex micro‑services architectures into
    clear, art‑inspired UI designs, thrives on the podium of tech meetups where they channel a talkative, competitive nature into lively code reviews and skeptical scrutiny of every performance metric.
  sports: Jonathan Llanio, an avid hiker with the Hill Country Hiking Club, tackles Enchanted Rock trails on weekends while cheering for Austin FC and the Texas Rangers, participates in a local recreational
    soccer league for fun competition, and runs occasional 5K charity races to blend fitness with community spirit.
  arts: Jonathan Llanio strings an acoustic guitar to improvise over traditional Mexican folk motifs, snaps photos of Banksy‑style murals during gallery hops, crafts immersive VR art installations in Unity,
    and draws inspiration from the sci‑fi worlds of William Gibson and the soulful blues of Gary Clark Jr., weaving these influences into a personal aesthetic that informs both their code and their cooking.
  travel: Jonathan Llanio plans road‑trip itineraries through the Texas Hill Country using TripIt, has explored Santa Fe’s art districts and Mexico City’s markets for culinary research, dreams of strolling
    Barcelona’s Park Güell and Tokyo’s Akihabara for tech and design inspiration, but balances these ambitions with family obligations that favor short, budget‑conscious getaways.
  culinary: Jonathan Llanio whips up mole poblano with pasilla, mulato, and chocolate, simmers hearty pozole, folds masa‑filled tamales, and seasons them with fresh cilantro, lime, and roasted chilies,
    while also mastering brisket rubs and guacamole, proudly showcasing dishes at family gatherings and occasionally experimenting with mole ramen fusion after a night of coding.
  core: Jonathan Llanio, a competitive senior tech veteran who never misses a chance to riff on a guitar, hike a ridge, or dominate a chess board, channels that restless curiosity into art‑infused software
    while juggling late‑night VR experiments and a disciplined, yet occasionally indulgent, financial strategy.
background:
  cultural: Jonathan was raised in a bilingual Mexican‑American household in Texas, celebrating both Día de los Muertos and Thanksgiving with equal enthusiasm. His parents instilled a strong sense of family,
    community, and respect for Mexican culinary traditions, which he continues to practice through weekend cooking sessions and holiday gatherings. Fluent in Spanish and English, he bridges cultural gaps
    by volunteering at local schools to teach coding in both languages, promoting digital literacy among Hispanic youth. He actively participates in community festivals, such as Fiesta San Antonio and Boerne's
    Pioneer Days, where he contributes his tech expertise to enhance event experiences through interactive installations and mobile apps. His cultural identity informs his collaborative style, emphasizing
    relationship‑building while maintaining a healthy competitive edge.
