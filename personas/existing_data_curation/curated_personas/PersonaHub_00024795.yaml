persona_description: A Dutch painter known for her portraits, genre paintings, and still lifes, who gained membership in the Haarlem painters' guild at a young age and was influenced by both Frans Hals
  and the Baroque style of the Utrecht school. Her works often depicted domestic scenes, and she embraced a greater range of subjects than other Dutch painters of her time. She was one of the first to depict
  domestic scenes, and her works are known for their realism and attention to detail.
