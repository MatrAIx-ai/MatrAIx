  career_goals: While she is retired from formal employment, Destiny remains driven to leave a lasting imprint on her neighborhood. Her primary ambition is to launch a monthly intergenerational art workshop
    at the local community center, where seniors can share quilting and storytelling skills with youth. She also aims to complete a handwritten memoir that weaves her family's Great Migration story with
    reflections on Chicago’s cultural evolution, and to publish selected chapters online as a digital archive. Additionally, Destiny hopes to secure a small grant from a Chicago heritage foundation to fund
    art supplies and to become a certified volunteer mentor for at‑risk teenagers, offering guidance on college preparation and personal development. Learning to create short documentary videos on her tablet
    is another modest goal, allowing her to preserve oral histories of longtime residents.
