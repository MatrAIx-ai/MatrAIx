    (English, Mandarin)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Street‑art photography'', ''Sketching urban architecture'', ''Playing acoustic guitar'', ''Reading contemporary fiction and philosophy'', ''Practicing
    tai chi'', ''Meditation for anxiety management'', ''Hiking local nature trails'', ''Cooking traditional Chinese dishes'', ''Collecting vintage vinyl records'']'
  career_goals: Yuzhen aims to formalize his supervisory experience by earning a Construction Management certification and eventually stepping into a project manager role overseeing larger commercial developments.
    He dreams of leading projects that fuse sustainable building techniques with thoughtful design, and eventually establishing his own boutique construction firm that emphasizes artistic craftsmanship
    and environmentally responsible practices. Parallel to his professional growth, he is committed to developing better emotional resilience through mindfulness training, to create a supportive and harmonious
    workplace for his crew.
