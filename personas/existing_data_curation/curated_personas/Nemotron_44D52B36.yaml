  career_goals: He aims to transition from a secretary/administrative assistant role to an office manager or senior executive assistant position within the next three to five years, overseeing a small team
    and shaping operational policies. Gerardo plans to complete his bachelor's degree in Business Administration, leveraging his curiosity to study organizational behavior and lean management. He also hopes
    to champion cultural initiatives at his workplace, such as organizing Mexican heritage celebrations and diversity workshops, aligning his career growth with his passion for art and community.
