personas:
  professional: Cleao Li, a budding junior botanist who spends preschool recess exploring the school garden and cataloguing leaf shapes, channels their curiosity and love of organization into a tiny notebook,
    and they delight peers with enthusiastic explanations.
  sports: Cleao Li, a lively member of the Sunny Days Little Soccer Club who loves kicking the ball at Saturday practices, proudly chants for the local Major League baseball team the Seattle Mariners, and
    they balance the excitement of watching cartoons about gymnastics with a weekly gymnastics class at the community center.
  arts: Cleao Li, an enthusiastic little artist who dabs finger paints inspired by Eric Carle’s bright collages, sings along to The Wiggles and Disney’s Frozen soundtrack, and they can recite the rhyme
    of "Twinkle, Twinkle, Little Star" while drawing intricate crayon mandalas for friends.
  travel: Cleao Li, an eager explorer who prefers road trips with a stuffed giraffe companion, has visited the city zoo, the nearby beach, and Disneyland in California, and they dream of a future family
    vacation to the Great Wall, planning each journey with a hand-drawn map and a stack of stickers.
  culinary: Cleao Li, a budding kitchen helper who loves helping stir macaroni-and-cheese with cheddar, assembles peanut-butter-and-jelly sandwiches with perfect symmetry, and they savor carrot sticks dipped
    in ranch while proudly sprinkling a pinch of cinnamon on their oatmeal.
  core: Cleao Li, a talkative, harmony-seeking five-year-old who balances meticulous toy organization with spontaneous dance parties, remains unusually calm under pressure, and they occasionally forget
    to put away crayons, leaving a rainbow trail across the living room.
background:
  cultural: Cleao is raised in an American Indian family in Las Cruces, New Mexico, where her parents blend traditional tribal values with modern life. Her household honors community harmony, respect for
    the land, and storytelling as a way to pass down heritage. She learns basic phrases of her tribe's language, enjoys traditional songs during cultural events, and participates in crafts like beadwork
    that connect her to her ancestors while growing up in a diverse Southwestern community.
attributes:
