  hobbies: '[''drawing and coloring'', ''listening to and retelling storybooks'', ''singing and dancing to music'', ''collecting leaves, rocks, and observing insects'', ''cooperative games with peers'',
    ''participating in family cultural gatherings'', ''making simple bead crafts'']'
  career_goals: Inspired by her love of art and helping others, Cleao often dreams of becoming an artist who paints stories from her family's heritage, a teacher who shares knowledge with kindness, or a
    community helper like a pediatric nurse who cares for children. She imagines one day using her creative voice to celebrate and preserve her tribe's traditions while making people smile.
