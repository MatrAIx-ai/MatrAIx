personas:
  professional: An experienced secondary school teacher, Benjamin Salais, leverages three decades of curriculum design, data-driven assessment, and technology integration to create structured, predictable
    learning environments, reflecting their methodical personality and commitment to community mentorship.
  sports: An avid hiker, Benjamin Salais joins the Spokane Hiking Club for seasonal trail walks, follows the Spokane Indians baseball team and the Seattle Seahawks, and plays weekly pickleball at the senior
    center, balancing low‑impact fitness with community camaraderie.
  arts: A dedicated reader and amateur photographer, Benjamin Salais enjoys the historical works of Stephen J. Stein, the folk melodies of John Denver, the paintings of Andrew Wyeth, and attends performances
    at the Spokane Civic Theatre, where they occasionally volunteer backstage.
  travel: A planner by nature, Benjamin Salais prefers organized road trips that blend natural beauty with historic sites, having explored the Columbia River Gorge, the historic town of Leavenworth, and
    the battlefields of Gettysburg, while dreaming of a guided tour of the Scottish Highlands.
  culinary: A garden‑to‑table enthusiast, Benjamin Salais regularly prepares roasted vegetable ratatouille with heirloom tomatoes, zucchini, and fresh rosemary, bakes apple‑cinnamon crumble pies, and delights
    in smoked salmon with dill, showcasing moderate cooking skills and a love for seasonal ingredients.
  core: Benjamin Salais is a structured, community‑oriented educator who balances meticulous planning with a quiet love for gardening, history, and steady, low‑stress living.
background:
  cultural: Benjamin is a white American raised in the Midwestern United States before relocating to Spokane, Washington. His cultural upbringing emphasizes self-reliance, community service, and a respect
    for the natural environment characteristic of the Pacific Northwest. As a member of the Baby Boomer generation, he values hard work, punctuality, and structured institutions. His widowed status has
    deepened his appreciation for family traditions and local community ties, leading him to engage in neighborhood events, local historical societies, and intergenerational mentorship.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Formative Assessment'', ''Summative Assessment'', ''Educational Technology Integration'', ''Mentorship'',
    ''Grant Writing'', ''Data-Driven Instruction'', ''Professional Development Facilitation'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''Historical Non-Fiction Reading'', ''Hiking'', ''Nature Photography'', ''Chess'', ''Library Literacy Volunteering'', ''Community After-School Program Development'',
    ''Yoga'', ''Journaling'']'
  career_goals: As he approaches retirement, Benjamin aims to transition into a part-time educational consultant role, helping district schools streamline curriculum and implement evidence-based instructional
    practices. He plans to pursue a master's degree in Educational Leadership to qualify for a school-wide advisory position, with a focus on mental-health supports for teachers and students. He also aspires
    to develop a community-based after-school program that pairs high-school seniors with middle-school students for project-based learning, reflecting his desire to leave a structured, lasting impact on
    Spokane's education ecosystem.
