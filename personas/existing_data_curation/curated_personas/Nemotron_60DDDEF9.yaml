  career_goals: Eric aims to complete his associate degree in health sciences and earn certification as a nursing aide, eventually pursuing a registered nursing license with a focus on geriatric and palliative
    care. He hopes to blend his caregiving expertise with his passion for the arts by developing a community‑based art‑therapy program for homebound seniors. Long‑term, he dreams of launching a small home‑health
    agency that offers holistic, creativity‑driven services, and he also envisions authoring a guidebook on integrating artistic activities into patient care.
