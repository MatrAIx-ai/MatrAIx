  hobbies: '[''sketching'', ''digital illustration'', ''DIY metal and wood projects'', ''decorative wall hangings'', ''functional furniture making'', ''beach walks'', ''classical music listening'', ''yoga'',
    ''reading design and architecture books'', ''cooking Mexican cuisine'', ''exploring new recipes'']'
  career_goals: Hilda aims to advance from a floor assembler to a lead fabricator or production supervisor, overseeing a small team and driving process improvements on the assembly line. She plans to earn
    a certified welding specialist credential and complete her associate’s degree in industrial design, positioning herself for a transition into product development where she can integrate her artistic
    curiosity with technical expertise. Long‑term, she envisions launching a boutique studio that creates custom metal art and functional sculpture pieces, blending Mexican artisanal traditions with modern
    fabrication techniques.
