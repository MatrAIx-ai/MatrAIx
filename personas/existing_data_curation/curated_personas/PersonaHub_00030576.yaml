persona_description: 'A fire service professional who prioritizes their health and wellness, recognizes the increased risk of cancer and suicide among firefighters, and seeks out courses and programs to
  improve their mental health and physical well-being. This person is knowledgeable about the unique stressors faced by firefighters, the importance of proper PPE and decontamination techniques, and the
  need for mental health assistance in the fire service. They are likely to be interested in courses like Firefighter Cancer: Prevention and Health, Firefighter PTSD (NFPA 1500), and Fire Rehab: Protocols
  for Rehab, and they appreciate the importance of establishing specific protocols for firefighter rehab and who should do it.'
