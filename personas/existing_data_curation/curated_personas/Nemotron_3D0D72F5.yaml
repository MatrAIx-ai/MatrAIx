personas:
  professional: Dianne Berube, a 32‑year‑old electrician known for their precise conduit‑bending, meticulous blueprint reading, and rigorous safety inspections, combines a competitive drive with a skeptical
    eye to verify every detail while leading project schedules that consistently meet tight deadlines.
  sports: Dianne Berube, a regular participant in the Burlington County community yoga class, follows the New Jersey Devils in the NHL and the Philadelphia Eagles in the NFL, and spends Saturday mornings
    on a local hiking club trail to balance their competitive edge with structured cardio.
  arts: Dianne Berube, who unwinds by listening to classic rock icons like The Rolling Stones and Fleetwood Mac while leafing through how‑to electrical books, occasionally attends performances at the Paper
    Mill Playhouse and curates a small collection of vintage circuit board art prints for their workshop.
  travel: Dianne Berube, who prefers meticulously planned weekend getaways, often visits eco‑focused destinations such as Portland, Oregon’s solar farms or the historic gardens of Savannah, Georgia, while
    keeping an eye on budget constraints that support their future independent contracting business.
  culinary: Dianne Berube, a precise baker who measures each gram of flour for their sourdough starter, loves the crisp crust of a classic ciabatta, and flavors their meals with rosemary, thyme, and caramelized
    onions, yet refuses to experiment beyond the recipe, finding comfort in the predictable results.
  core: Dianne Berube, a 32‑year‑old methodical electrician whose competitive perfectionism fuels a thriving career while their anxiety and love for routine drive them to seek order in everything from wiring
    schematics to sourdough loaves.
background:
  cultural: Dianne grew up in a middle‑class, predominantly white suburban community in New Jersey. Her family emphasized hard work, self‑reliance, and the value of skilled trades, which guided her decision
    to pursue an apprenticeship in electrical work after high school. The local culture in Burlington County, with its strong emphasis on community safety and practical problem‑solving, reinforces her traditional,
    routine‑oriented mindset. She identifies with mainstream American cultural values, such as punctuality, responsibility, and a respect for established norms, while also appreciating the diverse perspectives
    present in her county's working‑class neighborhoods.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical installations'', ''Blueprint reading'', ''NEC compliance'', ''Conduit bending'', ''Electrical troubleshooting'', ''Safety inspections'', ''Project
