  hobbies: '[''Salsa and merengue dancing'', ''Hiking in Saguaro National Park'', ''Live music concerts'', ''Volunteer food drives and community festivals'', ''Competitive video gaming'', ''Cooking Mexican
    and fusion dishes'', ''Social‑media trend scouting'', ''DIY crafts'', ''Mystery novels'', ''Yoga and meditation'']'
  career_goals: Raquel aims to finish a bachelor’s degree in Marketing or Business Administration while continuing to explore emerging digital‑marketing trends. Her short‑term goal is to secure an internship
    or entry‑level position as a social media coordinator or brand assistant for a lifestyle brand that resonates with Hispanic youth, allowing her to blend creativity, community interaction, and analytical
    work. She also dreams of launching a boutique online shop featuring handcrafted, Mexican‑inspired accessories, giving her the flexibility she values. Long‑term, she hopes to advance into a brand strategist
    or community‑engagement manager role, where she can lead campaigns, mentor teams, and shape brand identity, while also developing personal resilience and mental‑health awareness through continued education
    or certification in counseling.
