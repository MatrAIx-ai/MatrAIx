personas:
  professional: Lida Torres is an aspiring interactive storyteller who blends coding, digital drawing, and folkloric motifs to craft simple games and narrative apps for school projects, reflecting her curiosity
    and organized yet flexible work style.
  sports: Lida Torres enjoys cheering for the San Jose Earthquakes during weekends and is a member of her middle‑school track club, where she runs the 800‑meter dash to stay active, though she admits to
    skipping practice when homework loads feel overwhelming.
  arts: A passionate visual creator, Lida Torres spends free time sketching watercolor scenes of cacti and Día de los Muertos altars, designs papel picado for community festivals, and draws inspiration
    from indie pop artist Clairo and classic mariachi group Mariachi Vargas de Tecalitlán.
  travel: Lida Torres dreams of exploring the vibrant streets of Oaxaca to study traditional tilework, has visited the nearby Monterey Bay Aquarium on a class field trip, and prefers day‑trip road trips
    with family over long solo vacations because of her need for familiar support.
  culinary: Lida Torres loves helping her family prepare tamales and pozole during holidays, experiments by adding avocado and lime to homemade guacamole, and enjoys cooking simple ramen bowls when she
    craves instant comfort food after stressful school days.
  core: Lida Torres is a curious teen who fuses coding with folk art, saves diligently for creative tools, battles daily worries with sketchbooks, and finds balance between community festivals and school
    deadlines.
background:
  cultural: Lida’s Mexican heritage is a vibrant part of her identity. She grew up speaking both Spanish and English at home, celebrating holidays such as Día de los Muertos, Cinco de Mayo, and family reunions
    with traditional foods like tamales and pozole. Her family maintains close ties to the Mexican‑American community in the Bay Area, often attending cultural festivals at the Mexican Cultural Center in
    San Jose. Lida has learned folk art techniques like papel picado, talavera tile motifs, and traditional embroidery, which she incorporates into her own artwork. This bicultural upbringing gives her
    a deep appreciation for the fusion of traditional Mexican aesthetics and contemporary American culture, influencing both her creative expression and her desire to represent diverse stories in her future
    career.
attributes:
  skills: '["Digital illustration (Procreate, Photoshop)", "Traditional drawing and watercolor", "Basic Python programming", "Bilingual communication (Spanish & English)", "Project organization and time
