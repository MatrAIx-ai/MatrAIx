  hobbies: '["Digital drawing and illustration", "Watercolor painting", "Middle school coding club (Python)", "Playing guitar", "Listening to indie and Mexican folk music", "Creating papel picado for cultural
    events", "Cooking traditional Mexican dishes with family", "Reading graphic novels", "Journaling for self‑reflection", "Volunteering at community art programs"]'
  career_goals: Lida aspires to blend her love of art with technology by pursuing a career as a concept artist or UI/UX designer for interactive media. She hopes to attend a high‑school arts magnet program,
    then study visual communication or game design at a university, eventually creating inclusive digital experiences that reflect her Mexican heritage. Alongside her artistic ambitions, she wants to develop
    skills in mental‑health advocacy, aiming to mentor younger students and promote stress‑relief practices in school art clubs. In the longer term, she envisions establishing a community studio where local
    youth can explore both traditional Mexican crafts and modern digital art.
