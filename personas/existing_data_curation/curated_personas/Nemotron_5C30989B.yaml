  career_goals: Ream aims to advance within the facilities management field by attaining a supervisory role at her cleaning company. She plans to complete a Certified Occupational Safety and Health Administration
    (OSHA) training program and a Green Cleaning certification to enhance her expertise in sustainable practices. Long‑term, she hopes to become a lead facilities coordinator, overseeing a team of cleaners,
    implementing efficiency improvements, and possibly mentoring new staff. Eventually, she envisions starting a small, family‑run cleaning business that emphasizes eco‑friendly methods and serves the local
    community.
