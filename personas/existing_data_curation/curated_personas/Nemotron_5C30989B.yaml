personas:
  professional: Ream Choe is a meticulous janitorial professional who leverages their systematic floor‑care expertise, bilingual communication, and safety‑first mindset to keep commercial spaces spotless,
    while methodically charting a path toward a supervisory role by pursuing OSHA and Green Cleaning certifications.
  sports: Ream Choe enjoys daily sunrise walks along the nearby shoreline, participates in a community beach‑volleyball league each summer, practices gentle yoga on weekends, and cheers for the local Dodgers
    while keeping a modest step‑count goal of 10,000 per day.
  arts: Ream Choe unwinds by binge‑watching Korean dramas like ‘Crash Landing on You’ starring Hyun Bin and Son Ye‑jin, attending local Buddhist cultural performances featuring traditional drumming, and
    channeling creativity into knitting scarves while admiring the cinematic works of Bong Joon‑ho.
  travel: Ream Choe plans trips with the same precision as a cleaning roster, favoring family‑friendly beach getaways such as Hoi An’s riverfront, the coastal town of Da Nang, and the Pacific Northwest’s
    San Juan Islands, while also penciling in cultural pilgrimages to Kyoto’s temples and occasional weekend road trips to Santa Barbara, always booking accommodations and transport weeks in advance to
    stay within a modest budget.
  culinary: Ream Choe, a skilled home cook, regularly prepares aromatic Vietnamese staples like phở bò, fresh gỏi cuốn, and bánh xèo using herbs harvested from their garden—Thai basil, cilantro, and mint—while
    occasionally experimenting with Thai green curry and Indonesian satay, and loves sharing these meals at community gatherings, though they sometimes over‑salt dishes in the quest for depth of flavor.
  core: Ream Choe blends the discipline of a seasoned janitor with a deep love for cultural cooking, community service, and methodical planning, all while juggling a modest budget and occasional forgetfulness
    about self‑care.
background:
  cultural: Ream was born in Vietnam and immigrated to the United States with her family as a child, settling in the vibrant Southeast Asian community of Orange County. She grew up speaking Vietnamese at
    home while acquiring English through school and community programs, giving her a bicultural perspective. Her family's traditions—celebrating Tet, preparing dumplings, and valuing filial responsibility—remain
    central to her identity. Ream actively participates in local cultural festivals and temple activities, maintaining strong ties to her heritage while navigating life as a working professional in Costa
    Mesa. Her upbringing in a close‑knit immigrant community has fostered a sense of resilience, respect for collective effort, and an appreciation for blending cultural practices with everyday American
    life.
