personas:
  professional: Jose Gonzales, a retired handyman and community volunteer, leverages their carpentry, plumbing, and electrical know‑how alongside bilingual communication skills to organize senior‑center
    workshops, mentor younger families, and keep neighborhood homes in good repair.
  sports: Jose Gonzales, an avid walker, spends their mornings strolling the local park’s shaded trails, supports the Houston Astros baseball team and the nearby high school football squad, and joins the
    senior center’s weekly bocce league for gentle competition.
  arts: Jose Gonzales, a lifelong lover of rhythm, fills their garden and kitchen with bachata and merengue playlists from artists like Juan Luis Guerra, Aventura, and Romeo Santos, while also indulging
    in historical documentaries and biographies of Texan pioneers during quiet evenings.
  travel: Jose Gonzales, a nostalgic traveler, has revisited a Caribbean island they once called home, explored the historic San Antonio missions in Texas, and dreams of a leisurely cruise along the Gulf
    Coast to watch sunrise over the Gulf of Mexico.
  culinary: Jose Gonzales, a seasoned home chef, cultivates tomatoes, peppers, and herbs to flavor traditional dishes such as mangú, sancocho, and pastel verde, relishing the blend of plantains, yuca, cilantro,
    and sofrito while often sharing meals with friends at their modest dining table.
  core: Jose Gonzales balances disciplined budgeting, community service, and vibrant cooking, yet they have a quirky habit of humming salsa tunes while fixing leaky faucets.
background:
  cultural: Jose was born in the Dominican Republic and moved to the United States as a young adult, eventually settling in Humble, Texas. His upbringing was steeped in the Dominican values of family cohesion,
    respect for elders, and a strong Catholic faith. He grew up speaking Spanish at home, celebrating traditional holidays like Carnaval and Día de la Independencia, and enjoying music genres such as merengue,
    bachata, and salsa. In Texas, he has integrated the local Texan hospitality and community spirit while preserving his heritage through language, cuisine, and participation in Dominican cultural events.
    His bicultural identity shapes his worldview, allowing him to bridge Dominican traditions with the diverse fabric of his Texas community.
