personas:
  professional: Amenah Boyd is a 29‑year‑old assembler and fabricator who leverages strong mechanical assembly, welding, CNC operation, and lean‑manufacturing expertise to streamline production lines, while
    their curious, detail‑oriented nature drives them to pursue CNC programming certification and envision a future side studio producing custom metal art and functional furniture.
  sports: Amenah Boyd is an avid hiker who spends weekends tackling trails in Rocky Mountain National Park, participates in a local rock‑climbing club, and cheerfully follows the Denver Broncos (NFL), Colorado
    Rockies (MLB) and Colorado Avalanche (NHL) while occasionally joining a recreational adult softball league.
  arts: Amenah Boyd curates a personal gallery of kinetic metal sculptures inspired by Alexander Calder, studies the stark landscapes captured by Ansel Adams, attends community theatre productions starring
    emerging local actors, and unwinds listening to the psychedelic sounds of Tame Impala and the jazz classics of Miles Davis.
  travel: Amenah Boyd prefers meticulously planned weekend road trips to nearby state‑park escapes like Great Sand Dunes and craft‑beer towns such as Asheville, yet dreams of an immersive cultural exchange
    in Kyoto, Japan to study traditional woodworking, and they budget travel by prioritizing affordable Airbnbs over upscale hotels to funnel funds into their future studio.
  culinary: Amenah Boyd delights in crafting smoky chipotle‑marinated pork ribs, hand‑shaped sourdough focaccia speckled with rosemary and olives, and a signature herb‑infused quinoa salad with roasted
    beets and goat cheese, showcasing confident home‑cook skills while sourcing fresh produce at the farmer’s market and experimenting with exotic spices like sumac.
  core: Amenah Boyd is a curious, detail‑driven maker who blends disciplined engineering with artistic flair, sometimes over‑engineering projects and forgetting to pay credit‑card bills on time, yet consistently
    channels that energy into creating functional art and planning their next career milestone.
background:
  cultural: Amenah grew up in a small, working‑class community in Henry County, Ohio, part of the white Midwestern cultural milieu. Her family emphasized hard work, self‑reliance, and modesty, values reflected
    in the region’s manufacturing and farming heritage. Community events, local fairs, and church gatherings shaped her social outlook, while the Midwestern tradition of folk art and craftsmanship nurtured
    her appreciation for functional aesthetics. Although rooted in these traditions, her curious nature drives her to seek new ideas and artistic influences beyond the local sphere.
attributes:
  skills: '[''Mechanical assembly'', ''Blueprint reading'', ''Quality inspection'', ''CNC machine operation'', ''MIG/TIG welding'', ''Hand and power tool proficiency'', ''Lean manufacturing principles'',
    ''Problem solving'', ''Basic 3D modeling (SketchUp)'', ''DIY woodworking'', ''OSHA 10 safety certification'']'
  hobbies: '[''Sketching'', ''Photography'', ''DIY metal sculpture'', ''Woodworking'', ''Visiting local art galleries'', ''Reading science‑fiction novels'', ''Hiking in state parks'', ''Attending community
    theater'', ''Maker space projects'', ''Board‑game evenings'']'
  career_goals: Amenah aims to move into a lead assembler or shift‑supervisor role within the next two to three years, gaining certification as a CNC programmer and deepening her knowledge of process optimization.
    She plans to combine her technical expertise with her artistic interests by launching a side business creating custom metal art and small‑scale furniture, eventually opening a dedicated studio where
    she can design and fabricate functional art pieces. Long‑term, she hopes to transition into a manufacturing engineering role that bridges production efficiency with product design.
