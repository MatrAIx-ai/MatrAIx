  career_goals: Rafia aims to progress into senior leadership within operations, targeting roles such as Operations Manager, Director of Operations, and ultimately Chief Operating Officer within a growth‑oriented
    organization. She is focused on mastering advanced analytics and obtaining Lean Six Sigma certification to drive large‑scale efficiency initiatives. In the next five years, she plans to lead cross‑functional
    transformation projects that integrate technology and data‑driven decision making, while also building a reputation as a go‑to expert for operational excellence in the Buffalo business community. Long‑term,
    she envisions launching her own consultancy that helps mid‑size firms streamline operations and adopt scalable processes.
