persona_description: A mathematics educator who conducts research on the relationship between mental mathematics and relational thinking in middle-school students. The researcher is interested in understanding
  the role of mental computation in enhancing students' ability to reason structurally about quantitative relationships, particularly in noncanonical equations and open-number sentences. The researcher
  is particularly interested in the limitations and future research directions of the current study, including the potential confounding factors such as class differences and experimenter bias. The researcher
  is also interested in the potential generalizability of the study findings to other populations and high schools.
