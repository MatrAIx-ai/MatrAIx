  hobbies: '[''reading historical fiction'', ''succulent gardening'', ''knitting scarves'', ''solo hiking in Franklin Mountains'', ''cooking traditional Mexican dishes'', ''listening to regional folk music'',
    ''mindful breathing exercises'']'
  career_goals: Short‑term, Lourdes plans to earn a Certified Nursing Assistant (CNA) credential and enroll in a part‑time Licensed Vocational Nurse (LVN) program, building on her hands‑on experience. Over
    the next five years she aims to transition into a home‑health case‑manager role, overseeing a small team of aides and designing individualized care plans that reflect cultural sensitivities for Mexican‑American
    seniors. Her ultimate ambition is to start her own home‑care agency that offers flexible schedules for staff and culturally attuned services for the El Paso community.
