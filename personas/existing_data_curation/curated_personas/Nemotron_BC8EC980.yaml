personas:
  professional: Dinorah Cabrera, a budding community health advocate, leverages bilingual fluency and peer‑mediation skills to bridge language gaps in local youth programs while balancing their curiosity
    for new health information with practical organization.
  sports: Dinorah Cabrera, a forward for the Bakersfield United Soccer Club, energizes their weekends with league matches, sharpens rhythm in salsa‑dance class, and they root for the LA Galaxy while incorporating
    cross‑training in the off‑season.
  arts: Dinorah Cabrera expresses emotions through hand‑drawn cartoons reminiscent of Charles Schulz, writes short poems after listening to Taylor Swift and BTS, and they edit uplifting short videos inspired
    by Studio Ghibli’s visual storytelling.
  travel: Dinorah Cabrera prefers budget‑friendly adventures, planning weekend trips to San Diego’s beaches, hiking Joshua Tree’s desert trails, and they save up for a future summer visit to the vibrant
    streets of Mexico City.
  culinary: Dinorah Cabrera hones their cooking by mastering pupusas filled with cheese and loroco, perfecting tangy curtido slaw, and they craft avocado‑lime salsa, while occasionally dining at local taco
    trucks to gather fresh inspiration.
  core: Dinorah Cabrera, a 17‑year‑old bilingual connector, juggles soccer, salsa, sketching, and health‑advocacy ambitions with boundless curiosity, yet they often wrestle with worry about their future.
background:
  cultural: Dinorah was born to Salvadoran immigrant parents who settled in Bakersfield's vibrant Latino neighborhood. At home, Spanish is spoken daily, and family gatherings feature traditional foods,
    music, and stories from El Salvador. She participates in local cultural festivals, wearing traditional clothing and performing folk dances, which keep her connected to her roots. While she navigates
    American school life, Dinorah balances her Salvadoran heritage with the multicultural environment of Kern County, drawing strength from both communities to fuel her compassion and drive to help others.
