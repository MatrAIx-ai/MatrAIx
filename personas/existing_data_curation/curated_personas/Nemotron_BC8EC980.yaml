  hobbies: '[''soccer'', ''salsa dancing'', ''volunteering at food bank'', ''cooking Salvadoran cuisine'', ''Instagram recipe sharing'', ''drawing and illustration'', ''poetry writing'', ''video editing
    for social media'']'
  career_goals: Dinorah aims to earn her GED within the next two years and then pursue a certification as a Community Health Worker or Medical Assistant, hoping to work at a local clinic that serves immigrant
    families. She dreams of using her bilingual skills to educate and support families about health, nutrition, and mental‑well‑being, eventually becoming a trusted liaison between the healthcare system
    and the Salvadoran community. In the longer term she envisions leading youth mentorship programs that foster academic confidence and emotional resilience.
