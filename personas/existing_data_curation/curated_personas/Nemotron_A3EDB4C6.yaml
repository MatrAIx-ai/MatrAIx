  hobbies: '[''Gardening'', ''Book club (historical fiction and memoirs)'', ''Attending community art fairs'', ''Crocheting while watching classic movies'', ''Jigsaw puzzles'', ''Listening to folk and gospel
    music'', ''Digital photography'', ''Cooking traditional recipes'', ''Volunteer work at senior center'']'
  career_goals: Although retired, Kathy remains driven to stay active, healthy, and mentally sharp. She hopes to complete a memoir that captures her family’s stories and the local history of Reidsville,
    sharing it with her grandchildren. She aspires to mentor younger volunteers at the senior center, passing on her crafting skills and community‑organizing experience. Kathy also wishes to attend at least
    two regional art exhibitions each year, explore new artistic mediums such as digital photography, and maintain her role as a connector in her small social circle, ensuring that neighbors feel supported
    and included.
