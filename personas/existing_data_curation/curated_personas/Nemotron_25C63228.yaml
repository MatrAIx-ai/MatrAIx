personas:
  professional: Linda Cunningham is an aspiring junior architect who loves sketching LEGO cityscapes and rehearsing dramatized presentations, turning her boundless curiosity and love of storytelling into
    early design concepts while thriving on the applause and collaboration of her classmates.
  sports: Linda Cunningham cycles enthusiastically through the neighborhood parks, organizes lively tag games with friends, and cheers for the Columbus Blue Jackets while proudly wearing a junior fan jersey,
    blending her love for active play with a spirited support of local sports teams.
  arts: Linda Cunningham draws dynamic comic strips inspired by Stan Lee’s heroes, stars in school drama club productions of "Peter Pan," and curates impromptu talent shows featuring songs by Taylor Swift
    and dance routines to BTS, letting her talkative, center‑stage personality shine through creative expression.
  travel: Linda Cunningham enjoys spontaneous weekend explorations of the Columbus Trail system with a magnifying glass, dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C.,
    and often maps out imagined treasure hunts in her bedroom before bedtime, balancing curiosity with a love for relaxed, low‑budget adventures.
  culinary: Linda Cunningham favors homemade mac and cheese topped with crisp bacon bits, crafts strawberry‑banana smoothies using a blender, and proudly assembles “LEGO‑shaped” fruit salads, demonstrating
    a playful yet simple cooking style that reflects her hands‑on creativity and occasional messiness.
  core: Linda Cunningham is a lively nine‑year‑old who channels curiosity into LEGO constructions, drama performances, and spontaneous talent shows, while juggling a pocket‑money habit that swings between
    diligent saving and impulsive treats.
background:
  cultural: Linda is raised in a middle‑class white family in Columbus, Ohio, where Midwestern values of community, friendliness, and modesty shape everyday life. Her family celebrates holidays such as
    Thanksgiving, Christmas, and Fourth of July with extended relatives, often gathering for potlucks and community picnics. She participates in local traditions like the Ohio State Fair and visits nearby
    parks and the Scioto Mile with friends. The cultural environment encourages school involvement, neighborhood cooperation, and a supportive church or Sunday school community, all of which reinforce her
    sociable nature and love for group activities.
