  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Bourbon cocktail crafting'', ''Attending Kentucky Derby'', ''College basketball (Louisville Cardinals)'', ''Listening to bluegrass music'', ''Reading
    practical non-fiction'', ''Playing strategy video games'']'
  career_goals: Sadiq aims to secure a full‑time role in logistics or facilities management where his organizational strengths can be leveraged. He plans to obtain a Certified Logistics Associate (CLA)
    credential within the next year, then progress to a supervisory position overseeing warehouse operations. Long‑term, he dreams of launching his own home‑repair and maintenance business that offers reliable,
    structured services to the Louisville community.
