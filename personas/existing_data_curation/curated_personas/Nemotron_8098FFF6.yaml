  hobbies: '["Robotics club","Reading YA fiction","Journaling","Community basketball league","Church youth group volunteering"]'
  career_goals: Brittany aims to attend a four‑year university on a scholarship, majoring in a field that blends structure and service such as nursing, health administration, or civil engineering. She aspires
    to become a licensed practical nurse or a junior civil engineer, valuing a career that offers clear responsibilities and measurable outcomes. In the long term she hopes to earn a professional certification
    in project management, enabling her to lead community health initiatives or infrastructure projects that improve the quality of life in her hometown. She also wants to develop strategies to manage stress
    and support peers facing similar emotional challenges.
