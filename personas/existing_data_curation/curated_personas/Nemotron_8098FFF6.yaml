personas:
  professional: Brittany Wilkerson, a 17‑year‑old high‑school senior, is an aspiring nurse‑engineer hybrid who channels their meticulous organizational skills, strong math aptitude, and robotics club experience
    into leading student council projects, and they envision a future where structured healthcare delivery meets engineering precision.
  sports: Brittany Wilkerson plays point guard for the River Valley Hoops in the City Youth Basketball League, follows the Los Angeles Lakers for strategic inspiration, and adheres to a structured weekly
    workout regimen that balances skill drills, cardio, and strength training, while they also enjoy seasonal pickup games in the park.
  arts: Brittany Wilkerson devotes their free time to reading contemporary YA authors such as John Green and Becky Albertalli, contributes thoughtful op‑eds to the school newspaper, streams Olivia Rodrigo’s
    music for inspiration, and occasionally attends the local community theater’s productions of modern plays.
  travel: Brittany Wilkerson prefers meticulously planned trips, having organized a family road‑trip to Yellowstone National Park using a custom Google Sheet itinerary, dreams of visiting the historic streets
    of Boston and the art museums of Chicago, and balances adventure with budget constraints through part‑time library work, while they always keep an eye on travel costs.
  culinary: Brittany Wilkerson enjoys preparing balanced meals like quinoa‑crusted salmon with roasted vegetables and avocado toast topped with smoked salmon, cooks at an intermediate skill level, and often
    experiments with seasonal ingredients while they favor fresh, protein‑rich dishes that support their active lifestyle.
  core: Brittany Wilkerson is a highly organized teen who turns their love for measurable progress into disciplined study, robotics, basketball, and a careful, budget‑conscious lifestyle, all while managing
    anxiety with journaling and a supportive community.
background:
  cultural: Brittany identifies as African‑American and grew up in Donnelsville, a small Midwestern town with a close‑knit community. Her family’s cultural traditions include regular church attendance,
    gospel music, and celebrating holidays like Juneteenth with food, storytelling, and community gatherings. She draws strength from the resilience of the Black community in Ohio, participating in local
    African‑American heritage events and supporting neighborhood initiatives that address social equity. Her cultural identity informs her emphasis on cooperation, harmony, and a desire to give back to
    her community while navigating the challenges of being a minority in a predominantly white rural setting.
