  hobbies: '[''Reading historical non-fiction'', ''Woodworking'', ''Model ship building'', ''Gardening'', ''Birdwatching'', ''Fishing on Lake Erie'', ''Jigsaw puzzles'', ''Crossword puzzles'', ''Listening
    to jazz and classical music'']'
  career_goals: Although formally retired, Bryan aims to keep his curiosity alive by documenting his family’s genealogy and local Sandusky history, producing a small written archive for future generations.
    He hopes to volunteer as a hands‑on mentor at the community senior center, teaching basic home‑repair skills to younger volunteers. He also plans to complete a short online certificate in historic preservation
    to better understand and protect the historic homes in his neighbourhood. Maintaining good health, supporting his wife, and ensuring a secure financial foundation for his grandchildren remain central
    personal ambitions.
