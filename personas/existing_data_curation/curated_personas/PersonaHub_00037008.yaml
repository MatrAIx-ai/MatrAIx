persona_description: A technology leader who is passionate about educational technology and its impact on student learning. They are experienced in leading and participating in technology summits and have
  a deep understanding of research, evidence, and advocacy in educational technology. They are interested in developing a proactive approach to establishing a research agenda in educational technology and
  bridging the gap between research and implementation in educational settings. They have a unique perspective on the benefits of open source software in education and are willing to consider how it can
  be extended to K-12 education. They are dedicated to advocating for teacher preparation programs and legislative and community advocacy for technology and teacher preparation.
