  hobbies: '[''Sketching garden designs'', ''Abstract painting'', ''Nature photography'', ''Personal vegetable gardening'', ''Reading science-fiction'', ''Hiking'', ''Acoustic guitar playing'', ''Community
    art collective participation'']'
  career_goals: Donald aims to obtain a Certified Professional Horticulturist credential and launch his own eco-focused landscaping firm within the next five years, offering artistic garden installations
    that prioritize native plants and water conservation. He aspires to become a recognized designer in his region, secure contracts for public park revitalization projects, and mentor apprentices. He also
    hopes to integrate technology like drone mapping and virtual design previews into his business to set new standards for efficiency and client engagement.
