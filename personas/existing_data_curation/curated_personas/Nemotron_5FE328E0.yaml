personas:
  professional: A landscape architect with a flair for avant‑garde garden designs, Donald Lynn leverages expert plant identification and GIS mapping to craft sustainable outdoor spaces while meticulously
    managing budgets and schedules, and they see each project as a living work of art.
  sports: A weekend hiker and amateur basketball enthusiast, Donald Lynn joins the Lenoir County Trail Club for early‑morning hikes along the Neuse River Greenway, plays pick‑up games at the community center
    while cheering for the Charlotte Hornets, and they follow the Carolina Hurricanes with loyal devotion.
  arts: An inventive visual artist and acoustic guitarist, Donald Lynn channels influences from Claude Monet’s watercolors and the folk storytelling of Bob Dylan into sketching garden concepts, painting
    abstract landscapes, and performing mellow songs at local Thursday‑night gatherings, where they often share the stage with fellow community‑art collective members.
  travel: A methodical planner with a love for nature, Donald Lynn maps out trips that blend scenic adventure and cultural immersion, having trekked the Blue Ridge Parkway, visited the historic streets
    of Savannah, and dreaming of photographing the aurora borealis in Iceland while budgeting for a future solo cycling tour of the Scottish Highlands, and they always pack a sketchbook for inspiration.
  culinary: A semi‑experienced home chef with a penchant for Southern‑inspired farm‑to‑table dishes, Donald Lynn frequently cooks heirloom tomato bruschetta, shrimp and grits spiced with cayenne, and a
    slow‑roasted butternut squash risotto, savoring the earthy flavors of fresh cilantro, smoked paprika, and locally sourced honey, and they often experiment with pairing dishes with craft ciders from
    nearby breweries.
  core: Donald Lynn blends meticulous project management with boundless artistic imagination, juggling a budding eco‑landscaping business, a love of acoustic guitar, a habit of over‑scheduling, and a tendency
    to stay up late sketching under kitchen‑light glow, and they occasionally forget to set an alarm for early site visits.
background:
  cultural: Donald grew up in La Grange, a close-knit community in Lenoir County, North Carolina, where rural Southern values of self-reliance, hospitality, and respect for the land are prominent. His upbringing
    emphasized practical craftsmanship, participation in local festivals, and an appreciation for the region's natural heritage. While his family heritage is European-American, he has been shaped by the
    area's agrarian traditions, church-centered social life, and the blend of historic folk art with contemporary creative expression common in the Southern coastal plain.
attributes:
  skills: '[''Plant identification'', ''Soil analysis'', ''Irrigation system design'', ''Hardscape installation'', ''Seasonal maintenance planning'', ''Landscape design creativity'', ''Project scheduling
