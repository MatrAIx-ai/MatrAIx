  career_goals: While still in early childhood, Myong often imagines herself as a creator—drawing vivid pictures, telling fantastical stories, or building wondrous inventions. She frequently declares she
    wants to be an 'artist' who paints the world in bright colors or an 'inventor' who makes new toys. These aspirations reflect a budding desire to explore abstract concepts through art and imaginative
    design, hinting at future ambitions in creative fields such as visual arts, storytelling, or design engineering.
