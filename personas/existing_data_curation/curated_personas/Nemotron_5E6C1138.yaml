personas:
  professional: Myong Lee is a two‑year‑old budding architect who spends hours arranging building blocks into intricate towers, turning their imagination into early design experiments while they delight
    in the freedom to create without rigid schedules.
  sports: Myong Lee prefers the gentle sway of the toddler swing at the local park and often pretends to be a mascot for the nearby baseball team, the Sacramento River Cats, while they shyly watch other
    kids play from the bench.
  arts: Myong Lee loves to doodle animated characters with chunky crayons, often sketching scenes from folk tales like Heungbu and Nolbu and humming traditional lullabies that echo in their playroom as
    they explore new visual ideas.
  travel: Myong Lee’s family’s recent road trip to the seaside town of Monterey sparked a fascination for tide‑pool exploration, yet they prefer short, stroller‑friendly outings over long flights, dreaming
    of one day visiting a bright lantern festival.
  culinary: Myong Lee delights in soft rice cakes made during the harvest celebration and smears almond butter on toast with focused concentration, while they also insist on a side of cheesy macaroni that
    they can pick up with tiny fingers.
  core: Myong Lee is a quiet, highly imaginative toddler who thrives in solitary play, collects stickers, and approaches each new activity with calm curiosity while they quietly challenge any perceived
    limits.
background:
  cultural: Myong is raised in a Korean‑American household in Citrus Heights, CA. At home, Korean is spoken alongside English, and she is exposed to Korean lullabies, folktales such as 'Heungbu and Nolbu',
    and cultural celebrations like Lunar New Year and Chuseok, where she participates in traditional activities like making rice cakes. The family balances these traditions with typical American suburban
    life, attending local library storytimes, community park playdates, and occasional Korean language preschool programs. This bicultural environment shapes her worldview, providing a foundation of respect
    for family and education while encouraging curiosity about both Eastern and Western artistic expressions.
