personas:
  professional: Pamela, a four‑year‑old from Salem, Alabama, runs a spontaneous lemonade stand at the neighborhood park, using their curious yet practical mindset, talkative charm to draw customers, and
    a competitive spark that drives them to out‑sell the other kids, even if the stand is often left a bit messy.
  sports: Pamela, a four‑year‑old who loves chasing fireflies and playing tag, proudly wears a tiny T‑ball jersey for the Salem Sprouts, mimics the moves of the Lee County Tigers during weekend games, and
    eagerly runs laps around the park, though they sometimes forget to stretch before heading home.
  arts: Pamela, a four‑year‑old with a vivid imagination, sings along to Raffi’s “Baby Beluga,” draws colorful pictures of fireflies and garden scenes, enjoys the local church’s children’s choir, and often
    insists on performing for any adult that passes by, even if their audience is brief.
  travel: Pamela, a four‑year‑old who adores weekend trips to their grandparents’ farm, dreams of visiting Disney World and the sun‑kissed Gulf Shores beach, prefers spontaneous car rides over detailed
    itineraries, and always packs a beloved plush bunny for comfort on the road.
  culinary: Pamela, a four‑year‑old who delights in licking the spoon after helping stir peach cobbler, can successfully spread butter on toast, loves crispy fried chicken nuggets and mac and cheese, and
    gets fascinated by sprinkles on cupcakes, yet they sometimes refuse to eat green beans.
  core: Pamela, a four‑year‑old with boundless curiosity, talkative charm, a competitive spark, and occasional worries, navigates life through spontaneous play, community gatherings, and a love for bright
    stickers, all while juggling a habit of forgetting bedtime routines.
background:
  cultural: Pamela is a white child raised in Salem, Alabama, a small town in Lee County where Southern hospitality and community values shape daily life. Her family participates in church Sunday school,
    local picnics, and the annual Lee County Fair, which expose her to traditional Southern foods like fried chicken and peach cobbler. Growing up in a close‑knit neighborhood, she often plays with peers
    at the neighborhood park and learns the importance of manners, respect for elders, and sharing. The rural setting gives her frequent opportunities to interact with nature, from chasing fireflies to
    helping in a family garden, reinforcing a practical, hands‑on approach to learning.
attributes:
  skills: '["drawing", "singing nursery rhymes", "building with LEGO Duplo", "counting to 20", "telling simple stories", "matching shapes and colors", "using a tablet for educational games", "making friends
