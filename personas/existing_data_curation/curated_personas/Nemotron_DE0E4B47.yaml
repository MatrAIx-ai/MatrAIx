  hobbies: '["dress‑up and pretend tea parties", "building block towers", "singing and dancing to cartoons", "exploring the backyard", "collecting rocks", "reading picture books", "solving simple puzzles",
    "playing with dolls", "watching animated shows", "drawing with crayons"]'
  career_goals: Pamela dreams of growing up to be someone who can be at the center of attention while helping others learn. She often says she wants to be a teacher or a children's show host because she
    loves sharing stories and songs with friends. Her competitive streak fuels a wish to become an astronaut or a scientist, imagining herself discovering new things and winning awards for her ideas. Even
    now, she practices leading group games and imagines a future where she can inspire other kids and be recognized for her curiosity and practical creativity.
