  hobbies: '[''Gardening'', ''Woodworking'', ''Bowling league'', ''Bridge and card games'', ''Local history research'', ''Fishing'', ''Classic car shows'', ''Cooking'']'
  career_goals: Although retired from formal employment, Donnie aims to remain a pivotal figure in his local community. He hopes to lead volunteer projects that improve public spaces, organize senior‑friendly
    workshops on DIY skills, and document the history of Englishtown for future generations. He also aspires to write a memoir that captures his practical life lessons and to stay current with emerging
    technologies that can aid his community work.
