  career_goals: Shanon aims to channel her STEM background into community service, hoping to volunteer as a mentor for local after-school STEM clubs and to lead workshops on citizen science projects such
    as water quality monitoring. She wishes to document the natural history of Navarre’s coastal ecosystem in a self-published guide, combining her love of writing and scientific observation. Another personal
    ambition is to complete a comprehensive family genealogy book that integrates DNA findings with narrative history. She also aspires to maintain her mental sharpness by completing at least one new online
    course each year and to cultivate a sustainable garden that can serve as an educational resource for neighborhood children. Ultimately, she seeks a balanced sense of purpose that eases her tendency
    toward worry.
