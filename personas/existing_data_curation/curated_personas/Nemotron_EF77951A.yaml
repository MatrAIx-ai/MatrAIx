personas:
  professional: Shanon Callaway, a retired environmental researcher turned community STEM mentor, leverages her graduate-level quantitative analysis and Python scripting to guide citizen‑science water‑quality
    projects while navigating a habitually loose schedule and an earnest desire to translate complex data into practical lessons for neighborhood kids, and they thrive on turning abstract numbers into tangible
    community impact.
  sports: Shanon Callaway, a member of the Navarre Bird‑Watching Club, enjoys early‑morning walks along the Gulf shoreline, supports the Tampa Bay Buccaneers and Tampa Bay Rays, and participates in a low‑impact
    senior yoga class at their community center, blending their love of nature with light athletic activity.
  arts: Shanon Callaway finds solace in listening to classical piano pieces by Ludovico Einaudi, revisiting folk legends like Joan Baez, and watching productions at the Gulf Coast Playhouse, letting music
    and theater enrich their solitary evenings.
  travel: Shanon Callaway prefers meticulously planned eco‑focused road trips, having recently explored the Everglades National Park’s bird refuges and dreaming of a stargazing expedition to Mauna Kea in
    Hawaii, while balancing these aspirations with a modest travel budget and a desire for peaceful, low‑stress journeys, and they meticulously map each itinerary in a leather‑bound journal.
  culinary: Shanon Callaway experiments with science‑infused cooking, perfecting a sous‑vide carrot‑ginger soup, fermenting heirloom tomatoes into a tangy relish, and regularly seasoning garden‑harvested
    dishes with turmeric and sigma‑particle‑inspired garnish, turning the kitchen into a modest laboratory where they blend curiosity with flavor.
  core: Shanon Callaway is a curiosity‑driven, solitary 63‑year‑old who intertwines scientific rigor with garden plots, worries about every detail yet blissfully loses themselves in starry nights and crossword
    puzzles, demonstrating a quirky blend of disciplined inquiry and gentle disorganization, and they often schedule nightly “thinking” sessions under the constellations.
background:
  cultural: Shanon is a white American who grew up in the Deep South, likely in a small town in Georgia or Alabama, before moving to the Gulf Coast of Florida. Her upbringing was rooted in Southern traditions
    of hospitality, self-reliance, and a strong tie to family and church; she identifies with a Methodist background. The coastal environment of Navarre has shaped her appreciation for nature, especially
    marine and coastal ecosystems. Her education in STEM introduced a scientific worldview that coexists with her cultural values of community involvement and modesty. As a married woman in her sixties,
    she often balances the expectations of family life with her independent pursuits, reflecting a blend of traditional Southern cultural norms and modern intellectual curiosity.
