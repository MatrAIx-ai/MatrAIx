personas:
  professional: Efren Nava, a seasoned personal care aide with over three decades of hands‑on experience, blends practical structure with flexible problem‑solving to deliver culturally attuned care, and
    they are now pursuing CNA certification to become a lead caregiver and mentor.
  sports: Efren Nava plays forward for the Cayey Community Soccer League, follows the Criollos de Caguas baseball team and the Cangrejeros de Santurte basketball squad, and they balance weekly matches with
    weekend hikes up Cerro de la Santa María and fishing trips to Cañabón reservoir.
  arts: Efren Nava revels in salsa and plena nights, dancing to the rhythms of Héctor Lavoe, Marc Anthony, and Calle 13 while they also attend performances at the Centro de Bellas Artes and collect vintage
    vinyl of Willie Colón.
  travel: Efren Nava enjoys weekend getaways to El Yunque and historic Old San Juan, dreams of exploring the colonial streets of Cádiz, Spain, and they occasionally travel to Miami to visit relatives, always
    planning trips around community events and budget constraints.
  culinary: Efren Nava cooks arroz con gandules, mofongo with chicharrón, and caramel flan seasoned with a hint of cinnamon, and they confidently season with sofrito, adobo, and fresh cilantro while humming
    bomba beats in the kitchen.
  core: Efren Nava is a vibrant, competitive caregiver who balances disciplined structure with a spontaneous love for music, sport, and community, and they sometimes let relaxed planning lead to missed
    appointments and scattered paperwork.
background:
  cultural: Born and raised in Cayey, a mountain municipality in the heart of Puerto Rico, Efren grew up surrounded by the island’s rich blend of Spanish, African, and Taíno influences. His family’s traditions
    reflected the strong Catholic faith, close‑knit family ties, and a love for communal celebrations such as the Fiesta Patronal and the annual Lechuga Fair. The rhythms of bomba, plena, and salsa that
    filled neighborhood gatherings shaped his appreciation for music and dance. Growing up in a bilingual environment, he is fluent in Spanish and conversant in English, allowing him to navigate both local
    and mainland health‑care settings. The island’s emphasis on hospitality and respect for elders informed his career choice as a personal care aide, and his cultural identity continues to guide his commitment
    to providing care that honors Puerto Rican customs and family dynamics.
attributes:
  skills: '["Personal hygiene assistance", "Mobility and transfer support", "Medication reminder and monitoring", "First aid and emergency response", "Documentation and EMR usage", "Interpersonal communication",
    "Crisis management", "Basic wound care", "Culturally competent caregiving", "Team collaboration", "Activity facilitation", "Problem‑solving under pressure"]'
  hobbies: '["Soccer (weekly matches)", "Salsa and plena dancing", "Listening to bomba and salsa music", "Cooking traditional Puerto Rican dishes", "Hiking in Cayey’s mountainous trails", "Fishing at local
    reservoirs", "Volunteering at the senior center", "Participating in community festivals"]'
  career_goals: Efren aims to formalize his extensive practical knowledge by completing a Certified Nursing Assistant (CNA) program and eventually pursuing a Licensed Practical Nurse (LPN) credential. He
    wants to transition into a lead caregiver role where he can mentor newer aides, develop standardized care protocols that balance structure with the flexibility his clients need, and spearhead community‑based
    health‑promotion workshops in Cayey. Long‑term, he dreams of founding a small, family‑run home‑health agency that offers culturally attuned services, giving him the autonomy to shape service quality
    and compete for regional contracts.
