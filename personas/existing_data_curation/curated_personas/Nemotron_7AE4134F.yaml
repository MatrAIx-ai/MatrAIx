  career_goals: Melissa aims to stay actively engaged in her community by expanding her role as a volunteer curator at the Southfield Cultural Center, launching a senior‑focused art workshop series, documenting
    local history through a memoir, and mentoring younger volunteers in event planning and budgeting. She also seeks to maintain her mental and physical health by incorporating mindfulness practices and
    regular health check‑ups, while continuing to explore new artistic techniques and cultural topics.
