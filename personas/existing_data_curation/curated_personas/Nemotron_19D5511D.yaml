personas:
  professional: Sharita Woods is a seasoned workshop facilitator and public storyteller who leverages her literary analysis expertise and event‑planning skill to craft structured, curriculum‑based community
    programs that still leave room for spontaneous improv moments, thriving on the attention of groups and her natural knack for mediating and mentoring across generations.
  sports: Sharita Woods enjoys daily walks on the nearby nature trail, subscribes to the Chicago Bulls and Chicago White Sox, participates in a senior walking club that meets at the local park, and occasionally
    joins community gardening volunteer crews that double as low‑impact fitness sessions.
  arts: Sharita Woods sings in the church choir, attends weekly jazz shows at the Green Mill featuring artists like John Coltrane tributes, pursues intricate quilting inspired by cultural motifs, and delights
    in improv theater workshops where they can improvise dialogues and storytelling on the spot.
  travel: Sharita Woods prefers thoughtfully planned trips that balance cultural immersion with comfort, having visited New Orleans for its historic jazz scene, Washington, D.C. to explore the civil‑rights
    museum, and planning a future pilgrimage to Ghana’s historic coastal towns, while usually traveling with a small group of friends or family to share experiences.
  culinary: Sharita Woods loves cooking soul‑food classics such as collard greens seasoned with smoked turkey, sweet‑potato casserole, and cornbread, often adding fresh basil and thyme from their garden,
    and while their cooking skill is strong, they sometimes leave dishes simmering too long when worry distracts them.
  core: Sharita Woods is a charismatic, structure‑loving elder who fuses community storytelling, gardening, and jazz, all while battling a habit of over‑worry that fuels both their generosity and occasional
    disorganization.
background:
  cultural: Sharita grew up on Chicago’s South Side in a close‑knit Black family steeped in the legacy of the Civil Rights movement. Her parents were active in community organizing and taught her the importance
    of collective well‑being, which shaped her cooperative nature. She celebrates cultural milestones such as Juneteenth and Kwanzaa, and she maintains a strong connection to African‑American culinary,
    musical, and artistic traditions. The church has been a central pillar in her life, providing both spiritual guidance and a platform for community service. Throughout her adulthood, Sharita has navigated
    the dual pressures of preserving cultural identity while adapting to the evolving social landscape of suburban Illinois, fostering a sense of resilience, storytelling, and cultural pride.
attributes:
  skills: '[''Literary analysis'', ''Creative writing'', ''Public speaking'', ''Workshop facilitation'', ''Community outreach'', ''Event planning'', ''Cultural programming'', ''Conflict mediation'', ''Mentorship'',
    ''Storytelling'', ''Interpersonal communication'', ''Active listening'']'
  hobbies: '[''Reading African-American literature'', ''Quilting'', ''Gardening'', ''Cooking soul food'', ''Singing in church choir'', ''Hosting tea-time discussions'', ''Participating in improv theater'',
    ''Walking nature trails'', ''Visiting heritage museums'', ''Attending jazz performances'']'
  career_goals: Sharita aims to channel her experience into mentorship and public storytelling. She plans to launch a memoir about her life as a Black woman who navigated civil rights activism and the arts,
    and to lead a community book club that highlights African-American literature. She dreams of serving on the board of the local cultural center to shape programming that provides structured learning
    opportunities while encouraging creative spontaneity. Sharita also hopes to develop a small intergenerational garden project in Tinley Park, using it as a therapeutic space for stress reduction for
    herself and neighbors.
