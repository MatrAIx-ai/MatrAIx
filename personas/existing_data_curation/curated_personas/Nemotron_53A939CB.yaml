personas:
  professional: Jamie Parent, a 36-year-old elementary and middle-school teacher, designs interdisciplinary arts-integrated STEM curricula, mentors novice educators, and leverages their organized, competitive
    drive to implement data-driven instruction while channeling their love of painting and outdoor exploration into dynamic, project-based learning experiences.
  sports: Jamie Parent, an avid trail runner and hiker, belongs to the Columbia River Gorge Trail Runners club, practices yoga at Sunrise Yoga Studio, and follows the Portland Trail Blazers, the Seattle
    Seahawks, and the Oregon State Beavers, integrating competitive spirit into personal fitness goals while cheering on their favorite Pacific Northwest teams each season.
  arts: Jamie Parent immerses themselves in the arts by painting Oregon landscapes, photographing the Columbia River Gorge, acting and designing sets with a community theater troupe, and regularly attending
    performances by the Oregon Symphony, exhibitions featuring Ansel Adams photography, and screenings of Wes Anderson films, drawing creative inspiration from both classic and contemporary sources.
  travel: Jamie Parent plans trips with a blend of structure and spontaneity, favoring weekend hikes in the Oregon Coast Range, art-focused pilgrimages to Seattle's MoPOP and Portland Art Museum, past excursions
    to Vancouver and the Willamette Valley wine country, and a future dream itinerary that includes exploring Kyoto's temple gardens and the Italian lakeshore, all while balancing travel budgets with family
    commitments.
  culinary: Jamie Parent enjoys seasonal Pacific Northwest cooking, confidently preparing dishes like wild mushroom risotto with local hazelnuts, cedar-plank salmon with dill, and roasted root-vegetable
    medley, while hosting potluck gatherings where they showcase homemade artisanal bread and locally sourced cheese, reflecting a strong preference for fresh, foraged ingredients and communal dining.
  core: Jamie Parent blends a competitive, methodical mindset with a love for outdoor adventure and the arts, channeling this energy into teaching, meticulous budgeting, disciplined health routines, and
    vibrant community involvement, all while occasionally over-committing to projects and battling insomnia.
background:
  cultural: Raised in a small town in the Pacific Northwest, Jamie’s white ethnic background is intertwined with Oregon’s cultural emphasis on self‑reliance, community stewardship, and appreciation for
    nature. Her family cultivated a tradition of civic involvement and outdoor recreation, shaping her values of responsibility, teamwork, and environmental consciousness. Living in Roseburg, she embraces
    the region’s blend of modest rural life and progressive educational ideals, integrating local heritage with a forward‑looking, inclusive outlook.
