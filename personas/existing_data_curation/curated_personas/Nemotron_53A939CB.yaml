  career_goals: Jamie aspires to earn a Master’s degree in Education Leadership within the next three years, positioning herself for a role as a curriculum specialist or assistant principal. She aims to
    spearhead a district‑wide arts‑integrated STEM initiative that encourages project‑based learning and fosters creative problem‑solving. Long‑term, Jamie envisions establishing an after‑school program
    that offers workshops in painting, digital media, and robotics, providing equitable access to extracurricular enrichment for all students in Douglas County. She also seeks to become an advocate for
    progressive educational policies at the state level, leveraging her competitive spirit to champion data‑informed reforms.
