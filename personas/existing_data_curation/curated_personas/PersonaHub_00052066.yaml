persona_description: An engineer and researcher who specializes in the development of software for computer-aided mediation and conflict resolution. Known for his work on the "Maximize the Minimum Gain"
  rule, a method for fairly distributing benefits when generating optimal solutions. His methods have been implemented in the Smartsettle eNegotiation System, and he is recognized as a patent holder. He
  has also contributed to the field of decision analysis through his book "Lectures on Negotiation Analysis."
