  career_goals: Alan dreams of turning his curiosity for how things work into a future career as a robotics engineer or astronaut. He envisions designing practical machines that could help his family with
    everyday chores or assist his community with sustainable solutions, such as a solar‑powered garden watering system. In the short term, he aims to win his middle school's science fair with a project
    that combines coding and simple robotics, and to earn a spot in a regional STEM enrichment program. He also hopes to keep his academic record strong so he can attend a high‑school magnet school focused
    on engineering, ultimately pursuing a degree in mechanical engineering with a specialization in robotics. His competitive nature fuels a desire to be recognized for innovative, hands‑on projects that
    solve real problems.
