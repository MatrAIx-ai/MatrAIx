personas:
  professional: Alan Bhatia, a ten‑year‑old aspiring technologist, merges their passion for building intricate LEGO structures with a budding expertise in Scratch programming and beginner‑level robotics,
    using a methodical yet imaginative approach that reflects their balance of curiosity and practicality while they log each experiment as a carefully documented project.
  sports: Alan Bhatia, a ten‑year‑old point guard on the middle‑school basketball team, idolizes the Los Angeles Lakers, trains after school to sharpen shooting accuracy, joins a local summer soccer clinic
    to stay active year‑round, and follows NBA statistics closely, channeling their competitive drive into tracking personal performance metrics and comparing them with professional benchmarks, and they
    often set weekly shooting goals.
  arts: Alan Bhatia, a ten‑year‑old piano enthusiast and comic‑strip creator, dedicates afternoons to mastering Mozart’s Sonata K. 331 and Yiruma’s 'River Flows in You', draws inspiration from graphic novels
    such as 'Saga' and classic Marvel titles, and studies the bold line work of Jim Lee, letting these artistic influences shape the vivid storytelling in their own comics, and they regularly draft new
    panels to experiment with narrative pacing.
  travel: Alan Bhatia, a ten‑year‑old budding astronaut enthusiast, has visited the local planetarium and city science museum, dreams of touring NASA’s Kennedy Space Center and stargazing at the Grand Canyon’s
    night sky, and hopes to explore the bustling markets and historic plazas of Mexico City during a family vacation, blending educational curiosity with a love for vivid cultural experiences, and they
    keep a travel journal to capture each adventure.
  culinary: Alan Bhatia, a ten‑year‑old kitchen apprentice, enjoys helping their mother prepare tamales—mixing masa, pork, chilies, and corn husks before steaming—and delights in perfecting homemade pizza
    topped with mozzarella, pepperoni, and fresh basil, though they sometimes overfill the corn husks, leading to a charmingly uneven batch.
  core: Alan Bhatia, a ten‑year‑old LEGO architect, budding coder, and piano hobbyist, fuses boundless curiosity with a cautious, detail‑oriented streak, turning stress into meticulous projects while wrestling
    with occasional worry and a competitive edge, and they channel that energy into disciplined practice.
background:
  cultural: Alan’s cultural background is a blend of Latin American (primarily Mexican) traditions and the heritage of his indigenous ancestors from the Mesoamerican region. At home, Spanish is spoken daily,
    and his grandmother frequently shares Nahuatl words, folklore, and customs such as Día de los Muertos altars. Family gatherings feature traditional foods like tamales, pozole, and atole, and music ranging
    from mariachi to indigenous drums. Living in Attalla, Alabama, Alan also absorbs Southern influences—church potlucks, country and blues music, and a strong emphasis on community hospitality. This multicultural
    environment instills in him respect for elders, a sense of communal responsibility, and an appreciation for storytelling, all of which shape his worldview and personal values.
