persona_description: A historian who specializes in the study of pre-Spanish and indigenous cultures in the north of Mexico, particularly the Tarahumaras, Tepehuanes, Tubas, Jumiles, Pimas, Conchos, Salineros,
  Guarijios, and Chisos. Their research interests include the exploration of the region by Francisco de Ibarra and Rodrigo de Loza, the establishment of the missions and the Spanish colonizers in the area,
  and the mining potential of the region. They have a deep understanding of the processes of evangelization, spreading of the Spanish language, and general education of the indigenous people, as well as
  the voluntary stay of some natives in the region.
