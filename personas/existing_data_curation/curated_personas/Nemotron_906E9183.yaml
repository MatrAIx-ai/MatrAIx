  career_goals: Although retired from formal employment, Monica strives to leave a lasting legacy for her tribe. She aims to develop a comprehensive digital archive of tribal oral histories and artifacts,
    mentor younger tribal members—especially women—in traditional crafts, and lead a weekly storytelling circle at the local cultural center. Monica also hopes to publish a memoir that blends personal anecdotes
    with broader tribal narratives, positioning herself as a respected voice in regional native advocacy. Her competitive spirit drives her to organize a senior trivia league that showcases tribal knowledge,
    fostering both pride and community cohesion.
