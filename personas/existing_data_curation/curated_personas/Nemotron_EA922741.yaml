  career_goals: Ashley aims to advance into a supervisory or managerial position within a corporate security department or a municipal facility, leveraging her field experience to shape safety protocols
    and mentor junior officers. She plans to earn the Certified Protection Professional (CPP) credential and, over the next few years, enroll in a part‑time criminal‑justice program to deepen her strategic
    knowledge. Long‑term, she envisions establishing a boutique consulting firm that advises small businesses on pragmatic, technology‑enhanced security solutions, allowing her to blend her curiosity for
    new methods with her steady, results‑oriented work style.
