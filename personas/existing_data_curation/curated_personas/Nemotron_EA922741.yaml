personas:
  professional: Ashley Jue is a seasoned protective services professional with over a decade of hands‑on experience in threat assessment, conflict de‑escalation, and emergency response, who blends a reliability‑focused
    mindset with a curiosity for emerging security technology, leading teams with calm assertiveness while meticulously documenting incidents.
  sports: Ashley Jue hits the coastal trails of Orange County on weekends, trains with the local Orange County Hiking Club, follows the Los Angeles Dodgers and Los Angeles Lakers religiously, participates
    in a summer beach‑volleyball league, and enjoys cheering on the LA Rams during NFL season.
  arts: Ashley Jue indulges in immersive true‑crime podcasts like 'Serial' and literary sleuths such as Agatha Christie, attends quarterly showings at the Laguna Art Museum, savors live performances by
    indie folk singer Brandi Carlile, and enjoys rewatching classic thrillers directed by Alfred Hitchcock while discussing plot twists over board‑game nights.
  travel: Ashley Jue prefers meticulously planned road trips that balance scenic hikes with cultural stops, has explored the Pacific Northwest’s rain‑soaked forests, spent a rejuvenating week in the vineyards
    of Mendoza, Argentina, and dreams of trekking the ancient trails of the Camino de Santiago while budgeting carefully to keep family commitments in check.
  culinary: Ashley Jue is an adept home cook who excels at whipping up versatile meals like lemon‑garlic grilled salmon with quinoa, homemade pesto pasta using garden‑fresh basil and tomatoes, and Mediterranean
    veggie tacos seasoned with smoked paprika, often pairing them with a crisp Sauvignon Blanc while occasionally ordering takeout sushi when pressed for time.
  core: Ashley Jue blends an investigative curiosity with a steady, hands‑on practicality, turning security challenges, backyard gardening, and board‑game strategies into a balanced, purpose‑driven life.
background:
  cultural: Ashley identifies as a White American who grew up in Southern California. While her familial roots trace back to Midwestern ancestry, her lifelong residence in Santa Ana, a city rich in Hispanic
    and multicultural influences, has shaped a broad, inclusive perspective. She celebrates traditional American holidays such as Thanksgiving and the Fourth of July, and she appreciates local cultural
    events like Día de los Muertos festivals, often participating in community celebrations. Her everyday life reflects a blend of mainstream American customs with an awareness of the diverse cultural tapestry
    of Orange County.
