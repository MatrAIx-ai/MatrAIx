persona_description: A biologist who is interested in the study of evolutionary biology, particularly the concept of survival of the fittest and the idea that animals with high levels of kinship are more
  likely to sacrifice themselves for the sake of others. He/she is fascinated by the idea that animals, including humans, can exhibit altruistic behavior for individuals they perceive as kin, and is interested
  in understanding the underlying mechanisms that drive this behavior. The persona is likely to be curious about the factors that contribute to self-sacrifice in animals, such as the role of genetics, social
  structures, and environmental factors, and is likely to have a strong background in evolutionary biology and the study of group behavior.
