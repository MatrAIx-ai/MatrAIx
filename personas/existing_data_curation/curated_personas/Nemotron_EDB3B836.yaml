  hobbies: '[''Visiting Bronx galleries and museums'', ''Street art photography'', ''Painting and sketching'', ''Participating in community dance events'', ''Cooking diverse cuisines (soul food, Caribbean)'',
    ''Reading contemporary fiction'', ''Yoga and mindfulness practice'', ''Volunteering at local community centers'', ''Writing poetry'', ''Attending live music shows'']'
  career_goals: Lashayla aims to re-enter the workforce by securing a role as a community arts coordinator or program assistant at a local nonprofit, where she can combine her organizational strengths with
    her passion for the arts. She plans to complete a certificate in Nonprofit Management and eventually lead youth art education programs that provide safe, creative outlets for Bronx residents. Long‑term,
    she envisions founding a small community art space that also offers mental‑health workshops, reflecting her desire to give back and address the stressors she herself experiences.
