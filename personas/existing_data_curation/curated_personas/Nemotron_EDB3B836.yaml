personas:
  professional: Lashayla Arceneaux is a community arts coordinator who blends meticulous event planning, budgeting expertise, and an intuitive grasp of local visual culture to design inclusive festivals,
    while their curious, organized, and socially energetic nature fuels persuasive presentations and adept conflict mediation.
  sports: Lashayla Arceneaux is a devoted fan of the New York Knicks and the New York Yankees, a member of the Bronx Bulls Amateur Basketball Club, joins a community basketball league each spring, practices
    yoga thrice weekly for flexibility, and participates in seasonal after‑work dance classes, balancing a love for competitive sports with a preference for collaborative movement.
  arts: Lashayla Arceneaux immerses themselves in the Bronx’s street‑art scene, curating tours that feature muralists like L.A. Perez and Shepard Fairey while vibing to jazz virtuoso Kamasi Washington and
    hip‑hop pioneers A Tribe Called Quest, and they often sketch inspired pieces in the evenings.
  travel: Lashayla Arceneaux prefers meticulously planned weekend getaways that fuse cultural immersion with low‑budget adventure, having explored Jamaica’s reggae festivals, the historic streets of New
    Orleans, and the vibrant markets of Barcelona, while dreaming of a sunrise hike in Morocco’s Atlas Mountains and a culinary tour of Kyoto.
  culinary: Lashayla Arceneaux balances a confident home‑cooking skill set with a love for experimental flavors, regularly preparing soul‑food staples such as fried chicken with honey‑glazed collard greens
    and cornbread, alongside Caribbean delights like jerk chicken, plantain mofongo, and callaloo seasoned with scotch bonnet peppers and thyme.
  core: Lashayla Arceneaux is a curiosity‑driven, organized community arts advocate who channels stress into yoga, occasionally overbooks their calendar, and fuels their soul with vibrant murals and spicy
    dishes.
background:
  cultural: Raised in the Bronx as part of a close‑knit African‑American family, Lashayla’s cultural identity is shaped by the rich tapestry of Black heritage, hip‑hop culture, and the borough’s multicultural
    neighborhoods. Family traditions include Sunday gospel services, soulful cooking, and community gatherings during events like Bronx Week and local block parties. Her upbringing exposed her to the resilience
    and creativity of the African‑American diaspora, fostering a deep respect for both historic Black art movements and contemporary Afro‑Caribbean influences that permeate the local arts scene.
attributes:
  skills: '[''Event planning'', ''Community outreach'', ''Basic computer proficiency (Microsoft Office, Google Suite)'', ''Budgeting and financial tracking'', ''Public speaking'', ''Conflict resolution'',
