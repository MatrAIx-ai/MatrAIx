  career_goals: As a seasoned gambling‑surveillance officer, Chelsie aims to transition into a supervisory role within the next three years, eventually becoming a security manager overseeing a team of analysts.
    She plans to earn advanced certifications such as the ASIS Certified Protection Professional (CPP) and a specialized credential in AI‑augmented video analytics, positioning herself at the forefront
    of emerging surveillance technologies. Long‑term, she envisions establishing a consultancy that helps regional gaming venues implement risk‑mitigation strategies and stress‑management programs for security
    staff. While pursuing these professional milestones, she also hopes to complete an associate’s degree in criminal justice, deepening her theoretical knowledge and expanding her career options beyond
    the casino floor.
