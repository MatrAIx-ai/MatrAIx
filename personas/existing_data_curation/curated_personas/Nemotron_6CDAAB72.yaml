  career_goals: Although retired, Evaristo aims to stay active by mentoring younger tradespeople through a local apprenticeship program, documenting the history of San Diego’s Hispanic neighborhoods, and
    completing a memoir that captures his family’s migration story. He also hopes to maintain his health by walking daily along the bay and to travel to his hometown in Mexico to reconnect with relatives
    and cultural traditions.
