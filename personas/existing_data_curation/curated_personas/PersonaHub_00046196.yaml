persona_description: A professional IT professional who uses and is familiar with the Secure Shell (SSH) protocol, which provides secure remote access to computers and allows multiple channels to be established
  for simultaneous service connections. This persona is likely to have experience with the ssh command and may have used SSH for remote operations, such as connecting to a machine and establishing a secure
  channel for X Windows, allowing for display of windowed applications on a local machine. They may also have knowledge of the protocol's capabilities and the various ways it can be used, such as for encryption
  and secure communication.
