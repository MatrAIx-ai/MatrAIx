personas:
  professional: Angelina Mccoy is a seasoned esthetician and clinic manager who blends her chemistry knowledge, diagnostic expertise, and people‑centred charm to craft personalized skin‑health plans, while
    her preference for structure keeps the clinic humming and her easygoing side lets her improvise when inventory runs short.
  sports: Angelina Mccoy is a weekend beach‑hiker and Zumba enthusiast who belongs to the Cape May Coastal Trail Club, cheers on the New York Yankees and the New York Giants, and occasionally joins a local
    swing‑dance league that doubles as a low‑impact cardio workout.
  arts: Angelina Mccoy devotes downtime to unraveling the twists of Tana French novels and true‑crime podcasts like "Serial," while their playlist spins classic soul from Aretha Franklin, modern pop hits
    by Adele, and the occasional Broadway soundtrack of "Hamilton," shaping a creative atmosphere that fuels both their skincare formulations and community workshops.
  travel: Angelina Mccoy prefers short, purposeful getaways that blend relaxation with discovery—frequent weekend trips to Cape May’s historic boardwalk, a yearly family pilgrimage to the lavender fields
    of Provence, and a long‑awaited solo retreat to Kyoto’s zen gardens, all booked with a mix of online deals and spontaneous last‑minute choices reflecting their love for structure tempered by a craving
    for spontaneity.
  culinary: Angelina Mccoy enjoys a semi‑professional kitchen at home, regularly whipping up avocado‑lime smoothies, roasted beet hummus with locally sourced honey, and experimenting with turmeric‑infused
    sea‑salt scrubs that double as culinary salads, favoring organic produce from farmers markets and rarely missing a chance to pair meals with a crisp Sauvignon Blanc.
  core: Angelina Mccoy is a charismatic skin‑health guru whose love for community, penchant for spontaneous creativity, and undercurrent of worry drive them to balance meticulous clinic routines with occasional
    chaotic ingredient hunts and a habit of leaving mugs of chamomile tea cooling on the counter.
background:
  cultural: Angelina was raised in a middle‑class, predominantly white suburb of Southern New Jersey, with family roots in the Mid‑Atlantic region, descending from Irish and German ancestors. Her upbringing
    emphasized community involvement, church participation, and traditional American holidays such as Thanksgiving and Fourth of July celebrations. Growing up near the diverse Philadelphia metropolitan
    area exposed her to a mix of cultural influences, which she embraces through her love of varied cuisines and inclusive social circles. She values the practicality and work ethic common in her cultural
    milieu while also appreciating the multicultural tapestry of her surrounding community.
attributes:
  skills: '[''Skin analysis'', ''Personalized skincare regimen design'', ''Basic product formulation'', ''Dermatoscopy'', ''Light‑therapy application'', ''Client counseling'', ''Retail inventory management'',
