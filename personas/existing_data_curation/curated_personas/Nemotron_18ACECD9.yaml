  hobbies: '[''Community gardening'', ''Farmers market shopping'', ''Zumba'', ''Swing dancing'', ''Beach outings'', ''Coastal hiking'', ''Game nights with friends'', ''Yoga and meditation'', ''Gratitude
    journaling'', ''Reading mystery novels'', ''True‑crime podcast listening'', ''Volunteer skin‑health workshops'']'
  career_goals: She aims to launch her own boutique skincare studio in Southern New Jersey within the next three years, focusing on organic, locally‑sourced ingredients. Concurrently, she plans to develop
    a signature line of products under her name and obtain certification as an Advanced Esthetician Trainer. Angelina aspires to become a regional educator for a national skincare brand, delivering workshops
    and webinars. She also hopes to build an online community that educates consumers about skin health and stress‑related skin concerns, integrating mindfulness practices she has been exploring.
