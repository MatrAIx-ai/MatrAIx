  career_goals: Manuel aims to advance from a senior fabricator to a shop foreman or supervisor within the next five years, leveraging his technical depth and leadership potential. He plans to achieve an
    AWS Certified Welder designation and complete an advanced certification in structural steel design to broaden his qualifications. While he remains grounded in proven fabrication methods, he is curious
    about integrating emerging technologies such as metal additive manufacturing and automated robotic welding cells into his workflow. Long‑term, Manuel aspires to open a modest custom metal‑work shop
    that serves residential clients in the Fairborn area, providing him with greater autonomy, a stable income for his family, and the flexibility to allocate time for mental‑health self‑care. He also intends
    to mentor apprentices, passing on his practical knowledge while fostering a supportive, safety‑focused shop culture.
