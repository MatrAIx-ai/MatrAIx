  career_goals: Approaching retirement, Kelly aims to transition into a supervisory or safety‑trainer role where she can leverage her experience to mentor younger workers. She hopes to earn a certification
    as a Certified Safety Professional, lead a shift crew, and develop a safety‑best‑practice manual for her warehouse. While competitive, she wants to be recognized as a go‑to problem‑solver and to secure
    a part‑time consulting arrangement after she steps down from full‑time work, allowing her to stay active in the industry without the physical demands of heavy lifting. Financially, she aims to build
    a modest nest egg for travel to visit her grandchildren, and she values leaving a legacy of professionalism for her family.
