  hobbies: '[''bike riding'', ''fishing'', ''soccer'', ''LEGO building'', ''strategy video games'', ''reading about wildlife and farming'', ''volunteering at the county fair'']'
  career_goals: John hopes to continue the family’s farm tradition by learning advanced gardening and livestock care, and he is also interested in becoming a skilled mechanic or carpenter, a trade he sees
    as practical and reliable. He imagines one day running his own small-scale farm or a local workshop that serves the community, while also being a dependable volunteer at the county fair and local school
    events.
