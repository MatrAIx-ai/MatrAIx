personas:
  professional: John Rebadow is an aspiring agricultural technologist who channels his love for routine and hands‑on problem‑solving into designing intricate LEGO farm models and mastering strategy video
    games that simulate crop management, and they eagerly experiment with basic sensor kits to glimpse a future in precision farming.
  sports: John Rebadow is an avid participant in the local youth soccer league, a regular rider on the country roads who cheers for the Iowa State Cyclones men's soccer team and follows the Des Moines Menace
    during their off‑season, and they spend weekends fishing at the creek while keeping a modest fitness routine with daily bike rides.
  arts: John Rebadow is a creative LEGO architect who assembles detailed farm dioramas while listening to the folk‑rock sounds of The Lumineers and the classic country ballads of Johnny Cash, and they devour
    wildlife field guides by National Geographic for inspiration.
  travel: John Rebadow is a road‑trip enthusiast who has visited the Des Moines County Fair and the Skywalk Observatory in Chicago with his family, dreams of camping in Yellowstone National Park, and they
    plan future trips around school breaks with a modest budget that favors free outdoor adventures.
  culinary: John Rebadow is a hearty eater who favors corn‑dog fair snacks, home‑cooked chicken fried steak with mashed potatoes, and the occasional backyard fish fry, and they love helping their mom slice
    fresh apples for a classic apple pie while experimenting with pepperoni and mushroom toppings on homemade pizza.
  core: John Rebadow is a routine‑loving, outdoors‑driven 12‑year‑old who balances meticulous LEGO building with spontaneous creek fishing, occasionally forgets to finish chores but always returns to his
    trusted bike routes, and they cherish the predictable rhythm of county‑fair preparations.
background:
  cultural: John’s cultural background is shaped by a Midwestern, rural white community in Iowa, where family, church, and local community events like the county fair play central roles. The region’s values
    of self-reliance, practicality, tradition, and close-knit social ties influence his everyday life and outlook.
attributes:
  skills: '[''basic computer use'', ''routine management'', ''farm chores (feeding livestock, minor equipment upkeep)'', ''team collaboration'', ''time management'', ''reading comprehension'', ''basic first-aid
