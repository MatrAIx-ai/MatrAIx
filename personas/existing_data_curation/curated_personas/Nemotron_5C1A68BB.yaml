  hobbies: '["Reading science‑fiction novels", "Learning robotics and electronics via online tutorials", "Playing strategy video games", "Sketching futuristic designs", "Listening to Latin folk and indie
    music", "Playing soccer in small groups", "Volunteering to tutor younger students"]'
  career_goals: Federico aims to graduate high school with honors and secure a scholarship to study computer science or electrical engineering at a university. He dreams of becoming a software developer
    who creates accessible educational tools for underserved communities, especially Latino youth. In the short term, he plans to earn certifications in Python programming and participate in a local youth
    robotics club to strengthen his technical portfolio. Long‑term, he aspires to work in a tech firm that values community impact, while also giving back to his family by providing financial stability
    and supporting cultural initiatives within the Dallas Guatemalan community.
