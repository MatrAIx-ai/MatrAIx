personas:
  professional: Federico Lozano, a budding robotics hobbyist, merges his love of science‑fiction with practical electronics tinkering, applying methodical planning and a meticulous eye for detail to self‑guided
    projects while balancing teenage school responsibilities.
  sports: Federico Lozano joins a small neighborhood soccer squad for informal weekend matches, cheering for the local professional team Club Atlético, while also enjoying strategic e‑sports titles that
    sharpen planning skills, and prefers a low‑key fitness routine that alternates between brisk park jogs in spring and indoor body‑weight circuits during winter.
  arts: Federico Lozano channels creative impulses into sketching futuristic gadgets in a well‑worn journal, draws inspiration from indie artists like Bon Iver and Latin folk singers such as Natalia Lafourcade,
    and spends evenings devouring classic science‑fiction novels by Isaac Asimov, allowing these artistic influences to shape both their aesthetic sensibility and problem‑solving mindset.
  travel: Federico Lozano favors meticulously planned weekend getaways to nearby historic towns such as Córdoba and Granada, dreams of attending the Tokyo International Robot Expo, balances a desire for
    adventure with parental budget constraints, and prefers low‑key, culturally immersive experiences over crowded tourist hotspots.
  culinary: Federico Lozano enjoys a modest, tech‑themed kitchen routine that includes whipping up quick ramen bowls, crafting homemade empanadas with a pinch of cumin, and blending fruit smoothies peppered
    with protein powder, yet admits a habit of binge‑ordering pizza after late‑night gaming marathons.
  core: Federico Lozano blends quiet curiosity with structured creativity, juggling robotics projects, soccer camaraderie, and careful budgeting while battling occasional stress‑induced headaches and a
    habit of late‑night gaming.
background:
  cultural: Federico is a first‑generation Guatemalan‑American whose family emigrated from Guatemala to Dallas before he was born. His household maintains strong ties to Guatemalan traditions, celebrating
    holidays like Día de los Muertos and Semana Santa with specific foods such as pepian, tamales, and atol de elote. Spanish is the primary language spoken at home, preserving cultural narratives and folklore
    through storytelling. The family is active in a local Guatemalan community association, where they attend cultural festivals, dance performances, and language preservation workshops. Catholicism plays
    a role in family rituals, but the household also embraces broader Latino values of family solidarity, respect for elders, and communal support. Living in Dallas, Federico balances these cultural roots
    with the diverse, multicultural environment of the city, shaping his identity as both a proud Guatemalan and an engaged American teen.
attributes:
