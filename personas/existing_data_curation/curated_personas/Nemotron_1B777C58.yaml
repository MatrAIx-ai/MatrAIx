personas:
  professional: Sheri Renard is a registered nurse who combines meticulous patient assessment, IV therapy, and emergency triage with a curiosity‑driven passion for incorporating art‑based calming techniques
    into care, using their sociable, empathetic demeanor to translate medical jargon for patients, de‑escalate crises, and mentor new staff while managing their own emotional reactivity through mindfulness.
  sports: Sheri Renard is an energetic participant in community Zumba classes, a regular at sunrise yoga at the local studio, a member of the Heartland Runners club that trains for the spring half‑marathon,
    and a devoted fan of the Kansas City Chiefs, Royals, and Sporting Kansas City, using weekly forest‑trail hikes as both cardio and a mental reset.
  arts: Sheri Renard channels their love for visual arts by joining Saturday painting workshops, drawing inspiration from Monet’s water lilies and Frida Kahlo’s self‑portraits, while their soundtrack features
    Sufjan Stevens, Lianne La Havas, and live performances at the Kansas City Repertory Theatre, making the Nelson-Atkins Museum a frequent pilgrimage for creative rejuvenation.
  travel: Sheri Renard designs weekend getaways that blend art‑focused city tours—like a two‑day immersion in Santa Fe’s galleries and a jazz‑laden night in New Orleans—with nature retreats to the Ozark
    National Forest, while holding a long‑term dream of a month‑long cultural pilgrimage to Kyoto’s temples and a sunrise yoga retreat in Bali, all balanced within a modest travel fund and limited vacation
    days.
  culinary: Sheri Renard, an intermediate home baker, delights in crafting lemon‑blueberry scones, matcha‑swirled chocolate cupcakes, and rustic sourdough loaves, favoring fresh berries, almond flour, dark
    chocolate, and a splash of vanilla to create comforting treats after long hospital shifts.
  core: Sheri Renard is a compassionate nurse‑artist whose relentless curiosity fuels late‑night sketching, over‑caffeinated binge‑baking, and the habit of turning anxiety into creative energy.
background:
  cultural: Sheri grew up in a middle-class, white family in the Kansas City suburbs of Missouri, where Midwestern values of modesty, hard work, and community stewardship were deeply embedded. Her upbringing
    combined Protestant church involvement with regular participation in local traditions such as county fairs, Fourth of July parades, and community potlucks. This environment fostered a strong sense of
    family cohesion, neighborly hospitality, and a belief in collective well-being. While her formal education concluded with high school, she pursued nursing through a vocational program, reflecting the
    region’s emphasis on practical, service-oriented career paths. Sheri’s cultural background continues to shape her priorities of caring for others, contributing to community health, and maintaining harmonious
    relationships.
