  hobbies: '[''Painting and sketching'', ''Visiting art galleries and museums'', ''Group dance fitness classes (Zumba)'', ''Yoga and meditation'', ''Book club participation'', ''Volunteer work at local
    food pantry'', ''Community clean-up events'', ''Nature hikes and trail walking'', ''Cooking and baking new recipes'', ''Journaling for emotional processing'']'
  career_goals: Sheri aims to earn a Bachelor of Science in Nursing (BSN) within the next two years, followed by certification as a Psychiatric-Mental Health Nurse Practitioner. She envisions a career that
    blends acute nursing care with holistic, creativity-focused interventions, eventually establishing a community wellness program that offers art-therapy workshops, stress-reduction classes, and peer
    support groups. In the short term, she hopes to become a preceptor for newly hired nurses, championing a culture of empathy and continuous learning. Long-term, Sheri aspires to influence hospital policies
    on patient-centered mental-health care and to obtain additional training in integrative health modalities to better support patients experiencing intense emotional distress.
