personas:
  professional: Long Yi is a budding early tinkerer who treats each play session as a mini lab, employing methodical curiosity to explore cause-and-effect toys, demonstrating disciplined focus by arranging
    blocks in perfect rows, and they balance new ideas with proven routines.
  sports: Long Yi is an energetic toddler who splashes through weekly parent‑child swimming lessons at the Irvine Swim Club, cheers loudly for the Los Angeles Dodgers on game day, and enjoys toddling around
    the community park’s mini‑soccer field with a plastic ball.
  arts: Long Yi is a budding music enthusiast who giggles to the cheerful tunes of The Beatles' Here Comes the Sun, claps along with Baby Shark whenever it plays, and snuggles during family evenings watching
    Studio Ghibli short films, and they often try to mimic the characters’ gestures.
  travel: Long Yi is an adventurous little explorer who lights up on family road trips to Disneyland, delights in sandcastle building at Huntington Beach, savors a weekend visit to Balboa Park in San Diego,
    and they dream of someday strolling under cherry blossoms in Washington, D.C.
  culinary: Long Yi is a budding foodie who favors smooth avocado mash, warm rice porridge lightly seasoned with soy, bite‑size salmon sushi pieces cut just right for tiny fingers, and occasional soft banana
    slices, and they stubbornly turn their head away from overly sweet purees.
  core: Long Yi is a disciplined little dynamo whose boundless curiosity is balanced by a surprisingly meticulous routine, from arranging toys by size to insisting on a daily bedtime story, and they cannot
    resist a good squeaky toy even when it disrupts the quiet.
background:
  cultural: Long comes from a Japanese‑American family in Irvine, California. His household blends traditional East Asian values—respect for elders, harmony, and community—with the openness of Californian
    culture. He is exposed to both Japanese and English languages at home, celebrates Japanese festivals such as Obon alongside American holidays, and enjoys a diet that includes sushi, rice, and locally
    sourced produce. This multicultural environment influences his social development, sense of community, and appreciation for both cultural heritage and contemporary American life.
