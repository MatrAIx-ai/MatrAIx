  career_goals: Although only one year old, Long shows early signs of a desire to explore, learn, and create. He looks forward to attending preschool, learning to read, and eventually pursuing a career
    that blends creativity with structure—such as engineering, teaching, or design—so he can help others and bring practical ideas to life.
