  hobbies: '[''sketching urban scenes'', ''photography'', ''visiting local art galleries and museums'', ''listening to diverse music genres'', ''community gardening'', ''reading contemporary art and social
    justice literature'', ''playing acoustic guitar'', ''volunteering for neighborhood clean-ups and food drives'']'
  career_goals: Benjamin aims to obtain his GED within the next year and enroll in a community-college program focused on social work or environmental health. He envisions a career as a community health
    advocate in Flint, where he can blend his artistic talents with public-education campaigns about water safety and social equity. In the longer term, he hopes to manage or coordinate youth-outreach programs
    that use art-based workshops to empower at-risk teenagers. He is also interested in earning a certification in graphic design to create compelling visual messages for non-profit initiatives. His ambition
    is to be a trusted bridge between residents, local institutions, and policy makers, fostering collaborative solutions to the city’s challenges.
