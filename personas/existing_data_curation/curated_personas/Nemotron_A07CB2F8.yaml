personas:
  professional: Benjamin Limes is an emerging community health advocate in Flint who leverages his self‑taught graphic design skills, first‑aid knowledge, and empathetic peer‑counseling to craft visual
    public‑education campaigns about water safety, while also coordinating neighborhood art‑based outreach events.
  sports: Benjamin Limes is a regular at the Flint Community Recreation Center’s pickup basketball league, follows the Detroit Pistons and Detroit Lions each season, and joins the local running group for
    Saturday morning 5K routes along the Flint River.
  arts: Benjamin Limes channels a love for urban mural culture into watercolor sketches of industrial ruins, frequently draws inspiration from artists like Jacob Lawrence, Banksy, and the folk sounds of
    Bon Iver and Neil Young, and attends pop‑up gallery shows that feature works by emerging Midwestern creators.
  travel: Benjamin Limes enjoys day trips to Mackinac Island’s bike‑friendly streets and has saved for a backpacking adventure across the Upper Peninsula, while dreaming of a future study‑tour to Copenhagen’s
    sustainable urban art districts.
  culinary: Benjamin Limes favors farm‑to‑table dishes like roasted root vegetables with rosemary, hearty Michigan pasties, and perfect cornbread, cooks with a modest skill set using a cast‑iron skillet,
    and relishes seasonal farmers‑market finds of heirloom tomatoes and sweet potatoes.
  core: Benjamin Limes blends Flint’s gritty resilience with artistic flair, channeling community compassion into visual advocacy while juggling a frugal budget, mild health challenges, and a love for local
    sports, art, and sustainable food.
background:
  cultural: Benjamin grew up as a White, working-class youth in Flint, Michigan, a city whose identity is shaped by the rise and decline of the auto industry and the ongoing water-crisis. His family has
    roots in the Midwest, with generations who worked in manufacturing plants and valued hard work, modesty, and community responsibility. The economic challenges and public-health emergencies that affected
    his neighborhood fostered a strong sense of mutual aid and solidarity, in which local churches, youth clubs, and neighborhood collectives played pivotal roles. This environment nurtured his compassionate
    outlook, his appreciation for grassroots art projects like community murals, and his desire to contribute to the city’s recovery through collaborative effort. The Midwestern cultural emphasis on honesty,
    perseverance, and helping one another continues to inform his worldview and aspirations.
attributes:
  skills: '[''watercolor painting'', ''sketching'', ''digital graphic design (GIMP, Canva)'', ''event planning and logistics'', ''peer counseling'', ''conflict mediation'', ''first aid'', ''basic carpentry'',
