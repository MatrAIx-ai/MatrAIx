  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking Tex-Mex cuisine'', ''Book club (small group)'', ''Quilting circle'', ''Volunteer at community health fairs'', ''Hiking in Hill Country'',
    ''DIY home improvement projects'', ''Listening to classic country music'']'
  career_goals: Kasie aims to advance to a director of care services position within a senior living community or to launch her own home‑care agency that emphasizes person‑centered, high‑quality care. She
    plans to earn professional certifications such as Certified Care Manager (CCM) and pursue continuing education in gerontology and healthcare administration. Her ambitions include implementing quality‑improvement
    initiatives, creating staff mentorship programs, expanding services to underserved neighborhoods in Williamson County, and maintaining a balanced work‑life schedule to support her family.
