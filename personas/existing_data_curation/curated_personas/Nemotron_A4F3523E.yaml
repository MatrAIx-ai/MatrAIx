personas:
  professional: William Strickland, a retired hardware store owner turned community mentor, blends decades of carpentry, small‑engine repair, and budgeting expertise with a methodical, hands‑on approach
    to guiding apprentices and preserving local heritage; they value structure and reliability above all.
  sports: William Strickland enjoys early‑morning fishing on Lake Coeur d’Alene, follows the Seattle Seahawks and the Portland Trail Blazers on TV, occasionally joins the local senior walking club for nature
    hikes, and participates in a community bowling league; they never miss their weekly bridge games.
  arts: William Strickland spends evenings watching classic films like Casablanca and The Maltese Falcon, collects prints by Edward Hopper, enjoys occasional performances at the Post Falls Community Theater,
    and switches between woodworking and listening to Johnny Cash while sipping coffee; they let the arts shape their quiet evenings.
  travel: William Strickland prefers well‑planned road trips with his wife, favoring scenic stops at Coeur d’Alene, the Sun Valley ski resort, and the historic town of Mackay, while keeping a notebook of
    future destinations like Glacier National Park and Yellowstone; they hope to explore these before health limits them.
  culinary: William Strickland delights in cooking freshly caught trout with lemon butter, simmering his garden’s heirloom tomatoes into a rustic salsa, baking homemade bread with whole‑wheat flour, and
    topping his meals with Idaho huckleberry jam; they occasionally burn the garlic when distracted by a phone call.
  core: William Strickland, an 88‑year‑old carpenter‑turned‑mentor, balances routine garden chores, vintage truck restoration, and community service with a steady, structured outlook and a penchant for
    classic movies and careful budgeting.
background:
  cultural: William is a white American with deep roots in the Pacific Northwest. His family moved to Idaho in the 1950s from the Midwest, bringing values of hard work, self‑reliance, and community service.
    He identifies strongly with rural and small‑town traditions, a love of the outdoors, and respect for classic American customs. He celebrates holidays such as Thanksgiving, the Fourth of July, and participates
    in local community events and church activities, reflecting a cultural background grounded in regional history and family legacy.
