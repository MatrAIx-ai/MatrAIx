  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Reading local history books'', ''Playing bridge'', ''Attending church services'', ''Watching classic movies'', ''Walking in nature'', ''Classic
    car restoration'']'
  career_goals: Although retired, William aims to remain active and purposeful. He wants to mentor local apprentices in woodworking, volunteer with the Post Falls historical society, and help preserve the
    town’s heritage. He also seeks to document his family’s genealogy for future generations, maintain his home and garden in top condition, and ensure his grandchildren have the support they need for education
    and life skills. Travel with his wife to nearby scenic spots like Coeur d’Alene and continue attending community events are also part of his aspirations.
