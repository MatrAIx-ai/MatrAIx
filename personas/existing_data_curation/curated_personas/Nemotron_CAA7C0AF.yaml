  career_goals: Michael aspires to merge his love of art and technology by becoming a multimedia artist or concept designer for video games and film. He plans to earn a scholarship to a specialized art
    and design college after completing high school, and eventually work in the entertainment industry creating visual narratives. Additionally, he hopes to launch a YouTube channel where he shares tutorials
    on digital art and coding, using his platform to mentor peers while maintaining creative independence.
