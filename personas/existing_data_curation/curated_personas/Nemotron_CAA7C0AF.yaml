personas:
  professional: Michael Stokes, an aspiring digital illustrator and budding game designer who blends hand‑drawn character sketches with tablet‑based animation, leverages their robotics club experience to
    prototype interactive story mechanics, and channels their curiosity and competitive drive into creating polished portfolio pieces that stand out in high school art showcases.
  sports: Michael Stokes, an energetic basketball enthusiast who practices at the community center three evenings a week, cheers on the local high school team the Dacula Panthers and the Atlanta Falcons
    on weekends, and they balance a competitive spirit on the court with a casual love for occasional pickup soccer games at the park.
  arts: Michael Stokes, a budding visual storyteller who spends evenings sketching superhero concepts inspired by comic creators like Alex Ross and reading graphic novels such as 'Saga', while also editing
    short lo‑fi music videos featuring tracks by artists like ODESZA and playing acoustic renditions of songs by John Mayer, finds their identity shaped by the blend of classic illustration techniques and
    modern digital tools.
  travel: Michael Stokes, a curious teen who loves weekend road trips to the historic streets of Savannah for its riverfront art festivals and to the sandy shores of Tybee Island for beach volleyball, dreams
    of backpacking through Japan’s anime districts in Kyoto and Osaka, yet they balance wanderlust with family budget constraints that limit longer trips to summer school breaks.
  culinary: Michael Stokes, a budding home cook who can whip up classic fried chicken with a side of peach cobbler and sweet tea for family gatherings, enjoys experimenting with making their own pizza dough
    topped with pepperoni and fresh basil, and often snacks on ramen bowls from the local Asian market while listening to their favorite lo‑fi playlists.
  core: Michael Stokes, a creative, competition‑driven teen whose sketchbook is as full of doodles as their mind is full of worries, often juggling late‑night gaming marathons with school projects while
    secretly hoarding extra‑large packs of gummy bears for stress relief.
background:
  cultural: Michael was raised in Dacula, a small‑town community in Walton County, Georgia, within a family that values Southern hospitality and Christian faith. His upbringing blends typical Georgian customs—Sunday
    church services, community picnics, and a love for Southern cooking—with exposure to broader cultural influences through school art programs, online media, and diverse friendships. While identifying
    as white, he is aware of the region’s cultural tapestry and strives to bridge traditional Southern values with contemporary creative expression.
