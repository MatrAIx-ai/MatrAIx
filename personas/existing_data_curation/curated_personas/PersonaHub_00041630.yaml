persona_description: A school administrator or educational psychologist who is interested in understanding and promoting the well-being of students across various dimensions, including psychological, cognitive,
  social, physical, economic, emotional, and environmental systems. This individual is likely to be familiar with the systematic review of literature on youth well-being and the development of a multi-dimensional
  model of measurement that encompasses indicators, protective and risk factors of well-being. They are interested in using the online standard survey and reporting system to gather and analyze student
  responses to better understand student well-being in six domains and to guide future well-being initiatives.
