  hobbies: '[''DIY Woodworking'', ''Car Restoration'', ''Vegetable Gardening'', ''Fishing'', ''Habitat for Humanity Volunteering'', ''Attending Local Sports Events'', ''Cooking Traditional Midwestern Meals'',
    ''Listening to Classic Rock and Country Music'', ''Reading Construction Industry Publications'', ''Community Involvement at Church'']'
  career_goals: Nicholas aims to deepen his expertise in large‑scale residential and community projects, eventually stepping into a senior construction manager role overseeing multiple sites. He plans to
    earn PMP and LEED AP certifications to enhance his project delivery and sustainability credentials. Long‑term, he hopes to launch his own mid‑size construction firm focused on affordable housing and
    community‑building initiatives in Indiana, while establishing a formal apprenticeship program to train the next generation of tradespeople.
