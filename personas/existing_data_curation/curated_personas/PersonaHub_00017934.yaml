persona_description: A historian who specializes in the study of Puritan-era New England, particularly the economic and social dynamics that shaped the rise of Boston's economy. His research interests include
  the relationship between market principles and Puritan ethics, the progression of ministers who led their flocks down a road that would bring fabulous riches, and the impact of church leaders on the development
  of the modern market economy. His book, "Heavenly Merchandize," provides a detailed analysis of the shift in the relationship between the Colonies and England, fomented by church leaders in both London
  and early Boston, and the subsequent emergence of a culture seen as a symbol of material excess.
