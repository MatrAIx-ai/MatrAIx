personas:
  professional: Andrew Hollister is a budding junior engineer who loves building LEGO machines with moving parts, designs redstone contraptions in Minecraft, and approaches problems by mixing imagination
    with practical step‑by‑step thinking.
  sports: Andrew Hollister enjoys riding their bike around the neighborhood, participates in the local after‑school bike club, cheers for the Seattle Seahawks and the Seattle Sounders FC, and occasionally
    joins a community soccer clinic, blending a love for casual outdoor activity with fandom for regional professional teams.
  arts: Andrew Hollister spends free time sketching insects and river rocks, draws inspiration from Leonardo da Vinci’s anatomy sketches and the whimsical worlds of Dr. Seuss, listens to the upbeat tunes
    of Jack Johnson while building LEGO, and watches Minecraft YouTubers like Mumbo Jumbo for creative ideas.
  travel: Andrew Hollister loves spontaneous trips to the Columbia River Gorge and nearby state parks, dreams of visiting Yellowstone National Park and the Grand Canyon, prefers short, family‑led road trips
    over rigid itineraries, and often packs a small backpack with a sketchbook and a rock‑collecting jar for on‑the‑fly exploration.
  culinary: Andrew Hollister enjoys helping bake chocolate chip cookies, carefully measuring flour and sugar, favors mac and cheese, chicken nuggets, and carrot sticks, and has a particular fondness for
    the sweet‑and‑salty flavor of pretzel‑crusted pizza bites.
  core: Andrew Hollister is a curious, practical 7‑year‑old who builds moving LEGO creations, rides bikes with friends, and balances a laid‑back attitude toward chores with a knack for measuring cookie
    dough, all while occasionally forgetting to take allergy medicine.
background:
  cultural: Andrew grows up in a middle‑class family in Vancouver, Washington, a suburb on the Columbia River near Portland, Oregon. His household reflects mainstream American cultural traditions—celebrating
    holidays such as Thanksgiving, Halloween, and the Fourth of July—while also embracing the Pacific‑Northwest love of the outdoors. Weekend activities frequently include hikes in nearby state parks, fishing
    or paddling on the river, and visits to the local farmers market, where he is exposed to fresh, locally grown produce and occasional cultural foods from the region’s diverse community. His parents encourage
    curiosity and hands‑on learning, providing books, LEGO kits, and a tablet for educational apps. In school, he participates in multicultural events and community service projects that broaden his perspective.
    This blend of typical U.S. suburban life, regional outdoor enthusiasm, and exposure to a variety of cultural influences shapes his worldview and values.
