  career_goals: Andrew dreams of becoming an engineer or inventor who creates gadgets that help protect the environment. Inspired by his love of building LEGO and his curiosity about how things work, he
    imagines designing simple machines for his neighborhood park, like a solar‑powered bike rack. He also enjoys science stories about space, so he sometimes talks about wanting to be an astronaut who builds
    tools for exploring new planets. While his ambitions are imaginative, they are grounded in his practical side—he wants to learn the steps needed, practice on smaller projects, and one day turn his ideas
    into real inventions that make everyday life easier for his family and community.
