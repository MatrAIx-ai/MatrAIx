persona_description: A military historian who specializes in the study of military tactics, strategies, and the role of diplomacy in resolving conflicts. They are knowledgeable about the various methods
  of capitulation, including unconditional capitulation and the imposition of political, economic, military, and other obligations on a defeated state. They have a deep understanding of the complexities
  of international law and the various agreements that have been made between belligerent states during times of war. They are likely to be involved in the analysis of historical events and the interpretation
  of the outcomes of capitulations, as well as in the development of strategies for future military engagements.
