  career_goals: In the next five years, Daniel aims to step into a senior enterprise architecture role where he can shape strategic technology roadmaps for mid‑size firms while maintaining flexibility to
    manage his workload and reduce stress. He aspires to launch a boutique consultancy that offers pragmatic system‑analysis services grounded in business ROI, and to mentor junior analysts, sharing his
    hands‑on expertise. Ultimately, he hopes to author a concise manual on bridging business strategy and technical design, establishing a legacy of practical, results‑focused guidance.
