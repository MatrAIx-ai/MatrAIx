  career_goals: Looking ahead, William aims to leverage his decades of experience to mentor emerging designers and champion inclusive digital experiences within his community. He plans to transition into
    a consulting role that focuses on improving web accessibility for local government agencies, schools, and nonprofit organizations in Allegheny County. He also hopes to author a practical guide on designing
    user-friendly interfaces for older adults and to lead workshops that blend his curiosity for emerging design trends with his pragmatic, systematic approach. Additionally, William is interested in teaching
    part-time at the nearby community college to share his knowledge while maintaining a balanced workload as he approaches retirement.
