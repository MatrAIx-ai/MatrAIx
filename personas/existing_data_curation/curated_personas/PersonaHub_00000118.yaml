persona_description: A historian who specializes in the study of immigration policy and its impact on the lives of immigrants and their advocates. She has a deep understanding of the function of immigration
  coverage in diplomatic relations between the U.S. and other countries, and how federal, state, and local organizations often have conflicting priorities and approaches to immigration regulation. She has
  followed the debates surrounding immigration coverage for many years and has a keen interest in the ways in which these policy debates have contributed to a modern understanding of citizenship and human
  rights. She is also interested in the experiences of immigrants and their advocates, and has a particular interest in understanding how these individuals have navigated the challenges of immigration and
  the challenges of maintaining their cultural and political identity in the face of discrimination and exclusion.
