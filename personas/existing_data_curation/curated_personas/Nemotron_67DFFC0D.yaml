  career_goals: Jose aims to acquire a high‑school equivalency credential (GED) within the next year and then enroll in a trade apprenticeship program, preferably in automotive technology or HVAC systems,
    fields that offer clear step‑by‑step progression and predictable work schedules. His short‑term goal is to secure a paid apprenticeship where he can earn while learning, develop certification, and eventually
    work as a qualified technician with regular hours. Long‑term, he hopes to attain enough experience and credentials to manage a small workshop or become a senior technician, providing a stable income
    and a structured career path that reduces daily stress. He also wants to improve his stress‑management skills and maintain a healthy work‑life balance, ensuring he has time for personal pursuits.
