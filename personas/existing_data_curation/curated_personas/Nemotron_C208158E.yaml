personas:
  professional: A retired tractor mechanic and furniture craftsman, James Porter blends hands‑on expertise with charismatic leadership, guiding community meetings and oral‑history projects while their spontaneous
    curiosity keeps them tinkering with new tech like drone photography despite a loose approach to deadlines.
  sports: James Porter enjoys low‑impact fitness like morning walks along Lake Allatoona's trail and weekly shuffleboard at the senior center, follows the Atlanta Braves and the Georgia Bulldogs on television,
    and occasionally joins a local senior softball league, balancing gentle activity with a love for regional sports fandom.
  arts: James Porter sings gospel hymns with the church choir, finds joy in bluegrass legends like Bill Monroe and modern folk artist Sturgill Simpson, and frequently attends local theater productions featuring
    actors such as Annette O'Toole, allowing music and performance to color their daily storytelling.
  travel: James Porter prefers relaxed road trips to historic Southern towns like Savannah and Asheville, often planning spontaneous detours to capture drone footage of rolling hills, yet they limit long‑haul
    flights, focusing on family‑friendly destinations within a reasonable drive.
  culinary: James Porter expertly prepares Southern classics like fried chicken, hush‑puppies, and peach cobbler, often incorporating garden‑fresh tomatoes, sweet potatoes, and collard greens into experimental
    dishes, and delights in sharing meals at community potlucks while occasionally over‑seasoning in their culinary enthusiasm.
  core: James Porter is a talkative, community‑centric retiree whose spontaneous curiosity fuels hands‑on projects and deep worries, making them the lively, sometimes scattered, heart of Resaca’s heritage
    preservation.
background:
  cultural: James is a white Southerner born and raised in the rural South, specifically the Appalachian‑influenced region of northwest Georgia. He grew up steeped in Baptist traditions, community potlucks,
    and family gatherings that emphasize hospitality and storytelling. The local culture values self‑reliance, reverence for land, and respect for elders, all of which shape his outlook. While proud of
    these traditions, his lifelong curiosity drives him to explore new ideas—especially in technology and genealogy—balancing a deep respect for heritage with an openness to change.
attributes:
  skills: '[''Machinery maintenance'', ''Woodworking'', ''Southern cooking'', ''Public speaking'', ''Community mediation'', ''Basic digital literacy'']'
  hobbies: '[''Fishing'', ''Card games'', ''Gardening'', ''Church choir singing'', ''Genealogy research'', ''Hoedown dancing'', ''Drone photography'']'
  career_goals: Although retired, James aims to become a local historian and mentor. He wants to record oral histories of his neighbors and preserve the traditions of Resaca for future generations. He also
    hopes to teach his grandchildren practical skills—like gardening, basic car care, and cooking—while continuing to volunteer as a liaison for community events. Maintaining his health, staying socially
    engaged, and leaving a legacy of shared stories and skills are his primary ambitions.
