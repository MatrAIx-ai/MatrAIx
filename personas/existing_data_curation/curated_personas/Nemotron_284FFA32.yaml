personas:
  professional: Phat Zalzala, a 2‑year‑old budding block architect, showcases early problem‑solving skills and fine‑motor coordination, thriving on the predictable routine of daily play while delighting
    in the occasional spontaneous building experiment.
  sports: Phat Zalzala, a 2‑year‑old who loves toddling around the local park, regularly participates in a morning toddler gymnastics class, cheerfully shouts for the Chicago Cubs on mornings when the game
    is on TV, and delights in throwing soft foam balls at a miniature basketball hoop.
  arts: Phat Zalzala, a 2‑year‑old enthusiastic about nursery rhymes, spends afternoons dancing to Raffi’s “Baby Beluga” and quietly tracing pictures from Dr. Seuss books, while they proudly display a hand‑painted
    scribble of a rainbow on the refrigerator.
  travel: Phat Zalzala, a 2‑year‑old who has already visited the city zoo, a beach in Florida, and the grandparent’s farm, prefers short car rides with frequent stops for snack breaks and loves the predictability
    of a familiar hotel room over exotic adventure.
  culinary: Phat Zalzala, a 2‑year‑old with a growing palate, repeatedly asks for macaroni and cheese, enjoys dipping strawberry slices in yogurt, and occasionally messes up the kitchen by spilling almond‑milk
    smoothies while attempting to “help” stir the pot.
  core: Phat Zalzala, a two‑year‑old who thrives on routine yet secretly enjoys spontaneous sticker raids, balances sharing with stubborn self‑assertion, and can be found negotiating bedtime in the most
    charmingly disorganized fashion.
background:
  cultural: Phat is a first‑generation Southeast Asian American, born to Vietnamese immigrant parents who settled in Lodi, New Jersey. At home, he hears both English and Vietnamese, and his family celebrates
    cultural traditions such as Tet (Lunar New Year) with special foods, lanterns, and storytelling. The community’s multicultural environment, with nearby Asian markets and festivals, enriches his exposure
    to the region’s cuisine and customs. His upbringing blends the values of family cohesion and respect for elders with the openness and flexibility of American life, shaping a bilingual, culturally aware
    child who enjoys both local playgrounds and traditional Vietnamese lullabies.
