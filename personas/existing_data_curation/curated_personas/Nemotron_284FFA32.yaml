  career_goals: Although only two years old, Phat already shows curiosity about the world of grown‑ups. He loves watching his parents fix things around the house and often says he wants to be a ‘builder’
    or a ‘helper’. He imagines a future where he can keep his surroundings tidy, construct tall towers with blocks, and protect his family, reflecting a practical, safety‑oriented ambition. In the coming
    years, his parents encourage him to explore interests that could lead to a future as a carpenter, a firefighter, or a community caretaker, aligning with his preference for structure and immediate, tangible
    results.
