  hobbies: '[''Salsa dancing'', ''Traditional Mexican cooking'', ''Desert plant gardening'', ''Volunteer work at the local senior center'', ''Walking and hiking in the Mojave'', ''Listening to regional
    music (corrido, mariachi)'', ''Reading historical fiction'', ''Podcasting about eco‑friendly cleaning'', ''Organizing community potlucks'', ''Knitwear crafting'']'
  career_goals: Maria aims to move into a supervisory role within the facilities department, where she can lead a team and formalize a green‑cleaning program for the building. She plans to earn a certification
    in environmentally sustainable cleaning and to become the go‑to trainer for new hires, using her competitive nature to set performance benchmarks. In the longer term, she hopes to launch a small, community‑focused
    cleaning service that offers affordable, eco‑friendly solutions to local businesses. Maria also wants to be recognized as a top performer in her county and to give back by volunteering her expertise
    at the senior center in Barstow.
