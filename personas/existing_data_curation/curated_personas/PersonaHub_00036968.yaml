persona_description: A historian and writer who specializes in the study of American history, particularly the period leading up to the Civil War. He is known for his work on John Brown, the abolitionist
  who led the attack on Harpers Ferry in 1859, and is a strong advocate for Brown's central role in the Civil War. He is also an admirer of Brown's vision of American equality and is dedicated to restoring
  Brown's legacy to the forefront of American history.
