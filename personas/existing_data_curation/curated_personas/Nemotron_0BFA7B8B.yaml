personas:
  professional: Janice Wright, an aspiring marine ecologist, combines her disciplined piano practice with meticulous tide‑pool journaling, using her preference for structure and solitary focus to nurture
    observational skills and early scientific thinking.
  sports: Janice Wright, an enthusiastic weekend hiker on the coastal cliffs and a member of Cambria’s youth soccer team, follows the San Francisco Giants and the Golden State Warriors while maintaining
    a simple routine of short trail runs that satisfy her love for structured, solitary fitness.
  arts: Janice Wright, a diligent sketch artist and piano student, finds artistic inspiration in the seascapes of Claude Monet and the modern piano compositions of Ludovico Einaudi, enjoys listening to
    Billie Eilish, and watches the performances of Lin‑Manuel Miranda on Broadway recordings, weaving these influences into her quiet creative routine.
  travel: Janice Wright, whose travel style blends careful planning with spontaneous beach exploration, has hiked the cliffs of Big Sur, visited the Monterey Bay Aquarium, and dreams of strolling the colorful
    streets of Cinque Terre, always packing her sketchbook and a pocket camera for quiet observation.
  culinary: Janice Wright, an aspiring home baker, frequently bakes chocolate chip cookies and lemon bars using fresh sea‑salt and local berries, enjoys fish tacos flavored with cilantro and lime, and experiments
    with cooking videos while occasionally over‑salting dishes due to her meticulous yet impatient tasting habit.
  core: Janice Wright balances a love for structured tide‑pool journals and disciplined piano practice with a habit of misplacing sketch pencils, revealing a practical mind that thrives in quiet, solitary
    creativity.
background:
  cultural: Janice comes from a white, Anglo‑American background typical of many families in Cambria, a small coastal town in San Luis Obispo County. Her family values a blend of traditional American customs—celebrating
    holidays like Thanksgiving and the Fourth of July—and a strong appreciation for the local environment. Growing up near the Pacific, she has been immersed in a community that emphasizes outdoor activities,
    marine stewardship, and a modest, arts‑friendly lifestyle. Local events such as the Cambria Scarecrow Festival and school field trips to nearby beaches reinforce a sense of communal pride and respect
    for nature. Her cultural upbringing encourages independence, self‑reliance, and a practical, yet flexible, approach to daily life.
