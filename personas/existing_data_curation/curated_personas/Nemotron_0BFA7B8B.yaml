  career_goals: Looking ahead, Janice envisions a future where she can combine her love of the ocean with practical problem‑solving. She hopes to study marine biology or environmental science, aiming to
    work on coastal conservation projects and perhaps guide school field trips to tide pools. She also imagines teaching younger students about nature, leveraging her ability to lead small groups. While
    science remains her primary interest, she keeps an open mind about careers in visual arts or music, recognizing that both could complement her investigative side. Janice’s goal is to pursue a career
    that offers clear steps of learning, hands‑on work, and the flexibility to adapt to new discoveries.
