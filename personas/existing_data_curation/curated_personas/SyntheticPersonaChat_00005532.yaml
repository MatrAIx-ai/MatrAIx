    User 1: Oh, that sounds fun! I''ve never been camping, but I''ve heard it''s a lot of fun.

    User 2: It is! It''s a great way to get back to nature.

    User 1: I can see why. It''s nice to get away from the city and just relax in the wilderness.

    User 2: It is. I love it.

    User 1: So, what''s your favorite part of Canada?

