  career_goals: Joseph aims to transition into a supervisory role within the manufacturing floor, where he can lead a team, implement lean processes, and champion continuous improvement. He aspires to combine
    his fabrication skills with his love for art by launching a small custom metal-art studio that creates functional sculptures and community installations. Over the next five years, he plans to complete
    a bachelor's degree in industrial engineering or manufacturing technology, earn certifications in advanced welding techniques, and develop a mentorship program for new hires at his plant.
