personas:
  professional: Terri Lehman is an aspiring digital illustrator and indie game designer who channels a vivid imagination into surreal artwork and simple interactive stories, while applying an organized,
    methodical workflow and reliable deadline management that reflects their love of planning and curiosity.
  sports: Terri Lehman plays on the Monroe Middle School soccer team, trains with the local Connecticut Wolves youth soccer club, avidly follows the New England Patriots and New York Knicks, and maintains
    a low‑impact fitness routine by hiking the woods of nearby Fairfield County with family on weekends.
  arts: Terri Lehman creates surreal paintings inspired by Salvador Dali and digital sketches echoing Simon Stålenhag, curates ambient piano playlists featuring Brian Eno and Hans Zimmer, draws narrative
    inspiration from Neil Gaiman’s graphic novels and Alan Moore’s comics, and regularly attends community theater productions of classics like A Midsummer Night’s Dream.
  travel: Terri Lehman delights in day trips to the Metropolitan Museum of Art in New York City, weekend getaways to historic Boston for lighthouse tours, and dreams of exploring medieval castles and forested
    landscapes across Europe, balancing school responsibilities and a limited budget with family‑planned itineraries.
  culinary: Terri Lehman prefers baking homemade apple pie with a buttery crust, enjoys snacking on soft pretzels sprinkled with coarse salt, experiments with shepherd’s pie using ground beef and root vegetables,
    and occasionally whips up quick ramen broth seasoned with miso while perfecting chocolate‑chip cookies with dark chocolate chunks.
  core: Terri Lehman is a meticulous, imagination‑driven teen who balances vivid artistic pursuits, careful budgeting, and anxiety‑focused self‑care, often channeling worry into creative expression while
    occasionally succumbing to impulsive LEGO splurges.
background:
  cultural: Terri comes from a middle‑class family of primarily German and Irish ancestry living in Monroe, a suburban town in Fairfield County, Connecticut. Her parents emphasize the importance of education,
    community involvement, and cultural enrichment. Family weekends often include visits to nearby museums, local theater performances, and nature hikes in the surrounding woods. She celebrates traditional
    American holidays—Thanksgiving, Independence Day, and Christmas—while also participating in multicultural events at school that expose her to diverse cultures. The community’s strong support for arts
    and academics has given Terri access to a well‑stocked public library, after‑school programs, and summer workshops that nurture her creative and intellectual interests.
