  career_goals: Terri aspires to combine her love for art, technology, and human experience in a career that blends creative design with thoughtful problem‑solving. She envisions herself studying visual
    arts or interaction design in college, eventually working as an immersive experience designer—creating video games, interactive installations, or educational media that engage imagination while addressing
    real‑world challenges. She is also open to exploring architecture or cognitive science, driven by her desire to shape environments that promote well‑being. Her short‑term goal is to earn a place in
    a competitive high‑school program that emphasizes STEAM, while building a portfolio of original artwork and code projects.
